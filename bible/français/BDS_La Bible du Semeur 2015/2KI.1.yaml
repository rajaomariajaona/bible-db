document_id: 2KI.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les rois de Juda et d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La maladie et la faute d’Ahazia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Après la mort d’Achab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Suite de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 22.52-54
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', les Moabites se révoltèrent contre Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Moabites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avaient été soumis par David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 8.2
        - type: text
          text: ). A partir du schisme, ils ont dû se trouver assujettis au royaume du Nord.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elie lui répondit : Si je suis un homme de Dieu, que le feu tombe du ciel et qu’il te foudroie, toi et ta « cinquantaine » !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt, la foudre tomba du ciel et consuma l’officier et sa cinquantaine de soldats.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ahazia envoya un autre officier accompagné d’une « cinquantaine ». Celui-ci dit à Elie : Homme de Dieu, par ordre du roi : Dépêche-toi de descendre !'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Elie lui répliqua : Si je suis un homme de Dieu, que le feu tombe du ciel et te foudroie, toi et tes hommes !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt, la foudre tomba du ciel et consuma l’officier et sa cinquantaine de soldats.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ahazia envoya un troisième officier avec une « cinquantaine ». Cet officier-ci, après être monté, fléchit les genoux devant Elie et le supplia : Homme de Dieu, je te prie, aie égard à ma vie et à celle de cette cinquantaine d’hommes ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le feu est tombé du ciel et a foudroyé les deux premiers chefs et leur « cinquantaine » ; mais maintenant, aie égard à ma vie !
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L’ange de l’Eternel dit alors à Elie : Descends avec lui, ne crains rien de sa part !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Elie se mit en route pour descendre avec l’officier chez le roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsqu’il fut arrivé, il lui dit : Voici ce que déclare l’Eternel : « Puisque tu as envoyé des messagers pour consulter Baal-Zeboub, le dieu d’Eqrôn, comme s’il n’y avait pas de Dieu en Israël que l’on puisse consulter, eh bien, tu ne quitteras plus le lit sur lequel tu t’es couché et tu vas mourir. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort d’Ahazia
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ahazia mourut effectivement, comme l’Eternel l’avait annoncé par Elie. Comme il n’avait pas de fils, son frère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son frère, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: absents du texte hébreu traditionnel, se trouvent dans l’ancienne version grecque.
      marker-yv: yv-n
    - type: text
      text: ' Yoram lui succéda sur le trône, la deuxième année de Yoram, fils de Josaphat, roi de Juda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le règne de Yoram a commencé par cinq années de corégence avec son père Josaphat, de 853 à 848 av. J.-C. (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.16'
        - type: text
          text: ). La 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' année du règne de Josaphat ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.1'
        - type: text
          text: ') est par conséquent la même que la seconde année du règne de Yoram (en corégence) : 852.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les autres faits et gestes d’Ahazia sont cités dans le livre des Annales des rois d’Israël.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le roi Ahazia tomba de sa chambre haute à Samarie par la fenêtre et se blessa grièvement. Il envoya des messagers consulter Baal-Zeboub
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Seigneur des Mouches, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: une déformation ridiculisante de Baal-Zeboul (Baal le prince), connu par d’anciens textes cananéens. Ce nom reparaît dans les évangiles sous la forme Béelzébul pour désigner le prince des démons (Mt 10.25 ; 12.27).
      marker-yv: yv-n
    - type: text
      text: ', dieu d’Eqrôn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La plus septentrionale des cinq villes princières des Philistins.
      marker-yv: yv-n
    - type: text
      text: ', pour savoir s’il se remettrait de cet accident. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais l’ange de l’Eternel dit à Elie de Tishbé : Mets-toi en route, va à la rencontre des messagers du roi de Samarie et demande-leur : « N’y a-t-il pas de Dieu en Israël pour que vous alliez consulter Baal-Zeboub, le dieu d’Eqrôn ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'C’est pourquoi, voici ce que déclare l’Eternel à votre roi : Tu ne quitteras plus le lit sur lequel tu t’es couché et tu vas mourir. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elie y alla.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors les messagers retournèrent auprès d’Ahazia, qui leur demanda : Pourquoi revenez-vous déjà ?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils lui répondirent : Un homme est venu à notre rencontre et nous a ordonné : Allez, retournez auprès du roi qui vous a envoyés et dites-lui : Voici ce que déclare l’Eternel : « N’y a-t-il pas de Dieu en Israël pour que tu envoies consulter Baal-Zeboub, le dieu d’Eqrôn ? C’est pourquoi tu ne quitteras plus le lit sur lequel tu t’es couché. Tu vas mourir. »'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ahazia leur demanda : Quelle allure avait l’homme qui est venu à votre rencontre et qui vous a transmis ce message ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils lui répondirent : C’était un homme habillé d’un vêtement en poil de chameau, noué d’une ceinture autour des reins.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Ahazia dit : C’est Elie, de Tishbé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahazia envoie arrêter Elie
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aussitôt, il envoya vers Elie un officier avec une cinquantaine d’hommes pour qu’ils le lui ramènent. L’officier monta vers Elie, qui se tenait sur le sommet de la montagne. Il lui dit : Homme de Dieu, le roi t’ordonne de descendre.'
