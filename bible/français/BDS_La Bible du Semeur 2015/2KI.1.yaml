document_id: 2KI.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rois de Juda et d’Israël
  - type: heading
    content: La maladie et la faute d’Ahazia
  - type: text
    content: Après la mort d’Achab
  - type: note
    content: Suite de 1 R 22.52-54.
  - type: text
    content: ', les Moabites se révoltèrent contre Israël'
  - type: note
    content: Les Moabites avaient été soumis par David (2 S 8.2). A partir du schisme, ils ont dû se trouver assujettis au royaume du Nord.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Elie lui répondit : Si je suis un homme de Dieu, que le feu tombe du ciel et qu’il te foudroie, toi et ta « cinquantaine » !'
  - type: text
    content: Aussitôt, la foudre tomba du ciel et consuma l’officier et sa cinquantaine de soldats.
  '11':
  - type: text
    content: 'Ahazia envoya un autre officier accompagné d’une « cinquantaine ». Celui-ci dit à Elie : Homme de Dieu, par ordre du roi : Dépêche-toi de descendre !'
  '12':
  - type: text
    content: 'Elie lui répliqua : Si je suis un homme de Dieu, que le feu tombe du ciel et te foudroie, toi et tes hommes !'
  - type: text
    content: Aussitôt, la foudre tomba du ciel et consuma l’officier et sa cinquantaine de soldats.
  '13':
  - type: text
    content: 'Ahazia envoya un troisième officier avec une « cinquantaine ». Cet officier-ci, après être monté, fléchit les genoux devant Elie et le supplia : Homme de Dieu, je te prie, aie égard à ma vie et à celle de cette cinquantaine d’hommes ! '
  '14':
  - type: text
    content: Le feu est tombé du ciel et a foudroyé les deux premiers chefs et leur « cinquantaine » ; mais maintenant, aie égard à ma vie !
  '15':
  - type: text
    content: 'L’ange de l’Eternel dit alors à Elie : Descends avec lui, ne crains rien de sa part !'
  - type: text
    content: 'Alors Elie se mit en route pour descendre avec l’officier chez le roi. '
  '16':
  - type: text
    content: 'Lorsqu’il fut arrivé, il lui dit : Voici ce que déclare l’Eternel : « Puisque tu as envoyé des messagers pour consulter Baal-Zeboub, le dieu d’Eqrôn, comme s’il n’y avait pas de Dieu en Israël que l’on puisse consulter, eh bien, tu ne quitteras plus le lit sur lequel tu t’es couché et tu vas mourir. »'
  - type: heading
    content: La mort d’Ahazia
  '17':
  - type: text
    content: Ahazia mourut effectivement, comme l’Eternel l’avait annoncé par Elie. Comme il n’avait pas de fils, son frère
  - type: note
    content: 'Les mots : son frère, absents du texte hébreu traditionnel, se trouvent dans l’ancienne version grecque.'
  - type: text
    content: ' Yoram lui succéda sur le trône, la deuxième année de Yoram, fils de Josaphat, roi de Juda'
  - type: note
    content: 'Le règne de Yoram a commencé par cinq années de corégence avec son père Josaphat, de 853 à 848 av. J.-C. (8.16). La 18e année du règne de Josaphat (3.1) est par conséquent la même que la seconde année du règne de Yoram (en corégence) : 852.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Les autres faits et gestes d’Ahazia sont cités dans le livre des Annales des rois d’Israël.
  '2':
  - type: text
    content: Le roi Ahazia tomba de sa chambre haute à Samarie par la fenêtre et se blessa grièvement. Il envoya des messagers consulter Baal-Zeboub
  - type: note
    content: C’est-à-dire le Seigneur des Mouches, une déformation ridiculisante de Baal-Zeboul (Baal le prince), connu par d’anciens textes cananéens. Ce nom reparaît dans les évangiles sous la forme Béelzébul pour désigner le prince des démons (Mt 10.25 ; 12.27).
  - type: text
    content: ', dieu d’Eqrôn'
  - type: note
    content: La plus septentrionale des cinq villes princières des Philistins.
  - type: text
    content: ', pour savoir s’il se remettrait de cet accident. '
  '3':
  - type: text
    content: 'Mais l’ange de l’Eternel dit à Elie de Tishbé : Mets-toi en route, va à la rencontre des messagers du roi de Samarie et demande-leur : « N’y a-t-il pas de Dieu en Israël pour que vous alliez consulter Baal-Zeboub, le dieu d’Eqrôn ? '
  '4':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare l’Eternel à votre roi : Tu ne quitteras plus le lit sur lequel tu t’es couché et tu vas mourir. »'
  - type: text
    content: Elie y alla.
  '5':
  - type: text
    content: 'Alors les messagers retournèrent auprès d’Ahazia, qui leur demanda : Pourquoi revenez-vous déjà ?'
  '6':
  - type: text
    content: 'Ils lui répondirent : Un homme est venu à notre rencontre et nous a ordonné : Allez, retournez auprès du roi qui vous a envoyés et dites-lui : Voici ce que déclare l’Eternel : « N’y a-t-il pas de Dieu en Israël pour que tu envoies consulter Baal-Zeboub, le dieu d’Eqrôn ? C’est pourquoi tu ne quitteras plus le lit sur lequel tu t’es couché. Tu vas mourir. »'
  '7':
  - type: text
    content: 'Ahazia leur demanda : Quelle allure avait l’homme qui est venu à votre rencontre et qui vous a transmis ce message ?'
  '8':
  - type: text
    content: 'Ils lui répondirent : C’était un homme habillé d’un vêtement en poil de chameau, noué d’une ceinture autour des reins.'
  - type: text
    content: 'Alors Ahazia dit : C’est Elie, de Tishbé.'
  - type: heading
    content: Ahazia envoie arrêter Elie
  '9':
  - type: text
    content: 'Aussitôt, il envoya vers Elie un officier avec une cinquantaine d’hommes pour qu’ils le lui ramènent. L’officier monta vers Elie, qui se tenait sur le sommet de la montagne. Il lui dit : Homme de Dieu, le roi t’ordonne de descendre.'
