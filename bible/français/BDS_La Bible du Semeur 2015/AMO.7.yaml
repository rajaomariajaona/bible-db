document_id: AMO.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les visions d’Amos
  - type: heading
    content: La vision des sauterelles
  - type: text
    content: Or voici ce que me fit voir le Seigneur, l’Eternel. Il y avait un essaim de criquets
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : il produisait des criquets.'
  - type: text
    content: ' au temps où le regain commençait à pousser. C’était après la coupe que l’on fait pour le roi'
  - type: note
    content: La première coupe appartenait au roi, celle du regain revenait au peuple. Amos signifie par là que tout le peuple est visé par cette menace.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Alors Amatsia, prêtre de Béthel, envoya un message à Jéroboam, roi d’Israël, pour lui dire : Amos conspire contre toi dans le royaume d’Israël, et le pays ne saurait tolérer plus longtemps tous ses discours. '
  '11':
  - type: text
    content: 'Voici, en effet, ce que déclare Amos : « Jéroboam mourra par l’épée, et Israël sera déporté loin de sa patrie. »'
  '12':
  - type: text
    content: 'Puis Amatsia dit à Amos : Va-t’en, prophète, enfuis-toi au pays de Juda ! Là-bas tu pourras gagner ton pain en prophétisant. '
  '13':
  - type: text
    content: Mais ne recommence pas à prophétiser à Béthel, car ici, c’est un sanctuaire du roi, c’est un temple du royaume.
  '14':
  - type: text
    content: 'Amos répondit à Amatsia : Je ne suis pas un prophète de métier et je ne suis pas un disciple de prophètes. Je gagne ma vie en gardant des bœufs et en incisant les fruits des sycomores. '
  '15':
  - type: text
    content: 'Mais l’Eternel m’a pris de derrière le troupeau et il m’a dit : « Va prophétiser à Israël, mon peuple. » '
  '16':
  - type: text
    content: 'Maintenant, écoute ce que te dit l’Eternel : Tu me dis de ne plus prophétiser contre Israël, et de ne plus débiter des paroles'
  - type: note
    content: Voir Mi 2.6.
  - type: text
    content: ' contre les descendants d’Isaac. '
  '17':
  - type: text
    content: 'C’est pourquoi l’Eternel te dit ceci :'
  - type: text
    content: Ta femme se prostituera ╵au milieu de la ville,
  - type: text
    content: tes fils, tes filles ╵tomberont par l’épée,
  - type: text
    content: tes champs seront partagés au cordeau.
  - type: text
    content: Toi-même tu mourras ╵sur une terre impure ;
  - type: text
    content: la population d’Israël ╵va être déportée
  - type: text
    content: bien loin de son pays.
  '2':
  - type: text
    content: 'Quand les criquets eurent fini de dévorer l’herbe des champs, je dis : O Seigneur, Eternel, accorde le pardon, de grâce ! Sinon, comment Jacob pourra-t-il subsister, lui qui est si petit ?'
  '3':
  - type: text
    content: 'L’Eternel y renonça : Cela ne sera pas, dit l’Eternel.'
  '4':
  - type: text
    content: 'Puis voici ce que me fit voir le Seigneur, l’Eternel. Le Seigneur, l’Eternel, fit appel au feu pour exercer un jugement, et le feu fit tarir les nappes souterraines et consuma le territoire. '
  '5':
  - type: text
    content: 'Je dis : O Seigneur, Eternel, arrête, je t’en prie ! Sinon, comment Jacob pourra-t-il subsister, lui qui est si petit ?'
  '6':
  - type: text
    content: 'Et l’Eternel y renonça : Cela non plus n’aura pas lieu, le Seigneur, l’Eternel, le déclare.'
  - type: heading
    content: L’étain
  '7':
  - type: text
    content: 'Puis voici ce qu’il me fit voir : le Seigneur se tenait sur un mur en étain et il tenait de l’étain dans sa main. '
  '8':
  - type: text
    content: 'L’Eternel me dit : Que vois-tu, Amos ?'
  - type: text
    content: 'Et je dis : De l’étain.'
  - type: text
    content: 'Et le Seigneur me dit : Je vais mettre l’étain au milieu d’Israël, mon peuple. Et désormais, je ne lui laisserai plus rien passer. '
  '9':
  - type: text
    content: Les hauts lieux d’Isaac seront détruits, les sanctuaires d’Israël seront rasés, j’interviendrai avec l’épée contre la dynastie de Jéroboam.
  - type: heading
    content: La réaction du prêtre de Béthel
