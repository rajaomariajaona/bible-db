document_id: AMO.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les visions d’Amos
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vision des sauterelles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Or voici ce que me fit voir le Seigneur, l’Eternel. Il y avait un essaim de criquets
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il produisait des criquets.
    marker-yv: yv-n
  - type: text
    text: ' au temps où le regain commençait à pousser. C’était après la coupe que l’on fait pour le roi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La première coupe appartenait au roi, celle du regain revenait au peuple. Amos signifie par là que tout le peuple est visé par cette menace.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand les criquets eurent fini de dévorer l’herbe des champs, je dis : O Seigneur, Eternel, accorde le pardon, de grâce ! Sinon, comment Jacob pourra-t-il subsister, lui qui est si petit ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Eternel y renonça : Cela ne sera pas, dit l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis voici ce que me fit voir le Seigneur, l’Eternel. Le Seigneur, l’Eternel, fit appel au feu pour exercer un jugement, et le feu fit tarir les nappes souterraines et consuma le territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je dis : O Seigneur, Eternel, arrête, je t’en prie ! Sinon, comment Jacob pourra-t-il subsister, lui qui est si petit ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et l’Eternel y renonça : Cela non plus n’aura pas lieu, le Seigneur, l’Eternel, le déclare.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’étain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis voici ce qu’il me fit voir : le Seigneur se tenait sur un mur en étain et il tenait de l’étain dans sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Eternel me dit : Que vois-tu, Amos ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et je dis : De l’étain.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et le Seigneur me dit : Je vais mettre l’étain au milieu d’Israël, mon peuple. Et désormais, je ne lui laisserai plus rien passer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les hauts lieux d’Isaac seront détruits, les sanctuaires d’Israël seront rasés, j’interviendrai avec l’épée contre la dynastie de Jéroboam.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La réaction du prêtre de Béthel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Amatsia, prêtre de Béthel, envoya un message à Jéroboam, roi d’Israël, pour lui dire : Amos conspire contre toi dans le royaume d’Israël, et le pays ne saurait tolérer plus longtemps tous ses discours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici, en effet, ce que déclare Amos : « Jéroboam mourra par l’épée, et Israël sera déporté loin de sa patrie. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis Amatsia dit à Amos : Va-t’en, prophète, enfuis-toi au pays de Juda ! Là-bas tu pourras gagner ton pain en prophétisant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais ne recommence pas à prophétiser à Béthel, car ici, c’est un sanctuaire du roi, c’est un temple du royaume.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amos répondit à Amatsia : Je ne suis pas un prophète de métier et je ne suis pas un disciple de prophètes. Je gagne ma vie en gardant des bœufs et en incisant les fruits des sycomores. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais l’Eternel m’a pris de derrière le troupeau et il m’a dit : « Va prophétiser à Israël, mon peuple. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, écoute ce que te dit l’Eternel : Tu me dis de ne plus prophétiser contre Israël, et de ne plus débiter des paroles'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 2.6
        metadata:
          usfm: MIC.2.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' contre les descendants d’Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est pourquoi l’Eternel te dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta femme se prostituera ╵au milieu de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes fils, tes filles ╵tomberont par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes champs seront partagés au cordeau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi-même tu mourras ╵sur une terre impure ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la population d’Israël ╵va être déportée
- type: usfm
  marker: q1
  children:
  - type: text
    text: bien loin de son pays.
