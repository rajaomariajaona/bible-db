document_id: GAL.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La preuve par l’Écriture
  - type: heading
    content: Par la Loi ou par la foi ?
  - type: text
    content: O Galates insensés ! Qui vous a envoûtés ainsi ? Pourtant, la mort de Jésus-Christ sur la croix a été clairement dépeinte à vos yeux.
  '10':
  - type: text
    content: 'En effet, ceux qui comptent sur leur obéissance à la Loi tombent sous le coup de la malédiction, car il est écrit : '
  - type: text
    content: Maudit soit l’homme qui n’obéit pas continuellement à tout ce qui est écrit dans le livre de la Loi
  - type: note
    content: Dt 27.26 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Il est d’ailleurs évident que personne ne sera déclaré juste devant Dieu grâce à son obéissance à la Loi, puisque l’Ecriture déclare : '
  - type: text
    content: Le juste vivra grâce à la foi
  - type: note
    content: 'Ha 2.4. D’autres comprennent : celui qui est juste par la foi, vivra.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'Or, le régime de la Loi ne fait pas dépendre de la foi la justice de l’homme devant Dieu. Au contraire, il obéit à cet autre principe : '
  - type: text
    content: Celui qui appliquera ces commandements vivra grâce à cela
  - type: note
    content: Lv 18.5.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Christ nous a libérés de la malédiction que la Loi faisait peser sur nous en prenant la malédiction sur lui, à notre place. Il est, en effet, écrit : '
  - type: text
    content: Maudit est quiconque est pendu au gibet
  - type: note
    content: Dt 21.23.
  - type: text
    content: .
  - type: text
    content: ' '
  '14':
  - type: text
    content: Jésus-Christ l’a fait pour que, grâce à lui, la bénédiction d’Abraham s’étende aux non-Juifs et que nous recevions, par la foi, l’Esprit que Dieu avait promis.
  - type: heading
    content: La Loi et la promesse
  '15':
  - type: text
    content: Mes frères et sœurs, prenons un exemple de la vie ordinaire. Lorsqu’un homme a rédigé son testament
  - type: note
    content: 'Jeu de mots : testament, mais aussi alliance.'
  - type: text
    content: ' en bonne et due forme, personne ne peut l’annuler ou y ajouter quoi que ce soit.'
  '16':
  - type: text
    content: 'Or, c’est à Abraham et à sa '
  - type: text
    content: descendance
  - type: text
    content: ' que Dieu a fait ses promesses'
  - type: note
    content: Gn 12.7.
  - type: text
    content: '. Il n’est pas dit : « et à ses descendances », comme s’il s’agissait de plusieurs lignées. '
  - type: text
    content: A ta descendance
  - type: text
    content: ' ne désigne qu’une seule descendance, et c’est Christ. '
  '17':
  - type: text
    content: 'Eh bien, je dis ceci : une alliance'
  - type: note
    content: Le même mot grec signifie à la fois alliance et testament.
  - type: text
    content: ' a été conclue par Dieu en bonne et due forme à la manière d’un testament ; la Loi est survenue quatre cent trente ans plus tard'
  - type: note
    content: Durée indiquée par l’Exode (Ex 12.40) pour le séjour des Israélites en Egypte.
  - type: text
    content: '  : elle ne peut donc pas annuler cette alliance et réduire par là même la promesse à néant.'
  '18':
  - type: text
    content: En effet, si l’héritage du salut dépend de l’accomplissement de la Loi, il ne repose plus sur la promesse. Or, c’est bien par une promesse que Dieu a accordé sa faveur à Abraham.
  '19':
  - type: text
    content: 'Mais alors, pourquoi la Loi ? Elle a été ajoutée pour mettre en évidence la désobéissance des hommes à l’ordre divin, et le régime qu’elle a instauré devait rester en vigueur jusqu’à la venue de la '
  - type: text
    content: descendance
  - type: text
    content: ' d’Abraham que la promesse concernait. Cette Loi a été promulguée par l’intermédiaire d’anges'
  - type: note
    content: Voir Ac 7.38, 53 ; Hé 2.2.
  - type: text
    content: ' et par le moyen d’un médiateur, Moïse. '
  '2':
  - type: text
    content: 'Je ne vous poserai qu’une seule question : A quel titre avez-vous reçu le Saint-Esprit ? Est-ce parce que vous avez accompli la Loi, ou parce que vous avez accueilli avec foi l’Evangile que vous avez entendu ? '
  '20':
  - type: text
    content: Or s’il y a eu un médiateur, c’est qu’il y avait plus d’une partie en cause. Mais pour la promesse, Dieu seul est en cause
  - type: note
    content: 'Autre traduction : or s’il y a eu un médiateur, il a été le représentant de plusieurs, mais Dieu est unique.'
  - type: text
    content: .
  '21':
  - type: text
    content: La Loi irait-elle donc à l’encontre des promesses divines ?
  - type: text
    content: Certainement pas ! Ah ! sans doute, si nous avions reçu une loi qui puisse procurer la vie aux hommes, alors nous pourrions obtenir d’être déclarés justes par Dieu sur la base de cette loi.
  '22':
  - type: text
    content: 'Mais voici le verdict de l’Ecriture : l’humanité entière se trouve prisonnière de sa culpabilité devant Dieu afin que le don promis par Dieu soit accordé aux croyants au moyen de leur foi en Jésus-Christ.'
  - type: heading
    content: La foi et l’héritage des biens promis
  '23':
  - type: text
    content: 'Avant que soit instauré le régime de la foi, nous étions emprisonnés par la Loi et sous sa surveillance, dans l’attente du régime de la foi qui devait être révélée. '
  '24':
  - type: text
    content: Ainsi, la Loi a été comme un gardien
  - type: note
    content: Un pédagogue. En Grèce, le pédagogue était soit un précepteur, soit l’esclave chargé de surveiller les enfants et de les mener à l’école (comparer 1 Co 4.15). Tel a été le rôle de la Loi.
  - type: text
    content: ' chargé de nous conduire à Christ pour que nous soyons déclarés justes devant Dieu par la foi. '
  '25':
  - type: text
    content: Mais depuis que le régime de la foi a été instauré, nous ne sommes plus soumis à ce gardien.
  '26':
  - type: text
    content: 'Car, par la foi en Jésus-Christ, vous êtes tous fils et filles de Dieu. '
  '27':
  - type: text
    content: Car vous tous qui avez été baptisés pour Christ
  - type: note
    content: Voir note Rm 6.3.
  - type: text
    content: ', vous vous êtes revêtus de Christ. '
  '28':
  - type: text
    content: Il n’y a plus ni Juifs ni non-Juifs, il n’y a plus ni esclave ni homme libre, il n’y a plus ni homme ni femme
  - type: note
    content: Paul fait peut-être allusion à Gn 1.27 où il est question de la création de l’être humain, homme et femme.
  - type: text
    content: '. Unis à Jésus-Christ, vous êtes tous un. '
  '29':
  - type: text
    content: Si vous lui appartenez, vous êtes la descendance d’Abraham et donc, aussi, les héritiers des biens que Dieu a promis à Abraham.
  '3':
  - type: text
    content: Manquez-vous à ce point d’intelligence ? Après avoir commencé par l’Esprit de Dieu, est-ce en comptant sur les ressources de l’homme livré à lui-même que vous allez parvenir à la perfection
  - type: note
    content: 'Autre traduction : est-ce en vous remettant à des rites extérieurs que vous allez finir maintenant ?'
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: Avez-vous fait tant d’expériences pour rien
  - type: note
    content: 'Autre traduction : avez-vous tant souffert pour rien ? Il s’agirait alors des persécutions endurées par les Galates.'
  - type: text
    content: '  ? Si encore, c’était pour rien !'
  '5':
  - type: text
    content: 'Voyons ! Lorsque Dieu vous donne son Esprit et qu’il accomplit parmi vous des miracles, le fait-il parce que vous obéissez à la Loi ou parce que vous accueillez avec foi l’Evangile que vous avez entendu, '
  '6':
  - type: text
    content: 'à la manière d’Abraham dont l’Ecriture déclare : '
  - type: text
    content: Il a eu confiance en Dieu et Dieu, en portant sa foi à son crédit, l’a déclaré juste
  - type: note
    content: Gn 15.6.
  - type: text
    content: '  ?'
  - type: heading
    content: Les Juifs et les non-Juifs, enfants d’Abraham par la foi
  '7':
  - type: text
    content: 'Comprenez-le donc : seuls ceux qui placent leur confiance en Dieu sont les fils et les filles d’Abraham.'
  '8':
  - type: text
    content: 'En fait, l’Ecriture prévoyait que Dieu déclarerait les non-Juifs justes s’ils avaient la foi. C’est pourquoi elle a annoncé par avance cette bonne nouvelle à Abraham : '
  - type: text
    content: Tu seras une source de bénédictions pour tous les peuples
  - type: note
    content: Gn 12.3.
  - type: text
    content: .
  - type: text
    content: ' '
  '9':
  - type: text
    content: Ainsi, tous ceux qui font confiance à Dieu, comme Abraham lui a fait confiance, ont part à la bénédiction avec lui.
