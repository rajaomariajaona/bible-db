document_id: GAL.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La preuve par l’Écriture
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Par la Loi ou par la foi ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: O Galates insensés ! Qui vous a envoûtés ainsi ? Pourtant, la mort de Jésus-Christ sur la croix a été clairement dépeinte à vos yeux.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, ceux qui comptent sur leur obéissance à la Loi tombent sous le coup de la malédiction, car il est écrit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Maudit soit l’homme qui n’obéit pas continuellement à tout ce qui est écrit dans le livre de la Loi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 27.26
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est d’ailleurs évident que personne ne sera déclaré juste devant Dieu grâce à son obéissance à la Loi, puisque l’Ecriture déclare : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le juste vivra grâce à la foi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ha 2.4
        - type: text
          text: '. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui est juste par la foi, vivra.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, le régime de la Loi ne fait pas dépendre de la foi la justice de l’homme devant Dieu. Au contraire, il obéit à cet autre principe : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui appliquera ces commandements vivra grâce à cela
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 18.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Christ nous a libérés de la malédiction que la Loi faisait peser sur nous en prenant la malédiction sur lui, à notre place. Il est, en effet, écrit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Maudit est quiconque est pendu au gibet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 21.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus-Christ l’a fait pour que, grâce à lui, la bénédiction d’Abraham s’étende aux non-Juifs et que nous recevions, par la foi, l’Esprit que Dieu avait promis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Loi et la promesse
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mes frères et sœurs, prenons un exemple de la vie ordinaire. Lorsqu’un homme a rédigé son testament
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jeu de mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'testament, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mais aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: alliance.
      marker-yv: yv-n
    - type: text
      text: ' en bonne et due forme, personne ne peut l’annuler ou y ajouter quoi que ce soit.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, c’est à Abraham et à sa '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: descendance
    - type: text
      text: ' que Dieu a fait ses promesses'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 12.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Il n’est pas dit : « et à ses descendances », comme s’il s’agissait de plusieurs lignées. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: A ta descendance
    - type: text
      text: ' ne désigne qu’une seule descendance, et c’est Christ. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eh bien, je dis ceci : une alliance'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le même mot grec signifie à la fois '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'alliance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: testament.
      marker-yv: yv-n
    - type: text
      text: ' a été conclue par Dieu en bonne et due forme à la manière d’un testament ; la Loi est survenue quatre cent trente ans plus tard'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Durée indiquée par l’Exode (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 12.40
        - type: text
          text: ) pour le séjour des Israélites en Egypte.
      marker-yv: yv-n
    - type: text
      text: '  : elle ne peut donc pas annuler cette alliance et réduire par là même la promesse à néant.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, si l’héritage du salut dépend de l’accomplissement de la Loi, il ne repose plus sur la promesse. Or, c’est bien par une promesse que Dieu a accordé sa faveur à Abraham.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais alors, pourquoi la Loi ? Elle a été ajoutée pour mettre en évidence la désobéissance des hommes à l’ordre divin, et le régime qu’elle a instauré devait rester en vigueur jusqu’à la venue de la '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: descendance
    - type: text
      text: ' d’Abraham que la promesse concernait. Cette Loi a été promulguée par l’intermédiaire d’anges'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ac 7.38, 53 ; Hé 2.2.
      marker-yv: yv-n
    - type: text
      text: ' et par le moyen d’un médiateur, Moïse. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne vous poserai qu’une seule question : A quel titre avez-vous reçu le Saint-Esprit ? Est-ce parce que vous avez accompli la Loi, ou parce que vous avez accueilli avec foi l’Evangile que vous avez entendu ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or s’il y a eu un médiateur, c’est qu’il y avait plus d’une partie en cause. Mais pour la promesse, Dieu seul est en cause
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: or s’il y a eu un médiateur, il a été le représentant de plusieurs, mais Dieu est unique.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La Loi irait-elle donc à l’encontre des promesses divines ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certainement pas ! Ah ! sans doute, si nous avions reçu une loi qui puisse procurer la vie aux hommes, alors nous pourrions obtenir d’être déclarés justes par Dieu sur la base de cette loi.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici le verdict de l’Ecriture : l’humanité entière se trouve prisonnière de sa culpabilité devant Dieu afin que le don promis par Dieu soit accordé aux croyants au moyen de leur foi en Jésus-Christ.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La foi et l’héritage des biens promis
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que soit instauré le régime de la foi, nous étions emprisonnés par la Loi et sous sa surveillance, dans l’attente du régime de la foi qui devait être révélée. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, la Loi a été comme un gardien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pédagogue. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En Grèce, le pédagogue était soit un précepteur, soit l’esclave chargé de surveiller les enfants et de les mener à l’école (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 4.15
        - type: text
          text: ). Tel a été le rôle de la Loi.
      marker-yv: yv-n
    - type: text
      text: ' chargé de nous conduire à Christ pour que nous soyons déclarés justes devant Dieu par la foi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais depuis que le régime de la foi a été instauré, nous ne sommes plus soumis à ce gardien.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, par la foi en Jésus-Christ, vous êtes tous fils et filles de Dieu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car vous tous qui avez été baptisés pour Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 6.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', vous vous êtes revêtus de Christ. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y a plus ni Juifs ni non-Juifs, il n’y a plus ni esclave ni homme libre, il n’y a plus ni homme ni femme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul fait peut-être allusion à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 1.27
        - type: text
          text: ' où il est question de la création de l’être humain, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: homme et femme.
      marker-yv: yv-n
    - type: text
      text: '. Unis à Jésus-Christ, vous êtes tous un. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous lui appartenez, vous êtes la descendance d’Abraham et donc, aussi, les héritiers des biens que Dieu a promis à Abraham.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manquez-vous à ce point d’intelligence ? Après avoir commencé par l’Esprit de Dieu, est-ce en comptant sur les ressources de l’homme livré à lui-même que vous allez parvenir à la perfection
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est-ce en vous remettant à des rites extérieurs que vous allez finir maintenant ?
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avez-vous fait tant d’expériences pour rien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avez-vous tant souffert pour rien ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agirait alors des persécutions endurées par les Galates.
      marker-yv: yv-n
    - type: text
      text: '  ? Si encore, c’était pour rien !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyons ! Lorsque Dieu vous donne son Esprit et qu’il accomplit parmi vous des miracles, le fait-il parce que vous obéissez à la Loi ou parce que vous accueillez avec foi l’Evangile que vous avez entendu, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à la manière d’Abraham dont l’Ecriture déclare : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il a eu confiance en Dieu et Dieu, en portant sa foi à son crédit, l’a déclaré juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 15.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Juifs et les non-Juifs, enfants d’Abraham par la foi
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comprenez-le donc : seuls ceux qui placent leur confiance en Dieu sont les fils et les filles d’Abraham.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En fait, l’Ecriture prévoyait que Dieu déclarerait les non-Juifs justes s’ils avaient la foi. C’est pourquoi elle a annoncé par avance cette bonne nouvelle à Abraham : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu seras une source de bénédictions pour tous les peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 12.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, tous ceux qui font confiance à Dieu, comme Abraham lui a fait confiance, ont part à la bénédiction avec lui.
