document_id: ZEC.4
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le chandelier et les deux oliviers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’ange qui me parlait revint et me réveilla comme un homme que l’on tire de son sommeil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-3, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 11.3-4
        metadata:
          usfm: REV.11.3+REV.11.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il me demanda : Que vois-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je répondis : Je vois un chandelier tout en or muni, à la partie supérieure, d’un réservoir. Il est surmonté de sept lampes et il y a sept conduits pour les lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Deux oliviers surplombent ce chandelier, l’un à la droite du réservoir, et l’autre à sa gauche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le v. 14 indique que ces deux oliviers sont les deux hommes consacrés par l’onction, Josué et Zorobabel, représentants de l’office sacerdotal et de l’office royal (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.13'
        metadata:
          usfm: ZEC.6.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Reprenant la parole, je questionnai l’ange qui s’entretenait avec moi : Que signifient ces choses, mon Seigneur ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il me dit : Ne sais-tu pas ce que cela représente ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Non, mon Seigneur, lui répondis-je.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il reprit et me dit : Voici le message que l’Eternel adresse à Zorobabel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lointain descendant de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 3.17-19
        metadata:
          usfm: 1CH.3.17+1CH.3.18+1CH.3.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette œuvre, vous ne l’accomplirez ╵ni par votre bravoure ╵ni par la force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais par mon Esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur des armées célestes le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et qu’es-tu, toi, grande montagne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sans doute la montagne des décombres qui occupaient l’emplacement du Temple et qu’il fallait d’abord déblayer pour reconstruire le sanctuaire sur les anciennes fondations. Elle figure l’ensemble des obstacles à la reconstruction du Temple.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant Zorobabel, ╵tu seras transformée en plaine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il extraira de toi ╵la pierre principale
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'au milieu des acclamations : ╵« Dieu fasse grâce ! ╵Dieu fasse grâce pour elle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans le Proche-Orient ancien, le roi prenait une pierre des ruines d’un ancien sanctuaire pour en faire la pierre d’angle d’un nouveau sanctuaire, au cours d’une cérémonie populaire.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Eternel m’adressa encore la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Zorobabel a posé de ses mains les fondations de ce temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 537-536 av. J.-C. (Esd 3.8-11 ; 5.16).
    marker-yv: yv-n
  - type: text
    text: ' et il en achèvera lui-même la reconstruction'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 516 av. J.-C. (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 6.14-16
        metadata:
          usfm: EZR.6.14+EZR.6.15+EZR.6.16
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Alors vous saurez que le Seigneur des armées célestes m’a envoyé vers vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui donc méprisait le temps des petits commencements ? Ils auraient plutôt dû se réjouir en voyant la pierre choisie dans la main de Zorobabel. Quant à ces sept, ce sont les yeux de l’Eternel qui parcourent toute la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je repris alors et je lui demandai : Que représentent ces deux oliviers à la droite et à la gauche du chandelier ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis je repris une seconde fois la parole et je lui demandai : Que représentent ces deux branches d’olivier qui se trouvent à côté des deux conduits en or d’où découle l’huile dorée ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il me répondit en disant : Ne sais-tu pas ce qu’ils représentent ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Non, mon Seigneur, lui répondis-je.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors il m’expliqua : Ce sont les deux hommes qui ont reçu l’onction et qui se tiennent au service du Seigneur de toute la terre.'
