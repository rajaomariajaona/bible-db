document_id: ZEC.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chandelier et les deux oliviers
  - type: text
    content: L’ange qui me parlait revint et me réveilla comme un homme que l’on tire de son sommeil
  - type: note
    content: Pour les v. 1-3, voir Ap 11.3-4.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Qui donc méprisait le temps des petits commencements ? Ils auraient plutôt dû se réjouir en voyant la pierre choisie dans la main de Zorobabel. Quant à ces sept, ce sont les yeux de l’Eternel qui parcourent toute la terre.
  '11':
  - type: text
    content: 'Je repris alors et je lui demandai : Que représentent ces deux oliviers à la droite et à la gauche du chandelier ?'
  '12':
  - type: text
    content: 'Puis je repris une seconde fois la parole et je lui demandai : Que représentent ces deux branches d’olivier qui se trouvent à côté des deux conduits en or d’où découle l’huile dorée ?'
  '13':
  - type: text
    content: 'Il me répondit en disant : Ne sais-tu pas ce qu’ils représentent ?'
  - type: text
    content: – Non, mon Seigneur, lui répondis-je.
  '14':
  - type: text
    content: 'Alors il m’expliqua : Ce sont les deux hommes qui ont reçu l’onction et qui se tiennent au service du Seigneur de toute la terre.'
  '2':
  - type: text
    content: 'Il me demanda : Que vois-tu ?'
  - type: text
    content: 'Je répondis : Je vois un chandelier tout en or muni, à la partie supérieure, d’un réservoir. Il est surmonté de sept lampes et il y a sept conduits pour les lampes. '
  '3':
  - type: text
    content: Deux oliviers surplombent ce chandelier, l’un à la droite du réservoir, et l’autre à sa gauche
  - type: note
    content: Le v. 14 indique que ces deux oliviers sont les deux hommes consacrés par l’onction, Josué et Zorobabel, représentants de l’office sacerdotal et de l’office royal (voir 6.13).
  - type: text
    content: .
  '4':
  - type: text
    content: 'Reprenant la parole, je questionnai l’ange qui s’entretenait avec moi : Que signifient ces choses, mon Seigneur ?'
  '5':
  - type: text
    content: 'Il me dit : Ne sais-tu pas ce que cela représente ?'
  - type: text
    content: – Non, mon Seigneur, lui répondis-je.
  '6':
  - type: text
    content: 'Il reprit et me dit : Voici le message que l’Eternel adresse à Zorobabel'
  - type: note
    content: Lointain descendant de David (1 Ch 3.17-19).
  - type: text
    content: '  :'
  - type: text
    content: Cette œuvre, vous ne l’accomplirez ╵ni par votre bravoure ╵ni par la force,
  - type: text
    content: mais par mon Esprit,
  - type: text
    content: le Seigneur des armées célestes le déclare.
  '7':
  - type: text
    content: Et qu’es-tu, toi, grande montagne
  - type: note
    content: Sans doute la montagne des décombres qui occupaient l’emplacement du Temple et qu’il fallait d’abord déblayer pour reconstruire le sanctuaire sur les anciennes fondations. Elle figure l’ensemble des obstacles à la reconstruction du Temple.
  - type: text
    content: '  ?'
  - type: text
    content: Devant Zorobabel, ╵tu seras transformée en plaine.
  - type: text
    content: Il extraira de toi ╵la pierre principale
  - type: text
    content: 'au milieu des acclamations : ╵« Dieu fasse grâce ! ╵Dieu fasse grâce pour elle'
  - type: note
    content: Dans le Proche-Orient ancien, le roi prenait une pierre des ruines d’un ancien sanctuaire pour en faire la pierre d’angle d’un nouveau sanctuaire, au cours d’une cérémonie populaire.
  - type: text
    content: '  ! »'
  '8':
  - type: text
    content: 'L’Eternel m’adressa encore la parole en ces termes :'
  '9':
  - type: text
    content: Zorobabel a posé de ses mains les fondations de ce temple
  - type: note
    content: En 537-536 av. J.-C. (Esd 3.8-11 ; 5.16).
  - type: text
    content: ' et il en achèvera lui-même la reconstruction'
  - type: note
    content: En 516 av. J.-C. (Esd 6.14-16).
  - type: text
    content: '. Alors vous saurez que le Seigneur des armées célestes m’a envoyé vers vous. '
