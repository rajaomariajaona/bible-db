document_id: ISA.66,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le nouveau peuple de Dieu
  - type: heading
    content: Pour un vrai culte
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: Mon trône, c’est le ciel,
  - type: text
    content: et mon marchepied, c’est la terre
  - type: note
    content: Allusion en Mt 5.34-35 ; 23.22.
  - type: text
    content: .
  - type: text
    content: Quelle est donc la maison ╵que vous me bâtiriez,
  - type: text
    content: quelle demeure ╵pour mon lieu de repos ?
  '10':
  - type: text
    content: Réjouissez-vous ╵avec Jérusalem,
  - type: text
    content: et soyez tous dans l’allégresse ╵à son sujet,
  - type: text
    content: vous qui l’aimez !
  - type: text
    content: Prenez part à sa joie,
  - type: text
    content: vous tous qui avez pris ╵le deuil à cause d’elle !
  '11':
  - type: text
    content: Car vous serez nourris ╵à son sein qui console
  - type: text
    content: jusqu’à en être rassasiés,
  - type: text
    content: et vous boirez, avec délices,
  - type: text
    content: la plénitude de sa gloire !
  '12':
  - type: text
    content: 'Car ainsi parle l’Eternel :'
  - type: text
    content: Je vais faire affluer la paix ╵vers elle comme un fleuve,
  - type: text
    content: la gloire des nations ╵tout comme un torrent qui déborde.
  - type: text
    content: Vous serez allaités,
  - type: text
    content: et portés sur la hanche,
  - type: text
    content: bercés sur les genoux.
  '13':
  - type: text
    content: Comme un homme que sa mère console,
  - type: text
    content: je vous consolerai.
  - type: text
    content: Oui, dans Jérusalem, ╵vous serez consolés.
  '14':
  - type: text
    content: Vous en serez témoins ╵et votre cœur se réjouira,
  - type: text
    content: votre corps reprendra vigueur ╵tout comme une herbe qui verdit.
  - type: heading
    content: Le jugement de Dieu
  - type: text
    content: On verra l’Eternel intervenir ╵en faveur de ses serviteurs,
  - type: text
    content: et manifester son indignation ╵contre ses ennemis.
  '15':
  - type: text
    content: Car l’Eternel
  - type: text
    content: va venir dans le feu
  - type: text
    content: et ses chars surviendront ╵comme un vent d’ouragan
  - type: text
    content: pour verser sa colère ╵avec fureur
  - type: text
    content: et pour accomplir ses menaces ╵avec d’ardentes flammes.
  '16':
  - type: text
    content: Car, c’est avec le feu ╵que l’Eternel ╵exercera son jugement
  - type: text
    content: et avec son épée ╵qu’il châtiera tous les humains,
  - type: text
    content: et l’Eternel fera ╵un très grand nombre de victimes.
  '17':
  - type: text
    content: Ceux qui se préparent et qui se purifient pour accéder aux jardins sacrés
  - type: note
    content: Allusion à des cérémonies païennes pour lesquelles les participants se préparent par divers rites de purification (voir 65.3, 5).
  - type: text
    content: ' suivant en procession celui qui se tient au milieu, et qui mangent du porc, des animaux immondes et même des souris, ceux-là périront tous ensemble, l’Eternel le déclare. '
  '18':
  - type: text
    content: Car moi, je [connais bien
  - type: note
    content: Les mots entre crochets manquent dans l’hébreu. Le texte semble corrompu car il manque le verbe.
  - type: text
    content: '] leurs desseins et leurs actes.'
  - type: heading
    content: Tous les peuples honoreront l’Eternel
  - type: text
    content: Voici, je vais venir
  - type: note
    content: D’après l’ancienne version grecque, la version syriaque et la Vulgate. Le texte hébreu traditionnel est obscur.
  - type: text
    content: ' rassembler tous les peuples et des gens de toutes langues. Ils viendront et verront ma gloire. '
  '19':
  - type: text
    content: Je placerai un signe au milieu d’eux et j’enverrai certains de leurs rescapés
  - type: note
    content: 'D’autres comprennent : des rescapés de mon peuple.'
  - type: text
    content: ' vers d’autres peuples, à Tarsis, Poul et Loud'
  - type: note
    content: 'Tarsis: l’Espagne. Poul et Loud sont deux peuples de l’Afrique (Somalie et Libye).'
  - type: text
    content: ', dont les gens bandent l’arc, à Toubal, à Yavân'
  - type: note
    content: 'Toubal: peuple d’Asie Mineure au sud-est de la mer Noire. Yavân: la Grèce et ses îles.'
  - type: text
    content: '  ; vers les îles et les régions côtières qui sont au loin, qui n’ont pas encore entendu parler de moi et n’ont pas vu ma gloire. Ils feront connaître ma gloire à ces peuples. '
  '2':
  - type: text
    content: Toutes ces choses, ╵c’est moi qui les ai faites
  - type: note
    content: Les v. 1-2 sont cités en Ac 7.49-50.
  - type: text
    content: et ainsi elles sont venues ╵à l’existence,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: 'Voici sur qui je porterai ╵un regard favorable :'
  - type: text
    content: sur celui qui est humilié, ╵et qui a l’esprit abattu,
  - type: text
    content: sur celui qui tremble à ma parole.
  '20':
  - type: text
    content: 'Et ils ramèneront, de chez tous les peuples, tous ceux qui sont vos frères sur des chevaux, des chars ou des chariots couverts, sur le dos des mulets ou sur des dromadaires jusqu’à Jérusalem, à ma montagne sainte, comme une offrande à l’Eternel : ce sera une offrande, dit l’Eternel, semblable à celles qu’apportent les Israélites, dans des récipients purifiés, au temple de l’Eternel. '
  '21':
  - type: text
    content: Et même, parmi eux, j’en prendrai certains pour être des prêtres ou des lévites, dit l’Eternel.
  '22':
  - type: text
    content: Comme le nouveau ciel et la nouvelle terre
  - type: note
    content: Voir Es 65.17 ; 2 P 3.13 ; Ap 21.1.
  - type: text
    content: ' que je vais faire subsisteront par-devant moi, l’Eternel le déclare, ainsi subsisteront votre postérité et votre nom. '
  '23':
  - type: text
    content: 'Il adviendra alors que, régulièrement, à chaque nouvelle lune et à chaque sabbat, tous les humains viendront se prosterner devant moi, déclare l’Eternel. '
  '24':
  - type: text
    content: Et quand ils sortiront, ils verront les cadavres des hommes qui se sont révoltés contre moi ; et le ver qui rongera ces hommes ne mourra pas, le feu qui les dévorera ne s’éteindra jamais
  - type: note
    content: Allusion en Mc 9.48.
  - type: text
    content: ', et ils feront horreur à tout être vivant.'
  '3':
  - type: text
    content: Celui qui sacrifie un bœuf,
  - type: text
    content: tue aussi bien un homme ;
  - type: text
    content: celui qui immole un agneau,
  - type: text
    content: rompt la nuque à un chien ;
  - type: text
    content: celui qui présente une offrande
  - type: text
    content: offre du sang de porc ;
  - type: text
    content: et celui qui fait brûler de l’encens,
  - type: text
    content: c’est une idole qu’il bénit.
  - type: text
    content: Comme ils ont tous choisi ╵de suivre leurs propres chemins
  - type: text
    content: et qu’ils prennent plaisir ╵à leurs idoles ╵abominables,
  '4':
  - type: text
    content: je choisis moi aussi ╵de les abandonner ╵à leurs caprices,
  - type: text
    content: et je les frapperai ╵des malheurs qu’ils redoutent,
  - type: text
    content: puisque j’ai appelé
  - type: text
    content: et que personne ╵n’a répondu,
  - type: text
    content: oui, puisque j’ai parlé
  - type: text
    content: et que personne ╵n’a écouté,
  - type: text
    content: puisqu’ils ont fait ╵ce que je trouve mal,
  - type: text
    content: et qu’ils se sont complu ╵à ce qui me déplaît.
  '5':
  - type: text
    content: Ecoutez la parole ╵de l’Eternel,
  - type: text
    content: 'vous qui tremblez à sa parole :'
  - type: text
    content: Voici, ceux de vos frères
  - type: text
    content: qui vous haïssent ╵et vous ont rejetés
  - type: text
    content: à cause de mon nom
  - type: text
    content: 'ont dit : « Que l’Eternel ╵manifeste sa gloire'
  - type: text
    content: afin que nous soyons ╵témoins de votre joie ! »
  - type: text
    content: Mais ils perdront la face !
  '6':
  - type: text
    content: Ecoutez ce tumulte ╵s’élevant de la ville,
  - type: text
    content: 'cette clameur ╵venant du Temple :'
  - type: text
    content: il s’agit de la voix de l’Eternel
  - type: text
    content: qui fait payer ses ennemis ╵comme ils l’ont mérité.
  - type: heading
    content: Jérusalem rétablie
  '7':
  - type: text
    content: Avant d’être en travail,
  - type: text
    content: 'Sion a enfanté :'
  - type: text
    content: avant d’éprouver des douleurs,
  - type: text
    content: elle a donné le jour ╵à un garçon.
  '8':
  - type: text
    content: Qui donc a entendu ╵pareille chose,
  - type: text
    content: et qui a déjà vu ╵chose semblable ?
  - type: text
    content: Un pays peut-il naître ╵en un seul jour ?
  - type: text
    content: Ou peut-on enfanter ╵un peuple en une seule fois ?
  - type: text
    content: Or, à peine en travail ╵Sion a mis des fils au monde !
  '9':
  - type: text
    content: Eh quoi ! Déclencherais-je ╵le travail de la femme enceinte
  - type: text
    content: sans la faire enfanter ?
  - type: text
    content: dit l’Eternel.
  - type: text
    content: Moi qui fais enfanter,
  - type: text
    content: empêcherais-je ╵cette venue au monde ?
  - type: text
    content: a dit ton Dieu.
