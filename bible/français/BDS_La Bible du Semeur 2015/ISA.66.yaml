document_id: ISA.66,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le nouveau peuple de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pour un vrai culte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon trône, c’est le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon marchepied, c’est la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion en Mt 5.34-35 ; 23.22.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est donc la maison ╵que vous me bâtiriez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quelle demeure ╵pour mon lieu de repos ?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouissez-vous ╵avec Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et soyez tous dans l’allégresse ╵à son sujet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui l’aimez !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez part à sa joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui avez pris ╵le deuil à cause d’elle !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vous serez nourris ╵à son sein qui console
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à en être rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous boirez, avec délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la plénitude de sa gloire !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire affluer la paix ╵vers elle comme un fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la gloire des nations ╵tout comme un torrent qui déborde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez allaités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et portés sur la hanche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bercés sur les genoux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un homme que sa mère console,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous consolerai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, dans Jérusalem, ╵vous serez consolés.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous en serez témoins ╵et votre cœur se réjouira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: votre corps reprendra vigueur ╵tout comme une herbe qui verdit.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jugement de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On verra l’Eternel intervenir ╵en faveur de ses serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et manifester son indignation ╵contre ses ennemis.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: va venir dans le feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses chars surviendront ╵comme un vent d’ouragan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour verser sa colère ╵avec fureur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour accomplir ses menaces ╵avec d’ardentes flammes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, c’est avec le feu ╵que l’Eternel ╵exercera son jugement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec son épée ╵qu’il châtiera tous les humains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’Eternel fera ╵un très grand nombre de victimes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qui se préparent et qui se purifient pour accéder aux jardins sacrés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion à des cérémonies païennes pour lesquelles les participants se préparent par divers rites de purification (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '65.3'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' suivant en procession celui qui se tient au milieu, et qui mangent du porc, des animaux immondes et même des souris, ceux-là périront tous ensemble, l’Eternel le déclare. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car moi, je [connais bien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les mots entre crochets manquent dans l’hébreu. Le texte semble corrompu car il manque le verbe.
      marker-yv: yv-n
    - type: text
      text: '] leurs desseins et leurs actes.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Tous les peuples honoreront l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici, je vais venir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après l’ancienne version grecque, la version syriaque et la Vulgate. Le texte hébreu traditionnel est obscur.
      marker-yv: yv-n
    - type: text
      text: ' rassembler tous les peuples et des gens de toutes langues. Ils viendront et verront ma gloire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je placerai un signe au milieu d’eux et j’enverrai certains de leurs rescapés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des rescapés de mon peuple.
      marker-yv: yv-n
    - type: text
      text: ' vers d’autres peuples, à Tarsis, Poul et Loud'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tarsis
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’Espagne. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Poul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Loud '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont deux peuples de l’Afrique (Somalie et Libye).
      marker-yv: yv-n
    - type: text
      text: ', dont les gens bandent l’arc, à Toubal, à Yavân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Toubal
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peuple d’Asie Mineure au sud-est de la mer Noire. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yavân
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la Grèce et ses îles.
      marker-yv: yv-n
    - type: text
      text: '  ; vers les îles et les régions côtières qui sont au loin, qui n’ont pas encore entendu parler de moi et n’ont pas vu ma gloire. Ils feront connaître ma gloire à ces peuples. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes ces choses, ╵c’est moi qui les ai faites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 1-2 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.49-50
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ainsi elles sont venues ╵à l’existence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici sur qui je porterai ╵un regard favorable :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur celui qui est humilié, ╵et qui a l’esprit abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur celui qui tremble à ma parole.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils ramèneront, de chez tous les peuples, tous ceux qui sont vos frères sur des chevaux, des chars ou des chariots couverts, sur le dos des mulets ou sur des dromadaires jusqu’à Jérusalem, à ma montagne sainte, comme une offrande à l’Eternel : ce sera une offrande, dit l’Eternel, semblable à celles qu’apportent les Israélites, dans des récipients purifiés, au temple de l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et même, parmi eux, j’en prendrai certains pour être des prêtres ou des lévites, dit l’Eternel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme le nouveau ciel et la nouvelle terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 65.17 ; 2 P 3.13 ; Ap 21.1.
      marker-yv: yv-n
    - type: text
      text: ' que je vais faire subsisteront par-devant moi, l’Eternel le déclare, ainsi subsisteront votre postérité et votre nom. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il adviendra alors que, régulièrement, à chaque nouvelle lune et à chaque sabbat, tous les humains viendront se prosterner devant moi, déclare l’Eternel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et quand ils sortiront, ils verront les cadavres des hommes qui se sont révoltés contre moi ; et le ver qui rongera ces hommes ne mourra pas, le feu qui les dévorera ne s’éteindra jamais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '66.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 9.48
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et ils feront horreur à tout être vivant.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui sacrifie un bœuf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tue aussi bien un homme ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui immole un agneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rompt la nuque à un chien ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui présente une offrande
  - type: usfm
    marker: q1
    children:
    - type: text
      text: offre du sang de porc ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui fait brûler de l’encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est une idole qu’il bénit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ils ont tous choisi ╵de suivre leurs propres chemins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils prennent plaisir ╵à leurs idoles ╵abominables,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je choisis moi aussi ╵de les abandonner ╵à leurs caprices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les frapperai ╵des malheurs qu’ils redoutent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque j’ai appelé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que personne ╵n’a répondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, puisque j’ai parlé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que personne ╵n’a écouté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisqu’ils ont fait ╵ce que je trouve mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils se sont complu ╵à ce qui me déplaît.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez la parole ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vous qui tremblez à sa parole :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, ceux de vos frères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous haïssent ╵et vous ont rejetés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de mon nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ont dit : « Que l’Eternel ╵manifeste sa gloire'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que nous soyons ╵témoins de votre joie ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils perdront la face !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez ce tumulte ╵s’élevant de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'cette clameur ╵venant du Temple :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’agit de la voix de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fait payer ses ennemis ╵comme ils l’ont mérité.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jérusalem rétablie
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant d’être en travail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sion a enfanté :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant d’éprouver des douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a donné le jour ╵à un garçon.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc a entendu ╵pareille chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a déjà vu ╵chose semblable ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un pays peut-il naître ╵en un seul jour ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou peut-on enfanter ╵un peuple en une seule fois ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, à peine en travail ╵Sion a mis des fils au monde !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh quoi ! Déclencherais-je ╵le travail de la femme enceinte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans la faire enfanter ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi qui fais enfanter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: empêcherais-je ╵cette venue au monde ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a dit ton Dieu.
