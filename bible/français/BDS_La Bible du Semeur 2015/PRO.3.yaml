document_id: PRO.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La confiance en l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, n’oublie pas l’éducation que je t’ai donnée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ton cœur retienne mes préceptes,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tes greniers regorgeront de nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes cuves déborderont de vin.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, si l’Eternel te corrige, n’en fais pas fi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’il te reprend, ne t’impatiente pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 11-12 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 12.5-6
        - type: text
          text: '  ; voir Jb 5.17 ; 1 Co 11.32.'
      marker-yv: yv-n
    - type: text
      text: ','
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est celui qu’il aime que l’Eternel reprend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: agissant avec lui comme un père avec l’enfant qu’il chérit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un trésor sans prix
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l’homme qui a trouvé la sagesse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui qui acquiert l’intelligence !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acquérir la sagesse vaut mieux que gagner beaucoup d’argent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les avantages qu’elle donne sont plus précieux que l’or le plus fin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a plus de prix que les perles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aucun trésor que tu pourrais désirer n’égale sa valeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.4'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse t’offre, dans sa main droite, une longue vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans sa main gauche, la richesse et la considération.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voies dans lesquelles elle conduit sont agréables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ses chemins convergent vers le bonheur.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse est un arbre de vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 11.30 ; Gn 2.9.
      marker-yv: yv-n
    - type: text
      text: ' pour ceux qui s’attachent à elle,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui savent la garder sont heureux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 4.10, 13 ; 9.11 ; 13.14 ; Ec 7.12.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est avec la sagesse que l’Eternel a fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec l’intelligence qu’il a disposé le ciel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils rallongeront tes jours et ajouteront des années à la durée de ta vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et t’assureront le bonheur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par sa science, il a fait jaillir l’eau des sources
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ordonné aux nuages de répandre la rosée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, garde les yeux fixés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la sagesse et la réflexion, retiens-les,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elles t’apporteront la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles seront une parure pour ton cou.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu iras ton chemin en toute sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans trébucher.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu te coucheras, tu n’éprouveras aucune crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton sommeil sera paisible,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n’auras pas à redouter un désastre imprévu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni la ruine qui ne manquera pas de fondre sur les méchants ;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel sera ton assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il gardera ton pied de tout piège.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’amour du prochain
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu en as le moyen, ne refuse pas de faire du bien à celui qui est dans le besoin,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne dis pas à ton prochain :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Va-t’en et reviens plus tard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: demain je te donnerai »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que tu peux le faire tout de suite.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne manigance rien de mal contre ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu’il vit sans défiance près de toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’amour et la fidélité ne te fassent jamais défaut ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: attache-les autour de ton cou, grave-les sur les tablettes de ton cœur,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne cherche pas querelle à quelqu’un sans raison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu’il ne t’a fait aucun mal.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’envie pas les violents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n’adopte aucun de leurs procédés,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel a en horreur les gens pervers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il réserve son intimité aux hommes droits.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La malédiction de l’Eternel pèse sur la maison du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il bénit la demeure des justes.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se moque des moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il accorde sa faveur aux humbles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Jc 4.6 ; 1 P 5.5 d’après l’ancienne version grecque.
      marker-yv: yv-n
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’honneur sera la part des sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les insensés porteront la honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu obtiendras la faveur de Dieu et des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu auras la réputation d’être un homme de bon sens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets ta confiance en l’Eternel de tout ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne te repose pas sur ta propre intelligence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tiens compte de lui pour tout ce que tu entreprends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il te conduira sur le droit chemin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te prends pas pour un sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: crains l’Eternel et détourne-toi du mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 12.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera une bonne médecine qui t’assurera la santé du corps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la vitalité de tout ton être.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honore l’Eternel en lui donnant une part de tes biens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en lui offrant les prémices de tous tes revenus.
