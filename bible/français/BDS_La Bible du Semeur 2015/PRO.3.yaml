document_id: PRO.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La confiance en l’Eternel
  - type: text
    content: Mon fils, n’oublie pas l’éducation que je t’ai donnée
  - type: text
    content: et que ton cœur retienne mes préceptes,
  '10':
  - type: text
    content: Alors tes greniers regorgeront de nourriture
  - type: text
    content: et tes cuves déborderont de vin.
  '11':
  - type: text
    content: Mon fils, si l’Eternel te corrige, n’en fais pas fi,
  - type: text
    content: s’il te reprend, ne t’impatiente pas
  - type: note
    content: Les v. 11-12 sont cités en Hé 12.5-6  ; voir Jb 5.17 ; 1 Co 11.32.
  - type: text
    content: ','
  '12':
  - type: text
    content: car c’est celui qu’il aime que l’Eternel reprend,
  - type: text
    content: agissant avec lui comme un père avec l’enfant qu’il chérit.
  - type: heading
    content: Un trésor sans prix
  '13':
  - type: text
    content: Heureux l’homme qui a trouvé la sagesse !
  - type: text
    content: Heureux celui qui acquiert l’intelligence !
  '14':
  - type: text
    content: Acquérir la sagesse vaut mieux que gagner beaucoup d’argent.
  - type: text
    content: Les avantages qu’elle donne sont plus précieux que l’or le plus fin.
  '15':
  - type: text
    content: Elle a plus de prix que les perles,
  - type: text
    content: et aucun trésor que tu pourrais désirer n’égale sa valeur
  - type: note
    content: Voir 2.4.
  - type: text
    content: .
  '16':
  - type: text
    content: La sagesse t’offre, dans sa main droite, une longue vie,
  - type: text
    content: et dans sa main gauche, la richesse et la considération.
  '17':
  - type: text
    content: Les voies dans lesquelles elle conduit sont agréables,
  - type: text
    content: tous ses chemins convergent vers le bonheur.
  '18':
  - type: text
    content: La sagesse est un arbre de vie
  - type: note
    content: Voir 11.30 ; Gn 2.9.
  - type: text
    content: ' pour ceux qui s’attachent à elle,'
  - type: text
    content: et ceux qui savent la garder sont heureux
  - type: note
    content: Voir 4.10, 13 ; 9.11 ; 13.14 ; Ec 7.12.
  - type: text
    content: .
  '19':
  - type: text
    content: C’est avec la sagesse que l’Eternel a fondé la terre,
  - type: text
    content: et avec l’intelligence qu’il a disposé le ciel.
  '2':
  - type: text
    content: car ils rallongeront tes jours et ajouteront des années à la durée de ta vie
  - type: text
    content: et t’assureront le bonheur.
  '20':
  - type: text
    content: Par sa science, il a fait jaillir l’eau des sources
  - type: text
    content: et ordonné aux nuages de répandre la rosée.
  '21':
  - type: text
    content: Mon fils, garde les yeux fixés
  - type: text
    content: sur la sagesse et la réflexion, retiens-les,
  '22':
  - type: text
    content: car elles t’apporteront la vie,
  - type: text
    content: elles seront une parure pour ton cou.
  '23':
  - type: text
    content: Alors tu iras ton chemin en toute sécurité,
  - type: text
    content: sans trébucher.
  '24':
  - type: text
    content: Quand tu te coucheras, tu n’éprouveras aucune crainte,
  - type: text
    content: et ton sommeil sera paisible,
  '25':
  - type: text
    content: tu n’auras pas à redouter un désastre imprévu,
  - type: text
    content: ni la ruine qui ne manquera pas de fondre sur les méchants ;
  '26':
  - type: text
    content: car l’Eternel sera ton assurance,
  - type: text
    content: il gardera ton pied de tout piège.
  - type: heading
    content: L’amour du prochain
  '27':
  - type: text
    content: Si tu en as le moyen, ne refuse pas de faire du bien à celui qui est dans le besoin,
  '28':
  - type: text
    content: 'ne dis pas à ton prochain :'
  - type: text
    content: « Va-t’en et reviens plus tard,
  - type: text
    content: demain je te donnerai »,
  - type: text
    content: alors que tu peux le faire tout de suite.
  '29':
  - type: text
    content: Ne manigance rien de mal contre ton prochain,
  - type: text
    content: alors qu’il vit sans défiance près de toi.
  '3':
  - type: text
    content: Que l’amour et la fidélité ne te fassent jamais défaut ;
  - type: text
    content: attache-les autour de ton cou, grave-les sur les tablettes de ton cœur,
  '30':
  - type: text
    content: Ne cherche pas querelle à quelqu’un sans raison
  - type: text
    content: alors qu’il ne t’a fait aucun mal.
  '31':
  - type: text
    content: N’envie pas les violents
  - type: text
    content: et n’adopte aucun de leurs procédés,
  '32':
  - type: text
    content: car l’Eternel a en horreur les gens pervers,
  - type: text
    content: mais il réserve son intimité aux hommes droits.
  '33':
  - type: text
    content: La malédiction de l’Eternel pèse sur la maison du méchant,
  - type: text
    content: mais il bénit la demeure des justes.
  '34':
  - type: text
    content: Il se moque des moqueurs,
  - type: text
    content: mais il accorde sa faveur aux humbles
  - type: note
    content: Cité en Jc 4.6 ; 1 P 5.5 d’après l’ancienne version grecque.
  - type: text
    content: .
  '35':
  - type: text
    content: L’honneur sera la part des sages,
  - type: text
    content: mais les insensés porteront la honte.
  '4':
  - type: text
    content: et tu obtiendras la faveur de Dieu et des hommes,
  - type: text
    content: tu auras la réputation d’être un homme de bon sens.
  '5':
  - type: text
    content: Mets ta confiance en l’Eternel de tout ton cœur,
  - type: text
    content: et ne te repose pas sur ta propre intelligence.
  '6':
  - type: text
    content: Tiens compte de lui pour tout ce que tu entreprends,
  - type: text
    content: et il te conduira sur le droit chemin.
  '7':
  - type: text
    content: Ne te prends pas pour un sage,
  - type: text
    content: crains l’Eternel et détourne-toi du mal
  - type: note
    content: Cité en Rm 12.16.
  - type: text
    content: .
  '8':
  - type: text
    content: Ce sera une bonne médecine qui t’assurera la santé du corps
  - type: text
    content: et la vitalité de tout ton être.
  '9':
  - type: text
    content: Honore l’Eternel en lui donnant une part de tes biens
  - type: text
    content: et en lui offrant les prémices de tous tes revenus.
