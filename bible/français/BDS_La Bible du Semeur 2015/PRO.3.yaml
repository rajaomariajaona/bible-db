document_id: PRO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La confiance en l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, n’oublie pas l’éducation que je t’ai donnée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton cœur retienne mes préceptes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car ils rallongeront tes jours et ajouteront des années à la durée de ta vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et t’assureront le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que l’amour et la fidélité ne te fassent jamais défaut ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: attache-les autour de ton cou, grave-les sur les tablettes de ton cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et tu obtiendras la faveur de Dieu et des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu auras la réputation d’être un homme de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mets ta confiance en l’Eternel de tout ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne te repose pas sur ta propre intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tiens compte de lui pour tout ce que tu entreprends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il te conduira sur le droit chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ne te prends pas pour un sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: crains l’Eternel et détourne-toi du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 12.16
        metadata:
          usfm: ROM.12.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce sera une bonne médecine qui t’assurera la santé du corps
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la vitalité de tout ton être.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Honore l’Eternel en lui donnant une part de tes biens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en lui offrant les prémices de tous tes revenus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors tes greniers regorgeront de nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes cuves déborderont de vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon fils, si l’Eternel te corrige, n’en fais pas fi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il te reprend, ne t’impatiente pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 11-12 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.5-6
        metadata:
          usfm: HEB.12.5+HEB.12.6
      - type: text
        text: '  ; voir Jb 5.17 ; 1 Co 11.32.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: car c’est celui qu’il aime que l’Eternel reprend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: agissant avec lui comme un père avec l’enfant qu’il chérit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un trésor sans prix
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Heureux l’homme qui a trouvé la sagesse !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux celui qui acquiert l’intelligence !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Acquérir la sagesse vaut mieux que gagner beaucoup d’argent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les avantages qu’elle donne sont plus précieux que l’or le plus fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle a plus de prix que les perles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun trésor que tu pourrais désirer n’égale sa valeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.4'
        metadata:
          usfm: PRO.2.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La sagesse t’offre, dans sa main droite, une longue vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans sa main gauche, la richesse et la considération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les voies dans lesquelles elle conduit sont agréables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ses chemins convergent vers le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La sagesse est un arbre de vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 11.30 ; Gn 2.9.
    marker-yv: yv-n
  - type: text
    text: ' pour ceux qui s’attachent à elle,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui savent la garder sont heureux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 4.10, 13 ; 9.11 ; 13.14 ; Ec 7.12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est avec la sagesse que l’Eternel a fondé la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec l’intelligence qu’il a disposé le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Par sa science, il a fait jaillir l’eau des sources
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ordonné aux nuages de répandre la rosée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mon fils, garde les yeux fixés
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la sagesse et la réflexion, retiens-les,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car elles t’apporteront la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles seront une parure pour ton cou.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors tu iras ton chemin en toute sécurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans trébucher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quand tu te coucheras, tu n’éprouveras aucune crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton sommeil sera paisible,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: tu n’auras pas à redouter un désastre imprévu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni la ruine qui ne manquera pas de fondre sur les méchants ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: car l’Eternel sera ton assurance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il gardera ton pied de tout piège.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’amour du prochain
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Si tu en as le moyen, ne refuse pas de faire du bien à celui qui est dans le besoin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ne dis pas à ton prochain :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Va-t’en et reviens plus tard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: demain je te donnerai »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que tu peux le faire tout de suite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ne manigance rien de mal contre ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu’il vit sans défiance près de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ne cherche pas querelle à quelqu’un sans raison
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu’il ne t’a fait aucun mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: N’envie pas les violents
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’adopte aucun de leurs procédés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: car l’Eternel a en horreur les gens pervers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il réserve son intimité aux hommes droits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: La malédiction de l’Eternel pèse sur la maison du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il bénit la demeure des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il se moque des moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il accorde sa faveur aux humbles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Jc 4.6 ; 1 P 5.5 d’après l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’honneur sera la part des sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les insensés porteront la honte.
