document_id: GEN.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le départ de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob apprit que les fils de Laban disaient : Jacob s’est emparé de tout ce qui appartenait à notre père et c’est avec le bien de notre père qu’il s’est acquis toute cette richesse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il remarqua que l’attitude de Laban envers lui n’était plus comme avant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Eternel lui dit : Retourne au pays de tes pères, auprès de ta parenté, et je serai avec toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Jacob fit venir Rachel et Léa aux champs où il était avec ses troupeaux '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et il leur dit : Je vois que votre père n’a plus envers moi la même attitude qu’auparavant. Mais le Dieu de mon père a été avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous savez vous-mêmes que j’ai servi votre père de toutes mes forces, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tandis que lui m’a trompé : par dix fois, il a changé les conditions de mon salaire. Heureusement, Dieu ne lui a pas permis de me causer du tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand votre père affirmait : « Les bêtes tachetées constitueront ton salaire », toutes les bêtes mettaient bas des petits tachetés. Et quand il affirmait : « Les mouchetés seront ton salaire », toutes les bêtes faisaient des petits mouchetés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi, c’est Dieu qui a pris le bétail de votre père et qui me l’a donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, à l’époque où les bêtes s’accouplent, j’ai vu en songe que les boucs qui couvraient les brebis étaient mouchetés, tachetés, ou marquetés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’ange de Dieu m’appela dans ce rêve : « Jacob ! » Et j’ai répondu : « J’écoute. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '« Lève les yeux, dit-il, et regarde : tous les boucs qui couvrent le troupeau sont mouchetés, tachetés, ou marquetés, car j’ai vu tout ce que te fait Laban. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je suis le Dieu de Béthel, où tu as répandu de l’huile sur une pierre dressée en stèle, et où tu m’as fait un vœu. Maintenant, lève-toi, quitte ce pays et retourne dans ton pays natal. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rachel et Léa lui répondirent : Avons-nous encore quelque chose, ou un héritage, chez notre père ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne nous a-t-il pas traitées comme des étrangères puisqu’il nous a vendues ? Et, de plus, il a mangé notre argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Normalement, le père donnait à ses filles la dot qu’il recevait de ses gendres, alors que Laban seul a profité du travail de Jacob remplaçant la dot.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tous les biens que Dieu a sauvés de notre père nous appartiennent, à nous et à nos enfants. Maintenant, donc, fais tout ce que Dieu t’a demandé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Jacob se mit en route : il fit monter ses enfants et ses femmes sur les chameaux ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'il emmena tout son bétail et tous les biens qu’il avait acquis, en particulier, le cheptel qu’il avait amassé pendant son séjour à Paddân-Aram, pour rentrer chez son père Isaac au pays de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quant à Laban, il était parti tondre ses moutons. En partant, Rachel vola les idoles domestiques
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Litt. « les théraphim », petites statuettes à figures humaines.
    marker-yv: yv-n
  - type: text
    text: ' de son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ainsi Jacob partit à la dérobée sans informer Laban l’Araméen de sa fuite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il s’enfuit avec tout ce qui lui appartenait, il traversa l’Euphrate, puis se dirigea vers les monts de Galaad.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob rejoint par Laban
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le troisième jour, on avertit Laban que Jacob s’était enfui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il prit avec lui des hommes de sa famille, le poursuivit pendant sept jours et le rattrapa dans les monts de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais, pendant la nuit, Dieu vint parler à Laban l’Araméen dans un rêve. Il lui dit : Garde-toi de dire quoi que ce soit à Jacob, en bien ou en mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand Laban atteignit Jacob, celui-ci avait dressé sa tente dans la montagne. Laban et ses hommes s’installèrent eux aussi dans les monts de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laban interpella Jacob : Qu’est-ce qui t’a pris ? Pourquoi m’as-tu trompé ? Tu as emmené mes filles comme des captives de guerre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pourquoi t’es-tu enfui en cachette ? Tu es parti comme un voleur sans me prévenir ! Je t’aurais laissé partir dans la joie avec des chants, au son du tambourin et de la lyre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu ne m’as même pas laissé embrasser mes petits-enfants et mes filles ! Vraiment, tu as agi de façon stupide ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je pourrais vous faire du mal, mais le Dieu de votre père m’a parlé la nuit dernière et m’a dit : « Garde-toi de ne rien dire à Jacob ni en bien ni en mal. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Maintenant, si tu es parti parce que tu languissais après la maison de ton père, pourquoi m’as-tu volé mes dieux ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob répliqua : J’avais peur que tu m’enlèves tes filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Quant à celui chez qui tu trouveras tes dieux, il ne vivra pas. Fouille en présence de nos gens ! Ce qui sera chez moi, reprends-le !
- type: usfm
  marker: p
  children:
  - type: text
    text: Jacob ignorait en effet que Rachel avait volé les idoles domestiques.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Laban fouilla la tente de Jacob, celle de Léa, puis celle des deux servantes, et ne trouva rien. En sortant de la tente de Léa, il entra dans celle de Rachel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Or Rachel avait pris les idoles et les avait cachées dans la selle du chameau et s’était assise dessus. Laban fouilla toute la tente sans rien trouver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Elle dit à son père : Que mon seigneur ne se fâche pas si je ne peux pas me lever devant toi car j’ai ce qui arrive habituellement aux femmes.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il fouilla, mais ne trouva pas les idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors Jacob se mit en colère et fit de violents reproches à Laban : Quelle faute ai-je commise, s’écria-t-il, qu’ai-je fait de mal pour que tu t’acharnes ainsi contre moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tu as fouillé toutes mes affaires. As-tu rien trouvé qui t’appartienne ? Produis-le ici en présence de mes gens et des tiens, et qu’ils servent d’arbitres entre nous deux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Voilà vingt années que je suis chez toi ; tes brebis et tes chèvres n’ont pas avorté, et je n’ai jamais mangé les béliers de ton troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Si une bête se faisait déchirer par une bête sauvage, je ne te la rapportais pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Si le berger rapportait au propriétaire les restes d’un mouton emporté par un fauve, il n’avait pas besoin de le restituer (voir Ex 22.12 ; Am 3.12).
    marker-yv: yv-n
  - type: text
    text: '  : c’est moi qui t’en dédommageais. Tu me réclamais ce qu’on m’avait volé de jour et ce qui m’avait été volé la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Le jour, j’étais dévoré par la chaleur ; la nuit, par le froid, et je ne pouvais pas dormir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Voilà vingt ans que je suis chez toi : pendant quatorze ans, je t’ai servi pour tes deux filles, puis pendant six ans pour ton bétail ; dix fois, tu as changé mon salaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Si le Dieu de mon père, le Dieu d’Abraham et celui que redoute Isaac, n’avait été de mon côté, tu m’aurais renvoyé aujourd’hui les mains vides. Mais Dieu a vu ma misère et avec quelle peine j’ai travaillé. La nuit dernière, il a prononcé son verdict.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob fait alliance avec Laban
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '– Ces filles sont mes filles, répondit Laban, ces fils mes fils, ces troupeaux sont miens et tout ce que tu vois est à moi. Et que puis-je faire aujourd’hui pour mes filles et pour les enfants qu’elles ont mis au monde ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Maintenant donc, viens, concluons une alliance, toi et moi, et laissons ici un signe qui nous serve de témoin à tous deux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Alors Jacob prit une pierre et l’érigea en stèle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Puis il dit aux siens : Ramassez des pierres !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils ramassèrent des pierres, les entassèrent et, tous ensemble, ils mangèrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les alliances étaient souvent scellées par un repas (26.30 ; Ex 24.11).
    marker-yv: yv-n
  - type: text
    text: ' là sur ce tas de pierres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Laban le nomma Yegar-Sahadouta (Le tas de pierres du témoignage) et Jacob l’appela Galed (Le tas de pierres-témoin).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Laban déclara : Ce tas de pierres sert aujourd’hui de témoin entre toi et moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est pourquoi on le nomma Galed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'On l’appelle aussi Mitspa (Le lieu du guet), car Laban avait dit encore : Que l’Eternel fasse le guet entre nous deux quand nous nous serons perdus de vue l’un et l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Si tu maltraites mes filles et si tu prends d’autres femmes en plus d’elles, ce n’est pas un homme qui nous servira d’arbitre, prends-y garde : c’est Dieu qui sera témoin entre moi et toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Puis il ajouta : Vois ce tas de pierres et cette stèle que j’ai dressés entre moi et toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ce tas de pierres et cette stèle nous serviront de témoins. Je ne dois pas dépasser ce tas de pierres et cette stèle dans ta direction, et tu ne dois pas les dépasser dans ma direction avec de mauvaises intentions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Le Dieu d’Abraham et le dieu de Nahor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nahor était le frère d’Abraham (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.26'
        metadata:
          usfm: GEN.11.26
      - type: text
        text: ) et le grand-père de Laban (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24.24'
        metadata:
          usfm: GEN.24.24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
        metadata:
          usfm: GEN.24.29
      - type: text
        text: ). Laban était polythéiste. Jacob ne prêtera serment qu’au nom du Dieu d’Isaac (v. 42).
    marker-yv: yv-n
  - type: text
    text: ' – c’était le Dieu de leur père'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de leur père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manquent dans certains manuscrits hébreux et dans la version grecque.
    marker-yv: yv-n
  - type: text
    text: ' – seront juges entre nous !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jacob prêta serment par le Dieu que redoutait son père Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Puis il offrit un sacrifice sur la montagne et invita sa parenté à un repas. Ils mangèrent ensemble et passèrent la nuit sur la montagne.
