document_id: GEN.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le départ de Jacob
  - type: text
    content: 'Jacob apprit que les fils de Laban disaient : Jacob s’est emparé de tout ce qui appartenait à notre père et c’est avec le bien de notre père qu’il s’est acquis toute cette richesse.'
  '10':
  - type: text
    content: 'En effet, à l’époque où les bêtes s’accouplent, j’ai vu en songe que les boucs qui couvraient les brebis étaient mouchetés, tachetés, ou marquetés. '
  '11':
  - type: text
    content: 'L’ange de Dieu m’appela dans ce rêve : « Jacob ! » Et j’ai répondu : « J’écoute. » '
  '12':
  - type: text
    content: '« Lève les yeux, dit-il, et regarde : tous les boucs qui couvrent le troupeau sont mouchetés, tachetés, ou marquetés, car j’ai vu tout ce que te fait Laban. '
  '13':
  - type: text
    content: Je suis le Dieu de Béthel, où tu as répandu de l’huile sur une pierre dressée en stèle, et où tu m’as fait un vœu. Maintenant, lève-toi, quitte ce pays et retourne dans ton pays natal. »
  '14':
  - type: text
    content: 'Rachel et Léa lui répondirent : Avons-nous encore quelque chose, ou un héritage, chez notre père ? '
  '15':
  - type: text
    content: Ne nous a-t-il pas traitées comme des étrangères puisqu’il nous a vendues ? Et, de plus, il a mangé notre argent
  - type: note
    content: Normalement, le père donnait à ses filles la dot qu’il recevait de ses gendres, alors que Laban seul a profité du travail de Jacob remplaçant la dot.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tous les biens que Dieu a sauvés de notre père nous appartiennent, à nous et à nos enfants. Maintenant, donc, fais tout ce que Dieu t’a demandé.
  '17':
  - type: text
    content: 'Alors Jacob se mit en route : il fit monter ses enfants et ses femmes sur les chameaux ; '
  '18':
  - type: text
    content: 'il emmena tout son bétail et tous les biens qu’il avait acquis, en particulier, le cheptel qu’il avait amassé pendant son séjour à Paddân-Aram, pour rentrer chez son père Isaac au pays de Canaan. '
  '19':
  - type: text
    content: Quant à Laban, il était parti tondre ses moutons. En partant, Rachel vola les idoles domestiques
  - type: note
    content: Litt. « les théraphim », petites statuettes à figures humaines.
  - type: text
    content: ' de son père. '
  '2':
  - type: text
    content: 'Il remarqua que l’attitude de Laban envers lui n’était plus comme avant. '
  '20':
  - type: text
    content: 'Ainsi Jacob partit à la dérobée sans informer Laban l’Araméen de sa fuite. '
  '21':
  - type: text
    content: Il s’enfuit avec tout ce qui lui appartenait, il traversa l’Euphrate, puis se dirigea vers les monts de Galaad.
  - type: heading
    content: Jacob rejoint par Laban
  '22':
  - type: text
    content: 'Le troisième jour, on avertit Laban que Jacob s’était enfui. '
  '23':
  - type: text
    content: 'Il prit avec lui des hommes de sa famille, le poursuivit pendant sept jours et le rattrapa dans les monts de Galaad. '
  '24':
  - type: text
    content: 'Mais, pendant la nuit, Dieu vint parler à Laban l’Araméen dans un rêve. Il lui dit : Garde-toi de dire quoi que ce soit à Jacob, en bien ou en mal.'
  '25':
  - type: text
    content: 'Quand Laban atteignit Jacob, celui-ci avait dressé sa tente dans la montagne. Laban et ses hommes s’installèrent eux aussi dans les monts de Galaad. '
  '26':
  - type: text
    content: 'Laban interpella Jacob : Qu’est-ce qui t’a pris ? Pourquoi m’as-tu trompé ? Tu as emmené mes filles comme des captives de guerre ! '
  '27':
  - type: text
    content: 'Pourquoi t’es-tu enfui en cachette ? Tu es parti comme un voleur sans me prévenir ! Je t’aurais laissé partir dans la joie avec des chants, au son du tambourin et de la lyre. '
  '28':
  - type: text
    content: 'Tu ne m’as même pas laissé embrasser mes petits-enfants et mes filles ! Vraiment, tu as agi de façon stupide ! '
  '29':
  - type: text
    content: 'Je pourrais vous faire du mal, mais le Dieu de votre père m’a parlé la nuit dernière et m’a dit : « Garde-toi de ne rien dire à Jacob ni en bien ni en mal. » '
  '3':
  - type: text
    content: 'L’Eternel lui dit : Retourne au pays de tes pères, auprès de ta parenté, et je serai avec toi.'
  '30':
  - type: text
    content: Maintenant, si tu es parti parce que tu languissais après la maison de ton père, pourquoi m’as-tu volé mes dieux ?
  '31':
  - type: text
    content: 'Jacob répliqua : J’avais peur que tu m’enlèves tes filles. '
  '32':
  - type: text
    content: Quant à celui chez qui tu trouveras tes dieux, il ne vivra pas. Fouille en présence de nos gens ! Ce qui sera chez moi, reprends-le !
  - type: text
    content: Jacob ignorait en effet que Rachel avait volé les idoles domestiques.
  '33':
  - type: text
    content: 'Laban fouilla la tente de Jacob, celle de Léa, puis celle des deux servantes, et ne trouva rien. En sortant de la tente de Léa, il entra dans celle de Rachel. '
  '34':
  - type: text
    content: 'Or Rachel avait pris les idoles et les avait cachées dans la selle du chameau et s’était assise dessus. Laban fouilla toute la tente sans rien trouver. '
  '35':
  - type: text
    content: 'Elle dit à son père : Que mon seigneur ne se fâche pas si je ne peux pas me lever devant toi car j’ai ce qui arrive habituellement aux femmes.'
  - type: text
    content: 'Il fouilla, mais ne trouva pas les idoles. '
  '36':
  - type: text
    content: 'Alors Jacob se mit en colère et fit de violents reproches à Laban : Quelle faute ai-je commise, s’écria-t-il, qu’ai-je fait de mal pour que tu t’acharnes ainsi contre moi ? '
  '37':
  - type: text
    content: 'Tu as fouillé toutes mes affaires. As-tu rien trouvé qui t’appartienne ? Produis-le ici en présence de mes gens et des tiens, et qu’ils servent d’arbitres entre nous deux. '
  '38':
  - type: text
    content: 'Voilà vingt années que je suis chez toi ; tes brebis et tes chèvres n’ont pas avorté, et je n’ai jamais mangé les béliers de ton troupeau. '
  '39':
  - type: text
    content: Si une bête se faisait déchirer par une bête sauvage, je ne te la rapportais pas
  - type: note
    content: Si le berger rapportait au propriétaire les restes d’un mouton emporté par un fauve, il n’avait pas besoin de le restituer (voir Ex 22.12 ; Am 3.12).
  - type: text
    content: '  : c’est moi qui t’en dédommageais. Tu me réclamais ce qu’on m’avait volé de jour et ce qui m’avait été volé la nuit. '
  '4':
  - type: text
    content: 'Alors Jacob fit venir Rachel et Léa aux champs où il était avec ses troupeaux '
  '40':
  - type: text
    content: 'Le jour, j’étais dévoré par la chaleur ; la nuit, par le froid, et je ne pouvais pas dormir. '
  '41':
  - type: text
    content: 'Voilà vingt ans que je suis chez toi : pendant quatorze ans, je t’ai servi pour tes deux filles, puis pendant six ans pour ton bétail ; dix fois, tu as changé mon salaire. '
  '42':
  - type: text
    content: Si le Dieu de mon père, le Dieu d’Abraham et celui que redoute Isaac, n’avait été de mon côté, tu m’aurais renvoyé aujourd’hui les mains vides. Mais Dieu a vu ma misère et avec quelle peine j’ai travaillé. La nuit dernière, il a prononcé son verdict.
  - type: heading
    content: Jacob fait alliance avec Laban
  '43':
  - type: text
    content: '– Ces filles sont mes filles, répondit Laban, ces fils mes fils, ces troupeaux sont miens et tout ce que tu vois est à moi. Et que puis-je faire aujourd’hui pour mes filles et pour les enfants qu’elles ont mis au monde ? '
  '44':
  - type: text
    content: Maintenant donc, viens, concluons une alliance, toi et moi, et laissons ici un signe qui nous serve de témoin à tous deux.
  '45':
  - type: text
    content: 'Alors Jacob prit une pierre et l’érigea en stèle. '
  '46':
  - type: text
    content: 'Puis il dit aux siens : Ramassez des pierres !'
  - type: text
    content: Ils ramassèrent des pierres, les entassèrent et, tous ensemble, ils mangèrent
  - type: note
    content: Les alliances étaient souvent scellées par un repas (26.30 ; Ex 24.11).
  - type: text
    content: ' là sur ce tas de pierres. '
  '47':
  - type: text
    content: Laban le nomma Yegar-Sahadouta (Le tas de pierres du témoignage) et Jacob l’appela Galed (Le tas de pierres-témoin).
  '48':
  - type: text
    content: 'Laban déclara : Ce tas de pierres sert aujourd’hui de témoin entre toi et moi.'
  - type: text
    content: 'C’est pourquoi on le nomma Galed. '
  '49':
  - type: text
    content: 'On l’appelle aussi Mitspa (Le lieu du guet), car Laban avait dit encore : Que l’Eternel fasse le guet entre nous deux quand nous nous serons perdus de vue l’un et l’autre. '
  '5':
  - type: text
    content: 'et il leur dit : Je vois que votre père n’a plus envers moi la même attitude qu’auparavant. Mais le Dieu de mon père a été avec moi. '
  '50':
  - type: text
    content: 'Si tu maltraites mes filles et si tu prends d’autres femmes en plus d’elles, ce n’est pas un homme qui nous servira d’arbitre, prends-y garde : c’est Dieu qui sera témoin entre moi et toi. '
  '51':
  - type: text
    content: 'Puis il ajouta : Vois ce tas de pierres et cette stèle que j’ai dressés entre moi et toi. '
  '52':
  - type: text
    content: 'Ce tas de pierres et cette stèle nous serviront de témoins. Je ne dois pas dépasser ce tas de pierres et cette stèle dans ta direction, et tu ne dois pas les dépasser dans ma direction avec de mauvaises intentions. '
  '53':
  - type: text
    content: Le Dieu d’Abraham et le dieu de Nahor
  - type: note
    content: Nahor était le frère d’Abraham (11.26) et le grand-père de Laban (24.24, 29). Laban était polythéiste. Jacob ne prêtera serment qu’au nom du Dieu d’Isaac (v. 42).
  - type: text
    content: ' – c’était le Dieu de leur père'
  - type: note
    content: 'Les mots : le Dieu (ou les dieux) de leur père manquent dans certains manuscrits hébreux et dans la version grecque.'
  - type: text
    content: ' – seront juges entre nous !'
  - type: text
    content: 'Jacob prêta serment par le Dieu que redoutait son père Isaac. '
  '54':
  - type: text
    content: Puis il offrit un sacrifice sur la montagne et invita sa parenté à un repas. Ils mangèrent ensemble et passèrent la nuit sur la montagne.
  '6':
  - type: text
    content: 'Vous savez vous-mêmes que j’ai servi votre père de toutes mes forces, '
  '7':
  - type: text
    content: 'tandis que lui m’a trompé : par dix fois, il a changé les conditions de mon salaire. Heureusement, Dieu ne lui a pas permis de me causer du tort. '
  '8':
  - type: text
    content: 'Quand votre père affirmait : « Les bêtes tachetées constitueront ton salaire », toutes les bêtes mettaient bas des petits tachetés. Et quand il affirmait : « Les mouchetés seront ton salaire », toutes les bêtes faisaient des petits mouchetés. '
  '9':
  - type: text
    content: 'Ainsi, c’est Dieu qui a pris le bétail de votre père et qui me l’a donné. '
