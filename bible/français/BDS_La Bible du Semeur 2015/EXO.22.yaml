document_id: EXO.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’on surprend un voleur en train de pénétrer dans une maison par effraction et qu’on lui assène un coup mortel, celui qui l’aura frappé ne sera pas coupable de meurtre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un serment prêté au nom de l’Eternel départagera les deux parties. Celui qui avait la garde de l’animal jurera qu’il ne s’est pas emparé du bien de l’autre, et le propriétaire de la bête acceptera ce serment sans qu’aucune indemnité ne lui soit versée. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si l’animal lui a été volé chez lui, il dédommagera le propriétaire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si l’animal a été déchiré par une bête féroce, ses restes seront produits comme pièce à conviction et il ne sera pas nécessaire de payer d’indemnité pour la bête déchirée.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un emprunte une bête et qu’elle se casse une patte ou meurt en l’absence de son propriétaire, l’emprunteur sera tenu d’indemniser ce dernier. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si, par contre, son propriétaire était présent au moment de l’accident, il n’y aura pas lieu de l’indemniser. Si la bête a été louée, ce dommage est couvert par le prix de la location.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si un homme séduit une jeune fille non encore fiancée et couche avec elle, il devra payer sa dot et la prendre pour femme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La dot devait être payée par le gendre ou son père au père de la jeune fille (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 22.28-29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si le père refuse absolument de la lui accorder, il paiera en argent la dot habituelle des jeunes filles vierges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 22.28-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des crimes passibles de la peine de mort
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne laisseras pas vivre de magicienne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 19.26, 31 ; Dt 18.10-11.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quiconque s’accouple à une bête sera puni de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 18.23 ; 20.15-16 ; Dt 27.21.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui offrira des sacrifices à d’autres dieux qu’à l’Eternel devra être exécuté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 17.2-5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur la protection des défavorisés
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par contre, si cela se passe en plein jour, celui qui l’aura frappé sera coupable de meurtre. Tout voleur devra verser une indemnité. S’il ne possède rien, il sera lui-même vendu comme esclave pour compenser ce qu’il a volé.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu n’exploiteras pas l’étranger qui vit dans ton pays et tu ne l’opprimeras pas, car vous avez été vous-mêmes étrangers en Egypte. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n’opprimerez pas la veuve ni l’orphelin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 23.9 ; Dt 24.17-18 ; 27.19.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous les opprimez et qu’ils fassent monter leur plainte vers moi, je ne manquerai pas d’écouter leur cri, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je me mettrai en colère contre vous et je vous ferai périr par la guerre, de sorte que vos femmes deviendront veuves et vos fils orphelins.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si tu prêtes de l’argent à un membre de mon peuple, à un pauvre qui est avec toi, tu n’agiras pas envers lui comme un usurier, tu n’en exigeras pas d’intérêts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 25.36-37 ; Dt 15.7-11 ; 23.20-21.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si tu prends en gage le manteau de ton prochain, tu le lui rendras avant le coucher du soleil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 25-26, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 24.10-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car c’est là sa seule couverture ; autrement, dans quoi s’envelopperait-il pour dormir ? S’il crie vers moi, je l’écouterai, car je suis compatissant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur ce qui est dû à Dieu
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu n’insulteras pas Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu ne manqueras pas de respect pour Dieu, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui suit explicitant ce que représente le respect ou le manque de respect pour Dieu.
      marker-yv: yv-n
    - type: text
      text: ' et tu ne maudiras pas celui qui gouverne ton peuple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 23.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne différeras pas l’offrande des prémices de ta moisson et de ta vendange.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu me donneras le premier-né de tes fils, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tu m’offriras également le premier-né de tes bovins, de tes moutons et de tes chèvres ; ils resteront sept jours avec leur mère, et le huitième jour tu me les offriras.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il a volé un animal – bovin, âne ou mouton – et qu’on le retrouve vivant en sa possession, il rendra deux animaux en compensation.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous serez pour moi des hommes saints : vous ne mangerez donc pas la viande d’un animal déchiré par des bêtes sauvages, vous le jetterez aux chiens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 17.15 ; Dt 14.21.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un fait brouter ses bêtes dans le champ ou le vignoble d’autrui, il indemnisera le propriétaire lésé en lui donnant le meilleur produit de son propre champ et de son vignoble.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un allume un feu et que celui-ci, rencontrant des buissons d’épines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les haies d’épines étaient souvent utilisées comme clôtures (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 7.4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', se propage et brûle les gerbes du voisin, ou son blé sur pied, ou bien son blé en herbe, l’auteur de l’incendie sera tenu de donner compensation pour ce qui aura été brûlé.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme confie à la garde d’autrui de l’argent ou des objets de valeur et qu’ils soient volés dans la maison de celui qui en avait accepté la garde, si le voleur est retrouvé, il restituera le double de ce qu’il a volé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il ne l’est pas, le maître de la maison comparaîtra devant Dieu pour savoir s’il ne s’est pas emparé du bien de son prochain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans toute affaire frauduleuse, qu’il s’agisse d’un bovin, d’un âne, d’un mouton, d’un vêtement ou de n’importe quel objet perdu dont deux personnes revendiqueront la propriété, les deux parties porteront leur litige devant Dieu ; celui que Dieu déclarera coupable restituera le double à l’autre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme confie en garde à son prochain un âne, un bovin, un mouton ou tout autre animal, et que celui-ci meurt, se casse une patte ou se fait capturer par des voleurs sans qu’il y ait de témoin, '
