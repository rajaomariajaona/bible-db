document_id: ZEC.2
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les cornes et les quatre forgerons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je levai les yeux et je vis quatre cornes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.8
        metadata:
          usfm: DAN.7.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je demandai à l’ange qui me parlait : Que représentent ces cornes ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et il me répondit : Ces cornes représentent les puissances qui ont dispersé les habitants de Juda, d’Israël et de Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis l’Eternel me fit voir quatre forgerons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: – Que viennent-ils faire ? demandai-je.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il me répondit : Ils sont venus pour faire trembler les nations qui ont dispersé Juda, de sorte que personne n’osait plus relever la tête. Ils abattront les cornes de ces nations qui ont levé leurs cornes contre Juda pour en disperser la population.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’arpenteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je regardai et je vis un homme qui portait un cordeau d’arpenteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je lui demandai : Où vas-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il me répondit : Je vais mesurer Jérusalem pour en déterminer la largeur et la longueur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme l’ange qui me parlait s’en allait, un autre ange vint à sa rencontre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et lui dit : Cours dire à ce jeune homme là-bas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à celui qui voulait mesurer la ville.
    marker-yv: yv-n
  - type: text
    text: '  : « Il y aura un jour tant d’habitants et de bêtes dans Jérusalem que la ville restera ouverte, sans murailles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je serai, moi-même, pour elle comme une muraille de feu tout autour d’elle – l’Eternel le déclare – et je serai sa gloire au milieu d’elle. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Allons ! Allons ! Fuyez ! Partez de ce pays du Nord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De la Babylonie (v. 11).
    marker-yv: yv-n
  - type: text
    text: ' – l’Eternel le déclare – car je vous avais dispersés aux quatre vents du ciel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire aux quatre points cardinaux.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel le déclare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Allons, Sion ! Echappe-toi, toi qui es installée dans la cité de Babylone ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car voici ce que dit le Seigneur des armées célestes, lui qui m’a envoyé avec autorité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lui qui m’a envoyé avec autorité. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après que la gloire m’eut envoyé.
    marker-yv: yv-n
  - type: text
    text: ', au sujet des nations qui vous ont dépouillés : Celui qui touche à vous, c’est comme s’il touchait à la prunelle de mon œil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, je lèverai la main contre elles, elles seront pillées par leurs esclaves, et vous saurez que l’Eternel, le Seigneur des armées célestes, m’a envoyé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pousse des cris de joie et sois dans l’allégresse, communauté de Sion, car je viens habiter au milieu de toi, l’Eternel le déclare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En ce jour-là, beaucoup de gens des peuples non israélites s’attacheront à l’Eternel et deviendront mon peuple. Et je demeurerai au milieu de vous, et vous saurez que l’Eternel, le Seigneur des armées célestes, m’a envoyé vers vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et l’Eternel fera de Juda son domaine, son patrimoine, sur la terre sacrée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du saint.
    marker-yv: yv-n
  - type: text
    text: ', et il choisira de nouveau la ville de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que, devant l’Eternel, toutes les créatures fassent silence, car le voici qui se réveille et sort de sa demeure sainte.
