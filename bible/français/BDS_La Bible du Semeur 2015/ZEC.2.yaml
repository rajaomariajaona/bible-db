document_id: ZEC.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les cornes et les quatre forgerons
  - type: text
    content: Je levai les yeux et je vis quatre cornes
  - type: note
    content: Voir Dn 7.8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Allons ! Allons ! Fuyez ! Partez de ce pays du Nord
  - type: note
    content: De la Babylonie (v. 11).
  - type: text
    content: ' – l’Eternel le déclare – car je vous avais dispersés aux quatre vents du ciel'
  - type: note
    content: C’est-à-dire aux quatre points cardinaux.
  - type: text
    content: ', l’Eternel le déclare. '
  '11':
  - type: text
    content: 'Allons, Sion ! Echappe-toi, toi qui es installée dans la cité de Babylone ! '
  '12':
  - type: text
    content: Car voici ce que dit le Seigneur des armées célestes, lui qui m’a envoyé avec autorité
  - type: note
    content: 'lui qui m’a envoyé avec autorité. Autre traduction : après que la gloire m’eut envoyé.'
  - type: text
    content: ', au sujet des nations qui vous ont dépouillés : Celui qui touche à vous, c’est comme s’il touchait à la prunelle de mon œil. '
  '13':
  - type: text
    content: Oui, je lèverai la main contre elles, elles seront pillées par leurs esclaves, et vous saurez que l’Eternel, le Seigneur des armées célestes, m’a envoyé.
  '14':
  - type: text
    content: 'Pousse des cris de joie et sois dans l’allégresse, communauté de Sion, car je viens habiter au milieu de toi, l’Eternel le déclare. '
  '15':
  - type: text
    content: 'En ce jour-là, beaucoup de gens des peuples non israélites s’attacheront à l’Eternel et deviendront mon peuple. Et je demeurerai au milieu de vous, et vous saurez que l’Eternel, le Seigneur des armées célestes, m’a envoyé vers vous. '
  '16':
  - type: text
    content: Et l’Eternel fera de Juda son domaine, son patrimoine, sur la terre sacrée
  - type: note
    content: 'Autre traduction : du saint.'
  - type: text
    content: ', et il choisira de nouveau la ville de Jérusalem. '
  '17':
  - type: text
    content: Que, devant l’Eternel, toutes les créatures fassent silence, car le voici qui se réveille et sort de sa demeure sainte.
  '2':
  - type: text
    content: 'Je demandai à l’ange qui me parlait : Que représentent ces cornes ?'
  - type: text
    content: 'Et il me répondit : Ces cornes représentent les puissances qui ont dispersé les habitants de Juda, d’Israël et de Jérusalem.'
  '3':
  - type: text
    content: Puis l’Eternel me fit voir quatre forgerons.
  '4':
  - type: text
    content: – Que viennent-ils faire ? demandai-je.
  - type: text
    content: 'Il me répondit : Ils sont venus pour faire trembler les nations qui ont dispersé Juda, de sorte que personne n’osait plus relever la tête. Ils abattront les cornes de ces nations qui ont levé leurs cornes contre Juda pour en disperser la population.'
  - type: heading
    content: L’arpenteur
  '5':
  - type: text
    content: 'Je regardai et je vis un homme qui portait un cordeau d’arpenteur. '
  '6':
  - type: text
    content: 'Je lui demandai : Où vas-tu ?'
  - type: text
    content: 'Il me répondit : Je vais mesurer Jérusalem pour en déterminer la largeur et la longueur.'
  '7':
  - type: text
    content: 'Comme l’ange qui me parlait s’en allait, un autre ange vint à sa rencontre '
  '8':
  - type: text
    content: 'et lui dit : Cours dire à ce jeune homme là-bas'
  - type: note
    content: C’est-à-dire à celui qui voulait mesurer la ville.
  - type: text
    content: '  : « Il y aura un jour tant d’habitants et de bêtes dans Jérusalem que la ville restera ouverte, sans murailles. '
  '9':
  - type: text
    content: Je serai, moi-même, pour elle comme une muraille de feu tout autour d’elle – l’Eternel le déclare – et je serai sa gloire au milieu d’elle. »
