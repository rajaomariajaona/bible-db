document_id: JOS.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le mémorial de la traversée du Jourdain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque tout le peuple eut fini de traverser le Jourdain, l’Eternel dit à Josué : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les prêtres qui portaient le coffre se tinrent au milieu du lit du Jourdain jusqu’à ce qu’on eût exécuté tout ce que l’Eternel avait ordonné à Josué de demander au peuple. Josué se conforma ainsi aux ordres que Moïse lui avait donnés. C’est rapidement que le peuple traversa le fleuve. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lorsque tout le monde eut passé de l’autre côté, le coffre de l’Eternel porté par les prêtres reprit la tête du peuple. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les hommes des tribus de Ruben, de Gad et de la demi-tribu de Manassé marchèrent en ordre de bataille en tête des autres Israélites, comme Moïse le leur avait demandé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 32.20-22 ; Dt 3.18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Environ quarante mille soldats armés, équipés pour la guerre, s’avancèrent pour le combat, devant l’Eternel, en direction des plaines de Jéricho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ce jour-là, l’Eternel honora Josué aux yeux de tous les Israélites, et ils le craignirent comme ils avaient craint Moïse durant toute sa vie.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ensuite l’Eternel dit à Josué : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ordonne aux prêtres qui portent le coffre contenant l’acte de l’alliance de sortir du milieu du Jourdain.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Josué donna cet ordre aux prêtres : Sortez du milieu du Jourdain !'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dès que les prêtres qui portaient le coffre de l’alliance de l’Eternel eurent quitté le lit du fleuve et posé le pied sur la terre ferme, les eaux du Jourdain revinrent à leur place et se mirent à couler comme auparavant le long de ses berges. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C’est le dixième jour du premier mois que le peuple traversa le Jourdain. Ils établirent leur camp à Guilgal, à la limite orientale de Jéricho.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Choisissez parmi le peuple douze hommes, un par tribu, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C’est à Guilgal que Josué fit ériger les douze pierres ramassées dans le lit du Jourdain. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Puis il dit aux Israélites : Lorsque plus tard vos descendants demanderont à leurs pères ce que sont ces pierres, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'vous leur expliquerez comment le peuple d’Israël a traversé le Jourdain à pied sec '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: parce que l’Eternel votre Dieu a asséché le lit du fleuve devant vous jusqu’à ce que vous l’ayez traversé – tout comme il avait asséché la mer des Roseaux devant nous pour que nous la traversions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 14.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il a agi ainsi pour que tous les peuples de la terre sachent combien grande est sa puissance et pour que vous-mêmes vous craigniez l’Eternel votre Dieu pour toujours.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et demandez-leur d’aller chercher douze pierres au milieu du lit du fleuve à l’endroit où les prêtres se sont arrêtés, et de les apporter à l’endroit où vous camperez cette nuit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Josué appela les douze hommes qu’il avait fait désigner parmi les Israélites, un par tribu, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et il leur dit : Passez devant le coffre de l’Eternel votre Dieu et allez au milieu du Jourdain. Que chacun de vous y ramasse une pierre et la charge sur son épaule pour qu’il y en ait une pour chaque tribu d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ces pierres resteront comme un signe au milieu de vous. Lorsque par la suite vos fils vous demanderont ce que ces pierres signifient pour vous, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'vous leur répondrez : « Les eaux du Jourdain ont été coupées en deux devant le coffre de l’alliance de l’Eternel lorsqu’il a traversé le fleuve. Ces pierres servent de mémorial rappelant pour toujours aux Israélites que les eaux du Jourdain ont été coupées en deux. »'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les Israélites firent ce que Josué leur avait ordonné : ils prirent douze pierres au milieu du lit du Jourdain, une pour chaque tribu d’Israël, comme l’Eternel l’avait demandé à Josué, ils les emportèrent au campement et les posèrent là. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Josué érigea aussi douze autres pierres au milieu du lit du Jourdain, à l’endroit où les prêtres qui portaient le coffre de l’alliance avaient posé leurs pieds, et elles y sont restées jusqu’à ce jour.
