document_id: GEN.37
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'L’histoire de la famille de Jacob : le cycle de joseph'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rêves de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob s’établit au pays de Canaan où son père avait séjourné. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici l’histoire de la famille de Jacob. Joseph, âgé de dix-sept ans, gardait les moutons et les chèvres avec ses frères. Il avait passé son enfance avec les fils de Bilha et de Zilpa, femmes de son père. Il rapportait à leur père leurs mauvais propos. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Israël aimait Joseph beaucoup plus que tous ses autres fils, car il l’avait eu dans sa vieillesse. Il lui fit une tunique splendide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Diverses traductions ont été données du qualificatif de cette tunique : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bigarrée, princière, de fine laine, à pans, multicolore, ample et longue, à manches longues.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses frères virent que leur père le préférait à eux tous ; alors ils le prirent en haine, et ils ne pouvaient plus lui parler aimablement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Joseph fit un rêve et le raconta à ses frères, qui ne l’en détestèrent que davantage. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit, en effet : Ecoutez, je vous prie, ce songe que j’ai eu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous étions en train de lier des gerbes dans les champs. Soudain, ma gerbe s’est dressée et s’est tenue debout ; les vôtres se sont placées autour d’elle et se sont prosternées devant elle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 42.6 ; 43.26 ; 44.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses frères lui dirent : Prétendrais-tu devenir notre roi et nous gouverner ? Et ils le détestèrent de plus belle à cause de ses songes et de ses propos.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il eut encore un autre rêve qu’il raconta également à ses frères : Voici, leur dit-il, j’ai encore fait un rêve. J’ai vu le soleil, la lune et onze étoiles se prosterner devant moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand il raconta ce rêve à son père et à ses frères, son père le réprimanda et lui dit : Qu’as-tu rêvé là ? T’imagines-tu que moi, ta mère et tes frères, nous allons nous prosterner en terre devant toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ses frères étaient jaloux de lui : mais son père garda la chose en mémoire'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.9
        metadata:
          usfm: ACT.7.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph vendu comme esclave
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les frères de Joseph allèrent faire paître les troupeaux de leur père dans la région de Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Israël dit à Joseph : Tes frères font paître les troupeaux à Sichem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A 80 kilomètres d’Hébron.
    marker-yv: yv-n
  - type: text
    text: '  ; va, je veux t’envoyer vers eux.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joseph répondit : J’y vais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Son père lui dit : Va voir comment se portent tes frères et comment vont les troupeaux. Tu m’en rapporteras des nouvelles.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il l’envoya donc depuis la vallée d’Hébron et Joseph se rendit à Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Un homme l’y rencontra, alors qu’il errait dans la campagne. Il lui demanda : Que cherches-tu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: – Je cherche mes frères, lui dit-il, peux-tu me dire où ils font paître leurs troupeaux ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '– Ils sont partis d’ici, lui répondit l’homme, et je les ai entendus dire : « Allons vers Dotân'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A une vingtaine de kilomètres au nord de Sichem.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joseph partit donc à la recherche de ses frères et les trouva à Dotân. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ceux-ci l’aperçurent de loin. Avant qu’il ne soit près d’eux, ils complotèrent de le faire mourir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '– Voilà le maître-rêveur qui arrive, se dirent-ils les uns aux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est le moment ! Allez, tuons-le et jetons-le dans une citerne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Creusée dans le sol pour recueillir les eaux, le fond était plus large que l’ouverture (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 38.6
        metadata:
          usfm: JER.38.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
        metadata:
          usfm: JER.38.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', nous dirons qu’une bête féroce l’a dévoré. On verra bien alors ce qu’il advient de ses rêves !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsqu’il entendit cela, Ruben chercha à sauver Joseph. Il dit : Ne portons pas atteinte à sa vie ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il ajouta : Ne répandez pas le sang ! Jetez-le dans cette citerne qui se trouve dans le désert, mais ne portez pas la main sur lui !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il avait l’intention de le sauver pour le renvoyer à son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dès que Joseph eut rejoint ses frères, ils le dépouillèrent de sa tunique, cette tunique splendide qu’il portait. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils se saisirent de lui et le jetèrent au fond de la citerne. Elle était vide ; il n’y avait pas d’eau dedans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42.21'
        metadata:
          usfm: GEN.42.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis ils s’assirent pour manger. En regardant au loin, ils aperçurent une caravane d’Ismaélites venant de la région de Galaad et dont les chameaux étaient chargés de gomme, de baume et de myrrhe, qu’ils transportaient en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Juda dit à ses frères : Quel intérêt avons-nous à tuer notre frère et à cacher sa mort ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vendons-le plutôt aux Ismaélites. Ne portons pas la main sur lui, car c’est notre frère, il est de même sang que nous.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ses frères furent d’accord '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: et, lorsque les marchands madianites passèrent, ils hissèrent Joseph hors de la citerne et le vendirent aux Ismaélites pour vingt pièces d’argent. Ceux-ci l’emmenèrent en Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob pleure Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quand Ruben retourna à la citerne, il n’y trouva plus Joseph. Alors il déchira ses vêtements en signe de désespoir, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'il alla trouver ses frères et leur dit : Le garçon n’y est plus ! Que vais-je faire maintenant ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors ils égorgèrent un bouc, prirent la tunique de Joseph et la trempèrent dans le sang du bouc. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils envoyèrent la tunique splendide à leur père en disant : Voici ce que nous avons trouvé. Reconnais-tu ou non la tunique de ton fils ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jacob la reconnut et s’écria : La tunique de mon fils ! Une bête féroce l’a dévoré ! Joseph a été mis en pièces !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors il déchira ses vêtements et mit un tissu de sac sur ses reins. Il porta longtemps le deuil de son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tous ses fils et toutes ses filles vinrent pour le consoler ; mais il refusa toute consolation et dit : Non ! c’est dans le deuil que je rejoindrai mon fils au séjour des morts !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il continua à pleurer Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Les Madianites vendirent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le trafic d’esclaves était l’une des principales ressources des habitants du désert.
    marker-yv: yv-n
  - type: text
    text: ' Joseph en Egypte à Potiphar, un haut fonctionnaire du pharaon, chef de la garde royale.'
