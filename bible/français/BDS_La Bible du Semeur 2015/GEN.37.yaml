document_id: GEN.37,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'L’histoire de la famille de Jacob : le cycle de joseph'
  - type: heading
    content: Les rêves de Joseph
  - type: text
    content: 'Jacob s’établit au pays de Canaan où son père avait séjourné. '
  '10':
  - type: text
    content: 'Quand il raconta ce rêve à son père et à ses frères, son père le réprimanda et lui dit : Qu’as-tu rêvé là ? T’imagines-tu que moi, ta mère et tes frères, nous allons nous prosterner en terre devant toi ?'
  '11':
  - type: text
    content: 'Ses frères étaient jaloux de lui : mais son père garda la chose en mémoire'
  - type: note
    content: Voir Ac 7.9.
  - type: text
    content: .
  - type: heading
    content: Joseph vendu comme esclave
  '12':
  - type: text
    content: 'Les frères de Joseph allèrent faire paître les troupeaux de leur père dans la région de Sichem. '
  '13':
  - type: text
    content: 'Israël dit à Joseph : Tes frères font paître les troupeaux à Sichem'
  - type: note
    content: A 80 kilomètres d’Hébron.
  - type: text
    content: '  ; va, je veux t’envoyer vers eux.'
  - type: text
    content: 'Joseph répondit : J’y vais.'
  '14':
  - type: text
    content: 'Son père lui dit : Va voir comment se portent tes frères et comment vont les troupeaux. Tu m’en rapporteras des nouvelles.'
  - type: text
    content: 'Il l’envoya donc depuis la vallée d’Hébron et Joseph se rendit à Sichem. '
  '15':
  - type: text
    content: 'Un homme l’y rencontra, alors qu’il errait dans la campagne. Il lui demanda : Que cherches-tu ?'
  '16':
  - type: text
    content: – Je cherche mes frères, lui dit-il, peux-tu me dire où ils font paître leurs troupeaux ?
  '17':
  - type: text
    content: '– Ils sont partis d’ici, lui répondit l’homme, et je les ai entendus dire : « Allons vers Dotân'
  - type: note
    content: A une vingtaine de kilomètres au nord de Sichem.
  - type: text
    content: . »
  - type: text
    content: 'Joseph partit donc à la recherche de ses frères et les trouva à Dotân. '
  '18':
  - type: text
    content: Ceux-ci l’aperçurent de loin. Avant qu’il ne soit près d’eux, ils complotèrent de le faire mourir.
  '19':
  - type: text
    content: '– Voilà le maître-rêveur qui arrive, se dirent-ils les uns aux autres. '
  '2':
  - type: text
    content: 'Voici l’histoire de la famille de Jacob. Joseph, âgé de dix-sept ans, gardait les moutons et les chèvres avec ses frères. Il avait passé son enfance avec les fils de Bilha et de Zilpa, femmes de son père. Il rapportait à leur père leurs mauvais propos. '
  '20':
  - type: text
    content: C’est le moment ! Allez, tuons-le et jetons-le dans une citerne
  - type: note
    content: Creusée dans le sol pour recueillir les eaux, le fond était plus large que l’ouverture (voir Jr 38.6, 13).
  - type: text
    content: ', nous dirons qu’une bête féroce l’a dévoré. On verra bien alors ce qu’il advient de ses rêves !'
  '21':
  - type: text
    content: 'Lorsqu’il entendit cela, Ruben chercha à sauver Joseph. Il dit : Ne portons pas atteinte à sa vie ! '
  '22':
  - type: text
    content: 'Il ajouta : Ne répandez pas le sang ! Jetez-le dans cette citerne qui se trouve dans le désert, mais ne portez pas la main sur lui !'
  - type: text
    content: Il avait l’intention de le sauver pour le renvoyer à son père.
  '23':
  - type: text
    content: 'Dès que Joseph eut rejoint ses frères, ils le dépouillèrent de sa tunique, cette tunique splendide qu’il portait. '
  '24':
  - type: text
    content: Ils se saisirent de lui et le jetèrent au fond de la citerne. Elle était vide ; il n’y avait pas d’eau dedans
  - type: note
    content: Voir 42.21.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Puis ils s’assirent pour manger. En regardant au loin, ils aperçurent une caravane d’Ismaélites venant de la région de Galaad et dont les chameaux étaient chargés de gomme, de baume et de myrrhe, qu’ils transportaient en Egypte. '
  '26':
  - type: text
    content: 'Alors Juda dit à ses frères : Quel intérêt avons-nous à tuer notre frère et à cacher sa mort ? '
  '27':
  - type: text
    content: Vendons-le plutôt aux Ismaélites. Ne portons pas la main sur lui, car c’est notre frère, il est de même sang que nous.
  - type: text
    content: 'Ses frères furent d’accord '
  '28':
  - type: text
    content: et, lorsque les marchands madianites passèrent, ils hissèrent Joseph hors de la citerne et le vendirent aux Ismaélites pour vingt pièces d’argent. Ceux-ci l’emmenèrent en Egypte.
  - type: heading
    content: Jacob pleure Joseph
  '29':
  - type: text
    content: 'Quand Ruben retourna à la citerne, il n’y trouva plus Joseph. Alors il déchira ses vêtements en signe de désespoir, '
  '3':
  - type: text
    content: Israël aimait Joseph beaucoup plus que tous ses autres fils, car il l’avait eu dans sa vieillesse. Il lui fit une tunique splendide
  - type: note
    content: 'Diverses traductions ont été données du qualificatif de cette tunique : bigarrée, princière, de fine laine, à pans, multicolore, ample et longue, à manches longues.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'il alla trouver ses frères et leur dit : Le garçon n’y est plus ! Que vais-je faire maintenant ?'
  '31':
  - type: text
    content: 'Alors ils égorgèrent un bouc, prirent la tunique de Joseph et la trempèrent dans le sang du bouc. '
  '32':
  - type: text
    content: 'Ils envoyèrent la tunique splendide à leur père en disant : Voici ce que nous avons trouvé. Reconnais-tu ou non la tunique de ton fils ?'
  '33':
  - type: text
    content: 'Jacob la reconnut et s’écria : La tunique de mon fils ! Une bête féroce l’a dévoré ! Joseph a été mis en pièces !'
  '34':
  - type: text
    content: 'Alors il déchira ses vêtements et mit un tissu de sac sur ses reins. Il porta longtemps le deuil de son fils. '
  '35':
  - type: text
    content: 'Tous ses fils et toutes ses filles vinrent pour le consoler ; mais il refusa toute consolation et dit : Non ! c’est dans le deuil que je rejoindrai mon fils au séjour des morts !'
  - type: text
    content: Et il continua à pleurer Joseph.
  '36':
  - type: text
    content: Les Madianites vendirent
  - type: note
    content: Le trafic d’esclaves était l’une des principales ressources des habitants du désert.
  - type: text
    content: ' Joseph en Egypte à Potiphar, un haut fonctionnaire du pharaon, chef de la garde royale.'
  '4':
  - type: text
    content: Ses frères virent que leur père le préférait à eux tous ; alors ils le prirent en haine, et ils ne pouvaient plus lui parler aimablement.
  '5':
  - type: text
    content: 'Joseph fit un rêve et le raconta à ses frères, qui ne l’en détestèrent que davantage. '
  '6':
  - type: text
    content: 'Il leur dit, en effet : Ecoutez, je vous prie, ce songe que j’ai eu. '
  '7':
  - type: text
    content: Nous étions en train de lier des gerbes dans les champs. Soudain, ma gerbe s’est dressée et s’est tenue debout ; les vôtres se sont placées autour d’elle et se sont prosternées devant elle
  - type: note
    content: Voir 42.6 ; 43.26 ; 44.14.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Ses frères lui dirent : Prétendrais-tu devenir notre roi et nous gouverner ? Et ils le détestèrent de plus belle à cause de ses songes et de ses propos.'
  '9':
  - type: text
    content: 'Il eut encore un autre rêve qu’il raconta également à ses frères : Voici, leur dit-il, j’ai encore fait un rêve. J’ai vu le soleil, la lune et onze étoiles se prosterner devant moi.'
