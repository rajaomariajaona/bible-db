document_id: GEN.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La rupture de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le Serpent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ap 12.9 ; 20.2.
    marker-yv: yv-n
  - type: text
    text: ' était le plus astucieux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jeu de mots en hébreu avec le terme traduit « nus » (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.25'
        metadata:
          usfm: GEN.2.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' de tous les animaux des champs que l’Eternel Dieu avait faits. Il demanda à la femme : Vraiment, Dieu vous a dit : « Vous n’avez pas le droit de manger du fruit de tous les arbres du jardin ! » ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme répondit au Serpent : Nous mangeons des fruits des arbres du jardin, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: mais celui qui est au milieu du jardin Dieu a dit de ne pas manger de son fruit et de ne pas y toucher sinon nous mourrons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors le Serpent dit à la femme : Mais pas du tout ! Vous ne mourrez pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Seulement Dieu sait bien que le jour où vous en mangerez, vos yeux s’ouvriront et vous serez comme Dieu, décidant vous-mêmes ce qui est bien ou mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: connaissant le bien et le mal.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors la femme vit que le fruit de l’arbre était bon à manger, agréable aux yeux, et qu’il était précieux pour ouvrir l’intelligence. Elle prit donc de son fruit et en mangea. Elle en donna aussi à son mari qui était avec elle, et il en mangea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion en 2 Co 11.3 ; 1 Tm 2.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors les yeux de tous deux s’ouvrirent et ils se rendirent compte qu’ils étaient nus. Ils se firent donc des pagnes en cousant ensemble des feuilles de figuier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Au moment de la brise du soir, ils entendirent la voix de l’Eternel Dieu parcourant le jardin. Alors l’homme et sa femme se cachèrent de l’Eternel Dieu parmi les arbres du jardin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais l’Eternel Dieu appela l’homme et lui demanda : Où es-tu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui-ci répondit : J’ai entendu ta voix dans le jardin et j’ai eu peur, car je suis nu ; alors je me suis caché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu dit : Qui t’a appris que tu es nu ? Aurais-tu mangé du fruit de l’arbre dont je t’avais défendu de manger ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Adam répondit : La femme que tu as placée auprès de moi, c’est elle qui m’en a donné, et j’en ai mangé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Eternel Dieu dit à la femme : Pourquoi as-tu fait cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – C’est le Serpent qui m’a trompée, répondit la femme, et j’en ai mangé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors l’Eternel Dieu dit au Serpent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque toi, tu as fait cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es maudit ╵parmi tout le bétail
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tous les animaux sauvages :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu te traîneras sur le ventre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu mangeras de la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout au long de ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je susciterai de l’hostilité ╵entre toi et la femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entre ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 12.17
        metadata:
          usfm: REV.12.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵et sa descendance.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celle-ci t’écrasera la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu lui mordras
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu contient ici un jeu sur deux sens du même mot, le verbe traduit une fois par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'écraser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et une fois par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mordre. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 16.20
        metadata:
          usfm: ROM.16.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' le talon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dieu dit à la femme :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rendrai tes grossesses très pénibles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est dans la souffrance ╵que tu mettras au monde tes enfants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes attentes seront tournées vers ton mari,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais lui, il te dominera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il dit à Adam : Puisque tu as écouté ta femme et que tu as mangé du fruit de l’arbre dont je t’avais défendu de manger,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sol est maudit à cause de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est avec peine ╵que tu en tireras ta nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout au long de ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il te produira des épines ╵et des chardons ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu mangeras des produits du sol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu en tireras ton pain à la sueur de ton front
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce que tu retournes à la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque tu as été tiré de celle-ci.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car toi, tu es poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu retourneras à la poussière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’homme nomma sa femme Eve (Vie) ; elle est devenue en effet la mère de toute vie humaine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’Eternel Dieu fit à Adam et à sa femme des vêtements de peau pour les habiller.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il dit : Voici que l’homme est devenu comme l’un de nous pour décider du bien et du mal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour la connaissance du bien et du mal.
    marker-yv: yv-n
  - type: text
    text: . Maintenant il ne faudrait pas qu’il tende la main pour cueillir aussi du fruit de l’arbre de la vie, qu’il en mange et qu’il vive éternellement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors l’Eternel Dieu le chassa du jardin d’Eden pour qu’il travaille le sol d’où il avait été tiré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Après avoir chassé l’homme, il posta des chérubins à l’est du jardin d’Eden, avec une épée flamboyante tournoyant en tous sens pour barrer l’accès de l’arbre de la vie.
