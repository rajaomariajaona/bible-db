document_id: GEN.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La rupture de l’alliance
  - type: text
    content: Le Serpent
  - type: note
    content: Voir Ap 12.9 ; 20.2.
  - type: text
    content: ' était le plus astucieux'
  - type: note
    content: Jeu de mots en hébreu avec le terme traduit « nus » (2.25).
  - type: text
    content: ' de tous les animaux des champs que l’Eternel Dieu avait faits. Il demanda à la femme : Vraiment, Dieu vous a dit : « Vous n’avez pas le droit de manger du fruit de tous les arbres du jardin ! » ?'
  '10':
  - type: text
    content: 'Celui-ci répondit : J’ai entendu ta voix dans le jardin et j’ai eu peur, car je suis nu ; alors je me suis caché.'
  '11':
  - type: text
    content: 'Dieu dit : Qui t’a appris que tu es nu ? Aurais-tu mangé du fruit de l’arbre dont je t’avais défendu de manger ?'
  '12':
  - type: text
    content: 'Adam répondit : La femme que tu as placée auprès de moi, c’est elle qui m’en a donné, et j’en ai mangé.'
  '13':
  - type: text
    content: 'L’Eternel Dieu dit à la femme : Pourquoi as-tu fait cela ?'
  - type: text
    content: – C’est le Serpent qui m’a trompée, répondit la femme, et j’en ai mangé.
  '14':
  - type: text
    content: 'Alors l’Eternel Dieu dit au Serpent :'
  - type: text
    content: Puisque toi, tu as fait cela,
  - type: text
    content: tu es maudit ╵parmi tout le bétail
  - type: text
    content: 'et tous les animaux sauvages :'
  - type: text
    content: tu te traîneras sur le ventre,
  - type: text
    content: tu mangeras de la poussière
  - type: text
    content: tout au long de ta vie.
  '15':
  - type: text
    content: Je susciterai de l’hostilité ╵entre toi et la femme,
  - type: text
    content: entre ta descendance
  - type: note
    content: Voir Ap 12.17.
  - type: text
    content: ' ╵et sa descendance.'
  - type: text
    content: Celle-ci t’écrasera la tête,
  - type: text
    content: et tu lui mordras
  - type: note
    content: L’hébreu contient ici un jeu sur deux sens du même mot, le verbe traduit une fois par écraser et une fois par mordre. Allusion en Rm 16.20.
  - type: text
    content: ' le talon.'
  '16':
  - type: text
    content: 'Dieu dit à la femme :'
  - type: text
    content: Je rendrai tes grossesses très pénibles
  - type: text
    content: et c’est dans la souffrance ╵que tu mettras au monde tes enfants.
  - type: text
    content: Tes attentes seront tournées vers ton mari,
  - type: text
    content: mais lui, il te dominera.
  '17':
  - type: text
    content: 'Il dit à Adam : Puisque tu as écouté ta femme et que tu as mangé du fruit de l’arbre dont je t’avais défendu de manger,'
  - type: text
    content: le sol est maudit à cause de toi.
  - type: text
    content: C’est avec peine ╵que tu en tireras ta nourriture
  - type: text
    content: tout au long de ta vie.
  '18':
  - type: text
    content: Il te produira des épines ╵et des chardons ;
  - type: text
    content: et tu mangeras des produits du sol.
  '19':
  - type: text
    content: Tu en tireras ton pain à la sueur de ton front
  - type: text
    content: jusqu’à ce que tu retournes à la terre,
  - type: text
    content: puisque tu as été tiré de celle-ci.
  - type: text
    content: Car toi, tu es poussière
  - type: text
    content: et tu retourneras à la poussière.
  '2':
  - type: text
    content: 'La femme répondit au Serpent : Nous mangeons des fruits des arbres du jardin, '
  '20':
  - type: text
    content: L’homme nomma sa femme Eve (Vie) ; elle est devenue en effet la mère de toute vie humaine.
  '21':
  - type: text
    content: L’Eternel Dieu fit à Adam et à sa femme des vêtements de peau pour les habiller.
  '22':
  - type: text
    content: 'Puis il dit : Voici que l’homme est devenu comme l’un de nous pour décider du bien et du mal'
  - type: note
    content: 'D’autres comprennent : pour la connaissance du bien et du mal.'
  - type: text
    content: . Maintenant il ne faudrait pas qu’il tende la main pour cueillir aussi du fruit de l’arbre de la vie, qu’il en mange et qu’il vive éternellement.
  '23':
  - type: text
    content: Alors l’Eternel Dieu le chassa du jardin d’Eden pour qu’il travaille le sol d’où il avait été tiré.
  '24':
  - type: text
    content: Après avoir chassé l’homme, il posta des chérubins à l’est du jardin d’Eden, avec une épée flamboyante tournoyant en tous sens pour barrer l’accès de l’arbre de la vie.
  '3':
  - type: text
    content: mais celui qui est au milieu du jardin Dieu a dit de ne pas manger de son fruit et de ne pas y toucher sinon nous mourrons.
  '4':
  - type: text
    content: 'Alors le Serpent dit à la femme : Mais pas du tout ! Vous ne mourrez pas ! '
  '5':
  - type: text
    content: Seulement Dieu sait bien que le jour où vous en mangerez, vos yeux s’ouvriront et vous serez comme Dieu, décidant vous-mêmes ce qui est bien ou mal
  - type: note
    content: 'D’autres comprennent : connaissant le bien et le mal.'
  - type: text
    content: .
  '6':
  - type: text
    content: Alors la femme vit que le fruit de l’arbre était bon à manger, agréable aux yeux, et qu’il était précieux pour ouvrir l’intelligence. Elle prit donc de son fruit et en mangea. Elle en donna aussi à son mari qui était avec elle, et il en mangea
  - type: note
    content: Allusion en 2 Co 11.3 ; 1 Tm 2.14.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Alors les yeux de tous deux s’ouvrirent et ils se rendirent compte qu’ils étaient nus. Ils se firent donc des pagnes en cousant ensemble des feuilles de figuier.
  '8':
  - type: text
    content: Au moment de la brise du soir, ils entendirent la voix de l’Eternel Dieu parcourant le jardin. Alors l’homme et sa femme se cachèrent de l’Eternel Dieu parmi les arbres du jardin.
  '9':
  - type: text
    content: 'Mais l’Eternel Dieu appela l’homme et lui demanda : Où es-tu ?'
