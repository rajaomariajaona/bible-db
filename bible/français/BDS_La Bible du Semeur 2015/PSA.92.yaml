document_id: PSA.92
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Il est bon de louer l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume à chanter le jour du sabbat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il est bon de louer l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de te célébrer ╵par des chants, ╵ô Très-Haut !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et de proclamer, ╵dès le point du jour, ╵ton amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout au long des nuits, ╵ta fidélité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sur la cithare à dix cordes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme de sens incertain.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le luth et sur la lyre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sens incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce que tu fais, Eternel, ╵me remplit de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’acclamerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ouvrages de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que tes œuvres sont grandioses, ╵Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes pensées sont profondes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’insensé n’y connaît rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sot ne peut les comprendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si les malfaisants ╵croissent comme l’herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tous les méchants ╵sont si florissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pour périr à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais toi, tu es tout là-haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, ╵pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car voici tes ennemis, ╵Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car voici tes ennemis périssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux qui font le mal ╵seront dispersés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais tu me remplis de force, ╵je suis comme un buffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis enduit ╵d’huile fraîche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je regarde tous mes détracteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’entends tous mes adversaires ╵qui s’emploient au mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car les justes poussent ╵comme le palmier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils grandissent ╵comme un cèdre du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '92.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Symbole de la prospérité durable opposée à la croissance rapide mais éphémère du méchant (v. 8). Le palmier résiste à la chaleur du désert, le cèdre aux neiges du Liban.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bien plantés ╵dans la demeure de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils fleurissent ╵sur les parvis du temple, ╵de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils seront féconds ╵jusqu’en leur vieillesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils resteront ╵pleins de sève et de vigueur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ils proclameront ╵combien l’Eternel est droit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est mon rocher, ╵on ne trouve en lui ╵aucune injustice.
