document_id: PSA.92,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Il est bon de louer l’Eternel
  - type: text
    content: Psaume à chanter le jour du sabbat.
  '10':
  - type: text
    content: Car voici tes ennemis, ╵Eternel,
  - type: text
    content: car voici tes ennemis périssent,
  - type: text
    content: et tous ceux qui font le mal ╵seront dispersés !
  '11':
  - type: text
    content: Mais tu me remplis de force, ╵je suis comme un buffle,
  - type: text
    content: je me suis enduit ╵d’huile fraîche.
  '12':
  - type: text
    content: Je regarde tous mes détracteurs,
  - type: text
    content: j’entends tous mes adversaires ╵qui s’emploient au mal.
  '13':
  - type: text
    content: Car les justes poussent ╵comme le palmier,
  - type: text
    content: ils grandissent ╵comme un cèdre du Liban
  - type: note
    content: Symbole de la prospérité durable opposée à la croissance rapide mais éphémère du méchant (v. 8). Le palmier résiste à la chaleur du désert, le cèdre aux neiges du Liban.
  - type: text
    content: .
  '14':
  - type: text
    content: Bien plantés ╵dans la demeure de l’Eternel,
  - type: text
    content: ils fleurissent ╵sur les parvis du temple, ╵de notre Dieu.
  '15':
  - type: text
    content: Ils seront féconds ╵jusqu’en leur vieillesse
  - type: text
    content: et ils resteront ╵pleins de sève et de vigueur,
  '16':
  - type: text
    content: 'ils proclameront ╵combien l’Eternel est droit :'
  - type: text
    content: il est mon rocher, ╵on ne trouve en lui ╵aucune injustice.
  '2':
  - type: text
    content: Il est bon de louer l’Eternel,
  - type: text
    content: de te célébrer ╵par des chants, ╵ô Très-Haut !
  '3':
  - type: text
    content: Et de proclamer, ╵dès le point du jour, ╵ton amour,
  - type: text
    content: tout au long des nuits, ╵ta fidélité,
  '4':
  - type: text
    content: sur la cithare à dix cordes
  - type: note
    content: Terme de sens incertain.
  - type: text
    content: ','
  - type: text
    content: sur le luth et sur la lyre
  - type: note
    content: Sens incertain.
  - type: text
    content: .
  '5':
  - type: text
    content: Ce que tu fais, Eternel, ╵me remplit de joie
  - type: text
    content: et j’acclamerai
  - type: text
    content: les ouvrages de tes mains.
  '6':
  - type: text
    content: Que tes œuvres sont grandioses, ╵Eternel !
  - type: text
    content: Que tes pensées sont profondes !
  '7':
  - type: text
    content: L’insensé n’y connaît rien,
  - type: text
    content: le sot ne peut les comprendre.
  '8':
  - type: text
    content: Si les malfaisants ╵croissent comme l’herbe,
  - type: text
    content: si tous les méchants ╵sont si florissants,
  - type: text
    content: c’est pour périr à jamais.
  '9':
  - type: text
    content: Mais toi, tu es tout là-haut,
  - type: text
    content: Eternel, ╵pour toujours.
