document_id: PSA.92,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Il est bon de louer l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume à chanter le jour du sabbat.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici tes ennemis, ╵Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car voici tes ennemis périssent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux qui font le mal ╵seront dispersés !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu me remplis de force, ╵je suis comme un buffle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis enduit ╵d’huile fraîche.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je regarde tous mes détracteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’entends tous mes adversaires ╵qui s’emploient au mal.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les justes poussent ╵comme le palmier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils grandissent ╵comme un cèdre du Liban
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '92.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Symbole de la prospérité durable opposée à la croissance rapide mais éphémère du méchant (v. 8). Le palmier résiste à la chaleur du désert, le cèdre aux neiges du Liban.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien plantés ╵dans la demeure de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils fleurissent ╵sur les parvis du temple, ╵de notre Dieu.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront féconds ╵jusqu’en leur vieillesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils resteront ╵pleins de sève et de vigueur,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils proclameront ╵combien l’Eternel est droit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est mon rocher, ╵on ne trouve en lui ╵aucune injustice.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est bon de louer l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de te célébrer ╵par des chants, ╵ô Très-Haut !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de proclamer, ╵dès le point du jour, ╵ton amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout au long des nuits, ╵ta fidélité,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la cithare à dix cordes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '92.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Terme de sens incertain.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le luth et sur la lyre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '92.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que tu fais, Eternel, ╵me remplit de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’acclamerai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ouvrages de tes mains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes œuvres sont grandioses, ╵Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes pensées sont profondes !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’insensé n’y connaît rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sot ne peut les comprendre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si les malfaisants ╵croissent comme l’herbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tous les méchants ╵sont si florissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pour périr à jamais.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu es tout là-haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ╵pour toujours.
