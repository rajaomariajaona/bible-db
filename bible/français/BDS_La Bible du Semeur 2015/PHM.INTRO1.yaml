document_id: PHM.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: La lettre de Paul à Philémon traite une affaire privée. Elle est un plaidoyer en faveur d’un esclave du nom d’Onésime qui s’est converti auprès de Paul après s’être enfui de chez son maître, Philémon, un chrétien de la ville de Colosses. Paul demande à Philémon de l’accueillir comme un frère et de lui pardonner.
  - type: text
    content: Paul écrit de prison, vers l’an 62, lors de sa première captivité romaine. Ce billet personnel était probablement joint à la lettre aux Colossiens dont Tychique était le porteur (Col 4.7-9).
  - type: text
    content: Cette lettre soulève la question de l’attitude du chrétien du premier siècle envers l’esclavage. Paul ne dicte pas une conduite précise au maître chrétien, il lui demande seulement de tirer les conséquences de sa foi.
  - type: text
    content: 'Ce qui ressort surtout de cette lettre, c’est le zèle que déployait Paul aussi bien pour les affaires privées que pour les grandes causes, et Luther pouvait dire : « Paul imite auprès de Philémon et en faveur d’Onésime, ce que Christ a fait en notre faveur auprès de son Père » : il compatit (10, 20), il intercède (9, 10), il prend sur lui les dettes (18, 19).'
