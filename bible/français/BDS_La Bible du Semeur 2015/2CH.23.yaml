document_id: 2CH.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joas devient roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La septième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 835 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', le prêtre Yehoyada s’arma de courage et fit venir les chefs des « centaines'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une unité militaire comprenant peut-être quelques dizaines de soldats.
    marker-yv: yv-n
  - type: text
    text: '  » : Azaria, fils de Yeroham, Ismaël, fils de Yohanân, Azaria, fils d’Obed, Maaséya, fils d’Adaya, et Elishaphath, fils de Zikri, et il fit un pacte avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les officiers parcoururent le royaume de Juda et rassemblèrent les lévites de toutes les villes de Juda et les chefs des groupes familiaux d’Israël, puis ils revinrent avec eux à Jérusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et toute cette assemblée conclut une alliance avec le jeune roi dans le Temple. Yehoyada leur dit : Voici le fils du roi, il régnera conformément à la promesse que l’Eternel a faite au sujet des descendants de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 17.10-14 ; 2 Ch 6.16 ; 7.18 ; 2 S 7.16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici ce que vous allez faire : ce prochain sabbat, l’une de vos compagnies sera de service ; en qualité de prêtres et de lévites, un tiers d’entre eux gardera les entrées, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'un autre tiers surveillera le palais royal, la troisième section se tiendra en faction à la porte de Yesod. Tout le peuple occupera le parvis du temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Personne ne doit pénétrer dans le temple de l’Eternel, excepté les prêtres et les lévites de service qui pourront y entrer puisqu’ils sont saints. Tout le monde doit respecter le rituel prescrit par l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les lévites entoureront le roi de tous les côtés, chacun les armes à la main. Quiconque voudra forcer l’accès au Temple sera mis à mort. Vous accompagnerez le roi dans toutes ses allées et venues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les lévites et tous les Judéens exécutèrent ponctuellement tous les ordres que le prêtre Yehoyada leur avait donnés. Ils prirent chacun leurs hommes, ceux qui commençaient leur service le jour du repos et ceux qui le terminaient ce jour-là, car le prêtre Yehoyada n’avait donné congé à aucune des classes de lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le prêtre Yehoyada remit aux chefs de « centaines » les lances ainsi que les grands et les petits boucliers du roi David qui se trouvaient dans le Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il posta tous les hommes en demi-cercle, chacun son javelot à la main, en demi-cercle devant l’édifice, depuis l’angle sud-est du Temple jusqu’à l’angle nord-est, près de l’autel, de manière à entourer le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors on fit sortir le fils du roi, on plaça la couronne sur sa tête et on lui remit l’acte de l’alliance. On le sacra roi : Yehoyada et ses fils l’oignirent d’huile et ils crièrent : Vive le roi !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Athalie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Athalie entendit le bruit du peuple qui accourait et acclamait le roi. Elle vint au milieu de la foule au temple de l’Eternel, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'regarda et vit le roi qui se tenait debout sur son estrade à l’entrée du sanctuaire. Il était entouré des capitaines de la garde et des joueurs de trompette. Toute la population exultait de joie tandis qu’on sonnait des trompettes et que les musiciens, accompagnés de leurs instruments, dirigeaient les chants de louanges. A ce spectacle, Athalie déchira ses vêtements et dit : C’est un complot ! C’est un complot !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors le prêtre Yehoyada fit avancer les chefs de « centaines » qui commandaient l’armée et leur ordonna : Faites-la sortir de l’enceinte du Temple entre les rangs ! Et si quelqu’un la suit, qu’il soit mis à mort. Car, dit le prêtre, ne la mettez pas à mort dans l’enceinte du temple de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils s’emparèrent donc d’Athalie et la menèrent vers le palais royal par l’entrée de la porte des chevaux : c’est là qu’ils la mirent à mort.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joas monte sur le trône
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Yehoyada conclut entre lui, tout le peuple et le roi une alliance qui les engageait à être le peuple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toute la population se rendit au temple de Baal et le démolit. On mit en pièces ses autels et ses statues, et l’on tua devant les autels Mattân, le prêtre de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yehoyada confia la surveillance du temple de l’Eternel aux prêtres-lévites que David avait répartis pour le service du temple de l’Eternel, afin d’offrir des holocaustes à l’Eternel, conformément aux prescriptions de la Loi de Moïse, dans la joie, et en chantant les cantiques composés par David. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il installa les portiers aux entrées du temple de l’Eternel pour en interdire l’entrée à toute personne rituellement impure, pour quelque raison que ce soit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il rassembla les chefs de « centaines », les notables, les dirigeants du peuple, ainsi que toute la population du pays, et il fit descendre le roi du Temple au palais royal par la porte supérieure. On installa le roi sur le trône du royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tout le peuple du pays était dans la joie, et le calme régnait dans la ville maintenant qu’on avait fait mourir Athalie.
