document_id: 1KI.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le meurtre de Naboth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelque temps après ces événements, voici ce qui arriva : Naboth, un habitant de Jizréel, possédait une vigne à Jizréel, près du palais d’Achab, roi de Samarie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Samarie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est la capitale du royaume du Nord, elle représente tout le royaume. Achab possédait un palais à Jizréel (comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 18.45-46
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: et faites asseoir en face de lui deux vauriens qui l’accuseront d’avoir maudit Dieu et le roi ! Puis menez-le en dehors de la ville et lapidez-le pour le faire mourir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 24.10-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les gens de la ville de Naboth, les responsables et les magistrats, concitoyens de Naboth, obéirent à l’ordre de Jézabel et firent ce qu’elle demandait dans les lettres qu’elle leur avait envoyées. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils proclamèrent un jeûne et firent asseoir Naboth au premier rang de l’assemblée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les deux vauriens vinrent se placer en face de lui et se mirent à l’accuser devant tout le monde en disant : Naboth a maudit Dieu et le roi !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors on le fit sortir de la ville et on le lapida et il mourut. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puis les autorités de la ville envoyèrent dire à Jézabel : Naboth a été lapidé ; il est mort.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsque Jézabel apprit que Naboth avait été lapidé et qu’il était mort, elle dit à Achab : Lève-toi, va prendre possession de la vigne de Naboth de Jizréel qui a refusé de te la vendre, car Naboth n’est plus en vie ; il est mort.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lorsqu’il entendit que Naboth était mort, Achab se mit en route pour se rendre à la vigne de Naboth de Jizréel afin d’en prendre possession.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie annonce le châtiment
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors l’Eternel adressa la parole à Elie de Tishbé en ces termes : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mets-toi en route, va trouver Achab, le roi d’Israël, qui vit à Samarie. En ce moment, il se trouve dans la vigne de Naboth où il est allé pour en prendre possession. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu lui parleras en ces termes : « Voici ce que déclare l’Eternel : Quoi ? Après avoir assassiné l’homme, tu prétends prendre possession de ses biens ! » Tu ajouteras : « Voici ce que déclare l’Eternel : A l’endroit même où les chiens ont léché le sang de Naboth, ils lécheront aussi le tien. »'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Achab fit à Naboth la proposition suivante : Cède-moi ta vigne. Je voudrais en faire un jardin potager, car elle est juste à côté de mon palais. Je te donnerai en échange une vigne meilleure ou, si tu préfères, je t’en paierai la valeur en argent.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En voyant Elie, Achab s’écria : Ah ! Te voilà, mon ennemi ! Tu m’as donc retrouvé !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elie répondit : Oui, je t’ai retrouvé parce que tu t’es vendu toi-même au mal en faisant ce qui déplaît à l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Eh bien, voici ce qu’il déclare : « Je vais te frapper d’un grand malheur : je te balaierai de la surface de la terre, toi et ta descendance, je retrancherai d’Israël tous les hommes de ta famille, qu’ils soient esclaves ou hommes libres. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Je traiterai ta famille comme celle de Jéroboam, fils de Nebath, et celle de Baésha, fils d’Ahiya, parce que tu m’as irrité et que tu as entraîné Israël dans le péché. » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’Eternel annonce aussi quelque chose concernant Jézabel : les chiens la dévoreront près du rempart de Jizréel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 9.36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tout membre de ta famille, Achab, qui mourra dans la ville sera mangé par les chiens, et celui qui mourra dans la campagne sera déchiqueté par les rapaces.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En vérité, personne ne s’était jamais vendu au mal autant qu’Achab en faisant ce que l’Eternel considère comme mal. C’est que sa femme Jézabel l’y poussait. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il agit de façon abominable en adoptant le culte des idoles, tout comme les Amoréens que l’Eternel avait dépossédés en faveur des Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le terme d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amoréens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne tous les peuples habitant le pays alloué à Israël avant l’arrivée des Israélites (voir Gn 15.16 ; Ex 23.23 ; Dt 1.7).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Achab s’humilie
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Après avoir entendu les paroles d’Elie, Achab déchira ses vêtements en signe d’humiliation, il revêtit un habit de toile de sac à même la peau et refusa de manger ; la nuit, il dormait dans ce vêtement ; et le jour, il se traînait à pas lents. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors l’Eternel adressa de nouveau la parole à Elie de Tishbé. Il lui dit : '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: As-tu vu comment Achab s’est humilié devant moi ? Puisqu’il s’est humilié ainsi, je ne ferai pas venir le malheur pendant sa vie, mais c’est durant le règne de son fils que j’amènerai la catastrophe sur sa famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 10.1-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais Naboth répondit à Achab : Que l’Eternel me garde de te céder la propriété héritée de mes ancêtres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Achab rentra chez lui, maussade et abattu, parce que Naboth de Jizréel lui avait dit qu’il ne lui céderait pas la propriété héritée de ses ancêtres. Il se jeta sur son lit, tourna le visage contre le mur et refusa de manger.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sa femme Jézabel vint le trouver et lui demanda : Pourquoi es-tu de si mauvaise humeur et refuses-tu de manger ?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il lui répondit : J’ai parlé à Naboth de Jizréel et je lui ai proposé de lui acheter sa vigne ou, s’il préférait, de l’échanger contre une autre. Mais il a répondu : « Je ne te céderai pas ma vigne ! »'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors sa femme Jézabel lui dit : Est-ce toi qui exerces la royauté sur Israël ? Allons ! Lève-toi, mange et réjouis-toi : la vigne de Naboth de Jizréel, je vais te la donner.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Elle écrivit des lettres au nom d’Achab, les scella du sceau royal et les fit porter aux responsables et aux magistrats de la ville où demeurait Naboth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dans ces lettres, elle leur ordonnait : « Proclamez un jour de jeûne. Installez Naboth au premier rang de l’assemblée '
