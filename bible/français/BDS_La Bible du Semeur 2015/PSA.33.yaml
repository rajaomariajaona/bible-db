document_id: PSA.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Dieu créateur et sauveur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vous tous qui êtes justes, ╵acclamez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il convient aux hommes droits ╵de le louer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Célébrez l’Eternel, ╵avec la lyre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et louez-le ╵en jouant du luth à dix cordes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Chantez en son honneur ╵un cantique nouveau !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jouez de tout votre art ╵afin de l’acclamer !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car la parole ╵de l’Eternel est droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute son œuvre est sûre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dieu aime la justice ╵et la droiture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’amour de l’Eternel ╵remplit la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les cieux ont été faits ╵par la parole ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute l’armée des étoiles ╵est née du souffle de sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les eaux des mers, ╵il les amasse et les endigue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tient les eaux profondes ╵comme en un réservoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que sur la terre entière ╵on craigne l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils tremblent devant lui, ╵les habitants du monde !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car lorsqu’il a parlé ╵cela s’est fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’il a commandé, ╵cela est apparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’Eternel fait échec ╵aux desseins des nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il réduit à néant ╵ce que les peuples projetaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les plans de l’Eternel ╵demeurent pour toujours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses projets ╵subsistent d’âge en âge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Heureux le peuple ╵dont l’Eternel est Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, le peuple qu’il s’est choisi ╵pour patrimoine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Du haut du ciel, ╵l’Eternel regarde la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il voit tous les humains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De son trône
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du lieu de sa demeure.
    marker-yv: yv-n
  - type: text
    text: ', il observe'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les habitants de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il a formé leur cœur à tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il reste attentif ╵à chacun de leurs actes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le roi n’est pas sauvé ╵par une armée nombreuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le guerrier n’est pas délivré ╵par une grande force
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 16-17, voir 18.30-34 ; 147.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pour avoir la victoire, ╵le secours du cheval ╵est illusoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa vigueur ╵ne suffit pas pour triompher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais l’Eternel prend soin ╵de tous ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comptant sur son amour
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: pour les délivrer de la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: et préserver leur vie ╵aux jours de la famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oui, nous comptons sur l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est notre secours ╵et notre bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Notre cœur trouve en lui sa joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et notre confiance, ╵nous la plaçons dans le Dieu saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Accorde-nous ta grâce, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous comptons sur toi.
