document_id: PSA.33,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Dieu créateur et sauveur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous qui êtes justes, ╵acclamez l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il convient aux hommes droits ╵de le louer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel fait échec ╵aux desseins des nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il réduit à néant ╵ce que les peuples projetaient.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plans de l’Eternel ╵demeurent pour toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses projets ╵subsistent d’âge en âge.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux le peuple ╵dont l’Eternel est Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, le peuple qu’il s’est choisi ╵pour patrimoine.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du haut du ciel, ╵l’Eternel regarde la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voit tous les humains.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De son trône
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du lieu de sa demeure.
      marker-yv: yv-n
    - type: text
      text: ', il observe'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les habitants de la terre.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a formé leur cœur à tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il reste attentif ╵à chacun de leurs actes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi n’est pas sauvé ╵par une armée nombreuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le guerrier n’est pas délivré ╵par une grande force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 16-17, voir 18.30-34 ; 147.10.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour avoir la victoire, ╵le secours du cheval ╵est illusoire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute sa vigueur ╵ne suffit pas pour triompher.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Eternel prend soin ╵de tous ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comptant sur son amour
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les délivrer de la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et préserver leur vie ╵aux jours de la famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez l’Eternel, ╵avec la lyre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et louez-le ╵en jouant du luth à dix cordes !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, nous comptons sur l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est notre secours ╵et notre bouclier.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre cœur trouve en lui sa joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et notre confiance, ╵nous la plaçons dans le Dieu saint.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accorde-nous ta grâce, ╵ô Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous comptons sur toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez en son honneur ╵un cantique nouveau !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jouez de tout votre art ╵afin de l’acclamer !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la parole ╵de l’Eternel est droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute son œuvre est sûre.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu aime la justice ╵et la droiture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’amour de l’Eternel ╵remplit la terre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux ont été faits ╵par la parole ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute l’armée des étoiles ╵est née du souffle de sa bouche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux des mers, ╵il les amasse et les endigue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tient les eaux profondes ╵comme en un réservoir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que sur la terre entière ╵on craigne l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils tremblent devant lui, ╵les habitants du monde !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car lorsqu’il a parlé ╵cela s’est fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu’il a commandé, ╵cela est apparu.
