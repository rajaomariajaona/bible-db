document_id: PSA.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Dieu créateur et sauveur
  - type: text
    content: Vous tous qui êtes justes, ╵acclamez l’Eternel !
  - type: text
    content: Car il convient aux hommes droits ╵de le louer.
  '10':
  - type: text
    content: L’Eternel fait échec ╵aux desseins des nations.
  - type: text
    content: Il réduit à néant ╵ce que les peuples projetaient.
  '11':
  - type: text
    content: Les plans de l’Eternel ╵demeurent pour toujours
  - type: text
    content: et ses projets ╵subsistent d’âge en âge.
  '12':
  - type: text
    content: Heureux le peuple ╵dont l’Eternel est Dieu,
  - type: text
    content: oui, le peuple qu’il s’est choisi ╵pour patrimoine.
  '13':
  - type: text
    content: Du haut du ciel, ╵l’Eternel regarde la terre.
  - type: text
    content: Il voit tous les humains.
  '14':
  - type: text
    content: De son trône
  - type: note
    content: 'Autre traduction : du lieu de sa demeure.'
  - type: text
    content: ', il observe'
  - type: text
    content: tous les habitants de la terre.
  '15':
  - type: text
    content: Il a formé leur cœur à tous,
  - type: text
    content: et il reste attentif ╵à chacun de leurs actes.
  '16':
  - type: text
    content: Le roi n’est pas sauvé ╵par une armée nombreuse,
  - type: text
    content: le guerrier n’est pas délivré ╵par une grande force
  - type: note
    content: Pour les v. 16-17, voir 18.30-34 ; 147.10.
  - type: text
    content: .
  '17':
  - type: text
    content: Pour avoir la victoire, ╵le secours du cheval ╵est illusoire,
  - type: text
    content: et toute sa vigueur ╵ne suffit pas pour triompher.
  '18':
  - type: text
    content: Mais l’Eternel prend soin ╵de tous ceux qui le craignent,
  - type: text
    content: comptant sur son amour
  '19':
  - type: text
    content: pour les délivrer de la mort
  - type: text
    content: et préserver leur vie ╵aux jours de la famine.
  '2':
  - type: text
    content: Célébrez l’Eternel, ╵avec la lyre
  - type: text
    content: et louez-le ╵en jouant du luth à dix cordes !
  '20':
  - type: text
    content: Oui, nous comptons sur l’Eternel,
  - type: text
    content: il est notre secours ╵et notre bouclier.
  '21':
  - type: text
    content: Notre cœur trouve en lui sa joie,
  - type: text
    content: et notre confiance, ╵nous la plaçons dans le Dieu saint.
  '22':
  - type: text
    content: Accorde-nous ta grâce, ╵ô Eternel,
  - type: text
    content: car nous comptons sur toi.
  '3':
  - type: text
    content: Chantez en son honneur ╵un cantique nouveau !
  - type: text
    content: Jouez de tout votre art ╵afin de l’acclamer !
  '4':
  - type: text
    content: Car la parole ╵de l’Eternel est droite,
  - type: text
    content: toute son œuvre est sûre.
  '5':
  - type: text
    content: Dieu aime la justice ╵et la droiture.
  - type: text
    content: L’amour de l’Eternel ╵remplit la terre.
  '6':
  - type: text
    content: Les cieux ont été faits ╵par la parole ╵de l’Eternel,
  - type: text
    content: et toute l’armée des étoiles ╵est née du souffle de sa bouche.
  '7':
  - type: text
    content: Les eaux des mers, ╵il les amasse et les endigue,
  - type: text
    content: il tient les eaux profondes ╵comme en un réservoir.
  '8':
  - type: text
    content: Que sur la terre entière ╵on craigne l’Eternel !
  - type: text
    content: Qu’ils tremblent devant lui, ╵les habitants du monde !
  '9':
  - type: text
    content: Car lorsqu’il a parlé ╵cela s’est fait,
  - type: text
    content: lorsqu’il a commandé, ╵cela est apparu.
