document_id: DAN.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Récits sous la domination babylonienne
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A la cour du roi de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La troisième année du règne de Yehoyaqim, roi de Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire, selon la manière babylonienne de compter les années, 605 av. J.-C. Voir 2 R 24.1 ; 2 Ch 36.5-7. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yehoyaqim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a régné de 609 à 598 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', Nabuchodonosor, roi de Babylone, vint assiéger Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais celui-ci dit à Daniel : Je crains mon seigneur le roi qui a prescrit ce que vous devez manger et boire. Si jamais il trouvait que vous avez l’air d’être en moins bonne santé que les autres jeunes gens de votre âge, à cause de vous, le roi me tiendrait pour coupable, au prix de ma tête.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors Daniel parla à l’intendant auquel le chef du personnel avait confié la responsabilité de prendre soin de lui, ainsi que de Hanania, de Mishaël et d’Azaria. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il lui proposa : Fais, je te prie, un essai, avec nous, tes serviteurs, pendant dix jours : qu’on nous serve seulement des légumes à manger et de l’eau à boire. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ensuite, tu compareras nos mines avec celles des jeunes gens qui mangent les mets du roi. Après cela, tu décideras d’agir envers nous selon ce que tu auras constaté.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’intendant accepta leur proposition et fit un essai pendant dix jours.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et au bout de ces dix jours, il était manifeste qu’ils avaient meilleure mine et qu’ils étaient en meilleure forme physique que tous les jeunes gens qui mangeaient les mets du roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dès lors, l’intendant mit de côté les mets et le vin qui leur étaient destinés et leur fit servir seulement des légumes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Dieu accorda à ces quatre jeunes gens le savoir et la compréhension de toute la littérature et de la sagesse. De plus, Daniel savait interpréter toutes les visions et tous les rêves.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'A la fin de la période fixée par le roi, le chef du personnel introduisit les jeunes gens en présence de Nabuchodonosor. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le roi s’entretint avec eux et, de tous les jeunes gens qui lui furent présentés, il n’en trouva aucun comme Daniel, Hanania, Mishaël et Azaria. C’est pourquoi ils entrèrent au service personnel du roi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le Seigneur lui donna la victoire sur Yehoyaqim et lui livra une partie des objets du Temple. Nabuchodonosor les fit transporter en Babylonie, dans le temple de son dieu et il déposa ces objets dans la salle du trésor de son dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 2-4, voir 2 R 20.17-20 ; 24.10-16 ; 2 Ch 36.10 ; Es 39.6-7.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Chaque fois que le roi les consultait sur une question exigeant de la sagesse et du discernement, il les trouvait dix fois supérieurs à tous les mages et magiciens de son royaume. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Daniel demeura à la cour de Babylone jusqu’à la première année du règne du roi Cyrus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de la première année du règne de Cyrus sur Babylone, c’est-à-dire en 539 ou 538 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le roi ordonna à Ashpenaz, chef de son personnel, de faire venir des Israélites de lignée royale ou de famille noble, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'quelques jeunes gens sans défaut physique et de belle apparence. Ils devaient être doués d’intelligence, de sagesse dans tous les domaines, posséder de grandes connaissances, être capables d’apprendre la science et de bonne constitution pour entrer au service du palais royal et apprendre la langue et la littérature des Chaldéens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le roi leur prescrivit pour chaque jour une part des mets de la table royale et du vin dont il buvait lui-même. Leur formation devait durer trois ans, après quoi ils entreraient au service personnel du roi.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Parmi les Judéens qui furent sélectionnés se trouvaient Daniel, Hanania, Mishaël et Azaria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le chef du personnel leur attribua de nouveaux noms, il appela Daniel Beltshatsar, Hanania Shadrak, Mishaël Méshak et Azaria Abed-Nego
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ces changements de nom marquent, selon certains, le passage sous l’autorité du roi de Babylone ; pour d’autres, c’est par commodité et non par idéologie que l’on changeait le nom des étrangers (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 41.45
        - type: text
          text: '). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beltshatsar
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon certains, « Que sa vie soit protégée », selon d’autres : « Dame ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bélet, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'titre de l’épouse du dieu Mardouk ou Bel, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.5'
        - type: text
          text: '), protège le roi ! » '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shadrak
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '« Je crains beaucoup (Dieu) ». '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Méshak
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '« Je suis de peu de valeur ». '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abed-Nego
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: « Serviteur de celui qui resplendit » ou « serviteur de Nabû », dieu mésopotamien.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Daniel prit dans son cœur la résolution de ne pas se rendre impur en consommant les mets du roi et en buvant de son vin. Il supplia le chef du personnel de ne pas l’obliger à se rendre impur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Afin de ne pas transgresser les prescriptions alimentaires de la Loi mosaïque concernant la viande (Lv 11 ; 17.10-16 ; 20.25). Pour ce qui est de l’abstinence de vin, elle pouvait marquer le refus d’une alliance avec Nabuchodonosor engageant à une loyauté inconditionnelle, les jeunes Juifs acceptant de servir l’empereur, mais dans certaines limites seulement.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et Dieu lui accorda la faveur du chef du personnel et lui fit trouver en lui quelqu’un de compréhensif. '
