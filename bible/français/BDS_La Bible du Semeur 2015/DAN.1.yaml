document_id: DAN.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Récits sous la domination babylonienne
  - type: heading
    content: A la cour du roi de Babylone
  - type: text
    content: La troisième année du règne de Yehoyaqim, roi de Juda
  - type: note
    content: C’est-à-dire, selon la manière babylonienne de compter les années, 605 av. J.-C. Voir 2 R 24.1 ; 2 Ch 36.5-7. Yehoyaqim a régné de 609 à 598 av. J.-C.
  - type: text
    content: ', Nabuchodonosor, roi de Babylone, vint assiéger Jérusalem. '
  '10':
  - type: text
    content: 'Mais celui-ci dit à Daniel : Je crains mon seigneur le roi qui a prescrit ce que vous devez manger et boire. Si jamais il trouvait que vous avez l’air d’être en moins bonne santé que les autres jeunes gens de votre âge, à cause de vous, le roi me tiendrait pour coupable, au prix de ma tête.'
  '11':
  - type: text
    content: 'Alors Daniel parla à l’intendant auquel le chef du personnel avait confié la responsabilité de prendre soin de lui, ainsi que de Hanania, de Mishaël et d’Azaria. '
  '12':
  - type: text
    content: 'Il lui proposa : Fais, je te prie, un essai, avec nous, tes serviteurs, pendant dix jours : qu’on nous serve seulement des légumes à manger et de l’eau à boire. '
  '13':
  - type: text
    content: Ensuite, tu compareras nos mines avec celles des jeunes gens qui mangent les mets du roi. Après cela, tu décideras d’agir envers nous selon ce que tu auras constaté.
  '14':
  - type: text
    content: L’intendant accepta leur proposition et fit un essai pendant dix jours.
  '15':
  - type: text
    content: 'Et au bout de ces dix jours, il était manifeste qu’ils avaient meilleure mine et qu’ils étaient en meilleure forme physique que tous les jeunes gens qui mangeaient les mets du roi. '
  '16':
  - type: text
    content: 'Dès lors, l’intendant mit de côté les mets et le vin qui leur étaient destinés et leur fit servir seulement des légumes. '
  '17':
  - type: text
    content: Dieu accorda à ces quatre jeunes gens le savoir et la compréhension de toute la littérature et de la sagesse. De plus, Daniel savait interpréter toutes les visions et tous les rêves.
  '18':
  - type: text
    content: 'A la fin de la période fixée par le roi, le chef du personnel introduisit les jeunes gens en présence de Nabuchodonosor. '
  '19':
  - type: text
    content: 'Le roi s’entretint avec eux et, de tous les jeunes gens qui lui furent présentés, il n’en trouva aucun comme Daniel, Hanania, Mishaël et Azaria. C’est pourquoi ils entrèrent au service personnel du roi. '
  '2':
  - type: text
    content: Le Seigneur lui donna la victoire sur Yehoyaqim et lui livra une partie des objets du Temple. Nabuchodonosor les fit transporter en Babylonie, dans le temple de son dieu et il déposa ces objets dans la salle du trésor de son dieu
  - type: note
    content: Pour les v. 2-4, voir 2 R 20.17-20 ; 24.10-16 ; 2 Ch 36.10 ; Es 39.6-7.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Chaque fois que le roi les consultait sur une question exigeant de la sagesse et du discernement, il les trouvait dix fois supérieurs à tous les mages et magiciens de son royaume. '
  '21':
  - type: text
    content: Daniel demeura à la cour de Babylone jusqu’à la première année du règne du roi Cyrus
  - type: note
    content: Il s’agit de la première année du règne de Cyrus sur Babylone, c’est-à-dire en 539 ou 538 av. J.-C.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Le roi ordonna à Ashpenaz, chef de son personnel, de faire venir des Israélites de lignée royale ou de famille noble, '
  '4':
  - type: text
    content: 'quelques jeunes gens sans défaut physique et de belle apparence. Ils devaient être doués d’intelligence, de sagesse dans tous les domaines, posséder de grandes connaissances, être capables d’apprendre la science et de bonne constitution pour entrer au service du palais royal et apprendre la langue et la littérature des Chaldéens. '
  '5':
  - type: text
    content: Le roi leur prescrivit pour chaque jour une part des mets de la table royale et du vin dont il buvait lui-même. Leur formation devait durer trois ans, après quoi ils entreraient au service personnel du roi.
  '6':
  - type: text
    content: 'Parmi les Judéens qui furent sélectionnés se trouvaient Daniel, Hanania, Mishaël et Azaria. '
  '7':
  - type: text
    content: Le chef du personnel leur attribua de nouveaux noms, il appela Daniel Beltshatsar, Hanania Shadrak, Mishaël Méshak et Azaria Abed-Nego
  - type: note
    content: 'Ces changements de nom marquent, selon certains, le passage sous l’autorité du roi de Babylone ; pour d’autres, c’est par commodité et non par idéologie que l’on changeait le nom des étrangers (voir Gn 41.45). Beltshatsar: selon certains, « Que sa vie soit protégée », selon d’autres : « Dame (Bélet, titre de l’épouse du dieu Mardouk ou Bel, voir 4.5), protège le roi ! » Shadrak: « Je crains beaucoup (Dieu) ». Méshak: « Je suis de peu de valeur ». Abed-Nego: « Serviteur de celui qui resplendit » ou « serviteur de Nabû », dieu mésopotamien.'
  - type: text
    content: .
  '8':
  - type: text
    content: Daniel prit dans son cœur la résolution de ne pas se rendre impur en consommant les mets du roi et en buvant de son vin. Il supplia le chef du personnel de ne pas l’obliger à se rendre impur
  - type: note
    content: Afin de ne pas transgresser les prescriptions alimentaires de la Loi mosaïque concernant la viande (Lv 11 ; 17.10-16 ; 20.25). Pour ce qui est de l’abstinence de vin, elle pouvait marquer le refus d’une alliance avec Nabuchodonosor engageant à une loyauté inconditionnelle, les jeunes Juifs acceptant de servir l’empereur, mais dans certaines limites seulement.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Et Dieu lui accorda la faveur du chef du personnel et lui fit trouver en lui quelqu’un de compréhensif. '
