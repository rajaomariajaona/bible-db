document_id: PSA.77,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu aurait-il changé ?
  - type: text
    content: Au chef de chœur, selon Yedoutoun
  - type: note
    content: Voir note 39.1.
  - type: text
    content: . Un psaume d’Asaph
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Dieu a-t-il oublié ╵de manifester sa faveur ?
  - type: text
    content: A-t-il, dans sa colère, ╵éteint sa compassion ? »
  - type: text
    content: Pause
  '11':
  - type: text
    content: 'Voici, me dis-je, ╵ce qui fait ma souffrance :'
  - type: text
    content: « Le Très-Haut n’agit plus ╵comme autrefois. »
  '12':
  - type: text
    content: Je me rappellerai ╵ce qu’a fait l’Eternel.
  - type: text
    content: Oui, je veux évoquer ╵tes prodiges passés,
  '13':
  - type: text
    content: je veux méditer sur toutes tes œuvres,
  - type: text
    content: et réfléchir à tes hauts faits.
  '14':
  - type: text
    content: Dieu, tu agis saintement !
  - type: text
    content: Quel dieu est aussi grand que Dieu ?
  '15':
  - type: text
    content: Car toi, tu es le Dieu ╵qui réalise des prodiges !
  - type: text
    content: Tu as manifesté ╵ta puissance parmi les peuples.
  '16':
  - type: text
    content: Et tu as libéré ton peuple,
  - type: text
    content: les enfants de Jacob, ╵comme ceux de Joseph,
  - type: text
    content: en mettant en œuvre ta force.
  - type: text
    content: Pause
  '17':
  - type: text
    content: Les eaux
  - type: note
    content: Les eaux de la mer des Roseaux lors de l’Exode que rappellent les v. 17-20.
  - type: text
    content: ' t’ont vu, ô Dieu,'
  - type: text
    content: les eaux t’ont vu, ╵et elles se sont mises ╵à bouillonner,
  - type: text
    content: et même les abîmes ╵ont été ébranlés.
  '18':
  - type: text
    content: Les nuées déversèrent ╵de la pluie en torrents,
  - type: text
    content: et dans le ciel d’orage, ╵retentit le tonnerre.
  - type: text
    content: Tes flèches
  - type: note
    content: C’est-à-dire les éclairs (18.15 ; 97.4 ; 144.6).
  - type: text
    content: ' sillonnaient ╵le ciel dans tous les sens.'
  '19':
  - type: text
    content: Au vacarme de ton tonnerre, ╵du sein de la tornade,
  - type: text
    content: l’éclat de tes éclairs ╵illuminait le monde,
  - type: text
    content: et la terre en fut ébranlée, ╵et se mit à trembler.
  '2':
  - type: text
    content: J’appelle Dieu, ╵je crie vers lui ;
  - type: text
    content: j’appelle Dieu, ╵et il m’écoute.
  '20':
  - type: text
    content: Au milieu de la mer, ╵tu as frayé ta route
  - type: text
    content: et tracé ton sentier ╵parmi les grandes eaux
  - type: note
    content: Voir Ex 14 et 15.
  - type: text
    content: .
  - type: text
    content: Et nul n’a discerné ╵la trace de tes pas.
  '21':
  - type: text
    content: Tu as conduit ton peuple ╵comme un troupeau
  - type: text
    content: Par le moyen ╵du ministère de Moïse ╵et d’Aaron.
  '3':
  - type: text
    content: Au jour de ma détresse, ╵je m’adresse au Seigneur
  - type: text
    content: tout au long de la nuit, sans cesse, ╵je tends les mains vers lui,
  - type: text
    content: je reste inconsolable.
  '4':
  - type: text
    content: Dès que je pense à Dieu, ╵je me mets à gémir,
  - type: text
    content: et quand je réfléchis, ╵j’ai l’esprit abattu.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Quand je veux m’endormir, ╵tu me tiens en éveil.
  - type: text
    content: 'Me voici dans le trouble : ╵je ne sais plus que dire.'
  '6':
  - type: text
    content: Je songe aux jours passés,
  - type: text
    content: aux années d’autrefois,
  '7':
  - type: text
    content: j’évoque mes cantiques, ╵au milieu de la nuit,
  - type: text
    content: je médite en moi-même,
  - type: text
    content: 'et les questions me viennent :'
  '8':
  - type: text
    content: « L’abandon du Seigneur ╵va-t-il durer toujours ?
  - type: text
    content: Ne redeviendra-t-il ╵plus jamais favorable ?
  '9':
  - type: text
    content: Son amour serait-il ╵épuisé à jamais ?
  - type: text
    content: Sa parole va-t-elle pour toujours ╵rester sans suite ?
