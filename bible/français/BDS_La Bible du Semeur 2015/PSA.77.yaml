verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu aurait-il changé ?
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, selon Yedoutoun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '39.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Un psaume d’Asaph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '50.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a-t-il oublié ╵de manifester sa faveur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A-t-il, dans sa colère, ╵éteint sa compassion ? »
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, me dis-je, ╵ce qui fait ma souffrance :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Le Très-Haut n’agit plus ╵comme autrefois. »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me rappellerai ╵ce qu’a fait l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je veux évoquer ╵tes prodiges passés,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux méditer sur toutes tes œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et réfléchir à tes hauts faits.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, tu agis saintement !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel dieu est aussi grand que Dieu ?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toi, tu es le Dieu ╵qui réalise des prodiges !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as manifesté ╵ta puissance parmi les peuples.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as libéré ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les enfants de Jacob, ╵comme ceux de Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en mettant en œuvre ta force.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les eaux de la mer des Roseaux lors de l’Exode que rappellent les v. 17-20.
      marker-yv: yv-n
    - type: text
      text: ' t’ont vu, ô Dieu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les eaux t’ont vu, ╵et elles se sont mises ╵à bouillonner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et même les abîmes ╵ont été ébranlés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuées déversèrent ╵de la pluie en torrents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans le ciel d’orage, ╵retentit le tonnerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes flèches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les éclairs (18.15 ; 97.4 ; 144.6).
      marker-yv: yv-n
    - type: text
      text: ' sillonnaient ╵le ciel dans tous les sens.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au vacarme de ton tonnerre, ╵du sein de la tornade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’éclat de tes éclairs ╵illuminait le monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre en fut ébranlée, ╵et se mit à trembler.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’appelle Dieu, ╵je crie vers lui ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’appelle Dieu, ╵et il m’écoute.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la mer, ╵tu as frayé ta route
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tracé ton sentier ╵parmi les grandes eaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 14
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul n’a discerné ╵la trace de tes pas.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as conduit ton peuple ╵comme un troupeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par le moyen ╵du ministère de Moïse ╵et d’Aaron.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour de ma détresse, ╵je m’adresse au Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout au long de la nuit, sans cesse, ╵je tends les mains vers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je reste inconsolable.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès que je pense à Dieu, ╵je me mets à gémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand je réfléchis, ╵j’ai l’esprit abattu.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je veux m’endormir, ╵tu me tiens en éveil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Me voici dans le trouble : ╵je ne sais plus que dire.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je songe aux jours passés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux années d’autrefois,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’évoque mes cantiques, ╵au milieu de la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je médite en moi-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les questions me viennent :'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « L’abandon du Seigneur ╵va-t-il durer toujours ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne redeviendra-t-il ╵plus jamais favorable ?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son amour serait-il ╵épuisé à jamais ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa parole va-t-elle pour toujours ╵rester sans suite ?
