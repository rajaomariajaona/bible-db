document_id: PSA.150,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Louez Dieu en musique
  - type: text
    content: Louez l’Eternel !
  - type: text
    content: Louez Dieu ╵dans son sanctuaire !
  - type: text
    content: Louez-le dans l’étendue céleste ╵où éclate sa puissance !
  '2':
  - type: text
    content: Louez-le pour ses hauts faits,
  - type: text
    content: louez-le ╵pour son immense grandeur !
  '3':
  - type: text
    content: Louez-le au son du cor
  - type: note
    content: Voir note 98.6.
  - type: text
    content: ','
  - type: text
    content: louez-le au son du luth, ╵au son de la lyre !
  '4':
  - type: text
    content: Louez-le avec des danses ╵et au son des tambourins !
  - type: text
    content: Louez-le avec le luth ╵et avec la flûte !
  '5':
  - type: text
    content: Louez-le par les cymbales ╵bien retentissantes !
  - type: text
    content: Louez-le par les cymbales ╵résonnant avec éclat !
  '6':
  - type: text
    content: Que tout ce qui vit ╵loue donc l’Eternel !
  - type: text
    content: Louez l’Eternel !
