document_id: PSA.90
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Quatrième livre
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apprends-nous à bien compter nos jours !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière de Moïse, l’homme de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Seigneur, d’âge en âge
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as été notre refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avant que soient nées les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu aies créé ╵la terre et l’univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toute éternité ╵et pour l’éternité, ╵toi, tu es Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu fais retourner l’homme ╵à la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu dis aux humains : ╵« Retournez-y'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 3.19
        metadata:
          usfm: GEN.3.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car mille ans, à tes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont comme le jour d’hier ╵qui est déjà passé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 P 3.8
        metadata:
          usfm: 2PE.3.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une seule veille ╵au milieu de la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu les plonges dans le sommeil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont au matin ╵comme l’herbe éphémère
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'qui fleurit le matin, ╵et passe vite :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le soir, elle se fane ╵et se flétrit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous sommes consumés ╵par ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ta fureur nous effraie :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: tu as mis devant toi ╵tous nos péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu mets en lumière ╵tout ce que nous cachons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tous nos jours disparaissent ╵par ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous achevons nos années ╵comme un murmure…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le temps de notre vie ? ╵C’est soixante-dix ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'au mieux : quatre-vingts ans ╵pour les plus vigoureux ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur agitation ╵n’est que peine et misère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le temps passe vite ╵et nous nous envolons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui donc connaît ╵l’intensité de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton courroux ╵à la mesure de la crainte qui t’est due ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oh ! Apprends-nous ╵à bien compter nos jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que notre cœur ╵acquière la sagesse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tourne-toi de nouveau vers nous, ╵ô Eternel ! ╵Jusques à quand ╵tarderas-tu encore ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aie pitié de tes serviteurs !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rassasie-nous tous les matins ╵de ton amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous crierons de joie, ╵pleins d’allégresse, ╵tout au long de nos jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rends-nous en jours de joie ╵les jours de nos épreuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en années de joie ╵nos années de malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que tes serviteurs voient tes œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ta splendeur brille sur leurs descendants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que le Seigneur, ╵notre Dieu, nous accorde sa faveur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais prospérer pour nous ╵l’ouvrage de nos mains !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh oui ! fais prospérer ╵l’ouvrage de nos mains !
