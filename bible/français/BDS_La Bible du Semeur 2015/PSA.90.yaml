document_id: PSA.90,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Quatrième livre
  - type: heading
    content: Apprends-nous à bien compter nos jours !
  - type: text
    content: Prière de Moïse, l’homme de Dieu.
  - type: text
    content: O Seigneur, d’âge en âge
  - type: text
    content: tu as été notre refuge.
  '10':
  - type: text
    content: Le temps de notre vie ? ╵C’est soixante-dix ans,
  - type: text
    content: 'au mieux : quatre-vingts ans ╵pour les plus vigoureux ;'
  - type: text
    content: et leur agitation ╵n’est que peine et misère.
  - type: text
    content: Car le temps passe vite ╵et nous nous envolons.
  '11':
  - type: text
    content: Qui donc connaît ╵l’intensité de ta colère,
  - type: text
    content: et ton courroux ╵à la mesure de la crainte qui t’est due ?
  '12':
  - type: text
    content: Oh ! Apprends-nous ╵à bien compter nos jours,
  - type: text
    content: afin que notre cœur ╵acquière la sagesse !
  '13':
  - type: text
    content: Tourne-toi de nouveau vers nous, ╵ô Eternel ! ╵Jusques à quand ╵tarderas-tu encore ?
  - type: text
    content: Aie pitié de tes serviteurs !
  '14':
  - type: text
    content: Rassasie-nous tous les matins ╵de ton amour,
  - type: text
    content: et nous crierons de joie, ╵pleins d’allégresse, ╵tout au long de nos jours.
  '15':
  - type: text
    content: Rends-nous en jours de joie ╵les jours de nos épreuves,
  - type: text
    content: et en années de joie ╵nos années de malheur !
  '16':
  - type: text
    content: Que tes serviteurs voient tes œuvres,
  - type: text
    content: et que ta splendeur brille sur leurs descendants.
  '17':
  - type: text
    content: Que le Seigneur, ╵notre Dieu, nous accorde sa faveur !
  - type: text
    content: Fais prospérer pour nous ╵l’ouvrage de nos mains !
  - type: text
    content: Oh oui ! fais prospérer ╵l’ouvrage de nos mains !
  '2':
  - type: text
    content: Avant que soient nées les montagnes,
  - type: text
    content: et que tu aies créé ╵la terre et l’univers,
  - type: text
    content: de toute éternité ╵et pour l’éternité, ╵toi, tu es Dieu.
  '3':
  - type: text
    content: Tu fais retourner l’homme ╵à la poussière,
  - type: text
    content: 'et tu dis aux humains : ╵« Retournez-y'
  - type: note
    content: Voir Gn 3.19.
  - type: text
    content: '  ! »'
  '4':
  - type: text
    content: Car mille ans, à tes yeux,
  - type: text
    content: sont comme le jour d’hier ╵qui est déjà passé
  - type: note
    content: Cité en 2 P 3.8.
  - type: text
    content: ','
  - type: text
    content: comme une seule veille ╵au milieu de la nuit.
  '5':
  - type: text
    content: Tu les plonges dans le sommeil,
  - type: text
    content: et ils sont au matin ╵comme l’herbe éphémère
  '6':
  - type: text
    content: 'qui fleurit le matin, ╵et passe vite :'
  - type: text
    content: le soir, elle se fane ╵et se flétrit.
  '7':
  - type: text
    content: Nous sommes consumés ╵par ta colère,
  - type: text
    content: 'ta fureur nous effraie :'
  '8':
  - type: text
    content: tu as mis devant toi ╵tous nos péchés,
  - type: text
    content: et tu mets en lumière ╵tout ce que nous cachons.
  '9':
  - type: text
    content: Tous nos jours disparaissent ╵par ta colère,
  - type: text
    content: et nous achevons nos années ╵comme un murmure…
