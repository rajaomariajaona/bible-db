document_id: PSA.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La voix de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez l’Eternel, ╵vous, les anges de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelés ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fils de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir notes Jb 1.6 ; 2.1 ; 38.7).
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, célébrez l’Eternel ╵en proclamant la gloire ╵dont il est digne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'revêtus de vêtements sacrés. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-2, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 96.7-9
        metadata:
          usfm: PSA.96.7+PSA.96.8+PSA.96.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La voix de l’Eternel ╵retentit sur les eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, dans sa gloire, ╵fait gronder le tonnerre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La voix de l’Eternel domine ╵le bruit des grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La voix de l’Eternel ╵retentit avec force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la voix de l’Eternel résonne ╵majestueusement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La voix de l’Eternel ╵brise les cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel brise ╵les cèdres du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fait bondir ╵tout le Liban ╵comme des veaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Siriôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nom phénicien de l’Hermon.
    marker-yv: yv-n
  - type: text
    text: ' ╵comme des buffles.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La voix de l’Eternel ╵fait jaillir des éclairs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La voix de l’Eternel ╵fait trembler le désert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel fait trembler ╵le désert de Qadesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs endroits portent ce nom qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'saint. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ici, il s’agit certainement du désert qui s’étend au sud du pays d’Israël (voir Gn 20.1 ; Nb 20.1).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La voix de l’Eternel ╵fait enfanter les biches
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: agite les grands arbres.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle fait tomber les feuilles ╵des arbres des forêts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans son palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tout s’écrie : « Gloire à l’Eternel ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Au-dessus du déluge, ╵l’Eternel siégeait sur son trône,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel siège en roi ╵à tout jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Eternel donnera ╵la puissance à son peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel bénira son peuple ╵en lui donnant la paix.
