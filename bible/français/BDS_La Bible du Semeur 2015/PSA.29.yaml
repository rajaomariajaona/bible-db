document_id: PSA.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La voix de l’Eternel
  - type: text
    content: Psaume de David.
  - type: text
    content: Célébrez l’Eternel, ╵vous, les anges de Dieu
  - type: note
    content: Appelés ici fils de Dieu (voir notes Jb 1.6 ; 2.1 ; 38.7).
  - type: text
    content: '  !'
  - type: text
    content: Célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
  '10':
  - type: text
    content: Au-dessus du déluge, ╵l’Eternel siégeait sur son trône,
  - type: text
    content: l’Eternel siège en roi ╵à tout jamais.
  '11':
  - type: text
    content: L’Eternel donnera ╵la puissance à son peuple.
  - type: text
    content: L’Eternel bénira son peuple ╵en lui donnant la paix.
  '2':
  - type: text
    content: Oui, célébrez l’Eternel ╵en proclamant la gloire ╵dont il est digne,
  - type: text
    content: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
  - type: note
    content: 'Autre traduction : revêtus de vêtements sacrés. Pour les v. 1-2, voir 96.7-9.'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: La voix de l’Eternel ╵retentit sur les eaux,
  - type: text
    content: Dieu, dans sa gloire, ╵fait gronder le tonnerre.
  - type: text
    content: La voix de l’Eternel domine ╵le bruit des grandes eaux.
  '4':
  - type: text
    content: La voix de l’Eternel ╵retentit avec force,
  - type: text
    content: la voix de l’Eternel résonne ╵majestueusement.
  '5':
  - type: text
    content: La voix de l’Eternel ╵brise les cèdres,
  - type: text
    content: l’Eternel brise ╵les cèdres du Liban.
  '6':
  - type: text
    content: Il fait bondir ╵tout le Liban ╵comme des veaux
  - type: text
    content: et le Siriôn
  - type: note
    content: Nom phénicien de l’Hermon.
  - type: text
    content: ' ╵comme des buffles.'
  '7':
  - type: text
    content: La voix de l’Eternel ╵fait jaillir des éclairs.
  '8':
  - type: text
    content: La voix de l’Eternel ╵fait trembler le désert.
  - type: text
    content: L’Eternel fait trembler ╵le désert de Qadesh
  - type: note
    content: Plusieurs endroits portent ce nom qui signifie saint. Ici, il s’agit certainement du désert qui s’étend au sud du pays d’Israël (voir Gn 20.1 ; Nb 20.1).
  - type: text
    content: .
  '9':
  - type: text
    content: La voix de l’Eternel ╵fait enfanter les biches
  - type: note
    content: 'Autre traduction : agite les grands arbres.'
  - type: text
    content: et elle fait tomber les feuilles ╵des arbres des forêts.
  - type: text
    content: Dans son palais,
  - type: text
    content: 'tout s’écrie : « Gloire à l’Eternel ! »'
