document_id: SNG.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que tu es belle, ô mon amie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: « Que tu es belle, ╵ô mon amie, ╵que tu es belle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux ressemblent ╵à des colombes
- type: usfm
  marker: q1
  children:
  - type: text
    text: dessous ton voile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta chevelure ╵est comme un troupeau de chèvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: dévalant le mont Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noires comme les chèvres de ce pays.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tes dents ressemblent ╵à un troupeau de brebis ╵passé aux mains des tondeurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui reviendrait du lavoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacune d’elles ╵a sa jumelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucune n’est solitaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voici tes lèvres ╵comme un ruban écarlate ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: combien ta bouche est charmante !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes tempes ressemblent ╵à des moitiés de grenades
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A cause de leur couleur rougeâtre (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.7'
        metadata:
          usfm: SNG.6.7
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: dessous ton voile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ton cou ressemble ╵à la tour du roi David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'bâtie comme un arsenal :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mille rondaches ╵y sont pendues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion au collier formé de pièces de monnaie entourant le cou comme les boucliers ronds suspendus autour des tours (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 27.10-11
        metadata:
          usfm: EZK.27.10+EZK.27.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les pavois des héros.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Comme deux faons, ╵jumeaux d’une gazelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: paissant parmi les lis, ╵sont tes deux seins. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: « Et quand viendra la brise
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la tombée du jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand s’estomperont les ombres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’en irai ╵vers la montagne de la myrrhe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers la colline de l’encens. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La beauté de l’amour
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: « Tu es toute jolie, ╵ô mon amie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sans aucun défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oh, viens du Liban avec moi, ╵ma mariée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot hébreu, qui se retrouve aux v. 9, 10, 11, 12 et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.1'
        metadata:
          usfm: SNG.5.1
      - type: text
        text: ', désigne l’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'épousée, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'juste avant ou juste après le mariage, comme en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4.13
        metadata:
          usfm: HOS.4.13
      - type: text
        text: ss
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, viens du Liban avec moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veuille descendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu contempleras.
    marker-yv: yv-n
  - type: text
    text: ' du sommet ╵de l’Amana,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: du sommet du Senir, et de l’Hermon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Différents sommets du nord d’Israël.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où les lions ╵ont leur retraite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les panthères ╵dans les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu chamboules mon cœur, ╵ô toi, ma sœur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ma sœur
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'terme d’affection du langage amoureux, courant dans la poésie du Proche-Orient ancien (voir v. 10, 12 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.1'
        metadata:
          usfm: SNG.5.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ╵ma mariée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu chamboules mon cœur ╵par un seul regard jeté par tes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par un seul des joyaux ╵de tes colliers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ton amour est bien délicieux, ╵ô toi, ma sœur, ╵ma mariée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ton amour ╵est plus exaltant que le vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la senteur de tes parfums ╵plus que tous les arômes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tes lèvres, distillent du miel, ╵ma mariée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du miel, du lait ╵sont sous ta langue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le parfum ╵de tes habits ╵est tout pareil ╵aux senteurs du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu es un jardin clos, ╵ô toi, ma sœur, ╵ma mariée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un jardin clos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après divers manuscrits hébreux et les versions anciennes. Le texte hébreu traditionnel porte un terme de sens incertain souvent rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'source '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fontaine. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux types de textes hébreux ne diffèrent que par une seule lettre.
    marker-yv: yv-n
  - type: text
    text: ' ╵et une fontaine scellée'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On avait l’habitude de fermer les puits (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 29.2-3
        metadata:
          usfm: GEN.29.2+GEN.29.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes rameaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tes ruisseaux arrosent un verger.
    marker-yv: yv-n
  - type: text
    text: ' forment un verger ╵de grenadiers aux fruits exquis,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: henné et nard l’embaument,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: le nard et le safran ╵et la canne odorante, ╵le cinnamome
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Diverses plantes aromatiques précieuses.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes sortes ╵de plantes donnant de l’encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’aloès ╵et la myrrhe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec les plus fins aromates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu es la source des jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un puits d’eaux vives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’eaux ruisselant du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dont les neiges éternelles alimentent des cours d’eau frais et intarissables.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eveille-toi, brise légère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: viens, doux zéphyr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que mon jardin, ╵exhale ses parfums. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jardin de l’amour
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Que mon bien-aimé entre ╵dans son jardin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il en goûte ╵les fruits exquis. »
