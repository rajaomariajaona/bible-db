document_id: SNG.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Que tu es belle, ô mon amie
  - type: text
    content: « Que tu es belle, ╵ô mon amie, ╵que tu es belle !
  - type: text
    content: Tes yeux ressemblent ╵à des colombes
  - type: text
    content: dessous ton voile,
  - type: text
    content: ta chevelure ╵est comme un troupeau de chèvres
  - type: text
    content: dévalant le mont Galaad
  - type: note
    content: Noires comme les chèvres de ce pays.
  - type: text
    content: .
  '10':
  - type: text
    content: Ton amour est bien délicieux, ╵ô toi, ma sœur, ╵ma mariée,
  - type: text
    content: oui, ton amour ╵est plus exaltant que le vin
  - type: text
    content: et la senteur de tes parfums ╵plus que tous les arômes.
  '11':
  - type: text
    content: Tes lèvres, distillent du miel, ╵ma mariée,
  - type: text
    content: du miel, du lait ╵sont sous ta langue,
  - type: text
    content: et le parfum ╵de tes habits ╵est tout pareil ╵aux senteurs du Liban.
  '12':
  - type: text
    content: Tu es un jardin clos, ╵ô toi, ma sœur, ╵ma mariée,
  - type: text
    content: un jardin clos
  - type: note
    content: D’après divers manuscrits hébreux et les versions anciennes. Le texte hébreu traditionnel porte un terme de sens incertain souvent rendu par source ou fontaine. Les deux types de textes hébreux ne diffèrent que par une seule lettre.
  - type: text
    content: ' ╵et une fontaine scellée'
  - type: note
    content: On avait l’habitude de fermer les puits (Gn 29.2-3).
  - type: text
    content: .
  '13':
  - type: text
    content: Tes rameaux
  - type: note
    content: 'Autre traduction : Tes ruisseaux arrosent un verger.'
  - type: text
    content: ' forment un verger ╵de grenadiers aux fruits exquis,'
  - type: text
    content: henné et nard l’embaument,
  '14':
  - type: text
    content: le nard et le safran ╵et la canne odorante, ╵le cinnamome
  - type: note
    content: Diverses plantes aromatiques précieuses.
  - type: text
    content: ','
  - type: text
    content: et toutes sortes ╵de plantes donnant de l’encens,
  - type: text
    content: l’aloès ╵et la myrrhe,
  - type: text
    content: avec les plus fins aromates.
  '15':
  - type: text
    content: Tu es la source des jardins,
  - type: text
    content: un puits d’eaux vives,
  - type: text
    content: et d’eaux ruisselant du Liban
  - type: note
    content: Dont les neiges éternelles alimentent des cours d’eau frais et intarissables.
  - type: text
    content: .
  '16':
  - type: text
    content: Eveille-toi, brise légère,
  - type: text
    content: viens, doux zéphyr,
  - type: text
    content: que mon jardin, ╵exhale ses parfums. »
  - type: heading
    content: Le jardin de l’amour
  - type: text
    content: « Que mon bien-aimé entre ╵dans son jardin
  - type: text
    content: et qu’il en goûte ╵les fruits exquis. »
  '2':
  - type: text
    content: Tes dents ressemblent ╵à un troupeau de brebis ╵passé aux mains des tondeurs
  - type: text
    content: qui reviendrait du lavoir.
  - type: text
    content: Chacune d’elles ╵a sa jumelle,
  - type: text
    content: aucune n’est solitaire.
  '3':
  - type: text
    content: Voici tes lèvres ╵comme un ruban écarlate ;
  - type: text
    content: combien ta bouche est charmante !
  - type: text
    content: Et tes tempes ressemblent ╵à des moitiés de grenades
  - type: note
    content: A cause de leur couleur rougeâtre (voir 6.7).
  - type: text
    content: dessous ton voile.
  '4':
  - type: text
    content: Ton cou ressemble ╵à la tour du roi David,
  - type: text
    content: 'bâtie comme un arsenal :'
  - type: text
    content: mille rondaches ╵y sont pendues
  - type: note
    content: Allusion au collier formé de pièces de monnaie entourant le cou comme les boucliers ronds suspendus autour des tours (Ez 27.10-11).
  - type: text
    content: ','
  - type: text
    content: tous les pavois des héros.
  '5':
  - type: text
    content: Comme deux faons, ╵jumeaux d’une gazelle,
  - type: text
    content: paissant parmi les lis, ╵sont tes deux seins. »
  '6':
  - type: text
    content: « Et quand viendra la brise
  - type: text
    content: à la tombée du jour,
  - type: text
    content: et quand s’estomperont les ombres,
  - type: text
    content: je m’en irai ╵vers la montagne de la myrrhe,
  - type: text
    content: vers la colline de l’encens. »
  - type: heading
    content: La beauté de l’amour
  '7':
  - type: text
    content: « Tu es toute jolie, ╵ô mon amie,
  - type: text
    content: et sans aucun défaut.
  '8':
  - type: text
    content: Oh, viens du Liban avec moi, ╵ma mariée
  - type: note
    content: Le mot hébreu, qui se retrouve aux v. 9, 10, 11, 12 et en 5.1, désigne l’épousée, juste avant ou juste après le mariage, comme en Os 4.13ss
  - type: text
    content: ','
  - type: text
    content: oui, viens du Liban avec moi.
  - type: text
    content: Veuille descendre
  - type: note
    content: 'Autre traduction : tu contempleras.'
  - type: text
    content: ' du sommet ╵de l’Amana,'
  - type: text
    content: du sommet du Senir, et de l’Hermon
  - type: note
    content: Différents sommets du nord d’Israël.
  - type: text
    content: ','
  - type: text
    content: là où les lions ╵ont leur retraite,
  - type: text
    content: et les panthères ╵dans les montagnes.
  '9':
  - type: text
    content: Tu chamboules mon cœur, ╵ô toi, ma sœur
  - type: note
    content: 'ma sœur: terme d’affection du langage amoureux, courant dans la poésie du Proche-Orient ancien (voir v. 10, 12 ; 5.1).'
  - type: text
    content: ', ╵ma mariée,'
  - type: text
    content: tu chamboules mon cœur ╵par un seul regard jeté par tes yeux,
  - type: text
    content: par un seul des joyaux ╵de tes colliers.
