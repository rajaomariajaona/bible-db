document_id: MRK.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: De la destruction de Jérusalem à la venue du Fils de l’homme
  - type: heading
    content: (Mt 24.1-3 ; Lc 21.5-7)
  - type: text
    content: 'Comme Jésus sortait du Temple, un de ses disciples lui dit : Regarde, Maître, quelles belles pierres ! Quel édifice magnifique !'
  '10':
  - type: text
    content: Il faut, avant tout, que la Bonne Nouvelle de l’Evangile soit annoncée à tous les peuples.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Quand on vous emmènera pour vous traduire devant les autorités, ne vous inquiétez pas à l’avance de ce que vous direz, mais dites simplement ce qui vous sera donné au moment même : car ce n’est pas vous qui parlerez, mais l’Esprit Saint.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Le frère livrera son propre frère pour le faire condamner à mort, et le père livrera son enfant. Des enfants se dresseront contre leurs parents et les feront mettre à mort.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Tout le monde vous haïra à cause de moi. Mais celui qui tiendra bon jusqu’au bout sera '
  - type: text
    content: sauvé
  - type: text
    content: .
  - type: heading
    content: (Mt 24.15-31 ; Lc 21.20-28 ; 17.23-24)
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Quand vous verrez '
  - type: text
    content: l’abominable profanation
  - type: text
    content: ' '
  - type: note
    content: Dn 9.27 ; 11.31 ; 12.11.
  - type: text
    content: 'établie dans le lieu où elle ne doit pas être – que celui qui lit comprenne ! – alors, que ceux qui sont en '
  - type: text
    content: Judée
  - type: text
    content: ' s’enfuient dans les montagnes.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Si quelqu’un est sur son toit en terrasse, qu’il ne rentre pas à l’intérieur de sa maison pour emporter quelque bien qui s’y trouve.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Que celui qui sera dans les champs ne retourne pas chez lui pour aller chercher son manteau.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Malheur, en ces jours-là, aux femmes enceintes et à celles qui allaitent !
  - type: text
    content: ' '
  '18':
  - type: text
    content: Priez pour que cela n’arrive pas en hiver,
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'car ce seront '
  - type: text
    content: des jours de détresse comme on n’en a pas connus depuis que Dieu a créé le monde
  - type: note
    content: Dn 12.1.
  - type: text
    content: ' '
  - type: text
    content: et comme jamais plus on n’en verra de semblables.
  '2':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Oui, regarde bien ces grandes constructions : il ne restera pas une pierre sur une autre, tout sera démoli.'
  '20':
  - type: text
    content: ' '
  - type: text
    content: Vraiment, si le Seigneur n’avait pas décidé de réduire le nombre de ces jours, personne n’en réchapperait ; mais, à cause de ceux qu’il a choisis, il abrégera ce temps.
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Si quelqu’un vous dit alors : « Voyez, le Messie est ici ! » ou : « Il est là ! » ne le croyez pas.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: De faux messies surgiront, ainsi que de faux prophètes. Ils produiront des signes miraculeux et des prodiges au point de tromper, si c’était possible, ceux que Dieu a choisis.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Vous donc, faites attention, je vous ai prévenus !
  '24':
  - type: text
    content: ' '
  - type: text
    content: Cependant, en ces jours-là, après ce temps de détresse,
  - type: text
    content: le soleil s’obscurcira,
  - type: text
    content: la lune perdra sa clarté,
  '25':
  - type: text
    content: ' '
  - type: text
    content: les étoiles tomberont du ciel ;
  - type: text
    content: les puissances célestes
  - type: text
    content: ' ╵'
  - type: text
    content: seront ébranlées
  - type: text
    content: ' '
  - type: note
    content: Es 13.10 ; 34.4.
  - type: text
    content: .
  - type: heading
    content: (Mt 24.32-36 ; Lc 21.29-33)
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Alors on verra '
  - type: text
    content: 'le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' venir sur les nuées'
  - type: text
    content: ' '
  - type: note
    content: Dn 7.13 .
  - type: text
    content: avec beaucoup de puissance et de gloire.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Il enverra ses '
  - type: text
    content: anges
  - type: text
    content: ' rassembler ses élus des quatre coins du monde, d’un bout à l’autre de l’univers.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Que l’exemple du figuier vous serve d’enseignement : quand ses rameaux deviennent tendres et que ses feuilles poussent, vous savez que l’été est proche.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: De même, quand vous verrez se produire ces événements, sachez que le Fils de l’homme est proche, comme aux portes de la ville.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Puis il alla s’asseoir sur les pentes du mont des Oliviers, en face du Temple.
  - type: text
    content: 'Pierre, Jacques, Jean et André le prirent à part et lui demandèrent : '
  '30':
  - type: text
    content: Vraiment, je vous assure que cette génération-ci ne passera pas jusqu’à ce que tout cela vienne à se réaliser.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront jamais.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Quant au jour ou à l’heure, personne ne sait quand cela se produira, ni les anges du ciel, ni même le Fils ; seul, le Père le sait.
  - type: heading
    content: (Mt 24.42)
  '33':
  - type: text
    content: ' '
  - type: text
    content: Soyez vigilants, restez sur vos gardes, puisque vous ne savez pas quand viendra le moment.
  '34':
  - type: text
    content: ' '
  - type: text
    content: Les choses se passeront comme lorsqu’un homme quitte sa maison pour un long voyage et en laisse la responsabilité à ses serviteurs, en confiant à chacun sa tâche. Il commande au portier de veiller.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Tenez-vous donc vous aussi en éveil ! Car vous ne savez pas quand le maître de la maison doit revenir : sera-ce tard ? à minuit ? au chant du coq ? ou le matin ?'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Qu’il ne vous trouve pas en train de dormir s’il revient à l’improviste !
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Ce que je dis là, je vous le dis à tous : Tenez-vous en éveil !'
  '4':
  - type: text
    content: 'Dis-nous : quand cela se produira-t-il et à quel signe reconnaîtra-t-on que tous ces événements seront près de s’accomplir'
  - type: note
    content: 'Autre traduction : quel signe annoncera la fin de toutes choses ?'
  - type: text
    content: '  ?'
  - type: heading
    content: (Mt 24.4-14 ; Lc 21.8-19)
  '5':
  - type: text
    content: 'Là-dessus, Jésus leur dit : '
  - type: text
    content: Faites attention que personne ne vous induise en erreur.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Plusieurs viendront sous mon nom en disant : « C’est moi le '
  - type: text
    content: Messie
  - type: text
    content: '  ! », et ils tromperont beaucoup de gens.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Quand vous entendrez parler de guerres et de menaces de guerres, ne vous laissez pas troubler, car cela doit arriver, mais ce ne sera pas encore la fin.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'En effet, '
  - type: text
    content: on verra se dresser une nation contre une nation, un royaume contre un autre
  - type: note
    content: Voir Es 19.2.
  - type: text
    content: ', il y aura en divers lieux des tremblements de terre et des famines, mais ce ne seront que les premières douleurs de l’enfantement.'
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Quant à vous, faites attention à vous-mêmes : on vous traduira devant les tribunaux des '
  - type: text
    content: Juifs
  - type: text
    content: ', on vous fouettera dans les '
  - type: text
    content: synagogues
  - type: text
    content: ', vous comparaîtrez devant des gouverneurs et des rois à cause de moi, pour leur apporter un témoignage.'
  - type: text
    content: ' '
