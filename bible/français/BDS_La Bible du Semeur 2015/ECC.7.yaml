document_id: ECC.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Conseils d’un sage
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avantages de la sagesse
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Mieux vaut…
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mieux vaut un bon renom qu’un parfum raffiné, et mieux vaut le jour de sa mort que celui de sa naissance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 22.1
        metadata:
          usfm: PRO.22.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mieux vaut se rendre dans une maison endeuillée que dans celle où l’on festoie, car celle-là nous rappelle quelle est la fin de tout homme et il est bon d’y réfléchir pendant qu’on est en vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mieux vaut la tristesse que le rire, car avec un visage triste, on peut avoir le cœur content
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le cœur est rendu meilleur.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’attention du sage se porte vers la maison endeuillée, celle de l’insensé vers la maison où l’on se livre à la joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mieux vaut écouter les reproches d’un homme sage que la chanson des insensés. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car les rires de l’insensé sont comme le crépitement des épines sous une marmite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Faisant du bruit, produisant de la fumée, mais donnant peu de chaleur et durant peu.
    marker-yv: yv-n
  - type: text
    text: . Cela aussi est vain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’oppression peut rendre le sage insensé, et les cadeaux lui corrompre le cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mieux vaut l’aboutissement d’une affaire que son début. Mieux vaut un esprit patient qu’un esprit orgueilleux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ne t’irrite pas trop vite, car c’est dans le cœur des insensés que la colère élit domicile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Garde-toi de dire : « Comment se fait-il qu’autrefois, les choses allaient mieux qu’aujourd’hui ? » Car ce n’est pas la sagesse qui te dicte une telle question.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La sagesse est bonne avec un héritage : elle est avantageuse pour ceux qui voient le soleil'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Pr 3.13-16 ; 8.11 ; Jb 28.12-19.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car la protection qu’offre la sagesse est comme celle que procure l’argent, et la sagesse présente un avantage : elle préserve la vie de ceux qui la possèdent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3.18
        metadata:
          usfm: PRO.3.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Considère l’œuvre de Dieu : qui donc pourra redresser ce qu’il a tordu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Au jour du bonheur, jouis du bonheur, et au jour du malheur, réfléchis, car Dieu a fait l’un et l’autre, de sorte que l’homme ne puisse rien deviner de son avenir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qui doit arriver après lui.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Abandonner ses rêves d’idéal et de perfection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J’ai vu tout cela au cours de mon existence dérisoire : ici un juste se perd à cause de sa droiture, là, un méchant prolonge ses jours par sa perversité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne sois pas juste à l’excès et ne sois pas sage outre mesure, pourquoi te détruirais-tu ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne sois pas non plus méchant outre mesure et ne sois pas insensé, pourquoi voudrais-tu mourir avant ton heure ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu feras bien de prendre garde à ces deux principes sans négliger l’un ou l’autre ; oui, celui qui craint Dieu s’en sortira pour les mettre en œuvre tous deux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La sagesse rend un homme plus fort qu’une ville défendue par dix capitaines.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il n’y a cependant sur terre aucun homme juste qui fasse toujours le bien sans jamais pécher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ps 143.2 ; Pr 20.9 ; Rm 3.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne prête pas attention à tout ce qu’on dit, et si ton serviteur te dénigre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maudit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De même au verset suivant.
    marker-yv: yv-n
  - type: text
    text: ', n’écoute pas, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car tu sais bien qu’à plusieurs reprises, il t’est arrivé, à toi aussi, de dénigrer autrui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout cela, j’ai essayé de le comprendre par la sagesse, en me disant : « Je veux acquérir la sagesse. » Mais elle est restée loin de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La compréhension des choses est hors de ma portée. Elle est beaucoup trop profonde pour qu’on puisse l’atteindre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais je me suis appliqué avec toutes mes facultés à apprendre, à explorer et à rechercher la sagesse et la raison, et à discerner que la méchanceté est insensée, et que la folie est déraisonnable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je trouve qu’une femme est plus amère que la mort lorsqu’elle est un piège, son cœur un filet et ses bras des chaînes. Celui qui se comporte bien aux yeux de Dieu lui échappera, mais le pécheur s’y fera prendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Pr 2.16-19 ; 6.24 à 7.27 ; 22.14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Considère, dit le Maître, à quelle conclusion je suis parvenu en examinant les choses une à une
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en considérant ce que sont les femmes, l’une après l’autre.
    marker-yv: yv-n
  - type: text
    text: ', pour en faire l’analyse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour me faire une opinion.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'D’ailleurs, je cherche encore et je n’ai pas trouvé : sur mille hommes, j’en ai trouvé un, mais parmi toutes les femmes, je n’en ai pas trouvé une seule.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voilà la seule chose que j’ai trouvée : Dieu a fait l’homme droit, mais les humains sont allés chercher beaucoup de combines.'
