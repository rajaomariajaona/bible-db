document_id: ECC.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils d’un sage
  - type: heading
    content: Avantages de la sagesse
  - type: heading
    content: Mieux vaut…
  - type: text
    content: Mieux vaut un bon renom qu’un parfum raffiné, et mieux vaut le jour de sa mort que celui de sa naissance
  - type: note
    content: Voir Pr 22.1.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Garde-toi de dire : « Comment se fait-il qu’autrefois, les choses allaient mieux qu’aujourd’hui ? » Car ce n’est pas la sagesse qui te dicte une telle question.'
  '11':
  - type: text
    content: 'La sagesse est bonne avec un héritage : elle est avantageuse pour ceux qui voient le soleil'
  - type: note
    content: Voir Pr 3.13-16 ; 8.11 ; Jb 28.12-19.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Car la protection qu’offre la sagesse est comme celle que procure l’argent, et la sagesse présente un avantage : elle préserve la vie de ceux qui la possèdent'
  - type: note
    content: Voir Pr 3.18.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Considère l’œuvre de Dieu : qui donc pourra redresser ce qu’il a tordu ?'
  '14':
  - type: text
    content: Au jour du bonheur, jouis du bonheur, et au jour du malheur, réfléchis, car Dieu a fait l’un et l’autre, de sorte que l’homme ne puisse rien deviner de son avenir
  - type: note
    content: 'Autre traduction : ce qui doit arriver après lui.'
  - type: text
    content: .
  - type: heading
    content: Abandonner ses rêves d’idéal et de perfection
  '15':
  - type: text
    content: 'J’ai vu tout cela au cours de mon existence dérisoire : ici un juste se perd à cause de sa droiture, là, un méchant prolonge ses jours par sa perversité.'
  '16':
  - type: text
    content: 'Ne sois pas juste à l’excès et ne sois pas sage outre mesure, pourquoi te détruirais-tu ? '
  '17':
  - type: text
    content: 'Ne sois pas non plus méchant outre mesure et ne sois pas insensé, pourquoi voudrais-tu mourir avant ton heure ? '
  '18':
  - type: text
    content: Tu feras bien de prendre garde à ces deux principes sans négliger l’un ou l’autre ; oui, celui qui craint Dieu s’en sortira pour les mettre en œuvre tous deux.
  '19':
  - type: text
    content: La sagesse rend un homme plus fort qu’une ville défendue par dix capitaines.
  '2':
  - type: text
    content: Mieux vaut se rendre dans une maison endeuillée que dans celle où l’on festoie, car celle-là nous rappelle quelle est la fin de tout homme et il est bon d’y réfléchir pendant qu’on est en vie.
  '20':
  - type: text
    content: Il n’y a cependant sur terre aucun homme juste qui fasse toujours le bien sans jamais pécher
  - type: note
    content: Voir Ps 143.2 ; Pr 20.9 ; Rm 3.10.
  - type: text
    content: .
  '21':
  - type: text
    content: Ne prête pas attention à tout ce qu’on dit, et si ton serviteur te dénigre
  - type: note
    content: 'Autre traduction : maudit. De même au verset suivant.'
  - type: text
    content: ', n’écoute pas, '
  '22':
  - type: text
    content: car tu sais bien qu’à plusieurs reprises, il t’est arrivé, à toi aussi, de dénigrer autrui.
  '23':
  - type: text
    content: 'Tout cela, j’ai essayé de le comprendre par la sagesse, en me disant : « Je veux acquérir la sagesse. » Mais elle est restée loin de moi. '
  '24':
  - type: text
    content: 'La compréhension des choses est hors de ma portée. Elle est beaucoup trop profonde pour qu’on puisse l’atteindre. '
  '25':
  - type: text
    content: Mais je me suis appliqué avec toutes mes facultés à apprendre, à explorer et à rechercher la sagesse et la raison, et à discerner que la méchanceté est insensée, et que la folie est déraisonnable.
  '26':
  - type: text
    content: Je trouve qu’une femme est plus amère que la mort lorsqu’elle est un piège, son cœur un filet et ses bras des chaînes. Celui qui se comporte bien aux yeux de Dieu lui échappera, mais le pécheur s’y fera prendre
  - type: note
    content: Voir Pr 2.16-19 ; 6.24 à 7.27 ; 22.14.
  - type: text
    content: .
  '27':
  - type: text
    content: Considère, dit le Maître, à quelle conclusion je suis parvenu en examinant les choses une à une
  - type: note
    content: 'Autre traduction : en considérant ce que sont les femmes, l’une après l’autre.'
  - type: text
    content: ', pour en faire l’analyse'
  - type: note
    content: 'Autre traduction : pour me faire une opinion.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'D’ailleurs, je cherche encore et je n’ai pas trouvé : sur mille hommes, j’en ai trouvé un, mais parmi toutes les femmes, je n’en ai pas trouvé une seule.'
  '29':
  - type: text
    content: 'Voilà la seule chose que j’ai trouvée : Dieu a fait l’homme droit, mais les humains sont allés chercher beaucoup de combines.'
  '3':
  - type: text
    content: Mieux vaut la tristesse que le rire, car avec un visage triste, on peut avoir le cœur content
  - type: note
    content: 'Autre traduction : le cœur est rendu meilleur.'
  - type: text
    content: .
  '4':
  - type: text
    content: L’attention du sage se porte vers la maison endeuillée, celle de l’insensé vers la maison où l’on se livre à la joie.
  '5':
  - type: text
    content: 'Mieux vaut écouter les reproches d’un homme sage que la chanson des insensés. '
  '6':
  - type: text
    content: Car les rires de l’insensé sont comme le crépitement des épines sous une marmite
  - type: note
    content: Faisant du bruit, produisant de la fumée, mais donnant peu de chaleur et durant peu.
  - type: text
    content: . Cela aussi est vain.
  '7':
  - type: text
    content: L’oppression peut rendre le sage insensé, et les cadeaux lui corrompre le cœur.
  '8':
  - type: text
    content: Mieux vaut l’aboutissement d’une affaire que son début. Mieux vaut un esprit patient qu’un esprit orgueilleux.
  '9':
  - type: text
    content: Ne t’irrite pas trop vite, car c’est dans le cœur des insensés que la colère élit domicile.
