document_id: ROM.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le reste d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je demande donc : Dieu aurait-il rejeté son peuple ? Assurément pas ! En effet, ne suis-je pas moi-même Israélite, descendant d’Abraham, de la tribu de Benjamin ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Non, Dieu n’a pas rejeté son peuple qu’il s’est choisi d’avance. Rappelez-vous ce que dit l’Ecriture dans le passage rapportant l’histoire d’Elie dans lequel celui-ci se plaint à Dieu au sujet d’Israël : '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Seigneur, ils ont tué tes prophètes, ils ont démoli tes autels. Et moi, je suis resté tout seul, et voilà qu’ils en veulent à ma vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19.10
        metadata:
          usfm: 1KI.19.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eh bien ! quelle a été la réponse de Dieu ? '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J’ai gardé en réserve pour moi sept mille hommes qui ne se sont pas prosternés devant le dieu Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19.18
        metadata:
          usfm: 1KI.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il en est de même dans le temps présent : il subsiste un reste que Dieu a librement choisi dans sa grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Or, puisque c’est par grâce, cela ne peut pas venir des œuvres, ou alors la grâce n’est plus la grâce.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Que s’est-il donc passé ? Ce que le peuple d’Israël cherchait, il ne l’a pas trouvé ; seuls ceux que Dieu a choisis l’ont obtenu. Les autres ont été rendus incapables de comprendre, conformément à ce qui est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu a frappé leur esprit de torpeur, leurs yeux de cécité et leurs oreilles de surdité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et il en est ainsi jusqu’à ce jour
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 29.3 ; Es 29.10.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De même David déclare :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que leurs banquets deviennent pour eux un piège, un filet,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: une cause de chute, et qu’ils y trouvent leur châtiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que leurs yeux s’obscurcissent
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: au point de ne plus voir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: fais-leur courber le dos
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: continuellement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69.23-24
        metadata:
          usfm: PSA.69.23+PSA.69.24
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La chute d’Israël n’est pas définitive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je demande alors : si les Israélites ont trébuché, est-ce pour tomber définitivement ? Loin de là ! Par leur faute, le salut est devenu accessible aux païens, ce qui excitera leur jalousie. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et si leur faute a fait la richesse du monde, et leur déchéance la richesse des non-Juifs, quelle richesse plus grande encore n’y aura-t-il pas dans leur complet rétablissement ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je m’adresse particulièrement ici à vous qui êtes d’origine païenne : dans la mesure même où je suis l’apôtre des non-Juifs, je me fais une idée d’autant plus haute de mon ministère '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'que je parviendrai peut-être, en l’exerçant, à rendre jaloux ceux de mon peuple et à en conduire ainsi quelques-uns au salut. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car si leur mise à l’écart a entraîné la réconciliation du monde, quel sera l’effet de leur réintégration ? Rien de moins qu’une résurrection d’entre les morts ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, si les prémices du pain offert à Dieu sont consacrées, toute la pâte l’est aussi. Si la racine est consacrée, les branches le sont aussi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 15.19-21
        metadata:
          usfm: NUM.15.19+NUM.15.20+NUM.15.21
      - type: text
        text: . Les prémices et la racine peuvent représenter les patriarches (v. 28).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi en est-il d’Israël : quelques branches ont été coupées. Et toi qui, par ton origine païenne, étais comme un rameau d’olivier sauvage, tu as été greffé parmi les branches restantes, et voici que tu as part avec elles à la sève qui monte de la racine de l’olivier cultivé. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ne te mets pas, pour autant, à te vanter aux dépens des branches coupées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les branches d’origine.
    marker-yv: yv-n
  - type: text
    text: . Et si tu es tenté par un tel orgueil, souviens-toi que ce n’est pas toi qui portes la racine, c’est elle qui te porte !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Peut-être vas-tu dire : si des branches ont été coupées, c’est pour que je puisse être greffé. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Bien ! Mais elles ont été coupées à cause de leur incrédulité ; et toi, c’est à cause de ta foi que tu tiens. Ne sois donc pas orgueilleux ! Sois plutôt sur tes gardes ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Car si Dieu n’a pas épargné les branches naturelles, il ne t’épargnera pas non plus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prends garde, de peur qu’il ne t’épargne pas non plus.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Considère donc, à la fois, la bonté et la sévérité de Dieu : sévérité à l’égard de ceux qui sont tombés, bonté à ton égard aussi longtemps que tu t’attaches à cette bonté. Sinon, toi aussi, tu seras retranché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En ce qui concerne les Israélites, s’ils ne demeurent pas dans leur incrédulité, ils seront regreffés. Car Dieu a le pouvoir de les greffer de nouveau. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, toi, tu as été coupé de l’olivier sauvage auquel tu appartenais par ta nature, pour être greffé, contrairement à ta nature, sur l’olivier cultivé : à combien plus forte raison les branches qui proviennent de cet olivier seront-elles greffées sur lui !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: « Tout Israël sera sauvé »
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Frères et sœurs, je ne veux pas que vous restiez dans l’ignorance de ce mystère, pour que vous ne croyiez pas détenir en vous-mêmes une sagesse supérieure : l’endurcissement d’une partie d’Israël durera jusqu’à ce que l’ensemble des non-Juifs soit entré dans le peuple de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et ainsi, tout Israël sera sauvé. C’est là ce que dit l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: De Sion
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A cause de Sion.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: viendra le Libérateur ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'il éloignera de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jacob
    - type: text
      text: ' toute désobéissance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Et voici en quoi consistera mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alliance
    - type: text
      text: ' avec eux'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 59.20-21
        metadata:
          usfm: ISA.59.20+ISA.59.21
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: c’est que j’enlèverai leurs péchés
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 27.9
        metadata:
          usfm: ISA.27.9
      - type: text
        text: ' cité selon l’ancienne version grecque. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 31.33-34
        metadata:
          usfm: JER.31.33+JER.31.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Si l’on se place du point de vue de l’Evangile, ils sont devenus ennemis de Dieu pour que vous en bénéficiiez. Mais du point de vue du libre choix de Dieu, ils restent ses bien-aimés à cause de leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Car les dons de la grâce et l’appel de Dieu sont irrévocables. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Vous-mêmes, en effet, vous avez désobéi à Dieu autrefois et maintenant Dieu vous a fait grâce en se servant de leur désobéissance. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: De la même façon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maintenant.
    marker-yv: yv-n
  - type: text
    text: ', si leur désobéissance actuelle a pour conséquence votre pardon, c’est pour que Dieu leur pardonne à eux aussi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'De la même façon, eux ont maintenant désobéi afin que, par le pardon que vous avez obtenu, ils obtiennent à leur tour le pardon de Dieu, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: …ils obtiennent maintenant à leur tour….
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Car Dieu a emprisonné tous les hommes dans la désobéissance afin de faire grâce à tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Combien grandes sont les richesses de Dieu, combien profondes sa sagesse et sa science ! Nul ne peut sonder ses jugements. Nul ne peut découvrir ses plans. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Car,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui a connu la pensée du Seigneur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui a été son conseiller
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.34 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.13
