verses:
  '1':
  - type: heading
    content: Le reste d’Israël
  - type: text
    content: 'Je demande donc : Dieu aurait-il rejeté son peuple ? Assurément pas ! En effet, ne suis-je pas moi-même Israélite, descendant d’Abraham, de la tribu de Benjamin ? '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Que leurs yeux s’obscurcissent
  - type: text
    content: ' ╵'
  - type: text
    content: au point de ne plus voir,
  - type: text
    content: fais-leur courber le dos
  - type: text
    content: ' ╵'
  - type: text
    content: continuellement
  - type: note
    content: Ps 69.23-24 cité selon l’ancienne version grecque.
  - type: text
    content: '!'
  - type: heading
    content: La chute d’Israël n’est pas définitive
  '11':
  - type: text
    content: 'Je demande alors : si les Israélites ont trébuché, est-ce pour tomber définitivement ? Loin de là ! Par leur faute, le salut est devenu accessible aux païens, ce qui excitera leur jalousie. '
  '12':
  - type: text
    content: Et si leur faute a fait la richesse du monde, et leur déchéance la richesse des non-Juifs, quelle richesse plus grande encore n’y aura-t-il pas dans leur complet rétablissement ?
  '13':
  - type: text
    content: 'Je m’adresse particulièrement ici à vous qui êtes d’origine païenne : dans la mesure même où je suis l’apôtre des non-Juifs, je me fais une idée d’autant plus haute de mon ministère '
  '14':
  - type: text
    content: 'que je parviendrai peut-être, en l’exerçant, à rendre jaloux ceux de mon peuple et à en conduire ainsi quelques-uns au salut. '
  '15':
  - type: text
    content: 'Car si leur mise à l’écart a entraîné la réconciliation du monde, quel sera l’effet de leur réintégration ? Rien de moins qu’une résurrection d’entre les morts ! '
  '16':
  - type: text
    content: En effet, si les prémices du pain offert à Dieu sont consacrées, toute la pâte l’est aussi. Si la racine est consacrée, les branches le sont aussi
  - type: note
    content: Voir Nb 15.19-21. Les prémices et la racine peuvent représenter les patriarches (v. 28).
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ainsi en est-il d’Israël : quelques branches ont été coupées. Et toi qui, par ton origine païenne, étais comme un rameau d’olivier sauvage, tu as été greffé parmi les branches restantes, et voici que tu as part avec elles à la sève qui monte de la racine de l’olivier cultivé. '
  '18':
  - type: text
    content: Ne te mets pas, pour autant, à te vanter aux dépens des branches coupées
  - type: note
    content: 'Autre traduction : les branches d’origine.'
  - type: text
    content: . Et si tu es tenté par un tel orgueil, souviens-toi que ce n’est pas toi qui portes la racine, c’est elle qui te porte !
  '19':
  - type: text
    content: 'Peut-être vas-tu dire : si des branches ont été coupées, c’est pour que je puisse être greffé. '
  '2':
  - type: text
    content: 'Non, Dieu n’a pas rejeté son peuple qu’il s’est choisi d’avance. Rappelez-vous ce que dit l’Ecriture dans le passage rapportant l’histoire d’Elie dans lequel celui-ci se plaint à Dieu au sujet d’Israël : '
  '20':
  - type: text
    content: 'Bien ! Mais elles ont été coupées à cause de leur incrédulité ; et toi, c’est à cause de ta foi que tu tiens. Ne sois donc pas orgueilleux ! Sois plutôt sur tes gardes ! '
  '21':
  - type: text
    content: Car si Dieu n’a pas épargné les branches naturelles, il ne t’épargnera pas non plus
  - type: note
    content: 'Certains manuscrits ont : prends garde, de peur qu’il ne t’épargne pas non plus.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Considère donc, à la fois, la bonté et la sévérité de Dieu : sévérité à l’égard de ceux qui sont tombés, bonté à ton égard aussi longtemps que tu t’attaches à cette bonté. Sinon, toi aussi, tu seras retranché.'
  '23':
  - type: text
    content: 'En ce qui concerne les Israélites, s’ils ne demeurent pas dans leur incrédulité, ils seront regreffés. Car Dieu a le pouvoir de les greffer de nouveau. '
  '24':
  - type: text
    content: 'En effet, toi, tu as été coupé de l’olivier sauvage auquel tu appartenais par ta nature, pour être greffé, contrairement à ta nature, sur l’olivier cultivé : à combien plus forte raison les branches qui proviennent de cet olivier seront-elles greffées sur lui !'
  - type: heading
    content: « Tout Israël sera sauvé »
  '25':
  - type: text
    content: 'Frères et sœurs, je ne veux pas que vous restiez dans l’ignorance de ce mystère, pour que vous ne croyiez pas détenir en vous-mêmes une sagesse supérieure : l’endurcissement d’une partie d’Israël durera jusqu’à ce que l’ensemble des non-Juifs soit entré dans le peuple de Dieu, '
  '26':
  - type: text
    content: 'et ainsi, tout Israël sera sauvé. C’est là ce que dit l’Ecriture :'
  - type: text
    content: De Sion
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : A cause de Sion.'
  - type: text
    content: viendra le Libérateur ;
  - type: text
    content: 'il éloignera de '
  - type: text
    content: Jacob
  - type: text
    content: ' toute désobéissance.'
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Et voici en quoi consistera mon '
  - type: text
    content: alliance
  - type: text
    content: ' avec eux'
  - type: text
    content: ' '
  - type: note
    content: Es 59.20-21 cité selon l’ancienne version grecque.
  - type: text
    content: ':'
  - type: text
    content: c’est que j’enlèverai leurs péchés
  - type: text
    content: ' '
  - type: note
    content: Es 27.9 cité selon l’ancienne version grecque. Voir Jr 31.33-34.
  - type: text
    content: .
  '28':
  - type: text
    content: 'Si l’on se place du point de vue de l’Evangile, ils sont devenus ennemis de Dieu pour que vous en bénéficiiez. Mais du point de vue du libre choix de Dieu, ils restent ses bien-aimés à cause de leurs ancêtres. '
  '29':
  - type: text
    content: 'Car les dons de la grâce et l’appel de Dieu sont irrévocables. '
  '3':
  - type: text
    content: Seigneur, ils ont tué tes prophètes, ils ont démoli tes autels. Et moi, je suis resté tout seul, et voilà qu’ils en veulent à ma vie
  - type: note
    content: 1 R 19.10.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Vous-mêmes, en effet, vous avez désobéi à Dieu autrefois et maintenant Dieu vous a fait grâce en se servant de leur désobéissance. '
  '31':
  - type: text
    content: De la même façon
  - type: note
    content: 'Plusieurs manuscrits ajoutent : maintenant.'
  - type: text
    content: ', si leur désobéissance actuelle a pour conséquence votre pardon, c’est pour que Dieu leur pardonne à eux aussi'
  - type: note
    content: 'Autres traductions : De la même façon, eux ont maintenant désobéi afin que, par le pardon que vous avez obtenu, ils obtiennent à leur tour le pardon de Dieu, ou : …ils obtiennent maintenant à leur tour….'
  - type: text
    content: '. '
  '32':
  - type: text
    content: Car Dieu a emprisonné tous les hommes dans la désobéissance afin de faire grâce à tous.
  '33':
  - type: text
    content: 'Combien grandes sont les richesses de Dieu, combien profondes sa sagesse et sa science ! Nul ne peut sonder ses jugements. Nul ne peut découvrir ses plans. '
  '34':
  - type: text
    content: Car,
  - type: text
    content: Qui a connu la pensée du Seigneur ?
  - type: text
    content: Qui a été son conseiller
  - type: text
    content: ' '
  - type: note
    content: Es 40.13 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  '35':
  - type: text
    content: ' '
  - type: text
    content: Qui lui a fait des dons
  - type: text
    content: pour devoir être payé de retour
  - type: text
    content: ' '
  - type: note
    content: Jb 41.3 .
  - type: text
    content: '?'
  '36':
  - type: text
    content: En effet, tout vient de lui, tout subsiste par lui et pour lui. A lui soit la gloire à jamais ! Amen.
  '4':
  - type: text
    content: 'Eh bien ! quelle a été la réponse de Dieu ? '
  - type: text
    content: J’ai gardé en réserve pour moi sept mille hommes qui ne se sont pas prosternés devant le dieu Baal
  - type: note
    content: 1 R 19.18.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Il en est de même dans le temps présent : il subsiste un reste que Dieu a librement choisi dans sa grâce. '
  '6':
  - type: text
    content: Or, puisque c’est par grâce, cela ne peut pas venir des œuvres, ou alors la grâce n’est plus la grâce.
  '7':
  - type: text
    content: 'Que s’est-il donc passé ? Ce que le peuple d’Israël cherchait, il ne l’a pas trouvé ; seuls ceux que Dieu a choisis l’ont obtenu. Les autres ont été rendus incapables de comprendre, conformément à ce qui est écrit :'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Dieu a frappé leur esprit de torpeur, leurs yeux de cécité et leurs oreilles de surdité,
  - type: text
    content: et il en est ainsi jusqu’à ce jour
  - type: text
    content: ' '
  - type: note
    content: Dt 29.3 ; Es 29.10.
  - type: text
    content: .
  '9':
  - type: text
    content: 'De même David déclare :'
  - type: text
    content: Que leurs banquets deviennent pour eux un piège, un filet,
  - type: text
    content: une cause de chute, et qu’ils y trouvent leur châtiment.
