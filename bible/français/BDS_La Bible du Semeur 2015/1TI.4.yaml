document_id: 1TI.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur de Dieu
  - type: heading
    content: Les fausses doctrines des derniers temps
  - type: text
    content: 'Cependant, l’Esprit déclare clairement que, dans les derniers temps, plusieurs se détourneront de la foi parce qu’ils s’attacheront à des esprits trompeurs et à des enseignements inspirés par des démons. '
  '10':
  - type: text
    content: En effet, si nous nous donnons du mal, et si nous luttons, c’est parce que nous avons mis notre espérance dans le Dieu vivant qui est le sauveur
  - type: note
    content: Paul joue ici sur le double sens du mot grec qui signifie, selon les contextes, bienfaiteur ou sauveur.
  - type: text
    content: ' de tous les hommes, et, au plus haut point'
  - type: note
    content: 'Autre traduction : plus précisément.'
  - type: text
    content: ', de ceux qui croient en lui.'
  '11':
  - type: text
    content: C’est là ce qu’il te faut recommander et enseigner.
  '12':
  - type: text
    content: Que personne ne te méprise pour ton jeune âge
  - type: note
    content: Le mot grec s’appliquait à tous ceux qui n’avaient pas dépassé la quarantaine.
  - type: text
    content: ', mais efforce-toi d’être un modèle pour les croyants par tes paroles, ta conduite, ton amour, ta foi et ta pureté.'
  '13':
  - type: text
    content: En attendant ma venue, consacre-toi à la lecture publique des Ecritures
  - type: note
    content: Comme celle qui se faisait dans les synagogues (Lc 4.16-21).
  - type: text
    content: ', à la prédication et à l’enseignement. '
  '14':
  - type: text
    content: 'Ne néglige pas le don qui t’a été fait par grâce, sur la base d’une prophétie, lorsque les responsables de l’Eglise t’ont imposé les mains. '
  '15':
  - type: text
    content: 'Prends ces choses à cœur, consacre-toi à elles, afin que tout le monde soit frappé de tes progrès. '
  '16':
  - type: text
    content: Veille sur toi-même et sur ton enseignement. Sois persévérant en cela. En agissant ainsi, tu assureras ton salut et celui de tes auditeurs.
  '2':
  - type: text
    content: Ils seront séduits par l’hypocrisie de prédicateurs de mensonge dont la conscience est comme marquée au fer rouge
  - type: note
    content: La marque au fer rouge signalait les criminels et les esclaves fugitifs.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Ces gens-là interdiront le mariage
  - type: note
    content: Cette interdiction du mariage provenait sans doute des doctrines païennes qui voyaient dans la matière, et spécialement dans le corps et la sexualité, le siège du mal.
  - type: text
    content: ', et exigeront que l’on s’abstienne de certains aliments, alors que Dieu a créé toutes choses pour que les croyants, ceux qui connaissent la vérité, en jouissent avec reconnaissance.'
  '4':
  - type: text
    content: 'En effet, tout ce que Dieu a créé est bon, rien n’est à rejeter, pourvu que l’on remercie Dieu en le prenant. '
  '5':
  - type: text
    content: 'Car tout ce qu’il a créé est saint lorsqu’on l’utilise conformément à sa Parole et avec prière. '
  '6':
  - type: text
    content: 'Expose cela aux frères et sœurs, et tu seras un bon serviteur de Jésus-Christ, te nourrissant des paroles de la foi et du bon enseignement que tu as fidèlement suivi. '
  '7':
  - type: text
    content: Mais rejette les récits absurdes et contraires à la foi.
  - type: heading
    content: Encouragements adressés à Timothée
  - type: text
    content: Entraîne-toi plutôt à rester attaché à Dieu.
  '8':
  - type: text
    content: L’exercice physique
  - type: note
    content: 'Autre traduction : La compétition sportive.'
  - type: text
    content: ' est utile à peu de choses. La piété, elle, est utile à tout puisqu’elle possède la promesse de la vie pour le présent et pour l’avenir. '
  '9':
  - type: text
    content: C’est là une parole certaine et qui mérite d’être reçue sans réserve.
