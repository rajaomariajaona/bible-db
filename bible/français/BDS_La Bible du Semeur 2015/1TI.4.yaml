document_id: 1TI.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le serviteur de Dieu
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fausses doctrines des derniers temps
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cependant, l’Esprit déclare clairement que, dans les derniers temps, plusieurs se détourneront de la foi parce qu’ils s’attacheront à des esprits trompeurs et à des enseignements inspirés par des démons. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils seront séduits par l’hypocrisie de prédicateurs de mensonge dont la conscience est comme marquée au fer rouge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La marque au fer rouge signalait les criminels et les esclaves fugitifs.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ces gens-là interdiront le mariage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette interdiction du mariage provenait sans doute des doctrines païennes qui voyaient dans la matière, et spécialement dans le corps et la sexualité, le siège du mal.
    marker-yv: yv-n
  - type: text
    text: ', et exigeront que l’on s’abstienne de certains aliments, alors que Dieu a créé toutes choses pour que les croyants, ceux qui connaissent la vérité, en jouissent avec reconnaissance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, tout ce que Dieu a créé est bon, rien n’est à rejeter, pourvu que l’on remercie Dieu en le prenant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car tout ce qu’il a créé est saint lorsqu’on l’utilise conformément à sa Parole et avec prière. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Expose cela aux frères et sœurs, et tu seras un bon serviteur de Jésus-Christ, te nourrissant des paroles de la foi et du bon enseignement que tu as fidèlement suivi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais rejette les récits absurdes et contraires à la foi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Encouragements adressés à Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Entraîne-toi plutôt à rester attaché à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’exercice physique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: La compétition sportive.
    marker-yv: yv-n
  - type: text
    text: ' est utile à peu de choses. La piété, elle, est utile à tout puisqu’elle possède la promesse de la vie pour le présent et pour l’avenir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est là une parole certaine et qui mérite d’être reçue sans réserve.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, si nous nous donnons du mal, et si nous luttons, c’est parce que nous avons mis notre espérance dans le Dieu vivant qui est le sauveur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul joue ici sur le double sens du mot grec qui signifie, selon les contextes, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bienfaiteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sauveur.
    marker-yv: yv-n
  - type: text
    text: ' de tous les hommes, et, au plus haut point'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plus précisément.
    marker-yv: yv-n
  - type: text
    text: ', de ceux qui croient en lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est là ce qu’il te faut recommander et enseigner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que personne ne te méprise pour ton jeune âge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le mot grec s’appliquait à tous ceux qui n’avaient pas dépassé la quarantaine.
    marker-yv: yv-n
  - type: text
    text: ', mais efforce-toi d’être un modèle pour les croyants par tes paroles, ta conduite, ton amour, ta foi et ta pureté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En attendant ma venue, consacre-toi à la lecture publique des Ecritures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Comme celle qui se faisait dans les synagogues (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 4.16-21
        metadata:
          usfm: LUK.4.16+LUK.4.17+LUK.4.18+LUK.4.19+LUK.4.20+LUK.4.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', à la prédication et à l’enseignement. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ne néglige pas le don qui t’a été fait par grâce, sur la base d’une prophétie, lorsque les responsables de l’Eglise t’ont imposé les mains. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Prends ces choses à cœur, consacre-toi à elles, afin que tout le monde soit frappé de tes progrès. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Veille sur toi-même et sur ton enseignement. Sois persévérant en cela. En agissant ainsi, tu assureras ton salut et celui de tes auditeurs.
