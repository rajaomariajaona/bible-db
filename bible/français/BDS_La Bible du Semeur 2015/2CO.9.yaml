document_id: 2CO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le secours destiné aux chrétiens de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quant au secours même destiné à ceux qui, en Judée, font partie du peuple saint, il est superflu de vous en écrire davantage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur cette collecte pour les chrétiens de Jérusalem, voir 1 Co 16.1-4 ; Rm 15.25.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je connais vos bonnes dispositions à ce sujet. J’ai même exprimé ma fierté à votre égard aux Macédoniens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.16'
        metadata:
          usfm: 2CO.1.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', en leur disant : « En Achaïe'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.1'
        metadata:
          usfm: 2CO.1.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ils sont prêts à donner depuis l’an dernier. » Votre zèle a motivé la plupart d’entre eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toutefois, j’envoie nos frères pour que mes éloges à votre sujet ne soient pas démentis sur ce point, et que réellement vous soyez prêts, comme je l’ai annoncé. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Autrement, si les Macédoniens m’accompagnaient et ne vous trouvaient pas prêts, ma belle assurance tournerait à ma confusion – pour ne pas dire à la vôtre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J’ai donc jugé nécessaire d’inviter ces frères à me devancer chez vous pour organiser par avance cette collecte que vous avez promise. Ainsi, elle sera prête à mon arrivée et sera l’expression d’un don libre et généreux, et non pénible et forcé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fruits de la générosité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rappelez-vous : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Semence parcimonieuse, maigre récolte. Semence généreuse, moisson abondante
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Que chacun donne ce qu’il aura décidé en son cœur, sans regret ni contrainte, car '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu aime celui qui donne avec joie
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a aussi le pouvoir de vous combler de toutes sortes de bienfaits : ainsi vous aurez, en tout temps et en toutes choses, tout ce dont vous avez besoin, et il vous en restera encore du superflu pour toutes sortes d’œuvres bonnes, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ainsi qu’il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il donne aux pauvres
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: avec largesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et sa conduite juste
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sera pour toujours prise en compte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 112.9
        metadata:
          usfm: PSA.112.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: fournit la semence au semeur et lui donne le pain dont il se nourrit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 55.10
        metadata:
          usfm: ISA.55.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' vous donnera aussi, avec largesse, toute la semence nécessaire et fera croître les fruits de votre générosité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ainsi vous deviendrez riches de tous les biens et vous pourrez donner largement, ce qui suscitera, chez ceux auxquels nous distribuerons vos dons, de nombreuses prières de reconnaissance envers Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, le service de cette collecte a pour objet non seulement de pourvoir aux besoins de ceux qui font partie du peuple saint, mais encore de faire abonder des prières de reconnaissance envers Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Par ce service, vous allez démontrer la réalité de votre engagement. Aussi ces membres du peuple saint loueront-ils Dieu pour l’obéissance par laquelle s’exprime votre foi en l’Evangile de Christ. Ils le loueront aussi pour la largesse avec laquelle vous partagez vos biens avec eux et avec tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils prieront pour vous, traduisant ainsi l’affection qu’ils vous portent, à cause de la grâce surabondante que Dieu vous a accordée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Béni soit Dieu pour son don incomparable !
