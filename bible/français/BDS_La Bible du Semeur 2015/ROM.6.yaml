document_id: ROM.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La grâce : une excuse pour pécher ?'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dire maintenant ? Persisterons-nous dans le péché pour que la grâce abonde ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est mort et c’est pour le péché qu’il est mort une fois pour toutes. Mais à présent, il est vivant et il vit pour Dieu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, vous aussi, considérez-vous comme morts pour le péché, et comme vivants pour Dieu dans l’union avec Jésus-Christ.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que le péché n’exerce donc plus sa domination sur votre corps mortel pour vous soumettre à ses désirs. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne mettez pas vos membres et organes à la disposition du péché comme des armes au service du mal. Mais puisque vous étiez morts et que vous êtes maintenant vivants, offrez-vous vous-mêmes à Dieu et mettez les membres et organes de votre corps à sa disposition comme des instruments pour faire ce qui est juste.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car le péché ne sera plus votre maître puisque vous n’êtes plus sous le régime de la Loi mais sous celui de la grâce.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quoi ? Allons-nous encore pécher sous prétexte que nous ne sommes pas sous le régime de la Loi, mais sous celui de la grâce ? Loin de là ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne savez-vous pas qu’en vous mettant au service de quelqu’un comme des esclaves pour lui obéir, vous êtes effectivement les esclaves du maître à qui vous obéissez : ou bien du péché qui entraîne la mort, ou bien de l’obéissance qui conduit à une vie juste ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu soit loué ! Si, autrefois, vous étiez les esclaves du péché, vous avez maintenant obéi de tout cœur à l’enseignement fondamental auquel vous avez été soumis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Expression qui se rapporte sans doute à l’enseignement chrétien fondamental donné à tout nouveau croyant.
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, à présent, affranchis du péché, vous êtes devenus esclaves de la justice. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je parle ici d’une manière très humaine, à cause de votre faiblesse naturelle. – De même que vous avez offert autrefois les membres et organes de votre corps en esclaves pour agir d’une manière immorale et qui ne respecte pas la Loi de Dieu, offrez-les maintenant en esclaves à la justice pour devenir saints dans votre être et votre conduite.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Loin de là ! Puisque nous sommes morts pour le péché, comment pourrions-nous vivre encore dans le péché ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous étiez encore esclaves du péché, vous étiez libres par rapport à la justice. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, quels fruits portiez-vous alors ? Des actes qui vous font rougir de honte aujourd’hui, car ils conduisent à la mort. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, affranchis du péché et devenus esclaves de Dieu, le fruit que vous portez, c’est une vie sainte, et le résultat auquel vous aboutissez, c’est la vie éternelle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car le salaire que verse le péché, c’est la mort, mais le don de la grâce que Dieu accorde, c’est la vie éternelle dans l’union avec Jésus-Christ notre Seigneur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne savez-vous pas que nous, qui avons été baptisés pour Jésus-Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression utilisée par Paul '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'baptisé pour Jésus-Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'exprime diverses nuances : l’engagement (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 3.21
        - type: text
          text: '), l’adhésion, l’appartenance, l’union. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: baptisés en Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: ', c’est en relation avec sa mort'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en sa mort.
      marker-yv: yv-n
    - type: text
      text: ' que nous avons été baptisés ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous avons donc été ensevelis avec lui par le baptême en relation avec sa mort afin que, comme Christ a été ressuscité par la puissance glorieuse du Père, nous aussi, nous menions une vie nouvelle.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car si nous avons été unis à lui par une mort semblable à la sienne, nous le serons aussi par une résurrection semblable à la sienne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comprenons donc que l’homme que nous étions autrefois a été crucifié avec Christ afin que le péché dans ce qui fait sa force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le corps en tant qu’instrument du péché.
      marker-yv: yv-n
    - type: text
      text: ' soit réduit à l’impuissance et que nous ne soyons plus esclaves du péché. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car celui qui est mort a été déclaré juste : il n’a plus à répondre du péché.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, puisque nous sommes morts avec Christ, nous croyons que nous vivrons aussi avec lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car nous savons que Christ ressuscité ne meurt plus ; la mort n’a plus de pouvoir sur lui. '
