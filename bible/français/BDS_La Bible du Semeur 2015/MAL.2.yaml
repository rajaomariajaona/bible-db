document_id: MAL.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’avertissement aux prêtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Maintenant, c’est à vous, prêtres, que s’adresse cet avertissement. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ne sommes-nous pas tous enfants d’un père unique ? N’avons-nous pas été créés par un seul Dieu ? Comment donc pouvons-nous agir avec traîtrise chacun envers son compatriote et profaner ainsi l’alliance conclue avec nos pères ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le peuple de Juda a été infidèle, et l’on a perpétré une abomination en Israël et à Jérusalem : Juda a profané le sanctuaire de l’Eternel, le lieu qu’il affectionne : des Judéens ont épousé des étrangères adorant d’autres dieux'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces mariages étaient interdits par la Loi (Ex 34.15-16 ; Dt 7.3-4 ; 1 R 11.1-6 ; Jos 23.12-13). Esdras et Néhémie ont tous deux eu à faire face à ce problème (Esd 9.1-2 ; Né 13.23-29).
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Que l’Eternel retranche à ceux qui agissent ainsi, enfants et descendance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu dit, littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'veilleur et répondant, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression qui a reçu de nombreuses interprétations. On y a vu une allusion au nouveau-né qui s’éveille et à l’enfant qui répond, ou au fils et au petit-fils, ou à la sentinelle et au soldat qui lui répond, ou à la vie des nomades qui veillent et se répondent la nuit autour des tentes, ou au disciple et au maître. En modifiant légèrement le premier terme, on a traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'témoin et répondant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en y voyant l’idée d’un soutien juridique. Pour d’autres, l’expression évoquerait la totalité. L’idée d’une privation de descendance est celle qui semble correspondre le mieux au contexte.
      marker-yv: yv-n
    - type: text
      text: ', et tout membre des familles de Jacob'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire des familles israélites, qui descendent de Jacob.
      marker-yv: yv-n
    - type: text
      text: ' qui serait susceptible de présenter l’offrande à l’Eternel, le Seigneur des armées célestes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les divorces
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici une autre faute que vous avez commise : vous inondez de larmes l’autel de l’Eternel, vous le couvrez de pleurs et de gémissements, parce que l’Eternel ne fait plus aucun cas de toutes vos offrandes et qu’il n’agrée plus de recevoir de vous ce que vous présentez'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 13-16, voir Mt 5.31-32 ; 19.3-9.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous demandez : Pourquoi en est-il ainsi ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parce que l’Eternel a été le témoin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mariage est une alliance (voir Pr 2.17 ; Ez 16.8) et les alliances sont conclues devant témoins (cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 30.19
        - type: text
          text: ' où Dieu prend les cieux et la terre à témoin ; 1 S 20.23 ; Es 8.1-2).'
      marker-yv: yv-n
    - type: text
      text: ' entre chacun de vous et la femme que vous avez épousée lorsque vous étiez jeunes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la femme de ta jeunesse, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire celle que tu as aimée et épousée quand tu étais jeune.
      marker-yv: yv-n
    - type: text
      text: ' et que vous avez trahie. Elle était pourtant ta compagne, avec qui tu avais conclu une alliance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Un homme en qui subsiste un reste de bon sens ne ferait pas cela !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous me répliquez : Alors qu’a fait cet homme-là – Abraham – dont nous avons l’exemple ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eh bien, il cherchait une descendance qui lui vienne de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction difficile. Le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abraham '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n’est pas dans l’hébreu qui est obscur, mais le passage semble faire allusion à Abraham qui a renvoyé Agar et l’enfant qu’il avait eu d’elle (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 16
        - type: text
          text: '). Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Un homme en qui subsiste un reste de bon sens ne ferait pas cela ! Car que recherche un tel homme ? Une postérité conforme à la volonté de Dieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les traductions suivantes ont aussi été proposées pour ce verset mais paraissent moins plausibles : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'même cet homme unique (Abraham) n’a pas agi ainsi, bien qu’il ne restait en lui qu’un souffle de vie. Et pourtant que cherchait-il ? Une postérité qui lui vienne de Dieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou, en modifiant légèrement le texte hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un homme en qui subsiste un brin de bon sens ne ferait pas une chose pareille. Ou alors que chercherait-il ? Une postérité accordée par Dieu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou encore, en adoptant une autre petite modification : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu n’a-t-il pas fait un seul être, chair possédant souffle de vie ? Et que cherche cet être unique ? Une postérité de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 2.7
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '24'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Restez donc dans votre bon sens, et ne trahissez pas la femme de votre jeunesse.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Car renvoyer sa femme par haine, déclare l’Eternel, Dieu d’Israël, c’est comme maculer de sang son propre vêtement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Car je hais la répudiation, déclare l’Eternel, Dieu d’Israël, et celui qui couvre de violence son propre vêtement…
      marker-yv: yv-n
    - type: text
      text: ' en commettant un acte de violence, déclare l’Eternel, le Seigneur des armées célestes.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Restez donc dans votre bon sens et n’agissez pas en traîtres !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu fera justice
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Vous lassez l’Eternel par vos discours, et puis vous demandez : En quoi te lassons-nous ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est parce que vous dites : Quiconque fait le mal est bien vu de l’Eternel. Il a plaisir à ces gens-là.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou bien encore : Où est le Dieu de la justice ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si vous n’écoutez pas, si vous ne prenez pas à cœur de m’honorer, dit l’Eternel, le Seigneur des armées célestes, alors j’enverrai la malédiction contre vous. Et vos bénédictions, j’en ferai des malédictions. Oui, j’en fais des malédictions car aucun, parmi vous, ne prend à cœur de m’honorer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je vais détruire votre postérité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je vais détruire votre postérité, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vous raccourcirai le bras, ce qui, en hébreu, ne suppose qu’une différence minime.
      marker-yv: yv-n
    - type: text
      text: ' et vous jeter à la figure les excréments des bêtes que vous offrez en sacrifice lors de vos fêtes, et puis l’on vous emportera au dehors, avec eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Et vous reconnaîtrez que je vous ai donné cet avertissement afin que mon alliance avec Lévi subsiste, déclare l’Eternel, le Seigneur des armées célestes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 3.12-13 ; Né 13.29.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'J’ai conclu mon alliance avec lui pour lui accorder la vie et le bien-être. Je les lui ai donnés pour qu’il me révère, et il m’a révéré, il tremblait devant moi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sa bouche dispensait un enseignement vrai, et l’on ne trouvait sur ses lèvres aucune fausseté. Il vivait avec moi dans la paix et avec droiture, il a détourné de leurs fautes un grand nombre de gens. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Car le prêtre doit s’attacher à la connaissance, c’est vers lui que l’on vient pour recevoir l’enseignement. Il est un messager du Seigneur des armées célestes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais vous vous êtes écartés du bon chemin : par votre enseignement, vous avez fait tomber beaucoup de gens dans le péché. Oui, vous avez rompu l’alliance conclue avec Lévi, déclare l’Eternel, le Seigneur des armées célestes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors, de mon côté, je vous ai livrés au mépris et au dédain de tout le peuple, puisque vous, vous ne suivez pas les voies que j’ai prescrites et que vous avez montré de la partialité quand vous donnez vos instructions.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les mariages mixtes
    marker-yv: yv-h
