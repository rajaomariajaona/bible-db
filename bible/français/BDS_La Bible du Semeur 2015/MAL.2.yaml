document_id: MAL.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’avertissement aux prêtres
  - type: text
    content: 'Maintenant, c’est à vous, prêtres, que s’adresse cet avertissement. '
  '10':
  - type: text
    content: 'Ne sommes-nous pas tous enfants d’un père unique ? N’avons-nous pas été créés par un seul Dieu ? Comment donc pouvons-nous agir avec traîtrise chacun envers son compatriote et profaner ainsi l’alliance conclue avec nos pères ? '
  '11':
  - type: text
    content: 'Le peuple de Juda a été infidèle, et l’on a perpétré une abomination en Israël et à Jérusalem : Juda a profané le sanctuaire de l’Eternel, le lieu qu’il affectionne : des Judéens ont épousé des étrangères adorant d’autres dieux'
  - type: note
    content: Ces mariages étaient interdits par la Loi (Ex 34.15-16 ; Dt 7.3-4 ; 1 R 11.1-6 ; Jos 23.12-13). Esdras et Néhémie ont tous deux eu à faire face à ce problème (Esd 9.1-2 ; Né 13.23-29).
  - type: text
    content: '. '
  '12':
  - type: text
    content: Que l’Eternel retranche à ceux qui agissent ainsi, enfants et descendance
  - type: note
    content: 'L’hébreu dit, littéralement : veilleur et répondant, expression qui a reçu de nombreuses interprétations. On y a vu une allusion au nouveau-né qui s’éveille et à l’enfant qui répond, ou au fils et au petit-fils, ou à la sentinelle et au soldat qui lui répond, ou à la vie des nomades qui veillent et se répondent la nuit autour des tentes, ou au disciple et au maître. En modifiant légèrement le premier terme, on a traduit témoin et répondant en y voyant l’idée d’un soutien juridique. Pour d’autres, l’expression évoquerait la totalité. L’idée d’une privation de descendance est celle qui semble correspondre le mieux au contexte.'
  - type: text
    content: ', et tout membre des familles de Jacob'
  - type: note
    content: C’est-à-dire des familles israélites, qui descendent de Jacob.
  - type: text
    content: ' qui serait susceptible de présenter l’offrande à l’Eternel, le Seigneur des armées célestes.'
  - type: heading
    content: Les divorces
  '13':
  - type: text
    content: 'Voici une autre faute que vous avez commise : vous inondez de larmes l’autel de l’Eternel, vous le couvrez de pleurs et de gémissements, parce que l’Eternel ne fait plus aucun cas de toutes vos offrandes et qu’il n’agrée plus de recevoir de vous ce que vous présentez'
  - type: note
    content: Pour les v. 13-16, voir Mt 5.31-32 ; 19.3-9.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Vous demandez : Pourquoi en est-il ainsi ?'
  - type: text
    content: Parce que l’Eternel a été le témoin
  - type: note
    content: Le mariage est une alliance (voir Pr 2.17 ; Ez 16.8) et les alliances sont conclues devant témoins (cf. Dt 30.19 où Dieu prend les cieux et la terre à témoin ; 1 S 20.23 ; Es 8.1-2).
  - type: text
    content: ' entre chacun de vous et la femme que vous avez épousée lorsque vous étiez jeunes'
  - type: note
    content: 'Littéralement : la femme de ta jeunesse, c’est-à-dire celle que tu as aimée et épousée quand tu étais jeune.'
  - type: text
    content: ' et que vous avez trahie. Elle était pourtant ta compagne, avec qui tu avais conclu une alliance. '
  '15':
  - type: text
    content: Un homme en qui subsiste un reste de bon sens ne ferait pas cela !
  - type: text
    content: 'Mais vous me répliquez : Alors qu’a fait cet homme-là – Abraham – dont nous avons l’exemple ?'
  - type: text
    content: Eh bien, il cherchait une descendance qui lui vienne de Dieu
  - type: note
    content: 'Traduction difficile. Le nom Abraham n’est pas dans l’hébreu qui est obscur, mais le passage semble faire allusion à Abraham qui a renvoyé Agar et l’enfant qu’il avait eu d’elle (Gn 16). Autre traduction : Un homme en qui subsiste un reste de bon sens ne ferait pas cela ! Car que recherche un tel homme ? Une postérité conforme à la volonté de Dieu. Les traductions suivantes ont aussi été proposées pour ce verset mais paraissent moins plausibles : même cet homme unique (Abraham) n’a pas agi ainsi, bien qu’il ne restait en lui qu’un souffle de vie. Et pourtant que cherchait-il ? Une postérité qui lui vienne de Dieu. Ou, en modifiant légèrement le texte hébreu : un homme en qui subsiste un brin de bon sens ne ferait pas une chose pareille. Ou alors que chercherait-il ? Une postérité accordée par Dieu ? Ou encore, en adoptant une autre petite modification : Dieu n’a-t-il pas fait un seul être, chair possédant souffle de vie ? Et que cherche cet être unique ? Une postérité de Dieu (voir Gn 2.7, 24).'
  - type: text
    content: . Restez donc dans votre bon sens, et ne trahissez pas la femme de votre jeunesse.
  '16':
  - type: text
    content: Car renvoyer sa femme par haine, déclare l’Eternel, Dieu d’Israël, c’est comme maculer de sang son propre vêtement
  - type: note
    content: 'Autre traduction : Car je hais la répudiation, déclare l’Eternel, Dieu d’Israël, et celui qui couvre de violence son propre vêtement…'
  - type: text
    content: ' en commettant un acte de violence, déclare l’Eternel, le Seigneur des armées célestes.'
  - type: text
    content: Restez donc dans votre bon sens et n’agissez pas en traîtres !
  - type: heading
    content: Dieu fera justice
  '17':
  - type: text
    content: 'Vous lassez l’Eternel par vos discours, et puis vous demandez : En quoi te lassons-nous ?'
  - type: text
    content: 'C’est parce que vous dites : Quiconque fait le mal est bien vu de l’Eternel. Il a plaisir à ces gens-là.'
  - type: text
    content: 'Ou bien encore : Où est le Dieu de la justice ?'
  '2':
  - type: text
    content: Si vous n’écoutez pas, si vous ne prenez pas à cœur de m’honorer, dit l’Eternel, le Seigneur des armées célestes, alors j’enverrai la malédiction contre vous. Et vos bénédictions, j’en ferai des malédictions. Oui, j’en fais des malédictions car aucun, parmi vous, ne prend à cœur de m’honorer.
  '3':
  - type: text
    content: Je vais détruire votre postérité
  - type: note
    content: 'Au lieu de je vais détruire votre postérité, les versions anciennes ont : je vous raccourcirai le bras, ce qui, en hébreu, ne suppose qu’une différence minime.'
  - type: text
    content: ' et vous jeter à la figure les excréments des bêtes que vous offrez en sacrifice lors de vos fêtes, et puis l’on vous emportera au dehors, avec eux. '
  '4':
  - type: text
    content: Et vous reconnaîtrez que je vous ai donné cet avertissement afin que mon alliance avec Lévi subsiste, déclare l’Eternel, le Seigneur des armées célestes
  - type: note
    content: Voir Nb 3.12-13 ; Né 13.29.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'J’ai conclu mon alliance avec lui pour lui accorder la vie et le bien-être. Je les lui ai donnés pour qu’il me révère, et il m’a révéré, il tremblait devant moi. '
  '6':
  - type: text
    content: 'Sa bouche dispensait un enseignement vrai, et l’on ne trouvait sur ses lèvres aucune fausseté. Il vivait avec moi dans la paix et avec droiture, il a détourné de leurs fautes un grand nombre de gens. '
  '7':
  - type: text
    content: 'Car le prêtre doit s’attacher à la connaissance, c’est vers lui que l’on vient pour recevoir l’enseignement. Il est un messager du Seigneur des armées célestes. '
  '8':
  - type: text
    content: 'Mais vous vous êtes écartés du bon chemin : par votre enseignement, vous avez fait tomber beaucoup de gens dans le péché. Oui, vous avez rompu l’alliance conclue avec Lévi, déclare l’Eternel, le Seigneur des armées célestes. '
  '9':
  - type: text
    content: Alors, de mon côté, je vous ai livrés au mépris et au dédain de tout le peuple, puisque vous, vous ne suivez pas les voies que j’ai prescrites et que vous avez montré de la partialité quand vous donnez vos instructions.
  - type: heading
    content: Les mariages mixtes
