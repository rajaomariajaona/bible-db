document_id: EZK.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le futur ennemi du peuple de Dieu et sa fin
  - type: heading
    content: Comme un ouragan
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : En ce jour-là, des projets naîtront dans ton cœur, tu concevras un dessein criminel, '
  '11':
  - type: text
    content: 'et tu diras : “Je vais attaquer un pays ouvert, et j’arriverai chez des gens qui vivent tranquilles dans la sécurité, habitant dans des villes sans remparts, sans verrous, et qui n’ont pas de portes.” '
  '12':
  - type: text
    content: Tu iras pour piller et faire du butin, et pour porter la main sur des lieux auparavant désolés, maintenant habités, contre ce peuple rassemblé d’entre les autres peuples, ayant des troupeaux et des biens, qui habitera à présent au centre de ce monde
  - type: note
    content: C’est-à-dire en Israël, à Jérusalem (voir 5.5).
  - type: text
    content: '. '
  '13':
  - type: text
    content: Ceux de Séba et de Dedân
  - type: note
    content: Peuples commerçants d’Arabie.
  - type: text
    content: ', les marchands de Tarsis et tous ses princes'
  - type: note
    content: 'Le texte hébreu a : ses lionceaux, terme qui désigne les rois en 19.1-9. L’ancienne version grecque a : les villages qui en dépendent.'
  - type: text
    content: ' te diront alors : “Est-ce donc pour piller, pour faire du butin, que tu as rassemblé tout cet amas de troupes et que tu es venu ? Est-ce pour enlever l’argent et pour emporter l’or, pour prendre les troupeaux et t’emparer des biens, pour faire un grand pillage ?” »'
  '14':
  - type: text
    content: 'C’est pourquoi, toi, fils d’homme, prophétise et va dire à Gog : « Voici ce que déclare le Seigneur, l’Eternel : Assurément, en ce temps-là où mon peuple Israël habitera là-bas dans la sécurité, tu en auras connaissance'
  - type: note
    content: 'Au lieu de tu en auras connaissance, l’ancienne version grecque porte : tu te mettras en branle.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Tu quitteras le lieu où tu seras alors aux confins du septentrion, toi et les nombreux peuples qui seront tes alliés, tous montés à cheval, grande coalition et armée innombrable, '
  '16':
  - type: text
    content: et tu viendras attaquer mon peuple Israël comme un nuage qui vient couvrir la terre. Je te ferai venir attaquer mon pays dans les temps de la fin afin que les autres peuples apprennent à connaître qui je suis, quand par mes actes envers toi je démontrerai à leurs yeux ma sainteté, ô Gog.
  - type: heading
    content: Appelé par Dieu – détruit par lui
  '17':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : N’est-ce pas toi dont j’ai parlé il y a bien longtemps par les prophètes d’Israël, mes serviteurs, qui ont prophétisé, déjà en ce temps-là et pendant des années, que je te ferais venir pour combattre mon peuple ?'
  '18':
  - type: text
    content: 'En ce jour-là, au jour où Gog pénétrera sur le sol d’Israël, c’est là ce que déclare le Seigneur, l’Eternel : La colère me montera jusqu’au visage. '
  '19':
  - type: text
    content: 'Dans ma passion et dans ma colère ardente, je le déclare, un grand tremblement de terre surviendra, en ce jour-là, au pays d’Israël. '
  '2':
  - type: text
    content: Fils d’homme, tourne tes regards vers Gog au pays de Magog, prince suprême
  - type: note
    content: 'suprême: certains traduisent : de Rosh. De même au verset 3 et en 39.1.'
  - type: text
    content: ' de Méshek et de Toubal'
  - type: note
    content: 'Méshek et Toubal, déjà cités en 27.13, sont des pays situés aux environs du Caucase, sur les bords de la mer Noire, en Asie Mineure. Gog et Magog: voir Gn 10.2-3 ; Ap 20.8.'
  - type: text
    content: '  ! Prophétise contre lui '
  '20':
  - type: text
    content: 'Devant moi trembleront les poissons de la mer, les oiseaux, les bêtes sauvages, tous les animaux qui rampent sur le sol, les insectes, et tout homme qui vit sur la surface de la terre. Les montagnes s’écrouleront, les falaises s’affaisseront, et toutes les murailles s’effondreront à terre. '
  '21':
  - type: text
    content: 'Je susciterai alors la guerre contre Gog sur toutes mes montagnes, c’est là ce que déclare le Seigneur, l’Eternel, et ils s’entretueront, chacun tirant l’épée contre son camarade. '
  '22':
  - type: text
    content: 'J’exercerai mon jugement contre lui par la peste et le sang, et je ferai tomber une forte pluie, des grêlons, du feu et du soufre, sur lui, sur ses légions et sur les peuples nombreux qui seront avec lui. '
  '23':
  - type: text
    content: Je manifesterai ma grandeur et ma sainteté, je me ferai connaître à de nombreux peuples et ils reconnaîtront que je suis l’Eternel. »
  '3':
  - type: text
    content: 'et dis : « Voici ce que déclare le Seigneur, l’Eternel : Je m’en prends à toi, Gog, prince suprême de Méshek ainsi que de Toubal. '
  '4':
  - type: text
    content: 'Je te ferai faire demi-tour, je te mettrai des crochets aux mâchoires, je te ferai sortir, toi et toute ton armée, tes chevaux et tes équipages, tous superbement revêtus et formant une troupe nombreuse, portant le grand et le petit bouclier, maniant l’épée. '
  '5':
  - type: text
    content: Perses, Ethiopiens et ceux de Pouth
  - type: note
    content: Voir Gn 10.6 et note.
  - type: text
    content: ' les rejoindront, tous équipés de casques et de boucliers. '
  '6':
  - type: text
    content: Gomer et toutes ses légions, et le peuple de Togarma
  - type: note
    content: Tous ces peuples viennent du nord. Selon Gn 10.3 et 1 Ch 1.6, Togarma était un fils de Gomer.
  - type: text
    content: ' aux confins du septentrion et toutes ses légions, des peuples innombrables, seront tes auxiliaires.'
  '7':
  - type: text
    content: 'Prends tes dispositions et tiens-toi prêt, toi et toutes tes troupes groupées autour de toi. Tu seras leur commandant. '
  '8':
  - type: text
    content: 'Au bout de bien des jours, tu seras appelé au combat ; dans la suite des temps, tu iras envahir un pays dont les habitants auront échappé à l’épée et auront été rassemblés d’entre beaucoup de peuples sur les montagnes d’Israël qui étaient si longtemps en ruine. Cette population qu’on aura fait sortir du milieu d’autres peuples habitera entièrement dans la sécurité. '
  '9':
  - type: text
    content: Tu montes, tu arrives comme un ouragan qui s’abat, comme un nuage qui va couvrir la terre, toi et tous tes bataillons et les peuples nombreux qui marchent avec toi.
