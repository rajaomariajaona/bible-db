document_id: EZK.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le futur ennemi du peuple de Dieu et sa fin
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Comme un ouragan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils d’homme, tourne tes regards vers Gog au pays de Magog, prince suprême
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: suprême
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de Rosh. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De même au verset 3 et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39.1'
        metadata:
          usfm: EZK.39.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de Méshek et de Toubal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Méshek '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Toubal, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'déjà cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27.13'
        metadata:
          usfm: EZK.27.13
      - type: text
        text: ', sont des pays situés aux environs du Caucase, sur les bords de la mer Noire, en Asie Mineure. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gog '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Magog
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir Gn 10.2-3 ; Ap 20.8.
    marker-yv: yv-n
  - type: text
    text: '  ! Prophétise contre lui '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et dis : « Voici ce que déclare le Seigneur, l’Eternel : Je m’en prends à toi, Gog, prince suprême de Méshek ainsi que de Toubal. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je te ferai faire demi-tour, je te mettrai des crochets aux mâchoires, je te ferai sortir, toi et toute ton armée, tes chevaux et tes équipages, tous superbement revêtus et formant une troupe nombreuse, portant le grand et le petit bouclier, maniant l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Perses, Ethiopiens et ceux de Pouth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.6
        metadata:
          usfm: GEN.10.6
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' les rejoindront, tous équipés de casques et de boucliers. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Gomer et toutes ses légions, et le peuple de Togarma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tous ces peuples viennent du nord. Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.3
        metadata:
          usfm: GEN.10.3
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1.6
        metadata:
          usfm: 1CH.1.6
      - type: text
        text: ', Togarma était un fils de Gomer.'
    marker-yv: yv-n
  - type: text
    text: ' aux confins du septentrion et toutes ses légions, des peuples innombrables, seront tes auxiliaires.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Prends tes dispositions et tiens-toi prêt, toi et toutes tes troupes groupées autour de toi. Tu seras leur commandant. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au bout de bien des jours, tu seras appelé au combat ; dans la suite des temps, tu iras envahir un pays dont les habitants auront échappé à l’épée et auront été rassemblés d’entre beaucoup de peuples sur les montagnes d’Israël qui étaient si longtemps en ruine. Cette population qu’on aura fait sortir du milieu d’autres peuples habitera entièrement dans la sécurité. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu montes, tu arrives comme un ouragan qui s’abat, comme un nuage qui va couvrir la terre, toi et tous tes bataillons et les peuples nombreux qui marchent avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : En ce jour-là, des projets naîtront dans ton cœur, tu concevras un dessein criminel, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et tu diras : “Je vais attaquer un pays ouvert, et j’arriverai chez des gens qui vivent tranquilles dans la sécurité, habitant dans des villes sans remparts, sans verrous, et qui n’ont pas de portes.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu iras pour piller et faire du butin, et pour porter la main sur des lieux auparavant désolés, maintenant habités, contre ce peuple rassemblé d’entre les autres peuples, ayant des troupeaux et des biens, qui habitera à présent au centre de ce monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire en Israël, à Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.5'
        metadata:
          usfm: EZK.5.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux de Séba et de Dedân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peuples commerçants d’Arabie.
    marker-yv: yv-n
  - type: text
    text: ', les marchands de Tarsis et tous ses princes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ses lionceaux, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'terme qui désigne les rois en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19.1-9
        metadata:
          usfm: EZK.19.1+EZK.19.2+EZK.19.3+EZK.19.4+EZK.19.5+EZK.19.6+EZK.19.7+EZK.19.8+EZK.19.9
      - type: text
        text: '. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les villages qui en dépendent.
    marker-yv: yv-n
  - type: text
    text: ' te diront alors : “Est-ce donc pour piller, pour faire du butin, que tu as rassemblé tout cet amas de troupes et que tu es venu ? Est-ce pour enlever l’argent et pour emporter l’or, pour prendre les troupeaux et t’emparer des biens, pour faire un grand pillage ?” »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi, toi, fils d’homme, prophétise et va dire à Gog : « Voici ce que déclare le Seigneur, l’Eternel : Assurément, en ce temps-là où mon peuple Israël habitera là-bas dans la sécurité, tu en auras connaissance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu en auras connaissance, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'l’ancienne version grecque porte : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu te mettras en branle.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu quitteras le lieu où tu seras alors aux confins du septentrion, toi et les nombreux peuples qui seront tes alliés, tous montés à cheval, grande coalition et armée innombrable, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et tu viendras attaquer mon peuple Israël comme un nuage qui vient couvrir la terre. Je te ferai venir attaquer mon pays dans les temps de la fin afin que les autres peuples apprennent à connaître qui je suis, quand par mes actes envers toi je démontrerai à leurs yeux ma sainteté, ô Gog.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Appelé par Dieu – détruit par lui
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : N’est-ce pas toi dont j’ai parlé il y a bien longtemps par les prophètes d’Israël, mes serviteurs, qui ont prophétisé, déjà en ce temps-là et pendant des années, que je te ferais venir pour combattre mon peuple ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En ce jour-là, au jour où Gog pénétrera sur le sol d’Israël, c’est là ce que déclare le Seigneur, l’Eternel : La colère me montera jusqu’au visage. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dans ma passion et dans ma colère ardente, je le déclare, un grand tremblement de terre surviendra, en ce jour-là, au pays d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Devant moi trembleront les poissons de la mer, les oiseaux, les bêtes sauvages, tous les animaux qui rampent sur le sol, les insectes, et tout homme qui vit sur la surface de la terre. Les montagnes s’écrouleront, les falaises s’affaisseront, et toutes les murailles s’effondreront à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je susciterai alors la guerre contre Gog sur toutes mes montagnes, c’est là ce que déclare le Seigneur, l’Eternel, et ils s’entretueront, chacun tirant l’épée contre son camarade. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J’exercerai mon jugement contre lui par la peste et le sang, et je ferai tomber une forte pluie, des grêlons, du feu et du soufre, sur lui, sur ses légions et sur les peuples nombreux qui seront avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je manifesterai ma grandeur et ma sainteté, je me ferai connaître à de nombreux peuples et ils reconnaîtront que je suis l’Eternel. »
