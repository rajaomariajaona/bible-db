document_id: LUK.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 1.18-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce temps-là, l’empereur Auguste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Empereur romain qui a régné de 29 av. J.-C. à 14 apr. J.-C. et a fait plusieurs recensements.
    marker-yv: yv-n
  - type: text
    text: ' publia un édit qui ordonnait le recensement de tous les habitants de l’Empire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ce recensement, le premier du genre, eut lieu à l’époque où Quirinius était gouverneur de la province de Syrie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout le monde allait se faire recenser, chacun dans la localité dont il était originaire. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est ainsi que Joseph, lui aussi, partit de Nazareth et monta de la Galilée en Judée, à Bethléhem, la ville de David : il appartenait, en effet, à la famille de David. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il s’y rendit pour se faire recenser avec Marie, sa fiancée, qui attendait un enfant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, durant leur séjour à Bethléhem, arriva le moment où Marie devait accoucher. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle mit au monde un fils : son premier-né. Elle lui mit des langes et le coucha dans une mangeoire parce qu’il n’y avait pas de place pour eux dans la pièce réservée aux hôtes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dans les champs environnants, des bergers passaient la nuit pour garder leurs troupeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Un ange du Seigneur leur apparut et la gloire du Seigneur resplendit autour d’eux. Une grande frayeur les saisit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais l’ange leur dit : N’ayez pas peur : je vous annonce une nouvelle qui sera pour tout le peuple le sujet d’une très grande joie. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un Sauveur vous est né aujourd’hui dans la ville de David ; c’est lui le Messie, le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et voici à quoi vous le reconnaîtrez : vous trouverez un nouveau-né dans ses langes et couché dans une mangeoire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et tout à coup apparut, aux côtés de l’ange, une multitude d’anges de l’armée céleste qui chantaient les louanges de Dieu :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Gloire à Dieu au plus haut des cieux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et paix sur la terre aux hommes qu’il aime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction, d’après certains manuscrits : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: paix sur terre, bienveillance pour les hommes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand les anges les eurent quittés pour retourner au ciel, les bergers se dirent l’un à l’autre : Allons donc jusqu’à Bethléhem pour voir ce qui est arrivé, ce que le Seigneur nous a fait connaître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils se dépêchèrent donc d’y aller et trouvèrent Marie et Joseph avec le nouveau-né couché dans une mangeoire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand ils le virent, ils racontèrent ce qui leur avait été dit au sujet de cet enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tous ceux qui entendirent le récit des bergers en furent très étonnés. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Marie, elle, conservait le souvenir de toutes ces paroles et y repensait souvent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les bergers s’en retournèrent, glorifiant et louant Dieu au sujet de tout ce qu’ils avaient vu et entendu : c’était bien ce que l’ange leur avait annoncé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus présenté au Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque, huit jours plus tard, arriva le moment de circoncire l’enfant, on lui donna le nom de Jésus : c’était le nom que l’ange avait indiqué avant qu’il fût conçu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis, une fois passé le temps prescrit par la Loi de Moïse pour leur purification, les parents de Jésus l’emmenèrent à Jérusalem pour le présenter au Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, il est écrit dans la Loi du Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tout garçon premier-né sera consacré au Seigneur
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13.2
        metadata:
          usfm: EXO.13.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
        metadata:
          usfm: EXO.13.12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: EXO.13.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils venaient aussi offrir le sacrifice requis par la Loi du Seigneur : une paire de tourterelles ou deux jeunes pigeons'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 12.8
        metadata:
          usfm: LEV.12.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il y avait alors, à Jérusalem, un homme appelé Siméon. C’était un homme juste et pieux ; il vivait dans l’attente de la consolation d’Israël, et le Saint-Esprit reposait sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: L’Esprit Saint lui avait révélé qu’il ne mourrait pas avant d’avoir vu le Messie, l’Envoyé du Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Poussé par l’Esprit, il vint au Temple. Quand les parents de Jésus apportèrent le petit enfant pour accomplir les rites qu’ordonnait la Loi, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Siméon le prit dans ses bras et loua Dieu en disant :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Maintenant, Seigneur, ╵tu laisses ton serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: 's’en aller en paix : ╵tu as tenu ta promesse ;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: car mes yeux ont vu ╵le salut qui vient de toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et que tu as suscité ╵en faveur de tous les peuples :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il est la lumière
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour éclairer les nations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 42.6 ; 49.6.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera la gloire ╵d’Israël ton peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Le père et la mère de Jésus étaient émerveillés de ce qu’il disait de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Siméon les bénit et dit à Marie, sa mère : Sache-le : cet enfant est destiné à être, pour beaucoup en Israël, une occasion de chute ou de relèvement. Il sera un signe qui suscitera la contradiction : '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ainsi seront dévoilées les pensées cachées de bien des gens. Quant à toi, tu auras le cœur comme transpercé par une épée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d’Aser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’une des douze tribus d’Israël.
    marker-yv: yv-n
  - type: text
    text: '. Elle était très âgée. Dans sa jeunesse, elle avait été mariée pendant sept ans, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'puis elle était devenue veuve et avait vécu seule jusqu’à quatre-vingt-quatre ans. Elle ne quittait jamais le Temple où elle servait Dieu, nuit et jour, par le jeûne et la prière. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Elle arriva, elle aussi, au même moment ; elle louait Dieu et parlait de l’enfant à tous ceux qui attendaient que Dieu délivre Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Après avoir accompli tout ce que la Loi du Seigneur ordonnait, Marie et Joseph retournèrent en Galilée, à Nazareth, leur village. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Le petit enfant grandissait et se développait. Il était plein de sagesse, et la grâce de Dieu reposait sur lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dans le Temple à douze ans
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Les parents de Jésus se rendaient chaque année à Jérusalem pour la fête de la Pâque. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Quand Jésus eut douze ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A cet âge, les jeunes Juifs étaient considérés comme majeurs pour les questions religieuses.
    marker-yv: yv-n
  - type: text
    text: ', ils y montèrent selon la coutume de la fête.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Une fois la fête terminée, ils prirent le chemin du retour, mais Jésus, leur fils, resta à Jérusalem et ses parents ne s’en aperçurent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ils supposaient, en effet, qu’il se trouvait avec leurs compagnons de voyage et firent ainsi une journée de marche. Ils se mirent alors à le chercher parmi leurs parents et leurs connaissances. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mais ils ne le trouvèrent pas. Aussi retournèrent-ils à Jérusalem pour le chercher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Trois jours plus tard, ils le retrouvèrent dans le Temple, assis au milieu des maîtres ; il les écoutait et leur posait des questions. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tous ceux qui l’entendaient s’émerveillaient de son intelligence et de ses réponses. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ses parents furent très étonnés de le voir là, et sa mère lui dit : Mon enfant, pourquoi nous as-tu fait cela ? Tu sais, ton père et moi, nous étions très inquiets et nous t’avons cherché partout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Pourquoi m’avez-vous cherché ?
  - type: text
    text: ' leur répondit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne saviez-vous pas que je dois m’occuper des affaires de mon Père ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Mais ils ne comprirent pas ce qu’il leur disait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il repartit donc avec eux et retourna à Nazareth. Et il leur était obéissant. Sa mère gardait précieusement dans son cœur le souvenir de tout ce qui s’était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
