document_id: LUK.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La naissance de Jésus
  - type: heading
    content: (Mt 1.18-25)
  - type: text
    content: En ce temps-là, l’empereur Auguste
  - type: note
    content: Empereur romain qui a régné de 29 av. J.-C. à 14 apr. J.-C. et a fait plusieurs recensements.
  - type: text
    content: ' publia un édit qui ordonnait le recensement de tous les habitants de l’Empire. '
  '10':
  - type: text
    content: 'Mais l’ange leur dit : N’ayez pas peur : je vous annonce une nouvelle qui sera pour tout le peuple le sujet d’une très grande joie. '
  '11':
  - type: text
    content: 'Un Sauveur vous est né aujourd’hui dans la ville de David ; c’est lui le Messie, le Seigneur. '
  '12':
  - type: text
    content: 'Et voici à quoi vous le reconnaîtrez : vous trouverez un nouveau-né dans ses langes et couché dans une mangeoire.'
  '13':
  - type: text
    content: 'Et tout à coup apparut, aux côtés de l’ange, une multitude d’anges de l’armée céleste qui chantaient les louanges de Dieu :'
  '14':
  - type: text
    content: Gloire à Dieu au plus haut des cieux !
  - type: text
    content: Et paix sur la terre aux hommes qu’il aime
  - type: note
    content: 'Autre traduction, d’après certains manuscrits : paix sur terre, bienveillance pour les hommes.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'Quand les anges les eurent quittés pour retourner au ciel, les bergers se dirent l’un à l’autre : Allons donc jusqu’à Bethléhem pour voir ce qui est arrivé, ce que le Seigneur nous a fait connaître.'
  '16':
  - type: text
    content: 'Ils se dépêchèrent donc d’y aller et trouvèrent Marie et Joseph avec le nouveau-né couché dans une mangeoire. '
  '17':
  - type: text
    content: 'Quand ils le virent, ils racontèrent ce qui leur avait été dit au sujet de cet enfant. '
  '18':
  - type: text
    content: 'Tous ceux qui entendirent le récit des bergers en furent très étonnés. '
  '19':
  - type: text
    content: Marie, elle, conservait le souvenir de toutes ces paroles et y repensait souvent.
  '2':
  - type: text
    content: Ce recensement, le premier du genre, eut lieu à l’époque où Quirinius était gouverneur de la province de Syrie.
  '20':
  - type: text
    content: 'Les bergers s’en retournèrent, glorifiant et louant Dieu au sujet de tout ce qu’ils avaient vu et entendu : c’était bien ce que l’ange leur avait annoncé.'
  - type: heading
    content: Jésus présenté au Temple
  '21':
  - type: text
    content: 'Lorsque, huit jours plus tard, arriva le moment de circoncire l’enfant, on lui donna le nom de Jésus : c’était le nom que l’ange avait indiqué avant qu’il fût conçu. '
  '22':
  - type: text
    content: 'Puis, une fois passé le temps prescrit par la Loi de Moïse pour leur purification, les parents de Jésus l’emmenèrent à Jérusalem pour le présenter au Seigneur. '
  '23':
  - type: text
    content: 'En effet, il est écrit dans la Loi du Seigneur :'
  - type: text
    content: Tout garçon premier-né sera consacré au Seigneur
  - type: text
    content: ' '
  - type: note
    content: Ex 13.2, 12, 15.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Ils venaient aussi offrir le sacrifice requis par la Loi du Seigneur : une paire de tourterelles ou deux jeunes pigeons'
  - type: note
    content: Lv 12.8.
  - type: text
    content: .
  '25':
  - type: text
    content: 'Il y avait alors, à Jérusalem, un homme appelé Siméon. C’était un homme juste et pieux ; il vivait dans l’attente de la consolation d’Israël, et le Saint-Esprit reposait sur lui. '
  '26':
  - type: text
    content: L’Esprit Saint lui avait révélé qu’il ne mourrait pas avant d’avoir vu le Messie, l’Envoyé du Seigneur.
  '27':
  - type: text
    content: 'Poussé par l’Esprit, il vint au Temple. Quand les parents de Jésus apportèrent le petit enfant pour accomplir les rites qu’ordonnait la Loi, '
  '28':
  - type: text
    content: 'Siméon le prit dans ses bras et loua Dieu en disant :'
  '29':
  - type: text
    content: Maintenant, Seigneur, ╵tu laisses ton serviteur
  - type: text
    content: 's’en aller en paix : ╵tu as tenu ta promesse ;'
  '3':
  - type: text
    content: 'Tout le monde allait se faire recenser, chacun dans la localité dont il était originaire. '
  '30':
  - type: text
    content: car mes yeux ont vu ╵le salut qui vient de toi,
  '31':
  - type: text
    content: 'et que tu as suscité ╵en faveur de tous les peuples :'
  '32':
  - type: text
    content: ' '
  - type: text
    content: il est la lumière
  - type: text
    content: ' ╵'
  - type: text
    content: pour éclairer les nations
  - type: note
    content: Es 42.6 ; 49.6.
  - type: text
    content: ','
  - type: text
    content: il sera la gloire ╵d’Israël ton peuple.
  '33':
  - type: text
    content: Le père et la mère de Jésus étaient émerveillés de ce qu’il disait de lui.
  '34':
  - type: text
    content: 'Siméon les bénit et dit à Marie, sa mère : Sache-le : cet enfant est destiné à être, pour beaucoup en Israël, une occasion de chute ou de relèvement. Il sera un signe qui suscitera la contradiction : '
  '35':
  - type: text
    content: ainsi seront dévoilées les pensées cachées de bien des gens. Quant à toi, tu auras le cœur comme transpercé par une épée.
  '36':
  - type: text
    content: Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d’Aser
  - type: note
    content: L’une des douze tribus d’Israël.
  - type: text
    content: '. Elle était très âgée. Dans sa jeunesse, elle avait été mariée pendant sept ans, '
  '37':
  - type: text
    content: 'puis elle était devenue veuve et avait vécu seule jusqu’à quatre-vingt-quatre ans. Elle ne quittait jamais le Temple où elle servait Dieu, nuit et jour, par le jeûne et la prière. '
  '38':
  - type: text
    content: Elle arriva, elle aussi, au même moment ; elle louait Dieu et parlait de l’enfant à tous ceux qui attendaient que Dieu délivre Jérusalem.
  '39':
  - type: text
    content: 'Après avoir accompli tout ce que la Loi du Seigneur ordonnait, Marie et Joseph retournèrent en Galilée, à Nazareth, leur village. '
  '4':
  - type: text
    content: 'C’est ainsi que Joseph, lui aussi, partit de Nazareth et monta de la Galilée en Judée, à Bethléhem, la ville de David : il appartenait, en effet, à la famille de David. '
  '40':
  - type: text
    content: Le petit enfant grandissait et se développait. Il était plein de sagesse, et la grâce de Dieu reposait sur lui.
  - type: heading
    content: Jésus dans le Temple à douze ans
  '41':
  - type: text
    content: 'Les parents de Jésus se rendaient chaque année à Jérusalem pour la fête de la Pâque. '
  '42':
  - type: text
    content: Quand Jésus eut douze ans
  - type: note
    content: A cet âge, les jeunes Juifs étaient considérés comme majeurs pour les questions religieuses.
  - type: text
    content: ', ils y montèrent selon la coutume de la fête.'
  '43':
  - type: text
    content: 'Une fois la fête terminée, ils prirent le chemin du retour, mais Jésus, leur fils, resta à Jérusalem et ses parents ne s’en aperçurent pas. '
  '44':
  - type: text
    content: 'Ils supposaient, en effet, qu’il se trouvait avec leurs compagnons de voyage et firent ainsi une journée de marche. Ils se mirent alors à le chercher parmi leurs parents et leurs connaissances. '
  '45':
  - type: text
    content: Mais ils ne le trouvèrent pas. Aussi retournèrent-ils à Jérusalem pour le chercher.
  '46':
  - type: text
    content: 'Trois jours plus tard, ils le retrouvèrent dans le Temple, assis au milieu des maîtres ; il les écoutait et leur posait des questions. '
  '47':
  - type: text
    content: 'Tous ceux qui l’entendaient s’émerveillaient de son intelligence et de ses réponses. '
  '48':
  - type: text
    content: 'Ses parents furent très étonnés de le voir là, et sa mère lui dit : Mon enfant, pourquoi nous as-tu fait cela ? Tu sais, ton père et moi, nous étions très inquiets et nous t’avons cherché partout.'
  '49':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi m’avez-vous cherché ?
  - type: text
    content: ' leur répondit Jésus. '
  - type: text
    content: Ne saviez-vous pas que je dois m’occuper des affaires de mon Père ?
  '5':
  - type: text
    content: Il s’y rendit pour se faire recenser avec Marie, sa fiancée, qui attendait un enfant.
  '50':
  - type: text
    content: Mais ils ne comprirent pas ce qu’il leur disait.
  '51':
  - type: text
    content: 'Il repartit donc avec eux et retourna à Nazareth. Et il leur était obéissant. Sa mère gardait précieusement dans son cœur le souvenir de tout ce qui s’était passé. '
  '52':
  - type: text
    content: Jésus grandissait et progressait en sagesse, et il se rendait toujours plus agréable à Dieu et aux hommes.
  '6':
  - type: text
    content: 'Or, durant leur séjour à Bethléhem, arriva le moment où Marie devait accoucher. '
  '7':
  - type: text
    content: 'Elle mit au monde un fils : son premier-né. Elle lui mit des langes et le coucha dans une mangeoire parce qu’il n’y avait pas de place pour eux dans la pièce réservée aux hôtes.'
  '8':
  - type: text
    content: 'Dans les champs environnants, des bergers passaient la nuit pour garder leurs troupeaux. '
  '9':
  - type: text
    content: Un ange du Seigneur leur apparut et la gloire du Seigneur resplendit autour d’eux. Une grande frayeur les saisit.
