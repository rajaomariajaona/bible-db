document_id: PSA.97,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand Dieu de l’univers
  - type: text
    content: L’Eternel règne ! ╵O terre exulte d’allégresse !
  - type: text
    content: Réjouissez-vous, îles nombreuses !
  '10':
  - type: text
    content: Vous qui aimez l’Eternel, ╵ayez le mal en horreur !
  - type: text
    content: L’Eternel garde la vie ╵de qui lui est attaché
  - type: text
    content: et, de la main des méchants, ╵il les délivre.
  '11':
  - type: text
    content: Une lumière ╵est semée pour l’homme juste
  - type: text
    content: et de la joie ╵pour ceux qui ont le cœur droit.
  '12':
  - type: text
    content: O, vous les justes, ╵réjouissez-vous ╵à cause de l’Eternel !
  - type: text
    content: Louez-le en évoquant ╵sa sainteté !
  '2':
  - type: text
    content: Autour de lui, ╵des nuées sombres et l’obscurité.
  - type: text
    content: Justice et droit sont l’appui de son trône,
  '3':
  - type: text
    content: et, devant lui, ╵un feu s’avance
  - type: text
    content: qui embrase tous ses ennemis à l’entour.
  '4':
  - type: text
    content: Quand ses éclairs illuminent le monde
  - type: note
    content: Voir 77.19. Toute cette description rappelle la manifestation de Dieu au Sinaï (Ex 19.16-19).
  - type: text
    content: ','
  - type: text
    content: en les voyant, la terre tremble.
  '5':
  - type: text
    content: Quant aux montagnes, ╵elles se fondent devant l’Eternel, ╵comme la cire,
  - type: text
    content: devant le Maître de toute la terre.
  '6':
  - type: text
    content: Les cieux proclament sa justice
  - type: text
    content: et tous les peuples contemplent sa gloire.
  '7':
  - type: text
    content: Que la honte les gagne, tous les adorateurs d’idoles,
  - type: text
    content: ceux qui se glorifient de leurs faux dieux.
  - type: text
    content: Que tous les « dieux » devant lui se prosternent
  - type: note
    content: Cité en Hé 1.6 selon l’ancienne version grecque qui a compris le mot « dieux » comme désignant les anges.
  - type: text
    content: .
  '8':
  - type: text
    content: Sion l’apprend ╵et s’en réjouit.
  - type: text
    content: Toutes les villes de Juda ╵exultent d’allégresse,
  - type: text
    content: à cause de tes jugements, ╵ô Eternel !
  '9':
  - type: text
    content: Car toi, Eternel, tu es le Très-Haut, ╵au-dessus de toute la terre,
  - type: text
    content: et tu surpasses de loin tous les dieux !
