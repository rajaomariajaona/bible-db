document_id: PSA.97,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le grand Dieu de l’univers
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel règne ! ╵O terre exulte d’allégresse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouissez-vous, îles nombreuses !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui aimez l’Eternel, ╵ayez le mal en horreur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel garde la vie ╵de qui lui est attaché
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de la main des méchants, ╵il les délivre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une lumière ╵est semée pour l’homme juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la joie ╵pour ceux qui ont le cœur droit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O, vous les justes, ╵réjouissez-vous ╵à cause de l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le en évoquant ╵sa sainteté !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autour de lui, ╵des nuées sombres et l’obscurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Justice et droit sont l’appui de son trône,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, devant lui, ╵un feu s’avance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui embrase tous ses ennemis à l’entour.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ses éclairs illuminent le monde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '77.19'
        - type: text
          text: . Toute cette description rappelle la manifestation de Dieu au Sinaï (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 19.16-19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en les voyant, la terre tremble.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant aux montagnes, ╵elles se fondent devant l’Eternel, ╵comme la cire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant le Maître de toute la terre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux proclament sa justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les peuples contemplent sa gloire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la honte les gagne, tous les adorateurs d’idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui se glorifient de leurs faux dieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous les « dieux » devant lui se prosternent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 1.6
        - type: text
          text: ' selon l’ancienne version grecque qui a compris le mot « dieux » comme désignant les anges.'
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion l’apprend ╵et s’en réjouit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les villes de Juda ╵exultent d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes jugements, ╵ô Eternel !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toi, Eternel, tu es le Très-Haut, ╵au-dessus de toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu surpasses de loin tous les dieux !
