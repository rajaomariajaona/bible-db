document_id: 1CH.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les groupes de chanteurs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David, assisté des chefs du corps des fonctionnaires du culte, détacha certains descendants d’Asaph, d’Hémân et de Yedoutoun qui prophétisaient en s’accompagnant de lyres, de luths et de cymbales. Voici la liste de ceux qui furent affectés à ce service :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, dans l’ordre résultant du tirage au sort, voici la liste des chefs de groupe, chaque groupe comprenant douze hommes, soit le chef, ses fils et des hommes de sa parenté. Le deuxième sort échut à Guedalia. Puis vinrent : Zakkour, Yitseri, Netania, Bouqqiya, Yesareéla, Esaïe, Mattania, Shimeï, Azaréel, Hashabia, Shoubaël, Mattitia, Yerémoth, Hanania, Yoshbeqasha, Hanani, Malloti, Eliyata, Hotir, Guiddalti, Mahazioth, Romamti-Ezer.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Asaph, les fils d’Asaph : Zakkour, Joseph, Netania et Asareéla étaient sous la direction de leur père, qui chantait sous la direction du roi des cantiques inspirés. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Yedoutoun, les six fils de Yedoutoun : Guedalia, Tseri, Esaïe, Shiméï'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque, '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 25.17
        - type: text
          text: ', et à cause du nombre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'six '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: indiqué ici. Ce nom manque dans les autres manuscrits hébreux.
      marker-yv: yv-n
    - type: text
      text: ', Hashabia et Mattitia étaient sous la direction de leur père, qui prophétisait par le chant en s’accompagnant de la lyre, pour célébrer et louer l’Eternel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Hémân, les fils d’Hémân : Bouqqiya, Mattania, Ouzziel, Shebouel, Yerimoth, Hanania, Hanani, Eliata, Guiddalti, Romamti-Ezer, Yoshbeqasha, Malloti, Hotir, Mahazioth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux-là étaient les fils d’Hémân, le prophète du roi, qui recevait des paroles de Dieu pour exalter sa puissance. Outre ses quatorze fils, Dieu avait donné trois filles à Hémân. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils chantaient tous sous la direction de leur père dans le temple de l’Eternel en s’accompagnant des cymbales, des luths et des lyres, et accomplissaient ainsi leur service pour le Temple. Asaph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: …des lyres. Pour accomplir leur service dans le temple, Asaph…
      marker-yv: yv-n
    - type: text
      text: ', Yedoutoun et Hémân étaient sous la direction du roi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre des lévites formés et passés maîtres dans l’art de louer l’Eternel par le chant était de deux cent quatre-vingt-huit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leur ordre de service fut déterminé par tirage au sort, sans faire de différence entre ceux de rang élevé et ceux de rang peu important, ou entre maîtres et disciples. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier sort échut pour Asaph à Joseph, de la famille d’Asaph. '
