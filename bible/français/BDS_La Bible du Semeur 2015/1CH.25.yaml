document_id: 1CH.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les groupes de chanteurs
  - type: text
    content: 'David, assisté des chefs du corps des fonctionnaires du culte, détacha certains descendants d’Asaph, d’Hémân et de Yedoutoun qui prophétisaient en s’accompagnant de lyres, de luths et de cymbales. Voici la liste de ceux qui furent affectés à ce service :'
  '10':
  - type: text
    content: 'Ensuite, dans l’ordre résultant du tirage au sort, voici la liste des chefs de groupe, chaque groupe comprenant douze hommes, soit le chef, ses fils et des hommes de sa parenté. Le deuxième sort échut à Guedalia. Puis vinrent : Zakkour, Yitseri, Netania, Bouqqiya, Yesareéla, Esaïe, Mattania, Shimeï, Azaréel, Hashabia, Shoubaël, Mattitia, Yerémoth, Hanania, Yoshbeqasha, Hanani, Malloti, Eliyata, Hotir, Guiddalti, Mahazioth, Romamti-Ezer.'
  '2':
  - type: text
    content: 'Pour Asaph, les fils d’Asaph : Zakkour, Joseph, Netania et Asareéla étaient sous la direction de leur père, qui chantait sous la direction du roi des cantiques inspirés. '
  '3':
  - type: text
    content: 'Pour Yedoutoun, les six fils de Yedoutoun : Guedalia, Tseri, Esaïe, Shiméï'
  - type: note
    content: D’après un manuscrit hébreu, certains manuscrits de l’ancienne version grecque, 1 Ch 25.17, et à cause du nombre six indiqué ici. Ce nom manque dans les autres manuscrits hébreux.
  - type: text
    content: ', Hashabia et Mattitia étaient sous la direction de leur père, qui prophétisait par le chant en s’accompagnant de la lyre, pour célébrer et louer l’Eternel. '
  '4':
  - type: text
    content: 'Pour Hémân, les fils d’Hémân : Bouqqiya, Mattania, Ouzziel, Shebouel, Yerimoth, Hanania, Hanani, Eliata, Guiddalti, Romamti-Ezer, Yoshbeqasha, Malloti, Hotir, Mahazioth. '
  '5':
  - type: text
    content: 'Tous ceux-là étaient les fils d’Hémân, le prophète du roi, qui recevait des paroles de Dieu pour exalter sa puissance. Outre ses quatorze fils, Dieu avait donné trois filles à Hémân. '
  '6':
  - type: text
    content: Ils chantaient tous sous la direction de leur père dans le temple de l’Eternel en s’accompagnant des cymbales, des luths et des lyres, et accomplissaient ainsi leur service pour le Temple. Asaph
  - type: note
    content: 'Autre traduction : …des lyres. Pour accomplir leur service dans le temple, Asaph…'
  - type: text
    content: ', Yedoutoun et Hémân étaient sous la direction du roi. '
  '7':
  - type: text
    content: 'Le nombre des lévites formés et passés maîtres dans l’art de louer l’Eternel par le chant était de deux cent quatre-vingt-huit. '
  '8':
  - type: text
    content: 'Leur ordre de service fut déterminé par tirage au sort, sans faire de différence entre ceux de rang élevé et ceux de rang peu important, ou entre maîtres et disciples. '
  '9':
  - type: text
    content: 'Le premier sort échut pour Asaph à Joseph, de la famille d’Asaph. '
