document_id: JDG.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abimélek
  - type: text
    content: 'Abimélek, l’un des fils de Yeroubbaal, se rendit à Sichem auprès de ses oncles maternels, et leur dit en présence de tout le groupe familial de sa mère : '
  '10':
  - type: text
    content: 'Alors les arbres dirent au figuier : « Viens, toi, règne sur nous ! » '
  '11':
  - type: text
    content: 'Mais le figuier leur répondit : « Vais-je renoncer à produire des fruits exquis et sucrés pour aller me pavaner au-dessus des autres arbres ? » '
  '12':
  - type: text
    content: 'Puis les arbres dirent à la vigne : « Viens donc, toi, règne sur nous ! » '
  '13':
  - type: text
    content: 'Mais la vigne leur répondit : « Vais-je renoncer à produire mon vin qui réjouit Dieu et les hommes pour aller me pavaner au-dessus des autres arbres ? » '
  '14':
  - type: text
    content: 'Finalement, tous les arbres dirent au buisson d’épines : « Viens donc, toi, règne sur nous ! » '
  '15':
  - type: text
    content: 'Et le buisson d’épines leur répondit : « Si, de bonne foi, vous voulez faire de moi votre roi, venez vous abriter sous mon ombrage. Si vous refusez, un feu jaillira du buisson d’épines et consumera même les cèdres du Liban. »'
  '16':
  - type: text
    content: 'Maintenant donc, est-ce de bonne foi et en toute droiture que vous avez agi en proclamant Abimélek roi ? Avez-vous bien agi envers Yeroubbaal et sa famille ? L’avez-vous traité selon ce qu’il méritait ? '
  '17':
  - type: text
    content: 'Mon père a combattu pour vous, il a risqué sa vie pour vous délivrer des Madianites. '
  '18':
  - type: text
    content: 'Et vous, aujourd’hui vous vous êtes attaqués à sa famille, vous avez tué ses fils, soixante-dix hommes à la fois sur un même rocher, et vous avez établi roi de Sichem Abimélek, le fils de sa servante, parce qu’il est des vôtres. '
  '19':
  - type: text
    content: 'Si donc, aujourd’hui c’est de bonne foi et en toute droiture que vous avez agi à l’égard de Yeroubbaal et de sa famille, eh bien, qu’Abimélek fasse votre bonheur et vous le sien ! '
  '2':
  - type: text
    content: 'Posez donc à tous les notables de Sichem la question suivante : « Que vaut-il mieux pour vous ? Etre gouvernés par les soixante-dix fils de Yeroubbaal ou par un seul homme ? Souvenez-vous que nous sommes du même sang, vous et moi ! »'
  '20':
  - type: text
    content: Sinon, qu’un feu sorte d’Abimélek et consume les habitants de Sichem et de Beth-Millo, et qu’un feu sorte des habitants de Sichem et de Beth-Millo et consume Abimélek.
  '21':
  - type: text
    content: Puis Yotam s’enfuit et alla se réfugier à Beer où il s’établit pour échapper à son frère Abimélek.
  - type: heading
    content: La révolte de Sichem
  '22':
  - type: text
    content: 'Abimélek gouverna Israël pendant trois ans. '
  '23':
  - type: text
    content: Après quoi Dieu envoya un esprit de discorde entre Abimélek et les notables de Sichem qui se révoltèrent contre Abimélek.
  '24':
  - type: text
    content: 'Ainsi les violences commises contre les soixante-dix fils de Yeroubbaal et leur meurtre allaient retomber sur Abimélek, parce qu’il avait tué ses frères, et sur les gens de Sichem parce qu’ils l’avaient soutenu pour commettre ce meurtre. '
  '25':
  - type: text
    content: Les habitants de Sichem postèrent sur les hauteurs proches de la ville des hommes qui dévalisaient tous les voyageurs qui passaient près d’eux sur la route. Abimélek en fut informé.
  '26':
  - type: text
    content: 'A la même époque, Gaal, fils d’Ebed, vint à passer par Sichem avec les hommes de sa parenté. Ils s’y établirent et il gagna la confiance des habitants de la ville. '
  '27':
  - type: text
    content: 'Au moment de la vendange, ces gens sortirent dans les vignes, ils foulèrent le raisin, puis ils organisèrent des réjouissances dans le temple de leur dieu ; ils mangèrent et burent et ils lancèrent des malédictions contre Abimélek. '
  '28':
  - type: text
    content: 'A ce moment-là, Gaal s’écria : Qu’est-ce qu’un Abimélek par rapport à Sichem, pour que nous nous laissions dominer par cet homme ? Après tout, ce n’est qu’un fils de Yeroubbaal et il fait gouverner la ville par son lieutenant Zeboul ! Ce sont les descendants de Hamor'
  - type: note
    content: Voir Gn 33.19.
  - type: text
    content: ', le père de Sichem, qu’il vous faut comme maîtres, mais Abimélek n’a aucun titre à notre soumission. '
  '29':
  - type: text
    content: Ah ! Si seulement on me confiait la direction de ce peuple ! J’aurais vite fait de chasser Abimélek ! Je lui dirais
  - type: note
    content: 'Je lui dirais: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : et il s’écria.'
  - type: text
    content: '  : « Allez, Abimélek, rassemble tes troupes et viens te battre ! »'
  '3':
  - type: text
    content: 'Ses oncles allèrent répéter ses paroles à tous les notables de Sichem. Ceux-ci décidèrent de suivre son parti puisqu’il était l’un des leurs. '
  '30':
  - type: text
    content: 'Zeboul, le gouverneur de la ville, entendit les paroles de Gaal, fils d’Ebed, et il se mit en colère. '
  '31':
  - type: text
    content: 'Il envoya secrètement des messagers dire à Abimélek : Sache que Gaal, fils d’Ebed, et les gens de sa parenté sont venus à Sichem et qu’ils sont en train de soulever la ville contre toi. '
  '32':
  - type: text
    content: 'Maintenant donc, viens durant la nuit avec tes hommes. Vous vous mettrez en embuscade dans la campagne. '
  '33':
  - type: text
    content: Le matin, au lever du soleil, tu lanceras une attaque contre la ville. Lorsque Gaal et ses hommes sortiront contre toi, tu sauras les traiter comme il convient.
  '34':
  - type: text
    content: 'Abimélek et toutes ses troupes se levèrent la nuit suivante et se mirent en embuscade en quatre groupes aux alentours de Sichem. '
  '35':
  - type: text
    content: 'Lorsque Gaal sortit de la ville et vint s’installer à l’entrée devant la porte, Abimélek et ses hommes surgirent de l’endroit où ils se tenaient en embuscade. '
  '36':
  - type: text
    content: 'Gaal les vit et dit à Zeboul : Voilà une troupe qui descend du haut des collines !'
  - type: text
    content: – Mais non, lui répondit Zeboul, c’est l’ombre des collines que tu prends pour des hommes.
  '37':
  - type: text
    content: 'Mais Gaal insista : Si, regarde ! C’est une troupe qui descend de la colline du milieu du pays, et une autre arrive par la route du chêne des devins.'
  '38':
  - type: text
    content: 'Alors Zeboul dit : Où donc sont tes beaux discours ? N’as-tu pas dit : « Qu’est-ce qu’un Abimélek pour que nous nous laissions dominer par lui ? » Et cette troupe, n’est-ce pas celle que tu méprisais ? Eh bien, sors maintenant, c’est le moment d’aller te battre contre lui !'
  '39':
  - type: text
    content: 'Alors Gaal conduisit les hommes de Sichem au combat contre Abimélek. '
  '4':
  - type: text
    content: 'Ils lui donnèrent soixante-dix pièces d’argent prélevées dans le temple de Baal-Berith. Avec cet argent, Abimélek embaucha des vauriens et des aventuriers pour qu’ils le suivent. '
  '40':
  - type: text
    content: 'Mais celui-ci le mit en fuite et se lança à sa poursuite. Beaucoup d’hommes tombèrent jusqu’à la porte de la ville. '
  '41':
  - type: text
    content: Abimélek alla s’installer à Arouma, et Zeboul expulsa Gaal et les hommes de sa parenté de Sichem en leur interdisant d’y revenir.
  - type: heading
    content: Abimélek détruit Sichem
  '42':
  - type: text
    content: 'Le lendemain, les gens de Sichem se rendirent dans les champs. Abimélek en fut informé. '
  '43':
  - type: text
    content: 'Alors il réunit ses hommes, les répartit en trois corps et les posta en embuscade dans la campagne. Dès qu’il vit les gens sortir de la ville, il se précipita sur eux et les tua. '
  '44':
  - type: text
    content: 'Laissant deux groupes continuer le massacre dans la campagne, Abimélek et les siens vinrent prendre position à l’entrée de la ville. '
  '45':
  - type: text
    content: 'Il donna l’assaut et poursuivit son offensive durant toute la journée. Finalement, il s’empara de la ville et en massacra les habitants, puis il rasa la ville et répandit du sel sur son emplacement. '
  '46':
  - type: text
    content: 'Lorsque les habitants de Migdal-Sichem apprirent ce qui s’était passé, ils allèrent tous se réfugier dans la crypte du temple du dieu Berith. '
  '47':
  - type: text
    content: 'On informa Abimélek que les habitants de Migdal-Sichem s’étaient rassemblés. '
  '48':
  - type: text
    content: 'Il gravit le mont Tsalmôn avec sa troupe, prit une hache et coupa une branche d’arbre qu’il plaça sur son épaule. Puis il ordonna à ses hommes : « Vous voyez ce que je viens de faire. Dépêchez-vous de faire la même chose ! » '
  '49':
  - type: text
    content: 'Chacun coupa sa branche et suivit Abimélek. Ils allèrent entasser ces branches autour de la crypte du temple et l’incendièrent avec tous ceux qui s’y trouvaient. Ainsi périrent aussi tous les habitants de Migdal-Sichem : un millier d’hommes et de femmes.'
  - type: heading
    content: La mort d’Abimélek
  '5':
  - type: text
    content: 'Puis il se rendit à Ophra où vivait la famille de son père et massacra ses soixante-dix frères, fils de Yeroubbaal, en les tuant sur le même rocher. Seul Yotam, le plus jeune fils de Yeroubbaal, échappa, car il s’était caché. '
  '50':
  - type: text
    content: 'Après cela, Abimélek se dirigea sur Tébets. Il l’assiégea et la prit d’assaut. '
  '51':
  - type: text
    content: 'Au milieu de la ville se trouvait une tour fortifiée. Toute la population, hommes et femmes, courut s’y réfugier. Ils verrouillèrent les portes derrière eux et montèrent sur le toit de la tour. '
  '52':
  - type: text
    content: 'Abimélek parvint jusqu’à la tour et l’attaqua. Déjà, il s’approchait de l’entrée pour y mettre le feu, '
  '53':
  - type: text
    content: 'lorsqu’une femme lui lança une meule de moulin sur la tête, qui lui fractura le crâne. '
  '54':
  - type: text
    content: 'Aussitôt, il appela le jeune homme qui portait ses armes et lui ordonna : Tire ton épée et tue-moi pour que l’on ne puisse pas dire que c’est une femme qui m’a tué.'
  - type: text
    content: 'Alors son écuyer le transperça, et il mourut. '
  '55':
  - type: text
    content: Quand les hommes d’Israël virent qu’Abimélek était mort, ils s’en allèrent chacun chez soi.
  '56':
  - type: text
    content: 'Ainsi Dieu fit retomber sur Abimélek tout le mal qu’il avait commis à l’égard de son père en tuant ses soixante-dix frères. '
  '57':
  - type: text
    content: Il fit aussi retomber leurs crimes sur les gens de Sichem. De cette manière se réalisa la malédiction que Yotam, fils de Yeroubbaal, avait prononcée contre eux.
  '6':
  - type: text
    content: Tous les notables de Sichem et de Beth-Millo se rassemblèrent et proclamèrent Abimélek roi, près du chêne de la stèle, aux environs de Sichem
  - type: note
    content: Sur le chêne de Sichem, voir Jos 24.26.
  - type: text
    content: .
  - type: heading
    content: La fable de Yotam
  '7':
  - type: text
    content: On en informa Yotam qui se rendit au sommet du mont Garizim
  - type: note
    content: Les précipices du mont Garizim surplombent par endroits la ville de Sichem, située entre les monts Garizim et Ebal.
  - type: text
    content: ', d’où il cria à pleine voix : Ecoutez-moi, gens de Sichem, si vous voulez que Dieu vous écoute ! '
  '8':
  - type: text
    content: 'Un jour, les arbres se décidèrent à choisir un roi pour les commander. Ils dirent à l’olivier : « Règne sur nous ! » '
  '9':
  - type: text
    content: 'Mais l’olivier répondit : « Devrais-je renoncer à produire mon huile, avec laquelle on honore Dieu et les hommes, pour aller me pavaner au-dessus des autres arbres ? » '
