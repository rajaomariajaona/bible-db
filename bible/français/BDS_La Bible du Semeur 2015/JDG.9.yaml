document_id: JDG.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abimélek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abimélek, l’un des fils de Yeroubbaal, se rendit à Sichem auprès de ses oncles maternels, et leur dit en présence de tout le groupe familial de sa mère : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Posez donc à tous les notables de Sichem la question suivante : « Que vaut-il mieux pour vous ? Etre gouvernés par les soixante-dix fils de Yeroubbaal ou par un seul homme ? Souvenez-vous que nous sommes du même sang, vous et moi ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ses oncles allèrent répéter ses paroles à tous les notables de Sichem. Ceux-ci décidèrent de suivre son parti puisqu’il était l’un des leurs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils lui donnèrent soixante-dix pièces d’argent prélevées dans le temple de Baal-Berith. Avec cet argent, Abimélek embaucha des vauriens et des aventuriers pour qu’ils le suivent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il se rendit à Ophra où vivait la famille de son père et massacra ses soixante-dix frères, fils de Yeroubbaal, en les tuant sur le même rocher. Seul Yotam, le plus jeune fils de Yeroubbaal, échappa, car il s’était caché. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tous les notables de Sichem et de Beth-Millo se rassemblèrent et proclamèrent Abimélek roi, près du chêne de la stèle, aux environs de Sichem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur le chêne de Sichem, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24.26
        metadata:
          usfm: JOS.24.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fable de Yotam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On en informa Yotam qui se rendit au sommet du mont Garizim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les précipices du mont Garizim surplombent par endroits la ville de Sichem, située entre les monts Garizim et Ebal.
    marker-yv: yv-n
  - type: text
    text: ', d’où il cria à pleine voix : Ecoutez-moi, gens de Sichem, si vous voulez que Dieu vous écoute ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un jour, les arbres se décidèrent à choisir un roi pour les commander. Ils dirent à l’olivier : « Règne sur nous ! » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais l’olivier répondit : « Devrais-je renoncer à produire mon huile, avec laquelle on honore Dieu et les hommes, pour aller me pavaner au-dessus des autres arbres ? » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les arbres dirent au figuier : « Viens, toi, règne sur nous ! » '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais le figuier leur répondit : « Vais-je renoncer à produire des fruits exquis et sucrés pour aller me pavaner au-dessus des autres arbres ? » '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis les arbres dirent à la vigne : « Viens donc, toi, règne sur nous ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais la vigne leur répondit : « Vais-je renoncer à produire mon vin qui réjouit Dieu et les hommes pour aller me pavaner au-dessus des autres arbres ? » '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Finalement, tous les arbres dirent au buisson d’épines : « Viens donc, toi, règne sur nous ! » '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et le buisson d’épines leur répondit : « Si, de bonne foi, vous voulez faire de moi votre roi, venez vous abriter sous mon ombrage. Si vous refusez, un feu jaillira du buisson d’épines et consumera même les cèdres du Liban. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant donc, est-ce de bonne foi et en toute droiture que vous avez agi en proclamant Abimélek roi ? Avez-vous bien agi envers Yeroubbaal et sa famille ? L’avez-vous traité selon ce qu’il méritait ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mon père a combattu pour vous, il a risqué sa vie pour vous délivrer des Madianites. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et vous, aujourd’hui vous vous êtes attaqués à sa famille, vous avez tué ses fils, soixante-dix hommes à la fois sur un même rocher, et vous avez établi roi de Sichem Abimélek, le fils de sa servante, parce qu’il est des vôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si donc, aujourd’hui c’est de bonne foi et en toute droiture que vous avez agi à l’égard de Yeroubbaal et de sa famille, eh bien, qu’Abimélek fasse votre bonheur et vous le sien ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sinon, qu’un feu sorte d’Abimélek et consume les habitants de Sichem et de Beth-Millo, et qu’un feu sorte des habitants de Sichem et de Beth-Millo et consume Abimélek.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Puis Yotam s’enfuit et alla se réfugier à Beer où il s’établit pour échapper à son frère Abimélek.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révolte de Sichem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abimélek gouverna Israël pendant trois ans. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Après quoi Dieu envoya un esprit de discorde entre Abimélek et les notables de Sichem qui se révoltèrent contre Abimélek.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi les violences commises contre les soixante-dix fils de Yeroubbaal et leur meurtre allaient retomber sur Abimélek, parce qu’il avait tué ses frères, et sur les gens de Sichem parce qu’ils l’avaient soutenu pour commettre ce meurtre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les habitants de Sichem postèrent sur les hauteurs proches de la ville des hommes qui dévalisaient tous les voyageurs qui passaient près d’eux sur la route. Abimélek en fut informé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'A la même époque, Gaal, fils d’Ebed, vint à passer par Sichem avec les hommes de sa parenté. Ils s’y établirent et il gagna la confiance des habitants de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Au moment de la vendange, ces gens sortirent dans les vignes, ils foulèrent le raisin, puis ils organisèrent des réjouissances dans le temple de leur dieu ; ils mangèrent et burent et ils lancèrent des malédictions contre Abimélek. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A ce moment-là, Gaal s’écria : Qu’est-ce qu’un Abimélek par rapport à Sichem, pour que nous nous laissions dominer par cet homme ? Après tout, ce n’est qu’un fils de Yeroubbaal et il fait gouverner la ville par son lieutenant Zeboul ! Ce sont les descendants de Hamor'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 33.19
        metadata:
          usfm: GEN.33.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le père de Sichem, qu’il vous faut comme maîtres, mais Abimélek n’a aucun titre à notre soumission. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ah ! Si seulement on me confiait la direction de ce peuple ! J’aurais vite fait de chasser Abimélek ! Je lui dirais
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je lui dirais
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et il s’écria.
    marker-yv: yv-n
  - type: text
    text: '  : « Allez, Abimélek, rassemble tes troupes et viens te battre ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zeboul, le gouverneur de la ville, entendit les paroles de Gaal, fils d’Ebed, et il se mit en colère. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il envoya secrètement des messagers dire à Abimélek : Sache que Gaal, fils d’Ebed, et les gens de sa parenté sont venus à Sichem et qu’ils sont en train de soulever la ville contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Maintenant donc, viens durant la nuit avec tes hommes. Vous vous mettrez en embuscade dans la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Le matin, au lever du soleil, tu lanceras une attaque contre la ville. Lorsque Gaal et ses hommes sortiront contre toi, tu sauras les traiter comme il convient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Abimélek et toutes ses troupes se levèrent la nuit suivante et se mirent en embuscade en quatre groupes aux alentours de Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lorsque Gaal sortit de la ville et vint s’installer à l’entrée devant la porte, Abimélek et ses hommes surgirent de l’endroit où ils se tenaient en embuscade. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Gaal les vit et dit à Zeboul : Voilà une troupe qui descend du haut des collines !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mais non, lui répondit Zeboul, c’est l’ombre des collines que tu prends pour des hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Gaal insista : Si, regarde ! C’est une troupe qui descend de la colline du milieu du pays, et une autre arrive par la route du chêne des devins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors Zeboul dit : Où donc sont tes beaux discours ? N’as-tu pas dit : « Qu’est-ce qu’un Abimélek pour que nous nous laissions dominer par lui ? » Et cette troupe, n’est-ce pas celle que tu méprisais ? Eh bien, sors maintenant, c’est le moment d’aller te battre contre lui !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors Gaal conduisit les hommes de Sichem au combat contre Abimélek. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais celui-ci le mit en fuite et se lança à sa poursuite. Beaucoup d’hommes tombèrent jusqu’à la porte de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Abimélek alla s’installer à Arouma, et Zeboul expulsa Gaal et les hommes de sa parenté de Sichem en leur interdisant d’y revenir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abimélek détruit Sichem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le lendemain, les gens de Sichem se rendirent dans les champs. Abimélek en fut informé. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Alors il réunit ses hommes, les répartit en trois corps et les posta en embuscade dans la campagne. Dès qu’il vit les gens sortir de la ville, il se précipita sur eux et les tua. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Laissant deux groupes continuer le massacre dans la campagne, Abimélek et les siens vinrent prendre position à l’entrée de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Il donna l’assaut et poursuivit son offensive durant toute la journée. Finalement, il s’empara de la ville et en massacra les habitants, puis il rasa la ville et répandit du sel sur son emplacement. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Lorsque les habitants de Migdal-Sichem apprirent ce qui s’était passé, ils allèrent tous se réfugier dans la crypte du temple du dieu Berith. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'On informa Abimélek que les habitants de Migdal-Sichem s’étaient rassemblés. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il gravit le mont Tsalmôn avec sa troupe, prit une hache et coupa une branche d’arbre qu’il plaça sur son épaule. Puis il ordonna à ses hommes : « Vous voyez ce que je viens de faire. Dépêchez-vous de faire la même chose ! » '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Chacun coupa sa branche et suivit Abimélek. Ils allèrent entasser ces branches autour de la crypte du temple et l’incendièrent avec tous ceux qui s’y trouvaient. Ainsi périrent aussi tous les habitants de Migdal-Sichem : un millier d’hommes et de femmes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Abimélek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Après cela, Abimélek se dirigea sur Tébets. Il l’assiégea et la prit d’assaut. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Au milieu de la ville se trouvait une tour fortifiée. Toute la population, hommes et femmes, courut s’y réfugier. Ils verrouillèrent les portes derrière eux et montèrent sur le toit de la tour. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Abimélek parvint jusqu’à la tour et l’attaqua. Déjà, il s’approchait de l’entrée pour y mettre le feu, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'lorsqu’une femme lui lança une meule de moulin sur la tête, qui lui fractura le crâne. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Aussitôt, il appela le jeune homme qui portait ses armes et lui ordonna : Tire ton épée et tue-moi pour que l’on ne puisse pas dire que c’est une femme qui m’a tué.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors son écuyer le transperça, et il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Quand les hommes d’Israël virent qu’Abimélek était mort, ils s’en allèrent chacun chez soi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ainsi Dieu fit retomber sur Abimélek tout le mal qu’il avait commis à l’égard de son père en tuant ses soixante-dix frères. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Il fit aussi retomber leurs crimes sur les gens de Sichem. De cette manière se réalisa la malédiction que Yotam, fils de Yeroubbaal, avait prononcée contre eux.
