document_id: ROM.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie nouvelle en Christ, par l’Esprit
  - type: heading
    content: La paix avec Dieu
  - type: text
    content: Puisque nous avons été déclarés justes en raison de notre foi, nous sommes
  - type: note
    content: 'Certains manuscrits ont : soyons… en paix.'
  - type: text
    content: ' en paix avec Dieu grâce à notre Seigneur Jésus-Christ. '
  '10':
  - type: text
    content: 'Alors que nous étions ses ennemis, Dieu nous a réconciliés avec lui par la mort de son Fils ; à plus forte raison, maintenant que nous sommes réconciliés, serons-nous sauvés par sa vie. '
  '11':
  - type: text
    content: 'Mieux encore : nous plaçons désormais notre fierté en Dieu par notre Seigneur Jésus-Christ qui nous a obtenu la réconciliation.'
  - type: heading
    content: Condamnés en Adam, déclarés justes en Christ
  '12':
  - type: text
    content: C’est pourquoi, de même que par un seul homme, le péché est entré dans le monde et par le péché, la mort, et ainsi la mort a atteint tous les hommes parce que tous ont péché
  - type: note
    content: La phrase de Paul reste en suspens à la fin de ce verset. Elle sera reprise au v. 18 après la parenthèse explicative des v. 13-17.
  - type: text
    content: ' …'
  '13':
  - type: text
    content: 'En effet, jusqu’à ce que Dieu donne la Loi de Moïse, le péché existait bien dans le monde ; or le péché n’est pas pris en compte quand la Loi n’existe pas. '
  '14':
  - type: text
    content: Et pourtant, la mort a régné depuis Adam jusqu’à Moïse, même sur les hommes qui n’avaient pas commis une faute semblable à celle d’Adam – qui est comparable à celui qui devait venir.
  '15':
  - type: text
    content: Mais il y a une différence entre la faute et le don de la grâce ! En effet, si la faute d’un seul a eu pour conséquence la mort de beaucoup, à bien plus forte raison la grâce de Dieu, don gratuit qui vient d’un seul homme, Jésus-Christ, a surabondé pour beaucoup.
  '16':
  - type: text
    content: 'Quelle différence aussi entre les conséquences du péché d’un seul et le don ! En effet, le jugement intervenant à cause d’un seul homme a entraîné la condamnation, mais le don de grâce, intervenant à la suite de nombreuses fautes, a conduit à l’acquittement. '
  '17':
  - type: text
    content: Car si, par la faute commise par un seul homme, la mort a régné à cause de ce seul homme, à bien plus forte raison ceux qui reçoivent l’abondance de la grâce qu’est le don de la justification régneront-ils dans la vie par Jésus-Christ, lui seul.
  '18':
  - type: text
    content: 'Ainsi donc, comme une seule faute a entraîné la condamnation de tous les hommes, un seul acte satisfaisant à la justice a obtenu pour tous les hommes l’acquittement qui leur assure la vie. '
  '19':
  - type: text
    content: Comme, par la désobéissance d’un seul, beaucoup d’hommes ont été déclarés pécheurs devant Dieu, de même, par l’obéissance d’un seul, beaucoup seront déclarés justes devant Dieu.
  '2':
  - type: text
    content: Par lui, nous avons eu accès, au moyen de la foi
  - type: note
    content: L’expression au moyen de la foi est absente de certains manuscrits.
  - type: text
    content: ', à ce don gratuit de Dieu qui nous est désormais acquis ; et notre fierté se fonde sur l’espérance d’avoir part à la gloire de Dieu.'
  '20':
  - type: text
    content: 'Quant à la Loi, elle est intervenue pour que le péché prolifère. Mais là où le péché a proliféré, la grâce a surabondé '
  '21':
  - type: text
    content: pour que, comme le péché a régné par la mort, de même la grâce règne par la justice que Dieu accorde et qui aboutit à la vie éternelle par Jésus-Christ notre Seigneur.
  '3':
  - type: text
    content: 'Mieux encore ! Nous tirons fierté même de nos détresses, car nous savons que la détresse produit la persévérance, '
  '4':
  - type: text
    content: 'la persévérance conduit à une fidélité éprouvée, et la fidélité éprouvée nourrit l’espérance. '
  '5':
  - type: text
    content: Or, notre espérance ne risque pas de tourner à notre confusion, car Dieu a versé son amour dans notre cœur par l’Esprit Saint qu’il nous a donné.
  '6':
  - type: text
    content: 'En effet, au moment fixé par Dieu, alors que nous étions encore sans force, Christ est mort pour des pécheurs. '
  '7':
  - type: text
    content: A peine accepterait-on de mourir pour un juste ; peut-être quelqu’un irait-il jusqu’à mourir pour le bien
  - type: note
    content: 'Autre traduction : pour un homme de bien.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Mais voici comment Dieu nous montre l’amour qu’il a pour nous : alors que nous étions encore des pécheurs, Christ est mort pour nous.'
  '9':
  - type: text
    content: Donc, puisque nous sommes maintenant déclarés justes grâce à son sacrifice
  - type: note
    content: Voir note 3.25.
  - type: text
    content: ', nous serons, à plus forte raison encore, sauvés par lui de la colère à venir.'
