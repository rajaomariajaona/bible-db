document_id: ROM.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie nouvelle en Christ, par l’Esprit
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La paix avec Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisque nous avons été déclarés justes en raison de notre foi, nous sommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soyons… en paix.
      marker-yv: yv-n
    - type: text
      text: ' en paix avec Dieu grâce à notre Seigneur Jésus-Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que nous étions ses ennemis, Dieu nous a réconciliés avec lui par la mort de son Fils ; à plus forte raison, maintenant que nous sommes réconciliés, serons-nous sauvés par sa vie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux encore : nous plaçons désormais notre fierté en Dieu par notre Seigneur Jésus-Christ qui nous a obtenu la réconciliation.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Condamnés en Adam, déclarés justes en Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi, de même que par un seul homme, le péché est entré dans le monde et par le péché, la mort, et ainsi la mort a atteint tous les hommes parce que tous ont péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La phrase de Paul reste en suspens à la fin de ce verset. Elle sera reprise au v. 18 après la parenthèse explicative des v. 13-17.
      marker-yv: yv-n
    - type: text
      text: ' …'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, jusqu’à ce que Dieu donne la Loi de Moïse, le péché existait bien dans le monde ; or le péché n’est pas pris en compte quand la Loi n’existe pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et pourtant, la mort a régné depuis Adam jusqu’à Moïse, même sur les hommes qui n’avaient pas commis une faute semblable à celle d’Adam – qui est comparable à celui qui devait venir.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il y a une différence entre la faute et le don de la grâce ! En effet, si la faute d’un seul a eu pour conséquence la mort de beaucoup, à bien plus forte raison la grâce de Dieu, don gratuit qui vient d’un seul homme, Jésus-Christ, a surabondé pour beaucoup.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelle différence aussi entre les conséquences du péché d’un seul et le don ! En effet, le jugement intervenant à cause d’un seul homme a entraîné la condamnation, mais le don de grâce, intervenant à la suite de nombreuses fautes, a conduit à l’acquittement. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car si, par la faute commise par un seul homme, la mort a régné à cause de ce seul homme, à bien plus forte raison ceux qui reçoivent l’abondance de la grâce qu’est le don de la justification régneront-ils dans la vie par Jésus-Christ, lui seul.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, comme une seule faute a entraîné la condamnation de tous les hommes, un seul acte satisfaisant à la justice a obtenu pour tous les hommes l’acquittement qui leur assure la vie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme, par la désobéissance d’un seul, beaucoup d’hommes ont été déclarés pécheurs devant Dieu, de même, par l’obéissance d’un seul, beaucoup seront déclarés justes devant Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par lui, nous avons eu accès, au moyen de la foi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au moyen de la foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est absente de certains manuscrits.
      marker-yv: yv-n
    - type: text
      text: ', à ce don gratuit de Dieu qui nous est désormais acquis ; et notre fierté se fonde sur l’espérance d’avoir part à la gloire de Dieu.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à la Loi, elle est intervenue pour que le péché prolifère. Mais là où le péché a proliféré, la grâce a surabondé '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pour que, comme le péché a régné par la mort, de même la grâce règne par la justice que Dieu accorde et qui aboutit à la vie éternelle par Jésus-Christ notre Seigneur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux encore ! Nous tirons fierté même de nos détresses, car nous savons que la détresse produit la persévérance, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la persévérance conduit à une fidélité éprouvée, et la fidélité éprouvée nourrit l’espérance. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, notre espérance ne risque pas de tourner à notre confusion, car Dieu a versé son amour dans notre cœur par l’Esprit Saint qu’il nous a donné.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, au moment fixé par Dieu, alors que nous étions encore sans force, Christ est mort pour des pécheurs. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A peine accepterait-on de mourir pour un juste ; peut-être quelqu’un irait-il jusqu’à mourir pour le bien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour un homme de bien.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici comment Dieu nous montre l’amour qu’il a pour nous : alors que nous étions encore des pécheurs, Christ est mort pour nous.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc, puisque nous sommes maintenant déclarés justes grâce à son sacrifice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.25'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', nous serons, à plus forte raison encore, sauvés par lui de la colère à venir.'
