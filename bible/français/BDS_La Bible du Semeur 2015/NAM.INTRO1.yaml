type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: L’Ecriture ne permet guère de préciser l’identité du prophète Nahoum. Celui-ci est en effet inconnu du reste de l’Ancien Testament et la situation de sa localité d’origine, Elqosh (1.1), est incertaine. Sa prophétie est tout entière consacrée au jugement et à la chute de Ninive, capitale de l’Assyrie. Certaines données permettent toutefois de la dater.
  - type: text
    content: On assiste vers 900 avant Jésus-Christ à la constitution du nouvel Empire assyrien, prélude à trois siècles de guerres sanglantes avec les peuples voisins. Ninive en devient la capitale sous Sennachérib (704 à 681). En 663, pour s’opposer aux attaques égyptiennes, le roi assyrien Assourbanipal (669 à 627) s’empare de Thèbes, capitale de la Haute-Egypte et première cité de l’Orient. Mais après la mort du roi, l’Assyrie connaît un déclin rapide. Les Babyloniens regagnent leur indépendance vers 630 et fondent un nouvel empire en 626. A partir de 618, alliés aux Mèdes et aux Scythes, ils vont de victoire en victoire contre les Assyriens. Avec les Mèdes, ils prennent Ninive d’assaut et rasent la ville en 612. En 606, il ne restera rien de l’Empire assyrien, dont le territoire est partagé entre les Mèdes et les Babyloniens.
  - type: text
    content: Durant ces années, les royaumes d’Israël et de Juda ont, eux aussi, souffert de l’emprise assyrienne sur le Moyen-Orient. En 722, Samarie, la capitale du royaume du Nord, est détruite et sa population déportée. Quelques années auparavant, le roi de Juda, Ahaz, s’était soumis au roi d’Assyrie et avait dû adopter les dieux de son nouveau maître (2 R 16.18). Ezéchias, son successeur, entreprend une réforme religieuse et se révolte contre l’Assyrie. Mais son fils Manassé (697 à 642) change de politique, toute tentative de résistance à l’Assyrie paraissant en effet désespérée. Manassé se soumet et livre son royaume au culte des dieux assyriens (2 R 21.1-18).
  - type: text
    content: Le ministère de Nahoum s’inscrit entre la chute de Thèbes, en 663, qu’il rappelle (3.8-10) et celle de Ninive, en 612, qu’il annonce. De plus, à son époque, Juda est soumis à l’Assyrie (1.13 ; 2.1), ce qui ne sera plus le cas sous Josias, vers 630. Il semble donc probable que Nahoum ait prophétisé sous le règne de Manassé, entre 663 et 642, pour encourager Juda à rester fidèle à l’Eternel et à résister à l’influence assyrienne. Car Ninive, proclame-t-il, sera totalement anéantie.
  - type: text
    content: Deux siècles plus tard, le général grec Xénophon traversera les ruines de Ninive, sans même savoir le nom de la ville ou du peuple qui l’avait habitée. Le site de Ninive n’a d’ailleurs été redécouvert qu’à une époque récente, en 1845.
