document_id: HOS.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu sème
  - type: text
    content: Mais, un jour, les Israélites ╵seront nombreux
  - type: text
    content: comme les grains de sable ╵sur le bord de la mer,
  - type: text
    content: que nul ne peut compter ╵ni mesurer.
  - type: text
    content: 'Et, au lieu même ╵où on leur avait dit :'
  - type: text
    content: « Vous n’êtes pas mon peuple »,
  - type: text
    content: 'on leur dira :'
  - type: text
    content: « Vous êtes les enfants ╵du Dieu vivant
  - type: note
    content: Cité en Rm 9.26 ; 1 P 2.10.
  - type: text
    content: . »
  '10':
  - type: text
    content: Or, elle n’avait pas compris ╵que c’était moi qui lui donnais
  - type: text
    content: le blé, le vin nouveau et l’huile,
  - type: text
    content: et de l’argent en abondance, ╵ainsi que l’or
  - type: text
    content: dont ils ont fait ╵une offrande à Baal
  - type: note
    content: Dieu cananéen auquel on attribuait la souveraineté sur la pluie et la fertilité des champs, du bétail comme de l’homme (voir Jg 2.13).
  - type: text
    content: .
  '11':
  - type: text
    content: C’est pourquoi je viendrai reprendre
  - type: text
    content: mon blé au temps de la moisson,
  - type: text
    content: mon vin au temps de la vendange,
  - type: text
    content: je leur retirerai ╵ma laine avec mon lin
  - type: text
    content: dont elle s’habillait.
  '12':
  - type: text
    content: Mais maintenant, ╵je vais mettre au grand jour ╵son infamie
  - type: text
    content: aux yeux de ses amants.
  - type: text
    content: Et nul ne la délivrera ╵de mon emprise.
  '13':
  - type: text
    content: 'Et je ferai cesser ╵toutes ses réjouissances :'
  - type: text
    content: ses fêtes, ses nouvelles lunes ╵et ses sabbats,
  - type: text
    content: oui, tous ses jours ╵de fête cultuelle.
  '14':
  - type: text
    content: Et je dévasterai ╵sa vigne et son figuier
  - type: text
    content: 'dont elle a dit :'
  - type: text
    content: « Voyez, c’est le salaire ╵donné par mes amants. »
  - type: text
    content: Je les réduirai en broussailles
  - type: text
    content: et les bêtes sauvages ╵en feront leur pâture.
  '15':
  - type: text
    content: Je lui ferai payer
  - type: text
    content: tout le temps qu’elle a consacré ╵au culte des Baals ╵lorsqu’elle leur offrait ╵du parfum en hommage,
  - type: text
    content: parée d’anneaux et de bijoux
  - type: text
    content: pour courir après ses amants,
  - type: text
    content: et quant à moi, ╵elle m’a oublié,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: La fidélité de Dieu triomphe de l’infidélité d’Israël
  '16':
  - type: text
    content: C’est pourquoi, je vais la reconquérir,
  - type: text
    content: la mener au désert,
  - type: text
    content: et parler à son cœur.
  '17':
  - type: text
    content: C’est là que je lui donnerai ╵ses vignobles d’antan
  - type: text
    content: et la vallée d’Akor
  - type: note
    content: Vallée où le péché d’Akân a été jugé (voir Jos 7.24-26).
  - type: text
    content: deviendra une porte d’espérance ;
  - type: text
    content: là, elle répondra ╵tout comme au temps de sa jeunesse,
  - type: text
    content: au temps de sa sortie d’Egypte.
  '18':
  - type: text
    content: Et il arrivera en ce temps-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: 'que tu me diras : « Mon époux »'
  - type: text
    content: 'et tu ne m’appelleras plus : ╵« Mon maître'
  - type: note
    content: 'maître: en hébreu se dit baal, comme le nom du dieu mentionné au verset suivant.'
  - type: text
    content: '  ».'
  '19':
  - type: text
    content: J’ôterai de sa bouche ╵les noms des Baals,
  - type: text
    content: et le souvenir même ╵de ces noms se perdra.
  '2':
  - type: text
    content: Alors, les Judéens ╵et les Israélites ╵du royaume du Nord
  - type: text
    content: seront unis
  - type: text
    content: et ils établiront sur eux ╵un chef unique,
  - type: text
    content: ils sortiront ╵du pays de l’exil,
  - type: text
    content: car il sera très grand, ╵le jour de Jizréel
  - type: note
    content: Voir 1.3-4 ; 2.24 et note.
  - type: text
    content: .
  '20':
  - type: text
    content: Je conclurai, en ce temps-là, ╵une alliance pour eux
  - type: text
    content: avec les animaux sauvages
  - type: text
    content: et les oiseaux du ciel,
  - type: text
    content: et les animaux qui se meuvent ╵au ras du sol.
  - type: text
    content: 'Je briserai l’arc et l’épée, ╵et je mettrai fin à la guerre : ╵ils disparaîtront du pays.'
  - type: text
    content: Et je les ferai reposer ╵dans la sécurité.
  '21':
  - type: text
    content: Puis, pour toujours, ╵je te fiancerai à moi.
  - type: text
    content: Je te fiancerai à moi ╵en donnant comme dot
  - type: note
    content: 'en donnant comme dot: la même construction hébraïque se retrouve en 2 S 3.14.'
  - type: text
    content: ' ╵et la justice et la droiture,'
  - type: text
    content: l’amour et la tendresse ╵que je mettrai en toi.
  '22':
  - type: text
    content: Je te fiancerai à moi ╵en mettant en toi la fidélité,
  - type: text
    content: et tu connaîtras l’Eternel.
  '23':
  - type: text
    content: En ce temps-là, ╵je répondrai,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: je répondrai à l’attente du ciel,
  - type: text
    content: et le ciel répondra ╵à ce qu’attend la terre.
  '24':
  - type: text
    content: La terre répondra au blé,
  - type: text
    content: au vin nouveau ╵ainsi qu’à l’huile fraîche,
  - type: text
    content: et ceux-ci répondront ╵à l’attente de Jizréel
  - type: note
    content: 'Le nom de Jizréel signifie : Dieu sème et fait assonance avec l’expression du v. 25 : je les répandrai comme de la semence (voir 1.4 ; 2.2).'
  - type: text
    content: .
  '25':
  - type: text
    content: Et je les répandrai ╵comme de la semence ╵pour moi dans le pays,
  - type: text
    content: je prodiguerai mon amour ╵à celle qu’on nommait ╵Lo-Rouhama,
  - type: text
    content: 'et je dirai à Lo-Ammi : ╵« Tu es mon peuple »,'
  - type: text
    content: 'et il dira : « Tu es mon Dieu'
  - type: note
    content: Voir 1.6, 9. Cité en Rm 9.25  ; voir 1 P 2.10.
  - type: text
    content: . »
  '3':
  - type: text
    content: 'Vous direz à vos frères ╵qu’ils seront appelés : « Mon peuple »,'
  - type: text
    content: 'et à vos sœurs : « les Bien-Aimées ».'
  - type: heading
    content: La répudiation de l’épouse infidèle
  '4':
  - type: text
    content: Intentez un procès ╵à votre mère
  - type: note
    content: Personnification de la nation d’Israël dont le prophète rappelle l’idolâtrie sous l’image classique de la prostitution.
  - type: text
    content: ', ╵faites-lui un procès,'
  - type: text
    content: car elle n’est pas mon épouse
  - type: text
    content: et je ne suis pas son mari.
  - type: text
    content: Qu’elle ôte de sa face ╵les marques des prostitutions ╵qu’elle a commises,
  - type: text
    content: d’entre ses seins ╵les signes de ses adultères.
  '5':
  - type: text
    content: Sinon, je la dévêtirai, ╵et je la mettrai toute nue,
  - type: text
    content: comme elle était au jour de sa naissance
  - type: note
    content: Voir Ez 16.4-8 ; Na 3.5.
  - type: text
    content: '  ;'
  - type: text
    content: je la transformerai en un désert,
  - type: text
    content: je ferai d’elle un pays desséché,
  - type: text
    content: je la ferai mourir de soif.
  '6':
  - type: text
    content: Et quant à ses enfants, ╵je n’aurai plus d’amour pour eux,
  - type: text
    content: car ce sont des enfants ╵prostitués
  - type: note
    content: 'Littéralement, enfants de prostitution, comme en 1.2. Le prophète joue sur un double sens : les enfants de Gomer sont issus de la prostitution de celle-ci, tandis que les Israélites se prostituent avec les idoles.'
  - type: text
    content: .
  '7':
  - type: text
    content: Oui, leur mère s’est adonnée ╵à la prostitution,
  - type: text
    content: la femme qui les a conçus ╵s’est couverte de honte,
  - type: text
    content: 'puisqu’elle a affirmé : ╵« Moi, j’irai après mes amants'
  - type: text
    content: qui me fournissent ╵mon pain, mon eau,
  - type: text
    content: mon lin, ma laine,
  - type: text
    content: mon huile et mes boissons. »
  '8':
  - type: text
    content: Voilà pourquoi
  - type: text
    content: je vais barrer ╵son chemin avec des épines,
  - type: text
    content: je l’obstrue par un mur,
  - type: text
    content: et elle ne trouvera plus sa route.
  '9':
  - type: text
    content: Elle poursuivra ses amants
  - type: text
    content: sans pouvoir les atteindre,
  - type: text
    content: elle les cherchera ╵sans pouvoir les trouver.
  - type: text
    content: 'Puis elle se dira :'
  - type: text
    content: « Je vais m’en retourner ╵chez mon premier mari,
  - type: text
    content: car j’étais alors plus heureuse ╵que maintenant. »
