document_id: HOS.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu sème
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, un jour, les Israélites ╵seront nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les grains de sable ╵sur le bord de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que nul ne peut compter ╵ni mesurer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et, au lieu même ╵où on leur avait dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Vous n’êtes pas mon peuple »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'on leur dira :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Vous êtes les enfants ╵du Dieu vivant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Rm 9.26 ; 1 P 2.10.
      marker-yv: yv-n
    - type: text
      text: . »
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, elle n’avait pas compris ╵que c’était moi qui lui donnais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le blé, le vin nouveau et l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de l’argent en abondance, ╵ainsi que l’or
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont ils ont fait ╵une offrande à Baal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dieu cananéen auquel on attribuait la souveraineté sur la pluie et la fertilité des champs, du bétail comme de l’homme (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 2.13
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je viendrai reprendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon blé au temps de la moisson,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon vin au temps de la vendange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur retirerai ╵ma laine avec mon lin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont elle s’habillait.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais maintenant, ╵je vais mettre au grand jour ╵son infamie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux yeux de ses amants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul ne la délivrera ╵de mon emprise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je ferai cesser ╵toutes ses réjouissances :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses fêtes, ses nouvelles lunes ╵et ses sabbats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tous ses jours ╵de fête cultuelle.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je dévasterai ╵sa vigne et son figuier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dont elle a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Voyez, c’est le salaire ╵donné par mes amants. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les réduirai en broussailles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les bêtes sauvages ╵en feront leur pâture.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui ferai payer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le temps qu’elle a consacré ╵au culte des Baals ╵lorsqu’elle leur offrait ╵du parfum en hommage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parée d’anneaux et de bijoux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour courir après ses amants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quant à moi, ╵elle m’a oublié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fidélité de Dieu triomphe de l’infidélité d’Israël
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi, je vais la reconquérir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la mener au désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et parler à son cœur.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là que je lui donnerai ╵ses vignobles d’antan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la vallée d’Akor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vallée où le péché d’Akân a été jugé (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 7.24-26
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deviendra une porte d’espérance ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là, elle répondra ╵tout comme au temps de sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au temps de sa sortie d’Egypte.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il arrivera en ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que tu me diras : « Mon époux »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu ne m’appelleras plus : ╵« Mon maître'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maître
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu se dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'baal, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme le nom du dieu mentionné au verset suivant.
      marker-yv: yv-n
    - type: text
      text: '  ».'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ôterai de sa bouche ╵les noms des Baals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le souvenir même ╵de ces noms se perdra.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, les Judéens ╵et les Israélites ╵du royaume du Nord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront unis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils établiront sur eux ╵un chef unique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sortiront ╵du pays de l’exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il sera très grand, ╵le jour de Jizréel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1.3-4 ; 2.24 et note.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je conclurai, en ce temps-là, ╵une alliance pour eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec les animaux sauvages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les oiseaux du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les animaux qui se meuvent ╵au ras du sol.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je briserai l’arc et l’épée, ╵et je mettrai fin à la guerre : ╵ils disparaîtront du pays.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les ferai reposer ╵dans la sécurité.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis, pour toujours, ╵je te fiancerai à moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te fiancerai à moi ╵en donnant comme dot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en donnant comme dot
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'la même construction hébraïque se retrouve en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 3.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵et la justice et la droiture,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’amour et la tendresse ╵que je mettrai en toi.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te fiancerai à moi ╵en mettant en toi la fidélité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu connaîtras l’Eternel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce temps-là, ╵je répondrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je répondrai à l’attente du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le ciel répondra ╵à ce qu’attend la terre.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre répondra au blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au vin nouveau ╵ainsi qu’à l’huile fraîche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux-ci répondront ╵à l’attente de Jizréel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jizréel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu sème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et fait assonance avec l’expression du v. 25 : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je les répandrai comme de la semence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 1.4 ; 2.2).
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les répandrai ╵comme de la semence ╵pour moi dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je prodiguerai mon amour ╵à celle qu’on nommait ╵Lo-Rouhama,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je dirai à Lo-Ammi : ╵« Tu es mon peuple »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il dira : « Tu es mon Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.6'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9'
        - type: text
          text: '. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 9.25
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 2.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous direz à vos frères ╵qu’ils seront appelés : « Mon peuple »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et à vos sœurs : « les Bien-Aimées ».'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La répudiation de l’épouse infidèle
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Intentez un procès ╵à votre mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Personnification de la nation d’Israël dont le prophète rappelle l’idolâtrie sous l’image classique de la prostitution.
      marker-yv: yv-n
    - type: text
      text: ', ╵faites-lui un procès,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elle n’est pas mon épouse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne suis pas son mari.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle ôte de sa face ╵les marques des prostitutions ╵qu’elle a commises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’entre ses seins ╵les signes de ses adultères.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinon, je la dévêtirai, ╵et je la mettrai toute nue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme elle était au jour de sa naissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ez 16.4-8 ; Na 3.5.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je la transformerai en un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai d’elle un pays desséché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je la ferai mourir de soif.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quant à ses enfants, ╵je n’aurai plus d’amour pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce sont des enfants ╵prostitués
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'enfants de prostitution, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.2'
        - type: text
          text: '. Le prophète joue sur un double sens : les enfants de Gomer sont issus de la prostitution de celle-ci, tandis que les Israélites se prostituent avec les idoles.'
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, leur mère s’est adonnée ╵à la prostitution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la femme qui les a conçus ╵s’est couverte de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'puisqu’elle a affirmé : ╵« Moi, j’irai après mes amants'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui me fournissent ╵mon pain, mon eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon lin, ma laine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon huile et mes boissons. »
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais barrer ╵son chemin avec des épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l’obstrue par un mur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle ne trouvera plus sa route.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle poursuivra ses amants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans pouvoir les atteindre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle les cherchera ╵sans pouvoir les trouver.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Puis elle se dira :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je vais m’en retourner ╵chez mon premier mari,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j’étais alors plus heureuse ╵que maintenant. »
