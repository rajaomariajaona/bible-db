document_id: EXO.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Rephidim : l’eau jaillit d’un rocher'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toute l’assemblée des Israélites s’éloigna étape par étape du désert de Sin selon les directives de l’Eternel. Ils campèrent à Rephidim où ils ne trouvèrent pas d’eau à boire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Josué se conforma aux instructions de Moïse. Il alla combattre les Amalécites, tandis que Moïse, Aaron et Hour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Membre de la tribu de Juda, aïeul de Betsaléel, le constructeur du tabernacle (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '31.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' montèrent au sommet de la colline. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Or, lorsque Moïse levait la main, Israël avait l’avantage dans la bataille, et lorsqu’il la laissait retomber, Amalec l’emportait. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Comme les bras de Moïse se fatiguaient, Aaron et Hour prirent une pierre qu’ils placèrent sous lui pour le faire asseoir dessus, et ils lui soutinrent les bras, chacun d’un côté ; ainsi ses bras tinrent ferme jusqu’au coucher du soleil, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: et Josué remporta la victoire sur les Amalécites à la pointe de l’épée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’Eternel dit à Moïse : Consigne cela par écrit pour qu’on en garde le souvenir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Première mention d’un livre dans lequel seront consignés les événements de l’Exode.
      marker-yv: yv-n
    - type: text
      text: ' et déclare à Josué que j’effacerai complètement le souvenir d’Amalec de sous le ciel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 25.17-19 ; 1 S 15.2-9.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse érigea un autel qu’il appela Yahvé-Nissi (L’Eternel est ma bannière), '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'puis il ajouta : Puisqu’on s’est attaqué au trône de l’Eternel, l’Eternel fera la guerre à Amalec de génération en génération.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors le peuple prit Moïse à partie en lui disant : Donne-nous de l’eau à boire !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur répondit : Pourquoi me prenez-vous à partie ? Pourquoi voulez-vous forcer la main à l’Eternel ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pressé par la soif, le peuple se plaignit de Moïse et dit : Pourquoi nous as-tu fait quitter l’Egypte ? Est-ce pour nous faire mourir de soif ici, nous, nos enfants et nos troupeaux ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moïse cria à l’Eternel en disant : Que puis-je faire pour ce peuple ? Ils sont sur le point de me lapider !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Eternel dit à Moïse : Passe devant le peuple et emmène avec toi quelques responsables d’Israël. Prends à la main le bâton avec lequel tu as frappé le Nil et va ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Quant à moi, je vais me tenir là devant toi sur un rocher du mont Horeb ; tu frapperas le rocher, de l’eau en jaillira et le peuple pourra boire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 10.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit ainsi en présence des responsables d’Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il appela ce lieu Massa et Meriba (Epreuve et Querelle), parce que les Israélites l’avaient pris à partie et parce qu’ils avaient voulu forcer la main à l’Eternel en disant : « L’Eternel est-il oui ou non au milieu de nous ? »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le combat contre les Amalécites
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Amalécites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peuple descendant d’un petit-fils d’Esaü (Gn 36.6, 12 ; 1 Ch 1.36) qui vivait de pillage dans le désert au sud de ce qui deviendra le pays d’Israël et faisait parfois des incursions dans le pays de Canaan (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 6.3
        - type: text
          text: ) ou vers le Sinaï.
      marker-yv: yv-n
    - type: text
      text: ' vinrent attaquer Israël à Rephidim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors Moïse dit à Josué
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un chef de la tribu d’Ephraïm (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.3
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16'
        - type: text
          text: ) qui paraît ici pour la première fois et sera désigné comme successeur de Moïse (v. 14).
      marker-yv: yv-n
    - type: text
      text: '  : Choisis-nous des guerriers et demain tu iras combattre les Amalécites. Moi, je me tiendrai au sommet de la colline, avec le bâton de Dieu à la main.'
