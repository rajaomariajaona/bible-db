document_id: EXO.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'A Rephidim : l’eau jaillit d’un rocher'
  - type: text
    content: 'Toute l’assemblée des Israélites s’éloigna étape par étape du désert de Sin selon les directives de l’Eternel. Ils campèrent à Rephidim où ils ne trouvèrent pas d’eau à boire. '
  '10':
  - type: text
    content: Josué se conforma aux instructions de Moïse. Il alla combattre les Amalécites, tandis que Moïse, Aaron et Hour
  - type: note
    content: Membre de la tribu de Juda, aïeul de Betsaléel, le constructeur du tabernacle (31.2).
  - type: text
    content: ' montèrent au sommet de la colline. '
  '11':
  - type: text
    content: 'Or, lorsque Moïse levait la main, Israël avait l’avantage dans la bataille, et lorsqu’il la laissait retomber, Amalec l’emportait. '
  '12':
  - type: text
    content: 'Comme les bras de Moïse se fatiguaient, Aaron et Hour prirent une pierre qu’ils placèrent sous lui pour le faire asseoir dessus, et ils lui soutinrent les bras, chacun d’un côté ; ainsi ses bras tinrent ferme jusqu’au coucher du soleil, '
  '13':
  - type: text
    content: et Josué remporta la victoire sur les Amalécites à la pointe de l’épée.
  '14':
  - type: text
    content: 'L’Eternel dit à Moïse : Consigne cela par écrit pour qu’on en garde le souvenir'
  - type: note
    content: Première mention d’un livre dans lequel seront consignés les événements de l’Exode.
  - type: text
    content: ' et déclare à Josué que j’effacerai complètement le souvenir d’Amalec de sous le ciel'
  - type: note
    content: Voir Dt 25.17-19 ; 1 S 15.2-9.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Moïse érigea un autel qu’il appela Yahvé-Nissi (L’Eternel est ma bannière), '
  '16':
  - type: text
    content: 'puis il ajouta : Puisqu’on s’est attaqué au trône de l’Eternel, l’Eternel fera la guerre à Amalec de génération en génération.'
  '2':
  - type: text
    content: 'Alors le peuple prit Moïse à partie en lui disant : Donne-nous de l’eau à boire !'
  - type: text
    content: 'Moïse leur répondit : Pourquoi me prenez-vous à partie ? Pourquoi voulez-vous forcer la main à l’Eternel ?'
  '3':
  - type: text
    content: 'Pressé par la soif, le peuple se plaignit de Moïse et dit : Pourquoi nous as-tu fait quitter l’Egypte ? Est-ce pour nous faire mourir de soif ici, nous, nos enfants et nos troupeaux ?'
  '4':
  - type: text
    content: 'Moïse cria à l’Eternel en disant : Que puis-je faire pour ce peuple ? Ils sont sur le point de me lapider !'
  '5':
  - type: text
    content: 'L’Eternel dit à Moïse : Passe devant le peuple et emmène avec toi quelques responsables d’Israël. Prends à la main le bâton avec lequel tu as frappé le Nil et va ! '
  '6':
  - type: text
    content: Quant à moi, je vais me tenir là devant toi sur un rocher du mont Horeb ; tu frapperas le rocher, de l’eau en jaillira et le peuple pourra boire
  - type: note
    content: Voir 1 Co 10.4.
  - type: text
    content: .
  - type: text
    content: 'Moïse fit ainsi en présence des responsables d’Israël. '
  '7':
  - type: text
    content: 'Il appela ce lieu Massa et Meriba (Epreuve et Querelle), parce que les Israélites l’avaient pris à partie et parce qu’ils avaient voulu forcer la main à l’Eternel en disant : « L’Eternel est-il oui ou non au milieu de nous ? »'
  - type: heading
    content: Le combat contre les Amalécites
  '8':
  - type: text
    content: Les Amalécites
  - type: note
    content: Peuple descendant d’un petit-fils d’Esaü (Gn 36.6, 12 ; 1 Ch 1.36) qui vivait de pillage dans le désert au sud de ce qui deviendra le pays d’Israël et faisait parfois des incursions dans le pays de Canaan (Jg 6.3) ou vers le Sinaï.
  - type: text
    content: ' vinrent attaquer Israël à Rephidim. '
  '9':
  - type: text
    content: Alors Moïse dit à Josué
  - type: note
    content: Un chef de la tribu d’Ephraïm (Nb 13.3, 8, 16) qui paraît ici pour la première fois et sera désigné comme successeur de Moïse (v. 14).
  - type: text
    content: '  : Choisis-nous des guerriers et demain tu iras combattre les Amalécites. Moi, je me tiendrai au sommet de la colline, avec le bâton de Dieu à la main.'
