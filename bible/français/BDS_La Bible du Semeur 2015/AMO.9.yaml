document_id: AMO.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sanctuaire détruit
  - type: text
    content: Je vis le Seigneur debout sur l’autel,
  - type: text
    content: 'disant : Frappe le chapiteau ╵des colonnes du Temple'
  - type: text
    content: et que les seuils en tremblent !
  - type: text
    content: Brise-les sur leur tête à tous !
  - type: text
    content: Ceux qui subsisteront, ╵je les abattrai par l’épée.
  - type: text
    content: Aucun d’eux ne pourra s’enfuir,
  - type: text
    content: aucun d’eux n’en réchappera.
  '10':
  - type: text
    content: Les coupables parmi mon peuple ╵mourront tous par l’épée,
  - type: text
    content: 'tous ceux qui disent : « Le malheur'
  - type: text
    content: ne s’approchera pas de nous,
  - type: text
    content: et il ne nous atteindra pas. »
  - type: heading
    content: Le temps du renouveau
  '11':
  - type: text
    content: En ce jour-là, ╵moi, je relèverai ╵la hutte de David ╵qui tombe en ruine,
  - type: text
    content: j’en boucherai les brèches
  - type: text
    content: et j’en relèverai les ruines.
  - type: text
    content: Je la rebâtirai ╵pour qu’elle soit comme autrefois
  - type: note
    content: Les v. 11-12 sont cités en Ac 15.16-18 d’après l’ancienne version grecque.
  - type: text
    content: ','
  '12':
  - type: text
    content: afin qu’ils entrent ╵en possession
  - type: text
    content: de ce qui restera ╵des Edomites, ╵et des autres peuples
  - type: text
    content: appelés de mon nom ╵comme ma possession,
  - type: text
    content: l’Eternel le déclare, ╵lui qui réalisera tout cela.
  '13':
  - type: text
    content: Voici venir des jours,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: où celui qui laboure ╵suivra de près le moissonneur,
  - type: text
    content: et où le vendangeur ╵suivra celui qui sème,
  - type: text
    content: le vin nouveau ruissellera ╵de toutes les montagnes,
  - type: text
    content: de toutes les collines ╵il coulera à flots.
  '14':
  - type: text
    content: Je ramènerai les captifs
  - type: note
    content: 'Autre traduction : je changerai le sort.'
  - type: text
    content: ' ╵de mon peuple Israël'
  - type: text
    content: et ils rebâtiront ╵les villes dévastées,
  - type: text
    content: et les habiteront.
  - type: text
    content: Ils planteront des vignes
  - type: text
    content: et en boiront le vin,
  - type: text
    content: ils établiront des jardins
  - type: text
    content: et ils en mangeront les fruits.
  '15':
  - type: text
    content: Je les planterai sur leur terre
  - type: text
    content: et ils ne seront plus ╵arrachés à la terre
  - type: text
    content: que je leur ai donnée,
  - type: text
    content: dit l’Eternel, ton Dieu.
  '2':
  - type: text
    content: Car s’ils s’enfoncent ╵jusqu’au séjour des morts,
  - type: text
    content: ma main les en arrachera.
  - type: text
    content: S’ils montent jusqu’au ciel,
  - type: text
    content: je les en ferai redescendre.
  '3':
  - type: text
    content: S’ils se cachent au sommet du Carmel,
  - type: text
    content: je les y chercherai ╵et les attraperai,
  - type: text
    content: et s’ils plongent au fond des mers, ╵pour se dérober à mes yeux,
  - type: text
    content: je donnerai l’ordre au serpent ╵d’aller les mordre là.
  '4':
  - type: text
    content: S’ils partent en exil, ╵devant leurs ennemis,
  - type: text
    content: là, j’ordonnerai à l’épée ╵de les exterminer.
  - type: text
    content: Oui, j’aurai l’œil sur eux
  - type: text
    content: afin d’œuvrer à leur malheur ╵et non à leur bonheur.
  - type: heading
    content: Le Maître de l’univers
  '5':
  - type: text
    content: L’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: touche la terre ╵et elle se délite,
  - type: text
    content: et tous ses habitants ╵prennent le deuil.
  - type: text
    content: La terre tout entière ╵se soulève comme le Nil
  - type: text
    content: pour s’affaisser ensuite ╵comme le fleuve de l’Egypte.
  '6':
  - type: text
    content: L’Eternel a bâti ╵les marches de son trône dans le ciel ;
  - type: text
    content: 'il a fondé sa voûte ╵au-dessus de la terre :'
  - type: text
    content: il convoque les eaux de l’océan,
  - type: text
    content: et les répand ╵sur la surface de la terre.
  - type: text
    content: Son nom est l’Eternel.
  - type: heading
    content: Le juste châtiment
  '7':
  - type: text
    content: N’êtes-vous pas pour moi ╵comme des Ethiopiens,
  - type: text
    content: vous les Israélites ?
  - type: text
    content: l’Eternel le demande.
  - type: text
    content: N’ai-je pas fait sortir ╵Israël de l’Egypte,
  - type: text
    content: les Philistins de Crète
  - type: text
    content: et les Syriens de Qir
  - type: note
    content: Voir 1.5 ; 2 R 16.9. Lieu à la localisation inconnue, probablement près d’Elam (Es 22.6).
  - type: text
    content: '  ?'
  '8':
  - type: text
    content: Le Seigneur, l’Eternel, observe
  - type: text
    content: ce royaume coupable.
  - type: text
    content: Je le supprimerai ╵de la surface de la terre.
  - type: text
    content: Pourtant, je ne veux pas ╵entièrement détruire
  - type: text
    content: le peuple de Jacob,
  - type: text
    content: l’Eternel le déclare.
  '9':
  - type: text
    content: 'Voici ce que j’ordonne :'
  - type: text
    content: Je secouerai ╵le peuple d’Israël ╵chez tous les autres peuples,
  - type: text
    content: 'comme on secoue le grain ╵qu’on a mis dans le crible :'
  - type: text
    content: sans que ne tombe à terre ╵aucune pierre ╵même petite
  - type: note
    content: On séparait le grain des cailloux qui y étaient mêlés en le passant par le crible.
  - type: text
    content: .
