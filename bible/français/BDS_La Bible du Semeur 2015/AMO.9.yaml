document_id: AMO.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sanctuaire détruit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vis le Seigneur debout sur l’autel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disant : Frappe le chapiteau ╵des colonnes du Temple'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les seuils en tremblent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brise-les sur leur tête à tous !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui subsisteront, ╵je les abattrai par l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun d’eux ne pourra s’enfuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun d’eux n’en réchappera.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les coupables parmi mon peuple ╵mourront tous par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tous ceux qui disent : « Le malheur'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne s’approchera pas de nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne nous atteindra pas. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le temps du renouveau
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, ╵moi, je relèverai ╵la hutte de David ╵qui tombe en ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’en boucherai les brèches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’en relèverai les ruines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je la rebâtirai ╵pour qu’elle soit comme autrefois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 11-12 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 15.16-18
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: ','
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’ils entrent ╵en possession
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ce qui restera ╵des Edomites, ╵et des autres peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: appelés de mon nom ╵comme ma possession,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare, ╵lui qui réalisera tout cela.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici venir des jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où celui qui laboure ╵suivra de près le moissonneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où le vendangeur ╵suivra celui qui sème,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vin nouveau ruissellera ╵de toutes les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes les collines ╵il coulera à flots.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ramènerai les captifs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je changerai le sort.
      marker-yv: yv-n
    - type: text
      text: ' ╵de mon peuple Israël'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils rebâtiront ╵les villes dévastées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les habiteront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils planteront des vignes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en boiront le vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils établiront des jardins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils en mangeront les fruits.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les planterai sur leur terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne seront plus ╵arrachés à la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je leur ai donnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel, ton Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car s’ils s’enfoncent ╵jusqu’au séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma main les en arrachera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils montent jusqu’au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les en ferai redescendre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils se cachent au sommet du Carmel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les y chercherai ╵et les attraperai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’ils plongent au fond des mers, ╵pour se dérober à mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je donnerai l’ordre au serpent ╵d’aller les mordre là.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils partent en exil, ╵devant leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là, j’ordonnerai à l’épée ╵de les exterminer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, j’aurai l’œil sur eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin d’œuvrer à leur malheur ╵et non à leur bonheur.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le Maître de l’univers
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: touche la terre ╵et elle se délite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses habitants ╵prennent le deuil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre tout entière ╵se soulève comme le Nil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour s’affaisser ensuite ╵comme le fleuve de l’Egypte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a bâti ╵les marches de son trône dans le ciel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il a fondé sa voûte ╵au-dessus de la terre :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il convoque les eaux de l’océan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les répand ╵sur la surface de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son nom est l’Eternel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le juste châtiment
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’êtes-vous pas pour moi ╵comme des Ethiopiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous les Israélites ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le demande.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ai-je pas fait sortir ╵Israël de l’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Philistins de Crète
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les Syriens de Qir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1.5 ; 2 R 16.9. Lieu à la localisation inconnue, probablement près d’Elam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 22.6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Eternel, observe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce royaume coupable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le supprimerai ╵de la surface de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, je ne veux pas ╵entièrement détruire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le peuple de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que j’ordonne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je secouerai ╵le peuple d’Israël ╵chez tous les autres peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme on secoue le grain ╵qu’on a mis dans le crible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que ne tombe à terre ╵aucune pierre ╵même petite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On séparait le grain des cailloux qui y étaient mêlés en le passant par le crible.
      marker-yv: yv-n
    - type: text
      text: .
