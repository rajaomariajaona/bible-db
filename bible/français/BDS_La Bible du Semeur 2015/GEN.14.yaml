document_id: GEN.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram délivre Loth des ennemis de Sodome
  - type: text
    content: 'Il arriva au temps d’Amraphel, roi de Shinéar, d’Aryok, roi d’Ellasar, de Kedorlaomer, roi d’Elam, et de Tideal, roi de Goyim, '
  '10':
  - type: text
    content: 'Les rois de Sodome et de Gomorrhe prirent la fuite. Or, il y avait dans la vallée de Siddim beaucoup de puits de bitume, et des fuyards y tombèrent ; les rescapés s’enfuirent dans la montagne. '
  '11':
  - type: text
    content: 'Les vainqueurs s’emparèrent de tous les biens de Sodome et de Gomorrhe, ils prirent toutes leurs réserves de vivres et s’en allèrent. '
  '12':
  - type: text
    content: Ils enlevèrent aussi Loth le neveu d’Abram, avec ses biens, car il demeurait à Sodome.
  '13':
  - type: text
    content: 'Un rescapé vint annoncer la nouvelle à Abram l’Hébreu qui demeurait près des chênes de Mamré l’Amoréen, un frère d’Eshkol et d’Aner ; ils étaient tous trois des alliés d’Abram. '
  '14':
  - type: text
    content: 'Quand Abram apprit que son parent avait été emmené captif, il arma trois cent dix-huit hommes bien entraînés, nés dans sa maison, et poursuivit les quatre rois jusqu’à Dan. '
  '15':
  - type: text
    content: 'Il divisa sa troupe et attaqua les ennemis pendant la nuit avec ses serviteurs, il les battit et les poursuivit jusqu’à Hoba au nord de Damas. '
  '16':
  - type: text
    content: Il récupéra tout le butin, il ramena aussi Loth son parent, ainsi que ses biens, les femmes et les autres prisonniers.
  - type: heading
    content: Melchisédek bénit Abram
  '17':
  - type: text
    content: 'Lorsque Abram revint après avoir battu Kedorlaomer et les rois qui étaient avec lui, le roi de Sodome vint à sa rencontre dans la vallée de Shavé qui est la vallée royale. '
  '18':
  - type: text
    content: Melchisédek
  - type: note
    content: Voir Ps 110.4 ; Hé 7.1-10. Salem est probablement l’ancien nom de Jérusalem (voir Ps 110.4 ; Hé 7.1-10).
  - type: text
    content: ', roi de Salem, qui était prêtre du Dieu très-haut, apporta du pain et du vin. '
  '19':
  - type: text
    content: 'Il bénit Abram en ces termes :'
  - type: text
    content: Béni soit Abram
  - type: text
    content: par le Dieu très-haut
  - type: text
    content: qui a formé le ciel et la terre ;
  '2':
  - type: text
    content: 'que ces quatre rois firent la guerre à Béra, roi de Sodome, à Birsha, roi de Gomorrhe, à Shineab, roi d’Adma, à Shéméber, roi de Tseboïm et au roi de Béla, c’est-à-dire Tsoar. '
  '20':
  - type: text
    content: béni soit aussi le Dieu très-haut
  - type: text
    content: qui t’a donné la victoire ╵sur tes ennemis !
  - type: text
    content: Et Abram lui donna le dixième de tout le butin.
  '21':
  - type: text
    content: 'Le roi de Sodome dit alors à Abram : Rends-moi les personnes et garde les biens pour toi.'
  '22':
  - type: text
    content: 'Abram lui répondit : Je jure à main levée vers l’Eternel, le Dieu très-haut qui a formé le ciel et la terre, '
  '23':
  - type: text
    content: 'que je ne prendrai rien de ce qui t’appartient, pas même un fil ou une courroie de soulier, pour que tu ne puisses pas dire : « J’ai enrichi Abram. » '
  '24':
  - type: text
    content: Je ne veux rien si ce n’est ce qu’ont mangé les jeunes gens. De plus, la part des hommes qui m’ont accompagné, Aner, Eshkol et Mamré, eux, ils la prendront.
  '3':
  - type: text
    content: 'Ces derniers rassemblèrent leurs troupes dans la vallée de Siddim, près de la mer Morte. '
  '4':
  - type: text
    content: Pendant douze ans, ils avaient été assujettis à Kedorlaomer, mais la treizième année, ils se révoltèrent.
  '5':
  - type: text
    content: La quatorzième année, Kedorlaomer se mit en campagne avec les rois qui lui étaient alliés et ils battirent les Rephaïm
  - type: note
    content: 'Peuple habitant primitivement ce qui deviendra le pays d’Israël. Leur nom signifie : « géants ».'
  - type: text
    content: ' à Ashteroth-Qarnaïm, puis les Zouzim à Ham, et les Emim à Shavé-Qiryataïm. '
  '6':
  - type: text
    content: 'Ils défirent les Horiens dans leur montagne de Séir, et les poursuivirent jusqu’au chêne de Parân, aux confins du désert. '
  '7':
  - type: text
    content: 'En revenant sur leurs pas, ils arrivèrent à Eyn-Mishpath – c’est-à-dire Qadesh – , ravagèrent tout le pays des Amalécites et battirent les Amoréens qui habitaient Hatsatsôn-Tamar. '
  '8':
  - type: text
    content: 'C’est alors que les rois de Sodome, de Gomorrhe, d’Adma, de Tseboïm et de Béla, c’est-à-dire Tsoar, s’avancèrent et se mirent en position de combat dans la vallée de Siddim '
  '9':
  - type: text
    content: 'en face de Kedorlaomer, roi d’Elam, Tideal, roi de Goyim, Amraphel, roi de Shinéar et Aryok, roi d’Ellasar. Ils étaient quatre rois contre cinq. '
