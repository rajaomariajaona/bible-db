document_id: GEN.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram délivre Loth des ennemis de Sodome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il arriva au temps d’Amraphel, roi de Shinéar, d’Aryok, roi d’Ellasar, de Kedorlaomer, roi d’Elam, et de Tideal, roi de Goyim, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'que ces quatre rois firent la guerre à Béra, roi de Sodome, à Birsha, roi de Gomorrhe, à Shineab, roi d’Adma, à Shéméber, roi de Tseboïm et au roi de Béla, c’est-à-dire Tsoar. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ces derniers rassemblèrent leurs troupes dans la vallée de Siddim, près de la mer Morte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pendant douze ans, ils avaient été assujettis à Kedorlaomer, mais la treizième année, ils se révoltèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La quatorzième année, Kedorlaomer se mit en campagne avec les rois qui lui étaient alliés et ils battirent les Rephaïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peuple habitant primitivement ce qui deviendra le pays d’Israël. Leur nom signifie : « géants ».'
    marker-yv: yv-n
  - type: text
    text: ' à Ashteroth-Qarnaïm, puis les Zouzim à Ham, et les Emim à Shavé-Qiryataïm. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils défirent les Horiens dans leur montagne de Séir, et les poursuivirent jusqu’au chêne de Parân, aux confins du désert. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En revenant sur leurs pas, ils arrivèrent à Eyn-Mishpath – c’est-à-dire Qadesh – , ravagèrent tout le pays des Amalécites et battirent les Amoréens qui habitaient Hatsatsôn-Tamar. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est alors que les rois de Sodome, de Gomorrhe, d’Adma, de Tseboïm et de Béla, c’est-à-dire Tsoar, s’avancèrent et se mirent en position de combat dans la vallée de Siddim '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'en face de Kedorlaomer, roi d’Elam, Tideal, roi de Goyim, Amraphel, roi de Shinéar et Aryok, roi d’Ellasar. Ils étaient quatre rois contre cinq. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les rois de Sodome et de Gomorrhe prirent la fuite. Or, il y avait dans la vallée de Siddim beaucoup de puits de bitume, et des fuyards y tombèrent ; les rescapés s’enfuirent dans la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les vainqueurs s’emparèrent de tous les biens de Sodome et de Gomorrhe, ils prirent toutes leurs réserves de vivres et s’en allèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils enlevèrent aussi Loth le neveu d’Abram, avec ses biens, car il demeurait à Sodome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un rescapé vint annoncer la nouvelle à Abram l’Hébreu qui demeurait près des chênes de Mamré l’Amoréen, un frère d’Eshkol et d’Aner ; ils étaient tous trois des alliés d’Abram. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand Abram apprit que son parent avait été emmené captif, il arma trois cent dix-huit hommes bien entraînés, nés dans sa maison, et poursuivit les quatre rois jusqu’à Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il divisa sa troupe et attaqua les ennemis pendant la nuit avec ses serviteurs, il les battit et les poursuivit jusqu’à Hoba au nord de Damas. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il récupéra tout le butin, il ramena aussi Loth son parent, ainsi que ses biens, les femmes et les autres prisonniers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melchisédek bénit Abram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsque Abram revint après avoir battu Kedorlaomer et les rois qui étaient avec lui, le roi de Sodome vint à sa rencontre dans la vallée de Shavé qui est la vallée royale. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Melchisédek
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Ps 110.4 ; Hé 7.1-10. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Salem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est probablement l’ancien nom de Jérusalem (voir Ps 110.4 ; Hé 7.1-10).
    marker-yv: yv-n
  - type: text
    text: ', roi de Salem, qui était prêtre du Dieu très-haut, apporta du pain et du vin. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il bénit Abram en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni soit Abram
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le Dieu très-haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a formé le ciel et la terre ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: béni soit aussi le Dieu très-haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui t’a donné la victoire ╵sur tes ennemis !
- type: usfm
  marker: p
  children:
  - type: text
    text: Et Abram lui donna le dixième de tout le butin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi de Sodome dit alors à Abram : Rends-moi les personnes et garde les biens pour toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abram lui répondit : Je jure à main levée vers l’Eternel, le Dieu très-haut qui a formé le ciel et la terre, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'que je ne prendrai rien de ce qui t’appartient, pas même un fil ou une courroie de soulier, pour que tu ne puisses pas dire : « J’ai enrichi Abram. » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je ne veux rien si ce n’est ce qu’ont mangé les jeunes gens. De plus, la part des hommes qui m’ont accompagné, Aner, Eshkol et Mamré, eux, ils la prendront.
