document_id: REV.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les sept paroles sur Babylone
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Introduction : présentation de la prostituée'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un des sept anges qui tenaient les sept coupes vint me parler : Viens ici, me dit-il, je te montrerai le jugement de la grande prostituée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prostitution, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans l’Ancien Testament, est souvent une image pour l’idolâtrie.
      marker-yv: yv-n
    - type: text
      text: ' qui est assise sur les grandes eaux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais elles représentent aussi sept rois : cinq d’entre eux ont été renversés, un autre règne en ce moment, et un autre n’est pas encore venu. Une fois qu’il sera là, il ne doit rester que peu de temps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à la bête qui était et qui n’est plus, elle est elle-même un huitième roi. Elle est aussi l’un des sept
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elle est aussi des sept.
      marker-yv: yv-n
    - type: text
      text: ' et elle va à la perdition.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dix cornes que tu as vues sont dix rois qui ne sont pas encore parvenus au pouvoir. Mais ils recevront pendant une heure l’autorité royale et ils l’exerceront en commun avec la bête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils poursuivent un même but et mettent leur puissance et leur autorité au service de la bête. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils feront la guerre à l’Agneau, mais celui-ci les vaincra, car il est le Seigneur des seigneurs et le Roi des rois. Les siens, ceux qu’il a appelés et élus, ceux qui lui sont fidèles, vaincront avec lui.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange me dit ensuite : Les eaux que tu as vues, là où est assise la prostituée, représentent des peuples, des foules, des nations et des langues. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les dix cornes que tu as vues, ainsi que la bête, prendront la prostituée en haine, elles la dépouilleront de tout ce qu’elle a et la laisseront nue ; elles dévoreront ses chairs et la consumeront par le feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car Dieu leur a inspiré la résolution d’exécuter son propre plan, en faisant cause commune et en mettant leur pouvoir royal au service de la bête jusqu’à ce que toutes les décisions de Dieu soient accomplies.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette femme que tu as vue représente la grande ville qui exerce son pouvoir sur tous les souverains du monde.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les rois de la terre se sont livrés à la débauche avec elle, et les habitants de la terre se sont enivrés du vin de sa prostitution.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me transporta alors en esprit dans un désert. Je vis une femme assise sur une bête au pelage écarlate. Cette bête était couverte de titres insultants pour Dieu, elle avait sept têtes et dix cornes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La femme était vêtue d’habits de pourpre et d’écarlate, et parée de bijoux d’or, de pierres précieuses et de perles. Elle tenait à la main une coupe d’or pleine de choses abominables et d’obscénités dues à sa prostitution. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur son front, elle portait gravé un nom mystérieux signifiant : « La grande Babylone, la mère des prostituées et des abominations de la terre. » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vis qu’elle était ivre du sang des membres du peuple saint et des témoins de Jésus. A sa vue, je fus profondément bouleversé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Première parole : le mystère de la prostituée'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange me demanda : Pourquoi t’étonnes-tu ainsi ? Je vais te dévoiler le mystère de la femme et de la bête qui la porte, cette bête aux sept têtes et aux dix cornes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La bête que tu as vue était. Elle n’est plus, elle va monter de l’abîme pour aller à la perdition. Les habitants de la terre dont le nom n’est pas écrit dans le livre de vie depuis la fondation du monde, s’émerveilleront en voyant la bête, car elle était, elle n’est plus et elle viendra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est ici qu’il faut une intelligence éclairée par la sagesse.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les sept têtes sont sept montagnes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beaucoup d’écrivains romains (Virgile, Martial, Cicéron…) désignaient Rome comme la ville aux sept collines.
      marker-yv: yv-n
    - type: text
      text: ', sur lesquelles siège la femme. '
