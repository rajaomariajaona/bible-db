document_id: ISA.64,21
type_code: fra
verses:
  '1':
  - type: text
    content: Comme le feu ╵consume les taillis
  - type: text
    content: et fait bouillonner l’eau,
  - type: text
    content: ainsi tu ferais connaître ton nom ╵à tous tes adversaires,
  - type: text
    content: et tous les peuples ╵trembleraient devant toi.
  '10':
  - type: text
    content: notre saint temple, ╵qui était magnifique
  - type: text
    content: où nos ancêtres te louaient,
  - type: text
    content: est devenue la proie des flammes,
  - type: text
    content: et tout ce qui nous était cher ╵est désormais en ruine.
  '11':
  - type: text
    content: Face à tant de misères, ╵peux-tu, ô Eternel, ╵demeurer sans rien faire
  - type: text
    content: et garder le silence ?
  - type: text
    content: Vas-tu nous humilier encore ╵au-delà de toute mesure ?
  '2':
  - type: text
    content: Si tu accomplissais ╵des actes redoutables
  - type: text
    content: que nous n’attendons pas,
  - type: text
    content: oui, si tu descendais,
  - type: text
    content: devant toi, les montagnes ╵s’effondreraient.
  '3':
  - type: text
    content: Jamais on n’a appris, ╵ni jamais entendu,
  - type: text
    content: jamais un œil n’a vu
  - type: text
    content: qu’un autre dieu que toi
  - type: text
    content: ait agi en faveur ╵de qui compte sur lui
  - type: note
    content: Allusion en 1 Co 2.9.
  - type: text
    content: .
  '4':
  - type: text
    content: Tu viens à la rencontre
  - type: text
    content: de celui qui pratique ╵la justice avec joie,
  - type: text
    content: et tient compte de toi ╵pour suivre les chemins ╵que tu prescris.
  - type: text
    content: Mais tu t’es irrité ╵car nous avons péché.
  - type: text
    content: C’est sur ces chemins de toujours ╵que nous serons sauvés
  - type: note
    content: 'Hébreu peu clair. Autre traduction : Au regard des péchés auxquels nous nous adonnons depuis toujours, pourrions-nous encore être sauvés ?'
  - type: text
    content: .
  '5':
  - type: text
    content: Nous sommes tous semblables ╵à des êtres impurs,
  - type: text
    content: toute notre « justice » ╵est comme des linges souillés.
  - type: text
    content: Nous sommes tous flétris ╵comme un feuillage,
  - type: text
    content: nos fautes nous emportent ╵comme le vent.
  '6':
  - type: text
    content: Personne ne t’invoque,
  - type: text
    content: personne ne se ressaisit ╵pour s’attacher à toi.
  - type: text
    content: Car tu t’es détourné de nous
  - type: text
    content: et tu nous as fait défaillir
  - type: text
    content: sous le poids de nos fautes.
  '7':
  - type: text
    content: Et pourtant, Eternel, ╵toi, tu es notre père.
  - type: text
    content: Nous, nous sommes l’argile,
  - type: text
    content: 'et tu es le potier ╵qui nous a façonnés :'
  - type: text
    content: nous sommes tous l’ouvrage ╵que tes mains ont formé.
  '8':
  - type: text
    content: Ne sois pas courroucé ╵à l’excès, Eternel.
  - type: text
    content: Ne nous tiens pas rigueur ╵à toujours de nos fautes !
  - type: text
    content: Et daigne porter tes regards ╵sur nous tous qui sommes ton peuple !
  '9':
  - type: text
    content: 'Voici : tes villes saintes ╵sont dépeuplées.'
  - type: text
    content: Sion est un désert,
  - type: text
    content: Jérusalem est désolée,
