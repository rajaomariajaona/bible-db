document_id: ISA.64
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Comme le feu ╵consume les taillis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait bouillonner l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi tu ferais connaître ton nom ╵à tous tes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les peuples ╵trembleraient devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si tu accomplissais ╵des actes redoutables
- type: usfm
  marker: q1
  children:
  - type: text
    text: que nous n’attendons pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, si tu descendais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant toi, les montagnes ╵s’effondreraient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jamais on n’a appris, ╵ni jamais entendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais un œil n’a vu
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un autre dieu que toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: ait agi en faveur ╵de qui compte sur lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 2.9
        metadata:
          usfm: 1CO.2.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu viens à la rencontre
- type: usfm
  marker: q1
  children:
  - type: text
    text: de celui qui pratique ╵la justice avec joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tient compte de toi ╵pour suivre les chemins ╵que tu prescris.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu t’es irrité ╵car nous avons péché.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est sur ces chemins de toujours ╵que nous serons sauvés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreu peu clair. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Au regard des péchés auxquels nous nous adonnons depuis toujours, pourrions-nous encore être sauvés ?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nous sommes tous semblables ╵à des êtres impurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute notre « justice » ╵est comme des linges souillés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes tous flétris ╵comme un feuillage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos fautes nous emportent ╵comme le vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Personne ne t’invoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne se ressaisit ╵pour s’attacher à toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu t’es détourné de nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu nous as fait défaillir
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous le poids de nos fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et pourtant, Eternel, ╵toi, tu es notre père.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous, nous sommes l’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu es le potier ╵qui nous a façonnés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous sommes tous l’ouvrage ╵que tes mains ont formé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne sois pas courroucé ╵à l’excès, Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne nous tiens pas rigueur ╵à toujours de nos fautes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et daigne porter tes regards ╵sur nous tous qui sommes ton peuple !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici : tes villes saintes ╵sont dépeuplées.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion est un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem est désolée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: notre saint temple, ╵qui était magnifique
- type: usfm
  marker: q1
  children:
  - type: text
    text: où nos ancêtres te louaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est devenue la proie des flammes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout ce qui nous était cher ╵est désormais en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Face à tant de misères, ╵peux-tu, ô Eternel, ╵demeurer sans rien faire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et garder le silence ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vas-tu nous humilier encore ╵au-delà de toute mesure ?
