document_id: 2CH.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaz, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 16.1-20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Il était âgé de vingt ans à son avènement et il régna seize ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 732 à 715 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. Il ne fit pas ce que l’Eternel considère comme juste, contrairement à son ancêtre David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et maintenant, vous parlez de faire de ces gens de Juda et de Jérusalem vos esclaves et vos servantes. Mais, vous-mêmes, n’êtes-vous pas aussi coupables envers l’Eternel, votre Dieu ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Maintenant donc, écoutez-moi ! Ces prisonniers que vous avez faits parmi vos compatriotes, renvoyez-les chez eux, car la colère ardente de l’Eternel repose sur vous.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Parmi les chefs d’Ephraïm, certains s’opposèrent également à ceux qui revenaient de la guerre. C’étaient Azaria, fils de Yohanân, Bérékia, fils de Meshillémoth, Ezéchias, fils de Shalloum, et Amasa, fils de Hadlaï. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils leur dirent : Vous n’introduirez pas ici ces prisonniers, car vous nous rendriez coupables envers l’Eternel. Vous voudriez encore ajouter à nos fautes et à notre culpabilité ! Notre culpabilité est déjà bien assez grande, et la colère ardente de l’Eternel pèse sur Israël.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors les soldats relâchèrent les prisonniers et abandonnèrent le butin en présence des dirigeants et de toute la foule. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Puis les hommes qui viennent d’être cités se mirent à réconforter les captifs ; ils prélevèrent sur le butin des habits pour vêtir tous ceux qui étaient nus ; ils leur donnèrent aussi des sandales, les firent manger et boire, et soignèrent les blessés en les oignant d’huile, puis ils firent monter sur des ânes tous ceux qui ne pouvaient pas marcher et les ramenèrent à Jéricho, la ville des palmiers, auprès de leurs compatriotes. Ensuite, ils retournèrent à Samarie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaz appelle les Assyriens à l’aide
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En ce temps-là, le roi Ahaz envoya une ambassade aux rois d’Assyrie pour leur demander de l’aide. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: De nouveau, les Edomites avaient envahi le royaume de Juda, avaient battu les Judéens et emmené des captifs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Edomites ont profité de ce que les Judéens soient occupés au nord pour s’installer au sud de Juda (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 16.6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A la même époque, les Philistins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Soumis par Ozias (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 26.6-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' firent une incursion dans les villes du Bas-Pays occidental et du Néguev qui appartenaient à Juda. Ils s’emparèrent de Beth-Shémesh, Ayalôn, Guedéroth, Soko, Timna et Guimzo, ainsi que des localités dépendant de ces trois dernières villes, puis ils s’y établirent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Cela arriva car l’Eternel humiliait le royaume de Juda à cause d’Ahaz, le roi d’Israël, qui avait relâché tout frein dans son royaume et s’était révolté contre l’Eternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais il suivit l’exemple des rois d’Israël et ordonna même de fondre des statues en l’honneur des Baals. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Au lieu de lui venir en aide, Tiglath-Piléser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 5.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', le roi d’Assyrie, vint attaquer Ahaz et le traita en adversaire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ahaz avait pris une partie des biens du temple de l’Eternel, du palais royal et des maisons de ses grands pour faire des présents au roi d’Assyrie : cela ne lui fut d’aucune aide. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Même dans sa situation désespérée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A cause de l’oppression des Syriens, des Israélites, puis des Assyriens.
      marker-yv: yv-n
    - type: text
      text: ', le roi Ahaz persista dans sa révolte contre l’Eternel : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'il offrit des sacrifices aux dieux de Damas, qui l’avaient vaincu, car il se dit : Puisque les dieux des rois de Syrie viennent à leur aide, je leur offrirai, moi aussi, des sacrifices pour qu’ils me secourent.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ils ne lui servirent qu’à causer sa chute et celle de tout Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sacrilège et idolâtrie
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ahaz rassembla tous les objets du temple de Dieu et les mit en pièces. Il ferma les portes du temple de l’Eternel, puis il se fit construire des autels à tous les coins de rue de Jérusalem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il fit ériger des hauts lieux dans toutes les villes de Juda pour faire brûler des parfums aux faux dieux. Il irrita ainsi l’Eternel, le Dieu de ses ancêtres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les autres faits et gestes d’Ahaz et ses agissements, des premiers aux derniers, sont cités dans le livre des rois de Juda et d’Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il rejoignit ses ancêtres décédés, et on l’enterra dans la ville de Jérusalem, mais non dans les tombes des rois d’Israël. Son fils Ezéchias lui succéda sur le trône.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il offrit des parfums dans la vallée de Ben-Hinnom et fit brûler ses propres fils pour les offrir en sacrifice aux idoles, commettant ainsi la même abomination que les peuples étrangers que l’Eternel avait dépossédés en faveur des Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur les sacrifices d’enfants, voir Lv 20.2-5 ; Dt 12.31 ; 18.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il offrait des sacrifices et brûlait des parfums sur les hauts lieux, sur les collines et sous chaque arbre verdoyant.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Eternel son Dieu provoqua sa défaite devant le roi de Syrie. Les Syriens le battirent et lui prirent un grand nombre de prisonniers qu’ils emmenèrent à Damas. La victoire sur Ahaz fut aussi accordée au roi d’Israël qui lui infligea une lourde défaite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: En un seul jour, Péqah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Péqah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'roi d’Israël, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.27-31
        - type: text
          text: '  ; sur les événements mentionnés ici, voir 2 R 16.5 ; Es 7.1.'
      marker-yv: yv-n
    - type: text
      text: ', fils de Remalia, massacra en Juda cent vingt mille hommes, tous des guerriers valeureux, parce qu’ils avaient abandonné l’Eternel, le Dieu de leurs ancêtres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Zikri, un guerrier d’Ephraïm, tua Maaséya, un fils du roi, Azriqam, l’intendant du palais royal, et Elqana, le bras droit du roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Israélites prirent aux Judéens, leurs compatriotes, 200 000 personnes, femmes, garçons et filles, ainsi qu’un butin considérable qu’ils emportèrent à Samarie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bons Samaritains
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Là vivait un prophète de l’Eternel nommé Oded. Il s’avança au-devant de l’armée d’Israël qui arrivait à Samarie et dit aux soldats : Voyez : dans sa colère contre Juda, l’Eternel, le Dieu de vos ancêtres, vous a donné la victoire sur eux, et vous les avez massacrés avec une rage qui est montée jusqu’au ciel. '
