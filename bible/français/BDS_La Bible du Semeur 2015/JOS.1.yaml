document_id: JOS.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La conquête du pays de Canaan
  - type: heading
    content: Josué, successeur de Moïse
  - type: text
    content: 'Après la mort de Moïse, serviteur de l’Eternel, l’Eternel dit à Josué, fils de Noun, l’assistant de Moïse : '
  '10':
  - type: text
    content: 'Josué donna aux chefs du peuple les ordres suivants : '
  '11':
  - type: text
    content: 'Parcourez le camp et ordonnez au peuple : Préparez-vous des provisions, car dans trois jours vous franchirez le Jourdain que voici pour aller prendre possession du pays que l’Eternel votre Dieu vous donne.'
  '12':
  - type: text
    content: 'Aux tribus de Ruben, de Gad et à la demi-tribu de Manassé, Josué s’adressa ainsi : '
  '13':
  - type: text
    content: 'Rappelez-vous ce que vous a ordonné Moïse, le serviteur de l’Eternel. Il vous a dit : « L’Eternel votre Dieu vous a donné ce pays et vous a accordé une existence paisible'
  - type: note
    content: Pour les v. 13-15, voir Nb 32.28-32 ; Dt 3.18-20.
  - type: text
    content: '. » '
  '14':
  - type: text
    content: 'Vos femmes, vos enfants et vos troupeaux peuvent donc rester dans le pays que Moïse vous a donné au-delà du Jourdain, mais vous tous qui êtes des hommes de guerre, vous passerez en ordre de bataille en tête de vos frères et vous leur prêterez main-forte, '
  '15':
  - type: text
    content: jusqu’à ce que l’Eternel votre Dieu leur ait accordé une existence paisible, comme à vous, et qu’eux aussi soient entrés en possession du pays qu’il leur donne. Ensuite, vous retournerez au pays qui vous appartient et vous occuperez cette contrée que Moïse, le serviteur de l’Eternel, vous a accordée à l’est du Jourdain.
  '16':
  - type: text
    content: 'Ils répondirent à Josué : Nous ferons tout ce que tu nous as ordonné et nous irons partout où tu nous enverras. '
  '17':
  - type: text
    content: 'Nous voulons t’obéir en toute chose, comme nous avons obéi à Moïse. Que l’Eternel ton Dieu soit avec toi, comme il a été avec Moïse. '
  '18':
  - type: text
    content: Celui qui s’opposera à ton autorité et désobéira à tes ordres sera mis à mort, quelle que soit la chose que tu auras ordonnée. Prends donc courage et tiens bon !
  '2':
  - type: text
    content: Mon serviteur Moïse est mort. Maintenant donc, dispose-toi à traverser le Jourdain
  - type: note
    content: Le peuple était alors à Shittim (2.1) dans les plaines de Moab (Dt 34.1, 8) près du Jourdain.
  - type: text
    content: ' avec tout ce peuple, pour entrer dans le pays que je donne aux Israélites. '
  '3':
  - type: text
    content: 'Comme je l’ai promis à Moïse, je vous donne tout endroit où vous poserez vos pieds. '
  '4':
  - type: text
    content: Votre territoire s’étendra du désert
  - type: note
    content: Le désert qui couvre la majeure partie de la péninsule Arabique.
  - type: text
    content: ' jusqu’aux montagnes du Liban et du grand fleuve, l’Euphrate, à travers tout le pays des Hittites'
  - type: note
    content: Ce nom s’applique aux descendants de Heth (voir Gn 23.3ss) qui habitaient le sud de ce qui deviendra le pays d’Israël, de Beer-Sheva à Hébron. Selon certains, ces Hittites n’avaient aucun lien avec les Hittites qui, de 1800–1200 av. J.-C., régnèrent en Asie Mineure sur un grand empire qui s’est étendu jusqu’en Syrie et au Liban. Pour d’autres, ces deux groupes hittites ont une lointaine origine commune.
  - type: text
    content: ' jusqu’à la mer Méditerranée, à l’ouest'
  - type: note
    content: Limites extrêmes du pays, conquises et maintenues seulement sous David et Salomon.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Tant que tu vivras, personne ne pourra te résister, car je serai avec toi comme j’ai été avec Moïse, je ne te délaisserai pas et je ne t’abandonnerai pas
  - type: note
    content: Les v. 5-6 reprennent Dt 31.6-8, 23. Repris en 1 Ch 28.20.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Prends courage et tiens bon, car c’est toi qui feras entrer ce peuple en possession du pays que j’ai promis par serment à leurs ancêtres de leur donner. '
  '7':
  - type: text
    content: 'Simplement, prends courage et tiens bon pour veiller à obéir à toute la Loi que mon serviteur Moïse t’a prescrite, sans t’en écarter ni d’un côté ni de l’autre. Alors tu réussiras dans tout ce que tu entreprendras. '
  '8':
  - type: text
    content: 'Aie soin de répéter sans cesse les paroles de ce livre de la Loi, médite-les jour et nuit afin d’y obéir et d’appliquer tout ce qui y est écrit, car alors tu auras du succès dans tes entreprises, alors tu réussiras. '
  '9':
  - type: text
    content: 'Je t’ai donné cet ordre : Prends courage et tiens bon, ne crains rien et ne te laisse pas effrayer, car moi, l’Eternel ton Dieu, je serai avec toi pour tout ce que tu entreprendras.'
  - type: heading
    content: Josué donne ses ordres aux chefs du peuple
