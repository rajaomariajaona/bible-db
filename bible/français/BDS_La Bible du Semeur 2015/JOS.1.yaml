document_id: JOS.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La conquête du pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué, successeur de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après la mort de Moïse, serviteur de l’Eternel, l’Eternel dit à Josué, fils de Noun, l’assistant de Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon serviteur Moïse est mort. Maintenant donc, dispose-toi à traverser le Jourdain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le peuple était alors à Shittim (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.1'
        metadata:
          usfm: JOS.2.1
      - type: text
        text: ) dans les plaines de Moab (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 34.1
        metadata:
          usfm: DEU.34.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: DEU.34.8
      - type: text
        text: ) près du Jourdain.
    marker-yv: yv-n
  - type: text
    text: ' avec tout ce peuple, pour entrer dans le pays que je donne aux Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Comme je l’ai promis à Moïse, je vous donne tout endroit où vous poserez vos pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Votre territoire s’étendra du désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'désert '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui couvre la majeure partie de la péninsule Arabique.
    marker-yv: yv-n
  - type: text
    text: ' jusqu’aux montagnes du Liban et du grand fleuve, l’Euphrate, à travers tout le pays des Hittites'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce nom s’applique aux descendants de Heth (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 23.3
        metadata:
          usfm: GEN.23.3
      - type: text
        text: ss) qui habitaient le sud de ce qui deviendra le pays d’Israël, de Beer-Sheva à Hébron. Selon certains, ces Hittites n’avaient aucun lien avec les Hittites qui, de 1800–1200 av. J.-C., régnèrent en Asie Mineure sur un grand empire qui s’est étendu jusqu’en Syrie et au Liban. Pour d’autres, ces deux groupes hittites ont une lointaine origine commune.
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à la mer Méditerranée, à l’ouest'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Limites extrêmes du pays, conquises et maintenues seulement sous David et Salomon.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tant que tu vivras, personne ne pourra te résister, car je serai avec toi comme j’ai été avec Moïse, je ne te délaisserai pas et je ne t’abandonnerai pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 5-6 reprennent '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 31.6-8
        metadata:
          usfm: DEU.31.6+DEU.31.7+DEU.31.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
        metadata:
          usfm: DEU.31.23
      - type: text
        text: '. Repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28.20
        metadata:
          usfm: 1CH.28.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Prends courage et tiens bon, car c’est toi qui feras entrer ce peuple en possession du pays que j’ai promis par serment à leurs ancêtres de leur donner. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Simplement, prends courage et tiens bon pour veiller à obéir à toute la Loi que mon serviteur Moïse t’a prescrite, sans t’en écarter ni d’un côté ni de l’autre. Alors tu réussiras dans tout ce que tu entreprendras. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aie soin de répéter sans cesse les paroles de ce livre de la Loi, médite-les jour et nuit afin d’y obéir et d’appliquer tout ce qui y est écrit, car alors tu auras du succès dans tes entreprises, alors tu réussiras. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je t’ai donné cet ordre : Prends courage et tiens bon, ne crains rien et ne te laisse pas effrayer, car moi, l’Eternel ton Dieu, je serai avec toi pour tout ce que tu entreprendras.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué donne ses ordres aux chefs du peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Josué donna aux chefs du peuple les ordres suivants : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parcourez le camp et ordonnez au peuple : Préparez-vous des provisions, car dans trois jours vous franchirez le Jourdain que voici pour aller prendre possession du pays que l’Eternel votre Dieu vous donne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aux tribus de Ruben, de Gad et à la demi-tribu de Manassé, Josué s’adressa ainsi : '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rappelez-vous ce que vous a ordonné Moïse, le serviteur de l’Eternel. Il vous a dit : « L’Eternel votre Dieu vous a donné ce pays et vous a accordé une existence paisible'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 13-15, voir Nb 32.28-32 ; Dt 3.18-20.
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vos femmes, vos enfants et vos troupeaux peuvent donc rester dans le pays que Moïse vous a donné au-delà du Jourdain, mais vous tous qui êtes des hommes de guerre, vous passerez en ordre de bataille en tête de vos frères et vous leur prêterez main-forte, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: jusqu’à ce que l’Eternel votre Dieu leur ait accordé une existence paisible, comme à vous, et qu’eux aussi soient entrés en possession du pays qu’il leur donne. Ensuite, vous retournerez au pays qui vous appartient et vous occuperez cette contrée que Moïse, le serviteur de l’Eternel, vous a accordée à l’est du Jourdain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils répondirent à Josué : Nous ferons tout ce que tu nous as ordonné et nous irons partout où tu nous enverras. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nous voulons t’obéir en toute chose, comme nous avons obéi à Moïse. Que l’Eternel ton Dieu soit avec toi, comme il a été avec Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui s’opposera à ton autorité et désobéira à tes ordres sera mis à mort, quelle que soit la chose que tu auras ordonnée. Prends donc courage et tiens bon !
