document_id: REV.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Deuxième parole : la chute de Babylone'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.0 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir les prophéties de l’Ancien Testament sur la chute de Babylone (Es 3 ; 21 ; 47 ; Jr 50) et de Tyr (Ez 26 ; 27).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, je vis un autre ange descendre du ciel. Il détenait un grand pouvoir, et toute la terre fut illuminée du rayonnement de sa gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il cria d’une voix forte :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Elle est tombée, elle est tombée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la grande Babylone
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 21.9
        metadata:
          usfm: ISA.21.9
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle est devenue
- type: usfm
  marker: q1
  children:
  - type: text
    text: un antre de démons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: repaire de tous les esprits impurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: repaire de tous les oiseaux impurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 13.21
        metadata:
          usfm: ISA.13.21
      - type: text
        text: '. Certains manuscrits insèrent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: repaire de toutes les bêtes impures.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détestables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont bu le vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sa prostitution furieuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rois de la terre, avec elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: se sont livrés à la débauche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les commerçants de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont fait fortune
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à son luxe
- type: usfm
  marker: q1
  children:
  - type: text
    text: démesuré.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Troisième parole : le châtiment de Babylone'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis j’entendis encore une autre voix venant du ciel qui disait :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Sortez du milieu d’elle, membres de mon peuple
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 51.45
        metadata:
          usfm: JER.51.45
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: text
    text: ', afin de ne pas participer à ses péchés et de ne pas être frappés avec elle des fléaux qui vont l’atteindre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car ses péchés se sont amoncelés jusqu’au ciel, et Dieu s’est souvenu de toutes ses actions injustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Traitez-la comme elle a traité les autres, payez-la au double de ses méfaits. Et, dans la coupe où elle donnait à boire aux autres, versez-lui une mixture deux fois plus forte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Autant elle a vécu dans la splendeur et le luxe, autant donnez-lui de tourments et de malheurs. « Je trône ici en reine, se disait-elle, je ne suis pas veuve, non jamais je ne connaîtrai le deuil ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voilà pourquoi, en un seul jour, elle verra tous les fléaux fondre sur elle : épidémie, deuil et famine. Elle-même sera consumée par le feu, car le Dieu qui a prononcé la sentence sur elle est un puissant Seigneur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Quatrième, cinquième et sixième paroles : lamentations sur la ruine de Babylone'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors les rois de la terre qui ont partagé sa vie de débauche et de luxe pleureront et se lamenteront sur elle, en voyant monter la fumée de la ville embrasée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils se tiendront à bonne distance, de peur d’être atteints par ses tourments : « Malheur ! Malheur ! gémiront-ils, la grande ville, ô Babylone, ville puissante ! Une heure a suffi pour l’exécution de ton jugement ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les marchands de la terre, eux aussi, pleurent et mènent deuil sur elle, car il n’y a plus personne pour acheter leurs marchandises : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'leurs cargaisons d’or, d’argent, de pierres précieuses et de perles, leurs étoffes de fin lin, de pourpre, de soie et d’écarlate, leurs bois aromatiques et leurs bibelots d’ivoire, tous les objets en bois précieux, en bronze, en fer et en marbre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: la cannelle et autres épices, les parfums, la myrrhe et l’encens, le vin et l’huile, la farine et le froment, les ovins et bovins, les chevaux et les chariots, les corps et les âmes d’hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – Les objets de tes passions ont fui bien loin de toi. Raffinements et splendeurs sont perdus pour toi ! Plus jamais on ne les retrouvera !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les marchands qui s’étaient enrichis par leur commerce avec elle se tiendront à bonne distance, de peur d’être atteints par ses tourments. Ils pleureront et mèneront deuil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils diront :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quel malheur ! Quel malheur ! La grande ville qui se drapait de fin lin, de pourpre et d’écarlate, parée de bijoux d’or, de pierres précieuses et de perles ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En une heure, tant de richesses ont été réduites à néant !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tous les capitaines des bateaux et leur personnel, les marins et tous ceux qui vivent du trafic sur mer, se tenaient aussi à bonne distance '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et se répandaient en cris à la vue de la fumée qui montait de la ville embrasée, disant : Quelle ville pouvait rivaliser avec la grande cité ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils se jetaient de la poussière sur la tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Geste symbolique du deuil et de la consternation dans l’Ancien Testament (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 27.30
        metadata:
          usfm: EZK.27.30
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ils criaient, pleuraient et se lamentaient :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Malheur ! Malheur ! La grande ville, dont la prospérité avait enrichi tous les armateurs des mers ! En une heure, elle a été réduite à néant !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Réjouis-toi de sa ruine, ciel ! Et vous, membres du peuple saint, apôtres et prophètes, réjouissez-vous ! Car en la jugeant, Dieu vous a fait justice.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Septième parole : plus de trace de la grande cité mondaine'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors un ange puissant prit une pierre semblable à une grosse meule et la jeta dans la mer en disant :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ainsi, avec la même violence, sera précipitée Babylone, la grande ville, et on ne la retrouvera plus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 51.64
        metadata:
          usfm: JER.51.64
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ah ! Babylone ! On n’entendra plus chez toi la musique des harpistes et des chanteurs ! Ni flûte, ni trompette ne résonnera plus dans tes murs ! On n’y verra plus d’artisan d’aucun métier ! Le bruit de la meule s’y taira pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La lumière de la lampe n’y brillera plus. Le jeune époux et sa femme ne s’y feront plus entendre. Tout cela arrivera parce que tes marchands étaient les puissants de la terre, parce qu’avec tes sortilèges, tu as trompé tous les peuples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: et que chez toi on a vu couler le sang des prophètes et des membres du peuple saint, ainsi que de tous ceux qu’on a égorgés sur la terre.
