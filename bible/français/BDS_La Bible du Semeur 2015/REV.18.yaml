document_id: REV.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Deuxième parole : la chute de BabyloneVoir les prophéties de l’Ancien Testament sur la chute de Babylone (Es 3 ; 21 ; 47 ; Jr 50) et de Tyr (Ez 26 ; 27).'
  - type: text
    content: 'Après cela, je vis un autre ange descendre du ciel. Il détenait un grand pouvoir, et toute la terre fut illuminée du rayonnement de sa gloire. '
  '10':
  - type: text
    content: 'Ils se tiendront à bonne distance, de peur d’être atteints par ses tourments : « Malheur ! Malheur ! gémiront-ils, la grande ville, ô Babylone, ville puissante ! Une heure a suffi pour l’exécution de ton jugement ! »'
  '11':
  - type: text
    content: 'Les marchands de la terre, eux aussi, pleurent et mènent deuil sur elle, car il n’y a plus personne pour acheter leurs marchandises : '
  '12':
  - type: text
    content: 'leurs cargaisons d’or, d’argent, de pierres précieuses et de perles, leurs étoffes de fin lin, de pourpre, de soie et d’écarlate, leurs bois aromatiques et leurs bibelots d’ivoire, tous les objets en bois précieux, en bronze, en fer et en marbre, '
  '13':
  - type: text
    content: la cannelle et autres épices, les parfums, la myrrhe et l’encens, le vin et l’huile, la farine et le froment, les ovins et bovins, les chevaux et les chariots, les corps et les âmes d’hommes.
  '14':
  - type: text
    content: – Les objets de tes passions ont fui bien loin de toi. Raffinements et splendeurs sont perdus pour toi ! Plus jamais on ne les retrouvera !
  '15':
  - type: text
    content: 'Les marchands qui s’étaient enrichis par leur commerce avec elle se tiendront à bonne distance, de peur d’être atteints par ses tourments. Ils pleureront et mèneront deuil. '
  '16':
  - type: text
    content: 'Ils diront :'
  - type: text
    content: 'Quel malheur ! Quel malheur ! La grande ville qui se drapait de fin lin, de pourpre et d’écarlate, parée de bijoux d’or, de pierres précieuses et de perles ! '
  '17':
  - type: text
    content: En une heure, tant de richesses ont été réduites à néant !
  - type: text
    content: 'Tous les capitaines des bateaux et leur personnel, les marins et tous ceux qui vivent du trafic sur mer, se tenaient aussi à bonne distance '
  '18':
  - type: text
    content: 'et se répandaient en cris à la vue de la fumée qui montait de la ville embrasée, disant : Quelle ville pouvait rivaliser avec la grande cité ?'
  '19':
  - type: text
    content: Ils se jetaient de la poussière sur la tête
  - type: note
    content: Geste symbolique du deuil et de la consternation dans l’Ancien Testament (voir Ez 27.30).
  - type: text
    content: ', ils criaient, pleuraient et se lamentaient :'
  - type: text
    content: Malheur ! Malheur ! La grande ville, dont la prospérité avait enrichi tous les armateurs des mers ! En une heure, elle a été réduite à néant !
  '2':
  - type: text
    content: 'Il cria d’une voix forte :'
  - type: text
    content: Elle est tombée, elle est tombée,
  - type: text
    content: la grande Babylone
  - type: text
    content: ' '
  - type: note
    content: Es 21.9 .
  - type: text
    content: .
  - type: text
    content: Et elle est devenue
  - type: text
    content: un antre de démons,
  - type: text
    content: repaire de tous les esprits impurs,
  - type: text
    content: repaire de tous les oiseaux impurs
  - type: note
    content: 'Voir Es 13.21. Certains manuscrits insèrent : repaire de toutes les bêtes impures.'
  - type: text
    content: ','
  - type: text
    content: et détestables.
  '20':
  - type: text
    content: Réjouis-toi de sa ruine, ciel ! Et vous, membres du peuple saint, apôtres et prophètes, réjouissez-vous ! Car en la jugeant, Dieu vous a fait justice.
  - type: heading
    content: 'Septième parole : plus de trace de la grande cité mondaine'
  '21':
  - type: text
    content: 'Alors un ange puissant prit une pierre semblable à une grosse meule et la jeta dans la mer en disant :'
  - type: text
    content: Ainsi, avec la même violence, sera précipitée Babylone, la grande ville, et on ne la retrouvera plus
  - type: note
    content: Voir Jr 51.64.
  - type: text
    content: '  !'
  '22':
  - type: text
    content: 'Ah ! Babylone ! On n’entendra plus chez toi la musique des harpistes et des chanteurs ! Ni flûte, ni trompette ne résonnera plus dans tes murs ! On n’y verra plus d’artisan d’aucun métier ! Le bruit de la meule s’y taira pour toujours. '
  '23':
  - type: text
    content: 'La lumière de la lampe n’y brillera plus. Le jeune époux et sa femme ne s’y feront plus entendre. Tout cela arrivera parce que tes marchands étaient les puissants de la terre, parce qu’avec tes sortilèges, tu as trompé tous les peuples, '
  '24':
  - type: text
    content: et que chez toi on a vu couler le sang des prophètes et des membres du peuple saint, ainsi que de tous ceux qu’on a égorgés sur la terre.
  '3':
  - type: text
    content: Car tous les peuples
  - type: text
    content: ont bu le vin
  - type: text
    content: de sa prostitution furieuse.
  - type: text
    content: Les rois de la terre, avec elle,
  - type: text
    content: se sont livrés à la débauche,
  - type: text
    content: et les commerçants de la terre
  - type: text
    content: ont fait fortune
  - type: text
    content: grâce à son luxe
  - type: text
    content: démesuré.
  - type: heading
    content: 'Troisième parole : le châtiment de Babylone'
  '4':
  - type: text
    content: 'Puis j’entendis encore une autre voix venant du ciel qui disait :'
  - type: text
    content: Sortez du milieu d’elle, membres de mon peuple
  - type: text
    content: ' '
  - type: note
    content: Jr 51.45 .
  - type: text
    content: ', afin de ne pas participer à ses péchés et de ne pas être frappés avec elle des fléaux qui vont l’atteindre. '
  '5':
  - type: text
    content: 'Car ses péchés se sont amoncelés jusqu’au ciel, et Dieu s’est souvenu de toutes ses actions injustes. '
  '6':
  - type: text
    content: 'Traitez-la comme elle a traité les autres, payez-la au double de ses méfaits. Et, dans la coupe où elle donnait à boire aux autres, versez-lui une mixture deux fois plus forte. '
  '7':
  - type: text
    content: Autant elle a vécu dans la splendeur et le luxe, autant donnez-lui de tourments et de malheurs. « Je trône ici en reine, se disait-elle, je ne suis pas veuve, non jamais je ne connaîtrai le deuil ! »
  '8':
  - type: text
    content: 'Voilà pourquoi, en un seul jour, elle verra tous les fléaux fondre sur elle : épidémie, deuil et famine. Elle-même sera consumée par le feu, car le Dieu qui a prononcé la sentence sur elle est un puissant Seigneur.'
  - type: heading
    content: 'Quatrième, cinquième et sixième paroles : lamentations sur la ruine de Babylone'
  '9':
  - type: text
    content: 'Alors les rois de la terre qui ont partagé sa vie de débauche et de luxe pleureront et se lamenteront sur elle, en voyant monter la fumée de la ville embrasée. '
