document_id: DEU.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les premiers fruits du pays promis
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous serez arrivés dans le pays que l’Eternel votre Dieu vous donne comme patrimoine, lorsque vous en aurez pris possession et que vous y serez installés, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, ô Eternel, j’apporte maintenant les premiers produits de la terre que tu m’as donnée ! » Après cela, tu déposeras la corbeille devant l’Eternel ton Dieu, et tu te prosterneras devant lui pour l’adorer. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, avec le lévite et l’immigré qui réside au milieu de vous, tu te réjouiras de tous les biens que l’Eternel ton Dieu t’aura accordés, à toi et à ta famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au cours du repas accompagnant le sacrifice et auquel étaient invités le lévite (12.12 ; 14.29) et l’étranger (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.11'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14'
        - type: text
          text: '). C’est la dîme annuelle (voir chap. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12'
        - type: text
          text: ) qui constituait ce repas, les prémices étant offertes au prêtre (18.4 ; Nb 18.12).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La dîme des trois ans
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les trois ans, ce sera l’année de la dîme. Quand tu auras achevé de prélever toute la dîme sur toutes tes récoltes et que tu l’auras distribuée aux lévites, aux immigrés, aux orphelins et aux veuves, pour qu’ils aient de quoi manger à satiété là où tu habiteras
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 14.28-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu feras cette déclaration devant l’Eternel ton Dieu : « J’ai fait disparaître de chez moi tout ce qui était consacré et je l’ai distribué aux lévites, aux immigrés, aux orphelins et aux veuves, conformément aux ordres que tu m’as donnés. Je n’ai transgressé ni négligé aucun de tes commandements. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ai mangé aucune part de cette dîme pendant que j’étais en deuil, je n’en ai rien prélevé pour un usage impur, ni rien donné pour un mort. J’ai obéi à l’Eternel mon Dieu, j’ai fait tout ce que tu m’as ordonné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Regarde donc du haut de ta demeure sainte, du haut du ciel et bénis ton peuple, Israël, et le pays que tu nous as donné comme tu l’avais promis par serment à nos ancêtres, un pays où ruissellent le lait et le miel. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Conclusion : obéir à l’Eternel de tout son cœur'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aujourd’hui, l’Eternel votre Dieu vous ordonne d’appliquer ces ordonnances et ces lois. Vous y obéirez et vous les appliquerez de tout votre cœur, de tout votre être. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez obtenu aujourd’hui cette déclaration de la part de l’Eternel qu’il serait votre Dieu si vous suivez le chemin qu’il vous a prescrit, en obéissant à ses ordonnances, ses commandements et ses lois, et en écoutant sa parole. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A son tour, l’Eternel vous a fait déclarer aujourd’hui que vous serez pour lui, comme il vous l’a dit, un peuple précieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
      marker-yv: yv-n
    - type: text
      text: ' et qui obéit à tous ses commandements. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel votre Dieu veut vous élever en gloire, en renommée et en dignité au-dessus de tous les autres peuples qu’il a créés. Il veut faire de vous un peuple saint, comme il l’a déclaré.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: chacun de vous prélèvera une part de tous les premiers produits du sol qu’il aura récoltés dans le pays que l’Eternel votre Dieu vous donne, il les déposera dans une corbeille et se rendra au lieu que l’Eternel votre Dieu aura choisi pour y établir sa présence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 23.19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ira trouver le prêtre qui sera en fonction à ce moment-là et lui dira : « Je déclare aujourd’hui devant l’Eternel ton Dieu que je suis entré dans le pays que l’Eternel avait promis par serment à nos ancêtres de nous donner. » '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre prendra la corbeille de sa main et la déposera devant l’autel de l’Eternel votre Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tu prendras la parole et tu diras devant l’Eternel ton Dieu : « Mon ancêtre était un Araméen errant'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de Jacob : voir Gn 25.20 ; 28.1-2. Cette confession était récitée par les Juifs lors de la Pâque et le jour suivant la présentation de la première gerbe.'
      marker-yv: yv-n
    - type: text
      text: '. Il s’est rendu en Egypte et y a émigré avec une poignée d’hommes, et ils y sont devenus un grand peuple puissant et nombreux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les Egyptiens nous ont maltraités et opprimés en nous imposant des travaux pénibles. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors nous avons crié à l’Eternel le Dieu de nos ancêtres, et il a entendu nos plaintes, il a vu notre misère, notre peine et notre détresse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 2.23-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et nous a fait sortir d’Egypte en déployant sa puissance ; il a plongé les Egyptiens dans la terreur en opérant des signes miraculeux et des prodiges. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il nous a conduits jusqu’ici et nous a fait cadeau de ce pays où ruissellent le lait et le miel. '
