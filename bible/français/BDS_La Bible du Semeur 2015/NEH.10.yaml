document_id: NEH.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Engagement solennel et liste des signataires
  - type: text
    content: A cause de tout cela, nous prenons un ferme engagement que nous mettons par écrit. L’acte scellé a été signé par nos dirigeants, nos lévites et nos prêtres.
  '10':
  - type: text
    content: 'Pour les lévites : Josué, fils d’Azania, Binnouï, des descendants de Hénadad, Qadmiel, '
  '11':
  - type: text
    content: 'et leurs collègues Shebania, Hodiya, Qelita, Pelaya, Hanân, '
  '12':
  - type: text
    content: 'Michée, Rehob, Hashabia, '
  '13':
  - type: text
    content: 'Zakkour, Shérébia, Shebania, '
  '14':
  - type: text
    content: Hodiya, Bani et Beninou.
  '15':
  - type: text
    content: 'Les chefs du peuple qui signèrent furent : Pareosh, Pahath-Moab, Elam, Zatthou, Bani, '
  '16':
  - type: text
    content: 'Bounni, Azgad, Bébaï, '
  '17':
  - type: text
    content: 'Adoniya, Bigvaï, Adîn, '
  '18':
  - type: text
    content: 'Ather, Ezéchias, Azzour, '
  '19':
  - type: text
    content: 'Hodiya, Hashoum, Betsaï, '
  '2':
  - type: text
    content: 'Voici la liste de ceux qui apposèrent leur sceau sur les documents : Néhémie le gouverneur, fils de Hakalia, Sédécias, '
  '20':
  - type: text
    content: 'Hariph, Anatoth, Nébaï, '
  '21':
  - type: text
    content: 'Magpiash, Meshoullam, Hézir, '
  '22':
  - type: text
    content: 'Meshézabéel, Tsadoq, Yaddoua, '
  '23':
  - type: text
    content: 'Pelatia, Hanân, Anaya, '
  '24':
  - type: text
    content: 'Osée, Hanania, Hashoub, '
  '25':
  - type: text
    content: 'Hallohesh, Pilha, Shobeq, '
  '26':
  - type: text
    content: 'Rehoum, Hashabna, Maaséya, '
  '27':
  - type: text
    content: 'Ahiya, Hanân, Anân, '
  '28':
  - type: text
    content: Mallouk, Harim, Baana.
  '29':
  - type: text
    content: Se joignirent à eux le reste des Israélites, des prêtres, des lévites, les portiers, les musiciens, les desservants du Temple, tous ceux qui s’étaient séparés des peuples étrangers pour suivre la Loi de Dieu, de même que leurs femmes, leurs fils et leurs filles et tous ceux qui étaient en âge de comprendre.
  - type: heading
    content: Contenu de l’engagement
  '3':
  - type: text
    content: 'Seraya, Azaria, Jérémie, '
  '30':
  - type: text
    content: Tous donnèrent leur soutien aux compatriotes les plus considérés d’entre eux. Ils promirent et s’engagèrent par serment à vivre en accord avec la Loi de Dieu donnée par l’intermédiaire de Moïse, son serviteur, à obéir à tous les commandements de l’Eternel, notre Seigneur, à ses articles de droit et à ses ordonnances et à les appliquer.
  '31':
  - type: text
    content: – Nous nous engageons en particulier, dirent-ils, à ne pas donner nos filles en mariage aux peuples étrangers qui sont dans le pays et à ne pas faire épouser leurs filles par nos fils
  - type: note
    content: Voir Ex 34.16 ; Dt 7.3.
  - type: text
    content: '  ; '
  '32':
  - type: text
    content: et à ne rien acheter le jour du sabbat et les jours de fête aux gens du pays si, ces jours-là, ils apportent des marchandises et toutes sortes de denrées à vendre. Tous les sept ans, nous laisserons reposer la terre et nous annulerons toutes les dettes
  - type: note
    content: Voir Ex 23.10-11 ; Lv 25.1-7 ; Dt 15.1-2.
  - type: text
    content: '. '
  '33':
  - type: text
    content: De plus, nous nous imposons comme règle de donner obligatoirement chaque année une pièce d’argent de quatre grammes pour l’entretien et le culte du temple de notre Dieu
  - type: note
    content: Voir Ex 30.11-16.
  - type: text
    content: ', '
  '34':
  - type: text
    content: pour les pains exposés devant l’Eternel, pour l’offrande permanente, pour l’holocauste perpétuel et celui des jours de sabbat, des nouvelles lunes et des fêtes, pour les choses consacrées, pour les sacrifices d’expiation des péchés d’Israël, et pour tout ce qui se fait dans le temple de notre Dieu.
  '35':
  - type: text
    content: Nous avons aussi tiré au sort quelles familles de prêtres, de lévites et de gens du peuple devaient apporter chaque année à date fixe au temple de notre Dieu, le bois destiné à brûler sur l’autel de l’Eternel, notre Dieu, comme cela est écrit dans la Loi.
  '36':
  - type: text
    content: Nous prenons aussi l’engagement d’apporter tous les ans au temple de l’Eternel les premières récoltes de notre sol et les premiers fruits de tous nos arbres
  - type: note
    content: Voir Ex 23.19 ; 34.26 ; Dt 26.2.
  - type: text
    content: ', '
  '37':
  - type: text
    content: d’y présenter les premiers-nés de nos fils et de notre bétail, comme il est écrit dans la Loi
  - type: note
    content: Voir Ex 13.1-2.
  - type: text
    content: ', et d’amener au temple de notre Dieu les premiers-nés de notre petit et de notre gros bétail, pour les remettre aux prêtres qui assurent le service dans le temple de notre Dieu. '
  '38':
  - type: text
    content: Nous apporterons aux prêtres, dans les salles de notre Dieu
  - type: note
    content: Locaux aménagés dans les parvis du Temple pour stocker les réserves d’argent et d’or ainsi que les ustensiles sacrés (voir 12.44 ; 13.4-5, 9 ; Esd 8.28-30).
  - type: text
    content: ', la pâte faite avec notre première farine, nos offrandes, des fruits de tous les arbres, du vin nouveau, de l’huile, et nous remettrons aux lévites la dixième partie des produits de nos terres. Ils viendront eux-mêmes prélever cette dîme dans toutes les localités où nous travaillons'
  - type: note
    content: Voir Nb 15.18-21 ; 18.21-24.
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Un prêtre, descendant d’Aaron, accompagnera les lévites quand ceux-ci prélèveront la dîme, et ceux-ci apporteront la dîme de la dîme au temple de notre Dieu, dans les salles de l’annexe qui sert d’entrepôt. '
  '4':
  - type: text
    content: 'Pashhour, Amaria, Malkiya, '
  '40':
  - type: text
    content: Car les Israélites et les lévites apporteront dans ces salles leurs offrandes de blé, de vin nouveau et d’huile ; c’est dans ces locaux que sont entreposés les objets du sanctuaire et que se tiendront les prêtres qui font le service, les portiers et les musiciens. Ainsi, nous ne négligerons pas le temple de notre Dieu.
  '5':
  - type: text
    content: 'Hattoush, Shebania, Mallouk, '
  '6':
  - type: text
    content: 'Harim, Merémoth, Abdias, '
  '7':
  - type: text
    content: 'Daniel, Guinnethôn, Baruch, '
  '8':
  - type: text
    content: 'Meshoullam, Abiya, Miyamîn, '
  '9':
  - type: text
    content: Maazia, Bilgaï et Shemaya, les prêtres.
