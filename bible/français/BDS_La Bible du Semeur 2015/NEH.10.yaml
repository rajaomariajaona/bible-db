document_id: NEH.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Engagement solennel et liste des signataires
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cause de tout cela, nous prenons un ferme engagement que nous mettons par écrit. L’acte scellé a été signé par nos dirigeants, nos lévites et nos prêtres.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour les lévites : Josué, fils d’Azania, Binnouï, des descendants de Hénadad, Qadmiel, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leurs collègues Shebania, Hodiya, Qelita, Pelaya, Hanân, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Michée, Rehob, Hashabia, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zakkour, Shérébia, Shebania, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hodiya, Bani et Beninou.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs du peuple qui signèrent furent : Pareosh, Pahath-Moab, Elam, Zatthou, Bani, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bounni, Azgad, Bébaï, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoniya, Bigvaï, Adîn, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ather, Ezéchias, Azzour, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hodiya, Hashoum, Betsaï, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la liste de ceux qui apposèrent leur sceau sur les documents : Néhémie le gouverneur, fils de Hakalia, Sédécias, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hariph, Anatoth, Nébaï, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Magpiash, Meshoullam, Hézir, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meshézabéel, Tsadoq, Yaddoua, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pelatia, Hanân, Anaya, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Osée, Hanania, Hashoub, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hallohesh, Pilha, Shobeq, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoum, Hashabna, Maaséya, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahiya, Hanân, Anân, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mallouk, Harim, Baana.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Se joignirent à eux le reste des Israélites, des prêtres, des lévites, les portiers, les musiciens, les desservants du Temple, tous ceux qui s’étaient séparés des peuples étrangers pour suivre la Loi de Dieu, de même que leurs femmes, leurs fils et leurs filles et tous ceux qui étaient en âge de comprendre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contenu de l’engagement
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seraya, Azaria, Jérémie, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous donnèrent leur soutien aux compatriotes les plus considérés d’entre eux. Ils promirent et s’engagèrent par serment à vivre en accord avec la Loi de Dieu donnée par l’intermédiaire de Moïse, son serviteur, à obéir à tous les commandements de l’Eternel, notre Seigneur, à ses articles de droit et à ses ordonnances et à les appliquer.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Nous nous engageons en particulier, dirent-ils, à ne pas donner nos filles en mariage aux peuples étrangers qui sont dans le pays et à ne pas faire épouser leurs filles par nos fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 34.16 ; Dt 7.3.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et à ne rien acheter le jour du sabbat et les jours de fête aux gens du pays si, ces jours-là, ils apportent des marchandises et toutes sortes de denrées à vendre. Tous les sept ans, nous laisserons reposer la terre et nous annulerons toutes les dettes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 23.10-11 ; Lv 25.1-7 ; Dt 15.1-2.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De plus, nous nous imposons comme règle de donner obligatoirement chaque année une pièce d’argent de quatre grammes pour l’entretien et le culte du temple de notre Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.11-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pour les pains exposés devant l’Eternel, pour l’offrande permanente, pour l’holocauste perpétuel et celui des jours de sabbat, des nouvelles lunes et des fêtes, pour les choses consacrées, pour les sacrifices d’expiation des péchés d’Israël, et pour tout ce qui se fait dans le temple de notre Dieu.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous avons aussi tiré au sort quelles familles de prêtres, de lévites et de gens du peuple devaient apporter chaque année à date fixe au temple de notre Dieu, le bois destiné à brûler sur l’autel de l’Eternel, notre Dieu, comme cela est écrit dans la Loi.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous prenons aussi l’engagement d’apporter tous les ans au temple de l’Eternel les premières récoltes de notre sol et les premiers fruits de tous nos arbres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 23.19 ; 34.26 ; Dt 26.2.
      marker-yv: yv-n
    - type: text
      text: ', '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: d’y présenter les premiers-nés de nos fils et de notre bétail, comme il est écrit dans la Loi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 13.1-2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et d’amener au temple de notre Dieu les premiers-nés de notre petit et de notre gros bétail, pour les remettre aux prêtres qui assurent le service dans le temple de notre Dieu. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous apporterons aux prêtres, dans les salles de notre Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Locaux aménagés dans les parvis du Temple pour stocker les réserves d’argent et d’or ainsi que les ustensiles sacrés (voir 12.44 ; 13.4-5, 9 ; Esd 8.28-30).
      marker-yv: yv-n
    - type: text
      text: ', la pâte faite avec notre première farine, nos offrandes, des fruits de tous les arbres, du vin nouveau, de l’huile, et nous remettrons aux lévites la dixième partie des produits de nos terres. Ils viendront eux-mêmes prélever cette dîme dans toutes les localités où nous travaillons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 15.18-21 ; 18.21-24.
      marker-yv: yv-n
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un prêtre, descendant d’Aaron, accompagnera les lévites quand ceux-ci prélèveront la dîme, et ceux-ci apporteront la dîme de la dîme au temple de notre Dieu, dans les salles de l’annexe qui sert d’entrepôt. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pashhour, Amaria, Malkiya, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car les Israélites et les lévites apporteront dans ces salles leurs offrandes de blé, de vin nouveau et d’huile ; c’est dans ces locaux que sont entreposés les objets du sanctuaire et que se tiendront les prêtres qui font le service, les portiers et les musiciens. Ainsi, nous ne négligerons pas le temple de notre Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hattoush, Shebania, Mallouk, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Harim, Merémoth, Abdias, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Daniel, Guinnethôn, Baruch, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meshoullam, Abiya, Miyamîn, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maazia, Bilgaï et Shemaya, les prêtres.
