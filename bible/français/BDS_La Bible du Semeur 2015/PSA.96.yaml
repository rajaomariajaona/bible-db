document_id: PSA.96
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que tout l’univers célèbre l’Eternel, son roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '96 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 16.23-33
        metadata:
          usfm: 1CH.16.23+1CH.16.24+1CH.16.25+1CH.16.26+1CH.16.27+1CH.16.28+1CH.16.29+1CH.16.30+1CH.16.31+1CH.16.32+1CH.16.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chantez à l’Eternel ╵un cantique nouveau !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez à l’Eternel, ╵vous, gens du monde entier !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez à l’Eternel ╵bénissez-le !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Annoncez chaque jour ╵la bonne nouvelle de son salut !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, publiez sa gloire ╵au milieu des nations !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Racontez ses prodiges ╵chez tous les peuples !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car l’Eternel est grand ╵et digne de louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il est redoutable ╵bien plus que tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car tous les dieux des peuples ╵ne sont que des faux dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que l’Eternel ╵a fait le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Splendeur et majesté ╵rayonnent de son être,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et puissance et beauté ╵ornent son sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Célébrez l’Eternel, ╵vous, gens de tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Célébrez l’Eternel ╵et son nom glorieux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Apportez vos offrandes, ╵entrez dans ses parvis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '96.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'revêtus de vêtements sacrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.2'
        metadata:
          usfm: PSA.29.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous, gens du monde entier, ╵tremblez devant sa face !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qu’à tout peuple on proclame ╵que l’Eternel est roi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi le monde est ferme, ╵il n’est pas ébranlé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu juge avec droiture ╵les peuples de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que le ciel soit en joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la terre exulte d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la mer retentisse ╵et tout ce qui l’habite !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que toute la campagne ╵et tout ce qui s’y trouve ╵se réjouissent !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que, dans les bois, les arbres ╵poussent des cris de joie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: devant l’Eternel, car il vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vient pour gouverner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '96.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 82.8
        metadata:
          usfm: PSA.82.8
      - type: text
        text: ' et la note.'
    marker-yv: yv-n
  - type: text
    text: ' la terre.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il gouvernera le monde ╵selon ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il gouvernera les peuples ╵selon la vérité ╵qui est en lui.
