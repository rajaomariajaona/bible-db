document_id: PSA.96,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Que tout l’univers célèbre l’Eternel, son roiVoir 1 Ch 16.23-33.  !
  - type: text
    content: Chantez à l’Eternel ╵un cantique nouveau !
  - type: text
    content: Chantez à l’Eternel, ╵vous, gens du monde entier !
  '10':
  - type: text
    content: Qu’à tout peuple on proclame ╵que l’Eternel est roi !
  - type: text
    content: Aussi le monde est ferme, ╵il n’est pas ébranlé.
  - type: text
    content: Dieu juge avec droiture ╵les peuples de la terre.
  '11':
  - type: text
    content: Que le ciel soit en joie
  - type: text
    content: et que la terre exulte d’allégresse,
  - type: text
    content: que la mer retentisse ╵et tout ce qui l’habite !
  '12':
  - type: text
    content: Que toute la campagne ╵et tout ce qui s’y trouve ╵se réjouissent !
  - type: text
    content: Que, dans les bois, les arbres ╵poussent des cris de joie
  '13':
  - type: text
    content: devant l’Eternel, car il vient,
  - type: text
    content: il vient pour gouverner
  - type: note
    content: Voir Ps 82.8 et la note.
  - type: text
    content: ' la terre.'
  - type: text
    content: Oui, il gouvernera le monde ╵selon ce qui est juste,
  - type: text
    content: et il gouvernera les peuples ╵selon la vérité ╵qui est en lui.
  '2':
  - type: text
    content: Chantez à l’Eternel ╵bénissez-le !
  - type: text
    content: Annoncez chaque jour ╵la bonne nouvelle de son salut !
  '3':
  - type: text
    content: Oui, publiez sa gloire ╵au milieu des nations !
  - type: text
    content: Racontez ses prodiges ╵chez tous les peuples !
  '4':
  - type: text
    content: Car l’Eternel est grand ╵et digne de louanges,
  - type: text
    content: et il est redoutable ╵bien plus que tous les dieux.
  '5':
  - type: text
    content: Car tous les dieux des peuples ╵ne sont que des faux dieux,
  - type: text
    content: alors que l’Eternel ╵a fait le ciel.
  '6':
  - type: text
    content: Splendeur et majesté ╵rayonnent de son être,
  - type: text
    content: et puissance et beauté ╵ornent son sanctuaire.
  '7':
  - type: text
    content: Célébrez l’Eternel, ╵vous, gens de tous les peuples,
  - type: text
    content: célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
  '8':
  - type: text
    content: Célébrez l’Eternel ╵et son nom glorieux !
  - type: text
    content: Apportez vos offrandes, ╵entrez dans ses parvis,
  '9':
  - type: text
    content: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
  - type: note
    content: 'Autre traduction : revêtus de vêtements sacrés (voir 29.2).'
  - type: text
    content: '  !'
  - type: text
    content: Vous, gens du monde entier, ╵tremblez devant sa face !
