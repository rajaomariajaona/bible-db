document_id: AMO.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Paroles d’Amos, l’un des éleveurs de Teqoa
  - type: note
    content: A une vingtaine de kilomètres au sud de Jérusalem.
  - type: text
    content: ', qui lui furent révélées au sujet d’Israël'
  - type: note
    content: C’est-à-dire le royaume du Nord.
  - type: text
    content: ', au temps d’Ozias, roi de Juda, et au temps de Jéroboam, fils de Joas, roi d’Israël, deux ans avant le tremblement de terre'
  - type: note
    content: Sur le règne d’Ozias ou Azaria (792 à 740 av. J.-C.), voir 2 R 15.1-7 ; 2 Ch 26.1-23  ; sur celui de Jéroboam II (793 à 753 av. J.-C.), voir 2 R 14.23-29. On ne sait rien de ce tremblement de terre, sinon qu’il a dû frapper les esprits puisque Zacharie le mentionne encore deux siècles et demi plus tard (Za 14.5).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Je mettrai donc le feu ╵aux murailles de Tyr,
  - type: text
    content: et il consumera ╵les palais qui s’y trouvent.
  - type: heading
    content: Contre les Edomites
  '11':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Edom a perpétré ╵de nombreux crimes ;
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car il a poursuivi ╵le peuple frère avec l’épée
  - type: note
    content: Les Edomites, descendants d’Isaac par Esaü (Gn 36), occupant le sud de la mer Morte, ont toujours été ennemis d’Israël (voir Nb 20.14-21 ; Lm 4.21 ; Jl 4.19 ; Ab 11-14 ; Ps 137.7).
  - type: text
    content: ','
  - type: text
    content: en étouffant toute pitié,
  - type: text
    content: et il n’a pas cessé ╵de le meurtrir avec colère
  - type: text
    content: et de nourrir sans fin ╵sa rage invétérée.
  '12':
  - type: text
    content: Je mettrai donc le feu ╵au milieu de Témân,
  - type: text
    content: et il consumera ╵les palais de Botsra
  - type: note
    content: Témân, ville ou région d’Edom, qui représente souvent l’ensemble du pays ; Botsra, ville importante d’Edom.
  - type: text
    content: .
  - type: heading
    content: Contre les Ammonites
  '13':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Les Ammonites
  - type: note
    content: Les Ammonites étaient installés en Transjordanie près de la tribu de Gad.
  - type: text
    content: ' ont perpétré ╵de nombreux crimes ;'
  - type: text
    content: ils ont dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: parce qu’ils ont ouvert le ventre
  - type: text
    content: des femmes qui étaient enceintes ╵en Galaad,
  - type: text
    content: en recherchant ╵à agrandir leur territoire.
  '14':
  - type: text
    content: J’incendierai ╵les remparts de Rabba
  - type: note
    content: Capitale des Ammonites, la ville moderne d’Amman.
  - type: text
    content: .
  - type: text
    content: Alors le feu consumera ╵les palais qui s’y trouvent,
  - type: text
    content: au bruit des cris de guerre
  - type: text
    content: en un jour de combat,
  - type: text
    content: dans la tempête
  - type: text
    content: en un jour d’ouragan.
  '15':
  - type: text
    content: Leur roi s’en ira en exil
  - type: text
    content: avec tous ses ministres,
  - type: text
    content: l’Eternel le déclare.
  '2':
  - type: text
    content: 'Amos dit :'
  - type: text
    content: De Sion, l’Eternel rugit
  - type: note
    content: Voir Jl 4.16.
  - type: text
    content: et, de Jérusalem, ╵il donne de la voix.
  - type: text
    content: Les pâturages des bergers ╵se flétriront.
  - type: text
    content: Le sommet du Carmel ╵se desséchera.
  - type: heading
    content: Le jugement approche
  - type: heading
    content: Contre les Syriens
  '3':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Damas
  - type: note
    content: Capitale de la Syrie, sur la frontière nord d’Israël.
  - type: text
    content: ' a perpétré ╵de nombreux crimes ;'
  - type: text
    content: il a dépassé les limites
  - type: note
    content: 'Tel est le sens de l’expression hébraïque : à cause de trois crimes de Damas et même de quatre. On trouve une expression identique en 1.6, 9, 11, 13 ; 2.1, 4, 6 (voir Pr 6.16 ; 30.15, 18, 21, 29 ; Mi 5.14).'
  - type: text
    content: . ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car ils ont écrasé ╵sous des herses de fer ╵les gens de Galaad
  - type: note
    content: Partie du territoire israélite à l’est du Jourdain.
  - type: text
    content: .
  '4':
  - type: text
    content: Je mettrai donc le feu ╵au palais d’Hazaël
  - type: note
    content: Roi de Syrie de 842 à 796 av. J.-C., fondateur d’une nouvelle dynastie (2 R 8.7-15, 28).
  - type: text
    content: ','
  - type: text
    content: et il consumera ╵les palais du roi Ben-Hadad
  - type: note
    content: Fils de Hazaël (2 R 13.24), deuxième du nom (voir 2 R 8.14-15), roi de 796 à 775 av. J.-C.
  - type: text
    content: .
  '5':
  - type: text
    content: Oui, je ferai sauter ╵les verrous de Damas,
  - type: text
    content: je ferai disparaître ╵celui qui siège sur le trône
  - type: note
    content: 'celui qui siège sur le trône. Autre traduction : ceux qui habitent.'
  - type: text
    content: ' ╵dans la vallée d’Aven'
  - type: text
    content: et celui qui est au pouvoir ╵à Beth-Eden
  - type: note
    content: La vallée d’Aven (c’est-à-dire du Péché) et Beth-Eden (c’est-à-dire la Maison du Plaisir), endroits à la localisation inconnue, sont certainement des noms symboliques ou des sobriquets qui désignent la Syrie et Damas, située dans la vallée de l’Amana (voir 2 R 5.12).
  - type: text
    content: ','
  - type: text
    content: et les Syriens ╵partiront en exil à Qir
  - type: note
    content: Voir 9.7 et note.
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Contre les Philistins
  '6':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Gaza
  - type: note
    content: Ville de Philistie.
  - type: text
    content: ' a perpétré ╵de nombreux crimes ;'
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car ils ont déporté ╵des gens en masse ╵pour les livrer ╵à Edom comme esclaves.
  '7':
  - type: text
    content: Je mettrai donc le feu ╵aux remparts de Gaza,
  - type: text
    content: et il consumera ╵les palais qui s’y trouvent.
  '8':
  - type: text
    content: Je ferai disparaître ╵celui qui, dans Ashdod, ╵est assis sur le trône
  - type: note
    content: 'celui qui, dans Ashdod… trône. Autre traduction : les habitants d’Ashdod.'
  - type: text
    content: ','
  - type: text
    content: et celui qui est au pouvoir ╵à Ashkelôn.
  - type: text
    content: Je me tournerai contre Eqrôn
  - type: text
    content: et ainsi périront ╵les derniers Philistins
  - type: note
    content: 'Ashdod, Ashkelôn et Eqrôn: trois autres villes philistines. Gath, la cinquième (voir 6.2), a sans doute déjà été vaincue par Ozias (2 Ch 26.6).'
  - type: text
    content: .
  - type: text
    content: Voici ce que déclare ╵le Seigneur, l’Eternel.
  - type: heading
    content: Contre les Phéniciens
  '9':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Tyr a commis ╵de nombreux crimes ;
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car ils ont livré à Edom ╵des déportés en masse
  - type: note
    content: Il s’agit d’Israélites livrés par les Phéniciens de Tyr aux Edomites.
  - type: text
    content: ','
  - type: text
    content: ils n’ont fait aucun cas ╵de l’alliance
  - type: note
    content: Sur les rapports entre les Phéniciens et Israël, voir 2 S 5.11 ; 1 R 5.15-26 ; 9.11-14 ; Jl 4.4-8.
  - type: text
    content: ' ╵qui les liait au peuple frère.'
