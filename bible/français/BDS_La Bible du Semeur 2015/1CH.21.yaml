document_id: 1CH.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le recensement et la punition
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 24.1-25)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Satan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un adversaire. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jb 1.6 ; Za 3.1 et les notes.
      marker-yv: yv-n
    - type: text
      text: ' se dressa contre Israël et il incita David à faire le recensement d’Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Va dire à David : « Voici ce que déclare l’Eternel : Je te propose trois châtiments ; choisis l’un d’eux et je te l’infligerai. »'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Gad se rendit donc chez David et lui dit : Voici ce que déclare l’Eternel : Il te faut choisir '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: entre trois années de famine, ou trois mois de défaite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque, la Vulgate et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 24.13
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de fuite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de déroute.
      marker-yv: yv-n
    - type: text
      text: ' devant tes ennemis, pendant lesquels leur épée causera des ravages dans tes rangs, ou trois jours durant lesquels l’épée de l’Eternel frappera le pays de la peste et où l’ange de l’Eternel portera la destruction dans tout le territoire d’Israël. Réfléchis donc maintenant et dis-moi ce que je dois répondre à celui qui m’envoie.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David répondit à Gad : Je suis dans un grand désarroi ! Ah ! Que je tombe plutôt entre les mains de l’Eternel, car ses compassions sont immenses ; mais que je ne tombe pas entre les mains des hommes !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’Eternel fit donc sévir une épidémie de peste en Israël et soixante-dix mille Israélites moururent. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dieu envoya un ange à Jérusalem pour la ravager. Mais comme celui-ci ravageait la ville, l’Eternel regarda ; alors il ne voulut pas ce malheur et y renonça. Il ordonna à l’ange destructeur : Cela suffit maintenant ! Retire ta main !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’ange de l’Eternel se tenait alors près de l’aire d’Ornân le Yebousien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nom des anciens habitants de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'David leva les yeux et vit l’ange de l’Eternel qui se tenait entre la terre et le ciel, son épée dégainée à la main, brandie sur Jérusalem. Aussitôt David et les responsables, revêtus d’habits de toile de sac, tombèrent sur leur face. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'David pria Dieu en disant : C’est moi qui ai ordonné le recensement du peuple. C’est moi seul qui ai péché, c’est moi qui ai commis une faute très grave. Mais ce pauvre troupeau, qu’a-t-il fait de mal ? Eternel, mon Dieu, frappe-moi donc plutôt, ainsi que ma famille, mais que ce fléau ne s’abatte pas sur ton peuple !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un autel sur le futur emplacement du Temple
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L’ange de l’Eternel dit à Gad d’ordonner à David de monter à l’aire d’Ornân, le Yebousien, et d’y dresser un autel à l’Eternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'David s’y rendit comme l’Eternel le lui avait demandé par l’intermédiaire de Gad. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors David ordonna à Joab et aux chefs du peuple : Allez recenser les Israélites aptes au service militaire depuis Beer-Sheva jusqu’à Dan, puis revenez me faire votre rapport, que je sache quel en est le nombre.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ornân, qui était en train de battre du blé, s’était retourné et avait vu l’ange. Ses quatre fils qui étaient avec lui s’étaient cachés.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lorsque David arriva auprès de lui, Ornân leva les yeux et le vit ; il sortit de l’aire et se prosterna devant lui, le visage contre terre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'David dit à Ornân : Cède-moi l’emplacement de ton aire contre sa pleine valeur en argent pour que je puisse y bâtir un autel à l’Eternel ; oui, cède-le-moi afin que cesse le fléau qui sévit contre le peuple !'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ornân répondit à David : Prends mon terrain, et que mon seigneur le roi fasse ce qu’il jugera bon ! Regarde, je te donne aussi les bœufs pour les holocaustes, les herses fourniront le bois, et voici le blé pour l’offrande végétale ! Je te donne tout cela.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais le roi David lui déclara : Non ! Je veux te l’acheter et te payer sa pleine valeur en argent ; je n’apporterai pas à l’Eternel ce qui t’appartient pour lui offrir des holocaustes qui ne m’auront rien coûté.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et David donna à Ornân six cents pièces d’or pour l’achat de ce terrain. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il bâtit là un autel à l’Eternel et y offrit des holocaustes et des sacrifices de communion. Il invoqua l’Eternel, et l’Eternel lui répondit en faisant tomber le feu du ciel sur l’autel de l’holocauste.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Puis l’Eternel ordonna à l’ange de remettre son épée au fourreau.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dès cette époque-là, comme David avait vu que l’Eternel avait exaucé sa prière sur l’aire d’Ornân le Yebousien, il se mit à y offrir régulièrement des sacrifices. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Le tabernacle de l’Eternel que Moïse avait fabriqué au désert et l’autel des holocaustes se trouvaient à cette époque au haut lieu de Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1 R 3.4 ; 1 Ch 16.39.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Joab dit : Que l’Eternel rende son peuple cent fois plus nombreux ! O roi, mon seigneur, ne sont-ils pas tous aujourd’hui déjà des sujets de mon seigneur ? Pourquoi alors, mon seigneur ordonne-t-il pareille chose ? Pourquoi chargerait-il Israël d’une faute ?'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Or, David ne pouvait se résoudre à y aller pour s’adresser à Dieu, car il avait été terrifié par l’épée de l’ange de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 16.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais le roi maintint l’ordre donné à Joab. Joab se mit donc en route et parcourut tout Israël. Puis il regagna Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 24.5-8
        - type: text
          text: ' pour le détail de l’itinéraire de ce recensement qui dura neuf mois et vingt jours.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Joab communiqua à David le résultat du recensement du peuple apte au service militaire : l’ensemble d’Israël comptait 1 100 000 hommes aptes à porter les armes, et Juda 470 000. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Joab n’avait recensé ni les ressortissants de la tribu de Lévi ni ceux de Benjamin, tant l’ordre du roi lui répugnait.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Cet acte déplut à Dieu et il sévit contre Israël.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'David dit à Dieu : J’ai commis une grave faute en faisant cela ! Maintenant, daigne pardonner la faute de ton serviteur, car je reconnais que j’ai agi tout à fait comme un insensé !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’Eternel parla à Gad, le prophète attaché à la cour de David, en ces termes : '
