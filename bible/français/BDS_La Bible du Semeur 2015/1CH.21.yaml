document_id: 1CH.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le recensement et la punition
  - type: heading
    content: (2 S 24.1-25)
  - type: text
    content: Satan
  - type: note
    content: 'Autre traduction : un adversaire. Voir Jb 1.6 ; Za 3.1 et les notes.'
  - type: text
    content: ' se dressa contre Israël et il incita David à faire le recensement d’Israël. '
  '10':
  - type: text
    content: 'Va dire à David : « Voici ce que déclare l’Eternel : Je te propose trois châtiments ; choisis l’un d’eux et je te l’infligerai. »'
  '11':
  - type: text
    content: 'Gad se rendit donc chez David et lui dit : Voici ce que déclare l’Eternel : Il te faut choisir '
  '12':
  - type: text
    content: entre trois années de famine, ou trois mois de défaite
  - type: note
    content: 'L’ancienne version grecque, la Vulgate et 2 S 24.13 ont : de fuite ou de déroute.'
  - type: text
    content: ' devant tes ennemis, pendant lesquels leur épée causera des ravages dans tes rangs, ou trois jours durant lesquels l’épée de l’Eternel frappera le pays de la peste et où l’ange de l’Eternel portera la destruction dans tout le territoire d’Israël. Réfléchis donc maintenant et dis-moi ce que je dois répondre à celui qui m’envoie.'
  '13':
  - type: text
    content: 'David répondit à Gad : Je suis dans un grand désarroi ! Ah ! Que je tombe plutôt entre les mains de l’Eternel, car ses compassions sont immenses ; mais que je ne tombe pas entre les mains des hommes !'
  '14':
  - type: text
    content: 'L’Eternel fit donc sévir une épidémie de peste en Israël et soixante-dix mille Israélites moururent. '
  '15':
  - type: text
    content: 'Dieu envoya un ange à Jérusalem pour la ravager. Mais comme celui-ci ravageait la ville, l’Eternel regarda ; alors il ne voulut pas ce malheur et y renonça. Il ordonna à l’ange destructeur : Cela suffit maintenant ! Retire ta main !'
  - type: text
    content: L’ange de l’Eternel se tenait alors près de l’aire d’Ornân le Yebousien
  - type: note
    content: Nom des anciens habitants de Jérusalem.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'David leva les yeux et vit l’ange de l’Eternel qui se tenait entre la terre et le ciel, son épée dégainée à la main, brandie sur Jérusalem. Aussitôt David et les responsables, revêtus d’habits de toile de sac, tombèrent sur leur face. '
  '17':
  - type: text
    content: 'David pria Dieu en disant : C’est moi qui ai ordonné le recensement du peuple. C’est moi seul qui ai péché, c’est moi qui ai commis une faute très grave. Mais ce pauvre troupeau, qu’a-t-il fait de mal ? Eternel, mon Dieu, frappe-moi donc plutôt, ainsi que ma famille, mais que ce fléau ne s’abatte pas sur ton peuple !'
  - type: heading
    content: Un autel sur le futur emplacement du Temple
  '18':
  - type: text
    content: 'L’ange de l’Eternel dit à Gad d’ordonner à David de monter à l’aire d’Ornân, le Yebousien, et d’y dresser un autel à l’Eternel. '
  '19':
  - type: text
    content: 'David s’y rendit comme l’Eternel le lui avait demandé par l’intermédiaire de Gad. '
  '2':
  - type: text
    content: 'Alors David ordonna à Joab et aux chefs du peuple : Allez recenser les Israélites aptes au service militaire depuis Beer-Sheva jusqu’à Dan, puis revenez me faire votre rapport, que je sache quel en est le nombre.'
  '20':
  - type: text
    content: Ornân, qui était en train de battre du blé, s’était retourné et avait vu l’ange. Ses quatre fils qui étaient avec lui s’étaient cachés.
  '21':
  - type: text
    content: 'Lorsque David arriva auprès de lui, Ornân leva les yeux et le vit ; il sortit de l’aire et se prosterna devant lui, le visage contre terre. '
  '22':
  - type: text
    content: 'David dit à Ornân : Cède-moi l’emplacement de ton aire contre sa pleine valeur en argent pour que je puisse y bâtir un autel à l’Eternel ; oui, cède-le-moi afin que cesse le fléau qui sévit contre le peuple !'
  '23':
  - type: text
    content: 'Ornân répondit à David : Prends mon terrain, et que mon seigneur le roi fasse ce qu’il jugera bon ! Regarde, je te donne aussi les bœufs pour les holocaustes, les herses fourniront le bois, et voici le blé pour l’offrande végétale ! Je te donne tout cela.'
  '24':
  - type: text
    content: 'Mais le roi David lui déclara : Non ! Je veux te l’acheter et te payer sa pleine valeur en argent ; je n’apporterai pas à l’Eternel ce qui t’appartient pour lui offrir des holocaustes qui ne m’auront rien coûté.'
  '25':
  - type: text
    content: 'Et David donna à Ornân six cents pièces d’or pour l’achat de ce terrain. '
  '26':
  - type: text
    content: Il bâtit là un autel à l’Eternel et y offrit des holocaustes et des sacrifices de communion. Il invoqua l’Eternel, et l’Eternel lui répondit en faisant tomber le feu du ciel sur l’autel de l’holocauste.
  '27':
  - type: text
    content: Puis l’Eternel ordonna à l’ange de remettre son épée au fourreau.
  '28':
  - type: text
    content: 'Dès cette époque-là, comme David avait vu que l’Eternel avait exaucé sa prière sur l’aire d’Ornân le Yebousien, il se mit à y offrir régulièrement des sacrifices. '
  '29':
  - type: text
    content: Le tabernacle de l’Eternel que Moïse avait fabriqué au désert et l’autel des holocaustes se trouvaient à cette époque au haut lieu de Gabaon
  - type: note
    content: Cf. 1 R 3.4 ; 1 Ch 16.39.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Joab dit : Que l’Eternel rende son peuple cent fois plus nombreux ! O roi, mon seigneur, ne sont-ils pas tous aujourd’hui déjà des sujets de mon seigneur ? Pourquoi alors, mon seigneur ordonne-t-il pareille chose ? Pourquoi chargerait-il Israël d’une faute ?'
  '30':
  - type: text
    content: Or, David ne pouvait se résoudre à y aller pour s’adresser à Dieu, car il avait été terrifié par l’épée de l’ange de l’Eternel
  - type: note
    content: Voir v. 16.
  - type: text
    content: .
  '4':
  - type: text
    content: Mais le roi maintint l’ordre donné à Joab. Joab se mit donc en route et parcourut tout Israël. Puis il regagna Jérusalem
  - type: note
    content: Voir 2 S 24.5-8 pour le détail de l’itinéraire de ce recensement qui dura neuf mois et vingt jours.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Joab communiqua à David le résultat du recensement du peuple apte au service militaire : l’ensemble d’Israël comptait 1 100 000 hommes aptes à porter les armes, et Juda 470 000. '
  '6':
  - type: text
    content: Joab n’avait recensé ni les ressortissants de la tribu de Lévi ni ceux de Benjamin, tant l’ordre du roi lui répugnait.
  '7':
  - type: text
    content: Cet acte déplut à Dieu et il sévit contre Israël.
  '8':
  - type: text
    content: 'David dit à Dieu : J’ai commis une grave faute en faisant cela ! Maintenant, daigne pardonner la faute de ton serviteur, car je reconnais que j’ai agi tout à fait comme un insensé !'
  '9':
  - type: text
    content: 'L’Eternel parla à Gad, le prophète attaché à la cour de David, en ces termes : '
