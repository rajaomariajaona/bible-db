document_id: PSA.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Fais triompher notre Roi !
  - type: text
    content: Au chef de chœur. Cantique de David.
  '10':
  - type: text
    content: Eternel, sauve notre roi !
  - type: text
    content: Qu’il nous réponde ╵quand nous faisons appel à lui
  - type: note
    content: 'Qu’il nous réponde: l’ancienne version grecque a : Réponds-nous. Il faut alors traduire la suite : quand nous faisons appel à toi.'
  - type: text
    content: .
  '2':
  - type: text
    content: Que l’Eternel t’exauce ╵au jour de la détresse,
  - type: text
    content: et que le Dieu de Jacob te protège.
  '3':
  - type: text
    content: Que, de son sanctuaire, ╵il t’envoie du secours,
  - type: text
    content: et que, depuis Sion, ╵il te soutienne !
  '4':
  - type: text
    content: Qu’il tienne compte ╵de toutes tes offrandes,
  - type: text
    content: et que tes holocaustes ╵soient agréés par lui.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Qu’il daigne t’accorder ╵ce que ton cœur souhaite !
  - type: text
    content: Qu’il fasse s’accomplir ╵tout ce que tu projettes !
  '6':
  - type: text
    content: Pour fêter ta victoire, ╵nous crierons notre joie,
  - type: text
    content: déployant nos bannières ╵pour la gloire de notre Dieu.
  - type: text
    content: Que l’Eternel ╵exauce toutes tes requêtes !
  '7':
  - type: text
    content: Oui, je sais maintenant, ╵que l’Eternel sauve son roi ╵qui a reçu l’onction,
  - type: text
    content: il lui répond ╵de sa demeure sainte au ciel,
  - type: text
    content: en opérant sa délivrance ╵par l’action de sa force.
  '8':
  - type: text
    content: Aux uns, les chars de guerre, ╵aux autres, les chevaux.
  - type: text
    content: Pour notre part, ╵c’est sur l’Eternel, notre Dieu ╵que nous comptons.
  '9':
  - type: text
    content: Eux, ils fléchissent et ils tombent,
  - type: text
    content: nous, nous restons debout ╵et tenons fermement.
