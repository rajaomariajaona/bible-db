document_id: PSA.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fais triompher notre Roi !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Cantique de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, sauve notre roi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il nous réponde ╵quand nous faisons appel à lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu’il nous réponde
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Réponds-nous. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il faut alors traduire la suite : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand nous faisons appel à toi.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Eternel t’exauce ╵au jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que le Dieu de Jacob te protège.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que, de son sanctuaire, ╵il t’envoie du secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que, depuis Sion, ╵il te soutienne !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il tienne compte ╵de toutes tes offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes holocaustes ╵soient agréés par lui.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il daigne t’accorder ╵ce que ton cœur souhaite !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il fasse s’accomplir ╵tout ce que tu projettes !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour fêter ta victoire, ╵nous crierons notre joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déployant nos bannières ╵pour la gloire de notre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Eternel ╵exauce toutes tes requêtes !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je sais maintenant, ╵que l’Eternel sauve son roi ╵qui a reçu l’onction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lui répond ╵de sa demeure sainte au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en opérant sa délivrance ╵par l’action de sa force.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux uns, les chars de guerre, ╵aux autres, les chevaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour notre part, ╵c’est sur l’Eternel, notre Dieu ╵que nous comptons.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, ils fléchissent et ils tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous, nous restons debout ╵et tenons fermement.
