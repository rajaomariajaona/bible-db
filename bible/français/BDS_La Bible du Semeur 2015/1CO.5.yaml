document_id: 1CO.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Problèmes moraux dans l’Église
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un cas d’inceste
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On entend dire partout qu’il y a de l’immoralité parmi vous, et une immoralité telle qu’il ne s’en rencontre même pas chez les païens : l’un de vous vit avec la deuxième femme de son père'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette union avec sa belle-mère était interdite aussi bien par la Loi juive (Lv 18.8 ; Dt 23.1) que par le droit romain.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais je ne voulais évidemment pas dire par là qu’il faut éviter toute relation avec ceux qui, dans ce monde, mènent une vie sexuelle immorale, ou avec les avares, les voleurs ou les adorateurs d’idoles ; car alors il vous faudrait sortir du monde.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Non, je voulais simplement vous dire de ne pas entretenir de relations avec une personne qui, tout en se disant votre « frère » ou votre « sœur », vivrait dans l’immoralité sexuelle, ou serait avare, idolâtre, calomniateur, adonné à la boisson ou voleur. Avec des gens de cette sorte, il ne vous faut même pas prendre de repas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Est-ce à moi de juger ceux qui vivent en dehors de la famille de Dieu ? Certes non ! Mais c’est bien à vous de juger ceux qui font partie de votre communauté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux du dehors, Dieu les jugera. Mais vous, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: chassez le méchant du milieu de vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 17.7
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous vous en vantez encore ! Vous devriez au contraire en être vivement affligés et faire en sorte que l’auteur d’un tel acte soit exclu du milieu de vous. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour moi, qui suis absent de corps, mais présent en pensée parmi vous, j’ai déjà, comme si j’étais présent, prononcé la sentence au nom du Seigneur Jésus contre celui qui a commis cette faute. Lorsque vous serez réunis, et que je serai présent parmi vous en pensée, appliquez cette sentence dans la puissance de notre Seigneur Jésus : '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: qu’un tel homme soit livré à Satan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Formule d’excommunication en usage chez les Juifs. Elle implique en tout cas l’exclusion de l’Eglise. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Tm 1.20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' en vue de la destruction du mal qui est en lui afin qu’il soit sauvé au jour du Seigneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que son corps soit détruit afin que son esprit soit sauvé au jour du Seigneur.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ah ! vous n’avez vraiment pas de quoi vous vanter ! Ne savez-vous pas qu’« il suffit d’un peu de levain pour faire lever toute la pâte » ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faites donc disparaître tout « vieux levain » du milieu de vous afin que vous soyez comme « une pâte toute nouvelle », puisque, en fait, vous êtes « sans levain ». Car nous avons un agneau pascal qui a été sacrifié pour nous, Christ lui-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion aux différentes traditions de la Pâque juive : avant la fête, on faisait disparaître toute trace de levain (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 12.8
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: ) dans la maison, puis on sacrifiait un agneau et on mangeait des pains sans levain. Tous ces rites ont trouvé leur accomplissement en Christ.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi célébrons la fête de la Pâque, non plus avec le « vieux levain », le levain du mal et de la méchanceté, mais uniquement avec les pains sans levain de la pureté et de la vérité.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans ma dernière lettre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Une lettre qui ne nous est pas parvenue.
      marker-yv: yv-n
    - type: text
      text: ', je vous ai écrit de ne pas avoir de relations avec des personnes vivant dans l’immoralité sexuelle. '
