document_id: 1CO.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Problèmes moraux dans l’Église
  - type: heading
    content: Un cas d’inceste
  - type: text
    content: 'On entend dire partout qu’il y a de l’immoralité parmi vous, et une immoralité telle qu’il ne s’en rencontre même pas chez les païens : l’un de vous vit avec la deuxième femme de son père'
  - type: note
    content: Cette union avec sa belle-mère était interdite aussi bien par la Loi juive (Lv 18.8 ; Dt 23.1) que par le droit romain.
  - type: text
    content: '  !'
  '10':
  - type: text
    content: Mais je ne voulais évidemment pas dire par là qu’il faut éviter toute relation avec ceux qui, dans ce monde, mènent une vie sexuelle immorale, ou avec les avares, les voleurs ou les adorateurs d’idoles ; car alors il vous faudrait sortir du monde.
  '11':
  - type: text
    content: Non, je voulais simplement vous dire de ne pas entretenir de relations avec une personne qui, tout en se disant votre « frère » ou votre « sœur », vivrait dans l’immoralité sexuelle, ou serait avare, idolâtre, calomniateur, adonné à la boisson ou voleur. Avec des gens de cette sorte, il ne vous faut même pas prendre de repas.
  '12':
  - type: text
    content: 'Est-ce à moi de juger ceux qui vivent en dehors de la famille de Dieu ? Certes non ! Mais c’est bien à vous de juger ceux qui font partie de votre communauté. '
  '13':
  - type: text
    content: 'Ceux du dehors, Dieu les jugera. Mais vous, '
  - type: text
    content: chassez le méchant du milieu de vous
  - type: note
    content: Dt 17.7 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Et vous vous en vantez encore ! Vous devriez au contraire en être vivement affligés et faire en sorte que l’auteur d’un tel acte soit exclu du milieu de vous. '
  '3':
  - type: text
    content: 'Pour moi, qui suis absent de corps, mais présent en pensée parmi vous, j’ai déjà, comme si j’étais présent, prononcé la sentence au nom du Seigneur Jésus contre celui qui a commis cette faute. Lorsque vous serez réunis, et que je serai présent parmi vous en pensée, appliquez cette sentence dans la puissance de notre Seigneur Jésus : '
  '5':
  - type: text
    content: qu’un tel homme soit livré à Satan
  - type: note
    content: Formule d’excommunication en usage chez les Juifs. Elle implique en tout cas l’exclusion de l’Eglise. Voir 1 Tm 1.20.
  - type: text
    content: ' en vue de la destruction du mal qui est en lui afin qu’il soit sauvé au jour du Seigneur'
  - type: note
    content: 'Autre traduction : pour que son corps soit détruit afin que son esprit soit sauvé au jour du Seigneur.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Ah ! vous n’avez vraiment pas de quoi vous vanter ! Ne savez-vous pas qu’« il suffit d’un peu de levain pour faire lever toute la pâte » ? '
  '7':
  - type: text
    content: Faites donc disparaître tout « vieux levain » du milieu de vous afin que vous soyez comme « une pâte toute nouvelle », puisque, en fait, vous êtes « sans levain ». Car nous avons un agneau pascal qui a été sacrifié pour nous, Christ lui-même
  - type: note
    content: 'Allusion aux différentes traditions de la Pâque juive : avant la fête, on faisait disparaître toute trace de levain (voir Ex 12.8, 20) dans la maison, puis on sacrifiait un agneau et on mangeait des pains sans levain. Tous ces rites ont trouvé leur accomplissement en Christ.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: C’est pourquoi célébrons la fête de la Pâque, non plus avec le « vieux levain », le levain du mal et de la méchanceté, mais uniquement avec les pains sans levain de la pureté et de la vérité.
  '9':
  - type: text
    content: Dans ma dernière lettre
  - type: note
    content: Une lettre qui ne nous est pas parvenue.
  - type: text
    content: ', je vous ai écrit de ne pas avoir de relations avec des personnes vivant dans l’immoralité sexuelle. '
