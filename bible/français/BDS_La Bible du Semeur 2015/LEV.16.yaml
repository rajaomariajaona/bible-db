document_id: LEV.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le jour des Expiations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel parla à Moïse après la mort des deux fils d’Aaron qui périrent lorsqu’ils se présentèrent devant l’Eternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quant au bouc désigné par le sort comme bouc émissaire, on le présentera vivant devant l’Eternel, pour servir à l’expiation et pour être chassé comme bouc émissaire dans le désert.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aaron offrira pour lui-même le taureau du sacrifice pour le péché afin de faire l’expiation pour lui-même et pour sa famille. Il immolera le taureau de son sacrifice pour le péché. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Après cela, il prendra un plein encensoir de charbons ardents de l’autel, de devant l’Eternel, et deux pleines poignées de parfum à brûler réduit en poudre, et il emportera le tout au-delà du voile. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Là, il répandra le parfum sur le feu devant l’Eternel, de sorte que le nuage de fumée couvre le propitiatoire qui se trouve au-dessus de l’acte de l’alliance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire des deux tablettes des Dix Commandements (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Ainsi il ne mourra pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il prendra du sang du taureau et en fera aspersion avec son doigt sur le côté oriental du propitiatoire, puis il en fera sept fois aspersion devant le propitiatoire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il immolera le bouc du sacrifice pour le péché du peuple et en portera le sang au-delà du voile ; il procédera avec ce sang comme avec celui du taureau : il en fera des aspersions sur le propitiatoire et devant lui.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'C’est ainsi qu’il accomplira le rite d’expiation pour purifier le sanctuaire de l’impureté et des désobéissances des Israélites, de toutes leurs fautes quelle qu’en soit la nature. Il procédera de même pour la tente de la Rencontre, qui demeure avec eux, au milieu de leurs impuretés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Personne ne devra se trouver dans la tente de la Rencontre depuis le moment où il y entrera pour accomplir le rite d’expiation dans le sanctuaire jusqu’à ce qu’il en ressorte. Il accomplira ces rites d’expiation pour lui-même, pour sa famille et pour toute l’assemblée d’Israël.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Après cela, il sortira vers l’autel qui est devant l’Eternel et accomplira le rite d’expiation pour celui-ci ; il prendra du sang du taureau et du sang du bouc, et il en appliquera sur les cornes de l’autel tout autour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Puis, avec son doigt, il fera sept fois l’aspersion du sang sur l’autel. Il le purifiera ainsi des impuretés des Israélites et le consacrera.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il lui dit : Dis à ton frère Aaron de ne pas entrer à tout moment dans le sanctuaire au-delà du voile, devant le propitiatoire qui repose sur le coffre sacré afin qu’il ne meure pas ; car j’apparais'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: afin qu’il ne meure pas lorsque j’apparaîtrai.
      marker-yv: yv-n
    - type: text
      text: ' dans la nuée au-dessus du propitiatoire'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 2-3, allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 9.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Quand il aura achevé le rite d’expiation pour le sanctuaire, pour la tente de la Rencontre et pour l’autel, il fera amener le bouc vivant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il posera ses deux mains sur la tête du bouc vivant et confessera sur lui toutes les désobéissances, tous les péchés, toutes les fautes des Israélites ; ainsi il les fera passer sur la tête du bouc, puis il fera chasser celui-ci au désert par un homme désigné pour cela. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le bouc emportera sur lui tous leurs péchés dans un lieu à l’écart : on le chassera au désert.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Aaron retournera dans la tente de la Rencontre, il ôtera les vêtements de lin qu’il avait mis pour pénétrer dans le sanctuaire, et les déposera là. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il se lavera à l’eau dans un lieu saint, puis remettra ses vêtements sacerdotaux ordinaires, et il sortira pour offrir son holocauste ainsi que celui du peuple, afin d’accomplir le rite d’expiation pour lui et pour le peuple. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Il brûlera sur l’autel la graisse de la victime du sacrifice pour le péché.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L’homme qui aura chassé le bouc émissaire nettoiera ses vêtements, se lavera le corps à l’eau, et après cela, il pourra rentrer au camp. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Quant au taureau et au bouc offerts en sacrifice pour le péché et dont le sang aura été introduit dans le sanctuaire pour accomplir le rite d’expiation, on emportera leur peau, leur viande et leurs déchets à l’extérieur du camp pour les brûler. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Celui qui les aura brûlés nettoiera ses vêtements, se lavera le corps à l’eau, et après cela, il pourra rentrer au camp.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ceci sera pour vous une règle en vigueur à perpétuité. Le dixième jour du septième mois vous vous humilierez et vous ne ferez aucun travail ce jour-là – aussi bien les autochtones que les étrangers résidant au milieu de vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 29-34, voir Lv 23.26-32 ; Nb 29.7-11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici de quelle manière Aaron pourra pénétrer dans le sanctuaire : il prendra un jeune taureau pour le sacrifice pour le péché et un bélier pour l’holocauste. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Car en ce jour-là, on accomplira le rite d’expiation pour vous afin de vous purifier de toutes vos fautes ; ainsi vous serez purs devant l’Eternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ce sera pour vous un sabbat, un jour de repos complet, pendant lequel vous vous humilierez ; c’est là une institution pour toujours.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Le rite d’expiation sera accompli par le prêtre qui aura reçu l’onction et l’office sacerdotal à la place de son père. Il revêtira les vêtements de lin, les vêtements sacrés. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il accomplira le rite d’expiation pour le sanctuaire sacré, pour la tente de la Rencontre, le rite d’expiation pour l’autel, le rite d’expiation pour les prêtres et pour tout le peuple rassemblé.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'C’est pour vous une ordonnance en vigueur à perpétuité : une fois par an, on doit accomplir pour les Israélites le rite d’expiation de toutes leurs fautes.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: On fit tout ce que l’Eternel avait ordonné à Moïse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il se revêtira d’une tunique sainte en lin, il mettra sur lui des caleçons de lin, se ceindra d’une écharpe de lin et se coiffera d’un turban de lin. Il mettra ces vêtements sacrés après s’être lavé le corps dans l’eau. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’assemblée des Israélites lui fournira deux boucs pour le sacrifice pour le péché et un bélier pour l’holocauste.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Aaron offrira pour lui-même le taureau du sacrifice pour le péché, et il fera l’expiation pour lui et pour sa famille. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Puis il prendra les deux boucs et les placera devant l’Eternel à l’entrée de la tente de la Rencontre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il tirera au sort pour savoir lequel des deux sera destiné à être sacrifié à l’Eternel et lequel sera destiné à être un bouc émissaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bouc émissaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est la traduction adoptée par les versions grecques et latines pour un mot hébreu dont le sens nous est inconnu. Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un bouc pour Azazel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en identifiant Azazel à un démon hantant le désert ou à une personnification des esprits mauvais qui s’y trouvent (mais cette compréhension est exclue par '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.7'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il fera approcher le bouc que le sort aura attribué à l’Eternel, et l’offrira en sacrifice pour le péché. '
