document_id: 2CH.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’intervention d’un prophète empêche la guerre
  - type: text
    content: 'Lorsque Roboam fut de retour à Jérusalem, il mobilisa les hommes des tribus de Juda et de Benjamin, soit 180 000 soldats d’élite pour combattre les Israélites du Nord afin de ramener le royaume sous son autorité. '
  '10':
  - type: text
    content: 'Tsorea, Ayalôn et Hébron, villes fortes de Juda et de Benjamin. '
  '11':
  - type: text
    content: 'Il renforça leurs fortifications, y nomma des gouverneurs, et y fit entreposer des réserves de nourriture, d’huile et de vin. '
  '12':
  - type: text
    content: Dans chacune de ces villes se trouvait aussi un arsenal de grands boucliers et de lances. Il fortifia donc énormément ces localités ; et Juda et Benjamin lui furent acquis.
  - type: heading
    content: Le royaume de Juda est affermi
  '13':
  - type: text
    content: 'Les prêtres et les lévites qui étaient disséminés dans tout Israël se rallièrent à lui, de tout le pays. '
  '14':
  - type: text
    content: 'Les lévites abandonnèrent leurs pâturages rattachés à leurs villes et leurs propriétés et ils se rendirent en Juda et à Jérusalem, parce que Jéroboam et ses fils les avaient empêchés d’exercer leurs fonctions sacerdotales pour l’Eternel. '
  '15':
  - type: text
    content: Ce roi avait établi pour lui des prêtres pour les sanctuaires des hauts lieux où l’on adorait des idoles en forme de boucs et de veaux que le roi avait fait fabriquer
  - type: note
    content: Voir Lv 17.7.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'A leur suite, des membres de toutes les tribus d’Israël qui avaient à cœur de s’attacher à l’Eternel, le Dieu d’Israël, vinrent à Jérusalem pour offrir des sacrifices à l’Eternel, le Dieu de leurs ancêtres. '
  '17':
  - type: text
    content: Ils contribuèrent ainsi à affermir le royaume de Juda, et la puissance de Roboam, fils de Salomon. Cela dura trois ans, car pendant trois ans, on suivit l’exemple de David et Salomon.
  - type: heading
    content: La famille nombreuse de Roboam
  '18':
  - type: text
    content: 'Roboam prit pour femme Mahalath, fille de Yerimoth, fils de David et d’Abihaïl, fille d’Eliab, fils d’Isaï. '
  '19':
  - type: text
    content: 'Elle lui donna des fils : Yeoush, Shemaria et Zaham. '
  '2':
  - type: text
    content: 'Mais l’Eternel adressa le message suivant à Shemaya, homme de Dieu : '
  '20':
  - type: text
    content: Plus tard, il épousa encore Maaka, fille d’Absalom
  - type: note
    content: Probablement la petite-fille d’Absalom par sa fille Tamar (2 S 14.27 ; 18.18), mariée à Ouriel (2 Ch 13.2).
  - type: text
    content: ', dont il eut des enfants : Abiya, Attaï, Ziza et Shelomith. '
  '21':
  - type: text
    content: 'Roboam préférait Maaka, fille d’Absalom, à toutes ses autres épouses de premier ou de second rang. Il eut en tout dix-huit épouses de premier rang et soixante de second rang qui lui donnèrent vingt-huit fils et soixante filles. '
  '22':
  - type: text
    content: 'Roboam donna la prééminence à Abiya, fils de Maaka, et l’établit chef de ses frères, car il avait l’intention d’en faire son successeur au trône. '
  '23':
  - type: text
    content: 'Il agit avec habileté à l’égard de ses autres fils : il les dispersa dans tout le territoire de Juda et de Benjamin, dans toutes les villes fortifiées, il leur fournit des vivres en abondance et leur procura beaucoup de femmes.'
  '3':
  - type: text
    content: 'Parle à Roboam, fils de Salomon, roi de Juda, ainsi qu’à tous les Israélites de Juda et de Benjamin, pour leur dire : '
  '4':
  - type: text
    content: '« Voici ce que déclare l’Eternel : Ne partez pas en guerre contre vos compatriotes, et n’allez pas les combattre ! Que chacun de vous rentre chez soi, car c’est moi qui ai produit tout ce qui s’est passé. »'
  - type: text
    content: Ils obéirent à l’Eternel et s’en retournèrent, au lieu de faire la guerre à Jéroboam.
  - type: heading
    content: Les travaux de fortification de Roboam
  '5':
  - type: text
    content: Roboam s’installa donc à Jérusalem et fit des travaux dans les villes fortifiées en Juda
  - type: note
    content: Roboam fortifia les villes des frontières ouest, sud et est, mais pas au nord, peut-être dans l’espoir d’une réconciliation avec le royaume du Nord.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Il fortifia Bethléhem, Etam, Teqoa, '
  '7':
  - type: text
    content: 'Beth-Tsour, Soko, Adoullam, '
  '8':
  - type: text
    content: 'Gath, Marésha, Ziph, '
  '9':
  - type: text
    content: 'Adoraïm, Lakish, Azéqa, '
