document_id: 1SA.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David renvoyé à Tsiqlag par les princes des Philistins
  - type: text
    content: Les Philistins concentrèrent toutes leurs troupes à Apheq, tandis qu’Israël était campé près de la source de Jizréel
  - type: note
    content: Apheq se trouve dans les environs de Sunem (28.4), à distinguer de l’Apheq mentionné dans 4.1 (voir 1 R 20.26, 30 ; 2 R 13.17).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Maintenant, lève-toi de bon matin, toi et les serviteurs de ton maître, qui sont venus avec toi
  - type: note
    content: 'L’ancienne version grecque ajoute : retournez au lieu que je vous ai assigné et ne gardez pas de ressentiment, car je te tiens pour un homme juste.'
  - type: text
    content: . Levez-vous de bon matin dès qu’il fera clair et partez.
  '11':
  - type: text
    content: Le lendemain, David et ses hommes se levèrent de bonne heure pour se mettre en route et regagner la Philistie, tandis que les Philistins montèrent vers Jizréel.
  '2':
  - type: text
    content: 'Les cinq princes des Philistins défilèrent en tête de leurs unités, des « centaines » et des « milliers », et David et ses hommes formaient l’arrière-garde autour d’Akish. '
  '3':
  - type: text
    content: 'Les princes des Philistins demandèrent : Que font ici ces Hébreux ?'
  - type: text
    content: 'Akish leur répondit : Ne reconnaissez-vous pas David qui avait été au service de Saül, roi d’Israël, mais qui, depuis un an ou deux, est chez moi ? Depuis qu’il s’est rallié à nous, je n’ai jamais rien eu à lui reprocher.'
  '4':
  - type: text
    content: 'Mais les princes des Philistins se fâchèrent contre Akish et lui dirent : Renvoie cet homme dans la ville que tu lui as assignée. Il ne faut pas qu’il participe avec nous au combat, sinon il pourrait se retourner contre nous avec ses hommes en pleine bataille. N’est-ce pas au prix de la tête de nos gens qu’il pourrait regagner la faveur de son souverain ? '
  '5':
  - type: text
    content: 'N’oublions pas que c’est pour David que les femmes chantaient en dansant : « Saül a frappé ses milliers, et David ses dizaines de milliers'
  - type: note
    content: Voir 18.7 ; 21.12.
  - type: text
    content: . »
  '6':
  - type: text
    content: 'Finalement, Akish appela David et lui dit : Aussi vrai que l’Eternel est vivant, tu es un homme juste et j’aurais aimé que tu prennes part avec moi à cette expédition militaire, car je n’ai jamais rien eu à te reprocher, depuis que tu es venu chez moi jusqu’à ce jour ; mais tu n’es pas bien vu des autres princes philistins. '
  '7':
  - type: text
    content: Maintenant donc, repars en paix chez toi, pour ne pas les indisposer.
  '8':
  - type: text
    content: 'David lui dit : Mais qu’ai-je donc fait pour que je ne puisse pas aller combattre les ennemis de mon seigneur le roi ? Qu’as-tu trouvé à reprocher à ton serviteur depuis le jour où je me suis mis à ton service jusqu’à maintenant ?'
  '9':
  - type: text
    content: 'Akish répondit à David : Je le sais bien, car je t’ai apprécié comme un ange de Dieu ; seulement, les princes des Philistins m’ont dit : « Il ne participera pas à la bataille avec nous » ! '
