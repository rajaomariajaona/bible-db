document_id: 1SA.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David renvoyé à Tsiqlag par les princes des Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les Philistins concentrèrent toutes leurs troupes à Apheq, tandis qu’Israël était campé près de la source de Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Apheq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se trouve dans les environs de Sunem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28.4'
        metadata:
          usfm: 1SA.28.4
      - type: text
        text: '), à distinguer de l’Apheq mentionné dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.1'
        metadata:
          usfm: 1SA.4.1
      - type: text
        text: ' (voir 1 R 20.26, 30 ; 2 R 13.17).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les cinq princes des Philistins défilèrent en tête de leurs unités, des « centaines » et des « milliers », et David et ses hommes formaient l’arrière-garde autour d’Akish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les princes des Philistins demandèrent : Que font ici ces Hébreux ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Akish leur répondit : Ne reconnaissez-vous pas David qui avait été au service de Saül, roi d’Israël, mais qui, depuis un an ou deux, est chez moi ? Depuis qu’il s’est rallié à nous, je n’ai jamais rien eu à lui reprocher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais les princes des Philistins se fâchèrent contre Akish et lui dirent : Renvoie cet homme dans la ville que tu lui as assignée. Il ne faut pas qu’il participe avec nous au combat, sinon il pourrait se retourner contre nous avec ses hommes en pleine bataille. N’est-ce pas au prix de la tête de nos gens qu’il pourrait regagner la faveur de son souverain ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'N’oublions pas que c’est pour David que les femmes chantaient en dansant : « Saül a frappé ses milliers, et David ses dizaines de milliers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 18.7 ; 21.12.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Finalement, Akish appela David et lui dit : Aussi vrai que l’Eternel est vivant, tu es un homme juste et j’aurais aimé que tu prennes part avec moi à cette expédition militaire, car je n’ai jamais rien eu à te reprocher, depuis que tu es venu chez moi jusqu’à ce jour ; mais tu n’es pas bien vu des autres princes philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maintenant donc, repars en paix chez toi, pour ne pas les indisposer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David lui dit : Mais qu’ai-je donc fait pour que je ne puisse pas aller combattre les ennemis de mon seigneur le roi ? Qu’as-tu trouvé à reprocher à ton serviteur depuis le jour où je me suis mis à ton service jusqu’à maintenant ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Akish répondit à David : Je le sais bien, car je t’ai apprécié comme un ange de Dieu ; seulement, les princes des Philistins m’ont dit : « Il ne participera pas à la bataille avec nous » ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant, lève-toi de bon matin, toi et les serviteurs de ton maître, qui sont venus avec toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque ajoute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: retournez au lieu que je vous ai assigné et ne gardez pas de ressentiment, car je te tiens pour un homme juste.
    marker-yv: yv-n
  - type: text
    text: . Levez-vous de bon matin dès qu’il fera clair et partez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lendemain, David et ses hommes se levèrent de bonne heure pour se mettre en route et regagner la Philistie, tandis que les Philistins montèrent vers Jizréel.
