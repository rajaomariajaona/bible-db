document_id: PSA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Grandeur de Dieu et de l’homme
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un psaume de David, (à chanter avec accompagnement) de la harpe de Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens incertain. On pense qu’il s’agit soit d’une harpe de Gath, la ville de Philistie, soit d’un chant de vendange et de pressoir (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 81.1
        metadata:
          usfm: PSA.81.1
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '84.1'
        metadata:
          usfm: PSA.84.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, notre Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ta gloire est admirable ╵sur la terre tout entière !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au-dessus du ciel, ╵on célèbre ta splendeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hébreu obscur.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: De la bouche des petits enfants ╵et des nourrissons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais jaillir la louange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après les versions anciennes ; cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21.16
        metadata:
          usfm: MAT.21.16
      - type: text
        text: ', qui cite ce texte sous cette même forme. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu as fondé ta force.
    marker-yv: yv-n
  - type: text
    text: ' ╵à l’encontre de tes adversaires,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour imposer le silence ╵à l’ennemi plein de hargne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand je contemple le ciel ╵que tes doigts ont façonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les étoiles et la lune ╵que tes mains ont disposées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'je me dis : Qu’est-ce que l’homme, ╵pour que tu en prennes soin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’est-ce qu’un être humain ╵pour qu’à lui tu t’intéresses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 144.3 ; Jb 7.17-18. Les v. 5-7 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2.6-8
        metadata:
          usfm: HEB.2.6+HEB.2.7+HEB.2.8
      - type: text
        text: '  ; le v. 7 en 1 Co 15.27 ; Ep 1.22.'
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pourtant, tu l’as fait ╵de peu inférieur à Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: inférieur aux êtres célestes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu l’as couronné ╵de gloire et d’honneur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu lui donnes de régner ╵sur les œuvres de tes mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as tout mis sous ses pieds :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: tout bétail, gros ou petit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les animaux sauvages,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: tous les oiseaux dans les airs ╵et les poissons de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les êtres qui parcourent ╵les sentiers des mers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eternel, notre Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ta gloire est admirable ╵sur la terre tout entière.
