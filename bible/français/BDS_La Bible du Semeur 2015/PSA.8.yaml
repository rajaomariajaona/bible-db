document_id: PSA.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Grandeur de Dieu et de l’homme
  - type: text
    content: Au chef de chœur. Un psaume de David, (à chanter avec accompagnement) de la harpe de Gath
  - type: note
    content: Sens incertain. On pense qu’il s’agit soit d’une harpe de Gath, la ville de Philistie, soit d’un chant de vendange et de pressoir (voir Ps 81.1 et 84.1).
  - type: text
    content: .
  '10':
  - type: text
    content: Eternel, notre Seigneur,
  - type: text
    content: que ta gloire est admirable ╵sur la terre tout entière.
  '2':
  - type: text
    content: Eternel, notre Seigneur,
  - type: text
    content: que ta gloire est admirable ╵sur la terre tout entière !
  - type: text
    content: Au-dessus du ciel, ╵on célèbre ta splendeur
  - type: note
    content: Hébreu obscur.
  - type: text
    content: .
  '3':
  - type: text
    content: De la bouche des petits enfants ╵et des nourrissons,
  - type: text
    content: tu fais jaillir la louange
  - type: note
    content: 'D’après les versions anciennes ; cf. Mt 21.16, qui cite ce texte sous cette même forme. Texte hébreu traditionnel : tu as fondé ta force.'
  - type: text
    content: ' ╵à l’encontre de tes adversaires,'
  - type: text
    content: pour imposer le silence ╵à l’ennemi plein de hargne.
  '4':
  - type: text
    content: Quand je contemple le ciel ╵que tes doigts ont façonné,
  - type: text
    content: les étoiles et la lune ╵que tes mains ont disposées,
  '5':
  - type: text
    content: 'je me dis : Qu’est-ce que l’homme, ╵pour que tu en prennes soin,'
  - type: text
    content: et qu’est-ce qu’un être humain ╵pour qu’à lui tu t’intéresses
  - type: note
    content: Voir 144.3 ; Jb 7.17-18. Les v. 5-7 sont cités en Hé 2.6-8  ; le v. 7 en 1 Co 15.27 ; Ep 1.22.
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: Pourtant, tu l’as fait ╵de peu inférieur à Dieu
  - type: note
    content: 'Autre traduction : inférieur aux êtres célestes.'
  - type: text
    content: ','
  - type: text
    content: tu l’as couronné ╵de gloire et d’honneur.
  '7':
  - type: text
    content: Tu lui donnes de régner ╵sur les œuvres de tes mains.
  - type: text
    content: 'Tu as tout mis sous ses pieds :'
  '8':
  - type: text
    content: tout bétail, gros ou petit,
  - type: text
    content: et les animaux sauvages,
  '9':
  - type: text
    content: tous les oiseaux dans les airs ╵et les poissons de la mer,
  - type: text
    content: tous les êtres qui parcourent ╵les sentiers des mers.
