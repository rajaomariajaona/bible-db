document_id: LEV.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le premier culte de sacrifices
  - type: text
    content: Le huitième jour
  - type: note
    content: Voir 8.33-35. Les huit jours forment une seule et même cérémonie. Ce dernier jour est le couronnement de la consécration sacerdotale, puisque Aaron et ses fils vont exercer pour la première fois leurs fonctions en offrant les quatre principaux sacrifices (le sacrifice de réparation destiné à réparer des torts n’était pas nécessaire).
  - type: text
    content: ', Moïse appela Aaron et ses fils et les responsables d’Israël. '
  '10':
  - type: text
    content: 'Il brûla sur l’autel la graisse, les rognons et le dessus du foie de l’animal offert en sacrifice pour le péché, comme l’Eternel l’avait ordonné à Moïse. '
  '11':
  - type: text
    content: Il brûla sa viande et sa peau à l’extérieur du camp.
  '12':
  - type: text
    content: 'Puis il immola l’holocauste. Ses fils lui présentèrent le sang, et il en aspergea tous les côtés de l’autel. '
  '13':
  - type: text
    content: 'Ils lui remirent aussi l’holocauste découpé en quartiers, avec la tête. Il les brûla sur l’autel. '
  '14':
  - type: text
    content: Il lava les entrailles et les pattes, et les fit brûler avec l’holocauste sur l’autel.
  '15':
  - type: text
    content: 'Après cela, il présenta les offrandes du peuple. Il prit le bouc du sacrifice pour le péché du peuple ; il l’immola et l’offrit pour expier le péché, comme il avait fait pour la première victime. '
  '16':
  - type: text
    content: 'Il offrit l’holocauste en se conformant aux règles. '
  '17':
  - type: text
    content: 'Il y joignit l’offrande : il en prit une pleine poignée qu’il fit brûler sur l’autel, en plus de l’holocauste du matin. '
  '18':
  - type: text
    content: 'Il immola le taureau et le bélier en sacrifice de communion pour le peuple. Ses fils lui présentèrent le sang dont il aspergea l’autel sur tous ses côtés. '
  '19':
  - type: text
    content: 'Ils lui remirent aussi les parties grasses du taureau et du bélier, la queue, la graisse qui recouvre les entrailles, les rognons et le dessus du foie. '
  '2':
  - type: text
    content: 'Il dit à Aaron : Prends un jeune veau pour le sacrifice pour le péché et un bélier pour l’holocauste, tous deux sans défaut. Tu les offriras devant l’Eternel. '
  '20':
  - type: text
    content: 'Ils posèrent les graisses sur les poitrines des deux animaux, et Aaron brûla les graisses sur l’autel. '
  '21':
  - type: text
    content: Il fit avec les poitrines et le gigot droit le geste de présentation devant l’Eternel, comme Moïse l’avait ordonné.
  '22':
  - type: text
    content: Puis Aaron leva ses mains vers le peuple et le bénit ; il redescendit de l’autel après avoir offert le sacrifice pour le péché, l’holocauste et le sacrifice de communion.
  '23':
  - type: text
    content: 'Moïse et Aaron entrèrent dans la tente de la Rencontre, puis ils ressortirent et bénirent le peuple. Alors la gloire de l’Eternel apparut à tout le peuple. '
  '24':
  - type: text
    content: Une flamme jaillit devant l’Eternel et consuma l’holocauste et les graisses sur l’autel. A cette vue, tout le peuple poussa des cris de joie et se jeta face contre terre.
  '3':
  - type: text
    content: 'Puis tu diras aux Israélites : « Prenez un bouc destiné au sacrifice pour le péché, un veau et un agneau sans défaut, dans sa première année, pour l’holocauste, '
  '4':
  - type: text
    content: un taureau et un bélier qui seront immolés devant l’Eternel en sacrifice de communion accompagnés d’offrande de farine pétrie à l’huile ; car aujourd’hui l’Eternel vous apparaîtra. »
  '5':
  - type: text
    content: 'Ils amenèrent devant la tente de la Rencontre tout ce que Moïse avait demandé. Toute la communauté s’approcha et se tint debout devant l’Eternel. '
  '6':
  - type: text
    content: 'Moïse dit : Voici ce que l’Eternel vous ordonne ; faites-le, et la gloire de l’Eternel vous apparaîtra.'
  '7':
  - type: text
    content: 'S’adressant à Aaron, il poursuivit : Approche-toi de l’autel ; offre ton sacrifice pour le péché et ton holocauste, tu accompliras ainsi le rite d’expiation pour toi et pour le peuple ; offre aussi les sacrifices et les offrandes du peuple et accomplis le rite d’expiation pour lui, comme l’Eternel l’a ordonné'
  - type: note
    content: Voir Hé 5.1-3 ; 7.27.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Aaron s’approcha de l’autel et il égorgea le veau de son sacrifice pour le péché. '
  '9':
  - type: text
    content: 'Ses fils lui présentèrent le sang de l’animal ; il y trempa son doigt et en appliqua sur les cornes de l’autel, puis il répandit le reste sur le socle de l’autel. '
