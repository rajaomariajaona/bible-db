document_id: EZK.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Parabole du bois de vigne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils d’homme, en quoi le bois des ceps de vigne serait-il supérieur à tous les autres bois ? Le sarment vaudrait-il mieux que les autres arbres poussant dans la forêt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur Israël comparé à une vigne, voir Es 5.1-7 ; 27.2-5 ; Os 10.1 ; Ez 17.6-8 ; 19.10-14 ; Mt 21.33-46.
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prendra-t-on de ce bois pour en fabriquer un objet ? En fera-t-on une cheville pour suspendre un objet ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, il n’est bon qu’à être mis au feu pour être consumé. Quand le feu brûle les deux bouts, et que le milieu est en flammes, peut-il servir à quelque chose ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il était intact, on ne pouvait déjà en faire aucun ouvrage, combien moins maintenant qu’il est tout consumé et brûlé par le feu, en fabriquerait-on quelque chose ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Comme je mets le feu aux sarments de la vigne afin qu’il les consume, de préférence au bois de tous les autres arbres, je vais livrer au feu ceux qui habitent la ville de Jérusalem. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais intervenir contre eux : ils sont sortis d’un feu pour entrer dans un autre qui les consumera, et vous reconnaîtrez que je suis l’Eternel lorsque je m’en prendrai à eux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De leur pays, je ferai un désert à cause de leurs rébellions. C’est là ce que déclare le Seigneur, l’Eternel.
