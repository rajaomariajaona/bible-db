document_id: EZK.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole du bois de vigne
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '2':
  - type: text
    content: Fils d’homme, en quoi le bois des ceps de vigne serait-il supérieur à tous les autres bois ? Le sarment vaudrait-il mieux que les autres arbres poussant dans la forêt
  - type: note
    content: Sur Israël comparé à une vigne, voir Es 5.1-7 ; 27.2-5 ; Os 10.1 ; Ez 17.6-8 ; 19.10-14 ; Mt 21.33-46.
  - type: text
    content: '  ? '
  '3':
  - type: text
    content: 'Prendra-t-on de ce bois pour en fabriquer un objet ? En fera-t-on une cheville pour suspendre un objet ? '
  '4':
  - type: text
    content: 'Non, il n’est bon qu’à être mis au feu pour être consumé. Quand le feu brûle les deux bouts, et que le milieu est en flammes, peut-il servir à quelque chose ? '
  '5':
  - type: text
    content: 'Lorsqu’il était intact, on ne pouvait déjà en faire aucun ouvrage, combien moins maintenant qu’il est tout consumé et brûlé par le feu, en fabriquerait-on quelque chose ! '
  '6':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Comme je mets le feu aux sarments de la vigne afin qu’il les consume, de préférence au bois de tous les autres arbres, je vais livrer au feu ceux qui habitent la ville de Jérusalem. '
  '7':
  - type: text
    content: 'Je vais intervenir contre eux : ils sont sortis d’un feu pour entrer dans un autre qui les consumera, et vous reconnaîtrez que je suis l’Eternel lorsque je m’en prendrai à eux. '
  '8':
  - type: text
    content: De leur pays, je ferai un désert à cause de leurs rébellions. C’est là ce que déclare le Seigneur, l’Eternel.
