document_id: PSA.112,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bonheur des fidèlesPsaume alphabétique (cf. note 9.1) qui répond au Ps 111.
  - type: text
    content: Louez l’Eternel
  - type: note
    content: Voir 111.1.
  - type: text
    content: '  !'
  - type: text
    content: Heureux est l’homme qui craint l’Eternel
  - type: text
    content: et trouve un grand plaisir ╵à ses commandements !
  '10':
  - type: text
    content: Le méchant le constate ╵et s’en irrite,
  - type: text
    content: grince des dents ╵et se démoralise.
  - type: text
    content: Le désir des méchants ╵n’aboutira à rien.
  '2':
  - type: text
    content: Sa postérité sera forte ╵dans le pays
  - type: text
    content: et la génération du juste ╵sera bénie.
  '3':
  - type: text
    content: Abondance et richesse ╵règnent dans sa maison,
  - type: text
    content: et sa conduite juste ╵sera pour toujours prise en compte
  - type: note
    content: En hébreu, la formulation est identique à celle de Ps 111.3b, mais le contexte implique un sens différent.
  - type: text
    content: .
  '4':
  - type: text
    content: Une lumière luit ╵dans les ténèbres, ╵pour les gens droits,
  - type: text
    content: ceux qui font grâce, ╵qui sont compatissants et justes
  - type: note
    content: Voir 111.4.
  - type: text
    content: .
  '5':
  - type: text
    content: Il est bon qu’un homme ait de l’empathie ╵et qu’il prête à autrui,
  - type: text
    content: et qu’avec équité, ╵il gère ses affaires ;
  '6':
  - type: text
    content: ainsi ne trébuchera-t-il jamais,
  - type: text
    content: et l’on se souviendra ╵du juste pour toujours.
  '7':
  - type: text
    content: Il ne craint pas ╵de mauvaises nouvelles,
  - type: text
    content: il a le cœur tranquille, ╵confiant en l’Eternel.
  '8':
  - type: text
    content: Plein d’assurance, ╵il est sans crainte,
  - type: text
    content: dans l’attente de voir ╵le sort réservé à ses ennemis.
  '9':
  - type: text
    content: Il donne aux pauvres ╵avec largesse,
  - type: text
    content: et sa conduite juste ╵sera pour toujours prise en compte
  - type: note
    content: Voir note v. 3. Cité en 2 Co 9.9 d’après l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: Il peut garder la tête haute ╵et il est honoré.
