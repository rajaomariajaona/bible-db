document_id: LEV.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chandelier et les pains exposés devant l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ordonne aux Israélites de t’apporter pour le chandelier de l’huile raffinée d’olives concassées pour alimenter en permanence les lampes du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aaron disposera ces lampes devant le voile qui cache le coffre de l’acte de l’alliance, dans la tente de la Rencontre, pour qu’elles brûlent continuellement du soir au matin devant l’Eternel. C’est une loi en vigueur à perpétuité pour toutes les générations. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il disposera les lampes sur le chandelier d’or pur pour qu’elles brûlent en permanence devant moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 2-4, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 27.20-21
        metadata:
          usfm: EXO.27.20+EXO.27.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu prendras de la fleur de farine et tu feras cuire douze pains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.30
        metadata:
          usfm: EXO.25.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de six kilogrammes chacun. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu les disposeras en deux rangées de six pains sur la table d’or pur devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu saupoudreras chaque rangée d’encens pur qui sera ensuite brûlé à la place des pains comme un mets consumé pour l’Eternel et qui servira de mémorial.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chaque sabbat, on disposera ces pains devant l’Eternel pour qu’il y en ait toujours. C’est une alliance qui lie pour toujours les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ces pains reviendront à Aaron et à ses fils qui les mangeront dans un lieu saint, car c’est une chose très sainte, prélevée sur les offrandes de l’Eternel consumées par le feu. C’est une ordonnance en vigueur à perpétuité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les peines pour divers crimes
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Châtiment d’un blasphémateur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le fils d’une femme israélite et d’un père égyptien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Des étrangers s’étaient joints aux Israélites lors de l’Exode (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.38
        metadata:
          usfm: EXO.12.38
      - type: text
        text: ) et exerçaient une mauvaise influence sur eux (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 11.4
        metadata:
          usfm: NUM.11.4
      - type: text
        text: ). Cet épisode introduit une nouvelle série de prescriptions applicable aussi aux étrangers.
    marker-yv: yv-n
  - type: text
    text: ' s’avança parmi les Israélites et se disputa dans le camp avec un Israélite. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le fils de la femme israélite blasphéma et maudit le Nom par excellence. Alors on l’amena devant Moïse. Sa mère s’appelait Shelomith, elle était la fille de Dibri, de la tribu de Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On le mit sous bonne garde en attendant que l’Eternel leur communique sa décision.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fais sortir le blasphémateur hors du camp, tous ceux qui l’ont entendu poseront leurs mains sur sa tête ; ensuite, toute l’assemblée le lapidera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu diras aux Israélites : Quiconque maudira son Dieu portera la responsabilité de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui blasphème le nom de l’Eternel sera puni de mort ; toute la communauté le lapidera ; qu’il soit immigré ou autochtone, il sera mis à mort pour avoir blasphémé le Nom par excellence.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Œil pour œil, dent pour dent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui frappe à mort tout être humain sera puni de mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 9.6 ; Ex 21.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'S’il fait périr un animal d’autrui, il le remplacera selon le principe : une vie pour une vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si quelqu’un cause une infirmité à son prochain, on agira à son égard comme il a agi lui-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 19-20, voir Ex 21.23-25 ; Dt 19.12. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.38
        metadata:
          usfm: MAT.5.38
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fracture pour fracture, œil pour œil, dent pour dent ; on lui infligera la même infirmité que celle qu’il a causée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Donc, celui qui frappe à mort un animal le remplacera, et celui qui tue un homme sera puni de mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous appliquerez le même jugement à tous, immigrés comme autochtones, car je suis l’Eternel, votre Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 15.15-16
        metadata:
          usfm: NUM.15.15+NUM.15.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Exécution du châtiment du blasphémateur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moïse dit aux Israélites de faire sortir le blasphémateur du camp ; ils le lapidèrent, appliquant ainsi l’ordre que l’Eternel avait donné à Moïse.
