document_id: GEN.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rêves du pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Deux années entières passèrent. Puis le pharaon fit un rêve : il se tenait au bord du Nil '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et vit sortir du fleuve sept vaches belles et bien grasses, qui se mirent à paître dans les roseaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis, après elles, sept autres vaches sortirent du fleuve, elles étaient laides et décharnées. Elles vinrent se placer à côté des premières vaches, au bord du fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et voilà que les sept vaches laides et décharnées dévorèrent les sept vaches belles et grasses. Alors le pharaon se réveilla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il se rendormit et fit un second rêve : Sept épis poussaient sur une seule tige, des épis pleins et beaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis sept épis maigres et desséchés par le vent d’orient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chaud et sec, qui flétrit toute végétation.
    marker-yv: yv-n
  - type: text
    text: ' poussèrent après eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les épis maigres engloutirent les sept épis pleins et beaux. Alors le pharaon se réveilla et se rendit compte qu’il avait rêvé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au matin, inquiet, il fit convoquer tous les magiciens et les sages d’Egypte et leur raconta ses rêves, mais aucun d’eux ne put les lui interpréter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le chef des échansons prit la parole et dit au pharaon : Je vais évoquer aujourd’hui le souvenir de ma faute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le pharaon s’était emporté contre ses serviteurs et m’avait fait mettre aux arrêts avec le chef des panetiers dans la maison du commandant des gardes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Une nuit, nous avons fait tous deux un rêve ayant sa signification propre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, il y avait là avec nous un jeune homme hébreu, un esclave du commandant des gardes ; nous lui avons raconté nos deux rêves et il a donné l’interprétation de chacun d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Par la suite, les choses se sont passées conformément à l’interprétation qu’il nous avait donnée : moi j’ai été rétabli dans mes fonctions, et le panetier a été pendu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors le pharaon envoya chercher Joseph et, sur-le-champ, on courut le faire sortir du cachot ; on le rasa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Egyptiens se rasaient les cheveux et la barbe.
    marker-yv: yv-n
  - type: text
    text: ', on le fit changer d’habits et on l’introduisit auprès du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Celui-ci dit à Joseph : J’ai fait un rêve et personne n’est capable de l’interpréter. Or, j’ai entendu dire qu’il te suffit d’entendre raconter un rêve pour pouvoir l’interpréter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph répondit au pharaon : Ce n’est pas moi, c’est Dieu qui donnera au pharaon l’explication qui convient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le pharaon dit alors à Joseph : Dans mon rêve, je me tenais debout sur le bord du Nil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Sept vaches grasses et belles sortirent du fleuve et se mirent à paître dans les roseaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis sept autres vaches surgirent derrière elles, maigres, laides et décharnées ; elles étaient si misérables que je n’en ai jamais vu de pareilles dans tout le pays d’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ces vaches décharnées et laides dévorèrent les sept vaches grasses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'qui furent englouties dans leur ventre sans que l’on remarque qu’elles avaient été avalées : les vaches maigres restaient aussi misérables qu’auparavant. Là-dessus je me suis réveillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis j’ai fait un autre rêve : Je voyais sept épis pleins et beaux pousser sur une même tige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis sept épis secs, maigres et desséchés par le vent d’orient poussèrent après eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les épis maigres engloutirent les sept beaux épis. J’ai raconté tout cela aux magiciens, mais aucun d’eux n’a pu me l’expliquer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Joseph dit au pharaon : Ce que le pharaon a rêvé constitue un seul et même rêve. Dieu a révélé au pharaon ce qu’il va faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les sept belles vaches représentent sept années, tout comme les sept beaux épis ; c’est un seul et même songe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les sept vaches décharnées et laides qui ont surgi derrière les premières représentent aussi sept années, et les sept épis maigres, desséchés par le vent d’orient, seront sept années de famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Comme je l’ai dit au pharaon : Dieu a révélé au pharaon ce qu’il va faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il y aura d’abord sept années de grande abondance dans toute l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Elles seront suivies de sept années de famine qui feront oublier toute cette abondance en Egypte, tant la famine épuisera le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le souvenir même de l’abondance dont le pays aura joui s’effacera à cause de cette famine, car elle sévira très durement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si le rêve du pharaon s’est répété par deux fois, c’est que Dieu a irrévocablement décidé la chose et qu’il va l’exécuter sans délai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Maintenant donc, que le pharaon choisisse sans tarder un homme avisé et sage et qu’il le mette à la tête du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Que le pharaon agisse ainsi : Qu’il nomme dans tout le pays des commissaires qui prélèveront le cinquième de toutes les récoltes d’Egypte durant les sept années d’abondance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ils collecteront tous les vivres que produiront ces bonnes années qui viennent, ils emmagasineront le blé dans les villes sous l’autorité du pharaon, et le garderont comme réserve de vivres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ces provisions serviront de réserve pour le pays, en prévision des sept années de famine qui s’abattront sur l’Egypte. Ainsi les habitants du pays ne mourront pas de faim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph à la tête de l’Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Cette proposition plut au pharaon et à tous ses hauts fonctionnaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors le pharaon leur dit : Trouverions-nous un homme aussi compétent que celui-ci en qui habite l’Esprit de Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des dieux.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le pharaon dit à Joseph : Puisque Dieu t’a fait connaître toutes ces choses, il n’y a personne qui soit aussi avisé et aussi sage que toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tu seras donc à la tête de mon royaume, et tout mon peuple se pliera à tes ordres. Moi-même je ne serai au-dessus de toi que par le trône
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.10
        metadata:
          usfm: ACT.7.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ainsi, lui dit-il, je te mets à la tête de toute l’Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Et le pharaon retira son anneau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Portant le cachet royal.
    marker-yv: yv-n
  - type: text
    text: ' de sa main et le passa au doigt de Joseph ; il le fit revêtir d’habits de fin lin et lui suspendit un collier d’or au cou'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Insignes et instruments de l’autorité : l’anneau servait à « signer » les documents (on les cachetait avec, ce qui leur conférait autorité).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il le fit monter sur son deuxième char et, sur son parcours, on cria : A genoux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: laissez passer !
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est ainsi qu’il le mit à la tête de toute l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Le pharaon dit encore à Joseph : Je suis le pharaon. Mais sans ton ordre, personne dans tout le pays ne lèvera le petit doigt ni ne se déplacera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Le pharaon nomma Joseph Tsaphnat-Paenéah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom dont le sens est incertain mais qui contient le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vie.
    marker-yv: yv-n
  - type: text
    text: ' et lui donna pour femme Asnath, fille de Poti-Phéra, un prêtre d’On'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville que les Grecs appelaient Héliopolis, à environ 10 kilomètres au nord du Caire. Les prêtres formaient la caste suprême de la noblesse en Egypte.
    marker-yv: yv-n
  - type: text
    text: '. Joseph partit inspecter l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Il était âgé de trente ans quand il entra au service du pharaon, roi d’Egypte. Il quitta la cour du pharaon et parcourut tout le pays d’Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Pendant les sept années d’abondance, la terre produisit de riches moissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Joseph rassembla tous les vivres possibles en Egypte pendant ces sept années, et il les entreposa dans les villes. Dans chaque ville, il mit en réserve les denrées alimentaires produites par le territoire environnant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Il entreposa du blé en aussi grande quantité que le sable de la mer ; il y en avait tant que l’on cessa d’en faire le compte, car cela dépassait toute mesure.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Avant la période de famine, Asnath, fille de Poti-Phéra, prêtre d’On, donna deux fils à Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il appela son premier-né Manassé (Celui qui fait oublier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Manassé fait assonance avec le verbe hébreu '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: oublier.
    marker-yv: yv-n
  - type: text
    text: '), car, dit-il, Dieu m’a fait oublier toutes mes souffrances et ma séparation de la famille de mon père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il donna au second le nom d’Ephraïm (Fécond), car Dieu, dit-il, m’a rendu fécond dans le pays où j’ai connu l’affliction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La famine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les sept années où l’abondance avait régné en Egypte touchèrent à leur terme '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: et les sept années de famine commencèrent, comme Joseph l’avait prédit. La famine sévissait dans tous les pays. Mais il y avait du pain dans toute l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.11
        metadata:
          usfm: ACT.7.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Quand la population de l’Egypte n’eut plus de pain, elle en réclama à grands cris au pharaon, qui dit à tous les Egyptiens : Adressez-vous à Joseph et faites ce qu’il vous dira !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'La famine sévissait dans toute la contrée. Joseph ouvrit tous les entrepôts du pays et vendit du blé aux Egyptiens. Mais la disette s’aggrava encore en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: De tous les pays, on venait acheter du blé auprès de Joseph, car la famine était grande sur toute la terre.
