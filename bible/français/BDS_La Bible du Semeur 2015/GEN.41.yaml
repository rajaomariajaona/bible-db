document_id: GEN.41,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rêves du pharaon
  - type: text
    content: 'Deux années entières passèrent. Puis le pharaon fit un rêve : il se tenait au bord du Nil '
  '10':
  - type: text
    content: 'Le pharaon s’était emporté contre ses serviteurs et m’avait fait mettre aux arrêts avec le chef des panetiers dans la maison du commandant des gardes. '
  '11':
  - type: text
    content: 'Une nuit, nous avons fait tous deux un rêve ayant sa signification propre. '
  '12':
  - type: text
    content: 'Or, il y avait là avec nous un jeune homme hébreu, un esclave du commandant des gardes ; nous lui avons raconté nos deux rêves et il a donné l’interprétation de chacun d’eux. '
  '13':
  - type: text
    content: 'Par la suite, les choses se sont passées conformément à l’interprétation qu’il nous avait donnée : moi j’ai été rétabli dans mes fonctions, et le panetier a été pendu.'
  '14':
  - type: text
    content: Alors le pharaon envoya chercher Joseph et, sur-le-champ, on courut le faire sortir du cachot ; on le rasa
  - type: note
    content: Les Egyptiens se rasaient les cheveux et la barbe.
  - type: text
    content: ', on le fit changer d’habits et on l’introduisit auprès du pharaon. '
  '15':
  - type: text
    content: 'Celui-ci dit à Joseph : J’ai fait un rêve et personne n’est capable de l’interpréter. Or, j’ai entendu dire qu’il te suffit d’entendre raconter un rêve pour pouvoir l’interpréter.'
  '16':
  - type: text
    content: 'Joseph répondit au pharaon : Ce n’est pas moi, c’est Dieu qui donnera au pharaon l’explication qui convient.'
  '17':
  - type: text
    content: 'Le pharaon dit alors à Joseph : Dans mon rêve, je me tenais debout sur le bord du Nil. '
  '18':
  - type: text
    content: 'Sept vaches grasses et belles sortirent du fleuve et se mirent à paître dans les roseaux. '
  '19':
  - type: text
    content: 'Puis sept autres vaches surgirent derrière elles, maigres, laides et décharnées ; elles étaient si misérables que je n’en ai jamais vu de pareilles dans tout le pays d’Egypte. '
  '2':
  - type: text
    content: 'et vit sortir du fleuve sept vaches belles et bien grasses, qui se mirent à paître dans les roseaux. '
  '20':
  - type: text
    content: 'Ces vaches décharnées et laides dévorèrent les sept vaches grasses, '
  '21':
  - type: text
    content: 'qui furent englouties dans leur ventre sans que l’on remarque qu’elles avaient été avalées : les vaches maigres restaient aussi misérables qu’auparavant. Là-dessus je me suis réveillé. '
  '22':
  - type: text
    content: 'Puis j’ai fait un autre rêve : Je voyais sept épis pleins et beaux pousser sur une même tige. '
  '23':
  - type: text
    content: 'Puis sept épis secs, maigres et desséchés par le vent d’orient poussèrent après eux. '
  '24':
  - type: text
    content: Les épis maigres engloutirent les sept beaux épis. J’ai raconté tout cela aux magiciens, mais aucun d’eux n’a pu me l’expliquer.
  '25':
  - type: text
    content: 'Joseph dit au pharaon : Ce que le pharaon a rêvé constitue un seul et même rêve. Dieu a révélé au pharaon ce qu’il va faire. '
  '26':
  - type: text
    content: 'Les sept belles vaches représentent sept années, tout comme les sept beaux épis ; c’est un seul et même songe. '
  '27':
  - type: text
    content: 'Les sept vaches décharnées et laides qui ont surgi derrière les premières représentent aussi sept années, et les sept épis maigres, desséchés par le vent d’orient, seront sept années de famine. '
  '28':
  - type: text
    content: 'Comme je l’ai dit au pharaon : Dieu a révélé au pharaon ce qu’il va faire. '
  '29':
  - type: text
    content: 'Il y aura d’abord sept années de grande abondance dans toute l’Egypte. '
  '3':
  - type: text
    content: 'Puis, après elles, sept autres vaches sortirent du fleuve, elles étaient laides et décharnées. Elles vinrent se placer à côté des premières vaches, au bord du fleuve. '
  '30':
  - type: text
    content: 'Elles seront suivies de sept années de famine qui feront oublier toute cette abondance en Egypte, tant la famine épuisera le pays. '
  '31':
  - type: text
    content: 'Le souvenir même de l’abondance dont le pays aura joui s’effacera à cause de cette famine, car elle sévira très durement. '
  '32':
  - type: text
    content: Si le rêve du pharaon s’est répété par deux fois, c’est que Dieu a irrévocablement décidé la chose et qu’il va l’exécuter sans délai.
  '33':
  - type: text
    content: 'Maintenant donc, que le pharaon choisisse sans tarder un homme avisé et sage et qu’il le mette à la tête du pays. '
  '34':
  - type: text
    content: 'Que le pharaon agisse ainsi : Qu’il nomme dans tout le pays des commissaires qui prélèveront le cinquième de toutes les récoltes d’Egypte durant les sept années d’abondance. '
  '35':
  - type: text
    content: 'Ils collecteront tous les vivres que produiront ces bonnes années qui viennent, ils emmagasineront le blé dans les villes sous l’autorité du pharaon, et le garderont comme réserve de vivres. '
  '36':
  - type: text
    content: Ces provisions serviront de réserve pour le pays, en prévision des sept années de famine qui s’abattront sur l’Egypte. Ainsi les habitants du pays ne mourront pas de faim.
  - type: heading
    content: Joseph à la tête de l’Egypte
  '37':
  - type: text
    content: 'Cette proposition plut au pharaon et à tous ses hauts fonctionnaires. '
  '38':
  - type: text
    content: 'Alors le pharaon leur dit : Trouverions-nous un homme aussi compétent que celui-ci en qui habite l’Esprit de Dieu'
  - type: note
    content: 'D’autres traduisent : des dieux.'
  - type: text
    content: '  ?'
  '39':
  - type: text
    content: 'Le pharaon dit à Joseph : Puisque Dieu t’a fait connaître toutes ces choses, il n’y a personne qui soit aussi avisé et aussi sage que toi. '
  '4':
  - type: text
    content: 'Et voilà que les sept vaches laides et décharnées dévorèrent les sept vaches belles et grasses. Alors le pharaon se réveilla. '
  '40':
  - type: text
    content: Tu seras donc à la tête de mon royaume, et tout mon peuple se pliera à tes ordres. Moi-même je ne serai au-dessus de toi que par le trône
  - type: note
    content: Voir Ac 7.10.
  - type: text
    content: '. '
  '41':
  - type: text
    content: Ainsi, lui dit-il, je te mets à la tête de toute l’Egypte.
  '42':
  - type: text
    content: Et le pharaon retira son anneau
  - type: note
    content: Portant le cachet royal.
  - type: text
    content: ' de sa main et le passa au doigt de Joseph ; il le fit revêtir d’habits de fin lin et lui suspendit un collier d’or au cou'
  - type: note
    content: 'Insignes et instruments de l’autorité : l’anneau servait à « signer » les documents (on les cachetait avec, ce qui leur conférait autorité).'
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Il le fit monter sur son deuxième char et, sur son parcours, on cria : A genoux'
  - type: note
    content: 'Autre traduction : laissez passer !'
  - type: text
    content: '  !'
  - type: text
    content: 'C’est ainsi qu’il le mit à la tête de toute l’Egypte. '
  '44':
  - type: text
    content: 'Le pharaon dit encore à Joseph : Je suis le pharaon. Mais sans ton ordre, personne dans tout le pays ne lèvera le petit doigt ni ne se déplacera.'
  '45':
  - type: text
    content: Le pharaon nomma Joseph Tsaphnat-Paenéah
  - type: note
    content: Nom dont le sens est incertain mais qui contient le terme vie.
  - type: text
    content: ' et lui donna pour femme Asnath, fille de Poti-Phéra, un prêtre d’On'
  - type: note
    content: Ville que les Grecs appelaient Héliopolis, à environ 10 kilomètres au nord du Caire. Les prêtres formaient la caste suprême de la noblesse en Egypte.
  - type: text
    content: '. Joseph partit inspecter l’Egypte. '
  '46':
  - type: text
    content: Il était âgé de trente ans quand il entra au service du pharaon, roi d’Egypte. Il quitta la cour du pharaon et parcourut tout le pays d’Egypte.
  '47':
  - type: text
    content: 'Pendant les sept années d’abondance, la terre produisit de riches moissons. '
  '48':
  - type: text
    content: 'Joseph rassembla tous les vivres possibles en Egypte pendant ces sept années, et il les entreposa dans les villes. Dans chaque ville, il mit en réserve les denrées alimentaires produites par le territoire environnant. '
  '49':
  - type: text
    content: Il entreposa du blé en aussi grande quantité que le sable de la mer ; il y en avait tant que l’on cessa d’en faire le compte, car cela dépassait toute mesure.
  - type: heading
    content: Les fils de Joseph
  '5':
  - type: text
    content: 'Puis il se rendormit et fit un second rêve : Sept épis poussaient sur une seule tige, des épis pleins et beaux. '
  '50':
  - type: text
    content: 'Avant la période de famine, Asnath, fille de Poti-Phéra, prêtre d’On, donna deux fils à Joseph. '
  '51':
  - type: text
    content: Il appela son premier-né Manassé (Celui qui fait oublier
  - type: note
    content: Manassé fait assonance avec le verbe hébreu oublier.
  - type: text
    content: '), car, dit-il, Dieu m’a fait oublier toutes mes souffrances et ma séparation de la famille de mon père. '
  '52':
  - type: text
    content: Il donna au second le nom d’Ephraïm (Fécond), car Dieu, dit-il, m’a rendu fécond dans le pays où j’ai connu l’affliction.
  - type: heading
    content: La famine
  '53':
  - type: text
    content: 'Les sept années où l’abondance avait régné en Egypte touchèrent à leur terme '
  '54':
  - type: text
    content: et les sept années de famine commencèrent, comme Joseph l’avait prédit. La famine sévissait dans tous les pays. Mais il y avait du pain dans toute l’Egypte
  - type: note
    content: Voir Ac 7.11.
  - type: text
    content: '. '
  '55':
  - type: text
    content: 'Quand la population de l’Egypte n’eut plus de pain, elle en réclama à grands cris au pharaon, qui dit à tous les Egyptiens : Adressez-vous à Joseph et faites ce qu’il vous dira !'
  '56':
  - type: text
    content: 'La famine sévissait dans toute la contrée. Joseph ouvrit tous les entrepôts du pays et vendit du blé aux Egyptiens. Mais la disette s’aggrava encore en Egypte. '
  '57':
  - type: text
    content: De tous les pays, on venait acheter du blé auprès de Joseph, car la famine était grande sur toute la terre.
  '6':
  - type: text
    content: Puis sept épis maigres et desséchés par le vent d’orient
  - type: note
    content: Chaud et sec, qui flétrit toute végétation.
  - type: text
    content: ' poussèrent après eux. '
  '7':
  - type: text
    content: Les épis maigres engloutirent les sept épis pleins et beaux. Alors le pharaon se réveilla et se rendit compte qu’il avait rêvé.
  '8':
  - type: text
    content: 'Au matin, inquiet, il fit convoquer tous les magiciens et les sages d’Egypte et leur raconta ses rêves, mais aucun d’eux ne put les lui interpréter. '
  '9':
  - type: text
    content: 'Alors le chef des échansons prit la parole et dit au pharaon : Je vais évoquer aujourd’hui le souvenir de ma faute. '
