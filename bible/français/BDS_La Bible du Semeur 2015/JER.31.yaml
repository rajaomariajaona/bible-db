document_id: JER.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand Retour
  - type: text
    content: En ce temps-là, l’Eternel le déclare, moi je serai le Dieu de toutes les familles d’Israël, et ces familles seront mon peuple.
  '10':
  - type: text
    content: Et vous les autres peuples ╵écoutez donc ╵ce que dit l’Eternel
  - type: text
    content: et faites-le connaître ╵dans les îles lointaines ╵et les régions côtières.
  - type: text
    content: Dites que l’Eternel ╵qui disperse Israël ╵viendra le rassembler,
  - type: text
    content: il veillera sur lui ╵comme un berger sur son troupeau,
  '11':
  - type: text
    content: parce que l’Eternel ╵délivrera Jacob,
  - type: text
    content: et le libérera ╵d’un ennemi plus fort que lui.
  '12':
  - type: text
    content: Les voici qui reviennent ╵avec des cris de joie ╵sur la colline de Sion ;
  - type: text
    content: 'ils affluent vers les biens ╵que l’Eternel a préparés pour eux :'
  - type: text
    content: le blé, le vin nouveau et l’huile,
  - type: text
    content: les moutons et les bœufs.
  - type: text
    content: Leur vie sera ╵comme un jardin bien arrosé,
  - type: text
    content: et ils n’auront plus de chagrins.
  '13':
  - type: text
    content: Alors les jeunes filles ╵danseront dans la joie,
  - type: text
    content: de même que les jeunes gens ╵et les vieillards.
  - type: text
    content: Et je transformerai ╵leur deuil en allégresse,
  - type: text
    content: je les consolerai ╵de leurs chagrins,
  - type: text
    content: oui, je les réjouirai.
  '14':
  - type: text
    content: Je comblerai les prêtres ╵de la graisse des viandes.
  - type: text
    content: Mon peuple se rassasiera ╵des biens que je lui offrirai,
  - type: text
    content: l’Eternel le déclare.
  '15':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: On entend à Rama ╵une voix qui gémit
  - type: text
    content: 'et des sanglots amers :'
  - type: text
    content: Rachel pleure ses fils
  - type: text
    content: et elle ne veut pas ╵se laisser consoler,
  - type: text
    content: car ses fils ne sont plus
  - type: note
    content: Cité en Mt 2.18.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Ne pleure plus,
  - type: text
    content: ne verse plus de larmes,
  - type: text
    content: voici que ton labeur ╵aura sa récompense
  - type: note
    content: 'C’est-à-dire : tu n’auras pas mis au monde et élevé des enfants en vain.'
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: et tes fils reviendront ╵du pays ennemi.
  '17':
  - type: text
    content: Il y a pour tes descendants ╵une espérance,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Tes enfants reviendront ╵dans leur pays.
  '18':
  - type: text
    content: J’ai très bien entendu ╵Ephraïm qui gémit,
  - type: text
    content: 'qui dit : « Tu m’as châtié, ╵et j’ai été châtié'
  - type: text
    content: comme un veau indompté.
  - type: text
    content: Mais fais-moi revenir à toi, ╵afin que je revienne.
  - type: text
    content: Car tu es l’Eternel, mon Dieu.
  '19':
  - type: text
    content: Je m’étais détourné, ╵mais à présent, je le regrette.
  - type: text
    content: Maintenant éclairé,
  - type: text
    content: plein de remords, je me frappe les cuisses,
  - type: text
    content: je suis confus, j’ai honte,
  - type: text
    content: car je porte le déshonneur ╵de tout ce que j’ai fait ╵dans ma jeunesse. »
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Le peuple qui a échappé ╵au tranchant de l’épée
  - type: text
    content: obtiendra ma faveur ╵dans le désert.
  - type: text
    content: Je viens faire jouir ╵Israël du repos
  - type: note
    content: 'je viens faire jouir Israël du repos. Autre traduction : et marchera vers le lieu où il vivra en paix.'
  - type: text
    content: .
  '20':
  - type: text
    content: Ephraïm est pour moi ╵un fils que je chéris,
  - type: text
    content: et un enfant que j’affectionne.
  - type: text
    content: Chaque fois que j’en parle,
  - type: text
    content: je me souviens encore ╵plus vivement de lui.
  - type: text
    content: Ainsi mon cœur est en émoi
  - type: text
    content: et j’ai pour lui ╵beaucoup de compassion,
  - type: text
    content: l’Eternel le déclare.
  '21':
  - type: text
    content: Dresse-toi des signaux, ╵balise ton parcours,
  - type: text
    content: fais bien attention au sentier
  - type: text
    content: et au chemin que tu empruntes.
  - type: text
    content: Reviens, ô communauté d’Israël,
  - type: text
    content: oui, reviens dans tes villes !
  '22':
  - type: text
    content: Jusques à quand ╵vas-tu errer dans tous les sens,
  - type: text
    content: fille rebelle ?
  - type: text
    content: 'L’Eternel va créer ╵du nouveau sur la terre :'
  - type: text
    content: maintenant, c’est la femme ╵qui entourera l’homme
  - type: note
    content: 'Il s’agit d’Israël, qui erre dans tous les sens, rebelle à l’Eternel. La fin du verset fait allusion à la vie sexuelle : c’est normalement l’homme qui recherche la femme. Mais l’œuvre divine transformera les dispositions des Israélites, de sorte que la femme, représentant Israël, recherchera l’homme, représentant Dieu. En hébreu, les mots rendus par rebelle et entourera font assonance.'
  - type: text
    content: .
  - type: heading
    content: Reconstruction
  '23':
  - type: text
    content: 'Voilà ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Quand je restaurerai le pays de Juda avec toutes ses villes, alors on y dira à nouveau : « Que l’Eternel te bénisse, demeure de justice, montagne sainte ! » '
  '24':
  - type: text
    content: 'Et les populations du pays de Juda et de toutes ses villes y habiteront toutes ensemble ; les laboureurs et ceux qui mènent les troupeaux s’y installeront, eux aussi. '
  '25':
  - type: text
    content: Je désaltérerai ceux qui sont épuisés, je comblerai ceux qui sont languissants.
  '26':
  - type: text
    content: Puis je me suis réveillé et j’ai ouvert les yeux. Mon sommeil m’avait été agréable.
  '27':
  - type: text
    content: 'Or le temps va venir, l’Eternel le déclare, où j’ensemencerai les royaumes d’Israël et de Juda d’hommes et d’animaux. '
  '28':
  - type: text
    content: Et, comme j’ai veillé sur eux pour les déraciner et pour les renverser, pour les ruiner et les détruire et pour leur faire du mal, je veillerai sur eux pour construire et pour planter, l’Eternel le déclare
  - type: note
    content: Voir 1.10 ; 24.6 ; 42.10 ; 45.4.
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'En ce temps-là, on ne dira plus ce proverbe : « Les pères ont mangé des raisins verts mais ce sont les dents des enfants qui en sont agacées'
  - type: note
    content: Voir Ez 18.2.
  - type: text
    content: '. » '
  '3':
  - type: text
    content: Dès les temps reculés, ╵l’Eternel lui est apparu
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : m’est apparu.'
  - type: text
    content: 'et lui a dit : ╵D’un amour éternel, je t’aime,'
  - type: text
    content: c’est pourquoi je t’attire ╵par l’affection que je te porte
  - type: note
    content: 'Autre traduction : je maintiens ma bienveillance envers toi.'
  - type: text
    content: .
  '30':
  - type: text
    content: Mais chacun périra pour son propre péché. C’est celui qui mangera des raisins verts qui en aura les dents agacées.
  - type: heading
    content: La nouvelle alliance
  '31':
  - type: text
    content: Mais des jours viennent,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: où moi, je conclurai ╵avec le peuple d’Israël
  - type: text
    content: et celui de Juda
  - type: note
    content: Les v. 31-34 sont cités en Hé 8.8-12 ; 10.15-17.
  - type: text
    content: une alliance nouvelle
  - type: note
    content: Voir Lc 22.20 ; 1 Co 11.25 ; 2 Co 3.6.
  - type: text
    content: .
  '32':
  - type: text
    content: Elle ne sera pas ╵comme celle que j’ai conclue ╵avec leurs pères
  - type: text
    content: quand je les ai pris par la main
  - type: text
    content: pour les faire sortir d’Egypte,
  - type: text
    content: car cette alliance-là, ╵ils l’ont rompue,
  - type: text
    content: alors que moi j’étais ╵leur suzerain,
  - type: text
    content: l’Eternel le déclare.
  '33':
  - type: text
    content: Mais voici quelle alliance
  - type: text
    content: je conclurai ╵avec le peuple d’Israël, ╵après ces jours,
  - type: text
    content: 'déclare l’Eternel :'
  - type: text
    content: je placerai ma Loi ╵au plus profond d’eux-mêmes,
  - type: text
    content: je la graverai sur leur cœur ;
  - type: text
    content: moi, je serai leur Dieu,
  - type: text
    content: eux, ils seront mon peuple.
  '34':
  - type: text
    content: Ils n’auront plus besoin ╵de s’enseigner l’un l’autre,
  - type: text
    content: 'en répétant chacun ╵à son compagnon ou son frère :'
  - type: text
    content: « Il faut que tu connaisses l’Eternel ! »
  - type: text
    content: Car tous me connaîtront,
  - type: text
    content: des plus petits jusqu’aux plus grands,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: car je pardonnerai leurs fautes,
  - type: text
    content: je ne tiendrai plus compte ╵de leur péché.
  - type: heading
    content: Une alliance éternelle
  '35':
  - type: text
    content: Voici ce que déclare l’Eternel
  - type: text
    content: qui fait paraître le soleil ╵pour éclairer le jour
  - type: text
    content: et qui a établi ╵les lois qui règlent ╵la course de la lune ╵et des étoiles ╵pour éclairer la nuit,
  - type: text
    content: qui agite la mer ╵et fait mugir ses flots,
  - type: text
    content: 'et qui a pour nom l’Eternel, ╵le Seigneur des armées célestes :'
  '36':
  - type: text
    content: Il faudrait que ces lois ╵soient supprimées par-devant moi,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: pour que la descendance d’Israël
  - type: text
    content: cesse aussi pour toujours ╵d’être une nation devant moi.
  '37':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Si l’on peut mesurer ╵le ciel là-haut
  - type: text
    content: ou si l’on peut sonder ╵les fondements ╵de la terre ici-bas,
  - type: text
    content: moi, je rejetterai ╵toute la descendance d’Israël
  - type: text
    content: pour tout ce qu’ils ont fait,
  - type: text
    content: l’Eternel le déclare.
  '38':
  - type: text
    content: 'Mais des jours vont venir, l’Eternel le déclare, où cette ville sera de nouveau rebâtie pour l’Eternel, depuis la tour d’Hananéel jusqu’à la porte de l’Angle. '
  '39':
  - type: text
    content: On étendra encore le cordeau d’arpentage en ligne droite jusqu’à la colline de Gareb, puis on tournera vers Goath
  - type: note
    content: Localités inconnues. Le sens général de ce passage est que la nouvelle cité sera plus vaste que l’ancienne et qu’elle inclura des endroits considérés comme impurs au temps de Jérémie.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Je te rebâtirai, ╵alors tu seras rebâtie,
  - type: text
    content: ô communauté d’Israël.
  - type: text
    content: Tu porteras encore ╵tes tambourins
  - type: text
    content: et tu t’avanceras ╵au milieu de la danse
  - type: text
    content: des gens en liesse.
  '40':
  - type: text
    content: 'Et toute la vallée où l’on jette les cadavres et les cendres grasses, et tous les terrains jusqu’au torrent du Cédron, jusqu’à l’angle où se trouve la Porte des Chevaux, du côté de l’orient : tout ce domaine sera saint pour l’Eternel, et il ne sera plus jamais arraché ni détruit.'
  '5':
  - type: text
    content: Oui, de nouveau, ╵tu planteras des vignes
  - type: text
    content: sur les coteaux de Samarie
  - type: note
    content: Conquise en 722-721 av. J.-C. par l’Assyrie (2 R 17.24).
  - type: text
    content: '  ;'
  - type: text
    content: ceux qui les planteront ╵en cueilleront les fruits.
  '6':
  - type: text
    content: Car, il viendra le jour
  - type: text
    content: 'où les gardes crieront ╵sur les monts d’Ephraïm :'
  - type: text
    content: « Allons et montons à Sion
  - type: note
    content: Contrairement à ce qui se passait depuis Jéroboam Ier, qui avait amené les Israélites du Nord à adorer Dieu à Béthel et à Dan (1 R 12.26-33).
  - type: text
    content: vers l’Eternel, lui, notre Dieu. »
  '7':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: Poussez des cris de joie ╵en l’honneur de Jacob,
  - type: text
    content: éclatez d’allégresse ╵pour celui qui a la prééminence ╵parmi les peuples !
  - type: text
    content: Clamez fort vos louanges
  - type: text
    content: 'en disant : « L’Eternel ╵a délivré son peuple,'
  - type: text
    content: tous ceux qui restent d’Israël ! »
  '8':
  - type: text
    content: Je les ramènerai ╵de la contrée du nord,
  - type: text
    content: je les rassemblerai ╵des confins de la terre ;
  - type: text
    content: 'et il y aura parmi eux : ╵l’aveugle et le boiteux,'
  - type: text
    content: la femme encore enceinte ╵et celle qui enfante ;
  - type: text
    content: c’est une foule immense ╵qui reviendra ici.
  '9':
  - type: text
    content: Ils reviendront en pleurs
  - type: text
    content: je les ramènerai ╵alors qu’ils seront suppliants
  - type: note
    content: 'alors qu’ils seront suppliants: l’ancienne version grecque a traduit : en les consolant, ce qui suppose l’inversion de deux lettres par rapport au texte hébreu traditionnel.'
  - type: text
    content: et je les conduirai ╵vers les cours d’eau
  - type: text
    content: par un chemin bien aplani ╵où ils ne trébucheront pas.
  - type: text
    content: Car je serai un père ╵pour Israël,
  - type: text
    content: et Ephraïm sera ╵mon premier-né
  - type: note
    content: Voir 2.27 ; 3.4.
  - type: text
    content: .
