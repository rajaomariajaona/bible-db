document_id: JER.31
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le grand Retour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: En ce temps-là, l’Eternel le déclare, moi je serai le Dieu de toutes les familles d’Israël, et ces familles seront mon peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple qui a échappé ╵au tranchant de l’épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: obtiendra ma faveur ╵dans le désert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viens faire jouir ╵Israël du repos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.2 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je viens faire jouir Israël du repos. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et marchera vers le lieu où il vivra en paix.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dès les temps reculés, ╵l’Eternel lui est apparu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: m’est apparu.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et lui a dit : ╵D’un amour éternel, je t’aime,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi je t’attire ╵par l’affection que je te porte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je maintiens ma bienveillance envers toi.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je te rebâtirai, ╵alors tu seras rebâtie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô communauté d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu porteras encore ╵tes tambourins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu t’avanceras ╵au milieu de la danse
- type: usfm
  marker: q1
  children:
  - type: text
    text: des gens en liesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, de nouveau, ╵tu planteras des vignes
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les coteaux de Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Conquise en 722-721 av. J.-C. par l’Assyrie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17.24
        metadata:
          usfm: 2KI.17.24
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui les planteront ╵en cueilleront les fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car, il viendra le jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'où les gardes crieront ╵sur les monts d’Ephraïm :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Allons et montons à Sion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Contrairement à ce qui se passait depuis Jéroboam I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ', qui avait amené les Israélites du Nord à adorer Dieu à Béthel et à Dan ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.26-33
        metadata:
          usfm: 1KI.12.26+1KI.12.27+1KI.12.28+1KI.12.29+1KI.12.30+1KI.12.31+1KI.12.32+1KI.12.33
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers l’Eternel, lui, notre Dieu. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car voici ce que l’Eternel déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie ╵en l’honneur de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: éclatez d’allégresse ╵pour celui qui a la prééminence ╵parmi les peuples !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clamez fort vos louanges
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en disant : « L’Eternel ╵a délivré son peuple,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui restent d’Israël ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je les ramènerai ╵de la contrée du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les rassemblerai ╵des confins de la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il y aura parmi eux : ╵l’aveugle et le boiteux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la femme encore enceinte ╵et celle qui enfante ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est une foule immense ╵qui reviendra ici.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils reviendront en pleurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ramènerai ╵alors qu’ils seront suppliants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: alors qu’ils seront suppliants
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'l’ancienne version grecque a traduit : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en les consolant, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ce qui suppose l’inversion de deux lettres par rapport au texte hébreu traditionnel.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les conduirai ╵vers les cours d’eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: par un chemin bien aplani ╵où ils ne trébucheront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je serai un père ╵pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Ephraïm sera ╵mon premier-né
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2.27 ; 3.4.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et vous les autres peuples ╵écoutez donc ╵ce que dit l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faites-le connaître ╵dans les îles lointaines ╵et les régions côtières.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites que l’Eternel ╵qui disperse Israël ╵viendra le rassembler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il veillera sur lui ╵comme un berger sur son troupeau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: parce que l’Eternel ╵délivrera Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le libérera ╵d’un ennemi plus fort que lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les voici qui reviennent ╵avec des cris de joie ╵sur la colline de Sion ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils affluent vers les biens ╵que l’Eternel a préparés pour eux :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le blé, le vin nouveau et l’huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les moutons et les bœufs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur vie sera ╵comme un jardin bien arrosé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils n’auront plus de chagrins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors les jeunes filles ╵danseront dans la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même que les jeunes gens ╵et les vieillards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je transformerai ╵leur deuil en allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les consolerai ╵de leurs chagrins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je les réjouirai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je comblerai les prêtres ╵de la graisse des viandes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple se rassasiera ╵des biens que je lui offrirai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On entend à Rama ╵une voix qui gémit
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et des sanglots amers :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rachel pleure ses fils
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle ne veut pas ╵se laisser consoler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ses fils ne sont plus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 2.18
        metadata:
          usfm: MAT.2.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne pleure plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne verse plus de larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voici que ton labeur ╵aura sa récompense
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire : tu n’auras pas mis au monde et élevé des enfants en vain.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes fils reviendront ╵du pays ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il y a pour tes descendants ╵une espérance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes enfants reviendront ╵dans leur pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: J’ai très bien entendu ╵Ephraïm qui gémit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui dit : « Tu m’as châtié, ╵et j’ai été châtié'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un veau indompté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais fais-moi revenir à toi, ╵afin que je revienne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es l’Eternel, mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je m’étais détourné, ╵mais à présent, je le regrette.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant éclairé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plein de remords, je me frappe les cuisses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis confus, j’ai honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je porte le déshonneur ╵de tout ce que j’ai fait ╵dans ma jeunesse. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ephraïm est pour moi ╵un fils que je chéris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un enfant que j’affectionne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chaque fois que j’en parle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me souviens encore ╵plus vivement de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi mon cœur est en émoi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’ai pour lui ╵beaucoup de compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dresse-toi des signaux, ╵balise ton parcours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais bien attention au sentier
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au chemin que tu empruntes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens, ô communauté d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, reviens dans tes villes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Jusques à quand ╵vas-tu errer dans tous les sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille rebelle ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Eternel va créer ╵du nouveau sur la terre :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant, c’est la femme ╵qui entourera l’homme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit d’Israël, qui erre dans tous les sens, rebelle à l’Eternel. La fin du verset fait allusion à la vie sexuelle : c’est normalement l’homme qui recherche la femme. Mais l’œuvre divine transformera les dispositions des Israélites, de sorte que la femme, représentant Israël, recherchera l’homme, représentant Dieu. En hébreu, les mots rendus par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rebelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'entourera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: font assonance.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Reconstruction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voilà ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Quand je restaurerai le pays de Juda avec toutes ses villes, alors on y dira à nouveau : « Que l’Eternel te bénisse, demeure de justice, montagne sainte ! » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et les populations du pays de Juda et de toutes ses villes y habiteront toutes ensemble ; les laboureurs et ceux qui mènent les troupeaux s’y installeront, eux aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je désaltérerai ceux qui sont épuisés, je comblerai ceux qui sont languissants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Puis je me suis réveillé et j’ai ouvert les yeux. Mon sommeil m’avait été agréable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Or le temps va venir, l’Eternel le déclare, où j’ensemencerai les royaumes d’Israël et de Juda d’hommes et d’animaux. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et, comme j’ai veillé sur eux pour les déraciner et pour les renverser, pour les ruiner et les détruire et pour leur faire du mal, je veillerai sur eux pour construire et pour planter, l’Eternel le déclare
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1.10 ; 24.6 ; 42.10 ; 45.4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En ce temps-là, on ne dira plus ce proverbe : « Les pères ont mangé des raisins verts mais ce sont les dents des enfants qui en sont agacées'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 18.2
        metadata:
          usfm: EZK.18.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais chacun périra pour son propre péché. C’est celui qui mangera des raisins verts qui en aura les dents agacées.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La nouvelle alliance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mais des jours viennent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où moi, je conclurai ╵avec le peuple d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 31-34 sont cités en Hé 8.8-12 ; 10.15-17.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: une alliance nouvelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lc 22.20 ; 1 Co 11.25 ; 2 Co 3.6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Elle ne sera pas ╵comme celle que j’ai conclue ╵avec leurs pères
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je les ai pris par la main
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les faire sortir d’Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car cette alliance-là, ╵ils l’ont rompue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que moi j’étais ╵leur suzerain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mais voici quelle alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: je conclurai ╵avec le peuple d’Israël, ╵après ces jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je placerai ma Loi ╵au plus profond d’eux-mêmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je la graverai sur leur cœur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, je serai leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux, ils seront mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils n’auront plus besoin ╵de s’enseigner l’un l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en répétant chacun ╵à son compagnon ou son frère :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Il faut que tu connaisses l’Eternel ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tous me connaîtront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des plus petits jusqu’aux plus grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je pardonnerai leurs fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne tiendrai plus compte ╵de leur péché.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Une alliance éternelle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Voici ce que déclare l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui fait paraître le soleil ╵pour éclairer le jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui a établi ╵les lois qui règlent ╵la course de la lune ╵et des étoiles ╵pour éclairer la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui agite la mer ╵et fait mugir ses flots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui a pour nom l’Eternel, ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il faudrait que ces lois ╵soient supprimées par-devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que la descendance d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: cesse aussi pour toujours ╵d’être une nation devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’on peut mesurer ╵le ciel là-haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou si l’on peut sonder ╵les fondements ╵de la terre ici-bas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, je rejetterai ╵toute la descendance d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tout ce qu’ils ont fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mais des jours vont venir, l’Eternel le déclare, où cette ville sera de nouveau rebâtie pour l’Eternel, depuis la tour d’Hananéel jusqu’à la porte de l’Angle. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: On étendra encore le cordeau d’arpentage en ligne droite jusqu’à la colline de Gareb, puis on tournera vers Goath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localités inconnues. Le sens général de ce passage est que la nouvelle cité sera plus vaste que l’ancienne et qu’elle inclura des endroits considérés comme impurs au temps de Jérémie.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et toute la vallée où l’on jette les cadavres et les cendres grasses, et tous les terrains jusqu’au torrent du Cédron, jusqu’à l’angle où se trouve la Porte des Chevaux, du côté de l’orient : tout ce domaine sera saint pour l’Eternel, et il ne sera plus jamais arraché ni détruit.'
