document_id: 2SA.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: La guerre dura longtemps entre la maison de Saül et celle de David, mais la maison de David devenait de plus en plus puissante, tandis que celle de Saül ne cessait de s’affaiblir.
  - type: heading
    content: Les fils de David nés à Hébron
  - type: heading
    content: (1 Ch 3.1-4)
  '10':
  - type: text
    content: Car il a juré d’enlever la royauté à la famille de Saül et d’affermir l’autorité royale de David
  - type: note
    content: Voir 1 S 15.28.
  - type: text
    content: ' sur Israël et sur Juda depuis Dan jusqu’à Beer-Sheva'
  - type: note
    content: Expression classique désignant tout le pays d’Israël, de l’extrême nord à l’extrême sud (voir Jg 20.1).
  - type: text
    content: .
  '11':
  - type: text
    content: Ish-Bosheth ne put lui répliquer un seul mot car il avait peur de lui.
  '12':
  - type: text
    content: 'Abner envoya des émissaires auprès de David pour lui faire cette proposition : A qui doit appartenir ce pays ? Conclus une alliance avec moi et je t’aiderai à rallier tout Israël autour de toi.'
  '13':
  - type: text
    content: '– D’accord, leur répondit David, je ferai alliance avec toi, mais à une condition : je ne te recevrai pas si tu ne m’envoies pas d’abord Mikal, la fille de Saül'
  - type: note
    content: Voir 1 S 18.20-30 ; 25.44.
  - type: text
    content: ', lorsque tu viendras me rencontrer.'
  '14':
  - type: text
    content: 'En même temps, David envoya des messagers à Ish-Bosheth, fils de Saül, pour lui dire : Rends-moi ma femme Mikal que j’ai acquise au prix de cent prépuces de Philistins.'
  '15':
  - type: text
    content: 'Ish-Bosheth la fit enlever chez son second mari Paltiel, fils de Laïsh, '
  '16':
  - type: text
    content: qui la suivit en pleurant jusqu’à Bahourim
  - type: note
    content: A quelques kilomètres de Jérusalem, sans doute la dernière localité du ressort d’Ish-Bosheth.
  - type: text
    content: . Là, Abner lui ordonna de retourner chez lui – et il s’en alla.
  '17':
  - type: text
    content: 'Abner engagea des pourparlers avec les responsables d’Israël. Il leur dit : Depuis longtemps déjà vous souhaitez que David devienne votre roi. '
  '18':
  - type: text
    content: 'Le moment est venu de passer aux actes. Rappelez-vous que l’Eternel a promis à David : « C’est par David, mon serviteur, que je délivrerai mon peuple Israël des Philistins et de tous ses ennemis. »'
  '19':
  - type: text
    content: Abner s’entretint de la même manière avec les responsables de la tribu de Benjamin, puis il se rendit à Hébron pour communiquer à David les décisions prises en accord avec les autres Israélites et toute la tribu de Benjamin.
  '2':
  - type: text
    content: 'Il naquit à David des fils à Hébron : son premier-né s’appelait Amnôn, il était fils d’Ahinoam de Jizréel. '
  '20':
  - type: text
    content: 'Il arriva chez David à Hébron accompagné de vingt hommes. David leur offrit à tous un festin. '
  '21':
  - type: text
    content: 'Puis Abner lui dit : Je m’en vais rassembler tout Israël autour de mon seigneur le roi ; ils concluront une alliance avec toi, et tu régneras partout où tu voudras.'
  - type: text
    content: David le laissa partir et celui-ci s’en alla en paix.
  - type: heading
    content: La mort d’Abner
  '22':
  - type: text
    content: 'Peu après, Joab et les hommes de David rentrèrent d’une expédition militaire en rapportant un butin considérable. Abner n’était plus chez David à Hébron, puisque celui-ci l’avait laissé repartir en paix. '
  '23':
  - type: text
    content: 'Quand Joab et toute l’armée qui l’accompagnait arrivèrent, on informa Joab qu’Abner, fils de Ner, était venu trouver le roi et que celui-ci l’avait laissé repartir en paix. '
  '24':
  - type: text
    content: 'Alors Joab se rendit auprès du roi et lui dit : Qu’as-tu fait ? Abner est venu vers toi et toi, tu l’as laissé repartir librement ! '
  '25':
  - type: text
    content: 'Pourtant tu le connais, cet Abner, fils de Ner : c’est pour te tromper qu’il est venu, pour apprendre quels sont tes plans de campagne et pour savoir tout ce que tu fais.'
  '26':
  - type: text
    content: Joab sortit de chez David et sans que celui-ci en sache rien, il envoya sur les pas d’Abner des messagers qui lui firent rebrousser chemin depuis la citerne de Sira
  - type: note
    content: Un des points d’eau du désert, très certainement situé au nord d’Hébron.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Quand Abner fut de retour à Hébron, Joab l’entraîna à l’écart à l’intérieur de la porte de la ville comme pour lui parler confidentiellement, et là il le poignarda en plein ventre et le tua pour venger la mort de son frère Asaël.
  '28':
  - type: text
    content: 'Quand David apprit ce qui s’était passé, il s’écria : Je suis à jamais innocent devant l’Eternel, moi ainsi que mon royaume, du meurtre d’Abner, fils de Ner. '
  '29':
  - type: text
    content: Que la responsabilité de ce meurtre retombe sur Joab et sa famille ! Qu’il ne cesse d’y avoir parmi ses descendants quelqu’un qui soit atteint d’un flux ou de la lèpre, ou qui s’appuie sur des béquilles, ou qui meure par l’épée, ou qui manque de nourriture
  - type: note
    content: Voir 1 R 2.5-6, 28-35.
  - type: text
    content: '  !'
  '3':
  - type: text
    content: Son deuxième, Kileab, était fils d’Abigaïl, veuve de Nabal de Karmel ; le troisième, Absalom, était le fils de Maaka, fille de Talmaï, le roi de Gueshour
  - type: note
    content: Gueshour était un petit royaume syrien situé à l’est du Jourdain et au nord-est du lac de Galilée (voir 15.8 ; Jos 12.5 ; 13.11-13 ; Dt 3.14) où Absalom cherchera refuge (13.37-38 ; 14.23).
  - type: text
    content: '  ; '
  '30':
  - type: text
    content: Joab et son frère Abishaï avaient assassiné Abner, parce qu’il avait tué leur frère Asaël au cours de la bataille de Gabaon
  - type: note
    content: Voir 2.18-23.
  - type: text
    content: .
  '31':
  - type: text
    content: 'David ordonna à Joab et à toute la troupe qui l’accompagnait : Déchirez vos vêtements, revêtez-vous d’un habit de toile de sac et portez le deuil pour Abner !'
  - type: text
    content: 'Le roi David marchait derrière le cercueil. '
  '32':
  - type: text
    content: On enterra Abner à Hébron ; le roi éclata en sanglots sur son tombeau et tout le peuple se mit à pleurer.
  '33':
  - type: text
    content: 'Puis le roi entonna sur Abner la complainte que voici :'
  - type: text
    content: Fallait-il qu’Abner meure ╵comme les insensés ?
  '34':
  - type: text
    content: Tu n’avais pas les mains liées
  - type: text
    content: ni les pieds enchaînés.
  - type: text
    content: Pourtant tu es tombé
  - type: text
    content: comme lorsque l’on tombe ╵devant des gens pervers.
  - type: text
    content: 'Et tout le peuple se remit à pleurer sur lui. '
  '35':
  - type: text
    content: 'Ensuite tout le monde pressa David de prendre quelque nourriture pendant qu’il faisait encore jour. Mais il fit ce serment : Que Dieu me punisse très sévèrement si je mange un seul morceau de pain ou quoi que ce soit d’autre avant le coucher du soleil. '
  '36':
  - type: text
    content: 'Tout le peuple en eut connaissance et l’approuva, comme du reste il approuvait tout ce que faisait le roi. '
  '37':
  - type: text
    content: 'Toute l’armée et tout Israël reconnurent ce jour-là que le roi n’était pour rien dans l’assassinat d’Abner, fils de Ner. '
  '38':
  - type: text
    content: 'Le roi dit à ses officiers : Est-ce que vous vous rendez compte qu’un prince et un grand chef est tombé aujourd’hui en Israël ? '
  '39':
  - type: text
    content: Même si j’ai reçu l’onction royale, je suis encore faible, et ces gens, les fils de Tserouya, sont trop puissants pour moi. Que l’Eternel lui-même punisse celui qui a commis ce crime selon le mal qu’il a fait !
  '4':
  - type: text
    content: 'le quatrième, Adoniya, était le fils de Haggith ; le cinquième, Shephatia, était le fils d’Abital ; '
  '5':
  - type: text
    content: et le sixième Yitream, fils d’Egla, femme de David. Tels sont les fils de David qui naquirent à Hébron.
  - type: heading
    content: Abner se rallie à David
  '6':
  - type: text
    content: 'Tant que dura la guerre entre la maison de Saül et celle de David, Abner renforça son influence dans la maison de Saül. '
  '7':
  - type: text
    content: 'Or, Saül avait eu une épouse de second rang, Ritspa, fille d’Aya. Ish-Bosheth fit un reproche à Abner en lui disant : Pourquoi as-tu couché avec l’épouse de mon père ?'
  '8':
  - type: text
    content: 'A ces mots, Abner entra dans une violente colère et lança à Ish-Bosheth : Est-ce que je suis un chien au service de Juda ? Depuis toujours, j’ai traité avec faveur la famille de Saül, ton père, ses frères et ses amis, et je ne t’ai pas laissé tomber entre les mains de David, et voilà que tu viens aujourd’hui me reprocher une faute avec cette femme ! '
  '9':
  - type: text
    content: 'Que Dieu me punisse très sévèrement si je n’œuvre pas à la réalisation de ce que l’Eternel a promis à David. '
