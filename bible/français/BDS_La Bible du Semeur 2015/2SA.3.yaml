document_id: 2SA.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La guerre dura longtemps entre la maison de Saül et celle de David, mais la maison de David devenait de plus en plus puissante, tandis que celle de Saül ne cessait de s’affaiblir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils de David nés à Hébron
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 3.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il naquit à David des fils à Hébron : son premier-né s’appelait Amnôn, il était fils d’Ahinoam de Jizréel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Son deuxième, Kileab, était fils d’Abigaïl, veuve de Nabal de Karmel ; le troisième, Absalom, était le fils de Maaka, fille de Talmaï, le roi de Gueshour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gueshour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un petit royaume syrien situé à l’est du Jourdain et au nord-est du lac de Galilée (voir 15.8 ; Jos 12.5 ; 13.11-13 ; Dt 3.14) où Absalom cherchera refuge (13.37-38 ; 14.23).
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'le quatrième, Adoniya, était le fils de Haggith ; le cinquième, Shephatia, était le fils d’Abital ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et le sixième Yitream, fils d’Egla, femme de David. Tels sont les fils de David qui naquirent à Hébron.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abner se rallie à David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tant que dura la guerre entre la maison de Saül et celle de David, Abner renforça son influence dans la maison de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, Saül avait eu une épouse de second rang, Ritspa, fille d’Aya. Ish-Bosheth fit un reproche à Abner en lui disant : Pourquoi as-tu couché avec l’épouse de mon père ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A ces mots, Abner entra dans une violente colère et lança à Ish-Bosheth : Est-ce que je suis un chien au service de Juda ? Depuis toujours, j’ai traité avec faveur la famille de Saül, ton père, ses frères et ses amis, et je ne t’ai pas laissé tomber entre les mains de David, et voilà que tu viens aujourd’hui me reprocher une faute avec cette femme ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que Dieu me punisse très sévèrement si je n’œuvre pas à la réalisation de ce que l’Eternel a promis à David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car il a juré d’enlever la royauté à la famille de Saül et d’affermir l’autorité royale de David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 15.28
        metadata:
          usfm: 1SA.15.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' sur Israël et sur Juda depuis Dan jusqu’à Beer-Sheva'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Expression classique désignant tout le pays d’Israël, de l’extrême nord à l’extrême sud (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 20.1
        metadata:
          usfm: JDG.20.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ish-Bosheth ne put lui répliquer un seul mot car il avait peur de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abner envoya des émissaires auprès de David pour lui faire cette proposition : A qui doit appartenir ce pays ? Conclus une alliance avec moi et je t’aiderai à rallier tout Israël autour de toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '– D’accord, leur répondit David, je ferai alliance avec toi, mais à une condition : je ne te recevrai pas si tu ne m’envoies pas d’abord Mikal, la fille de Saül'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 S 18.20-30 ; 25.44.
    marker-yv: yv-n
  - type: text
    text: ', lorsque tu viendras me rencontrer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En même temps, David envoya des messagers à Ish-Bosheth, fils de Saül, pour lui dire : Rends-moi ma femme Mikal que j’ai acquise au prix de cent prépuces de Philistins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ish-Bosheth la fit enlever chez son second mari Paltiel, fils de Laïsh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: qui la suivit en pleurant jusqu’à Bahourim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A quelques kilomètres de Jérusalem, sans doute la dernière localité du ressort d’Ish-Bosheth.
    marker-yv: yv-n
  - type: text
    text: . Là, Abner lui ordonna de retourner chez lui – et il s’en alla.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abner engagea des pourparlers avec les responsables d’Israël. Il leur dit : Depuis longtemps déjà vous souhaitez que David devienne votre roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le moment est venu de passer aux actes. Rappelez-vous que l’Eternel a promis à David : « C’est par David, mon serviteur, que je délivrerai mon peuple Israël des Philistins et de tous ses ennemis. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abner s’entretint de la même manière avec les responsables de la tribu de Benjamin, puis il se rendit à Hébron pour communiquer à David les décisions prises en accord avec les autres Israélites et toute la tribu de Benjamin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il arriva chez David à Hébron accompagné de vingt hommes. David leur offrit à tous un festin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis Abner lui dit : Je m’en vais rassembler tout Israël autour de mon seigneur le roi ; ils concluront une alliance avec toi, et tu régneras partout où tu voudras.'
- type: usfm
  marker: p
  children:
  - type: text
    text: David le laissa partir et celui-ci s’en alla en paix.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Abner
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Peu après, Joab et les hommes de David rentrèrent d’une expédition militaire en rapportant un butin considérable. Abner n’était plus chez David à Hébron, puisque celui-ci l’avait laissé repartir en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand Joab et toute l’armée qui l’accompagnait arrivèrent, on informa Joab qu’Abner, fils de Ner, était venu trouver le roi et que celui-ci l’avait laissé repartir en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Joab se rendit auprès du roi et lui dit : Qu’as-tu fait ? Abner est venu vers toi et toi, tu l’as laissé repartir librement ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pourtant tu le connais, cet Abner, fils de Ner : c’est pour te tromper qu’il est venu, pour apprendre quels sont tes plans de campagne et pour savoir tout ce que tu fais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joab sortit de chez David et sans que celui-ci en sache rien, il envoya sur les pas d’Abner des messagers qui lui firent rebrousser chemin depuis la citerne de Sira
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Un des points d’eau du désert, très certainement situé au nord d’Hébron.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quand Abner fut de retour à Hébron, Joab l’entraîna à l’écart à l’intérieur de la porte de la ville comme pour lui parler confidentiellement, et là il le poignarda en plein ventre et le tua pour venger la mort de son frère Asaël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand David apprit ce qui s’était passé, il s’écria : Je suis à jamais innocent devant l’Eternel, moi ainsi que mon royaume, du meurtre d’Abner, fils de Ner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que la responsabilité de ce meurtre retombe sur Joab et sa famille ! Qu’il ne cesse d’y avoir parmi ses descendants quelqu’un qui soit atteint d’un flux ou de la lèpre, ou qui s’appuie sur des béquilles, ou qui meure par l’épée, ou qui manque de nourriture
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2.5-6
        metadata:
          usfm: 1KI.2.5+1KI.2.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28-35
        metadata:
          usfm: 1KI.2.28+1KI.2.29+1KI.2.30+1KI.2.31+1KI.2.32+1KI.2.33+1KI.2.34+1KI.2.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Joab et son frère Abishaï avaient assassiné Abner, parce qu’il avait tué leur frère Asaël au cours de la bataille de Gabaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2.18-23
        metadata:
          usfm: 2SA.2.18+2SA.2.19+2SA.2.20+2SA.2.21+2SA.2.22+2SA.2.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'David ordonna à Joab et à toute la troupe qui l’accompagnait : Déchirez vos vêtements, revêtez-vous d’un habit de toile de sac et portez le deuil pour Abner !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi David marchait derrière le cercueil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: On enterra Abner à Hébron ; le roi éclata en sanglots sur son tombeau et tout le peuple se mit à pleurer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Puis le roi entonna sur Abner la complainte que voici :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fallait-il qu’Abner meure ╵comme les insensés ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tu n’avais pas les mains liées
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni les pieds enchaînés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant tu es tombé
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme lorsque l’on tombe ╵devant des gens pervers.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et tout le peuple se remit à pleurer sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ensuite tout le monde pressa David de prendre quelque nourriture pendant qu’il faisait encore jour. Mais il fit ce serment : Que Dieu me punisse très sévèrement si je mange un seul morceau de pain ou quoi que ce soit d’autre avant le coucher du soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tout le peuple en eut connaissance et l’approuva, comme du reste il approuvait tout ce que faisait le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Toute l’armée et tout Israël reconnurent ce jour-là que le roi n’était pour rien dans l’assassinat d’Abner, fils de Ner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le roi dit à ses officiers : Est-ce que vous vous rendez compte qu’un prince et un grand chef est tombé aujourd’hui en Israël ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Même si j’ai reçu l’onction royale, je suis encore faible, et ces gens, les fils de Tserouya, sont trop puissants pour moi. Que l’Eternel lui-même punisse celui qui a commis ce crime selon le mal qu’il a fait !
