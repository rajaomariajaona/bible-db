document_id: DEU.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: En cas de meurtre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’on trouve dans le pays que l’Eternel votre Dieu vous donne à posséder, le cadavre d’un homme assassiné étendu en pleine campagne sans que l’on connaisse le meurtrier, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous partirez en guerre contre vos ennemis, et que l’Eternel votre Dieu les livrera en votre pouvoir, il se peut que parmi les prisonniers que tu feras '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu remarqueras une belle captive, que tu en tombes amoureux et que tu l’épouses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tu l’emmèneras chez toi dans ta maison, là elle se rasera la tête et se coupera les ongles, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'elle enlèvera le vêtement qu’elle portait comme prisonnière et elle demeurera dans ta maison. Pendant un mois, elle pleurera son père et sa mère. Après cela seulement, tu t’uniras à elle, tu seras son mari et elle sera ta femme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si, plus tard, elle cesse de te plaire, tu la laisseras partir où elle voudra ; tu ne pourras ni la vendre, ni en faire ton esclave après qu’elle aura été ta femme.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le droit du fils aîné
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme a deux femmes, il se peut qu’il préfère l’une et aime moins l’autre. Si l’une et l’autre lui donnent des enfants, il peut se trouver que le fils premier-né est de la femme qu’il aime moins. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour où il partagera ses biens entre ses fils, il ne pourra pas conférer le droit de l’aîné au fils de la femme préférée, au détriment de celui de la femme moins aimée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au contraire, il reconnaîtra comme premier-né le fils de la femme qu’il aime moins et lui donnera une double part de l’héritage de tout ce qu’il possède, car c’est lui qui est le premier rejeton de sa vigueur, c’est à lui qu’appartient le droit d’aînesse.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les délinquants
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme a un fils révolté et rebelle qui n’obéit ni à son père ni à sa mère, et reste insensible aux corrections qu’ils lui infligent, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ses parents se saisiront de lui et l’amèneront devant les responsables de la ville à la porte de leur cité. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vos responsables et vos juges se rendront sur les lieux et mesureront la distance entre la victime et les villes d’alentour, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils déclareront aux responsables : « Notre fils que voici est révolté et rebelle, il ne nous obéit pas, c’est un débauché et un ivrogne. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tous les hommes de sa ville le lapideront pour le faire mourir. Ainsi vous ferez disparaître la souillure qu’entraîne le mal du milieu de vous. Tout Israël en entendra parler et sera saisi de crainte.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: En cas de pendaison
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme qui a encouru la peine capitale pour un crime a été exécuté et pendu à un arbre, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: son cadavre ne devra pas rester là pendant la nuit sur l’arbre, vous l’enterrerez le jour même, car un pendu est un objet de malédiction divine et vous ne rendrez pas impure la terre que l’Eternel votre Dieu vous donne en possession
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ga 3.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour déterminer la plus proche. Les responsables de cette ville prendront une génisse qui n’aura pas encore été employée au travail et n’aura jamais porté le joug. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils l’amèneront dans un ruisseau qui ne tarit jamais, en un lieu qui ne soit ni labouré ni ensemencé. Là, ils lui briseront la nuque dans le ruisseau.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les prêtres descendants de Lévi s’avanceront, car ce sont eux que l’Eternel votre Dieu a choisis pour être à son service et pour donner la bénédiction en son nom. Leurs décisions trancheront tout litige et tous les cas de coups et blessures. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis les responsables de la ville en question, désignée comme la plus proche, se laveront les mains au-dessus de la génisse décapitée dans le ruisseau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Acte symbolique déclarant qu’ils sont innocents du meurtre et du recel du coupable (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 27.24
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils déclareront : « Ce ne sont pas nos mains qui ont répandu ce sang et nos yeux n’ont été témoins de rien. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: O Eternel, pardonne à ton peuple Israël, que tu as libéré, et ne lui fais pas porter la responsabilité du meurtre d’un innocent ! »
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi ce meurtre sera expié, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et vous aurez ôté la souillure qu’entraîne le meurtre d’un innocent, car vous aurez fait ce que l’Eternel considère comme juste.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les captives ennemies
    marker-yv: yv-h
