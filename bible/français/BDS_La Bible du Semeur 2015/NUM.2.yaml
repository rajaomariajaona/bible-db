document_id: NUM.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le campement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla à Moïse et à Aaron en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au sud se dressera la bannière du camp de Ruben rangé par corps d’armée, ayant pour chef Elitsour, fils de Shedéour, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 46 500 hommes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ses côtés camperont la tribu de Siméon sous la direction de son chef Sheloumiel, fils de Tsourishaddaï, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 59 300 hommes, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et la tribu de Gad sous la direction de Eliasaph, fils de Deouel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après plusieurs manuscrits hébreux, le Pentateuque samaritain et la Vulgate, ainsi que Nb 7.42, 47 ; 10.20. La plupart des manuscrits hébreux ont ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Reouel.
      marker-yv: yv-n
    - type: text
      text: ', '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 45 650 hommes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Total des hommes recensés dans le camp de Ruben : 151 450 pour les trois armées. Ils seront les seconds à se mettre en marche.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite partira la tente de la Rencontre avec le camp des lévites, au centre des autres camps. Ils partiront dans l’ordre dans lequel ils campent, chacun à son tour sous sa bannière.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bannière du camp d’Ephraïm sera dressée à l’occident. Il sera rangé par corps d’armée, ayant pour chef Elishama, fils d’Ammihoud, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 40 500 hommes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Israélites camperont chacun près de sa bannière, sous les enseignes de son groupe familial, à une certaine distance autour de la tente de la Rencontre.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A ses côtés camperont la tribu de Manassé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les trois tribus descendant de Rachel campaient à l’ouest, la tribu d’Ephraïm commandant cette triade (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 48.5-20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', sous la direction de son chef Gamliel, fils de Pédahtsour, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 32 200 hommes '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et la tribu de Benjamin sous la direction de son chef Abidân, fils de Guideoni, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 35 400 hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Total des hommes recensés dans le camp d’Ephraïm : 108 100 hommes pour les trois armées. Ils partiront en troisième lieu.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au nord campera la tribu de Dan rangée par corps d’armée et ayant pour chef Ahiézer, fils d’Ammishaddaï, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 62 700 hommes. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ses côtés, la tribu d’Aser sous la direction de son chef Paguiel, fils d’Okrân, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 41 500 hommes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis la tribu de Nephtali sous la direction de son chef Ahira, fils d’Enân, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’est, campera la tribu de Juda, sous sa bannière, rangée par corps d’armée, sous la direction de son chef Nahshôn, fils d’Amminadab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les chefs désignés pour présider au recensement (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1.5-15
        - type: text
          text: ) commandent aussi les différentes tribus.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 53 400 hommes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Total des hommes recensés dans le camp de Dan : 157 600 hommes. Ils partiront en dernier lieu avec leurs bannières.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre total des Israélites recensés par groupes familiaux et rangés par corps d’armée était de 603 550 hommes. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les lévites ne furent pas recensés avec les autres Israélites, conformément à l’ordre donné par l’Eternel à Moïse.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites firent tout comme l’Eternel avait ordonné à Moïse : ils campaient sous leurs bannières et partaient par familles et par groupes familiaux.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son armée compte un effectif de 74 600 hommes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ses côtés camperont la tribu d’Issacar sous la direction de son chef Netanéel, fils de Tsouar, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 54 400 hommes, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et la tribu de Zabulon sous la direction de son chef Eliab, fils de Hélôn, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec un effectif de 57 400 hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Total des hommes recensés dans le camp de Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Juda, Issacar et Zabulon qui constituaient le premier camp étaient tous trois fils de la même mère. Il en est de même du troisième camp. L’avant-garde et l’arrière-garde comprenaient les tribus les plus nombreuses.
      marker-yv: yv-n
    - type: text
      text: '  : 186 400 hommes pour les trois armées. Ils ouvriront la marche.'
