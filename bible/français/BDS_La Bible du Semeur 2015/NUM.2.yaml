document_id: NUM.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le campement
  - type: text
    content: 'L’Eternel parla à Moïse et à Aaron en ces termes : '
  '10':
  - type: text
    content: 'Au sud se dressera la bannière du camp de Ruben rangé par corps d’armée, ayant pour chef Elitsour, fils de Shedéour, '
  '11':
  - type: text
    content: 'avec un effectif de 46 500 hommes. '
  '12':
  - type: text
    content: 'A ses côtés camperont la tribu de Siméon sous la direction de son chef Sheloumiel, fils de Tsourishaddaï, '
  '13':
  - type: text
    content: 'avec un effectif de 59 300 hommes, '
  '14':
  - type: text
    content: et la tribu de Gad sous la direction de Eliasaph, fils de Deouel
  - type: note
    content: D’après plusieurs manuscrits hébreux, le Pentateuque samaritain et la Vulgate, ainsi que Nb 7.42, 47 ; 10.20. La plupart des manuscrits hébreux ont ici Reouel.
  - type: text
    content: ', '
  '15':
  - type: text
    content: 'avec un effectif de 45 650 hommes. '
  '16':
  - type: text
    content: 'Total des hommes recensés dans le camp de Ruben : 151 450 pour les trois armées. Ils seront les seconds à se mettre en marche.'
  '17':
  - type: text
    content: Ensuite partira la tente de la Rencontre avec le camp des lévites, au centre des autres camps. Ils partiront dans l’ordre dans lequel ils campent, chacun à son tour sous sa bannière.
  '18':
  - type: text
    content: 'La bannière du camp d’Ephraïm sera dressée à l’occident. Il sera rangé par corps d’armée, ayant pour chef Elishama, fils d’Ammihoud, '
  '19':
  - type: text
    content: 'avec un effectif de 40 500 hommes. '
  '2':
  - type: text
    content: Les Israélites camperont chacun près de sa bannière, sous les enseignes de son groupe familial, à une certaine distance autour de la tente de la Rencontre.
  '20':
  - type: text
    content: A ses côtés camperont la tribu de Manassé
  - type: note
    content: Les trois tribus descendant de Rachel campaient à l’ouest, la tribu d’Ephraïm commandant cette triade (voir Gn 48.5-20).
  - type: text
    content: ', sous la direction de son chef Gamliel, fils de Pédahtsour, '
  '21':
  - type: text
    content: 'avec un effectif de 32 200 hommes '
  '22':
  - type: text
    content: 'et la tribu de Benjamin sous la direction de son chef Abidân, fils de Guideoni, '
  '23':
  - type: text
    content: 'avec un effectif de 35 400 hommes. '
  '24':
  - type: text
    content: 'Total des hommes recensés dans le camp d’Ephraïm : 108 100 hommes pour les trois armées. Ils partiront en troisième lieu.'
  '25':
  - type: text
    content: 'Au nord campera la tribu de Dan rangée par corps d’armée et ayant pour chef Ahiézer, fils d’Ammishaddaï, '
  '26':
  - type: text
    content: 'avec un effectif de 62 700 hommes. '
  '27':
  - type: text
    content: 'A ses côtés, la tribu d’Aser sous la direction de son chef Paguiel, fils d’Okrân, '
  '28':
  - type: text
    content: 'avec un effectif de 41 500 hommes. '
  '29':
  - type: text
    content: 'Puis la tribu de Nephtali sous la direction de son chef Ahira, fils d’Enân, '
  '3':
  - type: text
    content: A l’est, campera la tribu de Juda, sous sa bannière, rangée par corps d’armée, sous la direction de son chef Nahshôn, fils d’Amminadab
  - type: note
    content: Les chefs désignés pour présider au recensement (1.5-15) commandent aussi les différentes tribus.
  - type: text
    content: '  ; '
  '30':
  - type: text
    content: 'avec un effectif de 53 400 hommes. '
  '31':
  - type: text
    content: 'Total des hommes recensés dans le camp de Dan : 157 600 hommes. Ils partiront en dernier lieu avec leurs bannières.'
  '32':
  - type: text
    content: 'Le nombre total des Israélites recensés par groupes familiaux et rangés par corps d’armée était de 603 550 hommes. '
  '33':
  - type: text
    content: Les lévites ne furent pas recensés avec les autres Israélites, conformément à l’ordre donné par l’Eternel à Moïse.
  '34':
  - type: text
    content: 'Les Israélites firent tout comme l’Eternel avait ordonné à Moïse : ils campaient sous leurs bannières et partaient par familles et par groupes familiaux.'
  '4':
  - type: text
    content: 'son armée compte un effectif de 74 600 hommes. '
  '5':
  - type: text
    content: 'A ses côtés camperont la tribu d’Issacar sous la direction de son chef Netanéel, fils de Tsouar, '
  '6':
  - type: text
    content: 'avec un effectif de 54 400 hommes, '
  '7':
  - type: text
    content: 'et la tribu de Zabulon sous la direction de son chef Eliab, fils de Hélôn, '
  '8':
  - type: text
    content: 'avec un effectif de 57 400 hommes. '
  '9':
  - type: text
    content: Total des hommes recensés dans le camp de Juda
  - type: note
    content: Juda, Issacar et Zabulon qui constituaient le premier camp étaient tous trois fils de la même mère. Il en est de même du troisième camp. L’avant-garde et l’arrière-garde comprenaient les tribus les plus nombreuses.
  - type: text
    content: '  : 186 400 hommes pour les trois armées. Ils ouvriront la marche.'
