document_id: ZEC.6
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les chars de guerre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je levai de nouveau les yeux et je vis quatre chars déboucher d’entre les deux montagnes, et ces montagnes étaient de bronze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-8, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6.1-8
        metadata:
          usfm: REV.6.1+REV.6.2+REV.6.3+REV.6.4+REV.6.5+REV.6.6+REV.6.7+REV.6.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au premier char étaient attelés des chevaux roux, au deuxième, des chevaux noirs, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: au troisième, des chevaux blancs, et au quatrième, de vigoureux chevaux mouchetés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et au quatrième, des chevaux mouchetés. C’étaient tous de vigoureux chevaux.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je demandai à l’ange qui me parlait : Que représentent ces attelages, mon seigneur ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il me répondit : Ce sont les quatre vents du ciel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 49.36 ; Ap 7.1.
    marker-yv: yv-n
  - type: text
    text: '. Ils se sont tenus devant le Seigneur de toute la terre et maintenant ils sortent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le char tiré par les chevaux noirs se dirige vers le pays du Nord ; celui qui est attelé des chevaux blancs les suit ; les chevaux mouchetés partent en direction du pays du Midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nord
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'la Babylonie (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.10'
        metadata:
          usfm: ZEC.2.10
      - type: text
        text: '). '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les suit
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'partent vers l’ouest. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pays du Midi
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l’Egypte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous ces chevaux vigoureux s’avancèrent, impatients d’aller parcourir la terre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors il leur dit : Allez, parcourez la terre !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils s’élancèrent pour parcourir la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis il m’appela pour me dire : Regarde, ceux qui partent pour le pays du Nord vont assouvir ma colère contre le pays du Nord.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le couronnement du Roi-Prêtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Va prendre une part des dons que Heldaï, Tobiya et Yedaeya apportent de la part des exilés : rends-toi aujourd’hui dans la maison de Josias, fils de Sophonie, où ces gens viennent d’arriver en provenance de Babylone'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement une délégation de Juifs venus de Babylone pour apporter la contribution des exilés à la reconstruction du Temple.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu y prendras de l’argent et de l’or qu’ils apportent pour en faire une couronne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, ce mot, différent de celui qui désigne le turban du grand-prêtre, est au pluriel. Il s’agit peut-être d’une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'couronne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avec plusieurs diadèmes.
    marker-yv: yv-n
  - type: text
    text: ', et tu la poseras sur la tête de Josué, fils de Yehotsadaq, le grand-prêtre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu lui diras alors : « Ecoute ce que déclare le Seigneur des armées célestes : Voici un homme dont le nom est Germe, et sous ses pas, tout germera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.8'
        metadata:
          usfm: ZEC.3.8
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '. Il bâtira le temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est lui qui bâtira le temple de l’Eternel. Il sera revêtu de majesté royale, et il siégera sur son trône pour gouverner. Il sera aussi prêtre sur son trône. Il y aura une pleine harmonie entre les deux fonctions
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une telle union des deux fonctions était normalement interdite pour un roi issu de la tribu de Juda sous l’ancienne alliance (voir 2 Ch 26.16-21 ; Nb 17.5 ; 18.7), mais prévue pour le Messie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1-2
        metadata:
          usfm: PSA.110.1+PSA.110.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
        metadata:
          usfm: PSA.110.4
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La couronne sera conservée dans le temple de l’Eternel en souvenir de Hélem, de Tobiya, de Yedaeya et de la bonté du fils de
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la bonté du fils de. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hen, le fils de.
    marker-yv: yv-n
  - type: text
    text: ' Sophonie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Des gens viendront un jour de bien loin pour travailler à la construction du temple de l’Eternel, alors vous saurez que le Seigneur des armées célestes m’a envoyé vers vous. Cela s’accomplira si vous obéissez vraiment à l’Eternel votre Dieu. »
