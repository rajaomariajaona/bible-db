document_id: ZEC.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les chars de guerre
  - type: text
    content: Je levai de nouveau les yeux et je vis quatre chars déboucher d’entre les deux montagnes, et ces montagnes étaient de bronze
  - type: note
    content: Pour les v. 1-8, voir Ap 6.1-8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Va prendre une part des dons que Heldaï, Tobiya et Yedaeya apportent de la part des exilés : rends-toi aujourd’hui dans la maison de Josias, fils de Sophonie, où ces gens viennent d’arriver en provenance de Babylone'
  - type: note
    content: Probablement une délégation de Juifs venus de Babylone pour apporter la contribution des exilés à la reconstruction du Temple.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Tu y prendras de l’argent et de l’or qu’ils apportent pour en faire une couronne
  - type: note
    content: En hébreu, ce mot, différent de celui qui désigne le turban du grand-prêtre, est au pluriel. Il s’agit peut-être d’une couronne avec plusieurs diadèmes.
  - type: text
    content: ', et tu la poseras sur la tête de Josué, fils de Yehotsadaq, le grand-prêtre.'
  '12':
  - type: text
    content: 'Tu lui diras alors : « Ecoute ce que déclare le Seigneur des armées célestes : Voici un homme dont le nom est Germe, et sous ses pas, tout germera'
  - type: note
    content: Voir 3.8 et note.
  - type: text
    content: '. Il bâtira le temple de l’Eternel. '
  '13':
  - type: text
    content: C’est lui qui bâtira le temple de l’Eternel. Il sera revêtu de majesté royale, et il siégera sur son trône pour gouverner. Il sera aussi prêtre sur son trône. Il y aura une pleine harmonie entre les deux fonctions
  - type: note
    content: Une telle union des deux fonctions était normalement interdite pour un roi issu de la tribu de Juda sous l’ancienne alliance (voir 2 Ch 26.16-21 ; Nb 17.5 ; 18.7), mais prévue pour le Messie (Ps 110.1-2, 4).
  - type: text
    content: .
  '14':
  - type: text
    content: La couronne sera conservée dans le temple de l’Eternel en souvenir de Hélem, de Tobiya, de Yedaeya et de la bonté du fils de
  - type: note
    content: 'la bonté du fils de. Autre traduction : Hen, le fils de.'
  - type: text
    content: ' Sophonie.'
  '15':
  - type: text
    content: Des gens viendront un jour de bien loin pour travailler à la construction du temple de l’Eternel, alors vous saurez que le Seigneur des armées célestes m’a envoyé vers vous. Cela s’accomplira si vous obéissez vraiment à l’Eternel votre Dieu. »
  '2':
  - type: text
    content: 'Au premier char étaient attelés des chevaux roux, au deuxième, des chevaux noirs, '
  '3':
  - type: text
    content: au troisième, des chevaux blancs, et au quatrième, de vigoureux chevaux mouchetés
  - type: note
    content: 'Autre traduction : et au quatrième, des chevaux mouchetés. C’étaient tous de vigoureux chevaux.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Je demandai à l’ange qui me parlait : Que représentent ces attelages, mon seigneur ?'
  '5':
  - type: text
    content: 'Il me répondit : Ce sont les quatre vents du ciel'
  - type: note
    content: Voir Jr 49.36 ; Ap 7.1.
  - type: text
    content: '. Ils se sont tenus devant le Seigneur de toute la terre et maintenant ils sortent. '
  '6':
  - type: text
    content: Le char tiré par les chevaux noirs se dirige vers le pays du Nord ; celui qui est attelé des chevaux blancs les suit ; les chevaux mouchetés partent en direction du pays du Midi
  - type: note
    content: 'Nord: la Babylonie (cf. 2.10). les suit: autre traduction : partent vers l’ouest. Le pays du Midi: l’Egypte.'
  - type: text
    content: .
  '7':
  - type: text
    content: Tous ces chevaux vigoureux s’avancèrent, impatients d’aller parcourir la terre.
  - type: text
    content: 'Alors il leur dit : Allez, parcourez la terre !'
  - type: text
    content: Et ils s’élancèrent pour parcourir la terre.
  '8':
  - type: text
    content: 'Puis il m’appela pour me dire : Regarde, ceux qui partent pour le pays du Nord vont assouvir ma colère contre le pays du Nord.'
  - type: heading
    content: Le couronnement du Roi-Prêtre
  '9':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes : '
