document_id: REV.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les sept sceaux
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une porte ouverte dans le ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, je vis une porte ouverte dans le ciel. Et la voix que j’avais entendue me parler au début et qui résonnait comme une trompette me dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Monte ici, et je te montrerai ce qui doit arriver après cela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vision du trône de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette vision rappelle en particulier la vision d’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 1
        metadata:
          usfm: EZK.1
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A l’instant, l’Esprit se saisit de moi. Et voici : il y avait un trône dans le ciel. Et sur ce trône quelqu’un siégeait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Celui qui siégeait avait l’aspect d’une pierre de jaspe et de sardoine. Un arc-en-ciel entourait le trône, brillant comme l’émeraude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Autour du trône se trouvaient vingt-quatre trônes. Et sur ces trônes siégeaient vingt-quatre représentants du peuple de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être les représentants de l’ensemble des rachetés de l’ancienne et de la nouvelle alliance.
    marker-yv: yv-n
  - type: text
    text: '. Ils étaient vêtus de blanc, et portaient des couronnes d’or sur la tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Du trône jaillissaient des éclairs, des voix et des coups de tonnerre. Devant le trône brûlaient sept flambeaux ardents, qui sont les sept esprits de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Devant le trône s’étendait comme une mer de verre, transparente comme du cristal. Au milieu du trône et tout autour se tenaient quatre êtres vivants entièrement couverts d’yeux, devant et derrière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier d’entre eux ressemblait à un lion, le deuxième à un jeune taureau, le troisième avait le visage pareil à celui d’un homme et le quatrième était semblable à un aigle en plein vol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chacun de ces quatre êtres vivants avait six ailes couvertes d’yeux par-dessus et par-dessous. Jour et nuit, ils ne cessent de dire :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Saint, saint, saint
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: est le Seigneur Dieu
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 6.3
        metadata:
          usfm: ISA.6.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui était,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est et qui vient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et chaque fois que les êtres vivants présentent leur adoration, leur hommage et leur reconnaissance à celui qui siège sur le trône, à celui qui vit éternellement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les vingt-quatre représentants du peuple de Dieu se prosternent devant celui qui siège sur le trône et adorent celui qui vit éternellement. Ils déposent leurs couronnes devant le trône, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'en disant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es digne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: notre Seigneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’on te donne gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: honneur et puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as créé
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qui existe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’univers entier
- type: usfm
  marker: q1
  children:
  - type: text
    text: doit son existence
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa création
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ta volonté.
