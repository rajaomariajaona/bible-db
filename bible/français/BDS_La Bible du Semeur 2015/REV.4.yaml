document_id: REV.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sept sceaux
  - type: heading
    content: Une porte ouverte dans le ciel
  - type: text
    content: 'Après cela, je vis une porte ouverte dans le ciel. Et la voix que j’avais entendue me parler au début et qui résonnait comme une trompette me dit : '
  - type: text
    content: Monte ici, et je te montrerai ce qui doit arriver après cela.
  - type: heading
    content: La vision du trône de DieuCette vision rappelle en particulier la vision d’Ez 1.
  '10':
  - type: text
    content: 'les vingt-quatre représentants du peuple de Dieu se prosternent devant celui qui siège sur le trône et adorent celui qui vit éternellement. Ils déposent leurs couronnes devant le trône, '
  '11':
  - type: text
    content: 'en disant :'
  - type: text
    content: Tu es digne,
  - type: text
    content: notre Seigneur
  - type: text
    content: et notre Dieu,
  - type: text
    content: qu’on te donne gloire,
  - type: text
    content: honneur et puissance,
  - type: text
    content: car tu as créé
  - type: text
    content: tout ce qui existe,
  - type: text
    content: l’univers entier
  - type: text
    content: doit son existence
  - type: text
    content: et sa création
  - type: text
    content: à ta volonté.
  '2':
  - type: text
    content: 'A l’instant, l’Esprit se saisit de moi. Et voici : il y avait un trône dans le ciel. Et sur ce trône quelqu’un siégeait. '
  '3':
  - type: text
    content: Celui qui siégeait avait l’aspect d’une pierre de jaspe et de sardoine. Un arc-en-ciel entourait le trône, brillant comme l’émeraude.
  '4':
  - type: text
    content: Autour du trône se trouvaient vingt-quatre trônes. Et sur ces trônes siégeaient vingt-quatre représentants du peuple de Dieu
  - type: note
    content: Peut-être les représentants de l’ensemble des rachetés de l’ancienne et de la nouvelle alliance.
  - type: text
    content: '. Ils étaient vêtus de blanc, et portaient des couronnes d’or sur la tête. '
  '5':
  - type: text
    content: 'Du trône jaillissaient des éclairs, des voix et des coups de tonnerre. Devant le trône brûlaient sept flambeaux ardents, qui sont les sept esprits de Dieu. '
  '6':
  - type: text
    content: Devant le trône s’étendait comme une mer de verre, transparente comme du cristal. Au milieu du trône et tout autour se tenaient quatre êtres vivants entièrement couverts d’yeux, devant et derrière.
  '7':
  - type: text
    content: 'Le premier d’entre eux ressemblait à un lion, le deuxième à un jeune taureau, le troisième avait le visage pareil à celui d’un homme et le quatrième était semblable à un aigle en plein vol. '
  '8':
  - type: text
    content: 'Chacun de ces quatre êtres vivants avait six ailes couvertes d’yeux par-dessus et par-dessous. Jour et nuit, ils ne cessent de dire :'
  - type: text
    content: Saint, saint, saint
  - type: text
    content: est le Seigneur Dieu
  - type: text
    content: ' '
  - type: note
    content: Voir Es 6.3.
  - type: text
    content: ','
  - type: text
    content: le Tout-Puissant,
  - type: text
    content: celui qui était,
  - type: text
    content: qui est et qui vient.
  '9':
  - type: text
    content: 'Et chaque fois que les êtres vivants présentent leur adoration, leur hommage et leur reconnaissance à celui qui siège sur le trône, à celui qui vit éternellement, '
