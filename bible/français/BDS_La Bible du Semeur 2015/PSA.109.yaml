document_id: PSA.109,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sors de ton silence, ô Dieu !
  - type: text
    content: Au chef de chœur. Psaume de David.
  - type: text
    content: Dieu, toi que je loue, ╵ne reste pas silencieux,
  '10':
  - type: text
    content: que ses enfants soient errants, ╵qu’ils mendient leur pain
  - type: note
    content: 'Texte hébreu traditionnel. L’ancienne version grecque a : qu’ils soient expulsés.'
  - type: text
    content: ','
  - type: text
    content: et qu’ils soient réduits à quémander ╵loin de leur demeure en ruine !
  '11':
  - type: text
    content: Que le créancier ╵prenne tout son bien !
  - type: text
    content: Que des étrangers ravissent ╵le produit de son labeur !
  '12':
  - type: text
    content: Qu’il n’y ait personne ╵qui lui manifeste ╵de la bienveillance
  - type: text
    content: et qui ait pitié ╵de ses orphelins !
  '13':
  - type: text
    content: Que ses descendants ╵soient exterminés
  - type: text
    content: et qu’à la génération suivante, ╵leur nom disparaisse.
  '14':
  - type: text
    content: Que le péché de ses pères ╵soit pris en compte par l’Eternel,
  - type: text
    content: que les fautes de sa mère ╵ne soient jamais effacées !
  '15':
  - type: text
    content: Que l’Eternel constamment, ╵les ait en ligne de mire !
  - type: text
    content: Que leur souvenir ╵soit extirpé de la terre !
  '16':
  - type: text
    content: Car cet homme ╵ne s’est jamais appliqué ╵à agir avec bonté,
  - type: text
    content: et il a persécuté ╵le pauvre, le démuni,
  - type: text
    content: l’homme au cœur brisé, ╵jusqu’à le faire mourir.
  '17':
  - type: text
    content: 'Il aimait maudire : ╵que la malédiction vienne ╵le frapper !'
  - type: text
    content: 'Il refusait de bénir : ╵que la bénédiction fuie ╵loin de lui !'
  '18':
  - type: text
    content: Puisqu’il endossait ╵la malédiction ╵comme un vêtement,
  - type: text
    content: qu’elle le pénètre ╵comme ferait l’eau,
  - type: text
    content: et qu’elle entre en lui ╵jusque dans ses os ╵comme ferait l’huile
  - type: note
    content: Nb 5.17-28.
  - type: text
    content: '  !'
  '19':
  - type: text
    content: Qu’elle l’enveloppe ╵comme un vêtement,
  - type: text
    content: comme une ceinture ╵sans cesse attachée ╵autour de ses reins !
  '2':
  - type: text
    content: car des gens méchants ╵ouvrent contre moi ╵leur bouche empreinte de tromperie,
  - type: text
    content: et ils tiennent contre moi ╵des propos menteurs.
  '20':
  - type: text
    content: Que ce soit ainsi, ╵que l’Eternel paie ╵mes accusateurs
  - type: text
    content: et ceux qui me calomnient.
  '21':
  - type: text
    content: Et toi, Eternel, Seigneur,
  - type: text
    content: interviens en ma faveur ╵en vue de ta renommée !
  - type: text
    content: Toi dont l’amour est si bon, ╵viens me délivrer !
  '22':
  - type: text
    content: Je suis affligé et pauvre
  - type: text
    content: et mon cœur est déchiré ╵au-dedans de moi.
  '23':
  - type: text
    content: Comme l’ombre qui s’étire, ╵je m’évanouis ;
  - type: text
    content: et l’on me secoue ╵comme on le ferait ╵d’une sauterelle.
  '24':
  - type: text
    content: Mes genoux flageolent ╵par l’effet du jeûne
  - type: text
    content: et mon corps est amaigri.
  '25':
  - type: text
    content: Je suis, pour ces gens, ╵un sujet de raillerie.
  - type: text
    content: Dès qu’ils m’aperçoivent, ╵ils hochent la tête.
  '26':
  - type: text
    content: A l’aide, Eternel, mon Dieu !
  - type: text
    content: Sauve-moi dans ton amour !
  '27':
  - type: text
    content: Que mes ennemis ╵puissent reconnaître
  - type: text
    content: que c’est toi seul, Eternel, ╵toi seul qui as fait cela.
  '28':
  - type: text
    content: Ils peuvent maudire, ╵toi, tu béniras !
  - type: text
    content: Ils se dressent contre moi… ╵Ils seront couverts de honte !
  - type: text
    content: Et ton serviteur ╵sera dans la joie.
  '29':
  - type: text
    content: Que ceux qui m’accusent ╵soient couverts de déshonneur !
  - type: text
    content: Qu’ils soient revêtus de honte ╵comme d’un manteau !
  '3':
  - type: text
    content: Ils m’entourent de paroles ╵que la haine inspire.
  - type: text
    content: Sans cause, ils me font la guerre.
  '30':
  - type: text
    content: Je célébrerai ╵l’Eternel à pleine voix,
  - type: text
    content: et je le glorifierai ╵parmi les foules nombreuses,
  '31':
  - type: text
    content: car il se tient aux côtés du pauvre
  - type: text
    content: pour le délivrer ╵de ceux qui l’assignent ╵en justice.
  '4':
  - type: text
    content: Pour prix de mon amitié, ╵ils m’ont accusé,
  - type: text
    content: tandis que moi, je suis en prière.
  '5':
  - type: text
    content: Ils me font du mal ╵pour le bien que je leur fais,
  - type: text
    content: et mon amitié ╵est payée de haine.
  '6':
  - type: text
    content: Soumets-le à un méchant
  - type: note
    content: Dans les v. 6-19, le psalmiste lance des imprécations contre ses adversaires qui sont motivées par le souci que la justice soit rétablie pour la gloire de Dieu, ainsi que par le désir légitime d’être délivré de ses ennemis. D’autres comprennent ces versets comme une citation des propos tenus par les « gens méchants » contre le psalmiste.
  - type: text
    content: '  !'
  - type: text
    content: Qu’un accusateur ╵se tienne à sa droite !
  '7':
  - type: text
    content: Que, lors de son jugement, ╵il soit déclaré coupable,
  - type: text
    content: que sa prière serve ╵à le condamner !
  '8':
  - type: text
    content: Que ses jours soient abrégés,
  - type: text
    content: qu’un autre prenne sa charge
  - type: note
    content: Cité en Ac 1.20.
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Que ses fils soient orphelins,
  - type: text
    content: que sa femme reste veuve,
