document_id: PSA.109
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sors de ton silence, ô Dieu !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, toi que je loue, ╵ne reste pas silencieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car des gens méchants ╵ouvrent contre moi ╵leur bouche empreinte de tromperie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils tiennent contre moi ╵des propos menteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils m’entourent de paroles ╵que la haine inspire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans cause, ils me font la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pour prix de mon amitié, ╵ils m’ont accusé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que moi, je suis en prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils me font du mal ╵pour le bien que je leur fais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon amitié ╵est payée de haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Soumets-le à un méchant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans les v. 6-19, le psalmiste lance des imprécations contre ses adversaires qui sont motivées par le souci que la justice soit rétablie pour la gloire de Dieu, ainsi que par le désir légitime d’être délivré de ses ennemis. D’autres comprennent ces versets comme une citation des propos tenus par les « gens méchants » contre le psalmiste.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’un accusateur ╵se tienne à sa droite !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que, lors de son jugement, ╵il soit déclaré coupable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sa prière serve ╵à le condamner !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que ses jours soient abrégés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un autre prenne sa charge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1.20
        metadata:
          usfm: ACT.1.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que ses fils soient orphelins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sa femme reste veuve,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: que ses enfants soient errants, ╵qu’ils mendient leur pain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’ils soient expulsés.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils soient réduits à quémander ╵loin de leur demeure en ruine !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que le créancier ╵prenne tout son bien !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que des étrangers ravissent ╵le produit de son labeur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qu’il n’y ait personne ╵qui lui manifeste ╵de la bienveillance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ait pitié ╵de ses orphelins !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que ses descendants ╵soient exterminés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’à la génération suivante, ╵leur nom disparaisse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que le péché de ses pères ╵soit pris en compte par l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les fautes de sa mère ╵ne soient jamais effacées !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que l’Eternel constamment, ╵les ait en ligne de mire !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leur souvenir ╵soit extirpé de la terre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car cet homme ╵ne s’est jamais appliqué ╵à agir avec bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a persécuté ╵le pauvre, le démuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’homme au cœur brisé, ╵jusqu’à le faire mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il aimait maudire : ╵que la malédiction vienne ╵le frapper !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il refusait de bénir : ╵que la bénédiction fuie ╵loin de lui !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Puisqu’il endossait ╵la malédiction ╵comme un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle le pénètre ╵comme ferait l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elle entre en lui ╵jusque dans ses os ╵comme ferait l’huile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 5.17-28
        metadata:
          usfm: NUM.5.17+NUM.5.18+NUM.5.19+NUM.5.20+NUM.5.21+NUM.5.22+NUM.5.23+NUM.5.24+NUM.5.25+NUM.5.26+NUM.5.27+NUM.5.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu’elle l’enveloppe ╵comme un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une ceinture ╵sans cesse attachée ╵autour de ses reins !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Que ce soit ainsi, ╵que l’Eternel paie ╵mes accusateurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui me calomnient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et toi, Eternel, Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: interviens en ma faveur ╵en vue de ta renommée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi dont l’amour est si bon, ╵viens me délivrer !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je suis affligé et pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon cœur est déchiré ╵au-dedans de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Comme l’ombre qui s’étire, ╵je m’évanouis ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on me secoue ╵comme on le ferait ╵d’une sauterelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mes genoux flageolent ╵par l’effet du jeûne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon corps est amaigri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je suis, pour ces gens, ╵un sujet de raillerie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès qu’ils m’aperçoivent, ╵ils hochent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A l’aide, Eternel, mon Dieu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi dans ton amour !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Que mes ennemis ╵puissent reconnaître
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c’est toi seul, Eternel, ╵toi seul qui as fait cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils peuvent maudire, ╵toi, tu béniras !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se dressent contre moi… ╵Ils seront couverts de honte !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton serviteur ╵sera dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que ceux qui m’accusent ╵soient couverts de déshonneur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient revêtus de honte ╵comme d’un manteau !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je célébrerai ╵l’Eternel à pleine voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le glorifierai ╵parmi les foules nombreuses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: car il se tient aux côtés du pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le délivrer ╵de ceux qui l’assignent ╵en justice.
