document_id: 2JN.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’Ancien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’était sans doute le titre sous lequel Jean était connu dans les Eglises, étant le seul apôtre encore en vie.
    marker-yv: yv-n
  - type: text
    text: ', à la Dame que Dieu a choisie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il faut très certainement prendre le terme de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kyria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(féminin de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kyrios, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'le Seigneur) dans le sens symbolique : l’épître est adressée à une Eglise, ses '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'enfants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en sont les membres.
    marker-yv: yv-n
  - type: text
    text: ' et à ses enfants que j’aime dans la vérité. Ce n’est pas moi seul qui vous aime, mais aussi tous ceux qui connaissent la vérité, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: à cause de la vérité qui demeure en nous et qui sera éternellement avec nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La grâce, la compassion et la paix qui nous viennent de Dieu, le Père, et de Jésus-Christ, le Fils du Père, seront avec nous pour que nous en vivions dans la vérité et dans l’amour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le commandement d’aimer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J’ai éprouvé une très grande joie à voir certains de tes enfants vivre selon la vérité, comme nous en avons reçu le commandement du Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A présent, chère Dame, voici ce que je te demande – ce n’est pas un commandement nouveau que je t’écris, c’est celui que nous avons reçu dès le commencement : aimons-nous les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et voici en quoi consiste l’amour : c’est que nous vivions selon les commandements de Dieu. Tel est le commandement selon lequel nous devons vivre, comme vous l’avez entendu depuis le commencement.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fidélité à la vérité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Un grand nombre de personnes qui entraînent les autres dans l’erreur se sont répandues à travers le monde. Ils ne reconnaissent pas que c’est pleinement humain que Jésus est venu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 4.3
        metadata:
          usfm: 1JN.4.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Qui fait partie de ces gens est trompeur, c’est l’anti-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Prenez donc garde à vous-mêmes, pour que vous ne perdiez pas le fruit de nos efforts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vos efforts.
    marker-yv: yv-n
  - type: text
    text: ', mais que vous receviez une pleine récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui ne reste pas attaché à l’enseignement qui concerne Christ, mais veut le dépasser, n’a pas de communion avec Dieu. Celui qui se tient à cet enseignement est uni au Père comme au Fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si quelqu’un vient vous trouver et ne vous apporte pas cet enseignement, ne l’accueillez pas dans votre maison, et ne lui adressez pas la salutation fraternelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agirait de la salutation d’accueil dans l’Eglise qui se réunissait à l’époque dans une maison (voir Rm 16.4 ; Phm 2). Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne l’accueillez pas chez vous et ne lui adressez pas de salutation.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Celui qui lui souhaiterait la bienvenue se rendrait complice de ses œuvres mauvaises.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Projet de visite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: J’aurais encore bien des choses à vous écrire, mais je ne veux pas vous les communiquer avec du papier et de l’encre. J’espère pouvoir me rendre chez vous et m’entretenir avec vous de vive voix. Alors notre joie sera entière.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation finale
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les enfants de ta sœur que Dieu a choisie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire, selon l’interprétation proposée du v. 1, les membres de l’Eglise à laquelle appartient Jean.
    marker-yv: yv-n
  - type: text
    text: ' t’adressent leurs salutations.'
