document_id: 2JN.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: L’Ancien
  - type: note
    content: C’était sans doute le titre sous lequel Jean était connu dans les Eglises, étant le seul apôtre encore en vie.
  - type: text
    content: ', à la Dame que Dieu a choisie'
  - type: note
    content: 'Il faut très certainement prendre le terme de Kyria (féminin de Kyrios, le Seigneur) dans le sens symbolique : l’épître est adressée à une Eglise, ses enfants en sont les membres.'
  - type: text
    content: ' et à ses enfants que j’aime dans la vérité. Ce n’est pas moi seul qui vous aime, mais aussi tous ceux qui connaissent la vérité, '
  '10':
  - type: text
    content: Si quelqu’un vient vous trouver et ne vous apporte pas cet enseignement, ne l’accueillez pas dans votre maison, et ne lui adressez pas la salutation fraternelle
  - type: note
    content: 'Il s’agirait de la salutation d’accueil dans l’Eglise qui se réunissait à l’époque dans une maison (voir Rm 16.4 ; Phm 2). Certains comprennent : ne l’accueillez pas chez vous et ne lui adressez pas de salutation.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Celui qui lui souhaiterait la bienvenue se rendrait complice de ses œuvres mauvaises.
  - type: heading
    content: Projet de visite
  '12':
  - type: text
    content: J’aurais encore bien des choses à vous écrire, mais je ne veux pas vous les communiquer avec du papier et de l’encre. J’espère pouvoir me rendre chez vous et m’entretenir avec vous de vive voix. Alors notre joie sera entière.
  - type: heading
    content: Salutation finale
  '13':
  - type: text
    content: Les enfants de ta sœur que Dieu a choisie
  - type: note
    content: C’est-à-dire, selon l’interprétation proposée du v. 1, les membres de l’Eglise à laquelle appartient Jean.
  - type: text
    content: ' t’adressent leurs salutations.'
  '2':
  - type: text
    content: à cause de la vérité qui demeure en nous et qui sera éternellement avec nous.
  '3':
  - type: text
    content: La grâce, la compassion et la paix qui nous viennent de Dieu, le Père, et de Jésus-Christ, le Fils du Père, seront avec nous pour que nous en vivions dans la vérité et dans l’amour.
  - type: heading
    content: Le commandement d’aimer
  '4':
  - type: text
    content: J’ai éprouvé une très grande joie à voir certains de tes enfants vivre selon la vérité, comme nous en avons reçu le commandement du Père.
  '5':
  - type: text
    content: 'A présent, chère Dame, voici ce que je te demande – ce n’est pas un commandement nouveau que je t’écris, c’est celui que nous avons reçu dès le commencement : aimons-nous les uns les autres. '
  '6':
  - type: text
    content: 'Et voici en quoi consiste l’amour : c’est que nous vivions selon les commandements de Dieu. Tel est le commandement selon lequel nous devons vivre, comme vous l’avez entendu depuis le commencement.'
  - type: heading
    content: La fidélité à la vérité
  '7':
  - type: text
    content: Un grand nombre de personnes qui entraînent les autres dans l’erreur se sont répandues à travers le monde. Ils ne reconnaissent pas que c’est pleinement humain que Jésus est venu
  - type: note
    content: Voir note 1 Jn 4.3.
  - type: text
    content: . Qui fait partie de ces gens est trompeur, c’est l’anti-Christ.
  '8':
  - type: text
    content: Prenez donc garde à vous-mêmes, pour que vous ne perdiez pas le fruit de nos efforts
  - type: note
    content: 'Certains manuscrits ont : vos efforts.'
  - type: text
    content: ', mais que vous receviez une pleine récompense. '
  '9':
  - type: text
    content: Celui qui ne reste pas attaché à l’enseignement qui concerne Christ, mais veut le dépasser, n’a pas de communion avec Dieu. Celui qui se tient à cet enseignement est uni au Père comme au Fils.
