document_id: PSA.84
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Je soupire après ton temple
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un psaume des Qoréites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42.1'
        metadata:
          usfm: PSA.42.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', à chanter avec accompagnement de la harpe de Gath'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.1'
        metadata:
          usfm: PSA.8.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oh ! Comme tes demeures sont désirables !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, ╵Seigneur des armées célestes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je languis et je soupire, ╵Eternel, après tes parvis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon être entier crie sa joie ╵vers le Dieu vivant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le moineau découvre un gîte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’hirondelle trouve un nid ╵où déposer ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: près de tes autels, ╵Eternel, ╵Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Roi et mon Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Bienheureux ceux qui habitent ╵ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils pourront te louer toujours.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Bienheureux les hommes ╵dont tu es la force :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans leur cœur, ils trouvent ╵des chemins tracés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car lorsqu’ils traversent ╵la vallée des Larmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vallée des Baumiers, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui serait une vallée inconnue. En hébreu, le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'baumier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: larme.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils en font une oasis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs manuscrits hébreux et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il (Dieu) en fait une oasis.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la pluie d’automne ╵vient la recouvrir ╵de bénédictions
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En modifiant légèrement le texte hébreu traditionnel, on obtient le sens : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’étangs.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: D’étape en étape, ╵leur vigueur s’accroît
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se présentent ╵à Dieu en Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eternel, ╵ô Dieu des armées célestes, ╵entends ma prière !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veuille m’écouter, ╵ô Dieu de Jacob !
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi, ô Dieu, qui es ╵notre bouclier, ╵veuille regarder
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’homme qui a reçu de ta part ╵l’onction d’huile, ╵et lui faire bon accueil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '84.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: O Dieu, veuille considérer celui qui est notre bouclier, l’homme qui a reçu…
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car un jour dans tes parvis ╵vaut bien mieux que mille ailleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plutôt rester sur le seuil ╵de la maison de mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de demeurer ╵sous les tentes des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car l’Eternel Dieu ╵est pour nous comme un soleil, ╵il est comme un bouclier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel accorde ╵bienveillance et gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne refuse aucun bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ceux qui cheminent ╵dans l’intégrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eternel, ╵Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bienheureux est l’homme ╵qui met sa confiance en toi.
