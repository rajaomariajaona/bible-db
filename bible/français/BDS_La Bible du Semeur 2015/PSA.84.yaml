document_id: PSA.84,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Je soupire après ton temple
  - type: text
    content: Au chef de chœur. Un psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: ', à chanter avec accompagnement de la harpe de Gath'
  - type: note
    content: Voir note 8.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Toi, ô Dieu, qui es ╵notre bouclier, ╵veuille regarder
  - type: text
    content: l’homme qui a reçu de ta part ╵l’onction d’huile, ╵et lui faire bon accueil
  - type: note
    content: 'Autre traduction : O Dieu, veuille considérer celui qui est notre bouclier, l’homme qui a reçu…'
  - type: text
    content: .
  '11':
  - type: text
    content: Car un jour dans tes parvis ╵vaut bien mieux que mille ailleurs.
  - type: text
    content: Plutôt rester sur le seuil ╵de la maison de mon Dieu,
  - type: text
    content: que de demeurer ╵sous les tentes des méchants.
  '12':
  - type: text
    content: Car l’Eternel Dieu ╵est pour nous comme un soleil, ╵il est comme un bouclier.
  - type: text
    content: L’Eternel accorde ╵bienveillance et gloire,
  - type: text
    content: il ne refuse aucun bien
  - type: text
    content: à ceux qui cheminent ╵dans l’intégrité.
  '13':
  - type: text
    content: Eternel, ╵Seigneur des armées célestes,
  - type: text
    content: bienheureux est l’homme ╵qui met sa confiance en toi.
  '2':
  - type: text
    content: Oh ! Comme tes demeures sont désirables !
  - type: text
    content: Eternel, ╵Seigneur des armées célestes !
  '3':
  - type: text
    content: Je languis et je soupire, ╵Eternel, après tes parvis,
  - type: text
    content: mon être entier crie sa joie ╵vers le Dieu vivant.
  '4':
  - type: text
    content: Le moineau découvre un gîte,
  - type: text
    content: l’hirondelle trouve un nid ╵où déposer ses petits,
  - type: text
    content: près de tes autels, ╵Eternel, ╵Seigneur des armées célestes,
  - type: text
    content: mon Roi et mon Dieu !
  '5':
  - type: text
    content: Bienheureux ceux qui habitent ╵ta maison,
  - type: text
    content: car ils pourront te louer toujours.
  - type: text
    content: Pause
  '6':
  - type: text
    content: 'Bienheureux les hommes ╵dont tu es la force :'
  - type: text
    content: dans leur cœur, ils trouvent ╵des chemins tracés.
  '7':
  - type: text
    content: Car lorsqu’ils traversent ╵la vallée des Larmes
  - type: note
    content: 'Autre traduction : vallée des Baumiers, qui serait une vallée inconnue. En hébreu, le mot baumier fait assonance avec le mot larme.'
  - type: text
    content: ','
  - type: text
    content: ils en font une oasis
  - type: note
    content: 'Plusieurs manuscrits hébreux et l’ancienne version grecque ont : il (Dieu) en fait une oasis.'
  - type: text
    content: ','
  - type: text
    content: et la pluie d’automne ╵vient la recouvrir ╵de bénédictions
  - type: note
    content: 'En modifiant légèrement le texte hébreu traditionnel, on obtient le sens : d’étangs.'
  - type: text
    content: .
  '8':
  - type: text
    content: D’étape en étape, ╵leur vigueur s’accroît
  - type: text
    content: et ils se présentent ╵à Dieu en Sion.
  '9':
  - type: text
    content: Eternel, ╵ô Dieu des armées célestes, ╵entends ma prière !
  - type: text
    content: Veuille m’écouter, ╵ô Dieu de Jacob !
  - type: text
    content: Pause
