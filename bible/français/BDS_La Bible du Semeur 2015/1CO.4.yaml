document_id: 1CO.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Des intendants au service de Christ
  - type: text
    content: 'Ainsi, qu’on nous considère comme de simples serviteurs de Christ, des intendants chargés des secrets de Dieu. '
  '10':
  - type: text
    content: Nous sommes fous à cause de Christ, mais vous, vous êtes sages en Christ ! Nous sommes faibles, mais vous, vous êtes forts ! Vous êtes honorés, nous, nous sommes méprisés.
  '11':
  - type: text
    content: 'Jusqu’à présent, nous souffrons la faim et la soif, nous sommes mal vêtus, exposés aux coups, errant de lieu en lieu. '
  '12':
  - type: text
    content: 'Nous nous épuisons à travailler de nos propres mains. On nous insulte ? Nous bénissons. On nous persécute ? Nous le supportons. '
  '13':
  - type: text
    content: On nous calomnie ? Nous répondons par des paroles bienveillantes. Jusqu’à maintenant, nous sommes devenus comme les déchets du monde et traités comme le rebut de l’humanité.
  - type: heading
    content: L’autorité de Paul
  '14':
  - type: text
    content: 'Si j’écris ainsi, ce n’est pas pour vous remplir de confusion. C’est pour vous mettre en garde comme des enfants bien-aimés. '
  '15':
  - type: text
    content: En effet, même si vous aviez dix mille maîtres dans la foi
  - type: note
    content: Le terme grec employé ici, et qui a donné en français notre mot « pédagogue », désignait les esclaves chargés de conduire les enfants à l’école ou de les enseigner (comparer Ga 3.24).
  - type: text
    content: ' en Christ, vous n’avez pas plusieurs pères. Car c’est moi qui vous ai fait naître à la foi en Jésus-Christ en vous annonçant l’Evangile. '
  '16':
  - type: text
    content: Je vous invite donc à suivre mon exemple.
  '17':
  - type: text
    content: C’est dans cette intention que je vous ai envoyé Timothée
  - type: note
    content: Paul avait envoyé Timothée à Corinthe en passant par la Macédoine. La lettre, expédiée par mer, arrivera avant lui à Corinthe, d’où le futur dans ce verset.
  - type: text
    content: ', mon enfant bien-aimé et fidèle dans le Seigneur. Il vous rappellera les principes de vie chrétienne qui sont les miens, tels que je les enseigne partout dans toutes les Eglises.'
  '18':
  - type: text
    content: 'Pensant que désormais je ne reviendrai plus chez vous, certains se sont mis à jouer les importants. '
  '19':
  - type: text
    content: 'Mais, si le Seigneur le veut, j’irai très prochainement vous voir et alors je me rendrai compte, non pas des beaux discours que ces prétentieux peuvent tenir, mais de ce dont ils sont capables. '
  '2':
  - type: text
    content: Or, en fin de compte, que demande-t-on à des intendants ? Qu’ils accomplissent fidèlement la tâche qui leur a été confiée.
  '20':
  - type: text
    content: Car le royaume de Dieu ne consiste pas en paroles, mais en puissance.
  '21':
  - type: text
    content: Que préférez-vous ? Que je vienne chez vous avec un bâton, ou avec un esprit d’amour et de douceur ?
  '3':
  - type: text
    content: 'Pour ma part, peu m’importe le jugement que vous, ou une instance humaine, pouvez porter sur moi. D’ailleurs, je ne me juge pas non plus moi-même. '
  '4':
  - type: text
    content: 'Car, bien que je n’aie rien à me reprocher, ce n’est pas cela qui fait de moi un juste. Celui qui me juge, c’est le Seigneur. '
  '5':
  - type: text
    content: Ne jugez donc pas avant le temps. Attendez que le Seigneur revienne. Il mettra en lumière tout ce qui est caché dans les ténèbres et il dévoilera les intentions véritables qui animent les cœurs. Alors chacun recevra de Dieu la louange qui lui revient.
  - type: heading
    content: L’orgueil des Corinthiens
  '6':
  - type: text
    content: Frères et sœurs, je viens d’employer diverses images à propos d’Apollos et de moi-même pour que vous appreniez, à notre sujet, à appliquer cette règle
  - type: note
    content: 'D’autres comprennent : pour que notre exemple vous aide à comprendre cette règle.'
  - type: text
    content: '  : « Ne pas aller au-delà de ce qui est écrit'
  - type: note
    content: 'Le texte grec est difficile. Certains manuscrits ont : à ne pas penser au-delà.'
  - type: text
    content: '  », et ainsi qu’aucun de vous ne s’enfle d’orgueil en prenant le parti de l’un contre l’autre.'
  '7':
  - type: text
    content: Car qui te confère une distinction ? Qu’as-tu qui ne t’ait été donné ? Et puisqu’on t’a tout donné, pourquoi t’en vanter comme si tu ne l’avais pas reçu ?
  '8':
  - type: text
    content: Dès à présent, vous êtes rassasiés. Déjà, vous voilà riches ! Vous avez commencé à régner sans nous.
  - type: text
    content: 'Comme je voudrais que vous soyez effectivement en train de régner, pour que nous soyons rois avec vous. '
  '9':
  - type: text
    content: 'Mais il me semble plutôt que Dieu nous a assigné, à nous autres apôtres, la dernière place, comme à des condamnés à mort car, comme eux, il nous a livrés en spectacle au monde entier : aux anges et aux hommes'
  - type: note
    content: Les condamnés à mort étaient envoyés dans le cirque pour lutter contre les bêtes féroces.
  - type: text
    content: .
