document_id: 1CO.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des intendants au service de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi, qu’on nous considère comme de simples serviteurs de Christ, des intendants chargés des secrets de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Or, en fin de compte, que demande-t-on à des intendants ? Qu’ils accomplissent fidèlement la tâche qui leur a été confiée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour ma part, peu m’importe le jugement que vous, ou une instance humaine, pouvez porter sur moi. D’ailleurs, je ne me juge pas non plus moi-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car, bien que je n’aie rien à me reprocher, ce n’est pas cela qui fait de moi un juste. Celui qui me juge, c’est le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne jugez donc pas avant le temps. Attendez que le Seigneur revienne. Il mettra en lumière tout ce qui est caché dans les ténèbres et il dévoilera les intentions véritables qui animent les cœurs. Alors chacun recevra de Dieu la louange qui lui revient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’orgueil des Corinthiens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Frères et sœurs, je viens d’employer diverses images à propos d’Apollos et de moi-même pour que vous appreniez, à notre sujet, à appliquer cette règle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour que notre exemple vous aide à comprendre cette règle.
    marker-yv: yv-n
  - type: text
    text: '  : « Ne pas aller au-delà de ce qui est écrit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte grec est difficile. Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ne pas penser au-delà.
    marker-yv: yv-n
  - type: text
    text: '  », et ainsi qu’aucun de vous ne s’enfle d’orgueil en prenant le parti de l’un contre l’autre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car qui te confère une distinction ? Qu’as-tu qui ne t’ait été donné ? Et puisqu’on t’a tout donné, pourquoi t’en vanter comme si tu ne l’avais pas reçu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dès à présent, vous êtes rassasiés. Déjà, vous voilà riches ! Vous avez commencé à régner sans nous.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Comme je voudrais que vous soyez effectivement en train de régner, pour que nous soyons rois avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais il me semble plutôt que Dieu nous a assigné, à nous autres apôtres, la dernière place, comme à des condamnés à mort car, comme eux, il nous a livrés en spectacle au monde entier : aux anges et aux hommes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les condamnés à mort étaient envoyés dans le cirque pour lutter contre les bêtes féroces.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous sommes fous à cause de Christ, mais vous, vous êtes sages en Christ ! Nous sommes faibles, mais vous, vous êtes forts ! Vous êtes honorés, nous, nous sommes méprisés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jusqu’à présent, nous souffrons la faim et la soif, nous sommes mal vêtus, exposés aux coups, errant de lieu en lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous nous épuisons à travailler de nos propres mains. On nous insulte ? Nous bénissons. On nous persécute ? Nous le supportons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On nous calomnie ? Nous répondons par des paroles bienveillantes. Jusqu’à maintenant, nous sommes devenus comme les déchets du monde et traités comme le rebut de l’humanité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autorité de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si j’écris ainsi, ce n’est pas pour vous remplir de confusion. C’est pour vous mettre en garde comme des enfants bien-aimés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: En effet, même si vous aviez dix mille maîtres dans la foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme grec employé ici, et qui a donné en français notre mot « pédagogue », désignait les esclaves chargés de conduire les enfants à l’école ou de les enseigner (comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3.24
        metadata:
          usfm: GAL.3.24
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' en Christ, vous n’avez pas plusieurs pères. Car c’est moi qui vous ai fait naître à la foi en Jésus-Christ en vous annonçant l’Evangile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je vous invite donc à suivre mon exemple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est dans cette intention que je vous ai envoyé Timothée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul avait envoyé Timothée à Corinthe en passant par la Macédoine. La lettre, expédiée par mer, arrivera avant lui à Corinthe, d’où le futur dans ce verset.
    marker-yv: yv-n
  - type: text
    text: ', mon enfant bien-aimé et fidèle dans le Seigneur. Il vous rappellera les principes de vie chrétienne qui sont les miens, tels que je les enseigne partout dans toutes les Eglises.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pensant que désormais je ne reviendrai plus chez vous, certains se sont mis à jouer les importants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais, si le Seigneur le veut, j’irai très prochainement vous voir et alors je me rendrai compte, non pas des beaux discours que ces prétentieux peuvent tenir, mais de ce dont ils sont capables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car le royaume de Dieu ne consiste pas en paroles, mais en puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que préférez-vous ? Que je vienne chez vous avec un bâton, ou avec un esprit d’amour et de douceur ?
