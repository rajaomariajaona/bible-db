document_id: PSA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu tient ses promesses
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, un psaume de David, à chanter avec accompagnement de la harpe à huit cordes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: PSA.6.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Au secours, ô Eternel ! ╵Il n’y a plus d’homme pieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne peut plus se fier ╵à personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Chacun trompe son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui disant des flatteries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la duplicité au cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que l’Eternel extermine ╵ces gens aux lèvres flatteuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à la langue arrogante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Qu’il retranche ceux qui disent : ╵« Notre langue nous rend forts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos alliées, ce sont nos lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui dominerait sur nous ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais l’Eternel dit : ╵« A cause des pauvres ╵qui sont opprimés ╵et des démunis ╵qui vont gémissant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant, moi j’interviens
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour accorder le salut ╵à ceux qui sont méprisés. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les paroles du Seigneur, ╵ce sont des paroles pures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est de l’argent affiné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sept fois purifié ╵par le feu dans un creuset
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La traduction est incertaine.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eternel, toi, tu nous gardes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après quelques manuscrits hébreux et l’ancienne version grecque. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu les gardes.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu nous protégeras ╵toujours contre ces individus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tout autour, des méchants rôdent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la bassesse prédomine ╵parmi les humains.
