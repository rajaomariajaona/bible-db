document_id: PSA.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu tient ses promesses
  - type: text
    content: Au chef de chœur, un psaume de David, à chanter avec accompagnement de la harpe à huit cordes
  - type: note
    content: Voir note 6.1.
  - type: text
    content: .
  '2':
  - type: text
    content: Au secours, ô Eternel ! ╵Il n’y a plus d’homme pieux,
  - type: text
    content: on ne peut plus se fier ╵à personne.
  '3':
  - type: text
    content: Chacun trompe son prochain,
  - type: text
    content: lui disant des flatteries,
  - type: text
    content: la duplicité au cœur.
  '4':
  - type: text
    content: Que l’Eternel extermine ╵ces gens aux lèvres flatteuses
  - type: text
    content: et à la langue arrogante.
  '5':
  - type: text
    content: 'Qu’il retranche ceux qui disent : ╵« Notre langue nous rend forts,'
  - type: text
    content: nos alliées, ce sont nos lèvres,
  - type: text
    content: qui dominerait sur nous ? »
  '6':
  - type: text
    content: 'Mais l’Eternel dit : ╵« A cause des pauvres ╵qui sont opprimés ╵et des démunis ╵qui vont gémissant,'
  - type: text
    content: maintenant, moi j’interviens
  - type: text
    content: pour accorder le salut ╵à ceux qui sont méprisés. »
  '7':
  - type: text
    content: Les paroles du Seigneur, ╵ce sont des paroles pures,
  - type: text
    content: c’est de l’argent affiné,
  - type: text
    content: sept fois purifié ╵par le feu dans un creuset
  - type: note
    content: La traduction est incertaine.
  - type: text
    content: .
  '8':
  - type: text
    content: Eternel, toi, tu nous gardes
  - type: note
    content: 'D’après quelques manuscrits hébreux et l’ancienne version grecque. Texte hébreu traditionnel : tu les gardes.'
  - type: text
    content: et tu nous protégeras ╵toujours contre ces individus.
  '9':
  - type: text
    content: Tout autour, des méchants rôdent,
  - type: text
    content: la bassesse prédomine ╵parmi les humains.
