document_id: JOB.36,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu éduque l’homme par la souffrance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elihou continua en ces termes :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ouvre leurs oreilles ╵aux avertissements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il leur dit : ╵« Détournez-vous du mal. »'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils écoutent, et se soumettent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils finissent leurs jours ╵dans le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs années s’achèvent ╵dans les délices.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais s’ils n’écoutent pas, ╵ils auront à subir ╵les coups du javelot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils expireront, ╵faute d’avoir reçu ╵la connaissance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à ceux qui rejettent Dieu, ╵ils gardent leur colère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s’exposent à la colère de Dieu.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne crient pas à l’aide ╵quand il les lie de chaînes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi, leur vie s’éteint ╵en pleine fleur de l’âge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils la terminent ╵parmi les prostitués sacrés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu délivre l’affligé ╵par son affliction même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est par la souffrance ╵qu’il le dispose à l’écouter.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi aussi, il t’arrachera ╵à la détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour t’établir au large ╵sans rien pour te gêner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour charger ta table ╵d’aliments savoureux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais maintenant si tu adoptes ╵le jugement des criminels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la justice et le jugement ╵se saisiront de toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la colère ╵ne t’incite donc pas ╵à te moquer de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne t’égare pas ╵parce que la rançon ╵est bien trop grande
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hébreu obscur. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Prends garde de ne pas te laisser séduire par des largesses, et ne te laisse pas égarer par un pot-de-vin.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes cris suffiraient-ils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou même tes plus grands efforts, ╵pour te faire échapper ╵à la détresse ?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accepte encore un peu ╵que je t’enseigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il y a encore à dire ╵pour la cause de Dieu.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne soupire donc pas ╵après la nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui balaiera les peuples !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais attention ! ╵Ne te tourne pas vers le mal !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la souffrance t’y dispose
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ne te tourne pas vers le mal que tu préférerais à la souffrance.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois, Dieu est souverain ╵par sa puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel maître enseigne comme lui ?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui inspectera sa conduite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qui lui dictera sa conduite ?
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui lui a jamais dit : ╵« Ce que tu fais est mal » ?'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais souviens-toi plutôt ╵de célébrer son œuvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que chantent les humains.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le monde la voit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout être humain ╵la regarde de loin.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vois combien Dieu est grand : cela dépasse ╵notre compréhension.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul ne peut calculer ╵le nombre de ses ans.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c’est lui qui attire ╵les gouttelettes d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les distille en pluie, ╵il en fait de la brume.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuées répandent la pluie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles la déversent ╵en trombes sur les hommes.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui prétendrait comprendre ╵l’expansion des nuages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les coups de tonnerre ╵dont retentit sa tente ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De loin, je tirerai ma science, ╵oui, de très loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je rendrai justice ╵à celui qui m’a fait.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois, tout autour, ╵scintiller ses éclairs ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est lui encore qui recouvre ╵les profondeurs des mers.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par tous ces éléments, ╵Dieu régit les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il pourvoit les hommes ╵de nourriture en abondance.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en ses mains ╵il cache des éclairs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: auxquels il assigne une cible.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bruit de son tonnerre ╵annonce sa venue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et même les troupeaux ╵pressentent son approche.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vraiment, mes discours ╵ne sont pas des mensonges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je m’adresse à toi ╵avec un savoir sûr.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien que puissant, ╵Dieu n’a de dédain pour personne ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est puissant, ╵il est aussi déterminé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne permettra pas ╵que vive le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait justice aux opprimés,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne détourne pas ╵ses yeux des hommes justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il les fait asseoir ╵sur un trône à côté des rois.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les y établit ╵pour siéger à jamais ; ╵ainsi il les honore.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils sont liés de chaînes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou pris dans les liens du malheur,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est qu’il leur dénonce leurs actes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fautes que dans leur orgueil ╵ils ont commises.
