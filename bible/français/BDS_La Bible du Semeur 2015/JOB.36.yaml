document_id: JOB.36,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu éduque l’homme par la souffrance
  - type: text
    content: 'Elihou continua en ces termes :'
  '10':
  - type: text
    content: Il ouvre leurs oreilles ╵aux avertissements
  - type: text
    content: 'et il leur dit : ╵« Détournez-vous du mal. »'
  '11':
  - type: text
    content: S’ils écoutent, et se soumettent,
  - type: text
    content: ils finissent leurs jours ╵dans le bonheur,
  - type: text
    content: et leurs années s’achèvent ╵dans les délices.
  '12':
  - type: text
    content: Mais s’ils n’écoutent pas, ╵ils auront à subir ╵les coups du javelot
  - type: text
    content: et ils expireront, ╵faute d’avoir reçu ╵la connaissance.
  '13':
  - type: text
    content: Quant à ceux qui rejettent Dieu, ╵ils gardent leur colère
  - type: note
    content: 'Autre traduction : ils s’exposent à la colère de Dieu.'
  - type: text
    content: ','
  - type: text
    content: ils ne crient pas à l’aide ╵quand il les lie de chaînes.
  '14':
  - type: text
    content: Aussi, leur vie s’éteint ╵en pleine fleur de l’âge,
  - type: text
    content: ils la terminent ╵parmi les prostitués sacrés.
  '15':
  - type: text
    content: Mais Dieu délivre l’affligé ╵par son affliction même,
  - type: text
    content: et c’est par la souffrance ╵qu’il le dispose à l’écouter.
  '16':
  - type: text
    content: Toi aussi, il t’arrachera ╵à la détresse
  - type: text
    content: pour t’établir au large ╵sans rien pour te gêner,
  - type: text
    content: et pour charger ta table ╵d’aliments savoureux.
  '17':
  - type: text
    content: Mais maintenant si tu adoptes ╵le jugement des criminels,
  - type: text
    content: la justice et le jugement ╵se saisiront de toi.
  '18':
  - type: text
    content: Que la colère ╵ne t’incite donc pas ╵à te moquer de Dieu,
  - type: text
    content: et ne t’égare pas ╵parce que la rançon ╵est bien trop grande
  - type: note
    content: 'Hébreu obscur. Autre traduction : Prends garde de ne pas te laisser séduire par des largesses, et ne te laisse pas égarer par un pot-de-vin.'
  - type: text
    content: .
  '19':
  - type: text
    content: Tes cris suffiraient-ils
  - type: text
    content: ou même tes plus grands efforts, ╵pour te faire échapper ╵à la détresse ?
  '2':
  - type: text
    content: Accepte encore un peu ╵que je t’enseigne,
  - type: text
    content: car il y a encore à dire ╵pour la cause de Dieu.
  '20':
  - type: text
    content: Ne soupire donc pas ╵après la nuit
  - type: text
    content: qui balaiera les peuples !
  '21':
  - type: text
    content: Fais attention ! ╵Ne te tourne pas vers le mal !
  - type: text
    content: Car la souffrance t’y dispose
  - type: note
    content: 'Autre traduction : Ne te tourne pas vers le mal que tu préférerais à la souffrance.'
  - type: text
    content: .
  '22':
  - type: text
    content: Vois, Dieu est souverain ╵par sa puissance.
  - type: text
    content: Quel maître enseigne comme lui ?
  '23':
  - type: text
    content: Qui inspectera sa conduite
  - type: note
    content: 'Autre traduction : Qui lui dictera sa conduite ?'
  - type: text
    content: '  ?'
  - type: text
    content: 'Qui lui a jamais dit : ╵« Ce que tu fais est mal » ?'
  '24':
  - type: text
    content: Mais souviens-toi plutôt ╵de célébrer son œuvre
  - type: text
    content: que chantent les humains.
  '25':
  - type: text
    content: Tout le monde la voit,
  - type: text
    content: tout être humain ╵la regarde de loin.
  '26':
  - type: text
    content: 'Vois combien Dieu est grand : cela dépasse ╵notre compréhension.'
  - type: text
    content: Nul ne peut calculer ╵le nombre de ses ans.
  '27':
  - type: text
    content: Oui, c’est lui qui attire ╵les gouttelettes d’eau,
  - type: text
    content: il les distille en pluie, ╵il en fait de la brume.
  '28':
  - type: text
    content: Les nuées répandent la pluie
  - type: text
    content: et elles la déversent ╵en trombes sur les hommes.
  '29':
  - type: text
    content: Qui prétendrait comprendre ╵l’expansion des nuages
  - type: text
    content: et les coups de tonnerre ╵dont retentit sa tente ?
  '3':
  - type: text
    content: De loin, je tirerai ma science, ╵oui, de très loin,
  - type: text
    content: et je rendrai justice ╵à celui qui m’a fait.
  '30':
  - type: text
    content: Vois, tout autour, ╵scintiller ses éclairs ;
  - type: text
    content: c’est lui encore qui recouvre ╵les profondeurs des mers.
  '31':
  - type: text
    content: Par tous ces éléments, ╵Dieu régit les nations,
  - type: text
    content: et il pourvoit les hommes ╵de nourriture en abondance.
  '32':
  - type: text
    content: Et en ses mains ╵il cache des éclairs
  - type: text
    content: auxquels il assigne une cible.
  '33':
  - type: text
    content: Le bruit de son tonnerre ╵annonce sa venue,
  - type: text
    content: et même les troupeaux ╵pressentent son approche.
  '4':
  - type: text
    content: Car vraiment, mes discours ╵ne sont pas des mensonges.
  - type: text
    content: Et je m’adresse à toi ╵avec un savoir sûr.
  '5':
  - type: text
    content: Bien que puissant, ╵Dieu n’a de dédain pour personne ;
  - type: text
    content: il est puissant, ╵il est aussi déterminé.
  '6':
  - type: text
    content: Il ne permettra pas ╵que vive le méchant,
  - type: text
    content: il fait justice aux opprimés,
  '7':
  - type: text
    content: il ne détourne pas ╵ses yeux des hommes justes,
  - type: text
    content: mais il les fait asseoir ╵sur un trône à côté des rois.
  - type: text
    content: Il les y établit ╵pour siéger à jamais ; ╵ainsi il les honore.
  '8':
  - type: text
    content: S’ils sont liés de chaînes
  - type: text
    content: ou pris dans les liens du malheur,
  '9':
  - type: text
    content: c’est qu’il leur dénonce leurs actes,
  - type: text
    content: les fautes que dans leur orgueil ╵ils ont commises.
