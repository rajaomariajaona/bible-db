document_id: MRK.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus rejeté à Nazareth
  - type: heading
    content: (Mt 13.54-58 ; Lc 4.16-30)
  - type: text
    content: Jésus partit de là et retourna dans la ville dont il était originaire
  - type: note
    content: C’est-à-dire Nazareth, en Galilée.
  - type: text
    content: ', accompagné de ses disciples. '
  '10':
  - type: text
    content: Dans la maison où vous entrerez, restez jusqu’à votre départ.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Et si, dans une ville, on ne veut ni vous recevoir ni vous écouter, partez de là en secouant la poussière de vos sandales
  - type: note
    content: Voir note Mt 10.14.
  - type: text
    content: ': cela constituera un témoignage contre eux.'
  '12':
  - type: text
    content: 'Ils partirent donc et proclamèrent qu’il fallait changer profondément. '
  '13':
  - type: text
    content: Ils chassaient aussi beaucoup de démons et guérissaient de nombreux malades en les oignant d’huile.
  - type: heading
    content: Hérode et Jean-Baptiste
  - type: heading
    content: (Mt 14.1-2 ; Lc 9.7-9)
  '14':
  - type: text
    content: Le roi Hérode
  - type: note
    content: C’est-à-dire Hérode Antipas.
  - type: text
    content: ' entendit parler de Jésus, car sa réputation se répandait partout.'
  - type: text
    content: 'On disait de Jésus : C’est Jean-Baptiste qui est ressuscité ! C’est pour cela qu’il détient le pouvoir de faire des miracles.'
  '15':
  - type: text
    content: 'D’autres disaient : C’est Elie.'
  - type: text
    content: 'D’autres encore : C’est un prophète comme il y en avait autrefois.'
  '16':
  - type: text
    content: 'De son côté, Hérode, qui entendait tout cela, se disait : C’est celui que j’ai fait décapiter, c’est Jean, et il est ressuscité !'
  - type: heading
    content: (Mt 14.3-12 ; Lc 3.19-20)
  '17':
  - type: text
    content: En effet, Hérode avait fait arrêter Jean, l’avait fait enchaîner et jeter en prison, à cause d’Hérodiade, la femme de Philippe, son demi-frère, qu’il avait épousée
  - type: note
    content: Hérode Philippe vivait à Rome. Antipas avait répudié sa femme pour épouser Hérodiade, femme de Philippe.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Car Jean disait à Hérode : Tu n’as pas le droit de prendre la femme de ton frère.'
  '19':
  - type: text
    content: 'Hérodiade, furieuse contre lui, cherchait à le faire mourir, mais elle n’y parvenait pas, '
  '2':
  - type: text
    content: Le jour du sabbat, il se mit à enseigner dans la synagogue.
  - type: text
    content: 'Beaucoup de ses auditeurs furent très étonnés : D’où tient-il cela ? disaient-ils. Qui lui a donné cette sagesse ? D’où lui vient le pouvoir d’accomplir tous ces miracles ? '
  '20':
  - type: text
    content: car Hérode craignait Jean. Il savait que c’était un homme juste et saint. Il le protégeait donc. Quand il l’entendait parler, il en restait fort perplexe. Et pourtant, il aimait l’entendre.
  '21':
  - type: text
    content: 'Un jour cependant, Hérodiade trouva une occasion favorable, lors de l’anniversaire d’Hérode. Celui-ci organisa ce jour-là une grande fête à laquelle il invita les hauts dignitaires de sa cour, les officiers supérieurs et les notables de la Galilée. '
  '22':
  - type: text
    content: Au cours du banquet, la fille d’Hérodiade
  - type: note
    content: 'Certains manuscrits ont : sa fille Hérodiade.'
  - type: text
    content: ' entra dans la salle : elle dansa, Hérode et ses invités étaient sous son charme. Le roi dit alors à la jeune fille : Demande-moi ce que tu voudras et je te le donnerai. '
  '23':
  - type: text
    content: 'Il alla même jusqu’à lui faire ce serment : Tout ce que tu me demanderas, je te le donnerai, même si c’est la moitié de mon royaume.'
  '24':
  - type: text
    content: 'Elle sortit pour prendre conseil auprès de sa mère : Que vais-je lui demander ?'
  - type: text
    content: – La tête de Jean-Baptiste, lui répondit celle-ci.
  '25':
  - type: text
    content: 'Aussitôt la jeune fille se hâta de retourner auprès du roi pour lui exprimer son vœu en ces termes : Je veux que, tout de suite, tu me donnes sur un plat la tête de Jean-Baptiste.'
  '26':
  - type: text
    content: 'Le roi en fut consterné, mais à cause de son serment et de ses invités, il ne voulut pas le lui refuser. '
  '27':
  - type: text
    content: 'Il envoya donc aussitôt un garde en lui ordonnant de rapporter la tête de Jean. Celui-ci s’en alla décapiter Jean dans la prison. '
  '28':
  - type: text
    content: 'Il apporta la tête sur un plat et la remit à la jeune fille, et celle-ci la donna à sa mère. '
  '29':
  - type: text
    content: Lorsque les disciples de Jean apprirent ce qui s’était passé, ils vinrent prendre son corps pour l’ensevelir dans un tombeau.
  - type: heading
    content: Les apôtres rentrent de mission
  - type: heading
    content: (Mt 14.13a ; Lc 9.10 ; Jn 6.1)
  '3':
  - type: text
    content: N’est-il pas le charpentier, le fils de Marie, le frère de Jacques, de Joseph, de Jude et de Simon ? Ses sœurs ne vivent-elles pas ici parmi nous ?
  - type: text
    content: Et voilà pourquoi ils trouvaient en lui un obstacle à la foi.
  '30':
  - type: text
    content: A leur retour, les apôtres se réunirent auprès de Jésus et lui rendirent compte de tout ce qu’ils avaient fait, et de tout ce qu’ils avaient enseigné.
  '31':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: Venez avec moi, dans un endroit isolé, et vous prendrez un peu de repos.
  - type: text
    content: 'Il y avait effectivement beaucoup de monde qui allait et venait et ils ne trouvaient même pas le temps de manger. '
  '32':
  - type: text
    content: Ils partirent donc dans le bateau pour aller à l’écart dans un endroit désert.
  - type: heading
    content: Avec cinq pains et deux poissons
  - type: heading
    content: (Mt 14.13b-21 ; Lc 9.11-17 ; Jn 6.2-15)
  '33':
  - type: text
    content: 'Mais beaucoup les virent s’en aller et les reconnurent. De toutes les bourgades, on accourut à pied, et on les devança à l’endroit où ils se rendaient. '
  '34':
  - type: text
    content: Aussi, quand Jésus descendit du bateau, il vit une foule nombreuse. Il fut pris de compassion pour eux parce qu’ils étaient comme des brebis sans berger ; alors il se mit à enseigner longuement.
  '35':
  - type: text
    content: 'Il se faisait déjà tard. Ses disciples s’approchèrent de lui et lui dirent : Cet endroit est désert, et il est déjà tard. '
  '36':
  - type: text
    content: Renvoie donc ces gens pour qu’ils aillent dans les hameaux et les villages des environs s’acheter de quoi manger.
  '37':
  - type: text
    content: 'Mais Jésus leur répondit : '
  - type: text
    content: Donnez-leur vous-mêmes à manger !
  - type: text
    content: 'Ils lui demandèrent : Faut-il que nous allions acheter pour deux cents pièces d’argent'
  - type: note
    content: Il s’agit de deniers. Le denier était le salaire normal d’une journée de travail.
  - type: text
    content: ' de pain, et que nous le leur donnions à manger ?'
  '38':
  - type: text
    content: 'Jésus reprit : '
  - type: text
    content: Combien avez-vous de pains ? Allez voir !
  - type: text
    content: 'Ils allèrent se renseigner et revinrent lui dire : Il y en a cinq, et deux poissons.'
  '39':
  - type: text
    content: 'Alors il leur ordonna de faire asseoir la foule par groupes sur l’herbe verte. '
  '4':
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: 'C’est seulement dans sa patrie, dans sa parenté et dans sa famille que l’on refuse d’honorer un '
  - type: text
    content: prophète
  - type: text
    content: .
  '40':
  - type: text
    content: 'Les gens s’installèrent par terre, par rangées de cent et de cinquante. '
  '41':
  - type: text
    content: 'Jésus prit les cinq pains et les deux poissons, leva les yeux vers le ciel, prononça la prière de bénédiction ; il partagea les pains, et les donna aux disciples pour qu’ils les distribuent à la foule. Il partagea aussi les deux poissons entre tous. '
  '42':
  - type: text
    content: 'Tout le monde mangea à satiété. '
  '43':
  - type: text
    content: 'On ramassa les morceaux de pain qui restaient. Il y en eut douze paniers pleins. Il restait aussi des poissons. '
  '44':
  - type: text
    content: Or, ceux qui avaient mangé ces pains étaient au nombre de cinq mille hommes.
  - type: heading
    content: Jésus marche sur les eaux
  - type: heading
    content: (Mt 14.22-33 ; Jn 6.16-21)
  '45':
  - type: text
    content: 'Aussitôt après, Jésus pressa ses disciples de remonter dans le bateau pour qu’ils le précèdent de l’autre côté du lac, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  '46':
  - type: text
    content: Après l’avoir congédiée, il se rendit sur une colline pour prier.
  '47':
  - type: text
    content: 'A la tombée de la nuit, le bateau se trouvait au milieu du lac et Jésus était resté seul à terre. '
  '48':
  - type: text
    content: 'Il vit que ses disciples avaient beaucoup de mal à ramer, car le vent leur était contraire. Vers la fin de la nuit, il se dirigea vers eux en marchant sur les eaux du lac. Il voulait les dépasser. '
  '49':
  - type: text
    content: 'Mais quand ils le virent marcher ainsi sur l’eau, ils crurent que c’était un fantôme et se mirent à pousser des cris. '
  '5':
  - type: text
    content: 'Il ne put accomplir là aucun miracle, sinon pour quelques malades à qui il imposa les mains et qu’il guérit. '
  '50':
  - type: text
    content: En effet, tous l’avaient aperçu et étaient pris de panique.
  - type: text
    content: 'Aussitôt, il se mit à leur parler : '
  - type: text
    content: Rassurez-vous,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: c’est moi, n’ayez pas peur !
  '51':
  - type: text
    content: 'Puis il monta auprès d’eux dans le bateau. Le vent tomba. Ils en furent frappés de stupeur. '
  '52':
  - type: text
    content: Car ils n’avaient pas compris ce qui s’était passé au sujet des pains. Leur intelligence était aveuglée.
  - type: heading
    content: Des guérisons à Génésareth
  - type: heading
    content: (Mt 14.34-36)
  '53':
  - type: text
    content: La traversée achevée, ils touchèrent terre à Génésareth
  - type: note
    content: 'Génésareth: voir note Mt 14.34.'
  - type: text
    content: ' où ils amarrèrent leur bateau. '
  '54':
  - type: text
    content: 'Comme ils en descendaient, les gens reconnurent aussitôt Jésus et '
  '55':
  - type: text
    content: 'parcoururent toute la région pour annoncer sa venue. Ils lui amenaient les malades sur des brancards, dès qu’ils apprenaient son arrivée quelque part. '
  '56':
  - type: text
    content: Partout où il se rendait, dans les villages, les villes, les campagnes, ils apportaient les malades sur les places publiques et le suppliaient de leur permettre de toucher ne serait-ce que la frange de son vêtement
  - type: note
    content: Le vêtement de dessus que portaient les Juifs était bordé de franges, selon Dt 22.12.
  - type: text
    content: . Et tous ceux qui la touchaient étaient guéris.
  '6':
  - type: text
    content: Il fut étonné de leur incrédulité.
  - type: heading
    content: L’envoi des Douze
  - type: heading
    content: (Mt 10.1, 5-14 ; Lc 9.1-6)
  - type: text
    content: 'Jésus parcourait les villages des alentours pour y donner son enseignement. '
  '7':
  - type: text
    content: 'Il appela les Douze et les envoya en mission deux par deux, en leur donnant autorité sur les esprits mauvais. '
  '8':
  - type: text
    content: Il leur recommanda de ne rien emporter pour la route, sauf un bâton.
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Ne prenez ni provisions ni sac, ni argent dans votre ceinture.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Mettez des sandales à vos pieds et n’emportez pas de tunique de rechange.
  - type: text
    content: ' '
