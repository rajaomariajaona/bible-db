document_id: MRK.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus rejeté à Nazareth
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.54-58 ; Lc 4.16-30)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jésus partit de là et retourna dans la ville dont il était originaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire Nazareth, en Galilée.
      marker-yv: yv-n
    - type: text
      text: ', accompagné de ses disciples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Dans la maison où vous entrerez, restez jusqu’à votre départ.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et si, dans une ville, on ne veut ni vous recevoir ni vous écouter, partez de là en secouant la poussière de vos sandales
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 10.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ': cela constituera un témoignage contre eux.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils partirent donc et proclamèrent qu’il fallait changer profondément. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils chassaient aussi beaucoup de démons et guérissaient de nombreux malades en les oignant d’huile.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hérode et Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.1-2 ; Lc 9.7-9)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le roi Hérode
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire Hérode Antipas.
      marker-yv: yv-n
    - type: text
      text: ' entendit parler de Jésus, car sa réputation se répandait partout.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On disait de Jésus : C’est Jean-Baptiste qui est ressuscité ! C’est pour cela qu’il détient le pouvoir de faire des miracles.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'D’autres disaient : C’est Elie.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres encore : C’est un prophète comme il y en avait autrefois.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'De son côté, Hérode, qui entendait tout cela, se disait : C’est celui que j’ai fait décapiter, c’est Jean, et il est ressuscité !'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.3-12 ; Lc 3.19-20)
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: En effet, Hérode avait fait arrêter Jean, l’avait fait enchaîner et jeter en prison, à cause d’Hérodiade, la femme de Philippe, son demi-frère, qu’il avait épousée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hérode Philippe vivait à Rome. Antipas avait répudié sa femme pour épouser Hérodiade, femme de Philippe.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Car Jean disait à Hérode : Tu n’as pas le droit de prendre la femme de ton frère.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hérodiade, furieuse contre lui, cherchait à le faire mourir, mais elle n’y parvenait pas, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le jour du sabbat, il se mit à enseigner dans la synagogue.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de ses auditeurs furent très étonnés : D’où tient-il cela ? disaient-ils. Qui lui a donné cette sagesse ? D’où lui vient le pouvoir d’accomplir tous ces miracles ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: car Hérode craignait Jean. Il savait que c’était un homme juste et saint. Il le protégeait donc. Quand il l’entendait parler, il en restait fort perplexe. Et pourtant, il aimait l’entendre.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Un jour cependant, Hérodiade trouva une occasion favorable, lors de l’anniversaire d’Hérode. Celui-ci organisa ce jour-là une grande fête à laquelle il invita les hauts dignitaires de sa cour, les officiers supérieurs et les notables de la Galilée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Au cours du banquet, la fille d’Hérodiade
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa fille Hérodiade.
      marker-yv: yv-n
    - type: text
      text: ' entra dans la salle : elle dansa, Hérode et ses invités étaient sous son charme. Le roi dit alors à la jeune fille : Demande-moi ce que tu voudras et je te le donnerai. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il alla même jusqu’à lui faire ce serment : Tout ce que tu me demanderas, je te le donnerai, même si c’est la moitié de mon royaume.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Elle sortit pour prendre conseil auprès de sa mère : Que vais-je lui demander ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – La tête de Jean-Baptiste, lui répondit celle-ci.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Aussitôt la jeune fille se hâta de retourner auprès du roi pour lui exprimer son vœu en ces termes : Je veux que, tout de suite, tu me donnes sur un plat la tête de Jean-Baptiste.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le roi en fut consterné, mais à cause de son serment et de ses invités, il ne voulut pas le lui refuser. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il envoya donc aussitôt un garde en lui ordonnant de rapporter la tête de Jean. Celui-ci s’en alla décapiter Jean dans la prison. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il apporta la tête sur un plat et la remit à la jeune fille, et celle-ci la donna à sa mère. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Lorsque les disciples de Jean apprirent ce qui s’était passé, ils vinrent prendre son corps pour l’ensevelir dans un tombeau.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les apôtres rentrent de mission
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.13a ; Lc 9.10 ; Jn 6.1)
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: N’est-il pas le charpentier, le fils de Marie, le frère de Jacques, de Joseph, de Jude et de Simon ? Ses sœurs ne vivent-elles pas ici parmi nous ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et voilà pourquoi ils trouvaient en lui un obstacle à la foi.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: A leur retour, les apôtres se réunirent auprès de Jésus et lui rendirent compte de tout ce qu’ils avaient fait, et de tout ce qu’ils avaient enseigné.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Venez avec moi, dans un endroit isolé, et vous prendrez un peu de repos.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait effectivement beaucoup de monde qui allait et venait et ils ne trouvaient même pas le temps de manger. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ils partirent donc dans le bateau pour aller à l’écart dans un endroit désert.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avec cinq pains et deux poissons
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.13b-21 ; Lc 9.11-17 ; Jn 6.2-15)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Mais beaucoup les virent s’en aller et les reconnurent. De toutes les bourgades, on accourut à pied, et on les devança à l’endroit où ils se rendaient. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Aussi, quand Jésus descendit du bateau, il vit une foule nombreuse. Il fut pris de compassion pour eux parce qu’ils étaient comme des brebis sans berger ; alors il se mit à enseigner longuement.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Il se faisait déjà tard. Ses disciples s’approchèrent de lui et lui dirent : Cet endroit est désert, et il est déjà tard. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Renvoie donc ces gens pour qu’ils aillent dans les hameaux et les villages des environs s’acheter de quoi manger.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Mais Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Donnez-leur vous-mêmes à manger !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui demandèrent : Faut-il que nous allions acheter pour deux cents pièces d’argent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de deniers. Le denier était le salaire normal d’une journée de travail.
      marker-yv: yv-n
    - type: text
      text: ' de pain, et que nous le leur donnions à manger ?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jésus reprit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Combien avez-vous de pains ? Allez voir !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils allèrent se renseigner et revinrent lui dire : Il y en a cinq, et deux poissons.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Alors il leur ordonna de faire asseoir la foule par groupes sur l’herbe verte. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est seulement dans sa patrie, dans sa parenté et dans sa famille que l’on refuse d’honorer un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Les gens s’installèrent par terre, par rangées de cent et de cinquante. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jésus prit les cinq pains et les deux poissons, leva les yeux vers le ciel, prononça la prière de bénédiction ; il partagea les pains, et les donna aux disciples pour qu’ils les distribuent à la foule. Il partagea aussi les deux poissons entre tous. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Tout le monde mangea à satiété. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'On ramassa les morceaux de pain qui restaient. Il y en eut douze paniers pleins. Il restait aussi des poissons. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Or, ceux qui avaient mangé ces pains étaient au nombre de cinq mille hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus marche sur les eaux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.22-33 ; Jn 6.16-21)
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Aussitôt après, Jésus pressa ses disciples de remonter dans le bateau pour qu’ils le précèdent de l’autre côté du lac, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Après l’avoir congédiée, il se rendit sur une colline pour prier.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'A la tombée de la nuit, le bateau se trouvait au milieu du lac et Jésus était resté seul à terre. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Il vit que ses disciples avaient beaucoup de mal à ramer, car le vent leur était contraire. Vers la fin de la nuit, il se dirigea vers eux en marchant sur les eaux du lac. Il voulait les dépasser. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Mais quand ils le virent marcher ainsi sur l’eau, ils crurent que c’était un fantôme et se mirent à pousser des cris. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il ne put accomplir là aucun miracle, sinon pour quelques malades à qui il imposa les mains et qu’il guérit. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: En effet, tous l’avaient aperçu et étaient pris de panique.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, il se mit à leur parler : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rassurez-vous,
    - type: text
      text: ' leur dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: c’est moi, n’ayez pas peur !
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Puis il monta auprès d’eux dans le bateau. Le vent tomba. Ils en furent frappés de stupeur. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Car ils n’avaient pas compris ce qui s’était passé au sujet des pains. Leur intelligence était aveuglée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des guérisons à Génésareth
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.34-36)
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: La traversée achevée, ils touchèrent terre à Génésareth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.53 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Génésareth
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
