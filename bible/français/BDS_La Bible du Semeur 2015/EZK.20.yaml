document_id: EZK.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’histoire des infidélités d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Le dixième jour du cinquième mois de la septième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en juillet-août 591 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', quelques responsables du peuple d’Israël vinrent consulter l’Eternel. Ils s’assirent devant moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je les ai donc fait sortir d’Egypte et je les ai conduits au désert. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je leur ai donné mes lois et je leur ai fait connaître mes commandements qui font obtenir la vie à celui qui les applique. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je leur ai aussi fait don de mes jours de sabbat pour qu’ils servent de signe entre moi et eux, pour qu’ils sachent que moi, l’Eternel, je fais d’eux un peuple saint.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mais la communauté d’Israël s’est révoltée contre moi dans le désert, ils n’ont pas vécu selon mes lois et ils ont rejeté mes commandements qui font obtenir la vie à celui qui les applique. Ils ont constamment profané mes jours de sabbat. Je me suis proposé alors de déchaîner ma colère contre eux dans le désert pour les exterminer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 13-17, voir Nb 11 à 25.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples sous les yeux desquels je les avais fait sortir d’Egypte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je leur ai pourtant juré dans le désert de ne pas les faire entrer dans le pays que je leur avais destiné, ce pays ruisselant de lait et de miel, le plus beau de tous les pays. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'J’en ai fait le serment parce qu’ils avaient méprisé mes commandements, qu’ils n’avaient pas obéi à mes lois et qu’ils avaient profané mes jours de sabbat, car leur cœur restait attaché à leurs idoles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais, en les voyant, j’ai eu trop pitié d’eux pour les détruire, aussi je ne les ai pas exterminés dans le désert.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La révolte des fils
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Cependant, j’ai dit à leurs enfants dans le désert : Ne suivez pas les principes de vos pères, n’appliquez pas leurs règles et ne vous rendez pas impurs avec leurs idoles. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je suis l’Eternel votre Dieu. Vivez selon mes lois, obéissez à mes commandements et appliquez-les. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors l’Eternel m’adressa la parole en ces termes :'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Faites de mes jours de sabbat des jours saints pour qu’ils servent de signe entre moi et vous, afin que vous reconnaissiez que moi, l’Eternel, je suis votre Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Mais les fils aussi se sont révoltés contre moi. Ils n’ont pas vécu selon mes lois ; ils n’ont pas observé ni appliqué mes commandements qui font obtenir la vie à ceux qui les appliquent. Ils ont profané mes jours de sabbat. J’ai parlé alors de répandre ma fureur sur eux et d’assouvir ma colère contre eux dans le désert. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Cependant, j’ai retenu ma main et j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples, sous les yeux desquels je les avais fait sortir d’Egypte.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pourtant, encore une fois, je leur jurai dans le désert de les disperser parmi des peuples étrangers et de les disséminer en divers pays étrangers, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'parce qu’ils n’avaient pas appliqué mes commandements, qu’ils avaient méprisé mes lois, profané mes jours de sabbat et que leurs regards restaient tournés vers les idoles de leurs pères. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: C’est pourquoi je leur ai donné des lois qui leur étaient funestes et des commandements qui ne pouvaient les faire vivre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Car la désobéissance à la Loi entraîne la malédiction et la mort : Dt 29.18-20 ; 30.15-20 (voir Rm 3.20 ; 7.10).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je les ai rendus impurs par leurs offrandes quand ils sacrifiaient tous leurs premiers-nés, pour les frapper de stupeur afin qu’ils reconnaissent que je suis l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.20'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les infidélités dans le pays promis
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'C’est pourquoi, fils d’homme, parle à la communauté d’Israël, et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Vos ancêtres m’ont outragé par leurs rébellions contre moi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Je les ai fait entrer dans le pays que j’avais juré de leur donner. Or, partout où ils ont vu une colline élevée ou un arbre vert, ils ont offert leurs sacrifices et ils ont présenté leurs offrandes qui m’irritaient ; ils y ont apporté leurs parfums apaisants et y ont répandu leurs libations. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Je leur ai demandé alors : Qu’est-ce que ce haut lieu où vous vous rendez ? Et ce nom de “haut lieu” a subsisté jusqu’à ce jour. »'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fils d’homme, parle aux responsables du peuple d’Israël et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Vous osez venir me consulter ? Aussi vrai que je suis vivant, je ne me laisserai pas consulter par vous, le Seigneur, l’Eternel, le déclare. »'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'C’est pourquoi, dis à la communauté d’Israël : « Voici ce que déclare le Seigneur, l’Eternel : Ne vous rendez-vous pas impurs en suivant le chemin de vos ancêtres ? Ne vous prostituez-vous pas à leurs idoles abominables ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Quand vous présentez vos offrandes, quand vous faites passer vos enfants par le feu pour les offrir en sacrifice, vous continuez encore aujourd’hui à vous rendre impurs avec toutes vos idoles. Et vous croyez que je vais me laisser consulter par vous, gens d’Israël ? Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, je ne me laisserai pas consulter par vous.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un nouveau commencement
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Le rêve qui hante votre esprit ne se réalisera pas. Car vous dites : “Nous voulons être comme les gens des autres nations, comme les peuples des autres pays, nous voulons aussi rendre un culte à des dieux en bois et en pierre.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, je régnerai sur vous en déployant ma force et ma puissance et en déchaînant ma colère. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'J’interviendrai en déployant ma force et ma puissance et en déchaînant ma colère, pour vous faire sortir du milieu des peuples, et je vous rassemblerai des pays étrangers où vous avez été dispersés. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Je vous amènerai au désert à l’écart des autres peuples, et là, je vous jugerai face à face
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Os 2.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Tout comme j’ai jugé vos ancêtres dans le désert d’Egypte, je vous jugerai vous aussi, le Seigneur, l’Eternel, le déclare. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Je vous ferai passer sous ma houlette
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme un berger lorsqu’il compte et trie ses brebis.
      marker-yv: yv-n
    - type: text
      text: ', et je vous lierai de nouveau à moi par l’alliance'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 34.11-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: J’éliminerai du milieu de vous ceux qui se révoltent et qui se rendent coupables envers moi. Je les ferai sortir des pays étrangers où ils habitent, mais ils n’entreront pas dans le pays d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme lors de l’Exode, des membres du peuple ne sont pas entrés en Canaan (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14.26-35
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', et vous reconnaîtrez que je suis l’Eternel.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Et maintenant, gens d’Israël, voici ce que déclare le Seigneur, l’Eternel : Que chacun de vous aille adorer ses idoles ! Et après cela, on verra bien si vous refusez de m’écouter et si vous continuez à me profaner par vos offrandes et par vos idoles, moi qui suis saint. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fils d’homme, porte un jugement sur eux ! N’hésite pas à le faire ! Dénonce les actions abominables que leurs ancêtres ont commises, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Car c’est sur ma montagne sainte, sur la haute montagne d’Israël, le Seigneur, l’Eternel, le déclare, que vous, toute la communauté d’Israël, c’est-à-dire tous ceux qui seront dans le pays, me rendront un culte. Là, je vous accepterai, là, j’accueillerai avec plaisir vos offrandes et les prémices de vos dons, et tout ce que vous me consacrerez. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Je vous agréerai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 6.17
        - type: text
          text: ' où le mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'agréerai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: accueillerai.
      marker-yv: yv-n
    - type: text
      text: ' comme un parfum apaisant, quand je vous aurai fait sortir du milieu des peuples et que je vous aurai rassemblés des pays étrangers où vous aurez été dispersés ; et je manifesterai par mon œuvre en votre faveur ma sainteté aux yeux des autres peuples. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Vous reconnaîtrez que je suis l’Eternel quand je vous aurai ramenés au pays d’Israël, que j’ai juré de donner à vos ancêtres. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Là aussi, vous vous souviendrez de votre conduite et de toutes les mauvaises actions par lesquelles vous vous êtes rendus impurs. Vous serez pris de dégoût de vous-mêmes à cause de tout le mal que vous avez commis. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Et vous reconnaîtrez que je suis l’Eternel quand j’agirai ainsi envers vous par égard pour ma renommée, au lieu de vous traiter selon votre mauvaise conduite et vos actes dépravés, gens d’Israël, le Seigneur, l’Eternel, le déclare. »
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Le jour où j’ai choisi Israël, j’ai prêté serment envers les descendants de Jacob. Je me suis révélé à eux en Egypte, et je leur ai prêté serment en disant : Je suis l’Eternel votre Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 5-6, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 6.2-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce jour-là, je leur ai juré de les faire sortir d’Egypte pour les amener dans un pays que j’avais recherché pour eux, un pays ruisselant de lait et de miel, le plus beau de tous les pays. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je leur ai dit alors : Que chacun de vous rejette les idoles abominables qu’il a sous les yeux. Ne vous rendez pas impurs avec les idoles de l’Egypte. Je suis l’Eternel votre Dieu.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais ils se sont révoltés contre moi et n’ont pas voulu m’écouter. Aucun d’eux n’a rejeté les idoles abominables qu’il avait sous les yeux ; ils n’ont pas abandonné les idoles de l’Egypte. Je me proposai alors de répandre ma fureur sur eux et d’assouvir ma colère contre eux en Egypte. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples parmi lesquels ils habitaient, car je m’étais fait connaître à eux sous les yeux de ces peuples dans le but de les faire sortir d’Egypte. '
