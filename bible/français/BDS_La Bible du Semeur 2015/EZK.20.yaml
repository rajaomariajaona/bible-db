document_id: EZK.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’histoire des infidélités d’Israël
  - type: text
    content: Le dixième jour du cinquième mois de la septième année
  - type: note
    content: C’est-à-dire en juillet-août 591 av. J.-C.
  - type: text
    content: ', quelques responsables du peuple d’Israël vinrent consulter l’Eternel. Ils s’assirent devant moi. '
  '10':
  - type: text
    content: 'Je les ai donc fait sortir d’Egypte et je les ai conduits au désert. '
  '11':
  - type: text
    content: 'Je leur ai donné mes lois et je leur ai fait connaître mes commandements qui font obtenir la vie à celui qui les applique. '
  '12':
  - type: text
    content: Je leur ai aussi fait don de mes jours de sabbat pour qu’ils servent de signe entre moi et eux, pour qu’ils sachent que moi, l’Eternel, je fais d’eux un peuple saint.
  '13':
  - type: text
    content: Mais la communauté d’Israël s’est révoltée contre moi dans le désert, ils n’ont pas vécu selon mes lois et ils ont rejeté mes commandements qui font obtenir la vie à celui qui les applique. Ils ont constamment profané mes jours de sabbat. Je me suis proposé alors de déchaîner ma colère contre eux dans le désert pour les exterminer
  - type: note
    content: Pour les v. 13-17, voir Nb 11 à 25.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Mais j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples sous les yeux desquels je les avais fait sortir d’Egypte. '
  '15':
  - type: text
    content: 'Je leur ai pourtant juré dans le désert de ne pas les faire entrer dans le pays que je leur avais destiné, ce pays ruisselant de lait et de miel, le plus beau de tous les pays. '
  '16':
  - type: text
    content: 'J’en ai fait le serment parce qu’ils avaient méprisé mes commandements, qu’ils n’avaient pas obéi à mes lois et qu’ils avaient profané mes jours de sabbat, car leur cœur restait attaché à leurs idoles. '
  '17':
  - type: text
    content: Mais, en les voyant, j’ai eu trop pitié d’eux pour les détruire, aussi je ne les ai pas exterminés dans le désert.
  - type: heading
    content: La révolte des fils
  '18':
  - type: text
    content: 'Cependant, j’ai dit à leurs enfants dans le désert : Ne suivez pas les principes de vos pères, n’appliquez pas leurs règles et ne vous rendez pas impurs avec leurs idoles. '
  '19':
  - type: text
    content: 'Je suis l’Eternel votre Dieu. Vivez selon mes lois, obéissez à mes commandements et appliquez-les. '
  '2':
  - type: text
    content: 'Alors l’Eternel m’adressa la parole en ces termes :'
  '20':
  - type: text
    content: 'Faites de mes jours de sabbat des jours saints pour qu’ils servent de signe entre moi et vous, afin que vous reconnaissiez que moi, l’Eternel, je suis votre Dieu. '
  '21':
  - type: text
    content: 'Mais les fils aussi se sont révoltés contre moi. Ils n’ont pas vécu selon mes lois ; ils n’ont pas observé ni appliqué mes commandements qui font obtenir la vie à ceux qui les appliquent. Ils ont profané mes jours de sabbat. J’ai parlé alors de répandre ma fureur sur eux et d’assouvir ma colère contre eux dans le désert. '
  '22':
  - type: text
    content: Cependant, j’ai retenu ma main et j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples, sous les yeux desquels je les avais fait sortir d’Egypte.
  '23':
  - type: text
    content: 'Pourtant, encore une fois, je leur jurai dans le désert de les disperser parmi des peuples étrangers et de les disséminer en divers pays étrangers, '
  '24':
  - type: text
    content: 'parce qu’ils n’avaient pas appliqué mes commandements, qu’ils avaient méprisé mes lois, profané mes jours de sabbat et que leurs regards restaient tournés vers les idoles de leurs pères. '
  '25':
  - type: text
    content: C’est pourquoi je leur ai donné des lois qui leur étaient funestes et des commandements qui ne pouvaient les faire vivre
  - type: note
    content: 'Car la désobéissance à la Loi entraîne la malédiction et la mort : Dt 29.18-20 ; 30.15-20 (voir Rm 3.20 ; 7.10).'
  - type: text
    content: '. '
  '26':
  - type: text
    content: Je les ai rendus impurs par leurs offrandes quand ils sacrifiaient tous leurs premiers-nés, pour les frapper de stupeur afin qu’ils reconnaissent que je suis l’Eternel
  - type: note
    content: Voir 16.20 et note.
  - type: text
    content: . »
  - type: heading
    content: Les infidélités dans le pays promis
  '27':
  - type: text
    content: 'C’est pourquoi, fils d’homme, parle à la communauté d’Israël, et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Vos ancêtres m’ont outragé par leurs rébellions contre moi. '
  '28':
  - type: text
    content: 'Je les ai fait entrer dans le pays que j’avais juré de leur donner. Or, partout où ils ont vu une colline élevée ou un arbre vert, ils ont offert leurs sacrifices et ils ont présenté leurs offrandes qui m’irritaient ; ils y ont apporté leurs parfums apaisants et y ont répandu leurs libations. '
  '29':
  - type: text
    content: 'Je leur ai demandé alors : Qu’est-ce que ce haut lieu où vous vous rendez ? Et ce nom de “haut lieu” a subsisté jusqu’à ce jour. »'
  '3':
  - type: text
    content: 'Fils d’homme, parle aux responsables du peuple d’Israël et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Vous osez venir me consulter ? Aussi vrai que je suis vivant, je ne me laisserai pas consulter par vous, le Seigneur, l’Eternel, le déclare. »'
  '30':
  - type: text
    content: 'C’est pourquoi, dis à la communauté d’Israël : « Voici ce que déclare le Seigneur, l’Eternel : Ne vous rendez-vous pas impurs en suivant le chemin de vos ancêtres ? Ne vous prostituez-vous pas à leurs idoles abominables ? '
  '31':
  - type: text
    content: Quand vous présentez vos offrandes, quand vous faites passer vos enfants par le feu pour les offrir en sacrifice, vous continuez encore aujourd’hui à vous rendre impurs avec toutes vos idoles. Et vous croyez que je vais me laisser consulter par vous, gens d’Israël ? Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, je ne me laisserai pas consulter par vous.
  - type: heading
    content: Un nouveau commencement
  '32':
  - type: text
    content: 'Le rêve qui hante votre esprit ne se réalisera pas. Car vous dites : “Nous voulons être comme les gens des autres nations, comme les peuples des autres pays, nous voulons aussi rendre un culte à des dieux en bois et en pierre.” '
  '33':
  - type: text
    content: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, je régnerai sur vous en déployant ma force et ma puissance et en déchaînant ma colère. '
  '34':
  - type: text
    content: 'J’interviendrai en déployant ma force et ma puissance et en déchaînant ma colère, pour vous faire sortir du milieu des peuples, et je vous rassemblerai des pays étrangers où vous avez été dispersés. '
  '35':
  - type: text
    content: Je vous amènerai au désert à l’écart des autres peuples, et là, je vous jugerai face à face
  - type: note
    content: Voir Os 2.16.
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Tout comme j’ai jugé vos ancêtres dans le désert d’Egypte, je vous jugerai vous aussi, le Seigneur, l’Eternel, le déclare. '
  '37':
  - type: text
    content: Je vous ferai passer sous ma houlette
  - type: note
    content: Comme un berger lorsqu’il compte et trie ses brebis.
  - type: text
    content: ', et je vous lierai de nouveau à moi par l’alliance'
  - type: note
    content: Voir Ez 34.11-16.
  - type: text
    content: '. '
  '38':
  - type: text
    content: J’éliminerai du milieu de vous ceux qui se révoltent et qui se rendent coupables envers moi. Je les ferai sortir des pays étrangers où ils habitent, mais ils n’entreront pas dans le pays d’Israël
  - type: note
    content: Comme lors de l’Exode, des membres du peuple ne sont pas entrés en Canaan (Nb 14.26-35).
  - type: text
    content: ', et vous reconnaîtrez que je suis l’Eternel.'
  '39':
  - type: text
    content: 'Et maintenant, gens d’Israël, voici ce que déclare le Seigneur, l’Eternel : Que chacun de vous aille adorer ses idoles ! Et après cela, on verra bien si vous refusez de m’écouter et si vous continuez à me profaner par vos offrandes et par vos idoles, moi qui suis saint. '
  '4':
  - type: text
    content: 'Fils d’homme, porte un jugement sur eux ! N’hésite pas à le faire ! Dénonce les actions abominables que leurs ancêtres ont commises, '
  '40':
  - type: text
    content: 'Car c’est sur ma montagne sainte, sur la haute montagne d’Israël, le Seigneur, l’Eternel, le déclare, que vous, toute la communauté d’Israël, c’est-à-dire tous ceux qui seront dans le pays, me rendront un culte. Là, je vous accepterai, là, j’accueillerai avec plaisir vos offrandes et les prémices de vos dons, et tout ce que vous me consacrerez. '
  '41':
  - type: text
    content: Je vous agréerai
  - type: note
    content: Allusion en 2 Co 6.17 où le mot traduit par agréerai est rendu par accueillerai.
  - type: text
    content: ' comme un parfum apaisant, quand je vous aurai fait sortir du milieu des peuples et que je vous aurai rassemblés des pays étrangers où vous aurez été dispersés ; et je manifesterai par mon œuvre en votre faveur ma sainteté aux yeux des autres peuples. '
  '42':
  - type: text
    content: 'Vous reconnaîtrez que je suis l’Eternel quand je vous aurai ramenés au pays d’Israël, que j’ai juré de donner à vos ancêtres. '
  '43':
  - type: text
    content: 'Là aussi, vous vous souviendrez de votre conduite et de toutes les mauvaises actions par lesquelles vous vous êtes rendus impurs. Vous serez pris de dégoût de vous-mêmes à cause de tout le mal que vous avez commis. '
  '44':
  - type: text
    content: Et vous reconnaîtrez que je suis l’Eternel quand j’agirai ainsi envers vous par égard pour ma renommée, au lieu de vous traiter selon votre mauvaise conduite et vos actes dépravés, gens d’Israël, le Seigneur, l’Eternel, le déclare. »
  '5':
  - type: text
    content: 'et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Le jour où j’ai choisi Israël, j’ai prêté serment envers les descendants de Jacob. Je me suis révélé à eux en Egypte, et je leur ai prêté serment en disant : Je suis l’Eternel votre Dieu'
  - type: note
    content: Pour les v. 5-6, voir Ex 6.2-8.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ce jour-là, je leur ai juré de les faire sortir d’Egypte pour les amener dans un pays que j’avais recherché pour eux, un pays ruisselant de lait et de miel, le plus beau de tous les pays. '
  '7':
  - type: text
    content: 'Je leur ai dit alors : Que chacun de vous rejette les idoles abominables qu’il a sous les yeux. Ne vous rendez pas impurs avec les idoles de l’Egypte. Je suis l’Eternel votre Dieu.'
  '8':
  - type: text
    content: 'Mais ils se sont révoltés contre moi et n’ont pas voulu m’écouter. Aucun d’eux n’a rejeté les idoles abominables qu’il avait sous les yeux ; ils n’ont pas abandonné les idoles de l’Egypte. Je me proposai alors de répandre ma fureur sur eux et d’assouvir ma colère contre eux en Egypte. '
  '9':
  - type: text
    content: 'Mais j’ai agi par égard pour ma renommée, pour que je ne sois pas méprisé par les peuples parmi lesquels ils habitaient, car je m’étais fait connaître à eux sous les yeux de ces peuples dans le but de les faire sortir d’Egypte. '
