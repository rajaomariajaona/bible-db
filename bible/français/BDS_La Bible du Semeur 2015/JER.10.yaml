document_id: JER.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Vrai Dieu et faux dieux
  - type: heading
    content: Les idoles et le Dieu vivant
  - type: text
    content: O peuple d’Israël, ╵écoute la parole ╵que l’Eternel prononce !
  '10':
  - type: text
    content: Mais l’Eternel ╵est le vrai Dieu ;
  - type: text
    content: il est le Dieu vivant ╵et le roi éternel ;
  - type: text
    content: par sa colère, ╵la terre est ébranlée,
  - type: text
    content: et les peuples ne peuvent ╵soutenir son courroux.
  '11':
  - type: text
    content: 'Vous leur direz ceci : Les dieux qui n’ont fait ni le ciel ni la terre disparaîtront de dessus cette terre et de dessous ce ciel'
  - type: note
    content: Ce verset est en araméen dans l’original.
  - type: text
    content: .
  '12':
  - type: text
    content: L’Eternel, lui, a fait la terre ╵par sa puissance,
  - type: text
    content: il a solidement ╵fondé le monde ╵par sa sagesse,
  - type: text
    content: et il a déployé le ciel ╵par son intelligence
  - type: note
    content: Les v. 12-16 ont leur parallèle en 51.15-19.
  - type: text
    content: .
  '13':
  - type: text
    content: Quand il fait retentir sa voix,
  - type: text
    content: les eaux s’amassent dans le ciel,
  - type: text
    content: des nuages s’élèvent ╵des confins de la terre ;
  - type: text
    content: il fait jaillir l’éclair ╵au milieu des averses
  - type: text
    content: et il fait s’élancer ╵le vent de ses réserves.
  '14':
  - type: text
    content: Alors tout être humain ╵reste hébété ╵et ne comprend plus rien.
  - type: text
    content: Tout orfèvre est honteux ╵de son idole,
  - type: text
    content: car sa statue de fonte ╵est une tromperie
  - type: text
    content: qui n’a en elle aucun souffle de vie.
  '15':
  - type: text
    content: Ils ne sont que néant
  - type: text
    content: et œuvres illusoires ;
  - type: text
    content: et ils disparaîtront
  - type: text
    content: au jour du châtiment.
  '16':
  - type: text
    content: Combien est différent ╵le Dieu qui est la part ╵du peuple de Jacob.
  - type: text
    content: Il a tout façonné ;
  - type: text
    content: Israël est le peuple ╵qui constitue son patrimoine.
  - type: text
    content: Il a pour nom ╵le Seigneur des armées célestes.
  - type: heading
    content: La panique et la prière
  - type: heading
    content: Annonce de l’exil
  '17':
  - type: text
    content: Ramasse ton bagage,
  - type: text
    content: toi qui es assiégée !
  '18':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: « Cette fois-ci, ╵je vais lancer au loin ╵les habitants de ce pays
  - type: text
    content: et je ferai venir ╵la détresse sur eux.
  - type: text
    content: Ils n’échapperont pas
  - type: note
    content: 'Ils n’échapperont pas: hébreu peu clair. Autre traduction : afin qu’on les capture.'
  - type: text
    content: . »
  '19':
  - type: text
    content: Malheur à moi ! Je suis blessée !
  - type: text
    content: Ma plaie est douloureuse.
  - type: text
    content: 'Pour ma part, je disais :'
  - type: text
    content: C’est un mal qui m’atteint,
  - type: text
    content: je dois le supporter.
  '2':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: N’adoptez pas ╵la conduite des autres peuples
  - type: text
    content: et ne redoutez pas ╵les signes dans le ciel
  - type: text
    content: même les peuples étrangers ╵qui les redoutent.
  '20':
  - type: text
    content: Ma tente est dévastée,
  - type: text
    content: mes cordeaux sont rompus,
  - type: text
    content: mes enfants m’ont quittée,
  - type: text
    content: aucun d’eux n’est plus là,
  - type: text
    content: il n’y a plus personne ╵pour remonter ma tente
  - type: text
    content: et retendre mes toiles.
  '21':
  - type: text
    content: 'Les dirigeants du peuple ╵ont été insensés :'
  - type: text
    content: ils n’ont pas suivi l’Eternel.
  - type: text
    content: Et c’est bien pour cela ╵qu’ils n’ont pas réussi
  - type: text
    content: et que tout le troupeau ╵dont ils avaient la charge ╵a été dispersé.
  '22':
  - type: text
    content: Ecoutez la rumeur, ╵elle s’approche.
  - type: text
    content: Un grand tumulte arrive ╵en provenance du pays du nord ;
  - type: text
    content: les villes de Juda ╵vont être transformées ╵en terre dévastée,
  - type: text
    content: en gîtes de chacals.
  - type: heading
    content: Prière du prophète
  '23':
  - type: text
    content: Je sais, ô Eternel,
  - type: text
    content: que le destin de l’homme ╵n’est pas entre ses mains,
  - type: text
    content: et que celui qui marche
  - type: text
    content: n’est pas le maître de ses pas.
  '24':
  - type: text
    content: Châtie-nous, Eternel,
  - type: text
    content: mais avec équité
  - type: text
    content: et non avec colère,
  - type: text
    content: pour ne pas nous détruire ╵totalement.
  '25':
  - type: text
    content: Déverse ta fureur ╵sur les peuples païens,
  - type: text
    content: ceux qui ne te connaissent pas,
  - type: text
    content: sur les peuplades
  - type: text
    content: qui ne t’invoquent pas,
  - type: text
    content: car ils ont dévoré,
  - type: text
    content: oui, dévoré Jacob,
  - type: text
    content: jusqu’à l’exterminer
  - type: text
    content: et ils ont ravagé ╵le lieu de sa demeure
  - type: note
    content: Voir Ps 79.6-7.
  - type: text
    content: .
  '3':
  - type: text
    content: Les coutumes des autres peuples ╵sont inutiles,
  - type: text
    content: leur dieu n’est que du bois ╵coupé dans la forêt,
  - type: text
    content: travaillé au ciseau ╵par la main d’un sculpteur.
  '4':
  - type: text
    content: On l’embellit d’argent ou d’or,
  - type: text
    content: un marteau et des clous ╵le font tenir en place
  - type: text
    content: pour qu’il ne branle pas !
  '5':
  - type: text
    content: 'Ces dieux-là sont semblables ╵à des épouvantails ╵dans un champ de concombres :'
  - type: text
    content: ils ne savent parler,
  - type: text
    content: il faut qu’on les transporte
  - type: text
    content: car ils ne marchent pas.
  - type: text
    content: 'Ne les craignez donc pas :'
  - type: text
    content: ils ne font pas de mal ;
  - type: text
    content: et ils ne peuvent pas ╵non plus faire du bien.
  '6':
  - type: text
    content: Nul n’est semblable à toi, ╵ô Eternel !
  - type: text
    content: Car tu es grand ╵et parce que tu es puissant, ╵ta renommée est grande !
  '7':
  - type: text
    content: Qui donc ne te craindrait, ╵ô, roi des peuples ?
  - type: text
    content: On doit te craindre
  - type: text
    content: car parmi tous les sages ╵de tous les peuples
  - type: text
    content: et dans tous leurs royaumes,
  - type: text
    content: nul n’est semblable à toi
  - type: note
    content: Voir Ap 15.4.
  - type: text
    content: '  !'
  '8':
  - type: text
    content: Tous, en effet, sans exception, ╵ils sont insensés et stupides,
  - type: text
    content: et leur enseignement ╵est une absurdité,
  - type: text
    content: car il ne porte ╵que sur un dieu en bois.
  '9':
  - type: text
    content: C’est de l’argent battu ╵apporté de Tarsis,
  - type: text
    content: de l’or venu d’Ouphaz
  - type: note
    content: 'Tarsis: aux confins occidentaux de la mer Méditerranée, sans doute en Espagne (voir Gn 10.4 ; Jon 1.3 ; Ps 72.10). Ouphaz, mentionné aussi dans Dn 10.5, est inconnu. Certaines versions anciennes ont remplacé par Ophir, célèbre pour son or (1 R 10.11 ; 22.49).'
  - type: text
    content: ','
  - type: text
    content: une œuvre de sculpteur, ╵le travail d’un orfèvre.
  - type: text
    content: On revêt ces dieux-là ╵de vêtements de pourpre ╵et d’étoffes d’azur,
  - type: text
    content: mais tous ne sont que l’œuvre ╵d’habiles ouvriers.
