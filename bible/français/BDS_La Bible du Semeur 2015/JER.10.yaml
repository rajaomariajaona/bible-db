document_id: JER.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vrai Dieu et faux dieux
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les idoles et le Dieu vivant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O peuple d’Israël, ╵écoute la parole ╵que l’Eternel prononce !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’adoptez pas ╵la conduite des autres peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne redoutez pas ╵les signes dans le ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: même les peuples étrangers ╵qui les redoutent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les coutumes des autres peuples ╵sont inutiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur dieu n’est que du bois ╵coupé dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: travaillé au ciseau ╵par la main d’un sculpteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On l’embellit d’argent ou d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un marteau et des clous ╵le font tenir en place
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’il ne branle pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ces dieux-là sont semblables ╵à des épouvantails ╵dans un champ de concombres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne savent parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il faut qu’on les transporte
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ne marchent pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ne les craignez donc pas :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne font pas de mal ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne peuvent pas ╵non plus faire du bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nul n’est semblable à toi, ╵ô Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es grand ╵et parce que tu es puissant, ╵ta renommée est grande !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui donc ne te craindrait, ╵ô, roi des peuples ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: On doit te craindre
- type: usfm
  marker: q1
  children:
  - type: text
    text: car parmi tous les sages ╵de tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans tous leurs royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nul n’est semblable à toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 15.4
        metadata:
          usfm: REV.15.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tous, en effet, sans exception, ╵ils sont insensés et stupides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur enseignement ╵est une absurdité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il ne porte ╵que sur un dieu en bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est de l’argent battu ╵apporté de Tarsis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’or venu d’Ouphaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tarsis
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux confins occidentaux de la mer Méditerranée, sans doute en Espagne (voir Gn 10.4 ; Jon 1.3 ; Ps 72.10). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ouphaz, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mentionné aussi dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 10.5
        metadata:
          usfm: DAN.10.5
      - type: text
        text: ', est inconnu. Certaines versions anciennes ont remplacé par Ophir, célèbre pour son or (1 R 10.11 ; 22.49).'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: une œuvre de sculpteur, ╵le travail d’un orfèvre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On revêt ces dieux-là ╵de vêtements de pourpre ╵et d’étoffes d’azur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tous ne sont que l’œuvre ╵d’habiles ouvriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais l’Eternel ╵est le vrai Dieu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est le Dieu vivant ╵et le roi éternel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: par sa colère, ╵la terre est ébranlée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les peuples ne peuvent ╵soutenir son courroux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous leur direz ceci : Les dieux qui n’ont fait ni le ciel ni la terre disparaîtront de dessus cette terre et de dessous ce ciel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset est en araméen dans l’original.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Eternel, lui, a fait la terre ╵par sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a solidement ╵fondé le monde ╵par sa sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a déployé le ciel ╵par son intelligence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 12-16 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51.15-19
        metadata:
          usfm: JER.51.15+JER.51.16+JER.51.17+JER.51.18+JER.51.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand il fait retentir sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les eaux s’amassent dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des nuages s’élèvent ╵des confins de la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait jaillir l’éclair ╵au milieu des averses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il fait s’élancer ╵le vent de ses réserves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors tout être humain ╵reste hébété ╵et ne comprend plus rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout orfèvre est honteux ╵de son idole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car sa statue de fonte ╵est une tromperie
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n’a en elle aucun souffle de vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils ne sont que néant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et œuvres illusoires ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils disparaîtront
- type: usfm
  marker: q1
  children:
  - type: text
    text: au jour du châtiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Combien est différent ╵le Dieu qui est la part ╵du peuple de Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a tout façonné ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël est le peuple ╵qui constitue son patrimoine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a pour nom ╵le Seigneur des armées célestes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La panique et la prière
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Annonce de l’exil
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ramasse ton bagage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es assiégée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car voici ce que l’Eternel déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Cette fois-ci, ╵je vais lancer au loin ╵les habitants de ce pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai venir ╵la détresse sur eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’échapperont pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils n’échapperont pas
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hébreu peu clair. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin qu’on les capture.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Malheur à moi ! Je suis blessée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma plaie est douloureuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour ma part, je disais :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un mal qui m’atteint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dois le supporter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ma tente est dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes cordeaux sont rompus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes enfants m’ont quittée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun d’eux n’est plus là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a plus personne ╵pour remonter ma tente
- type: usfm
  marker: q1
  children:
  - type: text
    text: et retendre mes toiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les dirigeants du peuple ╵ont été insensés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont pas suivi l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est bien pour cela ╵qu’ils n’ont pas réussi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tout le troupeau ╵dont ils avaient la charge ╵a été dispersé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ecoutez la rumeur, ╵elle s’approche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un grand tumulte arrive ╵en provenance du pays du nord ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les villes de Juda ╵vont être transformées ╵en terre dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en gîtes de chacals.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Prière du prophète
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je sais, ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le destin de l’homme ╵n’est pas entre ses mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que celui qui marche
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’est pas le maître de ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Châtie-nous, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais avec équité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non avec colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne pas nous détruire ╵totalement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Déverse ta fureur ╵sur les peuples païens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ne te connaissent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les peuplades
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne t’invoquent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont dévoré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, dévoré Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à l’exterminer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont ravagé ╵le lieu de sa demeure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 79.6-7
        metadata:
          usfm: PSA.79.6+PSA.79.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
