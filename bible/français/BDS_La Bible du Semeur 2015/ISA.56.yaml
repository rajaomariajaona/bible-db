document_id: ISA.56,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tous les peuples acceptés
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: Faites ce qui est juste
  - type: text
    content: et respectez le droit,
  - type: text
    content: car je vais bientôt vous sauver,
  - type: text
    content: je vais faire justice.
  '10':
  - type: text
    content: 'Les sentinelles d’Israël ╵sont toutes des aveugles :'
  - type: text
    content: ce sont des ignorants,
  - type: text
    content: tous sont des chiens muets
  - type: text
    content: qui ne peuvent pas aboyer.
  - type: text
    content: Rêvassant, allongés,
  - type: text
    content: ils aiment somnoler…
  '11':
  - type: text
    content: Mais ces chiens sont avides
  - type: text
    content: et jamais rassasiés,
  - type: text
    content: et ce sont des bergers
  - type: text
    content: qui ne comprennent rien.
  - type: text
    content: Ils suivent chacun son chemin
  - type: text
    content: à la poursuite de ses gains.
  '12':
  - type: text
    content: « Venez, je vais chercher du vin,
  - type: text
    content: et nous boirons jusqu’à l’ivresse ╵des boissons fortes, disent-ils.
  - type: text
    content: 'Demain, la fête continue ╵comme aujourd’hui :'
  - type: text
    content: il reste du surplus ╵en abondance. »
  '2':
  - type: text
    content: Bienheureux sera l’homme ╵qui agira ainsi,
  - type: text
    content: 'heureux sera celui ╵qui s’y appliquera :'
  - type: text
    content: qui respectera le sabbat,
  - type: text
    content: et ne le profanera pas,
  - type: text
    content: et qui s’efforcera ╵de ne faire aucun mal !
  '3':
  - type: text
    content: 'L’étranger qui s’attache ╵à l’Eternel ╵ne devra pas se dire :'
  - type: text
    content: « L’Eternel m’exclura ╵sûrement de son peuple »,
  - type: text
    content: 'et l’eunuque non plus ╵n’aura pas à penser :'
  - type: text
    content: « Je suis un arbre sec ! »
  '4':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: A ceux qui sont eunuques, ╵qui respecteront les sabbats ╵que j’ai prescrits,
  - type: text
    content: qui choisiront de faire ╵ce qui m’est agréable,
  - type: text
    content: et qui s’attacheront ╵à mon alliance,
  '5':
  - type: text
    content: je réserverai ╵dans ma Maison
  - type: text
    content: et dans mes murs ╵une stèle et un nom
  - type: text
    content: qui vaudront mieux pour eux ╵que des fils et des filles ;
  - type: text
    content: je leur accorderai ╵un nom impérissable
  - type: text
    content: qui ne sera jamais rayé.
  '6':
  - type: text
    content: Et les étrangers qui s’attacheront
  - type: text
    content: à l’Eternel pour le servir,
  - type: text
    content: et pour l’aimer
  - type: text
    content: et pour être ses serviteurs,
  - type: text
    content: qui respecteront le sabbat
  - type: text
    content: et ne le profaneront pas,
  - type: text
    content: et qui s’attacheront ╵à mon alliance,
  '7':
  - type: text
    content: je les ferai venir ╵à ma montagne sainte
  - type: text
    content: et je les réjouirai ╵au Temple où l’on me prie,
  - type: text
    content: et j’agréerai leurs holocaustes ╵et autres sacrifices
  - type: text
    content: offerts sur mon autel.
  - type: text
    content: 'Car on appellera mon temple : ╵« La Maison de prière ╵pour tous les peuples'
  - type: note
    content: Cité par Jésus en Mt 21.13 ; Mc 11.17 ; Lc 19.46.
  - type: text
    content: . »
  '8':
  - type: text
    content: Voici ce que déclare l’Eternel,
  - type: text
    content: 'lui qui rassemble ╵les bannis d’Israël :'
  - type: text
    content: A ceux qui seront déjà rassemblés
  - type: text
    content: j’en joindrai d’autres ╵que je rassemblerai aussi.
  - type: heading
    content: Le changement nécessaire
  - type: heading
    content: Les conducteurs indignes
  '9':
  - type: text
    content: Vous tous les animaux sauvages,
  - type: text
    content: venez, repaissez-vous,
  - type: text
    content: tous les animaux des forêts
  - type: note
    content: Ces bêtes représentent les ennemis d’Israël invités à venir dévorer le troupeau (le peuple) mal gardé par ses conducteurs infidèles.
  - type: text
    content: '  !'
