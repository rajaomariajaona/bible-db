document_id: ISA.56
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Tous les peuples acceptés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que dit l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites ce qui est juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et respectez le droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je vais bientôt vous sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais faire justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Bienheureux sera l’homme ╵qui agira ainsi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'heureux sera celui ╵qui s’y appliquera :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui respectera le sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne le profanera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s’efforcera ╵de ne faire aucun mal !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’étranger qui s’attache ╵à l’Eternel ╵ne devra pas se dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « L’Eternel m’exclura ╵sûrement de son peuple »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et l’eunuque non plus ╵n’aura pas à penser :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je suis un arbre sec ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car voici ce que l’Eternel déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ceux qui sont eunuques, ╵qui respecteront les sabbats ╵que j’ai prescrits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui choisiront de faire ╵ce qui m’est agréable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s’attacheront ╵à mon alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: je réserverai ╵dans ma Maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans mes murs ╵une stèle et un nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vaudront mieux pour eux ╵que des fils et des filles ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je leur accorderai ╵un nom impérissable
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne sera jamais rayé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et les étrangers qui s’attacheront
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’Eternel pour le servir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour l’aimer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour être ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui respecteront le sabbat
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne le profaneront pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s’attacheront ╵à mon alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: je les ferai venir ╵à ma montagne sainte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les réjouirai ╵au Temple où l’on me prie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’agréerai leurs holocaustes ╵et autres sacrifices
- type: usfm
  marker: q1
  children:
  - type: text
    text: offerts sur mon autel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car on appellera mon temple : ╵« La Maison de prière ╵pour tous les peuples'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité par Jésus en Mt 21.13 ; Mc 11.17 ; Lc 19.46.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voici ce que déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'lui qui rassemble ╵les bannis d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ceux qui seront déjà rassemblés
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’en joindrai d’autres ╵que je rassemblerai aussi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le changement nécessaire
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les conducteurs indignes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous tous les animaux sauvages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: venez, repaissez-vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les animaux des forêts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '56.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces bêtes représentent les ennemis d’Israël invités à venir dévorer le troupeau (le peuple) mal gardé par ses conducteurs infidèles.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les sentinelles d’Israël ╵sont toutes des aveugles :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des ignorants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous sont des chiens muets
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne peuvent pas aboyer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rêvassant, allongés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils aiment somnoler…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais ces chiens sont avides
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jamais rassasiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce sont des bergers
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne comprennent rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils suivent chacun son chemin
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la poursuite de ses gains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: « Venez, je vais chercher du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous boirons jusqu’à l’ivresse ╵des boissons fortes, disent-ils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Demain, la fête continue ╵comme aujourd’hui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il reste du surplus ╵en abondance. »
