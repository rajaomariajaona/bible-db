document_id: PSA.63,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ton amour vaut mieux que la vie
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David, lorsqu’il était dans le désert de Juda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 S 23.14 ; 24.2.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils aillent à leur perte, ╵ceux qui veulent ma mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils descendent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qu’ils aillent… descendent, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ceux qui cherchent à causer ma perte, qu’ils descendent…
      marker-yv: yv-n
    - type: text
      text: ' ╵aux tréfonds de l’abîme.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient livrés ╵au tranchant de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que leurs corps soient donnés ╵en pâture aux chacals
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Que ceux qui veulent le [le roi] livrer au tranchant de l’épée soient donnés en pâture…
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le roi trouvera en Dieu ╵la source de sa joie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui, dans leurs serments, ╵prennent Dieu à témoin ╵s’en féliciteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les menteurs ╵auront la bouche close.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, tu es mon Dieu ! ╵C’est toi que je recherche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme a soif de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon corps même ne cesse ╵de languir après toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une terre aride, ╵desséchée et sans eau.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi, dans ton sanctuaire, ╵je te contemple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: considérant ta puissance et ta gloire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton amour ╵vaut bien mieux que la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi mes lèvres chantent ╵sans cesse tes louanges.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je veux te bénir ╵tout au long de ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lèverai les mains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Geste habituel de la prière.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour m’adresser à toi.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur sera comblé ╵comme, en un bon festin, ╵le corps se rassasie ╵de mets gras succulents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je crierai de joie ╵en disant tes louanges.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque je suis couché, ╵mes pensées vont vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je médite sur toi ╵tout au long de la nuit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu m’accordes ton secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis dans l’allégresse ╵à l’ombre de tes ailes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '63.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je demeure attaché ╵fidèlement à toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ta main agissante, ╵tu me soutiens.
