document_id: PSA.63,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ton amour vaut mieux que la vie
  - type: text
    content: Psaume de David, lorsqu’il était dans le désert de Juda
  - type: note
    content: Voir 1 S 23.14 ; 24.2.
  - type: text
    content: .
  '10':
  - type: text
    content: Qu’ils aillent à leur perte, ╵ceux qui veulent ma mort,
  - type: text
    content: et qu’ils descendent
  - type: note
    content: 'Qu’ils aillent… descendent, autre traduction : Ceux qui cherchent à causer ma perte, qu’ils descendent…'
  - type: text
    content: ' ╵aux tréfonds de l’abîme.'
  '11':
  - type: text
    content: Qu’ils soient livrés ╵au tranchant de l’épée,
  - type: text
    content: que leurs corps soient donnés ╵en pâture aux chacals
  - type: note
    content: 'Autre traduction : Que ceux qui veulent le [le roi] livrer au tranchant de l’épée soient donnés en pâture…'
  - type: text
    content: .
  '12':
  - type: text
    content: Mais le roi trouvera en Dieu ╵la source de sa joie.
  - type: text
    content: Ceux qui, dans leurs serments, ╵prennent Dieu à témoin ╵s’en féliciteront,
  - type: text
    content: tandis que les menteurs ╵auront la bouche close.
  '2':
  - type: text
    content: O Dieu, tu es mon Dieu ! ╵C’est toi que je recherche.
  - type: text
    content: Mon âme a soif de toi,
  - type: text
    content: mon corps même ne cesse ╵de languir après toi
  - type: text
    content: comme une terre aride, ╵desséchée et sans eau.
  '3':
  - type: text
    content: C’est pourquoi, dans ton sanctuaire, ╵je te contemple,
  - type: text
    content: considérant ta puissance et ta gloire.
  '4':
  - type: text
    content: Car ton amour ╵vaut bien mieux que la vie,
  - type: text
    content: aussi mes lèvres chantent ╵sans cesse tes louanges.
  '5':
  - type: text
    content: Oui, je veux te bénir ╵tout au long de ma vie,
  - type: text
    content: je lèverai les mains
  - type: note
    content: Geste habituel de la prière.
  - type: text
    content: ' ╵pour m’adresser à toi.'
  '6':
  - type: text
    content: Mon cœur sera comblé ╵comme, en un bon festin, ╵le corps se rassasie ╵de mets gras succulents,
  - type: text
    content: et je crierai de joie ╵en disant tes louanges.
  '7':
  - type: text
    content: Lorsque je suis couché, ╵mes pensées vont vers toi,
  - type: text
    content: je médite sur toi ╵tout au long de la nuit.
  '8':
  - type: text
    content: Oui, tu m’accordes ton secours,
  - type: text
    content: je suis dans l’allégresse ╵à l’ombre de tes ailes
  - type: note
    content: Voir note 17.8.
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Je demeure attaché ╵fidèlement à toi ;
  - type: text
    content: de ta main agissante, ╵tu me soutiens.
