document_id: 1TH.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Instructions
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel à une vie sainte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Enfin, frères et sœurs, vous avez appris de nous comment vous devez vous conduire pour plaire à Dieu, et vous vous conduisez déjà ainsi. Mais, nous vous le demandons, et nous vous le recommandons à cause de votre union avec le Seigneur Jésus : faites toujours plus de progrès dans ce domaine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car vous connaissez les instructions que nous vous avons données de la part du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce que Dieu veut, c’est que vous deveniez toujours plus saints : que vous vous absteniez de toute immoralité ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: que chacun de vous sache gagner une parfaite maîtrise de son corps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que chacun de vous sache prendre femme d’une manière sainte et honorable.
    marker-yv: yv-n
  - type: text
    text: ' pour vivre dans la sainteté et l’honneur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sans se laisser dominer par des passions déréglées, comme le font '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les païens qui ne connaissent pas Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 79.6 ; Jr 10.25.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Qu’ainsi personne ne cause du tort à son frère ou sa sœur dans ce domaine en portant atteinte à ses droits. Dieu, en effet, fait justice de toute faute de ce genre : nous vous l’avons déjà dit et nous vous en avons avertis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car Dieu ne nous a pas appelés à nous adonner à des pratiques dégradantes mais à vivre d’une manière sainte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui donc qui rejette cet enseignement rejette, non pas un homme, mais Dieu qui vous donne son Esprit Saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Concernant l’amour fraternel, vous n’avez pas besoin d’instructions écrites, car Dieu vous a lui-même appris à vous aimer mutuellement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est ce que vous faites envers tous les frères et sœurs de la Macédoine entière. Mais nous vous invitons, frères et sœurs, à faire toujours plus de progrès '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: en mettant votre point d’honneur à vivre dans la paix, à vous occuper chacun de ses propres affaires, et à gagner votre vie par votre propre travail, comme nous vous l’avons déjà recommandé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains croyants, à cause d’une mauvaise compréhension de l’enseignement sur le retour du Seigneur, semblent avoir renoncé à travailler pour vivre aux crochets des autres chrétiens (voir 2.9 ; 2 Th 3.6-12). Une telle attitude a dû être favorisée par le mépris de la culture grecque pour le travail manuel que l’on réservait aux esclaves.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: afin de vous conduire d’une manière respectable aux yeux de ceux qui sont en dehors de la famille de Dieu ; ainsi vous ne dépendrez de personne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les croyants décédés et le retour du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nous ne voulons pas, frères et sœurs, vous laisser dans l’ignorance au sujet de ceux qui sont décédés, afin que vous ne soyez pas tristes de la même manière que le reste des hommes, qui n’ont pas d’espérance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, puisque nous croyons que Jésus est mort et ressuscité, nous croyons aussi que Dieu ramènera par Jésus et avec lui ceux qui sont morts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que Dieu ramènera par Jésus ceux qui sont morts en croyant en lui.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car voici ce que nous vous déclarons d’après une parole du Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sans doute une parole de Jésus que Paul connaissait par la tradition orale et qui n’a pas été transmise par les évangiles.
    marker-yv: yv-n
  - type: text
    text: '  : nous qui serons restés en vie au moment où le Seigneur viendra, nous ne précéderons pas ceux qui sont morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, au signal donné, sitôt que la voix de l’archange et le son de la trompette divine retentiront, le Seigneur lui-même descendra du ciel, et ceux qui sont morts unis à Christ ressusciteront en premier lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ensuite, nous qui serons restés en vie à ce moment-là, nous serons enlevés ensemble avec eux, dans les nuées, pour rencontrer le Seigneur dans les airs. Ainsi nous serons pour toujours avec le Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Encouragez-vous donc mutuellement par ces paroles.
