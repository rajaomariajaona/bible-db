document_id: 1TH.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions
  - type: heading
    content: L’appel à une vie sainte
  - type: text
    content: 'Enfin, frères et sœurs, vous avez appris de nous comment vous devez vous conduire pour plaire à Dieu, et vous vous conduisez déjà ainsi. Mais, nous vous le demandons, et nous vous le recommandons à cause de votre union avec le Seigneur Jésus : faites toujours plus de progrès dans ce domaine.'
  '10':
  - type: text
    content: 'C’est ce que vous faites envers tous les frères et sœurs de la Macédoine entière. Mais nous vous invitons, frères et sœurs, à faire toujours plus de progrès '
  '11':
  - type: text
    content: en mettant votre point d’honneur à vivre dans la paix, à vous occuper chacun de ses propres affaires, et à gagner votre vie par votre propre travail, comme nous vous l’avons déjà recommandé
  - type: note
    content: Certains croyants, à cause d’une mauvaise compréhension de l’enseignement sur le retour du Seigneur, semblent avoir renoncé à travailler pour vivre aux crochets des autres chrétiens (voir 2.9 ; 2 Th 3.6-12). Une telle attitude a dû être favorisée par le mépris de la culture grecque pour le travail manuel que l’on réservait aux esclaves.
  - type: text
    content: ', '
  '12':
  - type: text
    content: afin de vous conduire d’une manière respectable aux yeux de ceux qui sont en dehors de la famille de Dieu ; ainsi vous ne dépendrez de personne.
  - type: heading
    content: Les croyants décédés et le retour du Seigneur
  '13':
  - type: text
    content: Nous ne voulons pas, frères et sœurs, vous laisser dans l’ignorance au sujet de ceux qui sont décédés, afin que vous ne soyez pas tristes de la même manière que le reste des hommes, qui n’ont pas d’espérance.
  '14':
  - type: text
    content: En effet, puisque nous croyons que Jésus est mort et ressuscité, nous croyons aussi que Dieu ramènera par Jésus et avec lui ceux qui sont morts
  - type: note
    content: 'Autre traduction : que Dieu ramènera par Jésus ceux qui sont morts en croyant en lui.'
  - type: text
    content: .
  '15':
  - type: text
    content: Car voici ce que nous vous déclarons d’après une parole du Seigneur
  - type: note
    content: Sans doute une parole de Jésus que Paul connaissait par la tradition orale et qui n’a pas été transmise par les évangiles.
  - type: text
    content: '  : nous qui serons restés en vie au moment où le Seigneur viendra, nous ne précéderons pas ceux qui sont morts. '
  '16':
  - type: text
    content: 'En effet, au signal donné, sitôt que la voix de l’archange et le son de la trompette divine retentiront, le Seigneur lui-même descendra du ciel, et ceux qui sont morts unis à Christ ressusciteront en premier lieu. '
  '17':
  - type: text
    content: Ensuite, nous qui serons restés en vie à ce moment-là, nous serons enlevés ensemble avec eux, dans les nuées, pour rencontrer le Seigneur dans les airs. Ainsi nous serons pour toujours avec le Seigneur.
  '18':
  - type: text
    content: Encouragez-vous donc mutuellement par ces paroles.
  '2':
  - type: text
    content: 'Car vous connaissez les instructions que nous vous avons données de la part du Seigneur Jésus. '
  '3':
  - type: text
    content: 'Ce que Dieu veut, c’est que vous deveniez toujours plus saints : que vous vous absteniez de toute immoralité ; '
  '4':
  - type: text
    content: que chacun de vous sache gagner une parfaite maîtrise de son corps
  - type: note
    content: 'Autre traduction : que chacun de vous sache prendre femme d’une manière sainte et honorable.'
  - type: text
    content: ' pour vivre dans la sainteté et l’honneur, '
  '5':
  - type: text
    content: 'sans se laisser dominer par des passions déréglées, comme le font '
  - type: text
    content: les païens qui ne connaissent pas Dieu
  - type: note
    content: Ps 79.6 ; Jr 10.25.
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Qu’ainsi personne ne cause du tort à son frère ou sa sœur dans ce domaine en portant atteinte à ses droits. Dieu, en effet, fait justice de toute faute de ce genre : nous vous l’avons déjà dit et nous vous en avons avertis. '
  '7':
  - type: text
    content: Car Dieu ne nous a pas appelés à nous adonner à des pratiques dégradantes mais à vivre d’une manière sainte.
  '8':
  - type: text
    content: Celui donc qui rejette cet enseignement rejette, non pas un homme, mais Dieu qui vous donne son Esprit Saint.
  '9':
  - type: text
    content: 'Concernant l’amour fraternel, vous n’avez pas besoin d’instructions écrites, car Dieu vous a lui-même appris à vous aimer mutuellement. '
