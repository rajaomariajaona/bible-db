document_id: 2CH.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Juda en guerre contre Israël
  - type: heading
    content: (1 R 15.17-22)
  - type: text
    content: La trente-sixième année du règne d’Asa
  - type: note
    content: 'Les précisions trente-cinquième année (15.19) et trente-sixième année du règne d’Asa ne s’accordent pas avec les autres données chronologiques des Rois (1 R 15.33 ; 16.8) et des Chroniques. Diverses hypothèses ont été avancées : le Chroniste daterait ces événements des 35e et 36e années après le schisme, ce qui correspondrait aux 15e et 16e années d’Asa ; ou il s’agirait d’une erreur de copiste, l’original pouvant être : 25e et 26e années. Mais aucune de ces solutions n’est satisfaisante.'
  - type: text
    content: ', Baésha, roi d’Israël, vint attaquer le royaume de Juda. Il fortifia Rama pour empêcher qu’on pénètre sur le territoire d’Asa, roi de Juda, et qu’on en sorte'
  - type: note
    content: 'Autre traduction : …Rama, pour barrer le passage à Asa, roi de Juda.'
  - type: text
    content: .
  '10':
  - type: text
    content: Asa fut irrité contre le prophète. Furieux contre lui à cause de cette intervention, il le fit jeter en prison, les fers aux pieds. A la même époque, Asa se mit à opprimer une partie du peuple.
  - type: heading
    content: La fin du règne d’Asa
  - type: heading
    content: (1 R 15.23-24)
  '11':
  - type: text
    content: Les faits et gestes d’Asa, des premiers aux derniers, sont cités dans les livres des rois de Juda et d’Israël
  - type: note
    content: Non les livres bibliques des Rois mais des annales rédigées par les secrétaires royaux.
  - type: text
    content: '. '
  '12':
  - type: text
    content: La trente-neuvième année de son règne, Asa tomba gravement malade et il souffrit grandement des pieds ; toutefois, même pendant sa maladie, il ne s’adressa pas à l’Eternel mais seulement aux guérisseurs.
  '13':
  - type: text
    content: 'Asa rejoignit ses ancêtres décédés. Il mourut la quarante et unième année de son règne. '
  '14':
  - type: text
    content: On l’enterra dans l’une des tombes qu’il s’était fait creuser dans la Cité de David. On le déposa sur un lit garni d’aromates et de baumes parfumés préparés par des embaumeurs, et l’on fit un immense brasier en son honneur.
  '2':
  - type: text
    content: 'Asa préleva une certaine quantité d’argent et d’or dans les trésors du temple de l’Eternel et du palais royal, pour la faire porter à Ben-Hadad, roi de Syrie, qui résidait à Damas. Il l’accompagna du message suivant : '
  '3':
  - type: text
    content: « Faisons une alliance comme il y en a eu une entre nos ancêtres respectifs. Voici que je t’envoie de l’argent et de l’or. Je te demande, en échange, de rompre ton alliance avec Baésha, roi d’Israël, afin qu’il cesse de me faire la guerre. »
  '4':
  - type: text
    content: Ben-Hadad accepta la proposition du roi Asa ; il envoya ses chefs militaires attaquer les villes d’Israël et ceux-ci frappèrent les villes d’Iyôn, de Dan et d’Abel-Maïm
  - type: note
    content: Autre nom d’Abel Beth-Maaka (1 R 15.20).
  - type: text
    content: ', ainsi que tous les entrepôts des villes de Nephtali'
  - type: note
    content: Voir note 1 R 15.20.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Lorsque Baésha apprit cette nouvelle, il renonça à fortifier Rama et fit cesser ses travaux. '
  '6':
  - type: text
    content: Alors le roi Asa rassembla tous les Judéens pour enlever les pierres et le bois que Baésha avait rassemblés pour fortifier Rama, et il s’en servit pour fortifier les villes de Guéba et de Mitspa.
  - type: heading
    content: Un message prophétique mal reçu
  '7':
  - type: text
    content: 'C’est alors que le prophète Hanani vint trouver Asa, roi de Juda, et lui dit : Tu t’es appuyé sur le roi de Syrie au lieu de t’appuyer sur l’Eternel ton Dieu ; à cause de cela, l’armée de ce roi t’échappera. '
  '8':
  - type: text
    content: 'Rappelle-toi que les Ethiopiens et les Libyens formaient une armée puissante dotée d’un très grand nombre de chars avec leurs équipages. Cependant l’Eternel t’a donné la victoire sur eux, parce que tu t’étais appuyé sur lui. '
  '9':
  - type: text
    content: Car l’Eternel parcourt toute la terre du regard pour soutenir ceux dont le cœur est tourné vers lui sans partage. Tu as agi comme un insensé, et à cause de cela, tu ne cesseras plus d’être en guerre.
