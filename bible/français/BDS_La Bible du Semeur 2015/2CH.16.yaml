  children:
  - type: text
    text: Juda en guerre contre Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 15.17-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La trente-sixième année du règne d’Asa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les précisions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trente-cinquième année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.19'
        metadata:
          usfm: 2CH.15.19
      - type: text
        text: ') et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trente-sixième année du règne d’Asa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ne s’accordent pas avec les autres données chronologiques des Rois (1 R 15.33 ; 16.8) et des Chroniques. Diverses hypothèses ont été avancées : le Chroniste daterait ces événements des 35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' et 36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' années après le schisme, ce qui correspondrait aux 15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' et 16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' années d’Asa ; ou il s’agirait d’une erreur de copiste, l’original pouvant être : 25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' et 26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' années. Mais aucune de ces solutions n’est satisfaisante.'
    marker-yv: yv-n
  - type: text
    text: ', Baésha, roi d’Israël, vint attaquer le royaume de Juda. Il fortifia Rama pour empêcher qu’on pénètre sur le territoire d’Asa, roi de Juda, et qu’on en sorte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: …Rama, pour barrer le passage à Asa, roi de Juda.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Asa préleva une certaine quantité d’argent et d’or dans les trésors du temple de l’Eternel et du palais royal, pour la faire porter à Ben-Hadad, roi de Syrie, qui résidait à Damas. Il l’accompagna du message suivant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: « Faisons une alliance comme il y en a eu une entre nos ancêtres respectifs. Voici que je t’envoie de l’argent et de l’or. Je te demande, en échange, de rompre ton alliance avec Baésha, roi d’Israël, afin qu’il cesse de me faire la guerre. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ben-Hadad accepta la proposition du roi Asa ; il envoya ses chefs militaires attaquer les villes d’Israël et ceux-ci frappèrent les villes d’Iyôn, de Dan et d’Abel-Maïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Autre nom d’Abel Beth-Maaka (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15.20
        metadata:
          usfm: 1KI.15.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ainsi que tous les entrepôts des villes de Nephtali'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15.20
        metadata:
          usfm: 1KI.15.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque Baésha apprit cette nouvelle, il renonça à fortifier Rama et fit cesser ses travaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors le roi Asa rassembla tous les Judéens pour enlever les pierres et le bois que Baésha avait rassemblés pour fortifier Rama, et il s’en servit pour fortifier les villes de Guéba et de Mitspa.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un message prophétique mal reçu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est alors que le prophète Hanani vint trouver Asa, roi de Juda, et lui dit : Tu t’es appuyé sur le roi de Syrie au lieu de t’appuyer sur l’Eternel ton Dieu ; à cause de cela, l’armée de ce roi t’échappera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rappelle-toi que les Ethiopiens et les Libyens formaient une armée puissante dotée d’un très grand nombre de chars avec leurs équipages. Cependant l’Eternel t’a donné la victoire sur eux, parce que tu t’étais appuyé sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car l’Eternel parcourt toute la terre du regard pour soutenir ceux dont le cœur est tourné vers lui sans partage. Tu as agi comme un insensé, et à cause de cela, tu ne cesseras plus d’être en guerre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Asa fut irrité contre le prophète. Furieux contre lui à cause de cette intervention, il le fit jeter en prison, les fers aux pieds. A la même époque, Asa se mit à opprimer une partie du peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du règne d’Asa
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 15.23-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les faits et gestes d’Asa, des premiers aux derniers, sont cités dans les livres des rois de Juda et d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Non les livres bibliques des Rois mais des annales rédigées par les secrétaires royaux.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La trente-neuvième année de son règne, Asa tomba gravement malade et il souffrit grandement des pieds ; toutefois, même pendant sa maladie, il ne s’adressa pas à l’Eternel mais seulement aux guérisseurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Asa rejoignit ses ancêtres décédés. Il mourut la quarante et unième année de son règne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On l’enterra dans l’une des tombes qu’il s’était fait creuser dans la Cité de David. On le déposa sur un lit garni d’aromates et de baumes parfumés préparés par des embaumeurs, et l’on fit un immense brasier en son honneur.
