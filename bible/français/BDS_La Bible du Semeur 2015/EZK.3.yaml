document_id: EZK.3
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel fortifie son prophète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Celui qui me parlait me dit : Fils d’homme, mange ce qui t’est présenté, avale ce rouleau, puis va parler à la communauté d’Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’ouvris la bouche et il me fit manger le rouleau. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis il me dit : Fils d’homme, nourris ton corps et remplis ton ventre de ce rouleau que je te donne.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je le mangeai donc et, dans ma bouche, il fut doux comme du miel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il ajouta : Fils d’homme, va, rends-toi auprès des Israélites et communique-leur mes paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car ce n’est pas vers un peuple qui parle une langue difficile et inintelligible que tu es envoyé, mais vers la communauté d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si je t’envoyais vers de nombreux peuples à la langue difficile et inintelligible dont tu ne comprendrais pas les paroles, eux ils t’écouteraient. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais la communauté d’Israël vers laquelle je t’envoie ne voudra pas t’écouter, car ils ne veulent pas m’écouter. En effet, tous ces Israélites sont des gens à la tête dure et au cœur insensible. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eh bien, je vais te donner un visage aussi obstiné que le leur et un front aussi résolu que le leur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je vais rendre ton front aussi dur que le diamant, plus dur que le roc. Ne les crains donc pas et ne tremble pas en leur présence, bien que ce soit une communauté de rebelles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il ajouta : Fils d’homme, écoute attentivement tout ce que je vais te dire et prends-le bien à cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis va te rendre auprès de tes compatriotes déportés pour leur parler, et – qu’ils t’écoutent ou qu’ils refusent de t’écouter – dis-leur : « Voici ce que déclare le Seigneur, l’Eternel. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Emporté par l’Esprit de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors l’Esprit me souleva et j’entendis derrière moi une grande clameur : Bénie soit la gloire de l’Eternel, du lieu où elle demeure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je perçus aussi le bruit que faisaient les ailes des êtres vivants en battant l’une contre l’autre, et en même temps celui des roues, et la grande clameur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors l’Esprit me souleva de terre et m’emporta. Je partis, le cœur plein d’amertume et d’indignation, tandis que la main de l’Eternel agissait sur moi avec force. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J’arrivai ainsi auprès des exilés, à Tel-Aviv
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localité inconnue, colonie juive en Mésopotamie.
    marker-yv: yv-n
  - type: text
    text: ', chez ceux qui habitaient sur les bords du canal du Kebar, car c’est là qu’ils demeuraient. Je restai là sept jours, hébété, au milieu d’eux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les conditions d’exercice du ministère
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Comme une sentinelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Au bout de ces sept jours, l’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils d’homme, j’ai fait de toi une sentinelle pour la communauté d’Israël. Quand tu entendras une parole de ma bouche, tu les avertiras de ma part. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand je dirai au coupable : « Tu vas mourir », si tu ne l’avertis pas, si tu ne parles pas pour avertir ce coupable et lui demander d’abandonner sa mauvaise conduite pour obtenir la vie sauve, alors, certes, ce coupable mourra à cause de sa faute, mais je te demanderai compte de sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si, par contre, tu as averti le coupable et qu’il ne se détourne pas de sa méchanceté ni de sa conduite coupable, il mourra pour sa faute, mais toi, tu auras la vie sauve.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'De même, si un homme juste se détourne de sa conduite juste pour faire le mal, alors je placerai quelque occasion de chute devant lui, et s’il meurt pour n’avoir pas été averti, certes, c’est à cause de sa faute qu’il mourra, et l’on ne tiendra pas compte de sa conduite juste du passé, mais je te demanderai compte de sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais si tu as averti l’homme juste pour qu’il ne commette pas de faute, et qu’effectivement il n’en commette pas, alors il vivra pour avoir entendu tes avertissements et toi, tu auras la vie sauve.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jours de silence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La main de l’Eternel fut encore sur moi en ce lieu, et il me dit : Lève-toi, sors vers la vallée, et là je te parlerai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je me levai donc et je sortis vers la vallée. Et voici que la gloire de l’Eternel se tenait là, identique à la gloire que j’avais contemplée près du canal du Kebar. Alors je tombai la face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais l’Esprit entra en moi et me fit tenir debout. Il me parla et me dit : Va t’enfermer dans ta maison. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or, fils d’homme, on viendra te ligoter avec des cordes, de sorte que tu ne pourras plus sortir au milieu de tes compatriotes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je collerai ta langue à ton palais et tu seras muet ; ainsi tu cesseras d’intercéder pour eux, car c’est un peuple rebelle. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais quand je te parlerai, je t’ouvrirai la bouche. Alors tu leur diras : « Voici ce que déclare le Seigneur, l’Eternel : Celui qui veut écouter, qu’il écoute, et celui qui refuse d’écouter, qu’il n’écoute pas – car c’est une communauté rebelle. »'
