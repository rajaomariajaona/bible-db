document_id: NAM.2
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: (A Juda)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'accourt un messager ╵qui vient vous apporter ╵une bonne nouvelle : ╵il annonce la paix.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célèbre donc tes fêtes, ╵ô peuple de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et accomplis tes vœux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car désormais, ╵il ne passera plus chez toi, ╵le criminel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.11'
        metadata:
          usfm: NAM.1.11
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera retranché ╵entièrement.
- type: usfm
  marker: s2
  children:
  - type: text
    text: (A Ninive)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Celui qui va te disperser ╵s’avance contre toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit des armées des Mèdes et des Babyloniens, aidées par les Scythes, qui détruiront Ninive en 612 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', Ninive.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde ta forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: surveille tes chemins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rassemble ton énergie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: affermis bien tes forces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car l’Eternel restaure ╵la gloire de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, il va rétablir ╵la grandeur d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, les pillards ╵les avaient dépouillés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils avaient brisé ╵les sarments de leur vigne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prophéties contre Ninive
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’agonie de Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les boucliers de ses guerriers ╵sont teints en rouge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses vaillants soldats ╵sont vêtus d’écarlate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors qu’ils se préparent !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les aciers des chars étincellent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les lances de bois s’agitent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les lances de bois s’agitent. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versions ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les cavaliers s’élancent.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: les chars se précipitent ╵en furie dans les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se ruent sur les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dirait des torches de feu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils courent en tous sens ╵comme l’éclair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors le roi de l’Assyrie ╵bat le rappel ╵de tous ses capitaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans leur marche, ils trébuchent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux remparts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ninive était protégée par 13 kilomètres de remparts munis de quinze portes fortifiées et entourés d’un fossé de 45 mètres de large.
    marker-yv: yv-n
  - type: text
    text: ', ils se précipitent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les défenses ╵sont mises en place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les portes donnant sur le fleuve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bâtie sur une berge du Tigre, Ninive avait une demi-douzaine de portes donnant sur ce fleuve.
    marker-yv: yv-n
  - type: text
    text: ' ╵sont enfoncées'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le palais s’écroule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dans l’eau, ses pierres se répandent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on emmène la princesse en exil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dans l’eau, ses pierres… la princesse en exil. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle est découverte, enlevée, la déesse.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses suivantes gémissent ╵comme des colombes plaintives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles se frappent la poitrine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ninive est comme un bassin fissuré
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne retient plus l’eau ╵dont il était rempli.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les voilà qui s’enfuient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Arrêtez ! Arrêtez ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais nul ne se retourne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pillez tout son argent ╵et raflez tout son or !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses richesses sont sans limite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est remplie ╵d’objets précieux de toutes sortes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sac, saccage et carnage !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas ! Les cœurs défaillent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les genoux flageolent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les voilà qui tremblent de tout leur corps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les visages de tous ╵sont blancs comme des linges.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le lion vaincu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qu’est devenu ╵cet antre du lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce domaine où les lionceaux ╵se repaissaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: des proies que le lion ╵était allé chercher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des proies… chercher
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après un texte hébreu retrouvé à Qumrân. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et que parcouraient le lion, la lionne et le lionceau.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’ils soient dérangés ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le lion déchirait ╵les proies pour ses petits ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il étranglait pour ses lionnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il remplissait son antre de ses proies
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa tanière ╵de chairs déchiquetées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je vais m’en prendre à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel, ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viderai ton trou
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Modification légère du terme hébreu. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tes chars. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les manuscrits hébreux et les versions présentent diverses variantes.
    marker-yv: yv-n
  - type: text
    text: ' ╵en l’enfumant ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors tes lionceaux ╵seront dévorés par l’épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai fin sur terre ╵à tes rapines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la voix de tes émissaires, ╵on ne l’entendra plus.
