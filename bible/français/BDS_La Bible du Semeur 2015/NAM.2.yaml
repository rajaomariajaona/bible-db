document_id: NAM.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: (A Juda)
  - type: text
    content: Voici sur les montagnes,
  - type: text
    content: 'accourt un messager ╵qui vient vous apporter ╵une bonne nouvelle : ╵il annonce la paix.'
  - type: text
    content: Célèbre donc tes fêtes, ╵ô peuple de Juda,
  - type: text
    content: et accomplis tes vœux,
  - type: text
    content: car désormais, ╵il ne passera plus chez toi, ╵le criminel
  - type: note
    content: Voir 1.11 et note.
  - type: text
    content: ','
  - type: text
    content: il sera retranché ╵entièrement.
  - type: heading
    content: (A Ninive)
  '10':
  - type: text
    content: Pillez tout son argent ╵et raflez tout son or !
  - type: text
    content: Ses richesses sont sans limite,
  - type: text
    content: elle est remplie ╵d’objets précieux de toutes sortes.
  '11':
  - type: text
    content: Sac, saccage et carnage !
  - type: text
    content: Hélas ! Les cœurs défaillent
  - type: text
    content: et les genoux flageolent.
  - type: text
    content: Les voilà qui tremblent de tout leur corps.
  - type: text
    content: Les visages de tous ╵sont blancs comme des linges.
  - type: heading
    content: Le lion vaincu
  '12':
  - type: text
    content: Qu’est devenu ╵cet antre du lion,
  - type: text
    content: ce domaine où les lionceaux ╵se repaissaient
  - type: text
    content: des proies que le lion ╵était allé chercher
  - type: note
    content: 'des proies… chercher: d’après un texte hébreu retrouvé à Qumrân. Texte hébreu traditionnel : et que parcouraient le lion, la lionne et le lionceau.'
  - type: text
    content: ','
  - type: text
    content: sans qu’ils soient dérangés ?
  '13':
  - type: text
    content: Le lion déchirait ╵les proies pour ses petits ;
  - type: text
    content: il étranglait pour ses lionnes,
  - type: text
    content: il remplissait son antre de ses proies
  - type: text
    content: et sa tanière ╵de chairs déchiquetées.
  '14':
  - type: text
    content: Je vais m’en prendre à toi,
  - type: text
    content: déclare l’Eternel, ╵le Seigneur des armées célestes.
  - type: text
    content: Je viderai ton trou
  - type: note
    content: 'Modification légère du terme hébreu. Le texte hébreu traditionnel a : tes chars. Les manuscrits hébreux et les versions présentent diverses variantes.'
  - type: text
    content: ' ╵en l’enfumant ;'
  - type: text
    content: alors tes lionceaux ╵seront dévorés par l’épée.
  - type: text
    content: Je mettrai fin sur terre ╵à tes rapines,
  - type: text
    content: et la voix de tes émissaires, ╵on ne l’entendra plus.
  '2':
  - type: text
    content: Celui qui va te disperser ╵s’avance contre toi
  - type: note
    content: Il s’agit des armées des Mèdes et des Babyloniens, aidées par les Scythes, qui détruiront Ninive en 612 av. J.-C.
  - type: text
    content: ', Ninive.'
  - type: text
    content: Garde ta forteresse,
  - type: text
    content: surveille tes chemins,
  - type: text
    content: et rassemble ton énergie,
  - type: text
    content: affermis bien tes forces.
  '3':
  - type: text
    content: Car l’Eternel restaure ╵la gloire de Jacob,
  - type: text
    content: oui, il va rétablir ╵la grandeur d’Israël.
  - type: text
    content: En effet, les pillards ╵les avaient dépouillés,
  - type: text
    content: et ils avaient brisé ╵les sarments de leur vigne.
  - type: heading
    content: Les prophéties contre Ninive
  - type: heading
    content: L’agonie de Ninive
  '4':
  - type: text
    content: Les boucliers de ses guerriers ╵sont teints en rouge,
  - type: text
    content: et ses vaillants soldats ╵sont vêtus d’écarlate.
  - type: text
    content: Alors qu’ils se préparent !
  - type: text
    content: Les aciers des chars étincellent
  - type: text
    content: et les lances de bois s’agitent
  - type: note
    content: 'les lances de bois s’agitent. Les versions ont : les cavaliers s’élancent.'
  - type: text
    content: ','
  '5':
  - type: text
    content: les chars se précipitent ╵en furie dans les rues,
  - type: text
    content: ils se ruent sur les places,
  - type: text
    content: on dirait des torches de feu ;
  - type: text
    content: ils courent en tous sens ╵comme l’éclair.
  '6':
  - type: text
    content: Alors le roi de l’Assyrie ╵bat le rappel ╵de tous ses capitaines.
  - type: text
    content: Dans leur marche, ils trébuchent,
  - type: text
    content: aux remparts
  - type: note
    content: Ninive était protégée par 13 kilomètres de remparts munis de quinze portes fortifiées et entourés d’un fossé de 45 mètres de large.
  - type: text
    content: ', ils se précipitent,'
  - type: text
    content: et les défenses ╵sont mises en place.
  '7':
  - type: text
    content: Les portes donnant sur le fleuve
  - type: note
    content: Bâtie sur une berge du Tigre, Ninive avait une demi-douzaine de portes donnant sur ce fleuve.
  - type: text
    content: ' ╵sont enfoncées'
  - type: text
    content: et le palais s’écroule.
  '8':
  - type: text
    content: Dans l’eau, ses pierres se répandent,
  - type: text
    content: on emmène la princesse en exil
  - type: note
    content: 'Dans l’eau, ses pierres… la princesse en exil. Autre traduction : elle est découverte, enlevée, la déesse.'
  - type: text
    content: .
  - type: text
    content: Ses suivantes gémissent ╵comme des colombes plaintives,
  - type: text
    content: elles se frappent la poitrine.
  '9':
  - type: text
    content: Ninive est comme un bassin fissuré
  - type: text
    content: qui ne retient plus l’eau ╵dont il était rempli.
  - type: text
    content: Les voilà qui s’enfuient.
  - type: text
    content: « Arrêtez ! Arrêtez ! »
  - type: text
    content: Mais nul ne se retourne.
