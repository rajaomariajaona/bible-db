document_id: PRO.11
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’Eternel a horreur des balances fausses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il aime les poids exacts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 16.11 ; 20.10, 23 ; Lv 19.36 ; Am 8.5 ; Mi 6.9-12.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le mépris suit de près l’orgueil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la sagesse se tient auprès des humbles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’intégrité guide les hommes droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les tricheries des gens infidèles les mènent à la ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La richesse ne sera d’aucun secours au jour de la colère divine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais être juste sauve de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La justice de l’homme intègre lui fait prendre le droit chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le méchant tombe par sa propre méchanceté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La justice de l’homme droit le sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les gens retors sont pris au piège de leurs désirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand le méchant meurt, tous ses espoirs périssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la confiance qu’il avait placée en ses ressources s’effondre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le juste sera libéré de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le méchant y prendra sa place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Par ses paroles, l’impie cause la ruine de son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, par leur science, les justes en sont préservés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le bonheur des justes fait la joie de toute la cité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand les méchants périssent, on pousse des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une cité prospère quand des justes attirent la bénédiction sur elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les paroles des méchants œuvrent à sa ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qui traite son prochain avec mépris est un insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’homme intelligent accepte de se taire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le médisant divulgue les secrets ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: un homme de confiance tient la chose cachée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quand un peuple n’est pas bien gouverné, il décline ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le salut se trouve dans le grand nombre des conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qui se porte garant des dettes d’un inconnu s’en trouvera mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui veille à ne pas s’engager
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: PRO.6.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' assure sa sécurité.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Une femme aimable obtient les honneurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[mais la femme sans vertu est assise dans la honte.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les paresseux n’ont jamais d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets se trouvent dans l’ancienne version grecque et la version syriaque, mais pas dans le texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: ',]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes énergiques obtiennent les richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’homme bienveillant se fait du bien à lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’homme cruel creuse son propre malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le méchant fait une œuvre qui le trompe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui sème la justice reçoit un salaire sûr.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La justice mène à la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui poursuit le mal court à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’Eternel a horreur de ceux qui ont le cœur tortueux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il accorde sa faveur à ceux qui se conduisent de façon intègre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous pouvez en être sûrs : en fin de compte, le méchant n’échappera pas au châtiment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que les justes seront sauvés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Une femme belle et dépourvue de bon sens
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme un anneau d’or dans le groin d’un porc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les femmes orientales se paraient ainsi d’un anneau d’or (Gn 24.47 ; Ez 16.12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutes les aspirations des justes tendent vers le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tout ce que les méchants peuvent espérer, c’est la colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tel donne libéralement et ses richesses s’accroissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel autre épargne à l’excès et se trouve dans la pauvreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Qui répand la bénédiction connaîtra l’abondance ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui donne à boire aux autres sera lui-même désaltéré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le peuple maudit l’accapareur qui retient son blé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour le vendre plus cher en temps de pénurie.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui le vend sans différer obtient la bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qui recherche assidûment le bien s’attire la faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui poursuit le mal tombera dans les griffes du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ceux qui se confient dans leurs richesses tomberont,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les justes s’épanouiront comme la frondaison nouvelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Qui sème le trouble dans sa famille héritera le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’insensé deviendra l’esclave du sage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par suite de ses dettes contractées à la légère (22.7 ; voir 14.19).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le fruit que porte le juste est un arbre de vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui est sage gagne les cœurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.18'
        metadata:
          usfm: PRO.3.18
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Déjà ici-bas, le juste reçoit sa rétribution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à plus forte raison, le méchant et le pécheur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.27'
        metadata:
          usfm: PRO.10.27
      - type: text
        text: '. Ce verset est cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 4.18
        metadata:
          usfm: 1PE.4.18
      - type: text
        text: ' d’après l’ancienne version grecque. Selon cette citation, la « rétribution » du juste doit être comprise comme un châtiment.'
    marker-yv: yv-n
  - type: text
    text: .
