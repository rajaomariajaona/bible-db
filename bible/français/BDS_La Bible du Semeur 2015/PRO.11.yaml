document_id: PRO.11,21
type_code: fra
verses:
  '1':
  - type: text
    content: L’Eternel a horreur des balances fausses,
  - type: text
    content: mais il aime les poids exacts
  - type: note
    content: Voir 16.11 ; 20.10, 23 ; Lv 19.36 ; Am 8.5 ; Mi 6.9-12.
  - type: text
    content: .
  '10':
  - type: text
    content: Le bonheur des justes fait la joie de toute la cité,
  - type: text
    content: et quand les méchants périssent, on pousse des cris de joie.
  '11':
  - type: text
    content: Une cité prospère quand des justes attirent la bénédiction sur elle,
  - type: text
    content: mais les paroles des méchants œuvrent à sa ruine.
  '12':
  - type: text
    content: Qui traite son prochain avec mépris est un insensé,
  - type: text
    content: mais l’homme intelligent accepte de se taire.
  '13':
  - type: text
    content: Le médisant divulgue les secrets ;
  - type: text
    content: un homme de confiance tient la chose cachée.
  '14':
  - type: text
    content: Quand un peuple n’est pas bien gouverné, il décline ;
  - type: text
    content: le salut se trouve dans le grand nombre des conseillers.
  '15':
  - type: text
    content: Qui se porte garant des dettes d’un inconnu s’en trouvera mal,
  - type: text
    content: mais celui qui veille à ne pas s’engager
  - type: note
    content: Voir 6.1 et note.
  - type: text
    content: ' assure sa sécurité.'
  '16':
  - type: text
    content: Une femme aimable obtient les honneurs,
  - type: text
    content: '[mais la femme sans vertu est assise dans la honte.'
  - type: text
    content: Les paresseux n’ont jamais d’argent
  - type: note
    content: Les mots entre crochets se trouvent dans l’ancienne version grecque et la version syriaque, mais pas dans le texte hébreu traditionnel.
  - type: text
    content: ',]'
  - type: text
    content: les hommes énergiques obtiennent les richesses.
  '17':
  - type: text
    content: L’homme bienveillant se fait du bien à lui-même,
  - type: text
    content: mais l’homme cruel creuse son propre malheur.
  '18':
  - type: text
    content: Le méchant fait une œuvre qui le trompe,
  - type: text
    content: mais celui qui sème la justice reçoit un salaire sûr.
  '19':
  - type: text
    content: La justice mène à la vie,
  - type: text
    content: mais celui qui poursuit le mal court à la mort.
  '2':
  - type: text
    content: Le mépris suit de près l’orgueil,
  - type: text
    content: mais la sagesse se tient auprès des humbles.
  '20':
  - type: text
    content: L’Eternel a horreur de ceux qui ont le cœur tortueux,
  - type: text
    content: mais il accorde sa faveur à ceux qui se conduisent de façon intègre.
  '21':
  - type: text
    content: 'Vous pouvez en être sûrs : en fin de compte, le méchant n’échappera pas au châtiment,'
  - type: text
    content: alors que les justes seront sauvés.
  '22':
  - type: text
    content: Une femme belle et dépourvue de bon sens
  - type: text
    content: est comme un anneau d’or dans le groin d’un porc
  - type: note
    content: Les femmes orientales se paraient ainsi d’un anneau d’or (Gn 24.47 ; Ez 16.12).
  - type: text
    content: .
  '23':
  - type: text
    content: Toutes les aspirations des justes tendent vers le bien,
  - type: text
    content: mais tout ce que les méchants peuvent espérer, c’est la colère.
  '24':
  - type: text
    content: Tel donne libéralement et ses richesses s’accroissent,
  - type: text
    content: tel autre épargne à l’excès et se trouve dans la pauvreté.
  '25':
  - type: text
    content: Qui répand la bénédiction connaîtra l’abondance ;
  - type: text
    content: qui donne à boire aux autres sera lui-même désaltéré.
  '26':
  - type: text
    content: Le peuple maudit l’accapareur qui retient son blé
  - type: note
    content: Pour le vendre plus cher en temps de pénurie.
  - type: text
    content: ','
  - type: text
    content: mais celui qui le vend sans différer obtient la bénédiction.
  '27':
  - type: text
    content: Qui recherche assidûment le bien s’attire la faveur,
  - type: text
    content: mais qui poursuit le mal tombera dans les griffes du mal.
  '28':
  - type: text
    content: Ceux qui se confient dans leurs richesses tomberont,
  - type: text
    content: mais les justes s’épanouiront comme la frondaison nouvelle.
  '29':
  - type: text
    content: Qui sème le trouble dans sa famille héritera le vent,
  - type: text
    content: et l’insensé deviendra l’esclave du sage
  - type: note
    content: Par suite de ses dettes contractées à la légère (22.7 ; voir 14.19).
  - type: text
    content: .
  '3':
  - type: text
    content: L’intégrité guide les hommes droits,
  - type: text
    content: mais les tricheries des gens infidèles les mènent à la ruine.
  '30':
  - type: text
    content: Le fruit que porte le juste est un arbre de vie,
  - type: text
    content: et celui qui est sage gagne les cœurs
  - type: note
    content: Voir 3.18 et note.
  - type: text
    content: .
  '31':
  - type: text
    content: Déjà ici-bas, le juste reçoit sa rétribution,
  - type: text
    content: à plus forte raison, le méchant et le pécheur
  - type: note
    content: Voir 10.27. Ce verset est cité en 1 P 4.18 d’après l’ancienne version grecque. Selon cette citation, la « rétribution » du juste doit être comprise comme un châtiment.
  - type: text
    content: .
  '4':
  - type: text
    content: La richesse ne sera d’aucun secours au jour de la colère divine,
  - type: text
    content: mais être juste sauve de la mort.
  '5':
  - type: text
    content: La justice de l’homme intègre lui fait prendre le droit chemin,
  - type: text
    content: mais le méchant tombe par sa propre méchanceté.
  '6':
  - type: text
    content: La justice de l’homme droit le sauve,
  - type: text
    content: mais les gens retors sont pris au piège de leurs désirs.
  '7':
  - type: text
    content: Quand le méchant meurt, tous ses espoirs périssent,
  - type: text
    content: et la confiance qu’il avait placée en ses ressources s’effondre.
  '8':
  - type: text
    content: Le juste sera libéré de la détresse,
  - type: text
    content: et le méchant y prendra sa place.
  '9':
  - type: text
    content: Par ses paroles, l’impie cause la ruine de son prochain,
  - type: text
    content: mais, par leur science, les justes en sont préservés.
