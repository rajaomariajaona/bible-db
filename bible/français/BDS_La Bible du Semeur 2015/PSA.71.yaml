document_id: PSA.71,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne m’abandonne pas dans ma vieillesse
  - type: text
    content: C’est en toi, Eternel, ╵que je cherche un refuge.
  - type: text
    content: Que jamais cela ne tourne à ma confusion !
  '10':
  - type: text
    content: Mes ennemis ╵discourent contre moi,
  - type: text
    content: ceux qui m’épient, ╵ensemble se concertent,
  '11':
  - type: text
    content: 'disant : « Dieu l’a abandonné !'
  - type: text
    content: Poursuivez-le ! ╵Saisissez-vous de lui !
  - type: text
    content: Il n’est personne ╵qui puisse le sauver. »
  '12':
  - type: text
    content: Mais toi, ô Dieu, ╵ne reste pas si loin !
  - type: text
    content: Mon Dieu, viens vite à mon secours !
  '13':
  - type: text
    content: Qu’ils soient remplis de honte ╵et disparaissent,
  - type: text
    content: tous mes accusateurs !
  - type: text
    content: Qu’ils soient couverts d’opprobre, ╵d’ignominie,
  - type: text
    content: ces gens qui cherchent à me nuire !
  '14':
  - type: text
    content: Mais moi, sans cesse, ╵je serai plein d’espoir.
  - type: text
    content: De plus en plus, ╵je veux chanter ta gloire.
  '15':
  - type: text
    content: Oui, tous les jours, j’annoncerai ╵tes actes de justice ╵et de salut,
  - type: text
    content: dont je ne connais pas le nombre
  - type: note
    content: 'Autre traduction : bien que je ne possède pas l’art de l’écrivain.'
  - type: text
    content: .
  '16':
  - type: text
    content: Par ta puissance, ╵ô Seigneur Eternel, ╵je me présenterai
  - type: text
    content: et je rappellerai ╵que toi seul tu es juste.
  '17':
  - type: text
    content: Tu m’as instruit, ╵ô Dieu, dès ma jeunesse ;
  - type: text
    content: jusqu’à ce jour, ╵je publie tes merveilles.
  '18':
  - type: text
    content: Et maintenant que je suis vieux, ╵que j’ai les cheveux blancs,
  - type: text
    content: ô Dieu, ne m’abandonne pas,
  - type: text
    content: et je pourrai ╵dire ta force ╵dès aujourd’hui ╵aux hommes de mon temps,
  - type: text
    content: et ta puissance ╵aux générations à venir.
  '19':
  - type: text
    content: Ta justice, ô Dieu, est immense,
  - type: text
    content: car tu as fait ╵des choses merveilleuses !
  - type: text
    content: Qui donc, ô Dieu, ╵serait semblable à toi ?
  '2':
  - type: text
    content: Toi qui es juste, ╵délivre-moi ! ╵Oui, secours-moi !
  - type: text
    content: Tends l’oreille vers moi ╵et sauve-moi !
  '20':
  - type: text
    content: Tu nous as fait ╵passer par des détresses ╵et des malheurs sans nombre.
  - type: text
    content: Tu nous feras revivre
  - type: text
    content: et, du fond des abîmes, ╵tu me retireras.
  '21':
  - type: text
    content: Veuille me rendre ╵encore plus honoré,
  - type: text
    content: et me consoler à nouveau.
  '22':
  - type: text
    content: Moi, en retour, ╵je te célébrerai ╵au son du luth
  - type: text
    content: pour ta fidélité, mon Dieu.
  - type: text
    content: Je te célébrerai ╵en jouant de la lyre,
  - type: text
    content: Saint d’Israël !
  '23':
  - type: text
    content: Je pousserai des cris de joie, ╵je chanterai en ton honneur
  - type: text
    content: de tout mon être ╵car tu m’as délivré.
  '24':
  - type: text
    content: Je redirai sans cesse ╵que tu es juste.
  - type: text
    content: Ils seront confondus, ╵couverts de honte,
  - type: text
    content: ces gens qui cherchent à me nuire.
  '3':
  - type: text
    content: Sois le rocher ╵où je trouve un refuge,
  - type: text
    content: où je peux accéder ╵à tout moment,
  - type: text
    content: où tu as résolu ╵de me sauver !
  - type: text
    content: Car tu es mon rocher, ╵ma forteresse.
  '4':
  - type: text
    content: Mon Dieu, délivre-moi ╵des criminels,
  - type: text
    content: des gens iniques ╵et violents.
  '5':
  - type: text
    content: O Seigneur Eternel, ╵sur toi je compte,
  - type: text
    content: car, depuis ma jeunesse, ╵ma confiance est en toi.
  '6':
  - type: text
    content: Oui, depuis ma naissance
  - type: note
    content: 'ma naissance: autre traduction : le sein maternel.'
  - type: text
    content: ', ╵je prends appui sur toi.'
  - type: text
    content: Depuis que je suis sorti du sein maternel, ╵tu me soutiens
  - type: note
    content: 'Autre traduction : C’est toi qui m’as fait sortir du sein maternel.'
  - type: text
    content: .
  - type: text
    content: Tu es sans cesse ╵mon sujet de louange.
  '7':
  - type: text
    content: Pour beaucoup, je suis un prodige,
  - type: text
    content: et toi, tu es pour moi ╵un abri fortifié.
  '8':
  - type: text
    content: Ma bouche est pleine ╵de louanges pour toi
  - type: text
    content: et, chaque jour, ╵elle publie ta gloire.
  '9':
  - type: text
    content: En ma vieillesse, ╵ne me délaisse pas ;
  - type: text
    content: quand diminuent mes forces, ╵ne m’abandonne pas !
