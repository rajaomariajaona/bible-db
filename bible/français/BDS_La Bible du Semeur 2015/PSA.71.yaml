document_id: PSA.71,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne m’abandonne pas dans ma vieillesse
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est en toi, Eternel, ╵que je cherche un refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que jamais cela ne tourne à ma confusion !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes ennemis ╵discourent contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui m’épient, ╵ensemble se concertent,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disant : « Dieu l’a abandonné !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poursuivez-le ! ╵Saisissez-vous de lui !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’est personne ╵qui puisse le sauver. »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, ô Dieu, ╵ne reste pas si loin !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, viens vite à mon secours !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient remplis de honte ╵et disparaissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous mes accusateurs !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient couverts d’opprobre, ╵d’ignominie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces gens qui cherchent à me nuire !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, sans cesse, ╵je serai plein d’espoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De plus en plus, ╵je veux chanter ta gloire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tous les jours, j’annoncerai ╵tes actes de justice ╵et de salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont je ne connais pas le nombre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bien que je ne possède pas l’art de l’écrivain.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ta puissance, ╵ô Seigneur Eternel, ╵je me présenterai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je rappellerai ╵que toi seul tu es juste.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as instruit, ╵ô Dieu, dès ma jeunesse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce jour, ╵je publie tes merveilles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant que je suis vieux, ╵que j’ai les cheveux blancs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Dieu, ne m’abandonne pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je pourrai ╵dire ta force ╵dès aujourd’hui ╵aux hommes de mon temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta puissance ╵aux générations à venir.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta justice, ô Dieu, est immense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu as fait ╵des choses merveilleuses !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc, ô Dieu, ╵serait semblable à toi ?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es juste, ╵délivre-moi ! ╵Oui, secours-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tends l’oreille vers moi ╵et sauve-moi !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous as fait ╵passer par des détresses ╵et des malheurs sans nombre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous feras revivre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, du fond des abîmes, ╵tu me retireras.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veuille me rendre ╵encore plus honoré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me consoler à nouveau.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, en retour, ╵je te célébrerai ╵au son du luth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ta fidélité, mon Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célébrerai ╵en jouant de la lyre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saint d’Israël !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pousserai des cris de joie, ╵je chanterai en ton honneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tout mon être ╵car tu m’as délivré.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je redirai sans cesse ╵que tu es juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront confondus, ╵couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces gens qui cherchent à me nuire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois le rocher ╵où je trouve un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je peux accéder ╵à tout moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où tu as résolu ╵de me sauver !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es mon rocher, ╵ma forteresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, délivre-moi ╵des criminels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des gens iniques ╵et violents.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Seigneur Eternel, ╵sur toi je compte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, depuis ma jeunesse, ╵ma confiance est en toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, depuis ma naissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma naissance
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sein maternel.
      marker-yv: yv-n
    - type: text
      text: ', ╵je prends appui sur toi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis que je suis sorti du sein maternel, ╵tu me soutiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '71.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: C’est toi qui m’as fait sortir du sein maternel.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es sans cesse ╵mon sujet de louange.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour beaucoup, je suis un prodige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toi, tu es pour moi ╵un abri fortifié.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma bouche est pleine ╵de louanges pour toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, chaque jour, ╵elle publie ta gloire.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ma vieillesse, ╵ne me délaisse pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand diminuent mes forces, ╵ne m’abandonne pas !
