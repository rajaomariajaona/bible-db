document_id: 1SA.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort de Samuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cette époque, Samuel mourut, et tout Israël se rassembla pour célébrer son deuil. On l’enterra chez lui à Rama.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nabal ne veut rien donner à David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David se mit en route et se retira au désert de Parân. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nabal leur répondit : Qui est David, et qui est le fils d’Isaï ? De nos jours il y a trop de serviteurs qui s’enfuient de chez leurs maîtres. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et vous croyez que je vais prendre de mon pain, de mon eau et de ma viande, que j’ai fait débiter pour mes tondeurs, pour les donner à des gens venus de je ne sais où ?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs de David repartirent et rentrèrent. Ils rapportèrent intégralement à David la réponse de Nabal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors David ordonna à ses hommes : Que chacun prenne son épée !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et chacun mit son épée à sa ceinture. David aussi ceignit la sienne et partit avec environ quatre cents hommes, laissant les deux cents autres pour garder leurs affaires.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’intervention d’Abigaïl auprès de David
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un des serviteurs de Nabal alla informer Abigaïl de ce qui s’était passé. Il lui dit : Voici que David a envoyé des messagers depuis le désert pour saluer notre maître, mais celui-ci les a mal reçus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourtant ces gens ont été très bons pour nous, ils ne nous ont jamais fait aucun mal et rien n’a disparu pendant tout le temps que nous étions auprès d’eux dans la campagne. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils nous ont protégés comme un rempart, nuit et jour, pendant tout le temps que nous avons passé avec eux auprès des moutons. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, réfléchis bien et vois ce que tu peux faire. Car si tu ne fais rien, certainement il arrivera malheur à notre maître et à toute sa famille. Quant à lui, il a si mauvais caractère qu’on ne peut rien lui dire.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abigaïl prit en toute hâte deux cents pains, deux outres de vin et cinq moutons déjà préparés, cinq mesures de blé grillé, cent paquets de raisins secs et deux cents gâteaux de figues sèches. Elle chargea le tout sur des ânes '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et elle ordonna à ses serviteurs : « Passez devant, je vous suis. » Son mari Nabal ne savait rien de tout cela. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A Maôn vivait un homme très riche qui avait des propriétés dans le village de Karmel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans les monts de Judée (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15.12'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Il possédait trois mille moutons et mille chèvres. A cette époque, il se trouvait à Karmel pour la tonte de ses moutons. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Installée sur son âne, elle descendait, cachée par la montagne. En même temps, David et ses hommes descendaient le versant opposé dans sa direction, et elle se trouva bientôt face à eux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David venait justement de se dire : C’est donc en vain que j’ai protégé tous les biens de cet homme dans la steppe pour qu’il ne perde rien de ce qu’il possède ! Il me rend le mal pour le bien ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que Dieu fortifie tous mes ennemis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que Dieu inflige à David un châtiment sévère.
      marker-yv: yv-n
    - type: text
      text: ' et même qu’il les bénisse si d’ici demain matin au lever du jour, je laisse subsister un seul homme dans sa famille !'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Abigaïl aperçut David, elle se hâta de descendre de son âne et, s’inclinant la face contre terre, se prosterna devant lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle se jeta à ses pieds et lui dit : Mon seigneur, fais comme si tout cela était ma faute ! Permets à ta servante de t’adresser quelques mots d’explication, et daigne écouter ses paroles. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que mon seigneur ne fasse donc pas attention à ce bon à rien de Nabal, car vraiment, il porte bien son nom : il s’appelle Nabal (l’insensé), et c’est bien vrai qu’il est insensé ! Moi, ta servante, je n’ai pas vu les serviteurs que mon seigneur a envoyés. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, mon seigneur, aussi vrai que l’Eternel est vivant et que tu l’es toi-même, c’est l’Eternel qui t’a empêché de t’engager dans la voie du meurtre et de te venger toi-même. Que les ennemis de mon seigneur et ceux qui lui veulent du mal deviennent comme Nabal ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A présent, veuille accepter ces présents que moi, ta servante, j’apporte à mon seigneur, et les distribuer aux jeunes gens qui suivent mon seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Veuille aussi pardonner la faute de ta servante. Certainement, l’Eternel ne manquera pas d’accorder à mon seigneur une dynastie stable, car mon seigneur livre les guerres de l’Eternel et, si l’on considère toute la durée de ta vie, on ne te trouve coupable d’aucun mal. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un s’avise de te poursuivre pour t’ôter la vie, l’Eternel ton Dieu gardera la vie de mon seigneur pour que tu restes au nombre des vivants. Mais il jettera la vie de tes ennemis au loin comme avec une fronde. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme, un descendant de Caleb, s’appelait Nabal. Sa femme, Abigaïl, était très intelligente et belle, tandis que son mari était dur et méchant. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque l’Eternel aura accompli pour mon seigneur tous les bienfaits qu’il t’a promis, et qu’il t’aura institué comme chef d’Israël, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: alors mon seigneur n’aura ni remords ni trouble de conscience pour avoir tué quelqu’un inutilement et s’être vengé lui-même. L’Eternel fera du bien à mon seigneur et tu te souviendras de ta servante.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David répondit à Abigaïl : Béni soit l’Eternel, le Dieu d’Israël, de t’avoir envoyée aujourd’hui sur ma route. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bénie sois-tu pour ton bon sens. Bénie sois-tu de m’avoir préservé d’en venir au meurtre et de me venger moi-même. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vraiment, l’Eternel, le Dieu d’Israël, m’a empêché de vous faire du mal. Car je te le jure, aussi vrai qu’il est vivant, si tu n’étais pas venue me trouver si rapidement, il ne serait pas resté un seul homme à Nabal d’ici demain matin.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David accepta les présents qu’elle lui avait apportés et lui dit : Rentre chez toi en paix. Je t’ai entendue et j’agirai comme tu me l’as demandé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort de Nabal – David épouse Abigaïl
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Abigaïl arriva à la maison, elle y trouva Nabal en train de festoyer comme un roi. Il était tout joyeux et complètement ivre. Aussi ne le mit-elle au courant de rien avant le lendemain matin. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, au matin, quand son ivresse fut dissipée, elle lui raconta ce qui s’était passé. Il en eut une attaque et resta paralysé. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Environ dix jours plus tard, l’Eternel le frappa de nouveau, et il mourut.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand David apprit que Nabal était mort, il s’écria : Béni soit l’Eternel qui a pris ma cause en main. Il a lui-même lavé l’affront que Nabal m’avait fait, et l’a puni pour sa méchanceté, tout en me préservant de commettre le mal.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis David envoya des messagers vers Abigaïl pour lui proposer de devenir sa femme.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David apprit au désert que Nabal tondait ses moutons. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En arrivant chez elle à Karmel, ils lui parlèrent ainsi : David nous a envoyés vers toi parce qu’il désire que tu deviennes sa femme.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, elle se prosterna le visage contre terre et dit : Je suis prête à être une esclave pour laver les pieds des serviteurs de mon seigneur.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle se mit promptement en route à dos d’âne et suivit les messagers de David, accompagnée par cinq de ses servantes. C’est ainsi qu’elle devint la femme de David. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme il avait déjà épousé Ahinoam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahinoam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Première femme de David après Mikal, que Saül avait mariée à un autre homme après la fuite de David (27.3 ; 30.5 ; 2 S 2.2). Ahinoam a donné à David son fils aîné, Amnôn (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 3.2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' de Jizréel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jizréel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Juda (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15.56
        - type: text
          text: ) près de Karmel (v. 2) et non de la ville de même nom au nord du pays (29.1, 11 ; 1 R 18.45).
      marker-yv: yv-n
    - type: text
      text: ', il les eut toutes les deux pour femmes. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül avait donné sa fille Mikal, femme de David, à Palti, fils de Laïsh de Gallim.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il chargea dix de ses hommes d’aller le trouver à Karmel et de le saluer de sa part.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Voici comment vous lui parlerez, leur dit-il : « Longue vie à toi ! Que la paix soit avec toi et avec ta maison ! Que toutes tes affaires prospèrent ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’apprends qu’on fait la tonte de tes moutons. Tant que tes bergers ont été avec nous, nous ne leur avons fait aucun tort. Rien n’a été dérobé de leur troupeau pendant tout leur séjour à Karmel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Interroge tes serviteurs, ils te le confirmeront. Puissent donc mes serviteurs trouver également bon accueil auprès de toi, puisque nous arrivons en ce jour de fête ! Donne-leur donc, je te prie, ce que tu auras sous la main pour tes serviteurs et ton fils David. »
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les jeunes compagnons de David allèrent et répétèrent à Nabal toutes ces paroles au nom de David, puis ils attendirent.
