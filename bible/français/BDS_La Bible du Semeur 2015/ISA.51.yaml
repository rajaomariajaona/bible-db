document_id: ISA.51
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le salut éternel de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui êtes en quête de justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vous tournez vers l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regardez le rocher
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’où vous avez été taillés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la carrière
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’où vous avez été tirés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, considérez donc ╵Abraham votre père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sara qui vous a mis au monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car lorsque j’ai appelé Abraham, ╵il n’avait pas d’enfant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai alors béni ╵et je lui ai donné ╵de nombreux descendants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, l’Eternel ╵va consoler Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses ruines lui inspireront ╵de la compassion ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rendra son désert ╵comme l’Eden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la steppe comme le jardin ╵de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie et l’allégresse ╵y régneront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on y entendra ╵de la musique ╵et des chants de reconnaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Prête-moi attention, mon peuple !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous, ma nation, ╵tendez vers moi l’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je promulguerai la Loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je proclamerai mon droit
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour éclairer les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, je ferai bientôt justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon salut va paraître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes bras gouverneront les peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les îles, les régions côtières, ╵mettront leur espérance en moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles s’en remettront ╵au secours de mon bras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Levez les yeux au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: baissez-les sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, comme une fumée, ╵le ciel s’évanouira
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme un vêtement, ╵la terre s’usera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses habitants mourront ╵comme des mouches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais mon salut ╵sera établi pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon œuvre de justice ╵ne sera pas anéantie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ecoutez-moi, ╵vous qui savez ce qui est juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuple, qui a ma Loi ╵présente à son esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne crains donc pas ╵les injures des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leurs outrages ╵ne t’emplissent pas de frayeur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car ils seront ╵mangés par la vermine ╵comme un habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rongés par les mites ╵comme la laine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à mon œuvre de justice, ╵elle sera établie pour toujours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon salut ╵pour toutes les générations.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’éveil de la nouvelle création
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le nouvel exode, la nouvelle création
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Réveille-toi ! ╵Réveille-toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revêts-toi de puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô bras de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre en action ╵comme aux jours d’autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au temps des premières générations !
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas toi qui abattis ╵Rahav l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 87.4
        metadata:
          usfm: PSA.87.4
      - type: text
        text: ' et la note ; Ps 89.11 ; Es 30.7 et la note. Cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 27.1
        metadata:
          usfm: ISA.27.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui transperças ╵le monstre de la mer ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: N’est-ce pas toi ╵qui desséchas la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui taris ╵les eaux du grand abîme ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui fis un chemin ╵dans les profondeurs de la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que ton peuple délivré ╵puisse y passer ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De même, ceux que l’Eternel ╵a libérés retourneront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils iront à Sion ╵avec des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une joie éternelle ╵couronnera leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la joie et l’allégresse ╵les accompagneront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tristesse et les plaintes ╵fuiront au loin.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Si Dieu est pour nous, qui sera contre nous ?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est moi, c’est moi qui vous console.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment donc peux-tu craindre ╵l’homme qui doit mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou un humain ╵qui a le même sort que l’herbe ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: As-tu donc oublié ╵l’Eternel qui t’a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a tendu le ciel ╵et a fondé la terre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment peux-tu trembler ╵sans cesse tout le jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que le tyran ╵déchaîne sa fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se prépare à te détruire ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, où est-elle, ╵la fureur du tyran ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bientôt, le prisonnier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui ploie sous le fardeau.
    marker-yv: yv-n
  - type: text
    text: ' ╵va être libéré,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne périra pas ╵au fond de son cachot
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne sera plus ╵privé de nourriture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moi, je suis l’Eternel, ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’agite la mer, ╵ses flots mugissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici mon nom : ╵le Seigneur des armées célestes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Oui, j’ai mis mes paroles dans ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’ai couvert ╵de l’ombre de ma main
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 49.2 ; 59.21.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour étendre le ciel, ╵et pour fonder la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et pour proclamer à Sion : ╵« Tu es mon peuple ! »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jérusalem se relève
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Réveille-toi, réveille-toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: debout, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui as bu la coupe ╵remplie de la colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel t’a présentée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, toi qui as vidé ╵jusqu’à l’ultime goutte
- type: usfm
  marker: q1
  children:
  - type: text
    text: la coupe du vertige.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Parmi tous les fils ╵que tu as mis au monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y en a aucun ╵pour te guider,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et parmi tous les fils ╵que tu as élevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y en a aucun ╵pour te prendre la main !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Deux malheurs t’ont frappé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui donc te plaindra ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La dévastation et la destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la famine et l’épée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui te consolera
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le texte hébreu de Qumrân, l’ancienne version grecque, la version syriaque et la Vulgate. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui suis-je pour te consoler ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par qui pourrais-je te consoler ?
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tes fils défaillent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont couchés ╵à tous les coins de rue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des antilopes ╵prises dans un filet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont été chargés ╵de la fureur de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la sanction ╵infligée par ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est pourquoi, malheureuse, ╵écoute donc ceci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es enivrée, ╵mais pas de vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi parle ton Dieu, ╵l’Eternel, ton Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui va défendre ╵la cause de son peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ôterai de ta main
- type: usfm
  marker: q1
  children:
  - type: text
    text: la coupe du vertige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne boiras plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: désormais le calice ╵rempli de ma colère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: car je le mettrai dans la main ╵de tes persécuteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de ceux qui te disaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Incline-toi, ╵afin que nous passions ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as présenté ╵ton dos pour qu’on le foule
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une rue pour les passants.
