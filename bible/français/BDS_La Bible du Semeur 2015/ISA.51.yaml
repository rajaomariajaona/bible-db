document_id: ISA.51,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut éternel de Dieu
  - type: text
    content: Ecoutez-moi,
  - type: text
    content: vous qui êtes en quête de justice,
  - type: text
    content: qui vous tournez vers l’Eternel !
  - type: text
    content: Regardez le rocher
  - type: text
    content: d’où vous avez été taillés,
  - type: text
    content: et la carrière
  - type: text
    content: d’où vous avez été tirés !
  '10':
  - type: text
    content: N’est-ce pas toi ╵qui desséchas la mer
  - type: text
    content: et qui taris ╵les eaux du grand abîme ?
  - type: text
    content: Toi qui fis un chemin ╵dans les profondeurs de la mer
  - type: text
    content: pour que ton peuple délivré ╵puisse y passer ?
  '11':
  - type: text
    content: De même, ceux que l’Eternel ╵a libérés retourneront,
  - type: text
    content: ils iront à Sion ╵avec des cris de joie.
  - type: text
    content: Une joie éternelle ╵couronnera leur tête,
  - type: text
    content: la joie et l’allégresse ╵les accompagneront,
  - type: text
    content: la tristesse et les plaintes ╵fuiront au loin.
  - type: heading
    content: Si Dieu est pour nous, qui sera contre nous ?
  '12':
  - type: text
    content: C’est moi, c’est moi qui vous console.
  - type: text
    content: Comment donc peux-tu craindre ╵l’homme qui doit mourir,
  - type: text
    content: ou un humain ╵qui a le même sort que l’herbe ?
  '13':
  - type: text
    content: As-tu donc oublié ╵l’Eternel qui t’a fait,
  - type: text
    content: qui a tendu le ciel ╵et a fondé la terre ?
  - type: text
    content: Comment peux-tu trembler ╵sans cesse tout le jour
  - type: text
    content: parce que le tyran ╵déchaîne sa fureur
  - type: text
    content: et se prépare à te détruire ?
  - type: text
    content: Maintenant, où est-elle, ╵la fureur du tyran ?
  '14':
  - type: text
    content: Bientôt, le prisonnier
  - type: note
    content: 'Autre traduction : celui qui ploie sous le fardeau.'
  - type: text
    content: ' ╵va être libéré,'
  - type: text
    content: il ne périra pas ╵au fond de son cachot
  - type: text
    content: et il ne sera plus ╵privé de nourriture.
  '15':
  - type: text
    content: Moi, je suis l’Eternel, ton Dieu.
  - type: text
    content: Quand j’agite la mer, ╵ses flots mugissent.
  - type: text
    content: 'Voici mon nom : ╵le Seigneur des armées célestes.'
  '16':
  - type: text
    content: Oui, j’ai mis mes paroles dans ta bouche,
  - type: text
    content: je t’ai couvert ╵de l’ombre de ma main
  - type: note
    content: Voir 49.2 ; 59.21.
  - type: text
    content: ','
  - type: text
    content: pour étendre le ciel, ╵et pour fonder la terre,
  - type: text
    content: 'et pour proclamer à Sion : ╵« Tu es mon peuple ! »'
  - type: heading
    content: Jérusalem se relève
  '17':
  - type: text
    content: Réveille-toi, réveille-toi,
  - type: text
    content: debout, Jérusalem,
  - type: text
    content: toi qui as bu la coupe ╵remplie de la colère
  - type: text
    content: que l’Eternel t’a présentée,
  - type: text
    content: oui, toi qui as vidé ╵jusqu’à l’ultime goutte
  - type: text
    content: la coupe du vertige.
  '18':
  - type: text
    content: Parmi tous les fils ╵que tu as mis au monde,
  - type: text
    content: il n’y en a aucun ╵pour te guider,
  - type: text
    content: et parmi tous les fils ╵que tu as élevés,
  - type: text
    content: il n’y en a aucun ╵pour te prendre la main !
  '19':
  - type: text
    content: Deux malheurs t’ont frappé,
  - type: text
    content: mais qui donc te plaindra ?
  - type: text
    content: La dévastation et la destruction,
  - type: text
    content: la famine et l’épée !
  - type: text
    content: Et qui te consolera
  - type: note
    content: 'D’après le texte hébreu de Qumrân, l’ancienne version grecque, la version syriaque et la Vulgate. Le texte hébreu traditionnel a : qui suis-je pour te consoler ? ou par qui pourrais-je te consoler ?'
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: Oui, considérez donc ╵Abraham votre père,
  - type: text
    content: Sara qui vous a mis au monde,
  - type: text
    content: car lorsque j’ai appelé Abraham, ╵il n’avait pas d’enfant.
  - type: text
    content: Je l’ai alors béni ╵et je lui ai donné ╵de nombreux descendants.
  '20':
  - type: text
    content: Tes fils défaillent,
  - type: text
    content: ils sont couchés ╵à tous les coins de rue,
  - type: text
    content: comme des antilopes ╵prises dans un filet.
  - type: text
    content: Ils ont été chargés ╵de la fureur de l’Eternel,
  - type: text
    content: de la sanction ╵infligée par ton Dieu.
  '21':
  - type: text
    content: C’est pourquoi, malheureuse, ╵écoute donc ceci,
  - type: text
    content: toi qui es enivrée, ╵mais pas de vin.
  '22':
  - type: text
    content: Ainsi parle ton Dieu, ╵l’Eternel, ton Seigneur,
  - type: text
    content: 'qui va défendre ╵la cause de son peuple :'
  - type: text
    content: J’ôterai de ta main
  - type: text
    content: la coupe du vertige,
  - type: text
    content: et tu ne boiras plus
  - type: text
    content: désormais le calice ╵rempli de ma colère,
  '23':
  - type: text
    content: car je le mettrai dans la main ╵de tes persécuteurs,
  - type: text
    content: 'de ceux qui te disaient :'
  - type: text
    content: « Incline-toi, ╵afin que nous passions ! »
  - type: text
    content: Et tu as présenté ╵ton dos pour qu’on le foule
  - type: text
    content: comme une rue pour les passants.
  '3':
  - type: text
    content: Oui, l’Eternel ╵va consoler Sion,
  - type: text
    content: ses ruines lui inspireront ╵de la compassion ;
  - type: text
    content: il rendra son désert ╵comme l’Eden,
  - type: text
    content: la steppe comme le jardin ╵de l’Eternel.
  - type: text
    content: La joie et l’allégresse ╵y régneront,
  - type: text
    content: et l’on y entendra ╵de la musique ╵et des chants de reconnaissance.
  '4':
  - type: text
    content: Prête-moi attention, mon peuple !
  - type: text
    content: Vous, ma nation, ╵tendez vers moi l’oreille,
  - type: text
    content: car je promulguerai la Loi,
  - type: text
    content: et je proclamerai mon droit
  - type: text
    content: pour éclairer les peuples.
  '5':
  - type: text
    content: Oui, je ferai bientôt justice,
  - type: text
    content: mon salut va paraître,
  - type: text
    content: mes bras gouverneront les peuples.
  - type: text
    content: Les îles, les régions côtières, ╵mettront leur espérance en moi,
  - type: text
    content: elles s’en remettront ╵au secours de mon bras.
  '6':
  - type: text
    content: Levez les yeux au ciel,
  - type: text
    content: baissez-les sur la terre,
  - type: text
    content: car, comme une fumée, ╵le ciel s’évanouira
  - type: text
    content: et, comme un vêtement, ╵la terre s’usera.
  - type: text
    content: Ses habitants mourront ╵comme des mouches,
  - type: text
    content: mais mon salut ╵sera établi pour toujours,
  - type: text
    content: mon œuvre de justice ╵ne sera pas anéantie.
  '7':
  - type: text
    content: Ecoutez-moi, ╵vous qui savez ce qui est juste.
  - type: text
    content: Peuple, qui a ma Loi ╵présente à son esprit,
  - type: text
    content: ne crains donc pas ╵les injures des hommes,
  - type: text
    content: que leurs outrages ╵ne t’emplissent pas de frayeur !
  '8':
  - type: text
    content: Car ils seront ╵mangés par la vermine ╵comme un habit,
  - type: text
    content: et rongés par les mites ╵comme la laine.
  - type: text
    content: Quant à mon œuvre de justice, ╵elle sera établie pour toujours
  - type: text
    content: et mon salut ╵pour toutes les générations.
  - type: heading
    content: L’éveil de la nouvelle création
  - type: heading
    content: Le nouvel exode, la nouvelle création
  '9':
  - type: text
    content: Réveille-toi ! ╵Réveille-toi !
  - type: text
    content: Revêts-toi de puissance,
  - type: text
    content: ô bras de l’Eternel !
  - type: text
    content: Entre en action ╵comme aux jours d’autrefois,
  - type: text
    content: au temps des premières générations !
  - type: text
    content: N’est-ce pas toi qui abattis ╵Rahav l’Egypte
  - type: note
    content: Voir Ps 87.4 et la note ; Ps 89.11 ; Es 30.7 et la note. Cf. Es 27.1.
  - type: text
    content: ','
  - type: text
    content: qui transperças ╵le monstre de la mer ?
