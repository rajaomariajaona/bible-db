document_id: MAT.11,21
type_code: fra
verses:
  '1':
  - type: text
    content: Quand Jésus eut achevé de donner ces instructions à ses douze disciples, il partit de là pour enseigner et prêcher dans les villes de la région.
  - type: heading
    content: L’Évangile et la montée de l’opposition
  - type: heading
    content: Jésus et Jean-Baptiste
  - type: heading
    content: (Lc 7.18-35)
  '10':
  - type: text
    content: 'Car c’est celui dont il est écrit :'
  - type: text
    content: J’enverrai mon messager devant toi,
  - type: text
    content: il te préparera le chemin
  - type: text
    content: ' '
  - type: note
    content: Ml 3.1 .
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Vraiment, je vous l’assure : parmi tous les hommes qui sont nés d’une femme, il n’en a paru aucun de plus grand que Jean-Baptiste. Et pourtant, le plus petit dans le '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' est plus grand que lui.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Depuis l’époque où Jean-Baptiste a paru jusqu’à cette heure, le royaume des cieux se force un passage avec violence
  - type: note
    content: 'Autre traduction : le royaume des cieux est soumis à la violence.'
  - type: text
    content: ', et ce sont les violents qui s’en emparent'
  - type: note
    content: 'Autre traduction : et des hommes violents l’assaillent.'
  - type: text
    content: .
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'En effet, jusqu’à Jean, tous les prophètes et la '
  - type: text
    content: Loi
  - type: text
    content: ' l’ont prophétisé.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Et, si vous voulez le croire, c’est lui, cet Elie qui devait venir.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Celui qui a des oreilles, qu’il entende !
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'A qui donc pourrais-je comparer les gens de notre temps ? Ils sont comme ces enfants assis sur la place du marché qui crient à leurs camarades :'
  '17':
  - type: text
    content: ' '
  - type: text
    content: Quand nous avons joué de la flûte,
  - type: text
    content: vous n’avez pas dansé !
  - type: text
    content: Et quand nous avons chanté des airs de deuil,
  - type: text
    content: vous ne vous êtes pas lamentés !
  '18':
  - type: text
    content: ' '
  - type: text
    content: En effet, Jean est venu, il ne mangeait pas et ne buvait pas de vin. Et qu’a-t-on dit ? « Il a un démon en lui ! »
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est venu, il mange et boit, et l’on dit : « Cet homme ne pense qu’à faire bonne chère et à boire du vin, il est l’ami des '
  - type: text
    content: collecteurs d’impôts
  - type: text
    content: ' et des pécheurs notoires. » Et cependant, la sagesse de Dieu se fait reconnaître comme telle par les œuvres qu’elle accomplit'
  - type: note
    content: 'Autre traduction : mais la sagesse a été reconnue juste d’après ses effets.'
  - type: text
    content: .
  - type: heading
    content: Les reproches aux villes rebelles
  - type: heading
    content: (Lc 10.12-15)
  '2':
  - type: text
    content: 'Du fond de sa prison, Jean apprit tout ce que Christ faisait. Il envoya auprès de lui deux de ses disciples. Ils lui demandèrent : '
  '20':
  - type: text
    content: 'Alors Jésus adressa de sévères reproches aux villes où il avait fait la plupart de ses miracles, parce que leurs habitants n’avaient pas changé :'
  '21':
  - type: text
    content: ' '
  - type: text
    content: Malheur à toi, Chorazin
  - type: text
    content: ' '
  - type: note
    content: 'Chorazin… Bethsaïda : deux villes voisines de Capernaüm. Tyr… Sidon : deux villes phéniciennes, donc non juives.'
  - type: text
    content: '! Malheur à toi, Bethsaïda ! car si les miracles qui se sont produits au milieu de vous avaient eu lieu à '
  - type: text
    content: Tyr
  - type: text
    content: ' et à Sidonh, il y a longtemps que leurs habitants auraient changé et l’auraient manifesté en revêtant des habits de toile de sac et en se couvrant de cendre.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'C’est pourquoi, je vous le déclare : au jour du jugement, ces villes seront traitées avec moins de rigueur que vous.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Et toi, '
  - type: text
    content: Capernaüm
  - type: text
    content: ', crois-tu que tu seras élevée jusqu’au ciel ? Non ! Tu seras précipitée au séjour des morts. Car si les miracles qui se sont produits chez toi avaient eu lieu à '
  - type: text
    content: Sodome
  - type: text
    content: ', elle existerait encore aujourd’hui.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est pourquoi, je vous le déclare : au jour du jugement, le pays de Sodome sera traité avec moins de rigueur que toi.'
  - type: heading
    content: (Lc 10.21-22)
  '25':
  - type: text
    content: 'Vers cette même époque, Jésus dit : '
  - type: text
    content: Je te loue, ô Père, Seigneur du ciel et de la terre, parce que tu as caché ces choses aux sages et aux intelligents, et que tu les as révélées à ceux qui sont tout petits.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Oui, Père, car dans ta bonté, tu l’as voulu ainsi.
  '27':
  - type: text
    content: ' '
  - type: text
    content: Mon Père a remis toutes choses entre mes mains. Personne ne connaît le Fils, si ce n’est le Père ; et personne ne connaît le Père, si ce n’est le Fils et celui à qui le Fils veut le révéler.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Venez à moi, vous tous qui êtes accablés sous le poids d’un lourd fardeau, et je vous donnerai du repos.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Prenez mon joug sur vous et mettez-vous à mon école, car je suis doux et humble de cœur, et vous trouverez le repos pour vous-mêmes.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Es-tu celui qui devait venir
  - type: note
    content: 'C’est-à-dire : « Es-tu le Messie attendu, promis par les prophètes ? »'
  - type: text
    content: ', ou bien devons-nous en attendre un autre ?'
  '30':
  - type: text
    content: Oui, mon joug est facile à porter et la charge que je vous impose est légère.
  '4':
  - type: text
    content: 'Et Jésus leur répondit : '
  - type: text
    content: 'Retournez auprès de Jean et racontez-lui ce que vous entendez et ce que vous voyez :'
  - type: text
    content: ' '
  '5':
  - type: text
    content: les aveugles voient
  - type: text
    content: ', les paralysés marchent normalement, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, '
  - type: text
    content: la Bonne Nouvelle est annoncée aux pauvres
  - type: note
    content: Es 35.5-6 ; 61.1.
  - type: text
    content: ' '
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: Heureux celui qui ne perdra pas la foi à cause de moi !
  '7':
  - type: text
    content: 'Comme les envoyés s’en allaient, Jésus saisit cette occasion pour parler de Jean à la foule : '
  - type: text
    content: Qu’êtes-vous allés voir au désert ?
  - type: text
    content: ' leur demanda-t-il. '
  - type: text
    content: Un roseau agité çà et là par le vent ?
  - type: text
    content: ' '
  '8':
  - type: text
    content: Oui, qui donc êtes-vous allés voir ? Un homme habillé avec élégance ? Généralement, ceux qui sont élégamment vêtus vivent dans les palais royaux.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Mais qu’êtes-vous donc allés voir au désert ? Un '
  - type: text
    content: prophète
  - type: text
    content: '  ? Oui, assurément, et même bien plus qu’un prophète, c’est moi qui vous le dis.'
  - type: text
    content: ' '
