document_id: JON.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fuite de Jonas
  - type: text
    content: L’Eternel adressa la parole à Jonas
  - type: note
    content: Sur Jonas, voir 2 R 14.25-27.
  - type: text
    content: ', fils d’Amittaï, en ces termes : '
  '10':
  - type: text
    content: 'Il leur apprit qu’il s’enfuyait loin de la présence de l’Eternel. Aussi ces hommes furent-ils saisis d’une grande crainte et lui dirent : Pourquoi as-tu fait cela ?'
  '11':
  - type: text
    content: 'Comme la mer se démontait de plus en plus, ils lui demandèrent : Que te ferons-nous pour que la mer se calme et cesse de nous être contraire ?'
  '12':
  - type: text
    content: 'Il leur répondit : Prenez-moi et jetez-moi à la mer, et la mer se calmera, car je sais bien que c’est à cause de moi que cette grande tempête s’est déchaînée contre vous.'
  '13':
  - type: text
    content: 'Ces hommes se mirent d’abord à ramer de toutes leurs forces pour regagner la côte, mais ils n’y parvinrent pas, car la mer se déchaînait toujours plus contre eux. '
  '14':
  - type: text
    content: 'Alors ils crièrent à l’Eternel et dirent : O Eternel, nous t’en prions, ne nous fais pas périr à cause de cet homme et ne nous tiens pas responsables de la mort d’un innocent. Car toi, ô Eternel, tu as fait ce que tu as voulu.'
  '15':
  - type: text
    content: 'Puis ils prirent Jonas et le jetèrent par-dessus bord. Aussitôt, la mer en furie se calma. '
  '16':
  - type: text
    content: Alors l’équipage fut saisi d’une grande crainte envers l’Eternel ; ils lui offrirent un sacrifice et s’engagèrent envers lui par des vœux.
  '2':
  - type: text
    content: Mets-toi en route, va à Ninive
  - type: note
    content: Capitale de l’Empire assyrien, l’une des grandes puissances de l’époque.
  - type: text
    content: ' la grande ville et proclame des menaces contre ses habitants, car l’écho de leur méchanceté est parvenu jusqu’à moi.'
  '3':
  - type: text
    content: Jonas se mit en route pour s’enfuir à Tarsis
  - type: note
    content: A l’opposé de la direction dans laquelle l’Eternel l’envoyait, peut-être Tartessos en Espagne, colonie minière phénicienne située près de Gibraltar.
  - type: text
    content: ', loin de la présence de l’Eternel. Il descendit au port de Jaffa'
  - type: note
    content: Port maritime de Jérusalem, aujourd’hui faubourg de Tel-Aviv (voir Ac 10.5).
  - type: text
    content: ', où il trouva un navire en partance pour Tarsis. Il paya le prix de la traversée et descendit dans le bateau pour aller avec l’équipage à Tarsis, loin de la présence de l’Eternel.'
  '4':
  - type: text
    content: 'Mais l’Eternel fit souffler un grand vent sur la mer et déchaîna une si grande tempête que le navire menaçait de se briser. '
  '5':
  - type: text
    content: 'Les marins furent saisis de crainte, et chacun se mit à implorer son dieu. Puis ils jetèrent la cargaison par-dessus bord pour alléger le navire. Quant à Jonas, il était descendu dans la cale du bateau, il s’était couché et dormait profondément. '
  '6':
  - type: text
    content: 'Le capitaine s’approcha de lui et l’interpella : Hé quoi ! Tu dors ! Mets-toi debout et prie ton Dieu. Peut-être Dieu se souciera-t-il de nous et nous ne périrons pas.'
  '7':
  - type: text
    content: 'Pendant ce temps, les matelots se dirent entre eux : Allons, tirons au sort pour savoir qui nous attire ce malheur.'
  - type: text
    content: 'Ils tirèrent donc au sort et Jonas fut désigné. '
  '8':
  - type: text
    content: 'Alors ils lui demandèrent : Fais-nous savoir qui nous attire ce malheur ! Quelles sont tes occupations ? D’où viens-tu ? De quel pays ? Et de quel peuple es-tu ?'
  '9':
  - type: text
    content: 'Jonas leur répondit : Je suis hébreu et je crains l’Eternel, le Dieu du ciel qui a fait la mer et la terre.'
