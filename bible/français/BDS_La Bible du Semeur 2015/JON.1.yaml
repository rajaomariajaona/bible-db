document_id: JON.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fuite de Jonas
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: L’Eternel adressa la parole à Jonas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur Jonas, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 14.25-27
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', fils d’Amittaï, en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il leur apprit qu’il s’enfuyait loin de la présence de l’Eternel. Aussi ces hommes furent-ils saisis d’une grande crainte et lui dirent : Pourquoi as-tu fait cela ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme la mer se démontait de plus en plus, ils lui demandèrent : Que te ferons-nous pour que la mer se calme et cesse de nous être contraire ?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il leur répondit : Prenez-moi et jetez-moi à la mer, et la mer se calmera, car je sais bien que c’est à cause de moi que cette grande tempête s’est déchaînée contre vous.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces hommes se mirent d’abord à ramer de toutes leurs forces pour regagner la côte, mais ils n’y parvinrent pas, car la mer se déchaînait toujours plus contre eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors ils crièrent à l’Eternel et dirent : O Eternel, nous t’en prions, ne nous fais pas périr à cause de cet homme et ne nous tiens pas responsables de la mort d’un innocent. Car toi, ô Eternel, tu as fait ce que tu as voulu.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Puis ils prirent Jonas et le jetèrent par-dessus bord. Aussitôt, la mer en furie se calma. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Alors l’équipage fut saisi d’une grande crainte envers l’Eternel ; ils lui offrirent un sacrifice et s’engagèrent envers lui par des vœux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mets-toi en route, va à Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Capitale de l’Empire assyrien, l’une des grandes puissances de l’époque.
      marker-yv: yv-n
    - type: text
      text: ' la grande ville et proclame des menaces contre ses habitants, car l’écho de leur méchanceté est parvenu jusqu’à moi.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jonas se mit en route pour s’enfuir à Tarsis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A l’opposé de la direction dans laquelle l’Eternel l’envoyait, peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tartessos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Espagne, colonie minière phénicienne située près de Gibraltar.
      marker-yv: yv-n
    - type: text
      text: ', loin de la présence de l’Eternel. Il descendit au port de Jaffa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Port maritime de Jérusalem, aujourd’hui faubourg de Tel-Aviv (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 10.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', où il trouva un navire en partance pour Tarsis. Il paya le prix de la traversée et descendit dans le bateau pour aller avec l’équipage à Tarsis, loin de la présence de l’Eternel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais l’Eternel fit souffler un grand vent sur la mer et déchaîna une si grande tempête que le navire menaçait de se briser. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les marins furent saisis de crainte, et chacun se mit à implorer son dieu. Puis ils jetèrent la cargaison par-dessus bord pour alléger le navire. Quant à Jonas, il était descendu dans la cale du bateau, il s’était couché et dormait profondément. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le capitaine s’approcha de lui et l’interpella : Hé quoi ! Tu dors ! Mets-toi debout et prie ton Dieu. Peut-être Dieu se souciera-t-il de nous et nous ne périrons pas.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Pendant ce temps, les matelots se dirent entre eux : Allons, tirons au sort pour savoir qui nous attire ce malheur.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils tirèrent donc au sort et Jonas fut désigné. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors ils lui demandèrent : Fais-nous savoir qui nous attire ce malheur ! Quelles sont tes occupations ? D’où viens-tu ? De quel pays ? Et de quel peuple es-tu ?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jonas leur répondit : Je suis hébreu et je crains l’Eternel, le Dieu du ciel qui a fait la mer et la terre.'
