document_id: 2KI.18
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les derniers rois de Juda
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne d’Ezéchias sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La troisième année du règne d’Osée, fils d’Ela, roi d’Israël, Ezéchias, fils d’Ahaz, roi de Juda, devint roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire vers 728 av. J.-C. A partir de cette date et jusqu’en 715 av. J.-C., Ezéchias fut corégent avec son père Ahaz.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 29.1-2 ; 31.1)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il était âgé de vingt-cinq ans à son avènement et il régna vingt-neuf ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon certains, de 715 à 686 av. J.-C., selon d’autres, en comptant les années de corégence, de 728 ou 727 à 698 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. Sa mère s’appelait Abi, elle était fille de Zacharie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fit ce que l’Eternel considère comme juste, en tout point comme l’avait fait son ancêtre David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fit disparaître les hauts lieux, briser les stèles des idoles, couper le pieu sacré de la déesse Ashéra. Il fit aussi mettre en pièces le serpent de bronze que Moïse avait fabriqué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.8-9
        metadata:
          usfm: NUM.21.8+NUM.21.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', car jusqu’à cette époque-là, les Israélites faisaient brûler des parfums pour lui et l’appelaient Nehoushtân.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 31.20-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ezéchias mit sa confiance en l’Eternel, le Dieu d’Israël. Parmi tous les rois de Juda qui lui succédèrent ou qui l’avaient précédé, aucun ne l’égala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il demeura attaché à l’Eternel, sans se détourner de lui ; il obéit à tous les commandements que l’Eternel avait donnés à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aussi l’Eternel fut-il avec lui. Il réussit dans toutes ses entreprises. Il se révolta contre le roi d’Assyrie et cessa de lui être assujetti.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il battit les Philistins et les poursuivit jusqu’à Gaza
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’une des cinq principales villes de la Philistie.
    marker-yv: yv-n
  - type: text
    text: ', ravageant la ville et son territoire, et s’emparant des villes fortifiées aussi bien que des postes d’observation.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prise de Samarie par les Assyriens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 17.3-7)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce fut pendant la quatrième année du règne d’Ezéchias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 725 av. J.-C., la 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' année de sa corégence avec Ahaz.'
    marker-yv: yv-n
  - type: text
    text: ', qui correspond à la septième année de celui d’Osée, fils d’Ela, roi d’Israël, que Salmanasar, roi d’Assyrie, vint attaquer Samarie et l’assiégea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il s’en empara au bout de trois ans, la sixième année du règne d’Ezéchias, c’est-à-dire la neuvième année du règne d’Osée, roi d’Israël ; ainsi Samarie fut prise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi d’Assyrie déporta les Israélites en Assyrie et les établit à Halah et sur les rives du Habor, dans la région de Gozân ainsi que dans les villes de la Médie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ces malheurs leur arrivèrent parce qu’ils n’avaient pas obéi aux ordres de l’Eternel, leur Dieu, parce qu’ils avaient été infidèles à son alliance en désobéissant à tout ce que Moïse, le serviteur de l’Eternel, leur avait ordonné, au lieu de l’écouter et de l’appliquer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion du royaume de Juda par les Assyriens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La quatorzième année du règne d’Ezéchias, Sennachérib, roi d’Assyrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 701, la 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' année du règne personnel d’Ezéchias. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sennachérib, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fils de Sargon II, régna de 704 à 681 av. J.-C. A partir de ce verset et jusqu’à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.19'
        metadata:
          usfm: 2KI.20.19
      - type: text
        text: ', le récit est parallèle, à quelques variantes près, à Es 36 à 39.'
    marker-yv: yv-n
  - type: text
    text: ', vint attaquer toutes les villes fortifiées de Juda et s’en empara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors Ezéchias, roi de Juda, fit transmettre au roi d’Assyrie à Lakish
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Entre Jérusalem et Gaza, à quelque 35 kilomètres au sud-ouest de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' le message suivant : J’ai commis une faute, cesse de m’attaquer. J’accepte de payer le tribut que tu m’imposeras.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi d’Assyrie exigea d’Ezéchias dix tonnes d’argent et une tonne d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ezéchias lui fit donc porter tout l’argent qui se trouvait dans le temple de l’Eternel et dans le trésor du palais royal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il dut même arracher les plaques d’or dont il avait fait revêtir les portes et les linteaux du temple de l’Eternel pour les donner au roi d’Assyrie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le siège de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 32.9-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le roi d’Assyrie envoya de Lakish à Jérusalem vers le roi Ezéchias son général en chef, son chef d’état-major et son aide de camp, accompagnés d’une puissante armée. Lorsque les trois officiers supérieurs furent arrivés en haut de la côte près de Jérusalem, ils prirent position près de l’aqueduc du réservoir supérieur qui est sur la route du champ du Teinturier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aqueduc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sans doute le canal souterrain qu’Ezéchias a fait creuser (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.20'
        metadata:
          usfm: 2KI.20.20
      - type: text
        text: ) pour amener l’eau de la source de Guihôn (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1.33
        metadata:
          usfm: 1KI.1.33
      - type: text
        text: ') au réservoir de Siloé, au sud-est de la ville. Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'champ du Teinturier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: devait se trouver près d’Eyn-Roguel, au sud de Jérusalem (cf. 2 S 17.17 ; 1 R 1.9 ; Es 7.3).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils crièrent qu’ils voulaient parler au roi. Eliaqim, fils de Hilqiya, qui avait la charge du palais royal, Shebna, le secrétaire du roi et Yoah, fils d’Asaph, l’archiviste, sortirent de la ville à leur rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’aide de camp du roi d’Assyrie leur dit : Veuillez transmettre ce message à Ezéchias : « Voici ce que déclare le grand roi, le roi d’Assyrie : En quoi mets-tu ta confiance ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'T’imaginerais-tu que de simples paroles peuvent tenir lieu de stratégie et de puissance militaire ? Sur qui comptes-tu donc pour t’être révolté contre moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je le vois : tu t’appuies sur l’Egypte, ce roseau cassé qui blesse et qui transperce la main de celui qui s’appuie dessus. Oui, c’est bien là ce qu’est le pharaon, le roi d’Egypte, pour tous ceux qui se confient en lui ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Peut-être me direz-vous : C’est en l’Eternel, notre Dieu, que nous nous confions. Mais n’est-ce pas précisément ce Dieu dont Ezéchias a fait disparaître les hauts lieux et les autels, en disant aux habitants de Juda et de Jérusalem de rendre leur culte uniquement devant l’autel qui se trouve à Jérusalem ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je te lance aujourd’hui un défi au nom de mon souverain, le roi d’Assyrie : Je te donnerai deux mille chevaux, si toi tu es capable de fournir autant d’hommes pour les monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Comment t’y prendrais-tu pour repousser un seul de nos capitaines, même si c’était le moindre des serviteurs de mon maître ? Comptes-tu sur l’Egypte pour te fournir des chars avec leur équipage ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'D’ailleurs crois-tu que c’est sans l’assentiment de l’Eternel que je suis venu attaquer ce lieu-ci pour le détruire ? C’est l’Eternel qui m’a dit : Va attaquer ce pays et détruis-le ! »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Assyriens demandent à la population de se rendre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Eliaqim, fils de Hilqiya, Shebna et Yoah dirent à l’aide de camp assyrien : Voudrais-tu, s’il te plaît, parler à tes serviteurs en langue araméenne'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Langue diplomatique parlée par les hauts fonctionnaires de l’époque. Elle deviendra la langue commune des Juifs à partir du '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: v
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: ', car nous la comprenons. Ne nous parle pas en hébreu alors que les gens sont là, sur les remparts, à écouter !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais l’aide de camp leur répliqua : Crois-tu que c’est à ton souverain et à toi seulement que mon souverain m’a chargé d’adresser ce message ? Crois-tu que ce n’est pas aussi à ces gens assis sur les remparts, qui seront bientôt réduits avec vous à manger leurs excréments et à boire leur urine ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis l’aide de camp se campa là et se mit à crier d’une voix forte, en hébreu : Ecoutez ce que dit le grand roi, le roi d’Assyrie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ainsi parle le roi : « Ne vous laissez pas tromper par Ezéchias ! Car il ne peut pas vous délivrer ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ne vous laissez pas persuader par Ezéchias de vous confier en l’Eternel, s’il vous dit : Sûrement l’Eternel nous délivrera, cette ville ne tombera pas aux mains du roi d’Assyrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'N’écoutez pas Ezéchias ; car voici ce que vous propose le roi d’Assyrie : Faites la paix avec moi, rendez-vous à moi ! Alors chacun de vous mangera les fruits de sa vigne et de son figuier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression commune caractérisant la vie paisible et prospère (1 R 5.5 ; Os 2.14 ; Mi 4.4 ; Za 3.10).
    marker-yv: yv-n
  - type: text
    text: ', et chacun boira de l’eau de son puits, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'en attendant que je vienne vous emmener dans un pays pareil au vôtre, un pays où il y a du blé et du vin, du pain et des vignes, des oliviers, de l’huile et du miel. Ainsi vous vivrez et vous ne mourrez pas. N’écoutez donc pas Ezéchias ; il vous trompe en vous disant : L’Eternel nous délivrera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les dieux des autres peuples ont-ils délivré leur pays du roi d’Assyrie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Où sont les dieux de Hamath et d’Arpad ? Où sont les dieux de Sepharvaïm, de Héna et d’Ivva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Villes syriennes prises par les Assyriens vers 722 av. J.-C. en même temps que Samarie.
    marker-yv: yv-n
  - type: text
    text: '  ? Ont-ils délivré Samarie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: De tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays pour que l’Eternel délivre Jérusalem ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le peuple garda le silence et ne lui répondit pas un mot, car le roi avait donné cet ordre : Vous ne lui répondrez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Alors Eliaqim, fils de Hilqiya, qui avait la charge du palais, Shebna, le secrétaire et Yoah, fils d’Asaph, l’archiviste, retournèrent auprès d’Ezéchias, les vêtements déchirés, et lui rapportèrent les paroles de l’aide de camp.
