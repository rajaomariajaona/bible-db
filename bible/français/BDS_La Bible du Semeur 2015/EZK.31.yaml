document_id: EZK.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La chute du grand cèdre
  - type: text
    content: Le premier jour du troisième mois de la onzième année
  - type: note
    content: C’est-à-dire en juin 587 av J.-C.
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Parce qu’il s’est dressé de toute sa hauteur, parce qu’il a porté sa cime jusque dans les nuages, parce que dans son cœur il s’est enorgueilli de sa très haute taille, '
  '11':
  - type: text
    content: je l’ai livré au puissant dominateur des peuples
  - type: note
    content: Il s’agit du roi de Babylone.
  - type: text
    content: ', afin qu’il lui inflige le traitement que sa méchanceté mérite ; je l’ai chassé. '
  '12':
  - type: text
    content: 'Des étrangers, parmi les plus violents des peuples, l’ont abattu et laissé là, ses branches sont tombées sur les montagnes et dans toutes les vallées ; ses rameaux ont été brisés dans tous les cours d’eau du pays, et tous les peuples de la terre ont fui loin de son ombre et l’ont abandonné. '
  '13':
  - type: text
    content: 'Tous les oiseaux du ciel sont venus pour s’établir sur son tronc abattu, et les bêtes sauvages s’abritent dans ses branches. '
  '14':
  - type: text
    content: Et tout cela arrive afin qu’aucun autre arbre croissant au bord de l’eau ne devienne orgueilleux à cause de sa taille et n’élève sa cime jusque dans les nuages, et afin qu’aucun arbre arrosé par les eaux ne se dresse en hauteur poussé par son orgueil. Car ils sont tous voués à la mort, pour descendre au séjour souterrain, au milieu des humains avec ceux qui descendent dans la fosse.
  - type: heading
    content: Dans la fosse
  '15':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Le jour où il est descendu dans le séjour des morts, j’ai fait mener le deuil et, à cause de lui, j’ai recouvert l’abîme'
  - type: note
    content: 'j’ai fait mener le deuil… l’abîme. Autre traduction : et, à cause de lui, j’ai recouvert l’abîme pour lui faire mener le deuil.'
  - type: text
    content: ', j’ai retenu ses fleuves, et ses puissantes eaux ont cessé de couler. Oui, à cause de lui, j’ai obscurci la forêt du Liban et, à cause de lui, tous les arbres des champs ont été desséchés. '
  '16':
  - type: text
    content: 'Par le bruit de sa chute, j’ai fait trembler les autres peuples, quand je l’ai fait descendre dans le séjour des morts avec ceux qui descendent dans la fosse ; dans les lieux souterrains, tous les arbres d’Eden, tous les arbres de choix, les plus beaux du Liban qui s’abreuvaient aux eaux, ont été consolés. '
  '17':
  - type: text
    content: 'Eux aussi, avec lui, ils sont tous descendus dans le séjour des morts vers les victimes de l’épée. Ils étaient son appui et vivaient à son ombre au milieu des peuples. '
  '18':
  - type: text
    content: Qui t’était comparable en gloire et en grandeur parmi tous les arbres d’Eden ? Et pourtant, te voici descendu avec eux au séjour souterrain pour être couché là au milieu des incirconcis, avec ceux qui ont été tués par l’épée. Tel sera le destin du pharaon et de son nombreux peuple, c’est là ce que déclare le Seigneur, l’Eternel.
  '2':
  - type: text
    content: Fils d’homme,
  - type: text
    content: 'dis au pharaon, roi d’Egypte, ╵et à son nombreux peuple :'
  - type: text
    content: A qui ressembles-tu ╵dans ta grandeur ?
  '3':
  - type: text
    content: L’Assyrie était comme un cèdre ╵sur le Liban,
  - type: text
    content: à la belle ramure,
  - type: text
    content: au feuillage touffu ╵donnant de l’ombre,
  - type: text
    content: à la haute stature ;
  - type: text
    content: sa cime s’élançait ╵jusque dans les nuages.
  '4':
  - type: text
    content: Les eaux l’avaient fait croître,
  - type: text
    content: les sources de l’abîme ╵l’avaient fait s’élever bien haut,
  - type: text
    content: répandant leurs rivières
  - type: text
    content: tout alentour du lieu ╵où il était planté,
  - type: text
    content: puis dirigeant leur cours
  - type: text
    content: vers tous les arbres des campagnes.
  '5':
  - type: text
    content: Voilà pourquoi sa taille ╵était plus élevée que celle
  - type: text
    content: de tous les arbres des campagnes ;
  - type: text
    content: ses rameaux se multipliaient,
  - type: text
    content: ses branches s’allongeaient,
  - type: text
    content: grâce à l’eau abondante ╵qui l’abreuvait.
  '6':
  - type: text
    content: Tous les oiseaux du ciel
  - type: text
    content: nichaient dans ses rameaux ╵et sous ses branches,
  - type: text
    content: les animaux des champs ╵mettaient bas leurs petits,
  - type: text
    content: de nombreux peuples ╵habitaient à son ombre.
  '7':
  - type: text
    content: Par sa taille imposante
  - type: text
    content: 'et l’ampleur de ses branches, ╵c’était le plus bel arbre :'
  - type: text
    content: ses racines plongeaient
  - type: text
    content: dans un sol gorgé d’eau.
  '8':
  - type: text
    content: Il n’était pas de cèdre ╵qui lui fût comparable ╵dans le jardin de Dieu.
  - type: text
    content: Les cyprès n’étaient pas ╵comparables à ses branches,
  - type: text
    content: ni les platanes à ses rameaux ;
  - type: text
    content: il n’était aucun arbre ╵dans le jardin de Dieu
  - type: text
    content: qui lui fût égal en beauté.
  '9':
  - type: text
    content: Je l’avais embelli ╵d’une riche ramure.
  - type: text
    content: Tous les arbres d’Eden,
  - type: text
    content: dans le jardin de Dieu,
  - type: text
    content: étaient jaloux de lui.
