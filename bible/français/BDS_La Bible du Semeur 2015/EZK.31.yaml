document_id: EZK.31,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La chute du grand cèdre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le premier jour du troisième mois de la onzième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en juin 587 av J.-C.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Parce qu’il s’est dressé de toute sa hauteur, parce qu’il a porté sa cime jusque dans les nuages, parce que dans son cœur il s’est enorgueilli de sa très haute taille, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je l’ai livré au puissant dominateur des peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit du roi de Babylone.
      marker-yv: yv-n
    - type: text
      text: ', afin qu’il lui inflige le traitement que sa méchanceté mérite ; je l’ai chassé. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des étrangers, parmi les plus violents des peuples, l’ont abattu et laissé là, ses branches sont tombées sur les montagnes et dans toutes les vallées ; ses rameaux ont été brisés dans tous les cours d’eau du pays, et tous les peuples de la terre ont fui loin de son ombre et l’ont abandonné. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les oiseaux du ciel sont venus pour s’établir sur son tronc abattu, et les bêtes sauvages s’abritent dans ses branches. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et tout cela arrive afin qu’aucun autre arbre croissant au bord de l’eau ne devienne orgueilleux à cause de sa taille et n’élève sa cime jusque dans les nuages, et afin qu’aucun arbre arrosé par les eaux ne se dresse en hauteur poussé par son orgueil. Car ils sont tous voués à la mort, pour descendre au séjour souterrain, au milieu des humains avec ceux qui descendent dans la fosse.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dans la fosse
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Le jour où il est descendu dans le séjour des morts, j’ai fait mener le deuil et, à cause de lui, j’ai recouvert l’abîme'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j’ai fait mener le deuil… l’abîme. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et, à cause de lui, j’ai recouvert l’abîme pour lui faire mener le deuil.
      marker-yv: yv-n
    - type: text
      text: ', j’ai retenu ses fleuves, et ses puissantes eaux ont cessé de couler. Oui, à cause de lui, j’ai obscurci la forêt du Liban et, à cause de lui, tous les arbres des champs ont été desséchés. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par le bruit de sa chute, j’ai fait trembler les autres peuples, quand je l’ai fait descendre dans le séjour des morts avec ceux qui descendent dans la fosse ; dans les lieux souterrains, tous les arbres d’Eden, tous les arbres de choix, les plus beaux du Liban qui s’abreuvaient aux eaux, ont été consolés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eux aussi, avec lui, ils sont tous descendus dans le séjour des morts vers les victimes de l’épée. Ils étaient son appui et vivaient à son ombre au milieu des peuples. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui t’était comparable en gloire et en grandeur parmi tous les arbres d’Eden ? Et pourtant, te voici descendu avec eux au séjour souterrain pour être couché là au milieu des incirconcis, avec ceux qui ont été tués par l’épée. Tel sera le destin du pharaon et de son nombreux peuple, c’est là ce que déclare le Seigneur, l’Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils d’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dis au pharaon, roi d’Egypte, ╵et à son nombreux peuple :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui ressembles-tu ╵dans ta grandeur ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Assyrie était comme un cèdre ╵sur le Liban,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la belle ramure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au feuillage touffu ╵donnant de l’ombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la haute stature ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa cime s’élançait ╵jusque dans les nuages.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux l’avaient fait croître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sources de l’abîme ╵l’avaient fait s’élever bien haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: répandant leurs rivières
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout alentour du lieu ╵où il était planté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis dirigeant leur cours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers tous les arbres des campagnes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi sa taille ╵était plus élevée que celle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous les arbres des campagnes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses rameaux se multipliaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses branches s’allongeaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grâce à l’eau abondante ╵qui l’abreuvait.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les oiseaux du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nichaient dans ses rameaux ╵et sous ses branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les animaux des champs ╵mettaient bas leurs petits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de nombreux peuples ╵habitaient à son ombre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par sa taille imposante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et l’ampleur de ses branches, ╵c’était le plus bel arbre :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses racines plongeaient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un sol gorgé d’eau.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’était pas de cèdre ╵qui lui fût comparable ╵dans le jardin de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cyprès n’étaient pas ╵comparables à ses branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni les platanes à ses rameaux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’était aucun arbre ╵dans le jardin de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui lui fût égal en beauté.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’avais embelli ╵d’une riche ramure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les arbres d’Eden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le jardin de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étaient jaloux de lui.
