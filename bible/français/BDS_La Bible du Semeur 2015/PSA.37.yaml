document_id: PSA.37,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le témoignage de l’expériencePsaume alphabétique (cf. note 9.1).
  - type: text
    content: De David.
  - type: text
    content: Ne t’irrite pas ╵contre les méchants !
  - type: text
    content: Ne jalouse pas ╵ceux qui font le mal !
  '10':
  - type: text
    content: D’ici peu de temps, ╵fini le méchant !
  - type: text
    content: 'Tu auras beau le chercher : ╵il ne sera plus.'
  '11':
  - type: text
    content: Mais ceux qui sont humbles
  - type: note
    content: 'Autre traduction : doux.'
  - type: text
    content: ' ╵auront le pays ╵comme possession'
  - type: note
    content: Cité en Mt 5.5.
  - type: text
    content: ','
  - type: text
    content: et ils jouiront ╵d’une grande paix.
  '12':
  - type: text
    content: Le méchant complote ╵pour faire du tort au juste,
  - type: text
    content: il grince des dents ╵contre lui.
  '13':
  - type: text
    content: Pourtant l’Eternel ╵se moque de lui,
  - type: text
    content: car il voit venir ╵le jour de sa perte.
  '14':
  - type: text
    content: Les méchants tirent l’épée,
  - type: text
    content: ils bandent leur arc
  - type: text
    content: pour tuer le pauvre ╵et le défavorisé
  - type: text
    content: et pour égorger ╵tous les gens qui suivent ╵la voie droite.
  '15':
  - type: text
    content: Mais leur propre épée ╵leur transpercera le cœur,
  - type: text
    content: et quant à leurs arcs, ╵ils seront brisés.
  '16':
  - type: text
    content: Le peu que possède ╵celui qui est juste
  - type: text
    content: vaut bien mieux que la richesse ╵de nombreux méchants.
  '17':
  - type: text
    content: Les méchants verront ╵leur pouvoir brisé,
  - type: text
    content: mais l’Eternel reste ╵le soutien des justes.
  '18':
  - type: text
    content: L’Eternel tient compte ╵de ce qu’est la vie ╵des gens sans reproche
  - type: note
    content: 'Autre traduction : L’Eternel veille sur chacun des jours des gens sans reproche.'
  - type: text
    content: ','
  - type: text
    content: et leur patrimoine ╵demeure à jamais.
  '19':
  - type: text
    content: Pour eux, pas de honte ╵au temps du malheur,
  - type: text
    content: et, dans les jours de famine ╵ils auront de quoi se rassasier.
  '2':
  - type: text
    content: Car, rapidement, ╵comme l’herbe aux champs, ╵ils seront fauchés
  - type: text
    content: et se faneront ╵comme la verdure.
  '20':
  - type: text
    content: Les méchants périssent
  - type: text
    content: 'et les ennemis de l’Eternel ╵sont comme les fleurs des prés :'
  - type: text
    content: ils disparaîtront ; ╵comme une fumée, ╵ils s’évanouiront.
  '21':
  - type: text
    content: Le méchant emprunte ╵mais il ne rend pas ;
  - type: text
    content: le juste a pitié, ╵il est généreux.
  '22':
  - type: text
    content: Ceux que Dieu bénit ╵auront le pays ╵comme possession
  - type: note
    content: Voir note v. 11.
  - type: text
    content: ','
  - type: text
    content: mais ceux qu’il maudit ╵seront retranchés.
  '23':
  - type: text
    content: Lorsque la conduite ╵de quelqu’un lui plaît,
  - type: text
    content: l’Eternel lui donne ╵d’affermir sa marche ╵dans la vie.
  '24':
  - type: text
    content: 'Il peut trébucher, ╵mais il ne s’écroule pas :'
  - type: text
    content: l’Eternel le tient ╵par la main.
  '25':
  - type: text
    content: Depuis ma jeunesse ╵jusqu’à mon âge avancé,
  - type: text
    content: jamais je n’ai vu ╵celui qui est juste ╵être abandonné,
  - type: text
    content: ni ses descendants ╵mendier leur pain.
  '26':
  - type: text
    content: Tout au long des jours, ╵il a compassion ╵et il prête aux autres.
  - type: text
    content: Ses enfants seront ╵en bénédiction.
  '27':
  - type: text
    content: 'Evite le mal, ╵accomplis le bien :'
  - type: text
    content: tu demeureras ╵pour toujours.
  '28':
  - type: text
    content: Car l’Eternel aime la droiture,
  - type: text
    content: et il n’abandonne pas ╵ceux qui lui sont attachés ;
  - type: text
    content: mais les malfaisants ╵seront supprimés
  - type: note
    content: 'mais les malfaisants seront supprimés: d’après l’ancienne version grecque, qui suppose la disparition d’un mot et la confusion entre deux lettres très ressemblantes par rapport au texte hébreu traditionnel qui porte : ils seront gardés éternellement. D’une part, la leçon de la version grecque permet de préserver le parallélisme entre les deux dernières lignes du verset. D’autre part, le terme manquant dans l’hébreu est nécessaire à la construction de l’acrostiche du psaume.'
  - type: text
    content: ','
  - type: text
    content: la postérité ╵de tous les méchants ╵sera retranchée ;
  '29':
  - type: text
    content: tandis que les justes ╵auront le pays ╵comme possession.
  - type: text
    content: Ils l’habiteront ╵éternellement.
  '3':
  - type: text
    content: Mets en l’Eternel ╵toute ta confiance ! ╵Fais ce qui est bien,
  - type: text
    content: et, dans le pays, ╵tu demeureras ╵et tu jouiras ╵de bons pâturages ╵en sécurité.
  '30':
  - type: text
    content: Des paroles sages ╵sortent de la bouche ╵de ceux qui sont justes,
  - type: text
    content: et leur langue parle, ╵selon la droiture.
  '31':
  - type: text
    content: Ils ont dans leur cœur ╵la Loi de leur Dieu,
  - type: text
    content: et ils ne trébuchent pas.
  '32':
  - type: text
    content: 'Le méchant épie le juste :'
  - type: text
    content: il cherche à le mettre à mort.
  '33':
  - type: text
    content: L’Eternel ╵ne le livre pas en son pouvoir.
  - type: text
    content: Il ne le laissera pas ╵être condamné ╵dans un jugement.
  '34':
  - type: text
    content: 'Attends-toi à l’Eternel, ╵règle ta conduite ╵selon ce qu’il a prescrit :'
  - type: text
    content: il t’honorera ╵par la possession ╵du pays.
  - type: text
    content: Tu verras comment ╵tous les malfaisants ╵seront retranchés.
  '35':
  - type: text
    content: J’ai vu le méchant, ╵dans sa violence,
  - type: text
    content: croître comme un arbre florissant ╵bien enraciné ╵sur son sol natal.
  '36':
  - type: text
    content: Puis je suis passé par là
  - type: note
    content: 'D’après un manuscrit de Qumrân et les version anciennes. Texte hébreu traditionnel : il a passé.'
  - type: text
    content: '  : ╵voici qu’il n’est plus.'
  - type: text
    content: Et j’ai eu beau le chercher, ╵il est introuvable.
  '37':
  - type: text
    content: Considère l’homme intègre,
  - type: text
    content: 'oui, observe l’homme droit :'
  - type: text
    content: alors tu constateras ╵que l’homme de paix ╵a un avenir.
  '38':
  - type: text
    content: Au contraire les rebelles ╵seront détruits tous ensemble,
  - type: text
    content: et les méchants n’auront plus ╵aucun avenir.
  '39':
  - type: text
    content: Le salut des justes ╵vient de l’Eternel,
  - type: text
    content: et il est leur forteresse ╵aux jours de détresse.
  '4':
  - type: text
    content: En Dieu, mets ta joie
  - type: text
    content: et il comblera ╵les vœux de ton cœur.
  '40':
  - type: text
    content: Il leur vient en aide ╵et il les délivre ;
  - type: text
    content: il les fait échapper aux méchants ╵et les sauve
  - type: text
    content: car ils ont cherché ╵leur refuge en lui.
  '5':
  - type: text
    content: C’est à l’Eternel ╵qu’il te faut remettre ╵ta vie tout entière.
  - type: text
    content: Aie confiance en lui ╵et il agira.
  '6':
  - type: text
    content: Il fera paraître ╵ta justice ╵comme la lumière,
  - type: text
    content: et ton droit ╵comme le soleil ╵à midi.
  '7':
  - type: text
    content: Demeure en silence ╵devant l’Eternel. ╵Attends-toi à lui,
  - type: text
    content: ne t’irrite pas ╵contre ceux qui réussissent ╵dans leurs entreprises,
  - type: text
    content: en mettant en œuvre ╵de mauvais desseins.
  '8':
  - type: text
    content: Laisse la colère, ╵calme ton courroux,
  - type: text
    content: ne t’irrite pas, ╵car, en fin de compte, ╵tu ferais le mal.
  '9':
  - type: text
    content: 'Or, qui fait le mal ╵sera retranché :'
  - type: text
    content: mais ceux qui comptent sur l’Eternel ╵auront le pays ╵comme possession.
