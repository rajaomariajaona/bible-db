document_id: PSA.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le témoignage de l’expérience
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Psaume alphabétique (cf. note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.1'
        metadata:
          usfm: PSA.9.1
      - type: text
        text: ).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t’irrite pas ╵contre les méchants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne jalouse pas ╵ceux qui font le mal !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car, rapidement, ╵comme l’herbe aux champs, ╵ils seront fauchés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se faneront ╵comme la verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mets en l’Eternel ╵toute ta confiance ! ╵Fais ce qui est bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans le pays, ╵tu demeureras ╵et tu jouiras ╵de bons pâturages ╵en sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En Dieu, mets ta joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il comblera ╵les vœux de ton cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est à l’Eternel ╵qu’il te faut remettre ╵ta vie tout entière.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aie confiance en lui ╵et il agira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fera paraître ╵ta justice ╵comme la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton droit ╵comme le soleil ╵à midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Demeure en silence ╵devant l’Eternel. ╵Attends-toi à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne t’irrite pas ╵contre ceux qui réussissent ╵dans leurs entreprises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en mettant en œuvre ╵de mauvais desseins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Laisse la colère, ╵calme ton courroux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne t’irrite pas, ╵car, en fin de compte, ╵tu ferais le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, qui fait le mal ╵sera retranché :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui comptent sur l’Eternel ╵auront le pays ╵comme possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: D’ici peu de temps, ╵fini le méchant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu auras beau le chercher : ╵il ne sera plus.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais ceux qui sont humbles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: doux.
    marker-yv: yv-n
  - type: text
    text: ' ╵auront le pays ╵comme possession'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.5
        metadata:
          usfm: MAT.5.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils jouiront ╵d’une grande paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le méchant complote ╵pour faire du tort au juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il grince des dents ╵contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourtant l’Eternel ╵se moque de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il voit venir ╵le jour de sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les méchants tirent l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils bandent leur arc
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tuer le pauvre ╵et le défavorisé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour égorger ╵tous les gens qui suivent ╵la voie droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais leur propre épée ╵leur transpercera le cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quant à leurs arcs, ╵ils seront brisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le peu que possède ╵celui qui est juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: vaut bien mieux que la richesse ╵de nombreux méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les méchants verront ╵leur pouvoir brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel reste ╵le soutien des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Eternel tient compte ╵de ce qu’est la vie ╵des gens sans reproche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: L’Eternel veille sur chacun des jours des gens sans reproche.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur patrimoine ╵demeure à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pour eux, pas de honte ╵au temps du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans les jours de famine ╵ils auront de quoi se rassasier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les méchants périssent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les ennemis de l’Eternel ╵sont comme les fleurs des prés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils disparaîtront ; ╵comme une fumée, ╵ils s’évanouiront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le méchant emprunte ╵mais il ne rend pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le juste a pitié, ╵il est généreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ceux que Dieu bénit ╵auront le pays ╵comme possession
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir note v. 11.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qu’il maudit ╵seront retranchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsque la conduite ╵de quelqu’un lui plaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel lui donne ╵d’affermir sa marche ╵dans la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il peut trébucher, ╵mais il ne s’écroule pas :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le tient ╵par la main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Depuis ma jeunesse ╵jusqu’à mon âge avancé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais je n’ai vu ╵celui qui est juste ╵être abandonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni ses descendants ╵mendier leur pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tout au long des jours, ╵il a compassion ╵et il prête aux autres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses enfants seront ╵en bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Evite le mal, ╵accomplis le bien :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu demeureras ╵pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car l’Eternel aime la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’abandonne pas ╵ceux qui lui sont attachés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les malfaisants ╵seront supprimés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mais les malfaisants '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: seront supprimés
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque, qui suppose la disparition d’un mot et la confusion entre deux lettres très ressemblantes par rapport au texte hébreu traditionnel qui porte : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils seront gardés éternellement. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: D’une part, la leçon de la version grecque permet de préserver le parallélisme entre les deux dernières lignes du verset. D’autre part, le terme manquant dans l’hébreu est nécessaire à la construction de l’acrostiche du psaume.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: la postérité ╵de tous les méchants ╵sera retranchée ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: tandis que les justes ╵auront le pays ╵comme possession.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils l’habiteront ╵éternellement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Des paroles sages ╵sortent de la bouche ╵de ceux qui sont justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur langue parle, ╵selon la droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils ont dans leur cœur ╵la Loi de leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne trébuchent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le méchant épie le juste :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il cherche à le mettre à mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: L’Eternel ╵ne le livre pas en son pouvoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne le laissera pas ╵être condamné ╵dans un jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Attends-toi à l’Eternel, ╵règle ta conduite ╵selon ce qu’il a prescrit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il t’honorera ╵par la possession ╵du pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu verras comment ╵tous les malfaisants ╵seront retranchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: J’ai vu le méchant, ╵dans sa violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: croître comme un arbre florissant ╵bien enraciné ╵sur son sol natal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Puis je suis passé par là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après un manuscrit de Qumrân et les version anciennes. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a passé.
    marker-yv: yv-n
  - type: text
    text: '  : ╵voici qu’il n’est plus.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’ai eu beau le chercher, ╵il est introuvable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Considère l’homme intègre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'oui, observe l’homme droit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors tu constateras ╵que l’homme de paix ╵a un avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Au contraire les rebelles ╵seront détruits tous ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les méchants n’auront plus ╵aucun avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le salut des justes ╵vient de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il est leur forteresse ╵aux jours de détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Il leur vient en aide ╵et il les délivre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les fait échapper aux méchants ╵et les sauve
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont cherché ╵leur refuge en lui.
