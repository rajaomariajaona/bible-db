document_id: PSA.37,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le témoignage de l’expérience
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Psaume alphabétique (cf. note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.1'
        - type: text
          text: ).
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’irrite pas ╵contre les méchants !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne jalouse pas ╵ceux qui font le mal !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’ici peu de temps, ╵fini le méchant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu auras beau le chercher : ╵il ne sera plus.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux qui sont humbles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: doux.
      marker-yv: yv-n
    - type: text
      text: ' ╵auront le pays ╵comme possession'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 5.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils jouiront ╵d’une grande paix.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant complote ╵pour faire du tort au juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il grince des dents ╵contre lui.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant l’Eternel ╵se moque de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il voit venir ╵le jour de sa perte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants tirent l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils bandent leur arc
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tuer le pauvre ╵et le défavorisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour égorger ╵tous les gens qui suivent ╵la voie droite.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais leur propre épée ╵leur transpercera le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quant à leurs arcs, ╵ils seront brisés.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peu que possède ╵celui qui est juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vaut bien mieux que la richesse ╵de nombreux méchants.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants verront ╵leur pouvoir brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’Eternel reste ╵le soutien des justes.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel tient compte ╵de ce qu’est la vie ╵des gens sans reproche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: L’Eternel veille sur chacun des jours des gens sans reproche.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur patrimoine ╵demeure à jamais.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour eux, pas de honte ╵au temps du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans les jours de famine ╵ils auront de quoi se rassasier.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, rapidement, ╵comme l’herbe aux champs, ╵ils seront fauchés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se faneront ╵comme la verdure.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants périssent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les ennemis de l’Eternel ╵sont comme les fleurs des prés :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils disparaîtront ; ╵comme une fumée, ╵ils s’évanouiront.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant emprunte ╵mais il ne rend pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juste a pitié, ╵il est généreux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux que Dieu bénit ╵auront le pays ╵comme possession
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 11.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qu’il maudit ╵seront retranchés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque la conduite ╵de quelqu’un lui plaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel lui donne ╵d’affermir sa marche ╵dans la vie.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il peut trébucher, ╵mais il ne s’écroule pas :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le tient ╵par la main.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis ma jeunesse ╵jusqu’à mon âge avancé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jamais je n’ai vu ╵celui qui est juste ╵être abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni ses descendants ╵mendier leur pain.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout au long des jours, ╵il a compassion ╵et il prête aux autres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses enfants seront ╵en bénédiction.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Evite le mal, ╵accomplis le bien :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu demeureras ╵pour toujours.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel aime la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’abandonne pas ╵ceux qui lui sont attachés ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les malfaisants ╵seront supprimés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mais les malfaisants '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: seront supprimés
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque, qui suppose la disparition d’un mot et la confusion entre deux lettres très ressemblantes par rapport au texte hébreu traditionnel qui porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils seront gardés éternellement. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’une part, la leçon de la version grecque permet de préserver le parallélisme entre les deux dernières lignes du verset. D’autre part, le terme manquant dans l’hébreu est nécessaire à la construction de l’acrostiche du psaume.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la postérité ╵de tous les méchants ╵sera retranchée ;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les justes ╵auront le pays ╵comme possession.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils l’habiteront ╵éternellement.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets en l’Eternel ╵toute ta confiance ! ╵Fais ce qui est bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans le pays, ╵tu demeureras ╵et tu jouiras ╵de bons pâturages ╵en sécurité.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des paroles sages ╵sortent de la bouche ╵de ceux qui sont justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur langue parle, ╵selon la droiture.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont dans leur cœur ╵la Loi de leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne trébuchent pas.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le méchant épie le juste :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il cherche à le mettre à mort.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel ╵ne le livre pas en son pouvoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne le laissera pas ╵être condamné ╵dans un jugement.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Attends-toi à l’Eternel, ╵règle ta conduite ╵selon ce qu’il a prescrit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il t’honorera ╵par la possession ╵du pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu verras comment ╵tous les malfaisants ╵seront retranchés.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu le méchant, ╵dans sa violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: croître comme un arbre florissant ╵bien enraciné ╵sur son sol natal.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis je suis passé par là
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après un manuscrit de Qumrân et les version anciennes. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a passé.
      marker-yv: yv-n
    - type: text
      text: '  : ╵voici qu’il n’est plus.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai eu beau le chercher, ╵il est introuvable.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère l’homme intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'oui, observe l’homme droit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors tu constateras ╵que l’homme de paix ╵a un avenir.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire les rebelles ╵seront détruits tous ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les méchants n’auront plus ╵aucun avenir.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut des justes ╵vient de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il est leur forteresse ╵aux jours de détresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En Dieu, mets ta joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il comblera ╵les vœux de ton cœur.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur vient en aide ╵et il les délivre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les fait échapper aux méchants ╵et les sauve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont cherché ╵leur refuge en lui.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à l’Eternel ╵qu’il te faut remettre ╵ta vie tout entière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie confiance en lui ╵et il agira.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera paraître ╵ta justice ╵comme la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton droit ╵comme le soleil ╵à midi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demeure en silence ╵devant l’Eternel. ╵Attends-toi à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne t’irrite pas ╵contre ceux qui réussissent ╵dans leurs entreprises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en mettant en œuvre ╵de mauvais desseins.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisse la colère, ╵calme ton courroux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne t’irrite pas, ╵car, en fin de compte, ╵tu ferais le mal.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or, qui fait le mal ╵sera retranché :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui comptent sur l’Eternel ╵auront le pays ╵comme possession.
