document_id: ROM.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Prenons l’exemple d’Abraham, l’ancêtre de notre peuple, selon la descendance physique. Que pouvons-nous dire à son sujet ? Quelle a été son expérience ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'A quel moment cela a-t-il eu lieu ? Quand Abraham était circoncis ou quand il était encore incirconcis ? Ce n’est pas quand il était circoncis, mais quand il ne l’était pas encore. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et Dieu lui donna ensuite le signe de la circoncision comme sceau de la justice qu’il avait déjà reçue par la foi avant d’être circoncis. Il est devenu ainsi le père de tous ceux qui croient sans être circoncis pour qu’eux aussi soient déclarés justes par Dieu de la même manière. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il est aussi devenu le père des circoncis qui ne se contentent pas d’avoir la circoncision, mais qui suivent l’exemple de la foi que notre père Abraham a manifestée alors qu’il était encore incirconcis.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Car la promesse de recevoir le monde en héritage a été faite à Abraham ou à sa descendance non parce qu’il avait obéi à la Loi, mais parce que Dieu l’a déclaré juste à cause de sa foi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: En effet, s’il faut être sous le régime de la Loi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s’il faut obéir à la Loi.
      marker-yv: yv-n
    - type: text
      text: ' pour avoir droit à cet héritage, alors la foi n’a plus de sens et la promesse est annulée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Car la Loi produit la colère de Dieu. Or, là où il n’y a pas de Loi, il n’y a pas non plus de transgression. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voilà pourquoi l’héritage se reçoit par la foi : c’est pour qu’il soit un don de la grâce. Ainsi, la promesse se trouve confirmée à toute la descendance d’Abraham, c’est-à-dire non seulement à celle qui a la Loi, mais aussi à celle qui partage la foi d’Abraham. Il est notre père à tous, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'comme le dit l’Ecriture : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je t’ai établi pour être le père d’une multitude de peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 17.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Placé en présence de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Il est notre père à tous '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant celui en qui il a mis sa confiance, Dieu qui donne…
      marker-yv: yv-n
    - type: text
      text: ', il mit sa confiance en celui qui donne la vie aux morts et appelle à l’existence ce qui n’existe pas.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors que tout portait au contraire, il a eu confiance, plein d’espérance. Ainsi il est devenu '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le père d’une multitude de peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 17.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' conformément à ce que Dieu lui avait dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tes descendants seront nombreux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 15.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Bien qu’il considéra son corps, qui était comme mort – il avait presque cent ans – et celui de Sara, qui ne pouvait plus donner la vie, sa foi ne faiblit pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'S’il a été déclaré juste en raison de ce qu’il a fait, alors certes, il peut se vanter. Mais ce n’est pas ainsi que Dieu voit la chose ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Au contraire : loin de mettre en doute la promesse et de refuser de croire, il trouva sa force dans la foi, en reconnaissant la grandeur de Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fut fortifié dans sa foi et fit ainsi honneur à Dieu.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: et en étant absolument persuadé que Dieu est capable d’accomplir ce qu’il a promis.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'C’est pourquoi, Dieu '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’a déclaré juste en portant sa foi à son crédit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 15.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Or si cette parole : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu a porté sa foi à son crédit
    - type: text
      text: ' a été consignée dans l’Ecriture, ce n’est pas seulement pour Abraham'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle ne concerne pas seulement Abraham.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Elle nous concerne nous aussi. Car la foi sera aussi portée à notre crédit, à nous qui plaçons notre confiance en celui qui a ressuscité Jésus notre Seigneur ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: il a été livré pour nos fautes, et il est ressuscité pour que nous soyons déclarés justes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ressuscité parce qu’il avait accompli l’œuvre par laquelle nous sommes déclarés justes.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, que dit l’Ecriture ? '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Abraham a eu confiance en Dieu, et Dieu a porté sa foi à son crédit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul emploie un terme du vocabulaire commercial qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'imputer, porter au compte de quelqu’un. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dieu a porté l’acte de foi d’Abraham au compte du patriarche et l’a déclaré juste.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour le déclarer juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 15.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si quelqu’un accomplit un travail, on lui compte son salaire non pas comme si on lui faisait une faveur, mais d’après ce qui lui est dû. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et si quelqu’un n’accomplit pas les œuvres requises par la Loi mais place sa confiance en Dieu qui déclare justes les pécheurs, Dieu le déclare juste en portant sa foi à son crédit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'De même, David déclare béni l’homme que Dieu déclare juste sans qu’il ait produit les œuvres qu’exige la Loi :'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils sont bénis, ceux dont les fautes ont été pardonnées
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et dont les péchés ont été effacés !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il est béni, l’homme au compte de qui
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Seigneur ne porte pas le péché
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 32.1-2
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Cette bénédiction est-elle réservée aux seuls circoncis, ou est-elle aussi accessible aux incirconcis ? Nous venons de le dire : Dieu a porté la foi d’Abraham à son crédit pour le déclarer juste. '
