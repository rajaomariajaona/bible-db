document_id: ROM.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Prenons l’exemple d’Abraham, l’ancêtre de notre peuple, selon la descendance physique. Que pouvons-nous dire à son sujet ? Quelle a été son expérience ? '
  '10':
  - type: text
    content: 'A quel moment cela a-t-il eu lieu ? Quand Abraham était circoncis ou quand il était encore incirconcis ? Ce n’est pas quand il était circoncis, mais quand il ne l’était pas encore. '
  '11':
  - type: text
    content: 'Et Dieu lui donna ensuite le signe de la circoncision comme sceau de la justice qu’il avait déjà reçue par la foi avant d’être circoncis. Il est devenu ainsi le père de tous ceux qui croient sans être circoncis pour qu’eux aussi soient déclarés justes par Dieu de la même manière. '
  '12':
  - type: text
    content: Il est aussi devenu le père des circoncis qui ne se contentent pas d’avoir la circoncision, mais qui suivent l’exemple de la foi que notre père Abraham a manifestée alors qu’il était encore incirconcis.
  '13':
  - type: text
    content: 'Car la promesse de recevoir le monde en héritage a été faite à Abraham ou à sa descendance non parce qu’il avait obéi à la Loi, mais parce que Dieu l’a déclaré juste à cause de sa foi. '
  '14':
  - type: text
    content: En effet, s’il faut être sous le régime de la Loi
  - type: note
    content: 'Autre traduction : s’il faut obéir à la Loi.'
  - type: text
    content: ' pour avoir droit à cet héritage, alors la foi n’a plus de sens et la promesse est annulée. '
  '15':
  - type: text
    content: 'Car la Loi produit la colère de Dieu. Or, là où il n’y a pas de Loi, il n’y a pas non plus de transgression. '
  '16':
  - type: text
    content: 'Voilà pourquoi l’héritage se reçoit par la foi : c’est pour qu’il soit un don de la grâce. Ainsi, la promesse se trouve confirmée à toute la descendance d’Abraham, c’est-à-dire non seulement à celle qui a la Loi, mais aussi à celle qui partage la foi d’Abraham. Il est notre père à tous, '
  '17':
  - type: text
    content: 'comme le dit l’Ecriture : '
  - type: text
    content: Je t’ai établi pour être le père d’une multitude de peuples
  - type: note
    content: Gn 17.5.
  - type: text
    content: . Placé en présence de Dieu
  - type: note
    content: 'Autre traduction : Il est notre père à tous 17 devant celui en qui il a mis sa confiance, Dieu qui donne…'
  - type: text
    content: ', il mit sa confiance en celui qui donne la vie aux morts et appelle à l’existence ce qui n’existe pas.'
  '18':
  - type: text
    content: 'Alors que tout portait au contraire, il a eu confiance, plein d’espérance. Ainsi il est devenu '
  - type: text
    content: le père d’une multitude de peuples
  - type: note
    content: Gn 17.5.
  - type: text
    content: ' conformément à ce que Dieu lui avait dit : '
  - type: text
    content: Tes descendants seront nombreux
  - type: note
    content: Gn 15.5.
  - type: text
    content: .
  '19':
  - type: text
    content: 'Bien qu’il considéra son corps, qui était comme mort – il avait presque cent ans – et celui de Sara, qui ne pouvait plus donner la vie, sa foi ne faiblit pas. '
  '2':
  - type: text
    content: 'S’il a été déclaré juste en raison de ce qu’il a fait, alors certes, il peut se vanter. Mais ce n’est pas ainsi que Dieu voit la chose ! '
  '20':
  - type: text
    content: 'Au contraire : loin de mettre en doute la promesse et de refuser de croire, il trouva sa force dans la foi, en reconnaissant la grandeur de Dieu'
  - type: note
    content: 'Autre traduction : il fut fortifié dans sa foi et fit ainsi honneur à Dieu.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: et en étant absolument persuadé que Dieu est capable d’accomplir ce qu’il a promis.
  '22':
  - type: text
    content: 'C’est pourquoi, Dieu '
  - type: text
    content: l’a déclaré juste en portant sa foi à son crédit
  - type: note
    content: Gn 15.6.
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Or si cette parole : '
  - type: text
    content: Dieu a porté sa foi à son crédit
  - type: text
    content: ' a été consignée dans l’Ecriture, ce n’est pas seulement pour Abraham'
  - type: note
    content: 'Autre traduction : elle ne concerne pas seulement Abraham.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Elle nous concerne nous aussi. Car la foi sera aussi portée à notre crédit, à nous qui plaçons notre confiance en celui qui a ressuscité Jésus notre Seigneur ; '
  '25':
  - type: text
    content: il a été livré pour nos fautes, et il est ressuscité pour que nous soyons déclarés justes
  - type: note
    content: 'Autre traduction : ressuscité parce qu’il avait accompli l’œuvre par laquelle nous sommes déclarés justes.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'En effet, que dit l’Ecriture ? '
  - type: text
    content: Abraham a eu confiance en Dieu, et Dieu a porté sa foi à son crédit
  - type: note
    content: 'Paul emploie un terme du vocabulaire commercial qui signifie : imputer, porter au compte de quelqu’un. Dieu a porté l’acte de foi d’Abraham au compte du patriarche et l’a déclaré juste.'
  - type: text
    content: ' '
  - type: text
    content: pour le déclarer juste
  - type: note
    content: Gn 15.6.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Si quelqu’un accomplit un travail, on lui compte son salaire non pas comme si on lui faisait une faveur, mais d’après ce qui lui est dû. '
  '5':
  - type: text
    content: 'Et si quelqu’un n’accomplit pas les œuvres requises par la Loi mais place sa confiance en Dieu qui déclare justes les pécheurs, Dieu le déclare juste en portant sa foi à son crédit. '
  '6':
  - type: text
    content: 'De même, David déclare béni l’homme que Dieu déclare juste sans qu’il ait produit les œuvres qu’exige la Loi :'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Ils sont bénis, ceux dont les fautes ont été pardonnées
  - type: text
    content: et dont les péchés ont été effacés !
  '8':
  - type: text
    content: ' '
  - type: text
    content: Il est béni, l’homme au compte de qui
  - type: text
    content: le Seigneur ne porte pas le péché
  - type: text
    content: ' '
  - type: note
    content: Ps 32.1-2 .
  - type: text
    content: '!'
  '9':
  - type: text
    content: 'Cette bénédiction est-elle réservée aux seuls circoncis, ou est-elle aussi accessible aux incirconcis ? Nous venons de le dire : Dieu a porté la foi d’Abraham à son crédit pour le déclarer juste. '
