document_id: NUM.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la liste des descendants d’Aaron et de Moïse à l’époque où l’Eternel s’adressa à Moïse sur le mont Sinaï.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les noms des fils d’Aaron : l’aîné s’appelait Nadab, puis vinrent Abihou, Eléazar et Itamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils étaient prêtres ayant reçu l’onction pour être investis de la fonction sacerdotale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais Nadab et Abihou moururent devant l’Eternel, dans le désert du Sinaï, parce qu’ils lui avaient présenté un feu profane ; ils n’avaient pas eu d’enfants. Eléazar et Itamar exercèrent le ministère sacerdotal sous la supervision de leur père Aaron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 10.1-7
        metadata:
          usfm: LEV.10.1+LEV.10.2+LEV.10.3+LEV.10.4+LEV.10.5+LEV.10.6+LEV.10.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lévites, au service des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fais venir la tribu de Lévi et mets ses membres à la disposition du prêtre Aaron pour qu’ils l’assistent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les lévites sont clairement distingués des prêtres, descendants d’Aaron (qui forment une branche des lévites). Ils seront les assistants, les aides des prêtres, mais n’accompliront pas toutes leurs fonctions.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils seront à son service et au service de toute la communauté devant la tente de la Rencontre, pour accomplir les tâches relatives au tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils prendront soin de tous les ustensiles de la tente de la Rencontre et seront au service des Israélites pour accomplir les tâches relatives au tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Donc, tu mettras les lévites à la disposition d’Aaron et de ses fils ; ils lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits du texte hébreu traditionnel, le Pentateuque samaritain et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me.
    marker-yv: yv-n
  - type: text
    text: ' seront attribués comme représentants des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu veilleras à ce qu’Aaron et ses fils exercent les fonctions sacerdotales ; celui qui ne serait pas de leur famille et qui s’approcherait du tabernacle sera puni de mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel parla encore à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici : j’ai choisi les lévites du milieu des Israélites à la place de tous les premiers-nés des mères israélites ; ils m’appartiennent donc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tout premier-né m’appartient en effet, depuis le jour où j’ai fait mourir tous les premiers-nés des Egyptiens et où je me suis consacré tout premier-né en Israël, tant ceux des hommes que ceux des animaux. Ils sont à moi. Je suis l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13.1-16
        metadata:
          usfm: EXO.13.1+EXO.13.2+EXO.13.3+EXO.13.4+EXO.13.5+EXO.13.6+EXO.13.7+EXO.13.8+EXO.13.9+EXO.13.10+EXO.13.11+EXO.13.12+EXO.13.13+EXO.13.14+EXO.13.15+EXO.13.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le recensement, le campement et les fonctions des lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Là-dessus, l’Eternel commanda à Moïse, au désert du Sinaï : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fais le recensement des descendants de Lévi, selon leurs groupes familiaux et leurs familles ; tu compteras tous les lévites de sexe masculin de l’âge d’un mois et plus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les lévites ne devaient pas faire de service militaire ; c’est pourquoi ils ne sont pas comptés à partir de vingt ans comme les autres Israélites. Ce recensement sert à déterminer le rapport de leur nombre avec celui des premiers-nés (voir v. 40-51).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moïse fit ce recensement sur l’ordre de l’Eternel de la manière qu’il lui avait prescrite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les noms des fils de Lévi : Guershôn, Qehath et Merari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Guershôn avait pour fils Libni et Shimeï, qui ont donné leurs noms à leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Qehath eut pour fils Amram et Yitsehar, Hébron et Ouzziel qui ont donné leur nom à leur famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Merari eut pour fils Mahli et Moushi qui ont donné leur nom à leur famille. Telles sont les familles des groupes familiaux de Lévi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les descendants de Guershôn comprennent la famille de Libni et celle de Shimeï, qui représentent les familles guershonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elles comptaient au moment du recensement 7 500 membres de sexe masculin, âgés d’un mois et plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les familles guershonites campaient derrière le tabernacle, du côté ouest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le chef de leur groupe familial était Eliasaph, fils de Laël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans la tente de la Rencontre, ils avaient la responsabilité du tabernacle et de la tenture qui le recouvrait, du rideau de l’entrée de la tente, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: des tentures du parvis qui entoure le tabernacle et l’autel, et de sa porte d’entrée ainsi que des cordages. Ils étaient chargés de tous les travaux liés à ces objets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'De Qehath sont issues les familles des Amramites, des Yitseharites, des Hébronites et des Ouzziélites, qui représentent les familles qehatites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elles comptaient 8 600
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 8 300
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui s’accorde avec le total donné au v. 39.'
    marker-yv: yv-n
  - type: text
    text: ' membres de sexe masculin de plus d’un mois. Ils étaient affectés au service du sanctuaire '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et campaient du côté sud de la Demeure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Leur chef était Elitsaphân, fils d’Ouzziel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On avait confié à leur responsabilité : le coffre, la table, le chandelier, les autels, les objets sacrés dont on se sert pour officier, et le voile'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Séparant le lieu saint du lieu très saint.
    marker-yv: yv-n
  - type: text
    text: . Ils étaient chargés de tous les travaux liés à ces objets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le chef suprême des lévites était Eléazar, fils du prêtre Aaron. Il supervisait les lévites préposés au service du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'De Merari sont issues la famille de Mahli et celle de Moushi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils étaient 6 200 de sexe masculin âgés de plus d’un mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le chef du groupe familial et des familles de Merari était Tsouriel, fils d’Abihaïl. Ils campaient du côté nord de la Demeure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les Merarites étaient responsables des planches du tabernacle, de ses traverses, de ses piliers, de leurs socles et de tous les ustensiles, pour accomplir tous les travaux relatifs à ces objets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ils avaient aussi la charge des piliers autour du parvis avec leurs socles, leurs piquets et leurs cordages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Moïse, Aaron et ses fils campaient devant le tabernacle, à l’est, devant la tente de la Rencontre. Ils étaient chargés du service du sanctuaire au nom des Israélites. Toute personne profane qui s’en serait approchée comme eux devait être mise à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le nombre total des lévites de sexe masculin d’un mois et plus, recensés par Moïse et Aaron sur l’ordre de l’Eternel et par familles, était de 22 000.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rachat des fils aînés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'L’Eternel dit à Moïse : Fais à présent le recensement de tous les fils aînés parmi les Israélites depuis l’âge d’un mois et au-dessus, en dressant leur liste nominative. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: A leur place, tu m’attribueras les lévites – je suis l’Eternel. Le bétail des lévites m’appartiendra aussi en échange de tous les premiers-nés du bétail des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Moïse fit le recensement de tous les fils aînés des Israélites selon l’ordre que l’Eternel lui avait donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Le total des fils aînés âgés d’au moins un mois et dont il enregistra les noms était de 22 273.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'L’Eternel parla à Moïse et dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Attribue-moi les lévites en échange de tous les fils aînés des Israélites, et le bétail des lévites à la place du leur, ainsi les lévites seront à moi. Je suis l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Pour le rachat des 273 fils aînés en surplus par rapport au nombre des lévites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: tu feras payer cinq pièces d’argent par tête au taux du sicle utilisé au sanctuaire, qui pèse vingt guéras
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire douze grammes. Comme il existait plusieurs systèmes de poids et mesures, il est précisé ici que c’est le système du sanctuaire qui est seul valable pour cette transaction. Le guéra valait environ 0,6 grammes d’argent ; le sicle pesait donc environ 12 grammes. Cette rançon constituera un revenu régulier pour les prêtres (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.16'
        metadata:
          usfm: NUM.18.16
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Tu donneras l’argent à Aaron et à ses fils comme prix du rachat de ceux qui sont en surplus par rapport au nombre des lévites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Moïse reçut l’argent du rachat pour ceux qui étaient en excédent sur le nombre des fils aînés rachetés par les lévites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'il reçut de la part des fils aînés israélites la somme de 1 365 sicles au taux du sicle en vigueur au sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il remit l’argent du rachat à Aaron et à ses fils, selon l’ordre que l’Eternel lui avait donné.
