document_id: NUM.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les prêtres
  - type: text
    content: Voici la liste des descendants d’Aaron et de Moïse à l’époque où l’Eternel s’adressa à Moïse sur le mont Sinaï.
  '10':
  - type: text
    content: Tu veilleras à ce qu’Aaron et ses fils exercent les fonctions sacerdotales ; celui qui ne serait pas de leur famille et qui s’approcherait du tabernacle sera puni de mort.
  '11':
  - type: text
    content: 'L’Eternel parla encore à Moïse en ces termes : '
  '12':
  - type: text
    content: 'Voici : j’ai choisi les lévites du milieu des Israélites à la place de tous les premiers-nés des mères israélites ; ils m’appartiennent donc. '
  '13':
  - type: text
    content: Tout premier-né m’appartient en effet, depuis le jour où j’ai fait mourir tous les premiers-nés des Egyptiens et où je me suis consacré tout premier-né en Israël, tant ceux des hommes que ceux des animaux. Ils sont à moi. Je suis l’Eternel
  - type: note
    content: Voir Ex 13.1-16.
  - type: text
    content: .
  - type: heading
    content: Le recensement, le campement et les fonctions des lévites
  '14':
  - type: text
    content: 'Là-dessus, l’Eternel commanda à Moïse, au désert du Sinaï : '
  '15':
  - type: text
    content: Fais le recensement des descendants de Lévi, selon leurs groupes familiaux et leurs familles ; tu compteras tous les lévites de sexe masculin de l’âge d’un mois et plus
  - type: note
    content: Les lévites ne devaient pas faire de service militaire ; c’est pourquoi ils ne sont pas comptés à partir de vingt ans comme les autres Israélites. Ce recensement sert à déterminer le rapport de leur nombre avec celui des premiers-nés (voir v. 40-51).
  - type: text
    content: .
  '16':
  - type: text
    content: Moïse fit ce recensement sur l’ordre de l’Eternel de la manière qu’il lui avait prescrite.
  '17':
  - type: text
    content: 'Voici les noms des fils de Lévi : Guershôn, Qehath et Merari. '
  '18':
  - type: text
    content: 'Guershôn avait pour fils Libni et Shimeï, qui ont donné leurs noms à leurs familles. '
  '19':
  - type: text
    content: 'Qehath eut pour fils Amram et Yitsehar, Hébron et Ouzziel qui ont donné leur nom à leur famille. '
  '2':
  - type: text
    content: 'Voici les noms des fils d’Aaron : l’aîné s’appelait Nadab, puis vinrent Abihou, Eléazar et Itamar. '
  '20':
  - type: text
    content: Merari eut pour fils Mahli et Moushi qui ont donné leur nom à leur famille. Telles sont les familles des groupes familiaux de Lévi.
  '21':
  - type: text
    content: 'Les descendants de Guershôn comprennent la famille de Libni et celle de Shimeï, qui représentent les familles guershonites. '
  '22':
  - type: text
    content: 'Elles comptaient au moment du recensement 7 500 membres de sexe masculin, âgés d’un mois et plus. '
  '23':
  - type: text
    content: 'Les familles guershonites campaient derrière le tabernacle, du côté ouest. '
  '24':
  - type: text
    content: 'Le chef de leur groupe familial était Eliasaph, fils de Laël. '
  '25':
  - type: text
    content: 'Dans la tente de la Rencontre, ils avaient la responsabilité du tabernacle et de la tenture qui le recouvrait, du rideau de l’entrée de la tente, '
  '26':
  - type: text
    content: des tentures du parvis qui entoure le tabernacle et l’autel, et de sa porte d’entrée ainsi que des cordages. Ils étaient chargés de tous les travaux liés à ces objets.
  '27':
  - type: text
    content: 'De Qehath sont issues les familles des Amramites, des Yitseharites, des Hébronites et des Ouzziélites, qui représentent les familles qehatites. '
  '28':
  - type: text
    content: Elles comptaient 8 600
  - type: note
    content: L’ancienne version grecque porte 8 300, ce qui s’accorde avec le total donné au v. 39.
  - type: text
    content: ' membres de sexe masculin de plus d’un mois. Ils étaient affectés au service du sanctuaire '
  '29':
  - type: text
    content: 'et campaient du côté sud de la Demeure. '
  '3':
  - type: text
    content: 'Ils étaient prêtres ayant reçu l’onction pour être investis de la fonction sacerdotale. '
  '30':
  - type: text
    content: 'Leur chef était Elitsaphân, fils d’Ouzziel. '
  '31':
  - type: text
    content: 'On avait confié à leur responsabilité : le coffre, la table, le chandelier, les autels, les objets sacrés dont on se sert pour officier, et le voile'
  - type: note
    content: Séparant le lieu saint du lieu très saint.
  - type: text
    content: . Ils étaient chargés de tous les travaux liés à ces objets.
  '32':
  - type: text
    content: 'Le chef suprême des lévites était Eléazar, fils du prêtre Aaron. Il supervisait les lévites préposés au service du sanctuaire. '
  '33':
  - type: text
    content: 'De Merari sont issues la famille de Mahli et celle de Moushi. '
  '34':
  - type: text
    content: 'Ils étaient 6 200 de sexe masculin âgés de plus d’un mois. '
  '35':
  - type: text
    content: 'Le chef du groupe familial et des familles de Merari était Tsouriel, fils d’Abihaïl. Ils campaient du côté nord de la Demeure. '
  '36':
  - type: text
    content: 'Les Merarites étaient responsables des planches du tabernacle, de ses traverses, de ses piliers, de leurs socles et de tous les ustensiles, pour accomplir tous les travaux relatifs à ces objets. '
  '37':
  - type: text
    content: Ils avaient aussi la charge des piliers autour du parvis avec leurs socles, leurs piquets et leurs cordages.
  '38':
  - type: text
    content: Moïse, Aaron et ses fils campaient devant le tabernacle, à l’est, devant la tente de la Rencontre. Ils étaient chargés du service du sanctuaire au nom des Israélites. Toute personne profane qui s’en serait approchée comme eux devait être mise à mort.
  '39':
  - type: text
    content: Le nombre total des lévites de sexe masculin d’un mois et plus, recensés par Moïse et Aaron sur l’ordre de l’Eternel et par familles, était de 22 000.
  - type: heading
    content: Le rachat des fils aînés
  '4':
  - type: text
    content: Mais Nadab et Abihou moururent devant l’Eternel, dans le désert du Sinaï, parce qu’ils lui avaient présenté un feu profane ; ils n’avaient pas eu d’enfants. Eléazar et Itamar exercèrent le ministère sacerdotal sous la supervision de leur père Aaron
  - type: note
    content: Voir Lv 10.1-7.
  - type: text
    content: .
  - type: heading
    content: Les lévites, au service des prêtres
  '40':
  - type: text
    content: 'L’Eternel dit à Moïse : Fais à présent le recensement de tous les fils aînés parmi les Israélites depuis l’âge d’un mois et au-dessus, en dressant leur liste nominative. '
  '41':
  - type: text
    content: A leur place, tu m’attribueras les lévites – je suis l’Eternel. Le bétail des lévites m’appartiendra aussi en échange de tous les premiers-nés du bétail des Israélites.
  '42':
  - type: text
    content: 'Moïse fit le recensement de tous les fils aînés des Israélites selon l’ordre que l’Eternel lui avait donné. '
  '43':
  - type: text
    content: Le total des fils aînés âgés d’au moins un mois et dont il enregistra les noms était de 22 273.
  '44':
  - type: text
    content: 'L’Eternel parla à Moïse et dit : '
  '45':
  - type: text
    content: 'Attribue-moi les lévites en échange de tous les fils aînés des Israélites, et le bétail des lévites à la place du leur, ainsi les lévites seront à moi. Je suis l’Eternel. '
  '46':
  - type: text
    content: 'Pour le rachat des 273 fils aînés en surplus par rapport au nombre des lévites, '
  '47':
  - type: text
    content: tu feras payer cinq pièces d’argent par tête au taux du sicle utilisé au sanctuaire, qui pèse vingt guéras
  - type: note
    content: C’est-à-dire douze grammes. Comme il existait plusieurs systèmes de poids et mesures, il est précisé ici que c’est le système du sanctuaire qui est seul valable pour cette transaction. Le guéra valait environ 0,6 grammes d’argent ; le sicle pesait donc environ 12 grammes. Cette rançon constituera un revenu régulier pour les prêtres (voir 18.16).
  - type: text
    content: '. '
  '48':
  - type: text
    content: Tu donneras l’argent à Aaron et à ses fils comme prix du rachat de ceux qui sont en surplus par rapport au nombre des lévites.
  '49':
  - type: text
    content: 'Moïse reçut l’argent du rachat pour ceux qui étaient en excédent sur le nombre des fils aînés rachetés par les lévites ; '
  '5':
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '50':
  - type: text
    content: 'il reçut de la part des fils aînés israélites la somme de 1 365 sicles au taux du sicle en vigueur au sanctuaire. '
  '51':
  - type: text
    content: Il remit l’argent du rachat à Aaron et à ses fils, selon l’ordre que l’Eternel lui avait donné.
  '6':
  - type: text
    content: Fais venir la tribu de Lévi et mets ses membres à la disposition du prêtre Aaron pour qu’ils l’assistent
  - type: note
    content: Les lévites sont clairement distingués des prêtres, descendants d’Aaron (qui forment une branche des lévites). Ils seront les assistants, les aides des prêtres, mais n’accompliront pas toutes leurs fonctions.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ils seront à son service et au service de toute la communauté devant la tente de la Rencontre, pour accomplir les tâches relatives au tabernacle. '
  '8':
  - type: text
    content: 'Ils prendront soin de tous les ustensiles de la tente de la Rencontre et seront au service des Israélites pour accomplir les tâches relatives au tabernacle. '
  '9':
  - type: text
    content: Donc, tu mettras les lévites à la disposition d’Aaron et de ses fils ; ils lui
  - type: note
    content: 'Certains manuscrits du texte hébreu traditionnel, le Pentateuque samaritain et l’ancienne version grecque ont : me.'
  - type: text
    content: ' seront attribués comme représentants des Israélites. '
