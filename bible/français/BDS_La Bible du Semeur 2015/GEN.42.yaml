document_id: GEN.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les frères de Joseph se rendent en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand Jacob apprit que l’on vendait du blé en Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’Egypte était mieux protégée contre la sécheresse à cause des crues du Nil et du système d’irrigation par canaux.
    marker-yv: yv-n
  - type: text
    text: ', il dit à ses fils : Pourquoi restez-vous là à vous regarder les uns les autres ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’ai appris qu’il y a du blé en Egypte. Allez-y donc et rapportez-nous en du grain pour que nous puissions survivre et que nous ne mourions pas de faim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.12
        metadata:
          usfm: ACT.7.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les frères de Joseph partirent donc à dix pour acheter du blé en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quant à Benjamin, le frère de Joseph, Jacob ne l’avait pas laissé partir avec eux, car il se disait : Qu’il ne lui arrive pas de malheur !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les fils d’Israël arrivèrent en Egypte au milieu des autres gens qui s’y rendaient, car la famine sévissait au pays de Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joseph gouvernait tout le pays. C’était lui qui supervisait la vente du blé à toute la population du pays. Les frères de Joseph arrivèrent donc et se prosternèrent devant lui, face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Joseph aperçut ses frères et les reconnut ; mais il se comporta vis-à-vis d’eux comme un inconnu et leur parla durement. Il leur demanda : D’où venez-vous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Du pays de Canaan, répondirent-ils, pour acheter de quoi manger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Joseph reconnaissait bien ses frères, mais eux ne le reconnaissaient pas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors il se souvint des rêves qu’il avait eus à leur sujet.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Vous êtes des espions, déclara-t-il, c’est pour repérer les points faibles du pays que vous êtes venus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– Non, mon seigneur, protestèrent-ils, tes serviteurs sont seulement venus pour acheter des vivres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous sommes tous fils d’un même père, nous sommes des gens honnêtes, nous ne sommes pas des espions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – Pas du tout, répliqua-t-il, vous êtes venus pour repérer les points faibles du pays !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: – Mais, dirent-ils, nous, tes serviteurs, nous sommes douze frères, fils d’un même père, habitants du pays de Canaan. Le plus jeune est resté avec notre père, et il y en a un qui n’est plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais Joseph leur dit : C’est bien ce que je dis : vous êtes des espions. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici comment je mettrai votre sincérité à l’épreuve : Par la vie du pharaon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Formule égyptienne de serment.
    marker-yv: yv-n
  - type: text
    text: ', je vous jure que vous ne vous en sortirez pas, à moins que votre jeune frère vienne ici ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Envoyez l’un de vous le chercher, tandis que vous, vous resterez en prison jusqu’à ce que la vérité de vos paroles soit confirmée. Sinon, par la vie du pharaon, c’est que vous êtes des espions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il les fit mettre tous ensemble pour trois jours en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le troisième jour, Joseph leur dit : Faites ce que je vous dis et vous aurez la vie sauve ; je suis un homme qui craint Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous êtes des gens sincères, que l’un de vous, votre frère, reste ici en prison, quant aux autres, vous partirez, vous emporterez du blé pour vos familles qui connaissent la famine. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais ramenez-moi votre jeune frère. Cela prouvera que vous avez dit vrai et vous ne mourrez pas.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils acceptèrent de faire ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils se dirent l’un à l’autre : Certainement, nous sommes punis à cause de ce que nous avons fait à notre frère ; car nous avons vu sa détresse quand il nous suppliait, et nous ne l’avons pas écouté. Voilà pourquoi nous nous trouvons nous-mêmes à présent dans cette détresse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ruben leur rappela : Ne vous avais-je pas dit : Ne vous rendez pas coupables d’un tel péché envers cet enfant ! Mais vous ne m’avez pas écouté. Voilà pourquoi nous devons maintenant payer pour sa mort'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37.21-22
        metadata:
          usfm: GEN.37.21+GEN.37.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils ne savaient pas que Joseph les comprenait, car il se servait d’un interprète pour communiquer avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joseph s’éloigna pour pleurer. Puis il revint vers eux et s’entretint encore avec eux. Il leur prit Siméon et le fit lier sous leurs yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis il ordonna qu’on remplisse leurs sacs de blé, qu’on remette l’argent de chacun dans son sac et qu’on leur donne des provisions pour la route. Ce qui fut fait. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils chargèrent leur blé sur leurs ânes et s’en allèrent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le retour au pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Arrivés à l’endroit où ils passèrent la nuit, l’un d’eux ouvrit son sac pour donner du fourrage à son âne et il trouva son argent à l’ouverture de son sac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: – On m’a rendu mon argent, dit-il à ses frères, le voici dans mon sac !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors leur cœur vacilla et, saisis de panique, ils se dirent les uns aux autres : Qu’est-ce que Dieu nous a fait ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsqu’ils furent de retour chez leur père Jacob au pays de Canaan, ils lui racontèrent tout ce qui leur était arrivé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '– L’homme qui est le maître du pays nous a parlé durement, dirent-ils. Il nous a pris pour des espions. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nous avons protesté : « Non, nous sommes d’honnêtes gens, nous n’avons jamais été des espions. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nous étions douze frères, fils d’un même père ; l’un d’eux n’est plus et le plus jeune est resté avec notre père au pays de Canaan. » '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors l’homme qui est le maître du pays nous a répondu : « Voici comment je saurai que vous êtes d’honnêtes gens : Laissez-moi l’un de vos frères, prenez ce qu’il vous faut pour les besoins de vos familles et partez ! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ramenez-moi votre jeune frère pour que je sache que vous n’êtes pas des espions mais des gens honnêtes. Alors je vous rendrai votre frère et vous pourrez circuler librement dans le pays. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lorsqu’ils vidèrent leurs sacs, chacun d’eux trouva la bourse avec son argent dans son sac. Eux et leur père virent les bourses avec leur argent et tous furent saisis de crainte. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jacob leur dit : Vous me privez de mes enfants : Joseph n’est plus ; Siméon a disparu et vous voulez encore me prendre Benjamin ! C’est sur moi que tout cela retombe !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ruben dit à son père : Confie-le-moi et je te le ramènerai. Si je ne te le ramène pas, tu feras mourir mes deux fils !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mais Jacob répliqua : Non, mon fils ne partira pas avec vous, car son frère est mort et c’est le seul qui me reste. S’il lui arrivait malheur au cours de votre voyage, vous me feriez mourir de douleur à mon grand âge.'
