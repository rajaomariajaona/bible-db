document_id: GEN.42,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les frères de Joseph se rendent en Egypte
  - type: text
    content: Quand Jacob apprit que l’on vendait du blé en Egypte
  - type: note
    content: L’Egypte était mieux protégée contre la sécheresse à cause des crues du Nil et du système d’irrigation par canaux.
  - type: text
    content: ', il dit à ses fils : Pourquoi restez-vous là à vous regarder les uns les autres ? '
  '10':
  - type: text
    content: '– Non, mon seigneur, protestèrent-ils, tes serviteurs sont seulement venus pour acheter des vivres. '
  '11':
  - type: text
    content: Nous sommes tous fils d’un même père, nous sommes des gens honnêtes, nous ne sommes pas des espions.
  '12':
  - type: text
    content: – Pas du tout, répliqua-t-il, vous êtes venus pour repérer les points faibles du pays !
  '13':
  - type: text
    content: – Mais, dirent-ils, nous, tes serviteurs, nous sommes douze frères, fils d’un même père, habitants du pays de Canaan. Le plus jeune est resté avec notre père, et il y en a un qui n’est plus.
  '14':
  - type: text
    content: 'Mais Joseph leur dit : C’est bien ce que je dis : vous êtes des espions. '
  '15':
  - type: text
    content: 'Voici comment je mettrai votre sincérité à l’épreuve : Par la vie du pharaon'
  - type: note
    content: Formule égyptienne de serment.
  - type: text
    content: ', je vous jure que vous ne vous en sortirez pas, à moins que votre jeune frère vienne ici ! '
  '16':
  - type: text
    content: Envoyez l’un de vous le chercher, tandis que vous, vous resterez en prison jusqu’à ce que la vérité de vos paroles soit confirmée. Sinon, par la vie du pharaon, c’est que vous êtes des espions.
  '17':
  - type: text
    content: 'Puis il les fit mettre tous ensemble pour trois jours en prison. '
  '18':
  - type: text
    content: 'Le troisième jour, Joseph leur dit : Faites ce que je vous dis et vous aurez la vie sauve ; je suis un homme qui craint Dieu. '
  '19':
  - type: text
    content: 'Si vous êtes des gens sincères, que l’un de vous, votre frère, reste ici en prison, quant aux autres, vous partirez, vous emporterez du blé pour vos familles qui connaissent la famine. '
  '2':
  - type: text
    content: J’ai appris qu’il y a du blé en Egypte. Allez-y donc et rapportez-nous en du grain pour que nous puissions survivre et que nous ne mourions pas de faim
  - type: note
    content: Voir Ac 7.12.
  - type: text
    content: '  !'
  '20':
  - type: text
    content: Mais ramenez-moi votre jeune frère. Cela prouvera que vous avez dit vrai et vous ne mourrez pas.
  - type: text
    content: 'Ils acceptèrent de faire ainsi. '
  '21':
  - type: text
    content: 'Ils se dirent l’un à l’autre : Certainement, nous sommes punis à cause de ce que nous avons fait à notre frère ; car nous avons vu sa détresse quand il nous suppliait, et nous ne l’avons pas écouté. Voilà pourquoi nous nous trouvons nous-mêmes à présent dans cette détresse.'
  '22':
  - type: text
    content: 'Ruben leur rappela : Ne vous avais-je pas dit : Ne vous rendez pas coupables d’un tel péché envers cet enfant ! Mais vous ne m’avez pas écouté. Voilà pourquoi nous devons maintenant payer pour sa mort'
  - type: note
    content: Voir 37.21-22.
  - type: text
    content: .
  '23':
  - type: text
    content: Ils ne savaient pas que Joseph les comprenait, car il se servait d’un interprète pour communiquer avec eux.
  '24':
  - type: text
    content: 'Joseph s’éloigna pour pleurer. Puis il revint vers eux et s’entretint encore avec eux. Il leur prit Siméon et le fit lier sous leurs yeux. '
  '25':
  - type: text
    content: 'Puis il ordonna qu’on remplisse leurs sacs de blé, qu’on remette l’argent de chacun dans son sac et qu’on leur donne des provisions pour la route. Ce qui fut fait. '
  '26':
  - type: text
    content: Ils chargèrent leur blé sur leurs ânes et s’en allèrent.
  - type: heading
    content: Le retour au pays de Canaan
  '27':
  - type: text
    content: Arrivés à l’endroit où ils passèrent la nuit, l’un d’eux ouvrit son sac pour donner du fourrage à son âne et il trouva son argent à l’ouverture de son sac.
  '28':
  - type: text
    content: – On m’a rendu mon argent, dit-il à ses frères, le voici dans mon sac !
  - type: text
    content: 'Alors leur cœur vacilla et, saisis de panique, ils se dirent les uns aux autres : Qu’est-ce que Dieu nous a fait ?'
  '29':
  - type: text
    content: Lorsqu’ils furent de retour chez leur père Jacob au pays de Canaan, ils lui racontèrent tout ce qui leur était arrivé.
  '3':
  - type: text
    content: 'Les frères de Joseph partirent donc à dix pour acheter du blé en Egypte. '
  '30':
  - type: text
    content: '– L’homme qui est le maître du pays nous a parlé durement, dirent-ils. Il nous a pris pour des espions. '
  '31':
  - type: text
    content: 'Nous avons protesté : « Non, nous sommes d’honnêtes gens, nous n’avons jamais été des espions. '
  '32':
  - type: text
    content: 'Nous étions douze frères, fils d’un même père ; l’un d’eux n’est plus et le plus jeune est resté avec notre père au pays de Canaan. » '
  '33':
  - type: text
    content: 'Alors l’homme qui est le maître du pays nous a répondu : « Voici comment je saurai que vous êtes d’honnêtes gens : Laissez-moi l’un de vos frères, prenez ce qu’il vous faut pour les besoins de vos familles et partez ! '
  '34':
  - type: text
    content: Ramenez-moi votre jeune frère pour que je sache que vous n’êtes pas des espions mais des gens honnêtes. Alors je vous rendrai votre frère et vous pourrez circuler librement dans le pays. »
  '35':
  - type: text
    content: 'Lorsqu’ils vidèrent leurs sacs, chacun d’eux trouva la bourse avec son argent dans son sac. Eux et leur père virent les bourses avec leur argent et tous furent saisis de crainte. '
  '36':
  - type: text
    content: 'Jacob leur dit : Vous me privez de mes enfants : Joseph n’est plus ; Siméon a disparu et vous voulez encore me prendre Benjamin ! C’est sur moi que tout cela retombe !'
  '37':
  - type: text
    content: 'Ruben dit à son père : Confie-le-moi et je te le ramènerai. Si je ne te le ramène pas, tu feras mourir mes deux fils !'
  '38':
  - type: text
    content: 'Mais Jacob répliqua : Non, mon fils ne partira pas avec vous, car son frère est mort et c’est le seul qui me reste. S’il lui arrivait malheur au cours de votre voyage, vous me feriez mourir de douleur à mon grand âge.'
  '4':
  - type: text
    content: 'Quant à Benjamin, le frère de Joseph, Jacob ne l’avait pas laissé partir avec eux, car il se disait : Qu’il ne lui arrive pas de malheur !'
  '5':
  - type: text
    content: Les fils d’Israël arrivèrent en Egypte au milieu des autres gens qui s’y rendaient, car la famine sévissait au pays de Canaan.
  '6':
  - type: text
    content: 'Joseph gouvernait tout le pays. C’était lui qui supervisait la vente du blé à toute la population du pays. Les frères de Joseph arrivèrent donc et se prosternèrent devant lui, face contre terre. '
  '7':
  - type: text
    content: 'Joseph aperçut ses frères et les reconnut ; mais il se comporta vis-à-vis d’eux comme un inconnu et leur parla durement. Il leur demanda : D’où venez-vous ?'
  - type: text
    content: – Du pays de Canaan, répondirent-ils, pour acheter de quoi manger.
  '8':
  - type: text
    content: 'Joseph reconnaissait bien ses frères, mais eux ne le reconnaissaient pas. '
  '9':
  - type: text
    content: Alors il se souvint des rêves qu’il avait eus à leur sujet.
  - type: text
    content: – Vous êtes des espions, déclara-t-il, c’est pour repérer les points faibles du pays que vous êtes venus.
