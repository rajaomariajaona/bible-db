document_id: LUK.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant Pilate et Hérode
  - type: heading
    content: (Mt 27.2, 11-14 ; Mc 15.1-5 ; Jn 18.28-38)
  - type: text
    content: 'Toute l’assemblée se leva et l’emmena devant Pilate. '
  '10':
  - type: text
    content: 'Pendant ce temps, les chefs des prêtres et les spécialistes de la Loi se tenaient là debout, lançant, avec passion, de graves accusations contre lui. '
  '11':
  - type: text
    content: 'Alors Hérode le traita avec mépris, ses soldats en firent autant, et ils se moquèrent de lui, en le revêtant d’un manteau magnifique. Hérode le fit reconduire ainsi chez Pilate. '
  '12':
  - type: text
    content: Hérode et Pilate, qui jusqu’alors avaient été ennemis, devinrent amis ce jour-là.
  - type: heading
    content: Jésus condamné à mort
  - type: heading
    content: (Mt 27.15-26 ; Mc 15.6-15 ; Jn 18.39-40 ; 19.4-16)
  '13':
  - type: text
    content: 'Pilate convoqua les chefs des prêtres, les dirigeants et le peuple. Il leur dit : '
  '14':
  - type: text
    content: 'Vous m’avez amené cet homme en l’accusant d’égarer le peuple. Or, je l’ai interrogé moi-même devant vous, et je ne l’ai trouvé coupable d’aucun des crimes dont vous l’accusez. '
  '15':
  - type: text
    content: 'Hérode non plus, d’ailleurs, puisqu’il nous l’a renvoyé. Cet homme n’a rien fait qui mérite la mort. '
  '16':
  - type: text
    content: Je vais donc lui faire donner le fouet et le relâcher.
  - type: text
    content: '['
  '17':
  - type: text
    content: A chaque fête, Pilate devait leur accorder la libération d’un prisonnier
  - type: note
    content: Ce verset est absent de plusieurs manuscrits. Voir Mt 27.15 ; Mc 15.6.
  - type: text
    content: .]
  '18':
  - type: text
    content: 'Mais la foule entière se mit à crier : A mort ! Relâche Barabbas !'
  '19':
  - type: text
    content: Ce Barabbas avait été mis en prison pour une émeute qui avait eu lieu dans la ville et pour un meurtre.
  '2':
  - type: text
    content: 'Là, ils se mirent à l’accuser : Nous avons trouvé cet homme en train de jeter le trouble parmi notre peuple : il interdit de payer l’impôt à l’empereur et il déclare qu’il est le Messie, le roi !'
  '20':
  - type: text
    content: 'Mais Pilate, qui désirait relâcher Jésus, adressa de nouveau la parole à la foule, '
  '21':
  - type: text
    content: 'qui se mit à crier : Crucifie-le ! Crucifie-le !'
  '22':
  - type: text
    content: – Mais enfin, leur demanda-t-il pour la troisième fois, qu’a-t-il fait de mal ? Je n’ai trouvé en lui aucune raison de le condamner à mort. Je vais donc lui faire donner le fouet puis le remettre en liberté.
  '23':
  - type: text
    content: Mais ils devinrent de plus en plus pressants et exigèrent à grands cris sa crucifixion. Finalement, leurs cris l’emportèrent.
  '24':
  - type: text
    content: 'Pilate décida alors de satisfaire à leur demande. '
  '25':
  - type: text
    content: Il relâcha donc celui qu’ils réclamaient, celui qui avait été emprisonné pour une émeute et pour un meurtre, et leur livra Jésus pour qu’ils fassent de lui ce qu’ils voulaient.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: (Mt 27.32-44 ; Mc 15.21-32 ; Jn 19.17-22)
  '26':
  - type: text
    content: Pendant qu’ils l’emmenaient, ils se saisirent d’un certain Simon de Cyrène
  - type: note
    content: Capitale de la Cyrénaïque située en Afrique du Nord.
  - type: text
    content: ', qui revenait des champs, et l’obligèrent à porter la croix derrière Jésus. '
  '27':
  - type: text
    content: 'Une foule de gens du peuple le suivait. Il y avait aussi beaucoup de femmes en larmes, qui se lamentaient à cause de lui. '
  '28':
  - type: text
    content: 'Se tournant vers elles, il leur dit : '
  - type: text
    content: 'Femmes de '
  - type: text
    content: Jérusalem
  - type: text
    content: ', ne pleurez pas à cause de moi ! Pleurez plutôt à cause de vous-mêmes et de vos enfants'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'car, sachez-le, des jours viennent où l’on dira : « Heureuses les femmes qui ne peuvent pas avoir d’enfant et celles qui n’en ont jamais eu et qui n’ont jamais allaité. »'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Alors Pilate l’interrogea : Es-tu le roi des Juifs ? lui demanda-t-il.'
  - type: text
    content: – Tu le dis toi-même,
  - type: text
    content: ' lui répondit Jésus.'
  '30':
  - type: text
    content: 'Alors on se mettra à dire '
  - type: text
    content: 'aux montagnes : « Tombez sur nous ! » et aux collines : « Recouvrez-nous'
  - type: note
    content: Os 10.8.
  - type: text
    content: '! »'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Car si l’on traite ainsi le bois vert, qu’adviendra-t-il du bois mort ?
  '32':
  - type: text
    content: Avec Jésus, on emmena aussi deux autres hommes, des bandits qui devaient être exécutés en même temps que lui.
  '33':
  - type: text
    content: Lorsqu’ils furent arrivés au lieu appelé « le Crâne », on cloua Jésus sur la croix, ainsi que les deux bandits, l’un à sa droite, l’autre à sa gauche.
  '34':
  - type: text
    content: 'Jésus pria : '
  - type: text
    content: Père, pardonne-leur, car ils ne savent pas ce qu’ils font
  - type: note
    content: Ces paroles de Jésus sont absentes de certains manuscrits.
  - type: text
    content: .
  - type: text
    content: 'Les soldats se partagèrent ses vêtements en les tirant au sort. '
  '35':
  - type: text
    content: 'La foule se tenait tout autour et regardait. Quant aux chefs du peuple, ils ricanaient en disant : Lui qui a sauvé les autres, qu’il se sauve donc lui-même, s’il est le Messie, l’Elu de Dieu !'
  '36':
  - type: text
    content: 'Les soldats aussi se moquaient de lui. Ils s’approchaient et lui présentaient du vinaigre '
  '37':
  - type: text
    content: 'en lui disant : Si tu es le roi des Juifs, sauve-toi toi-même !'
  '38':
  - type: text
    content: 'Au-dessus de sa tête, il y avait un écriteau portant ces mots : « Celui-ci est le roi des Juifs ».'
  '39':
  - type: text
    content: 'L’un des deux criminels attaché à une croix l’insultait en disant : N’es-tu pas le Messie ? Alors sauve-toi toi-même, et nous avec !'
  '4':
  - type: text
    content: 'Pilate dit alors aux chefs des prêtres et aux gens rassemblés : Je ne trouve chez cet homme aucune raison de le condamner.'
  '40':
  - type: text
    content: 'Mais l’autre lui fit des reproches en disant : Tu n’as donc aucune crainte de Dieu, toi, et pourtant tu subis la même peine ? '
  '41':
  - type: text
    content: 'Pour nous, ce n’est que justice : nous payons pour ce que nous avons fait ; mais celui-là n’a rien fait de mal.'
  '42':
  - type: text
    content: 'Puis il ajouta : Jésus, souviens-toi de moi quand tu viendras régner.'
  '43':
  - type: text
    content: 'Et Jésus lui répondit : '
  - type: text
    content: 'Vraiment, je te l’assure : aujourd’hui même, tu seras avec moi dans le paradis.'
  - type: heading
    content: (Mt 27.45-56 ; Mc 15.33-41 ; Jn 19.25-30)
  '44':
  - type: text
    content: 'Il était environ midi, quand le pays tout entier fut plongé dans l’obscurité, et cela dura jusqu’à trois heures de l’après-midi. '
  '45':
  - type: text
    content: Le soleil resta entièrement caché
  - type: note
    content: 'Certains manuscrits ont : le soleil s’obscurcit.'
  - type: text
    content: '. Le grand rideau du Temple se déchira par le milieu. '
  '46':
  - type: text
    content: 'Alors Jésus poussa un grand cri : '
  - type: text
    content: Père, je remets mon esprit entre tes mains
  - type: note
    content: Ps 31.6.
  - type: text
    content: .
  - type: text
    content: Après avoir dit ces mots il mourut.
  '47':
  - type: text
    content: 'En voyant ce qui s’était passé, l’officier romain rendit gloire à Dieu en disant : Aucun doute, cet homme était juste.'
  '48':
  - type: text
    content: 'Après avoir vu ce qui était arrivé, tout le peuple, venu en foule pour assister à ces exécutions, s’en retourna en se frappant la poitrine. '
  '49':
  - type: text
    content: Tous les amis de Jésus, ainsi que les femmes qui l’avaient suivi depuis la Galilée, se tenaient à distance pour voir ce qui se passait.
  - type: heading
    content: Jésus mis au tombeau
  - type: heading
    content: (Mt 27.57-61 ; Mc 15.42-47 ; Jn 19.38-42)
  '5':
  - type: text
    content: 'Mais ils insistaient de plus en plus, disant : Il soulève le peuple avec ses idées ! Il a endoctriné toute la Judée ! Il a commencé en Galilée et il est venu jusqu’ici.'
  '50':
  - type: text
    content: 'Il y avait un homme, appelé Joseph, un membre du Grand-Conseil des Juifs. C’était un homme bon et droit '
  '51':
  - type: text
    content: qui n’avait pas approuvé la décision ni les actes des autres membres du Grand-Conseil. Il venait d’Arimathée
  - type: note
    content: Village situé à environ 35 kilomètres au nord-ouest de Jérusalem.
  - type: text
    content: ', en Judée, et attendait le royaume de Dieu. '
  '52':
  - type: text
    content: 'Il alla demander à Pilate le corps de Jésus. '
  '53':
  - type: text
    content: 'Après l’avoir descendu de la croix, il l’enroula dans un drap de lin et le déposa dans un tombeau taillé en plein rocher, où personne n’avait encore été enseveli. '
  '54':
  - type: text
    content: 'C’était le soir de la préparation, avant le début du sabbat. '
  '55':
  - type: text
    content: 'Les femmes qui avaient accompagné Jésus depuis la Galilée suivirent Joseph, elles regardèrent le tombeau et observèrent comment le corps de Jésus y avait été déposé. '
  '56':
  - type: text
    content: Ensuite, elles retournèrent chez elles et préparèrent des huiles aromatiques et des parfums
  - type: note
    content: En Israël, on embaumait les morts avec de l’huile aromatique et des parfums.
  - type: text
    content: . Puis elles observèrent le repos du sabbat, comme la Loi le prescrit.
  '6':
  - type: text
    content: 'Quand Pilate entendit parler de la Galilée, il demanda si cet homme était galiléen. '
  '7':
  - type: text
    content: Apprenant qu’il relevait bien de la juridiction d’Hérode, il l’envoya à ce dernier qui, justement, se trouvait lui aussi à Jérusalem durant ces jours-là.
  '8':
  - type: text
    content: 'Hérode fut ravi de voir Jésus car, depuis longtemps, il désirait faire sa connaissance, parce qu’il avait entendu parler de lui, et il espérait lui voir faire quelque signe miraculeux. '
  '9':
  - type: text
    content: Il lui posa de nombreuses questions, mais Jésus ne lui répondit pas un mot.
