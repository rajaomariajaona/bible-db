  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Pour son roi, l’Eternel opère ╵de grandes délivrances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il traite avec bonté ╵l’homme qui de sa part ╵a reçu l’onction d’huile sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: David et sa postérité, ╵pour toute éternité.
