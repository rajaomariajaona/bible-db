document_id: PSA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Merci pour ta délivrance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22.1-51
        metadata:
          usfm: 2SA.22.1+2SA.22.2+2SA.22.3+2SA.22.4+2SA.22.5+2SA.22.6+2SA.22.7+2SA.22.8+2SA.22.9+2SA.22.10+2SA.22.11+2SA.22.12+2SA.22.13+2SA.22.14+2SA.22.15+2SA.22.16+2SA.22.17+2SA.22.18+2SA.22.19+2SA.22.20+2SA.22.21+2SA.22.22+2SA.22.23+2SA.22.24+2SA.22.25+2SA.22.26+2SA.22.27+2SA.22.28+2SA.22.29+2SA.22.30+2SA.22.31+2SA.22.32+2SA.22.33+2SA.22.34+2SA.22.35+2SA.22.36+2SA.22.37+2SA.22.38+2SA.22.39+2SA.22.40+2SA.22.41+2SA.22.42+2SA.22.43+2SA.22.44+2SA.22.45+2SA.22.46+2SA.22.47+2SA.22.48+2SA.22.49+2SA.22.50+2SA.22.51
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur, de David, serviteur de l’Eternel. Il adressa à l’Eternel les paroles de ce cantique lorsque l’Eternel l’eut délivré de tous ses ennemis, et en particulier de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’aime, ô Eternel, ma force !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eternel est ma forteresse, ╵mon rocher, mon libérateur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon Dieu, le roc solide ╵où je me réfugie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon Sauveur tout-puissant, ╵mon rempart et mon bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Loué soit l’Eternel : ╵quand je l’ai appelé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai été délivré ╵de tous mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La mort m’enserrait de ses liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme un torrent destructeur, ╵me terrifiait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, le séjour des morts ╵m’entourait de ses liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le piège de la mort ╵se refermait sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors, dans ma détresse, ╵j’invoquai l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers mon Dieu, je lançai ╵mon appel au secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cri parvint à ses oreilles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de son temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit du sanctuaire céleste où Dieu réside.
    marker-yv: yv-n
  - type: text
    text: ', il m’entendit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La terre s’ébranla ╵et elle chancela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements de ses montagnes ╵se mirent à frémir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout secoués par sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: De ses narines s’élevait ╵de la fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de sa bouche ╵surgissait un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des charbons embrasés ╵en jaillissaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il inclina le ciel ╵et descendit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un sombre nuage à ses pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il chevauchait un chérubin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Etres célestes, réels ou symboliques (80.2 ; 99.1 ; Gn 3.24 ; Ex 25.18). En Ez 1 ; 9 ; 10, les chérubins figurent comme les coursiers du char de l’Eternel, porteurs du trône divin. Ici, le chérubin apparaît comme sa monture.
    marker-yv: yv-n
  - type: text
    text: ' ╵et il volait,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vent le portait sur ses ailes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il s’enveloppait de ténèbres ╵pour se cacher dans leurs replis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des nuages opaques ╵et l’obscurité de l’orage ╵formaient sa tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De l’éclat brillant devant lui ╵jaillissaient des nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la grêle et des braises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Eternel tonna dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu très-haut ╵fit retentir sa voix
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il lança de la grêle et des braises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et soudain, il tira ses flèches ╵pour disperser mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lança de nombreux éclairs ╵pour les mettre en déroute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A ta menace, ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au souffle tempétueux ╵de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fond des mers parut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements du monde ╵se trouvèrent à nu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Du haut du ciel, ╵il étend sa main pour me prendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: me retirer des grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il me délivre ╵d’un ennemi puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de gens qui me haïssent ╵et sont plus forts que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils m’affrontaient ╵au jour de mon désastre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel ╵a été mon appui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il m’a retiré du danger, ╵l’a éloigné de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’en a délivré, ╵à cause de son affection pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’Eternel a agi ╵en tenant compte ╵de ma conduite juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme mes mains sont pures, ╵il m’a récompensé ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car j’ai suivi ╵les voies qu’il a prescrites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’abandonne pas mon Dieu ╵pour m’adonner au mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: J’ai toujours ses lois sous les yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne fait fi ╵d’aucun de ses commandements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Envers lui, je suis sans reproche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis gardé du péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel m’a récompensé ╵d’avoir agi avec droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’avoir gardé les mains pures sous ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avec ceux qui sont bienveillants, ╵toi, tu te montres bienveillant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec qui est irréprochable, ╵tu es irréprochable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et avec celui qui est pur, ╵tu es toi-même pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec celui qui agit ╵de manière tordue, ╵tu empruntes des chemins détournés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toi, tu sauves un peuple affligé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais baisser les yeux ╵aux orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tu fais briller ma lampe ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, mon Dieu, ╵tu illumines mes ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Avec toi, je me précipite ╵sur une troupe bien armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec mon Dieu, ╵je franchis des murailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Parfaites sont les voies ╵que Dieu prescrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la parole de l’Eternel ╵est éprouvée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui le prennent pour refuge ╵trouvent en lui un bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Qui est Dieu, sinon l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est un roc ? C’est notre Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: C’est Dieu qui m’arme de vaillance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me trace un chemin parfait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Grâce à lui, je cours comme une gazelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me fait prendre position ╵sur les hauteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: C’est lui qui m’entraîne au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me fait tendre l’arc de bronze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signe d’une force extraordinaire.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ta délivrance ╵me sert de bouclier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ta main droite, ╵tu me soutiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta sollicitude me grandit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu m’amènes à marcher ╵sur un chemin bien large,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes jambes ne fléchissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je poursuis tous mes ennemis, ╵je les rattrape
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne reviens pas ╵sans les avoir exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Je frappe : aucun ne peut se relever,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tombent sous mes pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tu me rends fort pour le combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu fais plier mes agresseurs : ╵les voilà à mes pieds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Tu mets mes ennemis en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui me haïssent, ╵je les anéantis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils ont beau crier au secours, ╵personne ne vient à leur aide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’ils appellent l’Eternel, ╵celui-ci ne leur répond pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Je les broie comme une poussière ╵qu’emporterait le vent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les balaie ╵comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: En face d’un peuple en révolte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être une allusion aux tribus nord-israélites, qui, durant sept ans, ont été en guerre contre David avant de le reconnaître comme roi de tout Israël (2 S 2 à 5), ou bien aux peuples non israélites assujettis par David (2 S 5 ; 8 ; 10).
    marker-yv: yv-n
  - type: text
    text: ', ╵tu me fais triompher.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’établis chef d’autres peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un peuple qu’autrefois ╵je ne connaissais pas ╵m’est maintenant soumis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Au premier mot, ils m’obéissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des étrangers me courtisent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Les étrangers perdent courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tremblants, ils quittent leurs bastions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Dieu est vivant ! Qu’il soit béni, ╵lui qui est mon rocher !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’on proclame la grandeur ╵de ce Dieu qui est mon Sauveur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Ce Dieu m’accorde ma revanche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me soumet des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Il me délivre de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu me fais triompher d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me délivres ╵des hommes violents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Aussi je publie tes louanges, ╵parmi les peuples ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te célèbre par mes chants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
