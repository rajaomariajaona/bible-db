document_id: PSA.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel entre dans son sanctuaire
  - type: text
    content: Psaume de David.
  - type: text
    content: La terre et ses richesses ╵appartiennent à l’Eternel.
  - type: text
    content: L’univers est à lui ╵avec ceux qui l’habitent
  - type: note
    content: Cité en 1 Co 10.26.
  - type: text
    content: .
  '10':
  - type: text
    content: Qui est ce Roi glorieux ?
  - type: text
    content: Le Seigneur des armées célestes,
  - type: text
    content: c’est lui le Roi glorieux.
  - type: text
    content: Pause
  '2':
  - type: text
    content: C’est lui qui a fondé ╵la terre sur les mers,
  - type: text
    content: qui l’a établie fermement ╵au-dessus des cours d’eau.
  '3':
  - type: text
    content: Qui pourra accéder ╵au mont de l’Eternel ?
  - type: text
    content: Qui pourra se tenir ╵dans sa demeure sainte ?
  '4':
  - type: text
    content: L’innocent aux mains nettes ╵et qui a le cœur pur,
  - type: text
    content: qui ne se tourne pas ╵vers le mensonge
  - type: note
    content: 'Autre traduction : qui ne se tourne pas vers les faux dieux.'
  - type: text
    content: ','
  - type: text
    content: et qui ne jure pas ╵pour tromper son prochain.
  '5':
  - type: text
    content: Celui qui vit ainsi ╵sera béni par l’Eternel,
  - type: text
    content: il obtiendra justice ╵de son Dieu qui le sauve.
  '6':
  - type: text
    content: O Eternel, tel est le peuple ╵qui se tourne vers toi
  - type: text
    content: et qui s’attache à toi, ╵Dieu de Jacob
  - type: note
    content: 'D’après deux manuscrits hébreux, l’ancienne version grecque et la version syriaque. Au lieu de Dieu de Jacob, les autres manuscrits hébreux ont uniquement : Jacob.'
  - type: text
    content: .
  - type: text
    content: Pause
  '7':
  - type: text
    content: Relevez vos frontons, ╵ô portes
  - type: note
    content: Les portes de Sion sont personnifiées et exhortées à élever leurs frontons pour accueillir le coffre de l’alliance, symbole de la présence du Roi des rois.
  - type: text
    content: ', haussez-vous, ╵vous, portes éternelles,'
  - type: text
    content: pour que le Roi glorieux ╵y fasse son entrée !
  '8':
  - type: text
    content: Qui est ce Roi glorieux ?
  - type: text
    content: C’est l’Eternel, ╵le Fort et le Vaillant,
  - type: text
    content: oui, l’Eternel, ╵vaillant dans les combats.
  '9':
  - type: text
    content: Relevez vos frontons, ╵ô portes, haussez-vous, ╵vous, portes éternelles,
  - type: text
    content: pour que le Roi glorieux ╵y fasse son entrée !
