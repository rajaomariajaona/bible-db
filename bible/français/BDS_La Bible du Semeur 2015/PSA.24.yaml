document_id: PSA.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel entre dans son sanctuaire
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre et ses richesses ╵appartiennent à l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’univers est à lui ╵avec ceux qui l’habitent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 10.26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qui est ce Roi glorieux ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est lui le Roi glorieux.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C’est lui qui a fondé ╵la terre sur les mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui l’a établie fermement ╵au-dessus des cours d’eau.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qui pourra accéder ╵au mont de l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra se tenir ╵dans sa demeure sainte ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’innocent aux mains nettes ╵et qui a le cœur pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne se tourne pas ╵vers le mensonge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui ne se tourne pas vers les faux dieux.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne jure pas ╵pour tromper son prochain.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Celui qui vit ainsi ╵sera béni par l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il obtiendra justice ╵de son Dieu qui le sauve.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O Eternel, tel est le peuple ╵qui se tourne vers toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui s’attache à toi, ╵Dieu de Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après deux manuscrits hébreux, l’ancienne version grecque et la version syriaque. Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu de Jacob, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les autres manuscrits hébreux ont uniquement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jacob.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Relevez vos frontons, ╵ô portes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les portes de Sion sont personnifiées et exhortées à élever leurs frontons pour accueillir le coffre de l’alliance, symbole de la présence du Roi des rois.
      marker-yv: yv-n
    - type: text
      text: ', haussez-vous, ╵vous, portes éternelles,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que le Roi glorieux ╵y fasse son entrée !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Qui est ce Roi glorieux ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Eternel, ╵le Fort et le Vaillant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, l’Eternel, ╵vaillant dans les combats.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Relevez vos frontons, ╵ô portes, haussez-vous, ╵vous, portes éternelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que le Roi glorieux ╵y fasse son entrée !
