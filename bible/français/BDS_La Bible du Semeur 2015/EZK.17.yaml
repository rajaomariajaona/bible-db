document_id: EZK.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le grand aigle et la vigne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici : elle était bien plantée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais pourra-t-elle prospérer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès que le vent d’orient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se mettra à souffler sur elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne se desséchera-t-elle pas pleinement ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, sur le terrain même
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où elle avait poussé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle desséchera.” »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sens de la parabole
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel m’adressa la parole et me dit :'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Demande, je te prie, à cette communauté rebelle si elle comprend ce que tout cela signifie. Dis-lui : « Le roi de Babylone est allé à Jérusalem, il a capturé son roi et les chefs de la ville, et les a emmenés chez lui à Babylone'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 12-15, voir 2 R 24.8 à 25.7 ; 2 Ch 36.9-20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a pris un rejeton de la race royale, il a conclu une alliance avec lui en lui faisant prêter serment. Il a emmené les notables du pays, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour que le royaume demeure dans l’abaissement, incapable de se relever, et qu’il reste fidèle à son alliance pour subsister. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais celui-ci s’est révolté contre le roi de Babylone, il a envoyé des messagers en Egypte pour qu’elle lui procure des chevaux et un grand nombre de soldats. Réussira-t-il ? Celui qui agit de la sorte s’en sortira-t-il ? Il a rompu l’alliance, et il s’en tirerait ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, il mourra dans la ville du roi qui l’a appelé à régner, car il a violé son serment et il a rompu l’alliance conclue avec lui. Il mourra au milieu de Babylone. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malgré sa forte armée et la multitude de ses troupes, le pharaon ne pourra rien pour lui au moment du combat, quand les Babyloniens élèveront des terrasses de siège et construiront des terrassements pour faire périr beaucoup de gens. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’a pas respecté le serment, il a violé l’alliance, et pourtant, il avait bien pris un engagement. Après avoir agi ainsi, il n’en réchappera pas.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : Aussi vrai que je suis vivant, parce qu’il a méprisé le serment prêté en mon nom et qu’il a violé mon alliance, je le lui ferai payer. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, propose une énigme, raconte une parabole à la communauté d’Israël. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais étendre mon filet sur lui et il sera pris dans mes mailles. Je le ferai emmener à Babylone, et là, je le ferai passer en jugement pour la trahison dont il s’est rendu coupable à mon égard. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses troupes en fuite tomberont sous l’épée, et ceux qui en réchapperont seront dispersés à tout vent. Ainsi vous reconnaîtrez que moi, l’Eternel, j’ai parlé.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Je prendrai moi-même un rameau tendre de la cime du cèdre élevé et je le mettrai en terre. Je couperai un tendre rejeton du haut de ses branches et je le planterai moi-même sur une très haute montagne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 34.23 ; Es 11.1 ; Jr 23.5-6 ; 33.14-16 ; Za 3.8-10 ; 6.12-15.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je le planterai sur une montagne élevée d’Israël ; il étendra ses branches et portera du fruit, et il deviendra un cèdre magnifique ; toutes sortes d’oiseaux habiteront dans sa ramure et viendront nicher à l’ombre de ses branches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 13.32
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tous les arbres de la campagne reconnaîtront que moi, je suis l’Eternel, qui abaisse l’arbre élevé et qui élève celui qui était abaissé, qui fais sécher l’arbre vert et reverdir l’arbre sec. Moi, l’Eternel, je le déclare et je le ferai. »
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis-leur : « Voici ce que déclare le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le grand aigle survint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses ailes étaient grandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son envergure était très large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il était couvert d’un plumage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: épais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: multicolore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’aigle se rendit au Liban
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et saisit la cime d’un cèdre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour l’explication de la parabole, voir v. 12ss L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aigle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne Nabuchodonosor, roi de Babylone (v. 12), le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Liban '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est mentionné ici parce qu’il y avait beaucoup de cèdres dans ce pays, le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cèdre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: représente la dynastie davidique.
      marker-yv: yv-n
    - type: text
      text: ','
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis arracha ╵son rameau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rameau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est Yehoyakîn, emmené en exil à Babylone (v. 12).
      marker-yv: yv-n
    - type: text
      text: ' le plus élevé.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il l’emporta ╵dans un pays de commerçants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il le déposa ╵dans une ville de marchands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis il prit un plant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne Sédécias, que Nabuchodonosor a établi roi à Jérusalem (v. 13).
      marker-yv: yv-n
    - type: text
      text: ' du pays'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le planta dans une pépinière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le mit comme un saule
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près des eaux abondantes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le plant poussa
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il devint un cep de vigne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étendant ses sarments, ╵mais il était de taille bien modeste ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses sarments se tournaient vers l’aigle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses racines ╵restaient sous lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se développa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: produisit des rameaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et poussa des sarments.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis survint un autre grand aigle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: autre grand aigle
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le pharaon Hophra avec lequel Sédécias a cherché à s’allier (v. 15).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux larges ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au plumage abondant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voici que la vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du champ où elle était plantée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étendit vers lui ses racines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tendit ses sarments de son côté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour se faire arroser par lui.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or elle avait été plantée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un bon champ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près des eaux abondantes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où elle poussait des rameaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et produisait du fruit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où elle était devenue ╵une superbe vigne.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis-leur : “Voici ce que déclare'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur, l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va-t-elle prospérer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le premier aigle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne va-t-il pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arracher ses racines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la dépouiller de ses fruits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les laisser sécher ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors toutes les jeunes pousses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se flétriront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne faudra ni grands efforts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni une armée nombreuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour la déraciner complètement.
