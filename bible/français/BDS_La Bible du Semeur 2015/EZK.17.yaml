document_id: EZK.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand aigle et la vigne
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '10':
  - type: text
    content: 'Voici : elle était bien plantée,'
  - type: text
    content: mais pourra-t-elle prospérer ?
  - type: text
    content: Dès que le vent d’orient
  - type: text
    content: se mettra à souffler sur elle,
  - type: text
    content: ne se desséchera-t-elle pas pleinement ?
  - type: text
    content: Oui, sur le terrain même
  - type: text
    content: où elle avait poussé,
  - type: text
    content: elle desséchera.” »
  - type: heading
    content: Le sens de la parabole
  '11':
  - type: text
    content: 'Alors l’Eternel m’adressa la parole et me dit :'
  '12':
  - type: text
    content: 'Demande, je te prie, à cette communauté rebelle si elle comprend ce que tout cela signifie. Dis-lui : « Le roi de Babylone est allé à Jérusalem, il a capturé son roi et les chefs de la ville, et les a emmenés chez lui à Babylone'
  - type: note
    content: Pour les v. 12-15, voir 2 R 24.8 à 25.7 ; 2 Ch 36.9-20.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Il a pris un rejeton de la race royale, il a conclu une alliance avec lui en lui faisant prêter serment. Il a emmené les notables du pays, '
  '14':
  - type: text
    content: 'pour que le royaume demeure dans l’abaissement, incapable de se relever, et qu’il reste fidèle à son alliance pour subsister. '
  '15':
  - type: text
    content: 'Mais celui-ci s’est révolté contre le roi de Babylone, il a envoyé des messagers en Egypte pour qu’elle lui procure des chevaux et un grand nombre de soldats. Réussira-t-il ? Celui qui agit de la sorte s’en sortira-t-il ? Il a rompu l’alliance, et il s’en tirerait ? '
  '16':
  - type: text
    content: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, il mourra dans la ville du roi qui l’a appelé à régner, car il a violé son serment et il a rompu l’alliance conclue avec lui. Il mourra au milieu de Babylone. '
  '17':
  - type: text
    content: 'Malgré sa forte armée et la multitude de ses troupes, le pharaon ne pourra rien pour lui au moment du combat, quand les Babyloniens élèveront des terrasses de siège et construiront des terrassements pour faire périr beaucoup de gens. '
  '18':
  - type: text
    content: Il n’a pas respecté le serment, il a violé l’alliance, et pourtant, il avait bien pris un engagement. Après avoir agi ainsi, il n’en réchappera pas.
  '19':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : Aussi vrai que je suis vivant, parce qu’il a méprisé le serment prêté en mon nom et qu’il a violé mon alliance, je le lui ferai payer. '
  '2':
  - type: text
    content: 'Fils d’homme, propose une énigme, raconte une parabole à la communauté d’Israël. '
  '20':
  - type: text
    content: 'Je vais étendre mon filet sur lui et il sera pris dans mes mailles. Je le ferai emmener à Babylone, et là, je le ferai passer en jugement pour la trahison dont il s’est rendu coupable à mon égard. '
  '21':
  - type: text
    content: Ses troupes en fuite tomberont sous l’épée, et ceux qui en réchapperont seront dispersés à tout vent. Ainsi vous reconnaîtrez que moi, l’Eternel, j’ai parlé.
  '22':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Je prendrai moi-même un rameau tendre de la cime du cèdre élevé et je le mettrai en terre. Je couperai un tendre rejeton du haut de ses branches et je le planterai moi-même sur une très haute montagne'
  - type: note
    content: Voir 34.23 ; Es 11.1 ; Jr 23.5-6 ; 33.14-16 ; Za 3.8-10 ; 6.12-15.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Je le planterai sur une montagne élevée d’Israël ; il étendra ses branches et portera du fruit, et il deviendra un cèdre magnifique ; toutes sortes d’oiseaux habiteront dans sa ramure et viendront nicher à l’ombre de ses branches
  - type: note
    content: Voir Mt 13.32.
  - type: text
    content: .
  '24':
  - type: text
    content: Alors tous les arbres de la campagne reconnaîtront que moi, je suis l’Eternel, qui abaisse l’arbre élevé et qui élève celui qui était abaissé, qui fais sécher l’arbre vert et reverdir l’arbre sec. Moi, l’Eternel, je le déclare et je le ferai. »
  '3':
  - type: text
    content: 'Dis-leur : « Voici ce que déclare le Seigneur, l’Eternel :'
  - type: text
    content: Le grand aigle survint.
  - type: text
    content: Ses ailes étaient grandes,
  - type: text
    content: son envergure était très large,
  - type: text
    content: il était couvert d’un plumage
  - type: text
    content: épais,
  - type: text
    content: multicolore.
  - type: text
    content: L’aigle se rendit au Liban
  - type: text
    content: et saisit la cime d’un cèdre
  - type: note
    content: Pour l’explication de la parabole, voir v. 12ss L’aigle désigne Nabuchodonosor, roi de Babylone (v. 12), le Liban est mentionné ici parce qu’il y avait beaucoup de cèdres dans ce pays, le cèdre représente la dynastie davidique.
  - type: text
    content: ','
  '4':
  - type: text
    content: puis arracha ╵son rameau
  - type: note
    content: Le rameau est Yehoyakîn, emmené en exil à Babylone (v. 12).
  - type: text
    content: ' le plus élevé.'
  - type: text
    content: Il l’emporta ╵dans un pays de commerçants,
  - type: text
    content: et il le déposa ╵dans une ville de marchands.
  '5':
  - type: text
    content: Puis il prit un plant
  - type: note
    content: Le plant désigne Sédécias, que Nabuchodonosor a établi roi à Jérusalem (v. 13).
  - type: text
    content: ' du pays'
  - type: text
    content: et le planta dans une pépinière.
  - type: text
    content: Il le mit comme un saule
  - type: text
    content: près des eaux abondantes.
  '6':
  - type: text
    content: Le plant poussa
  - type: text
    content: et il devint un cep de vigne
  - type: text
    content: étendant ses sarments, ╵mais il était de taille bien modeste ;
  - type: text
    content: ses sarments se tournaient vers l’aigle
  - type: text
    content: et ses racines ╵restaient sous lui.
  - type: text
    content: Il se développa,
  - type: text
    content: produisit des rameaux
  - type: text
    content: et poussa des sarments.
  '7':
  - type: text
    content: Puis survint un autre grand aigle
  - type: note
    content: 'L’autre grand aigle: le pharaon Hophra avec lequel Sédécias a cherché à s’allier (v. 15).'
  - type: text
    content: aux larges ailes,
  - type: text
    content: au plumage abondant.
  - type: text
    content: Et voici que la vigne,
  - type: text
    content: du champ où elle était plantée,
  - type: text
    content: étendit vers lui ses racines
  - type: text
    content: et tendit ses sarments de son côté,
  - type: text
    content: pour se faire arroser par lui.
  '8':
  - type: text
    content: Or elle avait été plantée
  - type: text
    content: dans un bon champ,
  - type: text
    content: près des eaux abondantes
  - type: text
    content: où elle poussait des rameaux
  - type: text
    content: et produisait du fruit
  - type: text
    content: et où elle était devenue ╵une superbe vigne.
  '9':
  - type: text
    content: 'Dis-leur : “Voici ce que déclare'
  - type: text
    content: le Seigneur, l’Eternel.
  - type: text
    content: Va-t-elle prospérer ?
  - type: text
    content: Le premier aigle
  - type: text
    content: ne va-t-il pas
  - type: text
    content: arracher ses racines,
  - type: text
    content: et la dépouiller de ses fruits
  - type: text
    content: pour les laisser sécher ?
  - type: text
    content: Alors toutes les jeunes pousses
  - type: text
    content: se flétriront.
  - type: text
    content: Il ne faudra ni grands efforts
  - type: text
    content: ni une armée nombreuse
  - type: text
    content: pour la déraciner complètement.
