document_id: PSA.59
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mon Dieu, délivre-moi !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Sur la mélodie de « Ne détruis pas ! ». Cantique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signification incertaine.
    marker-yv: yv-n
  - type: text
    text: ' composé par David, lorsque Saül envoya cerner sa maison pour le faire mourir'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 19.11-13
        metadata:
          usfm: 1SA.19.11+1SA.19.12+1SA.19.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O mon Dieu ! délivre-moi ╵de mes ennemis !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mets-moi à l’abri sur les hauteurs ╵hors de portée de mes agresseurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Délivre-moi de ces gens ╵aux agissements iniques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et viens me sauver ╵de ces hommes sanguinaires !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car les voici qui me guettent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des hommes cruels ╵contre moi complotent
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que j’aie commis de faute, ╵sans que j’aie péché, ╵Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sans que j’aie fait aucun mal, ╵voici qu’ils accourent, ╵et qu’ils se préparent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi, viens à moi ╵et regarde !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eternel, ╵ô Dieu des armées célestes, ╵toi, Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: interviens ╵pour punir tous ces païens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’aie pas de pitié ╵pour ces traîtres malfaisants.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le soir, ils reviennent, ╵en grondant comme des chiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il faut penser aux chiens sauvages qui, en Orient, rôdent par bandes aux abords des villes, à la recherche de nourriture.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: rôdant autour de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ont la bave à la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs propos sont des épées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils se disent : ╵« Qui peut nous entendre ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais toi, Eternel, ╵tu ris de ces gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu te moques ╵de tous ces païens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi qui es ma force, ╵c’est vers toi que je regarde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, Dieu est ma forteresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dieu qui m’aime ╵viendra au-devant de moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu viendra vers moi avec son amour, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu fera venir son amour vers moi.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu m’offrira en spectacle ╵tous mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne les extermine pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Si Dieu les punissait par une destruction soudaine, ils seraient vite oubliés. Leur châtiment doit servir d’avertissement au peuple.
    marker-yv: yv-n
  - type: text
    text: ', ╵de peur que mon peuple oublie,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, par ta puissance, ╵secoue-les, renverse-les,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es Seigneur, ╵notre bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toutes leurs paroles ╵ne sont que péché.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient pris au piège ╵de leur propre orgueil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous leurs mensonges ╵et pour leurs malédictions !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Détruis-les dans ta colère, ╵détruis-les, qu’ils ne soient plus !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors on saura ╵que Dieu règne sur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’aux confins de la terre !
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le soir, ils reviennent, ╵en grondant comme des chiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rôdant autour de la ville ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: çà et là, ils errent ╵en quête de proie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’ils ne sont pas rassasiés, ╵ils y passeront la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moi, je chanterai ta force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dès le matin, ╵j’acclamerai ton amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es pour moi ╵une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es mon refuge ╵quand je suis dans la détresse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je veux donc te célébrer ╵par mes chants, ╵toi qui es ma force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, Dieu est ma forteresse : ╵c’est un Dieu qui m’aime.'
