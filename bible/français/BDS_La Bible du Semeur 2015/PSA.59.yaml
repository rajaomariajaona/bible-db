document_id: PSA.59,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mon Dieu, délivre-moi !
  - type: text
    content: Au chef de chœur. Sur la mélodie de « Ne détruis pas ! ». Cantique
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' composé par David, lorsque Saül envoya cerner sa maison pour le faire mourir'
  - type: note
    content: Voir 1 S 19.11-13.
  - type: text
    content: .
  '10':
  - type: text
    content: Toi qui es ma force, ╵c’est vers toi que je regarde.
  - type: text
    content: Oui, Dieu est ma forteresse.
  '11':
  - type: text
    content: Dieu qui m’aime ╵viendra au-devant de moi
  - type: note
    content: 'Autres traductions : Dieu viendra vers moi avec son amour, ou : Dieu fera venir son amour vers moi.'
  - type: text
    content: ','
  - type: text
    content: Dieu m’offrira en spectacle ╵tous mes ennemis.
  '12':
  - type: text
    content: Ne les extermine pas
  - type: note
    content: Si Dieu les punissait par une destruction soudaine, ils seraient vite oubliés. Leur châtiment doit servir d’avertissement au peuple.
  - type: text
    content: ', ╵de peur que mon peuple oublie,'
  - type: text
    content: mais, par ta puissance, ╵secoue-les, renverse-les,
  - type: text
    content: toi qui es Seigneur, ╵notre bouclier.
  '13':
  - type: text
    content: Toutes leurs paroles ╵ne sont que péché.
  - type: text
    content: Qu’ils soient pris au piège ╵de leur propre orgueil,
  - type: text
    content: pour tous leurs mensonges ╵et pour leurs malédictions !
  '14':
  - type: text
    content: Détruis-les dans ta colère, ╵détruis-les, qu’ils ne soient plus !
  - type: text
    content: Alors on saura ╵que Dieu règne sur Jacob,
  - type: text
    content: jusqu’aux confins de la terre !
  - type: text
    content: Pause
  '15':
  - type: text
    content: Le soir, ils reviennent, ╵en grondant comme des chiens,
  - type: text
    content: rôdant autour de la ville ;
  '16':
  - type: text
    content: çà et là, ils errent ╵en quête de proie.
  - type: text
    content: S’ils ne sont pas rassasiés, ╵ils y passeront la nuit.
  '17':
  - type: text
    content: Moi, je chanterai ta force
  - type: text
    content: et, dès le matin, ╵j’acclamerai ton amour,
  - type: text
    content: car tu es pour moi ╵une forteresse,
  - type: text
    content: tu es mon refuge ╵quand je suis dans la détresse !
  '18':
  - type: text
    content: Je veux donc te célébrer ╵par mes chants, ╵toi qui es ma force.
  - type: text
    content: 'Oui, Dieu est ma forteresse : ╵c’est un Dieu qui m’aime.'
  '2':
  - type: text
    content: O mon Dieu ! délivre-moi ╵de mes ennemis !
  - type: text
    content: Mets-moi à l’abri sur les hauteurs ╵hors de portée de mes agresseurs.
  '3':
  - type: text
    content: Délivre-moi de ces gens ╵aux agissements iniques,
  - type: text
    content: et viens me sauver ╵de ces hommes sanguinaires !
  '4':
  - type: text
    content: Car les voici qui me guettent,
  - type: text
    content: des hommes cruels ╵contre moi complotent
  - type: text
    content: sans que j’aie commis de faute, ╵sans que j’aie péché, ╵Eternel.
  '5':
  - type: text
    content: Sans que j’aie fait aucun mal, ╵voici qu’ils accourent, ╵et qu’ils se préparent.
  - type: text
    content: Réveille-toi, viens à moi ╵et regarde !
  '6':
  - type: text
    content: Eternel, ╵ô Dieu des armées célestes, ╵toi, Dieu d’Israël,
  - type: text
    content: interviens ╵pour punir tous ces païens !
  - type: text
    content: N’aie pas de pitié ╵pour ces traîtres malfaisants.
  - type: text
    content: Pause
  '7':
  - type: text
    content: Le soir, ils reviennent, ╵en grondant comme des chiens
  - type: note
    content: Il faut penser aux chiens sauvages qui, en Orient, rôdent par bandes aux abords des villes, à la recherche de nourriture.
  - type: text
    content: ','
  - type: text
    content: rôdant autour de la ville.
  '8':
  - type: text
    content: Ils ont la bave à la bouche,
  - type: text
    content: leurs propos sont des épées.
  - type: text
    content: 'Ils se disent : ╵« Qui peut nous entendre ? »'
  '9':
  - type: text
    content: Mais toi, Eternel, ╵tu ris de ces gens,
  - type: text
    content: tu te moques ╵de tous ces païens.
