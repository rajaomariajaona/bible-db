document_id: PSA.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chemin de la vie
  - type: text
    content: Un cantique
  - type: note
    content: Terme de sens incertain.
  - type: text
    content: ' de David.'
  - type: text
    content: O Dieu, protège-moi, ╵car je me réfugie en toi.
  '10':
  - type: text
    content: tu ne m’abandonneras pas ╵dans le séjour des morts,
  - type: text
    content: tu ne laisseras pas ╵un homme qui t’est attaché ╵descendre dans la tombe
  - type: note
    content: Cité en Ac 13.35 d’après la version grecque.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Tu me feras connaître ╵le chemin de la vie :'
  - type: text
    content: plénitude de joie ╵en ta présence,
  - type: text
    content: délices éternelles ╵auprès de toi.
  '2':
  - type: text
    content: 'Je dis à l’Eternel : ╵« Toi, tu es mon Seigneur,'
  - type: text
    content: et mon bonheur est en toi seul. »
  '3':
  - type: text
    content: 'Je suis plein d’affection ╵pour tous ceux qui sont saints ╵dans le pays :'
  - type: text
    content: ce sont eux qui sont vraiment grands.
  '4':
  - type: text
    content: Mais tous ceux qui s’empressent ╵après un autre dieu
  - type: text
    content: ne font qu’augmenter leurs tourments
  - type: note
    content: Texte hébreu incertain.
  - type: text
    content: .
  - type: text
    content: Je ne prendrai pas part ╵à leurs sanglantes libations
  - type: note
    content: La libation consistait généralement en une offrande de vin. Dans certains sacrifices païens, on mêlait peut-être le vin au sang de la victime que l’on répandait sur l’autel ; ou encore, le psalmiste pourrait faire allusion au « sang versé », c’est-à-dire aux crimes associés aux cultes idolâtres ; mais, plus vraisemblablement, il se réfère simplement à des gens qui offrent leur culte aux idoles tout en « ayant du sang sur les mains ».
  - type: text
    content: .
  - type: text
    content: Le nom de ces idoles ╵ne passera pas sur mes lèvres.
  '5':
  - type: text
    content: L’Eternel est ma part ╵et la coupe
  - type: note
    content: Allusion à la coupe offerte aux invités lors d’une réception.
  - type: text
    content: ' où je bois.'
  - type: text
    content: Tu garantis la part que j’ai reçue.
  '6':
  - type: text
    content: Tu en as fixé les limites
  - type: note
    content: 'Autre traduction : la part qui m’est donnée.'
  - type: text
    content: ', ╵c’est un jardin plein de délices,'
  - type: text
    content: oui, c’est pour moi ╵un patrimoine merveilleux.
  '7':
  - type: text
    content: Oui, je veux bénir l’Eternel ╵qui me conseille,
  - type: text
    content: et même dans la nuit, ╵je suis instruit ╵dans mon être intérieur.
  '8':
  - type: text
    content: Je garde constamment ╵les yeux fixés sur l’Eternel,
  - type: text
    content: car il est à ma droite
  - type: note
    content: C’est là où se plaçait le défenseur d’un accusé (109.31).
  - type: text
    content: ', ╵pour que je ne vacille pas'
  - type: note
    content: Les v. 8-11 sont cités en Ac 2.25-28 selon l’ancienne version grecque.
  - type: text
    content: .
  '9':
  - type: text
    content: Voilà pourquoi ╵mon cœur est dans la joie,
  - type: text
    content: mon âme exulte d’allégresse.
  - type: text
    content: 'Ainsi mon corps ╵repose dans la confiance :'
