document_id: PSA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chemin de la vie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un cantique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme de sens incertain.
    marker-yv: yv-n
  - type: text
    text: ' de David.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, protège-moi, ╵car je me réfugie en toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je dis à l’Eternel : ╵« Toi, tu es mon Seigneur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon bonheur est en toi seul. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je suis plein d’affection ╵pour tous ceux qui sont saints ╵dans le pays :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont eux qui sont vraiment grands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais tous ceux qui s’empressent ╵après un autre dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne font qu’augmenter leurs tourments
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte hébreu incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne prendrai pas part ╵à leurs sanglantes libations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La libation consistait généralement en une offrande de vin. Dans certains sacrifices païens, on mêlait peut-être le vin au sang de la victime que l’on répandait sur l’autel ; ou encore, le psalmiste pourrait faire allusion au « sang versé », c’est-à-dire aux crimes associés aux cultes idolâtres ; mais, plus vraisemblablement, il se réfère simplement à des gens qui offrent leur culte aux idoles tout en « ayant du sang sur les mains ».
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le nom de ces idoles ╵ne passera pas sur mes lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Eternel est ma part ╵et la coupe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à la coupe offerte aux invités lors d’une réception.
    marker-yv: yv-n
  - type: text
    text: ' où je bois.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu garantis la part que j’ai reçue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu en as fixé les limites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la part qui m’est donnée.
    marker-yv: yv-n
  - type: text
    text: ', ╵c’est un jardin plein de délices,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, c’est pour moi ╵un patrimoine merveilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, je veux bénir l’Eternel ╵qui me conseille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même dans la nuit, ╵je suis instruit ╵dans mon être intérieur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je garde constamment ╵les yeux fixés sur l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est à ma droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est là où se plaçait le défenseur d’un accusé (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '109.31'
        metadata:
          usfm: PSA.109.31
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ╵pour que je ne vacille pas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 8-11 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2.25-28
        metadata:
          usfm: ACT.2.25+ACT.2.26+ACT.2.27+ACT.2.28
      - type: text
        text: ' selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voilà pourquoi ╵mon cœur est dans la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon âme exulte d’allégresse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi mon corps ╵repose dans la confiance :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: tu ne m’abandonneras pas ╵dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne laisseras pas ╵un homme qui t’est attaché ╵descendre dans la tombe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13.35
        metadata:
          usfm: ACT.13.35
      - type: text
        text: ' d’après la version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu me feras connaître ╵le chemin de la vie :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: plénitude de joie ╵en ta présence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: délices éternelles ╵auprès de toi.
