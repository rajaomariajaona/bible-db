  - type: text
    content: et qu’ils ont, dans le désert,
  - type: text
    content: ' ╵'
  - type: text
    content: voulu me forcer la main.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Ce jour-là,
  - type: text
    content: ' ╵'
  - type: text
    content: vos ancêtres m’ont provoqué,
  - type: text
    content: voulant me forcer la main,
  - type: text
    content: ' ╵'
  - type: text
    content: bien qu’ils m’aient vu à l’action
