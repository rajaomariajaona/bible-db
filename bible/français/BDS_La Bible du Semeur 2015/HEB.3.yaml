document_id: HEB.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus supérieur à Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, frères et sœurs, vous qui faites partie du peuple saint et qu’il a appelés à avoir part aux biens célestes, fixez vos pensées sur Jésus, l’apôtre et grand-prêtre de la foi que nous reconnaissons comme vraie. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pendant quarante ans.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est pourquoi
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: …action. C’est pourquoi, pendant quarante ans, j’ai été…
      marker-yv: yv-n
    - type: text
      text: ╵
    - type: usfm
      marker: qt
      children:
      - type: text
        text: j’ai été plein de colère
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: contre cette génération-là.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Et j’ai dit : Leur cœur'
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: s’égare sans cesse.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Oui, ils n’ont fait aucun cas
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: des voies que je leur prescris.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est pourquoi, dans ma colère,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'j’ai fait ce serment :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ils n’entreront pas dans le lieu de repos
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que j’avais prévu pour eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 95.7-11
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prenez donc bien garde, frères et sœurs, que personne parmi vous n’ait le cœur mauvais et incrédule au point de se détourner du Dieu vivant. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais encouragez-vous les uns les autres, jour après jour, aussi longtemps qu’on peut dire '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: aujourd’hui,
    - type: text
      text: ' afin qu’aucun d’entre vous ne se laisse tromper par le péché et ne s’endurcisse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, nous sommes associés à Christ, si toutefois nous conservons fermement, et jusqu’au bout, l’assurance que nous avons eue dès le début, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et cela aussi longtemps qu’il est dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aujourd’hui,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: si vous entendez la voix de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne vous endurcissez pas,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme l’ont fait vos ancêtres
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: lorsqu’ils se sont révoltés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 7, 8.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, qui sont ceux qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: se sont révoltés
    - type: text
      text: ' contre Dieu après avoir entendu sa voix ? N’est-ce pas tous ceux qui étaient sortis d’Egypte sous la conduite de Moïse ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et contre qui Dieu a-t-il été '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: plein de colère pendant quarante ans ?
    - type: text
      text: ' N’est-ce pas contre ceux qui avaient péché et dont '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les cadavres sont tombés dans le désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14.29
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '32'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfin, à qui a-t-il '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'fait ce serment : ils n’entreront pas dans le lieu de repos que j’avais prévu pour eux ?'
    - type: text
      text: ' N’est-ce pas à ceux qui avaient refusé de lui obéir ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous voyons donc qu’ils n’ont pas pu entrer dans le lieu de repos parce qu’ils n’ont pas fait confiance à Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: fidèle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction, ici et plus loin : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: digne de confiance.
      marker-yv: yv-n
    - type: text
      text: ' à celui qui l’a établi dans ces fonctions, comme autrefois '
    - type: usfm
      marker: qt
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
    - type: text
      text: ' l’a été '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dans toute la maison de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 12.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Jésus a été jugé digne d’une gloire bien plus grande que celle de Moïse, tout comme l’architecte qui a construit une maison reçoit plus d’honneur que la maison elle-même. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y a pas de maison sans constructeur et celui qui a construit toutes choses, c’est Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, pour sa part, a été '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: fidèle dans toute la maison de Dieu
    - type: text
      text: ', mais en tant que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: serviteur
    - type: text
      text: ', chargé de rendre témoignage à ce que Dieu allait dire par la suite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Christ, lui, est fidèle en tant que Fils, à la tête de sa maison. Et sa maison, c’est nous, si du moins nous gardons la pleine assurance et la fierté que nous donne notre espérance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits précisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fermement jusqu’à la fin.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le repos de Dieu pour ceux qui croient
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, comme le dit l’Esprit Saint :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aujourd’hui,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: si vous entendez la voix de Dieu,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne vous endurcissez pas,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme l’ont fait vos ancêtres
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: lorsqu’ils se sont révoltés
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et qu’ils ont, dans le désert,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: voulu me forcer la main.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ce jour-là,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: vos ancêtres m’ont provoqué,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: voulant me forcer la main,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: bien qu’ils m’aient vu à l’action
