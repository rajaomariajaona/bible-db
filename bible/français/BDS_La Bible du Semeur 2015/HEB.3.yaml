verses:
  '1':
  - type: heading
    content: Jésus supérieur à Moïse
  - type: text
    content: 'C’est pourquoi, frères et sœurs, vous qui faites partie du peuple saint et qu’il a appelés à avoir part aux biens célestes, fixez vos pensées sur Jésus, l’apôtre et grand-prêtre de la foi que nous reconnaissons comme vraie. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: pendant quarante ans.
  - type: text
    content: C’est pourquoi
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : …action. C’est pourquoi, pendant quarante ans, j’ai été…'
  - type: text
    content: ╵
  - type: text
    content: j’ai été plein de colère
  - type: text
    content: ' ╵'
  - type: text
    content: contre cette génération-là.
  - type: text
    content: 'Et j’ai dit : Leur cœur'
  - type: text
    content: ' ╵'
  - type: text
    content: s’égare sans cesse.
  - type: text
    content: Oui, ils n’ont fait aucun cas
  - type: text
    content: ' ╵'
  - type: text
    content: des voies que je leur prescris.
  '11':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi, dans ma colère,
  - type: text
    content: ' ╵'
  - type: text
    content: 'j’ai fait ce serment :'
  - type: text
    content: ils n’entreront pas dans le lieu de repos
  - type: text
    content: ' ╵'
  - type: text
    content: que j’avais prévu pour eux
  - type: note
    content: Ps 95.7-11 cité selon l’ancienne version grecque.
  - type: text
    content: '!'
  '12':
  - type: text
    content: 'Prenez donc bien garde, frères et sœurs, que personne parmi vous n’ait le cœur mauvais et incrédule au point de se détourner du Dieu vivant. '
  '13':
  - type: text
    content: 'Mais encouragez-vous les uns les autres, jour après jour, aussi longtemps qu’on peut dire '
  - type: text
    content: aujourd’hui,
  - type: text
    content: ' afin qu’aucun d’entre vous ne se laisse tromper par le péché et ne s’endurcisse. '
  '14':
  - type: text
    content: 'En effet, nous sommes associés à Christ, si toutefois nous conservons fermement, et jusqu’au bout, l’assurance que nous avons eue dès le début, '
  '15':
  - type: text
    content: 'et cela aussi longtemps qu’il est dit :'
  - type: text
    content: Aujourd’hui,
  - type: text
    content: ' ╵'
  - type: text
    content: si vous entendez la voix de Dieu,
  - type: text
    content: ne vous endurcissez pas,
  - type: text
    content: ' ╵'
  - type: text
    content: comme l’ont fait vos ancêtres
  - type: text
    content: ' ╵'
  - type: text
    content: lorsqu’ils se sont révoltés
  - type: note
    content: Voir v. 7, 8.
  - type: text
    content: .
  '16':
  - type: text
    content: 'En effet, qui sont ceux qui '
  - type: text
    content: se sont révoltés
  - type: text
    content: ' contre Dieu après avoir entendu sa voix ? N’est-ce pas tous ceux qui étaient sortis d’Egypte sous la conduite de Moïse ? '
  '17':
  - type: text
    content: 'Et contre qui Dieu a-t-il été '
  - type: text
    content: plein de colère pendant quarante ans ?
  - type: text
    content: ' N’est-ce pas contre ceux qui avaient péché et dont '
  - type: text
    content: les cadavres sont tombés dans le désert
  - type: note
    content: Nb 14.29, 32.
  - type: text
    content: '  ? '
  '18':
  - type: text
    content: 'Enfin, à qui a-t-il '
  - type: text
    content: 'fait ce serment : ils n’entreront pas dans le lieu de repos que j’avais prévu pour eux ?'
  - type: text
    content: ' N’est-ce pas à ceux qui avaient refusé de lui obéir ?'
  '19':
  - type: text
    content: Nous voyons donc qu’ils n’ont pas pu entrer dans le lieu de repos parce qu’ils n’ont pas fait confiance à Dieu.
  '2':
  - type: text
    content: 'Il est '
  - type: text
    content: fidèle
  - type: note
    content: 'Autre traduction, ici et plus loin : digne de confiance.'
  - type: text
    content: ' à celui qui l’a établi dans ces fonctions, comme autrefois '
  - type: text
    content: Moïse
  - type: text
    content: ' l’a été '
  - type: text
    content: dans toute la maison de Dieu
  - type: note
    content: Nb 12.7.
  - type: text
    content: .
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'En effet, Jésus a été jugé digne d’une gloire bien plus grande que celle de Moïse, tout comme l’architecte qui a construit une maison reçoit plus d’honneur que la maison elle-même. '
  '4':
  - type: text
    content: Il n’y a pas de maison sans constructeur et celui qui a construit toutes choses, c’est Dieu.
  '5':
  - type: text
    content: 'Moïse, pour sa part, a été '
  - type: text
    content: fidèle dans toute la maison de Dieu
  - type: text
    content: ', mais en tant que '
  - type: text
    content: serviteur
  - type: text
    content: ', chargé de rendre témoignage à ce que Dieu allait dire par la suite. '
  '6':
  - type: text
    content: Christ, lui, est fidèle en tant que Fils, à la tête de sa maison. Et sa maison, c’est nous, si du moins nous gardons la pleine assurance et la fierté que nous donne notre espérance
  - type: note
    content: 'Certains manuscrits précisent : fermement jusqu’à la fin.'
  - type: text
    content: .
  - type: heading
    content: Le repos de Dieu pour ceux qui croient
