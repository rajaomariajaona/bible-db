document_id: GAL.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Cette lettre vous est adressée par Paul, apôtre, non par une autorité humaine, ni par l’intermédiaire d’un homme, mais par Jésus-Christ et par Dieu, le Père, qui l’a ressuscité.
  '10':
  - type: text
    content: Qu’en pensez-vous maintenant ? Est-ce la faveur des hommes que je recherche ou celle de Dieu ? Mon désir est-il de plaire aux hommes ? Si je cherchais encore à plaire aux hommes, je ne serais pas serviteur de Christ.
  - type: heading
    content: La défense de l’Évangile
  - type: heading
    content: L’Evangile reçu de Christ
  '11':
  - type: text
    content: 'Je veux que vous le sachiez, frères et sœurs : l’Evangile que je vous ai annoncé n’est pas le fruit d’une pensée humaine. '
  '12':
  - type: text
    content: Car je ne l’ai reçu d’aucun homme, personne ne me l’a enseigné ; c’est Jésus-Christ lui-même qui me l’a fait connaître, par une révélation.
  '13':
  - type: text
    content: 'Vous avez entendu parler de ma conduite passée quand j’étais adepte du judaïsme. Vous savez avec quel fanatisme je persécutais l’Eglise de Dieu, dans le but de la détruire. '
  '14':
  - type: text
    content: 'Dans la pratique du judaïsme, j’allais plus loin que la plupart des Juifs de ma génération, et j’étais bien plus zélé qu’eux pour les traditions que j’avais reçues de mes ancêtres. '
  '15':
  - type: text
    content: 'Mais Dieu m’avait mis à part dès avant ma naissance et, dans sa grâce, il m’a appelé à le connaître. '
  '16':
  - type: text
    content: 'Aussi, dès qu’il lui a plu de révéler en moi son Fils pour que je l’annonce aux non-Juifs, je n’ai consulté personne. '
  '17':
  - type: text
    content: Je ne me suis même pas rendu à Jérusalem pour rencontrer ceux qui étaient déjà apôtres avant moi, mais je suis parti pour l’Arabie
  - type: note
    content: Région au sud et à l’est du territoire israélite correspondant au royaume des Nabatéens (voir note 2 Co 11.32). Beaucoup de Juifs y vivaient. Paul, conformément à son apostolat, a annoncé l’Evangile à ses compatriotes. C’est ce qui a justifié l’action du roi Arétas contre lui (2 Co 11.32).
  - type: text
    content: . De là, je suis retourné à Damas.
  '18':
  - type: text
    content: 'Ce n’est que trois ans plus tard que je suis allé à Jérusalem pour faire la connaissance de Pierre, chez qui je suis resté quinze jours. '
  '19':
  - type: text
    content: A part lui et Jacques
  - type: note
    content: Jacques, frère de Jésus, était l’un des principaux responsables de l’Eglise de Jérusalem.
  - type: text
    content: ', le frère du Seigneur, je n’ai rencontré aucun autre apôtre'
  - type: note
    content: 'Autre traduction : je n’ai vu aucun autre apôtre, mais j’ai seulement vu Jacques, le frère du Seigneur.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: Avec tous les frères et sœurs qui sont avec moi, je salue les Eglises de la Galatie.
  '20':
  - type: text
    content: '– Dieu m’est témoin que je ne mens pas en vous écrivant cela. – '
  '21':
  - type: text
    content: 'Ensuite je me suis rendu dans les districts de la Syrie et de la Cilicie. '
  '22':
  - type: text
    content: 'Mais les chrétiens des Eglises de la Judée ne me connaissaient pas personnellement. '
  '23':
  - type: text
    content: 'Ils avaient seulement entendu dire : « Celui qui, autrefois, nous persécutait, prêche maintenant la foi qu’il voulait détruire. » '
  '24':
  - type: text
    content: Et ils louaient Dieu à mon sujet.
  '3':
  - type: text
    content: 'Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ. '
  '4':
  - type: text
    content: 'Christ s’est offert lui-même en sacrifice pour expier nos péchés, afin de nous délivrer du monde présent dominé par le mal : il a ainsi accompli la volonté de Dieu, notre Père, '
  '5':
  - type: text
    content: à qui soit la gloire pour l’éternité ! Amen !
  - type: heading
    content: Un seul Evangile
  '6':
  - type: text
    content: Je m’étonne de la rapidité avec laquelle vous abandonnez celui qui vous a appelés par la grâce de Christ, pour vous tourner vers un autre Evangile
  - type: note
    content: Ceux qui prêchaient cet « autre Evangile » exigeaient, en plus de la foi en Christ, le respect de la Loi juive (circoncision, obéissance aux commandements, moraux et rituels, séparation d’avec les non-Juifs).
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Comme s’il pouvait y avoir un autre Evangile ! Mais il y a des gens qui sèment le trouble parmi vous et qui veulent renverser l’Evangile de Christ. '
  '8':
  - type: text
    content: Eh bien, si quelqu’un – même nous, même un ange du ciel – vous annonçait un Evangile différent de celui que nous vous avons annoncé, qu’il soit maudit
  - type: note
    content: Litt. anathème. Dans la communauté juive, celui qui était anathème n’avait plus le droit d’enseigner. Ce qui était anathème ne devait plus être touché par personne. Ceux que l’apôtre déclare anathèmes sont donc livrés à la colère de Dieu et à son jugement (voir 1 Co 16.22 ; Rm 9.3 où le même mot apparaît).
  - type: text
    content: '  ! '
  '9':
  - type: text
    content: 'Je l’ai déjà dit et je le répète maintenant : si quelqu’un vous prêche un autre Evangile que celui que vous avez reçu, qu’il soit maudit !'
