document_id: GAL.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cette lettre vous est adressée par Paul, apôtre, non par une autorité humaine, ni par l’intermédiaire d’un homme, mais par Jésus-Christ et par Dieu, le Père, qui l’a ressuscité.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qu’en pensez-vous maintenant ? Est-ce la faveur des hommes que je recherche ou celle de Dieu ? Mon désir est-il de plaire aux hommes ? Si je cherchais encore à plaire aux hommes, je ne serais pas serviteur de Christ.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La défense de l’Évangile
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Evangile reçu de Christ
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je veux que vous le sachiez, frères et sœurs : l’Evangile que je vous ai annoncé n’est pas le fruit d’une pensée humaine. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car je ne l’ai reçu d’aucun homme, personne ne me l’a enseigné ; c’est Jésus-Christ lui-même qui me l’a fait connaître, par une révélation.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vous avez entendu parler de ma conduite passée quand j’étais adepte du judaïsme. Vous savez avec quel fanatisme je persécutais l’Eglise de Dieu, dans le but de la détruire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dans la pratique du judaïsme, j’allais plus loin que la plupart des Juifs de ma génération, et j’étais bien plus zélé qu’eux pour les traditions que j’avais reçues de mes ancêtres. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais Dieu m’avait mis à part dès avant ma naissance et, dans sa grâce, il m’a appelé à le connaître. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aussi, dès qu’il lui a plu de révéler en moi son Fils pour que je l’annonce aux non-Juifs, je n’ai consulté personne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je ne me suis même pas rendu à Jérusalem pour rencontrer ceux qui étaient déjà apôtres avant moi, mais je suis parti pour l’Arabie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Région au sud et à l’est du territoire israélite correspondant au royaume des Nabatéens (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 11.32
        - type: text
          text: ). Beaucoup de Juifs y vivaient. Paul, conformément à son apostolat, a annoncé l’Evangile à ses compatriotes. C’est ce qui a justifié l’action du roi Arétas contre lui (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 11.32
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . De là, je suis retourné à Damas.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ce n’est que trois ans plus tard que je suis allé à Jérusalem pour faire la connaissance de Pierre, chez qui je suis resté quinze jours. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A part lui et Jacques
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacques, frère de Jésus, était l’un des principaux responsables de l’Eglise de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', le frère du Seigneur, je n’ai rencontré aucun autre apôtre'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n’ai vu aucun autre apôtre, mais j’ai seulement vu Jacques, le frère du Seigneur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Avec tous les frères et sœurs qui sont avec moi, je salue les Eglises de la Galatie.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '– Dieu m’est témoin que je ne mens pas en vous écrivant cela. – '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ensuite je me suis rendu dans les districts de la Syrie et de la Cilicie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais les chrétiens des Eglises de la Judée ne me connaissaient pas personnellement. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils avaient seulement entendu dire : « Celui qui, autrefois, nous persécutait, prêche maintenant la foi qu’il voulait détruire. » '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Et ils louaient Dieu à mon sujet.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Christ s’est offert lui-même en sacrifice pour expier nos péchés, afin de nous délivrer du monde présent dominé par le mal : il a ainsi accompli la volonté de Dieu, notre Père, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: à qui soit la gloire pour l’éternité ! Amen !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un seul Evangile
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je m’étonne de la rapidité avec laquelle vous abandonnez celui qui vous a appelés par la grâce de Christ, pour vous tourner vers un autre Evangile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ceux qui prêchaient cet « autre Evangile » exigeaient, en plus de la foi en Christ, le respect de la Loi juive (circoncision, obéissance aux commandements, moraux et rituels, séparation d’avec les non-Juifs).
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Comme s’il pouvait y avoir un autre Evangile ! Mais il y a des gens qui sèment le trouble parmi vous et qui veulent renverser l’Evangile de Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eh bien, si quelqu’un – même nous, même un ange du ciel – vous annonçait un Evangile différent de celui que nous vous avons annoncé, qu’il soit maudit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'anathème. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans la communauté juive, celui qui était anathème n’avait plus le droit d’enseigner. Ce qui était anathème ne devait plus être touché par personne. Ceux que l’apôtre déclare anathèmes sont donc livrés à la colère de Dieu et à son jugement (voir 1 Co 16.22 ; Rm 9.3 où le même mot apparaît).
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je l’ai déjà dit et je le répète maintenant : si quelqu’un vous prêche un autre Evangile que celui que vous avez reçu, qu’il soit maudit !'
