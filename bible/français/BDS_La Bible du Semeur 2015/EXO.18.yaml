document_id: EXO.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La visite de Jéthro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jéthro, prêtre de Madian et beau-père de Moïse, apprit tout ce que Dieu avait fait en faveur de Moïse et d’Israël son peuple, il apprit comment Dieu avait fait sortir les Israélites d’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors il emmena Séphora
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Séphora avait suivi son mari en Egypte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4.24-26
        metadata:
          usfm: EXO.4.24+EXO.4.25+EXO.4.26
      - type: text
        text: ) mais celui-ci a peut-être voulu la mettre à l’abri durant sa lutte avec le pharaon. D’autres pensent qu’elle venait de rentrer chez son père avec la nouvelle de la délivrance d’Israël (v. 1).
    marker-yv: yv-n
  - type: text
    text: ', la femme de Moïse, que celui-ci avait précédemment laissé repartir chez elle, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ainsi que les deux fils de Séphora. L’aîné s’appelait Guershom (Emigré en ces lieux) parce que Moïse avait dit : « Je suis un émigré dans une terre étrangère ». '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il avait nommé le cadet Eliézer (Mon Dieu me secourt) en disant : « Le Dieu de mon père m’a secouru et m’a délivré de l’épée du pharaon. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jéthro se rendit donc auprès de Moïse, dans le désert, avec la femme et les fils de Moïse, près de la montagne de Dieu où Moïse avait dressé son camp. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il lui fit annoncer : Moi, Jéthro, ton beau-père, je viens te rendre visite avec ta femme et tes deux fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse sortit à la rencontre de son beau-père, se prosterna devant lui et l’embrassa. Ils prirent réciproquement de leurs nouvelles, puis entrèrent sous la tente. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse raconta à son beau-père tout ce que l’Eternel avait fait au pharaon et aux Egyptiens pour délivrer Israël ; il lui parla aussi de toutes les difficultés qu’ils avaient rencontrées en chemin, et lui dit comment l’Eternel les en avait délivrés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jéthro se réjouit de tout le bien que l’Eternel avait fait à Israël qu’il avait délivré des Egyptiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– Loué soit l’Eternel, s’écria-t-il, qui vous a délivrés des Egyptiens et du pharaon, qui a libéré le peuple de la domination des Egyptiens. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A présent, je reconnais que l’Eternel est plus grand que tous les dieux, car il l’a montré alors qu’on tyrannisait les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Puis Jéthro, beau-père de Moïse, offrit à Dieu un holocauste et des sacrifices. Aaron et tous les responsables d’Israël vinrent partager le repas sacré avec le beau-père de Moïse en présence de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le conseil de Jéthro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le lendemain, Moïse siégea pour rendre justice au peuple. Du matin au soir, les gens se tinrent devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque le beau-père de Moïse vit toute la peine que celui-ci se donnait pour le peuple, il lui dit : Pourquoi agis-tu de cette façon pour traiter les affaires du peuple ? Pourquoi sièges-tu seul et pourquoi tout ce monde attend-il debout du matin au soir pour se présenter devant toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse lui répondit : C’est que les gens viennent me trouver pour consulter Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsqu’ils ont un différend, ils viennent à moi, et je sers d’arbitre entre les parties ; je leur fais connaître les ordonnances et les lois de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le beau-père de Moïse lui dit : Ta façon de faire n’est pas bonne. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu finiras, à coup sûr, par t’épuiser – toi et le peuple qui est avec toi – car la tâche dépasse tes forces. Tu ne peux pas l’accomplir seul. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maintenant écoute le conseil que je vais te donner, et que Dieu te vienne en aide. Ton rôle est de représenter le peuple auprès de Dieu et de porter les litiges devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu dois aussi leur communiquer ses ordonnances et ses lois, leur enseigner la voie à suivre et la conduite à tenir. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pour le reste, choisis parmi le peuple des hommes de valeur, qui craignent Dieu, respectueux de la vérité, incorruptibles ; tu les placeras à la tête du peuple comme chefs de « milliers », chefs de « centaines », chefs de « cinquantaines » et chefs de « dizaines ». '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils seront en tout temps à la disposition du peuple pour juger les affaires ordinaires et ils ne porteront devant toi que les affaires importantes, mais ils jugeront eux-mêmes les cas faciles à régler. Allège ainsi ta charge ! Qu’ils la portent avec toi ! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si tu agis comme je te le conseille et que Dieu te dirige, tu pourras tenir bon et tous ces gens arriveront chez eux dans de bonnes conditions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moïse suivit le conseil de son beau-père et fit tout ce que celui-ci lui avait suggéré. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il choisit dans tout Israël des hommes capables et les plaça à la tête du peuple comme chefs de « milliers », de « centaines », de « cinquantaines » et de « dizaines ». '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils étaient constamment à la disposition du peuple pour rendre la justice, réglant eux-mêmes les cas faciles et portant devant Moïse les affaires difficiles. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Moïse prit congé de son beau-père qui reprit le chemin de son pays.
