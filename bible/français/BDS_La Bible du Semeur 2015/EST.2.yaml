document_id: EST.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le choix d’une nouvelle impératrice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au bout d’un certain temps, la colère de l’empereur Xerxès se calma. Il repensa à ce qu’avait fait Vasthi, et il réfléchit à la décision qui avait été prise à son sujet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Esther n’avait révélé ni son peuple ni sa famille d’origine, car Mardochée le lui avait interdit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Chaque jour, il se rendait devant la cour du harem pour prendre des nouvelles d’Esther et savoir comment on la traitait.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les jeunes filles se rendaient chacune à son tour chez l’empereur Xerxès, au terme du traitement de beauté prescrit pour douze mois par le protocole des femmes. Pour ce traitement, on utilisait pendant six mois de l’huile de myrrhe, et pendant six autres mois des baumes aromatiques et divers produits de beauté employés par les femmes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis, lorsque venait le tour d’une jeune fille de se rendre chez l’empereur, on lui donnait tout ce qu’elle demandait pour emporter du harem au palais impérial. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Elle s’y rendait le soir, et le lendemain matin, elle était conduite dans un second harem et confiée à la responsabilité de Shashgaz, l’eunuque de l’empereur chargé de la garde des épouses de second rang. Elle ne retournait plus chez l’empereur, à moins que celui-ci en manifeste le désir et la fasse appeler par son nom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esther, nouvelle impératrice
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quand vint son tour d’aller chez l’empereur, Esther, fille d’Abichaïl, oncle de Mardochée, qui l’avait adoptée comme sa fille, elle ne demanda rien d’autre que ce qu’avait indiqué Hégué, l’eunuque de l’empereur, gardien des femmes. Elle gagnait la faveur de tous ceux qui la voyaient. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: C’est le dixième mois, c’est-à-dire au mois de Tébeth de la septième année du règne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Décembre 479 ou janvier 478 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', que l’on vint prendre Esther pour l’emmener chez l’empereur au palais impérial. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'L’empereur aima Esther plus que toutes les autres femmes et elle gagna sa faveur et sa bienveillance mieux que toutes les autres jeunes filles. Alors il mit sur sa tête la couronne impériale et la fit proclamer impératrice à la place de Vasthi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En son honneur, il organisa un grand banquet pour tous ses ministres et ses hauts fonctionnaires. Ce fut le « banquet d’Esther ». Il accorda aux provinces des allègements d’impôts et distribua des cadeaux avec une générosité impériale.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mardochée sauve la vie de l’empereur
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lorsque avait eu lieu le second ramassage de jeunes filles, Mardochée avait un poste au palais impérial. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors les courtisans attachés à son service lui dirent : Que l’on recherche pour l’empereur des jeunes filles vierges et belles. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Esther avait tenu secrète son origine familiale et sa nationalité, comme le lui avait ordonné Mardochée. Elle continuait à se conformer à ses instructions comme au temps où elle était encore sous sa tutelle.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'A cette époque, alors que Mardochée exerçait donc des fonctions au palais impérial, deux eunuques de l’empereur, Bigtân et Téresh, qui faisaient partie de la garde postée à l’entrée du palais, furent exaspérés par l’empereur Xerxès et cherchèrent à l’assassiner. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mardochée en eut connaissance et il en avertit l’impératrice Esther qui mit l’empereur au courant de la part de Mardochée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Après enquête, l’information se révéla exacte. Les deux coupables furent pendus à une potence et l’affaire fut consignée dans le livre des Annales
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Tablettes sur lesquelles on consignait les faits importants de la vie de l’empire (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' en présence de l’empereur.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que l’empereur désigne donc des fonctionnaires chargés de sélectionner dans toutes les provinces de son empire toutes les jeunes filles vierges et belles et de les amener dans le harem de la citadelle de Suse pour les confier à Hégué, l’eunuque de l’empereur qui a la garde des femmes. On leur fournira tous les produits de beauté nécessaires. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La jeune fille qui aura la préférence de l’empereur succédera comme impératrice à Vasthi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette proposition plut à l’empereur qui la fit mettre à exécution.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Or, dans la citadelle de Suse, vivait un Juif nommé Mardochée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom formé à partir de celui de la principale divinité babylonienne '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mardouk '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 2.2
        - type: text
          text: '). Mardochée portait sans doute un nom juif (comme Esther : v. 7 ; Daniel et ses amis : '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 1.6-7
        - type: text
          text: ) qui n’est pas mentionné.
      marker-yv: yv-n
    - type: text
      text: '. Il était fils de Yaïr, et descendant de Shimeï et de Qish de la tribu de Benjamin. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Sa famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On pourrait comprendre, d’après l’hébreu, que c’est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qish '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui a été déporté. Mais '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shimeï et Qish '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont très certainement des ancêtres lointains de Mardochée (voir 2 S 16.5-14 ; 1 S 9.1).
      marker-yv: yv-n
    - type: text
      text: ' avait été déportée de Jérusalem avec les autres exilés emmenés par Nabuchodonosor, roi de Babylone, en même temps que Yekonia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelé aussi Yehoyakîn.
      marker-yv: yv-n
    - type: text
      text: ', roi de Juda. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mardochée avait élevé sa cousine Hadassa – c’est-à-dire Esther
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esther portait un nom juif (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hadassa, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: « myrte ») et un nom perse (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Esther, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: « étoile » ou, selon d’autres, nom dérivé de Ishtar, déesse babylonienne). Voir note v. 5.
      marker-yv: yv-n
    - type: text
      text: ' – orpheline de père et de mère. Cette jeune fille était bien faite et d’une grande beauté. A la mort de ses parents, Mardochée l’avait adoptée comme sa fille.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esther au palais impérial
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Après la proclamation de l’ordonnance de l’empereur et de son décret, de nombreuses jeunes filles furent rassemblées dans la citadelle de Suse, sous la surveillance de Hégué. Esther fut aussi emmenée au palais impérial et confiée aux soins de Hégué, le responsable du harem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'La jeune fille lui plut et gagna sa faveur. Il se mit en peine de lui fournir tout ce qu’il fallait en produits de beauté et pour son régime. Il mit à sa disposition sept jeunes servantes, sélectionnées parmi le personnel du palais impérial, et il la transféra, elle et ses servantes, dans le meilleur appartement du harem. '
