document_id: EST.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le choix d’une nouvelle impératrice
  - type: text
    content: 'Au bout d’un certain temps, la colère de l’empereur Xerxès se calma. Il repensa à ce qu’avait fait Vasthi, et il réfléchit à la décision qui avait été prise à son sujet. '
  '10':
  - type: text
    content: 'Esther n’avait révélé ni son peuple ni sa famille d’origine, car Mardochée le lui avait interdit. '
  '11':
  - type: text
    content: Chaque jour, il se rendait devant la cour du harem pour prendre des nouvelles d’Esther et savoir comment on la traitait.
  '12':
  - type: text
    content: 'Les jeunes filles se rendaient chacune à son tour chez l’empereur Xerxès, au terme du traitement de beauté prescrit pour douze mois par le protocole des femmes. Pour ce traitement, on utilisait pendant six mois de l’huile de myrrhe, et pendant six autres mois des baumes aromatiques et divers produits de beauté employés par les femmes. '
  '13':
  - type: text
    content: 'Puis, lorsque venait le tour d’une jeune fille de se rendre chez l’empereur, on lui donnait tout ce qu’elle demandait pour emporter du harem au palais impérial. '
  '14':
  - type: text
    content: Elle s’y rendait le soir, et le lendemain matin, elle était conduite dans un second harem et confiée à la responsabilité de Shashgaz, l’eunuque de l’empereur chargé de la garde des épouses de second rang. Elle ne retournait plus chez l’empereur, à moins que celui-ci en manifeste le désir et la fasse appeler par son nom.
  - type: heading
    content: Esther, nouvelle impératrice
  '15':
  - type: text
    content: 'Quand vint son tour d’aller chez l’empereur, Esther, fille d’Abichaïl, oncle de Mardochée, qui l’avait adoptée comme sa fille, elle ne demanda rien d’autre que ce qu’avait indiqué Hégué, l’eunuque de l’empereur, gardien des femmes. Elle gagnait la faveur de tous ceux qui la voyaient. '
  '16':
  - type: text
    content: C’est le dixième mois, c’est-à-dire au mois de Tébeth de la septième année du règne
  - type: note
    content: Décembre 479 ou janvier 478 av. J.-C.
  - type: text
    content: ', que l’on vint prendre Esther pour l’emmener chez l’empereur au palais impérial. '
  '17':
  - type: text
    content: 'L’empereur aima Esther plus que toutes les autres femmes et elle gagna sa faveur et sa bienveillance mieux que toutes les autres jeunes filles. Alors il mit sur sa tête la couronne impériale et la fit proclamer impératrice à la place de Vasthi. '
  '18':
  - type: text
    content: En son honneur, il organisa un grand banquet pour tous ses ministres et ses hauts fonctionnaires. Ce fut le « banquet d’Esther ». Il accorda aux provinces des allègements d’impôts et distribua des cadeaux avec une générosité impériale.
  - type: heading
    content: Mardochée sauve la vie de l’empereur
  '19':
  - type: text
    content: 'Lorsque avait eu lieu le second ramassage de jeunes filles, Mardochée avait un poste au palais impérial. '
  '2':
  - type: text
    content: 'Alors les courtisans attachés à son service lui dirent : Que l’on recherche pour l’empereur des jeunes filles vierges et belles. '
  '20':
  - type: text
    content: Esther avait tenu secrète son origine familiale et sa nationalité, comme le lui avait ordonné Mardochée. Elle continuait à se conformer à ses instructions comme au temps où elle était encore sous sa tutelle.
  '21':
  - type: text
    content: 'A cette époque, alors que Mardochée exerçait donc des fonctions au palais impérial, deux eunuques de l’empereur, Bigtân et Téresh, qui faisaient partie de la garde postée à l’entrée du palais, furent exaspérés par l’empereur Xerxès et cherchèrent à l’assassiner. '
  '22':
  - type: text
    content: 'Mardochée en eut connaissance et il en avertit l’impératrice Esther qui mit l’empereur au courant de la part de Mardochée. '
  '23':
  - type: text
    content: Après enquête, l’information se révéla exacte. Les deux coupables furent pendus à une potence et l’affaire fut consignée dans le livre des Annales
  - type: note
    content: Tablettes sur lesquelles on consignait les faits importants de la vie de l’empire (voir 6.1).
  - type: text
    content: ' en présence de l’empereur.'
  '3':
  - type: text
    content: 'Que l’empereur désigne donc des fonctionnaires chargés de sélectionner dans toutes les provinces de son empire toutes les jeunes filles vierges et belles et de les amener dans le harem de la citadelle de Suse pour les confier à Hégué, l’eunuque de l’empereur qui a la garde des femmes. On leur fournira tous les produits de beauté nécessaires. '
  '4':
  - type: text
    content: La jeune fille qui aura la préférence de l’empereur succédera comme impératrice à Vasthi.
  - type: text
    content: Cette proposition plut à l’empereur qui la fit mettre à exécution.
  '5':
  - type: text
    content: Or, dans la citadelle de Suse, vivait un Juif nommé Mardochée
  - type: note
    content: 'Nom formé à partir de celui de la principale divinité babylonienne Mardouk (Esd 2.2). Mardochée portait sans doute un nom juif (comme Esther : v. 7 ; Daniel et ses amis : Dn 1.6-7) qui n’est pas mentionné.'
  - type: text
    content: '. Il était fils de Yaïr, et descendant de Shimeï et de Qish de la tribu de Benjamin. '
  '6':
  - type: text
    content: Sa famille
  - type: note
    content: On pourrait comprendre, d’après l’hébreu, que c’est Qish qui a été déporté. Mais Shimeï et Qish sont très certainement des ancêtres lointains de Mardochée (voir 2 S 16.5-14 ; 1 S 9.1).
  - type: text
    content: ' avait été déportée de Jérusalem avec les autres exilés emmenés par Nabuchodonosor, roi de Babylone, en même temps que Yekonia'
  - type: note
    content: Appelé aussi Yehoyakîn.
  - type: text
    content: ', roi de Juda. '
  '7':
  - type: text
    content: Mardochée avait élevé sa cousine Hadassa – c’est-à-dire Esther
  - type: note
    content: Esther portait un nom juif (Hadassa, « myrte ») et un nom perse (Esther, « étoile » ou, selon d’autres, nom dérivé de Ishtar, déesse babylonienne). Voir note v. 5.
  - type: text
    content: ' – orpheline de père et de mère. Cette jeune fille était bien faite et d’une grande beauté. A la mort de ses parents, Mardochée l’avait adoptée comme sa fille.'
  - type: heading
    content: Esther au palais impérial
  '8':
  - type: text
    content: 'Après la proclamation de l’ordonnance de l’empereur et de son décret, de nombreuses jeunes filles furent rassemblées dans la citadelle de Suse, sous la surveillance de Hégué. Esther fut aussi emmenée au palais impérial et confiée aux soins de Hégué, le responsable du harem. '
  '9':
  - type: text
    content: 'La jeune fille lui plut et gagna sa faveur. Il se mit en peine de lui fournir tout ce qu’il fallait en produits de beauté et pour son régime. Il mit à sa disposition sept jeunes servantes, sélectionnées parmi le personnel du palais impérial, et il la transféra, elle et ses servantes, dans le meilleur appartement du harem. '
