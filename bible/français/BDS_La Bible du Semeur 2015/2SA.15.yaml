document_id: 2SA.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les intrigues d’Absalom
  - type: text
    content: 'Après cela, Absalom se procura un char et des chevaux ainsi qu’une garde personnelle de cinquante hommes qui couraient devant son char. '
  '10':
  - type: text
    content: 'De là, il envoya des émissaires dans toutes les tribus d’Israël pour dire : Dès que vous entendrez une sonnerie de cor, vous pourrez dire : « Absalom est devenu roi à Hébron. »'
  '11':
  - type: text
    content: 'Deux cents hommes de Jérusalem, invités par Absalom, partirent de bonne foi avec lui, sans se douter de ses intentions. '
  '12':
  - type: text
    content: Pendant qu’Absalom offrait les sacrifices, il envoya chercher Ahitophel
  - type: note
    content: Grand-père de Bath-Shéba (11.3 ; 23.34), conseiller royal (16.23).
  - type: text
    content: ', le Guilonite, conseiller de David, dans la ville de Guilo'
  - type: note
    content: A 10 kilomètres au nord-ouest d’Hébron (Jos 15.48-51) dans les montagnes du désert de Judée.
  - type: text
    content: . Ainsi la conjuration devint puissante et le parti d’Absalom fut de plus en plus nombreux.
  - type: heading
    content: David s’enfuit de Jérusalem
  '13':
  - type: text
    content: 'On vint annoncer à David que les Israélites prenaient parti pour Absalom. '
  '14':
  - type: text
    content: 'Alors David dit à tous ses ministres qui étaient avec lui à Jérusalem : Allons, fuyons au plus vite, sans quoi personne n’échappera à Absalom. Hâtez-vous de partir, sinon il nous prendra de vitesse et nous rattrapera ; il nous précipitera alors dans le malheur et massacrera toute la population de la ville.'
  '15':
  - type: text
    content: 'Les ministres lui dirent : Quelle que soit la décision que prenne notre seigneur le roi, nous sommes là à sa disposition.'
  '16':
  - type: text
    content: 'Le roi partit à pied, suivi de tous ses proches. Il ne laissa que dix épouses de second rang pour garder le palais. '
  '17':
  - type: text
    content: 'Il sortit accompagné de toute la population, et ils firent halte près de la dernière maison de la ville. '
  '18':
  - type: text
    content: Tous ses fonctionnaires marchaient à ses côtés, ainsi que sa garde personnelle composée des Kérétiens et des Pélétiens
  - type: note
    content: Voir note 8.18.
  - type: text
    content: ', tandis que les six cents Gathiens, qui l’avaient suivi depuis Gath'
  - type: note
    content: Une des capitales de la Philistie où David s’était réfugié (1 S 5.8 ; 27).
  - type: text
    content: ', précédaient le roi.'
  '19':
  - type: text
    content: 'Le roi demanda à Ittaï, le chef des Gathiens : Pourquoi veux-tu venir, toi aussi avec nous ? Rebrousse chemin et reste avec le nouveau roi ! Après tout, tu es un étranger ici et tu es en exil loin de ta patrie. '
  '2':
  - type: text
    content: 'Il se levait de bon matin et se postait au bord de la route qui conduisait à l’entrée de la ville. Chaque fois que passait un homme qui se rendait auprès du roi pour demander justice à propos d’un litige, Absalom l’interpellait et lui demandait : De quelle ville viens-tu ?'
  - type: text
    content: 'L’autre répondait : Ton serviteur est de telle tribu d’Israël.'
  '20':
  - type: text
    content: Tu n’es à mon service que depuis peu de temps, alors pourquoi t’entraînerais-je aujourd’hui dans une aventure ? Moi-même je m’en vais sans savoir où. Retourne plutôt et emmène tes compagnons avec toi ! Que l’Eternel te témoigne sa grande bonté !
  '21':
  - type: text
    content: 'Mais Ittaï répondit au roi : Aussi vrai que l’Eternel est vivant et que mon seigneur le roi est vivant, ton serviteur restera avec mon seigneur le roi partout où il ira, soit pour mourir, soit pour vivre.'
  '22':
  - type: text
    content: 'David lui répondit : C’est bon ! Va donc et passe devant !'
  - type: text
    content: 'Ittaï de Gath passa devant avec tous ses hommes et tous les membres de leurs familles. '
  '23':
  - type: text
    content: A mesure que la troupe passait, toute la population du pays se lamentait à grands cris. Le roi franchit la vallée du Cédron
  - type: note
    content: Vallée située entre Jérusalem et le mont des Oliviers. En hiver, le Cédron y forme un torrent important (1 R 2.37 ; 15.13 ; Jn 18.1).
  - type: text
    content: ' avec toute sa suite et s’avança sur la route qui mène au désert'
  - type: note
    content: Entre Jérusalem et Jéricho.
  - type: text
    content: .
  - type: heading
    content: David laisse de fidèles serviteurs à Jérusalem
  '24':
  - type: text
    content: 'Tsadoq vint aussi avec tous les lévites qui portaient le coffre de l’alliance de Dieu. Ils déposèrent le coffre de Dieu à terre tandis qu’Abiatar offrait des sacrifices jusqu’à ce que toute la population eut fini de sortir de la ville. '
  '25':
  - type: text
    content: 'Mais le roi dit à Tsadoq : Ramène le coffre de Dieu dans la ville. Si l’Eternel m’est favorable, il me fera revenir et me permettra de revoir le coffre ainsi que le sanctuaire. '
  '26':
  - type: text
    content: 'Si, par contre, il déclare : « Je ne prends plus plaisir en toi », eh bien, qu’il me traite comme bon lui semblera.'
  '27':
  - type: text
    content: 'Le roi dit encore au prêtre Tsadoq : N’es-tu pas un prophète ? Retourne tranquillement dans la ville et que ton fils Ahimaats et Jonathan, fils d’Abiatar, vos deux fils vous'
  - type: note
    content: 'C’est-à-dire Tsadoq et Abiatar dont il a été question au v. 24 : voir v. 29.'
  - type: text
    content: ' accompagnent. '
  '28':
  - type: text
    content: Quant à moi, j’attendrai aux défilés du désert jusqu’à ce que je reçoive un message de votre part qui me donne des nouvelles.
  '29':
  - type: text
    content: Ainsi Tsadoq et Abiatar rapportèrent le coffre de Dieu à Jérusalem et ils y restèrent.
  '3':
  - type: text
    content: 'Alors Absalom lui disait : Ta cause est juste et tu es dans ton bon droit, mais vois-tu, personne ne t’écoutera chez le roi.'
  '30':
  - type: text
    content: Cependant David gravissait pieds nus et la tête voilée
  - type: note
    content: Signe de profonde tristesse ou de deuil (voir Est 6.12 ; Es 20.2, 4 ; Jr 14.3-4 ; Ez 24.17 ; Mi 1.8).
  - type: text
    content: ' la montée des Oliviers, il s’avançait en pleurant. Tous ceux qui l’accompagnaient s’étaient aussi voilé la tête et montaient en pleurant. '
  '31':
  - type: text
    content: 'On vint rapporter à David qu’Ahitophel s’était joint aux conspirateurs autour d’Absalom. David s’écria : O Eternel, rends les conseils d’Ahitophel inefficaces !'
  '32':
  - type: text
    content: Lorsque David eut atteint le sommet de la colline où l’on adore Dieu, Houshaï l’Arkien
  - type: note
    content: Groupe familial, non juif selon certains, habitant au sud-ouest de Béthel (Jos 16.2). Sur le rôle de Houshaï, voir 16.16 ; 17.5-6, 14-16 ; 1 Ch 27.33.
  - type: text
    content: ', son conseiller personnel, vint à sa rencontre, son vêtement déchiré et la tête couverte de poussière.'
  '33':
  - type: text
    content: 'David lui dit : Si tu me suis, tu me seras à charge. '
  '34':
  - type: text
    content: 'Mais si, au contraire, tu retournes à la ville et si tu dis à Absalom : « Je suis ton serviteur, ô roi ! J’ai été jusqu’ici au service de ton père, mais maintenant c’est toi que je veux servir », tu pourras contrecarrer en ma faveur les conseils d’Ahitophel. '
  '35':
  - type: text
    content: 'De plus, tu auras l’appui des prêtres Tsadoq et Abiatar. Tu leur rapporteras tout ce que tu apprendras au palais royal. '
  '36':
  - type: text
    content: 'Leurs deux fils, Ahimaats, fils de Tsadoq, et Jonathan, fils d’Abiatar, sont avec eux : vous me communiquerez par leur intermédiaire toutes les nouvelles que vous apprendrez.'
  '37':
  - type: text
    content: Houshaï, l’ami de David, retourna donc en ville au moment où Absalom faisait son entrée à Jérusalem.
  '4':
  - type: text
    content: 'Puis il ajoutait : Ah ! si je rendais la justice dans ce pays ! Tous ceux qui seraient en litige ou en procès viendraient me trouver et je leur ferais justice !'
  '5':
  - type: text
    content: 'Quand quelqu’un s’approchait pour s’incliner devant lui, il lui tendait la main, le saisissait et l’embrassait. '
  '6':
  - type: text
    content: Absalom agissait ainsi envers tous ceux d’Israël qui se rendaient auprès du roi pour demander justice. De cette manière, il conquit insidieusement les suffrages des gens d’Israël.
  '7':
  - type: text
    content: Au bout de quatre ans
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque, la version syriaque et Flavius Josèphe ; le texte hébreu traditionnel a : quarante ans.'
  - type: text
    content: ', Absalom dit au roi : Permets-moi d’aller à Hébron pour accomplir un vœu que j’ai fait à l’Eternel. '
  '8':
  - type: text
    content: 'En effet, pendant son séjour à Gueshour en Syrie, ton serviteur a fait ce vœu : Si l’Eternel me laisse retourner à Jérusalem, je lui offrirai un sacrifice'
  - type: note
    content: 'L’ancienne version grecque ajoute ici : à Hébron.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Le roi lui dit : Va en paix !'
  - type: text
    content: 'Absalom partit donc et se rendit à Hébron. '
