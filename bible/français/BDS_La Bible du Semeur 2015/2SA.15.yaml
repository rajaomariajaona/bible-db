document_id: 2SA.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les intrigues d’Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Absalom se procura un char et des chevaux ainsi qu’une garde personnelle de cinquante hommes qui couraient devant son char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il se levait de bon matin et se postait au bord de la route qui conduisait à l’entrée de la ville. Chaque fois que passait un homme qui se rendait auprès du roi pour demander justice à propos d’un litige, Absalom l’interpellait et lui demandait : De quelle ville viens-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’autre répondait : Ton serviteur est de telle tribu d’Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Absalom lui disait : Ta cause est juste et tu es dans ton bon droit, mais vois-tu, personne ne t’écoutera chez le roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il ajoutait : Ah ! si je rendais la justice dans ce pays ! Tous ceux qui seraient en litige ou en procès viendraient me trouver et je leur ferais justice !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand quelqu’un s’approchait pour s’incliner devant lui, il lui tendait la main, le saisissait et l’embrassait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Absalom agissait ainsi envers tous ceux d’Israël qui se rendaient auprès du roi pour demander justice. De cette manière, il conquit insidieusement les suffrages des gens d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Au bout de quatre ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits de l’ancienne version grecque, la version syriaque et Flavius Josèphe ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quarante ans.
    marker-yv: yv-n
  - type: text
    text: ', Absalom dit au roi : Permets-moi d’aller à Hébron pour accomplir un vœu que j’ai fait à l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, pendant son séjour à Gueshour en Syrie, ton serviteur a fait ce vœu : Si l’Eternel me laisse retourner à Jérusalem, je lui offrirai un sacrifice'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque ajoute ici : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Hébron.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi lui dit : Va en paix !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Absalom partit donc et se rendit à Hébron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De là, il envoya des émissaires dans toutes les tribus d’Israël pour dire : Dès que vous entendrez une sonnerie de cor, vous pourrez dire : « Absalom est devenu roi à Hébron. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Deux cents hommes de Jérusalem, invités par Absalom, partirent de bonne foi avec lui, sans se douter de ses intentions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pendant qu’Absalom offrait les sacrifices, il envoya chercher Ahitophel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grand-père de Bath-Shéba (11.3 ; 23.34), conseiller royal (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.23'
        metadata:
          usfm: 2SA.16.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', le Guilonite, conseiller de David, dans la ville de Guilo'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A 10 kilomètres au nord-ouest d’Hébron (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.48-51
        metadata:
          usfm: JOS.15.48+JOS.15.49+JOS.15.50+JOS.15.51
      - type: text
        text: ) dans les montagnes du désert de Judée.
    marker-yv: yv-n
  - type: text
    text: . Ainsi la conjuration devint puissante et le parti d’Absalom fut de plus en plus nombreux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David s’enfuit de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On vint annoncer à David que les Israélites prenaient parti pour Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors David dit à tous ses ministres qui étaient avec lui à Jérusalem : Allons, fuyons au plus vite, sans quoi personne n’échappera à Absalom. Hâtez-vous de partir, sinon il nous prendra de vitesse et nous rattrapera ; il nous précipitera alors dans le malheur et massacrera toute la population de la ville.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les ministres lui dirent : Quelle que soit la décision que prenne notre seigneur le roi, nous sommes là à sa disposition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi partit à pied, suivi de tous ses proches. Il ne laissa que dix épouses de second rang pour garder le palais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il sortit accompagné de toute la population, et ils firent halte près de la dernière maison de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous ses fonctionnaires marchaient à ses côtés, ainsi que sa garde personnelle composée des Kérétiens et des Pélétiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.18'
        metadata:
          usfm: 2SA.8.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', tandis que les six cents Gathiens, qui l’avaient suivi depuis Gath'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une des capitales de la Philistie où David s’était réfugié (1 S 5.8 ; 27).
    marker-yv: yv-n
  - type: text
    text: ', précédaient le roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi demanda à Ittaï, le chef des Gathiens : Pourquoi veux-tu venir, toi aussi avec nous ? Rebrousse chemin et reste avec le nouveau roi ! Après tout, tu es un étranger ici et tu es en exil loin de ta patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu n’es à mon service que depuis peu de temps, alors pourquoi t’entraînerais-je aujourd’hui dans une aventure ? Moi-même je m’en vais sans savoir où. Retourne plutôt et emmène tes compagnons avec toi ! Que l’Eternel te témoigne sa grande bonté !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais Ittaï répondit au roi : Aussi vrai que l’Eternel est vivant et que mon seigneur le roi est vivant, ton serviteur restera avec mon seigneur le roi partout où il ira, soit pour mourir, soit pour vivre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David lui répondit : C’est bon ! Va donc et passe devant !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ittaï de Gath passa devant avec tous ses hommes et tous les membres de leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A mesure que la troupe passait, toute la population du pays se lamentait à grands cris. Le roi franchit la vallée du Cédron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vallée située entre Jérusalem et le mont des Oliviers. En hiver, le Cédron y forme un torrent important (1 R 2.37 ; 15.13 ; Jn 18.1).
    marker-yv: yv-n
  - type: text
    text: ' avec toute sa suite et s’avança sur la route qui mène au désert'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Entre Jérusalem et Jéricho.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: David laisse de fidèles serviteurs à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsadoq vint aussi avec tous les lévites qui portaient le coffre de l’alliance de Dieu. Ils déposèrent le coffre de Dieu à terre tandis qu’Abiatar offrait des sacrifices jusqu’à ce que toute la population eut fini de sortir de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais le roi dit à Tsadoq : Ramène le coffre de Dieu dans la ville. Si l’Eternel m’est favorable, il me fera revenir et me permettra de revoir le coffre ainsi que le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si, par contre, il déclare : « Je ne prends plus plaisir en toi », eh bien, qu’il me traite comme bon lui semblera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le roi dit encore au prêtre Tsadoq : N’es-tu pas un prophète ? Retourne tranquillement dans la ville et que ton fils Ahimaats et Jonathan, fils d’Abiatar, vos deux fils vous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire Tsadoq et Abiatar dont il a été question au v. 24 : voir v. 29.'
    marker-yv: yv-n
  - type: text
    text: ' accompagnent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Quant à moi, j’attendrai aux défilés du désert jusqu’à ce que je reçoive un message de votre part qui me donne des nouvelles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ainsi Tsadoq et Abiatar rapportèrent le coffre de Dieu à Jérusalem et ils y restèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Cependant David gravissait pieds nus et la tête voilée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signe de profonde tristesse ou de deuil (voir Est 6.12 ; Es 20.2, 4 ; Jr 14.3-4 ; Ez 24.17 ; Mi 1.8).
    marker-yv: yv-n
  - type: text
    text: ' la montée des Oliviers, il s’avançait en pleurant. Tous ceux qui l’accompagnaient s’étaient aussi voilé la tête et montaient en pleurant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On vint rapporter à David qu’Ahitophel s’était joint aux conspirateurs autour d’Absalom. David s’écria : O Eternel, rends les conseils d’Ahitophel inefficaces !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Lorsque David eut atteint le sommet de la colline où l’on adore Dieu, Houshaï l’Arkien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Groupe familial, non juif selon certains, habitant au sud-ouest de Béthel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 16.2
        metadata:
          usfm: JOS.16.2
      - type: text
        text: ). Sur le rôle de Houshaï, voir 16.16 ; 17.5-6, 14-16 ; 1 Ch 27.33.
    marker-yv: yv-n
  - type: text
    text: ', son conseiller personnel, vint à sa rencontre, son vêtement déchiré et la tête couverte de poussière.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'David lui dit : Si tu me suis, tu me seras à charge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais si, au contraire, tu retournes à la ville et si tu dis à Absalom : « Je suis ton serviteur, ô roi ! J’ai été jusqu’ici au service de ton père, mais maintenant c’est toi que je veux servir », tu pourras contrecarrer en ma faveur les conseils d’Ahitophel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'De plus, tu auras l’appui des prêtres Tsadoq et Abiatar. Tu leur rapporteras tout ce que tu apprendras au palais royal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Leurs deux fils, Ahimaats, fils de Tsadoq, et Jonathan, fils d’Abiatar, sont avec eux : vous me communiquerez par leur intermédiaire toutes les nouvelles que vous apprendrez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Houshaï, l’ami de David, retourna donc en ville au moment où Absalom faisait son entrée à Jérusalem.
