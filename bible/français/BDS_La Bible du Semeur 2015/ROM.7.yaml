document_id: ROM.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Libérés du régime de la Loi
  - type: text
    content: 'Ne savez-vous pas, frères et sœurs – car je parle à des gens qui savent ce qu’est une loi – que la loi ne régit un homme que durant le temps de sa vie ? '
  '10':
  - type: text
    content: 'et moi je suis mort. Ainsi, ce qui s’est produit pour moi, c’est que le commandement qui devait conduire à la vie m’a conduit à la mort. '
  '11':
  - type: text
    content: 'Car le péché a pris appui sur le commandement : il m’a trompé et m’a fait mourir en se servant du commandement. '
  '12':
  - type: text
    content: Ainsi, la Loi elle-même est sainte, et le commandement est saint, juste et bon.
  '13':
  - type: text
    content: Ce qui est bon est-il devenu pour moi une cause de mort ? Loin de là ! C’est le péché ! En effet, il a provoqué ma mort en se servant de ce qui est bon, et a de la sorte manifesté sa nature de péché et son excessive perversité par le moyen du commandement.
  '14':
  - type: text
    content: 'Nous savons que la Loi a été inspirée par l’Esprit de Dieu, mais moi, je suis comme un homme livré à lui-même, vendu comme esclave au péché. '
  '15':
  - type: text
    content: En effet, je ne comprends pas
  - type: note
    content: 'Autre traduction : je n’approuve pas.'
  - type: text
    content: ' ce que je fais : je ne fais pas ce que je veux, et c’est ce que je déteste que je fais. '
  '16':
  - type: text
    content: Et si je fais ce que je ne veux pas, je reconnais par là que la Loi est bonne.
  '17':
  - type: text
    content: 'En réalité, ce n’est plus moi qui le fais, mais c’est le péché qui habite en moi. '
  '18':
  - type: text
    content: Car je sais que le bien n’habite pas en moi, c’est-à-dire dans ce que je suis par nature
  - type: note
    content: 'Autre traduction : c’est-à-dire dans ce que je vis ou dans toute la réalité de mon être.'
  - type: text
    content: '. Vouloir le bien est à ma portée, mais non l’accomplir. '
  '19':
  - type: text
    content: 'Je ne fais pas le bien que je veux, mais le mal que je ne veux pas, je le commets. '
  '2':
  - type: text
    content: Ainsi, une femme mariée est liée par la loi à son mari tant que celui-ci est en vie. Mais s’il vient à mourir, elle est libérée de la loi qui la liait à lui
  - type: note
    content: 'Il s’agit de la loi romaine. Autre traduction : la Loi, c’est-à-dire la Loi de Moïse.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: Si donc je fais ce que je ne veux pas, ce n’est plus moi qui le fais mais c’est le péché qui habite en moi.
  '21':
  - type: text
    content: 'Je découvre ainsi cette loi : lorsque je veux faire le bien, c’est le mal qui est à ma portée. '
  '22':
  - type: text
    content: 'Dans mon être intérieur, je prends plaisir à la Loi de Dieu. '
  '23':
  - type: text
    content: 'Mais je vois bien qu’une autre loi est à l’œuvre dans mon corps : elle combat la Loi qu’approuve ma raison et elle fait de moi le prisonnier de la loi du péché qui agit dans mes membres'
  - type: note
    content: 'D’autres comprennent : qui se trouve dans tout mon être.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: Malheureux que je suis ! Qui me délivrera de ce corps voué à la mort
  - type: note
    content: 'D’autres comprennent : de cette mort qu’est ma vie ?'
  - type: text
    content: '  ? '
  '25':
  - type: text
    content: 'Dieu soit loué : c’est par Jésus-Christ notre Seigneur'
  - type: note
    content: 'Voir 1 Co 15.56-57. Autre traduction : Dieu soit loué par Jésus-Christ notre Seigneur.'
  - type: text
    content: '. En résumé : moi-même, je suis'
  - type: note
    content: 'Autre traduction : je suis en même temps.'
  - type: text
    content: ', par la raison, au service de la Loi de Dieu, mais je suis, dans ce que je vis concrètement'
  - type: note
    content: 'Autres traductions : et par mon corps (en tant qu’instrument du péché), voir v. 23 ; ou : mais je suis, dans ce que je fais ; ou : mais par nature.'
  - type: text
    content: ', esclave de la loi du péché.'
  '3':
  - type: text
    content: Donc si, du vivant de son mari, elle devient la femme d’un autre homme, elle sera considérée comme adultère. Mais si son mari meurt, elle est affranchie de cette loi et peut donc appartenir à un autre, sans être adultère.
  '4':
  - type: text
    content: 'Il en est de même pour vous, mes frères et sœurs : par la mort de Christ, vous êtes, vous aussi, morts par rapport à la Loi, pour appartenir à un autre, à celui qui est ressuscité, pour que nous portions des fruits pour Dieu.'
  '5':
  - type: text
    content: 'Lorsque nous étions encore livrés à nous-mêmes, les mauvais désirs suscités par la Loi étaient à l’œuvre dans nos membres pour nous faire porter des fruits qui mènent à la mort. '
  '6':
  - type: text
    content: Mais maintenant, libérés du régime de la Loi, morts à ce qui nous gardait prisonniers, nous pouvons servir Dieu d’une manière nouvelle par l’Esprit, et non plus sous le régime périmé de la lettre de la Loi.
  '7':
  - type: text
    content: 'Que dire maintenant ? La Loi se confond-elle avec le péché ? Loin de là ! Seulement, s’il n’y avait pas eu la Loi, je n’aurais pas connu le péché, et je n’aurais pas su ce qu’est la convoitise si la Loi n’avait pas dit : '
  - type: text
    content: Tu ne convoiteras pas
  - type: note
    content: Ex 20.17 ; Dt 5.21.
  - type: text
    content: .
  - type: text
    content: ' '
  '8':
  - type: text
    content: Mais alors le péché, prenant appui sur le commandement, a suscité en moi toutes sortes de désirs mauvais. Car, sans la Loi, le péché est sans vie.
  '9':
  - type: text
    content: 'Pour ma part, autrefois sans la Loi, je vivais, mais quand le commandement est intervenu, le péché a pris vie, '
