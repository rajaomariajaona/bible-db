document_id: ROM.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Libérés du régime de la Loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne savez-vous pas, frères et sœurs – car je parle à des gens qui savent ce qu’est une loi – que la loi ne régit un homme que durant le temps de sa vie ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et moi je suis mort. Ainsi, ce qui s’est produit pour moi, c’est que le commandement qui devait conduire à la vie m’a conduit à la mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le péché a pris appui sur le commandement : il m’a trompé et m’a fait mourir en se servant du commandement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, la Loi elle-même est sainte, et le commandement est saint, juste et bon.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qui est bon est-il devenu pour moi une cause de mort ? Loin de là ! C’est le péché ! En effet, il a provoqué ma mort en se servant de ce qui est bon, et a de la sorte manifesté sa nature de péché et son excessive perversité par le moyen du commandement.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons que la Loi a été inspirée par l’Esprit de Dieu, mais moi, je suis comme un homme livré à lui-même, vendu comme esclave au péché. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, je ne comprends pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n’approuve pas.
      marker-yv: yv-n
    - type: text
      text: ' ce que je fais : je ne fais pas ce que je veux, et c’est ce que je déteste que je fais. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si je fais ce que je ne veux pas, je reconnais par là que la Loi est bonne.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En réalité, ce n’est plus moi qui le fais, mais c’est le péché qui habite en moi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car je sais que le bien n’habite pas en moi, c’est-à-dire dans ce que je suis par nature
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c’est-à-dire dans ce que je vis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans toute la réalité de mon être.
      marker-yv: yv-n
    - type: text
      text: '. Vouloir le bien est à ma portée, mais non l’accomplir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne fais pas le bien que je veux, mais le mal que je ne veux pas, je le commets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, une femme mariée est liée par la loi à son mari tant que celui-ci est en vie. Mais s’il vient à mourir, elle est libérée de la loi qui la liait à lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de la loi romaine. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la Loi, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire la Loi de Moïse.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si donc je fais ce que je ne veux pas, ce n’est plus moi qui le fais mais c’est le péché qui habite en moi.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je découvre ainsi cette loi : lorsque je veux faire le bien, c’est le mal qui est à ma portée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans mon être intérieur, je prends plaisir à la Loi de Dieu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je vois bien qu’une autre loi est à l’œuvre dans mon corps : elle combat la Loi qu’approuve ma raison et elle fait de moi le prisonnier de la loi du péché qui agit dans mes membres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui se trouve dans tout mon être.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Malheureux que je suis ! Qui me délivrera de ce corps voué à la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de cette mort qu’est ma vie ?
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu soit loué : c’est par Jésus-Christ notre Seigneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 15.56-57
        - type: text
          text: '. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu soit loué par Jésus-Christ notre Seigneur.
      marker-yv: yv-n
    - type: text
      text: '. En résumé : moi-même, je suis'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je suis en même temps.
      marker-yv: yv-n
    - type: text
      text: ', par la raison, au service de la Loi de Dieu, mais je suis, dans ce que je vis concrètement'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et par mon corps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(en tant qu’instrument du péché), voir v. 23 ; ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais je suis, dans ce que je fais ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais par nature.
      marker-yv: yv-n
    - type: text
      text: ', esclave de la loi du péché.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc si, du vivant de son mari, elle devient la femme d’un autre homme, elle sera considérée comme adultère. Mais si son mari meurt, elle est affranchie de cette loi et peut donc appartenir à un autre, sans être adultère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en est de même pour vous, mes frères et sœurs : par la mort de Christ, vous êtes, vous aussi, morts par rapport à la Loi, pour appartenir à un autre, à celui qui est ressuscité, pour que nous portions des fruits pour Dieu.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque nous étions encore livrés à nous-mêmes, les mauvais désirs suscités par la Loi étaient à l’œuvre dans nos membres pour nous faire porter des fruits qui mènent à la mort. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais maintenant, libérés du régime de la Loi, morts à ce qui nous gardait prisonniers, nous pouvons servir Dieu d’une manière nouvelle par l’Esprit, et non plus sous le régime périmé de la lettre de la Loi.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dire maintenant ? La Loi se confond-elle avec le péché ? Loin de là ! Seulement, s’il n’y avait pas eu la Loi, je n’aurais pas connu le péché, et je n’aurais pas su ce qu’est la convoitise si la Loi n’avait pas dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne convoiteras pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.17 ; Dt 5.21.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais alors le péché, prenant appui sur le commandement, a suscité en moi toutes sortes de désirs mauvais. Car, sans la Loi, le péché est sans vie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ma part, autrefois sans la Loi, je vivais, mais quand le commandement est intervenu, le péché a pris vie, '
