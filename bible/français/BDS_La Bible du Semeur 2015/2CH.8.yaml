document_id: 2CH.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les autres travaux de construction
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 9.10-28)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon mit vingt ans pour construire le temple de l’Eternel et son propre palais. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Deux cent cinquante fonctionnaires principaux du roi Salomon dirigeaient les ouvriers.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon fit déménager la fille du pharaon de la Cité de David dans le palais qu’il lui avait fait construire, car il dit : Ma femme n’habitera pas dans le palais de David, roi d’Israël, parce que le lieu où le coffre de l’Eternel a été apporté est saint.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’organisation du culte
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès lors, Salomon offrait des holocaustes à l’Eternel sur l’autel de l’Eternel qu’il avait fait construire en face du portique du sanctuaire. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il le faisait chaque jour conformément aux ordres donnés par Moïse pour les sabbats, les nouvelles lunes et les trois fêtes annuelles, c’est-à-dire pour la fête des Pains sans levain, la fête des Semaines et la fête des Cabanes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 28
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '29'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Conformément aux règles établies par son père David, il installa dans leurs fonctions les diverses classes de prêtres et mit en poste les lévites pour louer l’Eternel ou accomplir leur service aux côtés des prêtres selon le rituel de chaque jour. Enfin, il assigna aux diverses classes de portiers leurs portes respectives selon la réglementation de David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', l’homme de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur aucun point, on ne s’écarta des dispositions que David avait prises au sujet des prêtres et des lévites, en ce qui concernait les trésors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi furent menées à bonne fin toutes les entreprises de Salomon, depuis le jour de la pose des fondations du temple de l’Eternel jusqu’à son achèvement. Ainsi le temple de l’Eternel fut pleinement achevé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’importation d’or
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Salomon partit pour Etsyôn-Guéber et pour Eilath sur les bords de la mer, dans le pays d’Edom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Hiram lui envoya, par l’intermédiaire de ses serviteurs, des bateaux conduits par des marins phéniciens expérimentés. Ils se rendirent avec les serviteurs de Salomon à Ophir, d’où ils rapportèrent plus de quinze tonnes d’or qu’ils remirent au roi Salomon.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il reconstruisit les villes que le roi Hiram de Tyr lui avait données et il y installa des Israélites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il marcha sur Hamath de Tsoba et s’en empara. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il reconstruisit Tadmor, dans le désert et toutes les villes qu’il avait bâties dans le pays de Hamath pour y entreposer ses provisions. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il construisit également Beth-Horôn-la-Haute et Beth-Horôn-la-Basse, des villes fortifiées entourées de remparts et fermées par des portes à verrous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux villes à 20 kilomètres au nord-ouest de Jérusalem, d’importance stratégique exceptionnelle puisqu’elles commandaient l’accès au col menant à la capitale.
      marker-yv: yv-n
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi que Baalath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A 50 kilomètres à l’ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' et toutes les villes qui lui servaient d’entrepôts, et toutes celles où il tenait en réserve ses chars de guerre et ses équipages de char. Il construisit tout ce qu’il eut envie de construire à Jérusalem, au Liban et dans tout le pays soumis à son autorité. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait toute une population qui ne faisait pas partie d’Israël, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Yebousiens, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dont les descendants étaient restés dans le pays et que les Israélites n’avaient pas anéantis. Salomon les astreignit à la corvée et ils le sont restés jusqu’à ce jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Salomon n’employa aucun des Israélites comme esclave pour ses grands travaux ; il les enrôla dans l’armée comme soldats, chefs de ses écuyers, chefs de ses chars et de ses soldats sur char. '
