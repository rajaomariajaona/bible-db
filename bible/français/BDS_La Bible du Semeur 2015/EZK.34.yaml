document_id: EZK.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La résurrection d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils d’homme, prophétise au sujet des bergers d’Israël, prophétise et dis à ces bergers : « Voici ce que déclare le Seigneur, l’Eternel : Malheur aux bergers d’Israël qui ne s’occupent que d’eux-mêmes. N’est-ce pas le troupeau que les bergers doivent faire paître ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous vous êtes nourris de sa graisse et habillés de sa laine, vous avez abattu les bêtes grasses, mais vous ne faites pas paître le troupeau. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous n’avez pas aidé les brebis chétives à retrouver des forces. Vous n’avez pas soigné celle qui était malade, vous n’avez pas bandé celle qui était blessée, vous n’avez pas ramené celle qui s’était égarée, vous n’avez pas cherché celle qui était perdue ; non, vous leur avez imposé votre autorité par la violence et la tyrannie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mes brebis se sont dispersées, faute de berger, et elles sont devenues la proie de toutes les bêtes sauvages. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes brebis se sont égarées sur toutes les montagnes et sur toutes les collines élevées. Elles ont été dispersées sur toute l’étendue du pays, sans que personne en prenne soin ou aille à leur recherche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi, bergers, écoutez la parole de l’Eternel : '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, parce que mes brebis ont été abandonnées au pillage, qu’elles sont devenues la proie de toutes les bêtes sauvages, faute de berger, et parce que mes bergers n’ont pas pris soin d’elles, mais qu’ils se sont occupés d’eux-mêmes au lieu de faire paître le troupeau, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à cause de cela, bergers, écoutez la parole de l’Eternel :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que le Seigneur, l’Eternel, déclare : Je vais m’en prendre à ces bergers, je leur redemanderai mes brebis, et je leur enlèverai la responsabilité du troupeau. Ainsi, ils cesseront de se repaître eux-mêmes. Je délivrerai mon troupeau de leur bouche, et les brebis ne leur serviront plus de nourriture.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu fera paître ses brebis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Je vais moi-même venir m’occuper de mon troupeau et en prendre soin. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme un berger va à la recherche de son troupeau le jour où il le trouve dispersé, ainsi j’irai à la recherche de mes brebis et je les arracherai de tous les lieux où elles ont été dispersées en un jour de brouillard et de ténèbres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je les ferai sortir de chez les peuples et je les rassemblerai des divers pays, je les ramènerai dans leur propre pays pour les faire paître sur les montagnes d’Israël, près des cours d’eau et dans tous les lieux habités du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je les ferai paître dans de bons pâturages, et elles auront leur lieu de séjour sur les hautes montagnes d’Israël ; elles reposeront dans une belle prairie et elles se nourriront dans de gras pâturages sur les montagnes d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est moi qui ferai paître mon troupeau et c’est moi qui le ferai reposer, le Seigneur, l’Eternel, le déclare. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je chercherai la brebis qui sera perdue, je ramènerai celle qui se sera égarée, je panserai celle qui est blessée, et je fortifierai celle qui est malade. Mais je détruirai celle qui est grasse et forte : je les ferai paître avec équité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et vous, mon troupeau, voici ce que le Seigneur, l’Eternel, déclare : Je prononcerai mon jugement entre brebis et brebis, et entre béliers et boucs. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ne vous suffisait-il pas de paître dans un bon pâturage ? Fallait-il encore que vous fouliez sous vos pattes ce qui restait à brouter ? Ne pouviez-vous pas vous contenter de boire une eau limpide ? Fallait-il troubler de vos pattes ce qui en restait ? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mon troupeau en est réduit à brouter l’herbe que vous avez piétinée et à boire l’eau que vous avez troublée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est pourquoi, voici ce que le Seigneur, l’Eternel, vous déclare : je vais moi-même prononcer mon jugement entre brebis grasses et brebis maigres. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous avez bousculé du flanc et de l’épaule toutes les brebis faibles ! Vous les avez frappées de vos cornes jusqu’à ce que vous les ayez dispersées au dehors ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est pourquoi je viendrai au secours de mon troupeau et il ne sera plus livré au pillage, je prononcerai mon jugement entre brebis et brebis.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le royaume de paix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'J’établirai à leur tête un seul berger qui les fera paître : mon serviteur David ; il prendra soin d’elles et sera leur berger'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 23.3-6 ; 33.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et moi, l’Eternel, je serai leur Dieu, et mon serviteur David sera prince au milieu d’elles. Moi, l’Eternel, j’ai parlé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je conclurai avec elles une alliance qui leur garantira la paix. Je débarrasserai le pays des bêtes féroces, de sorte que mes brebis pourront habiter en toute sécurité dans les steppes et dormir dans les forêts. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je les comblerai de bénédictions dans les environs de ma colline. Je ferai tomber la pluie en son temps, ce seront des pluies qui vous apporteront la bénédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les arbres dans les champs donneront leurs fruits et la terre produira ses récoltes ; les brebis vivront en toute sécurité dans leur propre pays, et elles reconnaîtront que je suis l’Eternel, quand j’aurai brisé les barres de leur joug et que je les aurai délivrées de ceux qui les asservissent. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elles ne seront plus pillées par les autres peuples, et les bêtes sauvages ne les dévoreront plus, elles vivront en toute sécurité sans être inquiétées par personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je leur susciterai une plantation renommée. Personne ne succombera plus à la faim dans leur pays et les membres de mon peuple n’auront plus à subir les insultes des autres peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et ils reconnaîtront que moi, l’Eternel, leur Dieu, je suis avec eux et qu’eux, les gens de la communauté d’Israël, ils sont mon peuple ; le Seigneur, l’Eternel, le déclare. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Vous, mes brebis, vous qui faites partie du troupeau de mon pâturage, vous êtes des humains et moi, je suis votre Dieu, le Seigneur, l’Eternel, le déclare. »
