document_id: PRO.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Un fils sage tient compte de
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’éducation qu’il a reçue de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le moqueur n’accepte jamais les reproches.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toutes les querelles proviennent de l’orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la sagesse accompagne ceux qui acceptent les conseils.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Une richesse acquise par des moyens douteux se dissipe ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: amassée peu à peu, elle se multiplie.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Un espoir différé rend le cœur malade ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un désir exaucé est comme un arbre de vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.18'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Qui méprise la parole le paiera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui respecte le précepte en sera récompensé.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’enseignement du sage est une source de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait éviter les pièges de la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.18'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Une raison saine procure la faveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le chemin des traîtres est rude
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: interminable.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tout homme avisé agit en connaissance de cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’insensé fait étalage de sa sottise.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Un messager infidèle tombera dans le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais un envoyé fidèle apporte la guérison.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Qui ne veut pas se laisser corriger tombera dans la misère et la honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui accepte d’être repris sera honoré.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il est agréable de voir ses désirs réalisés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les insensés ont horreur de se détourner du mal.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Grâce à ses paroles, on peut se nourrir de bonnes choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les traîtres n’ont d’appétit que pour la violence.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Qui fréquente les sages deviendra sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui fraie avec les insensés va au-devant du malheur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le malheur poursuit les pécheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le bonheur récompense les justes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.27'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ce que l’homme de bien laisse derrière lui passe aux enfants de ses enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la fortune du pécheur est mise en réserve pour le juste.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le champ défriché du pauvre lui procure des vivres en abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’injustice les détruit.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Qui refuse de châtier son fils ne l’aime pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui l’aime le corrigera de bonne heure.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le juste mange et il est rassasié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les méchants sont affamés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qui veille sur ses paroles préserve sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui ouvre grand la bouche court à sa ruine.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le paresseux éprouve des désirs mais n’arrive à rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que les aspirations des gens actifs seront comblées.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le juste déteste les mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le méchant répand la honte et la confusion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Agir avec droiture est une protection pour l’homme intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la méchanceté a même un effet subversif sur le péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la méchanceté pervertit le sacrifice pour le péché.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tel joue au riche et n’a rien du tout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel autre fait le pauvre et possède de grands biens.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La fortune du riche sert de rançon pour sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le pauvre n’entend pas de menaces.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les justes rayonnent comme une lumière source de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lampe des méchants est sur le point de s’éteindre.
