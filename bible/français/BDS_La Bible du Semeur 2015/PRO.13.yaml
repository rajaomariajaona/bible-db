document_id: PRO.13,21
type_code: fra
verses:
  '1':
  - type: text
    content: Un fils sage tient compte de
  - type: text
    content: l’éducation qu’il a reçue de son père,
  - type: text
    content: mais le moqueur n’accepte jamais les reproches.
  '10':
  - type: text
    content: Toutes les querelles proviennent de l’orgueil,
  - type: text
    content: mais la sagesse accompagne ceux qui acceptent les conseils.
  '11':
  - type: text
    content: Une richesse acquise par des moyens douteux se dissipe ;
  - type: text
    content: amassée peu à peu, elle se multiplie.
  '12':
  - type: text
    content: Un espoir différé rend le cœur malade ;
  - type: text
    content: un désir exaucé est comme un arbre de vie
  - type: note
    content: Voir 3.18 et note.
  - type: text
    content: .
  '13':
  - type: text
    content: Qui méprise la parole le paiera,
  - type: text
    content: mais qui respecte le précepte en sera récompensé.
  '14':
  - type: text
    content: L’enseignement du sage est une source de vie,
  - type: text
    content: il fait éviter les pièges de la mort
  - type: note
    content: Voir 3.18.
  - type: text
    content: .
  '15':
  - type: text
    content: Une raison saine procure la faveur,
  - type: text
    content: mais le chemin des traîtres est rude
  - type: note
    content: 'Autre traduction : interminable.'
  - type: text
    content: .
  '16':
  - type: text
    content: Tout homme avisé agit en connaissance de cause,
  - type: text
    content: mais l’insensé fait étalage de sa sottise.
  '17':
  - type: text
    content: Un messager infidèle tombera dans le malheur,
  - type: text
    content: mais un envoyé fidèle apporte la guérison.
  '18':
  - type: text
    content: Qui ne veut pas se laisser corriger tombera dans la misère et la honte,
  - type: text
    content: mais celui qui accepte d’être repris sera honoré.
  '19':
  - type: text
    content: Il est agréable de voir ses désirs réalisés,
  - type: text
    content: mais les insensés ont horreur de se détourner du mal.
  '2':
  - type: text
    content: Grâce à ses paroles, on peut se nourrir de bonnes choses,
  - type: text
    content: mais les traîtres n’ont d’appétit que pour la violence.
  '20':
  - type: text
    content: Qui fréquente les sages deviendra sage,
  - type: text
    content: mais qui fraie avec les insensés va au-devant du malheur.
  '21':
  - type: text
    content: Le malheur poursuit les pécheurs,
  - type: text
    content: mais le bonheur récompense les justes
  - type: note
    content: Voir 10.27.
  - type: text
    content: .
  '22':
  - type: text
    content: Ce que l’homme de bien laisse derrière lui passe aux enfants de ses enfants,
  - type: text
    content: mais la fortune du pécheur est mise en réserve pour le juste.
  '23':
  - type: text
    content: Le champ défriché du pauvre lui procure des vivres en abondance,
  - type: text
    content: mais l’injustice les détruit.
  '24':
  - type: text
    content: Qui refuse de châtier son fils ne l’aime pas ;
  - type: text
    content: qui l’aime le corrigera de bonne heure.
  '25':
  - type: text
    content: Le juste mange et il est rassasié,
  - type: text
    content: mais les méchants sont affamés.
  '3':
  - type: text
    content: Qui veille sur ses paroles préserve sa vie,
  - type: text
    content: mais celui qui ouvre grand la bouche court à sa ruine.
  '4':
  - type: text
    content: Le paresseux éprouve des désirs mais n’arrive à rien,
  - type: text
    content: alors que les aspirations des gens actifs seront comblées.
  '5':
  - type: text
    content: Le juste déteste les mensonges,
  - type: text
    content: mais le méchant répand la honte et la confusion.
  '6':
  - type: text
    content: Agir avec droiture est une protection pour l’homme intègre,
  - type: text
    content: mais la méchanceté a même un effet subversif sur le péché
  - type: note
    content: 'Autre traduction : la méchanceté pervertit le sacrifice pour le péché.'
  - type: text
    content: .
  '7':
  - type: text
    content: Tel joue au riche et n’a rien du tout,
  - type: text
    content: tel autre fait le pauvre et possède de grands biens.
  '8':
  - type: text
    content: La fortune du riche sert de rançon pour sa vie,
  - type: text
    content: mais le pauvre n’entend pas de menaces.
  '9':
  - type: text
    content: Les justes rayonnent comme une lumière source de joie,
  - type: text
    content: la lampe des méchants est sur le point de s’éteindre.
