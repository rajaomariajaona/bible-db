document_id: HEB.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Courir avec endurance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est pourquoi, nous aussi qui sommes entourés d’une si grande nuée de témoins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de tous ceux qui ont témoigné de leur foi.
    marker-yv: yv-n
  - type: text
    text: ', débarrassons-nous de tout fardeau, et du péché qui nous cerne si facilement de tous côtés, et courons avec endurance l’épreuve qui nous est proposée. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Gardons les yeux fixés sur Jésus, qui nous a ouvert le chemin de la foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.10'
        metadata:
          usfm: HEB.2.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et qui la porte à la perfection. Parce qu’il avait en vue la joie qui lui était réservée'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en renonçant à la joie qui lui revenait.
    marker-yv: yv-n
  - type: text
    text: ', il a enduré la mort sur la croix, en méprisant la honte attachée à un tel supplice, et désormais il siège à la droite du trône de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pensez à celui qui a enduré de la part des hommes pécheurs une telle opposition contre lui, pour que vous ne vous laissiez pas abattre par le découragement. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous n’avez pas encore résisté jusqu’à la mort dans votre lutte contre le péché, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et vous avez oublié cette parole d’encouragement que Dieu vous adresse comme à des fils :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mon fils, ne prends pas à la légère la correction du Seigneur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et ne te décourage pas lorsqu’il te reprend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Car le Seigneur corrige celui qu’il aime :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il châtie tous ceux qu’il reconnaît pour ses fils
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3.11-12
        metadata:
          usfm: PRO.3.11+PRO.3.12
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Supportez vos souffrances : elles servent à vous corriger. C’est en fils que Dieu vous traite. Quel est le fils que son père ne corrige pas ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si vous êtes dispensés de la correction qui est le lot de tous les fils, alors vous êtes des enfants illégitimes, et non des fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'D’ailleurs, nous avions notre père terrestre pour nous corriger, et nous le respections. N’allons-nous pas, à plus forte raison, nous soumettre à notre Père céleste pour avoir la vie ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notre père nous corrigeait pour un temps limité, selon ses idées, mais Dieu, c’est pour notre bien qu’il nous corrige, afin de nous faire participer à sa sainteté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Certes, sur le moment, une correction ne semble pas être un sujet de joie mais plutôt une cause de tristesse. Mais par la suite, elle a pour fruit, chez ceux qui ont ainsi été formés, une vie juste, vécue dans la paix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Relevez vos mains qui faiblissent et raffermissez vos genoux qui fléchissent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 35.3
        metadata:
          usfm: ISA.35.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Faites-vous des pistes droites pour votre course
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 4.26
        metadata:
          usfm: PRO.4.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', afin que le pied qui boite ne se démette pas complètement, mais qu’il guérisse plutôt.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Recommandations diverses
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vivre une vie sainte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Faites tous vos efforts pour être en paix avec tout le monde et cultivez la sainteté sans laquelle nul ne verra le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Veillez à ce que personne ne passe à côté de la grâce de Dieu, qu’aucune racine d’amertume ne pousse et ne cause du trouble en empoisonnant plusieurs d’entre vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 29.17
        metadata:
          usfm: DEU.29.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Qu’il n’y ait personne qui vive dans l’immoralité ou qui méprise les choses saintes, comme Esaü qui, pour un simple repas, a vendu son droit d’aînesse. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Vous savez que plus tard, lorsqu’il a voulu recevoir en héritage la bénédiction de son père, il a été rejeté, car il n’a trouvé aucun moyen de revenir en arrière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 27.30-40
        metadata:
          usfm: GEN.27.30+GEN.27.31+GEN.27.32+GEN.27.33+GEN.27.34+GEN.27.35+GEN.27.36+GEN.27.37+GEN.27.38+GEN.27.39+GEN.27.40
      - type: text
        text: '. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’amener son père à revenir sur ce qu’il avait fait.
    marker-yv: yv-n
  - type: text
    text: ', bien qu’il l’ait cherché en pleurant.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le royaume inébranlable
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car vous ne vous êtes pas approchés, comme les Israélites au désert, d’une réalité que l’on pourrait toucher : un feu ardent, l’obscurité, des ténèbres et un ouragan. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous n’avez pas entendu de sonneries de trompettes, ni l’éclat d’une voix telle que ceux qui l’ont entendue ont demandé qu’elle ne s’adresse plus à eux. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, ils ne pouvaient supporter l’ordre qui leur avait été donné : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Quiconque touchera la montagne – même si c’est un animal – sera tué à coups de pierres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19.12-13
        metadata:
          usfm: EXO.19.12+EXO.19.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le spectacle était si terrifiant que Moïse s’est écrié : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je suis épouvanté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.21 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 9.19
        metadata:
          usfm: DEU.9.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et tout tremblant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Non, vous, au contraire, vous vous êtes approchés de la montagne de Sion, de la cité du Dieu vivant, de la Jérusalem céleste et de milliers d’anges en fête. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous vous êtes approchés de l’assemblée des premiers-nés de Dieu dont les noms sont inscrits dans les cieux. Vous vous êtes approchés de Dieu, le Juge de tous les hommes, et des esprits des justes qui sont parvenus à la perfection. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vous vous êtes approchés de Jésus, le médiateur d’une alliance nouvelle, et de son sang répandu qui parle mieux encore que celui d’Abel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abel est mort, victime de la méchanceté de son frère. Son sang criait vengeance (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 4.10
        metadata:
          usfm: GEN.4.10
      - type: text
        text: ). Jésus aussi est mort par suite de la méchanceté de ses « frères », mais son sang couvre les péchés de ceux qui croient en lui.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Prenez donc garde : ne refusez pas d’écouter celui qui vous parle. Les Israélites qui ont refusé d’écouter celui qui les avertissait sur la terre, n’ont pas échappé au châtiment. A combien plus forte raison en sera-t-il de même pour nous, si nous nous détournons de celui qui nous parle du haut des cieux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Celui dont la voix a fait alors trembler la terre fait maintenant cette promesse : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Une fois encore j’ébranlerai, non seulement la terre, mais aussi le ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.26 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ag 2.6
        metadata:
          usfm: HAG.2.6
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces mots : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: une fois encore
  - type: text
    text: ' signifient que tout ce qui peut être '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ébranlé
  - type: text
    text: ', c’est-à-dire ce qui appartient à l’ordre ancien de la création, disparaîtra, pour que subsistent seules les réalités inébranlables. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le royaume que nous recevons est inébranlable : soyons donc reconnaissants et servons Dieu d’une manière qui lui soit agréable, avec crainte et profond respect, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'car notre Dieu est un '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: feu qui consume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.29 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 4.24
        metadata:
          usfm: DEU.4.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
