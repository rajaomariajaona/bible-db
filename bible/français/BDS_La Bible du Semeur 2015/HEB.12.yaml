document_id: HEB.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Courir avec endurance
  - type: text
    content: C’est pourquoi, nous aussi qui sommes entourés d’une si grande nuée de témoins
  - type: note
    content: Il s’agit de tous ceux qui ont témoigné de leur foi.
  - type: text
    content: ', débarrassons-nous de tout fardeau, et du péché qui nous cerne si facilement de tous côtés, et courons avec endurance l’épreuve qui nous est proposée. '
  '10':
  - type: text
    content: Notre père nous corrigeait pour un temps limité, selon ses idées, mais Dieu, c’est pour notre bien qu’il nous corrige, afin de nous faire participer à sa sainteté.
  '11':
  - type: text
    content: Certes, sur le moment, une correction ne semble pas être un sujet de joie mais plutôt une cause de tristesse. Mais par la suite, elle a pour fruit, chez ceux qui ont ainsi été formés, une vie juste, vécue dans la paix.
  '12':
  - type: text
    content: 'C’est pourquoi : '
  - type: text
    content: Relevez vos mains qui faiblissent et raffermissez vos genoux qui fléchissent
  - type: note
    content: Es 35.3.
  - type: text
    content: .
  - type: text
    content: ' '
  '13':
  - type: text
    content: Faites-vous des pistes droites pour votre course
  - type: note
    content: Pr 4.26.
  - type: text
    content: ', afin que le pied qui boite ne se démette pas complètement, mais qu’il guérisse plutôt.'
  - type: heading
    content: Recommandations diverses
  - type: heading
    content: Vivre une vie sainte
  '14':
  - type: text
    content: 'Faites tous vos efforts pour être en paix avec tout le monde et cultivez la sainteté sans laquelle nul ne verra le Seigneur. '
  '15':
  - type: text
    content: Veillez à ce que personne ne passe à côté de la grâce de Dieu, qu’aucune racine d’amertume ne pousse et ne cause du trouble en empoisonnant plusieurs d’entre vous
  - type: note
    content: Voir Dt 29.17.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Qu’il n’y ait personne qui vive dans l’immoralité ou qui méprise les choses saintes, comme Esaü qui, pour un simple repas, a vendu son droit d’aînesse. '
  '17':
  - type: text
    content: Vous savez que plus tard, lorsqu’il a voulu recevoir en héritage la bénédiction de son père, il a été rejeté, car il n’a trouvé aucun moyen de revenir en arrière
  - type: note
    content: 'Voir Gn 27.30-40. Autre traduction : d’amener son père à revenir sur ce qu’il avait fait.'
  - type: text
    content: ', bien qu’il l’ait cherché en pleurant.'
  - type: heading
    content: Le royaume inébranlable
  '18':
  - type: text
    content: 'Car vous ne vous êtes pas approchés, comme les Israélites au désert, d’une réalité que l’on pourrait toucher : un feu ardent, l’obscurité, des ténèbres et un ouragan. '
  '19':
  - type: text
    content: 'Vous n’avez pas entendu de sonneries de trompettes, ni l’éclat d’une voix telle que ceux qui l’ont entendue ont demandé qu’elle ne s’adresse plus à eux. '
  '2':
  - type: text
    content: Gardons les yeux fixés sur Jésus, qui nous a ouvert le chemin de la foi
  - type: note
    content: Voir 2.10.
  - type: text
    content: ' et qui la porte à la perfection. Parce qu’il avait en vue la joie qui lui était réservée'
  - type: note
    content: 'Autre traduction : en renonçant à la joie qui lui revenait.'
  - type: text
    content: ', il a enduré la mort sur la croix, en méprisant la honte attachée à un tel supplice, et désormais il siège à la droite du trône de Dieu.'
  '20':
  - type: text
    content: 'En effet, ils ne pouvaient supporter l’ordre qui leur avait été donné : '
  - type: text
    content: Quiconque touchera la montagne – même si c’est un animal – sera tué à coups de pierres
  - type: note
    content: Ex 19.12-13.
  - type: text
    content: .
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Le spectacle était si terrifiant que Moïse s’est écrié : '
  - type: text
    content: Je suis épouvanté
  - type: note
    content: Dt 9.19.
  - type: text
    content: ' et tout tremblant.'
  '22':
  - type: text
    content: 'Non, vous, au contraire, vous vous êtes approchés de la montagne de Sion, de la cité du Dieu vivant, de la Jérusalem céleste et de milliers d’anges en fête. '
  '23':
  - type: text
    content: 'Vous vous êtes approchés de l’assemblée des premiers-nés de Dieu dont les noms sont inscrits dans les cieux. Vous vous êtes approchés de Dieu, le Juge de tous les hommes, et des esprits des justes qui sont parvenus à la perfection. '
  '24':
  - type: text
    content: Vous vous êtes approchés de Jésus, le médiateur d’une alliance nouvelle, et de son sang répandu qui parle mieux encore que celui d’Abel
  - type: note
    content: Abel est mort, victime de la méchanceté de son frère. Son sang criait vengeance (Gn 4.10). Jésus aussi est mort par suite de la méchanceté de ses « frères », mais son sang couvre les péchés de ceux qui croient en lui.
  - type: text
    content: .
  '25':
  - type: text
    content: 'Prenez donc garde : ne refusez pas d’écouter celui qui vous parle. Les Israélites qui ont refusé d’écouter celui qui les avertissait sur la terre, n’ont pas échappé au châtiment. A combien plus forte raison en sera-t-il de même pour nous, si nous nous détournons de celui qui nous parle du haut des cieux.'
  '26':
  - type: text
    content: 'Celui dont la voix a fait alors trembler la terre fait maintenant cette promesse : '
  - type: text
    content: Une fois encore j’ébranlerai, non seulement la terre, mais aussi le ciel
  - type: note
    content: Ag 2.6 cité selon l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Ces mots : '
  - type: text
    content: une fois encore
  - type: text
    content: ' signifient que tout ce qui peut être '
  - type: text
    content: ébranlé
  - type: text
    content: ', c’est-à-dire ce qui appartient à l’ordre ancien de la création, disparaîtra, pour que subsistent seules les réalités inébranlables. '
  '28':
  - type: text
    content: 'Le royaume que nous recevons est inébranlable : soyons donc reconnaissants et servons Dieu d’une manière qui lui soit agréable, avec crainte et profond respect, '
  '29':
  - type: text
    content: 'car notre Dieu est un '
  - type: text
    content: feu qui consume
  - type: note
    content: Dt 4.24.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Pensez à celui qui a enduré de la part des hommes pécheurs une telle opposition contre lui, pour que vous ne vous laissiez pas abattre par le découragement. '
  '4':
  - type: text
    content: 'Vous n’avez pas encore résisté jusqu’à la mort dans votre lutte contre le péché, '
  '5':
  - type: text
    content: 'et vous avez oublié cette parole d’encouragement que Dieu vous adresse comme à des fils :'
  - type: text
    content: Mon fils, ne prends pas à la légère la correction du Seigneur
  - type: text
    content: et ne te décourage pas lorsqu’il te reprend.
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'Car le Seigneur corrige celui qu’il aime :'
  - type: text
    content: il châtie tous ceux qu’il reconnaît pour ses fils
  - type: text
    content: ' '
  - type: note
    content: Pr 3.11-12 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Supportez vos souffrances : elles servent à vous corriger. C’est en fils que Dieu vous traite. Quel est le fils que son père ne corrige pas ? '
  '8':
  - type: text
    content: Si vous êtes dispensés de la correction qui est le lot de tous les fils, alors vous êtes des enfants illégitimes, et non des fils.
  '9':
  - type: text
    content: 'D’ailleurs, nous avions notre père terrestre pour nous corriger, et nous le respections. N’allons-nous pas, à plus forte raison, nous soumettre à notre Père céleste pour avoir la vie ? '
