document_id: MRK.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Plus fort que les démons
  - type: heading
    content: (Mt 8.28-34 ; Lc 8.26-39)
  - type: text
    content: Ils arrivèrent de l’autre côté du lac, dans la région de Gérasa
  - type: note
    content: 'Gérasa: pays situé à l’est du lac de Galilée.'
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Et il pria instamment Jésus de ne pas les renvoyer du pays. '
  '11':
  - type: text
    content: Or, il y avait par là, sur la montagne, un grand troupeau de porcs
  - type: note
    content: 'porcs: voir note Mt 8.30.'
  - type: text
    content: ' en train de paître.'
  '12':
  - type: text
    content: 'Les esprits mauvais supplièrent Jésus : Envoie-nous dans ces porcs, pour que nous entrions en eux !'
  '13':
  - type: text
    content: Jésus le leur permit. Ils sortirent donc de l’homme et entrèrent dans les porcs. Aussitôt, le troupeau, qui comptait environ deux mille bêtes, s’élança du haut de la pente et se précipita dans le lac où elles se noyèrent.
  '14':
  - type: text
    content: 'Les gardiens s’enfuirent et allèrent raconter l’histoire dans la ville et dans les fermes. Les gens vinrent donc voir ce qui s’était passé. '
  '15':
  - type: text
    content: 'Arrivés auprès de Jésus, ils virent l’homme qui avait été sous l’emprise de cette légion de démons, assis là, habillé et tout à fait sain d’esprit. Alors la crainte s’empara d’eux. '
  '16':
  - type: text
    content: 'Ceux qui avaient assisté à la scène leur racontèrent ce qui était arrivé à cet homme et aux porcs ; '
  '17':
  - type: text
    content: et les gens se mirent à supplier Jésus de quitter leur territoire.
  '18':
  - type: text
    content: Au moment où Jésus remontait dans le bateau, l’homme qui avait été délivré des démons lui demanda s’il pouvait l’accompagner.
  '19':
  - type: text
    content: 'Mais Jésus ne le lui permit pas. Il lui dit : '
  - type: text
    content: Va, rentre chez toi, auprès des tiens, et raconte-leur ce que le Seigneur a fait pour toi et quelle compassion il a eu pour toi.
  '2':
  - type: text
    content: où Jésus débarqua. Aussitôt, sortant des tombeaux
  - type: note
    content: Les tombeaux se trouvaient dans des cavernes naturelles ou creusées par les hommes. Ces grottes constituaient des abris contre les intempéries.
  - type: text
    content: ', un homme qui était sous l’emprise d’un esprit mauvais vint à sa rencontre. '
  '20':
  - type: text
    content: Alors il s’en alla et se mit à proclamer dans la région des « Dix Villes »
  - type: note
    content: 'Les «  Dix Villes»: région située au sud-est du lac de Galilée.'
  - type: text
    content: ' ce que Jésus avait fait pour lui – au grand étonnement de ceux qui l’écoutaient.'
  - type: heading
    content: Plus fort que la maladie et la mort
  - type: heading
    content: (Mt 9.18-26 ; Lc 8.40-56)
  '21':
  - type: text
    content: Jésus regagna en bateau l’autre rive du lac. Là, une foule immense s’assembla autour de lui sur le rivage.
  '22':
  - type: text
    content: 'Survint alors l’un des responsables de la synagogue, nommé Jaïrus. En voyant Jésus, il se jeta à ses pieds '
  '23':
  - type: text
    content: 'et le supplia instamment : Ma petite fille va mourir. Viens lui imposer les mains pour qu’elle guérisse et qu’elle vive.'
  '24':
  - type: text
    content: 'Alors Jésus partit avec lui, suivi d’une foule nombreuse qui le serrait de tous côtés. '
  '25':
  - type: text
    content: 'Dans la foule se trouvait une femme atteinte d’hémorragies depuis douze ans. '
  '26':
  - type: text
    content: 'Elle avait été soignée par de nombreux médecins et en avait beaucoup souffert. Elle avait dépensé toute sa fortune sans trouver la moindre amélioration ; au contraire, son état avait empiré. '
  '27':
  - type: text
    content: 'Elle avait entendu parler de Jésus, et dans la foule, elle s’était approchée de lui par-derrière et avait touché son vêtement, '
  '28':
  - type: text
    content: 'en se disant : Si j’arrive à toucher ses vêtements, je serai guérie.'
  '29':
  - type: text
    content: A l’instant même, son hémorragie s’arrêta et elle se sentit délivrée de son mal.
  '3':
  - type: text
    content: 'Il habitait dans les tombeaux et, même avec une chaîne, personne ne pouvait plus le tenir attaché. '
  '30':
  - type: text
    content: 'Aussitôt Jésus eut conscience qu’une force était sortie de lui. Il se retourna dans la foule et demanda : '
  - type: text
    content: Qui a touché mes vêtements ?
  '31':
  - type: text
    content: 'Ses disciples lui dirent : Tu vois la foule qui te presse de tous côtés et tu demandes : '
  - type: text
    content: « Qui m’a touché ? »
  '32':
  - type: text
    content: 'Mais lui continuait à parcourir la foule du regard pour voir celle qui avait fait cela. '
  '33':
  - type: text
    content: Alors, saisie de crainte et toute tremblante, la femme, sachant ce qui lui était arrivé, s’avança, se jeta aux pieds de Jésus et lui dit toute la vérité.
  '34':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Ma fille, parce que tu as eu foi en moi, tu es guériee ; va en paix et sois guérie de ton mal.
  '35':
  - type: text
    content: 'Pendant qu’il parlait encore, quelques personnes arrivèrent de chez le chef de la synagogue pour lui dire : Ta fille est morte. A quoi bon importuner encore le Maître ?'
  '36':
  - type: text
    content: 'Mais Jésus entendit ces paroles. Il dit au chef de la synagogue : '
  - type: text
    content: Ne crains pas. Crois seulement !
  '37':
  - type: text
    content: 'Il ne permit à personne de le suivre plus loin, excepté Pierre, Jacques et Jean, son frère. '
  '38':
  - type: text
    content: 'En arrivant à la maison du chef de la synagogue, Jésus vit une grande agitation : on pleurait et on poussait des cris'
  - type: note
    content: Selon les coutumes funéraires de l’époque (voir note Mt 9.23).
  - type: text
    content: .
  '39':
  - type: text
    content: 'Il entra dans la maison et dit : '
  - type: text
    content: Pourquoi ce tumulte ? Pourquoi ces pleurs ? L’enfant n’est pas morte, elle est seulement endormie.
  '4':
  - type: text
    content: 'Car on l’avait souvent enchaîné et on lui avait mis des fers aux pieds, mais il cassait les chaînes et brisait les fers : personne ne pouvait le maîtriser. '
  '40':
  - type: text
    content: Mais on se moqua de lui.
  - type: text
    content: 'Alors il fit sortir tout le monde, prit avec lui le père et la mère de l’enfant ainsi que les disciples qui l’accompagnaient, et il entra dans la pièce où l’enfant était couchée. '
  '41':
  - type: text
    content: 'Il lui prit la main en disant : '
  - type: text
    content: Talitha koumi
  - type: note
    content: Deux mots en araméen, la langue parlée par les Juifs en Israël au premier siècle.
  - type: text
    content: ', ce qui signifie : '
  - type: text
    content: Jeune fille, lève-toi, je te l’ordonne.
  '42':
  - type: text
    content: 'Aussitôt, la jeune fille se mit debout et marcha. Elle avait environ douze ans. Tous furent frappés de stupeur. '
  '43':
  - type: text
    content: Jésus leur recommanda instamment de ne raconter ce miracle à personne et il leur dit de donner à manger à la jeune fille.
  '5':
  - type: text
    content: Sans cesse, nuit et jour, il errait parmi les tombes et sur les montagnes en hurlant, se blessant contre les rochers.
  '6':
  - type: text
    content: 'D’aussi loin qu’il vit Jésus, il accourut, se prosterna devant lui '
  '7':
  - type: text
    content: 'et lui cria de toutes ses forces : Que me veux-tu, Jésus, Fils du Dieu très-haut ? Je t’en conjure, au nom de Dieu, ne me tourmente pas !'
  '8':
  - type: text
    content: 'Car Jésus lui disait : '
  - type: text
    content: Esprit mauvais, sors de cet homme !
  '9':
  - type: text
    content: 'Jésus lui demanda : '
  - type: text
    content: Quel est ton nom ?
  - type: text
    content: – Je m’appelle Légion, lui répondit-il, car nous sommes une multitude.
