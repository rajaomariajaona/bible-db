document_id: MRK.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plus fort que les démons
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 8.28-34 ; Lc 8.26-39)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils arrivèrent de l’autre côté du lac, dans la région de Gérasa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gérasa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pays situé à l’est du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il pria instamment Jésus de ne pas les renvoyer du pays. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, il y avait par là, sur la montagne, un grand troupeau de porcs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porcs
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 8.30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' en train de paître.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les esprits mauvais supplièrent Jésus : Envoie-nous dans ces porcs, pour que nous entrions en eux !'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus le leur permit. Ils sortirent donc de l’homme et entrèrent dans les porcs. Aussitôt, le troupeau, qui comptait environ deux mille bêtes, s’élança du haut de la pente et se précipita dans le lac où elles se noyèrent.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gardiens s’enfuirent et allèrent raconter l’histoire dans la ville et dans les fermes. Les gens vinrent donc voir ce qui s’était passé. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés auprès de Jésus, ils virent l’homme qui avait été sous l’emprise de cette légion de démons, assis là, habillé et tout à fait sain d’esprit. Alors la crainte s’empara d’eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui avaient assisté à la scène leur racontèrent ce qui était arrivé à cet homme et aux porcs ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et les gens se mirent à supplier Jésus de quitter leur territoire.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au moment où Jésus remontait dans le bateau, l’homme qui avait été délivré des démons lui demanda s’il pouvait l’accompagner.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus ne le lui permit pas. Il lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Va, rentre chez toi, auprès des tiens, et raconte-leur ce que le Seigneur a fait pour toi et quelle compassion il a eu pour toi.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: où Jésus débarqua. Aussitôt, sortant des tombeaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tombeaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvaient dans des cavernes naturelles ou creusées par les hommes. Ces grottes constituaient des abris contre les intempéries.
      marker-yv: yv-n
    - type: text
      text: ', un homme qui était sous l’emprise d’un esprit mauvais vint à sa rencontre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors il s’en alla et se mit à proclamer dans la région des « Dix Villes »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '«  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dix Villes
      - type: usfm
        marker: fq
        children:
        - type: text
          text: »
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région située au sud-est du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: ' ce que Jésus avait fait pour lui – au grand étonnement de ceux qui l’écoutaient.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plus fort que la maladie et la mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 9.18-26 ; Lc 8.40-56)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus regagna en bateau l’autre rive du lac. Là, une foule immense s’assembla autour de lui sur le rivage.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Survint alors l’un des responsables de la synagogue, nommé Jaïrus. En voyant Jésus, il se jeta à ses pieds '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et le supplia instamment : Ma petite fille va mourir. Viens lui imposer les mains pour qu’elle guérisse et qu’elle vive.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus partit avec lui, suivi d’une foule nombreuse qui le serrait de tous côtés. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la foule se trouvait une femme atteinte d’hémorragies depuis douze ans. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle avait été soignée par de nombreux médecins et en avait beaucoup souffert. Elle avait dépensé toute sa fortune sans trouver la moindre amélioration ; au contraire, son état avait empiré. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle avait entendu parler de Jésus, et dans la foule, elle s’était approchée de lui par-derrière et avait touché son vêtement, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en se disant : Si j’arrive à toucher ses vêtements, je serai guérie.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’instant même, son hémorragie s’arrêta et elle se sentit délivrée de son mal.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il habitait dans les tombeaux et, même avec une chaîne, personne ne pouvait plus le tenir attaché. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt Jésus eut conscience qu’une force était sortie de lui. Il se retourna dans la foule et demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui a touché mes vêtements ?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses disciples lui dirent : Tu vois la foule qui te presse de tous côtés et tu demandes : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Qui m’a touché ? »
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais lui continuait à parcourir la foule du regard pour voir celle qui avait fait cela. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, saisie de crainte et toute tremblante, la femme, sachant ce qui lui était arrivé, s’avança, se jeta aux pieds de Jésus et lui dit toute la vérité.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ma fille, parce que tu as eu foi en moi, tu es guériee ; va en paix et sois guérie de ton mal.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’il parlait encore, quelques personnes arrivèrent de chez le chef de la synagogue pour lui dire : Ta fille est morte. A quoi bon importuner encore le Maître ?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus entendit ces paroles. Il dit au chef de la synagogue : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne crains pas. Crois seulement !
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne permit à personne de le suivre plus loin, excepté Pierre, Jacques et Jean, son frère. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En arrivant à la maison du chef de la synagogue, Jésus vit une grande agitation : on pleurait et on poussait des cris'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon les coutumes funéraires de l’époque (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 9.23
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il entra dans la maison et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi ce tumulte ? Pourquoi ces pleurs ? L’enfant n’est pas morte, elle est seulement endormie.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car on l’avait souvent enchaîné et on lui avait mis des fers aux pieds, mais il cassait les chaînes et brisait les fers : personne ne pouvait le maîtriser. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais on se moqua de lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il fit sortir tout le monde, prit avec lui le père et la mère de l’enfant ainsi que les disciples qui l’accompagnaient, et il entra dans la pièce où l’enfant était couchée. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui prit la main en disant : '
    - type: usfm
      marker: tl
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Talitha koumi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux mots en araméen, la langue parlée par les Juifs en Israël au premier siècle.
      marker-yv: yv-n
    - type: text
      text: ', ce qui signifie : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jeune fille, lève-toi, je te l’ordonne.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, la jeune fille se mit debout et marcha. Elle avait environ douze ans. Tous furent frappés de stupeur. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus leur recommanda instamment de ne raconter ce miracle à personne et il leur dit de donner à manger à la jeune fille.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sans cesse, nuit et jour, il errait parmi les tombes et sur les montagnes en hurlant, se blessant contre les rochers.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’aussi loin qu’il vit Jésus, il accourut, se prosterna devant lui '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui cria de toutes ses forces : Que me veux-tu, Jésus, Fils du Dieu très-haut ? Je t’en conjure, au nom de Dieu, ne me tourmente pas !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Jésus lui disait : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Esprit mauvais, sors de cet homme !
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quel est ton nom ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je m’appelle Légion, lui répondit-il, car nous sommes une multitude.
