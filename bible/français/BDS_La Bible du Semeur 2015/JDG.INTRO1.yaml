document_id: JDG.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre des Juges couvre la période qui va de l’installation d’Israël dans le pays promis, sous la direction de Josué, aux années qui précèdent l’instauration de la royauté sous Samuel. Les dates proposées par les spécialistes pour cette période sont soit 1380 à 1050 soit 1220 à 1050 avant Jésus-Christ.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Une première partie introductive (1.1 à 2.5) décrit la conquête incomplète de Canaan par Israël. La conquête effectuée sous la direction de Josué ne constituait qu’une première phase qui avait abouti à l’installation des tribus dans le pays. Il restait à chaque tribu d’achever la conquête de son territoire. Cette section souligne qu’elles n’y ont que très partiellement réussi, à cause de l’infidélité des Israélites, qui ont souvent succombé à la tentation de s’allier aux habitants du pays et d’adopter leurs dieux (2.1-5). Elle ne semble pas suivre l’ordre chronologique : certains événements, en effet, paraissent dater d’avant la mort de Josué (1.10-15 ; Jos 13.13-14) alors que d’autres semblent lui être postérieurs (1.1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La deuxième partie (2.6 à 16.31) forme le corps du livre. Elle est introduite par une section qui brosse un tableau général de cette période de l’histoire d’Israël (2.6 à 3.6). Celle-ci révèle à la fois l’infidélité persistante du peuple et la fidélité de l’Eternel à son alliance. A plusieurs reprises, on retrouve le même enchaînement, annoncé par Moïse et conforme aux sanctions de l’alliance (Dt 28 et 29) : attrait d’Israël pour les faux dieux de Canaan, abandon de l’Eternel, servitude, appel à l’aide au vrai Dieu et libération grâce à son intervention.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A chaque reprise, l’action libératrice de l’Eternel s’opère par l’intermédiaire d’un « juge », terme qui, en hébreu, englobe la fonction de dirigeant et qui a généralement été traduit par « chef » dans le texte (2.16, 18, 19). En effet, c’étaient avant tout des chefs militaires. Certains d’entre eux ont dirigé soit une ou plusieurs tribus, soit le peuple tout entier, mais Samson a agi de façon solitaire, combattant contre les Philistins pour des motifs personnels. Dans le cas de Débora, par contre, c’est la seule fonction de magistrat qui est en cause : outre son autre fonction de prophétesse, celle-ci, en tant que juge, rend la justice (4.4-5). Le livre mentionne douze chefs. Les chroniques qui rapportent leurs faits et gestes sont de longueur très inégale. On distingue ainsi six « grands » – Otniel, Ehoud, Débora, Gédéon, Jephté et Samson – et six « petits » : Shamgar, Tola, Yaïr, Ibtsân, Elôn et Abdôn.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La dernière partie du livre forme un appendice qui comprend deux récits très différents : le sanctuaire de Mika (chap. 17 et 18) et le crime des habitants de Guibéa (chap. 19 à 21). Ces récits révèlent la déchéance morale et spirituelle du peuple de Dieu et, par leur refrain, soulignent la nécessité de l’institution de la royauté en Israël : « En ce temps-là, il n’y avait pas de roi en Israël. Chacun faisait ce qu’il jugeait bon » (17.6 ; 18.1 ; 19.1 ; 21.25).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En libérant le peuple de Dieu de ses ennemis sous l’action de l’Esprit (3.10 ; 6.34 ; 11.29 ; 13.25 ; 14.6, 9 ; 15.14), les « Juges » annoncent l’œuvre du Messie-Roi, sur qui l’Esprit reposera (Es 11.1-2) et qui devait apporter au peuple de Dieu la victoire finale et définitive sur ses ennemis.
