document_id: NUM.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes des lévites
  - type: text
    content: 'L’Eternel parla à Moïse, dans les steppes de Moab, sur la rive du Jourdain en face de Jéricho, en disant : '
  '10':
  - type: text
    content: 'Dis aux Israélites : Vous allez traverser le Jourdain pour entrer dans le pays de Canaan, '
  '11':
  - type: text
    content: et vous vous choisirez des villes qui vous serviront de cités de refuge où pourront se réfugier les auteurs d’homicides involontaires
  - type: note
    content: Voir Dt 4.41-43 ; 19.1-13 ; Jos 20.1-9.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ces villes vous serviront d’asile pour protéger le meurtrier de l’homme chargé de punir le crime
  - type: note
    content: Selon certains, un proche parent de la victime qui avait le devoir de châtier ce crime en mettant le meurtrier à mort (v. 19), selon d’autres, un représentant des responsables du peuple chargé d’exécuter cette sanction.
  - type: text
    content: ', afin qu’un meurtrier ne soit pas mis à mort avant d’avoir comparu devant la communauté pour être jugé. '
  '13':
  - type: text
    content: 'Vous désignerez six villes de refuge : '
  '14':
  - type: text
    content: 'trois villes au-delà du Jourdain, et trois autres dans le pays de Canaan. Elles serviront de refuge '
  '15':
  - type: text
    content: aux Israélites, à l’immigré et au résident qui demeurera au milieu de vous ; quiconque aura tué quelqu’un involontairement pourra s’y réfugier.
  '16':
  - type: text
    content: 'S’il a frappé avec un objet en fer et causé la mort, c’est un meurtrier ; il sera puni de mort. '
  '17':
  - type: text
    content: 'Il en sera de même s’il était armé d’une pierre ou d’un instrument en bois capable de causer la mort. '
  '19':
  - type: text
    content: 'L’homme chargé de punir le crime le mettra à mort dès qu’il le trouvera. '
  '2':
  - type: text
    content: Ordonne aux Israélites de donner aux lévites sur la part de propriété qu’ils recevront, des villes où ils pourront s’établir avec des pâturages autour d’elles
  - type: note
    content: Voir Lv 25.32-34 ; Jos 21.1-42 ; 1 Ch 6.39-66. Puisque les lévites ne devaient pas recevoir de patrimoine héréditaire dans le pays de Canaan (1.47-53), Dieu leur fait attribuer des villes où ils pourront vivre et élever leur famille. Jos 21 rapporte l’exécution de cet ordre. Les lévites partageaient ces villes avec d’autres habitants (voir 1 S 6.13-14).
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'S’il lui a lancé un projectile avec préméditation ou s’il l’a frappé du poing avec inimitié, et qu’il a causé sa mort, c’est un meurtrier : l’homme chargé de punir le crime le mettra à mort dès qu’il le trouvera.'
  '22':
  - type: text
    content: 'Mais s’il l’a bousculé par accident et non par inimitié, ou lui a lancé un projectile sans mauvaise intention, '
  '23':
  - type: text
    content: 'ou s’il a fait tomber sur lui une pierre sans l’avoir vu, et qu’il a causé sa mort sans avoir d’intention hostile à son égard et sans avoir cherché à lui faire de mal, '
  '24':
  - type: text
    content: 'la communauté prononcera un jugement selon ces règles entre l’auteur de la mort et l’homme chargé de punir le crime. '
  '25':
  - type: text
    content: Elle délivrera le meurtrier de l’homme chargé de punir le crime et le fera retourner dans la ville de refuge où il s’était réfugié.
  - type: text
    content: 'Il devra y rester jusqu’à la mort du grand-prêtre qui a été oint d’huile sainte. '
  '26':
  - type: text
    content: 'Mais s’il quitte l’enceinte de la ville de refuge où il s’est retiré, '
  '27':
  - type: text
    content: 'et si l’homme chargé de punir le crime le rencontre à l’extérieur du territoire de sa ville de refuge et le tue, cet homme ne sera pas coupable de crime. '
  '28':
  - type: text
    content: Car le meurtrier doit demeurer dans sa ville de refuge jusqu’à la mort du grand-prêtre ; après cela il pourra retourner sur les terres qui lui appartiennent.
  '29':
  - type: text
    content: 'Ces ordonnances auront pour vous force de loi, pour toutes les générations, partout où vous habiterez. '
  '3':
  - type: text
    content: 'Ces villes leur serviront de résidence ; et ils disposeront des terres alentour pour leur bétail, leurs biens et tous leurs animaux. '
  '30':
  - type: text
    content: Toutes les fois qu’un meurtre aura été commis, c’est seulement sur la déposition de plusieurs témoins que le meurtrier sera mis à mort. La déclaration d’un seul témoin n’est pas suffisante pour prononcer une condamnation à la peine capitale
  - type: note
    content: Voir Dt 17.6 ; 19.15 ; Mt 18.16 ; 2 Co 13.1 ; 1 Tm 5.19 ; Hé 10.28.
  - type: text
    content: .
  '31':
  - type: text
    content: 'D’autre part, vous n’accepterez pas de rançon en échange de la vie d’un meurtrier qui a été reconnu coupable d’un crime méritant la mort ; il doit être mis à mort. '
  '32':
  - type: text
    content: 'Vous n’en accepterez pas non plus pour que le meurtrier qui s’est retiré dans sa ville de refuge puisse retourner habiter chez lui avant la mort du prêtre. '
  '33':
  - type: text
    content: 'Ne profanez pas le pays où vous vous trouvez : en effet, le sang versé profane le pays ; car, pour le pays, il n’y a pas d’expiation pour le sang qui y a été versé sinon par le sang de celui qui l’a répandu. '
  '34':
  - type: text
    content: Vous ne rendrez pas impur le pays où vous demeurerez et dans lequel j’habiterai, car je suis l’Eternel, qui habite au milieu des Israélites.
  '4':
  - type: text
    content: 'Les terrains attenant aux villes que vous donnerez aux lévites s’étendront sur une distance de cinq cents mètres tout autour, à partir du mur de la ville. '
  '5':
  - type: text
    content: Vous délimiterez donc, à l’extérieur de la ville, un carré de mille mètres
  - type: note
    content: En hébreu, mille et deux mille coudées.
  - type: text
    content: ' de côté au milieu duquel se situera la ville. Tels seront les territoires autour de leurs villes. '
  '6':
  - type: text
    content: 'Vous donnerez aux lévites les six villes de refuge que vous aurez désignées pour que des meurtriers involontaires puissent s’y réfugier ainsi que quarante-deux autres villes, '
  '7':
  - type: text
    content: 'vous leur céderez donc en tout quarante-huit villes, chacune avec ses terres avoisinantes. '
  '8':
  - type: text
    content: Vous prendrez ces villes sur les patrimoines fonciers des Israélites, en en prenant davantage des tribus qui ont reçu un plus grand nombre de villes, et moins de celles qui en ont moins ; chaque tribu cédera de ses villes aux lévites en proportion du territoire qu’elle aura reçu.
  - type: heading
    content: Les villes de refuge
  '9':
  - type: text
    content: 'L’Eternel parla encore à Moïse, et lui dit : '
