document_id: EXO.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu révèle à Moïse ce qu’il va faire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Moïse : Regarde ! Je te fais Dieu pour le pharaon, et ton frère Aaron te servira de prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toi, tu diras tout ce que je t’ordonnerai, et ton frère Aaron le répétera au pharaon pour qu’il laisse partir les Israélites de son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et moi, je rendrai le pharaon inflexible et je multiplierai les signes miraculeux et les prodiges en Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.36
        metadata:
          usfm: ACT.7.36
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais il ne vous écoutera pas. Alors j’interviendrai en Egypte et j’en ferai sortir mon peuple, les Israélites, comme une armée en bon ordre, en exerçant de terribles jugements. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les Egyptiens sauront ainsi que je suis l’Eternel, quand j’interviendrai en Egypte pour en faire sortir les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron firent exactement tout ce que l’Eternel leur avait commandé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moïse avait quatre-vingts ans et Aaron quatre-vingt-trois lorsqu’ils allèrent parler au pharaon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bâton d’Aaron changé en serpent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Eternel dit à Moïse et Aaron : '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si le pharaon vous demande de faire un miracle, toi, Moïse, tu diras à Aaron : « Prends ton bâton et jette-le devant le pharaon », et il se transformera en serpent !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse et Aaron se rendirent chez le pharaon et agirent comme l’Eternel le leur avait ordonné. Aaron jeta son bâton devant le pharaon et ses hauts fonctionnaires et celui-ci se transforma en serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors le pharaon fit convoquer ses sages et ses magiciens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 41.8
        metadata:
          usfm: GEN.41.8
      - type: text
        text: '. Selon la tradition, deux des magiciens qui s’opposèrent à Moïse s’appelaient Jannès et Jambrès (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tm 3.8
        metadata:
          usfm: 2TI.3.8
      - type: text
        text: ). Le premier de ces noms est aussi mentionné dans les manuscrits de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ', et les enchanteurs d’Egypte accomplirent le même miracle par leurs sortilèges : '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'chacun d’eux jeta son bâton à terre qui se transforma en serpent ; cependant le bâton d’Aaron avala les leurs. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Malgré cela, le pharaon, le cœur obstiné, refusa de les écouter, comme l’Eternel l’avait dit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Premier fléau : l’eau changée en sang'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Eternel dit à Moïse : Le pharaon est trop entêté pour laisser partir le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Va le trouver demain matin à l’heure où il sortira pour aller au bord de l’eau. Tu te tiendras sur son passage sur la rive du Nil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le pharaon allait faire ses dévotions au dieu Nil (père des dieux). Toucher au Nil, c’était toucher au cœur de l’Egypte qui, sans lui, n’était plus qu’un désert.
    marker-yv: yv-n
  - type: text
    text: '. Prends dans ta main le bâton qui a été changé en serpent, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et tu lui diras : « L’Eternel, le Dieu des Hébreux, m’a envoyé vers toi pour te dire : Laisse aller mon peuple pour qu’il me rende un culte dans le désert. Mais jusqu’à présent, tu as fait la sourde oreille. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est pourquoi l’Eternel te déclare : Voici comment tu sauras que je suis l’Eternel : Avec le bâton que j’ai à la main, je vais frapper les eaux du Nil et elles se changeront en sang. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les poissons qui vivent dans le fleuve périront et le Nil deviendra si infect que les Egyptiens ne pourront plus en boire l’eau. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Eternel dit encore à Moïse : Ordonne à Aaron de prendre son bâton et d’étendre sa main en direction de tous les cours d’eau de l’Egypte : ses rivières, ses canaux, ses étangs et tous ses réservoirs, et leur eau se changera en sang, il y aura du sang dans tout le pays d’Egypte jusque dans les récipients de bois ou de pierre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse et Aaron exécutèrent les ordres de l’Eternel. Aaron leva le bâton et frappa l’eau du Nil sous les yeux du pharaon et de ses hauts fonctionnaires, et toute l’eau du fleuve fut changée en sang. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les poissons périrent et le fleuve devint si infect que les Egyptiens ne purent plus en boire l’eau. Il y avait du sang dans tout le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais les magiciens égyptiens en firent autant par leurs sortilèges. Le pharaon s’obstina dans son cœur et ne céda pas, comme l’Eternel l’avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il leur tourna le dos et rentra dans son palais sans prendre la chose à cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tous les Egyptiens creusèrent le sol aux alentours du Nil pour trouver de l’eau potable puisqu’ils ne pouvaient plus boire l’eau du fleuve.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Deuxième fléau : les grenouilles'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sept jours s’écoulèrent après que l’Eternel eut frappé le fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Puis l’Eternel ordonna à Moïse : Va trouver le pharaon et dis-lui : « Voici ce que l’Eternel t’ordonne : Laisse aller mon peuple pour qu’il me rende un culte. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Si tu refuses de le laisser aller, je vais envoyer une invasion de grenouilles sur tout ton territoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les différents fléaux manifestent la souveraineté de l’Eternel sur tous les domaines de la création, en particulier sur ceux qui étaient divinisés par les Egyptiens. Ils se sont succédé assez rapidement entre janvier et avril.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le Nil fourmillera de grenouilles, elles en sortiront et pénétreront dans ton palais, dans ta chambre à coucher, sur ton lit et dans la maison de tes hauts fonctionnaires, et dans celle de tes sujets, dans tes fours et dans tes pétrins. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les grenouilles grimperont sur toi, sur tes hauts fonctionnaires et sur tes sujets. »
