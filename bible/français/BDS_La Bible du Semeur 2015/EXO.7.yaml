document_id: EXO.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu révèle à Moïse ce qu’il va faire
  - type: text
    content: 'L’Eternel dit à Moïse : Regarde ! Je te fais Dieu pour le pharaon, et ton frère Aaron te servira de prophète. '
  '10':
  - type: text
    content: 'Moïse et Aaron se rendirent chez le pharaon et agirent comme l’Eternel le leur avait ordonné. Aaron jeta son bâton devant le pharaon et ses hauts fonctionnaires et celui-ci se transforma en serpent. '
  '11':
  - type: text
    content: Alors le pharaon fit convoquer ses sages et ses magiciens
  - type: note
    content: Voir Gn 41.8. Selon la tradition, deux des magiciens qui s’opposèrent à Moïse s’appelaient Jannès et Jambrès (voir 2 Tm 3.8). Le premier de ces noms est aussi mentionné dans les manuscrits de la mer Morte.
  - type: text
    content: ', et les enchanteurs d’Egypte accomplirent le même miracle par leurs sortilèges : '
  '12':
  - type: text
    content: 'chacun d’eux jeta son bâton à terre qui se transforma en serpent ; cependant le bâton d’Aaron avala les leurs. '
  '13':
  - type: text
    content: Malgré cela, le pharaon, le cœur obstiné, refusa de les écouter, comme l’Eternel l’avait dit.
  - type: heading
    content: 'Premier fléau : l’eau changée en sang'
  '14':
  - type: text
    content: 'L’Eternel dit à Moïse : Le pharaon est trop entêté pour laisser partir le peuple. '
  '15':
  - type: text
    content: Va le trouver demain matin à l’heure où il sortira pour aller au bord de l’eau. Tu te tiendras sur son passage sur la rive du Nil
  - type: note
    content: Le pharaon allait faire ses dévotions au dieu Nil (père des dieux). Toucher au Nil, c’était toucher au cœur de l’Egypte qui, sans lui, n’était plus qu’un désert.
  - type: text
    content: '. Prends dans ta main le bâton qui a été changé en serpent, '
  '16':
  - type: text
    content: 'et tu lui diras : « L’Eternel, le Dieu des Hébreux, m’a envoyé vers toi pour te dire : Laisse aller mon peuple pour qu’il me rende un culte dans le désert. Mais jusqu’à présent, tu as fait la sourde oreille. '
  '17':
  - type: text
    content: 'C’est pourquoi l’Eternel te déclare : Voici comment tu sauras que je suis l’Eternel : Avec le bâton que j’ai à la main, je vais frapper les eaux du Nil et elles se changeront en sang. '
  '18':
  - type: text
    content: Les poissons qui vivent dans le fleuve périront et le Nil deviendra si infect que les Egyptiens ne pourront plus en boire l’eau. »
  '19':
  - type: text
    content: 'L’Eternel dit encore à Moïse : Ordonne à Aaron de prendre son bâton et d’étendre sa main en direction de tous les cours d’eau de l’Egypte : ses rivières, ses canaux, ses étangs et tous ses réservoirs, et leur eau se changera en sang, il y aura du sang dans tout le pays d’Egypte jusque dans les récipients de bois ou de pierre.'
  '2':
  - type: text
    content: 'Toi, tu diras tout ce que je t’ordonnerai, et ton frère Aaron le répétera au pharaon pour qu’il laisse partir les Israélites de son pays. '
  '20':
  - type: text
    content: 'Moïse et Aaron exécutèrent les ordres de l’Eternel. Aaron leva le bâton et frappa l’eau du Nil sous les yeux du pharaon et de ses hauts fonctionnaires, et toute l’eau du fleuve fut changée en sang. '
  '21':
  - type: text
    content: Les poissons périrent et le fleuve devint si infect que les Egyptiens ne purent plus en boire l’eau. Il y avait du sang dans tout le pays.
  '22':
  - type: text
    content: 'Mais les magiciens égyptiens en firent autant par leurs sortilèges. Le pharaon s’obstina dans son cœur et ne céda pas, comme l’Eternel l’avait dit. '
  '23':
  - type: text
    content: 'Il leur tourna le dos et rentra dans son palais sans prendre la chose à cœur. '
  '24':
  - type: text
    content: Tous les Egyptiens creusèrent le sol aux alentours du Nil pour trouver de l’eau potable puisqu’ils ne pouvaient plus boire l’eau du fleuve.
  - type: heading
    content: 'Deuxième fléau : les grenouilles'
  '25':
  - type: text
    content: 'Sept jours s’écoulèrent après que l’Eternel eut frappé le fleuve. '
  '26':
  - type: text
    content: 'Puis l’Eternel ordonna à Moïse : Va trouver le pharaon et dis-lui : « Voici ce que l’Eternel t’ordonne : Laisse aller mon peuple pour qu’il me rende un culte. '
  '27':
  - type: text
    content: Si tu refuses de le laisser aller, je vais envoyer une invasion de grenouilles sur tout ton territoire
  - type: note
    content: Les différents fléaux manifestent la souveraineté de l’Eternel sur tous les domaines de la création, en particulier sur ceux qui étaient divinisés par les Egyptiens. Ils se sont succédé assez rapidement entre janvier et avril.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Le Nil fourmillera de grenouilles, elles en sortiront et pénétreront dans ton palais, dans ta chambre à coucher, sur ton lit et dans la maison de tes hauts fonctionnaires, et dans celle de tes sujets, dans tes fours et dans tes pétrins. '
  '29':
  - type: text
    content: Les grenouilles grimperont sur toi, sur tes hauts fonctionnaires et sur tes sujets. »
  '3':
  - type: text
    content: Et moi, je rendrai le pharaon inflexible et je multiplierai les signes miraculeux et les prodiges en Egypte
  - type: note
    content: Voir Ac 7.36.
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'mais il ne vous écoutera pas. Alors j’interviendrai en Egypte et j’en ferai sortir mon peuple, les Israélites, comme une armée en bon ordre, en exerçant de terribles jugements. '
  '5':
  - type: text
    content: Les Egyptiens sauront ainsi que je suis l’Eternel, quand j’interviendrai en Egypte pour en faire sortir les Israélites.
  '6':
  - type: text
    content: 'Moïse et Aaron firent exactement tout ce que l’Eternel leur avait commandé. '
  '7':
  - type: text
    content: Moïse avait quatre-vingts ans et Aaron quatre-vingt-trois lorsqu’ils allèrent parler au pharaon.
  - type: heading
    content: Le bâton d’Aaron changé en serpent
  '8':
  - type: text
    content: 'L’Eternel dit à Moïse et Aaron : '
  '9':
  - type: text
    content: 'Si le pharaon vous demande de faire un miracle, toi, Moïse, tu diras à Aaron : « Prends ton bâton et jette-le devant le pharaon », et il se transformera en serpent !'
