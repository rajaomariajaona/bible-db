document_id: JER.20
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jérémie en prison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le prêtre Pashhour, fils d’Immer, qui était le responsable en chef du temple de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être un descendant du chef du seizième groupe familial des prêtres (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 24.14
        metadata:
          usfm: 1CH.24.14
      - type: text
        text: ). Il était chargé de punir ceux qui causaient des désordres dans le Temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.26'
        metadata:
          usfm: JER.29.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', entendit Jérémie prophétiser de cette manière ; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: alors, il fit battre le prophète, puis le fit attacher au pilori à côté de la porte supérieure de Benjamin, qui donne accès au temple de l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le lendemain, Pashhour détacha Jérémie du pilori. Celui-ci lui dit : Ce n’est plus Pashhour que l’Eternel t’appelle, mais « De toutes parts, c’est la terreur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 10 et 6.25 ; 46.5 ; 49.29.
    marker-yv: yv-n
  - type: text
    text: '  » !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici, en effet, ce que déclare l’Eternel : Je vais t’abandonner à la terreur ainsi que tous tes amis ; ils tomberont sous l’épée de leurs ennemis, et tu en seras témoin. Je livrerai aussi tout le peuple de Juda au roi de Babylone, qui les déportera à Babylone et les fera périr par l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je livrerai encore toutes les richesses de cette ville, tout le produit de son travail, tout ce qu’elle a de précieux et tous les trésors des rois de Juda, tout cela je le livrerai à leurs ennemis, ils le pilleront, le prendront et l’emporteront à Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quant à toi, Pashhour, ainsi que tous ceux qui habitent chez toi, vous irez en captivité ; tu iras à Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Accompli probablement en 597 av. J.-C., lors de l’invasion des Babyloniens, car, peu après cette date (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.2'
        metadata:
          usfm: JER.29.2
      - type: text
        text: ), c’est un dénommé Sophonie qui occupait sa fonction (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29.25-26
        metadata:
          usfm: JER.29.25+JER.29.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et c’est là que tu mourras, que tu seras enterré, ainsi que tous tes amis auxquels tu as prophétisé le mensonge.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Plaintes et réconfort
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu m’as séduit, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me suis laissé séduire !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as usé de force ╵à mon égard ╵et tu l’as emporté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A longueur de journée, ╵je suis un objet de risée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous se moquent de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chaque fois que je parle, ╵c’est pour crier très haut :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’annonce la violence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je dénonce la violence…
    marker-yv: yv-n
  - type: text
    text: ' ╵et la dévastation.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A longueur de journée, ╵ta parole, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: m’attire des outrages ╵et des insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et lorsque je me dis :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je veux oublier sa parole
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne parlerai plus en son nom »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a, dans mon cœur, ╵comme un feu qui m’embrase
- type: usfm
  marker: q1
  children:
  - type: text
    text: enfermé dans mes os,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’épuise à le contenir ╵et n’y arrive pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’ai entendu les propos menaçants ╵que profère la foule :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « De toutes parts, c’est la terreur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dénoncez-le », crient-ils. ╵« Nous le dénoncerons ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les gens qui étaient ╵avec moi en bons termes
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'guettent ma chute :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Qu’il se laisse séduire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous aurons gagné ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors nous le tiendrons ╵et nous nous vengerons de lui ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais l’Eternel est avec moi ╵comme un puissant guerrier ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui me persécutent ╵vont trébucher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne l’emporteront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront tout honteux ╵car ils ne réussiront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur honte sera éternelle, ╵on ne l’oubliera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toi, Seigneur des armées célestes, ╵tu éprouves le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu vois le cœur ╵et le tréfonds de l’être.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je voie donc ╵comment tu les rétribueras ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: en effet c’est à toi ╵que j’ai remis ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Chantez à l’Eternel ! ╵Oui, louez l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il sauve le pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la main des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maudit soit à jamais ╵le jour où je suis né !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ce jour où ma mère ╵m’a fait naître en ce monde
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne soit jamais béni
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 14-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jb 3.1-19
        metadata:
          usfm: JOB.3.1+JOB.3.2+JOB.3.3+JOB.3.4+JOB.3.5+JOB.3.6+JOB.3.7+JOB.3.8+JOB.3.9+JOB.3.10+JOB.3.11+JOB.3.12+JOB.3.13+JOB.3.14+JOB.3.15+JOB.3.16+JOB.3.17+JOB.3.18+JOB.3.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maudit soit l’homme ╵qui porta la nouvelle ╵à mon père, en disant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Il t’est né un garçon »
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui lui a causé ╵une très grande joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’il devienne semblable aux villes
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel a renversées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à la destruction de Sodome et de Gomorrhe, rapportée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.23-25
        metadata:
          usfm: GEN.19.23+GEN.19.24+GEN.19.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵sans regretter sa décision !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que, dès le point du jour, ╵il entende des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des clameurs ╵à l’heure de midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car il ne m’a pas fait mourir ╵dans le sein de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui serait devenue ma tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte qu’à jamais ╵elle m’aurait gardé en elle !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A quoi bon être sorti de son sein
- type: usfm
  marker: q1
  children:
  - type: text
    text: si c’est pour faire l’expérience ╵de la souffrance, ╵de l’affliction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour consumer ma vie ╵dans le mépris ?
