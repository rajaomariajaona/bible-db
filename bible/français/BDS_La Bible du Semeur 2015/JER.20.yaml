document_id: JER.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie en prison
  - type: text
    content: Le prêtre Pashhour, fils d’Immer, qui était le responsable en chef du temple de l’Eternel
  - type: note
    content: Peut-être un descendant du chef du seizième groupe familial des prêtres (1 Ch 24.14). Il était chargé de punir ceux qui causaient des désordres dans le Temple (29.26).
  - type: text
    content: ', entendit Jérémie prophétiser de cette manière ; '
  '10':
  - type: text
    content: 'J’ai entendu les propos menaçants ╵que profère la foule :'
  - type: text
    content: « De toutes parts, c’est la terreur.
  - type: text
    content: Dénoncez-le », crient-ils. ╵« Nous le dénoncerons ! »
  - type: text
    content: Tous les gens qui étaient ╵avec moi en bons termes
  - type: text
    content: 'guettent ma chute :'
  - type: text
    content: « Qu’il se laisse séduire,
  - type: text
    content: et nous aurons gagné ;
  - type: text
    content: alors nous le tiendrons ╵et nous nous vengerons de lui ! »
  '11':
  - type: text
    content: Mais l’Eternel est avec moi ╵comme un puissant guerrier ;
  - type: text
    content: ceux qui me persécutent ╵vont trébucher,
  - type: text
    content: et ils ne l’emporteront pas.
  - type: text
    content: Ils seront tout honteux ╵car ils ne réussiront pas.
  - type: text
    content: Leur honte sera éternelle, ╵on ne l’oubliera pas.
  '12':
  - type: text
    content: Toi, Seigneur des armées célestes, ╵tu éprouves le juste,
  - type: text
    content: tu vois le cœur ╵et le tréfonds de l’être.
  - type: text
    content: Que je voie donc ╵comment tu les rétribueras ;
  - type: text
    content: en effet c’est à toi ╵que j’ai remis ma cause.
  '13':
  - type: text
    content: Chantez à l’Eternel ! ╵Oui, louez l’Eternel
  - type: text
    content: car il sauve le pauvre
  - type: text
    content: de la main des méchants.
  '14':
  - type: text
    content: Maudit soit à jamais ╵le jour où je suis né !
  - type: text
    content: Que ce jour où ma mère ╵m’a fait naître en ce monde
  - type: text
    content: ne soit jamais béni
  - type: note
    content: Pour les v. 14-18, voir Jb 3.1-19.
  - type: text
    content: '  !'
  '15':
  - type: text
    content: 'Maudit soit l’homme ╵qui porta la nouvelle ╵à mon père, en disant :'
  - type: text
    content: « Il t’est né un garçon »
  - type: text
    content: et qui lui a causé ╵une très grande joie.
  '16':
  - type: text
    content: Qu’il devienne semblable aux villes
  - type: text
    content: que l’Eternel a renversées
  - type: note
    content: Allusion à la destruction de Sodome et de Gomorrhe, rapportée en Gn 19.23-25.
  - type: text
    content: ' ╵sans regretter sa décision !'
  - type: text
    content: Que, dès le point du jour, ╵il entende des cris,
  - type: text
    content: et des clameurs ╵à l’heure de midi.
  '17':
  - type: text
    content: Car il ne m’a pas fait mourir ╵dans le sein de ma mère,
  - type: text
    content: qui serait devenue ma tombe
  - type: text
    content: de sorte qu’à jamais ╵elle m’aurait gardé en elle !
  '18':
  - type: text
    content: A quoi bon être sorti de son sein
  - type: text
    content: si c’est pour faire l’expérience ╵de la souffrance, ╵de l’affliction,
  - type: text
    content: pour consumer ma vie ╵dans le mépris ?
  '2':
  - type: text
    content: alors, il fit battre le prophète, puis le fit attacher au pilori à côté de la porte supérieure de Benjamin, qui donne accès au temple de l’Eternel.
  '3':
  - type: text
    content: 'Le lendemain, Pashhour détacha Jérémie du pilori. Celui-ci lui dit : Ce n’est plus Pashhour que l’Eternel t’appelle, mais « De toutes parts, c’est la terreur'
  - type: note
    content: Voir v. 10 et 6.25 ; 46.5 ; 49.29.
  - type: text
    content: '  » !'
  '4':
  - type: text
    content: 'Voici, en effet, ce que déclare l’Eternel : Je vais t’abandonner à la terreur ainsi que tous tes amis ; ils tomberont sous l’épée de leurs ennemis, et tu en seras témoin. Je livrerai aussi tout le peuple de Juda au roi de Babylone, qui les déportera à Babylone et les fera périr par l’épée. '
  '5':
  - type: text
    content: Je livrerai encore toutes les richesses de cette ville, tout le produit de son travail, tout ce qu’elle a de précieux et tous les trésors des rois de Juda, tout cela je le livrerai à leurs ennemis, ils le pilleront, le prendront et l’emporteront à Babylone.
  '6':
  - type: text
    content: Quant à toi, Pashhour, ainsi que tous ceux qui habitent chez toi, vous irez en captivité ; tu iras à Babylone
  - type: note
    content: Accompli probablement en 597 av. J.-C., lors de l’invasion des Babyloniens, car, peu après cette date (voir 29.2), c’est un dénommé Sophonie qui occupait sa fonction (29.25-26).
  - type: text
    content: ', et c’est là que tu mourras, que tu seras enterré, ainsi que tous tes amis auxquels tu as prophétisé le mensonge.'
  - type: heading
    content: Plaintes et réconfort
  '7':
  - type: text
    content: Tu m’as séduit, ╵ô Eternel,
  - type: text
    content: et je me suis laissé séduire !
  - type: text
    content: Tu as usé de force ╵à mon égard ╵et tu l’as emporté.
  - type: text
    content: A longueur de journée, ╵je suis un objet de risée,
  - type: text
    content: tous se moquent de moi.
  '8':
  - type: text
    content: 'Chaque fois que je parle, ╵c’est pour crier très haut :'
  - type: text
    content: J’annonce la violence
  - type: note
    content: 'Autre traduction : je dénonce la violence…'
  - type: text
    content: ' ╵et la dévastation.'
  - type: text
    content: A longueur de journée, ╵ta parole, Eternel,
  - type: text
    content: m’attire des outrages ╵et des insultes.
  '9':
  - type: text
    content: 'Et lorsque je me dis :'
  - type: text
    content: « Je veux oublier sa parole
  - type: text
    content: et je ne parlerai plus en son nom »,
  - type: text
    content: il y a, dans mon cœur, ╵comme un feu qui m’embrase
  - type: text
    content: enfermé dans mes os,
  - type: text
    content: je m’épuise à le contenir ╵et n’y arrive pas !
