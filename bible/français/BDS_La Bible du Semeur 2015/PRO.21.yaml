document_id: PRO.21,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le cœur du roi est comme un cours d’eau entre les mains de l’Eternel :'
  - type: text
    content: il le dirige à son gré
  - type: note
    content: Voir les exemples de Nabuchodonosor (Dn 4.28-29, 32) et de Cyrus (Es 45.1-3  ; comparer Esd 6.22). Voir 16.1, 9 ; 19.21 ; 20.24.
  - type: text
    content: .
  '10':
  - type: text
    content: Le méchant aspire à faire du mal ;
  - type: text
    content: même son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: text
    content: Quand le châtiment atteint le moqueur, l’inexpérimenté en devient sage,
  - type: text
    content: et quand on instruit le sage, il acquiert de la connaissance.
  '12':
  - type: text
    content: Le Dieu juste
  - type: note
    content: 'Autre traduction : l’homme juste.'
  - type: text
    content: ' est attentif à ce qui se passe dans la demeure des méchants,'
  - type: text
    content: et il les précipite dans le malheur.
  '13':
  - type: text
    content: Qui fait la sourde oreille quand le malheureux appelle à l’aide,
  - type: text
    content: appellera lui-même à l’aide sans obtenir de réponse.
  '14':
  - type: text
    content: Un cadeau offert en secret apaise la colère,
  - type: text
    content: et un pot-de-vin glissé en cachette calme la plus violente fureur
  - type: note
    content: Voir 17.8, 23. La limite qui sépare le « cadeau » du « pot-de-vin » est facilement franchie.
  - type: text
    content: .
  '15':
  - type: text
    content: C’est une joie pour le juste d’agir selon le droit,
  - type: text
    content: mais c’est un supplice pour ceux qui font le mal.
  '16':
  - type: text
    content: L’homme qui s’écarte du chemin tracé par le bon sens
  - type: text
    content: ira bientôt reposer en compagnie des morts.
  '17':
  - type: text
    content: Qui aime les plaisirs tombera dans l’indigence,
  - type: text
    content: qui a un faible pour le vin et la grande vie ne sera jamais riche.
  '18':
  - type: text
    content: Le méchant servira de rançon pour le juste
  - type: text
    content: et le traître pour les hommes droits.
  '19':
  - type: text
    content: Mieux vaut habiter dans un pays désertique
  - type: text
    content: qu’avec une femme querelleuse et irritable.
  '2':
  - type: text
    content: Un homme croit que tout ce qu’il fait est juste,
  - type: text
    content: mais c’est l’Eternel qui apprécie les motivations.
  '20':
  - type: text
    content: Dans la demeure de l’homme sage, on trouve de précieux trésors et des réserves d’huile,
  - type: text
    content: mais l’insensé dilapide ce qu’il a.
  '21':
  - type: text
    content: Qui cherche à être juste et bienveillant trouvera la vie,
  - type: text
    content: il sera traité avec justice et honoré.
  '22':
  - type: text
    content: Le sage attaque la cité défendue par de vaillants guerriers
  - type: text
    content: et fait tomber le rempart dans lequel elle mettait sa confiance.
  '23':
  - type: text
    content: Qui surveille sa bouche et sa langue
  - type: text
    content: s’épargne bien des tourments.
  '24':
  - type: text
    content: Le moqueur est un homme arrogant et hautain
  - type: text
    content: qui agit poussé par un orgueil démesuré.
  '25':
  - type: text
    content: Les désirs du paresseux le feront mourir
  - type: text
    content: car il refuse de travailler de ses mains.
  '26':
  - type: text
    content: Tout le long du jour, il est en proie à la convoitise,
  - type: text
    content: alors que le juste donne sans retenir.
  '27':
  - type: text
    content: Le sacrifice des méchants est une horreur,
  - type: text
    content: surtout quand ils l’offrent avec des arrière-pensées criminelles.
  '28':
  - type: text
    content: Le témoin mensonger périra,
  - type: text
    content: mais l’homme qui sait écouter aura toujours le droit de parler.
  '29':
  - type: text
    content: Le méchant se donne un air assuré,
  - type: text
    content: alors que l’homme droit réfléchit à sa conduite
  - type: note
    content: 'Selon une ancienne tradition de lecture rabbinique, un manuscrit hébreu et l’ancienne version grecque. Le texte hébreu traditionnel et d’autres versions anciennes portent : assure son chemin.'
  - type: text
    content: .
  '3':
  - type: text
    content: Lorsqu’un homme fait ce qui est juste et droit,
  - type: text
    content: cela fait plaisir à l’Eternel, plus que s’il lui offrait des sacrifices.
  '30':
  - type: text
    content: Face à l’Eternel, il n’y a ni sagesse, ni intelligence,
  - type: text
    content: ni conseil qui tienne.
  '31':
  - type: text
    content: Vous pouvez harnacher le cheval pour le jour du combat,
  - type: text
    content: mais la victoire dépend de l’Eternel.
  '4':
  - type: text
    content: Le regard hautain, le cœur orgueilleux,
  - type: text
    content: toute la vie des méchants n’est que péché.
  '5':
  - type: text
    content: Les projets d’un homme actif sont profitables,
  - type: text
    content: mais agir avec précipitation, c’est courir vers le dénuement.
  '6':
  - type: text
    content: S’enrichir par le mensonge,
  - type: text
    content: procure un profit illusoire et fugitif qui mène à la mort.
  '7':
  - type: text
    content: Parce qu’ils n’ont pas voulu agir selon le droit,
  - type: text
    content: les méchants sont emportés par la ruine.
  '8':
  - type: text
    content: La conduite coupable est tortueuse,
  - type: text
    content: mais l’homme intègre agit avec droiture.
  '9':
  - type: text
    content: Mieux vaut habiter dans un coin sur un toit en terrasse
  - type: text
    content: que de partager la maison d’une femme querelleuse.
