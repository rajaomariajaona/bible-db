document_id: PRO.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le cœur du roi est comme un cours d’eau entre les mains de l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le dirige à son gré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir les exemples de Nabuchodonosor (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 4.28-29
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '32'
        - type: text
          text: ) et de Cyrus (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 45.1-3
        - type: text
          text: '  ; comparer '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 6.22
        - type: text
          text: ). Voir 16.1, 9 ; 19.21 ; 20.24.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le méchant aspire à faire du mal ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Quand le châtiment atteint le moqueur, l’inexpérimenté en devient sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand on instruit le sage, il acquiert de la connaissance.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le Dieu juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’homme juste.
      marker-yv: yv-n
    - type: text
      text: ' est attentif à ce qui se passe dans la demeure des méchants,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les précipite dans le malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Qui fait la sourde oreille quand le malheureux appelle à l’aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: appellera lui-même à l’aide sans obtenir de réponse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Un cadeau offert en secret apaise la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un pot-de-vin glissé en cachette calme la plus violente fureur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.8'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '23'
        - type: text
          text: . La limite qui sépare le « cadeau » du « pot-de-vin » est facilement franchie.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: C’est une joie pour le juste d’agir selon le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est un supplice pour ceux qui font le mal.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L’homme qui s’écarte du chemin tracé par le bon sens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ira bientôt reposer en compagnie des morts.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Qui aime les plaisirs tombera dans l’indigence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a un faible pour le vin et la grande vie ne sera jamais riche.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le méchant servira de rançon pour le juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le traître pour les hommes droits.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mieux vaut habiter dans un pays désertique
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’avec une femme querelleuse et irritable.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Un homme croit que tout ce qu’il fait est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est l’Eternel qui apprécie les motivations.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dans la demeure de l’homme sage, on trouve de précieux trésors et des réserves d’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’insensé dilapide ce qu’il a.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Qui cherche à être juste et bienveillant trouvera la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera traité avec justice et honoré.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Le sage attaque la cité défendue par de vaillants guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fait tomber le rempart dans lequel elle mettait sa confiance.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Qui surveille sa bouche et sa langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’épargne bien des tourments.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Le moqueur est un homme arrogant et hautain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui agit poussé par un orgueil démesuré.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Les désirs du paresseux le feront mourir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il refuse de travailler de ses mains.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Tout le long du jour, il est en proie à la convoitise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que le juste donne sans retenir.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Le sacrifice des méchants est une horreur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surtout quand ils l’offrent avec des arrière-pensées criminelles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Le témoin mensonger périra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme qui sait écouter aura toujours le droit de parler.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Le méchant se donne un air assuré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que l’homme droit réfléchit à sa conduite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon une ancienne tradition de lecture rabbinique, un manuscrit hébreu et l’ancienne version grecque. Le texte hébreu traditionnel et d’autres versions anciennes portent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: assure son chemin.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lorsqu’un homme fait ce qui est juste et droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cela fait plaisir à l’Eternel, plus que s’il lui offrait des sacrifices.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Face à l’Eternel, il n’y a ni sagesse, ni intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni conseil qui tienne.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Vous pouvez harnacher le cheval pour le jour du combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la victoire dépend de l’Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le regard hautain, le cœur orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute la vie des méchants n’est que péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les projets d’un homme actif sont profitables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais agir avec précipitation, c’est courir vers le dénuement.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: S’enrichir par le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: procure un profit illusoire et fugitif qui mène à la mort.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Parce qu’ils n’ont pas voulu agir selon le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les méchants sont emportés par la ruine.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La conduite coupable est tortueuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme intègre agit avec droiture.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mieux vaut habiter dans un coin sur un toit en terrasse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de partager la maison d’une femme querelleuse.
