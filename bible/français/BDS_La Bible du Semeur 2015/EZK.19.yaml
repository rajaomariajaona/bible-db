document_id: EZK.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La complainte sur les princes d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, entonne une complainte sur les princes d’Israël, et dis :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta mère ressemblait ╵à une vigne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'était comme une vigne dans ton sang, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut-être « dans sa sève ». Deux manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'était comme une vigne de ton vignoble. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour l’image de la vigne, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15.2'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plantée au bord de l’eau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle donnait du fruit ╵et poussait du feuillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grâce à l’eau abondante.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lui poussa des branches ╵qui étaient vigoureuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et devinrent des sceptres ╵de souverains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa taille s’éleva ╵entre l’épais feuillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle frappait la vue ╵par sa grandeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses nombreux sarments.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais elle a été arrachée ╵avec fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on l’a jetée par terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vent d’orient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vent d’orient
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.10'
        - type: text
          text: ', Nabuchodonosor et ses armées.'
      marker-yv: yv-n
    - type: text
      text: ' ╵a desséché ses fruits ╵qui sont tombés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses rameaux vigoureux ╵se sont flétris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le feu les a brûlés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voici maintenant ╵transplantée au désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans une terre aride, ╵sur un sol desséché.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un feu a jailli de ses branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a dévoré ses sarments et ses fruits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il ne lui reste plus ╵de rameaux vigoureux :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus de sceptre royal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est là une complainte, ╵à chanter comme telle. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ah ! Quelle lionne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lionne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut représenter la dynastie royale, ou bien Juda (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 49.9
        - type: text
          text: ), ou encore Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' était ta mère,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi les lions !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle était étendue ╵au milieu des lionceaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle élevait ses petits.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lionne donna la prééminence ╵à l’un d’entre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il devint un jeune lion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jeune lion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: représente Yoahaz, emmené en Egypte par le pharaon Néko (v.  4 ; 2 R 23.31-34).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il apprit ╵à déchirer sa proie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il dévora des hommes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des peuples étrangers ╵ont entendu parler de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fut pris dans leur fosse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on l’emmena en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des crochets aux narines.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand la lionne se rendit compte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que son attente était déçue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il n’y avait plus d’espoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle prit un autre de ses lionceaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle en fit un jeune lion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'autre lionceau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: représente soit Yehoyakîn soit Sédécias qui furent tous deux déportés à Babylone (v. 9 ; voir 2 R 24.15 ; 25.7).
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se mit à rôder ╵avec les autres lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il devint un jeune lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il apprit ╵à déchirer sa proie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il dévora des hommes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ruina leurs palais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le targoum. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il coucha avec ses veuves.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et détruisit leurs villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le pays tout entier ╵et tous ses habitants ╵furent terrorisés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à son rugissement.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant les nations ╵des pays d’alentour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’opposèrent à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elles tendirent leurs filets sur lui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fut pris dans leur fosse.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis on le mit en cage, ╵des crochets aux narines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on le conduisit ╵au roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on l’emprisonna ╵dans une forteresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’on n’entende plus ╵tous ses rugissements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les monts d’Israël.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La complainte de la vigne
    marker-yv: yv-h
