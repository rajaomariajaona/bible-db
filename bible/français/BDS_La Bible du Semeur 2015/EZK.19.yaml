document_id: EZK.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La complainte sur les princes d’Israël
  - type: text
    content: 'Et toi, entonne une complainte sur les princes d’Israël, et dis :'
  '10':
  - type: text
    content: Ta mère ressemblait ╵à une vigne
  - type: note
    content: 'Le texte hébreu traditionnel a : était comme une vigne dans ton sang, peut-être « dans sa sève ». Deux manuscrits hébreux ont : était comme une vigne de ton vignoble. Pour l’image de la vigne, voir 15.2 et note.'
  - type: text
    content: plantée au bord de l’eau.
  - type: text
    content: Elle donnait du fruit ╵et poussait du feuillage,
  - type: text
    content: grâce à l’eau abondante.
  '11':
  - type: text
    content: Il lui poussa des branches ╵qui étaient vigoureuses
  - type: text
    content: et devinrent des sceptres ╵de souverains.
  - type: text
    content: Sa taille s’éleva ╵entre l’épais feuillage,
  - type: text
    content: elle frappait la vue ╵par sa grandeur
  - type: text
    content: et ses nombreux sarments.
  '12':
  - type: text
    content: Mais elle a été arrachée ╵avec fureur,
  - type: text
    content: on l’a jetée par terre.
  - type: text
    content: Le vent d’orient
  - type: note
    content: 'vent d’orient: comme en 17.10, Nabuchodonosor et ses armées.'
  - type: text
    content: ' ╵a desséché ses fruits ╵qui sont tombés,'
  - type: text
    content: ses rameaux vigoureux ╵se sont flétris,
  - type: text
    content: le feu les a brûlés.
  '13':
  - type: text
    content: La voici maintenant ╵transplantée au désert
  - type: text
    content: dans une terre aride, ╵sur un sol desséché.
  '14':
  - type: text
    content: Un feu a jailli de ses branches,
  - type: text
    content: a dévoré ses sarments et ses fruits.
  - type: text
    content: 'Il ne lui reste plus ╵de rameaux vigoureux :'
  - type: text
    content: plus de sceptre royal,
  - type: text
    content: c’est là une complainte, ╵à chanter comme telle. »
  '2':
  - type: text
    content: « Ah ! Quelle lionne
  - type: note
    content: La lionne peut représenter la dynastie royale, ou bien Juda (voir Gn 49.9), ou encore Jérusalem.
  - type: text
    content: ' était ta mère,'
  - type: text
    content: parmi les lions !
  - type: text
    content: Elle était étendue ╵au milieu des lionceaux
  - type: text
    content: et elle élevait ses petits.
  '3':
  - type: text
    content: La lionne donna la prééminence ╵à l’un d’entre eux.
  - type: text
    content: Il devint un jeune lion
  - type: note
    content: Le jeune lion représente Yoahaz, emmené en Egypte par le pharaon Néko (v.  4 ; 2 R 23.31-34).
  - type: text
    content: et il apprit ╵à déchirer sa proie ;
  - type: text
    content: il dévora des hommes.
  '4':
  - type: text
    content: Des peuples étrangers ╵ont entendu parler de lui,
  - type: text
    content: il fut pris dans leur fosse
  - type: text
    content: et on l’emmena en Egypte,
  - type: text
    content: avec des crochets aux narines.
  '5':
  - type: text
    content: Quand la lionne se rendit compte
  - type: text
    content: que son attente était déçue
  - type: text
    content: et qu’il n’y avait plus d’espoir,
  - type: text
    content: elle prit un autre de ses lionceaux
  - type: text
    content: et elle en fit un jeune lion
  - type: note
    content: L’autre lionceau représente soit Yehoyakîn soit Sédécias qui furent tous deux déportés à Babylone (v. 9 ; voir 2 R 24.15 ; 25.7).
  - type: text
    content: .
  '6':
  - type: text
    content: Il se mit à rôder ╵avec les autres lions,
  - type: text
    content: il devint un jeune lion
  - type: text
    content: et il apprit ╵à déchirer sa proie ;
  - type: text
    content: il dévora des hommes.
  '7':
  - type: text
    content: Il ruina leurs palais
  - type: note
    content: 'D’après le targoum. Le texte hébreu traditionnel a : il coucha avec ses veuves.'
  - type: text
    content: et détruisit leurs villes,
  - type: text
    content: le pays tout entier ╵et tous ses habitants ╵furent terrorisés
  - type: text
    content: à son rugissement.
  '8':
  - type: text
    content: Cependant les nations ╵des pays d’alentour
  - type: text
    content: s’opposèrent à lui,
  - type: text
    content: 'elles tendirent leurs filets sur lui :'
  - type: text
    content: il fut pris dans leur fosse.
  '9':
  - type: text
    content: Puis on le mit en cage, ╵des crochets aux narines,
  - type: text
    content: et on le conduisit ╵au roi de Babylone,
  - type: text
    content: et on l’emprisonna ╵dans une forteresse
  - type: text
    content: pour qu’on n’entende plus ╵tous ses rugissements
  - type: text
    content: sur les monts d’Israël.
  - type: heading
    content: La complainte de la vigne
