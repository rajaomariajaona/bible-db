document_id: PSA.98,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu vient juger le monde
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à l’Eternel ╵un cantique nouveau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il accomplit des prodiges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par sa puissance, ╵par son pouvoir divin, ╵il a remporté la victoire.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Eternel fait connaître son salut ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux yeux des autres peuples, ╵il a révélé sa justice.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Eternel a manifesté ╵son amour fidèle envers Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’au bout de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a vu le salut ╵que notre Dieu a accompli.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Acclame l’Eternel, ╵ô terre tout entière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poussez des cris de joie ╵et d’allégresse ╵au son de la musique !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Célébrez l’Eternel ╵avec la lyre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, au son de la lyre, ╵et par vos chants !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Au son de la trompette ╵et aux accents du cor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '98.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trompette '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'droite en argent était utilisée par les seuls prêtres ; c’est la seule mention de cet instrument dans les Psaumes. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était fait d’une corne de bélier (cf. 47.6 ; 81.4 ; 150.3). Cor et clameur retentissaient à la guerre (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 6.1-5
        - type: text
          text: ) et dans les cérémonies religieuses (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 29.1
        - type: text
          text: ). Ils annonçaient aussi le Règne de Dieu (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: So 1.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: éclatez en acclamations ╵en présence de l’Eternel, le Roi !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que la mer retentisse ╵et tout ce qui la peuple !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’univers résonne ╵avec ses habitants !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que les rivières ╵battent des mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les montagnes, ╵à l’unisson, ╵chantent de joie,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: aux yeux de l’Eternel, ╵car il vient gouverner
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '98.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 82.8
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: ' la terre !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il gouvernera le monde ╵selon ce qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il gouvernera les peuples ╵selon ce qui est droit.
