document_id: PSA.98,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu vient juger le monde
  - type: text
    content: Psaume.
  - type: text
    content: Chantez à l’Eternel ╵un cantique nouveau
  - type: text
    content: car il accomplit des prodiges.
  - type: text
    content: Par sa puissance, ╵par son pouvoir divin, ╵il a remporté la victoire.
  '2':
  - type: text
    content: L’Eternel fait connaître son salut ;
  - type: text
    content: aux yeux des autres peuples, ╵il a révélé sa justice.
  '3':
  - type: text
    content: L’Eternel a manifesté ╵son amour fidèle envers Israël.
  - type: text
    content: Jusqu’au bout de la terre,
  - type: text
    content: on a vu le salut ╵que notre Dieu a accompli.
  '4':
  - type: text
    content: Acclame l’Eternel, ╵ô terre tout entière,
  - type: text
    content: poussez des cris de joie ╵et d’allégresse ╵au son de la musique !
  '5':
  - type: text
    content: Célébrez l’Eternel ╵avec la lyre,
  - type: text
    content: oui, au son de la lyre, ╵et par vos chants !
  '6':
  - type: text
    content: Au son de la trompette ╵et aux accents du cor
  - type: note
    content: La trompette droite en argent était utilisée par les seuls prêtres ; c’est la seule mention de cet instrument dans les Psaumes. Le cor était fait d’une corne de bélier (cf. 47.6 ; 81.4 ; 150.3). Cor et clameur retentissaient à la guerre (Jos 6.1-5) et dans les cérémonies religieuses (Nb 29.1). Ils annonçaient aussi le Règne de Dieu (So 1.16).
  - type: text
    content: ','
  - type: text
    content: éclatez en acclamations ╵en présence de l’Eternel, le Roi !
  '7':
  - type: text
    content: Que la mer retentisse ╵et tout ce qui la peuple !
  - type: text
    content: Que l’univers résonne ╵avec ses habitants !
  '8':
  - type: text
    content: Que les rivières ╵battent des mains,
  - type: text
    content: que les montagnes, ╵à l’unisson, ╵chantent de joie,
  '9':
  - type: text
    content: aux yeux de l’Eternel, ╵car il vient gouverner
  - type: note
    content: Voir Ps 82.8 et la note.
  - type: text
    content: ' la terre !'
  - type: text
    content: Oui, il gouvernera le monde ╵selon ce qui est juste,
  - type: text
    content: et il gouvernera les peuples ╵selon ce qui est droit.
