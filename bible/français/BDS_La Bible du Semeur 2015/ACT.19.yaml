document_id: ACT.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul à Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant qu’Apollos se trouvait à Corinthe, Paul, après avoir traversé la région montagneuse d’Asie Mineure, descendit à Ephèse. Il y rencontra un petit groupe de disciples et leur demanda : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Avez-vous reçu le Saint-Esprit quand vous êtes devenus croyants ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils lui répondirent : Nous n’avons même pas entendu dire qu’il y ait un Saint-Esprit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: – Quel baptême avez-vous donc reçu ? poursuivit Paul.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Celui de Jean-Baptiste, lui répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: – Oui, reprit Paul, Jean baptisait les Israélites en signe d’un profond changement, mais il leur disait aussi de croire en celui qui viendrait après lui, c’est-à-dire en Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après avoir entendu cela, ils furent baptisés au nom du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Paul leur imposa les mains et le Saint-Esprit descendit sur eux : ils se mirent à parler dans diverses langues et à prophétiser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il y avait là environ douze hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Paul se rendit ensuite à la synagogue où, pendant trois mois, il prit la parole avec une grande assurance ; il y parlait du royaume de Dieu et s’efforçait de convaincre ses auditeurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais un certain nombre de Juifs s’endurcissaient et refusaient de se laisser convaincre : en pleine assemblée, ils tinrent des propos méprisants au sujet de la Voie du Seigneur. Alors Paul se sépara d’eux et prit à part les disciples qu’il continua d’enseigner tous les jours dans l’école d’un nommé Tyrannus'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de 11 heures à 16 heures.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela dura deux ans, si bien que tous les habitants de la province d’Asie, tant Juifs que Grecs, entendirent la Parole du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu faisait des miracles extraordinaires par les mains de Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On allait jusqu’à prendre des mouchoirs ou du linge qu’il avait touchés pour les appliquer aux malades. Ceux-ci guérissaient et les mauvais esprits s’enfuyaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quelques Juifs, qui allaient de lieu en lieu pour chasser les démons, voulurent alors invoquer, eux aussi, le nom du Seigneur Jésus sur ceux qui étaient sous l’emprise d’esprits mauvais.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Par le nom de ce Jésus que Paul annonce, disaient-ils, je vous ordonne de sortir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ceux qui agissaient ainsi étaient les sept fils d’un certain Scéva, un chef des prêtres juifs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais l’esprit mauvais leur répondit : Jésus ? Je le connais. Paul, je sais qui c’est. Mais vous, qui êtes-vous ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Là-dessus, l’homme qui avait en lui le mauvais esprit se jeta sur eux, les maîtrisa et les malmena avec une telle violence qu’ils s’enfuirent de la maison, les vêtements en lambeaux, et couverts de blessures.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cet incident fut connu de tous les habitants d’Ephèse. Juifs et Grecs furent tous saisis de crainte, et le nom du Seigneur Jésus fut l’objet d’un grand respect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup de ceux qui étaient devenus croyants venaient avouer et déclarer publiquement les pratiques auxquelles ils s’étaient livrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et beaucoup de ceux qui avaient exercé la magie apportèrent leurs livres de sorcellerie, les mirent en tas et les firent brûler aux yeux de tous. Leur valeur fut estimée à cinquante mille pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On peut estimer la valeur totale de ces livres à l’équivalent de plus de cent cinquante années de travail d’un ouvrier de l’époque.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est ainsi que la Parole du Seigneur se répandait de plus en plus, grâce à la puissance du Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la Parole du Seigneur se répandait avec puissance.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Après ces événements, Paul, poussé par l’Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en son for intérieur.
    marker-yv: yv-n
  - type: text
    text: ', décida de se rendre à Jérusalem en passant par la Macédoine et l’Achaïe.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Après avoir été là-bas, dit-il, il faudra que je me rende aussi à Rome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il envoya deux de ses collaborateurs, Timothée et Eraste, en Macédoine, et resta lui-même encore quelque temps dans la province d’Asie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Difficultés à Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A cette époque, la Voie du Seigneur fut l’occasion de troubles sérieux à Ephèse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Un bijoutier, nommé Démétrius, fabriquait de petits temples d’Artémis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Artémis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était le nom grec d’une déesse orientale de la fertilité.
    marker-yv: yv-n
  - type: text
    text: ' en argent et procurait aux artisans de sa corporation des gains considérables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Un jour, il les convoqua tous, ainsi que les ouvriers qui vivaient de la même industrie. Il leur dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mes amis ! Vous savez bien que nous devons notre prospérité à l’exercice de notre métier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Or, vous voyez ce qui se passe – ou vous en entendez parler : non seulement à Ephèse, mais dans presque toute la province d’Asie, ce Paul a remué de grandes foules. Il les a persuadées que les divinités fabriquées par des hommes ne sont pas de vrais dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ce n’est pas seulement notre corporation qui risque d’être discréditée, mais le temple de la grande déesse Artémis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'temple d’Artémis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a été classé parmi les sept merveilles du monde antique : il faisait 127 m sur 72 m, et avait cent colonnes.'
    marker-yv: yv-n
  - type: text
    text: ' lui-même pourrait y perdre toute sa renommée. Toute l’Asie et le monde entier adore cette déesse et il n’en faudrait pas beaucoup pour qu’elle soit discréditée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A ces mots, les auditeurs devinrent furieux et se mirent à scander : Grande est l’Artémis d’Ephèse !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Bientôt, toute la ville fut en effervescence. On s’empara de Gaïus et d’Aristarque, deux Macédoniens qui accompagnaient Paul dans son voyage, et l’on se précipita en foule au théâtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les ruines de ce théâtre en ont révélé la grandeur : il comportait près de 26 000 places assises sur des gradins. Il servait aux jeux, aux représentations théâtrales et aux assemblées publiques.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul voulait se présenter devant le peuple, mais les disciples l’en empêchèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Et même quelques hauts fonctionnaires de la province
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'asiarques, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui présidaient au culte provincial de l’empereur et de Rome.
    marker-yv: yv-n
  - type: text
    text: ', qui le tenaient en amitié, lui firent parvenir un message pour lui recommander de ne pas se rendre au théâtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Cependant, l’assemblée se tenait dans la plus grande confusion. Les gens hurlaient, les uns criant telle chose, les autres telle autre, et la plupart ne savaient pas pourquoi ils étaient venus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Des gens de la foule expliquèrent l’affaire à un certain Alexandre, que les Juifs avaient poussé en avant. Alexandre fit signe de la main qu’il voulait s’adresser au peuple pour prendre la défense de ses coreligionnaires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais dès qu’on eut appris qu’il était Juif, tous se remirent à crier en chœur pendant près de deux heures : Grande est l’Artémis d’Ephèse !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'A la fin, le secrétaire de la ville parvint à calmer le peuple :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ephésiens, dit-il, quel homme au monde ignore que notre cité d’Ephèse est la gardienne du temple de la grande Artémis et de sa statue tombée du ciel ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'C’est là un fait incontestable. Il faut donc vous calmer et ne rien faire d’irréfléchi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Vous avez amené ici ces hommes, mais ils n’ont commis aucun sacrilège dans le temple, ils n’ont dit aucun mal de notre déesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Si donc Démétrius et les artisans de sa corporation ont des griefs contre quelqu’un, ils n’ont qu’à porter plainte en bonne et due forme ! Il y a des jours d’audience et des magistrats pour cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et si vous avez encore d’autres réclamations à formuler, on les examinera lors de l’assemblée légale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais nous risquons de nous faire accuser de révolte pour ce qui s’est passé aujourd’hui, car nous ne pourrions donner aucune raison pour expliquer cette manifestation.
- type: usfm
  marker: p
  children:
  - type: text
    text: Là-dessus, il ordonna à l’assemblée de se disperser.
