document_id: ACT.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Ephèse
  - type: text
    content: 'Pendant qu’Apollos se trouvait à Corinthe, Paul, après avoir traversé la région montagneuse d’Asie Mineure, descendit à Ephèse. Il y rencontra un petit groupe de disciples et leur demanda : '
  '10':
  - type: text
    content: 'Cela dura deux ans, si bien que tous les habitants de la province d’Asie, tant Juifs que Grecs, entendirent la Parole du Seigneur. '
  '11':
  - type: text
    content: 'Dieu faisait des miracles extraordinaires par les mains de Paul. '
  '12':
  - type: text
    content: On allait jusqu’à prendre des mouchoirs ou du linge qu’il avait touchés pour les appliquer aux malades. Ceux-ci guérissaient et les mauvais esprits s’enfuyaient.
  '13':
  - type: text
    content: Quelques Juifs, qui allaient de lieu en lieu pour chasser les démons, voulurent alors invoquer, eux aussi, le nom du Seigneur Jésus sur ceux qui étaient sous l’emprise d’esprits mauvais.
  - type: text
    content: – Par le nom de ce Jésus que Paul annonce, disaient-ils, je vous ordonne de sortir.
  '14':
  - type: text
    content: Ceux qui agissaient ainsi étaient les sept fils d’un certain Scéva, un chef des prêtres juifs.
  '15':
  - type: text
    content: 'Mais l’esprit mauvais leur répondit : Jésus ? Je le connais. Paul, je sais qui c’est. Mais vous, qui êtes-vous ?'
  '16':
  - type: text
    content: Là-dessus, l’homme qui avait en lui le mauvais esprit se jeta sur eux, les maîtrisa et les malmena avec une telle violence qu’ils s’enfuirent de la maison, les vêtements en lambeaux, et couverts de blessures.
  '17':
  - type: text
    content: 'Cet incident fut connu de tous les habitants d’Ephèse. Juifs et Grecs furent tous saisis de crainte, et le nom du Seigneur Jésus fut l’objet d’un grand respect. '
  '18':
  - type: text
    content: 'Beaucoup de ceux qui étaient devenus croyants venaient avouer et déclarer publiquement les pratiques auxquelles ils s’étaient livrés. '
  '19':
  - type: text
    content: Et beaucoup de ceux qui avaient exercé la magie apportèrent leurs livres de sorcellerie, les mirent en tas et les firent brûler aux yeux de tous. Leur valeur fut estimée à cinquante mille pièces d’argent
  - type: note
    content: On peut estimer la valeur totale de ces livres à l’équivalent de plus de cent cinquante années de travail d’un ouvrier de l’époque.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Avez-vous reçu le Saint-Esprit quand vous êtes devenus croyants ?
  - type: text
    content: 'Ils lui répondirent : Nous n’avons même pas entendu dire qu’il y ait un Saint-Esprit.'
  '20':
  - type: text
    content: C’est ainsi que la Parole du Seigneur se répandait de plus en plus, grâce à la puissance du Seigneur
  - type: note
    content: 'Certains manuscrits ont : la Parole du Seigneur se répandait avec puissance.'
  - type: text
    content: .
  '21':
  - type: text
    content: Après ces événements, Paul, poussé par l’Esprit
  - type: note
    content: 'Autre traduction : en son for intérieur.'
  - type: text
    content: ', décida de se rendre à Jérusalem en passant par la Macédoine et l’Achaïe.'
  - type: text
    content: – Après avoir été là-bas, dit-il, il faudra que je me rende aussi à Rome.
  '22':
  - type: text
    content: Il envoya deux de ses collaborateurs, Timothée et Eraste, en Macédoine, et resta lui-même encore quelque temps dans la province d’Asie.
  - type: heading
    content: Difficultés à Ephèse
  '23':
  - type: text
    content: 'A cette époque, la Voie du Seigneur fut l’occasion de troubles sérieux à Ephèse. '
  '24':
  - type: text
    content: Un bijoutier, nommé Démétrius, fabriquait de petits temples d’Artémis
  - type: note
    content: Artémis était le nom grec d’une déesse orientale de la fertilité.
  - type: text
    content: ' en argent et procurait aux artisans de sa corporation des gains considérables. '
  '25':
  - type: text
    content: 'Un jour, il les convoqua tous, ainsi que les ouvriers qui vivaient de la même industrie. Il leur dit :'
  - type: text
    content: 'Mes amis ! Vous savez bien que nous devons notre prospérité à l’exercice de notre métier. '
  '26':
  - type: text
    content: 'Or, vous voyez ce qui se passe – ou vous en entendez parler : non seulement à Ephèse, mais dans presque toute la province d’Asie, ce Paul a remué de grandes foules. Il les a persuadées que les divinités fabriquées par des hommes ne sont pas de vrais dieux. '
  '27':
  - type: text
    content: Ce n’est pas seulement notre corporation qui risque d’être discréditée, mais le temple de la grande déesse Artémis
  - type: note
    content: 'Le temple d’Artémis a été classé parmi les sept merveilles du monde antique : il faisait 127 m sur 72 m, et avait cent colonnes.'
  - type: text
    content: ' lui-même pourrait y perdre toute sa renommée. Toute l’Asie et le monde entier adore cette déesse et il n’en faudrait pas beaucoup pour qu’elle soit discréditée.'
  '28':
  - type: text
    content: 'A ces mots, les auditeurs devinrent furieux et se mirent à scander : Grande est l’Artémis d’Ephèse !'
  '29':
  - type: text
    content: Bientôt, toute la ville fut en effervescence. On s’empara de Gaïus et d’Aristarque, deux Macédoniens qui accompagnaient Paul dans son voyage, et l’on se précipita en foule au théâtre
  - type: note
    content: 'Les ruines de ce théâtre en ont révélé la grandeur : il comportait près de 26 000 places assises sur des gradins. Il servait aux jeux, aux représentations théâtrales et aux assemblées publiques.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: – Quel baptême avez-vous donc reçu ? poursuivit Paul.
  - type: text
    content: – Celui de Jean-Baptiste, lui répondirent-ils.
  '30':
  - type: text
    content: 'Paul voulait se présenter devant le peuple, mais les disciples l’en empêchèrent. '
  '31':
  - type: text
    content: Et même quelques hauts fonctionnaires de la province
  - type: note
    content: Il s’agit des asiarques, qui présidaient au culte provincial de l’empereur et de Rome.
  - type: text
    content: ', qui le tenaient en amitié, lui firent parvenir un message pour lui recommander de ne pas se rendre au théâtre. '
  '32':
  - type: text
    content: 'Cependant, l’assemblée se tenait dans la plus grande confusion. Les gens hurlaient, les uns criant telle chose, les autres telle autre, et la plupart ne savaient pas pourquoi ils étaient venus. '
  '33':
  - type: text
    content: Des gens de la foule expliquèrent l’affaire à un certain Alexandre, que les Juifs avaient poussé en avant. Alexandre fit signe de la main qu’il voulait s’adresser au peuple pour prendre la défense de ses coreligionnaires.
  '34':
  - type: text
    content: 'Mais dès qu’on eut appris qu’il était Juif, tous se remirent à crier en chœur pendant près de deux heures : Grande est l’Artémis d’Ephèse !'
  '35':
  - type: text
    content: 'A la fin, le secrétaire de la ville parvint à calmer le peuple :'
  - type: text
    content: 'Ephésiens, dit-il, quel homme au monde ignore que notre cité d’Ephèse est la gardienne du temple de la grande Artémis et de sa statue tombée du ciel ? '
  '36':
  - type: text
    content: 'C’est là un fait incontestable. Il faut donc vous calmer et ne rien faire d’irréfléchi. '
  '37':
  - type: text
    content: Vous avez amené ici ces hommes, mais ils n’ont commis aucun sacrilège dans le temple, ils n’ont dit aucun mal de notre déesse.
  '38':
  - type: text
    content: 'Si donc Démétrius et les artisans de sa corporation ont des griefs contre quelqu’un, ils n’ont qu’à porter plainte en bonne et due forme ! Il y a des jours d’audience et des magistrats pour cela. '
  '39':
  - type: text
    content: 'Et si vous avez encore d’autres réclamations à formuler, on les examinera lors de l’assemblée légale. '
  '4':
  - type: text
    content: – Oui, reprit Paul, Jean baptisait les Israélites en signe d’un profond changement, mais il leur disait aussi de croire en celui qui viendrait après lui, c’est-à-dire en Jésus.
  '40':
  - type: text
    content: Mais nous risquons de nous faire accuser de révolte pour ce qui s’est passé aujourd’hui, car nous ne pourrions donner aucune raison pour expliquer cette manifestation.
  - type: text
    content: Là-dessus, il ordonna à l’assemblée de se disperser.
  '5':
  - type: text
    content: 'Après avoir entendu cela, ils furent baptisés au nom du Seigneur Jésus. '
  '6':
  - type: text
    content: 'Paul leur imposa les mains et le Saint-Esprit descendit sur eux : ils se mirent à parler dans diverses langues et à prophétiser. '
  '7':
  - type: text
    content: Il y avait là environ douze hommes.
  '8':
  - type: text
    content: 'Paul se rendit ensuite à la synagogue où, pendant trois mois, il prit la parole avec une grande assurance ; il y parlait du royaume de Dieu et s’efforçait de convaincre ses auditeurs. '
  '9':
  - type: text
    content: 'Mais un certain nombre de Juifs s’endurcissaient et refusaient de se laisser convaincre : en pleine assemblée, ils tinrent des propos méprisants au sujet de la Voie du Seigneur. Alors Paul se sépara d’eux et prit à part les disciples qu’il continua d’enseigner tous les jours dans l’école d’un nommé Tyrannus'
  - type: note
    content: 'Certains manuscrits ajoutent : de 11 heures à 16 heures.'
  - type: text
    content: .
