document_id: DEU.33,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse bénit les douze tribus d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les paroles de bénédiction que Moïse, l’homme de Dieu, prononça sur les Israélites avant sa mort. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lévites enseignent ╵tout ton droit à Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta Loi à Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils font monter vers toi ╵le parfum de l’encens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et offrent l’holocauste ╵sur ton autel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bénis, ô Eternel, ╵tout ce qu’ils accomplissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reçois avec faveur ╵les œuvres de leurs mains !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brise les reins, ô Dieu, ╵de tous leurs adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ceux qui les haïssent ╵ne se relèvent plus !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour Benjamin, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aimé de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il demeure en sécurité ╵auprès de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce Dieu qui le protège ╵continuellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui habite lui-même ╵entre ses deux épaules.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour Joseph, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel bénit son pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par la rosée précieuse ╵qui vient du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par les eaux profondes, ╵des nappes souterraines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 5.1-2
        - type: text
          text: '. Pour les v. 13-16, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 49.25-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les produits précieux ╵que mûrit le soleil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par les fruits exquis ╵qui germent chaque mois,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les dons excellents ╵des montagnes anciennes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les meilleurs produits ╵des antiques coteaux,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les plus précieux fruits ╵dont la terre est remplie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la faveur du Dieu ╵qui s’est manifesté ╵dans le buisson ardent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 3.1-6
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vienne pour couronner ╵la tête de Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour orner le front ╵du prince de ses frères !
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il est majestueux, ╵son taureau premier-né.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses cornes sont semblables ╵à celles des grands buffles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il en frappe les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’aux confins du monde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pour les myriades ╵descendant d’Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pour les « milliers » ╵issus de Manassé.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour Zabulon, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis-toi, Zabulon, ╵dans tes expéditions !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois heureux, Issacar, ╵quand tu es sous tes tentes !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils convieront des peuples ╵au haut de leur montagne ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là, ils immoleront ╵des sacrifices ╵conformément aux règles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par mer, ils draineront ╵d’abondantes richesses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils recueilleront ╵les trésors enfouis ╵dans le sable des plages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il peut s’agir soit de la récolte de mollusques dont on tirait la pourpre, soit de l’exploitation du sable pour la fabrication du verre.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est venu ╵du Sinaï,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’est levé pour eux ; ╵aux confins de Séir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le Sinaï et le mont Séir sont associés au don de la Loi qui fut comme un lever de soleil illuminant le peuple de sa clarté.
      marker-yv: yv-n
    - type: text
      text: ' ╵tel le soleil à l’horizon,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a resplendi ╵de la montagne de Parân.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les saints anges par myriades ╵étaient autour de lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hébreu obscur. Certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du midi, vers les pentes des montagnes, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du midi, des pentes des montagnes.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour Gad, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que soit béni celui ╵qui fait pour Gad ╵beaucoup de place !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Couché comme un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il déchire sa proie ╵des pattes jusqu’au crâne.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a jeté les yeux ╵sur la meilleure part,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on lui a réservé ╵une portion de chef,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s’est élancé ╵à la tête du peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour agir en toute justice ╵tel que Dieu le voulait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour se conformer au droit ╵qu’il avait défini ╵en faveur d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 32.16-18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour Dan, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan est un jeune lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui bondit du Basan.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour Nephtali, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nephtali est comblé ╵de la faveur de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ses bénédictions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il prenne possession ╵de l’ouest et du midi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le même mot hébreu désigne l’ouest et la mer ; Nephtali s’installera au nord-ouest de Canaan et occupera les coteaux sud du Liban et de l’Hermon. Le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'midi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne aussi un pays bien ensoleillé et fertile comme l’était son territoire. Si l’on opte pour le sens de mer, ce mot désignerait la « mer de Galilée ».
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour Aser, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que parmi les fils de Jacob, ╵il soit béni, Aser.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il ait la faveur de ses frères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ses pieds trempent ╵dans l’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’abondance d’huile est signe de prospérité agricole.
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les verrous de tes villes ╵soient de fer et de bronze !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta vigueur ╵dure autant que tes jours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après l’ancienne version grecque et la version syriaque. Le mot hébreu du texte hébreu traditionnel est de sens incertain.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’est semblable à Dieu, ╵ô Yeshouroun !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chevauchant dans le ciel, ╵il vient à ton secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est majestueux, ╵monté sur les nuages.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Dieu d’éternité ╵est un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est depuis toujours ╵un soutien ici-bas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il met devant toi ╵l’ennemi en déroute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il dit : « Extermine ! »'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Israël demeure ╵dans la sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la source de Jacob ╵jaillit bien à l’écart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers un pays où poussent ╵le froment et la vigne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où le ciel ╵distille la rosée.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu es heureux, Israël, ╵car qui est comme toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un peuple secouru ╵par l’Eternel lui-même ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est le bouclier ╵qui vient à ton secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est aussi le glaive ╵qui te mène au triomphe !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes ennemis te flatteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, tu marcheras ╵sur les hauteurs de leur pays.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il aime des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il prend soin de ceux qui lui ╵appartiennent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voici à tes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: recueillant tes paroles.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour nous qu’il donna ╵à Moïse une Loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'l’assemblée de Jacob ╵en obtint possession :'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il fut roi de Yeshouroun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '32.15'
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tous les chefs du peuple ╵ont été rassemblés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec les tribus d’Israël.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Ruben vive ╵et qu’il ne meure pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que sa population ╵peu nombreuse subsiste.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour Juda il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute, ô Eternel, ╵la tribu de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: conduis-la vers son peuple !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses mains la défendent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois toi-même son aide ╵contre ses ennemis !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour Lévi il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ourim et le toummim ╵appartiennent à l’homme ╵qui t’est très attaché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as fait passer ╵par l’épreuve à Massa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec qui tu as contesté ╵aux eaux de Meriba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 17.1-7 ; Nb 20.1-13.
      marker-yv: yv-n
    - type: text
      text: ','
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui a dit de son père ╵et de sa propre mère :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je n’y ai pas égard ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pour ses fils, ses frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’a pas fait d’exception
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’est montré fidèle ╵à ta parole seule
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à ton alliance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 32.25-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
