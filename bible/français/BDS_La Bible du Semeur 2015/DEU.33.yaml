document_id: DEU.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse bénit les douze tribus d’Israël
  - type: text
    content: 'Voici les paroles de bénédiction que Moïse, l’homme de Dieu, prononça sur les Israélites avant sa mort. '
  '10':
  - type: text
    content: Les lévites enseignent ╵tout ton droit à Jacob,
  - type: text
    content: ta Loi à Israël,
  - type: text
    content: ils font monter vers toi ╵le parfum de l’encens
  - type: text
    content: et offrent l’holocauste ╵sur ton autel.
  '11':
  - type: text
    content: Bénis, ô Eternel, ╵tout ce qu’ils accomplissent,
  - type: text
    content: reçois avec faveur ╵les œuvres de leurs mains !
  - type: text
    content: Brise les reins, ô Dieu, ╵de tous leurs adversaires,
  - type: text
    content: que ceux qui les haïssent ╵ne se relèvent plus !
  '12':
  - type: text
    content: 'Pour Benjamin, il dit :'
  - type: text
    content: Aimé de l’Eternel,
  - type: text
    content: il demeure en sécurité ╵auprès de lui,
  - type: text
    content: ce Dieu qui le protège ╵continuellement,
  - type: text
    content: qui habite lui-même ╵entre ses deux épaules.
  '13':
  - type: text
    content: 'Et pour Joseph, il dit :'
  - type: text
    content: L’Eternel bénit son pays
  - type: text
    content: par la rosée précieuse ╵qui vient du ciel
  - type: text
    content: et par les eaux profondes, ╵des nappes souterraines
  - type: note
    content: Voir 1 Ch 5.1-2. Pour les v. 13-16, voir Gn 49.25-26.
  - type: text
    content: ','
  '14':
  - type: text
    content: par les produits précieux ╵que mûrit le soleil
  - type: text
    content: et par les fruits exquis ╵qui germent chaque mois,
  '15':
  - type: text
    content: par les dons excellents ╵des montagnes anciennes
  - type: text
    content: et les meilleurs produits ╵des antiques coteaux,
  '16':
  - type: text
    content: par les plus précieux fruits ╵dont la terre est remplie.
  - type: text
    content: Que la faveur du Dieu ╵qui s’est manifesté ╵dans le buisson ardent
  - type: note
    content: Voir Ex 3.1-6.
  - type: text
    content: vienne pour couronner ╵la tête de Joseph,
  - type: text
    content: et pour orner le front ╵du prince de ses frères !
  '17':
  - type: text
    content: Qu’il est majestueux, ╵son taureau premier-né.
  - type: text
    content: Ses cornes sont semblables ╵à celles des grands buffles,
  - type: text
    content: il en frappe les peuples
  - type: text
    content: jusqu’aux confins du monde.
  - type: text
    content: Voilà pour les myriades ╵descendant d’Ephraïm,
  - type: text
    content: voilà pour les « milliers » ╵issus de Manassé.
  '18':
  - type: text
    content: 'Pour Zabulon, il dit :'
  - type: text
    content: Réjouis-toi, Zabulon, ╵dans tes expéditions !
  - type: text
    content: Sois heureux, Issacar, ╵quand tu es sous tes tentes !
  '19':
  - type: text
    content: Ils convieront des peuples ╵au haut de leur montagne ;
  - type: text
    content: là, ils immoleront ╵des sacrifices ╵conformément aux règles,
  - type: text
    content: par mer, ils draineront ╵d’abondantes richesses
  - type: text
    content: et ils recueilleront ╵les trésors enfouis ╵dans le sable des plages
  - type: note
    content: Il peut s’agir soit de la récolte de mollusques dont on tirait la pourpre, soit de l’exploitation du sable pour la fabrication du verre.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Il dit :'
  - type: text
    content: L’Eternel est venu ╵du Sinaï,
  - type: text
    content: il s’est levé pour eux ; ╵aux confins de Séir
  - type: note
    content: Le Sinaï et le mont Séir sont associés au don de la Loi qui fut comme un lever de soleil illuminant le peuple de sa clarté.
  - type: text
    content: ' ╵tel le soleil à l’horizon,'
  - type: text
    content: et il a resplendi ╵de la montagne de Parân.
  - type: text
    content: Et les saints anges par myriades ╵étaient autour de lui
  - type: note
    content: Hébreu obscur. Certains traduisent du midi, vers les pentes des montagnes, ou du midi, des pentes des montagnes.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Pour Gad, il dit :'
  - type: text
    content: Que soit béni celui ╵qui fait pour Gad ╵beaucoup de place !
  - type: text
    content: Couché comme un lion,
  - type: text
    content: il déchire sa proie ╵des pattes jusqu’au crâne.
  '21':
  - type: text
    content: Il a jeté les yeux ╵sur la meilleure part,
  - type: text
    content: on lui a réservé ╵une portion de chef,
  - type: text
    content: et il s’est élancé ╵à la tête du peuple
  - type: text
    content: pour agir en toute justice ╵tel que Dieu le voulait,
  - type: text
    content: et pour se conformer au droit ╵qu’il avait défini ╵en faveur d’Israël
  - type: note
    content: Voir Nb 32.16-18.
  - type: text
    content: .
  '22':
  - type: text
    content: 'Pour Dan, il dit :'
  - type: text
    content: Dan est un jeune lion
  - type: text
    content: qui bondit du Basan.
  '23':
  - type: text
    content: 'Pour Nephtali, il dit :'
  - type: text
    content: Nephtali est comblé ╵de la faveur de l’Eternel,
  - type: text
    content: de ses bénédictions.
  - type: text
    content: Qu’il prenne possession ╵de l’ouest et du midi
  - type: note
    content: Le même mot hébreu désigne l’ouest et la mer ; Nephtali s’installera au nord-ouest de Canaan et occupera les coteaux sud du Liban et de l’Hermon. Le mot midi désigne aussi un pays bien ensoleillé et fertile comme l’était son territoire. Si l’on opte pour le sens de mer, ce mot désignerait la « mer de Galilée ».
  - type: text
    content: .
  '24':
  - type: text
    content: 'Et pour Aser, il dit :'
  - type: text
    content: Que parmi les fils de Jacob, ╵il soit béni, Aser.
  - type: text
    content: Qu’il ait la faveur de ses frères
  - type: text
    content: et que ses pieds trempent ╵dans l’huile
  - type: note
    content: L’abondance d’huile est signe de prospérité agricole.
  - type: text
    content: .
  '25':
  - type: text
    content: Que les verrous de tes villes ╵soient de fer et de bronze !
  - type: text
    content: Que ta vigueur ╵dure autant que tes jours
  - type: note
    content: D’après l’ancienne version grecque et la version syriaque. Le mot hébreu du texte hébreu traditionnel est de sens incertain.
  - type: text
    content: '  !'
  '26':
  - type: text
    content: Nul n’est semblable à Dieu, ╵ô Yeshouroun !
  - type: text
    content: Chevauchant dans le ciel, ╵il vient à ton secours,
  - type: text
    content: il est majestueux, ╵monté sur les nuages.
  '27':
  - type: text
    content: Le Dieu d’éternité ╵est un refuge,
  - type: text
    content: il est depuis toujours ╵un soutien ici-bas.
  - type: text
    content: Et il met devant toi ╵l’ennemi en déroute
  - type: text
    content: 'et il dit : « Extermine ! »'
  '28':
  - type: text
    content: Car Israël demeure ╵dans la sécurité,
  - type: text
    content: la source de Jacob ╵jaillit bien à l’écart
  - type: text
    content: vers un pays où poussent ╵le froment et la vigne
  - type: text
    content: et où le ciel ╵distille la rosée.
  '29':
  - type: text
    content: Que tu es heureux, Israël, ╵car qui est comme toi
  - type: text
    content: un peuple secouru ╵par l’Eternel lui-même ?
  - type: text
    content: Il est le bouclier ╵qui vient à ton secours,
  - type: text
    content: il est aussi le glaive ╵qui te mène au triomphe !
  - type: text
    content: Tes ennemis te flatteront,
  - type: text
    content: mais toi, tu marcheras ╵sur les hauteurs de leur pays.
  '3':
  - type: text
    content: Oui, il aime des peuples,
  - type: text
    content: il prend soin de ceux qui lui ╵appartiennent.
  - type: text
    content: Les voici à tes pieds,
  - type: text
    content: recueillant tes paroles.
  '4':
  - type: text
    content: C’est pour nous qu’il donna ╵à Moïse une Loi,
  - type: text
    content: 'l’assemblée de Jacob ╵en obtint possession :'
  '5':
  - type: text
    content: et il fut roi de Yeshouroun
  - type: note
    content: Voir 32.15.
  - type: text
    content: quand tous les chefs du peuple ╵ont été rassemblés
  - type: text
    content: avec les tribus d’Israël.
  '6':
  - type: text
    content: Que Ruben vive ╵et qu’il ne meure pas,
  - type: text
    content: que sa population ╵peu nombreuse subsiste.
  '7':
  - type: text
    content: 'Et pour Juda il dit :'
  - type: text
    content: Ecoute, ô Eternel, ╵la tribu de Juda,
  - type: text
    content: conduis-la vers son peuple !
  - type: text
    content: Que ses mains la défendent,
  - type: text
    content: sois toi-même son aide ╵contre ses ennemis !
  '8':
  - type: text
    content: 'Et pour Lévi il dit :'
  - type: text
    content: L’ourim et le toummim ╵appartiennent à l’homme ╵qui t’est très attaché,
  - type: text
    content: que tu as fait passer ╵par l’épreuve à Massa,
  - type: text
    content: avec qui tu as contesté ╵aux eaux de Meriba
  - type: note
    content: Voir Ex 17.1-7 ; Nb 20.1-13.
  - type: text
    content: ','
  '9':
  - type: text
    content: 'qui a dit de son père ╵et de sa propre mère :'
  - type: text
    content: « Je n’y ai pas égard ! »
  - type: text
    content: Qui pour ses fils, ses frères,
  - type: text
    content: n’a pas fait d’exception
  - type: text
    content: et s’est montré fidèle ╵à ta parole seule
  - type: text
    content: et à ton alliance
  - type: note
    content: Voir Ex 32.25-29.
  - type: text
    content: .
