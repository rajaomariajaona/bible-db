document_id: PSA.60,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Nous vaincrons malgré tout
  - type: text
    content: 'Au chef de chœur, à chanter sur la mélodie du « Lis du témoignage ». '
  '10':
  - type: text
    content: et, pour me laver, ╵Moab
  - type: note
    content: 'L’orgueilleux Moab (Es 16.6) sert tout juste à l’usage le plus humble : il est un vase d’ablution pour le lavement des pieds (Gn 18.4). L’image est peut-être suggérée par la situation de Moab le long de la rive est de la mer Morte.'
  - type: text
    content: ' me sert de bassine,'
  - type: text
    content: sur Edom, je jette ╵ma sandale
  - type: note
    content: Lancer sa sandale sur une parcelle de terre est un geste symbolique de prise de possession (Dt 25.9-10 ; Rt 4.7 ; Ps 108.10).
  - type: text
    content: ','
  - type: text
    content: et la Philistie, ╵pousse des cris de terreur ╵à cause de moi
  - type: note
    content: 'Autres traductions : pousse des cris contre moi ; ou : et contre la Philistie, je pousse un cri de victoire.'
  - type: text
    content: . »
  '11':
  - type: text
    content: Qui me mènera ╵à la ville forte ?
  - type: text
    content: Qui me conduira ╵à Edom ?
  '12':
  - type: text
    content: Sinon toi, ô Dieu ? ╵Toi qui nous as ╵rejetés,
  - type: text
    content: et qui ne sors plus, ô Dieu ╵avec nos armées ?
  '13':
  - type: text
    content: Viens nous secourir ╵contre l’ennemi
  - type: note
    content: 'Autre traduction : dans la détresse.'
  - type: text
    content: '  !'
  - type: text
    content: Car il est bien illusoire, ╵le secours venant des hommes.
  '14':
  - type: text
    content: Mais avec Dieu nous ferons ╵des exploits,
  - type: text
    content: c’est lui qui écrasera ╵tous nos ennemis.
  '2':
  - type: text
    content: Cantique didactique
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' composé par David à l’occasion de sa guerre contre les Syriens de Mésopotamie et contre les Syriens de Tsoba. Au retour, Joab vainquit les Edomites dans la vallée du Sel, au nombre de douze mille hommes'
  - type: note
    content: Voir 2 S 8.3-14 ; 1 Ch 18.12. La ville de Tsoba était située au nord de Damas entre l’Oronte et l’Euphrate. La Syrie de Tsoba figure dans des textes assyriens sous le nom de Tsoubite ; elle se trouvait à l’est de Hamath. La vallée du Sel est la région stérile au sud de la mer Morte.
  - type: text
    content: .
  '3':
  - type: text
    content: O Dieu, ╵voici que tu nous as rejetés ! ╵Tu as fait la brèche dans nos rangs !
  - type: text
    content: Tu as montré ton courroux, ╵maintenant, rétablis-nous !
  '4':
  - type: text
    content: Tu as fait trembler la terre, ╵tu l’as fissurée,
  - type: text
    content: guéris ses fractures, ╵car elle chancelle.
  '5':
  - type: text
    content: Tu as fait passer ton peuple ╵par des moments très pénibles !
  - type: text
    content: Tu nous as fait boire ╵un vin qui nous étourdit !
  '6':
  - type: text
    content: Tu as agité une bannière ╵pour signifier à ceux qui te craignent
  - type: text
    content: de fuir
  - type: note
    content: 'Ce verset est l’objet de nombreuses interprétations. Autre traduction : tu as donné aux hommes qui te craignent une bannière pour la déployer devant les archers. Ou, en suivant les versions anciennes qui, à la place du mot signifiant archers, ont lu le mot signifiant vérité qui n’en diffère que par une lettre en hébreu : une bannière pour fuir devant la vérité, ou encore : une bannière en faveur de la vérité.'
  - type: text
    content: ' devant les archers.'
  - type: text
    content: Pause
  '7':
  - type: text
    content: Afin que tes bien-aimés ╵voient la délivrance,
  - type: text
    content: interviens et sauve-nous ! ╵Réponds-moi
  - type: note
    content: Pour les v. 7-14, voir 108.7-14.
  - type: text
    content: '  !'
  '8':
  - type: text
    content: Dieu l’a déclaré ╵dans son sanctuaire
  - type: note
    content: 'Autre traduction : dans sa sainteté.'
  - type: text
    content: '  : ╵« Je triompherai !'
  - type: text
    content: Je vais partager Sichem
  - type: note
    content: L’ancienne capitale d’Israël, au centre du pays. Le conquérant partage le pays conquis entre ses soldats (voir Gn 12.6 ; Jos 8.30-35).
  - type: text
    content: . ╵Je vais mesurer ╵au cordeau ╵le val de Soukkoth
  - type: note
    content: La vallée de Soukkoth se trouve à l’est du Jourdain. Le terrain que l’on mesure au cordeau est celui que l’on possède.
  - type: text
    content: .
  '9':
  - type: text
    content: A moi Galaad ! ╵A moi Manassé
  - type: note
    content: Galaad et Manassé constituaient la partie la plus orientale du pays.
  - type: text
    content: '  !'
  - type: text
    content: Ephraïm ╵est un casque pour ma tête.
  - type: text
    content: Mon sceptre royal, ╵c’est Juda,
