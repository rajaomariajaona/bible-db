document_id: PSA.60
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous vaincrons malgré tout
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur, à chanter sur la mélodie du « Lis du témoignage ». '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Cantique didactique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signification incertaine.
    marker-yv: yv-n
  - type: text
    text: ' composé par David à l’occasion de sa guerre contre les Syriens de Mésopotamie et contre les Syriens de Tsoba. Au retour, Joab vainquit les Edomites dans la vallée du Sel, au nombre de douze mille hommes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 2 S 8.3-14 ; 1 Ch 18.12. La ville de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tsoba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était située au nord de Damas entre l’Oronte et l’Euphrate. La Syrie de Tsoba figure dans des textes assyriens sous le nom de Tsoubite ; elle se trouvait à l’est de Hamath. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'La vallée du Sel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est la région stérile au sud de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Dieu, ╵voici que tu nous as rejetés ! ╵Tu as fait la brèche dans nos rangs !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as montré ton courroux, ╵maintenant, rétablis-nous !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu as fait trembler la terre, ╵tu l’as fissurée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: guéris ses fractures, ╵car elle chancelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu as fait passer ton peuple ╵par des moments très pénibles !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu nous as fait boire ╵un vin qui nous étourdit !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as agité une bannière ╵pour signifier à ceux qui te craignent
- type: usfm
  marker: q1
  children:
  - type: text
    text: de fuir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce verset est l’objet de nombreuses interprétations. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as donné aux hommes qui te craignent une bannière pour la déployer devant les archers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou, en suivant les versions anciennes qui, à la place du mot signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'archers, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ont lu le mot signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vérité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui n’en diffère que par une lettre en hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une bannière pour fuir devant la vérité, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou encore : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une bannière en faveur de la vérité.
    marker-yv: yv-n
  - type: text
    text: ' devant les archers.'
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Afin que tes bien-aimés ╵voient la délivrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: interviens et sauve-nous ! ╵Réponds-moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 7-14, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 108.7-14
        metadata:
          usfm: PSA.108.7+PSA.108.8+PSA.108.9+PSA.108.10+PSA.108.11+PSA.108.12+PSA.108.13+PSA.108.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu l’a déclaré ╵dans son sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa sainteté.
    marker-yv: yv-n
  - type: text
    text: '  : ╵« Je triompherai !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais partager Sichem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne capitale d’Israël, au centre du pays. Le conquérant partage le pays conquis entre ses soldats (voir Gn 12.6 ; Jos 8.30-35).
    marker-yv: yv-n
  - type: text
    text: . ╵Je vais mesurer ╵au cordeau ╵le val de Soukkoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La vallée de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Soukkoth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se trouve à l’est du Jourdain. Le terrain que l’on '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mesure au cordeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est celui que l’on possède.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A moi Galaad ! ╵A moi Manassé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Galaad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Manassé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: constituaient la partie la plus orientale du pays.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm ╵est un casque pour ma tête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon sceptre royal, ╵c’est Juda,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: et, pour me laver, ╵Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’orgueilleux '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 16.6
        metadata:
          usfm: ISA.16.6
      - type: text
        text: ') sert tout juste à l’usage le plus humble : il est un vase d’ablution pour le lavement des pieds ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 18.4
        metadata:
          usfm: GEN.18.4
      - type: text
        text: ). L’image est peut-être suggérée par la situation de Moab le long de la rive est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ' me sert de bassine,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur Edom, je jette ╵ma sandale
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lancer sa sandale sur une parcelle de terre est un geste symbolique de prise de possession (Dt 25.9-10 ; Rt 4.7 ; Ps 108.10).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la Philistie, ╵pousse des cris de terreur ╵à cause de moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pousse des cris contre moi ; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et contre la Philistie, je pousse un cri de victoire.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui me mènera ╵à la ville forte ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me conduira ╵à Edom ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sinon toi, ô Dieu ? ╵Toi qui nous as ╵rejetés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne sors plus, ô Dieu ╵avec nos armées ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Viens nous secourir ╵contre l’ennemi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la détresse.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est bien illusoire, ╵le secours venant des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais avec Dieu nous ferons ╵des exploits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est lui qui écrasera ╵tous nos ennemis.
