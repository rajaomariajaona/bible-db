document_id: JDG.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici quels peuples l’Eternel laissa subsister pour mettre à l’épreuve les Israélites qui n’avaient pas participé aux guerres pour la conquête de Canaan. '
  '10':
  - type: text
    content: 'L’Esprit de l’Eternel vint sur lui et il prit la direction d’Israël. Il partit en guerre contre Koushân-Risheatayim, roi de Mésopotamie, et l’Eternel lui donna la victoire sur lui. '
  '11':
  - type: text
    content: Après cela, la région fut en paix pendant quarante ans ; puis Otniel, fils de Qenaz, mourut.
  - type: heading
    content: Ehoud
  '12':
  - type: text
    content: 'Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal. A cause de cela, l’Eternel fortifia Eglôn, roi de Moab, et le dressa contre Israël. '
  '13':
  - type: text
    content: Eglôn s’allia aux Ammonites et aux Amalécites
  - type: note
    content: Les Ammonites étaient les descendants de Loth (Gn 19.38), les Amalécites ceux d’Esaü (Gn 36.12, 16) ; ils vivaient dans le Néguev (Nb 13.29). Ennemis des plus farouches, ils étaient voisins d’Israël à l’est et au sud.
  - type: text
    content: ', et ils attaquèrent les Israélites, les battirent et s’emparèrent de la ville des palmiers'
  - type: note
    content: Jéricho (voir 1.16).
  - type: text
    content: '. '
  '14':
  - type: text
    content: Pendant dix-huit ans, les Israélites furent assujettis à Eglôn, roi de Moab.
  '15':
  - type: text
    content: 'Alors ils implorèrent l’Eternel, et celui-ci leur suscita un libérateur en la personne d’Ehoud, fils de Guéra, de la tribu de Benjamin, un homme qui était gaucher. Les Israélites le chargèrent de porter le tribut à Eglôn, roi de Moab. '
  '16':
  - type: text
    content: 'Ehoud se fabriqua une épée à deux tranchants d’environ cinquante centimètres de long et il la ceignit sous ses vêtements, le long de la cuisse droite. '
  '17':
  - type: text
    content: 'Il alla remettre le tribut à Eglôn, roi de Moab qui était très gros. '
  '18':
  - type: text
    content: 'Lorsqu’il eut fini de présenter le tribut, il renvoya les hommes qui l’avaient apporté. '
  '19':
  - type: text
    content: 'Arrivé aux idoles de pierre à côté de Guilgal, il revint sur ses pas et dit au roi : Majesté, j’ai un message secret à te communiquer. Le roi ordonna à tous ceux qui se tenaient autour de lui de le laisser, et tous ses familiers se retirèrent. '
  '2':
  - type: text
    content: 'Il voulait que les nouvelles générations d’Israélites, qui n’avaient pas connu la guerre, apprennent ce qu’est la guerre. '
  '20':
  - type: text
    content: Alors Ehoud s’approcha du roi qui était assis dans la chambre haute
  - type: note
    content: 'Sens incertain. Autre traduction : le palais d’été.'
  - type: text
    content: ' qu’il s’était réservée sur la terrasse, au frais. Ehoud lui dit : J’ai pour toi un message de Dieu. Le roi se leva de son siège. '
  '21':
  - type: text
    content: 'De sa main gauche, Ehoud saisit l’épée qu’il portait sur sa cuisse droite et l’enfonça dans le ventre du roi. '
  '22':
  - type: text
    content: 'La poignée elle-même pénétra après la lame, et la graisse se referma sur la lame, car Ehoud laissa l’arme dans le ventre du roi, '
  '23':
  - type: text
    content: puis il sortit par le vestibule
  - type: note
    content: 'Autre traduction : par-derrière.'
  - type: text
    content: ', après avoir fermé les portes de la chambre haute à clé derrière lui.'
  '24':
  - type: text
    content: 'Quand il fut sorti, les serviteurs du roi revinrent et ils constatèrent que les portes de la chambre haute étaient fermées à clé. Ils attendirent, se disant que le roi était en train de faire ses besoins dans la chambre d’été. '
  '25':
  - type: text
    content: 'Ils attendirent un bon moment. Enfin, ne sachant plus que penser, et comme il n’ouvrait toujours pas les portes, ils prirent la clé et ouvrirent eux-mêmes et voici que leur maître était étendu à terre, mort. '
  '26':
  - type: text
    content: Pendant qu’ils s’étaient ainsi attardés, Ehoud s’était échappé. Il dépassa les idoles de pierre et s’enfuit vers Seïra
  - type: note
    content: Localisation incertaine, dans la région du mont Séir en Edom ou au nord de Jéricho.
  - type: text
    content: '. '
  '27':
  - type: text
    content: Dès qu’il fut arrivé là, il sonna du cor dans les montagnes d’Ephraïm. Les Israélites descendirent des collines et il se mit à leur tête.
  '28':
  - type: text
    content: Suivez-moi, leur dit-il, car l’Eternel vous donne la victoire sur vos ennemis les Moabites.
  - type: text
    content: 'Ils le suivirent donc et ils occupèrent les gués du Jourdain pour couper le passage aux Moabites, ne laissant personne traverser la rivière. '
  '29':
  - type: text
    content: 'Ils tuèrent ce jour-là environ dix mille hommes de Moab, tous robustes et aguerris et ils ne laissèrent aucun rescapé. '
  '3':
  - type: text
    content: L’Eternel laissa donc dans le pays les cinq principautés philistines, tous les Cananéens et les Sidoniens
  - type: note
    content: Des Phéniciens (Sidon était la plus ancienne ville de Phénicie).
  - type: text
    content: ', les Héviens'
  - type: note
    content: Voir note Jos 9.7.
  - type: text
    content: ' qui habitaient la chaîne du Liban depuis la montagne de Baal-Hermon jusqu’à Lebo-Hamath.'
  '30':
  - type: text
    content: Moab fut affaibli à partir de là par les Israélites et la région connut la paix pendant quatre-vingts ans.
  - type: heading
    content: Shamgar
  '31':
  - type: text
    content: Après Ehoud, vint Shamgar, fils d’Anath. Il tua six cents Philistins avec un aiguillon à bœufs. Lui aussi fut un libérateur d’Israël.
  '4':
  - type: text
    content: 'Ces peuples servirent à éprouver les Israélites pour savoir s’ils obéiraient aux commandements que l’Eternel avait donnés à leurs ancêtres par Moïse. '
  '5':
  - type: text
    content: 'Ainsi les Israélites habitèrent au milieu des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Yebousiens. '
  '6':
  - type: text
    content: Ils épousèrent leurs filles, donnèrent leurs propres filles à leurs fils et adorèrent leurs dieux.
  - type: heading
    content: Otniel
  '7':
  - type: text
    content: 'Les Israélites firent ce que l’Eternel considère comme mal : ils oublièrent l’Eternel leur Dieu et rendirent un culte aux dieux Baals et Ashéras. '
  '8':
  - type: text
    content: 'L’Eternel se mit en colère contre Israël et il les livra au pouvoir de Koushân-Risheatayim, roi de Mésopotamie. Les Israélites lui furent assujettis pendant huit ans. '
  '9':
  - type: text
    content: Ils implorèrent l’Eternel et celui-ci leur suscita un libérateur en la personne d’Otniel, fils de Qenaz, qui était le frère cadet de Caleb. Et Otniel les délivra
  - type: note
    content: Otniel s’était déjà signalé par la prise d’Hébron (voir Jos 15.17 ; Jg 1.13-15).
  - type: text
    content: '. '
