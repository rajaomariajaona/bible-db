document_id: JDG.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici quels peuples l’Eternel laissa subsister pour mettre à l’épreuve les Israélites qui n’avaient pas participé aux guerres pour la conquête de Canaan. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Esprit de l’Eternel vint sur lui et il prit la direction d’Israël. Il partit en guerre contre Koushân-Risheatayim, roi de Mésopotamie, et l’Eternel lui donna la victoire sur lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Après cela, la région fut en paix pendant quarante ans ; puis Otniel, fils de Qenaz, mourut.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ehoud
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal. A cause de cela, l’Eternel fortifia Eglôn, roi de Moab, et le dressa contre Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eglôn s’allia aux Ammonites et aux Amalécites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ammonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient les descendants de Loth (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 19.38
        - type: text
          text: '), les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amalécites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ceux d’Esaü (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 36.12
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16'
        - type: text
          text: ) ; ils vivaient dans le Néguev (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.29
        - type: text
          text: ). Ennemis des plus farouches, ils étaient voisins d’Israël à l’est et au sud.
      marker-yv: yv-n
    - type: text
      text: ', et ils attaquèrent les Israélites, les battirent et s’emparèrent de la ville des palmiers'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jéricho (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.16'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pendant dix-huit ans, les Israélites furent assujettis à Eglôn, roi de Moab.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors ils implorèrent l’Eternel, et celui-ci leur suscita un libérateur en la personne d’Ehoud, fils de Guéra, de la tribu de Benjamin, un homme qui était gaucher. Les Israélites le chargèrent de porter le tribut à Eglôn, roi de Moab. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ehoud se fabriqua une épée à deux tranchants d’environ cinquante centimètres de long et il la ceignit sous ses vêtements, le long de la cuisse droite. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il alla remettre le tribut à Eglôn, roi de Moab qui était très gros. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lorsqu’il eut fini de présenter le tribut, il renvoya les hommes qui l’avaient apporté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Arrivé aux idoles de pierre à côté de Guilgal, il revint sur ses pas et dit au roi : Majesté, j’ai un message secret à te communiquer. Le roi ordonna à tous ceux qui se tenaient autour de lui de le laisser, et tous ses familiers se retirèrent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il voulait que les nouvelles générations d’Israélites, qui n’avaient pas connu la guerre, apprennent ce qu’est la guerre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Alors Ehoud s’approcha du roi qui était assis dans la chambre haute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sens incertain. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le palais d’été.
      marker-yv: yv-n
    - type: text
      text: ' qu’il s’était réservée sur la terrasse, au frais. Ehoud lui dit : J’ai pour toi un message de Dieu. Le roi se leva de son siège. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'De sa main gauche, Ehoud saisit l’épée qu’il portait sur sa cuisse droite et l’enfonça dans le ventre du roi. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La poignée elle-même pénétra après la lame, et la graisse se referma sur la lame, car Ehoud laissa l’arme dans le ventre du roi, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: puis il sortit par le vestibule
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par-derrière.
      marker-yv: yv-n
    - type: text
      text: ', après avoir fermé les portes de la chambre haute à clé derrière lui.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Quand il fut sorti, les serviteurs du roi revinrent et ils constatèrent que les portes de la chambre haute étaient fermées à clé. Ils attendirent, se disant que le roi était en train de faire ses besoins dans la chambre d’été. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils attendirent un bon moment. Enfin, ne sachant plus que penser, et comme il n’ouvrait toujours pas les portes, ils prirent la clé et ouvrirent eux-mêmes et voici que leur maître était étendu à terre, mort. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Pendant qu’ils s’étaient ainsi attardés, Ehoud s’était échappé. Il dépassa les idoles de pierre et s’enfuit vers Seïra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localisation incertaine, dans la région du mont Séir en Edom ou au nord de Jéricho.
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dès qu’il fut arrivé là, il sonna du cor dans les montagnes d’Ephraïm. Les Israélites descendirent des collines et il se mit à leur tête.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Suivez-moi, leur dit-il, car l’Eternel vous donne la victoire sur vos ennemis les Moabites.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils le suivirent donc et ils occupèrent les gués du Jourdain pour couper le passage aux Moabites, ne laissant personne traverser la rivière. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils tuèrent ce jour-là environ dix mille hommes de Moab, tous robustes et aguerris et ils ne laissèrent aucun rescapé. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Eternel laissa donc dans le pays les cinq principautés philistines, tous les Cananéens et les Sidoniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Des Phéniciens (Sidon était la plus ancienne ville de Phénicie).
      marker-yv: yv-n
    - type: text
      text: ', les Héviens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 9.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' qui habitaient la chaîne du Liban depuis la montagne de Baal-Hermon jusqu’à Lebo-Hamath.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Moab fut affaibli à partir de là par les Israélites et la région connut la paix pendant quatre-vingts ans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shamgar
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Après Ehoud, vint Shamgar, fils d’Anath. Il tua six cents Philistins avec un aiguillon à bœufs. Lui aussi fut un libérateur d’Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ces peuples servirent à éprouver les Israélites pour savoir s’ils obéiraient aux commandements que l’Eternel avait donnés à leurs ancêtres par Moïse. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ainsi les Israélites habitèrent au milieu des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Yebousiens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils épousèrent leurs filles, donnèrent leurs propres filles à leurs fils et adorèrent leurs dieux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Otniel
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les Israélites firent ce que l’Eternel considère comme mal : ils oublièrent l’Eternel leur Dieu et rendirent un culte aux dieux Baals et Ashéras. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’Eternel se mit en colère contre Israël et il les livra au pouvoir de Koushân-Risheatayim, roi de Mésopotamie. Les Israélites lui furent assujettis pendant huit ans. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ils implorèrent l’Eternel et celui-ci leur suscita un libérateur en la personne d’Otniel, fils de Qenaz, qui était le frère cadet de Caleb. Et Otniel les délivra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Otniel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: s’était déjà signalé par la prise d’Hébron (voir Jos 15.17 ; Jg 1.13-15).
      marker-yv: yv-n
    - type: text
      text: '. '
