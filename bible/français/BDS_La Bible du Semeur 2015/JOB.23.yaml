document_id: JOB.23
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Éliphaz
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job ne trouve plus Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, maintenant encore, ╵ma plainte est faite de révolte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma plainte est traitée de révolte.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je fais tous mes efforts ╵pour étouffer mon cri
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à mon cri, il répond par sa main pesante.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si je pouvais savoir ╵où je le trouverais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me rendrais alors ╵jusqu’à sa résidence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: je pourrais, devant lui, ╵plaider ma juste cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’aurais bien des arguments ╵à présenter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je saurais sa réponse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je comprendrais enfin ╵ce qu’il voudra me dire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Emploierait-il sa grande force ╵pour plaider contre moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bien au contraire ! ╵Mais lui du moins, ╵il me prêterait attention.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il reconnaîtrait bien ╵que c’est un homme droit ╵qui s’explique avec lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors j’échapperais ╵pour toujours à mon juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais, si je vais à l’est, ╵il n’y est pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je vais à l’ouest, ╵je ne l’aperçois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ou est-il occupé au nord ? ╵Je ne peux pas l’atteindre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se cache-t-il au sud ? ╵Jamais je ne le vois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cependant, il sait bien ╵quelle voie j’ai suivie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il me met à l’épreuve, ╵je sortirai pur comme l’or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car j’ai toujours suivi ╵la trace de ses pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai marché sur la voie ╵qu’il a prescrite, ╵je n’en ai pas dévié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je ne me suis pas écarté, ╵de ses commandements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai fait plier ma volonté ╵pour obéir à ses paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais lui, il est unique, ╵qui le fera changer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tout ce qu’il désire ╵il l’exécute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, il accomplira ╵le décret qu’il a pris ╵à mon sujet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme tant d’autres ╵qu’il a mis en réserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C’est pourquoi devant lui ╵je suis plein d’épouvante
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, plus j’y réfléchis, ╵et plus j’ai peur de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dieu m’a découragé :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant ╵m’a rempli d’épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car ce ne sont pas les ténèbres ╵qui me réduisent au silence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce ne sont pas les ténèbres mais, sous-entendu, Dieu (voir v. 16). Hébreu obscur. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'car devant les ténèbres, je ne me suis pas tu, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car me voilà anéanti devant les ténèbres.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pourtant devant moi, ╵l’obscurité recouvre tout.
