document_id: JOB.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: Job ne trouve plus Dieu
  - type: text
    content: 'Job prit la parole et dit :'
  '10':
  - type: text
    content: Cependant, il sait bien ╵quelle voie j’ai suivie.
  - type: text
    content: S’il me met à l’épreuve, ╵je sortirai pur comme l’or.
  '11':
  - type: text
    content: Car j’ai toujours suivi ╵la trace de ses pas.
  - type: text
    content: J’ai marché sur la voie ╵qu’il a prescrite, ╵je n’en ai pas dévié.
  '12':
  - type: text
    content: Je ne me suis pas écarté, ╵de ses commandements.
  - type: text
    content: J’ai fait plier ma volonté ╵pour obéir à ses paroles.
  '13':
  - type: text
    content: Mais lui, il est unique, ╵qui le fera changer ?
  - type: text
    content: Et tout ce qu’il désire ╵il l’exécute.
  '14':
  - type: text
    content: Oui, il accomplira ╵le décret qu’il a pris ╵à mon sujet,
  - type: text
    content: comme tant d’autres ╵qu’il a mis en réserve.
  '15':
  - type: text
    content: C’est pourquoi devant lui ╵je suis plein d’épouvante
  - type: text
    content: et, plus j’y réfléchis, ╵et plus j’ai peur de lui.
  '16':
  - type: text
    content: 'Dieu m’a découragé :'
  - type: text
    content: le Tout-Puissant ╵m’a rempli d’épouvante.
  '17':
  - type: text
    content: Car ce ne sont pas les ténèbres ╵qui me réduisent au silence
  - type: note
    content: 'Ce ne sont pas les ténèbres mais, sous-entendu, Dieu (voir v. 16). Hébreu obscur. Autres traductions : car devant les ténèbres, je ne me suis pas tu, ou : car me voilà anéanti devant les ténèbres.'
  - type: text
    content: et pourtant devant moi, ╵l’obscurité recouvre tout.
  '2':
  - type: text
    content: Oui, maintenant encore, ╵ma plainte est faite de révolte
  - type: note
    content: 'Autre traduction : ma plainte est traitée de révolte.'
  - type: text
    content: '  :'
  - type: text
    content: je fais tous mes efforts ╵pour étouffer mon cri
  - type: note
    content: 'L’ancienne version grecque a : à mon cri, il répond par sa main pesante.'
  - type: text
    content: .
  '3':
  - type: text
    content: Si je pouvais savoir ╵où je le trouverais,
  - type: text
    content: je me rendrais alors ╵jusqu’à sa résidence,
  '4':
  - type: text
    content: je pourrais, devant lui, ╵plaider ma juste cause,
  - type: text
    content: et j’aurais bien des arguments ╵à présenter.
  '5':
  - type: text
    content: Je saurais sa réponse,
  - type: text
    content: je comprendrais enfin ╵ce qu’il voudra me dire.
  '6':
  - type: text
    content: Emploierait-il sa grande force ╵pour plaider contre moi ?
  - type: text
    content: Bien au contraire ! ╵Mais lui du moins, ╵il me prêterait attention.
  '7':
  - type: text
    content: Il reconnaîtrait bien ╵que c’est un homme droit ╵qui s’explique avec lui.
  - type: text
    content: Alors j’échapperais ╵pour toujours à mon juge.
  '8':
  - type: text
    content: Mais, si je vais à l’est, ╵il n’y est pas,
  - type: text
    content: si je vais à l’ouest, ╵je ne l’aperçois pas.
  '9':
  - type: text
    content: Ou est-il occupé au nord ? ╵Je ne peux pas l’atteindre.
  - type: text
    content: Se cache-t-il au sud ? ╵Jamais je ne le vois.
