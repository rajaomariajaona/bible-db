document_id: ISA.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à la foi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sous le règne d’Ahaz, fils de Yotam et petit-fils d’Ozias, roi de Juda, Retsîn, roi de Syrie, se mit en campagne avec Péqah, fils de Remalia, roi d’Israël, pour faire la guerre à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vers 735​734 av. J.-C. Voir 2 R 16.5-9 ; 2 Ch 28.5-8. La Syrie et Israël (ou Ephraïm, c’est-à-dire le royaume du Nord) s’étaient alliés contre l’Assyrie et voulaient remplacer Ahaz par un homme à eux (v. 6) qui joindrait Juda à leur coalition.
      marker-yv: yv-n
    - type: text
      text: . Mais ils ne purent finalement pas l’attaquer.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla de nouveau à Ahaz et lui dit : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Demande pour toi un signe extraordinaire à l’Eternel, ton Dieu, soit dans les régions d’en bas, soit dans les lieux élevés.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Ahaz dit : Je n’en demanderai pas. Je ne veux pas forcer la main à l’Eternel.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe dit alors : Ecoutez donc, dynastie de David. Ne vous suffit-il pas de mettre à dure épreuve la patience des hommes pour qu’il vous faille encore lasser celle de mon Dieu ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi le Seigneur vous donnera lui-même un signe : Voici, la jeune fille sera enceinte et elle enfantera un fils, elle lui donnera pour nom'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu de Qumrân a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il lui donnera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils lui donneront.
      marker-yv: yv-n
    - type: text
      text: '  : Emmanuel (Dieu avec nous)'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.8'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: '. Ce verset est cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 1.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il mangera du lait caillé et du miel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 21-22.
      marker-yv: yv-n
    - type: text
      text: ', jusqu’à ce qu’il apprenne à rejeter le mal et à choisir le bien. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais avant que l’enfant apprenne à rejeter le mal et à choisir le bien, les pays des deux rois que tu crains aujourd’hui seront abandonnés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel fera survenir contre toi et ton peuple, contre ta dynastie, des jours comme jamais il n’y en a eu de tels depuis l’époque où Ephraïm s’est coupé de Juda : ce sera l’effet du roi d’Assyrie.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péril assyrien
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il adviendra, en ce jour-là, que l’Eternel appellera par un coup de sifflet les mouches qui sont à l’extrémité des fleuves de l’Egypte et les abeilles d’Assyrie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles viendront et se poseront toutes dans les ravins abrupts, et dans les fentes des rochers, dans tous les fourrés broussailleux et tous les pâturages. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand on apprit, à la cour du royaume de David, que les Syriens avaient pris position en territoire éphraïmite, le roi et tous ses sujets en furent secoués comme le feuillage des arbres de la forêt quand ils sont agités par le vent.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là, le Seigneur rasera avec un rasoir pris à gage au-delà de l’Euphrate – il s’agit du roi d’Assyrie. Oui, il vous rasera la tête et tous les poils du corps, et il vous coupera aussi la barbe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signe de déshonneur ou de deuil (Jb 1.20 ; Es 15.2 ; Jr 48.37 ; 2 S 10.4-5), annonce de la captivité.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il adviendra, en ce jour-là, qu’en guise de bétail, une personne élèvera une génisse et deux brebis ou chèvres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On ne cultivera plus le sol, on reviendra à l’élevage. Les rescapés seront si peu nombreux qu’ils auront du lait et du miel en abondance, malgré un cheptel réduit.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la production de lait sera si abondante que l’on se nourrira de lait caillé. Oui, les survivants du pays mangeront tous du lait caillé et du miel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il adviendra encore, en ce jour-là, que tout endroit planté de mille ceps de vigne valant mille pièces d’argent, sera abandonné aux ronces et aux épines. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On y pénétrera armé d’arcs et de flèches, car le pays entier ne sera que ronces et épines. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On ne passera plus sur les coteaux fertiles qu’on sarclait à la pioche, par peur des ronces et des épines. Les bovins y paîtront et les moutons et les chèvres en fouleront le sol.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel dit à Esaïe : Va à la rencontre d’Ahaz, toi et Shear-Yashoub'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un reste reviendra, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression qui se retrouve en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.21'
        - type: text
          text: ' comme promesse pour le peuple.'
      marker-yv: yv-n
    - type: text
      text: ', ton fils. Tu le trouveras vers l’extrémité de l’aqueduc du réservoir supérieur, sur la route du champ du Teinturier'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 18.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lui diras : Garde ton calme. N’aie donc pas peur et ne perds pas courage devant ces deux bouts de tisons fumants, devant la fureur de Retsîn et de son pays, la Syrie, et du fils de Remalia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La Syrie, il est vrai, projette un malheur contre toi de concert avec Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 1.
      marker-yv: yv-n
    - type: text
      text: ' et le fils de Remalia, et ils ont dit : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Marchons contre Juda, jetons-y l’épouvante, conquérons-le, établissons-y comme roi le fils de Tabéel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nom araméen. Probablement un haut fonctionnaire de la cour de Damas que les Syriens voulaient imposer comme roi à Juda pour qu’il entraîne son pays dans la coalition qu’ils formaient avec le royaume d’Israël du Nord.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ainsi parle le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela ne tiendra pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cela ne sera pas,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est Damas la capitale ╵de la Syrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est Retsîn ╵qui est chef de Damas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans soixante-cinq ans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm sera écrasé ╵et n’existera plus ╵en tant que peuple.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La capitale d’Ephraïm ╵c’est Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le chef de Samarie ╵c’est le fils de Remalia.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous, vous n’avez pas confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous ne tiendrez pas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le signe d’Emmanuel
    marker-yv: yv-h
