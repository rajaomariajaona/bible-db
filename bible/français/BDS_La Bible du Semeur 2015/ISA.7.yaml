document_id: ISA.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel à la foi
  - type: text
    content: Sous le règne d’Ahaz, fils de Yotam et petit-fils d’Ozias, roi de Juda, Retsîn, roi de Syrie, se mit en campagne avec Péqah, fils de Remalia, roi d’Israël, pour faire la guerre à Jérusalem
  - type: note
    content: Vers 735​734 av. J.-C. Voir 2 R 16.5-9 ; 2 Ch 28.5-8. La Syrie et Israël (ou Ephraïm, c’est-à-dire le royaume du Nord) s’étaient alliés contre l’Assyrie et voulaient remplacer Ahaz par un homme à eux (v. 6) qui joindrait Juda à leur coalition.
  - type: text
    content: . Mais ils ne purent finalement pas l’attaquer.
  '10':
  - type: text
    content: 'L’Eternel parla de nouveau à Ahaz et lui dit : '
  '11':
  - type: text
    content: Demande pour toi un signe extraordinaire à l’Eternel, ton Dieu, soit dans les régions d’en bas, soit dans les lieux élevés.
  '12':
  - type: text
    content: 'Mais Ahaz dit : Je n’en demanderai pas. Je ne veux pas forcer la main à l’Eternel.'
  '13':
  - type: text
    content: 'Esaïe dit alors : Ecoutez donc, dynastie de David. Ne vous suffit-il pas de mettre à dure épreuve la patience des hommes pour qu’il vous faille encore lasser celle de mon Dieu ? '
  '14':
  - type: text
    content: 'C’est pourquoi le Seigneur vous donnera lui-même un signe : Voici, la jeune fille sera enceinte et elle enfantera un fils, elle lui donnera pour nom'
  - type: note
    content: 'Le texte hébreu de Qumrân a : il lui donnera ou ils lui donneront.'
  - type: text
    content: '  : Emmanuel (Dieu avec nous)'
  - type: note
    content: Voir 8.8, 10. Ce verset est cité en Mt 1.23.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Il mangera du lait caillé et du miel
  - type: note
    content: Voir v. 21-22.
  - type: text
    content: ', jusqu’à ce qu’il apprenne à rejeter le mal et à choisir le bien. '
  '16':
  - type: text
    content: 'Mais avant que l’enfant apprenne à rejeter le mal et à choisir le bien, les pays des deux rois que tu crains aujourd’hui seront abandonnés. '
  '17':
  - type: text
    content: 'L’Eternel fera survenir contre toi et ton peuple, contre ta dynastie, des jours comme jamais il n’y en a eu de tels depuis l’époque où Ephraïm s’est coupé de Juda : ce sera l’effet du roi d’Assyrie.'
  - type: heading
    content: Le péril assyrien
  '18':
  - type: text
    content: 'Il adviendra, en ce jour-là, que l’Eternel appellera par un coup de sifflet les mouches qui sont à l’extrémité des fleuves de l’Egypte et les abeilles d’Assyrie. '
  '19':
  - type: text
    content: 'Elles viendront et se poseront toutes dans les ravins abrupts, et dans les fentes des rochers, dans tous les fourrés broussailleux et tous les pâturages. '
  '2':
  - type: text
    content: Quand on apprit, à la cour du royaume de David, que les Syriens avaient pris position en territoire éphraïmite, le roi et tous ses sujets en furent secoués comme le feuillage des arbres de la forêt quand ils sont agités par le vent.
  '20':
  - type: text
    content: En ce jour-là, le Seigneur rasera avec un rasoir pris à gage au-delà de l’Euphrate – il s’agit du roi d’Assyrie. Oui, il vous rasera la tête et tous les poils du corps, et il vous coupera aussi la barbe
  - type: note
    content: Signe de déshonneur ou de deuil (Jb 1.20 ; Es 15.2 ; Jr 48.37 ; 2 S 10.4-5), annonce de la captivité.
  - type: text
    content: .
  '21':
  - type: text
    content: Il adviendra, en ce jour-là, qu’en guise de bétail, une personne élèvera une génisse et deux brebis ou chèvres
  - type: note
    content: On ne cultivera plus le sol, on reviendra à l’élevage. Les rescapés seront si peu nombreux qu’ils auront du lait et du miel en abondance, malgré un cheptel réduit.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Alors la production de lait sera si abondante que l’on se nourrira de lait caillé. Oui, les survivants du pays mangeront tous du lait caillé et du miel. '
  '23':
  - type: text
    content: 'Il adviendra encore, en ce jour-là, que tout endroit planté de mille ceps de vigne valant mille pièces d’argent, sera abandonné aux ronces et aux épines. '
  '24':
  - type: text
    content: 'On y pénétrera armé d’arcs et de flèches, car le pays entier ne sera que ronces et épines. '
  '25':
  - type: text
    content: On ne passera plus sur les coteaux fertiles qu’on sarclait à la pioche, par peur des ronces et des épines. Les bovins y paîtront et les moutons et les chèvres en fouleront le sol.
  '3':
  - type: text
    content: 'Alors l’Eternel dit à Esaïe : Va à la rencontre d’Ahaz, toi et Shear-Yashoub'
  - type: note
    content: 'Nom qui signifie : un reste reviendra, expression qui se retrouve en 10.21 comme promesse pour le peuple.'
  - type: text
    content: ', ton fils. Tu le trouveras vers l’extrémité de l’aqueduc du réservoir supérieur, sur la route du champ du Teinturier'
  - type: note
    content: Voir 2 R 18.17.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Tu lui diras : Garde ton calme. N’aie donc pas peur et ne perds pas courage devant ces deux bouts de tisons fumants, devant la fureur de Retsîn et de son pays, la Syrie, et du fils de Remalia. '
  '5':
  - type: text
    content: La Syrie, il est vrai, projette un malheur contre toi de concert avec Ephraïm
  - type: note
    content: Voir note v. 1.
  - type: text
    content: ' et le fils de Remalia, et ils ont dit : '
  '6':
  - type: text
    content: Marchons contre Juda, jetons-y l’épouvante, conquérons-le, établissons-y comme roi le fils de Tabéel
  - type: note
    content: Nom araméen. Probablement un haut fonctionnaire de la cour de Damas que les Syriens voulaient imposer comme roi à Juda pour qu’il entraîne son pays dans la coalition qu’ils formaient avec le royaume d’Israël du Nord.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Mais ainsi parle le Seigneur, l’Eternel :'
  - type: text
    content: Cela ne tiendra pas,
  - type: text
    content: cela ne sera pas,
  '8':
  - type: text
    content: car c’est Damas la capitale ╵de la Syrie,
  - type: text
    content: et c’est Retsîn ╵qui est chef de Damas.
  - type: text
    content: Dans soixante-cinq ans,
  - type: text
    content: Ephraïm sera écrasé ╵et n’existera plus ╵en tant que peuple.
  '9':
  - type: text
    content: La capitale d’Ephraïm ╵c’est Samarie,
  - type: text
    content: le chef de Samarie ╵c’est le fils de Remalia.
  - type: text
    content: Si vous, vous n’avez pas confiance,
  - type: text
    content: vous ne tiendrez pas.
  - type: heading
    content: Le signe d’Emmanuel
