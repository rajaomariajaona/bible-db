document_id: GAL.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Adoptés par Dieu comme ses enfants
  - type: text
    content: 'Voici ce que je veux dire. Aussi longtemps que l’héritier est un enfant, il ne se distingue en rien d’un esclave. Bien qu’il soit le propriétaire de tout le patrimoine, '
  '10':
  - type: text
    content: Vous observez les jours spéciaux, les nouvelles lunes, certaines saisons et certaines années
  - type: note
    content: Allusion à des fêtes juives liées à des dates particulières – à moins qu’il s’agisse de fêtes païennes vouées au culte des astres (voir Rm 14.5 ; Col 2.16-23).
  - type: text
    content: '  ! '
  '11':
  - type: text
    content: Ah ! je crains fort que toute la peine que je me suis donnée pour vous ait été inutile.
  - type: heading
    content: La liberté de Christ et la vie par l’Esprit
  - type: heading
    content: Contre les adversaires de l’Evangile
  - type: heading
    content: Le souci de Paul pour les Galates
  '12':
  - type: text
    content: Mes frères et sœurs, je vous en supplie, devenez comme moi. Ne me suis-je pas moi-même rendu semblable à vous ?
  - type: text
    content: 'Vous ne m’avez causé aucun tort. '
  '13':
  - type: text
    content: Vous vous en souvenez, n’est-ce pas ? C’est une maladie qui m’a donné l’occasion de vous annoncer l’Evangile pour la première fois
  - type: note
    content: 'Si les Eglises de la Galatie sont celles que Paul a fondées lors de son premier voyage missionnaire (voir Introduction), selon les Actes des Apôtres, l’apôtre est repassé deux fois par les différentes villes de la Galatie : à l’aller et au retour. Lors du premier passage, il était malade.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Vous auriez pu être tentés de me mépriser ou de me repousser à cause de mon infirmité. Mais vous ne l’avez pas fait ! Au contraire, vous m’avez accueilli comme si j’avais été un ange de Dieu, ou même Jésus-Christ en personne.
  '15':
  - type: text
    content: Qu’est devenu votre bonheur d’alors ? Car je l’atteste, si la chose avait été possible, vous vous seriez arraché les yeux pour me les donner
  - type: note
    content: Ce verset donne à penser que l’infirmité dont il est question au v. 14 est une maladie des yeux, ce qui expliquerait aussi 6.11. Il est possible que l’apôtre fasse allusion à cette infirmité en 2 Co 12.7, lorsqu’il parle d’une écharde dans sa chair.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Suis-je donc maintenant devenu votre ennemi parce que je vous dis la vérité ?
  '17':
  - type: text
    content: Croyez-moi, ces gens-là
  - type: note
    content: C’est-à-dire les judaïsants qui sont passés dans les Eglises de la Galatie après le départ de Paul pour prêcher la nécessité d’observer la Loi.
  - type: text
    content: ' déploient un grand zèle autour de vous, mais leurs intentions ne sont pas bonnes : ils veulent vous détacher de moi pour que vous soyez zélés pour eux. '
  '18':
  - type: text
    content: 'C’est très beau de faire preuve de zèle pour une bonne cause, pourvu que ce soit de manière constante et non seulement lorsque je suis parmi vous, '
  '19':
  - type: text
    content: mes enfants, pour qui j’endure une fois encore les douleurs de l’enfantement jusqu’à ce que Christ soit formé en vous
  - type: note
    content: 'Autre traduction : jusqu’à ce que la ressemblance à Christ soit manifeste parmi vous.'
  - type: text
    content: .
  '2':
  - type: text
    content: il reste soumis à l’autorité de tuteurs et d’intendants jusqu’au terme fixé par son père
  - type: note
    content: En Grèce, c’était le père qui fixait l’âge de la majorité pour son fils, selon son jugement.
  - type: text
    content: .
  '20':
  - type: text
    content: Je voudrais tellement être au milieu de vous en ce moment et vous parler sur un autre ton. Car je ne sais plus que penser à votre sujet.
  - type: heading
    content: Choisir entre l’alliance de l’esclavage et l’alliance de la liberté
  '21':
  - type: text
    content: 'Dites-moi, vous qui voulez vivre sous le régime de la Loi, ne comprenez-vous pas ce que déclare la Loi ? '
  '22':
  - type: text
    content: Il y est écrit qu’Abraham a eu deux fils, l’un d’une esclave, et l’autre d’une femme libre
  - type: note
    content: Voir Gn 16.15 ; 21.2.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Le fils de l’esclave a été conçu de manière purement humaine. Alors que le fils de la femme libre a été donné à Abraham en vertu d’une promesse divine
  - type: note
    content: Voir Gn 17.16 ; 18.10.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Il y a là une analogie : ces deux femmes représentent deux alliances. L’une de ces alliances, conclue sur le mont Sinaï, donne naissance à des enfants esclaves, c’est Agar qui la représente. '
  '25':
  - type: text
    content: Certes, cette « Agar Mont Sinaï » est en Arabie, mais elle correspond
  - type: note
    content: 'Certains manuscrits ont : 25 Le Sinaï est, en effet, une montagne d’Arabie et il correspond…'
  - type: text
    content: ' à la Jérusalem'
  - type: note
    content: C’est-à-dire le judaïsme.
  - type: text
    content: ' actuelle, car celle-ci vit dans l’esclavage'
  - type: note
    content: De la Loi.
  - type: text
    content: ' avec tous ses enfants. '
  '26':
  - type: text
    content: 'Mais la Jérusalem d’en haut est libre. C’est elle qui est notre mère. '
  '27':
  - type: text
    content: 'Car il est écrit :'
  - type: text
    content: Réjouis-toi, femme stérile, toi qui n’as pas enfanté,
  - type: text
    content: pousse des cris de joie,
  - type: text
    content: toi qui ignores les douleurs de l’enfantement.
  - type: text
    content: Car les enfants de la délaissée seront plus nombreux
  - type: text
    content: que ceux de la femme mariée
  - type: text
    content: ' '
  - type: note
    content: Es 54.1 .
  - type: text
    content: .
  '28':
  - type: text
    content: Or vous, frères et sœurs, vous êtes les enfants de la promesse, comme Isaac.
  '29':
  - type: text
    content: 'Mais, autrefois, le fils conçu de manière simplement humaine persécutait le fils né par l’intervention de l’Esprit, et il en est de même aujourd’hui. '
  '3':
  - type: text
    content: Nous aussi, lorsque nous étions des enfants, nous étions de même asservis aux principes élémentaires qui régissent la vie dans ce monde
  - type: note
    content: Selon certains, il s’agit des forces spirituelles mauvaises qui asservissent l’homme avant sa conversion. Selon d’autres, Paul désigne par cette expression les règles élémentaires que s’imposaient certains païens et qui étaient comparables à la circoncision, aux fêtes et aux abstinences chez les Juifs (voir v. 9-10).
  - type: text
    content: .
  '30':
  - type: text
    content: 'Or, que dit l’Ecriture ? '
  - type: text
    content: Renvoie l’esclave avec son fils, car le fils de l’esclave n’aura aucune part à l’héritage avec le fils de la femme libre
  - type: note
    content: Gn 21.9-10.
  - type: text
    content: .
  '31':
  - type: text
    content: Ainsi, mes frères et sœurs, nous ne sommes pas les enfants d’une esclave, mais de la femme libre.
  '4':
  - type: text
    content: 'Mais, lorsque le moment fixé par Dieu est arrivé, il a envoyé son Fils, né d’une femme et placé par sa naissance sous le régime de la Loi, '
  '5':
  - type: text
    content: pour libérer ceux qui étaient soumis à ce régime. Il nous a ainsi permis d’être adoptés par Dieu comme ses fils et ses filles.
  '6':
  - type: text
    content: 'Puisque vous êtes bien ses fils et filles, Dieu a envoyé dans notre cœur l’Esprit de son Fils qui crie : '
  - type: text
    content: Abba
  - type: note
    content: 'Mot araméen signifiant : cher père (voir Rm 8.15).'
  - type: text
    content: ', c’est-à-dire « Père ».'
  '7':
  - type: text
    content: Ainsi donc, tu n’es plus esclave, mais fils ou fille, et, puisque tu es fils ou fille, tu es héritier des biens promis, grâce à Dieu.
  '8':
  - type: text
    content: 'Mais autrefois, vous ne connaissiez pas Dieu, c’est pourquoi vous serviez comme des esclaves des divinités qui, en réalité, ne sont pas des dieux. '
  '9':
  - type: text
    content: 'A présent, vous connaissez Dieu. Bien plus : Dieu vous a reconnus comme siens. Comment se peut-il alors que vous retourniez à ces principes élémentaires'
  - type: note
    content: Voir v. 3 et note.
  - type: text
    content: ' sans pouvoir ni valeur, pour en devenir à nouveau les esclaves ? '
