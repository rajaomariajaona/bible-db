document_id: GAL.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adoptés par Dieu comme ses enfants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que je veux dire. Aussi longtemps que l’héritier est un enfant, il ne se distingue en rien d’un esclave. Bien qu’il soit le propriétaire de tout le patrimoine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: il reste soumis à l’autorité de tuteurs et d’intendants jusqu’au terme fixé par son père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Grèce, c’était le père qui fixait l’âge de la majorité pour son fils, selon son jugement.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nous aussi, lorsque nous étions des enfants, nous étions de même asservis aux principes élémentaires qui régissent la vie dans ce monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon certains, il s’agit des forces spirituelles mauvaises qui asservissent l’homme avant sa conversion. Selon d’autres, Paul désigne par cette expression les règles élémentaires que s’imposaient certains païens et qui étaient comparables à la circoncision, aux fêtes et aux abstinences chez les Juifs (voir v. 9-10).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais, lorsque le moment fixé par Dieu est arrivé, il a envoyé son Fils, né d’une femme et placé par sa naissance sous le régime de la Loi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: pour libérer ceux qui étaient soumis à ce régime. Il nous a ainsi permis d’être adoptés par Dieu comme ses fils et ses filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puisque vous êtes bien ses fils et filles, Dieu a envoyé dans notre cœur l’Esprit de son Fils qui crie : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Abba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mot araméen signifiant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cher père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 8.15
        metadata:
          usfm: ROM.8.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', c’est-à-dire « Père ».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi donc, tu n’es plus esclave, mais fils ou fille, et, puisque tu es fils ou fille, tu es héritier des biens promis, grâce à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais autrefois, vous ne connaissiez pas Dieu, c’est pourquoi vous serviez comme des esclaves des divinités qui, en réalité, ne sont pas des dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A présent, vous connaissez Dieu. Bien plus : Dieu vous a reconnus comme siens. Comment se peut-il alors que vous retourniez à ces principes élémentaires'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 3 et note.
    marker-yv: yv-n
  - type: text
    text: ' sans pouvoir ni valeur, pour en devenir à nouveau les esclaves ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous observez les jours spéciaux, les nouvelles lunes, certaines saisons et certaines années
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à des fêtes juives liées à des dates particulières – à moins qu’il s’agisse de fêtes païennes vouées au culte des astres (voir Rm 14.5 ; Col 2.16-23).
    marker-yv: yv-n
  - type: text
    text: '  ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ah ! je crains fort que toute la peine que je me suis donnée pour vous ait été inutile.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La liberté de Christ et la vie par l’Esprit
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les adversaires de l’Evangile
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le souci de Paul pour les Galates
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mes frères et sœurs, je vous en supplie, devenez comme moi. Ne me suis-je pas moi-même rendu semblable à vous ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Vous ne m’avez causé aucun tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous vous en souvenez, n’est-ce pas ? C’est une maladie qui m’a donné l’occasion de vous annoncer l’Evangile pour la première fois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Si les Eglises de la Galatie sont celles que Paul a fondées lors de son premier voyage missionnaire (voir '
      - type: usfm
        marker: bk
        children:
        - type: text
          text: Introduction
      - type: text
        text: '), selon les Actes des Apôtres, l’apôtre est repassé deux fois par les différentes villes de la Galatie : à l’aller et au retour. Lors du premier passage, il était malade.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous auriez pu être tentés de me mépriser ou de me repousser à cause de mon infirmité. Mais vous ne l’avez pas fait ! Au contraire, vous m’avez accueilli comme si j’avais été un ange de Dieu, ou même Jésus-Christ en personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu’est devenu votre bonheur d’alors ? Car je l’atteste, si la chose avait été possible, vous vous seriez arraché les yeux pour me les donner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce verset donne à penser que l’infirmité dont il est question au v. 14 est une maladie des yeux, ce qui expliquerait aussi '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.11'
        metadata:
          usfm: GAL.6.11
      - type: text
        text: '. Il est possible que l’apôtre fasse allusion à cette infirmité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 12.7
        metadata:
          usfm: 2CO.12.7
      - type: text
        text: ', lorsqu’il parle d’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une écharde dans sa chair.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Suis-je donc maintenant devenu votre ennemi parce que je vous dis la vérité ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Croyez-moi, ces gens-là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les judaïsants qui sont passés dans les Eglises de la Galatie après le départ de Paul pour prêcher la nécessité d’observer la Loi.
    marker-yv: yv-n
  - type: text
    text: ' déploient un grand zèle autour de vous, mais leurs intentions ne sont pas bonnes : ils veulent vous détacher de moi pour que vous soyez zélés pour eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est très beau de faire preuve de zèle pour une bonne cause, pourvu que ce soit de manière constante et non seulement lorsque je suis parmi vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mes enfants, pour qui j’endure une fois encore les douleurs de l’enfantement jusqu’à ce que Christ soit formé en vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu’à ce que la ressemblance à Christ soit manifeste parmi vous.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je voudrais tellement être au milieu de vous en ce moment et vous parler sur un autre ton. Car je ne sais plus que penser à votre sujet.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Choisir entre l’alliance de l’esclavage et l’alliance de la liberté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dites-moi, vous qui voulez vivre sous le régime de la Loi, ne comprenez-vous pas ce que déclare la Loi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il y est écrit qu’Abraham a eu deux fils, l’un d’une esclave, et l’autre d’une femme libre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 16.15 ; 21.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le fils de l’esclave a été conçu de manière purement humaine. Alors que le fils de la femme libre a été donné à Abraham en vertu d’une promesse divine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 17.16 ; 18.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il y a là une analogie : ces deux femmes représentent deux alliances. L’une de ces alliances, conclue sur le mont Sinaï, donne naissance à des enfants esclaves, c’est Agar qui la représente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Certes, cette « Agar Mont Sinaï » est en Arabie, mais elle correspond
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '25 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Le Sinaï est, en effet, une montagne d’Arabie et il correspond…
    marker-yv: yv-n
  - type: text
    text: ' à la Jérusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le judaïsme.
    marker-yv: yv-n
  - type: text
    text: ' actuelle, car celle-ci vit dans l’esclavage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De la Loi.
    marker-yv: yv-n
  - type: text
    text: ' avec tous ses enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais la Jérusalem d’en haut est libre. C’est elle qui est notre mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Réjouis-toi, femme stérile, toi qui n’as pas enfanté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pousse des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: toi qui ignores les douleurs de l’enfantement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Car les enfants de la délaissée seront plus nombreux
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: que ceux de la femme mariée
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 54.1
        metadata:
          usfm: ISA.54.1
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Or vous, frères et sœurs, vous êtes les enfants de la promesse, comme Isaac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais, autrefois, le fils conçu de manière simplement humaine persécutait le fils né par l’intervention de l’Esprit, et il en est de même aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Or, que dit l’Ecriture ? '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Renvoie l’esclave avec son fils, car le fils de l’esclave n’aura aucune part à l’héritage avec le fils de la femme libre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.30 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 21.9-10
        metadata:
          usfm: GEN.21.9+GEN.21.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ainsi, mes frères et sœurs, nous ne sommes pas les enfants d’une esclave, mais de la femme libre.
