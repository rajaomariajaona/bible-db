document_id: EXO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel et l’envoi de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moïse faisait paître les brebis de son beau-père Jéthro, prêtre de Madian. Il mena son troupeau au-delà du désert et parvint jusqu’à Horeb, la montagne de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aussi appelé Sinaï dans la suite du récit. C’est la montagne où Dieu va se révéler (chap. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
        metadata:
          usfm: EXO.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’ange de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: D’après la suite du récit, l’ange de l’Eternel est l’Eternel lui-même.
    marker-yv: yv-n
  - type: text
    text: ' lui apparut dans une flamme au milieu d’un buisson : Moïse aperçut un buisson qui était tout embrasé et qui, pourtant, ne se consumait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il se dit alors : Je vais faire un détour pour aller regarder ce phénomène extraordinaire et voir pourquoi le buisson ne se consume pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel vit que Moïse faisait un détour pour aller voir et il l’appela du milieu du buisson :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Moïse, Moïse !
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je suis là, répondit Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dieu lui dit : N’approche pas d’ici, ôte tes sandales, car le lieu où tu te tiens est un lieu saint. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il ajouta : Je suis le Dieu de tes ancêtres, le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 22.32 ; Mc 12.26 ; Lc 20.37 ; Ac 3.13 ; 7.32.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors Moïse se couvrit le visage car il craignait de regarder Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel reprit : J’ai vu la détresse de mon peuple en Egypte et j’ai entendu les cris que lui font pousser ses oppresseurs. Oui, je sais ce qu’il souffre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est pourquoi je suis descendu pour le délivrer des Egyptiens, pour le faire sortir d’Egypte et le conduire vers un bon et vaste pays, un pays ruisselant de lait et de miel ; celui qu’habitent les Cananéens, les Hittites, les Amoréens, les Phéréziens, les Héviens et les Yebousiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noms de diverses peuplades habitant ce qui deviendra le pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A présent, les cris des Israélites sont parvenus jusqu’à moi et j’ai vu à quel point les Egyptiens les oppriment. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Va donc maintenant : je t’envoie vers le pharaon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Soit Aménotep II, fils de Thoutmosis III, soit Ramsès II, pharaon de la XIX
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' dynastie, qui entreprit de grands travaux de construction (1290​1279–1224​1212 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: ', pour que tu fasses sortir d’Egypte les Israélites, mon peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moïse dit à Dieu :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Qui suis-je, moi, pour aller trouver le pharaon et pour faire sortir les Israélites d’Egypte ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '– Sache que je serai avec toi, lui répondit Dieu. Et voici le signe auquel on reconnaîtra que c’est moi qui t’ai envoyé : quand tu auras fait sortir le peuple hors d’Egypte, vous m’adorerez sur cette montagne-ci.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse reprit : J’irai donc trouver les Israélites et je leur dirai : « Le Dieu de vos ancêtres m’a envoyé vers vous. » Mais s’ils me demandent : « Quel est son nom ? » que leur répondrai-je ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Dieu dit à Moïse : Je suis celui qui est'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Je suis : Je suis. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Je suis qui je suis ; je suis celui que je serai ; Je suis celui qui donne l’existence. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1.4
        metadata:
          usfm: REV.1.4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: REV.1.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Puis il ajouta : Voici ce que tu diras aux Israélites : Je suis m’a envoyé vers vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis tu leur diras : « L’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eternel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rend le nom hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yahvé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui est proche du nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Je suis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que se donne Dieu.
    marker-yv: yv-n
  - type: text
    text: ', le Dieu de vos ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob m’a envoyé vers vous. C’est là mon nom pour l’éternité, c’est sous ce nom que l’on se souviendra de moi pour tous les temps'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 22.32 ; Mc 12.26 ; Ac 3.13.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Va donc, réunis les responsables d’Israël et dis-leur : L’Eternel, le Dieu de vos ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob m’est apparu et m’a dit : J’ai résolu d’intervenir en votre faveur au regard du traitement qu’on vous inflige en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aussi ai-je décidé de vous faire sortir d’Egypte, où vous êtes en proie à l’oppression, pour vous conduire dans le pays des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Yebousiens, dans un pays ruisselant de lait et de miel. » '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les responsables d’Israël t’écouteront et tu iras trouver le pharaon avec eux pour lui dire : « L’Eternel, le Dieu des Hébreux, est venu nous trouver. Maintenant, veuille donc nous accorder la permission de faire trois journées de marche dans le désert pour aller offrir un sacrifice à l’Eternel notre Dieu. » '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moi, je sais que le pharaon ne vous permettra pas de partir s’il n’y est pas contraint avec puissance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: même pas s’il y est contraint avec puissance.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est pourquoi j’interviendrai et je frapperai l’Egypte de toutes sortes de prodiges que j’accomplirai au milieu d’elle. Après cela, il vous renverra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je ferai gagner à ce peuple la faveur des Egyptiens, de sorte qu’à votre départ, vous ne vous en irez pas les mains vides. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Chaque femme demandera à sa voisine et à celle qui habite chez elle des ustensiles d’argent et d’or ainsi que des vêtements. Vous les donnerez à porter à vos fils et vos filles. Ainsi vous dépouillerez les Egyptiens.
