document_id: EXO.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel et l’envoi de Moïse
  - type: text
    content: Moïse faisait paître les brebis de son beau-père Jéthro, prêtre de Madian. Il mena son troupeau au-delà du désert et parvint jusqu’à Horeb, la montagne de Dieu
  - type: note
    content: Aussi appelé Sinaï dans la suite du récit. C’est la montagne où Dieu va se révéler (chap. 19).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Va donc maintenant : je t’envoie vers le pharaon'
  - type: note
    content: Soit Aménotep II, fils de Thoutmosis III, soit Ramsès II, pharaon de la XIXe dynastie, qui entreprit de grands travaux de construction (1290​1279–1224​1212 av. J.-C.).
  - type: text
    content: ', pour que tu fasses sortir d’Egypte les Israélites, mon peuple.'
  '11':
  - type: text
    content: 'Moïse dit à Dieu :'
  - type: text
    content: Qui suis-je, moi, pour aller trouver le pharaon et pour faire sortir les Israélites d’Egypte ?
  '12':
  - type: text
    content: '– Sache que je serai avec toi, lui répondit Dieu. Et voici le signe auquel on reconnaîtra que c’est moi qui t’ai envoyé : quand tu auras fait sortir le peuple hors d’Egypte, vous m’adorerez sur cette montagne-ci.'
  '13':
  - type: text
    content: 'Moïse reprit : J’irai donc trouver les Israélites et je leur dirai : « Le Dieu de vos ancêtres m’a envoyé vers vous. » Mais s’ils me demandent : « Quel est son nom ? » que leur répondrai-je ?'
  '14':
  - type: text
    content: 'Alors Dieu dit à Moïse : Je suis celui qui est'
  - type: note
    content: 'Autre traduction : Je suis : Je suis. D’autres comprennent : Je suis qui je suis ; je suis celui que je serai ; Je suis celui qui donne l’existence. Voir Ap 1.4, 8.'
  - type: text
    content: '. Puis il ajouta : Voici ce que tu diras aux Israélites : Je suis m’a envoyé vers vous.'
  '15':
  - type: text
    content: 'Puis tu leur diras : « L’Eternel'
  - type: note
    content: Le nom Eternel rend le nom hébreu Yahvé qui est proche du nom Je suis que se donne Dieu.
  - type: text
    content: ', le Dieu de vos ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob m’a envoyé vers vous. C’est là mon nom pour l’éternité, c’est sous ce nom que l’on se souviendra de moi pour tous les temps'
  - type: note
    content: Cité en Mt 22.32 ; Mc 12.26 ; Ac 3.13.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Va donc, réunis les responsables d’Israël et dis-leur : L’Eternel, le Dieu de vos ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob m’est apparu et m’a dit : J’ai résolu d’intervenir en votre faveur au regard du traitement qu’on vous inflige en Egypte. '
  '17':
  - type: text
    content: 'Aussi ai-je décidé de vous faire sortir d’Egypte, où vous êtes en proie à l’oppression, pour vous conduire dans le pays des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Yebousiens, dans un pays ruisselant de lait et de miel. » '
  '18':
  - type: text
    content: 'Les responsables d’Israël t’écouteront et tu iras trouver le pharaon avec eux pour lui dire : « L’Eternel, le Dieu des Hébreux, est venu nous trouver. Maintenant, veuille donc nous accorder la permission de faire trois journées de marche dans le désert pour aller offrir un sacrifice à l’Eternel notre Dieu. » '
  '19':
  - type: text
    content: Moi, je sais que le pharaon ne vous permettra pas de partir s’il n’y est pas contraint avec puissance
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : même pas s’il y est contraint avec puissance.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: L’ange de l’Eternel
  - type: note
    content: D’après la suite du récit, l’ange de l’Eternel est l’Eternel lui-même.
  - type: text
    content: ' lui apparut dans une flamme au milieu d’un buisson : Moïse aperçut un buisson qui était tout embrasé et qui, pourtant, ne se consumait pas. '
  '20':
  - type: text
    content: 'C’est pourquoi j’interviendrai et je frapperai l’Egypte de toutes sortes de prodiges que j’accomplirai au milieu d’elle. Après cela, il vous renverra. '
  '21':
  - type: text
    content: 'Je ferai gagner à ce peuple la faveur des Egyptiens, de sorte qu’à votre départ, vous ne vous en irez pas les mains vides. '
  '22':
  - type: text
    content: Chaque femme demandera à sa voisine et à celle qui habite chez elle des ustensiles d’argent et d’or ainsi que des vêtements. Vous les donnerez à porter à vos fils et vos filles. Ainsi vous dépouillerez les Egyptiens.
  '3':
  - type: text
    content: 'Il se dit alors : Je vais faire un détour pour aller regarder ce phénomène extraordinaire et voir pourquoi le buisson ne se consume pas.'
  '4':
  - type: text
    content: 'L’Eternel vit que Moïse faisait un détour pour aller voir et il l’appela du milieu du buisson :'
  - type: text
    content: Moïse, Moïse !
  - type: text
    content: – Je suis là, répondit Moïse.
  '5':
  - type: text
    content: 'Dieu lui dit : N’approche pas d’ici, ôte tes sandales, car le lieu où tu te tiens est un lieu saint. '
  '6':
  - type: text
    content: 'Puis il ajouta : Je suis le Dieu de tes ancêtres, le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob'
  - type: note
    content: Cité en Mt 22.32 ; Mc 12.26 ; Lc 20.37 ; Ac 3.13 ; 7.32.
  - type: text
    content: .
  - type: text
    content: Alors Moïse se couvrit le visage car il craignait de regarder Dieu.
  '7':
  - type: text
    content: 'L’Eternel reprit : J’ai vu la détresse de mon peuple en Egypte et j’ai entendu les cris que lui font pousser ses oppresseurs. Oui, je sais ce qu’il souffre. '
  '8':
  - type: text
    content: C’est pourquoi je suis descendu pour le délivrer des Egyptiens, pour le faire sortir d’Egypte et le conduire vers un bon et vaste pays, un pays ruisselant de lait et de miel ; celui qu’habitent les Cananéens, les Hittites, les Amoréens, les Phéréziens, les Héviens et les Yebousiens
  - type: note
    content: Noms de diverses peuplades habitant ce qui deviendra le pays d’Israël.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'A présent, les cris des Israélites sont parvenus jusqu’à moi et j’ai vu à quel point les Egyptiens les oppriment. '
