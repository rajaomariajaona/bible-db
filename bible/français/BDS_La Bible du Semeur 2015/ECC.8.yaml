document_id: ECC.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les limites de la sagesse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Qui est comparable au sage ? Qui sait analyser les choses ? La sagesse d’un homme illumine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qui est sage et comprend cette parole : « La sagesse d’un homme illumine » ?'
    marker-yv: yv-n
  - type: text
    text: ' son visage et fait disparaître la sévérité de ses traits.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le pouvoir du roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici mon conseil : obéis aux ordres du roi à cause du serment prêté devant Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion au serment de fidélité prêté au roi par ses sujets en prenant Dieu à témoin (2 S 21.7 ; 1 R 2.43 ; 2 R 11.17 ; 1 Ch 11.3 ; 29.24).
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ne te hâte pas de lui donner ton congé ; ne persiste pas dans une mauvaise situation, car le roi fait tout ce qui lui plaît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, sa parole est souveraine. Qui oserait lui dire : « Pourquoi fais-tu cela ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Celui qui s’en tient à ses ordres ne se mettra pas dans une mauvaise situation, et le sage saura discerner en lui-même le moment opportun et la juste manière de procéder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pour toute affaire, en effet, il y a un temps opportun et une juste manière de procéder
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un jugement.
    marker-yv: yv-n
  - type: text
    text: '. Mais il y a un grand malheur pour l’homme : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'c’est que personne ne sait ce qui arrivera. Et personne ne peut dire comment les choses se passeront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Personne n’est maître de son souffle de vie, personne ne peut le retenir, personne n’a de pouvoir sur le jour de sa mort : il n’y a pas de trêve dans la lutte pour survivre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On ne peut échapper au combat '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (lorsqu’il y a la guerre).
    marker-yv: yv-n
  - type: text
    text: ' et ce n’est pas la méchanceté qui sauvera celui qui s’y livre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tout cela, je l’ai vu et j’ai beaucoup réfléchi à tout ce qui se fait sous le soleil. Il arrive qu’un homme domine sur les autres pour leur faire du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: …sous le soleil où l’homme domine son semblable pour lui faire du mal.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les injustices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or j’ai vu des méchants être enterrés : les gens allaient et venaient du sanctuaire, et ils les louaient dans la ville pour'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils les louaient… pour
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après certains manuscrits hébreux et l’ancienne version grecque. La plupart des manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils oubliaient ; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la différence est due à la confusion entre deux consonnes de formes très ressemblantes.
    marker-yv: yv-n
  - type: text
    text: ' ce qu’ils avaient fait. Cela aussi est déplorable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parce qu’une sentence contre une mauvaise action n’est pas vite exécutée, le cœur humain est porté à faire beaucoup de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, il arrive que le pécheur fasse cent fois le mal et voit se prolonger ses jours. Mais je sais aussi que le bonheur est pour ceux qui craignent Dieu, du fait même qu’ils ont cette crainte à son égard, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mais qu’il n’y aura pas de bonheur pour le méchant et que, semblable à l’ombre, il ne verra pas ses jours se prolonger, parce qu’il ne craint pas Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y a une autre chose déplorable qui se passe sur la terre : certains justes subissent le sort que méritent les agissements des méchants, et certains méchants ont le sort que méritent les œuvres des justes. Je me suis dit que c’est encore là bien déplorable !'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Eloge de la joie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Alors j’ai fait l’éloge de la joie. En effet, il n’y a rien de bon pour l’homme sous le soleil, sinon manger, boire et se réjouir. C’est là ce qui l’accompagne au milieu de son dur labeur auquel il se livre pendant les jours que Dieu lui accorde de vivre sous le soleil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 15-16, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.24'
        metadata:
          usfm: ECC.2.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’œuvre de Dieu est incompréhensible
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque je me suis appliqué à connaître la sagesse et à considérer les occupations auxquelles l’homme se livre sur la terre en se refusant le sommeil nuit et jour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: j’ai vu toute l’œuvre de Dieu. Or l’homme ne peut comprendre l’œuvre qui se fait sous le soleil. Il a beau se donner de la peine pour comprendre, il n’y parviendra pas. Et même si le sage prétend savoir, en réalité il ne peut pas comprendre.
