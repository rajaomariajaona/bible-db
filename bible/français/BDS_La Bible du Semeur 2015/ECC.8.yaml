document_id: ECC.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les limites de la sagesse
  - type: text
    content: Qui est comparable au sage ? Qui sait analyser les choses ? La sagesse d’un homme illumine
  - type: note
    content: 'Autre traduction : Qui est sage et comprend cette parole : « La sagesse d’un homme illumine » ?'
  - type: text
    content: ' son visage et fait disparaître la sévérité de ses traits.'
  - type: heading
    content: Le pouvoir du roi
  '10':
  - type: text
    content: 'Or j’ai vu des méchants être enterrés : les gens allaient et venaient du sanctuaire, et ils les louaient dans la ville pour'
  - type: note
    content: 'ils les louaient… pour: d’après certains manuscrits hébreux et l’ancienne version grecque. La plupart des manuscrits hébreux ont : ils oubliaient ; la différence est due à la confusion entre deux consonnes de formes très ressemblantes.'
  - type: text
    content: ' ce qu’ils avaient fait. Cela aussi est déplorable.'
  '11':
  - type: text
    content: 'Parce qu’une sentence contre une mauvaise action n’est pas vite exécutée, le cœur humain est porté à faire beaucoup de mal. '
  '12':
  - type: text
    content: 'En effet, il arrive que le pécheur fasse cent fois le mal et voit se prolonger ses jours. Mais je sais aussi que le bonheur est pour ceux qui craignent Dieu, du fait même qu’ils ont cette crainte à son égard, '
  '13':
  - type: text
    content: mais qu’il n’y aura pas de bonheur pour le méchant et que, semblable à l’ombre, il ne verra pas ses jours se prolonger, parce qu’il ne craint pas Dieu.
  '14':
  - type: text
    content: 'Il y a une autre chose déplorable qui se passe sur la terre : certains justes subissent le sort que méritent les agissements des méchants, et certains méchants ont le sort que méritent les œuvres des justes. Je me suis dit que c’est encore là bien déplorable !'
  - type: heading
    content: Eloge de la joie
  '15':
  - type: text
    content: Alors j’ai fait l’éloge de la joie. En effet, il n’y a rien de bon pour l’homme sous le soleil, sinon manger, boire et se réjouir. C’est là ce qui l’accompagne au milieu de son dur labeur auquel il se livre pendant les jours que Dieu lui accorde de vivre sous le soleil
  - type: note
    content: Pour les v. 15-16, voir 2.24.
  - type: text
    content: .
  - type: heading
    content: L’œuvre de Dieu est incompréhensible
  '16':
  - type: text
    content: 'Lorsque je me suis appliqué à connaître la sagesse et à considérer les occupations auxquelles l’homme se livre sur la terre en se refusant le sommeil nuit et jour, '
  '17':
  - type: text
    content: j’ai vu toute l’œuvre de Dieu. Or l’homme ne peut comprendre l’œuvre qui se fait sous le soleil. Il a beau se donner de la peine pour comprendre, il n’y parviendra pas. Et même si le sage prétend savoir, en réalité il ne peut pas comprendre.
  '2':
  - type: text
    content: 'Voici mon conseil : obéis aux ordres du roi à cause du serment prêté devant Dieu'
  - type: note
    content: Allusion au serment de fidélité prêté au roi par ses sujets en prenant Dieu à témoin (2 S 21.7 ; 1 R 2.43 ; 2 R 11.17 ; 1 Ch 11.3 ; 29.24).
  - type: text
    content: ', '
  '3':
  - type: text
    content: 'ne te hâte pas de lui donner ton congé ; ne persiste pas dans une mauvaise situation, car le roi fait tout ce qui lui plaît. '
  '4':
  - type: text
    content: 'En effet, sa parole est souveraine. Qui oserait lui dire : « Pourquoi fais-tu cela ? » '
  '5':
  - type: text
    content: Celui qui s’en tient à ses ordres ne se mettra pas dans une mauvaise situation, et le sage saura discerner en lui-même le moment opportun et la juste manière de procéder.
  '6':
  - type: text
    content: Pour toute affaire, en effet, il y a un temps opportun et une juste manière de procéder
  - type: note
    content: 'Autre traduction : un jugement.'
  - type: text
    content: '. Mais il y a un grand malheur pour l’homme : '
  '7':
  - type: text
    content: 'c’est que personne ne sait ce qui arrivera. Et personne ne peut dire comment les choses se passeront. '
  '8':
  - type: text
    content: 'Personne n’est maître de son souffle de vie, personne ne peut le retenir, personne n’a de pouvoir sur le jour de sa mort : il n’y a pas de trêve dans la lutte pour survivre'
  - type: note
    content: 'Autre traduction : On ne peut échapper au combat (lorsqu’il y a la guerre).'
  - type: text
    content: ' et ce n’est pas la méchanceté qui sauvera celui qui s’y livre.'
  '9':
  - type: text
    content: Tout cela, je l’ai vu et j’ai beaucoup réfléchi à tout ce qui se fait sous le soleil. Il arrive qu’un homme domine sur les autres pour leur faire du mal
  - type: note
    content: 'Autre traduction : …sous le soleil où l’homme domine son semblable pour lui faire du mal.'
  - type: text
    content: .
  - type: heading
    content: Les injustices
