document_id: GEN.47
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob devant le pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph alla donc informer le pharaon et lui dit : Mon père et mes frères sont arrivés du pays de Canaan avec leurs moutons, leurs chèvres, leurs bovins, tout ce qui leur appartient ; et ils sont dans la région de Goshen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait emmené avec lui cinq de ses frères qu’il présenta au pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le pharaon leur demanda : Quelles sont vos occupations ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils répondirent : Tes serviteurs sont bergers comme l’étaient nos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et ils ajoutèrent : Nous sommes venus séjourner dans le pays, car la famine sévit durement au pays de Canaan et il n’y a plus de pâturage pour les troupeaux de tes serviteurs là-bas. Permets donc à tes serviteurs de s’installer dans la région de Goshen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le pharaon dit à Joseph : Ton père et tes frères sont venus te rejoindre ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'le pays est à ta disposition. Installe-les dans la meilleure province du pays : qu’ils habitent dans la région de Goshen. Et si tu sais qu’il y a parmi eux des hommes de valeur, tu les établiras comme responsables de mes troupeaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Joseph fit aussi venir son père Jacob pour le présenter au pharaon. Jacob bénit le pharaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui-ci lui demanda : Quel âge as-tu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jacob répondit : Le nombre de mes années de migrations est de cent trente. Les jours de ma vie ont été peu nombreux et mauvais et je n’atteindrai pas le nombre des années qu’ont duré les migrations de mes ancêtres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Jacob bénit le pharaon et se retira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Joseph installa son père et ses frères et leur donna une propriété dans la meilleure partie d’Egypte, dans la région de Ramsès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certainement un autre nom du pays de Goshen (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1.11
        metadata:
          usfm: EXO.1.11
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', comme le pharaon l’avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il procura à son père, à ses frères et à toute la famille de son père les vivres dont ils avaient besoin selon le nombre des personnes à leur charge.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Egyptiens deviennent esclaves du pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La famine était si grande en Egypte et en Canaan qu’on ne trouvait plus nulle part de quoi manger, et les habitants dépérissaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En échange du blé qu’il vendait, Joseph recueillit tout l’argent qui se trouvait en Egypte et en Canaan, et en remplit les caisses du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand il n’y eut plus d’argent en Egypte et en Canaan, tous les Egyptiens vinrent trouver Joseph et lui dirent : Donne-nous de quoi manger ! Pourquoi devrions-nous mourir là sous tes yeux parce que nous n’avons plus d’argent ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph répondit : Si vous n’avez plus d’argent, donnez-moi votre bétail, et je vous fournirai de la nourriture en échange de vos troupeaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils amenèrent donc leur bétail à Joseph qui leur donna de quoi manger en échange de leurs chevaux, de leurs ânes, et de leurs troupeaux de moutons, de chèvres et de bovins. Cette année-là, il leur assura la nourriture en échange de tous leurs troupeaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’année suivante, ils revinrent le trouver et lui dirent : Mon seigneur n’est pas sans savoir que nous n’avons plus d’argent, nos troupeaux appartiennent à mon seigneur, nous n’avons plus rien à présenter à mon seigneur que nos corps et nos terres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pourquoi péririons-nous là sous tes yeux, nous et nos terres ? Achète-nous, avec nos terres, en échange de vivres, et nous deviendrons, avec nos terres, esclaves du pharaon. Donne-nous aussi du grain à semer pour que nous puissions survivre, au lieu de mourir, et que notre terre ne devienne pas un désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors Joseph acquit toutes les terres d’Egypte pour le compte du pharaon, car les Egyptiens vendirent chacun son champ, contraints par la famine, tant elle était rigoureuse. Ainsi, le pays devint la propriété du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant aux habitants, il les réduisit à l’esclavage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le Pentateuque samaritain et la version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les déplaçait dans les villes.
    marker-yv: yv-n
  - type: text
    text: ', d’un bout à l’autre de l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les seules terres que Joseph n’acheta pas étaient celles des prêtres, car il existait un décret du pharaon en leur faveur et ils se nourrissaient de ce que le pharaon leur fournissait ; c’est pourquoi ils n’eurent pas à vendre leurs terres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joseph dit au peuple : Je vous ai achetés aujourd’hui, vous et vos terres, pour le compte du pharaon. Voici des grains : ensemencez vos champs ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais vous donnerez le cinquième de vos récoltes au pharaon, les quatre autres parts seront à vous pour ensemencer les champs et pour vous nourrir, vous, vos enfants et tous ceux qui seront sous votre toit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils dirent : Tu nous sauves la vie ! Puisque nous avons obtenu ta faveur, nous serons les esclaves du pharaon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joseph fit de cette disposition une loi pour toute l’Egypte – loi qui est encore aujourd’hui en vigueur – imposant le versement du cinquième de la récolte au pharaon. Seules les terres des prêtres ne passèrent pas en propriété au pharaon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dernières volontés de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Israël s’installa en Egypte, dans la région de Goshen. Ils y acquirent des propriétés. Ils furent féconds et se multiplièrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jacob vécut dix-sept ans en Egypte. La durée totale de sa vie fut de 147 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quand le jour de sa mort fut proche, il appela son fils, Joseph, et lui dit : Fais-moi une faveur : place, je te prie, ta main sous ma cuisse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Serment solennel qui engage aussi les descendants (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24.2'
        metadata:
          usfm: GEN.24.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et promets-moi d’agir envers moi avec amour et fidélité en ne m’enterrant pas en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Quand j’aurai rejoint mes ancêtres, tu me transporteras hors d’Egypte pour m’ensevelir dans leur tombeau.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joseph dit : J’agirai comme tu me l’as demandé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais son père insista : Jure-le-moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il le lui jura. Alors Israël se prosterna au chevet de sa couche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'appuyé sur son bâton. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11.21
        metadata:
          usfm: HEB.11.21
      - type: text
        text: ' d’après la version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
