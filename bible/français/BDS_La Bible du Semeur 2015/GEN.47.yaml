document_id: GEN.47,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob devant le pharaon
  - type: text
    content: 'Joseph alla donc informer le pharaon et lui dit : Mon père et mes frères sont arrivés du pays de Canaan avec leurs moutons, leurs chèvres, leurs bovins, tout ce qui leur appartient ; et ils sont dans la région de Goshen.'
  '10':
  - type: text
    content: 'Puis Jacob bénit le pharaon et se retira. '
  '11':
  - type: text
    content: Joseph installa son père et ses frères et leur donna une propriété dans la meilleure partie d’Egypte, dans la région de Ramsès
  - type: note
    content: Certainement un autre nom du pays de Goshen (voir Ex 1.11 et note).
  - type: text
    content: ', comme le pharaon l’avait ordonné. '
  '12':
  - type: text
    content: Il procura à son père, à ses frères et à toute la famille de son père les vivres dont ils avaient besoin selon le nombre des personnes à leur charge.
  - type: heading
    content: Les Egyptiens deviennent esclaves du pharaon
  '13':
  - type: text
    content: 'La famine était si grande en Egypte et en Canaan qu’on ne trouvait plus nulle part de quoi manger, et les habitants dépérissaient. '
  '14':
  - type: text
    content: 'En échange du blé qu’il vendait, Joseph recueillit tout l’argent qui se trouvait en Egypte et en Canaan, et en remplit les caisses du pharaon. '
  '15':
  - type: text
    content: 'Quand il n’y eut plus d’argent en Egypte et en Canaan, tous les Egyptiens vinrent trouver Joseph et lui dirent : Donne-nous de quoi manger ! Pourquoi devrions-nous mourir là sous tes yeux parce que nous n’avons plus d’argent ?'
  '16':
  - type: text
    content: 'Joseph répondit : Si vous n’avez plus d’argent, donnez-moi votre bétail, et je vous fournirai de la nourriture en échange de vos troupeaux.'
  '17':
  - type: text
    content: Ils amenèrent donc leur bétail à Joseph qui leur donna de quoi manger en échange de leurs chevaux, de leurs ânes, et de leurs troupeaux de moutons, de chèvres et de bovins. Cette année-là, il leur assura la nourriture en échange de tous leurs troupeaux.
  '18':
  - type: text
    content: 'L’année suivante, ils revinrent le trouver et lui dirent : Mon seigneur n’est pas sans savoir que nous n’avons plus d’argent, nos troupeaux appartiennent à mon seigneur, nous n’avons plus rien à présenter à mon seigneur que nos corps et nos terres. '
  '19':
  - type: text
    content: Pourquoi péririons-nous là sous tes yeux, nous et nos terres ? Achète-nous, avec nos terres, en échange de vivres, et nous deviendrons, avec nos terres, esclaves du pharaon. Donne-nous aussi du grain à semer pour que nous puissions survivre, au lieu de mourir, et que notre terre ne devienne pas un désert.
  '2':
  - type: text
    content: 'Il avait emmené avec lui cinq de ses frères qu’il présenta au pharaon. '
  '20':
  - type: text
    content: 'Alors Joseph acquit toutes les terres d’Egypte pour le compte du pharaon, car les Egyptiens vendirent chacun son champ, contraints par la famine, tant elle était rigoureuse. Ainsi, le pays devint la propriété du pharaon. '
  '21':
  - type: text
    content: Quant aux habitants, il les réduisit à l’esclavage
  - type: note
    content: 'D’après le Pentateuque samaritain et la version grecque. Le texte hébreu traditionnel a : il les déplaçait dans les villes.'
  - type: text
    content: ', d’un bout à l’autre de l’Egypte. '
  '22':
  - type: text
    content: Les seules terres que Joseph n’acheta pas étaient celles des prêtres, car il existait un décret du pharaon en leur faveur et ils se nourrissaient de ce que le pharaon leur fournissait ; c’est pourquoi ils n’eurent pas à vendre leurs terres.
  '23':
  - type: text
    content: 'Joseph dit au peuple : Je vous ai achetés aujourd’hui, vous et vos terres, pour le compte du pharaon. Voici des grains : ensemencez vos champs ! '
  '24':
  - type: text
    content: Mais vous donnerez le cinquième de vos récoltes au pharaon, les quatre autres parts seront à vous pour ensemencer les champs et pour vous nourrir, vous, vos enfants et tous ceux qui seront sous votre toit.
  '25':
  - type: text
    content: 'Ils dirent : Tu nous sauves la vie ! Puisque nous avons obtenu ta faveur, nous serons les esclaves du pharaon.'
  '26':
  - type: text
    content: Joseph fit de cette disposition une loi pour toute l’Egypte – loi qui est encore aujourd’hui en vigueur – imposant le versement du cinquième de la récolte au pharaon. Seules les terres des prêtres ne passèrent pas en propriété au pharaon.
  - type: heading
    content: Les dernières volontés de Jacob
  '27':
  - type: text
    content: 'Israël s’installa en Egypte, dans la région de Goshen. Ils y acquirent des propriétés. Ils furent féconds et se multiplièrent. '
  '28':
  - type: text
    content: 'Jacob vécut dix-sept ans en Egypte. La durée totale de sa vie fut de 147 ans. '
  '29':
  - type: text
    content: 'Quand le jour de sa mort fut proche, il appela son fils, Joseph, et lui dit : Fais-moi une faveur : place, je te prie, ta main sous ma cuisse'
  - type: note
    content: Serment solennel qui engage aussi les descendants (voir 24.2).
  - type: text
    content: ' et promets-moi d’agir envers moi avec amour et fidélité en ne m’enterrant pas en Egypte. '
  '3':
  - type: text
    content: 'Le pharaon leur demanda : Quelles sont vos occupations ?'
  - type: text
    content: 'Ils répondirent : Tes serviteurs sont bergers comme l’étaient nos ancêtres. '
  '30':
  - type: text
    content: Quand j’aurai rejoint mes ancêtres, tu me transporteras hors d’Egypte pour m’ensevelir dans leur tombeau.
  - type: text
    content: 'Joseph dit : J’agirai comme tu me l’as demandé.'
  '31':
  - type: text
    content: 'Mais son père insista : Jure-le-moi.'
  - type: text
    content: Et il le lui jura. Alors Israël se prosterna au chevet de sa couche
  - type: note
    content: 'La version grecque a : appuyé sur son bâton. Cité en Hé 11.21 d’après la version grecque.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Et ils ajoutèrent : Nous sommes venus séjourner dans le pays, car la famine sévit durement au pays de Canaan et il n’y a plus de pâturage pour les troupeaux de tes serviteurs là-bas. Permets donc à tes serviteurs de s’installer dans la région de Goshen.'
  '5':
  - type: text
    content: 'Le pharaon dit à Joseph : Ton père et tes frères sont venus te rejoindre ; '
  '6':
  - type: text
    content: 'le pays est à ta disposition. Installe-les dans la meilleure province du pays : qu’ils habitent dans la région de Goshen. Et si tu sais qu’il y a parmi eux des hommes de valeur, tu les établiras comme responsables de mes troupeaux.'
  '7':
  - type: text
    content: Joseph fit aussi venir son père Jacob pour le présenter au pharaon. Jacob bénit le pharaon.
  '8':
  - type: text
    content: 'Celui-ci lui demanda : Quel âge as-tu ?'
  '9':
  - type: text
    content: 'Jacob répondit : Le nombre de mes années de migrations est de cent trente. Les jours de ma vie ont été peu nombreux et mauvais et je n’atteindrai pas le nombre des années qu’ont duré les migrations de mes ancêtres.'
