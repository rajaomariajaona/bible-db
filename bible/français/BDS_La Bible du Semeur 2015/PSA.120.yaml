document_id: PSA.120,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivre-moi !
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: L’expression hébraïque (montée) a été diversement comprise. Selon les auteurs juifs, il s’agirait de cantiques chantés lors de la fête des Cabanes sur les degrés du Temple. Pour d’autres, l’expression se rapporterait à une gradation d’un verset à l’autre. L’interprétation la plus probable consiste à voir dans ces psaumes des cantiques chantés durant les pèlerinages à Jérusalem pour les grandes fêtes annuelles pendant que l’on montait vers la ville sainte, située sur une colline.
  - type: text
    content: .
  - type: text
    content: Dans ma détresse, ╵j’ai fait appel ╵à l’Eternel,
  - type: text
    content: et il m’a répondu.
  '2':
  - type: text
    content: O Eternel, ╵délivre-moi ╵des lèvres fausses,
  - type: text
    content: des langues mensongères !
  '3':
  - type: text
    content: Que te donnera l’Eternel ?
  - type: text
    content: Comment récompensera-t-il ╵ta langue mensongère ?
  '4':
  - type: text
    content: Il t’enverra ╵une volée de flèches ╵bien aiguisées
  - type: text
    content: avec des braises de genêts
  - type: note
    content: 'Autres traductions : une volée de flèches, chargées de braises de genêts ; ou : ta langue mensongère ? – Volée de flèches chargées de braises de genêts.'
  - type: text
    content: .
  '5':
  - type: text
    content: Malheur à moi ! ╵Car je vis à Méshek
  - type: note
    content: En Asie Mineure.
  - type: text
    content: ', en étranger,'
  - type: text
    content: ou parmi les nomades de Qédar.
  '6':
  - type: text
    content: Bien trop longtemps ╵j’ai habité
  - type: text
    content: parmi des gens ╵qui détestent la paix.
  '7':
  - type: text
    content: Je veux la paix, ╵mais quand j’en parle,
  - type: text
    content: eux, ils sont pour la guerre.
