document_id: PSA.132,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La cité du Roi
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: O Eternel, ╵souviens-toi de David
  - type: text
    content: et de toutes ses peines ;
  '10':
  - type: text
    content: Pour l’amour de David ╵qui fut ton serviteur,
  - type: text
    content: ne repousse pas l’homme ╵qui de ta part ╵a reçu l’onction d’huile sainte.
  '11':
  - type: text
    content: L’Eternel a fait à David ╵un serment sûr,
  - type: text
    content: 'il ne reviendra pas ╵sur ce qu’il a promis :'
  - type: text
    content: « Je mettrai sur ton trône
  - type: text
    content: un fils issu de toi.
  '12':
  - type: text
    content: Et si tes descendants ╵respectent mon alliance,
  - type: text
    content: et ses clauses dont je les instruirai,
  - type: text
    content: leurs propres fils aussi
  - type: text
    content: siégeront sur ton trône ╵à perpétuité
  - type: note
    content: Voir 2 S 7.12-16 ; 1 Ch 17.11-14 ; Ps 89.4-5.
  - type: text
    content: . »
  '13':
  - type: text
    content: En effet, l’Eternel ╵a fait choix de Sion,
  - type: text
    content: 'oui, il l’a désirée ╵pour résidence :'
  '14':
  - type: text
    content: « C’est mon lieu de repos ╵où je résiderai toujours ;
  - type: text
    content: c’est ici que je siégerai, ╵dans Sion que j’ai désirée.
  '15':
  - type: text
    content: Oui, je la bénirai ╵en la comblant de biens,
  - type: text
    content: et je rassasierai de pain ses pauvres.
  '16':
  - type: text
    content: Je parerai ses prêtres de salut,
  - type: text
    content: et ceux qui lui sont attachés ╵exulteront de joie.
  '17':
  - type: text
    content: Là, j’accroîtrai ╵de David la puissance,
  - type: text
    content: et tel un flambeau qui reste allumé, ╵j’établirai son successeur, ╵oint d’huile sainte de ma part
  - type: note
    content: Voir 1 R 11.36.
  - type: text
    content: .
  '18':
  - type: text
    content: Mais je parerai de honte ses ennemis
  - type: text
    content: alors que, sur son front, ╵brillera sa couronne. »
  '2':
  - type: text
    content: car il fit ce serment ╵à l’Eternel,
  - type: text
    content: 'il adressa ce vœu ╵au Puissant de Jacob :'
  '3':
  - type: text
    content: « Non, je n’entrerai pas ╵dans la tente où j’habite,
  - type: text
    content: je ne m’étendrai pas ╵sur mon lit de repos,
  '4':
  - type: text
    content: je ne veux pas donner ╵de sommeil à mes yeux
  - type: text
    content: ni d’assoupissement à mes paupières,
  '5':
  - type: text
    content: avant d’avoir trouvé ╵un lieu pour l’Eternel,
  - type: text
    content: une demeure pour le Puissant de Jacob. »
  '6':
  - type: text
    content: Or nous en avons entendu parler ╵à Ephrata,
  - type: text
    content: et nous l’avons trouvé ╵dans la campagne de Yaar
  - type: note
    content: Probablement Qiryath-Yearim (voir 1 S 7.1 ; 2 S 6).
  - type: text
    content: .
  '7':
  - type: text
    content: Allons donc jusqu’à sa demeure !
  - type: text
    content: Allons nous prosterner ╵devant son marchepied !
  '8':
  - type: text
    content: Lève-toi, Eternel, ╵et viens au lieu de repos qui t’est destiné !
  - type: text
    content: Oh ! viens avec le coffre de l’alliance
  - type: note
    content: Voir Ex 25.10-22. Les v. 8-10 ont leur parallèle en 2 Ch 6.41-42.
  - type: text
    content: ' ╵d’où rayonne ta force !'
  '9':
  - type: text
    content: Que tes prêtres se parent de justice,
  - type: text
    content: que ceux qui te sont attachés ╵poussent des cris de joie.
