document_id: PSA.132,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La cité du Roi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵souviens-toi de David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de toutes ses peines ;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour l’amour de David ╵qui fut ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne repousse pas l’homme ╵qui de ta part ╵a reçu l’onction d’huile sainte.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a fait à David ╵un serment sûr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il ne reviendra pas ╵sur ce qu’il a promis :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je mettrai sur ton trône
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un fils issu de toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et si tes descendants ╵respectent mon alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses clauses dont je les instruirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs propres fils aussi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: siégeront sur ton trône ╵à perpétuité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 7.12-16 ; 1 Ch 17.11-14 ; Ps 89.4-5.
      marker-yv: yv-n
    - type: text
      text: . »
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l’Eternel ╵a fait choix de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'oui, il l’a désirée ╵pour résidence :'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « C’est mon lieu de repos ╵où je résiderai toujours ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est ici que je siégerai, ╵dans Sion que j’ai désirée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je la bénirai ╵en la comblant de biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je rassasierai de pain ses pauvres.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je parerai ses prêtres de salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui lui sont attachés ╵exulteront de joie.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, j’accroîtrai ╵de David la puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tel un flambeau qui reste allumé, ╵j’établirai son successeur, ╵oint d’huile sainte de ma part
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 11.36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je parerai de honte ses ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que, sur son front, ╵brillera sa couronne. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il fit ce serment ╵à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il adressa ce vœu ╵au Puissant de Jacob :'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Non, je n’entrerai pas ╵dans la tente où j’habite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne m’étendrai pas ╵sur mon lit de repos,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne veux pas donner ╵de sommeil à mes yeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni d’assoupissement à mes paupières,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant d’avoir trouvé ╵un lieu pour l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une demeure pour le Puissant de Jacob. »
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or nous en avons entendu parler ╵à Ephrata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous l’avons trouvé ╵dans la campagne de Yaar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probablement Qiryath-Yearim (voir 1 S 7.1 ; 2 S 6).
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons donc jusqu’à sa demeure !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons nous prosterner ╵devant son marchepied !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, Eternel, ╵et viens au lieu de repos qui t’est destiné !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh ! viens avec le coffre de l’alliance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.10-22
        - type: text
          text: '. Les v. 8-10 ont leur parallèle en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 6.41-42
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵d’où rayonne ta force !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes prêtres se parent de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ceux qui te sont attachés ╵poussent des cris de joie.
