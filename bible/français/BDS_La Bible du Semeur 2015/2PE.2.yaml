document_id: 2PE.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enseignants de mensonge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Autrefois, il y a eu des prophètes de mensonge parmi le peuple d’Israël ; il en sera de même parmi vous. Ces enseignants de mensonge introduiront subtilement parmi vous des erreurs qui mènent à la perdition. Ils renieront le Maître qui les a rachetés et attireront ainsi sur eux une perdition soudaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Beaucoup de gens les suivront dans leur immoralité et, à cause d’eux, la voie de la vérité sera discréditée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Par amour de l’argent, ils vous exploiteront avec des histoires de leur propre invention. Mais il y a longtemps que leur condamnation est à l’œuvre et que la perdition les guette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, Dieu n’a pas épargné les anges qui ont péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être les anges qui ont suivi Satan dans sa révolte contre Dieu.
    marker-yv: yv-n
  - type: text
    text: '  : il les a précipités dans l’abîme où ils sont gardés pour le jugement, enchaînés dans les ténèbres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans des puits obscurs.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il n’a pas non plus épargné le monde ancien, lorsqu’il fit fondre le déluge sur ce monde qui n’avait aucun respect pour lui. Il a néanmoins protégé huit personnes dont Noé, qui appelait ses contemporains à mener une vie juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a condamné à la destruction les villes de Sodome et de Gomorrhe en les réduisant en cendres, pour donner à ceux qui se révoltent contre lui un exemple de ce qui leur arrivera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il a délivré Loth, cet homme juste qui était consterné par la conduite immorale des habitants débauchés de ces villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car, en les voyant vivre et en les entendant parler, cet homme juste qui vivait au milieu d’eux était tourmenté jour après jour dans son âme intègre, à cause de leurs agissements criminels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi le Seigneur sait comment délivrer de l’épreuve les personnes pieuses, et réserver ceux qui font le mal pour le jour du jugement où ils seront châtiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il punira tout particulièrement ceux qui, mus par la sensualité, vivent au gré de leurs désirs corrompus et méprisent l’autorité du Seigneur. Imbus d’eux-mêmes et arrogants, ces enseignants de mensonge n’hésitent pas à insulter les êtres glorieux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'alors que les anges eux-mêmes, qui leur sont pourtant bien supérieurs en force et en puissance, ne portent pas de jugement insultant contre ces êtres devant le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ces hommes-là agissent comme des animaux dépourvus de raison qui ne suivent que leurs instincts et sont tout juste bons à être capturés et tués, car ils se répandent en injures contre ce qu’ils ne connaissent pas. Aussi périront-ils comme des bêtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le mal qu’ils ont fait leur sera payé en retour. Ces hommes trouvent leur plaisir à se livrer à l’immoralité en plein jour. Ils salissent et déshonorent par leur présence les fêtes auxquelles ils participent avec vous en prenant un malin plaisir à vous tromper
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en se délectant dans vos repas fraternels.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils ont le regard chargé d’adultère et d’un besoin insatiable de pécher, ils prennent au piège les personnes mal affermies, ils n’ont plus rien à apprendre en ce qui concerne l’amour de l’argent : ils sont sous la malédiction divine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils ont abandonné le droit chemin et se sont égarés en marchant sur les traces de Balaam, fils de Béor, qui a aimé l’argent mal acquis ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: mais il a été rappelé à l’ordre pour sa désobéissance. C’est une ânesse muette qui, se mettant à parler d’une voix humaine, a détourné le prophète de son projet insensé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ces enseignants de mensonge sont comme des sources qui ne donnent pas d’eau, comme des nuages poussés par la tempête. Dieu leur a réservé une place dans les ténèbres les plus profondes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avec leurs discours grandiloquents mais creux, ils cherchent à appâter, par l’attrait des désirs sensuels et de l’immoralité ceux qui viennent à peine d’échapper du milieu des hommes vivant dans l’erreur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils leur promettent la liberté – alors qu’ils sont eux-mêmes esclaves des passions qui les mènent à la ruine ; car tout homme est esclave de ce qui a triomphé de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si, après s’être arrachés aux influences corruptrices du monde par la connaissance qu’ils ont eue de notre Seigneur et Sauveur Jésus-Christ, ils se laissent de nouveau prendre et dominer par elles, leur dernière condition est pire que la première. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il aurait mieux valu pour eux ne pas connaître le chemin d’une vie juste plutôt que de s’en détourner après l’avoir connu et d’abandonner le saint commandement qui leur avait été transmis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils confirment la vérité de ce proverbe : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le chien retourne à ce qu’il a vomi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26.11
        metadata:
          usfm: PRO.26.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; en outre : « La truie à peine lavée se vautre de nouveau dans la boue ».'
