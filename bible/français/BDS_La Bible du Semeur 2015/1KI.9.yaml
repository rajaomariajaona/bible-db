document_id: 1KI.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu exauce la prière de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 7.11-22)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque Salomon eut achevé de bâtir le temple de l’Eternel, le palais royal et tout ce qu’il avait désiré construire, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Salomon mit vingt ans pour construire les deux édifices : le temple de l’Eternel et le palais royal. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme Hiram, le roi de Tyr, lui avait fourni autant d’or et de bois de cèdre et de cyprès qu’il avait voulu, Salomon lui céda vingt villes dans la région de Galilée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hiram vint de Tyr pour examiner les villes que lui donnait Salomon. Mais elles ne lui plurent pas '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et il s’exclama : Qu’est-ce que ces villes que tu m’as données là, mon allié ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il les appela pays de Kaboul (Sans valeur), nom qu’elles ont conservé jusqu’à ce jour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hiram avait envoyé au roi trois tonnes et demie d’or.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les réalisations et les activités diverses de Salomon
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le roi Salomon avait organisé des corvées pour la construction du temple de l’Eternel, du palais royal, pour l’aménagement des terres pour des cultures en terrasse, ainsi que pour la construction du rempart qui entoure Jérusalem et les villes de Hatsor, Meguiddo et Guézer.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le pharaon, roi d’Egypte, s’était mis en campagne pour s’emparer de Guézer, il l’avait incendiée après avoir tué les Cananéens qui l’habitaient. Plus tard, il l’avait donnée en cadeau de noces à sa fille lorsqu’elle était devenue la femme de Salomon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Salomon reconstruisit Guézer ainsi que Beth-Horôn-la-Basse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beth-Horôn-la-Basse, située au nord-ouest de Jérusalem, à l’entrée du col par lequel on accédait aux montagnes de Juda et à la capitale.
      marker-yv: yv-n
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Baalath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Soit la ville de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 19.44
        - type: text
          text: ', au sud-ouest de Beth-Horôn, soit celle de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15.24
        - type: text
          text: ', au sud d’Hébron.'
      marker-yv: yv-n
    - type: text
      text: ' et Tadmor'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Identifiée avec la grande oasis de Palmyre située dans le désert à l’est de la Syrie, à mi-chemin entre Damas et l’Euphrate ; importante localité commerciale.
      marker-yv: yv-n
    - type: text
      text: ' dans la contrée désertique du pays, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: et toutes les villes qui lui servaient d’entrepôts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’étaient des villes fortifiées qui servaient d’entrepôts de provisions pour les temps de guerre et de famine (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 32.28
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et celles où il tenait en réserve ses chars de guerre et ses équipages de char. Il construisit tout ce qu’il avait envie de construire à Jérusalem, au Liban et dans tout le pays soumis à son autorité. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: l’Eternel lui apparut une seconde fois, de la même manière qu’il lui était apparu à Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 3.4-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il y avait une population qui n’était pas israélite : des Amoréens, des Hittites, des Phéréziens, des Héviens et des Yebousiens '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'dont les descendants étaient restés dans le pays et que les Israélites n’avaient pu vouer à l’extermination. Salomon les employa comme esclaves de corvée, et ils le sont restés jusqu’à ce jour. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais Salomon n’astreignit à l’esclavage aucun des Israélites ; il les enrôla dans l’armée comme soldats, fonctionnaires, officiers, écuyers, chefs de ses chars et de ses soldats sur char. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 550 fonctionnaires principaux dirigeaient les ouvriers qui exécutaient les travaux forcés effectués pour Salomon.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Lorsque la fille du pharaon déménagea de la Cité de David dans le palais que Salomon lui avait fait construire, le roi en fit aménager les abords pour les cultures en terrasse.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Trois fois dans l’année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aux trois grandes fêtes de l’année : fête des Pains sans levain, des Semaines et des Cabanes (Ex 23.14-17 ; Dt 16.16 ; 2 Ch 8.13).'
      marker-yv: yv-n
    - type: text
      text: ', Salomon offrait des holocaustes et des sacrifices de communion sur l’autel qu’il avait fait construire à l’Eternel et il brûlait des parfums sur celui qui était dressé devant l’Eternel. C’est ainsi que le Temple fut mis en fonction.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Le roi Salomon arma aussi une flotte à Etsyôn-Guéber
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Etsyôn-Guéber '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était située au sommet du bras nord-est de la mer Rouge, appelé golfe d’Aqaba (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 33.36
        - type: text
          text: ), dans le territoire d’Edom soumis par David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 8.13-14
        - type: text
          text: ). La possession de ce port permettait à Salomon l’accès de la mer Rouge et de l’océan Indien.
      marker-yv: yv-n
    - type: text
      text: ', près d’Eilath, sur les bords de la mer des Roseaux, dans le pays d’Edom. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hiram envoya à bord des navires des marins phéniciens expérimentés qui étaient à son service pour aider les serviteurs de Salomon. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ils parvinrent à Ophir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Région aurifère souvent nommée dans la Bible (10.11 ; 22.49 ; Gn 10.29 ; 1 Ch 29.4 ; Jb 22.24 ; 28.16 ; Ps 45.10 ; Es 13.12). On en a proposé plusieurs localisations : Arabie, côte africaine des Somalis, Inde, Zimbabwe. Puisque les navires de Salomon mettaient trois ans pour leur expédition ('
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.22'
        - type: text
          text: '), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ophir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait sans doute au-delà de la côte arabe.
      marker-yv: yv-n
    - type: text
      text: ', d’où ils rapportèrent plus de douze tonnes d’or qu’ils remirent au roi Salomon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il lui dit : J’ai exaucé ta prière et la supplication que tu m’as adressée : je fais de cet édifice que tu as construit un lieu saint pour y établir à jamais ma présence. Je veillerai toujours sur lui et j’y aurai mon cœur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quant à toi, si tu te conduis devant moi comme ton père David, avec un cœur intègre et droit, en faisant tout ce que je t’ai ordonné, si tu obéis aux ordonnances et aux lois que je t’ai données, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'je rendrai stable pour toujours ton trône royal sur Israël, comme je l’ai promis à ton père David, lorsque je lui ai dit : « Il y aura toujours l’un de tes descendants sur le trône d’Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.4'
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.25'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais si vous vous détournez délibérément de moi, vous et vos descendants, si vous n’obéissez pas à mes lois et à mes ordonnances que j’ai établies pour vous, et si vous allez rendre un culte à d’autres dieux et vous prosterner devant eux, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: je ferai disparaître le peuple d’Israël du pays que je lui ai donné, je rejetterai loin de ma vue ce temple que j’ai consacré pour y être présent, et tous les peuples se moqueront d’Israël et ricaneront à son sujet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 28.37
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quant à ce temple si glorieux, tous ceux qui passeront à proximité seront consternés et épouvantés. On s’exclamera : « Pourquoi l’Eternel a-t-il traité ainsi ce pays et ce temple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 25.9 ; 2 Ch 36.19.
      marker-yv: yv-n
    - type: text
      text: '  ? » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et l’on répondra : « C’est parce qu’ils ont abandonné l’Eternel leur Dieu, qui a fait sortir leurs ancêtres d’Egypte, parce qu’ils se sont attachés à d’autres dieux, qu’ils se sont prosternés devant eux et les ont adorés. Voilà pourquoi l’Eternel leur a infligé tout ce malheur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 29.22-28 ; Jr 22.8-30.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dons de villes à Hiram en échange des matériaux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 8.1-18)
    marker-yv: yv-h
