document_id: 1KI.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu exauce la prière de Salomon
  - type: heading
    content: (2 Ch 7.11-22)
  - type: text
    content: 'Lorsque Salomon eut achevé de bâtir le temple de l’Eternel, le palais royal et tout ce qu’il avait désiré construire, '
  '10':
  - type: text
    content: 'Salomon mit vingt ans pour construire les deux édifices : le temple de l’Eternel et le palais royal. '
  '11':
  - type: text
    content: 'Comme Hiram, le roi de Tyr, lui avait fourni autant d’or et de bois de cèdre et de cyprès qu’il avait voulu, Salomon lui céda vingt villes dans la région de Galilée. '
  '12':
  - type: text
    content: 'Hiram vint de Tyr pour examiner les villes que lui donnait Salomon. Mais elles ne lui plurent pas '
  '13':
  - type: text
    content: 'et il s’exclama : Qu’est-ce que ces villes que tu m’as données là, mon allié ?'
  - type: text
    content: 'Et il les appela pays de Kaboul (Sans valeur), nom qu’elles ont conservé jusqu’à ce jour. '
  '14':
  - type: text
    content: Hiram avait envoyé au roi trois tonnes et demie d’or.
  - type: heading
    content: Les réalisations et les activités diverses de Salomon
  '15':
  - type: text
    content: Le roi Salomon avait organisé des corvées pour la construction du temple de l’Eternel, du palais royal, pour l’aménagement des terres pour des cultures en terrasse, ainsi que pour la construction du rempart qui entoure Jérusalem et les villes de Hatsor, Meguiddo et Guézer.
  '16':
  - type: text
    content: 'Le pharaon, roi d’Egypte, s’était mis en campagne pour s’emparer de Guézer, il l’avait incendiée après avoir tué les Cananéens qui l’habitaient. Plus tard, il l’avait donnée en cadeau de noces à sa fille lorsqu’elle était devenue la femme de Salomon. '
  '17':
  - type: text
    content: Salomon reconstruisit Guézer ainsi que Beth-Horôn-la-Basse
  - type: note
    content: Beth-Horôn-la-Basse, située au nord-ouest de Jérusalem, à l’entrée du col par lequel on accédait aux montagnes de Juda et à la capitale.
  - type: text
    content: ', '
  '18':
  - type: text
    content: Baalath
  - type: note
    content: Soit la ville de Jos 19.44, au sud-ouest de Beth-Horôn, soit celle de Jos 15.24, au sud d’Hébron.
  - type: text
    content: ' et Tadmor'
  - type: note
    content: Identifiée avec la grande oasis de Palmyre située dans le désert à l’est de la Syrie, à mi-chemin entre Damas et l’Euphrate ; importante localité commerciale.
  - type: text
    content: ' dans la contrée désertique du pays, '
  '19':
  - type: text
    content: et toutes les villes qui lui servaient d’entrepôts
  - type: note
    content: C’étaient des villes fortifiées qui servaient d’entrepôts de provisions pour les temps de guerre et de famine (2 Ch 32.28).
  - type: text
    content: ' et celles où il tenait en réserve ses chars de guerre et ses équipages de char. Il construisit tout ce qu’il avait envie de construire à Jérusalem, au Liban et dans tout le pays soumis à son autorité. '
  '2':
  - type: text
    content: l’Eternel lui apparut une seconde fois, de la même manière qu’il lui était apparu à Gabaon
  - type: note
    content: Voir 1 R 3.4-15.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Il y avait une population qui n’était pas israélite : des Amoréens, des Hittites, des Phéréziens, des Héviens et des Yebousiens '
  '21':
  - type: text
    content: 'dont les descendants étaient restés dans le pays et que les Israélites n’avaient pu vouer à l’extermination. Salomon les employa comme esclaves de corvée, et ils le sont restés jusqu’à ce jour. '
  '22':
  - type: text
    content: 'Mais Salomon n’astreignit à l’esclavage aucun des Israélites ; il les enrôla dans l’armée comme soldats, fonctionnaires, officiers, écuyers, chefs de ses chars et de ses soldats sur char. '
  '23':
  - type: text
    content: 550 fonctionnaires principaux dirigeaient les ouvriers qui exécutaient les travaux forcés effectués pour Salomon.
  '24':
  - type: text
    content: Lorsque la fille du pharaon déménagea de la Cité de David dans le palais que Salomon lui avait fait construire, le roi en fit aménager les abords pour les cultures en terrasse.
  '25':
  - type: text
    content: Trois fois dans l’année
  - type: note
    content: 'Aux trois grandes fêtes de l’année : fête des Pains sans levain, des Semaines et des Cabanes (Ex 23.14-17 ; Dt 16.16 ; 2 Ch 8.13).'
  - type: text
    content: ', Salomon offrait des holocaustes et des sacrifices de communion sur l’autel qu’il avait fait construire à l’Eternel et il brûlait des parfums sur celui qui était dressé devant l’Eternel. C’est ainsi que le Temple fut mis en fonction.'
  '26':
  - type: text
    content: Le roi Salomon arma aussi une flotte à Etsyôn-Guéber
  - type: note
    content: Etsyôn-Guéber était située au sommet du bras nord-est de la mer Rouge, appelé golfe d’Aqaba (Nb 33.36), dans le territoire d’Edom soumis par David (2 S 8.13-14). La possession de ce port permettait à Salomon l’accès de la mer Rouge et de l’océan Indien.
  - type: text
    content: ', près d’Eilath, sur les bords de la mer des Roseaux, dans le pays d’Edom. '
  '27':
  - type: text
    content: 'Hiram envoya à bord des navires des marins phéniciens expérimentés qui étaient à son service pour aider les serviteurs de Salomon. '
  '28':
  - type: text
    content: Ils parvinrent à Ophir
  - type: note
    content: 'Région aurifère souvent nommée dans la Bible (10.11 ; 22.49 ; Gn 10.29 ; 1 Ch 29.4 ; Jb 22.24 ; 28.16 ; Ps 45.10 ; Es 13.12). On en a proposé plusieurs localisations : Arabie, côte africaine des Somalis, Inde, Zimbabwe. Puisque les navires de Salomon mettaient trois ans pour leur expédition (10.22), Ophir se trouvait sans doute au-delà de la côte arabe.'
  - type: text
    content: ', d’où ils rapportèrent plus de douze tonnes d’or qu’ils remirent au roi Salomon.'
  '3':
  - type: text
    content: 'Il lui dit : J’ai exaucé ta prière et la supplication que tu m’as adressée : je fais de cet édifice que tu as construit un lieu saint pour y établir à jamais ma présence. Je veillerai toujours sur lui et j’y aurai mon cœur. '
  '4':
  - type: text
    content: 'Quant à toi, si tu te conduis devant moi comme ton père David, avec un cœur intègre et droit, en faisant tout ce que je t’ai ordonné, si tu obéis aux ordonnances et aux lois que je t’ai données, '
  '5':
  - type: text
    content: 'je rendrai stable pour toujours ton trône royal sur Israël, comme je l’ai promis à ton père David, lorsque je lui ai dit : « Il y aura toujours l’un de tes descendants sur le trône d’Israël'
  - type: note
    content: Voir 2.4 et 8.25.
  - type: text
    content: '. » '
  '6':
  - type: text
    content: 'Mais si vous vous détournez délibérément de moi, vous et vos descendants, si vous n’obéissez pas à mes lois et à mes ordonnances que j’ai établies pour vous, et si vous allez rendre un culte à d’autres dieux et vous prosterner devant eux, '
  '7':
  - type: text
    content: je ferai disparaître le peuple d’Israël du pays que je lui ai donné, je rejetterai loin de ma vue ce temple que j’ai consacré pour y être présent, et tous les peuples se moqueront d’Israël et ricaneront à son sujet
  - type: note
    content: Voir Dt 28.37.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Quant à ce temple si glorieux, tous ceux qui passeront à proximité seront consternés et épouvantés. On s’exclamera : « Pourquoi l’Eternel a-t-il traité ainsi ce pays et ce temple'
  - type: note
    content: Voir 2 R 25.9 ; 2 Ch 36.19.
  - type: text
    content: '  ? » '
  '9':
  - type: text
    content: 'Et l’on répondra : « C’est parce qu’ils ont abandonné l’Eternel leur Dieu, qui a fait sortir leurs ancêtres d’Egypte, parce qu’ils se sont attachés à d’autres dieux, qu’ils se sont prosternés devant eux et les ont adorés. Voilà pourquoi l’Eternel leur a infligé tout ce malheur'
  - type: note
    content: Dt 29.22-28 ; Jr 22.8-30.
  - type: text
    content: . »
  - type: heading
    content: Les dons de villes à Hiram en échange des matériaux
  - type: heading
    content: (2 Ch 8.1-18)
