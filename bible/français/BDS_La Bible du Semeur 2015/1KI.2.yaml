- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Le roi donna ses ordres à Benaya, fils de Yehoyada ; celui-ci sortit et frappa Shimeï qui mourut. Ainsi la royauté fut consolidée entre les mains de Salomon.
