document_id: 1KI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dernières instructions de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David approchait de sa fin. Il fit ses dernières recommandations à son fils Salomon en ces termes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28
        metadata:
          usfm: 1CH.28
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
        metadata:
          usfm: 1CH.29
      - type: text
        text: ' donnent d’autres détails sur la fin de la vie de David.'
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici que je vais bientôt prendre le chemin que suit tout homme. Montre-toi courageux et conduis-toi en homme !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Suis fidèlement les ordres de l’Eternel ton Dieu, en marchant dans les chemins qu’il a prescrits et en obéissant à ses lois, ses commandements, ses articles de droit et ses ordonnances, tels qu’ils sont consignés dans la Loi de Moïse. Alors tu auras du succès dans tout ce que tu entreprendras et partout où tu iras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et ainsi l’Eternel accomplira la promesse qu’il m’a faite en me disant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7.11-16
        metadata:
          usfm: 2SA.7.11+2SA.7.12+2SA.7.13+2SA.7.14+2SA.7.15+2SA.7.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : « Si tes descendants veillent sur leur conduite pour vivre fidèlement selon ma volonté de tout leur cœur et de tout leur être, il y aura toujours l’un d’entre eux sur le trône d’Israël. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Par ailleurs, tu sais tout ce que m’a fait Joab, fils de Tserouya, et ce qu’il a fait à deux chefs des armées d’Israël, à Abner, fils de Ner, et à Amasa, fils de Yéter. Il les a assassinés en pleine paix comme s’il s’agissait d’un fait de guerre, il a pris sur lui la pleine responsabilité de ce meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 3.26-27 ; 20.9-10.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu agiras envers lui avec sagesse et tu ne le laisseras pas mourir tranquillement de vieillesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais n’oublie pas de traiter avec bonté les fils de Barzillaï, le Galaadite. Compte-les parmi ceux qui mangent à la table royale
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signe d’honneur particulier associé à d’autres avantages (voir 18.19 ; 2 R 25.29 ; 2 S 9.7 ; 19.29 ; Né 5.17).
    marker-yv: yv-n
  - type: text
    text: ', car ils m’ont secouru avec bonté lorsque je fuyais devant ton frère Absalom'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 17.27-29 ; 19.32-33.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu as aussi dans ton entourage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le domicile de Shimeï n’était qu’à 8 kilomètres de Jérusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16.5
        metadata:
          usfm: 2SA.16.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' Shimeï, fils de Guéra, un Benjaminite du village de Bahourim. Il a prononcé contre moi de terribles malédictions le jour où j’ai dû me réfugier à Mahanaïm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 17.24
        metadata:
          usfm: 2SA.17.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Mais lorsqu’il est venu à ma rencontre vers le Jourdain à mon retour, je lui ai juré au nom de l’Eternel que je ne le ferais pas mourir par l’épée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 S 16.5-13 ; 19.19-24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maintenant, ne le considère pas comme innocent ; tu es un homme avisé et tu sauras comment tu dois le traiter : tu veilleras à ce qu’il soit mis à mort malgré son grand âge.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 29.26-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David rejoignit ses ancêtres décédés et il fut enterré dans la Cité de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il avait régné quarante ans sur Israël : sept ans à Hébron et trente-trois ans à Jérusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5.1-5
        metadata:
          usfm: 2SA.5.1+2SA.5.2+2SA.5.3+2SA.5.4+2SA.5.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Salomon siégea sur le trône de son père David et il établit fermement son autorité royale.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adoniya est condamné à mort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Adoniya, fils de Haggith, vint trouver Bath-Shéba, la mère de Salomon. Elle lui demanda : Viens-tu me voir avec de bonnes intentions ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : Oui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et il ajouta : J’aimerais te parler.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle dit : Parle ! De quoi s’agit-il ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '– Tu sais que la royauté aurait dû me revenir, lui dit-il, et que tous les Israélites regardaient vers moi comme à celui qui devait régner. Mais les choses ont tourné autrement : la royauté est passée à mon frère parce que l’Eternel la lui avait destinée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maintenant, j’ai une seule demande à t’adresser, ne me la refuse pas !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Parle !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il reprit : Si tu demandes quelque chose au roi Salomon, il ne te le refusera pas. Alors veuille, je te prie, lui demander de me donner pour femme Abishag, la Sunamite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Bath-Shéba dit : Bien ! Je parlerai moi-même au roi à ton sujet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle se rendit auprès du roi Salomon pour lui parler en faveur d’Adoniya. Le roi se leva pour aller à la rencontre de sa mère, il se prosterna devant elle, puis il s’assit sur son trône. Il fit placer un siège pour sa mère à sa droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans les cours orientales, la reine mère jouissait d’un honneur et d’un pouvoir particuliers (voir 15.13 ; Jr 13.18). Le siège à la droite de quelqu’un constituait la place d’honneur (Ps 45.10 ; 110.1).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle lui dit : J’ai juste une petite chose à te demander, ne me la refuse pas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Demande ce que tu veux, ma mère, lui dit le roi, car je n’ai rien à te refuser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle continua : Qu’Abishag la Sunamite soit donnée pour femme à ton frère Adoniya.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Salomon répondit à sa mère : Comment peux-tu demander Abishag la Sunamite pour Adoniya ? Demande donc tout de suite la royauté pour lui – puisqu’il est mon frère aîné – pour lui, pour le prêtre Abiatar et pour Joab fils de Tserouya !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors le roi Salomon prêta serment au nom de l’Eternel : Que Dieu me punisse très sévèrement, si Adoniya ne paie pas cette demande de sa vie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L’Eternel lui-même m’a fait siéger sur le trône de mon père David, il a affermi mon autorité et a fondé pour moi une dynastie, comme il l’avait promis. Aussi vrai qu’il est vivant, je jure qu’aujourd’hui même Adoniya sera mis à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Alors le roi Salomon donna ordre à Benaya, fils de Yehoyada, de l’exécuter, et Adoniya mourut.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abiatar est démis de ses fonctions et Joab est exécuté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ensuite le roi ordonna au prêtre Abiatar : Retire-toi dans ta propriété à Anatoth, car toi aussi tu mérites la mort'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Comme complice de la trahison d’Adoniya.
    marker-yv: yv-n
  - type: text
    text: '  ; mais je ne te ferai pas mourir maintenant car tu as porté le coffre du Seigneur l’Eternel devant mon père David et tu as partagé toutes ses tribulations'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 2 S 15.24, 25, 29 ; 1 Ch 15.11-12. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abiatar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: avait fait partie des compagnons de David avant que celui-ci fût roi (1 S 22.20-23 ; 23.6-9 ; 30.7 ; 2 S 17.15 ; 19.12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ainsi Salomon démit Abiatar de sa fonction de prêtre de l’Eternel. De la sorte, il accomplit la parole que l’Eternel avait prononcée contre les descendants d’Eli à Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2.30-36
        metadata:
          usfm: 1SA.2.30+1SA.2.31+1SA.2.32+1SA.2.33+1SA.2.34+1SA.2.35+1SA.2.36
      - type: text
        text: . Seul Abiatar avait échappé au massacre de la famille d’Eli (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 22.17-20
        metadata:
          usfm: 1SA.22.17+1SA.22.18+1SA.22.19+1SA.22.20
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La nouvelle parvint à Joab qui s’était rallié au parti d’Adoniya, bien qu’il n’eût pas suivi le parti d’Absalom. Joab se réfugia dans la tente de l’Eternel et saisit les cornes de l’autel des sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'On rapporta au roi Salomon que Joab s’était réfugié dans la tente de l’Eternel et qu’il se trouvait près de l’autel. Alors Salomon envoya Benaya, fils de Yehoyada, avec l’ordre de l’exécuter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Benaya se rendit à la tente de l’Eternel et dit à Joab : Par ordre du roi, sors de là !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Joab répondit : Non ! C’est ici que je veux mourir !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Benaya retourna chez le roi pour lui rapporter la réponse de Joab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi lui dit : Très bien. Fais comme il a dit, exécute-le sur place, puis tu l’enterreras. Ainsi tu me déchargeras moi-même et ma maison de toute responsabilité dans les meurtres que Joab a commis sans cause. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L’Eternel fera retomber sur lui la responsabilité de l’assassinat de deux hommes plus justes et meilleurs que lui : Abner, fils de Ner, chef de l’armée d’Israël, et Amasa, fils de Yéter, chef de l’armée de Juda. Il les a tués tous deux par l’épée à l’insu de mon père David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Oui, c’est Joab et ses descendants qui porteront pour toujours la responsabilité de ces meurtres, tandis que l’Eternel conservera à tout jamais la paix à David, à sa descendance, à sa dynastie et à son trône.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Benaya, fils de Yehoyada, partit, il frappa Joab et le fit mourir. On l’enterra dans sa propriété, au désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'désert '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Juda, région inculte à l’est de Bethléhem. Il n’existait pas encore de cimetière commun, mais des tombeaux de famille.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le roi le remplaça à la tête de l’armée par Benaya, fils de Yehoyada, et il mit le prêtre Tsadoq à la place d’Abiatar.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’exécution de Shimeï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le roi convoqua Shimeï et lui dit : Construis-toi une maison à Jérusalem, tu y habiteras et tu ne la quitteras pas pour aller de côté et d’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je t’avertis que le jour où tu sortiras de la ville et où tu franchiras la vallée du Cédron, tu mourras et tu porteras seul la responsabilité de ta mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Shimeï répondit au roi : C’est bien ! Ton serviteur se conformera à l’ordre de mon seigneur le roi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Shimeï demeura longtemps à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mais trois ans plus tard, deux de ses esclaves s’enfuirent de chez lui chez Akish, fils de Maaka, roi de Gath. On lui rapporta que ses esclaves étaient à Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Philistie (1 S 21.11 ; 27.2).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Alors Shimeï se prépara à partir, sella son âne, et s’en alla à Gath chez Akish pour y rechercher ses esclaves, puis il revint de Gath avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'On rapporta à Salomon que Shimeï était allé de Jérusalem à Gath et qu’il était revenu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le roi convoqua Shimeï et lui dit : Est-ce que je ne t’ai pas fait jurer au nom de l’Eternel de ne pas sortir de la ville ? Et ne t’ai-je pas averti en te disant : « Sache bien que le jour où tu sortiras de la ville pour aller où que ce soit, tu mourras ? » Tu m’avais bien dit : « Bien, c’est entendu. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Alors, pourquoi n’as-tu pas respecté le serment fait devant l’Eternel et as-tu désobéi à l’ordre que je t’avais donné ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Le roi ajouta : Tu sais bien toi-même tout le mal que tu as fait sciemment à mon père David. L’Eternel te fera porter le châtiment de ta méchanceté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mais le roi Salomon sera béni et le trône de David sera affermi pour toujours devant l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
