document_id: 1KI.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dernières instructions de David
  - type: text
    content: David approchait de sa fin. Il fit ses dernières recommandations à son fils Salomon en ces termes
  - type: note
    content: 1 Ch 28 et 29 donnent d’autres détails sur la fin de la vie de David.
  - type: text
    content: '  : '
  '10':
  - type: text
    content: 'David rejoignit ses ancêtres décédés et il fut enterré dans la Cité de David. '
  '11':
  - type: text
    content: 'Il avait régné quarante ans sur Israël : sept ans à Hébron et trente-trois ans à Jérusalem'
  - type: note
    content: Voir 2 S 5.1-5.
  - type: text
    content: .
  '12':
  - type: text
    content: Salomon siégea sur le trône de son père David et il établit fermement son autorité royale.
  - type: heading
    content: Adoniya est condamné à mort
  '13':
  - type: text
    content: 'Adoniya, fils de Haggith, vint trouver Bath-Shéba, la mère de Salomon. Elle lui demanda : Viens-tu me voir avec de bonnes intentions ?'
  - type: text
    content: 'Il répondit : Oui. '
  '14':
  - type: text
    content: 'Et il ajouta : J’aimerais te parler.'
  - type: text
    content: 'Elle dit : Parle ! De quoi s’agit-il ?'
  '15':
  - type: text
    content: '– Tu sais que la royauté aurait dû me revenir, lui dit-il, et que tous les Israélites regardaient vers moi comme à celui qui devait régner. Mais les choses ont tourné autrement : la royauté est passée à mon frère parce que l’Eternel la lui avait destinée.'
  '16':
  - type: text
    content: Maintenant, j’ai une seule demande à t’adresser, ne me la refuse pas !
  - type: text
    content: 'Elle répondit : Parle !'
  '17':
  - type: text
    content: 'Il reprit : Si tu demandes quelque chose au roi Salomon, il ne te le refusera pas. Alors veuille, je te prie, lui demander de me donner pour femme Abishag, la Sunamite.'
  '18':
  - type: text
    content: 'Bath-Shéba dit : Bien ! Je parlerai moi-même au roi à ton sujet.'
  '19':
  - type: text
    content: Elle se rendit auprès du roi Salomon pour lui parler en faveur d’Adoniya. Le roi se leva pour aller à la rencontre de sa mère, il se prosterna devant elle, puis il s’assit sur son trône. Il fit placer un siège pour sa mère à sa droite
  - type: note
    content: Dans les cours orientales, la reine mère jouissait d’un honneur et d’un pouvoir particuliers (voir 15.13 ; Jr 13.18). Le siège à la droite de quelqu’un constituait la place d’honneur (Ps 45.10 ; 110.1).
  - type: text
    content: '. '
  '2':
  - type: text
    content: Voici que je vais bientôt prendre le chemin que suit tout homme. Montre-toi courageux et conduis-toi en homme !
  '20':
  - type: text
    content: 'Elle lui dit : J’ai juste une petite chose à te demander, ne me la refuse pas !'
  - type: text
    content: – Demande ce que tu veux, ma mère, lui dit le roi, car je n’ai rien à te refuser.
  '21':
  - type: text
    content: 'Elle continua : Qu’Abishag la Sunamite soit donnée pour femme à ton frère Adoniya.'
  '22':
  - type: text
    content: 'Le roi Salomon répondit à sa mère : Comment peux-tu demander Abishag la Sunamite pour Adoniya ? Demande donc tout de suite la royauté pour lui – puisqu’il est mon frère aîné – pour lui, pour le prêtre Abiatar et pour Joab fils de Tserouya !'
  '23':
  - type: text
    content: 'Alors le roi Salomon prêta serment au nom de l’Eternel : Que Dieu me punisse très sévèrement, si Adoniya ne paie pas cette demande de sa vie ! '
  '24':
  - type: text
    content: L’Eternel lui-même m’a fait siéger sur le trône de mon père David, il a affermi mon autorité et a fondé pour moi une dynastie, comme il l’avait promis. Aussi vrai qu’il est vivant, je jure qu’aujourd’hui même Adoniya sera mis à mort.
  '25':
  - type: text
    content: Alors le roi Salomon donna ordre à Benaya, fils de Yehoyada, de l’exécuter, et Adoniya mourut.
  - type: heading
    content: Abiatar est démis de ses fonctions et Joab est exécuté
  '26':
  - type: text
    content: 'Ensuite le roi ordonna au prêtre Abiatar : Retire-toi dans ta propriété à Anatoth, car toi aussi tu mérites la mort'
  - type: note
    content: Comme complice de la trahison d’Adoniya.
  - type: text
    content: '  ; mais je ne te ferai pas mourir maintenant car tu as porté le coffre du Seigneur l’Eternel devant mon père David et tu as partagé toutes ses tribulations'
  - type: note
    content: Voir 2 S 15.24, 25, 29 ; 1 Ch 15.11-12. Abiatar avait fait partie des compagnons de David avant que celui-ci fût roi (1 S 22.20-23 ; 23.6-9 ; 30.7 ; 2 S 17.15 ; 19.12).
  - type: text
    content: .
  '27':
  - type: text
    content: Ainsi Salomon démit Abiatar de sa fonction de prêtre de l’Eternel. De la sorte, il accomplit la parole que l’Eternel avait prononcée contre les descendants d’Eli à Silo
  - type: note
    content: Voir 1 S 2.30-36. Seul Abiatar avait échappé au massacre de la famille d’Eli (1 S 22.17-20).
  - type: text
    content: .
  '28':
  - type: text
    content: 'La nouvelle parvint à Joab qui s’était rallié au parti d’Adoniya, bien qu’il n’eût pas suivi le parti d’Absalom. Joab se réfugia dans la tente de l’Eternel et saisit les cornes de l’autel des sacrifices. '
  '29':
  - type: text
    content: 'On rapporta au roi Salomon que Joab s’était réfugié dans la tente de l’Eternel et qu’il se trouvait près de l’autel. Alors Salomon envoya Benaya, fils de Yehoyada, avec l’ordre de l’exécuter. '
  '3':
  - type: text
    content: 'Suis fidèlement les ordres de l’Eternel ton Dieu, en marchant dans les chemins qu’il a prescrits et en obéissant à ses lois, ses commandements, ses articles de droit et ses ordonnances, tels qu’ils sont consignés dans la Loi de Moïse. Alors tu auras du succès dans tout ce que tu entreprendras et partout où tu iras. '
  '30':
  - type: text
    content: 'Benaya se rendit à la tente de l’Eternel et dit à Joab : Par ordre du roi, sors de là !'
  - type: text
    content: 'Mais Joab répondit : Non ! C’est ici que je veux mourir !'
  - type: text
    content: 'Benaya retourna chez le roi pour lui rapporter la réponse de Joab. '
  '31':
  - type: text
    content: 'Le roi lui dit : Très bien. Fais comme il a dit, exécute-le sur place, puis tu l’enterreras. Ainsi tu me déchargeras moi-même et ma maison de toute responsabilité dans les meurtres que Joab a commis sans cause. '
  '32':
  - type: text
    content: 'L’Eternel fera retomber sur lui la responsabilité de l’assassinat de deux hommes plus justes et meilleurs que lui : Abner, fils de Ner, chef de l’armée d’Israël, et Amasa, fils de Yéter, chef de l’armée de Juda. Il les a tués tous deux par l’épée à l’insu de mon père David. '
  '33':
  - type: text
    content: Oui, c’est Joab et ses descendants qui porteront pour toujours la responsabilité de ces meurtres, tandis que l’Eternel conservera à tout jamais la paix à David, à sa descendance, à sa dynastie et à son trône.
  '34':
  - type: text
    content: Benaya, fils de Yehoyada, partit, il frappa Joab et le fit mourir. On l’enterra dans sa propriété, au désert
  - type: note
    content: Dans le désert de Juda, région inculte à l’est de Bethléhem. Il n’existait pas encore de cimetière commun, mais des tombeaux de famille.
  - type: text
    content: '. '
  '35':
  - type: text
    content: Le roi le remplaça à la tête de l’armée par Benaya, fils de Yehoyada, et il mit le prêtre Tsadoq à la place d’Abiatar.
  - type: heading
    content: L’exécution de Shimeï
  '36':
  - type: text
    content: 'Le roi convoqua Shimeï et lui dit : Construis-toi une maison à Jérusalem, tu y habiteras et tu ne la quitteras pas pour aller de côté et d’autre. '
  '37':
  - type: text
    content: Je t’avertis que le jour où tu sortiras de la ville et où tu franchiras la vallée du Cédron, tu mourras et tu porteras seul la responsabilité de ta mort.
  '38':
  - type: text
    content: 'Shimeï répondit au roi : C’est bien ! Ton serviteur se conformera à l’ordre de mon seigneur le roi.'
  - type: text
    content: Shimeï demeura longtemps à Jérusalem.
  '39':
  - type: text
    content: Mais trois ans plus tard, deux de ses esclaves s’enfuirent de chez lui chez Akish, fils de Maaka, roi de Gath. On lui rapporta que ses esclaves étaient à Gath
  - type: note
    content: Gath en Philistie (1 S 21.11 ; 27.2).
  - type: text
    content: '. '
  '4':
  - type: text
    content: Et ainsi l’Eternel accomplira la promesse qu’il m’a faite en me disant
  - type: note
    content: Voir 2 S 7.11-16.
  - type: text
    content: '  : « Si tes descendants veillent sur leur conduite pour vivre fidèlement selon ma volonté de tout leur cœur et de tout leur être, il y aura toujours l’un d’entre eux sur le trône d’Israël. » '
  '40':
  - type: text
    content: Alors Shimeï se prépara à partir, sella son âne, et s’en alla à Gath chez Akish pour y rechercher ses esclaves, puis il revint de Gath avec eux.
  '41':
  - type: text
    content: 'On rapporta à Salomon que Shimeï était allé de Jérusalem à Gath et qu’il était revenu. '
  '42':
  - type: text
    content: 'Le roi convoqua Shimeï et lui dit : Est-ce que je ne t’ai pas fait jurer au nom de l’Eternel de ne pas sortir de la ville ? Et ne t’ai-je pas averti en te disant : « Sache bien que le jour où tu sortiras de la ville pour aller où que ce soit, tu mourras ? » Tu m’avais bien dit : « Bien, c’est entendu. » '
  '43':
  - type: text
    content: 'Alors, pourquoi n’as-tu pas respecté le serment fait devant l’Eternel et as-tu désobéi à l’ordre que je t’avais donné ? '
  '44':
  - type: text
    content: 'Le roi ajouta : Tu sais bien toi-même tout le mal que tu as fait sciemment à mon père David. L’Eternel te fera porter le châtiment de ta méchanceté. '
  '45':
  - type: text
    content: Mais le roi Salomon sera béni et le trône de David sera affermi pour toujours devant l’Eternel
  - type: note
    content: Voir 2 S 7.13-16.
  - type: text
    content: .
  '46':
  - type: text
    content: Le roi donna ses ordres à Benaya, fils de Yehoyada ; celui-ci sortit et frappa Shimeï qui mourut. Ainsi la royauté fut consolidée entre les mains de Salomon.
  '5':
  - type: text
    content: Par ailleurs, tu sais tout ce que m’a fait Joab, fils de Tserouya, et ce qu’il a fait à deux chefs des armées d’Israël, à Abner, fils de Ner, et à Amasa, fils de Yéter. Il les a assassinés en pleine paix comme s’il s’agissait d’un fait de guerre, il a pris sur lui la pleine responsabilité de ce meurtre
  - type: note
    content: Voir 2 S 3.26-27 ; 20.9-10.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Tu agiras envers lui avec sagesse et tu ne le laisseras pas mourir tranquillement de vieillesse. '
  '7':
  - type: text
    content: Mais n’oublie pas de traiter avec bonté les fils de Barzillaï, le Galaadite. Compte-les parmi ceux qui mangent à la table royale
  - type: note
    content: Signe d’honneur particulier associé à d’autres avantages (voir 18.19 ; 2 R 25.29 ; 2 S 9.7 ; 19.29 ; Né 5.17).
  - type: text
    content: ', car ils m’ont secouru avec bonté lorsque je fuyais devant ton frère Absalom'
  - type: note
    content: Voir 2 S 17.27-29 ; 19.32-33.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Tu as aussi dans ton entourage
  - type: note
    content: Le domicile de Shimeï n’était qu’à 8 kilomètres de Jérusalem (2 S 16.5).
  - type: text
    content: ' Shimeï, fils de Guéra, un Benjaminite du village de Bahourim. Il a prononcé contre moi de terribles malédictions le jour où j’ai dû me réfugier à Mahanaïm'
  - type: note
    content: Voir 2 S 17.24.
  - type: text
    content: . Mais lorsqu’il est venu à ma rencontre vers le Jourdain à mon retour, je lui ai juré au nom de l’Eternel que je ne le ferais pas mourir par l’épée
  - type: note
    content: Voir 2 S 16.5-13 ; 19.19-24.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Maintenant, ne le considère pas comme innocent ; tu es un homme avisé et tu sauras comment tu dois le traiter : tu veilleras à ce qu’il soit mis à mort malgré son grand âge.'
  - type: heading
    content: La mort de David
  - type: heading
    content: (1 Ch 29.26-28)
