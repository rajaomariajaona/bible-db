    children:
    - type: text
      text: '1'
  - type: text
    text: L’Eternel m’adressa la parole en ces termes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour le chapitre 35, voir '
      - type: usfm
