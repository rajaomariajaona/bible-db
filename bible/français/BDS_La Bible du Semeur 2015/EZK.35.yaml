document_id: EZK.35,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Edom et Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel m’adressa la parole en ces termes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour le chapitre 35, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 25.12-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parce que tu as dit : « Ces deux peuples, Israël et Juda, de même que leurs deux pays, seront à moi, et j’en prendrai possession bien que l’Eternel y réside », '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à cause de cela, aussi vrai que je vis, c’est là ce que déclare le Seigneur, l’Eternel : J’agirai envers toi conformément à ta colère, et à ta passion, qui t’ont fait agir contre eux avec haine : je me ferai connaître à eux quand je te jugerai. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tu sauras que moi, moi, l’Eternel, j’ai entendu tous les outrages que tu as proférés au sujet des montagnes d’Israël. Tu as dit, en effet : « Les voilà dévastées, elles me sont livrées comme une proie à dévorer. » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu as tenu contre moi des propos orgueilleux et tu as multiplié tes discours contre moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu m’as importuné par tes discours.
      marker-yv: yv-n
    - type: text
      text: '. Et je les ai bien entendus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc ce que dit le Seigneur, l’Eternel : Lorsque toute la terre sera dans l’allégresse, je te dévasterai. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque tu t’es réjoui de la dévastation du patrimoine d’Israël, je te ferai de même : tu seras dévastée, montagne de Séir, ainsi qu’Edom tout entier. Et l’on reconnaîtra que je suis l’Eternel.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils d’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dirige ton regard ╵en direction du mont Séir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Séir
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '32.29'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et prophétise contre lui,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et dis-lui : Le Seigneur, ╵l’Eternel, dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais m’en prendre à toi, ╵montagne de Séir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais étendre ma main ╵contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te transformer ╵en une terre dévastée ╵et désolée.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai tes villes en ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras dévasté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu reconnaîtras ╵que je suis l’Eternel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque tu as sans cesse nourri de la haine contre les Israélites et que tu les as livrés à l’épée au temps de leur détresse, au jour où leur péché a été puni, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à cause de cela, aussi vrai que je vis, c’est là ce que déclare le Seigneur, l’Eternel : Je te mettrai en sang, le sang te poursuivra. Puisque tu n’as pas eu horreur de répandre le sang, le sang te poursuivra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ferai du mont de Séir un désert dévasté et j’y supprimerai tout allant et venant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je remplirai ses monts de morts ; sur tes collines, dans tes vallées et dans le lit de tes torrents, tomberont les victimes qui périront par l’épée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te transformerai pour toujours en désert ; jamais plus, tes villes ne seront habitées, et tu reconnaîtras que je suis l’Eternel. '
