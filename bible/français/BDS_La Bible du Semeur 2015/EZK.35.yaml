document_id: EZK.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Edom et Israël
  - type: text
    content: L’Eternel m’adressa la parole en ces termes
  - type: note
    content: Pour le chapitre 35, voir 25.12-14.
  - type: text
    content: '  :'
  '10':
  - type: text
    content: 'Parce que tu as dit : « Ces deux peuples, Israël et Juda, de même que leurs deux pays, seront à moi, et j’en prendrai possession bien que l’Eternel y réside », '
  '11':
  - type: text
    content: 'à cause de cela, aussi vrai que je vis, c’est là ce que déclare le Seigneur, l’Eternel : J’agirai envers toi conformément à ta colère, et à ta passion, qui t’ont fait agir contre eux avec haine : je me ferai connaître à eux quand je te jugerai. '
  '12':
  - type: text
    content: 'Et tu sauras que moi, moi, l’Eternel, j’ai entendu tous les outrages que tu as proférés au sujet des montagnes d’Israël. Tu as dit, en effet : « Les voilà dévastées, elles me sont livrées comme une proie à dévorer. » '
  '13':
  - type: text
    content: Tu as tenu contre moi des propos orgueilleux et tu as multiplié tes discours contre moi
  - type: note
    content: 'Autre traduction : tu m’as importuné par tes discours.'
  - type: text
    content: '. Et je les ai bien entendus. '
  '14':
  - type: text
    content: 'Voici donc ce que dit le Seigneur, l’Eternel : Lorsque toute la terre sera dans l’allégresse, je te dévasterai. '
  '15':
  - type: text
    content: 'Puisque tu t’es réjoui de la dévastation du patrimoine d’Israël, je te ferai de même : tu seras dévastée, montagne de Séir, ainsi qu’Edom tout entier. Et l’on reconnaîtra que je suis l’Eternel.'
  '2':
  - type: text
    content: Fils d’homme,
  - type: text
    content: dirige ton regard ╵en direction du mont Séir
  - type: note
    content: 'Séir: voir 32.29 et note.'
  - type: text
    content: et prophétise contre lui,
  '3':
  - type: text
    content: 'et dis-lui : Le Seigneur, ╵l’Eternel, dit ceci :'
  - type: text
    content: Je vais m’en prendre à toi, ╵montagne de Séir,
  - type: text
    content: je vais étendre ma main ╵contre toi,
  - type: text
    content: te transformer ╵en une terre dévastée ╵et désolée.
  '4':
  - type: text
    content: Je mettrai tes villes en ruine,
  - type: text
    content: tu seras dévasté
  - type: text
    content: et tu reconnaîtras ╵que je suis l’Eternel.
  '5':
  - type: text
    content: 'Puisque tu as sans cesse nourri de la haine contre les Israélites et que tu les as livrés à l’épée au temps de leur détresse, au jour où leur péché a été puni, '
  '6':
  - type: text
    content: 'à cause de cela, aussi vrai que je vis, c’est là ce que déclare le Seigneur, l’Eternel : Je te mettrai en sang, le sang te poursuivra. Puisque tu n’as pas eu horreur de répandre le sang, le sang te poursuivra. '
  '7':
  - type: text
    content: 'Je ferai du mont de Séir un désert dévasté et j’y supprimerai tout allant et venant. '
  '8':
  - type: text
    content: 'Je remplirai ses monts de morts ; sur tes collines, dans tes vallées et dans le lit de tes torrents, tomberont les victimes qui périront par l’épée. '
  '9':
  - type: text
    content: 'Je te transformerai pour toujours en désert ; jamais plus, tes villes ne seront habitées, et tu reconnaîtras que je suis l’Eternel. '
