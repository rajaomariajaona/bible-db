document_id: GAL.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Christ nous a rendus libres pour que nous connaissions la vraie liberté. C’est pourquoi tenez bon et ne vous mettez pas à nouveau sous le joug de l’esclavage.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La Loi ou la grâce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Moi, Paul, je vous le déclare : si vous vous faites circoncire, Christ ne vous sera plus d’aucune utilité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je l’affirme une fois encore : tout homme qui se fait circoncire est tenu d’accomplir la Loi tout entière. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous qui cherchez à être déclarés justes par Dieu en accomplissant la Loi, vous êtes séparés de Christ : vous n’êtes plus sous le régime de la grâce.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quant à nous, notre espérance, c’est d’être déclarés justes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce n’est que lors du jugement dernier que le croyant sera officiellement et publiquement acquitté, déclaré juste (comparer Rm 8.22-24 ; 1 Co 4.3-5 ; 2 Tm 4.8).
    marker-yv: yv-n
  - type: text
    text: ' devant Dieu au moyen de la foi. Telle est la ferme attente que l’Esprit fait naître en nous. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car pour ceux qui sont unis à Jésus-Christ, ce qui importe, ce n’est pas d’être circoncis ou incirconcis, c’est d’avoir la foi, une foi qui agit par amour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous couriez si bien ! Qui vous a détournés de l’obéissance à la vérité ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Une telle influence ne vient en tout cas pas de celui qui vous a appelés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Il suffit d’un peu de levain pour faire lever toute la pâte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Proverbe cité aussi en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5.6
        metadata:
          usfm: 1CO.5.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  » ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pour moi, voici l’assurance que j’ai à votre sujet à cause du Seigneur : vous ne penserez pas autrement que moi. Mais celui qui jette le trouble parmi vous, quel qu’il soit, recevra son châtiment. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En ce qui me concerne, frères et sœurs, si je prêchais encore la nécessité de se faire circoncire, pourquoi continuerait-on encore à me persécuter ? Car alors, le message de la mort de Christ en croix n’aurait plus rien qui puisse susciter l’opposition. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ah ! Qu’ils se mutilent donc complètement, ceux qui sèment le désordre parmi vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion possible à la castration, rite pratiqué dans la Galatie en liaison avec le culte de la déesse Cybèle.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Esprit et l’homme livré à lui-même
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Oui, mes frères et sœurs, vous avez été appelés à la liberté. Seulement, ne faites pas de cette liberté un prétexte pour vivre comme des hommes livrés à eux-mêmes. Au contraire, par amour, mettez-vous au service les uns des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car la Loi se trouve accomplie tout entière par l’obéissance à cette seule parole : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras ton prochain comme toi-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais si vous vous blessez les uns les autres et si vous vous entre-déchirez, prenez garde ! vous vous détruirez mutuellement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je vous dis donc ceci : menez votre vie dans la dépendance du Saint-Esprit, et vous n’obéirez pas aux désirs qui animent l’homme livré à lui-même. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car ses désirs sont diamétralement opposés à ceux de l’Esprit ; et l’Esprit a des désirs qui s’opposent à ceux de l’homme livré à lui-même. Les deux sont opposés l’un à l’autre, c’est pourquoi vous ne pouvez pas être votre propre maître
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il vous est impossible de faire ce que vous voudriez.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais si vous êtes conduits par l’Esprit, vous n’êtes plus sous le régime de la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tout le monde voit bien ce qui procède de l’homme livré à lui-même : l’immoralité, les pratiques dégradantes et la débauche, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'l’adoration des idoles et la magie, les haines, les querelles, la jalousie, les accès de colère, les rivalités, les dissensions, les divisions, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'l’envie, l’ivrognerie, les orgies et autres choses de ce genre. Je ne puis que répéter ce que j’ai déjà déclaré à ce sujet : ceux qui commettent de telles actions n’auront aucune part à l’héritage du royaume de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais le fruit de l’Esprit c’est l’amour, la joie, la paix, la patience, l’amabilité, la bonté, la fidélité, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: la douceur, la maîtrise de soi. La Loi ne condamne certes pas de telles choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Or, ceux qui appartiennent à Jésus-Christ ont crucifié l’homme livré à lui-même avec ses passions et ses désirs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puisque l’Esprit est la source de notre vie, conduisons-nous selon sa volonté. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ne soyons pas vaniteux et évitons de nous provoquer les uns les autres et de nous jalouser mutuellement.
