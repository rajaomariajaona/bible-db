document_id: GAL.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: Christ nous a rendus libres pour que nous connaissions la vraie liberté. C’est pourquoi tenez bon et ne vous mettez pas à nouveau sous le joug de l’esclavage.
  - type: heading
    content: La Loi ou la grâce
  '10':
  - type: text
    content: 'Pour moi, voici l’assurance que j’ai à votre sujet à cause du Seigneur : vous ne penserez pas autrement que moi. Mais celui qui jette le trouble parmi vous, quel qu’il soit, recevra son châtiment. '
  '11':
  - type: text
    content: 'En ce qui me concerne, frères et sœurs, si je prêchais encore la nécessité de se faire circoncire, pourquoi continuerait-on encore à me persécuter ? Car alors, le message de la mort de Christ en croix n’aurait plus rien qui puisse susciter l’opposition. '
  '12':
  - type: text
    content: Ah ! Qu’ils se mutilent donc complètement, ceux qui sèment le désordre parmi vous
  - type: note
    content: Allusion possible à la castration, rite pratiqué dans la Galatie en liaison avec le culte de la déesse Cybèle.
  - type: text
    content: '  !'
  - type: heading
    content: L’Esprit et l’homme livré à lui-même
  '13':
  - type: text
    content: 'Oui, mes frères et sœurs, vous avez été appelés à la liberté. Seulement, ne faites pas de cette liberté un prétexte pour vivre comme des hommes livrés à eux-mêmes. Au contraire, par amour, mettez-vous au service les uns des autres. '
  '14':
  - type: text
    content: 'Car la Loi se trouve accomplie tout entière par l’obéissance à cette seule parole : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: note
    content: Lv 19.18.
  - type: text
    content: .
  - type: text
    content: ' '
  '15':
  - type: text
    content: Mais si vous vous blessez les uns les autres et si vous vous entre-déchirez, prenez garde ! vous vous détruirez mutuellement.
  '16':
  - type: text
    content: 'Je vous dis donc ceci : menez votre vie dans la dépendance du Saint-Esprit, et vous n’obéirez pas aux désirs qui animent l’homme livré à lui-même. '
  '17':
  - type: text
    content: Car ses désirs sont diamétralement opposés à ceux de l’Esprit ; et l’Esprit a des désirs qui s’opposent à ceux de l’homme livré à lui-même. Les deux sont opposés l’un à l’autre, c’est pourquoi vous ne pouvez pas être votre propre maître
  - type: note
    content: 'Autre traduction : il vous est impossible de faire ce que vous voudriez.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Mais si vous êtes conduits par l’Esprit, vous n’êtes plus sous le régime de la Loi.
  '19':
  - type: text
    content: 'Tout le monde voit bien ce qui procède de l’homme livré à lui-même : l’immoralité, les pratiques dégradantes et la débauche, '
  '2':
  - type: text
    content: 'Moi, Paul, je vous le déclare : si vous vous faites circoncire, Christ ne vous sera plus d’aucune utilité. '
  '20':
  - type: text
    content: 'l’adoration des idoles et la magie, les haines, les querelles, la jalousie, les accès de colère, les rivalités, les dissensions, les divisions, '
  '21':
  - type: text
    content: 'l’envie, l’ivrognerie, les orgies et autres choses de ce genre. Je ne puis que répéter ce que j’ai déjà déclaré à ce sujet : ceux qui commettent de telles actions n’auront aucune part à l’héritage du royaume de Dieu.'
  '22':
  - type: text
    content: 'Mais le fruit de l’Esprit c’est l’amour, la joie, la paix, la patience, l’amabilité, la bonté, la fidélité, '
  '23':
  - type: text
    content: la douceur, la maîtrise de soi. La Loi ne condamne certes pas de telles choses.
  '24':
  - type: text
    content: Or, ceux qui appartiennent à Jésus-Christ ont crucifié l’homme livré à lui-même avec ses passions et ses désirs.
  '25':
  - type: text
    content: 'Puisque l’Esprit est la source de notre vie, conduisons-nous selon sa volonté. '
  '26':
  - type: text
    content: Ne soyons pas vaniteux et évitons de nous provoquer les uns les autres et de nous jalouser mutuellement.
  '3':
  - type: text
    content: 'Et je l’affirme une fois encore : tout homme qui se fait circoncire est tenu d’accomplir la Loi tout entière. '
  '4':
  - type: text
    content: 'Vous qui cherchez à être déclarés justes par Dieu en accomplissant la Loi, vous êtes séparés de Christ : vous n’êtes plus sous le régime de la grâce.'
  '5':
  - type: text
    content: Quant à nous, notre espérance, c’est d’être déclarés justes
  - type: note
    content: Ce n’est que lors du jugement dernier que le croyant sera officiellement et publiquement acquitté, déclaré juste (comparer Rm 8.22-24 ; 1 Co 4.3-5 ; 2 Tm 4.8).
  - type: text
    content: ' devant Dieu au moyen de la foi. Telle est la ferme attente que l’Esprit fait naître en nous. '
  '6':
  - type: text
    content: Car pour ceux qui sont unis à Jésus-Christ, ce qui importe, ce n’est pas d’être circoncis ou incirconcis, c’est d’avoir la foi, une foi qui agit par amour.
  '7':
  - type: text
    content: Vous couriez si bien ! Qui vous a détournés de l’obéissance à la vérité ?
  '8':
  - type: text
    content: 'Une telle influence ne vient en tout cas pas de celui qui vous a appelés. '
  '9':
  - type: text
    content: « Il suffit d’un peu de levain pour faire lever toute la pâte
  - type: note
    content: Proverbe cité aussi en 1 Co 5.6.
  - type: text
    content: '  » ? '
