document_id: PSA.74,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lamentation sur le sanctuaire détruit
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' d’Asaph'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '50.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi, ô Dieu, ╵nous délaisser sans cesse ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi t’irrites-tu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre nous, le troupeau ╵dont tu es le berger ?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand, ô Dieu, ╵l’agresseur blasphémera-t-il ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ennemi pourra-t-il ╵t’insulter sans relâche ?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi te retiens-tu d’intervenir ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne reste donc pas inactif : ╵viens les exterminer !'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, Dieu est mon Roi ╵depuis les temps anciens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est l’auteur d’actes de délivrance ╵au milieu du pays !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as fendu la mer ╵par ta puissance !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as brisé les crânes ╵des monstres sur les eaux !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui as fracassé les têtes ╵du grand dragon marin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Léviathan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: monstre mythologique à sept têtes (dans les poèmes d’Ougarit), voir 106.26 ; Jb 3.8 ; 7.12 ; Es 27.1.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui l’as donné en pâture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux animaux sauvages du désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux hyènes.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui as fait jaillir des sources ╵et des eaux en torrent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 17.6 ; Nb 20.11.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui as desséché le lit ╵des fleuves permanents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 14.29 ; Jos 2.10.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toi le jour, à toi la nuit !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui as mis en place ╵la lune et le soleil.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as fixé ╵les bornes de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fait l’été et l’hiver !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi donc, ô Eternel, ╵que l’ennemi t’a insulté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’un peuple d’insensés ╵t’a outragé !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne livre pas aux bêtes fauves ╵ta tourterelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Terme de tendresse désignant Israël.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’oublie pas indéfiniment ╵le sort des affligés ╵qui t’appartiennent !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi de ton peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que tu t’es acquis autrefois : ╵cette tribu que tu as délivrée ╵pour en faire ton patrimoine.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi du mont de Sion ╵où tu as fixé ton séjour !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais considère ton alliance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’alliance conclue avec Israël sur le mont Sinaï était assortie d’une promesse de sécurité et de bénédiction dans son pays (Ex 19.5-6 ; 23.27-31 ; 34.10-11 ; Lv 26.11-12, 42, 44-45 ; Dt 28.1-14  ; voir Ps 105.8-11 ; 106.45 ; 111.5, 9 ; Es 54.10 ; Jr 14.21 ; Ez 16.60).
      marker-yv: yv-n
    - type: text
      text: ', ╵car la mesure est comble !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lieux retirés du pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont des repaires de violence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hébreu peu clair. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car ils sont pleins, les lieux sombres du pays, repaires de violence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car partout les lieux…
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne laisse pas les opprimés ╵repartir dans la honte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le pauvre et le malheureux ╵aient lieu de te louer !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Debout, ô Dieu ! défends ta cause !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi des insultes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, tout au long du jour, ╵les insensés t’adressent.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’oublie pas les clameurs ╵de tous tes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni le tumulte que tes ennemis ╵font monter constamment.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Viens visiter ces lieux ╵qui sont toujours en ruine :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’ennemi a tout saccagé ╵au sanctuaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la destruction du Temple par les Babyloniens (2 Ch 36.18-19 ; Dn 9.17).
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes adversaires ont rugi ╵au lieu où l’on te rencontrait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils y ont dressé leurs étendards ╵en signe de victoire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été pareils à ceux qui lèvent la cognée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour abattre les arbres d’un bosquet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les ouvrages taillés dans le bois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: portes.
      marker-yv: yv-n
    - type: text
      text: ', ╵ils les ont mis en pièces,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à coups de haches et de masses.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont mis le feu à ton sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont rasé et profané ╵le lieu où tu demeures.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils pensaient en eux-mêmes : ╵« Nous les détruirons tous ensemble ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont brûlé dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les endroits ╵où l’on rendait un culte à Dieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ne voyons plus de signes miraculeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y a plus de prophètes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne parmi nous ne sait ╵combien de temps encore ╵tout cela durera.
