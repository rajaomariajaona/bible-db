document_id: PSA.74,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Lamentation sur le sanctuaire détruit
  - type: text
    content: Méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' d’Asaph'
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  - type: text
    content: Pourquoi, ô Dieu, ╵nous délaisser sans cesse ?
  - type: text
    content: Pourquoi t’irrites-tu
  - type: text
    content: contre nous, le troupeau ╵dont tu es le berger ?
  '10':
  - type: text
    content: Jusques à quand, ô Dieu, ╵l’agresseur blasphémera-t-il ?
  - type: text
    content: L’ennemi pourra-t-il ╵t’insulter sans relâche ?
  '11':
  - type: text
    content: Pourquoi te retiens-tu d’intervenir ?
  - type: text
    content: 'Ne reste donc pas inactif : ╵viens les exterminer !'
  '12':
  - type: text
    content: Pourtant, Dieu est mon Roi ╵depuis les temps anciens,
  - type: text
    content: il est l’auteur d’actes de délivrance ╵au milieu du pays !
  '13':
  - type: text
    content: C’est toi qui as fendu la mer ╵par ta puissance !
  - type: text
    content: C’est toi qui as brisé les crânes ╵des monstres sur les eaux !
  '14':
  - type: text
    content: Toi qui as fracassé les têtes ╵du grand dragon marin
  - type: note
    content: Du Léviathan, monstre mythologique à sept têtes (dans les poèmes d’Ougarit), voir 106.26 ; Jb 3.8 ; 7.12 ; Es 27.1.
  - type: text
    content: ','
  - type: text
    content: et qui l’as donné en pâture
  - type: text
    content: aux animaux sauvages du désert
  - type: note
    content: 'Autre traduction : aux hyènes.'
  - type: text
    content: '  !'
  '15':
  - type: text
    content: Toi qui as fait jaillir des sources ╵et des eaux en torrent
  - type: note
    content: Voir Ex 17.6 ; Nb 20.11.
  - type: text
    content: '  !'
  - type: text
    content: Toi qui as desséché le lit ╵des fleuves permanents
  - type: note
    content: Voir Ex 14.29 ; Jos 2.10.
  - type: text
    content: '  !'
  '16':
  - type: text
    content: A toi le jour, à toi la nuit !
  - type: text
    content: Toi qui as mis en place ╵la lune et le soleil.
  '17':
  - type: text
    content: C’est toi qui as fixé ╵les bornes de la terre,
  - type: text
    content: tu as fait l’été et l’hiver !
  '18':
  - type: text
    content: Souviens-toi donc, ô Eternel, ╵que l’ennemi t’a insulté,
  - type: text
    content: qu’un peuple d’insensés ╵t’a outragé !
  '19':
  - type: text
    content: Ne livre pas aux bêtes fauves ╵ta tourterelle
  - type: note
    content: Terme de tendresse désignant Israël.
  - type: text
    content: ','
  - type: text
    content: n’oublie pas indéfiniment ╵le sort des affligés ╵qui t’appartiennent !
  '2':
  - type: text
    content: Souviens-toi de ton peuple
  - type: text
    content: 'que tu t’es acquis autrefois : ╵cette tribu que tu as délivrée ╵pour en faire ton patrimoine.'
  - type: text
    content: Souviens-toi du mont de Sion ╵où tu as fixé ton séjour !
  '20':
  - type: text
    content: Mais considère ton alliance
  - type: note
    content: L’alliance conclue avec Israël sur le mont Sinaï était assortie d’une promesse de sécurité et de bénédiction dans son pays (Ex 19.5-6 ; 23.27-31 ; 34.10-11 ; Lv 26.11-12, 42, 44-45 ; Dt 28.1-14  ; voir Ps 105.8-11 ; 106.45 ; 111.5, 9 ; Es 54.10 ; Jr 14.21 ; Ez 16.60).
  - type: text
    content: ', ╵car la mesure est comble !'
  - type: text
    content: Les lieux retirés du pays
  - type: text
    content: sont des repaires de violence
  - type: note
    content: 'Hébreu peu clair. Autres traductions : car ils sont pleins, les lieux sombres du pays, repaires de violence ou car partout les lieux…'
  - type: text
    content: .
  '21':
  - type: text
    content: Ne laisse pas les opprimés ╵repartir dans la honte !
  - type: text
    content: Que le pauvre et le malheureux ╵aient lieu de te louer !
  '22':
  - type: text
    content: Debout, ô Dieu ! défends ta cause !
  - type: text
    content: Souviens-toi des insultes
  - type: text
    content: que, tout au long du jour, ╵les insensés t’adressent.
  '23':
  - type: text
    content: N’oublie pas les clameurs ╵de tous tes adversaires,
  - type: text
    content: ni le tumulte que tes ennemis ╵font monter constamment.
  '3':
  - type: text
    content: 'Viens visiter ces lieux ╵qui sont toujours en ruine :'
  - type: text
    content: l’ennemi a tout saccagé ╵au sanctuaire
  - type: note
    content: Allusion à la destruction du Temple par les Babyloniens (2 Ch 36.18-19 ; Dn 9.17).
  - type: text
    content: .
  '4':
  - type: text
    content: Tes adversaires ont rugi ╵au lieu où l’on te rencontrait,
  - type: text
    content: et ils y ont dressé leurs étendards ╵en signe de victoire.
  '5':
  - type: text
    content: Ils ont été pareils à ceux qui lèvent la cognée
  - type: text
    content: pour abattre les arbres d’un bosquet.
  '6':
  - type: text
    content: Tous les ouvrages taillés dans le bois
  - type: note
    content: 'Autre traduction : portes.'
  - type: text
    content: ', ╵ils les ont mis en pièces,'
  - type: text
    content: à coups de haches et de masses.
  '7':
  - type: text
    content: Ils ont mis le feu à ton sanctuaire,
  - type: text
    content: ils ont rasé et profané ╵le lieu où tu demeures.
  '8':
  - type: text
    content: 'Ils pensaient en eux-mêmes : ╵« Nous les détruirons tous ensemble ! »'
  - type: text
    content: Ils ont brûlé dans le pays
  - type: text
    content: tous les endroits ╵où l’on rendait un culte à Dieu.
  '9':
  - type: text
    content: Nous ne voyons plus de signes miraculeux.
  - type: text
    content: Et il n’y a plus de prophètes.
  - type: text
    content: Personne parmi nous ne sait ╵combien de temps encore ╵tout cela durera.
