document_id: EXO.8,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'L’Eternel dit encore à Moïse : Ordonne à Aaron d’étendre la main avec son bâton vers les fleuves, les canaux et les étangs, pour faire venir les grenouilles sur l’Egypte.'
  '10':
  - type: text
    content: 'On en fit des tas en quantité considérable et le pays en fut empesté. '
  '11':
  - type: text
    content: Mais lorsque le pharaon vit que les choses s’arrangeaient, il s’entêta et n’écouta pas Moïse et Aaron, comme l’Eternel l’avait dit.
  - type: heading
    content: 'Troisième fléau : les moustiques'
  '12':
  - type: text
    content: 'L’Eternel dit à Moïse : Ordonne à Aaron d’étendre son bâton et d’en frapper la poussière du sol pour qu’elle se change en moustiques'
  - type: note
    content: 'Autres traductions : poux, vermine.'
  - type: text
    content: ' dans toute l’Egypte.'
  '13':
  - type: text
    content: 'Et ils obéirent : Aaron étendit la main et frappa de son bâton la poussière du sol, et la poussière de tout le pays se transforma en moustiques qui se répandirent sur les hommes et le bétail. '
  '14':
  - type: text
    content: 'Les magiciens essayèrent d’accomplir le même miracle par leurs sortilèges et de produire des moustiques, mais ils n’y parvinrent pas. Et les hommes et le bétail restaient couverts de moustiques. '
  '15':
  - type: text
    content: 'Alors les magiciens dirent au pharaon : C’est le doigt de Dieu'
  - type: note
    content: C’est-à-dire le signe de l’intervention d’un dieu plus puissant que nous. Peut-être les magiciens désignaient-ils aussi le bâton d’Aaron par cette expression-là.
  - type: text
    content: '  !'
  - type: text
    content: Pourtant, le pharaon s’obstina et il n’écouta pas Moïse et Aaron, comme l’Eternel l’avait dit.
  - type: heading
    content: 'Quatrième fléau : les mouches venimeuses'
  '16':
  - type: text
    content: 'L’Eternel dit à Moïse : Va de bon matin te placer sur le passage du pharaon, lorsqu’il sortira pour aller au bord de l’eau et dis-lui : « Voici ce que l’Eternel t’ordonne : Laisse aller mon peuple, pour qu’il me rende un culte. '
  '17':
  - type: text
    content: 'Si tu refuses, je vais lâcher les mouches venimeuses contre toi, contre tes hauts fonctionnaires, contre tes sujets, et elles envahiront tes maisons, celles des Egyptiens en seront remplies et le sol en sera couvert. '
  '18':
  - type: text
    content: Mais, en ce jour-là, j’épargnerai la région de Goshen
  - type: note
    content: A l’est du delta du Nil.
  - type: text
    content: ' où demeure mon peuple : les mouches ne l’infesteront pas afin que tu saches que moi, l’Eternel, je suis présent dans ce pays. '
  '19':
  - type: text
    content: Ainsi je ferai une distinction entre mon peuple et le tien en épargnant le mien. C’est demain que ce signe miraculeux aura lieu. »
  '2':
  - type: text
    content: 'Aaron étendit la main vers les cours d’eau d’Egypte, et les grenouilles en sortirent et envahirent le pays. '
  '20':
  - type: text
    content: 'L’Eternel fit comme il l’avait annoncé. Un formidable essaim de mouches venimeuses pénétra dans le palais du pharaon, dans la demeure de ses hauts fonctionnaires, et toute l’Egypte fut ravagée par les mouches. '
  '21':
  - type: text
    content: 'Le pharaon convoqua Moïse et Aaron et leur dit : Allez faire des sacrifices à votre Dieu, dans le pays.'
  '22':
  - type: text
    content: 'Moïse répliqua : Il n’est pas convenable d’agir ainsi car nos sacrifices à l’Eternel notre Dieu seraient considérés comme abominables par les Egyptiens. Si nous les offrons sous leurs yeux, ils nous lapideront'
  - type: note
    content: Parce que les Egyptiens vénéraient certains de ces animaux comme des dieux (le taureau, le bœuf et la vache).
  - type: text
    content: '. '
  '23':
  - type: text
    content: Nous irons à trois jours de marche dans le désert et nous offrirons des sacrifices à l’Eternel notre Dieu, comme il nous l’a ordonné.
  '24':
  - type: text
    content: 'Le pharaon reprit : Eh bien ! Je vous laisse aller offrir des sacrifices à l’Eternel votre Dieu dans le désert ; seulement, ne vous éloignez surtout pas trop. Et priez pour moi !'
  '25':
  - type: text
    content: 'Moïse répondit : Dès que je serai sorti de chez toi, je prierai l’Eternel, et demain, le pharaon, ses hauts fonctionnaires et ses sujets seront débarrassés des insectes malfaisants. Seulement, que le pharaon ne recommence pas à nous tromper en refusant de laisser notre peuple aller offrir des sacrifices à l’Eternel.'
  '26':
  - type: text
    content: 'Moïse sortit de chez le pharaon et pria l’Eternel. '
  '27':
  - type: text
    content: 'Et l’Eternel exauça Moïse : les mouches venimeuses laissèrent le pharaon, ses hauts fonctionnaires et ses sujets ; il n’en resta pas une seule. '
  '28':
  - type: text
    content: Mais cette fois-ci encore, le pharaon s’entêta et ne laissa pas partir le peuple.
  '3':
  - type: text
    content: 'Mais les magiciens en firent autant par leurs sortilèges : ils firent aussi venir les grenouilles sur l’Egypte.'
  '4':
  - type: text
    content: 'Le pharaon convoqua Moïse et Aaron et leur dit : Priez l’Eternel pour qu’il nous débarrasse des grenouilles, moi et mon peuple ; alors je laisserai aller votre peuple pour qu’il lui offre des sacrifices.'
  '5':
  - type: text
    content: 'Moïse répondit au pharaon : Fixe toi-même le moment où je dois prier en ta faveur, en faveur de tes hauts fonctionnaires et de tes sujets, pour que l’Eternel te débarrasse des grenouilles, les fasse disparaître de tes maisons, et il n’en restera plus que dans le Nil.'
  '6':
  - type: text
    content: 'Le pharaon répondit : Que ce soit pour demain.'
  - type: text
    content: 'Moïse dit : Il sera fait comme tu le demandes, pour que tu saches que l’Eternel notre Dieu n’a pas d’égal. '
  '7':
  - type: text
    content: Les grenouilles te laisseront ainsi que tes hauts fonctionnaires et tes sujets, et elles quitteront tes maisons ; il n’en restera que dans le Nil.
  '8':
  - type: text
    content: 'Moïse et Aaron quittèrent le pharaon, et Moïse pria l’Eternel de faire partir les grenouilles qu’il avait envoyées contre le pharaon. '
  '9':
  - type: text
    content: 'L’Eternel fit ce que Moïse lui demandait : les grenouilles périrent dans les maisons, dans les cours et dans les champs. '
