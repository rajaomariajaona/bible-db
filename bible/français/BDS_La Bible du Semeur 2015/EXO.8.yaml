document_id: EXO.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit encore à Moïse : Ordonne à Aaron d’étendre la main avec son bâton vers les fleuves, les canaux et les étangs, pour faire venir les grenouilles sur l’Egypte.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On en fit des tas en quantité considérable et le pays en fut empesté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lorsque le pharaon vit que les choses s’arrangeaient, il s’entêta et n’écouta pas Moïse et Aaron, comme l’Eternel l’avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Troisième fléau : les moustiques'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Moïse : Ordonne à Aaron d’étendre son bâton et d’en frapper la poussière du sol pour qu’elle se change en moustiques'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: poux, vermine.
      marker-yv: yv-n
    - type: text
      text: ' dans toute l’Egypte.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils obéirent : Aaron étendit la main et frappa de son bâton la poussière du sol, et la poussière de tout le pays se transforma en moustiques qui se répandirent sur les hommes et le bétail. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les magiciens essayèrent d’accomplir le même miracle par leurs sortilèges et de produire des moustiques, mais ils n’y parvinrent pas. Et les hommes et le bétail restaient couverts de moustiques. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les magiciens dirent au pharaon : C’est le doigt de Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le signe de l’intervention d’un dieu plus puissant que nous. Peut-être les magiciens désignaient-ils aussi le bâton d’Aaron par cette expression-là.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pourtant, le pharaon s’obstina et il n’écouta pas Moïse et Aaron, comme l’Eternel l’avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Quatrième fléau : les mouches venimeuses'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Moïse : Va de bon matin te placer sur le passage du pharaon, lorsqu’il sortira pour aller au bord de l’eau et dis-lui : « Voici ce que l’Eternel t’ordonne : Laisse aller mon peuple, pour qu’il me rende un culte. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu refuses, je vais lâcher les mouches venimeuses contre toi, contre tes hauts fonctionnaires, contre tes sujets, et elles envahiront tes maisons, celles des Egyptiens en seront remplies et le sol en sera couvert. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, en ce jour-là, j’épargnerai la région de Goshen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A l’est du delta du Nil.
      marker-yv: yv-n
    - type: text
      text: ' où demeure mon peuple : les mouches ne l’infesteront pas afin que tu saches que moi, l’Eternel, je suis présent dans ce pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi je ferai une distinction entre mon peuple et le tien en épargnant le mien. C’est demain que ce signe miraculeux aura lieu. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron étendit la main vers les cours d’eau d’Egypte, et les grenouilles en sortirent et envahirent le pays. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel fit comme il l’avait annoncé. Un formidable essaim de mouches venimeuses pénétra dans le palais du pharaon, dans la demeure de ses hauts fonctionnaires, et toute l’Egypte fut ravagée par les mouches. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon convoqua Moïse et Aaron et leur dit : Allez faire des sacrifices à votre Dieu, dans le pays.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répliqua : Il n’est pas convenable d’agir ainsi car nos sacrifices à l’Eternel notre Dieu seraient considérés comme abominables par les Egyptiens. Si nous les offrons sous leurs yeux, ils nous lapideront'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Parce que les Egyptiens vénéraient certains de ces animaux comme des dieux (le taureau, le bœuf et la vache).
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous irons à trois jours de marche dans le désert et nous offrirons des sacrifices à l’Eternel notre Dieu, comme il nous l’a ordonné.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon reprit : Eh bien ! Je vous laisse aller offrir des sacrifices à l’Eternel votre Dieu dans le désert ; seulement, ne vous éloignez surtout pas trop. Et priez pour moi !'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répondit : Dès que je serai sorti de chez toi, je prierai l’Eternel, et demain, le pharaon, ses hauts fonctionnaires et ses sujets seront débarrassés des insectes malfaisants. Seulement, que le pharaon ne recommence pas à nous tromper en refusant de laisser notre peuple aller offrir des sacrifices à l’Eternel.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse sortit de chez le pharaon et pria l’Eternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel exauça Moïse : les mouches venimeuses laissèrent le pharaon, ses hauts fonctionnaires et ses sujets ; il n’en resta pas une seule. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais cette fois-ci encore, le pharaon s’entêta et ne laissa pas partir le peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les magiciens en firent autant par leurs sortilèges : ils firent aussi venir les grenouilles sur l’Egypte.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon convoqua Moïse et Aaron et leur dit : Priez l’Eternel pour qu’il nous débarrasse des grenouilles, moi et mon peuple ; alors je laisserai aller votre peuple pour qu’il lui offre des sacrifices.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse répondit au pharaon : Fixe toi-même le moment où je dois prier en ta faveur, en faveur de tes hauts fonctionnaires et de tes sujets, pour que l’Eternel te débarrasse des grenouilles, les fasse disparaître de tes maisons, et il n’en restera plus que dans le Nil.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pharaon répondit : Que ce soit pour demain.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit : Il sera fait comme tu le demandes, pour que tu saches que l’Eternel notre Dieu n’a pas d’égal. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les grenouilles te laisseront ainsi que tes hauts fonctionnaires et tes sujets, et elles quitteront tes maisons ; il n’en restera que dans le Nil.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Aaron quittèrent le pharaon, et Moïse pria l’Eternel de faire partir les grenouilles qu’il avait envoyées contre le pharaon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel fit ce que Moïse lui demandait : les grenouilles périrent dans les maisons, dans les cours et dans les champs. '
