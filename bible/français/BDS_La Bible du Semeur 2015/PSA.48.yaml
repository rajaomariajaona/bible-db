document_id: PSA.48,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La cité de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique. Un psaume des Qoréites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nous méditons, ô Dieu, ╵sur ton amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de ton temple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Comme ta renommée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta louange a atteint ╵les confins de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car par ta main tu accomplis ╵de nombreux actes de justice.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Que le mont de Sion jubile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que, dans les villes de Juda, ╵on soit dans l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes jugements !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tournez tout autour de Sion ╵et longez son enceinte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comptez ses tours !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Admirez ses remparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et passez en revue ╵chacun de ses palais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour pouvoir annoncer ╵à la génération suivante
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: que ce Dieu-là est notre Dieu ╵à tout jamais, ╵et éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera notre guide ╵jusqu’à la mort.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oui, l’Eternel est grand ! ╵Il est bien digne de louanges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la cité de notre Dieu, ╵sur sa montagne sainte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Colline magnifique, ╵joie de la terre entière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mont de Sion, ╵tu es le véritable nord : ╵la demeure de Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les extrémités du Tsaphôn, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui peut se comprendre de manière géographique : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du côté du nord, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou religieuse : le Tsaphôn était une montagne sacrée où, selon la religion phénicienne, Baal résidait.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la cité du grand roi !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dieu, dans les palais de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se fait connaître ╵comme une forteresse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car voici que les rois ╵s’étaient tous réunis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ensemble, ils marchaient contre elle.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Quand ils l’ont vue, ╵pris de stupeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: épouvantés, ╵ils se sont tous enfuis !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Un tremblement ╵les a saisis sur place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareil à la douleur ╵de la femme en travail.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: On aurait dit le vent de l’est
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il vient fracasser ╵les bateaux au long cours.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ce que nous avions entendu, ╵nous l’avons vu nous-mêmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la cité de l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la cité de notre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour toujours, ╵Dieu l’établit solidement.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
