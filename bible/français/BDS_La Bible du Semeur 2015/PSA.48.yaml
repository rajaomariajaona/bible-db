document_id: PSA.48,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La cité de Dieu
  - type: text
    content: Cantique. Un psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Nous méditons, ô Dieu, ╵sur ton amour,
  - type: text
    content: au milieu de ton temple.
  '11':
  - type: text
    content: Comme ta renommée,
  - type: text
    content: ta louange a atteint ╵les confins de la terre.
  - type: text
    content: Car par ta main tu accomplis ╵de nombreux actes de justice.
  '12':
  - type: text
    content: Que le mont de Sion jubile.
  - type: text
    content: Que, dans les villes de Juda, ╵on soit dans l’allégresse,
  - type: text
    content: à cause de tes jugements !
  '13':
  - type: text
    content: Tournez tout autour de Sion ╵et longez son enceinte,
  - type: text
    content: comptez ses tours !
  '14':
  - type: text
    content: Admirez ses remparts,
  - type: text
    content: et passez en revue ╵chacun de ses palais
  - type: text
    content: pour pouvoir annoncer ╵à la génération suivante
  '15':
  - type: text
    content: que ce Dieu-là est notre Dieu ╵à tout jamais, ╵et éternellement,
  - type: text
    content: il sera notre guide ╵jusqu’à la mort.
  '2':
  - type: text
    content: Oui, l’Eternel est grand ! ╵Il est bien digne de louanges
  - type: text
    content: dans la cité de notre Dieu, ╵sur sa montagne sainte.
  '3':
  - type: text
    content: Colline magnifique, ╵joie de la terre entière,
  - type: text
    content: 'mont de Sion, ╵tu es le véritable nord : ╵la demeure de Dieu'
  - type: note
    content: 'L’hébreu a : les extrémités du Tsaphôn, ce qui peut se comprendre de manière géographique : du côté du nord, ou religieuse : le Tsaphôn était une montagne sacrée où, selon la religion phénicienne, Baal résidait.'
  - type: text
    content: ','
  - type: text
    content: la cité du grand roi !
  '4':
  - type: text
    content: Dieu, dans les palais de Sion,
  - type: text
    content: se fait connaître ╵comme une forteresse.
  '5':
  - type: text
    content: Car voici que les rois ╵s’étaient tous réunis ;
  - type: text
    content: et ensemble, ils marchaient contre elle.
  '6':
  - type: text
    content: Quand ils l’ont vue, ╵pris de stupeur,
  - type: text
    content: épouvantés, ╵ils se sont tous enfuis !
  '7':
  - type: text
    content: Un tremblement ╵les a saisis sur place,
  - type: text
    content: pareil à la douleur ╵de la femme en travail.
  '8':
  - type: text
    content: On aurait dit le vent de l’est
  - type: text
    content: quand il vient fracasser ╵les bateaux au long cours.
  '9':
  - type: text
    content: Ce que nous avions entendu, ╵nous l’avons vu nous-mêmes
  - type: text
    content: dans la cité de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: dans la cité de notre Dieu.
  - type: text
    content: Et pour toujours, ╵Dieu l’établit solidement.
  - type: text
    content: Pause
