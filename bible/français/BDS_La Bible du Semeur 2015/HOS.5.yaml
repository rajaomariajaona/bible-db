document_id: HOS.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La faute des responsables
  - type: text
    content: Ecoutez ceci, prêtres,
  - type: text
    content: et soyez attentifs, ╵gens d’Israël !
  - type: text
    content: Ecoutez, vous aussi, ╵gens de la cour du roi !
  - type: text
    content: Car il vous incombait ╵de rendre la justice
  - type: note
    content: 'Car il vous… justice: voir Mi 3.1. Autre traduction : c’est sur vous que tombe la sentence.'
  - type: text
    content: ','
  - type: text
    content: mais vous avez été ╵à Mitspa comme un piège,
  - type: text
    content: sur le Thabor ╵comme un filet tendu
  - type: note
    content: 'Mitspa: soit Mitspa en Galaad, à l’est du Jourdain (Gn 31.43-49), soit Mitspa à 13 kilomètres au nord de Jérusalem, important lieu de culte de la déesse de la fécondité, Astarté, à l’époque d’Osée (1 S 7.5-6). Thabor: montagne dominant la vallée de Jizréel, haut lieu de la religion cananéenne.'
  - type: text
    content: .
  '10':
  - type: text
    content: Les princes de Juda ╵sont devenus pareils
  - type: text
    content: à ceux qui déplacent les bornes
  - type: note
    content: Voir Dt 19.14 ; 27.17.
  - type: text
    content: .
  - type: text
    content: Aussi, comme un torrent,
  - type: text
    content: je répandrai sur eux ╵les flots de ma colère.
  '11':
  - type: text
    content: Ephraïm sera écrasé
  - type: text
    content: et brisé par le jugement,
  - type: text
    content: car il veut se conduire ╵d’après ses propres règles
  - type: note
    content: 'L’ancienne version grecque porte : il a persisté à courir après le néant des idoles.'
  - type: text
    content: .
  '12':
  - type: text
    content: C’est pourquoi je serai, ╵pour Ephraïm, comme la teigne,
  - type: text
    content: et pour Juda ╵comme la vermoulure.
  '13':
  - type: text
    content: Quand Ephraïm a vu son mal
  - type: text
    content: et Juda son ulcère,
  - type: text
    content: Ephraïm est allé ╵chercher de l’aide en Assyrie
  - type: text
    content: et il a envoyé ╵un message au roi batailleur
  - type: note
    content: 'roi batailleur. Autre traduction : roi Yareb. Certains modifient le texte hébreu traditionnel et lisent : le grand roi, mais il n’est pas sûr que l’expression puisse prendre ce sens. Des tablettes assyriennes parlent des tributs payés à Tiglath-Piléser III par les rois d’Israël Menahem et Osée (voir 2 R 15.19-20 ; 17.3).'
  - type: text
    content: .
  - type: text
    content: Mais le roi assyrien ╵ne pourra vous guérir
  - type: text
    content: ni soigner votre ulcère.
  '14':
  - type: text
    content: Car moi, je serai comme un lion
  - type: text
    content: pour les Ephraïmites
  - type: text
    content: et comme un jeune lion ╵pour les gens de Juda.
  - type: text
    content: Moi, oui, moi, je déchirerai ╵et puis je m’en irai,
  - type: text
    content: j’emporterai ma proie ╵et nul ne les délivrera.
  '15':
  - type: text
    content: Alors je m’en irai, ╵je rentrerai chez moi
  - type: text
    content: jusqu’à ce qu’ils se reconnaissent ╵coupables
  - type: text
    content: et cherchent ma faveur.
  - type: text
    content: Alors, dans leur détresse, ╵ils vont avoir recours à moi.
  '2':
  - type: text
    content: A Shittim, vous avez creusé ╵une fosse profonde
  - type: note
    content: 'Shittim: peut-être une allusion à l’épisode de Baal-Peor (voir 9.10 ; Nb 25). A Shittim… profonde. Autres traductions : des infidèles sont enfoncés dans leurs pratiques meurtrières ou des infidèles ont creusé une fosse profonde.'
  - type: text
    content: ','
  - type: text
    content: mais je vais préparer ╵une correction pour eux tous.
  - type: heading
    content: Le châtiment est inéluctable
  '3':
  - type: text
    content: Je te connais bien, Ephraïm,
  - type: text
    content: Israël ne m’est pas caché.
  - type: text
    content: Or, Ephraïm,
  - type: text
    content: tu t’es prostitué,
  - type: text
    content: et Israël en est souillé.
  '4':
  - type: text
    content: Leurs actes les empêchent ╵de revenir à moi, leur Dieu,
  - type: text
    content: car un vent de prostitution ╵souffle chez eux,
  - type: text
    content: et ils ne connaissent pas l’Eternel.
  '5':
  - type: text
    content: Mais l’orgueil d’Israël ╵témoigne contre lui,
  - type: text
    content: or, Israël et Ephraïm ╵tomberont par leur faute,
  - type: text
    content: même Juda ╵va tomber avec eux.
  '6':
  - type: text
    content: Avec leurs moutons et leurs bœufs, ╵ils viennent chercher l’Eternel,
  - type: text
    content: 'mais ils ne le trouveront pas :'
  - type: text
    content: il est parti loin d’eux.
  '7':
  - type: text
    content: Car ils ont trahi l’Eternel,
  - type: text
    content: ils ont enfanté des bâtards
  - type: note
    content: Bâtards, car demandés et attribués à Baal et aux rites de fertilité accomplis dans les temples païens (voir 1.2).
  - type: text
    content: .
  - type: text
    content: Le jour de la nouvelle lune ╵va maintenant les consumer, ╵eux et leur patrimoine.
  - type: heading
    content: 'Le châtiment : la guerre fratricide'
  '8':
  - type: text
    content: Sonnez du cor à Guibéa,
  - type: text
    content: et de la trompette à Rama !
  - type: text
    content: Donnez l’alarme à Beth-Aven
  - type: note
    content: Voir 4.15 et note ; 10.5, 8.
  - type: text
    content: '  !'
  - type: text
    content: Benjamin, gare à tes arrières
  - type: note
    content: 'Selon certains, la guerre de Juda contre Israël et la Syrie (2 R 16.5-9 ; Es 7.1-9) constituerait l’arrière-plan de cette prophétie (vers 734 av. J.-C.). Guibéa: à 3 kilomètres au nord de Jérusalem. Rama: au nord de Guibéa.'
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Ephraïm sera dévasté ╵au jour du châtiment.
  - type: text
    content: J’en fais l’annonce ╵aux tribus d’Israël, ╵et cela est certain.
