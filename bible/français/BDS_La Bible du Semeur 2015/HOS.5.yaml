document_id: HOS.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La faute des responsables
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ecoutez ceci, prêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et soyez attentifs, ╵gens d’Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, vous aussi, ╵gens de la cour du roi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il vous incombait ╵de rendre la justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Car il vous… justice
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 3.1
        - type: text
          text: '. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c’est sur vous que tombe la sentence.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous avez été ╵à Mitspa comme un piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le Thabor ╵comme un filet tendu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitspa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: soit Mitspa en Galaad, à l’est du Jourdain (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 31.43-49
        - type: text
          text: ), soit Mitspa à 13 kilomètres au nord de Jérusalem, important lieu de culte de la déesse de la fécondité, Astarté, à l’époque d’Osée (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 7.5-6
        - type: text
          text: '). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Thabor
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: montagne dominant la vallée de Jizréel, haut lieu de la religion cananéenne.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes de Juda ╵sont devenus pareils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ceux qui déplacent les bornes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 19.14 ; 27.17.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi, comme un torrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je répandrai sur eux ╵les flots de ma colère.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm sera écrasé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et brisé par le jugement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il veut se conduire ╵d’après ses propres règles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a persisté à courir après le néant des idoles.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je serai, ╵pour Ephraïm, comme la teigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour Juda ╵comme la vermoulure.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand Ephraïm a vu son mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Juda son ulcère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est allé ╵chercher de l’aide en Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a envoyé ╵un message au roi batailleur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi batailleur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'roi Yareb. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains modifient le texte hébreu traditionnel et lisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le grand roi, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mais il n’est pas sûr que l’expression puisse prendre ce sens. Des tablettes assyriennes parlent des tributs payés à Tiglath-Piléser III par les rois d’Israël Menahem et Osée (voir 2 R 15.19-20 ; 17.3).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le roi assyrien ╵ne pourra vous guérir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni soigner votre ulcère.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car moi, je serai comme un lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les Ephraïmites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme un jeune lion ╵pour les gens de Juda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, oui, moi, je déchirerai ╵et puis je m’en irai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’emporterai ma proie ╵et nul ne les délivrera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je m’en irai, ╵je rentrerai chez moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce qu’ils se reconnaissent ╵coupables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cherchent ma faveur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, dans leur détresse, ╵ils vont avoir recours à moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Shittim, vous avez creusé ╵une fosse profonde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shittim
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut-être une allusion à l’épisode de Baal-Peor (voir 9.10 ; Nb 25). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'A Shittim… profonde. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des infidèles sont enfoncés dans leurs pratiques meurtrières '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des infidèles ont creusé une fosse profonde.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je vais préparer ╵une correction pour eux tous.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le châtiment est inéluctable
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te connais bien, Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël ne m’est pas caché.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t’es prostitué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël en est souillé.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs actes les empêchent ╵de revenir à moi, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car un vent de prostitution ╵souffle chez eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne connaissent pas l’Eternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’orgueil d’Israël ╵témoigne contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or, Israël et Ephraïm ╵tomberont par leur faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même Juda ╵va tomber avec eux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec leurs moutons et leurs bœufs, ╵ils viennent chercher l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais ils ne le trouveront pas :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est parti loin d’eux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ont trahi l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont enfanté des bâtards
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bâtards, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'car demandés et attribués à Baal et aux rites de fertilité accomplis dans les temples païens (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour de la nouvelle lune ╵va maintenant les consumer, ╵eux et leur patrimoine.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Le châtiment : la guerre fratricide'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez du cor à Guibéa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la trompette à Rama !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnez l’alarme à Beth-Aven
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.15'
        - type: text
          text: ' et note ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.5'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Benjamin, gare à tes arrières
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon certains, la guerre de Juda contre Israël et la Syrie (2 R 16.5-9 ; Es 7.1-9) constituerait l’arrière-plan de cette prophétie (vers 734 av. J.-C.). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guibéa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à 3 kilomètres au nord de Jérusalem. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rama
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au nord de Guibéa.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm sera dévasté ╵au jour du châtiment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’en fais l’annonce ╵aux tribus d’Israël, ╵et cela est certain.
