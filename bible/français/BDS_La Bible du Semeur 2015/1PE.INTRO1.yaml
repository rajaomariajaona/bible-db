document_id: 1PE.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur de cette lettre se nomme au premier verset « Pierre, apôtre de Jésus-Christ » et précise au chapitre 5 (v. 1) qu’il fut « témoin des souffrances de Christ » : il s’agit donc de Simon, fils de Jonas, originaire de Bethsaïda en Galilée, que Jésus appela à le suivre.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Avec Jacques et Jean, il fit partie de son cercle d’intimes. Ce fut lui qui, le premier, le reconnut comme Messie, et qui, pourtant, le renia par trois fois. Mais il reconnut sa faute et Jésus lui pardonna. Pierre joua alors un rôle éminent au début de l’Eglise chrétienne, à la Pentecôte (Ac 2) et jusqu’à la conférence de Jérusalem (Ac 15). Jésus avait prédit qu’il mourrait martyr (Jn 21.18).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pierre nous dit que c’est par Silvain (Silas) qu’il a écrit cette lettre (5.12). Celle-ci se présente comme une circulaire écrite de « Babylone », c’est-à-dire, sans doute, de Rome, à des chrétiens de fraîche date (2.2), membres d’Eglises de différentes provinces d’Asie Mineure (la Turquie actuelle). Les nombreuses citations de l’Ancien Testament, les allusions à des faits et des rites de l’ancienne alliance, l’exemple de Sara, les histoires de Noé et d’Abraham pourraient faire penser que ces Eglises étaient composées de chrétiens d’origine juive. Mais quelques expressions du texte laissent entendre que beaucoup de destinataires étaient d’origine non juive, en particulier la formule : « Vous qui autrefois n’étiez pas son peuple » (2.10).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le but de la lettre ressort clairement du contenu ; l’apôtre veut encourager les chrétiens à tenir ferme devant l’épreuve et la persécution imminente. Des enseignements sur le sens de la souffrance (1.3-9 et 3.18 à 5.10) encadrent un développement sur la bonne conduite que doit adopter le croyant au milieu d’un monde qui lui est hostile.
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’espérance du salut ultime, accompli par Jésus-Christ (1.3-25), et la certitude que Dieu est souverain sur toute autorité (2.13-17) doivent aider l’esclave à obéir à son maître, même s’il est injuste (2.18-25), la femme à vivre avec son mari, même s’il est incroyant (3.1-6), les chrétiens à aimer leur prochain, même s’il fait le mal (3.8-17).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans cette perspective, l’exemple de Christ est central : « Injurié, il ne ripostait pas par l’injure. Quand on le faisait souffrir, il ne formulait aucune menace, mais remettait sa cause entre les mains du juste juge » (2.23).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette lettre garde toute son actualité pour l’Eglise d’aujourd’hui : dans le monde sans Dieu où elle vit, se pose la question de son rapport avec la société qui l’entoure et du témoignage qu’elle rend par ses œuvres et ses paroles : « Si l’on vous demande de justifier votre espérance, soyez toujours prêts à la défendre, avec humilité et respect » (3.15-16).'
