document_id: ISA.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël rétabli
  - type: text
    content: Mais l’Eternel
  - type: text
    content: aura compassion de Jacob
  - type: text
    content: et, de nouveau, ╵il fixera son choix sur Israël.
  - type: text
    content: Il rétablira ses enfants ╵dans leur propre pays,
  - type: text
    content: et des étrangers se joindront ╵au peuple de Jacob,
  - type: text
    content: ils s’uniront à lui.
  '10':
  - type: text
    content: 'Eux tous, ils s’adressent à toi ╵en te disant :'
  - type: text
    content: « Toi aussi, tu es maintenant ╵sans forces comme nous,
  - type: text
    content: te voilà donc semblable à nous ! »
  '11':
  - type: text
    content: Ton orgueil est précipité ╵dans le séjour des morts
  - type: text
    content: ainsi que le son de tes luths.
  - type: text
    content: Les vers sont maintenant ta couche,
  - type: text
    content: la vermine ta couverture.
  '12':
  - type: text
    content: Comment es-tu tombé du ciel,
  - type: text
    content: astre brillant, fils de l’aurore ?
  - type: text
    content: Toi qui terrassais d’autres peuples,
  - type: text
    content: comment est-il possible ╵que tu aies été abattu à terre ?
  '13':
  - type: text
    content: 'Tu disais en ton cœur : ╵« Je monterai au ciel,'
  - type: text
    content: j’élèverai mon trône ╵bien au-dessus des étoiles divines.
  - type: text
    content: Je siégerai en roi sur la montagne ╵de l’assemblée des dieux,
  - type: text
    content: aux confins du septentrion
  - type: note
    content: Voir Ps 48.3. Pour les v. 13-15, voir Mt 11.23 ; Lc 10.15.
  - type: text
    content: .
  '14':
  - type: text
    content: Je monterai au sommet des nuages,
  - type: text
    content: je serai semblable au Très-Haut. »
  '15':
  - type: text
    content: Mais te voilà précipité ╵dans le séjour des morts,
  - type: text
    content: dans les profondeurs de l’abîme !
  '16':
  - type: text
    content: Ceux qui te voient ╵arrêtent leurs regards sur toi,
  - type: text
    content: 'ils se demandent :'
  - type: text
    content: « Est-ce bien là cet homme ╵qui ébranlait la terre
  - type: text
    content: et qui terrifiait les royaumes,
  '17':
  - type: text
    content: qui changeait le monde en désert,
  - type: text
    content: qui détruisait les villes
  - type: text
    content: et qui ne relâchait jamais ╵ses prisonniers ? »
  '18':
  - type: text
    content: Tous les rois des nations, ╵oui, tous, sans exception,
  - type: text
    content: ont cet honneur de reposer ╵chacun dans son caveau.
  '19':
  - type: text
    content: Mais toi, loin de ta tombe, ╵tu as été jeté
  - type: text
    content: comme un avorton
  - type: note
    content: 'avorton: d’après plusieurs versions anciennes.'
  - type: text
    content: ' qu’on méprise,'
  - type: text
    content: au milieu des victimes ╵transpercées par l’épée,
  - type: text
    content: qu’on a précipitées ╵dans la fosse de pierres,
  - type: text
    content: dont on piétine le cadavre.
  '2':
  - type: text
    content: Des peuples viendront les chercher ╵et les reconduiront chez eux.
  - type: text
    content: Le peuple d’Israël prendra ces gens ╵pour serviteurs et pour servantes,
  - type: text
    content: dans le pays de l’Eternel.
  - type: text
    content: Ils retiendront captifs ╵ceux qui les auront capturés
  - type: text
    content: et ils domineront ╵ceux qui les auront opprimés.
  '20':
  - type: text
    content: Tu ne seras jamais ╵réuni avec elles ╵dans le tombeau,
  - type: text
    content: car tu as ruiné ton pays,
  - type: text
    content: et tu as fait périr ton peuple.
  - type: text
    content: La race criminelle ╵sera oubliée à jamais.
  '21':
  - type: text
    content: Préparez le massacre de ses fils
  - type: text
    content: pour tous les crimes de leurs pères,
  - type: text
    content: pour qu’ils ne puissent pas ╵se relever un jour ╵pour conquérir le monde
  - type: text
    content: et couvrir de leurs villes
  - type: note
    content: 'Autre traduction : et couvrir d’hostilité.'
  - type: text
    content: ' ╵la face de la terre.'
  '22':
  - type: text
    content: Je combattrai contre eux,
  - type: text
    content: déclare l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: et je rayerai de la terre ╵le nom de Babylone, ╵oui je supprimerai ╵ce qui restera d’elle,
  - type: text
    content: sa lignée et sa descendance.
  - type: text
    content: L’Eternel le déclare.
  '23':
  - type: text
    content: Ses ruines deviendront ╵un nid de hérissons, ╵un vaste marécage.
  - type: text
    content: Et je la balaierai ╵comme avec un balai ╵qui détruit tout.
  - type: text
    content: L’Eternel le déclare, ╵le Seigneur des armées célestes.
  - type: heading
    content: Contre l’Assyrie
  '24':
  - type: text
    content: 'Le Seigneur des armées célestes ╵a juré par serment :'
  - type: text
    content: « Ce que j’ai décidé ╵s’accomplira,
  - type: text
    content: 'ce que j’ai projeté ╵se réalisera :'
  '25':
  - type: text
    content: oui, je briserai l’Assyrie ╵dans mon pays,
  - type: text
    content: je la piétinerai ╵sur mes montagnes.
  - type: text
    content: J’écarterai de vous ╵le joug qu’elle imposait,
  - type: text
    content: j’ôterai son fardeau ╵de dessus votre épaule. »
  '26':
  - type: text
    content: Telle est la décision ╵que l’Eternel a prise ╵contre la terre entière,
  - type: text
    content: et telle est la menace ╵qu’il adresse à toute nation.
  '27':
  - type: text
    content: Le Seigneur des armées célestes ╵a pris sa décision ; ╵qui pourrait le faire échouer ?
  - type: text
    content: Il a levé sa main ; ╵qui la détournerait ?
  - type: heading
    content: Contre la Philistie
  '28':
  - type: text
    content: Oracle prononcé lors de l’année de la mort du roi Ahaz
  - type: note
    content: Vers 715 av. J.-C. Voir 2 R 16.20 ; 2 Ch 28.27.
  - type: text
    content: '  :'
  '29':
  - type: text
    content: Ne te réjouis pas tant, ╵Philistie tout entière,
  - type: text
    content: de ce que le bâton ╵qui te frappait le dos ╵a été mis en pièces,
  - type: text
    content: car de la souche du serpent ╵naîtra un basilic
  - type: text
    content: dont la progéniture ╵sera un serpent venimeux volant
  - type: note
    content: Sur ces serpents, voir 6.2 et note.
  - type: text
    content: .
  '3':
  - type: text
    content: Au jour où l’Eternel ╵t’aura accordé du repos
  - type: text
    content: après ta peine et ton tourment,
  - type: text
    content: et après le dur esclavage ╵auquel on t’aura asservi,
  '30':
  - type: text
    content: Les plus pauvres du peuple ╵trouveront de quoi se nourrir
  - type: text
    content: et tous les miséreux ╵reposeront en sûreté.
  - type: text
    content: Mais je ferai périr ╵ton peuple par la faim,
  - type: text
    content: et ceux qui resteront de toi ╵seront exterminés.
  '31':
  - type: text
    content: Lamente-toi, ô porte,
  - type: text
    content: pousse des cris, ô ville !
  - type: text
    content: Toute la Philistie s’effondre,
  - type: text
    content: car du septentrion ╵arrive une fumée
  - type: text
    content: et, dans leurs bataillons, ╵aucun ne se débande.
  '32':
  - type: text
    content: Que répondrons-nous donc ╵à ceux qu’envoie cette nation ?
  - type: text
    content: Que c’est l’Eternel même ╵qui a fondé Sion ;
  - type: text
    content: les humbles de son peuple ╵y trouveront refuge.
  '4':
  - type: text
    content: tu chanteras ce chant ╵pour te moquer ╵du roi de Babylone.
  - type: text
    content: 'Oui, tu diras :'
  - type: text
    content: Comment est-ce possible ? ╵L’oppresseur n’est plus là !
  - type: text
    content: 'Finie la tyrannie :'
  '5':
  - type: text
    content: l’Eternel a brisé ╵le bâton des méchants,
  - type: text
    content: le sceptre des despotes.
  '6':
  - type: text
    content: Celui qui, dans sa rage, ╵frappait les peuples
  - type: text
    content: par des coups sans relâche
  - type: text
    content: et qui, dans sa colère, ╵opprimait les nations,
  - type: text
    content: maintenant, à son tour, ╵est poursuivi sans trêve
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : et les persécutait sans trêve.'
  - type: text
    content: .
  '7':
  - type: text
    content: Toute la terre est en repos, ╵elle est tranquille,
  - type: text
    content: et des cris d’allégresse ╵retentissent partout.
  '8':
  - type: text
    content: 'Les cyprès même ╵sont heureux de sa chute, ╵et les cèdres du Liban disent :'
  - type: text
    content: « Depuis que tu t’es effondré
  - type: text
    content: le bûcheron ne vient plus nous abattre ! »
  '9':
  - type: text
    content: Le monde du séjour des morts en bas ╵est en émoi à ton sujet
  - type: text
    content: pour t’accueillir à ta venue.
  - type: text
    content: Pour toi, on réveille les ombres
  - type: text
    content: et tous les princes de la terre.
  - type: text
    content: On a fait lever de leurs trônes ╵tous les rois des nations.
