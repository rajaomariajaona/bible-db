document_id: ISA.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël rétabli
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mais l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: aura compassion de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de nouveau, ╵il fixera son choix sur Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rétablira ses enfants ╵dans leur propre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des étrangers se joindront ╵au peuple de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s’uniront à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Des peuples viendront les chercher ╵et les reconduiront chez eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple d’Israël prendra ces gens ╵pour serviteurs et pour servantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le pays de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils retiendront captifs ╵ceux qui les auront capturés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils domineront ╵ceux qui les auront opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au jour où l’Eternel ╵t’aura accordé du repos
- type: usfm
  marker: q1
  children:
  - type: text
    text: après ta peine et ton tourment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et après le dur esclavage ╵auquel on t’aura asservi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: tu chanteras ce chant ╵pour te moquer ╵du roi de Babylone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, tu diras :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment est-ce possible ? ╵L’oppresseur n’est plus là !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Finie la tyrannie :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: l’Eternel a brisé ╵le bâton des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sceptre des despotes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Celui qui, dans sa rage, ╵frappait les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: par des coups sans relâche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui, dans sa colère, ╵opprimait les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant, à son tour, ╵est poursuivi sans trêve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les persécutait sans trêve.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toute la terre est en repos, ╵elle est tranquille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des cris d’allégresse ╵retentissent partout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les cyprès même ╵sont heureux de sa chute, ╵et les cèdres du Liban disent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Depuis que tu t’es effondré
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bûcheron ne vient plus nous abattre ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le monde du séjour des morts en bas ╵est en émoi à ton sujet
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour t’accueillir à ta venue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour toi, on réveille les ombres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les princes de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On a fait lever de leurs trônes ╵tous les rois des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eux tous, ils s’adressent à toi ╵en te disant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Toi aussi, tu es maintenant ╵sans forces comme nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: te voilà donc semblable à nous ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ton orgueil est précipité ╵dans le séjour des morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que le son de tes luths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les vers sont maintenant ta couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la vermine ta couverture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Comment es-tu tombé du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: astre brillant, fils de l’aurore ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui terrassais d’autres peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment est-il possible ╵que tu aies été abattu à terre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu disais en ton cœur : ╵« Je monterai au ciel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’élèverai mon trône ╵bien au-dessus des étoiles divines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je siégerai en roi sur la montagne ╵de l’assemblée des dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux confins du septentrion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 48.3
        metadata:
          usfm: PSA.48.3
      - type: text
        text: . Pour les v. 13-15, voir Mt 11.23 ; Lc 10.15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je monterai au sommet des nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai semblable au Très-Haut. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais te voilà précipité ╵dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les profondeurs de l’abîme !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ceux qui te voient ╵arrêtent leurs regards sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils se demandent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Est-ce bien là cet homme ╵qui ébranlait la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui terrifiait les royaumes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: qui changeait le monde en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui détruisait les villes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne relâchait jamais ╵ses prisonniers ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous les rois des nations, ╵oui, tous, sans exception,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont cet honneur de reposer ╵chacun dans son caveau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais toi, loin de ta tombe, ╵tu as été jeté
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un avorton
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avorton
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d’après plusieurs versions anciennes.
    marker-yv: yv-n
  - type: text
    text: ' qu’on méprise,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des victimes ╵transpercées par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’on a précipitées ╵dans la fosse de pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont on piétine le cadavre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu ne seras jamais ╵réuni avec elles ╵dans le tombeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as ruiné ton pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as fait périr ton peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La race criminelle ╵sera oubliée à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Préparez le massacre de ses fils
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous les crimes de leurs pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’ils ne puissent pas ╵se relever un jour ╵pour conquérir le monde
- type: usfm
  marker: q1
  children:
  - type: text
    text: et couvrir de leurs villes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et couvrir d’hostilité.
    marker-yv: yv-n
  - type: text
    text: ' ╵la face de la terre.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je combattrai contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rayerai de la terre ╵le nom de Babylone, ╵oui je supprimerai ╵ce qui restera d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa lignée et sa descendance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ses ruines deviendront ╵un nid de hérissons, ╵un vaste marécage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je la balaierai ╵comme avec un balai ╵qui détruit tout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel le déclare, ╵le Seigneur des armées célestes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre l’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le Seigneur des armées célestes ╵a juré par serment :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ce que j’ai décidé ╵s’accomplira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce que j’ai projeté ╵se réalisera :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: oui, je briserai l’Assyrie ╵dans mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je la piétinerai ╵sur mes montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’écarterai de vous ╵le joug qu’elle imposait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ôterai son fardeau ╵de dessus votre épaule. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Telle est la décision ╵que l’Eternel a prise ╵contre la terre entière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et telle est la menace ╵qu’il adresse à toute nation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le Seigneur des armées célestes ╵a pris sa décision ; ╵qui pourrait le faire échouer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a levé sa main ; ╵qui la détournerait ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre la Philistie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Oracle prononcé lors de l’année de la mort du roi Ahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers 715 av. J.-C. Voir 2 R 16.20 ; 2 Ch 28.27.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ne te réjouis pas tant, ╵Philistie tout entière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ce que le bâton ╵qui te frappait le dos ╵a été mis en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car de la souche du serpent ╵naîtra un basilic
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont la progéniture ╵sera un serpent venimeux volant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur ces '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'serpents, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.2'
        metadata:
          usfm: ISA.6.2
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les plus pauvres du peuple ╵trouveront de quoi se nourrir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les miséreux ╵reposeront en sûreté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je ferai périr ╵ton peuple par la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui resteront de toi ╵seront exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lamente-toi, ô porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pousse des cris, ô ville !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute la Philistie s’effondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car du septentrion ╵arrive une fumée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans leurs bataillons, ╵aucun ne se débande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Que répondrons-nous donc ╵à ceux qu’envoie cette nation ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que c’est l’Eternel même ╵qui a fondé Sion ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les humbles de son peuple ╵y trouveront refuge.
