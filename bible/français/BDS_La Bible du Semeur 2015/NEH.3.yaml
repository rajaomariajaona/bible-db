document_id: NEH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’organisation des travaux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eliashib, le grand-prêtre, se mit au travail avec ses collègues, les prêtres, et ils se chargèrent de la reconstruction de la porte des Brebis. Ils la consacrèrent et en posèrent les battants, puis ils continuèrent à réparer la muraille, qu’ils consacrèrent, jusqu’à la tour de Méa, puis jusqu’à la tour de Hananéel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A côté d’eux travaillaient les habitants de Jéricho. A leur suite, c’était Zakkour, fils d’Imri, qui bâtissait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les descendants de Senaa reconstruisirent la porte des Poissons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers le nord-ouest.
    marker-yv: yv-n
  - type: text
    text: '. Ils en firent la charpente et en posèrent les battants, les verrous et les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A côté d’eux, Merémoth, fils d’Urie, petit-fils d’Haqqots, travaillait ; à sa suite, c’était Meshoullam, fils de Bérékia, fils de Meshézabéel ; et plus loin, Tsadoq, fils de Baana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Venaient ensuite les habitants de Teqoa, mais leurs notables refusèrent de travailler sous les ordres des maîtres d’œuvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Yoyada, fils de Paséah, et Meshoullam, fils de Besodia, réparèrent la Vieille Porte. Ils en firent la charpente et posèrent les battants, les verrous et les barres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A côté d’eux travaillaient Melatia, le Gabaonite, Yadôn, le Méronothite, et les gens de Gabaon et de Mitspa qui relevaient de la juridiction du gouverneur de la province à l’ouest de l’Euphrate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A côté d’eux travaillait l’orfèvre Ouzziel, fils de Harhaya, et à côté de lui, Hanania le parfumeur. Ils restaurèrent Jérusalem jusqu’à l’endroit où la muraille s’élargit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A côté d’eux travaillait Rephaya, fils de Hour, chef de la moitié du district de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A côté d’eux, Yedaya, fils de Haroumaph, travaillait à la section située en face de sa maison. A sa suite venait Hattoush, fils de Hashabnia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Un second secteur de la muraille ainsi que la tour des Fours furent réparés par Malkiya, fils de Harim, et par Hashoub, fils de Pahath-Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A côté d’eux travaillait Shalloum, fils de Hallohesh, chef de l’autre moitié du district de Jérusalem, assisté de ses filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hanoun et les habitants de Zanoah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Située à une trentaine de kilomètres au sud-est de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' réparèrent la porte de la Vallée. Ils la reconstruisirent et en posèrent les battants, les verrous et les barres. De plus, ils restaurèrent la muraille sur cinq cents mètres jusqu’à la porte du Fumier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est Malkiya, fils de Rékab, chef du district de Beth-Hakkérem, qui répara la porte du Fumier. Il la rebâtit et en posa les battants, les verrous et les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Shalloun, fils de Kol-Hozé, chef du district de Mitspa, répara la porte de la Source
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.14'
        metadata:
          usfm: NEH.2.14
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: . Après l’avoir reconstruite, il la couvrit d’un toit et fixa les battants, les verrous et les barres. De plus, il releva la muraille de l’Etang de l’aqueduc, près du jardin du roi, jusqu’aux marches qui descendent de la Cité de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Au-delà, Néhémie, fils d’Azbouq, chef de la moitié du district de Beth-Tsour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A quelques kilomètres au nord d’Hébron.
    marker-yv: yv-n
  - type: text
    text: ', travaillait dans le secteur qui s’étendait jusqu’en face du cimetière de David et allait jusqu’au réservoir artificiel et jusqu’à la caserne'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne caserne des gardes du corps de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 23.8-39
        metadata:
          usfm: 2SA.23.8+2SA.23.9+2SA.23.10+2SA.23.11+2SA.23.12+2SA.23.13+2SA.23.14+2SA.23.15+2SA.23.16+2SA.23.17+2SA.23.18+2SA.23.19+2SA.23.20+2SA.23.21+2SA.23.22+2SA.23.23+2SA.23.24+2SA.23.25+2SA.23.26+2SA.23.27+2SA.23.28+2SA.23.29+2SA.23.30+2SA.23.31+2SA.23.32+2SA.23.33+2SA.23.34+2SA.23.35+2SA.23.36+2SA.23.37+2SA.23.38+2SA.23.39
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au-delà travaillaient des lévites : Rehoum, fils de Bani, puis, à côté de lui, Hashabia, chef de la moitié du district de Qeïla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Au-delà travaillait leur collègue Bavvaï, fils de Hénadad, chef de l’autre moitié du district de Qeïla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et, à sa suite, Ezer, fils de Josué, chef de Mitspa, réparait un second secteur, situé en face de la montée de l’arsenal, à l’endroit où la muraille fait saillie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Au-delà, Baruch, fils de Zabbaï, réparait avec ardeur une autre section depuis l’angle jusqu’à l’entrée de la maison d’Eliashib, le grand-prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Au-delà, Merémoth, fils d’Urie et petit-fils d’Haqqots, réparait un autre secteur, depuis l’entrée de la maison d’Eliashib jusqu’à son extrémité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au-delà travaillaient les prêtres qui habitaient les plaines environnantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Au-delà, Benjamin et Hashoub réparaient la muraille en face de leurs maisons. A côté d’eux, Azaria, fils de Maaséya et petit-fils d’Anania, travaillait à côté de sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Au-delà, Binnouï, fils de Hénadad, renforçait un autre secteur allant de la maison d’Azaria jusqu’à l’angle en saillie de la muraille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis c’était Palal, fils d’Ouzaï, qui travaillait devant la saillie et la tour supérieure qui domine le palais royal et touche à la cour de la prison, et au-delà, Pedaya, fils de Pareosh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les desservants du Temple s’étaient établis sur la colline de l’Ophel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Colline de Jérusalem (voir 11.21 ; 2 Ch 27.3). Le nom s’appliquait surtout au côté nord de la colline qui se trouvait au sud-est de la ville, celle qui constituait autrefois la Cité de David, au sud du Temple.
    marker-yv: yv-n
  - type: text
    text: ' jusqu’en face de la porte des Eaux à l’est, et de la tour en saillie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les gens de Teqoa travaillaient à la section suivante, depuis la grande tour en saillie jusqu’à la muraille de la colline de l’Ophel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A partir de la porte des Chevaux, les prêtres travaillaient chacun en face de sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Au-delà, Tsadoq, fils d’Immer, réparait devant sa maison et ensuite Shemaya, fils de Shekania, gardien de la porte de l’Orient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être l’actuelle porte Dorée.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hanania, fils de Shélémia, et Hanoun, le sixième fils de Tsalaph, réparèrent le secteur suivant, et au-delà, Meshoullam, fils de Bérékia, travaillait en face de sa demeure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Puis Malkiya, de la corporation des orfèvres, travaillait jusqu’aux maisons des desservants du Temple et des marchands, vis-à-vis de la porte de la Surveillance et jusqu’au poste de guet situé en haut de l’angle de la muraille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les orfèvres et les marchands réparèrent la muraille entre ce poste de l’angle et la porte des Brebis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le mépris de Sanballat et Tobiya
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Lorsque Sanballat apprit que nous rebâtissions la muraille, il fut très mécontent et se mit violemment en colère. Il se moqua des Juifs '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'en disant devant ses compatriotes et devant l’armée de Samarie : Qu’est-ce que ces minables Juifs veulent donc faire ? S’imagineraient-ils qu’on va les laisser agir et qu’en offrant des sacrifices à leur Dieu ils viendront maintenant à bout d’une telle entreprise ? Redonneront-ils vie à des pierres ensevelies sous des monceaux de poussière et calcinées ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tobiya, l’Ammonite, qui se tenait à ses côtés ajouta : Ils n’ont qu’à bâtir ! Si un renard s’élance contre leur muraille de pierre, il la brisera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ecoute, ô notre Dieu, comme on nous méprise ! Fais retomber sur eux l’humiliation qu’ils nous infligent et livre-les au pillage sur une terre d’exil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ne pardonne pas leur faute et n’efface pas leur péché, car ils ont offensé ceux qui rebâtissent les remparts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Cependant, nous avons continué à bâtir la muraille et, sur tout le pourtour, elle fut réparée jusqu’à mi-hauteur, car chacun avait pris ce travail à cœur.
