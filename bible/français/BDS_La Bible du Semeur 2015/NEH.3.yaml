document_id: NEH.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’organisation des travaux
  - type: text
    content: Eliashib, le grand-prêtre, se mit au travail avec ses collègues, les prêtres, et ils se chargèrent de la reconstruction de la porte des Brebis. Ils la consacrèrent et en posèrent les battants, puis ils continuèrent à réparer la muraille, qu’ils consacrèrent, jusqu’à la tour de Méa, puis jusqu’à la tour de Hananéel.
  '10':
  - type: text
    content: 'A côté d’eux, Yedaya, fils de Haroumaph, travaillait à la section située en face de sa maison. A sa suite venait Hattoush, fils de Hashabnia. '
  '11':
  - type: text
    content: Un second secteur de la muraille ainsi que la tour des Fours furent réparés par Malkiya, fils de Harim, et par Hashoub, fils de Pahath-Moab.
  '12':
  - type: text
    content: 'A côté d’eux travaillait Shalloum, fils de Hallohesh, chef de l’autre moitié du district de Jérusalem, assisté de ses filles. '
  '13':
  - type: text
    content: Hanoun et les habitants de Zanoah
  - type: note
    content: Située à une trentaine de kilomètres au sud-est de Jérusalem.
  - type: text
    content: ' réparèrent la porte de la Vallée. Ils la reconstruisirent et en posèrent les battants, les verrous et les barres. De plus, ils restaurèrent la muraille sur cinq cents mètres jusqu’à la porte du Fumier. '
  '14':
  - type: text
    content: 'C’est Malkiya, fils de Rékab, chef du district de Beth-Hakkérem, qui répara la porte du Fumier. Il la rebâtit et en posa les battants, les verrous et les barres. '
  '15':
  - type: text
    content: Shalloun, fils de Kol-Hozé, chef du district de Mitspa, répara la porte de la Source
  - type: note
    content: Voir 2.14 et note.
  - type: text
    content: . Après l’avoir reconstruite, il la couvrit d’un toit et fixa les battants, les verrous et les barres. De plus, il releva la muraille de l’Etang de l’aqueduc, près du jardin du roi, jusqu’aux marches qui descendent de la Cité de David.
  '16':
  - type: text
    content: Au-delà, Néhémie, fils d’Azbouq, chef de la moitié du district de Beth-Tsour
  - type: note
    content: A quelques kilomètres au nord d’Hébron.
  - type: text
    content: ', travaillait dans le secteur qui s’étendait jusqu’en face du cimetière de David et allait jusqu’au réservoir artificiel et jusqu’à la caserne'
  - type: note
    content: L’ancienne caserne des gardes du corps de David (2 S 23.8-39).
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Au-delà travaillaient des lévites : Rehoum, fils de Bani, puis, à côté de lui, Hashabia, chef de la moitié du district de Qeïla. '
  '18':
  - type: text
    content: 'Au-delà travaillait leur collègue Bavvaï, fils de Hénadad, chef de l’autre moitié du district de Qeïla, '
  '19':
  - type: text
    content: et, à sa suite, Ezer, fils de Josué, chef de Mitspa, réparait un second secteur, situé en face de la montée de l’arsenal, à l’endroit où la muraille fait saillie.
  '2':
  - type: text
    content: 'A côté d’eux travaillaient les habitants de Jéricho. A leur suite, c’était Zakkour, fils d’Imri, qui bâtissait. '
  '20':
  - type: text
    content: 'Au-delà, Baruch, fils de Zabbaï, réparait avec ardeur une autre section depuis l’angle jusqu’à l’entrée de la maison d’Eliashib, le grand-prêtre. '
  '21':
  - type: text
    content: 'Au-delà, Merémoth, fils d’Urie et petit-fils d’Haqqots, réparait un autre secteur, depuis l’entrée de la maison d’Eliashib jusqu’à son extrémité. '
  '22':
  - type: text
    content: 'Au-delà travaillaient les prêtres qui habitaient les plaines environnantes. '
  '23':
  - type: text
    content: 'Au-delà, Benjamin et Hashoub réparaient la muraille en face de leurs maisons. A côté d’eux, Azaria, fils de Maaséya et petit-fils d’Anania, travaillait à côté de sa maison. '
  '24':
  - type: text
    content: Au-delà, Binnouï, fils de Hénadad, renforçait un autre secteur allant de la maison d’Azaria jusqu’à l’angle en saillie de la muraille.
  '25':
  - type: text
    content: 'Puis c’était Palal, fils d’Ouzaï, qui travaillait devant la saillie et la tour supérieure qui domine le palais royal et touche à la cour de la prison, et au-delà, Pedaya, fils de Pareosh. '
  '26':
  - type: text
    content: Les desservants du Temple s’étaient établis sur la colline de l’Ophel
  - type: note
    content: Colline de Jérusalem (voir 11.21 ; 2 Ch 27.3). Le nom s’appliquait surtout au côté nord de la colline qui se trouvait au sud-est de la ville, celle qui constituait autrefois la Cité de David, au sud du Temple.
  - type: text
    content: ' jusqu’en face de la porte des Eaux à l’est, et de la tour en saillie. '
  '27':
  - type: text
    content: 'Les gens de Teqoa travaillaient à la section suivante, depuis la grande tour en saillie jusqu’à la muraille de la colline de l’Ophel. '
  '28':
  - type: text
    content: 'A partir de la porte des Chevaux, les prêtres travaillaient chacun en face de sa maison. '
  '29':
  - type: text
    content: Au-delà, Tsadoq, fils d’Immer, réparait devant sa maison et ensuite Shemaya, fils de Shekania, gardien de la porte de l’Orient
  - type: note
    content: Peut-être l’actuelle porte Dorée.
  - type: text
    content: ', '
  '3':
  - type: text
    content: Les descendants de Senaa reconstruisirent la porte des Poissons
  - type: note
    content: Vers le nord-ouest.
  - type: text
    content: '. Ils en firent la charpente et en posèrent les battants, les verrous et les barres. '
  '30':
  - type: text
    content: Hanania, fils de Shélémia, et Hanoun, le sixième fils de Tsalaph, réparèrent le secteur suivant, et au-delà, Meshoullam, fils de Bérékia, travaillait en face de sa demeure.
  '31':
  - type: text
    content: 'Puis Malkiya, de la corporation des orfèvres, travaillait jusqu’aux maisons des desservants du Temple et des marchands, vis-à-vis de la porte de la Surveillance et jusqu’au poste de guet situé en haut de l’angle de la muraille. '
  '32':
  - type: text
    content: Les orfèvres et les marchands réparèrent la muraille entre ce poste de l’angle et la porte des Brebis.
  - type: heading
    content: Le mépris de Sanballat et Tobiya
  '33':
  - type: text
    content: 'Lorsque Sanballat apprit que nous rebâtissions la muraille, il fut très mécontent et se mit violemment en colère. Il se moqua des Juifs '
  '34':
  - type: text
    content: 'en disant devant ses compatriotes et devant l’armée de Samarie : Qu’est-ce que ces minables Juifs veulent donc faire ? S’imagineraient-ils qu’on va les laisser agir et qu’en offrant des sacrifices à leur Dieu ils viendront maintenant à bout d’une telle entreprise ? Redonneront-ils vie à des pierres ensevelies sous des monceaux de poussière et calcinées ?'
  '35':
  - type: text
    content: 'Tobiya, l’Ammonite, qui se tenait à ses côtés ajouta : Ils n’ont qu’à bâtir ! Si un renard s’élance contre leur muraille de pierre, il la brisera.'
  '36':
  - type: text
    content: 'Ecoute, ô notre Dieu, comme on nous méprise ! Fais retomber sur eux l’humiliation qu’ils nous infligent et livre-les au pillage sur une terre d’exil. '
  '37':
  - type: text
    content: Ne pardonne pas leur faute et n’efface pas leur péché, car ils ont offensé ceux qui rebâtissent les remparts.
  '38':
  - type: text
    content: Cependant, nous avons continué à bâtir la muraille et, sur tout le pourtour, elle fut réparée jusqu’à mi-hauteur, car chacun avait pris ce travail à cœur.
  '4':
  - type: text
    content: 'A côté d’eux, Merémoth, fils d’Urie, petit-fils d’Haqqots, travaillait ; à sa suite, c’était Meshoullam, fils de Bérékia, fils de Meshézabéel ; et plus loin, Tsadoq, fils de Baana. '
  '5':
  - type: text
    content: 'Venaient ensuite les habitants de Teqoa, mais leurs notables refusèrent de travailler sous les ordres des maîtres d’œuvre. '
  '6':
  - type: text
    content: Yoyada, fils de Paséah, et Meshoullam, fils de Besodia, réparèrent la Vieille Porte. Ils en firent la charpente et posèrent les battants, les verrous et les barres.
  '7':
  - type: text
    content: 'A côté d’eux travaillaient Melatia, le Gabaonite, Yadôn, le Méronothite, et les gens de Gabaon et de Mitspa qui relevaient de la juridiction du gouverneur de la province à l’ouest de l’Euphrate. '
  '8':
  - type: text
    content: 'A côté d’eux travaillait l’orfèvre Ouzziel, fils de Harhaya, et à côté de lui, Hanania le parfumeur. Ils restaurèrent Jérusalem jusqu’à l’endroit où la muraille s’élargit. '
  '9':
  - type: text
    content: 'A côté d’eux travaillait Rephaya, fils de Hour, chef de la moitié du district de Jérusalem. '
