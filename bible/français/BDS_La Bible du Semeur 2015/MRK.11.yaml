document_id: MRK.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’entrée du Roi à Jérusalem
  - type: heading
    content: (Mt 21.1-11 ; Lc 19.28-40 ; Jn 12.12-19)
  - type: text
    content: Alors qu’ils approchaient de Jérusalem, à la hauteur de Bethphagé et de Béthanie
  - type: note
    content: 'Bethphagé… Béthanie: deux villages situés sur le flanc est du mont des Oliviers, une colline séparée de Jérusalem par la vallée du Cédron.'
  - type: text
    content: ', près du mont des Oliviers, Jésus envoya deux de ses disciples '
  '10':
  - type: text
    content: Béni soit le royaume qui vient,
  - type: text
    content: le royaume de David, notre père !
  - type: text
    content: Hosanna
  - type: text
    content: ' à Dieu au plus haut des cieux !'
  '11':
  - type: text
    content: Une fois entré dans Jérusalem, Jésus se rendit au Temple et y observa attentivement tout ce qui s’y passait. Ensuite, comme il se faisait déjà tard, il quitta la ville avec les Douze pour se rendre à Béthanie.
  - type: heading
    content: La malédiction du figuier
  - type: heading
    content: (Mt 21.18-19)
  '12':
  - type: text
    content: 'Le lendemain, comme il sortait de Béthanie avec eux, il eut faim. '
  '13':
  - type: text
    content: Il aperçut, de loin, un figuier couvert de feuillage. Il se dirigea vers cet arbre pour voir s’il y trouverait quelque fruit. Quand il se fut approché, il n’y trouva que des feuilles, car ce n’était pas la saison des figues
  - type: note
    content: Même en dehors de la saison des figues, les figuiers portent généralement des figues printanières qui se développent en même temps que les feuilles ; tout le monde a le droit d’en manger.
  - type: text
    content: .
  '14':
  - type: text
    content: 'S’adressant alors au figuier, il lui dit : '
  - type: text
    content: Que plus jamais personne ne mange de fruit venant de toi !
  - type: text
    content: Et ses disciples l’entendirent.
  - type: heading
    content: Jésus dans le Temple
  - type: heading
    content: (Mt 21.12-17 ; Lc 19.45-48 ; voir Jn 2.13-16)
  '15':
  - type: text
    content: Ils arrivèrent à Jérusalem. Jésus entra dans la cour du Temple et se mit à en chasser les marchands qui s’étaient installés dans l’enceinte sacrée ainsi que leurs clients
  - type: note
    content: Voir note Mt 21.12. Ces changeurs et ces marchands étaient installés dans la cour dite des non-Juifs où ceux-ci avaient accès.
  - type: text
    content: '  ; il renversa les comptoirs des changeurs d’argent ainsi que les chaises des marchands de pigeons ; '
  '16':
  - type: text
    content: il ne laissa personne transporter des marchandises dans l’enceinte du Temple.
  '17':
  - type: text
    content: 'Puis, s’adressant à tous, il les enseigna en disant : '
  - type: text
    content: 'N’est-il pas écrit : '
  - type: text
    content: On appellera ma maison une maison de prière pour tous les peuples
  - type: note
    content: Es 56.7.
  - type: text
    content: '?'
  - type: text
    content: ' Mais vous, vous en avez fait '
  - type: text
    content: une caverne de brigands
  - type: note
    content: Jr 7.11.
  - type: text
    content: '!'
  '18':
  - type: text
    content: Les chefs des prêtres et les spécialistes de la Loi apprirent ce qui s’était passé et ils cherchèrent un moyen de le faire mourir. En effet, ils craignaient son influence, car son enseignement faisait une vive impression sur la foule.
  '19':
  - type: text
    content: Le soir venu, Jésus et ses disciples quittèrent la ville.
  - type: heading
    content: La leçon du figuier desséché
  - type: heading
    content: (Mt 21.20-22)
  '2':
  - type: text
    content: 'en leur disant : '
  - type: text
    content: Allez dans le village qui est devant vous. Dès que vous y serez entrés, vous trouverez un ânon attaché que personne n’a encore monté. Détachez-le et amenez-le ici.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Le lendemain matin, en passant par là, ils virent le figuier : il avait séché jusqu’aux racines.'
  '21':
  - type: text
    content: 'Pierre, se souvenant de ce qui s’était passé, dit à Jésus : Maître ! regarde le figuier que tu as maudit : il est devenu tout sec !'
  '22':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: Ayez foi en Dieu.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Vraiment, je vous l’assure, si quelqu’un dit à cette colline : « Soulève-toi de là et jette-toi dans la mer », sans douter dans son cœur, mais en croyant que ce qu’il dit va se réaliser, la chose s’accomplira pour lui.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est pourquoi je vous le déclare : tout ce que vous demandez dans vos prières, croyez que vous l’avez reçu et cela vous sera accordé.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: Quand vous priez, si vous avez quoi que ce soit contre quelqu’un, pardonnez-lui, pour que votre Père céleste vous pardonne, lui aussi, vos fautes.
  - type: text
    content: ' ['
  '26':
  - type: text
    content: Mais si vous ne pardonnez pas, votre Père qui est dans les cieux ne vous pardonnera pas non plus vos fautes
  - type: note
    content: Ce verset est absent de plusieurs manuscrits (voir Mt 6.15).
  - type: text
    content: .
  - type: text
    content: ']'
  - type: heading
    content: L’autorité de Jésus contestée
  - type: heading
    content: (Mt 21.23-27 ; Lc 20.1-8)
  '27':
  - type: text
    content: 'Ils retournèrent à Jérusalem. Pendant que Jésus marchait dans la cour du Temple, les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple l’abordèrent et lui demandèrent : '
  '28':
  - type: text
    content: Par quelle autorité agis-tu ainsi ? Qui t’a donné l’autorité de faire cela ?
  '29':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: 'J’ai aussi une question à vous poser, une seule. Si vous me répondez, je vous dirai de quel droit je fais cela :'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Si quelqu’un vous demande : « Pourquoi faites-vous cela ? » répondez : « Le Seigneur en a besoin, et il le renverra très bientôt'
  - type: note
    content: 'Autre traduction : et le propriétaire le laissera venir ici sur-le-champ.'
  - type: text
    content: . »
  '30':
  - type: text
    content: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ? Répondez-moi !
  '31':
  - type: text
    content: 'Alors ils se mirent à raisonner entre eux : Si nous disons : « De Dieu », il va demander : « Pourquoi alors n’avez-vous pas cru en lui ? » '
  '32':
  - type: text
    content: 'Mais, d’autre part, si nous répondons : « Des hommes », alors ? …'
  - type: text
    content: 'Ils craignaient les réactions de la foule, car tout le monde pensait que Jean était un vrai prophète. '
  '33':
  - type: text
    content: 'Ils répondirent donc à Jésus : Nous ne savons pas.'
  - type: text
    content: 'Et Jésus répliqua : '
  - type: text
    content: Alors, moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
  '4':
  - type: text
    content: Ils partirent donc, trouvèrent un ânon attaché dehors, près d’une porte dans la rue, et le détachèrent.
  '5':
  - type: text
    content: 'Quelques personnes, qui se trouvaient là, leur dirent : Holà ! Qu’est-ce qui vous prend de détacher cet ânon ?'
  '6':
  - type: text
    content: Ils répondirent comme Jésus le leur avait ordonné et on les laissa faire.
  '7':
  - type: text
    content: 'Ils amenèrent l’ânon à Jésus et posèrent leurs manteaux sur son dos, et Jésus s’assit dessus. '
  '8':
  - type: text
    content: Beaucoup de gens étendirent leurs manteaux sur le chemin ; d’autres, des branches vertes coupées dans les champs.
  '9':
  - type: text
    content: 'La foule, de la tête à la fin du cortège, criait :'
  - type: text
    content: Hosanna
  - type: text
    content: ' '
  - type: note
    content: Voir note Mt 21.11.
  - type: text
    content: '!'
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur
  - type: text
    content: ' '
  - type: note
    content: Ps 118.25-26 .
  - type: text
    content: '!'
