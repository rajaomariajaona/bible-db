document_id: MRK.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’entrée du Roi à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.1-11 ; Lc 19.28-40 ; Jn 12.12-19)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Alors qu’ils approchaient de Jérusalem, à la hauteur de Bethphagé et de Béthanie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bethphagé… Béthanie
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: deux villages situés sur le flanc est du mont des Oliviers, une colline séparée de Jérusalem par la vallée du Cédron.
      marker-yv: yv-n
    - type: text
      text: ', près du mont des Oliviers, Jésus envoya deux de ses disciples '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Béni soit le royaume qui vient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le royaume de David, notre père !
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Hosanna
    - type: text
      text: ' à Dieu au plus haut des cieux !'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Une fois entré dans Jérusalem, Jésus se rendit au Temple et y observa attentivement tout ce qui s’y passait. Ensuite, comme il se faisait déjà tard, il quitta la ville avec les Douze pour se rendre à Béthanie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La malédiction du figuier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.18-19)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le lendemain, comme il sortait de Béthanie avec eux, il eut faim. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il aperçut, de loin, un figuier couvert de feuillage. Il se dirigea vers cet arbre pour voir s’il y trouverait quelque fruit. Quand il se fut approché, il n’y trouva que des feuilles, car ce n’était pas la saison des figues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Même en dehors de la saison des figues, les figuiers portent généralement des figues printanières qui se développent en même temps que les feuilles ; tout le monde a le droit d’en manger.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'S’adressant alors au figuier, il lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que plus jamais personne ne mange de fruit venant de toi !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ses disciples l’entendirent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dans le Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.12-17 ; Lc 19.45-48 ; voir Jn 2.13-16)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ils arrivèrent à Jérusalem. Jésus entra dans la cour du Temple et se mit à en chasser les marchands qui s’étaient installés dans l’enceinte sacrée ainsi que leurs clients
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 21.12
        - type: text
          text: '. Ces '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'changeurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et ces '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'marchands '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étaient installés dans la cour dite '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des non-Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: où ceux-ci avaient accès.
      marker-yv: yv-n
    - type: text
      text: '  ; il renversa les comptoirs des changeurs d’argent ainsi que les chaises des marchands de pigeons ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: il ne laissa personne transporter des marchandises dans l’enceinte du Temple.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Puis, s’adressant à tous, il les enseigna en disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’est-il pas écrit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: On appellera ma maison une maison de prière pour tous les peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 56.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '?'
      - type: text
        text: ' Mais vous, vous en avez fait '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: une caverne de brigands
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 7.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '!'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les chefs des prêtres et les spécialistes de la Loi apprirent ce qui s’était passé et ils cherchèrent un moyen de le faire mourir. En effet, ils craignaient son influence, car son enseignement faisait une vive impression sur la foule.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Le soir venu, Jésus et ses disciples quittèrent la ville.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La leçon du figuier desséché
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.20-22)
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'en leur disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez dans le village qui est devant vous. Dès que vous y serez entrés, vous trouverez un ânon attaché que personne n’a encore monté. Détachez-le et amenez-le ici.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le lendemain matin, en passant par là, ils virent le figuier : il avait séché jusqu’aux racines.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pierre, se souvenant de ce qui s’était passé, dit à Jésus : Maître ! regarde le figuier que tu as maudit : il est devenu tout sec !'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ayez foi en Dieu.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure, si quelqu’un dit à cette colline : « Soulève-toi de là et jette-toi dans la mer », sans douter dans son cœur, mais en croyant que ce qu’il dit va se réaliser, la chose s’accomplira pour lui.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi je vous le déclare : tout ce que vous demandez dans vos prières, croyez que vous l’avez reçu et cela vous sera accordé.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand vous priez, si vous avez quoi que ce soit contre quelqu’un, pardonnez-lui, pour que votre Père céleste vous pardonne, lui aussi, vos fautes.
    - type: text
      text: ' ['
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais si vous ne pardonnez pas, votre Père qui est dans les cieux ne vous pardonnera pas non plus vos fautes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verset est absent de plusieurs manuscrits (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 6.15
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ']'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autorité de Jésus contestée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.23-27 ; Lc 20.1-8)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils retournèrent à Jérusalem. Pendant que Jésus marchait dans la cour du Temple, les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple l’abordèrent et lui demandèrent : '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Par quelle autorité agis-tu ainsi ? Qui t’a donné l’autorité de faire cela ?
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'J’ai aussi une question à vous poser, une seule. Si vous me répondez, je vous dirai de quel droit je fais cela :'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un vous demande : « Pourquoi faites-vous cela ? » répondez : « Le Seigneur en a besoin, et il le renverra très bientôt'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et le propriétaire le laissera venir ici sur-le-champ.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . »
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ? Répondez-moi !
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors ils se mirent à raisonner entre eux : Si nous disons : « De Dieu », il va demander : « Pourquoi alors n’avez-vous pas cru en lui ? » '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais, d’autre part, si nous répondons : « Des hommes », alors ? …'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils craignaient les réactions de la foule, car tout le monde pensait que Jean était un vrai prophète. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils répondirent donc à Jésus : Nous ne savons pas.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus répliqua : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Alors, moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils partirent donc, trouvèrent un ânon attaché dehors, près d’une porte dans la rue, et le détachèrent.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quelques personnes, qui se trouvaient là, leur dirent : Holà ! Qu’est-ce qui vous prend de détacher cet ânon ?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils répondirent comme Jésus le leur avait ordonné et on les laissa faire.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils amenèrent l’ânon à Jésus et posèrent leurs manteaux sur son dos, et Jésus s’assit dessus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Beaucoup de gens étendirent leurs manteaux sur le chemin ; d’autres, des branches vertes coupées dans les champs.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'La foule, de la tête à la fin du cortège, criait :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Hosanna
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 21.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Béni soit celui qui vient au nom du Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.25-26
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
