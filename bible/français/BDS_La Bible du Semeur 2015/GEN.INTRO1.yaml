type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre de la Genèse introduit l’ensemble des cinq premiers livres de la Bible qui forment ce qu’on appelle le Pentateuque ou les « Ecrits de Moïse » (2 Co 3.15). Comme son nom l’indique, la Genèse traite des origines : celles de l’univers, de l’homme et de la femme, du mal parmi les hommes, des peuples qui couvrent la surface de la terre et du peuple d’Israël. Premier livre de l’Ecriture, il fournit les trois clés qui permettent de comprendre le monde dans lequel nous vivons et l’œuvre de Dieu dans l’histoire : (1) Dieu a tout créé, (2) l’homme s’est révolté contre son Créateur et (3) le Seigneur est intervenu pour le sauver.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: C’est à partir de traditions orales et écrites, liées aux généalogies, recueillies, assumées et purifiées de leurs erreurs, que le texte a été rédigé. Ces histoires ancestrales forment l’ossature du livre qui se compose de deux grandes sections principales.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La première grande section (chap. 1 à 11) commence par une affirmation éclatante : Dieu a créé le monde et tout ce qu’il contient, et tout ce qu’il a créé est bon. L’apparition du péché est ensuite évoquée (chap. 3) et la responsabilité humaine ainsi que les conséquences de la faute sont soulignées. Les hommes s’enferment alors dans la révolte contre le Seigneur, avec le crime de Caïn et la violence de Lémek (chap. 4), l’immoralité des contemporains de Noé (6.1-8) et l’orgueil des bâtisseurs de la tour de Babel (11.1-9). Cet entêtement des hommes à faire le mal (6.5) ne pouvait qu’appeler le jugement de Dieu : le déluge (chap. 6 à 9), préfiguration du jugement à venir, ainsi que la division des langues et la dispersion des hommes à Babel (chap. 11).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pourtant, dès la révolte du premier couple, en même temps que la malédiction du pécheur est annoncée la promesse d’une délivrance à venir (3.15). L’alliance de Dieu avec Noé et ses descendants (chap. 9) rappelle que le Créateur n’a pas abandonné sa création.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Au début de la seconde grande section du livre (chap. 12 à 50), avec Abraham, qui a vécu entre 2100 et 1800 av. J.-C., la promesse commence à se réaliser. Dieu promet au patriarche de lui donner un pays et de bénir « en lui, tous les peuples de la terre » (12.3). Abraham répond à la promesse divine par la foi (15.6), montrant ainsi comment l’homme doit s’approcher de Dieu. L’alliance conclue par l’Eternel (chap. 17) inclut la « descendance » d’Abraham : Isaac, le fils de la promesse (chap. 21), puis Jacob (25.19 à 36.43), qui deviendra Israël (32.29), et Joseph et ses frères, qui se sont établis en Egypte pour fuir la famine (chap. 37 à 50). Mais cette « descendance » promise ne trouvera son parfait accomplissement qu’en Jésus-Christ (Ga 3.16) qui, par sa mort et sa résurrection, a vaincu le Serpent comme le laissait entrevoir la promesse de Genèse 3.15.'
