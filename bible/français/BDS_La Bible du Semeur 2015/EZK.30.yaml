document_id: EZK.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement de Dieu plane sur l’Egypte
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'Le Seigneur, l’Eternel, le déclare : Je ferai disparaître la population nombreuse de l’Egypte, et c’est Nabuchodonosor, le roi de Babylone, qui le fera. '
  '11':
  - type: text
    content: 'Lui et ses gens de guerre, parmi les plus violents des peuples, seront amenés là pour dévaster le pays ; ils tireront l’épée contre l’Egypte qu’ils couvriront de morts. '
  '12':
  - type: text
    content: Je changerai les fleuves
  - type: note
    content: Voir 29.3 et note.
  - type: text
    content: ' en terres desséchées et j’abandonnerai le pays aux méchants. Je le dévasterai, lui et ce qu’il contient, par la main d’étrangers. Oui, moi, l’Eternel, j’ai parlé !'
  '13':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Je ferai disparaître les idoles, je supprimerai les faux dieux de Memphis'
  - type: note
    content: Au sud du Caire.
  - type: text
    content: ' et il n’y aura plus de chef en Egypte. Dans tout le pays, je répandrai l’effroi. '
  '14':
  - type: text
    content: Oui, je dévasterai Patros, j’incendierai Tsoân, et j’exécuterai les jugements contre Thèbes
  - type: note
    content: 'Patros: la Haute-Egypte. Tsoân: une ville du delta. Thèbes: la capitale de la Haute-Egypte.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Je déverserai ma colère sur la ville de Sîn
  - type: note
    content: Ville non identifiée dans le delta du Nil, peut-être la Péluse actuelle vers l’est du delta.
  - type: text
    content: ', forteresse de l’Egypte, et j’exterminerai les nombreux habitants de Thèbes. '
  '16':
  - type: text
    content: J’incendierai l’Egypte et Sîn se tordra de douleur, on fera une brèche dans les remparts de Thèbes, et Memphis sera dans la détresse
  - type: note
    content: 'sera dans la détresse, autre traduction : devra faire face à l’ennemi.'
  - type: text
    content: ' en plein jour. '
  '17':
  - type: text
    content: Les jeunes gens d’Héliopolis et ceux de Pi-Béseth
  - type: note
    content: Deux villes de la Basse-Egypte.
  - type: text
    content: ' tomberont par l’épée, et les femmes s’en iront en exil'
  - type: note
    content: 'Autre traduction : et ces villes s’en iront en exil.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: A Daphné
  - type: note
    content: Autre ville de la Basse-Egypte, forteresse frontière à l’est du delta.
  - type: text
    content: ', le jour s’obscurcira quand je romprai les jougs imposés par l’Egypte et que disparaîtra la force dont elle est si fière. Une sombre nuée recouvrira la ville, et ses habitantes'
  - type: note
    content: 'Autre traduction : ses villages.'
  - type: text
    content: ' s’en iront en exil. '
  '19':
  - type: text
    content: J’exécuterai ainsi les jugements sur l’Egypte et l’on reconnaîtra que je suis l’Eternel. »
  - type: heading
    content: La puissance du pharaon sera brisée
  '2':
  - type: text
    content: Fils d’homme, prophétise.
  - type: text
    content: 'Tu diras : « Le Seigneur, ╵l’Eternel, dit ceci :'
  - type: text
    content: 'Poussez des hurlements, ╵criez : “Hélas ! Quel jour !”'
  '20':
  - type: text
    content: Le septième jour du premier mois de la onzième année
  - type: note
    content: C’est-à-dire en avril 587 av. J.-C.
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '21':
  - type: text
    content: 'Fils d’homme, vois, j’ai cassé le bras du pharaon, du roi d’Egypte, et il n’a pas été pansé, on ne l’a pas soigné en y posant des ligatures, on ne l’a pas bandé pour qu’il retrouve assez de forces pour manier une épée. '
  '22':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Voici, je vais m’en prendre au pharaon, au roi d’Egypte, et lui casser les bras, celui qui est valide aussi bien que celui qui est déjà rompu, et je ferai tomber l’épée de sa main, '
  '23':
  - type: text
    content: 'je disperserai les Egyptiens parmi les autres peuples et je les répandrai dans divers pays. '
  '24':
  - type: text
    content: Mais je fortifierai les bras du roi de Babylone, je mettrai dans sa main ma propre épée et je casserai les deux bras du pharaon qui gémira devant son ennemi comme gémit un homme blessé à mort.
  '25':
  - type: text
    content: 'Oui, je fortifierai les bras du roi de Babylone, mais quant aux bras du pharaon ils tomberont, et l’on reconnaîtra que je suis l’Eternel lorsque je mettrai mon épée dans la main du roi de Babylone et qu’il la brandira contre l’Egypte. '
  '26':
  - type: text
    content: Oui, je disperserai les Egyptiens parmi les autres peuples, et je les répandrai dans divers pays, et l’on reconnaîtra que je suis l’Eternel.
  '3':
  - type: text
    content: Oui, car le jour est proche,
  - type: text
    content: il approche à grands pas, ╵le jour de l’Eternel,
  - type: text
    content: et ce sera un jour ╵tout chargé de nuages, ╵un temps de jugement ╵réservé pour les peuples.
  '4':
  - type: text
    content: Car l’épée va s’abattre ╵sur le pays d’Egypte
  - type: text
    content: et l’effroi régnera ╵jusque dans l’Ethiopie
  - type: text
    content: lorsqu’au pays d’Egypte ╵tomberont les tués
  - type: text
    content: et qu’on s’emparera ╵de toutes ses richesses,
  - type: text
    content: et qu’on renversera ╵jusqu’à ses fondations.
  '5':
  - type: text
    content: L’Ethiopie, Pouth et Loud
  - type: note
    content: 'Pouth et Loud: voir Gn 10.6, 22 et notes.'
  - type: text
    content: ', ╵et toute l’Arabie'
  - type: note
    content: 'toute l’Arabie: selon une orthographe très voisine du mot hébreu et plusieurs versions anciennes. Le texte hébreu traditionnel a : tout ce mélange.'
  - type: text
    content: ' ╵ainsi que la Libye'
  - type: note
    content: 'En hébreu : Koub.'
  - type: text
    content: et les gens du pays de l’alliance,
  - type: text
    content: tomberont par l’épée ╵avec les Egyptiens.
  '6':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Les soutiens de l’Egypte ╵tomberont tous ensemble
  - type: text
    content: et sa puissance, ╵dont elle était si fière, ╵s’écroulera.
  - type: text
    content: Ils tomberont ╵sous les coups de l’épée ╵de Migdol à Assouan
  - type: note
    content: Voir 29.10 et note.
  - type: text
    content: .
  - type: text
    content: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '7':
  - type: text
    content: L’Egypte ne sera plus qu’une terre désolée ╵parmi les terres désolées,
  - type: text
    content: ses villes seront parmi les villes en ruine.
  '8':
  - type: text
    content: Et l’on reconnaîtra ╵que je suis l’Eternel
  - type: text
    content: lorsque je mettrai le feu à l’Egypte
  - type: text
    content: et que tous ses soutiens ╵auront été brisés.
  '9':
  - type: text
    content: 'En ce jour-là, des messagers que j’enverrai s’en iront en bateau pour faire trembler l’Ethiopie dans sa sécurité. Elle sera saisie d’angoisse au jour où l’Egypte sera châtiée, et ce jour est sur le point d’arriver. '
