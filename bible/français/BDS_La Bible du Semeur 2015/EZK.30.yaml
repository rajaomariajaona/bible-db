document_id: EZK.30
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le jugement de Dieu plane sur l’Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils d’homme, prophétise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu diras : « Le Seigneur, ╵l’Eternel, dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Poussez des hurlements, ╵criez : “Hélas ! Quel jour !”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, car le jour est proche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il approche à grands pas, ╵le jour de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce sera un jour ╵tout chargé de nuages, ╵un temps de jugement ╵réservé pour les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car l’épée va s’abattre ╵sur le pays d’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’effroi régnera ╵jusque dans l’Ethiopie
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’au pays d’Egypte ╵tomberont les tués
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on s’emparera ╵de toutes ses richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on renversera ╵jusqu’à ses fondations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Ethiopie, Pouth et Loud
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pouth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Loud
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.6
        metadata:
          usfm: GEN.10.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
        metadata:
          usfm: GEN.10.22
      - type: text
        text: ' et notes.'
    marker-yv: yv-n
  - type: text
    text: ', ╵et toute l’Arabie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute l’Arabie
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon une orthographe très voisine du mot hébreu et plusieurs versions anciennes. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout ce mélange.
    marker-yv: yv-n
  - type: text
    text: ' ╵ainsi que la Libye'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Koub.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les gens du pays de l’alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tomberont par l’épée ╵avec les Egyptiens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Eternel dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les soutiens de l’Egypte ╵tomberont tous ensemble
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa puissance, ╵dont elle était si fière, ╵s’écroulera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tomberont ╵sous les coups de l’épée ╵de Migdol à Assouan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.10'
        metadata:
          usfm: EZK.29.10
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là ce que déclare ╵le Seigneur, l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Egypte ne sera plus qu’une terre désolée ╵parmi les terres désolées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses villes seront parmi les villes en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et l’on reconnaîtra ╵que je suis l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque je mettrai le feu à l’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tous ses soutiens ╵auront été brisés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En ce jour-là, des messagers que j’enverrai s’en iront en bateau pour faire trembler l’Ethiopie dans sa sécurité. Elle sera saisie d’angoisse au jour où l’Egypte sera châtiée, et ce jour est sur le point d’arriver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le Seigneur, l’Eternel, le déclare : Je ferai disparaître la population nombreuse de l’Egypte, et c’est Nabuchodonosor, le roi de Babylone, qui le fera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lui et ses gens de guerre, parmi les plus violents des peuples, seront amenés là pour dévaster le pays ; ils tireront l’épée contre l’Egypte qu’ils couvriront de morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je changerai les fleuves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.3'
        metadata:
          usfm: EZK.29.3
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' en terres desséchées et j’abandonnerai le pays aux méchants. Je le dévasterai, lui et ce qu’il contient, par la main d’étrangers. Oui, moi, l’Eternel, j’ai parlé !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Je ferai disparaître les idoles, je supprimerai les faux dieux de Memphis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud du Caire.
    marker-yv: yv-n
  - type: text
    text: ' et il n’y aura plus de chef en Egypte. Dans tout le pays, je répandrai l’effroi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, je dévasterai Patros, j’incendierai Tsoân, et j’exécuterai les jugements contre Thèbes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Patros
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'la Haute-Egypte. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsoân
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'une ville du delta. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Thèbes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la capitale de la Haute-Egypte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je déverserai ma colère sur la ville de Sîn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville non identifiée dans le delta du Nil, peut-être la Péluse actuelle vers l’est du delta.
    marker-yv: yv-n
  - type: text
    text: ', forteresse de l’Egypte, et j’exterminerai les nombreux habitants de Thèbes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’incendierai l’Egypte et Sîn se tordra de douleur, on fera une brèche dans les remparts de Thèbes, et Memphis sera dans la détresse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sera dans la détresse
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devra faire face à l’ennemi.
    marker-yv: yv-n
  - type: text
    text: ' en plein jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les jeunes gens d’Héliopolis et ceux de Pi-Béseth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deux villes de la Basse-Egypte.
    marker-yv: yv-n
  - type: text
    text: ' tomberont par l’épée, et les femmes s’en iront en exil'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et ces villes s’en iront en exil.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A Daphné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Autre ville de la Basse-Egypte, forteresse frontière à l’est du delta.
    marker-yv: yv-n
  - type: text
    text: ', le jour s’obscurcira quand je romprai les jougs imposés par l’Egypte et que disparaîtra la force dont elle est si fière. Une sombre nuée recouvrira la ville, et ses habitantes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses villages.
    marker-yv: yv-n
  - type: text
    text: ' s’en iront en exil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: J’exécuterai ainsi les jugements sur l’Egypte et l’on reconnaîtra que je suis l’Eternel. »
- type: usfm
  marker: s2
  children:
  - type: text
    text: La puissance du pharaon sera brisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le septième jour du premier mois de la onzième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en avril 587 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils d’homme, vois, j’ai cassé le bras du pharaon, du roi d’Egypte, et il n’a pas été pansé, on ne l’a pas soigné en y posant des ligatures, on ne l’a pas bandé pour qu’il retrouve assez de forces pour manier une épée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Voici, je vais m’en prendre au pharaon, au roi d’Egypte, et lui casser les bras, celui qui est valide aussi bien que celui qui est déjà rompu, et je ferai tomber l’épée de sa main, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'je disperserai les Egyptiens parmi les autres peuples et je les répandrai dans divers pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais je fortifierai les bras du roi de Babylone, je mettrai dans sa main ma propre épée et je casserai les deux bras du pharaon qui gémira devant son ennemi comme gémit un homme blessé à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Oui, je fortifierai les bras du roi de Babylone, mais quant aux bras du pharaon ils tomberont, et l’on reconnaîtra que je suis l’Eternel lorsque je mettrai mon épée dans la main du roi de Babylone et qu’il la brandira contre l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Oui, je disperserai les Egyptiens parmi les autres peuples, et je les répandrai dans divers pays, et l’on reconnaîtra que je suis l’Eternel.
