document_id: JOB.27
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Nouveau discours de Job
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job maintient qu’il est innocent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prononça un nouveau discours et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Par le Dieu vivant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le plus solennel des serments (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 42.15
        metadata:
          usfm: GEN.42.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' qui refuse ╵de me rendre justice'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par le Tout-Puissant ╵qui m’a aigri le cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: aussi longtemps ╵que je respirerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tant que le souffle reçu de Dieu ╵sera dans mes narines,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: je jure que mes lèvres ╵ne diront rien de faux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que, jamais, ma langue ╵ne dira de mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Loin de moi la pensée ╵de vous donner raison !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à mon dernier souffle, ╵non, je ne renoncerai pas ╵à affirmer mon innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je maintiens fermement ╵que ma conduite est juste, ╵je ne faiblirai pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma conscience ╵ne me reproche pas ╵ce qu’a été ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oh ! que ce soit mon ennemi ╵qui soit considéré ╵comme étant le coupable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que mon adversaire ╵ait le sort des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que peut espérer l’homme impie
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il est retranché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand Dieu lui prend la vie ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dieu entend-il son cri
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la détresse fond sur lui ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Trouve-t-il du plaisir ╵auprès du Tout-Puissant ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui adressera-t-il ╵sa prière en tout temps ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je vous enseignerai ╵quelle est l’action de Dieu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne cacherai pas ╵ce qu’il en est ╵du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous tous, vous l’avez observé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors pourquoi vous perdre ╵dans des raisonnements absurdes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voici la part que Dieu ╵a réservée pour le méchant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans les v. 13-23, Job veut montrer à ses amis qu’il sait aussi bien qu’eux ce qu’enseigne la sagesse traditionnelle, mais que celle-ci s’avère trop simpliste, et, dira-t-il au chap. suivant : la sagesse divine, qui peut la connaître ?'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et le lot qu’un tyran ╵reçoit du Tout-Puissant :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: si ses fils sont nombreux, ╵le glaive les attend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses petits-enfants ╵souffriront de la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La peste engloutira ╵tous ceux qui survivront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs veuves elles-mêmes ╵ne les pleureront pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Comme il fallait enterrer immédiatement les cadavres des pestiférés, leurs veuves n’avaient pas le temps d’organiser des funérailles décentes, avec les lamentations d’usage.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: S’il amasse l’argent ╵comme de la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme de la glaise, ╵entasse des habits,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'qu’il les entasse donc : ╵le juste s’en revêtira,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les innocents auront ╵son argent en partage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La maison qu’il bâtit ╵vaut celle d’une teigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est comme la cabane ╵que se fait un guetteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il se couche avec ses richesses, ╵c’est la dernière fois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c’est la dernière fois
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'avec un léger changement de voyelles en hébreu et selon les anciennes versions grecque et syriaque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il ne sera pas recueilli, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire, peut-être, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pas enseveli.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’il ouvre les yeux, ╵il ne retrouve rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les terreurs le submergent ╵comme une inondation
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de la nuit, ╵un tourbillon l’enlève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le vent d’orient l’emporte ╵et le fait disparaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il l’arrache à son lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: On lance contre lui ╵des flèches sans pitié.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui s’efforce de fuir ╵cette main menaçante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: On applaudit sa ruine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du lieu qu’il habitait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on siffle contre lui.
