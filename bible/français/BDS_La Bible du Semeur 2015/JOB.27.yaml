document_id: JOB.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouveau discours de Job
  - type: heading
    content: Job maintient qu’il est innocent
  - type: text
    content: 'Job prononça un nouveau discours et dit :'
  '10':
  - type: text
    content: Trouve-t-il du plaisir ╵auprès du Tout-Puissant ?
  - type: text
    content: Lui adressera-t-il ╵sa prière en tout temps ?
  '11':
  - type: text
    content: Je vous enseignerai ╵quelle est l’action de Dieu ;
  - type: text
    content: je ne cacherai pas ╵ce qu’il en est ╵du Tout-Puissant.
  '12':
  - type: text
    content: Vous tous, vous l’avez observé !
  - type: text
    content: Alors pourquoi vous perdre ╵dans des raisonnements absurdes ?
  '13':
  - type: text
    content: Voici la part que Dieu ╵a réservée pour le méchant
  - type: note
    content: 'Dans les v. 13-23, Job veut montrer à ses amis qu’il sait aussi bien qu’eux ce qu’enseigne la sagesse traditionnelle, mais que celle-ci s’avère trop simpliste, et, dira-t-il au chap. suivant : la sagesse divine, qui peut la connaître ?'
  - type: text
    content: ','
  - type: text
    content: 'et le lot qu’un tyran ╵reçoit du Tout-Puissant :'
  '14':
  - type: text
    content: si ses fils sont nombreux, ╵le glaive les attend,
  - type: text
    content: et ses petits-enfants ╵souffriront de la faim.
  '15':
  - type: text
    content: La peste engloutira ╵tous ceux qui survivront,
  - type: text
    content: leurs veuves elles-mêmes ╵ne les pleureront pas
  - type: note
    content: Comme il fallait enterrer immédiatement les cadavres des pestiférés, leurs veuves n’avaient pas le temps d’organiser des funérailles décentes, avec les lamentations d’usage.
  - type: text
    content: .
  '16':
  - type: text
    content: S’il amasse l’argent ╵comme de la poussière,
  - type: text
    content: et, comme de la glaise, ╵entasse des habits,
  '17':
  - type: text
    content: 'qu’il les entasse donc : ╵le juste s’en revêtira,'
  - type: text
    content: les innocents auront ╵son argent en partage.
  '18':
  - type: text
    content: La maison qu’il bâtit ╵vaut celle d’une teigne,
  - type: text
    content: c’est comme la cabane ╵que se fait un guetteur.
  '19':
  - type: text
    content: Il se couche avec ses richesses, ╵c’est la dernière fois
  - type: note
    content: 'c’est la dernière fois: avec un léger changement de voyelles en hébreu et selon les anciennes versions grecque et syriaque. Le texte hébreu traditionnel a : il ne sera pas recueilli, c’est-à-dire, peut-être, pas enseveli.'
  - type: text
    content: .
  - type: text
    content: Lorsqu’il ouvre les yeux, ╵il ne retrouve rien.
  '2':
  - type: text
    content: Par le Dieu vivant
  - type: note
    content: Le plus solennel des serments (voir Gn 42.15).
  - type: text
    content: ' qui refuse ╵de me rendre justice'
  - type: text
    content: et par le Tout-Puissant ╵qui m’a aigri le cœur,
  '20':
  - type: text
    content: Les terreurs le submergent ╵comme une inondation
  - type: text
    content: au milieu de la nuit, ╵un tourbillon l’enlève.
  '21':
  - type: text
    content: Le vent d’orient l’emporte ╵et le fait disparaître,
  - type: text
    content: il l’arrache à son lieu.
  '22':
  - type: text
    content: On lance contre lui ╵des flèches sans pitié.
  - type: text
    content: Lui s’efforce de fuir ╵cette main menaçante.
  '23':
  - type: text
    content: On applaudit sa ruine.
  - type: text
    content: Du lieu qu’il habitait,
  - type: text
    content: on siffle contre lui.
  '3':
  - type: text
    content: aussi longtemps ╵que je respirerai,
  - type: text
    content: et tant que le souffle reçu de Dieu ╵sera dans mes narines,
  '4':
  - type: text
    content: je jure que mes lèvres ╵ne diront rien de faux
  - type: text
    content: et que, jamais, ma langue ╵ne dira de mensonge.
  '5':
  - type: text
    content: Loin de moi la pensée ╵de vous donner raison !
  - type: text
    content: Jusqu’à mon dernier souffle, ╵non, je ne renoncerai pas ╵à affirmer mon innocence.
  '6':
  - type: text
    content: Je maintiens fermement ╵que ma conduite est juste, ╵je ne faiblirai pas
  - type: text
    content: car ma conscience ╵ne me reproche pas ╵ce qu’a été ma vie.
  '7':
  - type: text
    content: Oh ! que ce soit mon ennemi ╵qui soit considéré ╵comme étant le coupable,
  - type: text
    content: et que mon adversaire ╵ait le sort des méchants.
  '8':
  - type: text
    content: Que peut espérer l’homme impie
  - type: text
    content: quand il est retranché,
  - type: text
    content: quand Dieu lui prend la vie ?
  '9':
  - type: text
    content: Dieu entend-il son cri
  - type: text
    content: quand la détresse fond sur lui ?
