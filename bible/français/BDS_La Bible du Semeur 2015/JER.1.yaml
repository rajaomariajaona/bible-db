document_id: JER.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce livre contient les paroles de Jérémie, fils de Hilqiya, l’un des prêtres, qui habitait à Anatoth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Anatoth
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ville attribuée aux prêtres et aux lévites (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 21.18
        - type: text
          text: ) dans le territoire de Benjamin, à environ 5 kilomètres au nord-est de Jérusalem. Salomon destitua le grand-prêtre Abiatar (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 2.26
        - type: text
          text: ) et le bannit à Anatoth. Depuis lors, les prêtres descendants d’Abiatar (dont Jérémie) n’eurent plus le droit d’accomplir leurs fonctions dans le Temple.
      marker-yv: yv-n
    - type: text
      text: ', dans le territoire de Benjamin.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sache que je te confie aujourd’hui une mission envers les peuples et les royaumes : celle d’arracher et de renverser, de ruiner et de détruire, de construire et de planter'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 Co 10.8 ; 13.10.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’arbre-veilleur et le chaudron
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa encore la parole en ces termes : Que vois-tu, Jérémie ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répondis : Je vois une branche d’amandier.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tu as bien vu, me dit l’Eternel. Eh bien, je veille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, le verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'veiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fait assonance avec le nom de l’amandier.
      marker-yv: yv-n
    - type: text
      text: ' sur ma parole pour accomplir ce que j’ai dit.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis l’Eternel m’adressa une seconde fois la parole : Que vois-tu encore ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je répondis : Je vois un chaudron en train de bouillir et qui se trouve au nord.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel me dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est, en effet, du nord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 6.22 ; 8.16 ; 10.22  ; etc.
      marker-yv: yv-n
    - type: text
      text: ' ╵que le malheur viendra'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se déverser ╵sur tous les habitants de ce pays.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je vais appeler ╵tous les peuples des royaumes du Nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils viendront, et chacun ╵installera son trône
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant les portes de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: face à tous ses remparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à tous ceux ╵des villes de Juda.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je rendrai mon jugement ╵contre les habitants de ce pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tout le mal qu’ils ont commis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils m’ont abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils offrent de l’encens ╵à d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se prosternent ╵devant les dieux ╵qu’ils se sont fabriqués.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi donc, tu mettras ta ceinture
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour ne pas s’embarrasser dans les plis du vêtement et se préparer à la tâche.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu te lèveras, ╵tu leur diras
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce que je t’ordonnerai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te laisse pas terrifier par eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon c’est moi qui, devant eux, ╵m’en vais te terrifier.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi dès aujourd’hui, ╵je fais de toi ╵comme une ville fortifiée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme un pilier de fer ╵et un rempart de bronze ╵face à tout le pays :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: face aux rois de Juda, ╵à ses ministres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ses prêtres et à son peuple.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te feront la guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils ne l’emporteront pas sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis avec toi, ╵l’Eternel le déclare, ╵je te délivrerai.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel lui a parlé la treizième année du règne de Josias
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Josias a régné en Juda de 640 à 609 av. J.-C. (voir 2 R 22.1 à 23.30 ; 2 Ch 34 à 35). Cette parole de l’Eternel date donc de 628​627.
      marker-yv: yv-n
    - type: text
      text: ', fils d’Amôn et roi de Juda, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et sous le règne de Yehoyaqim, fils de Josias, roi de Juda, et jusqu’à la fin de la onzième année du règne de Sédécias, fils de Josias, roi de Juda, jusqu’à la déportation des habitants de Jérusalem au cinquième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur Yehoyaqim (609 à 598 av. J.-C.) et Sédécias (597 à 587 av. J.-C.), voir 2 R 23.36 à 25.21 ; 2 Ch 36. La déportation des habitants de Jérusalem a eu lieu en 587.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel de Jérémie
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant de t’avoir formé dans le sein de ta mère, je t’ai choisi ; et avant ta naissance, je t’ai consacré : je t’ai destiné à être prophète pour les peuples.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répondis : Hélas, Seigneur Eternel, je ne sais pas m’exprimer, car je suis un adolescent.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel me répondit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne dis pas : « Je suis un adolescent » ; tu iras trouver tous ceux auprès de qui je t’enverrai, et tu leur diras tout ce que je t’ordonnerai. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’aie pas peur de ces gens, car je suis avec toi pour te délivrer, l’Eternel le déclare.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel tendit la main et me toucha la bouche, et il me dit : Tu vois : je mets mes paroles dans ta bouche. '
