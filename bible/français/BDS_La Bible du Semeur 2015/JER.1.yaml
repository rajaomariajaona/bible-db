document_id: JER.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ce livre contient les paroles de Jérémie, fils de Hilqiya, l’un des prêtres, qui habitait à Anatoth
  - type: note
    content: 'Anatoth: ville attribuée aux prêtres et aux lévites (Jos 21.18) dans le territoire de Benjamin, à environ 5 kilomètres au nord-est de Jérusalem. Salomon destitua le grand-prêtre Abiatar (1 R 2.26) et le bannit à Anatoth. Depuis lors, les prêtres descendants d’Abiatar (dont Jérémie) n’eurent plus le droit d’accomplir leurs fonctions dans le Temple.'
  - type: text
    content: ', dans le territoire de Benjamin.'
  '10':
  - type: text
    content: 'Sache que je te confie aujourd’hui une mission envers les peuples et les royaumes : celle d’arracher et de renverser, de ruiner et de détruire, de construire et de planter'
  - type: note
    content: Voir 2 Co 10.8 ; 13.10.
  - type: text
    content: .
  - type: heading
    content: L’arbre-veilleur et le chaudron
  '11':
  - type: text
    content: 'L’Eternel m’adressa encore la parole en ces termes : Que vois-tu, Jérémie ?'
  - type: text
    content: 'Je répondis : Je vois une branche d’amandier.'
  '12':
  - type: text
    content: – Tu as bien vu, me dit l’Eternel. Eh bien, je veille
  - type: note
    content: En hébreu, le verbe traduit par veiller fait assonance avec le nom de l’amandier.
  - type: text
    content: ' sur ma parole pour accomplir ce que j’ai dit.'
  '13':
  - type: text
    content: 'Puis l’Eternel m’adressa une seconde fois la parole : Que vois-tu encore ?'
  - type: text
    content: 'Et je répondis : Je vois un chaudron en train de bouillir et qui se trouve au nord.'
  '14':
  - type: text
    content: 'Et l’Eternel me dit :'
  - type: text
    content: C’est, en effet, du nord
  - type: note
    content: Voir 6.22 ; 8.16 ; 10.22  ; etc.
  - type: text
    content: ' ╵que le malheur viendra'
  - type: text
    content: se déverser ╵sur tous les habitants de ce pays.
  '15':
  - type: text
    content: Car je vais appeler ╵tous les peuples des royaumes du Nord,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Ils viendront, et chacun ╵installera son trône
  - type: text
    content: devant les portes de Jérusalem,
  - type: text
    content: face à tous ses remparts,
  - type: text
    content: et à tous ceux ╵des villes de Juda.
  '16':
  - type: text
    content: Et je rendrai mon jugement ╵contre les habitants de ce pays
  - type: text
    content: pour tout le mal qu’ils ont commis ;
  - type: text
    content: parce qu’ils m’ont abandonné,
  - type: text
    content: qu’ils offrent de l’encens ╵à d’autres dieux,
  - type: text
    content: et se prosternent ╵devant les dieux ╵qu’ils se sont fabriqués.
  '17':
  - type: text
    content: Toi donc, tu mettras ta ceinture
  - type: note
    content: Pour ne pas s’embarrasser dans les plis du vêtement et se préparer à la tâche.
  - type: text
    content: et tu te lèveras, ╵tu leur diras
  - type: text
    content: tout ce que je t’ordonnerai.
  - type: text
    content: Ne te laisse pas terrifier par eux,
  - type: text
    content: sinon c’est moi qui, devant eux, ╵m’en vais te terrifier.
  '18':
  - type: text
    content: Et moi dès aujourd’hui, ╵je fais de toi ╵comme une ville fortifiée,
  - type: text
    content: 'comme un pilier de fer ╵et un rempart de bronze ╵face à tout le pays :'
  - type: text
    content: face aux rois de Juda, ╵à ses ministres,
  - type: text
    content: à ses prêtres et à son peuple.
  '19':
  - type: text
    content: Ils te feront la guerre,
  - type: text
    content: mais ils ne l’emporteront pas sur toi,
  - type: text
    content: car je suis avec toi, ╵l’Eternel le déclare, ╵je te délivrerai.
  '2':
  - type: text
    content: L’Eternel lui a parlé la treizième année du règne de Josias
  - type: note
    content: Josias a régné en Juda de 640 à 609 av. J.-C. (voir 2 R 22.1 à 23.30 ; 2 Ch 34 à 35). Cette parole de l’Eternel date donc de 628​627.
  - type: text
    content: ', fils d’Amôn et roi de Juda, '
  '3':
  - type: text
    content: et sous le règne de Yehoyaqim, fils de Josias, roi de Juda, et jusqu’à la fin de la onzième année du règne de Sédécias, fils de Josias, roi de Juda, jusqu’à la déportation des habitants de Jérusalem au cinquième mois
  - type: note
    content: Sur Yehoyaqim (609 à 598 av. J.-C.) et Sédécias (597 à 587 av. J.-C.), voir 2 R 23.36 à 25.21 ; 2 Ch 36. La déportation des habitants de Jérusalem a eu lieu en 587.
  - type: text
    content: .
  - type: heading
    content: L’appel de Jérémie
  '4':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '5':
  - type: text
    content: 'Avant de t’avoir formé dans le sein de ta mère, je t’ai choisi ; et avant ta naissance, je t’ai consacré : je t’ai destiné à être prophète pour les peuples.'
  '6':
  - type: text
    content: 'Je répondis : Hélas, Seigneur Eternel, je ne sais pas m’exprimer, car je suis un adolescent.'
  '7':
  - type: text
    content: 'Mais l’Eternel me répondit :'
  - type: text
    content: 'Ne dis pas : « Je suis un adolescent » ; tu iras trouver tous ceux auprès de qui je t’enverrai, et tu leur diras tout ce que je t’ordonnerai. '
  '8':
  - type: text
    content: N’aie pas peur de ces gens, car je suis avec toi pour te délivrer, l’Eternel le déclare.
  '9':
  - type: text
    content: 'Alors l’Eternel tendit la main et me toucha la bouche, et il me dit : Tu vois : je mets mes paroles dans ta bouche. '
