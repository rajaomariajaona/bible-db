document_id: 2CH.21
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Josaphat rejoignit ses ancêtres décédés, et il fut enseveli auprès d’eux dans la Cité de David, et son fils Yoram lui succéda sur le trône.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Yoram, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Yoram avait plusieurs frères : Azaria, Yehiel, Zacharie, Azaria, Michaël et Shephatia, tous fils de Josaphat, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Leur père leur avait fait de nombreux cadeaux, de l’argent, de l’or et des objets précieux ; de plus, il leur avait confié le gouvernement de plusieurs villes fortifiées en Juda ; mais c’est à Yoram qu’il avait conféré la royauté parce qu’il était l’aîné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dès que Yoram fut en possession du royaume de son père et qu’il eut affermi son pouvoir, il fit assassiner tous ses frères ainsi que des dirigeants d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 8.16-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yoram avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De 848 à 841 av. J.-C. (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 8.17
        metadata:
          usfm: 2KI.8.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il suivit l’exemple des rois d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire du royaume du Nord, en particulier leur idolâtrie (voir 1 R 12.28-33 ; 16.31-32).
    marker-yv: yv-n
  - type: text
    text: ', agissant comme la dynastie d’Achab, car il avait épousé une fille d’Achab'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Athalie (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.2'
        metadata:
          usfm: 2CH.22.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Il fit ce que l’Eternel considère comme mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pourtant, l’Eternel ne voulut pas détruire la dynastie de David, à cause de l’alliance qu’il avait conclue avec David à qui il avait promis que ses descendants régneraient pour toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 17.10-14 ; 2 Ch 6.16 ; 7.18 ; 1 R 11.36.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sous le règne de Yoram, les Edomites se révoltèrent contre la domination de Juda et se donnèrent un roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 27.40
        metadata:
          usfm: GEN.27.40
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Yoram partit avec ses officiers et tous ses chars de guerre. En pleine nuit, il tomba sur les Edomites qui l’avaient déjà encerclé et il les battit, ainsi que les chefs des chars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Depuis lors, Edom fut en révolte contre Juda, et l’est toujours. A la même époque, Libna se révolta également contre la domination de Yoram parce qu’il avait abandonné l’Eternel, le Dieu de ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il construisit même des hauts lieux sur les montagnes de Juda : il incita les habitants de Jérusalem à l’idolâtrie et entraîna les Judéens au mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est alors qu’une lettre du prophète Elie lui parvint. Elle disait : Voici ce que déclare l’Eternel, le Dieu de David, ton ancêtre : « Tu n’as pas suivi l’exemple de ton père Josaphat, et celui d’Asa, roi de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au contraire, tu as imité la conduite des rois d’Israël ; tu as incité les Judéens et les habitants de Jérusalem à l’idolâtrie, suivant l’exemple d’idolâtrie de la maison d’Achab. Tu es même allé jusqu’à assassiner tes frères, membres de ta famille, qui étaient meilleurs que toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi l’Eternel frappera d’un terrible fléau ton peuple, tes fils, tes femmes et tous tes biens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quant à toi, tu seras atteint de maladies graves, et en particulier d’une maladie au ventre qui empirera de jour en jour au point de faire sortir tes intestins hors de ton ventre. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel excita contre Yoram l’hostilité des Philistins et des Arabes voisins des Ethiopiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils attaquèrent Juda, envahirent le pays, emportèrent toutes les richesses accumulées dans le palais du roi et emmenèrent ses fils et ses femmes en captivité, de sorte qu’il ne lui resta plus qu’un fils, Yoahaz, le cadet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après tout cela, l’Eternel frappa Yoram d’une maladie intestinale incurable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle empira de jour en jour, et vers la fin de la seconde année, le mal fit sortir ses intestins de son ventre, de sorte qu’il mourut dans d’atroces souffrances. Le peuple n’alluma pas de brasier en son honneur comme il l’avait fait pour ses ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 16.14
        metadata:
          usfm: 2CH.16.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Yoram avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.5'
        metadata:
          usfm: 2CH.21.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Il partit sans être regretté par personne. On l’enterra dans la Cité de David, mais pas dans les tombeaux des rois.
