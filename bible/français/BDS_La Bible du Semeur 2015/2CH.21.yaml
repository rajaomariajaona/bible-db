document_id: 2CH.21,21
type_code: fra
verses:
  '1':
  - type: text
    content: Josaphat rejoignit ses ancêtres décédés, et il fut enseveli auprès d’eux dans la Cité de David, et son fils Yoram lui succéda sur le trône.
  - type: heading
    content: Yoram, roi de Juda
  '10':
  - type: text
    content: Depuis lors, Edom fut en révolte contre Juda, et l’est toujours. A la même époque, Libna se révolta également contre la domination de Yoram parce qu’il avait abandonné l’Eternel, le Dieu de ses ancêtres.
  '11':
  - type: text
    content: 'Il construisit même des hauts lieux sur les montagnes de Juda : il incita les habitants de Jérusalem à l’idolâtrie et entraîna les Judéens au mal. '
  '12':
  - type: text
    content: 'C’est alors qu’une lettre du prophète Elie lui parvint. Elle disait : Voici ce que déclare l’Eternel, le Dieu de David, ton ancêtre : « Tu n’as pas suivi l’exemple de ton père Josaphat, et celui d’Asa, roi de Juda. '
  '13':
  - type: text
    content: 'Au contraire, tu as imité la conduite des rois d’Israël ; tu as incité les Judéens et les habitants de Jérusalem à l’idolâtrie, suivant l’exemple d’idolâtrie de la maison d’Achab. Tu es même allé jusqu’à assassiner tes frères, membres de ta famille, qui étaient meilleurs que toi. '
  '14':
  - type: text
    content: 'C’est pourquoi l’Eternel frappera d’un terrible fléau ton peuple, tes fils, tes femmes et tous tes biens. '
  '15':
  - type: text
    content: Quant à toi, tu seras atteint de maladies graves, et en particulier d’une maladie au ventre qui empirera de jour en jour au point de faire sortir tes intestins hors de ton ventre. »
  '16':
  - type: text
    content: 'L’Eternel excita contre Yoram l’hostilité des Philistins et des Arabes voisins des Ethiopiens. '
  '17':
  - type: text
    content: Ils attaquèrent Juda, envahirent le pays, emportèrent toutes les richesses accumulées dans le palais du roi et emmenèrent ses fils et ses femmes en captivité, de sorte qu’il ne lui resta plus qu’un fils, Yoahaz, le cadet.
  '18':
  - type: text
    content: 'Après tout cela, l’Eternel frappa Yoram d’une maladie intestinale incurable. '
  '19':
  - type: text
    content: Elle empira de jour en jour, et vers la fin de la seconde année, le mal fit sortir ses intestins de son ventre, de sorte qu’il mourut dans d’atroces souffrances. Le peuple n’alluma pas de brasier en son honneur comme il l’avait fait pour ses ancêtres
  - type: note
    content: Voir 2 Ch 16.14.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Yoram avait plusieurs frères : Azaria, Yehiel, Zacharie, Azaria, Michaël et Shephatia, tous fils de Josaphat, roi d’Israël. '
  '20':
  - type: text
    content: Yoram avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: note
    content: Voir note 21.5.
  - type: text
    content: . Il partit sans être regretté par personne. On l’enterra dans la Cité de David, mais pas dans les tombeaux des rois.
  '3':
  - type: text
    content: Leur père leur avait fait de nombreux cadeaux, de l’argent, de l’or et des objets précieux ; de plus, il leur avait confié le gouvernement de plusieurs villes fortifiées en Juda ; mais c’est à Yoram qu’il avait conféré la royauté parce qu’il était l’aîné.
  '4':
  - type: text
    content: Dès que Yoram fut en possession du royaume de son père et qu’il eut affermi son pouvoir, il fit assassiner tous ses frères ainsi que des dirigeants d’Israël.
  - type: heading
    content: (2 R 8.16-24)
  '5':
  - type: text
    content: Yoram avait trente-deux ans à son avènement et il régna huit ans à Jérusalem
  - type: note
    content: De 848 à 841 av. J.-C. (voir note 2 R 8.17).
  - type: text
    content: '. '
  '6':
  - type: text
    content: Il suivit l’exemple des rois d’Israël
  - type: note
    content: C’est-à-dire du royaume du Nord, en particulier leur idolâtrie (voir 1 R 12.28-33 ; 16.31-32).
  - type: text
    content: ', agissant comme la dynastie d’Achab, car il avait épousé une fille d’Achab'
  - type: note
    content: Athalie (voir 22.2).
  - type: text
    content: '. Il fit ce que l’Eternel considère comme mal. '
  '7':
  - type: text
    content: Pourtant, l’Eternel ne voulut pas détruire la dynastie de David, à cause de l’alliance qu’il avait conclue avec David à qui il avait promis que ses descendants régneraient pour toujours
  - type: note
    content: Voir 1 Ch 17.10-14 ; 2 Ch 6.16 ; 7.18 ; 1 R 11.36.
  - type: text
    content: .
  '8':
  - type: text
    content: Sous le règne de Yoram, les Edomites se révoltèrent contre la domination de Juda et se donnèrent un roi
  - type: note
    content: Voir Gn 27.40.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Alors Yoram partit avec ses officiers et tous ses chars de guerre. En pleine nuit, il tomba sur les Edomites qui l’avaient déjà encerclé et il les battit, ainsi que les chefs des chars. '
