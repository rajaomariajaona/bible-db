    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '91'
    - type: text
      text: Selon tes ordres, ╵tout subsiste aujourd’hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout, dans l’univers, ╵se tient à ton service.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '92'
    - type: text
      text: Si je n’avais pas fait ╵de ta Loi mes délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’aurais péri ╵suite à mon affliction.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '93'
    - type: text
      text: Jamais, je n’oublierai ╵tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est par elles ╵que tu me vivifies.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '94'
    - type: text
      text: 'Je suis à toi : viens me sauver !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je m’applique ╵à suivre tes préceptes.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '95'
    - type: text
      text: Des méchants préparent ma perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, je reste attentif ╵à tes édits.
  '96':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '96'
    - type: text
      text: J’ai constaté ╵que les choses parfaites ╵ont toutes leurs limites ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ton commandement ╵est d’une très large portée.
  '97':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '97'
    - type: text
      text: Oh ! que j’aime ta Loi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je la médite tout le jour.
  '98':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '98'
    - type: text
      text: Ton commandement me rend sage, ╵plus que mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il m’accompagne toujours.
  '99':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '99'
    - type: text
      text: Je suis plus avisé ╵que tous mes maîtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je médite tes édits.
