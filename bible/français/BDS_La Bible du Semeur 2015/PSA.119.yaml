document_id: PSA.119,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Loi de l’Eternel est parfaite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le psaume est composé de 22 strophes de 8 versets qui, pour chaque strophe, commencent tous avec la même lettre ; les strophes se suivent dans l’ordre de l’alphabet hébreu.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Heureux les hommes ╵qui ont une conduite intègre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et suivent dans leur vie ╵la Loi de l’Eternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je veux te plaire ╵de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne permets pas que je dévie ╵de tes commandements !
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: Et j’ai plus de discernement ╵que les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que j’obéis ╵à tes commandements.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: Mes pas évitent ╵tous les sentiers du mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour obéir à ta parole.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: Je ne m’écarte pas ╵des lois que tu établis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu m’enseignes.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: Que ta parole est douce ╵à mon palais !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est meilleure que le miel.
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: J’ai du discernement ╵grâce à tes ordonnances ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi je déteste ╵tout sentier mensonger.
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: Ta parole est comme une lampe ╵qui guide tous mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est une lumière ╵éclairant mon chemin.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: J’ai promis solennellement ╵ – et je tiendrai promesse –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’obéir à tes justes lois.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: Je suis bien affligé ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Eternel, sauve ma vie ╵conformément à ta parole.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: Accueille avec faveur, ╵ô Eternel, ╵ma prière comme une offrande
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enseigne-moi tes décrets !
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: Ma vie est sans cesse en danger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n’oublie rien de ta Loi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je garde ta parole ╵tout au fond de mon cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ne pas pécher contre toi.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: Des méchants m’ont tendu des pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ne dévie pas ╵de tes commandements.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: 'Tes décrets restent pour toujours ╵mon bien précieux :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils font la joie de mon cœur.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: J’ai pris la décision ╵d’appliquer tes décrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour toujours, jusqu’au bout.
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: Je hais les indécis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est ta Loi que j’aime.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: Tu es mon refuge et mon bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fais confiance à ta parole.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: Eloignez-vous de moi, ╵vous tous qui commettez le mal !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’obéirai ╵aux commandements de mon Dieu !
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: Soutiens-moi selon ta promesse, ╵et je vivrai ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que mon espoir ╵ne tourne jamais à ma confusion.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: Sois mon appui ╵pour que je sois sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je porterai toujours mon attention ╵sur tes décrets.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: Ceux qui s’écartent de tes ordonnances, ╵tu les rejettes tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car leur dessein n’est que mensonge.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: Tu ôtes comme des scories ╵tous les méchants ╵qui vivent sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi j’aime tes édits.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Béni sois-tu, ô Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes ordonnances !
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: L’effroi que tu m’inspires ╵me fait frémir ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je crains tes jugements.
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: Mes actions ont été réglées ╵par la droiture et la justice ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne m’abandonne pas ╵aux hommes qui m’oppriment !
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: 'Prends en charge ton serviteur : ╵pour faire son bonheur ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne laisse pas ╵des gens orgueilleux m’opprimer !
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: Mes yeux s’épuisent ╵à guetter ton secours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et selon ta promesse, ╵la manifestation ╵de ta justice.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: 'Agis envers ton serviteur ╵conformément à ton amour :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi tes ordonnances !
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: 'Je suis ton serviteur : ╵accorde-moi l’intelligence'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que j’assimile tes décrets.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: C’est le moment d’agir, ╵ô Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car on viole ta Loi !
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: C’est pourquoi, j’aime tes commandements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus que l’or, oui, plus que l’or fin.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: Oui, c’est pourquoi je trouve justes ╵toutes tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je déteste ╵tout sentier de mensonge.
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: Tes lois sont des merveilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi je les observe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mes lèvres énumèrent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les lois ╵que tu as prononcées.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: Quand on découvre tes paroles, ╵c’est la lumière ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les gens sans expérience ╵y trouvent le discernement.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: J’ouvre la bouche ╵et je soupire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant je désire tes commandements.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Regarde-moi et fais-moi grâce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: selon ce qui est juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.132 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon la règle que tu as fixée.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour ceux qui t’aiment !'
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: Veuille affermir mes pas ╵par ta parole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119.133 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que je suive ta parole.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’aucun mal ╵ne puisse m’asservir.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: Libère-moi ╵de l’oppression des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, je me conformerai ╵à tes commandements.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: 'Montre-toi favorable ╵envers ton serviteur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi tes ordonnances !
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: Mes yeux répandent ╵des flots de larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car on n’observe pas ta Loi.
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: Eternel, tu es juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes décrets ╵sont conformes à la droiture.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: Tu as fondé tes ordonnances ╵sur la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles sont très sûres.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: Pour moi, je suis saisi ╵de la plus vive indignation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l’égard de mes ennemis, ╵car ils négligent tes paroles.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: J’ai de la joie ╵à suivre tes préceptes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autant que si je possédais tous les trésors.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: Ta parole est pleinement éprouvée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi ton serviteur l’aime.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: Je suis petit et méprisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n’oublie pas tes préceptes.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: Ta justice est juste à jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta Loi est vérité.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: Je suis dans la détresse, ╵l’angoisse me saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tes commandements ╵font mes délices.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '144'
    - type: text
      text: La justice de tes édits ╵est éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne-moi du discernement ╵et je vivrai.
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '145'
    - type: text
      text: 'Je t’invoque de tout mon cœur : ╵Eternel, réponds-moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’observerai tes décrets.
  '146':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '146'
    - type: text
      text: Oui, je t’invoque, ╵veuille me secourir ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, je me conformerai ╵à tes édits.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '147'
    - type: text
      text: Je me lève avant l’aube ╵pour implorer ton aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fais confiance à ta parole.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '148'
    - type: text
      text: Avant la fin des veilles de la nuit, ╵mes yeux sont déjà éveillés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour méditer sur tes paroles.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '149'
    - type: text
