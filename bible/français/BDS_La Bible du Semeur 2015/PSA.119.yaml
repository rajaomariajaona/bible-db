document_id: PSA.119,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La Loi de l’Eternel est parfaiteLe psaume est composé de 22 strophes de 8 versets qui, pour chaque strophe, commencent tous avec la même lettre ; les strophes se suivent dans l’ordre de l’alphabet hébreu.
  - type: text
    content: Heureux les hommes ╵qui ont une conduite intègre
  - type: text
    content: et suivent dans leur vie ╵la Loi de l’Eternel.
  '10':
  - type: text
    content: Je veux te plaire ╵de tout mon cœur,
  - type: text
    content: ne permets pas que je dévie ╵de tes commandements !
  '100':
  - type: text
    content: Et j’ai plus de discernement ╵que les vieillards,
  - type: text
    content: parce que j’obéis ╵à tes commandements.
  '101':
  - type: text
    content: Mes pas évitent ╵tous les sentiers du mal
  - type: text
    content: pour obéir à ta parole.
  '102':
  - type: text
    content: Je ne m’écarte pas ╵des lois que tu établis,
  - type: text
    content: car tu m’enseignes.
  '103':
  - type: text
    content: Que ta parole est douce ╵à mon palais !
  - type: text
    content: Elle est meilleure que le miel.
  '104':
  - type: text
    content: J’ai du discernement ╵grâce à tes ordonnances ;
  - type: text
    content: c’est pourquoi je déteste ╵tout sentier mensonger.
  '105':
  - type: text
    content: Ta parole est comme une lampe ╵qui guide tous mes pas,
  - type: text
    content: elle est une lumière ╵éclairant mon chemin.
  '106':
  - type: text
    content: J’ai promis solennellement ╵ – et je tiendrai promesse –
  - type: text
    content: d’obéir à tes justes lois.
  '107':
  - type: text
    content: Je suis bien affligé ;
  - type: text
    content: ô Eternel, sauve ma vie ╵conformément à ta parole.
  '108':
  - type: text
    content: Accueille avec faveur, ╵ô Eternel, ╵ma prière comme une offrande
  - type: text
    content: et enseigne-moi tes décrets !
  '109':
  - type: text
    content: Ma vie est sans cesse en danger,
  - type: text
    content: mais je n’oublie rien de ta Loi.
  '11':
  - type: text
    content: Je garde ta parole ╵tout au fond de mon cœur
  - type: text
    content: pour ne pas pécher contre toi.
  '110':
  - type: text
    content: Des méchants m’ont tendu des pièges,
  - type: text
    content: mais je ne dévie pas ╵de tes commandements.
  '111':
  - type: text
    content: 'Tes décrets restent pour toujours ╵mon bien précieux :'
  - type: text
    content: et ils font la joie de mon cœur.
  '112':
  - type: text
    content: J’ai pris la décision ╵d’appliquer tes décrets,
  - type: text
    content: pour toujours, jusqu’au bout.
  '113':
  - type: text
    content: Je hais les indécis,
  - type: text
    content: et c’est ta Loi que j’aime.
  '114':
  - type: text
    content: Tu es mon refuge et mon bouclier,
  - type: text
    content: je fais confiance à ta parole.
  '115':
  - type: text
    content: Eloignez-vous de moi, ╵vous tous qui commettez le mal !
  - type: text
    content: J’obéirai ╵aux commandements de mon Dieu !
  '116':
  - type: text
    content: Soutiens-moi selon ta promesse, ╵et je vivrai ;
  - type: text
    content: que mon espoir ╵ne tourne jamais à ma confusion.
  '117':
  - type: text
    content: Sois mon appui ╵pour que je sois sauvé,
  - type: text
    content: je porterai toujours mon attention ╵sur tes décrets.
  '118':
  - type: text
    content: Ceux qui s’écartent de tes ordonnances, ╵tu les rejettes tous,
  - type: text
    content: car leur dessein n’est que mensonge.
  '119':
  - type: text
    content: Tu ôtes comme des scories ╵tous les méchants ╵qui vivent sur la terre,
  - type: text
    content: c’est pourquoi j’aime tes édits.
  '12':
  - type: text
    content: Béni sois-tu, ô Eternel !
  - type: text
    content: Enseigne-moi tes ordonnances !
  '120':
  - type: text
    content: L’effroi que tu m’inspires ╵me fait frémir ;
  - type: text
    content: je crains tes jugements.
  '121':
  - type: text
    content: Mes actions ont été réglées ╵par la droiture et la justice ;
  - type: text
    content: ne m’abandonne pas ╵aux hommes qui m’oppriment !
  '122':
  - type: text
    content: 'Prends en charge ton serviteur : ╵pour faire son bonheur ;'
  - type: text
    content: ne laisse pas ╵des gens orgueilleux m’opprimer !
  '123':
  - type: text
    content: Mes yeux s’épuisent ╵à guetter ton secours
  - type: text
    content: et selon ta promesse, ╵la manifestation ╵de ta justice.
  '124':
  - type: text
    content: 'Agis envers ton serviteur ╵conformément à ton amour :'
  - type: text
    content: enseigne-moi tes ordonnances !
  '125':
  - type: text
    content: 'Je suis ton serviteur : ╵accorde-moi l’intelligence'
  - type: text
    content: afin que j’assimile tes décrets.
  '126':
  - type: text
    content: C’est le moment d’agir, ╵ô Eternel,
  - type: text
    content: car on viole ta Loi !
  '127':
  - type: text
    content: C’est pourquoi, j’aime tes commandements
  - type: text
    content: plus que l’or, oui, plus que l’or fin.
  '128':
  - type: text
    content: Oui, c’est pourquoi je trouve justes ╵toutes tes ordonnances,
  - type: text
    content: et je déteste ╵tout sentier de mensonge.
  '129':
  - type: text
    content: Tes lois sont des merveilles,
  - type: text
    content: aussi je les observe.
  '13':
  - type: text
    content: Mes lèvres énumèrent
  - type: text
    content: toutes les lois ╵que tu as prononcées.
  '130':
  - type: text
    content: Quand on découvre tes paroles, ╵c’est la lumière ;
  - type: text
    content: les gens sans expérience ╵y trouvent le discernement.
  '131':
  - type: text
    content: J’ouvre la bouche ╵et je soupire,
  - type: text
    content: tant je désire tes commandements.
  '132':
  - type: text
    content: Regarde-moi et fais-moi grâce
  - type: text
    content: selon ce qui est juste
  - type: note
    content: 'Autre traduction : selon la règle que tu as fixée.'
  - type: text
    content: ' ╵pour ceux qui t’aiment !'
  '133':
  - type: text
    content: Veuille affermir mes pas ╵par ta parole
  - type: note
    content: 'Autre traduction : pour que je suive ta parole.'
  - type: text
    content: et qu’aucun mal ╵ne puisse m’asservir.
  '134':
  - type: text
    content: Libère-moi ╵de l’oppression des hommes
  - type: text
    content: et moi, je me conformerai ╵à tes commandements.
  '135':
  - type: text
    content: 'Montre-toi favorable ╵envers ton serviteur :'
  - type: text
    content: enseigne-moi tes ordonnances !
  '136':
  - type: text
    content: Mes yeux répandent ╵des flots de larmes,
  - type: text
    content: car on n’observe pas ta Loi.
  '137':
  - type: text
    content: Eternel, tu es juste,
  - type: text
    content: et tes décrets ╵sont conformes à la droiture.
  '138':
  - type: text
    content: Tu as fondé tes ordonnances ╵sur la justice,
  - type: text
    content: et elles sont très sûres.
  '139':
  - type: text
    content: Pour moi, je suis saisi ╵de la plus vive indignation
  - type: text
    content: à l’égard de mes ennemis, ╵car ils négligent tes paroles.
  '14':
  - type: text
    content: J’ai de la joie ╵à suivre tes préceptes
  - type: text
    content: autant que si je possédais tous les trésors.
  '140':
  - type: text
    content: Ta parole est pleinement éprouvée,
  - type: text
    content: c’est pourquoi ton serviteur l’aime.
  '141':
  - type: text
    content: Je suis petit et méprisé,
  - type: text
    content: mais je n’oublie pas tes préceptes.
  '142':
  - type: text
    content: Ta justice est juste à jamais,
  - type: text
    content: ta Loi est vérité.
  '143':
  - type: text
    content: Je suis dans la détresse, ╵l’angoisse me saisit,
  - type: text
    content: mais tes commandements ╵font mes délices.
  '144':
  - type: text
    content: La justice de tes édits ╵est éternelle,
  - type: text
    content: donne-moi du discernement ╵et je vivrai.
  '145':
  - type: text
    content: 'Je t’invoque de tout mon cœur : ╵Eternel, réponds-moi,'
  - type: text
    content: et j’observerai tes décrets.
  '146':
  - type: text
    content: Oui, je t’invoque, ╵veuille me secourir ;
  - type: text
    content: et moi, je me conformerai ╵à tes édits.
  '147':
  - type: text
    content: Je me lève avant l’aube ╵pour implorer ton aide,
  - type: text
    content: je fais confiance à ta parole.
  '148':
  - type: text
    content: Avant la fin des veilles de la nuit, ╵mes yeux sont déjà éveillés
  - type: text
    content: pour méditer sur tes paroles.
  '149':
  - type: text
    content: Dans ton amour, écoute-moi !
  - type: text
    content: O Eternel, ╵sauve ma vie ╵conformément à ta justice !
  '15':
  - type: text
    content: Je veux méditer sur tes directives,
  - type: text
    content: et fixer mes regards ╵sur les voies que tu traces.
  '150':
  - type: text
    content: Des gens aux desseins criminels
  - type: note
    content: 'Plusieurs manuscrits hébreux et versions anciennes portent : ceux qui me persécutent.'
  - type: text
    content: ' ╵me serrent de tout près,'
  - type: text
    content: ils se tiennent loin de ta Loi.
  '151':
  - type: text
    content: Mais toi, Eternel, tu es proche ;
  - type: text
    content: tous tes commandements ╵sont vérité.
  '152':
  - type: text
    content: Depuis longtemps, ╵tes ordonnances m’ont appris
  - type: text
    content: que tu les as établies pour toujours.
  '153':
  - type: text
    content: Considère mon affliction, ╵délivre-moi
  - type: text
    content: puisque je n’oublie pas ta Loi.
  '154':
  - type: text
    content: Défends ma cause, ╵délivre-moi
  - type: text
    content: et sauve-moi la vie ╵selon ce que tu as promis !
  '155':
  - type: text
    content: Le salut est loin des méchants
  - type: text
    content: car ils négligent tes décrets.
  '156':
  - type: text
    content: Ta compassion est grande, ╵ô Eternel,
  - type: text
    content: sauve-moi donc la vie ╵conformément à tes principes de justice !
  '157':
  - type: text
    content: Mes ennemis, ╵ceux qui me persécutent ╵sont innombrables,
  - type: text
    content: mais je ne dévie pas ╵de tes édits.
  '158':
  - type: text
    content: Je vois avec dégoût des traîtres
  - type: text
    content: qui n’obéissent pas ╵à ta parole.
  '159':
  - type: text
    content: Mais considère ╵combien j’aime tes ordonnances !
  - type: text
    content: O Eternel, ╵dans ton amour, ╵sauve ma vie !
  '16':
  - type: text
    content: Je trouve un grand plaisir ╵dans ce que tu prescris
  - type: text
    content: et je ne veux jamais ╵oublier ta parole.
  '160':
  - type: text
    content: Ta parole dans sa totalité ╵est vérité,
  - type: text
    content: et tout le droit ╵que tu as établi ╵dans ta justice ╵est éternel.
  '161':
  - type: text
    content: Sans raison, des puissants ╵me persécutent,
  - type: text
    content: mais je ne tremble ╵qu’à ta parole.
  '162':
  - type: text
    content: Je fais ma joie de ta parole
  - type: text
    content: comme celui qui trouve ╵un grand trésor,
  '163':
  - type: text
    content: mais je hais le mensonge, ╵je le déteste,
  - type: text
    content: et c’est ta Loi que j’aime.
  '164':
  - type: text
    content: Sept fois par jour, ╵je redis tes louanges
  - type: text
    content: à cause de tes justes lois.
  '165':
  - type: text
    content: 'Grande est la paix ╵de celui qui aime ta Loi :'
  - type: text
    content: aucun obstacle ╵ne le fait trébucher.
  '166':
  - type: text
    content: Je compte sur toi, Eternel, ╵pour me sauver,
  - type: text
    content: et j’exécute tes commandements.
  '167':
  - type: text
    content: J’obéis à tes ordonnances
  - type: text
    content: car je les aime ╵intensément.
  '168':
  - type: text
    content: Je me conforme à tes décrets ╵et à tes ordonnances,
  - type: text
    content: car toute ma conduite, ╵tu la connais.
  '169':
  - type: text
    content: Que mon appel à l’aide, ╵ô Eternel, ╵parvienne jusqu’à toi !
  - type: text
    content: Donne-moi du discernement ╵conformément à ta promesse !
  '17':
  - type: text
    content: 'Fais du bien à ton serviteur, ╵accorde-moi de vivre :'
  - type: text
    content: je me conformerai ╵à ta parole !
  '170':
  - type: text
    content: Que ma supplication ╵parvienne jusqu’à toi !
  - type: text
    content: Délivre-moi ╵selon ce que tu as promis !
  '171':
  - type: text
    content: Que la louange ╵jaillisse de mes lèvres,
  - type: text
    content: car tu m’enseignes tes décrets.
  '172':
  - type: text
    content: 'Oui, que ma langue ╵célèbre ta parole :'
  - type: text
    content: tous tes commandements sont justes.
  '173':
  - type: text
    content: Par ta puissance, ╵viens à mon aide,
  - type: text
    content: car j’ai choisi de suivre ╵tes directives.
  '174':
  - type: text
    content: Je désire ardemment ╵que tu me sauves, ╵ô Eternel !
  - type: text
    content: Ta Loi fait mes délices.
  '175':
  - type: text
    content: Oh ! que je vive ╵pour te louer !
  - type: text
    content: Et que tes lois ╵me soient en aide !
  '176':
  - type: text
    content: Je suis errant ╵comme une brebis égarée ; ╵oh ! viens chercher ton serviteur !
  - type: text
    content: car je n’oublie aucun ╵de tes commandements.
  '18':
  - type: text
    content: Ouvre mes yeux ╵pour que je voie
  - type: text
    content: de ta Loi les merveilles !
  '19':
  - type: text
    content: 'Je suis étranger sur la terre :'
  - type: text
    content: ne me cache pas tes commandements !
  '2':
  - type: text
    content: Heureux les hommes ╵qui suivent ses préceptes
  - type: text
    content: et cherchent à lui plaire ╵de tout leur cœur.
  '20':
  - type: text
    content: Je brûle en tout temps du désir
  - type: text
    content: de connaître tes lois.
  '21':
  - type: text
    content: Tu menaces ces orgueilleux maudits
  - type: text
    content: qui s’écartent de tes commandements.
  '22':
  - type: text
    content: Délivre-moi ╵du déshonneur et du mépris,
  - type: text
    content: car j’observe tes lois !
  '23':
  - type: text
    content: Quand même des puissants ╵délibéreraient contre moi,
  - type: text
    content: ton serviteur encore ╵méditerait tes ordonnances.
  '24':
  - type: text
    content: Tes préceptes font mes délices,
  - type: text
    content: ils sont mes conseillers.
  '25':
  - type: text
    content: Je suis collé à la poussière,
  - type: text
    content: sauve ma vie ╵selon ce que tu as promis !
  '26':
  - type: text
    content: Je t’ai exposé ma conduite, ╵et tu m’as répondu ;
  - type: text
    content: apprends-moi tes commandements !
  '27':
  - type: text
    content: Fais-moi discerner le chemin ╵tracé par tes décrets
  - type: text
    content: pour que je réfléchisse ╵à tes prodiges !
  '28':
  - type: text
    content: Je suis accablé de chagrin,
  - type: text
    content: relève-moi ╵conformément à ta parole !
  '29':
  - type: text
    content: Détourne-moi ╵du chemin du mensonge
  - type: text
    content: et, dans ta grâce, ╵fais que je vive ╵selon ta Loi !
  '3':
  - type: text
    content: Ils ne commettent pas le mal,
  - type: text
    content: ils suivent les chemins ╵que Dieu leur a tracés.
  '30':
  - type: text
    content: J’ai choisi le chemin ╵de la fidélité,
  - type: text
    content: je me conforme ╵à tes décrets.
  '31':
  - type: text
    content: Je me tiens attaché ╵à tes édits ;
  - type: text
    content: épargne-moi la honte, ╵ô Eternel !
  '32':
  - type: text
    content: Je veux courir sur le chemin ╵de tes commandements,
  - type: text
    content: car tu m’en donnes ╵une large compréhension.
  '33':
  - type: text
    content: O Eternel, enseigne-moi ╵le chemin de tes ordonnances,
  - type: text
    content: et je le suivrai jusqu’au bout.
  '34':
  - type: text
    content: Donne-moi du discernement ╵et j’obéirai à ta Loi ;
  - type: text
    content: je la suivrai de tout mon cœur.
  '35':
  - type: text
    content: Fais-moi marcher sur le sentier ╵de tes commandements,
  - type: text
    content: car je m’y plais !
  '36':
  - type: text
    content: Veuille incliner mon cœur ╵vers tes enseignements
  - type: text
    content: plutôt que vers le profit matériel !
  '37':
  - type: text
    content: Détourne mes regards ╵des choses vaines,
  - type: text
    content: et fais-moi vivre ╵dans les voies que tu as tracées
  - type: note
    content: 'Les manuscrits de Qumrân et deux manuscrits du texte hébreu traditionnel ont : fais-moi vivre selon ta parole (c’est-à-dire comme tu l’as promis). Les mots voie et parole se ressemblent en hébreu.'
  - type: text
    content: '  !'
  '38':
  - type: text
    content: Accomplis pour ton serviteur ╵ce que tu as promis
  - type: text
    content: en faveur de ceux qui te craignent !
  '39':
  - type: text
    content: Ecarte loin de moi ╵la honte qui m’effraie ;
  - type: text
    content: tes lois ne sont-elles pas bonnes ?
  '4':
  - type: text
    content: Tu as promulgué tes décrets
  - type: text
    content: pour qu’on les respecte avec soin.
  '40':
  - type: text
    content: J’ai une vraie passion ╵pour tes commandements,
  - type: text
    content: dans ta justice, ╵sauve ma vie !
  '41':
  - type: text
    content: Que ton amour, ô Eternel, ╵s’étende jusqu’à moi,
  - type: text
    content: et ton salut ╵selon ce que tu as promis,
  '42':
  - type: text
    content: et je pourrai répondre ╵à celui qui m’outrage,
  - type: text
    content: car j’ai mis ma confiance ╵en ta parole.
  '43':
  - type: text
    content: Ne laisse pas ma bouche ╵s’écarter de la vérité,
  - type: text
    content: car je me fonde sur tes lois.
  '44':
  - type: text
    content: J’observerai ta Loi
  - type: text
    content: sans cesse et pour toujours,
  '45':
  - type: text
    content: alors je pourrai vivre ╵dans la vraie liberté,
  - type: text
    content: car j’ai à cœur ╵de suivre tes préceptes.
  '46':
  - type: text
    content: Je parlerai ╵de tes édits ╵devant des rois
  - type: text
    content: sans éprouver de honte.
  '47':
  - type: text
    content: Je ferai mes délices ╵de tes commandements,
  - type: text
    content: que j’aime.
  '48':
  - type: text
    content: Je tends les mains ╵vers tes commandements ╵que j’aime.
  - type: text
    content: Je veux méditer sur tes ordonnances.
  '49':
  - type: text
    content: Rappelle-toi ╵ce que tu as dit à ton serviteur
  - type: text
    content: et qui m’a donné l’espérance.
  '5':
  - type: text
    content: Que j’aie assez de fermeté
  - type: text
    content: pour observer tes ordonnances !
  '50':
  - type: text
    content: Dans ma misère, ╵mon réconfort,
  - type: text
    content: c’est que ta parole me fera vivre.
  '51':
  - type: text
    content: Des orgueilleux ╵se sont moqués de moi ╵sans aucune mesure ;
  - type: text
    content: je ne dévie pas de ta Loi.
  '52':
  - type: text
    content: Je me souviens des ordonnances ╵que tu nous as données jadis,
  - type: text
    content: ô Eternel, ╵j’en suis réconforté.
  '53':
  - type: text
    content: Je suis vivement indigné ╵en voyant les méchants
  - type: text
    content: qui délaissent ta Loi.
  '54':
  - type: text
    content: Je fais de tes préceptes ╵le sujet de mes chants
  - type: text
    content: dans mon lieu de séjour.
  '55':
  - type: text
    content: La nuit, ô Eternel, ╵je pense à toi,
  - type: text
    content: j’observerai ta Loi.
  '56':
  - type: text
    content: La part qui me revient
  - type: text
    content: c’est de me conformer ╵à tes commandements.
  '57':
  - type: text
    content: Mon lot, ô Eternel, ╵je le redis,
  - type: text
    content: c’est d’obéir à tes paroles.
  '58':
  - type: text
    content: Je t’implore de tout mon cœur ;
  - type: text
    content: oh ! fais-moi grâce ╵selon ce que tu as promis !
  '59':
  - type: text
    content: J’ai réfléchi à ma conduite
  - type: text
    content: et je règle mes pas ╵sur tes commandements.
  '6':
  - type: text
    content: Alors je n’aurai pas de honte
  - type: text
    content: lorsque je considérerai ╵tous tes commandements.
  '60':
  - type: text
    content: Je m’empresse sans différer
  - type: text
    content: d’obéir à tes lois.
  '61':
  - type: text
    content: Les filets des méchants ╵m’ont enserré
  - type: text
    content: sans que j’oublie ta Loi.
  '62':
  - type: text
    content: Au cœur de la nuit, je me lève ╵afin de te louer
  - type: text
    content: à cause de tes justes lois.
  '63':
  - type: text
    content: Je suis l’ami ╵de tous ceux qui te craignent,
  - type: text
    content: de ceux qui obéissent ╵à tes décrets.
  '64':
  - type: text
    content: Eternel, ton amour ╵remplit la terre.
  - type: text
    content: Enseigne-moi tes ordonnances !
  '65':
  - type: text
    content: Tu as traité avec bonté ╵ton serviteur,
  - type: text
    content: conformément à ta parole, ╵ô Eternel !
  '66':
  - type: text
    content: Enseigne-moi ╵le bon sens et la connaissance,
  - type: text
    content: car je me fie ╵à tes commandements.
  '67':
  - type: text
    content: Avant d’être humilié, ╵je faisais fausse route,
  - type: text
    content: mais maintenant, ╵je me conforme à ta parole.
  '68':
  - type: text
    content: 'Que tu es bon et bienfaisant :'
  - type: text
    content: enseigne-moi tes ordonnances !
  '69':
  - type: text
    content: Des orgueilleux inventent ╵contre moi des mensonges,
  - type: text
    content: mais moi, de tout mon cœur, ╵je suis fidèle à tes décrets.
  '7':
  - type: text
    content: Je te célébrerai ╵dans la droiture de mon cœur
  - type: text
    content: en étudiant ╵tes justes articles de droit.
  '70':
  - type: text
    content: Leur cœur est insensible.
  - type: text
    content: Mais quant à moi, ╵ta Loi fait mes délices.
  '71':
  - type: text
    content: Il m’était bon d’être affligé
  - type: text
    content: afin d’apprendre tes préceptes.
  '72':
  - type: text
    content: La Loi que tu as édictée ╵est pour moi plus précieuse
  - type: text
    content: que mille objets d’or et d’argent.
  '73':
  - type: text
    content: Tes mains m’ont façonné ╵et affermi,
  - type: text
    content: accorde-moi l’intelligence ╵pour que j’apprenne tes commandements !
  '74':
  - type: text
    content: En me voyant, ╵ceux qui te craignent ╵se réjouissent,
  - type: text
    content: car je me fie à ta parole.
  '75':
  - type: text
    content: 'Je sais, ô Eternel, ╵que tes décrets sont justes :'
  - type: text
    content: si tu m’as affligé, ╵c’est par fidélité.
  '76':
  - type: text
    content: Que ton amour ╵soit ma consolation
  - type: text
    content: conformément à ta promesse ╵envers ton serviteur !
  '77':
  - type: text
    content: Témoigne-moi ta compassion ╵pour que je vive,
  - type: text
    content: puisque ta Loi fait mes délices.
  '78':
  - type: text
    content: Honte à ces orgueilleux ╵qui me maltraitent sans raison !
  - type: text
    content: Moi, je médite ╵sur tes commandements.
  '79':
  - type: text
    content: Qu’ils reviennent à moi ╵ceux qui te craignent
  - type: note
    content: 'Selon la proposition de lecture indiquée en marge par les copistes. Le texte lui-même a : que ceux qui te craignent se tournent de nouveau vers moi pour connaître tes édits.'
  - type: text
    content: ','
  - type: text
    content: ceux qui connaissent tes édits !
  '8':
  - type: text
    content: J’observerai fidèlement ╵tes ordonnances.
  - type: text
    content: Ne m’abandonne pas ╵complètement !
  '80':
  - type: text
    content: Que mon cœur soit intègre ╵pour suivre tes préceptes,
  - type: text
    content: afin que je ne sois pas dans la honte.
  '81':
  - type: text
    content: Je languis après ton salut,
  - type: text
    content: je fais confiance à ta parole.
  '82':
  - type: text
    content: Mes yeux s’épuisent ╵à guetter ta parole.
  - type: text
    content: 'Je me demande : ╵« Quand viendras-tu me consoler ? »'
  '83':
  - type: text
    content: Je suis semblable ╵à une outre enfumée
  - type: note
    content: Une outre dont la peau est sèche, ridée, racornie. En Orient, on suspendait les outres de moût au-dessus des foyers pour hâter la fermentation ; les outres utilisées pour cela se racornissaient et devenaient impropres à un autre usage. On les mettait donc au rebut.
  - type: text
    content: ','
  - type: text
    content: pourtant je ne délaisse pas ╵tes ordonnances.
  '84':
  - type: text
    content: Combien ton serviteur ╵a-t-il de jours à vivre ?
  - type: text
    content: Quand viendras-tu juger ╵ceux qui me persécutent ?
  '85':
  - type: text
    content: Des orgueilleux ╵m’ont creusé une trappe
  - type: text
    content: au mépris de ta Loi.
  '86':
  - type: text
    content: Tous tes commandements ╵sont dignes de confiance.
  - type: text
    content: 'Mais on me persécute ╵en disant des mensonges : ╵viens donc à mon secours !'
  '87':
  - type: text
    content: Encore un peu ╵et ils me terrassaient,
  - type: text
    content: mais je n’ai pas abandonné ╵tes ordonnances.
  '88':
  - type: text
    content: Sauve ma vie ╵dans ton amour
  - type: text
    content: afin que j’obéisse ╵à tes commandements !
  '89':
  - type: text
    content: Eternel, ta parole ╵est fondée dans le ciel
  - type: text
    content: et pour toujours,
  '9':
  - type: text
    content: Comment, quand on est jeune, ╵avoir une vie pure ?
  - type: text
    content: C’est en se conformant à ta parole.
  '90':
  - type: text
    content: 'et ta fidélité ╵demeure d’âge en âge :'
  - type: text
    content: tu as fondé la terre, ╵elle subsiste.
  '91':
  - type: text
    content: Selon tes ordres, ╵tout subsiste aujourd’hui,
  - type: text
    content: et tout, dans l’univers, ╵se tient à ton service.
  '92':
  - type: text
    content: Si je n’avais pas fait ╵de ta Loi mes délices,
  - type: text
    content: j’aurais péri ╵suite à mon affliction.
  '93':
  - type: text
    content: Jamais, je n’oublierai ╵tes ordonnances,
  - type: text
    content: car c’est par elles ╵que tu me vivifies.
  '94':
  - type: text
    content: 'Je suis à toi : viens me sauver !'
  - type: text
    content: Car je m’applique ╵à suivre tes préceptes.
  '95':
  - type: text
    content: Des méchants préparent ma perte,
  - type: text
    content: moi, je reste attentif ╵à tes édits.
  '96':
  - type: text
    content: J’ai constaté ╵que les choses parfaites ╵ont toutes leurs limites ;
  - type: text
    content: mais ton commandement ╵est d’une très large portée.
  '97':
  - type: text
    content: Oh ! que j’aime ta Loi !
  - type: text
    content: Je la médite tout le jour.
  '98':
  - type: text
    content: Ton commandement me rend sage, ╵plus que mes ennemis,
  - type: text
    content: car il m’accompagne toujours.
  '99':
  - type: text
    content: Je suis plus avisé ╵que tous mes maîtres,
  - type: text
    content: car je médite tes édits.
