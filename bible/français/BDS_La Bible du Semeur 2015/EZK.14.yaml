document_id: EZK.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Comment Dieu reçoit les idolâtres qui le consultent
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, quelques responsables du peuple d’Israël vinrent me trouver et s’assirent devant moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous deux payeront pour leur faute, aussi bien le prophète que celui qui vient le consulter. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’agirai ainsi pour que la communauté d’Israël ne s’égare plus loin de moi et qu’elle ne se rende plus impure par tous ses péchés. Alors ils seront mon peuple, et moi je serai leur Dieu. Le Seigneur, l’Eternel, le déclare. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Responsabilité personnelle
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, si la population d’un pays se met en tort contre moi en multipliant ses infidélités, je porterai la main contre eux en détruisant leurs réserves de pain, je leur enverrai la famine et je ferai périr hommes et bêtes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, même s’il y avait, parmi les habitants de ce pays, ces trois hommes, Noé, Danel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Danel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sage de l’Antiquité atteint par le malheur, connu pour sa justice, mentionné dans la littérature du Proche-Orient ancien (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '28.3'
        - type: text
          text: '). Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Daniel.
      marker-yv: yv-n
    - type: text
      text: ' et Job, eux seuls obtiendraient la vie sauve par leur droiture. Le Seigneur, l’Eternel, le déclare. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si je lâche des bêtes féroces à travers le pays pour dévorer ses habitants et le réduire à l’état de désert où personne ne passe plus par crainte de ces bêtes, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'même si ces trois hommes se trouvaient dans ce pays, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls en réchapperaient, et le pays serait dévasté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou si j’envoie l’épée contre ce pays-là, en ordonnant qu’on lui fasse la guerre pour y exterminer les hommes et les bêtes, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'même si ces trois hommes se trouvaient là, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls en réchapperaient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou si j’envoie la peste dans ce pays-là, si je déverse ma colère sur lui en y exterminant hommes et bêtes, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel m’adressa la parole et me dit :'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: si Noé, Danel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 14 et note.
      marker-yv: yv-n
    - type: text
      text: ' et Job se trouvaient là, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls obtiendraient la vie sauve par leur droiture. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, voilà ce que dit le Seigneur, l’Eternel : Bien que j’envoie contre Jérusalem mes quatre châtiments sévères, l’épée, la famine, les bêtes sauvages et la peste pour y exterminer hommes et bêtes, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il en réchappera un reste d’hommes et de femmes que l’on fera sortir de la ville. Ils viendront vers vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un deuxième contingent d’exilés va rejoindre le premier, déporté en 597 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', vous verrez leur conduite et leurs agissements, et vous vous consolerez du malheur que j’aurai fait venir sur Jérusalem, et de tous les fléaux dont je l’aurai frappée.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, ils vous en consoleront quand vous verrez leur conduite et leurs agissements. Et vous reconnaîtrez que ce n’est pas sans raison que j’aurai accompli tout ce que j’aurai fait contre cette ville. Le Seigneur, l’Eternel, le déclare.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, ces gens-là portent leurs idoles dans leur cœur, et leurs yeux se tournent sans cesse vers ce qui les fait tomber dans le péché. Alors, vais-je me laisser consulter par eux ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, parle-leur et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Tout homme de la communauté d’Israël qui porte ses idoles dans son cœur et tourne ses regards vers ce qui le fait tomber dans le péché, et qui consulter le prophète, c’est moi, l’Eternel, qui lui répondrai, et je lui donnerai la réponse que mérite la multitude de ses idoles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le châtiment de l’idolâtrie était la mort (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 13.6-18
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi je regagnerai le cœur de la communauté d’Israël qui s’est tout entière détournée de moi pour se tourner vers ses idoles. »
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, dis à la communauté d’Israël : « Voici ce que déclare le Seigneur, l’Eternel : Convertissez-vous. Abandonnez vos idoles, détournez les regards de toutes vos abominations. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car moi, l’Eternel, je répondrai moi-même à tout homme qui vient trouver le prophète pour me consulter par lui alors qu’il s’est détourné de moi pour porter ses idoles dans son cœur et qu’il a tourné ses regards vers ce qui le fait tomber dans le péché ; qu’il s’agisse d’un membre du peuple d’Israël ou d’un étranger établi au pays, peu importe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je me retournerai contre cet homme-là. Je ferai de lui un exemple, on fera un proverbe à son sujet, je le retrancherai du milieu de mon peuple et vous reconnaîtrez que je suis l’Eternel.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant au prophète, s’il se laisse séduire et émet lui-même quelque déclaration, c’est que moi, l’Eternel, j’aurai séduit ce prophète. J’étendrai la main contre lui et je l’exterminerai du milieu de mon peuple Israël. '
