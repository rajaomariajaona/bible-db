document_id: EZK.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment Dieu reçoit les idolâtres qui le consultent
  - type: text
    content: 'Un jour, quelques responsables du peuple d’Israël vinrent me trouver et s’assirent devant moi. '
  '10':
  - type: text
    content: 'Tous deux payeront pour leur faute, aussi bien le prophète que celui qui vient le consulter. '
  '11':
  - type: text
    content: J’agirai ainsi pour que la communauté d’Israël ne s’égare plus loin de moi et qu’elle ne se rende plus impure par tous ses péchés. Alors ils seront mon peuple, et moi je serai leur Dieu. Le Seigneur, l’Eternel, le déclare. »
  - type: heading
    content: Responsabilité personnelle
  '12':
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '13':
  - type: text
    content: 'Fils d’homme, si la population d’un pays se met en tort contre moi en multipliant ses infidélités, je porterai la main contre eux en détruisant leurs réserves de pain, je leur enverrai la famine et je ferai périr hommes et bêtes. '
  '14':
  - type: text
    content: Alors, même s’il y avait, parmi les habitants de ce pays, ces trois hommes, Noé, Danel
  - type: note
    content: 'Danel: sage de l’Antiquité atteint par le malheur, connu pour sa justice, mentionné dans la littérature du Proche-Orient ancien (voir 28.3). Autre traduction : Daniel.'
  - type: text
    content: ' et Job, eux seuls obtiendraient la vie sauve par leur droiture. Le Seigneur, l’Eternel, le déclare. '
  '15':
  - type: text
    content: 'Si je lâche des bêtes féroces à travers le pays pour dévorer ses habitants et le réduire à l’état de désert où personne ne passe plus par crainte de ces bêtes, '
  '16':
  - type: text
    content: 'même si ces trois hommes se trouvaient dans ce pays, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls en réchapperaient, et le pays serait dévasté. '
  '17':
  - type: text
    content: 'Ou si j’envoie l’épée contre ce pays-là, en ordonnant qu’on lui fasse la guerre pour y exterminer les hommes et les bêtes, '
  '18':
  - type: text
    content: 'même si ces trois hommes se trouvaient là, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls en réchapperaient. '
  '19':
  - type: text
    content: 'Ou si j’envoie la peste dans ce pays-là, si je déverse ma colère sur lui en y exterminant hommes et bêtes, '
  '2':
  - type: text
    content: 'Alors l’Eternel m’adressa la parole et me dit :'
  '20':
  - type: text
    content: si Noé, Danel
  - type: note
    content: Voir v. 14 et note.
  - type: text
    content: ' et Job se trouvaient là, aussi vrai que je suis vivant, le Seigneur, l’Eternel, le déclare, ils ne sauveraient ni leurs fils ni leurs filles, eux seuls obtiendraient la vie sauve par leur droiture. '
  '21':
  - type: text
    content: 'Toutefois, voilà ce que dit le Seigneur, l’Eternel : Bien que j’envoie contre Jérusalem mes quatre châtiments sévères, l’épée, la famine, les bêtes sauvages et la peste pour y exterminer hommes et bêtes, '
  '22':
  - type: text
    content: il en réchappera un reste d’hommes et de femmes que l’on fera sortir de la ville. Ils viendront vers vous
  - type: note
    content: Un deuxième contingent d’exilés va rejoindre le premier, déporté en 597 av. J.-C.
  - type: text
    content: ', vous verrez leur conduite et leurs agissements, et vous vous consolerez du malheur que j’aurai fait venir sur Jérusalem, et de tous les fléaux dont je l’aurai frappée.'
  '23':
  - type: text
    content: Oui, ils vous en consoleront quand vous verrez leur conduite et leurs agissements. Et vous reconnaîtrez que ce n’est pas sans raison que j’aurai accompli tout ce que j’aurai fait contre cette ville. Le Seigneur, l’Eternel, le déclare.
  '3':
  - type: text
    content: 'Fils d’homme, ces gens-là portent leurs idoles dans leur cœur, et leurs yeux se tournent sans cesse vers ce qui les fait tomber dans le péché. Alors, vais-je me laisser consulter par eux ? '
  '4':
  - type: text
    content: 'C’est pourquoi, parle-leur et dis-leur : « Voici ce que déclare le Seigneur, l’Eternel : Tout homme de la communauté d’Israël qui porte ses idoles dans son cœur et tourne ses regards vers ce qui le fait tomber dans le péché, et qui consulter le prophète, c’est moi, l’Eternel, qui lui répondrai, et je lui donnerai la réponse que mérite la multitude de ses idoles'
  - type: note
    content: Le châtiment de l’idolâtrie était la mort (Dt 13.6-18).
  - type: text
    content: '. '
  '5':
  - type: text
    content: Ainsi je regagnerai le cœur de la communauté d’Israël qui s’est tout entière détournée de moi pour se tourner vers ses idoles. »
  '6':
  - type: text
    content: 'C’est pourquoi, dis à la communauté d’Israël : « Voici ce que déclare le Seigneur, l’Eternel : Convertissez-vous. Abandonnez vos idoles, détournez les regards de toutes vos abominations. '
  '7':
  - type: text
    content: 'Car moi, l’Eternel, je répondrai moi-même à tout homme qui vient trouver le prophète pour me consulter par lui alors qu’il s’est détourné de moi pour porter ses idoles dans son cœur et qu’il a tourné ses regards vers ce qui le fait tomber dans le péché ; qu’il s’agisse d’un membre du peuple d’Israël ou d’un étranger établi au pays, peu importe. '
  '8':
  - type: text
    content: Je me retournerai contre cet homme-là. Je ferai de lui un exemple, on fera un proverbe à son sujet, je le retrancherai du milieu de mon peuple et vous reconnaîtrez que je suis l’Eternel.
  '9':
  - type: text
    content: 'Quant au prophète, s’il se laisse séduire et émet lui-même quelque déclaration, c’est que moi, l’Eternel, j’aurai séduit ce prophète. J’étendrai la main contre lui et je l’exterminerai du milieu de mon peuple Israël. '
