document_id: TIT.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette lettre t’est adressée par Paul, serviteur de Dieu et apôtre de Jésus-Christ. Ceux que Dieu a choisis, j’ai été chargé de les conduire dans la foi et la pleine connaissance de la vérité qui est conforme à la piété, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'pour qu’ils aient l’espérance de la vie éternelle. Cette vie nous a été promise de toute éternité, par le Dieu qui ne ment pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au moment approprié, il a fait connaître sa Parole par le message que j’ai été chargé de proclamer, selon l’ordre de Dieu notre Sauveur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je te salue, Tite, mon véritable enfant en notre foi commune :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Que Dieu le Père et Jésus-Christ notre Sauveur t’accordent la grâce et la paix.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’établissement de responsables dans l’Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je t’ai laissé en Crète pour que tu achèves de mettre en ordre ce qui est resté en suspens, et que tu établisses dans chaque ville des responsables dans l’Eglise en suivant les directives que je t’ai données. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Chacun d’eux doit être un homme irréprochable et un mari fidèle à sa femme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mari d’une seule femme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu’il n’ait été marié qu’une seule fois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 3.2
        metadata:
          usfm: 1TI.3.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Il faut que ses enfants soient dignes de confiance, c’est-à-dire qu’on ne puisse pas les accuser d’inconduite ou d’insoumission.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, il est nécessaire qu’un dirigeant d’Eglise soit irréprochable, puisqu’il a la responsabilité de la famille de Dieu. C’est pourquoi il ne doit être ni imbu de lui-même ni coléreux, ni buveur, ni querelleur, ni attiré par des gains malhonnêtes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Qu’il soit, au contraire, hospitalier, ami du bien, réfléchi, juste, saint et maître de lui-même ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: qu’il soit fidèlement attaché à la parole certaine, qui est conforme à ce qui lui a été enseigné. Ainsi il sera en mesure d’encourager les autres selon l’enseignement sain et de réfuter les contradicteurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les enseignants de mensonge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car nombreux sont ceux qui refusent de se soumettre à la vérité. Ils profèrent des discours creux et entraînent les gens dans l’erreur. On en trouve surtout parmi les gens issus du judaïsme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il faut leur fermer la bouche, car ils bouleversent des familles entières en enseignant ce qu’il ne faut pas, pour s’assurer des gains malhonnêtes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un Crétois, qu’ils considèrent comme un prophète, a dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les Crétois ont toujours été menteurs ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ce sont des bêtes méchantes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: des gloutons et des fainéants
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers du poète crétois Epiménide de Cnossos (
      - type: usfm
        marker: sc
        children:
        - type: text
          text: vi
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C.).'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voilà un jugement qui est bien vrai. C’est pourquoi reprends-les sévèrement pour qu’ils aient une foi saine '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: en ne s’attachant pas à des récits juifs de pure invention et à des commandements provenant d’hommes qui se sont détournés de la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pour ceux qui sont purs, tout est pur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 11.41
        metadata:
          usfm: LUK.11.41
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 14.20
        metadata:
          usfm: ROM.14.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', mais pour des hommes souillés et incrédules, rien n’est pur. Leur pensée et leur conscience sont souillées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Certes, ils prétendent connaître Dieu, mais ils le renient par leurs actes, car ils sont détestables, rebelles et se sont disqualifiés pour toute œuvre bonne.
