document_id: TIT.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Cette lettre t’est adressée par Paul, serviteur de Dieu et apôtre de Jésus-Christ. Ceux que Dieu a choisis, j’ai été chargé de les conduire dans la foi et la pleine connaissance de la vérité qui est conforme à la piété, '
  '10':
  - type: text
    content: 'Car nombreux sont ceux qui refusent de se soumettre à la vérité. Ils profèrent des discours creux et entraînent les gens dans l’erreur. On en trouve surtout parmi les gens issus du judaïsme. '
  '11':
  - type: text
    content: Il faut leur fermer la bouche, car ils bouleversent des familles entières en enseignant ce qu’il ne faut pas, pour s’assurer des gains malhonnêtes.
  '12':
  - type: text
    content: 'Un Crétois, qu’ils considèrent comme un prophète, a dit :'
  - type: text
    content: Les Crétois ont toujours été menteurs ;
  - type: text
    content: ce sont des bêtes méchantes,
  - type: text
    content: des gloutons et des fainéants
  - type: text
    content: ' '
  - type: note
    content: Vers du poète crétois Epiménide de Cnossos (vie siècle av. J.-C.).
  - type: text
    content: .
  '13':
  - type: text
    content: 'Voilà un jugement qui est bien vrai. C’est pourquoi reprends-les sévèrement pour qu’ils aient une foi saine '
  '14':
  - type: text
    content: en ne s’attachant pas à des récits juifs de pure invention et à des commandements provenant d’hommes qui se sont détournés de la vérité.
  '15':
  - type: text
    content: Pour ceux qui sont purs, tout est pur
  - type: note
    content: Voir Lc 11.41 et Rm 14.20.
  - type: text
    content: ', mais pour des hommes souillés et incrédules, rien n’est pur. Leur pensée et leur conscience sont souillées. '
  '16':
  - type: text
    content: Certes, ils prétendent connaître Dieu, mais ils le renient par leurs actes, car ils sont détestables, rebelles et se sont disqualifiés pour toute œuvre bonne.
  '2':
  - type: text
    content: 'pour qu’ils aient l’espérance de la vie éternelle. Cette vie nous a été promise de toute éternité, par le Dieu qui ne ment pas. '
  '3':
  - type: text
    content: Au moment approprié, il a fait connaître sa Parole par le message que j’ai été chargé de proclamer, selon l’ordre de Dieu notre Sauveur.
  '4':
  - type: text
    content: 'Je te salue, Tite, mon véritable enfant en notre foi commune :'
  - type: text
    content: Que Dieu le Père et Jésus-Christ notre Sauveur t’accordent la grâce et la paix.
  - type: heading
    content: L’établissement de responsables dans l’Eglise
  '5':
  - type: text
    content: 'Je t’ai laissé en Crète pour que tu achèves de mettre en ordre ce qui est resté en suspens, et que tu établisses dans chaque ville des responsables dans l’Eglise en suivant les directives que je t’ai données. '
  '6':
  - type: text
    content: Chacun d’eux doit être un homme irréprochable et un mari fidèle à sa femme
  - type: note
    content: 'Autres traductions : mari d’une seule femme ou qu’il n’ait été marié qu’une seule fois (voir note 1 Tm 3.2).'
  - type: text
    content: . Il faut que ses enfants soient dignes de confiance, c’est-à-dire qu’on ne puisse pas les accuser d’inconduite ou d’insoumission.
  '7':
  - type: text
    content: En effet, il est nécessaire qu’un dirigeant d’Eglise soit irréprochable, puisqu’il a la responsabilité de la famille de Dieu. C’est pourquoi il ne doit être ni imbu de lui-même ni coléreux, ni buveur, ni querelleur, ni attiré par des gains malhonnêtes.
  '8':
  - type: text
    content: 'Qu’il soit, au contraire, hospitalier, ami du bien, réfléchi, juste, saint et maître de lui-même ; '
  '9':
  - type: text
    content: qu’il soit fidèlement attaché à la parole certaine, qui est conforme à ce qui lui a été enseigné. Ainsi il sera en mesure d’encourager les autres selon l’enseignement sain et de réfuter les contradicteurs.
  - type: heading
    content: Contre les enseignants de mensonge
