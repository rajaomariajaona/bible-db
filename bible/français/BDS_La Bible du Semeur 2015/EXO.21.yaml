document_id: EXO.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les lois sur les esclaves hébreux
  - type: text
    content: 'L’Eternel dit à Moïse : Voici les lois que tu exposeras au peuple : '
  '10':
  - type: text
    content: 'Si, après l’avoir épousée, il prend une autre femme, il ne retranchera rien à la nourriture et à l’habillement de la première, ni à son devoir conjugal envers elle. '
  '11':
  - type: text
    content: S’il lui refuse l’une de ces trois choses, elle pourra partir libre, sans paiement
  - type: note
    content: En donnant ces droits à la femme-esclave, la Loi la protégeait et restreignait la polygamie.
  - type: text
    content: .
  - type: heading
    content: La loi sur les atteintes aux personnes
  '12':
  - type: text
    content: Celui qui frappera un homme et causera sa mort, sera puni de mort
  - type: note
    content: Voir Gn 9.6 ; Lv 24.17.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Cependant, s’il n’avait pas l’intention de donner la mort
  - type: note
    content: C’est le cas que nos législations ont retenu sous l’appellation d’homicide involontaire ou par imprudence.
  - type: text
    content: ', mais que Dieu a fait tomber l’homme entre ses mains, je te désignerai un endroit où il pourra se réfugier'
  - type: note
    content: Dieu désignera certaines villes de refuge lorsque le peuple sera entré en Canaan (voir Nb 35.9-34 ; Dt 19.1-13 ; Jos 20.1-9).
  - type: text
    content: '. '
  '14':
  - type: text
    content: Par contre, si quelqu’un agit avec préméditation, et qu’il assassine son prochain par ruse, vous irez jusqu’à l’arracher à mon autel
  - type: note
    content: L’autel était l’ultime refuge du coupable poursuivi par la justice (voir 1 R 1.50-51 ; 2.28-34 ; Am 3.14).
  - type: text
    content: ' pour le faire mourir.'
  '15':
  - type: text
    content: Celui qui frappe son père ou sa mère sera puni de mort.
  '16':
  - type: text
    content: Celui qui commet un rapt sera également mis à mort – qu’il ait vendu sa victime comme esclave ou qu’on la trouve encore entre ses mains
  - type: note
    content: Voir Dt 24.7.
  - type: text
    content: .
  '17':
  - type: text
    content: Celui qui maudit son père ou sa mère sera puni de mort
  - type: note
    content: Voir Lv 20.9. Cité en Mt 15.4 ; Mc 7.10.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Si, au cours d’une dispute, un homme en frappe un autre du poing ou à coups de pierres sans causer sa mort, mais en l’obligeant à s’aliter, '
  '19':
  - type: text
    content: si la victime se relève et peut de nouveau se promener dehors – fût-ce en s’appuyant sur une canne – celui qui l’aura frappé sera acquitté. Toutefois, il dédommagera l’autre pour son temps d’arrêt de travail et il se chargera de le faire soigner.
  '2':
  - type: text
    content: 'Lorsque vous achèterez un esclave hébreu, son service durera six ans ; la septième année, il partira libre, sans avoir rien à payer. '
  '20':
  - type: text
    content: 'Si quelqu’un fait mourir son esclave ou sa servante en le frappant à coups de bâton, il devra être puni. '
  '21':
  - type: text
    content: Toutefois, si le blessé survit un jour ou deux, son maître ne sera pas puni, car il l’a acquis avec son propre argent.
  '22':
  - type: text
    content: 'Si des hommes, en se battant, heurtent une femme enceinte et causent un accouchement prématuré, mais sans qu’il y ait d’autre conséquence grave, l’auteur de l’accident devra payer une indemnité dont le montant sera fixé par le mari de la femme et approuvé par arbitrage. '
  '23':
  - type: text
    content: Mais s’il s’ensuit un dommage
  - type: note
    content: Pour la mère ou pour l’enfant.
  - type: text
    content: ', tu feras payer vie pour vie, '
  '24':
  - type: text
    content: œil pour œil, dent pour dent, main pour main, pied pour pied
  - type: note
    content: Cité en Mt 5.38.
  - type: text
    content: ', '
  '25':
  - type: text
    content: brûlure pour brûlure, blessure pour blessure, contusion pour contusion
  - type: note
    content: Voir Lv 24.19-20 ; Dt 19.21 ; Mt 5.38.
  - type: text
    content: .
  '26':
  - type: text
    content: 'Si un homme blesse son esclave ou sa servante à l’œil au point de lui en faire perdre l’usage, il lui rendra la liberté en compensation de l’œil perdu. '
  '27':
  - type: text
    content: 'S’il lui fait tomber une dent, il lui rendra également la liberté en compensation de sa dent. '
  '28':
  - type: text
    content: 'Si un taureau frappe un homme ou une femme et les tue, il sera lapidé. On n’en mangera pas la viande, mais son propriétaire ne sera pas puni. '
  '29':
  - type: text
    content: 'Toutefois si, depuis quelque temps, ce taureau avait l’habitude d’attaquer les gens et que son propriétaire en a été formellement averti mais ne l’a pas surveillé, et si ce taureau tue quelqu’un, il sera lapidé et son propriétaire sera lui aussi mis à mort. '
  '3':
  - type: text
    content: 'S’il était célibataire en entrant à votre service, il partira seul. S’il était marié, sa femme partira avec lui. '
  '30':
  - type: text
    content: 'Si on impose au propriétaire une rançon pour sa vie, il devra donner tout ce qu’on lui réclamera. '
  '31':
  - type: text
    content: 'Si le taureau frappe un garçon ou une fille, on lui appliquera la même loi. '
  '32':
  - type: text
    content: S’il heurte un esclave ou une servante, le propriétaire de l’animal versera au maître de la victime trente pièces d’argent, et le taureau sera lapidé
  - type: note
    content: Prix moyen d’un esclave étranger. L’esclave hébreu devait être racheté au prix de cinquante pièces d’argent (Lv 27.3-6  ; il s’agit de sicles).
  - type: text
    content: .
  - type: heading
    content: La loi sur les atteintes aux biens
  '33':
  - type: text
    content: 'Si quelqu’un, après avoir enlevé le couvercle d’une citerne ou après avoir creusé une citerne, la laisse ouverte et qu’un taureau ou un âne tombe dedans, '
  '34':
  - type: text
    content: le propriétaire de la citerne paiera au propriétaire de la bête l’argent qu’elle valait, et la bête morte lui appartiendra.
  '35':
  - type: text
    content: 'Si le taureau de quelqu’un blesse mortellement celui d’un autre, le taureau vivant sera vendu et les deux propriétaires se partageront l’argent et l’animal mort. '
  '36':
  - type: text
    content: Mais si l’on savait que le taureau qui en a tué un autre avait l’habitude de donner des coups de corne et si son maître ne l’a pas surveillé, celui-ci devra remplacer le taureau qui a été tué et l’animal mort lui appartiendra.
  '37':
  - type: text
    content: Si quelqu’un vole un bovin ou un mouton et qu’il l’abatte ou le vende, il devra donner cinq bovins pour le bovin volé ou quatre moutons pour le mouton volé.
  '4':
  - type: text
    content: Si son maître lui a procuré une femme et qu’elle lui a donné des fils ou des filles
  - type: note
    content: 'C’est-à-dire : lui a donné l’une de ses esclaves.'
  - type: text
    content: ', la femme et ses enfants resteront la propriété de son maître, lui seul partira libre. '
  '5':
  - type: text
    content: 'Mais si le serviteur déclare : « J’aime mon maître, ma femme et mes enfants, je renonce à partir libre », '
  '6':
  - type: text
    content: alors le maître prendra Dieu à témoin
  - type: note
    content: Concrètement cela signifie qu’il ira devant un représentant de l’autorité divine, c’est-à-dire un juge (voir 22.7-8 ; Dt 1.17) ou l’assemblée des juges (voir Ps 82.1).
  - type: text
    content: ' et fera approcher l’homme du battant de la porte ou de son montant et lui percera l’oreille avec un poinçon'
  - type: note
    content: Le percement de l’oreille, courant en Syrie et dans les pays environnants comme signe de servitude, symbolisait l’obéissance stricte que le serviteur devait à son maître.
  - type: text
    content: ' et cet homme sera son esclave pour toujours'
  - type: note
    content: Voir Lv 25.39-46.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Si un homme a vendu sa fille comme servante, elle ne sera pas libérée dans les mêmes conditions que les esclaves. '
  '8':
  - type: text
    content: Si elle déplaît à son maître qui se la réservait
  - type: note
    content: 'Selon la leçon indiquée en marge par les copistes, le texte porte : et que celui-ci ne se l’attribue pas.'
  - type: text
    content: ', il la fera racheter, mais il ne pourra pas la vendre à des étrangers. Ce serait la trahir. '
  '9':
  - type: text
    content: 'S’il l’a destinée à son fils, il la traitera selon le droit qui s’applique à des filles. '
