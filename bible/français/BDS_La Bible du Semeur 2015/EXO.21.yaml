document_id: EXO.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les lois sur les esclaves hébreux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Moïse : Voici les lois que tu exposeras au peuple : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si, après l’avoir épousée, il prend une autre femme, il ne retranchera rien à la nourriture et à l’habillement de la première, ni à son devoir conjugal envers elle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il lui refuse l’une de ces trois choses, elle pourra partir libre, sans paiement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En donnant ces droits à la femme-esclave, la Loi la protégeait et restreignait la polygamie.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur les atteintes aux personnes
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui frappera un homme et causera sa mort, sera puni de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 9.6 ; Lv 24.17.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, s’il n’avait pas l’intention de donner la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est le cas que nos législations ont retenu sous l’appellation d’homicide involontaire ou par imprudence.
      marker-yv: yv-n
    - type: text
      text: ', mais que Dieu a fait tomber l’homme entre ses mains, je te désignerai un endroit où il pourra se réfugier'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dieu désignera certaines villes de refuge lorsque le peuple sera entré en Canaan (voir Nb 35.9-34 ; Dt 19.1-13 ; Jos 20.1-9).
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par contre, si quelqu’un agit avec préméditation, et qu’il assassine son prochain par ruse, vous irez jusqu’à l’arracher à mon autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’autel était l’ultime refuge du coupable poursuivi par la justice (voir 1 R 1.50-51 ; 2.28-34 ; Am 3.14).
      marker-yv: yv-n
    - type: text
      text: ' pour le faire mourir.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui frappe son père ou sa mère sera puni de mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui commet un rapt sera également mis à mort – qu’il ait vendu sa victime comme esclave ou qu’on la trouve encore entre ses mains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 24.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui maudit son père ou sa mère sera puni de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 20.9
        - type: text
          text: . Cité en Mt 15.4 ; Mc 7.10.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si, au cours d’une dispute, un homme en frappe un autre du poing ou à coups de pierres sans causer sa mort, mais en l’obligeant à s’aliter, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: si la victime se relève et peut de nouveau se promener dehors – fût-ce en s’appuyant sur une canne – celui qui l’aura frappé sera acquitté. Toutefois, il dédommagera l’autre pour son temps d’arrêt de travail et il se chargera de le faire soigner.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous achèterez un esclave hébreu, son service durera six ans ; la septième année, il partira libre, sans avoir rien à payer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un fait mourir son esclave ou sa servante en le frappant à coups de bâton, il devra être puni. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, si le blessé survit un jour ou deux, son maître ne sera pas puni, car il l’a acquis avec son propre argent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si des hommes, en se battant, heurtent une femme enceinte et causent un accouchement prématuré, mais sans qu’il y ait d’autre conséquence grave, l’auteur de l’accident devra payer une indemnité dont le montant sera fixé par le mari de la femme et approuvé par arbitrage. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s’il s’ensuit un dommage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour la mère ou pour l’enfant.
      marker-yv: yv-n
    - type: text
      text: ', tu feras payer vie pour vie, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: œil pour œil, dent pour dent, main pour main, pied pour pied
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 5.38
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: brûlure pour brûlure, blessure pour blessure, contusion pour contusion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 24.19-20 ; Dt 19.21 ; Mt 5.38.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme blesse son esclave ou sa servante à l’œil au point de lui en faire perdre l’usage, il lui rendra la liberté en compensation de l’œil perdu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il lui fait tomber une dent, il lui rendra également la liberté en compensation de sa dent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un taureau frappe un homme ou une femme et les tue, il sera lapidé. On n’en mangera pas la viande, mais son propriétaire ne sera pas puni. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois si, depuis quelque temps, ce taureau avait l’habitude d’attaquer les gens et que son propriétaire en a été formellement averti mais ne l’a pas surveillé, et si ce taureau tue quelqu’un, il sera lapidé et son propriétaire sera lui aussi mis à mort. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il était célibataire en entrant à votre service, il partira seul. S’il était marié, sa femme partira avec lui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si on impose au propriétaire une rançon pour sa vie, il devra donner tout ce qu’on lui réclamera. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le taureau frappe un garçon ou une fille, on lui appliquera la même loi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’il heurte un esclave ou une servante, le propriétaire de l’animal versera au maître de la victime trente pièces d’argent, et le taureau sera lapidé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prix moyen d’un esclave étranger. L’esclave hébreu devait être racheté au prix de cinquante pièces d’argent (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 27.3-6
        - type: text
          text: '  ; il s’agit de sicles).'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur les atteintes aux biens
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un, après avoir enlevé le couvercle d’une citerne ou après avoir creusé une citerne, la laisse ouverte et qu’un taureau ou un âne tombe dedans, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le propriétaire de la citerne paiera au propriétaire de la bête l’argent qu’elle valait, et la bête morte lui appartiendra.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le taureau de quelqu’un blesse mortellement celui d’un autre, le taureau vivant sera vendu et les deux propriétaires se partageront l’argent et l’animal mort. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si l’on savait que le taureau qui en a tué un autre avait l’habitude de donner des coups de corne et si son maître ne l’a pas surveillé, celui-ci devra remplacer le taureau qui a été tué et l’animal mort lui appartiendra.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un vole un bovin ou un mouton et qu’il l’abatte ou le vende, il devra donner cinq bovins pour le bovin volé ou quatre moutons pour le mouton volé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si son maître lui a procuré une femme et qu’elle lui a donné des fils ou des filles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui a donné l’une de ses esclaves.
      marker-yv: yv-n
    - type: text
      text: ', la femme et ses enfants resteront la propriété de son maître, lui seul partira libre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si le serviteur déclare : « J’aime mon maître, ma femme et mes enfants, je renonce à partir libre », '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: alors le maître prendra Dieu à témoin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Concrètement cela signifie qu’il ira devant un représentant de l’autorité divine, c’est-à-dire un juge (voir 22.7-8 ; Dt 1.17) ou l’assemblée des juges (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 82.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et fera approcher l’homme du battant de la porte ou de son montant et lui percera l’oreille avec un poinçon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le percement de l’oreille, courant en Syrie et dans les pays environnants comme signe de servitude, symbolisait l’obéissance stricte que le serviteur devait à son maître.
      marker-yv: yv-n
    - type: text
      text: ' et cet homme sera son esclave pour toujours'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 25.39-46
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme a vendu sa fille comme servante, elle ne sera pas libérée dans les mêmes conditions que les esclaves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si elle déplaît à son maître qui se la réservait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon la leçon indiquée en marge par les copistes, le texte porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et que celui-ci ne se l’attribue pas.
      marker-yv: yv-n
    - type: text
      text: ', il la fera racheter, mais il ne pourra pas la vendre à des étrangers. Ce serait la trahir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il l’a destinée à son fils, il la traitera selon le droit qui s’applique à des filles. '
