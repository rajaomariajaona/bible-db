document_id: LEV.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le code de sainteté
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les unions sexuelles illicites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu n’auras pas de relations sexuelles avec la fille de ton fils ou de ta fille ; tu te porterais atteinte à toi-même.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu n’auras pas de relations sexuelles avec la fille d’une autre femme de ton père si c’est la fille de ton père, car elle est ta sœur.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu n’auras pas de relations sexuelles avec la sœur de ton père ; elle est une proche parente de ton père ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ni avec la sœur de ta mère, car c’est la proche parente de ta mère.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu ne porteras pas atteinte au frère de ton père en t’approchant de son épouse, car elle est ta tante.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu n’auras pas de relations sexuelles avec ta belle-fille ; c’est la femme de ton fils, tu ne lui porteras pas atteinte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 38.16, 26 ; Lv 20.12 ; Ez 22.11.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu n’auras pas non plus de relations sexuelles avec la femme de ton frère ; car de la sorte, c’est à ton frère que tu porterais atteinte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 20.21 ; Mt 14.3-12.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tu n’auras pas de relations sexuelles avec une femme et sa fille ; tu n’épouseras ni la fille de son fils, ni celle de sa fille, car elles sont ses proches parentes et ce serait une infamie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 20.14 ; Dt 27.23.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tu ne prendras pas pour autre épouse la sœur de ta femme, car tu provoquerais des rivalités entre elles en ayant des relations avec elle, tant que ta femme est en vie.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tu n’auras pas de relations sexuelles avec une femme pendant que ses règles la rendent impure
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 15.24 ; 20.18 ; Ez 22.10.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Parle aux Israélites et dis-leur : Je suis l’Eternel, votre Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tu ne coucheras pas avec la femme de ton prochain : tu te rendrais impur avec elle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.14 ; Lv 20.10 ; Dt 5.18 ; 2 S 11.2-4 ; Ez 22.11.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tu ne livreras pas l’un de tes enfants pour les sacrifices à Molok
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon certains, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Molok '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'serait une divinité cananéenne à laquelle on sacrifiait de jeunes enfants. D’autres pensent que le nom commun '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'molok '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qualifie le sacrifice lui-même : il s’agirait d’un sacrifice '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'votif '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 20.2-5 ; 2 R 23.10 ; Jr 32.35).
      marker-yv: yv-n
    - type: text
      text: ', car tu ne déshonoreras pas ton Dieu. Je suis l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 20.2-5 ; Dt 12.31 ; 2 R 17.17 ; Jr 7.31 ; Ps 106.37-38.
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tu ne coucheras pas avec un homme comme on couche avec une femme ; c’est une abomination
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 19.5 ; Lv 20.13 ; Jg 19.22 ; Rm 1.27.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tu n’auras pas de rapports sexuels avec une bête : tu te rendrais impur avec elle. Une femme n’ira pas s’accoupler avec un animal ; c’est une dépravation'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 22.18 ; Lv 20.15-16 ; Dt 27.21.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ne vous rendez impurs par aucune de ces pratiques ; c’est en s’y adonnant que les peuples étrangers que je vais déposséder en votre faveur se rendent impurs. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le pays entier a été souillé, et je vais intervenir contre lui pour punir sa faute, et le pays vomira ses habitants.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Vous, au contraire, vous obéirez à mes lois et à mes ordonnances et vous ne commettrez aucun de ces actes abominables, ni l’autochtone, ni l’étranger qui réside au milieu de vous. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Car toutes ces abominations ont été commises par les hommes du pays qui y ont séjourné avant vous, et le pays en a été souillé. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Craignez donc qu’il ne vous vomisse, vous aussi, si vous le souillez, comme il aura vomi les populations qui vous ont précédés. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Car tous ceux qui commettront l’un ou l’autre de ces actes abominables seront retranchés de leur peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vous n’agirez pas à l’exemple de ce qui se fait en Egypte, où vous avez habité, ni de ce qui se fait au pays de Canaan où je vous conduis. Vous ne suivrez pas les coutumes de ces pays. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Vous obéirez donc à mes commandements, et vous ne suivrez aucune des coutumes abominables que l’on pratiquait avant vous ; vous ne vous rendrez pas impurs par elles. Je suis l’Eternel, votre Dieu.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous obéirez à mes lois et vous observerez mes ordonnances, vous les appliquerez. Je suis l’Eternel votre Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vous obéirez à mes ordonnances et à mes lois ; l’homme qui les appliquera vivra grâce à cela. Je suis l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Né 9.29 ; Ez 18.9 ; 20.11-13 ; Lc 10.28. Cité en Rm 10.5 ; Ga 3.12.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aucun d’entre vous n’aura de relations sexuelles avec une proche parente. Je suis l’Eternel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu ne porteras pas atteinte à ton père en ayant des relations sexuelles avec ta mère. Puisque c’est ta mère, tu ne lui porteras pas atteinte.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu n’en auras pas non plus avec une autre femme de ton père, ce serait porter atteinte à ton père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 35.22 ; Lv 20.11 ; Dt 23.1 ; 27.20 ; 1 Co 5.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu n’auras pas non plus de relations sexuelles avec ta sœur ou ta demi-sœur, fille de ton père ou fille de ta mère, née dans la maison ou au dehors
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 20.17 ; Dt 27.22 ; 2 S 13.11-14 ; Ez 22.11.
      marker-yv: yv-n
    - type: text
      text: .
