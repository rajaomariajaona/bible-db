document_id: REV.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Agneau et les cent quarante-quatre mille rachetés
  - type: text
    content: 'Alors je vis l’Agneau qui se tenait debout sur le mont Sion, et avec lui, les cent quarante-quatre mille qui portent son nom et le nom de son Père inscrits sur leur front. '
  '10':
  - type: text
    content: devra aussi boire du vin de la fureur de Dieu. Ce vin lui sera versé pur dans la coupe
  - type: note
    content: L’Ancien Testament représente souvent le jugement sous l’image d’une coupe donnée à boire (Ps 75.9 ; Es 51.17 ; Jr 25.15).
  - type: text
    content: ' de la colère divine, et il souffrira des tourments dans le feu et le soufre devant les saints anges et devant l’Agneau. '
  '11':
  - type: text
    content: La fumée de leur tourment s’élèvera à perpétuité. Quiconque adore la bête et son image, quiconque accepte la marque de son nom ne connaîtra aucun repos, ni de jour, ni de nuit.
  '12':
  - type: text
    content: C’est là que les membres du peuple saint, ceux qui obéissent aux commandements de Dieu et vivent selon la foi
  - type: note
    content: 'Autre traduction : maintiennent leur foi.'
  - type: text
    content: ' en Jésus, doivent faire preuve d’endurance.'
  '13':
  - type: text
    content: 'Puis j’entendis une voix venant du ciel me dire :'
  - type: text
    content: 'Ecris : Heureux, dès à présent, ceux qui meurent unis au Seigneur. Oui, dit l’Esprit, car ils se reposent de toute la peine qu’ils ont prise, et ils seront récompensés pour leurs œuvres.'
  - type: heading
    content: La moisson et la vendange
  '14':
  - type: text
    content: Alors je vis une nuée blanche sur laquelle siégeait quelqu’un qui ressemblait à un fils d’homme. Il avait sur la tête une couronne d’or et tenait à la main une faucille bien tranchante.
  '15':
  - type: text
    content: 'Puis un autre ange sortit du Temple, criant d’une voix forte à celui qui siégeait sur la nuée :'
  - type: text
    content: Lance ta faucille et moissonne ! Car l’heure est venue de moissonner et la moisson de la terre est mûre.
  '16':
  - type: text
    content: Celui qui siégeait sur la nuée lança sa faucille sur la terre, et la terre fut moissonnée.
  '17':
  - type: text
    content: 'Un autre ange sortit du sanctuaire céleste, tenant lui aussi une faucille bien tranchante. '
  '18':
  - type: text
    content: 'Puis un autre ange encore, l’ange préposé au feu, quitta l’autel et cria d’une voix forte à celui qui tenait la faucille tranchante : Lance ta faucille tranchante et vendange les grappes de la vigne de la terre, car ses raisins sont mûrs.'
  '19':
  - type: text
    content: 'L’ange lança sa faucille sur la terre et vendangea la vigne de la terre. Il versa sa récolte dans le grand pressoir de la colère de Dieu. '
  '2':
  - type: text
    content: 'J’entendis une voix qui venait du ciel et qui résonnait comme de grandes eaux, comme le grondement d’un coup de tonnerre violent. C’était comme le son d’un orchestre de harpistes jouant de leurs instruments. '
  '20':
  - type: text
    content: On écrasa les raisins dans le pressoir, hors de la ville. Le sang en sortit si abondamment qu’il atteignit la hauteur du mors des chevaux sur une étendue de mille six cents stades
  - type: note
    content: Voir 21.16 et note.
  - type: text
    content: .
  '3':
  - type: text
    content: Tous ces gens chantaient un cantique nouveau devant le trône, devant les quatre êtres vivants, et devant les représentants du peuple de Dieu. Et ce cantique, personne ne pouvait l’apprendre excepté les cent quarante-quatre mille, les rachetés de la terre.
  '4':
  - type: text
    content: 'Ce sont ceux qui ne se sont pas souillés avec des femmes, ils sont restés vierges. Ils suivent l’Agneau partout où il va. Ils ont été rachetés d’entre les hommes pour être offerts comme des premiers fruits à Dieu et à l’Agneau. '
  '5':
  - type: text
    content: Il ne s’est pas trouvé de mensonge dans leur bouche. Ils sont irréprochables.
  - type: heading
    content: L’annonce du jugement et de la chute de Babylone
  '6':
  - type: text
    content: 'Ensuite je vis un autre ange volant au zénith. Il avait un Evangile éternel à annoncer à tous les habitants de la terre, à toute nation, toute tribu, toute langue et tout peuple. '
  '7':
  - type: text
    content: 'Il criait d’une voix forte :'
  - type: text
    content: Craignez Dieu et donnez-lui gloire, car l’heure a sonné où il va rendre son jugement. Adorez donc celui qui a fait le ciel, la terre, la mer et les sources.
  '8':
  - type: text
    content: 'Un second ange le suivit, disant :'
  - type: text
    content: Elle est tombée, la grande Babylone
  - type: note
    content: L’ancienne Babylone en Mésopotamie avait été la capitale politique, économique et religieuse d’un empire mondial ; c’est à Babylone que le peuple de Dieu de l’ancienne alliance a été mené en exil.
  - type: text
    content: ' est tombée, celle qui a fait boire à tous les peuples le vin de sa furieuse prostitution.'
  '9':
  - type: text
    content: 'Un troisième ange les suivit, proclamant d’une voix forte :'
  - type: text
    content: 'Celui qui adore la bête et son image et qui accepte de recevoir sa marque sur le front et sur la main, '
