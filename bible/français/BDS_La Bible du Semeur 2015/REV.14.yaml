document_id: REV.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Agneau et les cent quarante-quatre mille rachetés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors je vis l’Agneau qui se tenait debout sur le mont Sion, et avec lui, les cent quarante-quatre mille qui portent son nom et le nom de son Père inscrits sur leur front. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’entendis une voix qui venait du ciel et qui résonnait comme de grandes eaux, comme le grondement d’un coup de tonnerre violent. C’était comme le son d’un orchestre de harpistes jouant de leurs instruments. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous ces gens chantaient un cantique nouveau devant le trône, devant les quatre êtres vivants, et devant les représentants du peuple de Dieu. Et ce cantique, personne ne pouvait l’apprendre excepté les cent quarante-quatre mille, les rachetés de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce sont ceux qui ne se sont pas souillés avec des femmes, ils sont restés vierges. Ils suivent l’Agneau partout où il va. Ils ont été rachetés d’entre les hommes pour être offerts comme des premiers fruits à Dieu et à l’Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il ne s’est pas trouvé de mensonge dans leur bouche. Ils sont irréprochables.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce du jugement et de la chute de Babylone
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ensuite je vis un autre ange volant au zénith. Il avait un Evangile éternel à annoncer à tous les habitants de la terre, à toute nation, toute tribu, toute langue et tout peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il criait d’une voix forte :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Craignez Dieu et donnez-lui gloire, car l’heure a sonné où il va rendre son jugement. Adorez donc celui qui a fait le ciel, la terre, la mer et les sources.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un second ange le suivit, disant :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Elle est tombée, la grande Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne Babylone en Mésopotamie avait été la capitale politique, économique et religieuse d’un empire mondial ; c’est à Babylone que le peuple de Dieu de l’ancienne alliance a été mené en exil.
    marker-yv: yv-n
  - type: text
    text: ' est tombée, celle qui a fait boire à tous les peuples le vin de sa furieuse prostitution.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un troisième ange les suivit, proclamant d’une voix forte :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Celui qui adore la bête et son image et qui accepte de recevoir sa marque sur le front et sur la main, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: devra aussi boire du vin de la fureur de Dieu. Ce vin lui sera versé pur dans la coupe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’Ancien Testament représente souvent le jugement sous l’image d’une coupe donnée à boire (Ps 75.9 ; Es 51.17 ; Jr 25.15).
    marker-yv: yv-n
  - type: text
    text: ' de la colère divine, et il souffrira des tourments dans le feu et le soufre devant les saints anges et devant l’Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La fumée de leur tourment s’élèvera à perpétuité. Quiconque adore la bête et son image, quiconque accepte la marque de son nom ne connaîtra aucun repos, ni de jour, ni de nuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est là que les membres du peuple saint, ceux qui obéissent aux commandements de Dieu et vivent selon la foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maintiennent leur foi.
    marker-yv: yv-n
  - type: text
    text: ' en Jésus, doivent faire preuve d’endurance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis j’entendis une voix venant du ciel me dire :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ecris : Heureux, dès à présent, ceux qui meurent unis au Seigneur. Oui, dit l’Esprit, car ils se reposent de toute la peine qu’ils ont prise, et ils seront récompensés pour leurs œuvres.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La moisson et la vendange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors je vis une nuée blanche sur laquelle siégeait quelqu’un qui ressemblait à un fils d’homme. Il avait sur la tête une couronne d’or et tenait à la main une faucille bien tranchante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis un autre ange sortit du Temple, criant d’une voix forte à celui qui siégeait sur la nuée :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Lance ta faucille et moissonne ! Car l’heure est venue de moissonner et la moisson de la terre est mûre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui siégeait sur la nuée lança sa faucille sur la terre, et la terre fut moissonnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un autre ange sortit du sanctuaire céleste, tenant lui aussi une faucille bien tranchante. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis un autre ange encore, l’ange préposé au feu, quitta l’autel et cria d’une voix forte à celui qui tenait la faucille tranchante : Lance ta faucille tranchante et vendange les grappes de la vigne de la terre, car ses raisins sont mûrs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’ange lança sa faucille sur la terre et vendangea la vigne de la terre. Il versa sa récolte dans le grand pressoir de la colère de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On écrasa les raisins dans le pressoir, hors de la ville. Le sang en sortit si abondamment qu’il atteignit la hauteur du mors des chevaux sur une étendue de mille six cents stades
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.16'
        metadata:
          usfm: REV.21.16
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: .
