document_id: MRK.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un malade et pardonne ses péchés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.1-8 ; Lc 5.17-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quelques jours plus tard, Jésus se rendit de nouveau à Capernaüm. On apprit qu’il était à la maison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de la maison de Simon et d’André (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.29'
        metadata:
          usfm: MRK.1.29
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Une foule s’y rassembla si nombreuse qu’il ne restait plus de place, pas même devant la porte ; et Jésus leur annonçait la Parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On lui amena un paralysé porté par quatre hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais ils ne purent pas le transporter jusqu’à Jésus, à cause de la foule. Alors ils montèrent sur le toit, défirent la toiture de la maison au-dessus de l’endroit où se trouvait Jésus et, par cette ouverture, firent glisser le brancard sur lequel le paralysé était couché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les toits en terrasse étaient faits de poutres recouvertes de terre battue.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsqu’il vit la foi de ces gens, Jésus dit au paralysé : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon enfant, tes péchés te sont pardonnés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, il y avait, assis là, quelques spécialistes de la Loi qui raisonnaient ainsi en eux-mêmes : '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comment cet homme ose-t-il parler ainsi ? Il blasphème ! Qui peut pardonner les péchés si ce n’est Dieu seul ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus sut aussitôt, en son esprit, les raisonnements qu’ils se faisaient en eux-mêmes ; il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi raisonnez-vous ainsi en vous-mêmes ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Qu’est-ce qui est le plus facile ? Dire au paralysé : « Tes péchés te sont pardonnés », ou dire : « Lève-toi, prends ton brancard et marche » ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Eh bien, vous saurez que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' a, sur la terre, le pouvoir de pardonner les péchés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors il déclara au paralysé : Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aussitôt, cet homme se leva, prit son brancard, et sortit devant tout le monde.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tous en furent stupéfaits et rendirent gloire à Dieu en disant : Nous n’avons jamais rien vu de pareil !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est contesté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.9-13 ; Lc 5.27-32)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Une nouvelle fois, Jésus s’en alla du côté du lac. Les foules venaient à sa rencontre et il les enseignait. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En passant, il vit Lévi, fils d’Alphée, installé à son poste de péage, et il lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi !
- type: usfm
  marker: p
  children:
  - type: text
    text: Lévi se leva et le suivit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme Jésus était reçu pour un repas dans la maison de Lévi, beaucoup de collecteurs d’impôts et de pécheurs notoires prirent place à table avec ses disciples et avec lui. Car ils étaient nombreux à le suivre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En voyant qu’il mangeait avec ces pécheurs notoires et ces collecteurs d’impôts, les spécialistes de la Loi qui appartenaient au parti des pharisiens interpellèrent ses disciples : Comment votre maître peut-il manger de la sorte avec des collecteurs d’impôts et des pécheurs notoires ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, qui les avait entendus, leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les bien-portants n’ont pas besoin de médecin ; ce sont les malades qui en ont besoin. Je ne suis pas venu appeler des justes, mais des pécheurs.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.14-17 ; Lc 5.33-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un jour que les disciples de Jean et les pharisiens étaient en train de jeûner, ils vinrent trouver Jésus et lui demandèrent : Comment se fait-il que tes disciples ne jeûnent pas, alors que les disciples de Jean et les pharisiens le font ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comment les invités d’une noce pourraient-ils jeûner pendant que le marié est avec eux ? Aussi longtemps que le marié se trouve parmi eux, ils ne peuvent pas jeûner !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le temps viendra où il leur sera enlevé. Alors, ce jour-là, ils jeûneront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne raccommode un vieux vêtement avec un morceau d’étoffe neuve. Sinon, la pièce rapportée tire sur la vieille étoffe et en arrache une partie. Finalement, la déchirure est pire qu’avant.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'De même, personne ne verse du vin nouveau dans de vieilles '
    - type: usfm
      marker: w
      children:
      - type: text
        text: outres
    - type: text
      text: ', sinon le vin nouveau les fait éclater, et voilà le vin perdu, et les outres aussi. A vin nouveau, outres neuves !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, maître du sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.1-8 ; Lc 6.1-5)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Un jour de sabbat, Jésus traversait des champs de blé, et ses disciples, tout en marchant, cueillaient des épis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens le firent remarquer à Jésus : Regarde ! Pourquoi tes disciples font-ils le jour du sabbat ce qui est interdit ce jour-là ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’avez-vous jamais lu ce qu’a fait '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
    - type: text
      text: ' lorsque lui et ses compagnons ont eu faim et qu’ils n’avaient rien à manger ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il est entré dans le sanctuaire de Dieu (ce récit se trouve dans la section où il est question du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand-prêtre
    - type: text
      text: ' Abiatar)'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21.1-5
        metadata:
          usfm: 1SA.21.1+1SA.21.2+1SA.21.3+1SA.21.4+1SA.21.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', il a mangé les pains exposés devant Dieu que seuls les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont le droit de manger, et il en a donné aussi à ses hommes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le sabbat a été fait pour l’homme, et non pas l’homme pour le sabbat.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' est aussi maître du sabbat.'
