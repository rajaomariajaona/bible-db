document_id: MRK.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un malade et pardonne ses péchés
  - type: heading
    content: (Mt 9.1-8 ; Lc 5.17-26)
  - type: text
    content: Quelques jours plus tard, Jésus se rendit de nouveau à Capernaüm. On apprit qu’il était à la maison
  - type: note
    content: Il s’agit de la maison de Simon et d’André (voir 1.29).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Eh bien, vous saurez que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' a, sur la terre, le pouvoir de pardonner les péchés.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Alors il déclara au paralysé : Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
  '12':
  - type: text
    content: Aussitôt, cet homme se leva, prit son brancard, et sortit devant tout le monde.
  - type: text
    content: 'Tous en furent stupéfaits et rendirent gloire à Dieu en disant : Nous n’avons jamais rien vu de pareil !'
  - type: heading
    content: Jésus est contesté
  - type: heading
    content: (Mt 9.9-13 ; Lc 5.27-32)
  '13':
  - type: text
    content: 'Une nouvelle fois, Jésus s’en alla du côté du lac. Les foules venaient à sa rencontre et il les enseignait. '
  '14':
  - type: text
    content: 'En passant, il vit Lévi, fils d’Alphée, installé à son poste de péage, et il lui dit : '
  - type: text
    content: Suis-moi !
  - type: text
    content: Lévi se leva et le suivit.
  '15':
  - type: text
    content: Comme Jésus était reçu pour un repas dans la maison de Lévi, beaucoup de collecteurs d’impôts et de pécheurs notoires prirent place à table avec ses disciples et avec lui. Car ils étaient nombreux à le suivre.
  '16':
  - type: text
    content: 'En voyant qu’il mangeait avec ces pécheurs notoires et ces collecteurs d’impôts, les spécialistes de la Loi qui appartenaient au parti des pharisiens interpellèrent ses disciples : Comment votre maître peut-il manger de la sorte avec des collecteurs d’impôts et des pécheurs notoires ?'
  '17':
  - type: text
    content: 'Jésus, qui les avait entendus, leur dit : '
  - type: text
    content: Les bien-portants n’ont pas besoin de médecin ; ce sont les malades qui en ont besoin. Je ne suis pas venu appeler des justes, mais des pécheurs.
  - type: heading
    content: (Mt 9.14-17 ; Lc 5.33-39)
  '18':
  - type: text
    content: 'Un jour que les disciples de Jean et les pharisiens étaient en train de jeûner, ils vinrent trouver Jésus et lui demandèrent : Comment se fait-il que tes disciples ne jeûnent pas, alors que les disciples de Jean et les pharisiens le font ?'
  '19':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Comment les invités d’une noce pourraient-ils jeûner pendant que le marié est avec eux ? Aussi longtemps que le marié se trouve parmi eux, ils ne peuvent pas jeûner !
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Une foule s’y rassembla si nombreuse qu’il ne restait plus de place, pas même devant la porte ; et Jésus leur annonçait la Parole de Dieu. '
  '20':
  - type: text
    content: Le temps viendra où il leur sera enlevé. Alors, ce jour-là, ils jeûneront.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Personne ne raccommode un vieux vêtement avec un morceau d’étoffe neuve. Sinon, la pièce rapportée tire sur la vieille étoffe et en arrache une partie. Finalement, la déchirure est pire qu’avant.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'De même, personne ne verse du vin nouveau dans de vieilles '
  - type: text
    content: outres
  - type: text
    content: ', sinon le vin nouveau les fait éclater, et voilà le vin perdu, et les outres aussi. A vin nouveau, outres neuves !'
  - type: heading
    content: Jésus, maître du sabbat
  - type: heading
    content: (Mt 12.1-8 ; Lc 6.1-5)
  '23':
  - type: text
    content: Un jour de sabbat, Jésus traversait des champs de blé, et ses disciples, tout en marchant, cueillaient des épis.
  '24':
  - type: text
    content: 'Les pharisiens le firent remarquer à Jésus : Regarde ! Pourquoi tes disciples font-ils le jour du sabbat ce qui est interdit ce jour-là ?'
  '25':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'N’avez-vous jamais lu ce qu’a fait '
  - type: text
    content: David
  - type: text
    content: ' lorsque lui et ses compagnons ont eu faim et qu’ils n’avaient rien à manger ?'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Il est entré dans le sanctuaire de Dieu (ce récit se trouve dans la section où il est question du '
  - type: text
    content: grand-prêtre
  - type: text
    content: ' Abiatar)'
  - type: note
    content: Voir 1 S 21.1-5.
  - type: text
    content: ', il a mangé les pains exposés devant Dieu que seuls les '
  - type: text
    content: prêtres
  - type: text
    content: ' ont le droit de manger, et il en a donné aussi à ses hommes.'
  '27':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: Le sabbat a été fait pour l’homme, et non pas l’homme pour le sabbat.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'C’est pourquoi le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est aussi maître du sabbat.'
  '3':
  - type: text
    content: 'On lui amena un paralysé porté par quatre hommes. '
  '4':
  - type: text
    content: Mais ils ne purent pas le transporter jusqu’à Jésus, à cause de la foule. Alors ils montèrent sur le toit, défirent la toiture de la maison au-dessus de l’endroit où se trouvait Jésus et, par cette ouverture, firent glisser le brancard sur lequel le paralysé était couché
  - type: note
    content: Les toits en terrasse étaient faits de poutres recouvertes de terre battue.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Lorsqu’il vit la foi de ces gens, Jésus dit au paralysé : '
  - type: text
    content: Mon enfant, tes péchés te sont pardonnés.
  '6':
  - type: text
    content: 'Or, il y avait, assis là, quelques spécialistes de la Loi qui raisonnaient ainsi en eux-mêmes : '
  '7':
  - type: text
    content: Comment cet homme ose-t-il parler ainsi ? Il blasphème ! Qui peut pardonner les péchés si ce n’est Dieu seul ?
  '8':
  - type: text
    content: 'Jésus sut aussitôt, en son esprit, les raisonnements qu’ils se faisaient en eux-mêmes ; il leur dit : '
  - type: text
    content: Pourquoi raisonnez-vous ainsi en vous-mêmes ?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Qu’est-ce qui est le plus facile ? Dire au paralysé : « Tes péchés te sont pardonnés », ou dire : « Lève-toi, prends ton brancard et marche » ?'
  - type: text
    content: ' '
