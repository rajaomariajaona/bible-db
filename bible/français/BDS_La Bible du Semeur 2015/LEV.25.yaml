document_id: LEV.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le droit de rachat des terres et des personnes
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’année de repos pour la terre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au mont Sinaï, l’Eternel s’adressa à Moïse en ces termes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-7, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 23.10-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Vous déclarerez année sainte cette cinquantième année et, dans tout le pays, vous proclamerez la libération pour tous ses habitants. Ce sera pour vous l’année du jubilé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jubilé vient de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yôbêl, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '« trompe, trompette » (de Jubal, '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 4.21
        - type: text
          text: ), celle qui annonçait le début de cette année de grâce à travers le pays, occasion « de jubiler » pour tous les opprimés.
      marker-yv: yv-n
    - type: text
      text: '  ; chacun rentrera en possession de sa terre, et chacun retournera dans sa famille. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La cinquantième année sera donc pour vous l’année du jubilé : vous ne sèmerez pas, vous ne moissonnerez pas les repousses, et vous ne vendangerez pas la vigne non taillée, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: car c’est l’année du jubilé ; vous la tiendrez pour sainte ; vous mangerez ce qui aura poussé dans les terres.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En cette année jubilaire, chacun de vous retournera dans sa propriété. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si donc vous vendez une propriété à votre compatriote, ou si vous en achetez une de lui, qu’aucun de vous ne lèse son compatriote. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On tiendra compte pour le prix d’achat du nombre d’années écoulées depuis le dernier jubilé, et son prix de vente sera donc fixé en fonction du nombre d’années de récolte restantes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Selon qu’il reste plus ou moins d’années, le prix d’achat sera élevé ou faible, car, en fait, ce qui est vendu, c’est un certain nombre de récoltes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Que nul de vous ne lèse donc son prochain, mais agissez par crainte de votre Dieu ; car je suis l’Eternel, votre Dieu.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Vous obéirez à mes commandements, vous observerez mes lois et vous les appliquerez ; ainsi vous demeurerez dans le pays en sécurité ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: et la terre vous donnera ses fruits, vous mangerez à satiété et vous y vivrez en sécurité.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dis aux Israélites : Quand vous serez entrés dans le pays que je vais vous donner, la terre se reposera ; ce sera un temps de sabbat en l’honneur de l’Eternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Peut-être direz-vous : « Que mangerons-nous la septième année puisque nous n’aurons ni semé ni rentré de récoltes ? » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Sachez que la sixième année, je répandrai ma bénédiction sur vous, en vous assurant une récolte suffisante pour trois ans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Lorsque vous sèmerez la huitième année, vous vivrez encore sur l’ancienne récolte dont vous mangerez jusqu’à la récolte de la neuvième année.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Loi sur la vente de terres et de maisons
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Une terre ne devra jamais être vendue à titre définitif car le pays m’appartient et vous êtes chez moi des étrangers et des immigrés. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dans tout le pays que vous aurez en possession, vous garantirez le droit de rachat des terres.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Lorsque ton compatriote devient pauvre et doit vendre une partie de son patrimoine foncier, un proche parent qui a le droit de rachat pourra racheter ce que son parent aura vendu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'S’il ne se trouve personne qui ait le droit de rachat, mais que cet homme ait de quoi racheter lui-même la terre, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'il considérera le nombre d’années écoulées depuis la vente et versera le prix des années restantes à l’acquéreur ; ainsi il rentrera en possession de sa propriété. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mais s’il ne trouve pas les moyens de racheter sa terre, elle restera entre les mains de l’acquéreur jusqu’à l’année du jubilé. A ce moment-là, elle lui sera rendue et il en reprendra possession.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Si quelqu’un vend une maison d’habitation située dans une ville entourée de remparts, son droit de rachat durera une année entière à partir du jour de la vente, et sera limité à cela. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pendant six ans, tu ensemenceras ton champ, et pendant six ans, tu tailleras ta vigne et tu en récolteras les produits. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Si la maison n’a pas été rachetée au terme d’une année complète, elle sera définitivement acquise à l’acquéreur et à ses descendants : elle ne sera pas rendue à son propriétaire d’origine à l’année du jubilé. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Par contre, les maisons des villages sans mur d’enceinte seront considérées comme les champs du pays ; elles pourront être rachetées en permanence et seront rendues au jubilé.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Quant aux villes des lévites et aux maisons qu’ils y posséderont, ceux-ci bénéficieront d’un droit de rachat perpétuel sur ces maisons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 35.1-8 ; Jos 21.1-42 ; 1 Ch 6.39-66.
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Si un lévite a vendu sa maison, l’acquéreur en sortira l’année du jubilé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte hébreu obscur. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Même si c’est un lévite qui a acheté l’une de ces maisons, il en sortira l’année du jubilé.
      marker-yv: yv-n
    - type: text
      text: '  ; en effet, les maisons des villes de lévites sont leur propriété inaliénable parmi les Israélites. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Les champs dépendant de leurs villes ne pourront pas être vendus ; car ils sont leur propriété à perpétuité.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’aide aux pauvres
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Si ton prochain qui vit près de toi s’appauvrit et tombe dans la misère, tu lui viendras en aide – il se trouve être comme un étranger ou un immigré – , afin qu’il survive à côté de toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 15.7-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Agis par crainte de Dieu : ne reçois de la part de ton prochain ni intérêt, ni profit, pour que celui-ci puisse vivre à côté de toi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 36-37, voir Ex 22.24 ; Dt 15.7-11 ; 23.20-21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Si tu lui prêtes de l’argent, tu n’en exigeras pas d’intérêt et si tu lui donnes de tes vivres, tu n’en tireras pas de profit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Je suis l’Eternel, votre Dieu, qui vous ai fait sortir d’Egypte pour vous donner le pays de Canaan, pour être votre Dieu.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Loi sur les serviteurs et les esclaves
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Si ton prochain qui vit près de toi devient pauvre et se vend à toi, tu ne le feras pas travailler comme un esclave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 39-46, voir Ex 21.2-6 ; Dt 15.12-18.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais la septième année sera un temps de sabbat, une année de repos pour la terre, un sabbat en l’honneur de l’Eternel ; tu n’ensemenceras pas ton champ et tu ne tailleras pas ta vigne. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Tu le traiteras comme un ouvrier salarié ou comme un immigré ; il sera ton serviteur jusqu’à l’année du jubilé. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Alors il quittera ton service, lui et ses enfants, pour retourner dans sa famille et rentrer en possession du patrimoine de ses ancêtres. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Car ce sont mes esclaves que j’ai fait sortir d’Egypte ; ils ne doivent pas être vendus comme esclaves. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tu ne les traiteras pas avec brutalité ; tu craindras ton Dieu.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Les esclaves, hommes ou femmes, qui vous appartiendront, proviendront des peuples étrangers qui vous entourent. C’est d’eux que vous pourrez acquérir des esclaves et des servantes. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'De plus, vous pourrez acheter des étrangers résidant chez vous et des membres de leurs familles qui vivent parmi vous et qui sont nés dans votre pays, et ils deviendront votre propriété. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Vous pourrez les léguer en héritage à vos enfants pour qu’ils en aient la propriété. Ils seront vos esclaves à perpétuité ; mais vous ne traiterez pas avec brutalité vos compatriotes, les Israélites.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Si un étranger résidant chez toi s’enrichit, et que l’un de tes compatriotes s’endette envers lui et se vende à lui ou à l’un des descendants d’une famille étrangère, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'il jouira, même après que la vente aura été effectuée, d’un droit de rachat : l’un de ses frères pourra le racheter. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Son oncle paternel ou son cousin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit du fils de l’oncle paternel.
      marker-yv: yv-n
    - type: text
      text: ', ou un autre membre de sa parenté proche ou éloignée pourra le racheter ; ou encore il pourra se racheter lui-même s’il en trouve les moyens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu ne moissonneras pas les repousses de ta moisson précédente, et tu ne vendangeras pas les raisins de ta vigne non taillée : ce sera une année de repos pour la terre. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Il calculera, avec l’acquéreur, le nombre d’années comprises entre la date de la vente et l’année du jubilé. Le prix du rachat sera fixé en fonction du nombre d’années, sur la base du salaire d’un ouvrier. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'S’il reste encore beaucoup d’années, il versera pour son rachat une large part du prix payé par l’acquéreur. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Et s’il reste peu d’années jusqu’à celle du jubilé, il en tiendra compte et versera comme prix de rachat une somme proportionnelle au nombre de ces années. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'L’homme sera chez son maître comme un ouvrier engagé à l’année, mais tu ne permettras pas qu’il soit traité avec brutalité. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'S’il n’est racheté d’aucune de ces manières, il retrouvera sa liberté l’année du jubilé, lui et ses enfants. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Car c’est de moi que les Israélites sont esclaves, ce sont mes esclaves que j’ai fait sortir d’Egypte. Je suis l’Eternel votre Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vous vous nourrirez de ce que la terre produira pendant son temps de repos, toi, ton serviteur, ta servante, ton ouvrier journalier et les étrangers résidant chez vous, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'ainsi que ton bétail et les animaux sauvages qui vivent dans ton pays : tout produit des terres leur servira de nourriture.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’année du jubilé
    marker-yv: yv-h
  '8':
