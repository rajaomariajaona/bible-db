document_id: 1PE.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Croître en se nourrissant de la Parole
  - type: text
    content: 'Rejetez donc toutes les formes de méchanceté et de ruse, l’hypocrisie, la jalousie, et toute médisance. '
  '10':
  - type: text
    content: 'Car vous qui autrefois '
  - type: text
    content: n’étiez pas son peuple
  - type: text
    content: ', vous êtes maintenant '
  - type: text
    content: le peuple de Dieu
  - type: text
    content: '. Vous qui '
  - type: text
    content: n’aviez pas obtenu compassion
  - type: text
    content: ', vous avez désormais '
  - type: text
    content: obtenu compassion
  - type: note
    content: Os 1.6, 9 ; 2.1, 25.
  - type: text
    content: .
  - type: heading
    content: Vivre dans un monde hostile
  - type: heading
    content: Une bonne conduite au milieu des incroyants
  '11':
  - type: text
    content: 'Mes chers amis, vous êtes dans ce monde comme des résidents temporaires, des étrangers ; c’est pourquoi je vous le demande : ne cédez pas aux désirs de l’homme livré à lui-même : ils font la guerre en vous. '
  '12':
  - type: text
    content: Ayez une bonne conduite au milieu des païens. Ainsi, dans les domaines mêmes où ils vous calomnient en vous accusant de faire le mal, ils verront vos bonnes actions et loueront Dieu le jour où il interviendra dans leur vie
  - type: note
    content: 'Autre traduction : et rendront gloire à Dieu le jour où il viendra les juger.'
  - type: text
    content: .
  - type: heading
    content: La soumission volontaire
  '13':
  - type: text
    content: 'Pour l’amour du Seigneur, soumettez-vous à vos semblables, qui sont des créatures de Dieu : au roi qui détient le pouvoir suprême, '
  '14':
  - type: text
    content: 'comme à ses gouverneurs chargés de punir les malfaiteurs et d’approuver les gens honnêtes. – '
  '15':
  - type: text
    content: 'Car voici ce que Dieu veut : c’est qu’en pratiquant le bien, vous réduisiez au silence toutes les calomnies portées contre vous par les insensés, dans leur ignorance. '
  '16':
  - type: text
    content: 'Vous agirez ainsi en hommes libres, sans faire pour autant de votre liberté un voile pour couvrir une mauvaise conduite, car vous êtes des serviteurs de Dieu. – '
  '17':
  - type: text
    content: Témoignez à tout homme le respect auquel il a droit, aimez vos frères et sœurs en la foi, « craignez Dieu, respectez le roi » !
  - type: heading
    content: Les esclaves et leurs maîtres
  '18':
  - type: text
    content: 'Serviteurs, soumettez-vous à votre maître avec toute la crainte qui lui est due, non seulement s’il est bon et bienveillant, mais aussi s’il est dur. '
  '19':
  - type: text
    content: 'En effet, c’est un privilège que de supporter des souffrances imméritées, par motif de conscience envers Dieu. '
  '2':
  - type: text
    content: 'Comme des enfants nouveau-nés, désirez ardemment le lait pur de la Parole, afin qu’il vous fasse grandir en vue du salut, '
  '20':
  - type: text
    content: Quelle gloire y a-t-il, en effet, à endurer un châtiment pour avoir commis une faute ? Mais si vous endurez la souffrance tout en ayant fait le bien, c’est là un privilège devant Dieu.
  '21':
  - type: text
    content: 'C’est à cela que Dieu vous a appelés, car Christ aussi a souffert pour vous, vous laissant un exemple, pour que vous suiviez ses traces. '
  '22':
  - type: text
    content: Il n’a commis aucun péché, ses lèvres n’avaient produit la tromperie
  - type: note
    content: Es 53.9. Les versets 22-25 s’inspirent de la prophétie d’Esaïe 53 sur le Serviteur souffrant.
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Injurié, il ne ripostait pas par l’injure. Quand on le faisait souffrir, il ne formulait aucune menace, mais remettait sa cause entre les mains du juste Juge. '
  '24':
  - type: text
    content: 'Il a pris nos péchés sur lui et les a portés dans son corps, sur la croix, afin qu’étant morts pour le péché, nous menions une vie juste. Oui, c’est '
  - type: text
    content: par ses blessures que vous avez été guéris
  - type: note
    content: Es 53.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '25':
  - type: text
    content: Car vous étiez comme des brebis errantes mais, à présent, vous êtes retournés vers le berger qui veille sur vous.
  '3':
  - type: text
    content: 'puisque, vous avez '
  - type: text
    content: goûté combien le Seigneur est bon
  - type: note
    content: Ps 34.9.
  - type: text
    content: .
  - type: heading
