  '5':
  - type: text
    content: Et vous aussi, comme des pierres vivantes, vous qui formez un temple
  - type: note
    content: Le temple de l’ancienne alliance préfigurait la maison spirituelle constituée à présent par l’ensemble des croyants (1 Co 3.16 ; Ep 2.19-22).
  - type: text
    content: ' spirituel, édifiez-vous pour constituer une sainte communauté de prêtres, chargés de lui offrir des sacrifices spirituels qu’il pourra accepter favorablement par Jésus-Christ. '
