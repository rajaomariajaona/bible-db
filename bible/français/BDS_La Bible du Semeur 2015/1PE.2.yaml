document_id: 1PE.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Croître en se nourrissant de la Parole
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rejetez donc toutes les formes de méchanceté et de ruse, l’hypocrisie, la jalousie, et toute médisance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Car vous qui autrefois '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: n’étiez pas son peuple
    - type: text
      text: ', vous êtes maintenant '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le peuple de Dieu
    - type: text
      text: '. Vous qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: n’aviez pas obtenu compassion
    - type: text
      text: ', vous avez désormais '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: obtenu compassion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Os 1.6, 9 ; 2.1, 25.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Vivre dans un monde hostile
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une bonne conduite au milieu des incroyants
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mes chers amis, vous êtes dans ce monde comme des résidents temporaires, des étrangers ; c’est pourquoi je vous le demande : ne cédez pas aux désirs de l’homme livré à lui-même : ils font la guerre en vous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ayez une bonne conduite au milieu des païens. Ainsi, dans les domaines mêmes où ils vous calomnient en vous accusant de faire le mal, ils verront vos bonnes actions et loueront Dieu le jour où il interviendra dans leur vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et rendront gloire à Dieu le jour où il viendra les juger.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La soumission volontaire
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pour l’amour du Seigneur, soumettez-vous à vos semblables, qui sont des créatures de Dieu : au roi qui détient le pouvoir suprême, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'comme à ses gouverneurs chargés de punir les malfaiteurs et d’approuver les gens honnêtes. – '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Car voici ce que Dieu veut : c’est qu’en pratiquant le bien, vous réduisiez au silence toutes les calomnies portées contre vous par les insensés, dans leur ignorance. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vous agirez ainsi en hommes libres, sans faire pour autant de votre liberté un voile pour couvrir une mauvaise conduite, car vous êtes des serviteurs de Dieu. – '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Témoignez à tout homme le respect auquel il a droit, aimez vos frères et sœurs en la foi, « craignez Dieu, respectez le roi » !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les esclaves et leurs maîtres
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Serviteurs, soumettez-vous à votre maître avec toute la crainte qui lui est due, non seulement s’il est bon et bienveillant, mais aussi s’il est dur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En effet, c’est un privilège que de supporter des souffrances imméritées, par motif de conscience envers Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Comme des enfants nouveau-nés, désirez ardemment le lait pur de la Parole, afin qu’il vous fasse grandir en vue du salut, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quelle gloire y a-t-il, en effet, à endurer un châtiment pour avoir commis une faute ? Mais si vous endurez la souffrance tout en ayant fait le bien, c’est là un privilège devant Dieu.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est à cela que Dieu vous a appelés, car Christ aussi a souffert pour vous, vous laissant un exemple, pour que vous suiviez ses traces. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il n’a commis aucun péché, ses lèvres n’avaient produit la tromperie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53.9
        - type: text
          text: . Les versets 22-25 s’inspirent de la prophétie d’Esaïe 53 sur le Serviteur souffrant.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Injurié, il ne ripostait pas par l’injure. Quand on le faisait souffrir, il ne formulait aucune menace, mais remettait sa cause entre les mains du juste Juge. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il a pris nos péchés sur lui et les a portés dans son corps, sur la croix, afin qu’étant morts pour le péché, nous menions une vie juste. Oui, c’est '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: par ses blessures que vous avez été guéris
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Car vous étiez comme des brebis errantes mais, à présent, vous êtes retournés vers le berger qui veille sur vous.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'puisque, vous avez '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: goûté combien le Seigneur est bon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 34.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Former un temple pour Dieu
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Approchez-vous de lui, car il est la '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pierre
    - type: text
      text: ' vivante que les hommes ont '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: rejetée
    - type: text
      text: ' mais que Dieu '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: a choisie
    - type: text
      text: ' et à laquelle il attache '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une grande valeur
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et vous aussi, comme des pierres vivantes, vous qui formez un temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le temple de l’ancienne alliance préfigurait la maison spirituelle constituée à présent par l’ensemble des croyants (1 Co 3.16 ; Ep 2.19-22).
      marker-yv: yv-n
    - type: text
      text: ' spirituel, édifiez-vous pour constituer une sainte communauté de prêtres, chargés de lui offrir des sacrifices spirituels qu’il pourra accepter favorablement par Jésus-Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Voici, en effet, ce qu’on trouve dans l’Ecriture à ce sujet :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Moi, je place en Sion
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une pierre angulaire
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: choisie, d’une grande valeur.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Celui qui met sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: confiance
      - type: text
        text: ' en elle'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ne connaîtra jamais le déshonneur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 28.16
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Pour vous donc qui croyez : l’honneur ! Mais pour ceux qui ne croient pas :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La pierre que les constructeurs
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ont rejetée
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: est devenue la pierre principale,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la pierre d’angle
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.22
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une pierre qu’on heurte,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: un rocher qui fait trébucher
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 8.14
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parce qu’ils refusent de croire à la Parole, il leur arrive ce qui était prévu pour eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce à quoi ils étaient destinés.
      marker-yv: yv-n
    - type: text
      text: '  : ils tombent à cause de cette pierre.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais vous, vous êtes un '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: peuple élu
    - type: text
      text: ', une '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: communauté de rois-prêtres
    - type: text
      text: ', une '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: nation sainte
    - type: text
      text: ', un '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: peuple que Dieu a pris pour sien, pour
    - type: text
      text: ' que vous '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: célébriez bien haut les œuvres merveilleuses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 19.5-6 ; Es 43.20-21.
      marker-yv: yv-n
    - type: text
      text: ' de celui qui vous a appelés à passer des ténèbres à son admirable lumière. '
