document_id: ISA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deux signes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel me dit : Prends une grande tablette et inscris-y avec un burin ordinaire : Maher-Shalal-Hash-Baz (Proche pillage, imminent butin).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je pris pour moi des témoins dignes de foi : le prêtre Urie, et Zacharie, fils de Yebérékia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Urie
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 16.10-18
        metadata:
          usfm: 2KI.16.10+2KI.16.11+2KI.16.12+2KI.16.13+2KI.16.14+2KI.16.15+2KI.16.16+2KI.16.17+2KI.16.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je m’approchai de ma femme, la prophétesse, elle devint enceinte et mit au monde un fils. Et l’Eternel me dit : Appelle-le : Maher-Shalal-Hash-Baz. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car avant que l’enfant sache appeler : Papa, Maman, on emportera les richesses de Damas et le butin de Samarie devant le roi d’Assyrie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion assyrienne
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Eternel me parla encore en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puisque ce peuple a méprisé
- type: usfm
  marker: q1
  children:
  - type: text
    text: les eaux de Siloé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit des eaux de la source du Guihôn (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 32.4
        metadata:
          usfm: 2CH.32.4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
        metadata:
          usfm: 2CH.32.30
      - type: text
        text: ) qui assurait l’alimentation de Jérusalem en eau potable.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui coulent doucement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il s’est réjoui ╵à cause de Retsîn
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du fils de Remalia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et qu’il redoute Retsîn et le fils de Remalia. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans la traduction adoptée dans le texte, c’est le parti favorable à une alliance avec le royaume du Nord et avec la Syrie, contre les Assyriens, qui est visé.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: à cause de cela, ╵voici que le Seigneur ╵fera monter sur eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'les grandes eaux du puissant fleuve :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera le roi d’Assyrie ╵et toute sa puissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il sortira partout de son lit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il débordera ╵au-dessus de toutes ses berges,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: il pénétrera en Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’inondera et le submergera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lui montera jusqu’au cou
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le déploiement de ses flots
- type: usfm
  marker: q1
  children:
  - type: text
    text: couvrira toute l’étendue ╵de ton pays, Emmanuel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sonnez l’alarme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous avez beau vous allier.
    marker-yv: yv-n
  - type: text
    text: ', ô peuples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous serez terrifiés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prêtez l’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous les pays lointains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soyez prêts au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous serez terrifiés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez prêts au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous serez terrifiés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Elaborez votre projet ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il sera anéanti.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exposez votre plan ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne réussira pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu est avec nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, jeu sur le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Emmanuel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu tient l’univers dans sa main
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car voici ce que l’Eternel ╵m’a déclaré
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque, par sa puissance, ╵il m’a saisi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il m’a averti ╵de ne pas suivre le chemin
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'emprunté par ce peuple :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne dites pas complot
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tout ce que ce peuple ╵nomme complot ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne craignez pas tout ce qu’il craint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En apprenant l’alliance d’Israël et de la Syrie, le peuple a pris peur. Les v. 12-13 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 3.14-15
        metadata:
          usfm: 1PE.3.14+1PE.3.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne le redoutez pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais reconnaissez comme saint
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur des armées célestes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est lui que vous craindrez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qu’il faut redouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il est un sanctuaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il sera aussi ╵une pierre qu’on heurte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un rocher qui fait trébucher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 2.8
        metadata:
          usfm: 1PE.2.8
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les deux royaumes israélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un piège et un filet
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les habitants de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Beaucoup d’entre eux ╵s’y heurteront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tomberont ╵et ils se briseront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront pris au piège ╵et capturés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lie donc cet acte pour le conserver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et scelle cette loi ╵parmi ceux qui sont mes disciples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moi je m’attends à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se détourne ╵du peuple de Jacob ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me confie en lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 17-18 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2.13
        metadata:
          usfm: HEB.2.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Me voici avec les disciples ╵qui m’ont été donnés ╵par l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous servons de signes et de présages ╵en Israël.
- type: usfm
  marker: p
  children:
  - type: text
    text: Cela est dû à l’Eternel, le Seigneur des armées célestes, dont la demeure est sur le mont Sion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsqu’on viendra vous dire : « Allez donc consulter ceux qui évoquent les esprits, ceux qui prédisent l’avenir, ceux qui chuchotent et marmottent ! Les peuples ne doivent-ils pas consulter leurs dieux et s’adresser aux morts en faveur des vivants ? », alors vous répondrez : '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '« A la Loi et à l’acte écrit ! ». Si l’on ne parle pas ainsi, alors pas d’aurore pour eux ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On traversera le pays, pressé et affamé, et il arrivera, sous l’effet de la faim, qu’exaspéré, en levant les yeux vers le haut, on maudira son roi, on maudira son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Puis, regardant la terre, on n’y trouvera que détresse, ténèbres, sombres angoisses, et l’on sera poussé dans la nuit la plus noire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des ténèbres à la lumière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais les ténèbres ne régneront pas à toujours sur ce pays envahi par l’angoisse. Si, dans les temps passés, Dieu a couvert d’opprobre tout le pays de Zabulon et le pays de Nephtali
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deux tribus israélites installées au nord du pays et dont le territoire avait été annexé par les Assyriens entre 734 et 732 en même temps que la Galilée et les territoires à l’est du Jourdain.
    marker-yv: yv-n
  - type: text
    text: ', dans les temps à venir, il couvrira de gloire la route de la mer'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Route qui longe la mer Méditerranée et relie la Syrie à l’Egypte.
    marker-yv: yv-n
  - type: text
    text: ', au-delà du Jourdain, la Galilée des populations étrangères'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On l’appelait ainsi parce que la population était fortement mélangée à des non-Israélites : des Cananéens y étaient restés ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 1.33
        metadata:
          usfm: JDG.1.33
      - type: text
        text: ), Salomon avait donné une partie du territoire au roi de Tyr (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 9.11-13
        metadata:
          usfm: 1KI.9.11+1KI.9.12+1KI.9.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
