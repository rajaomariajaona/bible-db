document_id: ISA.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deux signes
  - type: text
    content: 'L’Eternel me dit : Prends une grande tablette et inscris-y avec un burin ordinaire : Maher-Shalal-Hash-Baz (Proche pillage, imminent butin).'
  '10':
  - type: text
    content: Elaborez votre projet ;
  - type: text
    content: mais il sera anéanti.
  - type: text
    content: Exposez votre plan ;
  - type: text
    content: mais il ne réussira pas.
  - type: text
    content: Car Dieu est avec nous
  - type: note
    content: En hébreu, jeu sur le nom Emmanuel.
  - type: text
    content: .
  - type: heading
    content: Dieu tient l’univers dans sa main
  '11':
  - type: text
    content: Car voici ce que l’Eternel ╵m’a déclaré
  - type: text
    content: lorsque, par sa puissance, ╵il m’a saisi
  - type: text
    content: et qu’il m’a averti ╵de ne pas suivre le chemin
  - type: text
    content: 'emprunté par ce peuple :'
  '12':
  - type: text
    content: Ne dites pas complot
  - type: text
    content: pour tout ce que ce peuple ╵nomme complot ;
  - type: text
    content: ne craignez pas tout ce qu’il craint
  - type: note
    content: En apprenant l’alliance d’Israël et de la Syrie, le peuple a pris peur. Les v. 12-13 sont cités en 1 P 3.14-15.
  - type: text
    content: ','
  - type: text
    content: ne le redoutez pas.
  '13':
  - type: text
    content: Mais reconnaissez comme saint
  - type: text
    content: le Seigneur des armées célestes ;
  - type: text
    content: c’est lui que vous craindrez,
  - type: text
    content: lui qu’il faut redouter.
  '14':
  - type: text
    content: Il est un sanctuaire,
  - type: text
    content: mais il sera aussi ╵une pierre qu’on heurte,
  - type: text
    content: un rocher qui fait trébucher
  - type: note
    content: Cité en 1 P 2.8.
  - type: text
    content: pour les deux royaumes israélites,
  - type: text
    content: un piège et un filet
  - type: text
    content: pour les habitants de Jérusalem.
  '15':
  - type: text
    content: Beaucoup d’entre eux ╵s’y heurteront,
  - type: text
    content: ils tomberont ╵et ils se briseront,
  - type: text
    content: ils seront pris au piège ╵et capturés.
  '16':
  - type: text
    content: Lie donc cet acte pour le conserver,
  - type: text
    content: et scelle cette loi ╵parmi ceux qui sont mes disciples.
  '17':
  - type: text
    content: Moi je m’attends à l’Eternel,
  - type: text
    content: qui se détourne ╵du peuple de Jacob ;
  - type: text
    content: je me confie en lui
  - type: note
    content: Les v. 17-18 sont cités en Hé 2.13.
  - type: text
    content: .
  '18':
  - type: text
    content: Me voici avec les disciples ╵qui m’ont été donnés ╵par l’Eternel.
  - type: text
    content: Nous servons de signes et de présages ╵en Israël.
  - type: text
    content: Cela est dû à l’Eternel, le Seigneur des armées célestes, dont la demeure est sur le mont Sion.
  '19':
  - type: text
    content: 'Lorsqu’on viendra vous dire : « Allez donc consulter ceux qui évoquent les esprits, ceux qui prédisent l’avenir, ceux qui chuchotent et marmottent ! Les peuples ne doivent-ils pas consulter leurs dieux et s’adresser aux morts en faveur des vivants ? », alors vous répondrez : '
  '2':
  - type: text
    content: 'Je pris pour moi des témoins dignes de foi : le prêtre Urie, et Zacharie, fils de Yebérékia'
  - type: note
    content: 'Urie: voir 2 R 16.10-18.'
  - type: text
    content: .
  '20':
  - type: text
    content: '« A la Loi et à l’acte écrit ! ». Si l’on ne parle pas ainsi, alors pas d’aurore pour eux ! '
  '21':
  - type: text
    content: 'On traversera le pays, pressé et affamé, et il arrivera, sous l’effet de la faim, qu’exaspéré, en levant les yeux vers le haut, on maudira son roi, on maudira son Dieu. '
  '22':
  - type: text
    content: Puis, regardant la terre, on n’y trouvera que détresse, ténèbres, sombres angoisses, et l’on sera poussé dans la nuit la plus noire.
  - type: heading
    content: Des ténèbres à la lumière
  '23':
  - type: text
    content: Mais les ténèbres ne régneront pas à toujours sur ce pays envahi par l’angoisse. Si, dans les temps passés, Dieu a couvert d’opprobre tout le pays de Zabulon et le pays de Nephtali
  - type: note
    content: Deux tribus israélites installées au nord du pays et dont le territoire avait été annexé par les Assyriens entre 734 et 732 en même temps que la Galilée et les territoires à l’est du Jourdain.
  - type: text
    content: ', dans les temps à venir, il couvrira de gloire la route de la mer'
  - type: note
    content: Route qui longe la mer Méditerranée et relie la Syrie à l’Egypte.
  - type: text
    content: ', au-delà du Jourdain, la Galilée des populations étrangères'
  - type: note
    content: 'On l’appelait ainsi parce que la population était fortement mélangée à des non-Israélites : des Cananéens y étaient restés (Jg 1.33), Salomon avait donné une partie du territoire au roi de Tyr (1 R 9.11-13).'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Je m’approchai de ma femme, la prophétesse, elle devint enceinte et mit au monde un fils. Et l’Eternel me dit : Appelle-le : Maher-Shalal-Hash-Baz. '
  '4':
  - type: text
    content: 'Car avant que l’enfant sache appeler : Papa, Maman, on emportera les richesses de Damas et le butin de Samarie devant le roi d’Assyrie.'
  - type: heading
    content: L’invasion assyrienne
  '5':
  - type: text
    content: 'L’Eternel me parla encore en ces termes :'
  '6':
  - type: text
    content: Puisque ce peuple a méprisé
  - type: text
    content: les eaux de Siloé
  - type: note
    content: Il s’agit des eaux de la source du Guihôn (2 Ch 32.4, 30) qui assurait l’alimentation de Jérusalem en eau potable.
  - type: text
    content: qui coulent doucement,
  - type: text
    content: et qu’il s’est réjoui ╵à cause de Retsîn
  - type: text
    content: et du fils de Remalia
  - type: note
    content: 'Certains traduisent : et qu’il redoute Retsîn et le fils de Remalia. Dans la traduction adoptée dans le texte, c’est le parti favorable à une alliance avec le royaume du Nord et avec la Syrie, contre les Assyriens, qui est visé.'
  - type: text
    content: ','
  '7':
  - type: text
    content: à cause de cela, ╵voici que le Seigneur ╵fera monter sur eux
  - type: text
    content: 'les grandes eaux du puissant fleuve :'
  - type: text
    content: ce sera le roi d’Assyrie ╵et toute sa puissance.
  - type: text
    content: Oui, il sortira partout de son lit,
  - type: text
    content: et il débordera ╵au-dessus de toutes ses berges,
  '8':
  - type: text
    content: il pénétrera en Juda,
  - type: text
    content: l’inondera et le submergera,
  - type: text
    content: il lui montera jusqu’au cou
  - type: text
    content: et le déploiement de ses flots
  - type: text
    content: couvrira toute l’étendue ╵de ton pays, Emmanuel.
  '9':
  - type: text
    content: Sonnez l’alarme
  - type: note
    content: 'Autre traduction : vous avez beau vous allier.'
  - type: text
    content: ', ô peuples,'
  - type: text
    content: vous serez terrifiés !
  - type: text
    content: Prêtez l’oreille,
  - type: text
    content: vous les pays lointains,
  - type: text
    content: soyez prêts au combat,
  - type: text
    content: vous serez terrifiés !
  - type: text
    content: Soyez prêts au combat,
  - type: text
    content: vous serez terrifiés !
