document_id: PRO.28
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les criminels prennent la fuite sans que personne les poursuive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les justes sont confiants comme un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand la révolte règne dans un pays, les chefs se multiplient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir, par exemple, les changements rapides de souverains en Israël : 1 R 16.8-28 ; 2 R 15.8-15.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, avec un homme intelligent et qui a du savoir, l’ordre règne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un homme pauvre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un méchant.
    marker-yv: yv-n
  - type: text
    text: ' qui opprime les indigents'
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme une pluie dévastatrice qui provoque la disette
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une pluie porteuse d’espoir pour l’agriculteur, mais qui déçoit par sa brutalité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ceux qui abandonnent la loi exaltent le criminel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui obéissent à la loi le combattent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui s’adonnent au mal ne comprennent rien à la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui s’attachent à l’Eternel comprennent tout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mieux vaut un pauvre qui se conduit de façon intègre
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un riche qui suit des chemins tortueux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui observe la loi est un fils intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui recherche la compagnie des jouisseurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des gens vils.
    marker-yv: yv-n
  - type: text
    text: ' fait honte à son père.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui augmente sa fortune par un intérêt usurier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Ex 22.25 ; Lv 25.35-37 ; Dt 23.20-21 (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 22.12
        metadata:
          usfm: EZK.22.12
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: amasse des biens pour celui qui a compassion des pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si quelqu’un se détourne pour ne pas écouter la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa prière même est en horreur à Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui égare les justes dans une mauvaise voie tombera lui-même dans la fosse qu’il a creusée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les hommes intègres connaîtront le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’homme riche se prend pour un sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le pauvre qui est intelligent le démasque.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand les justes triomphent, c’est magnifique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais quand les méchants accèdent au pouvoir, chacun se tient caché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui cache ses fautes ne prospérera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui les avoue et les délaisse obtient miséricorde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Heureux l’homme qui a constamment la crainte de faire du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui s’obstine tombera dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un souverain méchant régnant sur un peuple pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme un lion rugissant ou un ours qui charge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Un despote dépourvu d’intelligence multiplie les exactions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui déteste le gain mal acquis vivra de longs jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’homme accablé à cause du meurtre qu’il a commis court vers la tombe :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que personne ne l’en empêche !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qui mène une vie intègre trouvera le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’homme corrompu qui suit deux chemins à la fois tombera dans l’un ou l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qui travaille sa terre aura du pain en abondance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui court après des futilités sera rassasié de misère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’homme loyal sera comblé de bénédictions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui veut s’enrichir rapidement ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui est partial n’agit pas bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pourtant, un homme est capable de faire le mal pour une bouchée de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L’homme envieux se hâte de s’enrichir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne se rend pas compte que la pauvreté va fondre sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qui reprend son prochain gagnera finalement sa faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plutôt que l’homme au langage flatteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Qui dépouille son père et sa mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prétend que ce n’est pas un péché
- type: usfm
  marker: q1
  children:
  - type: text
    text: est le compagnon de celui qui détruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’homme insatiable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: orgueilleux.
    marker-yv: yv-n
  - type: text
    text: ' suscite des querelles,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui se confie en l’Eternel connaîtra l’abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Qui se fie à ses propres pensées n’est qu’un insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui suit la voie de la sagesse échappera aux dangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qui donne aux pauvres ne sera pas dans le besoin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se bouche les yeux à la misère d’autrui se charge de beaucoup de malédictions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Quand les méchants parviennent au pouvoir, tout le monde se cache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais quand ils succombent, les justes se multiplient.
