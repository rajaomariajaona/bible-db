document_id: PRO.28,21
type_code: fra
verses:
  '1':
  - type: text
    content: Les criminels prennent la fuite sans que personne les poursuive.
  - type: text
    content: Les justes sont confiants comme un jeune lion.
  '10':
  - type: text
    content: Qui égare les justes dans une mauvaise voie tombera lui-même dans la fosse qu’il a creusée,
  - type: text
    content: mais les hommes intègres connaîtront le bonheur.
  '11':
  - type: text
    content: L’homme riche se prend pour un sage,
  - type: text
    content: mais le pauvre qui est intelligent le démasque.
  '12':
  - type: text
    content: Quand les justes triomphent, c’est magnifique,
  - type: text
    content: mais quand les méchants accèdent au pouvoir, chacun se tient caché.
  '13':
  - type: text
    content: Qui cache ses fautes ne prospérera pas,
  - type: text
    content: qui les avoue et les délaisse obtient miséricorde.
  '14':
  - type: text
    content: Heureux l’homme qui a constamment la crainte de faire du mal,
  - type: text
    content: mais celui qui s’obstine tombera dans le malheur.
  '15':
  - type: text
    content: Un souverain méchant régnant sur un peuple pauvre
  - type: text
    content: est comme un lion rugissant ou un ours qui charge.
  '16':
  - type: text
    content: Un despote dépourvu d’intelligence multiplie les exactions,
  - type: text
    content: mais celui qui déteste le gain mal acquis vivra de longs jours.
  '17':
  - type: text
    content: 'L’homme accablé à cause du meurtre qu’il a commis court vers la tombe :'
  - type: text
    content: que personne ne l’en empêche !
  '18':
  - type: text
    content: Qui mène une vie intègre trouvera le salut,
  - type: text
    content: mais l’homme corrompu qui suit deux chemins à la fois tombera dans l’un ou l’autre.
  '19':
  - type: text
    content: Qui travaille sa terre aura du pain en abondance,
  - type: text
    content: qui court après des futilités sera rassasié de misère.
  '2':
  - type: text
    content: Quand la révolte règne dans un pays, les chefs se multiplient
  - type: note
    content: 'Voir, par exemple, les changements rapides de souverains en Israël : 1 R 16.8-28 ; 2 R 15.8-15.'
  - type: text
    content: ','
  - type: text
    content: mais, avec un homme intelligent et qui a du savoir, l’ordre règne.
  '20':
  - type: text
    content: L’homme loyal sera comblé de bénédictions,
  - type: text
    content: mais qui veut s’enrichir rapidement ne restera pas impuni.
  '21':
  - type: text
    content: Celui qui est partial n’agit pas bien,
  - type: text
    content: et pourtant, un homme est capable de faire le mal pour une bouchée de pain.
  '22':
  - type: text
    content: L’homme envieux se hâte de s’enrichir,
  - type: text
    content: il ne se rend pas compte que la pauvreté va fondre sur lui.
  '23':
  - type: text
    content: Qui reprend son prochain gagnera finalement sa faveur,
  - type: text
    content: plutôt que l’homme au langage flatteur.
  '24':
  - type: text
    content: Qui dépouille son père et sa mère
  - type: text
    content: et prétend que ce n’est pas un péché
  - type: text
    content: est le compagnon de celui qui détruit.
  '25':
  - type: text
    content: L’homme insatiable
  - type: note
    content: 'Autre traduction : orgueilleux.'
  - type: text
    content: ' suscite des querelles,'
  - type: text
    content: mais celui qui se confie en l’Eternel connaîtra l’abondance.
  '26':
  - type: text
    content: Qui se fie à ses propres pensées n’est qu’un insensé,
  - type: text
    content: mais celui qui suit la voie de la sagesse échappera aux dangers.
  '27':
  - type: text
    content: Qui donne aux pauvres ne sera pas dans le besoin,
  - type: text
    content: qui se bouche les yeux à la misère d’autrui se charge de beaucoup de malédictions.
  '28':
  - type: text
    content: Quand les méchants parviennent au pouvoir, tout le monde se cache,
  - type: text
    content: mais quand ils succombent, les justes se multiplient.
  '3':
  - type: text
    content: Un homme pauvre
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : un méchant.'
  - type: text
    content: ' qui opprime les indigents'
  - type: text
    content: est comme une pluie dévastatrice qui provoque la disette
  - type: note
    content: Une pluie porteuse d’espoir pour l’agriculteur, mais qui déçoit par sa brutalité.
  - type: text
    content: .
  '4':
  - type: text
    content: Ceux qui abandonnent la loi exaltent le criminel,
  - type: text
    content: mais ceux qui obéissent à la loi le combattent.
  '5':
  - type: text
    content: Ceux qui s’adonnent au mal ne comprennent rien à la droiture,
  - type: text
    content: mais ceux qui s’attachent à l’Eternel comprennent tout.
  '6':
  - type: text
    content: Mieux vaut un pauvre qui se conduit de façon intègre
  - type: text
    content: qu’un riche qui suit des chemins tortueux.
  '7':
  - type: text
    content: Qui observe la loi est un fils intelligent,
  - type: text
    content: qui recherche la compagnie des jouisseurs
  - type: note
    content: 'Autre traduction : des gens vils.'
  - type: text
    content: ' fait honte à son père.'
  '8':
  - type: text
    content: Celui qui augmente sa fortune par un intérêt usurier
  - type: note
    content: Voir Ex 22.25 ; Lv 25.35-37 ; Dt 23.20-21 (cf. Ez 22.12).
  - type: text
    content: amasse des biens pour celui qui a compassion des pauvres.
  '9':
  - type: text
    content: Si quelqu’un se détourne pour ne pas écouter la loi,
  - type: text
    content: sa prière même est en horreur à Dieu.
