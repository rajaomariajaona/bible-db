document_id: ECC.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La privation du bonheur
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Ne pas pouvoir jouir de ses biens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai constaté qu’il y a un mal sous le soleil, et ce mal est grand pour les hommes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui est a déjà été nommé, et l’on sait ce qu’est l’homme : il ne peut pas contester avec celui qui est plus puissant que lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus on multiplie les paroles, plus on accroît la frustration. Et à quoi cela avance-t-il l’homme ?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finalement, qui peut savoir ce qui est bon pour l’homme pendant sa vie, pendant chaque jour de son existence dérisoire qui fuit comme une ombre ? Et qui pourra lui révéler quel sera son avenir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: révéler ce qui arrivera après lui.
      marker-yv: yv-n
    - type: text
      text: ' sous le soleil ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quelqu’un à qui Dieu a donné richesses, biens et honneurs, si bien qu’il ne lui manque rien de ce qu’il désire. Mais Dieu ne lui donne pas la possibilité d’en profiter, et c’est un autre qui en profitera. Cela aussi est dérisoire ; c’est un mal affligeant.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Vivre longtemps, mais dans le malheur
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un homme peut avoir cent enfants et vivre de nombreuses années, mais quelque nombreux que soient les jours de son existence, s’il n’a pas joui du bonheur, et s’il n’a même pas de sépulture, je dis qu’un enfant mort-né a un sort meilleur que le sien. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’avorton est né en vain, il s’en va dans les ténèbres et son souvenir sombre dans la nuit de l’oubli. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’a pas vu le soleil, il n’a rien connu du monde. Il est donc plus tranquille que cet homme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A quoi bon vivre deux fois mille ans si on ne goûte pas au bonheur ? Finalement, tous ne s’acheminent-ils pas vers le même lieu ?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Rester insatisfait
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme ne trime que pour répondre à ses besoins, et pourtant son appétit n’est jamais satisfait. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’a le sage de plus que l’insensé ? Quel avantage le pauvre a-t-il de savoir se conduire sur le chemin de la vie ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mieux vaut ce qu’on a dans la main que ce vers quoi se porte le désir. Cela aussi est dérisoire : autant courir après le vent.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Quand le silence vaut mieux que la parole
    marker-yv: yv-h
