document_id: ECC.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La privation du bonheur
  - type: heading
    content: Ne pas pouvoir jouir de ses biens
  - type: text
    content: 'J’ai constaté qu’il y a un mal sous le soleil, et ce mal est grand pour les hommes. '
  '10':
  - type: text
    content: 'Ce qui est a déjà été nommé, et l’on sait ce qu’est l’homme : il ne peut pas contester avec celui qui est plus puissant que lui. '
  '11':
  - type: text
    content: Plus on multiplie les paroles, plus on accroît la frustration. Et à quoi cela avance-t-il l’homme ?
  '12':
  - type: text
    content: Finalement, qui peut savoir ce qui est bon pour l’homme pendant sa vie, pendant chaque jour de son existence dérisoire qui fuit comme une ombre ? Et qui pourra lui révéler quel sera son avenir
  - type: note
    content: 'Autre traduction : révéler ce qui arrivera après lui.'
  - type: text
    content: ' sous le soleil ?'
  '2':
  - type: text
    content: Voilà quelqu’un à qui Dieu a donné richesses, biens et honneurs, si bien qu’il ne lui manque rien de ce qu’il désire. Mais Dieu ne lui donne pas la possibilité d’en profiter, et c’est un autre qui en profitera. Cela aussi est dérisoire ; c’est un mal affligeant.
  - type: heading
    content: Vivre longtemps, mais dans le malheur
  '3':
  - type: text
    content: 'Un homme peut avoir cent enfants et vivre de nombreuses années, mais quelque nombreux que soient les jours de son existence, s’il n’a pas joui du bonheur, et s’il n’a même pas de sépulture, je dis qu’un enfant mort-né a un sort meilleur que le sien. '
  '4':
  - type: text
    content: 'Car l’avorton est né en vain, il s’en va dans les ténèbres et son souvenir sombre dans la nuit de l’oubli. '
  '5':
  - type: text
    content: 'Il n’a pas vu le soleil, il n’a rien connu du monde. Il est donc plus tranquille que cet homme. '
  '6':
  - type: text
    content: A quoi bon vivre deux fois mille ans si on ne goûte pas au bonheur ? Finalement, tous ne s’acheminent-ils pas vers le même lieu ?
  - type: heading
    content: Rester insatisfait
  '7':
  - type: text
    content: 'L’homme ne trime que pour répondre à ses besoins, et pourtant son appétit n’est jamais satisfait. '
  '8':
  - type: text
    content: 'Qu’a le sage de plus que l’insensé ? Quel avantage le pauvre a-t-il de savoir se conduire sur le chemin de la vie ? '
  '9':
  - type: text
    content: 'Mieux vaut ce qu’on a dans la main que ce vers quoi se porte le désir. Cela aussi est dérisoire : autant courir après le vent.'
  - type: heading
    content: Quand le silence vaut mieux que la parole
