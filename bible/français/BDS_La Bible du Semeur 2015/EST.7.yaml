document_id: EST.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Esther présente sa requête
  - type: text
    content: 'L’empereur et Haman arrivèrent donc pour festoyer avec l’impératrice Esther. '
  '10':
  - type: text
    content: On pendit donc Haman à la potence qu’il avait préparée pour Mardochée. Alors la colère de l’empereur s’apaisa.
  '2':
  - type: text
    content: 'Ce deuxième jour, pendant que l’on buvait le vin, l’empereur demanda de nouveau à Esther : Dis-moi quelle est ta requête, impératrice Esther ? Elle te sera accordée. Quelle est ta demande ? Même si c’est la moitié de mon empire, tu l’obtiendras.'
  '3':
  - type: text
    content: 'L’impératrice Esther répondit : Si l’empereur veut m’accorder une faveur, si l’empereur le veut bien, que la vie sauve me soit accordée, c’est là ma requête. Que la vie sauve soit aussi accordée à mon peuple, telle est ma demande. '
  '4':
  - type: text
    content: En effet, moi et mon peuple, nous avons été livrés pour être massacrés, tués et exterminés. Si nous avions seulement été vendus
  - type: note
    content: 'Voir 3.9 et 4.7  : Esther avait été informée de la transaction proposée par Haman.'
  - type: text
    content: ' comme esclaves et servantes, j’aurais gardé le silence ; car, dans ce cas, notre infortune ne vaudrait pas la peine que l’on importune l’empereur'
  - type: note
    content: 'Autre traduction : …j’aurais gardé le silence ; mais la compensation offerte par notre adversaire n’est pas comparable au préjudice que l’empereur va subir.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Alors l’empereur Xerxès demanda à l’impératrice Esther : Qui est-il, celui qui a eu l’audace de concevoir un tel dessein ? Où est-il ?'
  '6':
  - type: text
    content: 'Esther répondit : Le persécuteur, l’ennemi, c’est Haman, ce misérable !'
  - type: text
    content: 'Alors Haman fut épouvanté, devant l’empereur et l’impératrice. '
  '7':
  - type: text
    content: 'Furieux, l’empereur laissa son vin, se leva et sortit dans le jardin du palais. Haman, voyant bien que, dans l’esprit de l’empereur, son malheur était décidé, resta là pour implorer l’impératrice Esther pour sa vie. '
  '8':
  - type: text
    content: 'L’empereur revint du jardin à la salle du festin au moment où Haman se laissait tomber sur le divan où Esther était allongée. Du coup, l’empereur s’écria : Veut-il en plus faire violence à l’impératrice en ma présence dans mon palais ?'
  - type: text
    content: A peine l’empereur eut-il prononcé ces mots que l’on recouvrit la tête
  - type: note
    content: On recouvrait la tête des condamnés à mort.
  - type: text
    content: ' de Haman. '
  '9':
  - type: text
    content: 'Harbona, l’un des eunuques, dit alors devant l’empereur : Il y a justement cette potence que Haman a fait faire pour Mardochée, qui a parlé pour le bien de l’empereur. Elle se trouve dans la cour de Haman et elle a vingt-cinq mètres de haut.'
  - type: text
    content: 'L’empereur ordonna : Qu’on l’y pende !'
