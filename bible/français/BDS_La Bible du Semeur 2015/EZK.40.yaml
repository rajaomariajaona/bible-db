  - type: text
    text: 'Ensuite il me conduisit dans le portique du Temple et mesura les piliers qui s’y trouvaient : ils avaient cinq coudées de chaque côté. La porte avait quatorze coudées de large et ses murs latéraux avaient trois coudées de chaque côté'
