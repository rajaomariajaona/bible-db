document_id: EZK.40
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La vision du Temple et du pays restaurés
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nouveau temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La vingt-cinquième année de notre captivité, au début de l’année, le dixième jour du premier mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en mars-avril 573 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', c’est-à-dire quatorze ans après la prise de la ville de Jérusalem, exactement le même jour, la main de l’Eternel se posa sur moi et il me transporta là-bas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il m’emmena, dans des visions reçues de Dieu, au pays d’Israël et me déposa sur une très haute montagne sur laquelle s’élevaient, du côté du sud, des constructions qui ressemblaient à une ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 2-3, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.10
        metadata:
          usfm: REV.21.10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: REV.21.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand il m’eut conduit là-bas, j’aperçus un individu qui paraissait de bronze et qui portait dans sa main un cordeau de lin pour mesurer et une règle d’arpenteur ; il se tenait près de la porte de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cet individu me dit : Fils d’homme, regarde bien de tes yeux et écoute de toutes tes oreilles, fais bien attention à tout ce que je vais te montrer, car c’est pour te le faire voir que tu as été amené ici. Tu raconteras à la communauté d’Israël tout ce que tu verras.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Mur d’enceinte et parvis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans les chapitres 40 à 48, les mesures ne sont pas converties en centimètres ou en mètres pour conserver le symbolisme des nombres bibliques. La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'coudée longue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'devait faire à peu près 52 centimètres, la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'règle d’arpenteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: plus de 3 mètres.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que je vis : un mur extérieur entourait le Temple de tous côtés, et le personnage tenait en main une règle d’arpenteur longue de six coudées, en prenant la coudée longue, un peu plus grande que la coudée ordinaire. Il mesura l’épaisseur des murs de cette construction : elle correspondait à la longueur de sa règle. Il trouva la même dimension pour la hauteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis il alla vers la porte qui faisait face à l’orient et il en gravit les marches. Il mesura le seuil de la porte qui avait une largeur égale à la longueur de sa règle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu ajoute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le seuil avait une largeur égale à une longueur de règle. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces mots sont omis dans l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le long du passage qui s’ouvrait se trouvaient des loges de garde carrées dont chaque côté faisait une longueur de règle ; elles étaient séparées par des murs de cinq coudées d’épaisseur. Le seuil de la porte, depuis le portique, à l’intérieur avait la longueur d’une règle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le personnage mesura ce portique : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: huit coudées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nous suivons les versions. Le texte hébreu ajoute en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40.8'
        metadata:
          usfm: EZK.40.8
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
        metadata:
          usfm: EZK.9
      - type: text
        text: '  : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’homme mesura ce portique : il avait la longueur d’une règle. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Il mesura le portique : huit coudées.'
    marker-yv: yv-n
  - type: text
    text: '. Les deux piliers avaient deux coudées d’épaisseur. Ce portique de la porte était situé du côté intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il y avait trois loges de garde de chaque côté du couloir de la porte orientale. Elles avaient toutes les trois les mêmes dimensions, et les piliers qui se trouvaient de chaque côté avaient tous les trois la même épaisseur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le personnage mesura ensuite la porte, à l’entrée : elle avait dix coudées de large, et puis la longueur de la porte : treize coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Devant les loges de garde il y avait, à gauche et à droite du couloir central, un muret d’une coudée de hauteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’épaisseur.
    marker-yv: yv-n
  - type: text
    text: ' et chaque loge avait six coudées de côté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis il mesura toute la largeur de la porte, du fond d’une loge au fond de l’autre : en passant par leurs portes qui se faisaient face, il trouva vingt-cinq coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il mesura le portique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: portique
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les piliers.
    marker-yv: yv-n
  - type: text
    text: ' qui avait vingt coudées'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 60 coudées.
    marker-yv: yv-n
  - type: text
    text: '. Autour du portique de la porte se trouvait le parvis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Du front de la porte d’entrée jusque devant le portique de la porte, à l’intérieur, il y avait cinquante coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les loges de garde et leurs piliers étaient munis de fenêtres grillagées s’ouvrant depuis l’intérieur, autour de la porte ; il en était de même du portique qui avait des fenêtres autour, s’ouvrant depuis l’intérieur. Sur chaque pilier étaient sculptés des palmiers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis le personnage me conduisit vers le parvis extérieur où se trouvaient des salles. Un dallage faisait tout le tour du parvis. Trente salles donnaient sur ce dallage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'qui s’étendait de chaque côté des portes sur une longueur égale à la leur. C’était le dallage inférieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le personnage mesura la distance entre la façade de la porte inférieure jusqu’à celle du parvis intérieur, il trouva cent coudées. Voilà pour l’est.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En ce qui concerne le nord : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'il mesura aussi la longueur et la largeur de la porte faisant face au nord, sur le parvis extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ses loges – trois d’un côté et trois de l’autre – ses piliers et son portique avaient les mêmes dimensions que celles de la première porte : cinquante coudées de long et vingt-cinq coudées de large ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ses fenêtres, son portique et ses palmiers avaient aussi les mêmes dimensions que ceux de la porte orientale. On y accédait par sept degrés et l’on avait alors le portique devant soi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Une porte donnait sur le parvis intérieur, en face de la porte nord ; il en était de même en face de la porte orientale. Le personnage mesura la distance d’une porte à l’autre : il trouva cent coudées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ensuite il me conduisit du côté sud où je vis la porte méridionale. Il en mesura les piliers et le portique qui avaient les mêmes dimensions que les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tout autour de cette porte et de son portique, il y avait des fenêtres pareilles aux autres : les dimensions étaient, là aussi, de cinquante coudées de long sur vingt-cinq de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On y accédait par sept marches devant lesquelles se trouvait le portique. Des palmiers étaient sculptés de part et d’autre sur ces piliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le parvis intérieur avait aussi une porte du côté sud. L’homme mesura la distance d’une porte à l’autre en direction du sud et il trouva cent coudées.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les portes du parvis intérieur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis il me fit entrer dans le parvis intérieur par la porte sud et il mesura la porte méridionale qui avait les mêmes dimensions que les précédentes ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ses loges de garde, ses piliers et son portique avaient des dimensions identiques aux précédents. La porte et le portique étaient aussi garnis de fenêtres tout autour. L’ensemble faisait cinquante coudées de long et vingt-cinq de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il y avait, tout autour, des portiques de vingt-cinq coudées de longueur et de cinq coudées de largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Son portique donnait sur le parvis extérieur, ses piliers étaient ornés de palmiers et son escalier avait huit marches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Puis il me conduisit dans le parvis intérieur par le côté est et il mesura la porte qui avait les mêmes dimensions que les autres : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'loges de garde, piliers et portique avaient des mesures identiques aux précédents. La porte et son portique étaient aussi garnis de fenêtres tout autour. L’ensemble faisait cinquante coudées de long et vingt-cinq de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Son portique donnait sur le parvis extérieur, ses piliers étaient ornés de palmiers de chaque côté et on y montait par huit marches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Puis le personnage me fit entrer par la porte nord et il y trouva les mêmes dimensions qu’ailleurs : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'loges, piliers, portique avaient cinquante coudées de long sur vingt-cinq de large. Cette porte avait comme les autres des loges, des piliers, un portique et des fenêtres tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Son portique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 14 et note.
    marker-yv: yv-n
  - type: text
    text: ' donnait sur le parvis extérieur, ses piliers étaient, de part et d’autre, garnis de palmiers, et on y montait par huit marches.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dans le parvis intérieur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Une salle s’ouvrait entre les piliers de la porte ; c’est là que l’on nettoyait les holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dans le portique de la porte se trouvaient deux tables de chaque côté sur lesquelles étaient égorgées les victimes destinées aux holocaustes, aux sacrifices pour le péché et aux sacrifices de réparation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Sur le côté extérieur, à l’endroit où l’on montait vers l’entrée de la porte nord, il y avait deux tables et deux autres du côté opposé près du portique de la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il y avait donc quatre tables d’une part et quatre de l’autre, sur les côtés de la porte, c’est-à-dire huit tables en tout sur lesquelles on égorgeait les victimes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il y avait de plus quatre tables carrées d’une coudée et demie de côté et une coudée de hauteur. Elles étaient en pierres de taille et servaient aux holocaustes. On y déposait les instruments avec lesquels on immolait les victimes pour les holocaustes et les autres sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tout autour, à l’intérieur, se trouvaient des rigoles larges d’une paume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire 8 centimètres.
    marker-yv: yv-n
  - type: text
    text: '. La chair des animaux offerts était déposée sur les tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: En dehors de la porte intérieure, dans le parvis intérieur, se trouvaient deux salles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque et la suite du verset. Texte hébrue traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des salles réservées aux musiciens. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence tient à une lettre en hébr.
    marker-yv: yv-n
  - type: text
    text: . L’une était située à côté de la porte nord et faisait face au sud. L’autre était à côté de la porte sud
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon l’ancienne version grecque et le fait que la façade est au nord. Texte hébrue traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la porte orientale.
    marker-yv: yv-n
  - type: text
    text: ', sa façade étant au nord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le personnage me dit : Cette salle dont la façade est au sud est réservée aux prêtres chargés du service du Temple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'et celle dont la façade est au nord est pour les prêtres qui assurent le service de l’autel : ce sont les descendants de Tsadoq'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tsadoq, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2.35
        metadata:
          usfm: 1KI.2.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' qui, parmi les descendants de Lévi, s’approchent de l’Eternel pour officier pour son culte.'
- type: usfm
  marker: s2
  children:
