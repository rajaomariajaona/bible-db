document_id: EZK.40,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vision du Temple et du pays restaurés
  - type: heading
    content: Le nouveau temple
  - type: text
    content: La vingt-cinquième année de notre captivité, au début de l’année, le dixième jour du premier mois
  - type: note
    content: C’est-à-dire en mars-avril 573 av. J.-C.
  - type: text
    content: ', c’est-à-dire quatorze ans après la prise de la ville de Jérusalem, exactement le même jour, la main de l’Eternel se posa sur moi et il me transporta là-bas. '
  '10':
  - type: text
    content: Il y avait trois loges de garde de chaque côté du couloir de la porte orientale. Elles avaient toutes les trois les mêmes dimensions, et les piliers qui se trouvaient de chaque côté avaient tous les trois la même épaisseur.
  '11':
  - type: text
    content: 'Le personnage mesura ensuite la porte, à l’entrée : elle avait dix coudées de large, et puis la longueur de la porte : treize coudées. '
  '12':
  - type: text
    content: Devant les loges de garde il y avait, à gauche et à droite du couloir central, un muret d’une coudée de hauteur
  - type: note
    content: 'Autre traduction : d’épaisseur.'
  - type: text
    content: ' et chaque loge avait six coudées de côté. '
  '13':
  - type: text
    content: 'Puis il mesura toute la largeur de la porte, du fond d’une loge au fond de l’autre : en passant par leurs portes qui se faisaient face, il trouva vingt-cinq coudées. '
  '14':
  - type: text
    content: Il mesura le portique
  - type: note
    content: 'portique: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : les piliers.'
  - type: text
    content: ' qui avait vingt coudées'
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : 60 coudées.'
  - type: text
    content: '. Autour du portique de la porte se trouvait le parvis. '
  '15':
  - type: text
    content: 'Du front de la porte d’entrée jusque devant le portique de la porte, à l’intérieur, il y avait cinquante coudées. '
  '16':
  - type: text
    content: Les loges de garde et leurs piliers étaient munis de fenêtres grillagées s’ouvrant depuis l’intérieur, autour de la porte ; il en était de même du portique qui avait des fenêtres autour, s’ouvrant depuis l’intérieur. Sur chaque pilier étaient sculptés des palmiers.
  '17':
  - type: text
    content: 'Puis le personnage me conduisit vers le parvis extérieur où se trouvaient des salles. Un dallage faisait tout le tour du parvis. Trente salles donnaient sur ce dallage, '
  '18':
  - type: text
    content: 'qui s’étendait de chaque côté des portes sur une longueur égale à la leur. C’était le dallage inférieur. '
  '19':
  - type: text
    content: Le personnage mesura la distance entre la façade de la porte inférieure jusqu’à celle du parvis intérieur, il trouva cent coudées. Voilà pour l’est.
  - type: text
    content: 'En ce qui concerne le nord : '
  '2':
  - type: text
    content: Il m’emmena, dans des visions reçues de Dieu, au pays d’Israël et me déposa sur une très haute montagne sur laquelle s’élevaient, du côté du sud, des constructions qui ressemblaient à une ville
  - type: note
    content: Pour les v. 2-3, voir Ap 21.10, 15.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'il mesura aussi la longueur et la largeur de la porte faisant face au nord, sur le parvis extérieur. '
  '21':
  - type: text
    content: 'Ses loges – trois d’un côté et trois de l’autre – ses piliers et son portique avaient les mêmes dimensions que celles de la première porte : cinquante coudées de long et vingt-cinq coudées de large ; '
  '22':
  - type: text
    content: 'ses fenêtres, son portique et ses palmiers avaient aussi les mêmes dimensions que ceux de la porte orientale. On y accédait par sept degrés et l’on avait alors le portique devant soi. '
  '23':
  - type: text
    content: 'Une porte donnait sur le parvis intérieur, en face de la porte nord ; il en était de même en face de la porte orientale. Le personnage mesura la distance d’une porte à l’autre : il trouva cent coudées.'
  '24':
  - type: text
    content: 'Ensuite il me conduisit du côté sud où je vis la porte méridionale. Il en mesura les piliers et le portique qui avaient les mêmes dimensions que les autres. '
  '25':
  - type: text
    content: 'Tout autour de cette porte et de son portique, il y avait des fenêtres pareilles aux autres : les dimensions étaient, là aussi, de cinquante coudées de long sur vingt-cinq de large. '
  '26':
  - type: text
    content: 'On y accédait par sept marches devant lesquelles se trouvait le portique. Des palmiers étaient sculptés de part et d’autre sur ces piliers. '
  '27':
  - type: text
    content: Le parvis intérieur avait aussi une porte du côté sud. L’homme mesura la distance d’une porte à l’autre en direction du sud et il trouva cent coudées.
  - type: heading
    content: Les portes du parvis intérieur
  '28':
  - type: text
    content: 'Puis il me fit entrer dans le parvis intérieur par la porte sud et il mesura la porte méridionale qui avait les mêmes dimensions que les précédentes ; '
  '29':
  - type: text
    content: 'ses loges de garde, ses piliers et son portique avaient des dimensions identiques aux précédents. La porte et le portique étaient aussi garnis de fenêtres tout autour. L’ensemble faisait cinquante coudées de long et vingt-cinq de large. '
  '3':
  - type: text
    content: 'Quand il m’eut conduit là-bas, j’aperçus un individu qui paraissait de bronze et qui portait dans sa main un cordeau de lin pour mesurer et une règle d’arpenteur ; il se tenait près de la porte de la ville. '
  '30':
  - type: text
    content: 'Il y avait, tout autour, des portiques de vingt-cinq coudées de longueur et de cinq coudées de largeur. '
  '31':
  - type: text
    content: Son portique donnait sur le parvis extérieur, ses piliers étaient ornés de palmiers et son escalier avait huit marches.
  '32':
  - type: text
    content: 'Puis il me conduisit dans le parvis intérieur par le côté est et il mesura la porte qui avait les mêmes dimensions que les autres : '
  '33':
  - type: text
    content: 'loges de garde, piliers et portique avaient des mesures identiques aux précédents. La porte et son portique étaient aussi garnis de fenêtres tout autour. L’ensemble faisait cinquante coudées de long et vingt-cinq de large. '
  '34':
  - type: text
    content: Son portique donnait sur le parvis extérieur, ses piliers étaient ornés de palmiers de chaque côté et on y montait par huit marches.
  '35':
  - type: text
    content: 'Puis le personnage me fit entrer par la porte nord et il y trouva les mêmes dimensions qu’ailleurs : '
  '36':
  - type: text
    content: 'loges, piliers, portique avaient cinquante coudées de long sur vingt-cinq de large. Cette porte avait comme les autres des loges, des piliers, un portique et des fenêtres tout autour. '
  '37':
  - type: text
    content: Son portique
  - type: note
    content: Voir v. 14 et note.
  - type: text
    content: ' donnait sur le parvis extérieur, ses piliers étaient, de part et d’autre, garnis de palmiers, et on y montait par huit marches.'
  - type: heading
    content: Dans le parvis intérieur
  '38':
  - type: text
    content: 'Une salle s’ouvrait entre les piliers de la porte ; c’est là que l’on nettoyait les holocaustes. '
  '39':
  - type: text
    content: 'Dans le portique de la porte se trouvaient deux tables de chaque côté sur lesquelles étaient égorgées les victimes destinées aux holocaustes, aux sacrifices pour le péché et aux sacrifices de réparation. '
  '4':
  - type: text
    content: 'Cet individu me dit : Fils d’homme, regarde bien de tes yeux et écoute de toutes tes oreilles, fais bien attention à tout ce que je vais te montrer, car c’est pour te le faire voir que tu as été amené ici. Tu raconteras à la communauté d’Israël tout ce que tu verras.'
  - type: heading
    content: Mur d’enceinte et parvisDans les chapitres 40 à 48, les mesures ne sont pas converties en centimètres ou en mètres pour conserver le symbolisme des nombres bibliques. La coudée longue devait faire à peu près 52 centimètres, la règle d’arpenteur plus de 3 mètres.
  '40':
  - type: text
    content: 'Sur le côté extérieur, à l’endroit où l’on montait vers l’entrée de la porte nord, il y avait deux tables et deux autres du côté opposé près du portique de la porte. '
  '41':
  - type: text
    content: 'Il y avait donc quatre tables d’une part et quatre de l’autre, sur les côtés de la porte, c’est-à-dire huit tables en tout sur lesquelles on égorgeait les victimes. '
  '42':
  - type: text
    content: 'Il y avait de plus quatre tables carrées d’une coudée et demie de côté et une coudée de hauteur. Elles étaient en pierres de taille et servaient aux holocaustes. On y déposait les instruments avec lesquels on immolait les victimes pour les holocaustes et les autres sacrifices. '
  '43':
  - type: text
    content: Tout autour, à l’intérieur, se trouvaient des rigoles larges d’une paume
  - type: note
    content: C’est-à-dire 8 centimètres.
  - type: text
    content: '. La chair des animaux offerts était déposée sur les tables. '
  '44':
  - type: text
    content: En dehors de la porte intérieure, dans le parvis intérieur, se trouvaient deux salles
  - type: note
    content: 'D’après l’ancienne version grecque et la suite du verset. Texte hébrue traditionnel : des salles réservées aux musiciens. La différence tient à une lettre en hébr.'
  - type: text
    content: . L’une était située à côté de la porte nord et faisait face au sud. L’autre était à côté de la porte sud
  - type: note
    content: 'Selon l’ancienne version grecque et le fait que la façade est au nord. Texte hébrue traditionnel : la porte orientale.'
  - type: text
    content: ', sa façade étant au nord.'
  '45':
  - type: text
    content: 'Le personnage me dit : Cette salle dont la façade est au sud est réservée aux prêtres chargés du service du Temple, '
  '46':
  - type: text
    content: 'et celle dont la façade est au nord est pour les prêtres qui assurent le service de l’autel : ce sont les descendants de Tsadoq'
  - type: note
    content: Sur Tsadoq, voir 1 R 2.35.
  - type: text
    content: ' qui, parmi les descendants de Lévi, s’approchent de l’Eternel pour officier pour son culte.'
  - type: heading
    content: Le portique du Temple
  '47':
  - type: text
    content: 'Puis il mesura le parvis, qui formait un carré de cent coudées de côté. L’autel se trouvait devant le Temple. '
  '48':
  - type: text
    content: 'Ensuite il me conduisit dans le portique du Temple et mesura les piliers qui s’y trouvaient : ils avaient cinq coudées de chaque côté. La porte avait quatorze coudées de large et ses murs latéraux avaient trois coudées de chaque côté'
  - type: note
    content: 'La porte… côté: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : et la porte avait trois coudées de large de chaque côté.'
  - type: text
    content: '. '
  '49':
  - type: text
    content: Le portique avait vingt coudées sur douze
  - type: note
    content: 'D’après l’ancienne version grecque et les données indiquées en 41.13. Le texte hébreu traditionnel a : onze.'
  - type: text
    content: . On y accédait par des marches et, de chaque côté, près des piliers, se dressait une colonne.
  '5':
  - type: text
    content: 'Voici ce que je vis : un mur extérieur entourait le Temple de tous côtés, et le personnage tenait en main une règle d’arpenteur longue de six coudées, en prenant la coudée longue, un peu plus grande que la coudée ordinaire. Il mesura l’épaisseur des murs de cette construction : elle correspondait à la longueur de sa règle. Il trouva la même dimension pour la hauteur. '
  '6':
  - type: text
    content: Puis il alla vers la porte qui faisait face à l’orient et il en gravit les marches. Il mesura le seuil de la porte qui avait une largeur égale à la longueur de sa règle
  - type: note
    content: 'L’hébreu ajoute : le seuil avait une largeur égale à une longueur de règle. Ces mots sont omis dans l’ancienne version grecque.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Le long du passage qui s’ouvrait se trouvaient des loges de garde carrées dont chaque côté faisait une longueur de règle ; elles étaient séparées par des murs de cinq coudées d’épaisseur. Le seuil de la porte, depuis le portique, à l’intérieur avait la longueur d’une règle. '
  '8':
  - type: text
    content: 'Le personnage mesura ce portique : '
  '9':
  - type: text
    content: huit coudées
  - type: note
    content: 'Nous suivons les versions. Le texte hébreu ajoute en 40.8 et 9  : 8 l’homme mesura ce portique : il avait la longueur d’une règle. 9 Il mesura le portique : huit coudées.'
  - type: text
    content: '. Les deux piliers avaient deux coudées d’épaisseur. Ce portique de la porte était situé du côté intérieur. '
