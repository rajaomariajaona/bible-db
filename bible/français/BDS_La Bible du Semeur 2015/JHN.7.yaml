document_id: JHN.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus à la fête des Cabanes
  - type: text
    content: 'Après cela, Jésus continua à parcourir la Galilée ; il voulait en effet éviter la Judée où les Juifs cherchaient à le supprimer. '
  '10':
  - type: text
    content: 'Cependant, quand ses frères furent partis pour la fête, il s’y rendit lui aussi, mais secrètement, sans se montrer. '
  '11':
  - type: text
    content: 'Or, pendant la fête, les Juifs le cherchaient et demandaient : Où est-il donc ?'
  '12':
  - type: text
    content: 'Dans la foule, les discussions allaient bon train à son sujet. Les uns disaient : C’est quelqu’un de bien.'
  - type: text
    content: '– Pas du tout, répondaient les autres : il trompe tout le monde.'
  '13':
  - type: text
    content: Mais, comme ils avaient tous peur des Juifs, personne n’osait parler librement de lui.
  - type: heading
    content: L’opposition grandit
  '14':
  - type: text
    content: 'La moitié de la semaine de fête était déjà passée, quand Jésus alla au Temple et se mit à enseigner. '
  '15':
  - type: text
    content: 'Les Juifs en étaient tout étonnés et se demandaient : Comment peut-il connaître à ce point les Ecritures, sans avoir jamais étudié ?'
  '16':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Rien de ce que j’enseigne ne vient de moi. J’ai tout reçu de celui qui m’a envoyé.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Si quelqu’un est décidé à faire la volonté de Dieu, il reconnaîtra bien si mon enseignement vient de Dieu ou si je parle de ma propre initiative.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Celui qui parle en son propre nom recherche sa propre gloire. Mais si quelqu’un vise à honorer celui qui l’a envoyé, c’est un homme vrai ; il n’y a rien de faux en lui.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Moïse
  - type: text
    content: ' vous a donné la '
  - type: text
    content: Loi
  - type: text
    content: ', et pourtant, aucun de vous ne fait ce qu’elle ordonne ! Pourquoi cherchez-vous à me tuer ?'
  '2':
  - type: text
    content: Cependant, on se rapprochait de la fête juive des Cabanes
  - type: note
    content: Cette fête, d’une durée de huit jours, rappelait l’époque où les Israélites vivaient sous des tentes, dans le désert, après la sortie d’Egypte. Jérusalem était durant cette semaine un centre de rassemblement des Juifs venus de tout le pays.
  - type: text
    content: .
  '20':
  - type: text
    content: – Tu as un démon en toi ! lui cria la foule. Qui est-ce qui veut te tuer ?
  '21':
  - type: text
    content: 'Jésus reprit la parole et leur dit : '
  - type: text
    content: Il a suffi que je fasse une œuvre pour que vous soyez tous dans l’étonnement.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Réfléchissez : Moïse vous a donné l’ordre de pratiquer la '
  - type: text
    content: circoncision
  - type: text
    content: ', rite qui ne vient d’ailleurs pas de Moïse, mais des patriarches. Or, cela ne vous dérange pas de circoncire quelqu’un le jour du '
  - type: text
    content: sabbat
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: Eh bien, si on circoncit un garçon le jour du sabbat pour respecter la Loi de Moïse, pourquoi donc vous indignez-vous contre moi parce que j’ai entièrement guéri un homme le jour du sabbat ?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Cessez donc de juger selon les apparences, et apprenez à porter des jugements conformes à ce qui est juste.
  '25':
  - type: text
    content: 'En le voyant, quelques habitants de Jérusalem s’étonnaient : N’est-ce pas celui qu’ils veulent faire mourir ? '
  '26':
  - type: text
    content: 'Or, le voilà qui parle librement en public et personne ne lui dit rien ! Est-ce que, par hasard, nos autorités auraient reconnu qu’il est vraiment le Messie ? '
  '27':
  - type: text
    content: Pourtant, lui, nous savons d’où il est ; mais le Messie, quand il viendra, personne ne saura d’où il est.
  '28':
  - type: text
    content: 'Alors Jésus intervint d’une voix forte, et on l’entendit dans toute la cour du Temple : '
  - type: text
    content: Vraiment ! Vous me connaissez et vous savez d’où je suis ! Sachez-le, je ne suis pas venu de ma propre initiative. C’est celui qui est véridique qui m’a envoyé. Vous ne le connaissez pas.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Moi, je le connais, car je viens d’auprès de lui, et c’est lui qui m’a envoyé.
  '3':
  - type: text
    content: 'Ses frères lui dirent alors : Tu devrais quitter cette région et te rendre en Judée pour que, là aussi, tes disciples puissent voir les œuvres que tu accomplis. '
  '30':
  - type: text
    content: 'Alors plusieurs essayèrent de l’arrêter, et pourtant personne ne mit la main sur lui, parce que son heure n’était pas encore venue. '
  '31':
  - type: text
    content: Cependant, beaucoup, parmi la foule, crurent en lui.
  - type: text
    content: – Quand le Messie viendra, disaient-ils, accomplira-t-il plus de signes miraculeux que n’en a déjà fait cet homme-là ?
  '32':
  - type: text
    content: Ce qui se murmurait ainsi dans la foule au sujet de Jésus parvint aux oreilles des pharisiens. Alors les chefs des prêtres et les pharisiens envoyèrent des gardes du Temple pour procéder à son arrestation.
  '33':
  - type: text
    content: 'Jésus déclara : '
  - type: text
    content: Je suis encore pour un peu de temps parmi vous. Ensuite je retournerai auprès de celui qui m’a envoyé.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Vous me chercherez, et vous ne me trouverez pas ; et vous ne pouvez pas aller là où je serai.
  '35':
  - type: text
    content: 'Sur quoi, ses auditeurs se demandèrent entre eux : Où va-t-il aller pour que nous ne le trouvions pas ? Aurait-il l’intention de se rendre chez les Juifs dispersés parmi les non-Juifs ? Voudrait-il peut-être même apporter son enseignement aux non-Juifs ? '
  '36':
  - type: text
    content: 'Que peut-il bien vouloir dire quand il déclare : '
  - type: text
    content: « Vous me chercherez et vous ne me trouverez pas ; et vous ne pouvez pas aller là où je serai » ?
  - type: heading
    content: L’eau vive
  '37':
  - type: text
    content: 'Le dernier jour de la fête, le jour le plus solennel, Jésus se tint devant la foule et lança à pleine voix : '
  - type: text
    content: Si quelqu’un a soif, qu’il vienne à moi, et que celui qui croit en moi boive.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Car, comme le dit l’Ecriture, '
  - type: text
    content: des fleuves d’eau vive jailliront de lui
  - type: note
    content: 'de lui: c’est-à-dire de Christ, comme le suggère le v. 39. Jésus est le vrai Temple (Jn 2.21) d’où jaillissent les fleuves d’eau vive : Ez 47.1-12 ; Jl 4.18 ; Za 14.8 (voir 13.1). D’autres comprennent, en changeant la ponctuation : 37 Si quelqu’un a soif, qu’il vienne à moi et qu’il boive. Celui qui croit en moi, 38 des fleuves d’eau vive jailliront de lui, comme le dit l’Ecriture.'
  - type: text
    content: .
  - type: text
    content: ' '
  '39':
  - type: text
    content: En disant cela, il faisait allusion à l’Esprit que devaient recevoir plus tard ceux qui croiraient en lui. En effet, à ce moment-là, l’Esprit n’avait pas encore été donné parce que Jésus n’était pas encore entré dans sa gloire.
  - type: heading
    content: Pour ou contre Jésus ?
  '4':
  - type: text
    content: Quand on veut être connu, on n’agit pas avec tant de discrétion. Puisque tu accomplis de si grandes choses, fais en sorte que tout le monde le voie.
  '40':
  - type: text
    content: 'Dans la foule, plusieurs de ceux qui avaient entendu ces paroles disaient : Pas de doute : cet homme est bien le Prophète attendu.'
  '41':
  - type: text
    content: 'D’autres affirmaient : C’est le Messie.'
  - type: text
    content: '– Mais, objectaient certains, le Messie pourrait-il venir de la Galilée ? '
  '42':
  - type: text
    content: L’Ecriture ne dit-elle pas que le Messie sera un descendant de David et qu’il naîtra à Bethléhem
  - type: note
    content: Cette remarque se fonde sur 2 S 7.12 ; Mi 5.1. Beaucoup ne savaient pas que Jésus était né à Bethléhem en Judée, mais croyaient plutôt qu’il était né en Galilée, d’où il était venu.
  - type: text
    content: ', le village où David a vécu ?'
  '43':
  - type: text
    content: 'Ainsi, le peuple se trouva de plus en plus divisé à cause de lui. '
  '44':
  - type: text
    content: Quelques-uns voulaient l’arrêter mais personne n’osa porter la main sur lui.
  '45':
  - type: text
    content: 'Les gardes du Temple retournèrent auprès des chefs des prêtres et des pharisiens. Ceux-ci leur demandèrent : Pourquoi ne l’avez-vous pas amené ?'
  '46':
  - type: text
    content: 'Ils répondirent : Personne n’a jamais parlé comme cet homme.'
  '47':
  - type: text
    content: '– Quoi, répliquèrent les pharisiens, vous aussi, vous vous y êtes laissé prendre ? '
  '48':
  - type: text
    content: 'Est-ce qu’un seul des chefs ou un seul des pharisiens a cru en lui ? '
  '49':
  - type: text
    content: Il n’y a que ces gens du peuple qui ne connaissent rien à la Loi… ce sont tous des maudits !
  '5':
  - type: text
    content: 'En effet, les frères de Jésus eux-mêmes ne croyaient pas en lui. '
  '50':
  - type: text
    content: 'Là-dessus, l’un d’entre eux, Nicodème, celui qui, précédemment, était venu trouver Jésus, leur dit : '
  '51':
  - type: text
    content: Notre Loi nous permet-elle de condamner un homme sans l’avoir entendu et sans savoir ce qu’il a fait de mal ?
  '52':
  - type: text
    content: – Es-tu, toi aussi, de la Galilée ? lui répondirent-ils. Consulte les Ecritures, et tu verras qu’aucun prophète ne sort de la Galilée.
  - type: text
    content: '['
  '53':
  - type: text
    content: Là-dessus chacun rentra chez soi.
  '6':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Le moment n’est pas encore venu pour moi. En revanche, pour vous, c’est toujours le bon moment.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Le monde n’a aucune raison de vous haïr ; mais moi, il me déteste parce que je témoigne que ses actes sont mauvais.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Vous donc, allez à la fête ; pour ma part, je n’y vais pas encore
  - type: note
    content: 'Certains manuscrits ont : je n’y vais pas.'
  - type: text
    content: ' '
  - type: text
    content: car le moment n’est pas encore venu pour moi.
  '9':
  - type: text
    content: 'Après leur avoir dit cela, il resta en Galilée. '
