document_id: JHN.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus à la fête des Cabanes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Jésus continua à parcourir la Galilée ; il voulait en effet éviter la Judée où les Juifs cherchaient à le supprimer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, quand ses frères furent partis pour la fête, il s’y rendit lui aussi, mais secrètement, sans se montrer. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, pendant la fête, les Juifs le cherchaient et demandaient : Où est-il donc ?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la foule, les discussions allaient bon train à son sujet. Les uns disaient : C’est quelqu’un de bien.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Pas du tout, répondaient les autres : il trompe tout le monde.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, comme ils avaient tous peur des Juifs, personne n’osait parler librement de lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’opposition grandit
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La moitié de la semaine de fête était déjà passée, quand Jésus alla au Temple et se mit à enseigner. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs en étaient tout étonnés et se demandaient : Comment peut-il connaître à ce point les Ecritures, sans avoir jamais étudié ?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rien de ce que j’enseigne ne vient de moi. J’ai tout reçu de celui qui m’a envoyé.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un est décidé à faire la volonté de Dieu, il reconnaîtra bien si mon enseignement vient de Dieu ou si je parle de ma propre initiative.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui parle en son propre nom recherche sa propre gloire. Mais si quelqu’un vise à honorer celui qui l’a envoyé, c’est un homme vrai ; il n’y a rien de faux en lui.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' vous a donné la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: ', et pourtant, aucun de vous ne fait ce qu’elle ordonne ! Pourquoi cherchez-vous à me tuer ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, on se rapprochait de la fête juive des Cabanes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette fête, d’une durée de huit jours, rappelait l’époque où les Israélites vivaient sous des tentes, dans le désert, après la sortie d’Egypte. Jérusalem était durant cette semaine un centre de rassemblement des Juifs venus de tout le pays.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tu as un démon en toi ! lui cria la foule. Qui est-ce qui veut te tuer ?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus reprit la parole et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il a suffi que je fasse une œuvre pour que vous soyez tous dans l’étonnement.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Réfléchissez : Moïse vous a donné l’ordre de pratiquer la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: circoncision
      - type: text
        text: ', rite qui ne vient d’ailleurs pas de Moïse, mais des patriarches. Or, cela ne vous dérange pas de circoncire quelqu’un le jour du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
      - type: text
        text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eh bien, si on circoncit un garçon le jour du sabbat pour respecter la Loi de Moïse, pourquoi donc vous indignez-vous contre moi parce que j’ai entièrement guéri un homme le jour du sabbat ?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cessez donc de juger selon les apparences, et apprenez à porter des jugements conformes à ce qui est juste.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En le voyant, quelques habitants de Jérusalem s’étonnaient : N’est-ce pas celui qu’ils veulent faire mourir ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, le voilà qui parle librement en public et personne ne lui dit rien ! Est-ce que, par hasard, nos autorités auraient reconnu qu’il est vraiment le Messie ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pourtant, lui, nous savons d’où il est ; mais le Messie, quand il viendra, personne ne saura d’où il est.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus intervint d’une voix forte, et on l’entendit dans toute la cour du Temple : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vraiment ! Vous me connaissez et vous savez d’où je suis ! Sachez-le, je ne suis pas venu de ma propre initiative. C’est celui qui est véridique qui m’a envoyé. Vous ne le connaissez pas.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moi, je le connais, car je viens d’auprès de lui, et c’est lui qui m’a envoyé.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses frères lui dirent alors : Tu devrais quitter cette région et te rendre en Judée pour que, là aussi, tes disciples puissent voir les œuvres que tu accomplis. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors plusieurs essayèrent de l’arrêter, et pourtant personne ne mit la main sur lui, parce que son heure n’était pas encore venue. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, beaucoup, parmi la foule, crurent en lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Quand le Messie viendra, disaient-ils, accomplira-t-il plus de signes miraculeux que n’en a déjà fait cet homme-là ?
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qui se murmurait ainsi dans la foule au sujet de Jésus parvint aux oreilles des pharisiens. Alors les chefs des prêtres et les pharisiens envoyèrent des gardes du Temple pour procéder à son arrestation.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus déclara : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis encore pour un peu de temps parmi vous. Ensuite je retournerai auprès de celui qui m’a envoyé.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous me chercherez, et vous ne me trouverez pas ; et vous ne pouvez pas aller là où je serai.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur quoi, ses auditeurs se demandèrent entre eux : Où va-t-il aller pour que nous ne le trouvions pas ? Aurait-il l’intention de se rendre chez les Juifs dispersés parmi les non-Juifs ? Voudrait-il peut-être même apporter son enseignement aux non-Juifs ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que peut-il bien vouloir dire quand il déclare : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Vous me chercherez et vous ne me trouverez pas ; et vous ne pouvez pas aller là où je serai » ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’eau vive
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dernier jour de la fête, le jour le plus solennel, Jésus se tint devant la foule et lança à pleine voix : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un a soif, qu’il vienne à moi, et que celui qui croit en moi boive.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car, comme le dit l’Ecriture, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: des fleuves d’eau vive jailliront de lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de lui
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire de Christ, comme le suggère le v. 39. Jésus est le vrai Temple (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 2.21
        - type: text
          text: ') d’où jaillissent les fleuves d’eau vive : Ez 47.1-12 ; Jl 4.18 ; Za 14.8 (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.1'
        - type: text
          text: '). D’autres comprennent, en changeant la ponctuation : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '37 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Si quelqu’un a soif, qu’il vienne à moi et qu’il boive. Celui qui croit en moi, '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '38 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des fleuves d’eau vive jailliront de lui, comme le dit l’Ecriture.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En disant cela, il faisait allusion à l’Esprit que devaient recevoir plus tard ceux qui croiraient en lui. En effet, à ce moment-là, l’Esprit n’avait pas encore été donné parce que Jésus n’était pas encore entré dans sa gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pour ou contre Jésus ?
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand on veut être connu, on n’agit pas avec tant de discrétion. Puisque tu accomplis de si grandes choses, fais en sorte que tout le monde le voie.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la foule, plusieurs de ceux qui avaient entendu ces paroles disaient : Pas de doute : cet homme est bien le Prophète attendu.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres affirmaient : C’est le Messie.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Mais, objectaient certains, le Messie pourrait-il venir de la Galilée ? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Ecriture ne dit-elle pas que le Messie sera un descendant de David et qu’il naîtra à Bethléhem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette remarque se fonde sur 2 S 7.12 ; Mi 5.1. Beaucoup ne savaient pas que Jésus était né à Bethléhem en Judée, mais croyaient plutôt qu’il était né en Galilée, d’où il était venu.
      marker-yv: yv-n
    - type: text
      text: ', le village où David a vécu ?'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, le peuple se trouva de plus en plus divisé à cause de lui. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quelques-uns voulaient l’arrêter mais personne n’osa porter la main sur lui.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gardes du Temple retournèrent auprès des chefs des prêtres et des pharisiens. Ceux-ci leur demandèrent : Pourquoi ne l’avez-vous pas amené ?'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent : Personne n’a jamais parlé comme cet homme.'
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Quoi, répliquèrent les pharisiens, vous aussi, vous vous y êtes laissé prendre ? '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Est-ce qu’un seul des chefs ou un seul des pharisiens a cru en lui ? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y a que ces gens du peuple qui ne connaissent rien à la Loi… ce sont tous des maudits !
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, les frères de Jésus eux-mêmes ne croyaient pas en lui. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, l’un d’entre eux, Nicodème, celui qui, précédemment, était venu trouver Jésus, leur dit : '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Notre Loi nous permet-elle de condamner un homme sans l’avoir entendu et sans savoir ce qu’il a fait de mal ?
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Es-tu, toi aussi, de la Galilée ? lui répondirent-ils. Consulte les Ecritures, et tu verras qu’aucun prophète ne sort de la Galilée.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '['
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là-dessus chacun rentra chez soi.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le moment n’est pas encore venu pour moi. En revanche, pour vous, c’est toujours le bon moment.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le monde n’a aucune raison de vous haïr ; mais moi, il me déteste parce que je témoigne que ses actes sont mauvais.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous donc, allez à la fête ; pour ma part, je n’y vais pas encore
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n’y vais pas.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car le moment n’est pas encore venu pour moi.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après leur avoir dit cela, il resta en Galilée. '
