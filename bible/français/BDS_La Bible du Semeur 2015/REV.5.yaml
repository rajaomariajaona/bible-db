document_id: REV.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre scellé de sept sceaux et l’Agneau égorgé
  - type: text
    content: Alors je vis dans la main droite de celui qui siégeait sur le trône un livre écrit à l’intérieur et à l’extérieur. Il était scellé de sept sceaux
  - type: note
    content: Le livre est un testament en forme de rouleau.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tu as fait d’eux
  - type: text
    content: un peuple de rois et de prêtres
  - type: text
    content: pour notre Dieu,
  - type: text
    content: et ils régneront sur la terre.
  '11':
  - type: text
    content: 'Puis je vis, et j’entendis la voix d’anges rassemblés en grand nombre autour du trône, des êtres vivants et des représentants du peuple de Dieu. Ils étaient des milliers de milliers et des millions de millions. '
  '12':
  - type: text
    content: 'Ils disaient d’une voix forte :'
  - type: text
    content: Il est digne,
  - type: text
    content: l’Agneau qui fut égorgé,
  - type: text
    content: de recevoir la puissance,
  - type: text
    content: la richesse, ╵la sagesse ╵et la force,
  - type: text
    content: l’honneur et la gloire et la louange.
  '13':
  - type: text
    content: 'Et toutes les créatures dans le ciel, sur la terre, sous la terre et sur la mer, tous les êtres qui peuplent l’univers, je les entendis proclamer :'
  - type: text
    content: A celui
  - type: text
    content: qui siège sur le trône
  - type: text
    content: et à l’Agneau
  - type: text
    content: soient louange et honneur,
  - type: text
    content: gloire et puissance
  - type: text
    content: pour toute éternité.
  '14':
  - type: text
    content: 'Les quatre êtres vivants répondaient : « Amen », et les représentants du peuple de Dieu se prosternèrent et adorèrent.'
  '2':
  - type: text
    content: 'Je vis aussi un ange puissant qui proclamait d’une voix forte : Qui est digne d’ouvrir le livre et d’en rompre les sceaux ?'
  '3':
  - type: text
    content: Mais personne, ni au ciel, ni sur la terre, ni sous la terre, n’était capable d’ouvrir le livre ni de le lire.
  '4':
  - type: text
    content: 'Je me mis à pleurer abondamment parce qu’on ne trouvait personne qui fût digne d’ouvrir le livre et de le lire. '
  '5':
  - type: text
    content: 'Alors l’un des représentants du peuple de Dieu me dit : Ne pleure pas. Voici : il a remporté la victoire, le lion de la tribu de Juda'
  - type: note
    content: Titre du Messie se référant à Gn 49.8-10 où Juda est comparé à un lion.
  - type: text
    content: ', '
  - type: text
    content: 'le rejeton de la racine de '
  - type: text
    content: David
  - type: note
    content: Voir Es 11.1, 10.
  - type: text
    content: ', pour ouvrir le livre et ses sept sceaux.'
  '6':
  - type: text
    content: Alors je vis, au milieu du trône et des quatre êtres vivants et au milieu des représentants du peuple de Dieu, un Agneau qui se tenait debout. Il semblait avoir été égorgé. Il avait sept cornes et sept yeux
  - type: note
    content: Dans la Bible, la corne symbolise la puissance, les yeux la connaissance, sept la perfection, la totalité (voir Za 3.9 ; 4.10).
  - type: text
    content: ', qui sont les sept esprits de Dieu envoyés par toute la terre.'
  '7':
  - type: text
    content: 'L’Agneau s’avança pour recevoir le livre de la main droite de celui qui siégeait sur le trône. '
  '8':
  - type: text
    content: 'Lorsqu’il eut pris le livre, les quatre êtres vivants et les vingt-quatre représentants du peuple de Dieu se prosternèrent devant l’Agneau. Ils avaient chacun une harpe et des coupes d’or remplies d’encens qui représentent les prières des membres du peuple saint. '
  '9':
  - type: text
    content: 'Et ils chantaient un cantique nouveau :'
  - type: text
    content: Tu es seul digne
  - type: text
    content: de recevoir le livre,
  - type: text
    content: et d’en briser les sceaux
  - type: text
    content: car tu as été égorgé
  - type: text
    content: et tu as racheté pour Dieu,
  - type: text
    content: grâce à ton sacrifice,
  - type: text
    content: des hommes de toute tribu,
  - type: text
    content: de toute langue, de tout peuple,
  - type: text
    content: de toutes les nations.
