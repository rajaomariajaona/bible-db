document_id: REV.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre scellé de sept sceaux et l’Agneau égorgé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Alors je vis dans la main droite de celui qui siégeait sur le trône un livre écrit à l’intérieur et à l’extérieur. Il était scellé de sept sceaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le livre est un testament en forme de rouleau.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vis aussi un ange puissant qui proclamait d’une voix forte : Qui est digne d’ouvrir le livre et d’en rompre les sceaux ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais personne, ni au ciel, ni sur la terre, ni sous la terre, n’était capable d’ouvrir le livre ni de le lire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me mis à pleurer abondamment parce qu’on ne trouvait personne qui fût digne d’ouvrir le livre et de le lire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors l’un des représentants du peuple de Dieu me dit : Ne pleure pas. Voici : il a remporté la victoire, le lion de la tribu de Juda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Titre du Messie se référant à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 49.8-10
        metadata:
          usfm: GEN.49.8+GEN.49.9+GEN.49.10
      - type: text
        text: ' où Juda est comparé à un lion.'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'le rejeton de la racine de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 11.1
        metadata:
          usfm: ISA.11.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
        metadata:
          usfm: ISA.11.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', pour ouvrir le livre et ses sept sceaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors je vis, au milieu du trône et des quatre êtres vivants et au milieu des représentants du peuple de Dieu, un Agneau qui se tenait debout. Il semblait avoir été égorgé. Il avait sept cornes et sept yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans la Bible, la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'corne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'symbolise la puissance, les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'la connaissance, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sept '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la perfection, la totalité (voir Za 3.9 ; 4.10).
    marker-yv: yv-n
  - type: text
    text: ', qui sont les sept esprits de Dieu envoyés par toute la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Agneau s’avança pour recevoir le livre de la main droite de celui qui siégeait sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsqu’il eut pris le livre, les quatre êtres vivants et les vingt-quatre représentants du peuple de Dieu se prosternèrent devant l’Agneau. Ils avaient chacun une harpe et des coupes d’or remplies d’encens qui représentent les prières des membres du peuple saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et ils chantaient un cantique nouveau :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es seul digne
- type: usfm
  marker: q1
  children:
  - type: text
    text: de recevoir le livre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’en briser les sceaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as été égorgé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as racheté pour Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à ton sacrifice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des hommes de toute tribu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toute langue, de tout peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu as fait d’eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peuple de rois et de prêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils régneront sur la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis je vis, et j’entendis la voix d’anges rassemblés en grand nombre autour du trône, des êtres vivants et des représentants du peuple de Dieu. Ils étaient des milliers de milliers et des millions de millions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils disaient d’une voix forte :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est digne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Agneau qui fut égorgé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de recevoir la puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la richesse, ╵la sagesse ╵et la force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’honneur et la gloire et la louange.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et toutes les créatures dans le ciel, sur la terre, sous la terre et sur la mer, tous les êtres qui peuplent l’univers, je les entendis proclamer :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A celui
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui siège sur le trône
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à l’Agneau
- type: usfm
  marker: q1
  children:
  - type: text
    text: soient louange et honneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gloire et puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour toute éternité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les quatre êtres vivants répondaient : « Amen », et les représentants du peuple de Dieu se prosternèrent et adorèrent.'
