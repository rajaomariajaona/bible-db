      text: Jérémie s’adresse à Baruch
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici ce que le prophète Jérémie dit à Baruch, fils de Nériya, quand celui-ci écrivit ces paroles dans un rouleau sous la dictée de Jérémie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', la quatrième année du règne de Yehoyaqim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 605 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', fils de Josias, roi de Juda : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, Baruch, ce que te déclare l’Eternel, Dieu d’Israël : '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as dit : « Malheur à moi, car l’Eternel accumule pour moi tourments et affliction ! Je suis épuisé à force de gémir et je ne trouve plus de repos. »'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lui diras donc ceci : Voici ce que déclare l’Eternel : Regarde. Ce que j’avais bâti, je le détruis, et ce que j’avais planté, je l’arrache. Il en est ainsi à travers tout le pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et toi, tu as pour toi-même des ambitions ? N’y songe pas ! Car je fais venir le malheur sur tout le monde, l’Eternel le déclare. Mais je t’accorde la vie sauve partout où tu iras. Tu auras au moins cette part-là.
