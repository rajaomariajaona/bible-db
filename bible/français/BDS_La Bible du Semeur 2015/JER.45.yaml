document_id: JER.45,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie s’adresse à Baruch
  - type: text
    content: Voici ce que le prophète Jérémie dit à Baruch, fils de Nériya, quand celui-ci écrivit ces paroles dans un rouleau sous la dictée de Jérémie
  - type: note
    content: Voir Jr 36.
  - type: text
    content: ', la quatrième année du règne de Yehoyaqim'
  - type: note
    content: En 605 av. J.-C.
  - type: text
    content: ', fils de Josias, roi de Juda : '
  '2':
  - type: text
    content: 'Voici, Baruch, ce que te déclare l’Eternel, Dieu d’Israël : '
  '3':
  - type: text
    content: 'Tu as dit : « Malheur à moi, car l’Eternel accumule pour moi tourments et affliction ! Je suis épuisé à force de gémir et je ne trouve plus de repos. »'
  '4':
  - type: text
    content: 'Tu lui diras donc ceci : Voici ce que déclare l’Eternel : Regarde. Ce que j’avais bâti, je le détruis, et ce que j’avais planté, je l’arrache. Il en est ainsi à travers tout le pays. '
  '5':
  - type: text
    content: Et toi, tu as pour toi-même des ambitions ? N’y songe pas ! Car je fais venir le malheur sur tout le monde, l’Eternel le déclare. Mais je t’accorde la vie sauve partout où tu iras. Tu auras au moins cette part-là.
