document_id: 1SA.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour du coffre de l’alliance en Israël
  - type: text
    content: 'Pendant sept mois le coffre de l’Eternel fut dans le pays des Philistins. '
  '10':
  - type: text
    content: 'Les Philistins suivirent ces instructions : ils prirent deux vaches qui allaitaient et les attelèrent au chariot, tout en enfermant leurs veaux dans l’étable. '
  '11':
  - type: text
    content: 'Ils placèrent le coffre de l’Eternel sur le chariot, ainsi que le coffret contenant les rats en or et les représentations de tumeurs. '
  '12':
  - type: text
    content: Les vaches prirent tout droit la direction de Beth-Shémesh, elles suivirent en meuglant toujours le même chemin, sans en dévier ni à droite ni à gauche ; les princes des Philistins marchèrent derrière elles jusqu’à la frontière, vers Beth-Shémesh.
  '13':
  - type: text
    content: Les habitants de Beth-Shémesh étaient en train de moissonner
  - type: note
    content: Cette moisson avait lieu entre mi-avril et mi-juin.
  - type: text
    content: ' les blés dans la vallée. Tout à coup, ils aperçurent le coffre et s’en réjouirent. '
  '14':
  - type: text
    content: L’attelage arriva au champ de Josué de Beth-Shémesh
  - type: note
    content: Personnage différent du Josué successeur de Moïse.
  - type: text
    content: ' et s’arrêta là à côté d’une grande pierre. On fendit le bois du chariot et l’on offrit les vaches en holocaustes à l’Eternel. '
  '15':
  - type: text
    content: Des lévites avaient enlevé du char le coffre de l’Eternel et le coffret contenant les objets d’or et ils les avaient déposés sur la grande pierre. Ce même jour, les habitants de Beth-Shémesh offrirent des holocaustes et d’autres sacrifices à l’Eternel
  - type: note
    content: Beth-Shémesh était une ville lévitique (Jos 21.16). Les lévites seuls étaient habilités à transporter le coffre sacré (Dt 10.8).
  - type: text
    content: '. '
  '16':
  - type: text
    content: Quand les cinq princes des Philistins virent cela, ils retournèrent ce même jour à Eqrôn.
  '17':
  - type: text
    content: 'Les Philistins avaient donné à l’Eternel en offrande de réparation cinq objets d’or représentant leurs tumeurs, une pour chacune de leurs villes principales : Ashdod, Gaza, Ashkelôn, Gath et Eqrôn. '
  '18':
  - type: text
    content: Il y avait aussi des rats en or, selon le nombre des villes soumises aux cinq princes philistins, depuis les villes fortifiées jusqu’aux villages ouverts. La grande pierre
  - type: note
    content: 'D’après quelques manuscrits hébreux, l’ancienne version grecque et la version syriaque. La plupart des manuscrits hébreux portent : et jusqu’à Abel la Grande.'
  - type: text
    content: ' sur laquelle fut déposé le coffre de l’Eternel sert encore aujourd’hui de témoin dans le champ de Josué à Beth-Shémesh.'
  '19':
  - type: text
    content: L’Eternel frappa soixante-dix habitants
  - type: note
    content: 'D’après quelques manuscrits hébreux. La plupart des manuscrits du texte hébreu traditionnel et l’ancienne version grecque portent : 50 070.'
  - type: text
    content: ' de Beth-Shémesh parce qu’ils avaient regardé dans le coffre de l’Eternel. Le peuple prit le deuil à cause de ce grand fléau que l’Eternel leur avait infligé. '
  '2':
  - type: text
    content: 'Alors les Philistins convoquèrent leurs prêtres et leurs devins pour leur demander : Que ferons-nous du coffre de l’Eternel ? Faites-nous savoir de quelle manière nous devons procéder pour le renvoyer dans son pays !'
  '20':
  - type: text
    content: 'Les gens de Beth-Shémesh dirent : Qui pourrait subsister devant l’Eternel, ce Dieu saint ? Chez qui pourrions-nous envoyer le coffre sacré pour le faire partir de chez nous ?'
  '21':
  - type: text
    content: Ils envoyèrent des messagers aux habitants de Qiryath-Yearim
  - type: note
    content: A quelque 13 kilomètres au nord-ouest de Jérusalem (voir Jos 9.17 ; 15.9).
  - type: text
    content: ' pour leur dire : Les Philistins ont restitué le coffre de l’Eternel, venez donc le chercher pour l’emporter chez vous.'
  '3':
  - type: text
    content: – Si vous renvoyez le coffre du Dieu d’Israël, dirent-ils, ne le renvoyez pas à vide. Faites-le accompagner d’un présent pour expier votre faute ! Alors vous serez guéris et vous saurez pourquoi il n’a cessé de sévir contre vous.
  '4':
  - type: text
    content: – Mais quelle sorte de réparation devons-nous lui offrir ? demandèrent les gens.
  - type: text
    content: 'Ils leur répondirent : Vous ferez cinq représentations en or'
  - type: note
    content: Selon une coutume païenne qui consistait à offrir ces représentations à la divinité comme vœu de guérison.
  - type: text
    content: ' des tumeurs qui vous ont affligés et cinq rats en or selon le nombre des princes des Philistins, car le même fléau a atteint tout le monde – y compris vos princes. '
  '5':
  - type: text
    content: 'Vous fabriquerez donc des effigies de vos tumeurs et des rats qui dévastent le pays, et vous les offrirez en hommage au Dieu d’Israël. Peut-être cessera-t-il de vous frapper sévèrement, vous, vos dieux et votre pays. '
  '6':
  - type: text
    content: 'Ne vous obstinez pas comme les Egyptiens et le pharaon. Rappelez-vous qu’après avoir été malmenés par ce Dieu, ils ont dû laisser partir les Israélites. '
  '7':
  - type: text
    content: 'Maintenant donc, fabriquez un chariot neuf et prenez deux vaches qui allaitent et qui n’ont pas encore porté le joug. Attelez-les au chariot et séparez-les de leurs petits que vous ramènerez à l’étable ! '
  '8':
  - type: text
    content: 'Prenez le coffre de l’Eternel et placez-le sur le chariot ! Déposez dans un coffret que vous mettrez à côté de lui les objets d’or que vous offrez à Dieu pour réparer votre faute, ensuite vous laisserez partir l’attelage. '
  '9':
  - type: text
    content: 'Vous le suivrez des yeux : si les vaches se dirigent vers la frontière du pays d’Israël du côté de Beth-Shémesh'
  - type: note
    content: Ville située à 25 kilomètres à l’ouest de Jérusalem, dans le pays de Juda (Jos 15.10 ; 21.16).
  - type: text
    content: ', cela veut dire que c’est leur Dieu qui nous a infligé tous ces grands malheurs ; sinon, nous conclurons que ce n’est pas lui qui nous a frappés ; mais que cela nous est arrivé par hasard.'
