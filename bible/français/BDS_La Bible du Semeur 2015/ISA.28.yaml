document_id: ISA.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre des malheurs
  - type: heading
    content: Malheur à Ephraïm
  - type: text
    content: Malheur au diadème
  - type: note
    content: Il s’agit de Samarie, située sur un mont qui domine une riche plaine.
  - type: text
    content: ' ╵qui fait l’orgueil ╵des buveurs d’Ephraïm,'
  - type: text
    content: à cette fleur fanée, ╵qui orne sa parure,
  - type: text
    content: et qui est située sur les sommets ╵qui dominent la vallée plantureuse,
  - type: text
    content: oui, malheur à cette cité ╵des hommes qui s’enivrent.
  '10':
  - type: text
    content: Car c’est ordre sur ordre, ╵ordre sur ordre,
  - type: text
    content: 'et c’est règle sur règle, ╵règle sur règle :'
  - type: text
    content: un peu par ci, ╵un peu par là
  - type: note
    content: En hébreu, très certainement une suite d’onomatopées.
  - type: text
    content: . »
  '11':
  - type: text
    content: Eh bien, c’est par des hommes ╵aux propos inintelligibles
  - type: text
    content: à la langue barbare,
  - type: text
    content: que l’Eternel parlera à ce peuple
  - type: note
    content: Pour les v. 11-12, voir 33.19. Cité en 1 Co 14.21.
  '12':
  - type: text
    content: 'auquel il avait dit : ╵« C’est ici le repos,'
  - type: text
    content: laissez se reposer ╵ceux qui sont fatigués ;
  - type: text
    content: voici l’apaisement. »
  - type: text
    content: Mais ils n’ont pas voulu ╵écouter l’Eternel.
  '13':
  - type: text
    content: 'C’est pourquoi la parole ╵de l’Eternel sera pour eux :'
  - type: text
    content: ordre sur ordre, ╵ordre sur ordre,
  - type: text
    content: règle sur règle, ╵règle sur règle,
  - type: text
    content: un peu par ci, ╵un peu par là,
  - type: text
    content: de sorte qu’en marchant, ╵ils tombent en arrière ╵et se cassent les reins,
  - type: text
    content: qu’ils soient pris au filet ╵et qu’ils soient capturés.
  - type: heading
    content: Le bon fondement
  '14':
  - type: text
    content: C’est pourquoi, écoutez ╵ce que dit l’Eternel, ╵vous, les moqueurs,
  - type: text
    content: vous, les chefs de ce peuple ╵qui habite à Jérusalem.
  '15':
  - type: text
    content: 'Voici ce que vous dites : ╵« Nous avons fait ╵alliance avec la mort'
  - type: text
    content: 'et, avec le séjour des morts, ╵nous avons fait un pacte :'
  - type: text
    content: quand le flot débordant déferlera,
  - type: text
    content: il ne viendra pas jusqu’à nous,
  - type: text
    content: car nous nous sommes fait ╵du mensonge un abri,
  - type: text
    content: et la duplicité ╵sera notre refuge. »
  '16':
  - type: text
    content: 'C’est pourquoi, ainsi parle ╵le Seigneur, l’Eternel :'
  - type: text
    content: Je vais placer ╵en Sion, une pierre ╵servant de fondation,
  - type: text
    content: une pierre éprouvée, ╵une pierre angulaire
  - type: note
    content: Voir Ps 118.22-23 ; Za 3.9 ; 4.7, 10 ; Rm 9.33 ; 10.11 ; 1 P 2.6.
  - type: text
    content: ' ╵d’une grande valeur, ╵servant de fondement solide :'
  - type: text
    content: celui qui la prend pour appui ╵ne sera pas réduit à fuir.
  '17':
  - type: text
    content: J’aurai le droit pour règle,
  - type: text
    content: j’emploierai la justice ╵comme mon fil à plomb.
  - type: text
    content: La grêle balaiera ╵votre abri de mensonge,
  - type: text
    content: les eaux emporteront ╵votre refuge.
  - type: heading
    content: Le mauvais fondement
  '18':
  - type: text
    content: L’alliance avec la mort ╵que vous avez conclue ╵sera anéantie,
  - type: text
    content: et votre pacte ╵fait avec le séjour des morts ╵ne subsistera pas.
  - type: text
    content: Quand le flot débordant déferlera,
  - type: text
    content: il vous écrasera.
  '19':
  - type: text
    content: Aussi souvent qu’il passera, ╵il vous emportera,
  - type: text
    content: car il repassera ╵matin après matin, ╵de jour comme de nuit.
  - type: text
    content: Ce sera la terreur ╵que d’en comprendre le message.
  '2':
  - type: text
    content: 'Car voici : le Seigneur ╵a pour lui un héraut ╵puissant et vigoureux'
  - type: note
    content: Le roi d’Assyrie qui s’est emparé de Samarie en 722 av. J.-C.
  - type: text
    content: qui viendra attaquer ╵comme une tempête de grêle, ╵comme un ouragan destructeur,
  - type: text
    content: comme des trombes d’eaux impétueuses, ╵provoquant des inondations.
  - type: text
    content: Par l’action de sa force, ╵il précipitera la ville à terre.
  '20':
  - type: text
    content: Vous serez comme un homme ╵dont le lit est trop court ╵pour pouvoir s’y étendre
  - type: text
    content: et dont la couverture ╵est beaucoup trop étroite ╵pour qu’il s’en enveloppe.
  '21':
  - type: text
    content: Car l’Eternel se lèvera ╵comme au mont Peratsim
  - type: note
    content: Voir 2 S 5.20.
  - type: text
    content: et il s’indignera ╵comme il s’est indigné ╵dans la plaine de Gabaon
  - type: note
    content: Voir 1 Ch 14.16 ou Jos 10.10-12.
  - type: text
    content: pour accomplir son œuvre ;
  - type: text
    content: mais quelle œuvre insolite,
  - type: text
    content: pour faire son travail,
  - type: text
    content: mais quelle tâche étrange !
  '22':
  - type: text
    content: Et maintenant, ╵cessez de vous moquer,
  - type: text
    content: de peur que l’on resserre ╵les chaînes qui vous lient.
  - type: text
    content: Car j’ai appris de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: que la destruction de tout le pays ╵a été décidée.
  - type: heading
    content: La sagesse infinie
  '23':
  - type: text
    content: De toutes vos oreilles, ╵écoutez-moi !
  - type: text
    content: 'Ecoutez ma parole ╵bien attentivement :'
  '24':
  - type: text
    content: Quel laboureur ╵laboure la terre en tout temps ╵pour y semer ?
  - type: text
    content: Passe-t-il tout son temps ╵à tracer des sillons ╵et à herser le sol ?
  '25':
  - type: text
    content: Après avoir aplani la surface,
  - type: text
    content: il y répand l’aneth ╵et sème le cumin,
  - type: text
    content: il met le blé en lignes,
  - type: text
    content: puis l’orge au bon endroit,
  - type: text
    content: l’épeautre enfin à la lisière.
  '26':
  - type: text
    content: C’est son Dieu qui l’instruit ╵des règles qu’il doit suivre
  - type: text
    content: et c’est lui qui l’enseigne.
  '27':
  - type: text
    content: Car on ne foule pas l’aneth ╵à l’aide d’un rouleau,
  - type: text
    content: on ne fait pas non plus passer ╵une roue de chariot ╵par-dessus le cumin,
  - type: text
    content: mais on bat l’aneth au bâton,
  - type: text
    content: on bat le cumin au fléau.
  '28':
  - type: text
    content: Il est vrai qu’on broie le froment ╵pour en faire du pain,
  - type: text
    content: mais on ne le bat pas sans fin.
  - type: text
    content: On fait passer dessus ╵la roue et le traîneau,
  - type: text
    content: mais les chevaux ╵n’écrasent pas le grain ╵sous leurs sabots.
  '29':
  - type: text
    content: Tout cela vient de l’Eternel, ╵le Seigneur des armées célestes.
  - type: text
    content: Son plan est merveilleux,
  - type: text
    content: sa sagesse est immense.
  '3':
  - type: text
    content: On foulera aux pieds
  - type: text
    content: le diadème ╵qui fait l’orgueil ╵des buveurs d’Ephraïm.
  '4':
  - type: text
    content: Quant à la fleur fanée, ╵qui orne sa parure,
  - type: text
    content: et qui est située sur les sommets ╵qui dominent la vallée plantureuse,
  - type: text
    content: 'elle sera comme une figue ╵mûrie avant l’été :'
  - type: text
    content: celui qui l’aperçoit ╵la cueille sans tarder ╵et l’avale aussitôt.
  '5':
  - type: text
    content: En ce jour-là, ╵le Seigneur des armées célestes
  - type: text
    content: sera le diadème magnifique ╵et la couronne
  - type: text
    content: qui ornera ╵le reste de son peuple.
  '6':
  - type: text
    content: Il insufflera la justice ╵à qui rend la justice,
  - type: text
    content: et il sera la force ╵de celui qui repousse ╵l’ennemi jusqu’aux portes.
  - type: heading
    content: Les juges ivrognes
  '7':
  - type: text
    content: En voici d’autres ╵qui sont égarés par le vin
  - type: text
    content: et que les boissons fortes ╵font tituber.
  - type: text
    content: Oui, prêtres et prophètes, ╵les boissons fortes les égarent,
  - type: text
    content: le vin les étourdit
  - type: text
    content: et ils titubent sous l’effet ╵des boissons fortes,
  - type: text
    content: ils s’égarent dans leurs visions
  - type: text
    content: et ils vacillent ╵en rendant la justice.
  '8':
  - type: text
    content: Toutes les tables sont couvertes ╵de leurs vomissements infects
  - type: text
    content: et pas un coin n’est resté propre.
  '9':
  - type: text
    content: « Qui Esaïe ╵prétend-il enseigner ? ╵s’exclament-ils.
  - type: text
    content: Et à qui donc veut-il ╵expliquer son message ?
  - type: text
    content: Son discours convient juste ╵à de petits enfants ╵que l’on vient de sevrer,
  - type: text
    content: d’éloigner du sein maternel ?
