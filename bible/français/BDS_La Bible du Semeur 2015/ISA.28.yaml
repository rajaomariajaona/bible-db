document_id: ISA.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le livre des malheurs
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malheur à Ephraïm
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur au diadème
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de Samarie, située sur un mont qui domine une riche plaine.
      marker-yv: yv-n
    - type: text
      text: ' ╵qui fait l’orgueil ╵des buveurs d’Ephraïm,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cette fleur fanée, ╵qui orne sa parure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est située sur les sommets ╵qui dominent la vallée plantureuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, malheur à cette cité ╵des hommes qui s’enivrent.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car c’est ordre sur ordre, ╵ordre sur ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et c’est règle sur règle, ╵règle sur règle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un peu par ci, ╵un peu par là
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En hébreu, très certainement une suite d’onomatopées.
      marker-yv: yv-n
    - type: text
      text: . »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eh bien, c’est par des hommes ╵aux propos inintelligibles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la langue barbare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’Eternel parlera à ce peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 11-12, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '33.19'
        - type: text
          text: '. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Co 14.21
        - type: text
          text: .
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'auquel il avait dit : ╵« C’est ici le repos,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laissez se reposer ╵ceux qui sont fatigués ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici l’apaisement. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils n’ont pas voulu ╵écouter l’Eternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C’est pourquoi la parole ╵de l’Eternel sera pour eux :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ordre sur ordre, ╵ordre sur ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: règle sur règle, ╵règle sur règle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un peu par ci, ╵un peu par là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sorte qu’en marchant, ╵ils tombent en arrière ╵et se cassent les reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils soient pris au filet ╵et qu’ils soient capturés.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le bon fondement
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est pourquoi, écoutez ╵ce que dit l’Eternel, ╵vous, les moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, les chefs de ce peuple ╵qui habite à Jérusalem.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici ce que vous dites : ╵« Nous avons fait ╵alliance avec la mort'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et, avec le séjour des morts, ╵nous avons fait un pacte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand le flot débordant déferlera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne viendra pas jusqu’à nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous nous sommes fait ╵du mensonge un abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la duplicité ╵sera notre refuge. »
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'C’est pourquoi, ainsi parle ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais placer ╵en Sion, une pierre ╵servant de fondation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une pierre éprouvée, ╵une pierre angulaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 118.22-23 ; Za 3.9 ; 4.7, 10 ; Rm 9.33 ; 10.11 ; 1 P 2.6.
      marker-yv: yv-n
    - type: text
      text: ' ╵d’une grande valeur, ╵servant de fondement solide :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui la prend pour appui ╵ne sera pas réduit à fuir.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: J’aurai le droit pour règle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’emploierai la justice ╵comme mon fil à plomb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La grêle balaiera ╵votre abri de mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les eaux emporteront ╵votre refuge.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le mauvais fondement
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L’alliance avec la mort ╵que vous avez conclue ╵sera anéantie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et votre pacte ╵fait avec le séjour des morts ╵ne subsistera pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le flot débordant déferlera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vous écrasera.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aussi souvent qu’il passera, ╵il vous emportera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il repassera ╵matin après matin, ╵de jour comme de nuit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera la terreur ╵que d’en comprendre le message.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Car voici : le Seigneur ╵a pour lui un héraut ╵puissant et vigoureux'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le roi d’Assyrie qui s’est emparé de Samarie en 722 av. J.-C.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui viendra attaquer ╵comme une tempête de grêle, ╵comme un ouragan destructeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des trombes d’eaux impétueuses, ╵provoquant des inondations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’action de sa force, ╵il précipitera la ville à terre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous serez comme un homme ╵dont le lit est trop court ╵pour pouvoir s’y étendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont la couverture ╵est beaucoup trop étroite ╵pour qu’il s’en enveloppe.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Car l’Eternel se lèvera ╵comme au mont Peratsim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 5.20
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s’indignera ╵comme il s’est indigné ╵dans la plaine de Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 14.16
        - type: text
          text: ' ou '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 10.10-12
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour accomplir son œuvre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais quelle œuvre insolite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire son travail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais quelle tâche étrange !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Et maintenant, ╵cessez de vous moquer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur que l’on resserre ╵les chaînes qui vous lient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai appris de l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la destruction de tout le pays ╵a été décidée.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La sagesse infinie
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: De toutes vos oreilles, ╵écoutez-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ecoutez ma parole ╵bien attentivement :'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Quel laboureur ╵laboure la terre en tout temps ╵pour y semer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passe-t-il tout son temps ╵à tracer des sillons ╵et à herser le sol ?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Après avoir aplani la surface,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y répand l’aneth ╵et sème le cumin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il met le blé en lignes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis l’orge au bon endroit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’épeautre enfin à la lisière.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C’est son Dieu qui l’instruit ╵des règles qu’il doit suivre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est lui qui l’enseigne.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Car on ne foule pas l’aneth ╵à l’aide d’un rouleau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne fait pas non plus passer ╵une roue de chariot ╵par-dessus le cumin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais on bat l’aneth au bâton,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on bat le cumin au fléau.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il est vrai qu’on broie le froment ╵pour en faire du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais on ne le bat pas sans fin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On fait passer dessus ╵la roue et le traîneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les chevaux ╵n’écrasent pas le grain ╵sous leurs sabots.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tout cela vient de l’Eternel, ╵le Seigneur des armées célestes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son plan est merveilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa sagesse est immense.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: On foulera aux pieds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le diadème ╵qui fait l’orgueil ╵des buveurs d’Ephraïm.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quant à la fleur fanée, ╵qui orne sa parure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est située sur les sommets ╵qui dominent la vallée plantureuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elle sera comme une figue ╵mûrie avant l’été :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui l’aperçoit ╵la cueille sans tarder ╵et l’avale aussitôt.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: En ce jour-là, ╵le Seigneur des armées célestes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sera le diadème magnifique ╵et la couronne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ornera ╵le reste de son peuple.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il insufflera la justice ╵à qui rend la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il sera la force ╵de celui qui repousse ╵l’ennemi jusqu’aux portes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les juges ivrognes
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: En voici d’autres ╵qui sont égarés par le vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les boissons fortes ╵font tituber.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, prêtres et prophètes, ╵les boissons fortes les égarent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vin les étourdit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils titubent sous l’effet ╵des boissons fortes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s’égarent dans leurs visions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils vacillent ╵en rendant la justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toutes les tables sont couvertes ╵de leurs vomissements infects
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pas un coin n’est resté propre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: « Qui Esaïe ╵prétend-il enseigner ? ╵s’exclament-ils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à qui donc veut-il ╵expliquer son message ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son discours convient juste ╵à de petits enfants ╵que l’on vient de sevrer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’éloigner du sein maternel ?
