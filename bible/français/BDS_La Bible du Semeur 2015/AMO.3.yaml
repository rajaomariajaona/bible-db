document_id: AMO.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Avertissements et menaces
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les reproches
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ecoutez bien cette parole que l’Eternel prononce sur vous, Israélites, sur toute la famille que j’ai fait sortir d’Egypte :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ces gens ne savent pas ╵agir avec droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils entassent dans leurs palais ╵ce qu’ils ont obtenu ╵par la violence et le pillage.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C’est pourquoi, le Seigneur, ╵l’Eternel, dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un ennemi viendra ╵tout autour du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abattra ta force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes palais seront pillés.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Eternel dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un berger arrache ╵de la gueule du lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deux jarrets ou un bout d’oreille ╵du mouton qu’il a pris
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 22.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même, des Israélites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui demeurent à Samarie ╵seront arrachés à l’ennemi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – il en restera le coin d’un divan ╵ou le morceau d’un pied de lit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Samarie seront arrachés… pied de lit. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le morceau d’un pied de lit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est incertaine. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samarie, installés au creux d’un divan ou au fond d’un lit, seront arrachés à l’ennemi.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ecoutez bien ceci ╵et transmettez ensuite ╵cet avertissement ╵aux enfants de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c’est là ce que déclare le Seigneur, ╵l’Eternel, le Dieu des armées célestes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Car le jour où j’interviendrai ╵pour punir Israël ╵de ses nombreux péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’interviendrai ╵contre les autels de Béthel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Béthel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à environ 15 kilomètres au nord de Jérusalem, le roi Jéroboam I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' avait fait ériger un autel et un veau d’or afin d’empêcher les membres des dix tribus du royaume du Nord de se rendre à Jérusalem pour adorer au Temple (voir 1 R 12.26-29 ; 2 R 23.15).'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs cornes seront abattues
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles tomberont à terre.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je ferai s’écrouler
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses maisons pour l’hiver, ╵ses maisons pour l’été,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses maisons ornées d’ivoire ╵seront anéanties,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses maisons imposantes ╵disparaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je vous ai choisis, et vous seuls,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes les familles de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi vous châtierai-je
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tous vos crimes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Deux hommes marchent-ils ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans s’être mis d’accord ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le lion rugit-il ╵au fond de la forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir une proie ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jeune lion gronde-t-il ╵au fond de sa tanière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’il n’a rien capturé ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’oiseau se jette-t-il ╵dans le filet qui est à terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’il n’y a pas d’appât ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le piège se referme-t-il
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir fait de prise ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Et sonne-t-on du cor ╵aux remparts de la ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que les habitants ╵se mettent à trembler ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un malheur viendra-t-il ╵frapper une cité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à moins que l’Eternel ╵en soit l’auteur ?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ainsi, le Seigneur, l’Eternel, ╵n’accomplit rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir d’abord révélé ses plans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ses serviteurs, les prophètes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le lion a rugi : ╵qui n’aurait pas de crainte ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le Seigneur, ╵l’Eternel, a parlé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui oserait ne pas prophétiser ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le châtiment de la corruption
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Faites retentir cet appel ╵dans les palais d’Ashdod
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et dans les palais de l’Egypte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-vous sur les montagnes ╵de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voyez quels grands désordres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et combien d’oppressions ╵règnent au milieu d’elle.
