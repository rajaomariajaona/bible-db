document_id: AMO.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Avertissements et menaces
  - type: heading
    content: Les reproches
  - type: text
    content: 'Ecoutez bien cette parole que l’Eternel prononce sur vous, Israélites, sur toute la famille que j’ai fait sortir d’Egypte :'
  '10':
  - type: text
    content: Ces gens ne savent pas ╵agir avec droiture,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Ils entassent dans leurs palais ╵ce qu’ils ont obtenu ╵par la violence et le pillage.
  '11':
  - type: text
    content: 'C’est pourquoi, le Seigneur, ╵l’Eternel, dit ceci :'
  - type: text
    content: Un ennemi viendra ╵tout autour du pays,
  - type: text
    content: il abattra ta force
  - type: text
    content: et tes palais seront pillés.
  '12':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Comme un berger arrache ╵de la gueule du lion
  - type: text
    content: deux jarrets ou un bout d’oreille ╵du mouton qu’il a pris
  - type: note
    content: Voir Ex 22.12.
  - type: text
    content: ','
  - type: text
    content: de même, des Israélites
  - type: text
    content: qui demeurent à Samarie ╵seront arrachés à l’ennemi
  - type: text
    content: – il en restera le coin d’un divan ╵ou le morceau d’un pied de lit
  - type: note
    content: 'Samarie seront arrachés… pied de lit. La traduction : le morceau d’un pied de lit est incertaine. Autre traduction : Samarie, installés au creux d’un divan ou au fond d’un lit, seront arrachés à l’ennemi.'
  - type: text
    content: .
  '13':
  - type: text
    content: Ecoutez bien ceci ╵et transmettez ensuite ╵cet avertissement ╵aux enfants de Jacob
  - type: text
    content: – c’est là ce que déclare le Seigneur, ╵l’Eternel, le Dieu des armées célestes.
  '14':
  - type: text
    content: Car le jour où j’interviendrai ╵pour punir Israël ╵de ses nombreux péchés,
  - type: text
    content: j’interviendrai ╵contre les autels de Béthel
  - type: note
    content: A Béthel, à environ 15 kilomètres au nord de Jérusalem, le roi Jéroboam Ier avait fait ériger un autel et un veau d’or afin d’empêcher les membres des dix tribus du royaume du Nord de se rendre à Jérusalem pour adorer au Temple (voir 1 R 12.26-29 ; 2 R 23.15).
  - type: text
    content: ','
  - type: text
    content: leurs cornes seront abattues
  - type: text
    content: et elles tomberont à terre.
  '15':
  - type: text
    content: Je ferai s’écrouler
  - type: text
    content: ses maisons pour l’hiver, ╵ses maisons pour l’été,
  - type: text
    content: et ses maisons ornées d’ivoire ╵seront anéanties,
  - type: text
    content: ses maisons imposantes ╵disparaîtront,
  - type: text
    content: l’Eternel le déclare.
  '2':
  - type: text
    content: Je vous ai choisis, et vous seuls,
  - type: text
    content: de toutes les familles de la terre,
  - type: text
    content: aussi vous châtierai-je
  - type: text
    content: pour tous vos crimes.
  '3':
  - type: text
    content: Deux hommes marchent-ils ensemble
  - type: text
    content: sans s’être mis d’accord ?
  '4':
  - type: text
    content: Le lion rugit-il ╵au fond de la forêt
  - type: text
    content: sans avoir une proie ?
  - type: text
    content: Le jeune lion gronde-t-il ╵au fond de sa tanière
  - type: text
    content: s’il n’a rien capturé ?
  '5':
  - type: text
    content: L’oiseau se jette-t-il ╵dans le filet qui est à terre
  - type: text
    content: s’il n’y a pas d’appât ?
  - type: text
    content: Le piège se referme-t-il
  - type: text
    content: sans avoir fait de prise ?
  '6':
  - type: text
    content: Et sonne-t-on du cor ╵aux remparts de la ville
  - type: text
    content: sans que les habitants ╵se mettent à trembler ?
  - type: text
    content: Un malheur viendra-t-il ╵frapper une cité
  - type: text
    content: à moins que l’Eternel ╵en soit l’auteur ?
  '7':
  - type: text
    content: Ainsi, le Seigneur, l’Eternel, ╵n’accomplit rien
  - type: text
    content: sans avoir d’abord révélé ses plans
  - type: text
    content: à ses serviteurs, les prophètes.
  '8':
  - type: text
    content: 'Le lion a rugi : ╵qui n’aurait pas de crainte ?'
  - type: text
    content: Oui, le Seigneur, ╵l’Eternel, a parlé.
  - type: text
    content: Qui oserait ne pas prophétiser ?
  - type: heading
    content: Le châtiment de la corruption
  '9':
  - type: text
    content: Faites retentir cet appel ╵dans les palais d’Ashdod
  - type: text
    content: 'et dans les palais de l’Egypte :'
  - type: text
    content: Rassemblez-vous sur les montagnes ╵de Samarie,
  - type: text
    content: voyez quels grands désordres
  - type: text
    content: et combien d’oppressions ╵règnent au milieu d’elle.
