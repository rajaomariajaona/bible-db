document_id: AMO.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Moabites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le territoire de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: s’étendait à l’est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ' a perpétré ╵de nombreux crimes ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ce peuple a brûlé ╵les os du roi d’Edom, ╵pour les réduire en chaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je mettrai le feu à Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il consumera ╵les palais de Qeriyoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Site inconnu (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 48.24
        metadata:
          usfm: JER.48.24
      - type: text
        text: '). Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ses villes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Moab périra ╵en plein tumulte
- type: usfm
  marker: q1
  children:
  - type: text
    text: au bruit des cris de guerre, ╵au son du cor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je ferai disparaître ╵son chef, et avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais exterminer ╵tous ses ministres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre le royaume de Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Juda a perpétré ╵de nombreux crimes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont méprisé ╵la Loi de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’ont pas obéi ╵à ses commandements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont égarés ╵en suivant les faux dieux
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’autrefois leurs ancêtres ╵avaient déjà suivis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je mettrai le feu à Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il consumera ╵les palais de Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Eternel dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël a commis ╵de nombreux crimes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car pour un pot-de-vin ╵ils vendent l’innocent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’indigent ╵pour une paire de sandales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils piétinent la tête ╵des démunis dans la poussière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils piétinent la tête '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des démunis dans la poussière
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est ainsi qu’ont compris les versions. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils convoitent même jusqu’à la poussière du sol que les démunis se jettent sur la tête en signe de deuil.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils faussent le droit des pauvres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils détournent les humbles du droit chemin.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fils comme le père ╵vont vers la même fille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 18.15 ; Dt 22.28-29.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est ainsi qu’ils m’outragent, ╵moi qui suis saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Près de chaque autel, ils s’étendent
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur des vêtements pris en gage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 22.25-26 ; Dt 24.10-13.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans le temple de leurs dieux, ╵ils vont boire
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vin ╵que l’on a perçu comme amende.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourtant, moi j’ai détruit ╵devant eux les Amoréens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Un terme qui englobe tous les anciens habitants de Canaan (voir v. 10 ; Gn 15.16 ; Dt 7.1).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sont aussi grands que des cèdres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et forts comme des chênes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’ai détruit leurs fruits en haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en bas leurs racines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pourtant, moi je vous ai fait ╵sortir d’Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous ai conduits ╵pendant quarante ans au désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que vous possédiez ╵le pays des Amoréens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’ai choisi certains de vos fils ╵pour être des prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et certains de vos jeunes gens ╵pour m’être consacrés par vœu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 6.1-21
        metadata:
          usfm: NUM.6.1+NUM.6.2+NUM.6.3+NUM.6.4+NUM.6.5+NUM.6.6+NUM.6.7+NUM.6.8+NUM.6.9+NUM.6.10+NUM.6.11+NUM.6.12+NUM.6.13+NUM.6.14+NUM.6.15+NUM.6.16+NUM.6.17+NUM.6.18+NUM.6.19+NUM.6.20+NUM.6.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’en est-il pas ainsi, ╵Israélites ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le demande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais à ces hommes consacrés, ╵vous avez fait boire du vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et aux prophètes, ╵vous avez ordonné :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ne prophétisez pas. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je vais vous écraser sur place
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme écrase un chariot ╵chargé de gerbes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors les plus agiles mêmes ╵ne trouveront pas de refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les plus vigoureux ╵ne pourront rassembler leurs forces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni le guerrier ╵sauver sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui manie l’arc ╵ne résistera pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’homme le plus agile ╵ne s’échappera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même le meilleur cavalier ╵ne pourra pas sauver sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En ce jour-là, ╵le guerrier le plus valeureux
- type: usfm
  marker: q1
  children:
  - type: text
    text: fuira, tout nu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
