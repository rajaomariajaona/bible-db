document_id: AMO.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Moabites
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Moab
  - type: note
    content: Le territoire de Moab s’étendait à l’est de la mer Morte.
  - type: text
    content: ' a perpétré ╵de nombreux crimes ;'
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car ce peuple a brûlé ╵les os du roi d’Edom, ╵pour les réduire en chaux.
  '10':
  - type: text
    content: Pourtant, moi je vous ai fait ╵sortir d’Egypte
  - type: text
    content: et je vous ai conduits ╵pendant quarante ans au désert
  - type: text
    content: pour que vous possédiez ╵le pays des Amoréens.
  '11':
  - type: text
    content: J’ai choisi certains de vos fils ╵pour être des prophètes
  - type: text
    content: et certains de vos jeunes gens ╵pour m’être consacrés par vœu
  - type: note
    content: Voir Nb 6.1-21.
  - type: text
    content: .
  - type: text
    content: N’en est-il pas ainsi, ╵Israélites ?
  - type: text
    content: l’Eternel le demande.
  '12':
  - type: text
    content: Mais à ces hommes consacrés, ╵vous avez fait boire du vin
  - type: text
    content: 'et aux prophètes, ╵vous avez ordonné :'
  - type: text
    content: « Ne prophétisez pas. »
  '13':
  - type: text
    content: Je vais vous écraser sur place
  - type: text
    content: comme écrase un chariot ╵chargé de gerbes.
  '14':
  - type: text
    content: Alors les plus agiles mêmes ╵ne trouveront pas de refuge,
  - type: text
    content: et les plus vigoureux ╵ne pourront rassembler leurs forces,
  - type: text
    content: ni le guerrier ╵sauver sa vie.
  '15':
  - type: text
    content: Celui qui manie l’arc ╵ne résistera pas.
  - type: text
    content: L’homme le plus agile ╵ne s’échappera pas,
  - type: text
    content: même le meilleur cavalier ╵ne pourra pas sauver sa vie.
  '16':
  - type: text
    content: En ce jour-là, ╵le guerrier le plus valeureux
  - type: text
    content: fuira, tout nu,
  - type: text
    content: l’Eternel le déclare.
  '2':
  - type: text
    content: Je mettrai le feu à Moab
  - type: text
    content: et il consumera ╵les palais de Qeriyoth
  - type: note
    content: 'Site inconnu (voir Jr 48.24). Autre traduction : de ses villes.'
  - type: text
    content: ','
  - type: text
    content: et Moab périra ╵en plein tumulte
  - type: text
    content: au bruit des cris de guerre, ╵au son du cor.
  '3':
  - type: text
    content: Je ferai disparaître ╵son chef, et avec lui,
  - type: text
    content: je vais exterminer ╵tous ses ministres,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Contre le royaume de Juda
  '4':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Juda a perpétré ╵de nombreux crimes ;
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car ils ont méprisé ╵la Loi de l’Eternel
  - type: text
    content: et n’ont pas obéi ╵à ses commandements.
  - type: text
    content: Ils se sont égarés ╵en suivant les faux dieux
  - type: text
    content: qu’autrefois leurs ancêtres ╵avaient déjà suivis.
  '5':
  - type: text
    content: Je mettrai le feu à Juda
  - type: text
    content: et il consumera ╵les palais de Jérusalem.
  - type: heading
    content: Contre Israël
  '6':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Israël a commis ╵de nombreux crimes ;
  - type: text
    content: il a dépassé les limites. ╵Voilà pourquoi ╵je ne reviendrai pas ╵sur l’arrêt que j’ai pris,
  - type: text
    content: car pour un pot-de-vin ╵ils vendent l’innocent,
  - type: text
    content: et l’indigent ╵pour une paire de sandales.
  '7':
  - type: text
    content: Ils piétinent la tête ╵des démunis dans la poussière
  - type: note
    content: 'Ils piétinent la tête des démunis dans la poussière: c’est ainsi qu’ont compris les versions. Autre traduction : ils convoitent même jusqu’à la poussière du sol que les démunis se jettent sur la tête en signe de deuil.'
  - type: text
    content: ','
  - type: text
    content: et ils faussent le droit des pauvres
  - type: note
    content: 'Autre traduction : ils détournent les humbles du droit chemin.'
  - type: text
    content: .
  - type: text
    content: Le fils comme le père ╵vont vers la même fille
  - type: note
    content: Voir Lv 18.15 ; Dt 22.28-29.
  - type: text
    content: ','
  - type: text
    content: c’est ainsi qu’ils m’outragent, ╵moi qui suis saint.
  '8':
  - type: text
    content: Près de chaque autel, ils s’étendent
  - type: text
    content: sur des vêtements pris en gage
  - type: note
    content: Voir Ex 22.25-26 ; Dt 24.10-13.
  - type: text
    content: et, dans le temple de leurs dieux, ╵ils vont boire
  - type: text
    content: le vin ╵que l’on a perçu comme amende.
  '9':
  - type: text
    content: Pourtant, moi j’ai détruit ╵devant eux les Amoréens
  - type: note
    content: Un terme qui englobe tous les anciens habitants de Canaan (voir v. 10 ; Gn 15.16 ; Dt 7.1).
  - type: text
    content: qui sont aussi grands que des cèdres
  - type: text
    content: et forts comme des chênes,
  - type: text
    content: et j’ai détruit leurs fruits en haut
  - type: text
    content: et en bas leurs racines.
