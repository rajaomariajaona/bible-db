document_id: GEN.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La descendance d’Abraham par Qetoura
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham avait pris une autre femme nommée Qetoura '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dont il eut plusieurs fils : Zimrân, Yoqshân, Medân, Madian'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ancêtre des Madianites, souvent adversaires des Israélites (Jg 6ss ; Es 60.6).
    marker-yv: yv-n
  - type: text
    text: ', Yishbaq et Shouah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Yoqshân fut le père de Saba et Dedân. De ce dernier descendent les Ashourim, les Letoushim et les Leoumim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Madian eut pour fils : Epha, Epher, Hénok, Abida et Eldaa. Tous ceux-là sont les descendants de Qetoura.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Abraham donna tout ce qui lui appartenait à Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fit des donations aux fils qu’il avait eus par ses épouses de second rang ; mais, de son vivant, il les éloigna de son fils Isaac en les envoyant à l’est, vers un pays d’Orient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Abraham atteignit l’âge de cent soixante-quinze ans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'puis il rendit son dernier soupir. Il mourut au terme d’une heureuse vieillesse, âgé et comblé, et rejoignit ses ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ses fils Isaac et Ismaël l’enterrèrent dans la caverne de Makpéla, dans le terrain d’Ephrôn, fils de Tsohar, le Hittite, qui se trouve vis-à-vis de Mamré, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ce champ qu’Abraham avait acheté aux Hittites. Abraham fut enterré là comme sa femme Sara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après la mort d’Abraham, Dieu bénit son fils Isaac qui s’établit près du puits de Lachaï-Roï.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’histoire de la famille d’Ismaël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici la généalogie d’Ismaël, fils d’Abraham enfanté par l’Egyptienne Agar, servante de Sara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici les noms des fils d’Ismaël par ordre de naissance. Son premier-né s’appelait Nebayoth, puis viennent Qédar, Adbéel, Mibsam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mishma, Douma, Massa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hadad, Téma, Yetour, Naphish et Qedma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tels sont les noms des fils d’Ismaël qui devinrent les chefs de douze familles établies dans leurs villages et leurs campements respectifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ismaël vécut cent trente-sept ans, puis il rendit son dernier soupir ; il mourut et rejoignit ses ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ses descendants se sont établis de Havila jusqu’à Shour, aux confins de l’Egypte, en direction d’Ashour. Il vivait en hostilité avec tous ses semblables
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.12'
        metadata:
          usfm: GEN.16.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'L’histoire de la famille d’Isaac : le cycle de Jacob'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance d’Esaü et de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici l’histoire de la famille d’Isaac, fils d’Abraham. Abraham eut pour fils Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui-ci avait quarante ans quand il épousa Rébecca, fille de Betouel, l’Araméen de Paddân-Aram, et sœur de Laban l’Araméen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Isaac implora l’Eternel au sujet de sa femme, car elle était stérile. L’Eternel exauça sa prière et Rébecca sa femme devint enceinte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Des jumeaux se heurtaient dans son ventre et elle s’écria : Si c’est comme ça, pourquoi en suis-je arrivé là ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle alla consulter l’Eternel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'qui lui répondit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont deux peuples dans ton ventre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: deux peuples différents naîtront de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’un des deux sera plus puissant que l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’aîné sera assujetti au cadet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Rm 9.10-12 ; Ps 115.3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand le moment de l’accouchement arriva, il se confirma qu’elle portait des jumeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le premier qui parut était roux, le corps couvert de poils comme une fourrure, c’est pourquoi on l’appela Esaü (le Velu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Esaü '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoque le terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couvert de poils.
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Après lui naquit son frère, la main agrippée au talon d’Esaü, et on l’appela Jacob (le Talon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec le mot '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'talon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et avec le verbe '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'supplanter, tromper '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 27.36 ; Jr 9.4).
    marker-yv: yv-n
  - type: text
    text: ). Isaac avait soixante ans au moment de leur naissance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esaü vend son droit de fils aîné à Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les deux garçons grandirent. Esaü devint un habile chasseur, qui aimait courir les champs ; Jacob était d’un caractère paisible et préférait se tenir dans les tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Isaac avait une préférence pour Esaü, car il appréciait le gibier, tandis que Rébecca préférait Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Un jour, Jacob était en train de préparer une soupe quand Esaü revint des champs, épuisé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il lui dit : Laisse-moi manger de ce roux, de ce roux-là ! Car je n’en peux plus ! – D’où le nom Edom (le Roux) qu’on lui donna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais Jacob lui dit : Alors vends-moi aujourd’hui même ton droit de fils aîné.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Esaü répondit : Je vais mourir de faim, que m’importe mon droit d’aînesse ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jacob insista : Promets-le-moi tout de suite par serment !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Esaü lui prêta serment et lui vendit ainsi son droit d’aînesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Qui lui aurait assuré les bénédictions promises aux descendants d’Abraham. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.16
        metadata:
          usfm: HEB.12.16
      - type: text
        text: ' rappelle le mépris des choses spirituelles dont Esaü a fait preuve.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Là-dessus, Jacob lui servit du pain et de la soupe de lentilles. Esaü mangea et but puis se leva et s’en alla. C’est ainsi qu’Esaü méprisa son droit d’aînesse.
