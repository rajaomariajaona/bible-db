document_id: GEN.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La descendance d’Abraham par Qetoura
  - type: text
    content: 'Abraham avait pris une autre femme nommée Qetoura '
  '10':
  - type: text
    content: 'ce champ qu’Abraham avait acheté aux Hittites. Abraham fut enterré là comme sa femme Sara. '
  '11':
  - type: text
    content: Après la mort d’Abraham, Dieu bénit son fils Isaac qui s’établit près du puits de Lachaï-Roï.
  - type: heading
    content: L’histoire de la famille d’Ismaël
  '12':
  - type: text
    content: 'Voici la généalogie d’Ismaël, fils d’Abraham enfanté par l’Egyptienne Agar, servante de Sara. '
  '13':
  - type: text
    content: 'Voici les noms des fils d’Ismaël par ordre de naissance. Son premier-né s’appelait Nebayoth, puis viennent Qédar, Adbéel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Douma, Massa, '
  '15':
  - type: text
    content: 'Hadad, Téma, Yetour, Naphish et Qedma. '
  '16':
  - type: text
    content: 'Tels sont les noms des fils d’Ismaël qui devinrent les chefs de douze familles établies dans leurs villages et leurs campements respectifs. '
  '17':
  - type: text
    content: 'Ismaël vécut cent trente-sept ans, puis il rendit son dernier soupir ; il mourut et rejoignit ses ancêtres. '
  '18':
  - type: text
    content: Ses descendants se sont établis de Havila jusqu’à Shour, aux confins de l’Egypte, en direction d’Ashour. Il vivait en hostilité avec tous ses semblables
  - type: note
    content: Voir 16.12.
  - type: text
    content: .
  - type: heading
    content: 'L’histoire de la famille d’Isaac : le cycle de Jacob'
  - type: heading
    content: La naissance d’Esaü et de Jacob
  '19':
  - type: text
    content: 'Voici l’histoire de la famille d’Isaac, fils d’Abraham. Abraham eut pour fils Isaac. '
  '2':
  - type: text
    content: 'dont il eut plusieurs fils : Zimrân, Yoqshân, Medân, Madian'
  - type: note
    content: Ancêtre des Madianites, souvent adversaires des Israélites (Jg 6ss ; Es 60.6).
  - type: text
    content: ', Yishbaq et Shouah. '
  '20':
  - type: text
    content: Celui-ci avait quarante ans quand il épousa Rébecca, fille de Betouel, l’Araméen de Paddân-Aram, et sœur de Laban l’Araméen.
  '21':
  - type: text
    content: Isaac implora l’Eternel au sujet de sa femme, car elle était stérile. L’Eternel exauça sa prière et Rébecca sa femme devint enceinte.
  '22':
  - type: text
    content: 'Des jumeaux se heurtaient dans son ventre et elle s’écria : Si c’est comme ça, pourquoi en suis-je arrivé là ?'
  - type: text
    content: 'Elle alla consulter l’Eternel '
  '23':
  - type: text
    content: 'qui lui répondit :'
  - type: text
    content: Ils sont deux peuples dans ton ventre,
  - type: text
    content: deux peuples différents naîtront de toi.
  - type: text
    content: L’un des deux sera plus puissant que l’autre,
  - type: text
    content: et l’aîné sera assujetti au cadet
  - type: note
    content: Voir Rm 9.10-12 ; Ps 115.3.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Quand le moment de l’accouchement arriva, il se confirma qu’elle portait des jumeaux. '
  '25':
  - type: text
    content: Le premier qui parut était roux, le corps couvert de poils comme une fourrure, c’est pourquoi on l’appela Esaü (le Velu
  - type: note
    content: Le nom Esaü évoque le terme traduit par couvert de poils.
  - type: text
    content: '). '
  '26':
  - type: text
    content: Après lui naquit son frère, la main agrippée au talon d’Esaü, et on l’appela Jacob (le Talon
  - type: note
    content: Le nom Jacob fait assonance avec le mot talon et avec le verbe supplanter, tromper (voir 27.36 ; Jr 9.4).
  - type: text
    content: ). Isaac avait soixante ans au moment de leur naissance.
  - type: heading
    content: Esaü vend son droit de fils aîné à Jacob
  '27':
  - type: text
    content: 'Les deux garçons grandirent. Esaü devint un habile chasseur, qui aimait courir les champs ; Jacob était d’un caractère paisible et préférait se tenir dans les tentes. '
  '28':
  - type: text
    content: Isaac avait une préférence pour Esaü, car il appréciait le gibier, tandis que Rébecca préférait Jacob.
  '29':
  - type: text
    content: 'Un jour, Jacob était en train de préparer une soupe quand Esaü revint des champs, épuisé. '
  '3':
  - type: text
    content: 'Yoqshân fut le père de Saba et Dedân. De ce dernier descendent les Ashourim, les Letoushim et les Leoumim. '
  '30':
  - type: text
    content: 'Il lui dit : Laisse-moi manger de ce roux, de ce roux-là ! Car je n’en peux plus ! – D’où le nom Edom (le Roux) qu’on lui donna.'
  '31':
  - type: text
    content: 'Mais Jacob lui dit : Alors vends-moi aujourd’hui même ton droit de fils aîné.'
  '32':
  - type: text
    content: 'Esaü répondit : Je vais mourir de faim, que m’importe mon droit d’aînesse ?'
  '33':
  - type: text
    content: 'Jacob insista : Promets-le-moi tout de suite par serment !'
  - type: text
    content: Esaü lui prêta serment et lui vendit ainsi son droit d’aînesse
  - type: note
    content: Qui lui aurait assuré les bénédictions promises aux descendants d’Abraham. Hé 12.16 rappelle le mépris des choses spirituelles dont Esaü a fait preuve.
  - type: text
    content: '. '
  '34':
  - type: text
    content: Là-dessus, Jacob lui servit du pain et de la soupe de lentilles. Esaü mangea et but puis se leva et s’en alla. C’est ainsi qu’Esaü méprisa son droit d’aînesse.
  '4':
  - type: text
    content: 'Madian eut pour fils : Epha, Epher, Hénok, Abida et Eldaa. Tous ceux-là sont les descendants de Qetoura.'
  '5':
  - type: text
    content: 'Abraham donna tout ce qui lui appartenait à Isaac. '
  '6':
  - type: text
    content: Il fit des donations aux fils qu’il avait eus par ses épouses de second rang ; mais, de son vivant, il les éloigna de son fils Isaac en les envoyant à l’est, vers un pays d’Orient.
  - type: heading
    content: La mort d’Abraham
  '7':
  - type: text
    content: 'Abraham atteignit l’âge de cent soixante-quinze ans, '
  '8':
  - type: text
    content: 'puis il rendit son dernier soupir. Il mourut au terme d’une heureuse vieillesse, âgé et comblé, et rejoignit ses ancêtres. '
  '9':
  - type: text
    content: 'Ses fils Isaac et Ismaël l’enterrèrent dans la caverne de Makpéla, dans le terrain d’Ephrôn, fils de Tsohar, le Hittite, qui se trouve vis-à-vis de Mamré, '
