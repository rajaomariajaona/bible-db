document_id: ISA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chant de la vigne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je veux chanter ╵pour mon ami
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chanson de mon bien-aimé ╵au sujet de sa vigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon ami avait une vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un coteau fertile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il en sarcla le sol, ╵en enleva les pierres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il y mit des plants de choix.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bâtit une tour de guet ╵au milieu de la vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il y creusa un pressoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il attendait donc de sa vigne ╵de beaux raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais elle n’a produit ╵que des raisins infects
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 21.33 ; Mc 12.1 ; Lc 20.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maintenant donc, ╵habitants de Jérusalem, ╵gens de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soyez les juges ╵entre moi et ma vigne !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’y avait-il encore ╵à faire pour ma vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je n’aurais pas fait ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi, alors que j’attendais de bons raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’a-t-elle produit que des fruits infects ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maintenant donc, ╵je vous ferai savoir
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce que je vais faire à ma vigne :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’arracherai sa haie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’elle soit broutée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai une brèche ╵dans sa clôture
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que les passants la piétinent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’en ferai une friche :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nul ne la taillera, ╵nul ne la sarclera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ronces, les épines ╵y croîtront librement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’interdirai aux nuages
- type: usfm
  marker: q1
  children:
  - type: text
    text: de répandre leur pluie sur elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Or, c’est le peuple d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est la vigne ╵de l’Eternel, ╵du Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le plant qui faisait ses délices
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont les habitants ╵du pays de Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il attendait d’eux la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce n’est qu’injustice ; ╵il attendait d’eux la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce sont des cris de détresse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malheurs et jugements
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Malheur à vous ╵qui joignez maison à maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ajoutez un champ à l’autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: au point qu’il n’y a plus d’espace libre
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que vous occupez à vous seuls ╵tout le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le Seigneur des armées célestes ╵m’a parlé et m’a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces nombreuses maisons ╵deviendront une ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces maisons grandes et superbes ╵seront inhabitées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car dix arpents de vigne ╵ne produiront qu’un tonnelet de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dix mesures de semence ╵n’en donneront qu’une de blé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Trois hectares de vignes ne produiront pas 50 litres de vin et celui qui sèmera 100 kilogrammes de blé n’en récoltera que dix.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheur à vous ╵qui courez de bonne heure
- type: usfm
  marker: q1
  children:
  - type: text
    text: après les boissons enivrantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui vous attardez, le soir, ╵excités par le vin !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Des lyres et des luths, ╵des tambourins, des flûtes
- type: usfm
  marker: q1
  children:
  - type: text
    text: animent vos festins ╵où le vin coule à flots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous n’avez pas un regard ╵pour ce que l’Eternel a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous ne voyez pas ╵l’œuvre qu’il accomplit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voilà pourquoi mon peuple ╵s’en ira en exil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n’a rien voulu savoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses notables mourront de faim
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la population de soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi le séjour des morts ╵fera gonfler sa gorge
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, démesurément, ╵élargira sa bouche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les dignitaires de la ville ╵et sa foule bruyante ╵y descendront ensemble
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur joyeux tumulte ╵s’en ira avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C’est pourquoi tous les hommes ╵devront courber le dos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront humiliés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les orgueilleux ╵devront baisser les yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le Seigneur des armées célestes ╵montrera sa grandeur ╵en instaurant le droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu saint manifestera ╵sa sainteté par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dans la ville ruinée, ╵des agneaux brouteront ╵comme en leur pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des chevreaux ╵brouteront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des étrangers dévoreront les ruines.
    marker-yv: yv-n
  - type: text
    text: ' sur les ruines ╵des demeures des riches.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malheur à vous ╵qui traînez le péché ╵derrière vous ╵avec les cordes du mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui tirez la faute ╵comme les traits d’un attelage !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Oui, vous qui dites : ╵« Que Dieu se presse donc'
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’accomplir son ouvrage
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que nous le voyions !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elle arrive, ╵la réalisation
- type: usfm
  marker: q1
  children:
  - type: text
    text: des projets du Saint d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que nous les connaissions. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Malheur à vous ╵qui nommez le mal bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bien mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui changez ╵les ténèbres en lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lumière en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui changez ╵l’amertume en douceur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la douceur en amertume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Malheur à vous ╵qui vous prenez pour sages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous croyez intelligents !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Malheur à vous ╵qui êtes des héros
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il s’agit de consommer du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des champions ╵pour vous gorger d’alcool ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: qui, pour un pot-de-vin, ╵acquittez le coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui privez le juste ╵du droit qui lui est dû.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La colère de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voilà pourquoi ╵vous serez consumés ╵comme un fétu de paille ╵dévoré par la flamme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme une herbe sèche ╵engloutie par le feu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, vos racines pourriront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre fleur sera emportée ╵comme de la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque vous avez rejeté ╵la Loi de l’Eternel, ╵du Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avez méprisé ╵ce qu’a dit le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Voilà pourquoi ╵l’Eternel s’est mis en colère ╵contre son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et a porté la main sur lui ╵pour le frapper :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les montagnes sont ébranlées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cadavres sont ╵pareils à des ordures ╵qui traînent dans les rues ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais malgré tout cela, ╵son courroux ne s’apaise pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa main reste levée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: L’Eternel dresse un étendard ╵pour des peuples lointains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il siffle pour les appeler ╵du bout du monde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les voici qui arrivent ╵d’un pas prompt et léger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit très certainement des Assyriens.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Personne parmi eux ╵ne connaît la fatigue, ╵personne ne chancelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne somnole ╵et nul n’est endormi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul n’a son ceinturon ╵dénoué de ses hanches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les lanières de leurs sandales ╵ne sont pas déchirées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Leurs flèches sont aiguës,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous leurs arcs tendus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les sabots des chevaux ╵sont comme du silex
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les roues de leurs chars ╵sont comme un ouragan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand ils rugissent, ╵on croirait des lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs rugissements ╵rappellent ceux des lionceaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils grondent et saisissent ╵leur proie pour l’emporter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne peut la leur arracher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En ce jour-là, ╵retentira contre eux ╵un grondement pareil
- type: usfm
  marker: q1
  children:
  - type: text
    text: à celui de la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On regardera le pays :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n’y verra que des ténèbres ╵et une grande angoisse ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lumière sera voilée ╵par d’épaisses nuées.
