document_id: ISA.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chant de la vigne
  - type: text
    content: Je veux chanter ╵pour mon ami
  - type: text
    content: la chanson de mon bien-aimé ╵au sujet de sa vigne.
  - type: text
    content: Mon ami avait une vigne
  - type: text
    content: sur un coteau fertile.
  '10':
  - type: text
    content: Car dix arpents de vigne ╵ne produiront qu’un tonnelet de vin,
  - type: text
    content: et dix mesures de semence ╵n’en donneront qu’une de blé
  - type: note
    content: Trois hectares de vignes ne produiront pas 50 litres de vin et celui qui sèmera 100 kilogrammes de blé n’en récoltera que dix.
  - type: text
    content: .
  '11':
  - type: text
    content: Malheur à vous ╵qui courez de bonne heure
  - type: text
    content: après les boissons enivrantes
  - type: text
    content: et qui vous attardez, le soir, ╵excités par le vin !
  '12':
  - type: text
    content: Des lyres et des luths, ╵des tambourins, des flûtes
  - type: text
    content: animent vos festins ╵où le vin coule à flots.
  - type: text
    content: Mais vous n’avez pas un regard ╵pour ce que l’Eternel a fait,
  - type: text
    content: et vous ne voyez pas ╵l’œuvre qu’il accomplit.
  '13':
  - type: text
    content: Voilà pourquoi mon peuple ╵s’en ira en exil,
  - type: text
    content: car il n’a rien voulu savoir.
  - type: text
    content: Ses notables mourront de faim
  - type: text
    content: et la population de soif.
  '14':
  - type: text
    content: C’est pourquoi le séjour des morts ╵fera gonfler sa gorge
  - type: text
    content: et, démesurément, ╵élargira sa bouche.
  - type: text
    content: Les dignitaires de la ville ╵et sa foule bruyante ╵y descendront ensemble
  - type: text
    content: et leur joyeux tumulte ╵s’en ira avec eux.
  '15':
  - type: text
    content: C’est pourquoi tous les hommes ╵devront courber le dos,
  - type: text
    content: ils seront humiliés
  - type: text
    content: et tous les orgueilleux ╵devront baisser les yeux.
  '16':
  - type: text
    content: Le Seigneur des armées célestes ╵montrera sa grandeur ╵en instaurant le droit,
  - type: text
    content: le Dieu saint manifestera ╵sa sainteté par la justice.
  '17':
  - type: text
    content: Dans la ville ruinée, ╵des agneaux brouteront ╵comme en leur pâturage,
  - type: text
    content: et des chevreaux ╵brouteront
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : des étrangers dévoreront les ruines.'
  - type: text
    content: ' sur les ruines ╵des demeures des riches.'
  '18':
  - type: text
    content: Malheur à vous ╵qui traînez le péché ╵derrière vous ╵avec les cordes du mensonge,
  - type: text
    content: et qui tirez la faute ╵comme les traits d’un attelage !
  '19':
  - type: text
    content: 'Oui, vous qui dites : ╵« Que Dieu se presse donc'
  - type: text
    content: d’accomplir son ouvrage
  - type: text
    content: pour que nous le voyions !
  - type: text
    content: Et qu’elle arrive, ╵la réalisation
  - type: text
    content: des projets du Saint d’Israël,
  - type: text
    content: afin que nous les connaissions. »
  '2':
  - type: text
    content: Il en sarcla le sol, ╵en enleva les pierres
  - type: text
    content: et il y mit des plants de choix.
  - type: text
    content: Il bâtit une tour de guet ╵au milieu de la vigne
  - type: text
    content: et il y creusa un pressoir.
  - type: text
    content: Il attendait donc de sa vigne ╵de beaux raisins,
  - type: text
    content: mais elle n’a produit ╵que des raisins infects
  - type: note
    content: Voir Mt 21.33 ; Mc 12.1 ; Lc 20.9.
  - type: text
    content: .
  '20':
  - type: text
    content: Malheur à vous ╵qui nommez le mal bien
  - type: text
    content: et le bien mal,
  - type: text
    content: vous qui changez ╵les ténèbres en lumière,
  - type: text
    content: la lumière en ténèbres,
  - type: text
    content: vous qui changez ╵l’amertume en douceur
  - type: text
    content: et la douceur en amertume.
  '21':
  - type: text
    content: Malheur à vous ╵qui vous prenez pour sages
  - type: text
    content: et vous croyez intelligents !
  '22':
  - type: text
    content: Malheur à vous ╵qui êtes des héros
  - type: text
    content: quand il s’agit de consommer du vin,
  - type: text
    content: et des champions ╵pour vous gorger d’alcool ;
  '23':
  - type: text
    content: qui, pour un pot-de-vin, ╵acquittez le coupable
  - type: text
    content: et qui privez le juste ╵du droit qui lui est dû.
  - type: heading
    content: La colère de Dieu
  '24':
  - type: text
    content: Voilà pourquoi ╵vous serez consumés ╵comme un fétu de paille ╵dévoré par la flamme
  - type: text
    content: et comme une herbe sèche ╵engloutie par le feu.
  - type: text
    content: Oui, vos racines pourriront,
  - type: text
    content: votre fleur sera emportée ╵comme de la poussière,
  - type: text
    content: puisque vous avez rejeté ╵la Loi de l’Eternel, ╵du Seigneur des armées célestes,
  - type: text
    content: et avez méprisé ╵ce qu’a dit le Saint d’Israël.
  '25':
  - type: text
    content: Voilà pourquoi ╵l’Eternel s’est mis en colère ╵contre son peuple,
  - type: text
    content: 'et a porté la main sur lui ╵pour le frapper :'
  - type: text
    content: les montagnes sont ébranlées,
  - type: text
    content: et les cadavres sont ╵pareils à des ordures ╵qui traînent dans les rues ;
  - type: text
    content: mais malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: text
    content: sa main reste levée.
  '26':
  - type: text
    content: L’Eternel dresse un étendard ╵pour des peuples lointains,
  - type: text
    content: il siffle pour les appeler ╵du bout du monde.
  - type: text
    content: Les voici qui arrivent ╵d’un pas prompt et léger
  - type: note
    content: Il s’agit très certainement des Assyriens.
  - type: text
    content: .
  '27':
  - type: text
    content: Personne parmi eux ╵ne connaît la fatigue, ╵personne ne chancelle,
  - type: text
    content: personne ne somnole ╵et nul n’est endormi.
  - type: text
    content: Nul n’a son ceinturon ╵dénoué de ses hanches,
  - type: text
    content: les lanières de leurs sandales ╵ne sont pas déchirées.
  '28':
  - type: text
    content: Leurs flèches sont aiguës,
  - type: text
    content: et tous leurs arcs tendus,
  - type: text
    content: les sabots des chevaux ╵sont comme du silex
  - type: text
    content: et les roues de leurs chars ╵sont comme un ouragan.
  '29':
  - type: text
    content: Quand ils rugissent, ╵on croirait des lions,
  - type: text
    content: et leurs rugissements ╵rappellent ceux des lionceaux.
  - type: text
    content: Ils grondent et saisissent ╵leur proie pour l’emporter,
  - type: text
    content: personne ne peut la leur arracher.
  '3':
  - type: text
    content: Maintenant donc, ╵habitants de Jérusalem, ╵gens de Juda,
  - type: text
    content: soyez les juges ╵entre moi et ma vigne !
  '30':
  - type: text
    content: En ce jour-là, ╵retentira contre eux ╵un grondement pareil
  - type: text
    content: à celui de la mer.
  - type: text
    content: 'On regardera le pays :'
  - type: text
    content: on n’y verra que des ténèbres ╵et une grande angoisse ;
  - type: text
    content: la lumière sera voilée ╵par d’épaisses nuées.
  '4':
  - type: text
    content: Qu’y avait-il encore ╵à faire pour ma vigne
  - type: text
    content: que je n’aurais pas fait ?
  - type: text
    content: Pourquoi, alors que j’attendais de bons raisins,
  - type: text
    content: n’a-t-elle produit que des fruits infects ?
  '5':
  - type: text
    content: Maintenant donc, ╵je vous ferai savoir
  - type: text
    content: 'ce que je vais faire à ma vigne :'
  - type: text
    content: j’arracherai sa haie
  - type: text
    content: pour qu’elle soit broutée,
  - type: text
    content: je ferai une brèche ╵dans sa clôture
  - type: text
    content: pour que les passants la piétinent.
  '6':
  - type: text
    content: 'J’en ferai une friche :'
  - type: text
    content: nul ne la taillera, ╵nul ne la sarclera.
  - type: text
    content: Les ronces, les épines ╵y croîtront librement,
  - type: text
    content: et j’interdirai aux nuages
  - type: text
    content: de répandre leur pluie sur elle.
  '7':
  - type: text
    content: Or, c’est le peuple d’Israël
  - type: text
    content: qui est la vigne ╵de l’Eternel, ╵du Seigneur des armées célestes.
  - type: text
    content: Le plant qui faisait ses délices
  - type: text
    content: ce sont les habitants ╵du pays de Juda.
  - type: text
    content: Il attendait d’eux la droiture,
  - type: text
    content: et ce n’est qu’injustice ; ╵il attendait d’eux la justice,
  - type: text
    content: et ce sont des cris de détresse.
  - type: heading
    content: Malheurs et jugements
  '8':
  - type: text
    content: Malheur à vous ╵qui joignez maison à maison
  - type: text
    content: et ajoutez un champ à l’autre
  - type: text
    content: au point qu’il n’y a plus d’espace libre
  - type: text
    content: parce que vous occupez à vous seuls ╵tout le pays.
  '9':
  - type: text
    content: 'Le Seigneur des armées célestes ╵m’a parlé et m’a dit :'
  - type: text
    content: Ces nombreuses maisons ╵deviendront une ruine,
  - type: text
    content: ces maisons grandes et superbes ╵seront inhabitées.
