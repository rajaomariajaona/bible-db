document_id: JOS.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire de la tribu de Siméon
  - type: text
    content: 'Le deuxième lot échut par le sort aux familles de la tribu de Siméon. Leur territoire était au milieu de celui de Juda. '
  '10':
  - type: text
    content: 'Le troisième lot fut attribué par tirage au sort aux familles de la tribu de Zabulon. Leur territoire s’étendait jusqu’à Sarid. '
  '11':
  - type: text
    content: 'De là, la frontière de leur domaine remontait à l’ouest vers Mareala, touchait à Dabbésheth et au torrent qui coule près de Yoqneam. '
  '12':
  - type: text
    content: 'De Sarid, elle allait vers l’est rejoindre le territoire de Kisloth-Thabor, se dirigeait vers Dabrath, et montait à Yaphia. '
  '13':
  - type: text
    content: 'Ensuite, elle continuait plus à l’est sur Guitta-Hépher, Itta-Qatsin, puis se dirigeait sur Rimmôn, et s’incurvait pour passer à Néa. '
  '14':
  - type: text
    content: 'Au nord, la frontière contournait Hannathôn et débouchait dans la vallée de Yiphtah-El. '
  '15':
  - type: text
    content: Le territoire comprenait douze villes avec les villages qui en dépendaient, dont Qattath, Nahalal, Shimrôn, Yideala et Bethléhem
  - type: note
    content: Différente de la Bethléhem de Juda où naîtra Jésus (1 S 17.12 ; Rt 1.1).
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tel fut le patrimoine des familles de Zabulon, avec leurs villes et les villages qui en dépendaient.
  - type: heading
    content: Le territoire de la tribu d’Issacar
  '17':
  - type: text
    content: 'Le quatrième lot fut attribué par le sort aux familles d’Issacar. '
  '18':
  - type: text
    content: 'Leur territoire comprenait Jizréel, Kesoulloth, Sunem, '
  '19':
  - type: text
    content: 'Hapharaïm, Shiôn, Anaharath, '
  '2':
  - type: text
    content: 'Il comprenait Beer-Sheva, Shéba, Molada, '
  '20':
  - type: text
    content: 'Rabbith, Qishyôn, Abets, '
  '21':
  - type: text
    content: 'Rémeth, Eyn-Gannim, Eyn-Hadda et Beth-Patsets. '
  '22':
  - type: text
    content: 'La frontière touchait à Thabor, Shahatsima et à Beth-Shémesh, pour aboutir au Jourdain. Le territoire comprenait seize villes et les villages qui en dépendaient. '
  '23':
  - type: text
    content: Tel fut le patrimoine des familles d’Issacar avec les villages qui en dépendaient.
  - type: heading
    content: Le territoire de la tribu d’Aser
  '24':
  - type: text
    content: 'Le cinquième lot échut par le sort aux familles de la tribu d’Aser. '
  '25':
  - type: text
    content: 'Leur territoire comprenait les villes de Helqath, Hali, Béten, Akshaph, '
  '26':
  - type: text
    content: Allammélek, Amead et Misheal. La frontière atteignait le mont Carmel à l’ouest, et Shihor-Libnath.
  '27':
  - type: text
    content: 'Puis elle tournait à l’est vers Beth-Dagôn, touchait le territoire de Zabulon et la vallée de Yiphtah-El, au nord de Beth-Emeq et Neïel, pour se prolonger vers Kaboul à gauche, '
  '28':
  - type: text
    content: Ebrôn
  - type: note
    content: Au lieu d’Ebrôn, certains manuscrits ont Abdôn, ce qui correspond à Jos 21.30.
  - type: text
    content: ', Rehob, Hammôn et Qana, jusqu’à Sidon-la-Grande. '
  '29':
  - type: text
    content: 'Ensuite elle tournait vers Rama et la forteresse de Tyr, partait vers Hosa, pour aboutir à la mer Méditerranée en passant dans la région d’Akzib, '
  '3':
  - type: text
    content: 'Hatsar-Shoual, Bala, Atsem, '
  '30':
  - type: text
    content: 'puis par Oumma, Apheq et Rehob. Le territoire comprenait vingt-deux villes et leurs villages. '
  '31':
  - type: text
    content: Tel fut le patrimoine des familles de la tribu d’Aser avec leurs villes et leurs villages.
  - type: heading
    content: Le territoire de la tribu de Nephtali
  '32':
  - type: text
    content: 'Le sixième lot échut par le sort aux familles de Nephtali. '
  '33':
  - type: text
    content: 'Leur frontière partait de Héleph et du chêne de Tsaanannim, puis passait par Adami-Nékeb et Yabnéel pour aller à Laqqoum et déboucher sur le Jourdain. '
  '34':
  - type: text
    content: Elle tournait à l’ouest vers Aznoth-Thabor, et de là se dirigeait vers Houqoq et touchait le territoire de Zabulon au sud, puis celui d’Aser à l’ouest. A l’est
  - type: note
    content: D’après l’ancienne version grecque. Le texte hébreu traditionnel intercale en Juda entre à l’ouest et à l’est.
  - type: text
    content: ', elle était constituée par le Jourdain. '
  '35':
  - type: text
    content: 'Les villes fortifiées étaient Tsiddim, Tser, Hamath, Raqqath, Kinnéreth, '
  '36':
  - type: text
    content: 'Adama, Rama, Hatsor ; '
  '37':
  - type: text
    content: 'Qédesh, Edréi, Eyn-Hatsor ; '
  '38':
  - type: text
    content: 'Yireôn, Migdal-El, Horem, Beth-Anath et Beth-Shémesh : soit dix-neuf villes et les villages qui en dépendaient. '
  '39':
  - type: text
    content: Tel fut le patrimoine des familles de la tribu de Nephtali avec leurs villes et les villages qui en dépendaient.
  - type: heading
    content: Le territoire de la tribu de Dan
  '4':
  - type: text
    content: 'Eltolad, Betoul, Horma, '
  '40':
  - type: text
    content: 'La septième part fut attribuée par le sort aux familles de la tribu de Dan. '
  '41':
  - type: text
    content: 'Le territoire qu’ils reçurent en possession comprenait Tsorea, Eshtaol, Ir-Shémesh : '
  '42':
  - type: text
    content: 'Shaalabbîn, Ayalôn, Yitla ; '
  '43':
  - type: text
    content: 'Elôn, Timnata, Eqrôn : '
  '44':
  - type: text
    content: 'Elteqé, Guibbetôn, Baalath ; '
  '45':
  - type: text
    content: 'Yehoud, Bené-Beraq, Gath-Rimmôn ; '
  '46':
  - type: text
    content: le cours du Yarqôn, Raqôn
  - type: note
    content: 'Raqôn: ce nom est omis par l’ancienne version grecque.'
  - type: text
    content: ' et le territoire en face de Jaffa'
  - type: note
    content: Le Yarqôn arrose Jaffa (la cité de Ac 9.36), près de l’actuelle Tel-Aviv.
  - type: text
    content: '. – '
  '47':
  - type: text
    content: Mais le territoire des Danites leur échappa. Alors les Danites allèrent attaquer Léshem. Ils s’emparèrent de la ville et en tuèrent les habitants, puis ils en prirent possession et s’y installèrent. Ils donnèrent à Léshem le nom de Dan, du nom de leur ancêtre
  - type: note
    content: Le territoire attribué à la tribu de Dan se situait près de la Méditerranée. Mais à cause des pressions exercées par les Amoréens (Jg 1.34), les Danites émigrèrent vers le nord de la vallée du Jourdain et s’emparèrent de la ville de Léshem (ou Laïsh ; voir Jg 18.2-10) qu’ils appelèrent Dan.
  - type: text
    content: '. – '
  '48':
  - type: text
    content: Tel fut le patrimoine des familles de la tribu de Dan, avec leurs villes et les villages qui en dépendaient.
  - type: heading
    content: Le patrimoine attribué à Josué
  '49':
  - type: text
    content: 'Lorsque les Israélites eurent fini de partager le pays en patrimoines délimités, ils attribuèrent un patrimoine à Josué, fils de Noun, parmi les leurs. '
  '5':
  - type: text
    content: 'Tsiqlag, Beth-Markaboth, Hatsar-Sousa, '
  '50':
  - type: text
    content: Sur l’ordre de l’Eternel, ils lui donnèrent la ville qu’il avait demandée, c’est-à-dire Timnath-Sérah dans la région montagneuse d’Ephraïm. Josué rebâtit la ville et s’y installa.
  '51':
  - type: text
    content: Tels furent les patrimoines que le prêtre Eléazar, Josué, fils de Noun, et les chefs des groupes familiaux des tribus d’Israël attribuèrent par tirage au sort, à Silo, devant l’Eternel, à l’entrée de la tente de la Rencontre. Ainsi fut achevé le partage du pays.
  '6':
  - type: text
    content: 'Beth-Lebaoth et Sharouhen : soit treize villes avec leurs villages. '
  '7':
  - type: text
    content: 'Aïn, Rimmôn, Eter et Ashân : quatre villes et leurs villages. '
  '8':
  - type: text
    content: 'Tous les villages qui sont aux alentours de ces villes jusqu’à Baalath-Beer, la Ramath du Néguev. Tout cela constituait le patrimoine des familles de la tribu de Siméon. '
  '9':
  - type: text
    content: Leur territoire fut pris sur la part attribuée aux descendants de Juda car celle-ci était trop grande pour eux. Voilà pourquoi le territoire des descendants de Siméon se trouvait au milieu de celui de Juda.
  - type: heading
    content: Le territoire de la tribu de Zabulon
