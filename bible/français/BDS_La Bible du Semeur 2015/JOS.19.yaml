document_id: JOS.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu de Siméon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le deuxième lot échut par le sort aux familles de la tribu de Siméon. Leur territoire était au milieu de celui de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il comprenait Beer-Sheva, Shéba, Molada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatsar-Shoual, Bala, Atsem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Eltolad, Betoul, Horma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsiqlag, Beth-Markaboth, Hatsar-Sousa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beth-Lebaoth et Sharouhen : soit treize villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aïn, Rimmôn, Eter et Ashân : quatre villes et leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les villages qui sont aux alentours de ces villes jusqu’à Baalath-Beer, la Ramath du Néguev. Tout cela constituait le patrimoine des familles de la tribu de Siméon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Leur territoire fut pris sur la part attribuée aux descendants de Juda car celle-ci était trop grande pour eux. Voilà pourquoi le territoire des descendants de Siméon se trouvait au milieu de celui de Juda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu de Zabulon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le troisième lot fut attribué par tirage au sort aux familles de la tribu de Zabulon. Leur territoire s’étendait jusqu’à Sarid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De là, la frontière de leur domaine remontait à l’ouest vers Mareala, touchait à Dabbésheth et au torrent qui coule près de Yoqneam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De Sarid, elle allait vers l’est rejoindre le territoire de Kisloth-Thabor, se dirigeait vers Dabrath, et montait à Yaphia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ensuite, elle continuait plus à l’est sur Guitta-Hépher, Itta-Qatsin, puis se dirigeait sur Rimmôn, et s’incurvait pour passer à Néa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Au nord, la frontière contournait Hannathôn et débouchait dans la vallée de Yiphtah-El. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le territoire comprenait douze villes avec les villages qui en dépendaient, dont Qattath, Nahalal, Shimrôn, Yideala et Bethléhem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Différente de la Bethléhem de Juda où naîtra Jésus (1 S 17.12 ; Rt 1.1).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tel fut le patrimoine des familles de Zabulon, avec leurs villes et les villages qui en dépendaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu d’Issacar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le quatrième lot fut attribué par le sort aux familles d’Issacar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Leur territoire comprenait Jizréel, Kesoulloth, Sunem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hapharaïm, Shiôn, Anaharath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rabbith, Qishyôn, Abets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rémeth, Eyn-Gannim, Eyn-Hadda et Beth-Patsets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La frontière touchait à Thabor, Shahatsima et à Beth-Shémesh, pour aboutir au Jourdain. Le territoire comprenait seize villes et les villages qui en dépendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tel fut le patrimoine des familles d’Issacar avec les villages qui en dépendaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu d’Aser
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le cinquième lot échut par le sort aux familles de la tribu d’Aser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Leur territoire comprenait les villes de Helqath, Hali, Béten, Akshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Allammélek, Amead et Misheal. La frontière atteignait le mont Carmel à l’ouest, et Shihor-Libnath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis elle tournait à l’est vers Beth-Dagôn, touchait le territoire de Zabulon et la vallée de Yiphtah-El, au nord de Beth-Emeq et Neïel, pour se prolonger vers Kaboul à gauche, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ebrôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au lieu d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ebrôn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'certains manuscrits ont '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abdôn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ce qui correspond à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.30
        metadata:
          usfm: JOS.21.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', Rehob, Hammôn et Qana, jusqu’à Sidon-la-Grande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ensuite elle tournait vers Rama et la forteresse de Tyr, partait vers Hosa, pour aboutir à la mer Méditerranée en passant dans la région d’Akzib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'puis par Oumma, Apheq et Rehob. Le territoire comprenait vingt-deux villes et leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tel fut le patrimoine des familles de la tribu d’Aser avec leurs villes et leurs villages.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu de Nephtali
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le sixième lot échut par le sort aux familles de Nephtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Leur frontière partait de Héleph et du chêne de Tsaanannim, puis passait par Adami-Nékeb et Yabnéel pour aller à Laqqoum et déboucher sur le Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Elle tournait à l’ouest vers Aznoth-Thabor, et de là se dirigeait vers Houqoq et touchait le territoire de Zabulon au sud, puis celui d’Aser à l’ouest. A l’est
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel intercale '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'entre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à l’ouest '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l’est.
    marker-yv: yv-n
  - type: text
    text: ', elle était constituée par le Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les villes fortifiées étaient Tsiddim, Tser, Hamath, Raqqath, Kinnéreth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Adama, Rama, Hatsor ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Qédesh, Edréi, Eyn-Hatsor ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Yireôn, Migdal-El, Horem, Beth-Anath et Beth-Shémesh : soit dix-neuf villes et les villages qui en dépendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Tel fut le patrimoine des familles de la tribu de Nephtali avec leurs villes et les villages qui en dépendaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu de Dan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'La septième part fut attribuée par le sort aux familles de la tribu de Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Le territoire qu’ils reçurent en possession comprenait Tsorea, Eshtaol, Ir-Shémesh : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Shaalabbîn, Ayalôn, Yitla ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Elôn, Timnata, Eqrôn : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Elteqé, Guibbetôn, Baalath ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Yehoud, Bené-Beraq, Gath-Rimmôn ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: le cours du Yarqôn, Raqôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Raqôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': ce nom est omis par l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: ' et le territoire en face de Jaffa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le Yarqôn arrose Jaffa (la cité de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9.36
        metadata:
          usfm: ACT.9.36
      - type: text
        text: ), près de l’actuelle Tel-Aviv.
    marker-yv: yv-n
  - type: text
    text: '. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mais le territoire des Danites leur échappa. Alors les Danites allèrent attaquer Léshem. Ils s’emparèrent de la ville et en tuèrent les habitants, puis ils en prirent possession et s’y installèrent. Ils donnèrent à Léshem le nom de Dan, du nom de leur ancêtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le territoire attribué à la tribu de Dan se situait près de la Méditerranée. Mais à cause des pressions exercées par les Amoréens (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 1.34
        metadata:
          usfm: JDG.1.34
      - type: text
        text: '), les Danites émigrèrent vers le nord de la vallée du Jourdain et s’emparèrent de la ville de Léshem (ou Laïsh ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 18.2-10
        metadata:
          usfm: JDG.18.2+JDG.18.3+JDG.18.4+JDG.18.5+JDG.18.6+JDG.18.7+JDG.18.8+JDG.18.9+JDG.18.10
      - type: text
        text: ) qu’ils appelèrent Dan.
    marker-yv: yv-n
  - type: text
    text: '. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Tel fut le patrimoine des familles de la tribu de Dan, avec leurs villes et les villages qui en dépendaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le patrimoine attribué à Josué
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Lorsque les Israélites eurent fini de partager le pays en patrimoines délimités, ils attribuèrent un patrimoine à Josué, fils de Noun, parmi les leurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Sur l’ordre de l’Eternel, ils lui donnèrent la ville qu’il avait demandée, c’est-à-dire Timnath-Sérah dans la région montagneuse d’Ephraïm. Josué rebâtit la ville et s’y installa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Tels furent les patrimoines que le prêtre Eléazar, Josué, fils de Noun, et les chefs des groupes familiaux des tribus d’Israël attribuèrent par tirage au sort, à Silo, devant l’Eternel, à l’entrée de la tente de la Rencontre. Ainsi fut achevé le partage du pays.
