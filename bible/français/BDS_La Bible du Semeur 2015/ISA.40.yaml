document_id: ISA.40
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le livre de la consolation
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La délivrance promise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Réconfortez mon peuple, ╵oui, réconfortez-le !
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et parlez au cœur de Jérusalem, ╵annoncez-lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: que son temps de corvée ╵est accompli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que son péché est expié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle a reçu de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: deux fois le prix de ses péchés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On entend une voix crier :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Dégagez un chemin ╵dans le désert ╵pour l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nivelez dans la steppe
- type: usfm
  marker: q1
  children:
  - type: text
    text: une route pour notre Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en Mt 3.3 ; Mc 1.3 ; Jn 1.23 d’après l’ancienne version grecque. Les v. 3-5 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 3.4-6
        metadata:
          usfm: LUK.3.4+LUK.3.5+LUK.3.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toute vallée sera élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute montagne abaissée ╵ainsi que toutes les collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les lieux accidentés ╵se changeront en plaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les rochers escarpés ╵deviendront des vallées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors la gloire ╵de l’Eternel ╵sera manifestée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les hommes ╵la verront à la fois.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel l’a promis. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Une voix interpelle : ╵« Va, proclame un message ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Une autre lui répond : ╵« Que dois-je proclamer ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Que tout homme est pareil à l’herbe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa beauté ╵comme la fleur des champs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 6-8 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 P 1.24-25
        metadata:
          usfm: 1PE.1.24+1PE.1.25
      - type: text
        text: ' d’après l’ancienne version grecque. Voir aussi '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 1.10-11
        metadata:
          usfm: JAS.1.10+JAS.1.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car l’herbe se dessèche ╵et la fleur se flétrit
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le souffle de l’Eternel ╵passe dessus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En vérité : les hommes ╵sont pareils à de l’herbe.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, l’herbe se dessèche ╵et la fleur se flétrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la parole ╵de notre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: subsistera toujours. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Sion, messagère ╵d’une bonne nouvelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gravis une haute montagne !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Crie avec force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem, ╵messagère d’une bonne nouvelle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, crie sans crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'annonce aux villes de Juda :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Voici votre Dieu vient ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voici l’Eternel, le Seigneur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vient avec puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son bras lui assure ╵la souveraineté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici : ses récompenses ╵sont avec lui,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fruit de son œuvre ╵va devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Comme un berger, ╵il paîtra son troupeau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il rassemblera ╵les agneaux dans ses bras.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur son sein, il les porte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et conduit doucement ╵les brebis qui allaitent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ez 34.15 ; Jn 10.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La grandeur de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qui a mesuré l’océan ╵dans le creux de sa main ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a déterminé les dimensions du ciel ╵avec la largeur de sa main ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a tassé dans un boisseau ╵toute la poussière du sol ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a bien pu peser ╵les montagnes sur la bascule
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les coteaux sur la balance ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui donc a mesuré ╵l’Esprit de l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a été son conseiller
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Rm 11.34 ; 1 Co 2.16.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De qui Dieu a-t-il pris conseil
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour se faire éclairer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a enseigné ╵la voie du droit ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a transmis le savoir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lui a fait connaître ╵le chemin de l’intelligence ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici : les nations sont pour lui'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la goutte d’eau ╵tombant d’un seau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme un grain de sable ╵sur le plateau de la balance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici : les îles ╵et les régions côtières,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les soulève ╵comme de la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les cèdres du Liban ╵ne suffiraient pas à nourrir ╵le feu de son autel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les animaux qui y vivent ╵ne seraient pas assez nombreux ╵pour l’holocauste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toutes les nations, à ses yeux, ╵sont comme rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont, pour lui, la valeur ╵du néant et du vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A qui comparerez-vous Dieu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comment le représenterez-vous ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Une idole moulée, ╵un artisan la fond,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orfèvre la recouvre ╵d’un fin placage d’or
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il l’orne de chaînettes d’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui qui est trop pauvre ╵pour une telle offrande
- type: usfm
  marker: q1
  children:
  - type: text
    text: choisit un bois ╵qui ne pourrisse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il s’en va chercher ╵un artisan habile
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire une statue ╵qui ne vacille pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne le savez-vous pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne l’avez-vous pas entendu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela ne vous a-t-il pas été déclaré ╵dès le commencement ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’avez-vous pas compris
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fondation du monde ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Or, pour celui qui siège ╵bien au-dessus ╵du cercle de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses habitants ╵sont pareils à des sauterelles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a tendu le ciel comme une toile
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il l’a déployé ╵comme une tente ╵pour l’habiter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il réduit à néant ╵les princes de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait évanouir ╵les dirigeants du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A peine ont-ils été plantés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à peine ont-ils été semés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à peine ont-ils poussé ╵quelque racine en terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel souffle sur eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les voilà qui sèchent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui sont emportés ╵comme un fétu de paille ╵par la tempête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: « A qui voudriez-vous ╵me comparer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui serait mon égal ? »
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande le Dieu saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Levez bien haut les yeux ╵et regardez :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a créé ces astres ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est celui qui fait marcher ╵leur armée en bon ordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui les convoque tous, ╵les nommant par leur nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et grâce à sa grande puissance ╵et à sa formidable force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas un ne fait défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pourquoi donc, ô Jacob, ╵parler ainsi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et pourquoi dire, ô Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Mon sort échappe à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon Dieu ne fait rien ╵pour défendre mon droit » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne le sais-tu donc pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’as-tu pas appris
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel est Dieu ╵de toute éternité ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui a créé ╵les confins de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se lasse pas, ╵il ne s’épuise pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son intelligence ╵ne peut être sondée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il donne de la force ╵à qui est las
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il augmente la vigueur ╵de celui qui est épuisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les jeunes gens se lassent ╵et ils s’épuisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même de robustes gaillards tombent,
- type: usfm
  marker: q1
  children:
