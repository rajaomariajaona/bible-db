document_id: ISA.40,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre de la consolation
  - type: heading
    content: La délivrance promise
  - type: text
    content: Réconfortez mon peuple, ╵oui, réconfortez-le !
  - type: text
    content: dit votre Dieu.
  '10':
  - type: text
    content: Voici l’Eternel, le Seigneur ;
  - type: text
    content: il vient avec puissance
  - type: text
    content: et son bras lui assure ╵la souveraineté.
  - type: text
    content: 'Voici : ses récompenses ╵sont avec lui,'
  - type: text
    content: et le fruit de son œuvre ╵va devant lui.
  '11':
  - type: text
    content: Comme un berger, ╵il paîtra son troupeau
  - type: text
    content: et il rassemblera ╵les agneaux dans ses bras.
  - type: text
    content: Sur son sein, il les porte
  - type: text
    content: et conduit doucement ╵les brebis qui allaitent
  - type: note
    content: Voir Ez 34.15 ; Jn 10.11.
  - type: text
    content: .
  - type: heading
    content: La grandeur de Dieu
  '12':
  - type: text
    content: Qui a mesuré l’océan ╵dans le creux de sa main ?
  - type: text
    content: Qui a déterminé les dimensions du ciel ╵avec la largeur de sa main ?
  - type: text
    content: Qui a tassé dans un boisseau ╵toute la poussière du sol ?
  - type: text
    content: Qui a bien pu peser ╵les montagnes sur la bascule
  - type: text
    content: et les coteaux sur la balance ?
  '13':
  - type: text
    content: Qui donc a mesuré ╵l’Esprit de l’Eternel ?
  - type: text
    content: Qui a été son conseiller
  - type: note
    content: Cité en Rm 11.34 ; 1 Co 2.16.
  - type: text
    content: '  ?'
  '14':
  - type: text
    content: De qui Dieu a-t-il pris conseil
  - type: text
    content: pour se faire éclairer ?
  - type: text
    content: Qui lui a enseigné ╵la voie du droit ?
  - type: text
    content: Qui lui a transmis le savoir
  - type: text
    content: et lui a fait connaître ╵le chemin de l’intelligence ?
  '15':
  - type: text
    content: 'Voici : les nations sont pour lui'
  - type: text
    content: comme la goutte d’eau ╵tombant d’un seau,
  - type: text
    content: ou comme un grain de sable ╵sur le plateau de la balance.
  - type: text
    content: 'Voici : les îles ╵et les régions côtières,'
  - type: text
    content: il les soulève ╵comme de la poussière.
  '16':
  - type: text
    content: Les cèdres du Liban ╵ne suffiraient pas à nourrir ╵le feu de son autel,
  - type: text
    content: tous les animaux qui y vivent ╵ne seraient pas assez nombreux ╵pour l’holocauste.
  '17':
  - type: text
    content: Toutes les nations, à ses yeux, ╵sont comme rien.
  - type: text
    content: Elles ont, pour lui, la valeur ╵du néant et du vide.
  '18':
  - type: text
    content: A qui comparerez-vous Dieu ?
  - type: text
    content: Et comment le représenterez-vous ?
  '19':
  - type: text
    content: Une idole moulée, ╵un artisan la fond,
  - type: text
    content: l’orfèvre la recouvre ╵d’un fin placage d’or
  - type: text
    content: puis il l’orne de chaînettes d’argent.
  '2':
  - type: text
    content: Et parlez au cœur de Jérusalem, ╵annoncez-lui
  - type: text
    content: que son temps de corvée ╵est accompli,
  - type: text
    content: que son péché est expié,
  - type: text
    content: qu’elle a reçu de l’Eternel
  - type: text
    content: deux fois le prix de ses péchés !
  '20':
  - type: text
    content: Celui qui est trop pauvre ╵pour une telle offrande
  - type: text
    content: choisit un bois ╵qui ne pourrisse pas,
  - type: text
    content: puis il s’en va chercher ╵un artisan habile
  - type: text
    content: pour faire une statue ╵qui ne vacille pas.
  '21':
  - type: text
    content: Ne le savez-vous pas ?
  - type: text
    content: Ne l’avez-vous pas entendu ?
  - type: text
    content: Cela ne vous a-t-il pas été déclaré ╵dès le commencement ?
  - type: text
    content: N’avez-vous pas compris
  - type: text
    content: la fondation du monde ?
  '22':
  - type: text
    content: Or, pour celui qui siège ╵bien au-dessus ╵du cercle de la terre,
  - type: text
    content: ses habitants ╵sont pareils à des sauterelles.
  - type: text
    content: Il a tendu le ciel comme une toile
  - type: text
    content: et il l’a déployé ╵comme une tente ╵pour l’habiter.
  '23':
  - type: text
    content: Il réduit à néant ╵les princes de la terre
  - type: text
    content: et fait évanouir ╵les dirigeants du monde.
  '24':
  - type: text
    content: A peine ont-ils été plantés,
  - type: text
    content: à peine ont-ils été semés,
  - type: text
    content: à peine ont-ils poussé ╵quelque racine en terre,
  - type: text
    content: que l’Eternel souffle sur eux
  - type: text
    content: et les voilà qui sèchent
  - type: text
    content: et qui sont emportés ╵comme un fétu de paille ╵par la tempête.
  '25':
  - type: text
    content: « A qui voudriez-vous ╵me comparer ?
  - type: text
    content: Qui serait mon égal ? »
  - type: text
    content: demande le Dieu saint.
  '26':
  - type: text
    content: 'Levez bien haut les yeux ╵et regardez :'
  - type: text
    content: qui a créé ces astres ?
  - type: text
    content: C’est celui qui fait marcher ╵leur armée en bon ordre,
  - type: text
    content: qui les convoque tous, ╵les nommant par leur nom.
  - type: text
    content: Et grâce à sa grande puissance ╵et à sa formidable force,
  - type: text
    content: pas un ne fait défaut.
  '27':
  - type: text
    content: Pourquoi donc, ô Jacob, ╵parler ainsi ?
  - type: text
    content: 'Et pourquoi dire, ô Israël :'
  - type: text
    content: « Mon sort échappe à l’Eternel,
  - type: text
    content: et mon Dieu ne fait rien ╵pour défendre mon droit » ?
  '28':
  - type: text
    content: Ne le sais-tu donc pas ?
  - type: text
    content: Et n’as-tu pas appris
  - type: text
    content: que l’Eternel est Dieu ╵de toute éternité ?
  - type: text
    content: C’est lui qui a créé ╵les confins de la terre.
  - type: text
    content: Il ne se lasse pas, ╵il ne s’épuise pas,
  - type: text
    content: et son intelligence ╵ne peut être sondée.
  '29':
  - type: text
    content: Il donne de la force ╵à qui est las
  - type: text
    content: et il augmente la vigueur ╵de celui qui est épuisé.
  '3':
  - type: text
    content: 'On entend une voix crier :'
  - type: text
    content: « Dégagez un chemin ╵dans le désert ╵pour l’Eternel,
  - type: text
    content: nivelez dans la steppe
  - type: text
    content: une route pour notre Dieu
  - type: note
    content: Cité en Mt 3.3 ; Mc 1.3 ; Jn 1.23 d’après l’ancienne version grecque. Les v. 3-5 sont cités en Lc 3.4-6.
  - type: text
    content: '  !'
  '30':
  - type: text
    content: Les jeunes gens se lassent ╵et ils s’épuisent,
  - type: text
    content: et même de robustes gaillards tombent,
  '31':
  - type: text
    content: 'mais ceux qui comptent ╵sur l’Eternel ╵renouvellent leur force :'
  - type: text
    content: ils prennent leur envol ╵comme de jeunes aigles ;
  - type: text
    content: sans se lasser, ils courent,
  - type: text
    content: ils marchent en avant, ╵et ne s’épuisent pas.
  '4':
  - type: text
    content: Toute vallée sera élevée,
  - type: text
    content: toute montagne abaissée ╵ainsi que toutes les collines.
  - type: text
    content: Les lieux accidentés ╵se changeront en plaine,
  - type: text
    content: les rochers escarpés ╵deviendront des vallées.
  '5':
  - type: text
    content: Alors la gloire ╵de l’Eternel ╵sera manifestée,
  - type: text
    content: et tous les hommes ╵la verront à la fois.
  - type: text
    content: L’Eternel l’a promis. »
  '6':
  - type: text
    content: 'Une voix interpelle : ╵« Va, proclame un message ! »'
  - type: text
    content: 'Une autre lui répond : ╵« Que dois-je proclamer ?'
  - type: text
    content: – Que tout homme est pareil à l’herbe
  - type: text
    content: et toute sa beauté ╵comme la fleur des champs
  - type: note
    content: Les v. 6-8 sont cités en 1 P 1.24-25 d’après l’ancienne version grecque. Voir aussi Jc 1.10-11.
  - type: text
    content: '  ;'
  '7':
  - type: text
    content: car l’herbe se dessèche ╵et la fleur se flétrit
  - type: text
    content: quand le souffle de l’Eternel ╵passe dessus.
  - type: text
    content: 'En vérité : les hommes ╵sont pareils à de l’herbe.'
  '8':
  - type: text
    content: Oui, l’herbe se dessèche ╵et la fleur se flétrit,
  - type: text
    content: mais la parole ╵de notre Dieu
  - type: text
    content: subsistera toujours. »
  '9':
  - type: text
    content: O Sion, messagère ╵d’une bonne nouvelle,
  - type: text
    content: gravis une haute montagne !
  - type: text
    content: Crie avec force,
  - type: text
    content: Jérusalem, ╵messagère d’une bonne nouvelle !
  - type: text
    content: Oui, crie sans crainte,
  - type: text
    content: 'annonce aux villes de Juda :'
  - type: text
    content: « Voici votre Dieu vient ! »
