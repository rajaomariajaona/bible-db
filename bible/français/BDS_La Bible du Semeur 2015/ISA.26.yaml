document_id: ISA.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Chant de triomphe
  - type: text
    content: 'En ce jour-là, ╵on chantera cet hymne ╵au pays de Juda :'
  - type: text
    content: Nous avons une ville ╵qui est bien fortifiée,
  - type: text
    content: Dieu a fait du salut ╵une muraille et un rempart.
  '10':
  - type: text
    content: Fait-on grâce au méchant,
  - type: text
    content: il n’apprendra jamais à être juste.
  - type: text
    content: Même au pays du droit, ╵il commettra le mal
  - type: text
    content: et il ne verra pas ╵la majesté de l’Eternel.
  - type: heading
    content: Plainte et retour à la vie
  '11':
  - type: text
    content: Quand tu lèves ta main ╵pour juger, Eternel,
  - type: text
    content: eux, ils ne le voient pas.
  - type: text
    content: Mais ils verront ╵comment tu prends à cœur ╵la cause de ton peuple
  - type: text
    content: et ils seront confus,
  - type: text
    content: consumés par le feu ╵préparé pour tes ennemis.
  '12':
  - type: text
    content: O Eternel, tu nous donnes la paix,
  - type: text
    content: car c’est bien toi ╵qui accomplis pour nous
  - type: text
    content: tout ce que nous faisons.
  '13':
  - type: text
    content: Eternel, notre Dieu,
  - type: text
    content: d’autres maîtres que toi ╵ont dominé sur nous,
  - type: text
    content: mais c’est toi seul ╵que nous louons.
  '14':
  - type: text
    content: Les morts ne vivront plus,
  - type: text
    content: les ombres ne se relèveront pas,
  - type: text
    content: car toi, tu es intervenu
  - type: text
    content: pour les exterminer.
  - type: text
    content: Tu as fait disparaître ╵jusqu’à leur souvenir.
  '15':
  - type: text
    content: Tu as multiplié ╵la nation, Eternel,
  - type: text
    content: tu l’as multipliée, ╵tu as montré ta gloire,
  - type: text
    content: tu as fait reculer ╵les confins du pays ╵sur toutes les frontières.
  '16':
  - type: text
    content: O Eternel, dans la détresse,
  - type: text
    content: nous nous sommes tournés vers toi
  - type: note
    content: 'D’après deux manuscrits hébreux et l’ancienne version grecque. Les autres manuscrits hébreux ont : on s’est tourné vers toi ou ils se sont tournés vers toi.'
  - type: text
    content: ','
  - type: text
    content: nous t’avons présenté notre prière
  - type: text
    content: quand tu nous as châtiés.
  '17':
  - type: text
    content: Nous étions devant toi, ╵ô Eternel,
  - type: text
    content: comme une femme enceinte ╵et prête à enfanter,
  - type: text
    content: qui souffre et qui crie de douleur,
  '18':
  - type: text
    content: car nous avons conçu, ╵et nous étions dans les douleurs
  - type: text
    content: mais ce que nous avons ╵enfanté, c’est du vent.
  - type: text
    content: Nous n’avons pas donné ╵le salut à la terre,
  - type: text
    content: nous n’avons pas donné la vie ╵à de nouveaux habitants pour le monde.
  '19':
  - type: text
    content: Mais tes morts revivront,
  - type: text
    content: les cadavres de ceux qui m’appartiennent ╵reviendront à la vie.
  - type: text
    content: Oui, vous qui demeurez dans la poussière,
  - type: text
    content: réveillez-vous, ╵poussez des cris de joie
  - type: note
    content: 'vous qui demeurez dans la poussière… de joie. Le texte hébreu de Qumrân a : ceux qui demeurent… de joie.'
  - type: text
    content: ','
  - type: text
    content: car ta rosée ╵est une rosée de lumière,
  - type: text
    content: et la terre rendra les trépassés.
  - type: heading
    content: Grâce et restauration
  '2':
  - type: text
    content: Ouvrez les portes
  - type: text
    content: et laissez-y entrer ╵la nation qui est juste,
  - type: text
    content: qui demeure fidèle
  - type: note
    content: Voir Ps 118.19-20.
  - type: text
    content: .
  '20':
  - type: text
    content: Va, ô mon peuple, ╵et entre dans ta chambre,
  - type: text
    content: sur toi ferme la porte,
  - type: text
    content: cache-toi un instant,
  - type: text
    content: le temps que passe la colère.
  '21':
  - type: text
    content: Car l’Eternel ╵va sortir de sa résidence
  - type: text
    content: pour faire payer leurs péchés ╵aux habitants du monde,
  - type: text
    content: et, ce jour-là, la terre ╵mettra à jour le sang ╵versé sur elle
  - type: text
    content: et ne cachera plus ╵les victimes qu’elle dissimulait.
  '3':
  - type: text
    content: A celui qui est ferme ╵dans ses dispositions,
  - type: text
    content: tu assures une paix parfaite,
  - type: text
    content: parce qu’il se confie en toi.
  '4':
  - type: text
    content: Placez votre confiance ╵toujours en l’Eternel,
  - type: text
    content: car l’Eternel est le rocher ╵de toute éternité.
  '5':
  - type: text
    content: Car il a abaissé ╵ceux qui trônaient bien haut
  - type: text
    content: et il a renversé ╵la ville inaccessible,
  - type: text
    content: il l’a abaissée jusqu’à terre,
  - type: text
    content: lui faisant mordre la poussière.
  '6':
  - type: text
    content: Elle est foulée aux pieds,
  - type: text
    content: écrasée par les opprimés
  - type: text
    content: et sous les pas des pauvres.
  - type: heading
    content: Prière
  '7':
  - type: text
    content: Le chemin pour le juste ╵est un chemin bien droit.
  - type: text
    content: Toi qui es droit, tu traces
  - type: note
    content: 'Autre traduction : tu aplanis bien droite.'
  - type: text
    content: ' ╵la voie que suit le juste.'
  '8':
  - type: text
    content: Aussi, ô Eternel, ╵nous espérons en toi ;
  - type: text
    content: sur les voies que tracent tes lois,
  - type: text
    content: oui, tout notre désir ╵vers toi se porte,
  - type: text
    content: nous voulons te garder ╵présent à la pensée.
  '9':
  - type: text
    content: J’aspire à toi ╵pendant la nuit,
  - type: text
    content: et mon esprit ╵te recherche au matin
  - type: note
    content: 'et mon esprit… matin. Autre traduction : je te recherche du fond du cœur.'
  - type: text
    content: .
  - type: text
    content: Lorsque tes jugements ╵s’exercent sur la terre,
  - type: text
    content: les habitants du monde ╵apprennent la justice.
