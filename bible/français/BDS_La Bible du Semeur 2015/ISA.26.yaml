document_id: ISA.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Chant de triomphe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce jour-là, ╵on chantera cet hymne ╵au pays de Juda :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons une ville ╵qui est bien fortifiée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a fait du salut ╵une muraille et un rempart.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fait-on grâce au méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’apprendra jamais à être juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même au pays du droit, ╵il commettra le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne verra pas ╵la majesté de l’Eternel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Plainte et retour à la vie
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Quand tu lèves ta main ╵pour juger, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux, ils ne le voient pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils verront ╵comment tu prends à cœur ╵la cause de ton peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: consumés par le feu ╵préparé pour tes ennemis.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O Eternel, tu nous donnes la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est bien toi ╵qui accomplis pour nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce que nous faisons.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’autres maîtres que toi ╵ont dominé sur nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est toi seul ╵que nous louons.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les morts ne vivront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ombres ne se relèveront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car toi, tu es intervenu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les exterminer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait disparaître ╵jusqu’à leur souvenir.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu as multiplié ╵la nation, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu l’as multipliée, ╵tu as montré ta gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fait reculer ╵les confins du pays ╵sur toutes les frontières.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: O Eternel, dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous nous sommes tournés vers toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après deux manuscrits hébreux et l’ancienne version grecque. Les autres manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on s’est tourné vers toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se sont tournés vers toi.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous t’avons présenté notre prière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu nous as châtiés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nous étions devant toi, ╵ô Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une femme enceinte ╵et prête à enfanter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui souffre et qui crie de douleur,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: car nous avons conçu, ╵et nous étions dans les douleurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ce que nous avons ╵enfanté, c’est du vent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous n’avons pas donné ╵le salut à la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous n’avons pas donné la vie ╵à de nouveaux habitants pour le monde.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mais tes morts revivront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les cadavres de ceux qui m’appartiennent ╵reviendront à la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, vous qui demeurez dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: réveillez-vous, ╵poussez des cris de joie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous qui demeurez dans la poussière… de joie. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu de Qumrân a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui demeurent… de joie.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ta rosée ╵est une rosée de lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre rendra les trépassés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grâce et restauration
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ouvrez les portes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissez-y entrer ╵la nation qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui demeure fidèle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.19-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Va, ô mon peuple, ╵et entre dans ta chambre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toi ferme la porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cache-toi un instant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le temps que passe la colère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Car l’Eternel ╵va sortir de sa résidence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire payer leurs péchés ╵aux habitants du monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, ce jour-là, la terre ╵mettra à jour le sang ╵versé sur elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne cachera plus ╵les victimes qu’elle dissimulait.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A celui qui est ferme ╵dans ses dispositions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu assures une paix parfaite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il se confie en toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Placez votre confiance ╵toujours en l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel est le rocher ╵de toute éternité.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car il a abaissé ╵ceux qui trônaient bien haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a renversé ╵la ville inaccessible,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il l’a abaissée jusqu’à terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui faisant mordre la poussière.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elle est foulée aux pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écrasée par les opprimés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sous les pas des pauvres.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Prière
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le chemin pour le juste ╵est un chemin bien droit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es droit, tu traces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu aplanis bien droite.
      marker-yv: yv-n
    - type: text
      text: ' ╵la voie que suit le juste.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aussi, ô Eternel, ╵nous espérons en toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les voies que tracent tes lois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tout notre désir ╵vers toi se porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous voulons te garder ╵présent à la pensée.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: J’aspire à toi ╵pendant la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon esprit ╵te recherche au matin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et mon esprit… matin. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je te recherche du fond du cœur.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque tes jugements ╵s’exercent sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les habitants du monde ╵apprennent la justice.
