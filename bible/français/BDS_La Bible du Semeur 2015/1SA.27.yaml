document_id: 1SA.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David se réfugie de nouveau chez les Philistins
  - type: text
    content: 'David réfléchit et se dit : Un jour ou l’autre, Saül finira bien par me tuer. Ce que j’ai de mieux à faire, c’est de m’enfuir pour de bon et de me réfugier au pays des Philistins, pour qu’il renonce à me traquer dans tout le territoire d’Israël ; ainsi j’échapperai à son emprise. '
  '10':
  - type: text
    content: 'Quand Akish lui demandait : Où avez-vous fait votre razzia cette fois-ci ?'
  - type: text
    content: 'David répondait : Dans le sud de Juda. Ou : Dans la partie sud du territoire des Yerahmeélites ou des Qéniens'
  - type: note
    content: D’après 1 Ch 2.9, 25, 26, les Yerahmeélites étaient des descendants de Juda par Hetsrôn. Pour les Qéniens, voir Jg 4.11 et note.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Il ne laissait pas de survivant pour ne pas avoir à les amener à Gath, afin qu’ils ne rapportent pas les agissements de David. David suivit cette ligne de conduite pendant tout le temps qu’il séjourna en territoire philistin. '
  '12':
  - type: text
    content: 'Akish comptait de plus en plus sur David, car il se disait : Il s’est sûrement attiré la haine d’Israël, son peuple, et il restera pour toujours à mon service.'
  '2':
  - type: text
    content: 'Là-dessus, David se mit en route avec ses deux femmes, Ahinoam de Jizréel et Abigaïl, femme de Nabal de Karmel, ainsi qu’avec ses six cents hommes et leurs familles ; ils se rendirent chez Akish, fils de Maok, roi de Gath, et s’établirent là. '
  '4':
  - type: text
    content: On informa Saül que David s’était enfui à Gath et il cessa de le poursuivre.
  '5':
  - type: text
    content: 'David dit à Akish : Si tu acceptes de me faire une faveur, autorise-moi à m’installer dans un village quelconque de la campagne. Il n’y a pas de raison pour que ton serviteur réside dans la ville royale avec toi.'
  '6':
  - type: text
    content: 'Alors Akish lui attribua ce même jour Tsiqlag. C’est pourquoi Tsiqlag a appartenu jusqu’à ce jour aux rois de Juda. '
  '7':
  - type: text
    content: David demeura un an et quatre mois en Philistie.
  - type: heading
    content: Les razzias de David
  '8':
  - type: text
    content: 'Pendant ce temps, il faisait avec ses hommes des razzias, tour à tour, chez les Gueshouriens, les Guizriens et les Amalécites, des peuplades qui habitaient depuis très longtemps dans le pays qui s’étend en direction de Shour jusqu’à la frontière de l’Egypte. '
  '9':
  - type: text
    content: David ravageait cette contrée et ne laissait en vie ni homme ni femme ; il ramenait brebis, chèvres et bœufs, ânes, chameaux et vêtements et, à son retour, se rendait chez Akish.
