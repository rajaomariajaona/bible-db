verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David se réfugie de nouveau chez les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David réfléchit et se dit : Un jour ou l’autre, Saül finira bien par me tuer. Ce que j’ai de mieux à faire, c’est de m’enfuir pour de bon et de me réfugier au pays des Philistins, pour qu’il renonce à me traquer dans tout le territoire d’Israël ; ainsi j’échapperai à son emprise. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Akish lui demandait : Où avez-vous fait votre razzia cette fois-ci ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David répondait : Dans le sud de Juda. Ou : Dans la partie sud du territoire des Yerahmeélites ou des Qéniens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 2.9
        - type: text
