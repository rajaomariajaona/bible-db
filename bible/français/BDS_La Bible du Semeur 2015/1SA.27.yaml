      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne laissait pas de survivant pour ne pas avoir à les amener à Gath, afin qu’ils ne rapportent pas les agissements de David. David suivit cette ligne de conduite pendant tout le temps qu’il séjourna en territoire philistin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Akish comptait de plus en plus sur David, car il se disait : Il s’est sûrement attiré la haine d’Israël, son peuple, et il restera pour toujours à mon service.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, David se mit en route avec ses deux femmes, Ahinoam de Jizréel et Abigaïl, femme de Nabal de Karmel, ainsi qu’avec ses six cents hommes et leurs familles ; ils se rendirent chez Akish, fils de Maok, roi de Gath, et s’établirent là. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On informa Saül que David s’était enfui à Gath et il cessa de le poursuivre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit à Akish : Si tu acceptes de me faire une faveur, autorise-moi à m’installer dans un village quelconque de la campagne. Il n’y a pas de raison pour que ton serviteur réside dans la ville royale avec toi.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Akish lui attribua ce même jour Tsiqlag. C’est pourquoi Tsiqlag a appartenu jusqu’à ce jour aux rois de Juda. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David demeura un an et quatre mois en Philistie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les razzias de David
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant ce temps, il faisait avec ses hommes des razzias, tour à tour, chez les Gueshouriens, les Guizriens et les Amalécites, des peuplades qui habitaient depuis très longtemps dans le pays qui s’étend en direction de Shour jusqu’à la frontière de l’Egypte. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David ravageait cette contrée et ne laissait en vie ni homme ni femme ; il ramenait brebis, chèvres et bœufs, ânes, chameaux et vêtements et, à son retour, se rendait chez Akish.
