            text: '26'
        - type: text
          text: ', les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yerahmeélites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étaient des descendants de Juda par Hetsrôn. Pour les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qéniens, '
      - type: usfm
        marker: ft
