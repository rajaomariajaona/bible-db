document_id: 1CH.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers partisans de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici ensuite les hommes qui rejoignirent David à Tsiqlag
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 S 27.6 ; Jos 15.31 ; 19.5 ; 1 Ch 4.30. A quelque 50 kilomètres au sud-ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', quand il était encore obligé de se tenir loin de Saül, fils de Qish. C’étaient des guerriers qui lui prêtèrent main-forte dans les combats. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ezer était leur chef, puis il y avait Abdias, le deuxième, Eliab, le troisième '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mishmanna, le quatrième, Jérémie, le cinquième, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Attaï, le sixième, Eliel, le septième, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Yohanân, le huitième, Elzabad, le neuvième, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jérémie, le dixième, et Makbannaï, le onzième. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ces membres de la tribu de Gad étaient tous des chefs militaires. Le moindre d’entre eux était capable de se battre contre cent hommes et le meilleur contre mille.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ce sont eux qui traversèrent le Jourdain le premier mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mois de Nisân (mars-avril) où le Jourdain est en crue par suite de la fonte des neiges sur l’Hermon.
      marker-yv: yv-n
    - type: text
      text: ' de l’année, à l’époque où il déborde sur toutes ses rives, et qui mirent en fuite tous les habitants des vallées latérales, à l’est comme à l’ouest.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Des hommes des tribus de Benjamin et de Juda rejoignirent aussi David dans son refuge fortifié. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'David sortit au-devant d’eux. Il prit la parole et leur dit : Si vous venez me trouver dans des intentions pacifiques, pour m’aider, nous serons alliés, vous et moi. Mais si c’est pour me trahir et me livrer à mes ennemis, alors que je n’ai commis aucun acte de violence, que le Dieu de nos ancêtres en soit témoin et qu’il juge.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Alors l’Esprit de Dieu s’empara d’Amasaï, le chef du groupe des trente, qui s’écria :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes avec toi, ╵David, fils d’Isaï, ╵oui, nous sommes de ton côté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix te soit assurée, ╵une parfaite paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu’à ceux qui te soutiennent ╵car ton Dieu te soutient !
  - type: usfm
    marker: p
    children:
    - type: text
      text: David les accueillit et en fit des chefs de ses troupes.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils étaient armés d’arcs et savaient se servir indifféremment de la main droite ou de la main gauche pour lancer des pierres, ou tirer des flèches de leur arc. Ils appartenaient à la même tribu que Saül : celle de Benjamin. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Des hommes de la tribu de Manassé se rallièrent à David, lorsqu’il vint avec les Philistins au combat contre Saül. En fait, David et ses hommes ne se joignirent pas aux Philistins, car les princes philistins les renvoyèrent après s’être consultés. Ils se disaient en effet : David risque de passer du côté de son ancien souverain Saül, et de nous livrer en son pouvoir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 29.1-5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est quand il partit pour revenir à Tsiqlag que des gens de Manassé se rallièrent à lui : Adnah, Yozabad, Yediaël, Michaël, Yozabad, Elihou et Tsiltaï. Chacun d’eux était chef de « milliers » dans la tribu de Manassé. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ce fut un sérieux renfort pour David et ses troupes, car c’étaient tous de valeureux guerriers et ils devinrent des chefs dans l’armée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Journellement, des hommes venaient se joindre à David pour le soutenir, si bien que son armée devint bientôt immense ; c’était comme l’armée de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une armée formidable.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’armée de David s’agrandit
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Voici le nombre des soldats et de leurs chefs, équipés pour faire campagne, qui rejoignirent David à Hébron pour lui transférer la royauté de Saül, comme l’Eternel l’avait déclaré :'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: De la tribu de Juda, 6 800 hommes vinrent le rejoindre, ils étaient tous armés de boucliers et de lances et équipés pour la guerre.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'De la tribu de Siméon, 7 100 valeureux guerriers prêts à combattre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'De la tribu de Lévi, 4 600 hommes '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ainsi que Yehoyada, le chef des descendants d’Aaron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.28 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abiatar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était grand-prêtre et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yehoyada '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était le chef militaire des descendants d’Aaron ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Benaya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.22'
        - type: text
          text: ), le chef des gardes du corps de David, puis le général en chef de Salomon, était le fils de Yehoyada.
      marker-yv: yv-n
    - type: text
      text: ', qui était accompagné de 3 700 hommes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tsadoq était un jeune homme de valeur dont le groupe familial comptait vingt-deux chefs.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Leur chef était Ahiézer. C’étaient Joas, fils de Shemaa, de Guibéa, Yeziel et Péleth, fils d’Azmaveth, Beraka, Jéhu, d’Anatoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Des membres de la tribu de Benjamin, la tribu de Saül, il y en avait trois mille, dont la plupart étaient jusqu’alors attachés au service de la maison de Saül.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: De la tribu d’Ephraïm étaient venus 20 800 valeureux guerriers, tous des hommes renommés dans leurs groupes familiaux.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: De la tribu de Manassé, 18 000 hommes furent nommément désignés pour aller proclamer David roi.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'De la tribu d’Issacar, 200 chefs vinrent avec les hommes de leur tribu qui étaient sous leurs ordres. C’étaient des gens qui savaient discerner comment Israël devait agir en fonction des circonstances. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: De la tribu de Zabulon, 50 000 hommes, bien entraînés et parfaitement équipés de toutes les armes de guerre. Ils étaient prêts à combattre d’un cœur résolu.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: De la tribu de Nephtali arrivèrent mille officiers accompagnés de 37 000 hommes armés de boucliers et de lances.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: De la tribu de Dan, 28 600 hommes prêts au combat.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: D’Aser, 40 000 hommes entraînés à la guerre et prêts à combattre.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Des tribus installées à l’est du Jourdain, c’est-à-dire de Ruben, de Gad et de l’autre demi-tribu de Manassé, vinrent 120 000 hommes équipés de toutes les armes de combat.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Tous ces hommes de guerre vinrent à Hébron en ordre de bataille, d’un cœur sans partage, pour proclamer David roi de tout Israël. Tous les autres Israélites étaient également unanimes pour conférer la royauté à David. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Yishmaya, de Gabaon, un guerrier faisant partie du groupe des trente et un chef de ce groupe, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ils passèrent là trois jours avec David, mangeant et buvant ce que leurs compatriotes leur avaient préparé.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les gens de tous les environs, jusqu’à ceux des tribus d’Issacar, de Zabulon et de Nephtali, apportaient des vivres sur des ânes, des chameaux, des mulets et des bœufs : de la farine, des paquets de figues sèches et de raisins secs, du vin, de l’huile, des bœufs et des moutons en quantités, car la joie régnait en Israël.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jérémie, Yahaziel, Yohanân, Yozabad, de Guedéra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Elouzaï, Yerimoth, Bealia, Shemaria, Shephatia, de Haroph, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Elqana, Yishiya, Azaréel, Yoézer et Yashobeam, des Qoréites, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Yoéla et Zebadia, fils de Yeroham, de Guedor.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Des membres de la tribu de Gad quittèrent Saül pour rejoindre David dans son fortin du désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'désert de Juda, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans la caverne d’Adoullam (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 22.1-2
        - type: text
          text: ) où David avait séjourné avant de se rendre chez les Philistins (1 S 23.14 ; 24.1, 23).
      marker-yv: yv-n
    - type: text
      text: '. C’étaient de valeureux guerriers, des soldats exercés au combat, sachant manier le bouclier et la lance. Ils étaient aussi braves que des lions et aussi rapides que des gazelles sur la montagne. '
