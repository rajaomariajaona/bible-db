document_id: 1CH.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les premiers partisans de David
  - type: text
    content: Voici ensuite les hommes qui rejoignirent David à Tsiqlag
  - type: note
    content: Voir 1 S 27.6 ; Jos 15.31 ; 19.5 ; 1 Ch 4.30. A quelque 50 kilomètres au sud-ouest de Jérusalem.
  - type: text
    content: ', quand il était encore obligé de se tenir loin de Saül, fils de Qish. C’étaient des guerriers qui lui prêtèrent main-forte dans les combats. '
  '10':
  - type: text
    content: 'Ezer était leur chef, puis il y avait Abdias, le deuxième, Eliab, le troisième '
  '11':
  - type: text
    content: 'Mishmanna, le quatrième, Jérémie, le cinquième, '
  '12':
  - type: text
    content: 'Attaï, le sixième, Eliel, le septième, '
  '13':
  - type: text
    content: 'Yohanân, le huitième, Elzabad, le neuvième, '
  '14':
  - type: text
    content: 'Jérémie, le dixième, et Makbannaï, le onzième. '
  '15':
  - type: text
    content: Ces membres de la tribu de Gad étaient tous des chefs militaires. Le moindre d’entre eux était capable de se battre contre cent hommes et le meilleur contre mille.
  '16':
  - type: text
    content: Ce sont eux qui traversèrent le Jourdain le premier mois
  - type: note
    content: Mois de Nisân (mars-avril) où le Jourdain est en crue par suite de la fonte des neiges sur l’Hermon.
  - type: text
    content: ' de l’année, à l’époque où il déborde sur toutes ses rives, et qui mirent en fuite tous les habitants des vallées latérales, à l’est comme à l’ouest.'
  '17':
  - type: text
    content: 'Des hommes des tribus de Benjamin et de Juda rejoignirent aussi David dans son refuge fortifié. '
  '18':
  - type: text
    content: 'David sortit au-devant d’eux. Il prit la parole et leur dit : Si vous venez me trouver dans des intentions pacifiques, pour m’aider, nous serons alliés, vous et moi. Mais si c’est pour me trahir et me livrer à mes ennemis, alors que je n’ai commis aucun acte de violence, que le Dieu de nos ancêtres en soit témoin et qu’il juge.'
  '19':
  - type: text
    content: 'Alors l’Esprit de Dieu s’empara d’Amasaï, le chef du groupe des trente, qui s’écria :'
  - type: text
    content: Nous sommes avec toi, ╵David, fils d’Isaï, ╵oui, nous sommes de ton côté.
  - type: text
    content: Que la paix te soit assurée, ╵une parfaite paix,
  - type: text
    content: ainsi qu’à ceux qui te soutiennent ╵car ton Dieu te soutient !
  - type: text
    content: David les accueillit et en fit des chefs de ses troupes.
  '2':
  - type: text
    content: 'Ils étaient armés d’arcs et savaient se servir indifféremment de la main droite ou de la main gauche pour lancer des pierres, ou tirer des flèches de leur arc. Ils appartenaient à la même tribu que Saül : celle de Benjamin. '
  '20':
  - type: text
    content: 'Des hommes de la tribu de Manassé se rallièrent à David, lorsqu’il vint avec les Philistins au combat contre Saül. En fait, David et ses hommes ne se joignirent pas aux Philistins, car les princes philistins les renvoyèrent après s’être consultés. Ils se disaient en effet : David risque de passer du côté de son ancien souverain Saül, et de nous livrer en son pouvoir'
  - type: note
    content: Voir 1 S 29.1-5.
  - type: text
    content: .
  '21':
  - type: text
    content: 'C’est quand il partit pour revenir à Tsiqlag que des gens de Manassé se rallièrent à lui : Adnah, Yozabad, Yediaël, Michaël, Yozabad, Elihou et Tsiltaï. Chacun d’eux était chef de « milliers » dans la tribu de Manassé. '
  '22':
  - type: text
    content: 'Ce fut un sérieux renfort pour David et ses troupes, car c’étaient tous de valeureux guerriers et ils devinrent des chefs dans l’armée. '
  '23':
  - type: text
    content: Journellement, des hommes venaient se joindre à David pour le soutenir, si bien que son armée devint bientôt immense ; c’était comme l’armée de Dieu
  - type: note
    content: 'Autre traduction : une armée formidable.'
  - type: text
    content: .
  - type: heading
    content: L’armée de David s’agrandit
  '24':
  - type: text
    content: 'Voici le nombre des soldats et de leurs chefs, équipés pour faire campagne, qui rejoignirent David à Hébron pour lui transférer la royauté de Saül, comme l’Eternel l’avait déclaré :'
  '25':
  - type: text
    content: De la tribu de Juda, 6 800 hommes vinrent le rejoindre, ils étaient tous armés de boucliers et de lances et équipés pour la guerre.
  '26':
  - type: text
    content: 'De la tribu de Siméon, 7 100 valeureux guerriers prêts à combattre. '
  '27':
  - type: text
    content: 'De la tribu de Lévi, 4 600 hommes '
  '28':
  - type: text
    content: ainsi que Yehoyada, le chef des descendants d’Aaron
  - type: note
    content: Abiatar était grand-prêtre et Yehoyada était le chef militaire des descendants d’Aaron ; Benaya (11.22), le chef des gardes du corps de David, puis le général en chef de Salomon, était le fils de Yehoyada.
  - type: text
    content: ', qui était accompagné de 3 700 hommes. '
  '29':
  - type: text
    content: Tsadoq était un jeune homme de valeur dont le groupe familial comptait vingt-deux chefs.
  '3':
  - type: text
    content: 'Leur chef était Ahiézer. C’étaient Joas, fils de Shemaa, de Guibéa, Yeziel et Péleth, fils d’Azmaveth, Beraka, Jéhu, d’Anatoth, '
  '30':
  - type: text
    content: Des membres de la tribu de Benjamin, la tribu de Saül, il y en avait trois mille, dont la plupart étaient jusqu’alors attachés au service de la maison de Saül.
  '31':
  - type: text
    content: De la tribu d’Ephraïm étaient venus 20 800 valeureux guerriers, tous des hommes renommés dans leurs groupes familiaux.
  '32':
  - type: text
    content: De la tribu de Manassé, 18 000 hommes furent nommément désignés pour aller proclamer David roi.
  '33':
  - type: text
    content: 'De la tribu d’Issacar, 200 chefs vinrent avec les hommes de leur tribu qui étaient sous leurs ordres. C’étaient des gens qui savaient discerner comment Israël devait agir en fonction des circonstances. '
  '34':
  - type: text
    content: De la tribu de Zabulon, 50 000 hommes, bien entraînés et parfaitement équipés de toutes les armes de guerre. Ils étaient prêts à combattre d’un cœur résolu.
  '35':
  - type: text
    content: De la tribu de Nephtali arrivèrent mille officiers accompagnés de 37 000 hommes armés de boucliers et de lances.
  '36':
  - type: text
    content: De la tribu de Dan, 28 600 hommes prêts au combat.
  '37':
  - type: text
    content: D’Aser, 40 000 hommes entraînés à la guerre et prêts à combattre.
  '38':
  - type: text
    content: Des tribus installées à l’est du Jourdain, c’est-à-dire de Ruben, de Gad et de l’autre demi-tribu de Manassé, vinrent 120 000 hommes équipés de toutes les armes de combat.
  '39':
  - type: text
    content: 'Tous ces hommes de guerre vinrent à Hébron en ordre de bataille, d’un cœur sans partage, pour proclamer David roi de tout Israël. Tous les autres Israélites étaient également unanimes pour conférer la royauté à David. '
  '4':
  - type: text
    content: 'Yishmaya, de Gabaon, un guerrier faisant partie du groupe des trente et un chef de ce groupe, '
  '40':
  - type: text
    content: Ils passèrent là trois jours avec David, mangeant et buvant ce que leurs compatriotes leur avaient préparé.
  '41':
  - type: text
    content: 'Les gens de tous les environs, jusqu’à ceux des tribus d’Issacar, de Zabulon et de Nephtali, apportaient des vivres sur des ânes, des chameaux, des mulets et des bœufs : de la farine, des paquets de figues sèches et de raisins secs, du vin, de l’huile, des bœufs et des moutons en quantités, car la joie régnait en Israël.'
  '5':
  - type: text
    content: 'Jérémie, Yahaziel, Yohanân, Yozabad, de Guedéra, '
  '6':
  - type: text
    content: 'Elouzaï, Yerimoth, Bealia, Shemaria, Shephatia, de Haroph, '
  '7':
  - type: text
    content: 'Elqana, Yishiya, Azaréel, Yoézer et Yashobeam, des Qoréites, '
  '8':
  - type: text
    content: Yoéla et Zebadia, fils de Yeroham, de Guedor.
  '9':
  - type: text
    content: Des membres de la tribu de Gad quittèrent Saül pour rejoindre David dans son fortin du désert
  - type: note
    content: Au désert de Juda, dans la caverne d’Adoullam (1 S 22.1-2) où David avait séjourné avant de se rendre chez les Philistins (1 S 23.14 ; 24.1, 23).
  - type: text
    content: '. C’étaient de valeureux guerriers, des soldats exercés au combat, sachant manier le bouclier et la lance. Ils étaient aussi braves que des lions et aussi rapides que des gazelles sur la montagne. '
