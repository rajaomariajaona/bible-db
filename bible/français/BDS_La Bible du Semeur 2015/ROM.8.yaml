document_id: ROM.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Vivre conduits par l’Esprit
  - type: text
    content: 'Maintenant donc, il n’y a plus de condamnation pour ceux qui sont unis à Jésus-Christ. '
  '10':
  - type: text
    content: Or, si Christ est en vous, votre corps reste mortel à cause du péché, mais l’Esprit est source de vie
  - type: note
    content: 'Autre traduction : mais votre esprit a reçu la vie.'
  - type: text
    content: ', parce que vous avez été déclarés justes. '
  '11':
  - type: text
    content: Et si l’Esprit de celui qui a ressuscité Jésus habite en vous, celui qui a ressuscité Christ rendra aussi la vie à votre corps mortel par son Esprit qui habite en vous.
  '12':
  - type: text
    content: 'Ainsi donc, frères et sœurs, si nous avons une obligation, ce n’est pas celle de vivre à la manière de l’homme livré à lui-même. '
  '13':
  - type: text
    content: 'Car, si vous vivez à la manière de l’homme livré à lui-même, vous mourrez, mais si, par l’Esprit, vous faites mourir les actes mauvais que vous accomplissez dans votre corps, vous vivrez. '
  '14':
  - type: text
    content: Car ceux qui sont conduits par l’Esprit de Dieu sont fils de Dieu.
  '15':
  - type: text
    content: 'En effet, vous n’avez pas reçu un Esprit qui fait de vous des esclaves et vous ramène à la crainte : non, vous avez reçu l’Esprit en conséquence de votre adoption'
  - type: note
    content: L’adoption était courante chez les Grecs et les Romains. Les enfants adoptifs avaient les mêmes droits que les autres enfants – y compris le droit d’héritage (v. 23 ; Ga 4.5).
  - type: text
    content: ' par Dieu comme ses fils et ses filles. Car c’est par cet Esprit que nous crions : '
  - type: text
    content: Abba
  - type: note
    content: 'Mot araméen signifiant : cher père (voir Ga 4.6).'
  - type: text
    content: ', c’est-à-dire Père !'
  '16':
  - type: text
    content: 'L’Esprit Saint lui-même témoigne à notre esprit que nous sommes enfants de Dieu. '
  '17':
  - type: text
    content: 'Et puisque nous sommes enfants, nous sommes aussi héritiers : héritiers de Dieu, et donc cohéritiers de Christ, puisque nous souffrons avec lui pour avoir part à sa gloire.'
  - type: heading
    content: L’espérance au milieu des détresses présentes
  '18':
  - type: text
    content: J’estime d’ailleurs qu’il n’y a aucune commune mesure entre les souffrances de la vie présente et la gloire qui va se révéler en nous
  - type: note
    content: 'Autre traduction : pour nous.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'En effet, la création attend, avec un ardent désir, la révélation des fils de Dieu. '
  '2':
  - type: text
    content: Car la loi de l’Esprit qui nous donne la vie dans l’union avec Jésus-Christ t’a libéré
  - type: note
    content: 'Certains manuscrits ont : m’a libéré et d’autres : nous a libérés.'
  - type: text
    content: ' de la loi du péché et de la mort.'
  '20':
  - type: text
    content: Car la création tout entière a été réduite à une condition bien dérisoire
  - type: note
    content: 'Cette expression reprend le mot-clé de l’Ecclésiaste qui est rendu dans diverses traductions par : ce qui est vain, dérisoire, futile, éphémère, précaire, etc.'
  - type: text
    content: '  ; cela ne s’est pas produit de son gré, mais à cause de celui qui l’y a soumise. Il lui a toutefois donné une espérance : '
  '21':
  - type: text
    content: c’est que la création elle-même sera délivrée de l’esclavage, de la corruption pour accéder à la liberté que les enfants de Dieu connaîtront dans la gloire.
  '22':
  - type: text
    content: 'Nous le savons bien, en effet : jusqu’à présent la création tout entière est unie dans un profond gémissement et dans les douleurs d’un enfantement. '
  '23':
  - type: text
    content: Elle n’est pas seule à gémir ; car nous aussi, qui avons reçu l’Esprit comme avant-goût de la gloire, nous gémissons du fond du cœur, en attendant d’être pleinement établis dans notre condition de fils adoptifs de Dieu quand notre corps sera délivré
  - type: note
    content: 'Certains manuscrits ont uniquement : nous gémissons du fond du cœur en attendant la pleine libération de notre corps.'
  - type: text
    content: .
  '24':
  - type: text
    content: 'Car nous sommes sauvés, mais c’est en espérance ; or, voir ce que l’on espère, ce n’est plus espérer ; qui, en effet, continue à espérer ce qu’il voit ? '
  '25':
  - type: text
    content: 'Mais si nous ne voyons pas ce que nous espérons, nous l’attendons avec persévérance. '
  '26':
  - type: text
    content: De même, l’Esprit vient nous aider dans notre faiblesse. En effet, nous ne savons pas prier comme il faut
  - type: note
    content: 'Autre traduction : nous ne savons pas ce qu’il convient de prier.'
  - type: text
    content: ', mais l’Esprit lui-même intercède en gémissant d’une manière inexprimable.'
  '27':
  - type: text
    content: 'Et Dieu qui scrute les cœurs sait ce vers quoi tend l’Esprit, car c’est en accord avec Dieu qu’il intercède pour les membres du peuple saint. '
  '28':
  - type: text
    content: Nous savons en outre que Dieu fait concourir toutes choses au bien de ceux qui l’aiment
  - type: note
    content: 'Autre traduction : que toutes choses concourent ensemble au bien de ceux qui aiment Dieu. D’autres comprennent : que l’Esprit fait concourir toutes choses au bien de ceux qui aiment Dieu.'
  - type: text
    content: ', de ceux qui ont été appelés conformément au plan divin. '
  '29':
  - type: text
    content: En effet, ceux que Dieu a connus d’avance
  - type: note
    content: 'Autre traduction : choisis d’avance.'
  - type: text
    content: ', il les a aussi destinés d’avance à devenir conformes à l’image de son Fils, afin que celui-ci soit l’aîné de nombreux frères et sœurs. '
  '3':
  - type: text
    content: 'Car ce que la Loi était incapable de faire, parce que l’état de l’homme la rendait impuissante, Dieu l’a fait : il a envoyé son propre Fils avec une nature semblable à celle des hommes pécheurs et, pour régler le problème du péché'
  - type: note
    content: 'Autre traduction : et il l’a offert en sacrifice pour le péché.'
  - type: text
    content: ', il a exécuté sur cet homme la sanction qu’encourt le péché'
  - type: note
    content: 'Autre traduction : il a ainsi condamné le péché qui est dans la nature humaine.'
  - type: text
    content: .
  '30':
  - type: text
    content: Ceux qu’il a ainsi destinés, il les a aussi appelés à lui ; ceux qu’il a ainsi appelés, il les a aussi déclarés justes, et ceux qu’il a déclarés justes, il leur a aussi donné sa gloire.
  - type: heading
    content: 'L’amour de Dieu : une assurance certaine'
  '31':
  - type: text
    content: 'Que dire de plus ? Si Dieu est pour nous, qui se lèvera contre nous ? '
  '32':
  - type: text
    content: 'Lui qui n’a même pas épargné son propre Fils, mais l’a livré pour nous tous, comment ne nous donnerait-il pas aussi tout avec lui ? '
  '33':
  - type: text
    content: 'Qui accusera encore les élus de Dieu ? Dieu lui-même les déclare justes. '
  '34':
  - type: text
    content: 'Qui les condamnera ? Christ est mort, bien plus : il est ressuscité ! Il est à la droite de Dieu et il intercède pour nous.'
  '35':
  - type: text
    content: 'Qu’est-ce qui pourra nous arracher à l’amour de Christ ? La détresse ou l’angoisse, la persécution, la faim, la misère, le danger ou l’épée ? '
  '36':
  - type: text
    content: 'Car il nous arrive ce que dit l’Ecriture :'
  - type: text
    content: A cause de toi,
  - type: text
    content: ' ╵'
  - type: text
    content: nous sommes exposés à la mort
  - type: text
    content: ' ╵'
  - type: text
    content: à longueur de jour.
  - type: text
    content: On nous considère
  - type: text
    content: ' ╵'
  - type: text
    content: comme des moutons
  - type: text
    content: ' ╵'
  - type: text
    content: destinés à l’abattoir
  - type: note
    content: Ps 44.23.
  - type: text
    content: .
  '37':
  - type: text
    content: 'Mais dans tout cela nous sommes bien plus que vainqueurs par celui qui nous a aimés. '
  '38':
  - type: text
    content: 'Oui, j’en ai l’absolue certitude : ni la mort ni la vie, ni les anges ni les dominations, ni le présent ni l’avenir, ni les puissances, '
  '39':
  - type: text
    content: ni ce qui est en haut ni ce qui est en bas
  - type: note
    content: 'Autre traduction : ni la hauteur, ni la profondeur (voir Ps 139.8).'
  - type: text
    content: ', ni aucune autre créature, rien ne pourra nous arracher à l’amour que Dieu nous a témoigné en Jésus-Christ notre Seigneur.'
  '4':
  - type: text
    content: Il l’a fait pour que la juste exigence de la Loi soit pleinement satisfaite en ce qui nous concerne
  - type: note
    content: 'Autre traduction : en nous.'
  - type: text
    content: ', nous qui vivons, non plus à la manière de l’homme livré à lui-même, mais dans la dépendance de l’Esprit.'
  '5':
  - type: text
    content: En effet, les hommes livrés à eux-mêmes tendent vers ce qui est conforme à l’homme livré à lui-même. Mais ceux qui ont l’Esprit tendent vers ce qui est conforme à l’Esprit.
  '6':
  - type: text
    content: 'Car ce à quoi tend l’homme livré à lui-même mène à la mort, tandis que ce à quoi tend l’Esprit conduit à la vie et à la paix. '
  '7':
  - type: text
    content: 'En effet, l’homme livré à lui-même, dans toutes ses tendances, n’est que haine de Dieu : il ne se soumet pas à la Loi de Dieu car il ne le peut même pas. '
  '8':
  - type: text
    content: 'Les hommes livrés à eux-mêmes sont incapables de plaire à Dieu. '
  '9':
  - type: text
    content: Vous, au contraire, vous n’êtes pas livrés à vous-mêmes, mais vous dépendez de l’Esprit, puisque l’Esprit de Dieu habite en vous. Si quelqu’un n’a pas l’Esprit de Christ, il ne lui appartient pas.
