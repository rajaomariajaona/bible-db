document_id: ROM.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vivre conduits par l’Esprit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant donc, il n’y a plus de condamnation pour ceux qui sont unis à Jésus-Christ. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, si Christ est en vous, votre corps reste mortel à cause du péché, mais l’Esprit est source de vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais votre esprit a reçu la vie.
      marker-yv: yv-n
    - type: text
      text: ', parce que vous avez été déclarés justes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si l’Esprit de celui qui a ressuscité Jésus habite en vous, celui qui a ressuscité Christ rendra aussi la vie à votre corps mortel par son Esprit qui habite en vous.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, frères et sœurs, si nous avons une obligation, ce n’est pas celle de vivre à la manière de l’homme livré à lui-même. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, si vous vivez à la manière de l’homme livré à lui-même, vous mourrez, mais si, par l’Esprit, vous faites mourir les actes mauvais que vous accomplissez dans votre corps, vous vivrez. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car ceux qui sont conduits par l’Esprit de Dieu sont fils de Dieu.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, vous n’avez pas reçu un Esprit qui fait de vous des esclaves et vous ramène à la crainte : non, vous avez reçu l’Esprit en conséquence de votre adoption'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’adoption était courante chez les Grecs et les Romains. Les enfants adoptifs avaient les mêmes droits que les autres enfants – y compris le droit d’héritage (v. 23 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ga 4.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' par Dieu comme ses fils et ses filles. Car c’est par cet Esprit que nous crions : '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Abba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mot araméen signifiant : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cher père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ga 4.6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', c’est-à-dire Père !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Esprit Saint lui-même témoigne à notre esprit que nous sommes enfants de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et puisque nous sommes enfants, nous sommes aussi héritiers : héritiers de Dieu, et donc cohéritiers de Christ, puisque nous souffrons avec lui pour avoir part à sa gloire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’espérance au milieu des détresses présentes
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’estime d’ailleurs qu’il n’y a aucune commune mesure entre les souffrances de la vie présente et la gloire qui va se révéler en nous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour nous.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, la création attend, avec un ardent désir, la révélation des fils de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car la loi de l’Esprit qui nous donne la vie dans l’union avec Jésus-Christ t’a libéré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'm’a libéré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et d’autres : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous a libérés.
      marker-yv: yv-n
    - type: text
      text: ' de la loi du péché et de la mort.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car la création tout entière a été réduite à une condition bien dérisoire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette expression reprend le mot-clé de l’Ecclésiaste qui est rendu dans diverses traductions par : ce qui est vain, dérisoire, futile, éphémère, précaire, etc.'
      marker-yv: yv-n
    - type: text
      text: '  ; cela ne s’est pas produit de son gré, mais à cause de celui qui l’y a soumise. Il lui a toutefois donné une espérance : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: c’est que la création elle-même sera délivrée de l’esclavage, de la corruption pour accéder à la liberté que les enfants de Dieu connaîtront dans la gloire.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous le savons bien, en effet : jusqu’à présent la création tout entière est unie dans un profond gémissement et dans les douleurs d’un enfantement. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle n’est pas seule à gémir ; car nous aussi, qui avons reçu l’Esprit comme avant-goût de la gloire, nous gémissons du fond du cœur, en attendant d’être pleinement établis dans notre condition de fils adoptifs de Dieu quand notre corps sera délivré
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont uniquement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous gémissons du fond du cœur en attendant la pleine libération de notre corps.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car nous sommes sauvés, mais c’est en espérance ; or, voir ce que l’on espère, ce n’est plus espérer ; qui, en effet, continue à espérer ce qu’il voit ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si nous ne voyons pas ce que nous espérons, nous l’attendons avec persévérance. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De même, l’Esprit vient nous aider dans notre faiblesse. En effet, nous ne savons pas prier comme il faut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous ne savons pas ce qu’il convient de prier.
      marker-yv: yv-n
    - type: text
      text: ', mais l’Esprit lui-même intercède en gémissant d’une manière inexprimable.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu qui scrute les cœurs sait ce vers quoi tend l’Esprit, car c’est en accord avec Dieu qu’il intercède pour les membres du peuple saint. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous savons en outre que Dieu fait concourir toutes choses au bien de ceux qui l’aiment
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que toutes choses concourent ensemble au bien de ceux qui aiment Dieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que l’Esprit fait concourir toutes choses au bien de ceux qui aiment Dieu.
      marker-yv: yv-n
    - type: text
      text: ', de ceux qui ont été appelés conformément au plan divin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, ceux que Dieu a connus d’avance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: choisis d’avance.
      marker-yv: yv-n
    - type: text
      text: ', il les a aussi destinés d’avance à devenir conformes à l’image de son Fils, afin que celui-ci soit l’aîné de nombreux frères et sœurs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce que la Loi était incapable de faire, parce que l’état de l’homme la rendait impuissante, Dieu l’a fait : il a envoyé son propre Fils avec une nature semblable à celle des hommes pécheurs et, pour régler le problème du péché'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il l’a offert en sacrifice pour le péché.
      marker-yv: yv-n
    - type: text
      text: ', il a exécuté sur cet homme la sanction qu’encourt le péché'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a ainsi condamné le péché qui est dans la nature humaine.
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qu’il a ainsi destinés, il les a aussi appelés à lui ; ceux qu’il a ainsi appelés, il les a aussi déclarés justes, et ceux qu’il a déclarés justes, il leur a aussi donné sa gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'L’amour de Dieu : une assurance certaine'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dire de plus ? Si Dieu est pour nous, qui se lèvera contre nous ? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui qui n’a même pas épargné son propre Fils, mais l’a livré pour nous tous, comment ne nous donnerait-il pas aussi tout avec lui ? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui accusera encore les élus de Dieu ? Dieu lui-même les déclare justes. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui les condamnera ? Christ est mort, bien plus : il est ressuscité ! Il est à la droite de Dieu et il intercède pour nous.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’est-ce qui pourra nous arracher à l’amour de Christ ? La détresse ou l’angoisse, la persécution, la faim, la misère, le danger ou l’épée ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car il nous arrive ce que dit l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: A cause de toi,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: nous sommes exposés à la mort
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à longueur de jour.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: On nous considère
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme des moutons
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: destinés à l’abattoir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.36 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 44.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais dans tout cela nous sommes bien plus que vainqueurs par celui qui nous a aimés. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, j’en ai l’absolue certitude : ni la mort ni la vie, ni les anges ni les dominations, ni le présent ni l’avenir, ni les puissances, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ni ce qui est en haut ni ce qui est en bas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ni la hauteur, ni la profondeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 139.8
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', ni aucune autre créature, rien ne pourra nous arracher à l’amour que Dieu nous a témoigné en Jésus-Christ notre Seigneur.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il l’a fait pour que la juste exigence de la Loi soit pleinement satisfaite en ce qui nous concerne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en nous.
      marker-yv: yv-n
    - type: text
      text: ', nous qui vivons, non plus à la manière de l’homme livré à lui-même, mais dans la dépendance de l’Esprit.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, les hommes livrés à eux-mêmes tendent vers ce qui est conforme à l’homme livré à lui-même. Mais ceux qui ont l’Esprit tendent vers ce qui est conforme à l’Esprit.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce à quoi tend l’homme livré à lui-même mène à la mort, tandis que ce à quoi tend l’Esprit conduit à la vie et à la paix. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l’homme livré à lui-même, dans toutes ses tendances, n’est que haine de Dieu : il ne se soumet pas à la Loi de Dieu car il ne le peut même pas. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes livrés à eux-mêmes sont incapables de plaire à Dieu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous, au contraire, vous n’êtes pas livrés à vous-mêmes, mais vous dépendez de l’Esprit, puisque l’Esprit de Dieu habite en vous. Si quelqu’un n’a pas l’Esprit de Christ, il ne lui appartient pas.
