document_id: 1CH.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David soumet les peuples voisins
  - type: heading
    content: (2 S 8.1-14)
  - type: text
    content: Par la suite, David vainquit les Philistins et les humilia ; il leur arracha Gath
  - type: note
    content: L’une des cinq villes principales de la Philistie. Occupation seulement temporaire (voir 1 R 2.39).
  - type: text
    content: ' et les localités qui en dépendent. '
  '10':
  - type: text
    content: 'il lui envoya son fils Hadoram pour lui transmettre ses salutations et ses félicitations d’avoir attaqué et vaincu Hadadézer, avec lequel Tôou avait été continuellement en guerre. Il lui envoya aussi toutes sortes d’objets d’or, d’argent et de bronze. '
  '11':
  - type: text
    content: Le roi David les consacra à l’Eternel, comme il avait déjà fait pour l’argent et l’or qu’il avait pris à tous les autres peuples, c’est-à-dire aux Edomites, aux Moabites, aux Ammonites, aux Philistins et aux Amalécites.
  '12':
  - type: text
    content: Abishaï, fils de Tserouya, battit dix-huit mille Edomites dans la vallée du Sel
  - type: note
    content: Au sud de la mer Morte (2 S 8.13). Voir Ps 60.2.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Après cela, il établit des garnisons dans le pays d’Edom et tous les Edomites lui furent assujettis. L’Eternel donnait la victoire à David dans toutes ses campagnes militaires.
  - type: heading
    content: Les hauts fonctionnaires de David
  - type: heading
    content: (2 S 8.15-18)
  '14':
  - type: text
    content: 'David régna sur tout Israël, il administrait le droit et rendait la justice pour tout son peuple. '
  '15':
  - type: text
    content: 'Joab, fils de Tserouya, était à la tête de l’armée ; Josaphat, fils d’Ahiloud, était archiviste ; '
  '16':
  - type: text
    content: Tsadoq, fils d’Ahitoub
  - type: note
    content: Descendant d’Eléazar, fils d’Aaron (voir 1 Ch 6.35-38 ; 24.1-3). Tsadoq restera fidèle à David durant tout son règne (15.24-29 ; 17.15-16 ; 19.12) et donnera l’onction à Salomon comme successeur du roi (1 R 1.8, 45 ; 2.35 ; 4.4).
  - type: text
    content: ', et Abiatar, fils d’Abimélek'
  - type: note
    content: 'Selon la version syriaque (voir 1 S 22.20 ; 23.6 ; 30.7) ; le texte hébreu traditionnel a : Abimélek, fils d’Abiatar. Certains manuscrits hébreux, la version syriaque, la Vulgate et 2 S 8.17 ont : Ahimélek.'
  - type: text
    content: ', étaient prêtres ; Shavsha était secrétaire. '
  '17':
  - type: text
    content: Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens, la garde personnelle du roi
  - type: note
    content: Il s’agit de mercenaires, originaires de Crète et de Philistie, qui sont toujours restés loyaux envers David (voir 2 S 15.18 ; 20.7) et qui le seront aussi envers Salomon (1 R 1.44).
  - type: text
    content: ', tandis que les fils de David occupaient les premiers rangs aux côtés du roi.'
  '2':
  - type: text
    content: 'Il battit aussi les Moabites. Ceux-ci lui furent assujettis et lui payèrent un tribut. '
  '3':
  - type: text
    content: Puis David battit Hadadézer, roi de Tsoba, du côté de Hamath
  - type: note
    content: Ancienne ville syrienne située sur l’Oronte (voir 2 S 8.9 et note).
  - type: text
    content: ', pendant qu’il était en campagne pour établir sa domination sur la région de l’Euphrate. '
  '4':
  - type: text
    content: 'David lui captura mille chars, sept mille soldats sur char et vingt mille fantassins. Il conserva une centaine de chevaux d’attelage et fit couper les jarrets à tous les autres. '
  '5':
  - type: text
    content: 'Les Syriens de Damas envoyèrent du secours à Hadadézer, roi de Tsoba, mais David battit également les Syriens au nombre de vingt-deux mille hommes. '
  '6':
  - type: text
    content: Puis il installa des garnisons
  - type: note
    content: 'Autre traduction : des préfets. De même au v. 13.'
  - type: text
    content: ' sur le territoire syrien de Damas, et les Syriens lui furent assujettis et durent lui payer un tribut. Ainsi l’Eternel accorda la victoire à David dans toutes ses campagnes militaires. '
  '7':
  - type: text
    content: 'David s’empara des boucliers d’or que portaient les soldats de Hadadézer et il les fit porter à Jérusalem. '
  '8':
  - type: text
    content: A Tibhath et à Koun
  - type: note
    content: Deux localités de Syrie situées dans la vallée entre le Liban et l’Anti-Liban (voir note 2 S 8.8).
  - type: text
    content: ', villes du roi Hadadézer, il enleva aussi une énorme quantité de bronze. Plus tard, Salomon utilisa ce métal pour fabriquer la cuve de bronze, les colonnes et les autres objets de bronze'
  - type: note
    content: Voir 2 Ch 3.15 à 4.22.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Lorsque Tôou, le roi de Hamath, apprit que David avait défait toute l’armée de Hadadézer, roi de Tsoba, '
