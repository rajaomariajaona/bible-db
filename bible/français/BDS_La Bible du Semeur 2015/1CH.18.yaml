document_id: 1CH.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David soumet les peuples voisins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 8.1-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Par la suite, David vainquit les Philistins et les humilia ; il leur arracha Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’une des cinq villes principales de la Philistie. Occupation seulement temporaire (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2.39
        metadata:
          usfm: 1KI.2.39
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et les localités qui en dépendent. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il battit aussi les Moabites. Ceux-ci lui furent assujettis et lui payèrent un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis David battit Hadadézer, roi de Tsoba, du côté de Hamath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ancienne ville syrienne située sur l’Oronte (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.9
        metadata:
          usfm: 2SA.8.9
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', pendant qu’il était en campagne pour établir sa domination sur la région de l’Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David lui captura mille chars, sept mille soldats sur char et vingt mille fantassins. Il conserva une centaine de chevaux d’attelage et fit couper les jarrets à tous les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Syriens de Damas envoyèrent du secours à Hadadézer, roi de Tsoba, mais David battit également les Syriens au nombre de vingt-deux mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis il installa des garnisons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des préfets. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De même au v. 13.
    marker-yv: yv-n
  - type: text
    text: ' sur le territoire syrien de Damas, et les Syriens lui furent assujettis et durent lui payer un tribut. Ainsi l’Eternel accorda la victoire à David dans toutes ses campagnes militaires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David s’empara des boucliers d’or que portaient les soldats de Hadadézer et il les fit porter à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A Tibhath et à Koun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Deux localités de Syrie situées dans la vallée entre le Liban et l’Anti-Liban (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.8
        metadata:
          usfm: 2SA.8.8
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', villes du roi Hadadézer, il enleva aussi une énorme quantité de bronze. Plus tard, Salomon utilisa ce métal pour fabriquer la cuve de bronze, les colonnes et les autres objets de bronze'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 Ch 3.15 à 4.22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque Tôou, le roi de Hamath, apprit que David avait défait toute l’armée de Hadadézer, roi de Tsoba, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'il lui envoya son fils Hadoram pour lui transmettre ses salutations et ses félicitations d’avoir attaqué et vaincu Hadadézer, avec lequel Tôou avait été continuellement en guerre. Il lui envoya aussi toutes sortes d’objets d’or, d’argent et de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le roi David les consacra à l’Eternel, comme il avait déjà fait pour l’argent et l’or qu’il avait pris à tous les autres peuples, c’est-à-dire aux Edomites, aux Moabites, aux Ammonites, aux Philistins et aux Amalécites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Abishaï, fils de Tserouya, battit dix-huit mille Edomites dans la vallée du Sel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud de la mer Morte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.13
        metadata:
          usfm: 2SA.8.13
      - type: text
        text: '). Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 60.2
        metadata:
          usfm: PSA.60.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Après cela, il établit des garnisons dans le pays d’Edom et tous les Edomites lui furent assujettis. L’Eternel donnait la victoire à David dans toutes ses campagnes militaires.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les hauts fonctionnaires de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 8.15-18)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David régna sur tout Israël, il administrait le droit et rendait la justice pour tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joab, fils de Tserouya, était à la tête de l’armée ; Josaphat, fils d’Ahiloud, était archiviste ; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsadoq, fils d’Ahitoub
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Descendant d’Eléazar, fils d’Aaron (voir 1 Ch 6.35-38 ; 24.1-3). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tsadoq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: restera fidèle à David durant tout son règne (15.24-29 ; 17.15-16 ; 19.12) et donnera l’onction à Salomon comme successeur du roi (1 R 1.8, 45 ; 2.35 ; 4.4).
    marker-yv: yv-n
  - type: text
    text: ', et Abiatar, fils d’Abimélek'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon la version syriaque (voir 1 S 22.20 ; 23.6 ; 30.7) ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abimélek, fils d’Abiatar. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits hébreux, la version syriaque, la Vulgate et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.17
        metadata:
          usfm: 2SA.8.17
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ahimélek.
    marker-yv: yv-n
  - type: text
    text: ', étaient prêtres ; Shavsha était secrétaire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens, la garde personnelle du roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de mercenaires, originaires de Crète et de Philistie, qui sont toujours restés loyaux envers David (voir 2 S 15.18 ; 20.7) et qui le seront aussi envers Salomon (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1.44
        metadata:
          usfm: 1KI.1.44
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', tandis que les fils de David occupaient les premiers rangs aux côtés du roi.'
