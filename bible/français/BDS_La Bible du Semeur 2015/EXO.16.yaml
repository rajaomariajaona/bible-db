document_id: EXO.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Dans le désert de Sin : les cailles et la manne'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Toute la communauté des Israélites quitta Elim et, le quinzième jour du second mois qui suivit leur sortie d’Egypte, les Israélites arrivèrent au désert de Sin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud de la péninsule du Sinaï.
    marker-yv: yv-n
  - type: text
    text: ', qui s’étend entre Elim et le Sinaï. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Là, dans le désert, toute l’assemblée des Israélites se plaignit de Moïse et d’Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils leur dirent : Ah ! pourquoi l’Eternel ne nous a-t-il pas fait mourir en Egypte où nous étions installés devant des marmites pleines de viande et où nous mangions du pain à satiété ? Tandis qu’à présent, vous nous avez fait venir dans ce désert pour y faire mourir de faim toute cette multitude.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors l’Eternel dit à Moïse : Regarde, je vais faire pleuvoir du ciel sur vous du pain ; le peuple sortira et en ramassera chaque jour la ration nécessaire. Je le mettrai à l’épreuve de la sorte et je verrai s’il se conforme ou non à mes instructions'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6.31
        metadata:
          usfm: JHN.6.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le sixième jour, il y en aura deux fois plus que les autres jours à ramasser et à apprêter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron dirent à tous les Israélites : Ce soir vous saurez que c’est l’Eternel qui vous a fait sortir d’Egypte, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et demain matin, vous verrez se manifester la gloire de l’Eternel, car il vous a entendu vous plaindre de lui, l’Eternel. Car qui sommes-nous, pour que vous vous plaigniez de nous ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, dit-il, vous le saurez ce soir, quand l’Eternel vous donnera de la viande à manger, et demain lorsqu’il vous donnera du pain à satiété ; car l’Eternel a entendu les plaintes que vous avez formulées contre lui. Nous, que sommes-nous ? Ce n’est pas de nous que vous vous êtes plaints, mais de l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis Moïse dit à Aaron : Ordonne à toute l’assemblée des Israélites de se présenter devant l’Eternel car il a entendu leurs plaintes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pendant qu’Aaron parlait à toute l’assemblée des Israélites, ceux-ci se tournèrent du côté du désert, et voilà que la gloire de l’Eternel apparut dans la nuée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel s’adressa à Moïse et lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’ai entendu les plaintes des Israélites. Dis-leur donc : « Ce soir, avant qu’il fasse nuit, vous mangerez de la viande, et demain matin vous vous rassasierez de pain, et vous saurez que je suis l’Eternel votre Dieu. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, le soir même, des cailles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au printemps, des vols de cailles émigrent d’Arabie et d’Afrique vers le nord. Le phénomène se reproduit dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 11.31-32
        metadata:
          usfm: NUM.11.31+NUM.11.32
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' vinrent s’abattre sur le campement qui en fut recouvert ; et le lendemain matin, il y avait une couche de rosée tout autour du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque cette rosée se fut dissipée, on aperçut par terre, sur le sol du désert, un mince dépôt granuleux, fin comme du givre, qui restait. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En voyant cela, les Israélites se demandèrent les uns aux autres : Qu’est-ce que c’est'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mân hou, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’où dérive le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'manne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: selon le v. 31.
    marker-yv: yv-n
  - type: text
    text: '  ? car ils ne savaient pas ce que c’était.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Moïse leur dit : C’est le pain que l’Eternel vous donne à manger'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10.3
        metadata:
          usfm: 1CO.10.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce qu’il a ordonné à ce sujet : Que chacun de vous en ramasse autant qu’il est nécessaire à sa nourriture, soit environ quatre litres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit d’un omer.
    marker-yv: yv-n
  - type: text
    text: ' par personne. Chacun en prendra pour le nombre de ceux qui sont dans sa tente.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Israélites agirent ainsi : ils en ramassèrent les uns plus, les autres moins. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsqu’ils mesurèrent leur récolte, celui qui en avait ramassé beaucoup n’avait rien de trop, et celui qui en avait pris moins, n’en manquait pas ; chacun en avait ramassé ce qu’il lui fallait pour manger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 8.15
        metadata:
          usfm: 2CO.8.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse leur recommanda : Que personne n’en garde jusqu’à demain matin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais certains ne lui obéirent pas et en gardèrent pour le lendemain ; il s’y mit des vers et cela sentait mauvais. Alors Moïse se fâcha contre ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tous les matins, ils ramassaient donc la manne, chacun la ration nécessaire à sa nourriture. Quand le soleil devenait chaud, elle fondait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour du repos
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le sixième jour, ils en ramassèrent une quantité double, c’est-à-dire environ huit litres par personne au lieu de quatre. Les chefs de la communauté vinrent en informer Moïse, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'qui leur dit : C’est bien ce que l’Eternel a ordonné. Demain, c’est un jour de repos, le sabbat qui est consacré à l’Eternel. Ce que vous avez à cuire au four, cuisez-le aujourd’hui ; ce que vous avez à faire bouillir, faites-le bouillir aujourd’hui ; et tout ce qui est en plus, mettez-le en réserve pour demain'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.8-11
        metadata:
          usfm: EXO.20.8+EXO.20.9+EXO.20.10+EXO.20.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils mirent donc le reste en réserve jusqu’au lendemain, comme Moïse l’avait ordonné, et il n’y eut ni mauvaise odeur ni vers. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse leur dit alors : Mangez aujourd’hui ce que vous avez mis en réserve, car c’est le jour du repos en l’honneur de l’Eternel ; aujourd’hui vous ne trouverez pas de manne dehors. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Pendant six jours vous en ramasserez ; mais le septième jour, le jour du sabbat, il n’y en aura pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Cependant, le septième jour, il y eut des gens qui sortirent pour faire leur provision, mais ils ne trouvèrent rien. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors l’Eternel dit à Moïse : Jusqu’à quand refuserez-vous d’obéir à mes commandements et à mes lois ? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Considérez donc que si l’Eternel vous a donné le jour du repos, il vous donne aussi, le sixième jour, de la nourriture pour deux jours ! Le septième jour, que chacun reste donc dans sa tente et que personne ne sorte de chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ainsi le peuple se reposa le septième jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les Israélites donnèrent à cette nourriture le nom de manne (Qu’est-ce que c’est
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 15 et note.
    marker-yv: yv-n
  - type: text
    text: '  ?). Elle ressemblait à des grains de coriandre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ombellifère aux graines blanches qui pousse à l’état sauvage en Arabie, en Afrique du Nord et en Israël. Son fruit sert d’assaisonnement (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 11.7
        metadata:
          usfm: NUM.11.7
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' blanche, et elle avait un goût de beignet au miel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Moïse dit : Voici ce que l’Eternel a ordonné : Prenez environ quatre litres de cette manne et conservez-les pour les générations futures, pour qu’elles voient l’aliment dont je vous ai nourri au désert, après vous avoir fait sortir d’Egypte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moïse dit donc à Aaron : Prends un récipient et mets-y environ quatre litres de manne, puis dépose-le devant l’Eternel afin de le conserver pour les générations futures'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9.4
        metadata:
          usfm: HEB.9.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Comme l’Eternel l’avait ordonné à Moïse, Aaron le déposa comme souvenir devant le coffre de l’acte de l’alliance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les Israélites mangèrent de la manne pendant quarante ans, jusqu’à leur arrivée dans un pays habité, aux confins du pays de Canaan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La manne a cessé lors de la première Pâque célébrée en Canaan (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 5.10-12
        metadata:
          usfm: JOS.5.10+JOS.5.11+JOS.5.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: (La mesure utilisée, environ quatre litres, correspondait à un dixième de la mesure habituelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’omer correspond à un dixième de l’épha.
    marker-yv: yv-n
  - type: text
    text: .)
