document_id: PRO.29,21
type_code: fra
verses:
  '1':
  - type: text
    content: Qui se raidit contre les reproches
  - type: text
    content: sera brisé soudainement et ne s’en remettra pas.
  '10':
  - type: text
    content: Les meurtriers haïssent l’homme intègre,
  - type: text
    content: mais les gens droits cherchent à préserver sa vie.
  '11':
  - type: text
    content: L’insensé donne libre cours à toutes ses passions,
  - type: text
    content: mais le sage les retient et les calme.
  '12':
  - type: text
    content: Quand un souverain prête attention aux mensonges,
  - type: text
    content: tous ses ministres se pervertissent.
  '13':
  - type: text
    content: 'Le pauvre et l’oppresseur ont ceci en commun :'
  - type: text
    content: c’est de l’Eternel que les yeux de l’un et de l’autre reçoivent la lumière
  - type: note
    content: Ce qui peut signifier que c’est de l’Eternel que l’un et l’autre reçoivent la vie.
  - type: text
    content: .
  '14':
  - type: text
    content: Quand un roi rend justice aux pauvres selon la vérité,
  - type: text
    content: son autorité est affermie à jamais.
  '15':
  - type: text
    content: Les coups de bâton et les réprimandes produisent la sagesse,
  - type: text
    content: mais un enfant livré à lui-même fera la honte de sa mère.
  '16':
  - type: text
    content: Quand les méchants se multiplient
  - type: note
    content: 'En corrigeant une lettre de l’hébreu, on obtient : quand les méchants sont au pouvoir.'
  - type: text
    content: ', les transgressions abondent,'
  - type: text
    content: mais les justes seront témoins de leur chute.
  '17':
  - type: text
    content: 'Corrige ton enfant et tu seras tranquille à son sujet :'
  - type: text
    content: il fera les délices de ton cœur.
  '18':
  - type: text
    content: Quand il n’y a plus de révélation divine, le peuple se laisse aller.
  - type: text
    content: Heureux celui qui obéit à la Loi de Dieu !
  '19':
  - type: text
    content: Ce n’est pas avec des paroles que l’on corrige un serviteur,
  - type: text
    content: si même il comprend ce qu’on lui dit, il n’en tiendra pas compte.
  '2':
  - type: text
    content: Quand les justes deviennent nombreux
  - type: note
    content: 'En corrigeant une lettre de l’hébreu, on obtient : quand les justes sont au pouvoir.'
  - type: text
    content: ', le peuple se réjouit,'
  - type: text
    content: mais quand les méchants dominent, le peuple gémit.
  '20':
  - type: text
    content: As-tu déjà vu un homme qui parle sans réfléchir ?
  - type: text
    content: Il y a plus à espérer d’un insensé que de lui.
  '21':
  - type: text
    content: Si l’on dorlote un serviteur dès son jeune âge,
  - type: text
    content: on finit par en faire un mollasson
  - type: note
    content: 'Sens incertain. Autres traductions : il finit par devenir insolent, ou : il finit par se prendre pour un fils.'
  - type: text
    content: .
  '22':
  - type: text
    content: L’homme prompt à la colère provoque des querelles,
  - type: text
    content: qui s’emporte facilement commet beaucoup de fautes.
  '23':
  - type: text
    content: L’orgueil de l’homme le mène à l’humiliation,
  - type: text
    content: mais la modestie obtient les honneurs.
  '24':
  - type: text
    content: Qui se rend complice d’un voleur, se hait lui-même ;
  - type: text
    content: il entend la malédiction appelée contre ceux qui tairaient le nom du coupable
  - type: note
    content: Adjuration solennelle de dénoncer le coupable, assortie d’une malédiction pour les éventuels contrevenants (voir Lv 5.1 ; Jg 17.2).
  - type: text
    content: ','
  - type: text
    content: mais il ne le dénonce pas.
  '25':
  - type: text
    content: La peur que vous avez des hommes tend un piège sous vos pas,
  - type: text
    content: mais l’Eternel protège celui qui se confie en lui.
  '26':
  - type: text
    content: Nombreux sont ceux qui recherchent la faveur du chef
  - type: note
    content: 'Autre traduction : qui cherchent à être entendus (ou reçus) par le chef.'
  - type: text
    content: ','
  - type: text
    content: mais c’est l’Eternel qui fait droit à chacun.
  '27':
  - type: text
    content: Les justes ont en horreur l’homme inique,
  - type: text
    content: tout comme le méchant a en horreur l’homme dont la conduite est droite.
  '3':
  - type: text
    content: Qui aime la sagesse fait la joie de son père
  - type: text
    content: mais qui fréquente les prostituées, dilapide sa fortune.
  '4':
  - type: text
    content: Un roi qui gouverne selon la justice donne de la stabilité à son pays,
  - type: text
    content: mais celui qui multiplie les impôts le ruine.
  '5':
  - type: text
    content: Qui flatte son prochain
  - type: text
    content: tend un piège sous ses pas.
  '6':
  - type: text
    content: Le méchant est pris au piège de son propre péché,
  - type: text
    content: alors que les gens droits exultent et se réjouissent.
  '7':
  - type: text
    content: Le juste reconnaît le droit des pauvres,
  - type: text
    content: mais le méchant ne veut rien savoir de cela.
  '8':
  - type: text
    content: Les moqueurs jettent des brandons de discorde dans une ville,
  - type: text
    content: mais les sages apaisent la colère.
  '9':
  - type: text
    content: Si un homme sage entre en procès avec un sot,
  - type: text
    content: celui-ci ne sait que se fâcher ou ricaner, et l’on n’en finit pas
  - type: note
    content: 'Autre traduction : qu’il se fâche ou qu’il rie, il n’en finira pas.'
  - type: text
    content: .
