document_id: PRO.29
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Qui se raidit contre les reproches
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera brisé soudainement et ne s’en remettra pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand les justes deviennent nombreux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En corrigeant une lettre de l’hébreu, on obtient : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand les justes sont au pouvoir.
    marker-yv: yv-n
  - type: text
    text: ', le peuple se réjouit,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais quand les méchants dominent, le peuple gémit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qui aime la sagesse fait la joie de son père
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui fréquente les prostituées, dilapide sa fortune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Un roi qui gouverne selon la justice donne de la stabilité à son pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui multiplie les impôts le ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui flatte son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: tend un piège sous ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le méchant est pris au piège de son propre péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que les gens droits exultent et se réjouissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le juste reconnaît le droit des pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le méchant ne veut rien savoir de cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les moqueurs jettent des brandons de discorde dans une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les sages apaisent la colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si un homme sage entre en procès avec un sot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui-ci ne sait que se fâcher ou ricaner, et l’on n’en finit pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’il se fâche ou qu’il rie, il n’en finira pas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les meurtriers haïssent l’homme intègre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les gens droits cherchent à préserver sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’insensé donne libre cours à toutes ses passions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le sage les retient et les calme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand un souverain prête attention aux mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ses ministres se pervertissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le pauvre et l’oppresseur ont ceci en commun :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est de l’Eternel que les yeux de l’un et de l’autre reçoivent la lumière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce qui peut signifier que c’est de l’Eternel que l’un et l’autre reçoivent la vie.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quand un roi rend justice aux pauvres selon la vérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son autorité est affermie à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les coups de bâton et les réprimandes produisent la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un enfant livré à lui-même fera la honte de sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand les méchants se multiplient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En corrigeant une lettre de l’hébreu, on obtient : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand les méchants sont au pouvoir.
    marker-yv: yv-n
  - type: text
    text: ', les transgressions abondent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les justes seront témoins de leur chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Corrige ton enfant et tu seras tranquille à son sujet :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera les délices de ton cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand il n’y a plus de révélation divine, le peuple se laisse aller.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux celui qui obéit à la Loi de Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce n’est pas avec des paroles que l’on corrige un serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si même il comprend ce qu’on lui dit, il n’en tiendra pas compte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: As-tu déjà vu un homme qui parle sans réfléchir ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a plus à espérer d’un insensé que de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si l’on dorlote un serviteur dès son jeune âge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on finit par en faire un mollasson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens incertain. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il finit par devenir insolent, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il finit par se prendre pour un fils.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L’homme prompt à la colère provoque des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s’emporte facilement commet beaucoup de fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’orgueil de l’homme le mène à l’humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la modestie obtient les honneurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Qui se rend complice d’un voleur, se hait lui-même ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il entend la malédiction appelée contre ceux qui tairaient le nom du coupable
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Adjuration solennelle de dénoncer le coupable, assortie d’une malédiction pour les éventuels contrevenants (voir Lv 5.1 ; Jg 17.2).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne le dénonce pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La peur que vous avez des hommes tend un piège sous vos pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel protège celui qui se confie en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nombreux sont ceux qui recherchent la faveur du chef
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui cherchent à être entendus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: reçus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par le chef.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c’est l’Eternel qui fait droit à chacun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les justes ont en horreur l’homme inique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme le méchant a en horreur l’homme dont la conduite est droite.
