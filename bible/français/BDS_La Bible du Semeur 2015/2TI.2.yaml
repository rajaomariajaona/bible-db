document_id: 2TI.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Combats !
  - type: text
    content: 'Toi donc, mon enfant, puise tes forces dans la grâce qui nous est accordée dans l’union avec Jésus-Christ. '
  '10':
  - type: text
    content: Je supporte donc patiemment toutes ces épreuves, à cause de ceux que Dieu a choisis, pour qu’eux aussi parviennent au salut qui est en Jésus-Christ, et à la gloire éternelle qui l’accompagne.
  '11':
  - type: text
    content: 'Car ces paroles sont certaines :'
  - type: text
    content: Si nous mourons avec lui
  - type: note
    content: Il s’agit peut-être d’un hymne de l’Eglise primitive (voir note 1 Tm 1.17).
  - type: text
    content: ','
  - type: text
    content: avec lui nous revivrons,
  '12':
  - type: text
    content: et si nous persévérons,
  - type: text
    content: avec lui nous régnerons.
  - type: text
    content: Mais si nous le renions,
  - type: text
    content: lui aussi nous reniera.
  '13':
  - type: text
    content: Si nous sommes infidèles,
  - type: text
    content: lui, il demeure fidèle,
  - type: text
    content: parce qu’il ne peut se renier lui-même.
  - type: heading
    content: Les enseignants de mensonge
  - type: heading
    content: Sers la vérité !
  '14':
  - type: text
    content: 'C’est cela qu’il te faut rappeler sans cesse. Recommande solennellement devant Dieu d’éviter les disputes de mots : elles ne servent à rien – si ce n’est à la ruine de ceux qui les écoutent.'
  '15':
  - type: text
    content: Efforce-toi de te présenter devant Dieu en homme qui a fait ses preuves, en ouvrier qui n’a pas à rougir de son ouvrage, parce qu’il transmet correctement la Parole de vérité.
  '16':
  - type: text
    content: 'Evite les discours creux et contraires à la foi. Ceux qui s’y adonnent s’éloigneront toujours plus de Dieu. '
  '17':
  - type: text
    content: La parole de ces gens est comme une gangrène qui finit par dévorer tout le corps. C’est le cas d’Hyménée
  - type: note
    content: Voir 1 Tm 1.20.
  - type: text
    content: ' et de Philète. '
  '18':
  - type: text
    content: 'Ils se sont écartés de la vérité en prétendant que la résurrection a déjà eu lieu. Ainsi, ils sont en train de détourner plusieurs de la foi. '
  '19':
  - type: text
    content: 'Cependant, le solide fondement posé par Dieu demeure ; il porte, en guise de sceau, les inscriptions suivantes : '
  - type: text
    content: Le Seigneur connaît ceux qui lui appartiennent
  - type: note
    content: Nb 16.5.
  - type: text
    content: ' et « Qu’il se détourne du mal, celui qui affirme qu’il appartient au Seigneur ».'
  '2':
  - type: text
    content: Et l’enseignement que tu as reçu de moi et que de nombreux témoins ont confirmé
  - type: note
    content: 'D’autres traduisent : en présence de nombreux témoins.'
  - type: text
    content: ', transmets-le à des personnes dignes de confiance qui seront capables à leur tour d’en instruire d’autres.'
  '20':
  - type: text
    content: Dans une grande maison, il n’y a pas seulement des vases d’or et d’argent, il y en a aussi en bois et en terre cuite. Les premiers sont réservés à un usage noble. Les autres sont destinés à un usage vil
  - type: note
    content: 'Autre traduction : Les premiers sont réservés aux grandes occasions. Les autres sont destinés à l’usage courant.'
  - type: text
    content: .
  '21':
  - type: text
    content: Eh bien, si quelqu’un se garde pur de tout ce dont j’ai parlé, il sera un vase destiné à un noble usage, purifié, utile à son propriétaire, disponible pour toutes sortes d’œuvres bonnes.
  '22':
  - type: text
    content: Fuis les passions qui assaillent un jeune homme. Fais tous tes efforts pour cultiver la foi, l’amour et la paix avec tous ceux qui font appel au Seigneur d’un cœur pur.
  '23':
  - type: text
    content: 'Refuse les spéculations absurdes et sans fondement ; tu sais qu’elles suscitent des querelles. '
  '24':
  - type: text
    content: 'Or, il n’est pas convenable pour un serviteur du Seigneur d’avoir des querelles. Qu’il se montre au contraire aimable envers tout le monde, capable d’enseigner, et de supporter les difficultés. '
  '25':
  - type: text
    content: 'Il doit instruire avec douceur les contradicteurs. Qui sait si Dieu ne les amènera pas ainsi à changer d’attitude pour connaître la vérité ? '
  '26':
  - type: text
    content: Alors, ils retrouveront leur bon sens et se dégageront des pièges du diable qui les tient encore captifs et assujettis à sa volonté.
  '3':
  - type: text
    content: 'Tel un bon soldat de Jésus-Christ, prends, comme moi, ta part de souffrances. '
  '4':
  - type: text
    content: 'Celui qui s’engage dans une expédition militaire ne s’embarrasse pas des affaires de la vie civile, afin de donner pleine satisfaction à l’officier qui l’a enrôlé. '
  '5':
  - type: text
    content: 'On n’a jamais vu un athlète remporter le prix sans avoir respecté toutes les règles. '
  '6':
  - type: text
    content: C’est au cultivateur qui travaille dur d’être le premier à jouir de la récolte
  - type: note
    content: 'Autre traduction : le cultivateur doit travailler dur avant de jouir de la récolte.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Réfléchis bien à ce que je te dis et le Seigneur te donnera de comprendre toutes ces choses.
  - type: heading
    content: L’exemple de Paul
  '8':
  - type: text
    content: 'Souviens-toi de Jésus-Christ, qui est ressuscité, descendant de David, conformément à l’Evangile que j’annonce. '
  '9':
  - type: text
    content: 'C’est pour cet Evangile que je souffre, jusqu’à être enchaîné comme un criminel. La Parole de Dieu, elle, n’est pas enchaînée pour autant. '
