document_id: 2TI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Combats !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toi donc, mon enfant, puise tes forces dans la grâce qui nous est accordée dans l’union avec Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et l’enseignement que tu as reçu de moi et que de nombreux témoins ont confirmé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en présence de nombreux témoins.
    marker-yv: yv-n
  - type: text
    text: ', transmets-le à des personnes dignes de confiance qui seront capables à leur tour d’en instruire d’autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tel un bon soldat de Jésus-Christ, prends, comme moi, ta part de souffrances. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui qui s’engage dans une expédition militaire ne s’embarrasse pas des affaires de la vie civile, afin de donner pleine satisfaction à l’officier qui l’a enrôlé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On n’a jamais vu un athlète remporter le prix sans avoir respecté toutes les règles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est au cultivateur qui travaille dur d’être le premier à jouir de la récolte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le cultivateur doit travailler dur avant de jouir de la récolte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Réfléchis bien à ce que je te dis et le Seigneur te donnera de comprendre toutes ces choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’exemple de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Souviens-toi de Jésus-Christ, qui est ressuscité, descendant de David, conformément à l’Evangile que j’annonce. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C’est pour cet Evangile que je souffre, jusqu’à être enchaîné comme un criminel. La Parole de Dieu, elle, n’est pas enchaînée pour autant. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je supporte donc patiemment toutes ces épreuves, à cause de ceux que Dieu a choisis, pour qu’eux aussi parviennent au salut qui est en Jésus-Christ, et à la gloire éternelle qui l’accompagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car ces paroles sont certaines :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si nous mourons avec lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit peut-être d’un hymne de l’Eglise primitive (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 1.17
        metadata:
          usfm: 1TI.1.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec lui nous revivrons,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et si nous persévérons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec lui nous régnerons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais si nous le renions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui aussi nous reniera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si nous sommes infidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui, il demeure fidèle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu’il ne peut se renier lui-même.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les enseignants de mensonge
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sers la vérité !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est cela qu’il te faut rappeler sans cesse. Recommande solennellement devant Dieu d’éviter les disputes de mots : elles ne servent à rien – si ce n’est à la ruine de ceux qui les écoutent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Efforce-toi de te présenter devant Dieu en homme qui a fait ses preuves, en ouvrier qui n’a pas à rougir de son ouvrage, parce qu’il transmet correctement la Parole de vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Evite les discours creux et contraires à la foi. Ceux qui s’y adonnent s’éloigneront toujours plus de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La parole de ces gens est comme une gangrène qui finit par dévorer tout le corps. C’est le cas d’Hyménée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 1.20
        metadata:
          usfm: 1TI.1.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et de Philète. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils se sont écartés de la vérité en prétendant que la résurrection a déjà eu lieu. Ainsi, ils sont en train de détourner plusieurs de la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cependant, le solide fondement posé par Dieu demeure ; il porte, en guise de sceau, les inscriptions suivantes : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur connaît ceux qui lui appartiennent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 16.5
        metadata:
          usfm: NUM.16.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et « Qu’il se détourne du mal, celui qui affirme qu’il appartient au Seigneur ».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dans une grande maison, il n’y a pas seulement des vases d’or et d’argent, il y en a aussi en bois et en terre cuite. Les premiers sont réservés à un usage noble. Les autres sont destinés à un usage vil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Les premiers sont réservés aux grandes occasions. Les autres sont destinés à l’usage courant.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eh bien, si quelqu’un se garde pur de tout ce dont j’ai parlé, il sera un vase destiné à un noble usage, purifié, utile à son propriétaire, disponible pour toutes sortes d’œuvres bonnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fuis les passions qui assaillent un jeune homme. Fais tous tes efforts pour cultiver la foi, l’amour et la paix avec tous ceux qui font appel au Seigneur d’un cœur pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Refuse les spéculations absurdes et sans fondement ; tu sais qu’elles suscitent des querelles. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or, il n’est pas convenable pour un serviteur du Seigneur d’avoir des querelles. Qu’il se montre au contraire aimable envers tout le monde, capable d’enseigner, et de supporter les difficultés. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il doit instruire avec douceur les contradicteurs. Qui sait si Dieu ne les amènera pas ainsi à changer d’attitude pour connaître la vérité ? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors, ils retrouveront leur bon sens et se dégageront des pièges du diable qui les tient encore captifs et assujettis à sa volonté.
