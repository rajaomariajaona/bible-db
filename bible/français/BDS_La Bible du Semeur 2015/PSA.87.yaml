    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume des Qoréites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '87.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42.1'
        metadata:
          usfm: PSA.42.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Cantique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '87.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signification incertaine.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est fondée ╵sur les montagnes saintes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: l’Eternel aime ╵la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '87.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, il est question des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'portes de Sion, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les portes représentant la ville tout entière.
    marker-yv: yv-n
  - type: text
    text: ' de Sion'
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus que tout autre lieu ╵du pays de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O toi, cité de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce que l’on dit de toi ╵est tout chargé de gloire :'
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: « Parmi tous ceux qui me connaissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai mention de Rahav, l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '87.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les peuples énumérés étaient les ennemis habituels d’Israël (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 19.2
        metadata:
          usfm: ISA.19.2
      - type: text
        text: ') ; ils représentent l’ensemble des peuples païens. L’Egypte est ici appelée poétiquement Rahav, du nom d’un dragon des mers mythologique opposé au Créateur et associé à l’Egypte qui a opprimé les Israélites (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 30.7
        metadata:
          usfm: ISA.30.7
      - type: text
        text: ). D’autres textes présentent l’ouverture d’un passage dans la mer des Roseaux pour libérer les Israélites de l’esclavage en Egypte comme une victoire sur le dragon Rahav (Ps 89.11 ; Es 51.9).
    marker-yv: yv-n
  - type: text
    text: ' ╵aussi bien que de Babylone,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’inscris la Philistie, ╵et Tyr, et l’Ethiopie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme étant nés ici
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '87.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire à Sion. D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme étant nés là-bas (chez eux). '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '5 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pourtant…
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De Sion, on dira : ╵« Tout homme est né ici »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Très-Haut lui-même ╵la maintient fermement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans le registre ╵où l’Eternel inscrit les peuples, ╵pour chacun d’eux il note :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Un tel est né ici »,
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et ils diront ╵dans leurs chants et leurs danses :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Toutes mes sources sont en toi. »
