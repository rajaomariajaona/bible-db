document_id: PSA.87,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tous les peuples sont nés à Sion
  - type: text
    content: Psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: . Cantique
  - type: note
    content: Signification incertaine.
  - type: text
    content: .
  - type: text
    content: Elle est fondée ╵sur les montagnes saintes,
  '2':
  - type: text
    content: l’Eternel aime ╵la ville
  - type: note
    content: En hébreu, il est question des portes de Sion, les portes représentant la ville tout entière.
  - type: text
    content: ' de Sion'
  - type: text
    content: plus que tout autre lieu ╵du pays de Jacob.
  '3':
  - type: text
    content: O toi, cité de Dieu,
  - type: text
    content: 'ce que l’on dit de toi ╵est tout chargé de gloire :'
  - type: text
    content: Pause
  '4':
  - type: text
    content: « Parmi tous ceux qui me connaissent,
  - type: text
    content: je ferai mention de Rahav, l’Egypte
  - type: note
    content: Les peuples énumérés étaient les ennemis habituels d’Israël (Es 19.2) ; ils représentent l’ensemble des peuples païens. L’Egypte est ici appelée poétiquement Rahav, du nom d’un dragon des mers mythologique opposé au Créateur et associé à l’Egypte qui a opprimé les Israélites (cf. Es 30.7). D’autres textes présentent l’ouverture d’un passage dans la mer des Roseaux pour libérer les Israélites de l’esclavage en Egypte comme une victoire sur le dragon Rahav (Ps 89.11 ; Es 51.9).
  - type: text
    content: ' ╵aussi bien que de Babylone,'
  - type: text
    content: j’inscris la Philistie, ╵et Tyr, et l’Ethiopie,
  - type: text
    content: comme étant nés ici
  - type: note
    content: 'C’est-à-dire à Sion. D’autres comprennent : comme étant nés là-bas (chez eux). 5 Pourtant…'
  - type: text
    content: . »
  '5':
  - type: text
    content: 'De Sion, on dira : ╵« Tout homme est né ici »,'
  - type: text
    content: et le Très-Haut lui-même ╵la maintient fermement.
  '6':
  - type: text
    content: 'Dans le registre ╵où l’Eternel inscrit les peuples, ╵pour chacun d’eux il note :'
  - type: text
    content: « Un tel est né ici »,
  - type: text
    content: Pause
  '7':
  - type: text
    content: 'et ils diront ╵dans leurs chants et leurs danses :'
  - type: text
    content: « Toutes mes sources sont en toi. »
