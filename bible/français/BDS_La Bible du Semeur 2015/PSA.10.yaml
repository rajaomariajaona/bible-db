document_id: PSA.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi, Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 9
        metadata:
          usfm: PSA.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pourquoi, ô Eternel, ╵es-tu si loin ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi te caches-tu ╵aux jours de la détresse ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le méchant, dans son arrogance, ╵poursuit les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les prend dans ses traquenards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le méchant tire vanité ╵de son avidité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le profiteur maudit ╵et nargue l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le méchant, dans son arrogance, ╵déclare : « Dieu n’existe pas. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne va pas chercher plus loin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu n’existe pas ; il ne punit pas.
    marker-yv: yv-n
  - type: text
    text: ', ╵c’est là le fond de sa pensée.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toujours ses procédés ╵lui réussissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes jugements sont bien trop hauts ╵pour retenir son attention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il se débarrasse ╵de tous ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il se dit : « Je ne risque rien,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis pour toujours ╵à l’abri du malheur. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sa bouche ne fait que maudire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 3.14
        metadata:
          usfm: ROM.3.14
      - type: text
        text: '. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12.34
        metadata:
          usfm: MAT.12.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ╵ses mots sont trompeurs et violents,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous sa langue acérée fleurissent ╵des propos méchants et blessants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il est posté en embuscade ╵à proximité des hameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans un endroit bien caché, ╵il assassine l’innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses yeux épient les faibles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il se tapit dans sa cachette ╵comme un lion dans sa tanière ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, il se met en embuscade ╵pour attraper le pauvre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il attrape le pauvre ╵en l’attirant dans son filet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors le faible se courbe et chancelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis tombe vaincu par sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il se dit : « Dieu oubliera vite,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne regarde pas par là ; ╵d’ailleurs, il ne voit jamais rien ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lève-toi, Eternel ! ╵Dieu, interviens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’oublie pas les malheureux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi donc le méchant ╵se moque-t-il de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et pourquoi se dit-il : ╵« Dieu ne demande pas de comptes » ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pourtant, toi, tu vois bien ╵la peine et la souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu veilles pour tout prendre en mains !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le faible s’abandonne à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu viens en aide à l’orphelin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Abats la force du méchant, ce criminel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais-le rendre compte ╵du mal qu’il a commis ╵pour qu’il n’en reste plus de trace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’Eternel est Roi à jamais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les peuples païens ╵disparaîtront de sur sa terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eternel, tu entends ╵les attentes des affligés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu leur redonnes du courage ╵et tu prêtes l’oreille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: pour faire droit à l’orphelin, ╵ainsi qu’à l’opprimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour que l’homme, ╵cette créature terrestre ╵cesse de semer la terreur.
