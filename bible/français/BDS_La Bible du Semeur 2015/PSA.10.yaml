document_id: PSA.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi, SeigneurVoir note Ps 9.  ?
  - type: text
    content: Pourquoi, ô Eternel, ╵es-tu si loin ?
  - type: text
    content: Pourquoi te caches-tu ╵aux jours de la détresse ?
  '10':
  - type: text
    content: Alors le faible se courbe et chancelle,
  - type: text
    content: puis tombe vaincu par sa force.
  '11':
  - type: text
    content: 'Il se dit : « Dieu oubliera vite,'
  - type: text
    content: il ne regarde pas par là ; ╵d’ailleurs, il ne voit jamais rien ! »
  '12':
  - type: text
    content: Lève-toi, Eternel ! ╵Dieu, interviens !
  - type: text
    content: Et n’oublie pas les malheureux !
  '13':
  - type: text
    content: Pourquoi donc le méchant ╵se moque-t-il de toi,
  - type: text
    content: 'et pourquoi se dit-il : ╵« Dieu ne demande pas de comptes » ?'
  '14':
  - type: text
    content: Pourtant, toi, tu vois bien ╵la peine et la souffrance,
  - type: text
    content: tu veilles pour tout prendre en mains !
  - type: text
    content: Le faible s’abandonne à toi,
  - type: text
    content: tu viens en aide à l’orphelin.
  '15':
  - type: text
    content: Abats la force du méchant, ce criminel !
  - type: text
    content: Et fais-le rendre compte ╵du mal qu’il a commis ╵pour qu’il n’en reste plus de trace.
  '16':
  - type: text
    content: L’Eternel est Roi à jamais,
  - type: text
    content: et les peuples païens ╵disparaîtront de sur sa terre.
  '17':
  - type: text
    content: Eternel, tu entends ╵les attentes des affligés.
  - type: text
    content: Tu leur redonnes du courage ╵et tu prêtes l’oreille
  '18':
  - type: text
    content: pour faire droit à l’orphelin, ╵ainsi qu’à l’opprimé,
  - type: text
    content: et pour que l’homme, ╵cette créature terrestre ╵cesse de semer la terreur.
  '2':
  - type: text
    content: Le méchant, dans son arrogance, ╵poursuit les pauvres,
  - type: text
    content: il les prend dans ses traquenards.
  '3':
  - type: text
    content: Le méchant tire vanité ╵de son avidité.
  - type: text
    content: Le profiteur maudit ╵et nargue l’Eternel.
  '4':
  - type: text
    content: 'Le méchant, dans son arrogance, ╵déclare : « Dieu n’existe pas. »'
  - type: text
    content: Il ne va pas chercher plus loin
  - type: note
    content: 'Autre traduction : Dieu n’existe pas ; il ne punit pas.'
  - type: text
    content: ', ╵c’est là le fond de sa pensée.'
  '5':
  - type: text
    content: Toujours ses procédés ╵lui réussissent.
  - type: text
    content: Tes jugements sont bien trop hauts ╵pour retenir son attention,
  - type: text
    content: et il se débarrasse ╵de tous ses adversaires.
  '6':
  - type: text
    content: 'Il se dit : « Je ne risque rien,'
  - type: text
    content: et je suis pour toujours ╵à l’abri du malheur. »
  '7':
  - type: text
    content: Sa bouche ne fait que maudire
  - type: note
    content: Cité en Rm 3.14. Voir Mt 12.34.
  - type: text
    content: ', ╵ses mots sont trompeurs et violents,'
  - type: text
    content: sous sa langue acérée fleurissent ╵des propos méchants et blessants.
  '8':
  - type: text
    content: Il est posté en embuscade ╵à proximité des hameaux,
  - type: text
    content: et, dans un endroit bien caché, ╵il assassine l’innocent.
  - type: text
    content: Ses yeux épient les faibles.
  '9':
  - type: text
    content: Il se tapit dans sa cachette ╵comme un lion dans sa tanière ;
  - type: text
    content: oui, il se met en embuscade ╵pour attraper le pauvre ;
  - type: text
    content: il attrape le pauvre ╵en l’attirant dans son filet.
