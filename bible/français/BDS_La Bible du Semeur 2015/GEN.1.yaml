document_id: GEN.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La création de l’univers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au commencement, Dieu créa le ciel et la terre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dieu appela « terre » la terre ferme, et « mer » l’amas des eaux. Dieu vit que c’était bon.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis Dieu dit : Que la terre se couvre de verdure, de l’herbe portant sa semence, et de chaque espèce d’arbre produisant du fruit, portant chacun sa semence, partout sur la terre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut ainsi.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La terre fit germer de la verdure, chaque espèce d’herbe portant sa semence et chaque espèce d’arbre produisant du fruit, portant chacun sa semence. Dieu vit que c’était bon.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il y eut un soir, il y eut un matin : ce fut le troisième jour.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puis Dieu dit : Que, dans l’étendue du ciel, il y ait des luminaires pour distinguer le jour de la nuit, et pour qu’ils marquent les saisons, les jours et les années. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Que, dans l’étendue du ciel, ils servent de luminaires pour illuminer la terre.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut ainsi.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dieu fit deux grands luminaires, le plus grand pour qu’il préside au jour, et le plus petit pour qu’il préside à la nuit. Il fit aussi les étoiles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il les plaça dans l’étendue du ciel pour illuminer la terre, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: pour présider au jour ainsi qu’à la nuit, et séparer la lumière des ténèbres. Dieu vit que c’était bon.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il y eut un soir, il y eut un matin : ce fut le quatrième jour.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Or, la terre était chaotique et vide. Les ténèbres couvraient l’abîme, et l’Esprit de Dieu planait au-dessus des eaux.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis Dieu dit : Que les eaux foisonnent d’une multitude d’êtres vivants, et que des oiseaux volent au-dessus de la terre dans l’étendue du ciel !'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors Dieu créa chaque espèce de grands animaux marins et chaque espèce d’êtres vivants qui se meuvent et foisonnent dans les eaux, et chaque espèce d’oiseaux ailés. Dieu vit que c’était bon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et il les bénit, en ces termes : Soyez féconds, multipliez-vous, remplissez les eaux des mers, et que les oiseaux aussi se multiplient sur la terre.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il y eut un soir, il y eut un matin : ce fut le cinquième jour.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puis Dieu dit : Que la terre produise chaque espèce d’êtres vivants, chaque espèce de bestiaux, de reptiles et d’insectes, ainsi que d’animaux sauvages.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut ainsi.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dieu fit chaque espèce d’animaux sauvages, il fit chaque espèce de bestiaux, chaque espèce de reptiles et d’insectes. Dieu vit que c’était bon.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Puis Dieu dit : Faisons les hommes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’hébreu a un singulier collectif qui a valeur de pluriel, puisque les verbes du v. 26 qui suivent sont au pluriel.
      marker-yv: yv-n
    - type: text
      text: ' de sorte qu’ils soient notre image'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à notre image. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 5.1-12 ; 9.6 ; 1 Co 11.7.
      marker-yv: yv-n
    - type: text
      text: ', qu’ils nous ressemblent. Qu’ils dominent sur les poissons de la mer, sur les oiseaux du ciel, sur les bestiaux sur toute la terre et sur tous les reptiles et les insectes.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dieu créa les hommes de sorte qu’ils soient son image, oui, il les créa de sorte qu’ils soient l’image de Dieu. Il les créa homme et femme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 19.4
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 10.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dieu les bénit en disant : Soyez féconds, multipliez-vous, remplissez la terre, rendez-vous en maîtres, et dominez les poissons des mers, les oiseaux du ciel et tous les reptiles et les insectes.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et Dieu dit : Voici, je vous donne, pour vous en nourrir, toute plante portant sa semence partout sur la terre, et tous les arbres fruitiers portant leur semence.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et Dieu dit alors : Que la lumière soit !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et la lumière fut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 4.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Je donne aussi à tout animal de la terre, aux oiseaux du ciel, à tout animal qui se meut à ras de terre, et à tout être vivant, toute plante verte pour qu’ils s’en nourrissent.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut ainsi.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Dieu considéra tout ce qu’il avait créé : c’était très bon.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut un soir, il y eut un matin : ce fut le sixième jour.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dieu vit que la lumière était bonne, et il sépara la lumière des ténèbres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il appela la lumière : « jour » et les ténèbres : « nuit ».'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y eut un soir, il y eut un matin. Ce fut le premier jour.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Puis Dieu dit : Qu’il y ait une étendue entre les eaux pour les séparer.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dieu fit l’étendue. Il sépara les eaux qui étaient sous l’étendue des eaux qui étaient au-dessus. Et ce fut ainsi.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dieu appela cette étendue : « ciel ». Il y eut un soir, il y eut un matin : ce fut le deuxième jour.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Puis Dieu dit : Que les eaux d’au-dessous du ciel se rassemblent en un seul endroit pour que la terre ferme paraisse.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut ainsi.
