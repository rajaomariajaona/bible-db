document_id: JOS.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le discours d’adieu de Josué
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Une longue période s’écoula après que l’Eternel eut accordé aux Israélites de vivre sans être inquiétés par aucun ennemi autour d’eux, et Josué était devenu très vieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24.29'
        metadata:
          usfm: JOS.24.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il convoqua tout Israël, ses responsables, ses chefs, ses juges et ses officiers, et leur dit : Je suis devenu très vieux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous avez constaté vous-mêmes comment l’Eternel votre Dieu a traité tous ces peuples devant vous : il a lui-même combattu pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voyez : j’ai attribué en possession à vos tribus le territoire de ces peuples qui subsistent encore, de même que celui des peuples que j’ai exterminés, entre le Jourdain et la mer Méditerranée à l’ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Eternel, votre Dieu, les dépossédera lui-même en votre faveur, il les fera fuir au fur et à mesure de votre avance et vous posséderez leur pays, comme il vous l’a promis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.27-31 ; 34.11 ; Nb 33.51-53 ; Dt 11.23.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Appliquez-vous donc de toutes vos forces à obéir et à faire tout ce qui est écrit dans le livre de la Loi de Moïse, sans vous en écarter ni d’un côté ni de l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne vous mêlez pas à ces populations qui subsistent parmi vous. N’ayez aucune pensée pour leurs dieux, ne prêtez pas serment par leur nom, ne leur rendez pas de culte et ne vous prosternez pas devant eux pour les adorer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Attachez-vous uniquement à l’Eternel, votre Dieu, comme vous l’avez fait jusqu’à présent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors l’Eternel dépossédera en votre faveur des peuples nombreux et puissants ; or, jusqu’à ce jour, personne n’a pu vous résister. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un seul d’entre vous en mettait mille en fuite, car l’Eternel votre Dieu combattait pour vous, comme il vous l’avait promis. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Veillez donc sur vous-mêmes pour aimer l’Eternel votre Dieu ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car si vous vous détournez de lui et si vous vous associez au reste de ces peuples qui subsistent parmi vous, si vous vous alliez à eux par des mariages et si vous avez des relations avec eux, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: sachez bien que l’Eternel votre Dieu ne continuera pas à déposséder ces peuples en votre faveur. Alors ils deviendront pour vous des pièges et des filets, ils seront des fouets à vos côtés, et des épines dans vos yeux. Et vous finirez par disparaître de ce bon pays que l’Eternel votre Dieu vous a donné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voilà que je m’en vais par le chemin que prend tout être humain. Reconnaissez de tout votre cœur et de tout votre être qu’aucune des promesses de bienfaits que l’Eternel votre Dieu vous a faites n’est restée sans effet : elles se sont toutes accomplies pour vous, sans exception aucune. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eh bien, comme il a tenu toutes ses promesses de bienfaits, l’Eternel votre Dieu accomplira aussi toutes ses menaces contre vous, jusqu’à vous faire disparaître de ce bon pays qu’il vous a donné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 26.3-43 ; Dt 28.1-68.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si vous violez l’alliance qu’il a établie pour vous et si vous allez rendre un culte à d’autres dieux en vous prosternant devant eux, l’Eternel se mettra en colère contre vous et vous disparaîtrez sans tarder de ce bon pays qu’il vous a donné.
