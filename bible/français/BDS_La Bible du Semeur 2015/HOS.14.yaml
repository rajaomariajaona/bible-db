document_id: HOS.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samarie paiera pour ses fautes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’elle s’est révoltée ╵contre son Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses habitants mourront ╵sous les coups de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses bébés seront écrasés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on fendra le ventre ╵de ses femmes enceintes. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel et promesse
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc est assez sage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour comprendre ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: assez intelligent ╵pour les connaître ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voies que l’Eternel prescrit sont droites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les justes les suivront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les rebelles ╵trébucheront sur elles.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens donc, Israël, ╵à l’Eternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce sont tes péchés ╵qui ont causé ta chute.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez vos paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et revenez à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et dites-lui : ╵« Pardonne toute faute,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et prends en bonne part ╵que nous t’offrions en retour, ╵en sacrifice, l’hommage de nos lèvres, ╵en guise de taureaux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas l’Assyrie, ╵qui pourra nous sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ne monterons pas ╵sur des chevaux de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et nous ne dirons plus ╵à l’œuvre de nos mains : ╵“Toi, tu es notre Dieu”,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est toi qui as compassion ╵de l’orphelin. »
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Moi, je les guérirai ╵de leur apostasie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur témoignerai ╵librement mon amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que ma colère ╵se détournera d’eux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je serai pour Israël ╵semblable à la rosée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fleurira comme le lis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’enracinera ╵comme les cèdres du Liban.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses rameaux s’étendront au loin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il aura la majesté ╵de l’olivier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son parfum sera semblable ╵à celui du Liban.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reviendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habiter à son ombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils revivront comme le blé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fleuriront comme la vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils auront la renommée ╵des grands vins du Liban.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Ephraïm… ╵qu’as-tu à faire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu’as-tu à faire
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’ai-je à faire.
      marker-yv: yv-n
    - type: text
      text: ' ╵encore des idoles ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je l’exaucerai, ╵je veillerai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exaucer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance, en hébreu, avec le nom de la déesse Anat, et le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'veiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: avec celui de la déesse Ashéra.
      marker-yv: yv-n
    - type: text
      text: ' sur lui.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis comme un cyprès ╵qui reste toujours vert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu porteras du fruit ╵et c’est moi qui l’aurai produit. »
