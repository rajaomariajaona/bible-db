document_id: HOS.14,21
type_code: fra
verses:
  '1':
  - type: text
    content: Samarie paiera pour ses fautes
  - type: text
    content: parce qu’elle s’est révoltée ╵contre son Dieu,
  - type: text
    content: ses habitants mourront ╵sous les coups de l’épée,
  - type: text
    content: ses bébés seront écrasés,
  - type: text
    content: et l’on fendra le ventre ╵de ses femmes enceintes. »
  - type: heading
    content: Appel et promesse
  '10':
  - type: text
    content: Qui donc est assez sage
  - type: text
    content: pour comprendre ces choses,
  - type: text
    content: assez intelligent ╵pour les connaître ?
  - type: text
    content: Les voies que l’Eternel prescrit sont droites,
  - type: text
    content: les justes les suivront,
  - type: text
    content: tandis que les rebelles ╵trébucheront sur elles.
  '2':
  - type: text
    content: Reviens donc, Israël, ╵à l’Eternel, ton Dieu,
  - type: text
    content: car ce sont tes péchés ╵qui ont causé ta chute.
  '3':
  - type: text
    content: Préparez vos paroles
  - type: text
    content: et revenez à l’Eternel,
  - type: text
    content: 'et dites-lui : ╵« Pardonne toute faute,'
  - type: text
    content: et prends en bonne part ╵que nous t’offrions en retour, ╵en sacrifice, l’hommage de nos lèvres, ╵en guise de taureaux.
  '4':
  - type: text
    content: Ce n’est pas l’Assyrie, ╵qui pourra nous sauver,
  - type: text
    content: nous ne monterons pas ╵sur des chevaux de guerre
  - type: text
    content: 'et nous ne dirons plus ╵à l’œuvre de nos mains : ╵“Toi, tu es notre Dieu”,'
  - type: text
    content: car c’est toi qui as compassion ╵de l’orphelin. »
  '5':
  - type: text
    content: « Moi, je les guérirai ╵de leur apostasie,
  - type: text
    content: je leur témoignerai ╵librement mon amour
  - type: text
    content: parce que ma colère ╵se détournera d’eux.
  '6':
  - type: text
    content: Oui, je serai pour Israël ╵semblable à la rosée,
  - type: text
    content: il fleurira comme le lis,
  - type: text
    content: et s’enracinera ╵comme les cèdres du Liban.
  '7':
  - type: text
    content: Ses rameaux s’étendront au loin
  - type: text
    content: et il aura la majesté ╵de l’olivier,
  - type: text
    content: et son parfum sera semblable ╵à celui du Liban.
  '8':
  - type: text
    content: Ils reviendront
  - type: text
    content: habiter à son ombre,
  - type: text
    content: ils revivront comme le blé
  - type: text
    content: et fleuriront comme la vigne,
  - type: text
    content: et ils auront la renommée ╵des grands vins du Liban.
  '9':
  - type: text
    content: O Ephraïm… ╵qu’as-tu à faire
  - type: note
    content: 'qu’as-tu à faire: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : qu’ai-je à faire.'
  - type: text
    content: ' ╵encore des idoles ?'
  - type: text
    content: Moi, je l’exaucerai, ╵je veillerai
  - type: note
    content: Le verbe exaucer fait assonance, en hébreu, avec le nom de la déesse Anat, et le verbe veiller avec celui de la déesse Ashéra.
  - type: text
    content: ' sur lui.'
  - type: text
    content: Je suis comme un cyprès ╵qui reste toujours vert,
  - type: text
    content: tu porteras du fruit ╵et c’est moi qui l’aurai produit. »
