document_id: HEB.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Christ, grand-prêtre d’une alliance bien meilleure
  - type: text
    content: 'Or, voici le point capital de ce que nous sommes en train de dire : nous avons bien un grand-prêtre comme celui-ci, qui s’est assis dans le ciel à la droite du trône du Dieu majestueux. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Mais voici quelle alliance je vais conclure
  - type: text
    content: ' ╵'
  - type: text
    content: avec le peuple d’
  - type: text
    content: Israël
  - type: text
    content: après ces jours,
  - type: text
    content: ' ╵'
  - type: text
    content: 'dit le Seigneur :'
  - type: text
    content: je placerai mes lois dans leur pensée,
  - type: text
    content: je les graverai sur leur cœur ;
  - type: text
    content: je serai leur Dieu,
  - type: text
    content: et ils seront mon peuple.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Ils n’auront plus besoin
  - type: text
    content: ' ╵'
  - type: text
    content: de s’enseigner l’un l’autre
  - type: text
    content: en répétant chacun
  - type: text
    content: ' ╵'
  - type: text
    content: à son concitoyen
  - type: text
    content: ' ╵'
  - type: text
    content: 'ou à son frère :'
  - type: text
    content: « Il faut que tu connaisses le Seigneur ! »
  - type: text
    content: Car tous me connaîtront,
  - type: text
    content: du plus petit jusqu’au plus grand d’entre eux.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Car je pardonnerai leurs fautes,
  - type: text
    content: je ne tiendrai plus compte
  - type: text
    content: ' ╵'
  - type: text
    content: de leurs péchés
  - type: note
    content: Jr 31.31-34.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Par le simple fait d’appeler cette alliance-là '
  - type: text
    content: nouvelle,
  - type: text
    content: ' le Seigneur a rendu la première ancienne ; or, ce qui devient ancien et ce qui vieillit est près de disparaître.'
  '2':
  - type: text
    content: Il y accomplit le service du grand-prêtre dans le sanctuaire, c’est-à-dire dans le véritable tabernacle, dressé non par des hommes, mais par le Seigneur.
  '3':
  - type: text
    content: 'Tout grand-prêtre, en effet, est établi pour présenter à Dieu des offrandes et des sacrifices. Il faut donc que notre grand-prêtre aussi ait quelque chose à présenter. '
  '4':
  - type: text
    content: 'S’il était sur terre, il ne serait même pas prêtre. En effet, ceux qui présentent les offrandes conformément à la Loi sont déjà là. '
  '5':
  - type: text
    content: 'Ils sont au service d’un sanctuaire qui n’est qu’une image, que l’ombre du sanctuaire céleste. Moïse en a été averti au moment où il allait construire le tabernacle : '
  - type: text
    content: Aie soin,
  - type: text
    content: ' lui dit le Seigneur, '
  - type: text
    content: de faire tout selon le modèle qui t’est montré sur la montagne
  - type: note
    content: Ex 25.40.
  - type: text
    content: .
  '6':
  - type: text
    content: Mais maintenant, c’est un service bien supérieur qui a été confié à notre grand-prêtre car il est le médiateur d’une alliance bien meilleure fondée sur de meilleures promesses.
  - type: heading
    content: L’ancienne et la nouvelle alliance
  '7':
  - type: text
    content: En effet, si la première alliance avait été sans défaut, il n’aurait pas été nécessaire de la remplacer par une seconde.
  '8':
  - type: text
    content: 'Or, c’est bien un reproche que Dieu adresse à son peuple lorsqu’il déclare :'
  - type: text
    content: Mais des jours vont venir,
  - type: text
    content: ' ╵'
  - type: text
    content: dit le Seigneur,
  - type: text
    content: où je conclurai
  - type: text
    content: ' ╵'
  - type: text
    content: avec le peuple d’
  - type: text
    content: Israël
  - type: text
    content: ' ╵'
  - type: text
    content: 'et celui de '
  - type: text
    content: Juda
  - type: text
    content: ' ╵'
  - type: text
    content: une alliance nouvelle.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Elle ne sera pas
  - type: text
    content: ' ╵'
  - type: text
    content: comme celle que j’ai conclue
  - type: text
    content: ' ╵'
  - type: text
    content: avec leurs pères
  - type: text
    content: quand je les ai pris par la main
  - type: text
    content: ' ╵'
  - type: text
    content: pour les faire sortir d’Egypte.
  - type: text
    content: Puisqu’ils n’ont pas été fidèles
  - type: text
    content: ' ╵'
  - type: text
    content: à mon alliance,
  - type: text
    content: moi alors, je me suis détourné d’eux,
  - type: text
    content: ' ╵'
  - type: text
    content: dit le Seigneur.
