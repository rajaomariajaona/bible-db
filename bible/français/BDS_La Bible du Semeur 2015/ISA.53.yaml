document_id: ISA.53,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui a cru à notre message ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui a été révélée ╵l’intervention de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Jn 12.38 ; Rm 10.16.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il a plu à Dieu ╵de le briser par la souffrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien que toi, Dieu, ╵tu aies livré sa vie ╵en sacrifice de réparation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il verra une descendance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vivra de longs jours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il accomplira avec succès ╵ce que désire l’Eternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car après avoir tant souffert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il verra la lumière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân et l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il verra.
      marker-yv: yv-n
    - type: text
      text: ', ╵et il sera comblé.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beaucoup de gens le connaîtront, et pour cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon serviteur, le Juste, ╵leur accordera le statut de justes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se chargera de leurs fautes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 3.21-24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi ╵je lui donnerai une part ╵avec ces gens nombreux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il partagera le butin ╵avec la multitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il s’est dépouillé lui-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Réminiscence en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ph 2.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵jusqu’à la mort'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’est laissé compter ╵parmi les malfaiteurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 22.37
        - type: text
          text: ' et dans certains manuscrits de Mc 15.28 (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 15.27
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a pris sur lui ╵les fautes d’un grand nombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a intercédé ╵en faveur des coupables.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a grandi tout droit ╵comme une jeune pousse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou comme une racine ╵sortant d’un sol aride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’avait ni prestance ni beauté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour retenir notre attention
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni rien dans son aspect ╵qui pût nous attirer.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il était méprisé, ╵abandonné des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un homme de douleur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitué à la souffrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il était semblable ╵à ceux devant lesquels ╵on détourne les yeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il était méprisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous n’avons fait de lui aucun cas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, en vérité, ╵c’est de nos maladies ╵qu’il s’est chargé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sont nos souffrances ╵qu’il a prises sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que nous pensions ╵que Dieu l’avait puni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: frappé et humilié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 8.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est pour nos péchés ╵qu’il a été percé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pour nos fautes ╵qu’il a été brisé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le châtiment ╵qui nous donne la paix ╵est retombé sur lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est par ses blessures ╵que nous sommes guéris
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 5-6 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 2.24-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous étions tous errants, ╵pareils à des brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'chacun de nous allait ╵par son propre chemin :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel a fait retomber sur lui ╵les fautes de nous tous.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il était maltraité, ╵et il s’est humilié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’a pas dit un mot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Semblable à un agneau ╵mené à l’abattoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme la brebis muette ╵devant ceux qui la tondent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’a pas dit un mot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 7-8 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 8.32-33
        - type: text
          text: ', d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été arraché à la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arrêté.
      marker-yv: yv-n
    - type: text
      text: ' ╵avec violence, ╵suite à un jugement.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui, parmi les gens ╵de sa génération, ╵s’est soucié de son sort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu’on l’a retranché
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du pays des vivants ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été frappé à mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a été frappé.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause des péchés ╵que mon peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Le principal texte hébreu de Qumrân a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son peuple.
      marker-yv: yv-n
    - type: text
      text: ' a commis.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a mis son tombeau ╵avec celui des criminels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son sépulcre ╵avec celui des riches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu’il n’avait pas commis ╵d’acte de violence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que jamais ses lèvres ╵n’avaient produit la tromperie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 2.22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
