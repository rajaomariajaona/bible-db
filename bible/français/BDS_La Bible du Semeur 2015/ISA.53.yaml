document_id: ISA.53,21
type_code: fra
verses:
  '1':
  - type: text
    content: Qui a cru à notre message ?
  - type: text
    content: A qui a été révélée ╵l’intervention de l’Eternel
  - type: note
    content: Cité en Jn 12.38 ; Rm 10.16.
  - type: text
    content: '  ?'
  '10':
  - type: text
    content: Mais il a plu à Dieu ╵de le briser par la souffrance.
  - type: text
    content: Bien que toi, Dieu, ╵tu aies livré sa vie ╵en sacrifice de réparation,
  - type: text
    content: il verra une descendance.
  - type: text
    content: Il vivra de longs jours
  - type: text
    content: et il accomplira avec succès ╵ce que désire l’Eternel.
  '11':
  - type: text
    content: Car après avoir tant souffert,
  - type: text
    content: il verra la lumière
  - type: note
    content: 'D’après le texte hébreu de Qumrân et l’ancienne version grecque. Le texte hébreu traditionnel a : il verra.'
  - type: text
    content: ', ╵et il sera comblé.'
  - type: text
    content: Beaucoup de gens le connaîtront, et pour cela,
  - type: text
    content: mon serviteur, le Juste, ╵leur accordera le statut de justes
  - type: text
    content: et se chargera de leurs fautes
  - type: note
    content: Voir Rm 3.21-24.
  - type: text
    content: .
  '12':
  - type: text
    content: Voilà pourquoi ╵je lui donnerai une part ╵avec ces gens nombreux ;
  - type: text
    content: il partagera le butin ╵avec la multitude,
  - type: text
    content: car il s’est dépouillé lui-même
  - type: note
    content: Réminiscence en Ph 2.7.
  - type: text
    content: ' ╵jusqu’à la mort'
  - type: text
    content: et s’est laissé compter ╵parmi les malfaiteurs
  - type: note
    content: Cité en Lc 22.37 et dans certains manuscrits de Mc 15.28 (voir note Mc 15.27).
  - type: text
    content: ','
  - type: text
    content: car il a pris sur lui ╵les fautes d’un grand nombre,
  - type: text
    content: il a intercédé ╵en faveur des coupables.
  '2':
  - type: text
    content: Il a grandi tout droit ╵comme une jeune pousse
  - type: text
    content: ou comme une racine ╵sortant d’un sol aride.
  - type: text
    content: Il n’avait ni prestance ni beauté
  - type: text
    content: pour retenir notre attention
  - type: text
    content: ni rien dans son aspect ╵qui pût nous attirer.
  '3':
  - type: text
    content: Il était méprisé, ╵abandonné des hommes,
  - type: text
    content: un homme de douleur
  - type: text
    content: habitué à la souffrance.
  - type: text
    content: Oui, il était semblable ╵à ceux devant lesquels ╵on détourne les yeux.
  - type: text
    content: Il était méprisé,
  - type: text
    content: et nous n’avons fait de lui aucun cas.
  '4':
  - type: text
    content: Pourtant, en vérité, ╵c’est de nos maladies ╵qu’il s’est chargé,
  - type: text
    content: et ce sont nos souffrances ╵qu’il a prises sur lui,
  - type: text
    content: alors que nous pensions ╵que Dieu l’avait puni,
  - type: text
    content: frappé et humilié
  - type: note
    content: Cité en Mt 8.17.
  - type: text
    content: .
  '5':
  - type: text
    content: Mais c’est pour nos péchés ╵qu’il a été percé,
  - type: text
    content: c’est pour nos fautes ╵qu’il a été brisé.
  - type: text
    content: Le châtiment ╵qui nous donne la paix ╵est retombé sur lui
  - type: text
    content: et c’est par ses blessures ╵que nous sommes guéris
  - type: note
    content: Les v. 5-6 sont cités en 1 P 2.24-25.
  - type: text
    content: .
  '6':
  - type: text
    content: Nous étions tous errants, ╵pareils à des brebis,
  - type: text
    content: 'chacun de nous allait ╵par son propre chemin :'
  - type: text
    content: l’Eternel a fait retomber sur lui ╵les fautes de nous tous.
  '7':
  - type: text
    content: Il était maltraité, ╵et il s’est humilié,
  - type: text
    content: il n’a pas dit un mot.
  - type: text
    content: Semblable à un agneau ╵mené à l’abattoir,
  - type: text
    content: tout comme la brebis muette ╵devant ceux qui la tondent,
  - type: text
    content: il n’a pas dit un mot
  - type: note
    content: Les v. 7-8 sont cités en Ac 8.32-33, d’après l’ancienne version grecque.
  - type: text
    content: .
  '8':
  - type: text
    content: Il a été arraché à la vie
  - type: note
    content: 'Autre traduction : arrêté.'
  - type: text
    content: ' ╵avec violence, ╵suite à un jugement.'
  - type: text
    content: Et qui, parmi les gens ╵de sa génération, ╵s’est soucié de son sort,
  - type: text
    content: lorsqu’on l’a retranché
  - type: text
    content: du pays des vivants ?
  - type: text
    content: Il a été frappé à mort
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : il a été frappé.'
  - type: text
    content: à cause des péchés ╵que mon peuple
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le principal texte hébreu de Qumrân a : son peuple.'
  - type: text
    content: ' a commis.'
  '9':
  - type: text
    content: On a mis son tombeau ╵avec celui des criminels
  - type: text
    content: et son sépulcre ╵avec celui des riches,
  - type: text
    content: alors qu’il n’avait pas commis ╵d’acte de violence
  - type: text
    content: et que jamais ses lèvres ╵n’avaient produit la tromperie
  - type: note
    content: Cité en 1 P 2.22.
  - type: text
    content: .
