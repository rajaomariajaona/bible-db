document_id: ROM.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chrétien et les autorités
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Que tout homme se soumette aux autorités supérieures, car il n’y a pas d’autorité qui ne vienne de Dieu, et celles qui existent ont été instituées par Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui aime ne cause aucun mal à son prochain. Aimer son prochain, c’est donc accomplir toute la Loi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Jour est proche
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Faites ceci d’autant plus que vous savez en quel temps nous vivons. C’est désormais l’heure de sortir de votre sommeil, car le salut est plus près de nous que lorsque nous avons commencé à croire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'La nuit est avancée, le moment où le jour va se lever approche. Débarrassons-nous de tout ce qui se fait dans les ténèbres, et revêtons-nous de l’armure de la lumière. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vivons comme il convient en plein jour, sans orgies ni beuveries, sans débauche ni immoralité, sans querelle ni jalousie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Revêtez-vous du Seigneur Jésus-Christ et ne vous préoccupez pas de satisfaire les désirs de l’homme livré à lui-même.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'C’est pourquoi celui qui s’oppose à l’autorité lutte contre une disposition établie par Dieu, et ceux qui sont engagés dans une telle lutte recevront le châtiment qu’ils se seront attiré. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Car ce sont les malfaiteurs, et non ceux qui pratiquent le bien, qui ont à redouter les magistrats. Veux-tu ne pas avoir peur de l’autorité ? Fais le bien, et l’autorité t’approuvera. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car l’autorité est au service de Dieu pour ton bien. Mais si tu fais le mal, redoute-la. Car ce n’est pas pour rien qu’elle peut punir de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le grec a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’elle porte l’épée.
      marker-yv: yv-n
    - type: text
      text: '. Elle est, en effet, au service de Dieu pour manifester sa colère et punir celui qui fait le mal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est pourquoi il est nécessaire de se soumettre à l’autorité, non seulement par peur de la punition, mais surtout par motif de conscience.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C’est pour les mêmes raisons que vous devez payer vos impôts. Car ceux qui les perçoivent sont eux aussi au service de Dieu, dans l’exercice de leurs fonctions. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rendez donc à chacun ce qui lui est dû : les impôts et les taxes à qui vous les devez, le respect et l’honneur à qui ils reviennent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le résumé de la Loi
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ne restez redevables de rien à personne, sinon de vous aimer les uns les autres. Car celui qui aime l’autre a satisfait à toutes les exigences de la Loi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, des commandements comme : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne commettras pas d’adultère ; tu ne commettras pas de meurtre ; tu ne voleras pas, tu ne convoiteras pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.13-15, 17 ; Dt 5.17-19, 21.
      marker-yv: yv-n
    - type: text
      text: '  ; et tous les autres, se trouvent récapitulés en cette seule parole : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aime ton prochain comme toi-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 19.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
