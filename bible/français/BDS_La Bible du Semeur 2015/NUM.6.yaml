document_id: NUM.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les personnes qui se consacrent à l’Eternel
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '10':
  - type: text
    content: 'Le huitième jour, il apportera au prêtre deux tourterelles ou deux pigeonneaux, à l’entrée de la tente de la Rencontre. '
  '11':
  - type: text
    content: 'Le prêtre en offrira l’un comme sacrifice pour le péché et l’autre comme holocauste, ainsi il fera le rite d’expiation pour la faute qui a été commise par le contact avec un mort. Ce même jour, il consacrera de nouveau sa tête, '
  '12':
  - type: text
    content: et se consacrera lui-même de nouveau à l’Eternel pour le temps de consécration qu’il avait fixé. Il offrira un agneau dans sa première année à titre de sacrifice de réparation. Les jours déjà écoulés ne compteront pas, du fait que sa période de consécration a été profanée.
  '13':
  - type: text
    content: 'Voici la loi concernant le consacré pour le jour où il aura achevé le temps de sa consécration. Ce jour-là, on le fera venir à l’entrée de la tente de la Rencontre, '
  '14':
  - type: text
    content: 'et il offrira son sacrifice à l’Eternel : un agneau dans sa première année, sans défaut, comme holocauste ; une brebis dans sa première année, sans défaut, comme sacrifice pour le péché, et un bélier sans défaut comme sacrifice de communion. '
  '15':
  - type: text
    content: 'Il y joindra une corbeille de pains sans levain faits avec de la fleur de farine pétrie à l’huile et des galettes sans levain arrosées d’huile, ainsi que les offrandes et les libations accompagnant ces sacrifices. '
  '16':
  - type: text
    content: 'Le prêtre approchera le tout devant l’Eternel, et offrira son sacrifice pour le péché et son holocauste ; '
  '17':
  - type: text
    content: 'il offrira aussi à l’Eternel le bélier comme sacrifice de communion, avec la corbeille de pains sans levain et il y joindra son offrande et sa libation. '
  '18':
  - type: text
    content: 'Alors, le consacré rasera sa tête consacrée à l’entrée de la tente de la Rencontre, il prendra les cheveux et les poils de barbe de sa tête consacrée et les jettera sur le feu qui brûle sous le sacrifice de communion. '
  '19':
  - type: text
    content: Le prêtre prendra l’épaule du bélier quand elle sera cuite, ainsi qu’un gâteau sans levain de la corbeille et une galette sans levain
  - type: note
    content: Part normale du prêtre dans le sacrifice de communion, plus l’épaule du bélier et une galette de pain sans levain.
  - type: text
    content: ', et il les déposera dans les mains du consacré, après que celui-ci se sera rasé sa tête consacrée. '
  '2':
  - type: text
    content: 'Dis aux Israélites : Lorsqu’un homme ou une femme se consacre d’une manière spéciale à l’Eternel en faisant vœu de consécration'
  - type: note
    content: 'Selon la signification du terme hébreu, souvent transcrit vœu de naziréat. De même aux v. 13, 19, 21. Ce vœu concernait trois domaines : l’alimentation, l’apparence extérieure et la pureté rituelle. Ce vœu de consécration particulière concernait une période définie, pouvant, dans quelques cas, durer toute la vie (Samson, Samuel, Jean-Baptiste). Voir Jg 13.5 ; 16.17 ; 1 S 1.11 ; Lc 1.15 ; Ac 21.23-26.'
  - type: text
    content: ', '
  '20':
  - type: text
    content: Puis le prêtre accomplira le geste de présentation devant l’Eternel. Ces aliments sont une chose sainte qui revient au prêtre, tout comme la poitrine avec laquelle le geste de présentation a été accompli, et le gigot qui a été prélevé. Après cela, le consacré pourra de nouveau boire du vin.
  '21':
  - type: text
    content: Telle est la règle relative au consacré qui a fait un vœu, et voilà ce qu’il offrira à l’Eternel pour sa consécration, sans compter les dons volontaires qu’il pourra promettre si ses moyens le lui permettent. Il agira conformément au vœu qu’il aura prononcé, en plus de ce que prévoit la loi relative à sa consécration.
  - type: heading
    content: Bénédiction
  '22':
  - type: text
    content: 'L’Eternel dit à Moïse : '
  '23':
  - type: text
    content: 'Parle à Aaron et à ses fils et dis-leur : Voici en quels termes vous bénirez les Israélites. Vous leur direz :'
  '24':
  - type: text
    content: Que l’Eternel te bénisse et te protège !
  '25':
  - type: text
    content: Que l’Eternel te regarde avec bonté ! ╵Et qu’il te fasse grâce !
  '26':
  - type: text
    content: Que l’Eternel veille sur toi ╵et t’accorde la paix !
  '27':
  - type: text
    content: C’est ainsi qu’ils m’invoqueront en faveur des Israélites, et moi, je les bénirai.
  '3':
  - type: text
    content: 'il s’abstiendra de vin et de boissons fermentées, il ne consommera ni vinaigre de vin ni vinaigre d’une autre boisson enivrante, il ne boira pas de jus de raisin et ne mangera pas de raisins, qu’ils soient frais ou secs. '
  '4':
  - type: text
    content: 'Durant tout le temps de sa consécration, il ne mangera aucun produit confectionné à partir du fruit de la vigne, depuis les pépins jusqu’à la peau du raisin. '
  '5':
  - type: text
    content: 'Pendant toute cette période, le rasoir ne devra pas toucher sa tête ; jusqu’à ce que s’achève le temps de sa consécration à l’Eternel, il sera saint et se laissera pousser librement les cheveux et la barbe. '
  '6':
  - type: text
    content: 'Durant tout le temps pendant lequel il est consacré à l’Eternel, il ne touchera aucun corps mort. '
  '7':
  - type: text
    content: 'Il ne se rendra même pas rituellement impur pour son père, sa mère, son frère ou sa sœur si ceux-ci viennent à mourir, car il porte sur sa tête la marque de sa consécration à son Dieu. '
  '8':
  - type: text
    content: Tout le temps de sa consécration, il est saint pour l’Eternel.
  '9':
  - type: text
    content: 'Si quelqu’un meurt subitement près de lui, sa tête consacrée se trouve rendue impure. Sept jours plus tard, le jour de sa purification, il se rasera les cheveux et la barbe. '
