document_id: NUM.29,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les sacrifices pour la fête des Trompettes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le premier jour du septième mois, vous aurez une assemblée cultuelle et vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. Vous le marquerez par des sonneries de trompettes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et trois kilogrammes pour chacun des sept agneaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous immolerez aussi un bouc en sacrifice pour le péché. Ces sacrifices viendront s’ajouter au sacrifice pour le péché qui est offert spécialement en ce jour des Expiations et à l’holocauste perpétuel avec son offrande et leurs libations.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les sacrifices pour la fête des Cabanes
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le quinzième jour du septième mois, vous tiendrez une autre assemblée cultuelle. Vous n’accomplirez en ce jour-là aucune tâche relative à votre travail habituel, et vous célébrerez pendant sept jours une fête en l’honneur de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de la fête des Cabanes : voir Ex 23.16 ; 34.22 ; Lv 23.33-43 ; Dt 16.13-15.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez en holocauste et en sacrifice consumé par le feu dont l’odeur apaisera l’Eternel treize jeunes taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous y joindrez l’offrande correspondante de fleur de farine pétrie avec de l’huile, soit neuf kilogrammes pour chacun des treize taureaux, six kilogrammes pour chacun des deux béliers, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et trois kilogrammes pour chacun des quatorze agneaux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous immolerez aussi un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second jour, vous offrirez douze jeunes taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec les offrandes de farine et les libations de vin requises pour les taureaux, les béliers et les agneaux, selon leur nombre et conformément aux prescriptions rituelles. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous immolerez aussi un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de l’offrande et des libations qui l’accompagnent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez, en holocauste dont l’odeur apaisera l’Eternel, un jeune taureau, un bélier et sept agneaux dans leur première année, tous sans défaut. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le troisième jour, vous offrirez onze taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec les offrandes et les libations correspondantes selon leur nombre et conformément au rituel prescrit, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et aussi, un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le quatrième jour, vous offrirez dix taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec les offrandes et les libations correspondantes, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi qu’un bouc en sacrifice pour le péché.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cinquième jour, vous sacrifierez neuf taureaux, deux béliers, et quatorze agneaux, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dans les mêmes conditions que les jours précédents. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sixième jour, huit taureaux et le même nombre de béliers et d’agneaux que les autres jours, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous y ajouterez l’offrande correspondante de fleur de farine pétrie à l’huile, neuf kilogrammes pour le taureau, six kilogrammes pour le bélier '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et le septième jour, sept taureaux, deux béliers et quatorze agneaux.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le huitième jour, vous aurez un jour de fête cultuelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une cérémonie de clôture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 7.37
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez en holocauste, et en sacrifice consumé par le feu, à l’odeur qui apaisera l’Eternel : un taureau, un bélier, sept agneaux dans leur première année, sans défaut, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec les offrandes et les libations correspondantes pour le taureau, le bélier et les agneaux, selon leur nombre et conformément au rituel prescrit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous immolerez un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà ce que vous offrirez à l’Eternel à l’occasion de vos jours de fêtes et en plus de vos sacrifices volontaires, de ceux que vous faites pour accomplir un vœu et de vos holocaustes, de vos offrandes, de vos libations et de vos sacrifices de communion.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et trois kilogrammes pour chacun des sept agneaux.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, vous immolerez un bouc en sacrifice pour le péché pour accomplir le rite d’expiation pour vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces sacrifices viendront s’ajouter à l’holocauste mensuel et à son offrande, ainsi qu’à l’holocauste perpétuel avec son offrande et à la libation qui les accompagne, selon le rituel prescrit à leur sujet. Ce sont des aliments consumés par le feu, pour l’Eternel, et dont l’odeur est apaisante.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les sacrifices pour le jour des Expiations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 7-11, voir Lv 16 ; 23.27-32.
      marker-yv: yv-n
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au dixième jour du septième mois vous tiendrez une assemblée cultuelle. Vous vous humilierez et vous ne ferez aucun travail. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez à l’Eternel en holocauste à l’odeur apaisante : un jeune taureau, un bélier et sept agneaux dans leur première année, sans défaut. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous y joindrez l’offrande correspondante de fleur de farine pétrie avec de l’huile, neuf kilogrammes pour le taureau, six kilogrammes pour le bélier '
