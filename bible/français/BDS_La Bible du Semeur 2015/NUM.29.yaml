document_id: NUM.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices pour la fête des Trompettes
  - type: text
    content: Le premier jour du septième mois, vous aurez une assemblée cultuelle et vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. Vous le marquerez par des sonneries de trompettes
  - type: note
    content: Voir Lv 23.24.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'et trois kilogrammes pour chacun des sept agneaux. '
  '11':
  - type: text
    content: Vous immolerez aussi un bouc en sacrifice pour le péché. Ces sacrifices viendront s’ajouter au sacrifice pour le péché qui est offert spécialement en ce jour des Expiations et à l’holocauste perpétuel avec son offrande et leurs libations.
  - type: heading
    content: Les sacrifices pour la fête des Cabanes
  '12':
  - type: text
    content: Le quinzième jour du septième mois, vous tiendrez une autre assemblée cultuelle. Vous n’accomplirez en ce jour-là aucune tâche relative à votre travail habituel, et vous célébrerez pendant sept jours une fête en l’honneur de l’Eternel
  - type: note
    content: 'Il s’agit de la fête des Cabanes : voir Ex 23.16 ; 34.22 ; Lv 23.33-43 ; Dt 16.13-15.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Vous offrirez en holocauste et en sacrifice consumé par le feu dont l’odeur apaisera l’Eternel treize jeunes taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut. '
  '14':
  - type: text
    content: 'Vous y joindrez l’offrande correspondante de fleur de farine pétrie avec de l’huile, soit neuf kilogrammes pour chacun des treize taureaux, six kilogrammes pour chacun des deux béliers, '
  '15':
  - type: text
    content: 'et trois kilogrammes pour chacun des quatorze agneaux. '
  '16':
  - type: text
    content: Vous immolerez aussi un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  '17':
  - type: text
    content: 'Le second jour, vous offrirez douze jeunes taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut, '
  '18':
  - type: text
    content: 'avec les offrandes de farine et les libations de vin requises pour les taureaux, les béliers et les agneaux, selon leur nombre et conformément aux prescriptions rituelles. '
  '19':
  - type: text
    content: 'Vous immolerez aussi un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de l’offrande et des libations qui l’accompagnent. '
  '2':
  - type: text
    content: 'Vous offrirez, en holocauste dont l’odeur apaisera l’Eternel, un jeune taureau, un bélier et sept agneaux dans leur première année, tous sans défaut. '
  '20':
  - type: text
    content: 'Le troisième jour, vous offrirez onze taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut '
  '21':
  - type: text
    content: 'avec les offrandes et les libations correspondantes selon leur nombre et conformément au rituel prescrit, '
  '22':
  - type: text
    content: et aussi, un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  '23':
  - type: text
    content: 'Le quatrième jour, vous offrirez dix taureaux, deux béliers et quatorze agneaux dans leur première année et sans défaut, '
  '24':
  - type: text
    content: 'avec les offrandes et les libations correspondantes, '
  '25':
  - type: text
    content: ainsi qu’un bouc en sacrifice pour le péché.
  '26':
  - type: text
    content: 'Le cinquième jour, vous sacrifierez neuf taureaux, deux béliers, et quatorze agneaux, '
  '27':
  - type: text
    content: 'dans les mêmes conditions que les jours précédents. '
  '29':
  - type: text
    content: 'Le sixième jour, huit taureaux et le même nombre de béliers et d’agneaux que les autres jours, '
  '3':
  - type: text
    content: 'Vous y ajouterez l’offrande correspondante de fleur de farine pétrie à l’huile, neuf kilogrammes pour le taureau, six kilogrammes pour le bélier '
  '32':
  - type: text
    content: et le septième jour, sept taureaux, deux béliers et quatorze agneaux.
  '35':
  - type: text
    content: Le huitième jour, vous aurez un jour de fête cultuelle
  - type: note
    content: 'Autre traduction : une cérémonie de clôture (voir Jn 7.37).'
  - type: text
    content: '. Vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. '
  '36':
  - type: text
    content: 'Vous offrirez en holocauste, et en sacrifice consumé par le feu, à l’odeur qui apaisera l’Eternel : un taureau, un bélier, sept agneaux dans leur première année, sans défaut, '
  '37':
  - type: text
    content: 'avec les offrandes et les libations correspondantes pour le taureau, le bélier et les agneaux, selon leur nombre et conformément au rituel prescrit. '
  '38':
  - type: text
    content: Vous immolerez un bouc en sacrifice pour le péché, tout ceci en plus de l’holocauste perpétuel, de son offrande et de sa libation.
  - type: heading
    content: Conclusion
  '39':
  - type: text
    content: Voilà ce que vous offrirez à l’Eternel à l’occasion de vos jours de fêtes et en plus de vos sacrifices volontaires, de ceux que vous faites pour accomplir un vœu et de vos holocaustes, de vos offrandes, de vos libations et de vos sacrifices de communion.
  '4':
  - type: text
    content: et trois kilogrammes pour chacun des sept agneaux.
  '5':
  - type: text
    content: 'De plus, vous immolerez un bouc en sacrifice pour le péché pour accomplir le rite d’expiation pour vous. '
  '6':
  - type: text
    content: Ces sacrifices viendront s’ajouter à l’holocauste mensuel et à son offrande, ainsi qu’à l’holocauste perpétuel avec son offrande et à la libation qui les accompagne, selon le rituel prescrit à leur sujet. Ce sont des aliments consumés par le feu, pour l’Eternel, et dont l’odeur est apaisante.
  - type: heading
    content: Les sacrifices pour le jour des ExpiationsPour les v. 7-11, voir Lv 16 ; 23.27-32.
  '7':
  - type: text
    content: 'Au dixième jour du septième mois vous tiendrez une assemblée cultuelle. Vous vous humilierez et vous ne ferez aucun travail. '
  '8':
  - type: text
    content: 'Vous offrirez à l’Eternel en holocauste à l’odeur apaisante : un jeune taureau, un bélier et sept agneaux dans leur première année, sans défaut. '
  '9':
  - type: text
    content: 'Vous y joindrez l’offrande correspondante de fleur de farine pétrie avec de l’huile, neuf kilogrammes pour le taureau, six kilogrammes pour le bélier '
