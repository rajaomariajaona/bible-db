document_id: MAT.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La visite des mages
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jésus était né à Bethléhem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bethléhem était le lieu d’origine du roi David.
    marker-yv: yv-n
  - type: text
    text: ' en Judée, sous le règne du roi Hérode'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hérode le Grand est mort en 4 avant Jésus. La naissance de Jésus a eu lieu quelque temps auparavant, sans doute en 7 ou 6 avant notre ère.
    marker-yv: yv-n
  - type: text
    text: . Or, des mages
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mages étaient des sages (ou savants) de l’Orient qui s’occupaient, entre autres, d’astronomie.
    marker-yv: yv-n
  - type: text
    text: ' venant de l’Orient arrivèrent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils demandaient : Où est le roi des Juifs qui vient de naître ? Nous avons vu se lever son étoile, et nous sommes venus lui rendre hommage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’adorer, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de même qu’aux v. 8 et 11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand le roi Hérode apprit la nouvelle, il en fut profondément troublé, et tout Jérusalem avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il convoqua tous les chefs des prêtres et les spécialistes de la Loi que comptait son peuple et il leur demanda où devait naître le Messie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '– A Bethléhem en Judée, lui répondirent-ils, car voici ce que le prophète a écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Et toi, Bethléhem, village de Juda,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tu n’es certes pas le plus insignifiant
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'des chefs-lieux de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juda
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car c’est de toi que sortira le chef
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'qui, comme un berger, conduira '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
    - type: text
      text: ' mon peuple'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 5.1
        metadata:
          usfm: MIC.5.1
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Là-dessus, Hérode fit appeler secrètement les mages et se fit préciser à quel moment l’étoile leur était apparue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis il les envoya à Bethléhem en disant : Allez là-bas et renseignez-vous avec précision sur cet enfant ; puis, quand vous l’aurez trouvé, venez me le faire savoir, pour que j’aille, moi aussi, lui rendre hommage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand le roi leur eut donné ces instructions, les mages se mirent en route. Et voici : l’étoile qu’ils avaient vue se lever'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Orient.
    marker-yv: yv-n
  - type: text
    text: ' les précédait. Elle parvint au-dessus de l’endroit où se trouvait le petit enfant. Et là, elle s’arrêta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En revoyant l’étoile, les mages furent remplis de joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils entrèrent dans la maison, virent l’enfant avec Marie, sa mère et, tombant à genoux, ils lui rendirent hommage. Puis ils ouvrirent leurs coffrets et lui offrirent en cadeau de l’or, de l’encens et de la myrrhe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cependant, Dieu les avertit par un rêve de ne pas retourner auprès d’Hérode. Ils regagnèrent donc leur pays par un autre chemin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fuite en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après leur départ, un ange du Seigneur apparut à Joseph dans un rêve et lui dit : Lève-toi, emmène l’enfant et sa mère, et fuis en Egypte. Tu y resteras jusqu’à ce que je te dise de revenir, car Hérode fera rechercher l’enfant pour le tuer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joseph se leva donc, emmena l’enfant et sa mère, de nuit, pour se réfugier en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il y resta jusqu’à la mort d’Hérode. Ainsi s’accomplit ce que le Seigneur avait dit par le prophète : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J’ai appelé mon fils à sortir de l’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 11.1
        metadata:
          usfm: HOS.11.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand Hérode s’aperçut que les mages s’étaient moqués de lui, il devint furieux : il donna l’ordre de tuer à Bethléhem et dans les environs tous les enfants de moins de deux ans, conformément aux précisions que lui avaient données les mages sur l’époque où l’étoile était apparue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi s’accomplit la parole transmise par Jérémie, le prophète :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: On entend à Rama une voix qui gémit
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'et d’abondants sanglots amers :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Rachel pleure ses enfants
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et elle ne veut pas se laisser consoler
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car ils ne sont plus
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 31.15
        metadata:
          usfm: JER.31.15
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour au pays
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après la mort d’Hérode, un ange du Seigneur apparut en rêve à Joseph, en Egypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et lui dit : Lève-toi, emmène l’enfant et sa mère et retourne avec eux dans le pays d’Israël, car ceux qui voulaient tuer l’enfant sont morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joseph se leva donc, emmena l’enfant et sa mère et retourna dans le pays d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais il apprit qu’Archélaüs était devenu roi de Judée à la place de son père Hérode. Il eut donc peur de s’y installer, et, averti par Dieu dans un rêve, il se retira dans la province de Galilée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'où il s’établit dans une ville appelée Nazareth. Ainsi s’accomplit cette parole des prophètes : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: On l’appellera le Nazaréen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nazaréen
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire de Nazareth. Les premiers chrétiens furent aussi appelés ainsi (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24.5
        metadata:
          usfm: ACT.24.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
