document_id: MAT.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La visite des mages
  - type: text
    content: Jésus était né à Bethléhem
  - type: note
    content: Bethléhem était le lieu d’origine du roi David.
  - type: text
    content: ' en Judée, sous le règne du roi Hérode'
  - type: note
    content: Hérode le Grand est mort en 4 avant Jésus. La naissance de Jésus a eu lieu quelque temps auparavant, sans doute en 7 ou 6 avant notre ère.
  - type: text
    content: . Or, des mages
  - type: note
    content: Les mages étaient des sages (ou savants) de l’Orient qui s’occupaient, entre autres, d’astronomie.
  - type: text
    content: ' venant de l’Orient arrivèrent à Jérusalem. '
  '10':
  - type: text
    content: 'En revoyant l’étoile, les mages furent remplis de joie. '
  '11':
  - type: text
    content: Ils entrèrent dans la maison, virent l’enfant avec Marie, sa mère et, tombant à genoux, ils lui rendirent hommage. Puis ils ouvrirent leurs coffrets et lui offrirent en cadeau de l’or, de l’encens et de la myrrhe.
  '12':
  - type: text
    content: Cependant, Dieu les avertit par un rêve de ne pas retourner auprès d’Hérode. Ils regagnèrent donc leur pays par un autre chemin.
  - type: heading
    content: La fuite en Egypte
  '13':
  - type: text
    content: 'Après leur départ, un ange du Seigneur apparut à Joseph dans un rêve et lui dit : Lève-toi, emmène l’enfant et sa mère, et fuis en Egypte. Tu y resteras jusqu’à ce que je te dise de revenir, car Hérode fera rechercher l’enfant pour le tuer.'
  '14':
  - type: text
    content: 'Joseph se leva donc, emmena l’enfant et sa mère, de nuit, pour se réfugier en Egypte. '
  '15':
  - type: text
    content: 'Il y resta jusqu’à la mort d’Hérode. Ainsi s’accomplit ce que le Seigneur avait dit par le prophète : '
  - type: text
    content: J’ai appelé mon fils à sortir de l’Egypte
  - type: note
    content: Os 11.1.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Quand Hérode s’aperçut que les mages s’étaient moqués de lui, il devint furieux : il donna l’ordre de tuer à Bethléhem et dans les environs tous les enfants de moins de deux ans, conformément aux précisions que lui avaient données les mages sur l’époque où l’étoile était apparue.'
  '17':
  - type: text
    content: 'Ainsi s’accomplit la parole transmise par Jérémie, le prophète :'
  '18':
  - type: text
    content: ' '
  - type: text
    content: On entend à Rama une voix qui gémit
  - type: text
    content: 'et d’abondants sanglots amers :'
  - type: text
    content: Rachel pleure ses enfants
  - type: text
    content: et elle ne veut pas se laisser consoler
  - type: text
    content: car ils ne sont plus
  - type: text
    content: ' '
  - type: note
    content: Jr 31.15 .
  - type: text
    content: .
  - type: heading
    content: Retour au pays
  '19':
  - type: text
    content: 'Après la mort d’Hérode, un ange du Seigneur apparut en rêve à Joseph, en Egypte, '
  '2':
  - type: text
    content: 'Ils demandaient : Où est le roi des Juifs qui vient de naître ? Nous avons vu se lever son étoile, et nous sommes venus lui rendre hommage'
  - type: note
    content: 'Autre traduction : l’adorer, de même qu’aux v. 8 et 11.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'et lui dit : Lève-toi, emmène l’enfant et sa mère et retourne avec eux dans le pays d’Israël, car ceux qui voulaient tuer l’enfant sont morts.'
  '21':
  - type: text
    content: 'Joseph se leva donc, emmena l’enfant et sa mère et retourna dans le pays d’Israël. '
  '22':
  - type: text
    content: 'Mais il apprit qu’Archélaüs était devenu roi de Judée à la place de son père Hérode. Il eut donc peur de s’y installer, et, averti par Dieu dans un rêve, il se retira dans la province de Galilée, '
  '23':
  - type: text
    content: 'où il s’établit dans une ville appelée Nazareth. Ainsi s’accomplit cette parole des prophètes : '
  - type: text
    content: On l’appellera le Nazaréen
  - type: note
    content: 'Nazaréen: c’est-à-dire de Nazareth. Les premiers chrétiens furent aussi appelés ainsi (voir Ac 24.5).'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Quand le roi Hérode apprit la nouvelle, il en fut profondément troublé, et tout Jérusalem avec lui. '
  '4':
  - type: text
    content: Il convoqua tous les chefs des prêtres et les spécialistes de la Loi que comptait son peuple et il leur demanda où devait naître le Messie.
  '5':
  - type: text
    content: '– A Bethléhem en Judée, lui répondirent-ils, car voici ce que le prophète a écrit :'
  '6':
  - type: text
    content: ' '
  - type: text
    content: Et toi, Bethléhem, village de Juda,
  - type: text
    content: tu n’es certes pas le plus insignifiant
  - type: text
    content: 'des chefs-lieux de '
  - type: text
    content: Juda
  - type: text
    content: ','
  - type: text
    content: car c’est de toi que sortira le chef
  - type: text
    content: 'qui, comme un berger, conduira '
  - type: text
    content: Israël
  - type: text
    content: ' mon peuple'
  - type: text
    content: ' '
  - type: note
    content: Mi 5.1 .
  - type: text
    content: .
  '7':
  - type: text
    content: 'Là-dessus, Hérode fit appeler secrètement les mages et se fit préciser à quel moment l’étoile leur était apparue. '
  '8':
  - type: text
    content: 'Puis il les envoya à Bethléhem en disant : Allez là-bas et renseignez-vous avec précision sur cet enfant ; puis, quand vous l’aurez trouvé, venez me le faire savoir, pour que j’aille, moi aussi, lui rendre hommage.'
  '9':
  - type: text
    content: 'Quand le roi leur eut donné ces instructions, les mages se mirent en route. Et voici : l’étoile qu’ils avaient vue se lever'
  - type: note
    content: 'Autre traduction : en Orient.'
  - type: text
    content: ' les précédait. Elle parvint au-dessus de l’endroit où se trouvait le petit enfant. Et là, elle s’arrêta. '
