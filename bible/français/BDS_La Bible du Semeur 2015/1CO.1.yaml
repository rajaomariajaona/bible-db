document_id: 1CO.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, qui a été appelé, par la volonté de Dieu, à être un apôtre de Jésus-Christ, et le frère Sosthène
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sosthène
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 18.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faut cependant, frères et sœurs, que je vous adresse une recommandation instante, et c’est au nom de notre Seigneur Jésus-Christ que je le fais. Vivez tous ensemble en pleine harmonie ! Ne laissez pas de division s’introduire entre vous ! Soyez parfaitement unis en ayant une même conviction, une même façon de penser ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, mes frères et sœurs, j’ai été informé par les gens de la maison de Chloé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Chloé
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut-être une commerçante dont le personnel faisait fréquemment le voyage de Corinthe à Ephèse.
      marker-yv: yv-n
    - type: text
      text: ' que la discorde règne parmi vous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que je veux dire : chacun de vous tient ce type de langage : « Pour moi, c’est Paul ! » ou : « Pour moi, c’est Apollos'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 18.24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ! » ou : « Pour moi, c’est Pierre ! » ou encore : « Pour moi, c’est Christ ! »'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyons : Christ serait-il divisé ? Paul aurait-il été crucifié pour vous ? Ou bien est-ce au nom de Paul que vous avez été baptisés ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je remercie Dieu de n’avoir baptisé aucun de vous, sauf Crispus et Gaïus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Crispus
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 18.8
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaïus
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 19.29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne, en tout cas, ne peut prétendre avoir été baptisé en mon nom. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Ah si ! J’ai baptisé encore les gens de la maison de Stéphanas. A part ceux-là, je crois n’avoir baptisé personne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car ce n’est pas pour baptiser que Christ m’a envoyé, c’est pour proclamer l’Evangile. Et cela, sans recourir à la sagesse des beaux discours, afin de ne pas vider de son sens la mort de Christ sur la croix.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La sagesse des hommes et la folie de Dieu
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, la prédication de la mort de Christ sur une croix est une folie aux yeux de ceux qui se perdent. Mais pour nous qui sommes sauvés, elle est la puissance même de Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’est-il pas écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je détruirai la sagesse des sages
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et je réduirai à néant
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’intelligence des intelligents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 29.14
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saluent l’Eglise de Dieu établie à Corinthe, ceux qui ont été purifiés de leurs péchés dans l’union avec Jésus-Christ et qui ont été appelés à faire partie du peuple saint, ainsi que tous ceux qui, en quelque lieu que ce soit, font appel à notre Seigneur Jésus-Christ, leur Seigneur comme le nôtre.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Où est le sage ? Où est le spécialiste de la Loi ? Où est le raisonneur de ce monde ? Dieu n’a-t-il pas changé en folie la sagesse du monde ?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, là où la sagesse divine s’est manifestée, le monde n’a pas reconnu Dieu par le moyen de la sagesse. C’est pourquoi Dieu a jugé bon de sauver ceux qui croient, par un message qui annonce une folie.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, tandis que, d’un côté, les Juifs réclament des signes miraculeux et que, de l’autre, les Grecs recherchent « la sagesse », '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nous, nous prêchons Christ mis en croix, ce qui est une cause de rejet pour les Juifs et une folie pour les Grecs. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais pour tous ceux que Dieu appelle, qu’ils soient juifs ou grecs, Christ est puissance de Dieu et sagesse de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car la folie de Dieu est plus sage que la sagesse des hommes, et la faiblesse de Dieu est plus forte que la force des hommes.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Considérez donc, frères et sœurs, la situation dans laquelle Dieu vous a appelés à lui. On ne trouve parmi vous que peu de sages selon les critères humains, peu de personnalités influentes, peu de membres de la haute société ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Non ! Dieu a choisi ce que le monde considère comme une folie pour confondre les sages, et il a choisi ce qui est faible pour couvrir de honte les puissants.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a porté son choix sur ce qui n’a aucune noblesse et que le monde méprise, sur ce qui est considéré comme insignifiant, pour réduire à néant ce que le monde estime important.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, aucune créature ne pourra se vanter devant Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul remercie Dieu au sujet des Corinthiens
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par lui, vous êtes unis à Christ, qui est devenu pour nous cette sagesse qui vient de Dieu, justice, purification et délivrance. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il en est ainsi pour que soit respecté ce commandement de l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui veut éprouver de la fierté,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qu’il place sa fierté dans le Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.31 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 9.23
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ne cesse d’exprimer ma reconnaissance à mon Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu.
      marker-yv: yv-n
    - type: text
      text: ' à votre sujet pour la grâce qu’il vous a accordée dans l’union avec Jésus-Christ. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, vous avez été comblés en lui dans tous les domaines, en particulier celui de la parole et celui de la connaissance, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dans la mesure même où la vérité dont Christ est le témoin a été fermement établie chez vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Vous êtes attachés avec tant de fermeté au témoignage rendu à Christ '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’il…
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, il ne vous manque aucun don de la grâce divine tandis que vous attendez le moment où notre Seigneur Jésus-Christ apparaîtra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui-même, d’ailleurs, vous rendra forts jusqu’à la fin, pour que vous soyez irréprochables au jour de notre Seigneur Jésus-Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car Dieu, qui vous a appelés à être en communion avec son Fils, notre Seigneur Jésus-Christ, est fidèle.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les divisions dans l’Église
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les divisions à Corinthe
    marker-yv: yv-h
