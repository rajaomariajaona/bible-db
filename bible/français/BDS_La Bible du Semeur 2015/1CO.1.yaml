document_id: 1CO.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, qui a été appelé, par la volonté de Dieu, à être un apôtre de Jésus-Christ, et le frère Sosthène
  - type: note
    content: 'Sosthène: Voir Ac 18.17.'
  - type: text
    content: ', '
  '10':
  - type: text
    content: 'Il faut cependant, frères et sœurs, que je vous adresse une recommandation instante, et c’est au nom de notre Seigneur Jésus-Christ que je le fais. Vivez tous ensemble en pleine harmonie ! Ne laissez pas de division s’introduire entre vous ! Soyez parfaitement unis en ayant une même conviction, une même façon de penser ! '
  '11':
  - type: text
    content: En effet, mes frères et sœurs, j’ai été informé par les gens de la maison de Chloé
  - type: note
    content: 'Chloé: peut-être une commerçante dont le personnel faisait fréquemment le voyage de Corinthe à Ephèse.'
  - type: text
    content: ' que la discorde règne parmi vous. '
  '12':
  - type: text
    content: 'Voici ce que je veux dire : chacun de vous tient ce type de langage : « Pour moi, c’est Paul ! » ou : « Pour moi, c’est Apollos'
  - type: note
    content: Voir Ac 18.24.
  - type: text
    content: '  ! » ou : « Pour moi, c’est Pierre ! » ou encore : « Pour moi, c’est Christ ! »'
  '13':
  - type: text
    content: 'Voyons : Christ serait-il divisé ? Paul aurait-il été crucifié pour vous ? Ou bien est-ce au nom de Paul que vous avez été baptisés ? '
  '14':
  - type: text
    content: Je remercie Dieu de n’avoir baptisé aucun de vous, sauf Crispus et Gaïus
  - type: note
    content: 'Crispus: voir Ac 18.8. Gaïus: voir Ac 19.29.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Personne, en tout cas, ne peut prétendre avoir été baptisé en mon nom. '
  '16':
  - type: text
    content: '– Ah si ! J’ai baptisé encore les gens de la maison de Stéphanas. A part ceux-là, je crois n’avoir baptisé personne. '
  '17':
  - type: text
    content: Car ce n’est pas pour baptiser que Christ m’a envoyé, c’est pour proclamer l’Evangile. Et cela, sans recourir à la sagesse des beaux discours, afin de ne pas vider de son sens la mort de Christ sur la croix.
  - type: heading
    content: La sagesse des hommes et la folie de Dieu
  '18':
  - type: text
    content: 'En effet, la prédication de la mort de Christ sur une croix est une folie aux yeux de ceux qui se perdent. Mais pour nous qui sommes sauvés, elle est la puissance même de Dieu. '
  '19':
  - type: text
    content: 'N’est-il pas écrit :'
  - type: text
    content: Je détruirai la sagesse des sages
  - type: text
    content: et je réduirai à néant
  - type: text
    content: ' ╵'
  - type: text
    content: l’intelligence des intelligents
  - type: note
    content: Es 29.14 cité selon l’ancienne version grecque.
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: saluent l’Eglise de Dieu établie à Corinthe, ceux qui ont été purifiés de leurs péchés dans l’union avec Jésus-Christ et qui ont été appelés à faire partie du peuple saint, ainsi que tous ceux qui, en quelque lieu que ce soit, font appel à notre Seigneur Jésus-Christ, leur Seigneur comme le nôtre.
  '20':
  - type: text
    content: Où est le sage ? Où est le spécialiste de la Loi ? Où est le raisonneur de ce monde ? Dieu n’a-t-il pas changé en folie la sagesse du monde ?
  '21':
  - type: text
    content: En effet, là où la sagesse divine s’est manifestée, le monde n’a pas reconnu Dieu par le moyen de la sagesse. C’est pourquoi Dieu a jugé bon de sauver ceux qui croient, par un message qui annonce une folie.
  '22':
  - type: text
    content: 'Oui, tandis que, d’un côté, les Juifs réclament des signes miraculeux et que, de l’autre, les Grecs recherchent « la sagesse », '
  '23':
  - type: text
    content: 'nous, nous prêchons Christ mis en croix, ce qui est une cause de rejet pour les Juifs et une folie pour les Grecs. '
  '24':
  - type: text
    content: 'Mais pour tous ceux que Dieu appelle, qu’ils soient juifs ou grecs, Christ est puissance de Dieu et sagesse de Dieu. '
  '25':
  - type: text
    content: Car la folie de Dieu est plus sage que la sagesse des hommes, et la faiblesse de Dieu est plus forte que la force des hommes.
  '26':
  - type: text
    content: 'Considérez donc, frères et sœurs, la situation dans laquelle Dieu vous a appelés à lui. On ne trouve parmi vous que peu de sages selon les critères humains, peu de personnalités influentes, peu de membres de la haute société ! '
  '27':
  - type: text
    content: Non ! Dieu a choisi ce que le monde considère comme une folie pour confondre les sages, et il a choisi ce qui est faible pour couvrir de honte les puissants.
  '28':
  - type: text
    content: Dieu a porté son choix sur ce qui n’a aucune noblesse et que le monde méprise, sur ce qui est considéré comme insignifiant, pour réduire à néant ce que le monde estime important.
  '29':
  - type: text
    content: 'Ainsi, aucune créature ne pourra se vanter devant Dieu. '
  '3':
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Paul remercie Dieu au sujet des Corinthiens
  '30':
  - type: text
    content: 'Par lui, vous êtes unis à Christ, qui est devenu pour nous cette sagesse qui vient de Dieu, justice, purification et délivrance. '
  '31':
  - type: text
    content: 'Et il en est ainsi pour que soit respecté ce commandement de l’Ecriture :'
  - type: text
    content: Celui qui veut éprouver de la fierté,
  - type: text
    content: qu’il place sa fierté dans le Seigneur
  - type: text
    content: ' '
  - type: note
    content: Jr 9.23 .
  - type: text
    content: .
  '4':
  - type: text
    content: Je ne cesse d’exprimer ma reconnaissance à mon Dieu
  - type: note
    content: 'Certains manuscrits ont : Dieu.'
  - type: text
    content: ' à votre sujet pour la grâce qu’il vous a accordée dans l’union avec Jésus-Christ. '
  '5':
  - type: text
    content: 'En effet, vous avez été comblés en lui dans tous les domaines, en particulier celui de la parole et celui de la connaissance, '
  '6':
  - type: text
    content: dans la mesure même où la vérité dont Christ est le témoin a été fermement établie chez vous
  - type: note
    content: 'Autre traduction : 6 Vous êtes attachés avec tant de fermeté au témoignage rendu à Christ 7 qu’il…'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ainsi, il ne vous manque aucun don de la grâce divine tandis que vous attendez le moment où notre Seigneur Jésus-Christ apparaîtra. '
  '8':
  - type: text
    content: 'Lui-même, d’ailleurs, vous rendra forts jusqu’à la fin, pour que vous soyez irréprochables au jour de notre Seigneur Jésus-Christ. '
  '9':
  - type: text
    content: Car Dieu, qui vous a appelés à être en communion avec son Fils, notre Seigneur Jésus-Christ, est fidèle.
  - type: heading
    content: Les divisions dans l’Église
  - type: heading
    content: Les divisions à Corinthe
