document_id: JOB.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prologue
  - type: heading
    content: Job, un homme intègre et droit
  - type: text
    content: Il y avait, au pays d’Outs
  - type: note
    content: Nom d’une région située à l’est du Jourdain (v. 3), dont l’identification est incertaine. Elle pouvait se situer en Edom, au sud-est de la mer Morte (Gn 36.28 ; Lm 4.21), ou au pays des Araméens vers le nord (voir Gn 10.23 ; 22.21). Job n’était donc pas un Israélite (voir Ez 14.14-20).
  - type: text
    content: ', un homme appelé Job. C’était un homme intègre et droit, un homme qui craignait Dieu et qui évitait de faire le mal. '
  '10':
  - type: text
    content: 'N’as-tu pas élevé comme un rempart de protection autour de lui, autour de sa maison, et autour de tous ses biens ? Tu as fait réussir ses entreprises : ses troupeaux se sont multipliés dans le pays ! '
  '11':
  - type: text
    content: Mais porte donc la main sur tous ses biens et sur les siens, et l’on verra s’il ne te maudit pas en face.
  '12':
  - type: text
    content: 'Alors l’Eternel dit à l’Accusateur : Tous ses biens sont en ton pouvoir, ainsi que les siens, mais ne porte pas la main sur sa personne !'
  - type: text
    content: Alors l’Accusateur se retira de la présence de l’Eternel.
  '13':
  - type: text
    content: 'Or, un jour, les fils et les filles de Job s’étaient mis à manger et à boire du vin ensemble chez leur frère aîné. '
  '14':
  - type: text
    content: 'C’est alors qu’un messager vint trouver Job et lui annonça : Les bœufs étaient en train de labourer, et les ânesses paissaient à leurs côtés, '
  '15':
  - type: text
    content: quand les Sabéens
  - type: note
    content: 'Peuple nomade habitant le sud de l’Arabie (de Saba : 1 R 10.1-13  ; voir Ps 72.10, 15 ; Es 60.6 ; Jr 6.20 ; Ez 27.22 ; Jl 4.8). Ils étaient marchands selon 6.19, passage où Job les associe à Téma (à quelque 500 kilomètres au sud-est de Jérusalem).'
  - type: text
    content: ' se sont jetés sur eux, et s’en sont emparés. Ils ont massacré tes serviteurs. Je suis le seul qui ait pu leur échapper et je viens t’annoncer la nouvelle.'
  '16':
  - type: text
    content: 'Il n’avait pas fini de parler qu’un autre messager arriva et annonça : La foudre est tombée du ciel, et elle a foudroyé tes moutons et tes chèvres et tes serviteurs. Elle a tout consumé. Je suis le seul qui ait pu y échapper et je viens t’annoncer la nouvelle.'
  '17':
  - type: text
    content: 'Il parlait encore, lorsqu’un autre messager arriva et annonça : Trois bandes de Chaldéens'
  - type: note
    content: Nomades du désert venant de Mésopotamie. Ils sont devenus sédentaires au xe siècle av. J.-C. et ont constitué le noyau de l’Empire babylonien de Nabuchodonosor.
  - type: text
    content: ' se sont jetées sur les chameaux, et s’en sont emparés. Ils ont massacré tes serviteurs. Je suis le seul qui ait pu leur échapper et je viens t’annoncer la nouvelle.'
  '18':
  - type: text
    content: 'Il parlait encore, lorsqu’un autre messager arriva et annonça : Tes fils et tes filles étaient en train de manger et de boire du vin ensemble chez leur frère aîné, '
  '19':
  - type: text
    content: lorsqu’un vent très violent s’est levé du côté du désert. Il s’est rué contre les quatre coins de la maison qui s’est effondrée sur tes enfants. Ils sont tous morts. Je suis le seul qui ait pu m’échapper et je viens t’annoncer la nouvelle.
  '2':
  - type: text
    content: 'Il avait sept fils et trois filles. '
  '20':
  - type: text
    content: Alors Job se leva, il déchira son manteau, se rasa la tête
  - type: note
    content: En signe de deuil (voir Gn 37.34).
  - type: text
    content: ', puis se jeta par terre pour se prosterner. '
  '21':
  - type: text
    content: 'Et il dit : Je suis sorti nu du ventre de ma mère, et j’y retournerai nu. L’Eternel a donné, l’Eternel a repris : que l’Eternel soit béni !'
  '22':
  - type: text
    content: Au milieu de tous ces malheurs, Job ne commit pas de péché et n’attribua rien d’inconvenant à Dieu
  - type: note
    content: 'Autre traduction : et n’adressa pas à Dieu des paroles inconvenantes.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'De plus, ses troupeaux comptaient : sept mille moutons et chèvres, trois mille chameaux, cinq cents paires de bœufs, et cinq cents ânesses. Il possédait aussi des serviteurs en très grand nombre. Cet homme était le personnage le plus important des régions de l’est du Jourdain. '
  '4':
  - type: text
    content: 'Or, chacun de ses fils recevait à tour de rôle ses frères pour un festin. Ils invitaient leurs trois sœurs à manger et à boire avec eux. '
  '5':
  - type: text
    content: Quand ces jours de festin étaient achevés, Job faisait venir ses enfants, afin d’accomplir pour eux les rites de purification. Il se levait de grand matin et offrait un holocauste
  - type: note
    content: Sacrifice dont la victime était presque entièrement consumée sur l’autel ; forme habituelle du sacrifice au temps des patriarches. Avant les lois cérémonielles de Moïse, le père de famille agissait comme prêtre du clan familial (Gn 15.9-10).
  - type: text
    content: ' pour chacun d’eux. Car il se disait : Peut-être mes fils ont-ils commis quelque faute et dit du mal de Dieu dans leur cœur.'
  - type: text
    content: Job agissait toujours ainsi.
  - type: heading
    content: Job perd tout
  '6':
  - type: text
    content: Or, un jour, les anges de Dieu
  - type: note
    content: Appelés ici fils de Dieu (voir notes 2.1 ; 38.7 et Ps 29.1).
  - type: text
    content: ' se rendirent au conseil de l’Eternel. L’Accusateur (Satan)'
  - type: note
    content: Le terme hébreu satan est ici un nom commun car il est précédé de l’article défini. Il signifie habituellement adversaire ou accusateur. Il s’utilise en particulier pour le personnage qui se tient à la droite du juge lors d’un procès avec pour rôle d’accuser celui qui comparaît devant eux. Voir 1 Ch 1.21 ; Za 3.1-2 ; Ap 12.10.
  - type: text
    content: ' vint aussi parmi eux. '
  '7':
  - type: text
    content: 'L’Eternel dit à l’Accusateur : D’où viens-tu donc ?'
  - type: text
    content: 'Celui-ci lui répondit : Je viens de parcourir la terre et de la sillonner.'
  '8':
  - type: text
    content: 'Alors l’Eternel demanda à l’Accusateur : As-tu remarqué mon serviteur Job ? Il n’y a personne comme lui sur la terre : c’est un homme intègre et droit, un homme qui craint Dieu et qui évite de mal faire.'
  '9':
  - type: text
    content: 'L’Accusateur lui répondit : Est-ce vraiment pour rien que Job craint Dieu ? '
