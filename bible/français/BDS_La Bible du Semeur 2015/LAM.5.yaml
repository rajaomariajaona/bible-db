document_id: LAM.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Cinquième élégie : prière'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Souviens-toi, Eternel !
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Considère, Eternel, ╵tout ce qui nous est arrivé !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde et vois ╵l’opprobre que nous subissons !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Notre peau est brûlante ╵comme si on l’avait ╵passée dans la fournaise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant la faim nous consume.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils ont déshonoré ╵des femmes dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des jeunes filles dans les villes ╵du pays de Juda.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils ont pendu de leurs mains des ministres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils n’ont eu aucun égard ╵pour les responsables du peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les responsables du peuple
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.16'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Des jeunes gens ╵portent la meule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des enfants trébuchent ╵sous les fardeaux de bois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux tâches imposées aux prisonniers de guerre, trop dures pour les enfants et les jeunes (voir Ex 11.5 ; Jg 16.21).
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les responsables ont cessé ╵de siéger à la porte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le lieu habituel des réunions et des délibérations (Ps 9.14-15 ; Jb 5.4).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les adolescents ╵ont délaissé leurs chants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La joie a disparu ╵de notre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le deuil a remplacé nos danses.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La couronne est tombée ╵de notre tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à nous, ╵car nous avons péché.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Oui, si notre cœur souffre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si nos yeux sont plongés ╵dans les ténèbres,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: c’est que le mont Sion ╵a été dévasté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les renards y rôdent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fais-nous revenir à toi !
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toi, Eternel, ╵tu règnes pour toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton trône subsiste ╵à travers tous les âges.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Notre patrimoine est passé ╵aux mains des étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nos habitations à d’autres.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Pourquoi nous oublierais-tu pour toujours ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi nous délaisserais-tu ╵aussi longtemps ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ah ! fais-nous revenir à toi, ╵ô Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi nous reviendrons à toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renouvelle pour nous ╵les jours des anciens temps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 31.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Nous rejetterais-tu ╵définitivement ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Serais-tu irrité ╵contre nous à l’excès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu es irrité contre nous à l’excès !
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nous sommes devenus ╵des orphelins de père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos mères sont comme des veuves.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nous devons payer même ╵pour l’eau que nous buvons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous rentrons notre bois ╵à prix d’argent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nous sommes pourchassés ╵par nos persécuteurs ╵qui sont sur notre dos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous sommes épuisés. ╵Pas de répit pour nous !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous tendons les mains vers l’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers l’Assyrie, ╵pour avoir à manger.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Or, nos ancêtres ont péché, ╵mais ils ont disparu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est nous qui portons ╵la peine de leurs fautes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nous sommes dominés ╵par des esclaves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’y a personne ╵pour nous en délivrer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Notre pain, nous le rapportons ╵en risquant notre vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en affrontant l’épée ╵des brigands du désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Des bandes de pillards vivant dans le désert profitent de l’absence de forces de l’ordre pour se livrer à des razzias.
      marker-yv: yv-n
    - type: text
      text: .
