document_id: LAM.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Cinquième élégie : prière'
  - type: heading
    content: Souviens-toi, Eternel !
  - type: text
    content: Considère, Eternel, ╵tout ce qui nous est arrivé !
  - type: text
    content: Regarde et vois ╵l’opprobre que nous subissons !
  '10':
  - type: text
    content: Notre peau est brûlante ╵comme si on l’avait ╵passée dans la fournaise,
  - type: text
    content: tant la faim nous consume.
  '11':
  - type: text
    content: Ils ont déshonoré ╵des femmes dans Sion,
  - type: text
    content: des jeunes filles dans les villes ╵du pays de Juda.
  '12':
  - type: text
    content: Ils ont pendu de leurs mains des ministres
  - type: text
    content: et ils n’ont eu aucun égard ╵pour les responsables du peuple
  - type: note
    content: 'les responsables du peuple: voir 4.16 et note.'
  - type: text
    content: .
  '13':
  - type: text
    content: Des jeunes gens ╵portent la meule,
  - type: text
    content: et des enfants trébuchent ╵sous les fardeaux de bois
  - type: note
    content: Deux tâches imposées aux prisonniers de guerre, trop dures pour les enfants et les jeunes (voir Ex 11.5 ; Jg 16.21).
  - type: text
    content: .
  '14':
  - type: text
    content: Les responsables ont cessé ╵de siéger à la porte
  - type: note
    content: Le lieu habituel des réunions et des délibérations (Ps 9.14-15 ; Jb 5.4).
  - type: text
    content: et les adolescents ╵ont délaissé leurs chants.
  '15':
  - type: text
    content: La joie a disparu ╵de notre cœur,
  - type: text
    content: le deuil a remplacé nos danses.
  '16':
  - type: text
    content: La couronne est tombée ╵de notre tête.
  - type: text
    content: Malheur à nous, ╵car nous avons péché.
  '17':
  - type: text
    content: Oui, si notre cœur souffre,
  - type: text
    content: si nos yeux sont plongés ╵dans les ténèbres,
  '18':
  - type: text
    content: c’est que le mont Sion ╵a été dévasté
  - type: text
    content: et les renards y rôdent.
  - type: heading
    content: Fais-nous revenir à toi !
  '19':
  - type: text
    content: Toi, Eternel, ╵tu règnes pour toujours
  - type: text
    content: et ton trône subsiste ╵à travers tous les âges.
  '2':
  - type: text
    content: Notre patrimoine est passé ╵aux mains des étrangers,
  - type: text
    content: et nos habitations à d’autres.
  '20':
  - type: text
    content: Pourquoi nous oublierais-tu pour toujours ?
  - type: text
    content: Pourquoi nous délaisserais-tu ╵aussi longtemps ?
  '21':
  - type: text
    content: Ah ! fais-nous revenir à toi, ╵ô Eternel !
  - type: text
    content: Ainsi nous reviendrons à toi.
  - type: text
    content: Renouvelle pour nous ╵les jours des anciens temps
  - type: note
    content: Voir Jr 31.18.
  - type: text
    content: '  !'
  '22':
  - type: text
    content: Nous rejetterais-tu ╵définitivement ?
  - type: text
    content: Serais-tu irrité ╵contre nous à l’excès
  - type: note
    content: 'Autre traduction : tu es irrité contre nous à l’excès !'
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: Nous sommes devenus ╵des orphelins de père,
  - type: text
    content: nos mères sont comme des veuves.
  '4':
  - type: text
    content: Nous devons payer même ╵pour l’eau que nous buvons.
  - type: text
    content: Nous rentrons notre bois ╵à prix d’argent.
  '5':
  - type: text
    content: Nous sommes pourchassés ╵par nos persécuteurs ╵qui sont sur notre dos,
  - type: text
    content: nous sommes épuisés. ╵Pas de répit pour nous !
  '6':
  - type: text
    content: Nous tendons les mains vers l’Egypte,
  - type: text
    content: vers l’Assyrie, ╵pour avoir à manger.
  '7':
  - type: text
    content: Or, nos ancêtres ont péché, ╵mais ils ont disparu,
  - type: text
    content: et c’est nous qui portons ╵la peine de leurs fautes.
  '8':
  - type: text
    content: Nous sommes dominés ╵par des esclaves
  - type: text
    content: et il n’y a personne ╵pour nous en délivrer.
  '9':
  - type: text
    content: Notre pain, nous le rapportons ╵en risquant notre vie,
  - type: text
    content: en affrontant l’épée ╵des brigands du désert
  - type: note
    content: Des bandes de pillards vivant dans le désert profitent de l’absence de forces de l’ordre pour se livrer à des razzias.
  - type: text
    content: .
