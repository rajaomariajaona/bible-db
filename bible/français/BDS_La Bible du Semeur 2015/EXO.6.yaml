document_id: EXO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu annonce son intervention
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Moïse : Maintenant, tu vas voir ce que je vais faire au pharaon. Sous l’emprise d’une main puissante, non seulement il laissera partir le peuple, mais il le chassera lui-même de son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis Dieu ajouta : Je suis l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je me suis révélé à Abraham, à Isaac et à Jacob comme le Dieu tout-puissant, mais je n’ai pas été connu par eux sous mon nom : l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3.14-15
        metadata:
          usfm: EXO.3.14+EXO.3.15
      - type: text
        text: ' et notes. Le nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eternel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est proche du verbe hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'serai, suis. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me suis engagé par mon alliance avec eux à leur donner le pays de Canaan, ce pays où ils étaient étrangers et où ils ont mené une vie errante. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De plus, j’ai entendu les gémissements des Israélites réduits à l’esclavage par les Egyptiens, et je me suis souvenu de mon alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi dis-leur de ma part : « Je suis l’Eternel ! Je vous soustrairai aux corvées auxquelles les Egyptiens vous soumettent : je vous libérerai de l’esclavage qu’ils vous imposent, et je vous délivrerai par la force de mon bras et en exerçant de terribles jugements. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je vous prendrai pour mon peuple, et je serai votre Dieu. Ainsi vous saurez que je suis l’Eternel votre Dieu qui vous affranchis des corvées que les Egyptiens vous imposent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Puis je vous ferai entrer dans le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob ; je vous le donnerai pour qu’il vous appartienne, moi, l’Eternel. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moïse répéta ces paroles aux Israélites, mais ils ne l’écoutèrent pas parce qu’ils étaient démoralisés, à cause de leur dur esclavage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Eternel parla à Moïse et lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Va demander au pharaon, roi d’Egypte, de laisser partir les Israélites de son pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais Moïse lui répondit : Même les Israélites ne m’ont pas écouté. Comment le pharaon m’écouterait-il, moi qui n’ai pas la parole facile ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Eternel parla à Moïse et à Aaron et leur ordonna d’aller trouver les Israélites et le pharaon, roi d’Egypte, pour faire sortir les Israélites d’Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les généalogies des tribus de Ruben, Siméon et Lévi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici les noms des chefs des groupes familiaux israélites : Fils de Ruben, premier-né d’Israël : Hénok, Pallou, Hetsrôn et Karmi. Telles sont les familles de la tribu de Ruben'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans cette généalogie, seuls les trois premiers fils de Jacob sont mentionnés puisque Moïse et Aaron faisaient partie du troisième groupe familial.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les fils de Siméon furent : Yemouel, Yamîn, Ohad, Yakîn, Tsohar et Saül, fils de la Cananéenne. Telles sont les familles de la tribu de Siméon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Voici les noms des fils de Lévi – qui vécut cent trente-sept ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprend la liste de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 46.8-11
        metadata:
          usfm: GEN.46.8+GEN.46.9+GEN.46.10+GEN.46.11
      - type: text
        text: . Pour les v. 16-19, voir Nb 3.17-20 ; 26.57-58 ; 1 Ch 6.1-4.
    marker-yv: yv-n
  - type: text
    text: ' – et de leur lignée : Guershôn, Qehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils de Guershôn : Libni et Shimeï, ancêtres de leurs familles. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fils de Qehath, qui vécut cent trente-trois ans : Amram, Yitsehar, Hébron et Ouzziel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de Merari : Mahli et Moushi. Telles sont les familles de la tribu de Lévi, selon leurs lignées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amram prit pour femme Yokébed, sa tante, et elle lui donna Aaron et Moïse. Amram vécut cent trente-sept ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils de Yitsehar : Qoré, Népheg et Zikri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fils d’Ouzziel : Mishaël, Eltsaphân et Sitri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aaron prit pour femme Elishéba, fille d’Amminadab et sœur de Nahshôn, et elle lui donna Nadab, Abihou, Eléazar et Itamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Qoré : Assir, Elqana, Abiasaph. Telles sont les familles des Qoréites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eléazar, fils d’Aaron, prit pour femme une des filles de Poutiel qui lui donna Phinéas. Tels sont les chefs des groupes familiaux des lévites selon leurs différentes familles. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est à Aaron et à Moïse dont il vient d’être question que l’Eternel ordonna : « Faites sortir d’Egypte les Israélites, comme une armée en bon ordre. » '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ce sont eux qui allèrent trouver le pharaon, roi d’Egypte, pour faire sortir les Israélites de son pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici ce qui arriva le jour où l’Eternel s’adressa à Moïse en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'L’Eternel dit à Moïse : Je suis l’Eternel. Répète au pharaon, roi d’Egypte, tout ce que je te dis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Moïse répondit à l’Eternel : Je n’ai pas la parole facile, comment le pharaon consentira-t-il à m’écouter ?'
