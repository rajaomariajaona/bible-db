document_id: EXO.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu annonce son intervention
  - type: text
    content: 'L’Eternel dit à Moïse : Maintenant, tu vas voir ce que je vais faire au pharaon. Sous l’emprise d’une main puissante, non seulement il laissera partir le peuple, mais il le chassera lui-même de son pays. '
  '10':
  - type: text
    content: 'L’Eternel parla à Moïse et lui dit : '
  '11':
  - type: text
    content: Va demander au pharaon, roi d’Egypte, de laisser partir les Israélites de son pays.
  '12':
  - type: text
    content: 'Mais Moïse lui répondit : Même les Israélites ne m’ont pas écouté. Comment le pharaon m’écouterait-il, moi qui n’ai pas la parole facile ?'
  '13':
  - type: text
    content: L’Eternel parla à Moïse et à Aaron et leur ordonna d’aller trouver les Israélites et le pharaon, roi d’Egypte, pour faire sortir les Israélites d’Egypte.
  - type: heading
    content: Les généalogies des tribus de Ruben, Siméon et Lévi
  '14':
  - type: text
    content: 'Voici les noms des chefs des groupes familiaux israélites : Fils de Ruben, premier-né d’Israël : Hénok, Pallou, Hetsrôn et Karmi. Telles sont les familles de la tribu de Ruben'
  - type: note
    content: Dans cette généalogie, seuls les trois premiers fils de Jacob sont mentionnés puisque Moïse et Aaron faisaient partie du troisième groupe familial.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Les fils de Siméon furent : Yemouel, Yamîn, Ohad, Yakîn, Tsohar et Saül, fils de la Cananéenne. Telles sont les familles de la tribu de Siméon.'
  '16':
  - type: text
    content: Voici les noms des fils de Lévi – qui vécut cent trente-sept ans
  - type: note
    content: Reprend la liste de Gn 46.8-11. Pour les v. 16-19, voir Nb 3.17-20 ; 26.57-58 ; 1 Ch 6.1-4.
  - type: text
    content: ' – et de leur lignée : Guershôn, Qehath et Merari. '
  '17':
  - type: text
    content: 'Fils de Guershôn : Libni et Shimeï, ancêtres de leurs familles. '
  '18':
  - type: text
    content: 'Fils de Qehath, qui vécut cent trente-trois ans : Amram, Yitsehar, Hébron et Ouzziel. '
  '19':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi. Telles sont les familles de la tribu de Lévi, selon leurs lignées.'
  '2':
  - type: text
    content: 'Puis Dieu ajouta : Je suis l’Eternel. '
  '20':
  - type: text
    content: Amram prit pour femme Yokébed, sa tante, et elle lui donna Aaron et Moïse. Amram vécut cent trente-sept ans.
  '21':
  - type: text
    content: 'Fils de Yitsehar : Qoré, Népheg et Zikri.'
  '22':
  - type: text
    content: 'Fils d’Ouzziel : Mishaël, Eltsaphân et Sitri.'
  '23':
  - type: text
    content: Aaron prit pour femme Elishéba, fille d’Amminadab et sœur de Nahshôn, et elle lui donna Nadab, Abihou, Eléazar et Itamar.
  '24':
  - type: text
    content: 'Fils de Qoré : Assir, Elqana, Abiasaph. Telles sont les familles des Qoréites.'
  '25':
  - type: text
    content: 'Eléazar, fils d’Aaron, prit pour femme une des filles de Poutiel qui lui donna Phinéas. Tels sont les chefs des groupes familiaux des lévites selon leurs différentes familles. '
  '26':
  - type: text
    content: 'C’est à Aaron et à Moïse dont il vient d’être question que l’Eternel ordonna : « Faites sortir d’Egypte les Israélites, comme une armée en bon ordre. » '
  '27':
  - type: text
    content: Ce sont eux qui allèrent trouver le pharaon, roi d’Egypte, pour faire sortir les Israélites de son pays.
  '28':
  - type: text
    content: 'Voici ce qui arriva le jour où l’Eternel s’adressa à Moïse en Egypte. '
  '29':
  - type: text
    content: 'L’Eternel dit à Moïse : Je suis l’Eternel. Répète au pharaon, roi d’Egypte, tout ce que je te dis.'
  '3':
  - type: text
    content: 'Je me suis révélé à Abraham, à Isaac et à Jacob comme le Dieu tout-puissant, mais je n’ai pas été connu par eux sous mon nom : l’Eternel'
  - type: note
    content: Voir 3.14-15 et notes. Le nom Eternel est proche du verbe hébreu serai, suis. Voir v. 7.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Mais Moïse répondit à l’Eternel : Je n’ai pas la parole facile, comment le pharaon consentira-t-il à m’écouter ?'
  '4':
  - type: text
    content: 'Je me suis engagé par mon alliance avec eux à leur donner le pays de Canaan, ce pays où ils étaient étrangers et où ils ont mené une vie errante. '
  '5':
  - type: text
    content: 'De plus, j’ai entendu les gémissements des Israélites réduits à l’esclavage par les Egyptiens, et je me suis souvenu de mon alliance. '
  '6':
  - type: text
    content: 'C’est pourquoi dis-leur de ma part : « Je suis l’Eternel ! Je vous soustrairai aux corvées auxquelles les Egyptiens vous soumettent : je vous libérerai de l’esclavage qu’ils vous imposent, et je vous délivrerai par la force de mon bras et en exerçant de terribles jugements. '
  '7':
  - type: text
    content: 'Je vous prendrai pour mon peuple, et je serai votre Dieu. Ainsi vous saurez que je suis l’Eternel votre Dieu qui vous affranchis des corvées que les Egyptiens vous imposent. '
  '8':
  - type: text
    content: Puis je vous ferai entrer dans le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob ; je vous le donnerai pour qu’il vous appartienne, moi, l’Eternel. »
  '9':
  - type: text
    content: Moïse répéta ces paroles aux Israélites, mais ils ne l’écoutèrent pas parce qu’ils étaient démoralisés, à cause de leur dur esclavage.
