document_id: JOS.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bataille de Gabaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Adoni-Tsédeq, roi de Jérusalem, apprit que Josué s’était emparé d’Aï et l’avait totalement détruite pour la vouer à l’Eternel, en faisant subir à cette ville et à son roi le même sort qu’à Jéricho et à son roi. Il entendit également que les habitants de Gabaon avaient fait la paix avec les Israélites et qu’ils vivaient au milieu d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors il fut saisi d’une grande peur, car Gabaon était une ville importante, comme les villes royales, plus grande qu’Aï, et tous ses hommes étaient des guerriers. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi Adoni-Tsédeq, roi de Jérusalem, envoya des messagers à Hoham, roi d’Hébron, à Piream, roi de Yarmouth, à Yaphia, roi de Lakish et à Debir, roi de Eglôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Toutes ces villes se situaient à quelques kilomètres les unes des autres. Elles constituaient les cinq villes les plus importantes de la région montagneuse du sud du pays.
    marker-yv: yv-n
  - type: text
    text: ', pour leur faire dire : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Venez me prêter main-forte pour attaquer Gabaon, puisque ses habitants ont conclu la paix avec Josué et les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est ainsi que cinq rois des Amoréens, ceux de Jérusalem, d’Hébron, de Yarmouth, de Lakish et de Eglôn formèrent une coalition et marchèrent à la tête de toutes leurs armées contre Gabaon. Ils établirent leur camp devant la ville et engagèrent les hostilités.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les habitants de Gabaon envoyèrent des messagers à Josué au camp de Guilgal pour lui faire dire : N’abandonne pas tes serviteurs. Viens vite à notre secours, sauve-nous, car tous les rois amoréens de la région montagneuse se sont ligués contre nous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’alliance conclue avec Josué (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9.11-15
        metadata:
          usfm: JOS.9.11+JOS.9.12+JOS.9.13+JOS.9.14+JOS.9.15
      - type: text
        text: ) impliquait l’assistance militaire de la nation suzeraine à ses vassaux si ceux-ci étaient attaqués.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Josué vint depuis Guilgal avec toute son armée et ses plus valeureux guerriers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Eternel dit à Josué : N’aie pas peur de ces rois, car je te donne la victoire sur eux ; aucun d’eux ne pourra te résister.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après avoir marché toute la nuit depuis Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parcourant une trentaine de kilomètres pendant la nuit.
    marker-yv: yv-n
  - type: text
    text: ', Josué tomba sur eux à l’improviste. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’Eternel les mit en déroute devant Israël et leur fit essuyer une grande défaite devant Gabaon ; les Israélites les battirent en les poursuivant sur la montée de Beth-Horôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De Gabaon à Beth-Horôn vers le village de Beth-Horôn-la-Haute, le chemin monte pendant deux heures, puis il descend par un sentier abrupt et rocailleux du col de Beth-Horôn-la-Basse. C’est sur ce sentier que Josué poursuivit les fuyards pendant que les grêlons pleuvaient sur eux.
    marker-yv: yv-n
  - type: text
    text: ' et jusqu’à Azéqa et Maqqéda. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pendant que les Amoréens s’enfuyaient devant Israël sur la pente qui descend de Beth-Horôn, l’Eternel fit tomber sur eux du ciel d’énormes grêlons qui, jusqu’à Azéqa, firent encore plus de victimes que les épées des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce jour-là où l’Eternel donna aux Israélites la victoire sur les Amoréens, Josué s’écria devant tout Israël : Soleil, arrête-toi sur Gabaon ! Et toi, lune, fais halte sur la vallée d’Ayalôn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et le soleil s’arrêta, la lune suspendit son cours jusqu’à ce que le peuple d’Israël eût réglé ses comptes avec ses ennemis. C’est bien ce qui est écrit dans le livre du Juste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 1.18
        metadata:
          usfm: 2SA.1.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Le soleil s’immobilisa au milieu du ciel et différa son coucher pendant environ un jour entier. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jamais auparavant et jamais depuis lors, il n’y eut de jour comparable à celui-là, où l’Eternel a écouté la voix d’un homme. C’est qu’il combattait lui-même pour Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Après cela, Josué et toute l’armée d’Israël regagnèrent le camp de Guilgal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La capture et l’exécution des rois vaincus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or, pendant la bataille, les cinq rois avaient réussi à s’enfuir et ils s’étaient cachés dans la grotte de Maqqéda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On les découvrit cachés dans cette grotte et on vint en informer Josué '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'qui donna l’ordre suivant : Roulez de grandes pierres à l’entrée de la grotte et postez-y des hommes pour monter la garde, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais ne vous y attardez pas : poursuivez vos ennemis et coupez-leur la retraite ! Ne les laissez pas rentrer dans leurs villes puisque l’Eternel votre Dieu les livre en votre pouvoir !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Josué et les Israélites leur infligèrent une cuisante défaite et achevèrent de les exterminer tous, à part quelques rescapés qui purent regagner leurs villes fortifiées. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Puis tout le peuple revint sain et sauf auprès de Josué au camp établi à Maqqéda. Après cela, plus personne dans le pays n’osa parler contre les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué ordonna de dégager l’entrée de la grotte et d’en faire sortir les cinq rois pour les lui amener. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On fit ainsi et on lui amena les cinq rois qui se trouvaient dans la caverne, les rois de Jérusalem, d’Hébron, de Yarmouth, de Lakish et de Eglôn. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pendant qu’on les faisait sortir pour les lui amener, Josué convoqua tous les hommes d’Israël et dit aux chefs des soldats qui avaient combattu avec lui : Approchez-vous et posez vos pieds sur la nuque de ces rois.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les chefs s’avancèrent et firent ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Josué reprit : N’ayez pas peur, ne vous laissez pas effrayer ! Prenez courage et tenez bon ! Car c’est ainsi que l’Eternel traitera tous vos ennemis contre lesquels vous combattrez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après cela, Josué les mit à mort et les fit pendre à cinq arbres. Ils y restèrent pendus jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Au moment du coucher du soleil, il ordonna de descendre leurs corps et de les jeter dans la grotte où les rois s’étaient cachés. Ensuite, on en boucha l’entrée avec de grandes pierres qui s’y trouvent encore aujourd’hui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 21.22-23
        metadata:
          usfm: DEU.21.22+DEU.21.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La conquête de la partie sud du pays
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le même jour, Josué s’empara de Maqqéda, il la frappa du tranchant de l’épée, il exécuta son roi et extermina tous les êtres vivants qui s’y trouvaient sans laisser aucun survivant pour les vouer à l’Eternel. Il traita le roi de Maqqéda comme il avait traité celui de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'De Maqqéda, Josué et tout Israël avec lui passèrent à Libna qu’ils attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: L’Eternel la livra aussi, elle et son roi, au pouvoir des Israélites, ils tuèrent tous les êtres vivants qui s’y trouvaient sans laisser aucun survivant. Josué traita son roi comme il avait traité celui de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'De Libna, Josué et tout Israël avec lui passèrent à Lakish. Ils établirent leur camp devant la ville et l’attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L’Eternel la livra en leur pouvoir et ils s’en emparèrent le second jour ; ils la frappèrent du tranchant de l’épée et tuèrent tous les êtres vivants qui s’y trouvaient comme ils l’avaient fait à Libna. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Horam, le roi de Guézer, vint au secours de Lakish, mais Josué le battit, lui et son armée, sans lui laisser aucun survivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'De Lakish, Josué et tout Israël avec lui se dirigèrent vers Eglôn, ils établirent leur camp devant la ville et l’attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils s’en emparèrent le même jour et la frappèrent du tranchant de l’épée, ils exécutèrent tous les êtres vivants qui s’y trouvaient pour les vouer à l’Eternel, comme ils l’avaient fait à Lakish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: De Eglôn, Josué et tout Israël avec lui se rendirent à Hébron et l’attaquèrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Située dans la vallée et occupée par des Hittites (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.4'
        metadata:
          usfm: JOS.1.4
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils s’en emparèrent et tuèrent son roi, et tous les êtres vivants qui s’y trouvaient ainsi que dans les villes qui en dépendaient. Il n’y resta aucun survivant, comme ils l’avaient fait à Eglôn. Josué détruisit la ville et extermina tous les êtres vivants qui s’y trouvaient pour les vouer à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Après cela, Josué et tout Israël avec lui revinrent sur Debir et l’attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ils s’emparèrent de la ville, capturèrent son roi et prirent toutes les villes qui en dépendaient. Ils exterminèrent tous les êtres vivants qui s’y trouvaient pour les vouer à l’Eternel et n’y laissèrent aucun survivant, comme à Hébron. Josué traita Debir et son roi comme il avait traité Libna et son roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Josué conquit tout le pays, il battit tous les rois de la région montagneuse, ceux du Néguev, de la plaine côtière et des contreforts des montagnes. Il extermina tous les êtres vivants sans épargner personne, pour les vouer à l’Eternel, comme l’Eternel, le Dieu d’Israël, l’avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Il soumit toute la région de Qadesh-Barnéa jusqu’à Gaza, et le district de Goshen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville de la montagne (11.16 ; 15.51), à ne pas confondre avec la région égyptienne du delta du Nil (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 45.10
        metadata:
          usfm: GEN.45.10
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à Gabaon. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'En une seule campagne, il vainquit tous les rois et s’empara de leurs territoires, car l’Eternel, le Dieu d’Israël, combattait pour son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ensuite, Josué et tout Israël avec lui regagnèrent le camp de Guilgal.
