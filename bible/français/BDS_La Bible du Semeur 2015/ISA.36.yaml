document_id: ISA.36
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Intermède historique
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion de Sennachérib
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Provocation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 R 18.13, 17-37 ; 2 Ch 32.9-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La quatorzième année du règne d’Ezéchias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire en 701 av. J.-C. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sennachérib, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fils de Sargon II, régna de 704 à 681 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', Sennachérib, roi d’Assyrie, vint attaquer toutes les villes fortifiées de Juda et s’en empara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le roi d’Assyrie envoya de Lakish
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Entre Jérusalem et Gaza, à environ 35 kilomètres au sud-ouest de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' à Jérusalem vers le roi Ezéchias, son aide de camp, accompagné d’une puissante armée. Il prit position près de l’aqueduc du réservoir supérieur, sur la route du champ du Teinturier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aqueduc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sans doute le canal souterrain qu’Ezéchias a fait creuser (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20.20
        metadata:
          usfm: 2KI.20.20
      - type: text
        text: ) pour amener l’eau de la source du Guihôn (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1.33
        metadata:
          usfm: 1KI.1.33
      - type: text
        text: ') au réservoir de Siloé, au sud-est de la ville. Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'champ du Teinturier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: devait se trouver près d’Eyn-Roguel, au sud de Jérusalem (voir 2 S 17.17 ; 1 R 1.9 ; Es 7.3).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Eliaqim, fils de Hilqiya, qui avait la charge du palais royal, Shebna le secrétaire du roi et Yoah, fils d’Asaph l’archiviste, sortirent de la ville à sa rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’aide de camp du roi d’Assyrie leur dit : Veuillez transmettre ce message à Ezéchias : « Voici ce que déclare le grand roi, le roi d’Assyrie : En quoi mets-tu ta confiance ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: T’imaginerais-tu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après plusieurs manuscrits hébreux, le texte hébreu de Qumrân et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 18.20
        metadata:
          usfm: 2KI.18.20
      - type: text
        text: '. La plupart des manuscrits du texte hébreu traditionnel ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je dis.
    marker-yv: yv-n
  - type: text
    text: ' que de simples paroles peuvent tenir lieu de stratégie et de puissance militaire ? Sur qui comptes-tu donc pour t’être révolté contre moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu t’appuies sur l’Egypte, ce roseau cassé qui blesse et qui transperce la main de celui qui s’appuie dessus. Oui, c’est bien là ce qu’est le pharaon, le roi d’Egypte, pour tous ceux qui se confient en lui ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Peut-être me diras-tu : “C’est en l’Eternel, notre Dieu, que nous nous confions.” Mais n’est-ce pas précisément ce Dieu dont Ezéchias a fait disparaître les hauts lieux et les autels, en disant aux habitants de Juda et de Jérusalem de rendre leur culte uniquement devant cet autel-ci ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je te lance aujourd’hui un défi au nom de mon souverain, le roi d’Assyrie : Je te donnerai deux mille chevaux, si toi tu es capable de fournir autant d’hommes pour les monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Comment t’y prendrais-tu pour repousser un seul de nos capitaines, même si c’était le moindre des serviteurs de mon maître ? Comptes-tu sur l’Egypte pour te fournir des chars avec leur équipage ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'D’ailleurs crois-tu que c’est sans l’assentiment de l’Eternel que je suis venu attaquer ce pays pour le détruire ? C’est l’Eternel qui m’a dit : “Va dans ce pays et détruis-le'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 7.20 ; 10.5-6.
    marker-yv: yv-n
  - type: text
    text: '  !” »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Eliaqim, Shebna et Yoah dirent à l’aide de camp assyrien : Voudrais-tu, s’il te plaît, parler à tes serviteurs en langue araméenne'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Langue diplomatique de l’époque que parlaient les hauts fonctionnaires. Elle deviendra la langue commune des Juifs à partir du '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: v
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: ', car nous la comprenons. Ne nous parle pas en hébreu, alors que les gens sont là, sur les remparts, à écouter !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais l’aide de camp répliqua : Crois-tu que c’est à ton souverain et à toi seulement que mon souverain m’a chargé d’adresser ce message ? Crois-tu que ce n’est pas aussi à ces gens assis sur les remparts, qui seront bientôt réduits avec vous à manger leurs excréments et à boire leur urine ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis l’aide de camp se campa là et se mit à crier d’une voix forte, en hébreu : Ecoutez ce que dit le grand roi, le roi d’Assyrie : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '« Ainsi parle le roi : Ne vous laissez pas tromper par Ezéchias. Car il ne peut pas vous délivrer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ne vous laissez pas persuader par Ezéchias de vous confier en l’Eternel, s’il vous dit : “Sûrement, l’Eternel nous délivrera, cette ville ne tombera pas aux mains du roi d’Assyrie.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'N’écoutez pas Ezéchias ; car voici ce que vous propose le roi d’Assyrie : Faites la paix avec moi, rendez-vous à moi ! Alors chacun de vous mangera les fruits de sa vigne et de son figuier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression commune caractérisant la vie paisible et prospère (1 R 5.5 ; Os 2.14 ; Mi 4.4 ; Za 3.10).
    marker-yv: yv-n
  - type: text
    text: ', et chacun boira de l’eau de son puits, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'en attendant que je vienne vous emmener dans un pays pareil au vôtre, un pays où il y a du blé et du vin, du pain et des vignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ne laissez pas Ezéchias vous tromper en disant : “L’Eternel nous délivrera.” Les dieux des autres peuples ont-ils délivré leur pays du roi d’Assyrie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Où sont les dieux de Hamath et d’Arpad ? Où sont les dieux de Sepharvaïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Villes de Syrie.
    marker-yv: yv-n
  - type: text
    text: '  ? Ont-ils délivré Samarie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: De tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays, pour que l’Eternel délivre Jérusalem ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils gardèrent le silence, et ne lui répondirent pas un mot, car le roi avait donné cet ordre : « Vous ne lui répondrez pas. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors Eliaqim, fils de Hilqiya, qui avait la charge du palais, Shebna le secrétaire, et Yoah, fils d’Asaph l’archiviste, retournèrent auprès d’Ezéchias, les vêtements déchirés, et lui rapportèrent les paroles de l’aide de camp.
