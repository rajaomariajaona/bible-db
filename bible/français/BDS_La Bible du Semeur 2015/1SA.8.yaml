document_id: 1SA.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites demandent un roi
  - type: text
    content: 'Samuel, devenu vieux, confia à ses fils l’administration de la justice en Israël. '
  '10':
  - type: text
    content: 'Samuel rapporta au peuple qui lui demandait un roi toutes les paroles de l’Eternel. '
  '11':
  - type: text
    content: 'Il leur dit : Voilà quels seront les droits du roi qui régnera sur vous. Il prendra vos fils pour en faire ses soldats et les affectera au service de ses chars de guerre et de ses chevaux, et ils auront à courir devant son char personnel'
  - type: note
    content: Les chars royaux étaient précédés de coureurs (2 S 15.1 ; 1 R 1.5).
  - type: text
    content: '. '
  '12':
  - type: text
    content: Il choisira certains parmi eux pour en faire des officiers commandant de « milliers » et de « cinquantaines
  - type: note
    content: Il s’agit peut-être là de régiments et de compagnies de soldats comportant respectivement quelques centaines et quelques dizaines d’hommes.
  - type: text
    content: '  ». Il en prendra d’autres pour labourer ses champs et récolter ses moissons, ou pour fabriquer ses armes et l’équipement de ses chars. '
  '13':
  - type: text
    content: 'Il prendra vos filles comme parfumeuses, cuisinières et boulangères. '
  '14':
  - type: text
    content: 'Il prendra vos champs, vos vignes et vos meilleurs oliviers pour les donner à ses hauts fonctionnaires. '
  '15':
  - type: text
    content: 'Il prélèvera une redevance de dix pour cent sur les produits de vos champs et de vos vignes et il la distribuera à ses courtisans et à ses hauts fonctionnaires. '
  '16':
  - type: text
    content: Il prendra vos serviteurs, vos servantes et vos jeunes gens
  - type: note
    content: 'Au lieu de : vos jeunes gens, l’ancienne version grecque a : votre bétail.'
  - type: text
    content: ' vigoureux, et même vos ânes, et il s’en servira pour ses propres travaux. '
  '17':
  - type: text
    content: 'Il prélèvera une bête sur dix dans vos troupeaux et vous deviendrez ses serviteurs. '
  '18':
  - type: text
    content: Ce jour-là, vous vous lamenterez à cause du roi que vous aurez choisi, mais l’Eternel ne vous écoutera pas.
  '19':
  - type: text
    content: 'Le peuple refusa de tenir compte des avertissements de Samuel. Les Israélites insistèrent en déclarant : Qu’importe ! Nous voulons quand même un roi. '
  '2':
  - type: text
    content: L’aîné s’appelait Joël et le cadet Abiya. Ils s’établirent à Beer-Sheva
  - type: note
    content: 'A 70 kilomètres au sud-ouest de Jérusalem, donc loin de la région où Samuel rendait la justice : c’est donc pour compléter son action que Samuel institua ses fils, non pour qu’ils le remplacent ou prennent sa succession.'
  - type: text
    content: ' pour y rendre la justice. '
  '20':
  - type: text
    content: Nous voulons, nous aussi, être dirigés comme tous les autres peuples. Notre roi rendra la justice parmi nous et prendra notre commandement pour nous mener au combat.
  '21':
  - type: text
    content: 'Samuel écouta tout ce que disait le peuple et le rapporta à l’Eternel. '
  '22':
  - type: text
    content: 'L’Eternel lui répondit : Accorde-leur ce qu’ils te demandent et établis un roi sur eux !'
  - type: text
    content: 'Puis Samuel dit aux gens d’Israël : Que chacun retourne dans sa ville !'
  '3':
  - type: text
    content: 'Mais ils ne suivaient pas les traces de leur père : comme ils étaient corrompus par l’amour de l’argent, ils acceptaient des pots-de-vin et faussaient le droit. '
  '4':
  - type: text
    content: 'C’est pourquoi tous les responsables d’Israël se réunirent auprès de Samuel à Rama. '
  '5':
  - type: text
    content: 'Ils lui déclarèrent : Te voilà devenu âgé, et tes fils ne suivent pas tes traces ; maintenant, établis sur nous un roi pour qu’il nous dirige'
  - type: note
    content: 'Autre traduction : pour qu’il rende la justice pour nous (de même aux v. 6 et 20).'
  - type: text
    content: ' comme cela se fait chez tous les autres peuples'
  - type: note
    content: Voir Dt 17.14.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Cette demande d’établir sur eux un roi pour les diriger déplut à Samuel et il pria l’Eternel. '
  '7':
  - type: text
    content: 'L’Eternel lui répondit : Ecoute ce peuple et accepte toutes leurs demandes. En effet, ce n’est pas toi qu’ils rejettent, c’est moi : ils ne veulent plus que je règne sur eux. '
  '8':
  - type: text
    content: 'Ils agissent à ton égard comme ils n’ont cessé d’agir envers moi depuis le jour où je les ai fait sortir d’Egypte jusqu’à aujourd’hui : ils m’ont abandonné pour rendre un culte à d’autres dieux. '
  '9':
  - type: text
    content: Maintenant, fais donc ce qu’ils te demandent, mais avertis-les bien en leur faisant connaître les droits du roi qui régnera sur eux.
  - type: heading
    content: Les droits du roi
