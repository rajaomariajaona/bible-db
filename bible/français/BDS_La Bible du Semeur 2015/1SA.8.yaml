document_id: 1SA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Israélites demandent un roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Samuel, devenu vieux, confia à ses fils l’administration de la justice en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’aîné s’appelait Joël et le cadet Abiya. Ils s’établirent à Beer-Sheva
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A 70 kilomètres au sud-ouest de Jérusalem, donc loin de la région où Samuel rendait la justice : c’est donc pour compléter son action que Samuel institua ses fils, non pour qu’ils le remplacent ou prennent sa succession.'
    marker-yv: yv-n
  - type: text
    text: ' pour y rendre la justice. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais ils ne suivaient pas les traces de leur père : comme ils étaient corrompus par l’amour de l’argent, ils acceptaient des pots-de-vin et faussaient le droit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est pourquoi tous les responsables d’Israël se réunirent auprès de Samuel à Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils lui déclarèrent : Te voilà devenu âgé, et tes fils ne suivent pas tes traces ; maintenant, établis sur nous un roi pour qu’il nous dirige'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour qu’il rende la justice pour nous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de même aux v. 6 et 20).
    marker-yv: yv-n
  - type: text
    text: ' comme cela se fait chez tous les autres peuples'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 17.14
        metadata:
          usfm: DEU.17.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cette demande d’établir sur eux un roi pour les diriger déplut à Samuel et il pria l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel lui répondit : Ecoute ce peuple et accepte toutes leurs demandes. En effet, ce n’est pas toi qu’ils rejettent, c’est moi : ils ne veulent plus que je règne sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils agissent à ton égard comme ils n’ont cessé d’agir envers moi depuis le jour où je les ai fait sortir d’Egypte jusqu’à aujourd’hui : ils m’ont abandonné pour rendre un culte à d’autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maintenant, fais donc ce qu’ils te demandent, mais avertis-les bien en leur faisant connaître les droits du roi qui régnera sur eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les droits du roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Samuel rapporta au peuple qui lui demandait un roi toutes les paroles de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur dit : Voilà quels seront les droits du roi qui régnera sur vous. Il prendra vos fils pour en faire ses soldats et les affectera au service de ses chars de guerre et de ses chevaux, et ils auront à courir devant son char personnel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les chars royaux étaient précédés de coureurs (2 S 15.1 ; 1 R 1.5).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il choisira certains parmi eux pour en faire des officiers commandant de « milliers » et de « cinquantaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit peut-être là de régiments et de compagnies de soldats comportant respectivement quelques centaines et quelques dizaines d’hommes.
    marker-yv: yv-n
  - type: text
    text: '  ». Il en prendra d’autres pour labourer ses champs et récolter ses moissons, ou pour fabriquer ses armes et l’équipement de ses chars. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il prendra vos filles comme parfumeuses, cuisinières et boulangères. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il prendra vos champs, vos vignes et vos meilleurs oliviers pour les donner à ses hauts fonctionnaires. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il prélèvera une redevance de dix pour cent sur les produits de vos champs et de vos vignes et il la distribuera à ses courtisans et à ses hauts fonctionnaires. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il prendra vos serviteurs, vos servantes et vos jeunes gens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vos jeunes gens, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'l’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: votre bétail.
    marker-yv: yv-n
  - type: text
    text: ' vigoureux, et même vos ânes, et il s’en servira pour ses propres travaux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il prélèvera une bête sur dix dans vos troupeaux et vous deviendrez ses serviteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ce jour-là, vous vous lamenterez à cause du roi que vous aurez choisi, mais l’Eternel ne vous écoutera pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le peuple refusa de tenir compte des avertissements de Samuel. Les Israélites insistèrent en déclarant : Qu’importe ! Nous voulons quand même un roi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nous voulons, nous aussi, être dirigés comme tous les autres peuples. Notre roi rendra la justice parmi nous et prendra notre commandement pour nous mener au combat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Samuel écouta tout ce que disait le peuple et le rapporta à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Eternel lui répondit : Accorde-leur ce qu’ils te demandent et établis un roi sur eux !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis Samuel dit aux gens d’Israël : Que chacun retourne dans sa ville !'
