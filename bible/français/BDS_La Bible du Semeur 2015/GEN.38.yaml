document_id: GEN.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tamar donne une descendance à Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A la même époque, Juda se sépara de ses frères et alla vivre près d’un habitant d’Adoullam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ancienne ville cananéenne.
    marker-yv: yv-n
  - type: text
    text: ' nommé Hira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il vit là la fille d’un Cananéen nommé Shoua, il l’épousa et s’unit à elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle devint enceinte et lui donna un fils : il l’appela Er. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle devint encore enceinte et mit au monde un fils qu’elle appela Onân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elle eut encore un fils qu’elle appela Shéla. Quand sa femme accoucha du troisième, Juda se trouvait à Kezib.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Juda prit pour Er, son premier-né, une femme nommée Tamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jugeant Er mauvais, l’Eternel le fit mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Juda dit à Onân : Accomplis ton devoir de proche parent du défunt : unis-toi à ta belle-sœur pour donner une descendance à ton frère'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette coutume sera incluse dans la Loi (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 25.5-10
        metadata:
          usfm: DEU.25.5+DEU.25.6+DEU.25.7+DEU.25.8+DEU.25.9+DEU.25.10
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22.23-33
        metadata:
          usfm: MAT.22.23+MAT.22.24+MAT.22.25+MAT.22.26+MAT.22.27+MAT.22.28+MAT.22.29+MAT.22.30+MAT.22.31+MAT.22.32+MAT.22.33
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Onân savait que les enfants qui naîtraient ne seraient pas pour lui. Chaque fois qu’il avait des rapports avec sa belle-sœur, il laissait tomber sa semence à terre pour éviter de donner une descendance à son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Son comportement déplut à l’Eternel qui le fit aussi mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Juda dit à Tamar, sa belle-fille : Reste veuve dans la maison de ton père jusqu’à ce que mon fils Shéla soit devenu adulte.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Car il se disait : Il ne faut pas que celui-ci aussi meure comme ses frères.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tamar retourna donc dans la maison de son père et y resta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Bien longtemps après cela, la fille de Shoua, femme de Juda, mourut. Quand il fut consolé, Juda monta avec son ami Hira l’Adoullamite à Timna, pour la tonte de ses moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelqu’un en informa Tamar en lui disant : Voici, ton beau-père monte à Timna pour la tonte de ses moutons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors elle ôta ses habits de veuve, se couvrit le visage d’un voile et, ainsi déguisée, s’assit au carrefour d’Enaïm, sur la route de Timna ; car elle voyait bien que Shéla était devenu adulte sans qu’on le lui ait donné pour mari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Juda aperçut cette femme et la prit pour une prostituée, car elle avait le visage voilé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il s’approcha d’elle au bord du chemin et lui dit : Permets-moi d’aller avec toi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Car il n’avait pas reconnu sa belle-fille. Elle répondit : Que me donneras-tu pour venir avec moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: – Je te ferai apporter un chevreau du troupeau, lui dit-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: – D’accord, répondit-elle, à condition que tu me donnes un gage jusqu’à ce que tu l’envoies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: – Quel gage veux-tu que je te donne ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Ton cachet, le cordon qui le tient et le bâton que tu as en main.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il les lui remit et s’unit à elle, et elle devint enceinte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle se leva et partit ; elle ôta son voile et remit ses habits de veuve.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Juda chargea son ami l’Adoullamite d’apporter le chevreau à cette femme et de retirer les gages qu’il lui avait donnés. Mais celle-ci resta introuvable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hira interrogea les hommes de l’endroit : Où est cette prostituée sacrée qui se tenait sur le chemin à Enaïm ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils lui répondirent : Il n’y a jamais eu de prostituée sacrée à cet endroit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il revint dire à Juda : Je ne l’ai pas trouvée, et les gens de là-bas ont même affirmé qu’il n’y a jamais eu de prostituée sacrée à cet endroit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Juda s’écria : Qu’elle garde ce qu’elle a ! Ne nous rendons pas ridicules. Quoi qu’il arrive, moi j’ai envoyé ce chevreau, et toi, tu n’as pas retrouvé cette femme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Environ trois mois après cela, on vint dire à Juda : Tamar, ta belle-fille, s’est prostituée, et même : la voilà enceinte suite à cela.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Qu’on la fasse sortir, dit-il, et qu’elle soit brûlée vive !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Comme on la jetait dehors, elle envoya un message à son beau-père : C’est de l’homme à qui appartiennent ces objets que je suis enceinte. Reconnais, je te prie, à qui sont ce cachet, ces cordons et ce bâton.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Juda les reconnut et s’écria : Elle est plus juste que moi ; elle a fait cela parce que je ne l’ai pas donnée pour femme à mon fils Shéla.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il ne s’unit plus jamais à elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand vint le moment de la naissance, il s’avéra qu’elle portait des jumeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pendant l’accouchement l’un d’eux présenta une main ; la sage-femme la saisit et y noua un fil rouge en disant : C’est celui-ci qui sort le premier.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais il retira sa main, et c’est son frère qui vint au monde. La sage-femme s’écria : Quelle brèche ne t’es-tu pas ouverte ! Et on le nomma Pérets'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ancêtre de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rt 4.18-22
        metadata:
          usfm: RUT.4.18+RUT.4.19+RUT.4.20+RUT.4.21+RUT.4.22
      - type: text
        text: ) et du Christ (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1.3
        metadata:
          usfm: MAT.1.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' (Brèche). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ensuite son frère naquit, celui dont la main portait le fil rouge, et il fut appelé Zérah (Lever de soleil).
