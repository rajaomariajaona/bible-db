document_id: GEN.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tamar donne une descendance à Juda
  - type: text
    content: A la même époque, Juda se sépara de ses frères et alla vivre près d’un habitant d’Adoullam
  - type: note
    content: Ancienne ville cananéenne.
  - type: text
    content: ' nommé Hira. '
  '10':
  - type: text
    content: 'Son comportement déplut à l’Eternel qui le fit aussi mourir. '
  '11':
  - type: text
    content: 'Alors Juda dit à Tamar, sa belle-fille : Reste veuve dans la maison de ton père jusqu’à ce que mon fils Shéla soit devenu adulte.'
  - type: text
    content: 'Car il se disait : Il ne faut pas que celui-ci aussi meure comme ses frères.'
  - type: text
    content: Tamar retourna donc dans la maison de son père et y resta.
  '12':
  - type: text
    content: 'Bien longtemps après cela, la fille de Shoua, femme de Juda, mourut. Quand il fut consolé, Juda monta avec son ami Hira l’Adoullamite à Timna, pour la tonte de ses moutons. '
  '13':
  - type: text
    content: 'Quelqu’un en informa Tamar en lui disant : Voici, ton beau-père monte à Timna pour la tonte de ses moutons.'
  '14':
  - type: text
    content: Alors elle ôta ses habits de veuve, se couvrit le visage d’un voile et, ainsi déguisée, s’assit au carrefour d’Enaïm, sur la route de Timna ; car elle voyait bien que Shéla était devenu adulte sans qu’on le lui ait donné pour mari.
  '15':
  - type: text
    content: 'Juda aperçut cette femme et la prit pour une prostituée, car elle avait le visage voilé. '
  '16':
  - type: text
    content: 'Il s’approcha d’elle au bord du chemin et lui dit : Permets-moi d’aller avec toi !'
  - type: text
    content: 'Car il n’avait pas reconnu sa belle-fille. Elle répondit : Que me donneras-tu pour venir avec moi ?'
  '17':
  - type: text
    content: – Je te ferai apporter un chevreau du troupeau, lui dit-il.
  - type: text
    content: – D’accord, répondit-elle, à condition que tu me donnes un gage jusqu’à ce que tu l’envoies.
  '18':
  - type: text
    content: – Quel gage veux-tu que je te donne ?
  - type: text
    content: – Ton cachet, le cordon qui le tient et le bâton que tu as en main.
  - type: text
    content: 'Il les lui remit et s’unit à elle, et elle devint enceinte. '
  '19':
  - type: text
    content: Elle se leva et partit ; elle ôta son voile et remit ses habits de veuve.
  '2':
  - type: text
    content: 'Il vit là la fille d’un Cananéen nommé Shoua, il l’épousa et s’unit à elle. '
  '20':
  - type: text
    content: 'Juda chargea son ami l’Adoullamite d’apporter le chevreau à cette femme et de retirer les gages qu’il lui avait donnés. Mais celle-ci resta introuvable. '
  '21':
  - type: text
    content: 'Hira interrogea les hommes de l’endroit : Où est cette prostituée sacrée qui se tenait sur le chemin à Enaïm ?'
  - type: text
    content: 'Ils lui répondirent : Il n’y a jamais eu de prostituée sacrée à cet endroit.'
  '22':
  - type: text
    content: 'Il revint dire à Juda : Je ne l’ai pas trouvée, et les gens de là-bas ont même affirmé qu’il n’y a jamais eu de prostituée sacrée à cet endroit.'
  '23':
  - type: text
    content: 'Alors Juda s’écria : Qu’elle garde ce qu’elle a ! Ne nous rendons pas ridicules. Quoi qu’il arrive, moi j’ai envoyé ce chevreau, et toi, tu n’as pas retrouvé cette femme.'
  '24':
  - type: text
    content: 'Environ trois mois après cela, on vint dire à Juda : Tamar, ta belle-fille, s’est prostituée, et même : la voilà enceinte suite à cela.'
  - type: text
    content: – Qu’on la fasse sortir, dit-il, et qu’elle soit brûlée vive !
  '25':
  - type: text
    content: 'Comme on la jetait dehors, elle envoya un message à son beau-père : C’est de l’homme à qui appartiennent ces objets que je suis enceinte. Reconnais, je te prie, à qui sont ce cachet, ces cordons et ce bâton.'
  '26':
  - type: text
    content: 'Juda les reconnut et s’écria : Elle est plus juste que moi ; elle a fait cela parce que je ne l’ai pas donnée pour femme à mon fils Shéla.'
  - type: text
    content: Il ne s’unit plus jamais à elle.
  '27':
  - type: text
    content: 'Quand vint le moment de la naissance, il s’avéra qu’elle portait des jumeaux. '
  '28':
  - type: text
    content: 'Pendant l’accouchement l’un d’eux présenta une main ; la sage-femme la saisit et y noua un fil rouge en disant : C’est celui-ci qui sort le premier.'
  '29':
  - type: text
    content: 'Mais il retira sa main, et c’est son frère qui vint au monde. La sage-femme s’écria : Quelle brèche ne t’es-tu pas ouverte ! Et on le nomma Pérets'
  - type: note
    content: Ancêtre de David (Rt 4.18-22) et du Christ (Mt 1.3).
  - type: text
    content: ' (Brèche). '
  '3':
  - type: text
    content: 'Elle devint enceinte et lui donna un fils : il l’appela Er. '
  '30':
  - type: text
    content: Ensuite son frère naquit, celui dont la main portait le fil rouge, et il fut appelé Zérah (Lever de soleil).
  '4':
  - type: text
    content: 'Elle devint encore enceinte et mit au monde un fils qu’elle appela Onân. '
  '5':
  - type: text
    content: Elle eut encore un fils qu’elle appela Shéla. Quand sa femme accoucha du troisième, Juda se trouvait à Kezib.
  '6':
  - type: text
    content: 'Juda prit pour Er, son premier-né, une femme nommée Tamar. '
  '7':
  - type: text
    content: 'Jugeant Er mauvais, l’Eternel le fit mourir. '
  '8':
  - type: text
    content: 'Alors Juda dit à Onân : Accomplis ton devoir de proche parent du défunt : unis-toi à ta belle-sœur pour donner une descendance à ton frère'
  - type: note
    content: Cette coutume sera incluse dans la Loi (Dt 25.5-10  ; voir Mt 22.23-33).
  - type: text
    content: .
  '9':
  - type: text
    content: 'Onân savait que les enfants qui naîtraient ne seraient pas pour lui. Chaque fois qu’il avait des rapports avec sa belle-sœur, il laissait tomber sa semence à terre pour éviter de donner une descendance à son frère. '
