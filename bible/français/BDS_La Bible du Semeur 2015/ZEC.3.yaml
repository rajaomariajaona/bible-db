document_id: ZEC.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand-prêtre Josué
  - type: text
    content: Puis il me fit voir Josué, le grand-prêtre, qui se tenait debout devant l’ange de l’Eternel. Et l’Accusateur se tenait à sa droite pour l’accuser
  - type: note
    content: 'Josué: voir Esd 3.2 ; Ag 1.1. L’Accusateur: hébreu : le satan (qui est un nom commun ; voir Jb 1.6-12). Dans les tribunaux, l’accusateur se tenait à la droite de l’accusé (voir Ps 109.6).'
  - type: text
    content: .
  '10':
  - type: text
    content: En ce jour-là – le Seigneur des armées célestes le déclare – vous vous inviterez les uns les autres sous la vigne et sous le figuier.
  '2':
  - type: text
    content: 'L’Eternel dit à l’Accusateur : Que l’Eternel te réduise au silence, Accusateur ! Oui, que l’Eternel te réduise au silence, lui qui porte son choix sur Jérusalem ! Celui-ci n’est-il pas un tison arraché au feu'
  - type: note
    content: Un rescapé de l’exil (Esd 2.36).
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: 'Or, Josué était couvert d’habits très sales et il se tenait devant l’ange. '
  '4':
  - type: text
    content: 'L’ange s’adressa à ceux qui se tenaient devant lui et leur ordonna : Otez-lui ses vêtements sales !'
  - type: text
    content: 'Et il ajouta à l’adresse de Josué : Regarde, j’ai enlevé le poids de la faute que tu portais et l’on te revêtira d’habits de fête.'
  '5':
  - type: text
    content: 'Alors je m’écriai : Qu’on lui mette un turban pur'
  - type: note
    content: 'C’est le turban du grand-prêtre (Ex 28.39-43) sur lequel était inscrit : « Consacré à l’Eternel » (Ex 28.36).'
  - type: text
    content: ' sur la tête !'
  - type: text
    content: On lui posa donc le turban pur sur la tête, et on le revêtit d’autres habits. Or, l’ange de l’Eternel se tenait là.
  '6':
  - type: text
    content: 'L’ange de l’Eternel fit ensuite cette déclaration à Josué : '
  '7':
  - type: text
    content: 'Voici ce que dit le Seigneur des armées célestes : Si tu suis les chemins que j’ai prescrits et si tu obéis à mes commandements, tu exerceras dans mon temple les fonctions judiciaires, tu veilleras sur mes parvis, et je te donnerai des guides pris parmi'
  - type: note
    content: 'je te donnerai des guides pris parmi. Autre traduction : je te donnerai accès parmi.'
  - type: text
    content: ' ceux qui se tiennent ici.'
  '8':
  - type: text
    content: Et maintenant, écoute, Josué, toi le grand-prêtre, et tes collègues qui se tiennent devant toi, car vous êtes des hommes qui servez de préfiguration. En effet, je ferai venir mon serviteur, qui est appelé le Germe
  - type: note
    content: Nom que plusieurs prophètes donnent au Messie (voir 6.12 ; Es 11.1 ; Jr 23.5 ; 33.15). Dans ce verset, Zacharie unit l’attente du Germe à celle du Serviteur de l’Eternel annoncé par Esaïe (Es 42.1ss ; 49.1ss ; 50.4ss ; 52.13 à 53.12).
  - type: text
    content: .
  '9':
  - type: text
    content: Voici que je pose une pierre devant Josué. Sur cette pierre unique il y a sept yeux
  - type: note
    content: Voir Ap 5.6.
  - type: text
    content: '. J’y graverai moi-même son inscription, le Seigneur des armées célestes le déclare. En un seul jour, j’ôterai le poids de la faute que porte ce pays. '
