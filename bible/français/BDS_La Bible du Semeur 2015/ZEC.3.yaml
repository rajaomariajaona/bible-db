document_id: ZEC.3
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le grand-prêtre Josué
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Puis il me fit voir Josué, le grand-prêtre, qui se tenait debout devant l’ange de l’Eternel. Et l’Accusateur se tenait à sa droite pour l’accuser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josué
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir Esd 3.2 ; Ag 1.1. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L’Accusateur
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'hébreu : le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'satan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(qui est un nom commun ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jb 1.6-12
        metadata:
          usfm: JOB.1.6+JOB.1.7+JOB.1.8+JOB.1.9+JOB.1.10+JOB.1.11+JOB.1.12
      - type: text
        text: '). Dans les tribunaux, l’accusateur se tenait à la droite de l’accusé (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 109.6
        metadata:
          usfm: PSA.109.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Eternel dit à l’Accusateur : Que l’Eternel te réduise au silence, Accusateur ! Oui, que l’Eternel te réduise au silence, lui qui porte son choix sur Jérusalem ! Celui-ci n’est-il pas un tison arraché au feu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Un rescapé de l’exil (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 2.36
        metadata:
          usfm: EZR.2.36
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or, Josué était couvert d’habits très sales et il se tenait devant l’ange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’ange s’adressa à ceux qui se tenaient devant lui et leur ordonna : Otez-lui ses vêtements sales !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et il ajouta à l’adresse de Josué : Regarde, j’ai enlevé le poids de la faute que tu portais et l’on te revêtira d’habits de fête.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors je m’écriai : Qu’on lui mette un turban pur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est le turban du grand-prêtre (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.39-43
        metadata:
          usfm: EXO.28.39+EXO.28.40+EXO.28.41+EXO.28.42+EXO.28.43
      - type: text
        text: ') sur lequel était inscrit : « Consacré à l’Eternel » ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.36
        metadata:
          usfm: EXO.28.36
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' sur la tête !'
- type: usfm
  marker: p
  children:
  - type: text
    text: On lui posa donc le turban pur sur la tête, et on le revêtit d’autres habits. Or, l’ange de l’Eternel se tenait là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’ange de l’Eternel fit ensuite cette déclaration à Josué : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ce que dit le Seigneur des armées célestes : Si tu suis les chemins que j’ai prescrits et si tu obéis à mes commandements, tu exerceras dans mon temple les fonctions judiciaires, tu veilleras sur mes parvis, et je te donnerai des guides pris parmi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je te donnerai des guides pris parmi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te donnerai accès parmi.
    marker-yv: yv-n
  - type: text
    text: ' ceux qui se tiennent ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et maintenant, écoute, Josué, toi le grand-prêtre, et tes collègues qui se tiennent devant toi, car vous êtes des hommes qui servez de préfiguration. En effet, je ferai venir mon serviteur, qui est appelé le Germe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom que plusieurs prophètes donnent au Messie (voir 6.12 ; Es 11.1 ; Jr 23.5 ; 33.15). Dans ce verset, Zacharie unit l’attente du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Germe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à celle du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de l’Eternel annoncé par Esaïe (Es 42.1ss ; 49.1ss ; 50.4ss ; 52.13 à 53.12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voici que je pose une pierre devant Josué. Sur cette pierre unique il y a sept yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 5.6
        metadata:
          usfm: REV.5.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. J’y graverai moi-même son inscription, le Seigneur des armées célestes le déclare. En un seul jour, j’ôterai le poids de la faute que porte ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En ce jour-là – le Seigneur des armées célestes le déclare – vous vous inviterez les uns les autres sous la vigne et sous le figuier.
