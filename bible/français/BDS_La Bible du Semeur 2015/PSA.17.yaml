document_id: PSA.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Poursuivi sans cause
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, ╵écoute ma requête, ╵car elle est juste ! ╵Entends mon cri !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à ma prière, ╵prononcée sans duplicité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Viens prononcer le jugement ╵qui me rendra justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes yeux voient ╵où est le droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Examine mon cœur, ╵observe-moi la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: éprouve-moi, ╵tu ne trouveras rien ╵à reprocher en moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai décidé ╵de ne pas pécher en paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et quoi que fassent ╵les autres hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis bien gardé, ╵conformément à tes paroles, ╵de marcher sur la route des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je me suis tenu fermement ╵à la voie que tu as tracée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes pieds n’ont pas chancelé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dieu, je t’appelle ╵car tu réponds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille, ╵écoute-moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fais resplendir ╵l’immensité ╵de ton amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui délivres ╵des agresseurs ╵ceux qui comptent sur ton intervention !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Garde-moi ╵comme la prunelle ╵de tes yeux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cache-moi ╵bien à l’abri sous tes ailes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 36.8 ; 57.2 ; 61.5 ; 63.8 ; 91.4 ; Mt 23.37.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: loin des ennemis ╵qui s’acharnent contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et loin des méchants ╵qui me cernent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils s’enferment dans leur graisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont l’arrogance à la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils sont sur mes pas. ╵Déjà, ils m’encerclent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont aux aguets ╵pour me terrasser,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: comme un lion ╵prêt à déchirer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un fauve en embuscade.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lève-toi, ô Eternel, ╵et affronte-les ! ╵Fais-les s’incliner
- type: usfm
  marker: q1
  children:
  - type: text
    text: et délivre-moi ╵de tous ces méchants ╵par ton glaive !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Délivre-moi de ces hommes ╵par ton intervention, Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que des hommes de ce monde ╵je sois délivré !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur seule part est en cette vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à ceux que tu chéris, ╵tu combleras leurs aspirations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs enfants seront bien rassasiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils auront des biens à léguer ╵à leurs descendants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Oui, qu’ils soient gavés, eux et leurs enfants, de ce que tu leur réserves. Qu’ils en soient tout rassasiés et en laissent à leurs descendants !
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pour ma part, ╵lorsqu’il m’aura été fait justice, ╵je contemplerai ta face
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, à mon réveil, ╵je pourrai me rassasier ╵de la vue de ton image.
