document_id: PSA.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Poursuivi sans cause
  - type: text
    content: Prière de David.
  - type: text
    content: O Eternel, ╵écoute ma requête, ╵car elle est juste ! ╵Entends mon cri !
  - type: text
    content: Prête l’oreille à ma prière, ╵prononcée sans duplicité.
  '10':
  - type: text
    content: Ils s’enferment dans leur graisse,
  - type: text
    content: et ils ont l’arrogance à la bouche.
  '11':
  - type: text
    content: Ils sont sur mes pas. ╵Déjà, ils m’encerclent,
  - type: text
    content: ils sont aux aguets ╵pour me terrasser,
  '12':
  - type: text
    content: comme un lion ╵prêt à déchirer,
  - type: text
    content: comme un fauve en embuscade.
  '13':
  - type: text
    content: Lève-toi, ô Eternel, ╵et affronte-les ! ╵Fais-les s’incliner
  - type: text
    content: et délivre-moi ╵de tous ces méchants ╵par ton glaive !
  '14':
  - type: text
    content: Délivre-moi de ces hommes ╵par ton intervention, Eternel !
  - type: text
    content: Que des hommes de ce monde ╵je sois délivré !
  - type: text
    content: Leur seule part est en cette vie.
  - type: text
    content: Quant à ceux que tu chéris, ╵tu combleras leurs aspirations,
  - type: text
    content: leurs enfants seront bien rassasiés,
  - type: text
    content: et ils auront des biens à léguer ╵à leurs descendants
  - type: note
    content: 'Autre traduction : Oui, qu’ils soient gavés, eux et leurs enfants, de ce que tu leur réserves. Qu’ils en soient tout rassasiés et en laissent à leurs descendants !'
  - type: text
    content: '  !'
  '15':
  - type: text
    content: Pour ma part, ╵lorsqu’il m’aura été fait justice, ╵je contemplerai ta face
  - type: text
    content: et, à mon réveil, ╵je pourrai me rassasier ╵de la vue de ton image.
  '2':
  - type: text
    content: Viens prononcer le jugement ╵qui me rendra justice.
  - type: text
    content: Que tes yeux voient ╵où est le droit.
  '3':
  - type: text
    content: Examine mon cœur, ╵observe-moi la nuit,
  - type: text
    content: éprouve-moi, ╵tu ne trouveras rien ╵à reprocher en moi.
  - type: text
    content: J’ai décidé ╵de ne pas pécher en paroles.
  '4':
  - type: text
    content: Et quoi que fassent ╵les autres hommes,
  - type: text
    content: je me suis bien gardé, ╵conformément à tes paroles, ╵de marcher sur la route des méchants.
  '5':
  - type: text
    content: Je me suis tenu fermement ╵à la voie que tu as tracée,
  - type: text
    content: et mes pieds n’ont pas chancelé.
  '6':
  - type: text
    content: Dieu, je t’appelle ╵car tu réponds.
  - type: text
    content: Prête l’oreille, ╵écoute-moi !
  '7':
  - type: text
    content: Fais resplendir ╵l’immensité ╵de ton amour,
  - type: text
    content: toi qui délivres ╵des agresseurs ╵ceux qui comptent sur ton intervention !
  '8':
  - type: text
    content: Garde-moi ╵comme la prunelle ╵de tes yeux !
  - type: text
    content: Cache-moi ╵bien à l’abri sous tes ailes
  - type: note
    content: Voir 36.8 ; 57.2 ; 61.5 ; 63.8 ; 91.4 ; Mt 23.37.
  - type: text
    content: ','
  '9':
  - type: text
    content: loin des ennemis ╵qui s’acharnent contre moi
  - type: text
    content: et loin des méchants ╵qui me cernent !
