document_id: 2SA.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La révolte de Shéba
  - type: text
    content: 'Il se trouvait là un vaurien nommé Shéba, fils de Bikri, de la tribu de Benjamin. Il sonna du cor et proclama : Nous n’avons rien à faire avec David, rien de commun avec le fils d’Isaï ! Rentrons chacun chez soi, hommes d’Israël !'
  '10':
  - type: text
    content: Ce dernier ne prit pas garde à l’épée qui se trouvait dans la main gauche de Joab. Celui-ci la lui plongea dans le ventre et répandit ses intestins à terre, sans lui porter un second coup, et Amasa mourut sur-le-champ. Après cela, Joab et son frère Abishaï reprirent la poursuite de Shéba, fils de Bikri.
  '11':
  - type: text
    content: 'Un jeune soldat de Joab s’était arrêté près du cadavre d’Amasa en répétant : Que tous ceux qui sont partisans de Joab et qui sont pour David suivent Joab !'
  '12':
  - type: text
    content: 'Or, Amasa gisait dans son sang au milieu de la route ; le soldat vit que toute la troupe s’arrêtait. Alors il ôta le corps d’Amasa du chemin en le tirant dans un champ, et le couvrit d’une couverture. '
  '13':
  - type: text
    content: Une fois le cadavre enlevé de la route, tous les hommes continuèrent leur chemin à la suite de Joab pour poursuivre Shéba, fils de Bikri.
  - type: heading
    content: La fin de Shéba
  '14':
  - type: text
    content: Ils parcoururent toutes les tribus d’Israël en direction d’Abel-Beth-Maaka
  - type: note
    content: Une des localités les plus septentrionales d’Israël, au pied du mont Hermon, à une quarantaine de kilomètres du lac de Galilée (voir 1 R 15.20 ; 2 R 15.29 ; 2 Ch 16.4).
  - type: text
    content: '. Tous les hommes de Bérim se rassemblèrent et marchèrent aussi à la suite de Joab '
  '15':
  - type: text
    content: 'qui, avec ses troupes, arriva à la ville d’Abel-Beth-Maaka et l’assiégea. On dressa un remblai de terre contre la ville jusqu’au niveau du rempart extérieur. Toute l’armée de Joab se mit à creuser des sapes sous la muraille pour la faire s’écrouler. '
  '16':
  - type: text
    content: 'Alors une femme avisée se mit à crier du haut du rempart de la ville : Ecoutez, écoutez ! Dites, je vous prie, à Joab : « Approche jusqu’ici, je veux te parler ! »'
  '17':
  - type: text
    content: 'Joab s’approcha d’elle et la femme lui demanda : Es-tu Joab ?'
  - type: text
    content: – Oui, c’est moi, répondit-il.
  - type: text
    content: 'Elle lui dit : Ecoute les paroles de ta servante !'
  - type: text
    content: – J’écoute.
  '18':
  - type: text
    content: 'Elle poursuivit : Autrefois on répétait le dicton : « Demandez conseil dans Abel ! et l’affaire sera réglée ! » '
  '19':
  - type: text
    content: Nous sommes parmi les gens les plus paisibles et les plus loyaux d’Israël. Et toi tu veux détruire une ville qui est une métropole en Israël ! Pourquoi ruinerais-tu une cité qui fait partie du pays de l’Eternel ?
  '2':
  - type: text
    content: Et tous les hommes d’Israël du Nord se détachèrent de David pour se rallier à Shéba, fils de Bikri. Seuls les hommes de Juda restèrent attachés à leur roi et l’escortèrent depuis le Jourdain jusqu’à Jérusalem.
  '20':
  - type: text
    content: 'Joab s’écria : Sûrement pas ! Je ne veux ni détruire ni ruiner quoi que ce soit. '
  '21':
  - type: text
    content: Ce n’est pas de cela qu’il s’agit. Mais un homme de la région montagneuse d’Ephraïm nommé Shéba, fils de Bikri, s’est révolté contre le roi David. Livrez-le, lui seul, et je lèverai le siège de la ville.
  - type: text
    content: 'La femme lui répondit : Eh bien, sa tête te sera lancée par-dessus la muraille.'
  '22':
  - type: text
    content: La femme alla trouver tous ses concitoyens et leur parla avec sagesse. Ils coupèrent la tête de Shéba et la lancèrent à Joab. Alors celui-ci fit sonner du cor et les assiégeants se retirèrent de la ville, chacun rentra chez soi. Joab retourna à Jérusalem, auprès du roi.
  - type: heading
    content: Les fonctionnaires de David
  '23':
  - type: text
    content: 'Joab resta à la tête de toute l’armée d’Israël ; Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens. '
  '24':
  - type: text
    content: 'Adoram dirigeait les corvées ; Josaphat, fils d’Ahiloud, était archiviste ; '
  '25':
  - type: text
    content: 'Sheva était secrétaire. Tsadoq et Abiatar étaient prêtres. '
  '26':
  - type: text
    content: David avait aussi pour prêtre Ira de Yaïr.
  '3':
  - type: text
    content: Dès son arrivée au palais, David fit chercher les dix épouses de second rang qu’il avait laissées pour garder le palais et les installa dans une maison bien gardée, il leur donna tout ce qui leur était nécessaire ; mais il n’eut plus de relations avec elles. Dès lors, elles furent séquestrées jusqu’au jour de leur mort, menant la vie des veuves
  - type: note
    content: Pour la raison de cette décision, voir 15.16 ; 16.21-22.
  - type: text
    content: .
  - type: heading
    content: Joab assassine Amasa
  '4':
  - type: text
    content: Le roi ordonna à Amasa
  - type: note
    content: Voir 17.25 ; 19.14. David écarte Joab qui a mis Absalom à mort, contre ses ordres (18.12-15).
  - type: text
    content: '  : Mobilise d’ici trois jours les hommes de Juda, puis viens te présenter ici avec eux.'
  '5':
  - type: text
    content: 'Amasa alla mobiliser Juda, mais il tarda au-delà du délai fixé par le roi pour le rendez-vous avec lui. '
  '6':
  - type: text
    content: 'Alors David dit à Abishaï : Shéba, fils de Bikri, va maintenant nous faire plus de tort qu’Absalom. Pars donc à la tête de la garnison royale et poursuis-le ! Il ne faut pas qu’il ait le temps de trouver abri dans des villes fortifiées où il nous échapperait.'
  '7':
  - type: text
    content: Ainsi Abishaï partit avec la troupe commandée par Joab, ainsi qu’avec les Kérétiens et les Pélétiens
  - type: note
    content: Voir 8.18.
  - type: text
    content: ' et tous les soldats de métier. Ils quittèrent Jérusalem afin de poursuivre Shéba, fils de Bikri.'
  '8':
  - type: text
    content: Lorsqu’ils furent arrivés près de la grande pierre à Gabaon, ils virent Amasa venir au-devant d’eux. Joab portait alors sur sa tenue un ceinturon auquel était attaché, sur ses reins, le fourreau contenant son épée. Celle-ci tomba pendant que Joab s’avançait.
  '9':
  - type: text
    content: 'Joab dit à Amasa : Vas-tu bien, mon frère ?'
  - type: text
    content: 'De la main droite, il saisit la barbe d’Amasa pour l’embrasser. '
