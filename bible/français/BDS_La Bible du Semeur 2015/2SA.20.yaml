document_id: 2SA.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révolte de Shéba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il se trouvait là un vaurien nommé Shéba, fils de Bikri, de la tribu de Benjamin. Il sonna du cor et proclama : Nous n’avons rien à faire avec David, rien de commun avec le fils d’Isaï ! Rentrons chacun chez soi, hommes d’Israël !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et tous les hommes d’Israël du Nord se détachèrent de David pour se rallier à Shéba, fils de Bikri. Seuls les hommes de Juda restèrent attachés à leur roi et l’escortèrent depuis le Jourdain jusqu’à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dès son arrivée au palais, David fit chercher les dix épouses de second rang qu’il avait laissées pour garder le palais et les installa dans une maison bien gardée, il leur donna tout ce qui leur était nécessaire ; mais il n’eut plus de relations avec elles. Dès lors, elles furent séquestrées jusqu’au jour de leur mort, menant la vie des veuves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour la raison de cette décision, voir 15.16 ; 16.21-22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joab assassine Amasa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le roi ordonna à Amasa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 17.25 ; 19.14. David écarte Joab qui a mis Absalom à mort, contre ses ordres (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18.12-15
        metadata:
          usfm: 2SA.18.12+2SA.18.13+2SA.18.14+2SA.18.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  : Mobilise d’ici trois jours les hommes de Juda, puis viens te présenter ici avec eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amasa alla mobiliser Juda, mais il tarda au-delà du délai fixé par le roi pour le rendez-vous avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors David dit à Abishaï : Shéba, fils de Bikri, va maintenant nous faire plus de tort qu’Absalom. Pars donc à la tête de la garnison royale et poursuis-le ! Il ne faut pas qu’il ait le temps de trouver abri dans des villes fortifiées où il nous échapperait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi Abishaï partit avec la troupe commandée par Joab, ainsi qu’avec les Kérétiens et les Pélétiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.18'
        metadata:
          usfm: 2SA.8.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et tous les soldats de métier. Ils quittèrent Jérusalem afin de poursuivre Shéba, fils de Bikri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsqu’ils furent arrivés près de la grande pierre à Gabaon, ils virent Amasa venir au-devant d’eux. Joab portait alors sur sa tenue un ceinturon auquel était attaché, sur ses reins, le fourreau contenant son épée. Celle-ci tomba pendant que Joab s’avançait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joab dit à Amasa : Vas-tu bien, mon frère ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'De la main droite, il saisit la barbe d’Amasa pour l’embrasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce dernier ne prit pas garde à l’épée qui se trouvait dans la main gauche de Joab. Celui-ci la lui plongea dans le ventre et répandit ses intestins à terre, sans lui porter un second coup, et Amasa mourut sur-le-champ. Après cela, Joab et son frère Abishaï reprirent la poursuite de Shéba, fils de Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un jeune soldat de Joab s’était arrêté près du cadavre d’Amasa en répétant : Que tous ceux qui sont partisans de Joab et qui sont pour David suivent Joab !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, Amasa gisait dans son sang au milieu de la route ; le soldat vit que toute la troupe s’arrêtait. Alors il ôta le corps d’Amasa du chemin en le tirant dans un champ, et le couvrit d’une couverture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Une fois le cadavre enlevé de la route, tous les hommes continuèrent leur chemin à la suite de Joab pour poursuivre Shéba, fils de Bikri.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de Shéba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils parcoururent toutes les tribus d’Israël en direction d’Abel-Beth-Maaka
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une des localités les plus septentrionales d’Israël, au pied du mont Hermon, à une quarantaine de kilomètres du lac de Galilée (voir 1 R 15.20 ; 2 R 15.29 ; 2 Ch 16.4).
    marker-yv: yv-n
  - type: text
    text: '. Tous les hommes de Bérim se rassemblèrent et marchèrent aussi à la suite de Joab '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'qui, avec ses troupes, arriva à la ville d’Abel-Beth-Maaka et l’assiégea. On dressa un remblai de terre contre la ville jusqu’au niveau du rempart extérieur. Toute l’armée de Joab se mit à creuser des sapes sous la muraille pour la faire s’écrouler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors une femme avisée se mit à crier du haut du rempart de la ville : Ecoutez, écoutez ! Dites, je vous prie, à Joab : « Approche jusqu’ici, je veux te parler ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Joab s’approcha d’elle et la femme lui demanda : Es-tu Joab ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, c’est moi, répondit-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle lui dit : Ecoute les paroles de ta servante !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – J’écoute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle poursuivit : Autrefois on répétait le dicton : « Demandez conseil dans Abel ! et l’affaire sera réglée ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nous sommes parmi les gens les plus paisibles et les plus loyaux d’Israël. Et toi tu veux détruire une ville qui est une métropole en Israël ! Pourquoi ruinerais-tu une cité qui fait partie du pays de l’Eternel ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joab s’écria : Sûrement pas ! Je ne veux ni détruire ni ruiner quoi que ce soit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ce n’est pas de cela qu’il s’agit. Mais un homme de la région montagneuse d’Ephraïm nommé Shéba, fils de Bikri, s’est révolté contre le roi David. Livrez-le, lui seul, et je lèverai le siège de la ville.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La femme lui répondit : Eh bien, sa tête te sera lancée par-dessus la muraille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La femme alla trouver tous ses concitoyens et leur parla avec sagesse. Ils coupèrent la tête de Shéba et la lancèrent à Joab. Alors celui-ci fit sonner du cor et les assiégeants se retirèrent de la ville, chacun rentra chez soi. Joab retourna à Jérusalem, auprès du roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fonctionnaires de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joab resta à la tête de toute l’armée d’Israël ; Benaya, fils de Yehoyada, commandait les Kérétiens et les Pélétiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Adoram dirigeait les corvées ; Josaphat, fils d’Ahiloud, était archiviste ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sheva était secrétaire. Tsadoq et Abiatar étaient prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: David avait aussi pour prêtre Ira de Yaïr.
