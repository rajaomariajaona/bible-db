document_id: ISA.45,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Libérateur viendra
  - type: heading
    content: L’Eternel domine sur toutes choses
  - type: text
    content: Ainsi dit l’Eternel ╵à son oint, à Cyrus
  - type: note
    content: Cyrus est appelé oint de l’Eternel (voir 44.28), car Dieu a suscité ce roi avec la mission de libérer son peuple. Cyrus est le seul souverain païen portant ce titre, celui-ci étant réservé au roi de Juda.
  - type: text
    content: ','
  - type: text
    content: qu’il a pris par la main
  - type: text
    content: pour abaisser ╵les nations devant lui
  - type: text
    content: et désarmer les rois,
  - type: text
    content: pour ouvrir devant lui les deux battants
  - type: text
    content: afin qu’aucune porte ╵ne lui reste fermée.
  '10':
  - type: text
    content: 'Malheur à qui dit à un père :'
  - type: text
    content: « Qu’as-tu engendré là ? »
  - type: text
    content: 'ou bien à une femme :'
  - type: text
    content: « Qu’as-tu donc mis au monde ? »
  '11':
  - type: text
    content: Ainsi dit l’Eternel, ╵lui le Saint d’Israël,
  - type: text
    content: 'lui qui l’a façonné :'
  - type: text
    content: Oserez-vous me questionner ╵sur ce qui doit venir,
  - type: text
    content: ou me donnerez-vous des ordres ╵au sujet de mes fils ╵et au sujet de l’œuvre ╵que mes mains ont réalisée ?
  '12':
  - type: text
    content: C’est moi, moi qui ai fait la terre
  - type: text
    content: et qui, sur elle, ai créé l’homme.
  - type: text
    content: C’est moi, ce sont mes mains ╵qui ont tendu le ciel,
  - type: text
    content: et je donne des ordres ╵à toute son armée.
  '13':
  - type: text
    content: C’est moi qui, selon la justice, ╵ai fait surgir cet homme
  - type: note
    content: C’est-à-dire Cyrus.
  - type: text
    content: .
  - type: text
    content: J’aplanirai toutes ses voies.
  - type: text
    content: Lui, il rebâtira ma ville,
  - type: text
    content: et il libérera les miens ╵que l’on a déportés
  - type: text
    content: sans rançon ni présent,
  - type: text
    content: a dit le Seigneur des armées célestes.
  - type: heading
    content: Des peuples non israélites se rallient à l’Eternel
  '14':
  - type: text
    content: 'Ainsi dit l’Eternel :'
  - type: text
    content: Les profits de l’Egypte, ╵les gains de l’Ethiopie
  - type: text
    content: et des gens de Seba, ╵si hauts de taille,
  - type: text
    content: tout cela passera chez toi, ╵cela t’appartiendra.
  - type: text
    content: Ces peuples viendront à ta suite
  - type: text
    content: en marchant enchaînés
  - type: text
    content: et ils se prosterneront devant toi
  - type: text
    content: 'en te disant ╵sur un ton suppliant :'
  - type: text
    content: « C’est chez toi seulement ╵que l’on peut trouver Dieu,
  - type: text
    content: et en dehors de lui, ╵il n’y en a pas d’autre,
  - type: text
    content: car tous les autres dieux ╵ne sont que du néant. »
  '15':
  - type: text
    content: En vérité, ô Dieu, ╵toi, tu es un Dieu qui te caches,
  - type: text
    content: Dieu d’Israël et son Sauveur.
  '16':
  - type: text
    content: Les fabricants d’idoles
  - type: text
    content: sont honteux et confus,
  - type: text
    content: ils s’en vont tous ensemble ╵couverts d’opprobre.
  '17':
  - type: text
    content: Israël, pour toujours, ╵sera sauvé par l’Eternel
  - type: text
    content: et vous ne serez plus jamais
  - type: text
    content: ni honteux ni confus.
  '18':
  - type: text
    content: Voici ce que déclare l’Eternel
  - type: text
    content: qui a créé le ciel, ╵lui qui est Dieu,
  - type: text
    content: et qui a fait la terre,
  - type: text
    content: qui l’a formée et affermie,
  - type: text
    content: il ne l’a pas créée ╵à l’état chaotique,
  - type: text
    content: 'mais il l’a façonnée ╵pour que l’on y habite :'
  - type: text
    content: Moi, je suis l’Eternel ;
  - type: text
    content: il n’y en a pas d’autre.
  '19':
  - type: text
    content: Je n’ai pas parlé en secret
  - type: text
    content: ni dans un coin ténébreux de la terre,
  - type: text
    content: 'car aux descendants de Jacob, ╵je n’ai pas dit :'
  - type: text
    content: « Recherchez-moi dans le chaos. »
  - type: text
    content: Moi, je suis l’Eternel, ╵je dis ce qui est juste,
  - type: text
    content: je proclame ce qui est droit.
  '2':
  - type: text
    content: Moi, j’irai devant toi,
  - type: text
    content: nivelant les montagnes
  - type: note
    content: 'D’après le texte de Qumrân. Le texte traditionnel est de sens incertain : murailles ?'
  - type: text
    content: ','
  - type: text
    content: fracassant les battants de bronze
  - type: text
    content: et brisant les verrous de fer.
  '20':
  - type: text
    content: Rassemblez-vous, venez,
  - type: text
    content: approchez tous ensemble,
  - type: text
    content: rescapés des nations !
  - type: text
    content: Ils sont sans connaissance,
  - type: text
    content: ceux qui portent bien haut ╵leurs idoles de bois
  - type: text
    content: et invoquent un dieu
  - type: text
    content: qui ne peut les sauver.
  '21':
  - type: text
    content: Exposez votre cause, ╵avancez vos raisons
  - type: note
    content: 'Autre traduction : faites vos prédictions, exposez-les.'
  - type: text
    content: ','
  - type: text
    content: délibérez ensemble.
  - type: text
    content: Qui donc a fait savoir ces choses ╵dès le lointain passé,
  - type: text
    content: et qui, depuis longtemps, ╵les avait annoncées ?
  - type: text
    content: N’est-ce pas moi, ╵moi, l’Eternel ?
  - type: text
    content: Et en dehors de moi, ╵il n’y a pas de Dieu.
  - type: text
    content: Oui, en dehors de moi
  - type: text
    content: il n’est pas de Dieu juste, ╵de Dieu qui sauve.
  '22':
  - type: text
    content: Tournez-vous donc vers moi, ╵et vous serez sauvés,
  - type: text
    content: vous tous qui habitez ╵les confins de la terre !
  - type: text
    content: Car moi seul je suis Dieu,
  - type: text
    content: il n’y en a pas d’autre.
  '23':
  - type: text
    content: J’en ai fait le serment ╵en jurant par moi-même,
  - type: text
    content: ma bouche a prononcé ╵une parole juste
  - type: text
    content: 'qui est irrévocable :'
  - type: text
    content: Devant moi tout genou ploiera
  - type: text
    content: et toute langue ╵prêtera serment par mon nom
  - type: note
    content: Cité en Rm 14.11 ; Ph 2.10-11.
  - type: text
    content: ','
  '24':
  - type: text
    content: 'disant à mon sujet :'
  - type: text
    content: « C’est en l’Eternel seul
  - type: text
    content: que résident pour moi ╵la justice et la force. »
  - type: text
    content: A lui viendront, honteux,
  - type: text
    content: tous ceux qui, contre lui, ╵s’étaient mis en colère.
  '25':
  - type: text
    content: C’est grâce à l’Eternel
  - type: text
    content: que tout le peuple d’Israël ╵sera justifié
  - type: text
    content: et ils s’en féliciteront.
  '3':
  - type: text
    content: Et je te donnerai ╵les richesses cachées
  - type: text
    content: et les trésors ╵déposés dans des lieux secrets,
  - type: text
    content: pour que tu saches
  - type: text
    content: que c’est moi, l’Eternel, ╵moi qui t’appelle par ton nom,
  - type: text
    content: moi le Dieu d’Israël.
  '4':
  - type: text
    content: A cause de mon serviteur, Jacob,
  - type: text
    content: et d’Israël que j’ai choisi,
  - type: text
    content: je t’ai appelé par ton nom,
  - type: text
    content: je t’ai donné un rang d’honneur
  - type: text
    content: sans que tu me connaisses.
  '5':
  - type: text
    content: Moi, je suis l’Eternel,
  - type: text
    content: il n’y en a pas d’autre,
  - type: text
    content: non, en dehors de moi, ╵il n’y a pas de Dieu.
  - type: text
    content: Je t’ai doté de force
  - type: text
    content: sans que tu me connaisses,
  '6':
  - type: text
    content: afin que du soleil levant ╵jusqu’au soleil couchant, ╵tout homme sache
  - type: text
    content: qu’en dehors de moi, ╵il n’y a que néant,
  - type: text
    content: que je suis l’Eternel
  - type: text
    content: et qu’il n’y en a aucun autre.
  '7':
  - type: text
    content: J’ai formé la lumière
  - type: text
    content: et créé les ténèbres,
  - type: text
    content: je donne le bonheur
  - type: text
    content: et je crée le malheur.
  - type: text
    content: Oui, c’est moi, l’Eternel, ╵qui fais toutes ces choses.
  '8':
  - type: text
    content: O ciel, répands d’en haut ╵la justice comme une ondée,
  - type: text
    content: comme une pluie versée par les nuages.
  - type: text
    content: Que la terre s’entr’ouvre,
  - type: text
    content: que le salut bourgeonne
  - type: text
    content: et, dans le même temps, ╵que la justice germe !
  - type: text
    content: Moi, l’Eternel, ╵moi, j’ai créé ces choses.
  - type: heading
    content: L’artisan et son œuvre
  '9':
  - type: text
    content: Malheur à qui conteste ╵avec son créateur !
  - type: text
    content: Qu’es-tu de plus qu’un pot de terre ╵parmi des pots de terre ?
  - type: text
    content: 'L’argile dira-t-elle ╵à celui qui la forme :'
  - type: text
    content: « Qu’es-tu en train de faire ? »
  - type: text
    content: 'ou l’œuvre à son potier : ╵« Tu n’es qu’un maladroit'
  - type: note
    content: Repris en Rm 9.20.
  - type: text
    content: '  ! » ?'
