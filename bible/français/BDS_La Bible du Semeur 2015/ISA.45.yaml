document_id: ISA.45,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Libérateur viendra
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel domine sur toutes choses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi dit l’Eternel ╵à son oint, à Cyrus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cyrus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'oint '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de l’Eternel (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '44.28'
        - type: text
          text: ), car Dieu a suscité ce roi avec la mission de libérer son peuple. Cyrus est le seul souverain païen portant ce titre, celui-ci étant réservé au roi de Juda.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il a pris par la main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour abaisser ╵les nations devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et désarmer les rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ouvrir devant lui les deux battants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’aucune porte ╵ne lui reste fermée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Malheur à qui dit à un père :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Qu’as-tu engendré là ? »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ou bien à une femme :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Qu’as-tu donc mis au monde ? »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi dit l’Eternel, ╵lui le Saint d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'lui qui l’a façonné :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oserez-vous me questionner ╵sur ce qui doit venir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou me donnerez-vous des ordres ╵au sujet de mes fils ╵et au sujet de l’œuvre ╵que mes mains ont réalisée ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi, moi qui ai fait la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui, sur elle, ai créé l’homme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi, ce sont mes mains ╵qui ont tendu le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je donne des ordres ╵à toute son armée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui, selon la justice, ╵ai fait surgir cet homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire Cyrus.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aplanirai toutes ses voies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui, il rebâtira ma ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il libérera les miens ╵que l’on a déportés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans rançon ni présent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a dit le Seigneur des armées célestes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des peuples non israélites se rallient à l’Eternel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les profits de l’Egypte, ╵les gains de l’Ethiopie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des gens de Seba, ╵si hauts de taille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout cela passera chez toi, ╵cela t’appartiendra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces peuples viendront à ta suite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en marchant enchaînés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se prosterneront devant toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en te disant ╵sur un ton suppliant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « C’est chez toi seulement ╵que l’on peut trouver Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en dehors de lui, ╵il n’y en a pas d’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tous les autres dieux ╵ne sont que du néant. »
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En vérité, ô Dieu, ╵toi, tu es un Dieu qui te caches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu d’Israël et son Sauveur.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fabricants d’idoles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont honteux et confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s’en vont tous ensemble ╵couverts d’opprobre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, pour toujours, ╵sera sauvé par l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous ne serez plus jamais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni honteux ni confus.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que déclare l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a créé le ciel, ╵lui qui est Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a fait la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui l’a formée et affermie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne l’a pas créée ╵à l’état chaotique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais il l’a façonnée ╵pour que l’on y habite :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je suis l’Eternel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y en a pas d’autre.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas parlé en secret
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni dans un coin ténébreux de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car aux descendants de Jacob, ╵je n’ai pas dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Recherchez-moi dans le chaos. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je suis l’Eternel, ╵je dis ce qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je proclame ce qui est droit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, j’irai devant toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nivelant les montagnes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte de Qumrân. Le texte traditionnel est de sens incertain : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: murailles ?
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fracassant les battants de bronze
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et brisant les verrous de fer.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-vous, venez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: approchez tous ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rescapés des nations !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont sans connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui portent bien haut ╵leurs idoles de bois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et invoquent un dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne peut les sauver.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exposez votre cause, ╵avancez vos raisons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faites vos prédictions, exposez-les.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délibérez ensemble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc a fait savoir ces choses ╵dès le lointain passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui, depuis longtemps, ╵les avait annoncées ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas moi, ╵moi, l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en dehors de moi, ╵il n’y a pas de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, en dehors de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’est pas de Dieu juste, ╵de Dieu qui sauve.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tournez-vous donc vers moi, ╵et vous serez sauvés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui habitez ╵les confins de la terre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car moi seul je suis Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y en a pas d’autre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’en ai fait le serment ╵en jurant par moi-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma bouche a prononcé ╵une parole juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui est irrévocable :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant moi tout genou ploiera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute langue ╵prêtera serment par mon nom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Rm 14.11 ; Ph 2.10-11.
      marker-yv: yv-n
    - type: text
      text: ','
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disant à mon sujet :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « C’est en l’Eternel seul
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que résident pour moi ╵la justice et la force. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lui viendront, honteux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui, contre lui, ╵s’étaient mis en colère.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est grâce à l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tout le peuple d’Israël ╵sera justifié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s’en féliciteront.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te donnerai ╵les richesses cachées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les trésors ╵déposés dans des lieux secrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu saches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que c’est moi, l’Eternel, ╵moi qui t’appelle par ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi le Dieu d’Israël.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mon serviteur, Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d’Israël que j’ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t’ai appelé par ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t’ai donné un rang d’honneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que tu me connaisses.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je suis l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y en a pas d’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non, en dehors de moi, ╵il n’y a pas de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai doté de force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que tu me connaisses,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que du soleil levant ╵jusqu’au soleil couchant, ╵tout homme sache
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’en dehors de moi, ╵il n’y a que néant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je suis l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il n’y en a aucun autre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai formé la lumière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et créé les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je donne le bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je crée le malheur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c’est moi, l’Eternel, ╵qui fais toutes ces choses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O ciel, répands d’en haut ╵la justice comme une ondée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une pluie versée par les nuages.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la terre s’entr’ouvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le salut bourgeonne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans le même temps, ╵que la justice germe !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Eternel, ╵moi, j’ai créé ces choses.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’artisan et son œuvre
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à qui conteste ╵avec son créateur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’es-tu de plus qu’un pot de terre ╵parmi des pots de terre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’argile dira-t-elle ╵à celui qui la forme :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Qu’es-tu en train de faire ? »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ou l’œuvre à son potier : ╵« Tu n’es qu’un maladroit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Repris en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 9.20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ! » ?'
