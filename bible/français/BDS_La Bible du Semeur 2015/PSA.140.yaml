document_id: PSA.140,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivre-moi des calomniateurs !
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Que sur la tête ╵de ceux qui m’environnent
  - type: text
    content: retombe enfin le mal ╵provoqué par leurs lèvres !
  '11':
  - type: text
    content: Que des charbons ardents ╵soient déversés sur eux !
  - type: text
    content: Que dans le feu, ils soient précipités,
  - type: text
    content: au fond d’un gouffre ╵d’où ils ne pourront plus ╵se relever !
  '12':
  - type: text
    content: Que les mauvaises langues ╵ne se maintiennent pas ╵dans le pays
  - type: note
    content: 'Autre traduction : sur la terre.'
  - type: text
    content: '  !'
  - type: text
    content: Que l’homme violent ╵soit pourchassé sans trêve ╵par le malheur !
  '13':
  - type: text
    content: Je sais que l’Eternel ╵rendra justice aux pauvres
  - type: text
    content: et fera droit ╵aux défavorisés.
  '14':
  - type: text
    content: Alors les justes diront tes louanges.
  - type: text
    content: Les hommes droits ╵habiteront en ta présence.
  '2':
  - type: text
    content: O Eternel, ╵délivre-moi ╵des gens mauvais,
  - type: text
    content: préserve-moi ╵des violents !
  '3':
  - type: text
    content: Ils forment dans leur cœur ╵des desseins malveillants.
  - type: text
    content: Jour après jour, ╵ils cherchent des querelles.
  '4':
  - type: text
    content: Leur langue est acérée ╵tout comme celle d’un serpent,
  - type: text
    content: et ils sécrètent sous leurs lèvres ╵du venin de vipère
  - type: note
    content: Cité en Rm 3.13.
  - type: text
    content: .
  - type: text
    content: Pause
  '5':
  - type: text
    content: O Eternel, ╵préserve-moi ╵des griffes du méchant !
  - type: text
    content: Protège-moi ╵des violents,
  - type: text
    content: de ceux qui projettent ma chute.
  '6':
  - type: text
    content: Des arrogants ╵ont disposé des pièges ╵devant mes pas ;
  - type: text
    content: des gens pervers
  - type: note
    content: 'des gens pervers: cette traduction suppose une modification de la vocalisation du mot hébreu. Texte traditionnel : des liens.'
  - type: text
    content: ' ╵ont tendu leurs filets,'
  - type: text
    content: et le long du chemin, ╵ils ont placé des traquenards pour moi.
  - type: text
    content: Pause
  '7':
  - type: text
    content: 'J’ai dit à l’Eternel : ╵« Tu es mon Dieu ! »'
  - type: text
    content: O Eternel, prête attention ╵à mes supplications.
  '8':
  - type: text
    content: O Eternel, Seigneur, ╵toi, mon puissant Sauveur,
  - type: text
    content: tu protèges ma tête ╵au jour de la bataille.
  '9':
  - type: text
    content: O Eternel, ╵n’accorde pas ╵à ces méchants ╵ce qu’ils désirent !
  - type: text
    content: Ne laisse pas ╵leurs projets réussir, ╵car ils triompheraient.
  - type: text
    content: Pause
