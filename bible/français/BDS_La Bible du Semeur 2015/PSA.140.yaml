document_id: PSA.140
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délivre-moi des calomniateurs !
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Eternel, ╵délivre-moi ╵des gens mauvais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: préserve-moi ╵des violents !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils forment dans leur cœur ╵des desseins malveillants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jour après jour, ╵ils cherchent des querelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leur langue est acérée ╵tout comme celle d’un serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sécrètent sous leurs lèvres ╵du venin de vipère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '140.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 3.13
        metadata:
          usfm: ROM.3.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O Eternel, ╵préserve-moi ╵des griffes du méchant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège-moi ╵des violents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ceux qui projettent ma chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Des arrogants ╵ont disposé des pièges ╵devant mes pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: des gens pervers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '140.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des gens pervers
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cette traduction suppose une modification de la vocalisation du mot hébreu. Texte traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des liens.
    marker-yv: yv-n
  - type: text
    text: ' ╵ont tendu leurs filets,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le long du chemin, ╵ils ont placé des traquenards pour moi.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’ai dit à l’Eternel : ╵« Tu es mon Dieu ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, prête attention ╵à mes supplications.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O Eternel, Seigneur, ╵toi, mon puissant Sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu protèges ma tête ╵au jour de la bataille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Eternel, ╵n’accorde pas ╵à ces méchants ╵ce qu’ils désirent !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne laisse pas ╵leurs projets réussir, ╵car ils triompheraient.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que sur la tête ╵de ceux qui m’environnent
- type: usfm
  marker: q1
  children:
  - type: text
    text: retombe enfin le mal ╵provoqué par leurs lèvres !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que des charbons ardents ╵soient déversés sur eux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que dans le feu, ils soient précipités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au fond d’un gouffre ╵d’où ils ne pourront plus ╵se relever !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que les mauvaises langues ╵ne se maintiennent pas ╵dans le pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '140.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la terre.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’homme violent ╵soit pourchassé sans trêve ╵par le malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je sais que l’Eternel ╵rendra justice aux pauvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fera droit ╵aux défavorisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors les justes diront tes louanges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes droits ╵habiteront en ta présence.
