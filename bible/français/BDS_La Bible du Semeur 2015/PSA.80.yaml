document_id: PSA.80
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jusques à quand, Seigneur ?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, à chanter sur la mélodie des « Lis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Signification incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec accompagnement sur instrument à six cordes.
    marker-yv: yv-n
  - type: text
    text: ' de la Loi ». Psaume d’Asaph'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '50.1'
        metadata:
          usfm: PSA.50.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Berger d’Israël, ╵tends vers moi ton oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui conduis Joseph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Père d’Ephraïm et de Manassé (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 48.8-20
        metadata:
          usfm: GEN.48.8+GEN.48.9+GEN.48.10+GEN.48.11+GEN.48.12+GEN.48.13+GEN.48.14+GEN.48.15+GEN.48.16+GEN.48.17+GEN.48.18+GEN.48.19+GEN.48.20
      - type: text
        text: ) peut désigner les dix tribus du Nord, mais comme Joseph fut établi « fils aîné » par Jacob (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 48.5
        metadata:
          usfm: GEN.48.5
      - type: text
        text: ), ce nom peut aussi se référer à tout Israël.
    marker-yv: yv-n
  - type: text
    text: ' ╵comme un troupeau !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O toi qui sièges ╵entre les chérubins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux figures ailées qui dominaient le coffre sacré (Ex 25.22 ; 1 R 6.23-28).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: parais dans ta splendeur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: aux regards d’Ephraïm, ╵de Benjamin, ╵de Manassé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les trois tribus des descendants de Rachel qui suivaient immédiatement le coffre sacré (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 10.21-24
        metadata:
          usfm: NUM.10.21+NUM.10.22+NUM.10.23+NUM.10.24
      - type: text
        text: ) dans la marche vers le pays promis.
    marker-yv: yv-n
  - type: text
    text: '  ! ╵Déploie ta force !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens nous sauver !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O Dieu, rétablis-nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: montre-toi favorable, ╵et nous serons sauvés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O Eternel, ╵Dieu des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusques à quand ╵seras-tu en colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: en réponse aux prières ╵que t’adresse ton peuple ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu le nourris ╵d’un pain trempé de pleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu lui fais boire ╵des larmes sans mesure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu fais de nous ╵un brandon de discorde ╵pour nos voisins !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nos ennemis se moquent de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu des armées célestes, ╵rétablis-nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: montre-toi favorable, ╵et nous serons sauvés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu avais arraché ╵de l’Egypte une vigne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Israël est plusieurs fois comparé à une vigne (voir Es 5.1-7 ; 27.2-6 ; Ez 15.1-8 ; Jn 15.1-10).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis tu as chassé des peuplades, ╵et tu l’as replantée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu avais déblayé ╵le terrain devant elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle a pris racine ╵profondément en terre, ╵puis elle a rempli le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Son ombre couvrait les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses sarments ressemblaient ╵aux plus grands cèdres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elle étendait ╵ses vrilles vers la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses rejets ╵allaient jusqu’à l’Euphrate
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La mer Méditerranée et l’Euphrate étaient les limites extrêmes du royaume d’Israël sous David et Salomon.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi as-tu ╵défoncé ses clôtures ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les passants ╵viennent y grappiller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le sanglier ╵qui sort de la forêt ╵la retourne en tous sens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les animaux des champs ╵viennent y pâturer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dieu des armées célestes, ╵reviens enfin !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jette un regard ╵du haut du ciel et vois !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens t’occuper ╵de cette vigne !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Viens protéger ╵ce cep que tu as toi-même planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce rejeton
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il y a sans doute ici un jeu de mots sur le double sens du terme : le rejeton est le « rameau de Joseph » ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 49.22
        metadata:
          usfm: GEN.49.22
      - type: text
        text: ) mais aussi le rejeton davidique dont il est question au v. 18.
    marker-yv: yv-n
  - type: text
    text: ' ╵que tu as fait grandir pour toi !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On y a mis le feu, ╵elle a été coupée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que sous l’effet de ta colère ╵les ennemis périssent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Protège l’homme ╵qui se tient à ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cet homme que pour ton service ╵tu as fortifié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et, jamais plus, ╵nous ne te quitterons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-nous revivre ╵et nous t’invoquerons !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: O Eternel, ╵Dieu des armées célestes, ╵rétablis-nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: montre-toi favorable, ╵et nous serons sauvés !
