document_id: PSA.80,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jusques à quand, Seigneur ?
  - type: text
    content: Au chef de chœur, à chanter sur la mélodie des « Lis
  - type: note
    content: 'Signification incertaine. Autre traduction : avec accompagnement sur instrument à six cordes.'
  - type: text
    content: ' de la Loi ». Psaume d’Asaph'
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Tu avais déblayé ╵le terrain devant elle
  - type: text
    content: et elle a pris racine ╵profondément en terre, ╵puis elle a rempli le pays.
  '11':
  - type: text
    content: Son ombre couvrait les montagnes,
  - type: text
    content: ses sarments ressemblaient ╵aux plus grands cèdres.
  '12':
  - type: text
    content: Elle étendait ╵ses vrilles vers la mer
  - type: text
    content: et ses rejets ╵allaient jusqu’à l’Euphrate
  - type: note
    content: La mer Méditerranée et l’Euphrate étaient les limites extrêmes du royaume d’Israël sous David et Salomon.
  - type: text
    content: .
  '13':
  - type: text
    content: Pourquoi as-tu ╵défoncé ses clôtures ?
  - type: text
    content: Tous les passants ╵viennent y grappiller.
  '14':
  - type: text
    content: Le sanglier ╵qui sort de la forêt ╵la retourne en tous sens.
  - type: text
    content: Les animaux des champs ╵viennent y pâturer.
  '15':
  - type: text
    content: Dieu des armées célestes, ╵reviens enfin !
  - type: text
    content: Jette un regard ╵du haut du ciel et vois !
  - type: text
    content: Viens t’occuper ╵de cette vigne !
  '16':
  - type: text
    content: Viens protéger ╵ce cep que tu as toi-même planté,
  - type: text
    content: ce rejeton
  - type: note
    content: 'Il y a sans doute ici un jeu de mots sur le double sens du terme : le rejeton est le « rameau de Joseph » (Gn 49.22) mais aussi le rejeton davidique dont il est question au v. 18.'
  - type: text
    content: ' ╵que tu as fait grandir pour toi !'
  '17':
  - type: text
    content: On y a mis le feu, ╵elle a été coupée !
  - type: text
    content: Que sous l’effet de ta colère ╵les ennemis périssent !
  '18':
  - type: text
    content: Protège l’homme ╵qui se tient à ta droite,
  - type: text
    content: cet homme que pour ton service ╵tu as fortifié.
  '19':
  - type: text
    content: Et, jamais plus, ╵nous ne te quitterons.
  - type: text
    content: Fais-nous revivre ╵et nous t’invoquerons !
  '2':
  - type: text
    content: O Berger d’Israël, ╵tends vers moi ton oreille,
  - type: text
    content: toi qui conduis Joseph
  - type: note
    content: Père d’Ephraïm et de Manassé (Gn 48.8-20) peut désigner les dix tribus du Nord, mais comme Joseph fut établi « fils aîné » par Jacob (Gn 48.5), ce nom peut aussi se référer à tout Israël.
  - type: text
    content: ' ╵comme un troupeau !'
  - type: text
    content: O toi qui sièges ╵entre les chérubins
  - type: note
    content: Les deux figures ailées qui dominaient le coffre sacré (Ex 25.22 ; 1 R 6.23-28).
  - type: text
    content: ','
  - type: text
    content: parais dans ta splendeur
  '20':
  - type: text
    content: O Eternel, ╵Dieu des armées célestes, ╵rétablis-nous,
  - type: text
    content: montre-toi favorable, ╵et nous serons sauvés !
  '3':
  - type: text
    content: aux regards d’Ephraïm, ╵de Benjamin, ╵de Manassé
  - type: note
    content: Les trois tribus des descendants de Rachel qui suivaient immédiatement le coffre sacré (Nb 10.21-24) dans la marche vers le pays promis.
  - type: text
    content: '  ! ╵Déploie ta force !'
  - type: text
    content: Viens nous sauver !
  '4':
  - type: text
    content: O Dieu, rétablis-nous,
  - type: text
    content: montre-toi favorable, ╵et nous serons sauvés !
  '5':
  - type: text
    content: O Eternel, ╵Dieu des armées célestes,
  - type: text
    content: jusques à quand ╵seras-tu en colère
  - type: text
    content: en réponse aux prières ╵que t’adresse ton peuple ?
  '6':
  - type: text
    content: Tu le nourris ╵d’un pain trempé de pleurs.
  - type: text
    content: Tu lui fais boire ╵des larmes sans mesure.
  '7':
  - type: text
    content: Tu fais de nous ╵un brandon de discorde ╵pour nos voisins !
  - type: text
    content: Et nos ennemis se moquent de nous.
  '8':
  - type: text
    content: Dieu des armées célestes, ╵rétablis-nous,
  - type: text
    content: montre-toi favorable, ╵et nous serons sauvés !
  '9':
  - type: text
    content: Tu avais arraché ╵de l’Egypte une vigne
  - type: note
    content: Israël est plusieurs fois comparé à une vigne (voir Es 5.1-7 ; 27.2-6 ; Ez 15.1-8 ; Jn 15.1-10).
  - type: text
    content: ','
  - type: text
    content: puis tu as chassé des peuplades, ╵et tu l’as replantée.
