document_id: 1CH.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les descendants de Benjamin habitant à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Benjamin eut pour fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 1-5, voir 7.6-12 ; Gn 46.21-22 ; Nb 26.38-41.
    marker-yv: yv-n
  - type: text
    text: '  : Béla, son premier-né, Ashbel, le deuxième, Ahrah, le troisième, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Noha, le quatrième, et Rapha, le cinquième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Béla eut des fils : Addar, Guéra, Abihoud, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abishoua, Naaman, Ahoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Guéra, Shephouphân et Houram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Les fils d’Ehoud, Naaman, Ahiya et Guéra étaient les chefs de groupe familial des habitants de Guéba. Ceux-ci furent déplacés à Manahath. C’est Guéra qui les fit émigrer. Il eut pour fils Ouzza et Ahihoud.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Shaharaïm eut des enfants dans les plaines de Moab, après avoir renvoyé ses deux femmes Houshim et Baara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il eut, de Hodesh, sa femme : Yobab, Tsibia, Mésha, Malkam, Yeouts, Sakia et Mirma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tels sont les fils de Shaharaïm qui devinrent des chefs de groupe familial.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De son épouse Houshim, il avait eu Abitoub et Elpaal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fils d’Elpaal : Eber, Misheam et Shémer qui bâtit Ono, Lod et les localités qui en dépendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Beria et Shéma, qui étaient chefs de groupe familial parmi les habitants d’Ayalôn, mirent en fuite les habitants de Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis : Ahyo, Shashaq, Yerémoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zebadia, Arad, Eder, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Michaël, Yishpha et Yoha, les fils de Beria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis : Zebadia, Meshoullam, Hizqi, Héber, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Yishmeraï, Yizliya et Yobab, les fils d’Elpaal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis : Yaqim, Zikri, Zabdi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eliénaï, Tsiltaï, Eliel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Adaya, Beraya et Shimrath, les fils de Shimeï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis : Yishpân, Eber, Eliel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abdôn, Zikri, Hanân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hanania, Elam, Antotiya, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Yiphdeya et Penouel, les fils de Shashaq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Shamsheraï, Sheharia, Atalia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Yaaréshia, Eliya et Zikri, les fils de Yeroham.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 9.34-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ce sont là des chefs de groupe familial, chacun dans sa génération
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d’après leur généalogie.
    marker-yv: yv-n
  - type: text
    text: . Ils habitaient à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Le père de Gabaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chef '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (militaire ou civil). Certains manuscrits de l’ancienne version grecque (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 9.35
        metadata:
          usfm: 1CH.9.35
      - type: text
        text: ') précisent que ce '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 's’appelait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yeïel.
    marker-yv: yv-n
  - type: text
    text: ' habitait à Gabaon. Sa femme s’appelait Maaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Abdôn fut son fils premier-né, puis vinrent Tsour, Qish, Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 9.36
        metadata:
          usfm: 1CH.9.36
      - type: text
        text: ') ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ner.
    marker-yv: yv-n
  - type: text
    text: ', Nadab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Guedor, Ahyo et Zéker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Miqloth eut pour fils Shimea. Ces derniers habitaient eux aussi à Jérusalem, avec ceux qui leur étaient apparentés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ner eut pour fils Qish qui eut pour fils Saül ; les fils de Saül furent Jonathan, Malkishoua, Abinadab et Eshbaal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ishbosheth.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Jonathan eut pour fils Merib-Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mephibosheth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2 S 4.4 ; 9.6-13).
    marker-yv: yv-n
  - type: text
    text: ', qui eut pour fils Michée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fils de Michée : Pitôn, Mélek, Taréa et Ahaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ahaz eut pour fils Yehoadda, qui eut pour fils : Alémeth, Azmaveth et Zimri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voici les descendants de Zimri en ligne directe : Motsa, Binea, Rapha, Eleasa, Atsel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Atsel eut six fils, dont voici les noms : Azriqam, Bokrou, Ismaël, Shearia, Abdias et Hanân. Tels étaient les fils d’Atsel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Esheq était le frère d’Atsel. Il eut pour fils Oulam, son premier-né, Yeoush, le deuxième, et Eliphéleth, le troisième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Les fils d’Oulam furent des hommes de guerre valeureux, tireurs à l’arc ; ils eurent de nombreux fils et petits-fils : cent cinquante.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tels étaient les descendants de Benjamin.
