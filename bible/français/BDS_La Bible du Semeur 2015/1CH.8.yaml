document_id: 1CH.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de Benjamin habitant à Jérusalem
  - type: text
    content: Benjamin eut pour fils
  - type: note
    content: Pour les v. 1-5, voir 7.6-12 ; Gn 46.21-22 ; Nb 26.38-41.
  - type: text
    content: '  : Béla, son premier-né, Ashbel, le deuxième, Ahrah, le troisième, '
  '10':
  - type: text
    content: Tels sont les fils de Shaharaïm qui devinrent des chefs de groupe familial.
  '11':
  - type: text
    content: 'De son épouse Houshim, il avait eu Abitoub et Elpaal. '
  '12':
  - type: text
    content: 'Fils d’Elpaal : Eber, Misheam et Shémer qui bâtit Ono, Lod et les localités qui en dépendaient. '
  '13':
  - type: text
    content: 'Beria et Shéma, qui étaient chefs de groupe familial parmi les habitants d’Ayalôn, mirent en fuite les habitants de Gath. '
  '14':
  - type: text
    content: 'Puis : Ahyo, Shashaq, Yerémoth, '
  '15':
  - type: text
    content: 'Zebadia, Arad, Eder, '
  '16':
  - type: text
    content: 'Michaël, Yishpha et Yoha, les fils de Beria. '
  '17':
  - type: text
    content: 'Puis : Zebadia, Meshoullam, Hizqi, Héber, '
  '18':
  - type: text
    content: 'Yishmeraï, Yizliya et Yobab, les fils d’Elpaal. '
  '19':
  - type: text
    content: 'Puis : Yaqim, Zikri, Zabdi, '
  '2':
  - type: text
    content: 'Noha, le quatrième, et Rapha, le cinquième. '
  '20':
  - type: text
    content: 'Eliénaï, Tsiltaï, Eliel, '
  '21':
  - type: text
    content: 'Adaya, Beraya et Shimrath, les fils de Shimeï, '
  '22':
  - type: text
    content: 'Puis : Yishpân, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdôn, Zikri, Hanân, '
  '24':
  - type: text
    content: 'Hanania, Elam, Antotiya, '
  '25':
  - type: text
    content: 'Yiphdeya et Penouel, les fils de Shashaq. '
  '26':
  - type: text
    content: 'Shamsheraï, Sheharia, Atalia, '
  '27':
  - type: text
    content: Yaaréshia, Eliya et Zikri, les fils de Yeroham.
  - type: heading
    content: (1 Ch 9.34-44)
  '28':
  - type: text
    content: Ce sont là des chefs de groupe familial, chacun dans sa génération
  - type: note
    content: 'Autre traduction : d’après leur généalogie.'
  - type: text
    content: . Ils habitaient à Jérusalem.
  '29':
  - type: text
    content: Le père de Gabaon
  - type: note
    content: Le terme père pourrait aussi signifier chef (militaire ou civil). Certains manuscrits de l’ancienne version grecque (1 Ch 9.35) précisent que ce père s’appelait Yeïel.
  - type: text
    content: ' habitait à Gabaon. Sa femme s’appelait Maaka. '
  '3':
  - type: text
    content: 'Béla eut des fils : Addar, Guéra, Abihoud, '
  '30':
  - type: text
    content: Abdôn fut son fils premier-né, puis vinrent Tsour, Qish, Baal
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque (voir 1 Ch 9.36) ajoutent : Ner.'
  - type: text
    content: ', Nadab, '
  '31':
  - type: text
    content: 'Guedor, Ahyo et Zéker. '
  '32':
  - type: text
    content: 'Miqloth eut pour fils Shimea. Ces derniers habitaient eux aussi à Jérusalem, avec ceux qui leur étaient apparentés. '
  '33':
  - type: text
    content: Ner eut pour fils Qish qui eut pour fils Saül ; les fils de Saül furent Jonathan, Malkishoua, Abinadab et Eshbaal
  - type: note
    content: Autre nom de Ishbosheth.
  - type: text
    content: '. '
  '34':
  - type: text
    content: Jonathan eut pour fils Merib-Baal
  - type: note
    content: Autre nom de Mephibosheth (2 S 4.4 ; 9.6-13).
  - type: text
    content: ', qui eut pour fils Michée. '
  '35':
  - type: text
    content: 'Fils de Michée : Pitôn, Mélek, Taréa et Ahaz. '
  '36':
  - type: text
    content: 'Ahaz eut pour fils Yehoadda, qui eut pour fils : Alémeth, Azmaveth et Zimri. '
  '37':
  - type: text
    content: 'Voici les descendants de Zimri en ligne directe : Motsa, Binea, Rapha, Eleasa, Atsel. '
  '38':
  - type: text
    content: 'Atsel eut six fils, dont voici les noms : Azriqam, Bokrou, Ismaël, Shearia, Abdias et Hanân. Tels étaient les fils d’Atsel.'
  '39':
  - type: text
    content: 'Esheq était le frère d’Atsel. Il eut pour fils Oulam, son premier-né, Yeoush, le deuxième, et Eliphéleth, le troisième. '
  '4':
  - type: text
    content: 'Abishoua, Naaman, Ahoah, '
  '40':
  - type: text
    content: 'Les fils d’Oulam furent des hommes de guerre valeureux, tireurs à l’arc ; ils eurent de nombreux fils et petits-fils : cent cinquante.'
  - type: text
    content: Tels étaient les descendants de Benjamin.
  '5':
  - type: text
    content: Guéra, Shephouphân et Houram.
  '6':
  - type: text
    content: Les fils d’Ehoud, Naaman, Ahiya et Guéra étaient les chefs de groupe familial des habitants de Guéba. Ceux-ci furent déplacés à Manahath. C’est Guéra qui les fit émigrer. Il eut pour fils Ouzza et Ahihoud.
  '8':
  - type: text
    content: 'Shaharaïm eut des enfants dans les plaines de Moab, après avoir renvoyé ses deux femmes Houshim et Baara. '
  '9':
  - type: text
    content: 'Il eut, de Hodesh, sa femme : Yobab, Tsibia, Mésha, Malkam, Yeouts, Sakia et Mirma. '
