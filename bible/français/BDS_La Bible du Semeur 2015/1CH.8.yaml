document_id: 1CH.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Benjamin habitant à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benjamin eut pour fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 1-5, voir 7.6-12 ; Gn 46.21-22 ; Nb 26.38-41.
      marker-yv: yv-n
    - type: text
      text: '  : Béla, son premier-né, Ashbel, le deuxième, Ahrah, le troisième, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tels sont les fils de Shaharaïm qui devinrent des chefs de groupe familial.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De son épouse Houshim, il avait eu Abitoub et Elpaal. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Elpaal : Eber, Misheam et Shémer qui bâtit Ono, Lod et les localités qui en dépendaient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beria et Shéma, qui étaient chefs de groupe familial parmi les habitants d’Ayalôn, mirent en fuite les habitants de Gath. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis : Ahyo, Shashaq, Yerémoth, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zebadia, Arad, Eder, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Michaël, Yishpha et Yoha, les fils de Beria. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis : Zebadia, Meshoullam, Hizqi, Héber, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yishmeraï, Yizliya et Yobab, les fils d’Elpaal. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis : Yaqim, Zikri, Zabdi, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noha, le quatrième, et Rapha, le cinquième. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliénaï, Tsiltaï, Eliel, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adaya, Beraya et Shimrath, les fils de Shimeï, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis : Yishpân, Eber, Eliel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abdôn, Zikri, Hanân, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanania, Elam, Antotiya, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yiphdeya et Penouel, les fils de Shashaq. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shamsheraï, Sheharia, Atalia, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yaaréshia, Eliya et Zikri, les fils de Yeroham.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 9.34-44)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont là des chefs de groupe familial, chacun dans sa génération
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d’après leur généalogie.
      marker-yv: yv-n
    - type: text
      text: . Ils habitaient à Jérusalem.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le père de Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (militaire ou civil). Certains manuscrits de l’ancienne version grecque (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 9.35
        - type: text
          text: ') précisent que ce '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 's’appelait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yeïel.
      marker-yv: yv-n
    - type: text
      text: ' habitait à Gabaon. Sa femme s’appelait Maaka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béla eut des fils : Addar, Guéra, Abihoud, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abdôn fut son fils premier-né, puis vinrent Tsour, Qish, Baal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 9.36
        - type: text
          text: ') ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ner.
      marker-yv: yv-n
    - type: text
      text: ', Nadab, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guedor, Ahyo et Zéker. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miqloth eut pour fils Shimea. Ces derniers habitaient eux aussi à Jérusalem, avec ceux qui leur étaient apparentés. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ner eut pour fils Qish qui eut pour fils Saül ; les fils de Saül furent Jonathan, Malkishoua, Abinadab et Eshbaal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ishbosheth.
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jonathan eut pour fils Merib-Baal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mephibosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2 S 4.4 ; 9.6-13).
      marker-yv: yv-n
    - type: text
      text: ', qui eut pour fils Michée. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Michée : Pitôn, Mélek, Taréa et Ahaz. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz eut pour fils Yehoadda, qui eut pour fils : Alémeth, Azmaveth et Zimri. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les descendants de Zimri en ligne directe : Motsa, Binea, Rapha, Eleasa, Atsel. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atsel eut six fils, dont voici les noms : Azriqam, Bokrou, Ismaël, Shearia, Abdias et Hanân. Tels étaient les fils d’Atsel.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esheq était le frère d’Atsel. Il eut pour fils Oulam, son premier-né, Yeoush, le deuxième, et Eliphéleth, le troisième. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishoua, Naaman, Ahoah, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Oulam furent des hommes de guerre valeureux, tireurs à l’arc ; ils eurent de nombreux fils et petits-fils : cent cinquante.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tels étaient les descendants de Benjamin.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Guéra, Shephouphân et Houram.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les fils d’Ehoud, Naaman, Ahiya et Guéra étaient les chefs de groupe familial des habitants de Guéba. Ceux-ci furent déplacés à Manahath. C’est Guéra qui les fit émigrer. Il eut pour fils Ouzza et Ahihoud.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shaharaïm eut des enfants dans les plaines de Moab, après avoir renvoyé ses deux femmes Houshim et Baara. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut, de Hodesh, sa femme : Yobab, Tsibia, Mésha, Malkam, Yeouts, Sakia et Mirma. '
