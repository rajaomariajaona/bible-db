document_id: ACT.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le départ pour Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand il fut décidé que nous partirions en bateau pour l’Italie, on confia Paul et quelques autres prisonniers à la garde d’un officier du bataillon impérial, nommé Julius. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nous nous sommes embarqués sur un navire d’Adramytte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adramytte
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: port de la côte ouest d’Asie Mineure, proche de Troas.
    marker-yv: yv-n
  - type: text
    text: ', qui devait se rendre dans les ports d’Asie Mineure, et nous sommes partis. Nous avions avec nous Aristarque de Thessalonique en Macédoine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le lendemain, nous avons fait escale à Sidon. Julius, qui témoignait une grande bienveillance à Paul, lui a permis alors de se rendre chez ses amis pour recevoir leur aide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Une fois repartis de là, nous avons longé la côte de Chypre pour nous protéger des vents contraires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis nous avons traversé la mer qui baigne la Cilicie et la Pamphylie, et nous avons débarqué à Myra, en Lycie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Là, l’officier a trouvé un bateau d’Alexandrie qui était sur le point de partir pour l’Italie et il nous a fait monter à son bord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pendant plusieurs jours, nous avons navigué lentement et c’est avec beaucoup de peine que nous sommes parvenus à la hauteur de Cnide. Mais le vent ne nous permettait plus d’avancer dans cette direction, et nous sommes passés au sud de la Crète, en doublant le cap Salmoné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous avons eu du mal à longer la côte et nous sommes arrivés à un endroit appelé « Beaux-Ports », près de la ville de Lasée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tempête et naufrage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Beaucoup de temps s’était écoulé ainsi, et la navigation devenait dangereuse, car l’époque du grand jeûne d’automne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grand jeûne d’automne
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c’est-à-dire le grand jour des Expiations où le grand-prêtre offrait un sacrifice pour tous les péchés du peuple. Cette fête, accompagnée d’un jeûne, tombait en septembre ou début octobre. A cette époque, la navigation devenait dangereuse.
    marker-yv: yv-n
  - type: text
    text: ' était déjà passée.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Paul leur a donné cet avertissement : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mes amis, je considère que, si nous continuons notre voyage, non seulement la cargaison et le bateau subiront de grands dommages, mais nous-mêmes nous risquerons notre vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais l’officier romain se fiait plus à l’opinion du pilote et du patron du bateau qu’aux paroles de Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De plus, comme le port ne convenait pas à un hivernage, la majorité a décidé d’en repartir pour gagner, si possible, Phénix, un port de Crète orienté vers le sud-ouest et le nord-ouest, et d’y passer l’hiver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Une légère brise du sud s’était levée et ils voyaient déjà leur projet réalisé. Ils ont donc levé l’ancre et longé la côte de Crète au plus près.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais peu de temps après, un vent violent comme un typhon – connu sous le nom d’euraquilon – s’est mis à souffler des hauteurs de l’île. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le bateau était entraîné au large : il ne pouvait pas résister au vent et nous avons dû nous laisser emporter à la dérive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous avons passé ainsi au sud d’une petite île appelée Cauda. Comme elle nous abritait un peu du vent, nous en avons profité pour nous rendre maîtres du canot de sauvetage. Nous sommes parvenus, à grand-peine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'à le hisser à bord. Puis on a eu recours à des moyens de fortune : on a ceinturé tout le bateau de cordages. Comme on avait peur d’échouer sur les bancs de sable de la Syrte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur les côtes de Libye.
    marker-yv: yv-n
  - type: text
    text: ', on a jeté l’ancre flottante'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l’ancre flottante
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pièce de bois remorquée par le bateau pour lui permettre de rester dans l’axe du vent. Selon certains : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on abaissa la voile.
    marker-yv: yv-n
  - type: text
    text: ' et l’on continuait ainsi à dériver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le lendemain, comme la tempête n’arrêtait pas de secouer le bateau avec violence, on l’a délesté d’une partie de sa cargaison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le troisième jour, les matelots ont jeté, de leurs propres mains, tous les agrès du bateau à la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pendant plusieurs jours, on ne voyait plus ni le soleil ni les étoiles. La tempête continuait de faire rage et nous finissions par perdre tout espoir d’en sortir sains et saufs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il y avait longtemps qu’on n’avait plus rien mangé.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Paul, debout au milieu d’eux, leur a dit : Mes amis, vous auriez mieux fait de m’écouter et de ne pas quitter la Crète. Vous auriez évité tous ces dégâts et toutes ces pertes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais maintenant, je vous invite à reprendre courage, car aucun de vous n’y perdra la vie ; seul le bateau sera perdu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, cette nuit, un ange du Dieu à qui j’appartiens et que je sers, s’est présenté devant moi '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et m’a dit : « Paul, ne crains rien ! Il faut que tu comparaisses devant l’empereur, et Dieu t’accorde la vie sauve pour tous tes compagnons de voyage. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Courage donc, mes amis ! J’ai confiance en Dieu : tout se passera comme il me l’a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nous devons échouer quelque part sur une île.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’était la quatorzième nuit que nous étions ainsi ballottés sur l’Adriatique quand, vers le milieu de la nuit, les marins ont eu l’impression qu’on approchait d’une terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils ont jeté la sonde et ont découvert que le fond était à trente-sept mètres. Un peu plus loin, ils ont recommencé et trouvé le fond à vingt-huit mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme ils avaient peur de voir le bateau s’écraser sur quelque récif, ils ont jeté quatre ancres à l’arrière en attendant avec impatience la venue du jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Alors les marins, qui voulaient s’enfuir du bateau, ont commencé à mettre à la mer le canot de sauvetage, sous prétexte d’aller amarrer une ancre à l’avant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais Paul a dit à l’officier romain et aux soldats : Attention, si ces hommes ne restent pas à bord, vous ne pourrez plus être sauvés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Alors les soldats ont coupé les cordages retenant le canot et l’ont laissé tomber à la mer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'En attendant que le jour paraisse, Paul a encouragé tout le monde à manger : Voilà quatorze jours, leur a-t-il dit, que vous êtes dans l’attente, sans rien prendre à manger ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous encourage donc vivement à prendre de la nourriture maintenant. Vous en avez besoin pour vous tirer de là. Encore une fois, croyez-moi : aucun de vous ne perdra un cheveu de sa tête.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après avoir ainsi parlé, il a pris du pain et il a remercié Dieu devant tous ; puis il a rompu le pain et a commencé à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors tous les autres ont repris courage et se sont aussi mis à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Nous étions en tout deux cent soixante-seize personnes à bord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Une fois rassasiés, ils ont continué à délester le bateau en jetant le reste des provisions de blé à la mer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais lorsque le jour était venu, aucun des membres de l’équipage ne reconnaissait l’endroit. Ils entrevoyaient seulement, au fond d’une baie, une plage de sable. Ils ont alors décidé d’y faire échouer le bateau, si c’était possible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Les matelots ont coupé les câbles des ancres qu’ils ont abandonnées à la mer ; en même temps, ils ont délié les courroies de deux grandes rames servant de gouvernails et hissé au vent la voile de misaine au mât d’artimon. Ils avaient mis le cap sur la plage '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: quand le bateau a touché un banc de sable battu des deux côtés par la mer et s’y est échoué. L’avant s’est enfoncé dans le sol, s’immobilisant définitivement, tandis que l’arrière commençait à se disloquer sous la violence des vagues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les soldats avaient l’intention de tuer tous les prisonniers, de peur d’en voir s’échapper à la nage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Mais l’officier désirait sauver Paul et les a empêché d’exécuter leur projet. Il a donné ordre à ceux qui savaient nager de sauter à l’eau les premiers pour gagner la terre ferme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Les autres suivraient en s’agrippant à des planches ou à des épaves du bateau. C’est ainsi que tous sont arrivés sains et saufs sur le rivage.
