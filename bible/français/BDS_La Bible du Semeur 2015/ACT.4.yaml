document_id: ACT.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pierre et Jean devant le Grand-Conseil
  - type: text
    content: Pendant qu’ils parlaient ainsi à la foule, survinrent quelques prêtres
  - type: note
    content: 'Certains manuscrits ont : les chefs des prêtres.'
  - type: text
    content: ' accompagnés du chef de la police du Temple'
  - type: note
    content: Le chef de la police du Temple était le personnage le plus important après le grand-prêtre.
  - type: text
    content: ' et des membres du parti des sadducéens : '
  '10':
  - type: text
    content: 'Eh bien, sachez-le tous, et que tout le peuple d’Israël le sache : c’est au nom de Jésus-Christ de Nazareth que nous avons agi, de ce Jésus que vous avez crucifié et que Dieu a ressuscité ; c’est grâce à lui que cet homme se tient là, debout, devant vous, en bonne santé. '
  '11':
  - type: text
    content: 'Il est '
  - type: text
    content: la pierre rejetée par les constructeurs
  - type: text
    content: ' – par vous – '
  - type: text
    content: et qui est devenue la pierre principale, la pierre d’angle
  - type: note
    content: Ps 118.22.
  - type: text
    content: '. '
  '12':
  - type: text
    content: C’est en lui seul que se trouve le salut. Dans le monde entier, Dieu n’a jamais donné le nom d’aucun autre homme par lequel nous devions être sauvés.
  '13':
  - type: text
    content: 'Les membres du Grand-Conseil étaient étonnés de voir l’assurance de Pierre et de Jean, car ils se rendaient compte que c’étaient des gens simples et sans instruction ; ils les reconnaissaient pour avoir été avec Jésus. '
  '14':
  - type: text
    content: Mais, comme ils voyaient, debout à côté d’eux, l’homme qui avait été guéri, ils ne trouvaient rien à répondre.
  '15':
  - type: text
    content: 'Alors ils leur ordonnèrent de sortir de la salle et délibérèrent entre eux : '
  '16':
  - type: text
    content: 'Qu’allons-nous faire de ces gens-là ? disaient-ils. Car ils ont accompli un signe miraculeux évident et tous les habitants de Jérusalem sont au courant. Nous ne pouvons pas le nier. '
  '17':
  - type: text
    content: Mais il ne faut pas que cela s’ébruite davantage parmi le peuple. Défendons-leur donc, sous peine de sanctions, de parler désormais à qui que ce soit au nom de Jésus.
  '18':
  - type: text
    content: Là-dessus, ils les firent rappeler et leur interdirent formellement de parler ou d’enseigner au nom de Jésus.
  '19':
  - type: text
    content: 'Mais Pierre et Jean leur répondirent : Jugez-en vous-mêmes : est-il juste devant Dieu de vous obéir, plutôt qu’à Dieu ? '
  '2':
  - type: text
    content: ils étaient irrités de voir les apôtres enseigner le peuple et leur annoncer que, puisque Jésus était ressuscité, les morts ressusciteraient eux aussi
  - type: note
    content: Les sadducéens ne croyaient pas à la résurrection des morts.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Quant à nous, nous ne pouvons pas garder le silence sur ce que nous avons vu et entendu.
  '21':
  - type: text
    content: 'Après leur avoir fait de nouvelles menaces, ils les relâchèrent. En effet, ils n’avaient pas trouvé de moyen de les punir, parce que tout le peuple louait Dieu pour ce qui venait d’arriver. '
  '22':
  - type: text
    content: L’homme qui avait été miraculeusement guéri était âgé de plus de quarante ans.
  - type: heading
    content: Prière des croyants
  '23':
  - type: text
    content: Sitôt libérés, Pierre et Jean se rendirent auprès de leurs amis et leur racontèrent tout ce que les chefs des prêtres et les responsables du peuple leur avaient dit.
  '24':
  - type: text
    content: 'Après les avoir écoutés, tous, unanimes, se mirent à prier Dieu, disant :'
  - type: text
    content: 'Maître, c’est toi qui as créé le ciel, la terre, la mer et tout ce qui s’y trouve. '
  '25':
  - type: text
    content: 'C’est toi qui as dit par l’Esprit Saint qui s’est exprimé par la bouche de notre ancêtre David, ton serviteur :'
  - type: text
    content: Pourquoi tant d’effervescence
  - type: text
    content: parmi les nations ?
  - type: text
    content: Et pourquoi les peuples
  - type: text
    content: trament-ils ces complots inutiles ?
  '26':
  - type: text
    content: ' '
  - type: text
    content: Les rois de la terre
  - type: text
    content: se sont soulevés
  - type: text
    content: et les chefs se sont ligués
  - type: text
    content: 'contre le Seigneur et son '
  - type: text
    content: Messie
  - type: text
    content: ' '
  - type: note
    content: Ps 2.1-2 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '27':
  - type: text
    content: 'En effet, c’est bien une '
  - type: text
    content: ligue
  - type: text
    content: ' qu’Hérode et Ponce Pilate, les peuples étrangers et les peuples d’Israël ont formée dans cette ville contre ton saint serviteur Jésus, que tu as choisi comme Messie. '
  '28':
  - type: text
    content: 'Ils n’ont fait qu’accomplir tout ce que tu avais décidé d’avance, dans ta puissance et ta volonté. '
  '29':
  - type: text
    content: 'Maintenant, Seigneur, vois comme ils nous menacent, et donne à tes serviteurs la force d’annoncer ta Parole avec une pleine assurance. '
  '3':
  - type: text
    content: Ils les arrêtèrent donc et, comme il se faisait déjà tard
  - type: note
    content: C’était le soir. Or, après 16 h, les portes des parvis étaient fermées. Tout jugement pouvant aboutir à une peine de mort devait être rendu de jour.
  - type: text
    content: ', ils les jetèrent en prison jusqu’au lendemain. '
  '30':
  - type: text
    content: Etends ta main pour qu’il se produise des guérisons, des miracles et d’autres signes au nom de ton saint serviteur Jésus.
  '31':
  - type: text
    content: Quand ils eurent fini de prier, la terre se mit à trembler sous leurs pieds à l’endroit où ils étaient assemblés. Ils furent tous remplis du Saint-Esprit et annonçaient la Parole de Dieu avec assurance.
  - type: heading
    content: La solidarité des croyants
  '32':
  - type: text
    content: Tous ceux qui étaient devenus des croyants vivaient dans une parfaite unité de cœur et d’esprit. Personne ne se prétendait propriétaire de ses biens, mais ils partageaient tout ce qu’ils avaient.
  '33':
  - type: text
    content: Avec une grande puissance, les apôtres rendaient témoignage de la résurrection du Seigneur Jésus, et la grâce de Dieu agissait avec force en eux tous.
  '34':
  - type: text
    content: 'Aucun d’eux n’était dans le besoin, car ceux qui possédaient des champs ou des maisons les vendaient, apportaient le produit de la vente '
  '35':
  - type: text
    content: 'et le remettaient aux apôtres : ceux-ci le répartissaient alors entre tous et chacun recevait ce dont il avait besoin. '
  '36':
  - type: text
    content: C’est ainsi que, par exemple, un certain Joseph possédait un terrain. C’était un lévite originaire de Chypre
  - type: note
    content: Beaucoup de Juifs s’étaient établis dans cette île de l’est de la Méditerranée à partir de l’époque des Maccabées au iie siècle avant notre ère.
  - type: text
    content: '  ; les apôtres le surnommaient Barnabas, ce qui veut dire « l’homme qui encourage ». '
  '37':
  - type: text
    content: Il vendit son terrain, apporta l’argent et en remit le produit aux apôtres.
  '4':
  - type: text
    content: Cependant, parmi ceux qui avaient entendu leurs paroles, beaucoup crurent, ce qui porta le nombre des croyants à près de cinq mille hommes.
  '5':
  - type: text
    content: 'Le lendemain, les chefs des Juifs, les responsables du peuple et les spécialistes de la Loi se réunirent à Jérusalem. '
  '6':
  - type: text
    content: Il y avait là, en particulier, Hanne le grand-prêtre
  - type: note
    content: Hanne avait été déposé par les Romains mais le peuple continuait à le considérer comme le grand-prêtre alors que son gendre Caïphe remplissait cette fonction.
  - type: text
    content: ', Caïphe, Jean'
  - type: note
    content: 'D’autres manuscrits ont : Jonathan.'
  - type: text
    content: ', Alexandre et tous les membres de la famille du grand-prêtre. '
  '7':
  - type: text
    content: 'Ils firent comparaître Pierre et Jean, les placèrent au milieu de leur assemblée et les interrogèrent : Par quel pouvoir ou au nom de qui avez-vous fait cela ?'
  '8':
  - type: text
    content: 'Alors Pierre, rempli de l’Esprit Saint, leur répondit :'
  - type: text
    content: 'Dirigeants et responsables de notre peuple ! '
  '9':
  - type: text
    content: 'Nous sommes aujourd’hui interrogés sur le bien que nous avons fait à un infirme et sur la manière dont il a été guéri. '
