document_id: LEV.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque quelqu’un apportera à l’Eternel une offrande
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette offrande consistait en produits du sol cultivé. Elle accompagnait les sacrifices sanglants.
    marker-yv: yv-n
  - type: text
    text: ', elle consistera en fleur de farine qu’il arrosera d’huile et sur laquelle il mettra de l’encens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il l’apportera aux prêtres, descendants d’Aaron. Le prêtre prendra une pleine poignée de la farine arrosée d’huile, avec tout l’encens, et la fera brûler pour servir de mémorial sur l’autel. C’est une offrande consumée par le feu, à l’odeur apaisante pour l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce qui restera de cette offrande reviendra à Aaron et à ses descendants comme part très sainte de ce qui est consumé par le feu pour l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'part très sainte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était réservée aux prêtres et elle consacrait ceux qui la touchaient (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29.37
        metadata:
          usfm: EXO.29.37
      - type: text
        text: ). Elle ne pouvait être mangée que dans le parvis du sanctuaire (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6.16-19
        metadata:
          usfm: LEV.6.16+LEV.6.17+LEV.6.18+LEV.6.19
      - type: text
        text: ), par les prêtres eux-mêmes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lorsqu’on apportera une offrande de pâte cuite au four
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sorte de jarre en terre que l’on chauffait en y allumant du feu. Ensuite on sortait les braises et l’on appliquait la pâte sur les parois intérieures.
    marker-yv: yv-n
  - type: text
    text: ', elle consistera en gâteaux sans levain'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seules les offrandes accompagnant les sacrifices de communion ou les offrandes de prémices pouvaient contenir du levain (7.13 ; 23.10, 17).
    marker-yv: yv-n
  - type: text
    text: ' faits avec de la fleur de farine pétrie avec de l’huile, et en galettes sans levain arrosées d’huile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si c’est une offrande rôtie sur le gril qu’on apporte, elle sera également faite de fleur de farine pétrie avec de l’huile, sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On la coupera en morceaux et on versera de l’huile dessus : c’est une offrande.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si c’est une offrande de céréales cuite à la poêle qu’on apporte, elle sera composée de fleur de farine et d’huile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On apportera l’offrande ainsi préparée à l’Eternel pour la remettre au prêtre qui l’approchera de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il en prélèvera ce qui doit être offert comme mémorial et le brûlera sur l’autel. C’est une offrande consumée par le feu, à l’odeur apaisante pour l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce qui restera de l’offrande sera pour Aaron et ses fils, comme part très sainte de ce qui est consumé par le feu pour l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quelle que soit l’offrande que vous apporterez à l’Eternel, elle ne devra pas être confectionnée avec du levain, car on ne brûlera jamais ni levain ni miel pour l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous en offrirez à l’Eternel comme présents des premiers fruits, mais ils ne seront pas placés sur l’autel comme offrandes à l’odeur apaisante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On assaisonnera de sel toute offrande qu’on apportera. On n’omettra jamais de mettre du sel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chez divers peuples, on consommait du sel lors des conclusions d’alliance.
    marker-yv: yv-n
  - type: text
    text: ', qui représente l’alliance qui te lie à ton Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si on apporte à l’Eternel une offrande des premiers épis de la moisson, on présentera pour cette offrande, des épis grillés au feu, des grains nouveaux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On y versera de l’huile et on mettra de l’encens dessus ; c’est une offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le prêtre brûlera comme mémorial une partie du grain et de l’huile avec tout l’encens. C’est une offrande consumée par le feu pour l’Eternel.
