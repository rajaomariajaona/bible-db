document_id: LEV.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les offrandes
  - type: text
    content: Lorsque quelqu’un apportera à l’Eternel une offrande
  - type: note
    content: Cette offrande consistait en produits du sol cultivé. Elle accompagnait les sacrifices sanglants.
  - type: text
    content: ', elle consistera en fleur de farine qu’il arrosera d’huile et sur laquelle il mettra de l’encens. '
  '10':
  - type: text
    content: Ce qui restera de l’offrande sera pour Aaron et ses fils, comme part très sainte de ce qui est consumé par le feu pour l’Eternel.
  '11':
  - type: text
    content: 'Quelle que soit l’offrande que vous apporterez à l’Eternel, elle ne devra pas être confectionnée avec du levain, car on ne brûlera jamais ni levain ni miel pour l’Eternel. '
  '12':
  - type: text
    content: Vous en offrirez à l’Eternel comme présents des premiers fruits, mais ils ne seront pas placés sur l’autel comme offrandes à l’odeur apaisante.
  '13':
  - type: text
    content: On assaisonnera de sel toute offrande qu’on apportera. On n’omettra jamais de mettre du sel
  - type: note
    content: Chez divers peuples, on consommait du sel lors des conclusions d’alliance.
  - type: text
    content: ', qui représente l’alliance qui te lie à ton Dieu.'
  '14':
  - type: text
    content: 'Si on apporte à l’Eternel une offrande des premiers épis de la moisson, on présentera pour cette offrande, des épis grillés au feu, des grains nouveaux. '
  '15':
  - type: text
    content: 'On y versera de l’huile et on mettra de l’encens dessus ; c’est une offrande. '
  '16':
  - type: text
    content: Le prêtre brûlera comme mémorial une partie du grain et de l’huile avec tout l’encens. C’est une offrande consumée par le feu pour l’Eternel.
  '2':
  - type: text
    content: 'Il l’apportera aux prêtres, descendants d’Aaron. Le prêtre prendra une pleine poignée de la farine arrosée d’huile, avec tout l’encens, et la fera brûler pour servir de mémorial sur l’autel. C’est une offrande consumée par le feu, à l’odeur apaisante pour l’Eternel. '
  '3':
  - type: text
    content: Ce qui restera de cette offrande reviendra à Aaron et à ses descendants comme part très sainte de ce qui est consumé par le feu pour l’Eternel
  - type: note
    content: La part très sainte était réservée aux prêtres et elle consacrait ceux qui la touchaient (Ex 29.37). Elle ne pouvait être mangée que dans le parvis du sanctuaire (6.16-19), par les prêtres eux-mêmes.
  - type: text
    content: .
  '4':
  - type: text
    content: Lorsqu’on apportera une offrande de pâte cuite au four
  - type: note
    content: Sorte de jarre en terre que l’on chauffait en y allumant du feu. Ensuite on sortait les braises et l’on appliquait la pâte sur les parois intérieures.
  - type: text
    content: ', elle consistera en gâteaux sans levain'
  - type: note
    content: Seules les offrandes accompagnant les sacrifices de communion ou les offrandes de prémices pouvaient contenir du levain (7.13 ; 23.10, 17).
  - type: text
    content: ' faits avec de la fleur de farine pétrie avec de l’huile, et en galettes sans levain arrosées d’huile.'
  '5':
  - type: text
    content: 'Si c’est une offrande rôtie sur le gril qu’on apporte, elle sera également faite de fleur de farine pétrie avec de l’huile, sans levain. '
  '6':
  - type: text
    content: 'On la coupera en morceaux et on versera de l’huile dessus : c’est une offrande.'
  '7':
  - type: text
    content: Si c’est une offrande de céréales cuite à la poêle qu’on apporte, elle sera composée de fleur de farine et d’huile.
  '8':
  - type: text
    content: 'On apportera l’offrande ainsi préparée à l’Eternel pour la remettre au prêtre qui l’approchera de l’autel. '
  '9':
  - type: text
    content: 'Il en prélèvera ce qui doit être offert comme mémorial et le brûlera sur l’autel. C’est une offrande consumée par le feu, à l’odeur apaisante pour l’Eternel. '
