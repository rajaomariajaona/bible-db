document_id: JOS.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La traversée du Jourdain
  - type: text
    content: 'Le lendemain matin, Josué et tous les Israélites quittèrent le camp de Shittim et gagnèrent les rives du Jourdain. Ils s’installèrent là avant de traverser le fleuve. '
  '10':
  - type: text
    content: 'Voici comment vous saurez que le Dieu vivant est au milieu de vous et qu’il ne manquera pas de déposséder en votre faveur les Cananéens, les Hittites, les Héviens, les Phéréziens, les Guirgasiens, les Amoréens et les Yebousiens : '
  '11':
  - type: text
    content: 'le coffre de l’alliance du Seigneur de toute la terre va traverser le Jourdain devant vous. '
  '12':
  - type: text
    content: 'Maintenant, choisissez douze hommes dans les tribus d’Israël, un par tribu. '
  '13':
  - type: text
    content: 'Dès que les prêtres qui porteront le coffre de l’Eternel, le Seigneur de toute la terre, poseront la plante des pieds dans le Jourdain, le fleuve sera coupé en deux : les eaux venant de l’amont s’arrêteront net en formant comme un mur.'
  '14':
  - type: text
    content: 'Le peuple plia ses tentes pour traverser le Jourdain ; les prêtres portant le coffre de l’alliance marchaient en tête. '
  '15':
  - type: text
    content: C’était l’époque de la moisson où le Jourdain déborde continuellement par-dessus ses rives
  - type: note
    content: Au temps de la moisson de l’orge, c’est-à-dire au mois d’avril, le Jourdain déborde de son lit à cause des pluies de printemps et de la fonte des neiges sur les monts du Liban.
  - type: text
    content: '. Au moment où ceux qui portaient le coffre arrivèrent sur ses bords et où ces prêtres mirent les pieds dans l’eau, '
  '16':
  - type: text
    content: les eaux venant de l’amont cessèrent de couler et formèrent comme un mur sur une grande distance, à partir de la ville d’Adam située à côté de Tsartân
  - type: note
    content: Texte difficile que la version grecque interprète différemment. L’épisode se situe près de l’embouchure du Yabboq dans le Jourdain.
  - type: text
    content: ', tandis qu’en aval, les eaux qui descendaient vers la mer de la vallée du Jourdain, c’est-à-dire la mer Morte, s’écoulèrent. '
  '17':
  - type: text
    content: Le peuple traversa à la hauteur de Jéricho. Les prêtres qui portaient le coffre de l’alliance de l’Eternel s’arrêtèrent dans le lit desséché, au milieu du Jourdain, pendant que tout Israël passait à pied sec. Ils s’y tinrent fermement jusqu’à ce que tout le peuple eût achevé la traversée.
  '2':
  - type: text
    content: 'Au bout de trois jours, les chefs du peuple parcoururent le camp '
  '3':
  - type: text
    content: 'et donnèrent au peuple les ordres suivants : Quand vous verrez les prêtres-lévites emporter le coffre de l’alliance de l’Eternel, votre Dieu, vous quitterez le lieu où vous êtes installés et vous le suivrez. '
  '4':
  - type: text
    content: Vous maintiendrez entre vous et le coffre de l’alliance une distance d’un kilomètre. Vous ne vous en approcherez pas plus. Ainsi vous saurez quel chemin emprunter, car vous n’avez encore jamais fait ce trajet.
  '5':
  - type: text
    content: 'Josué dit au peuple : Purifiez-vous, car demain l’Eternel fera des prodiges au milieu de vous.'
  '6':
  - type: text
    content: 'Aux prêtres il dit : Prenez le coffre de l’alliance et marchez en tête du peuple.'
  - type: text
    content: 'Ils portèrent le coffre de l’alliance et marchèrent devant le peuple. '
  '7':
  - type: text
    content: 'L’Eternel dit à Josué : Aujourd’hui même, je commencerai à t’honorer aux yeux de tout Israël pour qu’ils sachent que je serai avec toi tout comme je l’ai été avec Moïse. '
  '8':
  - type: text
    content: 'Donne aux prêtres qui portent le coffre de l’alliance l’ordre suivant : « Dès que vous aurez atteint le bord du Jourdain et que vous aurez mis les pieds dans l’eau, arrêtez-vous là. »'
  '9':
  - type: text
    content: 'Alors Josué s’adressa à tous les Israélites et leur dit : Approchez-vous et écoutez les paroles de l’Eternel, votre Dieu. '
