document_id: JAS.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur de cette lettre se nomme seulement « Jacques, serviteur de Dieu et du Seigneur Jésus-Christ ». On considère généralement qu’il s’agit du frère de Jésus (Mt 13.55), qui occupa une place éminente dans l’Eglise de Jérusalem (Ga 2.9 et Ac 15.13-21) où il s’est consacré à l’annonce de la Parole aux Juifs. Son autorité incontestée dans la communauté judéo-chrétienne explique bien le ton général de la lettre. L’origine juive de l’auteur ne fait en tout cas aucun doute : il appelle l’Eglise « synagogue », rappelle l’exemple de Job et ceux d’Abraham et de Rahab, cite à plusieurs reprises l’Ancien Testament.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Jacques s’adresse aux « douze tribus dispersées du peuple de Dieu », expression qui peut désigner l’ensemble des chrétiens, par analogie avec le peuple de Dieu de l’ancienne alliance composée des douze tribus d’Israël.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lettre de Jacques fonctionne surtout par association d’idées, suivant un genre littéraire qu’on retrouve dans le livre des Proverbes. On peut toutefois y discerner trois cycles : une double introduction (1.2-11 et 1.12-27), le corps de la lettre (2.1 à 5.6) et une conclusion (5.7-20). Dans chacune de ces sections Jacques revient sur trois thèmes qu’il développe à chaque fois :'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – l’épreuve, la tentation et la persévérance ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – la sagesse, la prière et la langue ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – les riches et les pauvres, et la solidarité.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lettre se termine par une réévaluation de la parole humaine : la prière, parole qui a une grande force, et la parole qui ramène l’égaré sur le chemin de la vérité (5.12-19).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’intérêt de cette lettre réside en particulier dans le caractère très pratique et très actuel de ses exhortations. Elle rappelle l’exigence de mettre en pratique la Parole de Dieu.
