document_id: COL.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, saluent '
  '10':
  - type: text
    content: 'Ainsi vous pourrez avoir une conduite digne du Seigneur et qui lui plaise à tous égards. Car vous porterez comme fruit toutes sortes d’œuvres bonnes et vous ferez des progrès dans la connaissance de Dieu. '
  '11':
  - type: text
    content: Dieu vous fortifiera pleinement à la mesure de sa puissance glorieuse, pour que vous puissiez tout supporter et persévérer jusqu’au bout – et cela avec joie
  - type: note
    content: 'Autre traduction : et persévérer jusqu’au bout. Avec joie, vous exprimerez votre reconnaissance au Père…'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Vous exprimerez votre reconnaissance au Père qui vous a rendus capables d’avoir part à l’héritage qu’il réserve dans la lumière aux membres de son peuple saint
  - type: note
    content: Dans l’ancienne alliance, les Juifs ont reçu le pays promis comme héritage ; maintenant les non-Juifs sont co-héritiers avec eux du nouveau pays promis, c’est-à-dire du royaume de Dieu.
  - type: text
    content: '. Car :'
  '13':
  - type: text
    content: Il nous a arrachés
  - type: text
    content: au pouvoir des ténèbres
  - type: text
    content: et nous a fait passer
  - type: text
    content: dans le royaume
  - type: text
    content: de son Fils bien-aimé.
  '14':
  - type: text
    content: Etant unis à lui,
  - type: text
    content: nous sommes délivrés,
  - type: text
    content: car nous avons reçu
  - type: text
    content: le pardon des péchés.
  '15':
  - type: text
    content: Ce Fils,
  - type: text
    content: il est l’image
  - type: text
    content: du Dieu que nul ne voit,
  - type: text
    content: il est le Premier-né
  - type: text
    content: de toute création.
  '16':
  - type: text
    content: Car c’est en lui
  - type: text
    content: qu’ont été créées toutes choses
  - type: text
    content: dans les cieux comme sur la terre,
  - type: text
    content: les visibles, les invisibles,
  - type: text
    content: les Trônes et les Seigneuries,
  - type: text
    content: les Autorités, les Puissances.
  - type: text
    content: C’est par lui et pour lui
  - type: text
    content: que Dieu a tout créé.
  '17':
  - type: text
    content: Il est lui-même
  - type: text
    content: bien avant toutes choses
  - type: text
    content: et tout subsiste en lui.
  '18':
  - type: text
    content: Il est lui-même
  - type: text
    content: la tête de son corps
  - type: text
    content: qui est l’Eglise
  - type: note
    content: 'Jeu de mots : Christ est à la fois la tête et à la tête de son Eglise.'
  - type: text
    content: .
  - type: text
    content: Ce Fils
  - type: text
    content: est le commencement,
  - type: text
    content: le Premier-né
  - type: text
    content: de tous ceux qui sont morts,
  - type: text
    content: afin qu’en toutes choses
  - type: text
    content: il ait le premier rang.
  '19':
  - type: text
    content: Car c’est en lui
  - type: text
    content: que Dieu a désiré
  - type: text
    content: que toute plénitude
  - type: text
    content: ait sa demeure.
  '2':
  - type: text
    content: ceux qui, à Colosses, font partie du peuple saint par leur union avec Christ et qui sont nos fidèles frères et sœurs en lui.
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père
  - type: note
    content: 'Certains manuscrits ajoutent : et par le Seigneur Jésus-Christ.'
  - type: text
    content: .
  - type: heading
    content: Prière de reconnaissance
  '20':
  - type: text
    content: Et c’est par lui
  - type: text
    content: qu’il a voulu
  - type: text
    content: réconcilier avec lui-même
  - type: text
    content: 'l’univers tout entier :'
  - type: text
    content: ce qui est sur la terre
  - type: text
    content: et ce qui est au ciel,
  - type: text
    content: en instaurant la paix
  - type: text
    content: par le sang que son Fils
  - type: text
    content: a versé sur la croix.
  '21':
  - type: text
    content: 'Or vous, autrefois, vous étiez exclus de la présence de Dieu, vous étiez ses ennemis à cause de vos pensées qui vous amenaient à faire des œuvres mauvaises ; '
  '22':
  - type: text
    content: 'mais maintenant, Dieu vous a réconciliés avec lui par le sacrifice de son Fils qui a livré à la mort son corps humain, pour vous faire paraître saints, irréprochables et sans faute devant lui. '
  '23':
  - type: text
    content: Mais il vous faut, bien sûr, demeurer dans la foi, fermement établis sur ce fondement sans vous laisser écarter de l’espérance qu’annonce l’Evangile. Cet Evangile, vous l’avez entendu, il a été proclamé parmi toutes les créatures sous le ciel, et moi, Paul, j’en suis devenu le serviteur.
  - type: heading
    content: Christ, la vraie sagesse
  - type: heading
    content: Le combat de l’apôtre pour l’Eglise
  '24':
  - type: text
    content: Maintenant, je me réjouis des souffrances que j’endure pour vous. Car, en ma personne, je complète, pour le bien de son corps – qui est l’Eglise – ce qui manque aux persécutions dirigées contre Christ
  - type: note
    content: 'D’autres comprennent : car, en ma personne, je complète ce qui manque aux souffrances de Christ pour son corps, qui est l’Eglise.'
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'C’est de cette Eglise que je suis devenu le serviteur, selon la responsabilité que Dieu m’a confiée à votre égard. Il m’a chargé d’annoncer sa Parole dans toute sa plénitude '
  '26':
  - type: text
    content: 'en vous faisant connaître le secret de son plan tenu caché depuis toujours, de génération en génération, mais qui s’accomplit de façon manifeste pour les membres de son peuple saint. '
  '27':
  - type: text
    content: 'Car Dieu a voulu leur faire connaître quelle est la glorieuse richesse que renferme le secret de son plan pour les non-Juifs. Et voici ce secret : Christ en vous'
  - type: note
    content: 'Autre traduction : parmi vous.'
  - type: text
    content: ', garantie de votre espérance de la gloire à venir.'
  '28':
  - type: text
    content: 'C’est lui, Christ, que nous, nous annonçons, en avertissant et en enseignant tout être humain, en toute sagesse, afin de faire paraître devant Dieu tout homme parvenu à l’état d’adulte dans son union avec Christ. '
  '29':
  - type: text
    content: Voilà pourquoi je travaille et je combats par la force de Christ qui agit puissamment en moi.
  '3':
  - type: text
    content: 'Nous exprimons constamment à Dieu, le Père de notre Seigneur Jésus-Christ, notre reconnaissance à votre sujet dans nos prières pour vous. '
  '4':
  - type: text
    content: 'En effet, nous avons entendu parler de votre foi en Jésus-Christ et de votre amour pour tous les membres du peuple saint. '
  '5':
  - type: text
    content: 'Cette foi et cet amour se fondent sur ce qui fait votre espérance et que Dieu vous réserve dans les cieux. Cette espérance, vous l’avez connue par la prédication de la vérité, cet Evangile '
  '6':
  - type: text
    content: qui est parvenu jusqu’à vous, comme il est aussi présent dans le monde entier où il porte du fruit et va de progrès en progrès – ce qui est également le cas parmi vous, depuis le jour où vous avez reçu et reconnu la grâce de Dieu dans toute sa vérité.
  '7':
  - type: text
    content: C’est Epaphras, notre cher collaborateur, qui vous en a instruits. Il est un fidèle serviteur de Christ auprès de vous
  - type: note
    content: L’Eglise à Colosses avait été fondée par ce collaborateur de l’apôtre.
  - type: text
    content: ' '
  '8':
  - type: text
    content: et il nous a appris quel amour l’Esprit vous inspire.
  - type: heading
    content: Prière de Paul et hymne à Jésus-Christ
  '9':
  - type: text
    content: 'Aussi, depuis le jour où nous avons entendu parler de vous, nous aussi, nous ne cessons de prier Dieu pour vous. Nous lui demandons qu’il vous fasse connaître pleinement sa volonté, en vous donnant, par le Saint-Esprit, une entière sagesse et un parfait discernement. '
