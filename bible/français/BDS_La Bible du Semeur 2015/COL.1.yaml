document_id: COL.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, saluent '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi vous pourrez avoir une conduite digne du Seigneur et qui lui plaise à tous égards. Car vous porterez comme fruit toutes sortes d’œuvres bonnes et vous ferez des progrès dans la connaissance de Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dieu vous fortifiera pleinement à la mesure de sa puissance glorieuse, pour que vous puissiez tout supporter et persévérer jusqu’au bout – et cela avec joie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et persévérer jusqu’au bout. Avec joie, vous exprimerez votre reconnaissance au Père…
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vous exprimerez votre reconnaissance au Père qui vous a rendus capables d’avoir part à l’héritage qu’il réserve dans la lumière aux membres de son peuple saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans l’ancienne alliance, les Juifs ont reçu le pays promis comme héritage ; maintenant les non-Juifs sont co-héritiers avec eux du nouveau pays promis, c’est-à-dire du royaume de Dieu.
      marker-yv: yv-n
    - type: text
      text: '. Car :'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il nous a arrachés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au pouvoir des ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous a fait passer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le royaume
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de son Fils bien-aimé.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Etant unis à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous sommes délivrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous avons reçu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le pardon des péchés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ce Fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est l’image
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du Dieu que nul ne voit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est le Premier-né
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toute création.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Car c’est en lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ont été créées toutes choses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les cieux comme sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les visibles, les invisibles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Trônes et les Seigneuries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Autorités, les Puissances.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par lui et pour lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que Dieu a tout créé.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il est lui-même
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien avant toutes choses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout subsiste en lui.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il est lui-même
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la tête de son corps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est l’Eglise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jeu de mots : Christ est à la fois la tête et à la tête de son Eglise.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce Fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est le commencement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Premier-né
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous ceux qui sont morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’en toutes choses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ait le premier rang.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Car c’est en lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que Dieu a désiré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que toute plénitude
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ait sa demeure.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ceux qui, à Colosses, font partie du peuple saint par leur union avec Christ et qui sont nos fidèles frères et sœurs en lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et par le Seigneur Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de reconnaissance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Et c’est par lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il a voulu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: réconcilier avec lui-même
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'l’univers tout entier :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui est sur la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce qui est au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en instaurant la paix
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par le sang que son Fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a versé sur la croix.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Or vous, autrefois, vous étiez exclus de la présence de Dieu, vous étiez ses ennemis à cause de vos pensées qui vous amenaient à faire des œuvres mauvaises ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'mais maintenant, Dieu vous a réconciliés avec lui par le sacrifice de son Fils qui a livré à la mort son corps humain, pour vous faire paraître saints, irréprochables et sans faute devant lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mais il vous faut, bien sûr, demeurer dans la foi, fermement établis sur ce fondement sans vous laisser écarter de l’espérance qu’annonce l’Evangile. Cet Evangile, vous l’avez entendu, il a été proclamé parmi toutes les créatures sous le ciel, et moi, Paul, j’en suis devenu le serviteur.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Christ, la vraie sagesse
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le combat de l’apôtre pour l’Eglise
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Maintenant, je me réjouis des souffrances que j’endure pour vous. Car, en ma personne, je complète, pour le bien de son corps – qui est l’Eglise – ce qui manque aux persécutions dirigées contre Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car, en ma personne, je complète ce qui manque aux souffrances de Christ pour son corps, qui est l’Eglise.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'C’est de cette Eglise que je suis devenu le serviteur, selon la responsabilité que Dieu m’a confiée à votre égard. Il m’a chargé d’annoncer sa Parole dans toute sa plénitude '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'en vous faisant connaître le secret de son plan tenu caché depuis toujours, de génération en génération, mais qui s’accomplit de façon manifeste pour les membres de son peuple saint. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Car Dieu a voulu leur faire connaître quelle est la glorieuse richesse que renferme le secret de son plan pour les non-Juifs. Et voici ce secret : Christ en vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parmi vous.
      marker-yv: yv-n
    - type: text
      text: ', garantie de votre espérance de la gloire à venir.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'C’est lui, Christ, que nous, nous annonçons, en avertissant et en enseignant tout être humain, en toute sagesse, afin de faire paraître devant Dieu tout homme parvenu à l’état d’adulte dans son union avec Christ. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Voilà pourquoi je travaille et je combats par la force de Christ qui agit puissamment en moi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nous exprimons constamment à Dieu, le Père de notre Seigneur Jésus-Christ, notre reconnaissance à votre sujet dans nos prières pour vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, nous avons entendu parler de votre foi en Jésus-Christ et de votre amour pour tous les membres du peuple saint. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Cette foi et cet amour se fondent sur ce qui fait votre espérance et que Dieu vous réserve dans les cieux. Cette espérance, vous l’avez connue par la prédication de la vérité, cet Evangile '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: qui est parvenu jusqu’à vous, comme il est aussi présent dans le monde entier où il porte du fruit et va de progrès en progrès – ce qui est également le cas parmi vous, depuis le jour où vous avez reçu et reconnu la grâce de Dieu dans toute sa vérité.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C’est Epaphras, notre cher collaborateur, qui vous en a instruits. Il est un fidèle serviteur de Christ auprès de vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’Eglise à Colosses avait été fondée par ce collaborateur de l’apôtre.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: et il nous a appris quel amour l’Esprit vous inspire.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prière de Paul et hymne à Jésus-Christ
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aussi, depuis le jour où nous avons entendu parler de vous, nous aussi, nous ne cessons de prier Dieu pour vous. Nous lui demandons qu’il vous fasse connaître pleinement sa volonté, en vous donnant, par le Saint-Esprit, une entière sagesse et un parfait discernement. '
