document_id: ACT.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur l’île de Malte
  - type: text
    content: 'Une fois hors de danger, nous avons appris que notre île s’appelait Malte. '
  '10':
  - type: text
    content: Cela nous a valu toutes sortes de marques d’honneur et, quand est venu le moment de reprendre la mer, on a pourvu à tous les besoins de notre voyage.
  - type: heading
    content: L’arrivée à Rome
  '11':
  - type: text
    content: C’est seulement trois mois plus tard que nous sommes repartis à bord d’un bateau d’Alexandrie, à l’emblème de Castor et Pollux
  - type: note
    content: Castor et Pollux étaient deux dieux jumeaux de la mythologie grecque. Les marins les avaient adoptés comme leurs dieux protecteurs.
  - type: text
    content: ', qui avait passé l’hiver dans un port de l’île. '
  '12':
  - type: text
    content: Nous avons fait escale pendant trois jours à Syracuse
  - type: note
    content: 'Syracuse: capitale de la Sicile, à environ 130 kilomètres de Malte.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'De là, nous avons longé la côte jusqu’à Reggio. Le lendemain, le vent du sud s’est levé et, en deux jours, nous avons gagné Pouzzoles. '
  '14':
  - type: text
    content: 'Dans cette ville, nous avons trouvé des frères qui nous ont invités à passer une semaine avec eux. Et c’est ainsi que nous sommes allés à Rome. '
  '15':
  - type: text
    content: Les frères de cette ville, qui avaient eu de nos nouvelles, sont venus à notre rencontre jusqu’au Forum d’Appius et aux Trois-Tavernes. Quand Paul les a vus, il a remercié Dieu et a pris courage.
  '16':
  - type: text
    content: Après notre arrivée à Rome, Paul fut autorisé à loger dans un appartement personnel, sous la garde d’un soldat.
  - type: heading
    content: Paul, témoin de Jésus-Christ à Rome
  '17':
  - type: text
    content: 'Au bout de trois jours, il invita les chefs des Juifs à le rencontrer. Quand ils furent réunis chez lui, il leur dit : Mes frères, bien que je n’aie rien fait de contraire aux intérêts de notre peuple, ni aux traditions de nos ancêtres, j’ai été arrêté à Jérusalem et livré entre les mains des Romains. '
  '18':
  - type: text
    content: 'Ceux-ci, après enquête, voulaient me relâcher parce qu’ils n’avaient trouvé aucune raison de me condamner à mort. '
  '19':
  - type: text
    content: 'Mais, comme les Juifs s’y opposaient, je me suis vu contraint d’en appeler à l’empereur, sans pour autant vouloir accuser mes compatriotes. '
  '2':
  - type: text
    content: Les habitants, qui ne parlaient pas le grec, nous ont témoigné une bienveillance peu ordinaire. Ils ont allumé un grand feu et nous ont tous accueillis à sa chaleur, car il s’était mis à pleuvoir et il faisait froid.
  '20':
  - type: text
    content: 'Et c’est ce qui explique que je vous ai invités à venir me voir et vous entretenir avec moi : car c’est à cause de l’espérance d’Israël que je porte ces chaînes.'
  '21':
  - type: text
    content: 'Les Juifs lui répondirent : En ce qui nous concerne, nous n’avons reçu aucune lettre de Judée à ton sujet, et aucun de nos frères n’est venu de là-bas pour nous faire un rapport ou pour nous dire du mal de toi. '
  '22':
  - type: text
    content: Mais nous pensons devoir t’entendre exposer toi-même ta pensée. Quant à la secte dont tu fais partie, nous savons qu’elle rencontre partout une sérieuse opposition.
  '23':
  - type: text
    content: 'Ils fixèrent donc un autre rendez-vous et, au jour convenu, revinrent chez lui, encore plus nombreux que la première fois. L’entretien dura du matin jusqu’au soir. Paul leur exposa sa doctrine : il leur annonça le royaume de Dieu et, en s’appuyant sur la Loi de Moïse et les paroles des prophètes, il cherchait à les convaincre au sujet de Jésus. '
  '24':
  - type: text
    content: Les uns se laissèrent persuader par ses paroles, mais les autres refusèrent de croire.
  '25':
  - type: text
    content: 'Au moment de quitter Paul, ils n’étaient toujours pas d’accord entre eux et Paul fit cette réflexion : Elles sont bien vraies ces paroles que le Saint-Esprit a dites à vos ancêtres, par la bouche du prophète Esaïe :'
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Va trouver ce peuple et dis-lui :'
  - type: text
    content: Vous aurez beau entendre,
  - type: text
    content: vous ne comprendrez pas.
  - type: text
    content: Vous aurez beau voir de vos propres yeux,
  - type: text
    content: vous ne saisirez pas.
  '27':
  - type: text
    content: ' '
  - type: text
    content: Car ce peuple est devenu insensible,
  - type: text
    content: ils ont fait la sourde oreille
  - type: text
    content: et ils se sont bouché les yeux,
  - type: text
    content: de peur qu’ils voient de leurs yeux,
  - type: text
    content: et qu’ils entendent de leurs oreilles,
  - type: text
    content: de peur qu’ils comprennent,
  - type: text
    content: qu’ils reviennent à moi
  - type: text
    content: et que je les guérisse
  - type: text
    content: ' '
  - type: note
    content: Es 6.9-10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '28':
  - type: text
    content: 'Et Paul ajouta : Sachez-le donc : désormais ce salut qui vient de Dieu est maintenant apporté aux non-Juifs ; eux, ils écouteront ce message'
  - type: note
    content: 'Certains manuscrits ajoutent : 29 Lorsque Paul eut dit cela, les Juifs s’en allèrent en discutant vivement entre eux.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Paul avait ramassé une brassée de bois sec et il allait la jeter dans le feu quand la chaleur en a fait sortir une vipère qui s’est accrochée à sa main. '
  '30':
  - type: text
    content: 'Paul resta deux années entières dans le logement qu’il avait loué. Il y recevait tous ceux qui venaient le voir. '
  '31':
  - type: text
    content: Il proclamait le royaume de Dieu et enseignait, avec une pleine assurance et sans aucun empêchement, ce qui concerne le Seigneur Jésus-Christ.
  '4':
  - type: text
    content: 'En voyant l’animal suspendu à sa main, les habitants se disaient entre eux : Pas de doute : cet homme est un criminel ! Il a pu échapper à la mer, mais la Justice ne l’a pas laissé vivre !'
  '5':
  - type: text
    content: Cependant, Paul avait, d’une secousse, jeté l’animal dans le feu et ne ressentait aucun mal.
  '6':
  - type: text
    content: 'Tous s’attendaient à le voir enfler ou bien tomber subitement raide mort. Après une longue attente, voyant qu’il ne lui arrivait rien de fâcheux, ils ont changé d’avis et se sont mis à dire : C’est un dieu.'
  '7':
  - type: text
    content: 'Tout près de là se trouvait un domaine appartenant au premier personnage de l’île nommé Publius. Il nous a accueillis très aimablement et nous a offert l’hospitalité pendant trois jours. '
  '8':
  - type: text
    content: 'Or, son père était justement cloué au lit par la fièvre et la dysenterie. Paul s’est rendu à son chevet, a prié en lui imposant les mains, et l’a guéri. '
  '9':
  - type: text
    content: 'Après cela, tous les autres malades de l’île venaient le voir et ils étaient guéris, eux aussi. '
