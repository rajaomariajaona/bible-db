  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or je le sais bien : l’enseignement que m’a confié le Père c’est la vie éternelle. Et mon enseignement consiste à dire fidèlement ce que m’a dit le Père.'
