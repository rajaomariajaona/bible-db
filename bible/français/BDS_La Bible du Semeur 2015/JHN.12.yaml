  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Et pourtant, même parmi les dirigeants, beaucoup crurent en lui ; mais, à cause des pharisiens, ils n’osaient pas le reconnaître ouvertement de peur d’être exclus de la synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Car ils tenaient davantage à la gloire qui vient des hommes qu’à celle qui vient de Dieu.
