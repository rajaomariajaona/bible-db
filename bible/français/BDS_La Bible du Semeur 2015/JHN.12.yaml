document_id: JHN.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus chez le ressuscité
  - type: heading
    content: (Mt 26.6-13 ; Mc 14.3-9)
  - type: text
    content: 'Six jours avant la Pâque, Jésus se rendit à Béthanie où habitait Lazare, qu’il avait ressuscité. '
  '10':
  - type: text
    content: 'Alors les chefs des prêtres décidèrent aussi de faire mourir Lazare '
  '11':
  - type: text
    content: Car, à cause de lui, beaucoup se détournaient d’eux pour croire en Jésus.
  - type: heading
    content: L’entrée du roi à Jérusalem
  - type: heading
    content: (Mt 21.1-11 ; Mc 11.1-11 ; Lc 19.28-40)
  '12':
  - type: text
    content: Le lendemain, une foule immense était à Jérusalem pour la fête. On apprit que Jésus était en chemin vers la ville.
  '13':
  - type: text
    content: 'Alors les gens arrachèrent des rameaux aux palmiers et sortirent à sa rencontre en criant :'
  - type: text
    content: Hosanna
  - type: text
    content: ' '
  - type: note
    content: Voir note Mt 21.9.
  - type: text
    content: '! Béni soit celui qui vient au nom du Seigneur ! Vive le roi d’Israël'
  - type: note
    content: Ps 118.25-26.
  - type: text
    content: ' '
  - type: text
    content: '!'
  '14':
  - type: text
    content: 'Jésus trouva un ânon et s’assit dessus, selon cette parole de l’Ecriture :'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Sois sans crainte, communauté de Sion,
  - type: text
    content: car ton roi vient,
  - type: text
    content: monté sur un ânon
  - type: text
    content: ' '
  - type: note
    content: Za 9.9 .
  - type: text
    content: .
  '16':
  - type: text
    content: Sur le moment, ses disciples ne comprirent pas ce qui se passait, mais quand Jésus fut entré dans sa gloire, ils se souvinrent que ces choses avaient été écrites à son sujet et qu’elles lui étaient arrivées.
  '17':
  - type: text
    content: 'Tous ceux qui étaient avec Jésus lorsqu’il avait appelé Lazare à sortir du tombeau et l’avait ressuscité, témoignaient de ce qu’ils avaient vu. '
  '18':
  - type: text
    content: D’ailleurs, si les foules venaient si nombreuses au-devant de lui, c’était aussi parce qu’elles avaient entendu parler du signe miraculeux qu’il avait accompli.
  '19':
  - type: text
    content: 'Alors les pharisiens se dirent les uns aux autres : Vous le voyez : vous n’arriverez à rien, tout le monde le suit !'
  - type: heading
    content: La gloire et la mort
  '2':
  - type: text
    content: On prépara là un festin en son honneur. Marthe s’occupait du service, et Lazare avait pris place à table avec Jésus.
  '20':
  - type: text
    content: Parmi ceux qui étaient venus à Jérusalem pour adorer Dieu pendant la fête, il y avait aussi quelques personnes non juives
  - type: note
    content: Non-Juifs attirés par la religion juive, sympathisants ou prosélytes, qui participaient au pèlerinage de la Pâque.
  - type: text
    content: ' . '
  '21':
  - type: text
    content: 'Elles allèrent trouver Philippe qui était de Bethsaïda en Galilée et lui firent cette demande : Nous aimerions voir Jésus.'
  '22':
  - type: text
    content: Philippe alla le dire à André, puis tous deux allèrent ensemble le dire à Jésus.
  '23':
  - type: text
    content: 'Celui-ci leur répondit : '
  - type: text
    content: 'L’heure est venue où le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' va entrer dans sa gloire.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Vraiment, je vous l’assure : si le grain de blé que l’on a jeté en terre ne meurt pas, il reste un grain unique. Mais s’il meurt, il porte du fruit en abondance.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Celui qui s’attache à sa propre vie la perdra, mais celui qui fait peu de cas de sa vie en ce monde la gardera pour la vie éternelle.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si quelqu’un veut être à mon service, qu’il me suive. Là où je serai, mon serviteur y sera aussi. Si quelqu’un est à mon service, le Père lui fera honneur.
  '27':
  - type: text
    content: ' '
  - type: text
    content: A présent, je suis troublé. Que dirai-je ? Père, délivre-moi de cette heure ? Mais c’est précisément pour cela que je suis venu jusqu’à cette heure !
  - type: text
    content: ' '
  '28':
  - type: text
    content: Père, manifeste ta gloire.
  - type: text
    content: 'Alors une voix se fit entendre, venant du ciel : J’ai déjà manifesté ma gloire et je la manifesterai à nouveau.'
  '29':
  - type: text
    content: 'La foule qui se trouvait là et qui avait entendu le son de cette voix crut que c’était un coup de tonnerre. D’autres disaient : Un ange vient de lui parler.'
  '3':
  - type: text
    content: Marie prit alors un demi-litre de nard
  - type: note
    content: Plante du Moyen-Orient recherchée pour son parfum délicat. Cet acte est un geste volontaire de respect, de vive reconnaissance (pour la résurrection de Lazare), de soumission et de consécration.
  - type: text
    content: ' pur, un parfum très cher : elle le répandit sur les pieds de Jésus et les essuya avec ses cheveux. Toute la maison fut remplie de l’odeur de ce parfum.'
  '30':
  - type: text
    content: 'Mais Jésus leur déclara : '
  - type: text
    content: Ce n’est pas pour moi que cette voix s’est fait entendre, c’est pour vous.
  - type: text
    content: ' '
  '31':
  - type: text
    content: C’est maintenant que va avoir lieu le jugement de ce monde. Oui, maintenant le dominateur de ce monde va être expulsé.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Et moi, quand j’aurai été élevé au-dessus de la terre, j’attirerai tout homme à moi.
  '33':
  - type: text
    content: 'Par cette expression, il faisait allusion à la manière dont il allait mourir. '
  '34':
  - type: text
    content: 'La foule répondit : La Loi nous apprend que le Messie vivra éternellement. Comment peux-tu dire que le Fils de l’homme doit être élevé au-dessus de la terre ? Au fait : qui est donc ce Fils de l’homme ?'
  '35':
  - type: text
    content: 'Jésus leur dit alors : '
  - type: text
    content: 'La lumière est encore parmi vous, pour un peu de temps : marchez tant que vous avez la lumière, pour ne pas vous laisser surprendre par les ténèbres, car celui qui marche dans les ténèbres ne sait pas où il va.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: Tant que vous avez la lumière, croyez en la lumière, afin de devenir vous-mêmes des enfants de lumière.
  - type: text
    content: Après avoir dit cela, Jésus s’en alla et se tint caché loin d’eux.
  - type: heading
    content: Les Juifs restent incrédules
  '37':
  - type: text
    content: Malgré le grand nombre de signes miraculeux que Jésus avait accomplis devant eux, ils ne croyaient pas en lui.
  '38':
  - type: text
    content: 'Ainsi s’accomplit ce que le prophète Esaïe avait prédit :'
  - type: text
    content: Seigneur, qui a cru à notre message
  - type: text
    content: et à qui la puissance du Seigneur a-t-elle été révélée
  - type: text
    content: ' '
  - type: note
    content: Es 53.1 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  '39':
  - type: text
    content: 'Pourquoi ne pouvaient-ils pas croire ? C’est encore Esaïe qui nous en donne la raison quand il dit :'
  '4':
  - type: text
    content: 'Judas Iscariot, l’un des disciples de Jésus, celui qui allait le trahir, dit : '
  '40':
  - type: text
    content: ' '
  - type: text
    content: Dieu les a aveuglés,
  - type: text
    content: il les a rendus insensibles,
  - type: text
    content: afin qu’ils ne voient pas de leurs yeux,
  - type: text
    content: qu’ils ne comprennent pas avec leur intelligence,
  - type: text
    content: qu’ils ne se tournent pas vers lui
  - type: text
    content: pour qu’il les guérisse
  - type: text
    content: ' '
  - type: note
    content: Es 6.10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '41':
  - type: text
    content: Esaïe a dit cela parce qu’il avait vu la gloire de Jésus et qu’il parlait de lui.
  '42':
  - type: text
    content: 'Et pourtant, même parmi les dirigeants, beaucoup crurent en lui ; mais, à cause des pharisiens, ils n’osaient pas le reconnaître ouvertement de peur d’être exclus de la synagogue. '
  '43':
  - type: text
    content: Car ils tenaient davantage à la gloire qui vient des hommes qu’à celle qui vient de Dieu.
  - type: heading
    content: L’appel à la foi
  '44':
  - type: text
    content: 'Jésus déclara à haute voix : '
  - type: text
    content: 'Si quelqu’un met sa '
  - type: text
    content: confiance
  - type: text
    content: ' en moi, ce n’est pas en moi seulement qu’il croit, mais encore en celui qui m’a envoyé.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Qui me voit, voit aussi celui qui m’a envoyé.
  - type: text
    content: ' '
  '46':
  - type: text
    content: C’est pour être la lumière que je suis venu dans le monde, afin que tout homme qui croit en moi ne demeure pas dans les ténèbres.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Si quelqu’un entend ce que je dis, mais ne le met pas en pratique, ce n’est pas moi qui le jugerai ; car je ne suis pas venu pour juger le monde mais pour le '
  - type: text
    content: sauver
  - type: text
    content: .
  '48':
  - type: text
    content: ' '
  - type: text
    content: 'Celui donc qui me méprise et qui ne tient pas compte de mes paroles a déjà son juge : c’est cette Parole même que j’ai prononcée ; elle le jugera au dernier jour.'
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Car je n’ai pas parlé de ma propre initiative : le Père, qui m’a envoyé, m’a ordonné lui-même ce que je dois dire et enseigner.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Pourquoi n’a-t-on pas vendu ce parfum ? On en aurait tiré au moins trois cents pièces d’argent
  - type: note
    content: Il s’agit de deniers. Cette somme représente le salaire d’une année de travail d’un ouvrier agricole.
  - type: text
    content: ' qu’on aurait pu donner aux pauvres !'
  '50':
  - type: text
    content: 'Or je le sais bien : l’enseignement que m’a confié le Père c’est la vie éternelle. Et mon enseignement consiste à dire fidèlement ce que m’a dit le Père.'
  '6':
  - type: text
    content: S’il parlait ainsi, ce n’était pas parce qu’il se souciait des pauvres ; mais il était voleur et, comme c’était lui qui gérait la bourse commune, il gardait pour lui ce qu’on y mettait.
  '7':
  - type: text
    content: 'Mais Jésus intervint : '
  - type: text
    content: Laisse-la faire ! C’est pour le jour de mon enterrement qu’elle a réservé ce parfum.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Des pauvres, vous en aurez toujours autour de vous ! Tandis que moi, vous ne m’aurez pas toujours avec vous.
  '9':
  - type: text
    content: 'Entre-temps, on apprit que Jésus était à Béthanie. Les gens s’y rendirent en foule, non seulement à cause de Jésus, mais aussi pour voir Lazare qu’il avait ressuscité. '
