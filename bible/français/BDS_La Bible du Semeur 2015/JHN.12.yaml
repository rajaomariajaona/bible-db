document_id: JHN.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus chez le ressuscité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.6-13 ; Mc 14.3-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Six jours avant la Pâque, Jésus se rendit à Béthanie où habitait Lazare, qu’il avait ressuscité. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On prépara là un festin en son honneur. Marthe s’occupait du service, et Lazare avait pris place à table avec Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Marie prit alors un demi-litre de nard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plante du Moyen-Orient recherchée pour son parfum délicat. Cet acte est un geste volontaire de respect, de vive reconnaissance (pour la résurrection de Lazare), de soumission et de consécration.
    marker-yv: yv-n
  - type: text
    text: ' pur, un parfum très cher : elle le répandit sur les pieds de Jésus et les essuya avec ses cheveux. Toute la maison fut remplie de l’odeur de ce parfum.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Judas Iscariot, l’un des disciples de Jésus, celui qui allait le trahir, dit : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi n’a-t-on pas vendu ce parfum ? On en aurait tiré au moins trois cents pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deniers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette somme représente le salaire d’une année de travail d’un ouvrier agricole.
    marker-yv: yv-n
  - type: text
    text: ' qu’on aurait pu donner aux pauvres !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: S’il parlait ainsi, ce n’était pas parce qu’il se souciait des pauvres ; mais il était voleur et, comme c’était lui qui gérait la bourse commune, il gardait pour lui ce qu’on y mettait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Jésus intervint : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laisse-la faire ! C’est pour le jour de mon enterrement qu’elle a réservé ce parfum.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Des pauvres, vous en aurez toujours autour de vous ! Tandis que moi, vous ne m’aurez pas toujours avec vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Entre-temps, on apprit que Jésus était à Béthanie. Les gens s’y rendirent en foule, non seulement à cause de Jésus, mais aussi pour voir Lazare qu’il avait ressuscité. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les chefs des prêtres décidèrent aussi de faire mourir Lazare '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car, à cause de lui, beaucoup se détournaient d’eux pour croire en Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’entrée du roi à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 21.1-11 ; Mc 11.1-11 ; Lc 19.28-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le lendemain, une foule immense était à Jérusalem pour la fête. On apprit que Jésus était en chemin vers la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors les gens arrachèrent des rameaux aux palmiers et sortirent à sa rencontre en criant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Hosanna
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21.9
        metadata:
          usfm: MAT.21.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '! Béni soit celui qui vient au nom du Seigneur ! Vive le roi d’Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118.25-26
        metadata:
          usfm: PSA.118.25+PSA.118.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus trouva un ânon et s’assit dessus, selon cette parole de l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Sois sans crainte, communauté de Sion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car ton roi vient,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: monté sur un ânon
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 9.9
        metadata:
          usfm: ZEC.9.9
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Sur le moment, ses disciples ne comprirent pas ce qui se passait, mais quand Jésus fut entré dans sa gloire, ils se souvinrent que ces choses avaient été écrites à son sujet et qu’elles lui étaient arrivées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tous ceux qui étaient avec Jésus lorsqu’il avait appelé Lazare à sortir du tombeau et l’avait ressuscité, témoignaient de ce qu’ils avaient vu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: D’ailleurs, si les foules venaient si nombreuses au-devant de lui, c’était aussi parce qu’elles avaient entendu parler du signe miraculeux qu’il avait accompli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors les pharisiens se dirent les uns aux autres : Vous le voyez : vous n’arriverez à rien, tout le monde le suit !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire et la mort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Parmi ceux qui étaient venus à Jérusalem pour adorer Dieu pendant la fête, il y avait aussi quelques personnes non juives
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Non-Juifs attirés par la religion juive, sympathisants ou prosélytes, qui participaient au pèlerinage de la Pâque.
    marker-yv: yv-n
  - type: text
    text: ' . '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elles allèrent trouver Philippe qui était de Bethsaïda en Galilée et lui firent cette demande : Nous aimerions voir Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Philippe alla le dire à André, puis tous deux allèrent ensemble le dire à Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Celui-ci leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'L’heure est venue où le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' va entrer dans sa gloire.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : si le grain de blé que l’on a jeté en terre ne meurt pas, il reste un grain unique. Mais s’il meurt, il porte du fruit en abondance.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui s’attache à sa propre vie la perdra, mais celui qui fait peu de cas de sa vie en ce monde la gardera pour la vie éternelle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un veut être à mon service, qu’il me suive. Là où je serai, mon serviteur y sera aussi. Si quelqu’un est à mon service, le Père lui fera honneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A présent, je suis troublé. Que dirai-je ? Père, délivre-moi de cette heure ? Mais c’est précisément pour cela que je suis venu jusqu’à cette heure !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père, manifeste ta gloire.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors une voix se fit entendre, venant du ciel : J’ai déjà manifesté ma gloire et je la manifesterai à nouveau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La foule qui se trouvait là et qui avait entendu le son de cette voix crut que c’était un coup de tonnerre. D’autres disaient : Un ange vient de lui parler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Jésus leur déclara : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce n’est pas pour moi que cette voix s’est fait entendre, c’est pour vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est maintenant que va avoir lieu le jugement de ce monde. Oui, maintenant le dominateur de ce monde va être expulsé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et moi, quand j’aurai été élevé au-dessus de la terre, j’attirerai tout homme à moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Par cette expression, il faisait allusion à la manière dont il allait mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'La foule répondit : La Loi nous apprend que le Messie vivra éternellement. Comment peux-tu dire que le Fils de l’homme doit être élevé au-dessus de la terre ? Au fait : qui est donc ce Fils de l’homme ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus leur dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'La lumière est encore parmi vous, pour un peu de temps : marchez tant que vous avez la lumière, pour ne pas vous laisser surprendre par les ténèbres, car celui qui marche dans les ténèbres ne sait pas où il va.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tant que vous avez la lumière, croyez en la lumière, afin de devenir vous-mêmes des enfants de lumière.
- type: usfm
  marker: p
  children:
  - type: text
    text: Après avoir dit cela, Jésus s’en alla et se tint caché loin d’eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Juifs restent incrédules
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Malgré le grand nombre de signes miraculeux que Jésus avait accomplis devant eux, ils ne croyaient pas en lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ainsi s’accomplit ce que le prophète Esaïe avait prédit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Seigneur, qui a cru à notre message
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et à qui la puissance du Seigneur a-t-elle été révélée
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.38 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 53.1
        metadata:
          usfm: ISA.53.1
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Pourquoi ne pouvaient-ils pas croire ? C’est encore Esaïe qui nous en donne la raison quand il dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu les a aveuglés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il les a rendus insensibles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: afin qu’ils ne voient pas de leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qu’ils ne comprennent pas avec leur intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qu’ils ne se tournent pas vers lui
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour qu’il les guérisse
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.40 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
