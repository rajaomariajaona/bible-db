    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car je n’ai pas parlé de ma propre initiative : le Père, qui m’a envoyé, m’a ordonné lui-même ce que je dois dire et enseigner.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
