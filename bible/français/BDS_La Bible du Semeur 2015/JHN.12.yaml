  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pour être la lumière que je suis venu dans le monde, afin que tout homme qui croit en moi ne demeure pas dans les ténèbres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
