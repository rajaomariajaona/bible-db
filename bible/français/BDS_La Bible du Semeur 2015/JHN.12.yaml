  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Celui donc qui me méprise et qui ne tient pas compte de mes paroles a déjà son juge : c’est cette Parole même que j’ai prononcée ; elle le jugera au dernier jour.'
  - type: text
    text: ' '
  - type: usfm
