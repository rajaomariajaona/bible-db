verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Sophonie, dont la généalogie est exceptionnellement longue et détaillée pour un prophète (1.1), était peut-être de lignée royale. Parmi ses ancêtres, il compte en effet un homme nommé Ezéchias qui pourrait être le roi qui a régné sur Juda de 715 à 698 ou 686 avant Jésus-Christ.
  - type: text
    content: Sophonie a été le porte-parole de l’Eternel dans le royaume de Juda, sous le règne de Josias (640 à 609) (1.1). Les rois précédents, Manassé et Amôn, avaient encouragé le peuple à se livrer à des pratiques idolâtres (2 R 21). Dès 629​628, Josias entreprend de faire disparaître du pays les idoles et les sanctuaires contraires à la Loi de Dieu (2 Ch 34.3-7). En 622, il fait réparer le Temple, qui avait été fermé. On y retrouve un exemplaire de la Loi de Moïse, tombée dans l’oubli. Cette découverte conduit Josias à lancer un vaste mouvement de réforme (2 Ch 34.8-33). Celui-ci est favorisé à l’époque par le déclin de l’Assyrie, empire qui dominait jusqu’alors tout le Proche-Orient.
  - type: text
    content: Sophonie dut exercer son ministère avant la réforme de 622 car il mentionne encore la présence de cultes idolâtres en Juda et à Jérusalem (1.4-5). Par ailleurs, la loi de Ninive, la capitale de l’Assyrie, semble toujours régir l’ensemble de la région (2.13-15). La prophétie daterait donc d’avant l’ébranlement de la puissance assyrienne qui a suivi la mort d’Assourbanipal en 625. On pourrait ainsi situer vers 630 le ministère de Sophonie, qui n’a pas dû être étranger aux premiers efforts de Josias pour éradiquer l’idolâtrie de Jérusalem et de Juda, dès 629​628.
  - type: text
    content: 'Sophonie annonce l’arrivée d’un « jour de l’Eternel » (1.2 à 2.3) au cours duquel Dieu va juger les idolâtres de son peuple. Seuls les humbles, ceux qui comptent sur l’Eternel et vivent selon la droiture, seront « peut-être » épargnés (2.3)– « peut-être », non à cause d’une quelconque incertitude des promesses divines, mais parce que le salut dépend totalement de la grâce de Dieu. Ce jour de l’Eternel (3.8) atteindra aussi les peuples voisins de Juda, et en particulier Ninive, avant de fondre sur Jérusalem (2.4 à 3.8). Mais l’Eternel n’agira pas qu’en juge : il viendra aussi pour sauver (3.9-20). Grâce à son œuvre de transformation, les peuples le serviront de façon unanime (3.9). Du peuple d’Israël, épuré par le jugement, demeurera un reste qui sera lui aussi transformé et qui abandonnera ainsi ses comportements coupables. Alors l’Eternel se tiendra au milieu de son peuple, non plus en juge pour le condamner (3.5), mais comme un guerrier pour le sauver (3.15, 17).'
