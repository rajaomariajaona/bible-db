document_id: MAT.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La révélation du royaume
  - type: heading
    content: (Mc 9.2-9 ; Lc 9.28-36)
  - type: text
    content: 'Six jours plus tard, Jésus prit avec lui Pierre, Jacques et Jean son frère, et les emmena sur une haute montagne, à l’écart. '
  '10':
  - type: text
    content: 'Les disciples lui demandèrent alors : Pourquoi donc les spécialistes de la Loi disent-ils qu’Elie doit venir d’abord ?'
  '11':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Effectivement, Elie doit venir remettre toutes choses en ordre.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Or, je vous le déclare : Elie est déjà venu, mais ils ne l’ont pas reconnu. Au contraire, ils l’ont traité comme ils ont voulu. Et c’est le même traitement que va subir de leur part le Fils de l’homme.'
  '13':
  - type: text
    content: Les disciples comprirent alors qu’il parlait de Jean-Baptiste.
  - type: heading
    content: La guérison d’un enfant habité par un démon
  - type: heading
    content: (Mc 9.14-29 ; Lc 9.37-43)
  '14':
  - type: text
    content: 'Quand ils furent revenus auprès de la foule, un homme s’approcha de Jésus, se jeta à genoux devant lui et le supplia : '
  '15':
  - type: text
    content: 'Seigneur, aie pitié de mon fils : il est épileptique'
  - type: note
    content: 'épileptique: voir note Mt 4.24.'
  - type: text
    content: ' et il souffre beaucoup : il lui arrive souvent de tomber dans le feu ou dans l’eau. '
  '16':
  - type: text
    content: Je l’ai bien amené à tes disciples, mais ils n’ont pas réussi à le guérir.
  '17':
  - type: text
    content: 'Jésus s’exclama alors : '
  - type: text
    content: Gens incrédules et infidèles à Dieu ! Jusqu’à quand devrai-je encore rester avec vous ? Jusqu’à quand devrai-je encore vous supporter ? Amenez-moi l’enfant ici !
  '18':
  - type: text
    content: Jésus commanda avec sévérité au démon de sortir et, immédiatement, celui-ci sortit de l’enfant, qui fut guéri à l’heure même.
  '19':
  - type: text
    content: 'Alors, les disciples prirent Jésus à part et le questionnèrent : Pourquoi n’avons-nous pas réussi, nous, à chasser ce démon ?'
  '2':
  - type: text
    content: 'Il fut transfiguré devant eux : son visage se mit à resplendir comme le soleil ; ses vêtements prirent une blancheur éclatante, comme la lumière. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: – Parce que vous n’avez que peu de foi,
  - type: text
    content: ' leur répondit-il. '
  - type: text
    content: Vraiment, je vous l’assure, si vous aviez de la foi, même si elle n’était pas plus grosse qu’une graine de moutarde
  - type: note
    content: La graine de moutarde était, en Israël, la plus petite graine connue.
  - type: text
    content: ', vous pourriez commander à cette montagne : Déplace-toi d’ici jusque là-bas, et elle le ferait. Rien ne vous serait impossible'
  - type: note
    content: 'Certains manuscrits ajoutent : 21 Mais cette sorte de démon ne sort que par la prière et le jeûne.'
  - type: text
    content: .
  - type: heading
    content: La nouvelle annonce de la mort et de la résurrection de Jésus
  - type: heading
    content: (Mc 9.30-32 ; Lc 9.43-45)
  '22':
  - type: text
    content: 'Un jour qu’ils parcouraient ensemble la Galilée, Jésus leur dit : '
  - type: text
    content: 'Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' va être livré aux mains des hommes ;'
  - type: text
    content: ' '
  '23':
  - type: text
    content: ils le feront mourir mais, le troisième jour, il ressuscitera.
  - type: text
    content: Les disciples furent extrêmement affligés par ces paroles.
  - type: heading
    content: L’impôt du Temple
  '24':
  - type: text
    content: 'Ils se rendirent à Capernaüm. Là, les agents chargés de percevoir l’impôt pour le Temple vinrent trouver Pierre et lui demandèrent : Votre Maître ne paie-t-il pas l’impôt du Temple ?'
  '25':
  - type: text
    content: – Si, répondit-il, il le paie.
  - type: text
    content: 'Quand Pierre fut entré dans la maison, Jésus, prenant les devants, lui demanda : '
  - type: text
    content: 'Qu’en penses-tu, '
  - type: text
    content: Simon
  - type: text
    content: '  ? Qui est-ce qui paie les taxes et les impôts aux rois de la terre ? Les fils ou les étrangers ?'
  '26':
  - type: text
    content: – Les étrangers, répondit Pierre.
  - type: text
    content: – Donc,
  - type: text
    content: ' reprit Jésus, '
  - type: text
    content: les fils n’ont rien à payer.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Toutefois, ne semons pas le trouble chez ces gens. Descends donc jusqu’au lac, lance ta ligne à l’eau, attrape le premier poisson qui mordra, et ouvre-lui la bouche : tu y trouveras une pièce d’argent. Prends-la et donne-la aux agents en paiement de l’impôt pour nous deux.'
  '3':
  - type: text
    content: Et voici que Moïse et Elie
  - type: note
    content: 'Moïse et Elie représentent toute l’ancienne alliance : la Loi et les prophètes.'
  - type: text
    content: ' leur apparurent : ils s’entretenaient avec Jésus.'
  '4':
  - type: text
    content: 'Pierre s’adressa à Jésus et lui dit : Seigneur, il est bon que nous soyons ici. Si tu es d’accord, je vais dresser ici trois tentes, une pour toi, une pour Moïse et une pour Elie…'
  '5':
  - type: text
    content: 'Pendant qu’il parlait ainsi, une nuée lumineuse les enveloppa, et une voix en sortit qui disait : Celui-ci est mon Fils bien-aimé, celui qui fait toute ma joie. Ecoutez-le !'
  '6':
  - type: text
    content: En entendant cette voix, les disciples furent terrifiés et tombèrent le visage contre terre.
  '7':
  - type: text
    content: 'Mais Jésus s’approcha et posa la main sur eux en disant : '
  - type: text
    content: Relevez-vous et n’ayez pas peur.
  '8':
  - type: text
    content: Alors ils levèrent les yeux et ne virent plus que Jésus seul.
  '9':
  - type: text
    content: 'Pendant qu’ils descendaient de la montagne, Jésus leur donna cet ordre : '
  - type: text
    content: 'Ne racontez à personne ce que vous venez de voir avant que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' soit ressuscité.'
  - type: heading
    content: (Mc 9.10-13)
