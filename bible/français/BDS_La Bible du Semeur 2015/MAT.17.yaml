document_id: MAT.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révélation du royaume
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 9.2-9 ; Lc 9.28-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Six jours plus tard, Jésus prit avec lui Pierre, Jacques et Jean son frère, et les emmena sur une haute montagne, à l’écart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fut transfiguré devant eux : son visage se mit à resplendir comme le soleil ; ses vêtements prirent une blancheur éclatante, comme la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et voici que Moïse et Elie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse et Elie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'représentent toute l’ancienne alliance : la Loi et les prophètes.'
    marker-yv: yv-n
  - type: text
    text: ' leur apparurent : ils s’entretenaient avec Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre s’adressa à Jésus et lui dit : Seigneur, il est bon que nous soyons ici. Si tu es d’accord, je vais dresser ici trois tentes, une pour toi, une pour Moïse et une pour Elie…'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pendant qu’il parlait ainsi, une nuée lumineuse les enveloppa, et une voix en sortit qui disait : Celui-ci est mon Fils bien-aimé, celui qui fait toute ma joie. Ecoutez-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En entendant cette voix, les disciples furent terrifiés et tombèrent le visage contre terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Jésus s’approcha et posa la main sur eux en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Relevez-vous et n’ayez pas peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors ils levèrent les yeux et ne virent plus que Jésus seul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pendant qu’ils descendaient de la montagne, Jésus leur donna cet ordre : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne racontez à personne ce que vous venez de voir avant que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' soit ressuscité.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 9.10-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les disciples lui demandèrent alors : Pourquoi donc les spécialistes de la Loi disent-ils qu’Elie doit venir d’abord ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Effectivement, Elie doit venir remettre toutes choses en ordre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or, je vous le déclare : Elie est déjà venu, mais ils ne l’ont pas reconnu. Au contraire, ils l’ont traité comme ils ont voulu. Et c’est le même traitement que va subir de leur part le Fils de l’homme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les disciples comprirent alors qu’il parlait de Jean-Baptiste.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un enfant habité par un démon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 9.14-29 ; Lc 9.37-43)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand ils furent revenus auprès de la foule, un homme s’approcha de Jésus, se jeta à genoux devant lui et le supplia : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Seigneur, aie pitié de mon fils : il est épileptique'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: épileptique
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4.24
        metadata:
          usfm: MAT.4.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et il souffre beaucoup : il lui arrive souvent de tomber dans le feu ou dans l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je l’ai bien amené à tes disciples, mais ils n’ont pas réussi à le guérir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus s’exclama alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gens incrédules et infidèles à Dieu ! Jusqu’à quand devrai-je encore rester avec vous ? Jusqu’à quand devrai-je encore vous supporter ? Amenez-moi l’enfant ici !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jésus commanda avec sévérité au démon de sortir et, immédiatement, celui-ci sortit de l’enfant, qui fut guéri à l’heure même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors, les disciples prirent Jésus à part et le questionnèrent : Pourquoi n’avons-nous pas réussi, nous, à chasser ce démon ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Parce que vous n’avez que peu de foi,
  - type: text
    text: ' leur répondit-il. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, si vous aviez de la foi, même si elle n’était pas plus grosse qu’une graine de moutarde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'graine de moutarde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était, en Israël, la plus petite graine connue.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', vous pourriez commander à cette montagne : Déplace-toi d’ici jusque là-bas, et elle le ferait. Rien ne vous serait impossible'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '21 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mais cette sorte de démon ne sort que par la prière et le jeûne.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La nouvelle annonce de la mort et de la résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 9.30-32 ; Lc 9.43-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Un jour qu’ils parcouraient ensemble la Galilée, Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' va être livré aux mains des hommes ;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ils le feront mourir mais, le troisième jour, il ressuscitera.
- type: usfm
  marker: p
  children:
  - type: text
    text: Les disciples furent extrêmement affligés par ces paroles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’impôt du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils se rendirent à Capernaüm. Là, les agents chargés de percevoir l’impôt pour le Temple vinrent trouver Pierre et lui demandèrent : Votre Maître ne paie-t-il pas l’impôt du Temple ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: – Si, répondit-il, il le paie.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quand Pierre fut entré dans la maison, Jésus, prenant les devants, lui demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Qu’en penses-tu, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Simon
    - type: text
      text: '  ? Qui est-ce qui paie les taxes et les impôts aux rois de la terre ? Les fils ou les étrangers ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: – Les étrangers, répondit Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Donc,
  - type: text
    text: ' reprit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: les fils n’ont rien à payer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Toutefois, ne semons pas le trouble chez ces gens. Descends donc jusqu’au lac, lance ta ligne à l’eau, attrape le premier poisson qui mordra, et ouvre-lui la bouche : tu y trouveras une pièce d’argent. Prends-la et donne-la aux agents en paiement de l’impôt pour nous deux.'
