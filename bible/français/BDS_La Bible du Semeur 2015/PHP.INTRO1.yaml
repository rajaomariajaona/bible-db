document_id: PHP.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Lorsque Paul écrit cette lettre, il est en prison (1.7), à Ephèse selon certains, à Césarée selon d’autres, ou encore, plus vraisemblablement, à Rome où il vit dans la semi-captivité que décrit Actes 28 ; mais il espère être libéré « pour contribuer au progrès et à la joie dans la foi » (1.25) des chrétiens de la ville de Philippes.
  - type: text
    content: 'Ses destinataires sont des Macédoniens d’origine non juive pour la plupart, membres d’une Eglise que Paul a fondée (Ac 16.11-40) lors de son deuxième voyage missionnaire. L’Eglise a maintenu des relations étroites avec son fondateur : elle lui a envoyé, à plusieurs reprises, des dons matériels.'
  - type: text
    content: L’occasion immédiate de la lettre est le retour d’Epaphrodite auprès des Philippiens qui l’avaient délégué chez l’apôtre avec un don. Paul le renvoie à Philippes avec sa lettre ; il remercie l’Eglise pour le don reçu, donne de ses nouvelles et encourage ses correspondants à tenir ferme dans le témoignage. L’appel à l’unité laisse deviner quelques difficultés dans cette Eglise.
  - type: text
    content: 'Les nouvelles alternent donc avec les recommandations :'
  - type: text
    content: '1.12-26  : Nouvelles personnelles'
  - type: text
    content: '1.27 à 2.18  : Appel à l’unité et à l’humilité à l’exemple de Christ'
  - type: text
    content: '2.19-30  : Nouvelles de Timothée et d’Epaphrodite'
  - type: text
    content: '3.1 à 4.9  : Avertissements contre le légalisme et recommandations'
  - type: text
    content: '4.10-20  : Remerciements'
  - type: text
    content: Cette lettre est l’une des plus personnelles et des plus affectueuses de Paul. Le thème de la joie revient souvent sous sa plume, témoignage éloquent du triomphe de la foi sur l’adversité !
