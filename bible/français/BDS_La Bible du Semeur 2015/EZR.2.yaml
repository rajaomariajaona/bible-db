    text: ', il comprenait les descendants de Sothaï, de Sophéreth, de Perouda, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'de Yaala, de Darqôn, de Guiddel, '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: de Shephatia, de Hatthil, de Pokéreth-Hatsebaïm, d’Ami.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Total des desservants du Temple et des descendants des serviteurs de Salomon : 392.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Liste de ceux qui sont venus des villes de Tel-Mélah, de Tel-Harsha, de Keroub-Addân et d’Immer mais qui ne purent pas indiquer quels étaient leur groupe familial et leur ascendance, pour prouver leur origine israélite : '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'les descendants de Delaya, de Tobiya et de Neqoda : 652.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Et parmi les prêtres : les descendants de Hobaya, d’Haqqots et de Barzillaï. Ce dernier tenait son nom de Barzillaï, le Galaadite, dont il avait épousé une fille. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ils recherchèrent leurs registres généalogiques, mais ne les trouvèrent pas. Ils furent donc disqualifiés pour l’exercice du sacerdoce, '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: et le gouverneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.8'
        metadata:
          usfm: EZR.1.8
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' leur ordonna de ne pas manger des aliments consacrés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire la part des sacrifices qui revenait aux prêtres (voir Lv 6.22 ; 22.10-16 ; Nb 18.9).
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à ce qu’un prêtre ait consulté Dieu à leur sujet par l’ourim et le toummim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.30
        metadata:
          usfm: EXO.28.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'La communauté entière de ceux qui étaient revenus de l’exil comprenait 42 360 personnes '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: sans compter leurs 7 337 serviteurs et servantes. Parmi eux se trouvaient 200 musiciens et chanteuses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.65 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certainement des musiciens autres que les lévites des v. 41 et 70, qui se produisaient aux fêtes populaires ainsi que lors des mariages et des enterrements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 35.25
        metadata:
          usfm: 2CH.35.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ils avaient 736 chevaux, 245 mulets, '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 435 chameaux et 6 720 ânes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Lors de leur arrivée au temple de l’Eternel à Jérusalem, plusieurs chefs de groupes familiaux firent des offrandes volontaires pour la reconstruction du temple de Dieu sur son emplacement. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ils versèrent, chacun selon ses moyens, au fonds des travaux : 61 000 pièces d’or et 5 000 pièces d’argent, plus 100 tuniques sacerdotales.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Les prêtres et les lévites, les gens du peuple, les musiciens, les portiers et les desservants du Temple, tous les Israélites s’établirent dans leurs villes d’origine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.70 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 9.2 ; Né 11.3.
    marker-yv: yv-n
  - type: text
    text: .
