  '1':
  - type: heading
    content: La liste des Judéens rentrés d’exil
  - type: text
    content: Voici la liste
  - type: note
    content: La liste qui suit se retrouve en Né 7.6-72.
  - type: text
    content: ' des hommes originaires du district de Juda que Nabuchodonosor, roi de Babylone, avait déportés à Babylone et qui sont revenus de la captivité à Jérusalem et en Juda, chacun dans sa ville. '
  '10':
