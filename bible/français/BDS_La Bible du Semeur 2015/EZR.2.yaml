  '2':
  - type: text
    content: Ils revinrent sous la conduite de Zorobabel, Josué, Néhémie
  - type: note
    content: A ne pas confondre avec le Néhémie dont le livre biblique porte le nom et qui vivra près d’une centaine d’années plus tard (voir Né 1.1 et note).
  - type: text
    content: ', Seraya, Réélaya, Mardochée'
  - type: note
    content: Différent du Mardochée dont parle le livre d’Esther (voir Est 2.5) ; c’était un nom courant à Babylone (dérivé de Mardouk, dieu de Babylone).
  - type: text
    content: ', Bilshân, Mispar, Bigvaï, Rehoum, Baana.'
  - type: text
    content: 'Et voici le compte des Israélites :'
  '20':
  - type: text
    content: 'Descendants de Guibbar : 95.'
  '21':
  - type: text
    content: 'Descendants de Bethléhem : 123'
  - type: note
    content: Les v. 21-35 nomment une série de villes et de villages, principalement dans le territoire de Benjamin, au nord de Jérusalem.
  - type: text
    content: .
