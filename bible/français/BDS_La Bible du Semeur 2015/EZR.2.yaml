    content: 'Descendants de Shephatia : 372.'
  '40':
  - type: text
    content: 'Pour ce qui est des lévites :'
  - type: text
    content: 'Descendants de Josué et de Qadmiel, du groupe familial de Hodavia : 74.'
  '41':
  - type: text
    content: 'Musiciens : les descendants d’Asaph'
  - type: note
    content: Asaph fut l’un des trois lévites établis par David pour diriger la musique et le chant (1 Ch 15.16-24 ; 25.1 ; 2 Ch 5.12 ; 35.15).
  - type: text
    content: '  : 128.'
  '42':
  - type: text
    content: Groupe des portiers
  - type: note
    content: Lévites chargés de surveiller les entrées du Temple.
  - type: text
    content: '  : les descendants de Shalloum, d’Ather, de Talmôn, d’Aqqoub, de Hathitha, de Shobaï, en tout : 139.'
  '43':
  - type: text
    content: Les desservants
  - type: note
    content: Voir 8.20 ; 1 Ch 9.2. Chargés de tâches subalternes.
  - type: text
    content: ' du Temple : les descendants de Tsiha, de Hasoupha, de Thabbaoth, '
  '44':
  - type: text
    content: 'de Qéros, de Siaha, de Padôn, '
  '45':
  - type: text
    content: 'de Lebana, de Hagaba, d’Aqqoub, '
  '46':
  - type: text
    content: 'de Hagab, de Shalmaï, de Hanân, '
  '47':
  - type: text
    content: 'de Guiddel, de Gahar, de Reaya, '
  '48':
  - type: text
    content: 'de Retsîn, de Neqoda, de Gazzam, '
  '49':
  - type: text
    content: 'd’Ouzza, de Paséah, de Bésaï, '
  '5':
  - type: text
    content: 'Descendants d’Arah : 775.'
  '50':
  - type: text
    content: 'd’Asna, de Mehounim, de Nephousim, '
  '51':
  - type: text
    content: 'de Baqbouq, de Haqoupha, de Har-hour, '
  '52':
  - type: text
    content: 'de Batslouth, de Mehida, de Harsha, '
  '53':
  - type: text
    content: 'de Barqos, de Sisera, de Thamah, '
  '54':
  - type: text
    content: de Netsiah, de Hathipha.
  '55':
  - type: text
    content: Quant au groupe des descendants des serviteurs de Salomon
  - type: note
    content: Voir Né 7.57, 60 ; 11.3. Peut-être les descendants des ouvriers étrangers engagés à la construction du Temple sous Salomon (voir 1 R 9.20-21).
  - type: text
    content: ', il comprenait les descendants de Sothaï, de Sophéreth, de Perouda, '
  '56':
  - type: text
    content: 'de Yaala, de Darqôn, de Guiddel, '
  '57':
  - type: text
    content: de Shephatia, de Hatthil, de Pokéreth-Hatsebaïm, d’Ami.
  '58':
  - type: text
    content: 'Total des desservants du Temple et des descendants des serviteurs de Salomon : 392.'
  '59':
  - type: text
    content: 'Liste de ceux qui sont venus des villes de Tel-Mélah, de Tel-Harsha, de Keroub-Addân et d’Immer mais qui ne purent pas indiquer quels étaient leur groupe familial et leur ascendance, pour prouver leur origine israélite : '
  '6':
  - type: text
    content: 'Descendants de Pahath-Moab, de la postérité de Josué et de Joab : 2 812.'
  '60':
  - type: text
    content: 'les descendants de Delaya, de Tobiya et de Neqoda : 652.'
  '61':
  - type: text
    content: 'Et parmi les prêtres : les descendants de Hobaya, d’Haqqots et de Barzillaï. Ce dernier tenait son nom de Barzillaï, le Galaadite, dont il avait épousé une fille. '
  '62':
  - type: text
    content: 'Ils recherchèrent leurs registres généalogiques, mais ne les trouvèrent pas. Ils furent donc disqualifiés pour l’exercice du sacerdoce, '
  '63':
  - type: text
    content: et le gouverneur
  - type: note
    content: Voir 1.8 et note.
  - type: text
    content: ' leur ordonna de ne pas manger des aliments consacrés'
  - type: note
    content: C’est-à-dire la part des sacrifices qui revenait aux prêtres (voir Lv 6.22 ; 22.10-16 ; Nb 18.9).
  - type: text
    content: ' jusqu’à ce qu’un prêtre ait consulté Dieu à leur sujet par l’ourim et le toummim'
  - type: note
    content: Voir Ex 28.30.
  - type: text
    content: .
  '64':
  - type: text
    content: 'La communauté entière de ceux qui étaient revenus de l’exil comprenait 42 360 personnes '
  '65':
  - type: text
    content: sans compter leurs 7 337 serviteurs et servantes. Parmi eux se trouvaient 200 musiciens et chanteuses
  - type: note
    content: Certainement des musiciens autres que les lévites des v. 41 et 70, qui se produisaient aux fêtes populaires ainsi que lors des mariages et des enterrements (2 Ch 35.25).
  - type: text
    content: '. '
  '66':
  - type: text
    content: 'Ils avaient 736 chevaux, 245 mulets, '
  '67':
  - type: text
    content: 435 chameaux et 6 720 ânes.
  '68':
  - type: text
    content: 'Lors de leur arrivée au temple de l’Eternel à Jérusalem, plusieurs chefs de groupes familiaux firent des offrandes volontaires pour la reconstruction du temple de Dieu sur son emplacement. '
  '69':
  - type: text
    content: 'Ils versèrent, chacun selon ses moyens, au fonds des travaux : 61 000 pièces d’or et 5 000 pièces d’argent, plus 100 tuniques sacerdotales.'
  '7':
  - type: text
    content: 'Descendants d’Elam : 1 254.'
  '70':
  - type: text
    content: Les prêtres et les lévites, les gens du peuple, les musiciens, les portiers et les desservants du Temple, tous les Israélites s’établirent dans leurs villes d’origine
  - type: note
    content: Voir 1 Ch 9.2 ; Né 11.3.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Descendants de Zatthou : 945.'
  '9':
  - type: text
    content: 'Descendants de Zakkaï : 760.'
