document_id: NUM.8
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Comment placer les lampes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dis à Aaron : Lorsque tu mettras les sept lampes en place, tu les disposeras de manière à ce qu’elles projettent leur lumière sur le devant du chandelier.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aaron fit ainsi. Il plaça les lampes sur le devant du chandelier, comme l’Eternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce chandelier était fait d’or massif martelé, du pied jusqu’à ses fleurs. On l’avait façonné d’après le modèle que l’Eternel avait montré à Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 1-4, voir Ex 25.31-40 ; 37.17-24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’entrée en fonction des lévites
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Purification des lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sépare les lévites du reste des Israélites et purifie-les. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici comment tu procéderas pour les purifier : tu les aspergeras d’eau purificatrice, puis ils se raseront tout le corps et laveront leurs vêtements. Alors ils seront rituellement purs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils prendront un jeune taureau, avec l’offrande correspondante, c’est-à-dire de la fleur de farine pétrie à l’huile. Tu prendras un second taureau comme sacrifice pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu feras avancer les lévites devant la tente de la Rencontre et tu convoqueras toute la communauté des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu feras avancer les lévites devant l’Eternel, et les Israélites poseront les mains sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Aaron fera devant l’Eternel le geste de présentation pour m’offrir les lévites de la part des Israélites et ils seront affectés à mon service. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les lévites poseront leurs mains sur la tête des deux taureaux et tu m’offriras
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aaron m’offrira.
    marker-yv: yv-n
  - type: text
    text: ' l’un comme sacrifice pour le péché, et l’autre comme holocauste afin d’accomplir le rite d’expiation pour les lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu placeras les lévites devant Aaron et ses fils et tu feras le geste de présentation pour les offrir à l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi tu mettras à part les lévites du reste des Israélites et ils m’appartiendront. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Après cela, ils entreront en fonction pour le service de la tente de la Rencontre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tu les purifieras donc et tu feras le geste de présentation pour eux, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'car ils me sont entièrement donnés parmi les Israélites en échange de tous les premiers-nés des Israélites ; je les ai pris pour moi. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet tout premier-né chez les Israélites m’appartient, homme ou animal ; je les ai consacrés à moi-même, le jour où j’ai fait mourir tous les fils aînés des Egyptiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13.2
        metadata:
          usfm: EXO.13.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’ai pris les lévites en échange de tous les fils aînés israélites, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et je les ai donnés à Aaron et à ses fils d’entre les Israélites, pour qu’ils accomplissent le service des Israélites dans la tente de la Rencontre et qu’ils aient ainsi une fonction expiatoire pour eux afin que les Israélites ne soient frappés d’aucun fléau pour s’être approchés du sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 1.53
        metadata:
          usfm: NUM.1.53
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse, Aaron et toute la communauté des Israélites firent pour les lévites tout ce que l’Eternel avait ordonné à Moïse à leur sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les lévites se purifièrent et lavèrent leurs vêtements. Aaron fit le geste de présentation devant l’Eternel, puis il accomplit le rite d’expiation pour eux afin de les purifier. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Après cela, ils entrèrent en fonction dans la tente de la Rencontre sous la direction d’Aaron et de ses fils. On procéda donc à leur égard conformément à ce que l’Eternel avait ordonné à Moïse.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’âge du service pour les lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Eternel parla encore à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les lévites âgés de vingt-cinq ans et plus seront recrutés pour accomplir un service dans la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A cinquante ans, ils se retireront du service et n’exerceront plus leurs fonctions ; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ils aideront leurs collègues à accomplir le service dans la tente de la Rencontre, mais ils n’auront plus eux-mêmes de service actif. Telles sont les dispositions que tu prendras à l’égard du service des lévites.
