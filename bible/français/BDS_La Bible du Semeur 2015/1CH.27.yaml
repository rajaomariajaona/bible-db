document_id: 1CH.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’organisation de l’armée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici la liste des Israélites, chefs de groupe familial qui furent les commandants des « milliers » ou des « centaines » et les administrateurs qui assistaient le roi pour tout ce qui concernait les divisions militaires appelées tour à tour à prendre mensuellement leur service. Chaque division comptait 24 000 hommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme dans de nombreux autres textes, il pourrait s’agir de vingt-quatre « milliers » d’hommes. Un « millier » était peut-être un corps d’armée comprenant quelques centaines d’hommes.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième, pour le septième mois : Hélets le Pelonite, des descendants d’Ephraïm. Sa division comptait 24 000 hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième, pour le huitième mois : Sibbekaï, le Houshatite, de la famille des Zérahites. Sa division comptait 24 000 hommes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le neuvième, pour le neuvième mois : Abiézer, d’Anatoth, des Benjaminites. Sa division comptait 24 000 hommes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dixième, pour le dixième mois : Maharaï, de Netopha, de la famille des Zérahites. Sa division comptait 24 000 hommes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le onzième, pour le onzième mois : Benaya, de Piratôn, des Ephraïmites. Sa division comptait 24 000 hommes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le douzième, pour le douzième mois : Heldaï, de Netopha, descendant d’Otniel. Sa division comptait 24 000 hommes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chefs des tribus
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les chefs des tribus d’Israël : les Rubénites avaient comme chef Eliézer, fils de Zikri ; les Siméonites : Shephatia, fils de Maaka. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Lévi, c’était Hashabia, fils de Qemouel ; pour Aaron, Tsadoq ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Juda : Elihou, frère de David ; pour Issacar : Omri, fils de Michaël ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Zabulon : Yishmaya, fils d’Abdias ; pour Nephtali : Yerimoth, fils d’Azriel ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A la tête de la première division affectée au premier mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mois de la Pâque (Ex 12.2 ; Esd 6.19).
      marker-yv: yv-n
    - type: text
      text: ' se trouvait Yashobeam, fils de Zabdiel. Sa division comptait 24 000 hommes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour les descendants d’Ephraïm : Osée, fils d’Azazia ; pour la demi-tribu de Manassé : Joël, fils de Pedaya ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour la demi-tribu de Manassé en Galaad : Yiddo, fils de Zacharie ; pour Benjamin : Yaasiel, fils d’Abner ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour Dan : Azaréel, fils de Yeroham. Ce sont là les chefs des tribus d’Israël.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David ne comptait pas dans le dénombrement les moins de vingt ans, car l’Eternel avait promis de rendre Israël aussi nombreux que les étoiles du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 15.5 ; 22.17 ; 26.4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joab, fils de Tserouya, avait commencé le recensement ; mais il ne l’acheva pas. D’ailleurs, à cause de ce recensement, l’Eternel se mit en colère contre Israël. C’est pourquoi les chiffres de ce recensement n’ont pas été reportés dans les Annales du roi David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les administrateurs des biens du roi
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le responsable des trésors du roi était Azmaveth, fils d’Adiel. Le responsable des trésors entreposés à la campagne, dans les villes, les villages, et les tours, était Jonathan, fils d’Ozias. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le responsable des ouvriers agricoles qui cultivaient la terre était Ezri, fils de Keloub. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le responsable des vignobles était Shimeï, de Rama ; celui des réserves de vin dans les vignes était Zabdi, de Shepham. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le responsable des plantations d’oliviers et de sycomores du Bas-Pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire la plaine côtière du littoral méditerranéen, célèbre pour sa fertilité. Les sycomores ne doivent pas être confondus avec les arbres portant ce nom dans nos régions : ce sont des figuiers aux feuilles semblables à celle du mûrier qui croissent en abondance de l’Egypte à la Syrie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 19.4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' était Baal-Hanân, de Guéder ; celui des réserves d’huile était Joas. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le responsable des troupeaux de bétail qui avaient leur pâture dans la plaine du Saron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Partie nord de la plaine côtière qui s’étend de Jaffa au pied du mont Carmel.
      marker-yv: yv-n
    - type: text
      text: ' était Shitraï, de Saron ; celui du bétail qui se trouvait dans les vallées était Shaphath, fils d’Adlaï. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était de la lignée de Pérets et commandait tous les chefs d’armée du premier mois. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le responsable des chameaux était Obil, l’Ismaélite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Donc un descendant d’Ismaël (voir Gn 16.11-12 ; 25.12-18).
      marker-yv: yv-n
    - type: text
      text: '  ; celui des ânesses était Yéhdeya, de Méronoth. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le responsable des troupeaux de moutons et de chèvres était Yaziz, l’Agarénien. Tous ceux-là étaient les intendants des biens du roi David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les conseillers privés de David
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan, oncle de David, et son conseiller, un homme intelligent, qui était secrétaire, avait la charge, avec Yehiel, fils de Hakmoni, de l’éducation des fils du roi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahitophel était conseiller du roi. Houshaï, l’Arkien, était son confident. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après Ahitophel, il y eut Yehoyada, fils de Benaya, et Abiatar. Joab était chef des armées du roi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la tête de la division du second mois comprenant également 24 000 hommes se trouvait Dodaï l’Ahohite. Miqloth était le chef de sa division. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le commandant de la troisième armée pour le troisième mois était Benaya, fils du grand-prêtre Yehoyada. Il avait dans sa division 24 000 hommes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce Benaya était l’un des guerriers du groupe des trente, il était à sa tête. Son fils Ammizadab avait sa division sous ses ordres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le quatrième commandant affecté au quatrième mois était Asaël, frère de Joab. Son fils Zebadia lui succéda. Sa division comprenait 24 000 hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cinquième, pour le cinquième mois, était le commandant Shamehouth de la famille d’Yizrah. Sa division comptait 24 000 hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour le sixième mois : Ira fils d’Iqqesh, le Teqoïte. Sa division comptait 24 000 hommes. '
