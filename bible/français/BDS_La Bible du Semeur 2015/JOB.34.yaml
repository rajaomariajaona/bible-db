document_id: JOB.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu est toujours juste
  - type: text
    content: 'Elihou reprit la parole et dit :'
  '10':
  - type: text
    content: 'Aussi, écoutez-moi, ╵vous qui êtes sensés :'
  - type: text
    content: il est inconcevable ╵que Dieu fasse le mal,
  - type: text
    content: et que le Tout-Puissant ╵pratique l’injustice,
  '11':
  - type: text
    content: car il rend à chaque homme ╵selon ce qu’il a fait,
  - type: text
    content: et il traite chacun ╵selon son attitude.
  '12':
  - type: text
    content: Oh, non en vérité, ╵Dieu n’agit jamais mal,
  - type: text
    content: jamais le Tout-Puissant ╵ne fausse la justice.
  '13':
  - type: text
    content: Qui donc lui a confié ╵la charge de la terre
  - type: text
    content: ou qui lui a remis ╵le soin du monde entier ?
  '14':
  - type: text
    content: S’il portait sur lui-même ╵toute son attention,
  - type: text
    content: s’il ramenait à lui ╵son Esprit et son souffle,
  '15':
  - type: text
    content: toutes les créatures ╵expireraient ensemble ;
  - type: text
    content: l’homme retournerait ╵aussi à la poussière.
  '16':
  - type: text
    content: Si tu as du bon sens, ╵écoute donc ceci,
  - type: text
    content: et sois bien attentif ╵à mes paroles.
  '17':
  - type: text
    content: Un ennemi du droit ╵pourrait-il gouverner ?
  - type: text
    content: Oses-tu condamner ╵le Juste, le Puissant ?
  '18':
  - type: text
    content: 'Celui qui dit aux rois : ╵« Tu n’es qu’un scélérat »,'
  - type: text
    content: et qui traite les grands ╵de criminels,
  '19':
  - type: text
    content: ne favorise pas les princes,
  - type: text
    content: ni ne privilégie ╵le riche par rapport au pauvre.
  - type: text
    content: Ils sont tous, en effet, ╵l’ouvrage de ses mains.
  '2':
  - type: text
    content: O vous qui êtes sages, ╵écoutez mes paroles,
  - type: text
    content: vous qui avez la connaissance ╵prêtez votre attention !
  '20':
  - type: text
    content: 'En un instant, ils meurent :'
  - type: text
    content: au milieu de la nuit, ╵un peuple se révolte, ╵alors ils disparaissent ;
  - type: text
    content: on dépose un tyran ╵sans qu’une main se lève,
  '21':
  - type: text
    content: car Dieu observe ╵la conduite de l’homme,
  - type: text
    content: et il a les regards ╵sur tous ses faits et gestes.
  '22':
  - type: text
    content: Car il n’y a pour lui ╵aucune obscurité, ╵pas d’épaisses ténèbres
  - type: text
    content: où pourraient se cacher ╵les artisans du mal.
  '23':
  - type: text
    content: Oui, Dieu n’a pas besoin ╵d’épier longtemps un homme
  - type: text
    content: pour le faire assigner ╵devant lui en justice.
  '24':
  - type: text
    content: Sans une longue enquête, ╵il brise les tyrans
  - type: text
    content: et met d’autres gens à leur place.
  '25':
  - type: text
    content: Car il connaît leurs œuvres.
  - type: text
    content: Aussi, en pleine nuit
  - type: note
    content: C’est-à-dire à l’improviste (voir v. 20).
  - type: text
    content: ', ╵soudain, il les renverse, ╵les voilà écrasés.'
  '26':
  - type: text
    content: Comme des criminels,
  - type: text
    content: il les frappe en public.
  '27':
  - type: text
    content: Ils lui tournaient le dos
  - type: text
    content: et ignoraient ╵toutes ses directives.
  '28':
  - type: text
    content: Car ils ont fait monter vers lui ╵le cri des pauvres
  - type: text
    content: et il a entendu ╵les cris des opprimés.
  '29':
  - type: text
    content: S’il garde le silence
  - type: note
    content: 'Autre traduction : s’il donne le repos.'
  - type: text
    content: ', ╵qui le condamnera ?'
  - type: text
    content: Et s’il cache sa face, ╵qui pourra le voir malgré tout ?
  - type: text
    content: Pourtant, pour les nations et pour les hommes,
  '3':
  - type: text
    content: Car l’oreille discerne ╵la valeur des paroles,
  - type: text
    content: comme le palais juge ╵du goût des aliments.
  '30':
  - type: text
    content: Dieu fait en sorte d’empêcher ╵que règne un souverain impie
  - type: text
    content: et qu’on tende des pièges au peuple.
  '31':
  - type: text
    content: 'Cet homme va-t-il dire à Dieu :'
  - type: text
    content: « J’ai eu mon châtiment, ╵je ne me rendrai plus coupable.
  '32':
  - type: text
    content: Ce que je ne vois pas, ╵toi, enseigne-le-moi.
  - type: text
    content: Si j’ai commis des injustices, ╵je ne le ferai plus » ?
  '33':
  - type: text
    content: Pour rétribuer un tel homme, ╵Dieu devrait-il consulter ton avis, ╵toi qui critiques ?
  - type: text
    content: Si toi tu choisis de penser ainsi, ╵pour ma part, ce n’est pas mon cas
  - type: note
    content: 'Hébreu peu clair. Plus litt. : c’est toi qui choisis, pas moi. On peut comprendre de trois manières : 1. Elihou dit à Job : « C’est toi qui penses ainsi, mais ce n’est pas mon cas ». 2. Elihou dit à Job : « C’est à toi de choisir (de changer d’attitude), pas à moi ». 3. Elihou place ces paroles dans la bouche de Dieu : « Dieu devrait-il te dire : “c’est à toi de décider, pas à moi” ? »'
  - type: text
    content: .
  - type: text
    content: Allez, dis donc ce que tu sais !
  '34':
  - type: text
    content: Les hommes de bon sens ╵aussi bien que les sages ╵qui m’auront entendu
  - type: text
    content: 'conviendront avec moi :'
  '35':
  - type: text
    content: Job parle sans savoir
  - type: text
    content: et ses paroles ╵manquent d’intelligence.
  '36':
  - type: text
    content: Que son épreuve ╵aille jusqu’à son terme
  - type: text
    content: puisqu’il répond ╵à la manière des injustes.
  '37':
  - type: text
    content: Car il ajoute à son péché
  - type: text
    content: et abonde en révolte parmi nous
  - type: note
    content: 'Autre traduction : Car, en plus de sa faute, voilà qu’il se révolte, il sème le doute parmi nous.'
  - type: text
    content: '  ;'
  - type: text
    content: et puis il multiplie ╵ses propos contre Dieu.
  '4':
  - type: text
    content: Choisissons donc pour nous le droit
  - type: text
    content: et reconnaissons entre nous ╵ce qui est bien.
  '5':
  - type: text
    content: 'Voici ce qu’a prétendu Job : ╵« Je suis dans mon bon droit'
  - type: note
    content: Voir 10.15 ; 13.18.
  - type: text
    content: ','
  - type: text
    content: mais Dieu me refuse justice
  - type: note
    content: Voir 19.7 ; 27.2.
  - type: text
    content: .
  '6':
  - type: text
    content: Alors que je suis juste ╵je passe pour menteur
  - type: note
    content: Voir 10.17 ; 16.8.
  - type: text
    content: .
  - type: text
    content: Des flèches m’ont percé ╵me causant des plaies incurables ╵sans que j’aie commis de péché
  - type: note
    content: Voir 6.4 ; 16.13.
  - type: text
    content: . »
  '7':
  - type: text
    content: Quel homme est comme Job,
  - type: text
    content: pour boire l’insolence ╵comme on boirait de l’eau ?
  '8':
  - type: text
    content: Il fait cause commune ╵avec les malfaiteurs
  - type: text
    content: et marche en compagnie ╵de ceux qui sont méchants.
  '9':
  - type: text
    content: 'N’a-t-il pas dit lui-même : ╵« L’homme ne gagne rien'
  - type: text
    content: à vouloir plaire à Dieu
  - type: note
    content: Voir 9.22-24 ; 21.7-34.
  - type: text
    content: '  » ?'
