document_id: JOB.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu est toujours juste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihou reprit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O vous qui êtes sages, ╵écoutez mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui avez la connaissance ╵prêtez votre attention !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car l’oreille discerne ╵la valeur des paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le palais juge ╵du goût des aliments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Choisissons donc pour nous le droit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et reconnaissons entre nous ╵ce qui est bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce qu’a prétendu Job : ╵« Je suis dans mon bon droit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 10.15 ; 13.18.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais Dieu me refuse justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 19.7 ; 27.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors que je suis juste ╵je passe pour menteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 10.17 ; 16.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des flèches m’ont percé ╵me causant des plaies incurables ╵sans que j’aie commis de péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 6.4 ; 16.13.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quel homme est comme Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour boire l’insolence ╵comme on boirait de l’eau ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il fait cause commune ╵avec les malfaiteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et marche en compagnie ╵de ceux qui sont méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'N’a-t-il pas dit lui-même : ╵« L’homme ne gagne rien'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à vouloir plaire à Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 9.22-24 ; 21.7-34.
    marker-yv: yv-n
  - type: text
    text: '  » ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aussi, écoutez-moi, ╵vous qui êtes sensés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est inconcevable ╵que Dieu fasse le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le Tout-Puissant ╵pratique l’injustice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car il rend à chaque homme ╵selon ce qu’il a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il traite chacun ╵selon son attitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oh, non en vérité, ╵Dieu n’agit jamais mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais le Tout-Puissant ╵ne fausse la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui donc lui a confié ╵la charge de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou qui lui a remis ╵le soin du monde entier ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: S’il portait sur lui-même ╵toute son attention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il ramenait à lui ╵son Esprit et son souffle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: toutes les créatures ╵expireraient ensemble ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’homme retournerait ╵aussi à la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si tu as du bon sens, ╵écoute donc ceci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sois bien attentif ╵à mes paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un ennemi du droit ╵pourrait-il gouverner ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oses-tu condamner ╵le Juste, le Puissant ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Celui qui dit aux rois : ╵« Tu n’es qu’un scélérat »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui traite les grands ╵de criminels,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ne favorise pas les princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni ne privilégie ╵le riche par rapport au pauvre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont tous, en effet, ╵l’ouvrage de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En un instant, ils meurent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de la nuit, ╵un peuple se révolte, ╵alors ils disparaissent ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dépose un tyran ╵sans qu’une main se lève,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: car Dieu observe ╵la conduite de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a les regards ╵sur tous ses faits et gestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car il n’y a pour lui ╵aucune obscurité, ╵pas d’épaisses ténèbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: où pourraient se cacher ╵les artisans du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Oui, Dieu n’a pas besoin ╵d’épier longtemps un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le faire assigner ╵devant lui en justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sans une longue enquête, ╵il brise les tyrans
- type: usfm
  marker: q1
  children:
  - type: text
    text: et met d’autres gens à leur place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Car il connaît leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi, en pleine nuit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire à l’improviste (voir v. 20).
    marker-yv: yv-n
  - type: text
    text: ', ╵soudain, il les renverse, ╵les voilà écrasés.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Comme des criminels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les frappe en public.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils lui tournaient le dos
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ignoraient ╵toutes ses directives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car ils ont fait monter vers lui ╵le cri des pauvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a entendu ╵les cris des opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: S’il garde le silence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s’il donne le repos.
    marker-yv: yv-n
  - type: text
    text: ', ╵qui le condamnera ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’il cache sa face, ╵qui pourra le voir malgré tout ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, pour les nations et pour les hommes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dieu fait en sorte d’empêcher ╵que règne un souverain impie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on tende des pièges au peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Cet homme va-t-il dire à Dieu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « J’ai eu mon châtiment, ╵je ne me rendrai plus coupable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ce que je ne vois pas, ╵toi, enseigne-le-moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai commis des injustices, ╵je ne le ferai plus » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Pour rétribuer un tel homme, ╵Dieu devrait-il consulter ton avis, ╵toi qui critiques ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si toi tu choisis de penser ainsi, ╵pour ma part, ce n’est pas mon cas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreu peu clair. Plus litt. : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c’est toi qui choisis, pas moi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On peut comprendre de trois manières : 1. Elihou dit à Job : « C’est toi qui penses ainsi, mais ce n’est pas mon cas ». 2. Elihou dit à Job : « C’est à toi de choisir (de changer d’attitude), pas à moi ». 3. Elihou place ces paroles dans la bouche de Dieu : « Dieu devrait-il te dire : “c’est à toi de décider, pas à moi” ? »'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez, dis donc ce que tu sais !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les hommes de bon sens ╵aussi bien que les sages ╵qui m’auront entendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'conviendront avec moi :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Job parle sans savoir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses paroles ╵manquent d’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Que son épreuve ╵aille jusqu’à son terme
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisqu’il répond ╵à la manière des injustes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Car il ajoute à son péché
- type: usfm
  marker: q1
  children:
  - type: text
    text: et abonde en révolte parmi nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Car, en plus de sa faute, voilà qu’il se révolte, il sème le doute parmi nous.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et puis il multiplie ╵ses propos contre Dieu.
