document_id: SNG.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Le plus beau des chants, composé par Salomon
  - type: note
    content: Voir l’introduction. Le roi est encore mentionné en 1.5 ; 3.7, 9, 11 ; 8.11-12.
  - type: text
    content: .
  - type: heading
    content: Célébrons l’amour
  '10':
  - type: text
    content: Tes joues sont belles ╵entre les perles,
  - type: text
    content: ton cou est beau ╵dans tes colliers ;
  '11':
  - type: text
    content: nous te ferons ╵des perles d’or
  - type: text
    content: tout incrustées ╵de points d’argent. »
  '12':
  - type: text
    content: « Jusqu’à ce que le roi ╵parvienne à son enclos
  - type: note
    content: 'Autre traduction : pendant que le roi mangeait à sa table.'
  - type: text
    content: ','
  - type: text
    content: mon nard
  - type: note
    content: Plante aromatique originaire de l’Inde.
  - type: text
    content: ' exhale son parfum.'
  '13':
  - type: text
    content: Car mon bien-aimé est pour moi ╵comme un sachet de myrrhe
  - type: note
    content: La myrrhe était une gomme aromatique extraite du balsamier qui pousse en Arabie, en Ethiopie et aux Indes. Elle était utilisée comme parfum (Est 2.12 ; Pr 7.17 ; Ps 45.9  ; comparer Mt 2.2, 11) ; elle entrait aussi dans la composition de l’huile sainte (Ex 30.23).
  - type: text
    content: ','
  - type: text
    content: entre mes seins ╵il passera la nuit.
  '14':
  - type: text
    content: Oui, mon bien-aimé est pour moi ╵un bouquet de henné
  - type: note
    content: Plante aromatique utilisée comme parfum.
  - type: text
    content: des vignes d’Eyn-Guédi
  - type: note
    content: Oasis alimentée par une source, à l’ouest de la mer Morte, où poussent beaucoup de plantes aromatiques.
  - type: text
    content: . »
  '15':
  - type: text
    content: « Que tu es belle, ╵ma bien-aimée, ╵que tu es belle !
  - type: text
    content: Tes yeux ressemblent ╵à des colombes. »
  '16':
  - type: text
    content: « Que tu es beau, mon bien-aimé, ╵tu es superbe !
  - type: text
    content: Dans la verdure est notre lit.
  '17':
  - type: text
    content: Les solives de nos maisons, ╵ce sont les cèdres,
  - type: text
    content: et les cyprès sont nos lambris. »
  '2':
  - type: text
    content: « Ah ! que ta bouche ╵me couvre de baisers,
  - type: text
    content: car ton amour ╵est plus exaltant que le vin.
  '3':
  - type: text
    content: Combien suaves ╵sont tes parfums,
  - type: text
    content: ton nom est comparable
  - type: note
    content: 'Autre traduction : et ta renommée est comparable.'
  - type: text
    content: ' ╵à une huile odorante ╵qui se répand.'
  - type: text
    content: Voilà pourquoi ╵les jeunes filles ╵sont éprises de toi.
  '4':
  - type: text
    content: Entraîne-moi derrière toi ! ╵Courons ensemble ! »
  - type: text
    content: « Le roi m’a fait entrer ╵dans ses appartements. »
  - type: heading
    content: Le chœur
  - type: text
    content: « Réjouissons-nous, ╵soyons dans l’allégresse ╵à ton sujet !
  - type: text
    content: Célébrons ton amour ╵plus exaltant que le bon vin !
  - type: text
    content: C’est bien avec raison ╵qu’on est épris de toi. »
  '5':
  - type: text
    content: « O filles de Jérusalem
  - type: note
    content: Voir v. 3.
  - type: text
    content: ', ╵je suis noiraude, ╵et pourtant, je suis belle,'
  - type: text
    content: pareille aux tentes de Qédar
  - type: note
    content: 'Qédar: tribu arabe fixée au sud-est d’Edom et habitant sous des tentes (Jr 49.29) faites du poil des chèvres noires de ces régions. Le mot Qédar vient d’une racine hébraïque signifiant : être noir.'
  - type: text
    content: ', ╵aux tentures de Salomon.'
  '6':
  - type: text
    content: 'Ne vous étonnez pas ╵si je suis bien brunie :'
  - type: text
    content: le soleil m’a hâlée,
  - type: text
    content: car les fils de ma mère, ╵irrités contre moi,
  - type: text
    content: m’ont fait garder les vignes,
  - type: text
    content: oui, mais ma vigne à moi, ╵je ne l’ai pas gardée.
  '7':
  - type: text
    content: O toi que mon cœur aime,
  - type: text
    content: dis-moi où tu fais paître ╵ton troupeau de brebis,
  - type: text
    content: où tu le feras reposer ╵à l’heure de midi,
  - type: text
    content: pour que je ne sois pas ╵comme une femme errante
  - type: note
    content: 'errante: comme une vagabonde, une coureuse qui cherche l’aventure ; ou : une voilée, c’est-à-dire une prostituée (Gn 38.14-15).'
  - type: text
    content: ','
  - type: text
    content: rôdant près des troupeaux ╵que gardent tes compagnons. »
  '8':
  - type: text
    content: « Si tu ne le sais pas, ╵ô toi, la plus belle des femmes,
  - type: text
    content: va donc suivre les traces ╵du troupeau de brebis,
  - type: text
    content: fais paître tes chevrettes ╵près des huttes des pâtres. »
  - type: heading
    content: Avec les yeux de l’amour
  '9':
  - type: text
    content: « O mon amie, ╵je te trouve pareille
  - type: text
    content: à une jument d’attelage ╵du pharaon
  - type: note
    content: Voir 1 R 10.29.
  - type: text
    content: .
