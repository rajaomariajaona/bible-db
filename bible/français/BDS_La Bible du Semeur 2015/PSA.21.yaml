document_id: PSA.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Merci pour la victoire
  - type: text
    content: Au chef de chœur. Cantique de David.
  '10':
  - type: text
    content: Tu en feras une fournaise
  - type: text
    content: quand tu apparaîtras ;
  - type: text
    content: dans sa colère, ╵l’Eternel les engloutira
  - type: text
    content: et le feu les consumera.
  '11':
  - type: text
    content: Tu extirperas de la terre ╵leurs descendants,
  - type: text
    content: et leur postérité ╵du milieu de l’humanité.
  '12':
  - type: text
    content: Ils trament le mal contre toi,
  - type: text
    content: ils ont conçu des plans perfides, ╵mais ils ne réussiront pas.
  '13':
  - type: text
    content: Tu les mettras en fuite,
  - type: text
    content: en décochant tes flèches ╵sur eux.
  '14':
  - type: text
    content: O Eternel, ╵déploie ta force !
  - type: text
    content: Par nos chants et nos hymnes, ╵nous célébrerons ta puissance.
  '2':
  - type: text
    content: O Eternel, ╵le roi se réjouit de ta force.
  - type: text
    content: Qu’elle est grande sa joie ╵devant ton œuvre de salut !
  '3':
  - type: text
    content: Tu lui as accordé ╵le désir de son cœur,
  - type: text
    content: tu n’as pas refusé ╵ce qu’il te demandait.
  - type: text
    content: Pause
  '4':
  - type: text
    content: Tu es venu à lui ╵chargé de bénédictions excellentes,
  - type: text
    content: et tu as posé sur sa tête ╵un diadème d’or.
  '5':
  - type: text
    content: Il t’avait demandé la vie, ╵tu la lui as donnée
  - type: text
    content: et tu prolongeras ses jours ╵jusqu’en l’éternité.
  '6':
  - type: text
    content: Grâce à la délivrance ╵que tu as accordée, ╵sa gloire est grande,
  - type: text
    content: et tu l’as revêtu ╵de splendeur et d’honneur.
  '7':
  - type: text
    content: Tu fais de lui la source ╵de bénédictions éternelles
  - type: note
    content: 'Allusion à la promesse faite à Abraham (Gn 12.2). Autres traductions : tu lui as donné des bénédictions éternelles, ou tu fais de lui un béni pour l’éternité.'
  - type: text
    content: ','
  - type: text
    content: tu le remplis de joie ╵par ta présence.
  '8':
  - type: text
    content: Car c’est en l’Eternel ╵que le roi se confie,
  - type: text
    content: et grâce à l’amour du Très-Haut, ╵il ne sera pas ébranlé.
  '9':
  - type: text
    content: O roi, tu atteindras ╵tes ennemis ;
  - type: text
    content: tu frapperas ╵tous ceux qui te haïssent.
