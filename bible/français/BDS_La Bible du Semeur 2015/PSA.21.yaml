document_id: PSA.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Merci pour la victoire
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Cantique de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu en feras une fournaise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu apparaîtras ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa colère, ╵l’Eternel les engloutira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le feu les consumera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu extirperas de la terre ╵leurs descendants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur postérité ╵du milieu de l’humanité.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils trament le mal contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont conçu des plans perfides, ╵mais ils ne réussiront pas.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu les mettras en fuite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en décochant tes flèches ╵sur eux.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: O Eternel, ╵déploie ta force !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par nos chants et nos hymnes, ╵nous célébrerons ta puissance.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Eternel, ╵le roi se réjouit de ta force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle est grande sa joie ╵devant ton œuvre de salut !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu lui as accordé ╵le désir de son cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n’as pas refusé ╵ce qu’il te demandait.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu es venu à lui ╵chargé de bénédictions excellentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as posé sur sa tête ╵un diadème d’or.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il t’avait demandé la vie, ╵tu la lui as donnée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu prolongeras ses jours ╵jusqu’en l’éternité.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Grâce à la délivrance ╵que tu as accordée, ╵sa gloire est grande,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu l’as revêtu ╵de splendeur et d’honneur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu fais de lui la source ╵de bénédictions éternelles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la promesse faite à Abraham (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 12.2
        - type: text
          text: '). Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu lui as donné des bénédictions éternelles, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu fais de lui un béni pour l’éternité.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu le remplis de joie ╵par ta présence.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car c’est en l’Eternel ╵que le roi se confie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et grâce à l’amour du Très-Haut, ╵il ne sera pas ébranlé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: O roi, tu atteindras ╵tes ennemis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu frapperas ╵tous ceux qui te haïssent.
