document_id: 2SA.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le recensement coupable et la peste
  - type: heading
    content: (1 Ch 21.1-17)
  - type: text
    content: L’Eternel se mit de nouveau en colère contre les Israélites et il incita David à agir contre leurs intérêts en lui suggérant l’idée de faire le recensement d’Israël et de Juda.
  '10':
  - type: text
    content: 'Soudain, David sentit son cœur battre parce qu’il avait ainsi recensé le peuple, et il dit à l’Eternel : J’ai commis une grave faute en faisant cela ! Maintenant, Eternel, daigne pardonner la faute de ton serviteur car je reconnais que j’ai agi tout à fait comme un insensé !'
  '11':
  - type: text
    content: 'Quand David se leva le lendemain matin, l’Eternel s’adressa au prophète Gad, attaché à la cour de David, en ces termes : '
  '12':
  - type: text
    content: 'Va dire à David : « Voici ce que déclare l’Eternel : Je t’impose l’un des trois châtiments suivants ; choisis l’un d’eux et je te l’infligerai. »'
  '13':
  - type: text
    content: 'Gad se rendit donc chez David et lui communiqua le message ; il lui dit : Que veux-tu que je fasse venir contre toi : sept années de famine dans ton pays, trois mois de déroute devant tes ennemis qui s’acharneront contre toi, ou trois jours de peste dans ton pays ? Réfléchis donc et décide, puis dis-moi ce que je dois répondre à celui qui m’envoie.'
  '14':
  - type: text
    content: 'David répondit à Gad : Je suis dans un grand désarroi ! Ah ! tombons plutôt entre les mains de l’Eternel, car ses compassions sont grandes ; mais que je ne tombe pas entre les mains des hommes !'
  '15':
  - type: text
    content: 'L’Eternel fit donc sévir une épidémie de peste en Israël, depuis ce matin-là jusqu’au terme fixé. Elle sévit de Dan à Beer-Sheva, et fit périr soixante-dix mille personnes. '
  '16':
  - type: text
    content: 'L’ange allait étendre sa main sur Jérusalem pour la dévaster, mais l’Eternel ne voulut pas ce malheur et y renonça. Il ordonna à l’ange qui était en train de décimer le peuple : Cela suffit maintenant ! Retire ta main !'
  - type: text
    content: L’ange de l’Eternel se tenait alors près de l’aire d’Orna, le Yebousien, entre ciel et terre, son épée dégainée à la main
  - type: note
    content: Cette fin du v. 16 manque dans le texte hébreu traditionnel. Elle est restituée d’après le manuscrit hébreu de Qumrân et 1 Ch 21.15.
  - type: text
    content: .
  '17':
  - type: text
    content: 'En voyant l’ange qui frappait le peuple, David pria en disant : Voici : c’est moi seul qui ai péché, c’est moi, le berger'
  - type: note
    content: 'c’est moi, le berger: d’après le texte hébreu de Qumrân (voir 1 Ch 21.17).'
  - type: text
    content: ', qui ai commis une faute, mais ce pauvre troupeau, qu’a-t-il fait de mal ? Frappe-moi donc plutôt, ainsi que ma famille.'
  - type: heading
    content: (1 Ch 21.18-26)
  '18':
  - type: text
    content: 'Ce même jour, Gad se rendit auprès de David et lui ordonna : Monte à l’aire'
  - type: note
    content: Les aires se trouvaient généralement au sommet des collines où le vent emportait la bale du blé que l’on vannait. Cette aire se trouvait au sommet du mont Morija.
  - type: text
    content: ' d’Orna'
  - type: note
    content: 'Orna: d’après le texte hébreu de Qumrân et l’ancienne version grecque ; le texte hébreu traditionnel a : Aravna.'
  - type: text
    content: ' le Yebousien et dresses-y un autel à l’Eternel.'
  '19':
  - type: text
    content: 'David s’y rendit comme l’Eternel le lui avait ordonné par l’intermédiaire de Gad. '
  '2':
  - type: text
    content: Alors le roi ordonna à Joab, chef de son armée
  - type: note
    content: 'L’ancienne version grecque et 1 Ch 21.2 (voir v. 4) ont : et les chefs de l’armée. Il s’agit d’un recensement militaire (voir v. 9) qui ne comprend donc pas la tribu de Lévi (ni celle de Benjamin, voir 1 Ch 21.6 ; 27.23) ni les hommes de moins de 20 ans.'
  - type: text
    content: ' qui se trouvait près de lui : Parcours, je te prie, toutes les tribus d’Israël, depuis Dan jusqu’à Beer-Sheva ; que l’on recense le peuple, pour que je sache quel en est le nombre !'
  '20':
  - type: text
    content: Orna, qui était en train de battre du blé, regarda d’en haut et vit le roi et ses ministres venir vers lui, revêtus de vêtements d’étoffe grossière
  - type: note
    content: 'Les mots : Orna, qui était en train de battre du blé et revêtus de vêtements d’étoffe grossière manquent dans le texte hébreu traditionnel. Ils sont rajoutés ici d’après le texte hébreu de Qumrân et 1 Ch 21.20.'
  - type: text
    content: . Il sortit et se prosterna devant le roi, le visage contre terre
  - type: note
    content: D’après le texte hébreu de Qumrân (voir 1 Ch 21.20).
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'et il demanda : Pourquoi mon seigneur le roi vient-il vers son serviteur ?'
  - type: text
    content: 'David lui dit : Je viens t’acheter cette aire pour y bâtir un autel à l’Eternel afin que cesse le fléau qui sévit contre le peuple.'
  '22':
  - type: text
    content: 'Orna répondit à David : Que mon Seigneur le roi prenne l’aire et qu’il offre ce qu’il jugera bon. Regarde : voici les bœufs pour l’holocauste, les herses et l’attelage des bœufs fourniront le bois'
  - type: note
    content: Il s’agit des bœufs occupés à ce moment-là à fouler le blé sur l’aire avec une herse de bois (voir Am 1.3).
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'O roi, je te donne tout cela ! Puis il ajouta : Que l’Eternel ton Dieu accepte favorablement ton offrande !'
  '24':
  - type: text
    content: 'Mais le roi lui déclara : Non ! Je veux te l’acheter à son prix ; je n’offrirai pas à l’Eternel, mon Dieu, des holocaustes qui ne me coûteraient rien !'
  - type: text
    content: Et David acheta l’aire et les bœufs pour cinquante pièces d’argent
  - type: note
    content: David acquit donc toute la surface couronnant le sommet du mont Morija où s’élèvera plus tard le Temple, immédiatement au nord de la Cité de David (voir 1 Ch 22.1 ; 2 Ch 3.1).
  - type: text
    content: .
  '25':
  - type: text
    content: Il bâtit là un autel à l’Eternel et y offrit des holocaustes et des sacrifices de communion. Ainsi l’Eternel se laissa fléchir en faveur du pays, et la plaie fut détournée d’Israël.
  '3':
  - type: text
    content: 'Joab dit au roi : Que l’Eternel, ton Dieu, rende le peuple cent fois plus nombreux et que mon seigneur le roi puisse encore le voir de ses yeux ! Mais pourquoi mon seigneur le roi désire-t-il faire pareille chose ?'
  '4':
  - type: text
    content: 'Mais le roi maintint l’ordre donné à Joab et aux chefs de l’armée. Ils se mirent donc en route pour faire le recensement d’Israël. '
  '5':
  - type: text
    content: Ils franchirent d’abord le Jourdain et s’arrêtèrent près de Aroër
  - type: note
    content: Sur l’Arnon, la frontière sud de la tribu de Ruben, à l’est de la mer Morte, non loin de Rabba, la capitale des Moabites (Jos 13.25). Les envoyés commencent leur travail à l’est du pays, ils passeront au nord, puis à l’ouest et au sud.
  - type: text
    content: ', au sud de la ville qui se trouve au fond de la vallée de Gad et près de Yaezer. '
  '6':
  - type: text
    content: 'De là, ils passèrent dans le territoire de Galaad et dans la région de Tahtim-Hodshi. Ils continuèrent jusqu’à Dan-Yaân et aux environs, vers Sidon, '
  '7':
  - type: text
    content: et arrivèrent à la forteresse de Tyr, puis ils allèrent dans toutes les villes des Héviens et des Cananéens
  - type: note
    content: Deux peuples habitant Canaan avant la conquête du pays par les Israélites (Jos 3.10).
  - type: text
    content: '. Ils parvinrent enfin au Néguev de Juda, à Beer-Sheva. '
  '8':
  - type: text
    content: 'Ils parcoururent ainsi tout le pays et, au bout de neuf mois et vingt jours, ils regagnèrent Jérusalem. '
  '9':
  - type: text
    content: 'Joab communiqua au roi le résultat du recensement du peuple : Israël comptait 800 000 hommes aptes à porter les armes et Juda 500 000.'
