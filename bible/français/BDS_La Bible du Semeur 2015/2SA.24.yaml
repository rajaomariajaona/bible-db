document_id: 2SA.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le recensement coupable et la peste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 21.1-17)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel se mit de nouveau en colère contre les Israélites et il incita David à agir contre leurs intérêts en lui suggérant l’idée de faire le recensement d’Israël et de Juda.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soudain, David sentit son cœur battre parce qu’il avait ainsi recensé le peuple, et il dit à l’Eternel : J’ai commis une grave faute en faisant cela ! Maintenant, Eternel, daigne pardonner la faute de ton serviteur car je reconnais que j’ai agi tout à fait comme un insensé !'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand David se leva le lendemain matin, l’Eternel s’adressa au prophète Gad, attaché à la cour de David, en ces termes : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va dire à David : « Voici ce que déclare l’Eternel : Je t’impose l’un des trois châtiments suivants ; choisis l’un d’eux et je te l’infligerai. »'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gad se rendit donc chez David et lui communiqua le message ; il lui dit : Que veux-tu que je fasse venir contre toi : sept années de famine dans ton pays, trois mois de déroute devant tes ennemis qui s’acharneront contre toi, ou trois jours de peste dans ton pays ? Réfléchis donc et décide, puis dis-moi ce que je dois répondre à celui qui m’envoie.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David répondit à Gad : Je suis dans un grand désarroi ! Ah ! tombons plutôt entre les mains de l’Eternel, car ses compassions sont grandes ; mais que je ne tombe pas entre les mains des hommes !'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel fit donc sévir une épidémie de peste en Israël, depuis ce matin-là jusqu’au terme fixé. Elle sévit de Dan à Beer-Sheva, et fit périr soixante-dix mille personnes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange allait étendre sa main sur Jérusalem pour la dévaster, mais l’Eternel ne voulut pas ce malheur et y renonça. Il ordonna à l’ange qui était en train de décimer le peuple : Cela suffit maintenant ! Retire ta main !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’ange de l’Eternel se tenait alors près de l’aire d’Orna, le Yebousien, entre ciel et terre, son épée dégainée à la main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette fin du v. 16 manque dans le texte hébreu traditionnel. Elle est restituée d’après le manuscrit hébreu de Qumrân et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En voyant l’ange qui frappait le peuple, David pria en disant : Voici : c’est moi seul qui ai péché, c’est moi, le berger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c’est moi, le berger
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après le texte hébreu de Qumrân (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.17
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', qui ai commis une faute, mais ce pauvre troupeau, qu’a-t-il fait de mal ? Frappe-moi donc plutôt, ainsi que ma famille.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 21.18-26)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce même jour, Gad se rendit auprès de David et lui ordonna : Monte à l’aire'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les aires se trouvaient généralement au sommet des collines où le vent emportait la bale du blé que l’on vannait. Cette aire se trouvait au sommet du mont Morija.
      marker-yv: yv-n
    - type: text
      text: ' d’Orna'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Orna
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après le texte hébreu de Qumrân et l’ancienne version grecque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aravna.
      marker-yv: yv-n
    - type: text
      text: ' le Yebousien et dresses-y un autel à l’Eternel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David s’y rendit comme l’Eternel le lui avait ordonné par l’intermédiaire de Gad. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors le roi ordonna à Joab, chef de son armée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.2
        - type: text
          text: ' (voir v. 4) ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et les chefs de l’armée. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’un recensement militaire (voir v. 9) qui ne comprend donc pas la tribu de Lévi (ni celle de Benjamin, voir 1 Ch 21.6 ; 27.23) ni les hommes de moins de 20 ans.
      marker-yv: yv-n
    - type: text
      text: ' qui se trouvait près de lui : Parcours, je te prie, toutes les tribus d’Israël, depuis Dan jusqu’à Beer-Sheva ; que l’on recense le peuple, pour que je sache quel en est le nombre !'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Orna, qui était en train de battre du blé, regarda d’en haut et vit le roi et ses ministres venir vers lui, revêtus de vêtements d’étoffe grossière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Orna, qui était en train de battre du blé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'revêtus de vêtements d’étoffe grossière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'manquent dans le texte hébreu traditionnel. Ils sont rajoutés ici d’après le texte hébreu de Qumrân et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Il sortit et se prosterna devant le roi, le visage contre terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 21.20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il demanda : Pourquoi mon seigneur le roi vient-il vers son serviteur ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit : Je viens t’acheter cette aire pour y bâtir un autel à l’Eternel afin que cesse le fléau qui sévit contre le peuple.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Orna répondit à David : Que mon Seigneur le roi prenne l’aire et qu’il offre ce qu’il jugera bon. Regarde : voici les bœufs pour l’holocauste, les herses et l’attelage des bœufs fourniront le bois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit des bœufs occupés à ce moment-là à fouler le blé sur l’aire avec une herse de bois (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Am 1.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O roi, je te donne tout cela ! Puis il ajouta : Que l’Eternel ton Dieu accepte favorablement ton offrande !'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le roi lui déclara : Non ! Je veux te l’acheter à son prix ; je n’offrirai pas à l’Eternel, mon Dieu, des holocaustes qui ne me coûteraient rien !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et David acheta l’aire et les bœufs pour cinquante pièces d’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David acquit donc toute la surface couronnant le sommet du mont Morija où s’élèvera plus tard le Temple, immédiatement au nord de la Cité de David (voir 1 Ch 22.1 ; 2 Ch 3.1).
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il bâtit là un autel à l’Eternel et y offrit des holocaustes et des sacrifices de communion. Ainsi l’Eternel se laissa fléchir en faveur du pays, et la plaie fut détournée d’Israël.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab dit au roi : Que l’Eternel, ton Dieu, rende le peuple cent fois plus nombreux et que mon seigneur le roi puisse encore le voir de ses yeux ! Mais pourquoi mon seigneur le roi désire-t-il faire pareille chose ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le roi maintint l’ordre donné à Joab et aux chefs de l’armée. Ils se mirent donc en route pour faire le recensement d’Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils franchirent d’abord le Jourdain et s’arrêtèrent près de Aroër
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur l’Arnon, la frontière sud de la tribu de Ruben, à l’est de la mer Morte, non loin de Rabba, la capitale des Moabites (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 13.25
        - type: text
          text: ). Les envoyés commencent leur travail à l’est du pays, ils passeront au nord, puis à l’ouest et au sud.
      marker-yv: yv-n
    - type: text
      text: ', au sud de la ville qui se trouve au fond de la vallée de Gad et près de Yaezer. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De là, ils passèrent dans le territoire de Galaad et dans la région de Tahtim-Hodshi. Ils continuèrent jusqu’à Dan-Yaân et aux environs, vers Sidon, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et arrivèrent à la forteresse de Tyr, puis ils allèrent dans toutes les villes des Héviens et des Cananéens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux peuples habitant Canaan avant la conquête du pays par les Israélites (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 3.10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Ils parvinrent enfin au Néguev de Juda, à Beer-Sheva. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils parcoururent ainsi tout le pays et, au bout de neuf mois et vingt jours, ils regagnèrent Jérusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab communiqua au roi le résultat du recensement du peuple : Israël comptait 800 000 hommes aptes à porter les armes et Juda 500 000.'
