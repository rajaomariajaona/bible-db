document_id: JHN.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La guérison d’un aveugle
  - type: text
    content: 'En partant, Jésus aperçut sur son chemin un homme qui était aveugle de naissance. '
  '10':
  - type: text
    content: 'Alors on le questionna : Comment se fait-il que tes yeux se soient ouverts ?'
  '11':
  - type: text
    content: 'Il répondit : L’homme qui s’appelle Jésus a fait un peu de boue, m’en a frotté les yeux, puis il m’a dit : « Va à Siloé et lave-toi. » J’y suis allé, je me suis lavé et, d’un coup, j’ai vu clair.'
  '12':
  - type: text
    content: – Et lui, demandèrent-ils, où est-il ?
  - type: text
    content: – Je n’en sais rien, répondit-il.
  - type: heading
    content: L’enquête sur le miracle
  '13':
  - type: text
    content: 'On amena l’homme qui avait été aveugle devant les pharisiens. '
  '14':
  - type: text
    content: 'Or, c’était un jour de sabbat que Jésus avait fait de la boue pour lui ouvrir les yeux. '
  '15':
  - type: text
    content: Les pharisiens lui demandèrent donc, à leur tour, comment il avait recouvré la vue.
  - type: text
    content: 'Il leur répondit : Il m’a mis de la boue sur les yeux, je me suis lavé, et maintenant j’y vois.'
  '16':
  - type: text
    content: 'Là-dessus, quelques pharisiens déclarèrent : Cet homme ne peut pas venir de Dieu, puisqu’il ne respecte pas le sabbat.'
  - type: text
    content: 'Pourtant d’autres objectaient : Comment un homme pécheur aurait-il le pouvoir d’accomplir de tels signes miraculeux ?'
  - type: text
    content: 'Ils étaient donc divisés. '
  '17':
  - type: text
    content: 'Alors ils interrogèrent de nouveau l’aveugle : Voyons, toi, que dis-tu de lui, puisque c’est à toi qu’il a ouvert les yeux ?'
  - type: text
    content: – C’est sûrement un prophète, répondit-il.
  '18':
  - type: text
    content: Mais ils refusèrent de croire que cet homme avait été aveugle et qu’il avait été guéri de sa cécité. Finalement, ils firent venir ses parents.
  '19':
  - type: text
    content: 'Ils leur demandèrent : Cet homme est-il bien votre fils ? Est-il réellement né aveugle ? Comment se fait-il qu’à présent il voie ?'
  '2':
  - type: text
    content: 'Ses disciples lui posèrent alors cette question : Dis-nous, Maître, pourquoi cet homme est-il né aveugle ? Est-ce à cause de son propre péché ou de celui de ses parents ?'
  '20':
  - type: text
    content: '– Nous sommes certains que c’est bien notre fils, répondirent les parents, et qu’il est né aveugle. '
  '21':
  - type: text
    content: Mais comment il se fait qu’il voie à présent, nous ne le savons pas. Ou qui lui a rendu la vue, nous ne le savons pas davantage. Interrogez-le donc lui-même. Il est assez grand pour répondre sur ce qui le concerne.
  '22':
  - type: text
    content: 'Les parents parlaient ainsi parce qu’ils avaient peur des Juifs. En effet, ils avaient déjà décidé d’exclure de la synagogue tous ceux qui reconnaîtraient Jésus comme le Messie. '
  '23':
  - type: text
    content: 'Voilà pourquoi les parents de l’aveugle avaient répondu : « Il est assez grand, interrogez-le donc lui-même. »'
  '24':
  - type: text
    content: 'Les pharisiens firent donc venir une seconde fois celui qui avait été aveugle et lui dirent : Honore Dieu en disant la vérité. Cet homme est un pécheur, nous le savons.'
  '25':
  - type: text
    content: '– S’il est pécheur ou non, répondit-il, je n’en sais rien. Mais il y a une chose que je sais : j’étais aveugle et maintenant, je vois.'
  '26':
  - type: text
    content: 'Ils lui demandèrent de nouveau : Qu’est-ce qu’il t’a fait ? Redis-nous comment il s’y est pris pour t’ouvrir les yeux.'
  '27':
  - type: text
    content: – Je vous l’ai déjà dit, leur répondit-il, et vous ne m’avez pas écouté. Pourquoi tenez-vous à me le faire répéter ? Est-ce que, par hasard, vous avez l’intention de devenir vous aussi ses disciples ?
  '28':
  - type: text
    content: 'Alors, ils se mirent à l’injurier et ils lui lancèrent : C’est toi qui es son disciple ; nous, nous sommes les disciples de Moïse. '
  '29':
  - type: text
    content: Nous savons que Dieu a parlé à Moïse ; mais celui-là, nous ne savons même pas d’où il vient.
  '3':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: Cela n’a pas de rapport avec son péché, ni avec celui de ses parents ; c’est pour qu’en lui tous puissent voir ce que Dieu est capable de faire.
  - type: text
    content: ' '
  '30':
  - type: text
    content: '– C’est étonnant, répliqua l’homme. Voilà quelqu’un qui m’a ouvert les yeux et vous, vous ne savez même pas d’où il est. '
  '31':
  - type: text
    content: 'Tout le monde sait que Dieu n’exauce pas les pécheurs ; mais si quelqu’un est attaché à Dieu et fait sa volonté, il l’exauce. '
  '32':
  - type: text
    content: 'Depuis que le monde est monde, jamais on n’a entendu dire que quelqu’un ait rendu la vue à un aveugle de naissance. '
  '33':
  - type: text
    content: Si cet homme-là ne venait pas de Dieu, il n’aurait rien pu faire.
  '34':
  - type: text
    content: – Comment ! répondirent-ils, depuis ta naissance tu n’es que péché des pieds à la tête, et c’est toi qui veux nous faire la leçon !
  - type: text
    content: Et ils le mirent à la porte.
  - type: heading
    content: Les vrais aveugles
  '35':
  - type: text
    content: 'Jésus apprit qu’ils l’avaient expulsé. Il alla le trouver et lui demanda : '
  - type: text
    content: 'Crois-tu au '
  - type: text
    content: Fils de l’homme
  - type: text
    content: '  ?'
  '36':
  - type: text
    content: 'Il lui répondit : Qui est-ce ? Dis-le-moi, Seigneur'
  - type: note
    content: Le mot Seigneur est absent de certains manuscrits.
  - type: text
    content: ', pour que je puisse croire en lui.'
  '37':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Tu le vois de tes yeux. C’est lui-même qui te parle maintenant.
  '38':
  - type: text
    content: – Je crois, Seigneur, déclara l’homme, et il se prosterna devant lui
  - type: note
    content: 'Autre traduction : il l’adora.'
  - type: text
    content: .
  '39':
  - type: text
    content: 'Jésus dit alors : '
  - type: text
    content: Je suis venu dans ce monde pour qu’un jugement ait lieu, pour que ceux qui ne voient pas voient, et que ceux qui voient deviennent aveugles.
  '4':
  - type: text
    content: Il nous faut accomplir les œuvres de celui qui m’a envoyé tant qu’il fait jour ; la nuit vient où plus personne ne pourra travailler.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Des pharisiens qui se trouvaient près de lui entendirent ces paroles et lui demandèrent : Serions-nous, par hasard, nous aussi des aveugles ?'
  '41':
  - type: text
    content: ' '
  - type: text
    content: – Si vous étiez de vrais aveugles,
  - type: text
    content: ' leur dit Jésus, '
  - type: text
    content: 'vous ne seriez pas coupables. Mais voilà : vous prétendez que vous voyez ; aussi votre culpabilité reste entière.'
  '5':
  - type: text
    content: Aussi longtemps que je suis encore dans le monde, je suis la lumière du monde.
  '6':
  - type: text
    content: 'Après avoir dit cela, Jésus cracha par terre et, avec sa salive, il fit un peu de boue qu’il appliqua sur les yeux de l’aveugle. '
  '7':
  - type: text
    content: 'Puis il lui dit : '
  - type: text
    content: Va te laver au réservoir de Siloé
  - type: note
    content: Source située dans Jérusalem.
  - type: text
    content: ' (le mot « Siloé » veut dire : « envoyé »).'
  - type: text
    content: L’aveugle alla se laver et, à son retour, il voyait.
  '8':
  - type: text
    content: 'Ses voisins et ceux qui avaient l’habitude de le voir mendier dirent : Cet homme, n’est-ce pas celui qui était toujours assis en train de mendier ?'
  '9':
  - type: text
    content: 'Les uns affirmaient : C’est bien lui.'
  - type: text
    content: 'D’autres le niaient : Ce n’est pas lui ; c’est quelqu’un qui lui ressemble.'
  - type: text
    content: 'Quant à lui, il disait : C’est bien moi.'
