document_id: JHN.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un aveugle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En partant, Jésus aperçut sur son chemin un homme qui était aveugle de naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ses disciples lui posèrent alors cette question : Dis-nous, Maître, pourquoi cet homme est-il né aveugle ? Est-ce à cause de son propre péché ou de celui de ses parents ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cela n’a pas de rapport avec son péché, ni avec celui de ses parents ; c’est pour qu’en lui tous puissent voir ce que Dieu est capable de faire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il nous faut accomplir les œuvres de celui qui m’a envoyé tant qu’il fait jour ; la nuit vient où plus personne ne pourra travailler.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Aussi longtemps que je suis encore dans le monde, je suis la lumière du monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après avoir dit cela, Jésus cracha par terre et, avec sa salive, il fit un peu de boue qu’il appliqua sur les yeux de l’aveugle. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va te laver au réservoir de Siloé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Source située dans Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' (le mot « Siloé » veut dire : « envoyé »).'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’aveugle alla se laver et, à son retour, il voyait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses voisins et ceux qui avaient l’habitude de le voir mendier dirent : Cet homme, n’est-ce pas celui qui était toujours assis en train de mendier ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les uns affirmaient : C’est bien lui.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'D’autres le niaient : Ce n’est pas lui ; c’est quelqu’un qui lui ressemble.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quant à lui, il disait : C’est bien moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors on le questionna : Comment se fait-il que tes yeux se soient ouverts ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il répondit : L’homme qui s’appelle Jésus a fait un peu de boue, m’en a frotté les yeux, puis il m’a dit : « Va à Siloé et lave-toi. » J’y suis allé, je me suis lavé et, d’un coup, j’ai vu clair.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – Et lui, demandèrent-ils, où est-il ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je n’en sais rien, répondit-il.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’enquête sur le miracle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On amena l’homme qui avait été aveugle devant les pharisiens. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Or, c’était un jour de sabbat que Jésus avait fait de la boue pour lui ouvrir les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les pharisiens lui demandèrent donc, à leur tour, comment il avait recouvré la vue.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il leur répondit : Il m’a mis de la boue sur les yeux, je me suis lavé, et maintenant j’y vois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Là-dessus, quelques pharisiens déclarèrent : Cet homme ne peut pas venir de Dieu, puisqu’il ne respecte pas le sabbat.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pourtant d’autres objectaient : Comment un homme pécheur aurait-il le pouvoir d’accomplir de tels signes miraculeux ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils étaient donc divisés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors ils interrogèrent de nouveau l’aveugle : Voyons, toi, que dis-tu de lui, puisque c’est à toi qu’il a ouvert les yeux ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – C’est sûrement un prophète, répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais ils refusèrent de croire que cet homme avait été aveugle et qu’il avait été guéri de sa cécité. Finalement, ils firent venir ses parents.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils leur demandèrent : Cet homme est-il bien votre fils ? Est-il réellement né aveugle ? Comment se fait-il qu’à présent il voie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '– Nous sommes certains que c’est bien notre fils, répondirent les parents, et qu’il est né aveugle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais comment il se fait qu’il voie à présent, nous ne le savons pas. Ou qui lui a rendu la vue, nous ne le savons pas davantage. Interrogez-le donc lui-même. Il est assez grand pour répondre sur ce qui le concerne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les parents parlaient ainsi parce qu’ils avaient peur des Juifs. En effet, ils avaient déjà décidé d’exclure de la synagogue tous ceux qui reconnaîtraient Jésus comme le Messie. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voilà pourquoi les parents de l’aveugle avaient répondu : « Il est assez grand, interrogez-le donc lui-même. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens firent donc venir une seconde fois celui qui avait été aveugle et lui dirent : Honore Dieu en disant la vérité. Cet homme est un pécheur, nous le savons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '– S’il est pécheur ou non, répondit-il, je n’en sais rien. Mais il y a une chose que je sais : j’étais aveugle et maintenant, je vois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils lui demandèrent de nouveau : Qu’est-ce qu’il t’a fait ? Redis-nous comment il s’y est pris pour t’ouvrir les yeux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: – Je vous l’ai déjà dit, leur répondit-il, et vous ne m’avez pas écouté. Pourquoi tenez-vous à me le faire répéter ? Est-ce que, par hasard, vous avez l’intention de devenir vous aussi ses disciples ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors, ils se mirent à l’injurier et ils lui lancèrent : C’est toi qui es son disciple ; nous, nous sommes les disciples de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nous savons que Dieu a parlé à Moïse ; mais celui-là, nous ne savons même pas d’où il vient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '– C’est étonnant, répliqua l’homme. Voilà quelqu’un qui m’a ouvert les yeux et vous, vous ne savez même pas d’où il est. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tout le monde sait que Dieu n’exauce pas les pécheurs ; mais si quelqu’un est attaché à Dieu et fait sa volonté, il l’exauce. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Depuis que le monde est monde, jamais on n’a entendu dire que quelqu’un ait rendu la vue à un aveugle de naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Si cet homme-là ne venait pas de Dieu, il n’aurait rien pu faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: – Comment ! répondirent-ils, depuis ta naissance tu n’es que péché des pieds à la tête, et c’est toi qui veux nous faire la leçon !
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils le mirent à la porte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vrais aveugles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus apprit qu’ils l’avaient expulsé. Il alla le trouver et lui demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Crois-tu au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il lui répondit : Qui est-ce ? Dis-le-moi, Seigneur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est absent de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: ', pour que je puisse croire en lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu le vois de tes yeux. C’est lui-même qui te parle maintenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: – Je crois, Seigneur, déclara l’homme, et il se prosterna devant lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il l’adora.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis venu dans ce monde pour qu’un jugement ait lieu, pour que ceux qui ne voient pas voient, et que ceux qui voient deviennent aveugles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Des pharisiens qui se trouvaient près de lui entendirent ces paroles et lui demandèrent : Serions-nous, par hasard, nous aussi des aveugles ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Si vous étiez de vrais aveugles,
  - type: text
    text: ' leur dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'vous ne seriez pas coupables. Mais voilà : vous prétendez que vous voyez ; aussi votre culpabilité reste entière.'
