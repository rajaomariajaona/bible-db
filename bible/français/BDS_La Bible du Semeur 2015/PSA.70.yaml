document_id: PSA.70,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu, viens à mon aide
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '70 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 40.14-18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Un psaume de David pour se rappeler au souvenir de Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, délivre-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, hâte-toi ╵de venir à mon aide
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '70.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 14-18, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 70.2-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient couverts de honte, ╵remplis de confusion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui cherchent ma mort !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils battent en retraite, ╵qu’ils soient déshonorés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui désirent mon malheur !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils tournent les talons ╵sous le poids de la honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui ricanent ╵à mon sujet.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais que tous ceux ╵qui se tournent vers toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soient débordants de joie, ╵oui, qu’en toi ils se réjouissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous ceux ╵qui aiment ton salut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'redisent constamment : ╵« Que Dieu est grand ! »'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je suis pauvre et malheureux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Dieu, viens vite agir en ma faveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es mon secours ╵et mon libérateur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, oh, ne tarde pas !
