document_id: PSA.70,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, viens à mon aideVoir 40.14-18.  !
  - type: text
    content: Au chef de chœur. Un psaume de David pour se rappeler au souvenir de Dieu.
  '2':
  - type: text
    content: O Dieu, délivre-moi,
  - type: text
    content: Eternel, hâte-toi ╵de venir à mon aide
  - type: note
    content: Pour les v. 14-18, voir 70.2-6.
  - type: text
    content: '  !'
  '3':
  - type: text
    content: Qu’ils soient couverts de honte, ╵remplis de confusion,
  - type: text
    content: ceux qui cherchent ma mort !
  - type: text
    content: Qu’ils battent en retraite, ╵qu’ils soient déshonorés,
  - type: text
    content: ceux qui désirent mon malheur !
  '4':
  - type: text
    content: Qu’ils tournent les talons ╵sous le poids de la honte,
  - type: text
    content: ceux qui ricanent ╵à mon sujet.
  '5':
  - type: text
    content: Mais que tous ceux ╵qui se tournent vers toi
  - type: text
    content: soient débordants de joie, ╵oui, qu’en toi ils se réjouissent.
  - type: text
    content: Et que tous ceux ╵qui aiment ton salut
  - type: text
    content: 'redisent constamment : ╵« Que Dieu est grand ! »'
  '6':
  - type: text
    content: Moi, je suis pauvre et malheureux ;
  - type: text
    content: ô Dieu, viens vite agir en ma faveur,
  - type: text
    content: toi qui es mon secours ╵et mon libérateur.
  - type: text
    content: Eternel, oh, ne tarde pas !
