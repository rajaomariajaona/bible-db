  - type: text
    text: Dieu, viens à mon aide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '70 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40.14-18
        metadata:
          usfm: PSA.40.14+PSA.40.15+PSA.40.16+PSA.40.17+PSA.40.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un psaume de David pour se rappeler au souvenir de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, délivre-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, hâte-toi ╵de venir à mon aide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '70.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 14-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 70.2-6
        metadata:
          usfm: PSA.70.2+PSA.70.3+PSA.70.4+PSA.70.5+PSA.70.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu’ils soient couverts de honte, ╵remplis de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui cherchent ma mort !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils battent en retraite, ╵qu’ils soient déshonorés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui désirent mon malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’ils tournent les talons ╵sous le poids de la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ricanent ╵à mon sujet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais que tous ceux ╵qui se tournent vers toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: soient débordants de joie, ╵oui, qu’en toi ils se réjouissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tous ceux ╵qui aiment ton salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'redisent constamment : ╵« Que Dieu est grand ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi, je suis pauvre et malheureux ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Dieu, viens vite agir en ma faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es mon secours ╵et mon libérateur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, oh, ne tarde pas !
