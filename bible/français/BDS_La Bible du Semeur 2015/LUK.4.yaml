document_id: LUK.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La tentation de Jésus
  - type: heading
    content: (Mt 4.1-11 ; Mc 1.12-13)
  - type: text
    content: 'Jésus, rempli de l’Esprit Saint, revint du Jourdain et l’Esprit le conduisit dans le désert '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Il donnera des ordres
  - type: text
    content: ' ╵'
  - type: text
    content: 'à ses '
  - type: text
    content: anges
  - type: text
    content: ' à ton sujet,'
  - type: text
    content: pour qu’ils veillent sur toi,
  '11':
  - type: text
    content: 'et encore :'
  - type: text
    content: Ils te porteront sur leurs mains
  - type: text
    content: pour que ton pied ne heurte pas de pierre
  - type: text
    content: ' '
  - type: note
    content: Ps 91.11-12 .
  - type: text
    content: .
  '12':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: 'Il est aussi écrit :'
  - type: text
    content: Tu ne forceras pas la main au Seigneur, ton Dieu
  - type: text
    content: ' '
  - type: note
    content: Dt 6.16 .
  - type: text
    content: .
  '13':
  - type: text
    content: Lorsque le diable eut achevé de le soumettre à toutes sortes de tentations, il s’éloigna de lui jusqu’au temps fixé
  - type: note
    content: 'Autre traduction : jusqu’au moment propice.'
  - type: text
    content: .
  - type: heading
    content: Ministère de Jésus en Galilée
  - type: heading
    content: Jésus, le Serviteur choisi par Dieu
  - type: heading
    content: (Mt 4.12-17 ; Mc 1.14-15)
  '14':
  - type: text
    content: 'Jésus, rempli de la puissance de l’Esprit, retourna en Galilée. Sa réputation se répandit dans toute la région. '
  '15':
  - type: text
    content: Il enseignait dans les synagogues et tous faisaient son éloge.
  - type: heading
    content: (Mt 13.53-58 ; Mc 6.1-6)
  '16':
  - type: text
    content: Il se rendit aussi à Nazareth, où il avait été élevé, et il entra dans la synagogue le jour du sabbat, comme il en avait l’habitude. Il se leva pour faire la lecture biblique
  - type: note
    content: N’importe quel membre juif de l’assistance pouvait être appelé à faire la lecture des livres de l’Ancien Testament durant le culte de la synagogue.
  - type: text
    content: ', '
  '17':
  - type: text
    content: 'et on lui présenta le rouleau du prophète Esaïe. En déroulant le parchemin, il trouva le passage où il est écrit :'
  '18':
  - type: text
    content: ' '
  - type: text
    content: L’Esprit du Seigneur est sur moi
  - type: text
    content: car il m’a oint
  - type: text
    content: pour annoncer une bonne nouvelle aux pauvres.
  - type: text
    content: Il m’a envoyé
  - type: text
    content: ' ╵'
  - type: text
    content: pour annoncer aux captifs la délivrance,
  - type: text
    content: aux aveugles le recouvrement de la vue,
  - type: text
    content: pour apporter la liberté aux opprimés
  '19':
  - type: text
    content: ' '
  - type: text
    content: et proclamer une année de faveur accordée par le Seigneur
  - type: text
    content: ' '
  - type: note
    content: Es 61.1-2 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '2':
  - type: text
    content: où il fut tenté par le diable durant quarante jours. Il ne mangea rien durant ces jours-là, et, quand ils furent passés, il eut faim.
  '20':
  - type: text
    content: Il roula le livre, le rendit au servant et s’assit. Dans la synagogue, tous les yeux étaient braqués sur lui.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Aujourd’hui même,
  - type: text
    content: ' commença-t-il, '
  - type: text
    content: pour vous qui l’entendez, cette prophétie de l’Ecriture est devenue réalité.
  '22':
  - type: text
    content: 'Aucun de ses auditeurs ne restait indifférent : les paroles de grâce qu’il prononçait les étonnaient beaucoup. Aussi disaient-ils : N’est-il pas le fils de Joseph ?'
  '23':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: 'Vous ne manquerez pas de m’appliquer ce dicton : « Médecin, guéris-toi toi-même » et vous me direz : « On nous a parlé de ce que tu as accompli à '
  - type: text
    content: Capernaüm
  - type: text
    content: . Fais-en donc autant ici, dans ta propre ville ! »
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: 'Vraiment, je vous l’assure : aucun prophète n’est bien accueilli dans sa patrie.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Voici la vérité, je vous le déclare : il y avait beaucoup de veuves en '
  - type: text
    content: Israël
  - type: text
    content: ' à l’époque d’Elie, quand, pendant trois ans et demi, il n’y a pas eu de pluie et qu’une grande famine a sévi dans tout le pays.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Or, Elie n’a été envoyé vers aucune d’entre elles, '
  - type: text
    content: mais vers une veuve qui vivait à Sarepta, dans le pays de Sidon
  - type: note
    content: 1 R 17.9.
  - type: text
    content: .
  - type: text
    content: ' '
  '27':
  - type: text
    content: Il y avait aussi beaucoup de lépreux en Israël au temps du prophète Elisée. Et pourtant, aucun d’eux n’a été guéri. C’est le Syrien Naaman qui l’a été
  - type: note
    content: 2 R 5.1-14.
  - type: text
    content: .
  '28':
  - type: text
    content: 'En entendant ces paroles, tous ceux qui étaient dans la synagogue se mirent en colère. '
  '29':
  - type: text
    content: 'Ils se levèrent, firent sortir Jésus de la ville, et le menèrent jusqu’au sommet de la montagne sur laquelle elle était bâtie, afin de le précipiter dans le vide. '
  '3':
  - type: text
    content: 'Alors le diable lui dit : Si tu es le Fils de Dieu, ordonne donc à cette pierre de se changer en pain.'
  '30':
  - type: text
    content: Mais il passa au milieu d’eux et s’en alla.
  - type: heading
    content: Exorcisme et guérisons à Capernaüm
  - type: heading
    content: (Mc 1.21-28)
  '31':
  - type: text
    content: 'Il se rendit à Capernaüm, une autre ville de la Galilée. Il y enseignait les jours de sabbat. '
  '32':
  - type: text
    content: Ses auditeurs étaient profondément impressionnés par son enseignement, car il parlait avec autorité.
  '33':
  - type: text
    content: 'Dans la synagogue se trouvait un homme sous l’emprise d’un esprit démoniaque et impur. Il se mit à crier d’une voix puissante : '
  '34':
  - type: text
    content: Ah ! Que nous veux-tu, Jésus de Nazareth ? Es-tu venu pour nous détruire
  - type: note
    content: 'Autre traduction : tu es venu pour nous détruire.'
  - type: text
    content: '  ? Je sais qui tu es ! Tu es le Saint envoyé par Dieu !'
  '35':
  - type: text
    content: 'Mais, d’un ton sévère, Jésus lui ordonna : '
  - type: text
    content: Tais-toi, et sors de cet homme !
  - type: text
    content: 'Le démon jeta l’homme par terre, au milieu des assistants, et sortit de lui, sans lui faire aucun mal. '
  '36':
  - type: text
    content: 'Tous furent saisis de stupeur ; ils se disaient tous, les uns aux autres : Quelle est cette parole ? Il donne des ordres aux esprits mauvais, avec autorité et puissance, et ils sortent !'
  '37':
  - type: text
    content: Et la renommée de Jésus se répandait dans toutes les localités environnantes.
  - type: heading
    content: (Mt 8.14-17 ; Mc 1.29-34)
  '38':
  - type: text
    content: 'En sortant de la synagogue, il se rendit à la maison de Simon. Or, la belle-mère de Simon souffrait d’une forte fièvre, et l’on demanda à Jésus de faire quelque chose pour elle. '
  '39':
  - type: text
    content: Il se pencha sur elle, donna un ordre à la fièvre, et la fièvre la quitta. Alors elle se leva immédiatement et se mit à les servir.
  '4':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Il est écrit :'
  - type: text
    content: L’homme ne vivra pas seulement de pain
  - type: text
    content: ' '
  - type: note
    content: Dt 8.3 .
  - type: text
    content: .
  '40':
  - type: text
    content: Au coucher du soleil, tous ceux qui avaient chez eux des malades atteints des maux les plus divers les amenèrent à Jésus
  - type: note
    content: On attendait le coucher du soleil qui marquait la fin du sabbat pour transporter les malades, car il était interdit de le faire durant le jour du repos.
  - type: text
    content: '. Il posa ses mains sur chacun d’eux et les guérit. '
  '41':
  - type: text
    content: 'Des démons sortaient aussi de beaucoup d’entre eux en criant : Tu es le Fils de Dieu !'
  - type: text
    content: Mais Jésus les reprenait sévèrement pour les faire taire, car ils savaient qu’il était le Messie
  - type: note
    content: Jésus ne voulait pas être « accrédité » par les démons.
  - type: text
    content: .
  - type: heading
    content: (Mc 1.35-39)
  '42':
  - type: text
    content: Dès qu’il fit jour, Jésus sortit de la maison et se rendit dans un lieu désert. Les foules se mirent à sa recherche et, après l’avoir rejoint, voulurent le retenir pour qu’il ne les quitte pas.
  '43':
  - type: text
    content: 'Mais il leur dit : '
  - type: text
    content: Je dois aussi annoncer la Bonne Nouvelle du royaume de Dieu aux autres villes, car c’est pour cela que Dieu m’a envoyé.
  '44':
  - type: text
    content: Et il prêchait dans les synagogues de la Judée
  - type: note
    content: 'Certains manuscrits ont : Galilée.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Le diable l’entraîna sur une hauteur, '
  '6':
  - type: text
    content: 'lui montra en un instant tous les royaumes de la terre et lui dit : Je te donnerai la domination universelle ainsi que les richesses et la gloire de ces royaumes. Car tout cela a été remis entre mes mains et je le donne à qui je veux. '
  '7':
  - type: text
    content: Si donc tu te prosternes devant moi, tout cela sera à toi.
  '8':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Il est écrit :'
  - type: text
    content: Tu adoreras le Seigneur, ton Dieu,
  - type: text
    content: et c’est à lui seul que tu rendras un culte
  - type: text
    content: ' '
  - type: note
    content: Dt 6.13 .
  - type: text
    content: .
  '9':
  - type: text
    content: 'Le diable le conduisit ensuite à Jérusalem, le plaça tout en haut du Temple et lui dit : Si tu es le Fils de Dieu, jette-toi d’ici en bas, car il est écrit :'
