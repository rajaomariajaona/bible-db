document_id: LUK.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La tentation de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 4.1-11 ; Mc 1.12-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, rempli de l’Esprit Saint, revint du Jourdain et l’Esprit le conduisit dans le désert '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il donnera des ordres
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'à ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: ' à ton sujet,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour qu’ils veillent sur toi,
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'et encore :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils te porteront sur leurs mains
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour que ton pied ne heurte pas de pierre
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 91.11-12
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est aussi écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Tu ne forceras pas la main au Seigneur, ton Dieu
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 6.16
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque le diable eut achevé de le soumettre à toutes sortes de tentations, il s’éloigna de lui jusqu’au temps fixé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu’au moment propice.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Ministère de Jésus en Galilée
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus, le Serviteur choisi par Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 4.12-17 ; Mc 1.14-15)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, rempli de la puissance de l’Esprit, retourna en Galilée. Sa réputation se répandit dans toute la région. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il enseignait dans les synagogues et tous faisaient son éloge.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.53-58 ; Mc 6.1-6)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il se rendit aussi à Nazareth, où il avait été élevé, et il entra dans la synagogue le jour du sabbat, comme il en avait l’habitude. Il se leva pour faire la lecture biblique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: N’importe quel membre juif de l’assistance pouvait être appelé à faire la lecture des livres de l’Ancien Testament durant le culte de la synagogue.
      marker-yv: yv-n
    - type: text
      text: ', '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et on lui présenta le rouleau du prophète Esaïe. En déroulant le parchemin, il trouva le passage où il est écrit :'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: L’Esprit du Seigneur est sur moi
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: car il m’a oint
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: pour annoncer une bonne nouvelle aux pauvres.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Il m’a envoyé
      - type: text
        text: ' ╵'
      - type: usfm
        marker: qt
        children:
        - type: text
          text: pour annoncer aux captifs la délivrance,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: aux aveugles le recouvrement de la vue,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: pour apporter la liberté aux opprimés
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et proclamer une année de faveur accordée par le Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 61.1-2
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: où il fut tenté par le diable durant quarante jours. Il ne mangea rien durant ces jours-là, et, quand ils furent passés, il eut faim.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il roula le livre, le rendit au servant et s’assit. Dans la synagogue, tous les yeux étaient braqués sur lui.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Aujourd’hui même,
    - type: text
      text: ' commença-t-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pour vous qui l’entendez, cette prophétie de l’Ecriture est devenue réalité.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun de ses auditeurs ne restait indifférent : les paroles de grâce qu’il prononçait les étonnaient beaucoup. Aussi disaient-ils : N’est-il pas le fils de Joseph ?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous ne manquerez pas de m’appliquer ce dicton : « Médecin, guéris-toi toi-même » et vous me direz : « On nous a parlé de ce que tu as accompli à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Capernaüm
      - type: text
        text: . Fais-en donc autant ici, dans ta propre ville ! »
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : aucun prophète n’est bien accueilli dans sa patrie.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici la vérité, je vous le déclare : il y avait beaucoup de veuves en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: ' à l’époque d’Elie, quand, pendant trois ans et demi, il n’y a pas eu de pluie et qu’une grande famine a sévi dans tout le pays.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Or, Elie n’a été envoyé vers aucune d’entre elles, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: mais vers une veuve qui vivait à Sarepta, dans le pays de Sidon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 17.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il y avait aussi beaucoup de lépreux en Israël au temps du prophète Elisée. Et pourtant, aucun d’eux n’a été guéri. C’est le Syrien Naaman qui l’a été
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.27 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 5.1-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant ces paroles, tous ceux qui étaient dans la synagogue se mirent en colère. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se levèrent, firent sortir Jésus de la ville, et le menèrent jusqu’au sommet de la montagne sur laquelle elle était bâtie, afin de le précipiter dans le vide. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le diable lui dit : Si tu es le Fils de Dieu, ordonne donc à cette pierre de se changer en pain.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il passa au milieu d’eux et s’en alla.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exorcisme et guérisons à Capernaüm
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 1.21-28)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se rendit à Capernaüm, une autre ville de la Galilée. Il y enseignait les jours de sabbat. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses auditeurs étaient profondément impressionnés par son enseignement, car il parlait avec autorité.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la synagogue se trouvait un homme sous l’emprise d’un esprit démoniaque et impur. Il se mit à crier d’une voix puissante : '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ah ! Que nous veux-tu, Jésus de Nazareth ? Es-tu venu pour nous détruire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu es venu pour nous détruire.
      marker-yv: yv-n
    - type: text
      text: '  ? Je sais qui tu es ! Tu es le Saint envoyé par Dieu !'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, d’un ton sévère, Jésus lui ordonna : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tais-toi, et sors de cet homme !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le démon jeta l’homme par terre, au milieu des assistants, et sortit de lui, sans lui faire aucun mal. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous furent saisis de stupeur ; ils se disaient tous, les uns aux autres : Quelle est cette parole ? Il donne des ordres aux esprits mauvais, avec autorité et puissance, et ils sortent !'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et la renommée de Jésus se répandait dans toutes les localités environnantes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 8.14-17 ; Mc 1.29-34)
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En sortant de la synagogue, il se rendit à la maison de Simon. Or, la belle-mère de Simon souffrait d’une forte fièvre, et l’on demanda à Jésus de faire quelque chose pour elle. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il se pencha sur elle, donna un ordre à la fièvre, et la fièvre la quitta. Alors elle se leva immédiatement et se mit à les servir.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: L’homme ne vivra pas seulement de pain
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 8.3
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au coucher du soleil, tous ceux qui avaient chez eux des malades atteints des maux les plus divers les amenèrent à Jésus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On attendait le coucher du soleil qui marquait la fin du sabbat pour transporter les malades, car il était interdit de le faire durant le jour du repos.
      marker-yv: yv-n
    - type: text
      text: '. Il posa ses mains sur chacun d’eux et les guérit. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des démons sortaient aussi de beaucoup d’entre eux en criant : Tu es le Fils de Dieu !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Jésus les reprenait sévèrement pour les faire taire, car ils savaient qu’il était le Messie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jésus ne voulait pas être « accrédité » par les démons.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 1.35-39)
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dès qu’il fit jour, Jésus sortit de la maison et se rendit dans un lieu désert. Les foules se mirent à sa recherche et, après l’avoir rejoint, voulurent le retenir pour qu’il ne les quitte pas.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je dois aussi annoncer la Bonne Nouvelle du royaume de Dieu aux autres villes, car c’est pour cela que Dieu m’a envoyé.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il prêchait dans les synagogues de la Judée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Galilée.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le diable l’entraîna sur une hauteur, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lui montra en un instant tous les royaumes de la terre et lui dit : Je te donnerai la domination universelle ainsi que les richesses et la gloire de ces royaumes. Car tout cela a été remis entre mes mains et je le donne à qui je veux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si donc tu te prosternes devant moi, tout cela sera à toi.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Tu adoreras le Seigneur, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et c’est à lui seul que tu rendras un culte
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 6.13
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le diable le conduisit ensuite à Jérusalem, le plaça tout en haut du Temple et lui dit : Si tu es le Fils de Dieu, jette-toi d’ici en bas, car il est écrit :'
