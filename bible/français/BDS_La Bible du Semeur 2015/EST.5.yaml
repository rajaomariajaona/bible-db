document_id: EST.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esther invite l’empereur et Haman à un festin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au bout du troisième jour de jeûne, Esther revêtit ses habits royaux et se tint dans la cour intérieure du palais impérial, en face des appartements de l’empereur. Celui-ci siégeait sur son trône dans le palais, en face de l’entrée de l’édifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand il aperçut l’impératrice Esther, qui se tenait dans la cour, il lui accorda sa faveur. Il lui tendit le sceptre d’or qu’il tenait en main. Esther s’approcha et en toucha l’extrémité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors il lui demanda : Qu’y a-t-il, impératrice Esther ? Quelle est ta requête ? Elle te sera accordée, même si c’est la moitié de l’empire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esther lui répondit : Si l’empereur le veut bien, qu’il vienne ce soir avec Haman au festin que j’ai préparé en son honneur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’empereur dit : Dépêchez-vous de prévenir Haman pour que nous nous rendions à l’invitation d’Esther.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’empereur et Haman vinrent au festin qu’Esther avait préparé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant que l’on buvait le vin, l’empereur dit à Esther : Quelle est donc ta requête, elle te sera accordée. Quelle est ta demande ? Même si c’est la moitié de l’empire, tu l’obtiendras.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Esther répondit : Ma requête, ma demande, la voici : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: si l’empereur veut m’accorder sa faveur, et s’il veut bien accéder à ma requête et répondre à ma demande, que l’empereur vienne avec Haman au festin que je leur prépare demain. C’est alors que je répondrai à la question de l’empereur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haman fait dresser une potence pour Mardochée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Haman s’en retourna ce jour-là, joyeux et le cœur en fête. En passant devant la porte du palais impérial, il aperçut Mardochée. Celui-ci ne se leva pas et ne tremblait pas devant lui. Alors Haman fut rempli de fureur contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Néanmoins, il se domina et rentra chez lui. Là, il fit venir ses amis et sa femme Zéresh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il leur décrivit longuement ses richesses prestigieuses, leur parla de ses nombreux fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9.7-10
        metadata:
          usfm: EST.9.7+EST.9.8+EST.9.9+EST.9.10
      - type: text
        text: ', il en avait dix.'
    marker-yv: yv-n
  - type: text
    text: ' et de tous les honneurs dont l’empereur l’avait comblé en l’élevant à un rang supérieur aux ministres et à tous les hauts fonctionnaires impériaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '– Et même, ajouta-t-il, l’impératrice Esther n’a invité personne d’autre que moi avec l’empereur au festin qu’elle a préparé. Et demain, c’est encore moi qui suis invité avec l’empereur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais tout cela ne compte pour rien à mes yeux, aussi longtemps que je verrai ce Juif Mardochée assis à la porte du palais impérial.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sa femme Zéresh et tous ses amis lui dirent : Il n’y a qu’à faire dresser une potence haute de vingt-cinq mètres, et demain matin, tu parleras à l’empereur pour qu’on y pende Mardochée. Puis tu pourras aller gaiement au festin en compagnie de l’empereur.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Cette proposition plut à Haman, et il fit faire la potence.
