document_id: EST.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Esther invite l’empereur et Haman à un festin
  - type: text
    content: 'Au bout du troisième jour de jeûne, Esther revêtit ses habits royaux et se tint dans la cour intérieure du palais impérial, en face des appartements de l’empereur. Celui-ci siégeait sur son trône dans le palais, en face de l’entrée de l’édifice. '
  '10':
  - type: text
    content: 'Néanmoins, il se domina et rentra chez lui. Là, il fit venir ses amis et sa femme Zéresh. '
  '11':
  - type: text
    content: Il leur décrivit longuement ses richesses prestigieuses, leur parla de ses nombreux fils
  - type: note
    content: D’après 9.7-10, il en avait dix.
  - type: text
    content: ' et de tous les honneurs dont l’empereur l’avait comblé en l’élevant à un rang supérieur aux ministres et à tous les hauts fonctionnaires impériaux.'
  '12':
  - type: text
    content: '– Et même, ajouta-t-il, l’impératrice Esther n’a invité personne d’autre que moi avec l’empereur au festin qu’elle a préparé. Et demain, c’est encore moi qui suis invité avec l’empereur. '
  '13':
  - type: text
    content: Mais tout cela ne compte pour rien à mes yeux, aussi longtemps que je verrai ce Juif Mardochée assis à la porte du palais impérial.
  '14':
  - type: text
    content: 'Sa femme Zéresh et tous ses amis lui dirent : Il n’y a qu’à faire dresser une potence haute de vingt-cinq mètres, et demain matin, tu parleras à l’empereur pour qu’on y pende Mardochée. Puis tu pourras aller gaiement au festin en compagnie de l’empereur.'
  - type: text
    content: Cette proposition plut à Haman, et il fit faire la potence.
  '2':
  - type: text
    content: 'Quand il aperçut l’impératrice Esther, qui se tenait dans la cour, il lui accorda sa faveur. Il lui tendit le sceptre d’or qu’il tenait en main. Esther s’approcha et en toucha l’extrémité. '
  '3':
  - type: text
    content: 'Alors il lui demanda : Qu’y a-t-il, impératrice Esther ? Quelle est ta requête ? Elle te sera accordée, même si c’est la moitié de l’empire.'
  '4':
  - type: text
    content: 'Esther lui répondit : Si l’empereur le veut bien, qu’il vienne ce soir avec Haman au festin que j’ai préparé en son honneur.'
  '5':
  - type: text
    content: 'L’empereur dit : Dépêchez-vous de prévenir Haman pour que nous nous rendions à l’invitation d’Esther.'
  - type: text
    content: 'L’empereur et Haman vinrent au festin qu’Esther avait préparé. '
  '6':
  - type: text
    content: 'Pendant que l’on buvait le vin, l’empereur dit à Esther : Quelle est donc ta requête, elle te sera accordée. Quelle est ta demande ? Même si c’est la moitié de l’empire, tu l’obtiendras.'
  '7':
  - type: text
    content: 'Esther répondit : Ma requête, ma demande, la voici : '
  '8':
  - type: text
    content: si l’empereur veut m’accorder sa faveur, et s’il veut bien accéder à ma requête et répondre à ma demande, que l’empereur vienne avec Haman au festin que je leur prépare demain. C’est alors que je répondrai à la question de l’empereur.
  - type: heading
    content: Haman fait dresser une potence pour Mardochée
  '9':
  - type: text
    content: 'Haman s’en retourna ce jour-là, joyeux et le cœur en fête. En passant devant la porte du palais impérial, il aperçut Mardochée. Celui-ci ne se leva pas et ne tremblait pas devant lui. Alors Haman fut rempli de fureur contre lui. '
