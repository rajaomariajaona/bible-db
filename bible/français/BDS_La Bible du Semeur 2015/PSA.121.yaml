document_id: PSA.121,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mon secours vient de l’Eternel
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: 'Je lève les yeux vers les monts :'
  - type: text
    content: d’où le secours me viendra-t-il ?
  '2':
  - type: text
    content: Mon secours vient de l’Eternel
  - type: text
    content: qui a fait le ciel et la terre.
  '3':
  - type: text
    content: Il te gardera des faux pas,
  - type: text
    content: celui qui te protège ╵ne sommeillera pas.
  '4':
  - type: text
    content: Non, jamais il ne dort, ╵jamais il ne sommeille,
  - type: text
    content: celui qui protège Israël.
  '5':
  - type: text
    content: L’Eternel est ton protecteur,
  - type: text
    content: l’Eternel est à ton côté ╵comme une ombre qui te protège.
  '6':
  - type: text
    content: Le soleil ne te frappera donc pas le jour,
  - type: text
    content: ni la lune pendant la nuit.
  '7':
  - type: text
    content: 'L’Eternel te gardera de tout mal :'
  - type: text
    content: il gardera ta vie.
  '8':
  - type: text
    content: L’Eternel veillera sur toi ╵pendant tes allées et venues,
  - type: text
    content: dès maintenant et à jamais.
