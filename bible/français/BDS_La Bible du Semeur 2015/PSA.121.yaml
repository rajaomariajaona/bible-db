  children:
  - type: text
    text: Mon secours vient de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '121.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '120.1'
        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je lève les yeux vers les monts :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’où le secours me viendra-t-il ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon secours vient de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a fait le ciel et la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il te gardera des faux pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui te protège ╵ne sommeillera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Non, jamais il ne dort, ╵jamais il ne sommeille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui protège Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Eternel est ton protecteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel est à ton côté ╵comme une ombre qui te protège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le soleil ne te frappera donc pas le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni la lune pendant la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel te gardera de tout mal :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il gardera ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel veillera sur toi ╵pendant tes allées et venues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant et à jamais.
