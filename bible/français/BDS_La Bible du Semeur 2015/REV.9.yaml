document_id: REV.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La cinquième trompette – le premier malheur : déchaînement des forces de l’abîme'
  - type: text
    content: 'Puis le cinquième ange sonna de la trompette ; et je vis un astre qui était tombé du ciel sur la terre. La clé du puits de l’abîme lui fut donnée. '
  '10':
  - type: text
    content: Elles avaient des queues armées de dards comme celles des scorpions. C’est avec leur queue qu’elles pouvaient torturer les hommes pendant cinq mois.
  '11':
  - type: text
    content: Elles avaient pour roi l’ange de l’abîme qui s’appelle en hébreu Abaddon et en grec Apollyon.
  '12':
  - type: text
    content: 'Le premier malheur est passé. Voici : deux malheurs encore viennent après lui.'
  - type: heading
    content: 'La sixième trompette – le deuxième malheur : invasion d’une formidable armée'
  '13':
  - type: text
    content: 'Le sixième ange sonna de la trompette. J’entendis alors une voix sortant des quatre cornes de l’autel d’or qui se trouve devant Dieu. '
  '14':
  - type: text
    content: 'Elle disait au sixième ange qui tenait la trompette : Libère les quatre anges qui sont enchaînés au bord du grand fleuve, l’Euphrate'
  - type: note
    content: Fleuve de la Mésopotamie (dans l’Irak actuel) qui constituait la frontière orientale de l’Empire romain.
  - type: text
    content: .
  '15':
  - type: text
    content: 'On délia donc les quatre anges tenus prêts pour cette heure, ce jour, ce mois et cette année, afin qu’ils exterminent le tiers de l’humanité. '
  '16':
  - type: text
    content: Ils étaient deux cents millions de cavaliers combattants. C’était leur nombre, tel que je l’entendis.
  '17':
  - type: text
    content: 'Voici comment, dans ma vision, je vis les chevaux et leurs cavaliers : ils portaient des cuirasses rouge feu, bleu turquoise et jaune soufre ; les têtes des chevaux rappelaient celles des lions et leur gueule crachait du feu, de la fumée et du soufre. '
  '18':
  - type: text
    content: 'Par ces trois fléaux qui sortaient de leur gueule : le feu, la fumée et le soufre, le tiers de l’humanité fut exterminé. '
  '19':
  - type: text
    content: Car le pouvoir des chevaux se trouvait dans leur gueule et dans leur queue. En effet, leurs queues ressemblaient à des serpents, elles étaient pourvues de têtes qui leur servaient à nuire.
  '2':
  - type: text
    content: 'Il ouvrit le puits de l’abîme, et une fumée épaisse s’en éleva, comme celle d’une grande fournaise. Le soleil et l’air furent obscurcis par la fumée qui s’échappait du puits. '
  '20':
  - type: text
    content: 'Mais le reste des hommes qui avaient survécu à ces fléaux, ne renoncèrent pas aux œuvres de leurs mains ; ils ne cessèrent pas d’adorer les démons ainsi que les idoles d’or, d’argent, de bronze, de pierre et de bois, bien qu’elles soient incapables de voir, d’entendre et de bouger. '
  '21':
  - type: text
    content: Ils ne renoncèrent pas à leurs meurtres, à leurs pratiques magiques, à leur immoralité et à leur malhonnêteté.
  '3':
  - type: text
    content: 'De cette fumée sortirent des sauterelles qui se répandirent sur la terre. Il leur fut donné un pouvoir semblable à celui des scorpions. '
  '4':
  - type: text
    content: 'Elles reçurent l’ordre de ne pas faire de mal à l’herbe de la terre, ni à aucune plante verte, ni à aucun arbre, mais de s’attaquer seulement aux hommes qui ne portent pas le sceau de Dieu sur le front. '
  '5':
  - type: text
    content: 'Il leur fut donné, non pas de les tuer, mais de les torturer pendant cinq mois. La douleur qu’elles causaient ressemblait à celle qu’une piqûre de scorpion inflige à un homme. '
  '6':
  - type: text
    content: En ces jours-là, les hommes chercheront la mort mais ils ne la trouveront pas. Ils l’appelleront de leurs vœux, mais la mort les fuira.
  '7':
  - type: text
    content: 'Ces sauterelles ressemblaient à des chevaux harnachés pour la bataille. Elles avaient sur la tête comme des couronnes d’or, et leur face ressemblait à un visage humain. '
  '8':
  - type: text
    content: 'Leur chevelure était pareille à celle des femmes, et leurs dents à celles des lions. '
  '9':
  - type: text
    content: 'Leur thorax paraissait cuirassé de fer, et le bruit de leurs ailes évoquait le fracas d’une charge de chars tirés pour le combat par de nombreux chevaux. '
