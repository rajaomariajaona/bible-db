document_id: DAN.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le temps de la fin
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La vision de l’homme vêtu de lin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Durant la troisième année du règne de Cyrus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en 536 ou, peut-être, en 535, av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', empereur de Perse, un message fut révélé à Daniel, nommé aussi Beltshatsar. Cette révélation est authentique, elle annonce un grand combat. Daniel fut attentif à la parole, et il en reçut la compréhension dans une vision.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En ces jours-là, moi, Daniel, je fus plongé dans le deuil durant trois semaines entières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je ne touchai à aucun mets délicat ; je ne pris ni viande, ni vin, et je ne me frottai d’aucune huile parfumée pendant ces trois semaines.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le vingt-quatrième jour du premier mois, je me trouvai sur la rive du grand fleuve, le Tigre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je levai les yeux, et j’aperçus un homme vêtu d’habits de lin qui portait une ceinture d’or le plus pur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'or d’Ouphaz, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mais c’est sans doute là une expression idiomatique.
    marker-yv: yv-n
  - type: text
    text: ' autour des reins'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 5-6, voir Ez 1.7, 13, 16, 24 ; 9.2 ; Ap 1.13-15 ; 2.18 ; 19.12.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Son corps luisait comme de la topaze, son visage flamboyait comme l’éclair, ses yeux étaient pareils à des flammes ardentes, ses bras et ses pieds avaient l’éclat du bronze poli. Quand il parlait, le son de sa voix retentissait comme le bruit d’une grande foule.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moi, Daniel, je fus seul à voir cette apparition, les gens qui étaient avec moi ne la virent pas, ils furent soudain saisis d’une grande frayeur et s’enfuirent pour se cacher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je demeurai donc seul à contempler cette apparition grandiose. J’en perdis mes forces, je devins tout pâle et mes traits se décomposèrent ; je me sentais défaillir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J’entendis le personnage prononcer des paroles et, en entendant sa voix, je perdis connaissance et je tombai la face contre terre.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le message de l’ange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors, une main me toucha, elle me fit me redresser tout tremblant sur mes genoux et sur les paumes de mes mains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 10-11, voir Ez 1.28 à 2.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis le personnage me dit : Daniel, homme bien-aimé de Dieu, sois attentif aux paroles que je t’adresse, mets-toi debout où tu es, car j’ai été maintenant envoyé vers toi. Pendant qu’il prononçait ces mots, je me relevai, tout tremblant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il poursuivit : Sois sans crainte, Daniel ; car, dès le premier jour où tu as appliqué ton cœur à comprendre et à t’humilier devant ton Dieu, ta prière a été entendue ; et je suis venu vers toi, en réponse à tes paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais le chef du royaume de Perse s’est opposé à moi durant vingt et un jours. Alors Michel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Michel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir v. 21 ; Jd 9 ; Ap 12.7.
    marker-yv: yv-n
  - type: text
    text: ', l’un des principaux chefs, est venu à mon aide et je suis resté là auprès des rois de Perse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis venu pour te faire comprendre ce qui arrivera à ton peuple dans l’avenir, car c’est encore une vision qui concerne ce temps-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant qu’il m’adressait ces paroles, j’inclinai la tête vers le sol et je restais muet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et voici qu’un personnage qui avait l’aspect d’un homme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après la plupart des manuscrits hébreux. Un manuscrit du texte hébreu traditionnel, le texte hébreu retrouvé à Qumrân et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quelque chose qui avait l’aspect d’une main humaine.
    marker-yv: yv-n
  - type: text
    text: ' me toucha les lèvres, alors je pus de nouveau ouvrir la bouche et parler. M’adressant au personnage qui se tenait devant moi, je lui dis : Mon seigneur, cette apparition me remplit d’angoisse au point de m’ôter toute force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comment le serviteur de mon seigneur, que je suis, pourrait-il parler à mon seigneur qui m’est apparu, alors que je n’ai plus aucune force et que j’ai perdu le souffle ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors, celui qui avait l’aspect d’un homme me toucha et me fortifia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il me dit : Sois sans crainte, homme bien-aimé de Dieu ! Que la paix soit avec toi ! Fortifie-toi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pendant qu’il me parlait, je repris des forces et je lui dis : Que mon seigneur parle, car tu m’as fortifié !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il me dit : Sais-tu pourquoi je suis venu vers toi ? Je suis sur le point de m’en retourner pour combattre contre le chef de la Perse, et quand je partirai, le chef de la Grèce apparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais auparavant, je vais te révéler ce qui est écrit dans le livre de vérité. Personne ne me soutient contre tous ces adversaires, excepté Michel, votre chef.
