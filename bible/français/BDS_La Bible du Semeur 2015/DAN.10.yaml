document_id: DAN.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le temps de la fin
  - type: heading
    content: La vision de l’homme vêtu de lin
  - type: text
    content: Durant la troisième année du règne de Cyrus
  - type: note
    content: C’est-à-dire en 536 ou, peut-être, en 535, av. J.-C.
  - type: text
    content: ', empereur de Perse, un message fut révélé à Daniel, nommé aussi Beltshatsar. Cette révélation est authentique, elle annonce un grand combat. Daniel fut attentif à la parole, et il en reçut la compréhension dans une vision.'
  '10':
  - type: text
    content: Alors, une main me toucha, elle me fit me redresser tout tremblant sur mes genoux et sur les paumes de mes mains
  - type: note
    content: Pour les v. 10-11, voir Ez 1.28 à 2.2.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Puis le personnage me dit : Daniel, homme bien-aimé de Dieu, sois attentif aux paroles que je t’adresse, mets-toi debout où tu es, car j’ai été maintenant envoyé vers toi. Pendant qu’il prononçait ces mots, je me relevai, tout tremblant.'
  '12':
  - type: text
    content: 'Il poursuivit : Sois sans crainte, Daniel ; car, dès le premier jour où tu as appliqué ton cœur à comprendre et à t’humilier devant ton Dieu, ta prière a été entendue ; et je suis venu vers toi, en réponse à tes paroles. '
  '13':
  - type: text
    content: Mais le chef du royaume de Perse s’est opposé à moi durant vingt et un jours. Alors Michel
  - type: note
    content: 'Michel: voir v. 21 ; Jd 9 ; Ap 12.7.'
  - type: text
    content: ', l’un des principaux chefs, est venu à mon aide et je suis resté là auprès des rois de Perse. '
  '14':
  - type: text
    content: Je suis venu pour te faire comprendre ce qui arrivera à ton peuple dans l’avenir, car c’est encore une vision qui concerne ce temps-là.
  '15':
  - type: text
    content: 'Pendant qu’il m’adressait ces paroles, j’inclinai la tête vers le sol et je restais muet. '
  '16':
  - type: text
    content: Et voici qu’un personnage qui avait l’aspect d’un homme
  - type: note
    content: 'D’après la plupart des manuscrits hébreux. Un manuscrit du texte hébreu traditionnel, le texte hébreu retrouvé à Qumrân et l’ancienne version grecque ont : quelque chose qui avait l’aspect d’une main humaine.'
  - type: text
    content: ' me toucha les lèvres, alors je pus de nouveau ouvrir la bouche et parler. M’adressant au personnage qui se tenait devant moi, je lui dis : Mon seigneur, cette apparition me remplit d’angoisse au point de m’ôter toute force. '
  '17':
  - type: text
    content: Comment le serviteur de mon seigneur, que je suis, pourrait-il parler à mon seigneur qui m’est apparu, alors que je n’ai plus aucune force et que j’ai perdu le souffle ?
  '18':
  - type: text
    content: 'Alors, celui qui avait l’aspect d’un homme me toucha et me fortifia. '
  '19':
  - type: text
    content: 'Puis il me dit : Sois sans crainte, homme bien-aimé de Dieu ! Que la paix soit avec toi ! Fortifie-toi !'
  - type: text
    content: 'Pendant qu’il me parlait, je repris des forces et je lui dis : Que mon seigneur parle, car tu m’as fortifié !'
  '2':
  - type: text
    content: 'En ces jours-là, moi, Daniel, je fus plongé dans le deuil durant trois semaines entières. '
  '20':
  - type: text
    content: 'Il me dit : Sais-tu pourquoi je suis venu vers toi ? Je suis sur le point de m’en retourner pour combattre contre le chef de la Perse, et quand je partirai, le chef de la Grèce apparaîtra. '
  '21':
  - type: text
    content: Mais auparavant, je vais te révéler ce qui est écrit dans le livre de vérité. Personne ne me soutient contre tous ces adversaires, excepté Michel, votre chef.
  '3':
  - type: text
    content: Je ne touchai à aucun mets délicat ; je ne pris ni viande, ni vin, et je ne me frottai d’aucune huile parfumée pendant ces trois semaines.
  '4':
  - type: text
    content: 'Le vingt-quatrième jour du premier mois, je me trouvai sur la rive du grand fleuve, le Tigre. '
  '5':
  - type: text
    content: Je levai les yeux, et j’aperçus un homme vêtu d’habits de lin qui portait une ceinture d’or le plus pur
  - type: note
    content: 'Littéralement : or d’Ouphaz, mais c’est sans doute là une expression idiomatique.'
  - type: text
    content: ' autour des reins'
  - type: note
    content: Pour les v. 5-6, voir Ez 1.7, 13, 16, 24 ; 9.2 ; Ap 1.13-15 ; 2.18 ; 19.12.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Son corps luisait comme de la topaze, son visage flamboyait comme l’éclair, ses yeux étaient pareils à des flammes ardentes, ses bras et ses pieds avaient l’éclat du bronze poli. Quand il parlait, le son de sa voix retentissait comme le bruit d’une grande foule.
  '7':
  - type: text
    content: 'Moi, Daniel, je fus seul à voir cette apparition, les gens qui étaient avec moi ne la virent pas, ils furent soudain saisis d’une grande frayeur et s’enfuirent pour se cacher. '
  '8':
  - type: text
    content: 'Je demeurai donc seul à contempler cette apparition grandiose. J’en perdis mes forces, je devins tout pâle et mes traits se décomposèrent ; je me sentais défaillir. '
  '9':
  - type: text
    content: J’entendis le personnage prononcer des paroles et, en entendant sa voix, je perdis connaissance et je tombai la face contre terre.
  - type: heading
    content: Le message de l’ange
