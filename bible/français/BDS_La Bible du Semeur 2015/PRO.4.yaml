document_id: PRO.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les conseils d’un père
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez, mes fils, l’instruction d’un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soyez attentifs pour acquérir du discernement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car c’est un bon enseignement que je vous donne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’abandonnez pas l’éducation que je vous ai donnée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car j’ai été, moi aussi, un fils pour mon père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma mère me chérissait comme un enfant unique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mon père m’a enseigné et m’a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Que ton cœur retienne mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: suis mes préceptes, et tu vivras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Acquiers la sagesse et l’intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’oublie pas, ne dévie pas de ce que je t’ai appris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: N’abandonne pas la sagesse, et elle te gardera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aime-la, et elle te protégera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici le début de la sagesse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: acquiers la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: recherche l’intelligence au prix de tout ce que tu possèdes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir la parabole de Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13.45-46
        metadata:
          usfm: MAT.13.45+MAT.13.46
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tiens-la en haute estime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'caresse-la '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'étreins-la. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La sagesse est alors comparée à l’épouse aimée (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5.15-19
        metadata:
          usfm: PRO.5.15+PRO.5.16+PRO.5.17+PRO.5.18+PRO.5.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et elle t’élèvera.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu l’embrasses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le même verbe est utilisé à propos de l’attitude envers la femme adultère en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.20'
        metadata:
          usfm: PRO.5.20
      - type: text
        text: . Le jeune homme est donc invité à choisir entre la sagesse et la femme adultère.
    marker-yv: yv-n
  - type: text
    text: ', elle te mettra en honneur.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elle posera une belle couronne sur ta tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle t’ornera d’un diadème magnifique. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mon fils, écoute-moi et reçois mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi tu prolongeras ta vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.18'
        metadata:
          usfm: PRO.3.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est la voie de la sagesse que je t’enseigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te guide vers de droits chemins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tu y marches, tes pas ne seront pas gênés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu y cours, tu ne trébucheras pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Soit sur un obstacle soit à cause de l’obscurité, ou des deux (voir v.  19 ; 3.23 ; 10.9 ; Ps 18.37 ; Es 40.30-31).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tiens-toi fermement à l’éducation qui t’a été donnée, ne la rejette pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Restes-y attaché, car ta vie en dépend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ne t’engage pas dans la voie des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne suis pas l’exemple de ceux qui font le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eloigne-toi de leur sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne t’y aventure pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écarte-toi d’eux et va ton chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car ces gens-là ne dormiraient pas s’ils n’avaient pas fait quelque chose de mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils perdraient le sommeil s’ils n’avaient causé la chute de quelqu’un.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils se nourrissent du pain de la méchanceté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et boivent le vin de la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le sentier des justes est comme la lumière de l’aurore
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont l’éclat ne cesse de croître jusqu’en plein jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La route des méchants, elle, est plongée dans l’obscurité :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’aperçoivent pas l’obstacle qui les fera tomber.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mon fils, sois attentif à mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prête l’oreille à mes propos,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ne les perds pas de vue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-les au fond de ton cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car ils apportent la vie à ceux qui les accueillent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils assurent la santé du corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Par-dessus tout, veille soigneusement sur ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est à la source de tout ce qui fait ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Garde-toi de prononcer des propos tordus :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rejette les discours pervers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Regarde bien en face de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton regard se porte droit devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Observe bien le chemin sur lequel tu t’engages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et emprunte des routes sûres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ne t’en écarte ni à droite ni à gauche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: détourne ton pied du mal.
