document_id: PRO.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les conseils d’un père
  - type: text
    content: Ecoutez, mes fils, l’instruction d’un père,
  - type: text
    content: soyez attentifs pour acquérir du discernement.
  '10':
  - type: text
    content: Mon fils, écoute-moi et reçois mes paroles,
  - type: text
    content: ainsi tu prolongeras ta vie
  - type: note
    content: Voir 3.18.
  - type: text
    content: .
  '11':
  - type: text
    content: C’est la voie de la sagesse que je t’enseigne.
  - type: text
    content: Je te guide vers de droits chemins.
  '12':
  - type: text
    content: Si tu y marches, tes pas ne seront pas gênés,
  - type: text
    content: et si tu y cours, tu ne trébucheras pas
  - type: note
    content: Soit sur un obstacle soit à cause de l’obscurité, ou des deux (voir v.  19 ; 3.23 ; 10.9 ; Ps 18.37 ; Es 40.30-31).
  - type: text
    content: .
  '13':
  - type: text
    content: Tiens-toi fermement à l’éducation qui t’a été donnée, ne la rejette pas.
  - type: text
    content: Restes-y attaché, car ta vie en dépend.
  '14':
  - type: text
    content: Ne t’engage pas dans la voie des méchants,
  - type: text
    content: ne suis pas l’exemple de ceux qui font le mal.
  '15':
  - type: text
    content: Eloigne-toi de leur sentier,
  - type: text
    content: ne t’y aventure pas,
  - type: text
    content: écarte-toi d’eux et va ton chemin.
  '16':
  - type: text
    content: Car ces gens-là ne dormiraient pas s’ils n’avaient pas fait quelque chose de mal,
  - type: text
    content: ils perdraient le sommeil s’ils n’avaient causé la chute de quelqu’un.
  '17':
  - type: text
    content: Ils se nourrissent du pain de la méchanceté
  - type: text
    content: et boivent le vin de la violence.
  '18':
  - type: text
    content: Le sentier des justes est comme la lumière de l’aurore
  - type: text
    content: dont l’éclat ne cesse de croître jusqu’en plein jour.
  '19':
  - type: text
    content: 'La route des méchants, elle, est plongée dans l’obscurité :'
  - type: text
    content: ils n’aperçoivent pas l’obstacle qui les fera tomber.
  '2':
  - type: text
    content: Car c’est un bon enseignement que je vous donne.
  - type: text
    content: N’abandonnez pas l’éducation que je vous ai donnée,
  '20':
  - type: text
    content: Mon fils, sois attentif à mes paroles,
  - type: text
    content: prête l’oreille à mes propos,
  '21':
  - type: text
    content: ne les perds pas de vue.
  - type: text
    content: Garde-les au fond de ton cœur,
  '22':
  - type: text
    content: car ils apportent la vie à ceux qui les accueillent,
  - type: text
    content: et ils assurent la santé du corps.
  '23':
  - type: text
    content: Par-dessus tout, veille soigneusement sur ton cœur,
  - type: text
    content: car il est à la source de tout ce qui fait ta vie.
  '24':
  - type: text
    content: 'Garde-toi de prononcer des propos tordus :'
  - type: text
    content: rejette les discours pervers.
  '25':
  - type: text
    content: Regarde bien en face de toi,
  - type: text
    content: et que ton regard se porte droit devant toi.
  '26':
  - type: text
    content: Observe bien le chemin sur lequel tu t’engages,
  - type: text
    content: et emprunte des routes sûres.
  '27':
  - type: text
    content: Ne t’en écarte ni à droite ni à gauche,
  - type: text
    content: détourne ton pied du mal.
  '3':
  - type: text
    content: car j’ai été, moi aussi, un fils pour mon père,
  - type: text
    content: et ma mère me chérissait comme un enfant unique.
  '4':
  - type: text
    content: 'Mon père m’a enseigné et m’a dit :'
  - type: text
    content: « Que ton cœur retienne mes paroles,
  - type: text
    content: suis mes préceptes, et tu vivras.
  '5':
  - type: text
    content: Acquiers la sagesse et l’intelligence,
  - type: text
    content: n’oublie pas, ne dévie pas de ce que je t’ai appris.
  '6':
  - type: text
    content: N’abandonne pas la sagesse, et elle te gardera,
  - type: text
    content: aime-la, et elle te protégera.
  '7':
  - type: text
    content: 'Voici le début de la sagesse :'
  - type: text
    content: acquiers la sagesse,
  - type: text
    content: recherche l’intelligence au prix de tout ce que tu possèdes
  - type: note
    content: Voir la parabole de Jésus en Mt 13.45-46.
  - type: text
    content: .
  '8':
  - type: text
    content: Tiens-la en haute estime
  - type: note
    content: 'Autre traduction : caresse-la ou étreins-la. La sagesse est alors comparée à l’épouse aimée (cf. 5.15-19).'
  - type: text
    content: ', et elle t’élèvera.'
  - type: text
    content: Si tu l’embrasses
  - type: note
    content: Le même verbe est utilisé à propos de l’attitude envers la femme adultère en 5.20. Le jeune homme est donc invité à choisir entre la sagesse et la femme adultère.
  - type: text
    content: ', elle te mettra en honneur.'
  '9':
  - type: text
    content: Elle posera une belle couronne sur ta tête,
  - type: text
    content: elle t’ornera d’un diadème magnifique. »
