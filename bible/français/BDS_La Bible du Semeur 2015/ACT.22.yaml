document_id: ACT.22,21
type_code: fra
verses:
  '1':
  - type: text
    content: – Mes frères et mes pères, dit-il, écoutez, je vous prie, ce que j’ai à vous dire pour ma défense.
  '10':
  - type: text
    content: 'J’ai demandé : « Que dois-je donc faire, Seigneur ? » Et le Seigneur m’a dit : '
  - type: text
    content: « Relève-toi, va à Damas, et là, on te dira tout ce que tu devras faire ! »
  '11':
  - type: text
    content: 'Mais je n’y voyais plus : l’éclat de cette lumière m’avait aveuglé. Alors mes compagnons m’ont pris par la main pour me conduire, et c’est ainsi que je suis arrivé à Damas.'
  '12':
  - type: text
    content: 'Il y avait là un certain Ananias, un homme pieux, qui observait fidèlement la Loi. Il était estimé de tous les Juifs de la ville. '
  '13':
  - type: text
    content: 'Il est venu me trouver, s’est tenu près de moi et m’a dit : « Saul, mon frère, recouvre la vue ! »'
  - type: text
    content: A l’instant même, je pus de nouveau voir et je l’ai vu.
  '14':
  - type: text
    content: 'Alors il m’a dit : « Le Dieu de nos ancêtres t’a choisi d’avance pour te faire connaître sa volonté, pour que tu voies le Juste et que tu entendes sa voix, '
  '15':
  - type: text
    content: 'car tu seras son témoin devant tous les hommes pour leur annoncer tout ce que tu as vu et entendu. '
  '16':
  - type: text
    content: Et maintenant, pourquoi tarder ? Lève-toi, fais-toi baptiser et sois lavé de tes péchés en priant le Seigneur. »
  '17':
  - type: text
    content: 'Un jour, après mon retour à Jérusalem, pendant que je priais dans la cour du Temple, je suis tombé en extase '
  '18':
  - type: text
    content: 'et j’ai vu le Seigneur. Il m’a dit : '
  - type: text
    content: « Hâte-toi de quitter Jérusalem, car ses habitants n’accepteront pas ton témoignage à mon sujet. »
  '19':
  - type: text
    content: 'J’ai répondu : « Mais, Seigneur, ils savent pourtant que j’allais de synagogue en synagogue pour faire emprisonner et fouetter ceux qui croient en toi. '
  '2':
  - type: text
    content: 'Lorsqu’ils l’entendirent parler en hébreu, le calme se fit plus grand encore. Paul reprit :'
  '20':
  - type: text
    content: Lorsqu’on a versé le sang d’Etienne, ton témoin, j’étais là, en personne, j’approuvais ce qui se passait et je gardais les vêtements de ses meurtriers. »
  '21':
  - type: text
    content: 'Le Seigneur m’a dit alors : '
  - type: text
    content: « Va, je vais t’envoyer au loin vers les non-Juifs… »
  - type: heading
    content: Paul en prison
  '22':
  - type: text
    content: 'La foule l’avait écouté jusque-là, mais, à ces mots, ils se mirent tous à crier : A mort ! Qu’on débarrasse la terre d’un tel individu ! Il n’a pas le droit de vivre !'
  '23':
  - type: text
    content: 'Ils hurlaient de plus en plus fort, agitaient leurs vêtements et jetaient de la poussière en l’air. '
  '24':
  - type: text
    content: Alors le commandant donna l’ordre de faire entrer Paul dans la citadelle et de le soumettre à la torture à coups de fouet, afin de savoir pourquoi les Juifs criaient ainsi contre lui.
  '25':
  - type: text
    content: 'On était en train de l’attacher avec des courroies, quand il demanda à l’officier de service : Avez-vous le droit de fouetter un citoyen romain, et sans même l’avoir jugé ?'
  '26':
  - type: text
    content: 'Quand l’officier entendit cela, il courut avertir le commandant : Sais-tu ce que tu allais faire ? Cet homme est citoyen romain.'
  '27':
  - type: text
    content: 'Le commandant se rendit aussitôt auprès de Paul et lui demanda : Dis-moi, es-tu vraiment citoyen romain ?'
  - type: text
    content: – Oui, répondit-il.
  '28':
  - type: text
    content: – Moi, reprit le commandant, j’ai dû payer très cher pour acquérir ce titre.
  - type: text
    content: – Et moi, dit Paul, je le tiens de naissance.
  '29':
  - type: text
    content: Aussitôt, ceux qui allaient le torturer le laissèrent. Le commandant lui-même commença à s’inquiéter à l’idée qu’il avait bel et bien fait enchaîner un citoyen romain.
  - type: heading
    content: Paul devant le Grand-Conseil
  '3':
  - type: text
    content: Je suis juif. Je suis né à Tarse en Cilicie, mais j’ai été élevé ici à Jérusalem. C’est Gamaliel
  - type: note
    content: 'Gamaliel: voir note 5.34.'
  - type: text
    content: ' qui fut mon maître ; il m’a enseigné avec une grande exactitude la Loi de nos ancêtres, et j’étais un partisan farouche de la cause de Dieu, comme vous l’êtes tous aujourd’hui. '
  '30':
  - type: text
    content: C’est pourquoi, dès le lendemain, il voulut éclaircir l’affaire et savoir au juste de quoi les Juifs accusaient Paul. Il le fit délier et, après avoir convoqué les chefs des prêtres et tout le Grand-Conseil, il le fit descendre et le plaça en face d’eux.
  '4':
  - type: text
    content: 'J’ai combattu à mort ce qu’on appelle la Voie, en faisant enchaîner et jeter en prison des hommes et des femmes. '
  '5':
  - type: text
    content: Le grand-prêtre et tout le Conseil des responsables du peuple peuvent témoigner que je dis vrai. Car c’est d’eux, précisément, que j’avais reçu des lettres de recommandation pour nos frères. Je suis alors parti pour Damas, bien résolu à faire enchaîner et à ramener à Jérusalem, afin de les faire punir, tous les adhérents de cette Voie que je trouverais là-bas.
  '6':
  - type: text
    content: Comme j’étais en chemin et que j’approchais de Damas, tout à coup, vers midi, une vive lumière a resplendi du ciel et m’a enveloppé.
  '7':
  - type: text
    content: 'Je suis tombé à terre et j’ai entendu une voix qui me demandait : '
  - type: text
    content: « Saul, Saul, pourquoi me persécutes-tu ? »
  - type: text
    content: ' Je me suis écrié : '
  '8':
  - type: text
    content: '« Qui es-tu Seigneur ? » Alors la voix m’a dit : '
  - type: text
    content: '« Je suis, moi, Jésus de '
  - type: text
    content: Nazareth
  - type: text
    content: ', que tu persécutes. »'
  '9':
  - type: text
    content: 'Ceux qui étaient avec moi ont bien vu la lumière, mais n’ont pas compris celui qui me parlait. '
