document_id: LUK.22
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'À Jérusalem : mort et résurrection de Jésus'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La trahison
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.1-5, 14-16 ; Mc 14.1-2, 10-11 ; Jn 11.47-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On était à quelques jours de la fête « des Pains sans levain », appelée la Pâque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les chefs des prêtres et les spécialistes de la Loi cherchaient un moyen de supprimer Jésus, mais ils avaient peur de la réaction du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est alors que Satan entra dans le cœur de Judas surnommé l’Iscariot, l’un des Douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Judas alla trouver les chefs des prêtres et les officiers de la garde du Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit des gardes chargés de la police du Temple (voir v. 52).
    marker-yv: yv-n
  - type: text
    text: ' pour s’entendre avec eux sur la manière dont il leur livrerait Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils en furent tout réjouis et convinrent de lui donner de l’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il accepta et, dès lors, il chercha une occasion favorable pour leur livrer Jésus à l’insu de la foule.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus célèbre la Pâque avec ses disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.17-19 ; Mc 14.12-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le jour de la fête des Pains sans levain, où l’on devait tuer l’agneau de la Pâque, arriva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus envoya Pierre et Jean en leur disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez nous préparer le repas de la Pâque.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – Où veux-tu que nous le préparions ? lui demandèrent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien, quand vous entrerez dans la ville, vous rencontrerez un homme portant une cruche d’eau. Suivez-le jusqu’à la maison où il entrera.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et voici comment vous parlerez au maître de maison : « Le Maître te fait dire : Où est la pièce où je prendrai le repas de la Pâque avec mes disciples ? »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors il vous montrera, à l’étage supérieur, une grande pièce aménagée ; c’est là que vous ferez les préparatifs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils partirent donc, trouvèrent tout comme Jésus le leur avait dit et préparèrent le repas de la Pâque.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.26-29 ; Mc 14.22-25 ; voir 1 Co 11.23-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand ce fut l’heure, Jésus se mit à table, avec les apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai vivement désiré célébrer cette Pâque avec vous avant de souffrir.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, je vous le déclare, je ne la mangerai plus jusqu’au jour où tout ce qu’elle signifie sera accompli dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il prit une coupe, prononça la prière de reconnaissance et dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez cette coupe et partagez-la entre vous,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'car, je vous le déclare : dorénavant, je ne boirai plus du fruit de la vigne jusqu’à ce que le royaume de Dieu vienne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ensuite il prit du pain, remercia Dieu, le partagea en morceaux qu’il leur donna en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceci est mon corps
  - type: text
    text: ' ['
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui est donné pour vous. Faites cela en souvenir de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après le repas, il fit de même pour la coupe, en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ceci est la coupe de la nouvelle '
    - type: usfm
      marker: w
      children:
      - type: text
        text: alliance
    - type: text
      text: ' conclue par mon sang qui va être versé pour vous…'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets sont absents de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' ]'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.20-25 ; Mc 14.17-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’ailleurs, voici, celui qui va me trahir est ici, à table avec moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Certes, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' s’en va selon ce que Dieu a décidé, mais malheur à l’homme par qui il est trahi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors les disciples se demandèrent les uns aux autres lequel d’entre eux allait faire cela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Grandeur et service
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 20.25-28 ; Mc 10.42-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les disciples eurent une vive discussion : il s’agissait de savoir lequel d’entre eux devait être considéré comme le plus grand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus intervint : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les rois des nations,
  - type: text
    text: ' dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dominent leurs peuples, et ceux qui exercent l’autorité sur elles se font appeler leurs « bienfaiteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le titre de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bienfaiteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(grec : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Evergète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) était porté par divers rois de l’Antiquité.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ».
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il ne faut pas que vous agissiez ainsi. Au contraire, que le plus grand parmi vous soit comme le plus jeune, et que celui qui gouverne soit comme le serviteur.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A votre avis, qui est le plus grand ? Celui qui est assis à table, ou celui qui sert ? N’est-ce pas celui qui est assis à table ? Eh bien, moi, au milieu de vous, je suis comme le serviteur…
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 19.28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous êtes restés fidèlement avec moi au cours de mes épreuves.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi, comme mon Père m’a donné le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume
    - type: text
      text: ', je vous le donne, à mon tour :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous mangerez et vous boirez à ma table, dans mon royaume, et vous siégerez sur des trônes pour gouverner les douze tribus d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus annonce le reniement de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.31-35 ; Mc 14.27-31 ; Jn 13.36-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Simon
    - type: text
      text: ', Simon ! fais attention : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: ' vous a réclamés pour vous passer tous au crible, comme on secoue le blé pour le séparer de la bale.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais moi, j’ai prié pour toi, pour que la foi ne vienne pas à te manquer. Et toi, le jour où tu seras revenu à moi, fortifie tes frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: – Seigneur, lui dit Simon, je suis prêt, s’il le faut, à aller en prison avec toi, ou même à mourir !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Pierre,
  - type: text
    text: ' reprit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'je te l’assure : aujourd’hui même, avant que le coq chante, tu auras, par trois fois, nié de me connaître.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur le mont des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Puis, s’adressant à l’ensemble des disciples, il continua : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand je vous ai envoyés sans bourse, ni sac de voyage, ni sandales, avez-vous manqué de quoi que ce soit ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – De rien, dirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien maintenant, poursuivit-il, si vous avez une bourse, prenez-la ; de même, si vous avez un sac, prenez-le, et si vous n’avez pas d’épée, vendez votre manteau pour en acheter une.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car il est écrit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il a été mis au nombre des criminels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.37 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 53.12
        metadata:
          usfm: ISA.53.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et cette parole doit s’accomplir pour moi. Car tout ce qui a été écrit de moi va s’accomplir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: – Seigneur, lui dirent-ils, voilà justement deux épées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Cela suffit !
  - type: text
    text: ' leur répondit-il.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.36-45 ; Mc 14.32-41)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors il sortit et se dirigea, comme d’habitude, vers le mont des Oliviers. Ses disciples s’y rendirent aussi avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quand il fut arrivé, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Priez pour ne pas céder à la tentation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour ne pas entrer en tentation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Puis il se retira à la distance d’un jet de pierre, se mit à genoux et pria ainsi : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O Père, si tu le veux, écarte de moi cette coupe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26.39
        metadata:
          usfm: MAT.26.39
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '! Toutefois, que ta volonté soit faite, et non la mienne.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '['
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Un ange venu du ciel lui apparut et le fortifia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: L’angoisse le saisit, sa prière se fit de plus en plus pressante, sa sueur devint comme des gouttes de sang qui tombaient à terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets sont absents de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: .]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Après avoir ainsi prié, il se releva et s’approcha de ses disciples. Il les trouva endormis, tant ils étaient accablés de tristesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Pourquoi dormez-vous ?
  - type: text
    text: ' leur dit-il. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Debout ! Et priez pour ne pas céder à la tentation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.40'
        metadata:
          usfm: LUK.22.40
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.47-55 ; Mc 14.43-49 ; Jn 18.2-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il n’avait pas fini de parler, quand toute une troupe surgit. A sa tête marchait le nommé Judas, l’un des Douze. Il s’approcha de Jésus pour l’embrasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Judas, c’est par un baiser que tu trahis le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'En voyant ce qui allait se passer, les compagnons de Jésus lui demandèrent : Maître, devons-nous frapper avec nos épées ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Et, immédiatement, l’un d’eux frappa le serviteur du grand-prêtre et lui emporta l’oreille droite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Mais Jésus les retint en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laissez faire, même ceci
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: laissez, tenez-vous-en là.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '!'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis il toucha l’oreille du blessé et le guérit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il se tourna ensuite vers les chefs des prêtres, les chefs des gardes du Temple et les responsables du peuple qui avaient accompagné cette troupe pour le prendre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Me prenez-vous pour un bandit pour que vous soyez venus avec épées et gourdins ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’étais chaque jour avec vous dans la cour du Temple, et personne n’a mis la main sur moi ; mais maintenant c’est votre heure et les ténèbres vont exercer leur pouvoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre renie son Maître
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.57-58 ; Mc 14.53-54 ; Jn 18.15-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Alors ils se saisirent de lui et le conduisirent dans le palais du grand-prêtre. Pierre suivait à distance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Au milieu de la cour, on avait allumé un feu et les gens étaient assis autour. Pierre s’assit au milieu du groupe.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.69-75 ; Mc 14.66-72 ; Jn 18.17-18, 25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Une servante, en le voyant là près du feu, l’observa à la clarté de la flamme et dit : En voilà un qui était aussi avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Mais Pierre le nia en disant : Mais non, je ne connais pas cet homme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Peu après, quelqu’un d’autre, en apercevant Pierre, l’interpella : Toi aussi, tu fais partie de ces gens !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mais non, déclara Pierre, je n’en suis pas !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Environ une heure plus tard, un autre encore soutint avec insistance : C’est sûr, cet homme-là était aussi avec lui ! D’ailleurs, c’est un Galiléen !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: – Mais non, je ne sais pas ce que tu veux dire, s’écria Pierre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Au même instant, alors qu’il était encore en train de parler, le coq se mit à chanter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Le Seigneur se retourna et posa son regard sur Pierre. Alors Pierre se souvint de ce que le Seigneur lui avait dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Avant que le coq chante aujourd’hui, tu m’auras renié trois fois ! »
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Il se glissa dehors et se mit à pleurer amèrement.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.67-68 ; Mc 14.65)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Les hommes qui gardaient Jésus se moquaient de lui et le frappaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ils lui couvraient le visage et criaient : Hé ! Fais le prophète ! Dis-nous qui te frappe !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Et ils l’accablaient d’injures.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le Grand-Conseil
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.59-65 ; 27.1 ; Mc 14.55-64 ; 15.1 ; Jn 18.19-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Dès le point du jour, les responsables du peuple, les chefs des prêtres et les spécialistes de la Loi se réunirent et firent amener Jésus devant leur Grand-Conseil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'L’interrogatoire commença : Si tu es le Messie, déclare-le-nous.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je vous réponds, vous ne croirez pas,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et si je vous pose des questions, vous ne me répondrez pas.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais à partir de maintenant, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' siégera à la droite du Dieu tout-puissant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.69 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110.1 ; Dn 7.13.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Alors ils se mirent à crier tous ensemble : Tu es donc le Fils de Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Vous dites vous-mêmes que je le suis,
  - type: text
    text: ' répondit Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Là-dessus ils s’écrièrent : Qu’avons-nous encore besoin de témoignages ? Nous venons de l’entendre nous-mêmes de sa bouche.'
