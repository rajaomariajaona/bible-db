document_id: LUK.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'À Jérusalem : mort et résurrection de Jésus'
  - type: heading
    content: La trahison
  - type: heading
    content: (Mt 26.1-5, 14-16 ; Mc 14.1-2, 10-11 ; Jn 11.47-53)
  - type: text
    content: 'On était à quelques jours de la fête « des Pains sans levain », appelée la Pâque. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien, quand vous entrerez dans la ville, vous rencontrerez un homme portant une cruche d’eau. Suivez-le jusqu’à la maison où il entrera.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Et voici comment vous parlerez au maître de maison : « Le Maître te fait dire : Où est la pièce où je prendrai le repas de la Pâque avec mes disciples ? »'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Alors il vous montrera, à l’étage supérieur, une grande pièce aménagée ; c’est là que vous ferez les préparatifs.
  '13':
  - type: text
    content: Ils partirent donc, trouvèrent tout comme Jésus le leur avait dit et préparèrent le repas de la Pâque.
  - type: heading
    content: (Mt 26.26-29 ; Mc 14.22-25 ; voir 1 Co 11.23-25)
  '14':
  - type: text
    content: 'Quand ce fut l’heure, Jésus se mit à table, avec les apôtres. '
  '15':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: J’ai vivement désiré célébrer cette Pâque avec vous avant de souffrir.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'En effet, je vous le déclare, je ne la mangerai plus jusqu’au jour où tout ce qu’elle signifie sera accompli dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: .
  '17':
  - type: text
    content: 'Puis il prit une coupe, prononça la prière de reconnaissance et dit : '
  - type: text
    content: Prenez cette coupe et partagez-la entre vous,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'car, je vous le déclare : dorénavant, je ne boirai plus du fruit de la vigne jusqu’à ce que le royaume de Dieu vienne.'
  '19':
  - type: text
    content: 'Ensuite il prit du pain, remercia Dieu, le partagea en morceaux qu’il leur donna en disant : '
  - type: text
    content: Ceci est mon corps
  - type: text
    content: ' ['
  - type: text
    content: qui est donné pour vous. Faites cela en souvenir de moi.
  '2':
  - type: text
    content: Les chefs des prêtres et les spécialistes de la Loi cherchaient un moyen de supprimer Jésus, mais ils avaient peur de la réaction du peuple.
  '20':
  - type: text
    content: 'Après le repas, il fit de même pour la coupe, en disant : '
  - type: text
    content: 'Ceci est la coupe de la nouvelle '
  - type: text
    content: alliance
  - type: text
    content: ' conclue par mon sang qui va être versé pour vous…'
  - type: note
    content: Les mots entre crochets sont absents de certains manuscrits.
  - type: text
    content: ' '
  - type: text
    content: .
  - type: text
    content: ' ]'
  - type: heading
    content: (Mt 26.20-25 ; Mc 14.17-21)
  '21':
  - type: text
    content: ' '
  - type: text
    content: D’ailleurs, voici, celui qui va me trahir est ici, à table avec moi.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Certes, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' s’en va selon ce que Dieu a décidé, mais malheur à l’homme par qui il est trahi !'
  '23':
  - type: text
    content: Alors les disciples se demandèrent les uns aux autres lequel d’entre eux allait faire cela.
  - type: heading
    content: Grandeur et service
  - type: heading
    content: (Mt 20.25-28 ; Mc 10.42-45)
  '24':
  - type: text
    content: 'Les disciples eurent une vive discussion : il s’agissait de savoir lequel d’entre eux devait être considéré comme le plus grand.'
  '25':
  - type: text
    content: 'Jésus intervint : '
  - type: text
    content: Les rois des nations,
  - type: text
    content: ' dit-il, '
  - type: text
    content: dominent leurs peuples, et ceux qui exercent l’autorité sur elles se font appeler leurs « bienfaiteurs
  - type: note
    content: 'Le titre de bienfaiteur (grec : Evergète) était porté par divers rois de l’Antiquité.'
  - type: text
    content: ».
  - type: text
    content: ' '
  '26':
  - type: text
    content: Il ne faut pas que vous agissiez ainsi. Au contraire, que le plus grand parmi vous soit comme le plus jeune, et que celui qui gouverne soit comme le serviteur.
  - type: text
    content: ' '
  '27':
  - type: text
    content: A votre avis, qui est le plus grand ? Celui qui est assis à table, ou celui qui sert ? N’est-ce pas celui qui est assis à table ? Eh bien, moi, au milieu de vous, je suis comme le serviteur…
  - type: heading
    content: (Mt 19.28)
  '28':
  - type: text
    content: ' '
  - type: text
    content: Vous êtes restés fidèlement avec moi au cours de mes épreuves.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'C’est pourquoi, comme mon Père m’a donné le '
  - type: text
    content: royaume
  - type: text
    content: ', je vous le donne, à mon tour :'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'C’est alors que Satan entra dans le cœur de Judas surnommé l’Iscariot, l’un des Douze. '
  '30':
  - type: text
    content: vous mangerez et vous boirez à ma table, dans mon royaume, et vous siégerez sur des trônes pour gouverner les douze tribus d’
  - type: text
    content: Israël
  - type: text
    content: .
  - type: heading
    content: Jésus annonce le reniement de Pierre
  - type: heading
    content: (Mt 26.31-35 ; Mc 14.27-31 ; Jn 13.36-38)
  '31':
  - type: text
    content: ' '
  - type: text
    content: Simon
  - type: text
    content: ', Simon ! fais attention : '
  - type: text
    content: Satan
  - type: text
    content: ' vous a réclamés pour vous passer tous au crible, comme on secoue le blé pour le séparer de la bale.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Mais moi, j’ai prié pour toi, pour que la foi ne vienne pas à te manquer. Et toi, le jour où tu seras revenu à moi, fortifie tes frères.
  '33':
  - type: text
    content: – Seigneur, lui dit Simon, je suis prêt, s’il le faut, à aller en prison avec toi, ou même à mourir !
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Pierre,
  - type: text
    content: ' reprit Jésus, '
  - type: text
    content: 'je te l’assure : aujourd’hui même, avant que le coq chante, tu auras, par trois fois, nié de me connaître.'
  - type: heading
    content: Sur le mont des Oliviers
  '35':
  - type: text
    content: 'Puis, s’adressant à l’ensemble des disciples, il continua : '
  - type: text
    content: Quand je vous ai envoyés sans bourse, ni sac de voyage, ni sandales, avez-vous manqué de quoi que ce soit ?
  - type: text
    content: – De rien, dirent-ils.
  '36':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien maintenant, poursuivit-il, si vous avez une bourse, prenez-la ; de même, si vous avez un sac, prenez-le, et si vous n’avez pas d’épée, vendez votre manteau pour en acheter une.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Car il est écrit : '
  - type: text
    content: Il a été mis au nombre des criminels
  - type: note
    content: Es 53.12.
  - type: text
    content: ', et cette parole doit s’accomplir pour moi. Car tout ce qui a été écrit de moi va s’accomplir.'
  '38':
  - type: text
    content: – Seigneur, lui dirent-ils, voilà justement deux épées.
  - type: text
    content: – Cela suffit !
  - type: text
    content: ' leur répondit-il.'
  - type: heading
    content: (Mt 26.36-45 ; Mc 14.32-41)
  '39':
  - type: text
    content: 'Alors il sortit et se dirigea, comme d’habitude, vers le mont des Oliviers. Ses disciples s’y rendirent aussi avec lui. '
  '4':
  - type: text
    content: Judas alla trouver les chefs des prêtres et les officiers de la garde du Temple
  - type: note
    content: Il s’agit des gardes chargés de la police du Temple (voir v. 52).
  - type: text
    content: ' pour s’entendre avec eux sur la manière dont il leur livrerait Jésus. '
  '40':
  - type: text
    content: 'Quand il fut arrivé, il leur dit : '
  - type: text
    content: Priez pour ne pas céder à la tentation
  - type: note
    content: 'Autre traduction : pour ne pas entrer en tentation.'
  - type: text
    content: .
  '41':
  - type: text
    content: 'Puis il se retira à la distance d’un jet de pierre, se mit à genoux et pria ainsi : '
  '42':
  - type: text
    content: O Père, si tu le veux, écarte de moi cette coupe
  - type: note
    content: Voir note Mt 26.39.
  - type: text
    content: '! Toutefois, que ta volonté soit faite, et non la mienne.'
  - type: text
    content: '['
  '43':
  - type: text
    content: 'Un ange venu du ciel lui apparut et le fortifia. '
  '44':
  - type: text
    content: L’angoisse le saisit, sa prière se fit de plus en plus pressante, sa sueur devint comme des gouttes de sang qui tombaient à terre
  - type: note
    content: Les mots entre crochets sont absents de certains manuscrits.
  - type: text
    content: .]
  '45':
  - type: text
    content: Après avoir ainsi prié, il se releva et s’approcha de ses disciples. Il les trouva endormis, tant ils étaient accablés de tristesse.
  '46':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi dormez-vous ?
  - type: text
    content: ' leur dit-il. '
  - type: text
    content: Debout ! Et priez pour ne pas céder à la tentation
  - type: note
    content: Voir 22.40 et note.
  - type: text
    content: .
  - type: heading
    content: L’arrestation de Jésus
  - type: heading
    content: (Mt 26.47-55 ; Mc 14.43-49 ; Jn 18.2-11)
  '47':
  - type: text
    content: 'Il n’avait pas fini de parler, quand toute une troupe surgit. A sa tête marchait le nommé Judas, l’un des Douze. Il s’approcha de Jésus pour l’embrasser. '
  '48':
  - type: text
    content: 'Mais Jésus lui dit : '
  - type: text
    content: 'Judas, c’est par un baiser que tu trahis le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: '  !'
  '49':
  - type: text
    content: 'En voyant ce qui allait se passer, les compagnons de Jésus lui demandèrent : Maître, devons-nous frapper avec nos épées ?'
  '5':
  - type: text
    content: 'Ils en furent tout réjouis et convinrent de lui donner de l’argent. '
  '50':
  - type: text
    content: 'Et, immédiatement, l’un d’eux frappa le serviteur du grand-prêtre et lui emporta l’oreille droite. '
  '51':
  - type: text
    content: 'Mais Jésus les retint en disant : '
  - type: text
    content: Laissez faire, même ceci
  - type: note
    content: 'Autre traduction : laissez, tenez-vous-en là.'
  - type: text
    content: '!'
  - type: text
    content: 'Puis il toucha l’oreille du blessé et le guérit. '
  '52':
  - type: text
    content: Il se tourna ensuite vers les chefs des prêtres, les chefs des gardes du Temple et les responsables du peuple qui avaient accompagné cette troupe pour le prendre.
  - type: text
    content: – Me prenez-vous pour un bandit pour que vous soyez venus avec épées et gourdins ?
  - type: text
    content: ' '
  '53':
  - type: text
    content: J’étais chaque jour avec vous dans la cour du Temple, et personne n’a mis la main sur moi ; mais maintenant c’est votre heure et les ténèbres vont exercer leur pouvoir.
  - type: heading
    content: Pierre renie son Maître
  - type: heading
    content: (Mt 26.57-58 ; Mc 14.53-54 ; Jn 18.15-16)
  '54':
  - type: text
    content: 'Alors ils se saisirent de lui et le conduisirent dans le palais du grand-prêtre. Pierre suivait à distance. '
  '55':
  - type: text
    content: Au milieu de la cour, on avait allumé un feu et les gens étaient assis autour. Pierre s’assit au milieu du groupe.
  - type: heading
    content: (Mt 26.69-75 ; Mc 14.66-72 ; Jn 18.17-18, 25-27)
  '56':
  - type: text
    content: 'Une servante, en le voyant là près du feu, l’observa à la clarté de la flamme et dit : En voilà un qui était aussi avec lui.'
  '57':
  - type: text
    content: 'Mais Pierre le nia en disant : Mais non, je ne connais pas cet homme.'
  '58':
  - type: text
    content: 'Peu après, quelqu’un d’autre, en apercevant Pierre, l’interpella : Toi aussi, tu fais partie de ces gens !'
  - type: text
    content: – Mais non, déclara Pierre, je n’en suis pas !
  '59':
  - type: text
    content: 'Environ une heure plus tard, un autre encore soutint avec insistance : C’est sûr, cet homme-là était aussi avec lui ! D’ailleurs, c’est un Galiléen !'
  '6':
  - type: text
    content: Il accepta et, dès lors, il chercha une occasion favorable pour leur livrer Jésus à l’insu de la foule.
  - type: heading
    content: Jésus célèbre la Pâque avec ses disciples
  - type: heading
    content: (Mt 26.17-19 ; Mc 14.12-16)
  '60':
  - type: text
    content: – Mais non, je ne sais pas ce que tu veux dire, s’écria Pierre.
  - type: text
    content: 'Au même instant, alors qu’il était encore en train de parler, le coq se mit à chanter. '
  '61':
  - type: text
    content: 'Le Seigneur se retourna et posa son regard sur Pierre. Alors Pierre se souvint de ce que le Seigneur lui avait dit : '
  - type: text
    content: « Avant que le coq chante aujourd’hui, tu m’auras renié trois fois ! »
  - type: text
    content: ' '
  '62':
  - type: text
    content: Il se glissa dehors et se mit à pleurer amèrement.
  - type: heading
    content: (Mt 26.67-68 ; Mc 14.65)
  '63':
  - type: text
    content: 'Les hommes qui gardaient Jésus se moquaient de lui et le frappaient. '
  '64':
  - type: text
    content: 'Ils lui couvraient le visage et criaient : Hé ! Fais le prophète ! Dis-nous qui te frappe !'
  '65':
  - type: text
    content: Et ils l’accablaient d’injures.
  - type: heading
    content: Jésus devant le Grand-Conseil
  - type: heading
    content: (Mt 26.59-65 ; 27.1 ; Mc 14.55-64 ; 15.1 ; Jn 18.19-24)
  '66':
  - type: text
    content: 'Dès le point du jour, les responsables du peuple, les chefs des prêtres et les spécialistes de la Loi se réunirent et firent amener Jésus devant leur Grand-Conseil. '
  '67':
  - type: text
    content: 'L’interrogatoire commença : Si tu es le Messie, déclare-le-nous.'
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Si je vous réponds, vous ne croirez pas,
  - type: text
    content: ' '
  '68':
  - type: text
    content: et si je vous pose des questions, vous ne me répondrez pas.
  - type: text
    content: ' '
  '69':
  - type: text
    content: 'Mais à partir de maintenant, '
  - type: text
    content: 'le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' siégera à la droite du Dieu tout-puissant'
  - type: note
    content: Ps 110.1 ; Dn 7.13.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Le jour de la fête des Pains sans levain, où l’on devait tuer l’agneau de la Pâque, arriva. '
  '70':
  - type: text
    content: 'Alors ils se mirent à crier tous ensemble : Tu es donc le Fils de Dieu !'
  - type: text
    content: – Vous dites vous-mêmes que je le suis,
  - type: text
    content: ' répondit Jésus.'
  '71':
  - type: text
    content: 'Là-dessus ils s’écrièrent : Qu’avons-nous encore besoin de témoignages ? Nous venons de l’entendre nous-mêmes de sa bouche.'
  '8':
  - type: text
    content: 'Jésus envoya Pierre et Jean en leur disant : '
  - type: text
    content: Allez nous préparer le repas de la Pâque.
  '9':
  - type: text
    content: – Où veux-tu que nous le préparions ? lui demandèrent-ils.
