  '1':
  - type: text
    content: Introduction
  - type: text
    content: En 539 avant Jésus-Christ, comme l’avaient annoncé les prophètes Esaïe et Jérémie, Babylone est prise par le roi des Mèdes et des Perses, Cyrus. Celui-ci, par un édit, permet alors aux Judéens exilés en Babylonie de rentrer dans leur pays et de reconstruire le temple de l’Eternel. Quelques dizaines de milliers d’entre eux retournent en Juda sous la conduite de Zorobabel – qui deviendra le haut-commissaire de la Judée pour l’Empire perse – et du grand-prêtre Josué (Esd 1 et 2). Là, en 537, quelques mois après leur retour, ils rétablissent l’autel de l’Eternel pour lui offrir des holocaustes (Esd 3.1-5), puis ils entreprennent de rebâtir le Temple. En 536, les fondations sont posées (Esd 3.6-13). Mais les populations voisines découragent les Judéens et les travaux sont interrompus (Esd 4.1-5, 24).
  - type: text
    content: En 522, Darius I
  - type: text
    content: er
  - type: text
    content: ' Hystaspe devient empereur de Perse. Il doit faire face à plusieurs révoltes et n’achève la pacification de son empire qu’en 520. C’est à la fin de cette période troublée qu’Aggée, puis Zacharie, interviennent en Juda pour appeler le peuple à rouvrir le chantier du Temple (Esd 5.1-2 ; 6.14). Le peuple se met au travail. Les chefs de la province de l’ouest de l’Euphrate s’en inquiètent et envoient un rapport à Darius. Mais les responsables de Juda justifient les travaux en s’appuyant sur l’édit de Cyrus de 538 et Darius autorise la poursuite de la reconstruction du Temple, qui sera terminée en 516 (Esd 5 et 6).'
  - type: text
    content: 'L’Ecriture ne donne aucun renseignement sur le prophète Aggée lui-même. Cependant, les quatre proclamations qui composent son livre sont toutes datées avec précision : la première d’août, la deuxième d’octobre et les deux dernières de décembre 520 (1.1 ; 2.1, 10, 20).'
  - type: text
    content: La prophétie d’Aggée porte essentiellement sur la nécessité de reconstruire le temple de l’Eternel après une interruption des travaux d’une quinzaine d’années. Dans un premier temps, le prophète dénonce la négligence des Judéens qui se soucient de leurs propres affaires et de leurs propres demeures, et délaissent le Temple en ruine. C’est à cause de cette attitude coupable que l’Eternel a envoyé la sécheresse dans le pays (1.1-11). La décision de reprendre les travaux sera récompensée par la fin de la sécheresse et la bénédiction (2.10-19). Cependant, la vision des choses d’Aggée ne se limite pas à sa seule époque. Il entrevoit, en effet, un temps où l’Eternel ébranlera une fois encore le ciel et la terre (2.6, 21). En ce temps-là, les royaumes de ce monde seront renversés (2.22), le Temple connaîtra une gloire plus grande encore que celle du temple construit par Salomon (2.8-9) et le Messie, appartenant à la dynastie davidique – dynastie représentée par Zorobabel (1 Ch 3.18-21) et dont le prophète annonce la pérennité (Ag 2.21-23) – inaugurera un règne de paix (2.9, 23). L’auteur de la lettre aux Hébreux, dans le Nouveau Testament, citera la prophétie d’Aggée sur l’ébranlement futur de la terre et du ciel qui annonce la venue du « royaume inébranlable » que reçoivent ceux qui appartiennent à Jésus-Christ (Hé 12.26-28).
