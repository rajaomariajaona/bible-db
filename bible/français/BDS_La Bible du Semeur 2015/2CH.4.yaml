document_id: 2CH.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’autel et la grande cuve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salomon fit fabriquer un autel de bronze de dix mètres sur dix et cinq mètres de haut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 27.1-2
        - type: text
          text: . Cet autel était quatre fois plus long, quatre fois plus large et trois fois plus haut que celui du tabernacle de Moïse.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 7.23-26)
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La grande cuve fut placée du côté droit du Temple, vers l’angle sud-est. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Houram fabriqua les chaudrons, les pelles et les coupes à aspersion.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Récapitulation des objets fabriqués pour le Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Houram termina ainsi le travail que le roi Salomon lui avait confié dans le temple de Dieu : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'les deux colonnes avec les chapiteaux évasés qui les surmontaient, les deux treillis pour recouvrir les évasements de ces chapiteaux, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'les quatre cents grenades accrochées aux treillis – deux rangées de grenades par treillis – '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'les dix chariots et les dix bassins placés dessus, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'la grande cuve, unique en son genre, et les douze bœufs qui la supportaient, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'les chaudrons, les pelles et les crochets à viande. Houram-Abi avait fabriqué en bronze poli, pour Salomon, tous les objets destinés au temple de l’Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi les fit fondre dans la plaine du Jourdain, dans des couches d’argile, entre Soukkoth et Tserédata. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Salomon fit fabriquer tous ces objets en si grande quantité qu’on ne pouvait évaluer le poids de bronze utilisé.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il fit encore fabriquer tous les autres objets destinés au temple de Dieu : l’autel des parfums en or, les tables sur lesquelles on plaçait les pains exposés devant l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 24.5-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis il fit faire la grande cuve ronde en métal fondu. Elle mesurait cinq mètres de diamètre, deux mètres cinquante de hauteur, un cordeau de quinze mètres mesurait sa circonférence. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'les chandeliers d’or fin avec leurs lampes, que l’on devait allumer selon la règle devant la salle du fond, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'avec leurs fleurons, leurs lampes et les mouchettes en or, en or très pur, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: les couteaux, les calices, les coupes et les brasiers d’or fin, ainsi que les gonds en or pour les portes de l’intérieur du Temple, à l’entrée du lieu très saint, et pour les portes de la grande salle, à l’entrée du Temple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Au-dessous d’elle, sur tout le pourtour, se trouvaient deux rangées de représentations de bœufs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.24
        - type: text
          text: ', il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coloquintes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En hébreu, les deux mots se ressemblent, ce qui expliquerait une erreur de copiste dans l’un des deux textes.
      marker-yv: yv-n
    - type: text
      text: ' coulés d’une seule pièce avec la cuve. Il y en avait dix par demi-mètre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La cuve elle-même reposait sur douze bœufs de bronze ayant leurs têtes tournées trois par trois vers le nord, l’ouest, le sud et l’est, alors que la partie postérieure de leur corps était tournée vers l’intérieur et portait la cuve. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La paroi de la cuve avait huit centimètres d’épaisseur et son rebord était façonné comme celui d’une coupe en forme de pétale de lis. Elle pouvait contenir environ quarante mille litres d’eau.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Salomon fit encore fabriquer dix bassins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 30.17-21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; il les fit disposer cinq à droite et cinq à gauche du Temple pour les lavages. Ils servaient à nettoyer les ustensiles destinés à offrir les holocaustes. La grande cuve servait aux purifications des prêtres.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les accessoires du culte
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Salomon fit fabriquer les dix chandeliers d’or selon le modèle prescrit, puis on les plaça dans la grande salle du Temple, cinq à droite et cinq à gauche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.31-40
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il fit faire dix tables que l’on disposa également dans la grande salle : cinq à droite et cinq à gauche. Il fit aussi façonner cent coupes d’aspersion en or'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.23-30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il fit aménager le parvis des prêtres et la grande cour, il fit fabriquer les portes de la cour et revêtir leurs battants de bronze.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 7.38-51)
    marker-yv: yv-h
