document_id: 2CH.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel et la grande cuve
  - type: text
    content: Salomon fit fabriquer un autel de bronze de dix mètres sur dix et cinq mètres de haut
  - type: note
    content: Voir Ex 27.1-2. Cet autel était quatre fois plus long, quatre fois plus large et trois fois plus haut que celui du tabernacle de Moïse.
  - type: text
    content: .
  - type: heading
    content: (1 R 7.23-26)
  '10':
  - type: text
    content: 'La grande cuve fut placée du côté droit du Temple, vers l’angle sud-est. '
  '11':
  - type: text
    content: Houram fabriqua les chaudrons, les pelles et les coupes à aspersion.
  - type: heading
    content: Récapitulation des objets fabriqués pour le Temple
  - type: text
    content: 'Houram termina ainsi le travail que le roi Salomon lui avait confié dans le temple de Dieu : '
  '12':
  - type: text
    content: 'les deux colonnes avec les chapiteaux évasés qui les surmontaient, les deux treillis pour recouvrir les évasements de ces chapiteaux, '
  '13':
  - type: text
    content: 'les quatre cents grenades accrochées aux treillis – deux rangées de grenades par treillis – '
  '14':
  - type: text
    content: 'les dix chariots et les dix bassins placés dessus, '
  '15':
  - type: text
    content: 'la grande cuve, unique en son genre, et les douze bœufs qui la supportaient, '
  '16':
  - type: text
    content: 'les chaudrons, les pelles et les crochets à viande. Houram-Abi avait fabriqué en bronze poli, pour Salomon, tous les objets destinés au temple de l’Eternel. '
  '17':
  - type: text
    content: 'Le roi les fit fondre dans la plaine du Jourdain, dans des couches d’argile, entre Soukkoth et Tserédata. '
  '18':
  - type: text
    content: Salomon fit fabriquer tous ces objets en si grande quantité qu’on ne pouvait évaluer le poids de bronze utilisé.
  '19':
  - type: text
    content: 'Il fit encore fabriquer tous les autres objets destinés au temple de Dieu : l’autel des parfums en or, les tables sur lesquelles on plaçait les pains exposés devant l’Eternel'
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: ', '
  '2':
  - type: text
    content: 'Puis il fit faire la grande cuve ronde en métal fondu. Elle mesurait cinq mètres de diamètre, deux mètres cinquante de hauteur, un cordeau de quinze mètres mesurait sa circonférence. '
  '20':
  - type: text
    content: 'les chandeliers d’or fin avec leurs lampes, que l’on devait allumer selon la règle devant la salle du fond, '
  '21':
  - type: text
    content: 'avec leurs fleurons, leurs lampes et les mouchettes en or, en or très pur, '
  '22':
  - type: text
    content: les couteaux, les calices, les coupes et les brasiers d’or fin, ainsi que les gonds en or pour les portes de l’intérieur du Temple, à l’entrée du lieu très saint, et pour les portes de la grande salle, à l’entrée du Temple.
  '3':
  - type: text
    content: Au-dessous d’elle, sur tout le pourtour, se trouvaient deux rangées de représentations de bœufs
  - type: note
    content: Dans 1 R 7.24, il s’agit de coloquintes. En hébreu, les deux mots se ressemblent, ce qui expliquerait une erreur de copiste dans l’un des deux textes.
  - type: text
    content: ' coulés d’une seule pièce avec la cuve. Il y en avait dix par demi-mètre. '
  '4':
  - type: text
    content: 'La cuve elle-même reposait sur douze bœufs de bronze ayant leurs têtes tournées trois par trois vers le nord, l’ouest, le sud et l’est, alors que la partie postérieure de leur corps était tournée vers l’intérieur et portait la cuve. '
  '5':
  - type: text
    content: La paroi de la cuve avait huit centimètres d’épaisseur et son rebord était façonné comme celui d’une coupe en forme de pétale de lis. Elle pouvait contenir environ quarante mille litres d’eau.
  '6':
  - type: text
    content: Salomon fit encore fabriquer dix bassins
  - type: note
    content: Voir Ex 30.17-21.
  - type: text
    content: '  ; il les fit disposer cinq à droite et cinq à gauche du Temple pour les lavages. Ils servaient à nettoyer les ustensiles destinés à offrir les holocaustes. La grande cuve servait aux purifications des prêtres.'
  - type: heading
    content: Les accessoires du culte
  '7':
  - type: text
    content: Salomon fit fabriquer les dix chandeliers d’or selon le modèle prescrit, puis on les plaça dans la grande salle du Temple, cinq à droite et cinq à gauche
  - type: note
    content: Voir Ex 25.31-40.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Il fit faire dix tables que l’on disposa également dans la grande salle : cinq à droite et cinq à gauche. Il fit aussi façonner cent coupes d’aspersion en or'
  - type: note
    content: Voir Ex 25.23-30.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Il fit aménager le parvis des prêtres et la grande cour, il fit fabriquer les portes de la cour et revêtir leurs battants de bronze.
  - type: heading
    content: (1 R 7.38-51)
