document_id: NUM.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Miryam et Aaron critiquent Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse avait épousé une femme koushite. Miryam et Aaron se mirent à le critiquer à cause de cela. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A peine la nuée avait-elle quitté la tente, que Miryam se trouva couverte d’une lèpre blanche comme la neige. Quand Aaron se tourna vers Miryam, il vit qu’elle était lépreuse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il dit à Moïse : De grâce, mon seigneur, ne nous tiens pas rigueur du péché que nous avons commis dans un moment de folie ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ah ! que notre sœur ne soit pas comme l’enfant mort-né dont la moitié du corps se trouve déjà en état de putréfaction au moment de sa naissance.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse implora l’Eternel : O Dieu, je t’en prie, guéris-la !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’Eternel lui répondit : Si son père lui avait craché au visage, n’en porterait-elle pas la honte pendant sept jours ? Qu’elle soit exclue du camp pendant sept jours, après quoi elle sera réadmise parmi vous.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miryam fut donc exclue du camp pour sept jours. Et le peuple ne leva le camp que lorsqu’elle y eut été réintégrée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, ils quittèrent Hatséroth et campèrent dans le désert de Parân.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils dirent : Est-ce seulement par l’intermédiaire de Moïse que l’Eternel a parlé ? N’est-ce pas aussi par notre intermédiaire'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Est-ce seulement à Moïse que l’Eternel a parlé ? N’est-ce pas aussi à nous ?
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel entendit cela. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, Moïse était un homme très humble, plus que tout autre homme sur la terre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel ordonna soudainement à Moïse, à Aaron et à Miryam : Rendez-vous tous les trois à la tente de la Rencontre !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils y allèrent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel descendit dans la colonne de nuée et se tint à l’entrée de la tente. Il appela Aaron et Miryam et tous deux s’avancèrent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez bien ce que j’ai à vous dire !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il se trouve parmi vous ╵un prophète de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est dans une vision ╵qu’à lui je me révélerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou dans un rêve ╵que je lui parlerai.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il en va différemment ╵avec mon serviteur Moïse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est fidèle ╵dans toute ma maison
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 3.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est de vive voix ╵que je lui parle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de façon claire ╵et non dans un langage énigmatique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il voit l’Eternel ╵de manière visible.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment donc n’avez-vous pas craint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de critiquer ╵mon serviteur Moïse ?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel se mit en colère contre eux, et il se retira. '
