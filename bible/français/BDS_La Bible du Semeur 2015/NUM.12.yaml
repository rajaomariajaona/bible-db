document_id: NUM.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Miryam et Aaron critiquent Moïse
  - type: text
    content: 'Moïse avait épousé une femme koushite. Miryam et Aaron se mirent à le critiquer à cause de cela. '
  '10':
  - type: text
    content: 'A peine la nuée avait-elle quitté la tente, que Miryam se trouva couverte d’une lèpre blanche comme la neige. Quand Aaron se tourna vers Miryam, il vit qu’elle était lépreuse. '
  '11':
  - type: text
    content: 'Alors il dit à Moïse : De grâce, mon seigneur, ne nous tiens pas rigueur du péché que nous avons commis dans un moment de folie ! '
  '12':
  - type: text
    content: Ah ! que notre sœur ne soit pas comme l’enfant mort-né dont la moitié du corps se trouve déjà en état de putréfaction au moment de sa naissance.
  '13':
  - type: text
    content: 'Moïse implora l’Eternel : O Dieu, je t’en prie, guéris-la !'
  '14':
  - type: text
    content: 'Mais l’Eternel lui répondit : Si son père lui avait craché au visage, n’en porterait-elle pas la honte pendant sept jours ? Qu’elle soit exclue du camp pendant sept jours, après quoi elle sera réadmise parmi vous.'
  '15':
  - type: text
    content: 'Miryam fut donc exclue du camp pour sept jours. Et le peuple ne leva le camp que lorsqu’elle y eut été réintégrée. '
  '16':
  - type: text
    content: Après cela, ils quittèrent Hatséroth et campèrent dans le désert de Parân.
  '2':
  - type: text
    content: 'Et ils dirent : Est-ce seulement par l’intermédiaire de Moïse que l’Eternel a parlé ? N’est-ce pas aussi par notre intermédiaire'
  - type: note
    content: 'Autre traduction : Est-ce seulement à Moïse que l’Eternel a parlé ? N’est-ce pas aussi à nous ?'
  - type: text
    content: '  ?'
  - type: text
    content: 'L’Eternel entendit cela. '
  '3':
  - type: text
    content: Or, Moïse était un homme très humble, plus que tout autre homme sur la terre.
  '4':
  - type: text
    content: 'Alors l’Eternel ordonna soudainement à Moïse, à Aaron et à Miryam : Rendez-vous tous les trois à la tente de la Rencontre !'
  - type: text
    content: 'Ils y allèrent. '
  '5':
  - type: text
    content: 'L’Eternel descendit dans la colonne de nuée et se tint à l’entrée de la tente. Il appela Aaron et Miryam et tous deux s’avancèrent. '
  '6':
  - type: text
    content: 'Il dit :'
  - type: text
    content: Ecoutez bien ce que j’ai à vous dire !
  - type: text
    content: S’il se trouve parmi vous ╵un prophète de l’Eternel,
  - type: text
    content: c’est dans une vision ╵qu’à lui je me révélerai,
  - type: text
    content: ou dans un rêve ╵que je lui parlerai.
  '7':
  - type: text
    content: Mais il en va différemment ╵avec mon serviteur Moïse,
  - type: text
    content: qui est fidèle ╵dans toute ma maison
  - type: note
    content: Allusion en Hé 3.2.
  - type: text
    content: .
  '8':
  - type: text
    content: Car c’est de vive voix ╵que je lui parle,
  - type: text
    content: de façon claire ╵et non dans un langage énigmatique,
  - type: text
    content: et il voit l’Eternel ╵de manière visible.
  - type: text
    content: Comment donc n’avez-vous pas craint
  - type: text
    content: de critiquer ╵mon serviteur Moïse ?
  '9':
  - type: text
    content: 'L’Eternel se mit en colère contre eux, et il se retira. '
