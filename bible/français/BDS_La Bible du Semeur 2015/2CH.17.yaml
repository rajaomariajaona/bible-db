document_id: 2CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bon roi Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Son fils Josaphat lui succéda sur le trône
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Josaphat régna de 872 à 848 av. J.-C., y compris trois années de corégence avec son père Asa, de 872 à 869 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.31'
        metadata:
          usfm: 2CH.20.31
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Il développa ses forces pour tenir tête au royaume d’Israël : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: il installa des garnisons dans toutes les villes fortifiées de Juda et il établit des postes militaires à travers tout le pays de Juda, ainsi que dans les villes d’Ephraïm que son père Asa avait conquises
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15.8'
        metadata:
          usfm: 2CH.15.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Eternel fut avec Josaphat parce qu’il suivait, dans la première partie de sa vie, l’exemple laissé par son ancêtre David, et qu’il ne s’attacha pas aux Baals. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Au contraire, il s’attacha au Dieu de ses ancêtres et vécut selon ses commandements, contrairement à ce que l’on faisait en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aussi l’Eternel affermit-il son pouvoir royal et tout Juda lui apportait des présents. Il fut comblé de richesses et de gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il s’enhardit pour suivre les chemins prescrits par l’Eternel, de sorte qu’il supprima encore les hauts lieux et les poteaux sacrés d’Ashéra dans le pays de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La troisième année de son règne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A la fin de sa corégence avec son père Asa, en 869 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', il envoya dans les villes de Juda quelques-uns de ses hauts fonctionnaires, Ben-Haïl, Abdias, Zacharie, Netanéel et Michée, pour enseigner les habitants. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils étaient accompagnés des lévites Shemaya, Netania, Zebadia, Asaël, Shemiramoth, Jonathan, Adoniya, Tobiya et Tob-Adoniya ainsi que des prêtres Elishama et Yoram. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils enseignèrent donc en Juda, ayant avec eux le livre de la Loi de l’Eternel. Ils parcoururent toutes les villes de Juda pour enseigner le peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La puissance de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A cause de l’Eternel, une terreur s’empara de tous les royaumes environnant Juda, de sorte que personne n’osa faire la guerre à Josaphat. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Des Philistins lui apportaient des présents et un tribut en argent. Les nomades arabes lui apportaient aussi du petit bétail : 7 700 béliers et 7 700 boucs. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Josaphat devint de plus en plus puissant. Il construisit en Juda des citadelles et des villes-entrepôts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il disposait de provisions abondantes dans les villes judéennes, et des guerriers valeureux étaient stationnés à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ces derniers étaient répartis selon leurs groupes familiaux. Pour Juda, voici les chefs de « milliers » : le chef Adna, qui commandait 300 000 valeureux guerriers ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'à ses côtés se trouvait le chef Yohanân qui commandait 280 000 hommes ; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'à ses côtés, Amasia, fils de Zikri, qui s’était volontairement engagé pour l’Eternel et qui commandait 200 000 valeureux guerriers. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De Benjamin, il y avait : Elyada, un valeureux guerrier, qui commandait 200 000 hommes armés de l’arc et du bouclier ; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'à ses côtés Yehozabad qui commandait 180 000 hommes équipés pour la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous ceux-ci étaient au service du roi, auxquels il faut ajouter ceux que le roi avait mis en garnison dans les villes fortifiées sur tout le territoire de Juda.
