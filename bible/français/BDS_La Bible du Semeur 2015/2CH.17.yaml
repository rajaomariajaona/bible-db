document_id: 2CH.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bon roi Josaphat
  - type: text
    content: Son fils Josaphat lui succéda sur le trône
  - type: note
    content: Josaphat régna de 872 à 848 av. J.-C., y compris trois années de corégence avec son père Asa, de 872 à 869 av. J.-C. (voir 20.31).
  - type: text
    content: '. Il développa ses forces pour tenir tête au royaume d’Israël : '
  '10':
  - type: text
    content: 'A cause de l’Eternel, une terreur s’empara de tous les royaumes environnant Juda, de sorte que personne n’osa faire la guerre à Josaphat. '
  '11':
  - type: text
    content: 'Des Philistins lui apportaient des présents et un tribut en argent. Les nomades arabes lui apportaient aussi du petit bétail : 7 700 béliers et 7 700 boucs. '
  '12':
  - type: text
    content: Josaphat devint de plus en plus puissant. Il construisit en Juda des citadelles et des villes-entrepôts.
  '13':
  - type: text
    content: 'Il disposait de provisions abondantes dans les villes judéennes, et des guerriers valeureux étaient stationnés à Jérusalem. '
  '14':
  - type: text
    content: 'Ces derniers étaient répartis selon leurs groupes familiaux. Pour Juda, voici les chefs de « milliers » : le chef Adna, qui commandait 300 000 valeureux guerriers ; '
  '15':
  - type: text
    content: 'à ses côtés se trouvait le chef Yohanân qui commandait 280 000 hommes ; '
  '16':
  - type: text
    content: 'à ses côtés, Amasia, fils de Zikri, qui s’était volontairement engagé pour l’Eternel et qui commandait 200 000 valeureux guerriers. '
  '17':
  - type: text
    content: 'De Benjamin, il y avait : Elyada, un valeureux guerrier, qui commandait 200 000 hommes armés de l’arc et du bouclier ; '
  '18':
  - type: text
    content: 'à ses côtés Yehozabad qui commandait 180 000 hommes équipés pour la guerre. '
  '19':
  - type: text
    content: Tous ceux-ci étaient au service du roi, auxquels il faut ajouter ceux que le roi avait mis en garnison dans les villes fortifiées sur tout le territoire de Juda.
  '2':
  - type: text
    content: il installa des garnisons dans toutes les villes fortifiées de Juda et il établit des postes militaires à travers tout le pays de Juda, ainsi que dans les villes d’Ephraïm que son père Asa avait conquises
  - type: note
    content: Voir 15.8.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'L’Eternel fut avec Josaphat parce qu’il suivait, dans la première partie de sa vie, l’exemple laissé par son ancêtre David, et qu’il ne s’attacha pas aux Baals. '
  '4':
  - type: text
    content: 'Au contraire, il s’attacha au Dieu de ses ancêtres et vécut selon ses commandements, contrairement à ce que l’on faisait en Israël. '
  '5':
  - type: text
    content: 'Aussi l’Eternel affermit-il son pouvoir royal et tout Juda lui apportait des présents. Il fut comblé de richesses et de gloire. '
  '6':
  - type: text
    content: Il s’enhardit pour suivre les chemins prescrits par l’Eternel, de sorte qu’il supprima encore les hauts lieux et les poteaux sacrés d’Ashéra dans le pays de Juda.
  '7':
  - type: text
    content: La troisième année de son règne
  - type: note
    content: A la fin de sa corégence avec son père Asa, en 869 av. J.-C.
  - type: text
    content: ', il envoya dans les villes de Juda quelques-uns de ses hauts fonctionnaires, Ben-Haïl, Abdias, Zacharie, Netanéel et Michée, pour enseigner les habitants. '
  '8':
  - type: text
    content: 'Ils étaient accompagnés des lévites Shemaya, Netania, Zebadia, Asaël, Shemiramoth, Jonathan, Adoniya, Tobiya et Tob-Adoniya ainsi que des prêtres Elishama et Yoram. '
  '9':
  - type: text
    content: Ils enseignèrent donc en Juda, ayant avec eux le livre de la Loi de l’Eternel. Ils parcoururent toutes les villes de Juda pour enseigner le peuple.
  - type: heading
    content: La puissance de Josaphat
