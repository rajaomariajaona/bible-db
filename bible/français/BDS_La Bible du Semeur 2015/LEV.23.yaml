document_id: LEV.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La loi sur les fêtes
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '10':
  - type: text
    content: 'Dis aux Israélites : Quand vous serez dans le pays que je vais vous donner et que vous y ferez la moisson, vous apporterez au prêtre la première gerbe de votre récolte'
  - type: note
    content: Voir Ex 23.19 ; 34.26.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Le lendemain du sabbat, il fera devant moi le geste de présentation avec cette gerbe pour que vous obteniez ma faveur. '
  '12':
  - type: text
    content: 'Le jour où vous accomplirez ce geste avec la gerbe, vous m’offrirez en holocauste un agneau sans défaut, dans sa première année. '
  '13':
  - type: text
    content: Vous y adjoindrez une offrande de six kilogrammes de farine
  - type: note
    content: Il s’agit de deux dixièmes d’épha, c’est-à-dire environ sept litres.
  - type: text
    content: ' pétrie à l’huile, qui, consumée par le feu pour l’Eternel, aura une odeur apaisante, et une libation d’un litre et demi de vin'
  - type: note
    content: Il s’agit d’un quart de hîn. Le hîn contenait six litres.
  - type: text
    content: '. '
  '14':
  - type: text
    content: Avant ce jour où vous apporterez l’offrande à votre Dieu, vous ne mangerez ni pain, ni épis grillés ou grains nouveaux. C’est là une ordonnance en vigueur à perpétuité pour toutes les générations partout où vous habiterez.
  - type: heading
    content: La fête des SemainesAinsi nommée parce qu’elle tombe sept semaines après le premier dimanche tombant lors de la Pâque ou de la fête des Pains sans levain.
  '15':
  - type: text
    content: Vous compterez sept semaines entières à partir du lendemain du jour du sabbat, jour où vous aurez apporté la gerbe destinée à m’être présentée
  - type: note
    content: Pour les v. 15-21, voir Ex 23.16 ; 34.22 ; Nb 28.26 ; Dt 16.9-16.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Vous compterez cinquante jours jusqu’au lendemain du septième jour de sabbat et, ce jour-là, vous me présenterez une nouvelle offrande. '
  '17':
  - type: text
    content: 'Vous apporterez, des lieux où vous habiterez, deux pains pour le geste de présentation : chacun d’eux sera fait de six kilogrammes de fleur de farine cuits en pâte avec du levain. Ce sera une offrande de vos premières récoltes pour l’Eternel. '
  '18':
  - type: text
    content: 'Avec le pain vous offrirez aussi sept agneaux sans défaut, dans leur première année, un jeune taureau et deux béliers, qui me seront offerts en holocauste, accompagnés de leur offrande et de leur libation. Ce sera un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel. '
  '19':
  - type: text
    content: 'Vous offrirez aussi un bouc en sacrifice pour le péché et deux agneaux d’un an en sacrifice de communion. '
  '2':
  - type: text
    content: 'Parle aux Israélites et dis-leur : Voici les fêtes que vous devez célébrer pour le Seigneur et à l’occasion desquelles vous convoquerez le peuple pour qu’il me rende un culte.'
  - type: heading
    content: Le sabbat
  '20':
  - type: text
    content: 'Le prêtre fera avec le pain des premières récoltes le geste de présentation devant l’Eternel. Ils me seront consacrés avec les deux agneaux et reviendront au prêtre. '
  '21':
  - type: text
    content: Ce même jour, vous convoquerez le peuple pour qu’il me rende un culte. Vous n’accomplirez aucune des tâches de votre travail de la semaine ; c’est une ordonnance en vigueur à perpétuité et pour toutes les générations dans tous les lieux où vous habiterez.
  '22':
  - type: text
    content: Quand vous ferez la moisson dans votre pays, vous ne moissonnerez pas vos champs jusqu’au bord, et vous ne glanerez pas ce qui pourra rester de votre moisson ; vous laisserez cela au pauvre et à l’immigré. Je suis l’Eternel votre Dieu
  - type: note
    content: Voir Lv 19.9-10 ; Dt 24.19-22.
  - type: text
    content: .
  - type: heading
    content: La fête des Trompettes
  '23':
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '24':
  - type: text
    content: 'Parle aux Israélites, et dis-leur : Le premier jour du septième mois sera pour vous un grand jour de repos et de sonnerie de trompettes pour vous rappeler à mon souvenir, ainsi que d’un rassemblement cultuel'
  - type: note
    content: Pour les v. 24-25, voir Nb 29.1-6.
  - type: text
    content: '. '
  '25':
  - type: text
    content: Vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine, et vous offrirez à l’Eternel des sacrifices consumés par le feu.
  - type: heading
    content: Le jour des Expiations
  '26':
  - type: text
    content: 'L’Eternel parla encore à Moïse en ces termes : '
  '27':
  - type: text
    content: Le dixième jour de ce septième mois est le jour des Expiations
  - type: note
    content: Il s’agit du jour du Yom Kippour (pour les détails, voir chap. 16 ; Nb 29.7-11).
  - type: text
    content: '  ; ce sera un jour d’assemblée cultuelle, vous vous humilierez et vous offrirez à l’Eternel des sacrifices consumés par le feu. '
  '28':
  - type: text
    content: 'Vous ne ferez aucun travail ce jour-là, car c’est le jour des Expiations destiné à faire l’expiation pour vous devant l’Eternel votre Dieu. '
  '29':
  - type: text
    content: 'Toute personne qui ne s’humilierait pas ce jour-là sera exclue de son peuple. '
  '3':
  - type: text
    content: Durant six jours on fera son travail, mais le septième jour est un sabbat, un jour de repos ; il y aura une assemblée cultuelle et vous ne ferez aucun travail ce jour-là, c’est un sabbat en l’honneur de l’Eternel partout où vous habiterez
  - type: note
    content: Voir Gn 2.1-3 ; Ex 16.23-30 ; 20.8-11 ; 23.12 ; 31.12-17 ; 34.21 ; 35.2 ; Dt 5.12-14.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Et je ferai moi-même disparaître de mon peuple celui qui fera un travail quelconque ce jour-là. '
  '31':
  - type: text
    content: 'Vous ne ferez aucune sorte de travail. C’est une ordonnance en vigueur à perpétuité pour toutes les générations dans tous les lieux où vous habiterez. '
  '32':
  - type: text
    content: Ce sera pour vous un jour de repos complet, au cours duquel vous vous humilierez. Dès le soir du neuvième jour du mois jusqu’au lendemain soir, vous observerez ce repos.
  - type: heading
    content: La fête des Cabanes
  '33':
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '34':
  - type: text
    content: 'Parle aux Israélites, et dis-leur : Le quinzième jour de ce septième mois, aura lieu la fête des Cabanes ; on la célébrera durant sept jours en l’honneur de l’Eternel. '
  '35':
  - type: text
    content: 'Le premier jour, il y aura une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine. '
  '36':
  - type: text
    content: Pendant sept jours, vous offrirez à l’Eternel des sacrifices consumés par le feu
  - type: note
    content: Voir Nb 29.12-39.
  - type: text
    content: . Le huitième jour, vous aurez encore une assemblée cultuelle et vous m’offrirez des sacrifices consumés par le feu. C’est un jour de fête cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine.
  '37':
  - type: text
    content: 'Telles sont les fêtes à célébrer en l’honneur de l’Eternel, et pour lesquelles vous convoquerez le peuple pour qu’il rende un culte à l’Eternel et lui offre, en sacrifices consumés par le feu, les holocaustes et les offrandes, les sacrifices et les libations requis pour chaque jour. '
  '38':
  - type: text
    content: Ils viendront s’ajouter à ceux que vous offrirez lors des sabbats de l’Eternel, ainsi qu’à vos dons, et aux sacrifices que vous offrez à l’Eternel pour accomplir un vœu ou volontairement.
  '39':
  - type: text
    content: Le quinzième jour du septième mois quand vous aurez récolté tous les produits de vos terres, vous célébrerez une fête en l’honneur de l’Eternel pendant sept jours
  - type: note
    content: 'Cette fête des récoltes est identique à la fête des Cabanes (v. 34-36 : mêmes dates).'
  - type: text
    content: . Le premier et le huitième jour seront des jours de repos
  - type: note
    content: Pour les v. 39-43, voir Ex 23.16 ; 34.22 ; Nb 29.12 ; Dt 16.13-15.
  - type: text
    content: .
  '4':
  - type: text
    content: Voici les autres fêtes de l’Eternel pour lesquelles vous convoquerez le peuple pour qu’il me rende un culte aux dates fixées.
  - type: heading
    content: La Pâque et la fête des Pains sans levain
  '40':
  - type: text
    content: 'Le premier jour, vous prendrez du produit de vos arbres d’ornement, des branches de palmiers, des rameaux d’arbres touffus et de saules des rivières. Pendant sept jours, vous vous réjouirez devant moi, l’Eternel votre Dieu. '
  '41':
  - type: text
    content: 'Vous célébrerez cette fête en l’honneur de l’Eternel sept jours par an. C’est une ordonnance en vigueur à perpétuité, pour toutes les générations : vous la célébrerez le septième mois. '
  '42':
  - type: text
    content: 'Vous habiterez pendant sept jours dans des cabanes ; tous ceux qui seront nés en Israël logeront dans des cabanes '
  '43':
  - type: text
    content: pour que vos descendants sachent que j’ai fait habiter les Israélites sous des tentes
  - type: note
    content: En hébreu, un même terme signifie tantôt « cabanes » (v. 42), tantôt « tentes ».
  - type: text
    content: ' lorsque je les ai fait sortir d’Egypte. Je suis l’Eternel votre Dieu.'
  - type: heading
    content: Conclusion
  '44':
  - type: text
    content: Moïse transmit aux Israélites les instructions concernant les fêtes de l’Eternel.
  '5':
  - type: text
    content: Au soir du quatorzième jour du premier mois
  - type: note
    content: C’est-à-dire mars-avril (mois de Nisân).
  - type: text
    content: ', à la nuit tombante, c’est la Pâque de l’Eternel'
  - type: note
    content: Voir Ex 12.1-14 ; Nb 28.16 ; Dt 16.1-2.
  - type: text
    content: '  ; '
  '6':
  - type: text
    content: et le quinzième jour du mois c’est la fête des Pains sans levain
  - type: note
    content: Voir Ex 12.15-20 ; 23.15 ; 34.18 ; Nb 28.17-25 ; Dt 16.3-8.
  - type: text
    content: ' en l’honneur de l’Eternel ; pendant sept jours, vous mangerez des pains sans levain. '
  '7':
  - type: text
    content: Vous consacrerez le premier jour de cette fête à une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine
  - type: note
    content: Contrairement au jour du sabbat où aucun travail n’était autorisé, pas même la préparation d’un repas ou l’allumage d’un feu (Ex 35.2-3), l’interdiction ne porte ici que sur les tâches relatives au travail qu’on peut assimiler à une activité professionnelle. La préparation d’un repas, par exemple, est autorisée (voir Ex 12.6).
  - type: text
    content: '. '
  '8':
  - type: text
    content: Pendant sept jours, vous offrirez à l’Eternel des sacrifices consumés par le feu. Le septième jour, vous convoquerez le peuple pour qu’il se rassemble afin de me rendre un culte et vous n’accomplirez aucune des tâches de votre travail de la semaine.
  - type: heading
    content: La fête de la Première Gerbe
  '9':
  - type: text
    content: 'L’Eternel parla encore à Moïse en ces termes : '
