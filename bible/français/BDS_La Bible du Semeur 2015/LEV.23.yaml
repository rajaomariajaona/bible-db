document_id: LEV.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi sur les fêtes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux Israélites et dis-leur : Voici les fêtes que vous devez célébrer pour le Seigneur et à l’occasion desquelles vous convoquerez le peuple pour qu’il me rende un culte.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Durant six jours on fera son travail, mais le septième jour est un sabbat, un jour de repos ; il y aura une assemblée cultuelle et vous ne ferez aucun travail ce jour-là, c’est un sabbat en l’honneur de l’Eternel partout où vous habiterez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 2.1-3 ; Ex 16.23-30 ; 20.8-11 ; 23.12 ; 31.12-17 ; 34.21 ; 35.2 ; Dt 5.12-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici les autres fêtes de l’Eternel pour lesquelles vous convoquerez le peuple pour qu’il me rende un culte aux dates fixées.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La Pâque et la fête des Pains sans levain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Au soir du quatorzième jour du premier mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire mars-avril (mois de Nisân).
    marker-yv: yv-n
  - type: text
    text: ', à la nuit tombante, c’est la Pâque de l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 12.1-14 ; Nb 28.16 ; Dt 16.1-2.
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: et le quinzième jour du mois c’est la fête des Pains sans levain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 12.15-20 ; 23.15 ; 34.18 ; Nb 28.17-25 ; Dt 16.3-8.
    marker-yv: yv-n
  - type: text
    text: ' en l’honneur de l’Eternel ; pendant sept jours, vous mangerez des pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous consacrerez le premier jour de cette fête à une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Contrairement au jour du sabbat où aucun travail n’était autorisé, pas même la préparation d’un repas ou l’allumage d’un feu (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 35.2-3
        metadata:
          usfm: EXO.35.2+EXO.35.3
      - type: text
        text: '), l’interdiction ne porte ici que sur les tâches relatives au travail qu’on peut assimiler à une activité professionnelle. La préparation d’un repas, par exemple, est autorisée (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.6
        metadata:
          usfm: EXO.12.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pendant sept jours, vous offrirez à l’Eternel des sacrifices consumés par le feu. Le septième jour, vous convoquerez le peuple pour qu’il se rassemble afin de me rendre un culte et vous n’accomplirez aucune des tâches de votre travail de la semaine.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête de la Première Gerbe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel parla encore à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dis aux Israélites : Quand vous serez dans le pays que je vais vous donner et que vous y ferez la moisson, vous apporterez au prêtre la première gerbe de votre récolte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.19 ; 34.26.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le lendemain du sabbat, il fera devant moi le geste de présentation avec cette gerbe pour que vous obteniez ma faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le jour où vous accomplirez ce geste avec la gerbe, vous m’offrirez en holocauste un agneau sans défaut, dans sa première année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous y adjoindrez une offrande de six kilogrammes de farine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deux dixièmes d’épha, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c’est-à-dire environ sept litres.
    marker-yv: yv-n
  - type: text
    text: ' pétrie à l’huile, qui, consumée par le feu pour l’Eternel, aura une odeur apaisante, et une libation d’un litre et demi de vin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un quart de hîn. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le hîn contenait six litres.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avant ce jour où vous apporterez l’offrande à votre Dieu, vous ne mangerez ni pain, ni épis grillés ou grains nouveaux. C’est là une ordonnance en vigueur à perpétuité pour toutes les générations partout où vous habiterez.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête des Semaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 titre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ainsi nommée parce qu’elle tombe sept semaines après le premier dimanche tombant lors de la Pâque ou de la fête des Pains sans levain.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Vous compterez sept semaines entières à partir du lendemain du jour du sabbat, jour où vous aurez apporté la gerbe destinée à m’être présentée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 15-21, voir Ex 23.16 ; 34.22 ; Nb 28.26 ; Dt 16.9-16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous compterez cinquante jours jusqu’au lendemain du septième jour de sabbat et, ce jour-là, vous me présenterez une nouvelle offrande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous apporterez, des lieux où vous habiterez, deux pains pour le geste de présentation : chacun d’eux sera fait de six kilogrammes de fleur de farine cuits en pâte avec du levain. Ce sera une offrande de vos premières récoltes pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avec le pain vous offrirez aussi sept agneaux sans défaut, dans leur première année, un jeune taureau et deux béliers, qui me seront offerts en holocauste, accompagnés de leur offrande et de leur libation. Ce sera un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous offrirez aussi un bouc en sacrifice pour le péché et deux agneaux d’un an en sacrifice de communion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le prêtre fera avec le pain des premières récoltes le geste de présentation devant l’Eternel. Ils me seront consacrés avec les deux agneaux et reviendront au prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ce même jour, vous convoquerez le peuple pour qu’il me rende un culte. Vous n’accomplirez aucune des tâches de votre travail de la semaine ; c’est une ordonnance en vigueur à perpétuité et pour toutes les générations dans tous les lieux où vous habiterez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand vous ferez la moisson dans votre pays, vous ne moissonnerez pas vos champs jusqu’au bord, et vous ne glanerez pas ce qui pourra rester de votre moisson ; vous laisserez cela au pauvre et à l’immigré. Je suis l’Eternel votre Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 19.9-10 ; Dt 24.19-22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête des Trompettes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Parle aux Israélites, et dis-leur : Le premier jour du septième mois sera pour vous un grand jour de repos et de sonnerie de trompettes pour vous rappeler à mon souvenir, ainsi que d’un rassemblement cultuel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 24-25, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 29.1-6
        metadata:
          usfm: NUM.29.1+NUM.29.2+NUM.29.3+NUM.29.4+NUM.29.5+NUM.29.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine, et vous offrirez à l’Eternel des sacrifices consumés par le feu.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le jour des Expiations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’Eternel parla encore à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le dixième jour de ce septième mois est le jour des Expiations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit du jour du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yom Kippour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (pour les détails, voir chap. 16 ; Nb 29.7-11).
    marker-yv: yv-n
  - type: text
    text: '  ; ce sera un jour d’assemblée cultuelle, vous vous humilierez et vous offrirez à l’Eternel des sacrifices consumés par le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous ne ferez aucun travail ce jour-là, car c’est le jour des Expiations destiné à faire l’expiation pour vous devant l’Eternel votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toute personne qui ne s’humilierait pas ce jour-là sera exclue de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et je ferai moi-même disparaître de mon peuple celui qui fera un travail quelconque ce jour-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous ne ferez aucune sorte de travail. C’est une ordonnance en vigueur à perpétuité pour toutes les générations dans tous les lieux où vous habiterez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ce sera pour vous un jour de repos complet, au cours duquel vous vous humilierez. Dès le soir du neuvième jour du mois jusqu’au lendemain soir, vous observerez ce repos.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête des Cabanes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Parle aux Israélites, et dis-leur : Le quinzième jour de ce septième mois, aura lieu la fête des Cabanes ; on la célébrera durant sept jours en l’honneur de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le premier jour, il y aura une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Pendant sept jours, vous offrirez à l’Eternel des sacrifices consumés par le feu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 29.12-39
        metadata:
          usfm: NUM.29.12+NUM.29.13+NUM.29.14+NUM.29.15+NUM.29.16+NUM.29.17+NUM.29.18+NUM.29.19+NUM.29.20+NUM.29.21+NUM.29.22+NUM.29.23+NUM.29.24+NUM.29.25+NUM.29.26+NUM.29.27+NUM.29.28+NUM.29.29+NUM.29.30+NUM.29.31+NUM.29.32+NUM.29.33+NUM.29.34+NUM.29.35+NUM.29.36+NUM.29.37+NUM.29.38+NUM.29.39
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Le huitième jour, vous aurez encore une assemblée cultuelle et vous m’offrirez des sacrifices consumés par le feu. C’est un jour de fête cultuelle ; vous n’accomplirez ce jour-là aucune des tâches de votre travail de la semaine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Telles sont les fêtes à célébrer en l’honneur de l’Eternel, et pour lesquelles vous convoquerez le peuple pour qu’il rende un culte à l’Eternel et lui offre, en sacrifices consumés par le feu, les holocaustes et les offrandes, les sacrifices et les libations requis pour chaque jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ils viendront s’ajouter à ceux que vous offrirez lors des sabbats de l’Eternel, ainsi qu’à vos dons, et aux sacrifices que vous offrez à l’Eternel pour accomplir un vœu ou volontairement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le quinzième jour du septième mois quand vous aurez récolté tous les produits de vos terres, vous célébrerez une fête en l’honneur de l’Eternel pendant sept jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette fête des récoltes est identique à la fête des Cabanes (v. 34-36 : mêmes dates).'
    marker-yv: yv-n
  - type: text
    text: . Le premier et le huitième jour seront des jours de repos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 39-43, voir Ex 23.16 ; 34.22 ; Nb 29.12 ; Dt 16.13-15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Le premier jour, vous prendrez du produit de vos arbres d’ornement, des branches de palmiers, des rameaux d’arbres touffus et de saules des rivières. Pendant sept jours, vous vous réjouirez devant moi, l’Eternel votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous célébrerez cette fête en l’honneur de l’Eternel sept jours par an. C’est une ordonnance en vigueur à perpétuité, pour toutes les générations : vous la célébrerez le septième mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous habiterez pendant sept jours dans des cabanes ; tous ceux qui seront nés en Israël logeront dans des cabanes '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: pour que vos descendants sachent que j’ai fait habiter les Israélites sous des tentes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En hébreu, un même terme signifie tantôt « cabanes » (v. 42), tantôt « tentes ».
    marker-yv: yv-n
  - type: text
    text: ' lorsque je les ai fait sortir d’Egypte. Je suis l’Eternel votre Dieu.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Conclusion
  marker-yv: yv-h
