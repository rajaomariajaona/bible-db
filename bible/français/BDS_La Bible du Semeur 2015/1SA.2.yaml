document_id: 1SA.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le cantique d’Anne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Anne prononça cette prière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-10, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.46-55
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie remplit mon cœur, ╵c’est grâce à l’Eternel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, grâce à l’Eternel, ╵mon front s’est relevé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’ai de quoi répondre ╵à ceux qui me blessaient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je jubile, ╵car Dieu m’a secourue.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui contestent ╵contre Dieu sont brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du haut du ciel, ╵il tonnera contre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il jugera ╵les confins de la terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il donnera ╵la puissance à son roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il élèvera ╵l’homme qui, de sa part, ╵a reçu l’onction d’huile.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, Elqana retourna chez lui à Rama, et le jeune garçon fut au service de l’Eternel auprès du prêtre Eli.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des prêtres corrompus
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Eli étaient des vauriens qui ne se souciaient pas de l’Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, voici comment ils agissaient à l’égard du peuple. Chaque fois que quelqu’un offrait un sacrifice, au moment où la viande cuisait, un de leurs serviteurs arrivait, une fourchette à trois dents à la main. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il piquait dans la casserole, la marmite, le chaudron ou le pot, et prenait pour le prêtre tout ce que la fourchette ramenait. C’est ainsi qu’ils procédaient envers tous les Israélites qui venaient à Silo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et même parfois, avant que l’on fasse brûler la graisse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La Loi prescrivait de brûler sur l’autel la graisse et les parties grasses de la victime dès que celle-ci était égorgée (Lv 3.16 ; 4.8-10, 26, 31, 35 ; 7.28-31 ; 17.6).
      marker-yv: yv-n
    - type: text
      text: ', le serviteur du prêtre arrivait et disait à l’homme qui offrait le sacrifice : Donne-moi de la viande à rôtir pour le prêtre, car il n’acceptera de toi que de la viande crue, il ne veut pas de viande cuite.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’offrant objectait : « Il faut d’abord brûler la graisse, ensuite tu pourras prendre ce que tu voudras », le serviteur lui répondait : Tu m’en donnes immédiatement, sinon j’en prends de force.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le péché de ces jeunes gens était très grave aux yeux de l’Eternel, car ils profanaient les offrandes faites à l’Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel et ses parents
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Samuel accomplissait son service en présence de l’Eternel. Ce jeune garçon était vêtu d’un vêtement de lin semblable à ceux des prêtres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque année, sa mère lui confectionnait un petit vêtement qu’elle lui apportait quand elle venait avec son mari offrir le sacrifice annuel. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul ne l’égale. ╵L’Eternel seul est saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, à part lui, ╵il n’y a pas de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas de rocher ╵semblable à notre Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli bénit Elqana et sa femme en disant : Que l’Eternel t’accorde d’autres enfants de cette femme pour remplacer celui qu’elle a consacré à l’Eternel !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils repartirent chez eux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel intervint en faveur d’Anne : elle fut plusieurs fois enceinte et mit au monde trois fils et deux filles, tandis que le jeune Samuel grandissait dans la présence de l’Eternel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eli et ses fils
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli était très âgé. Il entendait dire comment ses fils agissaient envers les Israélites, et même qu’ils couchaient avec les femmes qui se rassemblaient à l’entrée de la tente de la Rencontre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : Pourquoi agissez-vous ainsi ? J’apprends de tout le peuple votre mauvaise conduite. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cessez donc, mes fils, car ce que j’entends raconter n’est pas beau. Vous détournez de la bonne voie le peuple de l’Eternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si un homme pèche contre un autre, Dieu est là pour arbitrer, mais si quelqu’un pèche contre l’Eternel lui-même, qui interviendra en sa faveur ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les fils ne tinrent aucun compte de l’avertissement de leur père, car l’Eternel voulait les faire mourir.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le jeune Samuel continuait à croître et il gagnait de plus en plus la faveur de Dieu et celle des hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel annonce le châtiment à Eli
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, un homme de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Désignation fréquente des prophètes (voir 9.6, 10 ; 1 R 13.1, 14).
      marker-yv: yv-n
    - type: text
      text: ' vint trouver Eli et lui dit : Voici ce que déclare l’Eternel : « Est-ce que je ne me suis pas clairement fait connaître à tes ancêtres et à leur famille quand ils vivaient encore en Egypte, esclaves du pharaon ? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je les ai choisis parmi toutes les tribus d’Israël pour qu’ils exercent le sacerdoce pour moi en offrant les sacrifices sur mon autel, en brûlant l’encens, et pour qu’ils portent le vêtement sacerdotal devant moi. Je leur ai attribué une part de viande de tous les sacrifices consumés par le feu offerts par les Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 28.1 ; Lv 7.35-36.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi donc méprisez-vous les sacrifices et les offrandes qui me sont destinés et que j’ai ordonné d’offrir dans ma demeure ? Pourquoi honores-tu tes fils plus que moi en vous engraissant des meilleurs morceaux des sacrifices que mon peuple Israël vient m’offrir ? » '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que cessent donc, ╵vos paroles hautaines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les bravades ╵sortant de votre bouche !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel ╵est un Dieu qui sait tout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est lui qui pèse ╵les actes des humains.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisqu’il en est ainsi, voici ce que moi, l’Eternel, le Dieu d’Israël, je déclare : « J’avais promis à ta famille et à celle de tes ancêtres que vous seriez toujours chargés du service devant moi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 29.9 ; Lv 8 à 9 ; Nb 16 à 17 ; 25.13.
      marker-yv: yv-n
    - type: text
      text: '. Mais à présent, moi l’Eternel, je le déclare : c’est fini ! Car j’honorerai ceux qui m’honorent, mais ceux qui me méprisent seront à leur tour couverts d’opprobre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici que le temps va venir où je briserai ta vigueur et celle de ta famille, de sorte qu’on n’y trouvera plus de vieillard. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que tout ira bien pour Israël, tu verras la détresse au sujet de ma demeure et personne n’atteindra plus jamais un âge avancé dans ta famille. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, je maintiendrai l’un des tiens au service de mon autel, mais ce sera pour épuiser tes yeux à pleurer et pour t’affliger, et tous tes descendants mourront dans la force de l’âge. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui arrivera à tes deux fils, Hophni et Phinéas, sera pour toi un signe : ils mourront tous deux le même jour. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, je me choisirai un prêtre fidèle qui agira selon ma pensée et mes désirs. Je lui bâtirai une dynastie qui me sera fidèle et qui officiera en présence du roi auquel j’aurai accordé l’onction. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui subsisteront dans ta famille viendront se prosterner devant lui pour obtenir une obole et un morceau de pain, et ils lui diront : De grâce, accorde-nous une charge sacerdotale quelconque à côté de toi, pour que nous ayons du moins quelque chose à manger. »'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà brisé ╵l’arc des guerriers !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui chancellent ╵sont armés de vigueur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les repus ╵s’embauchent pour du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les affamés ╵seront comblés de biens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la stérile ╵met sept enfants au monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que celle ╵qui en avait beaucoup ╵sera flétrie.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Eternel ╵qui fait mourir et vivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait descendre ╵dans le séjour des morts ╵et en fait remonter.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel seul ╵dépouille et enrichit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il humilie, ╵et il élève aussi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la poussière, ╵il arrache le pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il relève ╵l’indigent de la fange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour l’installer ╵au milieu des puissants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et lui donner ╵une place d’honneur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’Eternel ╵sont les fondements de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est sur eux ╵qu’il a posé le monde.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il gardera les pas ╵de ceux qui lui sont attachés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les méchants ╵périront dans la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car aucun homme ╵n’est vainqueur par la force.
