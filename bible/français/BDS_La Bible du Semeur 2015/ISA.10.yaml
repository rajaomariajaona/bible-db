    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les voilà qui arrivent, ╵ils marchent contre Ayath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces versets décrivent l’avance des armées assyriennes qui se rapprochent de Jérusalem. Ayath est à 16 kilomètres au nord de la ville, les autres localités mentionnées dans les v. 28-32 sont de plus en plus proches.
    marker-yv: yv-n
  - type: text
    text: ', ╵ils passent dans Migrôn'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont déposé ╵à Mikmas leurs bagages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Voici, ils ont déjà ╵franchi le défilé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les voilà qui disent : ╵« Campons pour la nuit à Guéba. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rama est terrifiée ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Guibea, ╵la ville de Saül, ╵les habitants prennent la fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Pousse des cris, ╵ô Bath-Gallim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais attention, Laïs !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheureuse Anatoth,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Madména est en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le peuple de Guébim ╵cherche un refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Oui, aujourd’hui déjà, ╵il fera halte à Nob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et menacera de son poing
- type: usfm
  marker: q1
  children:
  - type: text
    text: le mont du peuple de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, la colline de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais voici : l’Eternel, ╵le Seigneur des armées célestes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: abat avec violence ╵toutes ces belles branches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les plus hauts arbres sont coupés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les plus élevés sont à terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il tranche avec la hache ╵les taillis des forêts
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Liban s’effondre ╵sous les coups du Puissant.
