document_id: ISA.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur aux mauvais législateurs
  - type: text
    content: Malheur à ces législateurs ╵qui édictent des lois iniques,
  - type: text
    content: et à ceux qui rédigent ╵des décrets qui engendrent la misère,
  '10':
  - type: text
    content: Si, de ma main, ╵j’ai atteint des royaumes ╵adorant des idoles
  - type: text
    content: dont les statues ╵étaient bien plus nombreuses ╵que celles de Jérusalem ╵et que celles de Samarie,
  '11':
  - type: text
    content: ne traiterai-je pas ╵Jérusalem et ses statues
  - type: text
    content: tout comme j’ai traité ╵Samarie avec ses idoles ? »
  '12':
  - type: text
    content: 'Voici ce qui arrivera, dit le Seigneur : Quand j’aurai achevé toute mon œuvre sur le mont Sion et à Jérusalem, j’interviendrai contre le roi de l’Assyrie à cause de ses pensées orgueilleuses et de son regard arrogant. '
  '13':
  - type: text
    content: 'Car il a déclaré :'
  - type: text
    content: « C’est par ma propre force ╵que j’ai fait tout cela,
  - type: text
    content: et grâce à mon habileté, ╵car je suis très intelligent.
  - type: text
    content: Moi, j’ai déplacé les frontières ╵de nombreux peuples,
  - type: text
    content: et pillé leurs trésors
  - type: text
    content: et, comme un homme fort, ╵j’ai détrôné des rois.
  '14':
  - type: text
    content: Ma main a ramassé ╵les richesses des peuples ╵comme on ramasse un nid.
  - type: text
    content: Comme on s’empare ╵des œufs abandonnés,
  - type: text
    content: j’ai pris toute la terre
  - type: text
    content: sans qu’il y ait personne ╵pour agiter les ailes,
  - type: text
    content: ou pour ouvrir le bec, ╵ou pour siffler. »
  '15':
  - type: text
    content: Mais la cognée se vante-t-elle ╵aux dépens de celui qui la manie ?
  - type: text
    content: Ou la scie se glorifie-t-elle ╵aux dépens de celui qui l’utilise ?
  - type: text
    content: Comme si le bâton ╵faisait mouvoir ╵celui qui le brandit,
  - type: text
    content: comme si le gourdin ╵brandissait celui qui n’est pas de bois !
  '16':
  - type: text
    content: C’est pourquoi l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: va faire dépérir ╵ses guerriers corpulents ;
  - type: text
    content: sous ce qui fait sa gloire, ╵un feu s’embrasera,
  - type: text
    content: comme le feu d’un foyer d’incendie.
  '17':
  - type: text
    content: Car la lumière d’Israël ╵deviendra comme un feu,
  - type: text
    content: et le Saint d’Israël ╵comme une flamme
  - type: text
    content: qui brûlera ╵et qui consumera ╵les épines, les ronces
  - type: text
    content: en un seul jour.
  '18':
  - type: text
    content: Il anéantira ╵du cœur jusqu’à l’écorce
  - type: text
    content: la luxuriance ╵de ses forêts et ses vergers.
  - type: text
    content: On croira voir ╵un homme bien malade ╵qui dépérit.
  '19':
  - type: text
    content: Il restera si peu ╵d’arbres de sa forêt
  - type: text
    content: qu’un petit enfant même ╵pourrait en inscrire le nombre.
  - type: heading
    content: Conversion du faible reste d’Israël
  '2':
  - type: text
    content: pour refuser aux miséreux ╵que justice leur soit rendue,
  - type: text
    content: pour priver de leur droit ╵les pauvres de mon peuple,
  - type: text
    content: pour dépouiller les veuves,
  - type: text
    content: et pour piller les orphelins.
  '20':
  - type: text
    content: En ce jour-là,
  - type: text
    content: le reste des Israélites
  - type: text
    content: et les rescapés de Jacob
  - type: text
    content: ne prendront plus appui ╵sur celui qui les frappe
  - type: note
    content: C’est-à-dire les Assyriens.
  - type: text
    content: ','
  - type: text
    content: alors ils s’appuieront vraiment
  - type: text
    content: sur l’Eternel, ╵sur le Saint d’Israël.
  '21':
  - type: text
    content: Un reste des descendants de Jacob
  - type: note
    content: 'Un reste reviendra: en hébreu Shear-Yashoub, nom d’un fils d’Esaïe (voir 7.3).'
  - type: text
    content: un reste reviendra
  - type: text
    content: vers le Dieu fort.
  '22':
  - type: text
    content: Car même si ton peuple, ╵ô Israël,
  - type: text
    content: était aussi nombreux ╵que les grains de sable au bord de la mer,
  - type: text
    content: ce n’est qu’un reste ╵qui reviendra ;
  - type: text
    content: 'car Dieu a décidé ╵la destruction du peuple :'
  - type: text
    content: il fera venir la justice ╵comme une inondation
  - type: note
    content: Les v. 22-23 sont cités en Rm 9.27-28.
  - type: text
    content: .
  '23':
  - type: text
    content: Et l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: accomplira dans le pays entier
  - type: text
    content: cette destruction qui est décrétée.
  - type: heading
    content: Le joug assyrien sera brisé
  '24':
  - type: text
    content: 'Par conséquent, ╵voici ce que dit l’Eternel, ╵le Seigneur des armées célestes :'
  - type: text
    content: O toi mon peuple, ╵habitant de Sion, ╵ne crains pas l’Assyrie
  - type: text
    content: quand, avec le bâton, ╵il viendra te frapper
  - type: text
    content: et lorsqu’il brandira ╵son gourdin contre toi,
  - type: text
    content: comme l’Egypte l’a fait autrefois
  - type: note
    content: Allusion aux conditions de vie des Israélites en Egypte (voir Ex 1).
  - type: text
    content: .
  '25':
  - type: text
    content: Car, dans un peu, très peu de temps,
  - type: text
    content: ma fureur prendra fin
  - type: text
    content: et mon courroux ╵se tournera contre eux ╵pour les détruire.
  '26':
  - type: text
    content: Le Seigneur des armées célestes ╵brandira son fouet ╵pour frapper l’Assyrie
  - type: text
    content: comme il frappa Madian ╵près du rocher d’Oreb
  - type: note
    content: 'Oreb: chef madianite tué par Gédéon (Jg 7.23-25).'
  - type: text
    content: .
  - type: text
    content: Il lèvera encore ╵son bâton sur la mer
  - type: text
    content: comme il l’a fait jadis ╵contre les Egyptiens
  - type: note
    content: Voir Ex 14.15-27.
  - type: text
    content: .
  '27':
  - type: text
    content: En ce jour-là,
  - type: text
    content: il ôtera de ton épaule ╵le fardeau qu’il va t’imposer
  - type: text
    content: et il enlèvera ╵le joug qu’il aura placé sur ta nuque.
  - type: text
    content: Ce joug sera brisé ╵pour laisser place ╵à la prospérité
  - type: note
    content: 'Hébreu obscur et traduction incertaine. L’ancienne version grecque a : de sur tes épaules.'
  - type: text
    content: .
  - type: heading
    content: Invasion contre Juda
  '28':
  - type: text
    content: Les voilà qui arrivent, ╵ils marchent contre Ayath
  - type: note
    content: Ces versets décrivent l’avance des armées assyriennes qui se rapprochent de Jérusalem. Ayath est à 16 kilomètres au nord de la ville, les autres localités mentionnées dans les v. 28-32 sont de plus en plus proches.
  - type: text
    content: ', ╵ils passent dans Migrôn'
  - type: text
    content: et ils ont déposé ╵à Mikmas leurs bagages.
  '29':
  - type: text
    content: Voici, ils ont déjà ╵franchi le défilé,
  - type: text
    content: 'et les voilà qui disent : ╵« Campons pour la nuit à Guéba. »'
  - type: text
    content: Rama est terrifiée ;
  - type: text
    content: à Guibea, ╵la ville de Saül, ╵les habitants prennent la fuite.
  '3':
  - type: text
    content: Que ferez-vous au jour ╵du règlement de comptes,
  - type: text
    content: lorsque la destruction ╵viendra sur vous de loin ?
  - type: text
    content: Vers qui donc fuirez-vous ╵pour avoir du secours ?
  - type: text
    content: Et où cacherez-vous ╵l’amas de vos richesses ?
  '30':
  - type: text
    content: Pousse des cris, ╵ô Bath-Gallim,
  - type: text
    content: fais attention, Laïs !
  - type: text
    content: Malheureuse Anatoth,
  '31':
  - type: text
    content: Madména est en fuite,
  - type: text
    content: le peuple de Guébim ╵cherche un refuge.
  '32':
  - type: text
    content: Oui, aujourd’hui déjà, ╵il fera halte à Nob
  - type: text
    content: et menacera de son poing
  - type: text
    content: le mont du peuple de Sion,
  - type: text
    content: oui, la colline de Jérusalem.
  '33':
  - type: text
    content: 'Mais voici : l’Eternel, ╵le Seigneur des armées célestes,'
  - type: text
    content: abat avec violence ╵toutes ces belles branches.
  - type: text
    content: Les plus hauts arbres sont coupés,
  - type: text
    content: les plus élevés sont à terre.
  '34':
  - type: text
    content: Il tranche avec la hache ╵les taillis des forêts
  - type: text
    content: et le Liban s’effondre ╵sous les coups du Puissant.
  '4':
  - type: text
    content: Il ne restera rien à faire ╵sinon se courber sous le joug ╵parmi les prisonniers
  - type: text
    content: ou tomber parmi les victimes.
  - type: text
    content: Mais malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: text
    content: sa main reste levée.
  - type: heading
    content: Le jugement sur l’Assyrie
  '5':
  - type: text
    content: Malheur à l’Assyrien,
  - type: text
    content: bâton de ma colère !
  - type: text
    content: Ce gourdin dans sa main
  - type: text
    content: est l’instrument de ma fureur.
  '6':
  - type: text
    content: Je l’enverrai pour attaquer ╵une nation impie,
  - type: text
    content: je vais lui donner la mission ╵de rafler le butin ╵d’un peuple qui déchaîne ma fureur,
  - type: text
    content: de le mettre au pillage
  - type: note
    content: butin et pillage font allusion au nom d’un des fils d’Esaïe (voir 8.3).
  - type: text
    content: ','
  - type: text
    content: et de le piétiner ╵comme la boue des rues.
  '7':
  - type: text
    content: Mais ce n’est pas ainsi ╵que le roi d’Assyrie ╵a vu les choses
  - type: text
    content: et qu’il a raisonné.
  - type: text
    content: Car il ne songe qu’à détruire
  - type: text
    content: et à exterminer ╵des peuples en grand nombre.
  '8':
  - type: text
    content: 'Oui, voici ce qu’il dit :'
  - type: text
    content: « Mes princes ╵ne sont-ils pas autant de rois ?
  '9':
  - type: text
    content: Kalno a bien subi ╵le sort de Karkemish,
  - type: text
    content: Hamath celui d’Arpad,
  - type: text
    content: Samarie celui de Damas
  - type: note
    content: 'Villes de Syrie (Kalno, Hamath, Arpad, Damas), d’une principauté hittite (Karkemish) et d’Israël (Samarie), assiégées et prises par les rois assyriens Tiglath-Piléser III et Sargon II entre 740 et 717 av. J.-C. L’ordre dans lequel ces villes sont mentionnées suggère l’avance des armées assyriennes vers le sud : vers Jérusalem.'
  - type: text
    content: .
