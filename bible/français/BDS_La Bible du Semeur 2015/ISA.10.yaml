document_id: ISA.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malheur aux mauvais législateurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à ces législateurs ╵qui édictent des lois iniques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à ceux qui rédigent ╵des décrets qui engendrent la misère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: pour refuser aux miséreux ╵que justice leur soit rendue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour priver de leur droit ╵les pauvres de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour dépouiller les veuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour piller les orphelins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que ferez-vous au jour ╵du règlement de comptes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque la destruction ╵viendra sur vous de loin ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers qui donc fuirez-vous ╵pour avoir du secours ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et où cacherez-vous ╵l’amas de vos richesses ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il ne restera rien à faire ╵sinon se courber sous le joug ╵parmi les prisonniers
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou tomber parmi les victimes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malgré tout cela, ╵son courroux ne s’apaise pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa main reste levée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jugement sur l’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Malheur à l’Assyrien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bâton de ma colère !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce gourdin dans sa main
- type: usfm
  marker: q1
  children:
  - type: text
    text: est l’instrument de ma fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je l’enverrai pour attaquer ╵une nation impie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais lui donner la mission ╵de rafler le butin ╵d’un peuple qui déchaîne ma fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de le mettre au pillage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'butin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pillage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'font allusion au nom d’un des fils d’Esaïe (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.3'
        metadata:
          usfm: ISA.8.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de le piétiner ╵comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais ce n’est pas ainsi ╵que le roi d’Assyrie ╵a vu les choses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il a raisonné.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il ne songe qu’à détruire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à exterminer ╵des peuples en grand nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Oui, voici ce qu’il dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Mes princes ╵ne sont-ils pas autant de rois ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kalno a bien subi ╵le sort de Karkemish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamath celui d’Arpad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Samarie celui de Damas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Villes de Syrie (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Kalno, Hamath, Arpad, Damas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), d’une principauté hittite (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Karkemish
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) et d’Israël (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Samarie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), assiégées et prises par les rois assyriens Tiglath-Piléser III et Sargon II entre 740 et 717 av. J.-C. L’ordre dans lequel ces villes sont mentionnées suggère l’avance des armées assyriennes vers le sud : vers Jérusalem.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si, de ma main, ╵j’ai atteint des royaumes ╵adorant des idoles
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont les statues ╵étaient bien plus nombreuses ╵que celles de Jérusalem ╵et que celles de Samarie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ne traiterai-je pas ╵Jérusalem et ses statues
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme j’ai traité ╵Samarie avec ses idoles ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici ce qui arrivera, dit le Seigneur : Quand j’aurai achevé toute mon œuvre sur le mont Sion et à Jérusalem, j’interviendrai contre le roi de l’Assyrie à cause de ses pensées orgueilleuses et de son regard arrogant. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car il a déclaré :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « C’est par ma propre force ╵que j’ai fait tout cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et grâce à mon habileté, ╵car je suis très intelligent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, j’ai déplacé les frontières ╵de nombreux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pillé leurs trésors
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme un homme fort, ╵j’ai détrôné des rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ma main a ramassé ╵les richesses des peuples ╵comme on ramasse un nid.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme on s’empare ╵des œufs abandonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai pris toute la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’il y ait personne ╵pour agiter les ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou pour ouvrir le bec, ╵ou pour siffler. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais la cognée se vante-t-elle ╵aux dépens de celui qui la manie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou la scie se glorifie-t-elle ╵aux dépens de celui qui l’utilise ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme si le bâton ╵faisait mouvoir ╵celui qui le brandit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme si le gourdin ╵brandissait celui qui n’est pas de bois !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est pourquoi l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va faire dépérir ╵ses guerriers corpulents ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous ce qui fait sa gloire, ╵un feu s’embrasera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le feu d’un foyer d’incendie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car la lumière d’Israël ╵deviendra comme un feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Saint d’Israël ╵comme une flamme
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui brûlera ╵et qui consumera ╵les épines, les ronces
- type: usfm
  marker: q1
  children:
  - type: text
    text: en un seul jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il anéantira ╵du cœur jusqu’à l’écorce
- type: usfm
  marker: q1
  children:
  - type: text
    text: la luxuriance ╵de ses forêts et ses vergers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On croira voir ╵un homme bien malade ╵qui dépérit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il restera si peu ╵d’arbres de sa forêt
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un petit enfant même ╵pourrait en inscrire le nombre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conversion du faible reste d’Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le reste des Israélites
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les rescapés de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne prendront plus appui ╵sur celui qui les frappe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les Assyriens.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors ils s’appuieront vraiment
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur l’Eternel, ╵sur le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Un reste des descendants de Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un reste reviendra
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en hébreu Shear-Yashoub, nom d’un fils d’Esaïe (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.3'
        metadata:
          usfm: ISA.7.3
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: un reste reviendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers le Dieu fort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car même si ton peuple, ╵ô Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: était aussi nombreux ╵que les grains de sable au bord de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n’est qu’un reste ╵qui reviendra ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car Dieu a décidé ╵la destruction du peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera venir la justice ╵comme une inondation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 22-23 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 9.27-28
        metadata:
          usfm: ROM.9.27+ROM.9.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: accomplira dans le pays entier
- type: usfm
  marker: q1
  children:
  - type: text
    text: cette destruction qui est décrétée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le joug assyrien sera brisé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Par conséquent, ╵voici ce que dit l’Eternel, ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O toi mon peuple, ╵habitant de Sion, ╵ne crains pas l’Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand, avec le bâton, ╵il viendra te frapper
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lorsqu’il brandira ╵son gourdin contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme l’Egypte l’a fait autrefois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion aux conditions de vie des Israélites en Egypte (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1
        metadata:
          usfm: EXO.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Car, dans un peu, très peu de temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma fureur prendra fin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon courroux ╵se tournera contre eux ╵pour les détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le Seigneur des armées célestes ╵brandira son fouet ╵pour frapper l’Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme il frappa Madian ╵près du rocher d’Oreb
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Oreb
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: chef madianite tué par Gédéon (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 7.23-25
        metadata:
          usfm: JDG.7.23+JDG.7.24+JDG.7.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il lèvera encore ╵son bâton sur la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme il l’a fait jadis ╵contre les Egyptiens
  - type: usfm
