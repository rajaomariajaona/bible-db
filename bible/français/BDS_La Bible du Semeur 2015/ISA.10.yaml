    children:
    - type: text
      text: '27'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ôtera de ton épaule ╵le fardeau qu’il va t’imposer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il enlèvera ╵le joug qu’il aura placé sur ta nuque.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce joug sera brisé ╵pour laisser place ╵à la prospérité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreu obscur et traduction incertaine. L’ancienne version grecque a : '
    - type: usfm
