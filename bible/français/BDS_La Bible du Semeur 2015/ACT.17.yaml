document_id: ACT.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Opposition des Juifs à Thessalonique
  - type: text
    content: 'Ils traversèrent Amphipolis puis Apollonie et gagnèrent Thessalonique où les Juifs avaient une synagogue. '
  '10':
  - type: text
    content: 'Dès qu’il fit nuit, les frères firent partir Paul et Silas pour Bérée. Une fois arrivés là, ceux-ci se rendirent à la synagogue des Juifs. '
  '11':
  - type: text
    content: 'Ils y trouvèrent des gens qui étaient bien mieux disposés que les Juifs de Thessalonique et qui accueillirent la Parole de Dieu avec beaucoup d’empressement ; ceux-ci examinaient chaque jour les Ecritures pour voir si ce qu’on leur disait était juste. '
  '12':
  - type: text
    content: Beaucoup d’entre eux crurent. Et, parmi les Grecs, un grand nombre de femmes de la haute société et beaucoup d’hommes acceptèrent également la foi.
  '13':
  - type: text
    content: 'Mais quand les Juifs de Thessalonique apprirent que Paul annonçait aussi la Parole de Dieu à Bérée, ils vinrent semer, là aussi, l’agitation et le trouble parmi la population. '
  '14':
  - type: text
    content: 'Alors, sans tarder, les frères firent partir Paul jusqu’à la mer pour prendre un bateau. Silas et Timothée restèrent à Bérée. '
  '15':
  - type: text
    content: Ceux qui étaient chargés de conduire Paul l’amenèrent jusqu’à Athènes. L’apôtre leur demanda d’inviter de sa part Silas et Timothée à venir le rejoindre au plus tôt, puis ils repartirent.
  - type: heading
    content: Le discours de Paul à Athènes
  '16':
  - type: text
    content: 'Pendant qu’il attendait ses compagnons à Athènes, Paul bouillait d’indignation en voyant combien cette ville était remplie d’idoles. '
  '17':
  - type: text
    content: 'Il discutait donc, à la synagogue, avec les Juifs et les non-Juifs qui adoraient Dieu et, chaque jour, sur la place publique, avec tous ceux qu’il rencontrait. '
  '18':
  - type: text
    content: Quelques philosophes, des épicuriens et des stoïciens
  - type: note
    content: Représentants des deux principales écoles philosophiques du temps. Les épicuriens préconisaient la jouissance modérée, les stoïciens l’effort et la fermeté face à la souffrance.
  - type: text
    content: ', engageaient aussi des débats avec lui.'
  - type: text
    content: 'Les uns disaient : Qu’est-ce que cette pie bavarde peut bien vouloir dire ?'
  - type: text
    content: 'D’autres disaient : On dirait qu’il prêche des divinités étrangères.'
  - type: text
    content: En effet, Paul annonçait « Jésus » et la « résurrection »
  - type: note
    content: 'La «  résurrection»: en grec le nom féminin anastasis était compris par les auditeurs de Paul comme étant le nom d’une divinité féminine associée à Jésus.'
  - type: text
    content: .
  '19':
  - type: text
    content: Pour finir, ils l’emmenèrent et le conduisirent devant l’Aréopage
  - type: note
    content: 'l’Aréopage: colline dominant Athènes où se réunissait autrefois le conseil de la ville. Ce nom en vint à désigner le conseil lui-même.'
  - type: text
    content: .
  - type: text
    content: '– Pouvons-nous savoir, lui dirent-ils alors, en quoi consiste ce nouvel enseignement dont tu parles ? '
  '2':
  - type: text
    content: 'Selon son habitude, Paul s’y rendit et, pendant trois sabbats, il discuta avec eux sur les Ecritures. '
  '20':
  - type: text
    content: Les propos que tu tiens sonnent de façon bien étrange à nos oreilles. Nous désirons savoir ce qu’ils veulent dire.
  - type: text
    content: (
  '21':
  - type: text
    content: Il se trouve, en effet, que tous les Athéniens, et les étrangers qui résidaient dans leur ville, passaient le plus clair de leur temps à dire ou à écouter les dernières nouvelles.)
  '22':
  - type: text
    content: Alors Paul se leva au milieu de
  - type: note
    content: 'Autre traduction : devant.'
  - type: text
    content: ' l’Aréopage et dit :'
  - type: text
    content: 'Athéniens, je vois que vous êtes, à tous égards, extrêmement soucieux d’honorer les divinités. '
  '23':
  - type: text
    content: 'En effet, en parcourant les rues de votre ville et en examinant vos monuments sacrés, j’ai même découvert un autel qui porte cette inscription : A un dieu inconnu'
  - type: note
    content: Afin d’éviter de mécontenter une divinité à laquelle ils auraient oublié d’ériger un monument, les Athéniens avaient eu l’idée de construire cet autel.
  - type: text
    content: . Ce que vous révérez ainsi sans le connaître, je viens vous l’annoncer.
  '24':
  - type: text
    content: 'Dieu, qui a créé l’univers et tout ce qui s’y trouve, et qui est le Seigneur du ciel et de la terre, n’habite pas dans des temples bâtis de mains d’hommes. '
  '25':
  - type: text
    content: 'Il n’a pas besoin non plus d’être servi par des mains humaines, comme s’il lui manquait quelque chose. Au contraire, c’est lui qui donne à tous les êtres la vie, le souffle et toutes choses. '
  '26':
  - type: text
    content: A partir d’un seul homme, il a créé tous les peuples pour qu’ils habitent toute la surface de la terre ; il a fixé des périodes déterminées et établi les limites de leurs domaines.
  '27':
  - type: text
    content: 'Par tout cela, Dieu invitait les hommes à le chercher, et à le trouver, peut-être, comme à tâtons, lui qui n’est pas loin de chacun de nous. '
  '28':
  - type: text
    content: En effet, « c’est en lui que nous avons la vie, le mouvement et l’être », comme l’ont aussi affirmé certains de vos poètes, car « nous sommes ses enfants »
  - type: note
    content: 'Citations libres de deux poètes grecs : Epiménide et Aratos.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: Ainsi, puisque nous sommes ses enfants, nous ne devons pas imaginer la moindre ressemblance entre la divinité et ces idoles en or, en argent ou en marbre que peuvent produire l’art ou l’imagination des hommes.
  '3':
  - type: text
    content: Il les leur expliquait et leur démontrait que, d’après elles, le Messie devait mourir, puis ressusciter.
  - type: text
    content: – Le Messie, disait-il, n’est autre que ce Jésus que je vous annonce.
  '30':
  - type: text
    content: 'Or Dieu ne tient plus compte des temps où les hommes ne le connaissaient pas. Aujourd’hui, il leur annonce à tous, et partout, qu’ils doivent changer. '
  '31':
  - type: text
    content: Car il a fixé un jour où il jugera le monde entier en toute justice, par un homme qu’il a désigné pour cela, ce dont il a donné à tous une preuve certaine en le ressuscitant.
  '32':
  - type: text
    content: 'Lorsqu’ils entendirent parler de résurrection, les uns se moquèrent de Paul, et les autres lui dirent : Nous t’écouterons là-dessus une autre fois.'
  '33':
  - type: text
    content: 'C’est ainsi que Paul se retira de leur assemblée. '
  '34':
  - type: text
    content: Cependant, quelques auditeurs se joignirent à lui et devinrent croyants, en particulier Denys, un membre de l’Aréopage, une femme nommée Damaris, et d’autres avec eux.
  '4':
  - type: text
    content: Quelques Juifs furent convaincus et se joignirent à Paul et Silas, ainsi qu’un grand nombre de non-Juifs qui adoraient Dieu et plusieurs femmes de la haute société.
  '5':
  - type: text
    content: 'Mais les autres Juifs, jaloux, recrutèrent quelques voyous trouvés dans les rues et provoquèrent des attroupements et du tumulte dans la ville. Ils firent irruption dans la maison de Jason pour y chercher Paul et Silas qu’ils voulaient traduire devant l’assemblée du peuple. '
  '6':
  - type: text
    content: Mais ils ne les trouvèrent pas. Alors ils emmenèrent Jason et quelques frères devant les magistrats de la ville.
  - type: text
    content: '– Ces individus, criaient-ils, ont mis le monde entier sens dessus dessous. Et maintenant ils sont ici. '
  '7':
  - type: text
    content: Jason les a reçus chez lui. Ils agissent tous contre les édits de César, car ils prétendent qu’il y a un autre roi, nommé Jésus.
  '8':
  - type: text
    content: 'Ces paroles émurent la foule et les magistrats. '
  '9':
  - type: text
    content: Ceux-ci ne relâchèrent Jason et les autres croyants qu’après avoir obtenu d’eux le versement d’une caution.
  - type: heading
    content: A Bérée
