document_id: ACT.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Opposition des Juifs à Thessalonique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ils traversèrent Amphipolis puis Apollonie et gagnèrent Thessalonique où les Juifs avaient une synagogue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dès qu’il fit nuit, les frères firent partir Paul et Silas pour Bérée. Une fois arrivés là, ceux-ci se rendirent à la synagogue des Juifs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils y trouvèrent des gens qui étaient bien mieux disposés que les Juifs de Thessalonique et qui accueillirent la Parole de Dieu avec beaucoup d’empressement ; ceux-ci examinaient chaque jour les Ecritures pour voir si ce qu’on leur disait était juste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Beaucoup d’entre eux crurent. Et, parmi les Grecs, un grand nombre de femmes de la haute société et beaucoup d’hommes acceptèrent également la foi.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais quand les Juifs de Thessalonique apprirent que Paul annonçait aussi la Parole de Dieu à Bérée, ils vinrent semer, là aussi, l’agitation et le trouble parmi la population. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors, sans tarder, les frères firent partir Paul jusqu’à la mer pour prendre un bateau. Silas et Timothée restèrent à Bérée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ceux qui étaient chargés de conduire Paul l’amenèrent jusqu’à Athènes. L’apôtre leur demanda d’inviter de sa part Silas et Timothée à venir le rejoindre au plus tôt, puis ils repartirent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le discours de Paul à Athènes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Pendant qu’il attendait ses compagnons à Athènes, Paul bouillait d’indignation en voyant combien cette ville était remplie d’idoles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il discutait donc, à la synagogue, avec les Juifs et les non-Juifs qui adoraient Dieu et, chaque jour, sur la place publique, avec tous ceux qu’il rencontrait. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Quelques philosophes, des épicuriens et des stoïciens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Représentants des deux principales écoles philosophiques du temps. Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épicuriens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'préconisaient la jouissance modérée, les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'stoïciens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l’effort et la fermeté face à la souffrance.
      marker-yv: yv-n
    - type: text
      text: ', engageaient aussi des débats avec lui.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les uns disaient : Qu’est-ce que cette pie bavarde peut bien vouloir dire ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres disaient : On dirait qu’il prêche des divinités étrangères.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, Paul annonçait « Jésus » et la « résurrection »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '«  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: résurrection
      - type: usfm
        marker: fq
        children:
        - type: text
          text: »
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en grec le nom féminin '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'anastasis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était compris par les auditeurs de Paul comme étant le nom d’une divinité féminine associée à Jésus.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Pour finir, ils l’emmenèrent et le conduisirent devant l’Aréopage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l’Aréopage
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: colline dominant Athènes où se réunissait autrefois le conseil de la ville. Ce nom en vint à désigner le conseil lui-même.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Pouvons-nous savoir, lui dirent-ils alors, en quoi consiste ce nouvel enseignement dont tu parles ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Selon son habitude, Paul s’y rendit et, pendant trois sabbats, il discuta avec eux sur les Ecritures. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les propos que tu tiens sonnent de façon bien étrange à nos oreilles. Nous désirons savoir ce qu’ils veulent dire.
  - type: usfm
    marker: p
    children:
    - type: text
      text: (
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il se trouve, en effet, que tous les Athéniens, et les étrangers qui résidaient dans leur ville, passaient le plus clair de leur temps à dire ou à écouter les dernières nouvelles.)
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Alors Paul se leva au milieu de
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant.
      marker-yv: yv-n
    - type: text
      text: ' l’Aréopage et dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Athéniens, je vois que vous êtes, à tous égards, extrêmement soucieux d’honorer les divinités. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'En effet, en parcourant les rues de votre ville et en examinant vos monuments sacrés, j’ai même découvert un autel qui porte cette inscription : A un dieu inconnu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Afin d’éviter de mécontenter une divinité à laquelle ils auraient oublié d’ériger un monument, les Athéniens avaient eu l’idée de construire cet autel.
      marker-yv: yv-n
    - type: text
      text: . Ce que vous révérez ainsi sans le connaître, je viens vous l’annoncer.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dieu, qui a créé l’univers et tout ce qui s’y trouve, et qui est le Seigneur du ciel et de la terre, n’habite pas dans des temples bâtis de mains d’hommes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il n’a pas besoin non plus d’être servi par des mains humaines, comme s’il lui manquait quelque chose. Au contraire, c’est lui qui donne à tous les êtres la vie, le souffle et toutes choses. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: A partir d’un seul homme, il a créé tous les peuples pour qu’ils habitent toute la surface de la terre ; il a fixé des périodes déterminées et établi les limites de leurs domaines.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Par tout cela, Dieu invitait les hommes à le chercher, et à le trouver, peut-être, comme à tâtons, lui qui n’est pas loin de chacun de nous. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: En effet, « c’est en lui que nous avons la vie, le mouvement et l’être », comme l’ont aussi affirmé certains de vos poètes, car « nous sommes ses enfants »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Citations libres de deux poètes grecs : Epiménide et Aratos.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ainsi, puisque nous sommes ses enfants, nous ne devons pas imaginer la moindre ressemblance entre la divinité et ces idoles en or, en argent ou en marbre que peuvent produire l’art ou l’imagination des hommes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il les leur expliquait et leur démontrait que, d’après elles, le Messie devait mourir, puis ressusciter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Le Messie, disait-il, n’est autre que ce Jésus que je vous annonce.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Or Dieu ne tient plus compte des temps où les hommes ne le connaissaient pas. Aujourd’hui, il leur annonce à tous, et partout, qu’ils doivent changer. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Car il a fixé un jour où il jugera le monde entier en toute justice, par un homme qu’il a désigné pour cela, ce dont il a donné à tous une preuve certaine en le ressuscitant.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Lorsqu’ils entendirent parler de résurrection, les uns se moquèrent de Paul, et les autres lui dirent : Nous t’écouterons là-dessus une autre fois.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'C’est ainsi que Paul se retira de leur assemblée. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Cependant, quelques auditeurs se joignirent à lui et devinrent croyants, en particulier Denys, un membre de l’Aréopage, une femme nommée Damaris, et d’autres avec eux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quelques Juifs furent convaincus et se joignirent à Paul et Silas, ainsi qu’un grand nombre de non-Juifs qui adoraient Dieu et plusieurs femmes de la haute société.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais les autres Juifs, jaloux, recrutèrent quelques voyous trouvés dans les rues et provoquèrent des attroupements et du tumulte dans la ville. Ils firent irruption dans la maison de Jason pour y chercher Paul et Silas qu’ils voulaient traduire devant l’assemblée du peuple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mais ils ne les trouvèrent pas. Alors ils emmenèrent Jason et quelques frères devant les magistrats de la ville.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Ces individus, criaient-ils, ont mis le monde entier sens dessus dessous. Et maintenant ils sont ici. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jason les a reçus chez lui. Ils agissent tous contre les édits de César, car ils prétendent qu’il y a un autre roi, nommé Jésus.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ces paroles émurent la foule et les magistrats. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ceux-ci ne relâchèrent Jason et les autres croyants qu’après avoir obtenu d’eux le versement d’une caution.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Bérée
    marker-yv: yv-h
