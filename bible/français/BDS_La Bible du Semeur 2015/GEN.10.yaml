document_id: GEN.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’histoire de la famille des fils de Noé
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’origine des divers peuples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la généalogie des fils de Noé : Sem, Cham et Japhet. Ils eurent des enfants après le déluge.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les capitales de son royaume furent Babel, Erek, Akkad et Kalné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Il commença à régner à Babel, puis à Erek, Akkad et Kalné.
      marker-yv: yv-n
    - type: text
      text: ' au pays de Shinéar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire l’ancienne Babylonie.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'De ce pays-là, il passa en Assyrie et bâtit Ninive, Rehoboth-Ir, Kalah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: et Résen, la plus grande cité entre Ninive et Kalah.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mitsraïm fut l’ancêtre des Loudim, des Anamim, des Lehabim, des Naphtouim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Différents peuples d’Egypte et des environs.
      marker-yv: yv-n
    - type: text
      text: ', '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: des Patrousim, des Kaslouhim – dont sont issus les Philistins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les Philistins, peuple indo-européen, ont tout d’abord émigré en Crète (voir Jr 47.4 ; Am 9.7) puis ont envahi l’Egypte au début du '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: xii
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' siècle av. J.-C. Chassés de cette région, ils se sont installés sur la côte de Canaan pour étendre plus tard leur influence sur presque tout le pays.'
      marker-yv: yv-n
    - type: text
      text: ' – et des Crétois.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Canaan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les peuples mentionnés aux v. 15-19 vivaient tous sur un territoire correspondant à la Syrie et au pays d’Israël. Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Heth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '23.3'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' eut pour fils Sidon, son aîné, et Heth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'De lui descendent les Yebousiens, les Amoréens, les Guirgasiens, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'les Héviens, les Arqiens et les Siniens, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'les Arvadiens, les Tsemariens et les Hamathiens. Ensuite les différentes tribus des Cananéens se dispersèrent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le territoire des Cananéens s’étendait de Sidon, en direction de Guérar, jusqu’à Gaza et en direction de Sodome, de Gomorrhe, d’Adma et de Tseboïm jusqu’à Lésha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de Japhet : Gomer'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gomer
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les Cimmériens, peuple d’Asie Mineure. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Magog
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut-être une peuplade scythe qui habitait le Caucase et les régions au sud-est de la mer Noire. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Madaï
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les Mèdes. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yavân
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les Ioniens, au sud de la Grèce, et plus tard les Grecs en général. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Toubal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Méshek
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mentionnés avec Magog dans des inscriptions assyriennes (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 38.2
        - type: text
          text: '). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tiras
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probablement les Etrusques en Italie.
      marker-yv: yv-n
    - type: text
      text: ', Magog, Madaï, Yavân, Toubal, Méshek et Tiras.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tels sont les descendants de Cham selon leurs familles et leurs langues, dans leurs divers pays et leurs peuples.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Sem aussi, le frère aîné de Japhet, eut une descendance. Il fut l’ancêtre d’Héber et de ses descendants.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les descendants de Sem furent : Elam, Assour, Arpakshad, Loud et Aram'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les Elamites, à l’est de la Mésopotamie, autour de Suse. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Assour
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ancien nom de l’Assyrie, au nord de la Mésopotamie. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Arpakshad
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 11.10-13
        - type: text
          text: '  ; peut-être une désignation hébraïque de la Chaldée, au sud de la Mésopotamie. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Loud
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'soit les Lydiens (en Asie Mineure), soit une région voisine de l’Egypte. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aram
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Araméens ou Syriens.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les descendants d’Aram furent : Outs, Houl, Guéter et Mash'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 1.17
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Méshek.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Arpakshad eut pour fils Shélah, et Shélah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Arpakshad eut pour descendant Caïnan, Caïnan eut pour descendant Shélah. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir aussi '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 11.12-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' eut pour fils Héber. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Héber eut deux fils : l’un s’appelait Péleg (Partage), parce que de son temps la terre fut partagée, et son frère s’appelait Yoqtân.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Yoqtân eut pour fils Almodad, Shéleph, Hatsarmaveth, Yérah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hadoram, Ouzal, Diqla, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Obal, Abimaël, Saba, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ophir, Havila et Yobab. Tous ceux-là étaient des descendants de Yoqtân. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fils de Gomer : Ashkenaz'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ashkenaz
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Scythes. Les trois peuples mentionnés vivaient dans le haut Euphrate.
      marker-yv: yv-n
    - type: text
      text: ', Riphat et Togarma.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ils habitaient la contrée s’étendant de Mésha jusque du côté de Sephar, la montagne d’orient.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tels sont les descendants de Sem selon leurs familles et leurs langues, dans leurs divers pays, selon leurs peuples. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Telles sont les familles issues des fils de Noé selon leurs lignées et d’après leur appartenance nationale. C’est d’eux que sont issus tous les peuples qui se sont répandus sur la terre après le déluge.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fils de Yavân : Elisha, Tarsis, Kittim et Dodanim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le Pentateuque samaritain, quelques manuscrits du texte hébreu traditionnel, la version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 1.7
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rodanim. Tarsis : '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut-être le sud de l’Espagne. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kittim
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nom de l’île de Chypre. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rodanim : '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom de la ville de Rhodes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ce sont leurs descendants qui ont peuplé les îles et les régions côtières. Ils se sont répartis par pays selon la langue et par familles dans chaque peuple.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les fils de Cham furent : Koush'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Koush
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'le haut Nil, l’Ethiopie et la Nubie. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitsraïm
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’Egypte. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pouth
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: soit la Libye, soit la côte des Somalis.
      marker-yv: yv-n
    - type: text
      text: ', Mitsraïm, Pouth et Canaan.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les fils de Koush : Seba, Havila, Sabta, Raema et Sabteka. Les fils de Raema : Sheba et Dedân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces sept peuples koushites se situaient tous en Arabie.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koush fut le père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fondateur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chef.
      marker-yv: yv-n
    - type: text
      text: ' de Nimrod qui se mit à exercer un grand pouvoir sur la terre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'C’était un valeureux chasseur devant l’Eternel. De là vient l’expression : « valeureux chasseur devant l’Eternel comme Nimrod ». '
