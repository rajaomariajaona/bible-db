document_id: GEN.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’histoire de la famille des fils de Noé
  - type: heading
    content: L’origine des divers peuples
  - type: text
    content: 'Voici la généalogie des fils de Noé : Sem, Cham et Japhet. Ils eurent des enfants après le déluge.'
  '10':
  - type: text
    content: Les capitales de son royaume furent Babel, Erek, Akkad et Kalné
  - type: note
    content: 'Autre traduction : Il commença à régner à Babel, puis à Erek, Akkad et Kalné.'
  - type: text
    content: ' au pays de Shinéar'
  - type: note
    content: C’est-à-dire l’ancienne Babylonie.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'De ce pays-là, il passa en Assyrie et bâtit Ninive, Rehoboth-Ir, Kalah, '
  '12':
  - type: text
    content: et Résen, la plus grande cité entre Ninive et Kalah.
  '13':
  - type: text
    content: Mitsraïm fut l’ancêtre des Loudim, des Anamim, des Lehabim, des Naphtouim
  - type: note
    content: Différents peuples d’Egypte et des environs.
  - type: text
    content: ', '
  '14':
  - type: text
    content: des Patrousim, des Kaslouhim – dont sont issus les Philistins
  - type: note
    content: Les Philistins, peuple indo-européen, ont tout d’abord émigré en Crète (voir Jr 47.4 ; Am 9.7) puis ont envahi l’Egypte au début du xiie siècle av. J.-C. Chassés de cette région, ils se sont installés sur la côte de Canaan pour étendre plus tard leur influence sur presque tout le pays.
  - type: text
    content: ' – et des Crétois.'
  '15':
  - type: text
    content: Canaan
  - type: note
    content: Les peuples mentionnés aux v. 15-19 vivaient tous sur un territoire correspondant à la Syrie et au pays d’Israël. Sur Heth, voir note 23.3.
  - type: text
    content: ' eut pour fils Sidon, son aîné, et Heth. '
  '16':
  - type: text
    content: 'De lui descendent les Yebousiens, les Amoréens, les Guirgasiens, '
  '17':
  - type: text
    content: 'les Héviens, les Arqiens et les Siniens, '
  '18':
  - type: text
    content: 'les Arvadiens, les Tsemariens et les Hamathiens. Ensuite les différentes tribus des Cananéens se dispersèrent. '
  '19':
  - type: text
    content: 'Le territoire des Cananéens s’étendait de Sidon, en direction de Guérar, jusqu’à Gaza et en direction de Sodome, de Gomorrhe, d’Adma et de Tseboïm jusqu’à Lésha. '
  '2':
  - type: text
    content: 'Fils de Japhet : Gomer'
  - type: note
    content: 'Gomer: les Cimmériens, peuple d’Asie Mineure. Magog: peut-être une peuplade scythe qui habitait le Caucase et les régions au sud-est de la mer Noire. Madaï: les Mèdes. Yavân: les Ioniens, au sud de la Grèce, et plus tard les Grecs en général. Toubal et Méshek: mentionnés avec Magog dans des inscriptions assyriennes (voir Ez 38.2). Tiras: probablement les Etrusques en Italie.'
  - type: text
    content: ', Magog, Madaï, Yavân, Toubal, Méshek et Tiras.'
  '20':
  - type: text
    content: Tels sont les descendants de Cham selon leurs familles et leurs langues, dans leurs divers pays et leurs peuples.
  '21':
  - type: text
    content: Sem aussi, le frère aîné de Japhet, eut une descendance. Il fut l’ancêtre d’Héber et de ses descendants.
  '22':
  - type: text
    content: 'Les descendants de Sem furent : Elam, Assour, Arpakshad, Loud et Aram'
  - type: note
    content: 'Elam: les Elamites, à l’est de la Mésopotamie, autour de Suse. Assour: ancien nom de l’Assyrie, au nord de la Mésopotamie. Arpakshad: voir 11.10-13  ; peut-être une désignation hébraïque de la Chaldée, au sud de la Mésopotamie. Loud: soit les Lydiens (en Asie Mineure), soit une région voisine de l’Egypte. Aram: les Araméens ou Syriens.'
  - type: text
    content: .
  '23':
  - type: text
    content: 'Les descendants d’Aram furent : Outs, Houl, Guéter et Mash'
  - type: note
    content: 'L’ancienne version grecque et 1 Ch 1.17 ont : Méshek.'
  - type: text
    content: .
  '24':
  - type: text
    content: Arpakshad eut pour fils Shélah, et Shélah
  - type: note
    content: 'L’ancienne version grecque a : Arpakshad eut pour descendant Caïnan, Caïnan eut pour descendant Shélah. Voir aussi Gn 11.12-13.'
  - type: text
    content: ' eut pour fils Héber. '
  '25':
  - type: text
    content: 'Héber eut deux fils : l’un s’appelait Péleg (Partage), parce que de son temps la terre fut partagée, et son frère s’appelait Yoqtân.'
  '26':
  - type: text
    content: 'Yoqtân eut pour fils Almodad, Shéleph, Hatsarmaveth, Yérah, '
  '27':
  - type: text
    content: 'Hadoram, Ouzal, Diqla, '
  '28':
  - type: text
    content: 'Obal, Abimaël, Saba, '
  '29':
  - type: text
    content: 'Ophir, Havila et Yobab. Tous ceux-là étaient des descendants de Yoqtân. '
  '3':
  - type: text
    content: 'Fils de Gomer : Ashkenaz'
  - type: note
    content: 'Ashkenaz: les Scythes. Les trois peuples mentionnés vivaient dans le haut Euphrate.'
  - type: text
    content: ', Riphat et Togarma.'
  '30':
  - type: text
    content: Ils habitaient la contrée s’étendant de Mésha jusque du côté de Sephar, la montagne d’orient.
  '31':
  - type: text
    content: 'Tels sont les descendants de Sem selon leurs familles et leurs langues, dans leurs divers pays, selon leurs peuples. '
  '32':
  - type: text
    content: Telles sont les familles issues des fils de Noé selon leurs lignées et d’après leur appartenance nationale. C’est d’eux que sont issus tous les peuples qui se sont répandus sur la terre après le déluge.
  '4':
  - type: text
    content: 'Fils de Yavân : Elisha, Tarsis, Kittim et Dodanim'
  - type: note
    content: 'Le Pentateuque samaritain, quelques manuscrits du texte hébreu traditionnel, la version grecque et 1 Ch 1.7 ont : Rodanim. Tarsis : peut-être le sud de l’Espagne. Kittim: nom de l’île de Chypre. Rodanim : nom de la ville de Rhodes.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Ce sont leurs descendants qui ont peuplé les îles et les régions côtières. Ils se sont répartis par pays selon la langue et par familles dans chaque peuple.
  '6':
  - type: text
    content: 'Les fils de Cham furent : Koush'
  - type: note
    content: 'Koush: le haut Nil, l’Ethiopie et la Nubie. Mitsraïm: l’Egypte. Pouth: soit la Libye, soit la côte des Somalis.'
  - type: text
    content: ', Mitsraïm, Pouth et Canaan.'
  '7':
  - type: text
    content: 'Les fils de Koush : Seba, Havila, Sabta, Raema et Sabteka. Les fils de Raema : Sheba et Dedân'
  - type: note
    content: Ces sept peuples koushites se situaient tous en Arabie.
  - type: text
    content: .
  '8':
  - type: text
    content: Koush fut le père
  - type: note
    content: Le terme père pourrait aussi signifier fondateur ou chef.
  - type: text
    content: ' de Nimrod qui se mit à exercer un grand pouvoir sur la terre. '
  '9':
  - type: text
    content: 'C’était un valeureux chasseur devant l’Eternel. De là vient l’expression : « valeureux chasseur devant l’Eternel comme Nimrod ». '
