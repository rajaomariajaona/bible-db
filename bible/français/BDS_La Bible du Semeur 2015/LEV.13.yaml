document_id: LEV.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois sur les maladies de peau évolutives et les moisissures
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les maladies de la peau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse et à Aaron en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si une boursouflure, une dartre ou une tache sur la peau de quelqu’un devient une plaie qui fait suspecter une maladie de peau évolutive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot hébreu traditionnellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lèpre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était utilisé pour différentes affections graves de la peau que nous n’appellerions pas lèpre. Ce même mot est utilisé pour des moisissures sur des tissus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13.47-59
        metadata:
          usfm: LEV.13.47+LEV.13.48+LEV.13.49+LEV.13.50+LEV.13.51+LEV.13.52+LEV.13.53+LEV.13.54+LEV.13.55+LEV.13.56+LEV.13.57+LEV.13.58+LEV.13.59
      - type: text
        text: ) ou sur des murs (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14.33-53
        metadata:
          usfm: LEV.14.33+LEV.14.34+LEV.14.35+LEV.14.36+LEV.14.37+LEV.14.38+LEV.14.39+LEV.14.40+LEV.14.41+LEV.14.42+LEV.14.43+LEV.14.44+LEV.14.45+LEV.14.46+LEV.14.47+LEV.14.48+LEV.14.49+LEV.14.50+LEV.14.51+LEV.14.52+LEV.14.53
      - type: text
        text: '). D’où la traduction : « maladie de peau évolutive » ou « à caractère infectieux ». Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14.54-57
        metadata:
          usfm: LEV.14.54+LEV.14.55+LEV.14.56+LEV.14.57
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', on l’amènera au prêtre Aaron ou à l’un de ses descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celui-ci examinera cette affection de la peau. Si, à l’endroit malade, les poils sont devenus blancs et si la plaie forme un creux dans la peau, c’est bien un cas de maladie de peau évolutive. Sur la base de l’examen, le prêtre déclarera cette personne impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais si la tache blanche ne forme pas de creux visible de la peau, et si le poil n’est pas devenu blanc, le prêtre isolera le sujet pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le septième jour, il l’examinera. S’il constate que le mal est resté stationnaire sans s’étendre sur la peau, il isolera le malade une deuxième semaine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'puis il procédera à un nouvel examen. Si la partie malade s’est estompée, et ne s’est pas étendue sur la peau, le prêtre déclarera cet homme pur ; c’est une simple dartre. La personne nettoiera ses vêtements et sera pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais si la dartre s’étend sur la peau après que le prêtre a examiné la personne et l’ait déclarée pure, celle-ci retournera se faire examiner par le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si celui-ci constate une extension de la dartre sur la peau, il déclarera la personne impure : c’est une maladie de peau évolutive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’un homme sera suspecté d’être atteint d’une maladie de peau évolutive, on l’amènera au prêtre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'qui l’examinera. S’il constate une boursouflure blanche sur la peau qui ait fait blanchir le poil et qu’il y ait un bourgeonnement de chair vive dans la tumeur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'c’est une maladie de peau infectieuse et chronique. Le prêtre déclarera cet homme impur ; il ne sera pas nécessaire de l’isoler, car il est manifestement impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais si cette affection s’étend sur toute la peau du malade et le couvre de la tête aux pieds, où que porte le regard du prêtre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'celui-ci procédera à un nouvel examen. S’il constate que l’éruption couvre tout le corps du malade, il le déclarera pur : puisqu’il est devenu complètement blanc, il est pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toutefois, le jour où l’on apercevra sur lui de la chair vive, il devient impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après avoir constaté la présence de cette chair vive, le prêtre déclarera la personne impure : la chair vive est impure : c’est une maladie de peau évolutive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si la chair vive redevient blanche, la personne retournera auprès du prêtre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: qui l’examinera. S’il constate que la plaie est effectivement devenue blanche, il déclarera la chair pure, et la personne sera en état de pureté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si quelqu’un avait sur la peau un abcès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'furoncle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ulcère.
    marker-yv: yv-n
  - type: text
    text: ' qui a guéri, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais qu’à la place de cet abcès apparaisse une boursouflure blanche ou une tache d’un blanc rougeâtre, cette personne se fera examiner par le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si celui-ci constate un creux dans la peau et un blanchissement du poil, il déclarera cette personne impure : c’est une affection de peau infectieuse qui est en train de bourgeonner dans l’abcès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais si, à l’examen, le prêtre constate qu’il n’y a pas de poil blanc à cet endroit, ni de creux dans la peau et que la tache s’est estompée, il isolera le malade pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si la tache s’étend sur la peau, il le déclarera impur : c’est une plaie infectieuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais si la tache est restée stationnaire, sans s’étendre, ce n’est que la cicatrice de l’abcès ; alors le prêtre le déclarera pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Autre cas : lorsque la peau de quelqu’un aura une brûlure causée par le feu et qu’il se forme sur l’endroit de cette brûlure une tache blanche ou d’un blanc rougeâtre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: le prêtre l’examinera ; si le poil a viré au blanc dans la tache et s’il y a un creux dans la peau, c’est une affection de peau infectieuse qui s’est développée sur la brûlure. Le prêtre déclarera cette personne impure, car elle est atteinte d’une maladie de peau évolutive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si, au contraire, le prêtre, à l’examen, ne constate pas de poils blancs dans la tache, ni de creux dans la peau, et si la tache s’est estompée, il isolera le sujet pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il l’examinera le septième jour, si la tache s’est étendue sur la peau, il le déclarera impur : c’est une plaie infectieuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais si la tache est restée stationnaire, sans s’étendre, et qu’elle s’est estompée, c’était une boursouflure due à la brûlure ; le prêtre déclarera donc le sujet pur, car c’est la cicatrice de la brûlure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Si un homme ou une femme a une plaie à la tête ou au menton, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le prêtre examinera cette plaie. Si elle forme un creux dans la peau et qu’il s’y trouve du poil jaunâtre ou clairsemé, il déclarera cette personne impure : c’est la teigne, c’est-à-dire une maladie de peau infectieuse de la tête ou du menton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mais si le prêtre constate, à l’examen, qu’il n’y a pas de creux visible de la peau, sans toutefois qu’il y ait de poil noir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne version grecque porte « poil jaunâtre ».
    marker-yv: yv-n
  - type: text
    text: ', il isolera le sujet pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le septième jour, s’il constate que l’éruption ne s’est pas étendue, qu’elle ne renferme pas de poil de couleur jaunâtre et que la plaie ne semble pas plus profonde que la peau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'le malade se rasera – sauf à l’endroit de la plaie – et le prêtre l’isolera de nouveau pour sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le septième jour, il examinera le mal. Si le mal ne s’est pas étendu sur la peau et s’il ne forme pas de creux visible, il le déclarera pur ; le sujet nettoiera ses vêtements et il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais si la teigne s’est étendue sur la peau après que le malade a été déclaré pur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'le prêtre en fera le constat et n’aura pas besoin de vérifier si le poil est de couleur jaunâtre : la personne est impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Si le mal semble stationnaire et que des poils sombres ont poussé à l’endroit malade, c’est qu’il est guéri et pur. Le prêtre déclarera la personne pure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Si un homme ou une femme a des taches blanches sur la peau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'le prêtre l’examinera ; si les taches sont d’un blanc pâle, c’est une éruption bénigne : le sujet est pur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Lorsqu’un homme perd ses cheveux, c’est une calvitie ; il est pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Si la tête se dégarnit sur le devant, c’est une calvitie du front ; il est pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais si une plaie d’un blanc rougeâtre apparaît dans la partie chauve sur la tête ou sur le front, c’est une plaie infectieuse qui a bourgeonné dans la partie chauve ou sur le front. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Si, à l’examen, le prêtre constate que la plaie provoque une boursouflure d’un blanc rougeâtre sur le crâne ou sur le front chauve, et qu’elle a l’aspect d’une maladie évolutive de la peau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: l’homme a une maladie infectieuse, il est impur, et le prêtre doit le déclarer impur. C’est à la tête que le mal l’a frappé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: La personne atteinte d’une telle maladie de la peau portera des vêtements déchirés et aura la tête décoiffée ; elle se couvrira la partie inférieure du visage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manifestations habituelles du deuil (Lv 10.6 ; Ez 24.17).
    marker-yv: yv-n
  - type: text
    text: ' et criera : « Impur ! Impur ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Tant qu’elle a ce mal, elle est impure. Elle habitera à l’écart, à l’extérieur du camp.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les moisissures sur les habits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Si une tache de moisissure apparaît sur des vêtements en laine ou en lin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ou sur un tissu ou un tricot de lin ou de laine, ou encore sur une peau ou sur un objet en cuir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: si elle devient verdâtre ou rougeâtre, sur le vêtement ou sur la peau, sur le tissu ou le tricot ou sur tout objet en cuir, c’est une sorte d’infection
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir note v. 2.
    marker-yv: yv-n
  - type: text
    text: ' des tissus : on la montrera au prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Celui-ci l’examinera et enfermera l’objet atteint pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Le septième jour, il examinera la tache. Si elle s’est étendue sur le vêtement, le tissu ou le tricot, sur la peau ou l’objet en cuir, il s’agit d’une moisissure maligne ; l’objet est impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il le brûlera, quel qu’il soit, car il s’agit d’une moisissure maligne ; l’objet doit être brûlé au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Mais si le prêtre constate que la tache ne s’est pas étendue sur l’objet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'il ordonnera de le laver, puis il le tiendra enfermé une deuxième semaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Après ce lavage, il examinera à nouveau la tache ; si elle n’a pas changé d’aspect de façon visible, même si elle ne s’est pas étendue, l’objet est impur et devra être brûlé, que la moisissure l’ait corrodé à l’endroit ou à l’envers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Mais si le prêtre voit que la tache s’est estompée après le lavage, il arrachera cette partie du vêtement, de la peau, du tissu ou du tricot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Si la tache réapparaît plus tard sur l’objet, c’est une moisissure qui se développe, tu brûleras l’objet où est la tache. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Quant au vêtement, au tissu, au tricot, ou à l’objet en cuir que tu auras lavé et d’où la tache aura disparu, tu le laveras une seconde fois, et il sera pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Telle est la loi relative à une tache de moisissure sur un vêtement de laine ou de lin, sur un tissu ou un tricot ou sur tout objet de cuir selon laquelle on déterminera s’il est pur ou impur.
