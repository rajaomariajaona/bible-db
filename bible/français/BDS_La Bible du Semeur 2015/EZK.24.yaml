document_id: EZK.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Derniers avertissements
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La marmite pleine de vert-de-gris
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le dixième jour du dixième mois, dans la neuvième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire en janvier 588 av. J.-C. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 25.1
        metadata:
          usfm: 2KI.25.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel m’adressa la parole et me dit :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils d’homme, note par écrit la date d’aujourd’hui, de façon précise car, aujourd’hui même, le roi de Babylone a commencé les opérations contre Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raconte une parabole à la communauté rebelle. Dis-lui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '« Voici ce que déclare ╵le Seigneur, l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prépare la marmite, ╵mets-la en place ╵et verses-y de l’eau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 3-14, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11.3-7
        metadata:
          usfm: EZK.11.3+EZK.11.4+EZK.11.5+EZK.11.6+EZK.11.7
      - type: text
        text: '. La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'marmite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est Jérusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.3'
        metadata:
          usfm: EZK.11.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mets-y de bons morceaux de viande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tous les meilleurs morceaux : ╵le gigot et l’épaule.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Finis de la remplir ╵avec des os de choix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Prends les meilleurs moutons ╵dans le troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis entasse le bois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le bois. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les os. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence tient à une lettre en hébreu ; cela s’explique par la proximité du mot « os », à la fin du verset.
    marker-yv: yv-n
  - type: text
    text: ' sous la marmite.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-la bouillir à gros bouillons !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que même les os cuisent ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : « Malheur à la ville meurtrière, marmite couverte de vert-de-gris, et dont le vert-de-gris ne s’en va pas ! Retirez-en les morceaux les uns après les autres sans tirer au sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car le sang qu’elle a versé est toujours au milieu d’elle. Il n’a pas été répandu sur la terre où la poussière l’aurait recouvert ; non : elle l’a versé sur la roche nue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pour faire déborder ma colère et lui faire payer ses crimes, j’ai fait verser ce sang sur la roche nue pour qu’il ne soit pas recouvert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C’est pourquoi le Seigneur, l’Eternel, déclare ceci : Malheur à la ville sanguinaire ! Moi aussi, je dresserai un grand bûcher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Entasse du bois en quantité, allume le feu, fais cuire complètement la viande, ajoute les épices et que les os soient calcinés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ensuite, tu mettras la marmite vide sur des braises pour qu’elle chauffe, que son cuivre rougisse et que ses impuretés se fondent à l’intérieur, et que son vert-de-gris soit consumé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais tous ces efforts sont inutiles : le vert-de-gris dont elle est couverte en quantité ne partira pas par le feu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jérusalem, ta conduite immorale t’a rendue impure. J’ai voulu te purifier de ta souillure, mais tu ne t’es pas laissé purifier. Tu ne pourras plus être purifiée jusqu’à ce que j’aie assouvi ma colère contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Moi, l’Eternel, j’ai parlé. L’heure est venue et je vais agir. Je ne me retiendrai pas, je n’aurai pas de pitié, je ne reviendrai pas sur ma décision. Tu seras jugée selon ta conduite et selon tes actes, le Seigneur, l’Eternel, le déclare. »
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le deuil d’Ezéchiel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils d’homme, je vais t’enlever, par une mort soudaine, celle qui charme tes yeux, mais tu ne porteras pas le deuil, tu ne pleureras pas, tu ne verseras aucune larme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Désole-toi en silence, mais n’accomplis pas de rites funèbres. Mets ton turban sur la tête et tes sandales aux pieds. Ne te couvre pas la moustache et n’accepte pas le pain de condoléances des voisins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le matin, je m’adressai au peuple, et le soir même, mon épouse mourut. Le lendemain matin, j’agis conformément à ce qui m’avait été ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors les gens me demandèrent : Pourquoi agis-tu de la sorte ? Nous expliqueras-tu ce que cela signifie pour nous ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je leur répondis : L’Eternel m’a adressé la parole en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '« Dis à la communauté d’Israël : Voici ce que déclare le Seigneur, l’Eternel : Je vais profaner mon sanctuaire dont vous tirez votre orgueil et votre force, qui charme vos yeux et qui est l’objet de votre sollicitude. Vos fils et vos filles que vous avez laissés là-bas tomberont par l’épée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et vous agirez comme j’ai agi : vous ne vous couvrirez pas la moustache et vous ne mangerez pas le pain de condoléances de vos voisins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous garderez vos turbans sur la tête et vos sandales aux pieds. Vous ne porterez pas le deuil et vous ne pleurerez pas, mais vous dépérirez à cause de vos péchés et vous gémirez les uns auprès des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce qu’Ezéchiel a fait vous servira de signe : quand cela arrivera, vous agirez exactement comme il a agi, et vous reconnaîtrez que je suis le Seigneur, l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et maintenant, fils d’homme, écoute : le jour vient où je leur reprendrai le sanctuaire qui fait leur force, leur joie, leur parure, qui charme leurs yeux et qui fait l’objet de leur sollicitude ; ainsi que leurs fils et leurs filles'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.25 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reprendrai leur sanctuaire… filles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir v. 21). Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reprendrai ce qui fait leur force, leur joie, leur parure, qui charme leurs yeux et qui fait l’objet de leur sollicitude : leurs fils et leurs filles.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En ce jour-là, un rescapé arrivera vers toi pour annoncer la nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En ce jour-là, quand ce rescapé arrivera, tu pourras ouvrir la bouche et tu parleras ; tu ne seras plus muet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.26'
        metadata:
          usfm: EZK.3.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Tu leur serviras de signe. Et ils reconnaîtront que je suis l’Eternel. »
