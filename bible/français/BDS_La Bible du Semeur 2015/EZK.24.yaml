document_id: EZK.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Derniers avertissements
  - type: heading
    content: La marmite pleine de vert-de-gris
  - type: text
    content: Le dixième jour du dixième mois, dans la neuvième année
  - type: note
    content: C’est-à-dire en janvier 588 av. J.-C. Voir 2 R 25.1.
  - type: text
    content: ', l’Eternel m’adressa la parole et me dit :'
  '10':
  - type: text
    content: 'Entasse du bois en quantité, allume le feu, fais cuire complètement la viande, ajoute les épices et que les os soient calcinés. '
  '11':
  - type: text
    content: 'Ensuite, tu mettras la marmite vide sur des braises pour qu’elle chauffe, que son cuivre rougisse et que ses impuretés se fondent à l’intérieur, et que son vert-de-gris soit consumé. '
  '12':
  - type: text
    content: 'Mais tous ces efforts sont inutiles : le vert-de-gris dont elle est couverte en quantité ne partira pas par le feu.'
  '13':
  - type: text
    content: 'Jérusalem, ta conduite immorale t’a rendue impure. J’ai voulu te purifier de ta souillure, mais tu ne t’es pas laissé purifier. Tu ne pourras plus être purifiée jusqu’à ce que j’aie assouvi ma colère contre toi. '
  '14':
  - type: text
    content: Moi, l’Eternel, j’ai parlé. L’heure est venue et je vais agir. Je ne me retiendrai pas, je n’aurai pas de pitié, je ne reviendrai pas sur ma décision. Tu seras jugée selon ta conduite et selon tes actes, le Seigneur, l’Eternel, le déclare. »
  - type: heading
    content: Le deuil d’Ezéchiel
  '15':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '16':
  - type: text
    content: 'Fils d’homme, je vais t’enlever, par une mort soudaine, celle qui charme tes yeux, mais tu ne porteras pas le deuil, tu ne pleureras pas, tu ne verseras aucune larme. '
  '17':
  - type: text
    content: Désole-toi en silence, mais n’accomplis pas de rites funèbres. Mets ton turban sur la tête et tes sandales aux pieds. Ne te couvre pas la moustache et n’accepte pas le pain de condoléances des voisins.
  '18':
  - type: text
    content: 'Le matin, je m’adressai au peuple, et le soir même, mon épouse mourut. Le lendemain matin, j’agis conformément à ce qui m’avait été ordonné. '
  '19':
  - type: text
    content: 'Alors les gens me demandèrent : Pourquoi agis-tu de la sorte ? Nous expliqueras-tu ce que cela signifie pour nous ?'
  '2':
  - type: text
    content: Fils d’homme, note par écrit la date d’aujourd’hui, de façon précise car, aujourd’hui même, le roi de Babylone a commencé les opérations contre Jérusalem.
  '20':
  - type: text
    content: 'Je leur répondis : L’Eternel m’a adressé la parole en ces termes : '
  '21':
  - type: text
    content: '« Dis à la communauté d’Israël : Voici ce que déclare le Seigneur, l’Eternel : Je vais profaner mon sanctuaire dont vous tirez votre orgueil et votre force, qui charme vos yeux et qui est l’objet de votre sollicitude. Vos fils et vos filles que vous avez laissés là-bas tomberont par l’épée. '
  '22':
  - type: text
    content: 'Et vous agirez comme j’ai agi : vous ne vous couvrirez pas la moustache et vous ne mangerez pas le pain de condoléances de vos voisins. '
  '23':
  - type: text
    content: 'Vous garderez vos turbans sur la tête et vos sandales aux pieds. Vous ne porterez pas le deuil et vous ne pleurerez pas, mais vous dépérirez à cause de vos péchés et vous gémirez les uns auprès des autres. '
  '24':
  - type: text
    content: 'Ce qu’Ezéchiel a fait vous servira de signe : quand cela arrivera, vous agirez exactement comme il a agi, et vous reconnaîtrez que je suis le Seigneur, l’Eternel.'
  '25':
  - type: text
    content: 'Et maintenant, fils d’homme, écoute : le jour vient où je leur reprendrai le sanctuaire qui fait leur force, leur joie, leur parure, qui charme leurs yeux et qui fait l’objet de leur sollicitude ; ainsi que leurs fils et leurs filles'
  - type: note
    content: 'reprendrai leur sanctuaire… filles (voir v. 21). Autre traduction : reprendrai ce qui fait leur force, leur joie, leur parure, qui charme leurs yeux et qui fait l’objet de leur sollicitude : leurs fils et leurs filles.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'En ce jour-là, un rescapé arrivera vers toi pour annoncer la nouvelle. '
  '27':
  - type: text
    content: En ce jour-là, quand ce rescapé arrivera, tu pourras ouvrir la bouche et tu parleras ; tu ne seras plus muet
  - type: note
    content: Voir 3.26.
  - type: text
    content: . Tu leur serviras de signe. Et ils reconnaîtront que je suis l’Eternel. »
  '3':
  - type: text
    content: 'Raconte une parabole à la communauté rebelle. Dis-lui :'
  - type: text
    content: '« Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: text
    content: Prépare la marmite, ╵mets-la en place ╵et verses-y de l’eau
  - type: note
    content: Pour les v. 3-14, voir 11.3-7. La marmite est Jérusalem (11.3).
  - type: text
    content: .
  '4':
  - type: text
    content: Mets-y de bons morceaux de viande,
  - type: text
    content: 'tous les meilleurs morceaux : ╵le gigot et l’épaule.'
  - type: text
    content: Finis de la remplir ╵avec des os de choix.
  '5':
  - type: text
    content: Prends les meilleurs moutons ╵dans le troupeau,
  - type: text
    content: puis entasse le bois
  - type: note
    content: 'le bois. Le texte hébreu traditionnel a : les os. La différence tient à une lettre en hébreu ; cela s’explique par la proximité du mot « os », à la fin du verset.'
  - type: text
    content: ' sous la marmite.'
  - type: text
    content: Fais-la bouillir à gros bouillons !
  - type: text
    content: Que même les os cuisent ! »
  '6':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : « Malheur à la ville meurtrière, marmite couverte de vert-de-gris, et dont le vert-de-gris ne s’en va pas ! Retirez-en les morceaux les uns après les autres sans tirer au sort. '
  '7':
  - type: text
    content: 'Car le sang qu’elle a versé est toujours au milieu d’elle. Il n’a pas été répandu sur la terre où la poussière l’aurait recouvert ; non : elle l’a versé sur la roche nue. '
  '8':
  - type: text
    content: Pour faire déborder ma colère et lui faire payer ses crimes, j’ai fait verser ce sang sur la roche nue pour qu’il ne soit pas recouvert.
  '9':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, déclare ceci : Malheur à la ville sanguinaire ! Moi aussi, je dresserai un grand bûcher. '
