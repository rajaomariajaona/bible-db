document_id: MRK.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La culpabilité des chefs religieux juifs
  - type: heading
    content: (Mt 21.33-46 ; Lc 20.9-19)
  - type: text
    content: 'Puis il se mit à leur parler en utilisant des paraboles : '
  - type: text
    content: 'Un homme '
  - type: text
    content: planta une vigne
  - type: text
    content: ', l’entoura d’une haie, '
  - type: text
    content: creusa un pressoir, et bâtit une tour de guet
  - type: note
    content: Es 5.1-2.
  - type: text
    content: . Après cela, il la loua à des vignerons et partit en voyage.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'N’avez-vous pas lu ces paroles de l’Ecriture :'
  '11':
  - type: text
    content: ' '
  - type: text
    content: La pierre que les constructeurs
  - type: text
    content: ' ╵'
  - type: text
    content: ont rejetée
  - type: text
    content: est devenue la pierre principale,
  - type: text
    content: ' ╵'
  - type: text
    content: la pierre d’angle.
  - type: text
    content: C’est du Seigneur
  - type: text
    content: ' ╵'
  - type: text
    content: que cela est venu
  - type: text
    content: et c’est un prodige à nos yeux
  - type: text
    content: ' '
  - type: note
    content: Ps 118.22-23 .
  - type: text
    content: .
  '12':
  - type: text
    content: Les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple cherchaient un moyen d’arrêter Jésus. Mais ils avaient peur des réactions de la foule. En effet, ils avaient bien compris que c’était eux que Jésus visait par cette parabole. Ils le laissèrent donc, et se retirèrent.
  - type: heading
    content: Controverse sur l’impôt dû à César
  - type: heading
    content: (Mt 22.15-22 ; Lc 20.20-26)
  '13':
  - type: text
    content: 'Cependant, ils lui envoyèrent une délégation de pharisiens et de membres du parti d’Hérode pour le prendre au piège de ses propres paroles. '
  '14':
  - type: text
    content: 'Ils vinrent lui dire : Maître, nous savons que tu dis la vérité et que tu ne te laisses influencer par personne, car tu ne regardes pas à la position sociale, mais tu enseignes en toute vérité la voie à suivre selon Dieu. Dis-nous : A-t-on, oui ou non, le droit de payer des impôts à César ?'
  '15':
  - type: text
    content: 'Mais Jésus, sachant combien ils étaient hypocrites, leur répondit : '
  - type: text
    content: Pourquoi me tendez-vous un piège ? Apportez-moi une pièce d’argent, que je la voie !
  '16':
  - type: text
    content: Ils lui en apportèrent une.
  - type: text
    content: 'Alors il leur demanda : '
  - type: text
    content: Cette effigie et cette inscription, de qui sont-elles ?
  - type: text
    content: – De César.
  '17':
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: Rendez à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
  - type: text
    content: Ils en restèrent tout déconcertés.
  - type: heading
    content: Controverse sur la résurrection
  - type: heading
    content: (Mt 22.23-33 ; Lc 20.27-40)
  '18':
  - type: text
    content: 'Des sadducéens vinrent aussi le trouver. Ils prétendent que les morts ne ressuscitent pas. Ils lui demandèrent : '
  '19':
  - type: text
    content: 'Maître, dans ses écrits, Moïse nous a laissé ce commandement : '
  - type: text
    content: Si un homme meurt en laissant une femme mais sans avoir eu d’enfant, son frère devra épouser sa veuve et donner une descendance au défunt
  - type: note
    content: Dt 25.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '2':
  - type: text
    content: Au moment des vendanges il envoya un de ses serviteurs aux vignerons pour recevoir la part du produit de sa vigne qui lui revenait.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Or, il y avait sept frères. L’aîné s’est marié et il est mort sans laisser de descendant. '
  '21':
  - type: text
    content: 'Le deuxième a épousé la veuve, puis il est décédé, lui aussi, sans avoir eu de descendant. Le troisième a fait de même. '
  '22':
  - type: text
    content: 'Et ainsi de suite. Bref, les sept sont morts sans laisser de descendance. La femme est restée la dernière, puis elle est morte. '
  '23':
  - type: text
    content: A la résurrection, quand ils ressusciteront tous, duquel d’entre eux sera-t-elle la femme ? Car tous les sept l’ont eue pour épouse.
  '24':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: 'Vous êtes dans l’erreur, et en voici la raison : vous ne connaissez pas les Ecritures, ni quelle est la puissance de Dieu.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'En effet, une fois ressuscités, les hommes et les femmes ne se marieront plus ; ils vivront comme les '
  - type: text
    content: anges
  - type: text
    content: ' qui sont dans le ciel.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Quant à la résurrection des morts, n’avez-vous jamais lu dans le livre de Moïse, lorsqu’il est question du buisson ardent, en quels termes Dieu lui a parlé ? Il lui a dit : '
  - type: text
    content: Je suis le Dieu d’
  - type: text
    content: Abraham
  - type: text
    content: ', le Dieu d’'
  - type: text
    content: Isaac
  - type: text
    content: ', le Dieu de '
  - type: text
    content: Jacob
  - type: note
    content: Ex 3.6, 15.
  - type: text
    content: .
  - type: text
    content: ' '
  '27':
  - type: text
    content: Dieu n’est pas le Dieu des morts, mais le Dieu des vivants. Oui, vous êtes complètement dans l’erreur.
  - type: heading
    content: Le plus grand commandement
  - type: heading
    content: (Mt 22.34-40)
  '28':
  - type: text
    content: 'Un des spécialistes de la Loi s’approcha de lui ; il avait entendu cette discussion et avait remarqué avec quel à-propos Jésus avait répondu. Il lui demanda : Quel est le commandement le plus important de tous ?'
  '29':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: 'Voici le commandement le plus important : '
  - type: text
    content: 'Ecoute, '
  - type: text
    content: Israël
  - type: text
    content: ', le Seigneur est notre Dieu, il est le seul Dieu ;'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Mais ceux-ci se précipitèrent sur ce serviteur, le rouèrent de coups et le renvoyèrent les mains vides.
  - type: text
    content: ' '
  '30':
  - type: text
    content: tu aimeras donc le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée et de toute ton énergie
  - type: note
    content: Dt 6.4-5.
  - type: text
    content: .
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Et voici celui qui vient en second rang : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: note
    content: Lv 19.18.
  - type: text
    content: . Il n’y a pas de commandement plus important que ceux-là.
  '32':
  - type: text
    content: '– C’est bien, Maître, lui dit le spécialiste de la Loi, tu as dit vrai : il n’y a qu’un seul Dieu'
  - type: note
    content: Dt 6.4.
  - type: text
    content: ', il n’y en a pas d’autre que lui'
  - type: note
    content: Dt 4.35 ; Es 45.21.
  - type: text
    content: '  : '
  '33':
  - type: text
    content: l’aimer de tout son cœur, de toute son intelligence et de toute son énergie
  - type: note
    content: Dt 6.5.
  - type: text
    content: ', ainsi qu’aimer son prochain comme soi-même'
  - type: note
    content: Lv 19.18.
  - type: text
    content: ', c’est bien plus important que tous les holocaustes'
  - type: note
    content: Les holocaustes étaient les sacrifices les plus importants, dans lesquels les victimes étaient entièrement brûlées, c’est-à-dire entièrement consacrées à Dieu.
  - type: text
    content: ' et tous les sacrifices.'
  '34':
  - type: text
    content: 'Jésus, voyant qu’il avait répondu avec intelligence, lui dit : '
  - type: text
    content: 'Tu n’es pas loin du '
  - type: text
    content: royaume de Dieu
  - type: text
    content: .
  - type: text
    content: Après cela, personne n’osa plus lui poser de question.
  - type: heading
    content: Controverse sur l’identité du Messie
  - type: heading
    content: (Mt 22.41-46 ; Lc 20.41-44)
  '35':
  - type: text
    content: 'Pendant qu’il enseignait dans la cour du Temple, Jésus demanda : '
  - type: text
    content: 'Comment les '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: ' peuvent-ils dire que le '
  - type: text
    content: Messie
  - type: text
    content: ' doit être un descendant de '
  - type: text
    content: David
  - type: text
    content: '  ?'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'David lui-même, inspiré par le Saint-Esprit, a déclaré :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
  - type: text
    content: jusqu’à ce que j’aie mis
  - type: text
    content: ' ╵'
  - type: text
    content: tes ennemis
  - type: text
    content: ' ╵'
  - type: text
    content: à terre sous tes pieds
  - type: text
    content: ' '
  - type: note
    content: Ps 110.1 .
  - type: text
    content: .
  '37':
  - type: text
    content: ' '
  - type: text
    content: Si donc David lui-même appelle le Messie « Seigneur », comment celui-ci peut-il être son descendant ?
  - type: text
    content: Il y avait là une foule nombreuse qui écoutait Jésus avec un vif plaisir.
  - type: heading
    content: La condamnation des spécialistes de la Loi
  - type: heading
    content: (Mt 23.1-12 ; Lc 20.45-47)
  '38':
  - type: text
    content: 'Il disait dans son enseignement : '
  - type: text
    content: 'Gardez-vous des spécialistes de la Loi : ils aiment à parader en costume de cérémonie, à être salués sur les places publiques,'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'à avoir les sièges d’honneur dans les '
  - type: text
    content: synagogues
  - type: text
    content: ' et les meilleures places dans les banquets.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Alors le propriétaire leur envoya un deuxième serviteur : celui-là, ils le frappèrent à la tête et le couvrirent d’insultes.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: Mais ils dépouillent les veuves de leurs biens, tout en faisant de longues prières pour l’apparence. Leur condamnation n’en sera que plus sévère
  - type: text
    content: .
  - type: heading
    content: La vraie générosité
  - type: heading
    content: (Lc 21.1-4)
  '41':
  - type: text
    content: 'Puis Jésus s’assit en face du tronc ; il observait ceux qui y déposaient de l’argent. Beaucoup de riches y avaient déjà déposé de fortes sommes quand arriva une pauvre veuve '
  '42':
  - type: text
    content: qui déposa deux petites pièces, une somme minime.
  '43':
  - type: text
    content: 'Alors Jésus appela ses disciples et leur dit : '
  - type: text
    content: Vraiment, je vous l’assure, cette pauvre veuve a donné bien plus que tous ceux qui ont mis de l’argent dans le tronc.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Car tous les autres ont seulement donné de leur superflu, mais elle, dans sa pauvreté, elle a donné tout ce qu’elle possédait, tout ce qu’elle avait pour vivre.
  '5':
  - type: text
    content: Le maître leur en envoya un troisième, et celui-là, ils le tuèrent ; puis beaucoup d’autres, et ils battirent les uns et tuèrent les autres.
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'Il ne lui restait plus, désormais, qu’une seule personne à envoyer : son fils bien-aimé. Il le leur envoya en dernier. Il se disait : « Pour mon fils au moins, ils auront du respect. »'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Mais les vignerons se dirent entre eux : « Voilà l’héritier ! Venez ! Tuons-le ! Et l’héritage sera à nous ! »'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Et ils se jetèrent sur lui, le tuèrent et traînèrent son cadavre hors du vignoble.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Que va faire le propriétaire de la vigne ? Il viendra lui-même, fera exécuter les vignerons et confiera le soin de sa vigne à d’autres.
  - type: text
    content: ' '
