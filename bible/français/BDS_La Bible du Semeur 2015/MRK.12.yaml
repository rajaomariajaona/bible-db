document_id: MRK.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La culpabilité des chefs religieux juifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 21.33-46 ; Lc 20.9-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis il se mit à leur parler en utilisant des paraboles : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Un homme '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: planta une vigne
    - type: text
      text: ', l’entoura d’une haie, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: creusa un pressoir, et bâtit une tour de guet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 5.1-2
        metadata:
          usfm: ISA.5.1+ISA.5.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Après cela, il la loua à des vignerons et partit en voyage.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Au moment des vendanges il envoya un de ses serviteurs aux vignerons pour recevoir la part du produit de sa vigne qui lui revenait.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais ceux-ci se précipitèrent sur ce serviteur, le rouèrent de coups et le renvoyèrent les mains vides.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors le propriétaire leur envoya un deuxième serviteur : celui-là, ils le frappèrent à la tête et le couvrirent d’insultes.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le maître leur en envoya un troisième, et celui-là, ils le tuèrent ; puis beaucoup d’autres, et ils battirent les uns et tuèrent les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il ne lui restait plus, désormais, qu’une seule personne à envoyer : son fils bien-aimé. Il le leur envoya en dernier. Il se disait : « Pour mon fils au moins, ils auront du respect. »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais les vignerons se dirent entre eux : « Voilà l’héritier ! Venez ! Tuons-le ! Et l’héritage sera à nous ! »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ils se jetèrent sur lui, le tuèrent et traînèrent son cadavre hors du vignoble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que va faire le propriétaire de la vigne ? Il viendra lui-même, fera exécuter les vignerons et confiera le soin de sa vigne à d’autres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’avez-vous pas lu ces paroles de l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La pierre que les constructeurs
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ont rejetée
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: est devenue la pierre principale,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la pierre d’angle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est du Seigneur
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que cela est venu
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et c’est un prodige à nos yeux
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118.22-23
        metadata:
          usfm: PSA.118.22+PSA.118.23
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les chefs des prêtres, les spécialistes de la Loi et les responsables du peuple cherchaient un moyen d’arrêter Jésus. Mais ils avaient peur des réactions de la foule. En effet, ils avaient bien compris que c’était eux que Jésus visait par cette parabole. Ils le laissèrent donc, et se retirèrent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’impôt dû à César
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.15-22 ; Lc 20.20-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cependant, ils lui envoyèrent une délégation de pharisiens et de membres du parti d’Hérode pour le prendre au piège de ses propres paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils vinrent lui dire : Maître, nous savons que tu dis la vérité et que tu ne te laisses influencer par personne, car tu ne regardes pas à la position sociale, mais tu enseignes en toute vérité la voie à suivre selon Dieu. Dis-nous : A-t-on, oui ou non, le droit de payer des impôts à César ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Jésus, sachant combien ils étaient hypocrites, leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi me tendez-vous un piège ? Apportez-moi une pièce d’argent, que je la voie !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils lui en apportèrent une.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors il leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette effigie et cette inscription, de qui sont-elles ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – De César.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rendez à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils en restèrent tout déconcertés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur la résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.23-33 ; Lc 20.27-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Des sadducéens vinrent aussi le trouver. Ils prétendent que les morts ne ressuscitent pas. Ils lui demandèrent : '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maître, dans ses écrits, Moïse nous a laissé ce commandement : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si un homme meurt en laissant une femme mais sans avoir eu d’enfant, son frère devra épouser sa veuve et donner une descendance au défunt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 25.5
        metadata:
          usfm: DEU.25.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or, il y avait sept frères. L’aîné s’est marié et il est mort sans laisser de descendant. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le deuxième a épousé la veuve, puis il est décédé, lui aussi, sans avoir eu de descendant. Le troisième a fait de même. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et ainsi de suite. Bref, les sept sont morts sans laisser de descendance. La femme est restée la dernière, puis elle est morte. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A la résurrection, quand ils ressusciteront tous, duquel d’entre eux sera-t-elle la femme ? Car tous les sept l’ont eue pour épouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous êtes dans l’erreur, et en voici la raison : vous ne connaissez pas les Ecritures, ni quelle est la puissance de Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En effet, une fois ressuscités, les hommes et les femmes ne se marieront plus ; ils vivront comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' qui sont dans le ciel.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quant à la résurrection des morts, n’avez-vous jamais lu dans le livre de Moïse, lorsqu’il est question du buisson ardent, en quels termes Dieu lui a parlé ? Il lui a dit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis le Dieu d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', le Dieu d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Isaac
      - type: text
        text: ', le Dieu de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.26 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.6
        metadata:
          usfm: EXO.3.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: EXO.3.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu n’est pas le Dieu des morts, mais le Dieu des vivants. Oui, vous êtes complètement dans l’erreur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le plus grand commandement
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.34-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Un des spécialistes de la Loi s’approcha de lui ; il avait entendu cette discussion et avait remarqué avec quel à-propos Jésus avait répondu. Il lui demanda : Quel est le commandement le plus important de tous ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici le commandement le plus important : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Ecoute, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: ', le Seigneur est notre Dieu, il est le seul Dieu ;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu aimeras donc le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée et de toute ton énergie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.30 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.4-5
        metadata:
          usfm: DEU.6.4+DEU.6.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et voici celui qui vient en second rang : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Il n’y a pas de commandement plus important que ceux-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '– C’est bien, Maître, lui dit le spécialiste de la Loi, tu as dit vrai : il n’y a qu’un seul Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.32 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.4
        metadata:
          usfm: DEU.6.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', il n’y en a pas d’autre que lui'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 4.35 ; Es 45.21.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: l’aimer de tout son cœur, de toute son intelligence et de toute son énergie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.33 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.5
        metadata:
          usfm: DEU.6.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ainsi qu’aimer son prochain comme soi-même'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.33 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', c’est bien plus important que tous les holocaustes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'holocaustes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient les sacrifices les plus importants, dans lesquels les victimes étaient entièrement brûlées, c’est-à-dire entièrement consacrées à Dieu.
    marker-yv: yv-n
  - type: text
    text: ' et tous les sacrifices.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus, voyant qu’il avait répondu avec intelligence, lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu n’es pas loin du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Après cela, personne n’osa plus lui poser de question.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’identité du Messie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.41-46 ; Lc 20.41-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pendant qu’il enseignait dans la cour du Temple, Jésus demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comment les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: spécialistes de la Loi
    - type: text
      text: ' peuvent-ils dire que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' doit être un descendant de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
    - type: text
      text: '  ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'David lui-même, inspiré par le Saint-Esprit, a déclaré :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Viens siéger à ma droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jusqu’à ce que j’aie mis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tes ennemis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à terre sous tes pieds
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.36 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc David lui-même appelle le Messie « Seigneur », comment celui-ci peut-il être son descendant ?
- type: usfm
  marker: p
  children:
  - type: text
    text: Il y avait là une foule nombreuse qui écoutait Jésus avec un vif plaisir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La condamnation des spécialistes de la Loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 23.1-12 ; Lc 20.45-47)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il disait dans son enseignement : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Gardez-vous des spécialistes de la Loi : ils aiment à parader en costume de cérémonie, à être salués sur les places publiques,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'à avoir les sièges d’honneur dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' et les meilleures places dans les banquets.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais ils dépouillent les veuves de leurs biens, tout en faisant de longues prières pour l’apparence. Leur condamnation n’en sera que plus sévère
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vraie générosité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 21.1-4)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Puis Jésus s’assit en face du tronc ; il observait ceux qui y déposaient de l’argent. Beaucoup de riches y avaient déjà déposé de fortes sommes quand arriva une pauvre veuve '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: qui déposa deux petites pièces, une somme minime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Alors Jésus appela ses disciples et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, cette pauvre veuve a donné bien plus que tous ceux qui ont mis de l’argent dans le tronc.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car tous les autres ont seulement donné de leur superflu, mais elle, dans sa pauvreté, elle a donné tout ce qu’elle possédait, tout ce qu’elle avait pour vivre.
