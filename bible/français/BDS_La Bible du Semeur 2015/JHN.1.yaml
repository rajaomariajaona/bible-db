document_id: JHN.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Introduction : la parole de Dieu et son témoin'
  - type: text
    content: 'Au commencement était celui qui est la Parole de Dieu. Il était avec Dieu, il était lui-même Dieu. '
  '10':
  - type: text
    content: 'Celui qui est la Parole était déjà dans le monde, puisque Dieu a créé le monde par lui, et pourtant, le monde ne l’a pas reconnu. '
  '11':
  - type: text
    content: Il est venu chez lui, et les siens ne l’ont pas accueilli.
  '12':
  - type: text
    content: 'Certains pourtant l’ont accueilli ; ils ont cru en lui. A tous ceux-là, il a accordé le privilège de devenir enfants de Dieu. '
  '13':
  - type: text
    content: Ce n’est pas par une naissance naturelle, ni sous l’impulsion d’un désir, ou encore par la volonté d’un homme, qu’ils le sont devenus ; mais c’est de Dieu qu’ils sont nés.
  '14':
  - type: text
    content: 'Celui qui est la Parole est devenu homme et il a vécu parmi nous. Nous avons contemplé sa gloire, la gloire du Fils unique envoyé par son Père : plénitude de grâce et de vérité !'
  '15':
  - type: text
    content: Jean
  - type: note
    content: Il s’agit de Jean-Baptiste.
  - type: text
    content: ', son témoin, a proclamé publiquement : Voici celui dont je vous ai parlé lorsque j’ai dit : Celui qui vient après moi m’a précédé'
  - type: note
    content: 'Autre traduction : est plus grand que moi.'
  - type: text
    content: ', car il existait déjà avant moi.'
  '16':
  - type: text
    content: 'Nous avons tous été comblés de ses richesses. Il a déversé sur nous une grâce après l’autre. '
  '17':
  - type: text
    content: 'En effet, si la Loi nous a été donnée par Moïse, la grâce et la vérité sont venues par Jésus-Christ. '
  '18':
  - type: text
    content: 'Personne n’a jamais vu Dieu : Dieu, le Fils unique qui vit dans l’intimité du Père, nous l’a révélé.'
  - type: heading
    content: Premières révélations et premiers affrontements
  - type: heading
    content: Le témoin
  - type: heading
    content: (Mt 3.1-12 ; Mc 1.2-8 ; Lc 3.15-17)
  '19':
  - type: text
    content: Voici le témoignage de Jean, lorsque les Juifs
  - type: note
    content: Dans cet évangile, l’expression les Juifs désigne souvent diverses composantes du peuple juif qui s’opposent au message de Jésus (p. ex. 2.20 ; 5.10, 15, 16, 18 ; 6.41, 52 ; 7.1  ; etc.). Il s’agit d’ensembles représentatifs du peuple de l’ancienne alliance (les autorités du Grand-Conseil, des membres de groupes religieux, le peuple réuni en un endroit, etc.), qui manifestent le rejet officiel du Messie. En contraste, Jean présente le reste fidèle, formé de Juifs individuels qui composent le « vrai Israël » (1.47-49 ; 10.1-5 ; 15.1-4).
  - type: text
    content: ' lui envoyèrent de Jérusalem une délégation de prêtres et de lévites pour lui demander : « Qui es-tu ? »'
  '2':
  - type: text
    content: 'Au commencement, il était avec Dieu. '
  '20':
  - type: text
    content: 'Il dit clairement la vérité, sans se dérober, et leur déclara ouvertement : '
  '21':
  - type: text
    content: Je ne suis pas le Messie.
  - type: text
    content: – Mais alors, continuèrent-ils, qui es-tu donc ? Es-tu Elie
  - type: note
    content: Ce prophète fut enlevé au ciel à la fin de sa mission, ainsi que le rapporte l’Ancien Testament. Certains attendaient son retour selon la prophétie de Ml 3.23-24.
  - type: text
    content: '  ?'
  - type: text
    content: – Je ne le suis pas.
  - type: text
    content: – Es-tu le Prophète ?
  - type: text
    content: – Non.
  '22':
  - type: text
    content: – Mais enfin, insistèrent-ils, qui es-tu ? Il faut bien que nous rapportions une réponse à ceux qui nous ont envoyés. Que dis-tu de toi-même ?
  '23':
  - type: text
    content: '– Moi ? répondit-il, je suis cette voix dont parle le prophète Esaïe, '
  - type: text
    content: 'la voix de quelqu’un qui crie dans le désert : Préparez le chemin pour le Seigneur'
  - type: note
    content: Es 40.3 cité selon l’ancienne version grecque.
  - type: text
    content: '!'
  '24':
  - type: text
    content: 'Les envoyés étaient du parti des pharisiens. '
  '25':
  - type: text
    content: 'Ils continuèrent de l’interroger : Si tu n’es pas le Messie, ni Elie, ni le Prophète, pourquoi donc baptises-tu ?'
  '26':
  - type: text
    content: '– Moi, leur répondit Jean, je vous baptise dans l’eau, mais au milieu de vous se trouve quelqu’un que vous ne connaissez pas. '
  '27':
  - type: text
    content: Il vient après moi, mais je ne suis pas digne de dénouer la lanière de ses sandales.
  '28':
  - type: text
    content: Cela se passait à Béthanie
  - type: note
    content: Village à l’est du Jourdain, à ne pas confondre avec celui qui se trouvait sur le flanc oriental du mont des Oliviers (voir note Mc 11.1).
  - type: text
    content: ', à l’est du Jourdain, là où Jean baptisait.'
  - type: heading
    content: Jésus, l’Agneau de Dieu
  '29':
  - type: text
    content: 'Le lendemain, Jean aperçut Jésus qui se dirigeait vers lui ; alors il s’écria : Voici l’Agneau de Dieu'
  - type: note
    content: Images renvoyant aux sacrifices de l’ancienne alliance. Comme un agneau, Jésus prend sur lui la désobéissance des hommes et s’offre en sacrifice à leur place. Voir Es 53.
  - type: text
    content: ', celui qui enlève le péché du monde. '
  '3':
  - type: text
    content: 'Dieu a tout créé par lui ; rien de ce qui a été créé n’a été créé sans lui. '
  '30':
  - type: text
    content: 'C’est de lui que je vous ai parlé lorsque je disais : « Un homme vient après moi, il m’a précédé'
  - type: note
    content: 'Autre traduction : il est plus grand que moi.'
  - type: text
    content: ', car il existait déjà avant moi. » '
  '31':
  - type: text
    content: Moi non plus, je ne savais pas que c’était lui, mais si je suis venu baptiser dans l’eau, c’est pour le faire connaître au peuple d’Israël.
  '32':
  - type: text
    content: 'Jean-Baptiste rendit ce témoignage : J’ai vu l’Esprit descendre du ciel comme une colombe et se poser sur lui. '
  '33':
  - type: text
    content: 'Je ne savais pas que c’était lui, mais Dieu, qui m’a envoyé baptiser dans l’eau, m’avait dit : Tu verras l’Esprit descendre et se poser sur un homme ; c’est lui qui baptisera dans le Saint-Esprit. '
  '34':
  - type: text
    content: 'Or, cela, je l’ai vu de mes yeux, et je l’atteste solennellement : cet homme est le Fils de Dieu.'
  - type: heading
    content: Les premiers disciples
  '35':
  - type: text
    content: 'Le lendemain, Jean était de nouveau là, avec deux de ses disciples. '
  '36':
  - type: text
    content: 'Il vit Jésus qui passait, et il dit : Voici l’Agneau de Dieu !'
  '37':
  - type: text
    content: Les deux disciples entendirent les paroles de Jean et se mirent à suivre Jésus.
  '38':
  - type: text
    content: 'Celui-ci se retourna, vit qu’ils le suivaient et leur demanda : '
  - type: text
    content: Que désirez-vous ?
  - type: text
    content: – Rabbi – c’est-à-dire Maître – , lui dirent-ils, où habites-tu ?
  '39':
  - type: text
    content: ' '
  - type: text
    content: – Venez,
  - type: text
    content: ' leur répondit-il, '
  - type: text
    content: et vous le verrez.
  - type: text
    content: ' Ils l’accompagnèrent donc et virent où il habitait. Il était environ quatre heures de l’après-midi. Ils passèrent le reste de la journée avec lui.'
  '4':
  - type: text
    content: En lui résidait la vie
  - type: note
    content: 'Autre traduction, en changeant la ponctuation : tout a été créé par lui et rien n’a été créé sans lui. Ce qui a été créé avait la vie en lui.'
  - type: text
    content: ', et cette vie était la lumière des hommes. '
  '40':
  - type: text
    content: André, le frère de Simon Pierre, était l’un de ces deux hommes qui, sur la déclaration de Jean, s’étaient mis à suivre Jésus.
  '41':
  - type: text
    content: 'Il alla tout d’abord voir son frère Simon et lui dit : Nous avons trouvé le Messie (ce qui se traduit par Christ).'
  '42':
  - type: text
    content: 'Et il le conduisit auprès de Jésus. Jésus le regarda attentivement et lui dit : '
  - type: text
    content: Tu es Simon, fils de Jonas. Eh bien, on t’appellera Céphas – ce qui veut dire Pierre.
  '43':
  - type: text
    content: 'Le lendemain, Jésus décida de retourner en Galilée. Il rencontra Philippe et lui dit : '
  - type: text
    content: Suis-moi !
  '44':
  - type: text
    content: Philippe était originaire de Bethsaïda
  - type: note
    content: Village proche de Capernaüm.
  - type: text
    content: ', la ville d’André et de Pierre. '
  '45':
  - type: text
    content: 'Philippe, à son tour, alla voir Nathanaël et lui dit : Nous avons trouvé celui dont Moïse a parlé dans la Loi'
  - type: note
    content: Nom que les Juifs donnent aux cinq premiers livres de la Bible. La venue du Prophète était annoncée en Dt 18.18.
  - type: text
    content: ' et que les prophètes ont annoncé : c’est Jésus, le fils de Joseph, de la ville de Nazareth.'
  '46':
  - type: text
    content: – De Nazareth ? répondit Nathanaël. Que peut-il venir de bon de Nazareth ?
  - type: text
    content: – Viens et vois toi-même ! répondit Philippe.
  '47':
  - type: text
    content: 'Jésus vit Nathanaël s’avancer vers lui. Alors il dit : '
  - type: text
    content: Voilà un véritable Israélite, un homme d’une parfaite droiture.
  '48':
  - type: text
    content: – D’où me connais-tu ? lui demanda Nathanaël.
  - type: text
    content: – Avant même que Philippe t’appelle,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: lorsque tu étais sous le figuier, je t’ai vu.
  '49':
  - type: text
    content: – Maître, s’écria Nathanaël, tu es le Fils de Dieu, tu es le Roi d’Israël !
  '5':
  - type: text
    content: La lumière brille dans les ténèbres et les ténèbres ne l’ont pas étouffée
  - type: note
    content: 'Autre traduction : ne l’ont pas reçue.'
  - type: text
    content: .
  '50':
  - type: text
    content: ' '
  - type: text
    content: – Tu crois,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: parce que je t’ai dit que je t’ai vu sous le figuier ? Tu verras de bien plus grandes choses encore.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: 'Oui, je vous l’assure, vous verrez le ciel ouvert et les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu monter et descendre entre ciel et terre par l’intermédiaire du '
  - type: text
    content: Fils de l’homme
  - type: note
    content: Allusion à la vision de Jacob (Gn 28.12-13), dans laquelle l’escalier annonce le rôle du Fils de l’homme.
  - type: text
    content: .
  '6':
  - type: text
    content: 'Un homme parut, envoyé par Dieu ; il s’appelait Jean. '
  '7':
  - type: text
    content: 'Il vint pour être un témoin de la lumière, afin que tous les hommes croient par lui. '
  '8':
  - type: text
    content: 'Il n’était pas lui-même la lumière, mais sa mission était d’être le témoin de la lumière. '
  '9':
  - type: text
    content: Celle-ci était la véritable lumière, celle qui, en venant dans le monde, éclaire tout être humain
  - type: note
    content: 'D’autres comprennent : celle qui éclaire tout être humain venant dans le monde.'
  - type: text
    content: '. '
