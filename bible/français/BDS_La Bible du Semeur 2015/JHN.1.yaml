document_id: JHN.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Introduction : la parole de Dieu et son témoin'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au commencement était celui qui est la Parole de Dieu. Il était avec Dieu, il était lui-même Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celui qui est la Parole était déjà dans le monde, puisque Dieu a créé le monde par lui, et pourtant, le monde ne l’a pas reconnu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il est venu chez lui, et les siens ne l’ont pas accueilli.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Certains pourtant l’ont accueilli ; ils ont cru en lui. A tous ceux-là, il a accordé le privilège de devenir enfants de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ce n’est pas par une naissance naturelle, ni sous l’impulsion d’un désir, ou encore par la volonté d’un homme, qu’ils le sont devenus ; mais c’est de Dieu qu’ils sont nés.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Celui qui est la Parole est devenu homme et il a vécu parmi nous. Nous avons contemplé sa gloire, la gloire du Fils unique envoyé par son Père : plénitude de grâce et de vérité !'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Jean
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de Jean-Baptiste.
      marker-yv: yv-n
    - type: text
      text: ', son témoin, a proclamé publiquement : Voici celui dont je vous ai parlé lorsque j’ai dit : Celui qui vient après moi m’a précédé'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est plus grand que moi.
      marker-yv: yv-n
    - type: text
      text: ', car il existait déjà avant moi.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nous avons tous été comblés de ses richesses. Il a déversé sur nous une grâce après l’autre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, si la Loi nous a été donnée par Moïse, la grâce et la vérité sont venues par Jésus-Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Personne n’a jamais vu Dieu : Dieu, le Fils unique qui vit dans l’intimité du Père, nous l’a révélé.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Premières révélations et premiers affrontements
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le témoin
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 3.1-12 ; Mc 1.2-8 ; Lc 3.15-17)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Voici le témoignage de Jean, lorsque les Juifs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans cet évangile, l’expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne souvent diverses composantes du peuple juif qui s’opposent au message de Jésus (p. ex. 2.20 ; 5.10, 15, 16, 18 ; 6.41, 52 ; 7.1  ; etc.). Il s’agit d’ensembles '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'représentatifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du peuple de l’ancienne alliance (les autorités du Grand-Conseil, des membres de groupes religieux, le peuple réuni en un endroit, etc.), qui manifestent le rejet officiel du Messie. En contraste, Jean présente le reste fidèle, formé de Juifs individuels qui composent le « vrai Israël » (1.47-49 ; 10.1-5 ; 15.1-4).
      marker-yv: yv-n
    - type: text
      text: ' lui envoyèrent de Jérusalem une délégation de prêtres et de lévites pour lui demander : « Qui es-tu ? »'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Au commencement, il était avec Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il dit clairement la vérité, sans se dérober, et leur déclara ouvertement : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je ne suis pas le Messie.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Mais alors, continuèrent-ils, qui es-tu donc ? Es-tu Elie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce prophète fut enlevé au ciel à la fin de sa mission, ainsi que le rapporte l’Ancien Testament. Certains attendaient son retour selon la prophétie de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ml 3.23-24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je ne le suis pas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Es-tu le Prophète ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Non.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: – Mais enfin, insistèrent-ils, qui es-tu ? Il faut bien que nous rapportions une réponse à ceux qui nous ont envoyés. Que dis-tu de toi-même ?
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '– Moi ? répondit-il, je suis cette voix dont parle le prophète Esaïe, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'la voix de quelqu’un qui crie dans le désert : Préparez le chemin pour le Seigneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 40.3
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les envoyés étaient du parti des pharisiens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils continuèrent de l’interroger : Si tu n’es pas le Messie, ni Elie, ni le Prophète, pourquoi donc baptises-tu ?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '– Moi, leur répondit Jean, je vous baptise dans l’eau, mais au milieu de vous se trouve quelqu’un que vous ne connaissez pas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il vient après moi, mais je ne suis pas digne de dénouer la lanière de ses sandales.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Cela se passait à Béthanie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Village à l’est du Jourdain, à ne pas confondre avec celui qui se trouvait sur le flanc oriental du mont des Oliviers (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 11.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', à l’est du Jourdain, là où Jean baptisait.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus, l’Agneau de Dieu
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le lendemain, Jean aperçut Jésus qui se dirigeait vers lui ; alors il s’écria : Voici l’Agneau de Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Images renvoyant aux sacrifices de l’ancienne alliance. Comme un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'agneau, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jésus prend sur lui la désobéissance des hommes et s’offre en sacrifice à leur place. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', celui qui enlève le péché du monde. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dieu a tout créé par lui ; rien de ce qui a été créé n’a été créé sans lui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'C’est de lui que je vous ai parlé lorsque je disais : « Un homme vient après moi, il m’a précédé'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est plus grand que moi.
      marker-yv: yv-n
    - type: text
      text: ', car il existait déjà avant moi. » '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Moi non plus, je ne savais pas que c’était lui, mais si je suis venu baptiser dans l’eau, c’est pour le faire connaître au peuple d’Israël.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jean-Baptiste rendit ce témoignage : J’ai vu l’Esprit descendre du ciel comme une colombe et se poser sur lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Je ne savais pas que c’était lui, mais Dieu, qui m’a envoyé baptiser dans l’eau, m’avait dit : Tu verras l’Esprit descendre et se poser sur un homme ; c’est lui qui baptisera dans le Saint-Esprit. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Or, cela, je l’ai vu de mes yeux, et je l’atteste solennellement : cet homme est le Fils de Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers disciples
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Le lendemain, Jean était de nouveau là, avec deux de ses disciples. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Il vit Jésus qui passait, et il dit : Voici l’Agneau de Dieu !'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Les deux disciples entendirent les paroles de Jean et se mirent à suivre Jésus.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Celui-ci se retourna, vit qu’ils le suivaient et leur demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que désirez-vous ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Rabbi – c’est-à-dire Maître – , lui dirent-ils, où habites-tu ?
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Venez,
    - type: text
      text: ' leur répondit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et vous le verrez.
    - type: text
      text: ' Ils l’accompagnèrent donc et virent où il habitait. Il était environ quatre heures de l’après-midi. Ils passèrent le reste de la journée avec lui.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En lui résidait la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction, en changeant la ponctuation : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout a été créé par lui et rien n’a été créé sans lui. Ce qui a été créé avait la vie en lui.
      marker-yv: yv-n
    - type: text
      text: ', et cette vie était la lumière des hommes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: André, le frère de Simon Pierre, était l’un de ces deux hommes qui, sur la déclaration de Jean, s’étaient mis à suivre Jésus.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Il alla tout d’abord voir son frère Simon et lui dit : Nous avons trouvé le Messie (ce qui se traduit par Christ).'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Et il le conduisit auprès de Jésus. Jésus le regarda attentivement et lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu es Simon, fils de Jonas. Eh bien, on t’appellera Céphas – ce qui veut dire Pierre.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Le lendemain, Jésus décida de retourner en Galilée. Il rencontra Philippe et lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi !
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Philippe était originaire de Bethsaïda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Village proche de Capernaüm.
      marker-yv: yv-n
    - type: text
      text: ', la ville d’André et de Pierre. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Philippe, à son tour, alla voir Nathanaël et lui dit : Nous avons trouvé celui dont Moïse a parlé dans la Loi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom que les Juifs donnent aux cinq premiers livres de la Bible. La venue du Prophète était annoncée en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 18.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et que les prophètes ont annoncé : c’est Jésus, le fils de Joseph, de la ville de Nazareth.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: – De Nazareth ? répondit Nathanaël. Que peut-il venir de bon de Nazareth ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Viens et vois toi-même ! répondit Philippe.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Jésus vit Nathanaël s’avancer vers lui. Alors il dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voilà un véritable Israélite, un homme d’une parfaite droiture.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: – D’où me connais-tu ? lui demanda Nathanaël.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Avant même que Philippe t’appelle,
    - type: text
      text: ' lui répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lorsque tu étais sous le figuier, je t’ai vu.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: – Maître, s’écria Nathanaël, tu es le Fils de Dieu, tu es le Roi d’Israël !
