document_id: RUT.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La demande de Ruth
  - type: text
    content: 'Noémi, la belle-mère de Ruth, lui dit un jour : Ma fille, je ne veux pas négliger de te chercher une situation qui te rende heureuse. '
  '10':
  - type: text
    content: '– Que l’Eternel te bénisse, ma fille, lui dit-il. Ce que tu viens de faire est une preuve d’amour envers ta belle-mère encore plus grande que ce que tu as déjà fait. En effet, tu aurais pu courir après les jeunes hommes, qu’ils soient pauvres ou riches. '
  '11':
  - type: text
    content: 'Maintenant, ma fille, ne t’inquiète pas : je ferai pour toi tout ce que tu demandes, car tous les gens de l’endroit savent que tu es une femme de valeur. '
  '12':
  - type: text
    content: 'Il est vrai que j’ai envers toi la responsabilité d’un proche parent, mais il existe un parent plus direct que moi. '
  '13':
  - type: text
    content: Passe ici la fin de la nuit, et demain matin nous verrons si cet homme veut s’acquitter envers toi de sa responsabilité de proche parent. Si oui, qu’il le fasse. S’il refuse, je te promets, aussi vrai que l’Eternel est vivant
  - type: note
    content: 'Formule de serment : puisque l’Eternel est vivant, il veillera à l’exécution de la promesse.'
  - type: text
    content: ', que je m’en acquitterai envers toi. En attendant, reste couchée jusqu’au matin !'
  '14':
  - type: text
    content: 'Elle resta couchée à ses pieds jusqu’au matin, puis elle se leva au petit jour avant que l’on puisse se reconnaître, car Booz avait dit : Il ne faut pas que l’on sache qu’une femme est venue sur l’aire. '
  '15':
  - type: text
    content: 'Avant qu’elle parte, il lui dit : Donne la cape que tu portes, tiens-la bien !'
  - type: text
    content: Elle la tint ainsi, et il y versa vingt-cinq litres d’orge et l’aida à les charger sur elle, puis elle rentra à la ville
  - type: note
    content: 'D’après certains manuscrits hébreux, la version syriaque et la Vulgate. Le texte hébreu traditionnel a : il rentra…'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Quand elle arriva chez sa belle-mère, celle-ci lui demanda : Comment les choses se sont-elles passées, ma fille ?'
  - type: text
    content: 'Alors Ruth lui raconta tout ce que cet homme avait fait pour elle. '
  '17':
  - type: text
    content: 'Elle ajouta : Il m’a même donné ces vingt-cinq litres d’orge, car il m’a dit : « Tu ne retourneras pas les mains vides auprès de ta belle-mère. »'
  '18':
  - type: text
    content: 'Noémi lui dit : Maintenant, ma fille, reste là jusqu’à ce que tu saches comment les choses tourneront, car cet homme ne se donnera aucun répit avant d’avoir réglé cette affaire aujourd’hui.'
  '2':
  - type: text
    content: 'Tu sais que Booz, avec les servantes duquel tu as travaillé, est notre parent. Ce soir il doit vanner l’orge amassée dans l’aire. '
  '3':
  - type: text
    content: Lave-toi donc et parfume-toi, puis mets tes plus beaux habits et rends-toi à l’aire où il bat son orge
  - type: note
    content: 'L’orge était battue par les animaux durant la journée. On profitait de la brise du soir pour la vanner : on jetait en l’air des pelletées de grains mélangés à la paille et à la bale. Le vent emportait ces dernières, le grain, plus lourd, retombait sur l’aire.'
  - type: text
    content: '. Mais ne fais pas connaître ta présence avant qu’il ait fini de manger et de boire. '
  '4':
  - type: text
    content: Quand il se couchera pour dormir, note bien l’endroit où il s’installe, approche-toi, écarte la couverture pour lui découvrir les pieds et puis, couche-toi là. Il te dira alors ce que tu devras faire.
  '5':
  - type: text
    content: 'Ruth lui répondit : Je ferai tout ce que tu me dis.'
  '6':
  - type: text
    content: 'Elle descendit dans l’aire et suivit toutes les instructions de sa belle-mère. '
  '7':
  - type: text
    content: 'Booz mangea et but et il fut très content, puis il alla se coucher au bord du tas d’orge. Alors Ruth s’approcha tout doucement, elle écarta la couverture pour découvrir ses pieds et se coucha là. '
  '8':
  - type: text
    content: Au milieu de la nuit, Booz eut un frisson, il se pencha en avant et s’aperçut qu’une femme était couchée à ses pieds.
  '9':
  - type: text
    content: – Qui es-tu ? lui demanda-t-il.
  - type: text
    content: – Je suis Ruth, ta servante. Veuille me prendre sous ta protection
  - type: note
    content: 'Voir 2.12. Littéralement : Etends sur moi ton aile ou le pan de ton manteau (même mot) : en signe de protection matrimoniale. Lors du mariage, le marié étendait un pan de son manteau au-dessus de sa fiancée pour symboliser cette protection.'
  - type: text
    content: ' car, en tant que proche parent, tu es responsable de moi.'
