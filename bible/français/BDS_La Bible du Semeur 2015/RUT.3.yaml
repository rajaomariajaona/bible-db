document_id: RUT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La demande de Ruth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Noémi, la belle-mère de Ruth, lui dit un jour : Ma fille, je ne veux pas négliger de te chercher une situation qui te rende heureuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu sais que Booz, avec les servantes duquel tu as travaillé, est notre parent. Ce soir il doit vanner l’orge amassée dans l’aire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lave-toi donc et parfume-toi, puis mets tes plus beaux habits et rends-toi à l’aire où il bat son orge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’orge était battue par les animaux durant la journée. On profitait de la brise du soir pour la vanner : on jetait en l’air des pelletées de grains mélangés à la paille et à la bale. Le vent emportait ces dernières, le grain, plus lourd, retombait sur l’aire.'
    marker-yv: yv-n
  - type: text
    text: '. Mais ne fais pas connaître ta présence avant qu’il ait fini de manger et de boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand il se couchera pour dormir, note bien l’endroit où il s’installe, approche-toi, écarte la couverture pour lui découvrir les pieds et puis, couche-toi là. Il te dira alors ce que tu devras faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ruth lui répondit : Je ferai tout ce que tu me dis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle descendit dans l’aire et suivit toutes les instructions de sa belle-mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Booz mangea et but et il fut très content, puis il alla se coucher au bord du tas d’orge. Alors Ruth s’approcha tout doucement, elle écarta la couverture pour découvrir ses pieds et se coucha là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Au milieu de la nuit, Booz eut un frisson, il se pencha en avant et s’aperçut qu’une femme était couchée à ses pieds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – Qui es-tu ? lui demanda-t-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je suis Ruth, ta servante. Veuille me prendre sous ta protection
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.12'
        metadata:
          usfm: RUT.2.12
      - type: text
        text: '. Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Etends sur moi ton aile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le pan de ton manteau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même mot) : en signe de protection matrimoniale. Lors du mariage, le marié étendait un pan de son manteau au-dessus de sa fiancée pour symboliser cette protection.'
    marker-yv: yv-n
  - type: text
    text: ' car, en tant que proche parent, tu es responsable de moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– Que l’Eternel te bénisse, ma fille, lui dit-il. Ce que tu viens de faire est une preuve d’amour envers ta belle-mère encore plus grande que ce que tu as déjà fait. En effet, tu aurais pu courir après les jeunes hommes, qu’ils soient pauvres ou riches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, ma fille, ne t’inquiète pas : je ferai pour toi tout ce que tu demandes, car tous les gens de l’endroit savent que tu es une femme de valeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il est vrai que j’ai envers toi la responsabilité d’un proche parent, mais il existe un parent plus direct que moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Passe ici la fin de la nuit, et demain matin nous verrons si cet homme veut s’acquitter envers toi de sa responsabilité de proche parent. Si oui, qu’il le fasse. S’il refuse, je te promets, aussi vrai que l’Eternel est vivant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Formule de serment : puisque l’Eternel est vivant, il veillera à l’exécution de la promesse.'
    marker-yv: yv-n
  - type: text
    text: ', que je m’en acquitterai envers toi. En attendant, reste couchée jusqu’au matin !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle resta couchée à ses pieds jusqu’au matin, puis elle se leva au petit jour avant que l’on puisse se reconnaître, car Booz avait dit : Il ne faut pas que l’on sache qu’une femme est venue sur l’aire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avant qu’elle parte, il lui dit : Donne la cape que tu portes, tiens-la bien !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Elle la tint ainsi, et il y versa vingt-cinq litres d’orge et l’aida à les charger sur elle, puis elle rentra à la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux, la version syriaque et la Vulgate. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il rentra…
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand elle arriva chez sa belle-mère, celle-ci lui demanda : Comment les choses se sont-elles passées, ma fille ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Ruth lui raconta tout ce que cet homme avait fait pour elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle ajouta : Il m’a même donné ces vingt-cinq litres d’orge, car il m’a dit : « Tu ne retourneras pas les mains vides auprès de ta belle-mère. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noémi lui dit : Maintenant, ma fille, reste là jusqu’à ce que tu saches comment les choses tourneront, car cet homme ne se donnera aucun répit avant d’avoir réglé cette affaire aujourd’hui.'
