document_id: REV.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les cent quarante-quatre mille marqués du sceau de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.0 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 9
        metadata:
          usfm: EZK.9
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après cela, je vis quatre anges ; ils se tenaient debout aux quatre coins de la terre. Ils retenaient les quatre vents de la terre pour qu’aucun vent ne souffle ni sur la terre, ni sur la mer, ni sur aucun arbre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et je vis un autre ange monter du côté de l’orient. Il tenait le sceau du Dieu vivant. Il cria d’une voix forte aux quatre anges auxquels Dieu avait donné le pouvoir de ravager la terre et la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur dit : Ne faites pas de mal à la terre, à la mer, ni aux arbres, tant que nous n’avons pas marqué du sceau le front des serviteurs de notre Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Scène inspirée d’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 9.4
        metadata:
          usfm: EZK.9.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’entendis le nombre de ceux qui furent ainsi marqués : ils étaient cent quarante-quatre mille de toutes les tribus du peuple d’Israël à porter cette marque : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'douze mille de la tribu de Juda marqués du sceau, douze mille de la tribu de Ruben, douze mille de la tribu de Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'douze mille de la tribu d’Aser, douze mille de la tribu de Nephtali, douze mille de la tribu de Manassé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'douze mille de la tribu de Siméon, douze mille de la tribu de Lévi, douze mille de la tribu d’Issacar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: douze mille de la tribu de Zabulon, douze mille de la tribu de Joseph, douze mille de la tribu de Benjamin, marqués du sceau.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eglise triomphante
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après cela, je vis une foule immense, que nul ne pouvait dénombrer. C’étaient des gens de toute nation, de toute tribu, de tout peuple, de toute langue. Ils se tenaient debout devant le trône et devant l’Agneau, vêtus de tuniques blanches et ils avaient à la main des branches de palmiers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lors de la fête des Cabanes, les Israélites entraient en cortège dans le Temple en chantant le '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118
        metadata:
          usfm: PSA.118
      - type: text
        text: ' et en agitant des branches de palmiers en signe de joie et de victoire.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils proclamaient d’une voix forte : Le salut appartient à notre Dieu qui siège sur le trône, et à l’Agneau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et tous les anges se tenaient debout tout autour du trône, des représentants du peuple de Dieu et des quatre êtres vivants. Ils se prosternèrent face contre terre devant le trône et ils adorèrent Dieu en disant :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amen !
- type: usfm
  marker: q1
  children:
  - type: text
    text: A notre Dieu soient la louange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la gloire et la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la reconnaissance et l’honneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la puissance et la force
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour toute éternité !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors l’un des représentants du peuple de Dieu prit la parole et me demanda : Ces gens vêtus d’une tunique blanche, qui sont-ils et d’où sont-ils venus ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je lui répondis : Mon seigneur, c’est toi qui le sais.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il reprit : Ce sont ceux qui viennent de la grande détresse. Ils ont lavé et blanchi leurs tuniques dans le sang de l’Agneau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est pourquoi ils se tiennent devant le trône de Dieu et lui rendent un culte nuit et jour dans son temple. Et celui qui siège sur le trône '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les abritera sous sa tente
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 4.6
        metadata:
          usfm: ISA.4.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils ne connaîtront plus ni la faim, ni la soif ; '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ils ne souffriront plus des ardeurs du soleil
  - type: text
    text: ', ni d’aucune chaleur brûlante'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 49.10
        metadata:
          usfm: ISA.49.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Car l’Agneau qui est au milieu du trône prendra soin d’eux comme un berger, il les conduira vers les sources d’eaux vives, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu lui-même essuiera toute larme de leurs yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 25.8
        metadata:
          usfm: ISA.25.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
