document_id: REV.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les cent quarante-quatre mille marqués du sceau de DieuVoir Ez 9.
  - type: text
    content: Après cela, je vis quatre anges ; ils se tenaient debout aux quatre coins de la terre. Ils retenaient les quatre vents de la terre pour qu’aucun vent ne souffle ni sur la terre, ni sur la mer, ni sur aucun arbre.
  '10':
  - type: text
    content: 'Ils proclamaient d’une voix forte : Le salut appartient à notre Dieu qui siège sur le trône, et à l’Agneau.'
  '11':
  - type: text
    content: 'Et tous les anges se tenaient debout tout autour du trône, des représentants du peuple de Dieu et des quatre êtres vivants. Ils se prosternèrent face contre terre devant le trône et ils adorèrent Dieu en disant :'
  '12':
  - type: text
    content: Amen !
  - type: text
    content: A notre Dieu soient la louange,
  - type: text
    content: la gloire et la sagesse,
  - type: text
    content: la reconnaissance et l’honneur,
  - type: text
    content: la puissance et la force
  - type: text
    content: pour toute éternité !
  - type: text
    content: Amen !
  '13':
  - type: text
    content: 'Alors l’un des représentants du peuple de Dieu prit la parole et me demanda : Ces gens vêtus d’une tunique blanche, qui sont-ils et d’où sont-ils venus ?'
  '14':
  - type: text
    content: 'Je lui répondis : Mon seigneur, c’est toi qui le sais.'
  - type: text
    content: 'Il reprit : Ce sont ceux qui viennent de la grande détresse. Ils ont lavé et blanchi leurs tuniques dans le sang de l’Agneau. '
  '15':
  - type: text
    content: 'C’est pourquoi ils se tiennent devant le trône de Dieu et lui rendent un culte nuit et jour dans son temple. Et celui qui siège sur le trône '
  - type: text
    content: les abritera sous sa tente
  - type: note
    content: Es 4.6.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Ils ne connaîtront plus ni la faim, ni la soif ; '
  - type: text
    content: ils ne souffriront plus des ardeurs du soleil
  - type: text
    content: ', ni d’aucune chaleur brûlante'
  - type: note
    content: Es 49.10.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Car l’Agneau qui est au milieu du trône prendra soin d’eux comme un berger, il les conduira vers les sources d’eaux vives, et '
  - type: text
    content: Dieu lui-même essuiera toute larme de leurs yeux
  - type: note
    content: Es 25.8.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Et je vis un autre ange monter du côté de l’orient. Il tenait le sceau du Dieu vivant. Il cria d’une voix forte aux quatre anges auxquels Dieu avait donné le pouvoir de ravager la terre et la mer. '
  '3':
  - type: text
    content: 'Il leur dit : Ne faites pas de mal à la terre, à la mer, ni aux arbres, tant que nous n’avons pas marqué du sceau le front des serviteurs de notre Dieu'
  - type: note
    content: Scène inspirée d’Ez 9.4.
  - type: text
    content: .
  '4':
  - type: text
    content: 'J’entendis le nombre de ceux qui furent ainsi marqués : ils étaient cent quarante-quatre mille de toutes les tribus du peuple d’Israël à porter cette marque : '
  '5':
  - type: text
    content: 'douze mille de la tribu de Juda marqués du sceau, douze mille de la tribu de Ruben, douze mille de la tribu de Gad, '
  '6':
  - type: text
    content: 'douze mille de la tribu d’Aser, douze mille de la tribu de Nephtali, douze mille de la tribu de Manassé, '
  '7':
  - type: text
    content: 'douze mille de la tribu de Siméon, douze mille de la tribu de Lévi, douze mille de la tribu d’Issacar, '
  '8':
  - type: text
    content: douze mille de la tribu de Zabulon, douze mille de la tribu de Joseph, douze mille de la tribu de Benjamin, marqués du sceau.
  - type: heading
    content: L’Eglise triomphante
  '9':
  - type: text
    content: Après cela, je vis une foule immense, que nul ne pouvait dénombrer. C’étaient des gens de toute nation, de toute tribu, de tout peuple, de toute langue. Ils se tenaient debout devant le trône et devant l’Agneau, vêtus de tuniques blanches et ils avaient à la main des branches de palmiers
  - type: note
    content: Lors de la fête des Cabanes, les Israélites entraient en cortège dans le Temple en chantant le Ps 118 et en agitant des branches de palmiers en signe de joie et de victoire.
  - type: text
    content: '. '
