document_id: JDG.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tola et Yaïr
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après la mort d’Abimélek, ce fut Tola, fils de Poua et petit-fils de Dodo, de la tribu d’Issacar, qui entreprit de délivrer Israël. Il habitait à Shamir dans la région montagneuse d’Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fut chef en Israël pendant vingt-trois ans, puis il mourut et fut enterré à Shamir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Son successeur fut Yaïr de Galaad qui fut chef en Israël pendant vingt-deux ans. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ses trente fils montaient trente ânons et possédaient, dans le pays de Galaad, trente villages que l’on appelle encore aujourd’hui « les bourgs de Yaïr ». '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yaïr mourut et fut enterré à Qamôn.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël infidèle est opprimé par les Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal : ils rendirent un culte aux Baals et aux Astartés, aux dieux de la Syrie, de Sidon, de Moab et à ceux des Ammonites et des Philistins. Ils abandonnèrent l’Eternel et ne lui rendirent plus de culte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors l’Eternel se mit en colère contre les Israélites et il les livra au pouvoir des Philistins et des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A partir de cette année-là, ceux-ci opprimèrent et maltraitèrent les Israélites. Pour les Israélites qui habitaient à l’est du Jourdain dans le pays des Amoréens, en Galaad, l’oppression dura dix-huit ans. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les Ammonites traversèrent même le Jourdain pour attaquer les tribus de Juda, de Benjamin et d’Ephraïm. Israël fut dans une extrême détresse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les Israélites implorèrent l’Eternel de les aider en confessant : Nous avons péché contre toi, car nous avons abandonné notre Dieu et nous avons rendu un culte aux Baals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel leur répondit : Ne vous ai-je pas délivrés des Egyptiens, des Amoréens, des Ammonites et des Philistins ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et lorsque les Sidoniens, les Amalécites et les Maônites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit très certainement d’autres Maônites que ceux de la ville de Maôn en Juda (Jos 15.55 ; 1 S 25.2). L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Madianites.
    marker-yv: yv-n
  - type: text
    text: ' vous ont opprimés, et que vous avez imploré mon aide, ne vous ai-je pas délivrés d’eux ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais vous, vous m’avez abandonné et vous avez adoré d’autres dieux. C’est pourquoi je ne viendrai plus à votre secours. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Allez implorer les dieux que vous vous êtes choisis. Qu’ils vous délivrent maintenant que vous êtes en détresse !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais les Israélites plaidèrent avec l’Eternel : Nous avons péché. Traite-nous comme tu le trouveras bon, mais de grâce, délivre-nous encore cette fois !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils firent disparaître du milieu d’eux les dieux étrangers et rendirent de nouveau un culte à l’Eternel. Alors l’Eternel ne put pas supporter plus longtemps les souffrances d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les Ammonites mobilisèrent leurs troupes et prirent position dans la région de Galaad. De leur côté, les Israélites rassemblèrent leurs forces et dressèrent leur camp à Mitspa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le sens du mot, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'observatoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Galaad (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 31.49
        metadata:
          usfm: GEN.31.49
      - type: text
        text: ), à distinguer du Mitspé de Benjamin (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 18.26
        metadata:
          usfm: JOS.18.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors les hommes et les chefs installés en Galaad se demandèrent les uns aux autres : Qui va lancer l’attaque contre les Ammonites ? Celui qui le fera deviendra le chef de tous les habitants de Galaad.'
