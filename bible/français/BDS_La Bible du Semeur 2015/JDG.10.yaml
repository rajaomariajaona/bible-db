document_id: JDG.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tola et Yaïr
  - type: text
    content: 'Après la mort d’Abimélek, ce fut Tola, fils de Poua et petit-fils de Dodo, de la tribu d’Issacar, qui entreprit de délivrer Israël. Il habitait à Shamir dans la région montagneuse d’Ephraïm. '
  '10':
  - type: text
    content: 'Alors les Israélites implorèrent l’Eternel de les aider en confessant : Nous avons péché contre toi, car nous avons abandonné notre Dieu et nous avons rendu un culte aux Baals.'
  '11':
  - type: text
    content: 'L’Eternel leur répondit : Ne vous ai-je pas délivrés des Egyptiens, des Amoréens, des Ammonites et des Philistins ? '
  '12':
  - type: text
    content: Et lorsque les Sidoniens, les Amalécites et les Maônites
  - type: note
    content: 'Il s’agit très certainement d’autres Maônites que ceux de la ville de Maôn en Juda (Jos 15.55 ; 1 S 25.2). L’ancienne version grecque a : les Madianites.'
  - type: text
    content: ' vous ont opprimés, et que vous avez imploré mon aide, ne vous ai-je pas délivrés d’eux ? '
  '13':
  - type: text
    content: 'Mais vous, vous m’avez abandonné et vous avez adoré d’autres dieux. C’est pourquoi je ne viendrai plus à votre secours. '
  '14':
  - type: text
    content: Allez implorer les dieux que vous vous êtes choisis. Qu’ils vous délivrent maintenant que vous êtes en détresse !
  '15':
  - type: text
    content: 'Mais les Israélites plaidèrent avec l’Eternel : Nous avons péché. Traite-nous comme tu le trouveras bon, mais de grâce, délivre-nous encore cette fois !'
  '16':
  - type: text
    content: Ils firent disparaître du milieu d’eux les dieux étrangers et rendirent de nouveau un culte à l’Eternel. Alors l’Eternel ne put pas supporter plus longtemps les souffrances d’Israël.
  '17':
  - type: text
    content: Les Ammonites mobilisèrent leurs troupes et prirent position dans la région de Galaad. De leur côté, les Israélites rassemblèrent leurs forces et dressèrent leur camp à Mitspa
  - type: note
    content: Selon le sens du mot, observatoire en Galaad (Gn 31.49), à distinguer du Mitspé de Benjamin (Jos 18.26).
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Alors les hommes et les chefs installés en Galaad se demandèrent les uns aux autres : Qui va lancer l’attaque contre les Ammonites ? Celui qui le fera deviendra le chef de tous les habitants de Galaad.'
  '2':
  - type: text
    content: Il fut chef en Israël pendant vingt-trois ans, puis il mourut et fut enterré à Shamir.
  '3':
  - type: text
    content: 'Son successeur fut Yaïr de Galaad qui fut chef en Israël pendant vingt-deux ans. '
  '4':
  - type: text
    content: 'Ses trente fils montaient trente ânons et possédaient, dans le pays de Galaad, trente villages que l’on appelle encore aujourd’hui « les bourgs de Yaïr ». '
  '5':
  - type: text
    content: Yaïr mourut et fut enterré à Qamôn.
  - type: heading
    content: Israël infidèle est opprimé par les Ammonites
  '6':
  - type: text
    content: 'Les Israélites recommencèrent à faire ce que l’Eternel considère comme mal : ils rendirent un culte aux Baals et aux Astartés, aux dieux de la Syrie, de Sidon, de Moab et à ceux des Ammonites et des Philistins. Ils abandonnèrent l’Eternel et ne lui rendirent plus de culte. '
  '7':
  - type: text
    content: 'Alors l’Eternel se mit en colère contre les Israélites et il les livra au pouvoir des Philistins et des Ammonites. '
  '8':
  - type: text
    content: 'A partir de cette année-là, ceux-ci opprimèrent et maltraitèrent les Israélites. Pour les Israélites qui habitaient à l’est du Jourdain dans le pays des Amoréens, en Galaad, l’oppression dura dix-huit ans. '
  '9':
  - type: text
    content: 'Les Ammonites traversèrent même le Jourdain pour attaquer les tribus de Juda, de Benjamin et d’Ephraïm. Israël fut dans une extrême détresse. '
