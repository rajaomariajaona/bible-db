document_id: PRO.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sot
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Etre honoré convient aussi peu à un insensé
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la neige en été ou la pluie pendant la moisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De mars à octobre, il ne pleut pratiquement pas en Israël.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Une malédiction injustifiée reste sans effet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est comme le moineau qui s’enfuit ou l’hirondelle qui s’envole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le fouet est fait pour le cheval, le mors pour l’âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bâton pour l’échine des insensés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne réponds pas à l’insensé selon sa sottise, de peur que tu finisses par lui ressembler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Réponds à l’insensé selon sa sottise
- type: usfm
  marker: q1
  children:
  - type: text
    text: de peur qu’il se prenne pour un sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui confie des messages à un sot se coupe les pieds et se prépare bien des déboires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Une maxime dans la bouche des insensés fait le même effet que les jambes inertes d’un estropié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Décerner des honneurs à un insensé, c’est attacher une pierre à une fronde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Une maxime dans la bouche des insensés est comme un rameau épineux brandi par un homme ivre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Qui risque de blesser les autres et de se nuire à lui-même (même leçon que le v. 8).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui embauche un sot ou un vagabond
- type: usfm
  marker: q1
  children:
  - type: text
    text: est comme un archer qui blesse tout le monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’insensé retourne à ses sottises
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le chien à ce qu’il a vomi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 P 2.22
        metadata:
          usfm: 2PE.2.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’ai vu un homme qui se croit sage :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a plus à espérer d’un insensé que de lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le paresseux
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le paresseux dit : « Il y a un lion qui barre la route,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: un fauve qui parcourt les rues. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme la porte tourne sur ses gonds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le paresseux se tourne sur son lit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le paresseux plonge sa main dans le plat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il est trop fatigué pour la ramener à sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le paresseux se croit plus sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sept hommes qui parlent avec bon sens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les querelles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Se mêler en passant d’une querelle qui ne vous regarde pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est comme attraper un chien par les oreilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Comme un fou qui lance des traits enflammés et des flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: semant la mort autour de lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: tel est l’homme qui trompe son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui dit ensuite : « C’était pour plaisanter. »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quand il n’y a plus de bois, le feu s’éteint ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il n’y a plus de calomniateur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: semeur de zizanie.
    marker-yv: yv-n
  - type: text
    text: ', la querelle s’apaise.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les charbons donnent de la braise, le bois alimente le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’homme querelleur attise la querelle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les médisances et les calomnies
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les médisances sont comme des friandises :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles descendent jusqu’au tréfonds de l’être.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Comme un vernis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreu de sens incertain. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des scories d’argent.
    marker-yv: yv-n
  - type: text
    text: ' sur de l’argile,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des paroles chaleureuses peuvent cacher un cœur malveillant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui a de la haine peut donner le change par ses propos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au fond de lui-même, il est rempli de duplicité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: S’il tient des propos bienveillants, ne te fie pas à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son cœur est plein de pensées abominables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il a beau déguiser sa haine sous des apparences trompeuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa méchanceté finira par apparaître aux yeux de tous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qui creuse une fosse y tombera lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la pierre revient sur celui qui la roule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Celui qui raconte des mensonges hait ceux qu’il blesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec des paroles flatteuses on cause la ruine de quelqu’un.
