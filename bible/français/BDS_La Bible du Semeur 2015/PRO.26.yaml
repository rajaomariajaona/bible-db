document_id: PRO.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sot
  - type: text
    content: Etre honoré convient aussi peu à un insensé
  - type: text
    content: que la neige en été ou la pluie pendant la moisson
  - type: note
    content: De mars à octobre, il ne pleut pratiquement pas en Israël.
  - type: text
    content: .
  '10':
  - type: text
    content: Qui embauche un sot ou un vagabond
  - type: text
    content: est comme un archer qui blesse tout le monde.
  '11':
  - type: text
    content: L’insensé retourne à ses sottises
  - type: text
    content: comme le chien à ce qu’il a vomi
  - type: note
    content: Cité en 2 P 2.22.
  - type: text
    content: .
  '12':
  - type: text
    content: 'J’ai vu un homme qui se croit sage :'
  - type: text
    content: il y a plus à espérer d’un insensé que de lui.
  - type: heading
    content: Le paresseux
  '13':
  - type: text
    content: 'Le paresseux dit : « Il y a un lion qui barre la route,'
  - type: text
    content: un fauve qui parcourt les rues. »
  '14':
  - type: text
    content: Comme la porte tourne sur ses gonds,
  - type: text
    content: le paresseux se tourne sur son lit.
  '15':
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: mais il est trop fatigué pour la ramener à sa bouche.
  '16':
  - type: text
    content: Le paresseux se croit plus sage
  - type: text
    content: que sept hommes qui parlent avec bon sens.
  - type: heading
    content: Les querelles
  '17':
  - type: text
    content: Se mêler en passant d’une querelle qui ne vous regarde pas,
  - type: text
    content: c’est comme attraper un chien par les oreilles.
  '18':
  - type: text
    content: Comme un fou qui lance des traits enflammés et des flèches,
  - type: text
    content: semant la mort autour de lui,
  '19':
  - type: text
    content: tel est l’homme qui trompe son prochain
  - type: text
    content: 'et qui dit ensuite : « C’était pour plaisanter. »'
  '2':
  - type: text
    content: Une malédiction injustifiée reste sans effet,
  - type: text
    content: elle est comme le moineau qui s’enfuit ou l’hirondelle qui s’envole.
  '20':
  - type: text
    content: Quand il n’y a plus de bois, le feu s’éteint ;
  - type: text
    content: quand il n’y a plus de calomniateur
  - type: note
    content: 'Autre traduction : semeur de zizanie.'
  - type: text
    content: ', la querelle s’apaise.'
  '21':
  - type: text
    content: Les charbons donnent de la braise, le bois alimente le feu,
  - type: text
    content: et l’homme querelleur attise la querelle.
  - type: heading
    content: Les médisances et les calomnies
  '22':
  - type: text
    content: 'Les médisances sont comme des friandises :'
  - type: text
    content: elles descendent jusqu’au tréfonds de l’être.
  '23':
  - type: text
    content: Comme un vernis
  - type: note
    content: 'Hébreu de sens incertain. Autre traduction : des scories d’argent.'
  - type: text
    content: ' sur de l’argile,'
  - type: text
    content: des paroles chaleureuses peuvent cacher un cœur malveillant.
  '24':
  - type: text
    content: Celui qui a de la haine peut donner le change par ses propos,
  - type: text
    content: au fond de lui-même, il est rempli de duplicité.
  '25':
  - type: text
    content: S’il tient des propos bienveillants, ne te fie pas à lui,
  - type: text
    content: car son cœur est plein de pensées abominables.
  '26':
  - type: text
    content: Il a beau déguiser sa haine sous des apparences trompeuses,
  - type: text
    content: sa méchanceté finira par apparaître aux yeux de tous.
  '27':
  - type: text
    content: Qui creuse une fosse y tombera lui-même,
  - type: text
    content: et la pierre revient sur celui qui la roule.
  '28':
  - type: text
    content: Celui qui raconte des mensonges hait ceux qu’il blesse,
  - type: text
    content: et avec des paroles flatteuses on cause la ruine de quelqu’un.
  '3':
  - type: text
    content: Le fouet est fait pour le cheval, le mors pour l’âne,
  - type: text
    content: et le bâton pour l’échine des insensés.
  '4':
  - type: text
    content: Ne réponds pas à l’insensé selon sa sottise, de peur que tu finisses par lui ressembler.
  '5':
  - type: text
    content: Réponds à l’insensé selon sa sottise
  - type: text
    content: de peur qu’il se prenne pour un sage.
  '6':
  - type: text
    content: Qui confie des messages à un sot se coupe les pieds et se prépare bien des déboires.
  '7':
  - type: text
    content: Une maxime dans la bouche des insensés fait le même effet que les jambes inertes d’un estropié.
  '8':
  - type: text
    content: Décerner des honneurs à un insensé, c’est attacher une pierre à une fronde.
  '9':
  - type: text
    content: Une maxime dans la bouche des insensés est comme un rameau épineux brandi par un homme ivre
  - type: note
    content: Qui risque de blesser les autres et de se nuire à lui-même (même leçon que le v. 8).
  - type: text
    content: .
