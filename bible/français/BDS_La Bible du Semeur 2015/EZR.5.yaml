document_id: EZR.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La reprise des travaux
  - type: text
    content: Le prophète Aggée et le prophète Zacharie, petit-fils d’Iddo, s’adressèrent aux Juifs établis en Juda et à Jérusalem de la part du Dieu d’Israël qui était en eux
  - type: note
    content: Aggée a prophétisé du 29 août (Ag 1.1) au 18 décembre 520 (Ag 2.1, 10, 20) pour encourager le peuple à reprendre les travaux de reconstruction du Temple. Deux mois après son premier discours, Zacharie s’est associé à lui (Za 1.1).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Nous leur avons aussi demandé leurs noms pour te les faire connaître, et nous avons noté par écrit ces noms des hommes qui sont à leur tête.
  '11':
  - type: text
    content: 'Voici la réponse qu’ils nous ont faite : Nous sommes les serviteurs du Dieu du ciel et de la terre et nous reconstruisons le temple qui avait été bâti et achevé il y a bien longtemps par un grand roi d’Israël'
  - type: note
    content: Il s’agit de Salomon (voir 1 R 6).
  - type: text
    content: '. '
  '12':
  - type: text
    content: Mais comme nos ancêtres ont irrité le Dieu du ciel, celui-ci les a livrés au pouvoir du Chaldéen Nabuchodonosor, roi de Babylone. Ce roi a détruit ce temple et déporté la population à Babylone
  - type: note
    content: Voir 2 R 25.8-12 ; 2 Ch 36.17-20 ; Jr 52.12-16.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Cependant, la première année du règne de Cyrus, roi de Babylone
  - type: note
    content: Voir note 1.1.
  - type: text
    content: ', le roi Cyrus a donné par un édit l’ordre de rebâtir ce temple. '
  '14':
  - type: text
    content: 'Et même, le roi Cyrus a retiré du temple de Babylone les objets d’or et d’argent que Nabuchodonosor avait emportés du temple de Jérusalem et qu’il avait transférés dans le temple de Babylone. Il les a donnés au nommé Sheshbatsar qu’il avait désigné comme gouverneur, '
  '15':
  - type: text
    content: 'et il lui a ordonné d’emporter ces objets et de les déposer dans le temple de Jérusalem, en stipulant que le temple devait être rebâti sur son ancien emplacement. '
  '16':
  - type: text
    content: Ce Sheshbatsar est donc venu ici et il a posé les nouvelles fondations du temple de Dieu qui est à Jérusalem. Depuis lors, et jusqu’à ce jour, ce temple est en reconstruction mais les travaux ne sont pas encore achevés.
  '17':
  - type: text
    content: Maintenant, si l’empereur le trouve bon, que l’on fasse des recherches dans les archives royales là-bas, à Babylone pour voir s’il y a bien eu de la part du roi Cyrus un édit ordonnant la reconstruction de ce temple à Jérusalem. Puis que le roi veuille nous communiquer sa volonté à ce sujet. »
  '2':
  - type: text
    content: Alors Zorobabel, fils de Shealtiel, et Josué, fils de Yotsadaq
  - type: note
    content: Sur Josué et Zorobabel, voir Ag 1.12 ; Za 3.4. Zorobabel était le petit-fils de Yehoyakîn (1 Ch 3.17).
  - type: text
    content: ', se mirent au travail et reprirent la reconstruction du temple de Dieu à Jérusalem avec l’assistance des prophètes de Dieu. '
  '3':
  - type: text
    content: 'Aussitôt, Thathnaï, gouverneur de la province située à l’ouest de l’Euphrate, Shethar-Boznaï et leurs collègues vinrent les trouver et leur demandèrent : Qui vous a donné l’autorisation de rebâtir ce sanctuaire et de relever ces murs ?'
  '4':
  - type: text
    content: Alors nous leur avons indiqué les noms de ceux qui travaillaient à la reconstruction
  - type: note
    content: 'L’ancienne version grecque a : ils demandèrent aussi : Quels sont les noms de ceux qui travaillent à la reconstruction ?'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Mais Dieu veillait sur les responsables des Juifs et on ne les obligea pas à interrompre leurs travaux en attendant que Darius ait reçu un rapport à ce sujet et que la réponse revienne.
  - type: heading
    content: La lettre adressée à l’empereur Darius
  '6':
  - type: text
    content: 'Voici une copie de la lettre envoyée à l’empereur Darius par Thathnaï, gouverneur de la province située à l’ouest de l’Euphrate, Shethar-Boznaï et ses collègues, les préfets de la province à l’ouest de l’Euphrate. '
  '7':
  - type: text
    content: 'Le rapport qu’ils envoyèrent était conçu ainsi :'
  - type: text
    content: '« A l’empereur Darius, tous nos vœux de prospérité ! '
  '8':
  - type: text
    content: Que le roi sache que nous nous sommes rendus dans le district de Juda jusqu’au grand temple de Dieu. Cet édifice est en cours de reconstruction en pierres de taille. Du bois est encastré dans les murs
  - type: note
    content: Voir 1 R 6.14-18, 36 ; 7.12.
  - type: text
    content: '. Ce travail se poursuit avec soin et progresse bien grâce aux efforts des constructeurs. '
  '9':
  - type: text
    content: 'Nous avons interrogé les responsables parmi eux et nous leur avons demandé : Qui vous a donné l’autorisation de rebâtir ce sanctuaire et de relever ces murs ? '
