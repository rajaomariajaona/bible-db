document_id: EZR.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La reprise des travaux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prophète Aggée et le prophète Zacharie, petit-fils d’Iddo, s’adressèrent aux Juifs établis en Juda et à Jérusalem de la part du Dieu d’Israël qui était en eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Aggée a prophétisé du 29 août (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ag 1.1
        - type: text
          text: ) au 18 décembre 520 (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ag 2.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: ) pour encourager le peuple à reprendre les travaux de reconstruction du Temple. Deux mois après son premier discours, Zacharie s’est associé à lui (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Za 1.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Nous leur avons aussi demandé leurs noms pour te les faire connaître, et nous avons noté par écrit ces noms des hommes qui sont à leur tête.
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Voici la réponse qu’ils nous ont faite : Nous sommes les serviteurs du Dieu du ciel et de la terre et nous reconstruisons le temple qui avait été bâti et achevé il y a bien longtemps par un grand roi d’Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de Salomon (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Mais comme nos ancêtres ont irrité le Dieu du ciel, celui-ci les a livrés au pouvoir du Chaldéen Nabuchodonosor, roi de Babylone. Ce roi a détruit ce temple et déporté la population à Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 25.8-12 ; 2 Ch 36.17-20 ; Jr 52.12-16.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Cependant, la première année du règne de Cyrus, roi de Babylone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', le roi Cyrus a donné par un édit l’ordre de rebâtir ce temple. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Et même, le roi Cyrus a retiré du temple de Babylone les objets d’or et d’argent que Nabuchodonosor avait emportés du temple de Jérusalem et qu’il avait transférés dans le temple de Babylone. Il les a donnés au nommé Sheshbatsar qu’il avait désigné comme gouverneur, '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'et il lui a ordonné d’emporter ces objets et de les déposer dans le temple de Jérusalem, en stipulant que le temple devait être rebâti sur son ancien emplacement. '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Ce Sheshbatsar est donc venu ici et il a posé les nouvelles fondations du temple de Dieu qui est à Jérusalem. Depuis lors, et jusqu’à ce jour, ce temple est en reconstruction mais les travaux ne sont pas encore achevés.
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Maintenant, si l’empereur le trouve bon, que l’on fasse des recherches dans les archives royales là-bas, à Babylone pour voir s’il y a bien eu de la part du roi Cyrus un édit ordonnant la reconstruction de ce temple à Jérusalem. Puis que le roi veuille nous communiquer sa volonté à ce sujet. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Zorobabel, fils de Shealtiel, et Josué, fils de Yotsadaq
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Josué '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zorobabel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir Ag 1.12 ; Za 3.4. Zorobabel était le petit-fils de Yehoyakîn (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 3.17
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', se mirent au travail et reprirent la reconstruction du temple de Dieu à Jérusalem avec l’assistance des prophètes de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, Thathnaï, gouverneur de la province située à l’ouest de l’Euphrate, Shethar-Boznaï et leurs collègues vinrent les trouver et leur demandèrent : Qui vous a donné l’autorisation de rebâtir ce sanctuaire et de relever ces murs ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors nous leur avons indiqué les noms de ceux qui travaillaient à la reconstruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils demandèrent aussi : Quels sont les noms de ceux qui travaillent à la reconstruction ?'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu veillait sur les responsables des Juifs et on ne les obligea pas à interrompre leurs travaux en attendant que Darius ait reçu un rapport à ce sujet et que la réponse revienne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lettre adressée à l’empereur Darius
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici une copie de la lettre envoyée à l’empereur Darius par Thathnaï, gouverneur de la province située à l’ouest de l’Euphrate, Shethar-Boznaï et ses collègues, les préfets de la province à l’ouest de l’Euphrate. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le rapport qu’ils envoyèrent était conçu ainsi :'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '« A l’empereur Darius, tous nos vœux de prospérité ! '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Que le roi sache que nous nous sommes rendus dans le district de Juda jusqu’au grand temple de Dieu. Cet édifice est en cours de reconstruction en pierres de taille. Du bois est encastré dans les murs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 R 6.14-18, 36 ; 7.12.
      marker-yv: yv-n
    - type: text
      text: '. Ce travail se poursuit avec soin et progresse bien grâce aux efforts des constructeurs. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Nous avons interrogé les responsables parmi eux et nous leur avons demandé : Qui vous a donné l’autorisation de rebâtir ce sanctuaire et de relever ces murs ? '
