document_id: EZK.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Phéniciens
  - type: heading
    content: Le naufrage de Tyr
  - type: text
    content: La onzième année
  - type: note
    content: C’est-à-dire en 586 av. J.-C. Le mot entre crochets manque dans le texte hébreu traditionnel (voir 33.21).
  - type: text
    content: ', le premier jour du [onzième] mois, l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'La poussière du sol soulevée par le flot de ses nombreux chevaux te couvrira. Au bruit des attelages, des roues et des chars, tes remparts trembleront, le jour où l’ennemi entrera dans tes portes, tout comme on envahit une ville où l’on a fait une brèche. '
  '11':
  - type: text
    content: 'Il foulera toutes tes rues sous les sabots de ses chevaux, il passera tes habitants au fil de son épée, et les stèles qui font ta force seront jetées à terre. '
  '12':
  - type: text
    content: 'Ils prendront tes richesses et pilleront tes biens, ils abattront tes murs et ils démoliront tes maisons luxueuses en jetant dans la mer tes boiseries, tes pierres et jusqu’à ta poussière. '
  '13':
  - type: text
    content: 'Et je ferai cesser le bruit de tes chansons, on ne percevra plus le son de tes lyres. '
  '14':
  - type: text
    content: Et je ferai de toi un rocher dénudé, un lieu où les pêcheurs étendront leurs filets pour les faire sécher. Tu ne seras plus jamais rebâtie car moi, l’Eternel, j’ai parlé, c’est là ce que déclare le Seigneur, l’Eternel.
  - type: heading
    content: Les îles trembleront
  '15':
  - type: text
    content: 'Voici ce que le Seigneur, l’Eternel, dit à Tyr : Les habitants des îles et des régions côtières ne trembleront-ils pas au fracas de ta chute, quand, au milieu de toi, dans un affreux carnage, les blessés gémiront ? '
  '16':
  - type: text
    content: 'Les princes de la mer descendront de leurs trônes, tous, ils enlèveront leurs manteaux d’apparat et se dépouilleront de leurs habits brodés pour se vêtir d’effroi ; ils s’assiéront par terre, ils trembleront sans cesse et seront consternés des malheurs qui te frappent. '
  '17':
  - type: text
    content: 'Puis ils prononceront sur toi une complainte et ils diront ceci :'
  - type: text
    content: « Est-ce possible ? Tu as péri,
  - type: text
    content: ô toi dont la demeure ╵sortait du sein des mers
  - type: note
    content: 'ô toi dont la demeure… des mers. Autre traduction : ô toi qui étais habitée par des marins. Certains traduisent, d’après l’ancienne version grecque : tu as disparu des mers.'
  - type: text
    content: ','
  - type: text
    content: ô cité tant vantée, ╵puissante sur les flots,
  - type: text
    content: avec ses habitants,
  - type: text
    content: et qui répandait la terreur ╵sur tous les alentours.
  '18':
  - type: text
    content: Les îles trembleront
  - type: text
    content: lorsque tu tomberas,
  - type: text
    content: les îles de la mer ╵seront épouvantées ╵en apprenant ta fin. »
  '19':
  - type: text
    content: 'Car voici ce que dit le Seigneur, l’Eternel : Quand j’aurai fait de toi une ville ruinée, comme le sont les villes qui n’ont plus d’habitants, quand j’aurai fait monter par-dessus toi l’abîme et que les grandes eaux t’auront toute submergée, '
  '2':
  - type: text
    content: Fils d’homme, Tyr
  - type: note
    content: Tyr était l’une des premières villes commerciales de l’Antiquité (27.3) ; elle voyait donc en Jérusalem une rivale.
  - type: text
    content: ' a dit contre Jérusalem : « Ha, ha… ! Elle est brisée, la porte des peuples ; elle m’est désormais ouverte, et je vais être comblée, car la voici en ruine. » '
  '20':
  - type: text
    content: je te ferai descendre avec ceux qui descendent dans la fosse, vers ceux des temps passés, je te ferai habiter dans le pays des profondeurs, semblable aux antiques ruines, avec ceux qui descendent dans la fosse, afin que tu ne sois plus jamais habitée
  - type: note
    content: 'afin… habitée. Autre traduction : et tu n’en remonteras pas.'
  - type: text
    content: ', et tu n’auras plus de place'
  - type: note
    content: 'tu n’auras plus de place: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : je rendrai sa gloire.'
  - type: text
    content: ' au pays des vivants. '
  '21':
  - type: text
    content: Je ferai de toi un objet d’épouvante et c’en sera fini de toi. Les gens te chercheront mais, plus jamais, ils ne te trouveront. C’est là ce que déclare le Seigneur, l’Eternel.
  '3':
  - type: text
    content: 'Voilà pourquoi le Seigneur, l’Eternel, parle ainsi : Je m’en prends à toi, Tyr, je m’en vais soulever contre toi des peuples en grand nombre, comme la mer soulève ses vagues en furie. '
  '4':
  - type: text
    content: 'Ils détruiront tes murs, ô Tyr, et abattront tes tours. Je raclerai, pour l’emporter loin d’elle, la poussière du sol et je ne laisserai qu’un rocher dénudé. '
  '5':
  - type: text
    content: 'Voici qu’elle sera, au milieu de la mer, un lieu où les pêcheurs étendront leurs filets pour les faire sécher. C’est moi qui vous le dis, c’est là ce que déclare le Seigneur, l’Eternel, et d’autres peuples la pilleront. '
  '6':
  - type: text
    content: Ses villes voisines bâties sur les terres de la côte passeront par l’épée, et l’on reconnaîtra que je suis l’Eternel.
  '7':
  - type: text
    content: 'Car voici ce que dit le Seigneur, l’Eternel : J’amène contre Tyr Nabuchodonosor, le roi de Babylone, cet empereur viendra du nord avec des chevaux et des chars, des équipages nombreux et un immense rassemblement de troupes. '
  '8':
  - type: text
    content: 'Il massacrera par l’épée tes villes voisines bâties sur les terres de la côte, et il élèvera des terrassements contre toi. Il fera édifier des terrasses de siège et il dressera contre toi un toit de boucliers. '
  '9':
  - type: text
    content: 'Il frappera tes murs des coups de ses béliers et brisera tes tours avec ses machines de guerre. '
