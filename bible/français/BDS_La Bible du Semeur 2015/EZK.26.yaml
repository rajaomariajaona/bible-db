document_id: EZK.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les Phéniciens
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le naufrage de Tyr
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La onzième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire en 586 av. J.-C. Le mot entre crochets manque dans le texte hébreu traditionnel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33.21'
        metadata:
          usfm: EZK.33.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', le premier jour du [onzième] mois, l’Eternel m’adressa la parole en ces termes :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils d’homme, Tyr
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était l’une des premières villes commerciales de l’Antiquité (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27.3'
        metadata:
          usfm: EZK.27.3
      - type: text
        text: ) ; elle voyait donc en Jérusalem une rivale.
    marker-yv: yv-n
  - type: text
    text: ' a dit contre Jérusalem : « Ha, ha… ! Elle est brisée, la porte des peuples ; elle m’est désormais ouverte, et je vais être comblée, car la voici en ruine. » '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voilà pourquoi le Seigneur, l’Eternel, parle ainsi : Je m’en prends à toi, Tyr, je m’en vais soulever contre toi des peuples en grand nombre, comme la mer soulève ses vagues en furie. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils détruiront tes murs, ô Tyr, et abattront tes tours. Je raclerai, pour l’emporter loin d’elle, la poussière du sol et je ne laisserai qu’un rocher dénudé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici qu’elle sera, au milieu de la mer, un lieu où les pêcheurs étendront leurs filets pour les faire sécher. C’est moi qui vous le dis, c’est là ce que déclare le Seigneur, l’Eternel, et d’autres peuples la pilleront. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ses villes voisines bâties sur les terres de la côte passeront par l’épée, et l’on reconnaîtra que je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car voici ce que dit le Seigneur, l’Eternel : J’amène contre Tyr Nabuchodonosor, le roi de Babylone, cet empereur viendra du nord avec des chevaux et des chars, des équipages nombreux et un immense rassemblement de troupes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il massacrera par l’épée tes villes voisines bâties sur les terres de la côte, et il élèvera des terrassements contre toi. Il fera édifier des terrasses de siège et il dressera contre toi un toit de boucliers. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il frappera tes murs des coups de ses béliers et brisera tes tours avec ses machines de guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La poussière du sol soulevée par le flot de ses nombreux chevaux te couvrira. Au bruit des attelages, des roues et des chars, tes remparts trembleront, le jour où l’ennemi entrera dans tes portes, tout comme on envahit une ville où l’on a fait une brèche. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il foulera toutes tes rues sous les sabots de ses chevaux, il passera tes habitants au fil de son épée, et les stèles qui font ta force seront jetées à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils prendront tes richesses et pilleront tes biens, ils abattront tes murs et ils démoliront tes maisons luxueuses en jetant dans la mer tes boiseries, tes pierres et jusqu’à ta poussière. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et je ferai cesser le bruit de tes chansons, on ne percevra plus le son de tes lyres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et je ferai de toi un rocher dénudé, un lieu où les pêcheurs étendront leurs filets pour les faire sécher. Tu ne seras plus jamais rebâtie car moi, l’Eternel, j’ai parlé, c’est là ce que déclare le Seigneur, l’Eternel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les îles trembleront
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que le Seigneur, l’Eternel, dit à Tyr : Les habitants des îles et des régions côtières ne trembleront-ils pas au fracas de ta chute, quand, au milieu de toi, dans un affreux carnage, les blessés gémiront ? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les princes de la mer descendront de leurs trônes, tous, ils enlèveront leurs manteaux d’apparat et se dépouilleront de leurs habits brodés pour se vêtir d’effroi ; ils s’assiéront par terre, ils trembleront sans cesse et seront consternés des malheurs qui te frappent. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis ils prononceront sur toi une complainte et ils diront ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Est-ce possible ? Tu as péri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô toi dont la demeure ╵sortait du sein des mers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.17 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ô toi dont la demeure… des mers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ô toi qui étais habitée par des marins. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent, d’après l’ancienne version grecque : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu as disparu des mers.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô cité tant vantée, ╵puissante sur les flots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui répandait la terreur ╵sur tous les alentours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les îles trembleront
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque tu tomberas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les îles de la mer ╵seront épouvantées ╵en apprenant ta fin. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car voici ce que dit le Seigneur, l’Eternel : Quand j’aurai fait de toi une ville ruinée, comme le sont les villes qui n’ont plus d’habitants, quand j’aurai fait monter par-dessus toi l’abîme et que les grandes eaux t’auront toute submergée, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: je te ferai descendre avec ceux qui descendent dans la fosse, vers ceux des temps passés, je te ferai habiter dans le pays des profondeurs, semblable aux antiques ruines, avec ceux qui descendent dans la fosse, afin que tu ne sois plus jamais habitée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'afin… habitée. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et tu n’en remonteras pas.
    marker-yv: yv-n
  - type: text
    text: ', et tu n’auras plus de place'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu n’auras plus de place
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je rendrai sa gloire.
    marker-yv: yv-n
  - type: text
    text: ' au pays des vivants. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je ferai de toi un objet d’épouvante et c’en sera fini de toi. Les gens te chercheront mais, plus jamais, ils ne te trouveront. C’est là ce que déclare le Seigneur, l’Eternel.
