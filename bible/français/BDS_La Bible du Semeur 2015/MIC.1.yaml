document_id: MIC.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Voici les paroles que l’Eternel a adressées à Michée de Morésheth
  - type: note
    content: Localité située à 35 kilomètres au sud-ouest de Jérusalem, à l’est de Gath.
  - type: text
    content: ' sous les règnes de Yotam, Ahaz et Ezéchias, rois de Juda'
  - type: note
    content: Sur Yotam (740 à 732 av. J.-C.) voir 2 R 15.32-38 ; 2 Ch 27.1-9. Sur Ahaz (735 à 715 av. J.-C.) voir 2 R 16.1-20 ; 2 Ch 28.1-27. Sur Ezéchias (715 à 686 ou 698 av. J.-C.) voir 2 R 18 à 20 ; 2 Ch 29 à 32. Ces datations tiennent compte des co-régences.
  - type: text
    content: . Cette révélation reçue par Michée concerne les villes de Samarie et de Jérusalem
  - type: note
    content: 'Samarie et Jérusalem représentent les royaumes dont elles sont la capitale : la première Israël, le royaume du Nord, et la seconde, Juda. Samarie sera conquise par les Assyriens en 722-721 av. J.-C.'
  - type: text
    content: .
  - type: heading
    content: Le jugement sur Israël
  '10':
  - type: text
    content: Ne le proclamez pas ╵dans la ville de Gath
  - type: note
    content: 'Michée joue sur le sens des noms des villes qu’il énumère pour les avertir des malheurs qui les attendent lorsque les Assyriens viendront envahir leur pays. Gath: en Philistie. Le nom de la ville fait assonance en hébreu avec le verbe proclamer.'
  - type: text
    content: ','
  - type: text
    content: ne pleurez pas
  - type: note
    content: 'Traduction incertaine. L’ancienne version grecque suggère : ne pleurez pas à Acre, ville située à 14 kilomètres au nord-est de Haïfa, dont le nom fait assonance avec le verbe pleurer. Cependant, toutes les autres villes des versets qui suivent (v. 10-15) sont situées en Juda.'
  - type: text
    content: .
  - type: text
    content: Gens de Beth-Leaphra
  - type: note
    content: Site inconnu. Le nom Leaphra fait assonance avec le mot poussière.
  - type: text
    content: ', ╵couvrez-vous de poussière !'
  '11':
  - type: text
    content: Habitants de Shaphir
  - type: note
    content: 'Localité située peut-être à 12 kilomètres à l’ouest d’Hébron dont le nom serait conservé dans l’actuel Wadi es-Suffar. Son nom ressemble en hébreu à un terme signifiant : être beau.'
  - type: text
    content: ','
  - type: text
    content: allez nus et honteux !
  - type: text
    content: Le peuple de Tsaanân
  - type: note
    content: Site inconnu. Le nom de la ville de Tsaanân fait assonance avec le verbe sortir.
  - type: text
    content: ' ╵ne sortira plus de sa ville,'
  - type: text
    content: et celui de Beth-Haëtsel
  - type: note
    content: 'Peut-être l’actuelle Dèr el-Asal, à 17 kilomètres au sud-ouest d’Hébron. Le nom Haëtsel ressemble à un verbe hébreu qui signifie : retirer.'
  - type: text
    content: ' ╵ne sait plus que se lamenter ╵et son soutien vous est ôté.'
  '12':
  - type: text
    content: Le peuple de Maroth
  - type: note
    content: 'Site inconnu. Le nom de la ville de Maroth ressemble en hébreu à un terme signifiant : amertume.'
  - type: text
    content: ' ╵est bien malade'
  - type: note
    content: 'est bien malade: hébreu obscur. Autre traduction : espérait le bonheur.'
  - type: text
    content: .
  - type: text
    content: Oui, le malheur ╵est envoyé par l’Eternel,
  - type: text
    content: jusque devant tes portes, ╵Jérusalem !
  '13':
  - type: text
    content: Habitants de Lakish
  - type: note
    content: Une grande ville de Juda, à 45 kilomètres au sud-ouest de Jérusalem. Son nom fait assonance en hébreu avec le mot char.
  - type: text
    content: ','
  - type: text
    content: attelez les coursiers aux chars,
  - type: text
    content: car vous êtes à l’origine ╵du péché de la communauté de Sion ;
  - type: text
    content: c’est bien chez vous ╵que les transgressions d’Israël ╵ont été imitées.
  '14':
  - type: text
    content: Voilà pourquoi ╵vous devez donner à Morésheth-Gath
  - type: note
    content: Voir 1.1 et note. Le nom de la ville ressemble en hébreu au terme désignant la fiancée.
  - type: text
    content: ' ╵sa lettre de divorce'
  - type: note
    content: 'Autre traduction : voilà pourquoi vous devrez donner pour Morésheth-Gath une dot.'
  - type: text
    content: ','
  - type: text
    content: et les maisons d’Akzib
  - type: note
    content: A 20 kilomètres au nord-ouest d’Hébron (Jos 15.44). Le nom de la ville fait assonance avec le terme rendu par cause de déception.
  - type: text
    content: ' ╵seront source de tromperie'
  - type: text
    content: pour les rois d’Israël.
  '15':
  - type: text
    content: Contre vous, habitants de Marésha,
  - type: text
    content: je vais faire venir ╵un nouveau conquérant,
  - type: text
    content: et le glorieux roi d’Israël ╵devra se réfugier ╵à Adoullam
  - type: note
    content: 'Marésha et Adoullam: deux villes proches d’Akzib. Le nom de la ville de Marésha fait assonance avec le mot conquérant. Adoullam: allusion à l’épisode rapporté en 1 S 22.1.'
  - type: text
    content: .
  '16':
  - type: text
    content: Rasez-vous donc, ╵et tondez-vous la tête, ╵habitants de Jérusalem,
  - type: text
    content: en signe de douleur ╵à cause de vos fils ╵qui font tous vos délices !
  - type: text
    content: Oui, rasez-vous la tête, ╵rendez-vous chauves, ╵pareils à des vautours,
  - type: text
    content: parce qu’ils vont être emmenés ╵loin de vous en exil.
  '2':
  - type: text
    content: Ecoutez vous tous, peuples !
  - type: text
    content: 'Prête attention, ô terre, ╵et vous tous qui vivez sur elle :'
  - type: text
    content: le Seigneur, l’Eternel ╵sera témoin à charge contre vous ;
  - type: text
    content: oui, le Seigneur, ╵depuis son sanctuaire.
  - type: heading
    content: L’annonce du jugement
  '3':
  - type: text
    content: Voici que l’Eternel ╵sort de sa résidence.
  - type: text
    content: Il descend et il marche ╵sur les lieux élevés ╵que présente la terre.
  '4':
  - type: text
    content: Sous ses pas les montagnes fondent,
  - type: text
    content: et le fond des vallées se fend
  - type: text
    content: comme la cire au feu,
  - type: text
    content: comme de l’eau versée ╵coulant sur une pente.
  '5':
  - type: text
    content: Et pourquoi tout cela ? ╵A cause de la transgression ╵des enfants de Jacob
  - type: note
    content: C’est-à-dire les deux royaumes israélites, celui du Nord et celui de Juda.
  - type: text
    content: ','
  - type: text
    content: à cause des péchés ╵du peuple d’Israël.
  - type: text
    content: Qui incita Jacob ╵à cette transgression ?
  - type: text
    content: N’est-ce pas Samarie ?
  - type: text
    content: Et qui donc a promu ╵ces hauts lieux en Juda ?
  - type: text
    content: N’est-ce pas toi, ╵Jérusalem ?
  '6':
  - type: text
    content: Aussi vais-je réduire Samarie ╵à un monceau de pierres ╵dans la campagne,
  - type: text
    content: et l’on y plantera des vignes ;
  - type: text
    content: je précipiterai ses pierres ╵au fond de la vallée
  - type: text
    content: et je la raserai ╵jusqu’à ses fondations.
  '7':
  - type: text
    content: Les statues de ses dieux ╵seront toutes brisées,
  - type: text
    content: et tous ses gains impurs ╵seront livrés au feu.
  - type: text
    content: 'Oui, toutes ses idoles, ╵je les mettrai en pièces :'
  - type: text
    content: elles ont été faites ╵grâce au salaire ╵de ses prostitutions.
  - type: text
    content: Aussi serviront-elles ╵comme salaire ╵d’autres prostitutions
  - type: note
    content: 'Les richesses amassées par Samarie au moyen de l’idolâtrie et de la prostitution sacrée seront emportées par les Assyriens : ils les placeront dans leurs temples pour servir au culte de leurs idoles ou encore, leurs soldats s’en serviront pour payer de simples prostituées.'
  - type: text
    content: .
  - type: heading
    content: Complainte sur les villes de Juda
  '8':
  - type: text
    content: Voilà pourquoi ╵je vais mener le deuil, ╵je vais me lamenter,
  - type: text
    content: je vais marcher pieds nus, ╵sans vêtements.
  - type: text
    content: Je pousserai des cris, ╵comme ceux du chacal,
  - type: text
    content: et des gémissements ╵comme font les autruches.
  '9':
  - type: text
    content: La plaie de Samarie ╵est incurable
  - type: text
    content: et elle atteint même Juda.
  - type: text
    content: 'La voilà qui s’avance ╵jusqu’à la porte de mon peuple :'
  - type: text
    content: jusqu’à Jérusalem.
