document_id: MIC.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici les paroles que l’Eternel a adressées à Michée de Morésheth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localité située à 35 kilomètres au sud-ouest de Jérusalem, à l’est de Gath.
      marker-yv: yv-n
    - type: text
      text: ' sous les règnes de Yotam, Ahaz et Ezéchias, rois de Juda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yotam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(740 à 732 av. J.-C.) voir 2 R 15.32-38 ; 2 Ch 27.1-9. Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(735 à 715 av. J.-C.) voir 2 R 16.1-20 ; 2 Ch 28.1-27. Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ezéchias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (715 à 686 ou 698 av. J.-C.) voir 2 R 18 à 20 ; 2 Ch 29 à 32. Ces datations tiennent compte des co-régences.
      marker-yv: yv-n
    - type: text
      text: . Cette révélation reçue par Michée concerne les villes de Samarie et de Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Samarie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'représentent les royaumes dont elles sont la capitale : la première Israël, le royaume du Nord, et la seconde, Juda. Samarie sera conquise par les Assyriens en 722-721 av. J.-C.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le jugement sur Israël
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ne le proclamez pas ╵dans la ville de Gath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Michée joue sur le sens des noms des villes qu’il énumère pour les avertir des malheurs qui les attendent lorsque les Assyriens viendront envahir leur pays. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gath
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Philistie. Le nom de la ville fait assonance en hébreu avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proclamer.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne pleurez pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine. L’ancienne version grecque suggère : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne pleurez pas à Acre, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ville située à 14 kilomètres au nord-est de Haïfa, dont le nom fait assonance avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pleurer. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cependant, toutes les autres villes des versets qui suivent (v. 10-15) sont situées en Juda.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gens de Beth-Leaphra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Site inconnu. Le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Leaphra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance avec le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: poussière.
      marker-yv: yv-n
    - type: text
      text: ', ╵couvrez-vous de poussière !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Habitants de Shaphir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Localité située peut-être à 12 kilomètres à l’ouest d’Hébron dont le nom serait conservé dans l’actuel Wadi es-Suffar. Son nom ressemble en hébreu à un terme signifiant : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être beau.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: allez nus et honteux !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple de Tsaanân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Site inconnu. Le nom de la ville de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tsaanân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sortir.
      marker-yv: yv-n
    - type: text
      text: ' ╵ne sortira plus de sa ville,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui de Beth-Haëtsel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Peut-être l’actuelle Dèr el-Asal, à 17 kilomètres au sud-ouest d’Hébron. Le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Haëtsel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ressemble à un verbe hébreu qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: retirer.
      marker-yv: yv-n
    - type: text
      text: ' ╵ne sait plus que se lamenter ╵et son soutien vous est ôté.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le peuple de Maroth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Site inconnu. Le nom de la ville de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Maroth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ressemble en hébreu à un terme signifiant : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: amertume.
      marker-yv: yv-n
    - type: text
      text: ' ╵est bien malade'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est bien malade
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'hébreu obscur. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: espérait le bonheur.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le malheur ╵est envoyé par l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusque devant tes portes, ╵Jérusalem !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Habitants de Lakish
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Une grande ville de Juda, à 45 kilomètres au sud-ouest de Jérusalem. Son nom fait assonance en hébreu avec le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: char.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: attelez les coursiers aux chars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car vous êtes à l’origine ╵du péché de la communauté de Sion ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est bien chez vous ╵que les transgressions d’Israël ╵ont été imitées.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Voilà pourquoi ╵vous devez donner à Morésheth-Gath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.1'
        - type: text
          text: ' et note. Le nom de la ville ressemble en hébreu au terme désignant la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fiancée.
      marker-yv: yv-n
    - type: text
      text: ' ╵sa lettre de divorce'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voilà pourquoi vous devrez donner pour Morésheth-Gath une dot.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les maisons d’Akzib
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A 20 kilomètres au nord-ouest d’Hébron (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15.44
        - type: text
          text: '). Le nom de la ville fait assonance avec le terme rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cause de déception.
      marker-yv: yv-n
    - type: text
      text: ' ╵seront source de tromperie'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les rois d’Israël.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Contre vous, habitants de Marésha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais faire venir ╵un nouveau conquérant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le glorieux roi d’Israël ╵devra se réfugier ╵à Adoullam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Marésha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adoullam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'deux villes proches d’Akzib. Le nom de la ville de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Marésha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance avec le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'conquérant. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adoullam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'allusion à l’épisode rapporté en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 22.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rasez-vous donc, ╵et tondez-vous la tête, ╵habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en signe de douleur ╵à cause de vos fils ╵qui font tous vos délices !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, rasez-vous la tête, ╵rendez-vous chauves, ╵pareils à des vautours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils vont être emmenés ╵loin de vous en exil.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ecoutez vous tous, peuples !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Prête attention, ô terre, ╵et vous tous qui vivez sur elle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur, l’Eternel ╵sera témoin à charge contre vous ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, le Seigneur, ╵depuis son sanctuaire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce du jugement
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voici que l’Eternel ╵sort de sa résidence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il descend et il marche ╵sur les lieux élevés ╵que présente la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sous ses pas les montagnes fondent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le fond des vallées se fend
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la cire au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme de l’eau versée ╵coulant sur une pente.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et pourquoi tout cela ? ╵A cause de la transgression ╵des enfants de Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les deux royaumes israélites, celui du Nord et celui de Juda.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause des péchés ╵du peuple d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui incita Jacob ╵à cette transgression ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas Samarie ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui donc a promu ╵ces hauts lieux en Juda ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas toi, ╵Jérusalem ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aussi vais-je réduire Samarie ╵à un monceau de pierres ╵dans la campagne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on y plantera des vignes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je précipiterai ses pierres ╵au fond de la vallée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je la raserai ╵jusqu’à ses fondations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les statues de ses dieux ╵seront toutes brisées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses gains impurs ╵seront livrés au feu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, toutes ses idoles, ╵je les mettrai en pièces :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont été faites ╵grâce au salaire ╵de ses prostitutions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi serviront-elles ╵comme salaire ╵d’autres prostitutions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les richesses amassées par Samarie au moyen de l’idolâtrie et de la prostitution sacrée seront emportées par les Assyriens : ils les placeront dans leurs temples pour servir au culte de leurs idoles ou encore, leurs soldats s’en serviront pour payer de simples prostituées.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Complainte sur les villes de Juda
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voilà pourquoi ╵je vais mener le deuil, ╵je vais me lamenter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais marcher pieds nus, ╵sans vêtements.
  - type: usfm
    marker: q1
    children:
    - type: text
