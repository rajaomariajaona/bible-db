document_id: JDG.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Samson épouse une Philistine
  - type: text
    content: Un jour, Samson se rendit à Timna
  - type: note
    content: Ville de la tribu de Dan (Jos 19.43) occupée alors par les Philistins.
  - type: text
    content: ', il y remarqua une jeune fille philistine. '
  '10':
  - type: text
    content: 'Son père se rendit chez la femme pour convenir du mariage, et Samson organisa un banquet de mariage, comme c’était la coutume des jeunes gens. '
  '11':
  - type: text
    content: 'Lorsqu’on le vit, on choisit trente compagnons pour être avec lui. '
  '12':
  - type: text
    content: 'Samson leur dit : Je vais vous proposer une énigme. Si vous trouvez la solution et que vous me la donnez d’ici la fin des sept jours du festin, je vous donnerai trente tuniques et trente habits de rechange. '
  '13':
  - type: text
    content: Mais si vous ne pouvez pas me donner la solution, c’est vous qui me donnerez trente chemises et trente habits de rechange.
  - type: text
    content: – Nous t’écoutons, lui répondirent-ils. Propose-nous ton énigme !
  '14':
  - type: text
    content: 'Alors il leur dit :'
  - type: text
    content: De celui qui mange ╵vient ce que l’on mange,
  - type: text
    content: et ce qui est doux ╵est sorti du fort.
  - type: text
    content: 'Pendant trois jours, les jeunes gens ne réussirent pas à trouver la solution de la devinette. '
  '15':
  - type: text
    content: Le quatrième jour
  - type: note
    content: 'Selon certains manuscrits de l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : le septième jour.'
  - type: text
    content: ', ils dirent à la femme de Samson : Enjôle ton mari pour qu’il te donne la réponse de la devinette, et viens nous la rapporter, sinon nous te brûlerons, toi et ta famille. Est-ce pour nous déposséder que vous nous avez invités ? '
  '16':
  - type: text
    content: 'Alors elle se mit à pleurer tout contre son mari et lui dit : Tu ne m’aimes pas ! Tu me détestes ! Tu as proposé une devinette à mes compatriotes et tu ne m’en as pas révélé la solution.'
  - type: text
    content: – Vois-tu, lui répondit-il, je ne l’ai même pas révélée à mes parents, comment te la donnerais-je à toi ?
  '17':
  - type: text
    content: 'Elle le poursuivit de ses pleurs jusqu’au bout des sept jours de festin, si bien que le septième jour, harcelé par ses instances, il lui donna la solution de la devinette. Elle s’empressa de la rapporter à ses compatriotes. '
  '18':
  - type: text
    content: 'Le septième jour, les jeunes gens de la ville dirent à Samson avant le coucher du soleil : Qu’y a-t-il de plus doux que le miel et de plus fort qu’un lion ?'
  - type: text
    content: 'Il leur répondit : Si vous n’aviez pas labouré avec ma génisse, vous n’auriez pas trouvé la réponse.'
  '19':
  - type: text
    content: Alors l’Esprit de l’Eternel fondit sur lui, il se rendit à Ashkelôn
  - type: note
    content: L’une des cinq villes principales des Philistins, située en bord de mer.
  - type: text
    content: ', y tua trente hommes, s’empara de leurs vêtements et donna les habits de rechange à ceux qui lui avaient révélé le sens de la devinette. Il rentra chez lui, bouillant de colère. '
  '2':
  - type: text
    content: 'A son retour, il raconta la chose à ses parents et leur dit : J’ai remarqué une femme parmi les Philistines et je voudrais que vous alliez la demander en mariage pour moi.'
  '20':
  - type: text
    content: On maria sa femme à celui de ses compagnons qui lui avait servi de garçon d’honneur.
  '3':
  - type: text
    content: 'Ses parents lui répondirent : Est-ce qu’il n’y a pas de jeune fille dans ta tribu ou dans les autres tribus de notre peuple, pour que tu ailles chercher une épouse chez ces Philistins incirconcis ?'
  - type: text
    content: 'Mais Samson dit à son père : C’est elle que je juge bon de prendre, va la demander pour moi !'
  '4':
  - type: text
    content: Ses parents ne savaient pas que cela était dirigé par l’Eternel, car il cherchait une occasion de conflit avec les Philistins. En effet, en ce temps-là, les Philistins dominaient sur Israël.
  '5':
  - type: text
    content: Samson se rendit donc avec son père et sa mère à Timna. Quand ils arrivèrent près des vignobles de la ville, tout à coup un jeune lion
  - type: note
    content: Les lions étaient nombreux dans le sud du pays d’Israël à cette époque (1 S 17.34 ; 2 S 23.20 ; 1 R 13.24 ; 20.36).
  - type: text
    content: ' marcha sur lui en rugissant. '
  '6':
  - type: text
    content: 'Alors l’Esprit de l’Eternel fondit sur lui et, les mains nues, Samson déchira le lion en deux, comme on le fait d’un chevreau. Il se garda de raconter la chose à ses parents. '
  '7':
  - type: text
    content: Ensuite, il alla faire sa déclaration à la femme qui lui plut beaucoup.
  '8':
  - type: text
    content: 'Lorsqu’il revint, quelque temps après, pour l’épouser, il fit un détour pour aller voir le cadavre du lion, et voici qu’il trouva dans la carcasse un essaim d’abeilles et du miel. '
  '9':
  - type: text
    content: Il en prit dans ses mains et, tout en marchant, il en mangea. Lorsqu’il eut rejoint ses parents, il leur en offrit, sans leur indiquer qu’il avait recueilli ce miel dans le cadavre du lion.
  - type: heading
    content: L’énigme de Samson
