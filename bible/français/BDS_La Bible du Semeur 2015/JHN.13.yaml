document_id: JHN.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les adieux du maître
  - type: heading
    content: Jésus lave les pieds de ses disciples
  - type: text
    content: 'C’était juste avant la fête de la Pâque. Jésus savait que l’heure était venue pour lui de quitter ce monde pour s’en aller auprès du Père. C’est pourquoi il donna aux siens, qu’il aimait et qui étaient dans le monde, une marque suprême de son amour pour eux. '
  '10':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: 'Celui qui s’est baigné est entièrement '
  - type: text
    content: pur
  - type: text
    content: ', il lui suffit de se laver les pieds'
  - type: note
    content: 'Les mots : il lui suffit de se laver les pieds sont absents de certains manuscrits.'
  - type: text
    content: . Or vous, vous êtes purs – mais pas tous.
  '11':
  - type: text
    content: 'Jésus, en effet, connaissait celui qui allait le livrer. Voilà pourquoi il avait ajouté : « Vous n’êtes pas tous purs. »'
  '12':
  - type: text
    content: 'Après leur avoir lavé les pieds, il remit son vêtement et se remit à table. Alors il leur dit : '
  - type: text
    content: Avez-vous compris ce que je viens de vous faire ?
  '13':
  - type: text
    content: ' '
  - type: text
    content: Vous m’appelez Maître et Seigneur – et vous avez raison, car je le suis.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Si donc moi, le Seigneur et le Maître, je vous ai lavé les pieds, vous devez, vous aussi, vous laver les pieds les uns aux autres.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je viens de vous donner un exemple, pour qu’à votre tour vous agissiez comme j’ai agi envers vous.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Vraiment, je vous l’assure, un serviteur n’est jamais supérieur à son maître, ni un messager plus grand que celui qui l’envoie.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Si vous savez ces choses, vous êtes heureux à condition de les mettre en pratique.
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'Je ne parle pas de vous tous : je sais très bien quels sont ceux que j’ai choisis – mais il faut que l’Ecriture s’accomplisse : '
  - type: text
    content: Celui qui partage mon pain se tourne contre moi
  - type: text
    content: ' '
  - type: note
    content: Ps 41.10 .
  - type: text
    content: .
  - type: text
    content: ' '
  '19':
  - type: text
    content: Je vous le dis dès maintenant, avant que cela se produise, pour qu’au moment où cela arrivera, vous croyiez que moi, je suis
  - type: note
    content: Voir note 8.24.
  - type: text
    content: .
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'C’était au cours du repas. Déjà le diable avait semé dans le cœur de Judas, fils de Simon Iscariot, le projet de trahir son Maître et de le livrer. '
  '20':
  - type: text
    content: 'Vraiment, je vous l’assure : qui reçoit celui que j’envoie me reçoit moi-même, et qui me reçoit, reçoit celui qui m’a envoyé.'
  - type: heading
    content: Le traître
  - type: heading
    content: (Mt 26.20-25 ; Mc 14.17-21 ; Lc 22.21-23)
  '21':
  - type: text
    content: 'Après avoir dit cela, Jésus fut troublé intérieurement et il déclara solennellement : '
  - type: text
    content: 'Oui, vraiment, je vous l’assure : l’un de vous me trahira.'
  '22':
  - type: text
    content: 'Les disciples, déconcertés, se regardaient les uns les autres ; ils se demandaient de qui il pouvait bien parler. '
  '23':
  - type: text
    content: 'L’un d’entre eux, le disciple que Jésus aimait, se trouvait à table juste à côté de Jésus. '
  '24':
  - type: text
    content: 'Simon Pierre lui fit signe de demander à Jésus de qui il parlait. '
  '25':
  - type: text
    content: 'Et ce disciple, se penchant aussitôt vers Jésus, lui demanda : Seigneur, de qui s’agit-il ?'
  '26':
  - type: text
    content: 'Et Jésus lui répondit : '
  - type: text
    content: Je vais tremper ce morceau de pain dans le plat. Celui à qui je le donnerai, c’est lui.
  - type: text
    content: Là-dessus, Jésus prit le morceau qu’il avait trempé et le donna à Judas, fils de Simon Iscariot.
  '27':
  - type: text
    content: Dès que Judas eut reçu ce morceau de pain, Satan entra en lui.
  - type: text
    content: 'Alors Jésus lui dit : '
  - type: text
    content: Ce que tu fais, fais-le vite.
  '28':
  - type: text
    content: 'Aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela. '
  '29':
  - type: text
    content: 'Comme Judas gérait la bourse commune, quelques-uns supposèrent que Jésus le chargeait d’acheter ce qu’il leur fallait pour la fête, ou de donner quelque chose aux pauvres. '
  '3':
  - type: text
    content: Jésus savait que le Père avait tout remis entre ses mains, qu’il était venu d’auprès de Dieu et qu’il allait retourner auprès de lui.
  '30':
  - type: text
    content: Dès que Judas eut pris le morceau de pain, il se hâta de sortir. Il faisait nuit.
  - type: heading
    content: Le nouveau commandement
  '31':
  - type: text
    content: 'Quand il fut parti, Jésus dit : '
  - type: text
    content: 'Maintenant, la gloire du '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' éclate, et Dieu va être glorifié en lui.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: '['
  - type: text
    content: Puisque Dieu va être glorifié en lui
  - type: note
    content: Les mots entre crochets sont absents de nombreux manuscrits.
  - type: text
    content: ','
  - type: text
    content: '] '
  - type: text
    content: Dieu, à son tour, va glorifier le Fils de l’homme en lui-même, et il le fera bientôt.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Mes chers enfants, je suis encore avec vous, mais plus pour longtemps. Vous me chercherez ; et ce que j’ai dit à tous, je vous le dis à vous aussi maintenant : vous ne pouvez pas aller là où je vais.'
  '34':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous donne un commandement nouveau : Aimez-vous les uns les autres. Oui, comme je vous ai aimés, aimez-vous les uns les autres.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'A ceci, tous reconnaîtront que vous êtes mes disciples : à l’amour que vous aurez les uns pour les autres.'
  '36':
  - type: text
    content: 'Simon Pierre lui demanda : Seigneur, où vas-tu ?'
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Tu ne peux me suivre maintenant là où je vais, mais plus tard tu me suivras.
  '37':
  - type: text
    content: 'Mais Pierre reprit : Et pourquoi donc, Seigneur, ne puis-je pas te suivre dès maintenant ? Je suis prêt à donner ma vie pour toi !'
  '38':
  - type: text
    content: ' '
  - type: text
    content: – Tu es prêt à donner ta vie pour moi ?
  - type: text
    content: ' répondit Jésus. '
  - type: text
    content: 'Oui, vraiment, je te l’assure : avant que le coq se mette à chanter, tu m’auras renié trois fois.'
  '4':
  - type: text
    content: 'Il se leva de table pendant le dîner, posa son vêtement et prit une serviette de lin qu’il se noua autour de la taille. '
  '5':
  - type: text
    content: Ensuite, il versa de l’eau dans une bassine et commença à laver les pieds de ses disciples, puis à les essuyer avec la serviette qu’il s’était nouée autour de la taille.
  '6':
  - type: text
    content: 'Quand vint le tour de Simon Pierre, celui-ci protesta : Toi, Seigneur, tu veux me laver les pieds ?'
  '7':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Ce que je fais, tu ne le comprends pas pour l’instant, tu le comprendras plus tard.
  '8':
  - type: text
    content: 'Mais Pierre lui répliqua : Non ! Tu ne me laveras pas les pieds ! Sûrement pas !'
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Si je ne te lave pas, il n’y a plus rien de commun entre toi et moi.
  '9':
  - type: text
    content: – Dans ce cas, lui dit Simon Pierre, ne me lave pas seulement les pieds, mais aussi les mains et la tête.
