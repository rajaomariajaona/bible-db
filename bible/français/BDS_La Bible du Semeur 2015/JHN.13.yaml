document_id: JHN.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les adieux du maître
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus lave les pieds de ses disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’était juste avant la fête de la Pâque. Jésus savait que l’heure était venue pour lui de quitter ce monde pour s’en aller auprès du Père. C’est pourquoi il donna aux siens, qu’il aimait et qui étaient dans le monde, une marque suprême de son amour pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’était au cours du repas. Déjà le diable avait semé dans le cœur de Judas, fils de Simon Iscariot, le projet de trahir son Maître et de le livrer. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jésus savait que le Père avait tout remis entre ses mains, qu’il était venu d’auprès de Dieu et qu’il allait retourner auprès de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il se leva de table pendant le dîner, posa son vêtement et prit une serviette de lin qu’il se noua autour de la taille. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ensuite, il versa de l’eau dans une bassine et commença à laver les pieds de ses disciples, puis à les essuyer avec la serviette qu’il s’était nouée autour de la taille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand vint le tour de Simon Pierre, celui-ci protesta : Toi, Seigneur, tu veux me laver les pieds ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que je fais, tu ne le comprends pas pour l’instant, tu le comprendras plus tard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Pierre lui répliqua : Non ! Tu ne me laveras pas les pieds ! Sûrement pas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je ne te lave pas, il n’y a plus rien de commun entre toi et moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – Dans ce cas, lui dit Simon Pierre, ne me lave pas seulement les pieds, mais aussi les mains et la tête.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Celui qui s’est baigné est entièrement '
    - type: usfm
      marker: w
      children:
      - type: text
        text: pur
    - type: text
      text: ', il lui suffit de se laver les pieds'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il lui suffit de se laver les pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont absents de certains manuscrits.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Or vous, vous êtes purs – mais pas tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus, en effet, connaissait celui qui allait le livrer. Voilà pourquoi il avait ajouté : « Vous n’êtes pas tous purs. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après leur avoir lavé les pieds, il remit son vêtement et se remit à table. Alors il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avez-vous compris ce que je viens de vous faire ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous m’appelez Maître et Seigneur – et vous avez raison, car je le suis.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc moi, le Seigneur et le Maître, je vous ai lavé les pieds, vous devez, vous aussi, vous laver les pieds les uns aux autres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je viens de vous donner un exemple, pour qu’à votre tour vous agissiez comme j’ai agi envers vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, un serviteur n’est jamais supérieur à son maître, ni un messager plus grand que celui qui l’envoie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous savez ces choses, vous êtes heureux à condition de les mettre en pratique.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je ne parle pas de vous tous : je sais très bien quels sont ceux que j’ai choisis – mais il faut que l’Ecriture s’accomplisse : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui partage mon pain se tourne contre moi
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 41.10
        metadata:
          usfm: PSA.41.10
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis dès maintenant, avant que cela se produise, pour qu’au moment où cela arrivera, vous croyiez que moi, je suis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.24'
        metadata:
          usfm: JHN.8.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : qui reçoit celui que j’envoie me reçoit moi-même, et qui me reçoit, reçoit celui qui m’a envoyé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le traître
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 26.20-25 ; Mc 14.17-21 ; Lc 22.21-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après avoir dit cela, Jésus fut troublé intérieurement et il déclara solennellement : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, vraiment, je vous l’assure : l’un de vous me trahira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les disciples, déconcertés, se regardaient les uns les autres ; ils se demandaient de qui il pouvait bien parler. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’un d’entre eux, le disciple que Jésus aimait, se trouvait à table juste à côté de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon Pierre lui fit signe de demander à Jésus de qui il parlait. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et ce disciple, se penchant aussitôt vers Jésus, lui demanda : Seigneur, de qui s’agit-il ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vais tremper ce morceau de pain dans le plat. Celui à qui je le donnerai, c’est lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: Là-dessus, Jésus prit le morceau qu’il avait trempé et le donna à Judas, fils de Simon Iscariot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dès que Judas eut reçu ce morceau de pain, Satan entra en lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que tu fais, fais-le vite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme Judas gérait la bourse commune, quelques-uns supposèrent que Jésus le chargeait d’acheter ce qu’il leur fallait pour la fête, ou de donner quelque chose aux pauvres. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dès que Judas eut pris le morceau de pain, il se hâta de sortir. Il faisait nuit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nouveau commandement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quand il fut parti, Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Maintenant, la gloire du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' éclate, et Dieu va être glorifié en lui.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '['
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Puisque Dieu va être glorifié en lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets sont absents de nombreux manuscrits.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ','
  - type: text
    text: '] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu, à son tour, va glorifier le Fils de l’homme en lui-même, et il le fera bientôt.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mes chers enfants, je suis encore avec vous, mais plus pour longtemps. Vous me chercherez ; et ce que j’ai dit à tous, je vous le dis à vous aussi maintenant : vous ne pouvez pas aller là où je vais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous donne un commandement nouveau : Aimez-vous les uns les autres. Oui, comme je vous ai aimés, aimez-vous les uns les autres.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A ceci, tous reconnaîtront que vous êtes mes disciples : à l’amour que vous aurez les uns pour les autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon Pierre lui demanda : Seigneur, où vas-tu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu ne peux me suivre maintenant là où je vais, mais plus tard tu me suivras.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Pierre reprit : Et pourquoi donc, Seigneur, ne puis-je pas te suivre dès maintenant ? Je suis prêt à donner ma vie pour toi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu es prêt à donner ta vie pour moi ?
  - type: text
    text: ' répondit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, vraiment, je te l’assure : avant que le coq se mette à chanter, tu m’auras renié trois fois.'
