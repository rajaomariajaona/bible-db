        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y avait, à l’époque où Hérode était roi de Judée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Grecs avaient l’habitude d’appeler ainsi tout le pays des Juifs.
      marker-yv: yv-n
    - type: text
      text: ', un prêtre nommé Zacharie, qui appartenait à la classe sacerdotale d’Abiya. Sa femme était une descendante d’Aaron ; elle s’appelait Elisabeth. '
  '50':
