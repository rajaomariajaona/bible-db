  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme il l’avait promis à nos ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Abraham et à ses descendants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tous les temps.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Marie resta environ trois mois avec Elisabeth, puis elle retourna chez elle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La naissance de Jean-Baptiste
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le moment arriva où Elisabeth devait accoucher. Elle donna naissance à un fils. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses voisins et les membres de sa famille apprirent combien le Seigneur avait été bon pour elle, et ils se réjouissaient avec elle.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour après sa naissance, ils vinrent pour la circoncision du nouveau-né. Tout le monde voulait l’appeler Zacharie comme son père, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous deux étaient justes aux yeux de Dieu et observaient tous les commandements et toutes les lois du Seigneur de façon irréprochable. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais sa mère intervint et dit : Non, il s’appellera Jean.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Mais, lui fit-on remarquer, personne dans ta famille ne porte ce nom-là !
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils interrogèrent le père, par des gestes, pour savoir quel nom il voulait donner à l’enfant. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zacharie se fit apporter une tablette et, au grand étonnement de tous, il y traça ces mots : Son nom est Jean.'
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cet instant, sa bouche s’ouvrit et sa langue se délia : il parlait et louait Dieu.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les gens du voisinage furent remplis de crainte, et l’on parlait de tous ces événements dans toutes les montagnes de Judée. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux qui les apprenaient en étaient profondément impressionnés et disaient : « Que sera donc cet enfant ? » Car le Seigneur était avec lui.'
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zacharie, son père, fut rempli de l’Esprit Saint et prophétisa en ces termes :'
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loué soit le Seigneur, ╵Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est venu prendre soin de son peuple ╵et il l’a délivré.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour nous, il a fait naître ╵parmi les descendants ╵du roi David, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un Libérateur plein de force.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils n’avaient pas d’enfant, car Elisabeth était stérile et tous deux étaient déjà très âgés.
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient d’accomplir la promesse ╵qu’il avait faite ╵depuis les premiers temps ╵par la voix de ses saints prophètes
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il nous délivrerait ╵de tous nos ennemis, ╵et du pouvoir de ceux qui nous haïssent.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il manifeste sa bonté ╵à l’égard de nos pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il agit conformément ╵à son alliance sainte.
  '73':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il accomplit pour nous ╵le serment qu’il a fait ╵à notre ancêtre, Abraham,
  '74':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de nous accorder la faveur, ╵après nous avoir délivrés ╵de tous nos ennemis,
  '75':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de le servir sans crainte ╵en étant saints et justes ╵en sa présence ╵tous les jours de la vie.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, petit enfant, ╵tu seras appelé ╵prophète du Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, devant le Seigneur, ╵tu marcheras en précurseur ╵pour préparer sa route,
  '77':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en faisant savoir à son peuple ╵que Dieu lui donne le salut ╵et qu’il pardonne ses péchés.
  '78':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car notre Dieu ╵est plein de compassion ╵et de bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est pourquoi l’astre levant ╵viendra pour nous d’en haut,
