document_id: LUK.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Plusieurs personnes ont entrepris de composer un récit des événements qui se sont passés parmi nous, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: d’après ce que nous ont transmis ceux qui en ont été les témoins oculaires depuis le début et qui sont devenus des serviteurs de la Parole de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’ai donc décidé à mon tour de m’informer soigneusement sur tout ce qui est arrivé depuis le commencement, et de te l’exposer par écrit de manière suivie, très honorable Théophile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Personnage sans doute riche et haut placé à qui Luc dédie son ouvrage. Le titre qui lui est donné était employé pour les membres de l’ordre équestre à Rome.
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ainsi, tu pourras reconnaître l’entière véracité des enseignements que tu as reçus.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Naissance et enfance de Jésus
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce de la naissance de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il y avait, à l’époque où Hérode était roi de Judée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Grecs avaient l’habitude d’appeler ainsi tout le pays des Juifs.
    marker-yv: yv-n
  - type: text
    text: ', un prêtre nommé Zacharie, qui appartenait à la classe sacerdotale d’Abiya. Sa femme était une descendante d’Aaron ; elle s’appelait Elisabeth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous deux étaient justes aux yeux de Dieu et observaient tous les commandements et toutes les lois du Seigneur de façon irréprochable. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils n’avaient pas d’enfant, car Elisabeth était stérile et tous deux étaient déjà très âgés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un jour, Zacharie assurait son service devant Dieu : c’était le tour de sa classe sacerdotale. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Suivant la coutume des prêtres, il avait été désigné par le sort pour entrer dans le sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le lieu saint où seuls les prêtres avaient le droit de pénétrer.
    marker-yv: yv-n
  - type: text
    text: ' du Seigneur et y offrir l’encens. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A l’heure de l’offrande des parfums, toute la multitude du peuple se tenait en prière à l’extérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tout à coup, un ange du Seigneur lui apparut, debout à droite de l’autel des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Zacharie le vit, il en fut bouleversé et la peur s’empara de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais l’ange lui dit : N’aie pas peur, Zacharie, car Dieu a entendu ta prière : ta femme Elisabeth te donnera un fils. Tu l’appelleras Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il sera pour toi le sujet d’une très grande joie, et beaucoup de gens se réjouiront de sa naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il sera grand aux yeux du Seigneur. Il ne boira ni vin, ni boisson alcoolisée. Il sera rempli de l’Esprit Saint dès le sein maternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il ramènera beaucoup d’Israélites au Seigneur, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il accomplira sa mission sous le regard de Dieu, avec l’Esprit et la puissance qui résidaient en Elie, pour réconcilier les pères avec leurs enfants, pour amener ceux qui sont désobéissants à penser comme des hommes justes et former ainsi un peuple prêt pour le Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zacharie demanda à l’ange : A quoi le reconnaîtrai-je ? Car je suis moi-même déjà vieux et ma femme est très âgée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’ange lui répondit : Je suis Gabriel. Je me tiens devant Dieu, qui m’a envoyé pour te parler et t’annoncer cette nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors, voici : tu vas devenir muet et tu resteras incapable de parler jusqu’au jour où ce que je viens de t’annoncer se réalisera ; il en sera ainsi parce que tu n’as pas cru à mes paroles, qui s’accompliront au temps prévu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pendant ce temps, la foule attendait Zacharie ; elle s’étonnait de le voir s’attarder dans le sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lorsqu’il sortit enfin, il était incapable de parler aux personnes rassemblées. Elles comprirent alors qu’il avait eu une vision dans le sanctuaire. Quant à lui, il leur faisait des signes et restait muet. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsqu’il eut terminé son temps de service, il retourna chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelque temps après, sa femme Elisabeth devint enceinte et, pendant cinq mois, elle se tint cachée. Elle se disait : '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est l’œuvre du Seigneur en ma faveur : il a décidé d’effacer ce qui faisait ma honte aux yeux de tous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour la femme juive, c’était un déshonneur de ne pas avoir d’enfants.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce de la naissance de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Six mois plus tard, Dieu envoya l’ange Gabriel dans une ville de Galilée appelée Nazareth, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: chez une jeune fille liée par fiançailles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En Israël, les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fiancés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient juridiquement mariés mais n’avaient pas encore de vie commune.
    marker-yv: yv-n
  - type: text
    text: ' à un homme nommé Joseph, un descendant de David. Cette jeune fille s’appelait Marie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’ange entra chez elle et lui dit : Réjouis-toi, toi à qui Dieu a accordé sa faveur : le Seigneur est avec toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Marie fut profondément troublée par ces paroles ; elle se demandait ce que signifiait cette salutation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’ange lui dit alors : N’aie pas peur, Marie, car Dieu t’a accordé sa faveur. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici : bientôt tu seras enceinte et tu mettras au monde un fils ; tu le nommeras Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il sera grand. Il sera appelé « Fils du Très-Haut », et le Seigneur Dieu lui donnera le trône de David, son ancêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il régnera éternellement sur le peuple issu de Jacob, et son règne n’aura pas de fin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Marie dit à l’ange : Comment cela se fera-t-il, puisque je suis vierge ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’ange lui répondit : L’Esprit Saint descendra sur toi, et la puissance du Dieu très-haut te couvrira de son ombre. C’est pourquoi le saint enfant qui naîtra de toi sera appelé Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Vois : ta parente Elisabeth attend elle aussi un fils, malgré son grand âge ; on disait qu’elle ne pouvait pas avoir d’enfant, et elle en est à son sixième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Car rien n’est impossible à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors Marie répondit : Je suis la servante du Seigneur. Que tout ce que tu m’as dit s’accomplisse pour moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et l’ange la quitta.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marie chez Elisabeth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Peu après, Marie partit pour se rendre en hâte dans une ville de montagne du territoire de Judée. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Elle entra chez Zacharie et salua Elisabeth. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Au moment où celle-ci entendit la salutation de Marie, elle sentit son enfant remuer en elle. Elle fut remplie du Saint-Esprit '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'et s’écria d’une voix forte : Tu es bénie plus que toutes les femmes et l’enfant que tu portes est béni. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Comment ai-je mérité l’honneur que la mère de mon Seigneur vienne me voir ? '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Car, vois-tu, au moment même où je t’ai entendu me saluer, mon enfant a bondi de joie au-dedans de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Tu es heureuse, toi qui as cru à l’accomplissement de ce que le Seigneur t’a annoncé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car ce que le Seigneur t’a annoncé s’accomplira.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors Marie dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme chante ╵la grandeur du Seigneur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: et mon esprit se réjouit ╵à cause de Dieu, mon Sauveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Car il a bien voulu ╵abaisser son regard ╵sur son humble servante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi, désormais, ╵à travers tous les temps, ╵on m’appellera bienheureuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Car le Dieu tout-puissant ╵a fait pour moi de grandes choses ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: lui, il est saint
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.49 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2.2
        metadata:
          usfm: 1SA.2.2
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Et sa bonté
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: s’étendra d’âge en âge
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sur ceux qui le craignent
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.50 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103.13
        metadata:
          usfm: PSA.103.13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
        metadata:
          usfm: PSA.103.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il est intervenu ╵de toute sa puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a dispersé ╵les hommes dont le cœur ╵était rempli d’orgueil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a précipité
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les puissants de leurs trônes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et il a élevé les humbles
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.52 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2.7
        metadata:
          usfm: 1SA.2.7
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a comblé de biens
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ceux qui sont affamés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et il a renvoyé
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les riches les mains vides
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 S 2.5 ; Ps 107.9.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Oui, il a pris en main
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la cause d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.54 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 41.8-9
        metadata:
          usfm: ISA.41.8+ISA.41.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il a témoigné sa bonté
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: au peuple qui le sert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.54 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 98.3
        metadata:
          usfm: PSA.98.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: comme il l’avait promis à nos ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Abraham et à ses descendants
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous les temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Marie resta environ trois mois avec Elisabeth, puis elle retourna chez elle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Le moment arriva où Elisabeth devait accoucher. Elle donna naissance à un fils. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ses voisins et les membres de sa famille apprirent combien le Seigneur avait été bon pour elle, et ils se réjouissaient avec elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Le huitième jour après sa naissance, ils vinrent pour la circoncision du nouveau-né. Tout le monde voulait l’appeler Zacharie comme son père, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'mais sa mère intervint et dit : Non, il s’appellera Jean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: – Mais, lui fit-on remarquer, personne dans ta famille ne porte ce nom-là !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Alors ils interrogèrent le père, par des gestes, pour savoir quel nom il voulait donner à l’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Zacharie se fit apporter une tablette et, au grand étonnement de tous, il y traça ces mots : Son nom est Jean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'A cet instant, sa bouche s’ouvrit et sa langue se délia : il parlait et louait Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Tous les gens du voisinage furent remplis de crainte, et l’on parlait de tous ces événements dans toutes les montagnes de Judée. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Tous ceux qui les apprenaient en étaient profondément impressionnés et disaient : « Que sera donc cet enfant ? » Car le Seigneur était avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Zacharie, son père, fut rempli de l’Esprit Saint et prophétisa en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: Loué soit le Seigneur, ╵Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est venu prendre soin de son peuple ╵et il l’a délivré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Pour nous, il a fait naître ╵parmi les descendants ╵du roi David, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un Libérateur plein de force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Il vient d’accomplir la promesse ╵qu’il avait faite ╵depuis les premiers temps ╵par la voix de ses saints prophètes
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: qu’il nous délivrerait ╵de tous nos ennemis, ╵et du pouvoir de ceux qui nous haïssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Il manifeste sa bonté ╵à l’égard de nos pères
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il agit conformément ╵à son alliance sainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: Il accomplit pour nous ╵le serment qu’il a fait ╵à notre ancêtre, Abraham,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: de nous accorder la faveur, ╵après nous avoir délivrés ╵de tous nos ennemis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: de le servir sans crainte ╵en étant saints et justes ╵en sa présence ╵tous les jours de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: Et toi, petit enfant, ╵tu seras appelé ╵prophète du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, devant le Seigneur, ╵tu marcheras en précurseur ╵pour préparer sa route,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: en faisant savoir à son peuple ╵que Dieu lui donne le salut ╵et qu’il pardonne ses péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Car notre Dieu ╵est plein de compassion ╵et de bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est pourquoi l’astre levant ╵viendra pour nous d’en haut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour éclairer tous ceux
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qui habitent dans les ténèbres
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et l’ombre de la mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.79 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 9.1
        metadata:
          usfm: ISA.9.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour guider nos pas ╵sur la voie de la paix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: Le petit enfant grandissait et son esprit se fortifiait. Plus tard, il vécut dans des lieux déserts jusqu’au jour où il se manifesta publiquement au peuple d’Israël.
