document_id: LUK.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs personnes ont entrepris de composer un récit des événements qui se sont passés parmi nous, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l’heure de l’offrande des parfums, toute la multitude du peuple se tenait en prière à l’extérieur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout à coup, un ange du Seigneur lui apparut, debout à droite de l’autel des parfums. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Zacharie le vit, il en fut bouleversé et la peur s’empara de lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’ange lui dit : N’aie pas peur, Zacharie, car Dieu a entendu ta prière : ta femme Elisabeth te donnera un fils. Tu l’appelleras Jean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera pour toi le sujet d’une très grande joie, et beaucoup de gens se réjouiront de sa naissance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera grand aux yeux du Seigneur. Il ne boira ni vin, ni boisson alcoolisée. Il sera rempli de l’Esprit Saint dès le sein maternel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ramènera beaucoup d’Israélites au Seigneur, leur Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il accomplira sa mission sous le regard de Dieu, avec l’Esprit et la puissance qui résidaient en Elie, pour réconcilier les pères avec leurs enfants, pour amener ceux qui sont désobéissants à penser comme des hommes justes et former ainsi un peuple prêt pour le Seigneur.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zacharie demanda à l’ange : A quoi le reconnaîtrai-je ? Car je suis moi-même déjà vieux et ma femme est très âgée.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange lui répondit : Je suis Gabriel. Je me tiens devant Dieu, qui m’a envoyé pour te parler et t’annoncer cette nouvelle. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: d’après ce que nous ont transmis ceux qui en ont été les témoins oculaires depuis le début et qui sont devenus des serviteurs de la Parole de Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, voici : tu vas devenir muet et tu resteras incapable de parler jusqu’au jour où ce que je viens de t’annoncer se réalisera ; il en sera ainsi parce que tu n’as pas cru à mes paroles, qui s’accompliront au temps prévu.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant ce temps, la foule attendait Zacharie ; elle s’étonnait de le voir s’attarder dans le sanctuaire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il sortit enfin, il était incapable de parler aux personnes rassemblées. Elles comprirent alors qu’il avait eu une vision dans le sanctuaire. Quant à lui, il leur faisait des signes et restait muet. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’il eut terminé son temps de service, il retourna chez lui.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelque temps après, sa femme Elisabeth devint enceinte et, pendant cinq mois, elle se tint cachée. Elle se disait : '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est l’œuvre du Seigneur en ma faveur : il a décidé d’effacer ce qui faisait ma honte aux yeux de tous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour la femme juive, c’était un déshonneur de ne pas avoir d’enfants.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce de la naissance de Jésus
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six mois plus tard, Dieu envoya l’ange Gabriel dans une ville de Galilée appelée Nazareth, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: chez une jeune fille liée par fiançailles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En Israël, les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fiancés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient juridiquement mariés mais n’avaient pas encore de vie commune.
      marker-yv: yv-n
    - type: text
      text: ' à un homme nommé Joseph, un descendant de David. Cette jeune fille s’appelait Marie.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange entra chez elle et lui dit : Réjouis-toi, toi à qui Dieu a accordé sa faveur : le Seigneur est avec toi.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Marie fut profondément troublée par ces paroles ; elle se demandait ce que signifiait cette salutation.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai donc décidé à mon tour de m’informer soigneusement sur tout ce qui est arrivé depuis le commencement, et de te l’exposer par écrit de manière suivie, très honorable Théophile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Personnage sans doute riche et haut placé à qui Luc dédie son ouvrage. Le titre qui lui est donné était employé pour les membres de l’ordre équestre à Rome.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange lui dit alors : N’aie pas peur, Marie, car Dieu t’a accordé sa faveur. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici : bientôt tu seras enceinte et tu mettras au monde un fils ; tu le nommeras Jésus. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera grand. Il sera appelé « Fils du Très-Haut », et le Seigneur Dieu lui donnera le trône de David, son ancêtre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il régnera éternellement sur le peuple issu de Jacob, et son règne n’aura pas de fin.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marie dit à l’ange : Comment cela se fera-t-il, puisque je suis vierge ?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange lui répondit : L’Esprit Saint descendra sur toi, et la puissance du Dieu très-haut te couvrira de son ombre. C’est pourquoi le saint enfant qui naîtra de toi sera appelé Fils de Dieu. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vois : ta parente Elisabeth attend elle aussi un fils, malgré son grand âge ; on disait qu’elle ne pouvait pas avoir d’enfant, et elle en est à son sixième mois. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car rien n’est impossible à Dieu.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Marie répondit : Je suis la servante du Seigneur. Que tout ce que tu m’as dit s’accomplisse pour moi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et l’ange la quitta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Marie chez Elisabeth
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, Marie partit pour se rendre en hâte dans une ville de montagne du territoire de Judée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi, tu pourras reconnaître l’entière véracité des enseignements que tu as reçus.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Naissance et enfance de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce de la naissance de Jean-Baptiste
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle entra chez Zacharie et salua Elisabeth. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où celle-ci entendit la salutation de Marie, elle sentit son enfant remuer en elle. Elle fut remplie du Saint-Esprit '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et s’écria d’une voix forte : Tu es bénie plus que toutes les femmes et l’enfant que tu portes est béni. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comment ai-je mérité l’honneur que la mère de mon Seigneur vienne me voir ? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, vois-tu, au moment même où je t’ai entendu me saluer, mon enfant a bondi de joie au-dedans de moi. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu es heureuse, toi qui as cru à l’accomplissement de ce que le Seigneur t’a annoncé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car ce que le Seigneur t’a annoncé s’accomplira.
      marker-yv: yv-n
    - type: text
      text: .
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Marie dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme chante ╵la grandeur du Seigneur
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon esprit se réjouit ╵à cause de Dieu, mon Sauveur.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a bien voulu ╵abaisser son regard ╵sur son humble servante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi, désormais, ╵à travers tous les temps, ╵on m’appellera bienheureuse.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le Dieu tout-puissant ╵a fait pour moi de grandes choses ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: lui, il est saint
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
