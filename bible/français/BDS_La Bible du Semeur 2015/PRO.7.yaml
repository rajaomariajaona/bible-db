document_id: PRO.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Une opération de séduction
  - type: text
    content: Mon fils, retiens mes paroles et
  - type: text
    content: imprègne-toi de mes préceptes.
  '10':
  - type: text
    content: Or, voici que cette femme vint à sa rencontre,
  - type: text
    content: habillée comme une prostituée et l’esprit plein de ruse.
  '11':
  - type: text
    content: Elle parlait fort, impertinente,
  - type: text
    content: elle ne tenait pas en place chez elle.
  '12':
  - type: text
    content: Tantôt dans la rue, tantôt sur les places,
  - type: text
    content: elle faisait le guet à tous les carrefours.
  '13':
  - type: text
    content: Elle attrapa le jeune homme, l’embrassa
  - type: text
    content: 'et, l’air effronté, elle lui dit :'
  '14':
  - type: text
    content: « J’avais à faire un sacrifice de reconnaissance,
  - type: text
    content: je viens, aujourd’hui même, de m’acquitter de mes vœux
  - type: note
    content: Une partie de la viande du sacrifice était mangée par l’offrant et sa famille (Lv 7.12-15), le premier et le second jour (Lv 7.15-16). Le jeune homme est invité à ce repas.
  - type: text
    content: .
  '15':
  - type: text
    content: Voilà pourquoi je suis sortie à ta rencontre,
  - type: text
    content: je cherchais à te voir, et je t’ai trouvé.
  '16':
  - type: text
    content: J’ai garni mon lit de couvertures
  - type: text
    content: et d’étoffe brodée en fils d’Egypte
  - type: note
    content: Le lin d’Egypte était très prisé et cher (Es 19.9 ; Ez 27.7) ; c’était un signe de richesse (31.22).
  - type: text
    content: .
  '17':
  - type: text
    content: J’ai parfumé mon lit
  - type: text
    content: de myrrhe, d’aloès et de cinnamome.
  '18':
  - type: text
    content: Viens, grisons-nous d’amour jusqu’au matin,
  - type: text
    content: livrons-nous aux délices de la volupté,
  '19':
  - type: text
    content: 'car mon mari n’est pas à la maison :'
  - type: text
    content: il est parti pour un voyage au loin.
  '2':
  - type: text
    content: Suis mes préceptes et tu vivras,
  - type: text
    content: garde mes enseignements comme la prunelle de tes yeux.
  '20':
  - type: text
    content: Il a emporté une bourse pleine d’argent,
  - type: text
    content: il ne rentrera qu’à la pleine lune. »
  '21':
  - type: text
    content: A force d’artifices, elle le fit fléchir ;
  - type: text
    content: par ses propos enjôleurs, elle l’entraîna.
  '22':
  - type: text
    content: Alors il se mit soudain à la suivre
  - type: text
    content: comme un bœuf qui va à l’abattoir,
  - type: text
    content: comme un fou qu’on lie pour le châtier,
  '23':
  - type: text
    content: jusqu’à ce qu’une flèche lui transperce le foie,
  - type: text
    content: comme un oiseau qui se précipite dans le filet
  - type: text
    content: sans se douter qu’il y va de sa vie.
  '24':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi !
  - type: text
    content: Prêtez attention à mes paroles !
  '25':
  - type: text
    content: Que votre cœur ne se laisse pas entraîner par une telle femme !
  - type: text
    content: Ne vous égarez pas dans ses sentiers,
  '26':
  - type: text
    content: car nombreuses sont ses victimes blessées à mort,
  - type: text
    content: et ceux qu’elle a fait périr comptent parmi les plus robustes.
  '27':
  - type: text
    content: Sa maison est le chemin du séjour des morts
  - type: text
    content: qui mène directement aux demeures de la mort.
  '3':
  - type: text
    content: Porte-les comme un anneau à ton doigt,
  - type: text
    content: grave-les sur les tablettes de ton cœur.
  '4':
  - type: text
    content: 'Dis à la sagesse : « Tu es ma sœur'
  - type: note
    content: Terme d’affection qui désigne la bien-aimée dans Ct 4.9, 10, 12 ; 5.1.
  - type: text
    content: '  »,'
  - type: text
    content: et considère l’intelligence comme ta parente,
  '5':
  - type: text
    content: pour qu’elles te préservent de la femme d’autrui,
  - type: text
    content: de l’inconnue aux paroles enjôleuses.
  '6':
  - type: text
    content: Un jour, je regardais à travers le treillis de ma fenêtre
  - type: note
    content: Les fenêtres étaient, dans les pays chauds, fermées par un treillis métallique qui tamisait les rayons du soleil et permettait de voir sans être vu.
  - type: text
    content: ','
  '7':
  - type: text
    content: et je vis un de ces jeunes sans expérience,
  - type: text
    content: j’observai un jeune homme écervelé.
  '8':
  - type: text
    content: Il passait dans la rue près du coin où se tenait l’une de ces femmes,
  - type: text
    content: se dirigeant vers sa maison.
  '9':
  - type: text
    content: C’était au crépuscule, le jour baissait,
  - type: text
    content: et l’obscurité de la nuit commençait à se répandre.
