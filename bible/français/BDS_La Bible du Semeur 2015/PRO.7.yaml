document_id: PRO.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une opération de séduction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, retiens mes paroles et
- type: usfm
  marker: q1
  children:
  - type: text
    text: imprègne-toi de mes préceptes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Suis mes préceptes et tu vivras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garde mes enseignements comme la prunelle de tes yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Porte-les comme un anneau à ton doigt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grave-les sur les tablettes de ton cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dis à la sagesse : « Tu es ma sœur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme d’affection qui désigne la bien-aimée dans Ct 4.9, 10, 12 ; 5.1.
    marker-yv: yv-n
  - type: text
    text: '  »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et considère l’intelligence comme ta parente,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: pour qu’elles te préservent de la femme d’autrui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’inconnue aux paroles enjôleuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un jour, je regardais à travers le treillis de ma fenêtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les fenêtres étaient, dans les pays chauds, fermées par un treillis métallique qui tamisait les rayons du soleil et permettait de voir sans être vu.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: et je vis un de ces jeunes sans expérience,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’observai un jeune homme écervelé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il passait dans la rue près du coin où se tenait l’une de ces femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: se dirigeant vers sa maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’était au crépuscule, le jour baissait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’obscurité de la nuit commençait à se répandre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Or, voici que cette femme vint à sa rencontre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habillée comme une prostituée et l’esprit plein de ruse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle parlait fort, impertinente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne tenait pas en place chez elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tantôt dans la rue, tantôt sur les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle faisait le guet à tous les carrefours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle attrapa le jeune homme, l’embrassa
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et, l’air effronté, elle lui dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: « J’avais à faire un sacrifice de reconnaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je viens, aujourd’hui même, de m’acquitter de mes vœux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une partie de la viande du sacrifice était mangée par l’offrant et sa famille (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 7.12-15
        metadata:
          usfm: LEV.7.12+LEV.7.13+LEV.7.14+LEV.7.15
      - type: text
        text: ), le premier et le second jour (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 7.15-16
        metadata:
          usfm: LEV.7.15+LEV.7.16
      - type: text
        text: ). Le jeune homme est invité à ce repas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà pourquoi je suis sortie à ta rencontre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je cherchais à te voir, et je t’ai trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’ai garni mon lit de couvertures
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’étoffe brodée en fils d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le lin d’Egypte était très prisé et cher (Es 19.9 ; Ez 27.7) ; c’était un signe de richesse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31.22'
        metadata:
          usfm: PRO.31.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’ai parfumé mon lit
- type: usfm
  marker: q1
  children:
  - type: text
    text: de myrrhe, d’aloès et de cinnamome.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Viens, grisons-nous d’amour jusqu’au matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: livrons-nous aux délices de la volupté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'car mon mari n’est pas à la maison :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est parti pour un voyage au loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il a emporté une bourse pleine d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne rentrera qu’à la pleine lune. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A force d’artifices, elle le fit fléchir ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: par ses propos enjôleurs, elle l’entraîna.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors il se mit soudain à la suivre
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un bœuf qui va à l’abattoir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un fou qu’on lie pour le châtier,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: jusqu’à ce qu’une flèche lui transperce le foie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un oiseau qui se précipite dans le filet
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans se douter qu’il y va de sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prêtez attention à mes paroles !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que votre cœur ne se laisse pas entraîner par une telle femme !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne vous égarez pas dans ses sentiers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: car nombreuses sont ses victimes blessées à mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qu’elle a fait périr comptent parmi les plus robustes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Sa maison est le chemin du séjour des morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui mène directement aux demeures de la mort.
