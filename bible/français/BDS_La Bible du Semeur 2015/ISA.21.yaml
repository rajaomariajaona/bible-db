document_id: ISA.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Babylone
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur le désert maritime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Le désert maritime '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne soit la grande plaine parsemée de marécages, s’étendant jusqu’au sud du désert d’Arabie, soit la plaine alluviale de basse Mésopotamie formée par le Tigre et l’Euphrate et leurs affluents.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel l’ouragan ╵traversant le Néguev,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’envahisseur vient du désert, ╵d’un pays redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Une révélation terrible ╵m’a été faite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où le traître trahit, ╵le destructeur détruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Attaquez, Elamites ! ╵Assiégez, vous les Mèdes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais faire cesser ╵tous les gémissements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gémissements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'des peuples asservis par la Babylonie. Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Elamites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mèdes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peuples vivant en Perse (l’actuel Iran).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi, l’angoisse m’étreint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des douleurs m’ont saisi
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme en couches ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tordu par les souffrances, ╵je ne peux plus entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’effroi m’ôte la vue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon esprit est troublé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je tremble de frayeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soir tant attendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: est devenu pour moi ╵un objet d’épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On prépare une table ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’une nappe, on la couvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on mange, on boit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 5
        metadata:
          usfm: DAN.5
      - type: text
        text: ', Babylone fut prise pendant un banquet des grands du royaume.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Soudain, un cri d’effroi : ╵« Levez-vous, capitaines !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Graissez vos boucliers ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici comment ╵m’a parlé le Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Va poster un guetteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il dise ce qu’il voit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: S’il voit un char
- type: usfm
  marker: q1
  children:
  - type: text
    text: attelé d’une paire de chevaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des cavaliers sur des ânes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’autres sur des chameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il les observe bien, ╵redoublant d’attention. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le guetteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le guetteur
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après le principal texte hébreu de Qumrân. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un lion.
    marker-yv: yv-n
  - type: text
    text: ' a crié :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Mon seigneur, je me tiens ╵tout le jour aux aguets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je veille les nuits entières, ╵à mon poste de garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici : quelqu’un vient, ╵un homme sur un char'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tiré par deux chevaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il prend la parole et il dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Elle est tombée, ╵Babylone est tombée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les statues ╵de ses divinités
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont là, brisées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les a brisées.
    marker-yv: yv-n
  - type: text
    text: ', par terre !” »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O toi mon peuple, ╵qu’on a battu ╵comme du grain sur l’aire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que j’ai entendu ╵de l’Eternel, ╵le Seigneur des armées célestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous l’ai déclaré.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Douma et l’Arabie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oracle sur Douma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Douma
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: oasis de l’Arabie du Nord, à l’est d’Edom.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On me crie de Séir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Séir
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: située au centre du pays d’Edom.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Veilleur, que dis-tu de la nuit ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veilleur, que dis-tu de la nuit ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et le veilleur répond :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Le matin vient, ╵et la nuit vient aussi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous voulez poser ╵des questions, posez-les !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revenez-y, ╵oui, venez à nouveau ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Oracle sur l’Arabie :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O caravanes de Dedân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dedân
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tribu arabe de marchands mentionnée aussi en Ez 27.20 ; 38.13.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous passerez la nuit ╵dans les forêts de l’Arabie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Allez à la rencontre ╵de celui qui a soif ╵et portez-lui de l’eau ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de Téma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Téma
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tribu ismaélite établie dans le voisinage d’Edom (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 25.23
        metadata:
          usfm: JER.25.23
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: allez au-devant des fuyards ╵avec du pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car ils se sont enfuis ╵devant les épées dégainées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et devant l’arc bandé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant le combat violent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici comment ╵le Seigneur m’a parlé :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans un délai d’un an ╵compté comme l’on compte
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’année d’un mercenaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16.14'
        metadata:
          usfm: ISA.16.14
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la gloire de Qédar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qédar
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autre tribu ismaélite nomade (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.13
        metadata:
          usfm: GEN.25.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵sera anéantie.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et il ne restera ╵qu’une poignée infime ╵d’archers et de guerriers ╵chez les gens de Qédar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Eternel, ╵le Dieu d’Israël, a parlé.
