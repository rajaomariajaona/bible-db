document_id: ISA.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Babylone
  - type: text
    content: Oracle sur le désert maritime
  - type: note
    content: Le désert maritime désigne soit la grande plaine parsemée de marécages, s’étendant jusqu’au sud du désert d’Arabie, soit la plaine alluviale de basse Mésopotamie formée par le Tigre et l’Euphrate et leurs affluents.
  - type: text
    content: '  :'
  - type: text
    content: Tel l’ouragan ╵traversant le Néguev,
  - type: text
    content: l’envahisseur vient du désert, ╵d’un pays redoutable.
  '10':
  - type: text
    content: O toi mon peuple, ╵qu’on a battu ╵comme du grain sur l’aire,
  - type: text
    content: ce que j’ai entendu ╵de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: je vous l’ai déclaré.
  - type: heading
    content: Contre Douma et l’Arabie
  '11':
  - type: text
    content: Oracle sur Douma
  - type: note
    content: 'Douma: oasis de l’Arabie du Nord, à l’est d’Edom.'
  - type: text
    content: '  :'
  - type: text
    content: On me crie de Séir
  - type: note
    content: 'Séir: située au centre du pays d’Edom.'
  - type: text
    content: '  :'
  - type: text
    content: « Veilleur, que dis-tu de la nuit ?
  - type: text
    content: Veilleur, que dis-tu de la nuit ? »
  '12':
  - type: text
    content: 'Et le veilleur répond :'
  - type: text
    content: « Le matin vient, ╵et la nuit vient aussi.
  - type: text
    content: Si vous voulez poser ╵des questions, posez-les !
  - type: text
    content: Revenez-y, ╵oui, venez à nouveau ! »
  '13':
  - type: text
    content: 'Oracle sur l’Arabie :'
  - type: text
    content: O caravanes de Dedân
  - type: note
    content: 'Dedân: tribu arabe de marchands mentionnée aussi en Ez 27.20 ; 38.13.'
  - type: text
    content: ','
  - type: text
    content: vous passerez la nuit ╵dans les forêts de l’Arabie.
  '14':
  - type: text
    content: Allez à la rencontre ╵de celui qui a soif ╵et portez-lui de l’eau ;
  - type: text
    content: habitants de Téma
  - type: note
    content: 'Téma: tribu ismaélite établie dans le voisinage d’Edom (Jr 25.23).'
  - type: text
    content: ','
  - type: text
    content: allez au-devant des fuyards ╵avec du pain.
  '15':
  - type: text
    content: Car ils se sont enfuis ╵devant les épées dégainées
  - type: text
    content: et devant l’arc bandé,
  - type: text
    content: devant le combat violent.
  '16':
  - type: text
    content: 'Voici comment ╵le Seigneur m’a parlé :'
  - type: text
    content: Dans un délai d’un an ╵compté comme l’on compte
  - type: text
    content: l’année d’un mercenaire
  - type: note
    content: Voir 16.14 et note.
  - type: text
    content: ','
  - type: text
    content: toute la gloire de Qédar
  - type: note
    content: 'Qédar: autre tribu ismaélite nomade (Gn 25.13).'
  - type: text
    content: ' ╵sera anéantie.'
  '17':
  - type: text
    content: Et il ne restera ╵qu’une poignée infime ╵d’archers et de guerriers ╵chez les gens de Qédar.
  - type: text
    content: Car l’Eternel, ╵le Dieu d’Israël, a parlé.
  '2':
  - type: text
    content: Une révélation terrible ╵m’a été faite,
  - type: text
    content: où le traître trahit, ╵le destructeur détruit.
  - type: text
    content: Attaquez, Elamites ! ╵Assiégez, vous les Mèdes !
  - type: text
    content: Je vais faire cesser ╵tous les gémissements
  - type: note
    content: 'Les gémissements des peuples asservis par la Babylonie. Les Elamites et les Mèdes: peuples vivant en Perse (l’actuel Iran).'
  - type: text
    content: .
  '3':
  - type: text
    content: C’est pourquoi, l’angoisse m’étreint,
  - type: text
    content: des douleurs m’ont saisi
  - type: text
    content: comme une femme en couches ;
  - type: text
    content: tordu par les souffrances, ╵je ne peux plus entendre,
  - type: text
    content: l’effroi m’ôte la vue.
  '4':
  - type: text
    content: Mon esprit est troublé,
  - type: text
    content: je tremble de frayeur.
  - type: text
    content: Le soir tant attendu
  - type: text
    content: est devenu pour moi ╵un objet d’épouvante.
  '5':
  - type: text
    content: On prépare une table ;
  - type: text
    content: d’une nappe, on la couvre,
  - type: text
    content: on mange, on boit
  - type: note
    content: Selon Dn 5, Babylone fut prise pendant un banquet des grands du royaume.
  - type: text
    content: .
  - type: text
    content: 'Soudain, un cri d’effroi : ╵« Levez-vous, capitaines !'
  - type: text
    content: Graissez vos boucliers ! »
  '6':
  - type: text
    content: 'Voici comment ╵m’a parlé le Seigneur :'
  - type: text
    content: « Va poster un guetteur,
  - type: text
    content: qu’il dise ce qu’il voit.
  '7':
  - type: text
    content: S’il voit un char
  - type: text
    content: attelé d’une paire de chevaux
  - type: text
    content: et des cavaliers sur des ânes,
  - type: text
    content: d’autres sur des chameaux,
  - type: text
    content: qu’il les observe bien, ╵redoublant d’attention. »
  '8':
  - type: text
    content: Le guetteur
  - type: note
    content: 'Le guetteur: d’après le principal texte hébreu de Qumrân. Le texte hébreu traditionnel a : un lion.'
  - type: text
    content: ' a crié :'
  - type: text
    content: « Mon seigneur, je me tiens ╵tout le jour aux aguets,
  - type: text
    content: et je veille les nuits entières, ╵à mon poste de garde.
  '9':
  - type: text
    content: 'Et voici : quelqu’un vient, ╵un homme sur un char'
  - type: text
    content: tiré par deux chevaux.
  - type: text
    content: 'Il prend la parole et il dit :'
  - type: text
    content: “Elle est tombée, ╵Babylone est tombée,
  - type: text
    content: et toutes les statues ╵de ses divinités
  - type: text
    content: sont là, brisées
  - type: note
    content: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : il les a brisées.'
  - type: text
    content: ', par terre !” »'
