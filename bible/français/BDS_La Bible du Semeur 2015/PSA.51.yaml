document_id: PSA.51,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: J’ai péché contre toi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'Au chef de chœur. Un psaume de David, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais résonner à nouveau ╵la joie et l’allégresse pour moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les os que tu as broyés ╵retrouveront la gaieté.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne considère plus mes péchés !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous mes torts, efface-les !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, crée en moi ╵un cœur pur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renouvelle en moi ╵un esprit bien disposé !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me renvoie pas ╵loin de ta présence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me reprends pas ton Esprit saint.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la joie du salut ╵que tu accomplis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et affermis-moi ╵par ton Esprit généreux !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je pourrai montrer ╵à qui est coupable ╵le chemin que tu prescris
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que les pécheurs ╵reviennent à toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, toi le Dieu qui me libères, ╵viens me délivrer ╵du poids de mon crime
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 11.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors, par mes chants, ╵je proclamerai ╵ta justice.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ouvre mes lèvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te louerai.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu ne désires pas ╵que je t’offre un sacrifice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’aurais offert des holocaustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu n’y prends pas plaisir.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le seul sacrifice ╵qui convienne à Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sacrifice que je t’offre, ô Dieu.
      marker-yv: yv-n
    - type: text
      text: ', ╵c’est un esprit humilié.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, tu n’écartes pas ╵un cœur brisé et contrit.
  '2':
  - type: usfm
    marker: d
    children:
    - type: text
      text: qu’il composa lorsque le prophète Nathan vint chez lui après qu’il eut péché avec Bath-Shéba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 11
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta bonté, fais du bien ╵à la ville de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bâtis les murs ╵de Jérusalem !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors tu prendras plaisir ╵à des sacrifices ╵qui sont conformes à la Loi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holocaustes et offrandes totales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on offrira ╵des taureaux sur ton autel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, ô Dieu, ╵toi qui es si bon !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Efface mes transgressions, ╵tu es si compatissant !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lave-moi de mon péché !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purifie-moi de ma faute !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je reconnais mes torts :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la pensée de mon péché ╵me poursuit sans cesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre toi, contre toi seul, ╵j’ai péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai commis ╵ce qui est mal à tes yeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi tu es juste ╵quand tu émets ta sentence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu es irréprochable ╵quand tu rends ton jugement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 3.4
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis, depuis ma naissance, ╵marqué du péché ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis qu’en ma mère ╵j’ai été conçu, le péché est attaché à moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu veux que la sincérité ╵demeure au fond de mon être.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’enseignes la sagesse ╵au plus profond de moi-même.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purifie-moi du péché ╵avec un rameau d’hysope
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Plante utilisée pour l’aspersion du sang dans les rites de purification ordonnés par la Loi (Ex 12.22 ; Lv 14.4, 6 ; Nb 19.6, 18 ; Hé 9.19).
      marker-yv: yv-n
    - type: text
      text: ', ╵et je serai pur !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lave-moi et je serai ╵plus blanc que la neige.
