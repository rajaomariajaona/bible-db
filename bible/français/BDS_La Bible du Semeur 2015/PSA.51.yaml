document_id: PSA.51,21
type_code: fra
verses:
  '1':
  - type: heading
    content: J’ai péché contre toi
  - type: text
    content: 'Au chef de chœur. Un psaume de David, '
  '10':
  - type: text
    content: Fais résonner à nouveau ╵la joie et l’allégresse pour moi !
  - type: text
    content: Les os que tu as broyés ╵retrouveront la gaieté.
  '11':
  - type: text
    content: Ne considère plus mes péchés !
  - type: text
    content: Tous mes torts, efface-les !
  '12':
  - type: text
    content: O Dieu, crée en moi ╵un cœur pur !
  - type: text
    content: Renouvelle en moi ╵un esprit bien disposé !
  '13':
  - type: text
    content: Ne me renvoie pas ╵loin de ta présence,
  - type: text
    content: ne me reprends pas ton Esprit saint.
  '14':
  - type: text
    content: Rends-moi la joie du salut ╵que tu accomplis,
  - type: text
    content: et affermis-moi ╵par ton Esprit généreux !
  '15':
  - type: text
    content: Alors je pourrai montrer ╵à qui est coupable ╵le chemin que tu prescris
  - type: text
    content: pour que les pécheurs ╵reviennent à toi.
  '16':
  - type: text
    content: O Dieu, toi le Dieu qui me libères, ╵viens me délivrer ╵du poids de mon crime
  - type: note
    content: 2 S 11.17.
  - type: text
    content: ','
  - type: text
    content: alors, par mes chants, ╵je proclamerai ╵ta justice.
  '17':
  - type: text
    content: Eternel, ouvre mes lèvres
  - type: text
    content: et je te louerai.
  '18':
  - type: text
    content: Car tu ne désires pas ╵que je t’offre un sacrifice.
  - type: text
    content: Je t’aurais offert des holocaustes,
  - type: text
    content: mais tu n’y prends pas plaisir.
  '19':
  - type: text
    content: Le seul sacrifice ╵qui convienne à Dieu
  - type: note
    content: 'Autre traduction : le sacrifice que je t’offre, ô Dieu.'
  - type: text
    content: ', ╵c’est un esprit humilié.'
  - type: text
    content: O Dieu, tu n’écartes pas ╵un cœur brisé et contrit.
  '2':
  - type: text
    content: qu’il composa lorsque le prophète Nathan vint chez lui après qu’il eut péché avec Bath-Shéba
  - type: note
    content: Voir 2 S 11 et 12.
  - type: text
    content: .
  '20':
  - type: text
    content: Dans ta bonté, fais du bien ╵à la ville de Sion,
  - type: text
    content: et bâtis les murs ╵de Jérusalem !
  '21':
  - type: text
    content: 'Alors tu prendras plaisir ╵à des sacrifices ╵qui sont conformes à la Loi :'
  - type: text
    content: holocaustes et offrandes totales,
  - type: text
    content: et l’on offrira ╵des taureaux sur ton autel.
  '3':
  - type: text
    content: Aie pitié de moi, ô Dieu, ╵toi qui es si bon !
  - type: text
    content: Efface mes transgressions, ╵tu es si compatissant !
  '4':
  - type: text
    content: Lave-moi de mon péché !
  - type: text
    content: Purifie-moi de ma faute !
  '5':
  - type: text
    content: 'Car je reconnais mes torts :'
  - type: text
    content: la pensée de mon péché ╵me poursuit sans cesse.
  '6':
  - type: text
    content: Contre toi, contre toi seul, ╵j’ai péché,
  - type: text
    content: j’ai commis ╵ce qui est mal à tes yeux.
  - type: text
    content: Voilà pourquoi tu es juste ╵quand tu émets ta sentence,
  - type: text
    content: et tu es irréprochable ╵quand tu rends ton jugement
  - type: note
    content: Cité en Rm 3.4 d’après l’ancienne version grecque.
  - type: text
    content: .
  '7':
  - type: text
    content: Je suis, depuis ma naissance, ╵marqué du péché ;
  - type: text
    content: depuis qu’en ma mère ╵j’ai été conçu, le péché est attaché à moi.
  '8':
  - type: text
    content: Mais tu veux que la sincérité ╵demeure au fond de mon être.
  - type: text
    content: Tu m’enseignes la sagesse ╵au plus profond de moi-même.
  '9':
  - type: text
    content: Purifie-moi du péché ╵avec un rameau d’hysope
  - type: note
    content: Plante utilisée pour l’aspersion du sang dans les rites de purification ordonnés par la Loi (Ex 12.22 ; Lv 14.4, 6 ; Nb 19.6, 18 ; Hé 9.19).
  - type: text
    content: ', ╵et je serai pur !'
  - type: text
    content: Lave-moi et je serai ╵plus blanc que la neige.
