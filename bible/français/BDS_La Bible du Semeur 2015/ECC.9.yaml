document_id: ECC.9
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’assurance du juste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oui, j’ai beaucoup réfléchi à tout cela, et tout ce que j’ai compris, c’est que les justes, les sages et tous leurs travaux sont dans la main de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A quoi conduit la perspective de la mort
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un même sort pour tous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme ne sait pas s’il rencontrera l’amour ou la haine : il peut tout envisager. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout est pareil pour tous : un même sort atteint le juste et le méchant, celui qui est [bon et]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque, la version syriaque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le bon et le méchant, celui qui est pur… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Puisque le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reparaît à la phrase suivante, il est probable qu’il a d’abord été ajouté par erreur ici dans le texte hébreu, et que les versions ont ensuite ajouté '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et le méchant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pour compléter la paire.
    marker-yv: yv-n
  - type: text
    text: ' pur, et celui qui est impur, celui qui offre des sacrifices et celui qui n’en offre pas, le bon comme le pécheur, et celui qui prête serment comme celui qui n’ose pas le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Parmi tout ce qui se passe sous le soleil, voilà bien un mal : c’est que tous les hommes connaissent un sort identique. Car à cause de cela, le cœur des humains est rempli de méchanceté et la déraison habite leur cœur tout au long de leur vie. C’est qu’après cela, on va rejoindre les morts !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors que doit-on choisir ? Pour tous les vivants, il y a de l’espoir. Un chien vivant vaut mieux qu’un lion mort. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, les vivants savent qu’ils mourront, mais les morts ne savent rien du tout ; ils n’ont plus rien à gagner, ils sombrent dans l’oubli. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leurs amours, leurs haines, leurs désirs, se sont déjà évanouis. Ils n’auront plus jamais part à tout ce qui se fait sous le soleil.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Appel à bien profiter de sa vie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Va, mange ton pain dans la joie et bois ton vin d’un cœur content, car Dieu a déjà agréé tes œuvres ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’en tout temps tes vêtements soient blancs et que le parfum ne manque pas sur ta tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marque des jours de fête chez les Hébreux.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jouis de la vie avec la femme que tu aimes, pendant tous les jours de cette vie dérisoire que Dieu t’accorde sous le soleil, oui, pendant tous les jours de ton existence dérisoire, car c’est la part qui te revient dans la vie au milieu de tout le labeur pour lequel tu te donnes de la peine sous le soleil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 5.18
        metadata:
          usfm: PRO.5.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tout ce que tu trouves à faire, fais-le avec l’énergie que tu as, car il n’y a plus ni activité, ni réflexion, ni science, ni sagesse dans le séjour des morts vers lequel tu es en route.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les limites de la sagesse et la nécessité de prendre des risques
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’ai encore observé, sous le soleil, que ce ne sont pas les plus agiles qui gagnent la course, ni les plus forts qui remportent la victoire au combat, ce ne sont pas les sages qui ont du pain, et la richesse n’appartient pas aux hommes intelligents, et les faveurs ne récompensent pas les plus savants, car les contretemps et les coups durs imprévus atteignent chacun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car chacun est tributaire des circonstances et du hasard.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, l’homme ne sait pas ce qui l’attend, il est pareil aux poissons qui sont pris dans des filets pour leur malheur, il ressemble aux oiseaux pris au piège : les humains sont surpris par le malheur, qui fond sur eux à l’improviste.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La sagesse du pauvre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A l’égard de la sagesse, j’ai encore observé sous le soleil quelque chose qui me paraît frappant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il y avait une petite ville n’ayant que peu d’habitants. Un roi puissant marcha contre elle, l’assiégea et dressa contre elle des travaux de siège considérables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dans la ville se trouvait un homme pauvre mais sage qui aurait pu sauver la ville grâce à sa sagesse. Mais personne ne pensa à cet homme pauvre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: …qui sauva… Mais personne n’a gardé le souvenir de cet homme pauvre.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors, je me suis dit : « La sagesse vaut mieux que la force, mais la sagesse du pauvre est méprisée et ses paroles ne sont pas écoutées. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Garder son calme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La voix du sage qui s’exprime dans le calme est plus écoutée que les cris d’un chef parmi des insensés.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La sagesse gâchée par la folie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La sagesse vaut mieux qu’un équipement militaire, mais un seul pécheur peut anéantir beaucoup de bien.
