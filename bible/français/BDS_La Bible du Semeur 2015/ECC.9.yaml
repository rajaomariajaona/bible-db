document_id: ECC.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’assurance du juste
  - type: text
    content: Oui, j’ai beaucoup réfléchi à tout cela, et tout ce que j’ai compris, c’est que les justes, les sages et tous leurs travaux sont dans la main de Dieu.
  - type: heading
    content: A quoi conduit la perspective de la mort
  - type: heading
    content: Un même sort pour tous
  - type: text
    content: 'L’homme ne sait pas s’il rencontrera l’amour ou la haine : il peut tout envisager. '
  '10':
  - type: text
    content: Tout ce que tu trouves à faire, fais-le avec l’énergie que tu as, car il n’y a plus ni activité, ni réflexion, ni science, ni sagesse dans le séjour des morts vers lequel tu es en route.
  - type: heading
    content: Les limites de la sagesse et la nécessité de prendre des risques
  '11':
  - type: text
    content: J’ai encore observé, sous le soleil, que ce ne sont pas les plus agiles qui gagnent la course, ni les plus forts qui remportent la victoire au combat, ce ne sont pas les sages qui ont du pain, et la richesse n’appartient pas aux hommes intelligents, et les faveurs ne récompensent pas les plus savants, car les contretemps et les coups durs imprévus atteignent chacun
  - type: note
    content: 'D’autres comprennent : car chacun est tributaire des circonstances et du hasard.'
  - type: text
    content: .
  '12':
  - type: text
    content: 'En effet, l’homme ne sait pas ce qui l’attend, il est pareil aux poissons qui sont pris dans des filets pour leur malheur, il ressemble aux oiseaux pris au piège : les humains sont surpris par le malheur, qui fond sur eux à l’improviste.'
  - type: heading
    content: La sagesse du pauvre
  '13':
  - type: text
    content: 'A l’égard de la sagesse, j’ai encore observé sous le soleil quelque chose qui me paraît frappant. '
  '14':
  - type: text
    content: Il y avait une petite ville n’ayant que peu d’habitants. Un roi puissant marcha contre elle, l’assiégea et dressa contre elle des travaux de siège considérables.
  '15':
  - type: text
    content: Dans la ville se trouvait un homme pauvre mais sage qui aurait pu sauver la ville grâce à sa sagesse. Mais personne ne pensa à cet homme pauvre
  - type: note
    content: 'Autre traduction : …qui sauva… Mais personne n’a gardé le souvenir de cet homme pauvre.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Alors, je me suis dit : « La sagesse vaut mieux que la force, mais la sagesse du pauvre est méprisée et ses paroles ne sont pas écoutées. »'
  - type: heading
    content: Garder son calme
  '17':
  - type: text
    content: La voix du sage qui s’exprime dans le calme est plus écoutée que les cris d’un chef parmi des insensés.
  - type: heading
    content: La sagesse gâchée par la folie
  '18':
  - type: text
    content: La sagesse vaut mieux qu’un équipement militaire, mais un seul pécheur peut anéantir beaucoup de bien.
  '2':
  - type: text
    content: 'Tout est pareil pour tous : un même sort atteint le juste et le méchant, celui qui est [bon et]'
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque, la version syriaque et la Vulgate ont : le bon et le méchant, celui qui est pur… Puisque le mot bon reparaît à la phrase suivante, il est probable qu’il a d’abord été ajouté par erreur ici dans le texte hébreu, et que les versions ont ensuite ajouté et le méchant pour compléter la paire.'
  - type: text
    content: ' pur, et celui qui est impur, celui qui offre des sacrifices et celui qui n’en offre pas, le bon comme le pécheur, et celui qui prête serment comme celui qui n’ose pas le faire. '
  '3':
  - type: text
    content: 'Parmi tout ce qui se passe sous le soleil, voilà bien un mal : c’est que tous les hommes connaissent un sort identique. Car à cause de cela, le cœur des humains est rempli de méchanceté et la déraison habite leur cœur tout au long de leur vie. C’est qu’après cela, on va rejoindre les morts !'
  '4':
  - type: text
    content: 'Alors que doit-on choisir ? Pour tous les vivants, il y a de l’espoir. Un chien vivant vaut mieux qu’un lion mort. '
  '5':
  - type: text
    content: 'En effet, les vivants savent qu’ils mourront, mais les morts ne savent rien du tout ; ils n’ont plus rien à gagner, ils sombrent dans l’oubli. '
  '6':
  - type: text
    content: Leurs amours, leurs haines, leurs désirs, se sont déjà évanouis. Ils n’auront plus jamais part à tout ce qui se fait sous le soleil.
  - type: heading
    content: Appel à bien profiter de sa vie
  '7':
  - type: text
    content: 'Va, mange ton pain dans la joie et bois ton vin d’un cœur content, car Dieu a déjà agréé tes œuvres ! '
  '8':
  - type: text
    content: Qu’en tout temps tes vêtements soient blancs et que le parfum ne manque pas sur ta tête
  - type: note
    content: Marque des jours de fête chez les Hébreux.
  - type: text
    content: '. '
  '9':
  - type: text
    content: Jouis de la vie avec la femme que tu aimes, pendant tous les jours de cette vie dérisoire que Dieu t’accorde sous le soleil, oui, pendant tous les jours de ton existence dérisoire, car c’est la part qui te revient dans la vie au milieu de tout le labeur pour lequel tu te donnes de la peine sous le soleil
  - type: note
    content: Voir Pr 5.18.
  - type: text
    content: .
