      children:
      - type: text
        text: '134.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Désigne ici les prêtres et les lévites affectés au service du Temple. D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 9.33
        metadata:
          usfm: 1CH.9.33
      - type: text
        text: ', ces derniers assuraient aussi un service de nuit au sanctuaire.'
    marker-yv: yv-n
  - type: text
    text: ' l’Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, vous qui vous tenez ╵tout au long de la nuit ╵dans le temple de l’Eternel !
