document_id: PSA.134,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Louez le Seigneur !
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1. Dernier cantique pour la route vers la demeure de l’Eternel.
  - type: text
    content: .
  - type: text
    content: Bénissez l’Eternel, ╵vous tous qui servez
  - type: note
    content: Désigne ici les prêtres et les lévites affectés au service du Temple. D’après 1 Ch 9.33, ces derniers assuraient aussi un service de nuit au sanctuaire.
  - type: text
    content: ' l’Eternel,'
  - type: text
    content: oui, vous qui vous tenez ╵tout au long de la nuit ╵dans le temple de l’Eternel !
  '2':
  - type: text
    content: Levez vos mains ╵vers le lieu saint
  - type: text
    content: pour bénir l’Eternel !
  '3':
  - type: text
    content: Que de Sion ╵l’Eternel te bénisse,
  - type: text
    content: lui qui a fait le ciel ╵aussi bien que la terre.
