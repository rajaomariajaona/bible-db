document_id: PSA.46,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu est pour nous un rempart
  - type: text
    content: Au chef de chœur. Un cantique des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: ' pour voix de soprano.'
  '10':
  - type: text
    content: Il fait cesser les combats ╵jusqu’aux confins de la terre,
  - type: text
    content: l’arc, il l’a brisé ╵et il a rompu la lance,
  - type: text
    content: il a consumé au feu ╵tous les chars de guerre
  - type: note
    content: 'Les versions anciennes ont : les boucliers.'
  - type: text
    content: .
  '11':
  - type: text
    content: « Arrêtez ! dit-il, ╵reconnaissez-moi pour Dieu.
  - type: text
    content: Je serai glorifié par les peuples, ╵je serai glorifié sur la terre
  - type: note
    content: 'D’autres comprennent : Je domine sur les peuples, je domine sur la terre.'
  - type: text
    content: . »
  '12':
  - type: text
    content: Avec nous est l’Eternel ╵des armées célestes.
  - type: text
    content: Nous avons pour citadelle ╵le Dieu de Jacob.
  - type: text
    content: Pause
  '2':
  - type: text
    content: Dieu est pour nous un rempart, ╵il est un refuge,
  - type: text
    content: un secours toujours offert ╵lorsque survient la détresse.
  '3':
  - type: text
    content: Aussi, nous ne craignons rien ╵quand la terre est secouée,
  - type: text
    content: quand les montagnes s’effondrent, ╵basculant au fond des mers,
  '4':
  - type: text
    content: quand, grondants et bouillonnants, ╵les flots des mers se soulèvent
  - type: text
    content: et ébranlent les montagnes.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Il est un cours d’eau ╵dont les bras réjouissent ╵la cité de Dieu,
  - type: text
    content: la demeure sainte du Très-Haut.
  '6':
  - type: text
    content: Dieu réside au milieu d’elle, ╵elle n’est pas ébranlée,
  - type: text
    content: car Dieu vient à son secours ╵dès le point du jour.
  '7':
  - type: text
    content: 'Des peuples s’agitent ╵et des royaumes s’effondrent :'
  - type: text
    content: la voix de Dieu retentit, ╵et la terre se dissout.
  '8':
  - type: text
    content: Avec nous est l’Eternel ╵des armées célestes ;
  - type: text
    content: nous avons pour citadelle ╵le Dieu de Jacob.
  - type: text
    content: Pause
  '9':
  - type: text
    content: Venez, contemplez ╵tout ce que l’Eternel fait,
  - type: text
    content: les ravages ╵qu’il opère sur la terre.
