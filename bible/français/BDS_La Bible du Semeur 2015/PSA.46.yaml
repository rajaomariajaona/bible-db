document_id: PSA.46
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu est pour nous un rempart
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un cantique des Qoréites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42.1'
        metadata:
          usfm: PSA.42.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' pour voix de soprano.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu est pour nous un rempart, ╵il est un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un secours toujours offert ╵lorsque survient la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aussi, nous ne craignons rien ╵quand la terre est secouée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand les montagnes s’effondrent, ╵basculant au fond des mers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: quand, grondants et bouillonnants, ╵les flots des mers se soulèvent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ébranlent les montagnes.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il est un cours d’eau ╵dont les bras réjouissent ╵la cité de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la demeure sainte du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dieu réside au milieu d’elle, ╵elle n’est pas ébranlée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu vient à son secours ╵dès le point du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des peuples s’agitent ╵et des royaumes s’effondrent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la voix de Dieu retentit, ╵et la terre se dissout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Avec nous est l’Eternel ╵des armées célestes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons pour citadelle ╵le Dieu de Jacob.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Venez, contemplez ╵tout ce que l’Eternel fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ravages ╵qu’il opère sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il fait cesser les combats ╵jusqu’aux confins de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’arc, il l’a brisé ╵et il a rompu la lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a consumé au feu ╵tous les chars de guerre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les boucliers.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: « Arrêtez ! dit-il, ╵reconnaissez-moi pour Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai glorifié par les peuples, ╵je serai glorifié sur la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Je domine sur les peuples, je domine sur la terre.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avec nous est l’Eternel ╵des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous avons pour citadelle ╵le Dieu de Jacob.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
