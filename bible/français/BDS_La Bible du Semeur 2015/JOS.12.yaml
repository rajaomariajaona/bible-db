document_id: JOS.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La liste des rois vaincus à l’époque de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les rois que les Israélites ont vaincus à l’est du Jourdain et dont ils ont occupé le territoire depuis le torrent de l’Arnon jusqu’au mont Hermon, c’est-à-dire toute la plaine orientale de la vallée du Jourdain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'le roi de Jérusalem, le roi d’Hébron, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'le roi de Yarmouth, le roi de Lakish, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'le roi de Eglôn, le roi de Guézer, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'le roi de Debir, le roi de Guéder, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'le roi de Horma, le roi d’Arad, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'le roi de Libna, le roi d’Adoullam, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'le roi de Maqqéda, le roi de Béthel, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'le roi de Tappouah, le roi de Hépher, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'le roi d’Apheq, le roi de Lasharôn, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'le roi de Madôn, le roi de Hatsor, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le premier était Sihôn, le roi des Amoréens, qui résidait à Heshbôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 21.21-32 ; Dt 2.26-37.
      marker-yv: yv-n
    - type: text
      text: '  ; sa domination s’étendait sur la moitié de la vallée de l’Arnon à partir d’Aroër et sur la moitié du territoire de Galaad jusqu’au torrent de Yabboq qui marque la frontière avec les Ammonites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'le roi de Shimrôn-Merôn, le roi d’Akshaph, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'le roi de Taanak, le roi de Meguiddo, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'le roi de Qédesh, le roi de Yoqneam au Carmel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: le roi de Dor, sur les hauteurs, le roi de Goyim près de Guilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: doit être distinguée de la Guilgal située près de Jéricho (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.19'
        - type: text
          text: ). L’ancienne version grecque la situe en Galilée.
      marker-yv: yv-n
    - type: text
      text: ', '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: et le roi de Tirtsa.
  - type: usfm
    marker: p
    children:
    - type: text
      text: En tout, cela fait trente et un rois.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il régnait aussi sur la partie orientale de la vallée du Jourdain depuis le lac de Génézareth jusqu’à la mer Morte, en direction de Beth-Hayeshimoth, et jusque sur les pentes du Pisga au sud.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les Israélites conquirent aussi le territoire d’Og, roi du Basan, l’un des derniers Rephaïm qui régnait à Ashtaroth et à Edréi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 21.33-35 ; Dt 3.1-11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il dominait sur le mont Hermon, sur Salka et sur le Basan jusqu’à la frontière des Gueshouriens et des Maakathiens, ainsi que sur l’autre moitié du territoire de Galaad, jusqu’à la frontière de Sihôn, roi de Heshbôn. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moïse, serviteur de l’Eternel, et les Israélites avaient vaincu ces deux rois et Moïse avait donné leur pays en possession aux tribus de Ruben, de Gad et à la demi-tribu de Manassé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Nb 32.28-32 ; Dt 3.18-20. Cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.12-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La liste des rois vaincus à l’époque de Josué
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici la liste des rois que Josué et les Israélites ont vaincu à l’ouest du Jourdain, et dont les territoires s’étendaient depuis Baal-Gad, dans la dépression du Liban, jusqu’au mont Halaq qui s’élève en direction de Séir. Josué les donna en possession aux tribus d’Israël en les partageant entre elles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ces territoires comprenaient la région montagneuse, la plaine côtière, la vallée du Jourdain, la région des contreforts des montagnes, le désert de Judée et le Néguev. C’étaient les territoires des Hittites, des Amoréens, des Cananéens, des Phéréziens, des Héviens et des Yebousiens. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les rois vaincus étaient le roi de Jéricho, le roi d’Aï à côté de Béthel, '
