document_id: 2KI.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le renouvellement de l’alliance avec l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 34.29-32)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Josias fit convoquer auprès de lui tous les responsables de Juda et de Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi profana aussi le brûloir de Topheth qui se trouvait dans la vallée de Ben-Hinnom, pour que personne ne brûle plus son fils ou sa fille pour l’offrir en sacrifice à Molok. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit disparaître de l’entrée du temple de l’Eternel les chevaux que les rois de Juda avaient dédiés au culte du soleil et qui se trouvaient près de la salle du chambellan Netân-Mélek, situé dans les annexes ; il fit aussi brûler les chars du soleil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fit abattre les autels qui se trouvaient sur la terrasse des appartements d’Ahaz et que les rois de Juda avaient érigés, ainsi que ceux que Manassé avait bâtis dans les deux parvis du temple de l’Eternel. Après les avoir mis en pièces, il les enleva de là et en fit disperser les débris dans la vallée du Cédron. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il profana également les sanctuaires des hauts lieux situés en face de Jérusalem, à droite de la montagne de la Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Désignation de l’extrémité sud du mont des Oliviers à cause du culte idolâtre qui y avait été pratiqué. Voir 1 R '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.7'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et qui avaient été érigés par Salomon, roi d’Israël, en l’honneur d’Astarté, l’abominable idole des Sidoniens, de Kemosh, l’abominable dieu des Moabites et de Milkom, l’abominable divinité des Ammonites. Il les profana tous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josias brisa les stèles, renversa les pieux sacrés d’Ashéra et remplit d’ossements humains les emplacements sacrés qu’ils occupaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La réforme en Israël
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit de même à Béthel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 4 et note.
      marker-yv: yv-n
    - type: text
      text: ', où il détruisit l’autel qui se trouvait dans le haut lieu construit par Jéroboam, fils de Nebath, le roi qui avait entraîné le peuple d’Israël dans le péché. Il détruisit cet autel et le haut lieu, brûla le pieu sacré d’Ashéra et incendia le haut lieu pour le réduire en cendres. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette occasion, regardant autour de lui, Josias vit les tombes qui se trouvaient là sur la montagne, alors il fit exhumer les ossements des tombes et les brûla sur l’autel pour le profaner ; il accomplit ainsi la parole de l’Eternel que l’homme de Dieu avait proclamée et qui annonçait ces événements. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il demanda : Quel est ce monument que je vois là ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens de la ville lui répondirent : C’est la tombe de l’homme de Dieu qui était venu de Juda et qui a annoncé que se produirait ce que tu viens de faire à l’autel de Béthel.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Alors, laissez-le, dit le roi. Que personne ne touche à ses ossements.
  - type: usfm
    marker: p
    children:
    - type: text
      text: On respecta donc les ossements de ce prophète ainsi que ceux du prophète qui était venu de Samarie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 13.29-31
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josias démolit aussi tous les bâtiments des hauts lieux qui avaient été construits par les rois d’Israël dans les villes de la Samarie et qui avaient irrité l’Eternel. Il agit à leur égard exactement comme il l’avait fait à Béthel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il monta au temple de l’Eternel accompagné de toute la population de Juda et de tous les habitants de Jérusalem, des prêtres, des prophètes et de tous les gens du peuple, quelle que fût leur condition sociale. Devant tous, il lut tout ce qui était écrit dans le livre de l’alliance que l’on avait retrouvé dans le temple de l’Eternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit exécuter tous les prêtres des hauts lieux qui se trouvaient là en les immolant sur leurs propres autels, puis il y brûla des ossements humains. Ensuite, il retourna à Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La célébration de la Pâque
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 35.1,  18-19)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, le roi ordonna à tout le peuple : Célébrez la Pâque en l’honneur de l’Eternel votre Dieu, comme cela est prescrit dans ce livre de l’alliance'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 16.1-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De fait, aucune Pâque pareille à celle-ci n’avait été célébrée depuis l’époque où les chefs gouvernaient Israël et durant toute la période des rois d’Israël et des rois de Juda. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce fut seulement la dix-huitième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 622 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ' du règne de Josias que l’on célébra cette Pâque en l’honneur de l’Eternel à Jérusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La réforme n’empêchera pas la destruction de Jérusalem
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josias fit aussi disparaître du pays de Juda et de Jérusalem ceux qui évoquaient les esprits des morts et ceux qui prédisaient l’avenir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 19.26-31 ; 2 R 21.6. Ces pratiques occultes étaient liées aux cultes païens.
      marker-yv: yv-n
    - type: text
      text: ', il fit détruire les statuettes sacrées, les idoles et tous les autres objets de culte païens, pour faire respecter les articles de la Loi contenus dans le livre que le prêtre Hilqiya avait retrouvé dans le temple de l’Eternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aucun roi avant Josias ne revint comme lui à l’Eternel de tout son cœur, de tout son être et de toutes ses forces, en observant toute la Loi de Moïse ; et après lui, il n’en a point paru de semblable.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Néanmoins, l’Eternel n’abandonna pas la grande et ardente colère dans laquelle il était entré contre Juda, à cause des nombreux crimes par lesquels Manassé l’avait irrité. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi il décida : Je chasserai aussi Juda loin de moi, comme j’ai chassé Israël, et je rejetterai cette ville, Jérusalem, que j’avais choisie, ainsi que le temple où j’avais promis d’établir ma présence'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 8.29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fin de Josias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 35.20 à 36.1)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres faits et gestes de Josias et toutes ses réalisations sont cités dans le livre des Annales des rois de Juda.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sous son règne, le pharaon Néko, roi d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pharaon Néko, roi d’Egypte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: il a régné de 610 à 595 av. J.-C. Il s’était mis en campagne pour aller prêter main-forte aux Assyriens en guerre contre les Babyloniens.
      marker-yv: yv-n
    - type: text
      text: ', alla rejoindre le roi d’Assyrie près de l’Euphrate. Le roi Josias essaya de lui barrer la route, mais dans l’affrontement, le pharaon le tua à Meguiddo'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Josias a tenté d’arrêter Néko au défilé de Meguiddo par souci de garantir l’indépendance du pays (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 35.20-24
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi se tenait sur une estrade. Il conclut devant l’Eternel une alliance par laquelle il s’engagea à être fidèle à l’Eternel et à obéir à ses commandements, à ses lois et à ses ordonnances, de tout son cœur et de tout son être, et à respecter toutes les clauses de l’alliance figurant dans ce livre. De son côté, tout le peuple adhéra à cette alliance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La réforme en Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 34.3-7,  33)
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses officiers mirent son corps sur un char, le ramenèrent de Meguiddo à Jérusalem et l’enterrèrent dans son tombeau. Le peuple du pays prit Yoahaz, fils de Josias, et l’établit roi par l’onction pour succéder à son père sur le trône.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Yoahaz sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 36.2-4)
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yoahaz avait vingt-trois ans à son avènement et il régna trois mois à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En 609 av. J.-C. Plus jeune qu’Elyaqim (v. 34 ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 3.15
        - type: text
          text: '), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yoahaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a dû être préféré à son frère à cause des tendances pro-égyptiennes de celui-ci. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 22.11-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Hamoutal, elle était fille de Jérémie de Libna. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce que l’Eternel considère comme mal, tout comme ses ancêtres. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le pharaon Néko le fit prisonnier et l’enchaîna à Ribla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Petit village syrien sur l’Oronte où Néko avait établi son quartier général (comme Nabuchodonosor le fera plus tard : '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '25.6'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' dans le pays de Hamath, mettant ainsi fin à son règne à Jérusalem. Il imposa au pays un tribut de trois mille quatre cents kilos d’argent et trente-quatre kilos d’or. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le pharaon Néko établit Elyaqim, fils de Josias, comme roi à la place de son père. Il changea son nom en celui de Yehoyaqim. Quant à Yoahaz, il fut emmené en Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 22.10-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . C’est là qu’il mourut.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yehoyaqim versa au pharaon l’or et l’argent exigés. Pour être en mesure de le faire, il fit estimer les ressources de chaque habitant du pays et leva un impôt calculé suivant la fortune de chacun.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Yehoyaqim sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 36.5-8)
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yehoyaqim avait vingt-cinq ans à son avènement, et il régna onze ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 609 à 598 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Zeboudda, elle était fille de Pedaya de Rouma. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ce que l’Eternel considère comme mal, tout comme ses ancêtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 36-37, voir Jr 22.18-19 ; 26.1-6.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite le roi ordonna au grand-prêtre Hilqiya, aux prêtres adjoints et aux prêtres qui surveillaient l’entrée du Temple de jeter hors du sanctuaire de l’Eternel tous les objets qu’on avait fabriqués pour le culte de Baal, d’Ashéra et des astres du ciel. Ils furent brûlés à l’extérieur de Jérusalem, dans les champs de la vallée du Cédron, et l’on transporta leur cendre à Béthel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lieu d’un ancien sanctuaire (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 28.19
        - type: text
          text: ) où les rois d’Israël avaient installé le centre de leur culte idolâtre (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 12.25-29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi destitua les prêtres idolâtres institués par les rois de Juda pour brûler l’encens sur les hauts lieux dans les villes de Juda et près de Jérusalem. Il destitua aussi ceux qui offraient des parfums à Baal, au soleil, à la lune, aux étoiles et à tous les astres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ôter du temple de l’Eternel le pieu sacré de la déesse Ashéra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce pieu sacré détruit par Ezéchias (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18.4'
        - type: text
          text: ) fut rétabli par Manassé (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21.7'
        - type: text
          text: ). A la fin de sa vie, il s’en défit sans doute (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 33.15
        - type: text
          text: ), mais son fils Amôn a dû le réinstaller (2 R 21.21 ; 2 Ch 33.22).
      marker-yv: yv-n
    - type: text
      text: ' et on le fit transporter hors de Jérusalem dans la vallée du Cédron, où on le brûla et le réduisit en cendres que l’on jeta dans la fosse commune. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fit démolir les maisons des prostitués sacrés qui se trouvaient dans le temple de l’Eternel, et où les femmes tissaient des robes pour Ashéra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit venir tous les prêtres des villes de Juda. Il profana les hauts lieux depuis Guéba jusqu’à Beer-Sheva
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire de l’extrême nord (à 10 kilomètres de Jérusalem) à l’extrême sud (à 70 kilomètres au sud-ouest) du royaume de Juda.
      marker-yv: yv-n
    - type: text
      text: ' où les prêtres brûlaient des parfums. Il fit aussi démolir les sanctuaires construits près des portes des villes, en particulier celui qui se trouvait à l’entrée de la porte de Josué, le gouverneur de la ville, et qui était sur la gauche en entrant par la porte de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On ne permit pas aux prêtres des hauts lieux d’officier à l’autel de l’Eternel à Jérusalem, ils furent seulement autorisés à manger du pain sans levain avec les autres prêtres.
