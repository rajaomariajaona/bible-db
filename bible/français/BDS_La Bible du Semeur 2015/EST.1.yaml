document_id: EST.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le banquet de l’empereur
  - type: text
    content: Cette histoire se passait du temps de Xerxès
  - type: note
    content: 'En hébreu : Assuérus. Probablement Xerxès Ier (486 à 465 av. J.-C.).'
  - type: text
    content: ', celui dont l’empire s’étendait depuis l’Inde jusqu’à l’Ethiopie et comprenait cent vingt-sept districts'
  - type: note
    content: L’Empire perse était divisé en vingt satrapies ou provinces, lesquelles étaient subdivisées en plusieurs disctricts administratifs.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Le septième jour du banquet, comme l’empereur était égayé par le vin, il ordonna aux sept eunuques spécialement attachés à son service : Mehoumân, Biztha, Harbona, Bigtha, Abagtha, Zéthar et Karkas, '
  '11':
  - type: text
    content: 'de faire venir l’impératrice Vasthi en sa présence, couronnée du diadème impérial. Il voulait montrer aux hommes de tous les peuples rassemblés et aux ministres combien elle était belle, car elle était effectivement d’une beauté remarquable. '
  '12':
  - type: text
    content: 'Les eunuques transmirent à l’impératrice Vasthi l’ordre de l’empereur, mais elle refusa d’aller se présenter devant lui. Celui-ci en fut vivement irrité et se mit dans une violente colère. '
  '13':
  - type: text
    content: 'Puis il consulta les conseillers connaissant les usages, car les affaires impériales étaient toujours discutées avec tous les experts légaux et juridiques. '
  '14':
  - type: text
    content: 'Ses plus proches conseillers étaient Karshena, Shétar, Admata, Tarsis, Mérès, Marsena, Memoukân, les sept ministres des Perses et des Mèdes ; ils faisaient partie du conseil impérial et occupaient les postes les plus élevés dans l’empire. '
  '15':
  - type: text
    content: L’empereur leur demanda comment la loi requérait que l’on traite l’impératrice Vasthi pour n’avoir pas obéi à l’ordre de l’empereur Xerxès que les eunuques lui avaient transmis.
  '16':
  - type: text
    content: 'Memoukân déclara à l’empereur en présence de ses hauts fonctionnaires : L’impératrice Vasthi ne s’est pas seulement rendue coupable envers l’empereur, mais aussi envers tous ses ministres et tous les gens du peuple de toutes les provinces de l’empire de Xerxès. '
  '17':
  - type: text
    content: 'Car ce qu’elle a fait sera connu de toutes les femmes et les incitera à mépriser l’autorité de leurs maris. Elles pourront dire : « L’empereur Xerxès avait ordonné de faire venir l’impératrice Vasthi en sa présence, et elle n’est pas venue. » '
  '18':
  - type: text
    content: 'Aujourd’hui même, les femmes des ministres perses et mèdes apprendront comment l’impératrice s’est conduite et elles se permettront de répliquer sur le même ton à leurs maris, ministres de l’empereur, et leur mépris entraînera la colère de leurs maris. '
  '19':
  - type: text
    content: 'Si donc tel est le bon plaisir de l’empereur, qu’il fasse promulguer une ordonnance impériale irrévocable, consignée dans les lois de Perse et de Médie, interdisant pour toujours à Vasthi de se présenter devant l’empereur Xerxès, et stipulant que l’empereur conférera le titre d’impératrice à l’une de ses semblables plus digne qu’elle. '
  '2':
  - type: text
    content: En ce temps-là, quand l’empereur Xerxès vint prendre place sur son trône impérial
  - type: note
    content: Il ne s’agit pas de l’avènement de l’empereur (voir v. 3), mais certainement de sa première venue dans la citadelle de Suse, après avoir maté dans l’empire des rébellions suscitées par son accession au trône.
  - type: text
    content: ' dans la citadelle de Suse'
  - type: note
    content: Suse était l’une des quatre capitales de l’empire (avec Babylone, Persépolis et Ecbatane). C’était la résidence d’hiver des rois perses. La citadelle où se trouvait le palais royal dominait le reste de la ville (voir 3.15 ; 4.1-2, 6 ; 8.14).
  - type: text
    content: ', '
  '20':
  - type: text
    content: Lorsque ce décret, publié par l’empereur dans tout son vaste empire, sera connu partout, toutes les femmes témoigneront du respect à leurs maris, quelle que soit leur condition sociale.
  '21':
  - type: text
    content: 'Cette déclaration plut à l’empereur et aux ministres, et l’empereur suivit le conseil de Memoukân. '
  '22':
  - type: text
    content: Il expédia des lettres dans toutes les provinces de l’empire, rédigées pour chaque province selon son système d’écriture et dans la langue de sa population, ordonnant que tout homme soit maître en sa maison et y impose l’usage de sa langue maternelle
  - type: note
    content: 'Au lieu de : et y impose… langue maternelle, on pourrait traduire : qu’il puisse dire ce qui lui convient.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'la troisième année de son règne, il organisa un grand festin pour tous ses ministres, ses hauts fonctionnaires, les officiers de l’armée des Perses et des Mèdes, ainsi que pour les nobles et les gouverneurs des provinces. '
  '4':
  - type: text
    content: Il voulait montrer devant eux la richesse et la gloire de son règne et la splendeur de sa grande magnificence. Les festivités durèrent très longtemps ; cent quatre-vingts jours.
  '5':
  - type: text
    content: 'A la fin de cette période, l’empereur offrit à toute la population de Suse, riches ou pauvres, un banquet qui eut lieu pendant sept jours dans les jardins du palais impérial. '
  '6':
  - type: text
    content: Des tentures de lin blanches et bleu ciel étaient fixées à des colonnes de marbre par des cordelières blanches et pourpres passées dans des anneaux d’argent. Des divans
  - type: note
    content: Lors des festins, les Perses, comme les autres peuples de l’Antiquité, mangeaient allongés sur des divans (voir Am 6.4).
  - type: text
    content: ' d’or et d’argent étaient disposés sur des dallages de mosaïques faits avec du porphyre, du marbre, de la nacre et de l’agathe. '
  '7':
  - type: text
    content: 'On servait des boissons dans des coupes d’or, toutes différentes de formes ; le vin de l’empereur coulait avec une générosité tout impériale. '
  '8':
  - type: text
    content: 'Il avait été ordonné que chacun puisse boire à volonté sans aucune contrainte, car l’empereur avait donné des instructions à tous les intendants du palais pour qu’ils satisfassent les désirs de chacun de ses hôtes. '
  '9':
  - type: text
    content: L’impératrice Vasthi organisa de son côté un banquet pour les femmes dans le palais de l’empereur Xerxès.
  - type: heading
    content: La désobéissance de l’impératrice Vasthi et sa disgrâce
