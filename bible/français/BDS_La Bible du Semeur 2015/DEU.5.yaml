document_id: DEU.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Dix Commandements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse convoqua tout Israël et leur dit : Ecoute, Israël, les ordonnances et les lois que je vous communique aujourd’hui de vive voix ; apprenez-les, obéissez-y et appliquez-les. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Eternel notre Dieu a conclu une alliance avec nous au mont Horeb
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 2-5, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19
        metadata:
          usfm: EXO.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce n’est pas seulement avec vos ancêtres que l’Eternel a conclu cette alliance, c’est avec nous tous qui sommes ici aujourd’hui, et en vie. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sur la montagne, l’Eternel vous a parlé directement du milieu du feu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je me tenais alors entre l’Eternel et vous, pour vous transmettre sa parole, car vous aviez peur de ce feu et vous n’êtes pas montés sur la montagne. Voici ce qu’il a dit :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: « Je suis l’Eternel, ton Dieu, qui t’ai fait sortir d’Egypte, du pays où tu étais esclave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 6-21, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.1-17
        metadata:
          usfm: EXO.20.1+EXO.20.2+EXO.20.3+EXO.20.4+EXO.20.5+EXO.20.6+EXO.20.7+EXO.20.8+EXO.20.9+EXO.20.10+EXO.20.11+EXO.20.12+EXO.20.13+EXO.20.14+EXO.20.15+EXO.20.16+EXO.20.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu n’auras pas d’autre dieu que moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu ne te feras pas d’idole ni de représentation quelconque de ce qui se trouve en haut dans le ciel, ici-bas sur la terre, ou dans les eaux plus bas que la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu ne te prosterneras pas devant de telles idoles et tu ne leur rendras pas de culte, car moi, l’Eternel, ton Dieu, je suis un Dieu qui ne tolère aucun rival : je punis les fils pour la faute de leur père jusqu’à la troisième, voire la quatrième génération de ceux qui me haïssent. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais j’agis avec amour jusqu’à la millième génération envers ceux qui m’aiment et qui obéissent à mes commandements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu n’utiliseras pas le nom de l’Eternel ton Dieu pour tromper, car l’Eternel ne laisse pas impuni celui qui utilise son nom pour tromper.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Observe le jour du sabbat et fais-en un jour consacré à l’Eternel, comme l’Eternel ton Dieu te l’a commandé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu travailleras six jours pour faire tout ce que tu as à faire. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais le septième jour est le jour du repos consacré à l’Eternel ton Dieu ; tu ne feras aucun travail ce jour-là, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bœuf, ni ton âne, ni tout ton bétail, ni l’étranger qui réside chez toi, afin que ton serviteur et ta servante se reposent comme toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu te souviendras que tu as été esclave en Egypte et que l’Eternel ton Dieu t’a tiré de là en intervenant avec puissance ; c’est pourquoi l’Eternel ton Dieu t’a demandé d’observer le jour du sabbat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Honore ton père et ta mère, comme l’Eternel ton Dieu te l’a ordonné, afin de jouir d’une longue vie et de vivre heureux dans le pays que l’Eternel ton Dieu te donne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 15.4 ; 19.19 ; Mc 7.10 ; Lc 18.20 ; Ep 6.2-3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu ne commettras pas de meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 5.21 ; Rm 13.9 ; Jc 2.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu ne commettras pas d’adultère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5.27
        metadata:
          usfm: MAT.5.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu ne commettras pas de vol.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu ne porteras pas de faux témoignage contre ton prochain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu ne porteras pas tes désirs sur la femme de ton prochain. Tu ne convoiteras pas la maison de ton prochain, ni son champ, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien de ce qui lui appartient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 7.7
        metadata:
          usfm: ROM.7.7
      - type: text
        text: . Le Nouveau Testament cite souvent les v. 16-21.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ces paroles-là, l’Eternel les a prononcées d’une voix forte, du milieu du feu, et de l’épaisse nuée, pour toute l’assemblée qui se tenait au pied de la montagne. Il n’y ajouta rien. Puis il les écrivit sur deux tables de pierre qu’il me remit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 22-27, allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.18-19
        metadata:
          usfm: HEB.12.18+HEB.12.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réponse du peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Or, quand vous avez entendu la voix qui sortait des ténèbres tandis que la montagne était tout en feu, vous vous êtes approchés de moi avec tous vos chefs de tribus et vos responsables, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et vous avez dit : « Certes, l’Eternel notre Dieu nous a fait voir sa gloire et sa grandeur et nous avons entendu sa voix du milieu du feu ; nous avons vu aujourd’hui qu’il est possible que Dieu parle aux hommes en les laissant en vie. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais maintenant, pourquoi nous exposerions-nous à la mort ? Ce terrible feu pourrait nous consumer ; et si nous continuons à entendre la voix de l’Eternel notre Dieu, nous risquons de mourir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.18-19
        metadata:
          usfm: EXO.20.18+EXO.20.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car est-il un seul homme au monde qui ait entendu comme nous la voix du Dieu vivant parlant du milieu du feu et qui soit resté en vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 4.33 ; Jg 13.22.
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Va donc toi-même t’approcher ! Tu écouteras tout ce que dira l’Eternel notre Dieu, puis tu nous le répéteras. Nous l’écouterons et nous obéirons. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’Eternel entendit vos paroles pendant que vous me parliez, et il me dit : « J’ai entendu ce que t’a dit ce peuple et je l’approuve pleinement. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Si seulement ils pouvaient garder ces mêmes dispositions à me craindre et à suivre tous les jours tous mes commandements, afin qu’eux et leurs descendants soient heureux pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Va leur dire : Retournez dans vos tentes ! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Quant à toi, reste ici avec moi, et je te communiquerai tous les commandements, les ordonnances et les lois que tu leur enseigneras, afin qu’ils y obéissent dans le pays que je leur donne en possession. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ayez donc soin de faire ce que l’Eternel votre Dieu vous a commandé, sans vous en détourner ni à droite ni à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Suivez exactement le chemin que l’Eternel votre Dieu vous a prescrit, et vous vivrez heureux et vous jouirez d’une longue vie dans le pays dont vous allez prendre possession.
