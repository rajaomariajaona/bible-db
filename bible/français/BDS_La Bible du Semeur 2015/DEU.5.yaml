document_id: DEU.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Dix Commandements
  - type: text
    content: 'Moïse convoqua tout Israël et leur dit : Ecoute, Israël, les ordonnances et les lois que je vous communique aujourd’hui de vive voix ; apprenez-les, obéissez-y et appliquez-les. '
  '10':
  - type: text
    content: Mais j’agis avec amour jusqu’à la millième génération envers ceux qui m’aiment et qui obéissent à mes commandements.
  '11':
  - type: text
    content: Tu n’utiliseras pas le nom de l’Eternel ton Dieu pour tromper, car l’Eternel ne laisse pas impuni celui qui utilise son nom pour tromper.
  '12':
  - type: text
    content: 'Observe le jour du sabbat et fais-en un jour consacré à l’Eternel, comme l’Eternel ton Dieu te l’a commandé. '
  '13':
  - type: text
    content: 'Tu travailleras six jours pour faire tout ce que tu as à faire. '
  '14':
  - type: text
    content: 'Mais le septième jour est le jour du repos consacré à l’Eternel ton Dieu ; tu ne feras aucun travail ce jour-là, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bœuf, ni ton âne, ni tout ton bétail, ni l’étranger qui réside chez toi, afin que ton serviteur et ta servante se reposent comme toi. '
  '15':
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte et que l’Eternel ton Dieu t’a tiré de là en intervenant avec puissance ; c’est pourquoi l’Eternel ton Dieu t’a demandé d’observer le jour du sabbat.
  '16':
  - type: text
    content: Honore ton père et ta mère, comme l’Eternel ton Dieu te l’a ordonné, afin de jouir d’une longue vie et de vivre heureux dans le pays que l’Eternel ton Dieu te donne
  - type: note
    content: Voir Mt 15.4 ; 19.19 ; Mc 7.10 ; Lc 18.20 ; Ep 6.2-3.
  - type: text
    content: .
  '17':
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: note
    content: Voir Mt 5.21 ; Rm 13.9 ; Jc 2.11.
  - type: text
    content: .
  '18':
  - type: text
    content: Tu ne commettras pas d’adultère
  - type: note
    content: Voir Mt 5.27.
  - type: text
    content: .
  '19':
  - type: text
    content: Tu ne commettras pas de vol.
  '2':
  - type: text
    content: L’Eternel notre Dieu a conclu une alliance avec nous au mont Horeb
  - type: note
    content: Pour les v. 2-5, voir Ex 19.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Tu ne porteras pas de faux témoignage contre ton prochain.
  '21':
  - type: text
    content: Tu ne porteras pas tes désirs sur la femme de ton prochain. Tu ne convoiteras pas la maison de ton prochain, ni son champ, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien de ce qui lui appartient
  - type: note
    content: Voir Rm 7.7. Le Nouveau Testament cite souvent les v. 16-21.
  - type: text
    content: . »
  '22':
  - type: text
    content: Ces paroles-là, l’Eternel les a prononcées d’une voix forte, du milieu du feu, et de l’épaisse nuée, pour toute l’assemblée qui se tenait au pied de la montagne. Il n’y ajouta rien. Puis il les écrivit sur deux tables de pierre qu’il me remit
  - type: note
    content: Pour les v. 22-27, allusion en Hé 12.18-19.
  - type: text
    content: .
  - type: heading
    content: La réponse du peuple
  '23':
  - type: text
    content: 'Or, quand vous avez entendu la voix qui sortait des ténèbres tandis que la montagne était tout en feu, vous vous êtes approchés de moi avec tous vos chefs de tribus et vos responsables, '
  '24':
  - type: text
    content: 'et vous avez dit : « Certes, l’Eternel notre Dieu nous a fait voir sa gloire et sa grandeur et nous avons entendu sa voix du milieu du feu ; nous avons vu aujourd’hui qu’il est possible que Dieu parle aux hommes en les laissant en vie. '
  '25':
  - type: text
    content: Mais maintenant, pourquoi nous exposerions-nous à la mort ? Ce terrible feu pourrait nous consumer ; et si nous continuons à entendre la voix de l’Eternel notre Dieu, nous risquons de mourir
  - type: note
    content: Voir Ex 20.18-19.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Car est-il un seul homme au monde qui ait entendu comme nous la voix du Dieu vivant parlant du milieu du feu et qui soit resté en vie
  - type: note
    content: Voir 4.33 ; Jg 13.22.
  - type: text
    content: '  ? '
  '27':
  - type: text
    content: Va donc toi-même t’approcher ! Tu écouteras tout ce que dira l’Eternel notre Dieu, puis tu nous le répéteras. Nous l’écouterons et nous obéirons. »
  '28':
  - type: text
    content: 'L’Eternel entendit vos paroles pendant que vous me parliez, et il me dit : « J’ai entendu ce que t’a dit ce peuple et je l’approuve pleinement. '
  '29':
  - type: text
    content: 'Si seulement ils pouvaient garder ces mêmes dispositions à me craindre et à suivre tous les jours tous mes commandements, afin qu’eux et leurs descendants soient heureux pour toujours. '
  '3':
  - type: text
    content: 'Ce n’est pas seulement avec vos ancêtres que l’Eternel a conclu cette alliance, c’est avec nous tous qui sommes ici aujourd’hui, et en vie. '
  '30':
  - type: text
    content: 'Va leur dire : Retournez dans vos tentes ! '
  '31':
  - type: text
    content: Quant à toi, reste ici avec moi, et je te communiquerai tous les commandements, les ordonnances et les lois que tu leur enseigneras, afin qu’ils y obéissent dans le pays que je leur donne en possession. »
  '32':
  - type: text
    content: 'Ayez donc soin de faire ce que l’Eternel votre Dieu vous a commandé, sans vous en détourner ni à droite ni à gauche. '
  '33':
  - type: text
    content: Suivez exactement le chemin que l’Eternel votre Dieu vous a prescrit, et vous vivrez heureux et vous jouirez d’une longue vie dans le pays dont vous allez prendre possession.
  '4':
  - type: text
    content: 'Sur la montagne, l’Eternel vous a parlé directement du milieu du feu. '
  '5':
  - type: text
    content: 'Je me tenais alors entre l’Eternel et vous, pour vous transmettre sa parole, car vous aviez peur de ce feu et vous n’êtes pas montés sur la montagne. Voici ce qu’il a dit :'
  '6':
  - type: text
    content: « Je suis l’Eternel, ton Dieu, qui t’ai fait sortir d’Egypte, du pays où tu étais esclave
  - type: note
    content: Pour les v. 6-21, voir Ex 20.1-17.
  - type: text
    content: .
  '7':
  - type: text
    content: Tu n’auras pas d’autre dieu que moi.
  '8':
  - type: text
    content: 'Tu ne te feras pas d’idole ni de représentation quelconque de ce qui se trouve en haut dans le ciel, ici-bas sur la terre, ou dans les eaux plus bas que la terre. '
  '9':
  - type: text
    content: 'Tu ne te prosterneras pas devant de telles idoles et tu ne leur rendras pas de culte, car moi, l’Eternel, ton Dieu, je suis un Dieu qui ne tolère aucun rival : je punis les fils pour la faute de leur père jusqu’à la troisième, voire la quatrième génération de ceux qui me haïssent. '
