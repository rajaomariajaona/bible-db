document_id: JER.38
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Au fond d’une citerne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Shephatia, fils de Mattân, Guedalia, fils de Pashhour, Youkal, fils de Shélémia, et Pashhour, fils de Malkiya, entendirent les paroles que Jérémie adressait à tout le peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bien que séquestré dans la cour du corps de garde (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37.21'
        metadata:
          usfm: JER.37.21
      - type: text
        text: ), Jérémie peut recevoir des visiteurs et leur parler librement (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32.8'
        metadata:
          usfm: JER.32.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
        metadata:
          usfm: JER.32.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Il disait : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare l’Eternel : Celui qui restera dans cette ville mourra par l’épée, par la famine ou par la peste ; mais celui qui en sortira pour se rendre aux Chaldéens aura la vie sauve ; il aura au moins gagné cela'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.9'
        metadata:
          usfm: JER.21.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici ce que déclare l’Eternel : Cette ville sera livrée à l’armée du roi de Babylone, qui s’en emparera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors les ministres dirent au roi : Il faut faire mourir cet homme, car ses propos démoralisent les soldats qui restent encore dans cette ville, ainsi que toute la population. Cet homme-là ne cherche pas le bien du peuple, il ne veut que son malheur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi Sédécias leur répondit : Il est entre vos mains, car le roi ne peut rien vous refuser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils prirent donc Jérémie et le descendirent avec des cordes dans la citerne appartenant à Malkiya, un prince de sang
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un officier royal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36.26'
        metadata:
          usfm: JER.36.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', celle qui se trouvait dans la cour du corps de garde. Il n’y avait pas d’eau dans la citerne ; dans le fond, il n’y avait que de la vase, et Jérémie s’y enfonça.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Ebed-Mélek, un Ethiopien, un fonctionnaire attaché au palais royal, apprit qu’ils avaient mis Jérémie dans la citerne. Or, le roi siégeait à la porte de Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Ebed-Mélek sortit du palais et alla parler au roi. Il lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon seigneur le roi ! Ces hommes ont mal agi envers le prophète Jérémie en le descendant dans la citerne ; il y mourra de faim, puisqu’il n’y a plus de pain dans la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi ordonna à Ebed-Mélek l’Ethiopien : Prends avec toi trois hommes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois hommes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après certains manuscrits hébreux. La plupart des manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: trente hommes.
    marker-yv: yv-n
  - type: text
    text: ' et fais remonter le prophète Jérémie de la citerne avant qu’il meure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ebed-Mélek prit donc ces hommes avec lui et rentra au palais royal dans une pièce située sous la salle du trésor. Il y prit des linges déchirés ou usés. Puis il les descendit avec des cordes à Jérémie dans la citerne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ebed-Mélek l’Ethiopien dit à Jérémie : Mets ces chiffons et ces vieux vêtements sous tes aisselles par-dessus les cordes.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ce que fit Jérémie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Puis ils le hissèrent hors de la citerne avec les cordes. Après cela, Jérémie resta dans la cour du corps de garde.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Entrevue secrète avec le roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le roi Sédécias envoya chercher le prophète Jérémie et le fit conduire à la troisième entrée du temple de l’Eternel. Il lui dit : Je vais te poser une question, ne me cache rien !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jérémie répondit à Sédécias : Si je te révèle ce que tu me demandes, ne vas-tu pas me faire mettre à mort ? Et si je te donne un conseil, tu ne m’écouteras pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors le roi Sédécias jura secrètement à Jérémie : Aussi vrai que l’Eternel est vivant et que c’est de lui que nous tenons notre vie, je ne te ferai pas mourir et je ne te remettrai pas entre les mains de ces gens qui en veulent à ta vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Jérémie dit à Sédécias : Voici ce que déclare l’Eternel, le Dieu des armées célestes, Dieu d’Israël : Si tu te rends immédiatement aux officiers du roi de Babylone, tu auras la vie sauve, toi et ta famille, et cette ville ne sera pas incendiée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais si tu ne te rends pas aux officiers du roi de Babylone, cette ville sera livrée aux Chaldéens, qui y mettront le feu, et toi, tu ne leur échapperas pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais le roi Sédécias répondit à Jérémie : J’ai peur des Judéens qui sont déjà passés aux Chaldéens. Je crains de leur être livré et d’être outragé par eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '– On ne te livrera pas à eux, lui répondit Jérémie. Ecoute donc l’Eternel selon ce que je t’ai dit ; tu t’en trouveras bien et tu auras la vie sauve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais si tu refuses de te rendre, voici ce que l’Eternel m’a révélé : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toutes les femmes qui restent dans le palais royal de Juda vont être emmenées aux officiers du roi de Babylone, et elles diront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ils t’ont trompé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils t’ont bien eu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes bons amis ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pendant que tes pieds ╵enfoncent dans la boue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux se sont éclipsés. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutes tes femmes et tes enfants vont être emmenés d’ici aux Chaldéens et tu ne leur échapperas pas, car le roi de Babylone se saisira de toi et cette ville sera incendiée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Sédécias dit à Jérémie : Que personne ne sache rien de toute cette conversation, et tu ne seras pas mis à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si les ministres apprennent que j’ai parlé avec toi, et s’ils viennent te demander : « Fais-nous savoir ce que tu as dit au roi et ce que le roi t’a dit ; ne nous cache rien, et nous ne te ferons pas mourir », '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'tu leur répondras : « J’ai supplié le roi de ne pas me faire ramener dans la maison de Jonathan, pour que je n’y meure pas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37.20'
        metadata:
          usfm: JER.37.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Effectivement, tous les ministres vinrent trouver Jérémie pour le questionner, et il leur répondit comme le roi le lui avait ordonné. Alors ils le laissèrent tranquille, car rien n’avait filtré de l’entretien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ainsi Jérémie demeura dans la cour du corps de garde jusqu’au jour où Jérusalem fut conquise. Voici comment Jérusalem fut prise.
