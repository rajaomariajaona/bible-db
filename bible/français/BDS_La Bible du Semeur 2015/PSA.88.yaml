          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: . Au chef de chœur. Une méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' d’Hémân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Ch 6.18-22 ; 25.1, 4.
      marker-yv: yv-n
    - type: text
      text: ' l’Ezrahite.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mes yeux sont épuisés ╵à force d’affliction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’invoque, Eternel, ╵tout au long de mes jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je tends les mains vers toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Feras-tu des prodiges ╵pour ceux qui ne sont plus ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Verra-t-on se lever ╵les morts pour te louer ?
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Parle-t-on dans la tombe ╵de ton amour ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ta fidélité ╵dans le séjour des morts ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Connaît-on tes prodiges ╵là où sont les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta justice ╵au pays de l’oubli ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pour moi, ô Eternel, ╵je crie à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te présente ma prière ╵chaque matin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pourquoi, ô Eternel, ╵me rejeter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me refuser ton attention ?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Car je suis affligé, ╵près de la mort ╵depuis que je suis jeune ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’endure les terreurs ╵que tu m’imposes. ╵Je suis désemparé.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Les flots de ta colère ╵ont déferlé sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis anéanti ╵par les angoisses ╵qui me viennent de toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Comme des eaux qui me submergent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes parts, ╵elles m’assaillent tous les jours.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tu as fait s’éloigner de moi ╵tous mes amis, mes compagnons !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma seule compagnie ╵est celle des ténèbres.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel Dieu, toi qui me sauves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je crie à toi, ╵pendant le jour, pendant la nuit, ╵en ta présence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que ma prière ╵parvienne jusqu’à toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veuille prêter attention à mes cris !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car je suis rassasié de maux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je suis tout près de la mort.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Déjà je suis compté ╵parmi ceux qui s’en vont ╵dans le tombeau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ressemble à un homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a perdu ses forces.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: C’est au milieu des morts ╵que j’ai ma place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme ceux qui, ╵mortellement blessés, ╵sont couchés dans la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as oubliés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont tu ne t’occupes plus.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu m’as jeté ╵dans un gouffre sans fond,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les fonds ténébreux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ta fureur me tenaille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les flots de ta colère ╵ont déferlé sur moi.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu as fait s’éloigner de moi mes proches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fait de moi un objet d’horreur pour eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis emprisonné, ╵je ne peux m’en sortir.
