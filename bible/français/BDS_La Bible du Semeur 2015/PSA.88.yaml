document_id: PSA.88,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d’un homme près de la mort
  - type: text
    content: Un psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: . Cantique à chanter avec accompagnement de flûtes
  - type: note
    content: Sens incertain.
  - type: text
    content: . Au chef de chœur. Une méditation
  - type: note
    content: Sens incertain.
  - type: text
    content: ' d’Hémân'
  - type: note
    content: Voir 1 Ch 6.18-22 ; 25.1, 4.
  - type: text
    content: ' l’Ezrahite.'
  '10':
  - type: text
    content: Mes yeux sont épuisés ╵à force d’affliction.
  - type: text
    content: Je t’invoque, Eternel, ╵tout au long de mes jours,
  - type: text
    content: je tends les mains vers toi.
  '11':
  - type: text
    content: Feras-tu des prodiges ╵pour ceux qui ne sont plus ?
  - type: text
    content: Verra-t-on se lever ╵les morts pour te louer ?
  - type: text
    content: Pause
  '12':
  - type: text
    content: Parle-t-on dans la tombe ╵de ton amour ?
  - type: text
    content: De ta fidélité ╵dans le séjour des morts ?
  '13':
  - type: text
    content: Connaît-on tes prodiges ╵là où sont les ténèbres,
  - type: text
    content: et ta justice ╵au pays de l’oubli ?
  '14':
  - type: text
    content: Pour moi, ô Eternel, ╵je crie à toi,
  - type: text
    content: je te présente ma prière ╵chaque matin.
  '15':
  - type: text
    content: Pourquoi, ô Eternel, ╵me rejeter,
  - type: text
    content: me refuser ton attention ?
  '16':
  - type: text
    content: Car je suis affligé, ╵près de la mort ╵depuis que je suis jeune ;
  - type: text
    content: j’endure les terreurs ╵que tu m’imposes. ╵Je suis désemparé.
  '17':
  - type: text
    content: Les flots de ta colère ╵ont déferlé sur moi,
  - type: text
    content: je suis anéanti ╵par les angoisses ╵qui me viennent de toi.
  '18':
  - type: text
    content: Comme des eaux qui me submergent,
  - type: text
    content: de toutes parts, ╵elles m’assaillent tous les jours.
  '19':
  - type: text
    content: Tu as fait s’éloigner de moi ╵tous mes amis, mes compagnons !
  - type: text
    content: Ma seule compagnie ╵est celle des ténèbres.
  '2':
  - type: text
    content: Eternel Dieu, toi qui me sauves,
  - type: text
    content: je crie à toi, ╵pendant le jour, pendant la nuit, ╵en ta présence.
  '3':
  - type: text
    content: Que ma prière ╵parvienne jusqu’à toi !
  - type: text
    content: Veuille prêter attention à mes cris !
  '4':
  - type: text
    content: Car je suis rassasié de maux,
  - type: text
    content: et je suis tout près de la mort.
  '5':
  - type: text
    content: Déjà je suis compté ╵parmi ceux qui s’en vont ╵dans le tombeau.
  - type: text
    content: Je ressemble à un homme
  - type: text
    content: qui a perdu ses forces.
  '6':
  - type: text
    content: C’est au milieu des morts ╵que j’ai ma place,
  - type: text
    content: comme ceux qui, ╵mortellement blessés, ╵sont couchés dans la tombe,
  - type: text
    content: que tu as oubliés
  - type: text
    content: et dont tu ne t’occupes plus.
  '7':
  - type: text
    content: Tu m’as jeté ╵dans un gouffre sans fond,
  - type: text
    content: dans les fonds ténébreux.
  '8':
  - type: text
    content: Ta fureur me tenaille,
  - type: text
    content: les flots de ta colère ╵ont déferlé sur moi.
  - type: text
    content: Pause
  '9':
  - type: text
    content: Tu as fait s’éloigner de moi mes proches,
  - type: text
    content: tu as fait de moi un objet d’horreur pour eux.
  - type: text
    content: Je suis emprisonné, ╵je ne peux m’en sortir.
