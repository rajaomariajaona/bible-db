document_id: MAT.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus maître du sabbat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 2.23-28 ; Lc 6.1-5)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A cette époque, un jour de sabbat, Jésus traversait des champs de blé. Comme ses disciples avaient faim, ils se mirent à cueillir des épis pour en manger les grains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 23.26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il y avait là un homme paralysé d’une main.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens demandèrent à Jésus : A-t-on le droit de guérir quelqu’un le jour du sabbat ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils voulaient ainsi pouvoir l’accuser.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Supposez que l’un de vous n’ait qu’un seul mouton et qu’un jour de sabbat, il tombe dans un trou profond. Ne va-t-il pas le prendre et l’en sortir ?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eh bien, un homme a beaucoup plus de valeur qu’un mouton ! Il est donc permis de faire du bien le jour du sabbat.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors il dit à l’homme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Etends la main !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il la tendit et elle redevint saine, comme l’autre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les pharisiens sortirent de la synagogue et se concertèrent sur les moyens de faire mourir Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus le Serviteur de l’Eternel
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quand Jésus sut qu’on voulait le tuer, il partit de là. Une grande foule le suivit et il guérit tous les malades. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais il leur défendit formellement de le faire connaître. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ainsi devait s’accomplir cette parole du prophète Esaïe :'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Voici mon serviteur, dit Dieu, celui que j’ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: celui que j’aime et qui fait toute ma joie.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je ferai reposer mon Esprit sur lui
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et il annoncera la justice à tous les peuples.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il ne cherchera pas querelle,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il ne criera pas.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: On n’entendra pas sa voix dans les rues.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand les pharisiens virent cela, ils dirent à Jésus : Regarde tes disciples : ils font ce qui est interdit le jour du sabbat !'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il ne brisera pas le roseau qui se ploie
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et il n’éteindra pas la lampe
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dont la mèche fume encore.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il agira encore,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jusqu’à ce qu’il ait assuré le triomphe de la justice
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 42.1-3
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tous les peuples mettront leur espoir en lui
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 42.4
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu ou Satan ?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 3.20-30 ; Lc 11.14-23 ; 12.10)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: On lui amena encore un homme qui était sous l’emprise d’un démon qui le rendait aveugle et muet. Jésus le guérit, et l’homme put de nouveau parler et voir.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'La foule, stupéfaite, disait : Cet homme n’est-il pas le Fils de David ?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les pharisiens, ayant appris ce qu’on disait de lui, déclarèrent : Si cet homme chasse les démons, c’est par le pouvoir de Béelzébul'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béelzébul
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 10.25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', le chef des démons.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mais Jésus, connaissant leurs pensées, leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout royaume déchiré par la guerre civile est dévasté. Aucune ville, aucune famille divisée ne peut subsister.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si donc '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Satan
      - type: text
        text: ' se met à chasser Satan, il est en conflit avec lui-même. Comment alors son royaume subsistera-t-il ?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'D’ailleurs, si moi je chasse les démons par Béelzébul, qui donc donne à vos '
      - type: usfm
        marker: w
        children:
        - type: text
          text: disciples
      - type: text
        text: ' le pouvoir de les chasser ? C’est pourquoi ils seront eux-mêmes vos juges.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais si c’est par l’Esprit de Dieu que je chasse les démons, alors, de toute évidence, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' est venu jusqu’à vous.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ou encore : Comment quelqu’un peut-il pénétrer dans la maison d’un homme fort et s’emparer de ses biens s’il n’a pas, tout d’abord, ligoté cet homme fort ? C’est alors qu’il pillera sa maison.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’avez-vous donc pas lu ce qu’a fait '
      - type: usfm
        marker: w
        children:
        - type: text
          text: David
      - type: text
        text: ' lorsque lui et ses compagnons avaient faim ?'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui n’est pas avec moi est contre moi, et celui qui ne se joint pas à moi pour rassembler, disperse.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est pourquoi je vous avertis : tout péché, tout '
      - type: usfm
        marker: w
        children:
        - type: text
          text: blasphème
      - type: text
        text: ' sera pardonné aux hommes mais pas le blasphème contre le Saint-Esprit.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un dit une parole contre le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ', il lui sera pardonné ; mais si quelqu’un parle contre le Saint-Esprit, il ne recevra pas le pardon, ni dans la vie présente ni dans le monde à venir.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 6.43-45)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Considérez ou bien que l’arbre est bon et que son fruit est bon, ou bien que l’arbre est mauvais et que son fruit est mauvais
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ou bien vous considérez… ou bien vous considérez…
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', car c’est à son fruit que l’on reconnaît l’arbre.'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Espèces de vipères ! Comment pouvez-vous tenir des propos qui soient bons alors que vous êtes mauvais ? Car ce qu’on dit vient de ce qui remplit le cœur.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: L’homme qui est bon tire de bonnes choses du bon trésor qui est en lui ; mais l’homme qui est mauvais tire de mauvaises choses du mauvais trésor qui est en lui.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, je vous le déclare, au jour du jugement les hommes rendront compte de toute parole sans fondement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans efficacité.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qu’ils auront prononcée.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, c’est en fonction de tes propres paroles que tu seras déclaré juste, ou que tu seras condamné.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 8.11-12 ; Lc 11.29-32)
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Quelques spécialistes de la Loi et des pharisiens intervinrent en disant : Maître, nous voudrions te voir faire un signe miraculeux.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ces gens de notre temps qui sont mauvais et infidèles à Dieu réclament un signe miraculeux ! Un signe… il ne leur en sera pas accordé d’autre que celui du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' Jonas.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est entré dans le sanctuaire de Dieu et il a mangé avec eux les pains exposés devant Dieu. Or, ni lui ni ses hommes n’avaient le droit d’en manger, ils étaient réservés uniquement aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: .
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: comme Jonas resta trois jours et trois nuits dans le ventre du poisson
      - type: text
        text: h, ainsi le Fils de l’homme passera trois jours et trois nuits dans le sein de la terre.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Au jour du jugement, les habitants de Ninive
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ninive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ancienne capitale de l’Assyrie dont les habitants ont changé d’attitude en entendant la prédication du prophète Jonas.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'se lèveront et condamneront les gens de notre temps, car ils ont '
      - type: usfm
        marker: w
        children:
        - type: text
          text: changé
      - type: text
        text: ' en réponse à la prédication de Jonas. Or, il y a ici plus que Jonas.'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Au jour du jugement, la reine du Midi se lèvera et condamnera les gens de notre temps, car elle est venue du bout du monde pour écouter l’enseignement plein de sagesse de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Salomon
      - type: text
        text: . Or, il y a ici plus que Salomon !
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 11.24-26)
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’un esprit mauvais est sorti de quelqu’un, il erre çà et là dans des lieux déserts, à la recherche d’un lieu de repos, et il n’en trouve pas.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il se dit alors : « Mieux vaut regagner la demeure que j’ai quittée. » Il y retourne donc et la trouve vide, balayée et mise en ordre.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Alors il va chercher sept autres esprits encore plus méchants que lui et les amène avec lui. Ils entrent dans la demeure et s’y installent. Finalement, la condition de cet homme est pire qu’avant. C’est exactement ce qui arrivera à ces gens de notre temps qui sont mauvais.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie famille de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 3.31-35 ; Lc 8.19-21)
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Pendant que Jésus parlait encore à la foule, voici que sa mère et ses frères se tenaient dehors, cherchant à lui parler.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '['
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Quelqu’un vint lui dire : Ta mère et tes frères sont là. Ils cherchent à te parler'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce verset est absent dans de nombreux manuscrits.
      marker-yv: yv-n
    - type: text
      text: '].'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Mais Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui est ma mère ? Qui sont mes frères ?
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Puis, désignant ses disciples d’un geste de la main, il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ma mère et mes frères, les voici.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ou bien, n’avez-vous pas lu dans la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: ' que, le jour du sabbat, les prêtres qui travaillent dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Temple
      - type: text
        text: ' violent la loi sur le sabbat, sans pour cela se rendre coupables d’aucune faute ?'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car celui qui fait la volonté de mon Père céleste, celui-là est pour moi un frère, une sœur, une mère.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Or, je vous le dis : il y a ici plus que le Temple.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ah ! si vous aviez compris le sens de cette parole : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Ce que je veux, c’est la compassion bien plus que les sacrifices
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Os 6.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', vous n’auriez pas condamné ces innocents.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' est maître du sabbat.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 3.1-6 ; Lc 6.6-11)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En partant de là, Jésus se rendit dans l’une de leurs synagogues. '
