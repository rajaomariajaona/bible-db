document_id: MAT.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus maître du sabbat
  - type: heading
    content: (Mc 2.23-28 ; Lc 6.1-5)
  - type: text
    content: A cette époque, un jour de sabbat, Jésus traversait des champs de blé. Comme ses disciples avaient faim, ils se mirent à cueillir des épis pour en manger les grains
  - type: note
    content: Voir Dt 23.26.
  - type: text
    content: .
  '10':
  - type: text
    content: Il y avait là un homme paralysé d’une main.
  - type: text
    content: 'Les pharisiens demandèrent à Jésus : A-t-on le droit de guérir quelqu’un le jour du sabbat ?'
  - type: text
    content: Ils voulaient ainsi pouvoir l’accuser.
  '11':
  - type: text
    content: 'Mais il leur répondit : '
  - type: text
    content: Supposez que l’un de vous n’ait qu’un seul mouton et qu’un jour de sabbat, il tombe dans un trou profond. Ne va-t-il pas le prendre et l’en sortir ?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Eh bien, un homme a beaucoup plus de valeur qu’un mouton ! Il est donc permis de faire du bien le jour du sabbat.
  '13':
  - type: text
    content: 'Alors il dit à l’homme : '
  - type: text
    content: Etends la main !
  - type: text
    content: Il la tendit et elle redevint saine, comme l’autre.
  '14':
  - type: text
    content: Les pharisiens sortirent de la synagogue et se concertèrent sur les moyens de faire mourir Jésus.
  - type: heading
    content: Jésus le Serviteur de l’Eternel
  '15':
  - type: text
    content: 'Quand Jésus sut qu’on voulait le tuer, il partit de là. Une grande foule le suivit et il guérit tous les malades. '
  '16':
  - type: text
    content: 'Mais il leur défendit formellement de le faire connaître. '
  '17':
  - type: text
    content: 'Ainsi devait s’accomplir cette parole du prophète Esaïe :'
  '18':
  - type: text
    content: ' '
  - type: text
    content: Voici mon serviteur, dit Dieu, celui que j’ai choisi,
  - type: text
    content: celui que j’aime et qui fait toute ma joie.
  - type: text
    content: Je ferai reposer mon Esprit sur lui
  - type: text
    content: et il annoncera la justice à tous les peuples.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Il ne cherchera pas querelle,
  - type: text
    content: il ne criera pas.
  - type: text
    content: On n’entendra pas sa voix dans les rues.
  '2':
  - type: text
    content: 'Quand les pharisiens virent cela, ils dirent à Jésus : Regarde tes disciples : ils font ce qui est interdit le jour du sabbat !'
  '20':
  - type: text
    content: ' '
  - type: text
    content: Il ne brisera pas le roseau qui se ploie
  - type: text
    content: et il n’éteindra pas la lampe
  - type: text
    content: dont la mèche fume encore.
  - type: text
    content: Il agira encore,
  - type: text
    content: jusqu’à ce qu’il ait assuré le triomphe de la justice
  - type: text
    content: ' '
  - type: note
    content: Es 42.1-3 .
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: text
    content: Tous les peuples mettront leur espoir en lui
  - type: text
    content: ' '
  - type: note
    content: Es 42.4 cité selon l’ancienne version grecque.
  - type: text
    content: .
  - type: heading
    content: Dieu ou Satan ?
  - type: heading
    content: (Mc 3.20-30 ; Lc 11.14-23 ; 12.10)
  '22':
  - type: text
    content: On lui amena encore un homme qui était sous l’emprise d’un démon qui le rendait aveugle et muet. Jésus le guérit, et l’homme put de nouveau parler et voir.
  '23':
  - type: text
    content: 'La foule, stupéfaite, disait : Cet homme n’est-il pas le Fils de David ?'
  '24':
  - type: text
    content: 'Les pharisiens, ayant appris ce qu’on disait de lui, déclarèrent : Si cet homme chasse les démons, c’est par le pouvoir de Béelzébul'
  - type: note
    content: 'Béelzébul: voir note Mt 10.25.'
  - type: text
    content: ', le chef des démons.'
  '25':
  - type: text
    content: 'Mais Jésus, connaissant leurs pensées, leur dit : '
  - type: text
    content: Tout royaume déchiré par la guerre civile est dévasté. Aucune ville, aucune famille divisée ne peut subsister.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Si donc '
  - type: text
    content: Satan
  - type: text
    content: ' se met à chasser Satan, il est en conflit avec lui-même. Comment alors son royaume subsistera-t-il ?'
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'D’ailleurs, si moi je chasse les démons par Béelzébul, qui donc donne à vos '
  - type: text
    content: disciples
  - type: text
    content: ' le pouvoir de les chasser ? C’est pourquoi ils seront eux-mêmes vos juges.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Mais si c’est par l’Esprit de Dieu que je chasse les démons, alors, de toute évidence, le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est venu jusqu’à vous.'
  '29':
  - type: text
    content: ' '
  - type: text
    content: 'Ou encore : Comment quelqu’un peut-il pénétrer dans la maison d’un homme fort et s’emparer de ses biens s’il n’a pas, tout d’abord, ligoté cet homme fort ? C’est alors qu’il pillera sa maison.'
  '3':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'N’avez-vous donc pas lu ce qu’a fait '
  - type: text
    content: David
  - type: text
    content: ' lorsque lui et ses compagnons avaient faim ?'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: Celui qui n’est pas avec moi est contre moi, et celui qui ne se joint pas à moi pour rassembler, disperse.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'C’est pourquoi je vous avertis : tout péché, tout '
  - type: text
    content: blasphème
  - type: text
    content: ' sera pardonné aux hommes mais pas le blasphème contre le Saint-Esprit.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Si quelqu’un dit une parole contre le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', il lui sera pardonné ; mais si quelqu’un parle contre le Saint-Esprit, il ne recevra pas le pardon, ni dans la vie présente ni dans le monde à venir.'
  - type: heading
    content: (Lc 6.43-45)
  '33':
  - type: text
    content: ' '
  - type: text
    content: Considérez ou bien que l’arbre est bon et que son fruit est bon, ou bien que l’arbre est mauvais et que son fruit est mauvais
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : ou bien vous considérez… ou bien vous considérez…'
  - type: text
    content: ', car c’est à son fruit que l’on reconnaît l’arbre.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: Espèces de vipères ! Comment pouvez-vous tenir des propos qui soient bons alors que vous êtes mauvais ? Car ce qu’on dit vient de ce qui remplit le cœur.
  - type: text
    content: ' '
  '35':
  - type: text
    content: L’homme qui est bon tire de bonnes choses du bon trésor qui est en lui ; mais l’homme qui est mauvais tire de mauvaises choses du mauvais trésor qui est en lui.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Or, je vous le déclare, au jour du jugement les hommes rendront compte de toute parole sans fondement
  - type: note
    content: 'Autre traduction : sans efficacité.'
  - type: text
    content: ' '
  - type: text
    content: qu’ils auront prononcée.
  - type: text
    content: ' '
  '37':
  - type: text
    content: En effet, c’est en fonction de tes propres paroles que tu seras déclaré juste, ou que tu seras condamné.
  - type: heading
    content: (Mc 8.11-12 ; Lc 11.29-32)
  '38':
  - type: text
    content: 'Quelques spécialistes de la Loi et des pharisiens intervinrent en disant : Maître, nous voudrions te voir faire un signe miraculeux.'
  '39':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Ces gens de notre temps qui sont mauvais et infidèles à Dieu réclament un signe miraculeux ! Un signe… il ne leur en sera pas accordé d’autre que celui du '
  - type: text
    content: prophète
  - type: text
    content: ' Jonas.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Il est entré dans le sanctuaire de Dieu et il a mangé avec eux les pains exposés devant Dieu. Or, ni lui ni ses hommes n’avaient le droit d’en manger, ils étaient réservés uniquement aux '
  - type: text
    content: prêtres
  - type: text
    content: .
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'En effet, '
  - type: text
    content: comme Jonas resta trois jours et trois nuits dans le ventre du poisson
  - type: text
    content: h, ainsi le Fils de l’homme passera trois jours et trois nuits dans le sein de la terre.
  '41':
  - type: text
    content: ' '
  - type: text
    content: Au jour du jugement, les habitants de Ninive
  - type: text
    content: ' '
  - type: note
    content: 'Ninive : ancienne capitale de l’Assyrie dont les habitants ont changé d’attitude en entendant la prédication du prophète Jonas.'
  - type: text
    content: 'se lèveront et condamneront les gens de notre temps, car ils ont '
  - type: text
    content: changé
  - type: text
    content: ' en réponse à la prédication de Jonas. Or, il y a ici plus que Jonas.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Au jour du jugement, la reine du Midi se lèvera et condamnera les gens de notre temps, car elle est venue du bout du monde pour écouter l’enseignement plein de sagesse de '
  - type: text
    content: Salomon
  - type: text
    content: . Or, il y a ici plus que Salomon !
  - type: heading
    content: (Lc 11.24-26)
  '43':
  - type: text
    content: ' '
  - type: text
    content: Lorsqu’un esprit mauvais est sorti de quelqu’un, il erre çà et là dans des lieux déserts, à la recherche d’un lieu de repos, et il n’en trouve pas.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Il se dit alors : « Mieux vaut regagner la demeure que j’ai quittée. » Il y retourne donc et la trouve vide, balayée et mise en ordre.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Alors il va chercher sept autres esprits encore plus méchants que lui et les amène avec lui. Ils entrent dans la demeure et s’y installent. Finalement, la condition de cet homme est pire qu’avant. C’est exactement ce qui arrivera à ces gens de notre temps qui sont mauvais.
  - type: heading
    content: La vraie famille de Jésus
  - type: heading
    content: (Mc 3.31-35 ; Lc 8.19-21)
  '46':
  - type: text
    content: Pendant que Jésus parlait encore à la foule, voici que sa mère et ses frères se tenaient dehors, cherchant à lui parler.
  - type: text
    content: '['
  '47':
  - type: text
    content: 'Quelqu’un vint lui dire : Ta mère et tes frères sont là. Ils cherchent à te parler'
  - type: note
    content: Ce verset est absent dans de nombreux manuscrits.
  - type: text
    content: '].'
  '48':
  - type: text
    content: 'Mais Jésus lui répondit : '
  - type: text
    content: Qui est ma mère ? Qui sont mes frères ?
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Puis, désignant ses disciples d’un geste de la main, il ajouta : '
  - type: text
    content: Ma mère et mes frères, les voici.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Ou bien, n’avez-vous pas lu dans la '
  - type: text
    content: Loi
  - type: text
    content: ' que, le jour du sabbat, les prêtres qui travaillent dans le '
  - type: text
    content: Temple
  - type: text
    content: ' violent la loi sur le sabbat, sans pour cela se rendre coupables d’aucune faute ?'
  '50':
  - type: text
    content: Car celui qui fait la volonté de mon Père céleste, celui-là est pour moi un frère, une sœur, une mère.
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'Or, je vous le dis : il y a ici plus que le Temple.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ah ! si vous aviez compris le sens de cette parole : '
  - type: text
    content: Ce que je veux, c’est la compassion bien plus que les sacrifices
  - type: note
    content: Os 6.6.
  - type: text
    content: ', vous n’auriez pas condamné ces innocents.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Car le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est maître du sabbat.'
  - type: heading
    content: (Mc 3.1-6 ; Lc 6.6-11)
  '9':
  - type: text
    content: 'En partant de là, Jésus se rendit dans l’une de leurs synagogues. '
