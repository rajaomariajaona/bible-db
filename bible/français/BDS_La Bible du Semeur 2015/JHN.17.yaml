document_id: JHN.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus prie pour lui-même
  - type: text
    content: 'Après avoir ainsi parlé, Jésus leva les yeux au ciel et dit : '
  - type: text
    content: 'Père, l’heure est venue : Fais éclater la gloire de ton Fils, pour qu’à son tour, le Fils fasse éclater ta gloire.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: Car tout ce qui est à moi est à toi, comme tout ce qui est à toi est à moi. Ma gloire rayonne en eux.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Bientôt, je ne serai plus dans le monde, car je vais à toi, mais eux, ils vont rester dans le monde. Père saint, garde-les par le pouvoir de ton nom, celui que tu m’as donné
  - type: note
    content: 'Certains manuscrits ont : par le pouvoir de ton nom, garde ceux que tu m’as donnés.'
  - type: text
    content: ', pour qu’ils soient un comme nous le sommes.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Aussi longtemps que j’étais parmi eux, je les ai gardés par le pouvoir de ton nom
  - type: note
    content: Dans la Bible, le nom représente toute la personne et ses attributs.
  - type: text
    content: ', ce nom que tu m’as donné'
  - type: note
    content: 'Certains manuscrits ont : par le pouvoir de ton nom, j’ai gardé ceux que tu m’as donnés.'
  - type: text
    content: ; je les ai protégés et aucun d’eux ne s’est perdu (sauf celui qui devait se perdre pour que s’accomplisse l’Ecriture).
  '13':
  - type: text
    content: ' '
  - type: text
    content: A présent, je retourne auprès de toi, et je dis tout cela pendant que je suis encore dans le monde, pour qu’ils possèdent en eux cette joie qui est la mienne, une joie parfaite.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Je leur ai donné ta Parole, et le monde les a pris en haine parce qu’ils ne lui appartiennent pas, comme moi-même je ne lui appartiens pas.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je ne te demande pas de les retirer du monde, mais de les préserver du diable
  - type: note
    content: 'Autre traduction : du mal.'
  - type: text
    content: .
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ils n’appartiennent pas au monde, comme moi-même je ne lui appartiens pas.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Consacre-les par la vérité. Ta Parole est la vérité.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Comme tu m’as envoyé dans le monde, moi aussi je les y envoie.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Et je me consacre moi-même à toi pour eux, pour qu’ils soient, à leur tour, consacrés à toi par la vérité
  - type: note
    content: 'Autres traductions : et je me purifie moi-même pour eux afin qu’ils soient purifiés à leur tour par la vérité, ou : et je me consacre moi-même pour mourir pour eux afin qu’ils soient consacrés à leur ministère par la vérité.'
  - type: text
    content: .
  - type: heading
    content: Jésus prie pour tous ceux qui croiront en lui
  '2':
  - type: text
    content: En effet, tu lui as donné autorité sur l’humanité entière afin qu’il donne la vie éternelle à tous ceux que tu lui as donnés.
  '20':
  - type: text
    content: ' '
  - type: text
    content: Ce n’est pas seulement pour eux que je te prie ; c’est aussi pour ceux qui croiront en moi grâce à leur parole.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Je te demande qu’ils soient tous un. Comme toi, Père, tu es en moi et comme moi je suis en toi, qu’ils soient un en nous pour que le monde croie que c’est toi qui m’as envoyé.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Je leur ai donné la gloire que tu m’as donnée, afin qu’ils soient un, comme toi et moi nous sommes un,
  - type: text
    content: ' '
  '23':
  - type: text
    content: moi en eux et toi en moi. Qu’ils soient parfaitement un et qu’ainsi le monde puisse reconnaître que c’est toi qui m’as envoyé et que tu les aimes comme tu m’aimes !
  '24':
  - type: text
    content: ' '
  - type: text
    content: Père, mon désir est que ceux que tu m’as donnés soient avec moi là où je serai et qu’ils contemplent ma gloire, celle que tu m’as donnée, parce que tu m’as aimé avant la création du monde.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Père, toi qui es juste, le monde ne t’a pas connu, mais moi je t’ai connu, et ceux-ci ont compris que c’est toi qui m’as envoyé.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Je t’ai fait connaître à eux et je continuerai à te faire connaître, pour que l’amour que tu m’as témoigné soit en eux et que je sois moi-même en eux.
  '3':
  - type: text
    content: ' '
  - type: text
    content: 'Or, la vie éternelle consiste à te connaître, toi le Dieu unique et véritable, et celui que tu as envoyé : Jésus-Christ.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: J’ai fait connaître ta gloire sur la terre en accomplissant l’œuvre que tu m’avais confiée.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Et maintenant, Père, revêts-moi de gloire en ta présence, donne-moi cette gloire que j’avais déjà auprès de toi avant les origines du monde.
  - type: heading
    content: Jésus prie pour ses disciples
  '6':
  - type: text
    content: ' '
  - type: text
    content: 'Je t’ai fait connaître aux hommes que tu as pris du monde pour me les donner. Ils t’appartenaient, et tu me les as donnés : ils ont gardé ta Parole.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: Maintenant ils savent que tout ce que tu m’as donné vient de toi ;
  - type: text
    content: ' '
  '8':
  - type: text
    content: car je leur ai transmis fidèlement le message que tu m’avais confié ; ils l’ont reçu. Aussi ont-ils reconnu avec certitude que je suis venu d’auprès de toi ; et ils ont cru que c’est toi qui m’as envoyé.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Je te prie pour eux. Je ne te prie pas pour le monde, mais pour ceux que tu m’as donnés parce qu’ils t’appartiennent.
  - type: text
    content: ' '
