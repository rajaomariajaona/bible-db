document_id: JHN.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour lui-même
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après avoir ainsi parlé, Jésus leva les yeux au ciel et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Père, l’heure est venue : Fais éclater la gloire de ton Fils, pour qu’à son tour, le Fils fasse éclater ta gloire.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car tout ce qui est à moi est à toi, comme tout ce qui est à toi est à moi. Ma gloire rayonne en eux.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Bientôt, je ne serai plus dans le monde, car je vais à toi, mais eux, ils vont rester dans le monde. Père saint, garde-les par le pouvoir de ton nom, celui que tu m’as donné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par le pouvoir de ton nom, garde ceux que tu m’as donnés.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', pour qu’ils soient un comme nous le sommes.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aussi longtemps que j’étais parmi eux, je les ai gardés par le pouvoir de ton nom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans la Bible, le nom représente toute la personne et ses attributs.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', ce nom que tu m’as donné'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par le pouvoir de ton nom, j’ai gardé ceux que tu m’as donnés.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ; je les ai protégés et aucun d’eux ne s’est perdu (sauf celui qui devait se perdre pour que s’accomplisse l’Ecriture).
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A présent, je retourne auprès de toi, et je dis tout cela pendant que je suis encore dans le monde, pour qu’ils possèdent en eux cette joie qui est la mienne, une joie parfaite.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je leur ai donné ta Parole, et le monde les a pris en haine parce qu’ils ne lui appartiennent pas, comme moi-même je ne lui appartiens pas.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je ne te demande pas de les retirer du monde, mais de les préserver du diable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils n’appartiennent pas au monde, comme moi-même je ne lui appartiens pas.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Consacre-les par la vérité. Ta Parole est la vérité.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme tu m’as envoyé dans le monde, moi aussi je les y envoie.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et je me consacre moi-même à toi pour eux, pour qu’ils soient, à leur tour, consacrés à toi par la vérité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et je me purifie moi-même pour eux afin qu’ils soient purifiés à leur tour par la vérité, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et je me consacre moi-même pour mourir pour eux afin qu’ils soient consacrés à leur ministère par la vérité.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour tous ceux qui croiront en lui
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, tu lui as donné autorité sur l’humanité entière afin qu’il donne la vie éternelle à tous ceux que tu lui as donnés.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce n’est pas seulement pour eux que je te prie ; c’est aussi pour ceux qui croiront en moi grâce à leur parole.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je te demande qu’ils soient tous un. Comme toi, Père, tu es en moi et comme moi je suis en toi, qu’ils soient un en nous pour que le monde croie que c’est toi qui m’as envoyé.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je leur ai donné la gloire que tu m’as donnée, afin qu’ils soient un, comme toi et moi nous sommes un,
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: moi en eux et toi en moi. Qu’ils soient parfaitement un et qu’ainsi le monde puisse reconnaître que c’est toi qui m’as envoyé et que tu les aimes comme tu m’aimes !
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, mon désir est que ceux que tu m’as donnés soient avec moi là où je serai et qu’ils contemplent ma gloire, celle que tu m’as donnée, parce que tu m’as aimé avant la création du monde.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, toi qui es juste, le monde ne t’a pas connu, mais moi je t’ai connu, et ceux-ci ont compris que c’est toi qui m’as envoyé.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je t’ai fait connaître à eux et je continuerai à te faire connaître, pour que l’amour que tu m’as témoigné soit en eux et que je sois moi-même en eux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Or, la vie éternelle consiste à te connaître, toi le Dieu unique et véritable, et celui que tu as envoyé : Jésus-Christ.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai fait connaître ta gloire sur la terre en accomplissant l’œuvre que tu m’avais confiée.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et maintenant, Père, revêts-moi de gloire en ta présence, donne-moi cette gloire que j’avais déjà auprès de toi avant les origines du monde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour ses disciples
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je t’ai fait connaître aux hommes que tu as pris du monde pour me les donner. Ils t’appartenaient, et tu me les as donnés : ils ont gardé ta Parole.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant ils savent que tout ce que tu m’as donné vient de toi ;
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car je leur ai transmis fidèlement le message que tu m’avais confié ; ils l’ont reçu. Aussi ont-ils reconnu avec certitude que je suis venu d’auprès de toi ; et ils ont cru que c’est toi qui m’as envoyé.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je te prie pour eux. Je ne te prie pas pour le monde, mais pour ceux que tu m’as donnés parce qu’ils t’appartiennent.
    - type: text
      text: ' '
