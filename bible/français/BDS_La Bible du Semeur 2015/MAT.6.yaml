document_id: MAT.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l’hypocrisie religieuse
  - type: text
    content: ' '
  - type: text
    content: Gardez-vous d’accomplir devant les hommes, pour vous faire remarquer par eux, ce que vous faites pour obéir à Dieu, sinon vous n’aurez pas de récompense de votre Père céleste.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: que ton règne vienne,
  - type: text
    content: que ta volonté soit faite,
  - type: text
    content: sur la terre comme au ciel.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Donne-nous aujourd’hui
  - type: text
    content: le pain dont nous avons besoin
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : le pain de ce jour ou du lendemain.'
  - type: text
    content: ','
  '12':
  - type: text
    content: ' '
  - type: text
    content: pardonne-nous nos torts envers toi
  - type: text
    content: comme nous aussi, nous pardonnons
  - type: text
    content: les torts des autres envers nous
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : comme nous avons nous-mêmes pardonné les torts des autres envers nous.'
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: text
    content: Ne nous expose pas à la tentation
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : garde-nous de céder à la tentation.'
  - type: text
    content: ','
  - type: text
    content: et surtout, délivre-nous du diable
  - type: text
    content: ' '
  - type: note
    content: 'Littéralement : du Mauvais, c’est-à-dire le diable. D’autres traduisent : du mal.'
  - type: text
    content: .
  - type: text
    content: '['
  - type: text
    content: Car à toi appartiennent
  - type: text
    content: le règne et la puissance
  - type: text
    content: et la gloire à jamais
  - type: text
    content: ' '
  - type: note
    content: Les mots entre crochets sont absents de plusieurs manuscrits.
  - type: text
    content: .
  - type: text
    content: ']'
  '14':
  - type: text
    content: ' '
  - type: text
    content: En effet, si vous pardonnez aux autres leurs fautes, votre Père céleste vous pardonnera aussi.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Mais si vous ne pardonnez pas aux autres, votre Père ne vous pardonnera pas non plus vos fautes.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Lorsque vous jeûnez, n’ayez pas, comme les hypocrites, une mine triste. Pour bien montrer aux gens qu’ils jeûnent, ils prennent des visages défaits. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue !'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Mais toi, quand tu jeûnes, parfume tes cheveux et lave ton visage
  - type: text
    content: ' '
  '18':
  - type: text
    content: pour que personne ne se rende compte que tu es en train de jeûner, sauf ton Père qui est là dans le lieu secret. Alors ton Père, qui voit dans le secret, te le rendra.
  - type: heading
    content: Les biens matériels
  - type: heading
    content: (Lc 12.33-34)
  '19':
  - type: text
    content: ' '
  - type: text
    content: Ne vous amassez pas des richesses sur la terre où elles sont à la merci de la rouille, des mites qui rongent, ou des cambrioleurs qui percent les murs pour voler.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ainsi, lorsque tu donnes quelque chose aux pauvres, ne le claironne pas partout. Ce sont les hypocrites qui agissent ainsi dans les '
  - type: text
    content: synagogues
  - type: text
    content: ' et dans les rues pour que les gens chantent leurs louanges. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Amassez-vous plutôt des trésors dans le ciel, où il n’y a ni rouille, ni mites qui rongent, ni cambrioleurs qui percent les murs pour voler.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Car là où est ton trésor, là sera aussi ton cœur.
  - type: heading
    content: (Lc 11.34-36)
  '22':
  - type: text
    content: ' '
  - type: text
    content: Les yeux sont comme une lampe pour le corps ; si donc tes yeux sont en bon état, ton corps entier jouira de la lumière.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Mais si tes yeux sont malades, tout ton corps sera plongé dans l’obscurité. Si donc la lumière qui est en toi est obscurcie, dans quelles ténèbres profondes te trouveras-tu !
  - type: heading
    content: (Lc 16.13)
  '24':
  - type: text
    content: ' '
  - type: text
    content: Nul ne peut être en même temps au service de deux maîtres, car ou bien il détestera l’un et aimera l’autre, ou bien il sera dévoué au premier et méprisera le second. Vous ne pouvez pas servir en même temps Dieu et l’Argent
  - type: text
    content: ' '
  - type: note
    content: 'Argent : littéralement : Mamon, dieu personnifiant la richesse.'
  - type: text
    content: .
  - type: heading
    content: (Lc 12.22-31)
  '25':
  - type: text
    content: ' '
  - type: text
    content: 'C’est pourquoi je vous dis : ne vous inquiétez pas en vous demandant : « Qu’allons-nous manger ou boire ? Avec quoi allons-nous nous habiller ? » La vie ne vaut-elle pas bien plus que la nourriture ? Et le corps ne vaut-il pas bien plus que les vêtements ?'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Voyez ces oiseaux qui volent dans le ciel, ils ne sèment ni ne moissonnent, ils n’amassent pas de provisions dans des greniers, et votre Père céleste les nourrit. N’avez-vous pas bien plus de valeur qu’eux ?
  - type: text
    content: ' '
  '27':
  - type: text
    content: D’ailleurs, qui de vous peut, à force d’inquiétude, prolonger son existence, ne serait-ce que de quelques instants
  - type: note
    content: 'Autre traduction : augmenter sa taille, ne serait-ce que de quelques centimètres.'
  - type: text
    content: '?'
  '28':
  - type: text
    content: ' '
  - type: text
    content: Quant aux vêtements, pourquoi vous inquiéter à leur sujet ? Observez les lis sauvages ! Ils poussent sans se fatiguer à tisser des vêtements.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Pourtant, je vous l’assure, le roi '
  - type: text
    content: Salomon
  - type: text
    content: ' lui-même, dans toute sa gloire, n’a jamais été aussi bien vêtu que l’un d’eux !'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Mais toi, quand tu donnes quelque chose aux pauvres, que ta main gauche ne sache pas ce que fait ta main droite.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Si Dieu habille ainsi cette petite plante des champs qui est là aujourd’hui et qui demain sera jetée au feu, à plus forte raison ne vous vêtira-t-il pas vous-mêmes ? Ah, votre foi est bien petite !
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Ne vous inquiétez donc pas et ne dites pas : « Que mangerons-nous ? » ou « Que boirons-nous ? » ou « Avec quoi nous habillerons-nous ? »'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Toutes ces choses, les païens s’en préoccupent sans cesse. Mais votre Père, qui est aux cieux, sait que vous en avez besoin.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Faites donc du royaume de Dieu
  - type: note
    content: L’expression de Dieu est absente de nombreux manuscrits.
  - type: text
    content: ' '
  - type: text
    content: et de ce qui est juste à ses yeux votre préoccupation première, et toutes ces choses vous seront données en plus.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Ne vous inquiétez pas pour le lendemain ; le lendemain se souciera de lui-même. A chaque jour suffit sa peine.
  '4':
  - type: text
    content: Que ton aumône se fasse ainsi en secret ; et ton Père, qui voit dans le secret, te le rendra.
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Quand vous priez, n’imitez pas ces hypocrites qui aiment à faire leurs prières debout dans les synagogues et à l’angle des rues : ils tiennent à être remarqués par tout le monde. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais toi, quand tu veux prier, va dans ta pièce la plus retirée, verrouille ta porte et adresse ta prière à ton Père qui est là dans le lieu secret. Et ton Père, qui voit dans le secret, te le rendra.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Dans vos prières, ne rabâchez pas des tas de paroles, à la manière des païens ; ils s’imaginent qu’à force de paroles Dieu les entendra.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Ne les imitez pas, car votre Père sait ce qu’il vous faut, avant que vous le lui demandiez.
  - type: heading
    content: (Lc 11.2-4)
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Priez donc ainsi :'
  - type: text
    content: Notre Père,
  - type: text
    content: qui es aux cieux,
  - type: text
    content: que ton nom soit sanctifié
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : que tu sois reconnu pour Dieu ou que les hommes te rendent le culte qui t’est dû ou que la gloire de ta personne soit manifeste.'
  - type: text
    content: ','
