document_id: MAT.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre l’hypocrisie religieuse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous d’accomplir devant les hommes, pour vous faire remarquer par eux, ce que vous faites pour obéir à Dieu, sinon vous n’aurez pas de récompense de votre Père céleste.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ainsi, lorsque tu donnes quelque chose aux pauvres, ne le claironne pas partout. Ce sont les hypocrites qui agissent ainsi dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' et dans les rues pour que les gens chantent leurs louanges. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais toi, quand tu donnes quelque chose aux pauvres, que ta main gauche ne sache pas ce que fait ta main droite.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que ton aumône se fasse ainsi en secret ; et ton Père, qui voit dans le secret, te le rendra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand vous priez, n’imitez pas ces hypocrites qui aiment à faire leurs prières debout dans les synagogues et à l’angle des rues : ils tiennent à être remarqués par tout le monde. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais toi, quand tu veux prier, va dans ta pièce la plus retirée, verrouille ta porte et adresse ta prière à ton Père qui est là dans le lieu secret. Et ton Père, qui voit dans le secret, te le rendra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans vos prières, ne rabâchez pas des tas de paroles, à la manière des païens ; ils s’imaginent qu’à force de paroles Dieu les entendra.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne les imitez pas, car votre Père sait ce qu’il vous faut, avant que vous le lui demandiez.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 11.2-4)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Priez donc ainsi :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Notre Père,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui es aux cieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ton nom soit sanctifié
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que tu sois reconnu pour Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que les hommes te rendent le culte qui t’est dû '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que la gloire de ta personne soit manifeste.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ton règne vienne,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ta volonté soit faite,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sur la terre comme au ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donne-nous aujourd’hui
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le pain dont nous avons besoin
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le pain de ce jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du lendemain.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pardonne-nous nos torts envers toi
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: comme nous aussi, nous pardonnons
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: les torts des autres envers nous
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme nous avons nous-mêmes pardonné les torts des autres envers nous.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne nous expose pas à la tentation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: garde-nous de céder à la tentation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et surtout, délivre-nous du diable
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du Mauvais, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire le diable. D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du mal.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: '['
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car à toi appartiennent
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le règne et la puissance
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et la gloire à jamais
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mots entre crochets sont absents de plusieurs manuscrits.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ']'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En effet, si vous pardonnez aux autres leurs fautes, votre Père céleste vous pardonnera aussi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais si vous ne pardonnez pas aux autres, votre Père ne vous pardonnera pas non plus vos fautes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lorsque vous jeûnez, n’ayez pas, comme les hypocrites, une mine triste. Pour bien montrer aux gens qu’ils jeûnent, ils prennent des visages défaits. Vraiment, je vous l’assure : leur récompense, ils l’ont d’ores et déjà reçue !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais toi, quand tu jeûnes, parfume tes cheveux et lave ton visage
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pour que personne ne se rende compte que tu es en train de jeûner, sauf ton Père qui est là dans le lieu secret. Alors ton Père, qui voit dans le secret, te le rendra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les biens matériels
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 12.33-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vous amassez pas des richesses sur la terre où elles sont à la merci de la rouille, des mites qui rongent, ou des cambrioleurs qui percent les murs pour voler.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Amassez-vous plutôt des trésors dans le ciel, où il n’y a ni rouille, ni mites qui rongent, ni cambrioleurs qui percent les murs pour voler.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car là où est ton trésor, là sera aussi ton cœur.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 11.34-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les yeux sont comme une lampe pour le corps ; si donc tes yeux sont en bon état, ton corps entier jouira de la lumière.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais si tes yeux sont malades, tout ton corps sera plongé dans l’obscurité. Si donc la lumière qui est en toi est obscurcie, dans quelles ténèbres profondes te trouveras-tu !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 16.13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nul ne peut être en même temps au service de deux maîtres, car ou bien il détestera l’un et aimera l’autre, ou bien il sera dévoué au premier et méprisera le second. Vous ne pouvez pas servir en même temps Dieu et l’Argent
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'littéralement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mamon, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dieu personnifiant la richesse.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 12.22-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi je vous dis : ne vous inquiétez pas en vous demandant : « Qu’allons-nous manger ou boire ? Avec quoi allons-nous nous habiller ? » La vie ne vaut-elle pas bien plus que la nourriture ? Et le corps ne vaut-il pas bien plus que les vêtements ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voyez ces oiseaux qui volent dans le ciel, ils ne sèment ni ne moissonnent, ils n’amassent pas de provisions dans des greniers, et votre Père céleste les nourrit. N’avez-vous pas bien plus de valeur qu’eux ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’ailleurs, qui de vous peut, à force d’inquiétude, prolonger son existence, ne serait-ce que de quelques instants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: augmenter sa taille, ne serait-ce que de quelques centimètres.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quant aux vêtements, pourquoi vous inquiéter à leur sujet ? Observez les lis sauvages ! Ils poussent sans se fatiguer à tisser des vêtements.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pourtant, je vous l’assure, le roi '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Salomon
    - type: text
      text: ' lui-même, dans toute sa gloire, n’a jamais été aussi bien vêtu que l’un d’eux !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si Dieu habille ainsi cette petite plante des champs qui est là aujourd’hui et qui demain sera jetée au feu, à plus forte raison ne vous vêtira-t-il pas vous-mêmes ? Ah, votre foi est bien petite !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne vous inquiétez donc pas et ne dites pas : « Que mangerons-nous ? » ou « Que boirons-nous ? » ou « Avec quoi nous habillerons-nous ? »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutes ces choses, les païens s’en préoccupent sans cesse. Mais votre Père, qui est aux cieux, sait que vous en avez besoin.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites donc du royaume de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est absente de nombreux manuscrits.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et de ce qui est juste à ses yeux votre préoccupation première, et toutes ces choses vous seront données en plus.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vous inquiétez pas pour le lendemain ; le lendemain se souciera de lui-même. A chaque jour suffit sa peine.
