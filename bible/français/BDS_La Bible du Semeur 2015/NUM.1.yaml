document_id: NUM.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Recensement et organisation des Israélites
  - type: heading
    content: Le premier recensement d’Israël
  - type: text
    content: Le premier jour du deuxième mois de la deuxième année après la sortie d’Egypte
  - type: note
    content: C’est-à-dire onze mois après l’arrivée des Israélites dans le désert du Sinaï (Ex 19.1), un mois après l’achèvement du tabernacle (Ex 40.17) et quinze jours après la célébration de la Pâque au Sinaï (9.1-5).
  - type: text
    content: ', l’Eternel s’adressa à Moïse dans le désert du Sinaï dans la tente de la Rencontre. Il lui dit : '
  '10':
  - type: text
    content: 'pour les fils de Joseph :'
  - type: text
    content: 'pour Ephraïm : Elishama, fils d’Ammihoud ;'
  - type: text
    content: 'pour Manassé : Gamliel, fils de Pédahtsour ;'
  - type: text
    content: '– '
  '11':
  - type: text
    content: 'pour Benjamin : Abidân, fils de Guideoni ;'
  - type: text
    content: '– '
  '12':
  - type: text
    content: 'pour Dan : Ahiézer, fils d’Ammishaddaï ;'
  - type: text
    content: '– '
  '13':
  - type: text
    content: 'pour Aser : Paguiel, fils d’Okrân ;'
  - type: text
    content: '– '
  '14':
  - type: text
    content: 'pour Gad : Eliasaph, fils de Deouel'
  - type: note
    content: 'L’ancienne version grecque et la version syriaque ont : Reouel (voir 2.14).'
  - type: text
    content: '  ;'
  - type: text
    content: '– '
  '15':
  - type: text
    content: 'pour Nephtali : Ahira, fils d’Enân.'
  '16':
  - type: text
    content: 'Tels sont les membres de la communauté qui furent convoqués. C’étaient les chefs de leurs tribus, ils étaient aussi à la tête des corps d’armée d’Israël. '
  '17':
  - type: text
    content: 'Moïse et Aaron s’adjoignirent ces hommes qui avaient été nommément désignés '
  '18':
  - type: text
    content: 'et convoquèrent toute l’assemblée, le premier jour du second mois ; les Israélites furent recensés, selon leurs familles et leurs groupes familiaux, on releva le nom des hommes de vingt ans et au-dessus, un par un, '
  '19':
  - type: text
    content: comme l’Eternel l’avait ordonné à Moïse. De cette manière, Moïse fit leur dénombrement au désert du Sinaï.
  '2':
  - type: text
    content: 'Faites le recensement de toute la communauté des Israélites selon leurs familles et leurs groupes familiaux, en comptant tous les hommes '
  '20':
  - type: text
    content: 'On établit le recensement des descendants de Ruben, premier-né d’Israël, par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '21':
  - type: text
    content: On en dénombra 46 500
  - type: note
    content: Tous les nombres sont arrondis à la centaine (sauf pour Gad, v. 25, dont le total est aussi arrondi dans certaines versions). Selon certains, les milliers que contiennent les divers nombres du recensement ne désigneraient pas mille individus mais des corps d’armées moins nombreux ou des chefs de troupe, conformément au sens que peut avoir le terme en hébreu (voir, p. ex., 31.14, 48). Une telle interprétation pose le problème du total des v. 45-46.
  - type: text
    content: .
  '22':
  - type: text
    content: 'On établit le recensement des descendants de Siméon par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '23':
  - type: text
    content: On en dénombra 59 300.
  '24':
  - type: text
    content: 'On établit le recensement des descendants de Gad par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '25':
  - type: text
    content: On en dénombra 45 650.
  '26':
  - type: text
    content: 'On établit le recensement des descendants de Juda par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '27':
  - type: text
    content: On en dénombra 74 600.
  '28':
  - type: text
    content: 'On établit le recensement des descendants d’Issacar par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '29':
  - type: text
    content: On en dénombra 54 400.
  '3':
  - type: text
    content: âgés de vingt ans et plus, tous ceux qui sont aptes à servir dans l’armée d’Israël. Toi et Aaron, vous les dénombrerez par corps d’armée.
  '30':
  - type: text
    content: 'On établit le recensement des descendants de Zabulon par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '31':
  - type: text
    content: On en dénombra 57 400.
  '32':
  - type: text
    content: Parmi les fils de Joseph
  - type: note
    content: Les descendants de Lévi étant exclus de ce recensement (v. 47), les descendants de Joseph sont groupés en deux tribus composées de la famille de ses deux fils, Ephraïm et Manassé. Le nombre de douze tribus est ainsi maintenu, et Joseph, qui devait recevoir le droit d’aînesse (1 Ch 5.2), a un héritage double.
  - type: text
    content: '  : on établit le recensement des descendants d’Ephraïm par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '33':
  - type: text
    content: 'On en dénombra 40 500. '
  '34':
  - type: text
    content: 'On établit le recensement des descendants de Manassé par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '35':
  - type: text
    content: On en dénombra 32 200.
  '36':
  - type: text
    content: 'On établit le recensement des descendants de Benjamin par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '37':
  - type: text
    content: On en dénombra 35 400.
  '38':
  - type: text
    content: 'On établit le recensement des descendants de Dan par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '39':
  - type: text
    content: On en dénombra 62 700.
  '4':
  - type: text
    content: 'Vous vous adjoindrez un homme par tribu ; vous prendrez celui qui se trouve à la tête de son groupe familial. '
  '40':
  - type: text
    content: 'On établit le recensement des descendants d’Aser par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '41':
  - type: text
    content: On en dénombra 41 500.
  '42':
  - type: text
    content: 'On établit le recensement des descendants de Nephtali par familles et par groupes familiaux en relevant un par un le nom de tous les hommes de vingt ans et plus, aptes à servir dans l’armée. '
  '43':
  - type: text
    content: On en dénombra 53 400.
  '44':
  - type: text
    content: 'Tels sont les effectifs que recensèrent Moïse et Aaron, assistés de douze chefs d’Israël, un par tribu. '
  '45':
  - type: text
    content: 'Le total des Israélites de vingt ans et plus, aptes à servir dans l’armée, dont on fit le recensement selon leurs groupes familiaux, '
  '46':
  - type: text
    content: était de 603 550.
  '47':
  - type: text
    content: 'Les lévites, en tant que tribu patriarcale, ne furent pas recensés avec les autres tribus. '
  '48':
  - type: text
    content: 'En effet, l’Eternel avait dit à Moïse : '
  '49':
  - type: text
    content: N’inclus pas la tribu de Lévi dans le recensement et ne les compte pas avec les Israélites
  - type: note
    content: Ils seront recensés à part (3.14-39 ; 4.34-49).
  - type: text
    content: '. '
  '5':
  - type: text
    content: Voici le nom des hommes qui vous assisteront
  - type: note
    content: 'Les tribus sont mentionnées dans l’ordre suivant : 1. les fils de Léa (sans Lévi, v. 47) ; 2. les fils de Rachel ; 3. les fils des servantes. Les noms de ces hommes reviennent aux chap. 2 ; 7 et 10.'
  - type: text
    content: '  :'
  - type: text
    content: '– pour Ruben : Elitsour, fils de Shedéour ;'
  - type: text
    content: '– '
  '50':
  - type: text
    content: Charge-les du service du tabernacle qui abrite l’acte de l’alliance
  - type: note
    content: C’est-à-dire les dix commandements gravés sur des tablettes de pierre (Ex 31.18 ; 32.15 ; 34.29) déposées dans le coffre (Ex 25.16, 21 ; 40.20).
  - type: text
    content: ', de tous ses ustensiles et de tout son matériel ; ce sont eux qui transporteront le tabernacle avec tous ses accessoires et qui en assureront le service ; ils camperont autour du tabernacle. '
  '51':
  - type: text
    content: 'Quand il sera déplacé, les lévites le démonteront, puis ils le dresseront au nouveau campement. Tout membre étranger à leur tribu qui en approchera sera puni de mort. '
  '52':
  - type: text
    content: 'Les Israélites camperont chacun dans l’aire qui lui sera assignée, sous sa bannière, et selon leurs corps d’armée. '
  '53':
  - type: text
    content: Les lévites camperont autour du tabernacle qui abrite l’acte de l’alliance, pour que ma colère ne s’abatte pas sur la communauté des Israélites. Les lévites prendront soin du tabernacle.
  '54':
  - type: text
    content: Les Israélites obéirent à tous les ordres que l’Eternel avait donnés à Moïse et les accomplirent.
  '6':
  - type: text
    content: 'pour Siméon : Sheloumiel, fils de Tsourishaddaï ;'
  - type: text
    content: '– '
  '7':
  - type: text
    content: 'pour Juda : Nahshôn, fils d’Amminadab ;'
  - type: text
    content: '– '
  '8':
  - type: text
    content: 'pour Issacar : Netanéel, fils de Tsouar ;'
  - type: text
    content: '– '
  '9':
  - type: text
    content: 'pour Zabulon : Eliab, fils de Hélôn ;'
  - type: text
    content: '– '
