document_id: NEH.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lecture publique de la Loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tout le peuple s’assembla comme un seul homme sur la place située devant la porte des Eaux. Ils demandèrent à Esdras, qui était spécialiste de la Loi, d’apporter le livre de la Loi de Moïse donnée par l’Eternel à Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le premier jour du septième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8 octobre 445 av. J.-C. Ce jour de l’an de l’année civile devait être célébré par la fête des Trompettes (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 23.24
        metadata:
          usfm: LEV.23.24
      - type: text
        text: ). La fête des Cabanes avait lieu le même mois. Tous les sept ans, lors de cette fête, la Loi devait être lue au peuple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 31.10-11
        metadata:
          usfm: DEU.31.10+DEU.31.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', Esdras, qui était aussi prêtre, apporta la Loi devant l’assemblée composée d’hommes et de femmes et de tous ceux qui étaient en âge de comprendre ce qu’ils entendaient. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur lut dans le livre, depuis l’aube jusqu’à midi, sur la place qui est devant la porte des Eaux. Tout le peuple était attentif à la lecture du livre de la Loi : hommes, femmes et tous ceux qui étaient en âge de comprendre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Esdras se tenait sur une estrade de bois dressée pour la circonstance. A sa droite se tenaient Mattitia, Shéma, Anaya, Urie, Hilqiya et Maaséya, et à sa gauche, Pedaya, Mishaël, Malkiya, Hashoum, Hashbaddana, Zacharie et Meshoullam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Comme il était placé plus haut que tout le peuple, chacun le vit ouvrir le livre. A ce moment-là, tous se levèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esdras bénit l’Eternel, le grand Dieu, et tout le peuple s’écria : Amen ! Amen ! en levant les mains. Puis ils s’inclinèrent jusqu’à terre et se prosternèrent devant l’Eternel pour l’adorer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Josué, Bani, Shérébia, Yamîn, Aqqoub, Shabthaï, Hodiya, Maaséya, Qelita, Azaria, Yozabad, Hanân, Pelaya et les autres lévites expliquèrent la Loi au peuple qui se tenait debout. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils lisaient dans la Loi de Dieu et expliquaient au fur et à mesure, de façon posée et distincte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en traduisant.
    marker-yv: yv-n
  - type: text
    text: ', afin que chacun puisse comprendre ce qu’ils avaient lu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invitation à la joie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tout le peuple pleurait en entendant les paroles de la Loi. Alors Néhémie le gouverneur, Esdras le prêtre et spécialiste de la Loi, et les lévites qui donnaient les explications au peuple dirent à tous : Ce jour est un jour de fête consacré à l’Eternel votre Dieu. Ce n’est pas le moment de pleurer et de prendre le deuil !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Esdras ajouta : A présent, allez faire un bon repas, buvez d’excellentes boissons et faites porter des portions à ceux qui n’ont rien préparé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 16.10-11
        metadata:
          usfm: DEU.16.10+DEU.16.11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
        metadata:
          usfm: DEU.16.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', car ce jour est un jour consacré à notre Seigneur. Ne vous affligez donc pas, car la joie que donne l’Eternel est votre force.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De leur côté, les lévites calmaient tout le peuple en disant : Soyez tranquilles, car ce jour est consacré à Dieu, ne vous attristez donc pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors tous allèrent manger et boire, faire porter des parts aux pauvres et organiser de grandes réjouissances. Car ils avaient bien compris les paroles qu’on leur avait enseignées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La célébration de la fête des Cabanes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le lendemain, les chefs de groupes familiaux de tout le peuple, les prêtres et les lévites s’assemblèrent auprès d’Esdras, le spécialiste de la Loi, pour étudier plus attentivement les enseignements de la Loi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils trouvèrent écrit dans cette Loi, que l’Eternel avait donnée aux Israélites par l’intermédiaire de Moïse, que les Israélites devaient habiter des cabanes pendant la durée de la fête du septième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Alors ils firent publier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '…septième mois. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Alors ils firent publier…
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sens obtenu avec une légère correction du texte hébreu. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '…septième mois, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et qu’on devait faire publier…
    marker-yv: yv-n
  - type: text
    text: ' dans toutes leurs villes et à Jérusalem la proclamation suivante : Sortez dans la montagne'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les parties boisées du pays, par opposition aux vallées cultivées.
    marker-yv: yv-n
  - type: text
    text: ' et rapportez-en des branches d’olivier cultivé et d’olivier sauvage, de myrte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Buisson odoriférant aux feuilles persistantes (Es 41.19 ; 55.13 ; Za 1.8, 10-11).
    marker-yv: yv-n
  - type: text
    text: ', de palmier et d’arbres touffus, pour faire des cabanes comme cela est écrit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 23.33-43 ; Dt 16.13-15.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le peuple partit et rapporta des branchages. Ils se construisirent des cabanes, sur la terrasse de leur maison, dans leurs cours, dans les parvis du Temple, sur la place de la porte des Eaux, ou encore sur la place de la porte d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Porte du vieux rempart de la ville (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14.13
        metadata:
          usfm: 2KI.14.13
      - type: text
        text: ), restaurée par Néhémie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.39'
        metadata:
          usfm: NEH.12.39
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toute la communauté des anciens déportés revenus de l’exil construisit des cabanes et se mit à les habiter. Les Israélites n’avaient plus célébré cette fête depuis le temps de Josué, fils de Noun. Ils se livrèrent à de grandes réjouissances à cette occasion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Chaque jour, du premier jusqu’au dernier, Esdras lut une portion du livre de la Loi de Dieu. On célébra la fête pendant sept jours, et le huitième jour, conformément aux prescriptions de la Loi, il y eut une assemblée cultuelle.
