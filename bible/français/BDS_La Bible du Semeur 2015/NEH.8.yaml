document_id: NEH.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La lecture publique de la Loi
  - type: text
    content: 'Tout le peuple s’assembla comme un seul homme sur la place située devant la porte des Eaux. Ils demandèrent à Esdras, qui était spécialiste de la Loi, d’apporter le livre de la Loi de Moïse donnée par l’Eternel à Israël. '
  '10':
  - type: text
    content: 'Puis Esdras ajouta : A présent, allez faire un bon repas, buvez d’excellentes boissons et faites porter des portions à ceux qui n’ont rien préparé'
  - type: note
    content: Voir Dt 16.10-11, 14.
  - type: text
    content: ', car ce jour est un jour consacré à notre Seigneur. Ne vous affligez donc pas, car la joie que donne l’Eternel est votre force.'
  '11':
  - type: text
    content: 'De leur côté, les lévites calmaient tout le peuple en disant : Soyez tranquilles, car ce jour est consacré à Dieu, ne vous attristez donc pas !'
  '12':
  - type: text
    content: Alors tous allèrent manger et boire, faire porter des parts aux pauvres et organiser de grandes réjouissances. Car ils avaient bien compris les paroles qu’on leur avait enseignées.
  - type: heading
    content: La célébration de la fête des Cabanes
  '13':
  - type: text
    content: 'Le lendemain, les chefs de groupes familiaux de tout le peuple, les prêtres et les lévites s’assemblèrent auprès d’Esdras, le spécialiste de la Loi, pour étudier plus attentivement les enseignements de la Loi. '
  '14':
  - type: text
    content: 'Ils trouvèrent écrit dans cette Loi, que l’Eternel avait donnée aux Israélites par l’intermédiaire de Moïse, que les Israélites devaient habiter des cabanes pendant la durée de la fête du septième mois. '
  '15':
  - type: text
    content: Alors ils firent publier
  - type: note
    content: '…septième mois. 15 Alors ils firent publier…: sens obtenu avec une légère correction du texte hébreu. Le texte hébreu traditionnel a : …septième mois, 15 et qu’on devait faire publier…'
  - type: text
    content: ' dans toutes leurs villes et à Jérusalem la proclamation suivante : Sortez dans la montagne'
  - type: note
    content: C’est-à-dire les parties boisées du pays, par opposition aux vallées cultivées.
  - type: text
    content: ' et rapportez-en des branches d’olivier cultivé et d’olivier sauvage, de myrte'
  - type: note
    content: Buisson odoriférant aux feuilles persistantes (Es 41.19 ; 55.13 ; Za 1.8, 10-11).
  - type: text
    content: ', de palmier et d’arbres touffus, pour faire des cabanes comme cela est écrit'
  - type: note
    content: Voir Lv 23.33-43 ; Dt 16.13-15.
  - type: text
    content: .
  '16':
  - type: text
    content: Le peuple partit et rapporta des branchages. Ils se construisirent des cabanes, sur la terrasse de leur maison, dans leurs cours, dans les parvis du Temple, sur la place de la porte des Eaux, ou encore sur la place de la porte d’Ephraïm
  - type: note
    content: Porte du vieux rempart de la ville (voir 2 R 14.13), restaurée par Néhémie (12.39).
  - type: text
    content: '. '
  '17':
  - type: text
    content: Toute la communauté des anciens déportés revenus de l’exil construisit des cabanes et se mit à les habiter. Les Israélites n’avaient plus célébré cette fête depuis le temps de Josué, fils de Noun. Ils se livrèrent à de grandes réjouissances à cette occasion.
  '18':
  - type: text
    content: Chaque jour, du premier jusqu’au dernier, Esdras lut une portion du livre de la Loi de Dieu. On célébra la fête pendant sept jours, et le huitième jour, conformément aux prescriptions de la Loi, il y eut une assemblée cultuelle.
  '2':
  - type: text
    content: Le premier jour du septième mois
  - type: note
    content: 8 octobre 445 av. J.-C. Ce jour de l’an de l’année civile devait être célébré par la fête des Trompettes (Lv 23.24). La fête des Cabanes avait lieu le même mois. Tous les sept ans, lors de cette fête, la Loi devait être lue au peuple (Dt 31.10-11).
  - type: text
    content: ', Esdras, qui était aussi prêtre, apporta la Loi devant l’assemblée composée d’hommes et de femmes et de tous ceux qui étaient en âge de comprendre ce qu’ils entendaient. '
  '3':
  - type: text
    content: 'Il leur lut dans le livre, depuis l’aube jusqu’à midi, sur la place qui est devant la porte des Eaux. Tout le peuple était attentif à la lecture du livre de la Loi : hommes, femmes et tous ceux qui étaient en âge de comprendre. '
  '4':
  - type: text
    content: Esdras se tenait sur une estrade de bois dressée pour la circonstance. A sa droite se tenaient Mattitia, Shéma, Anaya, Urie, Hilqiya et Maaséya, et à sa gauche, Pedaya, Mishaël, Malkiya, Hashoum, Hashbaddana, Zacharie et Meshoullam.
  '5':
  - type: text
    content: 'Comme il était placé plus haut que tout le peuple, chacun le vit ouvrir le livre. A ce moment-là, tous se levèrent. '
  '6':
  - type: text
    content: 'Esdras bénit l’Eternel, le grand Dieu, et tout le peuple s’écria : Amen ! Amen ! en levant les mains. Puis ils s’inclinèrent jusqu’à terre et se prosternèrent devant l’Eternel pour l’adorer. '
  '7':
  - type: text
    content: 'Alors Josué, Bani, Shérébia, Yamîn, Aqqoub, Shabthaï, Hodiya, Maaséya, Qelita, Azaria, Yozabad, Hanân, Pelaya et les autres lévites expliquèrent la Loi au peuple qui se tenait debout. '
  '8':
  - type: text
    content: Ils lisaient dans la Loi de Dieu et expliquaient au fur et à mesure, de façon posée et distincte
  - type: note
    content: 'Autre traduction : en traduisant.'
  - type: text
    content: ', afin que chacun puisse comprendre ce qu’ils avaient lu.'
  - type: heading
    content: L’invitation à la joie
  '9':
  - type: text
    content: 'Tout le peuple pleurait en entendant les paroles de la Loi. Alors Néhémie le gouverneur, Esdras le prêtre et spécialiste de la Loi, et les lévites qui donnaient les explications au peuple dirent à tous : Ce jour est un jour de fête consacré à l’Eternel votre Dieu. Ce n’est pas le moment de pleurer et de prendre le deuil !'
