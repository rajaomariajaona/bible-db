document_id: DEU.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La Pâque
  - type: text
    content: Aie soin de célébrer la Pâque en l’honneur de l’Eternel ton Dieu au cours du mois des épis
  - type: note
    content: Mars-avril, premier mois du calendrier lévitique (voir Ex 12.1-20 ; Lv 23.5-8, 14 ; Nb 28.16-25).
  - type: text
    content: '  ; car c’est au cours d’une nuit de ce mois-là que l’Eternel votre Dieu vous a fait sortir d’Egypte. '
  '10':
  - type: text
    content: 'et vous célébrerez la fête des Semaines en l’honneur de l’Eternel votre Dieu. Vous lui offrirez des dons volontaires en fonction des bénédictions que votre Dieu vous aura accordées. '
  '11':
  - type: text
    content: 'Vous vous réjouirez devant l’Eternel votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes, les lévites qui habitent dans vos villes, les immigrés, les orphelins et les veuves qu’il y aura parmi vous, dans le lieu que l’Eternel votre Dieu aura choisi pour y établir sa présence. '
  '12':
  - type: text
    content: Vous vous souviendrez que vous avez été esclaves en Egypte et vous veillerez à observer fidèlement ces ordonnances.
  - type: heading
    content: La fête des Cabanes
  '13':
  - type: text
    content: Lorsque vous aurez rentré le blé battu et terminé la vendange, vous célébrerez pendant sept jours la fête des Cabanes
  - type: note
    content: Pour les v. 13-15, voir Lv 23.33-43 ; Nb 29.12-38.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Vous serez dans la joie en célébrant la fête, vous, vos fils et vos filles, vos serviteurs et vos servantes avec les lévites et les immigrés, les orphelins et les veuves qui habitent parmi vous. '
  '15':
  - type: text
    content: Pendant sept jours, vous célébrerez la fête en l’honneur de l’Eternel votre Dieu dans le lieu qu’il aura choisi, parce qu’il vous aura bénis dans toutes vos récoltes et dans tout le travail que vous entreprendrez, pour que vous soyez tout à la joie.
  '16':
  - type: text
    content: 'Trois fois par an, tous les hommes se présenteront donc devant l’Eternel votre Dieu au lieu qu’il aura choisi : lors de la fête des Pains sans levain, de la fête des Semaines et de celle des Cabanes. On ne se présentera pas les mains vides devant l’Eternel : '
  '17':
  - type: text
    content: chacun apportera des dons en fonction des bénédictions que l’Eternel votre Dieu lui aura accordées.
  - type: heading
    content: Les responsables du peuple
  - type: heading
    content: Les juges et les magistrats
  '18':
  - type: text
    content: 'Dans toutes les villes que l’Eternel votre Dieu vous donnera, vous instituerez des juges et des magistrats dans vos tribus, et ils jugeront le peuple en rendant de justes jugements. '
  '19':
  - type: text
    content: Vous ne fausserez pas le cours de la justice, vous ne ferez pas preuve de partialité envers les personnes, et vous ne vous laisserez pas corrompre par des cadeaux, car ceux-ci aveuglent même les sages et compromettent la cause des innocents
  - type: note
    content: 'Autre traduction : et corrompent le verdict des justes. Voir Ex 23.3, 6-8 ; Lv 19.15.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Tu immoleras un bœuf, un mouton ou une chèvre comme sacrifice pascal, en l’honneur de l’Eternel ton Dieu, au lieu qu’il aura choisi pour y établir sa présence. '
  '20':
  - type: text
    content: Cherchez à rendre une pleine justice afin que vous viviez et que vous conserviez la possession du pays que l’Eternel votre Dieu vous donne.
  '21':
  - type: text
    content: 'Vous ne vous planterez pas de pieu sacré en bois à côté de l’autel que vous érigerez pour votre Dieu. '
  '22':
  - type: text
    content: Vous ne dresserez pas non plus chez vous de ces stèles sculptées que l’Eternel votre Dieu déteste
  - type: note
    content: Voir Ex 34.13 ; Lv 26.1.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Tu ne mangeras pas de pain levé avec ce repas pascal ; pendant sept jours, tu mangeras du pain sans levain. Ce pain de misère te rappellera que c’est précipitamment que vous avez quitté l’Egypte. Ainsi tu te souviendras durant toute ta vie du jour de ton départ du pays d’Egypte. '
  '4':
  - type: text
    content: 'Durant ces sept jours, on ne devra trouver chez vous aucune trace de levain dans toute l’étendue de votre territoire. Quant à la viande du sacrifice offert le soir, on n’en gardera rien jusqu’au lendemain matin. '
  '5':
  - type: text
    content: 'Vous ne pourrez pas immoler le sacrifice pascal dans n’importe laquelle des villes que l’Eternel votre Dieu vous donnera pour y habiter. '
  '6':
  - type: text
    content: C’est uniquement au lieu que l’Eternel ton Dieu aura choisi pour y établir sa présence que vous sacrifierez la Pâque. Vous immolerez la victime le soir, au coucher du soleil, c’est-à-dire au moment
  - type: note
    content: 'Autre traduction : à la date.'
  - type: text
    content: ' où vous êtes partis d’Egypte. '
  '7':
  - type: text
    content: 'Vous ferez cuire la viande et vous la mangerez à l’endroit que l’Eternel aura choisi. Le lendemain matin vous pourrez regagner votre demeure. '
  '8':
  - type: text
    content: Pendant six jours vous mangerez du pain sans levain, le septième jour, vous aurez une réunion cultuelle en l’honneur de l’Eternel votre Dieu. Vous ne ferez aucun travail ce jour-là.
  - type: heading
    content: La fête de la Pentecôte
  '9':
  - type: text
    content: A partir du jour du début de la moisson
  - type: note
    content: Le 16 du mois des épis, second jour de la fête de la Pâque. Pour la fête de Pentecôte, voir Lv 23.15-21 ; Nb 28.26-31.
  - type: text
    content: ', vous compterez sept semaines, '
