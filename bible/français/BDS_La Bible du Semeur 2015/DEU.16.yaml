document_id: DEU.16
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aie soin de célébrer la Pâque en l’honneur de l’Eternel ton Dieu au cours du mois des épis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mars-avril, premier mois du calendrier lévitique (voir Ex 12.1-20 ; Lv 23.5-8, 14 ; Nb 28.16-25).
    marker-yv: yv-n
  - type: text
    text: '  ; car c’est au cours d’une nuit de ce mois-là que l’Eternel votre Dieu vous a fait sortir d’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu immoleras un bœuf, un mouton ou une chèvre comme sacrifice pascal, en l’honneur de l’Eternel ton Dieu, au lieu qu’il aura choisi pour y établir sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu ne mangeras pas de pain levé avec ce repas pascal ; pendant sept jours, tu mangeras du pain sans levain. Ce pain de misère te rappellera que c’est précipitamment que vous avez quitté l’Egypte. Ainsi tu te souviendras durant toute ta vie du jour de ton départ du pays d’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Durant ces sept jours, on ne devra trouver chez vous aucune trace de levain dans toute l’étendue de votre territoire. Quant à la viande du sacrifice offert le soir, on n’en gardera rien jusqu’au lendemain matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous ne pourrez pas immoler le sacrifice pascal dans n’importe laquelle des villes que l’Eternel votre Dieu vous donnera pour y habiter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est uniquement au lieu que l’Eternel ton Dieu aura choisi pour y établir sa présence que vous sacrifierez la Pâque. Vous immolerez la victime le soir, au coucher du soleil, c’est-à-dire au moment
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la date.
    marker-yv: yv-n
  - type: text
    text: ' où vous êtes partis d’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous ferez cuire la viande et vous la mangerez à l’endroit que l’Eternel aura choisi. Le lendemain matin vous pourrez regagner votre demeure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pendant six jours vous mangerez du pain sans levain, le septième jour, vous aurez une réunion cultuelle en l’honneur de l’Eternel votre Dieu. Vous ne ferez aucun travail ce jour-là.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête de la Pentecôte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A partir du jour du début de la moisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le 16 du mois des épis, second jour de la fête de la Pâque. Pour la fête de Pentecôte, voir Lv 23.15-21 ; Nb 28.26-31.
    marker-yv: yv-n
  - type: text
    text: ', vous compterez sept semaines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et vous célébrerez la fête des Semaines en l’honneur de l’Eternel votre Dieu. Vous lui offrirez des dons volontaires en fonction des bénédictions que votre Dieu vous aura accordées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous vous réjouirez devant l’Eternel votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes, les lévites qui habitent dans vos villes, les immigrés, les orphelins et les veuves qu’il y aura parmi vous, dans le lieu que l’Eternel votre Dieu aura choisi pour y établir sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous vous souviendrez que vous avez été esclaves en Egypte et vous veillerez à observer fidèlement ces ordonnances.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fête des Cabanes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lorsque vous aurez rentré le blé battu et terminé la vendange, vous célébrerez pendant sept jours la fête des Cabanes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 13-15, voir Lv 23.33-43 ; Nb 29.12-38.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous serez dans la joie en célébrant la fête, vous, vos fils et vos filles, vos serviteurs et vos servantes avec les lévites et les immigrés, les orphelins et les veuves qui habitent parmi vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pendant sept jours, vous célébrerez la fête en l’honneur de l’Eternel votre Dieu dans le lieu qu’il aura choisi, parce qu’il vous aura bénis dans toutes vos récoltes et dans tout le travail que vous entreprendrez, pour que vous soyez tout à la joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Trois fois par an, tous les hommes se présenteront donc devant l’Eternel votre Dieu au lieu qu’il aura choisi : lors de la fête des Pains sans levain, de la fête des Semaines et de celle des Cabanes. On ne se présentera pas les mains vides devant l’Eternel : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: chacun apportera des dons en fonction des bénédictions que l’Eternel votre Dieu lui aura accordées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les responsables du peuple
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les juges et les magistrats
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dans toutes les villes que l’Eternel votre Dieu vous donnera, vous instituerez des juges et des magistrats dans vos tribus, et ils jugeront le peuple en rendant de justes jugements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous ne fausserez pas le cours de la justice, vous ne ferez pas preuve de partialité envers les personnes, et vous ne vous laisserez pas corrompre par des cadeaux, car ceux-ci aveuglent même les sages et compromettent la cause des innocents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et corrompent le verdict des justes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.3, 6-8 ; Lv 19.15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Cherchez à rendre une pleine justice afin que vous viviez et que vous conserviez la possession du pays que l’Eternel votre Dieu vous donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous ne vous planterez pas de pieu sacré en bois à côté de l’autel que vous érigerez pour votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous ne dresserez pas non plus chez vous de ces stèles sculptées que l’Eternel votre Dieu déteste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 34.13 ; Lv 26.1.
    marker-yv: yv-n
  - type: text
    text: .
