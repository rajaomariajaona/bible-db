document_id: PSA.111,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Il a fait des merveillesPsaume alphabétique (cf. note 9.1).
  - type: text
    content: Louez l’Eternel
  - type: note
    content: Voir 112.1.
  - type: text
    content: '  !'
  - type: text
    content: Je mettrai tout mon cœur ╵à louer l’Eternel
  - type: text
    content: dans l’assemblée, ╵dans le conseil des justes.
  '10':
  - type: text
    content: La sagesse commence ╵par la crainte de l’Eternel
  - type: note
    content: Voir Jb 28.28 ; Pr 1.7 ; 9.10.
  - type: text
    content: .
  - type: text
    content: Qui observe ses lois ╵a une saine intelligence.
  - type: text
    content: Sa louange subsiste ╵jusqu’en l’éternité.
  '2':
  - type: text
    content: L’Eternel accomplit ╵des œuvres admirables,
  - type: text
    content: elles sont méditées ╵par tous ceux qui les aiment.
  '3':
  - type: text
    content: Ses actes manifestent ╵sa gloire et sa splendeur.
  - type: text
    content: Et sa justice ╵subsiste pour l’éternité
  - type: note
    content: Voir 112.3.
  - type: text
    content: .
  '4':
  - type: text
    content: Il fait qu’on se souvienne ╵de ses prodiges.
  - type: text
    content: L’Eternel est compatissant, ╵et il fait grâce
  - type: note
    content: Voir 112.4.
  - type: text
    content: .
  '5':
  - type: text
    content: Il a pourvu de quoi manger ╵pour ceux qui le craignaient
  - type: note
    content: Il s’agit sans doute ici d’une référence à la manne.
  - type: text
    content: .
  - type: text
    content: Il se souvient toujours ╵de son alliance.
  '6':
  - type: text
    content: Il a manifesté ╵sa puissance à son peuple ╵en agissant pour lui
  - type: text
    content: quand il lui a donné ╵le pays d’autres peuples.
  '7':
  - type: text
    content: Tout ce qu’il fait témoigne ╵qu’il est fidèle et juste ;
  - type: text
    content: tous ses commandements ╵sont dignes de confiance ;
  '8':
  - type: text
    content: ils sont bien établis ╵pour toute éternité,
  - type: text
    content: et fondés sur la vérité ╵et la droiture
  - type: note
    content: 'Autre traduction : et destinés à être obéis avec vérité et droiture.'
  - type: text
    content: .
  '9':
  - type: text
    content: Il a accordé la délivrance à son peuple,
  - type: text
    content: et il a conclu avec lui ╵une alliance éternelle.
  - type: text
    content: C’est un Dieu saint et redoutable.
