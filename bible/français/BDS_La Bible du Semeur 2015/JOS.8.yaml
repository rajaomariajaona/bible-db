document_id: JOS.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La conquête de la ville d’Aï
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel dit à Josué : N’aie pas peur, ne crains rien ! Emmène avec toi tous les soldats et va attaquer Aï ! Car je livre le roi d’Aï en ton pouvoir ainsi que son peuple, sa ville et tout son territoire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le lendemain, Josué se leva de bon matin et passa ses troupes en revue, puis il prit la tête de l’armée, accompagné des responsables d’Israël, pour marcher contre Aï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A une vingtaine de kilomètres.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Toute l’armée qu’il conduisait s’avança ainsi jusqu’à ce qu’elle arrive en face de la ville. Ils prirent position au nord d’Aï dont une vallée les séparait. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Josué avait pris environ cinq mille hommes et les avait postés en embuscade entre Béthel et Aï, à l’ouest de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le gros de l’armée installa son camp au nord de la ville tandis que l’arrière-garde des troupes se tenait à l’ouest. Durant cette nuit, Josué partit en reconnaissance au milieu de la vallée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quand le roi d’Aï vit la situation, il fit lever en hâte tous les hommes et se dépêcha de sortir de la ville pour se rendre sur le champ de bataille et affronter Israël en face de la plaine. Il ne se doutait pas qu’une embuscade avait été dressée contre lui derrière la ville. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Josué et les Israélites firent semblant d’être battus par eux et s’enfuirent en direction du désert. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tous les gens qui étaient dans la ville furent appelés à grands cris pour les poursuivre. Ils se précipitèrent donc sur les pas de Josué et se laissèrent attirer loin de la ville. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il ne resta dans Aï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans Aï et dans Béthel.
      marker-yv: yv-n
    - type: text
      text: ' pas un homme qui ne sortît à la poursuite d’Israël. Ainsi ils abandonnèrent la ville ouverte pour poursuivre les Israélites.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire sur Aï
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors l’Eternel dit à Josué : Pointe le javelot que tu tiens en main en direction d’Aï, car je vais la livrer en ton pouvoir. Josué pointa le javelot en direction de la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Aussitôt, les hommes qui se tenaient en embuscade surgirent de leur cachette à toute vitesse et s’élancèrent vers la ville ; ils y entrèrent, s’en emparèrent, et y mirent le feu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tu traiteras Aï et son roi comme tu as traité Jéricho et son roi. Toutefois, vous pourrez prendre pour vous comme butin ses biens et son bétail. Place des guerriers en embuscade derrière la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire du côté opposé à la porte de la ville qui constituait généralement la cible des attaquants.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lorsque les hommes d’Aï se retournèrent, ils virent la fumée qui s’élevait de leur ville dans le ciel. Ils n’eurent même plus la possibilité de fuir, toute retraite d’un côté comme de l’autre leur étant coupée, car les Israélites qui fuyaient vers le désert faisaient à présent volte-face contre leurs poursuivants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En effet, Josué et ses troupes, voyant que la ville avait été prise et incendiée par les hommes placés en embuscade, se retournaient pour attaquer les gens d’Aï. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et les autres soldats sortaient à leur tour de la ville pour les rejoindre, si bien que les gens d’Aï se trouvaient cernés de part et d’autre par les Israélites qui les battirent sans en laisser échapper un seul et sans leur laisser de survivants. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le roi d’Aï fut capturé vivant et amené à Josué. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les Israélites tuèrent tous les habitants d’Aï, soit en pleine campagne, soit dans le désert où ils les avaient poursuivis ; tous tombèrent sous les coups de leurs épées jusqu’au dernier. Après cela, tous les hommes d’Israël rentrèrent dans la ville et exterminèrent le reste de la population. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ainsi périrent, ce jour-là, douze mille personnes, hommes et femmes, c’est-à-dire toute la population d’Aï. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Josué n’avait cessé de tenir son javelot tendu jusqu’à ce que tous les habitants de la ville aient été exterminés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les Israélites prirent cependant comme butin le bétail et les biens qui se trouvaient dans la ville, comme l’Eternel l’avait ordonné à Josué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Josué incendia Aï, il en fit pour toujours un monceau de ruines, un lieu désert, ce qu’elle est encore aujourd’hui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Quant au roi d’Aï, on le pendit à un arbre où on laissa son corps jusqu’au soir. Comme le soleil se couchait, Josué ordonna de descendre le cadavre de l’arbre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 21.22-23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . On le jeta à l’entrée de la porte de la ville et l’on dressa sur lui un grand tas de pierres qui se voit encore aujourd’hui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lecture de la Loi devant toute l’assemblée
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Josué se mit en route avec toute son armée pour attaquer Aï. Il choisit trente mille valeureux guerriers et les fit partir de nuit '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Alors Josué bâtit un autel à l’Eternel, le Dieu d’Israël, sur le mont Ebal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 11.29
        - type: text
          text: . Au pied de ce mont se trouvait la forteresse de Sichem.
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Il le construisit conformément aux ordres que Moïse, serviteur de l’Eternel, avait donnés aux Israélites et qui sont consignés dans le livre de la Loi de Moïse : un autel de pierres brutes qu’aucun outil de fer n’avait touchées'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 27.4-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. On y offrit des holocaustes à l’Eternel et des sacrifices de communion. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Josué grava sur des pierres une copie de la Loi que Moïse avait mise par écrit sous les yeux des Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 27.2-3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Pendant ce temps, tout Israël avec ses responsables, ses officiers et ses chefs se tenaient debout de part et d’autre du coffre de l’alliance de l’Eternel en face des prêtres-lévites qui le portaient. Les étrangers comme les Israélites d’origine étaient là. La moitié d’entre eux se tenaient du côté du mont Garizim, l’autre moitié du côté du mont Ebal comme Moïse, serviteur de l’Eternel, avait autrefois ordonné de procéder pour bénir le peuple d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 11.29 ; 27.11-13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Josué lut ensuite tout le texte de la Loi, les paroles de bénédiction comme de malédiction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 27 à 28.
      marker-yv: yv-n
    - type: text
      text: ', telles qu’elles se trouvaient dans le livre de la Loi. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Devant toute l’assemblée d’Israël, y compris les femmes, les enfants et les étrangers qui vivaient au milieu du peuple, il lut tout ce que Moïse avait ordonné, sans en rien omettre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'en leur donnant les ordres suivants : Allez vous poster en embuscade derrière la ville, sans trop vous en éloigner, et tenez-vous tous prêts à intervenir. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je m’approcherai de la ville avec le gros de la troupe. Lorsque les gens d’Aï sortiront pour nous affronter comme la première fois, nous fuirons devant eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils se lanceront à notre poursuite et nous les attirerons loin de la ville. En effet, ils penseront que nous fuyons encore devant eux, comme l’autre fois. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'A ce moment-là, vous surgirez de votre cachette et vous vous emparerez de la ville, car l’Eternel votre Dieu la livre en votre pouvoir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dès que vous en serez maîtres, vous y mettrez le feu, comme l’Eternel l’a commandé. Voilà quels sont mes ordres.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Là-dessus, Josué les fit partir et ils allèrent se poster en embuscade entre Béthel et Aï, à l’ouest d’Aï, tandis que Josué passa la nuit avec le reste du peuple.
