document_id: 2CH.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le règne de Salomon
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le roi Salomon au haut lieu de Gabaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salomon, fils de David, affermit son autorité sur son royaume, et l’Eternel, son Dieu, était avec lui et il lui donna un très grand prestige.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 3.4-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi convoqua tout Israël : les chefs de « milliers » et de « centaines », les juges, et les notables de tout Israël, les chefs de groupe familial. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Salomon se rendit avec toute l’assemblée au haut lieu de Gabaon, car c’est là que se trouvait la tente de la Rencontre de Dieu que Moïse, le serviteur de l’Eternel, avait fabriquée dans le désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 36.8-38
        metadata:
          usfm: EXO.36.8+EXO.36.9+EXO.36.10+EXO.36.11+EXO.36.12+EXO.36.13+EXO.36.14+EXO.36.15+EXO.36.16+EXO.36.17+EXO.36.18+EXO.36.19+EXO.36.20+EXO.36.21+EXO.36.22+EXO.36.23+EXO.36.24+EXO.36.25+EXO.36.26+EXO.36.27+EXO.36.28+EXO.36.29+EXO.36.30+EXO.36.31+EXO.36.32+EXO.36.33+EXO.36.34+EXO.36.35+EXO.36.36+EXO.36.37+EXO.36.38
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais le coffre de Dieu avait été transporté par David de Qiryath-Yearim à l’endroit que le roi lui avait préparé ; il avait, en effet, dressé pour lui une tente à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 13 ; 15.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Devant le tabernacle se trouvait l’autel de bronze qu’avait fabriqué Betsaléel, fils d’Ouri et petit-fils de Hour, et c’est cet autel que Salomon et l’assemblée recherchaient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 35.30 à 36.1 ; 38.1-2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le roi se rendit à l’autel de bronze devant l’Eternel, à la tente de la Rencontre, et il y offrit mille holocaustes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salomon reçoit de Dieu la sagesse, et la promesse de richesse et de gloire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cette nuit-là, Dieu apparut à Salomon et lui dit : Demande ce que tu désires que je t’accorde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Salomon répondit à Dieu : Tu as témoigné une grande bienveillance à mon père David et tu m’as fait régner à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maintenant, Eternel Dieu, veuille tenir la promesse que tu as faite à mon père David puisque tu m’as fait régner sur un peuple nombreux comme les grains de poussière de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 13.16 ; 28.14.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Accorde-moi donc maintenant la sagesse et la connaissance nécessaires pour que je sache comment me conduire à la tête de ce peuple. Car, qui pourrait gouverner ton peuple qui est si grand ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Dieu dit à Salomon : Puisque c’est là le désir de ton cœur, et que tu ne demandes ni richesses, ni trésors, ni gloire, ni la mort de tes ennemis, que tu ne demandes même pas une longue vie, mais que tu demandes la sagesse et la connaissance nécessaires pour gouverner mon peuple sur lequel je t’ai fait régner, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: eh bien, je t’accorde la sagesse et la connaissance, et, de surcroît, des richesses, des trésors et la gloire comme n’en a jamais eus aucun roi avant toi et comme n’en aura aucun après toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Après cela, Salomon quitta le haut lieu de Gabaon où il était allé devant la tente de la Rencontre, et il revint à Jérusalem. Il régna alors sur Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La richesse et la gloire de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 10.26-29 ; 2 Ch 9.25-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Salomon se procura des chars et des hommes d’équipage pour ses chars : 1 400 chars et 12 000 hommes d’équipage. Il les cantonna dans les villes de garnison ainsi qu’auprès de lui à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi rendit l’argent et l’or aussi communs que les pierres à Jérusalem, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine côtière le long de la Méditerranée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les chevaux de Salomon étaient importés d’Egypte par convois ; une caravane de marchands du roi allait les acheter par convois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Qevé.
    marker-yv: yv-n
  - type: text
    text: ', contre leur prix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Chaque char qu’ils importaient d’Egypte coûtait 600 pièces d’argent et chaque cheval 150 pièces. Ces marchands en importaient dans les mêmes conditions pour tous les rois des Hittites et pour les rois de Syrie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salomon décide de bâtir le Temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 5.15-30 ; 7.13-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Salomon décida de bâtir un temple en l’honneur de l’Eternel et un palais royal pour lui-même.
