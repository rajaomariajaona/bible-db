document_id: 2CH.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Salomon
  - type: heading
    content: Le roi Salomon au haut lieu de Gabaon
  - type: text
    content: Salomon, fils de David, affermit son autorité sur son royaume, et l’Eternel, son Dieu, était avec lui et il lui donna un très grand prestige.
  - type: heading
    content: (1 R 3.4-15)
  '10':
  - type: text
    content: Accorde-moi donc maintenant la sagesse et la connaissance nécessaires pour que je sache comment me conduire à la tête de ce peuple. Car, qui pourrait gouverner ton peuple qui est si grand ?
  '11':
  - type: text
    content: 'Alors Dieu dit à Salomon : Puisque c’est là le désir de ton cœur, et que tu ne demandes ni richesses, ni trésors, ni gloire, ni la mort de tes ennemis, que tu ne demandes même pas une longue vie, mais que tu demandes la sagesse et la connaissance nécessaires pour gouverner mon peuple sur lequel je t’ai fait régner, '
  '12':
  - type: text
    content: eh bien, je t’accorde la sagesse et la connaissance, et, de surcroît, des richesses, des trésors et la gloire comme n’en a jamais eus aucun roi avant toi et comme n’en aura aucun après toi.
  '13':
  - type: text
    content: Après cela, Salomon quitta le haut lieu de Gabaon où il était allé devant la tente de la Rencontre, et il revint à Jérusalem. Il régna alors sur Israël.
  - type: heading
    content: La richesse et la gloire de Salomon
  - type: heading
    content: (1 R 10.26-29 ; 2 Ch 9.25-28)
  '14':
  - type: text
    content: 'Salomon se procura des chars et des hommes d’équipage pour ses chars : 1 400 chars et 12 000 hommes d’équipage. Il les cantonna dans les villes de garnison ainsi qu’auprès de lui à Jérusalem. '
  '15':
  - type: text
    content: 'Le roi rendit l’argent et l’or aussi communs que les pierres à Jérusalem, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine côtière le long de la Méditerranée. '
  '16':
  - type: text
    content: Les chevaux de Salomon étaient importés d’Egypte par convois ; une caravane de marchands du roi allait les acheter par convois
  - type: note
    content: 'Autre traduction : à Qevé.'
  - type: text
    content: ', contre leur prix. '
  '17':
  - type: text
    content: Chaque char qu’ils importaient d’Egypte coûtait 600 pièces d’argent et chaque cheval 150 pièces. Ces marchands en importaient dans les mêmes conditions pour tous les rois des Hittites et pour les rois de Syrie.
  - type: heading
    content: Salomon décide de bâtir le Temple
  - type: heading
    content: (1 R 5.15-30 ; 7.13-14)
  '18':
  - type: text
    content: Salomon décida de bâtir un temple en l’honneur de l’Eternel et un palais royal pour lui-même.
  '2':
  - type: text
    content: 'Le roi convoqua tout Israël : les chefs de « milliers » et de « centaines », les juges, et les notables de tout Israël, les chefs de groupe familial. '
  '3':
  - type: text
    content: Salomon se rendit avec toute l’assemblée au haut lieu de Gabaon, car c’est là que se trouvait la tente de la Rencontre de Dieu que Moïse, le serviteur de l’Eternel, avait fabriquée dans le désert
  - type: note
    content: Voir Ex 36.8-38.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Mais le coffre de Dieu avait été transporté par David de Qiryath-Yearim à l’endroit que le roi lui avait préparé ; il avait, en effet, dressé pour lui une tente à Jérusalem
  - type: note
    content: Voir 1 Ch 13 ; 15.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Devant le tabernacle se trouvait l’autel de bronze qu’avait fabriqué Betsaléel, fils d’Ouri et petit-fils de Hour, et c’est cet autel que Salomon et l’assemblée recherchaient
  - type: note
    content: Voir Ex 35.30 à 36.1 ; 38.1-2.
  - type: text
    content: .
  '6':
  - type: text
    content: Le roi se rendit à l’autel de bronze devant l’Eternel, à la tente de la Rencontre, et il y offrit mille holocaustes.
  - type: heading
    content: Salomon reçoit de Dieu la sagesse, et la promesse de richesse et de gloire
  '7':
  - type: text
    content: 'Cette nuit-là, Dieu apparut à Salomon et lui dit : Demande ce que tu désires que je t’accorde.'
  '8':
  - type: text
    content: 'Salomon répondit à Dieu : Tu as témoigné une grande bienveillance à mon père David et tu m’as fait régner à sa place. '
  '9':
  - type: text
    content: Maintenant, Eternel Dieu, veuille tenir la promesse que tu as faite à mon père David puisque tu m’as fait régner sur un peuple nombreux comme les grains de poussière de la terre
  - type: note
    content: Voir Gn 13.16 ; 28.14.
  - type: text
    content: '. '
