document_id: PSA.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Joie du pardon
  - type: text
    content: Méditation
  - type: note
    content: Traduction incertaine.
  - type: text
    content: ' de David.'
  - type: text
    content: Heureux l’homme ╵dont la faute est effacée,
  - type: text
    content: et le péché pardonné !
  '10':
  - type: text
    content: Ils sont nombreux les tourments ╵qui attendent les méchants,
  - type: text
    content: mais les hommes qui ont mis ╵leur confiance en l’Eternel ╵sont comblés par son amour.
  '11':
  - type: text
    content: Justes, réjouissez-vous ! ╵Mettez votre joie en l’Eternel
  - type: text
    content: et poussez des cris de joie, ╵vous qui êtes droits de cœur !
  '2':
  - type: text
    content: Heureux l’homme ╵au compte de qui ╵l’Eternel ╵ne porte pas le péché
  - type: note
    content: Cité en Rm 4.7-8.
  - type: text
    content: et qui est exempt ╵de duplicité !
  '3':
  - type: text
    content: Tant que je taisais ma faute,
  - type: text
    content: je m’épuisais à gémir ╵sans cesse, à longueur de jour.
  '4':
  - type: text
    content: Sur moi, le jour et la nuit, ╵ta main s’appesantissait,
  - type: text
    content: ma vigueur m’abandonnait ╵comme l’herbe se dessèche ╵lors des ardeurs de l’été.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Je t’ai avoué ma faute,
  - type: text
    content: je n’ai plus caché mes torts,
  - type: text
    content: 'j’ai dit : « Je reconnaîtrai ╵devant l’Eternel ╵les péchés que j’ai commis. »'
  - type: text
    content: Alors tu m’as déchargé ╵du poids de ma faute.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Ainsi, que tout homme ╵qui t’est attaché ╵te prie au temps opportun.
  - type: text
    content: Si les grandes eaux déferlent,
  - type: text
    content: leurs flots ne l’atteignent pas.
  '7':
  - type: text
    content: Tu es un abri pour moi, ╵tu me gardes du danger.
  - type: text
    content: Autour de moi retentissent ╵les chants de la délivrance.
  - type: text
    content: Pause
  '8':
  - type: text
    content: 'Tu as dit : « Je t’instruirai, ╵je t’indiquerai ╵le chemin ╵que tu devras emprunter,'
  - type: text
    content: je serai ton conseiller, ╵mes yeux veilleront sur toi.
  '9':
  - type: text
    content: Ne soyez donc pas stupides ╵comme un cheval, un mulet ╵dépourvus d’intelligence
  - type: text
    content: dont il faut dompter la fougue ╵par la bride et par le mors
  - type: text
    content: sans quoi ils ne viendront pas vers toi
  - type: note
    content: 'L’hébreu n’est pas clair. Autre traduction : pour qu’ils ne s’approchent pas de toi.'
  - type: text
    content: '  ! »'
