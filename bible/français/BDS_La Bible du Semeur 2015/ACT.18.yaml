document_id: ACT.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Corinthe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, Paul partit d’Athènes et se rendit à Corinthe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Corinthe
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: capitale de la province d’Achaïe, au sud de la Grèce. Ville très peuplée (700 000 habitants, selon certaines estimations), célèbre dans toute l’Antiquité pour la vie dissolue de ses habitants.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: je suis avec toi. Personne ne pourra s’attaquer à toi pour te faire du mal, car il y a dans cette ville un peuple nombreux qui m’appartient.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Paul se fixa à Corinthe et, pendant un an et demi, y enseigna la Parole de Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’époque où Gallion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après une inscription de l’époque, Gallion fut en fonction à Corinthe de mai 51 à mai 52 (ou 52-53).
      marker-yv: yv-n
    - type: text
      text: ' était gouverneur de la province d’Achaïe, les Juifs se mirent d’accord pour se saisir de Paul et ils l’amenèrent devant le tribunal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, ils l’accusèrent ainsi : Cet homme cherche à persuader les gens de servir et d’adorer Dieu d’une façon contraire à la loi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La loi romaine accordait au judaïsme le statut de « religion autorisée ». Les Juifs accusent Paul d’introduire une nouvelle religion : un crime considéré comme capital. Gallion a pu comprendre : contraire à la Loi juive (v. 15).'
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul se préparait à répondre, quand Gallion dit aux Juifs : Ecoutez-moi, ô Juifs, s’il s’agissait d’un délit ou de quelque méfait punissable, j’examinerais votre plainte comme il convient. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais puisqu’il s’agit de discussions sur des mots, sur des noms, et sur votre loi particulière, cela vous regarde ; je ne veux pas en être juge.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, il les renvoya du tribunal. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors la foule s’en prit à Sosthène, le chef de la synagogue, et le roua de coups devant le tribunal, sans que Gallion s’en mette en peine.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cet incident, Paul resta à Corinthe le temps qui lui parut nécessaire, puis il prit congé des frères et s’embarqua pour la Syrie, emmenant avec lui Priscille et Aquilas. Avant de quitter le port de Cenchrées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Corinthe était desservie par deux ports. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cenchrées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvait à l’est, sur la mer Egée.
      marker-yv: yv-n
    - type: text
      text: ', Paul se fit raser la tête car il avait fait un vœu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon la pratique de la consécration par vœu (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 6.1-21
        - type: text
          text: '), on ne se faisait pas couper les cheveux pendant la durée du vœu (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 21.24
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils arrivèrent à Ephèse, où Paul laissa ses compagnons. Quant à lui, il se rendit à la synagogue pour y discuter avec les Juifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y fit la connaissance d’un Juif nommé Aquilas, originaire du Pont
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pont
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: province au sud-est de la mer Noire, donc au nord de l’Asie Mineure.
      marker-yv: yv-n
    - type: text
      text: ', qui venait d’arriver d’Italie avec sa femme Priscille'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Priscille
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: diminutif de Prisca (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Tm 4.19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', car tous les Juifs avaient été expulsés de Rome par un décret de l’empereur Claude'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Claude
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.28'
        - type: text
          text: . Le décret dont il est question date de l’an 49 ou 50.
      marker-yv: yv-n
    - type: text
      text: '. Paul se lia avec eux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux-ci l’invitèrent à prolonger son séjour, mais il refusa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En les quittant il leur dit toutefois : Je reviendrai vous voir une autre fois, s’il plaît à Dieu.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il repartit donc d’Ephèse par mer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il débarqua à Césarée et, de là, il monta à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte a seulement : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Il monta, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui, dans ce contexte, signifie : se rendre à Jérusalem.'
      marker-yv: yv-n
    - type: text
      text: ' où il alla saluer l’Eglise. Puis il redescendit à Antioche. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après y avoir passé un certain temps, il repartit et parcourut de lieu en lieu la région galate de la Phrygie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parcourut successivement les régions de la Galatie et de la Phrygie.
      marker-yv: yv-n
    - type: text
      text: ', en affermissant tous les disciples dans la foi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apollos
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un Juif nommé Apollos, originaire d’Alexandrie, était arrivé à Ephèse. C’était un homme très éloquent, qui connaissait très bien les Ecritures. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait été instruit de la Voie du Seigneur et parlait avec enthousiasme de Jésus. L’enseignement qu’il apportait sur lui était d’une grande exactitude. Mais il ne connaissait que le baptême de Jean.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se mit donc à parler avec assurance dans la synagogue. Quand Priscille et Aquilas l’eurent entendu, ils le prirent avec eux et lui expliquèrent plus précisément la Voie de Dieu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il avait l’intention de se rendre en Achaïe, les frères l’y encouragèrent vivement et écrivirent aux disciples de Corinthe de lui faire bon accueil. Dès son arrivée là-bas, il fut, par la grâce de Dieu, d’un grand secours pour les croyants, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car il réfutait avec vigueur, en public, les arguments des Juifs, et démontrait par les Ecritures que Jésus est le Messie.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme il avait le même métier qu’eux – ils fabriquaient des toiles de tente – il logea chez eux et ils travaillèrent ensemble.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque sabbat, Paul prenait la parole dans la synagogue et cherchait à convaincre les Juifs et les Grecs. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand Silas et Timothée arrivèrent de Macédoine, il consacra tout son temps à annoncer la Parole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 17.15 ; 1 Th 3.1, 6. Paul a pu se consacrer entièrement à l’annonce de la Parole parce que les Philippiens lui ont fait parvenir de quoi pourvoir à ses besoins (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ph 4.16
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . Il rendait témoignage aux Juifs que Jésus est le Messie.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ceux-ci s’opposaient à lui et l’injuriaient. Aussi il secoua contre eux la poussière de ses vêtements et leur dit : Si vous êtes perdus, ce sera uniquement de votre faute. Je n’en porte pas la responsabilité. A partir de maintenant, j’irai vers les non-Juifs.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il partit de là et se rendit chez un certain Titius Justus. C’était un non-Juif qui adorait Dieu, et sa maison était juste à côté de la synagogue. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Crispus, le chef de la synagogue, crut au Seigneur ainsi que toute sa famille. Beaucoup de Corinthiens qui écoutaient Paul crurent aussi et furent baptisés.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une nuit, le Seigneur lui-même parla à Paul dans une vision : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’aie pas peur,
    - type: text
      text: ' lui dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: parle et ne te tais pas,
    - type: text
      text: ' '
