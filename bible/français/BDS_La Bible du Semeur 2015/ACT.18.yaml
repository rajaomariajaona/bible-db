document_id: ACT.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Corinthe
  - type: text
    content: Après cela, Paul partit d’Athènes et se rendit à Corinthe
  - type: note
    content: 'Corinthe: capitale de la province d’Achaïe, au sud de la Grèce. Ville très peuplée (700 000 habitants, selon certaines estimations), célèbre dans toute l’Antiquité pour la vie dissolue de ses habitants.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: je suis avec toi. Personne ne pourra s’attaquer à toi pour te faire du mal, car il y a dans cette ville un peuple nombreux qui m’appartient.
  '11':
  - type: text
    content: Alors Paul se fixa à Corinthe et, pendant un an et demi, y enseigna la Parole de Dieu.
  '12':
  - type: text
    content: A l’époque où Gallion
  - type: note
    content: D’après une inscription de l’époque, Gallion fut en fonction à Corinthe de mai 51 à mai 52 (ou 52-53).
  - type: text
    content: ' était gouverneur de la province d’Achaïe, les Juifs se mirent d’accord pour se saisir de Paul et ils l’amenèrent devant le tribunal. '
  '13':
  - type: text
    content: 'Là, ils l’accusèrent ainsi : Cet homme cherche à persuader les gens de servir et d’adorer Dieu d’une façon contraire à la loi'
  - type: note
    content: 'La loi romaine accordait au judaïsme le statut de « religion autorisée ». Les Juifs accusent Paul d’introduire une nouvelle religion : un crime considéré comme capital. Gallion a pu comprendre : contraire à la Loi juive (v. 15).'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Paul se préparait à répondre, quand Gallion dit aux Juifs : Ecoutez-moi, ô Juifs, s’il s’agissait d’un délit ou de quelque méfait punissable, j’examinerais votre plainte comme il convient. '
  '15':
  - type: text
    content: Mais puisqu’il s’agit de discussions sur des mots, sur des noms, et sur votre loi particulière, cela vous regarde ; je ne veux pas en être juge.
  '16':
  - type: text
    content: 'Là-dessus, il les renvoya du tribunal. '
  '17':
  - type: text
    content: Alors la foule s’en prit à Sosthène, le chef de la synagogue, et le roua de coups devant le tribunal, sans que Gallion s’en mette en peine.
  '18':
  - type: text
    content: Après cet incident, Paul resta à Corinthe le temps qui lui parut nécessaire, puis il prit congé des frères et s’embarqua pour la Syrie, emmenant avec lui Priscille et Aquilas. Avant de quitter le port de Cenchrées
  - type: note
    content: Corinthe était desservie par deux ports. Cenchrées se trouvait à l’est, sur la mer Egée.
  - type: text
    content: ', Paul se fit raser la tête car il avait fait un vœu'
  - type: note
    content: Selon la pratique de la consécration par vœu (Nb 6.1-21), on ne se faisait pas couper les cheveux pendant la durée du vœu (voir Ac 21.24).
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ils arrivèrent à Ephèse, où Paul laissa ses compagnons. Quant à lui, il se rendit à la synagogue pour y discuter avec les Juifs. '
  '2':
  - type: text
    content: Il y fit la connaissance d’un Juif nommé Aquilas, originaire du Pont
  - type: note
    content: 'Le Pont: province au sud-est de la mer Noire, donc au nord de l’Asie Mineure.'
  - type: text
    content: ', qui venait d’arriver d’Italie avec sa femme Priscille'
  - type: note
    content: 'Priscille: diminutif de Prisca (2 Tm 4.19).'
  - type: text
    content: ', car tous les Juifs avaient été expulsés de Rome par un décret de l’empereur Claude'
  - type: note
    content: 'Claude: voir note 11.28. Le décret dont il est question date de l’an 49 ou 50.'
  - type: text
    content: '. Paul se lia avec eux. '
  '20':
  - type: text
    content: 'Ceux-ci l’invitèrent à prolonger son séjour, mais il refusa. '
  '21':
  - type: text
    content: 'En les quittant il leur dit toutefois : Je reviendrai vous voir une autre fois, s’il plaît à Dieu.'
  - type: text
    content: 'Il repartit donc d’Ephèse par mer. '
  '22':
  - type: text
    content: Il débarqua à Césarée et, de là, il monta à Jérusalem
  - type: note
    content: 'Le texte a seulement : Il monta, ce qui, dans ce contexte, signifie : se rendre à Jérusalem.'
  - type: text
    content: ' où il alla saluer l’Eglise. Puis il redescendit à Antioche. '
  '23':
  - type: text
    content: Après y avoir passé un certain temps, il repartit et parcourut de lieu en lieu la région galate de la Phrygie
  - type: note
    content: 'Autre traduction : parcourut successivement les régions de la Galatie et de la Phrygie.'
  - type: text
    content: ', en affermissant tous les disciples dans la foi.'
  - type: heading
    content: Apollos
  '24':
  - type: text
    content: 'Un Juif nommé Apollos, originaire d’Alexandrie, était arrivé à Ephèse. C’était un homme très éloquent, qui connaissait très bien les Ecritures. '
  '25':
  - type: text
    content: Il avait été instruit de la Voie du Seigneur et parlait avec enthousiasme de Jésus. L’enseignement qu’il apportait sur lui était d’une grande exactitude. Mais il ne connaissait que le baptême de Jean.
  '26':
  - type: text
    content: 'Il se mit donc à parler avec assurance dans la synagogue. Quand Priscille et Aquilas l’eurent entendu, ils le prirent avec eux et lui expliquèrent plus précisément la Voie de Dieu. '
  '27':
  - type: text
    content: 'Comme il avait l’intention de se rendre en Achaïe, les frères l’y encouragèrent vivement et écrivirent aux disciples de Corinthe de lui faire bon accueil. Dès son arrivée là-bas, il fut, par la grâce de Dieu, d’un grand secours pour les croyants, '
  '28':
  - type: text
    content: car il réfutait avec vigueur, en public, les arguments des Juifs, et démontrait par les Ecritures que Jésus est le Messie.
  '3':
  - type: text
    content: Comme il avait le même métier qu’eux – ils fabriquaient des toiles de tente – il logea chez eux et ils travaillèrent ensemble.
  '4':
  - type: text
    content: 'Chaque sabbat, Paul prenait la parole dans la synagogue et cherchait à convaincre les Juifs et les Grecs. '
  '5':
  - type: text
    content: Quand Silas et Timothée arrivèrent de Macédoine, il consacra tout son temps à annoncer la Parole
  - type: note
    content: Voir 17.15 ; 1 Th 3.1, 6. Paul a pu se consacrer entièrement à l’annonce de la Parole parce que les Philippiens lui ont fait parvenir de quoi pourvoir à ses besoins (Ph 4.16).
  - type: text
    content: . Il rendait témoignage aux Juifs que Jésus est le Messie.
  '6':
  - type: text
    content: 'Mais ceux-ci s’opposaient à lui et l’injuriaient. Aussi il secoua contre eux la poussière de ses vêtements et leur dit : Si vous êtes perdus, ce sera uniquement de votre faute. Je n’en porte pas la responsabilité. A partir de maintenant, j’irai vers les non-Juifs.'
  '7':
  - type: text
    content: 'Il partit de là et se rendit chez un certain Titius Justus. C’était un non-Juif qui adorait Dieu, et sa maison était juste à côté de la synagogue. '
  '8':
  - type: text
    content: Crispus, le chef de la synagogue, crut au Seigneur ainsi que toute sa famille. Beaucoup de Corinthiens qui écoutaient Paul crurent aussi et furent baptisés.
  '9':
  - type: text
    content: 'Une nuit, le Seigneur lui-même parla à Paul dans une vision : '
  - type: text
    content: N’aie pas peur,
  - type: text
    content: ' lui dit-il, '
  - type: text
    content: parle et ne te tais pas,
  - type: text
    content: ' '
