document_id: DAN.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moi, Nabuchodonosor, je vivais tranquille dans ma maison et je jouissais de la prospérité dans mon palais. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’ai alors fait un rêve qui m’a rempli d’effroi ; les pensées qui m’ont hanté sur mon lit et les visions de mon esprit m’ont épouvanté. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J’ai donc ordonné de convoquer auprès de moi tous les sages de Babylone, pour qu’ils me fassent connaître l’interprétation de mon rêve. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les mages, les magiciens, les astrologues et les devins se sont présentés. Je leur ai exposé le rêve, mais ils n’ont pas pu m’en faire connaître l’interprétation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A la fin, s’est présenté devant moi Daniel, nommé aussi Beltshatsar, d’après le nom de mon dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.7'
        metadata:
          usfm: DAN.1.7
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '. L’esprit des dieux saints réside en lui. Je lui ai raconté mon rêve et je lui ai dit : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beltshatsar, chef des mages, je sais que l’esprit des dieux saints réside en toi, et qu’aucun mystère n’est trop difficile pour toi, écoute donc les visions que j’ai eues dans mon rêve et donne-m’en l’interprétation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici quelles étaient les visions de mon esprit pendant que j’étais couché sur mon lit : je regardais et voici ce que j’ai vu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de la terre ╵se dressait un grand arbre, ╵dont la hauteur était immense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’arbre grandit ╵et devint vigoureux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son sommet atteignait le ciel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on pouvait le voir ╵depuis les confins de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Son feuillage était magnifique
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses fruits abondants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il portait de la nourriture ╵pour tout être vivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les animaux sauvages ╵venaient s’abriter à son ombre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les oiseaux ╵se nichaient dans ses branches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les êtres vivants ╵se nourrissaient de ses produits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pendant que, sur mon lit, je contemplais les visions de mon esprit, je vis apparaître un de ceux qui veillent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans la Bible, le terme « veillants » pour désigner les anges se trouve seulement dans Daniel, mais il est fréquent dans les livres apocryphes.
    marker-yv: yv-n
  - type: text
    text: ', un saint qui descendait du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il cria d’une voix forte :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Abattez l’arbre ! ╵Coupez ses branches !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrachez son feuillage ╵et dispersez ses fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les animaux ╵s’enfuient de dessous lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les oiseaux ╵quittent ses branches !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Laissez cependant dans la terre ╵la souche et ses racines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: liées de chaînes de fer et de bronze
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de l’herbe des champs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il soit trempé ╵de la rosée du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il se nourrisse d’herbe ╵avec les animaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cet homme perdra la raison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se prendra pour une bête
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce qu’aient passé sept temps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce terme, qui peut avoir le sens de « temps » (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.8'
        metadata:
          usfm: DAN.2.8
      - type: text
        text: ), de « moment » (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.5'
        metadata:
          usfm: DAN.3.5
      - type: text
        text: ') ou de « saison », désigne ici très certainement une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.25'
        metadata:
          usfm: DAN.7.25
      - type: text
        text: ). De même dans les v. 20, 22, 29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cette sentence ╵est un décret de ceux qui veillent ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: cette résolution ╵est un ordre des saints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que tous les vivants sachent ╵que le Très-Haut domine ╵sur toute royauté humaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il accorde la royauté ╵à qui il veut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il établit roi ╵le plus insignifiant des hommes. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tel est le rêve que j’ai eu, moi le roi Nabuchodonosor. Quant à toi, Beltshatsar, donne-m’en l’interprétation puisque tous les sages de mon royaume s’en sont montrés incapables ; mais toi, tu le peux, car l’esprit des dieux saints réside en toi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Daniel interprète le rêve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Daniel, nommé aussi Beltshatsar, demeura un moment interloqué : ses pensées l’effrayaient. Le roi reprit et dit : Beltshatsar, que le songe et son explication ne t’effraient pas !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Mon Seigneur, répondit Beltshatsar, je souhaiterais que ce songe s’applique à tes ennemis, et sa signification à tes adversaires !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu as vu un arbre grandir et devenir vigoureux, sa cime touchait le ciel et on le voyait de toute la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cet arbre au feuillage magnifique et aux fruits abondants portait de la nourriture pour tous les êtres vivants. Les animaux sauvages venaient s’abriter sous lui et les oiseaux nichaient dans ses branches. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cet arbre, ô roi, c’est toi ! Car tu es devenu grand et puissant. Ta grandeur s’est accrue, elle atteint jusqu’au ciel et ta domination s’étend jusqu’aux confins de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le roi a vu ensuite l’un de ceux qui veillent, un saint, descendre du ciel et crier : « Abattez l’arbre et détruisez-le ! Laissez toutefois en terre la souche avec les racines, mais liées de chaînes de fer et de bronze au milieu de l’herbe des champs, qu’il soit trempé de la rosée du ciel, et qu’il se nourrisse d’herbe avec les animaux des champs jusqu’à ce que sept temps aient passé. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voici ce que cela signifie, ô roi ! Il s’agit là d’un décret du Très-Haut prononcé contre mon seigneur le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On te chassera du milieu des humains et tu vivras parmi les bêtes des champs. On te nourrira d’herbe comme les bœufs et tu seras trempé de la rosée du ciel. Tu seras dans cet état durant sept temps, jusqu’à ce que tu reconnaisses que le Très-Haut est le maître de toute royauté humaine et qu’il accorde la royauté à qui il lui plaît. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais si l’on a ordonné de préserver la souche avec les racines de l’arbre, c’est que la royauté te sera rendue dès que tu auras reconnu que le Dieu des cieux est souverain. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est pourquoi, ô roi, voici mon conseil : puisses-tu juger bon de le suivre ! Détourne-toi de tes péchés et fais ce qui est juste ! Mets un terme à tes injustices en ayant compassion des pauvres ! Peut-être ta tranquillité se prolongera-t-elle.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le rêve se réalise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tous ces événements s’accomplirent pour le roi Nabuchodonosor. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, douze mois plus tard, il se promenait sur la terrasse du palais royal de Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il prit la parole et dit : N’est-ce pas là Babylone la grande que moi j’ai bâtie pour en faire une résidence royale ? C’est par la grandeur de ma puissance et pour la gloire de ma majesté que j’ai fait cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ces paroles étaient encore sur ses lèvres, qu’une voix retentit du ciel : Roi Nabuchodonosor, écoute ce qu’on te dit : le pouvoir royal t’est retiré ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: On te chassera du milieu des humains et tu vivras avec les bêtes des champs, on te nourrira d’herbe comme les bœufs. Tu seras dans cet état durant sept temps, jusqu’à ce que tu reconnaisses que le Très-Haut est maître de toute royauté humaine et qu’il accorde la royauté à qui il lui plaît.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Au même instant, la sentence prononcée contre Nabuchodonosor fut exécutée : il fut chassé du milieu des hommes, il se mit à manger de l’herbe comme les bœufs et son corps fut trempé par la rosée du ciel, sa chevelure devint aussi longue que des plumes d’aigle et ses ongles ressemblaient aux griffes des oiseaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Au terme du temps annoncé, moi, Nabuchodonosor, je levai les yeux vers le ciel, et la raison me revint. Je remerciai le Très-Haut, je louai celui qui vit éternellement, et je proclamai sa gloire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa souveraineté ╵est éternelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: son règne dure d’âge en âge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tous les habitants de la terre ╵ne comptent pour rien devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il agit comme il l’entend
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers l’armée des êtres ╵qui vivent dans le ciel ╵et envers les habitants de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne peut s’opposer ╵à ses interventions
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou lui reprocher : « Que fais-tu ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A l’heure même, la raison me revint, la gloire de ma royauté, la majesté et la splendeur me furent rendues : mes conseillers et mes dignitaires me rappelèrent et je fus réinstallé sur mon trône avec un surcroît de grandeur. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Maintenant, moi, Nabuchodonosor, je loue, j’exalte et je glorifie le Roi des cieux, car il agit en accord avec ses paroles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il agit avec droiture.
    marker-yv: yv-n
  - type: text
    text: ' et tout ce qu’il fait est juste, il a le pouvoir d’abaisser ceux qui vivent dans l’orgueil.'
