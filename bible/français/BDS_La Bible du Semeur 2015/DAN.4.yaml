document_id: DAN.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Moi, Nabuchodonosor, je vivais tranquille dans ma maison et je jouissais de la prospérité dans mon palais. '
  '10':
  - type: text
    content: Pendant que, sur mon lit, je contemplais les visions de mon esprit, je vis apparaître un de ceux qui veillent
  - type: note
    content: Dans la Bible, le terme « veillants » pour désigner les anges se trouve seulement dans Daniel, mais il est fréquent dans les livres apocryphes.
  - type: text
    content: ', un saint qui descendait du ciel. '
  '11':
  - type: text
    content: 'Il cria d’une voix forte :'
  - type: text
    content: « Abattez l’arbre ! ╵Coupez ses branches !
  - type: text
    content: Arrachez son feuillage ╵et dispersez ses fruits,
  - type: text
    content: et que les animaux ╵s’enfuient de dessous lui,
  - type: text
    content: que les oiseaux ╵quittent ses branches !
  '12':
  - type: text
    content: Laissez cependant dans la terre ╵la souche et ses racines,
  - type: text
    content: liées de chaînes de fer et de bronze
  - type: text
    content: au milieu de l’herbe des champs.
  - type: text
    content: Qu’il soit trempé ╵de la rosée du ciel,
  - type: text
    content: qu’il se nourrisse d’herbe ╵avec les animaux.
  '13':
  - type: text
    content: Cet homme perdra la raison
  - type: text
    content: et se prendra pour une bête
  - type: text
    content: jusqu’à ce qu’aient passé sept temps
  - type: note
    content: Ce terme, qui peut avoir le sens de « temps » (2.8), de « moment » (3.5) ou de « saison », désigne ici très certainement une année (voir 7.25). De même dans les v. 20, 22, 29.
  - type: text
    content: .
  '14':
  - type: text
    content: Cette sentence ╵est un décret de ceux qui veillent ;
  - type: text
    content: cette résolution ╵est un ordre des saints,
  - type: text
    content: afin que tous les vivants sachent ╵que le Très-Haut domine ╵sur toute royauté humaine,
  - type: text
    content: qu’il accorde la royauté ╵à qui il veut,
  - type: text
    content: et qu’il établit roi ╵le plus insignifiant des hommes. »
  '15':
  - type: text
    content: Tel est le rêve que j’ai eu, moi le roi Nabuchodonosor. Quant à toi, Beltshatsar, donne-m’en l’interprétation puisque tous les sages de mon royaume s’en sont montrés incapables ; mais toi, tu le peux, car l’esprit des dieux saints réside en toi.
  - type: heading
    content: Daniel interprète le rêve
  '16':
  - type: text
    content: 'Alors Daniel, nommé aussi Beltshatsar, demeura un moment interloqué : ses pensées l’effrayaient. Le roi reprit et dit : Beltshatsar, que le songe et son explication ne t’effraient pas !'
  - type: text
    content: – Mon Seigneur, répondit Beltshatsar, je souhaiterais que ce songe s’applique à tes ennemis, et sa signification à tes adversaires !
  '17':
  - type: text
    content: 'Tu as vu un arbre grandir et devenir vigoureux, sa cime touchait le ciel et on le voyait de toute la terre. '
  '18':
  - type: text
    content: 'Cet arbre au feuillage magnifique et aux fruits abondants portait de la nourriture pour tous les êtres vivants. Les animaux sauvages venaient s’abriter sous lui et les oiseaux nichaient dans ses branches. '
  '19':
  - type: text
    content: 'Cet arbre, ô roi, c’est toi ! Car tu es devenu grand et puissant. Ta grandeur s’est accrue, elle atteint jusqu’au ciel et ta domination s’étend jusqu’aux confins de la terre. '
  '2':
  - type: text
    content: 'J’ai alors fait un rêve qui m’a rempli d’effroi ; les pensées qui m’ont hanté sur mon lit et les visions de mon esprit m’ont épouvanté. '
  '20':
  - type: text
    content: 'Le roi a vu ensuite l’un de ceux qui veillent, un saint, descendre du ciel et crier : « Abattez l’arbre et détruisez-le ! Laissez toutefois en terre la souche avec les racines, mais liées de chaînes de fer et de bronze au milieu de l’herbe des champs, qu’il soit trempé de la rosée du ciel, et qu’il se nourrisse d’herbe avec les animaux des champs jusqu’à ce que sept temps aient passé. »'
  '21':
  - type: text
    content: Voici ce que cela signifie, ô roi ! Il s’agit là d’un décret du Très-Haut prononcé contre mon seigneur le roi.
  '22':
  - type: text
    content: 'On te chassera du milieu des humains et tu vivras parmi les bêtes des champs. On te nourrira d’herbe comme les bœufs et tu seras trempé de la rosée du ciel. Tu seras dans cet état durant sept temps, jusqu’à ce que tu reconnaisses que le Très-Haut est le maître de toute royauté humaine et qu’il accorde la royauté à qui il lui plaît. '
  '23':
  - type: text
    content: 'Mais si l’on a ordonné de préserver la souche avec les racines de l’arbre, c’est que la royauté te sera rendue dès que tu auras reconnu que le Dieu des cieux est souverain. '
  '24':
  - type: text
    content: 'C’est pourquoi, ô roi, voici mon conseil : puisses-tu juger bon de le suivre ! Détourne-toi de tes péchés et fais ce qui est juste ! Mets un terme à tes injustices en ayant compassion des pauvres ! Peut-être ta tranquillité se prolongera-t-elle.'
  - type: heading
    content: Le rêve se réalise
  '25':
  - type: text
    content: 'Tous ces événements s’accomplirent pour le roi Nabuchodonosor. '
  '26':
  - type: text
    content: En effet, douze mois plus tard, il se promenait sur la terrasse du palais royal de Babylone.
  '27':
  - type: text
    content: 'Il prit la parole et dit : N’est-ce pas là Babylone la grande que moi j’ai bâtie pour en faire une résidence royale ? C’est par la grandeur de ma puissance et pour la gloire de ma majesté que j’ai fait cela.'
  '28':
  - type: text
    content: 'Ces paroles étaient encore sur ses lèvres, qu’une voix retentit du ciel : Roi Nabuchodonosor, écoute ce qu’on te dit : le pouvoir royal t’est retiré ! '
  '29':
  - type: text
    content: On te chassera du milieu des humains et tu vivras avec les bêtes des champs, on te nourrira d’herbe comme les bœufs. Tu seras dans cet état durant sept temps, jusqu’à ce que tu reconnaisses que le Très-Haut est maître de toute royauté humaine et qu’il accorde la royauté à qui il lui plaît.
  '3':
  - type: text
    content: 'J’ai donc ordonné de convoquer auprès de moi tous les sages de Babylone, pour qu’ils me fassent connaître l’interprétation de mon rêve. '
  '30':
  - type: text
    content: 'Au même instant, la sentence prononcée contre Nabuchodonosor fut exécutée : il fut chassé du milieu des hommes, il se mit à manger de l’herbe comme les bœufs et son corps fut trempé par la rosée du ciel, sa chevelure devint aussi longue que des plumes d’aigle et ses ongles ressemblaient aux griffes des oiseaux.'
  '31':
  - type: text
    content: 'Au terme du temps annoncé, moi, Nabuchodonosor, je levai les yeux vers le ciel, et la raison me revint. Je remerciai le Très-Haut, je louai celui qui vit éternellement, et je proclamai sa gloire :'
  - type: text
    content: sa souveraineté ╵est éternelle
  - type: text
    content: son règne dure d’âge en âge.
  '32':
  - type: text
    content: Tous les habitants de la terre ╵ne comptent pour rien devant lui,
  - type: text
    content: et il agit comme il l’entend
  - type: text
    content: envers l’armée des êtres ╵qui vivent dans le ciel ╵et envers les habitants de la terre.
  - type: text
    content: Personne ne peut s’opposer ╵à ses interventions
  - type: text
    content: 'ou lui reprocher : « Que fais-tu ? »'
  '33':
  - type: text
    content: 'A l’heure même, la raison me revint, la gloire de ma royauté, la majesté et la splendeur me furent rendues : mes conseillers et mes dignitaires me rappelèrent et je fus réinstallé sur mon trône avec un surcroît de grandeur. '
  '34':
  - type: text
    content: Maintenant, moi, Nabuchodonosor, je loue, j’exalte et je glorifie le Roi des cieux, car il agit en accord avec ses paroles
  - type: note
    content: 'D’autres comprennent : il agit avec droiture.'
  - type: text
    content: ' et tout ce qu’il fait est juste, il a le pouvoir d’abaisser ceux qui vivent dans l’orgueil.'
  '4':
  - type: text
    content: Les mages, les magiciens, les astrologues et les devins se sont présentés. Je leur ai exposé le rêve, mais ils n’ont pas pu m’en faire connaître l’interprétation.
  '5':
  - type: text
    content: A la fin, s’est présenté devant moi Daniel, nommé aussi Beltshatsar, d’après le nom de mon dieu
  - type: note
    content: Voir 1.7 et note.
  - type: text
    content: '. L’esprit des dieux saints réside en lui. Je lui ai raconté mon rêve et je lui ai dit : '
  '6':
  - type: text
    content: 'Beltshatsar, chef des mages, je sais que l’esprit des dieux saints réside en toi, et qu’aucun mystère n’est trop difficile pour toi, écoute donc les visions que j’ai eues dans mon rêve et donne-m’en l’interprétation. '
  '7':
  - type: text
    content: 'Voici quelles étaient les visions de mon esprit pendant que j’étais couché sur mon lit : je regardais et voici ce que j’ai vu :'
  - type: text
    content: Au milieu de la terre ╵se dressait un grand arbre, ╵dont la hauteur était immense.
  '8':
  - type: text
    content: L’arbre grandit ╵et devint vigoureux.
  - type: text
    content: Son sommet atteignait le ciel ;
  - type: text
    content: et l’on pouvait le voir ╵depuis les confins de la terre.
  '9':
  - type: text
    content: Son feuillage était magnifique
  - type: text
    content: et ses fruits abondants.
  - type: text
    content: Il portait de la nourriture ╵pour tout être vivant.
  - type: text
    content: Les animaux sauvages ╵venaient s’abriter à son ombre
  - type: text
    content: et les oiseaux ╵se nichaient dans ses branches.
  - type: text
    content: Tous les êtres vivants ╵se nourrissaient de ses produits.
