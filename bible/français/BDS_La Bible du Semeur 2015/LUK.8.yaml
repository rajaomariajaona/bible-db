document_id: LUK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ceux qui accompagnaient Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelque temps après, Jésus se rendit dans les villes et les villages pour y proclamer et annoncer la Bonne Nouvelle du royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il était accompagné des Douze et de quelques femmes qu’il avait délivrées d’esprits mauvais et guéries de diverses maladies : Marie, appelée Marie de Magdala'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Magdala
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: village de la rive ouest du lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: ', dont il avait chassé sept démons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jeanne, la femme de Chuza, administrateur d’Hérode, Suzanne et plusieurs autres. Elles assistaient Jésus et ses disciples de leurs biens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole du semeur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 13.1-9 ; Mc 4.1-9)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Une grande foule, ayant afflué de chaque ville, s’était rassemblée autour de lui. Alors Jésus leur raconta cette parabole : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un semeur sortit pour faire ses semailles. Pendant qu’il répandait sa semence, des grains tombèrent au bord du chemin, furent piétinés par les passants, et les oiseaux du ciel les mangèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres tombèrent sur de la pierre. A peine eurent-ils germé que les petits plants séchèrent parce que le sol n’était pas assez humide.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’autres grains tombèrent au milieu des ronces ; celles-ci poussèrent en même temps que les bons plants et les étouffèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais d’autres tombèrent dans la bonne terre ; ils germèrent et donnèrent du fruit : chaque grain en produisit cent autres.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et Jésus ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a des oreilles pour entendre, qu’il entende !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 13.10-13 ; Mc 4.10-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les disciples lui demandèrent ce que signifiait cette parabole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous avez reçu le privilège de connaître les secrets du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ', mais pour les autres, ces choses sont dites en paraboles. Ainsi, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: bien qu’ils regardent, ils ne voient pas ; bien qu’ils entendent, ils ne comprennent pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 6.9
        metadata:
          usfm: ISA.6.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 13.18-23 ; Mc 4.13-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici donc le sens de cette parabole : La semence, c’est la Parole de Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '« Au bord du chemin » : ce sont les personnes qui écoutent la Parole, mais le diable vient l’arracher de leur cœur pour les empêcher de croire et d’être '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauvées
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '« Sur de la pierre » : ce sont ceux qui entendent la Parole et l’acceptent avec joie ; mais, comme ils ne la laissent pas prendre racine en eux, leur foi est passagère. Lorsque survient l’épreuve, ils abandonnent tout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « La semence tombée au milieu des ronces » représente ceux qui ont écouté la Parole, mais en qui elle est étouffée par les soucis, les richesses et les plaisirs de la vie, de sorte qu’elle ne donne pas de fruit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Enfin, « la semence tombée dans la bonne terre », ce sont ceux qui, ayant écouté la Parole, la retiennent dans un cœur honnête et bien disposé. Ils persévèrent et ainsi portent du fruit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole de la lampe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 4.21-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne n’allume une lampe pour la cacher sous un récipient, ou la mettre sous un lit ; on la place, au contraire, sur un pied de lampe pour que ceux qui entrent dans la pièce voient la lumière.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout ce qui est caché maintenant finira par être mis en lumière, et tout ce qui demeure secret sera finalement connu et paraîtra au grand jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites donc attention à la manière dont vous écoutez, car à celui qui a, on donnera encore davantage ; mais à celui qui n’a pas, on ôtera même ce qu’il croit avoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vraie famille de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.46-50 ; Mc 3.31-35)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La mère et les frères de Jésus vinrent le trouver ; mais ils ne purent pas l’approcher à cause de la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On lui fit dire : Ta mère et tes frères sont là-dehors et ils voudraient te voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma mère et mes frères, ce sont ceux qui écoutent la Parole de Dieu et qui font ce qu’elle demande.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plus fort que la tempête
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 8.23-27 ; Mc 4.35-41)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Un jour, Jésus monta dans un bateau avec ses disciples et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Passons de l’autre côté du lac !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils gagnèrent le large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant la traversée, Jésus s’assoupit. Soudain, un vent violent se leva sur le lac. L’eau envahit le bateau. La situation devenait périlleuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les disciples s’approchèrent de Jésus et le réveillèrent en criant : Maître, Maître, nous sommes perdus !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il se réveilla et parla sévèrement au vent et aux flots tumultueux : ils s’apaisèrent, et le calme se fit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors il dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Où est donc votre foi ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quant à eux, ils étaient saisis de crainte et d’étonnement, et ils se disaient les uns aux autres : Qui est donc cet homme ? Voyez : il commande même aux vents et aux vagues, et il s’en fait obéir !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plus fort que les démons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 8.28-34 ; Mc 5.1-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils abordèrent dans la région de Gérasa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des Gadaréniens, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et d’autres ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Gergéséniens.
    marker-yv: yv-n
  - type: text
    text: ', située en face de la Galilée'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pays situé sur la rive est du lac de Galilée et habité par des non-Juifs.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Au moment où Jésus mettait pied à terre, un homme de la ville, qui avait plusieurs démons en lui, vint à sa rencontre. Depuis longtemps déjà, il ne portait plus de vêtements et demeurait, non dans une maison, mais au milieu des tombeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand il vit Jésus, il se jeta à ses pieds en criant de toutes ses forces : Que me veux-tu, Jésus, Fils du Dieu très-haut ? Je t’en supplie : ne me tourmente pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il parlait ainsi parce que Jésus commandait à l’esprit mauvais de sortir de cet homme. En effet, bien des fois, l’esprit s’était emparé de lui ; on l’avait alors lié avec des chaînes et on lui avait mis les fers aux pieds pour le contenir ; mais il cassait tous ses liens, et le démon l’entraînait dans des lieux déserts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus lui demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est ton nom ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Légion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'légion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un corps d’armée romain comptant 8 500 hommes.
    marker-yv: yv-n
  - type: text
    text: ', répondit-il.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Car une multitude de démons étaient entrés en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ces démons supplièrent Jésus de ne pas leur ordonner d’aller dans l’abîme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Or, près de là, un important troupeau de porcs était en train de paître sur la montagne. Les démons supplièrent Jésus de leur permettre d’entrer dans ces porcs. Il le leur permit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les démons sortirent donc de l’homme et entrèrent dans les porcs. Aussitôt, le troupeau s’élança du haut de la pente et se précipita dans le lac, où il se noya.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand les gardiens du troupeau virent ce qui était arrivé, ils s’enfuirent et allèrent raconter la chose dans la ville et dans les fermes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens vinrent se rendre compte de ce qui s’était passé. Ils arrivèrent auprès de Jésus et trouvèrent, assis à ses pieds, l’homme dont les démons étaient sortis. Il était habillé et tout à fait sain d’esprit. Alors la crainte s’empara d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ceux qui avaient assisté à la scène leur rapportèrent comment cet homme, qui était sous l’emprise des démons, avait été délivré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Là-dessus, toute la population du territoire des Géraséniens, saisie d’une grande crainte, demanda à Jésus de partir de chez eux. Il remonta donc dans le bateau et repartit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'L’homme qui avait été libéré des esprits mauvais lui demanda s’il pouvait l’accompagner, mais Jésus le renvoya en lui disant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rentre chez toi, et raconte tout ce que Dieu a fait pour toi !
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors cet homme partit proclamer dans la ville entière tout ce que Jésus avait fait pour lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plus fort que la maladie et la mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.18-26 ; Mc 5.21-43)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'A son retour en Galilée, Jésus fut accueilli par la foule, car tous l’attendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'A ce moment survint un homme appelé Jaïrus. C’était le responsable de la synagogue. Il se jeta aux pieds de Jésus et le supplia de venir chez lui : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: sa fille unique, âgée d’environ douze ans, était en train de mourir. Jésus partit donc pour se rendre chez lui. Cependant, la foule se pressait autour de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il y avait là une femme atteinte d’hémorragies depuis douze ans et qui avait dépensé tout son bien chez les médecins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui avait dépensé tout son bien chez les médecins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont absents de certains manuscrits.
    marker-yv: yv-n
  - type: text
    text: ' sans que personne ait pu la guérir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Elle s’approcha de Jésus par-derrière et toucha la frange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les Juifs portaient des franges à leur vêtement. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 22.12
        metadata:
          usfm: DEU.22.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de son vêtement. Aussitôt, son hémorragie cessa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Qui m’a touché ?
  - type: text
    text: ' demanda Jésus.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Comme tous s’en défendaient, Pierre lui dit : Voyons, Maître, la foule t’entoure et te presse de tous côtés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais il répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quelqu’un m’a touché ; j’ai senti qu’une force sortait de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'En voyant que son geste n’était pas passé inaperçu, la femme s’avança toute tremblante, se jeta aux pieds de Jésus et expliqua devant tout le monde pour quelle raison elle l’avait touché, et comment elle avait été instantanément guérie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma fille, parce que tu as eu foi en moi, tu es guérie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu es sauvée.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', va en paix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Il parlait encore quand quelqu’un arriva de chez le responsable de la synagogue et lui dit : Ta fille vient de mourir, n’importune plus le Maître !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'En entendant cela, Jésus dit à Jaïrus : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ne crains pas, crois seulement : ta fille guérira'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sera sauvée.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Une fois arrivé à la maison, il ne permit à personne d’entrer avec lui, sauf à Pierre, Jean et Jacques, ainsi qu’au père et à la mère de l’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ce n’était partout que pleurs et lamentations. Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne pleurez pas ; elle n’est pas morte, elle est seulement endormie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les gens se moquaient de lui, car ils savaient qu’elle était morte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Alors Jésus prit la main de la fillette et dit d’une voix forte : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon enfant, lève-toi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Elle revint à la vie et se mit aussitôt debout ; alors Jésus ordonna de lui donner à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Les parents de la jeune fille étaient stupéfaits. Mais Jésus leur recommanda de ne dire à personne ce qui s’était passé.
