document_id: LUK.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ceux qui accompagnaient Jésus
  - type: text
    content: 'Quelque temps après, Jésus se rendit dans les villes et les villages pour y proclamer et annoncer la Bonne Nouvelle du royaume de Dieu. '
  '10':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: 'Vous avez reçu le privilège de connaître les secrets du '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ', mais pour les autres, ces choses sont dites en paraboles. Ainsi, '
  - type: text
    content: bien qu’ils regardent, ils ne voient pas ; bien qu’ils entendent, ils ne comprennent pas
  - type: note
    content: Es 6.9.
  - type: text
    content: .
  - type: heading
    content: (Mt 13.18-23 ; Mc 4.13-20)
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Voici donc le sens de cette parabole : La semence, c’est la Parole de Dieu.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: '« Au bord du chemin » : ce sont les personnes qui écoutent la Parole, mais le diable vient l’arracher de leur cœur pour les empêcher de croire et d’être '
  - type: text
    content: sauvées
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: text
    content: '« Sur de la pierre » : ce sont ceux qui entendent la Parole et l’acceptent avec joie ; mais, comme ils ne la laissent pas prendre racine en eux, leur foi est passagère. Lorsque survient l’épreuve, ils abandonnent tout.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: « La semence tombée au milieu des ronces » représente ceux qui ont écouté la Parole, mais en qui elle est étouffée par les soucis, les richesses et les plaisirs de la vie, de sorte qu’elle ne donne pas de fruit.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Enfin, « la semence tombée dans la bonne terre », ce sont ceux qui, ayant écouté la Parole, la retiennent dans un cœur honnête et bien disposé. Ils persévèrent et ainsi portent du fruit.
  - type: heading
    content: La parabole de la lampe
  - type: heading
    content: (Mc 4.21-25)
  '16':
  - type: text
    content: ' '
  - type: text
    content: Personne n’allume une lampe pour la cacher sous un récipient, ou la mettre sous un lit ; on la place, au contraire, sur un pied de lampe pour que ceux qui entrent dans la pièce voient la lumière.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Tout ce qui est caché maintenant finira par être mis en lumière, et tout ce qui demeure secret sera finalement connu et paraîtra au grand jour.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Faites donc attention à la manière dont vous écoutez, car à celui qui a, on donnera encore davantage ; mais à celui qui n’a pas, on ôtera même ce qu’il croit avoir.
  - type: heading
    content: La vraie famille de Jésus
  - type: heading
    content: (Mt 12.46-50 ; Mc 3.31-35)
  '19':
  - type: text
    content: 'La mère et les frères de Jésus vinrent le trouver ; mais ils ne purent pas l’approcher à cause de la foule. '
  '2':
  - type: text
    content: 'Il était accompagné des Douze et de quelques femmes qu’il avait délivrées d’esprits mauvais et guéries de diverses maladies : Marie, appelée Marie de Magdala'
  - type: note
    content: 'Magdala: village de la rive ouest du lac de Galilée.'
  - type: text
    content: ', dont il avait chassé sept démons, '
  '20':
  - type: text
    content: 'On lui fit dire : Ta mère et tes frères sont là-dehors et ils voudraient te voir.'
  '21':
  - type: text
    content: 'Mais Jésus leur répondit : '
  - type: text
    content: Ma mère et mes frères, ce sont ceux qui écoutent la Parole de Dieu et qui font ce qu’elle demande.
  - type: heading
    content: Plus fort que la tempête
  - type: heading
    content: (Mt 8.23-27 ; Mc 4.35-41)
  '22':
  - type: text
    content: 'Un jour, Jésus monta dans un bateau avec ses disciples et leur dit : '
  - type: text
    content: Passons de l’autre côté du lac !
  - type: text
    content: 'Ils gagnèrent le large. '
  '23':
  - type: text
    content: 'Pendant la traversée, Jésus s’assoupit. Soudain, un vent violent se leva sur le lac. L’eau envahit le bateau. La situation devenait périlleuse. '
  '24':
  - type: text
    content: 'Les disciples s’approchèrent de Jésus et le réveillèrent en criant : Maître, Maître, nous sommes perdus !'
  - type: text
    content: 'Il se réveilla et parla sévèrement au vent et aux flots tumultueux : ils s’apaisèrent, et le calme se fit. '
  '25':
  - type: text
    content: 'Alors il dit à ses disciples : '
  - type: text
    content: Où est donc votre foi ?
  - type: text
    content: 'Quant à eux, ils étaient saisis de crainte et d’étonnement, et ils se disaient les uns aux autres : Qui est donc cet homme ? Voyez : il commande même aux vents et aux vagues, et il s’en fait obéir !'
  - type: heading
    content: Plus fort que les démons
  - type: heading
    content: (Mt 8.28-34 ; Mc 5.1-20)
  '26':
  - type: text
    content: Ils abordèrent dans la région de Gérasa
  - type: note
    content: 'Certains manuscrits ont : des Gadaréniens, et d’autres ont : des Gergéséniens.'
  - type: text
    content: ', située en face de la Galilée'
  - type: note
    content: Pays situé sur la rive est du lac de Galilée et habité par des non-Juifs.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Au moment où Jésus mettait pied à terre, un homme de la ville, qui avait plusieurs démons en lui, vint à sa rencontre. Depuis longtemps déjà, il ne portait plus de vêtements et demeurait, non dans une maison, mais au milieu des tombeaux. '
  '28':
  - type: text
    content: 'Quand il vit Jésus, il se jeta à ses pieds en criant de toutes ses forces : Que me veux-tu, Jésus, Fils du Dieu très-haut ? Je t’en supplie : ne me tourmente pas !'
  '29':
  - type: text
    content: 'Il parlait ainsi parce que Jésus commandait à l’esprit mauvais de sortir de cet homme. En effet, bien des fois, l’esprit s’était emparé de lui ; on l’avait alors lié avec des chaînes et on lui avait mis les fers aux pieds pour le contenir ; mais il cassait tous ses liens, et le démon l’entraînait dans des lieux déserts. '
  '3':
  - type: text
    content: Jeanne, la femme de Chuza, administrateur d’Hérode, Suzanne et plusieurs autres. Elles assistaient Jésus et ses disciples de leurs biens.
  - type: heading
    content: La parabole du semeur
  - type: heading
    content: (Mt 13.1-9 ; Mc 4.1-9)
  '30':
  - type: text
    content: 'Jésus lui demanda : '
  - type: text
    content: Quel est ton nom ?
  - type: text
    content: – Légion
  - type: note
    content: La légion était un corps d’armée romain comptant 8 500 hommes.
  - type: text
    content: ', répondit-il.'
  - type: text
    content: 'Car une multitude de démons étaient entrés en lui. '
  '31':
  - type: text
    content: 'Ces démons supplièrent Jésus de ne pas leur ordonner d’aller dans l’abîme. '
  '32':
  - type: text
    content: 'Or, près de là, un important troupeau de porcs était en train de paître sur la montagne. Les démons supplièrent Jésus de leur permettre d’entrer dans ces porcs. Il le leur permit. '
  '33':
  - type: text
    content: Les démons sortirent donc de l’homme et entrèrent dans les porcs. Aussitôt, le troupeau s’élança du haut de la pente et se précipita dans le lac, où il se noya.
  '34':
  - type: text
    content: 'Quand les gardiens du troupeau virent ce qui était arrivé, ils s’enfuirent et allèrent raconter la chose dans la ville et dans les fermes. '
  '35':
  - type: text
    content: 'Les gens vinrent se rendre compte de ce qui s’était passé. Ils arrivèrent auprès de Jésus et trouvèrent, assis à ses pieds, l’homme dont les démons étaient sortis. Il était habillé et tout à fait sain d’esprit. Alors la crainte s’empara d’eux. '
  '36':
  - type: text
    content: Ceux qui avaient assisté à la scène leur rapportèrent comment cet homme, qui était sous l’emprise des démons, avait été délivré.
  '37':
  - type: text
    content: 'Là-dessus, toute la population du territoire des Géraséniens, saisie d’une grande crainte, demanda à Jésus de partir de chez eux. Il remonta donc dans le bateau et repartit. '
  '38':
  - type: text
    content: 'L’homme qui avait été libéré des esprits mauvais lui demanda s’il pouvait l’accompagner, mais Jésus le renvoya en lui disant :'
  '39':
  - type: text
    content: ' '
  - type: text
    content: Rentre chez toi, et raconte tout ce que Dieu a fait pour toi !
  - type: text
    content: Alors cet homme partit proclamer dans la ville entière tout ce que Jésus avait fait pour lui.
  - type: heading
    content: Plus fort que la maladie et la mort
  - type: heading
    content: (Mt 9.18-26 ; Mc 5.21-43)
  '4':
  - type: text
    content: 'Une grande foule, ayant afflué de chaque ville, s’était rassemblée autour de lui. Alors Jésus leur raconta cette parabole : '
  '40':
  - type: text
    content: 'A son retour en Galilée, Jésus fut accueilli par la foule, car tous l’attendaient. '
  '41':
  - type: text
    content: 'A ce moment survint un homme appelé Jaïrus. C’était le responsable de la synagogue. Il se jeta aux pieds de Jésus et le supplia de venir chez lui : '
  '42':
  - type: text
    content: sa fille unique, âgée d’environ douze ans, était en train de mourir. Jésus partit donc pour se rendre chez lui. Cependant, la foule se pressait autour de lui.
  '43':
  - type: text
    content: Il y avait là une femme atteinte d’hémorragies depuis douze ans et qui avait dépensé tout son bien chez les médecins
  - type: note
    content: 'Les mots : qui avait dépensé tout son bien chez les médecins sont absents de certains manuscrits.'
  - type: text
    content: ' sans que personne ait pu la guérir. '
  '44':
  - type: text
    content: Elle s’approcha de Jésus par-derrière et toucha la frange
  - type: note
    content: Les Juifs portaient des franges à leur vêtement. Voir Dt 22.12.
  - type: text
    content: ' de son vêtement. Aussitôt, son hémorragie cessa.'
  '45':
  - type: text
    content: ' '
  - type: text
    content: – Qui m’a touché ?
  - type: text
    content: ' demanda Jésus.'
  - type: text
    content: 'Comme tous s’en défendaient, Pierre lui dit : Voyons, Maître, la foule t’entoure et te presse de tous côtés.'
  '46':
  - type: text
    content: 'Mais il répondit : '
  - type: text
    content: Quelqu’un m’a touché ; j’ai senti qu’une force sortait de moi.
  '47':
  - type: text
    content: 'En voyant que son geste n’était pas passé inaperçu, la femme s’avança toute tremblante, se jeta aux pieds de Jésus et expliqua devant tout le monde pour quelle raison elle l’avait touché, et comment elle avait été instantanément guérie. '
  '48':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Ma fille, parce que tu as eu foi en moi, tu es guérie
  - type: note
    content: 'Autre traduction : tu es sauvée.'
  - type: text
    content: ', va en paix.'
  '49':
  - type: text
    content: 'Il parlait encore quand quelqu’un arriva de chez le responsable de la synagogue et lui dit : Ta fille vient de mourir, n’importune plus le Maître !'
  '5':
  - type: text
    content: Un semeur sortit pour faire ses semailles. Pendant qu’il répandait sa semence, des grains tombèrent au bord du chemin, furent piétinés par les passants, et les oiseaux du ciel les mangèrent.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'En entendant cela, Jésus dit à Jaïrus : '
  - type: text
    content: 'Ne crains pas, crois seulement : ta fille guérira'
  - type: note
    content: 'Autre traduction : sera sauvée.'
  - type: text
    content: .
  '51':
  - type: text
    content: 'Une fois arrivé à la maison, il ne permit à personne d’entrer avec lui, sauf à Pierre, Jean et Jacques, ainsi qu’au père et à la mère de l’enfant. '
  '52':
  - type: text
    content: 'Ce n’était partout que pleurs et lamentations. Jésus dit : '
  - type: text
    content: Ne pleurez pas ; elle n’est pas morte, elle est seulement endormie.
  '53':
  - type: text
    content: 'Les gens se moquaient de lui, car ils savaient qu’elle était morte. '
  '54':
  - type: text
    content: 'Alors Jésus prit la main de la fillette et dit d’une voix forte : '
  - type: text
    content: Mon enfant, lève-toi !
  '55':
  - type: text
    content: 'Elle revint à la vie et se mit aussitôt debout ; alors Jésus ordonna de lui donner à manger. '
  '56':
  - type: text
    content: Les parents de la jeune fille étaient stupéfaits. Mais Jésus leur recommanda de ne dire à personne ce qui s’était passé.
  '6':
  - type: text
    content: D’autres tombèrent sur de la pierre. A peine eurent-ils germé que les petits plants séchèrent parce que le sol n’était pas assez humide.
  - type: text
    content: ' '
  '7':
  - type: text
    content: D’autres grains tombèrent au milieu des ronces ; celles-ci poussèrent en même temps que les bons plants et les étouffèrent.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Mais d’autres tombèrent dans la bonne terre ; ils germèrent et donnèrent du fruit : chaque grain en produisit cent autres.'
  - type: text
    content: 'Et Jésus ajouta : '
  - type: text
    content: Celui qui a des oreilles pour entendre, qu’il entende !
  - type: heading
    content: (Mt 13.10-13 ; Mc 4.10-12)
  '9':
  - type: text
    content: Les disciples lui demandèrent ce que signifiait cette parabole.
