document_id: JOB.37,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La grandeur de l’œuvre de Dieu
  - type: text
    content: A ce spectacle mon cœur tremble
  - type: text
    content: et il bat à tout rompre.
  '10':
  - type: text
    content: Sous le souffle de Dieu, ╵l’eau se transforme en glace,
  - type: text
    content: les étendues liquides ╵se figent en un bloc.
  '11':
  - type: text
    content: Il charge les nuages ╵d’humidité,
  - type: text
    content: et répand ses éclairs ╵à travers les nuées.
  '12':
  - type: text
    content: Sa main les fait tourbillonner, ╵tournoyer selon ses desseins,
  - type: text
    content: afin qu’ils exécutent ╵tout ce qu’il leur commande
  - type: text
    content: sur la face du monde.
  '13':
  - type: text
    content: S’agit-il de frapper ╵la terre du bâton
  - type: text
    content: ou de lui témoigner ╵de la bonté ? ╵Ce sont eux qu’il délègue.
  '14':
  - type: text
    content: Ecoute cela, Job,
  - type: text
    content: arrête-toi, et réfléchis ╵aux merveilles de Dieu.
  '15':
  - type: text
    content: Sais-tu comment ╵Dieu contrôle ces choses,
  - type: text
    content: comment il fait jaillir ╵l’éclair de ses nuages ?
  '16':
  - type: text
    content: Sais-tu comment les nues ╵conservent l’équilibre ?
  - type: text
    content: Ce sont là les merveilles ╵de celui dont la science ╵atteint la perfection.
  '17':
  - type: text
    content: Toi dont les habits sont trop chauds,
  - type: text
    content: lorsque languit la terre ╵sous le vent du midi,
  '18':
  - type: text
    content: peux-tu aider Dieu à étendre ╵la voûte des nuées
  - type: text
    content: et la rendre solide ╵pareille à un miroir ╵coulé dans le métal
  - type: note
    content: 'Dans Dt 28.23, le ciel de bronze (nous dirions : de plomb) représente une canicule très forte.'
  - type: text
    content: '  ?'
  '19':
  - type: text
    content: Pourrais-tu nous faire savoir ╵ce que nous lui dirons ?
  - type: text
    content: 'Nous ne pourrons argumenter : ╵tout est obscur pour nous.'
  '2':
  - type: text
    content: Ecoutez, écoutez ╵le fracas de sa voix,
  - type: text
    content: et tous ces grondements ╵qui sortent de sa bouche
  '20':
  - type: text
    content: Quand je prends la parole, ╵doit-on l’en avertir ?
  - type: text
    content: Faut-il qu’on le mette au courant ╵pour qu’il soit informé ?
  '21':
  - type: text
    content: Soudain disparaît la lumière, ╵cachée par les nuages,
  - type: text
    content: mais, dès qu’un vent se lève, ╵ceux-ci sont balayés.
  '22':
  - type: text
    content: Du septentrion vient ╵une lueur dorée,
  - type: text
    content: autour de Dieu rayonne ╵un éclat redoutable.
  '23':
  - type: text
    content: Il est le Tout-Puissant, ╵nous ne pouvons l’atteindre.
  - type: text
    content: Il est grand en puissance
  - type: text
    content: ainsi qu’en équité ;
  - type: text
    content: pleinement juste, ╵il n’opprime personne
  - type: note
    content: 'Autre traduction : il n’opprime pas celui qui est pleinement juste.'
  - type: text
    content: .
  '24':
  - type: text
    content: Voilà pourquoi les hommes ╵doivent le craindre,
  - type: text
    content: mais lui ne tient pas compte ╵de ceux qui se croient sages.
  '3':
  - type: text
    content: et vont rouler ╵dans toute l’étendue du ciel.
  - type: text
    content: Et ses éclairs atteignent ╵les confins de la terre.
  '4':
  - type: text
    content: 'Puis une voix rugit : ╵il fait tonner ╵sa voix majestueuse,'
  - type: text
    content: il ne retient plus ses éclairs ╵lorsqu’on entend sa voix.
  '5':
  - type: text
    content: Oui, sa voix tonne ╵de façon extraordinaire,
  - type: text
    content: il fait de grandes choses ╵dépassant notre entendement.
  '6':
  - type: text
    content: Car il dit à la neige ╵de tomber sur la terre,
  - type: text
    content: et il commande aux pluies, ╵même aux pluies torrentielles.
  '7':
  - type: text
    content: Il paralyse ainsi ╵l’activité humaine,
  - type: text
    content: afin que tous les hommes sachent ╵que c’est bien là son œuvre.
  '8':
  - type: text
    content: Les animaux eux-mêmes ╵se terrent dans leurs gîtes
  - type: text
    content: et ils s’abritent ╵au fond de leurs tanières.
  '9':
  - type: text
    content: Des profondeurs australes ╵surgit un ouragan,
  - type: text
    content: et des vents d’aquilon ╵amènent la froidure.
