document_id: JOB.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La grandeur de l’œuvre de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A ce spectacle mon cœur tremble
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il bat à tout rompre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez, écoutez ╵le fracas de sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ces grondements ╵qui sortent de sa bouche
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et vont rouler ╵dans toute l’étendue du ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses éclairs atteignent ╵les confins de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis une voix rugit : ╵il fait tonner ╵sa voix majestueuse,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne retient plus ses éclairs ╵lorsqu’on entend sa voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, sa voix tonne ╵de façon extraordinaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait de grandes choses ╵dépassant notre entendement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car il dit à la neige ╵de tomber sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il commande aux pluies, ╵même aux pluies torrentielles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il paralyse ainsi ╵l’activité humaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que tous les hommes sachent ╵que c’est bien là son œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les animaux eux-mêmes ╵se terrent dans leurs gîtes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils s’abritent ╵au fond de leurs tanières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Des profondeurs australes ╵surgit un ouragan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des vents d’aquilon ╵amènent la froidure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sous le souffle de Dieu, ╵l’eau se transforme en glace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les étendues liquides ╵se figent en un bloc.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il charge les nuages ╵d’humidité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et répand ses éclairs ╵à travers les nuées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sa main les fait tourbillonner, ╵tournoyer selon ses desseins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu’ils exécutent ╵tout ce qu’il leur commande
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la face du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: S’agit-il de frapper ╵la terre du bâton
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou de lui témoigner ╵de la bonté ? ╵Ce sont eux qu’il délègue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ecoute cela, Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: arrête-toi, et réfléchis ╵aux merveilles de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sais-tu comment ╵Dieu contrôle ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment il fait jaillir ╵l’éclair de ses nuages ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Sais-tu comment les nues ╵conservent l’équilibre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont là les merveilles ╵de celui dont la science ╵atteint la perfection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toi dont les habits sont trop chauds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque languit la terre ╵sous le vent du midi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: peux-tu aider Dieu à étendre ╵la voûte des nuées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la rendre solide ╵pareille à un miroir ╵coulé dans le métal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 28.23
        metadata:
          usfm: DEU.28.23
      - type: text
        text: ', le ciel de bronze (nous dirions : de plomb) représente une canicule très forte.'
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pourrais-tu nous faire savoir ╵ce que nous lui dirons ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous ne pourrons argumenter : ╵tout est obscur pour nous.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quand je prends la parole, ╵doit-on l’en avertir ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faut-il qu’on le mette au courant ╵pour qu’il soit informé ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Soudain disparaît la lumière, ╵cachée par les nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, dès qu’un vent se lève, ╵ceux-ci sont balayés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Du septentrion vient ╵une lueur dorée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autour de Dieu rayonne ╵un éclat redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il est le Tout-Puissant, ╵nous ne pouvons l’atteindre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est grand en puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi qu’en équité ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleinement juste, ╵il n’opprime personne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il n’opprime pas celui qui est pleinement juste.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voilà pourquoi les hommes ╵doivent le craindre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais lui ne tient pas compte ╵de ceux qui se croient sages.
