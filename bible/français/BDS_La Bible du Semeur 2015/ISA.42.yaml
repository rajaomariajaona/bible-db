document_id: ISA.42,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le premier chant du Serviteur
  - type: text
    content: Voici mon serviteur, ╵que je soutiens,
  - type: text
    content: celui que j’ai choisi, ╵qui fait toute ma joie.
  - type: text
    content: Je lui ai donné mon Esprit
  - type: text
    content: et il établira ╵le droit pour tous les peuples
  - type: note
    content: Voir Mt 3.17 ; 17.5 ; Mc 1.11 ; Lc 3.22 ; 9.35. Les v. 1-4 sont cités en Mt 12.18-21.
  - type: text
    content: .
  '10':
  - type: text
    content: Chantez à l’Eternel ╵un cantique nouveau,
  - type: text
    content: entonnez sa louange ╵aux confins de la terre,
  - type: text
    content: vous qui voguez sur mer,
  - type: text
    content: et vous qui la peuplez,
  - type: text
    content: vous les îles ╵et les régions côtières, ╵vous qui les habitez !
  '11':
  - type: text
    content: Désert et villes du désert,
  - type: text
    content: campements de Qédar, ╵élevez votre voix !
  - type: text
    content: Habitants de Séla
  - type: note
    content: Qédar désigne le désert Arabique et ses tribus nomades, Séla la capitale fortifiée des Edomites (voir note 2 R 14.7), dont les Nabatéens s’empareront.
  - type: text
    content: ', ╵exultez d’allégresse !'
  - type: text
    content: Du sommet des montagnes, ╵poussez des cris de joie,
  '12':
  - type: text
    content: et rendez gloire à l’Eternel !
  - type: text
    content: Que jusque dans les îles ╵et les régions côtières, ╵on publie sa louange !
  '13':
  - type: text
    content: L’Eternel sortira ╵comme un héros,
  - type: text
    content: comme un homme de guerre, ╵il réveillera son ardeur,
  - type: text
    content: il poussera des cris de guerre, ╵des cris terribles,
  - type: text
    content: il triomphera ╵de ses ennemis.
  '14':
  - type: text
    content: Je me suis tu pendant longtemps,
  - type: text
    content: j’ai gardé le silence, ╵je me suis contenu
  - type: text
    content: mais maintenant, ╵comme une femme qui enfante, ╵je pousse des gémissements,
  - type: text
    content: et je respire en haletant.
  '15':
  - type: text
    content: Je m’en vais dévaster ╵montagnes et collines
  - type: text
    content: et j’en dessécherai ╵toute végétation,
  - type: text
    content: je changerai les fleuves ╵et j’en ferai des îles,
  - type: text
    content: j’assécherai les lacs,
  '16':
  - type: text
    content: les aveugles, ╵je les ferai marcher
  - type: text
    content: sur une route ╵qu’ils ne connaissent pas.
  - type: text
    content: Oui, je les conduirai sur des sentiers ╵dont ils ignorent tout.
  - type: text
    content: Je transformerai devant eux ╵leur obscurité en lumière
  - type: text
    content: et leurs parcours accidentés ╵en terrains plats.
  - type: text
    content: Tout cela, je l’accomplirai
  - type: text
    content: sans rien laisser d’inachevé.
  '17':
  - type: text
    content: Mais ceux qui se fient aux idoles,
  - type: text
    content: 'qui disent aux statues ╵fabriquées de métal fondu :'
  - type: text
    content: « Nos dieux, c’est vous ! »
  - type: text
    content: devront se retirer ╵couverts de honte.
  - type: heading
    content: La libération du peuple aveugle
  - type: heading
    content: Aux sourds et aux aveugles
  '18':
  - type: text
    content: Vous les sourds, écoutez !
  - type: text
    content: Vous, les aveugles, ╵regardez et voyez !
  '19':
  - type: text
    content: Qui est aveugle, ╵sinon mon serviteur
  - type: note
    content: Il s’agit ici du peuple d’Israël, serviteur de l’Eternel (41.8 ; 43.8, 10).
  - type: text
    content: '  ?'
  - type: text
    content: Et qui est sourd, ╵sinon mon messager, ╵mon envoyé ?
  - type: text
    content: Qui est aveugle ╵sinon celui ╵que l’Eternel réhabilite
  - type: note
    content: 'Autre traduction : celui qui m’est consacré.'
  - type: text
    content: ','
  - type: text
    content: et qui est sourd ╵sinon le serviteur ╵de l’Eternel
  - type: note
    content: 'D’après deux manuscrits hébreux et un manuscrit grec. Les autres manuscrits ont : et qui est aveugle comme mon serviteur ?'
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: Mais il ne criera pas,
  - type: text
    content: il n’élèvera pas la voix,
  - type: text
    content: il ne la fera pas ╵entendre dans les rues.
  '20':
  - type: text
    content: Tu as vu bien des choses,
  - type: text
    content: tu n’as rien retenu.
  - type: text
    content: Tu as l’oreille ouverte,
  - type: text
    content: tu n’as rien entendu.
  '21':
  - type: text
    content: Mais à cause de sa justice, ╵l’Eternel a voulu
  - type: text
    content: rendre sa Loi ╵magnifique et sublime.
  - type: heading
    content: Un peuple pillé et dépouillé
  '22':
  - type: text
    content: Et cependant, voilà un peuple ╵pillé et dépouillé
  - type: note
    content: Par les Babyloniens (39.6).
  - type: text
    content: ','
  - type: text
    content: ils sont tous pris au piège ╵au fond des fosses,
  - type: text
    content: mis au secret dans des prisons,
  - type: text
    content: ils sont pillés
  - type: text
    content: et nul ne les délivre.
  - type: text
    content: On les a dépouillés
  - type: text
    content: 'et aucun ne dit : « Restitue ! »'
  '23':
  - type: text
    content: Qui, parmi vous, ╵prêtera donc l’oreille ?
  - type: text
    content: Qui sera attentif ╵pour écouter, à l’avenir ?
  '24':
  - type: text
    content: Qui a livré Jacob ╵à ceux qui le dépouillent ?
  - type: text
    content: Qui livra Israël ╵à ceux qui l’ont pillé ?
  - type: text
    content: N’est-ce pas l’Eternel,
  - type: text
    content: envers qui nous avons péché,
  - type: text
    content: et dont nous avons refusé ╵de suivre les sentiers ╵qu’il nous avait prescrits ?
  - type: text
    content: Oui, ils n’ont pas ╵obéi à sa Loi.
  '25':
  - type: text
    content: Alors, il a versé ╵sur Israël
  - type: text
    content: l’ardeur de son courroux,
  - type: text
    content: il a fait déferler sur lui ╵de violents combats.
  - type: text
    content: Sa colère a flambé ╵autour de lui
  - type: text
    content: sans qu’il le reconnaisse,
  - type: text
    content: le feu l’a embrasé
  - type: text
    content: sans qu’il y prenne garde.
  '3':
  - type: text
    content: Il ne brisera pas ╵le roseau qui se ploie
  - type: text
    content: et il n’éteindra pas ╵la flamme qui faiblit,
  - type: text
    content: mais il établira le droit ╵selon la vérité.
  '4':
  - type: text
    content: Il ne faiblira pas,
  - type: text
    content: et il ne ploiera pas
  - type: text
    content: jusqu’à ce qu’il ait établi ╵le droit sur terre,
  - type: text
    content: jusqu’à ce que les îles ╵et les régions côtières ╵mettent leur espoir en sa loi.
  '5':
  - type: text
    content: Car voici ce que dit ╵l’Eternel Dieu
  - type: text
    content: qui a créé les cieux ╵et les a déployés,
  - type: text
    content: lui qui a disposé la terre ╵avec tout ce qu’elle produit,
  - type: text
    content: qui a donné la vie ╵aux hommes qui la peuplent
  - type: text
    content: 'et le souffle de vie ╵à ceux qui la parcourent :'
  '6':
  - type: text
    content: Moi, l’Eternel, ╵moi, je t’ai appelé ╵dans un juste dessein
  - type: text
    content: et je te tiendrai par la main ;
  - type: text
    content: je te protégerai ╵et je t’établirai
  - type: text
    content: pour conclure une alliance avec le peuple,
  - type: text
    content: pour être la lumière des peuples étrangers
  - type: note
    content: Voir Es 49.8. Cité en Ac 13.47  ; allusion en Lc 2.32 (voir Jn 8.12 ; Ac 26.23).
  - type: text
    content: ','
  '7':
  - type: text
    content: pour ouvrir les yeux des aveugles,
  - type: text
    content: pour tirer du cachot ╵les prisonniers,
  - type: text
    content: de la maison d’arrêt ╵ceux qui habitent les ténèbres.
  '8':
  - type: text
    content: Moi, je suis l’Eternel, ╵tel est mon nom.
  - type: text
    content: Et je ne donnerai ╵ma gloire à aucun autre.
  - type: text
    content: Je ne livrerai pas ╵mon honneur aux idoles.
  '9':
  - type: text
    content: Les événements du passé ╵se sont produits.
  - type: text
    content: Et maintenant, j’annonce ╵des événements tout nouveaux ;
  - type: text
    content: avant qu’ils germent,
  - type: text
    content: je vous les fais connaître.
  - type: heading
    content: Le cantique nouveau
