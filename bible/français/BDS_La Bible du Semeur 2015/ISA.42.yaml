document_id: ISA.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le premier chant du Serviteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici mon serviteur, ╵que je soutiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui que j’ai choisi, ╵qui fait toute ma joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lui ai donné mon Esprit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il établira ╵le droit pour tous les peuples
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Mt 3.17 ; 17.5 ; Mc 1.11 ; Lc 3.22 ; 9.35. Les v. 1-4 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12.18-21
        metadata:
          usfm: MAT.12.18+MAT.12.19+MAT.12.20+MAT.12.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais il ne criera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’élèvera pas la voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne la fera pas ╵entendre dans les rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il ne brisera pas ╵le roseau qui se ploie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’éteindra pas ╵la flamme qui faiblit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il établira le droit ╵selon la vérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il ne faiblira pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne ploiera pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce qu’il ait établi ╵le droit sur terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce que les îles ╵et les régions côtières ╵mettent leur espoir en sa loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car voici ce que dit ╵l’Eternel Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a créé les cieux ╵et les a déployés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui a disposé la terre ╵avec tout ce qu’elle produit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a donné la vie ╵aux hommes qui la peuplent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et le souffle de vie ╵à ceux qui la parcourent :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi, l’Eternel, ╵moi, je t’ai appelé ╵dans un juste dessein
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te tiendrai par la main ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te protégerai ╵et je t’établirai
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour conclure une alliance avec le peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour être la lumière des peuples étrangers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 49.8
        metadata:
          usfm: ISA.49.8
      - type: text
        text: '. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13.47
        metadata:
          usfm: ACT.13.47
      - type: text
        text: '  ; allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 2.32
        metadata:
          usfm: LUK.2.32
      - type: text
        text: ' (voir Jn 8.12 ; Ac 26.23).'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: pour ouvrir les yeux des aveugles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tirer du cachot ╵les prisonniers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la maison d’arrêt ╵ceux qui habitent les ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moi, je suis l’Eternel, ╵tel est mon nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne donnerai ╵ma gloire à aucun autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne livrerai pas ╵mon honneur aux idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les événements du passé ╵se sont produits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et maintenant, j’annonce ╵des événements tout nouveaux ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu’ils germent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous les fais connaître.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le cantique nouveau
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Chantez à l’Eternel ╵un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entonnez sa louange ╵aux confins de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui voguez sur mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui la peuplez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous les îles ╵et les régions côtières, ╵vous qui les habitez !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Désert et villes du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: campements de Qédar, ╵élevez votre voix !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Habitants de Séla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qédar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne le désert Arabique et ses tribus nomades, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Séla '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'la capitale fortifiée des Edomites (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14.7
        metadata:
          usfm: 2KI.14.7
      - type: text
        text: ), dont les Nabatéens s’empareront.
    marker-yv: yv-n
  - type: text
    text: ', ╵exultez d’allégresse !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du sommet des montagnes, ╵poussez des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et rendez gloire à l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que jusque dans les îles ╵et les régions côtières, ╵on publie sa louange !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Eternel sortira ╵comme un héros,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un homme de guerre, ╵il réveillera son ardeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il poussera des cris de guerre, ╵des cris terribles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il triomphera ╵de ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je me suis tu pendant longtemps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai gardé le silence, ╵je me suis contenu
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais maintenant, ╵comme une femme qui enfante, ╵je pousse des gémissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je respire en haletant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je m’en vais dévaster ╵montagnes et collines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’en dessécherai ╵toute végétation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je changerai les fleuves ╵et j’en ferai des îles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’assécherai les lacs,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: les aveugles, ╵je les ferai marcher
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur une route ╵qu’ils ne connaissent pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je les conduirai sur des sentiers ╵dont ils ignorent tout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je transformerai devant eux ╵leur obscurité en lumière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs parcours accidentés ╵en terrains plats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout cela, je l’accomplirai
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans rien laisser d’inachevé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais ceux qui se fient aux idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui disent aux statues ╵fabriquées de métal fondu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nos dieux, c’est vous ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: devront se retirer ╵couverts de honte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La libération du peuple aveugle
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Aux sourds et aux aveugles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vous les sourds, écoutez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous, les aveugles, ╵regardez et voyez !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qui est aveugle, ╵sinon mon serviteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit ici du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'peuple d’Israël, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: serviteur de l’Eternel (41.8 ; 43.8, 10).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui est sourd, ╵sinon mon messager, ╵mon envoyé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est aveugle ╵sinon celui ╵que l’Eternel réhabilite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui m’est consacré.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui est sourd ╵sinon le serviteur ╵de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après deux manuscrits hébreux et un manuscrit grec. Les autres manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et qui est aveugle comme mon serviteur ?
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu as vu bien des choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n’as rien retenu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as l’oreille ouverte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n’as rien entendu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais à cause de sa justice, ╵l’Eternel a voulu
- type: usfm
  marker: q1
  children:
  - type: text
    text: rendre sa Loi ╵magnifique et sublime.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un peuple pillé et dépouillé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Et cependant, voilà un peuple ╵pillé et dépouillé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par les Babyloniens (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39.6'
        metadata:
          usfm: ISA.39.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont tous pris au piège ╵au fond des fosses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mis au secret dans des prisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont pillés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul ne les délivre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On les a dépouillés
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et aucun ne dit : « Restitue ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qui, parmi vous, ╵prêtera donc l’oreille ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sera attentif ╵pour écouter, à l’avenir ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Qui a livré Jacob ╵à ceux qui le dépouillent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui livra Israël ╵à ceux qui l’ont pillé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers qui nous avons péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont nous avons refusé ╵de suivre les sentiers ╵qu’il nous avait prescrits ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ils n’ont pas ╵obéi à sa Loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Alors, il a versé ╵sur Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’ardeur de son courroux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait déferler sur lui ╵de violents combats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa colère a flambé ╵autour de lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’il le reconnaisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le feu l’a embrasé
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’il y prenne garde.
