document_id: MAT.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est ressuscité !
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 16.1-8 ; Lc 24.1-12 ; Jn 20.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après le sabbat, comme le jour commençait à poindre le dimanche matin, Marie de Magdala et l’autre Marie se mirent en chemin pour aller voir la tombe. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout à coup, voici qu’il y eut un violent tremblement de terre : un ange du Seigneur descendit du ciel, s’approcha de la tombe, roula la pierre de côté et s’assit sur elle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il avait l’apparence de l’éclair, et ses vêtements étaient aussi blancs que la neige. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les gardes furent saisis d’épouvante : ils se mirent à trembler et devinrent comme morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais l’ange, s’adressant aux femmes, leur dit : Vous autres, n’ayez pas peur ; je sais que vous cherchez Jésus, qui a été crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il n’est plus ici, car il est ressuscité comme il l’avait dit. Venez voir l’endroit où il était couché. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis allez vite annoncer à ses disciples qu’il est ressuscité. Et voici : il vous précède en Galilée. Là vous le verrez. Voilà ce que j’avais à vous dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elles quittèrent le tombeau en hâte, tout effrayées, mais en même temps remplies d’une grande joie, et elles coururent porter la nouvelle aux disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici que, tout à coup, Jésus vint à leur rencontre et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Salut à vous.
- type: usfm
  marker: p
  children:
  - type: text
    text: Elles s’approchèrent de lui, lui embrassèrent les pieds et l’adorèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’ayez aucune crainte ! Allez dire à mes frères qu’ils doivent se rendre en Galilée : c’est là qu’ils me verront.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pendant qu’elles étaient en chemin, quelques soldats de la garde retournèrent en ville pour faire aux chefs des prêtres leur rapport sur tous ces événements. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ceux-ci convoquèrent les responsables du peuple et, après avoir délibéré avec eux, versèrent aux soldats une forte somme d’argent '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'avec cette consigne : Vous raconterez que ses disciples sont venus pendant la nuit et qu’ils ont volé son cadavre pendant que vous dormiez. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si jamais l’affaire parvenait aux oreilles du gouverneur, nous saurons lui parler et faire le nécessaire pour que vous n’ayez pas d’ennuis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les soldats prirent l’argent et se conformèrent à ces consignes. Cette version des faits s’est propagée parmi les Juifs où elle a cours jusqu’à aujourd’hui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La souveraineté du Ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les onze disciples se rendirent en Galilée, sur la colline que Jésus leur avait indiquée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dès qu’ils l’aperçurent, ils l’adorèrent. Mais ils ne surent que penser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Quelques-uns cependant eurent des doutes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors Jésus s’approcha d’eux et leur parla ainsi : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai reçu tout pouvoir dans le ciel et sur la terre :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: allez donc dans le monde entier, faites des disciples parmi tous les peuples, baptisez-les au nom du Père, du Fils et du Saint-Esprit
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'et enseignez-leur à obéir à tout ce que je vous ai prescrit. Et voici : je suis moi-même avec vous tous les jours, jusqu’à la fin du monde.'
