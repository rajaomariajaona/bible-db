document_id: MAT.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus est ressuscité !
  - type: heading
    content: (Mc 16.1-8 ; Lc 24.1-12 ; Jn 20.1-2)
  - type: text
    content: 'Après le sabbat, comme le jour commençait à poindre le dimanche matin, Marie de Magdala et l’autre Marie se mirent en chemin pour aller voir la tombe. '
  '10':
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: 'N’ayez aucune crainte ! Allez dire à mes frères qu’ils doivent se rendre en Galilée : c’est là qu’ils me verront.'
  '11':
  - type: text
    content: 'Pendant qu’elles étaient en chemin, quelques soldats de la garde retournèrent en ville pour faire aux chefs des prêtres leur rapport sur tous ces événements. '
  '12':
  - type: text
    content: 'Ceux-ci convoquèrent les responsables du peuple et, après avoir délibéré avec eux, versèrent aux soldats une forte somme d’argent '
  '13':
  - type: text
    content: 'avec cette consigne : Vous raconterez que ses disciples sont venus pendant la nuit et qu’ils ont volé son cadavre pendant que vous dormiez. '
  '14':
  - type: text
    content: Si jamais l’affaire parvenait aux oreilles du gouverneur, nous saurons lui parler et faire le nécessaire pour que vous n’ayez pas d’ennuis.
  '15':
  - type: text
    content: Les soldats prirent l’argent et se conformèrent à ces consignes. Cette version des faits s’est propagée parmi les Juifs où elle a cours jusqu’à aujourd’hui.
  - type: heading
    content: La souveraineté du Ressuscité
  '16':
  - type: text
    content: 'Les onze disciples se rendirent en Galilée, sur la colline que Jésus leur avait indiquée. '
  '17':
  - type: text
    content: Dès qu’ils l’aperçurent, ils l’adorèrent. Mais ils ne surent que penser
  - type: note
    content: 'Autre traduction : Quelques-uns cependant eurent des doutes.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Alors Jésus s’approcha d’eux et leur parla ainsi : '
  - type: text
    content: 'J’ai reçu tout pouvoir dans le ciel et sur la terre :'
  - type: text
    content: ' '
  '19':
  - type: text
    content: allez donc dans le monde entier, faites des disciples parmi tous les peuples, baptisez-les au nom du Père, du Fils et du Saint-Esprit
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Tout à coup, voici qu’il y eut un violent tremblement de terre : un ange du Seigneur descendit du ciel, s’approcha de la tombe, roula la pierre de côté et s’assit sur elle. '
  '20':
  - type: text
    content: 'et enseignez-leur à obéir à tout ce que je vous ai prescrit. Et voici : je suis moi-même avec vous tous les jours, jusqu’à la fin du monde.'
  '3':
  - type: text
    content: 'Il avait l’apparence de l’éclair, et ses vêtements étaient aussi blancs que la neige. '
  '4':
  - type: text
    content: 'Les gardes furent saisis d’épouvante : ils se mirent à trembler et devinrent comme morts.'
  '5':
  - type: text
    content: 'Mais l’ange, s’adressant aux femmes, leur dit : Vous autres, n’ayez pas peur ; je sais que vous cherchez Jésus, qui a été crucifié. '
  '6':
  - type: text
    content: 'Il n’est plus ici, car il est ressuscité comme il l’avait dit. Venez voir l’endroit où il était couché. '
  '7':
  - type: text
    content: 'Puis allez vite annoncer à ses disciples qu’il est ressuscité. Et voici : il vous précède en Galilée. Là vous le verrez. Voilà ce que j’avais à vous dire.'
  '8':
  - type: text
    content: 'Elles quittèrent le tombeau en hâte, tout effrayées, mais en même temps remplies d’une grande joie, et elles coururent porter la nouvelle aux disciples. '
  '9':
  - type: text
    content: 'Et voici que, tout à coup, Jésus vint à leur rencontre et leur dit : '
  - type: text
    content: Salut à vous.
  - type: text
    content: Elles s’approchèrent de lui, lui embrassèrent les pieds et l’adorèrent.
