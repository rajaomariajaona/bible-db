document_id: PSA.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux révélations de Dieu
  - type: text
    content: Au chef de chœur ; cantique de David.
  '10':
  - type: text
    content: La crainte de l’Eternel est pure, ╵elle subsiste à jamais ;
  - type: text
    content: les règles de droit ╵édictées par l’Eternel ╵sont justes toutes ensemble.
  '11':
  - type: text
    content: Elles sont plus désirables que de l’or, ╵que beaucoup d’or pur,
  - type: text
    content: et plus savoureuses que le miel ╵le plus doux coulant des ruches.
  '12':
  - type: text
    content: 'Ton serviteur, Eternel, ╵en tire instruction :'
  - type: text
    content: à leur obéir, ╵on recueille un grand profit.
  '13':
  - type: text
    content: Qui peut discerner tous ses faux pas ?
  - type: text
    content: Pardonne-moi les péchés ╵dont je n’ai pas conscience.
  '14':
  - type: text
    content: 'Garde aussi ton serviteur ╵des pensées d’orgueil :'
  - type: text
    content: qu’elles n’aient sur moi ╵pas la moindre emprise !
  - type: text
    content: Alors je serai intègre, ╵innocent de grandes fautes.
  '15':
  - type: text
    content: Veuille agréer mes paroles,
  - type: text
    content: et la méditation de mon cœur,
  - type: text
    content: ô Eternel, mon Rocher, ╵mon Libérateur.
  '2':
  - type: text
    content: Tous les cieux proclament ╵combien Dieu ╵est glorieux,
  - type: text
    content: l’étendue céleste ╵publie l’œuvre de ses mains.
  '3':
  - type: text
    content: Un jour en informe un autre,
  - type: text
    content: une nuit à l’autre nuit ╵en transmet la connaissance.
  '4':
  - type: text
    content: Ce ne sont pas des paroles, ╵ce ne sont pas des discours,
  - type: text
    content: ni des voix qu’on peut entendre
  - type: note
    content: 'Autre traduction : dont le son n’est pas entendu.'
  - type: text
    content: .
  '5':
  - type: text
    content: Cependant, leur voix
  - type: note
    content: 'leur voix: d’après l’ancienne version grecque. Texte hébreu traditionnel : leur cordeau. La différence provient de l’absence d’une lettre qui a probablement été omise par erreur dans ce dernier.'
  - type: text
    content: ' parvient ╵à toute la terre,'
  - type: text
    content: et leurs accents aux confins du monde
  - type: note
    content: Cité en Rm 10.18, d’après l’ancienne version grecque.
  - type: text
    content: .
  - type: text
    content: Là, Dieu a dressé ╵pour le soleil une tente.
  '6':
  - type: text
    content: Comme un jeune époux ╵sortant de sa chambre,
  - type: text
    content: comme un guerrier qui s’avance ╵le soleil s’élance, ╵joyeux de prendre sa course.
  '7':
  - type: text
    content: D’une extrémité du ciel, ╵il surgit,
  - type: text
    content: et son parcours se prolonge ╵jusqu’à l’autre extrémité ;
  - type: text
    content: il n’est rien qui se dérobe ╵à l’ardeur de ses rayons.
  '8':
  - type: text
    content: La Loi de l’Eternel est parfaite, ╵elle nous redonne vie.
  - type: text
    content: L’acte de l’alliance de l’Eternel ╵est digne de confiance, ╵et aux gens inexpérimentés ╵elle donne la sagesse.
  '9':
  - type: text
    content: Les décrets de l’Eternel sont justes ╵et ils font la joie du cœur ;
  - type: text
    content: les commandements de l’Eternel ╵sont limpides ╵et ils donnent du discernement.
