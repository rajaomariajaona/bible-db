document_id: PSA.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux révélations de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur ; cantique de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tous les cieux proclament ╵combien Dieu ╵est glorieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’étendue céleste ╵publie l’œuvre de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un jour en informe un autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une nuit à l’autre nuit ╵en transmet la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce ne sont pas des paroles, ╵ce ne sont pas des discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni des voix qu’on peut entendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dont le son n’est pas entendu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cependant, leur voix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur voix
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'leur cordeau. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence provient de l’absence d’une lettre qui a probablement été omise par erreur dans ce dernier.
    marker-yv: yv-n
  - type: text
    text: ' parvient ╵à toute la terre,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs accents aux confins du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 10.18
        metadata:
          usfm: ROM.10.18
      - type: text
        text: ', d’après l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, Dieu a dressé ╵pour le soleil une tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Comme un jeune époux ╵sortant de sa chambre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un guerrier qui s’avance ╵le soleil s’élance, ╵joyeux de prendre sa course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: D’une extrémité du ciel, ╵il surgit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son parcours se prolonge ╵jusqu’à l’autre extrémité ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’est rien qui se dérobe ╵à l’ardeur de ses rayons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La Loi de l’Eternel est parfaite, ╵elle nous redonne vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’acte de l’alliance de l’Eternel ╵est digne de confiance, ╵et aux gens inexpérimentés ╵elle donne la sagesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les décrets de l’Eternel sont justes ╵et ils font la joie du cœur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les commandements de l’Eternel ╵sont limpides ╵et ils donnent du discernement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La crainte de l’Eternel est pure, ╵elle subsiste à jamais ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les règles de droit ╵édictées par l’Eternel ╵sont justes toutes ensemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elles sont plus désirables que de l’or, ╵que beaucoup d’or pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus savoureuses que le miel ╵le plus doux coulant des ruches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ton serviteur, Eternel, ╵en tire instruction :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à leur obéir, ╵on recueille un grand profit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui peut discerner tous ses faux pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pardonne-moi les péchés ╵dont je n’ai pas conscience.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Garde aussi ton serviteur ╵des pensées d’orgueil :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elles n’aient sur moi ╵pas la moindre emprise !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je serai intègre, ╵innocent de grandes fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Veuille agréer mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la méditation de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Eternel, mon Rocher, ╵mon Libérateur.
