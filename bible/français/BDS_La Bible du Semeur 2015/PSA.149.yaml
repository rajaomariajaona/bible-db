document_id: PSA.149,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur aime son peuple
  - type: text
    content: Louez l’Eternel !
  - type: text
    content: Chantez pour l’Eternel ╵un cantique nouveau !
  - type: text
    content: Célébrez ses louanges ╵dans l’assemblée ╵de ceux qui lui sont attachés !
  '2':
  - type: text
    content: 'Exulte de joie, Israël : ╵c’est lui qui t’a formé !'
  - type: text
    content: Que les fils de Sion
  - type: text
    content: éclatent d’allégresse ╵à cause de leur roi !
  '3':
  - type: text
    content: Qu’ils le louent en dansant,
  - type: text
    content: qu’ils le célèbrent ╵avec le tambourin ╵et au son de la lyre !
  '4':
  - type: text
    content: Car l’Eternel ╵prend plaisir en son peuple,
  - type: text
    content: et il accorde aux humbles ╵le salut pour parure.
  '5':
  - type: text
    content: Que ceux qui lui sont attachés ╵exultent de fierté,
  - type: text
    content: qu’ils crient de joie ╵quand ils sont sur leur couche,
  '6':
  - type: text
    content: que leur louange ╵retentisse pour Dieu.
  - type: text
    content: Qu’ils tiennent aussi dans leurs mains ╵l’épée à deux tranchants
  '7':
  - type: text
    content: pour punir les nations
  - type: text
    content: et pour châtier les peuples.
  '8':
  - type: text
    content: Ils chargeront leurs rois de chaînes
  - type: text
    content: et ils mettront aux fers ╵leurs dignitaires
  '9':
  - type: text
    content: pour accomplir sur eux ╵le jugement prescrit.
  - type: text
    content: C’est l’honneur qui revient ╵à tous ceux qui sont attachés à Dieu.
  - type: text
    content: Louez l’Eternel !
