document_id: PSA.149
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Seigneur aime son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez pour l’Eternel ╵un cantique nouveau !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez ses louanges ╵dans l’assemblée ╵de ceux qui lui sont attachés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Exulte de joie, Israël : ╵c’est lui qui t’a formé !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les fils de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: éclatent d’allégresse ╵à cause de leur roi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu’ils le louent en dansant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils le célèbrent ╵avec le tambourin ╵et au son de la lyre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car l’Eternel ╵prend plaisir en son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il accorde aux humbles ╵le salut pour parure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que ceux qui lui sont attachés ╵exultent de fierté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils crient de joie ╵quand ils sont sur leur couche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: que leur louange ╵retentisse pour Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils tiennent aussi dans leurs mains ╵l’épée à deux tranchants
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: pour punir les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour châtier les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils chargeront leurs rois de chaînes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils mettront aux fers ╵leurs dignitaires
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: pour accomplir sur eux ╵le jugement prescrit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’honneur qui revient ╵à tous ceux qui sont attachés à Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel !
