document_id: JOL.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jugement des peuples hostiles à l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici, en ces jours-là, ╵en ce temps-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque je changerai le sort ╵et de Juda et de Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ferai revenir les exilés de Juda et de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ','
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De vos socs, forgez des épées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de vos faucilles, des lances !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que le plus faible clame : ╵« Moi, je suis un héros ! »'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hâtez-vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Terme hébreu de sens incertain. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mobilisez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rassemblez-vous.
      marker-yv: yv-n
    - type: text
      text: ' et venez,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous les peuples, de partout !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-vous !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵toi, fais descendre tes guerriers !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Que les nations se lèvent ╵et qu’elles montent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la vallée de Josaphat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.2'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est là que je siégerai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour juger tous les peuples, ╵les peuples de partout.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brandissez la faucille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la moisson est mûre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, foulez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le pressoir est plein
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cuves débordent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car grande est leur méchanceté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ces deux images sont reprises en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 14.14-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, quelles foules, quelles foules
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le val du Verdict
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom symbolique, comme aux v. 2 et 12 « la vallée de Josaphat » (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.2'
        - type: text
          text: ' et note). Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'verdict '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est celui du jugement. Le même mot peut désigner, en hébreu, la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'herse. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le prophète joue sur le double sens pour évoquer en même temps le verdict du jugement et son exécution, la herse en étant l’instrument.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour de l’Eternel est proche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le val du Verdict.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil et la lune ╵sont obscurcis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les astres perdent leur éclat.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rugit, l’Eternel, ╵depuis Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de Jérusalem, ╵il donne de la voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le ciel et la terre ╵sont ébranlés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Eternel ╵est un refuge pour son peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est une retraite ╵pour les Israélites.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous reconnaîtrez ╵que je suis l’Eternel, ╵votre Dieu, qui réside
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en Sion, mon saint mont.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem sera ╵un sanctuaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sainte.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et plus jamais les étrangers ╵n’y passeront.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel habitera en Sion
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, en ce jour-là, ╵le vin nouveau ╵coulera des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les coteaux ╵ruisselleront de lait ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans tous les torrents de Juda, ╵l’eau coulera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du temple de l’Eternel ╵jaillira une source
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Ez 47.1-12 ; Za 14.8. Jésus fait allusion à ces textes en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jn 7.38
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle arrosera ╵le val des Acacias
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nouveau nom de vallée symbolique. L’acacia était le bois dont on avait fait le mobilier sacré du tabernacle (Ex 25 à 27).
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Egypte deviendra ╵une désolation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Edom, un désert ╵tout entier dévasté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause des violences ╵qu’ils ont commises ╵contre les Judéens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont ils ont répandu le sang ╵dans leur pays ╵alors qu’ils étaient innocents.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rassemblerai tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ferai descendre ╵dans la vallée de Josaphat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josaphat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Eternel juge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir v. 12). Il doit s’agir d’une vallée symbolique qui représente le lieu où l’Eternel jugera tous les peuples. Le prophète explicite son jeu de mots dans ce qui suit.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors là j’entrerai ╵en jugement contre eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sujet de mon peuple, ╵celui qui m’appartient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, qu’ils ont dispersé ╵au sein de peuples étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au sujet de mon pays ╵qu’ils se sont partagé.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à Juda, ╵il sera toujours habité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem ╵le sera d’âge en âge.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi je les justifierai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux dont le sang ╵a été répandu ╵et que je n’avais pas ╵justifiés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Je les justifierai… je n’avais pas justifiés. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Je déclare leur sang innocent, ce que je n’avais pas fait jusque-là. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Je vengerai leur sang que je n’avais pas vengé.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel habitera en Sion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont partagé ╵en les tirant au sort ╵les captifs de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont troqué l’enfant ╵contre une courtisane,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont vendu ╵les filles pour du vin, ╵et ils ont bu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, Tyr et Sidon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les deux grands ports phéniciens.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les districts philistins, ╵quelles sont donc ╵vos prétentions à mon égard ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voulez-vous vous venger sur moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou vous en prendre à moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien vite, promptement ╵je ferai retomber sur vous ╵tous vos agissements.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez dérobé ╵mon argent et mon or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous avez pris ╵tous mes objets précieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les emporter dans vos temples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos palais.
      marker-yv: yv-n
    - type: text
      text: ','
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous avez vendu ╵les Judéens, ╵les Jérusalémites ╵aux Ioniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ioniens
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les Phéniciens ont entretenu des relations commerciales avec les Grecs dès le '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ix
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' siècle av. J.-C.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’ils soient éloignés ╵de leur pays.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh bien, moi, je vais les revigorer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’ils quittent le lieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où vous, vous les avez vendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je ferai retomber sur vous ╵tous vos agissements :'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je livrerai ╵votre population ╵aux Judéens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui les vendront aux Sabéens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Habitants de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Saba, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au sud de la péninsule Arabique (Yémen actuel), dont la reine était venue voir Salomon (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 10.1-13
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', ╵cette nation lointaine. »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Eternel qui le déclare.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Proclamez ceci aux nations :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appelez à la guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mobilisez les guerriers !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, que tous les soldats ╵partent en guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et montent au combat !
