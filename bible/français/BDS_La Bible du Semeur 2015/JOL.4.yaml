document_id: JOL.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement des peuples hostiles à l’Eternel
  - type: text
    content: Voici, en ces jours-là, ╵en ce temps-là,
  - type: text
    content: lorsque je changerai le sort ╵et de Juda et de Jérusalem
  - type: note
    content: 'Certains traduisent : je ferai revenir les exilés de Juda et de Jérusalem.'
  - type: text
    content: ','
  '10':
  - type: text
    content: De vos socs, forgez des épées,
  - type: text
    content: et de vos faucilles, des lances !
  - type: text
    content: 'Que le plus faible clame : ╵« Moi, je suis un héros ! »'
  '11':
  - type: text
    content: Hâtez-vous
  - type: note
    content: 'Terme hébreu de sens incertain. Autres traductions : mobilisez-vous ou rassemblez-vous.'
  - type: text
    content: ' et venez,'
  - type: text
    content: vous tous les peuples, de partout !
  - type: text
    content: Rassemblez-vous !
  - type: text
    content: O Eternel, ╵toi, fais descendre tes guerriers !
  '12':
  - type: text
    content: « Que les nations se lèvent ╵et qu’elles montent
  - type: text
    content: à la vallée de Josaphat
  - type: note
    content: Voir 4.2 et note.
  - type: text
    content: ','
  - type: text
    content: car c’est là que je siégerai
  - type: text
    content: pour juger tous les peuples, ╵les peuples de partout.
  '13':
  - type: text
    content: Brandissez la faucille,
  - type: text
    content: car la moisson est mûre !
  - type: text
    content: Venez, foulez,
  - type: text
    content: car le pressoir est plein
  - type: text
    content: et les cuves débordent !
  - type: text
    content: Car grande est leur méchanceté
  - type: note
    content: Ces deux images sont reprises en Ap 14.14-20.
  - type: text
    content: .
  '14':
  - type: text
    content: Oh, quelles foules, quelles foules
  - type: text
    content: dans le val du Verdict
  - type: note
    content: Nom symbolique, comme aux v. 2 et 12 « la vallée de Josaphat » (voir 4.2 et note). Le verdict est celui du jugement. Le même mot peut désigner, en hébreu, la herse. Le prophète joue sur le double sens pour évoquer en même temps le verdict du jugement et son exécution, la herse en étant l’instrument.
  - type: text
    content: '  ;'
  - type: text
    content: le jour de l’Eternel est proche
  - type: text
    content: dans le val du Verdict.
  '15':
  - type: text
    content: Le soleil et la lune ╵sont obscurcis,
  - type: text
    content: les astres perdent leur éclat.
  '16':
  - type: text
    content: Il rugit, l’Eternel, ╵depuis Sion
  - type: text
    content: et, de Jérusalem, ╵il donne de la voix,
  - type: text
    content: et le ciel et la terre ╵sont ébranlés.
  - type: text
    content: Mais l’Eternel ╵est un refuge pour son peuple.
  - type: text
    content: Il est une retraite ╵pour les Israélites.
  '17':
  - type: text
    content: Et vous reconnaîtrez ╵que je suis l’Eternel, ╵votre Dieu, qui réside
  - type: text
    content: en Sion, mon saint mont.
  - type: text
    content: Jérusalem sera ╵un sanctuaire
  - type: note
    content: 'Autre traduction : sainte.'
  - type: text
    content: '  :'
  - type: text
    content: et plus jamais les étrangers ╵n’y passeront.
  - type: heading
    content: L’Eternel habitera en Sion
  '18':
  - type: text
    content: Alors, en ce jour-là, ╵le vin nouveau ╵coulera des montagnes,
  - type: text
    content: et les coteaux ╵ruisselleront de lait ;
  - type: text
    content: dans tous les torrents de Juda, ╵l’eau coulera,
  - type: text
    content: et du temple de l’Eternel ╵jaillira une source
  - type: note
    content: Voir Ez 47.1-12 ; Za 14.8. Jésus fait allusion à ces textes en Jn 7.38.
  - type: text
    content: et elle arrosera ╵le val des Acacias
  - type: note
    content: Nouveau nom de vallée symbolique. L’acacia était le bois dont on avait fait le mobilier sacré du tabernacle (Ex 25 à 27).
  - type: text
    content: .
  '19':
  - type: text
    content: L’Egypte deviendra ╵une désolation
  - type: text
    content: et Edom, un désert ╵tout entier dévasté,
  - type: text
    content: à cause des violences ╵qu’ils ont commises ╵contre les Judéens
  - type: text
    content: dont ils ont répandu le sang ╵dans leur pays ╵alors qu’ils étaient innocents.
  '2':
  - type: text
    content: je rassemblerai tous les peuples,
  - type: text
    content: je les ferai descendre ╵dans la vallée de Josaphat
  - type: note
    content: 'Josaphat signifie : l’Eternel juge (voir v. 12). Il doit s’agir d’une vallée symbolique qui représente le lieu où l’Eternel jugera tous les peuples. Le prophète explicite son jeu de mots dans ce qui suit.'
  - type: text
    content: '  ;'
  - type: text
    content: alors là j’entrerai ╵en jugement contre eux
  - type: text
    content: au sujet de mon peuple, ╵celui qui m’appartient,
  - type: text
    content: Israël, qu’ils ont dispersé ╵au sein de peuples étrangers,
  - type: text
    content: et au sujet de mon pays ╵qu’ils se sont partagé.
  '20':
  - type: text
    content: Quant à Juda, ╵il sera toujours habité,
  - type: text
    content: Jérusalem ╵le sera d’âge en âge.
  '21':
  - type: text
    content: Ainsi je les justifierai,
  - type: text
    content: eux dont le sang ╵a été répandu ╵et que je n’avais pas ╵justifiés
  - type: note
    content: 'Je les justifierai… je n’avais pas justifiés. Autre traduction : Je déclare leur sang innocent, ce que je n’avais pas fait jusque-là. L’ancienne version grecque et la version syriaque ont : Je vengerai leur sang que je n’avais pas vengé.'
  - type: text
    content: . »
  - type: text
    content: L’Eternel habitera en Sion.
  '3':
  - type: text
    content: Ils se sont partagé ╵en les tirant au sort ╵les captifs de mon peuple,
  - type: text
    content: ils ont troqué l’enfant ╵contre une courtisane,
  - type: text
    content: ils ont vendu ╵les filles pour du vin, ╵et ils ont bu.
  '4':
  - type: text
    content: Et vous, Tyr et Sidon
  - type: note
    content: Les deux grands ports phéniciens.
  - type: text
    content: ','
  - type: text
    content: et tous les districts philistins, ╵quelles sont donc ╵vos prétentions à mon égard ?
  - type: text
    content: Voulez-vous vous venger sur moi
  - type: text
    content: ou vous en prendre à moi ?
  - type: text
    content: Bien vite, promptement ╵je ferai retomber sur vous ╵tous vos agissements.
  '5':
  - type: text
    content: Vous avez dérobé ╵mon argent et mon or,
  - type: text
    content: vous avez pris ╵tous mes objets précieux
  - type: text
    content: pour les emporter dans vos temples
  - type: note
    content: 'Autre traduction : vos palais.'
  - type: text
    content: ','
  '6':
  - type: text
    content: et vous avez vendu ╵les Judéens, ╵les Jérusalémites ╵aux Ioniens
  - type: note
    content: 'Les Ioniens: les Phéniciens ont entretenu des relations commerciales avec les Grecs dès le ixe siècle av. J.-C.'
  - type: text
    content: pour qu’ils soient éloignés ╵de leur pays.
  '7':
  - type: text
    content: Eh bien, moi, je vais les revigorer
  - type: text
    content: pour qu’ils quittent le lieu
  - type: text
    content: où vous, vous les avez vendus,
  - type: text
    content: 'je ferai retomber sur vous ╵tous vos agissements :'
  '8':
  - type: text
    content: je livrerai ╵votre population ╵aux Judéens
  - type: text
    content: qui les vendront aux Sabéens
  - type: note
    content: Habitants de Saba, au sud de la péninsule Arabique (Yémen actuel), dont la reine était venue voir Salomon (1 R 10.1-13).
  - type: text
    content: ', ╵cette nation lointaine. »'
  - type: text
    content: C’est l’Eternel qui le déclare.
  '9':
  - type: text
    content: 'Proclamez ceci aux nations :'
  - type: text
    content: Appelez à la guerre
  - type: text
    content: et mobilisez les guerriers !
  - type: text
    content: Oui, que tous les soldats ╵partent en guerre
  - type: text
    content: et montent au combat !
