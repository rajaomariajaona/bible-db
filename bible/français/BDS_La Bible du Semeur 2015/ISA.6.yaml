document_id: ISA.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel d’Esaïe
  - type: text
    content: L’année de la mort du roi Ozias
  - type: note
    content: Vers 740 av. J.-C. (2 R 15.7 ; 2 Ch 26.21-23).
  - type: text
    content: ', je vis le Seigneur siégeant sur un trône très élevé. Les pans de son vêtement remplissaient le Temple.'
  '10':
  - type: text
    content: Rends ce peuple insensible,
  - type: text
    content: ferme-lui les oreilles
  - type: text
    content: et bouche-lui les yeux
  - type: text
    content: pour qu’il ne voie pas de ses yeux,
  - type: text
    content: pour qu’il n’entende pas de ses oreilles
  - type: text
    content: et pour qu’il ne comprenne pas,
  - type: text
    content: qu’il ne revienne pas à moi
  - type: text
    content: afin d’être guéri.
  '11':
  - type: text
    content: 'Je demandai alors : ╵Jusques à quand, Seigneur ?'
  - type: text
    content: 'Et il me répondit :'
  - type: text
    content: Jusqu’à ce que les villes ╵soient dévastées
  - type: text
    content: et privées d’habitants,
  - type: text
    content: qu’il n’y ait plus personne ╵dans les maisons,
  - type: text
    content: et que ce territoire ╵soit réduit en désert ╵et dévasté.
  '12':
  - type: text
    content: L’Eternel enverra ╵ses habitants au loin,
  - type: text
    content: et le pays sera ╵à l’état d’abandon.
  '13':
  - type: text
    content: S’il y subsiste encore ╵un dixième du peuple,
  - type: text
    content: à son tour, il sera ╵embrasé par le feu.
  - type: text
    content: Mais, comme un térébinthe ╵ou comme un chêne
  - type: text
    content: qui conserve sa souche, ╵quand il est abattu,
  - type: text
    content: la souche de ce peuple ╵sera une semence sainte.
  '2':
  - type: text
    content: Des êtres à forme de serpent
  - type: note
    content: Le terme hébreu saraph, traditionnellement rendu par séraphin, désignait en Nb 21.6, 8 et Dt 8.15, un serpent à la morsure redoutable. Dans Es 14.29 et 30.6, ce même terme sert à désigner un serpent volant. Ici, la figure des serpents ailés au visage et aux mains d’homme, pourrait, en renvoyant à l’épisode de Nb 21, symboliser le jugement divin (v. 9-12).
  - type: text
    content: ' se tenaient debout ; chacun d’eux avait six ailes : deux ailes pour se couvrir le visage, deux autres pour se voiler le corps, et les deux dernières pour voler'
  - type: note
    content: Pour les v. 2-3, voir Ap 4.8.
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'S’adressant l’un à l’autre, ils proclamaient :'
  - type: text
    content: Saint, saint, saint est le Seigneur des armées célestes.
  - type: text
    content: Toute la terre est pleine de sa gloire.
  '4':
  - type: text
    content: Les montants des portes du Temple se mirent à trembler au son de ces voix, tandis que le sanctuaire se remplit de fumée
  - type: note
    content: Voir Ap 15.8.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Je m’écriai :'
  - type: text
    content: Malheur à moi ! Je suis perdu, car j’ai les lèvres impures et j’habite au milieu d’un peuple aux lèvres impures. Et voici que, de mes yeux, j’ai vu le Roi, le Seigneur des armées célestes.
  '6':
  - type: text
    content: Alors l’un des êtres à forme de serpent vola vers moi, il tenait à la main une braise qu’il avait prise sur l’autel
  - type: note
    content: L’autel des parfums qui se trouvait dans le lieu saint, ou plutôt l’autel des holocaustes, sur le parvis du Temple.
  - type: text
    content: ' avec des pincettes. '
  '7':
  - type: text
    content: 'Il m’en toucha la bouche, et me dit :'
  - type: text
    content: Maintenant que ceci vient d’être appliqué sur tes lèvres, ta faute est enlevée et ton péché est expié.
  '8':
  - type: text
    content: 'Et j’entendis alors le Seigneur qui disait : Qui enverrai-je ? Qui marchera pour nous ?'
  - type: text
    content: 'Alors je répondis : Je suis prêt, envoie-moi.'
  '9':
  - type: text
    content: 'Et le Seigneur me dit :'
  - type: text
    content: 'Va, et dis à ce peuple :'
  - type: text
    content: Vous aurez beau entendre,
  - type: text
    content: vous ne comprendrez pas ;
  - type: text
    content: oui, vous aurez beau voir,
  - type: text
    content: mais vous n’appréhenderez rien
  - type: note
    content: Les v. 9-10 sont cités en Mt 13.14-15 ; Mc 4.12 ; Lc 8.10 ; Jn 12.40 ; Ac 28.26-27.
  - type: text
    content: .
