document_id: ISA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel d’Esaïe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’année de la mort du roi Ozias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers 740 av. J.-C. (2 R 15.7 ; 2 Ch 26.21-23).
    marker-yv: yv-n
  - type: text
    text: ', je vis le Seigneur siégeant sur un trône très élevé. Les pans de son vêtement remplissaient le Temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Des êtres à forme de serpent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'saraph, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traditionnellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'séraphin, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désignait en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.6
        metadata:
          usfm: NUM.21.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: NUM.21.8
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 8.15
        metadata:
          usfm: DEU.8.15
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un serpent à la morsure redoutable. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 14.29
        metadata:
          usfm: ISA.14.29
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30.6'
        metadata:
          usfm: ISA.30.6
      - type: text
        text: ', ce même terme sert à désigner un serpent volant. Ici, la figure des serpents ailés au visage et aux mains d’homme, pourrait, en renvoyant à l’épisode de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21
        metadata:
          usfm: NUM.21
      - type: text
        text: ', symboliser le jugement divin (v. 9-12).'
    marker-yv: yv-n
  - type: text
    text: ' se tenaient debout ; chacun d’eux avait six ailes : deux ailes pour se couvrir le visage, deux autres pour se voiler le corps, et les deux dernières pour voler'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 2-3, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 4.8
        metadata:
          usfm: REV.4.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'S’adressant l’un à l’autre, ils proclamaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saint, saint, saint est le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute la terre est pleine de sa gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les montants des portes du Temple se mirent à trembler au son de ces voix, tandis que le sanctuaire se remplit de fumée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 15.8
        metadata:
          usfm: REV.15.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je m’écriai :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Malheur à moi ! Je suis perdu, car j’ai les lèvres impures et j’habite au milieu d’un peuple aux lèvres impures. Et voici que, de mes yeux, j’ai vu le Roi, le Seigneur des armées célestes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors l’un des êtres à forme de serpent vola vers moi, il tenait à la main une braise qu’il avait prise sur l’autel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’autel des parfums qui se trouvait dans le lieu saint, ou plutôt l’autel des holocaustes, sur le parvis du Temple.
    marker-yv: yv-n
  - type: text
    text: ' avec des pincettes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il m’en toucha la bouche, et me dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Maintenant que ceci vient d’être appliqué sur tes lèvres, ta faute est enlevée et ton péché est expié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et j’entendis alors le Seigneur qui disait : Qui enverrai-je ? Qui marchera pour nous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors je répondis : Je suis prêt, envoie-moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et le Seigneur me dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Va, et dis à ce peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous aurez beau entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous ne comprendrez pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, vous aurez beau voir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais vous n’appréhenderez rien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 9-10 sont cités en Mt 13.14-15 ; Mc 4.12 ; Lc 8.10 ; Jn 12.40 ; Ac 28.26-27.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rends ce peuple insensible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ferme-lui les oreilles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et bouche-lui les yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’il ne voie pas de ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’il n’entende pas de ses oreilles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour qu’il ne comprenne pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il ne revienne pas à moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin d’être guéri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je demandai alors : ╵Jusques à quand, Seigneur ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il me répondit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce que les villes ╵soient dévastées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et privées d’habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y ait plus personne ╵dans les maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ce territoire ╵soit réduit en désert ╵et dévasté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Eternel enverra ╵ses habitants au loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pays sera ╵à l’état d’abandon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: S’il y subsiste encore ╵un dixième du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à son tour, il sera ╵embrasé par le feu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, comme un térébinthe ╵ou comme un chêne
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui conserve sa souche, ╵quand il est abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la souche de ce peuple ╵sera une semence sainte.
