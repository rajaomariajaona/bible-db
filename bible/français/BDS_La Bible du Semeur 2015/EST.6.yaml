document_id: EST.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mardochée honoré par l’empereur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cette nuit-là, comme l’empereur n’arrivait pas à trouver le sommeil, il se fit apporter le livre des Annales
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.23'
        metadata:
          usfm: EST.2.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' relatant les événements passés et l’on en fit la lecture devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On tomba sur le passage racontant comment Mardochée avait prévenu que Bigtân et Téresh, deux eunuques de l’empereur qui faisaient partie de la garde postée à l’entrée du palais, complotaient de porter la main sur l’empereur Xerxès.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’empereur demanda : De quelle manière a-t-on honoré Mardochée et quelle distinction lui a-t-on accordée pour cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les serviteurs qui étaient en fonction auprès de lui répondirent : On n’a rien fait pour lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’empereur demanda alors : Qui est dans la cour ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’était justement Haman qui entrait dans la cour extérieure du palais impérial, pour demander à l’empereur que l’on pende Mardochée à la potence qu’il avait fait préparer pour lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les serviteurs dirent à l’empereur : C’est Haman qui se tient dans la cour.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Qu’il entre ! ordonna l’empereur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Haman entra et l’empereur lui demanda : Que faut-il faire pour un homme que l’empereur désire honorer ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En son for intérieur, Haman se dit : Quel homme l’empereur peut-il désirer honorer, sinon moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il répondit donc à l’empereur : Pour un homme que l’empereur désire honorer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: que l’on apporte un manteau de l’empereur que l’empereur a déjà porté, que l’on amène un des chevaux que l’empereur a montés, et que l’on pose sur la tête du cheval un diadème impérial
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur des monuments anciens, on voit des chevaux couronnés d’un ornement à trois pointes ressemblant à une couronne.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que l’on confie le manteau ainsi que le cheval à l’un des ministres de l’empereur, l’un des hauts dignitaires, et qu’on revête du manteau l’homme que l’empereur désire honorer, puis qu’on le fasse monter sur le cheval et qu’on le conduise ainsi sur la place de la ville en proclamant devant lui : « Voilà ce que l’empereur fait pour l’homme qu’il désire honorer ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors l’empereur dit à Haman : Dépêche-toi d’aller chercher le manteau et le cheval, comme tu l’as dit, et fais tout cela pour le Juif Mardochée, qui exerce des fonctions au palais ! N’omets rien de tout ce que tu as proposé !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Haman alla chercher le manteau et le cheval, il revêtit Mardochée du manteau, puis il le fit monter sur le cheval et le conduisit ainsi sur la grande place de la ville en proclamant devant lui : Voilà ce que l’empereur fait pour l’homme qu’il désire honorer !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ensuite, tandis que Mardochée retournait à ses fonctions au palais impérial, Haman rentra précipitamment chez lui comme en deuil et en se couvrant le visage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il raconta à Zéresh sa femme et à tous ses amis ce qui venait de lui arriver. Ses conseillers et sa femme lui dirent : Si ce Mardochée devant qui tu as commencé à être humilié est Juif, tu ne pourras rien contre lui. Tu peux être certain que tu continueras à déchoir devant lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils étaient encore en train de s’entretenir avec lui quand survinrent les envoyés de l’empereur venus faire presser Haman de se rendre au festin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On venait chercher les invités de marque à leur domicile.
    marker-yv: yv-n
  - type: text
    text: ' préparé par Esther.'
