document_id: 1SA.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fin de Saül
  - type: heading
    content: (2 S 1.4-12 ; 1 Ch 10.1-12)
  - type: text
    content: 'Les Philistins attaquaient Israël. Les soldats israélites s’enfuirent devant eux et beaucoup d’entre eux furent tués sur le mont Guilboa. '
  '10':
  - type: text
    content: Ils disposèrent les armes de Saül dans le temple de leurs déesses, les Astartés, et suspendirent son cadavre sur le rempart de Beth-Shân
  - type: note
    content: Dans la vallée du Jourdain, côté ouest, à 75 kilomètres de Jérusalem. Les Philistins avaient envahi le pays jusqu’au Jourdain.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Lorsque les habitants de Yabesh en Galaad apprirent ce que les Philistins avaient fait à Saül, '
  '12':
  - type: text
    content: 'les hommes les plus vaillants se mirent en route et marchèrent toute la nuit, ils enlevèrent le cadavre de Saül et ceux de ses fils du rempart de Beth-Shân et ils revinrent à Yabesh. Là, ils les brûlèrent. '
  '13':
  - type: text
    content: Ensuite, ils rassemblèrent les ossements et les enterrèrent sous le tamaris de Yabesh, puis ils jeûnèrent pendant sept jours
  - type: note
    content: Durée des rites de deuil (Gn 50.10). Le jeûne faisait partie de ces rites (2 S 1.12 ; 3.35).
  - type: text
    content: .
  '2':
  - type: text
    content: 'Les Philistins s’acharnèrent sur Saül et sur ses fils et ils tuèrent Jonathan, Abinadab et Malkishoua, fils de Saül. '
  '3':
  - type: text
    content: Dès lors, tout le combat se concentra sur Saül. Les archers le découvrirent et il en fut très terrifié
  - type: note
    content: 'En suivant l’ancienne version grecque qui rattache la forme verbale de l’hébreu à une autre racine, d’autres comprennent : il fut grièvement blessé par les archers.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Alors, il ordonna à celui qui portait ses armes : Dégaine ton épée et tue-moi, pour que ces incirconcis ne viennent pas me transpercer et me faire subir leurs outrages.'
  - type: text
    content: 'Mais celui-ci refusa, car il tremblait de peur. Alors Saül prit lui-même l’épée et se jeta dessus. '
  '5':
  - type: text
    content: 'Quand l’écuyer vit que Saül était mort, il se jeta lui aussi sur son arme et mourut aux côtés de son maître. '
  '6':
  - type: text
    content: Ainsi périrent ensemble, le même jour, Saül, ses trois fils, l’homme qui portait ses armes, et tous ses hommes.
  '7':
  - type: text
    content: Quand les Israélites qui habitaient de l’autre côté de la vallée
  - type: note
    content: C’est-à-dire la plaine de Jizréel ou d’Esdrelon bordée par les monts de Guilboa (28.4 ; 29.1) où les Philistins ont installé leur camp.
  - type: text
    content: ' et ceux qui s’étaient fixés au-delà du Jourdain virent que l’armée d’Israël était en déroute et que Saül et ses fils étaient morts, ils abandonnèrent les villes et prirent la fuite. Les Philistins allèrent s’y établir.'
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent sur le champ de bataille pour détrousser les cadavres. Ils découvrirent Saül et ses trois fils qui étaient tombés sur le mont Guilboa. '
  '9':
  - type: text
    content: 'Ils coupèrent la tête du roi et le dépouillèrent de ses armes. Ils firent annoncer la nouvelle de leur triomphe à travers tout le pays des Philistins, dans les temples de leurs idoles et parmi la population. '
