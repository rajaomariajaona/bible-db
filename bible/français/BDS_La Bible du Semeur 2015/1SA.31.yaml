document_id: 1SA.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de Saül
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 1.4-12 ; 1 Ch 10.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Philistins attaquaient Israël. Les soldats israélites s’enfuirent devant eux et beaucoup d’entre eux furent tués sur le mont Guilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Philistins s’acharnèrent sur Saül et sur ses fils et ils tuèrent Jonathan, Abinadab et Malkishoua, fils de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dès lors, tout le combat se concentra sur Saül. Les archers le découvrirent et il en fut très terrifié
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En suivant l’ancienne version grecque qui rattache la forme verbale de l’hébreu à une autre racine, d’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fut grièvement blessé par les archers.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors, il ordonna à celui qui portait ses armes : Dégaine ton épée et tue-moi, pour que ces incirconcis ne viennent pas me transpercer et me faire subir leurs outrages.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais celui-ci refusa, car il tremblait de peur. Alors Saül prit lui-même l’épée et se jeta dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand l’écuyer vit que Saül était mort, il se jeta lui aussi sur son arme et mourut aux côtés de son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ainsi périrent ensemble, le même jour, Saül, ses trois fils, l’homme qui portait ses armes, et tous ses hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand les Israélites qui habitaient de l’autre côté de la vallée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire la plaine de Jizréel ou d’Esdrelon bordée par les monts de Guilboa (28.4 ; 29.1) où les Philistins ont installé leur camp.
    marker-yv: yv-n
  - type: text
    text: ' et ceux qui s’étaient fixés au-delà du Jourdain virent que l’armée d’Israël était en déroute et que Saül et ses fils étaient morts, ils abandonnèrent les villes et prirent la fuite. Les Philistins allèrent s’y établir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lendemain, les Philistins vinrent sur le champ de bataille pour détrousser les cadavres. Ils découvrirent Saül et ses trois fils qui étaient tombés sur le mont Guilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils coupèrent la tête du roi et le dépouillèrent de ses armes. Ils firent annoncer la nouvelle de leur triomphe à travers tout le pays des Philistins, dans les temples de leurs idoles et parmi la population. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils disposèrent les armes de Saül dans le temple de leurs déesses, les Astartés, et suspendirent son cadavre sur le rempart de Beth-Shân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans la vallée du Jourdain, côté ouest, à 75 kilomètres de Jérusalem. Les Philistins avaient envahi le pays jusqu’au Jourdain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque les habitants de Yabesh en Galaad apprirent ce que les Philistins avaient fait à Saül, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les hommes les plus vaillants se mirent en route et marchèrent toute la nuit, ils enlevèrent le cadavre de Saül et ceux de ses fils du rempart de Beth-Shân et ils revinrent à Yabesh. Là, ils les brûlèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ensuite, ils rassemblèrent les ossements et les enterrèrent sous le tamaris de Yabesh, puis ils jeûnèrent pendant sept jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Durée des rites de deuil (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 50.10
        metadata:
          usfm: GEN.50.10
      - type: text
        text: ). Le jeûne faisait partie de ces rites (2 S 1.12 ; 3.35).
    marker-yv: yv-n
  - type: text
    text: .
