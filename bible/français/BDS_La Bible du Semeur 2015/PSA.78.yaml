document_id: PSA.78,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La main de Dieu dans l’histoire
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' d’Asaph'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '50.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple, écoute mon enseignement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois attentif à ce que je vais dire.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils n’ont pas respecté ╵l’alliance de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont refusé de suivre sa Loi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion aux désobéissances d’Ephraïm (voir Jg 1.29 ; 2.2 ; 8.1 ; 9.1-5 ; 12.2).
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils ont oublié ses exploits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hauts faits opérés sous leurs yeux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Devant leurs pères, Dieu avait fait des prodiges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux champs de Tsoân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancienne ville de la Basse-Egypte appelée aussi Tanis, située à l’est du delta du Nil, sur le chemin de l’Exode (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.22
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', au pays d’Egypte.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il a fendu la mer, et il les a fait traverser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a dressé les eaux tout comme un mur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 14.1 à 15.21.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il les guidait, le jour par la nuée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la nuit, par la lumière d’un feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 13.21-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il a fendu des rochers au désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les a abreuvés de torrents d’eau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 15-16, voir Ex 17.1-7 ; Nb 20.2-13.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Du roc, il a fait jaillir des rivières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il en a fait sortir l’eau comme un fleuve.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais ils péchaient contre lui sans arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils bravaient le Très-Haut dans le désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Par les murmures contre lui, par exemple à Mara (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 15.24
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dans leur cœur, ils ont mis Dieu au défi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en réclamant à manger à leur goût
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 18-31, voir Ex 16.2-15 ; Nb 11.4-23, 31-34.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils ont tenu des propos contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disant : « Dieu pourrait-il'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dresser une table dans le désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 21.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ? »'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J’énoncerai des propos instructifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’évoquerai des secrets du passé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 13.35
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: C’est ainsi qu’il a frappé le rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’eau a coulé, des torrents ont jailli.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Pourrait-il aussi nous donner du pain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou procurer de la viande à son peuple ? »
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L’Eternel entendit, il s’emporta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et un feu s’alluma contre Jacob :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa colère éclata contre Israël,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: car ils n’avaient pas fait confiance à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n’avaient pas compté sur son secours.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il donna ordre aux nuages d’en haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ouvrit les écluses du ciel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Pour les nourrir, il fit pleuvoir sur eux la manne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il leur donna le froment du ciel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Chacun mangea de ce pain des puissants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a traduit : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pain des anges.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu leur fournit à satiété des vivres.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il fit souffler le vent d’est dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par sa force, il fit venir le vent du sud.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il fit pleuvoir de la viande sur eux, ╵aussi abondante que la poussière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fit tomber une nuée d’oiseaux ╵aussi nombreux que le sable des mers.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il les fit tomber au milieu du camp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autour du lieu où se dressaient leurs tentes.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ils en mangèrent jusqu’à satiété.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu leur avait servi ce qu’ils voulaient.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nous avons entendu et nous savons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que nos pères nous ont raconté,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mais leur envie n’était pas assouvie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils avaient encore la viande à la bouche
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: que la colère de Dieu éclata contre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors il frappa les plus vigoureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abattant les jeunes gens d’Israël.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Malgré cela, ils ont péché encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n’ont pas eu foi, malgré ses prodiges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ils n’ont pas cru, en particulier, que Dieu pourrait leur donner la victoire sur les Cananéens (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14
        - type: text
          text: ). Comme au v. 22, l’incrédulité est le péché majeur des Israélites.
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il fit s’évanouir leurs jours ╵de façon lamentable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et terminer leurs années dans l’angoisse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La génération de l’Exode fut condamnée à mourir dans le désert (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14.22-23
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 28-35
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Dieu les frappait, ils se tournaient vers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils revenaient à lui, ╵en le suppliant instamment,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: se souvenant qu’il était leur rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le Dieu très-haut était leur libérateur.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Mais s’ils priaient, c’était pour le tromper :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les propos qu’ils lui tenaient n’étaient pas sincères,
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: car leur cœur n’était pas droit envers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à son alliance, ils n’étaient pas fidèles.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Lui, cependant, rempli de compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur pardonnait au lieu de les détruire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, bien souvent, détournait sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne voulant pas déchaîner toute sa fureur.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Il considérait qu’ils étaient fragiles :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un souffle qui passe et ne revient plus.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: nous n’allons pas le cacher à leurs descendants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous redirons à la génération suivante, ╵les œuvres glorieuses de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les puissants actes ╵et les prodiges qu’il a accomplis.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Que de fois ils se sont rebellés contre lui ╵dans le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’ont offensé dans les lieux arides
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans ce second cycle (v. 40-64), le psalmiste reprend les faits mentionnés dans le premier (v. 17-39).
      marker-yv: yv-n
    - type: text
      text: '  !'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: A nouveau, ils mettaient Dieu au défi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils attristaient le Saint d’Israël.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Car ils oubliaient son œuvre puissante :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comment il les avait sauvés de l’oppresseur,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: en Egypte, il avait fait des miracles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, au pays de Tsoân, des prodiges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 12. Les v. 44-51 reprennent partiellement le thème des plaies d’Egypte.
      marker-yv: yv-n
    - type: text
      text: ','
