        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: mouches venimeuses qui les piquaient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 8.16-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grenouilles qui causaient leur ruine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Ex 7.26 à 8.11. Pour les v. 45-48, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 9.13-35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: leurs récoltes livrées aux sauterelles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le fruit de leur labeur aux criquets
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 10.1-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: leurs vignes ravagées par des grêlons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs figuiers sous les effets du gel,
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: leurs troupeaux abandonnés à la grêle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur bétail décimé par la foudre.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Il déchaîna contre eux son ardente colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son courroux, sa fureur, et les mit en détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en envoyant une armée d’anges de malheur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il a fixé une règle en Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: établi une loi en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a ordonné à nos ancêtres ╵d’enseigner tout cela à leurs enfants,
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Il donna libre cours à sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne leur épargna pas la mort.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire, il les livra à la peste.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Il frappa tous les fils aînés d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les premiers fruits de leur virilité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de leur vigueur.
      marker-yv: yv-n
    - type: text
      text: ' ╵dans les logis de Cham'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Gn 7.13 ; 10.6-20. Selon '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.6
        - type: text
          text: ', les Egyptiens étaient les descendants de Cham, l’un des fils de Noé (cf. Ps 105.23, 27 ; 106.21-22).'
      marker-yv: yv-n
    - type: text
      text: .
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Comme un troupeau, il fit sortir son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les conduisit dans le désert, ╵tout comme un berger conduit ses brebis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 13.17-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Il les conduisit en sécurité, ╵les préservant de tout sujet de crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la mer engloutit leurs ennemis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 14.26-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Il les fit ensuite venir ╵sur son territoire sacré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les conduisit jusqu’à la montagne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le mont Sion où devait être érigé le Temple (v. 68-69).
      marker-yv: yv-n
    - type: text
      text: ' ╵qu’il s’était par lui-même acquise'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 15.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Il chassa devant eux des peuples étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il attribua à chacun par le sort, ╵une part du pays en patrimoine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il installa les tribus d’Israël ╵dans les demeures des Cananéens.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Mais ils ont voulu forcer la main ╵au Dieu très-haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se sont rebellés contre lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont pas respecté ses lois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.56 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 2.11-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Ils se sont dérobés ╵et se sont montrés traîtres ╵tout comme leurs ancêtres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne pouvait pas leur faire confiance ╵pas plus qu’à l’arc dont la flèche dévie.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Ils l’ont irrité avec leurs hauts lieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.58 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lieux consacrés à des cultes idolâtres.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par leurs idoles, ils ont provoqué ╵sa vive indignation.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Dieu l’entendit : il se mit en colère'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il prit Israël en aversion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: afin que la génération suivante ╵puisse l’apprendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les enfants qui viendront à naître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se lèvent à leur tour ╵pour l’enseigner à leurs propres enfants,
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Il délaissa sa maison de Silo
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.60 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancien sanctuaire des Israélites au temps de Josué (Jos 18.1, 8 ; 21.1-2 ; Jg 18.31 ; 1 S 1.3 ; Jr 7.12) situé dans le territoire d’Ephraïm entre Béthel et Sichem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 21.12
        - type: text
          text: ), à une quarantaine de kilomètres au nord de Jérusalem. Le coffre sacré y fut déposé jusqu’au temps du jeune Samuel (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 4.3
        - type: text
          text: '). La ville fut sans doute détruite par les Philistins (d’après les fouilles archéologiques : vers 1050 av. J.-C.).'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le tabernacle, ╵où il résidait parmi les humains.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Il laissa partir en captivité ╵le coffre sacré, trône de sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et livra aux ennemis sa splendeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.61 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 4.4-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: En colère contre les siens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abandonna son peuple à l’épée.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Le feu consuma ses adolescents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on ne chanta plus l’éloge ╵de ses jeunes mariées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.63 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit des chants nuptiaux où les jeunes filles étaient célébrées. Cela signifie qu’elles n’eurent plus l’occasion de se marier parce que les jeunes gens avaient été tués dans les batailles (cf. Es 3.25 à 4.1).
      marker-yv: yv-n
    - type: text
      text: .
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Ses prêtres périrent sous les coups de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses veuves n’eurent pas droit à des larmes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.64 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Obligées de fuir, elles ne purent pas pleurer leurs morts dans des cérémonies funèbres traditionnelles (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jb 27.15
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: Mais, tout à coup, l’Eternel intervint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel un dormeur sortant de sa torpeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel un guerrier exalté par le vin.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Il frappa ses ennemis à revers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les couvrit d’une honte éternelle.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: Il écarta la maison de Joseph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.67 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Elle est constituée par les tribus d’Ephraïm et de Manassé (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 48.1
        - type: text
          text: ) auxquelles Jacob a conféré le droit d’aînesse, mais que Dieu a écartées de cette position.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne choisit pas la tribu d’Ephraïm.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: Mais il choisit la tribu de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mont Sion qu’il prit en affection.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: C’est là qu’il édifia son sanctuaire ╵tels les lieux élevés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la terre établie pour toujours.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: afin qu’ils placent leur confiance en Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils n’oublient pas comment Dieu a agi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils observent ses commandements,
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: Il a choisi son serviteur David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il l’a tiré de ses bergeries
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78.70 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 70-71, voir 1 S 16.11-13 ; 25.7-8 ; 1 Ch 17.7.
      marker-yv: yv-n
    - type: text
      text: .
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: Il l’a pris du milieu de ses brebis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’il soit berger de Jacob, son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d’Israël qui est sa possession.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: David fut pour eux un berger intègre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui les guida d’une main avisée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: qu’ils ne ressemblent pas à leurs ancêtres,
