document_id: PSA.78,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La main de Dieu dans l’histoire
  - type: text
    content: Méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' d’Asaph'
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  - type: text
    content: Mon peuple, écoute mon enseignement,
  - type: text
    content: sois attentif à ce que je vais dire.
  '10':
  - type: text
    content: Ils n’ont pas respecté ╵l’alliance de Dieu,
  - type: text
    content: ils ont refusé de suivre sa Loi
  - type: note
    content: Allusion aux désobéissances d’Ephraïm (voir Jg 1.29 ; 2.2 ; 8.1 ; 9.1-5 ; 12.2).
  - type: text
    content: .
  '11':
  - type: text
    content: Ils ont oublié ses exploits
  - type: text
    content: et les hauts faits opérés sous leurs yeux.
  '12':
  - type: text
    content: Devant leurs pères, Dieu avait fait des prodiges
  - type: text
    content: aux champs de Tsoân
  - type: note
    content: Ancienne ville de la Basse-Egypte appelée aussi Tanis, située à l’est du delta du Nil, sur le chemin de l’Exode (Nb 13.22).
  - type: text
    content: ', au pays d’Egypte.'
  '13':
  - type: text
    content: Il a fendu la mer, et il les a fait traverser,
  - type: text
    content: il a dressé les eaux tout comme un mur
  - type: note
    content: Voir Ex 14.1 à 15.21.
  - type: text
    content: .
  '14':
  - type: text
    content: Il les guidait, le jour par la nuée,
  - type: text
    content: et la nuit, par la lumière d’un feu
  - type: note
    content: Voir Ex 13.21-22.
  - type: text
    content: .
  '15':
  - type: text
    content: Il a fendu des rochers au désert,
  - type: text
    content: et les a abreuvés de torrents d’eau
  - type: note
    content: Pour les v. 15-16, voir Ex 17.1-7 ; Nb 20.2-13.
  - type: text
    content: .
  '16':
  - type: text
    content: Du roc, il a fait jaillir des rivières,
  - type: text
    content: il en a fait sortir l’eau comme un fleuve.
  '17':
  - type: text
    content: Mais ils péchaient contre lui sans arrêt,
  - type: text
    content: ils bravaient le Très-Haut dans le désert
  - type: note
    content: Par les murmures contre lui, par exemple à Mara (Ex 15.24).
  - type: text
    content: .
  '18':
  - type: text
    content: Dans leur cœur, ils ont mis Dieu au défi
  - type: text
    content: en réclamant à manger à leur goût
  - type: note
    content: Pour les v. 18-31, voir Ex 16.2-15 ; Nb 11.4-23, 31-34.
  - type: text
    content: .
  '19':
  - type: text
    content: Ils ont tenu des propos contre lui,
  - type: text
    content: 'disant : « Dieu pourrait-il'
  - type: text
    content: dresser une table dans le désert
  - type: note
    content: Voir Nb 21.5.
  - type: text
    content: '  ? »'
  '2':
  - type: text
    content: J’énoncerai des propos instructifs,
  - type: text
    content: j’évoquerai des secrets du passé
  - type: note
    content: Cité en Mt 13.35 d’après l’ancienne version grecque.
  - type: text
    content: .
  '20':
  - type: text
    content: C’est ainsi qu’il a frappé le rocher,
  - type: text
    content: l’eau a coulé, des torrents ont jailli.
  - type: text
    content: « Pourrait-il aussi nous donner du pain
  - type: text
    content: ou procurer de la viande à son peuple ? »
  '21':
  - type: text
    content: L’Eternel entendit, il s’emporta,
  - type: text
    content: 'et un feu s’alluma contre Jacob :'
  - type: text
    content: sa colère éclata contre Israël,
  '22':
  - type: text
    content: car ils n’avaient pas fait confiance à Dieu,
  - type: text
    content: ils n’avaient pas compté sur son secours.
  '23':
  - type: text
    content: Il donna ordre aux nuages d’en haut
  - type: text
    content: et il ouvrit les écluses du ciel.
  '24':
  - type: text
    content: Pour les nourrir, il fit pleuvoir sur eux la manne
  - type: text
    content: et il leur donna le froment du ciel.
  '25':
  - type: text
    content: Chacun mangea de ce pain des puissants
  - type: note
    content: 'L’ancienne version grecque a traduit : pain des anges.'
  - type: text
    content: ','
  - type: text
    content: Dieu leur fournit à satiété des vivres.
  '26':
  - type: text
    content: Il fit souffler le vent d’est dans le ciel,
  - type: text
    content: et par sa force, il fit venir le vent du sud.
  '27':
  - type: text
    content: Il fit pleuvoir de la viande sur eux, ╵aussi abondante que la poussière.
  - type: text
    content: Il fit tomber une nuée d’oiseaux ╵aussi nombreux que le sable des mers.
  '28':
  - type: text
    content: Il les fit tomber au milieu du camp,
  - type: text
    content: autour du lieu où se dressaient leurs tentes.
  '29':
  - type: text
    content: Ils en mangèrent jusqu’à satiété.
  - type: text
    content: Dieu leur avait servi ce qu’ils voulaient.
  '3':
  - type: text
    content: Nous avons entendu et nous savons
  - type: text
    content: ce que nos pères nous ont raconté,
  '30':
  - type: text
    content: Mais leur envie n’était pas assouvie,
  - type: text
    content: ils avaient encore la viande à la bouche
  '31':
  - type: text
    content: que la colère de Dieu éclata contre eux.
  - type: text
    content: Alors il frappa les plus vigoureux,
  - type: text
    content: abattant les jeunes gens d’Israël.
  '32':
  - type: text
    content: Malgré cela, ils ont péché encore,
  - type: text
    content: ils n’ont pas eu foi, malgré ses prodiges
  - type: note
    content: Ils n’ont pas cru, en particulier, que Dieu pourrait leur donner la victoire sur les Cananéens (Nb 14). Comme au v. 22, l’incrédulité est le péché majeur des Israélites.
  - type: text
    content: .
  '33':
  - type: text
    content: Il fit s’évanouir leurs jours ╵de façon lamentable,
  - type: text
    content: et terminer leurs années dans l’angoisse
  - type: note
    content: La génération de l’Exode fut condamnée à mourir dans le désert (Nb 14.22-23, 28-35).
  - type: text
    content: .
  '34':
  - type: text
    content: Dieu les frappait, ils se tournaient vers lui,
  - type: text
    content: ils revenaient à lui, ╵en le suppliant instamment,
  '35':
  - type: text
    content: se souvenant qu’il était leur rocher,
  - type: text
    content: que le Dieu très-haut était leur libérateur.
  '36':
  - type: text
    content: 'Mais s’ils priaient, c’était pour le tromper :'
  - type: text
    content: les propos qu’ils lui tenaient n’étaient pas sincères,
  '37':
  - type: text
    content: car leur cœur n’était pas droit envers lui,
  - type: text
    content: à son alliance, ils n’étaient pas fidèles.
  '38':
  - type: text
    content: Lui, cependant, rempli de compassion,
  - type: text
    content: leur pardonnait au lieu de les détruire,
  - type: text
    content: et, bien souvent, détournait sa colère,
  - type: text
    content: ne voulant pas déchaîner toute sa fureur.
  '39':
  - type: text
    content: 'Il considérait qu’ils étaient fragiles :'
  - type: text
    content: un souffle qui passe et ne revient plus.
  '4':
  - type: text
    content: nous n’allons pas le cacher à leurs descendants.
  - type: text
    content: Nous redirons à la génération suivante, ╵les œuvres glorieuses de l’Eternel,
  - type: text
    content: les puissants actes ╵et les prodiges qu’il a accomplis.
  '40':
  - type: text
    content: Que de fois ils se sont rebellés contre lui ╵dans le désert
  - type: text
    content: et l’ont offensé dans les lieux arides
  - type: note
    content: Dans ce second cycle (v. 40-64), le psalmiste reprend les faits mentionnés dans le premier (v. 17-39).
  - type: text
    content: '  !'
  '41':
  - type: text
    content: A nouveau, ils mettaient Dieu au défi
  - type: text
    content: et ils attristaient le Saint d’Israël.
  '42':
  - type: text
    content: 'Car ils oubliaient son œuvre puissante :'
  - type: text
    content: comment il les avait sauvés de l’oppresseur,
  '43':
  - type: text
    content: en Egypte, il avait fait des miracles,
  - type: text
    content: et, au pays de Tsoân, des prodiges
  - type: note
    content: Voir note v. 12. Les v. 44-51 reprennent partiellement le thème des plaies d’Egypte.
  - type: text
    content: ','
  '44':
  - type: text
    content: canaux et rivières changés en sang,
  - type: text
    content: nul ne pouvait plus s’y désaltérer
  - type: note
    content: Voir Ex 7.14-25.
  - type: text
    content: ','
  '45':
  - type: text
    content: mouches venimeuses qui les piquaient
  - type: note
    content: Voir Ex 8.16-28.
  - type: text
    content: ','
  - type: text
    content: grenouilles qui causaient leur ruine
  - type: note
    content: Voir Ex 7.26 à 8.11. Pour les v. 45-48, voir Ex 9.13-35.
  - type: text
    content: ','
  '46':
  - type: text
    content: leurs récoltes livrées aux sauterelles
  - type: text
    content: et le fruit de leur labeur aux criquets
  - type: note
    content: Voir Ex 10.1-20.
  - type: text
    content: ','
  '47':
  - type: text
    content: leurs vignes ravagées par des grêlons
  - type: text
    content: et leurs figuiers sous les effets du gel,
  '48':
  - type: text
    content: leurs troupeaux abandonnés à la grêle
  - type: text
    content: et leur bétail décimé par la foudre.
  '49':
  - type: text
    content: Il déchaîna contre eux son ardente colère,
  - type: text
    content: son courroux, sa fureur, et les mit en détresse,
  - type: text
    content: en envoyant une armée d’anges de malheur.
  '5':
  - type: text
    content: Il a fixé une règle en Jacob,
  - type: text
    content: établi une loi en Israël,
  - type: text
    content: et il a ordonné à nos ancêtres ╵d’enseigner tout cela à leurs enfants,
  '50':
  - type: text
    content: Il donna libre cours à sa colère,
  - type: text
    content: et il ne leur épargna pas la mort.
  - type: text
    content: Au contraire, il les livra à la peste.
  '51':
  - type: text
    content: Il frappa tous les fils aînés d’Egypte,
  - type: text
    content: les premiers fruits de leur virilité
  - type: note
    content: 'Autre traduction : de leur vigueur.'
  - type: text
    content: ' ╵dans les logis de Cham'
  - type: note
    content: Voir Gn 7.13 ; 10.6-20. Selon Gn 10.6, les Egyptiens étaient les descendants de Cham, l’un des fils de Noé (cf. Ps 105.23, 27 ; 106.21-22).
  - type: text
    content: .
  '52':
  - type: text
    content: Comme un troupeau, il fit sortir son peuple
  - type: text
    content: et il les conduisit dans le désert, ╵tout comme un berger conduit ses brebis
  - type: note
    content: Voir Ex 13.17-22.
  - type: text
    content: .
  '53':
  - type: text
    content: Il les conduisit en sécurité, ╵les préservant de tout sujet de crainte,
  - type: text
    content: et la mer engloutit leurs ennemis
  - type: note
    content: Voir Ex 14.26-28.
  - type: text
    content: .
  '54':
  - type: text
    content: Il les fit ensuite venir ╵sur son territoire sacré,
  - type: text
    content: il les conduisit jusqu’à la montagne
  - type: note
    content: Le mont Sion où devait être érigé le Temple (v. 68-69).
  - type: text
    content: ' ╵qu’il s’était par lui-même acquise'
  - type: note
    content: Voir Ex 15.17.
  - type: text
    content: .
  '55':
  - type: text
    content: Il chassa devant eux des peuples étrangers,
  - type: text
    content: et il attribua à chacun par le sort, ╵une part du pays en patrimoine.
  - type: text
    content: Il installa les tribus d’Israël ╵dans les demeures des Cananéens.
  '56':
  - type: text
    content: Mais ils ont voulu forcer la main ╵au Dieu très-haut
  - type: text
    content: et ils se sont rebellés contre lui.
  - type: text
    content: Ils n’ont pas respecté ses lois
  - type: note
    content: Voir Jg 2.11-15.
  - type: text
    content: .
  '57':
  - type: text
    content: Ils se sont dérobés ╵et se sont montrés traîtres ╵tout comme leurs ancêtres.
  - type: text
    content: On ne pouvait pas leur faire confiance ╵pas plus qu’à l’arc dont la flèche dévie.
  '58':
  - type: text
    content: Ils l’ont irrité avec leurs hauts lieux
  - type: note
    content: Lieux consacrés à des cultes idolâtres.
  - type: text
    content: ','
  - type: text
    content: par leurs idoles, ils ont provoqué ╵sa vive indignation.
  '59':
  - type: text
    content: 'Dieu l’entendit : il se mit en colère'
  - type: text
    content: et il prit Israël en aversion.
  '6':
  - type: text
    content: afin que la génération suivante ╵puisse l’apprendre
  - type: text
    content: et que les enfants qui viendront à naître,
  - type: text
    content: se lèvent à leur tour ╵pour l’enseigner à leurs propres enfants,
  '60':
  - type: text
    content: Il délaissa sa maison de Silo
  - type: note
    content: 'Ancien sanctuaire des Israélites au temps de Josué (Jos 18.1, 8 ; 21.1-2 ; Jg 18.31 ; 1 S 1.3 ; Jr 7.12) situé dans le territoire d’Ephraïm entre Béthel et Sichem (Jg 21.12), à une quarantaine de kilomètres au nord de Jérusalem. Le coffre sacré y fut déposé jusqu’au temps du jeune Samuel (1 S 4.3). La ville fut sans doute détruite par les Philistins (d’après les fouilles archéologiques : vers 1050 av. J.-C.).'
  - type: text
    content: ','
  - type: text
    content: le tabernacle, ╵où il résidait parmi les humains.
  '61':
  - type: text
    content: Il laissa partir en captivité ╵le coffre sacré, trône de sa force,
  - type: text
    content: et livra aux ennemis sa splendeur
  - type: note
    content: Voir 1 S 4.4-22.
  - type: text
    content: .
  '62':
  - type: text
    content: En colère contre les siens,
  - type: text
    content: il abandonna son peuple à l’épée.
  '63':
  - type: text
    content: Le feu consuma ses adolescents,
  - type: text
    content: et l’on ne chanta plus l’éloge ╵de ses jeunes mariées
  - type: note
    content: Il s’agit des chants nuptiaux où les jeunes filles étaient célébrées. Cela signifie qu’elles n’eurent plus l’occasion de se marier parce que les jeunes gens avaient été tués dans les batailles (cf. Es 3.25 à 4.1).
  - type: text
    content: .
  '64':
  - type: text
    content: Ses prêtres périrent sous les coups de l’épée,
  - type: text
    content: ses veuves n’eurent pas droit à des larmes
  - type: note
    content: Obligées de fuir, elles ne purent pas pleurer leurs morts dans des cérémonies funèbres traditionnelles (voir Jb 27.15).
  - type: text
    content: .
  '65':
  - type: text
    content: Mais, tout à coup, l’Eternel intervint,
  - type: text
    content: tel un dormeur sortant de sa torpeur,
  - type: text
    content: tel un guerrier exalté par le vin.
  '66':
  - type: text
    content: Il frappa ses ennemis à revers,
  - type: text
    content: il les couvrit d’une honte éternelle.
  '67':
  - type: text
    content: Il écarta la maison de Joseph
  - type: note
    content: Elle est constituée par les tribus d’Ephraïm et de Manassé (Gn 48.1) auxquelles Jacob a conféré le droit d’aînesse, mais que Dieu a écartées de cette position.
  - type: text
    content: ','
  - type: text
    content: ne choisit pas la tribu d’Ephraïm.
  '68':
  - type: text
    content: Mais il choisit la tribu de Juda,
  - type: text
    content: le mont Sion qu’il prit en affection.
  '69':
  - type: text
    content: C’est là qu’il édifia son sanctuaire ╵tels les lieux élevés
  - type: text
    content: comme la terre établie pour toujours.
  '7':
  - type: text
    content: afin qu’ils placent leur confiance en Dieu,
  - type: text
    content: qu’ils n’oublient pas comment Dieu a agi
  - type: text
    content: et qu’ils observent ses commandements,
  '70':
  - type: text
    content: Il a choisi son serviteur David
  - type: text
    content: et il l’a tiré de ses bergeries
  - type: note
    content: Pour les v. 70-71, voir 1 S 16.11-13 ; 25.7-8 ; 1 Ch 17.7.
  - type: text
    content: .
  '71':
  - type: text
    content: Il l’a pris du milieu de ses brebis
  - type: text
    content: pour qu’il soit berger de Jacob, son peuple,
  - type: text
    content: et d’Israël qui est sa possession.
  '72':
  - type: text
    content: David fut pour eux un berger intègre
  - type: text
    content: qui les guida d’une main avisée.
  '8':
  - type: text
    content: qu’ils ne ressemblent pas à leurs ancêtres,
  - type: text
    content: génération indocile et rebelle,
  - type: text
    content: génération au cœur trop inconstant,
  - type: text
    content: dont l’esprit n’était pas fidèle à Dieu.
  '9':
  - type: text
    content: Les hommes d’Ephraïm, armés de l’arc,
  - type: text
    content: ont tourné le dos, au jour du combat.
