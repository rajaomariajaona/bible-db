document_id: 2CH.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’installation du coffre de l’alliance dans le Temple
  - type: text
    content: Quand tous les travaux que le roi Salomon fit exécuter pour le temple de l’Eternel furent achevés, Salomon fit apporter les objets que son père David avait consacrés
  - type: note
    content: Voir 1 Ch 18.11.
  - type: text
    content: '  : l’argent, l’or et tous les ustensiles, et il les déposa dans les trésors du temple de Dieu.'
  - type: heading
    content: (1 R 8.1-21)
  '10':
  - type: text
    content: Dans le coffre, il y avait seulement les deux tablettes que Moïse y avait placées à Horeb lorsque l’Eternel conclut une alliance avec les Israélites à leur sortie d’Egypte
  - type: note
    content: Voir Dt 10.5.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Les prêtres sortirent du lieu saint. Tous les prêtres présents s’étaient purifiés rituellement, sans tenir compte de l’ordre de passage des classes auxquelles ils appartenaient. '
  '12':
  - type: text
    content: 'Tous les lévites qui étaient musiciens se tenaient au complet du côté est de l’autel avec des cymbales, des luths et des lyres. Il y avait là Asaph, Hémân, Yedoutoun, avec leurs fils et les membres de leur parenté, tous revêtus de fin lin. Cent vingt prêtres se tenaient à leurs côtés en sonnant des trompettes. '
  '13':
  - type: text
    content: 'Les trompettistes et les musiciens jouèrent ensemble, à l’unisson, pour louer et célébrer l’Eternel. Les musiciens firent retentir les trompettes, les cymbales, et les autres instruments, et louèrent l’Eternel en chantant :'
  - type: text
    content: Car il est bon,
  - type: text
    content: car son amour ╵dure à toujours
  - type: note
    content: Voir 1 Ch 16.34 ; Esd 3.11 ; Ps 100.5 ; 107.1 ; 118.1 ; 136 ; Jr 33.11.
  - type: text
    content: .
  - type: text
    content: 'Au même moment, le temple de l’Eternel fut rempli d’une nuée. '
  '14':
  - type: text
    content: Les prêtres ne purent pas y rester pour accomplir le service, à cause de la nuée, car la gloire de l’Eternel remplissait le Temple
  - type: note
    content: Voir Ex 40.34-35.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Alors Salomon rassembla à Jérusalem tous les responsables d’Israël, tous les chefs des tribus et les chefs de familles des Israélites pour faire transporter le coffre de l’alliance de l’Eternel depuis la Cité de David, qui est Sion. '
  '3':
  - type: text
    content: Tous les hommes d’Israël s’assemblèrent auprès du roi pendant la fête des Cabanes qui a lieu au septième mois
  - type: note
    content: Voir Lv 23.33-43 ; Dt 16.13-17.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Tous les responsables d’Israël vinrent et les lévites se chargèrent de porter le coffre sacré.
  '5':
  - type: text
    content: 'Les prêtres et les lévites transportèrent le coffre ainsi que la tente de la Rencontre et tous les ustensiles sacrés qu’elle contenait. '
  '6':
  - type: text
    content: 'Le roi Salomon et toute la communauté d’Israël rassemblée auprès de lui devant le coffre offrirent en sacrifice un très grand nombre de petit et de gros bétail qu’on ne pouvait évaluer. '
  '7':
  - type: text
    content: 'Les prêtres installèrent le coffre de l’alliance de l’Eternel à la place qui lui était destinée dans la salle du fond du Temple, c’est-à-dire dans le lieu très saint, sous les ailes des chérubins. '
  '8':
  - type: text
    content: 'Les chérubins avaient leurs ailes déployées au-dessus de l’emplacement du coffre, de sorte qu’ils formaient une voûte au-dessus du coffre et de ses barres. '
  '9':
  - type: text
    content: 'On avait donné à ces barres une longueur telle que leurs extrémités se voyaient à une certaine distance du coffre sur le devant du sanctuaire intérieur, mais elles ne se voyaient pas de l’extérieur. Le coffre est resté là jusqu’à ce jour. '
