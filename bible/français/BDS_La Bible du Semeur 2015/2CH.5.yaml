document_id: 2CH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’installation du coffre de l’alliance dans le Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand tous les travaux que le roi Salomon fit exécuter pour le temple de l’Eternel furent achevés, Salomon fit apporter les objets que son père David avait consacrés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18.11
        metadata:
          usfm: 1CH.18.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : l’argent, l’or et tous les ustensiles, et il les déposa dans les trésors du temple de Dieu.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 8.1-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Salomon rassembla à Jérusalem tous les responsables d’Israël, tous les chefs des tribus et les chefs de familles des Israélites pour faire transporter le coffre de l’alliance de l’Eternel depuis la Cité de David, qui est Sion. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous les hommes d’Israël s’assemblèrent auprès du roi pendant la fête des Cabanes qui a lieu au septième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 23.33-43 ; Dt 16.13-17.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous les responsables d’Israël vinrent et les lévites se chargèrent de porter le coffre sacré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les prêtres et les lévites transportèrent le coffre ainsi que la tente de la Rencontre et tous les ustensiles sacrés qu’elle contenait. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Salomon et toute la communauté d’Israël rassemblée auprès de lui devant le coffre offrirent en sacrifice un très grand nombre de petit et de gros bétail qu’on ne pouvait évaluer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les prêtres installèrent le coffre de l’alliance de l’Eternel à la place qui lui était destinée dans la salle du fond du Temple, c’est-à-dire dans le lieu très saint, sous les ailes des chérubins. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les chérubins avaient leurs ailes déployées au-dessus de l’emplacement du coffre, de sorte qu’ils formaient une voûte au-dessus du coffre et de ses barres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On avait donné à ces barres une longueur telle que leurs extrémités se voyaient à une certaine distance du coffre sur le devant du sanctuaire intérieur, mais elles ne se voyaient pas de l’extérieur. Le coffre est resté là jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dans le coffre, il y avait seulement les deux tablettes que Moïse y avait placées à Horeb lorsque l’Eternel conclut une alliance avec les Israélites à leur sortie d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 10.5
        metadata:
          usfm: DEU.10.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les prêtres sortirent du lieu saint. Tous les prêtres présents s’étaient purifiés rituellement, sans tenir compte de l’ordre de passage des classes auxquelles ils appartenaient. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous les lévites qui étaient musiciens se tenaient au complet du côté est de l’autel avec des cymbales, des luths et des lyres. Il y avait là Asaph, Hémân, Yedoutoun, avec leurs fils et les membres de leur parenté, tous revêtus de fin lin. Cent vingt prêtres se tenaient à leurs côtés en sonnant des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les trompettistes et les musiciens jouèrent ensemble, à l’unisson, pour louer et célébrer l’Eternel. Les musiciens firent retentir les trompettes, les cymbales, et les autres instruments, et louèrent l’Eternel en chantant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour ╵dure à toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 Ch 16.34 ; Esd 3.11 ; Ps 100.5 ; 107.1 ; 118.1 ; 136 ; Jr 33.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Au même moment, le temple de l’Eternel fut rempli d’une nuée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les prêtres ne purent pas y rester pour accomplir le service, à cause de la nuée, car la gloire de l’Eternel remplissait le Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 40.34-35
        metadata:
          usfm: EXO.40.34+EXO.40.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
