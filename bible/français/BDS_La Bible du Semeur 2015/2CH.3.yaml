document_id: 2CH.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction du bâtiment à l’emplacement prévu par David
  - type: heading
    content: (1 R 6.1-29)
  - type: text
    content: Salomon commença à bâtir le temple de l’Eternel à Jérusalem, sur la colline de Moriya
  - type: note
    content: Seul passage de l’Ancien Testament qui identifie la colline de Sion avec le mont Morija où Abraham s’est rendu pour sacrifier Isaac (Gn 22.2). Pour l’apparition de l’Eternel à David, voir 2 S 24.16-17 ; 1 Ch 21.15-16.
  - type: text
    content: ' où l’Eternel était apparu à son père David, et à l’emplacement que celui-ci avait prévu sur l’aire d’Ornân, le Yebousien'
  - type: note
    content: Voir 1 Ch 21.15 à 22.1.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Pour la salle du lieu très saint, on sculpta deux chérubins et on les recouvrit d’or
  - type: note
    content: Pour les v. 10-13, voir Ex 25.18-20.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'L’envergure totale de leurs ailes était de dix mètres. L’aile de l’un, longue de deux mètres cinquante, touchait le mur de la salle, l’autre aile de deux mètres cinquante touchait celle du second chérubin. '
  '12':
  - type: text
    content: 'Celui-ci étendait une aile de deux mètres cinquante jusqu’à l’autre paroi de la salle, et son autre aile de deux mètres cinquante touchait l’aile du premier chérubin. '
  '13':
  - type: text
    content: Ainsi, les ailes déployées de ces chérubins avaient bien une envergure totale de dix mètres. Les deux chérubins étaient debout sur leurs pieds et regardaient vers la salle.
  '14':
  - type: text
    content: Salomon fit tisser le voile de fils violets, pourpres et carmins, et de lin, et il y fit broder des chérubins
  - type: note
    content: Voir Ex 26.31. Le voile, dans le Temple, était doublé d’une porte (4.22 ; 1 R 6.31).
  - type: text
    content: .
  - type: heading
    content: Les colonnes de bronze
  - type: heading
    content: (1 R 7.15-22)
  '15':
  - type: text
    content: 'Devant le Temple, il fit édifier deux colonnes hautes de dix-sept mètres surmontées d’un chapiteau de deux mètres cinquante de haut. '
  '16':
  - type: text
    content: 'Le sommet de ces colonnes était décoré de guirlandes comme celles du sanctuaire. Cent grenades étaient suspendues à ces guirlandes. '
  '17':
  - type: text
    content: Il fit ériger les colonnes sur la façade du Temple de part et d’autre de l’entrée. Salomon appela celle de droite Yakîn (Il affermit) et celle de gauche Boaz (La force est en Lui).
  '2':
  - type: text
    content: Salomon commença à bâtir le deuxième jour du deuxième mois
  - type: note
    content: L’année israélite commence en mars-avril. Le deuxième mois tombe donc en avril-mai.
  - type: text
    content: ' de la quatrième année de son règne. '
  '3':
  - type: text
    content: 'Les fondations du Temple avaient, selon l’ancienne unité de mesure, trente mètres de long et dix mètres de large. '
  '4':
  - type: text
    content: Le portique d’entrée avait dix mètres de large, comme le Temple, et dix mètres de haut
  - type: note
    content: Le texte hébreu indique 120 coudées (60 mètres de haut). Certains manuscrits des anciennes versions grecque et syriaque ont 20 coudées (10 mètres), rétablissant sans doute le chiffre primitif.
  - type: text
    content: '. Salomon le fit recouvrir intérieurement d’or pur. '
  '5':
  - type: text
    content: La grande salle
  - type: note
    content: C’est-à-dire le lieu saint.
  - type: text
    content: ' fut lambrissée de bois de cyprès et plaquée d’or pur, et on y cisela des feuilles de palmier et des guirlandes. '
  '6':
  - type: text
    content: 'Pour décorer le Temple, on incrusta des pierres précieuses ; l’or était de l’or de Parvaïm. '
  '7':
  - type: text
    content: 'Tout le Temple fut plaqué d’or : la salle, les poutres, les seuils, les parois, et les battants des portes, puis Salomon fit sculpter des chérubins sur les parois.'
  - type: heading
    content: Le lieu très saint
  '8':
  - type: text
    content: A l’intérieur, il fit construire la salle du lieu très saint
  - type: note
    content: Voir Ex 26.33-34.
  - type: text
    content: '  ; elle avait dix mètres de long, sur la largeur du Temple, et dix mètres de large. Il utilisa vingt tonnes du meilleur or pour la recouvrir. '
  '9':
  - type: text
    content: Les clous, en or, pesaient six cents grammes. Il fit aussi couvrir d’or les plafonds.
