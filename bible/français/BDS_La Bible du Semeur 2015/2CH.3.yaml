document_id: 2CH.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La construction du bâtiment à l’emplacement prévu par David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 6.1-29)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon commença à bâtir le temple de l’Eternel à Jérusalem, sur la colline de Moriya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Seul passage de l’Ancien Testament qui identifie la colline de Sion avec le mont Morija où Abraham s’est rendu pour sacrifier Isaac (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 22.2
        - type: text
          text: ). Pour l’apparition de l’Eternel à David, voir 2 S 24.16-17 ; 1 Ch 21.15-16.
      marker-yv: yv-n
    - type: text
      text: ' où l’Eternel était apparu à son père David, et à l’emplacement que celui-ci avait prévu sur l’aire d’Ornân, le Yebousien'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Ch 21.15 à 22.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour la salle du lieu très saint, on sculpta deux chérubins et on les recouvrit d’or
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-13, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.18-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’envergure totale de leurs ailes était de dix mètres. L’aile de l’un, longue de deux mètres cinquante, touchait le mur de la salle, l’autre aile de deux mètres cinquante touchait celle du second chérubin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci étendait une aile de deux mètres cinquante jusqu’à l’autre paroi de la salle, et son autre aile de deux mètres cinquante touchait l’aile du premier chérubin. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, les ailes déployées de ces chérubins avaient bien une envergure totale de dix mètres. Les deux chérubins étaient debout sur leurs pieds et regardaient vers la salle.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon fit tisser le voile de fils violets, pourpres et carmins, et de lin, et il y fit broder des chérubins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 26.31
        - type: text
          text: . Le voile, dans le Temple, était doublé d’une porte (4.22 ; 1 R 6.31).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les colonnes de bronze
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 7.15-22)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Devant le Temple, il fit édifier deux colonnes hautes de dix-sept mètres surmontées d’un chapiteau de deux mètres cinquante de haut. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sommet de ces colonnes était décoré de guirlandes comme celles du sanctuaire. Cent grenades étaient suspendues à ces guirlandes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ériger les colonnes sur la façade du Temple de part et d’autre de l’entrée. Salomon appela celle de droite Yakîn (Il affermit) et celle de gauche Boaz (La force est en Lui).
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon commença à bâtir le deuxième jour du deuxième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’année israélite commence en mars-avril. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deuxième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tombe donc en avril-mai.
      marker-yv: yv-n
    - type: text
      text: ' de la quatrième année de son règne. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fondations du Temple avaient, selon l’ancienne unité de mesure, trente mètres de long et dix mètres de large. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le portique d’entrée avait dix mètres de large, comme le Temple, et dix mètres de haut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le texte hébreu indique 120 coudées (60 mètres de haut). Certains manuscrits des anciennes versions grecque et syriaque ont 20 coudées (10 mètres), rétablissant sans doute le chiffre primitif.
      marker-yv: yv-n
    - type: text
      text: '. Salomon le fit recouvrir intérieurement d’or pur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La grande salle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le lieu saint.
      marker-yv: yv-n
    - type: text
      text: ' fut lambrissée de bois de cyprès et plaquée d’or pur, et on y cisela des feuilles de palmier et des guirlandes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour décorer le Temple, on incrusta des pierres précieuses ; l’or était de l’or de Parvaïm. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le Temple fut plaqué d’or : la salle, les poutres, les seuils, les parois, et les battants des portes, puis Salomon fit sculpter des chérubins sur les parois.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le lieu très saint
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A l’intérieur, il fit construire la salle du lieu très saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 26.33-34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; elle avait dix mètres de long, sur la largeur du Temple, et dix mètres de large. Il utilisa vingt tonnes du meilleur or pour la recouvrir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les clous, en or, pesaient six cents grammes. Il fit aussi couvrir d’or les plafonds.
