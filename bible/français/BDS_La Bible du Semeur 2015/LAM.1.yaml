document_id: LAM.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Première élégie : Jérusalem abandonnée à ses ennemis'
  - type: heading
    content: La cité endeuilléeLes chapitres 1 à 4 forment chacun un poème alphabétique (dont les strophes ou les vers débutent par l’une des lettres de l’alphabet hébreu, dans l’ordre alphabétique).
  - type: text
    content: Comme
  - type: note
    content: 'Autre traduction : hélas !'
  - type: text
    content: ' elle reste solitaire'
  - type: text
    content: la cité qui, naguère, ╵était si populeuse !
  - type: text
    content: Elle est comme une veuve !
  - type: text
    content: Elle qui était importante ╵au milieu des nations,
  - type: text
    content: princesse des provinces,
  - type: text
    content: elle est astreinte à la corvée !
  '10':
  - type: text
    content: L’ennemi a pillé
  - type: text
    content: tous ses objets précieux,
  - type: text
    content: elle a vu des gens d’autres peuples
  - type: text
    content: pénétrer dans son sanctuaire.
  - type: text
    content: 'Pourtant, tu avais dit :'
  - type: text
    content: « Ceux-là ne devront pas faire partie ╵de ta communauté. »
  '11':
  - type: text
    content: Tout son peuple gémit
  - type: text
    content: en recherchant du pain.
  - type: text
    content: Il donne ses trésors ╵contre des aliments
  - type: text
    content: pour reprendre des forces.
  - type: text
    content: « Vois, Eternel, dit-elle, ╵et considère
  - type: text
    content: l’abjection où je suis. »
  - type: heading
    content: Les plaintes de Jérusalem
  '12':
  - type: text
    content: N’êtes-vous pas touchés,
  - type: text
    content: ô vous tous qui passez par là ?
  - type: text
    content: Regardez et voyez
  - type: text
    content: s’il est une douleur ╵comparable à la mienne
  - type: text
    content: qui me fait tant souffrir.
  - type: text
    content: L’Eternel me l’a infligée
  - type: text
    content: au jour de sa colère ardente.
  '13':
  - type: text
    content: D’en haut, il a lancé un feu
  - type: text
    content: qui m’a pénétré jusqu’aux os,
  - type: text
    content: 'il a tendu ╵un filet sous mes pieds :'
  - type: text
    content: il m’a fait reculer
  - type: text
    content: et il a fait de moi ╵une désolation,
  - type: text
    content: dans la souffrance tout le jour.
  '14':
  - type: text
    content: Il a lié le joug ╵que composent mes transgressions
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : il a fixé son attention sur mes crimes.'
  - type: text
    content: ','
  - type: text
    content: sa main les a nouées ensemble,
  - type: text
    content: et elles pèsent sur mon cou.
  - type: text
    content: Il a sapé ma force.
  - type: text
    content: Le Seigneur m’a livrée ╵au pouvoir d’hommes
  - type: text
    content: auxquels je ne peux résister.
  '15':
  - type: text
    content: Oui, le Seigneur a repoussé
  - type: note
    content: 'Autre traduction : écrasé.'
  - type: text
    content: ' ╵tous les puissants guerriers'
  - type: text
    content: qui étaient dans mes murs,
  - type: text
    content: et il a fixé contre moi ╵un rendez-vous
  - type: note
    content: 'Autre traduction : il a convoqué une armée contre moi.'
  - type: text
    content: dans le but de briser ╵mes jeunes gens.
  - type: text
    content: Le Seigneur a foulé ╵comme dans un pressoir
  - type: text
    content: la population de Juda.
  '16':
  - type: text
    content: Je pleure donc sur eux ;
  - type: text
    content: j’éclate en longs sanglots,
  - type: text
    content: car le consolateur ╵qui ranimerait mon courage
  - type: text
    content: est loin de moi.
  - type: text
    content: Mes fils sont tous plongés ╵dans la désolation,
  - type: text
    content: car l’ennemi ╵a été le plus fort.
  '17':
  - type: text
    content: Sion étend les mains,
  - type: text
    content: mais nul ne la console.
  - type: text
    content: L’Eternel a donné des ordres,
  - type: text
    content: aux adversaires de Jacob, ╵pour qu’ils l’encerclent.
  - type: text
    content: Jérusalem est devenue
  - type: text
    content: un déchet à leurs yeux.
  '18':
  - type: text
    content: Mais l’Eternel est juste,
  - type: text
    content: car j’ai été rebelle ╵à ses commandements.
  - type: text
    content: Ecoutez, je vous prie, ╵vous, tous les peuples,
  - type: text
    content: 'et voyez ma douleur :'
  - type: text
    content: mes jeunes filles, ╵mes jeunes gens
  - type: text
    content: sont partis en captivité.
  '19':
  - type: text
    content: J’ai fait appel à mes amants,
  - type: text
    content: mais eux ils m’ont trahie.
  - type: text
    content: Mes prêtres et mes dirigeants
  - type: text
    content: ont péri dans la ville
  - type: text
    content: en cherchant de la nourriture
  - type: text
    content: pour reprendre des forces.
  '2':
  - type: text
    content: Tout au long de la nuit, ╵elle pleure, et ses larmes ╵ruissellent sur ses joues.
  - type: text
    content: De tous ceux qui l’aimaient,
  - type: text
    content: 'aucun ne la console :'
  - type: text
    content: tous ses compagnons
  - type: note
    content: C’est-à-dire les alliés dans lesquels elle avait placé sa confiance (voir 2 R 24.2).
  - type: text
    content: ' l’ont trahie'
  - type: text
    content: et ils sont devenus ses ennemis.
  '20':
  - type: text
    content: Regarde, ô Eternel, ╵comme je suis dans la détresse ;
  - type: text
    content: tout mon être intérieur ╵est en bouillonnement.
  - type: text
    content: Mon cœur chavire en moi
  - type: text
    content: parce que je me suis ╵gravement révoltée.
  - type: text
    content: Tandis qu’à l’extérieur ╵l’épée me prive ╵de mes enfants,
  - type: text
    content: à l’intérieur ╵c’est comme chez la mort.
  '21':
  - type: text
    content: On entend mes gémissements,
  - type: text
    content: mais nul ne me console
  - type: text
    content: et tous mes ennemis, ╵apprenant mon malheur,
  - type: text
    content: sont dans la joie, ╵car c’est toi qui as fait cela.
  - type: text
    content: Fais donc venir
  - type: note
    content: 'D’après la version syriaque. Le texte hébreu traditionnel a : tu as fait venir.'
  - type: text
    content: ' le jour ╵que tu as annoncé,'
  - type: text
    content: et que mes ennemis ╵deviennent comme moi !
  '22':
  - type: text
    content: Oh oui, tiens compte ╵de leur méchanceté,
  - type: text
    content: et traite-les
  - type: text
    content: comme tu m’as traitée
  - type: text
    content: pour punir mes forfaits,
  - type: text
    content: car il n’y a de cesse ╵à mes gémissements,
  - type: text
    content: mon cœur est affligé.
  '3':
  - type: text
    content: Juda s’en est allé ╵dans un pays d’exil, ╵accablé de misère,
  - type: text
    content: soumis à un dur esclavage.
  - type: text
    content: Le voici qui habite ╵au sein de peuples étrangers
  - type: text
    content: sans trouver la tranquillité.
  - type: text
    content: Tous ceux qui le pourchassent ╵l’atteignent
  - type: text
    content: au milieu des détresses.
  '4':
  - type: text
    content: Les chemins de Sion ╵sont plongés dans le deuil
  - type: text
    content: parce qu’il ne vient plus personne ╵pour célébrer les fêtes.
  - type: text
    content: Ses portes sont en pièces,
  - type: text
    content: ses prêtres se lamentent,
  - type: text
    content: ses jeunes filles ╵sont affligées,
  - type: text
    content: la ville est remplie d’amertume.
  '5':
  - type: text
    content: Ses oppresseurs ╵font peser leur domination sur elle,
  - type: text
    content: ses ennemis prospèrent,
  - type: text
    content: car l’Eternel l’a affligée
  - type: text
    content: pour ses nombreux péchés,
  - type: text
    content: et ses petits enfants ╵sont partis en captivité
  - type: text
    content: poussés par l’ennemi.
  '6':
  - type: text
    content: La communauté de Sion ╵a été dépouillée
  - type: text
    content: de toute sa splendeur.
  - type: text
    content: Ses ministres sont devenus ╵semblables à des cerfs
  - type: text
    content: qui ne trouvent pas de pâture,
  - type: text
    content: qui fuient à bout de forces
  - type: text
    content: devant ceux qui les traquent.
  '7':
  - type: text
    content: Aux jours de son humiliation
  - type: text
    content: et de sa vie errante,
  - type: text
    content: Jérusalem ╵se souvient des trésors
  - type: text
    content: qu’elle avait autrefois,
  - type: text
    content: maintenant que son peuple ╵est, tout entier, tombé ╵aux mains de l’oppresseur
  - type: text
    content: sans qu’il y ait personne ╵qui vienne à son secours.
  - type: text
    content: Les ennemis la voient
  - type: text
    content: et font des gorges chaudes ╵au sujet de sa destruction.
  '8':
  - type: text
    content: Voici Jérusalem ╵a gravement péché,
  - type: text
    content: c’est pourquoi elle est devenue ╵comme un déchet
  - type: note
    content: 'Autre traduction : un objet de dégoût.'
  - type: text
    content: .
  - type: text
    content: Tous ceux qui l’honoraient, ╵maintenant la méprisent,
  - type: text
    content: car ils ont vu sa nudité.
  - type: text
    content: Elle-même en gémit ╵et se détourne.
  '9':
  - type: text
    content: Son impureté apparaît ╵sur les pans de sa robe.
  - type: text
    content: Elle n’a pas songé ╵à ce qui s’ensuivrait.
  - type: text
    content: Elle est tombée, ╵sa chute est étonnante
  - type: text
    content: et nul ne la console.
  - type: text
    content: « O Eternel, dit-elle, ╵vois mon humiliation,
  - type: text
    content: car l’ennemi triomphe. »
