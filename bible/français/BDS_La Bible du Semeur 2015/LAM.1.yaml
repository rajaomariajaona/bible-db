document_id: LAM.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Première élégie : Jérusalem abandonnée à ses ennemis'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La cité endeuillée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 titre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les chapitres 1 à 4 forment chacun un poème alphabétique (dont les strophes '
        - type: usfm
          marker: em
          children:
          - type: text
            text: ou
        - type: text
          text: ' les vers débutent par l’une des lettres de l’alphabet hébreu, dans l’ordre alphabétique).'
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hélas !
      marker-yv: yv-n
    - type: text
      text: ' elle reste solitaire'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la cité qui, naguère, ╵était si populeuse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est comme une veuve !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle qui était importante ╵au milieu des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: princesse des provinces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est astreinte à la corvée !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ennemi a pillé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ses objets précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a vu des gens d’autres peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pénétrer dans son sanctuaire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourtant, tu avais dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ceux-là ne devront pas faire partie ╵de ta communauté. »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout son peuple gémit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en recherchant du pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne ses trésors ╵contre des aliments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour reprendre des forces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Vois, Eternel, dit-elle, ╵et considère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’abjection où je suis. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les plaintes de Jérusalem
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’êtes-vous pas touchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô vous tous qui passez par là ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regardez et voyez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’il est une douleur ╵comparable à la mienne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui me fait tant souffrir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel me l’a infligée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de sa colère ardente.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’en haut, il a lancé un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui m’a pénétré jusqu’aux os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il a tendu ╵un filet sous mes pieds :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’a fait reculer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a fait de moi ╵une désolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la souffrance tout le jour.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a lié le joug ╵que composent mes transgressions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a fixé son attention sur mes crimes.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main les a nouées ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles pèsent sur mon cou.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a sapé ma force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur m’a livrée ╵au pouvoir d’hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: auxquels je ne peux résister.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le Seigneur a repoussé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: écrasé.
      marker-yv: yv-n
    - type: text
      text: ' ╵tous les puissants guerriers'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui étaient dans mes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a fixé contre moi ╵un rendez-vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a convoqué une armée contre moi.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le but de briser ╵mes jeunes gens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a foulé ╵comme dans un pressoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la population de Juda.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pleure donc sur eux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’éclate en longs sanglots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le consolateur ╵qui ranimerait mon courage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est loin de moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes fils sont tous plongés ╵dans la désolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’ennemi ╵a été le plus fort.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion étend les mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais nul ne la console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a donné des ordres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux adversaires de Jacob, ╵pour qu’ils l’encerclent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem est devenue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un déchet à leurs yeux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Eternel est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j’ai été rebelle ╵à ses commandements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, je vous prie, ╵vous, tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et voyez ma douleur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes jeunes filles, ╵mes jeunes gens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont partis en captivité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai fait appel à mes amants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais eux ils m’ont trahie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes prêtres et mes dirigeants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont péri dans la ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en cherchant de la nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour reprendre des forces.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout au long de la nuit, ╵elle pleure, et ses larmes ╵ruissellent sur ses joues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous ceux qui l’aimaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'aucun ne la console :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ses compagnons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire les alliés dans lesquels elle avait placé sa confiance (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 24.2
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' l’ont trahie'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils sont devenus ses ennemis.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde, ô Eternel, ╵comme je suis dans la détresse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout mon être intérieur ╵est en bouillonnement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur chavire en moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que je me suis ╵gravement révoltée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandis qu’à l’extérieur ╵l’épée me prive ╵de mes enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l’intérieur ╵c’est comme chez la mort.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend mes gémissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais nul ne me console
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous mes ennemis, ╵apprenant mon malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont dans la joie, ╵car c’est toi qui as fait cela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais donc venir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après la version syriaque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as fait venir.
      marker-yv: yv-n
    - type: text
      text: ' le jour ╵que tu as annoncé,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que mes ennemis ╵deviennent comme moi !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh oui, tiens compte ╵de leur méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et traite-les
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme tu m’as traitée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour punir mes forfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il n’y a de cesse ╵à mes gémissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cœur est affligé.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda s’en est allé ╵dans un pays d’exil, ╵accablé de misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soumis à un dur esclavage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le voici qui habite ╵au sein de peuples étrangers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans trouver la tranquillité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui le pourchassent ╵l’atteignent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des détresses.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chemins de Sion ╵sont plongés dans le deuil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il ne vient plus personne ╵pour célébrer les fêtes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses portes sont en pièces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prêtres se lamentent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses jeunes filles ╵sont affligées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville est remplie d’amertume.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses oppresseurs ╵font peser leur domination sur elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses ennemis prospèrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel l’a affligée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ses nombreux péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses petits enfants ╵sont partis en captivité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poussés par l’ennemi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La communauté de Sion ╵a été dépouillée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toute sa splendeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses ministres sont devenus ╵semblables à des cerfs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne trouvent pas de pâture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fuient à bout de forces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant ceux qui les traquent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux jours de son humiliation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de sa vie errante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem ╵se souvient des trésors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’elle avait autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maintenant que son peuple ╵est, tout entier, tombé ╵aux mains de l’oppresseur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu’il y ait personne ╵qui vienne à son secours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ennemis la voient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et font des gorges chaudes ╵au sujet de sa destruction.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici Jérusalem ╵a gravement péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi elle est devenue ╵comme un déchet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un objet de dégoût.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui l’honoraient, ╵maintenant la méprisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont vu sa nudité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle-même en gémit ╵et se détourne.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son impureté apparaît ╵sur les pans de sa robe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’a pas songé ╵à ce qui s’ensuivrait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est tombée, ╵sa chute est étonnante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nul ne la console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « O Eternel, dit-elle, ╵vois mon humiliation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’ennemi triomphe. »
