document_id: LUK.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les premiers disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.18-22 ; Mc 1.16-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un jour, alors que Jésus se tenait sur les bords du lac de Génésareth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Appelé aussi lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: ' et que la foule se pressait autour de lui pour écouter la Parole de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'il vit deux bateaux au bord du lac. Les pêcheurs en étaient descendus et nettoyaient leurs filets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’un de ces bateaux appartenait à Simon. Jésus y monta et lui demanda de s’éloigner un peu du rivage, puis il s’assit dans le bateau et se mit à enseigner la foule.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand il eut fini de parler, il dit à Simon : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avance vers le large, en eau profonde, puis vous jetterez vos filets pour pêcher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: – Maître, lui répondit Simon, nous avons travaillé toute la nuit et nous n’avons rien pris. Mais, puisque tu me le demandes, je jetterai les filets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils les jetèrent et prirent tant de poissons que leurs filets menaçaient de se déchirer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors ils firent signe à leurs associés, dans l’autre bateau, de venir les aider. Ceux-ci arrivèrent, et l’on remplit les deux bateaux, au point qu’ils enfonçaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En voyant cela, Simon Pierre se jeta aux pieds de Jésus et lui dit : Seigneur, éloigne-toi de moi, car je suis un homme pécheur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, il était saisi d’effroi, ainsi que tous ses compagnons, devant la pêche extraordinaire qu’ils venaient de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il en était de même de Jacques et de Jean, fils de Zébédée, les associés de Simon.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus dit à Simon : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’aie pas peur ! A partir de maintenant, ce sont des hommes que tu attraperas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dès qu’ils eurent ramené leurs bateaux au rivage, ils laissèrent tout et suivirent Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit des malades et pardonne les péchés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 8.1-13 ; Mc 1.40-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un autre jour, alors qu’il se trouvait dans une ville, survint un homme couvert de lèpre. En voyant Jésus, il se prosterna devant lui, face contre terre, et lui adressa cette prière : Seigneur, si tu le veux, tu peux me rendre pur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus tendit la main et le toucha en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le veux, sois pur.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Aussitôt, la lèpre le quitta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors Jésus lui recommanda de ne le dire à personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Mais,
  - type: text
    text: ' lui dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'va te faire examiner par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' et, pour ta purification, offre ce que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Moïse
    - type: text
      text: ' a prescrit. Cela leur servira de témoignage'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cela leur prouvera qui je suis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cela prouvera à tous que tu es guéri '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cela prouvera à tous mon respect de la Loi.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La réputation de Jésus se répandait de plus en plus. Aussi, de grandes foules affluaient pour l’entendre et pour se faire guérir de leurs maladies. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais lui se retirait dans des lieux déserts pour prier.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.1-8 ; Mc 2.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un jour, il était en train d’enseigner. Des pharisiens et des enseignants de la Loi étaient assis dans l’auditoire. Ils étaient venus de tous les villages de Galilée et de Judée ainsi que de Jérusalem. La puissance du Seigneur se manifestait par les guérisons que Jésus opérait. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voilà que survinrent des hommes qui portaient un paralysé sur un brancard. Ils cherchaient à le faire entrer dans la maison pour le déposer devant Jésus '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mais ils ne trouvèrent pas moyen de parvenir jusqu’à lui, à cause de la foule. Alors ils montèrent sur le toit, ménagèrent une ouverture dans les tuiles et firent descendre le paralysé sur le brancard en plein milieu de l’assistance, juste devant Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsqu’il vit la foi de ces gens, Jésus dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon ami, tes péchés te sont pardonnés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les spécialistes de la Loi et les pharisiens se mirent à raisonner et à dire : Qui est donc cet homme qui prononce des paroles blasphématoires ? Qui peut pardonner les péchés, si ce n’est Dieu seul ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Jésus connaissait leurs raisonnements. Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi raisonnez-vous ainsi en vous-mêmes ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Qu’est-ce qui est le plus facile ? Dire : « Tes péchés te sont pardonnés », ou dire : « Lève-toi et marche » ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Eh bien, vous saurez que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' a, sur la terre, le pouvoir de pardonner les péchés.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il déclara au paralysé : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aussitôt, devant tout le monde, l’homme se leva, prit le brancard sur lequel il était couché et s’en alla chez lui en rendant gloire à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tous furent saisis de stupéfaction. Ils rendaient gloire à Dieu et, remplis de crainte, disaient : Nous avons vu aujourd’hui des choses extraordinaires !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est contesté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.9-13 ; Mc 2.13-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Après cela, Jésus s’en alla et vit, en passant, un collecteur d’impôts nommé Lévi, installé à son poste de péage. Il l’appela en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Cet homme se leva, laissa tout et suivit Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lévi organisa, dans sa maison, une grande réception en l’honneur de Jésus. De nombreuses personnes étaient à table avec eux, et, parmi elles, des collecteurs d’impôts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les pharisiens, et les spécialistes de la Loi qui appartenaient à leur parti s’indignaient et interpellèrent les disciples de Jésus : Comment pouvez-vous manger et boire avec ces collecteurs d’impôts, ces pécheurs notoires ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceux qui sont en bonne santé n’ont pas besoin de médecin, ce sont les malades qui en ont besoin.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ce ne sont pas des justes, mais des pécheurs que je suis venu appeler à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: changer
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le neuf et l’ancien
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.14-17 ; Mc 2.18-22)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Certains lui demandèrent : Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, alors que les tiens mangent et boivent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comment les invités d’une noce peuvent-ils jeûner pendant que le marié est avec eux ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le temps viendra où celui-ci leur sera enlevé. Alors, en ces jours-là, ils jeûneront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et il utilisa la parabole suivante : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne coupe un morceau d’un habit neuf pour rapiécer un vieux vêtement. Sinon on abîme l’habit neuf, et la pièce d’étoffe qu’on y aura découpée ne va pas avec le vieil habit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'De même, personne ne met dans de vieilles '
    - type: usfm
      marker: w
      children:
      - type: text
        text: outres
    - type: text
      text: ' du vin nouveau, sinon le vin nouveau les fait éclater, il se répand, et les outres sont perdues.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Non, il faut mettre le vin nouveau dans des outres neuves.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Bien sûr, quand on a bu du vin vieux, on n’en désire pas du nouveau ; en effet, on se dit : le vieux est meilleur.'
