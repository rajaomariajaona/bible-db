document_id: LUK.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les premiers disciples
  - type: heading
    content: (Mt 4.18-22 ; Mc 1.16-20)
  - type: text
    content: Un jour, alors que Jésus se tenait sur les bords du lac de Génésareth
  - type: note
    content: Appelé aussi lac de Galilée.
  - type: text
    content: ' et que la foule se pressait autour de lui pour écouter la Parole de Dieu, '
  '10':
  - type: text
    content: Il en était de même de Jacques et de Jean, fils de Zébédée, les associés de Simon.
  - type: text
    content: 'Alors Jésus dit à Simon : '
  - type: text
    content: N’aie pas peur ! A partir de maintenant, ce sont des hommes que tu attraperas.
  '11':
  - type: text
    content: Dès qu’ils eurent ramené leurs bateaux au rivage, ils laissèrent tout et suivirent Jésus.
  - type: heading
    content: Jésus guérit des malades et pardonne les péchés
  - type: heading
    content: (Mt 8.1-13 ; Mc 1.40-45)
  '12':
  - type: text
    content: 'Un autre jour, alors qu’il se trouvait dans une ville, survint un homme couvert de lèpre. En voyant Jésus, il se prosterna devant lui, face contre terre, et lui adressa cette prière : Seigneur, si tu le veux, tu peux me rendre pur.'
  '13':
  - type: text
    content: 'Jésus tendit la main et le toucha en disant : '
  - type: text
    content: Je le veux, sois pur.
  - type: text
    content: 'Aussitôt, la lèpre le quitta. '
  '14':
  - type: text
    content: Alors Jésus lui recommanda de ne le dire à personne.
  - type: text
    content: – Mais,
  - type: text
    content: ' lui dit-il, '
  - type: text
    content: 'va te faire examiner par le '
  - type: text
    content: prêtre
  - type: text
    content: ' et, pour ta purification, offre ce que '
  - type: text
    content: Moïse
  - type: text
    content: ' a prescrit. Cela leur servira de témoignage'
  - type: note
    content: 'Autres traductions : cela leur prouvera qui je suis ou cela prouvera à tous que tu es guéri ou cela prouvera à tous mon respect de la Loi.'
  - type: text
    content: .
  '15':
  - type: text
    content: 'La réputation de Jésus se répandait de plus en plus. Aussi, de grandes foules affluaient pour l’entendre et pour se faire guérir de leurs maladies. '
  '16':
  - type: text
    content: Mais lui se retirait dans des lieux déserts pour prier.
  - type: heading
    content: (Mt 9.1-8 ; Mc 2.1-12)
  '17':
  - type: text
    content: 'Un jour, il était en train d’enseigner. Des pharisiens et des enseignants de la Loi étaient assis dans l’auditoire. Ils étaient venus de tous les villages de Galilée et de Judée ainsi que de Jérusalem. La puissance du Seigneur se manifestait par les guérisons que Jésus opérait. '
  '18':
  - type: text
    content: 'Voilà que survinrent des hommes qui portaient un paralysé sur un brancard. Ils cherchaient à le faire entrer dans la maison pour le déposer devant Jésus '
  '19':
  - type: text
    content: mais ils ne trouvèrent pas moyen de parvenir jusqu’à lui, à cause de la foule. Alors ils montèrent sur le toit, ménagèrent une ouverture dans les tuiles et firent descendre le paralysé sur le brancard en plein milieu de l’assistance, juste devant Jésus.
  '2':
  - type: text
    content: 'il vit deux bateaux au bord du lac. Les pêcheurs en étaient descendus et nettoyaient leurs filets. '
  '20':
  - type: text
    content: 'Lorsqu’il vit la foi de ces gens, Jésus dit : '
  - type: text
    content: Mon ami, tes péchés te sont pardonnés.
  '21':
  - type: text
    content: 'Les spécialistes de la Loi et les pharisiens se mirent à raisonner et à dire : Qui est donc cet homme qui prononce des paroles blasphématoires ? Qui peut pardonner les péchés, si ce n’est Dieu seul ?'
  '22':
  - type: text
    content: 'Mais Jésus connaissait leurs raisonnements. Il leur dit : '
  - type: text
    content: Pourquoi raisonnez-vous ainsi en vous-mêmes ?
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Qu’est-ce qui est le plus facile ? Dire : « Tes péchés te sont pardonnés », ou dire : « Lève-toi et marche » ?'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Eh bien, vous saurez que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' a, sur la terre, le pouvoir de pardonner les péchés.'
  - type: text
    content: 'Il déclara au paralysé : '
  - type: text
    content: 'Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
  '25':
  - type: text
    content: Aussitôt, devant tout le monde, l’homme se leva, prit le brancard sur lequel il était couché et s’en alla chez lui en rendant gloire à Dieu.
  '26':
  - type: text
    content: 'Tous furent saisis de stupéfaction. Ils rendaient gloire à Dieu et, remplis de crainte, disaient : Nous avons vu aujourd’hui des choses extraordinaires !'
  - type: heading
    content: Jésus est contesté
  - type: heading
    content: (Mt 9.9-13 ; Mc 2.13-17)
  '27':
  - type: text
    content: 'Après cela, Jésus s’en alla et vit, en passant, un collecteur d’impôts nommé Lévi, installé à son poste de péage. Il l’appela en disant : '
  - type: text
    content: Suis-moi !
  '28':
  - type: text
    content: Cet homme se leva, laissa tout et suivit Jésus.
  '29':
  - type: text
    content: Lévi organisa, dans sa maison, une grande réception en l’honneur de Jésus. De nombreuses personnes étaient à table avec eux, et, parmi elles, des collecteurs d’impôts.
  '3':
  - type: text
    content: L’un de ces bateaux appartenait à Simon. Jésus y monta et lui demanda de s’éloigner un peu du rivage, puis il s’assit dans le bateau et se mit à enseigner la foule.
  '30':
  - type: text
    content: 'Les pharisiens, et les spécialistes de la Loi qui appartenaient à leur parti s’indignaient et interpellèrent les disciples de Jésus : Comment pouvez-vous manger et boire avec ces collecteurs d’impôts, ces pécheurs notoires ?'
  '31':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Ceux qui sont en bonne santé n’ont pas besoin de médecin, ce sont les malades qui en ont besoin.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Ce ne sont pas des justes, mais des pécheurs que je suis venu appeler à '
  - type: text
    content: changer
  - type: text
    content: .
  - type: heading
    content: Le neuf et l’ancien
  - type: heading
    content: (Mt 9.14-17 ; Mc 2.18-22)
  '33':
  - type: text
    content: 'Certains lui demandèrent : Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, alors que les tiens mangent et boivent.'
  '34':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Comment les invités d’une noce peuvent-ils jeûner pendant que le marié est avec eux ?
  - type: text
    content: ' '
  '35':
  - type: text
    content: Le temps viendra où celui-ci leur sera enlevé. Alors, en ces jours-là, ils jeûneront.
  '36':
  - type: text
    content: 'Et il utilisa la parabole suivante : '
  - type: text
    content: Personne ne coupe un morceau d’un habit neuf pour rapiécer un vieux vêtement. Sinon on abîme l’habit neuf, et la pièce d’étoffe qu’on y aura découpée ne va pas avec le vieil habit.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'De même, personne ne met dans de vieilles '
  - type: text
    content: outres
  - type: text
    content: ' du vin nouveau, sinon le vin nouveau les fait éclater, il se répand, et les outres sont perdues.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Non, il faut mettre le vin nouveau dans des outres neuves.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Bien sûr, quand on a bu du vin vieux, on n’en désire pas du nouveau ; en effet, on se dit : le vieux est meilleur.'
  '4':
  - type: text
    content: 'Quand il eut fini de parler, il dit à Simon : '
  - type: text
    content: Avance vers le large, en eau profonde, puis vous jetterez vos filets pour pêcher.
  '5':
  - type: text
    content: – Maître, lui répondit Simon, nous avons travaillé toute la nuit et nous n’avons rien pris. Mais, puisque tu me le demandes, je jetterai les filets.
  '6':
  - type: text
    content: 'Ils les jetèrent et prirent tant de poissons que leurs filets menaçaient de se déchirer. '
  '7':
  - type: text
    content: Alors ils firent signe à leurs associés, dans l’autre bateau, de venir les aider. Ceux-ci arrivèrent, et l’on remplit les deux bateaux, au point qu’ils enfonçaient.
  '8':
  - type: text
    content: 'En voyant cela, Simon Pierre se jeta aux pieds de Jésus et lui dit : Seigneur, éloigne-toi de moi, car je suis un homme pécheur.'
  '9':
  - type: text
    content: 'En effet, il était saisi d’effroi, ainsi que tous ses compagnons, devant la pêche extraordinaire qu’ils venaient de faire. '
