document_id: JHN.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Épilogue
  - type: heading
    content: Une pêche miraculeuse
  - type: text
    content: Quelque temps après, Jésus se montra encore aux disciples sur les bords du lac de Tibériade
  - type: note
    content: Autre nom du lac de Galilée.
  - type: text
    content: . Voici dans quelles circonstances.
  '10':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Apportez quelques-uns de ces poissons que vous venez de prendre.
  '11':
  - type: text
    content: Simon Pierre remonta dans le bateau et tira le filet à terre. Il était rempli de cent cinquante-trois gros poissons et, malgré leur grand nombre, le filet ne se déchira pas.
  '12':
  - type: text
    content: ' '
  - type: text
    content: – Venez manger,
  - type: text
    content: ' leur dit Jésus.'
  - type: text
    content: 'Aucun des disciples n’osa lui demander : « Qui es-tu ? » Ils savaient que c’était le Seigneur. '
  '13':
  - type: text
    content: Jésus s’approcha, prit le pain et le leur distribua, puis il fit de même pour le poisson.
  '14':
  - type: text
    content: C’était la troisième fois que Jésus se montrait à ses disciples, après sa résurrection.
  - type: heading
    content: 'Jésus et Pierre : l’apôtre rétabli dans sa mission'
  '15':
  - type: text
    content: 'Après le repas, Jésus s’adressa à Simon Pierre : '
  - type: text
    content: Simon, fils de Jean, m’aimes-tu plus que ne le font ceux-ci ?
  - type: text
    content: – Oui, Seigneur, répondit-il, tu connais mon amour pour toi.
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Prends soin de mes agneaux.
  '16':
  - type: text
    content: 'Puis il lui demanda une deuxième fois : '
  - type: text
    content: Simon, fils de Jean, m’aimes-tu ?
  - type: text
    content: – Oui, Seigneur, lui répondit Simon. Tu connais mon amour pour toi.
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Nourris mes brebis.
  '17':
  - type: text
    content: 'Jésus lui demanda une troisième fois : '
  - type: text
    content: Simon, fils de Jean, as-tu de l’amour pour moi ?
  - type: text
    content: 'Pierre fut peiné car c’était la troisième fois que Jésus lui demandait : '
  - type: text
    content: « As-tu de l’amour pour moi ? »
  - type: text
    content: ' Il lui répondit : Seigneur, tu sais tout, tu sais que j’ai de l’amour pour toi.'
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Prends soin de mes brebis.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Vraiment, je te l’assure : quand tu étais plus jeune, tu mettais toi-même ta ceinture et tu allais où tu voulais, mais quand tu seras vieux, tu étendras les bras, un autre nouera ta ceinture et te mènera là où tu n’aimerais pas aller.'
  '19':
  - type: text
    content: 'Par ces mots, il faisait allusion au genre de mort que Pierre allait endurer à la gloire de Dieu. Après avoir dit cela, il ajouta : '
  - type: text
    content: Suis-moi !
  '2':
  - type: text
    content: Simon Pierre, Thomas appelé le Jumeau, Nathanaël de Cana en Galilée, les fils de Zébédée et deux autres disciples se trouvaient ensemble.
  '20':
  - type: text
    content: 'Pierre se retourna et aperçut le disciple que Jésus aimait ; il marchait derrière eux. C’est ce disciple qui, au cours du repas, s’était penché vers Jésus et lui avait demandé : « Seigneur, quel est celui qui va te trahir ? »'
  '21':
  - type: text
    content: 'En le voyant, Pierre demanda à Jésus : Seigneur, qu’en est-il de lui ?'
  '22':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Si je veux qu’il reste en vie jusqu’à ce que je revienne, que t’importe ? Toi, suis-moi.
  '23':
  - type: text
    content: 'Là-dessus, le bruit courut parmi les frères que ce disciple ne mourrait pas. En fait, Jésus n’avait pas dit qu’il ne mourrait pas, mais seulement : '
  - type: text
    content: « Si je veux qu’il reste en vie jusqu’à ce que je revienne, que t’importe ? »
  '24':
  - type: text
    content: C’est ce même disciple qui témoigne de ces faits et qui les a écrits. Nous savons que son témoignage est vrai.
  '25':
  - type: text
    content: Jésus a accompli encore bien d’autres choses. Si on voulait les raconter une à une, je pense que le monde entier ne suffirait pas pour contenir tous les livres qu’il faudrait écrire.
  '3':
  - type: text
    content: 'Simon Pierre dit aux autres : Je m’en vais pêcher.'
  - type: text
    content: – Nous aussi. Nous y allons avec toi, lui dirent-ils.
  - type: text
    content: Et les voilà partis. Ils montèrent dans un bateau, mais la nuit s’écoula sans qu’ils attrapent un seul poisson.
  '4':
  - type: text
    content: 'Déjà le jour commençait à se lever, et voici : Jésus se tenait debout sur le rivage. Mais les disciples ignoraient que c’était lui. '
  '5':
  - type: text
    content: 'Il les appela : '
  - type: text
    content: Hé ! les enfants, avez-vous pris du poisson ?
  - type: text
    content: – Rien, répondirent-ils.
  '6':
  - type: text
    content: ' '
  - type: text
    content: – Jetez le filet du côté droit du bateau,
  - type: text
    content: ' leur dit-il alors, '
  - type: text
    content: et vous en trouverez.
  - type: text
    content: Ils lancèrent donc le filet et ne purent plus le remonter, tellement il y avait de poissons.
  '7':
  - type: text
    content: 'Le disciple que Jésus aimait dit alors à Pierre : C’est le Seigneur.'
  - type: text
    content: 'En entendant que c’était le Seigneur, Simon Pierre, qui avait enlevé sa tunique pour pêcher, la remit et se jeta à l’eau. '
  '8':
  - type: text
    content: Les autres disciples regagnèrent la rive avec le bateau, en remorquant le filet plein de poissons, car ils n’étaient qu’à une centaine de mètres du rivage.
  '9':
  - type: text
    content: Une fois descendus à terre, ils aperçurent un feu de braise avec du poisson dessus, et du pain.
