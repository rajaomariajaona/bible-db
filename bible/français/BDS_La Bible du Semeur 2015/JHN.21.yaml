document_id: JHN.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Épilogue
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une pêche miraculeuse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Quelque temps après, Jésus se montra encore aux disciples sur les bords du lac de Tibériade
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autre nom du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: . Voici dans quelles circonstances.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Apportez quelques-uns de ces poissons que vous venez de prendre.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Simon Pierre remonta dans le bateau et tira le filet à terre. Il était rempli de cent cinquante-trois gros poissons et, malgré leur grand nombre, le filet ne se déchira pas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Venez manger,
    - type: text
      text: ' leur dit Jésus.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun des disciples n’osa lui demander : « Qui es-tu ? » Ils savaient que c’était le Seigneur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Jésus s’approcha, prit le pain et le leur distribua, puis il fit de même pour le poisson.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’était la troisième fois que Jésus se montrait à ses disciples, après sa résurrection.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus et Pierre : l’apôtre rétabli dans sa mission'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après le repas, Jésus s’adressa à Simon Pierre : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, fils de Jean, m’aimes-tu plus que ne le font ceux-ci ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, Seigneur, répondit-il, tu connais mon amour pour toi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prends soin de mes agneaux.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Puis il lui demanda une deuxième fois : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, fils de Jean, m’aimes-tu ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, Seigneur, lui répondit Simon. Tu connais mon amour pour toi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Nourris mes brebis.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus lui demanda une troisième fois : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Simon, fils de Jean, as-tu de l’amour pour moi ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre fut peiné car c’était la troisième fois que Jésus lui demandait : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « As-tu de l’amour pour moi ? »
    - type: text
      text: ' Il lui répondit : Seigneur, tu sais tout, tu sais que j’ai de l’amour pour toi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prends soin de mes brebis.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je te l’assure : quand tu étais plus jeune, tu mettais toi-même ta ceinture et tu allais où tu voulais, mais quand tu seras vieux, tu étendras les bras, un autre nouera ta ceinture et te mènera là où tu n’aimerais pas aller.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Par ces mots, il faisait allusion au genre de mort que Pierre allait endurer à la gloire de Dieu. Après avoir dit cela, il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Simon Pierre, Thomas appelé le Jumeau, Nathanaël de Cana en Galilée, les fils de Zébédée et deux autres disciples se trouvaient ensemble.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Pierre se retourna et aperçut le disciple que Jésus aimait ; il marchait derrière eux. C’est ce disciple qui, au cours du repas, s’était penché vers Jésus et lui avait demandé : « Seigneur, quel est celui qui va te trahir ? »'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En le voyant, Pierre demanda à Jésus : Seigneur, qu’en est-il de lui ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si je veux qu’il reste en vie jusqu’à ce que je revienne, que t’importe ? Toi, suis-moi.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Là-dessus, le bruit courut parmi les frères que ce disciple ne mourrait pas. En fait, Jésus n’avait pas dit qu’il ne mourrait pas, mais seulement : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Si je veux qu’il reste en vie jusqu’à ce que je revienne, que t’importe ? »
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: C’est ce même disciple qui témoigne de ces faits et qui les a écrits. Nous savons que son témoignage est vrai.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Jésus a accompli encore bien d’autres choses. Si on voulait les raconter une à une, je pense que le monde entier ne suffirait pas pour contenir tous les livres qu’il faudrait écrire.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Simon Pierre dit aux autres : Je m’en vais pêcher.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Nous aussi. Nous y allons avec toi, lui dirent-ils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les voilà partis. Ils montèrent dans un bateau, mais la nuit s’écoula sans qu’ils attrapent un seul poisson.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Déjà le jour commençait à se lever, et voici : Jésus se tenait debout sur le rivage. Mais les disciples ignoraient que c’était lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il les appela : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Hé ! les enfants, avez-vous pris du poisson ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Rien, répondirent-ils.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Jetez le filet du côté droit du bateau,
    - type: text
      text: ' leur dit-il alors, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et vous en trouverez.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils lancèrent donc le filet et ne purent plus le remonter, tellement il y avait de poissons.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le disciple que Jésus aimait dit alors à Pierre : C’est le Seigneur.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant que c’était le Seigneur, Simon Pierre, qui avait enlevé sa tunique pour pêcher, la remit et se jeta à l’eau. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les autres disciples regagnèrent la rive avec le bateau, en remorquant le filet plein de poissons, car ils n’étaient qu’à une centaine de mètres du rivage.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Une fois descendus à terre, ils aperçurent un feu de braise avec du poisson dessus, et du pain.
