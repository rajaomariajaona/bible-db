document_id: EZK.41,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dans le Temple
  - type: text
    content: 'Le personnage me fit ensuite entrer dans la grande salle du Temple et il en mesura les piliers : ils avaient six coudées d’épaisseur de chaque côté. '
  '10':
  - type: text
    content: 'et les salles des prêtres avait vingt coudées de large, tout autour de l’édifice. '
  '11':
  - type: text
    content: 'L’entrée des salles annexes donnait sur cet espace libre par une porte au nord et une au sud. Le passage avait cinq coudées de large tout autour. '
  '12':
  - type: text
    content: Du côté ouest, il y avait un bâtiment large de soixante-dix coudées attenant à l’espace libre ; sa muraille, longue de quatre-vingt-dix coudées, avait cinq coudées d’épaisseur sur tout le pourtour.
  '13':
  - type: text
    content: 'Le personnage mesura le Temple ; longueur : cent coudées et même dimension pour l’espace libre, le bâtiment occidental et ses murailles. '
  '14':
  - type: text
    content: 'A l’est de ce bâtiment, la largeur de la façade arrière du Temple additionnée de l’espace libre était de cent coudées. '
  '15':
  - type: text
    content: Il mesura de même la longueur du bâtiment du côté de la cour arrière, y compris les galeries de chaque côté, et il trouva encore cent coudées.
  - type: heading
    content: La décoration intérieure
  - type: text
    content: 'Dans le Temple, la grande salle, le portique donnant sur le parvis, '
  '16':
  - type: text
    content: les seuils, les fenêtres grillagées et les galeries du pourtour sur trois côtés, face au seuil
  - type: note
    content: 'sur trois côtés, face au seuil: hébreu obscur et traduction incertaine.'
  - type: text
    content: ', étaient garnis d’un lambris de bois tout autour, jusqu’à la hauteur des fenêtres, et les fenêtres elles-mêmes étaient lambrissées '
  '17':
  - type: text
    content: 'jusqu’au-dessus de l’entrée et jusqu’au fond de la maison, et à l’extérieur sur tous les murs du pourtour ; à l’intérieur comme à l’extérieur, à intervalles réguliers '
  '18':
  - type: text
    content: 'on avait sculpté des chérubins et des palmiers : un palmier entre deux chérubins. Chaque chérubin avait deux faces : '
  '19':
  - type: text
    content: 'une face d’homme tournée vers l’un des palmiers et une face de lion tournée vers l’autre. Ces décorations se retrouvaient tout autour de la maison. '
  '2':
  - type: text
    content: 'La porte avait dix coudées de largeur et ses murs latéraux, de part et d’autre, cinq coudées. Il mesura la longueur de la grande salle : quarante coudées, et sa largeur : vingt coudées. '
  '20':
  - type: text
    content: Depuis le sol jusqu’au-dessus de la porte, il y avait des chérubins et des palmiers, et aussi sur les murs du Temple
  - type: note
    content: 'du Temple. Autre traduction : de la grande salle.'
  - type: text
    content: .
  '21':
  - type: text
    content: Les encadrements des portes du Temple étaient constitués par des poteaux carrés. Devant le lieu saint
  - type: note
    content: 'Ezéchiel appelle « lieu saint » ou « sanctuaire » ce qu’on appelle généralement : « lieu très saint ».'
  - type: text
    content: ', il y avait quelque chose qui ressemblait à '
  '22':
  - type: text
    content: 'un autel de bois haut de trois coudées et long de deux coudées. Ses coins, son socle et ses parois étaient en bois. Le personnage me dit : Voici la table qui est devant l’Eternel.'
  '23':
  - type: text
    content: 'La grande salle et le sanctuaire avaient chacun une double porte '
  '24':
  - type: text
    content: 'à deux battants pivotants. '
  '25':
  - type: text
    content: 'La porte de la grande salle était décorée de chérubins et de palmiers, comme les parois. A l’extérieur du portique, il y avait un auvent de bois. '
  '26':
  - type: text
    content: De chaque côté des fenêtres grillagées ainsi que sur les parois latérales du portique, sur celles des salles annexes du Temple et sur les auvents, on retrouvait les palmiers décoratifs.
  '3':
  - type: text
    content: 'Pénétrant à l’intérieur, il mesura les piliers de l’entrée : deux coudées, et l’entrée elle-même : six coudées, ses murs latéraux de chaque côté avaient sept coudées'
  - type: note
    content: 'Ses murs latéraux… sept coudées: d’après l’ancienne version grecque (cf. 40.48 et note). Le texte hébreu traditionnel a : et la largeur de l’entrée était de sept coudées.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Il mesura la longueur de la pièce : vingt coudées, et autant de largeur face à la grande salle. Puis il me dit : Cette partie est le lieu très saint.'
  '5':
  - type: text
    content: 'Ensuite il mesura l’épaisseur du mur du Temple : six coudées, et la largeur de l’édifice latéral : quatre coudées sur tout le pourtour du Temple.'
  '6':
  - type: text
    content: 'Il y avait trois étages de trente salles qui étaient soutenues par un mur construit autour du Temple, de manière à ce que ces chambres s’y encastrent, sans être encastrées dans le mur même du Temple. '
  '7':
  - type: text
    content: 'A mesure que l’on montait d’un étage à l’autre, en tournant, les salles s’élargissaient aux dépens du mur tout autour du Temple : vers le haut de la maison, il y avait donc plus d’espace. On montait de l’étage inférieur à l’étage supérieur en passant par l’étage intermédiaire. '
  '8':
  - type: text
    content: 'Je vis aussi une terrasse surélevée tout autour de l’édifice, à la base des salles annexes, qui avait la longueur d’une règle, c’est-à-dire six coudées. '
  '9':
  - type: text
    content: 'L’épaisseur du mur extérieur des chambres latérales était de cinq coudées. L’espace libre entre les salles annexes du Temple '
