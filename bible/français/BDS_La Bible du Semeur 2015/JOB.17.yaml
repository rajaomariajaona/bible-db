document_id: JOB.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les propos des amis de Job ne sont pas justes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ah ! Mon souffle s’épuise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mes jours s’éteignent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sépulcre m’attend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je suis entouré de moqueurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont l’insolence ╵tient mes yeux en éveil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Porte-toi donc toi-même ╵garant auprès de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, en dehors de toi, ╵qui me cautionnerait ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu as fermé leur esprit ╵à la raison ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi tu ne peux ╵les laisser l’emporter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: « Celui qui livre ses amis ╵pour qu’on les pille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: condamne ses enfants ╵à la misère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Celui qui… la misère, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'on pourrait traduire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on invite des amis au partage, mais on a des fils qui voient la misère.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, Dieu a fait de moi ╵celui dont tous se moquent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il m’avait établi pour dominer les peuples.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on me crache au visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A force de chagrin, ╵mes yeux se sont ternis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon corps n’est plus qu’une ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les hommes droits sont atterrés ╵par la façon dont on me traite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’innocent s’indigne ╵contre l’impie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le juste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit certainement de Job.
    marker-yv: yv-n
  - type: text
    text: ', malgré tout, ╵persiste dans sa voie ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’homme aux mains pures ╵redouble d’énergie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et quant à vous ╵revenez à la charge :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne trouverai pas ╵de sage parmi vous !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes jours sont écoulés, ╵mes projets sont anéantis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les désirs de mon cœur ╵ont avorté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils prétendent que la nuit c’est le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la lumière est proche, ╵alors que les ténèbres règnent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais que puis-je espérer ? ╵C’est le séjour des morts ╵que j’attends pour demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les ténèbres, ╵je dresserai ma couche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai crié au sépulcre : ╵« C’est toi qui es mon père ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai dit à la vermine : ╵« Vous, ma mère et mes sœurs ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Où donc est mon espoir ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon espérance, qui l’aperçoit ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle va descendre ╵derrière les barreaux ╵dans le séjour des morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand nous irons ensemble ╵dormir dans la poussière.
