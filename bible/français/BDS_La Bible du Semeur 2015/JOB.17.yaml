document_id: JOB.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les propos des amis de Job ne sont pas justes
  - type: text
    content: Ah ! Mon souffle s’épuise,
  - type: text
    content: 'mes jours s’éteignent :'
  - type: text
    content: le sépulcre m’attend.
  '10':
  - type: text
    content: 'Et quant à vous ╵revenez à la charge :'
  - type: text
    content: je ne trouverai pas ╵de sage parmi vous !
  '11':
  - type: text
    content: Mes jours sont écoulés, ╵mes projets sont anéantis,
  - type: text
    content: les désirs de mon cœur ╵ont avorté.
  '12':
  - type: text
    content: Ils prétendent que la nuit c’est le jour,
  - type: text
    content: que la lumière est proche, ╵alors que les ténèbres règnent.
  '13':
  - type: text
    content: Mais que puis-je espérer ? ╵C’est le séjour des morts ╵que j’attends pour demeure,
  - type: text
    content: dans les ténèbres, ╵je dresserai ma couche.
  '14':
  - type: text
    content: 'J’ai crié au sépulcre : ╵« C’est toi qui es mon père ! »'
  - type: text
    content: 'J’ai dit à la vermine : ╵« Vous, ma mère et mes sœurs ! »'
  '15':
  - type: text
    content: Où donc est mon espoir ?
  - type: text
    content: Mon espérance, qui l’aperçoit ?
  '16':
  - type: text
    content: Elle va descendre ╵derrière les barreaux ╵dans le séjour des morts
  - type: text
    content: quand nous irons ensemble ╵dormir dans la poussière.
  '2':
  - type: text
    content: Je suis entouré de moqueurs
  - type: text
    content: dont l’insolence ╵tient mes yeux en éveil.
  '3':
  - type: text
    content: Porte-toi donc toi-même ╵garant auprès de toi
  - type: text
    content: car, en dehors de toi, ╵qui me cautionnerait ?
  '4':
  - type: text
    content: Car tu as fermé leur esprit ╵à la raison ;
  - type: text
    content: c’est pourquoi tu ne peux ╵les laisser l’emporter.
  '5':
  - type: text
    content: « Celui qui livre ses amis ╵pour qu’on les pille,
  - type: text
    content: condamne ses enfants ╵à la misère
  - type: note
    content: 'Au lieu de : Celui qui… la misère, on pourrait traduire : on invite des amis au partage, mais on a des fils qui voient la misère.'
  - type: text
    content: . »
  '6':
  - type: text
    content: Oui, Dieu a fait de moi ╵celui dont tous se moquent
  - type: note
    content: 'Autre traduction : il m’avait établi pour dominer les peuples.'
  - type: text
    content: '  ;'
  - type: text
    content: on me crache au visage.
  '7':
  - type: text
    content: A force de chagrin, ╵mes yeux se sont ternis,
  - type: text
    content: mon corps n’est plus qu’une ombre.
  '8':
  - type: text
    content: Les hommes droits sont atterrés ╵par la façon dont on me traite,
  - type: text
    content: et l’innocent s’indigne ╵contre l’impie.
  '9':
  - type: text
    content: Le juste
  - type: note
    content: Il s’agit certainement de Job.
  - type: text
    content: ', malgré tout, ╵persiste dans sa voie ;'
  - type: text
    content: l’homme aux mains pures ╵redouble d’énergie.
