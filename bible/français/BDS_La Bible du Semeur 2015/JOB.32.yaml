document_id: JOB.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours d’Élihou
  - type: heading
    content: L’intervention d’Elihou
  - type: text
    content: 'Comme Job persistait à se considérer juste, ces trois hommes cessèrent de lui répondre. '
  '10':
  - type: text
    content: 'Ecoute-moi :'
  - type: text
    content: j’exposerai ╵moi aussi mon savoir.
  '11':
  - type: text
    content: Jusqu’ici, j’attendais, ╵j’écoutais vos discours
  - type: text
    content: et vos raisonnements
  - type: text
    content: pour vous laisser ╵critiquer ses propos.
  '12':
  - type: text
    content: Avec toute mon attention ╵je vous ai écoutés,
  - type: text
    content: mais aucun de vous trois ╵n’a pu convaincre Job,
  - type: text
    content: aucun de vous ╵n’a réfuté ses dires.
  '13':
  - type: text
    content: 'Surtout ne dites pas : ╵« Nous, nous savons ce qu’il en est :'
  - type: text
    content: Dieu seul, et non pas l’homme, ╵pourra le réfuter. »
  '14':
  - type: text
    content: Pourtant ce n’est pas contre moi ╵que Job a dirigé ╵tous ses propos.
  - type: text
    content: Je ne lui répondrai donc pas ╵avec des mots comme les vôtres.
  '15':
  - type: text
    content: Les voilà
  - type: note
    content: C’est-à-dire les trois amis de Job.
  - type: text
    content: ' tout déconcertés, ╵ils n’ont plus rien à dire.'
  - type: text
    content: Les mots leur font défaut.
  '16':
  - type: text
    content: J’ai attendu… ╵Puisqu’ils ne parlent plus,
  - type: text
    content: qu’ils ont cessé ╵de donner la réplique,
  '17':
  - type: text
    content: je veux donc, moi aussi, ╵répondre pour ma part,
  - type: text
    content: oui, moi aussi, exposer mon savoir.
  '18':
  - type: text
    content: Car je suis plein ╵de mots à dire
  - type: text
    content: et mon esprit ╵me presse de parler.
  '19':
  - type: text
    content: 'Voici : dans mon être intérieur, ╵c’est comme un vin nouveau ╵qui serait sous pression,'
  - type: text
    content: comme des outres neuves ╵sur le point d’éclater.
  '2':
  - type: text
    content: Alors Elihou, fils de Barakéel, de Bouz
  - type: note
    content: 'Bouz, frère d’Outs (Jb 1.1 ; Gn 22.21) : le pays de Bouz est mentionné dans Jr 25.23 avec Téma et Dedân comme faisant partie de l’Arabie.'
  - type: text
    content: ', et du groupe familial de Ram, se mit en colère. Il se mit en colère contre Job parce que celui-ci se disait plus juste que Dieu'
  - type: note
    content: Voir 35.2.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ainsi je parlerai ╵pour respirer à l’aise,
  - type: text
    content: j’ouvrirai donc la bouche ╵et je répliquerai.
  '21':
  - type: text
    content: Je veux être impartial
  - type: text
    content: et ne flatter personne.
  '22':
  - type: text
    content: D’ailleurs, je ne sais pas ╵l’art de la flatterie,
  - type: text
    content: et celui qui m’a fait ╵m’enlèverait bien vite.
  '3':
  - type: text
    content: Il était aussi en colère contre ses trois amis parce qu’ils n’avaient pas trouvé comment lui répondre, et qu’ils avaient ainsi condamné Dieu
  - type: note
    content: 'Les copistes juifs indiquent en marge qu’ils ont corrigé le texte original pour mettre : et qu’ils avaient ainsi condamné Job. Ces copistes voulaient éviter l’idée d’une condamnation de Dieu.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Elihou avait attendu avant de s’adresser à Job, parce que les trois amis étaient plus âgés que lui. '
  '5':
  - type: text
    content: 'Mais lorsque Elihou s’aperçut qu’ils n’avaient plus rien à lui répondre, il se mit en colère. '
  '6':
  - type: text
    content: 'Elihou, fils de Barakéel, de Bouz, prit donc la parole et dit :'
  - type: heading
    content: Elihou revendique le droit à la parole
  - type: text
    content: Moi, je suis jeune ; ╵vous, vous êtes âgés.
  - type: text
    content: C’est pourquoi j’ai eu peur,
  - type: text
    content: oui, j’ai craint de vous exposer ╵ce que je sais.
  '7':
  - type: text
    content: 'Je me disais :'
  - type: text
    content: « Ceux qui ont un âge avancé ╵sauront parler,
  - type: text
    content: l’expérience de l’âge ╵fera connaître la sagesse. »
  '8':
  - type: text
    content: Mais, en réalité, ╵en l’homme, c’est l’Esprit,
  - type: text
    content: l’inspiration du Tout-Puissant ╵qui lui donne l’intelligence.
  '9':
  - type: text
    content: Un grand nombre d’années ╵ne rend pas forcément plus sage
  - type: text
    content: et ce ne sont pas les vieillards ╵qui comprennent ce qui est juste.
