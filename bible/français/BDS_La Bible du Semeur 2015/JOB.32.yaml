document_id: JOB.32
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Discours d’Élihou
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’intervention d’Elihou
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Comme Job persistait à se considérer juste, ces trois hommes cessèrent de lui répondre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors Elihou, fils de Barakéel, de Bouz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bouz
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'frère d’Outs (Jb 1.1 ; Gn 22.21) : le pays de Bouz est mentionné dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 25.23
        metadata:
          usfm: JER.25.23
      - type: text
        text: ' avec Téma et Dedân comme faisant partie de l’Arabie.'
    marker-yv: yv-n
  - type: text
    text: ', et du groupe familial de Ram, se mit en colère. Il se mit en colère contre Job parce que celui-ci se disait plus juste que Dieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35.2'
        metadata:
          usfm: JOB.35.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il était aussi en colère contre ses trois amis parce qu’ils n’avaient pas trouvé comment lui répondre, et qu’ils avaient ainsi condamné Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les copistes juifs indiquent en marge qu’ils ont corrigé le texte original pour mettre : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et qu’ils avaient ainsi condamné Job. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces copistes voulaient éviter l’idée d’une condamnation de Dieu.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elihou avait attendu avant de s’adresser à Job, parce que les trois amis étaient plus âgés que lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais lorsque Elihou s’aperçut qu’ils n’avaient plus rien à lui répondre, il se mit en colère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elihou, fils de Barakéel, de Bouz, prit donc la parole et dit :'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihou revendique le droit à la parole
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je suis jeune ; ╵vous, vous êtes âgés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi j’ai eu peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, j’ai craint de vous exposer ╵ce que je sais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je me disais :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ceux qui ont un âge avancé ╵sauront parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’expérience de l’âge ╵fera connaître la sagesse. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais, en réalité, ╵en l’homme, c’est l’Esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’inspiration du Tout-Puissant ╵qui lui donne l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Un grand nombre d’années ╵ne rend pas forcément plus sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce ne sont pas les vieillards ╵qui comprennent ce qui est juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ecoute-moi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’exposerai ╵moi aussi mon savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jusqu’ici, j’attendais, ╵j’écoutais vos discours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos raisonnements
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour vous laisser ╵critiquer ses propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avec toute mon attention ╵je vous ai écoutés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais aucun de vous trois ╵n’a pu convaincre Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun de vous ╵n’a réfuté ses dires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Surtout ne dites pas : ╵« Nous, nous savons ce qu’il en est :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu seul, et non pas l’homme, ╵pourra le réfuter. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pourtant ce n’est pas contre moi ╵que Job a dirigé ╵tous ses propos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne lui répondrai donc pas ╵avec des mots comme les vôtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les voilà
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les trois amis de Job.
    marker-yv: yv-n
  - type: text
    text: ' tout déconcertés, ╵ils n’ont plus rien à dire.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mots leur font défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’ai attendu… ╵Puisqu’ils ne parlent plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’ils ont cessé ╵de donner la réplique,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: je veux donc, moi aussi, ╵répondre pour ma part,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, moi aussi, exposer mon savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car je suis plein ╵de mots à dire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon esprit ╵me presse de parler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici : dans mon être intérieur, ╵c’est comme un vin nouveau ╵qui serait sous pression,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des outres neuves ╵sur le point d’éclater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ainsi je parlerai ╵pour respirer à l’aise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ouvrirai donc la bouche ╵et je répliquerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je veux être impartial
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne flatter personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: D’ailleurs, je ne sais pas ╵l’art de la flatterie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui m’a fait ╵m’enlèverait bien vite.
