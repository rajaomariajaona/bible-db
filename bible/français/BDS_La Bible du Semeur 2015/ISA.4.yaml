document_id: ISA.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là, sept femmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'saisiront un seul homme ╵et elles lui diront :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nous pourvoirons ╵à notre nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à nos vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais permets seulement ╵que nous portions ton nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets fin à notre déshonneur. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut des survivants d’Israël
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce jour-là, ce que fera germer l’Eternel sera splendide et glorieux et le fruit du pays sera un magnifique sujet de fierté pour les survivants d’Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ceux qui subsisteront, ceux qui resteront à Sion seront appelés saints, tous ceux qui, à Jérusalem, seront inscrits afin d’avoir la vie. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l’Eternel aura lavé la souillure des filles de Sion et purifié Jérusalem du sang qu’on y a répandu, par le souffle du jugement, par le souffle de l’incendie, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: l’Eternel va créer sur toute l’étendue du mont Sion et sur tous ceux qui s’y assembleront, une nuée le jour, et la nuit la fumée et l’éclat de flammes de feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la traversée du désert par le peuple d’Israël (Ex 13.21 ; 24.16-17).
      marker-yv: yv-n
    - type: text
      text: '. Et au-dessus de toutes choses sa gloire sera comme un dais '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et comme une cabane
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.42-43
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' donnant de l’ombre pendant le jour pour protéger de la chaleur et servant de refuge, d’abri contre l’orage, contre la pluie.'
