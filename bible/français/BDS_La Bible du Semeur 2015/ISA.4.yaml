document_id: ISA.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: En ce jour-là, sept femmes
  - type: text
    content: 'saisiront un seul homme ╵et elles lui diront :'
  - type: text
    content: « Nous pourvoirons ╵à notre nourriture
  - type: text
    content: et à nos vêtements,
  - type: text
    content: mais permets seulement ╵que nous portions ton nom.
  - type: text
    content: Mets fin à notre déshonneur. »
  - type: heading
    content: Le salut des survivants d’Israël
  '2':
  - type: text
    content: 'En ce jour-là, ce que fera germer l’Eternel sera splendide et glorieux et le fruit du pays sera un magnifique sujet de fierté pour les survivants d’Israël. '
  '3':
  - type: text
    content: 'Alors ceux qui subsisteront, ceux qui resteront à Sion seront appelés saints, tous ceux qui, à Jérusalem, seront inscrits afin d’avoir la vie. '
  '4':
  - type: text
    content: 'Quand l’Eternel aura lavé la souillure des filles de Sion et purifié Jérusalem du sang qu’on y a répandu, par le souffle du jugement, par le souffle de l’incendie, '
  '5':
  - type: text
    content: l’Eternel va créer sur toute l’étendue du mont Sion et sur tous ceux qui s’y assembleront, une nuée le jour, et la nuit la fumée et l’éclat de flammes de feu
  - type: note
    content: Allusion à la traversée du désert par le peuple d’Israël (Ex 13.21 ; 24.16-17).
  - type: text
    content: '. Et au-dessus de toutes choses sa gloire sera comme un dais '
  '6':
  - type: text
    content: et comme une cabane
  - type: note
    content: Voir Lv 23.42-43.
  - type: text
    content: ' donnant de l’ombre pendant le jour pour protéger de la chaleur et servant de refuge, d’abri contre l’orage, contre la pluie.'
