document_id: REV.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Ouverture du premier sceau : le conquérant'
  - type: text
    content: 'Puis je vis l’Agneau ouvrir le premier des sept sceaux et j’entendis l’un des quatre êtres vivants dire d’une voix de tonnerre : Viens !'
  '10':
  - type: text
    content: 'Ils s’écrièrent d’une voix forte : Maître saint et véritable, jusques à quand tarderas-tu à juger les habitants de la terre et à leur demander compte de notre mort'
  - type: note
    content: Réminiscence de Za 1.12.
  - type: text
    content: '  ?'
  '11':
  - type: text
    content: Alors chacun d’eux reçut une tunique blanche, et il leur fut dit de patienter encore un peu de temps jusqu’à ce que soit au complet le nombre de leurs compagnons de service et de leurs frères qui allaient être mis à mort comme eux.
  - type: heading
    content: 'Ouverture du sixième sceau : le jour de la colère'
  '12':
  - type: text
    content: 'Puis je vis l’Agneau ouvrir le sixième sceau et il y eut un violent tremblement de terre. Le soleil devint noir comme une toile de sac, la lune tout entière devint rouge comme du sang. '
  '13':
  - type: text
    content: 'Les étoiles du ciel s’abattirent sur la terre, comme font les fruits verts d’un figuier secoué par un gros coup de vent. '
  '14':
  - type: text
    content: 'Le ciel se retira comme un parchemin qu’on enroule, et toutes les montagnes et toutes les îles furent enlevées de leur place. '
  '15':
  - type: text
    content: 'Les rois de la terre et les hauts dignitaires, les chefs militaires, les riches et les puissants, tous les esclaves et tous les hommes libres, allèrent se cacher au fond des cavernes et parmi les rochers des montagnes. '
  '16':
  - type: text
    content: 'Ils criaient aux montagnes et aux rochers : Tombez sur nous et cachez-nous loin du regard de celui qui siège sur le trône, loin de la colère de l’Agneau. '
  '17':
  - type: text
    content: Car le grand jour de leur colère est arrivé, et qui peut subsister ?
  '2':
  - type: text
    content: Et je vis venir un cheval blanc. Son cavalier
  - type: note
    content: La vision des v. 2-9 est inspirée de Za 1.8 ; 6.1-8.
  - type: text
    content: ' était armé d’un arc. Une couronne lui fut donnée, et il partit en vainqueur et pour vaincre.'
  - type: heading
    content: 'Ouverture du deuxième sceau : la guerre'
  '3':
  - type: text
    content: 'Quand l’Agneau ouvrit le deuxième sceau, j’entendis le deuxième être vivant dire : Viens ! '
  '4':
  - type: text
    content: 'Un autre cheval sortit : il était rouge feu. Son cavalier reçut le pouvoir de bannir la paix de la terre pour que les hommes s’entretuent, et une grande épée lui fut donnée.'
  - type: heading
    content: 'Ouverture du troisième sceau : la famine'
  '5':
  - type: text
    content: 'Quand l’Agneau ouvrit le troisième sceau, j’entendis le troisième être vivant dire : Viens !'
  - type: text
    content: 'Et je vis venir un cheval noir. Son cavalier tenait une balance dans la main. '
  '6':
  - type: text
    content: 'Et j’entendis comme une voix venant du milieu des quatre êtres vivants ; elle disait : Un litre de blé au prix d’une journée de travail'
  - type: note
    content: On a estimé que cela représentait environ dix fois le prix normal.
  - type: text
    content: ' et trois litres d’orge pour le même prix. Quant à l’huile et au vin, épargne-les !'
  - type: heading
    content: 'Ouverture du quatrième sceau : la mort'
  '7':
  - type: text
    content: 'Quand l’Agneau ouvrit le quatrième sceau, j’entendis la voix du quatrième être vivant dire : Viens !'
  '8':
  - type: text
    content: Et je vis venir un cheval blême. Son cavalier s’appelle « La Mort » et il était suivi du séjour des morts. Il leur fut donné le pouvoir sur le quart de la terre de faire périr les hommes par l’épée, la famine, les épidémies et les bêtes féroces.
  - type: heading
    content: 'Ouverture du cinquième sceau : vision des martyrs'
  '9':
  - type: text
    content: 'Quand l’Agneau ouvrit le cinquième sceau, je vis, sous l’autel, les âmes de ceux qui avaient été égorgés à cause de leur fidélité à la Parole de Dieu et du témoignage qu’ils avaient rendu. '
