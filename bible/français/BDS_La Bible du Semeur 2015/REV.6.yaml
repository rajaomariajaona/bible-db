document_id: REV.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du premier sceau : le conquérant'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis l’Agneau ouvrir le premier des sept sceaux et j’entendis l’un des quatre êtres vivants dire d’une voix de tonnerre : Viens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et je vis venir un cheval blanc. Son cavalier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La vision des v. 2-9 est inspirée de Za 1.8 ; 6.1-8.
    marker-yv: yv-n
  - type: text
    text: ' était armé d’un arc. Une couronne lui fut donnée, et il partit en vainqueur et pour vaincre.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du deuxième sceau : la guerre'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand l’Agneau ouvrit le deuxième sceau, j’entendis le deuxième être vivant dire : Viens ! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Un autre cheval sortit : il était rouge feu. Son cavalier reçut le pouvoir de bannir la paix de la terre pour que les hommes s’entretuent, et une grande épée lui fut donnée.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du troisième sceau : la famine'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand l’Agneau ouvrit le troisième sceau, j’entendis le troisième être vivant dire : Viens !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et je vis venir un cheval noir. Son cavalier tenait une balance dans la main. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et j’entendis comme une voix venant du milieu des quatre êtres vivants ; elle disait : Un litre de blé au prix d’une journée de travail'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On a estimé que cela représentait environ dix fois le prix normal.
    marker-yv: yv-n
  - type: text
    text: ' et trois litres d’orge pour le même prix. Quant à l’huile et au vin, épargne-les !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du quatrième sceau : la mort'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand l’Agneau ouvrit le quatrième sceau, j’entendis la voix du quatrième être vivant dire : Viens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et je vis venir un cheval blême. Son cavalier s’appelle « La Mort » et il était suivi du séjour des morts. Il leur fut donné le pouvoir sur le quart de la terre de faire périr les hommes par l’épée, la famine, les épidémies et les bêtes féroces.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du cinquième sceau : vision des martyrs'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand l’Agneau ouvrit le cinquième sceau, je vis, sous l’autel, les âmes de ceux qui avaient été égorgés à cause de leur fidélité à la Parole de Dieu et du témoignage qu’ils avaient rendu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils s’écrièrent d’une voix forte : Maître saint et véritable, jusques à quand tarderas-tu à juger les habitants de la terre et à leur demander compte de notre mort'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 1.12
        metadata:
          usfm: ZEC.1.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors chacun d’eux reçut une tunique blanche, et il leur fut dit de patienter encore un peu de temps jusqu’à ce que soit au complet le nombre de leurs compagnons de service et de leurs frères qui allaient être mis à mort comme eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ouverture du sixième sceau : le jour de la colère'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis je vis l’Agneau ouvrir le sixième sceau et il y eut un violent tremblement de terre. Le soleil devint noir comme une toile de sac, la lune tout entière devint rouge comme du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les étoiles du ciel s’abattirent sur la terre, comme font les fruits verts d’un figuier secoué par un gros coup de vent. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le ciel se retira comme un parchemin qu’on enroule, et toutes les montagnes et toutes les îles furent enlevées de leur place. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les rois de la terre et les hauts dignitaires, les chefs militaires, les riches et les puissants, tous les esclaves et tous les hommes libres, allèrent se cacher au fond des cavernes et parmi les rochers des montagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils criaient aux montagnes et aux rochers : Tombez sur nous et cachez-nous loin du regard de celui qui siège sur le trône, loin de la colère de l’Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car le grand jour de leur colère est arrivé, et qui peut subsister ?
