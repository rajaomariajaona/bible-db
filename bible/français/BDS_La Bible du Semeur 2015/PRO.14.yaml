document_id: PRO.14,21
type_code: fra
verses:
  '1':
  - type: text
    content: Une femme pleine de sagesse construit sa maison,
  - type: text
    content: mais celle qui est insensée la renverse de ses propres mains.
  '10':
  - type: text
    content: Le cœur connaît son propre chagrin,
  - type: text
    content: et personne ne peut partager sa joie.
  '11':
  - type: text
    content: La maison des méchants sera détruite,
  - type: text
    content: mais la demeure des gens droits sera florissante
  - type: note
    content: Voir 3.33.
  - type: text
    content: .
  '12':
  - type: text
    content: Bien des hommes pensent être sur le bon chemin,
  - type: text
    content: et pourtant, ils se trouvent sur une voie qui, finalement, mène à la mort.
  '13':
  - type: text
    content: Le rire peut masquer la tristesse du cœur,
  - type: text
    content: et la gaieté peut finir en chagrin.
  '14':
  - type: text
    content: L’homme au cœur perfide sera gavé des fruits de sa conduite,
  - type: text
    content: mais l’homme de bien jouira des fruits de la sienne
  - type: note
    content: 'Autre traduction : mais la situation de l’homme de bien est meilleure que la sienne (ou supérieure à la sienne).'
  - type: text
    content: .
  '15':
  - type: text
    content: L’inexpérimenté croit tout ce qu’on lui dit,
  - type: text
    content: mais l’homme réfléchi avance avec prudence.
  '16':
  - type: text
    content: Le sage craint le mal et s’en écarte,
  - type: text
    content: mais l’insensé, sûr de lui, s’emporte.
  '17':
  - type: text
    content: L’homme coléreux fait des sottises ;
  - type: text
    content: qui a de mauvais desseins s’attire la haine.
  '18':
  - type: text
    content: La folie, voilà ce qu’héritent ceux qui manquent d’expérience,
  - type: text
    content: mais la connaissance est la couronne des gens réfléchis.
  '19':
  - type: text
    content: Les méchants auront à baisser la tête devant ceux qui sont bons,
  - type: text
    content: et les hommes mauvais à la porte des justes.
  '2':
  - type: text
    content: Qui craint l’Eternel se conduit avec droiture,
  - type: text
    content: qui le méprise emprunte des voies perverses.
  '20':
  - type: text
    content: Personne n’aime le pauvre, même pas son compagnon,
  - type: text
    content: mais le riche a beaucoup d’amis.
  '21':
  - type: text
    content: Qui méprise son prochain commet une faute,
  - type: text
    content: mais heureux celui qui a compassion des affligés.
  '22':
  - type: text
    content: Ceux qui manigancent le mal font fausse route,
  - type: text
    content: mais ceux qui projettent le bien trouvent l’amour véritable.
  '23':
  - type: text
    content: A tout travail il y a du profit,
  - type: text
    content: mais le bavardage mène au dénuement.
  '24':
  - type: text
    content: La richesse des sages est leur couronne,
  - type: text
    content: mais la folie des insensés reste de la folie.
  '25':
  - type: text
    content: Un témoin véridique sauve des vies
  - type: note
    content: Celles des accusés traduits injustement devant les tribunaux et calomniés par leurs accusateurs.
  - type: text
    content: ','
  - type: text
    content: mais qui profère des mensonges est un trompeur.
  '26':
  - type: text
    content: Celui qui craint l’Eternel possède une solide assurance,
  - type: text
    content: et il sera un refuge pour ses enfants
  - type: note
    content: Pour les v. 26-27, voir 10.27.
  - type: text
    content: .
  '27':
  - type: text
    content: La crainte de l’Eternel est une source de vie,
  - type: text
    content: elle fait éviter les pièges de la mort.
  '28':
  - type: text
    content: La gloire d’un roi dépend du nombre de ses sujets,
  - type: text
    content: et la dépopulation ruine le prince.
  '29':
  - type: text
    content: Celui qui garde son sang-froid fait preuve d’une grande intelligence,
  - type: text
    content: mais l’homme coléreux étale sa sottise.
  '3':
  - type: text
    content: C’est par ses propres paroles que le sot est puni de son orgueil,
  - type: text
    content: mais les paroles des sages sont leur sauvegarde.
  '30':
  - type: text
    content: Un cœur paisible contribue à la vie du corps ;
  - type: text
    content: mais l’envie est comme une maladie qui ronge les os.
  '31':
  - type: text
    content: Opprimer le pauvre, c’est outrager son Créateur,
  - type: text
    content: mais avoir de la compassion pour les indigents, c’est l’honorer.
  '32':
  - type: text
    content: Le méchant est terrassé par sa perversité,
  - type: text
    content: mais le juste reste plein de confiance jusque dans la mort
  - type: note
    content: 'L’ancienne version grecque et la syriaque ont lu : mais l’intégrité du juste est pour lui source d’assurance, ce qui suppose une simple inversion de deux lettres du texte hébreu traditionnel.'
  - type: text
    content: .
  '33':
  - type: text
    content: 'La sagesse repose dans un esprit intelligent :'
  - type: text
    content: elle sera reconnue même parmi les sots
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque et la version syriaque ont : mais le cœur des sots ne la connaît pas.'
  - type: text
    content: .
  '34':
  - type: text
    content: La justice grandit une nation,
  - type: text
    content: mais le péché est une honte pour tout peuple.
  '35':
  - type: text
    content: Le roi accorde sa faveur à ceux qui le servent avec intelligence,
  - type: text
    content: mais sa colère atteint celui qui fait honte.
  '4':
  - type: text
    content: Là où il n’y a pas de bétail, la mangeoire reste nette,
  - type: text
    content: mais la vigueur des bœufs assure d’abondants revenus.
  '5':
  - type: text
    content: Un témoin honnête ne ment pas ;
  - type: text
    content: mais le faux témoin profère des mensonges.
  '6':
  - type: text
    content: 'Le moqueur a beau chercher la sagesse : elle lui échappe,'
  - type: text
    content: alors que la connaissance est facilement à la portée de l’homme de bon sens.
  '7':
  - type: text
    content: Eloigne-toi de l’insensé,
  - type: text
    content: car il n’a aucun savoir à te communiquer.
  '8':
  - type: text
    content: La sagesse de l’homme réfléchi lui fait discerner sa voie
  - type: note
    content: 'Autre traduction : le rend attentif à sa conduite.'
  - type: text
    content: ','
  - type: text
    content: mais la folie des insensés les égare.
  '9':
  - type: text
    content: 'Réparer un tort : les insensés s’en moquent,'
  - type: text
    content: mais entre gens droits, la bonne volonté l’emporte
  - type: note
    content: 'Autres traductions : mais les justes ont de la bonne volonté ou mais les justes cherchent à obtenir la faveur.'
  - type: text
    content: .
