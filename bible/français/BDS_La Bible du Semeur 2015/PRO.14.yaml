document_id: PRO.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Une femme pleine de sagesse construit sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celle qui est insensée la renverse de ses propres mains.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le cœur connaît son propre chagrin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne peut partager sa joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La maison des méchants sera détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la demeure des gens droits sera florissante
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.33'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Bien des hommes pensent être sur le bon chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pourtant, ils se trouvent sur une voie qui, finalement, mène à la mort.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le rire peut masquer la tristesse du cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la gaieté peut finir en chagrin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’homme au cœur perfide sera gavé des fruits de sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme de bien jouira des fruits de la sienne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais la situation de l’homme de bien est meilleure que la sienne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: supérieure à la sienne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’inexpérimenté croit tout ce qu’on lui dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme réfléchi avance avec prudence.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le sage craint le mal et s’en écarte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’insensé, sûr de lui, s’emporte.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’homme coléreux fait des sottises ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a de mauvais desseins s’attire la haine.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: La folie, voilà ce qu’héritent ceux qui manquent d’expérience,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la connaissance est la couronne des gens réfléchis.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les méchants auront à baisser la tête devant ceux qui sont bons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hommes mauvais à la porte des justes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Qui craint l’Eternel se conduit avec droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui le méprise emprunte des voies perverses.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Personne n’aime le pauvre, même pas son compagnon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le riche a beaucoup d’amis.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Qui méprise son prochain commet une faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais heureux celui qui a compassion des affligés.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ceux qui manigancent le mal font fausse route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui projettent le bien trouvent l’amour véritable.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: A tout travail il y a du profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le bavardage mène au dénuement.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: La richesse des sages est leur couronne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la folie des insensés reste de la folie.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Un témoin véridique sauve des vies
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Celles des accusés traduits injustement devant les tribunaux et calomniés par leurs accusateurs.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui profère des mensonges est un trompeur.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Celui qui craint l’Eternel possède une solide assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il sera un refuge pour ses enfants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 26-27, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.27'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: La crainte de l’Eternel est une source de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle fait éviter les pièges de la mort.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: La gloire d’un roi dépend du nombre de ses sujets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la dépopulation ruine le prince.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Celui qui garde son sang-froid fait preuve d’une grande intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme coléreux étale sa sottise.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est par ses propres paroles que le sot est puni de son orgueil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les paroles des sages sont leur sauvegarde.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Un cœur paisible contribue à la vie du corps ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’envie est comme une maladie qui ronge les os.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Opprimer le pauvre, c’est outrager son Créateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais avoir de la compassion pour les indigents, c’est l’honorer.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Le méchant est terrassé par sa perversité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le juste reste plein de confiance jusque dans la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et la syriaque ont lu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais l’intégrité du juste est pour lui source d’assurance, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui suppose une simple inversion de deux lettres du texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'La sagesse repose dans un esprit intelligent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle sera reconnue même parmi les sots
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais le cœur des sots ne la connaît pas.
      marker-yv: yv-n
    - type: text
      text: .
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: La justice grandit une nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le péché est une honte pour tout peuple.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Le roi accorde sa faveur à ceux qui le servent avec intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sa colère atteint celui qui fait honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Là où il n’y a pas de bétail, la mangeoire reste nette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la vigueur des bœufs assure d’abondants revenus.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Un témoin honnête ne ment pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le faux témoin profère des mensonges.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le moqueur a beau chercher la sagesse : elle lui échappe,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que la connaissance est facilement à la portée de l’homme de bon sens.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Eloigne-toi de l’insensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il n’a aucun savoir à te communiquer.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La sagesse de l’homme réfléchi lui fait discerner sa voie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le rend attentif à sa conduite.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la folie des insensés les égare.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Réparer un tort : les insensés s’en moquent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais entre gens droits, la bonne volonté l’emporte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais les justes ont de la bonne volonté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais les justes cherchent à obtenir la faveur.
      marker-yv: yv-n
    - type: text
      text: .
