document_id: PRO.18,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'L’original suit son bon plaisir :'
  - type: text
    content: il s’insurgera contre tout ce qui est raisonnable.
  '10':
  - type: text
    content: 'L’Eternel est comme un donjon bien fortifié :'
  - type: text
    content: le juste y accourt et il y est en sécurité.
  '11':
  - type: text
    content: La fortune du riche lui tient lieu de place forte,
  - type: text
    content: il s’imagine qu’ils sont un rempart inaccessible.
  '12':
  - type: text
    content: Quand l’orgueil remplit le cœur d’un homme, sa ruine est proche.
  - type: text
    content: Avant d’être honoré, il faut savoir être humble
  - type: note
    content: Voir 15.33.
  - type: text
    content: .
  '13':
  - type: text
    content: Qui répond avant d’avoir écouté
  - type: text
    content: manifeste sa sottise et se couvre de confusion.
  '14':
  - type: text
    content: Un bon moral permet de supporter la maladie,
  - type: text
    content: mais si le moral est abattu, qui le relèvera ?
  '15':
  - type: text
    content: L’homme intelligent acquiert la connaissance,
  - type: text
    content: et l’oreille des sages est tendue vers elle.
  '16':
  - type: text
    content: Les cadeaux ouvrent les chemins
  - type: text
    content: et font arriver jusqu’en présence des gens importants
  - type: note
    content: Voir 17.8.
  - type: text
    content: .
  '17':
  - type: text
    content: Qui plaide sa cause en premier paraît toujours avoir raison,
  - type: text
    content: vient la partie adverse, et l’on examine ce qu’il a dit.
  '18':
  - type: text
    content: Le sort met fin aux contestations
  - type: text
    content: et tranche même entre des puissants.
  '19':
  - type: text
    content: Un frère que l’on a offensé est plus inaccessible qu’une ville fortifiée,
  - type: text
    content: et des dissensions sont comme les verrous d’un palais.
  '2':
  - type: text
    content: L’insensé n’aime pas réfléchir,
  - type: text
    content: il ne demande qu’à faire étalage de son opinion.
  '20':
  - type: text
    content: Chacun goûtera à satiété les fruits de ses paroles
  - type: text
    content: et se rassasiera de ce que ses lèvres ont produit.
  '21':
  - type: text
    content: 'La mort et la vie sont au pouvoir de la langue :'
  - type: text
    content: qui aime se répandre en paroles mangera les fruits qu’elles auront produits.
  '22':
  - type: text
    content: 'Qui trouve une épouse trouve le bonheur :'
  - type: text
    content: c’est une faveur que l’Eternel lui a accordée.
  '23':
  - type: text
    content: Le pauvre parle en suppliant,
  - type: text
    content: mais le riche répond durement.
  '24':
  - type: text
    content: Qui a beaucoup de compagnons les a pour son malheur,
  - type: text
    content: mais un véritable ami est plus attaché qu’un frère.
  '3':
  - type: text
    content: 'Le méchant apporte avec lui le mépris :'
  - type: text
    content: une action déshonorante est suivie de l’opprobre.
  '4':
  - type: text
    content: Les paroles humaines sont comme des eaux profondes ;
  - type: text
    content: la source de la sagesse est un torrent qui déborde
  - type: note
    content: Ce verset semble opposer notre répugnance à nous livrer (voir le secret des « eaux profondes » en 20.5) à la franchise vivifiante des sages.
  - type: text
    content: .
  '5':
  - type: text
    content: Il n’est pas bien de favoriser le méchant
  - type: text
    content: et de léser le juste dans le jugement.
  '6':
  - type: text
    content: Les propos de l’insensé suscitent des querelles,
  - type: text
    content: et ses discours lui attirent les coups.
  '7':
  - type: text
    content: La bouche de l’insensé cause sa ruine,
  - type: text
    content: et ses lèvres sont un piège pour sa vie.
  '8':
  - type: text
    content: 'Les médisances sont comme des friandises :'
  - type: text
    content: elles descendent jusqu’au tréfonds de l’être.
  '9':
  - type: text
    content: Qui se relâche dans son travail
  - type: text
    content: est frère de celui qui détruit.
