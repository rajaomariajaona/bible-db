document_id: PRO.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’original suit son bon plaisir :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’insurgera contre tout ce qui est raisonnable.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Eternel est comme un donjon bien fortifié :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juste y accourt et il y est en sécurité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La fortune du riche lui tient lieu de place forte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’imagine qu’ils sont un rempart inaccessible.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quand l’orgueil remplit le cœur d’un homme, sa ruine est proche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant d’être honoré, il faut savoir être humble
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15.33'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Qui répond avant d’avoir écouté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manifeste sa sottise et se couvre de confusion.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Un bon moral permet de supporter la maladie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais si le moral est abattu, qui le relèvera ?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’homme intelligent acquiert la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’oreille des sages est tendue vers elle.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les cadeaux ouvrent les chemins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et font arriver jusqu’en présence des gens importants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.8'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Qui plaide sa cause en premier paraît toujours avoir raison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vient la partie adverse, et l’on examine ce qu’il a dit.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le sort met fin aux contestations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tranche même entre des puissants.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Un frère que l’on a offensé est plus inaccessible qu’une ville fortifiée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des dissensions sont comme les verrous d’un palais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’insensé n’aime pas réfléchir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne demande qu’à faire étalage de son opinion.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Chacun goûtera à satiété les fruits de ses paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se rassasiera de ce que ses lèvres ont produit.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'La mort et la vie sont au pouvoir de la langue :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui aime se répandre en paroles mangera les fruits qu’elles auront produits.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Qui trouve une épouse trouve le bonheur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est une faveur que l’Eternel lui a accordée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le pauvre parle en suppliant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le riche répond durement.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Qui a beaucoup de compagnons les a pour son malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais un véritable ami est plus attaché qu’un frère.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le méchant apporte avec lui le mépris :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une action déshonorante est suivie de l’opprobre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les paroles humaines sont comme des eaux profondes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la source de la sagesse est un torrent qui déborde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verset semble opposer notre répugnance à nous livrer (voir le secret des « eaux profondes » en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20.5'
        - type: text
          text: ) à la franchise vivifiante des sages.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il n’est pas bien de favoriser le méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de léser le juste dans le jugement.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les propos de l’insensé suscitent des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses discours lui attirent les coups.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La bouche de l’insensé cause sa ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses lèvres sont un piège pour sa vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les médisances sont comme des friandises :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles descendent jusqu’au tréfonds de l’être.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Qui se relâche dans son travail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est frère de celui qui détruit.
