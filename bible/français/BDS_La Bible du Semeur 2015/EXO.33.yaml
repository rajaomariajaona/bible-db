document_id: EXO.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel n’ira pas avec le peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Moïse : Va, quitte ce lieu, toi et le peuple que tu as fait sortir d’Egypte, et rendez-vous au pays que j’ai promis par serment à Abraham, à Isaac et à Jacob de donner à leurs descendants'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 10.11-12
        metadata:
          usfm: NUM.10.11+NUM.10.12
      - type: text
        text: ' comparé à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19.1
        metadata:
          usfm: EXO.19.1
      - type: text
        text: ', le séjour d’Israël au Sinaï a été d’un an. Voir Gn 12.7 ; 26.3 ; 28.13.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’enverrai un ange devant toi et je chasserai les Cananéens, les Amoréens, les Hittites, les Phéréziens, les Héviens et les Yebousiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il vous conduira vers un pays ruisselant de lait et de miel. Pour moi, je n’irai pas au milieu de vous, car vous êtes un peuple rebelle et je pourrais vous exterminer pendant le voyage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque le peuple entendit cette parole sévère, il prit le deuil : personne ne mit ses parures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Eternel avait ordonné à Moïse de dire aux Israélites : Vous êtes un peuple rebelle ; si je marchais au milieu de vous, ne fût-ce qu’un seul instant, je vous exterminerais. Otez donc vos parures et l’on verra comment je vais vous traiter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les Israélites enlevèrent leurs parures, à distance du mont Horeb.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tente de la Rencontre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse prit une tente et la dressa pour lui à l’extérieur du camp à une bonne distance. Il l’appelait tente de la Rencontre. Celui qui voulait consulter l’Eternel devait sortir du camp pour se rendre à la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chaque fois que Moïse sortait pour aller à cette tente, le peuple se levait et chacun se tenait à l’entrée de sa tente pour suivre Moïse du regard jusqu’à ce qu’il soit entré dans la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dès qu’il y pénétrait, la colonne de nuée descendait et se tenait à l’entrée de la tente, et l’Eternel s’entretenait avec Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout le peuple voyait la colonne de nuée se tenir à l’entrée de la tente et le peuple tout entier se levait et se prosternait, chacun à l’entrée de sa tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Eternel s’entretenait avec Moïse directement comme un homme parle avec son ami. Puis Moïse regagnait le camp ; mais son jeune assistant Josué, fils de Noun, restait dans la tente.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse prie l’Eternel d’accompagner son peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse dit à l’Eternel : Vois, tu me demandes de conduire ce peuple, mais tu ne me fais pas connaître qui tu enverras pour m’accompagner ! Pourtant tu m’avais dit : « Je t’ai choisi personnellement et tu jouis de ma faveur. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Maintenant, si réellement j’ai obtenu ta faveur, veuille me révéler tes intentions pour que je te connaisse. Alors j’aurai vraiment ta faveur. Et considère que ce peuple-là, c’est ton peuple !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu répondit : Je marcherai moi-même avec toi, pour te rassurer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse reprit : Si tu ne viens pas toi-même avec nous, ne nous fais pas partir d’ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A quoi reconnaîtra-t-on que j’ai obtenu ta faveur, moi ainsi que ton peuple, sinon si tu marches avec nous, et si nous sommes ainsi distingués, moi et ton peuple, de tous les autres peuples sur la terre ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors l’Eternel répondit à Moïse : Même ce que tu viens de demander, je te l’accorde parce que tu jouis de ma faveur et que j’ai une relation particulière avec toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse reprit : Permets-moi de contempler ta gloire !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu lui répondit : Je ferai moi-même passer devant toi toute ma bonté et je proclamerai devant toi les qualités de l’Eternel. Je ferai grâce à qui je veux faire grâce, j’aurai compassion de qui je veux avoir compassion'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 9.15
        metadata:
          usfm: ROM.9.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais tu ne pourras pas voir ma face, car nul homme ne peut me voir et demeurer en vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Eternel dit encore : Il y a ici un lieu près de moi ; tiens-toi debout sur le rocher, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et quand ma gloire passera, je te mettrai dans le creux du rocher et je te couvrirai de ma main, jusqu’à ce que j’aie passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Puis je retirerai ma main et tu me verras de dos, mais ma face ne pourra pas être vue.
