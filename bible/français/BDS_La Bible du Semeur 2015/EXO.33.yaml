document_id: EXO.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel n’ira pas avec le peuple
  - type: text
    content: 'L’Eternel dit à Moïse : Va, quitte ce lieu, toi et le peuple que tu as fait sortir d’Egypte, et rendez-vous au pays que j’ai promis par serment à Abraham, à Isaac et à Jacob de donner à leurs descendants'
  - type: note
    content: Selon Nb 10.11-12 comparé à Ex 19.1, le séjour d’Israël au Sinaï a été d’un an. Voir Gn 12.7 ; 26.3 ; 28.13.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Tout le peuple voyait la colonne de nuée se tenir à l’entrée de la tente et le peuple tout entier se levait et se prosternait, chacun à l’entrée de sa tente. '
  '11':
  - type: text
    content: L’Eternel s’entretenait avec Moïse directement comme un homme parle avec son ami. Puis Moïse regagnait le camp ; mais son jeune assistant Josué, fils de Noun, restait dans la tente.
  - type: heading
    content: Moïse prie l’Eternel d’accompagner son peuple
  '12':
  - type: text
    content: 'Moïse dit à l’Eternel : Vois, tu me demandes de conduire ce peuple, mais tu ne me fais pas connaître qui tu enverras pour m’accompagner ! Pourtant tu m’avais dit : « Je t’ai choisi personnellement et tu jouis de ma faveur. » '
  '13':
  - type: text
    content: Maintenant, si réellement j’ai obtenu ta faveur, veuille me révéler tes intentions pour que je te connaisse. Alors j’aurai vraiment ta faveur. Et considère que ce peuple-là, c’est ton peuple !
  '14':
  - type: text
    content: 'Dieu répondit : Je marcherai moi-même avec toi, pour te rassurer.'
  '15':
  - type: text
    content: 'Moïse reprit : Si tu ne viens pas toi-même avec nous, ne nous fais pas partir d’ici. '
  '16':
  - type: text
    content: A quoi reconnaîtra-t-on que j’ai obtenu ta faveur, moi ainsi que ton peuple, sinon si tu marches avec nous, et si nous sommes ainsi distingués, moi et ton peuple, de tous les autres peuples sur la terre ?
  '17':
  - type: text
    content: 'Alors l’Eternel répondit à Moïse : Même ce que tu viens de demander, je te l’accorde parce que tu jouis de ma faveur et que j’ai une relation particulière avec toi.'
  '18':
  - type: text
    content: 'Moïse reprit : Permets-moi de contempler ta gloire !'
  '19':
  - type: text
    content: 'Dieu lui répondit : Je ferai moi-même passer devant toi toute ma bonté et je proclamerai devant toi les qualités de l’Eternel. Je ferai grâce à qui je veux faire grâce, j’aurai compassion de qui je veux avoir compassion'
  - type: note
    content: Cité en Rm 9.15.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'J’enverrai un ange devant toi et je chasserai les Cananéens, les Amoréens, les Hittites, les Phéréziens, les Héviens et les Yebousiens. '
  '20':
  - type: text
    content: Mais tu ne pourras pas voir ma face, car nul homme ne peut me voir et demeurer en vie.
  '21':
  - type: text
    content: 'L’Eternel dit encore : Il y a ici un lieu près de moi ; tiens-toi debout sur le rocher, '
  '22':
  - type: text
    content: 'et quand ma gloire passera, je te mettrai dans le creux du rocher et je te couvrirai de ma main, jusqu’à ce que j’aie passé. '
  '23':
  - type: text
    content: Puis je retirerai ma main et tu me verras de dos, mais ma face ne pourra pas être vue.
  '3':
  - type: text
    content: Il vous conduira vers un pays ruisselant de lait et de miel. Pour moi, je n’irai pas au milieu de vous, car vous êtes un peuple rebelle et je pourrais vous exterminer pendant le voyage.
  '4':
  - type: text
    content: 'Lorsque le peuple entendit cette parole sévère, il prit le deuil : personne ne mit ses parures. '
  '5':
  - type: text
    content: 'L’Eternel avait ordonné à Moïse de dire aux Israélites : Vous êtes un peuple rebelle ; si je marchais au milieu de vous, ne fût-ce qu’un seul instant, je vous exterminerais. Otez donc vos parures et l’on verra comment je vais vous traiter.'
  '6':
  - type: text
    content: Les Israélites enlevèrent leurs parures, à distance du mont Horeb.
  - type: heading
    content: La tente de la Rencontre
  '7':
  - type: text
    content: 'Moïse prit une tente et la dressa pour lui à l’extérieur du camp à une bonne distance. Il l’appelait tente de la Rencontre. Celui qui voulait consulter l’Eternel devait sortir du camp pour se rendre à la tente de la Rencontre. '
  '8':
  - type: text
    content: 'Chaque fois que Moïse sortait pour aller à cette tente, le peuple se levait et chacun se tenait à l’entrée de sa tente pour suivre Moïse du regard jusqu’à ce qu’il soit entré dans la tente. '
  '9':
  - type: text
    content: 'Dès qu’il y pénétrait, la colonne de nuée descendait et se tenait à l’entrée de la tente, et l’Eternel s’entretenait avec Moïse. '
