document_id: LEV.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi sur les offrandes saintes
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ceux qui peuvent y avoir part
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Instruis Aaron et ses fils des cas où ils doivent se tenir à l’écart des offrandes saintes des Israélites, afin de ne pas profaner ma sainteté au travers des choses qu’ils me consacrent. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dis-leur : pour les générations présentes et futures, si l’un de vos descendants s’approche en état d’impureté rituelle des offrandes saintes que les Israélites m’ont consacrées, il sera exclu de ma présence. Je suis l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aucun descendant d’Aaron atteint d’une maladie de la peau à caractère évolutif ou d’une gonorrhée ne mangera des offrandes saintes jusqu’à ce qu’il soit en état de pureté. La même règle s’appliquera à celui qui aura touché toute impureté liée à un cadavre, à celui qui aura une émission séminale, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'qui aura touché quelque bestiole qui se meut à ras de terre et rend impur, ou une personne dont le contact rend impur, quelle que soit l’impureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Celui qui aura eu de tels contacts restera en état d’impureté jusqu’au soir et il ne mangera pas d’offrandes saintes sans s’être lavé le corps à l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après le coucher du soleil, il sera pur, et alors seulement il pourra manger des offrandes saintes, car c’est sa nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il ne doit pas manger de bête crevée ou déchirée par une bête sauvage, cela le rendrait impur. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les prêtres devront observer mes prescriptions pour ne pas se charger d’une faute et mourir pour avoir commis en cela une profanation. Moi, l’Eternel, je les rends saints.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aucun profane ne mangera d’une offrande sainte ; même pas l’hôte d’un prêtre ou son salarié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Par contre, si une personne a été acquise à prix d’argent par un prêtre, ou si elle est née dans sa maison, elle pourra partager sa nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Une fille de prêtre mariée à un homme d’une autre tribu ne pourra plus manger de ce qui a été prélevé sur les offrandes saintes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais si elle est devenue veuve ou si elle a été répudiée et est sans enfants, et qu’elle soit retournée dans la maison de son père comme au temps de sa jeunesse, elle partagera la nourriture de son père ; mais aucun profane n’en mangera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si quelqu’un a mangé par inadvertance une offrande sainte, il en rendra l’équivalent au prêtre en y ajoutant un cinquième.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les prêtres ne profaneront pas les offrandes saintes des Israélites, ce qu’ils prélèvent pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En consommant leurs offrandes saintes, ils se chargeraient d’une faute exigeant réparation, car moi, l’Eternel, je les rends saintes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices acceptables et inacceptables
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Parle à Aaron, à ses fils et à tous les Israélites, et dis-leur : Tout homme – Israélite ou immigré – qui offre un holocauste à l’Eternel – soit pour l’accomplissement de quelque vœu, soit comme don volontaire – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'devra apporter, pour être agréé, une bête mâle sans défaut, un bovin, un mouton ou un chevreau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous n’offrirez pas un animal présentant une malformation, car votre sacrifice ne serait pas agréé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De même, si un homme offre à l’Eternel un sacrifice de communion sous forme de gros ou de menu bétail pour accomplir un vœu, ou comme don volontaire, il devra présenter, s’il veut être agréé, une victime sans défaut ne présentant aucune malformation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous n’offrirez pas à l’Eternel une bête aveugle, estropiée, mutilée ou affectée d’un ulcère, de la gale ou d’une dartre, vous ne la ferez pas brûler sur l’autel comme sacrifice consumé pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si un bovin ou un agneau a un membre trop long ou trop court, tu pourras l’offrir comme don volontaire, mais un tel animal ne serait pas agréé pour l’accomplissement d’un vœu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous n’offrirez pas à l’Eternel un animal ayant des organes génitaux écrasés ou broyés, arrachés ou coupés ; vous ne ferez pas cela quand vous serez dans votre pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Vous n’accepterez même pas de tels animaux de la part d’un étranger pour les offrir comme aliment à votre Dieu ; du moment qu’ils sont mutilés ou ont une malformation, ils ne seront pas agréés de votre part.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand un veau, un agneau ou un chevreau naîtra, il restera sept jours avec sa mère ; à partir du huitième jour seulement, il pourra être agréé comme sacrifice consumé offert à l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais vous n’immolerez jamais une vache, une brebis ou une chèvre le même jour que son petit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit peut-être là d’un rite païen, où d’une mesure exprimant le souci du respect de la vie animale (cf. Ex 23.19 ; Dt 22.6-7 ; 20.19-20).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quand vous offrirez un sacrifice de reconnaissance à l’Eternel, faites-le de manière à être agréés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il sera mangé le jour même ; vous n’en laisserez rien jusqu’au lendemain matin. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Vous obéirez à mes commandements et vous les accomplirez. Je suis l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vous ne profanerez pas ma sainteté ; ma sainteté sera respectée par les Israélites. Moi, l’Eternel, je vous rends saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: moi qui vous ai fait sortir d’Egypte pour être votre Dieu. Je suis l’Eternel.
