document_id: JDG.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Débora et Baraq
  - type: text
    content: 'Après la mort d’Ehoud, les Israélites recommencèrent à faire ce que l’Eternel considère comme mal. '
  '10':
  - type: text
    content: Celui-ci y convoqua les tribus de Zabulon et de Nephtali. Dix mille hommes le suivirent et Débora partit avec lui.
  '11':
  - type: text
    content: A la même époque, Héber le Qénien s’était séparé des autres Qéniens, descendants de Hobab
  - type: note
    content: Sur Hobab, voir Nb 10.29.
  - type: text
    content: ', le beau-frère de Moïse, et était venu dresser sa tente près de Qédesh, à côté du chêne de Tsaannaïm'
  - type: note
    content: Les Qéniens étaient alliés aux Israélites depuis l’époque de Moïse (voir Ex 3.1). Ils ont combattu avec eux lors de la conquête de Canaan (Jg 1.16  ; voir Nb 10.29-32). Héber a émigré du sud vers le nord du pays et s’est allié aux Cananéens. C’est certainement lui qui a informé Sisera des préparatifs militaires de Baraq.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Sisera fut informé que Baraq, fils d’Abinoam, était monté sur le mont Thabor. '
  '13':
  - type: text
    content: 'Il mobilisa toutes ses troupes et rassembla les neuf cents chars bardés de fer. Il achemina toute l’armée de Harosheth-Goyim vers le torrent du Qishôn. '
  '14':
  - type: text
    content: 'Alors Débora dit à Baraq : En avant ! C’est aujourd’hui que l’Eternel te donnera la victoire sur Sisera. Il marche lui-même devant toi.'
  - type: text
    content: 'Baraq descendit du mont Thabor à la tête de ses dix mille hommes. '
  '15':
  - type: text
    content: 'Alors l’Eternel mit en déroute Sisera, ses chars et toutes ses troupes, par l’épée devant Baraq. Sisera lui-même abandonna son char et s’enfuit à pied. '
  '16':
  - type: text
    content: Mais Baraq poursuivit les chars et l’armée jusqu’à Harosheth-Goyim, et toutes les troupes de Sisera furent massacrées. Pas un homme n’échappa.
  '17':
  - type: text
    content: 'Sisera s’enfuit à pied jusqu’à la tente de Yaël, la femme de Héber, le Qénien, car la paix avait été conclue entre Yabîn roi de Hatsor et la famille de Héber. '
  '18':
  - type: text
    content: 'Yaël sortit à la rencontre de Sisera et lui dit : Entre, mon seigneur, retire-toi chez moi. Tu n’as rien à craindre ici.'
  - type: text
    content: Il la suivit donc dans sa tente, et elle le recouvrit d’une couverture.
  '19':
  - type: text
    content: – Donne-moi, s’il te plaît, un peu d’eau à boire, lui dit-il, car j’ai soif.
  - type: text
    content: 'Elle ouvrit l’outre de lait, le fit boire et le recouvrit. '
  '2':
  - type: text
    content: Alors l’Eternel les livra au pouvoir de Yabîn
  - type: note
    content: Voir note Jos 11.1.
  - type: text
    content: ', un roi cananéen qui régnait sur la ville de Hatsor'
  - type: note
    content: Hatsor avait été démolie mais avait dû être reconstruite (voir Jos 11.13 ; 12.19 ; 19.36).
  - type: text
    content: '. Le chef de son armée s’appelait Sisera et demeurait à Harosheth-Goyim. '
  '20':
  - type: text
    content: 'Il ajouta : Va te poster à l’entrée de la tente, et si l’on vient te demander s’il y a quelqu’un ici, tu répondras : « Personne ! »'
  '21':
  - type: text
    content: 'Puis il s’endormit profondément car il était épuisé. Alors Yaël saisit un piquet de la tente, prit le marteau, se glissa doucement près de lui, et lui enfonça le piquet dans la tempe, et le piquet lui transperça la tête et se planta dans le sol, si bien qu’il mourut. '
  '22':
  - type: text
    content: 'Sur ces entrefaites survint Baraq poursuivant Sisera. Yaël sortit au-devant de lui et lui dit : Viens, je te montrerai l’homme que tu cherches.'
  - type: text
    content: Il la suivit et vit Sisera mort, étendu sur le sol, la tempe transpercée du piquet.
  '23':
  - type: text
    content: 'C’est ainsi que ce jour-là Dieu humilia Yabîn, le roi cananéen, devant les Israélites. '
  '24':
  - type: text
    content: Leur pression contre lui devint de plus en plus forte et ils finirent par l’éliminer.
  '3':
  - type: text
    content: Yabîn possédait neuf cents chars bardés de fer et il opprima durement les Israélites pendant vingt ans. Alors ceux-ci implorèrent l’Eternel.
  '4':
  - type: text
    content: 'A cette époque, Débora, une prophétesse, femme de Lappidoth, administrait la justice en Israël. '
  '5':
  - type: text
    content: 'Elle siégeait sous le palmier qui, depuis lors, porte son nom, entre Rama et Béthel, dans la région montagneuse d’Ephraïm. Les Israélites se rendaient auprès d’elle pour régler leurs litiges. '
  '6':
  - type: text
    content: Un jour, elle envoya chercher Baraq
  - type: note
    content: Voir Hé 11.32.
  - type: text
    content: ', fils d’Abinoam, de Qédesh'
  - type: note
    content: Qédesh se situait au nord du pays d’Israël (voir Jos 12.22 ; 19.37 ; 21.32).
  - type: text
    content: ' en Nephtali, et lui dit : Voici ce que t’ordonne l’Eternel, le Dieu d’Israël : « Va recruter dix mille hommes dans les tribus de Nephtali et de Zabulon et conduis-les sur le mont Thabor. '
  '7':
  - type: text
    content: Je mènerai au torrent de Qishôn Sisera, le chef de l’armée de Yabîn, avec ses chars et ses troupes, et je te donnerai la victoire sur lui. »
  '8':
  - type: text
    content: 'Baraq répondit à Débora : Si tu m’accompagnes, j’irai ; mais si tu ne viens pas avec moi, je n’irai pas.'
  '9':
  - type: text
    content: – Soit, lui répondit-elle, j’irai avec toi ; mais sache que ce n’est pas à toi que reviendra l’honneur de l’expédition que tu vas entreprendre, car c’est entre les mains d’une femme que l’Eternel livrera Sisera.
  - type: text
    content: 'Débora se mit donc en route pour se rendre avec Baraq à Qédesh. '
