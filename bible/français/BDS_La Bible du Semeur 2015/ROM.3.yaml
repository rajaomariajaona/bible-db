  '1':
  - type: heading
    content: Tous les hommes sont coupables devant Dieu
  - type: text
    content: Dans ces conditions, quel est l’avantage du Juif
  - type: note
    content: Dans 3.1-9, l’apôtre pose cinq questions que ses contradicteurs juifs devaient souvent lui poser.
  - type: text
    content: '  ? Quelle est l’utilité de la circoncision ? '
  '10':
  - type: text
    content: 'L’Ecriture le dit :'
  - type: text
    content: Il n’y a pas de juste,
  - type: text
