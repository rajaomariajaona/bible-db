  '19':
  - type: text
    content: Or, nous le savons, ce que l’Ecriture dit dans la Loi, elle l’adresse à ceux qui vivent sous le régime de la Loi. Il en est ainsi pour que personne n’ait rien à répliquer et que le monde entier soit reconnu coupable devant Dieu.
  '2':
  - type: text
    content: 'L’avantage est grand à divers titres. Tout d’abord, c’est aux Juifs qu’ont été confiées les paroles de Dieu. '
  '20':
  - type: text
    content: Car personne ne sera déclaré juste devant lui parce qu’il aura accompli les œuvres demandées par la Loi. En effet, la Loi produit seulement la connaissance du péché.
  - type: heading
    content: Déclarés justes par la foi
  - type: heading
    content: Justes par la foi, sans la Loi
  '21':
  - type: text
    content: Mais maintenant Dieu a manifesté, sans faire intervenir la Loi, la justice qu’il nous accorde et à laquelle les livres de la Loi et des prophètes rendent témoignage.
  '22':
  - type: text
    content: 'Dieu déclare les hommes justes par leur foi en Jésus-Christ, et cela s’applique à tous ceux qui croient, car il n’y a pas de différence entre les hommes. '
  '23':
  - type: text
    content: 'Tous ont péché, en effet, et sont privés de la gloire de Dieu, '
  '24':
  - type: text
    content: et ils sont déclarés justes
  - type: note
    content: Paul emprunte au vocabulaire juridique ce terme de justifier qui signifiait déclarer juste celui dont l’innocence avait été reconnue ou dont la culpabilité n’avait pu être prouvée. Dans le cas du pécheur devant Dieu, il s’agit d’un acte immérité du Dieu souverain qui « couvre » les péchés (4.7) et recouvre le pécheur de la justice parfaite de Jésus-Christ.
  - type: text
    content: ' par sa grâce ; c’est un don que Dieu leur fait par le moyen de la délivrance'
  - type: note
    content: L’apôtre emploie un mot qui désigne souvent le rachat (d’un esclave ou d’un prisonnier) au moyen d’une rançon.
  - type: text
    content: ' apportée par Jésus-Christ'
  - type: note
    content: 'Autre traduction : dont on bénéficie dans le cadre de l’union à Jésus-Christ.'
  - type: text
    content: .
  '25':
  - type: text
    content: C’est lui que Dieu a offert comme une victime destinée à expier les péchés
  - type: note
    content: 'Selon certains, ce terme fait allusion à la cérémonie du jour des Expiations où le grand-prêtre aspergeait de sang le couvercle du coffre sacré afin de faire l’expiation des péchés du peuple. Expier les péchés: autre traduction : apaiser la colère de Dieu contre le mal (voir 1 Jn 2.2 ; 4.10).'
  - type: text
    content: ', pour ceux qui croient en son sacrifice'
  - type: note
    content: 'Autre traduction : C’est lui que Dieu, dans son plan, a destiné, par sa mort, à expier les péchés pour ceux qui croient. Le texte grec emploie le mot sang : le sang est le symbole de la vie offerte et de la mort subie.'
  - type: text
    content: '. Dieu montre ainsi qu’il est juste parce qu’il avait laissé impunis les péchés commis autrefois, '
  '26':
  - type: text
    content: 'au temps de sa patience. Il montre aussi qu’il est juste dans le temps présent : il est juste tout en déclarant juste celui qui croit en Jésus.'
  '27':
  - type: text
    content: Reste-t-il encore une raison de se vanter ? Non, cela est exclu. En vertu de quel principe ? Celui de l’obéissance à la Loi ? Non, mais selon le principe de la foi.
  '28':
  - type: text
    content: 'Voici donc ce que nous affirmons : l’homme est déclaré juste par la foi sans qu’il ait à accomplir les œuvres qu’exige la Loi. '
  '29':
  - type: text
    content: 'Ou alors : Dieu serait-il seulement le Dieu des Juifs ? N’est-il pas aussi le Dieu des non-Juifs ? Bien sûr, il est aussi le Dieu des non-Juifs. '
  '3':
  - type: text
    content: Que faut-il dire alors si certains leur ont été infidèles ? Leur infidélité
  - type: note
    content: 'Autre traduction : Que faut-il dire alors de l’incrédulité de certains ? Leur incrédulité…'
  - type: text
    content: ' anéantira-t-elle la fidélité de Dieu ? '
  '30':
  - type: text
    content: Car il n’y a qu’un seul Dieu qui justifie les Juifs en raison de leur foi et qui justifie aussi les non-Juifs au moyen de leur foi.
  - type: heading
    content: L’exemple d’Abraham et de David
  '31':
  - type: text
    content: Mais alors, est-ce que nous annulons la Loi au moyen de la foi ? Loin de là ! Nous confirmons la Loi.
  '4':
  - type: text
    content: 'Loin de là ! Que Dieu soit reconnu comme disant la vérité et tout homme qui s’oppose à lui comme menteur, car il est écrit :'
  - type: text
    content: Tu seras toujours reconnu juste dans tes sentences ;
  - type: text
    content: et tu seras vainqueur lorsque tu rends ton jugement
  - type: text
    content: ' '
  - type: note
    content: Ps 51.6 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Mais si notre injustice contribue à manifester que Dieu est juste, que pouvons-nous en conclure ? Dieu n’est-il pas injuste quand il nous fait subir sa colère ? – Bien entendu, je raisonne ici d’une manière très humaine. – '
  '6':
  - type: text
    content: 'Dieu injuste ? Loin de là ! Autrement, comment Dieu pourrait-il juger le monde ? '
  '7':
  - type: text
    content: 'Ou, dira-t-on encore, si mon mensonge fait d’autant mieux éclater que Dieu est véridique et contribue ainsi à sa gloire, pourquoi serais-je encore condamné comme pécheur ? '
  '8':
  - type: text
    content: 'Et pourquoi ne pas aller jusqu’à dire : Faisons le mal pour qu’en sorte le bien ? Certains, du reste, nous calomnient en prétendant que c’est là ce que nous enseignons. Ces gens-là méritent bien d’être condamnés.'
  '9':
  - type: text
    content: 'Que faut-il donc conclure ? Nous les Juifs, sommes-nous en meilleure position que les autres hommes ? Pas à tous égards. Nous avons, en effet, déjà démontré que tous les hommes, Juifs et non-Juifs, sont également coupables. '
