document_id: 2SA.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La famine de trois ans
  - type: text
    content: 'Pendant le règne de David, une famine sévit pendant trois années. David en demanda avec instances la raison à l’Eternel, et l’Eternel lui répondit : Cela arrive parce que Saül et sa famille sanguinaire ont fait périr les Gabaonites.'
  '10':
  - type: text
    content: 'Alors Ritspa, fille d’Aya, prit son habit de toile de sac et l’étendit sur le rocher ; elle demeura là depuis le début de la moisson des orges jusqu’à ce que tombent les pluies d’automne ; pendant le jour, elle empêchait les oiseaux de s’abattre sur les corps, et la nuit elle en éloignait les bêtes sauvages. '
  '11':
  - type: text
    content: On rapporta à David ce que Ritspa, fille d’Aya, épouse de second rang de Saül, avait fait.
  '12':
  - type: text
    content: Alors le roi alla demander les ossements de Saül et de son fils Jonathan aux notables de Yabesh en Galaad. Ceux-ci avaient en effet subtilisé leurs corps de la place de Beth-Shân où les Philistins les avaient attachés le jour où ils avaient vaincu Saül à Guilboa
  - type: note
    content: Voir 1 S 31.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Il fit venir de là les ossements de Saül et de son fils Jonathan et les joignit à ceux des suppliciés. '
  '14':
  - type: text
    content: Il fit ensevelir les ossements de Saül et de Jonathan dans le territoire de Benjamin, à Tséla, dans le tombeau de Qish, père de Saül. On se conforma à tout ce que le roi avait ordonné. Après cela, Dieu se laissa fléchir et intervint en faveur du pays.
  - type: heading
    content: Les exploits des guerriers de David contre des géants philistins
  - type: heading
    content: (1 Ch 20.4-8)
  '15':
  - type: text
    content: 'Une nouvelle fois, il y eut guerre entre les Philistins et Israël. David et ses troupes se mirent en campagne pour combattre les Philistins. David était épuisé. '
  '16':
  - type: text
    content: Yishbi-Benob, un descendant de Rapha, se vanta de tuer David. Il était ceint d’une épée neuve et portait un javelot dont la pointe de bronze pesait plus de trois kilogrammes
  - type: note
    content: 'En hébreu : trois cents sicles.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Mais Abishaï, fils de Tserouya, vint au secours de David, et mit à mort le Philistin. Alors les hommes de David adjurèrent le roi de ne plus venir avec eux au combat, pour ne pas risquer de mettre le guide
  - type: note
    content: 'En hébreu : la lampe.'
  - type: text
    content: ' d’Israël en péril.'
  '18':
  - type: text
    content: Plus tard, à l’occasion d’une nouvelle bataille avec les Philistins, à Gob, Sibbekaï le Houshatite
  - type: note
    content: Sibbekaï était le chef de la huitième division des troupes de David (1 Ch 27.11), il était originaire de Housha, au sud-ouest de Bethléhem. D’après 1 Ch 20.4-8, Gob devait se trouver près de Guézer (voir Jos 12.12).
  - type: text
    content: ' tua Saph, un descendant de Rapha.'
  '19':
  - type: text
    content: Lors d’un autre combat contre les Philistins à Gob, Elhanân, fils de Yaaré-Oreguim de Bethléhem
  - type: note
    content: D’après 2 S 23.24 et 1 Ch 11.26, Elhanân était un oncle de David.
  - type: text
    content: ', tua Goliath de Gath'
  - type: note
    content: Selon 1 Ch 20.5, Elhanân tua Lahmi, le frère de Goliath, ce qui s’accorde avec 1 S 17 qui rappelle que c’est David qui a tué le géant. Il est possible qu’un copiste ait confondu Lahmi le frère de avec Bethléhemite.
  - type: text
    content: ', qui avait une lance dont le bois était aussi gros que le cylindre d’un métier à tisser.'
  '2':
  - type: text
    content: Le roi convoqua les survivants des Gabaonites pour leur parler. – Les Gabaonites n’étaient pas des Israélites, mais ce qui restait des Amoréens
  - type: note
    content: Nom général donné aux habitants de Canaan avant la conquête (Gn 15.16 ; Jos 24.18). Les Gabaonites étaient, en fait, des Héviens (Jos 9.7 ; 11.19).
  - type: text
    content: . Les Israélites s’étaient liés à eux par un serment
  - type: note
    content: Voir Jos 9.3-27.
  - type: text
    content: '  ; malgré cela, Saül avait cherché à les exterminer dans son zèle nationaliste pour les Israélites et les Judéens.'
  '20':
  - type: text
    content: 'Dans une autre bataille à Gath, un champion, lui aussi descendant de Rapha et qui avait six doigts à chaque main et à chaque pied, c’est-à-dire vingt-quatre en tout, '
  '21':
  - type: text
    content: lança un défi à Israël. Jonathan, fils de Shimea, le frère de David, le tua.
  '22':
  - type: text
    content: Ces quatre descendants de Rapha, nés à Gath, succombèrent devant David et ses hommes.
  '3':
  - type: text
    content: 'David demanda aux Gabaonites : Que puis-je faire pour vous ? Comment pourrais-je expier le mal que vous avez subi, afin que vous bénissiez le peuple qui appartient à l’Eternel ?'
  '4':
  - type: text
    content: 'Les Gabaonites lui répondirent : Ce n’est pas avec de l’argent ou de l’or que pourra se régler notre différend avec Saül et sa famille, et il ne nous appartient pas de faire mourir quelqu’un en Israël.'
  - type: text
    content: 'Le roi leur dit : Que demandez-vous donc ? Je ferai pour vous ce que vous demanderez.'
  '5':
  - type: text
    content: 'Ils répondirent au roi : Cet homme voulait nous exterminer et il avait projeté de nous faire disparaître de tout le territoire d’Israël. '
  '6':
  - type: text
    content: Livre-nous donc sept de ses descendants, et nous les pendrons devant l’Eternel à Guibéa où résidait Saül, l’élu de l’Eternel.
  - type: text
    content: 'Le roi déclara : Je vous les livrerai.'
  '7':
  - type: text
    content: Mais le roi épargna Mephibosheth, fils de Jonathan, petit-fils de Saül, à cause du pacte qu’il avait conclu par serment au nom de l’Eternel avec Jonathan
  - type: note
    content: Voir 1 S 20.14-16, 42 ; 2 S 9.1-13.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Il fit donc arrêter Armoni et Mephibosheth, les deux fils que Ritspa, fille d’Aya, avait donnés à Saül, ainsi que les cinq fils que Mérab
  - type: note
    content: 'D’après deux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et 1 S 18.19. La plupart des manuscrits hébreux et de l’ancienne version grecque ont : Michal.'
  - type: text
    content: ', fille de Saül, avait donnés à Adriel, fils de Barzillaï, de Mehola'
  - type: note
    content: A ne pas confondre avec Barzillaï de Galaad (17.27 ; 19.32).
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Il les livra aux Gabaonites qui les pendirent sur la colline devant l’Eternel. Tous les sept succombèrent ensemble ; ils furent mis à mort aux premiers jours de la moisson, au début de la récolte de l’orge. '
