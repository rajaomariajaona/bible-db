document_id: 2SA.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famine de trois ans
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant le règne de David, une famine sévit pendant trois années. David en demanda avec instances la raison à l’Eternel, et l’Eternel lui répondit : Cela arrive parce que Saül et sa famille sanguinaire ont fait périr les Gabaonites.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Ritspa, fille d’Aya, prit son habit de toile de sac et l’étendit sur le rocher ; elle demeura là depuis le début de la moisson des orges jusqu’à ce que tombent les pluies d’automne ; pendant le jour, elle empêchait les oiseaux de s’abattre sur les corps, et la nuit elle en éloignait les bêtes sauvages. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On rapporta à David ce que Ritspa, fille d’Aya, épouse de second rang de Saül, avait fait.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors le roi alla demander les ossements de Saül et de son fils Jonathan aux notables de Yabesh en Galaad. Ceux-ci avaient en effet subtilisé leurs corps de la place de Beth-Shân où les Philistins les avaient attachés le jour où ils avaient vaincu Saül à Guilboa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 31
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit venir de là les ossements de Saül et de son fils Jonathan et les joignit à ceux des suppliciés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit ensevelir les ossements de Saül et de Jonathan dans le territoire de Benjamin, à Tséla, dans le tombeau de Qish, père de Saül. On se conforma à tout ce que le roi avait ordonné. Après cela, Dieu se laissa fléchir et intervint en faveur du pays.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les exploits des guerriers de David contre des géants philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 20.4-8)
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une nouvelle fois, il y eut guerre entre les Philistins et Israël. David et ses troupes se mirent en campagne pour combattre les Philistins. David était épuisé. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yishbi-Benob, un descendant de Rapha, se vanta de tuer David. Il était ceint d’une épée neuve et portait un javelot dont la pointe de bronze pesait plus de trois kilogrammes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trois cents sicles.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Abishaï, fils de Tserouya, vint au secours de David, et mit à mort le Philistin. Alors les hommes de David adjurèrent le roi de ne plus venir avec eux au combat, pour ne pas risquer de mettre le guide
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la lampe.
      marker-yv: yv-n
    - type: text
      text: ' d’Israël en péril.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus tard, à l’occasion d’une nouvelle bataille avec les Philistins, à Gob, Sibbekaï le Houshatite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sibbekaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le chef de la huitième division des troupes de David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 27.11
        - type: text
          text: '), il était originaire de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Housha, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au sud-ouest de Bethléhem. D’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 20.4-8
        - type: text
          text: ', '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'devait se trouver près de Guézer (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 12.12
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' tua Saph, un descendant de Rapha.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lors d’un autre combat contre les Philistins à Gob, Elhanân, fils de Yaaré-Oreguim de Bethléhem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 23.24
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.26
        - type: text
          text: ', '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Elhanân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était un oncle de David.
      marker-yv: yv-n
    - type: text
      text: ', tua Goliath de Gath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 20.5
        - type: text
          text: ', Elhanân tua '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lahmi, le frère de Goliath, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui s’accorde avec '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 17
        - type: text
          text: ' qui rappelle que c’est David qui a tué le géant. Il est possible qu’un copiste ait confondu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lahmi le frère de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bethléhemite.
      marker-yv: yv-n
    - type: text
      text: ', qui avait une lance dont le bois était aussi gros que le cylindre d’un métier à tisser.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi convoqua les survivants des Gabaonites pour leur parler. – Les Gabaonites n’étaient pas des Israélites, mais ce qui restait des Amoréens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom général donné aux habitants de Canaan avant la conquête (Gn 15.16 ; Jos 24.18). Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gabaonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient, en fait, des Héviens (Jos 9.7 ; 11.19).
      marker-yv: yv-n
    - type: text
      text: . Les Israélites s’étaient liés à eux par un serment
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 9.3-27
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; malgré cela, Saül avait cherché à les exterminer dans son zèle nationaliste pour les Israélites et les Judéens.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans une autre bataille à Gath, un champion, lui aussi descendant de Rapha et qui avait six doigts à chaque main et à chaque pied, c’est-à-dire vingt-quatre en tout, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: lança un défi à Israël. Jonathan, fils de Shimea, le frère de David, le tua.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces quatre descendants de Rapha, nés à Gath, succombèrent devant David et ses hommes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David demanda aux Gabaonites : Que puis-je faire pour vous ? Comment pourrais-je expier le mal que vous avez subi, afin que vous bénissiez le peuple qui appartient à l’Eternel ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Gabaonites lui répondirent : Ce n’est pas avec de l’argent ou de l’or que pourra se régler notre différend avec Saül et sa famille, et il ne nous appartient pas de faire mourir quelqu’un en Israël.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi leur dit : Que demandez-vous donc ? Je ferai pour vous ce que vous demanderez.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent au roi : Cet homme voulait nous exterminer et il avait projeté de nous faire disparaître de tout le territoire d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Livre-nous donc sept de ses descendants, et nous les pendrons devant l’Eternel à Guibéa où résidait Saül, l’élu de l’Eternel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi déclara : Je vous les livrerai.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais le roi épargna Mephibosheth, fils de Jonathan, petit-fils de Saül, à cause du pacte qu’il avait conclu par serment au nom de l’Eternel avec Jonathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 S 20.14-16, 42 ; 2 S 9.1-13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit donc arrêter Armoni et Mephibosheth, les deux fils que Ritspa, fille d’Aya, avait donnés à Saül, ainsi que les cinq fils que Mérab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après deux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 18.19
        - type: text
          text: '. La plupart des manuscrits hébreux et de l’ancienne version grecque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Michal.
      marker-yv: yv-n
    - type: text
      text: ', fille de Saül, avait donnés à Adriel, fils de Barzillaï, de Mehola'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A ne pas confondre avec Barzillaï de Galaad (17.27 ; 19.32).
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les livra aux Gabaonites qui les pendirent sur la colline devant l’Eternel. Tous les sept succombèrent ensemble ; ils furent mis à mort aux premiers jours de la moisson, au début de la récolte de l’orge. '
