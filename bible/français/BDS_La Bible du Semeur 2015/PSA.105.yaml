      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 9.13-35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Sur un ordre de sa part, ╵d’innombrables sauterelles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des criquets arrivèrent
  '35':
  - type: usfm
    marker: q1
