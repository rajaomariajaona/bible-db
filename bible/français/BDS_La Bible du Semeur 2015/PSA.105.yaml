      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 37.6-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Chantez à sa gloire, ╵et célébrez-le ╵en musique !
  - type: usfm
    marker: q1
    children:
    - type: text
