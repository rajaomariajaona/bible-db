      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avaient résisté à ses ordres.
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Il changea leurs eaux en sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fit mourir leurs poissons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 7.14-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Soyez fiers de lui, ╵car il est très saint !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le cœur de ceux ╵qui sont attachés à l’Eternel ╵soit rempli de joie !
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
