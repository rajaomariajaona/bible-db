        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors il leur envoya ╵Moïse, son serviteur,
  - type: usfm
    marker: q1
