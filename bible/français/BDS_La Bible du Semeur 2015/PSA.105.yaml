        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: En Egypte, ils accomplirent ╵sur son ordre des miracles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de grands prodiges ╵au pays de Cham.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il envoya les ténèbres ╵qui couvrirent le pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 10.21-29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
