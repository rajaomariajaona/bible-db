document_id: PSA.105
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu est fidèle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-15, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 16.8-22
        metadata:
          usfm: 1CH.16.8+1CH.16.9+1CH.16.10+1CH.16.11+1CH.16.12+1CH.16.13+1CH.16.14+1CH.16.15+1CH.16.16+1CH.16.17+1CH.16.18+1CH.16.19+1CH.16.20+1CH.16.21+1CH.16.22
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Eternel, ╵et faites appel à lui !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publiez parmi les peuples ╵ses hauts faits !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez à sa gloire, ╵et célébrez-le ╵en musique !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Racontez sans cesse ╵toutes ses merveilles !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Soyez fiers de lui, ╵car il est très saint !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le cœur de ceux ╵qui sont attachés à l’Eternel ╵soit rempli de joie !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tournez-vous vers l’Eternel ! ╵Faites appel à sa force !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aspirez à vivre ╵constamment en sa présence !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Souvenez-vous des merveilles ╵qu’il a accomplies !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rappelez-vous ses prodiges ╵et les jugements ╵qu’il a prononcés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: vous, les descendants ╵d’Abraham, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous, descendants de Jacob, ╵vous qu’il a choisis !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Notre Dieu, c’est l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toute la terre ╵s’exercent ses jugements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il se souvient pour toujours ╵de son alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ce qu’il a donné sa parole ╵pour mille générations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 7.9
        metadata:
          usfm: DEU.7.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: il a conclu un traité ╵avec Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’a confirmé ╵par serment à Isaac
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 12.7 ; 17.8 ; 22.16-17 ; 26.3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il l’a confirmé ╵à Jacob ╵en en faisant une loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, pour Israël, ╵une alliance pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il a déclaré : ╵« Je te donnerai ╵le pays de Canaan,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera la part ╵que vous allez posséder
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 10-11, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 28.13-15
        metadata:
          usfm: GEN.28.13+GEN.28.14+GEN.28.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils n’étaient alors ╵qu’un très petit nombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une poignée d’immigrants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 34.30 ; Dt 7.7 ; 26.5.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: allant çà et là, ╵d’une peuplade à une autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’un royaume vers un autre peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais Dieu ne laissa personne ╵les persécuter ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il réprimanda des rois à leur sujet :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: « Ne maltraitez pas ╵ceux qui me sont consacrés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne faites pas de mal ╵à ceux qui sont mes prophètes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 14-15, voir Gn 12.17 ; 20.3-7.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il fit venir la famine ╵sur tout le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les privant de pain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 41.53-57
        metadata:
          usfm: GEN.41.53+GEN.41.54+GEN.41.55+GEN.41.56+GEN.41.57
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il envoya devant eux un homme :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joseph, vendu comme esclave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 37.28 ; 45.5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On chargea ses pieds de chaînes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son cou d’un carcan de fer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 39.20
        metadata:
          usfm: GEN.39.20
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: jusqu’au jour où s’accomplit ╵ce que Joseph avait annoncé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors la parole ╵prononcée par l’Eternel ╵montra qu’il avait raison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 37.6-10
        metadata:
          usfm: GEN.37.6+GEN.37.7+GEN.37.8+GEN.37.9+GEN.37.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: le roi ordonna ╵de le délier ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le dominateur des peuples ╵le fit relâcher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 41.14
        metadata:
          usfm: GEN.41.14
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: et il l’établit seigneur sur son royaume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le nomma gouverneur ╵de tous ses domaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 41.39-41
        metadata:
          usfm: GEN.41.39+GEN.41.40+GEN.41.41
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: pour donner ses instructions à ses ministres ╵comme il le jugerait bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour enseigner la sagesse ╵à ses conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Puis Israël se rendit ╵en Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob émigra ╵au pays de Cham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 46.6 ; 47.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dieu rendit son peuple ╵très fécond,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus puissant ╵que ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il changea les dispositions de ceux-ci, ╵qui se mirent à haïr son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à préparer le malheur ╵de ses serviteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 24-25, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1.7-14
        metadata:
          usfm: EXO.1.7+EXO.1.8+EXO.1.9+EXO.1.10+EXO.1.11+EXO.1.12+EXO.1.13+EXO.1.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors il leur envoya ╵Moïse, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aaron qu’il avait choisi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.1-4
        metadata:
          usfm: EXO.3.1+EXO.3.2+EXO.3.3+EXO.3.4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
        metadata:
          usfm: EXO.3.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En Egypte, ils accomplirent ╵sur son ordre des miracles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de grands prodiges ╵au pays de Cham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il envoya les ténèbres ╵qui couvrirent le pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 10.21-29
        metadata:
          usfm: EXO.10.21+EXO.10.22+EXO.10.23+EXO.10.24+EXO.10.25+EXO.10.26+EXO.10.27+EXO.10.28+EXO.10.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les Egyptiens cessèrent ╵de résister à ses ordres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 11.1-2
        metadata:
          usfm: EXO.11.1+EXO.11.2
      - type: text
        text: '. L’ancienne version grecque et la syriaque portent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avaient résisté à ses ordres.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il changea leurs eaux en sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fit mourir leurs poissons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7.14-25
        metadata:
          usfm: EXO.7.14+EXO.7.15+EXO.7.16+EXO.7.17+EXO.7.18+EXO.7.19+EXO.7.20+EXO.7.21+EXO.7.22+EXO.7.23+EXO.7.24+EXO.7.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il fit grouiller de grenouilles ╵le pays entier
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’aux chambres de leur roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 7.26 à 8.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Sur un ordre de sa part, ╵parurent des mouches venimeuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les moustiques envahirent ╵le pays entier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 8.12-28
        metadata:
          usfm: EXO.8.12+EXO.8.13+EXO.8.14+EXO.8.15+EXO.8.16+EXO.8.17+EXO.8.18+EXO.8.19+EXO.8.20+EXO.8.21+EXO.8.22+EXO.8.23+EXO.8.24+EXO.8.25+EXO.8.26+EXO.8.27+EXO.8.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Au lieu de la pluie, ╵il leur envoya la grêle
- type: usfm
  marker: q1
