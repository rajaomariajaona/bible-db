      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louez l’Eternel, ╵et faites appel à lui !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publiez parmi les peuples ╵ses hauts faits !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il l’a confirmé ╵à Jacob ╵en en faisant une loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, pour Israël, ╵une alliance pour toujours.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il a déclaré : ╵« Je te donnerai ╵le pays de Canaan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera la part ╵que vous allez posséder
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 10-11, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 28.13-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils n’étaient alors ╵qu’un très petit nombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une poignée d’immigrants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 34.30 ; Dt 7.7 ; 26.5.
      marker-yv: yv-n
    - type: text
      text: ','
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: allant çà et là, ╵d’une peuplade à une autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un royaume vers un autre peuple.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais Dieu ne laissa personne ╵les persécuter ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il réprimanda des rois à leur sujet :'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: « Ne maltraitez pas ╵ceux qui me sont consacrés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas de mal ╵à ceux qui sont mes prophètes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 14-15, voir Gn 12.17 ; 20.3-7.
      marker-yv: yv-n
    - type: text
      text: '  ! »'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il fit venir la famine ╵sur tout le pays,
  - type: usfm
    marker: q1
    children:
