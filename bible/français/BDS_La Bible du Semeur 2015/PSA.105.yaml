document_id: PSA.105,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu est fidèlePour les v. 1-15, voir 1 Ch 16.8-22.
  - type: text
    content: Louez l’Eternel, ╵et faites appel à lui !
  - type: text
    content: Publiez parmi les peuples ╵ses hauts faits !
  '10':
  - type: text
    content: Il l’a confirmé ╵à Jacob ╵en en faisant une loi,
  - type: text
    content: et, pour Israël, ╵une alliance pour toujours.
  '11':
  - type: text
    content: 'Il a déclaré : ╵« Je te donnerai ╵le pays de Canaan,'
  - type: text
    content: ce sera la part ╵que vous allez posséder
  - type: note
    content: Pour les v. 10-11, voir Gn 28.13-15.
  - type: text
    content: . »
  '12':
  - type: text
    content: Ils n’étaient alors ╵qu’un très petit nombre,
  - type: text
    content: une poignée d’immigrants
  - type: note
    content: Voir Gn 34.30 ; Dt 7.7 ; 26.5.
  - type: text
    content: ','
  '13':
  - type: text
    content: allant çà et là, ╵d’une peuplade à une autre,
  - type: text
    content: d’un royaume vers un autre peuple.
  '14':
  - type: text
    content: Mais Dieu ne laissa personne ╵les persécuter ;
  - type: text
    content: 'il réprimanda des rois à leur sujet :'
  '15':
  - type: text
    content: « Ne maltraitez pas ╵ceux qui me sont consacrés
  - type: text
    content: et ne faites pas de mal ╵à ceux qui sont mes prophètes
  - type: note
    content: Pour les v. 14-15, voir Gn 12.17 ; 20.3-7.
  - type: text
    content: '  ! »'
  '16':
  - type: text
    content: Il fit venir la famine ╵sur tout le pays,
  - type: text
    content: les privant de pain
  - type: note
    content: Voir Gn 41.53-57.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Il envoya devant eux un homme :'
  - type: text
    content: Joseph, vendu comme esclave
  - type: note
    content: Voir Gn 37.28 ; 45.5.
  - type: text
    content: .
  '18':
  - type: text
    content: On chargea ses pieds de chaînes,
  - type: text
    content: son cou d’un carcan de fer
  - type: note
    content: Voir Gn 39.20.
  '19':
  - type: text
    content: jusqu’au jour où s’accomplit ╵ce que Joseph avait annoncé.
  - type: text
    content: Alors la parole ╵prononcée par l’Eternel ╵montra qu’il avait raison
  - type: note
    content: Voir Gn 37.6-10.
  - type: text
    content: '  :'
  '2':
  - type: text
    content: Chantez à sa gloire, ╵et célébrez-le ╵en musique !
  - type: text
    content: Racontez sans cesse ╵toutes ses merveilles !
  '20':
  - type: text
    content: le roi ordonna ╵de le délier ;
  - type: text
    content: le dominateur des peuples ╵le fit relâcher
  - type: note
    content: Voir Gn 41.14.
  '21':
  - type: text
    content: et il l’établit seigneur sur son royaume,
  - type: text
    content: il le nomma gouverneur ╵de tous ses domaines
  - type: note
    content: Voir Gn 41.39-41.
  '22':
  - type: text
    content: pour donner ses instructions à ses ministres ╵comme il le jugerait bon,
  - type: text
    content: pour enseigner la sagesse ╵à ses conseillers.
  '23':
  - type: text
    content: Puis Israël se rendit ╵en Egypte,
  - type: text
    content: Jacob émigra ╵au pays de Cham
  - type: note
    content: Voir Gn 46.6 ; 47.11.
  - type: text
    content: .
  '24':
  - type: text
    content: Dieu rendit son peuple ╵très fécond,
  - type: text
    content: plus puissant ╵que ses ennemis.
  '25':
  - type: text
    content: Il changea les dispositions de ceux-ci, ╵qui se mirent à haïr son peuple,
  - type: text
    content: à préparer le malheur ╵de ses serviteurs
  - type: note
    content: Pour les v. 24-25, voir Ex 1.7-14.
  - type: text
    content: .
  '26':
  - type: text
    content: Alors il leur envoya ╵Moïse, son serviteur,
  - type: text
    content: Aaron qu’il avait choisi
  - type: note
    content: Voir Ex 3.1-4, 17.
  - type: text
    content: .
  '27':
  - type: text
    content: En Egypte, ils accomplirent ╵sur son ordre des miracles
  - type: text
    content: et de grands prodiges ╵au pays de Cham.
  '28':
  - type: text
    content: Il envoya les ténèbres ╵qui couvrirent le pays
  - type: note
    content: Voir Ex 10.21-29.
  - type: text
    content: ','
  - type: text
    content: et les Egyptiens cessèrent ╵de résister à ses ordres
  - type: note
    content: 'Voir Ex 11.1-2. L’ancienne version grecque et la syriaque portent : avaient résisté à ses ordres.'
  - type: text
    content: .
  '29':
  - type: text
    content: Il changea leurs eaux en sang
  - type: text
    content: et fit mourir leurs poissons
  - type: note
    content: Voir Ex 7.14-25.
  - type: text
    content: .
  '3':
  - type: text
    content: Soyez fiers de lui, ╵car il est très saint !
  - type: text
    content: Que le cœur de ceux ╵qui sont attachés à l’Eternel ╵soit rempli de joie !
  '30':
  - type: text
    content: Il fit grouiller de grenouilles ╵le pays entier
  - type: text
    content: jusqu’aux chambres de leur roi
  - type: note
    content: Voir Ex 7.26 à 8.11.
  - type: text
    content: .
  '31':
  - type: text
    content: Sur un ordre de sa part, ╵parurent des mouches venimeuses,
  - type: text
    content: les moustiques envahirent ╵le pays entier
  - type: note
    content: Voir Ex 8.12-28.
  - type: text
    content: .
  '32':
  - type: text
    content: Au lieu de la pluie, ╵il leur envoya la grêle
  - type: text
    content: et il fit tomber la foudre ╵sur tout leur pays.
  '33':
  - type: text
    content: Il frappa ╵leurs vignes et leurs figuiers
  - type: text
    content: et brisa les arbres ╵de leur territoire
  - type: note
    content: Voir Ex 9.13-35.
  - type: text
    content: .
  '34':
  - type: text
    content: Sur un ordre de sa part, ╵d’innombrables sauterelles
  - type: text
    content: et des criquets arrivèrent
  '35':
  - type: text
    content: pour dévorer toute l’herbe ╵à travers tout le pays,
  - type: text
    content: et tous les produits ╵de leur terre
  - type: note
    content: Voir Ex 10.1-20.
  - type: text
    content: .
  '36':
  - type: text
    content: Puis il fit mourir ╵tous les fils aînés dans leur pays,
  - type: text
    content: premiers fruits de leur vigueur virile
  - type: note
    content: Voir Ex 12.29-30.
  - type: text
    content: ','
  '37':
  - type: text
    content: et il fit sortir les siens ╵avec de l’argent, de l’or
  - type: note
    content: Voir Ex 12.35-36.
  - type: text
    content: ','
  - type: text
    content: sans qu’aucun trébuche ╵parmi ses tribus.
  '38':
  - type: text
    content: Les Egyptiens se réjouirent ╵de les voir partir,
  - type: text
    content: car devant ce peuple, ╵ils étaient terrorisés
  - type: note
    content: Voir Ex 12.33 ; 15.16.
  - type: text
    content: .
  '39':
  - type: text
    content: Il étendit la nuée ╵comme un rideau protecteur,
  - type: text
    content: et il fit briller un feu ╵pour les éclairer la nuit
  - type: note
    content: Voir Ex 13.21-22 ; 14.19-20.
  - type: text
    content: .
  '4':
  - type: text
    content: Tournez-vous vers l’Eternel ! ╵Faites appel à sa force !
  - type: text
    content: Aspirez à vivre ╵constamment en sa présence !
  '40':
  - type: text
    content: Parce qu’ils le demandèrent, ╵il leur envoya des cailles
  - type: text
    content: et les rassasia ╵du pain qui venait du ciel
  - type: note
    content: Voir Ex 16.13-18.
  - type: text
    content: .
  '41':
  - type: text
    content: Il fendit la roche, ╵et l’eau en jaillit.
  - type: text
    content: A travers la steppe aride, ╵elle coula comme un fleuve
  - type: note
    content: Voir Ex 17.1-7 ; Nb 20.2-13.
  - type: text
    content: ','
  '42':
  - type: text
    content: car il se souvint ╵d’Abraham, son serviteur,
  - type: text
    content: et de la promesse sainte ╵qu’il lui avait faite
  - type: note
    content: Voir Gn 15.13-14 ; Ex 2.24.
  - type: text
    content: .
  '43':
  - type: text
    content: Il fit sortir du pays ╵son peuple dans l’allégresse
  - type: text
    content: et ceux qu’il avait choisis ╵avec des cris de triomphe.
  '44':
  - type: text
    content: Il leur a donné les terres ╵occupées par d’autres peuples
  - type: text
    content: et les a fait profiter ╵du travail que ces populations ╵avaient accompli
  - type: note
    content: Voir Jos 11.16-23.
  - type: text
    content: ','
  '45':
  - type: text
    content: pour qu’ils obéissent ╵à ce qu’il avait prescrit
  - type: text
    content: et qu’ils respectent ses lois.
  - type: text
    content: Louez l’Eternel !
  '5':
  - type: text
    content: Souvenez-vous des merveilles ╵qu’il a accomplies !
  - type: text
    content: Rappelez-vous ses prodiges ╵et les jugements ╵qu’il a prononcés,
  '6':
  - type: text
    content: vous, les descendants ╵d’Abraham, son serviteur,
  - type: text
    content: vous, descendants de Jacob, ╵vous qu’il a choisis !
  '7':
  - type: text
    content: Notre Dieu, c’est l’Eternel,
  - type: text
    content: sur toute la terre ╵s’exercent ses jugements.
  '8':
  - type: text
    content: Il se souvient pour toujours ╵de son alliance,
  - type: text
    content: de ce qu’il a donné sa parole ╵pour mille générations
  - type: note
    content: Voir Dt 7.9.
  - type: text
    content: '  :'
  '9':
  - type: text
    content: il a conclu un traité ╵avec Abraham,
  - type: text
    content: et l’a confirmé ╵par serment à Isaac
  - type: note
    content: Voir Gn 12.7 ; 17.8 ; 22.16-17 ; 26.3.
  - type: text
    content: .
