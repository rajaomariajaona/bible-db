document_id: 2TI.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Proclame la Parole !
  - type: text
    content: 'C’est pourquoi, devant Dieu et devant Jésus-Christ, qui va juger les vivants et les morts, et dans la perspective de sa venue et de son règne, je te le recommande solennellement : '
  '10':
  - type: text
    content: Car Démas
  - type: note
    content: Col 4.14 ; Phm 24.
  - type: text
    content: ' m’a abandonné : il a aimé le monde présent et il est parti pour Thessalonique. Crescens s’est rendu en Galatie'
  - type: note
    content: Peut-être la province romaine de Galatie ou alors la Gaule.
  - type: text
    content: ', Tite en Dalmatie'
  - type: note
    content: Un district de l’Illyrie (qui porte encore ce nom) sur la rive est de l’Adriatique. Paul y avait commencé un travail d’évangélisation (voir Rm 15.19).
  - type: text
    content: '. '
  '11':
  - type: text
    content: Seul Luc est encore avec moi. Prends Marc
  - type: note
    content: Voir Ac 12.12, 25 ; 13.5, 13 ; 15.37.
  - type: text
    content: ' et amène-le avec toi ; car il m’est très utile pour mon ministère. '
  '12':
  - type: text
    content: Quant à Tychique, je l’ai envoyé à Ephèse
  - type: note
    content: Quand il arrivera, Timothée pourra quitter Ephèse et rejoindre Paul (v. 9).
  - type: text
    content: .
  '13':
  - type: text
    content: Lorsque tu viendras, rapporte-moi le manteau que j’ai laissé à Troas chez Carpus, ainsi que les livres, surtout les parchemins
  - type: note
    content: Ouvrages de valeur. Il s’agissait peut-être de copies de livres bibliques de l’Ancien Testament.
  - type: text
    content: .
  '14':
  - type: text
    content: Alexandre
  - type: note
    content: Voir 1 Tm 1.20.
  - type: text
    content: ', l’orfèvre, a fait preuve de beaucoup de méchanceté à mon égard. '
  - type: text
    content: Le Seigneur lui donnera ce que lui auront valu ses actes
  - type: note
    content: Ps 28.4 ; 62.13 ; Pr 24.12.
  - type: text
    content: .
  - type: text
    content: ' '
  '15':
  - type: text
    content: Toi aussi, garde-toi de lui, car il s’est opposé avec acharnement à notre prédication.
  - type: heading
    content: Confiance de Paul dans le Seigneur
  '16':
  - type: text
    content: 'La première fois que j’ai eu à présenter ma défense au tribunal, personne n’est venu m’assister, tous m’ont abandonné. Qu’il ne leur en soit pas tenu rigueur. '
  '17':
  - type: text
    content: C’est le Seigneur qui m’a assisté et m’a donné la force d’annoncer pleinement le message pour qu’il soit entendu par tous les non-Juifs. Et j’ai été délivré de la gueule du lion.
  '18':
  - type: text
    content: Le Seigneur continuera à me délivrer de toute entreprise mauvaise et me sauvera pour son royaume céleste. A lui soit la gloire pour l’éternité. Amen.
  - type: heading
    content: Salutations
  '19':
  - type: text
    content: 'Salue Prisca, Aquilas et la famille d’Onésiphore. '
  '2':
  - type: text
    content: proclame la Parole, insiste, que l’occasion soit favorable ou non, convaincs, réprimande, encourage par ton enseignement, avec une patience inlassable.
  '20':
  - type: text
    content: Eraste
  - type: note
    content: Voir Rm 16.23.
  - type: text
    content: ' est resté à Corinthe. Quant à Trophime, il était malade et je l’ai laissé à Milet.'
  '21':
  - type: text
    content: Tâche de venir avant l’hiver. Eubulus, Pudens, Linus, Claudia et tous les frères et sœurs te saluent.
  '22':
  - type: text
    content: Que le Seigneur soit avec toi et que sa grâce soit avec vous.
  '3':
  - type: text
    content: 'Car le temps viendra où les hommes ne voudront plus rien savoir de l’enseignement sain. Au gré de leurs propres désirs, ils se choisiront une foule de maîtres à qui ils ne demanderont que de leur caresser agréablement les oreilles. '
  '4':
  - type: text
    content: 'Ils détourneront l’oreille de la vérité pour écouter des récits de pure invention. '
  '5':
  - type: text
    content: Mais toi, fais preuve, en toute circonstance, de modération. Supporte les souffrances. Remplis bien ton rôle de prédicateur de l’Evangile
  - type: note
    content: 'Autre traduction : Fais l’œuvre d’un évangéliste.'
  - type: text
    content: . Accomplis pleinement ton ministère.
  - type: heading
    content: Paul et Timothée
  - type: heading
    content: 'Paul : la fin de la course'
  '6':
  - type: text
    content: Car, en ce qui me concerne, je suis près d’offrir ma vie comme une libation
  - type: note
    content: Voir Ph 2.17 et note.
  - type: text
    content: ' pour Dieu. Le moment de mon départ est arrivé. '
  '7':
  - type: text
    content: J’ai combattu le bon combat. J’ai achevé ma course. J’ai gardé la foi
  - type: note
    content: 'Autre traduction : je suis resté fidèle à mes engagements.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Telle une couronne, la justice que Dieu accorde est déjà préparée pour moi. Le Seigneur, le juste Juge, me la remettra au jour du jugement, et pas seulement à moi, mais à tous ceux qui, avec amour, attendent sa venue.
  - type: heading
    content: Dernières instructions à Timothée
  '9':
  - type: text
    content: 'Efforce-toi de venir me rejoindre dès que possible. '
