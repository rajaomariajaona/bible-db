document_id: 2TI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Proclame la Parole !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est pourquoi, devant Dieu et devant Jésus-Christ, qui va juger les vivants et les morts, et dans la perspective de sa venue et de son règne, je te le recommande solennellement : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: proclame la Parole, insiste, que l’occasion soit favorable ou non, convaincs, réprimande, encourage par ton enseignement, avec une patience inlassable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car le temps viendra où les hommes ne voudront plus rien savoir de l’enseignement sain. Au gré de leurs propres désirs, ils se choisiront une foule de maîtres à qui ils ne demanderont que de leur caresser agréablement les oreilles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils détourneront l’oreille de la vérité pour écouter des récits de pure invention. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais toi, fais preuve, en toute circonstance, de modération. Supporte les souffrances. Remplis bien ton rôle de prédicateur de l’Evangile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Fais l’œuvre d’un évangéliste.
    marker-yv: yv-n
  - type: text
    text: . Accomplis pleinement ton ministère.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Paul et Timothée
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul : la fin de la course'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car, en ce qui me concerne, je suis près d’offrir ma vie comme une libation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2.17
        metadata:
          usfm: PHP.2.17
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' pour Dieu. Le moment de mon départ est arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai combattu le bon combat. J’ai achevé ma course. J’ai gardé la foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je suis resté fidèle à mes engagements.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Telle une couronne, la justice que Dieu accorde est déjà préparée pour moi. Le Seigneur, le juste Juge, me la remettra au jour du jugement, et pas seulement à moi, mais à tous ceux qui, avec amour, attendent sa venue.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernières instructions à Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Efforce-toi de venir me rejoindre dès que possible. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car Démas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Col 4.14 ; Phm 24.
    marker-yv: yv-n
  - type: text
    text: ' m’a abandonné : il a aimé le monde présent et il est parti pour Thessalonique. Crescens s’est rendu en Galatie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être la province romaine de Galatie ou alors la Gaule.
    marker-yv: yv-n
  - type: text
    text: ', Tite en Dalmatie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Un district de l’Illyrie (qui porte encore ce nom) sur la rive est de l’Adriatique. Paul y avait commencé un travail d’évangélisation (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 15.19
        metadata:
          usfm: ROM.15.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Seul Luc est encore avec moi. Prends Marc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 12.12, 25 ; 13.5, 13 ; 15.37.
    marker-yv: yv-n
  - type: text
    text: ' et amène-le avec toi ; car il m’est très utile pour mon ministère. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quant à Tychique, je l’ai envoyé à Ephèse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Quand il arrivera, Timothée pourra quitter Ephèse et rejoindre Paul (v. 9).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lorsque tu viendras, rapporte-moi le manteau que j’ai laissé à Troas chez Carpus, ainsi que les livres, surtout les parchemins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ouvrages de valeur. Il s’agissait peut-être de copies de livres bibliques de l’Ancien Testament.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alexandre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 1.20
        metadata:
          usfm: 1TI.1.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', l’orfèvre, a fait preuve de beaucoup de méchanceté à mon égard. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur lui donnera ce que lui auront valu ses actes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 28.4 ; 62.13 ; Pr 24.12.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toi aussi, garde-toi de lui, car il s’est opposé avec acharnement à notre prédication.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confiance de Paul dans le Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La première fois que j’ai eu à présenter ma défense au tribunal, personne n’est venu m’assister, tous m’ont abandonné. Qu’il ne leur en soit pas tenu rigueur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est le Seigneur qui m’a assisté et m’a donné la force d’annoncer pleinement le message pour qu’il soit entendu par tous les non-Juifs. Et j’ai été délivré de la gueule du lion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le Seigneur continuera à me délivrer de toute entreprise mauvaise et me sauvera pour son royaume céleste. A lui soit la gloire pour l’éternité. Amen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Salue Prisca, Aquilas et la famille d’Onésiphore. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eraste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 16.23
        metadata:
          usfm: ROM.16.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' est resté à Corinthe. Quant à Trophime, il était malade et je l’ai laissé à Milet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tâche de venir avant l’hiver. Eubulus, Pudens, Linus, Claudia et tous les frères et sœurs te saluent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Que le Seigneur soit avec toi et que sa grâce soit avec vous.
