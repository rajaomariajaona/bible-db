document_id: PSA.45,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pour le mariage du roi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur, à chanter sur la mélodie des « Lis »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Terme de sens incertain. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec accompagnement sur instrument à six cordes.
      marker-yv: yv-n
    - type: text
      text: . Une méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' et un chant d’amour des Qoréites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et voici les princesses ╵parmi les dames de ta cour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La version syriaque porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une princesse se tient parmi les dames de ta cour : '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: il s’agit alors de la mariée, la reine mentionnée à la ligne suivante.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la reine est à ta droite, ╵parée de l’or d’Ophir.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Entends, ma fille, et vois ! ╵Ecoute-moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne pense plus ╵à ton peuple et à ta famille.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car le roi est épris ╵de ta beauté !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui, il est ton seigneur, ╵prosterne-toi donc devant lui !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les habitants de Tyr
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les habitants de Tyr…
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la princesse de Tyr viendra t’apporter ses présents. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On peut aussi comprendre : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'O princesse de Tyr, les peuples les plus riches viendront t’apporter leurs présents pour gagner ta faveur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le roi de Tyr fut le premier à reconnaître la dynastie davidique (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 5.11
        - type: text
          text: ) ; Salomon a maintenu des relations fréquentes avec lui (1 R 5.15 ; 9.10-14, 26-28). Centre commercial important sur la Méditerranée, Tyr était renommée pour ses richesses (Es 23 ; Ez 26.1 à 28.19).
      marker-yv: yv-n
    - type: text
      text: ', ╵viendront t’apporter leurs présents'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour gagner ta faveur ╵de même que les peuples les plus riches.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Toute resplendissante ╵est la fille du roi ╵dans le palais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses vêtements ╵sont brodés de l’or le plus fin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: En vêtements brodés, ╵on la présente au roi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De jeunes demoiselles ╵la suivent en cortège : ╵on les conduit auprès de toi.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On les conduit ╵dans la joie et dans l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sont introduites ╵dans le palais du roi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tes fils succéderont ╵à tes ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les établiras ╵princes pour diriger ╵tout le pays.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je redirai ta renommée ╵à toutes les générations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi tous les peuples ╵te loueront éternellement.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mon cœur est tout vibrant ╵de paroles très belles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis : Mon œuvre est pour le roi !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je voudrais que ma langue ╵soit comme le roseau ╵d’un habile écrivain.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Parmi tous les humains, ╵tu es bien le plus beau !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La grâce est sur tes lèvres ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on voit bien que Dieu ╵t’a béni à jamais.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Guerrier plein de vaillance, ╵ceins ton épée sur le côté !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, revêts-toi ╵de ta magnificence, ╵de l’éclat de ta gloire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et dans ta gloire, ╵remporte des victoires !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis ton char de guerre, ╵défends la vérité, ╵la douceur, la justice !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta main se signale ╵par des actions d’éclat !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tes flèches acérées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: atteindront en plein cœur ╵les ennemis du roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu feras tomber ╵des peuples sous tes pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ton trône, ô Dieu, subsiste ╵pour toute éternité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sceptre de ton règne ╵est sceptre d’équité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 7-8 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 1.8-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu aimes la justice, ╵et tu détestes la méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi, ô Dieu, ton Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aussi Dieu, ton Dieu.
      marker-yv: yv-n
    - type: text
      text: ' ╵t’a oint d’une huile d’allégresse'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agissait d’huile aromatique (voir v. 9). On la répandait aussi sur les vêtements (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 7.17
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et t’a ainsi fait roi, ╵de préférence ╵à tous tes compagnons.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Myrrhe, aloès, cannelle ╵embaument tes habits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les palais d’ivoire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les harpes te ravissent.
