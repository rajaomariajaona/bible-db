document_id: PSA.45,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pour le mariage du roi
  - type: text
    content: Au chef de chœur, à chanter sur la mélodie des « Lis »
  - type: note
    content: 'Terme de sens incertain. Autre traduction : avec accompagnement sur instrument à six cordes.'
  - type: text
    content: . Une méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' et un chant d’amour des Qoréites'
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Et voici les princesses ╵parmi les dames de ta cour
  - type: note
    content: 'La version syriaque porte : une princesse se tient parmi les dames de ta cour : il s’agit alors de la mariée, la reine mentionnée à la ligne suivante.'
  - type: text
    content: ','
  - type: text
    content: la reine est à ta droite, ╵parée de l’or d’Ophir.
  '11':
  - type: text
    content: 'Entends, ma fille, et vois ! ╵Ecoute-moi :'
  - type: text
    content: Ne pense plus ╵à ton peuple et à ta famille.
  '12':
  - type: text
    content: Car le roi est épris ╵de ta beauté !
  - type: text
    content: Lui, il est ton seigneur, ╵prosterne-toi donc devant lui !
  '13':
  - type: text
    content: Les habitants de Tyr
  - type: note
    content: 'Les habitants de Tyr…: autre traduction : la princesse de Tyr viendra t’apporter ses présents. On peut aussi comprendre : O princesse de Tyr, les peuples les plus riches viendront t’apporter leurs présents pour gagner ta faveur. Le roi de Tyr fut le premier à reconnaître la dynastie davidique (2 S 5.11) ; Salomon a maintenu des relations fréquentes avec lui (1 R 5.15 ; 9.10-14, 26-28). Centre commercial important sur la Méditerranée, Tyr était renommée pour ses richesses (Es 23 ; Ez 26.1 à 28.19).'
  - type: text
    content: ', ╵viendront t’apporter leurs présents'
  - type: text
    content: pour gagner ta faveur ╵de même que les peuples les plus riches.
  '14':
  - type: text
    content: Toute resplendissante ╵est la fille du roi ╵dans le palais.
  - type: text
    content: Ses vêtements ╵sont brodés de l’or le plus fin.
  '15':
  - type: text
    content: En vêtements brodés, ╵on la présente au roi.
  - type: text
    content: 'De jeunes demoiselles ╵la suivent en cortège : ╵on les conduit auprès de toi.'
  '16':
  - type: text
    content: On les conduit ╵dans la joie et dans l’allégresse,
  - type: text
    content: elles sont introduites ╵dans le palais du roi.
  '17':
  - type: text
    content: Tes fils succéderont ╵à tes ancêtres,
  - type: text
    content: tu les établiras ╵princes pour diriger ╵tout le pays.
  '18':
  - type: text
    content: Je redirai ta renommée ╵à toutes les générations.
  - type: text
    content: C’est pourquoi tous les peuples ╵te loueront éternellement.
  '2':
  - type: text
    content: Mon cœur est tout vibrant ╵de paroles très belles.
  - type: text
    content: 'Je dis : Mon œuvre est pour le roi !'
  - type: text
    content: Je voudrais que ma langue ╵soit comme le roseau ╵d’un habile écrivain.
  '3':
  - type: text
    content: Parmi tous les humains, ╵tu es bien le plus beau !
  - type: text
    content: La grâce est sur tes lèvres ;
  - type: text
    content: et l’on voit bien que Dieu ╵t’a béni à jamais.
  '4':
  - type: text
    content: Guerrier plein de vaillance, ╵ceins ton épée sur le côté !
  - type: text
    content: Oui, revêts-toi ╵de ta magnificence, ╵de l’éclat de ta gloire.
  '5':
  - type: text
    content: Et dans ta gloire, ╵remporte des victoires !
  - type: text
    content: Conduis ton char de guerre, ╵défends la vérité, ╵la douceur, la justice !
  - type: text
    content: Que ta main se signale ╵par des actions d’éclat !
  '6':
  - type: text
    content: Tes flèches acérées
  - type: text
    content: atteindront en plein cœur ╵les ennemis du roi
  - type: text
    content: et tu feras tomber ╵des peuples sous tes pas.
  '7':
  - type: text
    content: Ton trône, ô Dieu, subsiste ╵pour toute éternité,
  - type: text
    content: le sceptre de ton règne ╵est sceptre d’équité
  - type: note
    content: Les v. 7-8 sont cités en Hé 1.8-9.
  - type: text
    content: .
  '8':
  - type: text
    content: Tu aimes la justice, ╵et tu détestes la méchanceté.
  - type: text
    content: Aussi, ô Dieu, ton Dieu
  - type: note
    content: 'D’autres comprennent : Aussi Dieu, ton Dieu.'
  - type: text
    content: ' ╵t’a oint d’une huile d’allégresse'
  - type: note
    content: Il s’agissait d’huile aromatique (voir v. 9). On la répandait aussi sur les vêtements (voir Pr 7.17).
  - type: text
    content: et t’a ainsi fait roi, ╵de préférence ╵à tous tes compagnons.
  '9':
  - type: text
    content: Myrrhe, aloès, cannelle ╵embaument tes habits.
  - type: text
    content: Dans les palais d’ivoire,
  - type: text
    content: les harpes te ravissent.
