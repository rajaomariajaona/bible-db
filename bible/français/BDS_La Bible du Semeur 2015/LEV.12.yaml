document_id: LEV.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La loi sur la purification après un accouchement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel s’adressa à Moïse en ces termes : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Parle aux Israélites : Lorsqu’une femme conçoit et met au monde un garçon, elle sera rituellement impure durant sept jours, comme lors de son indisposition menstruelle. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le huitième jour, on circoncira l’enfant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 17.12 ; Lc 2.21.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il lui faudra attendre encore trente-trois jours pour être purifiée de son sang ; elle ne touchera aucune chose consacrée ; elle n’ira pas au sanctuaire jusqu’à ce que le temps de sa purification parvienne à son terme.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Si c’est une fille à laquelle elle donne naissance, elle sera rituellement impure deux semaines comme lors de ses règles, puis il lui faudra attendre encore soixante-six jours pour être purifiée de son sang.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quand les jours de sa purification seront achevés – qu’il s’agisse d’un garçon ou d’une fille – elle apportera à l’entrée de la tente de la Rencontre un agneau dans sa première année pour l’holocauste, et un pigeonneau ou une tourterelle pour le sacrifice pour le péché, et elle les remettra au prêtre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Celui-ci les présentera à l’Eternel, accomplira pour elle le rite d’expiation et elle sera rituellement purifiée de sa perte de sang.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telle est la règle concernant la femme qui donne naissance à un garçon ou à une fille.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si elle n’a pas de quoi offrir un agneau, elle prendra deux tourterelles ou deux pigeonneaux, l’un pour l’holocauste et l’autre pour le sacrifice pour le péché ; le prêtre accomplira pour elle le rite d’expiation et elle sera purifiée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 2.24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
