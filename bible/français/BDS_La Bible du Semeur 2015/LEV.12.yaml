document_id: LEV.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La loi sur la purification après un accouchement
  - type: text
    content: 'L’Eternel s’adressa à Moïse en ces termes : '
  '2':
  - type: text
    content: 'Parle aux Israélites : Lorsqu’une femme conçoit et met au monde un garçon, elle sera rituellement impure durant sept jours, comme lors de son indisposition menstruelle. '
  '3':
  - type: text
    content: Le huitième jour, on circoncira l’enfant
  - type: note
    content: Voir Gn 17.12 ; Lc 2.21.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Il lui faudra attendre encore trente-trois jours pour être purifiée de son sang ; elle ne touchera aucune chose consacrée ; elle n’ira pas au sanctuaire jusqu’à ce que le temps de sa purification parvienne à son terme.
  '5':
  - type: text
    content: Si c’est une fille à laquelle elle donne naissance, elle sera rituellement impure deux semaines comme lors de ses règles, puis il lui faudra attendre encore soixante-six jours pour être purifiée de son sang.
  '6':
  - type: text
    content: 'Quand les jours de sa purification seront achevés – qu’il s’agisse d’un garçon ou d’une fille – elle apportera à l’entrée de la tente de la Rencontre un agneau dans sa première année pour l’holocauste, et un pigeonneau ou une tourterelle pour le sacrifice pour le péché, et elle les remettra au prêtre. '
  '7':
  - type: text
    content: Celui-ci les présentera à l’Eternel, accomplira pour elle le rite d’expiation et elle sera rituellement purifiée de sa perte de sang.
  - type: text
    content: Telle est la règle concernant la femme qui donne naissance à un garçon ou à une fille.
  '8':
  - type: text
    content: Si elle n’a pas de quoi offrir un agneau, elle prendra deux tourterelles ou deux pigeonneaux, l’un pour l’holocauste et l’autre pour le sacrifice pour le péché ; le prêtre accomplira pour elle le rite d’expiation et elle sera purifiée
  - type: note
    content: Allusion en Lc 2.24.
  - type: text
    content: .
