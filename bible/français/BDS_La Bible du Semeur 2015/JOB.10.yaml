document_id: JOB.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, pourquoi t’en prends-tu à moi ?
  - type: text
    content: Je suis dégoûté de la vie,
  - type: text
    content: je ne retiendrai plus mes plaintes,
  - type: text
    content: je veux exprimer l’amertume ╵qui remplit tout mon être.
  '10':
  - type: text
    content: Tu m’as coulé comme du lait,
  - type: text
    content: puis fait cailler en fromage.
  '11':
  - type: text
    content: Oui, tu m’as revêtu ╵de peau, de chair,
  - type: text
    content: tu m’as tissé d’os et de nerfs.
  '12':
  - type: text
    content: C’est toi qui m’as donné la vie, ╵tu m’as accordé ta faveur
  - type: note
    content: 'Autre traduction : c’est toi qui m’as accordé la grâce de la vie.'
  - type: text
    content: ','
  - type: text
    content: et tes soins vigilants ╵ont préservé mon souffle.
  '13':
  - type: text
    content: Mais voilà donc ╵ce que tu cachais dans ton cœur
  - type: text
    content: 'et je sais maintenant ╵ce que tu méditais :'
  '14':
  - type: text
    content: me surveiller, ╵voir si je pèche,
  - type: text
    content: ne me laisser passer ╵aucune faute,
  '15':
  - type: text
    content: et si je suis coupable, ╵malheur à moi !
  - type: text
    content: Si je suis juste, ╵je ne puis cependant ╵marcher la tête haute,
  - type: text
    content: moi qui suis rassasié ╵de honte et de misère.
  '16':
  - type: text
    content: Car si je me relève, ╵tu me pourchasses comme un lion,
  - type: text
    content: et tu ne cesses d’accomplir ╵tes hauts faits contre moi.
  '17':
  - type: text
    content: Sans cesse tu dépêches ╵de nouveaux témoins contre moi
  - type: note
    content: 'D’autres comprennent, en modifiant légèrement le texte hébreu : Tu renouvelles constamment ton hostilité contre moi.'
  - type: text
    content: ','
  - type: text
    content: ta fureur envers moi s’accroît,
  - type: text
    content: tes troupes se succèdent ╵pour m’assaillir.
  '18':
  - type: text
    content: Pourquoi donc m’as-tu fait sortir ╵du ventre maternel ?
  - type: text
    content: J’aurais péri alors ╵et aucun œil ne m’aurait vu.
  '19':
  - type: text
    content: Je serais comme ceux ╵qui n’ont jamais été,
  - type: text
    content: j’aurais été porté ╵du sein maternel au tombeau.
  '2':
  - type: text
    content: 'Et je veux dire à Dieu : ╵Ne me traite pas en coupable,'
  - type: text
    content: fais-moi savoir pourquoi ╵tu me prends à partie.
  '20':
  - type: text
    content: Il me reste si peu de jours, ╵ils touchent à leur fin
  - type: note
    content: 'Autre traduction : Qu’il cesse donc.'
  - type: text
    content: .
  - type: text
    content: Que ne me laisse-t-il, ╵que je respire un peu,
  '21':
  - type: text
    content: avant de partir sans retour ╵au pays des ténèbres
  - type: text
    content: et de l’obscurité profonde,
  '22':
  - type: text
    content: terre plongée dans une nuit obscure, ╵où règnent d’épaisses ténèbres ╵et soumise au désordre, ╵où la lumière ╵est comme une nuit noire.
  '3':
  - type: text
    content: Trouves-tu bien de m’accabler, ╵de mépriser ta créature, ╵produite par tes mains, ╵et de favoriser, ╵les desseins des méchants ?
  '4':
  - type: text
    content: As-tu des yeux de chair,
  - type: text
    content: et ne vois-tu ╵qu’à la façon des hommes ?
  '5':
  - type: text
    content: Ta vie serait-elle aussi courte ╵que celle des humains,
  - type: text
    content: et tes années passeraient-elles ╵comme celles d’un homme,
  '6':
  - type: text
    content: pour que tu recherches ma faute
  - type: text
    content: et pour que tu enquêtes ╵sur mon iniquité
  - type: note
    content: 'Autre traduction : pour que tu me poursuives en justice et que tu cherches à me faire payer ma faute.'
  - type: text
    content: '  ?'
  '7':
  - type: text
    content: Pourtant tu le sais bien, ╵je ne suis pas coupable,
  - type: text
    content: et il n’y a personne ╵pour me délivrer de ta main !
  '8':
  - type: text
    content: Tes mains m’ont façonné, ╵ensemble elles m’ont fait ╵moi tout entier, ╵et tu me détruirais
  - type: note
    content: 'Hébreu difficile. Autre traduction, d’après l’ancienne version grecque : Tes mains m’ont façonné, elles m’ont fait, mais après cela, tu as changé d’avis et tu me détruis.'
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Oh, souviens-toi, je t’en supplie, ╵que tu m’as façonné ╵comme avec de l’argile.
  - type: text
    content: Voudrais-tu à présent ╵me faire retourner ╵à la poussière ?
