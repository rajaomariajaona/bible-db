document_id: JOB.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu, pourquoi t’en prends-tu à moi ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je suis dégoûté de la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne retiendrai plus mes plaintes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux exprimer l’amertume ╵qui remplit tout mon être.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as coulé comme du lait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis fait cailler en fromage.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu m’as revêtu ╵de peau, de chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as tissé d’os et de nerfs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui m’as donné la vie, ╵tu m’as accordé ta faveur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c’est toi qui m’as accordé la grâce de la vie.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes soins vigilants ╵ont préservé mon souffle.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais voilà donc ╵ce que tu cachais dans ton cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je sais maintenant ╵ce que tu méditais :'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me surveiller, ╵voir si je pèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me laisser passer ╵aucune faute,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si je suis coupable, ╵malheur à moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je suis juste, ╵je ne puis cependant ╵marcher la tête haute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi qui suis rassasié ╵de honte et de misère.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car si je me relève, ╵tu me pourchasses comme un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne cesses d’accomplir ╵tes hauts faits contre moi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans cesse tu dépêches ╵de nouveaux témoins contre moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent, en modifiant légèrement le texte hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tu renouvelles constamment ton hostilité contre moi.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta fureur envers moi s’accroît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes troupes se succèdent ╵pour m’assaillir.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc m’as-tu fait sortir ╵du ventre maternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aurais péri alors ╵et aucun œil ne m’aurait vu.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serais comme ceux ╵qui n’ont jamais été,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’aurais été porté ╵du sein maternel au tombeau.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et je veux dire à Dieu : ╵Ne me traite pas en coupable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais-moi savoir pourquoi ╵tu me prends à partie.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me reste si peu de jours, ╵ils touchent à leur fin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qu’il cesse donc.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ne me laisse-t-il, ╵que je respire un peu,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant de partir sans retour ╵au pays des ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de l’obscurité profonde,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: terre plongée dans une nuit obscure, ╵où règnent d’épaisses ténèbres ╵et soumise au désordre, ╵où la lumière ╵est comme une nuit noire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trouves-tu bien de m’accabler, ╵de mépriser ta créature, ╵produite par tes mains, ╵et de favoriser, ╵les desseins des méchants ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As-tu des yeux de chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne vois-tu ╵qu’à la façon des hommes ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta vie serait-elle aussi courte ╵que celle des humains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes années passeraient-elles ╵comme celles d’un homme,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu recherches ma faute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour que tu enquêtes ╵sur mon iniquité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que tu me poursuives en justice et que tu cherches à me faire payer ma faute.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant tu le sais bien, ╵je ne suis pas coupable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’y a personne ╵pour me délivrer de ta main !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes mains m’ont façonné, ╵ensemble elles m’ont fait ╵moi tout entier, ╵et tu me détruirais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hébreu difficile. Autre traduction, d’après l’ancienne version grecque : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tes mains m’ont façonné, elles m’ont fait, mais après cela, tu as changé d’avis et tu me détruis.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, souviens-toi, je t’en supplie, ╵que tu m’as façonné ╵comme avec de l’argile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voudrais-tu à présent ╵me faire retourner ╵à la poussière ?
