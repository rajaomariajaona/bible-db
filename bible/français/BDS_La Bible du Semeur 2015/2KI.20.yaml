document_id: 2KI.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La maladie et la guérison d’Ezéchias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 32.24-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque, Ezéchias tomba malade. Il était près de mourir, et le prophète Esaïe, fils d’Amots, se rendit à son chevet. Il lui dit : Voici ce que l’Eternel déclare : Prends tes dispositions, car tu vas mourir, tu ne te rétabliras pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Ezéchias tourna son visage du côté du mur et pria l’Eternel en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: De grâce, Eternel ! Tiens compte de ce que je me suis conduit devant toi avec fidélité, d’un cœur sans partage, et que j’ai fait ce que tu considères comme bien.
- type: usfm
  marker: p
  children:
  - type: text
    text: Et Ezéchias versa d’abondantes larmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esaïe n’avait pas encore quitté la cour centrale, lorsque l’Eternel s’adressa à lui en disant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Retourne auprès d’Ezéchias, le chef de mon peuple, et dis-lui : « Voici ce que déclare l’Eternel, le Dieu de David ton ancêtre : J’ai entendu ta prière et j’ai vu tes larmes. Je vais te guérir. Après-demain, tu pourras te rendre au temple de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je prolongerai ta vie de quinze années. Je te délivrerai, toi et cette ville, du roi d’Assyrie, et je protégerai cette ville à cause de moi-même et à cause de David, mon serviteur. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Esaïe ordonna : Qu’on prenne une masse de figues ; on la prit et on l’appliqua sur l’ulcère du roi, qui se rétablit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ezéchias avait dit à Esaïe : A quel signe reconnaîtrai-je que l’Eternel va me guérir et que je pourrai me rendre après-demain au temple de l’Eternel ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Esaïe lui avait répondu : Voici le signe que l’Eternel t’accorde pour te confirmer qu’il accomplira la promesse qu’il vient de te donner : Veux-tu que l’ombre avance de dix degrés ou qu’elle recule de dix degrés ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ezéchias répondit : Il est plus facile à l’ombre d’avancer de dix degrés que de reculer. Qu’elle revienne plutôt de dix degrés en arrière.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors le prophète Esaïe invoqua l’Eternel qui fit reculer l’ombre de dix degrés sur le cadran solaire d’Ahaz où elle était déjà descendue.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La visite des envoyés babyloniens – l’annonce de l’exil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vers cette même époque, Berodak-Baladân, fils de Baladân, roi de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Merodak-Baladân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par Esaïe (Mardouk étant le nom d’un dieu des Babyloniens). Il a gouverné Babylone de 721 à 710 et de 705 à 703 av. J.-C. Il faut situer la venue de cette ambassade, qui avait pour but de chercher des alliés contre l’Assyrie, soit en 703, soit en 713 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.6'
        metadata:
          usfm: 2KI.18.6
      - type: text
        text: ', et notes sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18.1-2
        metadata:
          usfm: 2KI.18.1+2KI.18.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', fit parvenir des lettres et des présents à Ezéchias ; car il avait appris sa maladie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ayant entendu ses envoyés, Ezéchias leur fit visiter tout le bâtiment où l’on conservait les objets précieux, l’argent et l’or, les aromates et les huiles parfumées. Il leur montra aussi son arsenal militaire et tout ce que contenaient ses trésors : il n’y eut rien dans son palais ni dans tout son domaine qu’Ezéchias ne leur fasse voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors le prophète Esaïe se rendit auprès du roi Ezéchias et lui demanda : Qu’ont dit ces gens et d’où sont-ils venus te rendre visite ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ezéchias lui répondit : Ils sont venus de très loin, de Babylone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Esaïe reprit : Qu’ont-ils vu dans ton palais ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ezéchias répondit : Ils ont vu tout ce qui se trouve dans mon palais. Je ne leur ai rien caché de mes trésors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Esaïe dit à Ezéchias : Ecoute ce que dit l’Eternel : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un jour viendra où tout ce qui est dans ton palais et tout ce que tes ancêtres ont amassé jusqu’à ce jour sera emporté à Babylone ; il n’en restera rien ici, déclare l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24.13
        metadata:
          usfm: 2KI.24.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Plusieurs de tes propres descendants, issus de toi, seront emmenés et deviendront serviteurs dans le palais du roi de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dn 1.1-7 ; 2 R 24.10-16 ; 2 Ch 36.10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ezéchias répondit à Esaïe : La parole de l’Eternel que tu viens de me transmettre est bonne. Car, ajouta-t-il, nous aurons donc la paix et la sécurité tant que je vivrai.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 32.32-33)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les autres faits et gestes d’Ezéchias, tous ses exploits, ses réalisations, en particulier la construction du réservoir et de l’acqueduc pour amener l’eau dans la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ezéchias construisit un canal souterrain pour amener l’eau de la source de Guihôn au réservoir de Siloé à l’intérieur des remparts de la ville (1 R 1.33, 38 ; 2 Ch 32.30) afin d’assurer l’alimentation de la ville en eau potable en cas de siège.
    marker-yv: yv-n
  - type: text
    text: ', tout cela est cité dans le livre des Annales des rois de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ezéchias rejoignit ses ancêtres décédés et son fils Manassé lui succéda sur le trône.
