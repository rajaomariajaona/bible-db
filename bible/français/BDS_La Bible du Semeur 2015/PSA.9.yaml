- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu fait justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il est possible que les '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 9
        metadata:
          usfm: PSA.9
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
        metadata:
          usfm: PSA.10
      - type: text
        text: ' aient constitué, à l’origine, un psaume unique. Ils forment ensemble un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'poème alphabétique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(dont les strophes ou les vers débutent par les lettres successives de l’alphabet hébreu) et un seul psaume dans la version grecque. Les autres psaumes alphabétiques sont les '
      - type: usfm
        marker: ref
