document_id: PSA.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu fait justiceIl est possible que les Ps 9 et 10 aient constitué, à l’origine, un psaume unique. Ils forment ensemble un poème alphabétique (dont les strophes ou les vers débutent par les lettres successives de l’alphabet hébreu) et un seul psaume dans la version grecque. Les autres psaumes alphabétiques sont les Ps 25, 34, 111, 112, 119 et 145.
  - type: text
    content: Un cantique de David dédié au chef de chœur, à chanter avec accompagnement de hautbois et de harpes.
  '10':
  - type: text
    content: Oui, l’Eternel est un refuge ╵pour ceux que l’on opprime,
  - type: text
    content: un lieu fort en temps de détresse.
  '11':
  - type: text
    content: C’est pourquoi ceux qui te connaissent ╵ont placé leur confiance en toi.
  - type: text
    content: Car toi, jamais, tu ne délaisses, ╵ô Eternel, ╵celui qui se tourne vers toi.
  '12':
  - type: text
    content: Célébrez par des chants ╵l’Eternel, qui siège en Sion,
  - type: text
    content: et proclamez ╵parmi les peuples ses hauts faits.
  '13':
  - type: text
    content: Car il poursuit les meurtriers ╵et se souvient de leurs victimes ;
  - type: text
    content: jamais il n’est indifférent ╵au cri des opprimés.
  '14':
  - type: text
    content: Eternel, aie pitié de moi !
  - type: text
    content: Vois l’affliction où m’ont réduit ╵ceux qui me vouent leur haine !
  - type: text
    content: C’est toi qui me fais remonter ╵des portes de la mort
  '15':
  - type: text
    content: pour que je publie tes louanges
  - type: text
    content: aux portes
  - type: note
    content: En Orient, les places publiques où l’on se retrouvait, où l’on convoquait les habitants pour toutes les assemblées importantes, se trouvaient près des portes de la ville.
  - type: text
    content: ' de ceux qui habitent ╵la ville de Sion'
  - type: text
    content: et que je sois dans l’allégresse ╵pour ton œuvre de délivrance.
  '16':
  - type: text
    content: Les peuples païens tombent dans la fosse ╵qu’ils avaient creusée de leurs mains,
  - type: text
    content: leurs pieds se prennent dans le piège ╵qu’ils avaient tendu en cachette
  - type: note
    content: Voir 7.16-17.
  - type: text
    content: .
  '17':
  - type: text
    content: 'L’Eternel a montré ╵qui il était : ╵il fait justice,'
  - type: text
    content: et il prend le méchant ╵à son propre filet.
  - type: text
    content: Jeu d’instruments
  - type: note
    content: 'Traduction incertaine : jeu d’instruments, interlude, en sourdine, méditation. Il s’agit sans doute d’un arrêt plus important que celui marqué par la Pause. Le terme est utilisé en 92.4 en liaison avec les sons de la harpe ; c’est pourquoi on pense qu’il s’agissait d’une notation appelant un jeu instrumental.'
  - type: text
    content: ' – Pause'
  '18':
  - type: text
    content: 'Que les méchants ╵s’en aillent au séjour des morts :'
  - type: text
    content: tous les peuples païens ╵qui ne se soucient pas de Dieu.
  '19':
  - type: text
    content: Mais Dieu n’oublie pas à jamais les pauvres,
  - type: text
    content: l’espoir des affligés ╵ne sera pas toujours déçu.
  '2':
  - type: text
    content: Je te louerai, ╵ô Eternel, de tout mon cœur,
  - type: text
    content: je veux raconter tes merveilles.
  '20':
  - type: text
    content: Eternel, lève-toi ! ╵Que l’homme ne triomphe pas !
  - type: text
    content: Fais comparaître devant toi ╵les peuples païens pour qu’ils soient jugés.
  '21':
  - type: text
    content: Frappe-les de terreur, ╵ô Eternel,
  - type: text
    content: et que ces peuples sachent ╵qu’ils ne sont que des hommes.
  '3':
  - type: text
    content: Par toi, j’exulte d’allégresse,
  - type: text
    content: je te célèbre par des chants, ╵ô Dieu très-haut.
  '4':
  - type: text
    content: Mes ennemis prennent la fuite,
  - type: text
    content: sous tes coups, ils vont trébucher ; ╵ils vont périr devant ta face.
  '5':
  - type: text
    content: Tu m’as rendu justice, ╵et tu as défendu mon droit,
  - type: text
    content: quand tu as siégé sur ton trône ╵pour juger selon la justice.
  '6':
  - type: text
    content: Tu as menacé les peuples païens, ╵tu as fait périr le méchant,
  - type: text
    content: et effacé son souvenir ╵pour toutes les générations.
  '7':
  - type: text
    content: Plus d’ennemis ! ╵Ils sont ruinés à tout jamais
  - type: text
    content: car tu as renversé leurs villes,
  - type: text
    content: le souvenir en est perdu.
  '8':
  - type: text
    content: L’Eternel siège pour toujours,
  - type: text
    content: 'voici : il a dressé son trône ╵pour exercer ses jugements.'
  '9':
  - type: text
    content: C’est lui qui gouverne le monde ╵avec droiture et équité,
  - type: text
    content: qui prononce le jugement ╵avec justice sur les peuples.
