    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un cantique de David dédié au chef de chœur, à chanter avec accompagnement de hautbois et de harpes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je te louerai, ╵ô Eternel, de tout mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je veux raconter tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Par toi, j’exulte d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te célèbre par des chants, ╵ô Dieu très-haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes ennemis prennent la fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous tes coups, ils vont trébucher ; ╵ils vont périr devant ta face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu m’as rendu justice, ╵et tu as défendu mon droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu as siégé sur ton trône ╵pour juger selon la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as menacé les peuples païens, ╵tu as fait périr le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et effacé son souvenir ╵pour toutes les générations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Plus d’ennemis ! ╵Ils sont ruinés à tout jamais
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as renversé leurs villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le souvenir en est perdu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel siège pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voici : il a dressé son trône ╵pour exercer ses jugements.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est lui qui gouverne le monde ╵avec droiture et équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui prononce le jugement ╵avec justice sur les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, l’Eternel est un refuge ╵pour ceux que l’on opprime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un lieu fort en temps de détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi ceux qui te connaissent ╵ont placé leur confiance en toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car toi, jamais, tu ne délaisses, ╵ô Eternel, ╵celui qui se tourne vers toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Célébrez par des chants ╵l’Eternel, qui siège en Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et proclamez ╵parmi les peuples ses hauts faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car il poursuit les meurtriers ╵et se souvient de leurs victimes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais il n’est indifférent ╵au cri des opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eternel, aie pitié de moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vois l’affliction où m’ont réduit ╵ceux qui me vouent leur haine !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui me fais remonter ╵des portes de la mort
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: pour que je publie tes louanges
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux portes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Orient, les places publiques où l’on se retrouvait, où l’on convoquait les habitants pour toutes les assemblées importantes, se trouvaient près des portes de la ville.
    marker-yv: yv-n
  - type: text
    text: ' de ceux qui habitent ╵la ville de Sion'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que je sois dans l’allégresse ╵pour ton œuvre de délivrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les peuples païens tombent dans la fosse ╵qu’ils avaient creusée de leurs mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs pieds se prennent dans le piège ╵qu’ils avaient tendu en cachette
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7.16-17
        metadata:
          usfm: PSA.7.16+PSA.7.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Eternel a montré ╵qui il était : ╵il fait justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il prend le méchant ╵à son propre filet.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Jeu d’instruments
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jeu d’instruments, interlude, en sourdine, méditation. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit sans doute d’un arrêt plus important que celui marqué par la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Pause. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme est utilisé en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '92.4'
        metadata:
          usfm: PSA.92.4
      - type: text
        text: ' en liaison avec les sons de la harpe ; c’est pourquoi on pense qu’il s’agissait d’une notation appelant un jeu instrumental.'
    marker-yv: yv-n
  - type: text
    text: ' – Pause'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que les méchants ╵s’en aillent au séjour des morts :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les peuples païens ╵qui ne se soucient pas de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais Dieu n’oublie pas à jamais les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’espoir des affligés ╵ne sera pas toujours déçu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eternel, lève-toi ! ╵Que l’homme ne triomphe pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais comparaître devant toi ╵les peuples païens pour qu’ils soient jugés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Frappe-les de terreur, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ces peuples sachent ╵qu’ils ne sont que des hommes.
