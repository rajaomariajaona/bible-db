document_id: EXO.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les institutions cultuelles
  - type: heading
    content: Les offrandes pour le tabernacle
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '10':
  - type: text
    content: On fabriquera un coffre
  - type: note
    content: Dans beaucoup de versions, ce coffre est appelé « arche » parce que les versions grecque et latine ont rendu ce mot par le même terme que celui qui désigne l’arche de Noé (Gn 6.14) et la corbeille en papyrus dans laquelle Moïse, bébé, fut déposé (2.3). Le mot hébreu est différent (voir Ex 30.6 ; 1 S 3.3 ; Ps 132.8).
  - type: text
    content: ' en bois d’acacia. Il aura cent vingt-cinq centimètres de long, soixante-quinze centimètres de large et soixante-quinze centimètres de haut'
  - type: note
    content: 'L’hébreu a : Il aura deux coudées et demie de long, une coudée et demie de large et une coudée et demie de haut.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Tu le plaqueras d’or pur, à l’intérieur et à l’extérieur, et tu le garniras d’une bordure d’or tout autour. '
  '12':
  - type: text
    content: 'Tu couleras pour lui quatre anneaux d’or que tu fixeras aux quatre coins du coffre, deux de chaque côté. '
  '13':
  - type: text
    content: 'Tu tailleras aussi des barres de bois d’acacia que tu plaqueras d’or. '
  '14':
  - type: text
    content: 'Tu les engageras dans les anneaux, le long des côtés du coffre pour qu’on puisse le porter. '
  '15':
  - type: text
    content: 'Les barres devront rester en permanence dans les anneaux du coffre, on ne les en retirera pas. '
  '16':
  - type: text
    content: Tu déposeras à l’intérieur de ce coffre l’acte de l’alliance que je te donnerai.
  '17':
  - type: text
    content: Tu feras aussi un propitiatoire
  - type: note
    content: 'Autre traduction : couvercle. Ce terme dérive d’un verbe qui signifie : couvrir, d’où la traduction couvercle ; mais aussi expier, d’où la traduction propitiatoire. C’est le sang répandu sur ce couvercle du coffre de l’alliance qui rendait Dieu « propice » (favorable) au peuple.'
  - type: text
    content: ' d’or pur de cent vingt-cinq centimètres de long et de soixante-quinze centimètres de large'
  - type: note
    content: 'L’hébreu a : de deux coudées et demie de long et d’une coudée et demie de large.'
  - type: text
    content: ' qui servira de couvercle pour le coffre. '
  '18':
  - type: text
    content: Tu façonneras au marteau deux chérubins
  - type: note
    content: Figures symboliques empruntées à la culture akkadienne, gardiennes des temples et de la sainteté divine. Certains y ont vu des représentations angéliques (ailes, figures humaines, 1 S 4.4 ; 2 S 6.2 ; Ps 80.1 ; 99.1). Le coffre avec les chérubins représente le trône de Dieu (2 R 19.5).
  - type: text
    content: ' en or massif, que tu fixeras aux deux extrémités du propitiatoire. '
  '19':
  - type: text
    content: 'Tu feras un chérubin pour chacune des deux extrémités du propitiatoire, de manière à ce qu’ils fassent corps avec lui aux deux extrémités. '
  '2':
  - type: text
    content: 'Invite les Israélites à me faire des offrandes prélevées sur leurs biens. Vous accepterez de tout homme qui la donnera de bon cœur l’offrande qu’il me fera. '
  '20':
  - type: text
    content: 'Les ailes des chérubins se déploieront vers le haut en couvrant le propitiatoire et ceux-ci se feront face, le regard dirigé vers le propitiatoire. '
  '21':
  - type: text
    content: 'Après avoir déposé dans le coffre l’acte de l’alliance que je te donnerai, tu placeras le propitiatoire dessus. '
  '22':
  - type: text
    content: C’est là, au-dessus du propitiatoire, entre les deux chérubins placés sur le coffre de l’acte de l’alliance, que je me manifesterai à toi ; c’est de là que je te communiquerai tous mes ordres pour les Israélites.
  - type: heading
    content: La table des pains exposés devant l’Eternel
  '23':
  - type: text
    content: Tu fabriqueras une table en bois d’acacia d’un mètre de long, de cinquante centimètres de large et de soixante-quinze centimètres de haut
  - type: note
    content: 'L’hébreu a : de deux coudées de long, d’une coudée de large et d’une coudée et demie de haut.'
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Tu la plaqueras d’or pur et tu garniras son pourtour d’une bordure d’or. '
  '25':
  - type: text
    content: Tu lui feras un cadre de huit centimètres
  - type: note
    content: En hébreu, un palme.
  - type: text
    content: ' que tu garniras d’une bordure d’or. '
  '26':
  - type: text
    content: 'Tu feras quatre anneaux d’or que tu fixeras aux quatre coins près des quatre pieds de la table. '
  '27':
  - type: text
    content: 'Les anneaux seront placés tout près du cadre pour recevoir les barres destinées à porter la table. '
  '28':
  - type: text
    content: 'Tu feras ces barres en bois d’acacia et tu les plaqueras d’or. Elles serviront à transporter la table. '
  '29':
  - type: text
    content: Tu fabriqueras aussi des plats et des coupes, des carafes et des bols qui serviront aux libations
  - type: note
    content: 'Offrandes liquides (de vin) : voir Nb 4.7.'
  - type: text
    content: '  ; tu les feras d’or pur. '
  '3':
  - type: text
    content: 'Voici ce que vous accepterez en guise d’offrande : de l’or, de l’argent et du bronze, '
  '30':
  - type: text
    content: Tu placeras sur la table le pain exposé devant moi. Il sera en permanence devant moi
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: .
  - type: heading
    content: Le chandelier d’or
  '31':
  - type: text
    content: Tu feras un chandelier en or pur. Le chandelier, son pied et sa tige seront travaillés au marteau ; des coupelles, calices et corolles
  - type: note
    content: Traduction incertaine.
  - type: text
    content: ' en sortiront. '
  '32':
  - type: text
    content: 'Six branches en partiront latéralement, trois de chaque côté. '
  '33':
  - type: text
    content: 'Chaque branche du chandelier portera trois coupelles en forme de fleur d’amandier, avec un calice et une corolle. Il en sera ainsi pour les six branches du chandelier. '
  '34':
  - type: text
    content: 'Le pied portera quatre coupelles en forme de fleur d’amandier avec un calice et une corolle. '
  '35':
  - type: text
    content: 'Il y aura un calice sous chacune des trois paires de branches du chandelier. '
  '36':
  - type: text
    content: 'Ces calices et ces branches feront corps avec lui : le tout sera d’une seule masse d’or pur martelé.'
  '37':
  - type: text
    content: 'Tu fabriqueras aussi les sept lampes que tu fixeras en haut du chandelier, pour qu’il éclaire l’espace devant lui. '
  '38':
  - type: text
    content: 'Tu feras ses pincettes et ses mouchettes en or pur. '
  '39':
  - type: text
    content: On emploiera trente kilogrammes
  - type: note
    content: En hébreu, un talent.
  - type: text
    content: ' d’or pur pour faire le chandelier et tous ses accessoires. '
  '4':
  - type: text
    content: 'des fils de pourpre violette et écarlate, de rouge éclatant, du fin lin et du poil de chèvre, '
  '40':
  - type: text
    content: Aie soin d’exécuter tout ce travail exactement selon le modèle qui t’est montré sur la montagne
  - type: note
    content: Cité en Ac 7.44 ; Hé 8.5.
  - type: text
    content: .
  '5':
  - type: text
    content: des peaux de béliers teintes en rouge, des peaux de dauphins
  - type: note
    content: Sens incertain.
  - type: text
    content: ' et du bois d’acacia, '
  '6':
  - type: text
    content: de l’huile pour le chandelier et des aromates pour l’huile d’onction
  - type: note
    content: Voir sa composition en 30.23-25.
  - type: text
    content: ' et pour le parfum aromatique, '
  '7':
  - type: text
    content: des pierres d’onyx et d’autres pierres précieuses à enchâsser pour l’éphod et pour le pectoral
  - type: note
    content: L’éphod était le vêtement sacré du grand-prêtre (28.6-14), le pectoral recouvrait la poitrine (28.15-29).
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Le peuple me fabriquera un sanctuaire pour que j’habite au milieu de lui. '
  '9':
  - type: text
    content: Je te montrerai le modèle du tabernacle
  - type: note
    content: 'Le mot tabernacle signifie : « demeure ». Il n’est presque jamais utilisé pour une tente servant d’abri aux hommes, et désigne presque exclusivement le lieu où Dieu séjourne parmi son peuple (voir 29.42-44 ; Lv 26.11 ; Ez 37.27 ; Jn 1.14 ; Ap 21.3).'
  - type: text
    content: ' et de tous les ustensiles qu’il contiendra, afin que vous exécutiez tout exactement selon ce modèle.'
  - type: heading
    content: Le coffre de l’alliance et le propitiatoire
