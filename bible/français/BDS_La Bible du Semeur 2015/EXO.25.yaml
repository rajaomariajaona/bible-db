document_id: EXO.25,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les institutions cultuelles
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les offrandes pour le tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel parla à Moïse en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: On fabriquera un coffre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans beaucoup de versions, ce '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'coffre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est appelé « arche » parce que les versions grecque et latine ont rendu ce mot par le même terme que celui qui désigne l’arche de Noé (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 6.14
        - type: text
          text: ) et la corbeille en papyrus dans laquelle Moïse, bébé, fut déposé (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.3'
        - type: text
          text: ). Le mot hébreu est différent (voir Ex 30.6 ; 1 S 3.3 ; Ps 132.8).
      marker-yv: yv-n
    - type: text
      text: ' en bois d’acacia. Il aura cent vingt-cinq centimètres de long, soixante-quinze centimètres de large et soixante-quinze centimètres de haut'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Il aura deux coudées et demie de long, une coudée et demie de large et une coudée et demie de haut.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu le plaqueras d’or pur, à l’intérieur et à l’extérieur, et tu le garniras d’une bordure d’or tout autour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu couleras pour lui quatre anneaux d’or que tu fixeras aux quatre coins du coffre, deux de chaque côté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu tailleras aussi des barres de bois d’acacia que tu plaqueras d’or. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu les engageras dans les anneaux, le long des côtés du coffre pour qu’on puisse le porter. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les barres devront rester en permanence dans les anneaux du coffre, on ne les en retirera pas. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu déposeras à l’intérieur de ce coffre l’acte de l’alliance que je te donnerai.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tu feras aussi un propitiatoire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'couvercle. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce terme dérive d’un verbe qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'couvrir, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’où la traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'couvercle ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mais aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'expier, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’où la traduction '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'propitiatoire. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est le sang répandu sur ce couvercle du coffre de l’alliance qui rendait Dieu « propice » (favorable) au peuple.
      marker-yv: yv-n
    - type: text
      text: ' d’or pur de cent vingt-cinq centimètres de long et de soixante-quinze centimètres de large'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de deux coudées et demie de long et d’une coudée et demie de large.
      marker-yv: yv-n
    - type: text
      text: ' qui servira de couvercle pour le coffre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tu façonneras au marteau deux chérubins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Figures symboliques empruntées à la culture akkadienne, gardiennes des temples et de la sainteté divine. Certains y ont vu des représentations angéliques (ailes, figures humaines, 1 S 4.4 ; 2 S 6.2 ; Ps 80.1 ; 99.1). Le coffre avec les chérubins représente le trône de Dieu (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 19.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' en or massif, que tu fixeras aux deux extrémités du propitiatoire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu feras un chérubin pour chacune des deux extrémités du propitiatoire, de manière à ce qu’ils fassent corps avec lui aux deux extrémités. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Invite les Israélites à me faire des offrandes prélevées sur leurs biens. Vous accepterez de tout homme qui la donnera de bon cœur l’offrande qu’il me fera. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les ailes des chérubins se déploieront vers le haut en couvrant le propitiatoire et ceux-ci se feront face, le regard dirigé vers le propitiatoire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Après avoir déposé dans le coffre l’acte de l’alliance que je te donnerai, tu placeras le propitiatoire dessus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: C’est là, au-dessus du propitiatoire, entre les deux chérubins placés sur le coffre de l’acte de l’alliance, que je me manifesterai à toi ; c’est de là que je te communiquerai tous mes ordres pour les Israélites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La table des pains exposés devant l’Eternel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tu fabriqueras une table en bois d’acacia d’un mètre de long, de cinquante centimètres de large et de soixante-quinze centimètres de haut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de deux coudées de long, d’une coudée de large et d’une coudée et demie de haut.
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tu la plaqueras d’or pur et tu garniras son pourtour d’une bordure d’or. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Tu lui feras un cadre de huit centimètres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un palme.
      marker-yv: yv-n
    - type: text
      text: ' que tu garniras d’une bordure d’or. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu feras quatre anneaux d’or que tu fixeras aux quatre coins près des quatre pieds de la table. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les anneaux seront placés tout près du cadre pour recevoir les barres destinées à porter la table. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tu feras ces barres en bois d’acacia et tu les plaqueras d’or. Elles serviront à transporter la table. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tu fabriqueras aussi des plats et des coupes, des carafes et des bols qui serviront aux libations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Offrandes liquides (de vin) : voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 4.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; tu les feras d’or pur. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici ce que vous accepterez en guise d’offrande : de l’or, de l’argent et du bronze, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tu placeras sur la table le pain exposé devant moi. Il sera en permanence devant moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 24.5-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chandelier d’or
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Tu feras un chandelier en or pur. Le chandelier, son pied et sa tige seront travaillés au marteau ; des coupelles, calices et corolles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: ' en sortiront. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Six branches en partiront latéralement, trois de chaque côté. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Chaque branche du chandelier portera trois coupelles en forme de fleur d’amandier, avec un calice et une corolle. Il en sera ainsi pour les six branches du chandelier. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Le pied portera quatre coupelles en forme de fleur d’amandier avec un calice et une corolle. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Il y aura un calice sous chacune des trois paires de branches du chandelier. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ces calices et ces branches feront corps avec lui : le tout sera d’une seule masse d’or pur martelé.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tu fabriqueras aussi les sept lampes que tu fixeras en haut du chandelier, pour qu’il éclaire l’espace devant lui. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Tu feras ses pincettes et ses mouchettes en or pur. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: On emploiera trente kilogrammes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un talent.
      marker-yv: yv-n
    - type: text
      text: ' d’or pur pour faire le chandelier et tous ses accessoires. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'des fils de pourpre violette et écarlate, de rouge éclatant, du fin lin et du poil de chèvre, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Aie soin d’exécuter tout ce travail exactement selon le modèle qui t’est montré sur la montagne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Ac 7.44 ; Hé 8.5.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: des peaux de béliers teintes en rouge, des peaux de dauphins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' et du bois d’acacia, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: de l’huile pour le chandelier et des aromates pour l’huile d’onction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir sa composition en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 30.23-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et pour le parfum aromatique, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: des pierres d’onyx et d’autres pierres précieuses à enchâsser pour l’éphod et pour le pectoral
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le vêtement sacré du grand-prêtre (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 28.6-14
        - type: text
          text: '), le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pectoral '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: recouvrait la poitrine (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 28.15-29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le peuple me fabriquera un sanctuaire pour que j’habite au milieu de lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je te montrerai le modèle du tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tabernacle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : « demeure ». Il n’est presque jamais utilisé pour une tente servant d’abri aux hommes, et désigne presque exclusivement le lieu où Dieu séjourne parmi son peuple (voir 29.42-44 ; Lv 26.11 ; Ez 37.27 ; Jn 1.14 ; Ap 21.3).'
      marker-yv: yv-n
    - type: text
      text: ' et de tous les ustensiles qu’il contiendra, afin que vous exécutiez tout exactement selon ce modèle.'
