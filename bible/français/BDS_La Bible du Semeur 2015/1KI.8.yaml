document_id: 1KI.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’inauguration du Temple
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel vient habiter dans le Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 5.2 à 6.11)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Alors Salomon rassembla auprès de lui à Jérusalem tous les responsables d’Israël, tous les chefs des tribus et les chefs de familles des Israélites pour faire transporter le coffre de l’alliance de l’Eternel depuis la Cité de David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 6.12-16 ; 1 Ch 15.25-29.
      marker-yv: yv-n
    - type: text
      text: ', qui est Sion. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Au moment où les prêtres sortirent du lieu saint, la nuée lumineuse remplit le temple de l’Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les prêtres ne purent pas y rester pour accomplir le service, à cause de la nuée, car la gloire de l’Eternel remplissait son temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 40.34-35
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors Salomon dit : L’Eternel a déclaré qu’il demeurerait dans un lieu obscur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J’ai enfin bâti pour toi une résidence, un lieu où tu habiteras éternellement !
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Salomon loue l’Eternel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Puis le roi se retourna et bénit toute l’assemblée d’Israël qui se tenait debout.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il dit : Béni soit l’Eternel, le Dieu d’Israël qui a, de sa propre bouche, parlé à mon père David et qui a agi pour accomplir la promesse qu’il lui avait faite. Il lui avait dit : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: « Depuis le jour où j’ai fait sortir mon peuple Israël d’Egypte, je n’ai jamais choisi une ville particulière parmi toutes les tribus d’Israël pour qu’on y bâtisse un temple où je sois présent, mais j’ai choisi David pour gouverner mon peuple Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 7.4-11 ; 1 Ch 17.3-10.
      marker-yv: yv-n
    - type: text
      text: '. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mon père David avait à cœur de bâtir un temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais l’Eternel lui a déclaré : « Ton projet de bâtir un temple en mon honneur est une excellente chose : tu as bien fait de prendre cela à cœur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toutefois, ce n’est pas toi qui bâtiras ce temple, c’est ton propre fils qui le bâtira pour moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 7.1-3 ; 1 Ch 17.1-2.
      marker-yv: yv-n
    - type: text
      text: '. » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tous les hommes d’Israël s’assemblèrent auprès du roi Salomon, au mois d’Etanim, qui est le septième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Septembre-octobre.
      marker-yv: yv-n
    - type: text
      text: ', pendant la fête des Cabanes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.33-43
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’Eternel a tenu sa promesse : j’ai succédé à mon père David et j’occupe le trône d’Israël comme l’Eternel l’avait annoncé, et j’ai construit ce temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: J’y ai réservé un emplacement pour le coffre qui contient le code de l’alliance de l’Eternel, cette alliance qu’il a conclue avec nos ancêtres quand il les a fait sortir d’Egypte.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Prière d’intercession de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 6.12-40)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Puis Salomon se plaça devant l’autel de l’Eternel, en faisant face à toute l’assemblée d’Israël. Il leva les mains vers le ciel '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'et pria : Eternel, Dieu d’Israël ! Il n’y a pas de Dieu semblable à toi, ni là-haut dans le ciel, ni ici-bas sur la terre ! Tu es fidèle à ton alliance et tu conserves ta bonté à tes serviteurs qui se conduisent selon ta volonté de tout leur cœur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ainsi tu as tenu la promesse que tu avais faite à ton serviteur David, mon père, oui, tu as agi pour que soit accompli aujourd’hui ce que tu lui avais déclaré de ta propre bouche. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'A présent, Eternel, Dieu d’Israël, veuille aussi tenir l’autre promesse que tu lui as faite lorsque tu lui as dit : « Il y aura toujours l’un de tes descendants qui siégera sous mon regard sur le trône d’Israël, à condition qu’ils veillent sur leur conduite pour vivre selon ma volonté comme tu as toi-même vécu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 2.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Oui, maintenant, Dieu d’Israël, daigne réaliser cette promesse que tu as faite à ton serviteur, mon père David.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais est-ce qu’en vérité Dieu habiterait sur la terre, alors que le ciel dans toute son immensité ne saurait le contenir ? Combien moins ce temple que je viens de te construire ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Toutefois, Eternel, mon Dieu, veuille être attentif à la prière et à la supplication de ton serviteur et écouter l’appel que je t’adresse en ce jour. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Que tes yeux veillent nuit et jour sur ce temple, ce lieu dont tu as toi-même dit : « Là, je serai présent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 12.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. » Et exauce la prière que ton serviteur t’adresse en ce lieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tous les responsables d’Israël vinrent, et les prêtres se chargèrent de porter le coffre sacré. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Daigne écouter ma supplication et celle de ton peuple Israël lorsqu’il viendra prier ici. Depuis le lieu où tu demeures, depuis le ciel, entends notre prière et veuille pardonner !
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Lorsque quelqu’un sera accusé d’avoir commis une faute envers son prochain et qu’on exigera de lui qu’il prête serment avec des imprécations ici devant ton autel dans ce temple, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: sois attentif depuis le ciel, interviens et juge tes serviteurs pour condamner le coupable, afin qu’il reçoive le châtiment que mérite sa conduite et pour faire reconnaître l’innocence du juste afin qu’il soit traité selon son innocence.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Quand ton peuple Israël aura été battu par un ennemi, parce que ses membres auront péché contre toi, si ensuite ils reviennent à toi, s’ils t’adressent leurs louanges, te prient et t’expriment leurs supplications dans ce temple, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: écoute-les depuis le ciel, pardonne le péché de ton peuple Israël et ramène-les dans le pays que tu as donné à leurs ancêtres !
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Quand le ciel sera fermé et refusera de donner la pluie, parce que ton peuple aura péché contre toi, si ce peuple prie en ce lieu, s’il te loue et se détourne de ses fautes, après que tu l’as affligé, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: écoute-le depuis le ciel, pardonne le péché de tes serviteurs et de ton peuple Israël, indique-leur la bonne ligne de conduite à suivre, et fais tomber la pluie sur ton pays que tu as donné en possession à ton peuple !
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Quand la famine ou la peste sévira dans le pays, quand les céréales seront atteintes de maladie, quand surviendra une invasion de sauterelles ou de criquets, ou quand l’ennemi assiégera ton peuple dans les villes fortifiées du pays, quand quelque maladie ou quelque malheur s’abattra sur lui, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-39
    - type: text
      text: 'si, considérant sa peine, chacun tend les mains vers ce temple, veuille exaucer du ciel, le lieu où tu demeures, les prières et les supplications que t’adressera tout homme ou tout ton peuple Israël. Pardonne-leur et traite chacun selon sa conduite, puisque tu connais le cœur de chacun. En effet, toi seul tu connais le cœur de tous les humains. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les prêtres et les lévites transportèrent le coffre de l’Eternel ainsi que la tente de la Rencontre et tous les ustensiles sacrés qu’elle contenait. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: De cette manière, ils te craindront tout le temps qu’ils vivront sur l’étendue du territoire que tu as donné à nos ancêtres.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Et même si un étranger qui ne fait pas partie de ton peuple Israël entend parler de toi et vient d’un pays lointain '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '– car les étrangers apprendront que tu es un grand Dieu qui agit en déployant sa puissance – quand un étranger viendra prier dans ce temple, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: veuille l’écouter depuis le ciel, la demeure où tu habites, et lui accorder tout ce qu’il t’aura demandé. De cette manière, tous les peuples du monde te connaîtront, ils te craindront comme le fait ton peuple Israël et ils reconnaîtront que le temple que j’ai construit t’appartient.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Lorsque ton peuple partira pour combattre son ennemi, sur le chemin où tu l’enverras, s’il prie l’Eternel en se tournant vers la ville que tu as choisie et vers ce temple que j’ai construit en ton honneur, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: daigne écouter, depuis le ciel, leurs prières et leurs supplications et défendre leur cause !
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Il se peut qu’ils commettent un péché contre toi – car quel est l’homme qui ne commet jamais de péché ? Alors tu seras irrité contre eux, tu les livreras au pouvoir de leurs ennemis, qui les emmèneront en captivité dans un pays ennemi, proche ou lointain. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'S’ils se mettent à réfléchir dans le pays où ils auront été déportés, s’ils reviennent en arrière et t’adressent leurs supplications dans le pays de leurs vainqueurs et qu’ils disent : « Nous avons péché, nous avons mal agi, nous sommes coupables », '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 's’ils reviennent à toi de tout leur cœur et de tout leur être, dans le pays des ennemis qui les auront déportés, et s’ils te prient en se tournant vers le pays que tu as donné à leurs ancêtres, vers la ville que tu as choisie et vers le temple que j’ai construit en ton honneur, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: alors, depuis le ciel, la demeure où tu habites, veuille écouter leur prière et leur supplication et défendre leur cause !
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le roi Salomon et toute la communauté d’Israël rassemblée auprès de lui, devant le coffre, offrirent en sacrifice un très grand nombre de petit et de gros bétail qu’on ne pouvait évaluer.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Pardonne à ton peuple les péchés qu’il aura commis contre toi et toutes ses fautes contre toi ! Inspire à leurs vainqueurs qui les retiennent captifs de la compassion pour eux, et qu’ils aient compassion d’eux. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: En effet, Israël n’est-il pas ton peuple, celui qui t’appartient, depuis que tu l’as fait sortir d’Egypte, de cette fournaise à fondre le fer ?
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Veuille considérer favorablement la supplication de ton serviteur et celle de ton peuple Israël pour les exaucer chaque fois qu’ils te prieront. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Car c’est toi, ô Seigneur Eternel, qui as choisi ce peuple pour toi parmi tous les autres peuples de la terre pour en faire le peuple qui t’appartient, comme tu l’as déclaré par l’intermédiaire de ton serviteur Moïse quand tu as fait sortir nos ancêtres d’Egypte.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Bénédiction de l’assemblée
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Or, lorsque Salomon eut terminé toute cette prière de supplication à l’Eternel, il se releva de devant l’autel de l’Eternel, où il était resté agenouillé, les mains levées vers le ciel. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Il se releva et, d’une voix forte, il bénit toute l’assemblée d’Israël, en disant : '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Béni soit l’Eternel qui a accordé la paix à son peuple Israël, conformément à ses promesses. En effet, aucune promesse de bienfait qu’il nous a faite par l’intermédiaire de son serviteur Moïse n’a manqué de se réaliser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.56 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 12.10 ; Jos 21.44-45.
      marker-yv: yv-n
    - type: text
      text: '. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Que l’Eternel, notre Dieu, soit avec nous, comme il a été avec nos ancêtres ! Qu’il ne nous abandonne jamais, qu’il ne nous délaisse pas, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'mais qu’il incline notre cœur vers lui, pour que nous marchions dans les voies qu’il a prescrites pour nous, en obéissant à ses commandements, ses ordonnances et ses lois qu’il a donnés à nos ancêtres. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Puisse l’Eternel notre Dieu prendre en considération jour et nuit toutes les prières de supplication que je viens de lui présenter et défendre jour après jour la cause de son serviteur et de son peuple Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les prêtres installèrent le coffre de l’alliance de l’Eternel à la place qui lui était destinée dans la salle du fond du Temple, c’est-à-dire dans le lieu très saint, sous les ailes des chérubins. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Ainsi tous les peuples de la terre reconnaîtront que c’est l’Eternel qui est Dieu et qu’il n’y en a pas d’autre. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Quant à vous, que votre cœur soit attaché sans réserve à l’Eternel notre Dieu, pour que vous viviez d’une manière conforme à ses lois et que vous obéissiez à ses commandements, comme c’est le cas aujourd’hui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La première fête célébrée au Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 7.4-10)
    marker-yv: yv-h
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Le roi et tout Israël offrirent des sacrifices devant l’Eternel. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Salomon offrit à l’Eternel un sacrifice de communion pour lequel il immola 22 000 bœufs et 120 000 moutons. C’est de cette manière que le roi et tous les Israélites inaugurèrent le temple de l’Eternel. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Ce même jour, le roi consacra l’intérieur de la cour qui s’étend devant le temple de l’Eternel pour y offrir les holocaustes, les offrandes et les graisses des sacrifices de communion, car l’autel de bronze qui se trouvait devant l’Eternel était trop petit pour recevoir tous les holocaustes, les offrandes et les graisses des sacrifices de communion.
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: Salomon et tout Israël célébrèrent la fête. Une grande assemblée de gens venus depuis la région de Lebo-Hamath jusqu’au torrent d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.65 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire du nord (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lebo-Hamath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') au sud (le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: torrent d’Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) du royaume.
      marker-yv: yv-n
    - type: text
      text: ' se tint devant l’Eternel, notre Dieu, pendant sept jours puis encore sept autres jours, soit quatorze jours en tout'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.65 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'puis encore sept autres jours… en tout '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manquent dans l’ancienne version grecque.
      marker-yv: yv-n
    - type: text
      text: '. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Après cela, le huitième jour de la seconde semaine, Salomon renvoya le peuple. Les gens vinrent le bénir, puis chacun rentra chez soi. Tous étaient joyeux et avaient le cœur content à cause de tous les bienfaits que l’Eternel avait accordés à son serviteur David et à Israël.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Car les chérubins avaient leurs ailes déployées au-dessus de l’emplacement du coffre, de sorte qu’ils formaient un dais protecteur au-dessus du coffre et de ses barres. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'On avait donné à ces barres une longueur telle que leurs extrémités se voyaient depuis le lieu saint qui précédait le sanctuaire intérieur, mais elles ne se voyaient pas de l’extérieur. Elles sont restées là jusqu’à ce jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dans le coffre, il y avait seulement les deux tablettes de pierre que Moïse y avait déposées à Horeb
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 25.16 ; 40.20 ; Dt 10.5.
      marker-yv: yv-n
    - type: text
      text: ', lorsque l’Eternel conclut une alliance avec les Israélites à leur sortie d’Egypte.'
