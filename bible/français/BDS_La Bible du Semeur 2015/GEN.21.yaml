document_id: GEN.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La naissance d’Isaac
  - type: text
    content: 'L’Eternel intervint en faveur de Sara comme il l’avait annoncé et il accomplit pour elle ce qu’il avait promis. '
  '10':
  - type: text
    content: 'Alors elle dit à Abraham : Chasse cette esclave et son fils, car le fils de cette esclave ne partagera pas l’héritage avec mon fils Isaac'
  - type: note
    content: Cité en Ga 4.29-30.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Cette parole affligea beaucoup Abraham, à cause de son fils. '
  '12':
  - type: text
    content: 'Mais Dieu lui dit : Ne t’afflige pas à cause du garçon et de ta servante. Accorde à Sara tout ce qu’elle te demandera. Car c’est par Isaac que te sera suscitée une descendance'
  - type: note
    content: Cité en Rm 9.8 ; Hé 11.18.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Néanmoins, je ferai aussi du fils de l’esclave l’ancêtre d’un peuple, car lui aussi est issu de toi.
  '14':
  - type: text
    content: 'Le lendemain, de bon matin, Abraham prépara du pain et une outre d’eau qu’il donna à Agar en les plaçant sur son épaule ; il lui donna aussi l’enfant et la congédia. Elle partit à l’aventure et s’égara dans le désert de Beer-Sheva. '
  '15':
  - type: text
    content: 'L’eau qui était dans l’outre s’épuisa, alors elle laissa l’enfant sous un buisson '
  '16':
  - type: text
    content: et alla s’asseoir à l’écart, à une centaine de mètres plus loin
  - type: note
    content: 'L’hébreu a : à la distance d’un jet de flèche.'
  - type: text
    content: ', car elle se disait : Je ne veux pas voir mourir mon enfant.'
  - type: text
    content: 'Elle resta assise en face de lui, gémissant et pleurant. '
  '17':
  - type: text
    content: Dieu entendit
  - type: note
    content: 'Allusion au nom d’Ismaël : Dieu entend.'
  - type: text
    content: ' la voix du garçon et l’ange de Dieu appela Agar du haut du ciel et lui dit : Qu’as-tu, Agar ? N’aie pas peur, car Dieu a entendu le garçon là où il est. '
  '18':
  - type: text
    content: Lève-toi, relève le garçon et prends-le par la main, car je ferai de lui un grand peuple.
  '19':
  - type: text
    content: 'Dieu lui ouvrit les yeux, et elle aperçut un puits. Elle alla remplir d’eau son outre et donna à boire au garçon. '
  '2':
  - type: text
    content: 'Elle devint enceinte et, au temps promis par Dieu, elle donna un fils à Abraham, bien que celui-ci fût très âgé. '
  '20':
  - type: text
    content: 'Dieu fut avec lui. Il grandit et vécut dans le désert où il devint un chasseur à l’arc. '
  '21':
  - type: text
    content: Il s’établit dans le désert de Parân, et sa mère choisit pour lui une femme du pays d’Egypte.
  - type: heading
    content: Abraham fait alliance avec Abimélek
  '22':
  - type: text
    content: 'A la même époque, Abimélek accompagné de Pikol, chef de son armée, vint trouver Abraham et lui dit : Dieu fait réussir tout ce que tu entreprends. '
  '23':
  - type: text
    content: Maintenant donc, jure-moi ici par le nom de Dieu de ne trahir ni moi, ni mes enfants, ni ma descendance, mais d’agir envers moi et envers ce pays où tu séjournes avec la même bonté dont j’ai usé envers toi.
  '24':
  - type: text
    content: 'Abraham répondit : Oui, je le jure.'
  '25':
  - type: text
    content: Il saisit l’occasion pour lui faire des doléances au sujet d’un puits dont les serviteurs d’Abimélek s’étaient emparés.
  '26':
  - type: text
    content: 'Abimélek lui répondit : J’ignore qui a fait cela. Toi-même, tu ne m’en avais pas informé et je l’apprends aujourd’hui.'
  '27':
  - type: text
    content: 'Abraham choisit des moutons, des chèvres et des bovins et en fit cadeau à Abimélek et tous deux conclurent ensemble une alliance. '
  '28':
  - type: text
    content: 'Puis Abraham mit à part sept jeunes brebis du troupeau. '
  '29':
  - type: text
    content: 'Abimélek lui demanda : Pourquoi as-tu mis ces sept brebis à part ?'
  '3':
  - type: text
    content: 'Il appela ce fils qui lui était né de Sara : Isaac (Il a ri). '
  '30':
  - type: text
    content: 'Il répondit : Accepte ces sept jeunes brebis de ma main : cela me servira d’attestation que c’est bien moi qui ai fait creuser ce puits.'
  '31':
  - type: text
    content: C’est pourquoi on a appelé ce lieu-là Beer-Sheva (le Puits du Serment), parce que c’est là que tous deux prêtèrent serment.
  '32':
  - type: text
    content: 'Ainsi ils firent alliance à Beer-Sheva, puis Abimélek partit avec Pikol, le chef de son armée, et ils s’en retournèrent au pays des Philistins. '
  '33':
  - type: text
    content: 'Abraham planta un tamaris à Beer-Sheva et il invoqua l’Eternel, le Dieu d’éternité. '
  '34':
  - type: text
    content: Il séjourna encore longtemps au pays des Philistins.
  '4':
  - type: text
    content: Il le circoncit à l’âge de huit jours, comme Dieu le lui avait ordonné
  - type: note
    content: Allusion en Ac 7.8.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Abraham avait cent ans au moment de la naissance d’Isaac. '
  '6':
  - type: text
    content: 'Sara dit alors : Dieu m’a donné une occasion de rire, et tous ceux qui l’apprendront riront à mon sujet. '
  '7':
  - type: text
    content: 'Elle ajouta : Qui aurait dit à Abraham qu’un jour Sara allaiterait des enfants ? Et cependant, je lui ai donné un fils dans sa vieillesse.'
  - type: heading
    content: Le renvoi d’Agar et d’Ismaël
  '8':
  - type: text
    content: L’enfant grandit et Sara cessa de l’allaiter. Le jour où l’on sevra Isaac, Abraham fit un grand festin
  - type: note
    content: Les enfants étaient sevrés vers deux ou trois ans. Le sevrage était célébré par une grande fête.
  - type: text
    content: .
  '9':
  - type: text
    content: Sara vit rire le fils qu’Agar l’Egyptienne avait donné à Abraham
  - type: note
    content: 'La version grecque a : vit le fils qu’Agar l’Egyptienne avait donné à Abraham taquiner Isaac.'
  - type: text
    content: '. '
