document_id: GEN.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance d’Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel intervint en faveur de Sara comme il l’avait annoncé et il accomplit pour elle ce qu’il avait promis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle devint enceinte et, au temps promis par Dieu, elle donna un fils à Abraham, bien que celui-ci fût très âgé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il appela ce fils qui lui était né de Sara : Isaac (Il a ri). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il le circoncit à l’âge de huit jours, comme Dieu le lui avait ordonné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.8
        metadata:
          usfm: ACT.7.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Abraham avait cent ans au moment de la naissance d’Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sara dit alors : Dieu m’a donné une occasion de rire, et tous ceux qui l’apprendront riront à mon sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle ajouta : Qui aurait dit à Abraham qu’un jour Sara allaiterait des enfants ? Et cependant, je lui ai donné un fils dans sa vieillesse.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le renvoi d’Agar et d’Ismaël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’enfant grandit et Sara cessa de l’allaiter. Le jour où l’on sevra Isaac, Abraham fit un grand festin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les enfants étaient sevrés vers deux ou trois ans. Le sevrage était célébré par une grande fête.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sara vit rire le fils qu’Agar l’Egyptienne avait donné à Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vit le fils qu’Agar l’Egyptienne avait donné à Abraham taquiner Isaac.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors elle dit à Abraham : Chasse cette esclave et son fils, car le fils de cette esclave ne partagera pas l’héritage avec mon fils Isaac'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4.29-30
        metadata:
          usfm: GAL.4.29+GAL.4.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cette parole affligea beaucoup Abraham, à cause de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais Dieu lui dit : Ne t’afflige pas à cause du garçon et de ta servante. Accorde à Sara tout ce qu’elle te demandera. Car c’est par Isaac que te sera suscitée une descendance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Rm 9.8 ; Hé 11.18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Néanmoins, je ferai aussi du fils de l’esclave l’ancêtre d’un peuple, car lui aussi est issu de toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le lendemain, de bon matin, Abraham prépara du pain et une outre d’eau qu’il donna à Agar en les plaçant sur son épaule ; il lui donna aussi l’enfant et la congédia. Elle partit à l’aventure et s’égara dans le désert de Beer-Sheva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’eau qui était dans l’outre s’épuisa, alors elle laissa l’enfant sous un buisson '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et alla s’asseoir à l’écart, à une centaine de mètres plus loin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la distance d’un jet de flèche.
    marker-yv: yv-n
  - type: text
    text: ', car elle se disait : Je ne veux pas voir mourir mon enfant.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle resta assise en face de lui, gémissant et pleurant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dieu entendit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion au nom d’Ismaël : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu entend.
    marker-yv: yv-n
  - type: text
    text: ' la voix du garçon et l’ange de Dieu appela Agar du haut du ciel et lui dit : Qu’as-tu, Agar ? N’aie pas peur, car Dieu a entendu le garçon là où il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lève-toi, relève le garçon et prends-le par la main, car je ferai de lui un grand peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu lui ouvrit les yeux, et elle aperçut un puits. Elle alla remplir d’eau son outre et donna à boire au garçon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu fut avec lui. Il grandit et vécut dans le désert où il devint un chasseur à l’arc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il s’établit dans le désert de Parân, et sa mère choisit pour lui une femme du pays d’Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham fait alliance avec Abimélek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A la même époque, Abimélek accompagné de Pikol, chef de son armée, vint trouver Abraham et lui dit : Dieu fait réussir tout ce que tu entreprends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maintenant donc, jure-moi ici par le nom de Dieu de ne trahir ni moi, ni mes enfants, ni ma descendance, mais d’agir envers moi et envers ce pays où tu séjournes avec la même bonté dont j’ai usé envers toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Abraham répondit : Oui, je le jure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il saisit l’occasion pour lui faire des doléances au sujet d’un puits dont les serviteurs d’Abimélek s’étaient emparés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Abimélek lui répondit : J’ignore qui a fait cela. Toi-même, tu ne m’en avais pas informé et je l’apprends aujourd’hui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abraham choisit des moutons, des chèvres et des bovins et en fit cadeau à Abimélek et tous deux conclurent ensemble une alliance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis Abraham mit à part sept jeunes brebis du troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abimélek lui demanda : Pourquoi as-tu mis ces sept brebis à part ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il répondit : Accepte ces sept jeunes brebis de ma main : cela me servira d’attestation que c’est bien moi qui ai fait creuser ce puits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est pourquoi on a appelé ce lieu-là Beer-Sheva (le Puits du Serment), parce que c’est là que tous deux prêtèrent serment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ainsi ils firent alliance à Beer-Sheva, puis Abimélek partit avec Pikol, le chef de son armée, et ils s’en retournèrent au pays des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Abraham planta un tamaris à Beer-Sheva et il invoqua l’Eternel, le Dieu d’éternité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il séjourna encore longtemps au pays des Philistins.
