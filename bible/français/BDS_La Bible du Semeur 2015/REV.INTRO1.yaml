document_id: REV.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre de l’Apocalypse nous paraît généralement bien mystérieux. Le titre lui-même, « Apocalypse », peut nous induire en erreur. En fait, c’est la simple transcription française du mot grec signifiant « révélation » (1.1).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’auteur évoque son nom à quatre reprises : Jean. Il se donne les titres de « serviteur de Dieu » (1.1), « frère des chrétiens » (1.9) et « porte-parole de Dieu » (22.9). La tradition la plus ancienne est unanime pour voir en lui l’apôtre Jean, auteur de l’évangile et des trois lettres.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce texte semble avoir été écrit à la fin du règne de Domitien, quand la persécution était devenue fréquente dans l’ensemble de l’Empire romain (90-95). Jean, parvenu alors à un âge très avancé, écrit de l’île de Patmos où il a été exilé (1.9).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ses premiers destinataires sont les chrétiens de sept Eglises d’Asie Mineure (la Turquie actuelle), auxquels le Seigneur adresse des lettres (chap. 2 et 3).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre est rempli d’allusions à des textes de l’Ancien Testament, notamment des prophètes. Il contient aussi beaucoup de chiffres symboliques. En particulier, le chiffre sept, qui exprime la perfection divine, joue un rôle essentiel dans la structure et le contenu du livre. On peut ainsi distinguer sept grandes parties auxquelles s’ajoutent les chapitres d’introduction et de conclusion :'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 1. La vision du Ressuscité (chap. 1)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 2. Les lettres aux sept Eglises (chap. 2 et 3)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 3. Les sept sceaux (4.1 à 8.6)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 4. Les sept trompettes (8.7 à 11.19)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 5. Les sept signes ou visions (12.1 à 15.4)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 6. Les sept coupes de la colère de Dieu (15.5 à 16.21)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 7. Les sept paroles sur Babylone (17.1 à 19.10)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 8. L’aboutissement de l’histoire, en sept visions (19.11 à 21.8)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 9. La nouvelle Jérusalem, épouse de l’Agneau (21.9 à 22.5)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le déroulement du récit ressemble à celui d’un film : une série de visions qui s’enchaînent, avec des gros plans sur certains détails.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le but du livre est clairement annoncé dès le premier verset : le texte se présente comme une « révélation » que « Dieu a confiée à Jésus-Christ pour qu’il montre à ses serviteurs ce qui doit arriver bientôt » (1.1). Le message du livre a comme contexte la persécution qui sévissait contre les chrétiens : ils avaient besoin de savoir qu’il y a un jugement, que le mal ne régnera pas toujours, que la résurrection de Christ inaugure une ère nouvelle qui aboutira à la fin.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Aujourd’hui, l’Apocalypse reste un livre qui maintient les chrétiens en éveil, dans l’attente de « celui qui est, qui était et qui vient » (1.4). Il exprime l’espérance de l’Eglise tout entière qui, avec l’Esprit, peut dire : « Seigneur, viens bientôt ! »'
