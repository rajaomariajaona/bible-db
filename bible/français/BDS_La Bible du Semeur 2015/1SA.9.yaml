document_id: 1SA.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül rencontre Samuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un homme de la tribu de Benjamin nommé Qish avait pour ancêtres en ligne ascendante : Abiel, Tseror, Bekorath et Aphiah, qui descendaient d’un Benjaminite. Qish était un guerrier valeureux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il avait un fils nommé Saül. C’était un beau jeune homme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: homme d’élite.
    marker-yv: yv-n
  - type: text
    text: ', aucun Israélite n’avait plus belle allure que lui ; il les dépassait tous de la tête.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Un jour, les ânesses de son père s’égarèrent et Qish lui dit : Mon fils, emmène l’un des serviteurs et pars à la recherche des ânesses !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Saül parcourut la région montagneuse d’Ephraïm, puis le territoire de Shalisha sans les trouver. Ensuite ils traversèrent la région de Shaalim sans succès, puis le pays de Benjamin, toujours sans trouver les ânesses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Arrivés au territoire de Tsouph, Saül dit au serviteur qui l’accompagnait : Viens, nous allons rentrer, sinon mon père va s’inquiéter à notre sujet sans plus penser aux ânesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le serviteur lui répondit : Attends, il y a justement dans cette ville'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement Rama où résidait Samuel (7.17 ; 8.4).
    marker-yv: yv-n
  - type: text
    text: ' un homme de Dieu très considéré ; tout ce qu’il annonce arrive immanquablement. Allons le voir ! Peut-être nous indiquera-t-il par quel chemin continuer notre route.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – D’accord, allons-y ! dit Saül. Mais qu’est-ce que nous apporterons à cet homme ? Nos provisions sont épuisées et nous n’avons aucun cadeau que nous puissions offrir à l’homme de Dieu. Il ne nous reste plus rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le serviteur lui répondit : Il se trouve que j’ai encore sur moi une petite pièce d’argent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un quart de sicle, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le sicle valant 12 g.
    marker-yv: yv-n
  - type: text
    text: ', je la donnerai à l’homme de Dieu et il nous indiquera le chemin à prendre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Autrefois en Israël, quand on allait consulter Dieu, on disait : « Venez, allons chez l’homme qui reçoit des révélations ! » C’était là le nom par lequel on désignait ceux qu’on appelle aujourd’hui des « prophètes ». '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saül dit à son serviteur : Tu as raison ! Allons-y !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils se dirigèrent vers la ville où habitait l’homme de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pendant qu’ils gravissaient la montée qui mène vers la ville, ils croisèrent des jeunes filles qui en descendaient pour aller puiser de l’eau. Ils leur demandèrent : L’homme qui reçoit des révélations est-il là ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '– Oui, lui répondirent-elles, il est là-haut, droit devant vous ! Mais dépêchez-vous, il vient d’arriver en ville car il y a aujourd’hui un sacrifice pour le peuple sur le haut lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dès que vous serez entrés dans la ville, vous allez le trouver avant qu’il monte sur le haut lieu pour le repas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Repas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui accompagnait certains sacrifices (1.4 ; 2.13-16 ; Dt 12.6-7).
    marker-yv: yv-n
  - type: text
    text: '  ; car le peuple ne se mettra pas à table avant son arrivée, parce que c’est lui qui doit bénir le sacrifice ; après cela, les invités prendront part au repas. Si vous montez tout de suite, vous le trouverez sûrement.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu amène Saül auprès de Samuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils montèrent donc à la ville. Au moment où ils y pénétrèrent par la porte, Samuel sortait dans leur direction pour monter au haut lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Or, la veille, l’Eternel avait fait cette révélation à Samuel : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: « Demain, à cette même heure, lui avait-il dit, je t’enverrai un homme du territoire de Benjamin, tu lui conféreras l’onction pour l’établir chef de mon peuple Israël, et il le délivrera des Philistins, car j’ai vu la misère de mon peuple, et j’ai entendu sa plainte. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dès que Samuel aperçut Saül, l’Eternel l’avertit : Voici l’homme dont je t’ai dit qu’il gouvernerait mon peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Saül aborda Samuel au milieu de la porte et lui demanda : Peux-tu m’indiquer où est la maison de l’homme qui reçoit des révélations ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Samuel lui répondit : C’est moi cet homme qui reçoit des révélations ! Passe devant moi et montons au haut lieu. Ton serviteur et toi, vous mangerez avec moi aujourd’hui ; demain matin, je te laisserai repartir après avoir répondu à toutes les questions qui te préoccupent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quant aux ânesses disparues il y a trois jours, ne t’en inquiète plus ; elles sont retrouvées. D’ailleurs, à qui est réservé tout ce qu’il y a de précieux en Israël ? N’est-ce pas à toi et à toute ta famille ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül répliqua : Que dis-tu là ? Ne suis-je pas un Benjaminite, de la plus petite des tribus d’Israël, et ma famille n’est-elle pas la moins importante de toutes celles de ma tribu ? Pourquoi parles-tu donc de cette manière ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Samuel emmena Saül et son serviteur et les fit entrer dans la salle du festin. Il les installa à la place d’honneur au milieu d’une trentaine d’invités. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ensuite, il ordonna au cuisinier : Sors pour lui le morceau de viande que je t’ai remis pour que tu le mettes de côté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le cuisinier apporta le gigot et sa garniture
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine. La version syriaque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la queue. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette partie était normalement réservée au prêtre (Ex 29.22, 27 ; Lv 7.32-33, 35 ; Nb 6.20 ; 18.18).
    marker-yv: yv-n
  - type: text
    text: ' et le déposa devant Saül pendant que Samuel lui dit : Voici la part qui t’a été réservée. Sers-toi et mange, car, pour cette occasion, elle a été gardée exprès pour toi, lorsque j’ai invité le peuple.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ainsi Saül mangea avec Samuel ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Puis ils redescendirent ensemble du haut lieu à la ville, et Samuel s’entretint avec Saül sur la terrasse de sa maison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samuel confère la royauté à Saül et lui donne ses instructions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le lendemain, au lever du jour, Samuel appela Saül sur la terrasse : Mets-toi en route, et je prendrai congé de toi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saül se leva et se mit en route. Il sortit en compagnie de Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand ils arrivèrent à la limite de la ville, Samuel dit à Saül : Ordonne à ton serviteur d’aller devant nous.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Le serviteur s’éloigna.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Maintenant, tiens-toi là et je te ferai savoir ce que Dieu a dit.
