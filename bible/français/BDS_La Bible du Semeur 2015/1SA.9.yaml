document_id: 1SA.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Saül rencontre Samuel
  - type: text
    content: 'Un homme de la tribu de Benjamin nommé Qish avait pour ancêtres en ligne ascendante : Abiel, Tseror, Bekorath et Aphiah, qui descendaient d’un Benjaminite. Qish était un guerrier valeureux. '
  '10':
  - type: text
    content: 'Saül dit à son serviteur : Tu as raison ! Allons-y !'
  - type: text
    content: Et ils se dirigèrent vers la ville où habitait l’homme de Dieu.
  '11':
  - type: text
    content: 'Pendant qu’ils gravissaient la montée qui mène vers la ville, ils croisèrent des jeunes filles qui en descendaient pour aller puiser de l’eau. Ils leur demandèrent : L’homme qui reçoit des révélations est-il là ?'
  '12':
  - type: text
    content: '– Oui, lui répondirent-elles, il est là-haut, droit devant vous ! Mais dépêchez-vous, il vient d’arriver en ville car il y a aujourd’hui un sacrifice pour le peuple sur le haut lieu. '
  '13':
  - type: text
    content: Dès que vous serez entrés dans la ville, vous allez le trouver avant qu’il monte sur le haut lieu pour le repas
  - type: note
    content: Repas qui accompagnait certains sacrifices (1.4 ; 2.13-16 ; Dt 12.6-7).
  - type: text
    content: '  ; car le peuple ne se mettra pas à table avant son arrivée, parce que c’est lui qui doit bénir le sacrifice ; après cela, les invités prendront part au repas. Si vous montez tout de suite, vous le trouverez sûrement.'
  - type: heading
    content: Dieu amène Saül auprès de Samuel
  '14':
  - type: text
    content: 'Ils montèrent donc à la ville. Au moment où ils y pénétrèrent par la porte, Samuel sortait dans leur direction pour monter au haut lieu. '
  '15':
  - type: text
    content: 'Or, la veille, l’Eternel avait fait cette révélation à Samuel : '
  '16':
  - type: text
    content: « Demain, à cette même heure, lui avait-il dit, je t’enverrai un homme du territoire de Benjamin, tu lui conféreras l’onction pour l’établir chef de mon peuple Israël, et il le délivrera des Philistins, car j’ai vu la misère de mon peuple, et j’ai entendu sa plainte. »
  '17':
  - type: text
    content: 'Dès que Samuel aperçut Saül, l’Eternel l’avertit : Voici l’homme dont je t’ai dit qu’il gouvernerait mon peuple.'
  '18':
  - type: text
    content: 'Saül aborda Samuel au milieu de la porte et lui demanda : Peux-tu m’indiquer où est la maison de l’homme qui reçoit des révélations ?'
  '19':
  - type: text
    content: 'Samuel lui répondit : C’est moi cet homme qui reçoit des révélations ! Passe devant moi et montons au haut lieu. Ton serviteur et toi, vous mangerez avec moi aujourd’hui ; demain matin, je te laisserai repartir après avoir répondu à toutes les questions qui te préoccupent. '
  '2':
  - type: text
    content: Il avait un fils nommé Saül. C’était un beau jeune homme
  - type: note
    content: 'Autre traduction : homme d’élite.'
  - type: text
    content: ', aucun Israélite n’avait plus belle allure que lui ; il les dépassait tous de la tête.'
  '20':
  - type: text
    content: Quant aux ânesses disparues il y a trois jours, ne t’en inquiète plus ; elles sont retrouvées. D’ailleurs, à qui est réservé tout ce qu’il y a de précieux en Israël ? N’est-ce pas à toi et à toute ta famille ?
  '21':
  - type: text
    content: 'Saül répliqua : Que dis-tu là ? Ne suis-je pas un Benjaminite, de la plus petite des tribus d’Israël, et ma famille n’est-elle pas la moins importante de toutes celles de ma tribu ? Pourquoi parles-tu donc de cette manière ?'
  '22':
  - type: text
    content: 'Samuel emmena Saül et son serviteur et les fit entrer dans la salle du festin. Il les installa à la place d’honneur au milieu d’une trentaine d’invités. '
  '23':
  - type: text
    content: 'Ensuite, il ordonna au cuisinier : Sors pour lui le morceau de viande que je t’ai remis pour que tu le mettes de côté.'
  '24':
  - type: text
    content: Le cuisinier apporta le gigot et sa garniture
  - type: note
    content: 'Traduction incertaine. La version syriaque a : la queue. Cette partie était normalement réservée au prêtre (Ex 29.22, 27 ; Lv 7.32-33, 35 ; Nb 6.20 ; 18.18).'
  - type: text
    content: ' et le déposa devant Saül pendant que Samuel lui dit : Voici la part qui t’a été réservée. Sers-toi et mange, car, pour cette occasion, elle a été gardée exprès pour toi, lorsque j’ai invité le peuple.'
  - type: text
    content: 'Ainsi Saül mangea avec Samuel ce jour-là. '
  '25':
  - type: text
    content: Puis ils redescendirent ensemble du haut lieu à la ville, et Samuel s’entretint avec Saül sur la terrasse de sa maison.
  - type: heading
    content: Samuel confère la royauté à Saül et lui donne ses instructions
  '26':
  - type: text
    content: 'Le lendemain, au lever du jour, Samuel appela Saül sur la terrasse : Mets-toi en route, et je prendrai congé de toi.'
  - type: text
    content: 'Saül se leva et se mit en route. Il sortit en compagnie de Samuel. '
  '27':
  - type: text
    content: 'Quand ils arrivèrent à la limite de la ville, Samuel dit à Saül : Ordonne à ton serviteur d’aller devant nous.'
  - type: text
    content: Le serviteur s’éloigna.
  - type: text
    content: – Maintenant, tiens-toi là et je te ferai savoir ce que Dieu a dit.
  '3':
  - type: text
    content: 'Un jour, les ânesses de son père s’égarèrent et Qish lui dit : Mon fils, emmène l’un des serviteurs et pars à la recherche des ânesses !'
  '4':
  - type: text
    content: Saül parcourut la région montagneuse d’Ephraïm, puis le territoire de Shalisha sans les trouver. Ensuite ils traversèrent la région de Shaalim sans succès, puis le pays de Benjamin, toujours sans trouver les ânesses.
  '5':
  - type: text
    content: 'Arrivés au territoire de Tsouph, Saül dit au serviteur qui l’accompagnait : Viens, nous allons rentrer, sinon mon père va s’inquiéter à notre sujet sans plus penser aux ânesses.'
  '6':
  - type: text
    content: 'Le serviteur lui répondit : Attends, il y a justement dans cette ville'
  - type: note
    content: Probablement Rama où résidait Samuel (7.17 ; 8.4).
  - type: text
    content: ' un homme de Dieu très considéré ; tout ce qu’il annonce arrive immanquablement. Allons le voir ! Peut-être nous indiquera-t-il par quel chemin continuer notre route.'
  '7':
  - type: text
    content: – D’accord, allons-y ! dit Saül. Mais qu’est-ce que nous apporterons à cet homme ? Nos provisions sont épuisées et nous n’avons aucun cadeau que nous puissions offrir à l’homme de Dieu. Il ne nous reste plus rien.
  '8':
  - type: text
    content: 'Le serviteur lui répondit : Il se trouve que j’ai encore sur moi une petite pièce d’argent'
  - type: note
    content: 'En hébreu : un quart de sicle, le sicle valant 12 g.'
  - type: text
    content: ', je la donnerai à l’homme de Dieu et il nous indiquera le chemin à prendre.'
  '9':
  - type: text
    content: 'Autrefois en Israël, quand on allait consulter Dieu, on disait : « Venez, allons chez l’homme qui reçoit des révélations ! » C’était là le nom par lequel on désignait ceux qu’on appelle aujourd’hui des « prophètes ». '
