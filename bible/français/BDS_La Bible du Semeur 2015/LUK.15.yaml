document_id: LUK.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Perdus et retrouvés
  - type: heading
    content: (Mt 18.12-14)
  - type: text
    content: 'Les collecteurs d’impôts et autres pécheurs notoires se pressaient tous autour de Jésus, avides d’écouter ses paroles. '
  '10':
  - type: text
    content: 'De même, je vous le déclare, il y a de la joie parmi les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu pour un seul pécheur qui change.'
  '11':
  - type: text
    content: 'Puis il poursuivit : '
  - type: text
    content: Un homme avait deux fils.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Le plus jeune lui dit : « Mon père, donne-moi ma part d’héritage, celle qui doit me revenir. »'
  - type: text
    content: Et le père fit le partage de ses biens entre ses fils.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Quelques jours plus tard, le cadet vendit tout ce qu’il avait reçu et s’en alla dans un pays lointain. Là, il gaspilla sa fortune en menant grande vie.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Quand il eut tout dépensé, une grande famine survint dans ce pays-là et il commença à manquer du nécessaire.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Alors il alla se faire embaucher par l’un des propriétaires de la contrée. Celui-ci l’envoya dans les champs garder les porcs
  - type: text
    content: ' '
  - type: note
    content: Voir note Mt 8.30.
  - type: text
    content: .
  - type: text
    content: ' '
  '16':
  - type: text
    content: Le jeune homme aurait bien voulu apaiser sa faim avec les caroubes
  - type: note
    content: Les caroubes étaient des gousses contenant une pulpe à saveur douceâtre.
  - type: text
    content: ' '
  - type: text
    content: que mangeaient les bêtes, mais personne ne lui en donnait.
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'Alors, il se mit à réfléchir sur lui-même et se dit : « Tous les ouvriers de mon père peuvent manger autant qu’ils veulent, alors que moi, je suis ici à mourir de faim !'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Je vais me mettre en route, j’irai trouver mon père et je lui dirai : Mon père, j’ai péché contre Dieu et contre toi.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Je ne mérite plus d’être considéré comme ton fils. Accepte-moi comme l’un de tes ouvriers. »
  '2':
  - type: text
    content: 'Les pharisiens et les spécialistes de la Loi s’en indignaient et disaient : Cet individu fréquente des pécheurs notoires et s’attable avec eux'
  - type: note
    content: En mangeant avec des personnes en état d’impureté rituelle (ce qu’étaient les gens cités au v. 1), on se mettait soi-même, selon les rabbins, dans le même état.
  - type: text
    content: '  !'
  '20':
  - type: text
    content: ' '
  - type: text
    content: Il se mit donc en route pour se rendre chez son père. Comme il se trouvait encore à une bonne distance de la maison, son père l’aperçut et fut pris d’une profonde pitié pour lui. Il courut à la rencontre de son fils, se jeta à son cou et l’embrassa longuement.
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Le fils lui dit : « Mon père, j’ai péché contre Dieu et contre toi, je ne mérite plus d’être considéré comme ton fils… »'
  '22':
  - type: text
    content: ' '
  - type: text
    content: 'Mais le père dit à ses serviteurs : « Allez vite chercher un habit, le meilleur que vous trouverez, et mettez-le-lui ; passez-lui une bague au doigt et chaussez-le de sandales.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Amenez le veau que nous avons engraissé et tuez-le. Nous allons faire un grand festin et nous réjouir,
  - type: text
    content: ' '
  '24':
  - type: text
    content: car voici, mon fils était mort, et il est revenu à la vie ; il était perdu, et je l’ai retrouvé. »
  - type: text
    content: Et ils commencèrent à festoyer dans la joie.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Pendant ce temps, le fils aîné travaillait aux champs. Sur le chemin du retour, quand il arriva près de la maison, il entendit de la musique et des danses.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Il appela un des serviteurs et lui demanda ce qui se passait.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Le garçon lui répondit : « C’est ton frère qui est de retour. Ton père a tué le veau gras en son honneur parce qu’il l’a retrouvé sain et sauf. »'
  '28':
  - type: text
    content: ' '
  - type: text
    content: Alors le fils aîné se mit en colère et refusa de franchir le seuil de la maison. Son père sortit et l’invita à entrer.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Mais lui répondit : « Cela fait tant et tant d’années que je suis à ton service ; jamais je n’ai désobéi à tes ordres. Et pas une seule fois tu ne m’as donné un chevreau pour festoyer avec mes amis.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Alors Jésus leur répondit par cette parabole : '
  '30':
  - type: text
    content: Mais quand celui-là revient, “ton fils” qui a mangé ta fortune avec des prostituées, pour lui, tu tues le veau gras !
  '31':
  - type: text
    content: ' '
  - type: text
    content: – Mon enfant, lui dit le père, tu es constamment avec moi, et tous mes biens sont à toi ;
  - type: text
    content: ' '
  '32':
  - type: text
    content: mais il fallait bien faire une fête et nous réjouir, puisque ton frère que voici était mort et qu’il est revenu à la vie, puisqu’il était perdu et voici qu’il est retrouvé. »
  '4':
  - type: text
    content: Si l’un de vous possède cent brebis, et que l’une d’elles vienne à se perdre, n’abandonnera-t-il pas les quatre-vingt-dix-neuf autres au pâturage pour aller à la recherche de celle qui est perdue jusqu’à ce qu’il l’ait trouvée ?
  '5':
  - type: text
    content: ' '
  - type: text
    content: Et quand il l’a retrouvée, avec quelle joie il la charge sur ses épaules pour la ramener !
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Aussitôt rentré chez lui, il appelle ses amis et ses voisins et leur dit : « Réjouissez-vous avec moi, car j’ai retrouvé ma brebis qui était perdue. »'
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous assure qu’il en est de même au ciel : il y aura plus de joie pour un seul pécheur qui '
  - type: text
    content: change
  - type: text
    content: ' profondément, que pour quatre-vingt-dix-neuf justes qui n’ont pas besoin de changer.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Ou bien, supposez qu’une femme ait dix pièces d’argent et qu’elle en perde une, ne s’empressera-t-elle pas d’allumer une lampe, de balayer sa maison et de chercher soigneusement dans tous les recoins jusqu’à ce qu’elle ait retrouvé sa pièce ?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Et quand elle l’a trouvée, elle rassemble ses amies et ses voisines et leur dit : « Réjouissez-vous avec moi, j’ai retrouvé la pièce que j’avais perdue. »'
  - type: text
    content: ' '
