document_id: LUK.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perdus et retrouvés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 18.12-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les collecteurs d’impôts et autres pécheurs notoires se pressaient tous autour de Jésus, avides d’écouter ses paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les pharisiens et les spécialistes de la Loi s’en indignaient et disaient : Cet individu fréquente des pécheurs notoires et s’attable avec eux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En mangeant avec des personnes en état d’impureté rituelle (ce qu’étaient les gens cités au v. 1), on se mettait soi-même, selon les rabbins, dans le même état.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Jésus leur répondit par cette parabole : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si l’un de vous possède cent brebis, et que l’une d’elles vienne à se perdre, n’abandonnera-t-il pas les quatre-vingt-dix-neuf autres au pâturage pour aller à la recherche de celle qui est perdue jusqu’à ce qu’il l’ait trouvée ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et quand il l’a retrouvée, avec quelle joie il la charge sur ses épaules pour la ramener !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Aussitôt rentré chez lui, il appelle ses amis et ses voisins et leur dit : « Réjouissez-vous avec moi, car j’ai retrouvé ma brebis qui était perdue. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous assure qu’il en est de même au ciel : il y aura plus de joie pour un seul pécheur qui '
    - type: usfm
      marker: w
      children:
      - type: text
        text: change
    - type: text
      text: ' profondément, que pour quatre-vingt-dix-neuf justes qui n’ont pas besoin de changer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou bien, supposez qu’une femme ait dix pièces d’argent et qu’elle en perde une, ne s’empressera-t-elle pas d’allumer une lampe, de balayer sa maison et de chercher soigneusement dans tous les recoins jusqu’à ce qu’elle ait retrouvé sa pièce ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et quand elle l’a trouvée, elle rassemble ses amies et ses voisines et leur dit : « Réjouissez-vous avec moi, j’ai retrouvé la pièce que j’avais perdue. »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'De même, je vous le déclare, il y a de la joie parmi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu pour un seul pécheur qui change.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis il poursuivit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un homme avait deux fils.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le plus jeune lui dit : « Mon père, donne-moi ma part d’héritage, celle qui doit me revenir. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et le père fit le partage de ses biens entre ses fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quelques jours plus tard, le cadet vendit tout ce qu’il avait reçu et s’en alla dans un pays lointain. Là, il gaspilla sa fortune en menant grande vie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand il eut tout dépensé, une grande famine survint dans ce pays-là et il commença à manquer du nécessaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors il alla se faire embaucher par l’un des propriétaires de la contrée. Celui-ci l’envoya dans les champs garder les porcs
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8.30
        metadata:
          usfm: MAT.8.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le jeune homme aurait bien voulu apaiser sa faim avec les caroubes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'caroubes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient des gousses contenant une pulpe à saveur douceâtre.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que mangeaient les bêtes, mais personne ne lui en donnait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors, il se mit à réfléchir sur lui-même et se dit : « Tous les ouvriers de mon père peuvent manger autant qu’ils veulent, alors que moi, je suis ici à mourir de faim !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vais me mettre en route, j’irai trouver mon père et je lui dirai : Mon père, j’ai péché contre Dieu et contre toi.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne mérite plus d’être considéré comme ton fils. Accepte-moi comme l’un de tes ouvriers. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il se mit donc en route pour se rendre chez son père. Comme il se trouvait encore à une bonne distance de la maison, son père l’aperçut et fut pris d’une profonde pitié pour lui. Il courut à la rencontre de son fils, se jeta à son cou et l’embrassa longuement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le fils lui dit : « Mon père, j’ai péché contre Dieu et contre toi, je ne mérite plus d’être considéré comme ton fils… »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais le père dit à ses serviteurs : « Allez vite chercher un habit, le meilleur que vous trouverez, et mettez-le-lui ; passez-lui une bague au doigt et chaussez-le de sandales.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Amenez le veau que nous avons engraissé et tuez-le. Nous allons faire un grand festin et nous réjouir,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car voici, mon fils était mort, et il est revenu à la vie ; il était perdu, et je l’ai retrouvé. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ils commencèrent à festoyer dans la joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pendant ce temps, le fils aîné travaillait aux champs. Sur le chemin du retour, quand il arriva près de la maison, il entendit de la musique et des danses.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il appela un des serviteurs et lui demanda ce qui se passait.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le garçon lui répondit : « C’est ton frère qui est de retour. Ton père a tué le veau gras en son honneur parce qu’il l’a retrouvé sain et sauf. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors le fils aîné se mit en colère et refusa de franchir le seuil de la maison. Son père sortit et l’invita à entrer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais lui répondit : « Cela fait tant et tant d’années que je suis à ton service ; jamais je n’ai désobéi à tes ordres. Et pas une seule fois tu ne m’as donné un chevreau pour festoyer avec mes amis.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais quand celui-là revient, “ton fils” qui a mangé ta fortune avec des prostituées, pour lui, tu tues le veau gras !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Mon enfant, lui dit le père, tu es constamment avec moi, et tous mes biens sont à toi ;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais il fallait bien faire une fête et nous réjouir, puisque ton frère que voici était mort et qu’il est revenu à la vie, puisqu’il était perdu et voici qu’il est retrouvé. »
