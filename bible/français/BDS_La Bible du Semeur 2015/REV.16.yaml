document_id: REV.16,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'J’entendis une voix forte venant du Temple dire aux sept anges : Allez et versez sur la terre les sept coupes de la colère divine !'
  '10':
  - type: text
    content: 'Le cinquième ange versa sa coupe sur le trône de la bête. Alors de profondes ténèbres couvrirent tout son royaume, et les hommes se mordaient la langue de douleur. '
  '11':
  - type: text
    content: Sous le coup de leurs souffrances et de leurs ulcères, ils insultèrent le Dieu du ciel, et ils ne renoncèrent pas à leurs mauvaises actions.
  '12':
  - type: text
    content: Alors le sixième ange versa sa coupe dans le grand fleuve, l’Euphrate. Ses eaux tarirent, pour que soit préparée la voie aux rois venant de l’orient.
  '13':
  - type: text
    content: Je vis alors sortir de la gueule du dragon, de celle de la bête et de la bouche du faux prophète, trois esprits impurs ressemblant à des grenouilles.
  '14':
  - type: text
    content: Ce sont des esprits démoniaques qui accomplissent des signes prodigieux ; ils s’en vont trouver les rois du monde entier pour les rassembler pour le combat du grand jour du Dieu tout-puissant.
  '15':
  - type: text
    content: ' '
  - type: text
    content: 'Voici : je viens comme un voleur ! Heureux celui qui se tient éveillé et qui garde ses vêtements, afin de ne pas aller nu, en laissant apparaître sa honte aux yeux de tous !'
  '16':
  - type: text
    content: Les esprits démoniaques rassemblèrent les rois dans le lieu appelé en hébreu Harmaguédon
  - type: note
    content: C’est-à-dire montagne de Meguiddo, ville située dans une plaine au pied du mont Carmel, où de sanglantes batailles eurent lieu autrefois (Jg 5.19 ; 2 R 23.29  ; et voir Za 12.11).
  - type: text
    content: .
  '17':
  - type: text
    content: Le septième ange enfin versa sa coupe dans les airs. Une voix forte, venant du trône, sortit du Temple.
  - type: text
    content: – C’en est fait, dit-elle.
  '18':
  - type: text
    content: 'Alors, il y eut des éclairs, des voix et des coups de tonnerre, et un violent tremblement de terre ; on n’en avait jamais vu d’aussi terrible depuis que l’homme est sur la terre. '
  '19':
  - type: text
    content: 'La grande ville se disloqua en trois parties et les villes de tous les pays s’écroulèrent. Alors Dieu se souvint de la grande Babylone pour lui donner à boire la coupe pleine du vin de son ardente colère. '
  '2':
  - type: text
    content: Le premier s’en alla et versa sa coupe sur la terre. Un ulcère malin et douloureux frappa les hommes qui portaient la marque de la bête et qui adoraient son image.
  '20':
  - type: text
    content: 'Toutes les îles s’enfuirent et les montagnes disparurent. '
  '21':
  - type: text
    content: Des grêlons énormes, pesant près d’un demi-quintal, s’abattirent du ciel sur les hommes ; et ceux-ci insultèrent Dieu à cause du fléau de la grêle, car il était absolument terrible.
  '3':
  - type: text
    content: Le deuxième ange versa sa coupe dans la mer ; celle-ci devint comme le sang d’un mort, et tous les êtres vivants de la mer périrent !
  '4':
  - type: text
    content: 'Le troisième ange versa sa coupe sur les fleuves et les sources : les eaux se changèrent en sang. '
  '5':
  - type: text
    content: 'Alors j’entendis l’ange qui a autorité sur les eaux dire :'
  - type: text
    content: 'Tu es juste, toi qui es et qui étais, toi le Saint, d’avoir ainsi fait justice. '
  '6':
  - type: text
    content: Parce qu’ils ont versé le sang des membres du peuple saint et des prophètes, tu leur as aussi donné à boire du sang. Ils reçoivent ce qu’ils méritent.
  '7':
  - type: text
    content: 'Et j’entendis l’autel qui disait :'
  - type: text
    content: Oui, Seigneur, Dieu tout-puissant, tes arrêts sont conformes à la vérité et à la justice !
  '8':
  - type: text
    content: 'Le quatrième ange versa sa coupe sur le soleil. Il lui fut donné de brûler les hommes par son feu. '
  '9':
  - type: text
    content: Les hommes furent atteints de terribles brûlures, et ils insultèrent Dieu qui a autorité sur ces fléaux, mais ils refusèrent de changer et de lui rendre hommage.
