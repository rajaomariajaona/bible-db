document_id: REV.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'J’entendis une voix forte venant du Temple dire aux sept anges : Allez et versez sur la terre les sept coupes de la colère divine !'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le cinquième ange versa sa coupe sur le trône de la bête. Alors de profondes ténèbres couvrirent tout son royaume, et les hommes se mordaient la langue de douleur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sous le coup de leurs souffrances et de leurs ulcères, ils insultèrent le Dieu du ciel, et ils ne renoncèrent pas à leurs mauvaises actions.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Alors le sixième ange versa sa coupe dans le grand fleuve, l’Euphrate. Ses eaux tarirent, pour que soit préparée la voie aux rois venant de l’orient.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je vis alors sortir de la gueule du dragon, de celle de la bête et de la bouche du faux prophète, trois esprits impurs ressemblant à des grenouilles.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ce sont des esprits démoniaques qui accomplissent des signes prodigieux ; ils s’en vont trouver les rois du monde entier pour les rassembler pour le combat du grand jour du Dieu tout-puissant.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici : je viens comme un voleur ! Heureux celui qui se tient éveillé et qui garde ses vêtements, afin de ne pas aller nu, en laissant apparaître sa honte aux yeux de tous !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les esprits démoniaques rassemblèrent les rois dans le lieu appelé en hébreu Harmaguédon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire montagne de Meguiddo, ville située dans une plaine au pied du mont Carmel, où de sanglantes batailles eurent lieu autrefois (Jg 5.19 ; 2 R 23.29  ; et voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Za 12.11
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Le septième ange enfin versa sa coupe dans les airs. Une voix forte, venant du trône, sortit du Temple.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – C’en est fait, dit-elle.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors, il y eut des éclairs, des voix et des coups de tonnerre, et un violent tremblement de terre ; on n’en avait jamais vu d’aussi terrible depuis que l’homme est sur la terre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'La grande ville se disloqua en trois parties et les villes de tous les pays s’écroulèrent. Alors Dieu se souvint de la grande Babylone pour lui donner à boire la coupe pleine du vin de son ardente colère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le premier s’en alla et versa sa coupe sur la terre. Un ulcère malin et douloureux frappa les hommes qui portaient la marque de la bête et qui adoraient son image.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Toutes les îles s’enfuirent et les montagnes disparurent. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Des grêlons énormes, pesant près d’un demi-quintal, s’abattirent du ciel sur les hommes ; et ceux-ci insultèrent Dieu à cause du fléau de la grêle, car il était absolument terrible.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le deuxième ange versa sa coupe dans la mer ; celle-ci devint comme le sang d’un mort, et tous les êtres vivants de la mer périrent !
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le troisième ange versa sa coupe sur les fleuves et les sources : les eaux se changèrent en sang. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors j’entendis l’ange qui a autorité sur les eaux dire :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es juste, toi qui es et qui étais, toi le Saint, d’avoir ainsi fait justice. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Parce qu’ils ont versé le sang des membres du peuple saint et des prophètes, tu leur as aussi donné à boire du sang. Ils reçoivent ce qu’ils méritent.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et j’entendis l’autel qui disait :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, Seigneur, Dieu tout-puissant, tes arrêts sont conformes à la vérité et à la justice !
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le quatrième ange versa sa coupe sur le soleil. Il lui fut donné de brûler les hommes par son feu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les hommes furent atteints de terribles brûlures, et ils insultèrent Dieu qui a autorité sur ces fléaux, mais ils refusèrent de changer et de lui rendre hommage.
