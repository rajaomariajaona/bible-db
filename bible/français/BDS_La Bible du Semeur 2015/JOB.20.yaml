document_id: JOB.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième discours de Tsophar
  - type: heading
    content: Le triomphe des méchants ne dure pas
  - type: text
    content: 'Tsophar de Naama prit la parole et dit :'
  '10':
  - type: text
    content: Ses fils devront indemniser ╵ceux qu’il a appauvris
  - type: note
    content: 'Autre traduction : ses fils seront assaillis par les pauvres.'
  - type: text
    content: et, de ses propres mains, ╵il restituera sa fortune.
  '11':
  - type: text
    content: Ses os étaient remplis ╵d’une ardeur juvénile –
  - type: text
    content: qui se couchera avec lui ╵dans la poussière.
  '12':
  - type: text
    content: Si la méchanceté ╵est si douce à sa bouche,
  - type: text
    content: et s’il l’abrite sous sa langue,
  '13':
  - type: text
    content: s’il la savoure ╵sans jamais la lâcher,
  - type: text
    content: s’il la retient encore ╵sous son palais,
  '14':
  - type: text
    content: cet aliment se corrompra ╵en ses entrailles
  - type: text
    content: et deviendra en lui ╵comme un venin d’aspic.
  '15':
  - type: text
    content: 'Il a beau engloutir une fortune, ╵il devra la vomir :'
  - type: text
    content: Dieu la lui fera rendre.
  '16':
  - type: text
    content: Il a sucé ╵un venin de serpent,
  - type: text
    content: il sera mis à mort ╵par la langue de la vipère.
  '17':
  - type: text
    content: Non, il ne verra plus ╵couler à flots
  - type: text
    content: des fleuves, des torrents ╵de miel et de laitage ;
  '18':
  - type: text
    content: il devra rendre ╵le fruit de son labeur, ╵et il ne l’avalera pas.
  - type: text
    content: Tout ce qu’il s’est acquis ╵par ses affaires, ╵il n’en jouira pas.
  '19':
  - type: text
    content: Puisqu’il a écrasé, ╵abandonné les pauvres,
  - type: text
    content: et pillé des maisons ╵qu’il n’avait pas bâties,
  '2':
  - type: text
    content: A présent, mes pensées ╵me pressent de répondre,
  - type: text
    content: et mon agitation ╵ne peut se contenir.
  '20':
  - type: text
    content: puisque son appétit ╵s’est montré insatiable,
  - type: text
    content: il ne sauvera pas ╵ce qu’il a de plus cher.
  '21':
  - type: text
    content: Personne n’échappait ╵à sa voracité,
  - type: text
    content: c’est pourquoi son bonheur ╵ne subsistera pas.
  '22':
  - type: text
    content: Au sein de l’abondance, ╵la détresse le frappera.
  - type: text
    content: Tous les coups du malheur ╵viendront fondre sur lui.
  '23':
  - type: text
    content: Quand il sera en train ╵de se remplir le ventre,
  - type: text
    content: Dieu enverra sur lui ╵l’ardeur de sa colère,
  - type: text
    content: elle pleuvra sur lui, ╵ce sera son repas.
  '24':
  - type: text
    content: S’il échappe aux armes de fer,
  - type: text
    content: un arc de bronze ╵viendra le transpercer
  - type: note
    content: Arc de bois renforcé par du bronze qui envoyait les flèches avec plus de force que les autres. La même pensée se retrouve en Es 24.18 ; Am 5.19.
  - type: text
    content: '  ;'
  '25':
  - type: text
    content: s’il arrache la flèche ╵et la sort de son corps,
  - type: text
    content: s’il retire la pointe ╵qui a percé son foie,
  - type: text
    content: les terreurs l’atteindront.
  '26':
  - type: text
    content: L’obscurité totale ╵enveloppera ses trésors
  - type: note
    content: 'Autre traduction : enveloppera ses cachettes.'
  - type: text
    content: ','
  - type: text
    content: un feu que nul n’attise ╵viendra le dévorer,
  - type: text
    content: et consumera tout ╵ce qui reste dans sa demeure.
  '27':
  - type: text
    content: Le ciel dévoilera sa faute
  - type: text
    content: et, contre lui, la terre ╵se dressera.
  '28':
  - type: text
    content: Au jour de la Colère,
  - type: text
    content: tous les biens qu’il a amassés ╵dans sa maison ╵seront balayés, emportés.
  '29':
  - type: text
    content: Tel est le sort que Dieu destine ╵à ceux qui font le mal, ╵voilà ce qu’il récoltera.
  - type: text
    content: C’est ce que Dieu ╵a résolu pour lui
  - type: note
    content: 'voilà ce qu’il récoltera… pour lui: autre traduction : c’est là ce que Dieu lui fera récolter pour ses propos.'
  - type: text
    content: .
  '3':
  - type: text
    content: J’entends des remontrances ╵qui me sont une injure.
  - type: text
    content: Mais mon esprit, ╵avec intelligence, ╵me donne la réponse.
  '4':
  - type: text
    content: 'Ne le sais-tu donc pas : ╵depuis toujours,'
  - type: text
    content: depuis que l’homme ╵a été placé sur la terre,
  '5':
  - type: text
    content: le triomphe des gens méchants ╵est de courte durée,
  - type: text
    content: et la joie de l’impie ╵ne dure qu’un instant.
  '6':
  - type: text
    content: Et quand bien même ╵il grandirait jusques au ciel,
  - type: text
    content: quand de la tête ╵il toucherait les nues,
  '7':
  - type: text
    content: il périra à tout jamais ╵tout comme son ordure
  - type: note
    content: 'L’ancienne version grecque a : sa grandeur, ce qui suppose une différence d’une consonne par rapport au texte hébreu traditionnel.'
  - type: text
    content: .
  - type: text
    content: 'Et ceux qui le voyaient ╵diront : « Où donc est-il ? »'
  '8':
  - type: text
    content: Comme un songe, il s’évanouit, ╵on ne le trouve plus.
  - type: text
    content: Comme un rêve nocturne, ╵il se dissipe.
  '9':
  - type: text
    content: L’œil qui le contemplait ╵ne pourra plus le voir,
  - type: text
    content: l’endroit qu’il habitait ╵ne l’apercevra plus.
