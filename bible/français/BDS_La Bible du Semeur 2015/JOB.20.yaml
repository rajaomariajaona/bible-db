document_id: JOB.20
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Deuxième discours de Tsophar
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le triomphe des méchants ne dure pas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsophar de Naama prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A présent, mes pensées ╵me pressent de répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon agitation ╵ne peut se contenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’entends des remontrances ╵qui me sont une injure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais mon esprit, ╵avec intelligence, ╵me donne la réponse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ne le sais-tu donc pas : ╵depuis toujours,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis que l’homme ╵a été placé sur la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: le triomphe des gens méchants ╵est de courte durée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la joie de l’impie ╵ne dure qu’un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et quand bien même ╵il grandirait jusques au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand de la tête ╵il toucherait les nues,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: il périra à tout jamais ╵tout comme son ordure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sa grandeur, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ce qui suppose une différence d’une consonne par rapport au texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ceux qui le voyaient ╵diront : « Où donc est-il ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Comme un songe, il s’évanouit, ╵on ne le trouve plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un rêve nocturne, ╵il se dissipe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’œil qui le contemplait ╵ne pourra plus le voir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’endroit qu’il habitait ╵ne l’apercevra plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ses fils devront indemniser ╵ceux qu’il a appauvris
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fils seront assaillis par les pauvres.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de ses propres mains, ╵il restituera sa fortune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ses os étaient remplis ╵d’une ardeur juvénile –
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se couchera avec lui ╵dans la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si la méchanceté ╵est si douce à sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il l’abrite sous sa langue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: s’il la savoure ╵sans jamais la lâcher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il la retient encore ╵sous son palais,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: cet aliment se corrompra ╵en ses entrailles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et deviendra en lui ╵comme un venin d’aspic.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il a beau engloutir une fortune, ╵il devra la vomir :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu la lui fera rendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il a sucé ╵un venin de serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera mis à mort ╵par la langue de la vipère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Non, il ne verra plus ╵couler à flots
- type: usfm
  marker: q1
  children:
  - type: text
    text: des fleuves, des torrents ╵de miel et de laitage ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: il devra rendre ╵le fruit de son labeur, ╵et il ne l’avalera pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout ce qu’il s’est acquis ╵par ses affaires, ╵il n’en jouira pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Puisqu’il a écrasé, ╵abandonné les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pillé des maisons ╵qu’il n’avait pas bâties,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: puisque son appétit ╵s’est montré insatiable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne sauvera pas ╵ce qu’il a de plus cher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Personne n’échappait ╵à sa voracité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi son bonheur ╵ne subsistera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Au sein de l’abondance, ╵la détresse le frappera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les coups du malheur ╵viendront fondre sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand il sera en train ╵de se remplir le ventre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu enverra sur lui ╵l’ardeur de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle pleuvra sur lui, ╵ce sera son repas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: S’il échappe aux armes de fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un arc de bronze ╵viendra le transpercer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Arc de bois renforcé par du bronze qui envoyait les flèches avec plus de force que les autres. La même pensée se retrouve en Es 24.18 ; Am 5.19.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: s’il arrache la flèche ╵et la sort de son corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il retire la pointe ╵qui a percé son foie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les terreurs l’atteindront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: L’obscurité totale ╵enveloppera ses trésors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enveloppera ses cachettes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: un feu que nul n’attise ╵viendra le dévorer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et consumera tout ╵ce qui reste dans sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le ciel dévoilera sa faute
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, contre lui, la terre ╵se dressera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Au jour de la Colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les biens qu’il a amassés ╵dans sa maison ╵seront balayés, emportés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tel est le sort que Dieu destine ╵à ceux qui font le mal, ╵voilà ce qu’il récoltera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est ce que Dieu ╵a résolu pour lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà ce qu’il récoltera… pour lui
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c’est là ce que Dieu lui fera récolter pour ses propos.
    marker-yv: yv-n
  - type: text
    text: .
