document_id: 2CH.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le deuxième livre des Chroniques, qui originellement ne faisait qu’un avec le premier, comprend deux parties essentielles : le règne de Salomon (chap. 1 à 9) et l’histoire des rois de Juda, du schisme à l’exil (chap. 10 à 36). Dans ces deux sections, l’auteur développe la vision de l’histoire du peuple de l’alliance, déjà esquissée en 1 Chroniques (voir l’introduction à ce livre).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'De même que Josué est venu parfaire l’œuvre de Moïse en faisant entrer le peuple dans le pays promis, Salomon finit l’œuvre commencée par David : c’est sous son règne qu’Israël connaîtra la paix promise par Dieu, dans un pays aux frontières acquises de haute lutte par David (1 Ch 22.8-9), et c’est lui qui fera construire le Temple selon les instructions transmises par son père.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le Chroniste ne retient que ces deux aspects de la vie de Salomon, passant sous silence ses fautes et l’idolâtrie de la fin de sa vie (2 R 11.1-8). Car l’auteur cherche à montrer, aux Israélites revenus d’exil, la continuité entre l’œuvre de l’Eternel sous David et Salomon et la restauration entreprise par les rapatriés : la promesse de la permanence de la dynastie davidique demeure (voir l’introduction à 1 Chroniques), le choix divin de Jérusalem est souligné (2 Ch 6.6, 34, 38), Dieu confirme l’élection des lévites, appelés à le servir devant le coffre de l’alliance (1 Ch 15.2 ; 23.24-32), et il approuve la construction du Temple avec son rituel (chap. 7). Jérusalem et le Temple avaient été détruits et le peuple déporté. Par sa vision de l’histoire, le Chroniste fait comprendre aux rapatriés que, malgré cela, l’Eternel reste fidèle à ses promesses.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans la seconde partie du livre, qui retrace l’histoire de Juda du schisme à l’exil, conformément à sa vision de l’histoire, l’auteur s’arrête surtout sur la vie des rois qui ont cherché à restaurer le Temple ou à rétablir le culte de l’Eternel : Asa (chap. 14 à 16), Josaphat (chap. 17 à 20), Joas (chap. 24), et, tout particulièrement, Ezéchias (chap. 29 à 32) et Josias (chap. 34 à 35). Tout au long de ces pages, le Chroniste relève le principe divin, énoncé dans la Loi, charte de l’alliance, de la rétribution du bien et du mal : Dieu punit celui qui se détourne de lui et qui pèche : il bénit celui qui reconnaît son péché et qui lui obéit (12.5 ; 15.2, 7 ; 16.7, 9 ; 19.2-3  ; etc.).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce principe, l’auteur le résume à la fin de son livre, en 36.15-16, en soulignant la patience de Dieu qui, à maintes reprises, a envoyé ses prophètes pour avertir le peuple du châtiment dont il allait le frapper. Les rapatriés de l’exil ne pouvaient que comprendre ce message.
