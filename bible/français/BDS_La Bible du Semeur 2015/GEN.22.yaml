document_id: GEN.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac sera-t-il sacrifié ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après ces événements, Dieu mit Abraham à l’épreuve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 2.21
        metadata:
          usfm: JAS.2.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Il l’appela : Abraham !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et celui-ci répondit : Me voici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: – Prends Isaac, ton fils unique, que tu aimes, lui dit Dieu, et va au pays de Moriya. Là, tu me l’offriras en sacrifice sur l’une des collines, celle que je t’indiquerai
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11.17-19
        metadata:
          usfm: HEB.11.17+HEB.11.18+HEB.11.19
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moriya
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 3.1
        metadata:
          usfm: 2CH.3.1
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: offriras en sacrifice
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11.17-19
        metadata:
          usfm: HEB.11.17+HEB.11.18+HEB.11.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le lendemain, Abraham se leva de grand matin, sella son âne et emmena deux de ses serviteurs ainsi que son fils Isaac ; il fendit du bois pour l’holocauste, puis il se mit en route en direction de l’endroit que Dieu lui avait indiqué.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après trois jours de marche, Abraham, levant les yeux, aperçut le lieu dans le lointain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors il dit à ses serviteurs : Restez ici avec l’âne ; le garçon et moi, nous irons jusque là-bas pour adorer Dieu, puis nous reviendrons vers vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Abraham chargea le bois de l’holocauste sur son fils Isaac ; il prit lui-même des braises pour le feu et le couteau, puis tous deux s’en allèrent ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Isaac s’adressa à son père Abraham et lui dit : Mon père !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Abraham dit : Qu’y a-t-il, mon fils ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Voici le feu et le bois, dit-il, mais où est l’agneau pour l’holocauste ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abraham répondit : Mon fils, Dieu pourvoira lui-même à l’agneau pour l’holocauste.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils poursuivirent leur chemin tous deux ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand ils furent arrivés à l’endroit que Dieu lui avait indiqué, Abraham construisit un autel et y disposa les bûches. Puis il ligota son fils Isaac et le mit sur l’autel par-dessus le bois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Abraham prit en main le couteau pour immoler son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A ce moment-là, l’ange de l’Eternel lui cria du haut du ciel : Abraham ! Abraham !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Me voici, répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’ange reprit : Ne porte pas la main sur le garçon, ne lui fais pas de mal, car maintenant je sais que tu crains Dieu puisque tu ne m’as pas refusé ton fils unique.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors Abraham aperçut un bélier qui s’était pris les cornes dans un buisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits, le Pentateuque samaritain et la version syriaque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: derrière lui.
    marker-yv: yv-n
  - type: text
    text: '. Il s’en saisit et l’offrit en holocauste à la place de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abraham appela ce lieu-là : Yahvé-Yireéh (L’Eternel pourvoira). C’est pourquoi on dit aujourd’hui : Sur la montagne de l’Eternel, il sera pourvu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis l’ange de l’Eternel appela une seconde fois Abraham du haut du ciel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et lui dit : Je le jure par moi-même, parole de l’Eternel, puisque tu as fait cela, puisque tu ne m’as pas refusé ton fils, ton unique, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: je te comblerai de bénédictions, je multiplierai ta descendance et je la rendrai aussi nombreuse que les étoiles du ciel et que les grains de sable au bord de la mer. Ta descendance dominera sur ses ennemis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 16-17 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6.13-14
        metadata:
          usfm: HEB.6.13+HEB.6.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous les peuples de la terre seront bénis à travers ta descendance parce que tu m’as obéi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abraham revint vers ses serviteurs et ils se remirent ensemble en route pour rentrer à Beer-Sheva où Abraham continua d’habiter.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La descendance de Nahor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après ces événements, on annonça à Abraham que Milka avait donné des enfants à Nahor, son frère : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Outs son premier-né, Bouz le second, Qemouel, père d’Aram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Késéd, Hazo, Pildash, Yidlaph et Betouel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Betouel fut le père de Rébecca. Ce sont là les huit fils que Milka avait donnés à Nahor, frère d’Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Son épouse de second rang Reouma lui donna aussi des enfants : Tébah, Gaham, Tahash et Maaka.'
