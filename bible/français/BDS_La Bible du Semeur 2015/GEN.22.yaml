document_id: GEN.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Isaac sera-t-il sacrifié ?
  - type: text
    content: Après ces événements, Dieu mit Abraham à l’épreuve
  - type: note
    content: Allusion en Jc 2.21.
  - type: text
    content: '. Il l’appela : Abraham !'
  - type: text
    content: 'Et celui-ci répondit : Me voici.'
  '10':
  - type: text
    content: 'Alors Abraham prit en main le couteau pour immoler son fils. '
  '11':
  - type: text
    content: 'A ce moment-là, l’ange de l’Eternel lui cria du haut du ciel : Abraham ! Abraham !'
  - type: text
    content: – Me voici, répondit-il.
  '12':
  - type: text
    content: 'L’ange reprit : Ne porte pas la main sur le garçon, ne lui fais pas de mal, car maintenant je sais que tu crains Dieu puisque tu ne m’as pas refusé ton fils unique.'
  '13':
  - type: text
    content: Alors Abraham aperçut un bélier qui s’était pris les cornes dans un buisson
  - type: note
    content: 'D’après certains manuscrits, le Pentateuque samaritain et la version syriaque. Le texte hébreu traditionnel a : derrière lui.'
  - type: text
    content: '. Il s’en saisit et l’offrit en holocauste à la place de son fils. '
  '14':
  - type: text
    content: 'Abraham appela ce lieu-là : Yahvé-Yireéh (L’Eternel pourvoira). C’est pourquoi on dit aujourd’hui : Sur la montagne de l’Eternel, il sera pourvu.'
  '15':
  - type: text
    content: 'Puis l’ange de l’Eternel appela une seconde fois Abraham du haut du ciel '
  '16':
  - type: text
    content: 'et lui dit : Je le jure par moi-même, parole de l’Eternel, puisque tu as fait cela, puisque tu ne m’as pas refusé ton fils, ton unique, '
  '17':
  - type: text
    content: je te comblerai de bénédictions, je multiplierai ta descendance et je la rendrai aussi nombreuse que les étoiles du ciel et que les grains de sable au bord de la mer. Ta descendance dominera sur ses ennemis
  - type: note
    content: Les v. 16-17 sont cités en Hé 6.13-14.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Tous les peuples de la terre seront bénis à travers ta descendance parce que tu m’as obéi.
  '19':
  - type: text
    content: Abraham revint vers ses serviteurs et ils se remirent ensemble en route pour rentrer à Beer-Sheva où Abraham continua d’habiter.
  - type: heading
    content: La descendance de Nahor
  '2':
  - type: text
    content: – Prends Isaac, ton fils unique, que tu aimes, lui dit Dieu, et va au pays de Moriya. Là, tu me l’offriras en sacrifice sur l’une des collines, celle que je t’indiquerai
  - type: note
    content: 'Voir Hé 11.17-19. Moriya: voir 2 Ch 3.1. offriras en sacrifice: allusion en Hé 11.17-19.'
  - type: text
    content: .
  '20':
  - type: text
    content: 'Après ces événements, on annonça à Abraham que Milka avait donné des enfants à Nahor, son frère : '
  '21':
  - type: text
    content: 'Outs son premier-né, Bouz le second, Qemouel, père d’Aram, '
  '22':
  - type: text
    content: 'Késéd, Hazo, Pildash, Yidlaph et Betouel. '
  '23':
  - type: text
    content: 'Betouel fut le père de Rébecca. Ce sont là les huit fils que Milka avait donnés à Nahor, frère d’Abraham. '
  '24':
  - type: text
    content: 'Son épouse de second rang Reouma lui donna aussi des enfants : Tébah, Gaham, Tahash et Maaka.'
  '3':
  - type: text
    content: Le lendemain, Abraham se leva de grand matin, sella son âne et emmena deux de ses serviteurs ainsi que son fils Isaac ; il fendit du bois pour l’holocauste, puis il se mit en route en direction de l’endroit que Dieu lui avait indiqué.
  '4':
  - type: text
    content: 'Après trois jours de marche, Abraham, levant les yeux, aperçut le lieu dans le lointain. '
  '5':
  - type: text
    content: 'Alors il dit à ses serviteurs : Restez ici avec l’âne ; le garçon et moi, nous irons jusque là-bas pour adorer Dieu, puis nous reviendrons vers vous.'
  '6':
  - type: text
    content: Abraham chargea le bois de l’holocauste sur son fils Isaac ; il prit lui-même des braises pour le feu et le couteau, puis tous deux s’en allèrent ensemble.
  '7':
  - type: text
    content: 'Isaac s’adressa à son père Abraham et lui dit : Mon père !'
  - type: text
    content: 'Abraham dit : Qu’y a-t-il, mon fils ?'
  - type: text
    content: – Voici le feu et le bois, dit-il, mais où est l’agneau pour l’holocauste ?
  '8':
  - type: text
    content: 'Abraham répondit : Mon fils, Dieu pourvoira lui-même à l’agneau pour l’holocauste.'
  - type: text
    content: Et ils poursuivirent leur chemin tous deux ensemble.
  '9':
  - type: text
    content: 'Quand ils furent arrivés à l’endroit que Dieu lui avait indiqué, Abraham construisit un autel et y disposa les bûches. Puis il ligota son fils Isaac et le mit sur l’autel par-dessus le bois. '
