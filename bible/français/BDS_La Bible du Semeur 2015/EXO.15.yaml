document_id: EXO.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cantique de délivrance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Alors Moïse et les Israélites entonnèrent ce cantique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 15.3
        metadata:
          usfm: REV.15.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en l’honneur de l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux chanter pour l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait éclater sa gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a culbuté dans la mer ╵le cheval et son cavalier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Eternel est ma force, ╵il est le sujet de mes chants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il est le sujet de mes chants
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma protection.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’a sauvé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est mon Dieu, je le louerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je l’exalterai, ╵lui, le Dieu de mon père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité au Ps 118.14 ; Es 12.2.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eternel est un grand guerrier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel est son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les chars du pharaon ╵et toute son armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les a jetés à la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’élite de ses combattants
- type: usfm
  marker: q1
  children:
  - type: text
    text: a été engloutie ╵dans la mer des Roseaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et les flots les ont recouverts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont coulé comme une pierre ╵dans les profondeurs de l’abîme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ton bras droit, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a fait éclater sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton bras droit, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écrase l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dans ta gloire éclatante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu renverses tes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu déchaînes contre eux ╵le feu de ta colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont consumés ╵comme des brins de paille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sous l’action de ton souffle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’auteur joue sans doute ici avec les différents sens du mot hébreu : souffle, vent (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14.21'
        metadata:
          usfm: EXO.14.21
      - type: text
        text: ), Esprit.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: les eaux se sont amoncelées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les flots se sont dressés ╵comme un rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se sont figés ╵au milieu de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’ennemi se disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les pourchasserai ╵et je les atteindrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’emparerai d’un butin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’en rassasierai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je tirerai l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me saisirai d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu as soufflé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la mer les a recouverts !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont enfoncés ╵comme des blocs de plomb
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les puissantes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui, parmi tous les dieux, ╵ô Eternel, ╵qui est semblable à toi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui est, comme toi, ╵paré de sainteté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et redoutable, ╵et digne de louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: opérant des prodiges ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu étends ton bras droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre engloutit ╵nos poursuivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dans ton amour, ╵tu as conduit ce peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu as libéré
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu l’as dirigé ╵par ta grande puissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers ta demeure sainte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peut-être une désignation de la Terre promise (voir v. 17) ou du sanctuaire qui y sera dressé à l’endroit que l’Eternel choisira (Dt 12.14, 18, 26 ; 14.25 ; 16.7, 15-16 ; 17.8, 10 ; 18.6 ; 31.11) pour y faire résider son Nom (Dt 12.5, 11, 21 ; 14.23-24 ; 16.2, 6, 11 ; 26.2).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les peuples l’ont appris ╵et ils en ont tremblé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terreur a saisi
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gens de Philistie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Déjà les chefs d’Edom
- type: usfm
  marker: q1
  children:
  - type: text
    text: en sont épouvantés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les princes de Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: se mettent à trembler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les Cananéens ╵en perdent le courage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La Philistie (v. 14), Edom, Moab, Canaan sont énumérés dans l’ordre qu’Israël devra suivre pour se rendre du Sinaï à la Terre promise.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’angoisse et la panique
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’abattent sur eux tous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton action extraordinaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: les a tous pétrifiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce qu’ait passé ╵ton peuple, ô Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’ait passé ╵ce peuple que tu t’es acquis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu les amèneras ╵et tu les planteras
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la montagne ╵qui t’appartient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu que tu destines ╵à être ta demeure, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ton sanctuaire, ╵ô Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tes mains ont fondé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Eternel régnera ╵à perpétuité !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En effet, les chevaux du pharaon, ses chars et ceux qui les montaient s’étaient engagés dans la mer, et l’Eternel avait fait refluer l’eau sur eux tandis que les Israélites avaient traversé la mer à pied sec.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Miryam, la prophétesse, sœur d’Aaron, prit le tambourin, et toutes les femmes la suivirent en dansant et en jouant des tambourins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Miryam entonna, en réponse aux Israélites :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Chantez pour l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait éclater sa gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a culbuté dans la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: le cheval et son cavalier.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: De la mer des Roseaux au mont Sinaï
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'A Mara : le peuple se désaltère'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Sur ordre de Moïse, Israël quitta la mer des Roseaux et prit la direction du désert de Shour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A l’est de l’Egypte (Gn 25.18 ; 1 S 15.7) dans la partie nord-ouest de la presqu’île du Sinaï ; appelé désert d’Etham dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 33.8
        metadata:
          usfm: NUM.33.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Ils marchèrent pendant trois jours dans le désert sans trouver de point d’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils arrivèrent à Mara
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A environ 80 kilomètres au sud de la pointe nord du golfe de Suez, sur sa rive orientale.
    marker-yv: yv-n
  - type: text
    text: ' où il y avait de l’eau, mais ils ne purent pas en boire parce qu’elle était amère – d’où le nom de Mara (Amertume). '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors le peuple se plaignit de Moïse en disant : Qu’allons-nous boire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moïse implora l’Eternel, qui lui indiqua un bois d’une certaine espèce qu’il jeta dans l’eau, et l’eau devint potable.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est à cet endroit que l’Eternel donna au peuple des préceptes et un code de droit ; là aussi il le mit à l’épreuve. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il leur dit : Si vous écoutez attentivement l’Eternel votre Dieu, et si vous faites ce qui est droit à ses yeux, si vous êtes attentifs à ses commandements et si vous obéissez à toutes ses lois, je ne vous infligerai aucune des maladies dont j’ai frappé les Egyptiens ; car je suis l’Eternel qui vous apporte la guérison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ensuite, les Israélites arrivèrent à Elim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au sud de Mara.
    marker-yv: yv-n
  - type: text
    text: ' où il y avait douze sources d’eau et soixante-dix palmiers. Ils campèrent là près de l’eau.'
