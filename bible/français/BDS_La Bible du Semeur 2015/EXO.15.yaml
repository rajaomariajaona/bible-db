document_id: EXO.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cantique de délivrance
  - type: text
    content: Alors Moïse et les Israélites entonnèrent ce cantique
  - type: note
    content: Voir Ap 15.3.
  - type: text
    content: ' en l’honneur de l’Eternel :'
  - type: text
    content: Je veux chanter pour l’Eternel,
  - type: text
    content: il a fait éclater sa gloire,
  - type: text
    content: il a culbuté dans la mer ╵le cheval et son cavalier.
  '10':
  - type: text
    content: Tu as soufflé,
  - type: text
    content: et la mer les a recouverts !
  - type: text
    content: Ils se sont enfoncés ╵comme des blocs de plomb
  - type: text
    content: dans les puissantes eaux.
  '11':
  - type: text
    content: Qui, parmi tous les dieux, ╵ô Eternel, ╵qui est semblable à toi ?
  - type: text
    content: Et qui est, comme toi, ╵paré de sainteté,
  - type: text
    content: et redoutable, ╵et digne de louanges,
  - type: text
    content: opérant des prodiges ?
  '12':
  - type: text
    content: Tu étends ton bras droit,
  - type: text
    content: et la terre engloutit ╵nos poursuivants.
  '13':
  - type: text
    content: Dans ton amour, ╵tu as conduit ce peuple
  - type: text
    content: que tu as libéré
  - type: text
    content: et tu l’as dirigé ╵par ta grande puissance
  - type: text
    content: vers ta demeure sainte
  - type: note
    content: Peut-être une désignation de la Terre promise (voir v. 17) ou du sanctuaire qui y sera dressé à l’endroit que l’Eternel choisira (Dt 12.14, 18, 26 ; 14.25 ; 16.7, 15-16 ; 17.8, 10 ; 18.6 ; 31.11) pour y faire résider son Nom (Dt 12.5, 11, 21 ; 14.23-24 ; 16.2, 6, 11 ; 26.2).
  - type: text
    content: .
  '14':
  - type: text
    content: Les peuples l’ont appris ╵et ils en ont tremblé.
  - type: text
    content: La terreur a saisi
  - type: text
    content: les gens de Philistie.
  '15':
  - type: text
    content: Déjà les chefs d’Edom
  - type: text
    content: en sont épouvantés,
  - type: text
    content: les princes de Moab
  - type: text
    content: se mettent à trembler,
  - type: text
    content: tous les Cananéens ╵en perdent le courage
  - type: note
    content: La Philistie (v. 14), Edom, Moab, Canaan sont énumérés dans l’ordre qu’Israël devra suivre pour se rendre du Sinaï à la Terre promise.
  - type: text
    content: .
  '16':
  - type: text
    content: L’angoisse et la panique
  - type: text
    content: s’abattent sur eux tous.
  - type: text
    content: Ton action extraordinaire
  - type: text
    content: les a tous pétrifiés,
  - type: text
    content: jusqu’à ce qu’ait passé ╵ton peuple, ô Eternel !
  - type: text
    content: Jusqu’à ce qu’ait passé ╵ce peuple que tu t’es acquis.
  '17':
  - type: text
    content: Tu les amèneras ╵et tu les planteras
  - type: text
    content: sur la montagne ╵qui t’appartient,
  - type: text
    content: au lieu que tu destines ╵à être ta demeure, ╵ô Eternel,
  - type: text
    content: jusqu’à ton sanctuaire, ╵ô Eternel
  - type: text
    content: que tes mains ont fondé.
  '18':
  - type: text
    content: L’Eternel régnera ╵à perpétuité !
  '19':
  - type: text
    content: En effet, les chevaux du pharaon, ses chars et ceux qui les montaient s’étaient engagés dans la mer, et l’Eternel avait fait refluer l’eau sur eux tandis que les Israélites avaient traversé la mer à pied sec.
  '2':
  - type: text
    content: L’Eternel est ma force, ╵il est le sujet de mes chants
  - type: note
    content: 'il est le sujet de mes chants: autre traduction : ma protection.'
  - type: text
    content: ','
  - type: text
    content: il m’a sauvé,
  - type: text
    content: il est mon Dieu, je le louerai
  - type: text
    content: et je l’exalterai, ╵lui, le Dieu de mon père
  - type: note
    content: Cité au Ps 118.14 ; Es 12.2.
  - type: text
    content: .
  '20':
  - type: text
    content: Miryam, la prophétesse, sœur d’Aaron, prit le tambourin, et toutes les femmes la suivirent en dansant et en jouant des tambourins.
  '21':
  - type: text
    content: 'Miryam entonna, en réponse aux Israélites :'
  - type: text
    content: 'Chantez pour l’Eternel :'
  - type: text
    content: il a fait éclater sa gloire,
  - type: text
    content: il a culbuté dans la mer
  - type: text
    content: le cheval et son cavalier.
  - type: heading
    content: De la mer des Roseaux au mont Sinaï
  - type: heading
    content: 'A Mara : le peuple se désaltère'
  '22':
  - type: text
    content: Sur ordre de Moïse, Israël quitta la mer des Roseaux et prit la direction du désert de Shour
  - type: note
    content: A l’est de l’Egypte (Gn 25.18 ; 1 S 15.7) dans la partie nord-ouest de la presqu’île du Sinaï ; appelé désert d’Etham dans Nb 33.8.
  - type: text
    content: '. Ils marchèrent pendant trois jours dans le désert sans trouver de point d’eau. '
  '23':
  - type: text
    content: Ils arrivèrent à Mara
  - type: note
    content: A environ 80 kilomètres au sud de la pointe nord du golfe de Suez, sur sa rive orientale.
  - type: text
    content: ' où il y avait de l’eau, mais ils ne purent pas en boire parce qu’elle était amère – d’où le nom de Mara (Amertume). '
  '24':
  - type: text
    content: 'Alors le peuple se plaignit de Moïse en disant : Qu’allons-nous boire ?'
  '25':
  - type: text
    content: Moïse implora l’Eternel, qui lui indiqua un bois d’une certaine espèce qu’il jeta dans l’eau, et l’eau devint potable.
  - type: text
    content: 'C’est à cet endroit que l’Eternel donna au peuple des préceptes et un code de droit ; là aussi il le mit à l’épreuve. '
  '26':
  - type: text
    content: 'Il leur dit : Si vous écoutez attentivement l’Eternel votre Dieu, et si vous faites ce qui est droit à ses yeux, si vous êtes attentifs à ses commandements et si vous obéissez à toutes ses lois, je ne vous infligerai aucune des maladies dont j’ai frappé les Egyptiens ; car je suis l’Eternel qui vous apporte la guérison.'
  '27':
  - type: text
    content: Ensuite, les Israélites arrivèrent à Elim
  - type: note
    content: Au sud de Mara.
  - type: text
    content: ' où il y avait douze sources d’eau et soixante-dix palmiers. Ils campèrent là près de l’eau.'
  '3':
  - type: text
    content: L’Eternel est un grand guerrier,
  - type: text
    content: l’Eternel est son nom.
  '4':
  - type: text
    content: Les chars du pharaon ╵et toute son armée,
  - type: text
    content: il les a jetés à la mer,
  - type: text
    content: l’élite de ses combattants
  - type: text
    content: a été engloutie ╵dans la mer des Roseaux,
  '5':
  - type: text
    content: et les flots les ont recouverts.
  - type: text
    content: Ils ont coulé comme une pierre ╵dans les profondeurs de l’abîme.
  '6':
  - type: text
    content: Ton bras droit, Eternel,
  - type: text
    content: a fait éclater sa puissance,
  - type: text
    content: ton bras droit, Eternel,
  - type: text
    content: écrase l’ennemi.
  '7':
  - type: text
    content: Dans ta gloire éclatante,
  - type: text
    content: tu renverses tes adversaires,
  - type: text
    content: tu déchaînes contre eux ╵le feu de ta colère
  - type: text
    content: et ils sont consumés ╵comme des brins de paille.
  '8':
  - type: text
    content: Sous l’action de ton souffle
  - type: note
    content: 'L’auteur joue sans doute ici avec les différents sens du mot hébreu : souffle, vent (voir 14.21), Esprit.'
  - type: text
    content: ','
  - type: text
    content: les eaux se sont amoncelées,
  - type: text
    content: les flots se sont dressés ╵comme un rempart,
  - type: text
    content: et ils se sont figés ╵au milieu de la mer.
  '9':
  - type: text
    content: 'L’ennemi se disait :'
  - type: text
    content: Je les pourchasserai ╵et je les atteindrai,
  - type: text
    content: je m’emparerai d’un butin,
  - type: text
    content: je m’en rassasierai,
  - type: text
    content: je tirerai l’épée,
  - type: text
    content: je me saisirai d’eux.
