document_id: GEN.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac bénit Jacob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Isaac était devenu vieux, sa vue avait baissé au point qu’il n’y voyait plus. Un jour, il appela Esaü son fils aîné et lui dit : Mon fils !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci répondit : Qu’y a-t-il ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu le lui apporteras, il en mangera, puis il te donnera sa bénédiction avant de mourir.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob répondit à Rébecca, sa mère : Esaü mon frère est couvert de poils et moi pas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si mon père me touche, il s’apercevra que j’ai voulu le tromper, si bien que j’attirerai sur moi une malédiction au lieu d’une bénédiction.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa mère répliqua : Dans ce cas, que la malédiction retombe sur moi, mon fils ; fais seulement ce que je t’ai dit. Va me chercher cela.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il alla donc prendre des chevreaux et les apporta à sa mère qui en prépara un bon plat comme son père l’aimait. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis elle choisit les plus beaux habits d’Esaü, son fils aîné, qui se trouvaient dans la maison, et elle les fit mettre à Jacob, son fils cadet. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui recouvrit, avec la peau des chevreaux, les mains, les bras et la partie du cou dénudée de poils. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis elle lui remit le bon plat et le pain qu’elle avait préparés.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob entra chez son père et dit : Mon père !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci répondit : Oui mon fils, qui es-tu ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jacob dit à son père : Je suis Esaü, ton fils aîné. J’ai fait ce que tu m’as demandé. Lève-toi, je te prie, assieds-toi et mange de mon gibier, pour me donner ensuite ta bénédiction.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Me voici devenu vieux, reprit Isaac, et je ne sais pas quand je mourrai. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac lui demanda : Comment as-tu fait, mon fils, pour trouver si vite du gibier ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob répondit : C’est l’Eternel ton Dieu qui l’a mené sur mon chemin.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac dit à Jacob : Viens un peu plus près, mon fils, que je te touche pour voir si tu es bien mon fils Esaü.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob s’approcha donc d’Isaac, son père le tâta et dit : La voix est celle de Jacob, mais les mains sont celles d’Esaü.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme les mains de Jacob étaient couvertes de poils comme celles d’Esaü son frère, son père ne le reconnut pas et il lui donna sa bénédiction. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais auparavant il lui redemanda : Es-tu bien mon fils Esaü ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jacob répondit : Oui.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Isaac lui dit : Sers-moi donc, que je mange du produit de la chasse de mon fils, pour te donner ensuite ma bénédiction.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob le servit et Isaac mangea. Il lui apporta aussi du vin, que son père but.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Isaac, son père, lui dit : Approche-toi, viens m’embrasser, mon fils.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob s’approcha et l’embrassa. Isaac sentit l’odeur de ses habits, puis il le bénit en ces termes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l’odeur de mon fils ╵est comme la senteur ╵d’un champ béni par l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 11.20
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Dieu t’accorde donc ╵la rosée qui descend du ciel, ╵qu’il rende tes terres fertiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il te donne avec abondance ╵du froment et du vin.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que des nations te soient ╵assujetties,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, devant toi, ╵des peuples se prosternent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois le chef de tes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les fils de ta mère ╵s’inclinent devant toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit qui te maudira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: béni soit qui te bénira !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sort d’Esaü
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant donc, je te prie, prends tes armes, ton arc et tes flèches, va courir la campagne et chasse quelque gibier pour moi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Isaac eut fini de bénir Jacob, celui-ci le quitta. Esaü son frère rentra alors de la chasse. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prépara, lui aussi, un bon plat, l’apporta à son père et lui dit : Mon père, lève-toi, je te prie, et mange du gibier de ton fils, pour me donner ensuite ta bénédiction.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac lui demanda : Qui es-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit : Je suis ton fils aîné, Esaü.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Isaac, en proie à une vive émotion, se mit à trembler et dit : Qui est donc celui qui a pris du gibier et me l’a apporté ? J’ai mangé de tout avant que tu ne viennes et je lui ai donné ma bénédiction ; maintenant il sera béni.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Esaü entendit les paroles de son père, il poussa un grand cri plein d’amertume et supplia son père : Moi aussi, mon père, bénis-moi !'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac lui répondit : Ton frère est venu et il a extorqué ta bénédiction par ruse.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü dit : Est-ce parce qu’on l’appelle Jacob (le Trompeur) qu’il m’a trompé par deux fois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'supplanter, tromper '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 9.4
        - type: text
          text: ') et avec le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'talon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 25.26
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ? D’abord il a pris mon droit d’aînesse et maintenant voilà qu’il m’enlève ma bénédiction ! Et il ajouta : N’as-tu pas de bénédiction en réserve pour moi ?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac lui répondit : Vois, j’ai fait de lui ton maître et je lui ai donné tous ses frères pour serviteurs, je l’ai pourvu de blé et de vin. Que puis-je donc faire pour toi, mon fils ?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü dit à son père : Ne possèdes-tu qu’une seule bénédiction, mon père ? Bénis-moi, moi aussi, mon père'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 12.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il se mit à pleurer à grands cris.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Isaac, son père, répondit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loin des terrains fertiles ╵tu auras ta demeure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et loin de la rosée ╵qui nous descend du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le pays d’Edom où résideront les descendants d’Esaü est sec, rocailleux et bien moins fertile que Canaan (Gn 36.8 ; 2 R 8.20).
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu m’en apprêteras un de ces bons plats comme je les aime, tu me le serviras, je mangerai, puis je te donnerai ma bénédiction avant de mourir.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est grâce à ton épée ╵que tu pourras survivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras assujetti à ton frère. ╵Mais, errant çà et là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu briseras le joug ╵imposé par lui à ton cou.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fuite de Jacob
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü prit Jacob en haine à cause de la bénédiction qu’il avait reçue de son père et il se dit en lui-même : La mort de mon père n’est pas loin, alors je tuerai Jacob mon frère.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On informa Rébecca des propos d’Esaü, son fils aîné ; elle fit venir Jacob son fils cadet, et lui dit : Voici que ton frère Esaü veut te tuer pour se venger de toi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant donc, mon fils, écoute-moi et fais ce que je te dis : Pars d’ici, fuis chez mon frère Laban, à Harân. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Reste chez lui quelque temps, jusqu’à ce que la colère de ton frère s’apaise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En fait, 20 ans (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 31.38-41
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois que sa fureur se sera calmée et qu’il aura oublié ce que tu lui as fait, j’enverrai quelqu’un pour te faire revenir de là-bas. Pourquoi devrais-je vous perdre tous les deux en un seul jour ?
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rébecca alla dire à Isaac : Je suis dégoûtée de la vie à cause de ces femmes hittites. Si Jacob lui aussi épouse une des filles de ce pays, à quoi bon vivre ?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rébecca écoutait ce qu’Isaac disait à son fils Esaü. Quand celui-ci fut parti chasser dans la campagne pour rapporter du gibier, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rébecca dit à son fils Jacob : Ecoute, j’ai entendu ton père dire à ton frère Esaü : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '« Rapporte-moi du gibier ! Tu m’en feras un bon plat, je mangerai et je te donnerai ma bénédiction devant l’Eternel avant de mourir. » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant donc, mon fils, écoute-moi et fais ce que je vais te dire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va au troupeau et choisis-moi deux bons chevreaux, j’en préparerai pour ton père un de ces bons plats comme il les aime. '
