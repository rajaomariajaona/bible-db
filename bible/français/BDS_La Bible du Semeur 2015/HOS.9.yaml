document_id: HOS.9
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La tristesse de l’exil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ne te réjouis pas, Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’exulte pas de joie ╵comme les autres peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as délaissé ton Dieu ╵pour te prostituer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, sur toutes les aires ╵où l’on procède ╵au battage du blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as aimé ╵le salaire de la débauche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais l’aire et le pressoir ╵ne les nourriront pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la récolte de vin ╵sera bien décevante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils n’habiteront plus ╵dans le pays de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire Israël, le royaume du Nord.
    marker-yv: yv-n
  - type: text
    text: ' reprendra ╵le chemin de l’Egypte'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils devront manger ╵des aliments impurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 11
        metadata:
          usfm: LEV.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵en Assyrie.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils ne verseront plus ╵de vin en libation ╵pour l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs sacrifices ╵ne lui seront pas agréables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur nourriture ╵sera comme un repas de deuil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A cause du châtiment qui fondra sur eux. Ceux qui participaient à un repas dans une maison où il y avait un mort se rendaient rituellement impurs (Nb 19.14 ; Dt 26.14 ; Jr 16.7).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui en mangeront ╵se rendront tous impurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur pain ne servira ╵que pour leur subsistance
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il n’entrera pas ╵dans le temple de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que ferez-vous alors ╵aux jours d’assemblées cultuelles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour les fêtes ╵de l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car, les voilà qui partent ╵à cause de la destruction :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Egypte les recueillera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Memphis les ensevelira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les orties prendront possession ╵de leurs trésors précieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.4'
        metadata:
          usfm: HOS.8.4
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les ronces croîtront ╵dans leurs habitations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le voilà arrivé, ╵le temps du châtiment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont venus, les jours ╵du règlement des comptes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sache-le Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est fou, le prophète !
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’homme qui a l’Esprit divague !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes fautes abondantes ╵en sont la cause
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que cette hostilité ╵qui vous anime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui vous anime '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'contre l’Eternel et son prophète. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ainsi que l’hostilité de Dieu que vous allez subir.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La sentinelle d’Ephraïm ╵c’est le prophète qui se tient ╵avec mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant des pièges sont tendus ╵partout sur son chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rencontre l’hostilité ╵dans le pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans le pays
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans le temple.
    marker-yv: yv-n
  - type: text
    text: ' de son Dieu même.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils sont profondément ╵enfoncés dans la corruption
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme ils l’étaient jadis ╵aux jours de Guibéa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jg 19 à 21.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais Dieu prendra ╵en considération leurs fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les châtiera ╵pour leurs péchés.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Déchéance finale
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: « J’ai trouvé Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une grappe de raisins ╵au milieu du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’ai vu vos ancêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les premiers fruits ╵sur un jeune figuier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais eux, lorsqu’ils sont arrivés ╵à Baal-Peor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 5.2 ; Nb 25.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont consacrés ╵à cette idole infâme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont devenus abominables ╵comme l’objet de leur adoration.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La gloire d’Ephraïm ╵fuira à tire-d’aile ╵comme un oiseau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y aura plus de naissances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus de grossesses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus de conceptions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et même s’ils élevaient des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les en priverais ╵avant que ceux-ci soient adultes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, quel malheur pour eux ╵quand je me détournerai d’eux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je voyais Ephraïm ╵tout comme une autre Tyr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plantée en un lieu verdoyant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Je voyais Ephraïm… verdoyant. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ephraïm, je le vois, a fait de ses fils un gibier.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm va devoir ╵envoyer ses enfants ╵vers celui qui massacre. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Donne-leur, Eternel…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leur donneras-tu ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un ventre qui avorte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des seins desséchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: « Or, toute leur méchanceté ╵s’est montrée à Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.15'
        metadata:
          usfm: HOS.4.15
      - type: text
        text: ' et note.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est là que j’ai pris ╵ce peuple en aversion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs actions sont mauvaises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi je les chasserai ╵de mon pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je cesserai de les aimer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tous leurs chefs ╵sont des rebelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ephraïm est frappé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa racine est desséchée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne produiront plus de fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même si leurs femmes ╵ont des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’enverrai à la mort ╵les enfants qu’ils chérissent. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, mon Dieu les rejettera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ne l’ont pas écouté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront errants ╵parmi les peuples étrangers.
