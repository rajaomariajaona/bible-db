document_id: HOS.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La tristesse de l’exil
  - type: text
    content: Ne te réjouis pas, Israël,
  - type: text
    content: n’exulte pas de joie ╵comme les autres peuples,
  - type: text
    content: car tu as délaissé ton Dieu ╵pour te prostituer,
  - type: text
    content: et, sur toutes les aires ╵où l’on procède ╵au battage du blé,
  - type: text
    content: tu as aimé ╵le salaire de la débauche.
  '10':
  - type: text
    content: « J’ai trouvé Israël
  - type: text
    content: comme une grappe de raisins ╵au milieu du désert,
  - type: text
    content: et j’ai vu vos ancêtres
  - type: text
    content: comme les premiers fruits ╵sur un jeune figuier.
  - type: text
    content: Mais eux, lorsqu’ils sont arrivés ╵à Baal-Peor
  - type: note
    content: Voir 5.2 ; Nb 25.
  - type: text
    content: ','
  - type: text
    content: ils se sont consacrés ╵à cette idole infâme
  - type: text
    content: et ils sont devenus abominables ╵comme l’objet de leur adoration.
  '11':
  - type: text
    content: La gloire d’Ephraïm ╵fuira à tire-d’aile ╵comme un oiseau.
  - type: text
    content: Il n’y aura plus de naissances,
  - type: text
    content: plus de grossesses
  - type: text
    content: et plus de conceptions.
  '12':
  - type: text
    content: Et même s’ils élevaient des enfants,
  - type: text
    content: je les en priverais ╵avant que ceux-ci soient adultes.
  - type: text
    content: Oui, quel malheur pour eux ╵quand je me détournerai d’eux !
  '13':
  - type: text
    content: Je voyais Ephraïm ╵tout comme une autre Tyr,
  - type: text
    content: plantée en un lieu verdoyant
  - type: note
    content: 'Je voyais Ephraïm… verdoyant. L’ancienne version grecque a : Ephraïm, je le vois, a fait de ses fils un gibier.'
  - type: text
    content: ','
  - type: text
    content: Ephraïm va devoir ╵envoyer ses enfants ╵vers celui qui massacre. »
  '14':
  - type: text
    content: Donne-leur, Eternel…
  - type: text
    content: Que leur donneras-tu ?
  - type: text
    content: Un ventre qui avorte
  - type: text
    content: et des seins desséchés.
  '15':
  - type: text
    content: « Or, toute leur méchanceté ╵s’est montrée à Guilgal
  - type: note
    content: Voir 4.15 et note.
  - type: text
    content: et c’est là que j’ai pris ╵ce peuple en aversion.
  - type: text
    content: Leurs actions sont mauvaises,
  - type: text
    content: c’est pourquoi je les chasserai ╵de mon pays.
  - type: text
    content: Je cesserai de les aimer,
  - type: text
    content: car tous leurs chefs ╵sont des rebelles.
  '16':
  - type: text
    content: Ephraïm est frappé
  - type: text
    content: et sa racine est desséchée,
  - type: text
    content: ils ne produiront plus de fruit,
  - type: text
    content: et même si leurs femmes ╵ont des enfants,
  - type: text
    content: j’enverrai à la mort ╵les enfants qu’ils chérissent. »
  '17':
  - type: text
    content: Oui, mon Dieu les rejettera,
  - type: text
    content: car ils ne l’ont pas écouté,
  - type: text
    content: et ils seront errants ╵parmi les peuples étrangers.
  '2':
  - type: text
    content: Mais l’aire et le pressoir ╵ne les nourriront pas,
  - type: text
    content: la récolte de vin ╵sera bien décevante.
  '3':
  - type: text
    content: Ils n’habiteront plus ╵dans le pays de l’Eternel.
  - type: text
    content: Ephraïm
  - type: note
    content: C’est-à-dire Israël, le royaume du Nord.
  - type: text
    content: ' reprendra ╵le chemin de l’Egypte'
  - type: text
    content: et ils devront manger ╵des aliments impurs
  - type: note
    content: Voir Lv 11.
  - type: text
    content: ' ╵en Assyrie.'
  '4':
  - type: text
    content: Ils ne verseront plus ╵de vin en libation ╵pour l’Eternel,
  - type: text
    content: leurs sacrifices ╵ne lui seront pas agréables,
  - type: text
    content: leur nourriture ╵sera comme un repas de deuil
  - type: note
    content: A cause du châtiment qui fondra sur eux. Ceux qui participaient à un repas dans une maison où il y avait un mort se rendaient rituellement impurs (Nb 19.14 ; Dt 26.14 ; Jr 16.7).
  - type: text
    content: .
  - type: text
    content: Ceux qui en mangeront ╵se rendront tous impurs.
  - type: text
    content: Leur pain ne servira ╵que pour leur subsistance
  - type: text
    content: mais il n’entrera pas ╵dans le temple de l’Eternel.
  '5':
  - type: text
    content: Que ferez-vous alors ╵aux jours d’assemblées cultuelles
  - type: text
    content: et pour les fêtes ╵de l’Eternel ?
  '6':
  - type: text
    content: 'Car, les voilà qui partent ╵à cause de la destruction :'
  - type: text
    content: l’Egypte les recueillera,
  - type: text
    content: Memphis les ensevelira.
  - type: text
    content: Les orties prendront possession ╵de leurs trésors précieux
  - type: note
    content: Voir 8.4.
  - type: text
    content: et les ronces croîtront ╵dans leurs habitations.
  '7':
  - type: text
    content: Le voilà arrivé, ╵le temps du châtiment.
  - type: text
    content: Ils sont venus, les jours ╵du règlement des comptes,
  - type: text
    content: sache-le Israël !
  - type: text
    content: Il est fou, le prophète !
  - type: text
    content: L’homme qui a l’Esprit divague !
  - type: text
    content: Tes fautes abondantes ╵en sont la cause
  - type: text
    content: ainsi que cette hostilité ╵qui vous anime
  - type: note
    content: 'C’est-à-dire qui vous anime contre l’Eternel et son prophète. Autre traduction : ainsi que l’hostilité de Dieu que vous allez subir.'
  - type: text
    content: .
  '8':
  - type: text
    content: La sentinelle d’Ephraïm ╵c’est le prophète qui se tient ╵avec mon Dieu.
  - type: text
    content: Pourtant des pièges sont tendus ╵partout sur son chemin,
  - type: text
    content: il rencontre l’hostilité ╵dans le pays
  - type: note
    content: 'dans le pays: autre traduction : dans le temple.'
  - type: text
    content: ' de son Dieu même.'
  '9':
  - type: text
    content: Ils sont profondément ╵enfoncés dans la corruption
  - type: text
    content: comme ils l’étaient jadis ╵aux jours de Guibéa
  - type: note
    content: Voir Jg 19 à 21.
  - type: text
    content: .
  - type: text
    content: Mais Dieu prendra ╵en considération leurs fautes,
  - type: text
    content: et il les châtiera ╵pour leurs péchés.
  - type: heading
    content: Déchéance finale
