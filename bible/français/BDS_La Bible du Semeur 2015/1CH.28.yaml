document_id: 1CH.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David confie publiquement la construction du Temple à Salomon
  - type: text
    content: 'David rassembla à Jérusalem tous les chefs d’Israël, les chefs des tribus, les chefs des divisions au service du roi, les commandants des « milliers » et des « centaines », les administrateurs des biens et du cheptel du roi et de ses fils, les hauts fonctionnaires du palais royal, les guerriers et tous les hommes de valeur. '
  '10':
  - type: text
    content: Considère maintenant que l’Eternel t’a choisi pour lui construire un édifice qui serve de sanctuaire. Prends courage, et au travail !
  - type: heading
    content: David remet les plans du sanctuaire à Salomon
  '11':
  - type: text
    content: 'David remit alors à son fils Salomon le plan du portique et des bâtiments annexes, des entrepôts du trésor, des étages, des salles intérieures et de la pièce réservée au propitiatoire. '
  '12':
  - type: text
    content: 'Il lui donna aussi les plans de tout ce qu’il avait prévu de construire : des parvis du temple de l’Eternel et de toutes les salles autour, dans lesquelles seraient entreposés les trésors du Temple et les réserves des objets sacrés. '
  '13':
  - type: text
    content: 'Le roi lui confia également la liste des classes de prêtres et de lévites, ainsi que les instructions au sujet de toutes les tâches faisant partie du service du temple de l’Eternel, et de tous les objets destinés au service de ce temple. '
  '14':
  - type: text
    content: 'Il lui indiqua le poids de l’or à employer pour tous les objets qui devaient être en or, pour chaque service ; il fit de même pour l’argent de tous les ustensiles d’argent destinés à chaque service. '
  '15':
  - type: text
    content: 'Il précisa le poids des chandeliers d’or et de leurs lampes d’or, pour chacun d’entre eux ; il fit de même pour les chandeliers d’argent, et leurs lampes suivant l’usage auquel chacun d’eux était destiné. '
  '16':
  - type: text
    content: Il lui indiqua le poids de l’or pour chacune des tables des pains exposés devant l’Eternel
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: ' et le poids de l’argent pour les tables d’argent. '
  '17':
  - type: text
    content: 'Il lui donna le modèle des fourchettes, des bassines et des carafes d’or pur, ainsi que des coupes en or, en indiquant le poids d’or de chaque coupe, et de même pour les coupes d’argent. '
  '18':
  - type: text
    content: Il lui donna aussi le modèle de l’autel des parfums en or épuré avec l’indication de son poids d’or, ainsi que le plan du chariot des chérubins d’or qui étendent leurs ailes pour recouvrir le coffre de l’alliance de l’Eternel.
  '19':
  - type: text
    content: Tout cela, dit David, se trouve dans un écrit de la main de l’Eternel qui m’a fait comprendre tous les ouvrages décrits sur le plan.
  '2':
  - type: text
    content: 'Le roi David se mit debout et leur fit ce discours : Mes frères et mon peuple, écoutez-moi ! J’avais à cœur de bâtir un temple pour y faire reposer le coffre de l’alliance de l’Eternel, et le marchepied de notre Dieu'
  - type: note
    content: Il s’agit du propitiatoire (couvercle du coffre sacré) sur lequel trône, invisible, l’Eternel (voir Ex 25.22 ; Ps 132.7-8).
  - type: text
    content: . J’ai fait des préparatifs en vue de la construction
  - type: note
    content: Pour les v. 2-7, voir 1 Ch 17.1-14 ; 22.6-16 ; 2 S 7.1-16.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Puis David dit à Salomon : Mon fils, prends courage, tiens bon et mets-toi au travail ! Ne crains rien et ne te laisse pas effrayer, car l’Eternel Dieu, mon Dieu, sera avec toi ; il ne te délaissera pas et il ne t’abandonnera pas jusqu’à ce que tu aies achevé tout le travail à effectuer pour le temple de l’Eternel'
  - type: note
    content: Voir 1 Ch 22.13. Cf. Dt 31.7-8 ; Jos 1.6-9.
  - type: text
    content: '. '
  '21':
  - type: text
    content: Il y a aussi les différentes classes de prêtres et de lévites affectées aux divers services relatifs au Temple ; dans tout cet ouvrage, tu auras le concours d’hommes habiles pour toute espèce de travaux qui se mettront volontairement à ta disposition. Les chefs et tout le peuple seront à tes ordres.
  '3':
  - type: text
    content: 'Mais Dieu m’a dit : « Ce n’est pas toi qui bâtiras un temple en mon honneur, car tu es un homme de guerre et tu as fait couler le sang. » '
  '4':
  - type: text
    content: 'L’Eternel, le Dieu d’Israël m’a choisi dans ma famille pour être roi d’Israël et pour inaugurer une dynastie éternelle. En effet, c’est la tribu de Juda qu’il a choisie pour conduire les autres. Dans cette tribu, il a choisi ma famille et, parmi tous mes frères, c’est moi qu’il a élu pour me faire régner sur tout Israël. '
  '5':
  - type: text
    content: 'L’Eternel m’a donné beaucoup de fils. Parmi eux tous, il a choisi Salomon pour le faire siéger sur le trône de la royauté de l’Eternel sur Israël. '
  '6':
  - type: text
    content: 'Puis il m’a déclaré : « C’est ton fils Salomon qui bâtira mon temple et mes parvis, car je l’ai choisi pour qu’il soit mon fils et je serai moi-même un père pour lui. '
  '7':
  - type: text
    content: 'Je maintiendrai pour toujours sa royauté, s’il met son énergie, comme il le fait aujourd’hui, à obéir à mes commandements et à mes lois. » '
  '8':
  - type: text
    content: 'Maintenant, en présence de tout Israël, de l’assemblée de l’Eternel, et en présence de notre Dieu qui vous entend, je vous conjure d’obéir à tous les commandements de l’Eternel votre Dieu, et de chercher à les connaître. Alors vous posséderez ce beau pays et vous le transmettrez en héritage à vos descendants à perpétuité. '
  '9':
  - type: text
    content: 'Quant à toi, Salomon mon fils, apprends à bien connaître le Dieu de ton père et adore-le d’un cœur sans partage et d’un esprit bien disposé, car l’Eternel regarde jusqu’au fond des cœurs et il discerne toutes les intentions. Si tu t’attaches à lui, il interviendra en ta faveur, mais si tu te détournes de lui, il te rejettera pour toujours. '
