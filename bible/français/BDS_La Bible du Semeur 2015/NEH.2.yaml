document_id: NEH.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Néhémie obtient l’autorisation d’aller à Jérusalem
  - type: text
    content: Durant le mois de Nisân, la vingtième année
  - type: note
    content: C’est-à-dire mars-avril 445 av. J.-C., quatre mois après que Néhémie eut été informé de l’état de Jérusalem.
  - type: text
    content: ' du règne de l’empereur Artaxerxès, je pris du vin qui était devant l’empereur pour lui en servir. Jamais auparavant, je n’avais paru triste en sa présence. '
  '10':
  - type: text
    content: Quand Sanballat, le Horonite, et Tobiya, le fonctionnaire ammonite
  - type: note
    content: 'Sanballat: de la ville de Beth-Horôn, à la frontière entre Benjamin et Ephraïm, principal adversaire de Néhémie (voir 4.1-2 ; 6.1-19), était gouverneur de Samarie (d’après un papyrus d’Eléphantine). Tobiya: voir 6.1, 12, 17-18.'
  - type: text
    content: ', apprirent mon arrivée, ils furent très mécontents que quelqu’un soit venu pour œuvrer au bien des Israélites. '
  '11':
  - type: text
    content: 'Une fois arrivé à Jérusalem, j’y restai trois jours. '
  '12':
  - type: text
    content: 'Puis je sortis de nuit, accompagné de quelques hommes, sans avoir dit à personne ce que mon Dieu m’avait mis à cœur d’entreprendre en faveur de Jérusalem. Je ne disposais pas d’autre bête que de ma propre monture. '
  '13':
  - type: text
    content: Je sortis cette nuit-là par la porte de la Vallée
  - type: note
    content: Une porte de la muraille ouest de Jérusalem (3.13).
  - type: text
    content: ', et je me dirigeai vers la source du Dragon'
  - type: note
    content: Parfois identifiée à la source d’Eyn-Roguel (Jos 15.7-8 ; 18.16 ; 2 S 17.17 ; 1 R 1.9) située au confluent des vallées du Cédron et de Ben-Hinnom.
  - type: text
    content: ' et vers la porte du Fumier'
  - type: note
    content: Par où l’on sortait les immondices de la ville pour les amener à la vallée de Ben-Hinnom (voir 3.13-14 ; 12.31 ; 2 R 23.10).
  - type: text
    content: '. J’examinai les remparts de Jérusalem. Je constatai qu’il y avait des brèches presque partout et que les portes avaient été détruites par le feu. '
  '14':
  - type: text
    content: Je poursuivis vers la porte de la Source
  - type: note
    content: Conduisant sans doute à la source d’Eyn-Roguel (3.15 ; 12.37), elle se trouvait à l’angle sud-est de la ville.
  - type: text
    content: ' et passai près de l’étang du Roi'
  - type: note
    content: Probablement, l’étang de Siloé (3.15).
  - type: text
    content: ', mais il n’y avait plus de passage pour ma monture. '
  '15':
  - type: text
    content: 'Je remontai, toujours de nuit, par la vallée du Cédron en continuant d’examiner la muraille. Puis je fis demi-tour et je rentrai par la porte de la Vallée. '
  '16':
  - type: text
    content: 'Les chefs de la ville ignoraient où j’étais allé et ce que j’avais fait. Jusque-là, je n’avais informé ni les Juifs, ni les prêtres, ni les notables, ni les chefs, ni les autres responsables qui s’occupaient des travaux. '
  '17':
  - type: text
    content: 'C’est alors seulement que je leur dis : Vous voyez vous-mêmes quel est notre malheur ! Jérusalem est en ruine et ses portes ont été détruites par le feu ! Allez, reconstruisons le rempart de Jérusalem pour que nous ne soyons plus dans cette situation humiliante !'
  '18':
  - type: text
    content: 'Je leur racontai ensuite comment la main bienveillante de mon Dieu avait agi pour moi avec bonté, et je leur rapportai ce que l’empereur m’avait dit. Ils s’écrièrent aussitôt : Levons-nous et effectuons les travaux de reconstruction.'
  - type: text
    content: Ainsi ils prirent courage pour réaliser cette belle œuvre.
  - type: heading
    content: Les moqueries de Sanballat et Tobiya
  '19':
  - type: text
    content: 'Lorsque Sanballat, le Horonite, Tobiya, son adjoint ammonite, et Guéshem, l’Arabe, l’apprirent, ils se moquèrent de nous, et vinrent nous dire d’un ton méprisant : Qu’êtes-vous en train de faire ? Vous voulez vous révolter contre l’empereur ?'
  '2':
  - type: text
    content: 'Alors l’empereur me demanda : Pourquoi as-tu mauvaise mine ? Tu ne me sembles pourtant pas malade ; ce ne peut être qu’un chagrin de cœur !'
  - type: text
    content: 'Je fus saisi d’une grande crainte, '
  '20':
  - type: text
    content: 'Mais je leur répondis : Le Dieu du ciel fera réussir notre entreprise. Nous, ses serviteurs, nous nous mettrons à l’œuvre et nous reconstruirons la ville. Quant à vous, vous n’avez aucune propriété ni aucun droit dans Jérusalem, et personne ne s’y souviendra de vous avec considération !'
  '3':
  - type: text
    content: 'mais je lui dis : Que l’empereur vive toujours ! Comment n’aurais-je pas un air triste alors que la ville où sont enterrés mes ancêtres est en ruine et que ses portes ont été détruites par le feu'
  - type: note
    content: Voir 2 R 25.8-10 ; 2 Ch 36.19 ; Jr 52.12-13.
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: 'Alors l’empereur me demanda : Que veux-tu donc ?'
  - type: text
    content: 'J’adressai une prière au Dieu du ciel, '
  '5':
  - type: text
    content: 'et je répondis à l’empereur : Si tel est le bon plaisir de l’empereur et si tu agrées ton serviteur, veuille m’envoyer en Juda, dans la ville où mes ancêtres sont enterrés, pour que je puisse la rebâtir.'
  '6':
  - type: text
    content: 'L’empereur, qui avait l’impératrice assise à ses côtés, me demanda alors : Combien de temps durera ton voyage et quand seras-tu de retour ?'
  - type: text
    content: 'L’empereur accepta donc de me laisser partir, et je lui indiquai un délai. '
  '7':
  - type: text
    content: 'Puis j’ajoutai : Si l’empereur le trouve bon, pourrait-on me donner des lettres'
  - type: note
    content: C’est-à-dire des sauf-conduits servant de passeport.
  - type: text
    content: ' pour les gouverneurs de la province à l’ouest de l’Euphrate, pour qu’ils me laissent passer jusqu’au pays de Juda, '
  '8':
  - type: text
    content: ainsi qu’une lettre pour Asaph, l’intendant des forêts impériales, afin qu’il me fournisse du bois de charpente pour reconstruire les portes de la citadelle
  - type: note
    content: Probablement la forteresse au nord du temple qu’Hérode le Grand reconstruira plus tard.
  - type: text
    content: ', près du Temple, et les murailles de la ville, et pour bâtir la maison où je m’installerai.'
  - type: text
    content: L’empereur me procura ces lettres, car mon Dieu agissait avec bonté en ma faveur.
  - type: heading
    content: L’arrivée de Néhémie à Jérusalem et l’inspection de la ville
  '9':
  - type: text
    content: 'Je me rendis auprès des gouverneurs des provinces à l’ouest de l’Euphrate et je leur remis les lettres de l’empereur. L’empereur m’avait fait escorter par des officiers de l’armée et par des cavaliers. '
