document_id: NEH.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Néhémie obtient l’autorisation d’aller à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Durant le mois de Nisân, la vingtième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire mars-avril 445 av. J.-C., quatre mois après que Néhémie eut été informé de l’état de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' du règne de l’empereur Artaxerxès, je pris du vin qui était devant l’empereur pour lui en servir. Jamais auparavant, je n’avais paru triste en sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors l’empereur me demanda : Pourquoi as-tu mauvaise mine ? Tu ne me sembles pourtant pas malade ; ce ne peut être qu’un chagrin de cœur !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je fus saisi d’une grande crainte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mais je lui dis : Que l’empereur vive toujours ! Comment n’aurais-je pas un air triste alors que la ville où sont enterrés mes ancêtres est en ruine et que ses portes ont été détruites par le feu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 25.8-10 ; 2 Ch 36.19 ; Jr 52.12-13.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors l’empereur me demanda : Que veux-tu donc ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'J’adressai une prière au Dieu du ciel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et je répondis à l’empereur : Si tel est le bon plaisir de l’empereur et si tu agrées ton serviteur, veuille m’envoyer en Juda, dans la ville où mes ancêtres sont enterrés, pour que je puisse la rebâtir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’empereur, qui avait l’impératrice assise à ses côtés, me demanda alors : Combien de temps durera ton voyage et quand seras-tu de retour ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’empereur accepta donc de me laisser partir, et je lui indiquai un délai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis j’ajoutai : Si l’empereur le trouve bon, pourrait-on me donner des lettres'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire des sauf-conduits servant de passeport.
    marker-yv: yv-n
  - type: text
    text: ' pour les gouverneurs de la province à l’ouest de l’Euphrate, pour qu’ils me laissent passer jusqu’au pays de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ainsi qu’une lettre pour Asaph, l’intendant des forêts impériales, afin qu’il me fournisse du bois de charpente pour reconstruire les portes de la citadelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement la forteresse au nord du temple qu’Hérode le Grand reconstruira plus tard.
    marker-yv: yv-n
  - type: text
    text: ', près du Temple, et les murailles de la ville, et pour bâtir la maison où je m’installerai.'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’empereur me procura ces lettres, car mon Dieu agissait avec bonté en ma faveur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrivée de Néhémie à Jérusalem et l’inspection de la ville
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je me rendis auprès des gouverneurs des provinces à l’ouest de l’Euphrate et je leur remis les lettres de l’empereur. L’empereur m’avait fait escorter par des officiers de l’armée et par des cavaliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quand Sanballat, le Horonite, et Tobiya, le fonctionnaire ammonite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sanballat
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de la ville de Beth-Horôn, à la frontière entre Benjamin et Ephraïm, principal adversaire de Néhémie (voir 4.1-2 ; 6.1-19), était gouverneur de Samarie (d’après un papyrus d’Eléphantine). '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tobiya
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: NEH.6.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
        metadata:
          usfm: NEH.6.12
      - type: text
        text: ', 17-18.'
    marker-yv: yv-n
  - type: text
    text: ', apprirent mon arrivée, ils furent très mécontents que quelqu’un soit venu pour œuvrer au bien des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Une fois arrivé à Jérusalem, j’y restai trois jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis je sortis de nuit, accompagné de quelques hommes, sans avoir dit à personne ce que mon Dieu m’avait mis à cœur d’entreprendre en faveur de Jérusalem. Je ne disposais pas d’autre bête que de ma propre monture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je sortis cette nuit-là par la porte de la Vallée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une porte de la muraille ouest de Jérusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.13'
        metadata:
          usfm: NEH.3.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et je me dirigeai vers la source du Dragon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Parfois identifiée à la source d’Eyn-Roguel (Jos 15.7-8 ; 18.16 ; 2 S 17.17 ; 1 R 1.9) située au confluent des vallées du Cédron et de Ben-Hinnom.
    marker-yv: yv-n
  - type: text
    text: ' et vers la porte du Fumier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par où l’on sortait les immondices de la ville pour les amener à la vallée de Ben-Hinnom (voir 3.13-14 ; 12.31 ; 2 R 23.10).
    marker-yv: yv-n
  - type: text
    text: '. J’examinai les remparts de Jérusalem. Je constatai qu’il y avait des brèches presque partout et que les portes avaient été détruites par le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je poursuivis vers la porte de la Source
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Conduisant sans doute à la source d’Eyn-Roguel (3.15 ; 12.37), elle se trouvait à l’angle sud-est de la ville.
    marker-yv: yv-n
  - type: text
    text: ' et passai près de l’étang du Roi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement, l’étang de Siloé (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.15'
        metadata:
          usfm: NEH.3.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', mais il n’y avait plus de passage pour ma monture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je remontai, toujours de nuit, par la vallée du Cédron en continuant d’examiner la muraille. Puis je fis demi-tour et je rentrai par la porte de la Vallée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les chefs de la ville ignoraient où j’étais allé et ce que j’avais fait. Jusque-là, je n’avais informé ni les Juifs, ni les prêtres, ni les notables, ni les chefs, ni les autres responsables qui s’occupaient des travaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est alors seulement que je leur dis : Vous voyez vous-mêmes quel est notre malheur ! Jérusalem est en ruine et ses portes ont été détruites par le feu ! Allez, reconstruisons le rempart de Jérusalem pour que nous ne soyons plus dans cette situation humiliante !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je leur racontai ensuite comment la main bienveillante de mon Dieu avait agi pour moi avec bonté, et je leur rapportai ce que l’empereur m’avait dit. Ils s’écrièrent aussitôt : Levons-nous et effectuons les travaux de reconstruction.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ainsi ils prirent courage pour réaliser cette belle œuvre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les moqueries de Sanballat et Tobiya
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque Sanballat, le Horonite, Tobiya, son adjoint ammonite, et Guéshem, l’Arabe, l’apprirent, ils se moquèrent de nous, et vinrent nous dire d’un ton méprisant : Qu’êtes-vous en train de faire ? Vous voulez vous révolter contre l’empereur ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais je leur répondis : Le Dieu du ciel fera réussir notre entreprise. Nous, ses serviteurs, nous nous mettrons à l’œuvre et nous reconstruirons la ville. Quant à vous, vous n’avez aucune propriété ni aucun droit dans Jérusalem, et personne ne s’y souviendra de vous avec considération !'
