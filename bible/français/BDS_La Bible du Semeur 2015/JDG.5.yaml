document_id: JDG.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cantique de Débora
  - type: text
    content: 'En ce même jour, Débora chanta ce cantique avec Baraq, fils d’Abinoam :'
  '10':
  - type: text
    content: Vous tous qui chevauchez ╵sur des ânesses blanches,
  - type: text
    content: vous qui êtes assis ╵sur des tapis,
  - type: text
    content: 'et vous qui parcourez ╵les chemins : pensez-y !'
  '11':
  - type: text
    content: 'Ecoutez comme ils chantent, ╵ceux qui font le partage ╵de l’eau près des fontaines :'
  - type: text
    content: ils chantent comment l’Eternel ╵a fait justice,
  - type: text
    content: oui, comment il a fait justice ╵par son gouvernement
  - type: note
    content: Sens incertain.
  - type: text
    content: ' ╵sur Israël,'
  - type: text
    content: son peuple est descendu ╵aux portes de la ville.
  '12':
  - type: text
    content: Debout ! Eveille-toi, ╵Débora, interviens !
  - type: text
    content: Debout, éveille-toi, ╵entonne un chant de guerre !
  - type: text
    content: Toi, Baraq, lève-toi, ╵ramène tes captifs, ╵ô fils d’Abinoam !
  '13':
  - type: text
    content: Voici qu’un faible reste ╵a triomphé des grands,
  - type: text
    content: oui, le peuple de l’Eternel ╵a maîtrisé pour moi les braves
  - type: note
    content: 'Autre traduction : est venu auprès de moi parmi les braves.'
  - type: text
    content: '  !'
  '14':
  - type: text
    content: Ceux qui ont vaincu Amalec ╵sont sortis d’Ephraïm.
  - type: text
    content: Benjamin t’a suivi, ╵il est parmi tes troupes.
  - type: text
    content: De Makir sont venus ╵ceux qui ont commandé,
  - type: text
    content: et de Zabulon ceux qui tiennent ╵le bâton de commandement.
  '15':
  - type: text
    content: Les princes d’Issacar ╵ont rejoint Débora,
  - type: text
    content: et toute sa tribu, ╵sur les pas de Baraq,
  - type: text
    content: s’est précipitée dans la plaine.
  - type: text
    content: Dans les rangs de Ruben, ╵on a délibéré
  - type: text
    content: et discuté sans fin.
  '16':
  - type: text
    content: Pourquoi es-tu resté ╵au milieu des enclos,
  - type: text
    content: écoutant bêler les troupeaux ?
  - type: text
    content: Dans les rangs de Ruben, ╵on a délibéré
  - type: text
    content: et discuté sans fin !
  '17':
  - type: text
    content: Galaad est resté ╵au-delà du Jourdain,
  - type: text
    content: et Dan n’a pas bougé ╵d’auprès de ses vaisseaux
  - type: note
    content: Le port de Jaffa lui appartenait.
  - type: text
    content: .
  - type: text
    content: Aser est demeuré ╵près du bord de la mer
  - type: text
    content: et il s’est cantonné ╵auprès des ports paisibles.
  '18':
  - type: text
    content: Zabulon est un peuple ╵qui a bravé la mort,
  - type: text
    content: et Nephtali aussi,
  - type: text
    content: sur les hauteurs, dans la campagne.
  '19':
  - type: text
    content: Des rois ennemis vinrent ╵et ils nous combattirent ;
  - type: text
    content: oui, ils nous combattirent, ╵les rois de Canaan,
  - type: text
    content: à Taanak, tout près ╵des eaux de Meguiddo ;
  - type: text
    content: mais ils n’ont emporté ╵ni argent ni butin.
  '2':
  - type: text
    content: 'Bénissez l’Eternel :'
  - type: text
    content: Voici qu’en Israël ╵on a laissé flotter ╵les chevelures
  - type: note
    content: Geste qui montre la détermination à aller au combat.
  - type: text
    content: ','
  - type: text
    content: le peuple s’est offert ╵pour le combat.
  '20':
  - type: text
    content: Dans le ciel, même les étoiles ╵ont pris part au combat ;
  - type: text
    content: du haut de leurs orbites, ╵elles combattaient Sisera.
  '21':
  - type: text
    content: Le torrent de Qishôn ╵les a tous balayés,
  - type: text
    content: le torrent de Qishôn, ╵celui des temps anciens.
  - type: text
    content: Marchons avec hardiesse !
  '22':
  - type: text
    content: Comme ils ont résonné, ╵les sabots des chevaux ╵qui martelaient le sol !
  - type: text
    content: Au galop ! au galop ! ╵Fuyez, puissants coursiers !
  '23':
  - type: text
    content: 'L’ange de l’Eternel ╵dit : Maudissez Méroz'
  - type: note
    content: Une ville de Nephtali qui n’a pas participé au combat.
  - type: text
    content: '  ;'
  - type: text
    content: 'maudissez, maudissez ╵ses habitants :'
  - type: text
    content: ils ne sont pas venus ╵prêter main-forte à l’Eternel,
  - type: text
    content: prêter main-forte à l’Eternel ╵au milieu de ses braves.
  '24':
  - type: text
    content: Que Yaël soit bénie ╵entre toutes les femmes,
  - type: text
    content: Yaël la femme ╵de Héber le Qénien !
  - type: text
    content: Oui, qu’elle soit bénie ╵entre toutes les femmes ╵qui vivent sous la tente.
  '25':
  - type: text
    content: Sisera demanda de l’eau, ╵elle a donné du lait.
  - type: text
    content: Dans la coupe d’honneur
  - type: note
    content: La coupe est celle dans laquelle on offre le vin d’honneur lors des fêtes.
  - type: text
    content: ', ╵elle a offert du lait caillé.'
  '26':
  - type: text
    content: Et puis elle a saisi ╵un piquet dans sa main
  - type: text
    content: et a pris de sa droite ╵le marteau d’ouvrier
  - type: text
    content: pour frapper Sisera, ╵pour lui percer la tête.
  - type: text
    content: Elle lui a brisé ╵et transpercé la tempe.
  '27':
  - type: text
    content: A ses pieds, il s’affaisse,
  - type: text
    content: il s’écroule, il succombe.
  - type: text
    content: A ses pieds, il s’affaisse, ╵oui, il s’écroule.
  - type: text
    content: Et à l’endroit ╵où il s’est écroulé ╵il gît inanimé !
  '28':
  - type: text
    content: Par la fenêtre, ╵sa mère guette au loin ;
  - type: text
    content: à travers le grillage,
  - type: text
    content: 'elle exhale sa plainte :'
  - type: text
    content: pourquoi, pourquoi son char ╵tarde-t-il à paraître ?
  - type: text
    content: Pourquoi n’entend-on pas ╵le fracas de ses chars ?
  '29':
  - type: text
    content: Sans cesse, elle répète
  - type: text
    content: 'ce qu’ont dit les plus sages ╵des dames de sa suite :'
  '3':
  - type: text
    content: Ecoutez-moi, ô rois ! ╵Prêtez l’oreille, ô princes !
  - type: text
    content: Je veux chanter pour l’Eternel,
  - type: text
    content: je veux jouer de la musique ╵en l’honneur du Dieu d’Israël.
  '30':
  - type: text
    content: '« Sans doute ont-ils trouvé ╵un butin abondant ╵et ils se le partagent :'
  - type: text
    content: une fille ou deux filles ╵pour chaque combattant !
  - type: text
    content: Sisera, lui, reçoit ╵des habits de couleur,
  - type: text
    content: des habits de couleur,
  - type: text
    content: deux vêtements brodés ╵d’étoffe de couleur
  - type: text
    content: pour le cou du vainqueur ! »
  '31':
  - type: text
    content: O Eternel, ╵que tous tes ennemis ╵périssent de la sorte !
  - type: text
    content: Et que tous ceux qui t’aiment ╵soient comme le soleil
  - type: text
    content: quand, tout éclatant, il se lève !
  - type: text
    content: Après cela, le pays fut en paix pendant quarante ans.
  '4':
  - type: text
    content: O Eternel, ╵lorsque tu sortis de Séir,
  - type: text
    content: lorsque tu t’avanças ╵depuis les champs d’Edom,
  - type: text
    content: 'la terre se mit à trembler ╵et le ciel se fondit en eau :'
  - type: text
    content: les nuées déversèrent ╵une pluie abondante.
  '5':
  - type: text
    content: Devant toi, Eternel, ╵les montagnes ont vacillé
  - type: note
    content: 'Autre traduction : se sont affaissées.'
  - type: text
    content: ', ╵devant le Dieu du Sinaï,'
  - type: text
    content: oui, devant l’Eternel, ╵Dieu d’Israël
  - type: note
    content: Voir Ps 68.8-9.
  - type: text
    content: .
  '6':
  - type: text
    content: Au temps de Shamgar, fils d’Anath,
  - type: text
    content: et au temps de Yaël, ╵les routes étaient désertes,
  - type: text
    content: les voyageurs suivaient ╵des sentiers détournés.
  '7':
  - type: text
    content: Les villes d’Israël ╵étaient abandonnées,
  - type: text
    content: la vie avait cessé.
  - type: text
    content: Alors, moi, Débora, ╵je suis intervenue,
  - type: text
    content: je suis intervenue ╵comme une mère ╵pour Israël.
  '8':
  - type: text
    content: Le peuple d’Israël ╵s’est choisi d’autres dieux,
  - type: text
    content: et aussitôt, la guerre ╵venait jusqu’à ses portes.
  - type: text
    content: Ils sont quarante mille ╵soldats en Israël,
  - type: text
    content: mais pas un bouclier, ╵pas une seule lance !
  '9':
  - type: text
    content: Mon cœur bat pour les chefs ╵en Israël,
  - type: text
    content: ceux qui se sont offerts ╵au sein du peuple ╵pour le combat.
  - type: text
    content: Bénissez l’Eternel !
