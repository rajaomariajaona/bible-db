document_id: JDG.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le cantique de Débora
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En ce même jour, Débora chanta ce cantique avec Baraq, fils d’Abinoam :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Vous tous qui chevauchez ╵sur des ânesses blanches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui êtes assis ╵sur des tapis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et vous qui parcourez ╵les chemins : pensez-y !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ecoutez comme ils chantent, ╵ceux qui font le partage ╵de l’eau près des fontaines :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils chantent comment l’Eternel ╵a fait justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, comment il a fait justice ╵par son gouvernement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' ╵sur Israël,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son peuple est descendu ╵aux portes de la ville.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Debout ! Eveille-toi, ╵Débora, interviens !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Debout, éveille-toi, ╵entonne un chant de guerre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, Baraq, lève-toi, ╵ramène tes captifs, ╵ô fils d’Abinoam !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici qu’un faible reste ╵a triomphé des grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, le peuple de l’Eternel ╵a maîtrisé pour moi les braves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est venu auprès de moi parmi les braves.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ceux qui ont vaincu Amalec ╵sont sortis d’Ephraïm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Benjamin t’a suivi, ╵il est parmi tes troupes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Makir sont venus ╵ceux qui ont commandé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de Zabulon ceux qui tiennent ╵le bâton de commandement.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les princes d’Issacar ╵ont rejoint Débora,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute sa tribu, ╵sur les pas de Baraq,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’est précipitée dans la plaine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les rangs de Ruben, ╵on a délibéré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et discuté sans fin.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Pourquoi es-tu resté ╵au milieu des enclos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutant bêler les troupeaux ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les rangs de Ruben, ╵on a délibéré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et discuté sans fin !
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Galaad est resté ╵au-delà du Jourdain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Dan n’a pas bougé ╵d’auprès de ses vaisseaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le port de Jaffa lui appartenait.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aser est demeuré ╵près du bord de la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s’est cantonné ╵auprès des ports paisibles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Zabulon est un peuple ╵qui a bravé la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Nephtali aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les hauteurs, dans la campagne.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Des rois ennemis vinrent ╵et ils nous combattirent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, ils nous combattirent, ╵les rois de Canaan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à Taanak, tout près ╵des eaux de Meguiddo ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n’ont emporté ╵ni argent ni butin.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Bénissez l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici qu’en Israël ╵on a laissé flotter ╵les chevelures
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Geste qui montre la détermination à aller au combat.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le peuple s’est offert ╵pour le combat.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dans le ciel, même les étoiles ╵ont pris part au combat ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du haut de leurs orbites, ╵elles combattaient Sisera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le torrent de Qishôn ╵les a tous balayés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le torrent de Qishôn, ╵celui des temps anciens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marchons avec hardiesse !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Comme ils ont résonné, ╵les sabots des chevaux ╵qui martelaient le sol !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au galop ! au galop ! ╵Fuyez, puissants coursiers !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L’ange de l’Eternel ╵dit : Maudissez Méroz'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Une ville de Nephtali qui n’a pas participé au combat.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'maudissez, maudissez ╵ses habitants :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne sont pas venus ╵prêter main-forte à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêter main-forte à l’Eternel ╵au milieu de ses braves.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Que Yaël soit bénie ╵entre toutes les femmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yaël la femme ╵de Héber le Qénien !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, qu’elle soit bénie ╵entre toutes les femmes ╵qui vivent sous la tente.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Sisera demanda de l’eau, ╵elle a donné du lait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la coupe d’honneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coupe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est celle dans laquelle on offre le vin d’honneur lors des fêtes.
      marker-yv: yv-n
    - type: text
      text: ', ╵elle a offert du lait caillé.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Et puis elle a saisi ╵un piquet dans sa main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et a pris de sa droite ╵le marteau d’ouvrier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour frapper Sisera, ╵pour lui percer la tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle lui a brisé ╵et transpercé la tempe.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: A ses pieds, il s’affaisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’écroule, il succombe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ses pieds, il s’affaisse, ╵oui, il s’écroule.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à l’endroit ╵où il s’est écroulé ╵il gît inanimé !
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Par la fenêtre, ╵sa mère guette au loin ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à travers le grillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elle exhale sa plainte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourquoi, pourquoi son char ╵tarde-t-il à paraître ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi n’entend-on pas ╵le fracas de ses chars ?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Sans cesse, elle répète
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ce qu’ont dit les plus sages ╵des dames de sa suite :'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ecoutez-moi, ô rois ! ╵Prêtez l’oreille, ô princes !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux chanter pour l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux jouer de la musique ╵en l’honneur du Dieu d’Israël.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '« Sans doute ont-ils trouvé ╵un butin abondant ╵et ils se le partagent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une fille ou deux filles ╵pour chaque combattant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sisera, lui, reçoit ╵des habits de couleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des habits de couleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deux vêtements brodés ╵d’étoffe de couleur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le cou du vainqueur ! »
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: O Eternel, ╵que tous tes ennemis ╵périssent de la sorte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous ceux qui t’aiment ╵soient comme le soleil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand, tout éclatant, il se lève !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, le pays fut en paix pendant quarante ans.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: O Eternel, ╵lorsque tu sortis de Séir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque tu t’avanças ╵depuis les champs d’Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'la terre se mit à trembler ╵et le ciel se fondit en eau :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les nuées déversèrent ╵une pluie abondante.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Devant toi, Eternel, ╵les montagnes ont vacillé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se sont affaissées.
      marker-yv: yv-n
    - type: text
      text: ', ╵devant le Dieu du Sinaï,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, devant l’Eternel, ╵Dieu d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 68.8-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Au temps de Shamgar, fils d’Anath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au temps de Yaël, ╵les routes étaient désertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les voyageurs suivaient ╵des sentiers détournés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les villes d’Israël ╵étaient abandonnées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vie avait cessé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, moi, Débora, ╵je suis intervenue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis intervenue ╵comme une mère ╵pour Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le peuple d’Israël ╵s’est choisi d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aussitôt, la guerre ╵venait jusqu’à ses portes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont quarante mille ╵soldats en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais pas un bouclier, ╵pas une seule lance !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mon cœur bat pour les chefs ╵en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui se sont offerts ╵au sein du peuple ╵pour le combat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bénissez l’Eternel !
