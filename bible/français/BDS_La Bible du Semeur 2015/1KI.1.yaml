document_id: 1KI.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Salomon
  - type: heading
    content: Adoniya, prétendant au trône
  - type: text
    content: Le roi David était très âgé
  - type: note
    content: Selon 2 S 5.4-5, David devait avoir dans les 70 ans (voir 2.11).
  - type: text
    content: ', on avait beau l’envelopper de couvertures, il n’arrivait plus à se réchauffer. '
  '10':
  - type: text
    content: Mais il n’invita pas le prophète Nathan, Benaya, les gardes personnels du roi, ni son demi-frère Salomon.
  - type: heading
    content: L’intervention de Nathan et de Bath-Shéba auprès de David
  '11':
  - type: text
    content: Alors Nathan alla trouver Bath-Shéba, la mère de Salomon
  - type: note
    content: Voir 2 S 12.24.
  - type: text
    content: ', et lui dit : As-tu entendu qu’Adoniya, fils de Haggith, est en train de se faire proclamer roi sans que notre seigneur David le sache ? '
  '12':
  - type: text
    content: 'Eh bien ! Ecoute : laisse-moi te donner un conseil qui pourra te sauver la vie ainsi qu’à ton fils Salomon. '
  '13':
  - type: text
    content: 'Va immédiatement trouver le roi David et demande-lui : « O roi, mon seigneur, ne m’as-tu pas promis avec serment que mon fils Salomon régnerait après toi et que c’est lui qui siégerait sur ton trône ? Alors pourquoi donc Adoniya est-il devenu roi ? » '
  '14':
  - type: text
    content: 'Puis Nathan ajouta : Pendant que tu parleras ainsi avec le roi, j’entrerai à mon tour et je compléterai ce que tu auras dit.'
  '15':
  - type: text
    content: 'Bath-Shéba se rendit dans la chambre du roi qui était très vieux et recevait les soins d’Abishag, la Sunamite. '
  '16':
  - type: text
    content: 'Elle s’inclina jusqu’à terre et s’agenouilla devant le roi. Celui-ci lui demanda : Que désires-tu ?'
  '17':
  - type: text
    content: 'Elle lui répondit : Mon seigneur, tu as promis à ta servante par un serment au nom de l’Eternel, ton Dieu, que ton fils Salomon régnerait après toi et qu’il siégerait sur ton trône. '
  '18':
  - type: text
    content: 'Voici maintenant qu’Adoniya s’est fait roi à l’insu de mon seigneur le roi. '
  '19':
  - type: text
    content: 'Il a offert en sacrifice beaucoup de bœufs, de veaux engraissés et de moutons, il a invité tous les fils du roi, le prêtre Abiatar et Joab, le chef de l’armée, mais il n’a pas invité ton serviteur Salomon. '
  '2':
  - type: text
    content: 'Ses familiers lui proposèrent de lui rechercher une jeune fille vierge qui soit à son service et le soigne : Elle dormira dans tes bras, lui dirent-ils, ainsi mon seigneur le roi se réchauffera.'
  '20':
  - type: text
    content: 'Pourtant, c’est vers le roi mon seigneur que tout Israël regarde pour que tu déclares à ton peuple qui succédera à mon seigneur le roi sur le trône. '
  '21':
  - type: text
    content: Sinon, lorsque le roi mon seigneur aura rejoint ses ancêtres décédés, moi et mon fils Salomon nous serons traités comme des criminels.
  '22':
  - type: text
    content: 'Pendant qu’elle parlait encore avec le roi, le prophète Nathan arriva. '
  '23':
  - type: text
    content: 'On vint l’annoncer au roi en disant : Voici le prophète Nathan !'
  - type: text
    content: 'Il entra en présence du roi et se prosterna devant lui, le visage contre terre. '
  '24':
  - type: text
    content: 'Puis il dit : O roi mon seigneur, est-ce toi qui as décidé qu’Adoniya régnerait après toi et qu’il siégerait sur ton trône ? '
  '25':
  - type: text
    content: 'En effet, il est allé aujourd’hui offrir des sacrifices de bœufs, de veaux gras et de moutons en grand nombre, il a invité tous les fils du roi, les chefs de l’armée et le prêtre Abiatar. Ils sont en train de manger et de boire avec lui en criant : « Vive le roi Adoniya ! » '
  '26':
  - type: text
    content: 'Mais il ne m’a pas invité, moi qui suis ton serviteur, pas plus que le prêtre Tsadoq, ni Benaya, fils de Yehoyada, ni ton serviteur Salomon. '
  '27':
  - type: text
    content: Est-il possible qu’une telle chose se fasse par ordre de mon seigneur le roi sans que tu aies fait connaître à ton serviteur quel est celui qui succédera à mon seigneur le roi sur le trône ?
  - type: heading
    content: David désigne son successeur
  - type: heading
    content: (1 Ch 29.21-25)
  '28':
  - type: text
    content: 'Le roi David répondit : Rappelez-moi Bath-Shéba !'
  - type: text
    content: 'Elle entra dans la présence du roi et se tint devant lui. '
  '29':
  - type: text
    content: 'Alors le roi lui déclara par serment : Aussi vrai que l’Eternel qui m’a délivré de toutes les détresses est vivant, '
  '3':
  - type: text
    content: On chercha dans tout le territoire d’Israël une belle jeune fille et l’on trouva Abishag, la Sunamite
  - type: note
    content: De Sunem (2 R 4.8 ; Jos 19.18 ; 1 S 28.4) en Galilée, à 80 kilomètres au nord de Jérusalem, près de la plaine de Jizréel.
  - type: text
    content: ', que l’on fit venir auprès du roi. '
  '30':
  - type: text
    content: je te promets de réaliser aujourd’hui même la promesse que je t’ai faite avec serment au nom de l’Eternel, du Dieu d’Israël, lorsque je t’ai dit que ton fils Salomon régnerait après moi et qu’il siégerait sur mon trône à ma place.
  '31':
  - type: text
    content: 'Bath-Shéba s’inclina le visage contre terre, se prosterna aux pieds du roi et dit : Que mon seigneur le roi David vive à jamais !'
  '32':
  - type: text
    content: 'Puis le roi David ordonna : Appelez-moi le prêtre Tsadoq, le prophète Nathan et Benaya, fils de Yehoyada.'
  - type: text
    content: 'Ils entrèrent en présence du roi. '
  '33':
  - type: text
    content: 'Alors le roi ordonna : Rassemblez tous mes serviteurs'
  - type: note
    content: C’est-à-dire la garde royale.
  - type: text
    content: '. Faites monter mon fils Salomon sur ma propre mule et conduisez-le à la source de Guihôn ! '
  '34':
  - type: text
    content: 'Là, le prêtre Tsadoq et le prophète Nathan lui conféreront l’onction pour l’établir roi sur Israël. Vous sonnerez du cor et vous crierez : « Vive le roi Salomon ! » '
  '35':
  - type: text
    content: Vous remonterez de la source derrière lui, il viendra siéger sur mon trône et régnera à ma place, car c’est lui que j’ai choisi pour être le conducteur d’Israël et de Juda.
  '36':
  - type: text
    content: 'Benaya, fils de Yehoyada, répondit au roi : Qu’il en soit ainsi ! Que l’Eternel, le Dieu de mon seigneur le roi, confirme les paroles que tu as prononcées, '
  '37':
  - type: text
    content: et, comme il a été avec mon seigneur le roi, qu’il soit avec Salomon ! Qu’il rende son règne encore plus glorieux que ne l’a été celui de mon seigneur le roi David !
  '38':
  - type: text
    content: Alors le prêtre Tsadoq descendit à la source de Guihôn avec le prophète Nathan, avec Benaya, fils de Yehoyada, et avec les Kérétiens et les Pélétiens
  - type: note
    content: C’est-à-dire la garde personnelle de David formée d’étrangers originaires de Crète et peut-être de Philistie (voir 2 S 8.18 et note).
  - type: text
    content: ' de la garde royale, accompagnant Salomon qu’ils avaient fait monter sur la mule du roi David. '
  '39':
  - type: text
    content: Le prêtre Tsadoq prit la fiole d’huile
  - type: note
    content: L’huile consacrée est sans doute celle dont il est question en Ex 30.22-33.
  - type: text
    content: ' dans la tente'
  - type: note
    content: Il s’agit de la tente que David a fait dresser à Jérusalem pour abriter le coffre de l’alliance, la tente de la Rencontre, construite au désert, étant restée à Gabaon (voir 3.4 ; 2 S 6.17 ; 2 Ch 1.3).
  - type: text
    content: ' du coffre de l’alliance et conféra l’onction à Salomon. On sonna du cor et tout le peuple s’écria : Vive le roi Salomon !'
  '4':
  - type: text
    content: Cette jeune fille était vraiment très belle. Elle prit soin du roi et se mit à son service. Mais le roi n’eut pas de relations conjugales avec elle.
  '40':
  - type: text
    content: Une foule immense remonta derrière lui, les gens jouaient de la flûte et exultaient de joie, au point que la terre tremblait au bruit de leurs acclamations.
  - type: heading
    content: Adoniya se soumet
  '41':
  - type: text
    content: Adoniya et ses convives entendirent tout ce bruit
  - type: note
    content: Bien que les deux partis n’aient pas pu se voir, la distance entre la source de Guihôn et Eyn-Roguel (v. 9) n’était pas très grande.
  - type: text
    content: ' au moment où ils achevaient leur festin. Et lorsque Joab entendit le son du cor, il demanda : Que signifie ce vacarme dans la ville ?'
  '42':
  - type: text
    content: 'Il n’avait pas fini de parler que Jonathan, fils du prêtre Abiatar, survint. Adoniya lui dit : Viens, car tu es un homme de valeur et tu viens certainement apporter de bonnes nouvelles.'
  '43':
  - type: text
    content: 'Jonathan répondit à Adoniya : Au contraire, notre seigneur le roi David a établi Salomon comme roi. '
  '44':
  - type: text
    content: 'Il a envoyé avec lui le prêtre Tsadoq, le prophète Nathan, Benaya, fils de Yehoyada, ainsi que les Kérétiens et les Pélétiens de la garde royale pour qu’ils le fassent monter sur la mule royale '
  '45':
  - type: text
    content: 'et que le prêtre Tsadoq et le prophète Nathan lui confèrent l’onction royale à la source de Guihôn. De là, tout le monde est remonté en poussant des cris de joie et l’excitation s’est répandue dans toute la ville ; c’est là le bruit que vous avez entendu. '
  '46':
  - type: text
    content: 'Salomon s’est même assis sur le trône royal, '
  '47':
  - type: text
    content: 'et les ministres du roi sont venus bénir notre seigneur le roi David en disant : « Que ton Dieu rende le nom de Salomon encore plus célèbre que le tien, et son règne encore plus glorieux ! » Alors le roi s’est prosterné sur sa couche '
  '48':
  - type: text
    content: 'et il a déclaré : « Béni soit l’Eternel, le Dieu d’Israël qui m’a donné l’un de mes fils comme successeur sur mon trône et m’a permis de le voir aujourd’hui de mes yeux ! »'
  '49':
  - type: text
    content: 'A ces mots, tous les invités d’Adoniya furent pris de panique, ils se levèrent et partirent chacun de son côté. '
  '5':
  - type: text
    content: A cette époque, Adoniya
  - type: note
    content: Quatrième fils de David (2 S 3.4) qui avait environ 35 ans. Sans doute, le fils survivant le plus âgé ; Amnôn et Absalom étaient morts, il n’est plus jamais parlé de Kiléab qui dut mourir jeune.
  - type: text
    content: ', fils de David et de Haggith, exprimait son ambition en prétendant : C’est moi qui régnerai.'
  - type: text
    content: Il se procura un char, des chevaux
  - type: note
    content: 'Autre traduction : des hommes d’équipage de chars.'
  - type: text
    content: ' et cinquante hommes qui couraient devant son char. '
  '50':
  - type: text
    content: Adoniya lui-même eut tellement peur de Salomon qu’il alla saisir les cornes de l’autel à la tente du coffre de l’alliance.
  '51':
  - type: text
    content: 'On vint dire à Salomon : Voici que, par peur du roi Salomon, Adoniya est allé saisir les cornes de l’autel en disant : « Que le roi Salomon me promette aujourd’hui sous serment qu’il ne me fera pas mettre à mort par l’épée. »'
  '52':
  - type: text
    content: 'Salomon répondit : S’il se conduit en homme loyal, pas un seul de ses cheveux ne tombera à terre ; mais s’il agit de manière coupable, il mourra.'
  '53':
  - type: text
    content: 'Puis le roi Salomon envoya des gens pour le faire descendre de l’autel. Adoniya vint se prosterner devant le roi Salomon qui lui dit : Tu peux rentrer chez toi !'
  '6':
  - type: text
    content: 'Jamais, sa vie durant, son père ne l’avait réprimandé ou ne lui avait dit : Pourquoi fais-tu cela ?'
  - type: text
    content: 'En outre, Adoniya était un très beau jeune homme et il était né après Absalom. '
  '7':
  - type: text
    content: Il entra en pourparlers avec le général Joab, fils de Tserouya
  - type: note
    content: Voir 1 S 26.6 ; 2 S 2.13 ; 19.13 ; 20.10, 23. Tserouya était une sœur de David.
  - type: text
    content: ', et avec le prêtre Abiatar'
  - type: note
    content: Le grand-prêtre, fils d’Ahimélek (1 S 22.20 ; 2 S 8.17 et note).
  - type: text
    content: ', et ceux-ci se rallièrent à son parti. '
  '8':
  - type: text
    content: Par contre, ni le prêtre Tsadoq, ni Benaya fils de Yehoyada
  - type: note
    content: Voir 1 Ch 27.5.
  - type: text
    content: ', ni le prophète Nathan, ni Shimeï'
  - type: note
    content: A ne pas confondre avec le Shimeï de 2.8, 46 et de 2 S 16.5-8. Peut-être est-ce Shimeï, fils d’Ela (4.18).
  - type: text
    content: ', ni Réï, ni les soldats de la garde personnelle de David ne prirent son parti.'
  '9':
  - type: text
    content: 'Un jour, Adoniya offrit des sacrifices de moutons, de bœufs et de veaux engraissés près de la Pierre-qui-glisse, à côté de Eyn-Roguel. Il y invita tous ses frères, fils du roi, et tous les hommes importants de Juda qui étaient au service du roi. '
