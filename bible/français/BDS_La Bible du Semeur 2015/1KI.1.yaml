document_id: 1KI.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le règne de Salomon
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adoniya, prétendant au trône
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le roi David était très âgé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5.4-5
        metadata:
          usfm: 2SA.5.4+2SA.5.5
      - type: text
        text: ', David devait avoir dans les 70 ans (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.11'
        metadata:
          usfm: 1KI.2.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', on avait beau l’envelopper de couvertures, il n’arrivait plus à se réchauffer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ses familiers lui proposèrent de lui rechercher une jeune fille vierge qui soit à son service et le soigne : Elle dormira dans tes bras, lui dirent-ils, ainsi mon seigneur le roi se réchauffera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On chercha dans tout le territoire d’Israël une belle jeune fille et l’on trouva Abishag, la Sunamite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De Sunem (2 R 4.8 ; Jos 19.18 ; 1 S 28.4) en Galilée, à 80 kilomètres au nord de Jérusalem, près de la plaine de Jizréel.
    marker-yv: yv-n
  - type: text
    text: ', que l’on fit venir auprès du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cette jeune fille était vraiment très belle. Elle prit soin du roi et se mit à son service. Mais le roi n’eut pas de relations conjugales avec elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A cette époque, Adoniya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Quatrième fils de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 3.4
        metadata:
          usfm: 2SA.3.4
      - type: text
        text: ) qui avait environ 35 ans. Sans doute, le fils survivant le plus âgé ; Amnôn et Absalom étaient morts, il n’est plus jamais parlé de Kiléab qui dut mourir jeune.
    marker-yv: yv-n
  - type: text
    text: ', fils de David et de Haggith, exprimait son ambition en prétendant : C’est moi qui régnerai.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il se procura un char, des chevaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des hommes d’équipage de chars.
    marker-yv: yv-n
  - type: text
    text: ' et cinquante hommes qui couraient devant son char. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jamais, sa vie durant, son père ne l’avait réprimandé ou ne lui avait dit : Pourquoi fais-tu cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En outre, Adoniya était un très beau jeune homme et il était né après Absalom. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il entra en pourparlers avec le général Joab, fils de Tserouya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 1 S 26.6 ; 2 S 2.13 ; 19.13 ; 20.10, 23. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tserouya '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était une sœur de David.
    marker-yv: yv-n
  - type: text
    text: ', et avec le prêtre Abiatar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le grand-prêtre, fils d’Ahimélek (1 S 22.20 ; 2 S 8.17 et note).
    marker-yv: yv-n
  - type: text
    text: ', et ceux-ci se rallièrent à son parti. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Par contre, ni le prêtre Tsadoq, ni Benaya fils de Yehoyada
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 27.5
        metadata:
          usfm: 1CH.27.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ni le prophète Nathan, ni Shimeï'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A ne pas confondre avec le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shimeï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.8'
        metadata:
          usfm: 1KI.2.8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '46'
        metadata:
          usfm: 1KI.2.46
      - type: text
        text: ' et de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16.5-8
        metadata:
          usfm: 2SA.16.5+2SA.16.6+2SA.16.7+2SA.16.8
      - type: text
        text: . Peut-être est-ce Shimeï, fils d’Ela (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.18'
        metadata:
          usfm: 1KI.4.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ni Réï, ni les soldats de la garde personnelle de David ne prirent son parti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un jour, Adoniya offrit des sacrifices de moutons, de bœufs et de veaux engraissés près de la Pierre-qui-glisse, à côté de Eyn-Roguel. Il y invita tous ses frères, fils du roi, et tous les hommes importants de Juda qui étaient au service du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais il n’invita pas le prophète Nathan, Benaya, les gardes personnels du roi, ni son demi-frère Salomon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’intervention de Nathan et de Bath-Shéba auprès de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors Nathan alla trouver Bath-Shéba, la mère de Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 12.24
        metadata:
          usfm: 2SA.12.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et lui dit : As-tu entendu qu’Adoniya, fils de Haggith, est en train de se faire proclamer roi sans que notre seigneur David le sache ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eh bien ! Ecoute : laisse-moi te donner un conseil qui pourra te sauver la vie ainsi qu’à ton fils Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Va immédiatement trouver le roi David et demande-lui : « O roi, mon seigneur, ne m’as-tu pas promis avec serment que mon fils Salomon régnerait après toi et que c’est lui qui siégerait sur ton trône ? Alors pourquoi donc Adoniya est-il devenu roi ? » '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis Nathan ajouta : Pendant que tu parleras ainsi avec le roi, j’entrerai à mon tour et je compléterai ce que tu auras dit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bath-Shéba se rendit dans la chambre du roi qui était très vieux et recevait les soins d’Abishag, la Sunamite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elle s’inclina jusqu’à terre et s’agenouilla devant le roi. Celui-ci lui demanda : Que désires-tu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle lui répondit : Mon seigneur, tu as promis à ta servante par un serment au nom de l’Eternel, ton Dieu, que ton fils Salomon régnerait après toi et qu’il siégerait sur ton trône. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici maintenant qu’Adoniya s’est fait roi à l’insu de mon seigneur le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il a offert en sacrifice beaucoup de bœufs, de veaux engraissés et de moutons, il a invité tous les fils du roi, le prêtre Abiatar et Joab, le chef de l’armée, mais il n’a pas invité ton serviteur Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pourtant, c’est vers le roi mon seigneur que tout Israël regarde pour que tu déclares à ton peuple qui succédera à mon seigneur le roi sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Sinon, lorsque le roi mon seigneur aura rejoint ses ancêtres décédés, moi et mon fils Salomon nous serons traités comme des criminels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pendant qu’elle parlait encore avec le roi, le prophète Nathan arriva. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On vint l’annoncer au roi en disant : Voici le prophète Nathan !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il entra en présence du roi et se prosterna devant lui, le visage contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis il dit : O roi mon seigneur, est-ce toi qui as décidé qu’Adoniya régnerait après toi et qu’il siégerait sur ton trône ? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, il est allé aujourd’hui offrir des sacrifices de bœufs, de veaux gras et de moutons en grand nombre, il a invité tous les fils du roi, les chefs de l’armée et le prêtre Abiatar. Ils sont en train de manger et de boire avec lui en criant : « Vive le roi Adoniya ! » '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais il ne m’a pas invité, moi qui suis ton serviteur, pas plus que le prêtre Tsadoq, ni Benaya, fils de Yehoyada, ni ton serviteur Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Est-il possible qu’une telle chose se fasse par ordre de mon seigneur le roi sans que tu aies fait connaître à ton serviteur quel est celui qui succédera à mon seigneur le roi sur le trône ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: David désigne son successeur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 29.21-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le roi David répondit : Rappelez-moi Bath-Shéba !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle entra dans la présence du roi et se tint devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors le roi lui déclara par serment : Aussi vrai que l’Eternel qui m’a délivré de toutes les détresses est vivant, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: je te promets de réaliser aujourd’hui même la promesse que je t’ai faite avec serment au nom de l’Eternel, du Dieu d’Israël, lorsque je t’ai dit que ton fils Salomon régnerait après moi et qu’il siégerait sur mon trône à ma place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Bath-Shéba s’inclina le visage contre terre, se prosterna aux pieds du roi et dit : Que mon seigneur le roi David vive à jamais !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Puis le roi David ordonna : Appelez-moi le prêtre Tsadoq, le prophète Nathan et Benaya, fils de Yehoyada.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils entrèrent en présence du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors le roi ordonna : Rassemblez tous mes serviteurs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire la garde royale.
    marker-yv: yv-n
  - type: text
    text: '. Faites monter mon fils Salomon sur ma propre mule et conduisez-le à la source de Guihôn ! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Là, le prêtre Tsadoq et le prophète Nathan lui conféreront l’onction pour l’établir roi sur Israël. Vous sonnerez du cor et vous crierez : « Vive le roi Salomon ! » '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Vous remonterez de la source derrière lui, il viendra siéger sur mon trône et régnera à ma place, car c’est lui que j’ai choisi pour être le conducteur d’Israël et de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Benaya, fils de Yehoyada, répondit au roi : Qu’il en soit ainsi ! Que l’Eternel, le Dieu de mon seigneur le roi, confirme les paroles que tu as prononcées, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: et, comme il a été avec mon seigneur le roi, qu’il soit avec Salomon ! Qu’il rende son règne encore plus glorieux que ne l’a été celui de mon seigneur le roi David !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Alors le prêtre Tsadoq descendit à la source de Guihôn avec le prophète Nathan, avec Benaya, fils de Yehoyada, et avec les Kérétiens et les Pélétiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire la garde personnelle de David formée d’étrangers originaires de Crète et peut-être de Philistie (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8.18
        metadata:
          usfm: 2SA.8.18
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' de la garde royale, accompagnant Salomon qu’ils avaient fait monter sur la mule du roi David. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Le prêtre Tsadoq prit la fiole d’huile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'huile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'consacrée est sans doute celle dont il est question en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30.22-33
        metadata:
          usfm: EXO.30.22+EXO.30.23+EXO.30.24+EXO.30.25+EXO.30.26+EXO.30.27+EXO.30.28+EXO.30.29+EXO.30.30+EXO.30.31+EXO.30.32+EXO.30.33
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dans la tente'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tente '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que David a fait dresser à Jérusalem pour abriter le coffre de l’alliance, la tente de la Rencontre, construite au désert, étant restée à Gabaon (voir 3.4 ; 2 S 6.17 ; 2 Ch 1.3).
    marker-yv: yv-n
  - type: text
    text: ' du coffre de l’alliance et conféra l’onction à Salomon. On sonna du cor et tout le peuple s’écria : Vive le roi Salomon !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Une foule immense remonta derrière lui, les gens jouaient de la flûte et exultaient de joie, au point que la terre tremblait au bruit de leurs acclamations.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adoniya se soumet
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Adoniya et ses convives entendirent tout ce bruit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bien que les deux partis n’aient pas pu se voir, la distance entre la source de Guihôn et Eyn-Roguel (v. 9) n’était pas très grande.
    marker-yv: yv-n
  - type: text
    text: ' au moment où ils achevaient leur festin. Et lorsque Joab entendit le son du cor, il demanda : Que signifie ce vacarme dans la ville ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il n’avait pas fini de parler que Jonathan, fils du prêtre Abiatar, survint. Adoniya lui dit : Viens, car tu es un homme de valeur et tu viens certainement apporter de bonnes nouvelles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jonathan répondit à Adoniya : Au contraire, notre seigneur le roi David a établi Salomon comme roi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il a envoyé avec lui le prêtre Tsadoq, le prophète Nathan, Benaya, fils de Yehoyada, ainsi que les Kérétiens et les Pélétiens de la garde royale pour qu’ils le fassent monter sur la mule royale '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'et que le prêtre Tsadoq et le prophète Nathan lui confèrent l’onction royale à la source de Guihôn. De là, tout le monde est remonté en poussant des cris de joie et l’excitation s’est répandue dans toute la ville ; c’est là le bruit que vous avez entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Salomon s’est même assis sur le trône royal, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'et les ministres du roi sont venus bénir notre seigneur le roi David en disant : « Que ton Dieu rende le nom de Salomon encore plus célèbre que le tien, et son règne encore plus glorieux ! » Alors le roi s’est prosterné sur sa couche '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'et il a déclaré : « Béni soit l’Eternel, le Dieu d’Israël qui m’a donné l’un de mes fils comme successeur sur mon trône et m’a permis de le voir aujourd’hui de mes yeux ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'A ces mots, tous les invités d’Adoniya furent pris de panique, ils se levèrent et partirent chacun de son côté. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Adoniya lui-même eut tellement peur de Salomon qu’il alla saisir les cornes de l’autel à la tente du coffre de l’alliance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'On vint dire à Salomon : Voici que, par peur du roi Salomon, Adoniya est allé saisir les cornes de l’autel en disant : « Que le roi Salomon me promette aujourd’hui sous serment qu’il ne me fera pas mettre à mort par l’épée. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Salomon répondit : S’il se conduit en homme loyal, pas un seul de ses cheveux ne tombera à terre ; mais s’il agit de manière coupable, il mourra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Puis le roi Salomon envoya des gens pour le faire descendre de l’autel. Adoniya vint se prosterner devant le roi Salomon qui lui dit : Tu peux rentrer chez toi !'
