document_id: TIT.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandations à diverses catégories de fidèles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toi, au contraire, parle selon ce qui est conforme à l’enseignement sain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: et se gardent de toute fraude ; qu’ils se montrent au contraire dignes d’une entière confiance. Ainsi ils rendront attrayant l’enseignement de Dieu notre Sauveur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La grâce, source du salut
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'En effet, la grâce de Dieu s’est révélée comme une source de salut pour tous les hommes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Elle nous éduque et nous amène à nous détourner de tout mépris de Dieu et à rejeter les passions des gens de ce monde. Ainsi nous pourrons mener, dans le temps présent, une vie équilibrée, juste et empreinte de piété, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'en attendant que se réalise notre bienheureuse espérance : la révélation de la gloire de Jésus-Christ, notre grand Dieu et Sauveur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il s’est livré lui-même pour nous, afin de nous délivrer de toute désobéissance et de faire de nous, en nous purifiant ainsi, un peuple qui lui appartienne et qui mette toute son ardeur à accomplir des œuvres bonnes.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voilà ce que tu dois enseigner, dans quel sens il te faut encourager et reprendre les gens. Fais-le avec une pleine autorité. Que personne ne te traite avec mépris.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dis aux hommes âgés de faire preuve de modération, d’être respectables, réfléchis, et d’exercer une saine pratique de la foi, de l’amour et de la persévérance.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Qu’il en soit de même des femmes âgées : qu’elles aient un comportement digne de Dieu ; qu’elles ne soient pas médisantes ni adonnées à la boisson. Qu’elles s’attachent plutôt à enseigner le bien'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’elles soient de bonnes enseignantes.
      marker-yv: yv-n
    - type: text
      text: '  : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'qu’elles apprennent aux jeunes femmes à aimer leur mari et leurs enfants, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: à agir de manière réfléchie et pure, à assumer leurs tâches domestiques, à faire preuve de bonté et à être soumises à leur mari. Ainsi la Parole de Dieu ne sera pas discréditée.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Recommande aussi aux jeunes gens d’agir de manière réfléchie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sois toi-même en tout un modèle d’œuvres bonnes. Que ton enseignement soit fidèle et qu’il inspire le respect. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que ta prédication soit saine et inattaquable, afin que même nos adversaires soient couverts de honte, ne trouvant aucun mal à dire de nous.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aux esclaves, tu recommanderas d’être soumis à leurs maîtres en toutes choses. Qu’ils cherchent à leur donner satisfaction, qu’ils évitent de les contredire '
