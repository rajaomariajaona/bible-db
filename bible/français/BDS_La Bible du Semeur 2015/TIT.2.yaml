document_id: TIT.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Recommandations à diverses catégories de fidèles
  - type: text
    content: 'Toi, au contraire, parle selon ce qui est conforme à l’enseignement sain. '
  '10':
  - type: text
    content: et se gardent de toute fraude ; qu’ils se montrent au contraire dignes d’une entière confiance. Ainsi ils rendront attrayant l’enseignement de Dieu notre Sauveur.
  - type: heading
    content: La grâce, source du salut
  '11':
  - type: text
    content: 'En effet, la grâce de Dieu s’est révélée comme une source de salut pour tous les hommes. '
  '12':
  - type: text
    content: 'Elle nous éduque et nous amène à nous détourner de tout mépris de Dieu et à rejeter les passions des gens de ce monde. Ainsi nous pourrons mener, dans le temps présent, une vie équilibrée, juste et empreinte de piété, '
  '13':
  - type: text
    content: 'en attendant que se réalise notre bienheureuse espérance : la révélation de la gloire de Jésus-Christ, notre grand Dieu et Sauveur. '
  '14':
  - type: text
    content: Il s’est livré lui-même pour nous, afin de nous délivrer de toute désobéissance et de faire de nous, en nous purifiant ainsi, un peuple qui lui appartienne et qui mette toute son ardeur à accomplir des œuvres bonnes.
  '15':
  - type: text
    content: Voilà ce que tu dois enseigner, dans quel sens il te faut encourager et reprendre les gens. Fais-le avec une pleine autorité. Que personne ne te traite avec mépris.
  '2':
  - type: text
    content: Dis aux hommes âgés de faire preuve de modération, d’être respectables, réfléchis, et d’exercer une saine pratique de la foi, de l’amour et de la persévérance.
  '3':
  - type: text
    content: 'Qu’il en soit de même des femmes âgées : qu’elles aient un comportement digne de Dieu ; qu’elles ne soient pas médisantes ni adonnées à la boisson. Qu’elles s’attachent plutôt à enseigner le bien'
  - type: note
    content: 'Autre traduction : qu’elles soient de bonnes enseignantes.'
  - type: text
    content: '  : '
  '4':
  - type: text
    content: 'qu’elles apprennent aux jeunes femmes à aimer leur mari et leurs enfants, '
  '5':
  - type: text
    content: à agir de manière réfléchie et pure, à assumer leurs tâches domestiques, à faire preuve de bonté et à être soumises à leur mari. Ainsi la Parole de Dieu ne sera pas discréditée.
  '6':
  - type: text
    content: 'Recommande aussi aux jeunes gens d’agir de manière réfléchie. '
  '7':
  - type: text
    content: 'Sois toi-même en tout un modèle d’œuvres bonnes. Que ton enseignement soit fidèle et qu’il inspire le respect. '
  '8':
  - type: text
    content: Que ta prédication soit saine et inattaquable, afin que même nos adversaires soient couverts de honte, ne trouvant aucun mal à dire de nous.
  '9':
  - type: text
    content: 'Aux esclaves, tu recommanderas d’être soumis à leurs maîtres en toutes choses. Qu’ils cherchent à leur donner satisfaction, qu’ils évitent de les contredire '
