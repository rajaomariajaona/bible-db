document_id: ISA.60,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’éclat de la Jérusalem future
  - type: heading
    content: Lumière et gloire
  - type: text
    content: Lève-toi, resplendis, ╵car voici ta lumière,
  - type: text
    content: car sur toi s’est levée ╵la gloire du Seigneur.
  '10':
  - type: text
    content: Les étrangers ╵rebâtiront tes murs,
  - type: text
    content: leurs rois te serviront.
  - type: text
    content: Car je t’avais frappée ╵dans mon indignation,
  - type: text
    content: mais maintenant dans ma faveur ╵je te témoigne ma tendresse.
  '11':
  - type: text
    content: Tes portes, jour et nuit, ╵seront toujours ouvertes,
  - type: text
    content: on ne les fermera jamais
  - type: text
    content: pour laisser affluer vers toi
  - type: text
    content: les trésors des nations,
  - type: text
    content: et leurs rois en cortège
  - type: note
    content: Cité en Ap 21.25-26.
  - type: text
    content: .
  '12':
  - type: text
    content: Car la nation ou le royaume
  - type: text
    content: qui ne te seront pas assujettis ╵disparaîtront ;
  - type: text
    content: oui, en effet ces nations-là ╵seront complètement ruinées.
  '13':
  - type: text
    content: Le cyprès, le platane ╵et le genévrier
  - type: text
    content: qui font la gloire du Liban ╵te seront apportés
  - type: text
    content: pour embellir le lieu ╵où est mon sanctuaire,
  - type: text
    content: et je rendrai glorieux ╵le lieu où reposent mes pieds.
  '14':
  - type: text
    content: Les descendants de ceux ╵qui t’humiliaient
  - type: text
    content: viendront se courber devant toi,
  - type: text
    content: et ceux qui t’insultaient
  - type: text
    content: se prosterneront à tes pieds
  - type: note
    content: Réminiscence en Ap 3.9.
  - type: text
    content: .
  - type: text
    content: 'Et l’on t’appellera : ╵« Cité de l’Eternel,'
  - type: text
    content: la Sion du Saint d’Israël ».
  '15':
  - type: text
    content: Tu étais délaissée, haïe,
  - type: text
    content: nul ne passait chez toi.
  - type: text
    content: Mais je ferai de toi ╵un sujet de fierté ╵à tout jamais,
  - type: text
    content: et un sujet de joie ╵pour toutes les générations.
  '16':
  - type: text
    content: Tu téteras le lait au sein
  - type: text
    content: des nations et des rois
  - type: text
    content: et tu sauras que je suis l’Eternel, ╵que c’est moi qui te sauve,
  - type: text
    content: que je suis ton libérateur, ╵le Puissant de Jacob.
  '17':
  - type: text
    content: Au lieu du bronze, ╵j’apporterai de l’or,
  - type: text
    content: et de l’argent ╵au lieu du fer,
  - type: text
    content: du bronze au lieu du bois,
  - type: text
    content: du fer au lieu de pierres.
  - type: text
    content: J’établirai sur toi
  - type: text
    content: la paix comme inspecteur,
  - type: text
    content: et la justice
  - type: text
    content: comme dominateur.
  '18':
  - type: text
    content: Et l’on n’entendra plus ╵parler de violence ╵dans ton pays,
  - type: text
    content: de dévastation et de destruction ╵dans tes frontières,
  - type: text
    content: et tu appelleras ╵tes murailles « Salut »,
  - type: text
    content: et tes portes « Louange ».
  '19':
  - type: text
    content: Ce ne sera plus le soleil ╵qui, désormais, te donnera ╵la lumière du jour ;
  - type: text
    content: la clarté de la lune ╵ne luira plus sur toi la nuit.
  - type: text
    content: Car l’Eternel sera ╵ta lumière à toujours,
  - type: text
    content: oui, ton Dieu sera ta splendeur
  - type: note
    content: Les v. 19-20 sont repris en Ap 21.23.
  - type: text
    content: .
  '2':
  - type: text
    content: Voici que les ténèbres ╵couvrent la terre
  - type: text
    content: et une nuée sombre
  - type: note
    content: 'Autre traduction : un épais brouillard.'
  - type: text
    content: ' ╵couvre les peuples,'
  - type: text
    content: mais, sur toi, l’Eternel ╵se lèvera lui-même ╵comme un soleil
  - type: text
    content: et l’on verra sa gloire ╵apparaître sur toi.
  '20':
  - type: text
    content: Désormais, ton soleil ╵ne se couchera plus
  - type: text
    content: et, jamais plus, ta lune ╵ne se retirera,
  - type: text
    content: car l’Eternel sera ╵ta lumière à toujours,
  - type: text
    content: et les jours de ton deuil ╵auront pris fin pour toi.
  '21':
  - type: text
    content: Ton peuple sera tout entier ╵composé d’hommes justes
  - type: text
    content: et ils posséderont ╵le pays pour toujours.
  - type: text
    content: Ils sont les rejetons ╵que j’ai plantés moi-même,
  - type: text
    content: l’ouvrage de mes mains
  - type: text
    content: pour manifester ma splendeur.
  '22':
  - type: text
    content: Le plus petit d’entre eux ╵deviendra un millier,
  - type: text
    content: le plus insignifiant, ╵une nation puissante.
  - type: text
    content: C’est moi, moi l’Eternel, ╵qui hâterai ╵en leur temps, ces événements.
  '3':
  - type: text
    content: Des peuples marcheront ╵à ta lumière
  - type: note
    content: Cité en Ap 21.24.
  - type: text
    content: ','
  - type: text
    content: et des rois à cette clarté ╵qui s’est levée sur toi.
  '4':
  - type: text
    content: 'Regarde autour de toi et vois :'
  - type: text
    content: ils se rassemblent tous,
  - type: text
    content: ils viennent jusqu’à toi.
  - type: text
    content: Tes fils viennent de loin,
  - type: text
    content: tes filles sont portées ╵comme des enfants sur la hanche.
  '5':
  - type: text
    content: Tu le verras alors, ╵tu brilleras de joie,
  - type: text
    content: ton cœur tressaillira ╵et se dilatera
  - type: text
    content: car, les richesses que transportent ╵les vaisseaux sillonnant la mer ╵seront dirigées vers tes ports.
  - type: text
    content: Les trésors des nations
  - type: note
    content: Cité en Ap 21.24.
  - type: text
    content: ' ╵arriveront chez toi.'
  '6':
  - type: text
    content: Tu seras submergée ╵par le flot des chameaux.
  - type: text
    content: Les dromadaires ╵de Madian et d’Epha
  - type: note
    content: 'Madian: tribu nomade du sud-est du Jourdain, aux nombreux éleveurs de chameaux, dont l’origine remonte à Abraham. Epha: un fils de Madian (Gn 25.1-2, 4).'
  - type: text
    content: ' ╵couvriront ton pays.'
  - type: text
    content: Tous les habitants de Saba
  - type: note
    content: 'Saba: région opulente du sud de l’Arabie.'
  - type: text
    content: ' viendront'
  - type: text
    content: et ils apporteront ╵de l’or et de l’encens,
  - type: text
    content: et ils proclameront ╵les louanges de l’Eternel.
  '7':
  - type: text
    content: Les moutons et les chèvres de Qédar ╵s’assembleront chez toi,
  - type: text
    content: tous les béliers de Nebayoth
  - type: note
    content: 'Qédar désigne le désert Arabique avec ses tribus de Bédouins. Nebayoth: autre tribu arabe (Gn 25.13).'
  - type: text
    content: ' ╵seront à ton service,'
  - type: text
    content: ils monteront sur mon autel ╵en offrande agréée,
  - type: text
    content: et je rendrai splendide ╵le Temple où ma splendeur réside.
  '8':
  - type: text
    content: Qui sont ceux-là qui viennent ╵volant comme un nuage,
  - type: text
    content: ou comme des colombes ╵qui regagnent leur colombier ?
  '9':
  - type: text
    content: Les habitants des îles ╵et des régions côtières ╵mettront leur espérance en moi,
  - type: text
    content: les vaisseaux au long cours
  - type: note
    content: 'Autre traduction : de Tarsis, port situé probablement en Espagne.'
  - type: text
    content: ' ╵viendront les tout premiers'
  - type: text
    content: pour ramener tes fils de loin
  - type: text
    content: avec leur argent et leur or
  - type: text
    content: pour faire honneur ╵à l’Eternel, ton Dieu,
  - type: text
    content: et au Saint d’Israël ╵qui te fait resplendir.
