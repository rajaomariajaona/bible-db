document_id: ISA.60
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’éclat de la Jérusalem future
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Lumière et gloire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lève-toi, resplendis, ╵car voici ta lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car sur toi s’est levée ╵la gloire du Seigneur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici que les ténèbres ╵couvrent la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une nuée sombre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un épais brouillard.
    marker-yv: yv-n
  - type: text
    text: ' ╵couvre les peuples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, sur toi, l’Eternel ╵se lèvera lui-même ╵comme un soleil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on verra sa gloire ╵apparaître sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des peuples marcheront ╵à ta lumière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.24
        metadata:
          usfm: REV.21.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des rois à cette clarté ╵qui s’est levée sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Regarde autour de toi et vois :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se rassemblent tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils viennent jusqu’à toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes fils viennent de loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes filles sont portées ╵comme des enfants sur la hanche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu le verras alors, ╵tu brilleras de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton cœur tressaillira ╵et se dilatera
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, les richesses que transportent ╵les vaisseaux sillonnant la mer ╵seront dirigées vers tes ports.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les trésors des nations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.24
        metadata:
          usfm: REV.21.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵arriveront chez toi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu seras submergée ╵par le flot des chameaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les dromadaires ╵de Madian et d’Epha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Madian
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tribu nomade du sud-est du Jourdain, aux nombreux éleveurs de chameaux, dont l’origine remonte à Abraham. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Epha
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: un fils de Madian (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.1-2
        metadata:
          usfm: GEN.25.1+GEN.25.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
        metadata:
          usfm: GEN.25.4
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵couvriront ton pays.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les habitants de Saba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Saba
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: région opulente du sud de l’Arabie.
    marker-yv: yv-n
  - type: text
    text: ' viendront'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils apporteront ╵de l’or et de l’encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils proclameront ╵les louanges de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les moutons et les chèvres de Qédar ╵s’assembleront chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les béliers de Nebayoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qédar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne le désert Arabique avec ses tribus de Bédouins. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nebayoth
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autre tribu arabe (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 25.13
        metadata:
          usfm: GEN.25.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵seront à ton service,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils monteront sur mon autel ╵en offrande agréée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rendrai splendide ╵le Temple où ma splendeur réside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui sont ceux-là qui viennent ╵volant comme un nuage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme des colombes ╵qui regagnent leur colombier ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les habitants des îles ╵et des régions côtières ╵mettront leur espérance en moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les vaisseaux au long cours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de Tarsis, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: port situé probablement en Espagne.
    marker-yv: yv-n
  - type: text
    text: ' ╵viendront les tout premiers'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ramener tes fils de loin
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec leur argent et leur or
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire honneur ╵à l’Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au Saint d’Israël ╵qui te fait resplendir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les étrangers ╵rebâtiront tes murs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs rois te serviront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je t’avais frappée ╵dans mon indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais maintenant dans ma faveur ╵je te témoigne ma tendresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tes portes, jour et nuit, ╵seront toujours ouvertes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne les fermera jamais
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour laisser affluer vers toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: les trésors des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs rois en cortège
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.25-26
        metadata:
          usfm: REV.21.25+REV.21.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car la nation ou le royaume
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne te seront pas assujettis ╵disparaîtront ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, en effet ces nations-là ╵seront complètement ruinées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le cyprès, le platane ╵et le genévrier
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui font la gloire du Liban ╵te seront apportés
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour embellir le lieu ╵où est mon sanctuaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rendrai glorieux ╵le lieu où reposent mes pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les descendants de ceux ╵qui t’humiliaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: viendront se courber devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui t’insultaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: se prosterneront à tes pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3.9
        metadata:
          usfm: REV.3.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’on t’appellera : ╵« Cité de l’Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la Sion du Saint d’Israël ».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu étais délaissée, haïe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nul ne passait chez toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je ferai de toi ╵un sujet de fierté ╵à tout jamais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un sujet de joie ╵pour toutes les générations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu téteras le lait au sein
- type: usfm
  marker: q1
  children:
  - type: text
    text: des nations et des rois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu sauras que je suis l’Eternel, ╵que c’est moi qui te sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je suis ton libérateur, ╵le Puissant de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au lieu du bronze, ╵j’apporterai de l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l’argent ╵au lieu du fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du bronze au lieu du bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du fer au lieu de pierres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’établirai sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: la paix comme inspecteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme dominateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et l’on n’entendra plus ╵parler de violence ╵dans ton pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de dévastation et de destruction ╵dans tes frontières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu appelleras ╵tes murailles « Salut »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes portes « Louange ».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce ne sera plus le soleil ╵qui, désormais, te donnera ╵la lumière du jour ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la clarté de la lune ╵ne luira plus sur toi la nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Eternel sera ╵ta lumière à toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ton Dieu sera ta splendeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 19-20 sont repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.23
        metadata:
          usfm: REV.21.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Désormais, ton soleil ╵ne se couchera plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, jamais plus, ta lune ╵ne se retirera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel sera ╵ta lumière à toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les jours de ton deuil ╵auront pris fin pour toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ton peuple sera tout entier ╵composé d’hommes justes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils posséderont ╵le pays pour toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont les rejetons ╵que j’ai plantés moi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’ouvrage de mes mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour manifester ma splendeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le plus petit d’entre eux ╵deviendra un millier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le plus insignifiant, ╵une nation puissante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est moi, moi l’Eternel, ╵qui hâterai ╵en leur temps, ces événements.
