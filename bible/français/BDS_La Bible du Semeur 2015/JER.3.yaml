document_id: JER.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel au retour
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Une épouse infidèle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Que dire ? ╵Si un mari ╵répudie son épouse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle le quitte ╵pour appartenir à un autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est-ce que son ancien mari ╵retournera vers elle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir la loi de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 24.1-4
        metadata:
          usfm: DEU.24.1+DEU.24.2+DEU.24.3+DEU.24.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays n’en serait-il pas souillé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or, toi, qui t’es prostituée ╵avec de nombreux partenaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu reviendrais à moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lève les yeux, regarde ╵les hauteurs du pays :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: y a-t-il un endroit ╵où tu ne te sois pas ╵livrée à l’inconduite ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu guettais tes amants, assise ╵sur le bord des chemins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le Bédouin guette ses victimes ╵dans le désert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as souillé le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: par tes prostitutions ╵et actes mauvais !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est pourquoi les averses ╵ont été retenues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les pluies de printemps ╵ont cessé de tomber.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu as eu le front ╵d’une prostituée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as refusé ╵de rougir de ta honte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 4.7-8
        metadata:
          usfm: AMO.4.7+AMO.4.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maintenant, n’est-ce pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu m’appelles : « Mon père,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es l’époux de ma jeunesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.2'
        metadata:
          usfm: JER.2.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
        metadata:
          usfm: JER.2.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et tu demandes même : ╵« Sera-t-il toujours en colère ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son ressentiment, ╵le gardera-t-il à jamais ? »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà ce que tu dis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout en continuant ╵à commettre le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant que tu le peux !
- type: usfm
  marker: s2
  children:
  - type: text
    text: Israël-l’infidèle et Juda-la-perfide
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel me dit au temps du roi Josias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.2'
        metadata:
          usfm: JER.1.2
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '  : As-tu vu ce qu’a fait Israël-l’infidèle ? Elle qui allait sur toute montagne élevée et sous tout arbre vert pour s’y prostituer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et moi, je me disais : Après avoir fait tout cela, elle reviendra à moi. Mais elle n’est pas revenue, et sa sœur, Juda-la-perfide, en a été témoin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elle a bien vu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après plusieurs manuscrits de l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j’ai vu que.
    marker-yv: yv-n
  - type: text
    text: ' que j’ai répudié Israël-l’infidèle et que je lui ai donné sa lettre de divorce à cause de tous les adultères qu’elle avait commis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa lettre de divorce
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 24.1
        metadata:
          usfm: DEU.24.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
        metadata:
          usfm: DEU.24.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Mais sa sœur, Juda-la-perfide, n’en a ressenti aucune crainte ; au contraire, elle est allée se prostituer à son tour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à la déportation des habitants du royaume du Nord par les Assyriens en 722 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Par sa légèreté à se débaucher, Israël a souillé tout le pays, commettant l’adultère avec des idoles de bois et de pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et malgré tout cela, sa sœur, Juda-la-perfide, n’est pas revenue à moi de tout son cœur : son retour n’était qu’un leurre, l’Eternel le déclare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et l’Eternel me dit : Israël-l’infidèle paraît plus juste que Juda-la-perfide. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Va, et crie ces paroles, en direction du nord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers les pays où Israël a été déporté.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens, Israël-l’infidèle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le demande.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’aurai plus pour toi ╵un visage sévère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis bienveillant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne serai pas ╵en colère à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais reconnais ta faute :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est contre l’Eternel ton Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu t’es révoltée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as prodigué ╵tes faveurs çà et là ╵à des dieux étrangers
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous tous les arbres verts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne m’as pas écouté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Revenez, enfants rebelles !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Revenez donc, enfants rebelles ! L’Eternel le demande, car c’est moi votre maître. Et je vous prends, un d’une ville et deux d’une famille, pour vous amener à Sion. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Là, je vous donnerai des bergers à ma convenance, ils vous dirigeront avec compétence et discernement. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Or, quand dans le pays, vous vous serez multipliés – l’Eternel le déclare – oui, lorsque vous aurez proliféré, alors on ne parlera plus du coffre de l’alliance de l’Eternel. On n’y pensera plus et l’on ne s’en souviendra plus. Il ne manquera à personne et l’on n’en fera pas un autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour le coffre de l’alliance, voir Ex 25.22 ; 1 S 4.3.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En ce temps-là, on nommera Jérusalem : « Trône de l’Eternel », et tous les peuples s’assembleront en elle au nom de l’Eternel, oui, à Jérusalem. Ils ne persisteront plus à suivre les penchants de leur cœur obstiné et mauvais'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.22
        metadata:
          usfm: REV.21.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En ces jours-là, la communauté de Juda rejoindra celle d’Israël et, du pays du nord, elles reviendront ensemble vers le pays que j’ai donné en patrimoine à vos ancêtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et moi, qui me disais :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais vous traiter ╵comme des fils !
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’aimerais vous donner ╵un pays de délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le plus beau patrimoine ╵parmi ceux des nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je me disais aussi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous m’appellerez : « Père »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous ne cesserez pas de me suivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais vous m’avez trahi ╵ô communauté d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme ╵qui trompe son mari,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Un cri se fait entendre ╵sur les lieux élevés :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont les pleurs ╵et les supplications ╵des gens du peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont adopté ╵une conduite corrompue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont oublié l’Eternel leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Revenez donc, ╵enfants rebelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous guérirai ╵de vos égarements.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le retour à Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Nous voici, nous voici, ╵nous revenons à toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: car toi, tu es ╵l’Eternel notre Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Oui, on nous a trompés ╵là-haut sur les collines, ╵par le tapage ╵entendu sur les monts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, c’est l’Eternel notre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui accomplit le salut d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Depuis notre jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les idoles honteuses ╵ont dévoré, ╵tout ce qu’avait produit ╵le travail de nos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs brebis et leurs bœufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que leurs fils et leurs filles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur les sacrifices d’enfants à cette époque, voir 2 R 16.3 ; 17.17 ; 21.6 ; 23.10  ; cf. Jr 7.31 ; 19.5 ; 32.35. La loi les interdisait : Lv 18.21 ; Dt 18.10.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Couchés dans notre honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons l’infamie ╵pour couverture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nous et nos ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis notre jeunesse ╵et jusqu’à aujourd’hui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons tous péché ╵contre l’Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous n’avons pas obéi
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’Eternel, lui, notre Dieu.
