document_id: JER.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel au retour
  - type: heading
    content: Une épouse infidèle
  - type: text
    content: Que dire ? ╵Si un mari ╵répudie son épouse,
  - type: text
    content: qu’elle le quitte ╵pour appartenir à un autre,
  - type: text
    content: est-ce que son ancien mari ╵retournera vers elle
  - type: note
    content: Voir la loi de Dt 24.1-4.
  - type: text
    content: '  ?'
  - type: text
    content: Le pays n’en serait-il pas souillé ?
  - type: text
    content: Or, toi, qui t’es prostituée ╵avec de nombreux partenaires,
  - type: text
    content: tu reviendrais à moi !
  - type: text
    content: déclare l’Eternel.
  '10':
  - type: text
    content: 'Et malgré tout cela, sa sœur, Juda-la-perfide, n’est pas revenue à moi de tout son cœur : son retour n’était qu’un leurre, l’Eternel le déclare.'
  '11':
  - type: text
    content: 'Et l’Eternel me dit : Israël-l’infidèle paraît plus juste que Juda-la-perfide. '
  '12':
  - type: text
    content: Va, et crie ces paroles, en direction du nord
  - type: note
    content: Vers les pays où Israël a été déporté.
  - type: text
    content: '  :'
  - type: text
    content: Reviens, Israël-l’infidèle !
  - type: text
    content: l’Eternel le demande.
  - type: text
    content: Je n’aurai plus pour toi ╵un visage sévère,
  - type: text
    content: car je suis bienveillant,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: et je ne serai pas ╵en colère à toujours.
  '13':
  - type: text
    content: 'Mais reconnais ta faute :'
  - type: text
    content: c’est contre l’Eternel ton Dieu
  - type: text
    content: que tu t’es révoltée
  - type: text
    content: et tu as prodigué ╵tes faveurs çà et là ╵à des dieux étrangers
  - type: text
    content: sous tous les arbres verts.
  - type: text
    content: Et tu ne m’as pas écouté,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: Revenez, enfants rebelles !
  '14':
  - type: text
    content: 'Revenez donc, enfants rebelles ! L’Eternel le demande, car c’est moi votre maître. Et je vous prends, un d’une ville et deux d’une famille, pour vous amener à Sion. '
  '15':
  - type: text
    content: 'Là, je vous donnerai des bergers à ma convenance, ils vous dirigeront avec compétence et discernement. '
  '16':
  - type: text
    content: Or, quand dans le pays, vous vous serez multipliés – l’Eternel le déclare – oui, lorsque vous aurez proliféré, alors on ne parlera plus du coffre de l’alliance de l’Eternel. On n’y pensera plus et l’on ne s’en souviendra plus. Il ne manquera à personne et l’on n’en fera pas un autre
  - type: note
    content: Pour le coffre de l’alliance, voir Ex 25.22 ; 1 S 4.3.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'En ce temps-là, on nommera Jérusalem : « Trône de l’Eternel », et tous les peuples s’assembleront en elle au nom de l’Eternel, oui, à Jérusalem. Ils ne persisteront plus à suivre les penchants de leur cœur obstiné et mauvais'
  - type: note
    content: Voir Ap 21.22.
  - type: text
    content: '. '
  '18':
  - type: text
    content: En ces jours-là, la communauté de Juda rejoindra celle d’Israël et, du pays du nord, elles reviendront ensemble vers le pays que j’ai donné en patrimoine à vos ancêtres.
  '19':
  - type: text
    content: 'Et moi, qui me disais :'
  - type: text
    content: Je voudrais vous traiter ╵comme des fils !
  - type: text
    content: J’aimerais vous donner ╵un pays de délices,
  - type: text
    content: le plus beau patrimoine ╵parmi ceux des nations.
  - type: text
    content: 'Je me disais aussi :'
  - type: text
    content: 'Vous m’appellerez : « Père »'
  - type: text
    content: et vous ne cesserez pas de me suivre.
  '2':
  - type: text
    content: 'Lève les yeux, regarde ╵les hauteurs du pays :'
  - type: text
    content: y a-t-il un endroit ╵où tu ne te sois pas ╵livrée à l’inconduite ?
  - type: text
    content: Tu guettais tes amants, assise ╵sur le bord des chemins,
  - type: text
    content: comme le Bédouin guette ses victimes ╵dans le désert.
  - type: text
    content: Et tu as souillé le pays
  - type: text
    content: par tes prostitutions ╵et actes mauvais !
  '20':
  - type: text
    content: Mais vous m’avez trahi ╵ô communauté d’Israël,
  - type: text
    content: comme une femme ╵qui trompe son mari,
  - type: text
    content: l’Eternel le déclare.
  '21':
  - type: text
    content: 'Un cri se fait entendre ╵sur les lieux élevés :'
  - type: text
    content: ce sont les pleurs ╵et les supplications ╵des gens du peuple d’Israël,
  - type: text
    content: car ils ont adopté ╵une conduite corrompue,
  - type: text
    content: ils ont oublié l’Eternel leur Dieu.
  '22':
  - type: text
    content: Revenez donc, ╵enfants rebelles,
  - type: text
    content: et je vous guérirai ╵de vos égarements.
  - type: heading
    content: Le retour à Dieu
  - type: text
    content: – Nous voici, nous voici, ╵nous revenons à toi
  - type: text
    content: car toi, tu es ╵l’Eternel notre Dieu !
  '23':
  - type: text
    content: Oui, on nous a trompés ╵là-haut sur les collines, ╵par le tapage ╵entendu sur les monts.
  - type: text
    content: Mais, c’est l’Eternel notre Dieu
  - type: text
    content: qui accomplit le salut d’Israël.
  '24':
  - type: text
    content: Depuis notre jeunesse,
  - type: text
    content: les idoles honteuses ╵ont dévoré, ╵tout ce qu’avait produit ╵le travail de nos pères,
  - type: text
    content: leurs brebis et leurs bœufs,
  - type: text
    content: ainsi que leurs fils et leurs filles
  - type: note
    content: 'Sur les sacrifices d’enfants à cette époque, voir 2 R 16.3 ; 17.17 ; 21.6 ; 23.10  ; cf. Jr 7.31 ; 19.5 ; 32.35. La loi les interdisait : Lv 18.21 ; Dt 18.10.'
  - type: text
    content: .
  '25':
  - type: text
    content: Couchés dans notre honte,
  - type: text
    content: nous avons l’infamie ╵pour couverture.
  - type: text
    content: Car nous et nos ancêtres,
  - type: text
    content: depuis notre jeunesse ╵et jusqu’à aujourd’hui,
  - type: text
    content: nous avons tous péché ╵contre l’Eternel, notre Dieu,
  - type: text
    content: et nous n’avons pas obéi
  - type: text
    content: à l’Eternel, lui, notre Dieu.
  '3':
  - type: text
    content: C’est pourquoi les averses ╵ont été retenues,
  - type: text
    content: et les pluies de printemps ╵ont cessé de tomber.
  - type: text
    content: Mais tu as eu le front ╵d’une prostituée
  - type: text
    content: et tu as refusé ╵de rougir de ta honte
  - type: note
    content: Voir Am 4.7-8.
  - type: text
    content: '  !'
  '4':
  - type: text
    content: Maintenant, n’est-ce pas,
  - type: text
    content: 'tu m’appelles : « Mon père,'
  - type: text
    content: tu es l’époux de ma jeunesse
  - type: note
    content: Voir 2.2, 27.
  - type: text
    content: '  ! »'
  '5':
  - type: text
    content: 'Et tu demandes même : ╵« Sera-t-il toujours en colère ?'
  - type: text
    content: Et son ressentiment, ╵le gardera-t-il à jamais ? »
  - type: text
    content: Voilà ce que tu dis,
  - type: text
    content: tout en continuant ╵à commettre le mal
  - type: text
    content: autant que tu le peux !
  - type: heading
    content: Israël-l’infidèle et Juda-la-perfide
  '6':
  - type: text
    content: L’Eternel me dit au temps du roi Josias
  - type: note
    content: Voir 1.2 et note.
  - type: text
    content: '  : As-tu vu ce qu’a fait Israël-l’infidèle ? Elle qui allait sur toute montagne élevée et sous tout arbre vert pour s’y prostituer. '
  '7':
  - type: text
    content: 'Et moi, je me disais : Après avoir fait tout cela, elle reviendra à moi. Mais elle n’est pas revenue, et sa sœur, Juda-la-perfide, en a été témoin. '
  '8':
  - type: text
    content: Elle a bien vu
  - type: note
    content: 'D’après plusieurs manuscrits de l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : j’ai vu que.'
  - type: text
    content: ' que j’ai répudié Israël-l’infidèle et que je lui ai donné sa lettre de divorce à cause de tous les adultères qu’elle avait commis'
  - type: note
    content: 'sa lettre de divorce: voir Dt 24.1, 3.'
  - type: text
    content: . Mais sa sœur, Juda-la-perfide, n’en a ressenti aucune crainte ; au contraire, elle est allée se prostituer à son tour
  - type: note
    content: Allusion à la déportation des habitants du royaume du Nord par les Assyriens en 722 av. J.-C.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Par sa légèreté à se débaucher, Israël a souillé tout le pays, commettant l’adultère avec des idoles de bois et de pierre. '
