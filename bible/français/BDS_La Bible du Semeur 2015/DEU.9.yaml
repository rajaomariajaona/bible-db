document_id: DEU.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël est un peuple rebelle
  - type: heading
    content: La raison du châtiment des Cananéens
  - type: text
    content: 'Ecoute, Israël ! Te voilà aujourd’hui sur le point de franchir le Jourdain pour aller à la conquête du territoire de peuples plus grands et plus puissants que toi, qui vivent dans des villes importantes, fortifiées par des remparts montant jusqu’au ciel. '
  '10':
  - type: text
    content: L’Eternel m’a remis les deux tablettes de pierre écrites du doigt de Dieu. Elles portaient toutes les paroles qu’il vous avait adressées du milieu du feu sur la montagne le jour où vous étiez tous assemblés
  - type: note
    content: Voir Ex 19.10-17 ; 20.1-18.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Au bout de quarante jours et quarante nuits, l’Eternel m’a remis les deux tablettes de pierre de l’alliance '
  '12':
  - type: text
    content: 'et il m’a dit : « Va, redescends vite de cette montagne, car ton peuple que tu as conduit hors d’Egypte s’est corrompu ; ils se sont vite détournés de la voie que je leur avais commandé de suivre. Ils se sont fabriqué une idole de métal fondu. » '
  '13':
  - type: text
    content: 'Puis il a ajouté : « J’ai observé ce peuple : c’est un peuple rebelle. '
  '14':
  - type: text
    content: 'Laisse-moi faire : je vais les détruire et j’effacerai tout souvenir d’eux de dessous le ciel, mais je ferai de toi le père d’un peuple plus puissant et plus nombreux que celui-ci. » '
  '15':
  - type: text
    content: 'Alors, je m’en suis retourné, je suis redescendu de la montagne qui était encore tout embrasée, tenant des deux mains les deux tablettes de l’alliance. '
  '16':
  - type: text
    content: 'J’ai regardé et j’ai constaté qu’en effet vous aviez commis un péché contre l’Eternel, votre Dieu : vous vous étiez fabriqué une idole de métal fondu en forme de veau, vous vous étiez vite détournés de la voie que l’Eternel vous avait prescrite. '
  '17':
  - type: text
    content: Alors j’ai pris les deux tablettes, et je les ai jetées à terre des deux mains et les ai brisées sous vos yeux
  - type: note
    content: Voir Ex 32.19.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Ensuite, je me suis effondré devant l’Eternel et suis resté comme la première fois sans manger ni boire durant quarante jours et quarante nuits à cause du grand péché que vous aviez commis en faisant ce que l’Eternel juge mauvais et par lequel vous aviez provoqué sa colère. '
  '19':
  - type: text
    content: 'Car je redoutais cette colère, cette fureur, dont l’Eternel était animé contre vous au point de vouloir vous détruire. Mais cette fois encore, l’Eternel m’a exaucé. '
  '2':
  - type: text
    content: 'Ce sont des peuples puissants, des géants de la race des Anaqim. Tu les connais et tu as entendu dire : « Qui peut résister aux descendants d’Anaq ? » '
  '20':
  - type: text
    content: 'Il était aussi très irrité contre Aaron, au point de vouloir le détruire, et j’ai aussi prié pour Aaron. '
  '21':
  - type: text
    content: Quant à l’objet de votre péché, ce veau que vous aviez fabriqué, je l’ai pris et je l’ai jeté au feu, je l’ai mis entièrement en pièces, puis je l’ai broyé jusqu’à le réduire en poussière et j’ai dispersé cette poussière dans le torrent qui descend de la montagne
  - type: note
    content: Ex 32.20 ajoute que Moïse fit boire cette eau aux coupables.
  - type: text
    content: .
  - type: heading
    content: Autres fautes et intercession de Moïse
  '22':
  - type: text
    content: A Tabeéra, à Massa, à Qibroth-Hattaava, vous avez continuellement provoqué la colère de l’Eternel
  - type: note
    content: Ces versets ne suivent pas l’ordre chronologique. D’autres exemples de révolte des Israélites sont intercalés ici (v. 22-24) ; voir Nb 11.1-3 ; Ex 17.1-7 ; Nb 11.31-34.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Lorsque l’Eternel voulut vous faire quitter Qadesh-Barnéa
  - type: note
    content: Voir Nb 13.26 ; Dt 1.19-46.
  - type: text
    content: ', il vous a commandé : « Allez-y ! Prenez possession du pays que je vous ai donné ! » Mais vous avez désobéi à l’Eternel votre Dieu, vous n’avez pas eu confiance en lui, et vous ne l’avez pas écouté. '
  '24':
  - type: text
    content: Depuis que je vous connais, vous êtes désobéissants à l’Eternel.
  '25':
  - type: text
    content: 'Je me suis donc effondré devant l’Eternel et je suis resté prosterné devant lui pendant quarante jours et quarante nuits, car il parlait de vous détruire. '
  '26':
  - type: text
    content: 'Je l’implorais en disant : « Seigneur Eternel, ne détruis pas ton peuple, celui qui t’appartient, que tu as magistralement délivré en le faisant sortir d’Egypte avec puissance. '
  '27':
  - type: text
    content: 'Souviens-toi de tes serviteurs Abraham, Isaac et Jacob ! Ne tiens pas compte du caractère rebelle de ce peuple, de sa méchanceté et de son péché ! '
  '28':
  - type: text
    content: 'Sinon les gens du pays d’où tu nous as fait sortir risquent de dire : “Si l’Eternel leur a fait quitter l’Egypte pour les faire mourir dans le désert, c’est parce qu’il n’était pas capable de les faire entrer dans le pays dont il leur avait parlé”, ou : “C’est parce qu’il les détestait.” '
  '29':
  - type: text
    content: Et pourtant, ils sont ton peuple, celui qui t’appartient et que tu as fait sortir d’Egypte en déployant ta grande puissance. »
  '3':
  - type: text
    content: Mais sache aussi aujourd’hui que l’Eternel ton Dieu marche lui-même devant toi comme un feu dévorant ; il détruira ces peuples, il les fera plier devant toi, si bien que tu prendras possession de leur territoire et tu les feras périr sans tarder, comme l’Eternel te l’a promis.
  '4':
  - type: text
    content: 'Lorsque l’Eternel ton Dieu les aura dépossédés en ta faveur, ne t’avise pas de penser : « C’est parce que je suis juste que l’Eternel m’a fait venir pour prendre possession de ce pays. » Non ! C’est à cause de la perversité de ces peuples qu’il va les chasser devant toi. '
  '5':
  - type: text
    content: 'Ce n’est vraiment pas parce que tu es juste, ou que tu as la droiture dans le cœur, que tu vas entrer en possession de leur pays ; en vérité, c’est parce que ces peuples sont pervertis que l’Eternel ton Dieu va les déposséder en ta faveur. C’est aussi pour tenir la promesse que l’Eternel a faite avec serment à tes ancêtres Abraham, Isaac et Jacob. '
  '6':
  - type: text
    content: Sache donc bien que ce n’est pas parce que tu es juste que l’Eternel ton Dieu te donne ce bon pays en possession ; en fait, tu es un peuple rebelle.
  - type: heading
    content: Le veau d’or
  '7':
  - type: text
    content: 'Rappelle-toi – et ne l’oublie jamais – combien tu as provoqué la colère de l’Eternel ton Dieu dans le désert : depuis le jour où vous êtes sortis du pays d’Egypte jusqu’à votre arrivée en ce lieu-ci, vous n’avez cessé de lui désobéir.'
  '8':
  - type: text
    content: Souvenez-vous en particulier à quel point vous avez irrité l’Eternel au mont Horeb
  - type: note
    content: Voir note 1.2. Voir Ex 32 à 34.
  - type: text
    content: '  : il s’est emporté contre vous au point de vouloir vous exterminer. '
  '9':
  - type: text
    content: Quand j’étais monté sur la montagne pour recevoir les tablettes de pierre de l’alliance que l’Eternel avait conclue avec vous, je suis resté là-haut durant quarante jours et quarante nuits sans manger ni boire
  - type: note
    content: Voir Ex 24.18.
  - type: text
    content: '. '
