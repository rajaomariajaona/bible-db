document_id: JOS.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La chute de Jéricho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La ville de Jéricho avait soigneusement fermé toutes ses portes et s’était barricadée derrière, par peur des Israélites. Plus personne n’entrait ni ne sortait par ses portes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué avait donné cette consigne au peuple : « Pas de cri ! Restez muets ! Ne dites pas une parole jusqu’au jour où je vous ordonnerai de pousser des cris ! »'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le coffre de l’Eternel fit une fois le tour de la ville, puis tous rentrèrent au camp pour la nuit.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, Josué se leva de bon matin et les prêtres chargèrent le coffre de l’Eternel sur leurs épaules. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sept prêtres, portant sept cors faits de cornes de béliers, se remirent en route devant le coffre de l’Eternel, en sonnant de leur instrument. L’avant-garde les précédait et l’arrière-garde suivait le coffre de l’Eternel ; ils marchaient au son des cors. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils refirent une fois le tour de la ville ce jour-là, avant de regagner le camp. Ils firent ainsi pendant six jours.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième jour, ils se levèrent dès l’aurore et firent sept fois le tour de la ville de la même manière. C’est le seul jour où ils en firent sept fois le tour. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La septième fois, lorsque les prêtres sonnèrent du cor, Josué ordonna au peuple : Poussez des cris, car l’Eternel vous livre la ville ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La ville avec tout ce qu’elle contient sera vouée à l’Eternel ; seule Rahab, la prostituée, sera laissée en vie avec tous ceux qui se trouveront dans sa maison, car elle a caché les hommes que nous avions envoyés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais attention ! Prenez bien garde à ce qui doit être voué à l’Eternel. Ne prenez rien de cela, sinon vous placeriez le camp d’Israël sous une sentence de destruction et vous lui attireriez le malheur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout l’argent et l’or, tous les objets de bronze et de fer seront consacrés à l’Eternel et on les mettra dans son trésor.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit alors à Josué : Regarde, je te livre Jéricho, son roi et tous ses guerriers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On sonna donc du cor. Dès que le peuple l’entendit, il poussa un formidable cri, et le rempart s’écroula sur place. Aussitôt, les Israélites s’élancèrent à l’assaut de la ville, chacun droit devant soi, et ils s’en emparèrent. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils exterminèrent par l’épée pour les vouer à l’Eternel hommes et femmes, enfants et vieillards, taureaux, moutons et ânes : tout ce qui vivait dans la ville.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famille de Rahab est épargnée
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit aux deux hommes qu’il avait envoyés pour explorer le pays : Allez à la maison de Rahab, la prostituée, et faites-la sortir de là avec les siens, comme vous le lui avez juré.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les deux hommes y allèrent et firent sortir Rahab, son père, sa mère, ses frères, ses biens et toute sa parenté, et ils les installèrent en dehors du camp d’Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils brûlèrent la ville avec tout ce qui s’y trouvait, excepté l’argent, l’or et les objets de bronze et de fer que l’on déposa dans le trésor du sanctuaire de l’Eternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josué laissa la vie sauve à Rahab, la prostituée, ainsi qu’aux membres de sa famille, et il épargna tous ses biens parce qu’elle avait caché les hommes que Josué avait envoyés en reconnaissance à Jéricho. Elle a habité parmi les Israélites jusqu’à aujourd’hui.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la même époque, Josué prononça ce serment solennel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit devant l’Eternel ╵celui qui tentera ╵de rebâtir cette cité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de reconstruire Jéricho.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est au prix de son fils aîné ╵qu’il posera ses fondations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au prix de son fils cadet ╵qu’il fixera ses portes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour l’accomplissement de cette malédiction, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 16.34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel fut avec Josué, et sa renommée se répandit dans tout le pays.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant six jours, toi et tous tes soldats vous ferez chaque jour le tour de la ville, une fois par jour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sept prêtres portant chacun un cor fait d’une corne de bélier précéderont le coffre de l’alliance. Le septième jour, vous ferez sept fois le tour de la ville, et les prêtres sonneront du cor. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand le peuple les entendra produire, avec leur cor, un son prolongé, tout le monde poussera un grand cri, et les remparts de la ville s’écrouleront sur place. Alors le peuple donnera l’assaut, chacun droit devant soi.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, fils de Noun, convoqua les prêtres et leur dit : Chargez le coffre de l’alliance sur vos épaules et que sept d’entre vous prennent sept cors faits de cornes de béliers et marchent devant le coffre de l’Eternel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit au peuple : En avant : faites le tour de la ville, et que les hommes armés précèdent le coffre de l’Eternel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple fit comme Josué l’avait ordonné : sept prêtres portant sept cors faits de cornes de béliers passèrent devant l’Eternel et se mirent à sonner de leur instrument tandis que le coffre de l’alliance suivait. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes armés les précédaient ; une arrière-garde suivait aussi le coffre ; ils marchaient au son du cor. '
