document_id: PRO.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paroles du roi Lemouel
  - type: text
    content: Paroles du roi Lemouel
  - type: note
    content: 'Lemouel: roi inconnu. Paroles du roi Lemouel, maximes que sa mère… pourrait se traduire : Paroles de Lemouel, roi de Massa, que sa mère… Dans ce cas, Lemouel serait un roi ismaélite (voir 30.1 et note).'
  - type: text
    content: ', maximes que sa mère'
  - type: note
    content: Tout ce chapitre souligne le rôle de la femme sage. La reine mère avait une grande influence dans les cours orientales (1 R 1.11-13 ; 15.13).
  - type: text
    content: ' lui a enseignées :'
  '10':
  - type: text
    content: Qui se trouvera une femme de valeur ?
  - type: text
    content: elle a bien plus de prix ╵que des coraux.
  '11':
  - type: text
    content: Son mari a confiance en elle,
  - type: text
    content: il ne manquera pas ╵de biens dans sa maison.
  '12':
  - type: text
    content: Tous les jours de sa vie, ╵elle lui fait du bien,
  - type: text
    content: et non du mal.
  '13':
  - type: text
    content: Elle cherche avec soin ╵du lin et de la laine
  - type: text
    content: et les travaille de ses mains ╵avec plaisir.
  '14':
  - type: text
    content: Comme un vaisseau marchand,
  - type: text
    content: elle apporte de loin ╵en son logis des vivres.
  '15':
  - type: text
    content: Elle se lève ╵quand il fait nuit encore,
  - type: text
    content: pourvoit en nourriture ╵sa maisonnée,
  - type: text
    content: elle donne ses instructions ╵à ses servantes.
  '16':
  - type: text
    content: Elle pense à un champ, ╵alors elle l’achète.
  - type: text
    content: Du fruit de son travail, ╵elle plante une vigne.
  '17':
  - type: text
    content: Avec plein d’énergie, ╵elle se met à l’œuvre
  - type: text
    content: de ses bras affermis.
  '18':
  - type: text
    content: Elle constate ╵que ses affaires marchent bien.
  - type: text
    content: Jusque tard dans la nuit, ╵sa lampe est allumée.
  '19':
  - type: text
    content: Ses mains filent la laine
  - type: text
    content: et ses doigts tissent ╵des vêtements.
  '2':
  - type: text
    content: Que te dirai-je, mon fils ?
  - type: text
    content: Que te conseillerai-je, ô mon fils bien-aimé ?
  - type: text
    content: Que te dirai-je, fils appelé de mes vœux ?
  '20':
  - type: text
    content: Elle ouvre largement ╵la main à l’indigent
  - type: text
    content: et tend les bras au pauvre.
  '21':
  - type: text
    content: Pour elle et tous les siens, ╵peu importe la neige,
  - type: text
    content: car toute sa famille ╵est revêtue ╵de doubles vêtements
  - type: note
    content: 'Selon certaines versions anciennes. Texte hébreu traditionnel : d’écarlate, autrement dit de vêtements luxueux.'
  - type: text
    content: .
  '22':
  - type: text
    content: Elle se fait des couvertures,
  - type: text
    content: elle a des vêtements ╵de fin lin et de pourpre
  - type: note
    content: Tissus de grand prix, marque de noblesse (7.16 ; Gn 41.42).
  - type: text
    content: .
  '23':
  - type: text
    content: Son mari est connu ╵aux portes
  - type: note
    content: Lieu de réunion des dirigeants de la cité.
  - type: text
    content: ' de la ville.'
  - type: text
    content: Car il y siège ╵avec les responsables du pays.
  '24':
  - type: text
    content: Elle confectionne elle-même ╵des habits et les vend,
  - type: text
    content: ainsi que des ceintures ╵qu’elle cède aux marchands.
  '25':
  - type: text
    content: La force et une grande dignité ╵lui servent de parure.
  - type: text
    content: C’est avec le sourire ╵qu’elle envisage l’avenir.
  '26':
  - type: text
    content: Ses paroles sont sages,
  - type: text
    content: elle dispense avec bonté ╵l’enseignement.
  '27':
  - type: text
    content: Elle veille à la bonne marche ╵de sa maison
  - type: text
    content: et ne se nourrit pas ╵du pain de la paresse.
  '28':
  - type: text
    content: Ses fils se lèvent, ╵la disent bienheureuse,
  - type: text
    content: 'et son mari aussi ╵fait son éloge :'
  '29':
  - type: text
    content: « Il y a bien des filles ╵qui montrent leur valeur,
  - type: text
    content: mais toi, tu les surpasses toutes. »
  '3':
  - type: text
    content: Ne gaspille pas tes forces avec les femmes
  - type: note
    content: Allusion aux nombreuses femmes du harem royal qui pouvaient détourner le souverain de ses devoirs (voir 5.9-11 ; 1 R 11.1 ; Né 13.26).
  - type: text
    content: ','
  - type: text
    content: ne te laisse pas mener par celles qui perdent les rois.
  '30':
  - type: text
    content: Or le charme est trompeur ╵et la beauté fugace ;
  - type: text
    content: la femme qui craint l’Eternel ╵est digne de louanges.
  '31':
  - type: text
    content: Donnez-lui donc ╵le fruit de son travail !
  - type: text
    content: Qu’on dise ses louanges ╵aux portes de la ville ╵pour tout ce qu’elle fait !
  '4':
  - type: text
    content: Il ne convient pas aux rois, Lemouel,
  - type: text
    content: non, il ne convient pas aux rois de boire du vin,
  - type: text
    content: ni à ceux qui gouvernent d’aimer les boissons enivrantes
  - type: note
    content: Pour les v. 4-5 et 8-9, voir Ps 72.1-4 ; Pr 16.10, 12 ; Ec 10.16-17.
  - type: text
    content: ','
  '5':
  - type: text
    content: car, en buvant, ils pourraient oublier les lois édictées
  - type: text
    content: et rendre des jugements qui lèsent le droit des pauvres.
  '6':
  - type: text
    content: Que l’on donne plutôt les boissons enivrantes à celui qui va périr,
  - type: text
    content: et du vin à qui a le cœur amer.
  '7':
  - type: text
    content: Qu’il boive et qu’il oublie sa misère,
  - type: text
    content: qu’il ne se souvienne plus de son tourment !
  '8':
  - type: text
    content: Ouvre la bouche pour défendre ceux qui ne peuvent parler,
  - type: text
    content: pour défendre les droits de tous ceux qui sont délaissés.
  '9':
  - type: text
    content: Oui, parle pour prononcer de justes verdicts.
  - type: text
    content: Défends les droits des pauvres et des défavorisés !
  - type: heading
    content: Poème de la femme de valeur
