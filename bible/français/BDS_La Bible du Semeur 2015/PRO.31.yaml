document_id: PRO.31
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Paroles du roi Lemouel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paroles du roi Lemouel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lemouel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'roi inconnu. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Paroles du roi Lemouel, maximes que sa mère… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait se traduire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Paroles de Lemouel, roi de Massa, que sa mère… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans ce cas, Lemouel serait un roi ismaélite (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30.1'
        metadata:
          usfm: PRO.30.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', maximes que sa mère'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tout ce chapitre souligne le rôle de la femme sage. La reine mère avait une grande influence dans les cours orientales (1 R 1.11-13 ; 15.13).
    marker-yv: yv-n
  - type: text
    text: ' lui a enseignées :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que te dirai-je, mon fils ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te conseillerai-je, ô mon fils bien-aimé ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te dirai-je, fils appelé de mes vœux ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne gaspille pas tes forces avec les femmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux nombreuses femmes du harem royal qui pouvaient détourner le souverain de ses devoirs (voir 5.9-11 ; 1 R 11.1 ; Né 13.26).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne te laisse pas mener par celles qui perdent les rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il ne convient pas aux rois, Lemouel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: non, il ne convient pas aux rois de boire du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni à ceux qui gouvernent d’aimer les boissons enivrantes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 4-5 et 8-9, voir Ps 72.1-4 ; Pr 16.10, 12 ; Ec 10.16-17.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car, en buvant, ils pourraient oublier les lois édictées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rendre des jugements qui lèsent le droit des pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que l’on donne plutôt les boissons enivrantes à celui qui va périr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du vin à qui a le cœur amer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qu’il boive et qu’il oublie sa misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il ne se souvienne plus de son tourment !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ouvre la bouche pour défendre ceux qui ne peuvent parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour défendre les droits de tous ceux qui sont délaissés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oui, parle pour prononcer de justes verdicts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défends les droits des pauvres et des défavorisés !
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Poème de la femme de valeur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui se trouvera une femme de valeur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a bien plus de prix ╵que des coraux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Son mari a confiance en elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne manquera pas ╵de biens dans sa maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tous les jours de sa vie, ╵elle lui fait du bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle cherche avec soin ╵du lin et de la laine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les travaille de ses mains ╵avec plaisir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme un vaisseau marchand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle apporte de loin ╵en son logis des vivres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle se lève ╵quand il fait nuit encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourvoit en nourriture ╵sa maisonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle donne ses instructions ╵à ses servantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle pense à un champ, ╵alors elle l’achète.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fruit de son travail, ╵elle plante une vigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avec plein d’énergie, ╵elle se met à l’œuvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ses bras affermis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elle constate ╵que ses affaires marchent bien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusque tard dans la nuit, ╵sa lampe est allumée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ses mains filent la laine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses doigts tissent ╵des vêtements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle ouvre largement ╵la main à l’indigent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tend les bras au pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pour elle et tous les siens, ╵peu importe la neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car toute sa famille ╵est revêtue ╵de doubles vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon certaines versions anciennes. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd’écarlate, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autrement dit de vêtements luxueux.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Elle se fait des couvertures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a des vêtements ╵de fin lin et de pourpre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tissus de grand prix, marque de noblesse (7.16 ; Gn 41.42).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Son mari est connu ╵aux portes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lieu de réunion des dirigeants de la cité.
    marker-yv: yv-n
  - type: text
    text: ' de la ville.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il y siège ╵avec les responsables du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Elle confectionne elle-même ╵des habits et les vend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que des ceintures ╵qu’elle cède aux marchands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La force et une grande dignité ╵lui servent de parure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est avec le sourire ╵qu’elle envisage l’avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ses paroles sont sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dispense avec bonté ╵l’enseignement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Elle veille à la bonne marche ╵de sa maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne se nourrit pas ╵du pain de la paresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ses fils se lèvent, ╵la disent bienheureuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et son mari aussi ╵fait son éloge :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: « Il y a bien des filles ╵qui montrent leur valeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais toi, tu les surpasses toutes. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Or le charme est trompeur ╵et la beauté fugace ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la femme qui craint l’Eternel ╵est digne de louanges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Donnez-lui donc ╵le fruit de son travail !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’on dise ses louanges ╵aux portes de la ville ╵pour tout ce qu’elle fait !
