document_id: JOS.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la tribu de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le territoire que le tirage au sort attribua aux familles de la tribu de Juda s’étendait au sud jusqu’à la frontière d’Edom dans le désert de Tsîn vers le Néguev à l’extrême sud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Leur frontière méridionale partait de la baie qui se trouve à la pointe de la mer Morte, face au Néguev, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et passait au sud de la montée des Scorpions pour aller en direction de Tsîn, passer au sud de Qadesh-Barnéa, et remonter par Hetsrôn vers Addar, d’où elle tournait en direction de Qarqaa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De là, elle passait par Atsmôn et débouchait au torrent d’Egypte pour aboutir à la mer Méditerranée. Telle est votre frontière méridionale.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A l’est, la frontière était constituée par la mer Morte jusqu’à l’embouchure du Jourdain. Au nord, elle partait de la baie qui est à l’embouchure du Jourdain '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et remontait vers Beth-Hogla pour passer au nord de Beth-Araba jusqu’à la pierre dite de Bohân, l’un des fils de Ruben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La frontière montait ensuite vers Debir, depuis la vallée d’Akor, puis se dirigeait au nord vers Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Débir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'différent de celui de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 10.38-39
        metadata:
          usfm: JOS.10.38+JOS.10.39
      - type: text
        text: ' et un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Guilgal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à ne pas confondre avec celui de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4.19-20
        metadata:
          usfm: JOS.4.19+JOS.4.20
      - type: text
        text: ' près de Jéricho.'
    marker-yv: yv-n
  - type: text
    text: ', en face de la montée d’Adoummim du côté sud du torrent. Puis elle passait près des sources d’Eyn-Shémesh et débouchait sur Eyn-Roguel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors elle remontait par la vallée de Ben-Hinnom sur le flanc sud de la montagne des Yebousiens où se trouve Jérusalem, pour s’élever vers le sommet situé en face à l’ouest de la vallée de Hinnom, et à l’extrémité nord de la plaine des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De ce sommet, elle s’incurvait vers la source de Nephtoah et se dirigeait vers les villes de la montagne d’Ephrôn avant de tourner en direction de Baala, c’est-à-dire Qiryath-Yearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De là, elle tournait du côté ouest vers le mont Séir et longeait le versant nord de la montagne des Forêts – ou mont Kesalôn – pour redescendre à Beth-Shémesh et passer à Timna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De là, elle gagnait le versant nord d’Eqrôn, et s’incurvait vers Shikrôn, passait par le mont Baala puis à Yabnéel, pour déboucher sur la mer Méditerranée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La mer Méditerranée constituait la frontière ouest du territoire attribué aux familles de la tribu de Juda.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caleb conquiert son domaine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Caleb, fils de Yephounné, reçut une part du territoire de Juda, comme l’Eternel l’avait ordonné à Josué. On lui donna Hébron qui s’appelait Qiryath-Arba, du nom d’Arba, l’ancêtre d’Anaq
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 13-19, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 1.10-15
        metadata:
          usfm: JDG.1.10+JDG.1.11+JDG.1.12+JDG.1.13+JDG.1.14+JDG.1.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Caleb en déposséda les trois descendants d’Anaq : Shéshaï, Ahimân et Talmaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: De là, il partit attaquer les habitants de Debir – qui s’appelait autrefois Qiryath-Sépher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Caleb promit sa fille Aksa en mariage à celui qui battrait et prendrait Qiryath-Sépher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Son neveu Otniel, fils de son frère Qenaz, s’en rendit maître, et Caleb lui donna sa fille Aksa en mariage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu’elle fut arrivée auprès de son mari, elle l’engagea à demander un certain champ à son père Caleb. Puis elle sauta de son âne, et Caleb lui demanda : Quel est ton désir ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elle lui répondit : Accorde-moi un cadeau. Puisque tu m’as établie dans une terre aride, donne-moi aussi des points d’eau !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et Caleb lui donna les sources supérieures et les sources inférieures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tel est le patrimoine de la tribu de Juda pour ses familles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les villes de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici quelles étaient les villes situées dans la partie méridionale du territoire de Juda, près de la frontière d’Edom, dans le Néguev ; Qabtséel, Eder, Yagour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kina, Dimôna, Adada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Qédesh, Hatsor, Itân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ziph, Télem, Bealoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hatsor-Hadatta, Qeriyoth-Hetsrôn, appelée aussi Hatsor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amam, Shema, Molada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hatsar-Gadda, Heshmôn, Beth-Paleth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hatsar-Shoual, Beer-Sheva, Bizyotya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bizyotya, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 11.27
        metadata:
          usfm: NEH.11.27
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les localités voisines.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Baala, Iyim, Atsem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eltolad, Kesil, Horma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tsiqlag, Madmanna, Sansanna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lebaoth, Shilhim, Aïn et Rimmôn : soit en tout : vingt-neuf villes et les villages qui en dépendent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dans le Bas-Pays se trouvaient les villes suivantes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette région de la plaine côtière située entre la Judée montagneuse et la Philistie ne sera en grande partie occupée par Israël qu’après la victoire de David.
    marker-yv: yv-n
  - type: text
    text: '  : Eshtaol, Tsorea, Ashna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Zanoah, Eyn-Gannim, Tappouah, Enam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Yarmouth, Adoullam, Soko, Azéqa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Shaaraïm, Aditaïm, Guedéra et Guedérotaïm : soit quatorze villes avec les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tsenân, Hadasha, Migdal-Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dileân, Mitspé, Yoqtéel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lakish, Botsqath, Eglôn, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Kabbôn, Lahmas, Kitlish, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Guedéroth, Beth-Dagôn, Naama et Maqqéda, soit seize villes avec les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Libna, Eter, Ashân ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Yiphtah, Ashna, Netsib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Qeïla, Akzib et Marésha : soit neuf villes et les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Il y avait aussi Eqrôn avec les villes qui en dépendaient et ses villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Toutes les villes et tous les villages aux alentours d’Ashdod, situés entre Eqrôn et la mer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ashdod et Gaza avec les villes qui en dépendaient et leurs villages jusqu’au torrent d’Egypte et jusqu’à la côte de la Méditerranée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Dans la région montagneuse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.48 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'La région montagneuse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ', il y avait les villes de Shamir, Yattir, Soko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Danna, Qiryath-Sanna appelée aussi Debir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Anab, Eshtemo, Anim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Goshen, Holôn et Guilo : soit onze villes avec les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il y avait de plus : Arab, Douma, Esheân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Yanoum, Beth-Tappouah, Aphéqa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Houmeta, Qiryath-Arba, c’est-à-dire Hébron, et Tsior : soit neuf villes et les villages qui en dépendent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Maôn, Karmel, Ziph, Youtta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Jizréel, Yoqdeam, Zanoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Qaïn, Guibéa et Timna : dix villes et les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Halhoul, Beth-Tsour, Guedor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Maarath, Beth-Anoth et Elteqôn : six villes et les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Qiryath-Baal, appelée aussi Qiryath-Yearim, et Rabba : deux villes et les villages qui en dépendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Dans le désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.61 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La région calcaire et stérile, à l’est et au sud de Jérusalem, qui borde la mer Morte.
    marker-yv: yv-n
  - type: text
    text: ' étaient situées les villes de Beth-Araba, Middin, Sekaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Nibshân, Ir-Hammélah et Eyn-Guédi : six villes et les villages qui en dépendent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Les descendants de Juda ne réussirent pas à déposséder les Yebousiens qui habitaient à Jérusalem, de sorte qu’ils y vivent encore aujourd’hui avec les gens de Juda.
