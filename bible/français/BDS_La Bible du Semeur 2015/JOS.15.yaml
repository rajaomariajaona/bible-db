document_id: JOS.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire de la tribu de Juda
  - type: text
    content: 'Le territoire que le tirage au sort attribua aux familles de la tribu de Juda s’étendait au sud jusqu’à la frontière d’Edom dans le désert de Tsîn vers le Néguev à l’extrême sud. '
  '10':
  - type: text
    content: 'De là, elle tournait du côté ouest vers le mont Séir et longeait le versant nord de la montagne des Forêts – ou mont Kesalôn – pour redescendre à Beth-Shémesh et passer à Timna. '
  '11':
  - type: text
    content: 'De là, elle gagnait le versant nord d’Eqrôn, et s’incurvait vers Shikrôn, passait par le mont Baala puis à Yabnéel, pour déboucher sur la mer Méditerranée. '
  '12':
  - type: text
    content: La mer Méditerranée constituait la frontière ouest du territoire attribué aux familles de la tribu de Juda.
  - type: heading
    content: Caleb conquiert son domaine
  '13':
  - type: text
    content: Caleb, fils de Yephounné, reçut une part du territoire de Juda, comme l’Eternel l’avait ordonné à Josué. On lui donna Hébron qui s’appelait Qiryath-Arba, du nom d’Arba, l’ancêtre d’Anaq
  - type: note
    content: Pour les v. 13-19, voir Jg 1.10-15.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Caleb en déposséda les trois descendants d’Anaq : Shéshaï, Ahimân et Talmaï. '
  '15':
  - type: text
    content: De là, il partit attaquer les habitants de Debir – qui s’appelait autrefois Qiryath-Sépher.
  '16':
  - type: text
    content: 'Caleb promit sa fille Aksa en mariage à celui qui battrait et prendrait Qiryath-Sépher. '
  '17':
  - type: text
    content: 'Son neveu Otniel, fils de son frère Qenaz, s’en rendit maître, et Caleb lui donna sa fille Aksa en mariage. '
  '18':
  - type: text
    content: 'Lorsqu’elle fut arrivée auprès de son mari, elle l’engagea à demander un certain champ à son père Caleb. Puis elle sauta de son âne, et Caleb lui demanda : Quel est ton désir ?'
  '19':
  - type: text
    content: 'Elle lui répondit : Accorde-moi un cadeau. Puisque tu m’as établie dans une terre aride, donne-moi aussi des points d’eau !'
  - type: text
    content: 'Et Caleb lui donna les sources supérieures et les sources inférieures. '
  '2':
  - type: text
    content: 'Leur frontière méridionale partait de la baie qui se trouve à la pointe de la mer Morte, face au Néguev, '
  '20':
  - type: text
    content: Tel est le patrimoine de la tribu de Juda pour ses familles.
  - type: heading
    content: Les villes de Juda
  '21':
  - type: text
    content: 'Voici quelles étaient les villes situées dans la partie méridionale du territoire de Juda, près de la frontière d’Edom, dans le Néguev ; Qabtséel, Eder, Yagour, '
  '22':
  - type: text
    content: 'Kina, Dimôna, Adada, '
  '23':
  - type: text
    content: 'Qédesh, Hatsor, Itân, '
  '24':
  - type: text
    content: 'Ziph, Télem, Bealoth, '
  '25':
  - type: text
    content: 'Hatsor-Hadatta, Qeriyoth-Hetsrôn, appelée aussi Hatsor, '
  '26':
  - type: text
    content: 'Amam, Shema, Molada, '
  '27':
  - type: text
    content: 'Hatsar-Gadda, Heshmôn, Beth-Paleth, '
  '28':
  - type: text
    content: Hatsar-Shoual, Beer-Sheva, Bizyotya
  - type: note
    content: 'Au lieu de Bizyotya, l’ancienne version grecque et Né 11.27 ont : et les localités voisines.'
  - type: text
    content: ', '
  '29':
  - type: text
    content: 'Baala, Iyim, Atsem, '
  '3':
  - type: text
    content: 'et passait au sud de la montée des Scorpions pour aller en direction de Tsîn, passer au sud de Qadesh-Barnéa, et remonter par Hetsrôn vers Addar, d’où elle tournait en direction de Qarqaa. '
  '30':
  - type: text
    content: 'Eltolad, Kesil, Horma, '
  '31':
  - type: text
    content: 'Tsiqlag, Madmanna, Sansanna, '
  '32':
  - type: text
    content: 'Lebaoth, Shilhim, Aïn et Rimmôn : soit en tout : vingt-neuf villes et les villages qui en dépendent.'
  '33':
  - type: text
    content: Dans le Bas-Pays se trouvaient les villes suivantes
  - type: note
    content: Cette région de la plaine côtière située entre la Judée montagneuse et la Philistie ne sera en grande partie occupée par Israël qu’après la victoire de David.
  - type: text
    content: '  : Eshtaol, Tsorea, Ashna, '
  '34':
  - type: text
    content: 'Zanoah, Eyn-Gannim, Tappouah, Enam, '
  '35':
  - type: text
    content: 'Yarmouth, Adoullam, Soko, Azéqa, '
  '36':
  - type: text
    content: 'Shaaraïm, Aditaïm, Guedéra et Guedérotaïm : soit quatorze villes avec les villages qui en dépendent. '
  '37':
  - type: text
    content: 'Tsenân, Hadasha, Migdal-Gad, '
  '38':
  - type: text
    content: 'Dileân, Mitspé, Yoqtéel, '
  '39':
  - type: text
    content: 'Lakish, Botsqath, Eglôn, '
  '4':
  - type: text
    content: De là, elle passait par Atsmôn et débouchait au torrent d’Egypte pour aboutir à la mer Méditerranée. Telle est votre frontière méridionale.
  '40':
  - type: text
    content: 'Kabbôn, Lahmas, Kitlish, '
  '41':
  - type: text
    content: 'Guedéroth, Beth-Dagôn, Naama et Maqqéda, soit seize villes avec les villages qui en dépendent. '
  '42':
  - type: text
    content: 'Libna, Eter, Ashân ; '
  '43':
  - type: text
    content: 'Yiphtah, Ashna, Netsib, '
  '44':
  - type: text
    content: 'Qeïla, Akzib et Marésha : soit neuf villes et les villages qui en dépendent. '
  '45':
  - type: text
    content: 'Il y avait aussi Eqrôn avec les villes qui en dépendaient et ses villages. '
  '46':
  - type: text
    content: 'Toutes les villes et tous les villages aux alentours d’Ashdod, situés entre Eqrôn et la mer, '
  '47':
  - type: text
    content: Ashdod et Gaza avec les villes qui en dépendaient et leurs villages jusqu’au torrent d’Egypte et jusqu’à la côte de la Méditerranée.
  '48':
  - type: text
    content: Dans la région montagneuse
  - type: note
    content: La région montagneuse au sud de Jérusalem.
  - type: text
    content: ', il y avait les villes de Shamir, Yattir, Soko, '
  '49':
  - type: text
    content: 'Danna, Qiryath-Sanna appelée aussi Debir, '
  '5':
  - type: text
    content: 'A l’est, la frontière était constituée par la mer Morte jusqu’à l’embouchure du Jourdain. Au nord, elle partait de la baie qui est à l’embouchure du Jourdain '
  '50':
  - type: text
    content: 'Anab, Eshtemo, Anim, '
  '51':
  - type: text
    content: 'Goshen, Holôn et Guilo : soit onze villes avec les villages qui en dépendent. '
  '52':
  - type: text
    content: 'Il y avait de plus : Arab, Douma, Esheân, '
  '53':
  - type: text
    content: 'Yanoum, Beth-Tappouah, Aphéqa, '
  '54':
  - type: text
    content: 'Houmeta, Qiryath-Arba, c’est-à-dire Hébron, et Tsior : soit neuf villes et les villages qui en dépendent, '
  '55':
  - type: text
    content: 'Maôn, Karmel, Ziph, Youtta, '
  '56':
  - type: text
    content: 'Jizréel, Yoqdeam, Zanoah, '
  '57':
  - type: text
    content: 'Qaïn, Guibéa et Timna : dix villes et les villages qui en dépendent. '
  '58':
  - type: text
    content: 'Halhoul, Beth-Tsour, Guedor, '
  '59':
  - type: text
    content: 'Maarath, Beth-Anoth et Elteqôn : six villes et les villages qui en dépendent. '
  '6':
  - type: text
    content: 'et remontait vers Beth-Hogla pour passer au nord de Beth-Araba jusqu’à la pierre dite de Bohân, l’un des fils de Ruben. '
  '60':
  - type: text
    content: 'Qiryath-Baal, appelée aussi Qiryath-Yearim, et Rabba : deux villes et les villages qui en dépendent. '
  '61':
  - type: text
    content: Dans le désert
  - type: note
    content: La région calcaire et stérile, à l’est et au sud de Jérusalem, qui borde la mer Morte.
  - type: text
    content: ' étaient situées les villes de Beth-Araba, Middin, Sekaka, '
  '62':
  - type: text
    content: 'Nibshân, Ir-Hammélah et Eyn-Guédi : six villes et les villages qui en dépendent.'
  '63':
  - type: text
    content: Les descendants de Juda ne réussirent pas à déposséder les Yebousiens qui habitaient à Jérusalem, de sorte qu’ils y vivent encore aujourd’hui avec les gens de Juda.
  '7':
  - type: text
    content: La frontière montait ensuite vers Debir, depuis la vallée d’Akor, puis se dirigeait au nord vers Guilgal
  - type: note
    content: Un Débir différent de celui de Jos 10.38-39 et un Guilgal à ne pas confondre avec celui de 4.19-20 près de Jéricho.
  - type: text
    content: ', en face de la montée d’Adoummim du côté sud du torrent. Puis elle passait près des sources d’Eyn-Shémesh et débouchait sur Eyn-Roguel. '
  '8':
  - type: text
    content: 'Alors elle remontait par la vallée de Ben-Hinnom sur le flanc sud de la montagne des Yebousiens où se trouve Jérusalem, pour s’élever vers le sommet situé en face à l’ouest de la vallée de Hinnom, et à l’extrémité nord de la plaine des Rephaïm. '
  '9':
  - type: text
    content: 'De ce sommet, elle s’incurvait vers la source de Nephtoah et se dirigeait vers les villes de la montagne d’Ephrôn avant de tourner en direction de Baala, c’est-à-dire Qiryath-Yearim. '
