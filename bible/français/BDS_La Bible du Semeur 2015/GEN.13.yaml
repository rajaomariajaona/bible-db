document_id: GEN.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram se fixe au pays de Canaan
  - type: text
    content: 'Abram quitta donc l’Egypte avec sa femme et tout ce qu’il possédait en direction du Néguev. Loth était avec lui. '
  '10':
  - type: text
    content: 'Loth regarda et vit toute la plaine du Jourdain qui s’étendait jusqu’à Tsoar : avant que l’Eternel eût détruit Sodome et Gomorrhe'
  - type: note
    content: Voir chap. 18 et 19.
  - type: text
    content: ', elle était comme le jardin de l’Eternel, comme la terre d’Egypte. '
  '11':
  - type: text
    content: 'Loth choisit donc pour lui toute la plaine du Jourdain et il se dirigea vers l’est. Ainsi, ils se séparèrent l’un de l’autre. '
  '12':
  - type: text
    content: 'Abram se fixa dans le pays de Canaan, et Loth s’établit au milieu des villes de la plaine, dressant ses tentes jusqu’à Sodome. '
  '13':
  - type: text
    content: Or, les gens de Sodome étaient mauvais, ils commettaient beaucoup de péchés contre l’Eternel.
  - type: heading
    content: Abram parcourt le pays promis
  '14':
  - type: text
    content: 'L’Eternel dit à Abram après que Loth se fut séparé de lui : Lève les yeux et regarde depuis l’endroit où tu es, vers le nord, le sud, l’est et l’ouest : '
  '15':
  - type: text
    content: 'tout le pays que tu vois, je te le donnerai, à toi et à ta descendance pour toujours. '
  '16':
  - type: text
    content: 'Je rendrai ta descendance aussi nombreuse que les grains de poussière de la terre ; si l’on peut compter les grains de poussière de la terre, alors on pourra aussi compter ta descendance. '
  '17':
  - type: text
    content: Lève-toi, parcours le pays en long et en large car je te le donnerai.
  '18':
  - type: text
    content: Alors Abram déplaça son campement et vint se fixer près des chênes de Mamré aux environs d’Hébron
  - type: note
    content: L’une des plus anciennes villes du Moyen-Orient (Nb 13.22), à 35 kilomètres au sud-ouest de Jérusalem.
  - type: text
    content: ', et il bâtit là un autel à l’Eternel.'
  '2':
  - type: text
    content: 'Abram était très riche en troupeaux, en argent et en or. '
  '3':
  - type: text
    content: 'D’étape en étape, il retourna du Néguev jusqu’à Béthel, au lieu où il avait auparavant établi son campement, entre Béthel et Aï, '
  '4':
  - type: text
    content: c’est-à-dire à l’endroit où était l’autel qu’il avait précédemment érigé, et il y pria l’Eternel.
  '5':
  - type: text
    content: 'Loth, qui accompagnait Abram, avait aussi des moutons, des chèvres, des bovins et des tentes, '
  '6':
  - type: text
    content: 'et le pays ne suffisait pas pour qu’ils puissent demeurer ensemble, car leurs troupeaux étaient trop nombreux, ils ne pouvaient pas rester ensemble. '
  '7':
  - type: text
    content: Il y eut une dispute entre les bergers d’Abram et ceux de Loth ; or les Cananéens et les Phéréziens
  - type: note
    content: Faisaient partie des populations primitives de ce qui deviendra le pays d’Israël.
  - type: text
    content: ' habitaient alors le pays. '
  '8':
  - type: text
    content: 'Abram dit à Loth : Nous sommes de la même famille. Qu’il n’y ait donc pas de dispute entre nous, entre mes bergers et les tiens. '
  '9':
  - type: text
    content: Séparons-nous plutôt. Tout le pays est à ta disposition. Si tu vas à gauche, j’irai à droite, et si tu vas à droite, j’irai à gauche.
