document_id: GEN.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram se fixe au pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abram quitta donc l’Egypte avec sa femme et tout ce qu’il possédait en direction du Néguev. Loth était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Abram était très riche en troupeaux, en argent et en or. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'D’étape en étape, il retourna du Néguev jusqu’à Béthel, au lieu où il avait auparavant établi son campement, entre Béthel et Aï, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: c’est-à-dire à l’endroit où était l’autel qu’il avait précédemment érigé, et il y pria l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Loth, qui accompagnait Abram, avait aussi des moutons, des chèvres, des bovins et des tentes, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et le pays ne suffisait pas pour qu’ils puissent demeurer ensemble, car leurs troupeaux étaient trop nombreux, ils ne pouvaient pas rester ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il y eut une dispute entre les bergers d’Abram et ceux de Loth ; or les Cananéens et les Phéréziens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Faisaient partie des populations primitives de ce qui deviendra le pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: ' habitaient alors le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abram dit à Loth : Nous sommes de la même famille. Qu’il n’y ait donc pas de dispute entre nous, entre mes bergers et les tiens. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Séparons-nous plutôt. Tout le pays est à ta disposition. Si tu vas à gauche, j’irai à droite, et si tu vas à droite, j’irai à gauche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Loth regarda et vit toute la plaine du Jourdain qui s’étendait jusqu’à Tsoar : avant que l’Eternel eût détruit Sodome et Gomorrhe'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir chap. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
        metadata:
          usfm: GEN.18
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
        metadata:
          usfm: GEN.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', elle était comme le jardin de l’Eternel, comme la terre d’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Loth choisit donc pour lui toute la plaine du Jourdain et il se dirigea vers l’est. Ainsi, ils se séparèrent l’un de l’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abram se fixa dans le pays de Canaan, et Loth s’établit au milieu des villes de la plaine, dressant ses tentes jusqu’à Sodome. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Or, les gens de Sodome étaient mauvais, ils commettaient beaucoup de péchés contre l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram parcourt le pays promis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Eternel dit à Abram après que Loth se fut séparé de lui : Lève les yeux et regarde depuis l’endroit où tu es, vers le nord, le sud, l’est et l’ouest : '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'tout le pays que tu vois, je te le donnerai, à toi et à ta descendance pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je rendrai ta descendance aussi nombreuse que les grains de poussière de la terre ; si l’on peut compter les grains de poussière de la terre, alors on pourra aussi compter ta descendance. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lève-toi, parcours le pays en long et en large car je te le donnerai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Alors Abram déplaça son campement et vint se fixer près des chênes de Mamré aux environs d’Hébron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’une des plus anciennes villes du Moyen-Orient (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 13.22
        metadata:
          usfm: NUM.13.22
      - type: text
        text: ), à 35 kilomètres au sud-ouest de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ', et il bâtit là un autel à l’Eternel.'
