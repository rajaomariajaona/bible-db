document_id: LUK.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut de Zachée
  - type: text
    content: 'Jésus entra dans la ville de Jéricho et la traversa. '
  '10':
  - type: text
    content: 'Car le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est venu chercher et sauver ce qui était perdu.'
  - type: heading
    content: La parabole de l’argent à faire fructifier
  - type: heading
    content: (Mt 25.14-30)
  '11':
  - type: text
    content: 'Comme la foule écoutait ces paroles, Jésus continua en racontant une parabole. En effet, il se rapprochait de Jérusalem et l’on s’imaginait que le royaume de Dieu allait se manifester immédiatement. '
  '12':
  - type: text
    content: 'Voici donc ce qu’il dit : Un homme de famille noble était sur le point de partir pour un pays lointain afin d’y être officiellement nommé roi, avant de revenir ensuite dans ses Etats'
  - type: note
    content: 'Allusion possible à des faits contemporains : après la mort d’Hérode le Grand, son fils Hérode Archélaüs se rendit à Rome pour obtenir sa succession. Les Juifs y envoyèrent une délégation pour s’opposer à sa demande.'
  - type: text
    content: .
  - type: text
    content: ' '
  '13':
  - type: text
    content: Il convoqua dix de ses serviteurs et leur remit, à chacun, une pièce d’or
  - type: note
    content: Il s’agit d’une mine, qui correspondait à la valeur de cent journées de travail.
  - type: text
    content: '. Puis il leur recommanda : « Faites fructifier cet argent jusqu’à mon retour ! »'
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Mais cet homme était détesté par les habitants de son pays. Aussi, ils envoyèrent, derrière lui, une délégation chargée de dire : « Nous ne voulons pas que cet homme-là règne sur nous ! »'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Après avoir été nommé roi, il revint dans son pays et fit appeler les serviteurs auxquels il avait confié l’argent. Il voulait savoir ce qu’ils en avaient retiré.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Le premier se présenta et dit : « Seigneur, ta pièce d’or en a rapporté dix autres. »'
  '17':
  - type: text
    content: ' '
  - type: text
    content: « C’est bien, lui dit le maître, tu es un bon serviteur ! Tu t’es montré fidèle dans une petite affaire. Je te nomme gouverneur de dix villes. »
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'Le deuxième s’approcha et dit : « Seigneur, ta pièce d’or en a rapporté cinq autres. »'
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'Le maître lui dit : « Eh bien, je te confie le gouvernement de cinq villes. »'
  '2':
  - type: text
    content: 'Or, il y avait là un nommé Zachée. Il était chef des collecteurs d’impôts, et riche. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Finalement, un autre vint et dit : « Seigneur, voici ta pièce d’or ; je l’ai gardée enveloppée dans un mouchoir.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: En effet, j’avais peur de toi, parce que tu es un homme sévère ; tu retires de l’argent que tu n’as pas placé, tu moissonnes ce que tu n’as pas semé.
  '22':
  - type: text
    content: ' '
  - type: text
    content: – Vaurien ! dit le maître, tu viens de prononcer ta propre condamnation. Tu savais que je suis un homme sévère, qui retire de l’argent que je n’ai pas placé et qui moissonne ce que je n’ai pas semé.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Pourquoi alors n’as-tu pas déposé mon argent à la banque ? A mon retour, je l’aurais retiré avec les intérêts. »
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Puis il ordonna à ceux qui étaient là : « Retirez-lui cette pièce d’or et donnez-la à celui qui en a dix !'
  '25':
  - type: text
    content: ' '
  - type: text
    content: – Mais, Seigneur, lui firent-ils remarquer, il a déjà dix pièces !
  '26':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien, je vous le déclare, à celui qui a, on donnera encore, mais à celui qui n’a pas, on ôtera même ce qu’il a.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Quant à mes ennemis qui n’ont pas voulu que je règne sur eux, amenez-les moi et qu’on les mette à mort devant moi. »
  - type: heading
    content: 'À Jérusalem : ministère de Jésus'
  - type: heading
    content: L’entrée du Roi à Jérusalem
  - type: heading
    content: (Mt 21.1-11, 15-17 ; Mc 11.1-10 ; Jn 12.12-16)
  '28':
  - type: text
    content: Après avoir dit cela, Jésus partit, suivi de ses disciples, pour monter à Jérusalem.
  '29':
  - type: text
    content: 'Comme il approchait de Bethphagé et de Béthanie, près de la colline appelée « mont des Oliviers », il envoya deux de ses disciples '
  '3':
  - type: text
    content: 'Il cherchait à voir qui était Jésus, mais il ne le pouvait pas à cause de la foule, car il était petit. '
  '30':
  - type: text
    content: 'en disant : '
  - type: text
    content: Allez à ce village qui est devant vous. Dès que vous y serez entrés, vous trouverez un ânon attaché que personne n’a encore monté. Détachez-le et conduisez-le ici.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Si quelqu’un vous demande : « Pourquoi le détachez-vous ? », vous lui répondrez simplement : « Parce que le Seigneur en a besoin. »'
  '32':
  - type: text
    content: Ceux qu’il avait envoyés partirent et trouvèrent les choses comme Jésus l’avait dit.
  '33':
  - type: text
    content: 'Au moment où ils détachaient l’ânon, ses propriétaires leur demandèrent : Pourquoi détachez-vous cet ânon ?'
  '34':
  - type: text
    content: 'Ils répondirent : Parce que le Seigneur en a besoin.'
  '35':
  - type: text
    content: Et ils le conduisirent à Jésus. Après avoir posé leurs manteaux sur le dos de l’animal, ils y firent monter Jésus.
  '36':
  - type: text
    content: 'Sur son passage, les gens étendaient leurs manteaux sur le chemin. '
  '37':
  - type: text
    content: 'Comme ils approchaient de Jérusalem, en descendant du mont des Oliviers, toute la multitude des disciples, dans un élan de joie, se mit à louer Dieu d’une voix forte pour tous les miracles qu’ils avaient vus : '
  '38':
  - type: text
    content: Béni soit le roi qui vient au nom du Seigneur
  - type: text
    content: ', disaient-ils. '
  - type: text
    content: Paix dans le ciel, et gloire à Dieu au plus haut des cieux
  - type: note
    content: Ps 118.26.
  - type: text
    content: '!'
  '39':
  - type: text
    content: 'A ce moment-là, quelques pharisiens qui se trouvaient dans la foule interpellèrent Jésus : Maître, fais taire tes disciples !'
  '4':
  - type: text
    content: Alors il courut en avant et grimpa sur un sycomore pour voir Jésus qui devait passer par là.
  '40':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Je vous le déclare, s’ils se taisent, les pierres crieront !
  - type: heading
    content: Le sort de Jérusalem
  '41':
  - type: text
    content: 'Quand il fut arrivé près de la ville et qu’il la vit, il pleura sur elle : '
  '42':
  - type: text
    content: Ah,
  - type: text
    content: ' dit-il, '
  - type: text
    content: si seulement tu avais compris, toi aussi, en ce jour, de quoi dépend ta paix ! Mais, hélas, à présent, tout cela est caché à tes yeux.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Des jours de malheur vont fondre sur toi. Tes ennemis t’entoureront d’ouvrages de siège, t’encercleront et te presseront de tous côtés.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Ils te détruiront complètement, toi et les habitants qui seront dans tes murs, et ils ne laisseront pas chez toi une pierre sur une autre. Pourquoi ? Parce que tu n’as pas su reconnaître le moment où Dieu est intervenu pour toi.
  - type: heading
    content: Jésus enseigne dans le Temple
  - type: heading
    content: (Mt 21.12-13 ; Mc 11.15-19 ; voir Jn 2.13-16)
  '45':
  - type: text
    content: 'Jésus entra dans la cour du Temple et se mit à en chasser les marchands. Il leur dit : '
  '46':
  - type: text
    content: 'Il est écrit : '
  - type: text
    content: Ma maison sera une maison de prière
  - type: text
    content: ' mais vous, vous en avez fait '
  - type: text
    content: une caverne de brigands
  - type: note
    content: Es 56.7 ; Jr 7.11.
  - type: text
    content: '!'
  '47':
  - type: text
    content: 'Jésus enseignait tous les jours dans la cour du Temple. Les chefs des prêtres et les spécialistes de la Loi, ainsi que les chefs du peuple, cherchaient à le faire mourir. '
  '48':
  - type: text
    content: Mais ils ne savaient comment s’y prendre, car tout le peuple l’écoutait attentivement.
  '5':
  - type: text
    content: 'Lorsque Jésus fut parvenu à cet endroit, il leva les yeux et l’interpella : '
  - type: text
    content: Zachée, dépêche-toi de descendre, car c’est chez toi que je dois aller loger aujourd’hui.
  '6':
  - type: text
    content: Zachée se dépêcha de descendre et reçut Jésus avec joie.
  '7':
  - type: text
    content: 'Quand les gens virent cela, il y eut un murmure d’indignation. Ils disaient : Voilà qu’il s’en va loger chez ce pécheur !'
  '8':
  - type: text
    content: 'Mais Zachée se présenta devant le Seigneur et lui dit : Seigneur, je donne la moitié de mes biens aux pauvres et, si j’ai pris trop d’argent à quelqu’un, je lui rends quatre fois plus.'
  '9':
  - type: text
    content: 'Jésus lui dit alors : '
  - type: text
    content: Aujourd’hui, le salut est entré dans cette maison, parce que cet homme est, lui aussi, un fils d’
  - type: text
    content: Abraham
  - type: text
    content: .
  - type: text
    content: ' '
