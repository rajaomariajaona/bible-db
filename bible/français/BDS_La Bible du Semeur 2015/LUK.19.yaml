document_id: LUK.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut de Zachée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus entra dans la ville de Jéricho et la traversa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' est venu chercher et sauver ce qui était perdu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole de l’argent à faire fructifier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 25.14-30)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme la foule écoutait ces paroles, Jésus continua en racontant une parabole. En effet, il se rapprochait de Jérusalem et l’on s’imaginait que le royaume de Dieu allait se manifester immédiatement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici donc ce qu’il dit : Un homme de famille noble était sur le point de partir pour un pays lointain afin d’y être officiellement nommé roi, avant de revenir ensuite dans ses Etats'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion possible à des faits contemporains : après la mort d’Hérode le Grand, son fils Hérode Archélaüs se rendit à Rome pour obtenir sa succession. Les Juifs y envoyèrent une délégation pour s’opposer à sa demande.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il convoqua dix de ses serviteurs et leur remit, à chacun, une pièce d’or
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit d’une '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mine, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: qui correspondait à la valeur de cent journées de travail.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '. Puis il leur recommanda : « Faites fructifier cet argent jusqu’à mon retour ! »'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais cet homme était détesté par les habitants de son pays. Aussi, ils envoyèrent, derrière lui, une délégation chargée de dire : « Nous ne voulons pas que cet homme-là règne sur nous ! »'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Après avoir été nommé roi, il revint dans son pays et fit appeler les serviteurs auxquels il avait confié l’argent. Il voulait savoir ce qu’ils en avaient retiré.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le premier se présenta et dit : « Seigneur, ta pièce d’or en a rapporté dix autres. »'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « C’est bien, lui dit le maître, tu es un bon serviteur ! Tu t’es montré fidèle dans une petite affaire. Je te nomme gouverneur de dix villes. »
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le deuxième s’approcha et dit : « Seigneur, ta pièce d’or en a rapporté cinq autres. »'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le maître lui dit : « Eh bien, je te confie le gouvernement de cinq villes. »'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or, il y avait là un nommé Zachée. Il était chef des collecteurs d’impôts, et riche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Finalement, un autre vint et dit : « Seigneur, voici ta pièce d’or ; je l’ai gardée enveloppée dans un mouchoir.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, j’avais peur de toi, parce que tu es un homme sévère ; tu retires de l’argent que tu n’as pas placé, tu moissonnes ce que tu n’as pas semé.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Vaurien ! dit le maître, tu viens de prononcer ta propre condamnation. Tu savais que je suis un homme sévère, qui retire de l’argent que je n’ai pas placé et qui moissonne ce que je n’ai pas semé.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi alors n’as-tu pas déposé mon argent à la banque ? A mon retour, je l’aurais retiré avec les intérêts. »
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Puis il ordonna à ceux qui étaient là : « Retirez-lui cette pièce d’or et donnez-la à celui qui en a dix !'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Mais, Seigneur, lui firent-ils remarquer, il a déjà dix pièces !
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Eh bien, je vous le déclare, à celui qui a, on donnera encore, mais à celui qui n’a pas, on ôtera même ce qu’il a.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quant à mes ennemis qui n’ont pas voulu que je règne sur eux, amenez-les moi et qu’on les mette à mort devant moi. »
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'À Jérusalem : ministère de Jésus'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’entrée du Roi à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.1-11, 15-17 ; Mc 11.1-10 ; Jn 12.12-16)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Après avoir dit cela, Jésus partit, suivi de ses disciples, pour monter à Jérusalem.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Comme il approchait de Bethphagé et de Béthanie, près de la colline appelée « mont des Oliviers », il envoya deux de ses disciples '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il cherchait à voir qui était Jésus, mais il ne le pouvait pas à cause de la foule, car il était petit. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'en disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez à ce village qui est devant vous. Dès que vous y serez entrés, vous trouverez un ânon attaché que personne n’a encore monté. Détachez-le et conduisez-le ici.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un vous demande : « Pourquoi le détachez-vous ? », vous lui répondrez simplement : « Parce que le Seigneur en a besoin. »'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ceux qu’il avait envoyés partirent et trouvèrent les choses comme Jésus l’avait dit.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Au moment où ils détachaient l’ânon, ses propriétaires leur demandèrent : Pourquoi détachez-vous cet ânon ?'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ils répondirent : Parce que le Seigneur en a besoin.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Et ils le conduisirent à Jésus. Après avoir posé leurs manteaux sur le dos de l’animal, ils y firent monter Jésus.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Sur son passage, les gens étendaient leurs manteaux sur le chemin. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Comme ils approchaient de Jérusalem, en descendant du mont des Oliviers, toute la multitude des disciples, dans un élan de joie, se mit à louer Dieu d’une voix forte pour tous les miracles qu’ils avaient vus : '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Béni soit le roi qui vient au nom du Seigneur
    - type: text
      text: ', disaient-ils. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Paix dans le ciel, et gloire à Dieu au plus haut des cieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.26
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'A ce moment-là, quelques pharisiens qui se trouvaient dans la foule interpellèrent Jésus : Maître, fais taire tes disciples !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Alors il courut en avant et grimpa sur un sycomore pour voir Jésus qui devait passer par là.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le déclare, s’ils se taisent, les pierres crieront !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sort de Jérusalem
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Quand il fut arrivé près de la ville et qu’il la vit, il pleura sur elle : '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ah,
    - type: text
      text: ' dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: si seulement tu avais compris, toi aussi, en ce jour, de quoi dépend ta paix ! Mais, hélas, à présent, tout cela est caché à tes yeux.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Des jours de malheur vont fondre sur toi. Tes ennemis t’entoureront d’ouvrages de siège, t’encercleront et te presseront de tous côtés.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils te détruiront complètement, toi et les habitants qui seront dans tes murs, et ils ne laisseront pas chez toi une pierre sur une autre. Pourquoi ? Parce que tu n’as pas su reconnaître le moment où Dieu est intervenu pour toi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enseigne dans le Temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 21.12-13 ; Mc 11.15-19 ; voir Jn 2.13-16)
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jésus entra dans la cour du Temple et se mit à en chasser les marchands. Il leur dit : '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il est écrit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Ma maison sera une maison de prière
      - type: text
        text: ' mais vous, vous en avez fait '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: une caverne de brigands
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 56.7 ; Jr 7.11.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '!'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Jésus enseignait tous les jours dans la cour du Temple. Les chefs des prêtres et les spécialistes de la Loi, ainsi que les chefs du peuple, cherchaient à le faire mourir. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Mais ils ne savaient comment s’y prendre, car tout le peuple l’écoutait attentivement.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsque Jésus fut parvenu à cet endroit, il leva les yeux et l’interpella : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Zachée, dépêche-toi de descendre, car c’est chez toi que je dois aller loger aujourd’hui.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Zachée se dépêcha de descendre et reçut Jésus avec joie.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand les gens virent cela, il y eut un murmure d’indignation. Ils disaient : Voilà qu’il s’en va loger chez ce pécheur !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Zachée se présenta devant le Seigneur et lui dit : Seigneur, je donne la moitié de mes biens aux pauvres et, si j’ai pris trop d’argent à quelqu’un, je lui rends quatre fois plus.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus lui dit alors : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aujourd’hui, le salut est entré dans cette maison, parce que cet homme est, lui aussi, un fils d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: .
    - type: text
      text: ' '
