document_id: PSA.52,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fin d’un arriviste
  - type: text
    content: 'Au chef de chœur : une méditation'
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' de David, '
  '10':
  - type: text
    content: Mais moi, je suis comme un olivier verdoyant ╵dans la maison de Dieu.
  - type: text
    content: Je compte sur l’amour de Dieu ╵à toujours, à jamais.
  '11':
  - type: text
    content: Je te célébrerai toujours ╵pour ce que tu as fait.
  - type: text
    content: Je veux m’attendre à toi,
  - type: text
    content: car ta bonté se manifeste ╵à ceux qui te sont attachés.
  '2':
  - type: text
    content: qu’il composa lorsque Doëg l’Edomite vint informer Saül que David était entré dans la maison d’Ahimélek
  - type: note
    content: Voir 1 S 21.8 ; 22.9-10.
  - type: text
    content: .
  '3':
  - type: text
    content: Toi qui es fort, ╵qu’as-tu à te vanter ╵de ta méchanceté ?
  - type: text
    content: 'Vois : la bonté de Dieu ╵se manifeste chaque jour.'
  '4':
  - type: text
    content: Ta langue trame des projets ╵de destruction,
  - type: text
    content: c’est un rasoir bien affilé, ╵elle est habile pour tromper.
  '5':
  - type: text
    content: Tu as donné ta préférence ╵au mal plutôt qu’au bien,
  - type: text
    content: tu as préféré le mensonge ╵à la sincérité.
  - type: text
    content: Pause
  '6':
  - type: text
    content: Tu aimes les mots qui détruisent,
  - type: text
    content: ta langue n’est que tromperie.
  '7':
  - type: text
    content: C’est pourquoi Dieu te détruira ╵définitivement.
  - type: text
    content: Il te saisira dans ta tente, ╵et il t’en chassera,
  - type: text
    content: il arrachera tes racines ╵du pays des vivants.
  - type: text
    content: Pause
  '8':
  - type: text
    content: Alors les justes le verront ╵et ils seront saisis de crainte,
  - type: text
    content: 'ils se riront de toi :'
  '9':
  - type: text
    content: « Le voici, l’homme ╵qui ne prenait pas Dieu ╵pour forteresse,
  - type: text
    content: celui qui se fiait ╵à ses grandes richesses
  - type: text
    content: et qui se croyait fort ╵par ses actes destructeurs
  - type: note
    content: 'La version syriaque a : richesse.'
  - type: text
    content: '  ! »'
