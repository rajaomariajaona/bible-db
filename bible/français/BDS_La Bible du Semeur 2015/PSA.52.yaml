document_id: PSA.52
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin d’un arriviste
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur : une méditation'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Signification incertaine.
    marker-yv: yv-n
  - type: text
    text: ' de David, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: qu’il composa lorsque Doëg l’Edomite vint informer Saül que David était entré dans la maison d’Ahimélek
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 S 21.8 ; 22.9-10.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toi qui es fort, ╵qu’as-tu à te vanter ╵de ta méchanceté ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vois : la bonté de Dieu ╵se manifeste chaque jour.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ta langue trame des projets ╵de destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est un rasoir bien affilé, ╵elle est habile pour tromper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu as donné ta préférence ╵au mal plutôt qu’au bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as préféré le mensonge ╵à la sincérité.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu aimes les mots qui détruisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta langue n’est que tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C’est pourquoi Dieu te détruira ╵définitivement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il te saisira dans ta tente, ╵et il t’en chassera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il arrachera tes racines ╵du pays des vivants.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors les justes le verront ╵et ils seront saisis de crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils se riront de toi :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Le voici, l’homme ╵qui ne prenait pas Dieu ╵pour forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui se fiait ╵à ses grandes richesses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui se croyait fort ╵par ses actes destructeurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version syriaque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: richesse.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais moi, je suis comme un olivier verdoyant ╵dans la maison de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je compte sur l’amour de Dieu ╵à toujours, à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je te célébrerai toujours ╵pour ce que tu as fait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux m’attendre à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ta bonté se manifeste ╵à ceux qui te sont attachés.
