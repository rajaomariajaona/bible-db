document_id: 1TI.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie de l’Église
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel à la prière
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je recommande en tout premier lieu que l’on adresse à Dieu des demandes, des prières, des supplications et des remerciements pour tous les hommes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais plutôt d’œuvres bonnes, comme il convient à des femmes qui déclarent vivre pour Dieu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la femme reçoive l’instruction dans un esprit de paix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en silence.
      marker-yv: yv-n
    - type: text
      text: ' et de parfaite soumission. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne permets pas à une femme d’enseigner, ni de prendre autorité sur l’homme. Qu’elle garde plutôt une attitude paisible. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Adam fut créé le premier, Eve ensuite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas Adam qui a été détourné de la vérité, c’est la femme, et elle a désobéi au commandement de Dieu, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais elle sera sauvée grâce à sa descendance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 3.15
        - type: text
          text: '. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en devenant mère.
      marker-yv: yv-n
    - type: text
      text: . Quant aux femmes, elles seront sauvées si elles persévèrent dans la foi, dans l’amour, et dans une vie sainte en gardant en tout le sens de la mesure.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l’on prie pour les rois et pour tous ceux qui sont au pouvoir, afin que nous puissions mener, à l’abri de toute violence et dans la paix, une vie qui exprime, dans tous ses aspects, notre piété et qui commande le respect. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà ce qui est bien devant Dieu, notre Sauveur, ce qu’il approuve. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car il veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il y a un seul Dieu, et de même aussi un seul médiateur entre Dieu et les hommes, un homme : Jésus-Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a offert sa vie en rançon pour tous. Tel est le témoignage qui a été rendu au moment voulu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pour publier ce témoignage que j’ai été institué prédicateur et apôtre (je dis la vérité, je ne mens pas), pour enseigner aux non-Juifs ce qui concerne la foi et la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur l’attitude des hommes et des femmes dans la communauté
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi je veux qu’en tout lieu les hommes prient en élevant vers le ciel des mains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’un des gestes de la prière chez les Juifs (Ex 9.29 ; 1 R 8.22).
      marker-yv: yv-n
    - type: text
      text: ' pures, sans colère ni esprit de dispute.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux que les femmes agissent de même, en s’habillant décemment, avec discrétion et simplicité. Qu’elles ne se parent pas d’une coiffure recherchée, d’or, de perles ou de toilettes somptueuses, '
