document_id: JER.34
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Message au roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici quel message l’Eternel adressa à Jérémie lorsque Nabuchodonosor, roi de Babylone, et toute son armée, ainsi que tous les royaumes de la terre soumis à sa domination et tous les peuples combattaient contre Jérusalem et contre toutes les villes de son territoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 25.1-11 ; 2 Ch 36.17-21 ; Jr 21.2.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que dit l’Eternel, le Dieu d’Israël : Va dire à Sédécias, roi de Juda : Voici ce que dit l’Eternel : Je vais livrer cette ville au roi de Babylone qui y mettra le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quant à toi, tu ne lui échapperas pas, non, tu seras bel et bien capturé et tu lui seras livré. Tu le verras en face et il te parlera lui-même, oui, tu iras à Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pourtant, écoute ce que dit l’Eternel, ô Sédécias, roi de Juda : Voici ce que déclare l’Eternel à ton sujet : Tu ne mourras pas par l’épée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mais tu mourras paisiblement. Comme on a allumé un brasier pour tes ancêtres qui étaient avant toi sur le trône royal, ainsi l’on allumera un brasier en ton honneur, et l’on entonnera pour toi une élégie funèbre : « Hélas ! notre seigneur ! » Moi, l’Eternel, j’en fais la promesse et je le déclare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le prophète Jérémie rapporta toutes ces paroles à Sédécias, roi de Juda, à Jérusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: pendant que l’armée du roi de Babylone combattait Jérusalem et toutes les villes de Juda qui tenaient encore, c’est-à-dire Lakish et Azéqa, car c’étaient là les places fortes de Juda qui résistaient encore.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Des esclaves libérés puis repris
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voici la parole que l’Eternel adressa à Jérémie.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi Sédécias avait conclu une alliance avec toute la population de Jérusalem pour que l’on proclame la libération de tous les esclaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Chacun devait affranchir ses esclaves hébreux, hommes ou femmes, en sorte que personne ne retienne plus son compatriote judéen comme esclave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous les dirigeants et toute la population avaient conclu cette alliance et s’étaient engagés à libérer chacun son esclave, homme ou femme, pour ne plus les retenir dans la servitude. Ils avaient tenu parole et avaient libéré leurs esclaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais par la suite, ils revinrent sur leur décision et reprirent leurs anciens esclaves, hommes et femmes, qu’ils avaient affranchis, pour les soumettre de nouveau à la servitude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est alors que l’Eternel adressa la parole à Jérémie en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ce que déclare l’Eternel, Dieu d’Israël : J’avais moi-même conclu une alliance avec vos ancêtres quand je les ai fait sortir d’Egypte, du pays où ils étaient esclaves, en leur disant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 21.2-3 ; Dt 15.12-15.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '« Au bout de sept ans, chacun de vous laissera partir libre son compatriote hébreu qui se sera vendu à lui comme esclave. Celui-ci servira pendant six ans, et la septième année vous l’affranchirez. » Mais vos ancêtres ne m’ont pas obéi, ils n’ont pas prêté attention à mes paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Or vous-mêmes, vous avez changé de conduite et vous avez fait ce que je considère comme juste en annonçant chacun la libération de son prochain. Vous avez pris des engagements par une alliance à ce sujet, devant moi, dans le Temple qui m’appartient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: où je suis invoqué.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais ensuite, vous êtes revenus sur votre parole et vous m’avez déshonoré, car chacun de vous a repris ses anciens esclaves, hommes et femmes, que vous aviez affranchis, et à qui vous aviez permis de disposer d’eux-mêmes à leur gré ; vous les avez forcés à redevenir vos esclaves et vos servantes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’est pourquoi, voici ce que déclare l’Eternel : Puisque vous ne m’avez pas obéi en déclarant libre chacun son compatriote et son prochain, eh bien, moi, je proclame votre « libération » – l’Eternel le déclare – votre libération pour l’épée, la peste et la famine, et vous inspirerez l’effroi à tous les royaumes de la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je livrerai ces hommes qui ont transgressé cette alliance que j’avais ratifiée. Car vous n’avez pas tenu les engagements que vous aviez pris lorsque vous avez conclu cette alliance devant moi en coupant un veau en deux et en passant entre les deux moitiés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 15.9-18
        metadata:
          usfm: GEN.15.9+GEN.15.10+GEN.15.11+GEN.15.12+GEN.15.13+GEN.15.14+GEN.15.15+GEN.15.16+GEN.15.17+GEN.15.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous, les dirigeants de Juda et de Jérusalem, les hauts fonctionnaires de la cour, les prêtres et tous les gens du pays qui êtes passés entre les deux moitiés du veau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: je vous livrerai à vos ennemis et à ceux qui en veulent à votre vie, et vos cadavres serviront de pâture aux rapaces et aux animaux sauvages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant à Sédécias, roi de Juda, et à ses ministres, je les livrerai à leurs ennemis et à ceux qui veulent leur mort, à l’armée du roi de Babylone qui vient de lever le siège
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A cause de l’approche de l’armée égyptienne venue au secours des Judéens en 588 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37.5-11
        metadata:
          usfm: JER.37.5+JER.37.6+JER.37.7+JER.37.8+JER.37.9+JER.37.10+JER.37.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je vais donner mes ordres – l’Eternel le déclare – et je les ferai revenir devant cette ville ; ils l’attaqueront, ils s’en empareront et ils y mettront le feu. Et je ferai en sorte que les villes de Juda soient dévastées et privées d’habitants.
