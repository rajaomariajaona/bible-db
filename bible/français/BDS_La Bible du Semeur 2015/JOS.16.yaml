document_id: JOS.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire des descendants de Joseph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les descendants de Joseph reçurent par tirage au sort un territoire dont la frontière commençait au Jourdain près de Jéricho, à l’est des sources qui alimentaient la ville. De là, elle gravissait la montagne dans le désert vers Béthel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens d’Ephraïm ne dépossédèrent pas les Cananéens établis à Guézer. Ceux-ci continuèrent à vivre au milieu des gens d’Ephraïm qui leur imposèrent des corvées. Ils y demeurent encore aujourd’hui.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: puis elle continuait jusqu’à Louz
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 1-2 : Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de là, elle gravissait… '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu’à Louz, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de Béthel (c’est-à-dire Louz), elle… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 28.19
        - type: text
          text: ', les noms de Béthel et de Louz désignent la même ville.'
      marker-yv: yv-n
    - type: text
      text: ' et passait le long du territoire des Arkiens à Ataroth. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, elle descendait à l’ouest vers celui des Yapheléthiens jusqu’au territoire de Beth-Horôn-la-Basse et jusqu’à Guézer, pour aboutir à la mer Méditerranée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel est le patrimoine qui échut aux descendants des fils de Joseph, Manassé et Ephraïm.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de la tribu d’Ephraïm
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le territoire des descendants d’Ephraïm pour leurs familles : leur frontière allait du côté est d’Ataroth-Addar jusqu’à Beth-Horôn-la-Haute, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis se prolongeait jusqu’à la mer. Au nord, elle passait à Mikmetath et tournait à l’est vers Taanath-Silo qu’elle traversait vers l’est en direction de Yanoah, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’où elle descendait à Ataroth et à Naarata, touchait Jéricho et aboutissait au Jourdain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Tappouah, elle allait vers l’ouest au torrent de Qana pour rejoindre la mer. Tel fut le patrimoine des familles de la tribu d’Ephraïm, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avec les villes et les villages qui en dépendent et qui leur furent réservés dans le territoire de la tribu de Manassé.
