document_id: JOS.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire des descendants de Joseph
  - type: text
    content: 'Les descendants de Joseph reçurent par tirage au sort un territoire dont la frontière commençait au Jourdain près de Jéricho, à l’est des sources qui alimentaient la ville. De là, elle gravissait la montagne dans le désert vers Béthel, '
  '10':
  - type: text
    content: Les gens d’Ephraïm ne dépossédèrent pas les Cananéens établis à Guézer. Ceux-ci continuèrent à vivre au milieu des gens d’Ephraïm qui leur imposèrent des corvées. Ils y demeurent encore aujourd’hui.
  '2':
  - type: text
    content: puis elle continuait jusqu’à Louz
  - type: note
    content: 'Voir v. 1-2 : Au lieu de de là, elle gravissait… jusqu’à Louz, l’ancienne version grecque a : de Béthel (c’est-à-dire Louz), elle… En Gn 28.19, les noms de Béthel et de Louz désignent la même ville.'
  - type: text
    content: ' et passait le long du territoire des Arkiens à Ataroth. '
  '3':
  - type: text
    content: 'Ensuite, elle descendait à l’ouest vers celui des Yapheléthiens jusqu’au territoire de Beth-Horôn-la-Basse et jusqu’à Guézer, pour aboutir à la mer Méditerranée. '
  '4':
  - type: text
    content: Tel est le patrimoine qui échut aux descendants des fils de Joseph, Manassé et Ephraïm.
  - type: heading
    content: Le territoire de la tribu d’Ephraïm
  '5':
  - type: text
    content: 'Voici le territoire des descendants d’Ephraïm pour leurs familles : leur frontière allait du côté est d’Ataroth-Addar jusqu’à Beth-Horôn-la-Haute, '
  '6':
  - type: text
    content: 'puis se prolongeait jusqu’à la mer. Au nord, elle passait à Mikmetath et tournait à l’est vers Taanath-Silo qu’elle traversait vers l’est en direction de Yanoah, '
  '7':
  - type: text
    content: 'd’où elle descendait à Ataroth et à Naarata, touchait Jéricho et aboutissait au Jourdain. '
  '8':
  - type: text
    content: 'De Tappouah, elle allait vers l’ouest au torrent de Qana pour rejoindre la mer. Tel fut le patrimoine des familles de la tribu d’Ephraïm, '
  '9':
  - type: text
    content: avec les villes et les villages qui en dépendent et qui leur furent réservés dans le territoire de la tribu de Manassé.
