document_id: 2KI.7
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elisée répondit : Ecoutez ce que dit l’Eternel. Voici ce qu’il déclare : « Demain, à cette heure, sur la place de Samarie à la porte de la ville, on vendra dix kilos de fine farine pour une pièce d’argent et vingt kilos d’orge pour le même prix. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’aide de camp du roi qui l’accompagnait répondit à l’homme de Dieu : Même si l’Eternel perçait des trous dans le ciel, comment pareille chose pourrait-elle se réaliser ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisée répliqua : Tu le verras de tes propres yeux, mais tu n’en mangeras pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des hommes à la peau malade se rendent au camp des Syriens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Près de la porte d’entrée de la ville se trouvaient quatre hommes atteints d’une maladie de peau rendant impur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur cette maladie, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13.2
        metadata:
          usfm: LEV.13.2
      - type: text
        text: ' et la note. Ce type d’affection de la peau rendait rituellement impur et ceux qui en étaient atteints n’avaient pas le droit d’habiter dans les localités (Lv 13.46 ; Nb 5.2-3 ; 2 R 15.5 ; Lc 17.12).'
    marker-yv: yv-n
  - type: text
    text: '. Ils se dirent l’un à l’autre : A quoi bon rester ici à attendre la mort ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si nous décidons d’entrer dans la ville, nous y mourrons, car la famine y règne. Si nous restons ici, nous mourrons également. Venez, descendons plutôt au camp des Syriens et rendons-nous à eux ! S’ils nous laissent vivre, tant mieux, et s’ils nous font mourir, eh bien ! nous mourrons !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vers le soir, ils se préparèrent donc à descendre au camp des Syriens. Lorsqu’ils furent arrivés à la limite du camp, il n’y avait plus personne. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le Seigneur avait fait entendre aux assiégeants le bruit d’une grande armée venant avec des chars et des chevaux. Les Syriens s’étaient dit l’un à l’autre : Le roi d’Israël a certainement enrôlé contre nous les rois des Hittites'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rois de petits Etats dirigés par des dynasties d’origine hittite au nord de la Syrie après la chute du grand Empire hittite en Asie Mineure (vers 1200 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: ' et les rois des Egyptiens'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Musrim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Mousrites) à la place de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mizrim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Egyptiens). Les Mousrites étaient installés en Cilicie et s’adonnaient à l’élevage des chevaux (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10.28-29
        metadata:
          usfm: 1KI.10.28+1KI.10.29
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' pour qu’ils viennent nous attaquer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ainsi, pour sauver leurs vies, ils se levèrent et s’enfuirent à la tombée de la nuit, abandonnant leurs tentes, leurs chevaux, leurs ânes et laissant leur camp tel quel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsque les hommes affectés d’une maladie de la peau furent donc arrivés à la limite du camp, ils entrèrent dans une tente, où ils mangèrent et burent ce qu’ils y trouvèrent. Puis ils emportèrent de l’argent, de l’or et des vêtements pour les cacher ailleurs. Ensuite, ils revinrent et pénétrèrent sous une autre tente, y prirent ce qu’ils trouvèrent et allèrent encore le cacher.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les malades de la peau informent le roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis ils se dirent l’un à l’autre : Ce n’est pas bien, ce que nous faisons là ! Ce jour est un jour de bonne nouvelle. Si nous gardons cette bonne nouvelle pour nous et si nous attendons qu’il fasse jour pour la publier, le châtiment nous atteindra. Venez maintenant, allons prévenir le palais royal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils retournèrent à la ville et appelèrent les sentinelles. Ils leur firent ce rapport : Nous avons poussé jusqu’au camp des Syriens, et voici qu’il n’y a plus personne, on n’y entend plus une seule voix humaine ; il reste seulement des chevaux et des ânes attachés, les tentes ont été abandonnées telles quelles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les sentinelles de la porte appelèrent quelqu’un de l’intérieur pour transmettre la nouvelle au palais royal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le roi se leva au milieu de la nuit et dit à ses ministres : A mon avis, voici ce que les Syriens sont en train de machiner contre nous : ils savent que nous sommes affamés, c’est pourquoi ils ont quitté leur camp pour se cacher dans la campagne. Ils doivent se dire : « Les assiégés vont sortir de la ville, alors nous les saisirons vivants et nous pénétrerons dans la ville. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’un des ministres proposa la chose suivante : On pourrait envoyer quelques hommes et les cinq chevaux qui nous restent encore dans la ville. Nous n’avons rien à y perdre, car ils connaîtront le même sort que celui de toute la multitude d’Israël qui reste dans la ville et qui va vers sa fin. Envoyons-les donc et nous verrons bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On équipa donc deux chars attelés de chevaux, et le roi envoya une patrouille à la recherche de l’armée syrienne en leur disant d’aller voir ce qui se passait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La patrouille suivit les traces de l’armée syrienne jusqu’au Jourdain. Les hommes virent la route toute jonchée de vêtements et de matériel que les Syriens avaient abandonnés dans leur précipitation. Ils revinrent faire leur rapport au roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prédictions d’Elisée se réalisent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors le peuple de Samarie se précipita vers le camp des Syriens pour le piller. C’est ainsi que l’on put acheter dix kilos de fine farine ou vingt kilos d’orge pour une pièce d’argent, comme l’Eternel l’avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le roi avait chargé son aide de camp qui l’accompagnait de surveiller la porte de la ville, mais celui-ci fut piétiné là par la foule et il mourut, comme l’homme de Dieu l’avait annoncé au moment où le roi était venu le trouver. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, c’est à ce moment qu’il avait dit au roi : Demain, à cette heure, sur la place de Samarie, à la porte de la ville, on pourra acheter vingt kilos d’orge ou dix kilos de fine farine pour une pièce d’argent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et l’aide de camp lui avait répliqué : Même si l’Eternel perçait des trous dans le ciel, comment pareille chose pourrait-elle se réaliser ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A quoi Elisée avait répondu : Tu le verras de tes propres yeux, mais tu n’en mangeras pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est bien en effet ce qui lui arriva : la foule le piétina à la porte de la ville, et il mourut.'
