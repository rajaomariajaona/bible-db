document_id: JOB.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu rend le bonheur à qui s’adresse à lui
  - type: text
    content: Maintenant donc, appelle, ╵pour voir si quelqu’un te répond.
  - type: text
    content: A quel saint ange
  - type: note
    content: 'Autre traduction : saint homme.'
  - type: text
    content: ' t’adresseras-tu ?'
  '10':
  - type: text
    content: C’est lui qui fait tomber la pluie ╵sur la surface de la terre
  - type: text
    content: et qui répand les eaux ╵à travers les campagnes.
  '11':
  - type: text
    content: Ceux qui sont abaissés, ╵bien haut il les élève,
  - type: text
    content: ceux qui sont affligés ╵trouvent la délivrance.
  '12':
  - type: text
    content: Il déjoue les intrigues ╵des plus rusés
  - type: text
    content: de sorte que leur main ╵ne peut assurer leur salut.
  '13':
  - type: text
    content: Il attrape les sages ╵au piège de leur propre ruse
  - type: note
    content: Cité en 1 Co 3.19.
  - type: text
    content: ','
  - type: text
    content: et les projets des plus perfides ╵il les prend de vitesse.
  '14':
  - type: text
    content: En plein jour, ils rencontrent ╵de profondes ténèbres,
  - type: text
    content: à midi, ils tâtonnent ╵comme à la nuit tombée.
  '15':
  - type: text
    content: Il arrache le pauvre ╵de l’épée de leur bouche,
  - type: text
    content: il sauve l’indigent ╵de la main du puissant.
  '16':
  - type: text
    content: Ainsi le miséreux ╵a de quoi espérer,
  - type: text
    content: et la perversité ╵a la bouche fermée.
  '17':
  - type: text
    content: Ah ! certes, bienheureux ╵celui que Dieu corrige,
  - type: text
    content: qui n’a pas de mépris ╵pour les leçons du Tout-Puissant
  - type: note
    content: Voir Pr 3.11 ; Hé 12.5-6.
  - type: text
    content: .
  '18':
  - type: text
    content: Car Dieu inflige la blessure, ╵mais il la panse aussi
  - type: text
    content: et même s’il meurtrit, ╵sa main guérit ensuite.
  '19':
  - type: text
    content: Six fois, dans la détresse, ╵il te délivrera.
  - type: text
    content: Dans sept calamités, ╵le mal t’épargnera.
  '2':
  - type: text
    content: Car c’est l’emportement ╵qui tue un insensé,
  - type: text
    content: c’est la colère ╵qui fait périr le sot.
  '20':
  - type: text
    content: Au temps de la famine, ╵il te gardera de la mort
  - type: text
    content: au milieu du combat, ╵il te préservera du glaive.
  '21':
  - type: text
    content: Tu seras à l’abri ╵du fouet de la langue
  - type: text
    content: et tu ne craindras pas ╵le désastre à venir.
  '22':
  - type: text
    content: Tu pourras te moquer ╵de la dévastation ╵comme de la disette,
  - type: text
    content: et tu n’auras pas peur ╵des animaux sauvages.
  '23':
  - type: text
    content: Un pacte te liera ╵aux pierres de la terre,
  - type: text
    content: et quant aux animaux sauvages, ╵ils seront en paix avec toi.
  '24':
  - type: text
    content: Tu verras le bonheur ╵régner dans ta demeure.
  - type: text
    content: Quand tu visiteras ╵tes troupeaux au bercail
  - type: note
    content: 'Autre traduction : quand tu inspecteras ton domaine.'
  - type: text
    content: ', ╵rien n’y fera défaut.'
  '25':
  - type: text
    content: Tu pourras constater ╵combien ta descendance ╵sera nombreuse
  - type: text
    content: et ta progéniture ╵poussera comme l’herbe.
  '26':
  - type: text
    content: Tu entreras dans le sépulcre ╵dans la mûre vieillesse
  - type: note
    content: Le sens de ce mot est incertain.
  - type: text
    content: comme un tas de gerbes qu’on dresse ╵à la saison voulue.
  '27':
  - type: text
    content: 'Oui, nous l’avons examiné : ╵cela est bien ainsi.'
  - type: text
    content: Ecoute donc ces choses, ╵et fais-en ton profit.
  '3':
  - type: text
    content: Sans doute, j’ai vu l’insensé ╵étendre ses racines,
  - type: text
    content: mais j’ai soudain maudit ╵son lieu d’habitation
  - type: note
    content: 'On peut aussi comprendre les v. 3-5 comme une description de la malédiction : 3 …mais soudain la malédiction s’est abattue sur sa maison. 4 Ses fils sont privés de tout soutien…'
  - type: text
    content: '  :'
  '4':
  - type: text
    content: « Que ses fils soient privés ╵de tout soutien,
  - type: text
    content: écrasés en justice
  - type: note
    content: 'L’hébreu a : écrasés à la porte, lieu où s’exerçait la justice.'
  - type: text
    content: ', ╵sans personne pour les sauver.'
  '5':
  - type: text
    content: Ce qu’il a moissonné, ╵qu’un affamé le mange
  - type: text
    content: et vienne l’enlever ╵jusque dans les épines ;
  - type: text
    content: oui, que des gens avides ╵engouffrent sa fortune ! »
  '6':
  - type: text
    content: Le malheur, en effet, ╵ne sort pas de la terre
  - type: text
    content: et la misère ╵ne germe pas du sol,
  '7':
  - type: text
    content: car l’homme naît pour la souffrance
  - type: text
    content: comme les étincelles ╵s’élèvent pour voler.
  '8':
  - type: text
    content: Pour moi, j’aurais recours à Dieu.
  - type: text
    content: Oui, c’est à Dieu ╵que je présenterais ma cause.
  '9':
  - type: text
    content: Il fait de grandes choses ╵qu’on ne saurait comprendre
  - type: text
    content: et des prodiges innombrables.
