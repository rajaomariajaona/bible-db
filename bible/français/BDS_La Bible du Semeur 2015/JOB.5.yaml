document_id: JOB.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu rend le bonheur à qui s’adresse à lui
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant donc, appelle, ╵pour voir si quelqu’un te répond.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A quel saint ange
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: saint homme.
    marker-yv: yv-n
  - type: text
    text: ' t’adresseras-tu ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car c’est l’emportement ╵qui tue un insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est la colère ╵qui fait périr le sot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sans doute, j’ai vu l’insensé ╵étendre ses racines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais j’ai soudain maudit ╵son lieu d’habitation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On peut aussi comprendre les v. 3-5 comme une description de la malédiction : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '…mais soudain la malédiction s’est abattue sur sa maison. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '4 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ses fils sont privés de tout soutien…
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: « Que ses fils soient privés ╵de tout soutien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écrasés en justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écrasés à la porte, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lieu où s’exerçait la justice.
    marker-yv: yv-n
  - type: text
    text: ', ╵sans personne pour les sauver.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce qu’il a moissonné, ╵qu’un affamé le mange
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vienne l’enlever ╵jusque dans les épines ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, que des gens avides ╵engouffrent sa fortune ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le malheur, en effet, ╵ne sort pas de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la misère ╵ne germe pas du sol,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car l’homme naît pour la souffrance
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les étincelles ╵s’élèvent pour voler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pour moi, j’aurais recours à Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’est à Dieu ╵que je présenterais ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il fait de grandes choses ╵qu’on ne saurait comprendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des prodiges innombrables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est lui qui fait tomber la pluie ╵sur la surface de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui répand les eaux ╵à travers les campagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ceux qui sont abaissés, ╵bien haut il les élève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui sont affligés ╵trouvent la délivrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il déjoue les intrigues ╵des plus rusés
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte que leur main ╵ne peut assurer leur salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il attrape les sages ╵au piège de leur propre ruse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3.19
        metadata:
          usfm: 1CO.3.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les projets des plus perfides ╵il les prend de vitesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En plein jour, ils rencontrent ╵de profondes ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à midi, ils tâtonnent ╵comme à la nuit tombée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il arrache le pauvre ╵de l’épée de leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sauve l’indigent ╵de la main du puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi le miséreux ╵a de quoi espérer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la perversité ╵a la bouche fermée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ah ! certes, bienheureux ╵celui que Dieu corrige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n’a pas de mépris ╵pour les leçons du Tout-Puissant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Pr 3.11 ; Hé 12.5-6.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car Dieu inflige la blessure, ╵mais il la panse aussi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même s’il meurtrit, ╵sa main guérit ensuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Six fois, dans la détresse, ╵il te délivrera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans sept calamités, ╵le mal t’épargnera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Au temps de la famine, ╵il te gardera de la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu du combat, ╵il te préservera du glaive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu seras à l’abri ╵du fouet de la langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne craindras pas ╵le désastre à venir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu pourras te moquer ╵de la dévastation ╵comme de la disette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n’auras pas peur ╵des animaux sauvages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Un pacte te liera ╵aux pierres de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quant aux animaux sauvages, ╵ils seront en paix avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tu verras le bonheur ╵régner dans ta demeure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu visiteras ╵tes troupeaux au bercail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand tu inspecteras ton domaine.
    marker-yv: yv-n
  - type: text
    text: ', ╵rien n’y fera défaut.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tu pourras constater ╵combien ta descendance ╵sera nombreuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta progéniture ╵poussera comme l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu entreras dans le sépulcre ╵dans la mûre vieillesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le sens de ce mot est incertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un tas de gerbes qu’on dresse ╵à la saison voulue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Oui, nous l’avons examiné : ╵cela est bien ainsi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoute donc ces choses, ╵et fais-en ton profit.
