document_id: ECC.11
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Entreprendre et agir tant qu’il fait jour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lance ton pain à la surface de l’eau car, avec le temps, tu le retrouveras.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Répartis ton bien en sept ou huit parts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Partage ton bien avec sept ou huit autres personnes.
    marker-yv: yv-n
  - type: text
    text: ', car tu ne sais pas quel malheur peut arriver sur la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand les nuages sont pleins, il va pleuvoir à verse sur la terre, et l’arbre reste à l’endroit où il est tombé, que ce soit vers le sud ou vers le nord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celui qui prête trop attention au vent ne sèmera jamais et celui qui observe toujours les nuages ne moissonnera pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu ignores quel est le chemin du vent, et tu ne sais pas comment se forment les os de l’embryon dans le sein de sa mère ; de même, tu ne connais pas l’œuvre du Dieu qui fait toutes choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dès le matin, répands ta semence et, jusqu’au soir, ne t’accorde pas de repos, car tu ne sais pas de l’une ou l’autre activité, laquelle réussira, ou si les deux s’avéreront aussi bonnes l’une que l’autre.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jouir de la vie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Agréable est la lumière, et il fait bon de voir le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est pourquoi, si quelqu’un vit de nombreuses années, qu’il les passe toutes dans la joie, mais qu’il n’oublie pas que les jours sombres seront nombreux et que tout ce qui est à venir est dérisoire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La perspective de la vieillesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jeune homme, réjouis-toi ╵au cours de tes jeunes années,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton cœur ╵se fasse du bien pendant ta jeunesse ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: marche sur les chemins ╵où tu voudras aller ╵et va vers ce que tu désires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en sachant que pour tout cela ╵Dieu te fera venir en jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Bannis le chagrin de ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garde-toi de ce qui te causerait ╵de la souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la jeunesse, ╵le printemps de la vie ╵sont dérisoires.
