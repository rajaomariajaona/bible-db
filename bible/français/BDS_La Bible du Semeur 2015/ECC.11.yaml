document_id: ECC.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Entreprendre et agir tant qu’il fait jour
  - type: text
    content: Lance ton pain à la surface de l’eau car, avec le temps, tu le retrouveras.
  '10':
  - type: text
    content: Bannis le chagrin de ton cœur,
  - type: text
    content: garde-toi de ce qui te causerait ╵de la souffrance,
  - type: text
    content: car la jeunesse, ╵le printemps de la vie ╵sont dérisoires.
  '2':
  - type: text
    content: Répartis ton bien en sept ou huit parts
  - type: note
    content: 'Autre traduction : Partage ton bien avec sept ou huit autres personnes.'
  - type: text
    content: ', car tu ne sais pas quel malheur peut arriver sur la terre.'
  '3':
  - type: text
    content: Quand les nuages sont pleins, il va pleuvoir à verse sur la terre, et l’arbre reste à l’endroit où il est tombé, que ce soit vers le sud ou vers le nord.
  '4':
  - type: text
    content: Celui qui prête trop attention au vent ne sèmera jamais et celui qui observe toujours les nuages ne moissonnera pas.
  '5':
  - type: text
    content: Tu ignores quel est le chemin du vent, et tu ne sais pas comment se forment les os de l’embryon dans le sein de sa mère ; de même, tu ne connais pas l’œuvre du Dieu qui fait toutes choses.
  '6':
  - type: text
    content: Dès le matin, répands ta semence et, jusqu’au soir, ne t’accorde pas de repos, car tu ne sais pas de l’une ou l’autre activité, laquelle réussira, ou si les deux s’avéreront aussi bonnes l’une que l’autre.
  - type: heading
    content: Jouir de la vie
  '7':
  - type: text
    content: 'Agréable est la lumière, et il fait bon de voir le soleil. '
  '8':
  - type: text
    content: C’est pourquoi, si quelqu’un vit de nombreuses années, qu’il les passe toutes dans la joie, mais qu’il n’oublie pas que les jours sombres seront nombreux et que tout ce qui est à venir est dérisoire.
  - type: heading
    content: La perspective de la vieillesse
  '9':
  - type: text
    content: Jeune homme, réjouis-toi ╵au cours de tes jeunes années,
  - type: text
    content: et que ton cœur ╵se fasse du bien pendant ta jeunesse ;
  - type: text
    content: marche sur les chemins ╵où tu voudras aller ╵et va vers ce que tu désires,
  - type: text
    content: en sachant que pour tout cela ╵Dieu te fera venir en jugement.
