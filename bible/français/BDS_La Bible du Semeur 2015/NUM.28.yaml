document_id: NUM.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mesures prises dans les steppes de Moab
  - type: heading
    content: La loi sur les sacrifices consumés par le feu
  - type: heading
    content: Introduction
  - type: text
    content: 'L’Eternel parla à Moïse en disant : '
  '10':
  - type: text
    content: Chaque jour du sabbat, cet holocauste s’ajoutera à l’holocauste perpétuel et à sa libation.
  - type: heading
    content: Les sacrifices pour le début du mois
  '11':
  - type: text
    content: 'Au début de chaque mois, vous offrirez en holocauste à l’Eternel deux jeunes taureaux, un bélier et sept agneaux dans leur première année, sans défaut. '
  '12':
  - type: text
    content: 'Chaque taureau sera accompagné d’une offrande de neuf kilogrammes de fleur de farine pétrie à l’huile ; chaque bélier d’une offrande de six kilogrammes de fleur de farine pétrie à l’huile ; '
  '13':
  - type: text
    content: 'et chaque agneau, de trois kilogrammes de fleur de farine pétrie à l’huile. C’est un holocauste à l’odeur apaisante, un sacrifice consumé pour l’Eternel. '
  '14':
  - type: text
    content: 'Les libations respectives seront de quatre litres de vin par taureau, de trois litres par bélier, et de deux litres par agneau. Tel est l’holocauste mensuel offert au début de chaque mois de l’année. '
  '15':
  - type: text
    content: On offrira à l’Eternel un bouc en sacrifice pour le péché, en plus de l’holocauste perpétuel et de sa libation.
  - type: heading
    content: Les sacrifices pour la Pâque
  '16':
  - type: text
    content: Le quatorzième jour du premier mois, on célébrera la Pâque en l’honneur de l’Eternel
  - type: note
    content: Voir Ex 12.1-13.
  - type: text
    content: .
  '17':
  - type: text
    content: Le quinzième jour de ce mois commencera la fête. Pendant sept jours, on mangera du pain sans levain
  - type: note
    content: Pour les v. 17-25, voir Ex 12.14-20.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Le premier jour aura lieu une assemblée cultuelle. Ce jour-là vous n’accomplirez aucune tâche de votre travail habituel, '
  '19':
  - type: text
    content: 'et vous offrirez à l’Eternel en sacrifice consumé par le feu en holocauste : deux jeunes taureaux, un bélier et sept agneaux dans leur première année ; vous les choisirez sans défaut. '
  '2':
  - type: text
    content: 'Ordonne aux Israélites ce qui suit : Ayez soin de m’apporter au temps fixé l’offrande qui me revient, c’est-à-dire ces aliments qui sont consumés pour moi par le feu et dont l’odeur est apaisante.'
  '20':
  - type: text
    content: 'Ils seront accompagnés d’offrandes de fleur de farine pétrie à l’huile : neuf kilogrammes'
  - type: note
    content: En hébreu, ici et dans les versets qui suivent, les poids sont en sicles.
  - type: text
    content: ' pour chaque taureau, six kilogrammes pour chaque bélier, '
  '21':
  - type: text
    content: 'et trois kilogrammes pour chacun des sept agneaux. '
  '22':
  - type: text
    content: 'Vous offrirez également un bouc en sacrifice pour le péché, pour accomplir le rite d’expiation pour vous. '
  '23':
  - type: text
    content: 'Tout ceci viendra s’ajouter à l’holocauste perpétuel du matin. '
  '24':
  - type: text
    content: 'Vous offrirez chaque jour, pendant sept jours, ces aliments consumés par le feu et leur odeur apaisera l’Eternel. On les offrira en plus de l’holocauste perpétuel et de sa libation. '
  '25':
  - type: text
    content: Le septième jour, vous aurez une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune tâche relative à votre travail habituel.
  - type: heading
    content: Les sacrifices pour la Pentecôte
  '26':
  - type: text
    content: Au jour des Prémices, quand vous apporterez à l’Eternel l’offrande de la nouvelle récolte pour la fête des Semaines
  - type: note
    content: Voir Ex 23.16 ; 34.22 ; Lv 23.15-21 ; Dt 16.9-12.
  - type: text
    content: ', vous aurez une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. '
  '27':
  - type: text
    content: 'Vous offrirez en holocauste dont l’odeur apaisera l’Eternel deux jeunes taureaux, un bélier et sept agneaux dans leur première année. '
  '28':
  - type: text
    content: 'Ils seront accompagnés d’offrandes de fleur de farine pétrie à l’huile, neuf kilogrammes pour chaque taureau, six kilogrammes pour le bélier '
  '29':
  - type: text
    content: 'et trois kilogrammes pour chacun des sept agneaux. '
  '3':
  - type: text
    content: 'Tu leur diras aussi : Voici quels sacrifices consumés par le feu vous offrirez à l’Eternel.'
  - type: heading
    content: Les sacrifices quotidiens
  - type: text
    content: 'Chaque jour, vous immolerez deux agneaux dans leur première année et sans défaut, à titre d’holocauste perpétuel, '
  '30':
  - type: text
    content: 'Vous immolerez aussi un bouc, pour accomplir le rite d’expiation pour vous. '
  '31':
  - type: text
    content: Tout ceci viendra s’ajouter à l’holocauste perpétuel et à l’offrande qui l’accompagne. Vous les choisirez sans défaut et vous y joindrez les libations correspondantes.
  '4':
  - type: text
    content: 'l’un d’eux le matin, l’autre à la nuit tombante. '
  '5':
  - type: text
    content: 'Vous joindrez à chacun une offrande de trois kilogrammes de fleur de farine pétrie avec deux litres d’huile d’olive vierge. '
  '6':
  - type: text
    content: 'Il s’agit là de l’holocauste perpétuel tel qu’il a été offert sur la montagne du Sinaï. C’est un sacrifice consumé par le feu pour l’Eternel dont l’odeur est apaisante. '
  '7':
  - type: text
    content: 'Vous y joindrez également une libation de deux litres de vin pur pour le premier agneau ; c’est dans le lieu saint que l’on offrira cette libation de boisson fermentée à l’Eternel. '
  '8':
  - type: text
    content: Le second agneau sera offert à la nuit tombante avec la même offrande et la même libation que le matin, c’est un sacrifice consumé par le feu dont l’odeur apaise l’Eternel.
  - type: heading
    content: Les sacrifices pour le jour du sabbat
  '9':
  - type: text
    content: Le jour du sabbat, on offrira deux agneaux dans leur première année, sans défaut
  - type: note
    content: En plus du sacrifice quotidien.
  - type: text
    content: ', accompagnés d’une offrande de six kilogrammes de fleur de farine pétrie à l’huile et de la libation correspondante. '
