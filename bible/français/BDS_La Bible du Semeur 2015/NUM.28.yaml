document_id: NUM.28
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mesures prises dans les steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi sur les sacrifices consumés par le feu
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en disant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ordonne aux Israélites ce qui suit : Ayez soin de m’apporter au temps fixé l’offrande qui me revient, c’est-à-dire ces aliments qui sont consumés pour moi par le feu et dont l’odeur est apaisante.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu leur diras aussi : Voici quels sacrifices consumés par le feu vous offrirez à l’Eternel.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices quotidiens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Chaque jour, vous immolerez deux agneaux dans leur première année et sans défaut, à titre d’holocauste perpétuel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'l’un d’eux le matin, l’autre à la nuit tombante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous joindrez à chacun une offrande de trois kilogrammes de fleur de farine pétrie avec deux litres d’huile d’olive vierge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il s’agit là de l’holocauste perpétuel tel qu’il a été offert sur la montagne du Sinaï. C’est un sacrifice consumé par le feu pour l’Eternel dont l’odeur est apaisante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous y joindrez également une libation de deux litres de vin pur pour le premier agneau ; c’est dans le lieu saint que l’on offrira cette libation de boisson fermentée à l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le second agneau sera offert à la nuit tombante avec la même offrande et la même libation que le matin, c’est un sacrifice consumé par le feu dont l’odeur apaise l’Eternel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices pour le jour du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le jour du sabbat, on offrira deux agneaux dans leur première année, sans défaut
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En plus du sacrifice quotidien.
    marker-yv: yv-n
  - type: text
    text: ', accompagnés d’une offrande de six kilogrammes de fleur de farine pétrie à l’huile et de la libation correspondante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Chaque jour du sabbat, cet holocauste s’ajoutera à l’holocauste perpétuel et à sa libation.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices pour le début du mois
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Au début de chaque mois, vous offrirez en holocauste à l’Eternel deux jeunes taureaux, un bélier et sept agneaux dans leur première année, sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Chaque taureau sera accompagné d’une offrande de neuf kilogrammes de fleur de farine pétrie à l’huile ; chaque bélier d’une offrande de six kilogrammes de fleur de farine pétrie à l’huile ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et chaque agneau, de trois kilogrammes de fleur de farine pétrie à l’huile. C’est un holocauste à l’odeur apaisante, un sacrifice consumé pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les libations respectives seront de quatre litres de vin par taureau, de trois litres par bélier, et de deux litres par agneau. Tel est l’holocauste mensuel offert au début de chaque mois de l’année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On offrira à l’Eternel un bouc en sacrifice pour le péché, en plus de l’holocauste perpétuel et de sa libation.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices pour la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le quatorzième jour du premier mois, on célébrera la Pâque en l’honneur de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.1-13
        metadata:
          usfm: EXO.12.1+EXO.12.2+EXO.12.3+EXO.12.4+EXO.12.5+EXO.12.6+EXO.12.7+EXO.12.8+EXO.12.9+EXO.12.10+EXO.12.11+EXO.12.12+EXO.12.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le quinzième jour de ce mois commencera la fête. Pendant sept jours, on mangera du pain sans levain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 17-25, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.14-20
        metadata:
          usfm: EXO.12.14+EXO.12.15+EXO.12.16+EXO.12.17+EXO.12.18+EXO.12.19+EXO.12.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le premier jour aura lieu une assemblée cultuelle. Ce jour-là vous n’accomplirez aucune tâche de votre travail habituel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et vous offrirez à l’Eternel en sacrifice consumé par le feu en holocauste : deux jeunes taureaux, un bélier et sept agneaux dans leur première année ; vous les choisirez sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils seront accompagnés d’offrandes de fleur de farine pétrie à l’huile : neuf kilogrammes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, ici et dans les versets qui suivent, les poids sont en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sicles.
    marker-yv: yv-n
  - type: text
    text: ' pour chaque taureau, six kilogrammes pour chaque bélier, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et trois kilogrammes pour chacun des sept agneaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous offrirez également un bouc en sacrifice pour le péché, pour accomplir le rite d’expiation pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout ceci viendra s’ajouter à l’holocauste perpétuel du matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous offrirez chaque jour, pendant sept jours, ces aliments consumés par le feu et leur odeur apaisera l’Eternel. On les offrira en plus de l’holocauste perpétuel et de sa libation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le septième jour, vous aurez une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune tâche relative à votre travail habituel.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les sacrifices pour la Pentecôte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Au jour des Prémices, quand vous apporterez à l’Eternel l’offrande de la nouvelle récolte pour la fête des Semaines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 23.16 ; 34.22 ; Lv 23.15-21 ; Dt 16.9-12.
    marker-yv: yv-n
  - type: text
    text: ', vous aurez une assemblée cultuelle ; vous n’accomplirez ce jour-là aucune tâche de votre travail habituel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous offrirez en holocauste dont l’odeur apaisera l’Eternel deux jeunes taureaux, un bélier et sept agneaux dans leur première année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils seront accompagnés d’offrandes de fleur de farine pétrie à l’huile, neuf kilogrammes pour chaque taureau, six kilogrammes pour le bélier '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et trois kilogrammes pour chacun des sept agneaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Vous immolerez aussi un bouc, pour accomplir le rite d’expiation pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tout ceci viendra s’ajouter à l’holocauste perpétuel et à l’offrande qui l’accompagne. Vous les choisirez sans défaut et vous y joindrez les libations correspondantes.
