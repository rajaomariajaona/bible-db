document_id: 2TI.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les périls à venir
  - type: text
    content: 'Sache bien que dans la période finale de l’histoire, les temps seront difficiles. '
  '10':
  - type: text
    content: 'Mais toi, tu as pu m’observer dans mon enseignement, ma conduite, mes projets, ma foi, ma patience, mon amour, mon endurance. '
  '11':
  - type: text
    content: Tu as pu voir quelles persécutions et quelles souffrances j’ai endurées à Antioche, à Iconium et à Lystres
  - type: note
    content: Antioche de Pisidie (Ac 13.50), Iconium (Ac 14.5), Lystres (Ac 14.19).
  - type: text
    content: . Quelles persécutions, en effet, n’ai-je pas subies ! Et chaque fois, le Seigneur m’en a délivré.
  '12':
  - type: text
    content: 'En fait, tous ceux qui sont décidés à vivre dans la piété par leur union avec Jésus-Christ connaîtront la persécution. '
  '13':
  - type: text
    content: Mais les hommes méchants et les charlatans s’enfonceront de plus en plus dans le mal, trompant les autres, et trompés eux-mêmes.
  '14':
  - type: text
    content: Pour toi, reste attaché à tout ce que tu as appris et reçu avec une entière conviction. Tu sais de qui
  - type: note
    content: En grec, le pronom rendu par qui est au pluriel dans la plupart des manuscrits, au singulier dans quelques-uns. Dans ce dernier cas, c’est de Paul qu’il s’agit. Le pronom pluriel se réfère à Loïs et Eunice qui ont initié Timothée à la connaissance des Ecritures (1.5), mais sans doute aussi à Paul, dans la ligne du verset 10.
  - type: text
    content: ' tu l’as appris '
  '15':
  - type: text
    content: et que, depuis ton enfance, tu connais les Saintes Ecritures ; elles peuvent te donner la vraie sagesse, qui conduit au salut par la foi en Jésus-Christ.
  '16':
  - type: text
    content: 'Car toute l’Ecriture est inspirée de Dieu et utile pour enseigner, réfuter, redresser et apprendre à mener une vie conforme à ce qui est juste. '
  '17':
  - type: text
    content: Ainsi, l’homme de Dieu se trouve parfaitement préparé et équipé pour accomplir toute œuvre bonne.
  '2':
  - type: text
    content: 'Les hommes seront égoïstes, avides d’argent, vantards et prétentieux. Ils parleront de Dieu d’une manière injurieuse et n’auront pas d’égards pour leurs parents. Ils seront ingrats, dépourvus de respect pour ce qui est sacré, '
  '3':
  - type: text
    content: 'sans cœur, sans pitié, calomniateurs, incapables de se maîtriser, cruels, ennemis du bien ; '
  '4':
  - type: text
    content: 'emportés par leurs passions et enflés d’orgueil, ils seront prêts à toutes les trahisons. Ils aimeront le plaisir plutôt que Dieu. '
  '5':
  - type: text
    content: Certes, ils resteront attachés aux pratiques extérieures de la piété mais, en réalité, ils ne voudront rien savoir de ce qui en fait la force. Détourne-toi de ces gens-là !
  '6':
  - type: text
    content: 'Certains d’entre eux s’introduisent dans les familles pour envoûter les femmes instables, chargées de péchés, et entraînées par toutes sortes de désirs. '
  '7':
  - type: text
    content: Elles veulent toujours en savoir plus, mais ne sont jamais capables de parvenir à une pleine connaissance de la vérité.
  '8':
  - type: text
    content: De même qu’autrefois Jannès et Jambrès
  - type: note
    content: Noms donnés par la tradition juive aux magiciens égyptiens qui s’étaient opposés à Moïse (Ex 7.11, 12).
  - type: text
    content: ' s’opposèrent à Moïse, de même ces hommes-là s’opposent à la vérité. Ils ont l’intelligence faussée et sont disqualifiés en ce qui concerne la foi. '
  '9':
  - type: text
    content: Mais leur succès sera de courte durée, car leur folie éclatera aux yeux de tous, comme ce fut le cas jadis pour ces deux hommes.
  - type: heading
    content: Reste attaché à ce que tu as appris !
