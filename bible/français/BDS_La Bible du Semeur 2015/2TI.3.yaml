document_id: 2TI.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les périls à venir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sache bien que dans la période finale de l’histoire, les temps seront difficiles. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les hommes seront égoïstes, avides d’argent, vantards et prétentieux. Ils parleront de Dieu d’une manière injurieuse et n’auront pas d’égards pour leurs parents. Ils seront ingrats, dépourvus de respect pour ce qui est sacré, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sans cœur, sans pitié, calomniateurs, incapables de se maîtriser, cruels, ennemis du bien ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'emportés par leurs passions et enflés d’orgueil, ils seront prêts à toutes les trahisons. Ils aimeront le plaisir plutôt que Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Certes, ils resteront attachés aux pratiques extérieures de la piété mais, en réalité, ils ne voudront rien savoir de ce qui en fait la force. Détourne-toi de ces gens-là !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certains d’entre eux s’introduisent dans les familles pour envoûter les femmes instables, chargées de péchés, et entraînées par toutes sortes de désirs. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elles veulent toujours en savoir plus, mais ne sont jamais capables de parvenir à une pleine connaissance de la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: De même qu’autrefois Jannès et Jambrès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Noms donnés par la tradition juive aux magiciens égyptiens qui s’étaient opposés à Moïse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7.11
        metadata:
          usfm: EXO.7.11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
        metadata:
          usfm: EXO.7.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' s’opposèrent à Moïse, de même ces hommes-là s’opposent à la vérité. Ils ont l’intelligence faussée et sont disqualifiés en ce qui concerne la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais leur succès sera de courte durée, car leur folie éclatera aux yeux de tous, comme ce fut le cas jadis pour ces deux hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reste attaché à ce que tu as appris !
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais toi, tu as pu m’observer dans mon enseignement, ma conduite, mes projets, ma foi, ma patience, mon amour, mon endurance. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu as pu voir quelles persécutions et quelles souffrances j’ai endurées à Antioche, à Iconium et à Lystres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Antioche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Pisidie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13.50
        metadata:
          usfm: ACT.13.50
      - type: text
        text: '), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Iconium '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14.5
        metadata:
          usfm: ACT.14.5
      - type: text
        text: '), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Lystres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14.19
        metadata:
          usfm: ACT.14.19
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Quelles persécutions, en effet, n’ai-je pas subies ! Et chaque fois, le Seigneur m’en a délivré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En fait, tous ceux qui sont décidés à vivre dans la piété par leur union avec Jésus-Christ connaîtront la persécution. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais les hommes méchants et les charlatans s’enfonceront de plus en plus dans le mal, trompant les autres, et trompés eux-mêmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pour toi, reste attaché à tout ce que tu as appris et reçu avec une entière conviction. Tu sais de qui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En grec, le pronom rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est au pluriel dans la plupart des manuscrits, au singulier dans quelques-uns. Dans ce dernier cas, c’est de Paul qu’il s’agit. Le pronom pluriel se réfère à Loïs et Eunice qui ont initié Timothée à la connaissance des Ecritures (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.5'
        metadata:
          usfm: 2TI.1.5
      - type: text
        text: ), mais sans doute aussi à Paul, dans la ligne du verset 10.
    marker-yv: yv-n
  - type: text
    text: ' tu l’as appris '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: et que, depuis ton enfance, tu connais les Saintes Ecritures ; elles peuvent te donner la vraie sagesse, qui conduit au salut par la foi en Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car toute l’Ecriture est inspirée de Dieu et utile pour enseigner, réfuter, redresser et apprendre à mener une vie conforme à ce qui est juste. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ainsi, l’homme de Dieu se trouve parfaitement préparé et équipé pour accomplir toute œuvre bonne.
