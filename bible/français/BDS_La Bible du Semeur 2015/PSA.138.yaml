document_id: PSA.138
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Je veux chanter ta fidélité
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te louerai ╵de tout mon cœur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant les puissants de ce monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '138.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dieux, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ce qui peut se comprendre de diverses façons : Dieu, les dieux des nations, les anges (l’ancienne version grecque), les rois (la version syriaque), les juges (le targoum araméen). L’interprétation proposée suit l’emploi du terme « dieux » pour désigner les puissants et les juges au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 82.1
        metadata:
          usfm: PSA.82.1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
        metadata:
          usfm: PSA.82.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ╵je te célébrerai ╵avec de la musique.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je me prosterne ╵dirigé vers ton sanctuaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te loue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ton amour ╵et ta fidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as réalisé tes promesses ╵en surpassant ta renommée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le jour où je t’ai invoqué, ╵toi tu m’as répondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu m’as donné du courage, ╵tu m’as fortifié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que tous les rois du monde ╵te louent, ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’écoute de ta parole !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et qu’ils célèbrent ╵les œuvres de l’Eternel par leurs chants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grande est la gloire ╵de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si haut qu’est l’Eternel, ╵il voit les humbles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de loin il repère ╵les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si je passe par la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu préserves ma vie ╵face à la furie de mes ennemis ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu interviens pour me sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, l’Eternel ╵achèvera son œuvre en ma faveur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, ton amour dure à toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’abandonne donc pas tes créatures !
