document_id: PSA.138,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Je veux chanter ta fidélité
  - type: text
    content: De David.
  - type: text
    content: Je te louerai ╵de tout mon cœur ;
  - type: text
    content: devant les puissants de ce monde
  - type: note
    content: 'L’hébreu a : dieux, ce qui peut se comprendre de diverses façons : Dieu, les dieux des nations, les anges (l’ancienne version grecque), les rois (la version syriaque), les juges (le targoum araméen). L’interprétation proposée suit l’emploi du terme « dieux » pour désigner les puissants et les juges au Ps 82.1, 6.'
  - type: text
    content: ', ╵je te célébrerai ╵avec de la musique.'
  '2':
  - type: text
    content: Je me prosterne ╵dirigé vers ton sanctuaire
  - type: text
    content: et je te loue,
  - type: text
    content: pour ton amour ╵et ta fidélité,
  - type: text
    content: car tu as réalisé tes promesses ╵en surpassant ta renommée.
  '3':
  - type: text
    content: Le jour où je t’ai invoqué, ╵toi tu m’as répondu,
  - type: text
    content: et tu m’as donné du courage, ╵tu m’as fortifié.
  '4':
  - type: text
    content: Que tous les rois du monde ╵te louent, ô Eternel,
  - type: text
    content: à l’écoute de ta parole !
  '5':
  - type: text
    content: Et qu’ils célèbrent ╵les œuvres de l’Eternel par leurs chants !
  - type: text
    content: Grande est la gloire ╵de l’Eternel !
  '6':
  - type: text
    content: Si haut qu’est l’Eternel, ╵il voit les humbles,
  - type: text
    content: et de loin il repère ╵les orgueilleux.
  '7':
  - type: text
    content: Si je passe par la détresse,
  - type: text
    content: tu préserves ma vie ╵face à la furie de mes ennemis ;
  - type: text
    content: tu interviens pour me sauver.
  '8':
  - type: text
    content: Oui, l’Eternel ╵achèvera son œuvre en ma faveur.
  - type: text
    content: Eternel, ton amour dure à toujours.
  - type: text
    content: N’abandonne donc pas tes créatures !
