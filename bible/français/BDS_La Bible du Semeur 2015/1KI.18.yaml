document_id: 1KI.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie va trouver Achab
  - type: text
    content: 'Bien des jours s’écoulèrent. Au cours de la troisième année de sécheresse, l’Eternel adressa la parole à Elie en ces termes : Va trouver Achab, et je ferai pleuvoir sur ce pays.'
  '10':
  - type: text
    content: 'Aussi vrai que l’Eternel est vivant, je t’assure qu’il n’y a pas un peuple ni un royaume où mon maître ne t’ait pas fait chercher ; et quand les représentants de ces pays disaient que tu n’étais pas chez eux, il les faisait jurer qu’on ne t’avait pas trouvé. '
  '11':
  - type: text
    content: 'Et maintenant, tu me demandes d’aller annoncer à mon seigneur que tu arrives. '
  '12':
  - type: text
    content: 'Mais, à peine t’aurai-je quitté que l’Esprit de l’Eternel te transportera je ne sais où ; moi, j’irai t’annoncer à Achab, mais il ne te trouvera plus et c’est moi qu’il tuera. Pourtant, rappelle-toi que ton serviteur craint l’Eternel depuis sa jeunesse. '
  '13':
  - type: text
    content: 'Mon seigneur, n’as-tu pas appris ce que j’ai fait quand Jézabel massacrait les prophètes de l’Eternel ? J’en ai caché cent en deux groupes de cinquante dans des grottes et je leur ai fourni à manger et à boire. '
  '14':
  - type: text
    content: Et c’est moi que tu envoies maintenant à mon seigneur pour lui annoncer que tu viens. Mais il va me tuer !
  '15':
  - type: text
    content: 'Elie lui dit : Aussi vrai que l’Eternel, le Seigneur des armées célestes, au service duquel je me tiens, est vivant, je t’assure que je me présenterai aujourd’hui même devant Achab.'
  '16':
  - type: text
    content: 'Abdias courut donc rejoindre Achab et lui annonça la chose. Alors Achab vint à la rencontre d’Elie. '
  '17':
  - type: text
    content: 'Lorsqu’il l’aperçut, il lui cria : Te voilà, toi qui sèmes le malheur en Israël !'
  '18':
  - type: text
    content: 'Elie lui répondit : Ce n’est pas moi qui sème le malheur en Israël, mais c’est toi et la famille de ton père, puisque vous avez refusé d’obéir aux commandements de l’Eternel, et que tu t’es rallié au culte des dieux Baals. '
  '19':
  - type: text
    content: Maintenant, convoque tout Israël en ma présence sur le mont Carmel
  - type: note
    content: Montagne proche de la Phénicie, dominant actuellement la ville moderne de Haïfa. Lieu de culte des religions qui se sont succédé sur le territoire israélite.
  - type: text
    content: . Tu y rassembleras aussi les quatre cent cinquante prophètes de Baal et les quatre cents prophètes de la déesse Ashéra qui sont tous entretenus par la reine Jézabel.
  - type: heading
    content: La confrontation entre Elie et les prophètes de Baal
  '2':
  - type: text
    content: Elie partit afin de rencontrer Achab.
  - type: text
    content: 'Comme la famine s’était aggravée à Samarie, '
  '20':
  - type: text
    content: 'Achab envoya des messagers à tous les Israélites et il rassembla les prophètes sur le mont Carmel. '
  '21':
  - type: text
    content: 'Alors Elie s’avança devant tout le peuple et s’écria : Combien de temps encore sauterez-vous des deux côtés ? Si l’Eternel est le vrai Dieu, suivez-le. Si c’est Baal, alors ralliez-vous à lui !'
  - type: text
    content: Mais le peuple ne lui répondit pas un mot.
  '22':
  - type: text
    content: 'Elie poursuivit : Je suis le seul prophète de l’Eternel qui reste et il y a quatre cent cinquante prophètes de Baal. '
  '23':
  - type: text
    content: 'Qu’on nous amène deux taureaux ; qu’ils choisissent pour eux l’un d’eux, qu’ils le découpent et qu’ils en disposent les morceaux sur le bois, mais sans y allumer de feu. Je ferai de même avec l’autre taureau : je le placerai sur le bois et je n’y mettrai pas le feu. '
  '24':
  - type: text
    content: Puis vous invoquerez votre dieu, et moi j’invoquerai l’Eternel. Le dieu qui répondra en faisant descendre le feu, c’est celui-là qui est Dieu
  - type: note
    content: Baal était la désignation la plus répandue du dieu de l’orage chez les Sémites de Syrie et de Canaan à partir du IIIe  millénaire av. J.-C.
  - type: text
    content: .
  - type: text
    content: 'Tout le peuple répondit : D’accord ! C’est bien !'
  '25':
  - type: text
    content: 'Elie se tourna vers les prophètes de Baal et leur dit : Choisissez pour vous l’un des taureaux et préparez-le les premiers, car vous êtes les plus nombreux ; puis invoquez votre dieu, mais ne mettez pas le feu au bois.'
  '26':
  - type: text
    content: 'On leur donna le taureau et ils le prirent et le préparèrent. Puis ils invoquèrent Baal, du matin jusqu’à midi, en répétant : O Baal, réponds-nous !'
  - type: text
    content: Mais il n’y eut ni voix ni réponse. Ils sautaient autour de l’autel qu’ils avaient dressé.
  '27':
  - type: text
    content: 'Vers midi, Elie se moqua d’eux et leur dit : Criez plus fort ! Puisqu’il est dieu, il doit être plongé dans ses réflexions, ou il a dû s’absenter, ou bien il est en voyage ! Ou peut-être dort-il et faut-il le réveiller.'
  '28':
  - type: text
    content: 'Les prophètes crièrent à tue-tête et se firent, selon leur coutume, des incisions dans la peau à coups d’épées et de lances jusqu’à ce que le sang ruisselle sur leur corps. '
  '29':
  - type: text
    content: L’heure de midi était passée et ils demeurèrent encore dans un état d’exaltation jusqu’au moment de l’offrande du soir. Mais il n’y eut ni voix, ni réponse, ni aucune réaction.
  '3':
  - type: text
    content: 'Achab avait convoqué Abdias, l’intendant de son palais. Celui-ci craignait l’Eternel : '
  '30':
  - type: text
    content: 'Alors Elie ordonna à tout le peuple : Approchez-vous de moi !'
  - type: text
    content: 'Tout le peuple avança vers lui. Elie rétablit l’autel de l’Eternel qui avait été démoli. '
  '31':
  - type: text
    content: 'A cet effet, il prit douze pierres, une pour chacune des tribus des descendants de Jacob, à qui l’Eternel avait déclaré : « Tu t’appelleras Israël'
  - type: note
    content: Voir Gn 32.29 ; 35.10.
  - type: text
    content: '. » '
  '32':
  - type: text
    content: 'Il rebâtit avec ces pierres un autel dédié à l’Eternel. Autour, il creusa une rigole capable de contenir une trentaine de litres. '
  '33':
  - type: text
    content: 'Puis il disposa des bûches de bois sur l’autel, dépeça le taureau, plaça les morceaux de viande sur le bois '
  '34':
  - type: text
    content: 'et ordonna : Remplissez quatre cruches d’eau et répandez-la sur l’holocauste et sur le bois.'
  - type: text
    content: On fit ainsi.
  - type: text
    content: – Faites-le encore une fois, ordonna-t-il.
  - type: text
    content: Ils le firent.
  - type: text
    content: – Une troisième fois !
  - type: text
    content: 'Et ils le firent une troisième fois. '
  '35':
  - type: text
    content: L’eau se répandit autour de l’autel et remplit la rigole.
  '36':
  - type: text
    content: 'A l’heure habituelle de l’offrande du soir, le prophète Elie s’approcha de l’autel et pria : Eternel, Dieu d’Abraham, d’Isaac et d’Israël, que l’on sache aujourd’hui que c’est toi qui es Dieu en Israël, que je suis ton serviteur et que j’ai fait tout cela sur ton ordre ! '
  '37':
  - type: text
    content: Réponds-moi, Eternel, réponds-moi, afin que ce peuple sache que c’est toi, Eternel, qui es le vrai Dieu, et que c’est toi qui veux ramener leurs cœurs à toi comme autrefois.
  '38':
  - type: text
    content: 'Le feu de l’Eternel tomba du ciel, et consuma l’holocauste, le bois, les pierres et la terre, et il réduisit en vapeur l’eau de la rigole. '
  '39':
  - type: text
    content: 'Quand le peuple vit cela, tous tombèrent le visage contre terre en s’écriant : C’est l’Eternel qui est Dieu ! C’est l’Eternel qui est Dieu !'
  '4':
  - type: text
    content: 'lorsque la reine Jézabel avait voulu exterminer tous les prophètes de l’Eternel, Abdias avait sauvé cent d’entre eux en les cachant en deux groupes de cinquante dans des grottes et en leur procurant à manger et à boire. '
  '40':
  - type: text
    content: 'Elie leur ordonna : Saisissez les prophètes de Baal, qu’aucun d’eux ne s’échappe !'
  - type: text
    content: Ils se saisirent d’eux. Elie les fit descendre dans le ravin du Qishôn
  - type: note
    content: Torrent qui coule à l’est du mont Carmel (Jg 4.7, 13 ; 5.21).
  - type: text
    content: ' pour les y égorger.'
  - type: heading
    content: La fin de la sécheresse
  '41':
  - type: text
    content: 'Ensuite, Elie dit à Achab : Allez, va manger et boire, car j’entends le grondement qui annonce l’averse.'
  '42':
  - type: text
    content: Achab alla manger et boire, tandis qu’Elie montait vers le sommet du mont Carmel où il se prosterna jusqu’à terre, le visage entre les genoux
  - type: note
    content: 'Voir v. 42-45 : allusion en Jc 5.18.'
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Il dit à son jeune serviteur : Monte plus haut et regarde du côté de la mer'
  - type: note
    content: Du sommet du Carmel, on domine la Méditerranée.
  - type: text
    content: .
  - type: text
    content: 'Celui-ci monta, scruta l’horizon et revint dire : Je ne vois rien.'
  - type: text
    content: 'Elie l’envoya sept fois pour regarder. '
  '44':
  - type: text
    content: 'A la septième fois, le serviteur annonça : Je vois venir un petit nuage qui s’élève de la mer, il n’est pas plus grand que la main d’un homme.'
  - type: text
    content: 'Alors Elie lui ordonna : Va dire à Achab : « Dépêche-toi d’atteler ton char et de rentrer chez toi, sinon la pluie te bloquera'
  - type: note
    content: Les premières pluies d’automne, très violentes, peuvent empêcher toute circulation.
  - type: text
    content: . »
  '45':
  - type: text
    content: Déjà, de tous côtés, le ciel s’obscurcissait d’épais nuages poussés par un vent de tempête. Soudain, une pluie torrentielle se mit à tomber. Achab monta sur son char et partit pour Jizréel
  - type: note
    content: Ville dans la plaine du même nom qui sépare la Galilée de la Samarie. Achab y avait une résidence (21.1).
  - type: text
    content: '. '
  '46':
  - type: text
    content: Rempli de force par l’Eternel, Elie serra sa ceinture autour des reins et courut devant le char du roi Achab jusqu’à l’entrée de Jizréel
  - type: note
    content: Vingt-sept kilomètres séparaient le Carmel de Jizréel.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Achab avait ordonné à Abdias : Va, parcours le pays à la recherche de toute source d’eau et de tout fond de torrent ; peut-être découvrirons-nous assez d’herbe pour maintenir en vie nos chevaux et nos mulets sans être obligés d’abattre une partie de notre bétail.'
  '6':
  - type: text
    content: Ils se répartirent le pays à parcourir. Achab partit seul de son côté, et Abdias prit une autre direction.
  '7':
  - type: text
    content: 'Alors qu’Abdias était en chemin, Elie arriva à sa rencontre. Abdias le reconnut et s’inclina face contre terre devant lui en demandant : Est-ce bien toi, mon seigneur Elie ?'
  '8':
  - type: text
    content: – C’est moi-même, lui répondit-il. Va dire à ton maître que j’arrive.
  '9':
  - type: text
    content: '– Oh ! répliqua Abdias, par quel péché ai-je mérité que tu me fasses mettre à mort par la main d’Achab ? '
