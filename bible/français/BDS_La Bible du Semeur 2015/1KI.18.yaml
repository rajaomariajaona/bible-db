document_id: 1KI.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elie va trouver Achab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bien des jours s’écoulèrent. Au cours de la troisième année de sécheresse, l’Eternel adressa la parole à Elie en ces termes : Va trouver Achab, et je ferai pleuvoir sur ce pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elie partit afin de rencontrer Achab.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Comme la famine s’était aggravée à Samarie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Achab avait convoqué Abdias, l’intendant de son palais. Celui-ci craignait l’Eternel : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'lorsque la reine Jézabel avait voulu exterminer tous les prophètes de l’Eternel, Abdias avait sauvé cent d’entre eux en les cachant en deux groupes de cinquante dans des grottes et en leur procurant à manger et à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Achab avait ordonné à Abdias : Va, parcours le pays à la recherche de toute source d’eau et de tout fond de torrent ; peut-être découvrirons-nous assez d’herbe pour maintenir en vie nos chevaux et nos mulets sans être obligés d’abattre une partie de notre bétail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils se répartirent le pays à parcourir. Achab partit seul de son côté, et Abdias prit une autre direction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors qu’Abdias était en chemin, Elie arriva à sa rencontre. Abdias le reconnut et s’inclina face contre terre devant lui en demandant : Est-ce bien toi, mon seigneur Elie ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: – C’est moi-même, lui répondit-il. Va dire à ton maître que j’arrive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '– Oh ! répliqua Abdias, par quel péché ai-je mérité que tu me fasses mettre à mort par la main d’Achab ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aussi vrai que l’Eternel est vivant, je t’assure qu’il n’y a pas un peuple ni un royaume où mon maître ne t’ait pas fait chercher ; et quand les représentants de ces pays disaient que tu n’étais pas chez eux, il les faisait jurer qu’on ne t’avait pas trouvé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et maintenant, tu me demandes d’aller annoncer à mon seigneur que tu arrives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais, à peine t’aurai-je quitté que l’Esprit de l’Eternel te transportera je ne sais où ; moi, j’irai t’annoncer à Achab, mais il ne te trouvera plus et c’est moi qu’il tuera. Pourtant, rappelle-toi que ton serviteur craint l’Eternel depuis sa jeunesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mon seigneur, n’as-tu pas appris ce que j’ai fait quand Jézabel massacrait les prophètes de l’Eternel ? J’en ai caché cent en deux groupes de cinquante dans des grottes et je leur ai fourni à manger et à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et c’est moi que tu envoies maintenant à mon seigneur pour lui annoncer que tu viens. Mais il va me tuer !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elie lui dit : Aussi vrai que l’Eternel, le Seigneur des armées célestes, au service duquel je me tiens, est vivant, je t’assure que je me présenterai aujourd’hui même devant Achab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Abdias courut donc rejoindre Achab et lui annonça la chose. Alors Achab vint à la rencontre d’Elie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsqu’il l’aperçut, il lui cria : Te voilà, toi qui sèmes le malheur en Israël !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elie lui répondit : Ce n’est pas moi qui sème le malheur en Israël, mais c’est toi et la famille de ton père, puisque vous avez refusé d’obéir aux commandements de l’Eternel, et que tu t’es rallié au culte des dieux Baals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Maintenant, convoque tout Israël en ma présence sur le mont Carmel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Montagne proche de la Phénicie, dominant actuellement la ville moderne de Haïfa. Lieu de culte des religions qui se sont succédé sur le territoire israélite.
    marker-yv: yv-n
  - type: text
    text: . Tu y rassembleras aussi les quatre cent cinquante prophètes de Baal et les quatre cents prophètes de la déesse Ashéra qui sont tous entretenus par la reine Jézabel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La confrontation entre Elie et les prophètes de Baal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Achab envoya des messagers à tous les Israélites et il rassembla les prophètes sur le mont Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Elie s’avança devant tout le peuple et s’écria : Combien de temps encore sauterez-vous des deux côtés ? Si l’Eternel est le vrai Dieu, suivez-le. Si c’est Baal, alors ralliez-vous à lui !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais le peuple ne lui répondit pas un mot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elie poursuivit : Je suis le seul prophète de l’Eternel qui reste et il y a quatre cent cinquante prophètes de Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Qu’on nous amène deux taureaux ; qu’ils choisissent pour eux l’un d’eux, qu’ils le découpent et qu’ils en disposent les morceaux sur le bois, mais sans y allumer de feu. Je ferai de même avec l’autre taureau : je le placerai sur le bois et je n’y mettrai pas le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Puis vous invoquerez votre dieu, et moi j’invoquerai l’Eternel. Le dieu qui répondra en faisant descendre le feu, c’est celui-là qui est Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Baal était la désignation la plus répandue du dieu de l’orage chez les Sémites de Syrie et de Canaan à partir du III
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: '  millénaire av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tout le peuple répondit : D’accord ! C’est bien !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elie se tourna vers les prophètes de Baal et leur dit : Choisissez pour vous l’un des taureaux et préparez-le les premiers, car vous êtes les plus nombreux ; puis invoquez votre dieu, mais ne mettez pas le feu au bois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On leur donna le taureau et ils le prirent et le préparèrent. Puis ils invoquèrent Baal, du matin jusqu’à midi, en répétant : O Baal, réponds-nous !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais il n’y eut ni voix ni réponse. Ils sautaient autour de l’autel qu’ils avaient dressé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vers midi, Elie se moqua d’eux et leur dit : Criez plus fort ! Puisqu’il est dieu, il doit être plongé dans ses réflexions, ou il a dû s’absenter, ou bien il est en voyage ! Ou peut-être dort-il et faut-il le réveiller.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les prophètes crièrent à tue-tête et se firent, selon leur coutume, des incisions dans la peau à coups d’épées et de lances jusqu’à ce que le sang ruisselle sur leur corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: L’heure de midi était passée et ils demeurèrent encore dans un état d’exaltation jusqu’au moment de l’offrande du soir. Mais il n’y eut ni voix, ni réponse, ni aucune réaction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors Elie ordonna à tout le peuple : Approchez-vous de moi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tout le peuple avança vers lui. Elie rétablit l’autel de l’Eternel qui avait été démoli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'A cet effet, il prit douze pierres, une pour chacune des tribus des descendants de Jacob, à qui l’Eternel avait déclaré : « Tu t’appelleras Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 32.29 ; 35.10.
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il rebâtit avec ces pierres un autel dédié à l’Eternel. Autour, il creusa une rigole capable de contenir une trentaine de litres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Puis il disposa des bûches de bois sur l’autel, dépeça le taureau, plaça les morceaux de viande sur le bois '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'et ordonna : Remplissez quatre cruches d’eau et répandez-la sur l’holocauste et sur le bois.'
- type: usfm
  marker: p
  children:
  - type: text
    text: On fit ainsi.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Faites-le encore une fois, ordonna-t-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils le firent.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Une troisième fois !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et ils le firent une troisième fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’eau se répandit autour de l’autel et remplit la rigole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'A l’heure habituelle de l’offrande du soir, le prophète Elie s’approcha de l’autel et pria : Eternel, Dieu d’Abraham, d’Isaac et d’Israël, que l’on sache aujourd’hui que c’est toi qui es Dieu en Israël, que je suis ton serviteur et que j’ai fait tout cela sur ton ordre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Réponds-moi, Eternel, réponds-moi, afin que ce peuple sache que c’est toi, Eternel, qui es le vrai Dieu, et que c’est toi qui veux ramener leurs cœurs à toi comme autrefois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le feu de l’Eternel tomba du ciel, et consuma l’holocauste, le bois, les pierres et la terre, et il réduisit en vapeur l’eau de la rigole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand le peuple vit cela, tous tombèrent le visage contre terre en s’écriant : C’est l’Eternel qui est Dieu ! C’est l’Eternel qui est Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Elie leur ordonna : Saisissez les prophètes de Baal, qu’aucun d’eux ne s’échappe !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils se saisirent d’eux. Elie les fit descendre dans le ravin du Qishôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Torrent qui coule à l’est du mont Carmel (Jg 4.7, 13 ; 5.21).
    marker-yv: yv-n
  - type: text
    text: ' pour les y égorger.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de la sécheresse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ensuite, Elie dit à Achab : Allez, va manger et boire, car j’entends le grondement qui annonce l’averse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Achab alla manger et boire, tandis qu’Elie montait vers le sommet du mont Carmel où il se prosterna jusqu’à terre, le visage entre les genoux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 42-45 : allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jc 5.18
        metadata:
          usfm: JAS.5.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il dit à son jeune serviteur : Monte plus haut et regarde du côté de la mer'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Du sommet du Carmel, on domine la Méditerranée.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Celui-ci monta, scruta l’horizon et revint dire : Je ne vois rien.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elie l’envoya sept fois pour regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'A la septième fois, le serviteur annonça : Je vois venir un petit nuage qui s’élève de la mer, il n’est pas plus grand que la main d’un homme.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Elie lui ordonna : Va dire à Achab : « Dépêche-toi d’atteler ton char et de rentrer chez toi, sinon la pluie te bloquera'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les premières pluies d’automne, très violentes, peuvent empêcher toute circulation.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Déjà, de tous côtés, le ciel s’obscurcissait d’épais nuages poussés par un vent de tempête. Soudain, une pluie torrentielle se mit à tomber. Achab monta sur son char et partit pour Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville dans la plaine du même nom qui sépare la Galilée de la Samarie. Achab y avait une résidence (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.1'
        metadata:
          usfm: 1KI.21.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Rempli de force par l’Eternel, Elie serra sa ceinture autour des reins et courut devant le char du roi Achab jusqu’à l’entrée de Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vingt-sept kilomètres séparaient le Carmel de Jizréel.
    marker-yv: yv-n
  - type: text
    text: .
