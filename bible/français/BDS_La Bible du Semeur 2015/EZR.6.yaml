document_id: EZR.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La réponse et le décret de Darius
  - type: text
    content: 'Là-dessus, l’empereur Darius donna l’ordre de faire des recherches dans la bibliothèque où étaient déposés les trésors à Babylone. '
  '10':
  - type: text
    content: afin qu’ils offrent des sacrifices apaisants au Dieu du ciel et qu’ils prient pour la vie du roi et de ses fils.
  '11':
  - type: text
    content: 'Je décrète encore ceci : Si quelqu’un ose transgresser cet ordre, on arrachera de sa maison une poutre pour l’y pendre, et l’on transformera sa demeure en un tas de décombres'
  - type: note
    content: Les décrets et traités perses se terminaient habituellement par une liste de menaces et de malédictions contre ceux qui ne les observeraient pas.
  - type: text
    content: '. '
  '12':
  - type: text
    content: Que le Dieu qui réside là détruise tout roi et tout peuple qui osera faire un geste pour passer outre à ce décret en détruisant ce temple qui est à Jérusalem ; Moi, Darius, j’ai promulgué ce décret. Qu’il soit exactement exécuté. »
  - type: heading
    content: L’achèvement des travaux et l’inauguration du nouveau temple
  '13':
  - type: text
    content: 'Alors Thathnaï, gouverneur de la province à l’ouest de l’Euphrate, Shethar-Boznaï et leurs collègues se conformèrent exactement aux instructions envoyées par le roi Darius. '
  '14':
  - type: text
    content: Les responsables des Juifs continuèrent à bâtir et réussirent dans leur entreprise, stimulés par les messages des prophètes Aggée et Zacharie, descendant d’Iddo
  - type: note
    content: Voir 5.1 et note.
  - type: text
    content: . Ils achevèrent la construction conformément à l’ordre du Dieu d’Israël et aux ordres de Cyrus, de Darius et d’Artaxerxès, empereur de Perse.
  '15':
  - type: text
    content: Le Temple fut terminé le troisième jour du mois d’Adar, la sixième année du règne de l’empereur Darius
  - type: note
    content: En mars 516 av. J.-C.
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Les Israélites, les prêtres, les lévites et tous ceux qui étaient revenus de l’exil célébrèrent dans la joie l’inauguration du Temple. '
  '17':
  - type: text
    content: Ils offrirent, pour l’inauguration de ce temple, cent taureaux, deux cents béliers, quatre cents agneaux et, en sacrifices pour le péché de tout Israël, douze boucs, selon le nombre des tribus d’Israël.
  '18':
  - type: text
    content: On répartit aussi les prêtres selon leurs divisions et les lévites selon leurs classes pour le service de Dieu à Jérusalem, conformément à ce qui est écrit dans le livre de Moïse.
  '19':
  - type: text
    content: Les rapatriés célébrèrent la Pâque
  - type: note
    content: Voir Ex 12.1-20.
  - type: text
    content: ' le quatorzième jour du premier mois'
  - type: note
    content: Autour du 21 avril 516 av. J.-C.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Et l’on trouva dans Ecbatane
  - type: note
    content: L’une des quatre capitales de l’Empire perse (avec Babylone, Suse et Persépolis).
  - type: text
    content: ', la capitale de la province de Médie'
  - type: note
    content: La Médie, située dans le nord-ouest de l’Iran actuel.
  - type: text
    content: ', un rouleau sur lequel il était écrit :'
  '20':
  - type: text
    content: Les prêtres et les lévites avaient procédé tous ensemble aux rites de purification, de sorte qu’ils étaient tous purs
  - type: note
    content: Les prêtres et les lévites devaient être rituellement purs pour accomplir leurs fonctions.
  - type: text
    content: '. Ils purent ainsi égorger les agneaux de la Pâque pour tous les anciens déportés, pour leurs frères les prêtres et pour eux-mêmes. '
  '21':
  - type: text
    content: 'Les Israélites revenus de la captivité mangèrent la Pâque avec tous ceux qui avaient rejeté les pratiques impures des gens des autres peuples du pays et qui s’étaient associés à eux pour se tourner vers l’Eternel, le Dieu d’Israël. '
  '22':
  - type: text
    content: Ensuite, ils célébrèrent dans la joie la fête des Pains sans levain pendant sept jours, car l’Eternel les avait réjouis en disposant favorablement à leur égard l’empereur d’Assyrie
  - type: note
    content: Darius, empereur de Perse.
  - type: text
    content: ' de manière à les encourager dans le travail de reconstruction du temple du Dieu d’Israël.'
  '3':
  - type: text
    content: '« La première année du roi Cyrus, le roi Cyrus a promulgué ce décret concernant le temple de Jérusalem : Le temple doit être reconstruit pour être un lieu où l’on offre des sacrifices. Ses fondements seront rétablis. Il aura trente mètres de haut et autant de large. '
  '4':
  - type: text
    content: 'On fera alterner trois rangées de pierres de taille et une rangée de poutres de bois. Les frais seront couverts par la trésorerie royale. '
  '5':
  - type: text
    content: De plus, les objets d’or et d’argent du temple que Nabuchodonosor a enlevés du temple de Jérusalem et transportés à Babylone, doivent être restitués. Qu’ils soient rapportés au temple de Jérusalem où ils étaient et déposés dans le temple.
  '6':
  - type: text
    content: 'Maintenant toi, Thathnaï, gouverneur de la province située à l’ouest de l’Euphrate, toi, Shethar-Boznaï, et vous leurs collègues, préfets de la province à l’ouest du Fleuve, n’intervenez plus dans cette affaire. '
  '7':
  - type: text
    content: Laissez se poursuivre les travaux de reconstruction de ce temple. Que le gouverneur des Juifs et leurs responsables le rebâtissent sur son ancien emplacement.
  '8':
  - type: text
    content: 'Voici quel décret je promulgue : Vous adopterez la ligne de conduite suivante vis-à-vis des responsables des Juifs en vue de la reconstruction de ce temple : Les dépenses en seront exactement couvertes par les recettes royales provenant des impôts de la province située à l’ouest de l’Euphrate. Elles seront payées à ces hommes sans interruption des versements. '
  '9':
  - type: text
    content: 'Vous fournirez aussi chaque jour aux prêtres de Jérusalem tout ce qui est nécessaire pour les holocaustes du Dieu du ciel : de jeunes taureaux, des béliers et des agneaux, ainsi que du froment, du sel, du vin et de l’huile. Vous le leur remettrez selon leur demande et sans négligence, '
