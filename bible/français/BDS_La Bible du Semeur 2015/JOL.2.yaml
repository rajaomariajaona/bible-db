document_id: JOL.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le déferlement de l’invasion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sonnez du cor ╵dans les murs de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donnez l’alarme ╵sur ma sainte montagne !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremblez, vous tous, ╵habitants du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il arrive ╵le jour de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est tout proche !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre tremble devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel est ébranlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le soleil et la lune ╵sont plongés dans l’obscurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les astres perdent leur éclat,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que l’Eternel ╵fait retentir sa voix ╵en tête de ses troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son camp est tellement nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il est si puissant ╵celui qui exécute sa parole !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour de l’Eternel est grand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et terrible à l’extrême !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra l’endurer ?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Appel à la repentance
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais maintenant encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: revenez donc à moi, ╵revenez de tout votre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec le jeûne, avec des larmes ╵et des lamentations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déchirez votre cœur, ╵et non vos vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et revenez à l’Eternel, ╵lui qui est votre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est plein de grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est compatissant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et lent à la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est riche en amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il renonce volontiers ╵au malheur dont il avait menacé.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sait ? Peut-être l’Eternel ╵se ravisera-t-il
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et changera-t-il lui aussi ╵de ligne de conduite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sait s’il ne laissera pas ╵derrière lui une bénédiction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que vous puissiez faire ╵des offrandes, des libations ╵à l’Eternel, ╵lui qui est votre Dieu ?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez du cor ╵dans les murs de Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour publier un jeûne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et annoncer ╵une réunion cultuelle.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réunissez le peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convoquez l’assemblée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rassemblez les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: regroupez les enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même les nourrissons ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le jeune marié ╵abandonne sa chambre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la jeune mariée ╵quitte aussi la chambre nuptiale,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les prêtres ╵qui servent l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se tiennent en pleurant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre le portique et l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire dans le parvis des prêtres entre l’autel des holocaustes et le lieu saint.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’ils prient ainsi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵aie pitié de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’expose pas celui qui t’appartient ╵au déshonneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni aux railleries d’autres peuples !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car pourquoi dirait-on ╵parmi les peuples :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Où est leur Dieu ? »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La réponse de l’Eternel
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ah ! L’Eternel éprouve ╵pour son pays ╵un amour passionné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a pitié de son peuple.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi il répond
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il dit à son peuple :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je vais vous envoyer ╵le blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vin nouveau et l’huile fraîche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous en serez rassasiés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne vous exposerai plus ╵à l’opprobre parmi les peuples,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un jour de ténèbres, ╵un jour d’obscurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un jour de nuages ╵et de nuées épaisses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’aurore ╵qui se répand sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici un peuple ╵très nombreux et puissant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y en a pas eu de semblable ╵par le passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et après lui, ╵il n’y en aura plus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon certains, il s’agirait toujours, au chapitre 2, d’une invasion de sauterelles, soit de la même que celle du chapitre 1 soit d’une autre. Selon d’autres, le chapitre 2 décrirait une invasion militaire dont les sauterelles n’étaient qu’un signe avant-coureur (voir v. 20 et note).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les générations les plus lointaines.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’ennemi du nord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon certains, des troupes ennemies venues du nord, direction de laquelle, plus tard, Jérémie en particulier verra venir l’ennemi (Jr 1.13-15 ; 6.22  ; etc.). Selon d’autres, il s’agit toujours de sauterelles ainsi que l’indique le v. 25. De telles invasions de sauterelles venant du nord sont attestées.
      marker-yv: yv-n
    - type: text
      text: ', ╵je l’éloigne de vous,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, je le chasse ╵en une terre aride, ╵un pays désolé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en expédiant son avant-garde ╵vers la mer Morte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son arrière-garde ╵vers la mer Méditerranée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, il exhalera ╵sa puanteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son infection se répandra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a fait de grandes choses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ces '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grandes choses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont la dévastation du pays (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1.2-12
        - type: text
          text: ) et l’invasion de la ville (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2.1-11
        - type: text
          text: '). A '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ces grandes choses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'répondent celles de l’Eternel (v. 21). D’autres traduisent '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '20 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '…car il a fait… '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'O terre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en changeant le sujet : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '20 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '…Oui, l’Eternel a fait… '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: O terre…
      marker-yv: yv-n
    - type: text
      text: . »
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O terre, sois sans crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jubile et réjouis-toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel fait ╵de grandes choses.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez sans crainte, ╵bêtes sauvages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les pacages de la steppe ╵vont reverdir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les arbres sont chargés de fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le figuier et la vigne ╵font abonder ╵leur riche production.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, gens de Sion, ╵soyez dans l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: réjouissez-vous ╵à cause de l’Eternel votre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vous envoie la pluie, ╵selon ce qui est juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 11.13
        - type: text
          text: '. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la pluie comme il convient (en son temps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en juste mesure) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’enseignant de la justice.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il répand sur vous les averses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pluies d’automne ╵et les pluies du printemps, ╵tout comme auparavant.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors les aires ╵se rempliront de blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cuves regorgeront ╵de vin nouveau et d’huile.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Oui, je vous dédommage ╵pour les années
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ont dévorées les sauterelles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – sauterelles, criquets, ╵grillons et vol de sauterelles –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma grande armée ╵que j’ai envoyée contre vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.4'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangerez à satiété
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous louerez ╵l’Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui accomplit pour vous ╵des choses merveilleuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jamais plus mon peuple ╵ne connaîtra la honte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous reconnaîtrez ╵que je suis, moi, ╵au milieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je suis ╵l’Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il n’y en a pas d’autre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et jamais plus mon peuple ╵ne connaîtra la honte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un feu dévore devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la flamme consume ╵derrière lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant qu’il ne le foule, ╵le pays s’étendait ╵comme un jardin d’Eden
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 2.8-9 ; Ez 36.35.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais après son passage ╵ce n’est plus qu’un désert ╵tout entier dévasté ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non, rien ne lui échappe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dirait, à les voir, ╵des chevaux qui s’élancent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils courent comme des chevaux d’attelage.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voilà qui bondissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un fracas semblable ╵à celui de chars cahotant ╵au sommet des montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le crépitement ╵d’une flamme de feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui dévore le chaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est comme un peuple puissant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en ordre de bataille.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à cause de lui, ╵les peuples sont saisis d’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les visages ╵pâlissent de frayeur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voilà qui se précipitent ╵comme de vrais guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, comme des soldats, ╵ils escaladent la muraille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun va son chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans dévier de sa route,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'oui, sans se bousculer : ╵les uns les autres'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils vont chacun sur son chemin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se ruent à travers les projectiles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les projectiles. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le canal de Siloé.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
