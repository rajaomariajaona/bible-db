document_id: JOL.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le déferlement de l’invasion
  - type: text
    content: Sonnez du cor ╵dans les murs de Sion,
  - type: text
    content: donnez l’alarme ╵sur ma sainte montagne !
  - type: text
    content: Tremblez, vous tous, ╵habitants du pays,
  - type: text
    content: car il arrive ╵le jour de l’Eternel,
  - type: text
    content: il est tout proche !
  '10':
  - type: text
    content: La terre tremble devant eux,
  - type: text
    content: le ciel est ébranlé,
  - type: text
    content: le soleil et la lune ╵sont plongés dans l’obscurité.
  - type: text
    content: Les astres perdent leur éclat,
  '11':
  - type: text
    content: tandis que l’Eternel ╵fait retentir sa voix ╵en tête de ses troupes,
  - type: text
    content: son camp est tellement nombreux
  - type: text
    content: et il est si puissant ╵celui qui exécute sa parole !
  - type: text
    content: Le jour de l’Eternel est grand
  - type: text
    content: et terrible à l’extrême !
  - type: text
    content: Qui pourra l’endurer ?
  - type: heading
    content: Appel à la repentance
  '12':
  - type: text
    content: Mais maintenant encore,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: revenez donc à moi, ╵revenez de tout votre cœur,
  - type: text
    content: avec le jeûne, avec des larmes ╵et des lamentations.
  '13':
  - type: text
    content: Déchirez votre cœur, ╵et non vos vêtements,
  - type: text
    content: et revenez à l’Eternel, ╵lui qui est votre Dieu.
  - type: text
    content: Car il est plein de grâce,
  - type: text
    content: il est compatissant
  - type: text
    content: et lent à la colère,
  - type: text
    content: il est riche en amour
  - type: text
    content: et il renonce volontiers ╵au malheur dont il avait menacé.
  '14':
  - type: text
    content: Qui sait ? Peut-être l’Eternel ╵se ravisera-t-il
  - type: text
    content: et changera-t-il lui aussi ╵de ligne de conduite.
  - type: text
    content: Qui sait s’il ne laissera pas ╵derrière lui une bénédiction
  - type: text
    content: pour que vous puissiez faire ╵des offrandes, des libations ╵à l’Eternel, ╵lui qui est votre Dieu ?
  '15':
  - type: text
    content: Sonnez du cor ╵dans les murs de Sion
  - type: text
    content: pour publier un jeûne,
  - type: text
    content: et annoncer ╵une réunion cultuelle.
  '16':
  - type: text
    content: Réunissez le peuple,
  - type: text
    content: convoquez l’assemblée,
  - type: text
    content: rassemblez les vieillards,
  - type: text
    content: regroupez les enfants,
  - type: text
    content: même les nourrissons ;
  - type: text
    content: que le jeune marié ╵abandonne sa chambre,
  - type: text
    content: que la jeune mariée ╵quitte aussi la chambre nuptiale,
  '17':
  - type: text
    content: et que les prêtres ╵qui servent l’Eternel
  - type: text
    content: se tiennent en pleurant
  - type: text
    content: entre le portique et l’autel
  - type: note
    content: C’est-à-dire dans le parvis des prêtres entre l’autel des holocaustes et le lieu saint.
  - type: text
    content: .
  - type: text
    content: 'Qu’ils prient ainsi :'
  - type: text
    content: O Eternel, ╵aie pitié de ton peuple,
  - type: text
    content: n’expose pas celui qui t’appartient ╵au déshonneur
  - type: text
    content: ni aux railleries d’autres peuples !
  - type: text
    content: 'Car pourquoi dirait-on ╵parmi les peuples :'
  - type: text
    content: « Où est leur Dieu ? »
  - type: heading
    content: La réponse de l’Eternel
  '18':
  - type: text
    content: Ah ! L’Eternel éprouve ╵pour son pays ╵un amour passionné
  - type: text
    content: et il a pitié de son peuple.
  '19':
  - type: text
    content: C’est pourquoi il répond
  - type: text
    content: 'et il dit à son peuple :'
  - type: text
    content: « Je vais vous envoyer ╵le blé,
  - type: text
    content: le vin nouveau et l’huile fraîche,
  - type: text
    content: et vous en serez rassasiés.
  - type: text
    content: Je ne vous exposerai plus ╵à l’opprobre parmi les peuples,
  '2':
  - type: text
    content: C’est un jour de ténèbres, ╵un jour d’obscurité.
  - type: text
    content: C’est un jour de nuages ╵et de nuées épaisses.
  - type: text
    content: Comme l’aurore ╵qui se répand sur les montagnes,
  - type: text
    content: voici un peuple ╵très nombreux et puissant.
  - type: text
    content: Il n’y en a pas eu de semblable ╵par le passé,
  - type: text
    content: et après lui, ╵il n’y en aura plus
  - type: note
    content: Selon certains, il s’agirait toujours, au chapitre 2, d’une invasion de sauterelles, soit de la même que celle du chapitre 1 soit d’une autre. Selon d’autres, le chapitre 2 décrirait une invasion militaire dont les sauterelles n’étaient qu’un signe avant-coureur (voir v. 20 et note).
  - type: text
    content: dans les générations les plus lointaines.
  '20':
  - type: text
    content: et l’ennemi du nord
  - type: note
    content: Selon certains, des troupes ennemies venues du nord, direction de laquelle, plus tard, Jérémie en particulier verra venir l’ennemi (Jr 1.13-15 ; 6.22  ; etc.). Selon d’autres, il s’agit toujours de sauterelles ainsi que l’indique le v. 25. De telles invasions de sauterelles venant du nord sont attestées.
  - type: text
    content: ', ╵je l’éloigne de vous,'
  - type: text
    content: oui, je le chasse ╵en une terre aride, ╵un pays désolé,
  - type: text
    content: en expédiant son avant-garde ╵vers la mer Morte
  - type: text
    content: et son arrière-garde ╵vers la mer Méditerranée.
  - type: text
    content: Là, il exhalera ╵sa puanteur,
  - type: text
    content: son infection se répandra,
  - type: text
    content: car il a fait de grandes choses
  - type: note
    content: 'Ces grandes choses sont la dévastation du pays (1.2-12) et l’invasion de la ville (2.1-11). A ces grandes choses répondent celles de l’Eternel (v. 21). D’autres traduisent 20 …car il a fait… 21 O terre… en changeant le sujet : 20 …Oui, l’Eternel a fait… 21 O terre…'
  - type: text
    content: . »
  '21':
  - type: text
    content: O terre, sois sans crainte,
  - type: text
    content: jubile et réjouis-toi !
  - type: text
    content: L’Eternel fait ╵de grandes choses.
  '22':
  - type: text
    content: Soyez sans crainte, ╵bêtes sauvages,
  - type: text
    content: car les pacages de la steppe ╵vont reverdir,
  - type: text
    content: les arbres sont chargés de fruits,
  - type: text
    content: le figuier et la vigne ╵font abonder ╵leur riche production.
  '23':
  - type: text
    content: Et vous, gens de Sion, ╵soyez dans l’allégresse,
  - type: text
    content: réjouissez-vous ╵à cause de l’Eternel votre Dieu.
  - type: text
    content: Il vous envoie la pluie, ╵selon ce qui est juste
  - type: note
    content: 'Voir Dt 11.13. D’autres comprennent : la pluie comme il convient (en son temps ou en juste mesure) ou l’enseignant de la justice.'
  - type: text
    content: ','
  - type: text
    content: il répand sur vous les averses,
  - type: text
    content: les pluies d’automne ╵et les pluies du printemps, ╵tout comme auparavant.
  '24':
  - type: text
    content: Alors les aires ╵se rempliront de blé,
  - type: text
    content: et les cuves regorgeront ╵de vin nouveau et d’huile.
  '25':
  - type: text
    content: « Oui, je vous dédommage ╵pour les années
  - type: text
    content: qu’ont dévorées les sauterelles
  - type: text
    content: – sauterelles, criquets, ╵grillons et vol de sauterelles –
  - type: text
    content: ma grande armée ╵que j’ai envoyée contre vous
  - type: note
    content: Voir 1.4 et note.
  - type: text
    content: .
  '26':
  - type: text
    content: Vous mangerez à satiété
  - type: text
    content: et vous louerez ╵l’Eternel, votre Dieu,
  - type: text
    content: qui accomplit pour vous ╵des choses merveilleuses,
  - type: text
    content: et jamais plus mon peuple ╵ne connaîtra la honte.
  '27':
  - type: text
    content: Et vous reconnaîtrez ╵que je suis, moi, ╵au milieu d’Israël,
  - type: text
    content: et que je suis ╵l’Eternel, votre Dieu,
  - type: text
    content: qu’il n’y en a pas d’autre.
  - type: text
    content: Et jamais plus mon peuple ╵ne connaîtra la honte.
  '3':
  - type: text
    content: Un feu dévore devant lui
  - type: text
    content: et la flamme consume ╵derrière lui.
  - type: text
    content: Avant qu’il ne le foule, ╵le pays s’étendait ╵comme un jardin d’Eden
  - type: note
    content: Voir Gn 2.8-9 ; Ez 36.35.
  - type: text
    content: ','
  - type: text
    content: mais après son passage ╵ce n’est plus qu’un désert ╵tout entier dévasté ;
  - type: text
    content: non, rien ne lui échappe.
  '4':
  - type: text
    content: On dirait, à les voir, ╵des chevaux qui s’élancent ;
  - type: text
    content: ils courent comme des chevaux d’attelage.
  '5':
  - type: text
    content: Les voilà qui bondissent
  - type: text
    content: dans un fracas semblable ╵à celui de chars cahotant ╵au sommet des montagnes.
  - type: text
    content: C’est le crépitement ╵d’une flamme de feu
  - type: text
    content: qui dévore le chaume.
  - type: text
    content: Et c’est comme un peuple puissant
  - type: text
    content: en ordre de bataille.
  '6':
  - type: text
    content: Et à cause de lui, ╵les peuples sont saisis d’angoisse,
  - type: text
    content: tous les visages ╵pâlissent de frayeur.
  '7':
  - type: text
    content: Les voilà qui se précipitent ╵comme de vrais guerriers,
  - type: text
    content: et, comme des soldats, ╵ils escaladent la muraille.
  - type: text
    content: Chacun va son chemin
  - type: text
    content: sans dévier de sa route,
  '8':
  - type: text
    content: 'oui, sans se bousculer : ╵les uns les autres'
  - type: text
    content: ils vont chacun sur son chemin.
  - type: text
    content: Ils se ruent à travers les projectiles
  - type: note
    content: 'les projectiles. Autre traduction : le canal de Siloé.'
  - type: text
    content: ','
  - type: text
    content: rien n’interrompt leur marche.
  '9':
  - type: text
    content: Dans la ville, ils se précipitent,
  - type: text
    content: ils courent sur les murs,
  - type: text
    content: ils escaladent les maisons,
  - type: text
    content: passent par les fenêtres, ╵tout comme des voleurs.
