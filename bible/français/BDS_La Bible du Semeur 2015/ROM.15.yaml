document_id: ROM.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le soutien des frères et sœurs en la foi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous qui sommes forts, nous devons porter les faiblesses de ceux qui ne le sont pas, sans chercher notre propre satisfaction. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ailleurs :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Peuples, réjouissez-vous avec son peuple
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 32.43
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou encore :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Louez le Seigneur, vous, gens de toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: que tous les peuples disent ses louanges
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 117.1
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe dit de son côté :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Un rejeton naîtra d’Isaï,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: on le verra se lever pour gouverner tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les peuples étrangers mettront en lui leur espérance
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 11.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que le Dieu de l’espérance, vous comble de toute joie et de sa paix par votre confiance en lui. Ainsi votre cœur débordera d’espérance par la puissance du Saint-Esprit.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Projets
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères et sœurs, j’ai personnellement la conviction que vous êtes pleins de bonté, remplis de toute la connaissance, et tout à fait capables, par conséquent, de vous conseiller les uns les autres. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, je vous ai écrit avec une certaine audace sur quelques points ; car je désirais raviver vos souvenirs, à cause de la grâce que Dieu m’a accordée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, il a fait de moi le serviteur de Jésus-Christ pour les non-Juifs. J’accomplis ainsi la tâche d’un prêtre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul emploie un mot qui signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: officiant.
      marker-yv: yv-n
    - type: text
      text: ' en annonçant l’Evangile de Dieu aux non-Juifs pour que ceux-ci deviennent une offrande agréable à Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul voulait présenter les non-Juifs convertis à Dieu comme le prêtre juif présentait au Seigneur des offrandes qu’il agréait.
      marker-yv: yv-n
    - type: text
      text: ', consacrée par l’Esprit Saint. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà pourquoi, grâce à Jésus-Christ, je suis fier de mon travail pour Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car si j’ose parler, c’est seulement de ce que Christ a accompli par mon moyen pour amener les non-Juifs à obéir à Dieu. Il l’a fait par mes paroles et mes actes, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: par sa puissance qui s’est manifestée dans les miracles et les prodiges, par la puissance de l’Esprit de Dieu. Ainsi, à partir de Jérusalem jusqu’en Illyrie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Province romaine correspondant à l’ancienne Yougoslavie.
      marker-yv: yv-n
    - type: text
      text: ', en rayonnant en tous sens, j’ai fait partout retentir l’Evangile de Christ. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que chacun de nous recherche la satisfaction de son prochain pour le bien de celui-ci, en vue de l’aider à grandir dans la foi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis fait un point d’honneur de proclamer l’Evangile là où le nom de Christ n’était pas encore connu. Je ne voulais en aucun cas bâtir sur des fondations posées par d’autres. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai agi selon cette parole de l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ceux à qui l’on n’avait rien dit de lui le verront,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et ceux qui n’avaient pas entendu parler de lui
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comprendront
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 52.15
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est aussi cette raison qui m’a empêché bien des fois d’aller chez vous.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A présent, je n’ai plus de champ d’action dans ces régions. Or, depuis plusieurs années, je désire aller chez vous '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et cela pourra se réaliser quand j’irai en Espagne. En effet, j’espère vous voir en passant, et je compte sur vous pour m’aider à me rendre dans ce pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après les coutumes de l’époque, cette aide demandée par Paul comprenait des indications, des recommandations, des provisions de route et, éventuellement, des compagnons de voyage.
      marker-yv: yv-n
    - type: text
      text: ' après avoir satisfait au moins en partie mon désir de vous rencontrer. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour l’instant, je vais à Jérusalem pour le service des membres du peuple saint. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, les Eglises de la Macédoine et de l’Achaïe ont décidé de donner une part de leurs biens pour venir en aide aux croyants pauvres de Jérusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est une décision de leur part et elles le leur devaient : car si les non-Juifs ont eu leur part des biens spirituels des Juifs, ils doivent bien, à leur tour, les assister de leurs biens matériels. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque je me serai acquitté de ce service et que j’aurai remis en bonne et due forme à ses destinataires le fruit de cette initiative, je prendrai le chemin de l’Espagne et passerai donc par chez vous. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et je sais que lorsque je viendrai chez vous, ce sera avec la pleine bénédiction de Christ.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car Christ n’a pas cherché sa propre satisfaction, mais il a dit, comme le déclare l’Ecriture : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Les insultes des hommes qui t’insultent sont retombées sur moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 69.10
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous le demande, frères et sœurs, par notre Seigneur Jésus-Christ et par l’amour que donne l’Esprit : combattez avec moi, en priant Dieu pour moi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qu’il me fasse échapper aux incrédules de la Judée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire aux Juifs de Jérusalem et de Judée qui étaient ses adversaires parce qu’ils ne voulaient pas croire en l’Evangile.
      marker-yv: yv-n
    - type: text
      text: ' et permette que l’aide que j’apporte à Jérusalem puisse être reçue favorablement par les membres du peuple saint. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi je pourrai venir chez vous le cœur plein de joie, si Dieu le veut, et trouver quelque repos parmi vous. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que le Dieu qui donne la paix soit avec vous tous. Amen.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or tout ce qui a été consigné autrefois dans l’Ecriture l’a été pour nous instruire, afin que la patience et l’encouragement qu’apporte l’Ecriture produisent en nous l’espérance. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que Dieu, source de toute patience et de tout encouragement, vous donne de vivre en plein accord les uns avec les autres, conformément à l’enseignement de Jésus-Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon ce que Jésus-Christ voudra.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, d’un commun accord et d’une seule voix, vous célébrerez la gloire du Dieu et Père de notre Seigneur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus-Christ est venu pour les Juifs et pour les non-Juifs
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Accueillez-vous donc les uns les autres, tout comme Christ vous a accueillis, pour la gloire de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, en effet, ce que j’affirme : c’est, d’abord, que Christ est venu se mettre au service des Juifs pour montrer que Dieu est véridique en accomplissant les promesses faites à leurs ancêtres ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c’est, ensuite, qu’il est venu pour que les non-Juifs, de leur côté, louent Dieu à cause de sa compassion, comme le dit l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aussi je publie tes louanges parmi les peuples,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je te célèbre par mes chants
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 18.50
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
