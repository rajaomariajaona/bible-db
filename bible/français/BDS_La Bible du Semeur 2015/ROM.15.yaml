document_id: ROM.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le soutien des frères et sœurs en la foi
  - type: text
    content: 'Nous qui sommes forts, nous devons porter les faiblesses de ceux qui ne le sont pas, sans chercher notre propre satisfaction. '
  '10':
  - type: text
    content: 'Et ailleurs :'
  - type: text
    content: Peuples, réjouissez-vous avec son peuple
  - type: text
    content: ' '
  - type: note
    content: Dt 32.43 .
  - type: text
    content: .
  '11':
  - type: text
    content: 'Ou encore :'
  - type: text
    content: Louez le Seigneur, vous, gens de toutes les nations,
  - type: text
    content: que tous les peuples disent ses louanges
  - type: text
    content: ' '
  - type: note
    content: Ps 117.1 .
  - type: text
    content: '!'
  '12':
  - type: text
    content: 'Esaïe dit de son côté :'
  - type: text
    content: Un rejeton naîtra d’Isaï,
  - type: text
    content: on le verra se lever pour gouverner tous les peuples,
  - type: text
    content: les peuples étrangers mettront en lui leur espérance
  - type: text
    content: ' '
  - type: note
    content: Es 11.1, 10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '13':
  - type: text
    content: Que le Dieu de l’espérance, vous comble de toute joie et de sa paix par votre confiance en lui. Ainsi votre cœur débordera d’espérance par la puissance du Saint-Esprit.
  - type: heading
    content: Projets
  '14':
  - type: text
    content: 'Frères et sœurs, j’ai personnellement la conviction que vous êtes pleins de bonté, remplis de toute la connaissance, et tout à fait capables, par conséquent, de vous conseiller les uns les autres. '
  '15':
  - type: text
    content: 'Cependant, je vous ai écrit avec une certaine audace sur quelques points ; car je désirais raviver vos souvenirs, à cause de la grâce que Dieu m’a accordée. '
  '16':
  - type: text
    content: En effet, il a fait de moi le serviteur de Jésus-Christ pour les non-Juifs. J’accomplis ainsi la tâche d’un prêtre
  - type: note
    content: 'Paul emploie un mot qui signifie : officiant.'
  - type: text
    content: ' en annonçant l’Evangile de Dieu aux non-Juifs pour que ceux-ci deviennent une offrande agréable à Dieu'
  - type: note
    content: Paul voulait présenter les non-Juifs convertis à Dieu comme le prêtre juif présentait au Seigneur des offrandes qu’il agréait.
  - type: text
    content: ', consacrée par l’Esprit Saint. '
  '17':
  - type: text
    content: 'Voilà pourquoi, grâce à Jésus-Christ, je suis fier de mon travail pour Dieu. '
  '18':
  - type: text
    content: 'Car si j’ose parler, c’est seulement de ce que Christ a accompli par mon moyen pour amener les non-Juifs à obéir à Dieu. Il l’a fait par mes paroles et mes actes, '
  '19':
  - type: text
    content: par sa puissance qui s’est manifestée dans les miracles et les prodiges, par la puissance de l’Esprit de Dieu. Ainsi, à partir de Jérusalem jusqu’en Illyrie
  - type: note
    content: Province romaine correspondant à l’ancienne Yougoslavie.
  - type: text
    content: ', en rayonnant en tous sens, j’ai fait partout retentir l’Evangile de Christ. '
  '2':
  - type: text
    content: 'Que chacun de nous recherche la satisfaction de son prochain pour le bien de celui-ci, en vue de l’aider à grandir dans la foi. '
  '20':
  - type: text
    content: 'Je me suis fait un point d’honneur de proclamer l’Evangile là où le nom de Christ n’était pas encore connu. Je ne voulais en aucun cas bâtir sur des fondations posées par d’autres. '
  '21':
  - type: text
    content: 'J’ai agi selon cette parole de l’Ecriture :'
  - type: text
    content: Ceux à qui l’on n’avait rien dit de lui le verront,
  - type: text
    content: et ceux qui n’avaient pas entendu parler de lui
  - type: text
    content: comprendront
  - type: text
    content: ' '
  - type: note
    content: Es 52.15 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '22':
  - type: text
    content: C’est aussi cette raison qui m’a empêché bien des fois d’aller chez vous.
  '23':
  - type: text
    content: 'A présent, je n’ai plus de champ d’action dans ces régions. Or, depuis plusieurs années, je désire aller chez vous '
  '24':
  - type: text
    content: et cela pourra se réaliser quand j’irai en Espagne. En effet, j’espère vous voir en passant, et je compte sur vous pour m’aider à me rendre dans ce pays
  - type: note
    content: D’après les coutumes de l’époque, cette aide demandée par Paul comprenait des indications, des recommandations, des provisions de route et, éventuellement, des compagnons de voyage.
  - type: text
    content: ' après avoir satisfait au moins en partie mon désir de vous rencontrer. '
  '25':
  - type: text
    content: 'Pour l’instant, je vais à Jérusalem pour le service des membres du peuple saint. '
  '26':
  - type: text
    content: 'En effet, les Eglises de la Macédoine et de l’Achaïe ont décidé de donner une part de leurs biens pour venir en aide aux croyants pauvres de Jérusalem. '
  '27':
  - type: text
    content: 'C’est une décision de leur part et elles le leur devaient : car si les non-Juifs ont eu leur part des biens spirituels des Juifs, ils doivent bien, à leur tour, les assister de leurs biens matériels. '
  '28':
  - type: text
    content: 'Lorsque je me serai acquitté de ce service et que j’aurai remis en bonne et due forme à ses destinataires le fruit de cette initiative, je prendrai le chemin de l’Espagne et passerai donc par chez vous. '
  '29':
  - type: text
    content: Et je sais que lorsque je viendrai chez vous, ce sera avec la pleine bénédiction de Christ.
  '3':
  - type: text
    content: 'Car Christ n’a pas cherché sa propre satisfaction, mais il a dit, comme le déclare l’Ecriture : '
  - type: text
    content: Les insultes des hommes qui t’insultent sont retombées sur moi
  - type: note
    content: Ps 69.10.
  - type: text
    content: .
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Je vous le demande, frères et sœurs, par notre Seigneur Jésus-Christ et par l’amour que donne l’Esprit : combattez avec moi, en priant Dieu pour moi. '
  '31':
  - type: text
    content: Qu’il me fasse échapper aux incrédules de la Judée
  - type: note
    content: C’est-à-dire aux Juifs de Jérusalem et de Judée qui étaient ses adversaires parce qu’ils ne voulaient pas croire en l’Evangile.
  - type: text
    content: ' et permette que l’aide que j’apporte à Jérusalem puisse être reçue favorablement par les membres du peuple saint. '
  '32':
  - type: text
    content: 'Ainsi je pourrai venir chez vous le cœur plein de joie, si Dieu le veut, et trouver quelque repos parmi vous. '
  '33':
  - type: text
    content: Que le Dieu qui donne la paix soit avec vous tous. Amen.
  '4':
  - type: text
    content: 'Or tout ce qui a été consigné autrefois dans l’Ecriture l’a été pour nous instruire, afin que la patience et l’encouragement qu’apporte l’Ecriture produisent en nous l’espérance. '
  '5':
  - type: text
    content: Que Dieu, source de toute patience et de tout encouragement, vous donne de vivre en plein accord les uns avec les autres, conformément à l’enseignement de Jésus-Christ
  - type: note
    content: 'Autre traduction : selon ce que Jésus-Christ voudra.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ainsi, d’un commun accord et d’une seule voix, vous célébrerez la gloire du Dieu et Père de notre Seigneur Jésus-Christ.
  - type: heading
    content: Jésus-Christ est venu pour les Juifs et pour les non-Juifs
  '7':
  - type: text
    content: 'Accueillez-vous donc les uns les autres, tout comme Christ vous a accueillis, pour la gloire de Dieu. '
  '8':
  - type: text
    content: 'Voici, en effet, ce que j’affirme : c’est, d’abord, que Christ est venu se mettre au service des Juifs pour montrer que Dieu est véridique en accomplissant les promesses faites à leurs ancêtres ; '
  '9':
  - type: text
    content: 'c’est, ensuite, qu’il est venu pour que les non-Juifs, de leur côté, louent Dieu à cause de sa compassion, comme le dit l’Ecriture :'
  - type: text
    content: Aussi je publie tes louanges parmi les peuples,
  - type: text
    content: je te célèbre par mes chants
  - type: text
    content: ' '
  - type: note
    content: Ps 18.50 .
  - type: text
    content: .
