document_id: 1CH.26,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les groupes de portiers du Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelle était la répartition des portiers en classes : pour les Qoréites, Meshélémia, descendant de Qoré, de la famille d’Asaph. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hosa, des descendants de Merari, eut des fils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shimri en était le chef car, bien qu’il ne fût pas l’aîné, son père l’avait établi chef. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Hilqiya, le deuxième, Tebalia, le troisième, Zacharie, le quatrième. Les fils et les hommes de la parenté de Hosa étaient en tout treize.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour toutes ces classes de portiers, les chefs comme les autres, accomplissaient leur service dans le temple de l’Eternel.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils tirèrent au sort, pour la responsabilité de chaque porte, entre les différents groupes familiaux, sans faire de différence entre ceux de rang élevé et ceux de rang peu important.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sort attribua à Shélémia la garde de la porte orientale. Son fils Zacharie, qui était un conseiller avisé, se vit attribuer par le sort la porte du côté nord. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La porte sud échut à Obed-Edom, et la responsabilité des entrepôts revint à ses fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le palais royal était situé au sud du Temple. Le roi entrait donc au sanctuaire par la porte sud. Un honneur particulier se rattachait donc à la garde de cette porte (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 46.1-10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shouppim et Hosa reçurent la responsabilité du côté ouest, avec la porte Shalléketh donnant sur la route qui montait.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les services étaient répartis, selon leur importance, de la manière suivante : '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: à la porte orientale, six lévites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’entrée principale : c’est pourquoi elle se voit affecter six lévites au lieu de quatre.'
      marker-yv: yv-n
    - type: text
      text: ' par jour ; au nord, quatre par jour ; au sud, quatre par jour, et deux groupes de deux aux entrepôts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Du côté des dépendances
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sens incertain. Le terme signifie peut-être : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cour.
      marker-yv: yv-n
    - type: text
      text: ' à l’ouest, quatre hommes gardaient l’entrée vers la route et deux vers les dépendances. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont là les classes des portiers recrutés parmi les descendants de Qoré et de Merari.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les autres services confiés aux lévites
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait pour fils : Zacharie, l’aîné, Yediaël, le deuxième, Zebadia, le troisième, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres lévites, tel Ahiya, étaient préposés aux trésors du Temple et aux trésors des objets sacrés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’étaient les descendants de Laedân de la famille des Guershonites, chefs de leur groupe familial respectif. Ils comprenaient Yehiéli '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ses fils : Zétam et son frère Joël. Ils avaient la responsabilité des trésors du temple de l’Eternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour les Amramites, les Yitseharites, les Hébronites et les Ouzziélites, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c’était Shebouel, descendant de Guershom, fils de Moïse, qui était le responsable en chef des trésors. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ses parents issus d’Eliézer étaient, en ligne descendante : Rehabia, Esaïe, Yoram, Zikri et Shelomith, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui fut préposé avec les hommes de sa parenté aux trésors des choses sacrées, celles qu’avaient consacrées le roi David, les chefs de groupe familial, les chefs des « milliers » et des « centaines » et les chefs de l’armée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux-ci avaient en effet consacré une part du butin des guerres à l’édification du temple de l’Eternel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shelomith et les membres de sa parenté avaient aussi la responsabilité de tout ce qui avait été consacré par Samuel, le prophète, par Saül, fils de Qish, par Abner, fils de Ner, par Joab, fils de Tserouya, et de tout autre chose consacrée.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Yitseharites, Kenania et ses fils étaient chargés des affaires publiques en Israël, à titre d’administrateurs et de juges. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yatniel, le quatrième, Elam, le cinquième, Yohanân, le sixième, et Elyoénaï, le septième. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Hébronites, Hashabia et les membres de sa parenté, c’est-à-dire mille sept cents hommes de valeur, supervisaient l’administration d’Israël à l’ouest du Jourdain, pour toutes les affaires religieuses et civiles. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: D’après les généalogies des groupes familiaux hébronites, Yeriya était le chef des Hébronites. La quarantième année du règne de David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire la dernière année du règne de David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '29.27'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', on fit des recherches et l’on trouva qu’il y avait parmi eux des hommes de valeur à Yaezer en Galaad. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y avait dans la parenté de Yeriya deux mille sept cents chefs de famille, des hommes de valeur. Le roi David leur confia l’administration de toutes les affaires religieuses et civiles des tribus de Ruben et de Gad et de la demi-tribu de Manassé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obed-Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Qui avait pris soin du coffre de l’alliance déposé chez lui (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.13'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' eut pour fils : Shemaya, l’aîné, Yehozabad, le deuxième, Yoah, le troisième, Sakar, le quatrième, Netanéel, le cinquième, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ammiel, le sixième, Issacar, le septième, et Peoultaï, le huitième
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 13.14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', car Dieu l’avait béni. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son fils Shemaya, eut des fils qui jouissaient d’une grande autorité dans leur groupe familial car c’étaient des hommes de valeur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce furent Otni, Rephaël, Obed, Elzabad, et surtout leurs frères Elihou et Semakia qui furent particulièrement capables. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tels étaient les descendants d’Obed-Edom. Eux, leurs fils et les hommes de leur parenté, au nombre de soixante-deux, étaient des personnes de valeur, accomplissant leur travail avec énergie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Meshélémia, il y eut ses fils et les hommes de sa parenté, hommes de valeur, au nombre de dix-huit. '
