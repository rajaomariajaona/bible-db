document_id: 1CH.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les groupes de portiers du Temple
  - type: text
    content: 'Voici quelle était la répartition des portiers en classes : pour les Qoréites, Meshélémia, descendant de Qoré, de la famille d’Asaph. '
  '10':
  - type: text
    content: Hosa, des descendants de Merari, eut des fils.
  - type: text
    content: 'Shimri en était le chef car, bien qu’il ne fût pas l’aîné, son père l’avait établi chef. '
  '11':
  - type: text
    content: Puis Hilqiya, le deuxième, Tebalia, le troisième, Zacharie, le quatrième. Les fils et les hommes de la parenté de Hosa étaient en tout treize.
  '12':
  - type: text
    content: Pour toutes ces classes de portiers, les chefs comme les autres, accomplissaient leur service dans le temple de l’Eternel.
  '13':
  - type: text
    content: Ils tirèrent au sort, pour la responsabilité de chaque porte, entre les différents groupes familiaux, sans faire de différence entre ceux de rang élevé et ceux de rang peu important.
  '14':
  - type: text
    content: 'Le sort attribua à Shélémia la garde de la porte orientale. Son fils Zacharie, qui était un conseiller avisé, se vit attribuer par le sort la porte du côté nord. '
  '15':
  - type: text
    content: La porte sud échut à Obed-Edom, et la responsabilité des entrepôts revint à ses fils
  - type: note
    content: Le palais royal était situé au sud du Temple. Le roi entrait donc au sanctuaire par la porte sud. Un honneur particulier se rattachait donc à la garde de cette porte (voir Ez 46.1-10).
  - type: text
    content: '. '
  '16':
  - type: text
    content: Shouppim et Hosa reçurent la responsabilité du côté ouest, avec la porte Shalléketh donnant sur la route qui montait.
  - type: text
    content: 'Les services étaient répartis, selon leur importance, de la manière suivante : '
  '17':
  - type: text
    content: à la porte orientale, six lévites
  - type: note
    content: 'L’entrée principale : c’est pourquoi elle se voit affecter six lévites au lieu de quatre.'
  - type: text
    content: ' par jour ; au nord, quatre par jour ; au sud, quatre par jour, et deux groupes de deux aux entrepôts. '
  '18':
  - type: text
    content: Du côté des dépendances
  - type: note
    content: 'Sens incertain. Le terme signifie peut-être : cour.'
  - type: text
    content: ' à l’ouest, quatre hommes gardaient l’entrée vers la route et deux vers les dépendances. '
  '19':
  - type: text
    content: Ce sont là les classes des portiers recrutés parmi les descendants de Qoré et de Merari.
  - type: heading
    content: Les autres services confiés aux lévites
  '2':
  - type: text
    content: 'Il avait pour fils : Zacharie, l’aîné, Yediaël, le deuxième, Zebadia, le troisième, '
  '20':
  - type: text
    content: 'D’autres lévites, tel Ahiya, étaient préposés aux trésors du Temple et aux trésors des objets sacrés. '
  '21':
  - type: text
    content: 'C’étaient les descendants de Laedân de la famille des Guershonites, chefs de leur groupe familial respectif. Ils comprenaient Yehiéli '
  '22':
  - type: text
    content: 'et ses fils : Zétam et son frère Joël. Ils avaient la responsabilité des trésors du temple de l’Eternel. '
  '23':
  - type: text
    content: 'Pour les Amramites, les Yitseharites, les Hébronites et les Ouzziélites, '
  '24':
  - type: text
    content: 'c’était Shebouel, descendant de Guershom, fils de Moïse, qui était le responsable en chef des trésors. '
  '25':
  - type: text
    content: 'Et ses parents issus d’Eliézer étaient, en ligne descendante : Rehabia, Esaïe, Yoram, Zikri et Shelomith, '
  '26':
  - type: text
    content: 'qui fut préposé avec les hommes de sa parenté aux trésors des choses sacrées, celles qu’avaient consacrées le roi David, les chefs de groupe familial, les chefs des « milliers » et des « centaines » et les chefs de l’armée. '
  '27':
  - type: text
    content: 'Ceux-ci avaient en effet consacré une part du butin des guerres à l’édification du temple de l’Eternel. '
  '28':
  - type: text
    content: Shelomith et les membres de sa parenté avaient aussi la responsabilité de tout ce qui avait été consacré par Samuel, le prophète, par Saül, fils de Qish, par Abner, fils de Ner, par Joab, fils de Tserouya, et de tout autre chose consacrée.
  '29':
  - type: text
    content: 'Parmi les Yitseharites, Kenania et ses fils étaient chargés des affaires publiques en Israël, à titre d’administrateurs et de juges. '
  '3':
  - type: text
    content: 'Yatniel, le quatrième, Elam, le cinquième, Yohanân, le sixième, et Elyoénaï, le septième. '
  '30':
  - type: text
    content: 'Parmi les Hébronites, Hashabia et les membres de sa parenté, c’est-à-dire mille sept cents hommes de valeur, supervisaient l’administration d’Israël à l’ouest du Jourdain, pour toutes les affaires religieuses et civiles. '
  '31':
  - type: text
    content: D’après les généalogies des groupes familiaux hébronites, Yeriya était le chef des Hébronites. La quarantième année du règne de David
  - type: note
    content: C’est-à-dire la dernière année du règne de David (29.27).
  - type: text
    content: ', on fit des recherches et l’on trouva qu’il y avait parmi eux des hommes de valeur à Yaezer en Galaad. '
  '32':
  - type: text
    content: Il y avait dans la parenté de Yeriya deux mille sept cents chefs de famille, des hommes de valeur. Le roi David leur confia l’administration de toutes les affaires religieuses et civiles des tribus de Ruben et de Gad et de la demi-tribu de Manassé.
  '4':
  - type: text
    content: Obed-Edom
  - type: note
    content: Qui avait pris soin du coffre de l’alliance déposé chez lui (13.13).
  - type: text
    content: ' eut pour fils : Shemaya, l’aîné, Yehozabad, le deuxième, Yoah, le troisième, Sakar, le quatrième, Netanéel, le cinquième, '
  '5':
  - type: text
    content: Ammiel, le sixième, Issacar, le septième, et Peoultaï, le huitième
  - type: note
    content: Voir 1 Ch 13.14.
  - type: text
    content: ', car Dieu l’avait béni. '
  '6':
  - type: text
    content: 'Son fils Shemaya, eut des fils qui jouissaient d’une grande autorité dans leur groupe familial car c’étaient des hommes de valeur. '
  '7':
  - type: text
    content: 'Ce furent Otni, Rephaël, Obed, Elzabad, et surtout leurs frères Elihou et Semakia qui furent particulièrement capables. '
  '8':
  - type: text
    content: Tels étaient les descendants d’Obed-Edom. Eux, leurs fils et les hommes de leur parenté, au nombre de soixante-deux, étaient des personnes de valeur, accomplissant leur travail avec énergie.
  '9':
  - type: text
    content: 'Pour Meshélémia, il y eut ses fils et les hommes de sa parenté, hommes de valeur, au nombre de dix-huit. '
