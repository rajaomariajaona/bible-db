document_id: ISA.9,21
type_code: fra
verses:
  '1':
  - type: text
    content: Le peuple qui marchait ╵dans les ténèbres
  - type: text
    content: 'verra briller ╵une grande lumière :'
  - type: text
    content: elle resplendira
  - type: text
    content: sur ceux qui habitaient ╵le pays dominé ╵par d’épaisses ténèbres
  - type: note
    content: 8.23 à 9.1 est cité en Mt 4.15-16 et Lc 1.79.
  - type: text
    content: .
  '10':
  - type: text
    content: L’Eternel a dressé contre eux
  - type: text
    content: les adversaires de Retsîn
  - type: text
    content: et il a excité leurs ennemis
  - type: note
    content: Les ennemis de Retsîn, c’est-à-dire les Assyriens de Tiglath-Piléser qui, avec les Philistins et, sans doute, des Syriens qui lui étaient assujettis et s’opposaient à Retsîn, envahiront Israël (voir 2 R 17.6).
  - type: text
    content: '  :'
  '11':
  - type: text
    content: les Syriens qui sont à l’orient, ╵les Philistins à l’occident ;
  - type: text
    content: ils dévoreront Israël ╵à belles dents.
  - type: text
    content: Mais malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: text
    content: sa main reste levée.
  '12':
  - type: text
    content: Le peuple n’est pas revenu ╵à l’Eternel qui le frappait,
  - type: text
    content: il ne s’est pas tourné ╵vers l’Eternel, ╵le Seigneur des armées célestes.
  '13':
  - type: text
    content: C’est pourquoi l’Eternel ╵ôtera d’Israël ╵la tête avec la queue,
  - type: text
    content: la palme et le roseau
  - type: note
    content: Voir 19.15 ; Dt 28.13, 44.
  - type: text
    content: en un seul jour.
  '14':
  - type: text
    content: Le dirigeant et le notable ╵sont la tête du peuple,
  - type: text
    content: et le prophète ╵enseignant le mensonge ╵en est la queue.
  '15':
  - type: text
    content: Les guides de ce peuple ╵l’égarent,
  - type: text
    content: et ceux qui sont guidés ╵sont conduits à la ruine.
  '16':
  - type: text
    content: C’est pourquoi le Seigneur ╵ne sera pas clément
  - type: note
    content: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : ne se réjouira pas de ses jeunes gens.'
  - type: text
    content: ' ╵envers ses jeunes gens,'
  - type: text
    content: il n’aura pas pitié ╵des orphelins, des veuves.
  - type: text
    content: Car tous méprisent Dieu ╵et font le mal,
  - type: text
    content: tous profèrent ╵des propos insensés.
  - type: text
    content: Mais, malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: text
    content: sa main reste levée.
  '17':
  - type: text
    content: Car la méchanceté ╵brûle comme le feu,
  - type: text
    content: qui consume les ronces ╵et les épines,
  - type: text
    content: et elle embrase ╵les buissons des forêts.
  - type: text
    content: La fumée s’en élève ╵vers le ciel en volutes.
  '18':
  - type: text
    content: Par la fureur de l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: le pays est en flammes
  - type: text
    content: et le peuple devient ╵la proie du feu.
  - type: text
    content: Nul n’a pitié de son prochain.
  '19':
  - type: text
    content: On grappille à sa droite ╵et l’on reste affamé,
  - type: text
    content: on dévore à sa gauche, ╵sans être rassasié.
  - type: text
    content: On va jusqu’à manger ╵la chair de ses enfants
  - type: note
    content: 'Cette traduction suppose une légère modification du texte hébreu traditionnel qui a : de son bras. Quelques manuscrits de l’ancienne version grecque et le targoum ont : de son prochain.'
  - type: text
    content: .
  '2':
  - type: text
    content: O Eternel, ╵tu fais abonder l’allégresse
  - type: note
    content: 'Cette traduction suppose une légère modification du texte. Le texte hébreu traditionnel a : tu as fait s’accroître le peuple.'
  - type: text
    content: ','
  - type: text
    content: tu fais jaillir ╵une très grande joie
  - type: text
    content: et l’on se réjouit devant toi ╵tout comme au temps de la moisson,
  - type: text
    content: ou comme on crie de joie ╵lors du partage d’un butin.
  '20':
  - type: text
    content: Manassé dévore Ephraïm,
  - type: text
    content: et Ephraïm dévore Manassé,
  - type: text
    content: tous les deux vont ensemble ╵se jeter sur Juda.
  - type: text
    content: Mais, malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: text
    content: sa main reste levée.
  '3':
  - type: text
    content: Car le joug qui pesait sur lui,
  - type: text
    content: le bâton qui frappait son dos,
  - type: text
    content: le gourdin de son oppresseur,
  - type: text
    content: toi, tu les as brisés ╵tout comme au jour ╵de la défaite de Madian
  - type: note
    content: Allusion à la victoire de Gédéon sur les Madianites (Jg 7 et 8).
  - type: text
    content: .
  '4':
  - type: text
    content: Toute chaussure de guerrier ╵qui martèle le sol,
  - type: text
    content: et tout manteau ╵que l’on a roulé dans le sang
  - type: text
    content: seront livrés aux flammes,
  - type: text
    content: pour être consumés.
  - type: heading
    content: Un enfant nous est né
  '5':
  - type: text
    content: Car un enfant est né pour nous,
  - type: text
    content: un fils nous est donné.
  - type: text
    content: Et il exercera ╵l’autorité royale ;
  - type: text
    content: il sera appelé
  - type: text
    content: Merveilleux Conseiller, Dieu fort,
  - type: text
    content: Père à jamais ╵et Prince de la paix.
  '6':
  - type: text
    content: Il étendra ╵sa souveraineté
  - type: text
    content: et il instaurera ╵la paix qui durera toujours
  - type: text
    content: au trône de David ╵et à tout son royaume.
  - type: text
    content: Sa royauté sera ╵solidement fondée
  - type: text
    content: sur le droit et sur la justice,
  - type: text
    content: dès à présent ╵et pour l’éternité.
  - type: text
    content: Voilà ce que fera ╵le Seigneur des armées célestes ╵dans son ardent amour
  - type: note
    content: Voir Lc 1.32-33.
  - type: text
    content: .
  - type: heading
    content: Le jugement sur Israël
  '7':
  - type: text
    content: Le Seigneur a lancé ╵un message contre Jacob,
  - type: text
    content: et il s’abat sur Israël
  - type: note
    content: Jacob, Israël, Ephraïm et Samarie désignent le royaume du Nord séparé de celui de Juda depuis près de 200 ans, dont Samarie était la capitale.
  - type: text
    content: .
  '8':
  - type: text
    content: Le peuple tout entier ╵en aura connaissance,
  - type: text
    content: le peuple d’Ephraïm, ╵les habitants de Samarie
  - type: text
    content: 'qui disent, pleins d’orgueil ╵et le cœur arrogant :'
  '9':
  - type: text
    content: « Les briques sont tombées,
  - type: text
    content: mais nous reconstruirons ╵en pierres bien taillées ;
  - type: text
    content: les sycomores ╵ont été abattus,
  - type: text
    content: par des cèdres nous les remplacerons. »
