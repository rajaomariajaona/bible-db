document_id: ISA.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple qui marchait ╵dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'verra briller ╵une grande lumière :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle resplendira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur ceux qui habitaient ╵le pays dominé ╵par d’épaisses ténèbres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.23 à 9.1 est cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 4.15-16
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.79
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a dressé contre eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les adversaires de Retsîn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a excité leurs ennemis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ennemis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de Retsîn, c’est-à-dire les Assyriens de Tiglath-Piléser qui, avec les Philistins et, sans doute, des Syriens qui lui étaient assujettis et s’opposaient à Retsîn, envahiront Israël (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 17.6
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  :'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Syriens qui sont à l’orient, ╵les Philistins à l’occident ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils dévoreront Israël ╵à belles dents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main reste levée.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple n’est pas revenu ╵à l’Eternel qui le frappait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne s’est pas tourné ╵vers l’Eternel, ╵le Seigneur des armées célestes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi l’Eternel ╵ôtera d’Israël ╵la tête avec la queue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la palme et le roseau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 19.15 ; Dt 28.13, 44.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en un seul jour.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le dirigeant et le notable ╵sont la tête du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le prophète ╵enseignant le mensonge ╵en est la queue.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les guides de ce peuple ╵l’égarent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui sont guidés ╵sont conduits à la ruine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi le Seigneur ╵ne sera pas clément
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne se réjouira pas de ses jeunes gens.
      marker-yv: yv-n
    - type: text
      text: ' ╵envers ses jeunes gens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’aura pas pitié ╵des orphelins, des veuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tous méprisent Dieu ╵et font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous profèrent ╵des propos insensés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main reste levée.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la méchanceté ╵brûle comme le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui consume les ronces ╵et les épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle embrase ╵les buissons des forêts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fumée s’en élève ╵vers le ciel en volutes.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la fureur de l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le pays est en flammes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le peuple devient ╵la proie du feu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’a pitié de son prochain.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On grappille à sa droite ╵et l’on reste affamé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on dévore à sa gauche, ╵sans être rassasié.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On va jusqu’à manger ╵la chair de ses enfants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette traduction suppose une légère modification du texte hébreu traditionnel qui a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de son bras. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Quelques manuscrits de l’ancienne version grecque et le targoum ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son prochain.
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵tu fais abonder l’allégresse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette traduction suppose une légère modification du texte. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as fait s’accroître le peuple.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu fais jaillir ╵une très grande joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on se réjouit devant toi ╵tout comme au temps de la moisson,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou comme on crie de joie ╵lors du partage d’un butin.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Manassé dévore Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Ephraïm dévore Manassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les deux vont ensemble ╵se jeter sur Juda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, malgré tout cela, ╵son courroux ne s’apaise pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main reste levée.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le joug qui pesait sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le bâton qui frappait son dos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le gourdin de son oppresseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, tu les as brisés ╵tout comme au jour ╵de la défaite de Madian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la victoire de Gédéon sur les Madianites (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 7
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute chaussure de guerrier ╵qui martèle le sol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout manteau ╵que l’on a roulé dans le sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront livrés aux flammes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour être consumés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un enfant nous est né
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car un enfant est né pour nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un fils nous est donné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il exercera ╵l’autorité royale ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera appelé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Merveilleux Conseiller, Dieu fort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Père à jamais ╵et Prince de la paix.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il étendra ╵sa souveraineté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il instaurera ╵la paix qui durera toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au trône de David ╵et à tout son royaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa royauté sera ╵solidement fondée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le droit et sur la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès à présent ╵et pour l’éternité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que fera ╵le Seigneur des armées célestes ╵dans son ardent amour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.32-33
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement sur Israël
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a lancé ╵un message contre Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s’abat sur Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob, Israël, Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Samarie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désignent le royaume du Nord séparé de celui de Juda depuis près de 200 ans, dont Samarie était la capitale.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple tout entier ╵en aura connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le peuple d’Ephraïm, ╵les habitants de Samarie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui disent, pleins d’orgueil ╵et le cœur arrogant :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Les briques sont tombées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais nous reconstruirons ╵en pierres bien taillées ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sycomores ╵ont été abattus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des cèdres nous les remplacerons. »
