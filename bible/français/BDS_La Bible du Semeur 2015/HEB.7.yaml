document_id: HEB.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La ligne de Melchisédek supérieure à celle d’Aaron
  - type: text
    content: 'Ce '
  - type: text
    content: Melchisédek
  - type: text
    content: ' était, selon l’Ecriture, '
  - type: text
    content: 'roi de Salem et '
  - type: text
    content: prêtre
  - type: text
    content: ' du Dieu très-haut.'
  - type: text
    content: ' C’est lui qui '
  - type: text
    content: 'a rencontré '
  - type: text
    content: Abraham
  - type: text
    content: ' quand celui-ci revenait de sa victoire sur les rois'
  - type: text
    content: ' et qui '
  - type: text
    content: l’a béni
  - type: text
    content: '. '
  '10':
  - type: text
    content: En effet, puisqu’il n’était pas encore né, il était encore en puissance dans la personne de son ancêtre Abraham lorsque Melchisédek a rencontré celui-ci.
  - type: heading
    content: Christ est prêtre selon la ligne de Melchisédek
  '11':
  - type: text
    content: 'La Loi donnée au peuple d’Israël repose sur le sacerdoce lévitique. Or, s’il avait été possible d’atteindre la perfection par ce sacerdoce, pourquoi était-il nécessaire d’établir un autre '
  - type: text
    content: prêtre
  - type: text
    content: ', selon la ligne de Melchisédek'
  - type: text
    content: ', et non pas '
  - type: text
    content: selon la ligne
  - type: text
    content: ' d’Aaron ?'
  '12':
  - type: text
    content: 'Or, ce changement de sacerdoce entraîne forcément un changement de loi. '
  '13':
  - type: text
    content: 'Car les affirmations du texte que nous venons de citer concernent un prêtre qui est d’une autre tribu que celle de Lévi, une tribu dont aucun membre n’a jamais été affecté au service de l’autel. '
  '14':
  - type: text
    content: Comme on le sait bien, en effet, notre Seigneur est issu de la tribu de Juda, et Moïse n’a jamais parlé de sacerdoce pour cette tribu.
  '15':
  - type: text
    content: 'Cela devient plus évident encore quand on considère ce fait : c’est sur le modèle de Melchisédek qu’un autre prêtre s’est levé ; '
  '16':
  - type: text
    content: 'et il n’est pas devenu prêtre en vertu d’une règle liée à la filiation naturelle, mais par la puissance d’une vie indestructible. '
  '17':
  - type: text
    content: 'Car il est déclaré à son sujet :'
  - type: text
    content: Tu es prêtre pour toujours
  - type: text
    content: selon la ligne de Melchisédek
  - type: text
    content: ' '
  - type: note
    content: Ps 110.4 .
  - type: text
    content: .
  '18':
  - type: text
    content: 'D’une part donc, la règle antérieure se trouve abrogée parce qu’elle était impuissante et inutile. '
  '19':
  - type: text
    content: La Loi, en effet, n’a rien amené à la perfection. D’autre part, une meilleure espérance a été introduite, par laquelle nous nous approchons de Dieu.
  - type: heading
    content: Christ, grand-prêtre pour l’éternité
  '2':
  - type: text
    content: Et c’est à lui qu’
  - type: text
    content: Abraham a donné le dixième de tout son butin
  - type: note
    content: Gn 14.17-20.
  - type: text
    content: .
  - type: text
    content: 'Tout d’abord, le nom de Melchisédek signifie roi de justice. Ensuite, il est '
  - type: text
    content: roi de Salem
  - type: text
    content: ', ce qui veut dire : roi de paix. '
  '20':
  - type: text
    content: 'En outre, tout cela ne s’est pas fait sans serment de Dieu. Les autres prêtres ont reçu la prêtrise sans un tel serment, '
  '21':
  - type: text
    content: 'mais Jésus est devenu prêtre en vertu d’un serment que Dieu a prononcé quand il lui a dit :'
  - type: text
    content: Le Seigneur l’a juré,
  - type: text
    content: ' ╵'
  - type: text
    content: il ne reviendra pas
  - type: text
    content: ' ╵'
  - type: text
    content: 'sur son engagement :'
  - type: text
    content: 'tu seras '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours'
  - type: text
    content: ' '
  - type: note
    content: Ps 110.4 .
  - type: text
    content: .
  '22':
  - type: text
    content: Ainsi, Jésus est devenu le garant d’une alliance meilleure.
  '23':
  - type: text
    content: 'De plus, de nombreux prêtres se sont succédé parce que la mort les empêchait d’exercer leurs fonctions à perpétuité. '
  '24':
  - type: text
    content: 'Mais Jésus, lui, parce qu’il demeure éternellement, possède le sacerdoce perpétuel. '
  '25':
  - type: text
    content: Voilà pourquoi il est en mesure de sauver parfaitement ceux qui s’approchent de Dieu par lui, puisqu’il est toujours vivant pour intercéder en leur faveur auprès de Dieu.
  '26':
  - type: text
    content: 'Jésus est donc bien le grand-prêtre qu’il nous fallait : il est saint, pleinement innocent, indemne de tout péché, séparé des pécheurs et il a été élevé plus haut que les cieux. '
  '27':
  - type: text
    content: Les autres grands-prêtres sont obligés d’offrir chaque jour des sacrifices, d’abord pour leurs propres péchés, ensuite pour ceux du peuple. Lui n’en a pas besoin, car il a tout accompli une fois pour toutes, en s’offrant lui-même.
  '28':
  - type: text
    content: Les grands-prêtres institués par la Loi sont des hommes marqués par leur faiblesse. Mais celui que Dieu a établi grand-prêtre par un serment solennel, prononcé après la promulgation de la Loi, est son propre Fils, et il a été rendu parfait pour toujours.
  '3':
  - type: text
    content: En outre, l’Ecriture ne lui attribue ni père, ni mère, ni généalogie. Elle ne mentionne ni sa naissance, ni sa mort. Elle le rend ainsi semblable au Fils de Dieu, et il demeure prêtre pour toujours.
  '4':
  - type: text
    content: 'Remarquez quel rang éminent occupait cet homme pour qu’Abraham, le patriarche, lui donne la dîme de son butin. '
  '5':
  - type: text
    content: Certes, la Loi ordonne à ceux des lévites qui sont prêtres de prélever la dîme sur le peuple d’Israël
  - type: note
    content: Voir Nb 18.21.
  - type: text
    content: ', c’est-à-dire sur leurs frères, bien que ceux-ci soient, comme eux, des descendants d’Abraham. '
  '6':
  - type: text
    content: 'Mais Melchisédek, qui ne figure pas parmi les descendants de Lévi, a reçu la dîme d’Abraham. En outre, il a invoqué la bénédiction de Dieu sur celui qui avait reçu les promesses divines. '
  '7':
  - type: text
    content: Or, incontestablement, c’est l’inférieur qui est béni par le supérieur.
  '8':
  - type: text
    content: De plus, dans le premier cas, ceux qui perçoivent la dîme sont des hommes mortels ; dans le second, selon le témoignage de l’Ecriture, il s’agit de quelqu’un qui vit.
  '9':
  - type: text
    content: 'Enfin, concernant Lévi, qui perçoit la dîme, on peut même dire qu’il l’a versée à Melchisédek en la personne d’Abraham. '
