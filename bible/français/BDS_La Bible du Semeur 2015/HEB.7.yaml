document_id: HEB.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La ligne de Melchisédek supérieure à celle d’Aaron
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ce '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Melchisédek
    - type: text
      text: ' était, selon l’Ecriture, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'roi de Salem et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' du Dieu très-haut.'
    - type: text
      text: ' C’est lui qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'a rencontré '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ' quand celui-ci revenait de sa victoire sur les rois'
    - type: text
      text: ' et qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’a béni
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, puisqu’il n’était pas encore né, il était encore en puissance dans la personne de son ancêtre Abraham lorsque Melchisédek a rencontré celui-ci.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ est prêtre selon la ligne de Melchisédek
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La Loi donnée au peuple d’Israël repose sur le sacerdoce lévitique. Or, s’il avait été possible d’atteindre la perfection par ce sacerdoce, pourquoi était-il nécessaire d’établir un autre '
    - type: usfm
      marker: qt
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ', selon la ligne de Melchisédek'
    - type: text
      text: ', et non pas '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: selon la ligne
    - type: text
      text: ' d’Aaron ?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Or, ce changement de sacerdoce entraîne forcément un changement de loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Car les affirmations du texte que nous venons de citer concernent un prêtre qui est d’une autre tribu que celle de Lévi, une tribu dont aucun membre n’a jamais été affecté au service de l’autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Comme on le sait bien, en effet, notre Seigneur est issu de la tribu de Juda, et Moïse n’a jamais parlé de sacerdoce pour cette tribu.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Cela devient plus évident encore quand on considère ce fait : c’est sur le modèle de Melchisédek qu’un autre prêtre s’est levé ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'et il n’est pas devenu prêtre en vertu d’une règle liée à la filiation naturelle, mais par la puissance d’une vie indestructible. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car il est déclaré à son sujet :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu es prêtre pour toujours
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: selon la ligne de Melchisédek
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 110.4
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'D’une part donc, la règle antérieure se trouve abrogée parce qu’elle était impuissante et inutile. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: La Loi, en effet, n’a rien amené à la perfection. D’autre part, une meilleure espérance a été introduite, par laquelle nous nous approchons de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ, grand-prêtre pour l’éternité
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Et c’est à lui qu’
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Abraham a donné le dixième de tout son butin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 14.17-20
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout d’abord, le nom de Melchisédek signifie roi de justice. Ensuite, il est '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: roi de Salem
    - type: text
      text: ', ce qui veut dire : roi de paix. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En outre, tout cela ne s’est pas fait sans serment de Dieu. Les autres prêtres ont reçu la prêtrise sans un tel serment, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'mais Jésus est devenu prêtre en vertu d’un serment que Dieu a prononcé quand il lui a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le Seigneur l’a juré,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il ne reviendra pas
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'sur son engagement :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'tu seras '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' pour toujours'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 110.4
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ainsi, Jésus est devenu le garant d’une alliance meilleure.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'De plus, de nombreux prêtres se sont succédé parce que la mort les empêchait d’exercer leurs fonctions à perpétuité. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais Jésus, lui, parce qu’il demeure éternellement, possède le sacerdoce perpétuel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Voilà pourquoi il est en mesure de sauver parfaitement ceux qui s’approchent de Dieu par lui, puisqu’il est toujours vivant pour intercéder en leur faveur auprès de Dieu.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus est donc bien le grand-prêtre qu’il nous fallait : il est saint, pleinement innocent, indemne de tout péché, séparé des pécheurs et il a été élevé plus haut que les cieux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Les autres grands-prêtres sont obligés d’offrir chaque jour des sacrifices, d’abord pour leurs propres péchés, ensuite pour ceux du peuple. Lui n’en a pas besoin, car il a tout accompli une fois pour toutes, en s’offrant lui-même.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Les grands-prêtres institués par la Loi sont des hommes marqués par leur faiblesse. Mais celui que Dieu a établi grand-prêtre par un serment solennel, prononcé après la promulgation de la Loi, est son propre Fils, et il a été rendu parfait pour toujours.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: En outre, l’Ecriture ne lui attribue ni père, ni mère, ni généalogie. Elle ne mentionne ni sa naissance, ni sa mort. Elle le rend ainsi semblable au Fils de Dieu, et il demeure prêtre pour toujours.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Remarquez quel rang éminent occupait cet homme pour qu’Abraham, le patriarche, lui donne la dîme de son butin. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Certes, la Loi ordonne à ceux des lévites qui sont prêtres de prélever la dîme sur le peuple d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 18.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', c’est-à-dire sur leurs frères, bien que ceux-ci soient, comme eux, des descendants d’Abraham. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais Melchisédek, qui ne figure pas parmi les descendants de Lévi, a reçu la dîme d’Abraham. En outre, il a invoqué la bénédiction de Dieu sur celui qui avait reçu les promesses divines. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Or, incontestablement, c’est l’inférieur qui est béni par le supérieur.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: De plus, dans le premier cas, ceux qui perçoivent la dîme sont des hommes mortels ; dans le second, selon le témoignage de l’Ecriture, il s’agit de quelqu’un qui vit.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Enfin, concernant Lévi, qui perçoit la dîme, on peut même dire qu’il l’a versée à Melchisédek en la personne d’Abraham. '
