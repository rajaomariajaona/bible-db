document_id: PSA.123,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dans l’attente de sa grâce
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Je lève les yeux vers toi,
  - type: text
    content: toi qui sièges dans les cieux.
  '2':
  - type: text
    content: Oui, comme les serviteurs ╵fixent leurs regards
  - type: text
    content: sur la main du maître,
  - type: text
    content: comme la servante ╵fixe ses regards ╵sur la main de sa maîtresse
  - type: note
    content: C’est par des gestes de la main que maître et maîtresse font connaître leurs volontés et leurs sentiments à leurs serviteurs.
  - type: text
    content: ','
  - type: text
    content: ainsi nos regards se tournent ╵vers l’Eternel, notre Dieu,
  - type: text
    content: dans l’attente qu’il nous fasse grâce.
  '3':
  - type: text
    content: Fais-nous grâce, ô Eternel ! ╵Manifeste-nous ta compassion !
  - type: text
    content: Car nous sommes saturés ╵du mépris qu’on nous témoigne.
  '4':
  - type: text
    content: Oui, nous sommes saturés
  - type: text
    content: des railleries des repus ╵et du mépris des hautains.
