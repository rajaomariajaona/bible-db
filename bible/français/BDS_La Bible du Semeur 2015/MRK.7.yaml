document_id: MRK.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et la tradition religieuse juive
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 15.1-20)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Des pharisiens et des spécialistes de la Loi venus de Jérusalem se rassemblèrent autour de Jésus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' a dit : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Honore ton père et ta mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 20.12 ; Dt 5.16.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Que celui qui maudit son père ou sa mère soit puni de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 21.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais vous, que dites-vous ? Si un homme dit à son père ou à sa mère : « La part de mes biens avec laquelle j’aurais pu t’assister est corban (c’est-à-dire offrande à Dieu) »,'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: alors vous ne le laissez plus rien faire pour son père ou sa mère.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voilà comment vous annulez la Parole de Dieu par votre tradition, celle que vous vous transmettez. Et vous faites bien d’autres choses du même genre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puis Jésus appela de nouveau la foule et lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ecoutez-moi tous, et comprenez-moi bien :'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rien de ce qui vient du dehors et qui pénètre dans l’homme ne peut le rendre impur. C’est, au contraire, ce qui sort de l’homme qui le rend impur !
    - type: text
      text: ' [ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un a des oreilles pour entendre, qu’il entende
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce verset est absent de plusieurs manuscrits.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '!'
    - type: text
      text: ']'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Lorsque Jésus, laissant la foule, fut rentré à la maison, ses disciples lui demandèrent de leur expliquer le sens de cette image.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ainsi, vous non plus, vous ne comprenez pas ? Ne saisissez-vous pas ce que je veux dire ? De tout ce qui vient du dehors et pénètre dans l’homme, rien ne peut le rendre impur.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout cela, en effet, ne va pas dans son cœur mais dans son ventre, et est évacué par les voies naturelles.
    - type: text
      text: ' – Il déclarait par là même que tous les aliments sont purs. – '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils remarquèrent que certains de ses disciples prenaient leur repas avec des mains « impures », c’est-à-dire qu’ils ne s’étaient pas lavé les mains. (
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Et il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce qui sort de l’homme, c’est cela qui le rend impur.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car c’est du dedans, c’est du cœur de l’homme que proviennent les pensées mauvaises, l’immoralité, le vol, le meurtre,
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'les adultères, l’envie, la méchanceté, la tromperie, le vice, la jalousie, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: blasphème
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les injures.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', l’orgueil, et toutes sortes de comportements insensés.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout ce mal sort du dedans et rend l’homme impur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La foi d’une non-Juive
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 15.21-28)
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jésus partit de là et se rendit dans la région de Tyr. Il entra dans une maison ; il ne voulait pas qu’on sache qu’il était là, mais il ne put cacher sa présence. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, à peine était-il arrivé, qu’une femme, qui avait entendu parler de lui et dont la fillette était sous l’emprise d’un esprit mauvais, vint se jeter à ses pieds. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C’était une femme païenne, originaire de Syro-Phénicie. Elle le supplia de chasser le démon qui tourmentait sa fille.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laisse d’abord se rassasier les enfants de la maison. Car il ne serait pas convenable de prendre le pain des enfants pour le jeter aux petits chiens.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: – Sans doute, Seigneur, reprit-elle, mais les petits chiens, qui sont sous la table, mangent les miettes que laissent tomber les enfants.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et Jésus de répondre : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A cause de cette parole, va, retourne chez toi, le démon vient de sortir de ta fille.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, les pharisiens, et les Juifs en général, ne se mettent jamais à table sans les avoir soigneusement lavées ; ils observent ainsi la tradition de leurs ancêtres. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Elle rentra chez elle et trouva son enfant couchée sur le lit : le démon était parti.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un sourd-muet
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jésus quitta la région de Tyr, passa par Sidon, et regagna le lac de Galilée en traversant le territoire des « Dix Villes ». '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On lui amena un sourd qui avait du mal à parler et on le pria de lui imposer les mains. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Jésus l’emmena seul avec lui, loin de la foule : après avoir posé ses doigts sur les oreilles du malade, il les humecta de salive et lui toucha la langue ; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'alors il leva les yeux au ciel, poussa un soupir et dit : '
    - type: usfm
      marker: tl
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Ephphatha
    - type: text
      text: ' (ce qui signifie : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ouvre-toi
    - type: text
      text: ).
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Aussitôt les oreilles de cet homme s’ouvrirent, sa langue se délia et il se mit à parler correctement. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Jésus recommanda à ceux qui étaient là de n’en rien dire à personne ; mais plus il le leur défendait, plus ils en parlaient.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Remplies d’étonnement, les foules s’écriaient : Tout ce qu’il fait est magnifique : il fait entendre les sourds et parler les muets !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'De même, en revenant du marché, ils ne mangent pas sans avoir fait leurs ablutions. Ils ont reçu beaucoup d’autres traditions qu’ils observent, comme celles de laver rituellement les coupes, les pots et les vases de bronze.) '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les pharisiens et les spécialistes de la Loi demandèrent donc à Jésus : Pourquoi tes disciples ne se conforment-ils pas à la tradition de nos ancêtres ? Pourquoi prennent-ils leur repas avec des mains impures ?'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Hypocrites,
    - type: text
      text: ' leur répondit-il, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esaïe
      - type: text
        text: ' vous a fort bien dépeints dans sa prophétie où il est écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Ce peuple m’honore des lèvres,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: mais, au fond de son cœur, il est bien loin de moi !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Le culte qu’il me rend n’a aucune valeur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: car les enseignements qu’il donne
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ne sont que des règles inventées par les hommes
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 29.13
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous mettez de côté le commandement de Dieu, pour observer la tradition des hommes !
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Puis il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ah ! vous réussissez parfaitement à mettre de côté le commandement de Dieu pour établir votre propre tradition !
    - type: text
      text: ' '
