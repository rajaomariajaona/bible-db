document_id: MRK.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la tradition religieuse juive
  - type: heading
    content: (Mt 15.1-20)
  - type: text
    content: 'Des pharisiens et des spécialistes de la Loi venus de Jérusalem se rassemblèrent autour de Jésus. '
  '10':
  - type: text
    content: 'En effet, '
  - type: text
    content: Moïse
  - type: text
    content: ' a dit : '
  - type: text
    content: Honore ton père et ta mère
  - type: note
    content: Ex 20.12 ; Dt 5.16.
  - type: text
    content: ' '
  - type: text
    content: 'et '
  - type: text
    content: Que celui qui maudit son père ou sa mère soit puni de mort
  - type: note
    content: Ex 21.17.
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Mais vous, que dites-vous ? Si un homme dit à son père ou à sa mère : « La part de mes biens avec laquelle j’aurais pu t’assister est corban (c’est-à-dire offrande à Dieu) »,'
  - type: text
    content: ' '
  '12':
  - type: text
    content: alors vous ne le laissez plus rien faire pour son père ou sa mère.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Voilà comment vous annulez la Parole de Dieu par votre tradition, celle que vous vous transmettez. Et vous faites bien d’autres choses du même genre.
  '14':
  - type: text
    content: 'Puis Jésus appela de nouveau la foule et lui dit : '
  - type: text
    content: 'Ecoutez-moi tous, et comprenez-moi bien :'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Rien de ce qui vient du dehors et qui pénètre dans l’homme ne peut le rendre impur. C’est, au contraire, ce qui sort de l’homme qui le rend impur !
  - type: text
    content: ' [ '
  '16':
  - type: text
    content: Si quelqu’un a des oreilles pour entendre, qu’il entende
  - type: note
    content: Ce verset est absent de plusieurs manuscrits.
  - type: text
    content: '!'
  - type: text
    content: ']'
  '17':
  - type: text
    content: Lorsque Jésus, laissant la foule, fut rentré à la maison, ses disciples lui demandèrent de leur expliquer le sens de cette image.
  '18':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: Ainsi, vous non plus, vous ne comprenez pas ? Ne saisissez-vous pas ce que je veux dire ? De tout ce qui vient du dehors et pénètre dans l’homme, rien ne peut le rendre impur.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Tout cela, en effet, ne va pas dans son cœur mais dans son ventre, et est évacué par les voies naturelles.
  - type: text
    content: ' – Il déclarait par là même que tous les aliments sont purs. – '
  '2':
  - type: text
    content: Ils remarquèrent que certains de ses disciples prenaient leur repas avec des mains « impures », c’est-à-dire qu’ils ne s’étaient pas lavé les mains. (
  '20':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: Ce qui sort de l’homme, c’est cela qui le rend impur.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Car c’est du dedans, c’est du cœur de l’homme que proviennent les pensées mauvaises, l’immoralité, le vol, le meurtre,
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'les adultères, l’envie, la méchanceté, la tromperie, le vice, la jalousie, le '
  - type: text
    content: blasphème
  - type: note
    content: 'Autre traduction : les injures.'
  - type: text
    content: ', l’orgueil, et toutes sortes de comportements insensés.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Tout ce mal sort du dedans et rend l’homme impur.
  - type: heading
    content: La foi d’une non-Juive
  - type: heading
    content: (Mt 15.21-28)
  '24':
  - type: text
    content: 'Jésus partit de là et se rendit dans la région de Tyr. Il entra dans une maison ; il ne voulait pas qu’on sache qu’il était là, mais il ne put cacher sa présence. '
  '25':
  - type: text
    content: 'En effet, à peine était-il arrivé, qu’une femme, qui avait entendu parler de lui et dont la fillette était sous l’emprise d’un esprit mauvais, vint se jeter à ses pieds. '
  '26':
  - type: text
    content: C’était une femme païenne, originaire de Syro-Phénicie. Elle le supplia de chasser le démon qui tourmentait sa fille.
  '27':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Laisse d’abord se rassasier les enfants de la maison. Car il ne serait pas convenable de prendre le pain des enfants pour le jeter aux petits chiens.
  '28':
  - type: text
    content: – Sans doute, Seigneur, reprit-elle, mais les petits chiens, qui sont sous la table, mangent les miettes que laissent tomber les enfants.
  '29':
  - type: text
    content: 'Et Jésus de répondre : '
  - type: text
    content: A cause de cette parole, va, retourne chez toi, le démon vient de sortir de ta fille.
  '3':
  - type: text
    content: 'En effet, les pharisiens, et les Juifs en général, ne se mettent jamais à table sans les avoir soigneusement lavées ; ils observent ainsi la tradition de leurs ancêtres. '
  '30':
  - type: text
    content: 'Elle rentra chez elle et trouva son enfant couchée sur le lit : le démon était parti.'
  - type: heading
    content: Guérison d’un sourd-muet
  '31':
  - type: text
    content: 'Jésus quitta la région de Tyr, passa par Sidon, et regagna le lac de Galilée en traversant le territoire des « Dix Villes ». '
  '32':
  - type: text
    content: 'On lui amena un sourd qui avait du mal à parler et on le pria de lui imposer les mains. '
  '33':
  - type: text
    content: 'Jésus l’emmena seul avec lui, loin de la foule : après avoir posé ses doigts sur les oreilles du malade, il les humecta de salive et lui toucha la langue ; '
  '34':
  - type: text
    content: 'alors il leva les yeux au ciel, poussa un soupir et dit : '
  - type: text
    content: Ephphatha
  - type: text
    content: ' (ce qui signifie : '
  - type: text
    content: ouvre-toi
  - type: text
    content: ).
  '35':
  - type: text
    content: 'Aussitôt les oreilles de cet homme s’ouvrirent, sa langue se délia et il se mit à parler correctement. '
  '36':
  - type: text
    content: Jésus recommanda à ceux qui étaient là de n’en rien dire à personne ; mais plus il le leur défendait, plus ils en parlaient.
  '37':
  - type: text
    content: 'Remplies d’étonnement, les foules s’écriaient : Tout ce qu’il fait est magnifique : il fait entendre les sourds et parler les muets !'
  '4':
  - type: text
    content: 'De même, en revenant du marché, ils ne mangent pas sans avoir fait leurs ablutions. Ils ont reçu beaucoup d’autres traditions qu’ils observent, comme celles de laver rituellement les coupes, les pots et les vases de bronze.) '
  '5':
  - type: text
    content: 'Les pharisiens et les spécialistes de la Loi demandèrent donc à Jésus : Pourquoi tes disciples ne se conforment-ils pas à la tradition de nos ancêtres ? Pourquoi prennent-ils leur repas avec des mains impures ?'
  '6':
  - type: text
    content: ' '
  - type: text
    content: – Hypocrites,
  - type: text
    content: ' leur répondit-il, '
  - type: text
    content: Esaïe
  - type: text
    content: ' vous a fort bien dépeints dans sa prophétie où il est écrit :'
  - type: text
    content: Ce peuple m’honore des lèvres,
  - type: text
    content: mais, au fond de son cœur, il est bien loin de moi !
  '7':
  - type: text
    content: ' '
  - type: text
    content: Le culte qu’il me rend n’a aucune valeur,
  - type: text
    content: car les enseignements qu’il donne
  - type: text
    content: ne sont que des règles inventées par les hommes
  - type: text
    content: ' '
  - type: note
    content: Es 29.13 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: text
    content: Vous mettez de côté le commandement de Dieu, pour observer la tradition des hommes !
  '9':
  - type: text
    content: 'Puis il ajouta : '
  - type: text
    content: Ah ! vous réussissez parfaitement à mettre de côté le commandement de Dieu pour établir votre propre tradition !
  - type: text
    content: ' '
