document_id: 2CH.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les débuts du règne de Joas
  - type: heading
    content: (2 R 12.1-17)
  - type: text
    content: 'Joas était âgé de sept ans lorsqu’il devint roi. Il régna quarante ans à Jérusalem. Sa mère se nommait Tsibia, elle était originaire de Beer-Sheva. '
  '10':
  - type: text
    content: 'Tous les dirigeants et tout le peuple s’en réjouirent : ils apportèrent de l’argent et le mirent dans le coffre jusqu’à ce qu’il fût plein. '
  '11':
  - type: text
    content: 'Lorsque venait le moment pour les lévites de l’apporter à l’inspection royale, et que l’on constatait qu’il y avait beaucoup d’argent, le secrétaire du roi et le commissaire du grand-prêtre venaient le vider, puis les lévites le prenaient pour le rapporter à sa place. On fit ainsi chaque jour et l’on collecta beaucoup d’argent. '
  '12':
  - type: text
    content: 'Le roi et Yehoyada le remettaient à l’entrepreneur qui accomplissait les travaux de restauration du temple de l’Eternel, et ils payèrent des tailleurs de pierres et des charpentiers pour restaurer le temple de l’Eternel, ainsi que des artisans travaillant le fer et le bronze, pour faire des réparations dans le temple de l’Eternel. '
  '13':
  - type: text
    content: 'Les entrepreneurs se mirent au travail et les réparations progressèrent par leurs soins. Ils remirent le Temple en état et le consolidèrent. '
  '14':
  - type: text
    content: 'Lorsqu’ils eurent terminé les travaux, ils rapportèrent au roi et à Yehoyada le reste de l’argent. On l’utilisa pour fabriquer des objets pour le service du Temple et divers accessoires pour le culte et pour les holocaustes : coupes et autres ustensiles d’or et d’argent. Pendant toute la vie de Yehoyada, on offrit continuellement des holocaustes dans le temple de l’Eternel.'
  '15':
  - type: text
    content: 'Yehoyada devint vieux et mourut rassasié de jours, à l’âge de cent trente ans. '
  '16':
  - type: text
    content: On l’enterra dans la Cité de David avec les rois, parce qu’il avait agi pour le bien en Israël, pour la cause de Dieu et de son temple.
  - type: heading
    content: Idolâtrie et meurtre
  '17':
  - type: text
    content: 'Après la mort de Yehoyada, les dirigeants de Juda vinrent se prosterner devant le roi qui les écouta. '
  '18':
  - type: text
    content: 'Ils délaissèrent le temple de l’Eternel, le Dieu de leurs ancêtres, et ils rendirent un culte aux Ashéras et aux idoles. Par cette conduite coupable, ils provoquèrent la colère de l’Eternel contre Juda et Jérusalem. '
  '19':
  - type: text
    content: 'L’Eternel envoya parmi eux des prophètes pour les faire revenir à lui. Ces prophètes protestèrent contre eux, mais personne ne les écouta. '
  '2':
  - type: text
    content: 'Joas fit ce que l’Eternel considère comme juste pendant toute la vie du prêtre Yehoyada. '
  '20':
  - type: text
    content: 'Alors l’Esprit de Dieu se saisit de Zacharie, fils du prêtre Yehoyada, il se présenta devant le peuple et dit : Voici ce que Dieu vous déclare : « Pourquoi enfreignez-vous les commandements de l’Eternel ? Vous ne réussirez rien ! Puisque vous avez abandonné l’Eternel, il vous a abandonnés. »'
  '21':
  - type: text
    content: Alors les gens complotèrent contre lui et on le lapida sur ordre du roi dans le parvis du temple de l’Eternel
  - type: note
    content: Allusion en Mt 23.35 ; Lc 11.51.
  - type: text
    content: .
  '22':
  - type: text
    content: 'Ainsi le roi Joas oublia toute la bienveillance dont Yehoyada, le père de Zacharie, avait fait preuve envers lui, et il fit tuer son fils. Zacharie dit en mourant : Que l’Eternel voie et qu’il fasse rendre compte !'
  - type: heading
    content: Le châtiment et la fin de Joas
  - type: heading
    content: (2 R 12.18-22)
  '23':
  - type: text
    content: 'A la fin de l’année, l’armée syrienne vint attaquer Joas. Les Syriens envahirent Juda et Jérusalem. Ils massacrèrent tous les dirigeants du peuple et envoyèrent tout le butin au roi de Damas. '
  '24':
  - type: text
    content: 'Les Syriens étaient venus avec un petit nombre d’hommes, et cependant, l’Eternel leur donna la victoire sur une armée considérable de Judéens, parce que ceux-ci avaient abandonné l’Eternel, le Dieu de leurs ancêtres. Ainsi les Syriens furent les instruments du jugement contre Joas. '
  '25':
  - type: text
    content: A peine se furent-ils retirés de chez lui, en le laissant dans de grandes souffrances, que ses ministres conspirèrent contre lui, à cause du meurtre des fils
  - type: note
    content: 'L’ancienne version grecque et la Vulgate ont : du fils.'
  - type: text
    content: ' du prêtre Yehoyada ; ils l’assassinèrent dans son lit. Une fois mort, on l’enterra dans la Cité de David, mais pas dans les tombeaux des rois'
  - type: note
    content: Une sépulture plus ou moins honorable était attribuée aux rois suivant leur conduite (voir 21.20 ; 28.27 ; 32.33).
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Les auteurs du complot contre lui étaient Zabad, fils d’une femme ammonite nommée Shimeath, et Yehozabad, fils de Shimrith, une femme moabite. '
  '27':
  - type: text
    content: La liste des fils de Joas, le texte des nombreux oracles prononcés contre lui et le récit de la restauration du Temple, tout cela est consigné dans les commentaires du livre des rois. Son fils Amatsia, lui succéda sur le trône.
  '3':
  - type: text
    content: Celui-ci lui fit épouser deux femmes qui lui donnèrent des fils et des filles.
  - type: heading
    content: La réfection du Temple
  '4':
  - type: text
    content: Plus tard, Joas eut à cœur de restaurer le temple de l’Eternel
  - type: note
    content: Dévasté par Athalie (voir v. 7).
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Il convoqua les prêtres et les lévites et leur dit : Allez parcourir les villes de Juda, et collectez chaque année dans tout Israël de l’argent pour réparer le temple de votre Dieu ! Menez promptement cette affaire !'
  - type: text
    content: 'Mais les lévites laissèrent traîner les choses. '
  '6':
  - type: text
    content: 'Le roi convoqua le grand-prêtre Yehoyada et lui demanda : Pourquoi n’as-tu pas demandé aux lévites de percevoir des habitants de Juda et de Jérusalem l’impôt fixé par Moïse'
  - type: note
    content: Voir Ex 30.12-16 ; 38.26. Tout homme de 20 ans et plus devait payer cette taxe destinée à l’entretien de la tente de la Rencontre, puis du Temple.
  - type: text
    content: ', serviteur de l’Eternel, à l’assemblée d’Israël, pour la tente où se trouvait l’acte de l’alliance ? '
  '7':
  - type: text
    content: En effet, la perverse Athalie et ses partisans ont forcé l’entrée du temple de Dieu et ils ont même utilisé pour le culte des Baals tous les objets sacrés du temple de l’Eternel.
  '8':
  - type: text
    content: 'Sur ordre du roi, on fabriqua un coffre que l’on plaça près de l’entrée du temple de l’Eternel, à l’extérieur. '
  '9':
  - type: text
    content: 'On fit proclamer dans Juda et dans Jérusalem qu’il fallait apporter à l’Eternel la contribution imposée à Israël par Moïse, serviteur de l’Eternel, dans le désert. '
