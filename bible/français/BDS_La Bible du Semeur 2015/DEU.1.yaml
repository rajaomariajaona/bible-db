document_id: DEU.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Préambule
  - type: text
    content: Voici les paroles que Moïse adressa à tout Israël à l’est du Jourdain, dans le désert, dans la plaine qui fait face à Souph, entre Parân et Tophel, et entre Labân, Hatséroth et Di-Zahab
  - type: note
    content: Lieux difficiles à identifier à moins qu’ils ne correspondent aux étapes de la traversée du désert par les Israélites (voir Nb 11.35 ; 12.16 ; 33.20).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'L’Eternel votre Dieu vous a multipliés, au point que vous êtes aujourd’hui aussi nombreux que les étoiles du ciel. '
  '11':
  - type: text
    content: 'Que l’Eternel, le Dieu de vos ancêtres, vous rende mille fois plus nombreux encore, et qu’il vous bénisse comme il vous l’a promis. '
  '12':
  - type: text
    content: 'Comment pourrais-je à moi seul m’occuper de vous, de vos affaires et de vos différends ? '
  '13':
  - type: text
    content: 'Désignez dans chacune de vos tribus des hommes sages, intelligents et estimés, et je les mettrai à votre tête. » '
  '14':
  - type: text
    content: 'Vous m’avez alors répondu : « Ce que tu proposes est une bonne chose. » '
  '15':
  - type: text
    content: 'J’ai donc pris les chefs de vos tribus, des hommes sages et estimés, et je les ai établis chefs de vos « milliers », de vos « centaines », de vos « cinquantaines » et de vos « dizaines » et administrateurs pour vos tribus. '
  '16':
  - type: text
    content: 'J’ai donné, en ce temps-là, les instructions suivantes à vos juges : « Ecoutez avec une attention égale les causes de vos compatriotes et jugez avec équité les différends de chacun dans ses rapports avec son compatriote ou avec un étranger. '
  '17':
  - type: text
    content: 'Soyez impartiaux dans vos décisions, écoutez le petit comme le grand, et ne vous laissez pas intimider par qui que ce soit ; car la justice relève de Dieu. Si une cause paraît trop difficile pour vous, soumettez-la moi et je l’examinerai. » '
  '18':
  - type: text
    content: C’est ainsi que je vous ai ordonné à ce moment-là tout ce que vous avez à faire.
  - type: heading
    content: L’envoi d’éclaireurs
  '19':
  - type: text
    content: Après cela, nous sommes partis du mont Horeb, nous avons traversé tout ce vaste et terrible désert que vous avez vu, en nous dirigeant vers la montagne des Amoréens, comme l’Eternel notre Dieu nous l’avait ordonné ; et nous sommes arrivés à Qadesh-Barnéa
  - type: note
    content: Pour les v. 19-46, voir Nb 13.1 à 14.45.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Il y a onze journées de marche depuis Horeb
  - type: note
    content: Nom habituel du mont Sinaï dans le Deutéronome (sauf 33.2).
  - type: text
    content: ', par le chemin de la montagne de Séir, jusqu’à Qadesh-Barnéa. '
  '20':
  - type: text
    content: 'Je vous ai dit alors : « Vous voilà arrivés à la montagne des Amoréens que l’Eternel notre Dieu nous donne. '
  '21':
  - type: text
    content: 'Regardez : l’Eternel votre Dieu met le pays à votre disposition ; allez-y et prenez-en possession, comme l’Eternel, le Dieu de vos ancêtres, vous l’a dit. N’ayez pas peur, ne vous laissez pas effrayer. »'
  - type: heading
    content: La révolte du peuple
  '22':
  - type: text
    content: 'Alors vous êtes tous venus me trouver pour me dire : « Nous voudrions envoyer quelques hommes en avant pour qu’ils fassent, pour nous, une reconnaissance du pays et qu’ils nous renseignent sur la route que nous devons prendre et sur les villes où nous devons aller. » '
  '23':
  - type: text
    content: La proposition m’a parue bonne et j’ai pris douze hommes d’entre vous, un par tribu
  - type: note
    content: Voir Nb 13.1-15.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Ils ont pris la direction de la montagne et sont arrivés jusqu’à la vallée d’Eshkol qu’ils ont explorée. '
  '25':
  - type: text
    content: 'Ils ont emporté des produits du pays et nous les ont rapportés. Dans leur rapport, ils nous ont dit : « Le pays que l’Eternel notre Dieu nous donne est un bon pays. »'
  '26':
  - type: text
    content: 'Mais vous avez refusé de vous y rendre et vous avez désobéi à l’Eternel votre Dieu. '
  '27':
  - type: text
    content: 'Vous vous êtes plaints sous vos tentes en disant : « C’est parce que l’Eternel nous hait qu’il nous a fait sortir d’Egypte, pour nous livrer aux Amoréens afin de nous exterminer. '
  '28':
  - type: text
    content: 'Où veux-tu que nous allions ? Nos compatriotes nous ont démoralisés en disant : “C’est un peuple plus grand et plus fort que nous, leurs villes sont immenses et leurs remparts atteignent le ciel ; nous avons même vu là-bas des descendants d’Anaq'
  - type: note
    content: Anciens habitants de Canaan, décrits comme étant des « géants ».
  - type: text
    content: .” »
  '29':
  - type: text
    content: 'Je vous ai répondu : « Ne vous effrayez pas et n’ayez pas peur d’eux. '
  '3':
  - type: text
    content: Le premier jour du onzième mois de la quarantième année
  - type: note
    content: Dieu avait condamné Israël à errer durant quarante ans au désert (Nb 14.33-34). Ce décompte inclut les deux années passées près du Sinaï et sur le chemin vers Qadesh et les trente-huit ans dans le désert (voir 2.14 ; 8.2-5 ; 29.4-6 ; Hé 3.7-19).
  - type: text
    content: ' après la sortie d’Egypte, Moïse communiqua aux Israélites tout ce que l’Eternel lui ordonna pour eux. '
  '30':
  - type: text
    content: 'L’Eternel votre Dieu, qui marche à votre tête, combattra lui-même pour vous, tout comme il l’a fait pour vous en Egypte – vous l’avez bien vu – '
  '31':
  - type: text
    content: 'et dans le désert, où vous avez pu constater que l’Eternel votre Dieu s’est occupé de vous comme un homme s’occupe de son fils ; il l’a fait tout au long du chemin que vous avez parcouru pour arriver jusqu’ici. » '
  '32':
  - type: text
    content: 'Malgré tout cela, vous n’avez pas fait confiance à l’Eternel votre Dieu, '
  '33':
  - type: text
    content: qui marchait devant vous sur le chemin pour vous chercher vos lieux de campement, vous précédant la nuit dans une colonne de feu pour vous montrer la route sur laquelle marcher, et le jour dans la nuée.
  - type: heading
    content: Le salaire de l’incrédulité
  '34':
  - type: text
    content: 'Quand l’Eternel entendit vos propos, il s’est irrité et a fait ce serment : '
  '35':
  - type: text
    content: '« Aucun des hommes de cette génération rebelle ne verra le beau pays que j’ai promis par serment à vos ancêtres, '
  '36':
  - type: text
    content: excepté Caleb, fils de Yephounné. Lui, il le verra et je lui donnerai, à lui et à ses descendants, le pays que son pied a foulé, parce qu’il a fidèlement accompli ma volonté
  - type: note
    content: Voir Nb 13.6 ; 14.24 ; Jos 14.6-14.
  - type: text
    content: . »
  '37':
  - type: text
    content: 'L’Eternel s’est aussi mis en colère contre moi à cause de vous et il a dit : « Toi non plus, tu n’y entreras pas. '
  '38':
  - type: text
    content: 'Par contre, Josué, fils de Noun ton assistant, y entrera ; encourage-le, car c’est lui qui mettra Israël en possession de ce pays. '
  '39':
  - type: text
    content: 'Ce sont vos enfants, dont vous avez prétendu qu’ils deviendraient la proie des ennemis, vos fils qui aujourd’hui ne savent pas encore distinguer le bien du mal, qui y entreront ; c’est à eux que je le donnerai, et ils en prendront possession. '
  '4':
  - type: text
    content: Cela se passait après leur victoire sur Sihôn, roi des Amoréens, dont la capitale était Heshbôn, et sur Og, roi du Basan, qui résidait à Ashtaroth et à Edréi
  - type: note
    content: Manque dans le texte hébreu traditionnel. Voir Nb 21.21-35 ; Jos 12.4.
  - type: text
    content: .
  '40':
  - type: text
    content: Quant à vous, faites demi-tour. Repartez au désert en direction de la mer des Roseaux ! »
  - type: heading
    content: La défaite face aux Amoréens
  '41':
  - type: text
    content: 'Alors vous vous êtes écriés : « Nous avons commis une faute contre l’Eternel. Nous irons et combattrons, comme l’Eternel notre Dieu nous l’a ordonné. » Chacun de vous a pris ses armes. Vous avez décidé présomptueusement de gravir la montagne. '
  '42':
  - type: text
    content: 'Mais l’Eternel m’a dit : « Ordonne-leur de ne pas monter et de ne pas combattre, car je ne suis pas avec eux, et ils vont se faire battre par leurs ennemis. » '
  '43':
  - type: text
    content: 'Cependant, j’ai eu beau vous parler, vous n’avez pas écouté : vous avez désobéi à l’Eternel et vous avez eu la témérité de gravir la montagne. '
  '44':
  - type: text
    content: 'Alors les Amoréens qui l’occupent sont sortis pour marcher contre vous et vous ont poursuivis comme un essaim d’abeilles, ils vous ont battus depuis Séir jusqu’à Horma. '
  '45':
  - type: text
    content: 'A votre retour, vous avez pleuré devant l’Eternel, mais il ne vous a pas écoutés, il a fait la sourde oreille à vos lamentations. '
  '46':
  - type: text
    content: C’est ainsi que vous êtes restés très longtemps à Qadesh.
  '5':
  - type: text
    content: 'C’est au-delà du Jourdain, au pays de Moab, que Moïse se mit à leur exposer cette Loi. Il leur dit :'
  - type: heading
    content: Prologue historique
  - type: heading
    content: La première génération des Juifs dans le désert
  - type: heading
    content: Le départ du Sinaï pour le pays de Canaan
  '6':
  - type: text
    content: 'L’Eternel notre Dieu nous a parlé au mont Horeb en ces termes : « Vous avez assez longtemps séjourné près de cette montagne'
  - type: note
    content: 'Selon Ex 19.1 comparé à Nb 10.11  : un peu plus de onze mois (du calendrier israélite, qui compte en mois lunaires).'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Levez le camp et partez, rendez-vous dans la région montagneuse des Amoréens et dans toutes les contrées voisines, la steppe, la montagne et la plaine côtière, le Néguev et les côtes de la mer, dans le pays des Cananéens et le Liban jusqu’au grand fleuve, l’Euphrate. '
  '8':
  - type: text
    content: Voyez, je vous donne cette terre, entrez-y et prenez possession du pays que l’Eternel a promis par serment à vos ancêtres Abraham, Isaac et Jacob, de leur donner, à eux et à leurs descendants. »
  - type: heading
    content: L’institution des juges
  '9':
  - type: text
    content: 'A cette époque-là, je vous ai dit : « Je ne peux pas, à moi seul, assumer la responsabilité de vous tous'
  - type: note
    content: Allusion à la nomination des juges sur le conseil de Jéthro (Ex 18.13-27).
  - type: text
    content: '. '
