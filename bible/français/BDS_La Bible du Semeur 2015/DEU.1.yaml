document_id: DEU.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Préambule
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici les paroles que Moïse adressa à tout Israël à l’est du Jourdain, dans le désert, dans la plaine qui fait face à Souph, entre Parân et Tophel, et entre Labân, Hatséroth et Di-Zahab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lieux difficiles à identifier à moins qu’ils ne correspondent aux étapes de la traversée du désert par les Israélites (voir Nb 11.35 ; 12.16 ; 33.20).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Eternel votre Dieu vous a multipliés, au point que vous êtes aujourd’hui aussi nombreux que les étoiles du ciel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Que l’Eternel, le Dieu de vos ancêtres, vous rende mille fois plus nombreux encore, et qu’il vous bénisse comme il vous l’a promis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Comment pourrais-je à moi seul m’occuper de vous, de vos affaires et de vos différends ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Désignez dans chacune de vos tribus des hommes sages, intelligents et estimés, et je les mettrai à votre tête. » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous m’avez alors répondu : « Ce que tu proposes est une bonne chose. » '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'J’ai donc pris les chefs de vos tribus, des hommes sages et estimés, et je les ai établis chefs de vos « milliers », de vos « centaines », de vos « cinquantaines » et de vos « dizaines » et administrateurs pour vos tribus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'J’ai donné, en ce temps-là, les instructions suivantes à vos juges : « Ecoutez avec une attention égale les causes de vos compatriotes et jugez avec équité les différends de chacun dans ses rapports avec son compatriote ou avec un étranger. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Soyez impartiaux dans vos décisions, écoutez le petit comme le grand, et ne vous laissez pas intimider par qui que ce soit ; car la justice relève de Dieu. Si une cause paraît trop difficile pour vous, soumettez-la moi et je l’examinerai. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: C’est ainsi que je vous ai ordonné à ce moment-là tout ce que vous avez à faire.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’envoi d’éclaireurs
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Après cela, nous sommes partis du mont Horeb, nous avons traversé tout ce vaste et terrible désert que vous avez vu, en nous dirigeant vers la montagne des Amoréens, comme l’Eternel notre Dieu nous l’avait ordonné ; et nous sommes arrivés à Qadesh-Barnéa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 19-46, voir Nb 13.1 à 14.45.
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il y a onze journées de marche depuis Horeb
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nom habituel du mont Sinaï dans le Deutéronome (sauf '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '33.2'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', par le chemin de la montagne de Séir, jusqu’à Qadesh-Barnéa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Je vous ai dit alors : « Vous voilà arrivés à la montagne des Amoréens que l’Eternel notre Dieu nous donne. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Regardez : l’Eternel votre Dieu met le pays à votre disposition ; allez-y et prenez-en possession, comme l’Eternel, le Dieu de vos ancêtres, vous l’a dit. N’ayez pas peur, ne vous laissez pas effrayer. »'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La révolte du peuple
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Alors vous êtes tous venus me trouver pour me dire : « Nous voudrions envoyer quelques hommes en avant pour qu’ils fassent, pour nous, une reconnaissance du pays et qu’ils nous renseignent sur la route que nous devons prendre et sur les villes où nous devons aller. » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: La proposition m’a parue bonne et j’ai pris douze hommes d’entre vous, un par tribu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 13.1-15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils ont pris la direction de la montagne et sont arrivés jusqu’à la vallée d’Eshkol qu’ils ont explorée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils ont emporté des produits du pays et nous les ont rapportés. Dans leur rapport, ils nous ont dit : « Le pays que l’Eternel notre Dieu nous donne est un bon pays. »'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais vous avez refusé de vous y rendre et vous avez désobéi à l’Eternel votre Dieu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Vous vous êtes plaints sous vos tentes en disant : « C’est parce que l’Eternel nous hait qu’il nous a fait sortir d’Egypte, pour nous livrer aux Amoréens afin de nous exterminer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Où veux-tu que nous allions ? Nos compatriotes nous ont démoralisés en disant : “C’est un peuple plus grand et plus fort que nous, leurs villes sont immenses et leurs remparts atteignent le ciel ; nous avons même vu là-bas des descendants d’Anaq'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Anciens habitants de Canaan, décrits comme étant des « géants ».
      marker-yv: yv-n
    - type: text
      text: .” »
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Je vous ai répondu : « Ne vous effrayez pas et n’ayez pas peur d’eux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le premier jour du onzième mois de la quarantième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dieu avait condamné Israël à errer durant quarante ans au désert (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 14.33-34
        - type: text
          text: ). Ce décompte inclut les deux années passées près du Sinaï et sur le chemin vers Qadesh et les trente-huit ans dans le désert (voir 2.14 ; 8.2-5 ; 29.4-6 ; Hé 3.7-19).
      marker-yv: yv-n
    - type: text
      text: ' après la sortie d’Egypte, Moïse communiqua aux Israélites tout ce que l’Eternel lui ordonna pour eux. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'L’Eternel votre Dieu, qui marche à votre tête, combattra lui-même pour vous, tout comme il l’a fait pour vous en Egypte – vous l’avez bien vu – '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'et dans le désert, où vous avez pu constater que l’Eternel votre Dieu s’est occupé de vous comme un homme s’occupe de son fils ; il l’a fait tout au long du chemin que vous avez parcouru pour arriver jusqu’ici. » '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Malgré tout cela, vous n’avez pas fait confiance à l’Eternel votre Dieu, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: qui marchait devant vous sur le chemin pour vous chercher vos lieux de campement, vous précédant la nuit dans une colonne de feu pour vous montrer la route sur laquelle marcher, et le jour dans la nuée.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le salaire de l’incrédulité
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Quand l’Eternel entendit vos propos, il s’est irrité et a fait ce serment : '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '« Aucun des hommes de cette génération rebelle ne verra le beau pays que j’ai promis par serment à vos ancêtres, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: excepté Caleb, fils de Yephounné. Lui, il le verra et je lui donnerai, à lui et à ses descendants, le pays que son pied a foulé, parce qu’il a fidèlement accompli ma volonté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 13.6 ; 14.24 ; Jos 14.6-14.
      marker-yv: yv-n
    - type: text
      text: . »
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'L’Eternel s’est aussi mis en colère contre moi à cause de vous et il a dit : « Toi non plus, tu n’y entreras pas. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Par contre, Josué, fils de Noun ton assistant, y entrera ; encourage-le, car c’est lui qui mettra Israël en possession de ce pays. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ce sont vos enfants, dont vous avez prétendu qu’ils deviendraient la proie des ennemis, vos fils qui aujourd’hui ne savent pas encore distinguer le bien du mal, qui y entreront ; c’est à eux que je le donnerai, et ils en prendront possession. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Cela se passait après leur victoire sur Sihôn, roi des Amoréens, dont la capitale était Heshbôn, et sur Og, roi du Basan, qui résidait à Ashtaroth et à Edréi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Manque dans le texte hébreu traditionnel. Voir Nb 21.21-35 ; Jos 12.4.
      marker-yv: yv-n
    - type: text
      text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Quant à vous, faites demi-tour. Repartez au désert en direction de la mer des Roseaux ! »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La défaite face aux Amoréens
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Alors vous vous êtes écriés : « Nous avons commis une faute contre l’Eternel. Nous irons et combattrons, comme l’Eternel notre Dieu nous l’a ordonné. » Chacun de vous a pris ses armes. Vous avez décidé présomptueusement de gravir la montagne. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Mais l’Eternel m’a dit : « Ordonne-leur de ne pas monter et de ne pas combattre, car je ne suis pas avec eux, et ils vont se faire battre par leurs ennemis. » '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Cependant, j’ai eu beau vous parler, vous n’avez pas écouté : vous avez désobéi à l’Eternel et vous avez eu la témérité de gravir la montagne. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Alors les Amoréens qui l’occupent sont sortis pour marcher contre vous et vous ont poursuivis comme un essaim d’abeilles, ils vous ont battus depuis Séir jusqu’à Horma. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'A votre retour, vous avez pleuré devant l’Eternel, mais il ne vous a pas écoutés, il a fait la sourde oreille à vos lamentations. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: C’est ainsi que vous êtes restés très longtemps à Qadesh.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'C’est au-delà du Jourdain, au pays de Moab, que Moïse se mit à leur exposer cette Loi. Il leur dit :'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prologue historique
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La première génération des Juifs dans le désert
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le départ du Sinaï pour le pays de Canaan
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’Eternel notre Dieu nous a parlé au mont Horeb en ces termes : « Vous avez assez longtemps séjourné près de cette montagne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 19.1
        - type: text
          text: ' comparé à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 10.11
        - type: text
          text: '  : un peu plus de onze mois (du calendrier israélite, qui compte en mois lunaires).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Levez le camp et partez, rendez-vous dans la région montagneuse des Amoréens et dans toutes les contrées voisines, la steppe, la montagne et la plaine côtière, le Néguev et les côtes de la mer, dans le pays des Cananéens et le Liban jusqu’au grand fleuve, l’Euphrate. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voyez, je vous donne cette terre, entrez-y et prenez possession du pays que l’Eternel a promis par serment à vos ancêtres Abraham, Isaac et Jacob, de leur donner, à eux et à leurs descendants. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’institution des juges
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'A cette époque-là, je vous ai dit : « Je ne peux pas, à moi seul, assumer la responsabilité de vous tous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la nomination des juges sur le conseil de Jéthro (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 18.13-27
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
