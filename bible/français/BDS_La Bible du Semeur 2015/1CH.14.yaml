document_id: 1CH.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David à Jérusalem
  - type: heading
    content: (2 S 5.11-16 ; 1 Ch 3.5-8)
  - type: text
    content: 'Hiram, le roi de Tyr, envoya une délégation à David en lui faisant livrer du bois de cèdre et en lui envoyant des tailleurs de pierre et des charpentiers pour lui construire un palais. '
  '10':
  - type: text
    content: 'David consulta Dieu et lui demanda : Dois-je attaquer les Philistins ? Me donneras-tu la victoire sur eux ?'
  - type: text
    content: 'L’Eternel lui répondit : Attaque-les ! et je te donnerai la victoire sur eux.'
  '11':
  - type: text
    content: 'Les Philistins s’avancèrent jusqu’à Baal-Peratsim et David les battit là. Puis il déclara : Dieu a fait une brèche, par ma main, dans le rang de mes ennemis, comme les eaux rompent une digue.'
  - type: text
    content: 'C’est pourquoi on a donné à ce lieu le nom de Baal-Peratsim (le Maître des brèches). '
  '12':
  - type: text
    content: Les Philistins abandonnèrent leurs divinités sur place et David donna l’ordre de les brûler.
  '13':
  - type: text
    content: 'Les Philistins envahirent de nouveau la vallée. '
  '14':
  - type: text
    content: 'David consulta encore Dieu, qui lui répondit : Ne les suis pas ! Contourne-les à bonne distance, puis reviens sur eux en face de la forêt des mûriers'
  - type: note
    content: 1 Ch 14.14 semble dire le contraire de 2 S 5.23. Cela est dû au déplacement du terme signifiant « derrière eux » dans l’un des deux textes.
  - type: text
    content: '. '
  '15':
  - type: text
    content: Quand tu entendras un bruissement de pas dans les cimes des mûriers, alors lance-toi à l’attaque, car je me serai mis en campagne devant toi pour battre l’armée des Philistins.
  '16':
  - type: text
    content: David fit ce que Dieu lui avait ordonné, et ses troupes battirent l’armée des Philistins en les poursuivant de Gabaon
  - type: note
    content: A quelque 10 kilomètres au nord-ouest de Jérusalem.
  - type: text
    content: ' jusqu’à Guézer'
  - type: note
    content: A quelque 30 kilomètres au nord-ouest de Jérusalem.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Dès lors la renommée de David se répandit dans tous les pays, et l’Eternel le fit redouter par tous les autres peuples.
  '2':
  - type: text
    content: David reconnut alors que l’Eternel le confirmait comme roi sur Israël et qu’il donnait beaucoup d’éclat à son règne à cause d’Israël son peuple.
  '3':
  - type: text
    content: 'Après son installation à Jérusalem, David épousa encore d’autres femmes, et il eut des fils et des filles. '
  '4':
  - type: text
    content: 'Voici le nom des enfants qui lui naquirent à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  '5':
  - type: text
    content: 'Yibhar, Elishoua, Elpéleth, '
  '6':
  - type: text
    content: 'Noga, Népheg, Yaphia, '
  '7':
  - type: text
    content: Elishama, Beélyada et Eliphéleth.
  - type: heading
    content: David vainqueur des Philistins
  - type: heading
    content: (2 S 5.17-25)
  '8':
  - type: text
    content: 'Lorsque les Philistins apprirent que David avait été établi roi sur tout Israël par l’onction, ils se mirent tous en campagne à sa recherche. David en fut informé et marcha à leur rencontre. '
  '9':
  - type: text
    content: Les Philistins arrivèrent et investirent la vallée des Rephaïm
  - type: note
    content: Au sud-ouest de Jérusalem.
  - type: text
    content: '. '
