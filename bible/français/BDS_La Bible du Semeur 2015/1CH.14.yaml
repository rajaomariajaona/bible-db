document_id: 1CH.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 5.11-16 ; 1 Ch 3.5-8)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiram, le roi de Tyr, envoya une délégation à David en lui faisant livrer du bois de cèdre et en lui envoyant des tailleurs de pierre et des charpentiers pour lui construire un palais. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David consulta Dieu et lui demanda : Dois-je attaquer les Philistins ? Me donneras-tu la victoire sur eux ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel lui répondit : Attaque-les ! et je te donnerai la victoire sur eux.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins s’avancèrent jusqu’à Baal-Peratsim et David les battit là. Puis il déclara : Dieu a fait une brèche, par ma main, dans le rang de mes ennemis, comme les eaux rompent une digue.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi on a donné à ce lieu le nom de Baal-Peratsim (le Maître des brèches). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Philistins abandonnèrent leurs divinités sur place et David donna l’ordre de les brûler.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins envahirent de nouveau la vallée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David consulta encore Dieu, qui lui répondit : Ne les suis pas ! Contourne-les à bonne distance, puis reviens sur eux en face de la forêt des mûriers'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 14.14
        - type: text
          text: ' semble dire le contraire de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 5.23
        - type: text
          text: . Cela est dû au déplacement du terme signifiant « derrière eux » dans l’un des deux textes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand tu entendras un bruissement de pas dans les cimes des mûriers, alors lance-toi à l’attaque, car je me serai mis en campagne devant toi pour battre l’armée des Philistins.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David fit ce que Dieu lui avait ordonné, et ses troupes battirent l’armée des Philistins en les poursuivant de Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A quelque 10 kilomètres au nord-ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' jusqu’à Guézer'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A quelque 30 kilomètres au nord-ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dès lors la renommée de David se répandit dans tous les pays, et l’Eternel le fit redouter par tous les autres peuples.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David reconnut alors que l’Eternel le confirmait comme roi sur Israël et qu’il donnait beaucoup d’éclat à son règne à cause d’Israël son peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après son installation à Jérusalem, David épousa encore d’autres femmes, et il eut des fils et des filles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le nom des enfants qui lui naquirent à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yibhar, Elishoua, Elpéleth, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noga, Népheg, Yaphia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Beélyada et Eliphéleth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David vainqueur des Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 5.17-25)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les Philistins apprirent que David avait été établi roi sur tout Israël par l’onction, ils se mirent tous en campagne à sa recherche. David en fut informé et marcha à leur rencontre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Philistins arrivèrent et investirent la vallée des Rephaïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au sud-ouest de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: '. '
