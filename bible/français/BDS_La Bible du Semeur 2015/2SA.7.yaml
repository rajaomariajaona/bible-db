document_id: 2SA.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David veut bâtir un temple à l’Eternel
  - type: heading
    content: (1 Ch 17.1-15)
  - type: text
    content: 'Comme le roi s’était installé dans son palais, et que l’Eternel lui avait accordé une existence paisible en le délivrant de tous ses ennemis à l’entour, '
  '10':
  - type: text
    content: 'J’ai attribué un territoire à mon peuple Israël où je l’ai implanté pour qu’il habite chez lui et ne soit plus inquiété et opprimé comme auparavant par des hommes méchants, '
  '11':
  - type: text
    content: comme à l’époque où j’avais établi des chefs pour mon peuple Israël. Je t’ai accordé une existence paisible en te délivrant de tous tes ennemis. Et l’Eternel t’annonce qu’il te constituera une dynastie
  - type: note
    content: Un même terme hébreu est traduit par temple (v. 5, 6, 7) et par dynastie.
  - type: text
    content: .
  '12':
  - type: text
    content: Quand le moment sera venu pour toi de rejoindre tes ancêtres décédés, j’établirai après toi l’un de tes propres descendants pour te succéder comme roi, et j’affermirai son autorité royale
  - type: note
    content: Voir 1 R 2.12, 46.
  - type: text
    content: '. '
  '13':
  - type: text
    content: C’est lui qui construira un temple en mon honneur
  - type: note
    content: Voir 1 R 6.
  - type: text
    content: ' et je maintiendrai à toujours son trône royal. '
  '14':
  - type: text
    content: Je serai pour lui un Père, et il sera pour moi un Fils
  - type: note
    content: Repris en Hé 1.5.
  - type: text
    content: '  ; s’il fait le mal, je me servirai d’hommes pour le corriger par des coups et des châtiments'
  - type: note
    content: 'Autre traduction : je le corrigerai par des coups et des châtiments comme un homme corrige son fils. Allusion aux v. 14-15 en Ps 89.31-35.'
  - type: text
    content: ', '
  '15':
  - type: text
    content: mais je ne lui retirerai jamais ma faveur, comme je l’ai retirée à Saül
  - type: note
    content: Voir 1 S 15.28.
  - type: text
    content: ', que j’ai écarté pour te faire place. '
  '16':
  - type: text
    content: Oui, je rendrai stable pour toujours ta dynastie et ta royauté
  - type: note
    content: 'Certains manuscrits hébreux et l’ancienne version grecque ont : ta royauté devant moi.'
  - type: text
    content: ', et ton trône sera inébranlable à perpétuité. »'
  '17':
  - type: text
    content: Nathan rapporta fidèlement à David toutes ces paroles et toute cette révélation.
  - type: heading
    content: La prière de David
  - type: heading
    content: (1 Ch 17.16-27)
  '18':
  - type: text
    content: 'Alors le roi David alla se placer devant l’Eternel et lui adressa cette prière : Seigneur Eternel, qui suis-je et qu’est donc ma famille pour que tu m’aies fait parvenir où je suis ? '
  '19':
  - type: text
    content: 'Et comme si ce n’était pas déjà suffisant à tes yeux, Seigneur Eternel, voilà que tu fais encore à ton serviteur des promesses pour l’avenir lointain de sa dynastie. Seigneur Eternel, cela sied-il à un humain ? '
  '2':
  - type: text
    content: 'il dit au prophète Nathan : Regarde ! J’habite dans un palais de cèdre, alors que le coffre de Dieu est installé au milieu d’une tente de toile.'
  '20':
  - type: text
    content: 'Que pourrais-je te dire de plus ? Seigneur Eternel, tu connais toi-même ton serviteur ! '
  '21':
  - type: text
    content: C’est parce que tu l’as promis et que tu en as décidé ainsi que tu as accompli ces grandes choses, et qu’en plus tu les as révélées à ton serviteur.
  '22':
  - type: text
    content: 'Que tu es grand, Eternel Dieu ! Il n’y a personne comme toi, il n’existe pas d’autre Dieu que toi, c’est vraiment comme tout ce que nous avons entendu dire. '
  '23':
  - type: text
    content: Y a-t-il un seul autre peuple sur terre qui soit comme Israël, ton peuple, que des dieux soient allés libérer pour en faire leur peuple et le rendre célèbre en accomplissant pour eux et en faveur de ton pays des choses grandes et redoutables ? N’as-tu pas chassé d’autres peuples avec leurs dieux devant ton peuple que tu as libéré pour toi de l’Egypte
  - type: note
    content: 'des choses grandes et redoutables ? N’as-tu pas chassé… de l’Egypte ? Voir 1 Ch 17.21. Hébreu obscur. Autre traduction : des choses grandes et terribles devant ton peuple que tu as libéré pour toi de l’Egypte, de cette nation et de ses dieux.'
  - type: text
    content: '  ? '
  '24':
  - type: text
    content: Tu as établi ton peuple Israël comme ton peuple pour toujours ; et toi, Eternel, tu es devenu son Dieu.
  '25':
  - type: text
    content: 'Maintenant donc, Eternel Dieu, veuille toujours tenir la promesse que tu as faite à ton serviteur et à sa dynastie ! Oui, veuille l’accomplir ! '
  '26':
  - type: text
    content: 'Ainsi tu seras éternellement exalté et l’on proclamera que l’Eternel, le Seigneur des armées célestes, est le Dieu d’Israël ! Et que la dynastie de ton serviteur David demeure stable devant toi ! '
  '27':
  - type: text
    content: En effet, ô Eternel, Seigneur des armées célestes, Dieu d’Israël, tu as révélé à ton serviteur que tu lui bâtirais une dynastie. C’est pourquoi ton serviteur a trouvé le courage de t’adresser cette prière.
  '28':
  - type: text
    content: 'Maintenant, Seigneur Eternel, c’est toi qui es Dieu, tes paroles sont vraies, et tu as promis ce bonheur à ton serviteur. '
  '29':
  - type: text
    content: Veuille donc à présent bénir ma dynastie pour qu’elle subsiste à jamais devant toi. Car c’est toi, Seigneur Eternel, qui as fait la promesse et c’est grâce à ta bénédiction que la dynastie de ton serviteur sera bénie à jamais !
  '3':
  - type: text
    content: 'Nathan lui répondit : Va et réalise les projets qui te tiennent à cœur, car l’Eternel est avec toi.'
  '4':
  - type: text
    content: 'Cependant, la nuit suivante l’Eternel adressa la parole à Nathan en ces termes : '
  '5':
  - type: text
    content: 'Va dire à mon serviteur David : « Voici ce que déclare l’Eternel : Tu veux me bâtir un temple où je puisse habiter ? '
  '6':
  - type: text
    content: 'Je n’ai jamais résidé dans un temple depuis le jour où j’ai fait sortir les Israélites d’Egypte jusqu’à aujourd’hui. J’ai cheminé sous une tente, logeant dans le tabernacle. '
  '7':
  - type: text
    content: 'Pendant tout ce temps où j’ai accompagné les Israélites, ai-je jamais dit à un seul des chefs d’Israël que j’avais établis pour diriger mon peuple : Pourquoi ne me bâtissez-vous pas un temple en bois de cèdre ? »'
  '8':
  - type: text
    content: 'Voici maintenant ce que tu diras à mon serviteur David : « Ainsi parle l’Eternel, le Seigneur des armées célestes : je suis allé te chercher dans les pâturages où tu gardais les moutons, pour faire de toi le chef de mon peuple Israël'
  - type: note
    content: Voir 1 S 16.11.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Je t’ai soutenu dans toutes tes entreprises et je t’ai débarrassé de tous tes ennemis. Je te ferai un nom très glorieux comme celui des grands de la terre. '
