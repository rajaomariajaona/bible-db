document_id: JER.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La sentence est irrévocable
  - type: text
    content: 'Mais l’Eternel me dit : Même si Moïse et Samuel'
  - type: note
    content: Deux grands intercesseurs (Ex 32.11-12 ; Nb 11.2 ; 14.13-19 ; 1 S 7.5-9).
  - type: text
    content: ' se tenaient devant moi pour prier pour ce peuple, je ne me soucierais pas d’eux. Chasse-le de ma vue, qu’il parte loin de moi ! '
  '10':
  - type: text
    content: Malheur à moi ! ╵Pourquoi, ma mère, ╵m’as-tu donc mis au monde ?
  - type: text
    content: Tout le pays s’en prend à moi
  - type: text
    content: et me cherche querelle ;
  - type: text
    content: je n’ai rien emprunté ╵et je n’ai rien prêté,
  - type: text
    content: pourtant tous me maudissent !
  '11':
  - type: text
    content: 'L’Eternel répondit :'
  - type: text
    content: Moi, je t’assure,
  - type: text
    content: je te délivrerai ╵pour te faire du bien ;
  - type: text
    content: 'au temps de ton malheur, ╵au temps de ta détresse :'
  - type: text
    content: ce sont tes ennemis ╵qui viendront t’implorer
  - type: note
    content: 'Verset difficile. Au lieu de l’Eternel répondit, l’ancienne version grecque a : oui, que je sois maudit ou Amen. L’expression : je te délivrerai rend un terme diversement lu par les manuscrits hébreux et les versions anciennes.'
  - type: text
    content: '  !'
  '12':
  - type: text
    content: Peut-on briser le fer
  - type: text
    content: – le fer qui vient du nord – ╵ou bien le bronze ?
  '13':
  - type: text
    content: 'Parle ainsi à ce peuple :'
  - type: text
    content: Vos biens et vos trésors, ╵je les livrerai au pillage, ╵et on ne te les paiera pas
  - type: text
    content: à cause de tous les péchés ╵que vous avez commis ╵dans tout votre pays
  - type: note
    content: Pour les v. 13-14, voir 17.3-4.
  - type: text
    content: .
  '14':
  - type: text
    content: Et, de vos ennemis, ╵je vous rendrai esclaves
  - type: note
    content: 'je vous rendrai esclaves: d’après quelques manuscrits hébreux, l’ancienne version grecque, la version syriaque et le texte parallèle de Jr 17.4. Le texte hébreu traditionnel a : je ferai passer (vos ennemis). La différence ne tient qu’à un trait de lettre en hébreu.'
  - type: text
    content: dans un pays ╵qui vous est inconnu,
  - type: text
    content: car ma colère attise un feu
  - type: text
    content: qui vous embrasera.
  '15':
  - type: text
    content: Toi, tu sais, Eternel !
  - type: text
    content: Soucie-toi donc de moi,
  - type: text
    content: et interviens pour moi !
  - type: text
    content: Fais-leur payer ╵à ces gens qui me persécutent.
  - type: text
    content: Ne permets pas que je pâtisse
  - type: text
    content: de ta patience envers mes ennemis !
  - type: text
    content: 'Regarde : c’est pour toi ╵que je subis l’opprobre !'
  '16':
  - type: text
    content: Dès que j’ai trouvé tes paroles,
  - type: text
    content: je les ai dévorées.
  - type: text
    content: Elles ont fait ma joie et mon bonheur,
  - type: text
    content: car je porte ton nom,
  - type: text
    content: ô Eternel, ╵Dieu des armées célestes !
  '17':
  - type: text
    content: Je ne me suis pas joint ╵à un cercle de plaisantins ╵pour m’y amuser avec eux.
  - type: text
    content: Non, contraint par ta main, ╵je suis resté à part,
  - type: text
    content: car tu m’avais rempli ╵d’indignation.
  '18':
  - type: text
    content: Pourquoi donc ma souffrance ╵est-elle permanente,
  - type: text
    content: et ma plaie douloureuse, ╵rebelle aux soins ?
  - type: text
    content: 'Vraiment : pour moi tu es ╵une source trompeuse'
  - type: text
    content: au débit capricieux !
  '19':
  - type: text
    content: 'Voici la réponse de l’Eternel :'
  - type: text
    content: Si tu reviens à moi, ╵je te rétablirai.
  - type: text
    content: Tu pourras te tenir
  - type: text
    content: à mon service.
  - type: text
    content: Si ce qui est précieux, ╵tu le sépares ╵de ce qui est indigne,
  - type: text
    content: tu seras mon porte-parole.
  - type: text
    content: Ils reviendront à toi,
  - type: text
    content: mais ce n’est pas à toi ╵de revenir vers eux.
  '2':
  - type: text
    content: 'Et lorsqu’ils te diront : « Où devons-nous aller ? » tu leur diras ceci :'
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Ceux qui sont destinés ╵à la peste ╵s’en iront à la peste ;
  - type: text
    content: ceux qui sont destinés ╵à périr par l’épée ╵s’en iront à l’épée,
  - type: text
    content: ceux qui sont destinés ╵à mourir de famine, ╵iront à la famine ;
  - type: text
    content: ceux qui sont destinés ╵à la déportation, ╵s’en iront en déportation.
  '20':
  - type: text
    content: Et je ferai de toi, ╵en face de ce peuple,
  - type: text
    content: comme un rempart de bronze ╵inébranlable.
  - type: text
    content: Ils te feront la guerre
  - type: text
    content: mais ils ne l’emporteront pas sur toi
  - type: text
    content: 'car je suis avec toi : ╵je te protégerai ╵et te délivrerai,'
  - type: text
    content: l’Eternel le déclare
  - type: note
    content: Voir Jr 1.18-19.
  - type: text
    content: .
  '21':
  - type: text
    content: Oui, je te délivrerai des méchants,
  - type: text
    content: je te sauverai des violents.
  '3':
  - type: text
    content: 'Je leur enverrai quatre sortes de maux, déclare l’Eternel : l’épée pour les abattre, les chiens pour les déchirer, les rapaces et les animaux sauvages pour les dévorer et les détruire. '
  '4':
  - type: text
    content: Je ferai d’eux un sujet d’épouvante pour tous les royaumes de la terre, à cause de Manassé, fils d’Ezéchias, roi de Juda, et de tout le mal qu’il a commis dans Jérusalem
  - type: note
    content: Voir 2 R 21.1-16 ; 23.26-27 ; 2 Ch 33.1-20.
  - type: text
    content: .
  - type: heading
    content: Plus de sursis
  '5':
  - type: text
    content: Qui donc aura pitié de toi, ╵Jérusalem ?
  - type: text
    content: Qui compatira avec toi ?
  - type: text
    content: Qui se détournera de son chemin ╵pour s’informer de ton état ?
  '6':
  - type: text
    content: Tu m’as abandonné,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: tu m’as tourné le dos.
  - type: text
    content: Alors, de mon côté, ╵j’ai levé la main contre toi,
  - type: text
    content: je te détruis ;
  - type: text
    content: j’en ai assez ╵de toujours renoncer ╵à te châtier.
  '7':
  - type: text
    content: Je les ai dispersés ╵aux portes du pays ╵comme par un vannage,
  - type: text
    content: j’ai fait périr mon peuple,
  - type: text
    content: je l’ai privé d’enfants
  - type: text
    content: parce qu’ils n’abandonnent pas ╵leur mauvaise conduite.
  '8':
  - type: text
    content: Les veuves de mon peuple, par mon action, ╵ont surpassé en nombre
  - type: text
    content: les grains de sable au bord des mers ;
  - type: text
    content: j’ai envoyé contre les mères ╵des jeunes gens,
  - type: text
    content: quelqu’un pour dévaster ╵à l’heure de midi,
  - type: text
    content: j’ai fait fondre sur elles ╵subitement
  - type: text
    content: frayeur et épouvante.
  '9':
  - type: text
    content: La mère de sept fils ╵est misérable ;
  - type: text
    content: la voilà haletante,
  - type: text
    content: et le soleil ╵s’éteint déjà pour elle ╵avant la fin du jour.
  - type: text
    content: La voilà toute honteuse ╵et dans la confusion.
  - type: text
    content: Les enfants qui lui restent, ╵je les livre à l’épée
  - type: text
    content: devant leurs ennemis,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: La vocation du prophète confirmée
  - type: heading
    content: Complainte de Jérémie
