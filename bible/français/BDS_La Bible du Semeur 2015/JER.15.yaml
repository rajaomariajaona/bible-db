document_id: JER.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La sentence est irrévocable
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mais l’Eternel me dit : Même si Moïse et Samuel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux grands intercesseurs (Ex 32.11-12 ; Nb 11.2 ; 14.13-19 ; 1 S 7.5-9).
      marker-yv: yv-n
    - type: text
      text: ' se tenaient devant moi pour prier pour ce peuple, je ne me soucierais pas d’eux. Chasse-le de ma vue, qu’il parte loin de moi ! '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Malheur à moi ! ╵Pourquoi, ma mère, ╵m’as-tu donc mis au monde ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le pays s’en prend à moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me cherche querelle ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n’ai rien emprunté ╵et je n’ai rien prêté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourtant tous me maudissent !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Eternel répondit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je t’assure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te délivrerai ╵pour te faire du bien ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'au temps de ton malheur, ╵au temps de ta détresse :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont tes ennemis ╵qui viendront t’implorer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Verset difficile. Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Eternel répondit, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'oui, que je sois maudit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’expression : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je te délivrerai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rend un terme diversement lu par les manuscrits hébreux et les versions anciennes.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Peut-on briser le fer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – le fer qui vient du nord – ╵ou bien le bronze ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Parle ainsi à ce peuple :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos biens et vos trésors, ╵je les livrerai au pillage, ╵et on ne te les paiera pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tous les péchés ╵que vous avez commis ╵dans tout votre pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 13-14, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 17.3-4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Et, de vos ennemis, ╵je vous rendrai esclaves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous rendrai esclaves
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après quelques manuscrits hébreux, l’ancienne version grecque, la version syriaque et le texte parallèle de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 17.4
        - type: text
          text: '. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je ferai passer (vos ennemis). '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La différence ne tient qu’à un trait de lettre en hébreu.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un pays ╵qui vous est inconnu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ma colère attise un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous embrasera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Toi, tu sais, Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soucie-toi donc de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et interviens pour moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-leur payer ╵à ces gens qui me persécutent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne permets pas que je pâtisse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ta patience envers mes ennemis !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde : c’est pour toi ╵que je subis l’opprobre !'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dès que j’ai trouvé tes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ai dévorées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont fait ma joie et mon bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je porte ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Eternel, ╵Dieu des armées célestes !
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je ne me suis pas joint ╵à un cercle de plaisantins ╵pour m’y amuser avec eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, contraint par ta main, ╵je suis resté à part,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu m’avais rempli ╵d’indignation.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pourquoi donc ma souffrance ╵est-elle permanente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma plaie douloureuse, ╵rebelle aux soins ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vraiment : pour moi tu es ╵une source trompeuse'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au débit capricieux !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Voici la réponse de l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu reviens à moi, ╵je te rétablirai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu pourras te tenir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à mon service.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si ce qui est précieux, ╵tu le sépares ╵de ce qui est indigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras mon porte-parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reviendront à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ce n’est pas à toi ╵de revenir vers eux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et lorsqu’ils te diront : « Où devons-nous aller ? » tu leur diras ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que déclare l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont destinés ╵à la peste ╵s’en iront à la peste ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont destinés ╵à périr par l’épée ╵s’en iront à l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont destinés ╵à mourir de famine, ╵iront à la famine ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont destinés ╵à la déportation, ╵s’en iront en déportation.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Et je ferai de toi, ╵en face de ce peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un rempart de bronze ╵inébranlable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te feront la guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils ne l’emporteront pas sur toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car je suis avec toi : ╵je te protégerai ╵et te délivrerai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 1.18-19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Oui, je te délivrerai des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te sauverai des violents.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je leur enverrai quatre sortes de maux, déclare l’Eternel : l’épée pour les abattre, les chiens pour les déchirer, les rapaces et les animaux sauvages pour les dévorer et les détruire. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je ferai d’eux un sujet d’épouvante pour tous les royaumes de la terre, à cause de Manassé, fils d’Ezéchias, roi de Juda, et de tout le mal qu’il a commis dans Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 21.1-16 ; 23.26-27 ; 2 Ch 33.1-20.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Plus de sursis
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qui donc aura pitié de toi, ╵Jérusalem ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui compatira avec toi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se détournera de son chemin ╵pour s’informer de ton état ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu m’as abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as tourné le dos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, de mon côté, ╵j’ai levé la main contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te détruis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’en ai assez ╵de toujours renoncer ╵à te châtier.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je les ai dispersés ╵aux portes du pays ╵comme par un vannage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai fait périr mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l’ai privé d’enfants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils n’abandonnent pas ╵leur mauvaise conduite.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les veuves de mon peuple, par mon action, ╵ont surpassé en nombre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les grains de sable au bord des mers ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai envoyé contre les mères ╵des jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quelqu’un pour dévaster ╵à l’heure de midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai fait fondre sur elles ╵subitement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: frayeur et épouvante.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La mère de sept fils ╵est misérable ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voilà haletante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le soleil ╵s’éteint déjà pour elle ╵avant la fin du jour.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voilà toute honteuse ╵et dans la confusion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants qui lui restent, ╵je les livre à l’épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vocation du prophète confirmée
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Complainte de Jérémie
    marker-yv: yv-h
