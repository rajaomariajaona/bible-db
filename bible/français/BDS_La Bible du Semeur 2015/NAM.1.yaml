document_id: NAM.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proclamation sur Ninive
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Capitale de l’Empire assyrien.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Livre de la révélation reçue par Nahoum, d’Elqosh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Identification incertaine.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Colère et bonté de Dieu
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils sont pareils ╵à un fourré d’épines ╵enchevêtrées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout imbibés qu’ils sont de vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront consumés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: totalement ╵comme du chaume sec.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (A Ninive)
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: C’est de toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Peut-être Assourbanipal (669 à 627 av. J.-C.), le dernier grand roi assyrien, qui soumit l’Egypte et le royaume de Juda sous Manassé (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 33.11-13
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' qu’est venu'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui, contre l’Eternel, ╵trame le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui conçoit ╵des desseins criminels.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (A Juda)
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Eternel dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien que vos ennemis ╵soient au complet et très nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n’en seront pas moins ╵moissonnés sans retour ╵et ils disparaîtront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je t’ai humilié, ╵ô peuple de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne le ferai plus.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et je vais maintenant ╵briser le joug ╵qu’il fait peser sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’arracherai tes chaînes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (Au roi de Ninive)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais quant à toi, ╵voici ce que décrète ╵l’Eternel contre toi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’auras pas de descendance ╵qui perpétue ton nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai disparaître ╵du temple de tes dieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les idoles taillées, ╵les statues de métal fondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je prépare ta tombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car toi, tu ne vaux rien.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Eternel est un Dieu ╵qui ne tolère pas le mal ╵et qui le fait payer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel fait payer, ╵sa fureur est terrible.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait payer ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il garde son ressentiment ╵contre ses ennemis.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: D’un côté, l’Eternel ╵est lent à la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa puissance est immense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il ne laisse pas ╵le coupable impuni.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel fraie sa route ╵dans l’ouragan et la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les nuées sont la poussière ╵que soulèvent ses pieds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il menace la mer ╵et il la met à sec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait tarir les fleuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Basan et le Carmel dépérissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la flore du Liban se fane
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Basan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à l’est du Jourdain, le mont '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Carmel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Liban '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient réputés pour leur fertilité.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les montagnes vacillent ╵à son approche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les collines s’effondrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre se soulève ╵devant ses pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout l’univers est bouleversé ╵avec ceux qui l’habitent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: S’il se met en colère, ╵qui pourra subsister ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui tiendra ╵quand son courroux s’enflamme ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa fureur ╵se répand comme un incendie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rochers se renversent ╵à son approche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais l’Eternel est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est un sûr abri ╵au jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il prend soin de ceux ╵qui se confient en lui.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Par un flot qui déborde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il détruira Ninive ╵totalement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il repoussera ╵ses ennemis dans les ténèbres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La détresse ne reparaîtra pas
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: (A Juda)
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Que complotez-vous donc ╵à l’encontre de l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui est l’auteur ╵de destructions totales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la détresse ╵ne reparaîtra pas ╵une seconde fois.
