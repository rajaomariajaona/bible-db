document_id: NAM.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Proclamation sur Ninive
  - type: note
    content: Capitale de l’Empire assyrien.
  - type: text
    content: .
  - type: text
    content: Livre de la révélation reçue par Nahoum, d’Elqosh
  - type: note
    content: Identification incertaine.
  - type: text
    content: .
  - type: heading
    content: Colère et bonté de Dieu
  '10':
  - type: text
    content: Ils sont pareils ╵à un fourré d’épines ╵enchevêtrées.
  - type: text
    content: Tout imbibés qu’ils sont de vin,
  - type: text
    content: ils seront consumés
  - type: text
    content: totalement ╵comme du chaume sec.
  - type: heading
    content: (A Ninive)
  '11':
  - type: text
    content: C’est de toi
  - type: note
    content: Peut-être Assourbanipal (669 à 627 av. J.-C.), le dernier grand roi assyrien, qui soumit l’Egypte et le royaume de Juda sous Manassé (voir 2 Ch 33.11-13).
  - type: text
    content: ' qu’est venu'
  - type: text
    content: celui qui, contre l’Eternel, ╵trame le mal,
  - type: text
    content: et qui conçoit ╵des desseins criminels.
  - type: heading
    content: (A Juda)
  '12':
  - type: text
    content: 'L’Eternel dit ceci :'
  - type: text
    content: Bien que vos ennemis ╵soient au complet et très nombreux,
  - type: text
    content: ils n’en seront pas moins ╵moissonnés sans retour ╵et ils disparaîtront.
  - type: text
    content: Si je t’ai humilié, ╵ô peuple de Juda,
  - type: text
    content: je ne le ferai plus.
  '13':
  - type: text
    content: Et je vais maintenant ╵briser le joug ╵qu’il fait peser sur toi,
  - type: text
    content: j’arracherai tes chaînes.
  - type: heading
    content: (Au roi de Ninive)
  '14':
  - type: text
    content: 'Mais quant à toi, ╵voici ce que décrète ╵l’Eternel contre toi :'
  - type: text
    content: Tu n’auras pas de descendance ╵qui perpétue ton nom.
  - type: text
    content: Je ferai disparaître ╵du temple de tes dieux
  - type: text
    content: les idoles taillées, ╵les statues de métal fondu,
  - type: text
    content: je prépare ta tombe
  - type: text
    content: car toi, tu ne vaux rien.
  '2':
  - type: text
    content: L’Eternel est un Dieu ╵qui ne tolère pas le mal ╵et qui le fait payer.
  - type: text
    content: L’Eternel fait payer, ╵sa fureur est terrible.
  - type: text
    content: Il fait payer ses adversaires,
  - type: text
    content: il garde son ressentiment ╵contre ses ennemis.
  '3':
  - type: text
    content: D’un côté, l’Eternel ╵est lent à la colère,
  - type: text
    content: sa puissance est immense,
  - type: text
    content: mais il ne laisse pas ╵le coupable impuni.
  - type: text
    content: L’Eternel fraie sa route ╵dans l’ouragan et la tempête,
  - type: text
    content: et les nuées sont la poussière ╵que soulèvent ses pieds.
  '4':
  - type: text
    content: Il menace la mer ╵et il la met à sec,
  - type: text
    content: il fait tarir les fleuves.
  - type: text
    content: Le Basan et le Carmel dépérissent,
  - type: text
    content: la flore du Liban se fane
  - type: note
    content: Le Basan, à l’est du Jourdain, le mont Carmel et le Liban étaient réputés pour leur fertilité.
  - type: text
    content: .
  '5':
  - type: text
    content: Les montagnes vacillent ╵à son approche,
  - type: text
    content: les collines s’effondrent,
  - type: text
    content: la terre se soulève ╵devant ses pas,
  - type: text
    content: tout l’univers est bouleversé ╵avec ceux qui l’habitent.
  '6':
  - type: text
    content: S’il se met en colère, ╵qui pourra subsister ?
  - type: text
    content: Et qui tiendra ╵quand son courroux s’enflamme ?
  - type: text
    content: Car sa fureur ╵se répand comme un incendie,
  - type: text
    content: les rochers se renversent ╵à son approche.
  '7':
  - type: text
    content: Mais l’Eternel est bon,
  - type: text
    content: il est un sûr abri ╵au jour de la détresse,
  - type: text
    content: et il prend soin de ceux ╵qui se confient en lui.
  '8':
  - type: text
    content: Par un flot qui déborde,
  - type: text
    content: il détruira Ninive ╵totalement,
  - type: text
    content: et il repoussera ╵ses ennemis dans les ténèbres.
  - type: heading
    content: La détresse ne reparaîtra pas
  - type: heading
    content: (A Juda)
  '9':
  - type: text
    content: Que complotez-vous donc ╵à l’encontre de l’Eternel ?
  - type: text
    content: C’est lui qui est l’auteur ╵de destructions totales,
  - type: text
    content: et la détresse ╵ne reparaîtra pas ╵une seconde fois.
