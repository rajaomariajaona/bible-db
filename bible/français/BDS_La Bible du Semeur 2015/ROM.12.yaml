document_id: ROM.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie du chrétien
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: S’offrir à Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous recommande donc, frères et sœurs, à cause de cette immense bonté de Dieu, à lui offrir votre corps comme un sacrifice vivant, saint et qui plaise à Dieu. Ce sera là de votre part un culte raisonnable. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– l’amour fraternel : soyez pleins d’affection les uns pour les autres ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– l’estime mutuelle : soyez les premiers à la manifester ;'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– l’ardeur : ne soyez pas nonchalants ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: – l’Esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: votre état d’esprit.
      marker-yv: yv-n
    - type: text
      text: '  : soyez bouillants ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– le Seigneur : soyez de bons serviteurs ;'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– l’espérance : qu’elle soit votre joie ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– l’épreuve : qu’elle vous trouve pleins d’endurance ;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– la prière : priez avec persévérance ;'
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– les besoins de ceux qui font partie du peuple saint : soyez-en solidaires, toujours prêts à pratiquer l’hospitalité.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Demandez à Dieu de faire du bien à ceux qui vous persécutent : oui, demandez du bien pour eux, ne demandez pas du mal ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partagez la joie de ceux qui sont dans la joie, les larmes de ceux qui pleurent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ayez les uns pour les autres une égale considération
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soyez bien d’accord entre vous ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cultivez l’harmonie entre vous.
      marker-yv: yv-n
    - type: text
      text: '. Ne visez pas à ce qui est trop haut, mais laissez-vous attirer par ce qui est humble. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ne vous prenez pas pour des sages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 3.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne répondez jamais au mal par le mal. Cherchez au contraire à faire ce qui est bien devant tous les hommes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Autant que possible, et dans la mesure où cela dépend de vous, vivez en paix avec tous les hommes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes amis, ne vous vengez pas vous-mêmes, mais laissez agir la colère de Dieu, car il est écrit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est à moi qu’il appartient de faire justice ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: c’est moi qui rendrai à chacun son dû
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.19 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 32.35
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne prenez pas comme modèle le monde actuel, mais soyez transformés par le renouvellement de votre intelligence, pour pouvoir discerner la volonté de Dieu : ce qui est bon, ce qui lui plaît'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui est agréable.
      marker-yv: yv-n
    - type: text
      text: ', ce qui est parfait.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vivre dans l’amour
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici votre part :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si ton ennemi a faim, donne-lui à manger.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: S’il a soif, donne-lui à boire.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Par là, ce sera comme si tu lui mettais
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: des charbons ardents sur la tête
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 25.21-22
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne te laisse pas vaincre par le mal. Au contraire, sois vainqueur du mal par le bien.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En vertu de la grâce que Dieu m’a faite, voici ce que je dis à chacun d’entre vous : n’allez pas au-delà de ce à quoi vous devez prétendre, tendez au contraire à une sage appréciation de vous-mêmes, chacun selon la part que Dieu lui a confiée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chacun selon la part de foi que Dieu lui a donnée.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacun de nous a, dans un seul corps, de nombreux organes ; mais ces organes n’ont pas la même fonction. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, alors que nous sommes nombreux, nous formons ensemble un seul corps par notre union avec Christ, et nous sommes tous, et chacun pour sa part, membres les uns des autres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et nous avons des dons de la grâce différents, que, dans sa bonté, Dieu nous a accordés. Pour l’un, c’est la prophétie : qu’il exerce cette activité conformément à notre foi commune. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour un autre, c’est le service : qu’il se consacre à ce service. Que celui qui a reçu un ministère d’enseignement enseigne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que celui qui a reçu un ministère d’encouragement encourage. Que celui qui donne le fasse sans arrière-pensée ; que celui qui dirige le fasse avec sérieux ; que celui qui secourt les malheureux le fasse avec joie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que votre amour soit sincère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Que votre amour soit sans hypocrisie.
      marker-yv: yv-n
    - type: text
      text: '. Ayez donc le mal en horreur, attachez-vous de toutes vos forces au bien, notamment en ce qui concerne :'
