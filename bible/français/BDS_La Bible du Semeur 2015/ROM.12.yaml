document_id: ROM.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie du chrétien
  - type: heading
    content: S’offrir à Dieu
  - type: text
    content: 'Je vous recommande donc, frères et sœurs, à cause de cette immense bonté de Dieu, à lui offrir votre corps comme un sacrifice vivant, saint et qui plaise à Dieu. Ce sera là de votre part un culte raisonnable. '
  '10':
  - type: text
    content: '– l’amour fraternel : soyez pleins d’affection les uns pour les autres ;'
  - type: text
    content: '– l’estime mutuelle : soyez les premiers à la manifester ;'
  '11':
  - type: text
    content: '– l’ardeur : ne soyez pas nonchalants ;'
  - type: text
    content: – l’Esprit
  - type: note
    content: 'Autre traduction : votre état d’esprit.'
  - type: text
    content: '  : soyez bouillants ;'
  - type: text
    content: '– le Seigneur : soyez de bons serviteurs ;'
  '12':
  - type: text
    content: '– l’espérance : qu’elle soit votre joie ;'
  - type: text
    content: '– l’épreuve : qu’elle vous trouve pleins d’endurance ;'
  - type: text
    content: '– la prière : priez avec persévérance ;'
  '13':
  - type: text
    content: '– les besoins de ceux qui font partie du peuple saint : soyez-en solidaires, toujours prêts à pratiquer l’hospitalité.'
  '14':
  - type: text
    content: 'Demandez à Dieu de faire du bien à ceux qui vous persécutent : oui, demandez du bien pour eux, ne demandez pas du mal ! '
  '15':
  - type: text
    content: 'Partagez la joie de ceux qui sont dans la joie, les larmes de ceux qui pleurent. '
  '16':
  - type: text
    content: Ayez les uns pour les autres une égale considération
  - type: note
    content: 'Autres traductions : soyez bien d’accord entre vous ; ou : cultivez l’harmonie entre vous.'
  - type: text
    content: '. Ne visez pas à ce qui est trop haut, mais laissez-vous attirer par ce qui est humble. '
  - type: text
    content: Ne vous prenez pas pour des sages
  - type: note
    content: Pr 3.7.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ne répondez jamais au mal par le mal. Cherchez au contraire à faire ce qui est bien devant tous les hommes. '
  '18':
  - type: text
    content: 'Autant que possible, et dans la mesure où cela dépend de vous, vivez en paix avec tous les hommes. '
  '19':
  - type: text
    content: 'Mes amis, ne vous vengez pas vous-mêmes, mais laissez agir la colère de Dieu, car il est écrit :'
  - type: text
    content: C’est à moi qu’il appartient de faire justice ;
  - type: text
    content: c’est moi qui rendrai à chacun son dû
  - type: text
    content: ' '
  - type: note
    content: Dt 32.35 .
  - type: text
    content: .
  '2':
  - type: text
    content: 'Ne prenez pas comme modèle le monde actuel, mais soyez transformés par le renouvellement de votre intelligence, pour pouvoir discerner la volonté de Dieu : ce qui est bon, ce qui lui plaît'
  - type: note
    content: 'Autre traduction : ce qui est agréable.'
  - type: text
    content: ', ce qui est parfait.'
  - type: heading
    content: Vivre dans l’amour
  '20':
  - type: text
    content: 'Mais voici votre part :'
  - type: text
    content: Si ton ennemi a faim, donne-lui à manger.
  - type: text
    content: S’il a soif, donne-lui à boire.
  - type: text
    content: Par là, ce sera comme si tu lui mettais
  - type: text
    content: des charbons ardents sur la tête
  - type: text
    content: ' '
  - type: note
    content: Pr 25.21-22 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '21':
  - type: text
    content: Ne te laisse pas vaincre par le mal. Au contraire, sois vainqueur du mal par le bien.
  '3':
  - type: text
    content: 'En vertu de la grâce que Dieu m’a faite, voici ce que je dis à chacun d’entre vous : n’allez pas au-delà de ce à quoi vous devez prétendre, tendez au contraire à une sage appréciation de vous-mêmes, chacun selon la part que Dieu lui a confiée'
  - type: note
    content: 'Certains comprennent : chacun selon la part de foi que Dieu lui a donnée.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Chacun de nous a, dans un seul corps, de nombreux organes ; mais ces organes n’ont pas la même fonction. '
  '5':
  - type: text
    content: 'De même, alors que nous sommes nombreux, nous formons ensemble un seul corps par notre union avec Christ, et nous sommes tous, et chacun pour sa part, membres les uns des autres. '
  '6':
  - type: text
    content: 'Et nous avons des dons de la grâce différents, que, dans sa bonté, Dieu nous a accordés. Pour l’un, c’est la prophétie : qu’il exerce cette activité conformément à notre foi commune. '
  '7':
  - type: text
    content: 'Pour un autre, c’est le service : qu’il se consacre à ce service. Que celui qui a reçu un ministère d’enseignement enseigne. '
  '8':
  - type: text
    content: Que celui qui a reçu un ministère d’encouragement encourage. Que celui qui donne le fasse sans arrière-pensée ; que celui qui dirige le fasse avec sérieux ; que celui qui secourt les malheureux le fasse avec joie.
  '9':
  - type: text
    content: Que votre amour soit sincère
  - type: note
    content: 'Autre traduction : Que votre amour soit sans hypocrisie.'
  - type: text
    content: '. Ayez donc le mal en horreur, attachez-vous de toutes vos forces au bien, notamment en ce qui concerne :'
