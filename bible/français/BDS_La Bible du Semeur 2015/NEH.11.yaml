document_id: NEH.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le repeuplement de Jérusalem et l’organisation de la ville
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les chefs du peuple s’installèrent à Jérusalem. Pour le reste du peuple, on tira au sort pour faire venir s’établir à Jérusalem, la ville sainte, une famille sur dix. Les neuf autres pouvaient rester dans les autres localités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certains hommes s’offrirent volontairement pour habiter à Jérusalem. Leurs compatriotes les bénirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dans les villes de Juda habitaient les Israélites, les prêtres, les lévites, les desservants du Temple et les descendants des serviteurs de Salomon, chacun dans sa propriété et sa ville respective. Et voici la liste des chefs de la province qui se fixèrent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'De plus, des gens des tribus de Juda et de Benjamin s’établirent à Jérusalem : De la tribu de Juda : Ataya, fils d’Ozias, ayant pour descendants : Zacharie, Amaria, Shephatia, Mahalaléel, de la lignée de Pérets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et Maaséya, fils de Baruch, dont les ascendants étaient Kol-Hozé, Hazaya, Adaya, Yoyarib, Zacharie et Shiloni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les descendants de Pérets qui s’établirent à Jérusalem furent en tout 468 hommes d’âge adulte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Membres de la tribu de Benjamin : Sallou, fils de Meshoullam, qui avait pour ascendants : Yoëd, Pedaya, Kolaya, Maaséya, Itiel et Esaïe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il y avait en outre Gabbaï et Sallaï. Cela fait en tout 928 hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joël, fils de Zikri, était leur responsable ; et Juda, fils de Hassenoua, était l’adjoint de la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parmi les prêtres : Yedaeya, fils de Yoyarib, Yakîn, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seraya, fils de Hilqiya, qui avait pour ascendants Meshoullam, Tsadoq, Merayoth et Ahitoub, responsable en chef du temple de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '822 membres de son lignage étaient occupés au service du Temple. Il y avait aussi Adaya, fils de Yeroham, qui avait pour ascendants Pelalia, Amtsi, Zacharie, Pashhour et Malkiya, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ainsi que 242 chefs de groupes familiaux de sa lignée. Il y avait Amashsaï, fils d’Azaréel, dont les ascendants étaient Ahzaï, Meshillémoth, Immer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avec les autres hommes valeureux de sa lignée, ils étaient au nombre de 128. Zabdiel, fils de Guedolim, en était le chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Parmi les lévites, Shemaya, fils de Hashoub, descendant d’Azriqam, d’Hashabia et de Bounni, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Shabthaï et Yozabad, qui faisaient partie des chefs des lévites, étaient chargés des travaux extérieurs du Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mattania, fils de Michée, descendant de Zabdi, descendant d’Asaph, qui était responsable d’entonner la louange lors de la prière, Baqbouqia, le second parmi ses frères, et Abda, fils de Shammoua, descendant de Galal et Yedoutoun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '284 lévites habitaient la ville sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il y avait encore 172 portiers, chargés de surveiller les portes : Aqqoub et Talmôn, et les membres de leur groupe familial. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le reste des Israélites, des prêtres et des lévites étaient établis dans toutes les villes de Juda, chacun dans son patrimoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les desservants du Temple habitaient le quartier de l’Ophel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.26'
        metadata:
          usfm: NEH.3.26
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: . Tsiha et Guishpa étaient leurs chefs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le responsable des lévites à Jérusalem était Ouzzi, fils de Bani, qui avait pour ascendants Hashabia, Mattania et Michée, descendants d’Asaph. Les descendants d’Asaph étaient les musiciens chargés du service musical dans le Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils étaient soumis à des ordonnances royales qui réglaient leur activité jour par jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Petahya, fils de Meshézabéel, de la lignée de Zérah, fils de Juda, était le délégué du roi pour toutes les affaires civiles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les localités repeuplées par des Judéens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: D’autres membres de la tribu de Juda s’établirent dans les localités de la campagne à Qiryath-Arba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hébron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Gn 23.2 ; Jos 15.54).
    marker-yv: yv-n
  - type: text
    text: ' et les villages qui en dépendent, à Dibôn et les villages qui en dépendent, à Yeqabtséel et les localités qui en dépendent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'à Yéshoua, à Molada, à Beth-Paleth ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'à Hatsar-Shoual, à Beer-Sheva et les villages qui en dépendent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'à Tsiqlag, à Mekona et les villages qui en dépendent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'à Eyn-Rimmôn, à Tsorea, à Yarmouth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: à Zanoah, à Adoullam et les localités qui en dépendent, à Lakish et les fermes des environs, à Azéqa et les villages qui en dépendent. Ils occupèrent ainsi toute la région depuis Beer-Sheva jusqu’à la vallée de Hinnom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les membres de la tribu de Benjamin occupèrent Guéba, Mikmas, Aya, Béthel et les villages qui en dépendent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Anatoth, Nob, Anania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hatsor, Rama, Guittaïm, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Hadid, Tseboïm, Neballath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Lod et Ono, la vallée des Artisans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Certains groupes de lévites de Juda allèrent s’installer parmi les Benjaminites.
