document_id: NEH.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le repeuplement de Jérusalem et l’organisation de la ville
  - type: text
    content: 'Les chefs du peuple s’installèrent à Jérusalem. Pour le reste du peuple, on tira au sort pour faire venir s’établir à Jérusalem, la ville sainte, une famille sur dix. Les neuf autres pouvaient rester dans les autres localités. '
  '10':
  - type: text
    content: 'Parmi les prêtres : Yedaeya, fils de Yoyarib, Yakîn, '
  '11':
  - type: text
    content: 'Seraya, fils de Hilqiya, qui avait pour ascendants Meshoullam, Tsadoq, Merayoth et Ahitoub, responsable en chef du temple de Dieu. '
  '12':
  - type: text
    content: '822 membres de son lignage étaient occupés au service du Temple. Il y avait aussi Adaya, fils de Yeroham, qui avait pour ascendants Pelalia, Amtsi, Zacharie, Pashhour et Malkiya, '
  '13':
  - type: text
    content: 'ainsi que 242 chefs de groupes familiaux de sa lignée. Il y avait Amashsaï, fils d’Azaréel, dont les ascendants étaient Ahzaï, Meshillémoth, Immer. '
  '14':
  - type: text
    content: 'Avec les autres hommes valeureux de sa lignée, ils étaient au nombre de 128. Zabdiel, fils de Guedolim, en était le chef. '
  '15':
  - type: text
    content: 'Parmi les lévites, Shemaya, fils de Hashoub, descendant d’Azriqam, d’Hashabia et de Bounni, '
  '16':
  - type: text
    content: 'Shabthaï et Yozabad, qui faisaient partie des chefs des lévites, étaient chargés des travaux extérieurs du Temple. '
  '17':
  - type: text
    content: 'Mattania, fils de Michée, descendant de Zabdi, descendant d’Asaph, qui était responsable d’entonner la louange lors de la prière, Baqbouqia, le second parmi ses frères, et Abda, fils de Shammoua, descendant de Galal et Yedoutoun. '
  '18':
  - type: text
    content: '284 lévites habitaient la ville sainte. '
  '19':
  - type: text
    content: 'Il y avait encore 172 portiers, chargés de surveiller les portes : Aqqoub et Talmôn, et les membres de leur groupe familial. '
  '2':
  - type: text
    content: 'Certains hommes s’offrirent volontairement pour habiter à Jérusalem. Leurs compatriotes les bénirent. '
  '20':
  - type: text
    content: 'Le reste des Israélites, des prêtres et des lévites étaient établis dans toutes les villes de Juda, chacun dans son patrimoine. '
  '21':
  - type: text
    content: Les desservants du Temple habitaient le quartier de l’Ophel
  - type: note
    content: Voir 3.26 et note.
  - type: text
    content: . Tsiha et Guishpa étaient leurs chefs.
  '22':
  - type: text
    content: 'Le responsable des lévites à Jérusalem était Ouzzi, fils de Bani, qui avait pour ascendants Hashabia, Mattania et Michée, descendants d’Asaph. Les descendants d’Asaph étaient les musiciens chargés du service musical dans le Temple. '
  '23':
  - type: text
    content: Ils étaient soumis à des ordonnances royales qui réglaient leur activité jour par jour.
  '24':
  - type: text
    content: Petahya, fils de Meshézabéel, de la lignée de Zérah, fils de Juda, était le délégué du roi pour toutes les affaires civiles.
  - type: heading
    content: Les localités repeuplées par des Judéens
  '25':
  - type: text
    content: D’autres membres de la tribu de Juda s’établirent dans les localités de la campagne à Qiryath-Arba
  - type: note
    content: C’est-à-dire Hébron (voir Gn 23.2 ; Jos 15.54).
  - type: text
    content: ' et les villages qui en dépendent, à Dibôn et les villages qui en dépendent, à Yeqabtséel et les localités qui en dépendent, '
  '26':
  - type: text
    content: 'à Yéshoua, à Molada, à Beth-Paleth ; '
  '27':
  - type: text
    content: 'à Hatsar-Shoual, à Beer-Sheva et les villages qui en dépendent, '
  '28':
  - type: text
    content: 'à Tsiqlag, à Mekona et les villages qui en dépendent, '
  '29':
  - type: text
    content: 'à Eyn-Rimmôn, à Tsorea, à Yarmouth, '
  '3':
  - type: text
    content: 'Dans les villes de Juda habitaient les Israélites, les prêtres, les lévites, les desservants du Temple et les descendants des serviteurs de Salomon, chacun dans sa propriété et sa ville respective. Et voici la liste des chefs de la province qui se fixèrent à Jérusalem. '
  '30':
  - type: text
    content: à Zanoah, à Adoullam et les localités qui en dépendent, à Lakish et les fermes des environs, à Azéqa et les villages qui en dépendent. Ils occupèrent ainsi toute la région depuis Beer-Sheva jusqu’à la vallée de Hinnom.
  '31':
  - type: text
    content: 'Les membres de la tribu de Benjamin occupèrent Guéba, Mikmas, Aya, Béthel et les villages qui en dépendent, '
  '32':
  - type: text
    content: 'Anatoth, Nob, Anania, '
  '33':
  - type: text
    content: 'Hatsor, Rama, Guittaïm, '
  '34':
  - type: text
    content: 'Hadid, Tseboïm, Neballath, '
  '35':
  - type: text
    content: Lod et Ono, la vallée des Artisans.
  '36':
  - type: text
    content: Certains groupes de lévites de Juda allèrent s’installer parmi les Benjaminites.
  '4':
  - type: text
    content: 'De plus, des gens des tribus de Juda et de Benjamin s’établirent à Jérusalem : De la tribu de Juda : Ataya, fils d’Ozias, ayant pour descendants : Zacharie, Amaria, Shephatia, Mahalaléel, de la lignée de Pérets, '
  '5':
  - type: text
    content: 'et Maaséya, fils de Baruch, dont les ascendants étaient Kol-Hozé, Hazaya, Adaya, Yoyarib, Zacharie et Shiloni. '
  '6':
  - type: text
    content: Les descendants de Pérets qui s’établirent à Jérusalem furent en tout 468 hommes d’âge adulte.
  '7':
  - type: text
    content: 'Membres de la tribu de Benjamin : Sallou, fils de Meshoullam, qui avait pour ascendants : Yoëd, Pedaya, Kolaya, Maaséya, Itiel et Esaïe. '
  '8':
  - type: text
    content: 'Il y avait en outre Gabbaï et Sallaï. Cela fait en tout 928 hommes. '
  '9':
  - type: text
    content: Joël, fils de Zikri, était leur responsable ; et Juda, fils de Hassenoua, était l’adjoint de la ville.
