document_id: 2KI.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Manassé sur Juda
  - type: heading
    content: (2 Ch 33.1-10)
  - type: text
    content: Manassé était âgé de douze ans à son avènement. Il régna cinquante-cinq ans à Jérusalem
  - type: note
    content: De 698 à 642 av. J.-C. (ce qui implique une corégence avec son père si celui-ci n’est décédé qu’en 686 av. J.-C.).
  - type: text
    content: '. Sa mère s’appelait Hephtsiba. '
  '10':
  - type: text
    content: 'Alors, par l’intermédiaire de ses serviteurs les prophètes, l’Eternel dit : '
  '11':
  - type: text
    content: A cause du roi Manassé, roi de Juda, qui s’est rendu coupable de tous ces actes abominables, qui a même fait pire que tout ce qu’avaient fait avant lui les Amoréens
  - type: note
    content: Terme générique désignant tous les habitants de Canaan avant la conquête par les Israélites (Ex 3.17).
  - type: text
    content: ' et qui a entraîné le peuple de Juda dans le péché d’idolâtrie, '
  '12':
  - type: text
    content: 'voici ce que déclare l’Eternel, le Dieu d’Israël : « Je vais amener sur Jérusalem et sur Juda un malheur tel que tous ceux qui en entendront parler seront abasourdis. '
  '13':
  - type: text
    content: 'Je vais faire subir à Jérusalem le même sort qu’à Samarie et je la réduirai au même état que la descendance d’Achab. Je viderai la ville de ses habitants comme on nettoie un plat et qu’on le retourne à l’envers après l’avoir nettoyé. '
  '14':
  - type: text
    content: 'J’abandonnerai ce qui reste du peuple qui m’appartient et je le livrerai au pouvoir de ses ennemis qui le pilleront et le dépouilleront. '
  '15':
  - type: text
    content: J’agirai ainsi parce qu’ils ont fait ce que je considère comme mal et qu’ils n’ont pas cessé de m’irriter depuis le jour où leurs ancêtres sont sortis d’Egypte jusqu’à aujourd’hui. »
  '16':
  - type: text
    content: Manassé fit aussi tuer beaucoup de gens innocents, au point que Jérusalem fut remplie d’un bout à l’autre de ses victimes, sans compter les péchés dans lequel il entraîna Juda en faisant ce que l’Eternel considère comme mal.
  - type: heading
    content: La mort de Manassé
  - type: heading
    content: (2 Ch 33.18-20)
  '17':
  - type: text
    content: 'Les autres faits et gestes de Manassé, toutes ses réalisations, ainsi que les péchés dont il s’est rendu coupable, sont cités dans le livre des Annales des rois de Juda. '
  '18':
  - type: text
    content: Manassé rejoignit ses ancêtres décédés et fut enterré dans le jardin de son palais appelé aussi le jardin d’Ouzza. Son fils Amôn lui succéda sur le trône.
  - type: heading
    content: Le règne d’Amôn sur Juda
  - type: heading
    content: (2 Ch 33.21-25)
  '19':
  - type: text
    content: Amôn avait vingt-deux ans à son avènement et il régna deux ans à Jérusalem
  - type: note
    content: De 642 à 640 av. J.-C.
  - type: text
    content: '. Sa mère s’appelait Meshoullémeth, elle était fille de Harouts de Yotba. '
  '2':
  - type: text
    content: Il fit ce que l’Eternel considère comme mal et s’adonna aux mêmes pratiques abominables que les peuples étrangers dépossédés par l’Eternel en faveur des Israélites
  - type: note
    content: Cf. 1 R 14.24 ; Jr 15.4.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, comme l’avait fait son père Manassé ; '
  '21':
  - type: text
    content: 'il suivit en tout l’exemple de son père, il rendit un culte aux idoles que son père avait servies et il se prosterna devant elles ; '
  '22':
  - type: text
    content: 'il abandonna l’Eternel, le Dieu de ses ancêtres, et ne suivit pas les chemins que celui-ci avait prescrits. '
  '23':
  - type: text
    content: 'Les ministres d’Amôn conspirèrent contre lui et l’assassinèrent dans son palais. '
  '24':
  - type: text
    content: Mais la population du pays massacra tous ceux qui avaient comploté contre le roi Amôn et proclama son fils Josias roi à sa place.
  '25':
  - type: text
    content: 'Les autres faits et gestes d’Amôn sont cités dans le livre des Annales des rois de Juda. '
  '26':
  - type: text
    content: Il fut enterré dans son tombeau, dans le jardin d’Ouzza, et son fils Josias lui succéda sur le trône.
  '3':
  - type: text
    content: Il rebâtit les hauts lieux que son père Ezéchias avait détruits, il érigea des autels à Baal, dressa un poteau sacré à la déesse Ashéra comme l’avait fait Achab, roi d’Israël
  - type: note
    content: Qui avait introduit les cultes idolâtres phéniciens en Israël (1 R 16.32-33).
  - type: text
    content: ', et il se prosterna devant tous les astres du ciel, et leur rendit un culte. '
  '4':
  - type: text
    content: 'Il construisit des autels païens dans le temple de l’Eternel, malgré cette parole de l’Eternel : C’est là, à Jérusalem, que j’établirai ma présence.'
  '5':
  - type: text
    content: 'Il érigea des autels en l’honneur de tous les astres du ciel dans les deux parvis du temple de l’Eternel. '
  '6':
  - type: text
    content: Il alla même jusqu’à brûler son fils pour l’offrir en sacrifice. Il consultait les augures et les devins. Il installa des gens qui évoquaient les morts et qui prédisaient l’avenir. Il multiplia les actes que l’Eternel considère comme mauvais et l’irrita de cette manière
  - type: note
    content: Voir Dt 18.10-11.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Il fit dresser dans le Temple la statue d’Ashéra qu’il avait fabriquée, alors que l’Eternel avait déclaré à David et à son fils Salomon : C’est dans ce temple et dans Jérusalem, que j’ai choisie parmi toutes les tribus d’Israël, que j’établirai pour toujours ma présence'
  - type: note
    content: Pour les v. 7-8, voir 2 S 7.8-16 ; 1 R 2.2-4.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Si les Israélites s’appliquent à obéir à tout ce que je leur ai commandé, à toute la Loi que leur a communiquée mon serviteur Moïse, je ne les ferai plus errer loin du pays que j’ai donné à leurs ancêtres.
  '9':
  - type: text
    content: Mais les Israélites n’obéirent pas. Manassé les égara sur une mauvaise voie en sorte qu’ils firent encore plus de mal que les peuples étrangers que l’Eternel avait exterminés au profit des Israélites.
  - type: heading
    content: La fin de Juda est prédite
