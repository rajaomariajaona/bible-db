document_id: 1PE.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ainsi donc, puisque Christ a souffert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits précisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour vous, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour nous.
    marker-yv: yv-n
  - type: text
    text: ' dans son corps, armez-vous aussi de la même pensée. En effet, celui qui a souffert dans son corps a rompu avec le péché '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'afin de ne plus vivre, le temps qui lui reste à passer dans son corps, selon les passions humaines, mais selon la volonté de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est bien assez, en effet, d’avoir accompli dans le passé la volonté des païens, en vous adonnant à la débauche, aux passions mauvaises, à l’ivrognerie, aux orgies, aux beuveries et aux dérèglements associés aux cultes idolâtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant ils trouvent étrange que vous ne vous précipitiez plus avec eux dans la même vie de débauche, et ils se répandent en calomnies sur vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils en rendront compte à celui qui est prêt à juger les vivants et les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est pour cela d’ailleurs que la Bonne Nouvelle a aussi été annoncée à ceux qui maintenant sont morts, afin qu’après avoir subi la même condamnation que tous les hommes dans leur corps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin qu’après avoir été condamnés par les hommes dans leur corps.
    marker-yv: yv-n
  - type: text
    text: ', ils vivent selon Dieu par l’Esprit.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La vie communautaire
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Au service les uns des autres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La fin de toutes choses est proche. Menez donc une vie équilibrée en faisant preuve de modération, afin d’être disponibles pour la prière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avant tout, aimez-vous ardemment les uns les autres, car '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: l’amour garde le silence sur un grand nombre de péchés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10.12
        metadata:
          usfm: PRO.10.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Exercez l’hospitalité les uns envers les autres, sans vous plaindre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Chacun de vous a reçu de Dieu un don de la grâce particulier : qu’il l’exerce au service des autres comme un bon gérant de la grâce infiniment variée de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que celui qui parle transmette les paroles de Dieu. Que celui qui sert accomplisse sa tâche avec la force que Dieu donne. Agissez en toutes ces choses de manière à ce que la gloire en revienne à Dieu par Jésus-Christ, à qui appartiennent la gloire et la puissance pour l’éternité. Amen !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les souffrances inévitables
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mes chers amis, ne soyez pas surpris d’avoir été plongés dans la fournaise de l’épreuve, comme s’il vous arrivait quelque chose d’anormal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au contraire, réjouissez-vous, car vous participez aux souffrances de Christ, afin d’être remplis de joie quand il paraîtra dans toute sa gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si l’on vous insulte parce que vous appartenez à Christ, heureux êtes-vous, car l’Esprit glorieux, l’Esprit de Dieu, repose sur vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Qu’aucun de vous n’ait à endurer une punition parce qu’il aurait tué, volé ou commis quelque autre méfait, ou encore parce qu’il se serait mêlé des affaires d’autrui ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais si c’est comme « chrétien » qu’il souffre, qu’il n’en éprouve aucune honte ; qu’il fasse, au contraire, honneur à Dieu en se montrant digne de ce nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maintenant a lieu la première étape du jugement : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il commence par le temple de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 9.6
        metadata:
          usfm: EZK.9.6
      - type: text
        text: '. Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple de Dieu.
    marker-yv: yv-n
  - type: text
    text: '. Et s’il débute par nous, quel sera le sort final de ceux qui refusent de croire à l’Evangile de Dieu ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme le dit l’Ecriture, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'si le juste est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauvé
    - type: text
      text: ' à travers toutes sortes de difficultés, que vont devenir le méchant et le pécheur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11.31
        metadata:
          usfm: PRO.11.31
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ainsi donc, que ceux qui souffrent parce qu’ils obéissent à la volonté de Dieu s’en remettent entièrement au Créateur, qui est fidèle, et qu’ils continuent à faire le bien.
