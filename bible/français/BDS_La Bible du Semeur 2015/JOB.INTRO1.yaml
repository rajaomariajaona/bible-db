  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre de Job, dont la datation est incertaine, est l’œuvre d’un auteur anonyme, d’origine juive, constituée à partir de traditions orales ou écrites. Job, que le prophète Ezéchiel associe à Noé et à Danel, un sage de l’Antiquité atteint lui aussi par le malheur (Ez 14.14, 20), a dû vivre en des temps reculés. Sa patrie se situe à l’est du Jourdain, au pays d’Outs (Jb 1.1), région, selon certains, limitrophe du territoire d’Edom et de l’Arabie.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Job, homme « intègre et droit » (1.1), se voit soudainement accablé par l’épreuve : il perd ses biens et ses enfants, lui-même est frappé d’une maladie qui le fait cruellement souffrir (chap. 1 à 3). Pourquoi Dieu permet-il la souffrance de cet homme juste ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour les trois amis de Job, sa souffrance ne peut être que le châtiment divin d’un péché grave. Comment l’expliquer autrement sans condamner Dieu ? Et ils en viennent à accuser Job de manière éhontée (22.4-11) que contredit toute la vie de leur ami (29.12-25). Mais plus ils l’accusent, plus Job clame son innocence. Lorsque, de guerre lasse, ils se taisent, Elihou intervient (chap. 33 à 37). Contrairement à ses prédécesseurs, il accepte les protestations d’innocence de Job et attribue à sa souffrance une fonction éducative : Dieu utilise parfois la souffrance pour avertir quelqu’un qui est en danger de commettre une faute, ou pour attirer son attention sur une faute qu’il a commise (sans doute inconsciemment). Job est donc invité à rechercher ce que Dieu veut lui enseigner.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Job sait que tout bien vient de Dieu (2.10) et qu’aucun homme n’est juste ou pur devant lui (9.2 ; 14.4, 16-17). Mais il ne comprend plus sa façon d’agir : pourquoi Dieu, qui le traitait autrefois selon son intégrité, est-il devenu son ennemi (10.2) ? Job défend alors sa conduite devant Dieu (13.3 ; 16.17) au point d’opposer Dieu à Dieu. D’un côté, il l’accuse de le tourmenter « sans cause » (9.17) et d’un autre, il exprime sa foi en ce Dieu qu’il aime : « Quand même il me tuerait, j’espérerais en lui » (13.15). Il en vient ainsi à affirmer sa foi en un mystérieux « témoin au ciel », un « arbitre » entre Dieu et lui (16.19, 21), un « Défenseur » qui viendra à son secours dans la mort même : Dieu prendra alors son parti (19.25-27).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans le prologue du livre, l’auteur révèle que les souffrances de Job ont la valeur d’un témoignage d’amour désintéressé pour Dieu : Job aime Dieu, non pas pour ce qu’il lui donne, contrairement à ce que prétend l’Accusateur (1.9-11), mais pour ce qu’il est (2.10). Mais cela n’explique pas réellement ses souffrances. Car Dieu se refusera à en indiquer la raison à Job. Lorsqu’il s’adresse à lui « du sein de la tempête », il l’invite simplement à contempler sa sagesse et sa puissance, pour lui faire sentir que l’homme n’a pas à demander à Dieu de lui rendre des comptes de sa manière d’agir, qui dépasse l’entendement humain. L’Eternel lui donnera raison contre ses amis qui l’ont accusé à tort (42.7), mais lui reprochera d’avoir voulu condamner Dieu pour garantir son innocence (40.8). Job ne reçoit donc pas de réponse ultime au pourquoi de sa souffrance, mais, face à ce Dieu sage, tout-puissant, et pourtant si proche, il s’humilie, reconnaît son erreur et se tourne vers son Libérateur.'
