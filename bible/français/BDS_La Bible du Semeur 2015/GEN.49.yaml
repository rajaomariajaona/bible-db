document_id: GEN.49,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob bénit les douze tribus d’Israël
  - type: text
    content: 'Jacob convoqua ses fils et leur dit :'
  - type: text
    content: Réunissez-vous et je vous révélerai ce qui vous arrivera dans les temps à venir.
  '10':
  - type: text
    content: Le sceptre ne s’écartera ╵pas de Juda,
  - type: text
    content: et l’insigne de chef ╵ne sera pas ôté ╵d’entre ses pieds
  - type: text
    content: jusqu’à la venue de celui ╵auquel ils appartiennent
  - type: note
    content: 'Nom diversement traduit : le Pacifique, le Dominateur, l’Envoyé. celui… appartiennent: rend un mot hébreu dont l’interprétation est discutée. Ez 21.32 semble confirmer la lecture adoptée ici. Cette prophétie est généralement rapportée au Messie qui devait naître de la tribu de Juda.'
  - type: text
    content: et à qui tous les peuples ╵rendront obéissance.
  '11':
  - type: text
    content: Son âne, il l’attache à la vigne,
  - type: text
    content: et, à un cep de choix, ╵le petit de l’ânesse.
  - type: text
    content: Il lave dans le vin ╵son vêtement,
  - type: text
    content: dans le jus des raisins ╵il nettoie son manteau
  - type: note
    content: Image soulignant l’abondance (voir Ap 7.14 ; 19.13).
  - type: text
    content: .
  '12':
  - type: text
    content: Il a les yeux plus rouges que le vin,
  - type: text
    content: les dents plus blanches que le lait
  - type: note
    content: 'Autre traduction : Ses yeux ont été rendus sombres par le vin, et ses dents blanches par le lait.'
  - type: text
    content: .
  '13':
  - type: text
    content: Zabulon aura sa demeure ╵sur le rivage de la mer,
  - type: text
    content: il aura sur sa côte ╵un port pour les navires,
  - type: text
    content: son territoire s’étendra ╵jusqu’à Sidon.
  '14':
  - type: text
    content: Issacar est un âne ╵très vigoureux
  - type: text
    content: couché au beau milieu ╵de deux enclos.
  '15':
  - type: text
    content: Il a trouvé ╵que le repos est bon,
  - type: text
    content: que le pays est agréable,
  - type: text
    content: il tend l’épaule ╵pour porter le fardeau,
  - type: text
    content: et il s’assujettit ╵à la corvée.
  '16':
  - type: text
    content: Dan jugera son peuple,
  - type: text
    content: comme les autres tribus d’Israël.
  '17':
  - type: text
    content: Que Dan soit un serpent ╵sur le chemin,
  - type: text
    content: qu’il soit une vipère ╵sur le sentier,
  - type: text
    content: mordant les jarrets du cheval,
  - type: text
    content: pour que le cavalier ╵en tombe à la renverse.
  '18':
  - type: text
    content: Je compte sur toi, Eternel ╵pour accorder la délivrance.
  '19':
  - type: text
    content: Gad agressé par une troupe ╵l’assaillira
  - type: text
    content: et c’est sa troupe à lui ╵qui poursuivra la troupe adverse.
  '2':
  - type: text
    content: Rassemblez-vous et écoutez, ╵fils de Jacob !
  - type: text
    content: Ecoutez ce que dit ╵Israël, votre père.
  '20':
  - type: text
    content: Aser a une riche nourriture.
  - type: text
    content: C’est lui qui fournira ╵des mets dignes d’un roi.
  '21':
  - type: text
    content: Nephtali est semblable ╵à une biche en liberté ╵qui donne de beaux faons.
  '22':
  - type: text
    content: Joseph est un rameau fertile
  - type: text
    content: d’un arbre plein de fruits ╵planté près d’une source.
  - type: text
    content: Ses branches grimpent et s’élancent ╵par-dessus la muraille.
  '23':
  - type: text
    content: Des archers le provoquent, ╵le prennent à partie,
  - type: text
    content: et le harcèlent de leurs flèches.
  '24':
  - type: text
    content: Mais son arc reste ferme
  - type: text
    content: car ses bras pleins de force ╵conservent leur souplesse
  - type: text
    content: grâce au secours ╵du Puissant de Jacob,
  - type: text
    content: qui est le berger et le Roc ╵sur lequel Israël se fonde.
  '25':
  - type: text
    content: Oui, le Dieu de ton père ╵viendra à ton secours,
  - type: text
    content: le Tout-Puissant te bénira.
  - type: text
    content: Qu’il veuille te bénir d’en haut ╵par des pluies abondantes
  - type: text
    content: et par des eaux d’en bas ╵où repose l’abîme,
  - type: text
    content: par de nombreux enfants ╵et beaucoup de troupeaux.
  '26':
  - type: text
    content: Les bénédictions de ton père surpassent
  - type: text
    content: celles des montagnes antiques
  - type: text
    content: et les meilleurs produits ╵des collines anciennes.
  - type: text
    content: Que ces bénédictions ╵soient sur la tête de Joseph,
  - type: text
    content: et sur le front ╵du prince de ses frères
  - type: note
    content: Voir Dt 33.15.
  - type: text
    content: '  !'
  '27':
  - type: text
    content: Benjamin est semblable ╵à un loup qui déchire.
  - type: text
    content: Dès le matin, ╵il dévore sa proie,
  - type: text
    content: et sur le soir encore, ╵répartit le butin.
  '28':
  - type: text
    content: Tous ceux-là ont formé les douze tribus d’Israël, c’est ainsi que leur parla leur père et qu’il les bénit, en prononçant pour chacun sa bénédiction propre.
  - type: heading
    content: La mort de Jacob
  '29':
  - type: text
    content: 'Jacob leur donna ses instructions : Je vais aller rejoindre mes ancêtres, enterrez-moi auprès de mes pères dans la caverne qui se trouve dans le champ d’Ephrôn le Hittite, '
  '3':
  - type: text
    content: Ruben, tu es mon premier-né,
  - type: text
    content: le premier fruit de ma vigueur, ╵du temps où j’étais plein de force,
  - type: text
    content: toi, tu es supérieur ╵en dignité ╵et supérieur en force.
  '30':
  - type: text
    content: dans la caverne du champ de Makpéla, vis-à-vis de Mamré, au pays de Canaan, la caverne qu’Abraham a achetée, avec le champ, à Ephrôn le Hittite en propriété funéraire
  - type: note
    content: Voir Gn 23.3-18.
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'C’est là qu’on a enterré Abraham et sa femme Sara ; c’est là qu’on a enterré Isaac et sa femme Rébecca. C’est là aussi que j’ai enterré Léa. '
  '32':
  - type: text
    content: Le champ et la caverne qui s’y trouve ont été achetés aux Hittites.
  '33':
  - type: text
    content: Lorsque Jacob eut achevé d’énoncer ses instructions à ses fils, il ramena ses pieds sur son lit, expira et fut réuni à ses ancêtres
  - type: note
    content: Voir Ac 7.15.
  - type: text
    content: .
  '4':
  - type: text
    content: Bouillonnant comme l’eau, ╵tu n’auras pas le premier rang !
  - type: text
    content: Car tu as profané ╵la couche de ton père, ╵en entrant dans mon lit
  - type: note
    content: Voir Gn 35.22.
  - type: text
    content: .
  '5':
  - type: text
    content: Siméon et Lévi sont frères,
  - type: text
    content: ils se sont mis d’accord ╵pour semer la violence.
  '6':
  - type: text
    content: Non, je ne veux pas m’associer ╵à leur complot !
  - type: text
    content: Je mets un point d’honneur ╵à ne pas approuver ╵leurs délibérations !
  - type: text
    content: Car mus par leur colère, ╵ils ont tué des hommes ;
  - type: text
    content: poussés par leur caprice, ╵ils ont mutilé des taureaux
  - type: note
    content: Voir Gn 34.25.
  - type: text
    content: .
  '7':
  - type: text
    content: Que leur colère soit maudite, ╵car elle est violente.
  - type: text
    content: Maudit soit leur emportement, ╵car il est implacable !
  - type: text
    content: Moi je les éparpillerai ╵au milieu de Jacob,
  - type: text
    content: je les disperserai ╵en Israël.
  '8':
  - type: text
    content: O toi, Juda, ╵tes frères te rendront hommage,
  - type: text
    content: ta main fera ployer ╵la nuque de tes ennemis,
  - type: text
    content: et les fils de ton père ╵se prosterneront devant toi.
  '9':
  - type: text
    content: Oui, Juda est un jeune lion
  - type: note
    content: Voir Nb 24.9 ; Ap 5.5.
  - type: text
    content: .
  - type: text
    content: Mon fils, tu reviens de la chasse
  - type: text
    content: et tu t’es accroupi ╵et couché comme un lion,
  - type: text
    content: 'comme une lionne : ╵qui te ferait lever ?'
