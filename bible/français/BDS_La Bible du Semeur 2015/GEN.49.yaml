document_id: GEN.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob bénit les douze tribus d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob convoqua ses fils et leur dit :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Réunissez-vous et je vous révélerai ce qui vous arrivera dans les temps à venir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rassemblez-vous et écoutez, ╵fils de Jacob !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoutez ce que dit ╵Israël, votre père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ruben, tu es mon premier-né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le premier fruit de ma vigueur, ╵du temps où j’étais plein de force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu es supérieur ╵en dignité ╵et supérieur en force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Bouillonnant comme l’eau, ╵tu n’auras pas le premier rang !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu as profané ╵la couche de ton père, ╵en entrant dans mon lit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 35.22
        metadata:
          usfm: GEN.35.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Siméon et Lévi sont frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont mis d’accord ╵pour semer la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Non, je ne veux pas m’associer ╵à leur complot !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mets un point d’honneur ╵à ne pas approuver ╵leurs délibérations !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car mus par leur colère, ╵ils ont tué des hommes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussés par leur caprice, ╵ils ont mutilé des taureaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 34.25
        metadata:
          usfm: GEN.34.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que leur colère soit maudite, ╵car elle est violente.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maudit soit leur emportement, ╵car il est implacable !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi je les éparpillerai ╵au milieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les disperserai ╵en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O toi, Juda, ╵tes frères te rendront hommage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main fera ployer ╵la nuque de tes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les fils de ton père ╵se prosterneront devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Oui, Juda est un jeune lion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 24.9 ; Ap 5.5.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon fils, tu reviens de la chasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu t’es accroupi ╵et couché comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'comme une lionne : ╵qui te ferait lever ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le sceptre ne s’écartera ╵pas de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’insigne de chef ╵ne sera pas ôté ╵d’entre ses pieds
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à la venue de celui ╵auquel ils appartiennent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom diversement traduit : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Pacifique, le Dominateur, l’Envoyé. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui… appartiennent
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rend un mot hébreu dont l’interprétation est discutée. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 21.32
        metadata:
          usfm: EZK.21.32
      - type: text
        text: ' semble confirmer la lecture adoptée ici. Cette prophétie est généralement rapportée au Messie qui devait naître de la tribu de Juda.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à qui tous les peuples ╵rendront obéissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Son âne, il l’attache à la vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, à un cep de choix, ╵le petit de l’ânesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il lave dans le vin ╵son vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le jus des raisins ╵il nettoie son manteau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Image soulignant l’abondance (voir Ap 7.14 ; 19.13).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a les yeux plus rouges que le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les dents plus blanches que le lait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ses yeux ont été rendus sombres par le vin, et ses dents blanches par le lait.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Zabulon aura sa demeure ╵sur le rivage de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aura sur sa côte ╵un port pour les navires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son territoire s’étendra ╵jusqu’à Sidon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Issacar est un âne ╵très vigoureux
- type: usfm
  marker: q1
  children:
  - type: text
    text: couché au beau milieu ╵de deux enclos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il a trouvé ╵que le repos est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le pays est agréable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tend l’épaule ╵pour porter le fardeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’assujettit ╵à la corvée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dan jugera son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les autres tribus d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que Dan soit un serpent ╵sur le chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il soit une vipère ╵sur le sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mordant les jarrets du cheval,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que le cavalier ╵en tombe à la renverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je compte sur toi, Eternel ╵pour accorder la délivrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Gad agressé par une troupe ╵l’assaillira
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est sa troupe à lui ╵qui poursuivra la troupe adverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aser a une riche nourriture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui fournira ╵des mets dignes d’un roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nephtali est semblable ╵à une biche en liberté ╵qui donne de beaux faons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Joseph est un rameau fertile
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’un arbre plein de fruits ╵planté près d’une source.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches grimpent et s’élancent ╵par-dessus la muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Des archers le provoquent, ╵le prennent à partie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le harcèlent de leurs flèches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais son arc reste ferme
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ses bras pleins de force ╵conservent leur souplesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce au secours ╵du Puissant de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est le berger et le Roc ╵sur lequel Israël se fonde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Oui, le Dieu de ton père ╵viendra à ton secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant te bénira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il veuille te bénir d’en haut ╵par des pluies abondantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par des eaux d’en bas ╵où repose l’abîme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par de nombreux enfants ╵et beaucoup de troupeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les bénédictions de ton père surpassent
- type: usfm
  marker: q1
  children:
  - type: text
    text: celles des montagnes antiques
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les meilleurs produits ╵des collines anciennes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ces bénédictions ╵soient sur la tête de Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur le front ╵du prince de ses frères
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 33.15
        metadata:
          usfm: DEU.33.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Benjamin est semblable ╵à un loup qui déchire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès le matin, ╵il dévore sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur le soir encore, ╵répartit le butin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tous ceux-là ont formé les douze tribus d’Israël, c’est ainsi que leur parla leur père et qu’il les bénit, en prononçant pour chacun sa bénédiction propre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jacob leur donna ses instructions : Je vais aller rejoindre mes ancêtres, enterrez-moi auprès de mes pères dans la caverne qui se trouve dans le champ d’Ephrôn le Hittite, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: dans la caverne du champ de Makpéla, vis-à-vis de Mamré, au pays de Canaan, la caverne qu’Abraham a achetée, avec le champ, à Ephrôn le Hittite en propriété funéraire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 23.3-18
        metadata:
          usfm: GEN.23.3+GEN.23.4+GEN.23.5+GEN.23.6+GEN.23.7+GEN.23.8+GEN.23.9+GEN.23.10+GEN.23.11+GEN.23.12+GEN.23.13+GEN.23.14+GEN.23.15+GEN.23.16+GEN.23.17+GEN.23.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'C’est là qu’on a enterré Abraham et sa femme Sara ; c’est là qu’on a enterré Isaac et sa femme Rébecca. C’est là aussi que j’ai enterré Léa. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le champ et la caverne qui s’y trouve ont été achetés aux Hittites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lorsque Jacob eut achevé d’énoncer ses instructions à ses fils, il ramena ses pieds sur son lit, expira et fut réuni à ses ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
