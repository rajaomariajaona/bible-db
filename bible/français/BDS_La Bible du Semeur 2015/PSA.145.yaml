document_id: PSA.145,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ton règne est éternelCe psaume est alphabétique (cf. note 9.1).
  - type: text
    content: Chant de louange. De David.
  - type: text
    content: Je t’exalterai, ╵ô mon Dieu, mon Roi,
  - type: text
    content: je te bénirai ╵jusque dans l’éternité.
  '10':
  - type: text
    content: Que toutes tes œuvres ╵te louent, Eternel,
  - type: text
    content: et qu’ils te bénissent, ╵ceux qui te sont attachés !
  '11':
  - type: text
    content: Ils diront la gloire ╵de ton règne
  - type: text
    content: et proclameront ta force.
  '12':
  - type: text
    content: Ils feront connaître aux hommes ╵tes exploits,
  - type: text
    content: la gloire et la splendeur de ton règne.
  '13':
  - type: text
    content: Ton règne s’étend sur tous les temps,
  - type: text
    content: et ta seigneurie ╵dure d’âge en âge.
  - type: text
    content: L’Eternel est fiable ╵en tout ce qu’il dit,
  - type: text
    content: il est plein d’amour ╵dans tout ce qu’il fait
  - type: note
    content: La seconde phrase du verset est absente de la plupart des manuscrits du texte hébreu traditionnel, mais elle se trouve dans un manuscrit de ce texte, dans le texte hébreu trouvé à Qumrân, dans l’ancienne version grecque et dans la version syriaque. De plus, cette phrase est nécessaire pour que le psaume puisse être pleinement alphabétique.
  - type: text
    content: .
  '14':
  - type: text
    content: L’Eternel est le soutien ╵de tous ceux qui tombent,
  - type: text
    content: il relève ╵tous ceux qui fléchissent.
  '15':
  - type: text
    content: 'Les regards de tous ╵sont tournés vers toi :'
  - type: text
    content: C’est toi qui leur donnes ╵à chacun sa nourriture ╵le moment venu.
  '16':
  - type: text
    content: Tu ouvres ta main
  - type: text
    content: et tu combles les désirs ╵de tout ce qui vit
  - type: note
    content: Voir 104.27-28.
  - type: text
    content: .
  '17':
  - type: text
    content: L’Eternel est juste ╵en tout ce qu’il fait,
  - type: text
    content: il est plein d’amour ╵en toutes ses œuvres.
  '18':
  - type: text
    content: L’Eternel est proche ╵de ceux qui l’invoquent,
  - type: text
    content: de tous ceux qui l’invoquent avec sincérité.
  '19':
  - type: text
    content: Il accomplit les désirs ╵de ceux qui le craignent,
  - type: text
    content: il entend leur cri ╵et il les délivre.
  '2':
  - type: text
    content: Tous les jours, ╵je te bénirai
  - type: text
    content: et je te louerai ╵jusque dans l’éternité.
  '20':
  - type: text
    content: L’Eternel garde tous ceux qui l’aiment,
  - type: text
    content: mais il détruira tous les méchants.
  '21':
  - type: text
    content: Je dirai les louanges de l’Eternel !
  - type: text
    content: Toute créature ╵le bénira éternellement ╵pour sa sainteté,
  - type: text
    content: jusque dans l’éternité.
  '3':
  - type: text
    content: L’Eternel est grand ╵et très digne de louanges,
  - type: text
    content: sa grandeur est insondable.
  '4':
  - type: text
    content: Que chaque génération ╵dise à celle qui la suit ╵combien tes œuvres sont belles.
  - type: text
    content: Qu’elle publie tes exploits,
  '5':
  - type: text
    content: l’éclat et la gloire ╵de ta majesté.
  - type: text
    content: Pour moi, je méditerai ╵le récit de tes prodiges.
  '6':
  - type: text
    content: Qu’elle parle ╵de ta force redoutable,
  - type: text
    content: et moi, je proclamerai ╵tes hauts faits.
  '7':
  - type: text
    content: Qu’elle évoque ╵ta grande bonté,
  - type: text
    content: qu’elle chante ta justice !
  '8':
  - type: text
    content: L’Eternel est plein de grâce ╵et de compassion,
  - type: text
    content: lent à la colère ╵et riche en amour.
  '9':
  - type: text
    content: L’Eternel est bon ╵envers tous les hommes,
  - type: text
    content: plein de compassion ╵pour toutes ses créatures.
