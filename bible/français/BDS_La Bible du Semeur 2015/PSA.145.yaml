document_id: PSA.145,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ton règne est éternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce psaume est alphabétique (cf. note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.1'
        - type: text
          text: ).
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant de louange. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’exalterai, ╵ô mon Dieu, mon Roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te bénirai ╵jusque dans l’éternité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toutes tes œuvres ╵te louent, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils te bénissent, ╵ceux qui te sont attachés !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils diront la gloire ╵de ton règne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et proclameront ta force.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils feront connaître aux hommes ╵tes exploits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la gloire et la splendeur de ton règne.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton règne s’étend sur tous les temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta seigneurie ╵dure d’âge en âge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est fiable ╵en tout ce qu’il dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est plein d’amour ╵dans tout ce qu’il fait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La seconde phrase du verset est absente de la plupart des manuscrits du texte hébreu traditionnel, mais elle se trouve dans un manuscrit de ce texte, dans le texte hébreu trouvé à Qumrân, dans l’ancienne version grecque et dans la version syriaque. De plus, cette phrase est nécessaire pour que le psaume puisse être pleinement alphabétique.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est le soutien ╵de tous ceux qui tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il relève ╵tous ceux qui fléchissent.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les regards de tous ╵sont tournés vers toi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui leur donnes ╵à chacun sa nourriture ╵le moment venu.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ouvres ta main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu combles les désirs ╵de tout ce qui vit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 104.27-28
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est juste ╵en tout ce qu’il fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est plein d’amour ╵en toutes ses œuvres.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est proche ╵de ceux qui l’invoquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous ceux qui l’invoquent avec sincérité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il accomplit les désirs ╵de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il entend leur cri ╵et il les délivre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les jours, ╵je te bénirai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te louerai ╵jusque dans l’éternité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel garde tous ceux qui l’aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il détruira tous les méchants.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dirai les louanges de l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute créature ╵le bénira éternellement ╵pour sa sainteté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusque dans l’éternité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est grand ╵et très digne de louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa grandeur est insondable.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que chaque génération ╵dise à celle qui la suit ╵combien tes œuvres sont belles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle publie tes exploits,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’éclat et la gloire ╵de ta majesté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour moi, je méditerai ╵le récit de tes prodiges.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle parle ╵de ta force redoutable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, je proclamerai ╵tes hauts faits.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle évoque ╵ta grande bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’elle chante ta justice !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est plein de grâce ╵et de compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lent à la colère ╵et riche en amour.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est bon ╵envers tous les hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plein de compassion ╵pour toutes ses créatures.
