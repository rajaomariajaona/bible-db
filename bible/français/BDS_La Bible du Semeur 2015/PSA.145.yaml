document_id: PSA.145
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ton règne est éternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '145 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce psaume est alphabétique (cf. note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9.1'
        metadata:
          usfm: PSA.9.1
      - type: text
        text: ).
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant de louange. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’exalterai, ╵ô mon Dieu, mon Roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te bénirai ╵jusque dans l’éternité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tous les jours, ╵je te bénirai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te louerai ╵jusque dans l’éternité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Eternel est grand ╵et très digne de louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa grandeur est insondable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que chaque génération ╵dise à celle qui la suit ╵combien tes œuvres sont belles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle publie tes exploits,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: l’éclat et la gloire ╵de ta majesté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour moi, je méditerai ╵le récit de tes prodiges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qu’elle parle ╵de ta force redoutable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et moi, je proclamerai ╵tes hauts faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qu’elle évoque ╵ta grande bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle chante ta justice !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel est plein de grâce ╵et de compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lent à la colère ╵et riche en amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Eternel est bon ╵envers tous les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plein de compassion ╵pour toutes ses créatures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que toutes tes œuvres ╵te louent, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils te bénissent, ╵ceux qui te sont attachés !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils diront la gloire ╵de ton règne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et proclameront ta force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils feront connaître aux hommes ╵tes exploits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la gloire et la splendeur de ton règne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ton règne s’étend sur tous les temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta seigneurie ╵dure d’âge en âge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel est fiable ╵en tout ce qu’il dit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est plein d’amour ╵dans tout ce qu’il fait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '145.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La seconde phrase du verset est absente de la plupart des manuscrits du texte hébreu traditionnel, mais elle se trouve dans un manuscrit de ce texte, dans le texte hébreu trouvé à Qumrân, dans l’ancienne version grecque et dans la version syriaque. De plus, cette phrase est nécessaire pour que le psaume puisse être pleinement alphabétique.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Eternel est le soutien ╵de tous ceux qui tombent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il relève ╵tous ceux qui fléchissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les regards de tous ╵sont tournés vers toi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui leur donnes ╵à chacun sa nourriture ╵le moment venu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu ouvres ta main
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu combles les désirs ╵de tout ce qui vit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '145.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 104.27-28
        metadata:
          usfm: PSA.104.27+PSA.104.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Eternel est juste ╵en tout ce qu’il fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est plein d’amour ╵en toutes ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Eternel est proche ╵de ceux qui l’invoquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tous ceux qui l’invoquent avec sincérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il accomplit les désirs ╵de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il entend leur cri ╵et il les délivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’Eternel garde tous ceux qui l’aiment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il détruira tous les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je dirai les louanges de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute créature ╵le bénira éternellement ╵pour sa sainteté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusque dans l’éternité.
