document_id: DEU.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sanctions
  - type: heading
    content: Les bénédictions
  - type: text
    content: Si vous écoutez attentivement la parole de l’Eternel votre Dieu et si vous obéissez à tous les commandements que je vous donne aujourd’hui, si vous les appliquez, alors l’Eternel votre Dieu vous donnera une place prépondérante au-dessus de tous les autres peuples de la terre
  - type: note
    content: Pour les v. 1-14, voir 11.13-17.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Tous les peuples de la terre verront alors que l’Eternel est invoqué en votre faveur et ils vous craindront. '
  '11':
  - type: text
    content: 'L’Eternel vous comblera de biens dans le pays qu’il a promis par serment à vos ancêtres de vous donner, il vous accordera de nombreux enfants, multipliera vos troupeaux et vous donnera des récoltes abondantes. '
  '12':
  - type: text
    content: 'L’Eternel ouvrira pour vous son bon trésor céleste pour donner en temps voulu la pluie nécessaire aux terres et pour bénir tout travail que vous accomplirez. Vous prêterez à de nombreux peuples et vous n’aurez vous-mêmes pas besoin d’emprunter. '
  '13':
  - type: text
    content: 'L’Eternel vous fera tenir le premier rang parmi les peuples, jamais le dernier. Vous occuperez toujours la position la plus haute, et non une position inférieure, à condition que vous écoutiez les commandements de l’Eternel votre Dieu, que je vous prescris aujourd’hui, pour y obéir et les appliquer, '
  '14':
  - type: text
    content: sans vous écarter ni dans un sens ni dans l’autre de tout ce que je vous ordonne aujourd’hui, pour vous attacher à d’autres dieux et leur rendre un culte.
  - type: heading
    content: Les malédictions
  '15':
  - type: text
    content: 'Par contre, si vous n’obéissez pas à l’Eternel votre Dieu, si vous ne veillez pas à appliquer tous ses commandements et ses lois que je vous transmets moi-même aujourd’hui, voici quelles malédictions fondront sur vous :'
  '16':
  - type: text
    content: 'Vous serez maudits à la ville comme aux champs. '
  '17':
  - type: text
    content: 'La malédiction reposera sur votre corbeille à fruits et sur votre pétrin. '
  '18':
  - type: text
    content: 'Dieu maudira vos enfants et vos récoltes, et les portées de vos troupeaux de gros et de petit bétail. '
  '19':
  - type: text
    content: Maudits serez-vous dans vos allées et venues, au départ comme à l’arrivée.
  '2':
  - type: text
    content: Si vous obéissez à l’Eternel votre Dieu, voici toutes les bénédictions dont Dieu vous comblera.
  '20':
  - type: text
    content: L’Eternel déchaînera contre vous la misère, le désordre et la ruine dans tout ce que vous entreprendrez et que vous exécuterez, jusqu’à ce que vous soyez complètement détruits, et vous ne tarderez pas à disparaître, parce que vous m’aurez abandonné et que vous aurez commis de mauvaises actions.
  '21':
  - type: text
    content: 'L’Eternel vous enverra une épidémie de peste qui finira par vous éliminer du pays dans lequel vous allez entrer pour en prendre possession. '
  '22':
  - type: text
    content: 'Il vous frappera de maladies qui vous feront dépérir : des fièvres et des inflammations de toute nature. Il frappera aussi vos champs par la sécheresse'
  - type: note
    content: 'D’après la Vulgate. Texte hébreu traditionnel : par la guerre.'
  - type: text
    content: ', la rouille et le charbon. Tous ces fléaux vous poursuivront jusqu’à ce que vous disparaissiez. '
  '23':
  - type: text
    content: 'Le ciel au-dessus de vos têtes sera aussi dur que du bronze, et la terre sous vos pieds sera comme du fer. '
  '24':
  - type: text
    content: Au lieu de pluie, l’Eternel enverra sur votre pays de la poussière et du sable qui tomberont du ciel sur vous jusqu’à ce que vous soyez exterminés
  - type: note
    content: Les vents entraînent la poussière et le sable d’un pays vers un autre et recouvrent ce dernier d’une couche qui peut lui ôter sa fertilité.
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Il vous mettra en déroute devant vos ennemis ; si vous marchez contre eux par un seul chemin, vous fuirez devant eux en débandade en tous sens. En voyant ce qui vous arrivera, tous les royaumes de la terre seront terrifiés. '
  '26':
  - type: text
    content: Vos cadavres serviront de pâture aux rapaces et aux fauves que personne ne viendra déranger.
  '27':
  - type: text
    content: L’Eternel vous affligera d’ulcères, comme les Egyptiens, d’hémorroïdes, de gale et de pustules incurables
  - type: note
    content: Voir Ex 9.8-12.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Il vous frappera de folie, d’aveuglement et d’égarement d’esprit, '
  '29':
  - type: text
    content: au point que vous tâtonnerez en plein jour comme des aveugles dans l’obscurité. Aucune de vos entreprises ne réussira ; tous les jours vous serez exploités et dépouillés sans personne pour vous délivrer.
  '3':
  - type: text
    content: 'Vous jouirez de ces bénédictions à la ville comme aux champs. '
  '30':
  - type: text
    content: 'Si un homme se fiance, un autre homme épousera sa fiancée ; si quelqu’un bâtit une maison, il ne s’y installera pas ; s’il plante une vigne, il n’en recueillera pas les fruits. '
  '31':
  - type: text
    content: 'Vos bœufs seront abattus sous vos yeux, et vous n’en mangerez pas la viande. Vos ânes seront volés devant vous et ne vous seront jamais restitués ; vos moutons et vos chèvres tomberont entre les mains de vos ennemis et personne ne viendra à votre secours. '
  '32':
  - type: text
    content: 'Vos fils et vos filles seront livrés à un peuple étranger ; vos yeux s’épuiseront à force de guetter leur retour, jour après jour, mais vous n’y pourrez rien. '
  '33':
  - type: text
    content: 'Un peuple que vous ne connaissez pas mangera les produits de votre terre et tout le produit de votre travail ; vous serez continuellement exploités et maltraités. '
  '34':
  - type: text
    content: A force de voir ce qui se présentera sous vos yeux, vous en perdrez la raison.
  '35':
  - type: text
    content: L’Eternel vous frappera d’ulcères malins incurables aux genoux et aux cuisses qui vous gagneront tout le corps, de la plante des pieds au sommet de la tête
  - type: note
    content: Voir Ex 9.11.
  - type: text
    content: .
  '36':
  - type: text
    content: L’Eternel vous exilera – avec le roi que vous aurez établi sur vous – chez un peuple que ni vous, ni vos ancêtres n’auront connu ; et là, vous serez asservis à d’autres dieux qui ne sont que du bois et de la pierre
  - type: note
    content: Voir Dt 4.27-28 ; 2 R 17.4-6 ; 25.11.
  - type: text
    content: '. '
  '37':
  - type: text
    content: Tous les peuples chez lesquels l’Eternel vous aura menés seront abasourdis de votre sort, vous serez le sujet de leurs moqueries et ils vous tourneront en dérision.
  '38':
  - type: text
    content: 'Vous sèmerez beaucoup de grains dans vos champs, mais vous ferez de maigres récoltes, car les sauterelles auront tout dévasté. '
  '39':
  - type: text
    content: 'Vous planterez des vignes et vous y travaillerez, mais vous n’en boirez pas le vin, et vous n’aurez rien à y récolter, car les chenilles auront tout dévoré. '
  '4':
  - type: text
    content: 'Il vous bénira en vous donnant de nombreux enfants et d’abondantes récoltes, en multipliant le nombre de vos bœufs, de vos moutons et de vos chèvres. '
  '40':
  - type: text
    content: 'Vous posséderez des oliviers sur tout votre territoire, mais vous n’en récolterez même pas assez d’huile pour enduire votre corps, car vos olives seront tombées avant d’être mûres. '
  '41':
  - type: text
    content: 'Vous donnerez naissance à des fils et des filles, mais vous ne les garderez pas avec vous, car ils s’en iront en captivité. '
  '42':
  - type: text
    content: Les criquets dévasteront tous vos arbres et mangeront les produits de vos terres.
  '43':
  - type: text
    content: 'Les immigrés qui vivront parmi vous parviendront de plus en plus à une position au-dessus de la vôtre, tandis que vous déclinerez de plus en plus. '
  '44':
  - type: text
    content: Ce sont eux qui vous prêteront, alors que vous, vous n’aurez plus rien à leur prêter ; ils seront au premier rang, et vous au dernier.
  '45':
  - type: text
    content: 'Toutes ces malédictions fondront sur vous, vous poursuivront et vous atteindront, jusqu’à ce que vous soyez exterminés, parce que vous n’aurez pas obéi à l’Eternel votre Dieu, en observant les commandements et les lois qu’il vous a donnés. '
  '46':
  - type: text
    content: Ils seront pour vous et vos descendants un signe d’avertissement à jamais.
  '47':
  - type: text
    content: 'Si vous ne servez pas l’Eternel votre Dieu avec la joie et le bonheur au cœur au sein de l’abondance en toutes choses, '
  '48':
  - type: text
    content: 'vous serez asservis aux ennemis que l’Eternel enverra contre vous. Vous aurez faim et soif, vous manquerez de vêtements et vous serez privés de tout. L’Eternel placera un joug de fer sur vos épaules jusqu’à ce qu’il vous ait détruits. '
  '49':
  - type: text
    content: 'Il lancera contre vous, depuis les confins du monde, un peuple lointain dont vous ne comprendrez pas la langue, il fondra sur vous comme un aigle sur sa proie. '
  '5':
  - type: text
    content: 'Il vous bénira en remplissant votre corbeille et votre pétrin. '
  '50':
  - type: text
    content: 'Ce sera un peuple d’hommes au visage dur, sans respect pour le vieillard ni pitié pour les enfants. '
  '51':
  - type: text
    content: Ils dévoreront votre bétail et les produits de votre sol jusqu’à ce que vous soyez exterminés. Vous mourrez de faim, car ils ne vous laisseront ni blé, ni vin, ni huile, ni veaux, ni agneaux, ni chevreaux jusqu’à ce qu’ils vous aient fait périr.
  '52':
  - type: text
    content: 'Ils assiégeront vos villes jusqu’à ce que s’écroulent dans tout votre territoire les hautes murailles fortifiées dans lesquelles vous aurez mis votre confiance. Ils assiégeront toutes les villes du pays que l’Eternel votre Dieu vous donne. '
  '53':
  - type: text
    content: Pendant le siège, vos ennemis vous réduiront à une telle détresse que vous en viendrez à manger vos propres enfants ; oui, vous dévorerez la chair des fils et des filles que l’Eternel votre Dieu vous aura donnés
  - type: note
    content: Voir 2 R 6.24-29 ; 18.27 ; Jr 19.9 ; Lm 2.20.
  - type: text
    content: '. '
  '54':
  - type: text
    content: 'L’homme le plus délicat et le plus raffiné parmi vous regardera avec malveillance son frère, sa femme qu’il aura serrée contre son cœur et les enfants qui lui resteront encore '
  '55':
  - type: text
    content: 'de peur d’avoir à partager avec eux la chair de ses enfants, seule nourriture dont il disposera encore, dans la détresse à laquelle vos ennemis vous auront réduits en assiégeant toutes vos villes. '
  '56':
  - type: text
    content: 'La femme la plus délicate et la plus raffinée parmi vous, celle qui était si délicate et si raffinée qu’elle ne se risquait même pas à poser la plante du pied sur le sol, regardera avec malveillance le mari qu’elle a serré contre son cœur, son fils et sa fille, '
  '57':
  - type: text
    content: car elle voudra manger toute seule, en cachette, le bébé qu’elle vient de mettre au monde, et son placenta dont elle sera juste délivrée, à cause de la détresse à laquelle vous auront réduits vos ennemis en assiégeant toutes vos villes
  - type: note
    content: Voir 2 R 6.28-29 ; Lm 4.10.
  - type: text
    content: .
  '58':
  - type: text
    content: 'Si vous ne veillez pas avec soin à appliquer toutes les paroles de cette Loi consignées dans ce livre, pour craindre celui qui est glorieux et redoutable, c’est-à-dire l’Eternel votre Dieu, '
  '59':
  - type: text
    content: 'alors l’Eternel interviendra de façon prodigieuse pour vous frapper, vous et vos descendants, de plaies intenses et tenaces, il vous infligera des maladies graves et persistantes. '
  '6':
  - type: text
    content: Il vous bénira lors de vos allées et venues, au départ comme à l’arrivée.
  '60':
  - type: text
    content: Il déchaînera contre vous toutes ces plaies d’Egypte que vous avez redoutées, et elles s’attacheront à vous
  - type: note
    content: 'Celles que les Egyptiens eurent à subir : voir 7.15 ; Ex 9.1-12 ; 15.26.'
  - type: text
    content: '. '
  '61':
  - type: text
    content: 'De plus, il vous enverra toutes sortes de maladies et de fléaux qui ne sont pas mentionnés dans ce livre de la Loi, jusqu’à ce que vous soyez exterminés. '
  '62':
  - type: text
    content: 'Après avoir été aussi nombreux que les étoiles du ciel, vous ne serez plus qu’une poignée d’hommes, parce que vous n’aurez pas obéi à l’Eternel votre Dieu. '
  '63':
  - type: text
    content: 'Il arrivera donc qu’autant l’Eternel s’était plu à vous combler et à vous multiplier, autant il prendra plaisir à vous faire périr et disparaître. Ainsi vous serez arrachés du pays où vous allez entrer pour en prendre possession, '
  '64':
  - type: text
    content: 'et l’Eternel vous dispersera parmi tous les peuples d’un bout de la terre à l’autre. Là, vous serez asservis à d’autres dieux que ni vous, ni vos ancêtres n’aurez connus, des dieux de bois et de pierre. '
  '65':
  - type: text
    content: 'Même au milieu de ces peuples étrangers, vous ne trouverez ni tranquillité ni lieu où vous installer pour mener une existence paisible. L’Eternel vous donnera là un cœur inquiet et des yeux éteints, le découragement vous rongera, '
  '66':
  - type: text
    content: 'votre avenir sera très incertain, vous connaîtrez nuit et jour la peur, vous n’aurez aucune assurance pour votre vie. '
  '67':
  - type: text
    content: 'La terreur envahira votre cœur à cause de tout ce que vous aurez constamment sous les yeux, de sorte que le matin vous direz : « Si seulement c’était le soir ! » Et le soir : « Quand donc viendra le matin ? » '
  '68':
  - type: text
    content: L’Eternel vous fera reprendre le chemin de l’Egypte sur des bateaux, alors qu’il vous avait dit
  - type: note
    content: 'Autre traduction : que je vous avais dit.'
  - type: text
    content: ' que vous ne la reverriez plus jamais. Là, vous vous offrirez vous-mêmes comme esclaves à vos ennemis, mais personne ne voudra vous acheter.'
  - type: heading
    content: La vie sous l’alliance
  - type: heading
    content: Introduction
  '69':
  - type: text
    content: Voici les paroles de l’alliance que l’Eternel ordonna à Moïse de conclure avec les Israélites dans le pays de Moab, en plus de l’alliance qu’il avait conclue avec eux au mont Horeb
  - type: note
    content: Voir Ex 24.3-8.
  - type: text
    content: .
  '7':
  - type: text
    content: 'L’Eternel mettra en déroute les ennemis qui vous attaqueront ; s’ils marchent contre vous par un seul chemin, ils s’enfuiront en débandade en tous sens. '
  '8':
  - type: text
    content: L’Eternel vous bénira en remplissant vos greniers et en faisant réussir tout ce que vous entreprendrez. Oui, l’Eternel votre Dieu vous bénira dans le pays qu’il vous donnera.
  '9':
  - type: text
    content: 'Si vous obéissez aux commandements de l’Eternel votre Dieu et si vous suivez les chemins qu’il vous a prescrits, il fera de vous un peuple saint pour lui, comme il l’a promis par serment. '
