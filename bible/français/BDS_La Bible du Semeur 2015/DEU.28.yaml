document_id: DEU.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sanctions
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les bénédictions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Si vous écoutez attentivement la parole de l’Eternel votre Dieu et si vous obéissez à tous les commandements que je vous donne aujourd’hui, si vous les appliquez, alors l’Eternel votre Dieu vous donnera une place prépondérante au-dessus de tous les autres peuples de la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-14, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 11.13-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tous les peuples de la terre verront alors que l’Eternel est invoqué en votre faveur et ils vous craindront. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Eternel vous comblera de biens dans le pays qu’il a promis par serment à vos ancêtres de vous donner, il vous accordera de nombreux enfants, multipliera vos troupeaux et vous donnera des récoltes abondantes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Eternel ouvrira pour vous son bon trésor céleste pour donner en temps voulu la pluie nécessaire aux terres et pour bénir tout travail que vous accomplirez. Vous prêterez à de nombreux peuples et vous n’aurez vous-mêmes pas besoin d’emprunter. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’Eternel vous fera tenir le premier rang parmi les peuples, jamais le dernier. Vous occuperez toujours la position la plus haute, et non une position inférieure, à condition que vous écoutiez les commandements de l’Eternel votre Dieu, que je vous prescris aujourd’hui, pour y obéir et les appliquer, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: sans vous écarter ni dans un sens ni dans l’autre de tout ce que je vous ordonne aujourd’hui, pour vous attacher à d’autres dieux et leur rendre un culte.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les malédictions
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Par contre, si vous n’obéissez pas à l’Eternel votre Dieu, si vous ne veillez pas à appliquer tous ses commandements et ses lois que je vous transmets moi-même aujourd’hui, voici quelles malédictions fondront sur vous :'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vous serez maudits à la ville comme aux champs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La malédiction reposera sur votre corbeille à fruits et sur votre pétrin. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dieu maudira vos enfants et vos récoltes, et les portées de vos troupeaux de gros et de petit bétail. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Maudits serez-vous dans vos allées et venues, au départ comme à l’arrivée.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si vous obéissez à l’Eternel votre Dieu, voici toutes les bénédictions dont Dieu vous comblera.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: L’Eternel déchaînera contre vous la misère, le désordre et la ruine dans tout ce que vous entreprendrez et que vous exécuterez, jusqu’à ce que vous soyez complètement détruits, et vous ne tarderez pas à disparaître, parce que vous m’aurez abandonné et que vous aurez commis de mauvaises actions.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L’Eternel vous enverra une épidémie de peste qui finira par vous éliminer du pays dans lequel vous allez entrer pour en prendre possession. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il vous frappera de maladies qui vous feront dépérir : des fièvres et des inflammations de toute nature. Il frappera aussi vos champs par la sécheresse'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après la Vulgate. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par la guerre.
      marker-yv: yv-n
    - type: text
      text: ', la rouille et le charbon. Tous ces fléaux vous poursuivront jusqu’à ce que vous disparaissiez. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le ciel au-dessus de vos têtes sera aussi dur que du bronze, et la terre sous vos pieds sera comme du fer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Au lieu de pluie, l’Eternel enverra sur votre pays de la poussière et du sable qui tomberont du ciel sur vous jusqu’à ce que vous soyez exterminés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les vents entraînent la poussière et le sable d’un pays vers un autre et recouvrent ce dernier d’une couche qui peut lui ôter sa fertilité.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il vous mettra en déroute devant vos ennemis ; si vous marchez contre eux par un seul chemin, vous fuirez devant eux en débandade en tous sens. En voyant ce qui vous arrivera, tous les royaumes de la terre seront terrifiés. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vos cadavres serviront de pâture aux rapaces et aux fauves que personne ne viendra déranger.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: L’Eternel vous affligera d’ulcères, comme les Egyptiens, d’hémorroïdes, de gale et de pustules incurables
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 9.8-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il vous frappera de folie, d’aveuglement et d’égarement d’esprit, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: au point que vous tâtonnerez en plein jour comme des aveugles dans l’obscurité. Aucune de vos entreprises ne réussira ; tous les jours vous serez exploités et dépouillés sans personne pour vous délivrer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vous jouirez de ces bénédictions à la ville comme aux champs. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Si un homme se fiance, un autre homme épousera sa fiancée ; si quelqu’un bâtit une maison, il ne s’y installera pas ; s’il plante une vigne, il n’en recueillera pas les fruits. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Vos bœufs seront abattus sous vos yeux, et vous n’en mangerez pas la viande. Vos ânes seront volés devant vous et ne vous seront jamais restitués ; vos moutons et vos chèvres tomberont entre les mains de vos ennemis et personne ne viendra à votre secours. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vos fils et vos filles seront livrés à un peuple étranger ; vos yeux s’épuiseront à force de guetter leur retour, jour après jour, mais vous n’y pourrez rien. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Un peuple que vous ne connaissez pas mangera les produits de votre terre et tout le produit de votre travail ; vous serez continuellement exploités et maltraités. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: A force de voir ce qui se présentera sous vos yeux, vous en perdrez la raison.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: L’Eternel vous frappera d’ulcères malins incurables aux genoux et aux cuisses qui vous gagneront tout le corps, de la plante des pieds au sommet de la tête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 9.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: L’Eternel vous exilera – avec le roi que vous aurez établi sur vous – chez un peuple que ni vous, ni vos ancêtres n’auront connu ; et là, vous serez asservis à d’autres dieux qui ne sont que du bois et de la pierre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 4.27-28 ; 2 R 17.4-6 ; 25.11.
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tous les peuples chez lesquels l’Eternel vous aura menés seront abasourdis de votre sort, vous serez le sujet de leurs moqueries et ils vous tourneront en dérision.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Vous sèmerez beaucoup de grains dans vos champs, mais vous ferez de maigres récoltes, car les sauterelles auront tout dévasté. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Vous planterez des vignes et vous y travaillerez, mais vous n’en boirez pas le vin, et vous n’aurez rien à y récolter, car les chenilles auront tout dévoré. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il vous bénira en vous donnant de nombreux enfants et d’abondantes récoltes, en multipliant le nombre de vos bœufs, de vos moutons et de vos chèvres. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Vous posséderez des oliviers sur tout votre territoire, mais vous n’en récolterez même pas assez d’huile pour enduire votre corps, car vos olives seront tombées avant d’être mûres. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Vous donnerez naissance à des fils et des filles, mais vous ne les garderez pas avec vous, car ils s’en iront en captivité. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Les criquets dévasteront tous vos arbres et mangeront les produits de vos terres.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Les immigrés qui vivront parmi vous parviendront de plus en plus à une position au-dessus de la vôtre, tandis que vous déclinerez de plus en plus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Ce sont eux qui vous prêteront, alors que vous, vous n’aurez plus rien à leur prêter ; ils seront au premier rang, et vous au dernier.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Toutes ces malédictions fondront sur vous, vous poursuivront et vous atteindront, jusqu’à ce que vous soyez exterminés, parce que vous n’aurez pas obéi à l’Eternel votre Dieu, en observant les commandements et les lois qu’il vous a donnés. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Ils seront pour vous et vos descendants un signe d’avertissement à jamais.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Si vous ne servez pas l’Eternel votre Dieu avec la joie et le bonheur au cœur au sein de l’abondance en toutes choses, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'vous serez asservis aux ennemis que l’Eternel enverra contre vous. Vous aurez faim et soif, vous manquerez de vêtements et vous serez privés de tout. L’Eternel placera un joug de fer sur vos épaules jusqu’à ce qu’il vous ait détruits. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Il lancera contre vous, depuis les confins du monde, un peuple lointain dont vous ne comprendrez pas la langue, il fondra sur vous comme un aigle sur sa proie. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il vous bénira en remplissant votre corbeille et votre pétrin. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ce sera un peuple d’hommes au visage dur, sans respect pour le vieillard ni pitié pour les enfants. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Ils dévoreront votre bétail et les produits de votre sol jusqu’à ce que vous soyez exterminés. Vous mourrez de faim, car ils ne vous laisseront ni blé, ni vin, ni huile, ni veaux, ni agneaux, ni chevreaux jusqu’à ce qu’ils vous aient fait périr.
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Ils assiégeront vos villes jusqu’à ce que s’écroulent dans tout votre territoire les hautes murailles fortifiées dans lesquelles vous aurez mis votre confiance. Ils assiégeront toutes les villes du pays que l’Eternel votre Dieu vous donne. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Pendant le siège, vos ennemis vous réduiront à une telle détresse que vous en viendrez à manger vos propres enfants ; oui, vous dévorerez la chair des fils et des filles que l’Eternel votre Dieu vous aura donnés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 6.24-29 ; 18.27 ; Jr 19.9 ; Lm 2.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'L’homme le plus délicat et le plus raffiné parmi vous regardera avec malveillance son frère, sa femme qu’il aura serrée contre son cœur et les enfants qui lui resteront encore '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'de peur d’avoir à partager avec eux la chair de ses enfants, seule nourriture dont il disposera encore, dans la détresse à laquelle vos ennemis vous auront réduits en assiégeant toutes vos villes. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'La femme la plus délicate et la plus raffinée parmi vous, celle qui était si délicate et si raffinée qu’elle ne se risquait même pas à poser la plante du pied sur le sol, regardera avec malveillance le mari qu’elle a serré contre son cœur, son fils et sa fille, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: car elle voudra manger toute seule, en cachette, le bébé qu’elle vient de mettre au monde, et son placenta dont elle sera juste délivrée, à cause de la détresse à laquelle vous auront réduits vos ennemis en assiégeant toutes vos villes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.57 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 6.28-29 ; Lm 4.10.
      marker-yv: yv-n
    - type: text
      text: .
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Si vous ne veillez pas avec soin à appliquer toutes les paroles de cette Loi consignées dans ce livre, pour craindre celui qui est glorieux et redoutable, c’est-à-dire l’Eternel votre Dieu, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'alors l’Eternel interviendra de façon prodigieuse pour vous frapper, vous et vos descendants, de plaies intenses et tenaces, il vous infligera des maladies graves et persistantes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il vous bénira lors de vos allées et venues, au départ comme à l’arrivée.
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Il déchaînera contre vous toutes ces plaies d’Egypte que vous avez redoutées, et elles s’attacheront à vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.60 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Celles que les Egyptiens eurent à subir : voir 7.15 ; Ex 9.1-12 ; 15.26.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'De plus, il vous enverra toutes sortes de maladies et de fléaux qui ne sont pas mentionnés dans ce livre de la Loi, jusqu’à ce que vous soyez exterminés. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Après avoir été aussi nombreux que les étoiles du ciel, vous ne serez plus qu’une poignée d’hommes, parce que vous n’aurez pas obéi à l’Eternel votre Dieu. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Il arrivera donc qu’autant l’Eternel s’était plu à vous combler et à vous multiplier, autant il prendra plaisir à vous faire périr et disparaître. Ainsi vous serez arrachés du pays où vous allez entrer pour en prendre possession, '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'et l’Eternel vous dispersera parmi tous les peuples d’un bout de la terre à l’autre. Là, vous serez asservis à d’autres dieux que ni vous, ni vos ancêtres n’aurez connus, des dieux de bois et de pierre. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Même au milieu de ces peuples étrangers, vous ne trouverez ni tranquillité ni lieu où vous installer pour mener une existence paisible. L’Eternel vous donnera là un cœur inquiet et des yeux éteints, le découragement vous rongera, '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'votre avenir sera très incertain, vous connaîtrez nuit et jour la peur, vous n’aurez aucune assurance pour votre vie. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'La terreur envahira votre cœur à cause de tout ce que vous aurez constamment sous les yeux, de sorte que le matin vous direz : « Si seulement c’était le soir ! » Et le soir : « Quand donc viendra le matin ? » '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: L’Eternel vous fera reprendre le chemin de l’Egypte sur des bateaux, alors qu’il vous avait dit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.68 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je vous avais dit.
      marker-yv: yv-n
    - type: text
      text: ' que vous ne la reverriez plus jamais. Là, vous vous offrirez vous-mêmes comme esclaves à vos ennemis, mais personne ne voudra vous acheter.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie sous l’alliance
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: Voici les paroles de l’alliance que l’Eternel ordonna à Moïse de conclure avec les Israélites dans le pays de Moab, en plus de l’alliance qu’il avait conclue avec eux au mont Horeb
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.69 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 24.3-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L’Eternel mettra en déroute les ennemis qui vous attaqueront ; s’ils marchent contre vous par un seul chemin, ils s’enfuiront en débandade en tous sens. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’Eternel vous bénira en remplissant vos greniers et en faisant réussir tout ce que vous entreprendrez. Oui, l’Eternel votre Dieu vous bénira dans le pays qu’il vous donnera.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Si vous obéissez aux commandements de l’Eternel votre Dieu et si vous suivez les chemins qu’il vous a prescrits, il fera de vous un peuple saint pour lui, comme il l’a promis par serment. '
