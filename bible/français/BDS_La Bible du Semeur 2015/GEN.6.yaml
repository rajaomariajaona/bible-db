document_id: GEN.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La corruption de l’humanité
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quand les hommes commencèrent à se multiplier sur la terre et qu’ils eurent des filles, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il eut trois fils : Sem, Cham et Japhet.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu veut sauver Noé
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aux yeux de Dieu, les hommes s’étaient corrompus et avaient rempli la terre d’actes de violence. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dieu observait ce qui se passait sur la terre, il vit que le monde était corrompu, car toute l’humanité suivait la voie du mal.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Dieu dit à Noé : C’est décidé ! Je vais mettre fin à l’existence de toutes les créatures car, à cause des hommes, la terre est remplie d’actes de violence. Je vais détruire la terre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais toi, construis un bateau en bois résineux. Tu en diviseras l’intérieur en compartiments, et tu l’enduiras intérieurement et extérieurement de goudron. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici comment tu le feras : tu lui donneras cent cinquante mètres de longueur, vingt-cinq mètres de largeur et quinze mètres de hauteur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 300 coudées de long, 50 coudées de large et 30 coudées de haut.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A cinquante centimètres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une coudée.
      marker-yv: yv-n
    - type: text
      text: ' du haut, tu ménageras un jour. Tu mettras la porte du bateau sur le côté. A l’intérieur, tu disposeras un étage inférieur, un premier et un second étage. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moi, je vais faire venir le déluge des eaux sur la terre pour détruire, sous le ciel, tout être animé de vie. Tout ce qui est sur la terre périra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mais j’établirai mon alliance avec toi et tu entreras dans le bateau, toi, tes fils, ta femme et tes belles-filles avec toi.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu feras aussi entrer dans le bateau un couple de tous les êtres vivants, c’est-à-dire un mâle et une femelle de tous les animaux, pour qu’ils restent en vie avec toi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: les fils de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Soit des descendants de Seth opposés à ceux de Caïn, soit des anges déchus, des démons, qui auraient agi par le moyen d’êtres humains (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jd 6-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' virent que les filles des hommes étaient belles, et ils prirent pour femmes celles qu’ils choisirent parmi elles. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'De chaque espèce d’oiseaux, de quadrupèdes et d’animaux qui se meuvent à ras de terre, un couple viendra vers toi pour pouvoir rester en vie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Procure-toi aussi toutes sortes d’aliments et fais-en provision pour vous en nourrir, toi et eux.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Noé obéit, il fit tout comme Dieu le lui avait ordonné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 11.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors l’Eternel dit : Mon Esprit ne va pas lutter indéfiniment avec les hommes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: animer indéfiniment les hommes.
      marker-yv: yv-n
    - type: text
      text: ', à cause de leurs fautes. Ce ne sont que des créatures terrestres. Je ne leur donne plus que cent vingt ans à vivre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A cette époque-là, il y avait des géants sur la terre, et aussi après que les fils de Dieu se furent unis aux filles des hommes et qu’elles leur eurent donné des enfants. Ce sont ces héros si fameux d’autrefois.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Eternel vit que les hommes faisaient de plus en plus de mal sur la terre : à longueur de journée, leur cœur ne concevait que le mal. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Alors l’Eternel eut des regrets au sujet de l’homme qu’il avait fait sur la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre trad. : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'renonça à l’homme qu’il avait fait sur la terre. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: regretta d’avoir fait l’homme sur la terre.
      marker-yv: yv-n
    - type: text
      text: ', il en eut le cœur affligé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il dit alors : Je supprimerai de la surface de la terre les hommes que j’ai créés. Non seulement les hommes, mais jusqu’aux animaux, jusqu’aux bêtes qui se meuvent à ras de terre et jusqu’aux oiseaux du ciel, car je regrette de les avoir faits. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais Noé obtint la faveur de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 24.37 ; Lc 17.26 ; 1 P 3.20.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’histoire de la famille de Noé
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noé et ses fils
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Voici l’histoire de la famille de Noé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur Noé et le déluge, voir Mt 24.37-39 ; Lc 17.26-27 ; 1 P 3.20 ; 2 P 2.5 ; 3.6 ; Hé 11.7.
      marker-yv: yv-n
    - type: text
      text: '. Noé était un homme juste et irréprochable au milieu de ses contemporains. Il menait sa vie sous le regard de Dieu. '
