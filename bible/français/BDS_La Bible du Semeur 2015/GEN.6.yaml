document_id: GEN.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La corruption de l’humanité
  - type: text
    content: 'Quand les hommes commencèrent à se multiplier sur la terre et qu’ils eurent des filles, '
  '10':
  - type: text
    content: 'Il eut trois fils : Sem, Cham et Japhet.'
  - type: heading
    content: Dieu veut sauver Noé
  '11':
  - type: text
    content: 'Aux yeux de Dieu, les hommes s’étaient corrompus et avaient rempli la terre d’actes de violence. '
  '12':
  - type: text
    content: Dieu observait ce qui se passait sur la terre, il vit que le monde était corrompu, car toute l’humanité suivait la voie du mal.
  '13':
  - type: text
    content: 'Alors Dieu dit à Noé : C’est décidé ! Je vais mettre fin à l’existence de toutes les créatures car, à cause des hommes, la terre est remplie d’actes de violence. Je vais détruire la terre. '
  '14':
  - type: text
    content: 'Mais toi, construis un bateau en bois résineux. Tu en diviseras l’intérieur en compartiments, et tu l’enduiras intérieurement et extérieurement de goudron. '
  '15':
  - type: text
    content: 'Voici comment tu le feras : tu lui donneras cent cinquante mètres de longueur, vingt-cinq mètres de largeur et quinze mètres de hauteur'
  - type: note
    content: 'L’hébreu a : 300 coudées de long, 50 coudées de large et 30 coudées de haut.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: A cinquante centimètres
  - type: note
    content: C’est-à-dire une coudée.
  - type: text
    content: ' du haut, tu ménageras un jour. Tu mettras la porte du bateau sur le côté. A l’intérieur, tu disposeras un étage inférieur, un premier et un second étage. '
  '17':
  - type: text
    content: 'Moi, je vais faire venir le déluge des eaux sur la terre pour détruire, sous le ciel, tout être animé de vie. Tout ce qui est sur la terre périra. '
  '18':
  - type: text
    content: Mais j’établirai mon alliance avec toi et tu entreras dans le bateau, toi, tes fils, ta femme et tes belles-filles avec toi.
  '19':
  - type: text
    content: 'Tu feras aussi entrer dans le bateau un couple de tous les êtres vivants, c’est-à-dire un mâle et une femelle de tous les animaux, pour qu’ils restent en vie avec toi. '
  '2':
  - type: text
    content: les fils de Dieu
  - type: note
    content: Soit des descendants de Seth opposés à ceux de Caïn, soit des anges déchus, des démons, qui auraient agi par le moyen d’êtres humains (voir Jd 6-7).
  - type: text
    content: ' virent que les filles des hommes étaient belles, et ils prirent pour femmes celles qu’ils choisirent parmi elles. '
  '20':
  - type: text
    content: 'De chaque espèce d’oiseaux, de quadrupèdes et d’animaux qui se meuvent à ras de terre, un couple viendra vers toi pour pouvoir rester en vie. '
  '21':
  - type: text
    content: Procure-toi aussi toutes sortes d’aliments et fais-en provision pour vous en nourrir, toi et eux.
  '22':
  - type: text
    content: Noé obéit, il fit tout comme Dieu le lui avait ordonné
  - type: note
    content: Voir Hé 11.7.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Alors l’Eternel dit : Mon Esprit ne va pas lutter indéfiniment avec les hommes'
  - type: note
    content: 'Autre traduction : animer indéfiniment les hommes.'
  - type: text
    content: ', à cause de leurs fautes. Ce ne sont que des créatures terrestres. Je ne leur donne plus que cent vingt ans à vivre.'
  '4':
  - type: text
    content: A cette époque-là, il y avait des géants sur la terre, et aussi après que les fils de Dieu se furent unis aux filles des hommes et qu’elles leur eurent donné des enfants. Ce sont ces héros si fameux d’autrefois.
  '5':
  - type: text
    content: 'L’Eternel vit que les hommes faisaient de plus en plus de mal sur la terre : à longueur de journée, leur cœur ne concevait que le mal. '
  '6':
  - type: text
    content: Alors l’Eternel eut des regrets au sujet de l’homme qu’il avait fait sur la terre
  - type: note
    content: 'Autre trad. : renonça à l’homme qu’il avait fait sur la terre. D’autres comprennent : regretta d’avoir fait l’homme sur la terre.'
  - type: text
    content: ', il en eut le cœur affligé. '
  '7':
  - type: text
    content: 'Il dit alors : Je supprimerai de la surface de la terre les hommes que j’ai créés. Non seulement les hommes, mais jusqu’aux animaux, jusqu’aux bêtes qui se meuvent à ras de terre et jusqu’aux oiseaux du ciel, car je regrette de les avoir faits. '
  '8':
  - type: text
    content: Mais Noé obtint la faveur de l’Eternel
  - type: note
    content: Voir Mt 24.37 ; Lc 17.26 ; 1 P 3.20.
  - type: text
    content: .
  - type: heading
    content: L’histoire de la famille de Noé
  - type: heading
    content: Noé et ses fils
  '9':
  - type: text
    content: Voici l’histoire de la famille de Noé
  - type: note
    content: Sur Noé et le déluge, voir Mt 24.37-39 ; Lc 17.26-27 ; 1 P 3.20 ; 2 P 2.5 ; 3.6 ; Hé 11.7.
  - type: text
    content: '. Noé était un homme juste et irréprochable au milieu de ses contemporains. Il menait sa vie sous le regard de Dieu. '
