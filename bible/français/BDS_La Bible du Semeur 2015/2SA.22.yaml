document_id: 2SA.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un cantique de David
  - type: text
    content: 'David adressa à l’Eternel les paroles de ce cantique lorsque l’Eternel l’eut délivré de tous ses ennemis, et en particulier de Saül. '
  '10':
  - type: text
    content: Il inclina le ciel ╵et descendit,
  - type: text
    content: un sombre nuage à ses pieds.
  '11':
  - type: text
    content: Il chevauchait un chérubin ╵et il volait,
  - type: text
    content: et il apparaissait ╵sur les ailes du vent.
  '12':
  - type: text
    content: Il s’enveloppait de ténèbres,
  - type: text
    content: des nuages opaques, ╵un amas d’eau ╵formaient sa tente.
  '13':
  - type: text
    content: De l’éclat brillant devant lui
  - type: text
    content: jaillissaient des charbons ardents.
  '14':
  - type: text
    content: L’Eternel tonna dans le ciel,
  - type: text
    content: le Dieu très-haut ╵fit retentir sa voix.
  '15':
  - type: text
    content: Et soudain il tira des flèches
  - type: note
    content: C’est-à-dire les éclairs (Ha 3.11 ; Ps 144.6).
  - type: text
    content: ' ╵pour disperser mes ennemis,'
  - type: text
    content: il lança des éclairs ╵pour les mettre en déroute.
  '16':
  - type: text
    content: A la menace de l’Eternel,
  - type: text
    content: et au souffle tempétueux ╵de sa colère,
  - type: text
    content: le fond des eaux parut,
  - type: text
    content: les fondements du monde ╵se trouvèrent à nu.
  '17':
  - type: text
    content: Du haut du ciel, ╵il étend sa main pour me prendre,
  - type: text
    content: me retirer des grandes eaux.
  '18':
  - type: text
    content: Il me délivre ╵d’un ennemi puissant,
  - type: text
    content: de gens qui me haïssent ╵et sont plus forts que moi.
  '19':
  - type: text
    content: Ils m’affrontaient ╵au jour de mon désastre,
  - type: text
    content: mais l’Eternel ╵a été mon appui.
  '2':
  - type: text
    content: 'Il dit ceci :'
  - type: text
    content: L’Eternel est ma forteresse, ╵mon rocher, mon libérateur.
  '20':
  - type: text
    content: Il m’a retiré du danger, ╵l’a éloigné de moi,
  - type: text
    content: il m’en a délivré ╵à cause de son affection pour moi.
  '21':
  - type: text
    content: L’Eternel a agi ╵en tenant compte ╵de ma conduite juste,
  - type: text
    content: comme mes mains sont pures, ╵il m’a récompensé ;
  '22':
  - type: text
    content: car j’ai suivi ╵les voies qu’il a prescrites,
  - type: text
    content: je n’abandonne pas mon Dieu ╵pour m’adonner au mal.
  '23':
  - type: text
    content: J’ai toujours ses lois sous mes yeux,
  - type: text
    content: je ne fais fi ╵d’aucun de ses commandements.
  '24':
  - type: text
    content: Envers lui, je suis sans reproche,
  - type: text
    content: je me suis gardé du péché.
  '25':
  - type: text
    content: L’Eternel m’a récompensé ╵d’avoir agi avec droiture
  - type: text
    content: et de m’être gardé pur sous ses yeux.
  '26':
  - type: text
    content: Avec ceux qui sont bienveillants, ╵toi, tu te montres bienveillant.
  - type: text
    content: Avec qui est irréprochable, ╵tu es irréprochable.
  '27':
  - type: text
    content: Et avec celui qui est pur, ╵tu es toi-même pur,
  - type: text
    content: et avec celui qui agit ╵de manière tordue, ╵tu empruntes des chemins détournés.
  '28':
  - type: text
    content: Un peuple affligé, tu le sauves,
  - type: text
    content: tu regardes les orgueilleux ╵et puis tu les abaisses.
  '29':
  - type: text
    content: Tu es ma lampe, ô Eternel.
  - type: text
    content: Tu illumines mes ténèbres.
  '3':
  - type: text
    content: Dieu est mon roc solide ╵où je me réfugie.
  - type: text
    content: Il est mon Sauveur tout-puissant, ╵mon rempart et mon bouclier.
  - type: text
    content: Mon asile est en lui.
  - type: text
    content: Toi, mon Sauveur, tu me délivres ╵des hommes violents.
  '30':
  - type: text
    content: Avec toi, je me précipite ╵sur une troupe bien armée
  - type: note
    content: 'Autre traduction : une muraille.'
  - type: text
    content: ','
  - type: text
    content: avec mon Dieu, ╵je franchis des murailles.
  '31':
  - type: text
    content: Parfaites sont les voies ╵que Dieu prescrit,
  - type: text
    content: la parole de l’Eternel ╵est éprouvée.
  - type: text
    content: Ceux qui le prennent pour refuge ╵trouvent en lui un bouclier.
  '32':
  - type: text
    content: Qui est Dieu, sinon l’Eternel ?
  - type: text
    content: Qui est un roc ? C’est notre Dieu !
  '33':
  - type: text
    content: C’est Dieu ma place forte
  - type: note
    content: 'Le texte hébreu de Qumrân, certains manuscrits de l’ancienne version grecque, la version syriaque et la Vulgate ont : qui m’arme de force.'
  - type: text
    content: ','
  - type: text
    content: il me trace un chemin parfait.
  '34':
  - type: text
    content: Grâce à lui, je cours comme une gazelle,
  - type: text
    content: il me fait prendre position ╵sur les hauteurs.
  '35':
  - type: text
    content: C’est lui qui m’entraîne au combat,
  - type: text
    content: et me fait tendre l’arc de bronze.
  '36':
  - type: text
    content: Ta délivrance ╵me sert de bouclier,
  - type: text
    content: en m’exauçant, tu me grandis.
  '37':
  - type: text
    content: Tu m’amènes à marcher ╵sur un chemin bien large,
  - type: text
    content: mes jambes ne fléchissent pas.
  '38':
  - type: text
    content: Je poursuis tous mes ennemis, ╵je les détruis
  - type: text
    content: et je ne reviens pas ╵sans les avoir exterminés.
  '39':
  - type: text
    content: 'Je les achève, je les frappe :'
  - type: text
    content: aucun ne se relève,
  - type: text
    content: ils tombent sous mes pieds.
  '4':
  - type: text
    content: 'Loué soit l’Eternel : ╵quand je l’ai appelé,'
  - type: text
    content: j’ai été délivré ╵de tous mes ennemis.
  '40':
  - type: text
    content: Tu me rends fort pour le combat,
  - type: text
    content: 'tu fais plier mes agresseurs : ╵les voilà à mes pieds.'
  '41':
  - type: text
    content: Tu mets mes ennemis en fuite,
  - type: text
    content: et ceux qui me haïssent, ╵je les anéantis.
  '42':
  - type: text
    content: Ils ont beau crier au secours, ╵personne ne vient à leur aide,
  - type: text
    content: et s’ils appellent l’Eternel, ╵celui-ci ne leur répond pas.
  '43':
  - type: text
    content: Je les broie comme la poussière de la terre,
  - type: text
    content: je les piétine, je les foule ╵comme la boue des rues.
  '44':
  - type: text
    content: En face d’un peuple en révolte, ╵tu me fais triompher.
  - type: text
    content: Tu me maintiens chef d’autres peuples.
  - type: text
    content: Un peuple qu’autrefois ╵je ne connaissais pas ╵m’est maintenant soumis.
  '45':
  - type: text
    content: Oui, des étrangers me courtisent,
  - type: text
    content: au premier mot, ils m’obéissent.
  '46':
  - type: text
    content: Les étrangers perdent courage,
  - type: text
    content: tremblants
  - type: note
    content: 'D’après quelques manuscrits hébreux, certains manuscrits de l’ancienne version grecque et la Vulgate (voir Ps 18.45). Le texte hébreu traditionnel porte : ils s’arment.'
  - type: text
    content: ', ils quittent leurs bastions.'
  '47':
  - type: text
    content: Dieu est vivant ! Qu’il soit béni, ╵lui qui est mon rocher !
  - type: text
    content: Que l’on proclame la grandeur ╵de Dieu, le rocher qui me sauve.
  '48':
  - type: text
    content: Ce Dieu m’accorde ma revanche,
  - type: text
    content: il abaisse sous moi des peuples.
  '49':
  - type: text
    content: Lui, il me fait échapper à mes ennemis.
  - type: text
    content: Oui, tu me fais triompher d’eux,
  - type: text
    content: tu me délivres ╵des hommes violents.
  '5':
  - type: text
    content: La mort m’enserrait de ses flots,
  - type: text
    content: et, comme un torrent destructeur, ╵me terrifiait.
  '50':
  - type: text
    content: Aussi je publie tes louanges, ╵ô Eternel, parmi les peuples,
  - type: text
    content: je te célèbre par mes chants
  - type: note
    content: Cité en Rm 15.9.
  - type: text
    content: .
  '51':
  - type: text
    content: Pour son roi, l’Eternel opère ╵de grandes délivrances.
  - type: text
    content: Il traite avec bonté ╵l’homme qui de sa part ╵a reçu l’onction d’huile sainte,
  - type: text
    content: David et sa postérité, ╵pour toute éternité.
  '6':
  - type: text
    content: Oui, le séjour des morts ╵m’entourait de ses liens,
  - type: text
    content: le piège de la mort ╵se refermait sur moi.
  '7':
  - type: text
    content: Alors, dans ma détresse, ╵je priai l’Eternel.
  - type: text
    content: Vers mon Dieu, je lançai ╵mon appel au secours,
  - type: text
    content: mon cri parvint à ses oreilles
  - type: text
    content: et, de son temple, il m’entendit.
  '8':
  - type: text
    content: La terre s’ébranla ╵et elle chancela,
  - type: text
    content: les fondements du ciel ╵se mirent à frémir,
  - type: text
    content: tout secoués par sa colère.
  '9':
  - type: text
    content: De ses narines s’élevait ╵de la fumée,
  - type: text
    content: et de sa bouche ╵surgissait un feu dévorant,
  - type: text
    content: des charbons embrasés ╵en jaillissaient.
