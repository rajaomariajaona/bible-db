document_id: 2SA.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un cantique de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David adressa à l’Eternel les paroles de ce cantique lorsque l’Eternel l’eut délivré de tous ses ennemis, et en particulier de Saül. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il inclina le ciel ╵et descendit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un sombre nuage à ses pieds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il chevauchait un chérubin ╵et il volait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il apparaissait ╵sur les ailes du vent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’enveloppait de ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des nuages opaques, ╵un amas d’eau ╵formaient sa tente.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De l’éclat brillant devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jaillissaient des charbons ardents.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel tonna dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Dieu très-haut ╵fit retentir sa voix.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et soudain il tira des flèches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les éclairs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Ha 3.11 ; Ps 144.6).
      marker-yv: yv-n
    - type: text
      text: ' ╵pour disperser mes ennemis,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lança des éclairs ╵pour les mettre en déroute.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la menace de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au souffle tempétueux ╵de sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fond des eaux parut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondements du monde ╵se trouvèrent à nu.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du haut du ciel, ╵il étend sa main pour me prendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me retirer des grandes eaux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me délivre ╵d’un ennemi puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de gens qui me haïssent ╵et sont plus forts que moi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’affrontaient ╵au jour de mon désastre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’Eternel ╵a été mon appui.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est ma forteresse, ╵mon rocher, mon libérateur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a retiré du danger, ╵l’a éloigné de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’en a délivré ╵à cause de son affection pour moi.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a agi ╵en tenant compte ╵de ma conduite juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme mes mains sont pures, ╵il m’a récompensé ;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j’ai suivi ╵les voies qu’il a prescrites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n’abandonne pas mon Dieu ╵pour m’adonner au mal.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai toujours ses lois sous mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne fais fi ╵d’aucun de ses commandements.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envers lui, je suis sans reproche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis gardé du péché.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel m’a récompensé ╵d’avoir agi avec droiture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de m’être gardé pur sous ses yeux.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec ceux qui sont bienveillants, ╵toi, tu te montres bienveillant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec qui est irréprochable, ╵tu es irréprochable.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et avec celui qui est pur, ╵tu es toi-même pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec celui qui agit ╵de manière tordue, ╵tu empruntes des chemins détournés.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple affligé, tu le sauves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu regardes les orgueilleux ╵et puis tu les abaisses.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es ma lampe, ô Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu illumines mes ténèbres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est mon roc solide ╵où je me réfugie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon Sauveur tout-puissant, ╵mon rempart et mon bouclier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon asile est en lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, mon Sauveur, tu me délivres ╵des hommes violents.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec toi, je me précipite ╵sur une troupe bien armée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une muraille.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec mon Dieu, ╵je franchis des murailles.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parfaites sont les voies ╵que Dieu prescrit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la parole de l’Eternel ╵est éprouvée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui le prennent pour refuge ╵trouvent en lui un bouclier.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est Dieu, sinon l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est un roc ? C’est notre Dieu !
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est Dieu ma place forte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu de Qumrân, certains manuscrits de l’ancienne version grecque, la version syriaque et la Vulgate ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui m’arme de force.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me trace un chemin parfait.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grâce à lui, je cours comme une gazelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me fait prendre position ╵sur les hauteurs.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui m’entraîne au combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me fait tendre l’arc de bronze.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta délivrance ╵me sert de bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en m’exauçant, tu me grandis.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’amènes à marcher ╵sur un chemin bien large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes jambes ne fléchissent pas.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je poursuis tous mes ennemis, ╵je les détruis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne reviens pas ╵sans les avoir exterminés.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les achève, je les frappe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun ne se relève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tombent sous mes pieds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Loué soit l’Eternel : ╵quand je l’ai appelé,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai été délivré ╵de tous mes ennemis.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me rends fort pour le combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu fais plier mes agresseurs : ╵les voilà à mes pieds.'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu mets mes ennemis en fuite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui me haïssent, ╵je les anéantis.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont beau crier au secours, ╵personne ne vient à leur aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’ils appellent l’Eternel, ╵celui-ci ne leur répond pas.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les broie comme la poussière de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les piétine, je les foule ╵comme la boue des rues.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En face d’un peuple en révolte, ╵tu me fais triompher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me maintiens chef d’autres peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple qu’autrefois ╵je ne connaissais pas ╵m’est maintenant soumis.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, des étrangers me courtisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au premier mot, ils m’obéissent.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les étrangers perdent courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tremblants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après quelques manuscrits hébreux, certains manuscrits de l’ancienne version grecque et la Vulgate (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 18.45
        - type: text
          text: '). Le texte hébreu traditionnel porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s’arment.
      marker-yv: yv-n
    - type: text
      text: ', ils quittent leurs bastions.'
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est vivant ! Qu’il soit béni, ╵lui qui est mon rocher !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’on proclame la grandeur ╵de Dieu, le rocher qui me sauve.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce Dieu m’accorde ma revanche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abaisse sous moi des peuples.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui, il me fait échapper à mes ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu me fais triompher d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me délivres ╵des hommes violents.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mort m’enserrait de ses flots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, comme un torrent destructeur, ╵me terrifiait.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi je publie tes louanges, ╵ô Eternel, parmi les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te célèbre par mes chants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 15.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour son roi, l’Eternel opère ╵de grandes délivrances.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il traite avec bonté ╵l’homme qui de sa part ╵a reçu l’onction d’huile sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David et sa postérité, ╵pour toute éternité.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le séjour des morts ╵m’entourait de ses liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le piège de la mort ╵se refermait sur moi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, dans ma détresse, ╵je priai l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers mon Dieu, je lançai ╵mon appel au secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cri parvint à ses oreilles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de son temple, il m’entendit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre s’ébranla ╵et elle chancela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondements du ciel ╵se mirent à frémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout secoués par sa colère.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ses narines s’élevait ╵de la fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de sa bouche ╵surgissait un feu dévorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des charbons embrasés ╵en jaillissaient.
