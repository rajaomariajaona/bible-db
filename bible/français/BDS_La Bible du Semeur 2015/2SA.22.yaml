document_id: 2SA.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un cantique de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David adressa à l’Eternel les paroles de ce cantique lorsque l’Eternel l’eut délivré de tous ses ennemis, et en particulier de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel est ma forteresse, ╵mon rocher, mon libérateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dieu est mon roc solide ╵où je me réfugie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon Sauveur tout-puissant, ╵mon rempart et mon bouclier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon asile est en lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, mon Sauveur, tu me délivres ╵des hommes violents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Loué soit l’Eternel : ╵quand je l’ai appelé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai été délivré ╵de tous mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La mort m’enserrait de ses flots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme un torrent destructeur, ╵me terrifiait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, le séjour des morts ╵m’entourait de ses liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le piège de la mort ╵se refermait sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors, dans ma détresse, ╵je priai l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers mon Dieu, je lançai ╵mon appel au secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cri parvint à ses oreilles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de son temple, il m’entendit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La terre s’ébranla ╵et elle chancela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements du ciel ╵se mirent à frémir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout secoués par sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: De ses narines s’élevait ╵de la fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de sa bouche ╵surgissait un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des charbons embrasés ╵en jaillissaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il inclina le ciel ╵et descendit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un sombre nuage à ses pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il chevauchait un chérubin ╵et il volait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il apparaissait ╵sur les ailes du vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il s’enveloppait de ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des nuages opaques, ╵un amas d’eau ╵formaient sa tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De l’éclat brillant devant lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: jaillissaient des charbons ardents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Eternel tonna dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu très-haut ╵fit retentir sa voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et soudain il tira des flèches
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les éclairs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ha 3.11 ; Ps 144.6).
    marker-yv: yv-n
  - type: text
    text: ' ╵pour disperser mes ennemis,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lança des éclairs ╵pour les mettre en déroute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A la menace de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au souffle tempétueux ╵de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fond des eaux parut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements du monde ╵se trouvèrent à nu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Du haut du ciel, ╵il étend sa main pour me prendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: me retirer des grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il me délivre ╵d’un ennemi puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de gens qui me haïssent ╵et sont plus forts que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils m’affrontaient ╵au jour de mon désastre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel ╵a été mon appui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il m’a retiré du danger, ╵l’a éloigné de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’en a délivré ╵à cause de son affection pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’Eternel a agi ╵en tenant compte ╵de ma conduite juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme mes mains sont pures, ╵il m’a récompensé ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car j’ai suivi ╵les voies qu’il a prescrites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’abandonne pas mon Dieu ╵pour m’adonner au mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: J’ai toujours ses lois sous mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne fais fi ╵d’aucun de ses commandements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Envers lui, je suis sans reproche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis gardé du péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel m’a récompensé ╵d’avoir agi avec droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de m’être gardé pur sous ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avec ceux qui sont bienveillants, ╵toi, tu te montres bienveillant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec qui est irréprochable, ╵tu es irréprochable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et avec celui qui est pur, ╵tu es toi-même pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec celui qui agit ╵de manière tordue, ╵tu empruntes des chemins détournés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Un peuple affligé, tu le sauves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu regardes les orgueilleux ╵et puis tu les abaisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tu es ma lampe, ô Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu illumines mes ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Avec toi, je me précipite ╵sur une troupe bien armée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une muraille.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec mon Dieu, ╵je franchis des murailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Parfaites sont les voies ╵que Dieu prescrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la parole de l’Eternel ╵est éprouvée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui le prennent pour refuge ╵trouvent en lui un bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Qui est Dieu, sinon l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est un roc ? C’est notre Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: C’est Dieu ma place forte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu de Qumrân, certains manuscrits de l’ancienne version grecque, la version syriaque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui m’arme de force.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me trace un chemin parfait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Grâce à lui, je cours comme une gazelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me fait prendre position ╵sur les hauteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: C’est lui qui m’entraîne au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me fait tendre l’arc de bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ta délivrance ╵me sert de bouclier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en m’exauçant, tu me grandis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu m’amènes à marcher ╵sur un chemin bien large,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes jambes ne fléchissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je poursuis tous mes ennemis, ╵je les détruis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne reviens pas ╵sans les avoir exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Je les achève, je les frappe :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun ne se relève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tombent sous mes pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tu me rends fort pour le combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu fais plier mes agresseurs : ╵les voilà à mes pieds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Tu mets mes ennemis en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui me haïssent, ╵je les anéantis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils ont beau crier au secours, ╵personne ne vient à leur aide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’ils appellent l’Eternel, ╵celui-ci ne leur répond pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Je les broie comme la poussière de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les piétine, je les foule ╵comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: En face d’un peuple en révolte, ╵tu me fais triompher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me maintiens chef d’autres peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un peuple qu’autrefois ╵je ne connaissais pas ╵m’est maintenant soumis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Oui, des étrangers me courtisent,
