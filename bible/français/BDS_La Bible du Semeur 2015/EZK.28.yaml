document_id: EZK.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre le prince orgueilleux
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: Toi, tu mourras comme un incirconcis sous les coups d’étrangers. Moi, j’ai parlé. C’est là ce que déclare le Seigneur, l’Eternel. »
  - type: heading
    content: Autrefois et maintenant
  '11':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '12':
  - type: text
    content: 'Fils d’homme, prononce une complainte contre le roi de Tyr. Dis-lui : « Ainsi te parle le Seigneur, l’Eternel : Par ta grande sagesse et ta beauté parfaite, tu étais un modèle de perfection. '
  '13':
  - type: text
    content: Tu étais en Eden, dans le jardin de Dieu. Tu étais recouvert de pierres très précieuses
  - type: note
    content: Sur Eden et ses pierres précieuses, voir Gn 2.8-17.
  - type: text
    content: ' de toutes sortes : rubis, topaze et diamant, chrysolithe et onyx, jaspe, saphir, escarboucle, émeraude. Tes tambourins, tes fifres'
  - type: note
    content: 'Tes tambourins, tes fifres: traduction incertaine.'
  - type: text
    content: ' étaient d’or ouvragé, ils furent préparés le jour même où tu fus créé. '
  '14':
  - type: text
    content: Or, je t’avais placé, avec un chérubin
  - type: note
    content: 'avec un chérubin: en adoptant une autre vocalisation du texte hébreu traditionnel, avec l’ancienne version grecque. Le texte hébreu traditionnel, tel qu’il est vocalisé, signifie : tu étais un chérubin. Sur le chérubin, voir Gn 3.24. qui était oint: sens incertain. D’autres comprennent : aux ailes déployées.'
  - type: text
    content: ' protecteur qui était oint, sur la montagne sainte de Dieu ; c’est là que tu étais, te promenant au milieu de ces pierres aux feux étincelants.'
  '15':
  - type: text
    content: 'Tu as été irréprochable dans toute ta conduite depuis le jour où tu as été créé, jusqu’à ce que le mal se soit trouvé chez toi. '
  '16':
  - type: text
    content: Ton commerce prospère t’a entraîné à la violence qui a rempli ton cœur. Alors tu as péché, je t’ai mis au rang des profanes en te chassant de ma montagne. Et le chérubin protecteur t’a expulsé
  - type: note
    content: 'En modifiant la vocalisation du texte hébreu traditionnel, avec l’ancienne version grecque. Le texte hébreu traditionnel, tel qu’il est vocalisé, signifie : je t’ai expulsé, chérubin protecteur.'
  - type: text
    content: ' du milieu de ces pierres aux feux étincelants. '
  '17':
  - type: text
    content: 'De ta grande beauté, tu t’es enorgueilli et tu as laissé ta splendeur pervertir ta sagesse. Je t’ai précipité à terre, et te donne en spectacle aux autres rois. '
  '18':
  - type: text
    content: 'Par tes nombreux péchés dans ton commerce malhonnête, tu as profané tes sanctuaires et, du milieu de toi, j’ai fait surgir un feu afin qu’il te consume, je t’ai réduit en cendres sur la terre, à la vue de tous. '
  '19':
  - type: text
    content: Et tous ceux qui te connaissaient parmi les peuples sont frappés de stupeur, car tu es devenu un objet d’épouvante. Et pour toujours, tu ne seras plus ! »
  - type: heading
    content: Contre Sidon
  '2':
  - type: text
    content: Fils d’homme, dis au prince de Tyr
  - type: note
    content: Ce prince de Tyr pourrait être Ittobaal II qui régnait sur Tyr lors de la prise de Jérusalem par les Babyloniens.
  - type: text
    content: '  : « Voici ce que te dit le Seigneur, l’Eternel : Ton cœur s’est élevé et tu as proclamé : “Voici, je suis un dieu, et j’occupe ma place sur un trône divin au cœur des mers.” Pourtant, tu n’es qu’un homme, tu n’es pas un dieu, mais tu te crois aussi sage que Dieu. '
  '20':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '21':
  - type: text
    content: Fils d’homme, tourne-toi vers Sidon
  - type: note
    content: Autre port phénicien, proche de Tyr.
  - type: text
    content: ', prophétise sur elle. '
  '22':
  - type: text
    content: 'Dis-lui : « Voici ce que déclare le Seigneur, l’Eternel : Je vais m’en prendre à toi, Sidon, et, au milieu de toi, je vais faire éclater ma gloire, et l’on reconnaîtra que je suis l’Eternel quand j’exécuterai la sentence contre toi. Ainsi je manifesterai ma sainteté par ma façon de te traiter. '
  '23':
  - type: text
    content: J’enverrai contre toi la peste, le sang coulera dans tes rues et les morts tomberont, tués au milieu de toi par l’épée venue de toutes parts contre toi, et l’on reconnaîtra que je suis l’Eternel.
  - type: heading
    content: Israël délivré
  '24':
  - type: text
    content: 'Il n’y aura donc plus, contre la communauté d’Israël, d’écharde douloureuse ou de ronce blessante : elle n’aura plus de voisins pleins de mépris pour elle, et l’on reconnaîtra que je suis l’Eternel.'
  '25':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Quand je rassemblerai la communauté d’Israël du milieu des peuples parmi lesquels elle est dispersée, je manifesterai ma sainteté par la façon dont j’agirai envers eux aux yeux des peuples non israélites. Alors, ils habiteront dans leur propre pays, celui que j’ai donné à mon serviteur Jacob. '
  '26':
  - type: text
    content: Ils y habiteront en sécurité, ils bâtiront des maisons et planteront des vignes ; ils y habiteront en sécurité quand j’aurai exécuté les jugements sur tous leurs voisins qui les méprisent. Et l’on reconnaîtra que je suis l’Eternel, leur Dieu. »
  '3':
  - type: text
    content: 'Voici : tu prétends être plus sage que Danel'
  - type: note
    content: 'Voir 14.14, 20 et note. Autre traduction : Daniel.'
  - type: text
    content: ', pensant qu’aucun mystère ne t’est impénétrable. '
  '4':
  - type: text
    content: 'Par ta sagesse et ton intelligence, tu t’es constitué une immense fortune et tu as amassé de l’or et de l’argent dans tes trésors. '
  '5':
  - type: text
    content: 'Par ton extrême habileté dans ton commerce, tu as accumulé des richesses sans nombre et, avec ta fortune, ton cœur s’est élevé. '
  '6':
  - type: text
    content: 'A cause de cela, voici ce que te dit le Seigneur, l’Eternel : Parce que tu t’es cru aussi sage que Dieu, '
  '7':
  - type: text
    content: 'j’amène contre toi des peuples étrangers parmi les plus violents : ils tireront l’épée contre tous les chefs-d’œuvre de ton habileté et profaneront ta splendeur. '
  '8':
  - type: text
    content: 'Ils te feront descendre dans la fosse, et tu mourras de mort violente, au cœur des mers. '
  '9':
  - type: text
    content: 'Oseras-tu encore dire : “Je suis Dieu” face à celui qui t’abattra ? Tu n’es qu’un homme, non, tu n’es pas un dieu entre les mains de ceux qui vont te transpercer ! '
