document_id: EZK.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Contre le prince orgueilleux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toi, tu mourras comme un incirconcis sous les coups d’étrangers. Moi, j’ai parlé. C’est là ce que déclare le Seigneur, l’Eternel. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Autrefois et maintenant
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fils d’homme, prononce une complainte contre le roi de Tyr. Dis-lui : « Ainsi te parle le Seigneur, l’Eternel : Par ta grande sagesse et ta beauté parfaite, tu étais un modèle de perfection. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu étais en Eden, dans le jardin de Dieu. Tu étais recouvert de pierres très précieuses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eden '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et ses pierres précieuses, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 2.8-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' de toutes sortes : rubis, topaze et diamant, chrysolithe et onyx, jaspe, saphir, escarboucle, émeraude. Tes tambourins, tes fifres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tes tambourins, tes fifres
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: ' étaient d’or ouvragé, ils furent préparés le jour même où tu fus créé. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Or, je t’avais placé, avec un chérubin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec un chérubin
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en adoptant une autre vocalisation du texte hébreu traditionnel, avec l’ancienne version grecque. Le texte hébreu traditionnel, tel qu’il est vocalisé, signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu étais un chérubin. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chérubin, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 3.24
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui était oint
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sens incertain. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux ailes déployées.
      marker-yv: yv-n
    - type: text
      text: ' protecteur qui était oint, sur la montagne sainte de Dieu ; c’est là que tu étais, te promenant au milieu de ces pierres aux feux étincelants.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu as été irréprochable dans toute ta conduite depuis le jour où tu as été créé, jusqu’à ce que le mal se soit trouvé chez toi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ton commerce prospère t’a entraîné à la violence qui a rempli ton cœur. Alors tu as péché, je t’ai mis au rang des profanes en te chassant de ma montagne. Et le chérubin protecteur t’a expulsé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En modifiant la vocalisation du texte hébreu traditionnel, avec l’ancienne version grecque. Le texte hébreu traditionnel, tel qu’il est vocalisé, signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t’ai expulsé, chérubin protecteur.
      marker-yv: yv-n
    - type: text
      text: ' du milieu de ces pierres aux feux étincelants. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'De ta grande beauté, tu t’es enorgueilli et tu as laissé ta splendeur pervertir ta sagesse. Je t’ai précipité à terre, et te donne en spectacle aux autres rois. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Par tes nombreux péchés dans ton commerce malhonnête, tu as profané tes sanctuaires et, du milieu de toi, j’ai fait surgir un feu afin qu’il te consume, je t’ai réduit en cendres sur la terre, à la vue de tous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Et tous ceux qui te connaissaient parmi les peuples sont frappés de stupeur, car tu es devenu un objet d’épouvante. Et pour toujours, tu ne seras plus ! »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre Sidon
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fils d’homme, dis au prince de Tyr
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prince de Tyr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pourrait être Ittobaal II qui régnait sur Tyr lors de la prise de Jérusalem par les Babyloniens.
      marker-yv: yv-n
    - type: text
      text: '  : « Voici ce que te dit le Seigneur, l’Eternel : Ton cœur s’est élevé et tu as proclamé : “Voici, je suis un dieu, et j’occupe ma place sur un trône divin au cœur des mers.” Pourtant, tu n’es qu’un homme, tu n’es pas un dieu, mais tu te crois aussi sage que Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fils d’homme, tourne-toi vers Sidon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autre port phénicien, proche de Tyr.
      marker-yv: yv-n
    - type: text
      text: ', prophétise sur elle. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dis-lui : « Voici ce que déclare le Seigneur, l’Eternel : Je vais m’en prendre à toi, Sidon, et, au milieu de toi, je vais faire éclater ma gloire, et l’on reconnaîtra que je suis l’Eternel quand j’exécuterai la sentence contre toi. Ainsi je manifesterai ma sainteté par ma façon de te traiter. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: J’enverrai contre toi la peste, le sang coulera dans tes rues et les morts tomberont, tués au milieu de toi par l’épée venue de toutes parts contre toi, et l’on reconnaîtra que je suis l’Eternel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Israël délivré
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il n’y aura donc plus, contre la communauté d’Israël, d’écharde douloureuse ou de ronce blessante : elle n’aura plus de voisins pleins de mépris pour elle, et l’on reconnaîtra que je suis l’Eternel.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici ce que déclare le Seigneur, l’Eternel : Quand je rassemblerai la communauté d’Israël du milieu des peuples parmi lesquels elle est dispersée, je manifesterai ma sainteté par la façon dont j’agirai envers eux aux yeux des peuples non israélites. Alors, ils habiteront dans leur propre pays, celui que j’ai donné à mon serviteur Jacob. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ils y habiteront en sécurité, ils bâtiront des maisons et planteront des vignes ; ils y habiteront en sécurité quand j’aurai exécuté les jugements sur tous leurs voisins qui les méprisent. Et l’on reconnaîtra que je suis l’Eternel, leur Dieu. »
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici : tu prétends être plus sage que Danel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14.14'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: ' et note. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Daniel.
      marker-yv: yv-n
    - type: text
      text: ', pensant qu’aucun mystère ne t’est impénétrable. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Par ta sagesse et ton intelligence, tu t’es constitué une immense fortune et tu as amassé de l’or et de l’argent dans tes trésors. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Par ton extrême habileté dans ton commerce, tu as accumulé des richesses sans nombre et, avec ta fortune, ton cœur s’est élevé. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'A cause de cela, voici ce que te dit le Seigneur, l’Eternel : Parce que tu t’es cru aussi sage que Dieu, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'j’amène contre toi des peuples étrangers parmi les plus violents : ils tireront l’épée contre tous les chefs-d’œuvre de ton habileté et profaneront ta splendeur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils te feront descendre dans la fosse, et tu mourras de mort violente, au cœur des mers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Oseras-tu encore dire : “Je suis Dieu” face à celui qui t’abattra ? Tu n’es qu’un homme, non, tu n’es pas un dieu entre les mains de ceux qui vont te transpercer ! '
