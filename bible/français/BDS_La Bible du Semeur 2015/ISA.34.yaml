document_id: ISA.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La rétribution divine
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’anéantissement d’Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Approchez, ô nations, ╵pour écouter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous peuples, prêtez attention !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, que la terre entière ╵et tout ce qui l’emplit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, que le monde ╵et tout ce qu’il produit ╵se mettent à l’écoute !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car l’Eternel est en colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre l’ensemble des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est furieux ╵contre toutes leurs troupes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il les voue à lui-même :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les livre au massacre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Leurs victimes seront jetées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’odeur de leurs cadavres ╵se répandra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur sang ruissellera ╵sur les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toute l’armée du ciel ╵en pourriture tombera ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le ciel s’enroulera ╵comme on enroule un livre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les astres se décomposeront
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme se décomposent ╵les feuilles de la vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou celles du figuier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 24.29 ; Mc 13.25 ; Ap 6.13-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dans le ciel, mon épée est ivre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est ivre
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. Le texte hébreu de Qumrân et la version syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apparaît.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la voici qui s’abat sur Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, sur ce peuple ╵que j’ai voué au jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’épée de l’Eternel ╵est saturée de sang ╵et couverte de graisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du sang des boucs ╵et des agneaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des parties grasses ╵des rognons de béliers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car pour l’Eternel est prévu ╵un sacrifice dans Botsra
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un grand carnage en Edom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En même temps, les buffles tomberont,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec les bœufs et les taureaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le pays tout entier ╵est abreuvé de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la poussière du sol ╵est imprégnée de graisse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: car il y a un jour ╵où l’Eternel rétribuera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une année ╵où il fera rendre des comptes ╵pour défendre la cause de Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les rivières d’Edom ╵seront changées en poix
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa poussière en soufre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout son territoire ╵deviendra de la poix brûlante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ni la nuit ni le jour, ╵elle ne s’éteindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa fumée montera ╵à perpétuité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, pour toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ap 14.11 ; 19.3.
    marker-yv: yv-n
  - type: text
    text: ', ╵Edom restera ravagé :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne n’y passera plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le hibou et le hérisson ╵en prendront possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chouette et le corbeau ╵en feront leur demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’Eternel y étendra ╵le cordeau du chaos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fil à plomb du vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses nobles ne pourront ╵plus proclamer de roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses nobles n’auront plus rien qui puisse s’appeler royaume.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses grands ╵seront réduits à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les épineux croîtront ╵dans ses palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les orties et les ronces ╵dans ses fortins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sera un repaire ╵pour les chacals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'un domaine pour les autruches :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: les bêtes du désert ╵y trouveront les hyènes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les boucs sauvages ╵s’y héleront l’un l’autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La chouette nocturne ╵viendra s’y reposer
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle y trouvera ╵un endroit bien tranquille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le serpent y fera son nid ╵et y pondra ses œufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les y couvera ╵et les fera éclore sous son ombre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, les vautours ╵se rassembleront tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun avec son compagnon.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le nouvel exode
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Consultez et lisez le livre ╵de l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun des membres de son peuple, ╵ne manquera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun d’eux n’aura à chercher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aucune de ces bêtes… aucune n’aura à chercher.
    marker-yv: yv-n
  - type: text
    text: ' ╵en vain son compagnon,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel, ╵de sa bouche, en a donné l’ordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est son Esprit ╵qui les a rassemblées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il a lui-même ╵tiré au sort ╵pour assigner ╵à chacun d’eux son lot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il leur a partagé ╵le pays au cordeau :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils l’auront en partage ╵à tout jamais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils y habiteront toujours.
