document_id: ISA.34,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La rétribution divine
  - type: heading
    content: L’anéantissement d’Edom
  - type: text
    content: Approchez, ô nations, ╵pour écouter,
  - type: text
    content: vous peuples, prêtez attention !
  - type: text
    content: Oui, que la terre entière ╵et tout ce qui l’emplit,
  - type: text
    content: oui, que le monde ╵et tout ce qu’il produit ╵se mettent à l’écoute !
  '10':
  - type: text
    content: Ni la nuit ni le jour, ╵elle ne s’éteindra,
  - type: text
    content: sa fumée montera ╵à perpétuité
  - type: text
    content: et, pour toujours
  - type: note
    content: Voir Ap 14.11 ; 19.3.
  - type: text
    content: ', ╵Edom restera ravagé :'
  - type: text
    content: personne n’y passera plus.
  '11':
  - type: text
    content: Le hibou et le hérisson ╵en prendront possession,
  - type: text
    content: la chouette et le corbeau ╵en feront leur demeure,
  - type: text
    content: et l’Eternel y étendra ╵le cordeau du chaos,
  - type: text
    content: le fil à plomb du vide.
  '12':
  - type: text
    content: Ses nobles ne pourront ╵plus proclamer de roi
  - type: note
    content: 'Autre traduction : ses nobles n’auront plus rien qui puisse s’appeler royaume.'
  - type: text
    content: ','
  - type: text
    content: et tous ses grands ╵seront réduits à rien.
  '13':
  - type: text
    content: Les épineux croîtront ╵dans ses palais,
  - type: text
    content: les orties et les ronces ╵dans ses fortins.
  - type: text
    content: Ce sera un repaire ╵pour les chacals,
  - type: text
    content: 'un domaine pour les autruches :'
  '14':
  - type: text
    content: les bêtes du désert ╵y trouveront les hyènes,
  - type: text
    content: les boucs sauvages ╵s’y héleront l’un l’autre.
  - type: text
    content: La chouette nocturne ╵viendra s’y reposer
  - type: text
    content: car elle y trouvera ╵un endroit bien tranquille.
  '15':
  - type: text
    content: Le serpent y fera son nid ╵et y pondra ses œufs,
  - type: text
    content: il les y couvera ╵et les fera éclore sous son ombre.
  - type: text
    content: Là, les vautours ╵se rassembleront tous,
  - type: text
    content: chacun avec son compagnon.
  - type: heading
    content: Le nouvel exode
  '16':
  - type: text
    content: 'Consultez et lisez le livre ╵de l’Eternel :'
  - type: text
    content: aucun des membres de son peuple, ╵ne manquera,
  - type: text
    content: aucun d’eux n’aura à chercher
  - type: note
    content: 'D’autres comprennent : aucune de ces bêtes… aucune n’aura à chercher.'
  - type: text
    content: ' ╵en vain son compagnon,'
  - type: text
    content: car l’Eternel, ╵de sa bouche, en a donné l’ordre,
  - type: text
    content: c’est son Esprit ╵qui les a rassemblées.
  '17':
  - type: text
    content: Il a lui-même ╵tiré au sort ╵pour assigner ╵à chacun d’eux son lot,
  - type: text
    content: 'il leur a partagé ╵le pays au cordeau :'
  - type: text
    content: ils l’auront en partage ╵à tout jamais,
  - type: text
    content: ils y habiteront toujours.
  '2':
  - type: text
    content: Car l’Eternel est en colère
  - type: text
    content: contre l’ensemble des nations,
  - type: text
    content: il est furieux ╵contre toutes leurs troupes,
  - type: text
    content: 'il les voue à lui-même :'
  - type: text
    content: il les livre au massacre.
  '3':
  - type: text
    content: Leurs victimes seront jetées,
  - type: text
    content: l’odeur de leurs cadavres ╵se répandra,
  - type: text
    content: leur sang ruissellera ╵sur les montagnes.
  '4':
  - type: text
    content: Toute l’armée du ciel ╵en pourriture tombera ;
  - type: text
    content: le ciel s’enroulera ╵comme on enroule un livre,
  - type: text
    content: tous les astres se décomposeront
  - type: text
    content: comme se décomposent ╵les feuilles de la vigne
  - type: text
    content: ou celles du figuier
  - type: note
    content: Voir Mt 24.29 ; Mc 13.25 ; Ap 6.13-14.
  - type: text
    content: .
  '5':
  - type: text
    content: Dans le ciel, mon épée est ivre
  - type: note
    content: 'est ivre: selon le texte hébreu traditionnel. Le texte hébreu de Qumrân et la version syriaque ont : apparaît.'
  - type: text
    content: ','
  - type: text
    content: et la voici qui s’abat sur Edom,
  - type: text
    content: oui, sur ce peuple ╵que j’ai voué au jugement.
  '6':
  - type: text
    content: L’épée de l’Eternel ╵est saturée de sang ╵et couverte de graisse,
  - type: text
    content: du sang des boucs ╵et des agneaux,
  - type: text
    content: des parties grasses ╵des rognons de béliers.
  - type: text
    content: Car pour l’Eternel est prévu ╵un sacrifice dans Botsra
  - type: text
    content: et un grand carnage en Edom.
  '7':
  - type: text
    content: En même temps, les buffles tomberont,
  - type: text
    content: avec les bœufs et les taureaux,
  - type: text
    content: le pays tout entier ╵est abreuvé de sang,
  - type: text
    content: la poussière du sol ╵est imprégnée de graisse,
  '8':
  - type: text
    content: car il y a un jour ╵où l’Eternel rétribuera,
  - type: text
    content: et une année ╵où il fera rendre des comptes ╵pour défendre la cause de Sion.
  '9':
  - type: text
    content: Les rivières d’Edom ╵seront changées en poix
  - type: text
    content: et sa poussière en soufre,
  - type: text
    content: et tout son territoire ╵deviendra de la poix brûlante.
