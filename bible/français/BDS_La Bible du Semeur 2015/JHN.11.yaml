document_id: JHN.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La mort d’un ami de Jésus
  - type: text
    content: Dans le village de Béthanie vivaient deux sœurs, Marthe et Marie, ainsi que leur frère Lazare.
  '10':
  - type: text
    content: Mais si l’on marche de nuit, on trébuche parce qu’il n’y a pas de lumière.
  '11':
  - type: text
    content: 'Après avoir dit cela, il ajouta : '
  - type: text
    content: Notre ami Lazare s’est endormi ; je vais aller le réveiller.
  '12':
  - type: text
    content: 'Sur quoi les disciples lui dirent : Seigneur, s’il dort, il est en voie de guérison.'
  '13':
  - type: text
    content: 'En fait, Jésus voulait dire que Lazare était mort, mais les disciples avaient compris qu’il parlait du sommeil ordinaire. '
  '14':
  - type: text
    content: 'Alors il leur dit clairement : '
  - type: text
    content: Lazare est mort,
  - type: text
    content: ' '
  '15':
  - type: text
    content: et je suis heureux, à cause de vous, de n’avoir pas été là-bas à ce moment-là. Car cela contribuera à votre foi. Mais maintenant, allons auprès de lui.
  '16':
  - type: text
    content: 'Thomas, surnommé le Jumeau, dit alors aux autres disciples : Allons-y, nous aussi, pour mourir avec lui.'
  '17':
  - type: text
    content: 'A son arrivée, Jésus apprit qu’on avait enseveli Lazare depuis quatre jours déjà. '
  '18':
  - type: text
    content: 'Béthanie était à moins de trois kilomètres de Jérusalem, '
  '19':
  - type: text
    content: aussi beaucoup de gens étaient-ils venus chez Marthe et Marie pour leur présenter leurs condoléances à l’occasion de la mort de leur frère.
  - type: heading
    content: La résurrection et la vie
  '2':
  - type: text
    content: Marie était cette femme qui, après avoir répandu une huile parfumée sur les pieds du Seigneur, les lui avait essuyés avec ses cheveux
  - type: note
    content: Voir 12.3.
  - type: text
    content: '. Lazare, son frère, tomba malade. '
  '20':
  - type: text
    content: Quand Marthe apprit que Jésus approchait du village, elle alla à sa rencontre. Marie, elle, resta à la maison.
  '21':
  - type: text
    content: 'Marthe dit à Jésus : Seigneur, si tu avais été ici, mon frère ne serait pas mort. '
  '22':
  - type: text
    content: Mais je sais que maintenant encore, tout ce que tu demanderas à Dieu, il te l’accordera.
  '23':
  - type: text
    content: ' '
  - type: text
    content: – Ton frère ressuscitera,
  - type: text
    content: ' lui dit Jésus.'
  '24':
  - type: text
    content: – Je sais bien, répondit Marthe, qu’il reviendra à la vie au dernier jour, lors de la résurrection.
  '25':
  - type: text
    content: ' '
  - type: text
    content: – Moi, je suis la résurrection et la vie,
  - type: text
    content: ' lui dit Jésus. '
  - type: text
    content: 'Celui qui place toute sa '
  - type: text
    content: confiance
  - type: text
    content: ' en moi vivra, même s’il meurt.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela ?
  '27':
  - type: text
    content: – Oui, Seigneur, lui répondit-elle, je crois que tu es le Messie, le Fils de Dieu, celui qui devait venir dans le monde.
  '28':
  - type: text
    content: 'Là-dessus, elle partit appeler sa sœur Marie, et, l’ayant prise à part, elle lui dit : Le Maître est là, et il te demande.'
  '29':
  - type: text
    content: 'A cette nouvelle, Marie se leva précipitamment et courut vers Jésus. '
  '3':
  - type: text
    content: 'Les deux sœurs envoyèrent donc quelqu’un à Jésus pour lui faire dire : Seigneur, ton ami est malade.'
  '30':
  - type: text
    content: 'Il n’était pas encore entré dans le village : il était resté à l’endroit où Marthe l’avait rencontré. '
  '31':
  - type: text
    content: Ceux qui se trouvaient dans la maison avec Marie pour la consoler la virent se lever brusquement et sortir. Ils la suivirent, pensant qu’elle allait au tombeau pour y pleurer.
  '32':
  - type: text
    content: 'Marie parvint à l’endroit où était Jésus. Dès qu’elle le vit, elle se jeta à ses pieds et lui dit : Seigneur, si tu avais été ici, mon frère ne serait pas mort.'
  '33':
  - type: text
    content: En la voyant pleurer, elle et ceux qui l’accompagnaient, Jésus fut profondément indigné
  - type: note
    content: Indigné devant la mort.
  - type: text
    content: ' et ému.'
  '34':
  - type: text
    content: ' '
  - type: text
    content: – Où l’avez-vous enterré ?
  - type: text
    content: ' demanda-t-il.'
  - type: text
    content: – Viens, Seigneur, lui répondirent-ils, tu verras.
  '35':
  - type: text
    content: Jésus pleura.
  '36':
  - type: text
    content: 'Alors tous dirent : Voyez, comme il l’aimait.'
  '37':
  - type: text
    content: 'Quelques-uns remarquaient : Il a bien rendu la vue à l’aveugle, n’aurait-il pas pu empêcher que Lazare meure ?'
  - type: heading
    content: La victoire sur la mort
  '38':
  - type: text
    content: Une fois de plus, Jésus fut profondément bouleversé. Il arriva au tombeau. C’était une grotte dont l’entrée était fermée par une pierre
  - type: note
    content: Les tombes étaient souvent aménagées dans des grottes naturelles ou artificielles dont l’entrée était fermée par une grosse pierre ronde et plate.
  - type: text
    content: .
  '39':
  - type: text
    content: ' '
  - type: text
    content: – Enlevez la pierre,
  - type: text
    content: ' dit Jésus.'
  - type: text
    content: 'Marthe, la sœur du mort, dit alors : Seigneur, il doit déjà sentir. Cela fait quatre jours qu’il est là.'
  '4':
  - type: text
    content: 'Quand Jésus apprit la nouvelle, il dit : '
  - type: text
    content: Cette maladie n’aboutira pas à la mort, elle servira à glorifier Dieu ; elle sera une occasion pour faire apparaître la gloire du Fils de Dieu.
  '40':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Ne t’ai-je pas dit : Si tu crois, tu verras la gloire de Dieu ?'
  '41':
  - type: text
    content: 'On ôta donc la pierre. Alors Jésus, tournant son regard vers le ciel, dit : '
  - type: text
    content: Père, tu as exaucé ma prière et je t’en remercie.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Pour moi, je sais que tu m’exauces toujours, mais si je parle ainsi, c’est pour que tous ceux qui m’entourent croient que c’est toi qui m’as envoyé.
  '43':
  - type: text
    content: 'Cela dit, il cria d’une voix forte : '
  - type: text
    content: Lazare, sors de là !
  '44':
  - type: text
    content: 'Et voici que le mort sortit du tombeau : il avait les pieds et les mains entourés de bandes de lin, le visage recouvert d’un linge.'
  - type: text
    content: 'Jésus dit à ceux qui étaient là : '
  - type: text
    content: Déliez-le de ces bandes et laissez-le aller !
  - type: heading
    content: Le complot contre le Maître de la vie
  - type: heading
    content: (Mt 26.1-5 ; Mc 14.1-2 ; Lc 22.1-2)
  '45':
  - type: text
    content: 'En voyant ce que Jésus avait fait, beaucoup de ceux qui étaient venus auprès de Marie crurent en lui. '
  '46':
  - type: text
    content: Quelques-uns, cependant, s’en allèrent trouver les pharisiens et leur rapportèrent ce que Jésus avait fait.
  '47':
  - type: text
    content: Alors, les chefs des prêtres et les pharisiens convoquèrent le Grand-Conseil.
  - type: text
    content: '– Qu’allons-nous faire ? disaient-ils. Cet homme accomplit trop de signes miraculeux ; '
  '48':
  - type: text
    content: si nous le laissons faire de la sorte, tout le monde va croire en lui. Alors les Romains viendront et détruiront notre temple et notre peuple.
  '49':
  - type: text
    content: 'L’un d’eux, qui s’appelait Caïphe, et qui était grand-prêtre cette année-là, prit la parole : Vous n’y entendez rien, leur dit-il. '
  '5':
  - type: text
    content: 'Or Jésus était très attaché à Marthe, à sa sœur et à Lazare. '
  '50':
  - type: text
    content: Vous ne voyez pas qu’il est de votre intérêt qu’un seul homme meure pour le peuple, pour que le peuple ne disparaisse pas tout entier ?
  '51':
  - type: text
    content: 'Or ce qu’il disait là ne venait pas de lui ; mais il était grand-prêtre cette année-là, et c’est en cette qualité qu’il prophétisa qu’il fallait que Jésus meure pour son peuple. '
  '52':
  - type: text
    content: Et ce n’était pas seulement pour son peuple qu’il devait mourir, c’était aussi pour rassembler tous les enfants de Dieu dispersés à travers le monde et les réunir en un seul peuple.
  '53':
  - type: text
    content: 'C’est ce jour-là qu’ils prirent la décision de faire mourir Jésus. '
  '54':
  - type: text
    content: Jésus cessa donc de se montrer en public. Il partit de là et se retira dans la région voisine du désert, dans une ville nommée Ephraïm
  - type: note
    content: Localité située à 20 kilomètres au nord-est de Jérusalem.
  - type: text
    content: . Il y passa quelque temps avec ses disciples.
  '55':
  - type: text
    content: 'Comme la fête de la Pâque approchait, beaucoup de gens de tout le pays montaient à Jérusalem avant la fête pour se soumettre aux cérémonies rituelles de purification. '
  '56':
  - type: text
    content: 'Ils cherchaient donc Jésus et se demandaient entre eux, dans la cour du Temple : Qu’en pensez-vous ? Croyez-vous qu’il viendra à la fête ?'
  '57':
  - type: text
    content: 'Or, les chefs des prêtres et les pharisiens avaient donné des instructions : si quelqu’un savait où se trouvait Jésus, il devait les prévenir pour qu’on l’arrête.'
  '6':
  - type: text
    content: 'Après avoir appris qu’il était malade, il resta encore deux jours à l’endroit où il se trouvait. '
  '7':
  - type: text
    content: 'Puis il dit à ses disciples : '
  - type: text
    content: 'Retournons en '
  - type: text
    content: Judée
  - type: text
    content: .
  '8':
  - type: text
    content: – Maître, lui dirent-ils, il n’y a pas si longtemps, ceux de la Judée voulaient te lapider, et maintenant tu veux retourner là-bas ?
  '9':
  - type: text
    content: ' '
  - type: text
    content: – N’y a-t-il pas douze heures dans une journée ?
  - type: text
    content: ' répondit Jésus. '
  - type: text
    content: Si l’on marche pendant qu’il fait jour, on ne bute pas contre les obstacles, parce qu’on voit clair.
  - type: text
    content: ' '
