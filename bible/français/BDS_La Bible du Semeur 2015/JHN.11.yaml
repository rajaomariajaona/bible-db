document_id: JHN.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort d’un ami de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dans le village de Béthanie vivaient deux sœurs, Marthe et Marie, ainsi que leur frère Lazare.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais si l’on marche de nuit, on trébuche parce qu’il n’y a pas de lumière.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Après avoir dit cela, il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Notre ami Lazare s’est endormi ; je vais aller le réveiller.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sur quoi les disciples lui dirent : Seigneur, s’il dort, il est en voie de guérison.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En fait, Jésus voulait dire que Lazare était mort, mais les disciples avaient compris qu’il parlait du sommeil ordinaire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors il leur dit clairement : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazare est mort,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et je suis heureux, à cause de vous, de n’avoir pas été là-bas à ce moment-là. Car cela contribuera à votre foi. Mais maintenant, allons auprès de lui.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Thomas, surnommé le Jumeau, dit alors aux autres disciples : Allons-y, nous aussi, pour mourir avec lui.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'A son arrivée, Jésus apprit qu’on avait enseveli Lazare depuis quatre jours déjà. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Béthanie était à moins de trois kilomètres de Jérusalem, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: aussi beaucoup de gens étaient-ils venus chez Marthe et Marie pour leur présenter leurs condoléances à l’occasion de la mort de leur frère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La résurrection et la vie
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Marie était cette femme qui, après avoir répandu une huile parfumée sur les pieds du Seigneur, les lui avait essuyés avec ses cheveux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12.3'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Lazare, son frère, tomba malade. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quand Marthe apprit que Jésus approchait du village, elle alla à sa rencontre. Marie, elle, resta à la maison.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Marthe dit à Jésus : Seigneur, si tu avais été ici, mon frère ne serait pas mort. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais je sais que maintenant encore, tout ce que tu demanderas à Dieu, il te l’accordera.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Ton frère ressuscitera,
    - type: text
      text: ' lui dit Jésus.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: – Je sais bien, répondit Marthe, qu’il reviendra à la vie au dernier jour, lors de la résurrection.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Moi, je suis la résurrection et la vie,
    - type: text
      text: ' lui dit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Celui qui place toute sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: confiance
      - type: text
        text: ' en moi vivra, même s’il meurt.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et quiconque vit et croit en moi ne mourra jamais. Crois-tu cela ?
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: – Oui, Seigneur, lui répondit-elle, je crois que tu es le Messie, le Fils de Dieu, celui qui devait venir dans le monde.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Là-dessus, elle partit appeler sa sœur Marie, et, l’ayant prise à part, elle lui dit : Le Maître est là, et il te demande.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A cette nouvelle, Marie se leva précipitamment et courut vers Jésus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les deux sœurs envoyèrent donc quelqu’un à Jésus pour lui faire dire : Seigneur, ton ami est malade.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il n’était pas encore entré dans le village : il était resté à l’endroit où Marthe l’avait rencontré. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ceux qui se trouvaient dans la maison avec Marie pour la consoler la virent se lever brusquement et sortir. Ils la suivirent, pensant qu’elle allait au tombeau pour y pleurer.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Marie parvint à l’endroit où était Jésus. Dès qu’elle le vit, elle se jeta à ses pieds et lui dit : Seigneur, si tu avais été ici, mon frère ne serait pas mort.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: En la voyant pleurer, elle et ceux qui l’accompagnaient, Jésus fut profondément indigné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Indigné devant la mort.
      marker-yv: yv-n
    - type: text
      text: ' et ému.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Où l’avez-vous enterré ?
    - type: text
      text: ' demanda-t-il.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Viens, Seigneur, lui répondirent-ils, tu verras.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Jésus pleura.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Alors tous dirent : Voyez, comme il l’aimait.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Quelques-uns remarquaient : Il a bien rendu la vue à l’aveugle, n’aurait-il pas pu empêcher que Lazare meure ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La victoire sur la mort
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Une fois de plus, Jésus fut profondément bouleversé. Il arriva au tombeau. C’était une grotte dont l’entrée était fermée par une pierre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les tombes étaient souvent aménagées dans des grottes naturelles ou artificielles dont l’entrée était fermée par une grosse pierre ronde et plate.
      marker-yv: yv-n
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Enlevez la pierre,
    - type: text
      text: ' dit Jésus.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marthe, la sœur du mort, dit alors : Seigneur, il doit déjà sentir. Cela fait quatre jours qu’il est là.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand Jésus apprit la nouvelle, il dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette maladie n’aboutira pas à la mort, elle servira à glorifier Dieu ; elle sera une occasion pour faire apparaître la gloire du Fils de Dieu.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne t’ai-je pas dit : Si tu crois, tu verras la gloire de Dieu ?'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'On ôta donc la pierre. Alors Jésus, tournant son regard vers le ciel, dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, tu as exaucé ma prière et je t’en remercie.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pour moi, je sais que tu m’exauces toujours, mais si je parle ainsi, c’est pour que tous ceux qui m’entourent croient que c’est toi qui m’as envoyé.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Cela dit, il cria d’une voix forte : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lazare, sors de là !
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Et voici que le mort sortit du tombeau : il avait les pieds et les mains entourés de bandes de lin, le visage recouvert d’un linge.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à ceux qui étaient là : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Déliez-le de ces bandes et laissez-le aller !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le complot contre le Maître de la vie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 26.1-5 ; Mc 14.1-2 ; Lc 22.1-2)
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'En voyant ce que Jésus avait fait, beaucoup de ceux qui étaient venus auprès de Marie crurent en lui. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Quelques-uns, cependant, s’en allèrent trouver les pharisiens et leur rapportèrent ce que Jésus avait fait.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Alors, les chefs des prêtres et les pharisiens convoquèrent le Grand-Conseil.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Qu’allons-nous faire ? disaient-ils. Cet homme accomplit trop de signes miraculeux ; '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: si nous le laissons faire de la sorte, tout le monde va croire en lui. Alors les Romains viendront et détruiront notre temple et notre peuple.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'L’un d’eux, qui s’appelait Caïphe, et qui était grand-prêtre cette année-là, prit la parole : Vous n’y entendez rien, leur dit-il. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Or Jésus était très attaché à Marthe, à sa sœur et à Lazare. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Vous ne voyez pas qu’il est de votre intérêt qu’un seul homme meure pour le peuple, pour que le peuple ne disparaisse pas tout entier ?
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Or ce qu’il disait là ne venait pas de lui ; mais il était grand-prêtre cette année-là, et c’est en cette qualité qu’il prophétisa qu’il fallait que Jésus meure pour son peuple. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Et ce n’était pas seulement pour son peuple qu’il devait mourir, c’était aussi pour rassembler tous les enfants de Dieu dispersés à travers le monde et les réunir en un seul peuple.
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'C’est ce jour-là qu’ils prirent la décision de faire mourir Jésus. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Jésus cessa donc de se montrer en public. Il partit de là et se retira dans la région voisine du désert, dans une ville nommée Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localité située à 20 kilomètres au nord-est de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: . Il y passa quelque temps avec ses disciples.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Comme la fête de la Pâque approchait, beaucoup de gens de tout le pays montaient à Jérusalem avant la fête pour se soumettre aux cérémonies rituelles de purification. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Ils cherchaient donc Jésus et se demandaient entre eux, dans la cour du Temple : Qu’en pensez-vous ? Croyez-vous qu’il viendra à la fête ?'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Or, les chefs des prêtres et les pharisiens avaient donné des instructions : si quelqu’un savait où se trouvait Jésus, il devait les prévenir pour qu’on l’arrête.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Après avoir appris qu’il était malade, il resta encore deux jours à l’endroit où il se trouvait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Puis il dit à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Retournons en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Judée
      - type: text
        text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: – Maître, lui dirent-ils, il n’y a pas si longtemps, ceux de la Judée voulaient te lapider, et maintenant tu veux retourner là-bas ?
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – N’y a-t-il pas douze heures dans une journée ?
    - type: text
      text: ' répondit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si l’on marche pendant qu’il fait jour, on ne bute pas contre les obstacles, parce qu’on voit clair.
    - type: text
