document_id: ACT.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel du Macédonien
  - type: text
    content: 'Paul se rendit ensuite à Derbé, puis à Lystres. Il y trouva un disciple nommé Timothée ; sa mère était une croyante d’origine juive et son père était Grec. '
  '10':
  - type: text
    content: A la suite de cette vision de Paul, nous
  - type: note
    content: Le passage à la première personne du pluriel (le nous) suggère qu’à partir de là, Luc s’est joint à l’équipe de Paul et rapporte ses souvenirs personnels jusqu’au chapitre 17. Après avoir parlé à la troisième personne dans les chapitres 17-19, il reprend le récit à la première personne en 20.5.
  - type: text
    content: ' avons aussitôt cherché à nous rendre en Macédoine, car nous avions la certitude que Dieu lui-même nous appelait à y annoncer l’Evangile.'
  '11':
  - type: text
    content: Nous nous sommes embarqués à Troas et nous avons mis directement le cap sur l’île de Samothrace. Le lendemain, nous avons atteint Néapolis
  - type: note
    content: 'Néapolis: port du nord de la mer Egée, proche de la ville de Philippes.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: De là, nous sommes allés jusqu’à la colonie romaine de Philippes, ville du premier district de Macédoine
  - type: note
    content: 'Certains manuscrits ont : ville principale du district de Macédoine.'
  - type: text
    content: . Nous avons passé plusieurs jours dans cette ville.
  - type: heading
    content: A Philippes
  '13':
  - type: text
    content: Le jour du sabbat, nous nous sommes rendus hors de l’enceinte de la cité, au bord d’une rivière où nous supposions que les Juifs se réunissaient d’habitude pour la prière. Quelques femmes étaient rassemblées là. Nous nous sommes assis avec elles et nous leur avons parlé.
  '14':
  - type: text
    content: 'Il y avait parmi elles une marchande d’étoffes de pourpre, nommée Lydie, originaire de la ville de Thyatire, une non-Juive qui adorait Dieu. Elle écoutait, et le Seigneur ouvrit son cœur, de sorte qu’elle fut attentive à ce que disait Paul. '
  '15':
  - type: text
    content: 'Elle fut baptisée avec sa famille et ceux qui en dépendaient, puis elle nous invita en disant : Puisque vous avez jugé que j’ai foi'
  - type: note
    content: 'Autre traduction : je suis fidèle.'
  - type: text
    content: ' au Seigneur, venez loger chez moi.'
  - type: text
    content: Et, avec insistance, elle nous pressa d’accepter.
  '16':
  - type: text
    content: 'Un jour que nous nous rendions au lieu de prière, une esclave vint à notre rencontre. Elle avait en elle un esprit de divination, et ses prédictions procuraient de grands revenus à ses maîtres. '
  '17':
  - type: text
    content: 'Elle se mit à nous suivre, Paul et nous, en criant à tue-tête : Ces hommes-là sont des serviteurs du Dieu très-haut : ils viennent vous annoncer comment être sauvés !'
  '18':
  - type: text
    content: Elle fit cela plusieurs jours de suite.
  - type: text
    content: 'A la fin, Paul, excédé, se retourna et dit à l’esprit : Je t’ordonne, au nom de Jésus-Christ, de sortir de cette femme !'
  - type: text
    content: A l’instant même, il la quitta.
  '19':
  - type: text
    content: 'Lorsque les maîtres de l’esclave s’aperçurent que leurs espoirs de gains s’étaient évanouis, ils se saisirent de Paul et de Silas et les traînèrent sur la grand-place de la ville devant les autorités. '
  '2':
  - type: text
    content: 'Les frères de Lystres et d’Iconium disaient beaucoup de bien de lui. '
  '20':
  - type: text
    content: 'Ils les présentèrent aux magistrats romains et portèrent plainte contre eux en ces termes : Ces gens-là sont des Juifs qui jettent le trouble dans notre ville. '
  '21':
  - type: text
    content: Ils cherchent à introduire ici des coutumes que nous, qui sommes Romains, n’avons le droit ni d’accepter, ni de pratiquer !
  '22':
  - type: text
    content: La foule se souleva contre eux. Alors, les magistrats leur firent arracher les vêtements et ordonnèrent qu’on les batte à coups de bâton.
  '23':
  - type: text
    content: 'On les roua de coups et on les jeta en prison. Le gardien reçut l’ordre de les surveiller de près. '
  '24':
  - type: text
    content: Pour se conformer à la consigne, il les enferma dans le cachot le plus reculé et leur attacha les pieds dans des blocs de bois.
  '25':
  - type: text
    content: Vers le milieu de la nuit, Paul et Silas priaient et chantaient les louanges de Dieu. Les autres prisonniers les écoutaient.
  '26':
  - type: text
    content: 'Tout à coup, un violent tremblement de terre secoua la prison jusque dans ses fondations. Toutes les portes s’ouvrirent à l’instant même et les chaînes de tous les prisonniers se détachèrent. '
  '27':
  - type: text
    content: 'Le gardien se réveilla en sursaut et vit les portes de la prison grand ouvertes : alors il tira son épée et allait se tuer, car il croyait que ses prisonniers s’étaient enfuis'
  - type: note
    content: Les geôliers qui laissaient échapper un prisonnier étaient condamnés à la peine qu’aurait dû subir le fugitif.
  - type: text
    content: .
  '28':
  - type: text
    content: 'Mais Paul lui cria de toutes ses forces : Arrête ! Ne te fais pas de mal, nous sommes tous là.'
  '29':
  - type: text
    content: 'Le gardien demanda des torches, se précipita dans le cachot et, tremblant de peur, se jeta aux pieds de Paul et de Silas. '
  '3':
  - type: text
    content: 'Paul désira le prendre avec lui. Il l’emmena donc et le fit circoncire par égard pour les Juifs qui habitaient dans ces régions et qui savaient tous que son père était Grec. '
  '30':
  - type: text
    content: 'Puis il les fit sortir et leur demanda :'
  - type: text
    content: Messieurs, que dois-je faire pour être sauvé
  - type: note
    content: 'Autre traduction : pour sortir indemne de cette situation.'
  - type: text
    content: '  ?'
  '31':
  - type: text
    content: – Crois au Seigneur Jésus, lui répondirent-ils, et tu seras sauvé ; il en est de même pour toi et pour les tiens.
  '32':
  - type: text
    content: Et ils lui annoncèrent la Parole de Dieu, à lui et à tous ceux qui vivaient dans sa maison.
  '33':
  - type: text
    content: 'A l’heure même, en pleine nuit, le gardien les prit avec lui et lava leurs blessures. Il fut baptisé aussitôt après, lui et tous les siens. '
  '34':
  - type: text
    content: Puis il fit monter Paul et Silas dans sa maison, leur offrit un repas, et se réjouit, avec toute sa famille, d’avoir cru en Dieu.
  '35':
  - type: text
    content: 'Quand il fit jour, les magistrats envoyèrent les huissiers à la prison pour faire dire au gardien : Relâche ces hommes !'
  '36':
  - type: text
    content: 'Celui-ci courut annoncer la nouvelle à Paul : Les magistrats m’ont donné ordre de vous remettre en liberté. Vous pouvez donc sortir maintenant et aller en paix.'
  '37':
  - type: text
    content: 'Mais Paul dit aux huissiers : Comment ! Ils nous ont fait fouetter en public, sans jugement régulier, alors que nous sommes citoyens romains'
  - type: note
    content: Il était interdit par la loi de faire battre des citoyens romains à coups de bâton ou de fouet. Or, Paul était citoyen romain (voir 22.25-29 ; 23.27), Silas peut-être aussi.
  - type: text
    content: ', puis ils nous ont jetés en prison. Et maintenant, ils voudraient se débarrasser de nous en cachette. Il n’en est pas question ! Qu’ils viennent eux-mêmes nous remettre en liberté.'
  '38':
  - type: text
    content: 'Les huissiers rapportèrent ces paroles aux magistrats. Ceux-ci, en apprenant qu’ils avaient affaire à des citoyens romains, furent pris de peur. '
  '39':
  - type: text
    content: Ils vinrent en personne leur présenter des excuses, leur rendirent la liberté et leur demandèrent de bien vouloir quitter la ville.
  '4':
  - type: text
    content: 'Dans toutes les villes où ils passaient, ils communiquaient aux frères les décisions prises par les apôtres et les responsables de l’Eglise à Jérusalem, en leur demandant de s’y conformer. '
  '40':
  - type: text
    content: A leur sortie de prison, Paul et Silas se rendirent chez Lydie, où ils retrouvèrent tous les frères, ils les encouragèrent, puis ils reprirent la route.
  '5':
  - type: text
    content: Et les Eglises s’affermissaient dans la foi et voyaient augmenter chaque jour le nombre de leurs membres.
  '6':
  - type: text
    content: Ils traversèrent la Galatie phrygienne parce que le Saint-Esprit les avait empêchés d’annoncer la Parole dans la province d’Asie
  - type: note
    content: 'La Galatie phrygienne était une région au sud de l’Asie Mineure. L’Asie: province romaine à l’ouest de l’Asie Mineure, ayant pour capitale Ephèse.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Parvenus près de la Mysie
  - type: note
    content: 'La Mysie: région située près du détroit du Bosphore.'
  - type: text
    content: ', ils se proposaient d’aller en Bithynie ; mais, là encore, l’Esprit de Jésus s’opposa à leur projet. '
  '8':
  - type: text
    content: 'Ils traversèrent donc la Mysie et descendirent au port de Troas. '
  '9':
  - type: text
    content: 'Là, Paul eut une vision au cours de la nuit : un Macédonien se tenait devant lui et le suppliait : Viens en Macédoine et secours-nous !'
