document_id: ACT.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel du Macédonien
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul se rendit ensuite à Derbé, puis à Lystres. Il y trouva un disciple nommé Timothée ; sa mère était une croyante d’origine juive et son père était Grec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les frères de Lystres et d’Iconium disaient beaucoup de bien de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul désira le prendre avec lui. Il l’emmena donc et le fit circoncire par égard pour les Juifs qui habitaient dans ces régions et qui savaient tous que son père était Grec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans toutes les villes où ils passaient, ils communiquaient aux frères les décisions prises par les apôtres et les responsables de l’Eglise à Jérusalem, en leur demandant de s’y conformer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et les Eglises s’affermissaient dans la foi et voyaient augmenter chaque jour le nombre de leurs membres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils traversèrent la Galatie phrygienne parce que le Saint-Esprit les avait empêchés d’annoncer la Parole dans la province d’Asie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Galatie phrygienne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était une région au sud de l’Asie Mineure. L’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Asie
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: province romaine à l’ouest de l’Asie Mineure, ayant pour capitale Ephèse.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Parvenus près de la Mysie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mysie
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: région située près du détroit du Bosphore.
    marker-yv: yv-n
  - type: text
    text: ', ils se proposaient d’aller en Bithynie ; mais, là encore, l’Esprit de Jésus s’opposa à leur projet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils traversèrent donc la Mysie et descendirent au port de Troas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Là, Paul eut une vision au cours de la nuit : un Macédonien se tenait devant lui et le suppliait : Viens en Macédoine et secours-nous !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A la suite de cette vision de Paul, nous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le passage à la première personne du pluriel (le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') suggère qu’à partir de là, Luc s’est joint à l’équipe de Paul et rapporte ses souvenirs personnels jusqu’au chapitre 17. Après avoir parlé à la troisième personne dans les chapitres 17-19, il reprend le récit à la première personne en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20.5'
        metadata:
          usfm: ACT.20.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' avons aussitôt cherché à nous rendre en Macédoine, car nous avions la certitude que Dieu lui-même nous appelait à y annoncer l’Evangile.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous nous sommes embarqués à Troas et nous avons mis directement le cap sur l’île de Samothrace. Le lendemain, nous avons atteint Néapolis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Néapolis
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: port du nord de la mer Egée, proche de la ville de Philippes.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: De là, nous sommes allés jusqu’à la colonie romaine de Philippes, ville du premier district de Macédoine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ville principale du district de Macédoine.
    marker-yv: yv-n
  - type: text
    text: . Nous avons passé plusieurs jours dans cette ville.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Philippes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le jour du sabbat, nous nous sommes rendus hors de l’enceinte de la cité, au bord d’une rivière où nous supposions que les Juifs se réunissaient d’habitude pour la prière. Quelques femmes étaient rassemblées là. Nous nous sommes assis avec elles et nous leur avons parlé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y avait parmi elles une marchande d’étoffes de pourpre, nommée Lydie, originaire de la ville de Thyatire, une non-Juive qui adorait Dieu. Elle écoutait, et le Seigneur ouvrit son cœur, de sorte qu’elle fut attentive à ce que disait Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle fut baptisée avec sa famille et ceux qui en dépendaient, puis elle nous invita en disant : Puisque vous avez jugé que j’ai foi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je suis fidèle.
    marker-yv: yv-n
  - type: text
    text: ' au Seigneur, venez loger chez moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et, avec insistance, elle nous pressa d’accepter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Un jour que nous nous rendions au lieu de prière, une esclave vint à notre rencontre. Elle avait en elle un esprit de divination, et ses prédictions procuraient de grands revenus à ses maîtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle se mit à nous suivre, Paul et nous, en criant à tue-tête : Ces hommes-là sont des serviteurs du Dieu très-haut : ils viennent vous annoncer comment être sauvés !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elle fit cela plusieurs jours de suite.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A la fin, Paul, excédé, se retourna et dit à l’esprit : Je t’ordonne, au nom de Jésus-Christ, de sortir de cette femme !'
- type: usfm
  marker: p
  children:
  - type: text
    text: A l’instant même, il la quitta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque les maîtres de l’esclave s’aperçurent que leurs espoirs de gains s’étaient évanouis, ils se saisirent de Paul et de Silas et les traînèrent sur la grand-place de la ville devant les autorités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils les présentèrent aux magistrats romains et portèrent plainte contre eux en ces termes : Ces gens-là sont des Juifs qui jettent le trouble dans notre ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils cherchent à introduire ici des coutumes que nous, qui sommes Romains, n’avons le droit ni d’accepter, ni de pratiquer !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La foule se souleva contre eux. Alors, les magistrats leur firent arracher les vêtements et ordonnèrent qu’on les batte à coups de bâton.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On les roua de coups et on les jeta en prison. Le gardien reçut l’ordre de les surveiller de près. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pour se conformer à la consigne, il les enferma dans le cachot le plus reculé et leur attacha les pieds dans des blocs de bois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Vers le milieu de la nuit, Paul et Silas priaient et chantaient les louanges de Dieu. Les autres prisonniers les écoutaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tout à coup, un violent tremblement de terre secoua la prison jusque dans ses fondations. Toutes les portes s’ouvrirent à l’instant même et les chaînes de tous les prisonniers se détachèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le gardien se réveilla en sursaut et vit les portes de la prison grand ouvertes : alors il tira son épée et allait se tuer, car il croyait que ses prisonniers s’étaient enfuis'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les geôliers qui laissaient échapper un prisonnier étaient condamnés à la peine qu’aurait dû subir le fugitif.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais Paul lui cria de toutes ses forces : Arrête ! Ne te fais pas de mal, nous sommes tous là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le gardien demanda des torches, se précipita dans le cachot et, tremblant de peur, se jeta aux pieds de Paul et de Silas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis il les fit sortir et leur demanda :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Messieurs, que dois-je faire pour être sauvé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour sortir indemne de cette situation.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: – Crois au Seigneur Jésus, lui répondirent-ils, et tu seras sauvé ; il en est de même pour toi et pour les tiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Et ils lui annoncèrent la Parole de Dieu, à lui et à tous ceux qui vivaient dans sa maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A l’heure même, en pleine nuit, le gardien les prit avec lui et lava leurs blessures. Il fut baptisé aussitôt après, lui et tous les siens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Puis il fit monter Paul et Silas dans sa maison, leur offrit un repas, et se réjouit, avec toute sa famille, d’avoir cru en Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand il fit jour, les magistrats envoyèrent les huissiers à la prison pour faire dire au gardien : Relâche ces hommes !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Celui-ci courut annoncer la nouvelle à Paul : Les magistrats m’ont donné ordre de vous remettre en liberté. Vous pouvez donc sortir maintenant et aller en paix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Paul dit aux huissiers : Comment ! Ils nous ont fait fouetter en public, sans jugement régulier, alors que nous sommes citoyens romains'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il était interdit par la loi de faire battre des citoyens romains à coups de bâton ou de fouet. Or, Paul était citoyen romain (voir 22.25-29 ; 23.27), Silas peut-être aussi.
    marker-yv: yv-n
  - type: text
    text: ', puis ils nous ont jetés en prison. Et maintenant, ils voudraient se débarrasser de nous en cachette. Il n’en est pas question ! Qu’ils viennent eux-mêmes nous remettre en liberté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Les huissiers rapportèrent ces paroles aux magistrats. Ceux-ci, en apprenant qu’ils avaient affaire à des citoyens romains, furent pris de peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ils vinrent en personne leur présenter des excuses, leur rendirent la liberté et leur demandèrent de bien vouloir quitter la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: A leur sortie de prison, Paul et Silas se rendirent chez Lydie, où ils retrouvèrent tous les frères, ils les encouragèrent, puis ils reprirent la route.
