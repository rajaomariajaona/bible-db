document_id: EXO.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conclusion de l’alliance avec Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu dit à Moïse : Monte vers l’Eternel, et prends avec toi Aaron, Nadab, Abihou'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les deux fils aînés d’Aaron qui auraient dû lui succéder dans l’office de grand-prêtre, mais ils ont offert un feu profane sur l’autel et ont été frappés par Dieu (Lv 10.1-2 ; Nb 3.4).
    marker-yv: yv-n
  - type: text
    text: ' et soixante-dix des responsables d’Israël'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il ne s’agit donc pas de tous les responsables du peuple. Le nombre soixante-dix renvoie peut-être au nombre des personnes composant la famille d’Israël lors de sa venue en Egypte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.5'
        metadata:
          usfm: EXO.1.5
      - type: text
        text: ) à moins qu’il ne symbolise la plénitude (sept) multipliée par dix (grand nombre).
    marker-yv: yv-n
  - type: text
    text: '. Vous vous prosternerez de loin. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toi, Moïse, tu t’approcheras seul de moi ; les autres ne s’approcheront pas, et l’ensemble du peuple ne montera pas avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse alla rapporter au peuple toutes les paroles de l’Eternel et toutes ses lois. Et tout le peuple s’écria d’une seule voix : Nous ferons tout ce que l’Eternel a dit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse mit par écrit toutes les paroles de l’Eternel. Le lendemain, de bonne heure, il bâtit un autel au pied de la montagne et dressa douze stèles pour les douze tribus d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il chargea les jeunes gens d’Israël d’offrir à l’Eternel des holocaustes et des taureaux en sacrifices de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il recueillit la moitié du sang versé dans des récipients et répandit l’autre moitié sur l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Puis il prit le livre de l’alliance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le livre qui vient d’être écrit (v. 4).
    marker-yv: yv-n
  - type: text
    text: ' et le lut à haute voix au peuple. Les Israélites déclarèrent : Nous ferons tout ce que l’Eternel a dit, nous obéirons à toutes ses paroles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Moïse prit le sang et en aspergea le peuple en disant : C’est le sang de l’alliance que l’Eternel a conclue avec vous, sur la base de toutes ces paroles'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jésus semble avoir fait allusion à ces paroles en instituant la cène (Mt 26.28 ; Mc 14.24 ; Lc 22.20 ; 1 Co 11.25) ; voir Hé 9.19-20 ; 10.29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ensuite Moïse gravit la montagne avec Aaron, Nadab, Abihou et soixante-dix responsables d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils virent le Dieu d’Israël. Sous ses pieds s’étendait comme une plateforme de saphirs aussi purs que le fond du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 4.6
        metadata:
          usfm: REV.4.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Eternel n’étendit pas la main sur ces notables des Israélites ; ils contemplèrent Dieu et puis ils mangèrent et burent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse entre dans la présence de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel dit à Moïse : Monte vers moi sur la montagne et tiens-toi là. Je te donnerai les tables de pierre sur lesquelles j’ai transcrit la Loi et les commandements pour que tu les enseignes au peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse se mit en route avec Josué, son assistant, et gravit la montagne de Dieu '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'après avoir dit aux responsables d’Israël : Attendez-nous ici jusqu’à notre retour. Aaron et Hour resteront avec vous. Si quelqu’un a un problème à régler, qu’il s’adresse à eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse monta sur la montagne et la nuée la recouvrit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La gloire de l’Eternel demeura sur le mont Sinaï et la nuée le recouvrit pendant six jours. Le septième jour, l’Eternel appela Moïse du milieu de la nuée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La gloire de l’Eternel apparaissait aux Israélites comme un feu au sommet de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moïse pénétra dans la nuée et monta plus haut sur la montagne. Il y demeura quarante jours et quarante nuits.
