document_id: EXO.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Conclusion de l’alliance avec Israël
  - type: text
    content: 'Dieu dit à Moïse : Monte vers l’Eternel, et prends avec toi Aaron, Nadab, Abihou'
  - type: note
    content: Les deux fils aînés d’Aaron qui auraient dû lui succéder dans l’office de grand-prêtre, mais ils ont offert un feu profane sur l’autel et ont été frappés par Dieu (Lv 10.1-2 ; Nb 3.4).
  - type: text
    content: ' et soixante-dix des responsables d’Israël'
  - type: note
    content: Il ne s’agit donc pas de tous les responsables du peuple. Le nombre soixante-dix renvoie peut-être au nombre des personnes composant la famille d’Israël lors de sa venue en Egypte (1.5) à moins qu’il ne symbolise la plénitude (sept) multipliée par dix (grand nombre).
  - type: text
    content: '. Vous vous prosternerez de loin. '
  '10':
  - type: text
    content: Ils virent le Dieu d’Israël. Sous ses pieds s’étendait comme une plateforme de saphirs aussi purs que le fond du ciel
  - type: note
    content: Voir Ap 4.6.
  - type: text
    content: '. '
  '11':
  - type: text
    content: L’Eternel n’étendit pas la main sur ces notables des Israélites ; ils contemplèrent Dieu et puis ils mangèrent et burent.
  - type: heading
    content: Moïse entre dans la présence de l’Eternel
  '12':
  - type: text
    content: 'L’Eternel dit à Moïse : Monte vers moi sur la montagne et tiens-toi là. Je te donnerai les tables de pierre sur lesquelles j’ai transcrit la Loi et les commandements pour que tu les enseignes au peuple.'
  '13':
  - type: text
    content: 'Moïse se mit en route avec Josué, son assistant, et gravit la montagne de Dieu '
  '14':
  - type: text
    content: 'après avoir dit aux responsables d’Israël : Attendez-nous ici jusqu’à notre retour. Aaron et Hour resteront avec vous. Si quelqu’un a un problème à régler, qu’il s’adresse à eux.'
  '15':
  - type: text
    content: 'Moïse monta sur la montagne et la nuée la recouvrit. '
  '16':
  - type: text
    content: 'La gloire de l’Eternel demeura sur le mont Sinaï et la nuée le recouvrit pendant six jours. Le septième jour, l’Eternel appela Moïse du milieu de la nuée. '
  '17':
  - type: text
    content: 'La gloire de l’Eternel apparaissait aux Israélites comme un feu au sommet de la montagne. '
  '18':
  - type: text
    content: Moïse pénétra dans la nuée et monta plus haut sur la montagne. Il y demeura quarante jours et quarante nuits.
  '2':
  - type: text
    content: Toi, Moïse, tu t’approcheras seul de moi ; les autres ne s’approcheront pas, et l’ensemble du peuple ne montera pas avec toi.
  '3':
  - type: text
    content: 'Moïse alla rapporter au peuple toutes les paroles de l’Eternel et toutes ses lois. Et tout le peuple s’écria d’une seule voix : Nous ferons tout ce que l’Eternel a dit.'
  '4':
  - type: text
    content: 'Moïse mit par écrit toutes les paroles de l’Eternel. Le lendemain, de bonne heure, il bâtit un autel au pied de la montagne et dressa douze stèles pour les douze tribus d’Israël. '
  '5':
  - type: text
    content: 'Puis il chargea les jeunes gens d’Israël d’offrir à l’Eternel des holocaustes et des taureaux en sacrifices de communion. '
  '6':
  - type: text
    content: 'Il recueillit la moitié du sang versé dans des récipients et répandit l’autre moitié sur l’autel. '
  '7':
  - type: text
    content: Puis il prit le livre de l’alliance
  - type: note
    content: Le livre qui vient d’être écrit (v. 4).
  - type: text
    content: ' et le lut à haute voix au peuple. Les Israélites déclarèrent : Nous ferons tout ce que l’Eternel a dit, nous obéirons à toutes ses paroles.'
  '8':
  - type: text
    content: 'Alors Moïse prit le sang et en aspergea le peuple en disant : C’est le sang de l’alliance que l’Eternel a conclue avec vous, sur la base de toutes ces paroles'
  - type: note
    content: Jésus semble avoir fait allusion à ces paroles en instituant la cène (Mt 26.28 ; Mc 14.24 ; Lc 22.20 ; 1 Co 11.25) ; voir Hé 9.19-20 ; 10.29.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Ensuite Moïse gravit la montagne avec Aaron, Nadab, Abihou et soixante-dix responsables d’Israël. '
