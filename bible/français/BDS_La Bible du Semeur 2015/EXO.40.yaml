document_id: EXO.40,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’installation et la consécration du tabernacle
  - type: text
    content: 'L’Eternel s’adressa à Moïse et lui dit : '
  '10':
  - type: text
    content: 'Tu oindras aussi l’autel des holocaustes et tous ses ustensiles. Tu consacreras l’autel qui sera alors très saint. '
  '11':
  - type: text
    content: Tu oindras la cuve et son socle et tu la consacreras.
  - type: heading
    content: La consécration d’Aaron et de ses fils
  '12':
  - type: text
    content: 'Tu feras approcher Aaron et ses fils de l’entrée de la tente de la Rencontre, et tu les feras se laver à l’eau ; '
  '13':
  - type: text
    content: 'puis tu revêtiras Aaron des vêtements sacrés, tu l’oindras pour le consacrer et il exercera pour moi la fonction de prêtre. '
  '14':
  - type: text
    content: 'Tu feras aussi avancer ses fils et tu les revêtiras de tuniques. '
  '15':
  - type: text
    content: Tu les oindras comme tu auras oint leur père et ils exerceront pour moi la fonction de prêtre ; leur onction leur conférera le sacerdoce à perpétuité, de génération en génération.
  - type: heading
    content: Moïse installe le tabernacle
  '16':
  - type: text
    content: Moïse se conforma à tout ce que l’Eternel lui avait ordonné. C’est ainsi qu’il agit.
  '17':
  - type: text
    content: 'Le premier jour du premier mois de la seconde année, le tabernacle fut dressé. '
  '18':
  - type: text
    content: 'Moïse fit ériger le tabernacle et en fixer les socles, on mit en place les cadres, on fixa les traverses et l’on dressa les piliers. '
  '19':
  - type: text
    content: 'On étendit la toile de tente sur le tabernacle et l’on posa la couverture de la tente par-dessus, comme l’Eternel l’avait ordonné à Moïse. '
  '2':
  - type: text
    content: Le premier jour du premier mois
  - type: note
    content: Donc presque un an après l’institution de la Pâque (voir v. 17 ; 12.2, 6).
  - type: text
    content: ', tu dresseras le tabernacle, la tente de la Rencontre. '
  '20':
  - type: text
    content: 'Celui-ci prit les deux tablettes de l’acte de l’alliance et les déposa dans le coffre ; il disposa les barres le long du coffre et fit poser le propitiatoire dessus ; '
  '21':
  - type: text
    content: puis il le fit apporter dans le tabernacle et suspendit le voile de séparation qui abrita des regards le coffre de l’acte de l’alliance, comme l’Eternel l’avait ordonné à Moïse.
  '22':
  - type: text
    content: 'Il plaça la table dans la tente de la Rencontre sur le côté nord du tabernacle, à l’extérieur du voile, '
  '23':
  - type: text
    content: et il y disposa une rangée de pains devant l’Eternel, comme celui-ci le lui avait ordonné.
  '24':
  - type: text
    content: 'Il installa le chandelier dans la tente de la Rencontre en face de la table, du côté sud du tabernacle. '
  '25':
  - type: text
    content: Il y arrangea les lampes devant l’Eternel, comme celui-ci le lui avait ordonné.
  '26':
  - type: text
    content: 'Il plaça l’autel d’or dans la tente de la Rencontre, devant le voile, '
  '27':
  - type: text
    content: et y fit brûler le parfum aromatique, comme l’Eternel le lui avait ordonné.
  '28':
  - type: text
    content: 'Il fixa le rideau à l’entrée du tabernacle. '
  '29':
  - type: text
    content: Il dressa l’autel des holocaustes à l’entrée du tabernacle, la tente de la Rencontre, et y offrit l’holocauste et l’offrande, comme l’Eternel le lui avait ordonné.
  '3':
  - type: text
    content: 'Tu y déposeras le coffre de l’acte de l’alliance et tu l’abriteras des regards au moyen du voile. '
  '30':
  - type: text
    content: 'Il fit installer la cuve entre la tente de la Rencontre et l’autel et y fit mettre de l’eau pour les ablutions '
  '31':
  - type: text
    content: 'pour que Moïse, Aaron et ses fils s’y lavent les mains et les pieds. '
  '32':
  - type: text
    content: Ils devaient se laver ainsi chaque fois qu’ils entraient dans la tente de la Rencontre et qu’ils s’approchaient de l’autel, comme l’Eternel l’avait ordonné à Moïse.
  '33':
  - type: text
    content: Il fit dresser les tentures du parvis autour du tabernacle et de l’autel et disposa le rideau à la porte du parvis. Ainsi Moïse acheva les travaux.
  - type: heading
    content: L’Eternel est au milieu de son peuple
  '34':
  - type: text
    content: La nuée enveloppa la tente de la Rencontre et la gloire de l’Eternel remplit le tabernacle
  - type: note
    content: Sur la gloire de l’Eternel, voir 1 R 8.10-11 ; Es 6.3 ; Ez 43.4-5 ; Ap 15.8.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Moïse ne pouvait plus pénétrer dans la tente de la Rencontre parce que la nuée reposait sur elle et que la gloire de l’Eternel remplissait le tabernacle. '
  '36':
  - type: text
    content: 'Pendant toutes leurs pérégrinations, c’est quand la nuée s’élevait de dessus le tabernacle que les Israélites se mettaient en route. '
  '37':
  - type: text
    content: 'Mais aussi longtemps qu’elle restait en place, ils ne bougeaient pas et attendaient, pour continuer leur route, qu’elle s’élève de nouveau. '
  '38':
  - type: text
    content: Car la nuée de l’Eternel couvrait le tabernacle pendant le jour et, pendant la nuit, du feu brillait dans la nuée ; elle était ainsi visible pour tous les Israélites. Il en fut ainsi tout au long de leurs pérégrinations.
  '4':
  - type: text
    content: 'Tu apporteras la table et tu disposeras ce qui doit y être placé comme il convient. Tu apporteras le chandelier et tu y placeras les lampes. '
  '5':
  - type: text
    content: 'Tu installeras l’autel d’or destiné à brûler le parfum en face du coffre de l’acte de l’alliance et tu tendras le rideau à l’entrée du tabernacle. '
  '6':
  - type: text
    content: 'Tu installeras l’autel des holocaustes devant l’entrée du tabernacle, la tente de la Rencontre, '
  '7':
  - type: text
    content: 'et tu placeras la cuve entre la tente de la Rencontre et l’autel ; tu y mettras de l’eau. '
  '8':
  - type: text
    content: Tu dresseras le parvis tout autour et tu disposeras le rideau de la porte du parvis.
  '9':
  - type: text
    content: 'Tu prendras de l’huile d’onction et tu en oindras le tabernacle et tout ce qui s’y trouve. Tu le consacreras avec tous ses accessoires et il sera saint. '
