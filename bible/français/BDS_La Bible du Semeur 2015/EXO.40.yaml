document_id: EXO.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’installation et la consécration du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse et lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le premier jour du premier mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Donc presque un an après l’institution de la Pâque (voir v. 17 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.2'
        metadata:
          usfm: EXO.12.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
        metadata:
          usfm: EXO.12.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', tu dresseras le tabernacle, la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu y déposeras le coffre de l’acte de l’alliance et tu l’abriteras des regards au moyen du voile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu apporteras la table et tu disposeras ce qui doit y être placé comme il convient. Tu apporteras le chandelier et tu y placeras les lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu installeras l’autel d’or destiné à brûler le parfum en face du coffre de l’acte de l’alliance et tu tendras le rideau à l’entrée du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu installeras l’autel des holocaustes devant l’entrée du tabernacle, la tente de la Rencontre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et tu placeras la cuve entre la tente de la Rencontre et l’autel ; tu y mettras de l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu dresseras le parvis tout autour et tu disposeras le rideau de la porte du parvis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu prendras de l’huile d’onction et tu en oindras le tabernacle et tout ce qui s’y trouve. Tu le consacreras avec tous ses accessoires et il sera saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu oindras aussi l’autel des holocaustes et tous ses ustensiles. Tu consacreras l’autel qui sera alors très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu oindras la cuve et son socle et tu la consacreras.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La consécration d’Aaron et de ses fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu feras approcher Aaron et ses fils de l’entrée de la tente de la Rencontre, et tu les feras se laver à l’eau ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'puis tu revêtiras Aaron des vêtements sacrés, tu l’oindras pour le consacrer et il exercera pour moi la fonction de prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu feras aussi avancer ses fils et tu les revêtiras de tuniques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu les oindras comme tu auras oint leur père et ils exerceront pour moi la fonction de prêtre ; leur onction leur conférera le sacerdoce à perpétuité, de génération en génération.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse installe le tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moïse se conforma à tout ce que l’Eternel lui avait ordonné. C’est ainsi qu’il agit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le premier jour du premier mois de la seconde année, le tabernacle fut dressé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse fit ériger le tabernacle et en fixer les socles, on mit en place les cadres, on fixa les traverses et l’on dressa les piliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On étendit la toile de tente sur le tabernacle et l’on posa la couverture de la tente par-dessus, comme l’Eternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui-ci prit les deux tablettes de l’acte de l’alliance et les déposa dans le coffre ; il disposa les barres le long du coffre et fit poser le propitiatoire dessus ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: puis il le fit apporter dans le tabernacle et suspendit le voile de séparation qui abrita des regards le coffre de l’acte de l’alliance, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il plaça la table dans la tente de la Rencontre sur le côté nord du tabernacle, à l’extérieur du voile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: et il y disposa une rangée de pains devant l’Eternel, comme celui-ci le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il installa le chandelier dans la tente de la Rencontre en face de la table, du côté sud du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il y arrangea les lampes devant l’Eternel, comme celui-ci le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il plaça l’autel d’or dans la tente de la Rencontre, devant le voile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et y fit brûler le parfum aromatique, comme l’Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il fixa le rideau à l’entrée du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il dressa l’autel des holocaustes à l’entrée du tabernacle, la tente de la Rencontre, et y offrit l’holocauste et l’offrande, comme l’Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il fit installer la cuve entre la tente de la Rencontre et l’autel et y fit mettre de l’eau pour les ablutions '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'pour que Moïse, Aaron et ses fils s’y lavent les mains et les pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils devaient se laver ainsi chaque fois qu’ils entraient dans la tente de la Rencontre et qu’ils s’approchaient de l’autel, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il fit dresser les tentures du parvis autour du tabernacle et de l’autel et disposa le rideau à la porte du parvis. Ainsi Moïse acheva les travaux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel est au milieu de son peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: La nuée enveloppa la tente de la Rencontre et la gloire de l’Eternel remplit le tabernacle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur la gloire de l’Eternel, voir 1 R 8.10-11 ; Es 6.3 ; Ez 43.4-5 ; Ap 15.8.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Moïse ne pouvait plus pénétrer dans la tente de la Rencontre parce que la nuée reposait sur elle et que la gloire de l’Eternel remplissait le tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pendant toutes leurs pérégrinations, c’est quand la nuée s’élevait de dessus le tabernacle que les Israélites se mettaient en route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais aussi longtemps qu’elle restait en place, ils ne bougeaient pas et attendaient, pour continuer leur route, qu’elle s’élève de nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Car la nuée de l’Eternel couvrait le tabernacle pendant le jour et, pendant la nuit, du feu brillait dans la nuée ; elle était ainsi visible pour tous les Israélites. Il en fut ainsi tout au long de leurs pérégrinations.
