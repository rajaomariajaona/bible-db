document_id: GEN.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Jacob et Esaü : des retrouvailles dans la paix'
  - type: text
    content: 'Jacob regarda droit devant et aperçut Esaü qui arrivait avec quatre cents hommes. Alors, il répartit ses enfants entre Léa, Rachel et les deux servantes. '
  '10':
  - type: text
    content: '– Non, dit Jacob, je t’en prie, si j’ai obtenu ta faveur, accepte mon présent, car je t’ai vu en face comme on regarde la face de Dieu, et tu m’as accueilli favorablement. '
  '11':
  - type: text
    content: Accepte donc, je te prie, le présent que je t’ai fait parvenir, car Dieu m’a accordé sa grâce et j’ai tout ce qu’il me faut.
  - type: text
    content: 'Il insista tant qu’Esaü finit par accepter '
  '12':
  - type: text
    content: 'et dit : Partons et marchons ensemble ; j’irai devant toi.'
  '13':
  - type: text
    content: 'Mais Jacob répondit : Mon seigneur sait que les enfants sont fragiles ; de plus, j’ai avec moi des brebis, des chèvres et des vaches qui allaitent ; si l’on forçait leur marche un seul jour, tout le troupeau périrait. '
  '14':
  - type: text
    content: Que mon seigneur aille donc devant son serviteur, je te prie, et moi j’avancerai tout doucement au pas du troupeau qui me précède et de celui des enfants pour aller rejoindre mon seigneur à Séir.
  '15':
  - type: text
    content: 'Esaü suggéra : Dans ce cas, je laisserai avec toi une partie de mes gens.'
  - type: text
    content: – A quoi bon, répondit Jacob, l’essentiel pour moi est d’avoir obtenu la faveur de mon seigneur.
  - type: heading
    content: Jacob s’établit à Sichem
  '16':
  - type: text
    content: 'Ce même jour Esaü reprit le chemin de Séir, '
  '17':
  - type: text
    content: tandis que Jacob partit pour Soukkoth (les Cabanes). Il s’y construisit une maison ; mais il bâtit aussi des cabanes pour son bétail, c’est pourquoi on nomma ce lieu Soukkoth.
  '18':
  - type: text
    content: 'A son retour de Paddân-Aram, Jacob arriva sans encombre à la ville de Sichem, dans le pays de Canaan, et il établit son camp devant la ville. '
  '19':
  - type: text
    content: Il acheta pour cent pièces d’argent
  - type: note
    content: Il s’agit de qésitas. La valeur d’une pièce correspondait à celle d’une brebis.
  - type: text
    content: ' aux descendants de Hamor, fondateur de Sichem, la parcelle de terrain où il avait dressé ses tentes.'
  '2':
  - type: text
    content: 'Il plaça en tête les servantes et leurs enfants, puis Léa et les siens derrière eux et finalement Rachel et Joseph. '
  '20':
  - type: text
    content: Il y érigea un autel qu’il appela El-Elohé-Israël (Dieu est le Dieu d’Israël).
  '3':
  - type: text
    content: 'Lui-même passa devant eux. Il se prosterna sept fois jusqu’à terre avant d’arriver devant son frère. '
  '4':
  - type: text
    content: 'Esaü courut à sa rencontre, le prit dans ses bras, se jeta à son cou et l’embrassa. Tous deux se mirent à pleurer. '
  '5':
  - type: text
    content: Puis Esaü leva les yeux et vit les femmes et les enfants.
  - type: text
    content: – Qui sont ceux qui sont là avec toi ? demanda-t-il.
  - type: text
    content: 'Jacob répondit : Ce sont là les enfants que Dieu, dans sa grâce, a donnés à ton serviteur.'
  '6':
  - type: text
    content: 'Les servantes s’approchèrent avec leurs enfants et se prosternèrent. '
  '7':
  - type: text
    content: Puis Léa et ses enfants vinrent se prosterner et enfin Joseph et Rachel.
  '8':
  - type: text
    content: 'Esaü demanda : Que veux-tu faire avec tout ce camp que j’ai croisé ?'
  - type: text
    content: – C’est un cadeau pour obtenir la faveur de mon seigneur.
  '9':
  - type: text
    content: – J’ai beaucoup de biens, mon frère, dit Esaü, garde ce qui est à toi.
