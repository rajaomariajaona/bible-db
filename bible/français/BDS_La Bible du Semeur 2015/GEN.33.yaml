document_id: GEN.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jacob et Esaü : des retrouvailles dans la paix'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob regarda droit devant et aperçut Esaü qui arrivait avec quatre cents hommes. Alors, il répartit ses enfants entre Léa, Rachel et les deux servantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il plaça en tête les servantes et leurs enfants, puis Léa et les siens derrière eux et finalement Rachel et Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lui-même passa devant eux. Il se prosterna sept fois jusqu’à terre avant d’arriver devant son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esaü courut à sa rencontre, le prit dans ses bras, se jeta à son cou et l’embrassa. Tous deux se mirent à pleurer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Puis Esaü leva les yeux et vit les femmes et les enfants.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Qui sont ceux qui sont là avec toi ? demanda-t-il.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jacob répondit : Ce sont là les enfants que Dieu, dans sa grâce, a donnés à ton serviteur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les servantes s’approchèrent avec leurs enfants et se prosternèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Puis Léa et ses enfants vinrent se prosterner et enfin Joseph et Rachel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Esaü demanda : Que veux-tu faire avec tout ce camp que j’ai croisé ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – C’est un cadeau pour obtenir la faveur de mon seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – J’ai beaucoup de biens, mon frère, dit Esaü, garde ce qui est à toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– Non, dit Jacob, je t’en prie, si j’ai obtenu ta faveur, accepte mon présent, car je t’ai vu en face comme on regarde la face de Dieu, et tu m’as accueilli favorablement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Accepte donc, je te prie, le présent que je t’ai fait parvenir, car Dieu m’a accordé sa grâce et j’ai tout ce qu’il me faut.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il insista tant qu’Esaü finit par accepter '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et dit : Partons et marchons ensemble ; j’irai devant toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Jacob répondit : Mon seigneur sait que les enfants sont fragiles ; de plus, j’ai avec moi des brebis, des chèvres et des vaches qui allaitent ; si l’on forçait leur marche un seul jour, tout le troupeau périrait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que mon seigneur aille donc devant son serviteur, je te prie, et moi j’avancerai tout doucement au pas du troupeau qui me précède et de celui des enfants pour aller rejoindre mon seigneur à Séir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Esaü suggéra : Dans ce cas, je laisserai avec toi une partie de mes gens.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – A quoi bon, répondit Jacob, l’essentiel pour moi est d’avoir obtenu la faveur de mon seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob s’établit à Sichem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce même jour Esaü reprit le chemin de Séir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: tandis que Jacob partit pour Soukkoth (les Cabanes). Il s’y construisit une maison ; mais il bâtit aussi des cabanes pour son bétail, c’est pourquoi on nomma ce lieu Soukkoth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A son retour de Paddân-Aram, Jacob arriva sans encombre à la ville de Sichem, dans le pays de Canaan, et il établit son camp devant la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il acheta pour cent pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qésitas. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La valeur d’une pièce correspondait à celle d’une brebis.
    marker-yv: yv-n
  - type: text
    text: ' aux descendants de Hamor, fondateur de Sichem, la parcelle de terrain où il avait dressé ses tentes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il y érigea un autel qu’il appela El-Elohé-Israël (Dieu est le Dieu d’Israël).
