document_id: EZK.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement de Jérusalem
  - type: heading
    content: La vocation d’Ezéchiel
  - type: text
    content: Le cinquième jour du quatrième mois de la trentième année
  - type: note
    content: Probablement le quatrième mois de la trentième année de la vie d’Ezéchiel, l’âge auquel il aurait dû commencer à exercer ses fonctions sacerdotales (Nb 4.3).
  - type: text
    content: ', je me trouvais parmi les déportés, près du canal du Kebar'
  - type: note
    content: 'Le Kebar: grand canal relié à l’Euphrate, au sud de Babylone.'
  - type: text
    content: . Le ciel s’ouvrit et Dieu m’envoya des visions.
  '10':
  - type: text
    content: 'Leurs faces ressemblaient à celle d’un homme, et ils avaient tous les quatre une face de lion à droite, une face de taureau à gauche, et une face d’aigle. '
  '11':
  - type: text
    content: 'Chacun d’eux avait deux paires d’ailes : deux de ces ailes se déployaient vers le haut et chacune touchait une aile d’un autre être vivant de son côté, les deux autres couvraient leurs corps. '
  '12':
  - type: text
    content: Chacun d’eux avançait droit devant soi, ils allaient là où l’Esprit
  - type: note
    content: 'En hébreu, il y a un jeu sur les deux sens possibles du terme : vent et Esprit.'
  - type: text
    content: ' les poussait à aller sans qu’aucun d’eux ne se tourne pour se déplacer.'
  '13':
  - type: text
    content: Ces êtres vivants avaient l’aspect de braises
  - type: note
    content: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : au milieu de ces êtres vivants, il y avait des braises…'
  - type: text
    content: ' incandescentes, et de torches brillantes : ils paraissaient embrasés comme des torches brillantes. Le feu courait entre ces êtres vivants ; ils avaient l’éclat du feu et des éclairs jaillissaient de ce feu. '
  '14':
  - type: text
    content: Ces êtres couraient, allant et venant en tous sens, comme des éclairs.
  '15':
  - type: text
    content: 'En contemplant ces êtres vivants, j’aperçus à côté de chacun d’eux une roue qui touchait terre, vers leurs quatre faces. '
  '16':
  - type: text
    content: 'Les quatre roues étaient pareilles : elles semblaient faites en chrysolithe'
  - type: note
    content: Pierre précieuse importée d’Espagne.
  - type: text
    content: ' et paraissaient encastrées l’une au milieu de l’autre. '
  '17':
  - type: text
    content: 'Elles pouvaient donc se déplacer dans les quatre directions sans pivoter. '
  '18':
  - type: text
    content: 'Les jantes des quatre roues étaient d’une dimension énorme et terrifiante. Elles étaient couvertes d’yeux sur toute leur circonférence. '
  '19':
  - type: text
    content: 'Quand les êtres vivants se déplaçaient, les roues se déplaçaient à côté d’eux, et quand ils s’élevaient de terre, elles s’élevaient aussi. '
  '2':
  - type: text
    content: Le cinquième jour du mois de cette année-là, c’est-à-dire la cinquième année de la captivité du roi Yehoyakîn
  - type: note
    content: C’est-à-dire juillet 593 av. J.-C. Sur la captivité de Yehoyakîn, voir 2 R 24.8-17 ; 2 Ch 36.9-10.
  - type: text
    content: ', '
  '20':
  - type: text
    content: Ils allaient là où l’Esprit
  - type: note
    content: Voir 1.12 et note.
  - type: text
    content: ' les poussait à aller. Les roues s’élevaient en même temps qu’eux, car l’Esprit qui animait les êtres vivants animait aussi les roues. '
  '21':
  - type: text
    content: Quand les êtres vivants s’avançaient, se tenaient arrêtés ou s’élevaient de terre, les roues s’avançaient, se tenaient arrêtées ou s’élevaient de terre en même temps qu’eux, car l’Esprit qui animait les êtres vivants animait aussi les roues.
  '22':
  - type: text
    content: 'Au-dessus de la tête de ces êtres vivants s’étendait quelque chose qui ressemblait à une étendue céleste et qui avait l’éclat éblouissant du cristal. '
  '23':
  - type: text
    content: 'Sous cette étendue, ils tendaient leurs ailes jusqu’à toucher celles de leurs voisins, et chacun en avait deux qui lui couvraient le corps. '
  '24':
  - type: text
    content: 'Quand ils se déplaçaient, j’entendais le bruit de leurs ailes, un bruit semblable au grondement de grosses eaux ou à la voix du Tout-Puissant, c’était un bruit de grand tumulte comme celui d’un campement guerrier. Quand ils s’arrêtaient, ils abaissaient leurs ailes. '
  '25':
  - type: text
    content: 'Alors une voix retentit au-dessus de l’étendue céleste qui surplombait leur tête. '
  '26':
  - type: text
    content: 'Par-dessus cette étendue apparaissait comme une pierre de saphir qui avait la forme d’un trône, et au-dessus de ce qui ressemblait à un trône, au point le plus élevé, se tenait un être ayant l’aspect d’un homme. '
  '27':
  - type: text
    content: 'Je vis que la partie supérieure de son corps, au-dessus de ce qui ressemblait à sa taille, avait un éclat étincelant et l’aspect du feu tout autour, et la partie inférieure semblait comme baignée de feu et répandait autour d’elle une vive clarté. '
  '28':
  - type: text
    content: La clarté qui l’environnait avait l’aspect de l’arc-en-ciel qui resplendit dans les nuées en un jour de pluie. C’est ainsi que m’apparut ce qui ressemblait à la gloire de l’Eternel. A cette vue, je tombai la face contre terre, et j’entendis quelqu’un me parler.
  '3':
  - type: text
    content: l’Eternel adressa la parole à Ezéchiel, fils du prêtre Bouzi, au pays des Chaldéens, près du canal du Kebar. Là, la main de l’Eternel reposa sur lui.
  - type: heading
    content: Ezéchiel contemple la gloire de Dieu
  '4':
  - type: text
    content: Je vis soudain un vent de tempête venant du nord qui poussait devant lui un énorme nuage sillonné d’éclairs. Ce nuage était entouré d’une clarté éblouissante. En son centre, il y avait l’éclat d’un métal au milieu du feu
  - type: note
    content: Pour les v. 4-28, voir 10.1-22  ; cf. Ap 4.
  - type: text
    content: '. '
  '5':
  - type: text
    content: En son milieu, je distinguais quelque chose qui ressemblait à quatre êtres vivants ; par leur aspect, ils ressemblaient à des hommes
  - type: note
    content: Selon 10.15, ces êtres vivants sont des chérubins (voir Ex 25.17 et note).
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Chacun d’eux avait quatre faces et quatre ailes. '
  '7':
  - type: text
    content: 'Leurs jambes étaient droites ; leurs pieds étaient comme ceux d’un taureau et brillaient comme du bronze poli. '
  '8':
  - type: text
    content: 'Sous leurs ailes, et à leurs quatre côtés, apparaissaient des mains humaines, et chacun des quatre avait ses faces et ses ailes. '
  '9':
  - type: text
    content: 'Leurs ailes se touchaient l’une l’autre par leurs extrémités. Quand ils se déplaçaient, ils ne se tournaient pas, mais chacun avançait droit devant soi. '
