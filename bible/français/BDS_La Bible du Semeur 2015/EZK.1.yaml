document_id: EZK.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le jugement de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vocation d’Ezéchiel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le cinquième jour du quatrième mois de la trentième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probablement le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quatrième mois de la trentième année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de la vie d’Ezéchiel, l’âge auquel il aurait dû commencer à exercer ses fonctions sacerdotales (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 4.3
        metadata:
          usfm: NUM.4.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', je me trouvais parmi les déportés, près du canal du Kebar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Kebar
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: grand canal relié à l’Euphrate, au sud de Babylone.
    marker-yv: yv-n
  - type: text
    text: . Le ciel s’ouvrit et Dieu m’envoya des visions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le cinquième jour du mois de cette année-là, c’est-à-dire la cinquième année de la captivité du roi Yehoyakîn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire juillet 593 av. J.-C. Sur la captivité de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehoyakîn, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir 2 R 24.8-17 ; 2 Ch 36.9-10.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: l’Eternel adressa la parole à Ezéchiel, fils du prêtre Bouzi, au pays des Chaldéens, près du canal du Kebar. Là, la main de l’Eternel reposa sur lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezéchiel contemple la gloire de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je vis soudain un vent de tempête venant du nord qui poussait devant lui un énorme nuage sillonné d’éclairs. Ce nuage était entouré d’une clarté éblouissante. En son centre, il y avait l’éclat d’un métal au milieu du feu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 4-28, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10.1-22
        metadata:
          usfm: EZK.10.1+EZK.10.2+EZK.10.3+EZK.10.4+EZK.10.5+EZK.10.6+EZK.10.7+EZK.10.8+EZK.10.9+EZK.10.10+EZK.10.11+EZK.10.12+EZK.10.13+EZK.10.14+EZK.10.15+EZK.10.16+EZK.10.17+EZK.10.18+EZK.10.19+EZK.10.20+EZK.10.21+EZK.10.22
      - type: text
        text: '  ; cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 4
        metadata:
          usfm: REV.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En son milieu, je distinguais quelque chose qui ressemblait à quatre êtres vivants ; par leur aspect, ils ressemblaient à des hommes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.15'
        metadata:
          usfm: EZK.10.15
      - type: text
        text: ', ces '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'êtres vivants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chérubins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.17
        metadata:
          usfm: EXO.25.17
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Chacun d’eux avait quatre faces et quatre ailes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leurs jambes étaient droites ; leurs pieds étaient comme ceux d’un taureau et brillaient comme du bronze poli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sous leurs ailes, et à leurs quatre côtés, apparaissaient des mains humaines, et chacun des quatre avait ses faces et ses ailes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Leurs ailes se touchaient l’une l’autre par leurs extrémités. Quand ils se déplaçaient, ils ne se tournaient pas, mais chacun avançait droit devant soi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Leurs faces ressemblaient à celle d’un homme, et ils avaient tous les quatre une face de lion à droite, une face de taureau à gauche, et une face d’aigle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chacun d’eux avait deux paires d’ailes : deux de ces ailes se déployaient vers le haut et chacune touchait une aile d’un autre être vivant de son côté, les deux autres couvraient leurs corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Chacun d’eux avançait droit devant soi, ils allaient là où l’Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, il y a un jeu sur les deux sens possibles du terme : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Esprit.
    marker-yv: yv-n
  - type: text
    text: ' les poussait à aller sans qu’aucun d’eux ne se tourne pour se déplacer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ces êtres vivants avaient l’aspect de braises
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au milieu de ces êtres vivants, il y avait des braises…
    marker-yv: yv-n
  - type: text
    text: ' incandescentes, et de torches brillantes : ils paraissaient embrasés comme des torches brillantes. Le feu courait entre ces êtres vivants ; ils avaient l’éclat du feu et des éclairs jaillissaient de ce feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ces êtres couraient, allant et venant en tous sens, comme des éclairs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En contemplant ces êtres vivants, j’aperçus à côté de chacun d’eux une roue qui touchait terre, vers leurs quatre faces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les quatre roues étaient pareilles : elles semblaient faites en chrysolithe'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pierre précieuse importée d’Espagne.
    marker-yv: yv-n
  - type: text
    text: ' et paraissaient encastrées l’une au milieu de l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elles pouvaient donc se déplacer dans les quatre directions sans pivoter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les jantes des quatre roues étaient d’une dimension énorme et terrifiante. Elles étaient couvertes d’yeux sur toute leur circonférence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand les êtres vivants se déplaçaient, les roues se déplaçaient à côté d’eux, et quand ils s’élevaient de terre, elles s’élevaient aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils allaient là où l’Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.12'
        metadata:
          usfm: EZK.1.12
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' les poussait à aller. Les roues s’élevaient en même temps qu’eux, car l’Esprit qui animait les êtres vivants animait aussi les roues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quand les êtres vivants s’avançaient, se tenaient arrêtés ou s’élevaient de terre, les roues s’avançaient, se tenaient arrêtées ou s’élevaient de terre en même temps qu’eux, car l’Esprit qui animait les êtres vivants animait aussi les roues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au-dessus de la tête de ces êtres vivants s’étendait quelque chose qui ressemblait à une étendue céleste et qui avait l’éclat éblouissant du cristal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sous cette étendue, ils tendaient leurs ailes jusqu’à toucher celles de leurs voisins, et chacun en avait deux qui lui couvraient le corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand ils se déplaçaient, j’entendais le bruit de leurs ailes, un bruit semblable au grondement de grosses eaux ou à la voix du Tout-Puissant, c’était un bruit de grand tumulte comme celui d’un campement guerrier. Quand ils s’arrêtaient, ils abaissaient leurs ailes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors une voix retentit au-dessus de l’étendue céleste qui surplombait leur tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Par-dessus cette étendue apparaissait comme une pierre de saphir qui avait la forme d’un trône, et au-dessus de ce qui ressemblait à un trône, au point le plus élevé, se tenait un être ayant l’aspect d’un homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vis que la partie supérieure de son corps, au-dessus de ce qui ressemblait à sa taille, avait un éclat étincelant et l’aspect du feu tout autour, et la partie inférieure semblait comme baignée de feu et répandait autour d’elle une vive clarté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La clarté qui l’environnait avait l’aspect de l’arc-en-ciel qui resplendit dans les nuées en un jour de pluie. C’est ainsi que m’apparut ce qui ressemblait à la gloire de l’Eternel. A cette vue, je tombai la face contre terre, et j’entendis quelqu’un me parler.
