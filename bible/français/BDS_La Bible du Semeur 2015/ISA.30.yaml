document_id: ISA.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l’alliance avec l’Egypte
  - type: heading
    content: L’espérance illusoire
  - type: text
    content: Malheur aux fils rebelles,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: qui forment des projets ╵où je n’ai pas de part,
  - type: text
    content: qui concluent des traités
  - type: note
    content: Il s’agit d’un projet d’alliance avec l’Egypte.
  - type: text
    content: ' ╵contre ma volonté'
  - type: text
    content: pour ajouter ainsi ╵un péché à un autre !
  '10':
  - type: text
    content: 'qui disent aux prophètes : ╵« Ne prophétisez pas »,'
  - type: text
    content: 'et à ceux qui ont des révélations : ╵« Cessez de nous servir ╵des révélations vraies !'
  - type: text
    content: Annoncez-nous ╵des choses agréables,
  - type: text
    content: que vos révélations ╵nous bercent d’illusions !
  '11':
  - type: text
    content: Sortez des bons chemins,
  - type: text
    content: quittez les sentiers droits,
  - type: text
    content: cessez de nous importuner ╵avec le Saint, Dieu d’Israël. »
  '12':
  - type: text
    content: 'Par conséquent, ╵voici ce que déclare ╵le Dieu saint d’Israël :'
  - type: text
    content: Puisque vous méprisez ╵cet avertissement
  - type: text
    content: et que vous vous confiez ╵à la violence et aux intrigues,
  - type: text
    content: que vous comptez dessus,
  '13':
  - type: text
    content: à cause de cela, ╵ce péché deviendra pour vous
  - type: text
    content: 'comme une brèche ╵dans un mur élevé :'
  - type: text
    content: un renflement y apparaît
  - type: text
    content: et puis, soudain, ╵le voilà qui s’écroule,
  '14':
  - type: text
    content: et qui se brise ╵comme se brise ╵un vase de potier
  - type: text
    content: que l’on fracasse ╵sans nul ménagement,
  - type: text
    content: dans les débris duquel ╵on ne trouverait pas
  - type: text
    content: un tesson assez grand ╵pour ramasser des braises
  - type: text
    content: ou pour puiser ╵de l’eau à la citerne.
  - type: heading
    content: Calme et confiance
  '15':
  - type: text
    content: 'Car ainsi parle le Seigneur, ╵l’Eternel, le Saint d’Israël :'
  - type: text
    content: C’est si vous revenez à moi, ╵si vous restez tranquilles, ╵que vous serez sauvés,
  - type: text
    content: c’est dans le calme et la confiance ╵que sera votre force !
  - type: text
    content: Mais vous ne l’avez pas voulu
  '16':
  - type: text
    content: 'et vous avez dit : « Non, ╵nous fuirons à cheval ! »'
  - type: text
    content: 'Eh bien : Oui, vous fuirez !'
  - type: text
    content: 'Vous avez ajouté : ╵« Nous irons sur des chars rapides ! »'
  - type: text
    content: Eh bien ! Vos poursuivants ╵seront rapides, eux aussi !
  '17':
  - type: text
    content: Et mille hommes se sentiront ╵menacés par un seul,
  - type: text
    content: cinq soldats suffiront, ╵pour vous mettre en déroute.
  - type: text
    content: Il ne subsistera ╵que quelques rescapés
  - type: text
    content: qui seront comme un mât ╵en haut d’une montagne
  - type: text
    content: ou comme une bannière ╵au sommet d’un coteau.
  '18':
  - type: text
    content: Et pourtant, l’Eternel attend ╵le moment de vous faire grâce
  - type: text
    content: et il se lèvera ╵pour vous manifester ╵sa compassion,
  - type: text
    content: car l’Eternel est un Dieu juste.
  - type: text
    content: Heureux tous ceux ╵qui se confient en lui !
  - type: heading
    content: Dieu fera grâce
  '19':
  - type: text
    content: O peuple de Sion habitant à Jérusalem
  - type: note
    content: 'D’après l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : un peuple habitera à Sion, à Jérusalem.'
  - type: text
    content: ', tu ne pleureras plus ! Car Dieu te fera grâce quand tu crieras et, lorsqu’il t’entendra, il répondra à ton appel. '
  '2':
  - type: text
    content: Ils s’en vont en Egypte ╵sans m’avoir consulté
  - type: text
    content: pour se mettre en sécurité ╵auprès du pharaon
  - type: text
    content: et pour chercher refuge ╵à l’ombre de l’Egypte !
  '20':
  - type: text
    content: 'Car le Seigneur te donnera du pain dans la détresse et de l’eau dans l’angoisse. Oui, celui qui t’enseigne ne se dérobera plus, tu verras de tes yeux le maître qui t’instruit. '
  '21':
  - type: text
    content: 'Alors tu entendras dire derrière toi : C’est ici le chemin : suis-le, là, va à droite… là, va à gauche…'
  '22':
  - type: text
    content: 'Tu tiendras pour impur le placage d’argent recouvrant tes idoles, le revêtement d’or qui orne tes statues : tu les rejetteras comme une chose souillée, tu diras : Hors d’ici !'
  '23':
  - type: text
    content: 'Et Dieu accordera la pluie à la semence que tu mettras en terre. Aussi, la nourriture que produira la terre sera très riche et savoureuse, et ton bétail, en ce temps-là, paîtra dans de vastes prairies. '
  '24':
  - type: text
    content: 'Les bœufs comme les ânes qui labourent ton sol se nourriront de fourrage salé que l’on aura vanné à la fourche et au van. '
  '25':
  - type: text
    content: 'Au jour du grand massacre où les tours fortes tomberont, il y aura partout sur les hautes montagnes, sur toute colline élevée, des cours d’eau abondants. '
  '26':
  - type: text
    content: La lune brillera du même éclat que le soleil, et la lumière du soleil sera sept fois plus vive. Elle sera pareille à la lumière de sept jours au jour où l’Eternel pansera les plaies de son peuple, où il guérira les blessures entraînées par les coups qu’il a reçus.
  - type: heading
    content: Correction et salut
  '27':
  - type: text
    content: L’Eternel en personne ╵va venir d’un pays lointain,
  - type: text
    content: sa colère est ardente,
  - type: text
    content: oui, c’est un nuage oppressant
  - type: note
    content: 'Autre traduction : et écrasante.'
  - type: text
    content: .
  - type: text
    content: Quand il parle, ses lèvres ╵sont chargées de courroux
  - type: text
    content: et sa langue est pareille ╵à un feu qui consume.
  '28':
  - type: text
    content: Son souffle est comme un torrent qui déborde
  - type: text
    content: et dont l’eau atteint jusqu’au cou.
  - type: text
    content: Il va passer les peuples ╵au crible destructeur
  - type: text
    content: et mettre à leurs mâchoires
  - type: text
    content: un mors d’égarement.
  '29':
  - type: text
    content: Cependant, parmi vous ╵retentiront des chants
  - type: text
    content: comme en la nuit de fête
  - type: note
    content: Peut-être la Pâque, à laquelle il est fait allusion en 31.5. D’autres pensent à la fête des Cabanes.
  - type: text
    content: ','
  - type: text
    content: et vous vous réjouirez
  - type: text
    content: comme celui qui monte ╵au son des flûtes,
  - type: text
    content: au mont de l’Eternel
  - type: text
    content: et vers le rocher d’Israël.
  '3':
  - type: text
    content: Le refuge du pharaon ╵sera sujet de honte,
  - type: text
    content: l’abri que vous cherchez ╵à l’ombre de l’Egypte ╵vous plongera ╵dans une grande confusion.
  '30':
  - type: text
    content: L’Eternel fera retentir ╵sa voix majestueuse
  - type: text
    content: et l’on verra son bras s’abattre
  - type: text
    content: dans le déchaînement de sa colère
  - type: text
    content: et dans l’embrasement ╵de son feu qui consume,
  - type: text
    content: du sein de la tornade, ╵de la tempête et de la grêle.
  '31':
  - type: text
    content: Alors Assur sera terrorisée
  - type: text
    content: en entendant la voix ╵de l’Eternel
  - type: text
    content: lorsqu’il le frappera ╵de son bâton.
  '32':
  - type: text
    content: Et à chaque coup de bâton ╵que l’Eternel lui administrera
  - type: text
    content: afin de le châtier,
  - type: text
    content: on fera retentir ╵les tambourins, les lyres.
  - type: text
    content: Et l’Eternel lui-même ╵combattra contre lui ╵par des coups redoublés.
  '33':
  - type: text
    content: Déjà, depuis longtemps, ╵le bûcher est dressé,
  - type: text
    content: il est prêt aussi pour le roi
  - type: note
    content: Pour le roi d’Assyrie.
  - type: text
    content: ','
  - type: text
    content: il est profond et large,
  - type: text
    content: le bois est empilé ╵en quantité, ╵le feu est prêt
  - type: text
    content: et le souffle de l’Eternel ╵comme un torrent de soufre ╵l’embrasera.
  '4':
  - type: text
    content: Oui, vos ministres ╵sont déjà à Tsoân
  - type: text
    content: et vos ambassadeurs ╵parviennent à Hanès
  - type: note
    content: 'Tsoân: voir 19.11 et note. Hanès était située plus au sud et à l’ouest.'
  - type: text
    content: .
  '5':
  - type: text
    content: 'Mais tous seront honteux ╵à cause de ce peuple :'
  - type: text
    content: il ne leur sera d’aucune aide,
  - type: text
    content: d’aucun secours, ╵d’aucune utilité,
  - type: text
    content: mais il fera leur honte ╵et leur fera perdre la face.
  '6':
  - type: text
    content: 'Oracle au sujet des bêtes du Néguev :'
  - type: text
    content: A travers un pays ╵de détresse et d’angoisse,
  - type: text
    content: dans le pays du lion, ╵oui, du lion rugissant,
  - type: text
    content: dans le pays de la vipère ╵et du serpent volant,
  - type: text
    content: ils portent leurs richesses ╵sur l’échine des ânes,
  - type: text
    content: et leurs trésors ╵sur le dos des chameaux
  - type: text
    content: en cadeau à un peuple ╵qui ne peut rien pour eux.
  '7':
  - type: text
    content: Le secours de l’Egypte ╵est vain et illusoire,
  - type: text
    content: 'c’est pourquoi je l’appelle :'
  - type: text
    content: « Rahav, l’Agitée au repos
  - type: note
    content: L’Agitée se dit en hébreu rahav. Esaïe joue ici avec le mot Rahav, nom d’un monstre mythique de la mer, qui est parfois donné à l’Egypte dans l’Ancien Testament (voir Ps 87.4 et la note ; 89.11 ; Es 51.9).
  - type: text
    content: '  ».'
  - type: heading
    content: Un peuple rebelle
  '8':
  - type: text
    content: Viens maintenant, grave cela
  - type: text
    content: en leur présence sur une tablette,
  - type: text
    content: inscris-le sur un document
  - type: text
    content: afin que cela serve de témoin ╵pour les jours à venir,
  - type: text
    content: et à toujours,
  '9':
  - type: text
    content: car c’est un peuple révolté,
  - type: text
    content: ce sont des fils trompeurs
  - type: text
    content: et qui refusent d’écouter ╵la Loi de l’Eternel,
