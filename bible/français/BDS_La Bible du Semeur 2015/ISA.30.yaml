document_id: ISA.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre l’alliance avec l’Egypte
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’espérance illusoire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur aux fils rebelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui forment des projets ╵où je n’ai pas de part,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui concluent des traités
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit d’un projet d’alliance avec l’Egypte.
    marker-yv: yv-n
  - type: text
    text: ' ╵contre ma volonté'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ajouter ainsi ╵un péché à un autre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils s’en vont en Egypte ╵sans m’avoir consulté
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour se mettre en sécurité ╵auprès du pharaon
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour chercher refuge ╵à l’ombre de l’Egypte !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le refuge du pharaon ╵sera sujet de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’abri que vous cherchez ╵à l’ombre de l’Egypte ╵vous plongera ╵dans une grande confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, vos ministres ╵sont déjà à Tsoân
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos ambassadeurs ╵parviennent à Hanès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsoân
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.11'
        metadata:
          usfm: ISA.19.11
      - type: text
        text: ' et note. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hanès '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était située plus au sud et à l’ouest.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais tous seront honteux ╵à cause de ce peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne leur sera d’aucune aide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’aucun secours, ╵d’aucune utilité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il fera leur honte ╵et leur fera perdre la face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Oracle au sujet des bêtes du Néguev :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A travers un pays ╵de détresse et d’angoisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le pays du lion, ╵oui, du lion rugissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le pays de la vipère ╵et du serpent volant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils portent leurs richesses ╵sur l’échine des ânes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs trésors ╵sur le dos des chameaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: en cadeau à un peuple ╵qui ne peut rien pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le secours de l’Egypte ╵est vain et illusoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c’est pourquoi je l’appelle :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Rahav, l’Agitée au repos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'L’Agitée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se dit en hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rahav. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Esaïe joue ici avec le mot Rahav, nom d’un monstre mythique de la mer, qui est parfois donné à l’Egypte dans l’Ancien Testament (voir Ps 87.4 et la note ; 89.11 ; Es 51.9).
    marker-yv: yv-n
  - type: text
    text: '  ».'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un peuple rebelle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Viens maintenant, grave cela
- type: usfm
  marker: q1
  children:
  - type: text
    text: en leur présence sur une tablette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: inscris-le sur un document
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que cela serve de témoin ╵pour les jours à venir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à toujours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: car c’est un peuple révolté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des fils trompeurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui refusent d’écouter ╵la Loi de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'qui disent aux prophètes : ╵« Ne prophétisez pas »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à ceux qui ont des révélations : ╵« Cessez de nous servir ╵des révélations vraies !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Annoncez-nous ╵des choses agréables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vos révélations ╵nous bercent d’illusions !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sortez des bons chemins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quittez les sentiers droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cessez de nous importuner ╵avec le Saint, Dieu d’Israël. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Par conséquent, ╵voici ce que déclare ╵le Dieu saint d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous méprisez ╵cet avertissement
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que vous vous confiez ╵à la violence et aux intrigues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vous comptez dessus,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: à cause de cela, ╵ce péché deviendra pour vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'comme une brèche ╵dans un mur élevé :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: un renflement y apparaît
- type: usfm
  marker: q1
  children:
  - type: text
    text: et puis, soudain, ╵le voilà qui s’écroule,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et qui se brise ╵comme se brise ╵un vase de potier
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’on fracasse ╵sans nul ménagement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les débris duquel ╵on ne trouverait pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: un tesson assez grand ╵pour ramasser des braises
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou pour puiser ╵de l’eau à la citerne.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Calme et confiance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car ainsi parle le Seigneur, ╵l’Eternel, le Saint d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est si vous revenez à moi, ╵si vous restez tranquilles, ╵que vous serez sauvés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est dans le calme et la confiance ╵que sera votre force !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous ne l’avez pas voulu
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et vous avez dit : « Non, ╵nous fuirons à cheval ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Eh bien : Oui, vous fuirez !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous avez ajouté : ╵« Nous irons sur des chars rapides ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien ! Vos poursuivants ╵seront rapides, eux aussi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et mille hommes se sentiront ╵menacés par un seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cinq soldats suffiront, ╵pour vous mettre en déroute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne subsistera ╵que quelques rescapés
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui seront comme un mât ╵en haut d’une montagne
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme une bannière ╵au sommet d’un coteau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et pourtant, l’Eternel attend ╵le moment de vous faire grâce
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il se lèvera ╵pour vous manifester ╵sa compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel est un Dieu juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux tous ceux ╵qui se confient en lui !
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu fera grâce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O peuple de Sion habitant à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque et la version syriaque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un peuple habitera à Sion, à Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ', tu ne pleureras plus ! Car Dieu te fera grâce quand tu crieras et, lorsqu’il t’entendra, il répondra à ton appel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car le Seigneur te donnera du pain dans la détresse et de l’eau dans l’angoisse. Oui, celui qui t’enseigne ne se dérobera plus, tu verras de tes yeux le maître qui t’instruit. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors tu entendras dire derrière toi : C’est ici le chemin : suis-le, là, va à droite… là, va à gauche…'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu tiendras pour impur le placage d’argent recouvrant tes idoles, le revêtement d’or qui orne tes statues : tu les rejetteras comme une chose souillée, tu diras : Hors d’ici !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et Dieu accordera la pluie à la semence que tu mettras en terre. Aussi, la nourriture que produira la terre sera très riche et savoureuse, et ton bétail, en ce temps-là, paîtra dans de vastes prairies. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les bœufs comme les ânes qui labourent ton sol se nourriront de fourrage salé que l’on aura vanné à la fourche et au van. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Au jour du grand massacre où les tours fortes tomberont, il y aura partout sur les hautes montagnes, sur toute colline élevée, des cours d’eau abondants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La lune brillera du même éclat que le soleil, et la lumière du soleil sera sept fois plus vive. Elle sera pareille à la lumière de sept jours au jour où l’Eternel pansera les plaies de son peuple, où il guérira les blessures entraînées par les coups qu’il a reçus.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Correction et salut
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’Eternel en personne ╵va venir d’un pays lointain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa colère est ardente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, c’est un nuage oppressant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et écrasante.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il parle, ses lèvres ╵sont chargées de courroux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa langue est pareille ╵à un feu qui consume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Son souffle est comme un torrent qui déborde
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont l’eau atteint jusqu’au cou.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va passer les peuples ╵au crible destructeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mettre à leurs mâchoires
- type: usfm
  marker: q1
  children:
  - type: text
    text: un mors d’égarement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Cependant, parmi vous ╵retentiront des chants
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme en la nuit de fête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peut-être la Pâque, à laquelle il est fait allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31.5'
        metadata:
          usfm: ISA.31.5
      - type: text
        text: . D’autres pensent à la fête des Cabanes.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous vous réjouirez
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme celui qui monte ╵au son des flûtes,
