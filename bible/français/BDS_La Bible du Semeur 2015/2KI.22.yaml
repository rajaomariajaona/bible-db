document_id: 2KI.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne de Josias sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 34.1-2,  8-28)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Josias avait huit ans à son avènement et il régna trente et un ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 640 à 609 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. Sa mère s’appelait Yedida, elle était fille d’Adaya de Botsqath. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Puis il ajouta : Le prêtre Hilqiya m’a remis un livre.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Shaphân se mit à en faire la lecture devant le roi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’intervention de la prophétesse Houlda
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lorsque Josias entendit le contenu du livre de la Loi, il déchira ses vêtements. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Puis il convoqua le prêtre Hilqiya, Ahiqam, fils de Shaphân, Akbor, fils de Michée, Shaphân, le secrétaire et Asaya, l’un des ministres.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: – Allez consulter l’Eternel pour moi, leur dit-il, ainsi que pour le peuple et pour tout Juda, au sujet des enseignements de ce livre que l’on vient de retrouver. Car la colère de l’Eternel est bien grande. Elle s’est enflammée contre nous, parce que nos ancêtres n’ont pas obéi aux paroles de ce livre et n’ont pas appliqué tout ce qui y est écrit.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors le prêtre Hilqiya, Ahiqam, Akbor, Shaphân et Asaya se rendirent chez la prophétesse Houlda, femme de Shalloum, fils de Tiqva, petit-fils de Harhas, responsable du vestiaire du Temple. Elle habitait à Jérusalem dans le nouveau quartier. Ils lui exposèrent la situation. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors Houlda leur dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Annoncez à l’homme qui vous a envoyés à moi : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Eternel dit : Je vais faire venir un malheur sur cette contrée et sur ses habitants : tout ce qui est prévu dans le livre que vient de lire le roi de Juda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, parce qu’ils m’ont abandonné et qu’ils ont fait brûler des parfums à d’autres dieux, et parce qu’ils m’ont ainsi irrité par toute leur conduite, ma colère s’est enflammée contre ce lieu et elle n’est pas près de s’apaiser. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais vous direz au roi de Juda qui vous a envoyés pour consulter l’Eternel : Voici ce que déclare l’Eternel, le Dieu d’Israël : Tu as entendu les paroles contenues dans ce livre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ton cœur s’est laissé toucher, tu t’es humilié devant moi en entendant ce que j’ai décrété contre ce lieu et contre ses habitants, à savoir la dévastation et la malédiction. Tu as déchiré tes vêtements et tu as pleuré devant moi. De mon côté, moi aussi, j’ai entendu ta prière – l’Eternel le déclare ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il fit ce que l’Eternel considère comme juste et suivit en tout l’exemple de son ancêtre David sans jamais s’en écarter ni d’un côté ni de l’autre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La découverte du livre de la Loi
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: C’est pourquoi je te ferai rejoindre tes ancêtres décédés et tu seras déposé paisiblement dans l’un de tes tombeaux, sans avoir vu tout le malheur que je vais amener sur cette contrée. »
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les envoyés rapportèrent cette réponse au roi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: La dix-huitième année de son règne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en 622 av. J.-C. A 16 ans, il commença à servir fidèlement le Seigneur et à 20 ans, il entreprit de purifier le pays des pratiques idolâtres (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 34.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', Josias envoya son secrétaire Shaphân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Partisan de la Réforme de Josias, protecteur de Jérémie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 26.24
        - type: text
          text: ), père de Guedalia qui sera le futur gouverneur de Juda nommé par Nabuchodonosor (25.22 ; Jr 39.14).
      marker-yv: yv-n
    - type: text
      text: ', fils d’Atsalia et petit-fils de Meshoullam, au temple de l’Eternel. Il lui dit : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Va trouver le grand-prêtre Hilqiya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Père d’Azaria et grand-père de Seraya, le grand-prêtre exécuté au temps de la destruction de Jérusalem par les Babyloniens (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 25.18-20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et demande-lui de compter tout l’argent qui a été apporté dans le temple de l’Eternel et que les portiers ont recueilli. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Que l’on remette cet argent aux entrepreneurs qui ont la responsabilité des travaux dans le temple de l’Eternel. Ceux-ci paieront les ouvriers qui effectuent les réparations dans le Temple : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'les charpentiers, les ouvriers du bâtiment, les maçons. Ils achèteront aussi le bois et les pierres de taille pour consolider l’édifice. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: On ne leur demandera pas de compte pour l’argent qui leur est confié, car ce sont des gens honnêtes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A cette occasion, le grand-prêtre Hilqiya annonça à Shaphân, le secrétaire : J’ai trouvé le livre de la Loi dans le temple de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce qui révèle la gravité de la révolte contre l’Eternel sous Manassé. Le livre retrouvé était, soit l’ensemble du Pentateuque, soit uniquement le livre du Deutéronome.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Hilqiya remit le livre à Shaphân. Celui-ci le lut, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'puis il se rendit auprès du roi pour lui faire un rapport : Tes serviteurs, dit-il, ont versé l’argent qui se trouvait dans le Temple aux entrepreneurs responsables des travaux dans le Temple. '
