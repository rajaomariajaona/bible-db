document_id: 2KI.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Josias sur Juda
  - type: heading
    content: (2 Ch 34.1-2,  8-28)
  - type: text
    content: Josias avait huit ans à son avènement et il régna trente et un ans à Jérusalem
  - type: note
    content: De 640 à 609 av. J.-C.
  - type: text
    content: '. Sa mère s’appelait Yedida, elle était fille d’Adaya de Botsqath. '
  '10':
  - type: text
    content: 'Puis il ajouta : Le prêtre Hilqiya m’a remis un livre.'
  - type: text
    content: Et Shaphân se mit à en faire la lecture devant le roi.
  - type: heading
    content: L’intervention de la prophétesse Houlda
  '11':
  - type: text
    content: 'Lorsque Josias entendit le contenu du livre de la Loi, il déchira ses vêtements. '
  '12':
  - type: text
    content: Puis il convoqua le prêtre Hilqiya, Ahiqam, fils de Shaphân, Akbor, fils de Michée, Shaphân, le secrétaire et Asaya, l’un des ministres.
  '13':
  - type: text
    content: – Allez consulter l’Eternel pour moi, leur dit-il, ainsi que pour le peuple et pour tout Juda, au sujet des enseignements de ce livre que l’on vient de retrouver. Car la colère de l’Eternel est bien grande. Elle s’est enflammée contre nous, parce que nos ancêtres n’ont pas obéi aux paroles de ce livre et n’ont pas appliqué tout ce qui y est écrit.
  '14':
  - type: text
    content: 'Alors le prêtre Hilqiya, Ahiqam, Akbor, Shaphân et Asaya se rendirent chez la prophétesse Houlda, femme de Shalloum, fils de Tiqva, petit-fils de Harhas, responsable du vestiaire du Temple. Elle habitait à Jérusalem dans le nouveau quartier. Ils lui exposèrent la situation. '
  '15':
  - type: text
    content: 'Alors Houlda leur dit : Voici ce que déclare l’Eternel, le Dieu d’Israël : « Annoncez à l’homme qui vous a envoyés à moi : '
  '16':
  - type: text
    content: 'L’Eternel dit : Je vais faire venir un malheur sur cette contrée et sur ses habitants : tout ce qui est prévu dans le livre que vient de lire le roi de Juda. '
  '17':
  - type: text
    content: 'En effet, parce qu’ils m’ont abandonné et qu’ils ont fait brûler des parfums à d’autres dieux, et parce qu’ils m’ont ainsi irrité par toute leur conduite, ma colère s’est enflammée contre ce lieu et elle n’est pas près de s’apaiser. '
  '18':
  - type: text
    content: 'Mais vous direz au roi de Juda qui vous a envoyés pour consulter l’Eternel : Voici ce que déclare l’Eternel, le Dieu d’Israël : Tu as entendu les paroles contenues dans ce livre. '
  '19':
  - type: text
    content: 'Ton cœur s’est laissé toucher, tu t’es humilié devant moi en entendant ce que j’ai décrété contre ce lieu et contre ses habitants, à savoir la dévastation et la malédiction. Tu as déchiré tes vêtements et tu as pleuré devant moi. De mon côté, moi aussi, j’ai entendu ta prière – l’Eternel le déclare ! '
  '2':
  - type: text
    content: Il fit ce que l’Eternel considère comme juste et suivit en tout l’exemple de son ancêtre David sans jamais s’en écarter ni d’un côté ni de l’autre.
  - type: heading
    content: La découverte du livre de la Loi
  '20':
  - type: text
    content: C’est pourquoi je te ferai rejoindre tes ancêtres décédés et tu seras déposé paisiblement dans l’un de tes tombeaux, sans avoir vu tout le malheur que je vais amener sur cette contrée. »
  - type: text
    content: Les envoyés rapportèrent cette réponse au roi.
  '3':
  - type: text
    content: La dix-huitième année de son règne
  - type: note
    content: C’est-à-dire en 622 av. J.-C. A 16 ans, il commença à servir fidèlement le Seigneur et à 20 ans, il entreprit de purifier le pays des pratiques idolâtres (2 Ch 34.3).
  - type: text
    content: ', Josias envoya son secrétaire Shaphân'
  - type: note
    content: Partisan de la Réforme de Josias, protecteur de Jérémie (Jr 26.24), père de Guedalia qui sera le futur gouverneur de Juda nommé par Nabuchodonosor (25.22 ; Jr 39.14).
  - type: text
    content: ', fils d’Atsalia et petit-fils de Meshoullam, au temple de l’Eternel. Il lui dit : '
  '4':
  - type: text
    content: Va trouver le grand-prêtre Hilqiya
  - type: note
    content: Père d’Azaria et grand-père de Seraya, le grand-prêtre exécuté au temps de la destruction de Jérusalem par les Babyloniens (25.18-20).
  - type: text
    content: ' et demande-lui de compter tout l’argent qui a été apporté dans le temple de l’Eternel et que les portiers ont recueilli. '
  '5':
  - type: text
    content: 'Que l’on remette cet argent aux entrepreneurs qui ont la responsabilité des travaux dans le temple de l’Eternel. Ceux-ci paieront les ouvriers qui effectuent les réparations dans le Temple : '
  '6':
  - type: text
    content: 'les charpentiers, les ouvriers du bâtiment, les maçons. Ils achèteront aussi le bois et les pierres de taille pour consolider l’édifice. '
  '7':
  - type: text
    content: On ne leur demandera pas de compte pour l’argent qui leur est confié, car ce sont des gens honnêtes.
  '8':
  - type: text
    content: 'A cette occasion, le grand-prêtre Hilqiya annonça à Shaphân, le secrétaire : J’ai trouvé le livre de la Loi dans le temple de l’Eternel'
  - type: note
    content: Ce qui révèle la gravité de la révolte contre l’Eternel sous Manassé. Le livre retrouvé était, soit l’ensemble du Pentateuque, soit uniquement le livre du Deutéronome.
  - type: text
    content: .
  - type: text
    content: 'Et Hilqiya remit le livre à Shaphân. Celui-ci le lut, '
  '9':
  - type: text
    content: 'puis il se rendit auprès du roi pour lui faire un rapport : Tes serviteurs, dit-il, ont versé l’argent qui se trouvait dans le Temple aux entrepreneurs responsables des travaux dans le Temple. '
