document_id: PSA.65,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tu nous donnes l’abondance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Un psaume de David. Cantique.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tu prends soin de la terre ╵et tu l’abreuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la combles d’abondantes richesses !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu, ton ruisseau ╵est rempli d’eau :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fertilisant ainsi la terre, ╵tu fais pousser le blé ╵pour les humains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu fais regorger d’eau ╵tous ses sillons. ╵Tu aplanis ses mottes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu l’amollis par les averses, ╵et tu bénis ce qui y germe.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Tu couronnes l’année ╵de tes bienfaits ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et partout où tu passes, ╵la terre est engraissée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les pâturages des steppes ruissellent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les coteaux ╵se revêtent de joie.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les prés se couvrent ╵de moutons et de chèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'les vallées se drapent de blé :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout chante et pousse des clameurs de joie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Compter sur toi, ╵dans la quiétude : ╵c’est la louange'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le silence est louange. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la louange te sied.
      marker-yv: yv-n
    - type: text
      text: ' ╵que nous t’offrons, ╵Dieu, en Sion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les vœux que nous t’avons faits, ╵nous les accomplirons.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Toi qui écoutes les prières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le monde viendra vers toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le poids des fautes ╵pèse sur moi : ╵il est trop lourd,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu pardonnes ╵tous nos péchés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Heureux celui ╵que tu choisis ╵pour l’inviter ╵auprès de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à demeurer ╵dans tes parvis !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous y serons comblés ╵des bienfaits de ton temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la sainteté ╵de ton palais.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dans ta justice, ╵tu nous réponds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des interventions terribles, ╵ô Dieu sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi en qui mettent leur espoir ╵les hommes jusqu’aux confins de la terre, ╵jusqu’au-delà des mers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Par son pouvoir, ╵il établit fermement les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est revêtu de puissance,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: il calme le fracas des mers, ╵tout le mugissement de leurs vagues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les peuples tumultueux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ceux qui habitent ╵au bout du monde ╵sont saisis d’une grande crainte ╵en voyant tes prodiges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais crier de joie ╵le levant, le couchant.
