document_id: PSA.65,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu nous donnes l’abondance
  - type: text
    content: Au chef de chœur. Un psaume de David. Cantique.
  '10':
  - type: text
    content: Tu prends soin de la terre ╵et tu l’abreuves.
  - type: text
    content: Tu la combles d’abondantes richesses !
  - type: text
    content: 'Dieu, ton ruisseau ╵est rempli d’eau :'
  - type: text
    content: fertilisant ainsi la terre, ╵tu fais pousser le blé ╵pour les humains.
  '11':
  - type: text
    content: Tu fais regorger d’eau ╵tous ses sillons. ╵Tu aplanis ses mottes,
  - type: text
    content: tu l’amollis par les averses, ╵et tu bénis ce qui y germe.
  '12':
  - type: text
    content: Tu couronnes l’année ╵de tes bienfaits ;
  - type: text
    content: et partout où tu passes, ╵la terre est engraissée.
  '13':
  - type: text
    content: Les pâturages des steppes ruissellent,
  - type: text
    content: et les coteaux ╵se revêtent de joie.
  '14':
  - type: text
    content: Les prés se couvrent ╵de moutons et de chèvres,
  - type: text
    content: 'les vallées se drapent de blé :'
  - type: text
    content: tout chante et pousse des clameurs de joie.
  '2':
  - type: text
    content: 'Compter sur toi, ╵dans la quiétude : ╵c’est la louange'
  - type: note
    content: 'Autre traduction : le silence est louange. Les versions anciennes ont : la louange te sied.'
  - type: text
    content: ' ╵que nous t’offrons, ╵Dieu, en Sion.'
  - type: text
    content: Et les vœux que nous t’avons faits, ╵nous les accomplirons.
  '3':
  - type: text
    content: Toi qui écoutes les prières,
  - type: text
    content: tout le monde viendra vers toi.
  '4':
  - type: text
    content: 'Le poids des fautes ╵pèse sur moi : ╵il est trop lourd,'
  - type: text
    content: mais tu pardonnes ╵tous nos péchés.
  '5':
  - type: text
    content: Heureux celui ╵que tu choisis ╵pour l’inviter ╵auprès de toi
  - type: text
    content: à demeurer ╵dans tes parvis !
  - type: text
    content: Nous y serons comblés ╵des bienfaits de ton temple,
  - type: text
    content: et de la sainteté ╵de ton palais.
  '6':
  - type: text
    content: Dans ta justice, ╵tu nous réponds
  - type: text
    content: par des interventions terribles, ╵ô Dieu sauveur,
  - type: text
    content: toi en qui mettent leur espoir ╵les hommes jusqu’aux confins de la terre, ╵jusqu’au-delà des mers.
  '7':
  - type: text
    content: Par son pouvoir, ╵il établit fermement les montagnes.
  - type: text
    content: Il est revêtu de puissance,
  '8':
  - type: text
    content: il calme le fracas des mers, ╵tout le mugissement de leurs vagues,
  - type: text
    content: et les peuples tumultueux.
  '9':
  - type: text
    content: Ceux qui habitent ╵au bout du monde ╵sont saisis d’une grande crainte ╵en voyant tes prodiges.
  - type: text
    content: Tu fais crier de joie ╵le levant, le couchant.
