  - type: heading
    content: La mise en service du tabernacle et de l’autel
  - type: heading
    content: Offrandes pour la consécration du tabernacle
  - type: text
    content: Le jour où Moïse acheva de dresser le tabernacle, il versa de l’huile dessus pour le consacrer et fit de même pour ses accessoires ainsi que pour l’autel et tous ses accessoires. Il les oignit d’huile pour les consacrer
  - type: note
    content: Voir, pour les détails, Ex 40. Pour la consécration des prêtres, voir Lv 8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Les chefs présentèrent leur offrande pour la dédicace de l’autel le jour où l’on en fit l’onction. Ils apportèrent leurs présents devant l’autel. '
  '11':
  - type: text
    content: 'Alors l’Eternel dit à Moïse : Que les chefs viennent à tour de rôle, un par jour, apporter leur offrande pour la dédicace de l’autel.'
  '12':
  - type: text
    content: Le premier jour, Nahshôn, fils d’Amminadab, vint présenter son offrande pour la tribu de Juda.
  '13':
  - type: text
    content: Elle consistait en un plat d’argent pesant 1,5 kilogramme
  - type: note
    content: Dans tout ce chapitre, les poids sont donnés en sicles.
  - type: text
    content: ', un calice d’argent de 800 grammes, selon le poids utilisé au sanctuaire, tous deux remplis de fleur de farine pétrie à l’huile, pour l’offrande, '
  '14':
  - type: text
    content: 'et une coupe d’or de 110 grammes pleine d’encens. '
  '15':
  - type: text
    content: 'Il amena aussi un jeune taureau, un bélier et un agneau dans sa première année pour l’holocauste, '
  '16':
