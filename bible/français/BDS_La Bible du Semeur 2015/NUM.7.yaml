  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: 'Elle consistait en un plat d’argent pesant 1,5 kilogramme, un calice d’argent de 800 grammes, selon le poids utilisé au sanctuaire, tous deux remplis de fleur de farine pétrie à l’huile, pour l’offrande, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: 'et une coupe d’or de 110 grammes pleine d’encens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: 'Il amena aussi un jeune taureau, un bélier et un agneau dans sa première année pour l’holocauste, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: 'un bouc comme sacrifice pour le péché '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: et deux taureaux, cinq béliers, cinq boucs et cinq agneaux dans leur première année pour le sacrifice de communion. Telle fut l’offrande d’Ahira, fils d’Enân.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: 'En tout, pour la dédicace de l’autel le jour où l’on en fit l’onction, les chefs d’Israël offrirent donc douze plats d’argent, douze calices d’argent et douze coupes d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: 'Chaque plat pesait 1,5 kilogramme et chaque calice 800 grammes, ils offrirent donc en tout 27,5 kilogrammes d’argent selon l’unité de poids du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: 'Chaque coupe pesait 110 grammes, ils offrirent donc en tout 1 300 grammes d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: 'Pour les holocaustes, ils apportèrent douze taureaux, douze béliers et douze agneaux dans leur première année avec les offrandes qui les accompagnent et douze boucs pour le sacrifice pour le péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: Pour le sacrifice de communion, ils offrirent vingt-quatre taureaux, soixante béliers, soixante boucs et soixante agneaux d’un an. Tels furent les présents offerts pour la dédicace de l’autel, après son onction.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel et Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: Lorsque Moïse entrait dans la tente de la Rencontre pour parler avec l’Eternel, il entendait la voix qui lui parlait d’au-dessus du propitiatoire placé sur le coffre de l’acte de l’alliance entre les deux chérubins. Et il lui parlait.
