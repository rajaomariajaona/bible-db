  '84':
  - type: text
    content: 'En tout, pour la dédicace de l’autel le jour où l’on en fit l’onction, les chefs d’Israël offrirent donc douze plats d’argent, douze calices d’argent et douze coupes d’or. '
  '85':
  - type: text
    content: 'Chaque plat pesait 1,5 kilogramme et chaque calice 800 grammes, ils offrirent donc en tout 27,5 kilogrammes d’argent selon l’unité de poids du sanctuaire. '
  '86':
  - type: text
    content: 'Chaque coupe pesait 110 grammes, ils offrirent donc en tout 1 300 grammes d’or. '
  '87':
  - type: text
    content: 'Pour les holocaustes, ils apportèrent douze taureaux, douze béliers et douze agneaux dans leur première année avec les offrandes qui les accompagnent et douze boucs pour le sacrifice pour le péché. '
  '88':
  - type: text
    content: Pour le sacrifice de communion, ils offrirent vingt-quatre taureaux, soixante béliers, soixante boucs et soixante agneaux d’un an. Tels furent les présents offerts pour la dédicace de l’autel, après son onction.
  - type: heading
    content: L’Eternel et Moïse
  '89':
  - type: text
    content: Lorsque Moïse entrait dans la tente de la Rencontre pour parler avec l’Eternel, il entendait la voix qui lui parlait d’au-dessus du propitiatoire placé sur le coffre de l’acte de l’alliance entre les deux chérubins. Et il lui parlait.
  '9':
  - type: text
    content: Il n’en donna pas aux Qehatites, car ils étaient responsables des objets sacrés et devaient les porter sur les épaules.
