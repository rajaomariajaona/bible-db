document_id: NUM.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mise en place des institutions cultuelles
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mise en service du tabernacle et de l’autel
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Offrandes pour la consécration du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le jour où Moïse acheva de dresser le tabernacle, il versa de l’huile dessus pour le consacrer et fit de même pour ses accessoires ainsi que pour l’autel et tous ses accessoires. Il les oignit d’huile pour les consacrer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir, pour les détails, '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 40
        metadata:
          usfm: EXO.40
      - type: text
        text: '. Pour la consécration des prêtres, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 8
        metadata:
          usfm: LEV.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors les chefs d’Israël, chefs de leurs groupes familiaux qui sont à la tête des tribus et qui avaient été chargés du recensement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'apportèrent leur offrande devant l’Eternel : six chariots couverts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: six tombereaux.
    marker-yv: yv-n
  - type: text
    text: ' et douze bœufs – soit un chariot pour deux chefs et un bœuf pour chacun d’eux ; ils les apportèrent devant le tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Accepte ces présents de leur part ; ils seront destinés au service de la tente de la Rencontre. Tu les remettras aux lévites, à chacun selon les besoins de son service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse prit les chariots et les bœufs et les donna aux lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il donna deux chariots et quatre bœufs aux Guershonites selon les besoins de leur service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il donna quatre chariots et huit bœufs aux Merarites, en raison du service qu’ils effectuaient sous la direction d’Itamar, le fils du prêtre Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il n’en donna pas aux Qehatites, car ils étaient responsables des objets sacrés et devaient les porter sur les épaules.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Offrandes pour la dédicace de l’autel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les chefs présentèrent leur offrande pour la dédicace de l’autel le jour où l’on en fit l’onction. Ils apportèrent leurs présents devant l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l’Eternel dit à Moïse : Que les chefs viennent à tour de rôle, un par jour, apporter leur offrande pour la dédicace de l’autel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le premier jour, Nahshôn, fils d’Amminadab, vint présenter son offrande pour la tribu de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle consistait en un plat d’argent pesant 1,5 kilogramme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans tout ce chapitre, les poids sont donnés en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sicles.
    marker-yv: yv-n
  - type: text
    text: ', un calice d’argent de 800 grammes, selon le poids utilisé au sanctuaire, tous deux remplis de fleur de farine pétrie à l’huile, pour l’offrande, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et une coupe d’or de 110 grammes pleine d’encens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il amena aussi un jeune taureau, un bélier et un agneau dans sa première année pour l’holocauste, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'un bouc comme sacrifice pour le péché '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: et deux taureaux, cinq béliers, cinq boucs et cinq agneaux dans leur première année pour le sacrifice de communion. Telle fut l’offrande de Nahshôn, fils d’Amminadab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
