document_id: JAS.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Jacques, serviteur de Dieu et du Seigneur Jésus-Christ, salue les douze tribus dispersées du peuple de Dieu
  - type: note
    content: Voir l’introduction.
  - type: text
    content: .
  - type: heading
    content: L’épreuve et la persévérance
  '10':
  - type: text
    content: 'et le riche de ce que Dieu l’abaisse. En effet, il passera '
  - type: text
    content: comme la fleur des champs.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Le soleil se lève, sa chaleur devient brûlante
  - type: note
    content: 'Autre traduction : le soleil se lève avec le vent du sud.'
  - type: text
    content: ', et la plante se dessèche, '
  - type: text
    content: sa fleur tombe, et toute sa beauté
  - type: note
    content: Es 40.6-7 cité selon l’ancienne version grecque.
  - type: text
    content: ' s’évanouit. Ainsi en est-il du riche : il disparaîtra au milieu de ses activités.'
  - type: heading
    content: La tentation et les mauvais désirs
  '12':
  - type: text
    content: Heureux l’homme qui tient ferme face à la tentation
  - type: note
    content: 'Autre traduction : l’épreuve. En grec, tentation et épreuve s’expriment par le même mot, ce qui explique le lien entre ce verset et le suivant. Toute épreuve est aussi tentation.'
  - type: text
    content: ', car après avoir fait ses preuves, il recevra la couronne du vainqueur : la vie que Dieu a promise à ceux qui l’aiment. '
  '13':
  - type: text
    content: 'Que personne, devant la tentation, ne dise : « C’est Dieu qui me tente. » Car Dieu ne peut pas être tenté par le mal et il ne tente lui-même personne. '
  '14':
  - type: text
    content: 'Lorsque nous sommes tentés, ce sont les mauvais désirs que nous portons en nous qui nous attirent et nous séduisent, '
  '15':
  - type: text
    content: 'puis le mauvais désir conçoit et donne naissance au péché. Or le péché, une fois parvenu à son plein développement, engendre la mort. '
  '16':
  - type: text
    content: 'Ne vous laissez donc pas égarer sur ce point, mes chers frères et sœurs : '
  '17':
  - type: text
    content: tout cadeau de valeur, tout don parfait, nous vient d’en haut, du Père des lumières
  - type: note
    content: Une manière de désigner Dieu comme le Créateur des astres, que l’on retrouve dans certains écrits juifs anciens.
  - type: text
    content: ' et en qui il n’y a ni changement, ni ombre due à des variations'
  - type: note
    content: On trouve plusieurs formulations de la fin du v. 17 dans les manuscrits.
  - type: text
    content: '. '
  '18':
  - type: text
    content: Par un acte de sa libre volonté, il nous a engendrés
  - type: note
    content: Voir v. 15 ; c’est-à-dire il nous a fait naître à la vie.
  - type: text
    content: ' par la parole de vérité pour que nous soyons comme les premiers fruits de sa nouvelle création. '
  '19':
  - type: text
    content: Vous savez tout cela, mes chers frères et sœurs
  - type: note
    content: 'Certains manuscrits ont : par conséquent, mes chers frères, que chacun…'
  - type: text
    content: .
  - type: heading
    content: La Parole et l’obéissance
  - type: text
    content: 'Mais que chacun de vous soit toujours prêt à écouter, qu’il ne se hâte pas de parler, ni de se mettre en colère. '
  '2':
  - type: text
    content: Mes frères et sœurs, quand vous passez par toutes sortes d’épreuves
  - type: note
    content: 'Autre traduction : de tentations.'
  - type: text
    content: ', considérez-vous comme heureux. '
  '20':
  - type: text
    content: 'Car ce n’est pas par la colère qu’un homme accomplit ce qui est juste aux yeux de Dieu. '
  '21':
  - type: text
    content: Débarrassez-vous donc de tout ce qui souille et de tout ce qui reste en vous de méchanceté, pour recevoir, avec humilité, la Parole qui a été plantée dans votre cœur, car elle a le pouvoir de vous sauver.
  '22':
  - type: text
    content: Seulement, ne vous contentez pas de l’écouter, traduisez-la en actes, sans quoi vous vous tromperiez vous-mêmes.
  '23':
  - type: text
    content: 'En effet, si quelqu’un se contente d’écouter la Parole sans y conformer ses actes, il ressemble à un homme qui, en s’observant dans un miroir, découvre son vrai visage : '
  '24':
  - type: text
    content: après s’être ainsi observé, il s’en va et oublie ce qu’il est.
  '25':
  - type: text
    content: 'Voici, au contraire, un homme qui scrute la loi parfaite qui donne la liberté : il lui demeure fidèlement attaché et, au lieu de l’oublier après l’avoir entendue, il y conforme ses actes ; cet homme sera heureux dans tout ce qu’il fait. '
  '26':
  - type: text
    content: 'Mais si quelqu’un croit être religieux, alors qu’il ne sait pas tenir sa langue en bride, il s’illusionne lui-même : sa religion ne vaut rien.'
  '27':
  - type: text
    content: La religion authentique et pure aux yeux de Dieu, le Père, consiste à aider les orphelins et les veuves dans leurs détresses et à ne pas se laisser corrompre par ce monde.
  '3':
  - type: text
    content: 'Car vous le savez : la mise à l’épreuve de votre foi produit l’endurance. '
  '4':
  - type: text
    content: Mais il faut que votre endurance aille jusqu’au bout de ce qu’elle peut faire pour que vous parveniez à l’état d’adultes et soyez pleins de force, des hommes auxquels il ne manque rien.
  - type: heading
    content: La sagesse et la prière
  '5':
  - type: text
    content: Si l’un de vous manque de sagesse
  - type: note
    content: La sagesse dont parle Jacques est la sagesse pratique, comme dans le livre des Proverbes de l’Ancien Testament (voir Pr 2.3-6).
  - type: text
    content: ', qu’il la demande à Dieu qui la lui donnera, car il donne à tous généreusement et sans faire de reproche. '
  '6':
  - type: text
    content: 'Il faut cependant qu’il la demande avec foi, sans douter, car celui qui doute ressemble aux vagues de la mer agitées et soulevées par le vent. '
  '7':
  - type: text
    content: 'Qu’un tel homme ne s’imagine pas obtenir quoi que ce soit du Seigneur : '
  '8':
  - type: text
    content: son cœur est partagé, il est inconstant dans toutes ses entreprises.
  - type: heading
    content: Le pauvre et le riche
  '9':
  - type: text
    content: 'Que le frère ou la sœur pauvre soit fier de ce que Dieu l’élève, '
