document_id: JAS.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jacques, serviteur de Dieu et du Seigneur Jésus-Christ, salue les douze tribus dispersées du peuple de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir l’introduction.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’épreuve et la persévérance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mes frères et sœurs, quand vous passez par toutes sortes d’épreuves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de tentations.
    marker-yv: yv-n
  - type: text
    text: ', considérez-vous comme heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car vous le savez : la mise à l’épreuve de votre foi produit l’endurance. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais il faut que votre endurance aille jusqu’au bout de ce qu’elle peut faire pour que vous parveniez à l’état d’adultes et soyez pleins de force, des hommes auxquels il ne manque rien.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse et la prière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si l’un de vous manque de sagesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La sagesse dont parle Jacques est la sagesse pratique, comme dans le livre des '
      - type: usfm
        marker: bk
        children:
        - type: text
          text: Proverbes
      - type: text
        text: ' de l’Ancien Testament (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 2.3-6
        metadata:
          usfm: PRO.2.3+PRO.2.4+PRO.2.5+PRO.2.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', qu’il la demande à Dieu qui la lui donnera, car il donne à tous généreusement et sans faire de reproche. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il faut cependant qu’il la demande avec foi, sans douter, car celui qui doute ressemble aux vagues de la mer agitées et soulevées par le vent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Qu’un tel homme ne s’imagine pas obtenir quoi que ce soit du Seigneur : '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: son cœur est partagé, il est inconstant dans toutes ses entreprises.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pauvre et le riche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que le frère ou la sœur pauvre soit fier de ce que Dieu l’élève, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et le riche de ce que Dieu l’abaisse. En effet, il passera '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme la fleur des champs.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le soleil se lève, sa chaleur devient brûlante
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le soleil se lève avec le vent du sud.
    marker-yv: yv-n
  - type: text
    text: ', et la plante se dessèche, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sa fleur tombe, et toute sa beauté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.6-7
        metadata:
          usfm: ISA.40.6+ISA.40.7
      - type: text
        text: ' cité selon l’ancienne version grecque.'
    marker-yv: yv-n
  - type: text
    text: ' s’évanouit. Ainsi en est-il du riche : il disparaîtra au milieu de ses activités.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tentation et les mauvais désirs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Heureux l’homme qui tient ferme face à la tentation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’épreuve. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En grec, tentation et épreuve s’expriment par le même mot, ce qui explique le lien entre ce verset et le suivant. Toute épreuve est aussi tentation.
    marker-yv: yv-n
  - type: text
    text: ', car après avoir fait ses preuves, il recevra la couronne du vainqueur : la vie que Dieu a promise à ceux qui l’aiment. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Que personne, devant la tentation, ne dise : « C’est Dieu qui me tente. » Car Dieu ne peut pas être tenté par le mal et il ne tente lui-même personne. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque nous sommes tentés, ce sont les mauvais désirs que nous portons en nous qui nous attirent et nous séduisent, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'puis le mauvais désir conçoit et donne naissance au péché. Or le péché, une fois parvenu à son plein développement, engendre la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne vous laissez donc pas égarer sur ce point, mes chers frères et sœurs : '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: tout cadeau de valeur, tout don parfait, nous vient d’en haut, du Père des lumières
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Une manière de désigner Dieu comme le Créateur des astres, que l’on retrouve dans certains écrits juifs anciens.
    marker-yv: yv-n
  - type: text
    text: ' et en qui il n’y a ni changement, ni ombre due à des variations'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On trouve plusieurs formulations de la fin du v. 17 dans les manuscrits.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Par un acte de sa libre volonté, il nous a engendrés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir v. 15 ; c’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il nous a fait naître à la vie.
    marker-yv: yv-n
  - type: text
    text: ' par la parole de vérité pour que nous soyons comme les premiers fruits de sa nouvelle création. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous savez tout cela, mes chers frères et sœurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par conséquent, mes chers frères, que chacun…
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La Parole et l’obéissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais que chacun de vous soit toujours prêt à écouter, qu’il ne se hâte pas de parler, ni de se mettre en colère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car ce n’est pas par la colère qu’un homme accomplit ce qui est juste aux yeux de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Débarrassez-vous donc de tout ce qui souille et de tout ce qui reste en vous de méchanceté, pour recevoir, avec humilité, la Parole qui a été plantée dans votre cœur, car elle a le pouvoir de vous sauver.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Seulement, ne vous contentez pas de l’écouter, traduisez-la en actes, sans quoi vous vous tromperiez vous-mêmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, si quelqu’un se contente d’écouter la Parole sans y conformer ses actes, il ressemble à un homme qui, en s’observant dans un miroir, découvre son vrai visage : '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: après s’être ainsi observé, il s’en va et oublie ce qu’il est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici, au contraire, un homme qui scrute la loi parfaite qui donne la liberté : il lui demeure fidèlement attaché et, au lieu de l’oublier après l’avoir entendue, il y conforme ses actes ; cet homme sera heureux dans tout ce qu’il fait. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais si quelqu’un croit être religieux, alors qu’il ne sait pas tenir sa langue en bride, il s’illusionne lui-même : sa religion ne vaut rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La religion authentique et pure aux yeux de Dieu, le Père, consiste à aider les orphelins et les veuves dans leurs détresses et à ne pas se laisser corrompre par ce monde.
