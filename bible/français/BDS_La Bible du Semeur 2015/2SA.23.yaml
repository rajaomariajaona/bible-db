document_id: 2SA.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dernières déclarations de David
  - type: text
    content: 'Voici les dernières paroles de David :'
  - type: text
    content: Voici ce que déclare ╵David, fils d’Isaï,
  - type: text
    content: cet homme haut placé,
  - type: text
    content: qui a reçu l’onction ╵de la part du Dieu de Jacob,
  - type: text
    content: oui, voici les paroles ╵qu’Israël se plaît à chanter
  - type: note
    content: 'Autres traductions : David… dont Israël se plaît à chanter les exploits ou du chantre agréable d’Israël.'
  - type: text
    content: .
  '10':
  - type: text
    content: mais lui tint bon et frappa les Philistins jusqu’à ce que sa main fût engourdie et resta crispée sur la poignée de son épée. Ce jour-là, l’Eternel accorda une grande victoire à Israël ; les Israélites n’eurent plus qu’à revenir derrière Eléazar pour s’emparer des dépouilles.
  '11':
  - type: text
    content: 'Après lui vient Shamma, fils d’Agué de Harar. Les Philistins s’étaient rassemblés à Léhi. Il y avait là un champ couvert de lentilles. Les Israélites avaient pris la fuite devant les Philistins, '
  '12':
  - type: text
    content: mais Shamma prit position au milieu du champ, le libéra et frappa les Philistins. Ainsi l’Eternel accorda une victoire éclatante à Israël.
  '13':
  - type: text
    content: Un jour, au début du temps de la moisson, trois membres du groupe des trente vinrent trouver David dans la caverne d’Adoullam
  - type: note
    content: Voir 1 S 22.1.
  - type: text
    content: ', tandis qu’une troupe de Philistins était campée dans la vallée des Rephaïm. '
  '14':
  - type: text
    content: David se trouvait alors dans son refuge fortifié et un poste de Philistins occupait Bethléhem.
  '15':
  - type: text
    content: 'David fut soudain pris d’un brûlant désir et s’écria : Qui me fera boire de l’eau du puits qui se trouve à la porte de Bethléhem ?'
  '16':
  - type: text
    content: 'Alors les trois guerriers pénétrèrent dans le camp des Philistins et puisèrent de l’eau au puits qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David ; mais il ne voulut pas en boire, et il la répandit en libation pour l’Eternel. '
  '17':
  - type: text
    content: 'Il s’exclama : Que l’Eternel me garde de faire pareille chose ! Cette eau représente le sang de ces hommes qui sont allés là-bas au péril de leur vie.'
  - type: text
    content: Il refusa donc de la boire. Tel fut l’exploit de ces trois guerriers.
  '18':
  - type: text
    content: 'Abishaï, frère de Joab, fils de Tserouya, était le chef de ce groupe de trois. Un jour, il brandit son javelot contre trois cents hommes et les tua. Ainsi, il devint célèbre parmi le second groupe des trois. '
  '19':
  - type: text
    content: Il était le plus considéré parmi ces trois et devint leur chef ; mais il n’égala pas les trois du premier groupe.
  '2':
  - type: text
    content: L’Esprit de l’Eternel ╵s’est exprimé par moi,
  - type: text
    content: ses paroles sont sur ma langue.
  '20':
  - type: text
    content: Benaya de Qabtséel, fils de Yehoyada et petit-fils d’un homme valeureux qui avait accompli
  - type: note
    content: 'L’ancienne version grecque a : Benaya, fils de Yehoyada, était un vaillant guerrier de Qabtséel, qui avait accompli…'
  - type: text
    content: ' de nombreux exploits, tua deux puissants héros moabites. C’est lui aussi qui, un jour de neige, descendit au fond d’une citerne pour y tuer un lion. '
  '21':
  - type: text
    content: 'C’est encore lui qui tua un Egyptien de taille impressionnante armé d’un javelot. Il bondit sur lui, armé d’un simple bâton, et lui arracha son javelot dont il se servit pour le tuer. '
  '22':
  - type: text
    content: 'Tels furent les exploits de Benaya, fils de Yehoyada, qui se fit une renommée parmi le second groupe des trois. '
  '23':
  - type: text
    content: Il fut le plus estimé parmi les trente, mais sans égaler ceux du premier groupe des trois. David lui confia le commandement de sa garde personnelle.
  '24':
  - type: text
    content: 'Le groupe des trente comprenait aussi Asaël, frère de Joab, Elhanân, fils de Dodo de Bethléhem, '
  '25':
  - type: text
    content: 'Shamma et Eliqa, tous deux de Harod, '
  '26':
  - type: text
    content: 'Hélets de Péleth, Ira, fils d’Iqqesh de Teqoa, '
  '27':
  - type: text
    content: 'Abiézer d’Anatoth, Mebounnaï de Housha, '
  '28':
  - type: text
    content: 'Tsalmôn, d’Ahoah, Maharaï, de Netopha, '
  '29':
  - type: text
    content: Héleb
  - type: note
    content: 'Certains manuscrits hébreux, la Vulgate et 1 Ch 11.30 ont : Héled.'
  - type: text
    content: ', fils de Baana, de Netopha, Ittaï, fils de Ribaï, de Guibéa en Benjamin, '
  '3':
  - type: text
    content: Le Dieu d’Israël a parlé,
  - type: text
    content: 'le rocher d’Israël m’a dit :'
  - type: text
    content: Le juste gouverneur des hommes
  - type: text
    content: qui gouverne avec la crainte de Dieu
  '30':
  - type: text
    content: Benaya, de Piratôn, Hiddaï
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et 1 Ch 11.32 ont : Houraï.'
  - type: text
    content: ', de Nahalé-Gaash, '
  '31':
  - type: text
    content: Abi-Albôn, de la vallée du Jourdain
  - type: note
    content: 'Ou : de Beth-Arba.'
  - type: text
    content: ', Azmaveth, de Barhoum, '
  '32':
  - type: text
    content: 'Eliahba de Shaalbôn, Bené-Yashên, Jonathan, '
  '33':
  - type: text
    content: Shamma
  - type: note
    content: 'L’ancienne version grecque et 1 Ch 11.34 ont : fils de Shamma.'
  - type: text
    content: ', de Harar, Ahiam, fils de Sharar'
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et 1 Ch 11.35 ont : Sakar.'
  - type: text
    content: ', d’Arar, '
  '34':
  - type: text
    content: 'Eliphéleth, fils de Ahasbaï, fils d’un Maakathien, Eliam, fils d’Ahitophel, de Guilo, '
  '35':
  - type: text
    content: 'Hetsraï, de Karmel, Paaraï, d’Arab, '
  '36':
  - type: text
    content: Yiguéal, fils de Nathan, de Tsoba, Bani de Gad
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et 1 Ch 11.38 ont : fils d’Hagri.'
  - type: text
    content: ', '
  '37':
  - type: text
    content: 'Tséleq, l’Ammonite, Nahraï, de Beéroth, qui portait les armes de Joab, fils de Tserouya, '
  '38':
  - type: text
    content: 'Ira et Gareb, tous deux de Yéter, '
  '39':
  - type: text
    content: et Urie, le Hittite
  - type: note
    content: Voir 11.3-27.
  - type: text
    content: . Au total, ils étaient trente-sept.
  '4':
  - type: text
    content: est pareil au soleil ╵qui se lève au matin
  - type: text
    content: et répand sa lumière ╵dans un ciel sans nuage,
  - type: text
    content: et la verdure sort de terre ╵par ses rayons et par la pluie.
  '5':
  - type: text
    content: N’en est-il pas ainsi ╵de ma dynastie devant Dieu,
  - type: text
    content: puisqu’il a conclu avec moi ╵une alliance éternelle,
  - type: text
    content: en tout bien établie ╵et qu’il respectera toujours ?
  - type: text
    content: En toutes circonstances, ╵il œuvre à mon salut,
  - type: text
    content: il accomplit tous mes désirs.
  '6':
  - type: text
    content: Mais les vauriens sont tous ╵pareils à des épines ╵que l’on rejette au loin.
  - type: text
    content: On ne les saisit pas ╵avec une main nue,
  '7':
  - type: text
    content: celui qui veut les prendre
  - type: text
    content: se munit d’un crochet de fer ╵ou du bois d’une lance,
  - type: text
    content: et il les jette au feu, ╵pour les brûler sur place.
  - type: heading
    content: Les valeureux guerriers de David
  - type: heading
    content: (1 Ch 11.10-41)
  '8':
  - type: text
    content: 'Voici les noms des guerriers de David : Le premier est Yosheb-Bashébeth le Tahkmonite, il était chef du groupe des trois. C’est lui qui'
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque (voir 1 Ch 11.11) ; le texte hébreu traditionnel et d’autres manuscrits de l’ancienne version grecque ont : c’est Adino l’Etsnite qui…'
  - type: text
    content: ', avec son javelot, tua huit cents hommes au cours d’un seul combat.'
  '9':
  - type: text
    content: Le second était Eléazar, fils de Dodo et petit-fils d’Ahohi. Il était l’un des trois guerriers qui accompagnèrent David lorsqu’il défia les Philistins rassemblés
  - type: note
    content: 'Selon 1 Ch 11.13  : rassemblés à Pas-Dammin.'
  - type: text
    content: ' pour la bataille. Déjà, les hommes d’Israël battaient en retraite et gagnaient les hauteurs, '
