document_id: 2SA.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dernières déclarations de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les dernières paroles de David :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que déclare ╵David, fils d’Isaï,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cet homme haut placé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a reçu l’onction ╵de la part du Dieu de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, voici les paroles ╵qu’Israël se plaît à chanter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'David… dont Israël se plaît à chanter les exploits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du chantre agréable d’Israël.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: mais lui tint bon et frappa les Philistins jusqu’à ce que sa main fût engourdie et resta crispée sur la poignée de son épée. Ce jour-là, l’Eternel accorda une grande victoire à Israël ; les Israélites n’eurent plus qu’à revenir derrière Eléazar pour s’emparer des dépouilles.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Après lui vient Shamma, fils d’Agué de Harar. Les Philistins s’étaient rassemblés à Léhi. Il y avait là un champ couvert de lentilles. Les Israélites avaient pris la fuite devant les Philistins, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: mais Shamma prit position au milieu du champ, le libéra et frappa les Philistins. Ainsi l’Eternel accorda une victoire éclatante à Israël.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Un jour, au début du temps de la moisson, trois membres du groupe des trente vinrent trouver David dans la caverne d’Adoullam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 22.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', tandis qu’une troupe de Philistins était campée dans la vallée des Rephaïm. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: David se trouvait alors dans son refuge fortifié et un poste de Philistins occupait Bethléhem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David fut soudain pris d’un brûlant désir et s’écria : Qui me fera boire de l’eau du puits qui se trouve à la porte de Bethléhem ?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors les trois guerriers pénétrèrent dans le camp des Philistins et puisèrent de l’eau au puits qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David ; mais il ne voulut pas en boire, et il la répandit en libation pour l’Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il s’exclama : Que l’Eternel me garde de faire pareille chose ! Cette eau représente le sang de ces hommes qui sont allés là-bas au péril de leur vie.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il refusa donc de la boire. Tel fut l’exploit de ces trois guerriers.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Abishaï, frère de Joab, fils de Tserouya, était le chef de ce groupe de trois. Un jour, il brandit son javelot contre trois cents hommes et les tua. Ainsi, il devint célèbre parmi le second groupe des trois. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il était le plus considéré parmi ces trois et devint leur chef ; mais il n’égala pas les trois du premier groupe.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Esprit de l’Eternel ╵s’est exprimé par moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses paroles sont sur ma langue.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Benaya de Qabtséel, fils de Yehoyada et petit-fils d’un homme valeureux qui avait accompli
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Benaya, fils de Yehoyada, était un vaillant guerrier de Qabtséel, qui avait accompli…
      marker-yv: yv-n
    - type: text
      text: ' de nombreux exploits, tua deux puissants héros moabites. C’est lui aussi qui, un jour de neige, descendit au fond d’une citerne pour y tuer un lion. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est encore lui qui tua un Egyptien de taille impressionnante armé d’un javelot. Il bondit sur lui, armé d’un simple bâton, et lui arracha son javelot dont il se servit pour le tuer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tels furent les exploits de Benaya, fils de Yehoyada, qui se fit une renommée parmi le second groupe des trois. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il fut le plus estimé parmi les trente, mais sans égaler ceux du premier groupe des trois. David lui confia le commandement de sa garde personnelle.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le groupe des trente comprenait aussi Asaël, frère de Joab, Elhanân, fils de Dodo de Bethléhem, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Shamma et Eliqa, tous deux de Harod, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Hélets de Péleth, Ira, fils d’Iqqesh de Teqoa, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Abiézer d’Anatoth, Mebounnaï de Housha, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tsalmôn, d’Ahoah, Maharaï, de Netopha, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Héleb
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits hébreux, la Vulgate et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.30
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Héled.
      marker-yv: yv-n
    - type: text
      text: ', fils de Baana, de Netopha, Ittaï, fils de Ribaï, de Guibéa en Benjamin, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le Dieu d’Israël a parlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le rocher d’Israël m’a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste gouverneur des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui gouverne avec la crainte de Dieu
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Benaya, de Piratôn, Hiddaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.32
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Houraï.
      marker-yv: yv-n
    - type: text
      text: ', de Nahalé-Gaash, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Abi-Albôn, de la vallée du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Beth-Arba.
      marker-yv: yv-n
    - type: text
      text: ', Azmaveth, de Barhoum, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Eliahba de Shaalbôn, Bené-Yashên, Jonathan, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Shamma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.34
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils de Shamma.
      marker-yv: yv-n
    - type: text
      text: ', de Harar, Ahiam, fils de Sharar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.35
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sakar.
      marker-yv: yv-n
    - type: text
      text: ', d’Arar, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Eliphéleth, fils de Ahasbaï, fils d’un Maakathien, Eliam, fils d’Ahitophel, de Guilo, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Hetsraï, de Karmel, Paaraï, d’Arab, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Yiguéal, fils de Nathan, de Tsoba, Bani de Gad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.38
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils d’Hagri.
      marker-yv: yv-n
    - type: text
      text: ', '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tséleq, l’Ammonite, Nahraï, de Beéroth, qui portait les armes de Joab, fils de Tserouya, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ira et Gareb, tous deux de Yéter, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: et Urie, le Hittite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 11.3-27
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Au total, ils étaient trente-sept.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: est pareil au soleil ╵qui se lève au matin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et répand sa lumière ╵dans un ciel sans nuage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la verdure sort de terre ╵par ses rayons et par la pluie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: N’en est-il pas ainsi ╵de ma dynastie devant Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisqu’il a conclu avec moi ╵une alliance éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en tout bien établie ╵et qu’il respectera toujours ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En toutes circonstances, ╵il œuvre à mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il accomplit tous mes désirs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mais les vauriens sont tous ╵pareils à des épines ╵que l’on rejette au loin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne les saisit pas ╵avec une main nue,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: celui qui veut les prendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se munit d’un crochet de fer ╵ou du bois d’une lance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les jette au feu, ╵pour les brûler sur place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les valeureux guerriers de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 11.10-41)
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voici les noms des guerriers de David : Le premier est Yosheb-Bashébeth le Tahkmonite, il était chef du groupe des trois. C’est lui qui'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.11
        - type: text
          text: ') ; le texte hébreu traditionnel et d’autres manuscrits de l’ancienne version grecque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c’est Adino l’Etsnite qui…
      marker-yv: yv-n
    - type: text
      text: ', avec son javelot, tua huit cents hommes au cours d’un seul combat.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le second était Eléazar, fils de Dodo et petit-fils d’Ahohi. Il était l’un des trois guerriers qui accompagnèrent David lorsqu’il défia les Philistins rassemblés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 11.13
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rassemblés à Pas-Dammin.
      marker-yv: yv-n
    - type: text
      text: ' pour la bataille. Déjà, les hommes d’Israël battaient en retraite et gagnaient les hauteurs, '
