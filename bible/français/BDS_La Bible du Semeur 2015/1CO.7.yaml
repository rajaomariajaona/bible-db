document_id: 1CO.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Réponses aux problèmes soulevés par les Corinthiens
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur la sexualité et le couple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: J’en viens à présent aux problèmes que vous soulevez dans votre lettre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Corinthiens avaient soulevé certains problèmes dans une lettre qu’ils avaient fait parvenir par leurs trois émissaires (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.17'
        - type: text
          text: ). Paul répond en reprenant chaque fois la même formule (7.1 ; 8.1 ; 12.1 ; 16.1).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est bon qu’un homme se passe de femme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quant aux couples chrétiens, voici ce que j’ordonne, ou plutôt ce que le Seigneur lui-même leur commande : Que la femme ne se sépare pas de son mari'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 19.3-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Au cas où elle en serait séparée, qu’elle reste sans se remarier ou qu’elle se réconcilie avec son mari. Le mari, de son côté, ne doit pas quitter sa femme.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Pour les autres couples, en l’absence d’indication de la part du Seigneur, voici ce que je dis : si un frère chrétien est marié avec une femme non-croyante et qu’elle consente à rester avec lui, qu’il ne la quitte pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'De même, si une femme a un mari non-croyant et qu’il consente à rester avec elle, qu’elle ne le quitte pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Car du fait de son union avec sa femme, le mari non-croyant est bien un mari légitime aux yeux de Dieu et de même, du fait de son union avec son mari chrétien, la femme non-croyante est bien une épouse légitime aux yeux de Dieu. Autrement, leurs enfants seraient des enfants naturels, alors qu’en réalité ils sont légitimes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Car le mari non-croyant est sanctifié par la femme, et la femme non-croyante est sanctifiée par le frère, autrement, vos enfants seraient impurs, tandis qu’en fait, ils sont saints.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais si le conjoint non-croyant est déterminé à demander le divorce, eh bien, qu’il le fasse ; dans ce cas, le frère ou la sœur n’est pas lié. Dieu vous a appelés à vivre dans la paix. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car toi, femme, tu amèneras peut-être ton mari au salut, mais en fait qu’en sais-tu ? De même, toi, mari, tu amèneras peut-être ta femme au salut, mais en fait, qu’en sais-tu ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En dehors de ce cas, tenez-vous-en à la règle générale que j’enseigne partout dans toutes les Eglises : que chacun continue à vivre dans la condition que le Seigneur lui a assignée comme sa part, celle dans laquelle il se trouvait au moment où Dieu l’a appelé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quelqu’un était-il circoncis lorsqu’il a été appelé ? Qu’il ne cherche pas à le dissimuler. Ou quelqu’un était-il incirconcis lorsque Dieu l’a appelé ? Qu’il ne se fasse pas circoncire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Que l’on soit circoncis ou non n’a aucune importance. Ce qui importe, c’est l’obéissance aux commandements de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Cependant, pour éviter toute immoralité, il est préférable que chaque homme ait sa femme et que chaque femme ait son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Que chacun demeure dans la situation qui était la sienne lorsque Dieu l’a appelé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Etais-tu esclave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il y avait, estime-t-on, 400 000 esclaves à Corinthe au temps de Paul. L’Eglise devait en compter un nombre important parmi ses membres (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.26'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' lorsque Dieu t’a appelé ? Ne te fais pas de souci à ce sujet. Mais si tu peux devenir libre, alors profites-en'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mets plutôt à profit ta condition d’esclave.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Car un esclave qui a été appelé à servir le Seigneur est un affranchi du Seigneur. Et de même, l’homme libre que Dieu a appelé est un esclave de Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'C’est à un grand prix que vous avez été rachetés ! Alors, ne devenez pas esclaves des hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Donc, frères et sœurs, que chacun reste devant Dieu dans la situation où il était lorsque Dieu l’a appelé à venir à lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A propos du mariage des jeunes filles
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Pour ce qui est des jeunes filles, je n’ai pas d’ordre du Seigneur, mais je donne mon avis comme celui d’un homme qui, par la grâce du Seigneur, est digne de confiance : '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'à cause des détresses de l’heure présente, j’estime qu’il est bon pour chacun de demeurer comme il est. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'As-tu une femme ? Ne cherche pas à rompre. N’as-tu aucun engagement ? Ne cherche pas de femme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mais si tu te maries, tu ne commets pas de péché. Ce n’est pas non plus un péché pour une jeune fille de se marier. Mais les gens mariés connaîtront bien des souffrances et je voudrais vous les épargner.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Je vous assure, frères et sœurs : le temps est limité ; que désormais ceux qui sont mariés vivent comme s’ils n’avaient pas de femme, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que le mari accorde à sa femme ce qu’il lui doit et que la femme agisse de même envers son mari. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ceux qui pleurent comme s’ils ne pleuraient pas, ceux qui se réjouissent comme s’ils ne se réjouissaient pas, ceux qui achètent comme s’ils ne possédaient rien. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Bref, que tous ceux qui jouissent des biens de ce monde vivent comme s’ils n’en jouissaient pas. Car le présent ordre des choses va vers sa fin. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'C’est pourquoi je voudrais vous savoir libres de toute préoccupation. Celui qui n’est pas marié se préoccupe des intérêts du Seigneur. Son seul souci est de lui plaire. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Celui qui est marié s’occupe des affaires de ce monde, pour plaire à sa femme ; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'et le voilà tiraillé de part et d’autre. De même la veuve et la jeune fille n’ont pas d’autre souci que les intérêts du Seigneur, pas d’autre désir que de se dévouer à lui corps et esprit. La femme mariée, elle, se préoccupe des affaires de ce monde, pour plaire à son mari. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Je dis cela dans votre propre intérêt et non pour vous tendre un piège, mais pour que vous meniez une vie bien ordonnée, et que vous soyez attachés au Seigneur sans partage.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Mais si quelqu’un craint de mal se comporter envers la jeune fille qui lui est destinée et pense que les choses doivent suivre leur cours normal, qu’il fasse ce qui lui semble bon ; il ne commet pas de faute. Que tous deux se marient ! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Mais si cet homme a pris en lui-même une ferme résolution, sans y être contraint, mais dans la pleine possession de sa volonté, et si la décision qu’il a ainsi prise en lui-même est de ne pas s’unir à la jeune fille, il fera bien. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: En somme, celui qui épouse la jeune fille fait bien, et celui qui ne l’épouse pas fera encore mieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’interprétation de ces versets est difficile. Certains pensent que Paul traite de la responsabilité d’un père à l’égard de sa fille et proposent cette traduction : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '36 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mais si quelqu’un juge manquer aux convenances envers sa fille parce qu’elle a passé l’âge et qu’il est de son devoir d’agir ainsi, qu’il fasse ce qu’il veut ; il ne commet pas de faute : qu’on se marie. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '37 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Si quelqu’un a pris en lui-même une ferme résolution, sans y être contraint, mais dans la pleine possession de sa volonté, si la décision qu’il a ainsi prise en lui-même est de garder sa fille, il fera bien. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '38 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: En somme, celui qui marie sa fille fait bien, et celui qui ne la marie pas fera encore mieux.
      marker-yv: yv-n
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Un dernier mot : une femme demeure liée à son mari aussi longtemps qu’il vit ; mais si le mari vient à mourir, elle est libre de se remarier avec qui elle veut, à condition, bien entendu, que ce soit avec un chrétien. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car le corps de la femme ne lui appartient plus, il est à son mari. De même, le corps du mari ne lui appartient plus, il est à sa femme. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Toutefois, à mon avis, elle sera plus heureuse si elle reste comme elle est ; et je pense, moi aussi, avoir l’Esprit de Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ne vous refusez donc pas l’un à l’autre. Vous pouvez, certes, en plein accord l’un avec l’autre, renoncer pour un temps à vos relations conjugales afin de vous consacrer davantage à la prière, mais après cela, reprenez vos rapports comme auparavant. Il ne faut pas donner à Satan l’occasion de vous tenter par votre incapacité à vous maîtriser. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Notez bien qu’il s’agit là d’une concession et nullement d’un ordre.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je voudrais bien que tout le monde soit comme moi, mais chacun reçoit de Dieu un don particulier de la grâce, l’un le mariage, l’autre le célibat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J’aimerais cependant dire aux veufs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ceux qui ne sont pas mariés.
      marker-yv: yv-n
    - type: text
      text: ' et aux veuves que c’est une bonne chose de continuer à vivre seul, comme moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Toutefois, s’ils ne peuvent pas se maîtriser en ce domaine, qu’ils se marient, car mieux vaut se marier que de se consumer en désirs insatisfaits.
