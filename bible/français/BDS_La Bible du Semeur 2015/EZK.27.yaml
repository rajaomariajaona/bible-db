document_id: EZK.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La chute d’une puissance
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes : '
  '10':
  - type: text
    content: Les Perses et ceux de Loud ╵comme de Pouth
  - type: note
    content: 'Loud et Pouth: voir Gn 10.6, 22 et notes.'
  - type: text
    content: entraient dans ton armée.
  - type: text
    content: C’étaient tes gens de guerre.
  - type: text
    content: Ils suspendaient chez toi ╵leurs boucliers, leurs casques,
  - type: text
    content: et assuraient ta gloire.
  '11':
  - type: text
    content: Les gens d’Arvad et leur armée
  - type: text
    content: étaient sur tes murailles
  - type: text
    content: tout autour de la ville,
  - type: text
    content: les hommes de Gammad
  - type: note
    content: 'Gammad: soit au nord de l’Asie Mineure, soit une ville côtière près d’Arvad.'
  - type: text
    content: ' ╵étaient dans tes donjons.'
  - type: text
    content: Ils suspendaient leurs armes ╵aux murs d’enceinte
  - type: text
    content: et rendaient ta beauté parfaite.
  - type: heading
    content: Une commerçante prestigieuse
  '12':
  - type: text
    content: Tarsis
  - type: note
    content: Port d’Espagne, colonie phénicienne.
  - type: text
    content: ' échangeait avec toi des biens de toutes sortes en abondance ; elle te donnait de l’argent, du fer, de l’étain et du plomb contre tes marchandises. '
  '13':
  - type: text
    content: Yavân, Toubal, Méshek
  - type: note
    content: 'Yavân désigne les îles grecques. Toubal et Méshek: en Asie Mineure.'
  - type: text
    content: ' commerçaient avec toi, ils donnaient des esclaves et des objets de bronze en échange de tes marchandises. '
  '14':
  - type: text
    content: Ceux de Beth-Togarma
  - type: note
    content: 'Beth-Togarma: probablement l’Arménie.'
  - type: text
    content: ' pourvoyaient tes marchés de chevaux pour la guerre et de chevaux de trait ainsi que de mulets. '
  '15':
  - type: text
    content: Les gens de Dedân
  - type: note
    content: Voir 25.13 et note.
  - type: text
    content: ' commerçaient avec toi, tes marchés s’étendaient jusqu’aux nombreuses îles et régions côtières qui te payaient ton dû en défenses d’ivoire et avec de l’ébène. '
  '16':
  - type: text
    content: La Syrie
  - type: note
    content: 'D’après la plupart des manuscrits hébreux. Quelques manuscrits hébreux et l’ancienne version grecque ont : les Edomites. La différence est due à la confusion entre deux lettres hébraïques très ressemblantes.'
  - type: text
    content: ' t’achetait des produits de tous genres, te payant en retour en pierres d’escarboucle, en tissus écarlates, en belles broderies, en tissus de fin lin, en corail et rubis. '
  '17':
  - type: text
    content: Juda et Israël commerçaient avec toi, te donnant en échange du froment de Minnith
  - type: note
    content: Ville ammonite, réputée pour ses céréales, située au nord de Heshbôn.
  - type: text
    content: ', du biscuit et du miel, de l’huile et du baume. '
  '18':
  - type: text
    content: La ville de Damas commerçait avec toi, elle était attirée par tes nombreux produits, et tes biens abondants, te livrant en paiement le vin de Helbôn
  - type: note
    content: Ville au nord de Damas, réputée pour son vin.
  - type: text
    content: ' et la laine de Tsahar. '
  '19':
  - type: text
    content: Vedân, Yavân et Meouzal
  - type: note
    content: Peut-être des tribus arabes.
  - type: text
    content: ' pourvoyaient tes marchés, en fer forgé, en casse et en roseau aromatique contre tes marchandises. '
  '2':
  - type: text
    content: 'Fils d’homme, entonne une complainte sur la cité de Tyr. '
  '20':
  - type: text
    content: 'Dedân te fournissait des étoffes de selle. '
  '21':
  - type: text
    content: Les peuplades arabes et tous les princes de Qédar
  - type: note
    content: Région du désert de l’Arabie (voir Es 21.13-17).
  - type: text
    content: ' négociaient avec toi, pourvoyant ton marché d’agneaux, de béliers et de boucs. '
  '22':
  - type: text
    content: Les marchands de Saba et ceux de Raema
  - type: note
    content: Régions de l’Arabie du Sud (cf. Gn 10.7).
  - type: text
    content: ' commerçaient avec toi payant tes marchandises des meilleurs aromates, de gemmes de tous genres et d’or. '
  '23':
  - type: text
    content: Harân, Kanné, Eden, les marchands de Saba, d’Assur et de Kilmad
  - type: note
    content: Villes et contrées de la Mésopotamie.
  - type: text
    content: ' commerçaient avec toi. '
  '24':
  - type: text
    content: Ils faisaient le commerce d’objets de luxe, de manteaux teints de pourpre et finement brodés, de tissus
  - type: note
    content: 'Autre traduction : tapis.'
  - type: text
    content: ' de couleur, de forts cordons tressés pour tes négoces.'
  - type: heading
    content: Une chute retentissante
  '25':
  - type: text
    content: Les vaisseaux au long cours
  - type: note
    content: Voir note 2 Ch 20.37.
  - type: text
    content: ' ╵assuraient le transport ╵de tes produits.'
  - type: text
    content: Oui, tu étais remplie ╵et lourdement chargée ╵de marchandises
  - type: text
    content: au cœur des mers
  - type: note
    content: Pour les v. 25-36, voir Ap 18.11-19.
  - type: text
    content: .
  '26':
  - type: text
    content: Mais sur les grandes eaux ╵où t’avaient amenée ╵ceux qui maniaient tes rames,
  - type: text
    content: tu as été brisée ╵par le vent de l’orient ╵au cœur des mers
  - type: note
    content: Vent très violent (Ps 48.8 ; Jb 1.19). Ici, il symbolise peut-être les armées de Nabuchodonosor (17.10 ; 19.12).
  '27':
  - type: text
    content: et tes richesses, ╵tes marchandises, ╵les articles de ton commerce,
  - type: text
    content: tes marins et tes matelots,
  - type: text
    content: les ouvriers ╵qui réparent tes avaries,
  - type: text
    content: et tes marchands,
  - type: text
    content: tous les hommes de guerre ╵qui sont chez toi,
  - type: text
    content: toute la multitude ╵qui remplit ton navire,
  - type: text
    content: tous tomberont ╵au cœur des mers
  - type: text
    content: au jour de ton naufrage.
  '28':
  - type: text
    content: Au cri que pousseront ╵tes matelots,
  - type: text
    content: les régions de la côte ╵se mettront à trembler.
  '29':
  - type: text
    content: Alors tous les rameurs,
  - type: text
    content: les matelots, tous les marins ╵qui sillonnent la mer ╵quitteront leurs navires
  - type: text
    content: et se tiendront sur terre,
  '3':
  - type: text
    content: 'Dis donc à Tyr qui est assise aux portes de la mer et qui commerce avec tant de peuplades de nombreuses îles et régions côtières : voici ce que déclare le Seigneur, l’Eternel :'
  - type: text
    content: 'Toi, ô Tyr, tu as dit :'
  - type: text
    content: « Ma beauté est parfaite ! »
  '30':
  - type: text
    content: ils se lamenteront sur toi
  - type: text
    content: et pousseront des cris amers ;
  - type: text
    content: ils répandront ╵de la poussière sur leur tête,
  - type: text
    content: et se rouleront dans la cendre.
  '31':
  - type: text
    content: Ils se raseront la tête à cause de toi,
  - type: text
    content: ils mettront un habit ╵fait de toile de sac,
  - type: text
    content: plongés dans l’affliction ╵ils pleureront sur toi
  - type: text
    content: et avec amertume, ╵ils se lamenteront.
  '32':
  - type: text
    content: Dans leur douleur, ╵ils chanteront sur toi ╵une élégie funèbre.
  - type: text
    content: 'Voici ce qu’ils diront ╵dans leur complainte :'
  - type: text
    content: « Qui était comme Tyr,
  - type: text
    content: désormais silencieuse
  - type: note
    content: 'maintenant silencieuse. Autre traduction : comme la citadelle.'
  - type: text
    content: ' ╵au milieu de la mer ? »'
  '33':
  - type: text
    content: Lorsque tes marchandises ╵arrivaient par les mers,
  - type: text
    content: tu comblais les besoins ╵de peuples innombrables.
  - type: text
    content: Par la surabondance ╵de tes produits
  - type: text
    content: et de tes marchandises, ╵tu enrichissais les rois de la terre.
  '34':
  - type: text
    content: Mais te voilà brisée ╵par les flots de la mer,
  - type: text
    content: jetée au fond des eaux profondes !
  - type: text
    content: Toute ta cargaison ╵et tout ton équipage
  - type: text
    content: ont sombré avec toi.
  '35':
  - type: text
    content: Les habitants des îles ╵sont frappés de stupeur
  - type: text
    content: à cause de ton sort,
  - type: text
    content: leurs rois sont secoués ╵d’un frisson d’épouvante
  - type: text
    content: et la consternation ╵se lit sur leurs visages.
  '36':
  - type: text
    content: Ceux qui commercent ╵parmi les peuples ╵sifflent d’horreur ╵à ton sujet,
  - type: text
    content: ton sort inspire l’épouvante,
  - type: text
    content: et pour toujours, ╵toi, tu ne seras plus !
  '4':
  - type: text
    content: Ton territoire ╵se trouve au cœur des mers,
  - type: text
    content: et ceux qui t’ont construite ╵ont rendu ta beauté parfaite.
  '5':
  - type: text
    content: Ils ont bâti tous tes bordages
  - type: text
    content: en cyprès de Senir
  - type: note
    content: Nom amoréen pour le mont Hermon. Tyr est comparée à un bateau.
  - type: text
    content: ','
  - type: text
    content: ils t’ont donné pour mât ╵un cèdre du Liban.
  '6':
  - type: text
    content: Ils ont pris pour tes rames ╵des chênes du Basan,
  - type: text
    content: ton pont est en ivoire
  - type: text
    content: incrusté dans du bois, ╵dans du cyprès ╵importé des îles de Chypre.
  '7':
  - type: text
    content: 'Du lin brodé d’Egypte ╵te servait de voilure :'
  - type: text
    content: c’était ton pavillon.
  - type: text
    content: Tu avais pour tentures
  - type: text
    content: la pourpre et l’écarlate ╵des îles d’Elisha
  - type: note
    content: Ville sur la côte est de Chypre. Certains pensent aux îles du Péloponnèse.
  - type: text
    content: .
  '8':
  - type: text
    content: Les habitants d’Arvad ╵et de Sidon
  - type: note
    content: Deux ports de la côte phénicienne proches de Tyr (voir Gn 10.18-19).
  - type: text
    content: te servaient de rameurs,
  - type: text
    content: et les plus habiles chez toi, ô Tyr
  - type: text
    content: étaient tes matelots.
  '9':
  - type: text
    content: Tu employais chez toi ╵les artisans ╵expérimentés de Byblos
  - type: note
    content: Port célèbre situé entre Arvad et Sidon.
  - type: text
    content: ','
  - type: text
    content: pour effectuer tes réparations.
  - type: text
    content: Tous les bateaux des mers ╵avec leurs matelots ╵se rencontraient chez toi
  - type: text
    content: pour négocier tes marchandises.
