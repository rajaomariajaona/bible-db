      text: '26'
  - type: text
    text: Mais sur les grandes eaux ╵où t’avaient amenée ╵ceux qui maniaient tes rames,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as été brisée ╵par le vent de l’orient ╵au cœur des mers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vent très violent (Ps 48.8 ; Jb 1.19). Ici, il symbolise peut-être les armées de Nabuchodonosor (17.10 ; 19.12).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et tes richesses, ╵tes marchandises, ╵les articles de ton commerce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes marins et tes matelots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ouvriers ╵qui réparent tes avaries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes marchands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les hommes de guerre ╵qui sont chez toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la multitude ╵qui remplit ton navire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous tomberont ╵au cœur des mers
- type: usfm
  marker: q1
  children:
  - type: text
    text: au jour de ton naufrage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Au cri que pousseront ╵tes matelots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les régions de la côte ╵se mettront à trembler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Alors tous les rameurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les matelots, tous les marins ╵qui sillonnent la mer ╵quitteront leurs navires
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se tiendront sur terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ils se lamenteront sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pousseront des cris amers ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils répandront ╵de la poussière sur leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se rouleront dans la cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils se raseront la tête à cause de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils mettront un habit ╵fait de toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plongés dans l’affliction ╵ils pleureront sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec amertume, ╵ils se lamenteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Dans leur douleur, ╵ils chanteront sur toi ╵une élégie funèbre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce qu’ils diront ╵dans leur complainte :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Qui était comme Tyr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: désormais silencieuse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.32 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maintenant silencieuse. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme la citadelle.
    marker-yv: yv-n
  - type: text
    text: ' ╵au milieu de la mer ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lorsque tes marchandises ╵arrivaient par les mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu comblais les besoins ╵de peuples innombrables.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par la surabondance ╵de tes produits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tes marchandises, ╵tu enrichissais les rois de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais te voilà brisée ╵par les flots de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jetée au fond des eaux profondes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute ta cargaison ╵et tout ton équipage
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont sombré avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les habitants des îles ╵sont frappés de stupeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ton sort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs rois sont secoués ╵d’un frisson d’épouvante
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la consternation ╵se lit sur leurs visages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ceux qui commercent ╵parmi les peuples ╵sifflent d’horreur ╵à ton sujet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton sort inspire l’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour toujours, ╵toi, tu ne seras plus !
