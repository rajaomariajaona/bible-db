document_id: EZK.27
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La chute d’une puissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel m’adressa la parole en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils d’homme, entonne une complainte sur la cité de Tyr. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dis donc à Tyr qui est assise aux portes de la mer et qui commerce avec tant de peuplades de nombreuses îles et régions côtières : voici ce que déclare le Seigneur, l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi, ô Tyr, tu as dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ma beauté est parfaite ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ton territoire ╵se trouve au cœur des mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui t’ont construite ╵ont rendu ta beauté parfaite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ont bâti tous tes bordages
- type: usfm
  marker: q1
  children:
  - type: text
    text: en cyprès de Senir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nom amoréen pour le mont Hermon. Tyr est comparée à un bateau.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils t’ont donné pour mât ╵un cèdre du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils ont pris pour tes rames ╵des chênes du Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton pont est en ivoire
- type: usfm
  marker: q1
  children:
  - type: text
    text: incrusté dans du bois, ╵dans du cyprès ╵importé des îles de Chypre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Du lin brodé d’Egypte ╵te servait de voilure :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’était ton pavillon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu avais pour tentures
- type: usfm
  marker: q1
  children:
  - type: text
    text: la pourpre et l’écarlate ╵des îles d’Elisha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville sur la côte est de Chypre. Certains pensent aux îles du Péloponnèse.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les habitants d’Arvad ╵et de Sidon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Deux ports de la côte phénicienne proches de Tyr (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.18-19
        metadata:
          usfm: GEN.10.18+GEN.10.19
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: te servaient de rameurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les plus habiles chez toi, ô Tyr
- type: usfm
  marker: q1
  children:
  - type: text
    text: étaient tes matelots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu employais chez toi ╵les artisans ╵expérimentés de Byblos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Port célèbre situé entre Arvad et Sidon.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour effectuer tes réparations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les bateaux des mers ╵avec leurs matelots ╵se rencontraient chez toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour négocier tes marchandises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les Perses et ceux de Loud ╵comme de Pouth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Loud '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pouth
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
