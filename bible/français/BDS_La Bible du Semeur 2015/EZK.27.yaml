          usfm: GEN.10.22
      - type: text
        text: ' et notes.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: entraient dans ton armée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’étaient tes gens de guerre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils suspendaient chez toi ╵leurs boucliers, leurs casques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et assuraient ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les gens d’Arvad et leur armée
- type: usfm
  marker: q1
  children:
  - type: text
    text: étaient sur tes murailles
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout autour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes de Gammad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gammad
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: soit au nord de l’Asie Mineure, soit une ville côtière près d’Arvad.
    marker-yv: yv-n
  - type: text
    text: ' ╵étaient dans tes donjons.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils suspendaient leurs armes ╵aux murs d’enceinte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rendaient ta beauté parfaite.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Une commerçante prestigieuse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tarsis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Port d’Espagne, colonie phénicienne.
    marker-yv: yv-n
  - type: text
    text: ' échangeait avec toi des biens de toutes sortes en abondance ; elle te donnait de l’argent, du fer, de l’étain et du plomb contre tes marchandises. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yavân, Toubal, Méshek
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yavân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne les îles grecques. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Toubal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Méshek
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Asie Mineure.
    marker-yv: yv-n
  - type: text
    text: ' commerçaient avec toi, ils donnaient des esclaves et des objets de bronze en échange de tes marchandises. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ceux de Beth-Togarma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Beth-Togarma
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probablement l’Arménie.
    marker-yv: yv-n
  - type: text
    text: ' pourvoyaient tes marchés de chevaux pour la guerre et de chevaux de trait ainsi que de mulets. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les gens de Dedân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25.13'
        metadata:
          usfm: EZK.25.13
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' commerçaient avec toi, tes marchés s’étendaient jusqu’aux nombreuses îles et régions côtières qui te payaient ton dû en défenses d’ivoire et avec de l’ébène. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La Syrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après la plupart des manuscrits hébreux. Quelques manuscrits hébreux et l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les Edomites. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence est due à la confusion entre deux lettres hébraïques très ressemblantes.
    marker-yv: yv-n
  - type: text
    text: ' t’achetait des produits de tous genres, te payant en retour en pierres d’escarboucle, en tissus écarlates, en belles broderies, en tissus de fin lin, en corail et rubis. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Juda et Israël commerçaient avec toi, te donnant en échange du froment de Minnith
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville ammonite, réputée pour ses céréales, située au nord de Heshbôn.
    marker-yv: yv-n
  - type: text
    text: ', du biscuit et du miel, de l’huile et du baume. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La ville de Damas commerçait avec toi, elle était attirée par tes nombreux produits, et tes biens abondants, te livrant en paiement le vin de Helbôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville au nord de Damas, réputée pour son vin.
    marker-yv: yv-n
  - type: text
    text: ' et la laine de Tsahar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
