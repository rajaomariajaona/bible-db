document_id: ISA.46,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dieux de Babylone et l’Eternel
  - type: text
    content: Voici Bel a ployé
  - type: text
    content: et Nébo s’est courbé
  - type: note
    content: 'Bel: principal dieu des Babyloniens, autre nom du dieu Mardouk. Le nom Bel est l’équivalent du nom cananéen Baal et signifie : Seigneur. Nébo: autre divinité babylonienne, dieu de la sagesse, de l’éloquence et surtout de l’écriture, fils de Mardouk.'
  - type: text
    content: ','
  - type: text
    content: des animaux ╵et des bêtes de somme ╵emportent leurs images.
  - type: text
    content: Ces idoles que vous portiez
  - type: text
    content: chargent de tout leur poids ╵des bêtes fatiguées.
  '10':
  - type: text
    content: Dès le commencement,
  - type: text
    content: j’annonce l’avenir,
  - type: text
    content: et longtemps à l’avance
  - type: text
    content: ce qui n’est pas encore.
  - type: text
    content: C’est moi qui dis, ╵et mon dessein s’accomplira,
  - type: text
    content: oui, j’exécuterai ╵tout ce que je désire.
  '11':
  - type: text
    content: J’appelle de l’orient un oiseau de proie
  - type: note
    content: C’est-à-dire Cyrus.
  - type: text
    content: ','
  - type: text
    content: d’un pays éloigné, ╵l’homme prévu par mes desseins.
  - type: text
    content: Ce que j’ai déclaré,
  - type: text
    content: je le fais arriver,
  - type: text
    content: ce que j’ai résolu,
  - type: text
    content: je l’exécuterai.
  '12':
  - type: text
    content: Ecoutez-moi, ╵gens au cœur obstiné,
  - type: text
    content: vous si loin d’être justes
  - type: note
    content: 'Autre traduction : qui êtes loin de connaître la justice de Dieu.'
  - type: text
    content: ','
  '13':
  - type: text
    content: je vais bientôt faire justice
  - type: text
    content: et cela n’est pas loin,
  - type: text
    content: 'je ne tarderai pas ╵à faire venir le salut :'
  - type: text
    content: je vais accorder à Sion ╵la délivrance,
  - type: text
    content: et ma splendeur à Israël.
  '2':
  - type: text
    content: Ces dieux se sont courbés, ╵ils ont ployé ensemble,
  - type: text
    content: ils n’ont pas pu sauver ╵leur image qu’on transportait
  - type: text
    content: et ils s’en vont ╵eux-mêmes en captivité.
  '3':
  - type: text
    content: Ecoutez-moi, ╵gens de Jacob,
  - type: text
    content: vous tous qui subsistez ╵du peuple d’Israël,
  - type: text
    content: vous que j’ai pris en charge ╵dès avant la naissance,
  - type: text
    content: 'que j’ai portés ╵dès le sein maternel :'
  '4':
  - type: text
    content: Je resterai le même ╵jusqu’à votre vieillesse
  - type: text
    content: et je vous soutiendrai ╵jusqu’à vos cheveux blancs.
  - type: text
    content: C’est moi qui vous ai soutenus, ╵et je vous porterai,
  - type: text
    content: oui, je vous soutiendrai ╵et vous délivrerai.
  '5':
  - type: text
    content: A qui me comparerez-vous ?
  - type: text
    content: De qui me rendrez-vous l’égal ?
  - type: text
    content: A qui m’assimilerez-vous
  - type: text
    content: pour que nous soyons comparables ?
  '6':
  - type: text
    content: Ils prennent tout l’or de leur bourse,
  - type: text
    content: ils pèsent l’argent au fléau
  - type: text
    content: et ils paient un orfèvre
  - type: text
    content: pour qu’il en fasse un dieu
  - type: text
    content: devant lequel ils puissent ╵se prosterner
  - type: text
    content: et l’adorer.
  '7':
  - type: text
    content: Ils se le chargent sur l’épaule,
  - type: text
    content: ils le soutiennent,
  - type: text
    content: puis ils l’installent à sa place, ╵et il se tiendra là ;
  - type: text
    content: de sa place, il ne bouge plus.
  - type: text
    content: On a beau l’invoquer,
  - type: text
    content: il ne répondra pas,
  - type: text
    content: il ne peut délivrer ╵personne du malheur.
  '8':
  - type: text
    content: Rappelez-vous cela
  - type: text
    content: et reprenez courage !
  - type: text
    content: Considérez ces choses,
  - type: text
    content: vous qui vous êtes révoltés.
  - type: heading
    content: L’Eternel est Dieu
  '9':
  - type: text
    content: Rappelez-vous ╵les événements du passé, ╵survenus il y a bien longtemps,
  - type: text
    content: car c’est moi qui suis Dieu,
  - type: text
    content: il n’y en a pas d’autre.
  - type: text
    content: Oui, moi seul, je suis Dieu,
  - type: text
    content: et il n’existe rien ╵qui me soit comparable.
