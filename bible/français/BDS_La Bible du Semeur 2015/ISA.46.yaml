document_id: ISA.46,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les dieux de Babylone et l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici Bel a ployé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Nébo s’est courbé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'principal dieu des Babyloniens, autre nom du dieu Mardouk. Le nom Bel est l’équivalent du nom cananéen Baal et signifie : Seigneur. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nébo
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: autre divinité babylonienne, dieu de la sagesse, de l’éloquence et surtout de l’écriture, fils de Mardouk.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des animaux ╵et des bêtes de somme ╵emportent leurs images.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces idoles que vous portiez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chargent de tout leur poids ╵des bêtes fatiguées.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dès le commencement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’annonce l’avenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et longtemps à l’avance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui n’est pas encore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui dis, ╵et mon dessein s’accomplira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, j’exécuterai ╵tout ce que je désire.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J’appelle de l’orient un oiseau de proie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire Cyrus.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un pays éloigné, ╵l’homme prévu par mes desseins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que j’ai déclaré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le fais arriver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que j’ai résolu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l’exécuterai.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ecoutez-moi, ╵gens au cœur obstiné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous si loin d’être justes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui êtes loin de connaître la justice de Dieu.
      marker-yv: yv-n
    - type: text
      text: ','
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: je vais bientôt faire justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela n’est pas loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je ne tarderai pas ╵à faire venir le salut :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais accorder à Sion ╵la délivrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma splendeur à Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ces dieux se sont courbés, ╵ils ont ployé ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n’ont pas pu sauver ╵leur image qu’on transportait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s’en vont ╵eux-mêmes en captivité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ecoutez-moi, ╵gens de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui subsistez ╵du peuple d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous que j’ai pris en charge ╵dès avant la naissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que j’ai portés ╵dès le sein maternel :'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je resterai le même ╵jusqu’à votre vieillesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vous soutiendrai ╵jusqu’à vos cheveux blancs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui vous ai soutenus, ╵et je vous porterai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, je vous soutiendrai ╵et vous délivrerai.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A qui me comparerez-vous ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De qui me rendrez-vous l’égal ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui m’assimilerez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous soyons comparables ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils prennent tout l’or de leur bourse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils pèsent l’argent au fléau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils paient un orfèvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu’il en fasse un dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant lequel ils puissent ╵se prosterner
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’adorer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils se le chargent sur l’épaule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils le soutiennent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis ils l’installent à sa place, ╵et il se tiendra là ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sa place, il ne bouge plus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a beau l’invoquer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne répondra pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne peut délivrer ╵personne du malheur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Rappelez-vous cela
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et reprenez courage !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considérez ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui vous êtes révoltés.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel est Dieu
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rappelez-vous ╵les événements du passé, ╵survenus il y a bien longtemps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est moi qui suis Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y en a pas d’autre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, moi seul, je suis Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n’existe rien ╵qui me soit comparable.
