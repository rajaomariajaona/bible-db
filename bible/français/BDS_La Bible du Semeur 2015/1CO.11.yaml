document_id: 1CO.11,21
type_code: fra
verses:
  '1':
  - type: text
    content: Suivez donc mon exemple, comme moi, de mon côté, je suis celui de Christ.
  - type: heading
    content: La vie dans la communauté
  - type: heading
    content: L’homme et la femme dans l’Eglise
  '10':
  - type: text
    content: Voilà pourquoi la femme doit porter sur la tête un signe d’autorité
  - type: note
    content: Selon les uns cette « autorité » serait celle de la femme, selon les autres il s’agirait de l’autorité de son mari (cf. v. 3-5).
  - type: text
    content: ', à cause des anges. '
  '11':
  - type: text
    content: 'Toutefois, dans l’ordre établi par le Seigneur, la femme n’existe pas sans l’homme, et l’homme n’existe pas sans la femme, '
  '12':
  - type: text
    content: car si la femme a été tirée de l’homme, celui-ci, à son tour, naît de la femme et, finalement, tous deux doivent leur vie à Dieu.
  '13':
  - type: text
    content: 'Jugez vous-mêmes de cela : est-il convenable pour une femme de prier Dieu la tête découverte ? '
  '14':
  - type: text
    content: 'Ne paraît-il pas naturel à tout le monde que c’est une indignité pour un homme de porter des cheveux longs '
  '15':
  - type: text
    content: mais qu’une longue chevelure fait honneur à la femme ? Car la chevelure lui a été donnée pour lui servir de voile.
  '16':
  - type: text
    content: Si quelqu’un s’obstine à contester, nous lui répondons que ce qu’il propose n’est ni notre pratique ni celle des Eglises de Dieu.
  - type: heading
    content: Le repas du Seigneur
  '17':
  - type: text
    content: Puisque j’en suis aux directives, il me faut mentionner un point pour lequel je ne saurais vous féliciter. C’est que vos réunions, au lieu de contribuer à votre progrès, vous font devenir pires.
  '18':
  - type: text
    content: 'Tout d’abord j’entends dire que lorsque vous tenez une réunion, il y a parmi vous des divisions. – J’incline à croire qu’il y a une part de vérité dans ce qu’on raconte. '
  '19':
  - type: text
    content: Sans doute faut-il qu’il y ait chez vous des divisions, pour que les chrétiens qui ont fait leurs preuves soient clairement reconnus au milieu de vous !
  '2':
  - type: text
    content: Je vous félicite de vous souvenir de moi en toute occasion et de maintenir fidèlement les traditions que je vous ai transmises.
  '20':
  - type: text
    content: 'Ainsi, lorsque vous vous réunissez, on ne peut vraiment plus appeler cela « prendre le repas du Seigneur », '
  '21':
  - type: text
    content: car, à peine êtes-vous à table, que chacun s’empresse de manger ses propres provisions
  - type: note
    content: Dans les agapes (repas fraternels) au cours desquelles on célébrait la cène, on apportait des provisions que l’on mettait en commun. A Corinthe, chacun mangeait ce qu’il avait apporté.
  - type: text
    content: ', et l’on voit des gens manquer de nourriture pendant que d’autres s’enivrent.'
  '22':
  - type: text
    content: S’il ne s’agit que de manger et de boire, n’avez-vous pas vos maisons pour le faire ? Ou bien traitez-vous avec mépris l’Eglise de Dieu et avez-vous l’intention d’humilier les membres pauvres de votre assemblée ?
  - type: text
    content: 'Que puis-je vous dire ? Vais-je vous féliciter ? Certainement pas. '
  '23':
  - type: text
    content: 'Car voici la tradition que j’ai reçue du Seigneur, et que je vous ai transmise : le Seigneur Jésus, dans la nuit où il fut livré pour être mis à mort, prit du pain'
  - type: note
    content: Voir Mt 26.26ss ; Mc 14.22-25 ; Lc 22.15-20.
  - type: text
    content: ', '
  '24':
  - type: text
    content: 'et, après avoir prononcé la prière de reconnaissance, il le rompit en disant : '
  - type: text
    content: '« Ceci est mon corps : il est pour vous ; faites ceci en souvenir de moi. »'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'De même, après le repas, il prit la coupe et dit : '
  - type: text
    content: '« Cette coupe est la nouvelle '
  - type: text
    content: alliance
  - type: text
    content: ' '
  - type: text
    content: scellée
  - type: text
    content: ' de mon sang ; faites ceci, toutes les fois que vous en boirez, en souvenir de moi. »'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Donc, chaque fois que vous mangez de ce pain et que vous buvez de cette coupe, vous annoncez la mort du Seigneur, et ceci jusqu’à son retour.
  '27':
  - type: text
    content: 'C’est pourquoi quiconque mangerait le pain ou boirait de la coupe du Seigneur d’une manière indigne se rendrait coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: text
    content: 'Que chacun donc s’examine sérieusement lui-même et qu’alors il mange de ce pain et boive de cette coupe. '
  '29':
  - type: text
    content: Car celui qui mange et boit sans discerner ce qu’est le corps
  - type: note
    content: 'Certains manuscrits précisent : le corps du Seigneur.'
  - type: text
    content: ' se condamne lui-même en mangeant et en buvant ainsi. '
  '3':
  - type: text
    content: 'Je voudrais cependant attirer votre attention sur un point : Christ est le chef'
  - type: note
    content: Dans tout ce passage, Paul utilise un mot grec qui signifie à la fois tête et chef.
  - type: text
    content: ' de tout homme, l’homme est le chef de la femme, le chef de Christ, c’est Dieu. '
  '30':
  - type: text
    content: 'C’est pour cette raison qu’il y a parmi vous tant de malades et d’infirmes, et qu’un certain nombre sont morts. '
  '31':
  - type: text
    content: 'Si nous discernions ce que nous sommes, nous ne tomberions pas sous le jugement. '
  '32':
  - type: text
    content: Mais les jugements du Seigneur ont pour but de nous corriger afin que nous ne soyons pas condamnés avec le reste du monde.
  '33':
  - type: text
    content: 'Ainsi donc, frères et sœurs, lorsque vous vous réunissez pour le repas en commun, attendez-vous les uns les autres. '
  '34':
  - type: text
    content: Si quelqu’un a particulièrement faim, qu’il mange d’abord chez lui afin que vos réunions n’attirent pas sur vous le jugement de Dieu. Quant aux autres points, je les réglerai lors de mon passage chez vous.
  '4':
  - type: text
    content: 'Si donc un homme prie ou prophétise la tête couverte, il outrage son chef. '
  '5':
  - type: text
    content: 'Mais si une femme prie ou prophétise la tête non couverte, elle outrage son chef à elle : c’est comme si elle était rasée'
  - type: note
    content: Selon les normes sociales romaines, en vigueur à Corinthe, les femmes mariées devaient avoir la tête couverte lorsqu’elles se présentaient en public. Cette tenue les protégeait contre les avances masculines. Qu’une femme se présente en public la tête non couverte était considéré comme un rejet de son statut matrimonial. En revanche, on rasait la tête des femmes reconnues coupables d’adultère.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Si donc une femme ne se couvre pas la tête, pourquoi, alors, ne se fait-elle pas aussi tondre les cheveux ? Mais s’il est honteux pour une femme d’être tondue ou rasée, qu’elle se couvre donc la tête.
  '7':
  - type: text
    content: 'L’homme ne doit pas avoir la tête couverte, puisqu’il est l’image de Dieu et reflète sa gloire. La femme, elle, est la gloire de l’homme. '
  '8':
  - type: text
    content: En effet, l’homme n’a pas été tiré de la femme, mais la femme de l’homme
  - type: note
    content: Voir Gn 1.26-27 ; 2.18-23.
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'et l’homme n’a pas été créé à cause de la femme, mais la femme à cause de l’homme. '
