document_id: 1CO.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Suivez donc mon exemple, comme moi, de mon côté, je suis celui de Christ.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie dans la communauté
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’homme et la femme dans l’Eglise
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voilà pourquoi la femme doit porter sur la tête un signe d’autorité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon les uns cette « autorité » serait celle de la femme, selon les autres il s’agirait de l’autorité de son mari (cf. v. 3-5).
      marker-yv: yv-n
    - type: text
      text: ', à cause des anges. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Toutefois, dans l’ordre établi par le Seigneur, la femme n’existe pas sans l’homme, et l’homme n’existe pas sans la femme, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: car si la femme a été tirée de l’homme, celui-ci, à son tour, naît de la femme et, finalement, tous deux doivent leur vie à Dieu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jugez vous-mêmes de cela : est-il convenable pour une femme de prier Dieu la tête découverte ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ne paraît-il pas naturel à tout le monde que c’est une indignité pour un homme de porter des cheveux longs '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mais qu’une longue chevelure fait honneur à la femme ? Car la chevelure lui a été donnée pour lui servir de voile.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Si quelqu’un s’obstine à contester, nous lui répondons que ce qu’il propose n’est ni notre pratique ni celle des Eglises de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le repas du Seigneur
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Puisque j’en suis aux directives, il me faut mentionner un point pour lequel je ne saurais vous féliciter. C’est que vos réunions, au lieu de contribuer à votre progrès, vous font devenir pires.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tout d’abord j’entends dire que lorsque vous tenez une réunion, il y a parmi vous des divisions. – J’incline à croire qu’il y a une part de vérité dans ce qu’on raconte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Sans doute faut-il qu’il y ait chez vous des divisions, pour que les chrétiens qui ont fait leurs preuves soient clairement reconnus au milieu de vous !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je vous félicite de vous souvenir de moi en toute occasion et de maintenir fidèlement les traditions que je vous ai transmises.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ainsi, lorsque vous vous réunissez, on ne peut vraiment plus appeler cela « prendre le repas du Seigneur », '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: car, à peine êtes-vous à table, que chacun s’empresse de manger ses propres provisions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'agapes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (repas fraternels) au cours desquelles on célébrait la cène, on apportait des provisions que l’on mettait en commun. A Corinthe, chacun mangeait ce qu’il avait apporté.
      marker-yv: yv-n
    - type: text
      text: ', et l’on voit des gens manquer de nourriture pendant que d’autres s’enivrent.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: S’il ne s’agit que de manger et de boire, n’avez-vous pas vos maisons pour le faire ? Ou bien traitez-vous avec mépris l’Eglise de Dieu et avez-vous l’intention d’humilier les membres pauvres de votre assemblée ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que puis-je vous dire ? Vais-je vous féliciter ? Certainement pas. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Car voici la tradition que j’ai reçue du Seigneur, et que je vous ai transmise : le Seigneur Jésus, dans la nuit où il fut livré pour être mis à mort, prit du pain'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 26.26ss ; Mc 14.22-25 ; Lc 22.15-20.
      marker-yv: yv-n
    - type: text
      text: ', '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'et, après avoir prononcé la prière de reconnaissance, il le rompit en disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '« Ceci est mon corps : il est pour vous ; faites ceci en souvenir de moi. »'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'De même, après le repas, il prit la coupe et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '« Cette coupe est la nouvelle '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' '
      - type: usfm
        marker: w
        children:
        - type: text
          text: scellée
      - type: text
        text: ' de mon sang ; faites ceci, toutes les fois que vous en boirez, en souvenir de moi. »'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Donc, chaque fois que vous mangez de ce pain et que vous buvez de cette coupe, vous annoncez la mort du Seigneur, et ceci jusqu’à son retour.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'C’est pourquoi quiconque mangerait le pain ou boirait de la coupe du Seigneur d’une manière indigne se rendrait coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Que chacun donc s’examine sérieusement lui-même et qu’alors il mange de ce pain et boive de cette coupe. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Car celui qui mange et boit sans discerner ce qu’est le corps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits précisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le corps du Seigneur.
      marker-yv: yv-n
    - type: text
      text: ' se condamne lui-même en mangeant et en buvant ainsi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je voudrais cependant attirer votre attention sur un point : Christ est le chef'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans tout ce passage, Paul utilise un mot grec qui signifie à la fois '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chef.
      marker-yv: yv-n
    - type: text
      text: ' de tout homme, l’homme est le chef de la femme, le chef de Christ, c’est Dieu. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'C’est pour cette raison qu’il y a parmi vous tant de malades et d’infirmes, et qu’un certain nombre sont morts. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Si nous discernions ce que nous sommes, nous ne tomberions pas sous le jugement. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mais les jugements du Seigneur ont pour but de nous corriger afin que nous ne soyons pas condamnés avec le reste du monde.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ainsi donc, frères et sœurs, lorsque vous vous réunissez pour le repas en commun, attendez-vous les uns les autres. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Si quelqu’un a particulièrement faim, qu’il mange d’abord chez lui afin que vos réunions n’attirent pas sur vous le jugement de Dieu. Quant aux autres points, je les réglerai lors de mon passage chez vous.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si donc un homme prie ou prophétise la tête couverte, il outrage son chef. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais si une femme prie ou prophétise la tête non couverte, elle outrage son chef à elle : c’est comme si elle était rasée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon les normes sociales romaines, en vigueur à Corinthe, les femmes mariées devaient avoir la tête couverte lorsqu’elles se présentaient en public. Cette tenue les protégeait contre les avances masculines. Qu’une femme se présente en public la tête non couverte était considéré comme un rejet de son statut matrimonial. En revanche, on rasait la tête des femmes reconnues coupables d’adultère.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Si donc une femme ne se couvre pas la tête, pourquoi, alors, ne se fait-elle pas aussi tondre les cheveux ? Mais s’il est honteux pour une femme d’être tondue ou rasée, qu’elle se couvre donc la tête.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L’homme ne doit pas avoir la tête couverte, puisqu’il est l’image de Dieu et reflète sa gloire. La femme, elle, est la gloire de l’homme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: En effet, l’homme n’a pas été tiré de la femme, mais la femme de l’homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 1.26-27 ; 2.18-23.
      marker-yv: yv-n
    - type: text
      text: ', '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'et l’homme n’a pas été créé à cause de la femme, mais la femme à cause de l’homme. '
