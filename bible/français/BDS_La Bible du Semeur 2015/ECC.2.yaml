document_id: ECC.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fuite dans les plaisirs
  - type: text
    content: 'Je me suis dit en moi-même : « Va donc, teste les plaisirs, et goûte à ce qui est bon. » Mais cela aussi est vain. '
  '10':
  - type: text
    content: Je ne me suis rien refusé de tout ce que je voyais et désirais. Je ne me suis privé d’aucun plaisir. Oui, j’ai joui de tout mon labeur et c’est la part que j’ai retirée de toute la peine que je me suis donnée.
  '11':
  - type: text
    content: 'Puis j’ai considéré l’ensemble de mes réalisations, et toute la peine que je m’étais donnée pour les accomplir. Et voici ma conclusion : tout est vain ; autant courir après le vent. On n’en tire aucun avantage sous le soleil'
  - type: note
    content: Voir Ps 62.10.
  - type: text
    content: .
  - type: heading
    content: 'La sagesse, la folie et le travail : bilan'
  '12':
  - type: text
    content: 'Puis j’ai considéré et examiné la sagesse ainsi que la folie et la déraison : qu’en sera-t-il de l’homme qui succédera au roi ? Il fera ce qu’on a déjà fait par le passé.'
  '13':
  - type: text
    content: 'J’ai constaté que la sagesse est plus avantageuse que la déraison, tout comme la lumière est plus avantageuse que les ténèbres. '
  '14':
  - type: text
    content: Le sage a des yeux pour voir, alors que l’insensé marche dans les ténèbres.
  - type: text
    content: Cependant, j’ai aussi constaté qu’un même sort attend l’un et l’autre.
  '15':
  - type: text
    content: 'Alors je me suis dit en moi-même : « Je vais connaître le même sort que l’insensé ; à quoi bon avoir été plus sage ? » Et j’ai conclu en moi-même que cela aussi était déplorable.'
  '16':
  - type: text
    content: Car on ne se souviendra pas longtemps du sage, pas plus que de l’insensé et, dans les temps à venir, tous deux tomberont dans l’oubli. Car le sage mourra aussi bien que l’insensé.
  '17':
  - type: text
    content: 'Alors j’en suis venu à haïr la vie, car tout ce qui se fait sous le soleil m’est apparu détestable, parce que tout est dérisoire : autant courir après le vent.'
  '18':
  - type: text
    content: 'J’ai fini par prendre en dégoût tout le labeur pour lequel je me suis donné tant de peine sous le soleil et dont je devrai laisser le fruit à mon successeur. '
  '19':
  - type: text
    content: Car qui sait s’il sera sage ou insensé ? Pourtant, c’est lui qui disposera de tout ce que j’ai réalisé sous le soleil grâce à mon labeur pour lequel j’ai trimé et mis en œuvre la sagesse. Cela aussi est déplorable.
  '2':
  - type: text
    content: 'Du rire, j’ai dit : « C’est absurde », et de l’hilarité : « A quoi cela m’avance-t-il ? »'
  '20':
  - type: text
    content: 'Aussi j’en suis arrivé au désespoir en pensant à tout le labeur pour lequel je me suis donné tant de peine sous le soleil. '
  '21':
  - type: text
    content: En effet, on accomplit son labeur avec sagesse, compétence et adresse, et c’est à quelqu’un qui n’a jamais participé à ce travail qu’on laisse tout ce qu’on en a retiré. Cela aussi est déplorable, et c’est un grand mal.
  '22':
  - type: text
    content: Car, que retire l’homme de tout son labeur et de toutes ses préoccupations pour lesquels il s’est donné tant de peine sous le soleil ?
  '23':
  - type: text
    content: Ses journées lui apportent bien des maux, ses occupations lui occasionnent bien des souffrances. Même la nuit, il ne trouve pas de repos. Cela aussi est déplorable.
  '24':
  - type: text
    content: Il n’y a rien de bon pour l’homme, sinon manger, boire et se donner du bon temps au milieu de son dur labeur. Et j’ai constaté que cela même vient de la main de Dieu
  - type: note
    content: Voir 3.12-13 ; 5.18 ; 8.15 ; 9.7.
  - type: text
    content: .
  '25':
  - type: text
    content: En effet, qui peut manger et profiter de la vie sans que cela vienne de lui
  - type: note
    content: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : sinon moi-même.'
  - type: text
    content: '  ?'
  '26':
  - type: text
    content: Car Dieu donne à l’homme qui se comporte bien à ses yeux
  - type: note
    content: 'Autre traduction : qui lui est agréable.'
  - type: text
    content: ' la sagesse, la connaissance et la joie, mais il impose comme occupation à celui qui fait le mal le soin de recueillir et d’amasser pour celui qui se comporte bien à ses yeux.'
  - type: text
    content: 'Cela aussi est dérisoire : autant courir après le vent.'
  '3':
  - type: text
    content: Puis j’ai décidé en moi-même de m’adonner au vin
  - type: note
    content: 'Autre traduction : Dans le cadre de ma recherche et de ma réflexion, je me suis adonné au vin.'
  - type: text
    content: ', tout en continuant à me conduire avec sagesse, et j’ai résolu de me lancer dans la folie, le temps de voir ce qu’il est bon pour les humains de faire sous le ciel pendant les jours qu’ils ont à y vivre.'
  - type: heading
    content: La fuite dans les grandes entreprises
  '4':
  - type: text
    content: J’ai réalisé de grandes choses. Je me suis bâti des maisons. Je me suis planté des vignes
  - type: note
    content: Pour les v. 4-9, voir 1 R 5.2-4 ; 10.10, 14-27 ; 1 Ch 29.25 ; 2 Ch 9.22-27.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Je me suis aménagé des jardins et des vergers et j’y ai planté des arbres fruitiers de toutes sortes. '
  '6':
  - type: text
    content: Je me suis fait des bassins pour irriguer des pépinières où croissent des arbres.
  '7':
  - type: text
    content: Je me suis procuré des esclaves et des servantes, j’ai eu du personnel domestique
  - type: note
    content: 'Autre traduction : beaucoup d’esclaves nés dans ma maison.'
  - type: text
    content: . J’ai possédé en abondance du gros et du menu bétail, bien plus que tous ceux qui m’ont précédé à Jérusalem.
  '8':
  - type: text
    content: Je me suis amassé de l’argent et de l’or, provenant des trésors des rois et des provinces
  - type: note
    content: 'Autre traduction : et des trésors dignes d’un roi provenant de régions diverses.'
  - type: text
    content: . J’ai formé des chanteurs et des chanteuses et, délice suprême des hommes, j’ai eu des femmes en quantité
  - type: note
    content: 'Mot hébreu de sens incertain. Autres traductions : des servantes, des princesses, le luxe. Le terme apparenté en langue cananéenne signifie : concubine, maîtresse.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Ainsi j’ai été grand, et j’ai surpassé tous ceux qui m’ont précédé à Jérusalem. En tout cela, ma sagesse m’assistait. '
