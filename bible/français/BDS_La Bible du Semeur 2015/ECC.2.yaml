document_id: ECC.2
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fuite dans les plaisirs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je me suis dit en moi-même : « Va donc, teste les plaisirs, et goûte à ce qui est bon. » Mais cela aussi est vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Du rire, j’ai dit : « C’est absurde », et de l’hilarité : « A quoi cela m’avance-t-il ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis j’ai décidé en moi-même de m’adonner au vin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dans le cadre de ma recherche et de ma réflexion, je me suis adonné au vin.
    marker-yv: yv-n
  - type: text
    text: ', tout en continuant à me conduire avec sagesse, et j’ai résolu de me lancer dans la folie, le temps de voir ce qu’il est bon pour les humains de faire sous le ciel pendant les jours qu’ils ont à y vivre.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fuite dans les grandes entreprises
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J’ai réalisé de grandes choses. Je me suis bâti des maisons. Je me suis planté des vignes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 4-9, voir 1 R 5.2-4 ; 10.10, 14-27 ; 1 Ch 29.25 ; 2 Ch 9.22-27.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je me suis aménagé des jardins et des vergers et j’y ai planté des arbres fruitiers de toutes sortes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je me suis fait des bassins pour irriguer des pépinières où croissent des arbres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je me suis procuré des esclaves et des servantes, j’ai eu du personnel domestique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: beaucoup d’esclaves nés dans ma maison.
    marker-yv: yv-n
  - type: text
    text: . J’ai possédé en abondance du gros et du menu bétail, bien plus que tous ceux qui m’ont précédé à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je me suis amassé de l’argent et de l’or, provenant des trésors des rois et des provinces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et des trésors dignes d’un roi provenant de régions diverses.
    marker-yv: yv-n
  - type: text
    text: . J’ai formé des chanteurs et des chanteuses et, délice suprême des hommes, j’ai eu des femmes en quantité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mot hébreu de sens incertain. Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des servantes, des princesses, le luxe. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme apparenté en langue cananéenne signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: concubine, maîtresse.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi j’ai été grand, et j’ai surpassé tous ceux qui m’ont précédé à Jérusalem. En tout cela, ma sagesse m’assistait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je ne me suis rien refusé de tout ce que je voyais et désirais. Je ne me suis privé d’aucun plaisir. Oui, j’ai joui de tout mon labeur et c’est la part que j’ai retirée de toute la peine que je me suis donnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis j’ai considéré l’ensemble de mes réalisations, et toute la peine que je m’étais donnée pour les accomplir. Et voici ma conclusion : tout est vain ; autant courir après le vent. On n’en tire aucun avantage sous le soleil'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62.10
        metadata:
          usfm: PSA.62.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: 'La sagesse, la folie et le travail : bilan'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis j’ai considéré et examiné la sagesse ainsi que la folie et la déraison : qu’en sera-t-il de l’homme qui succédera au roi ? Il fera ce qu’on a déjà fait par le passé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’ai constaté que la sagesse est plus avantageuse que la déraison, tout comme la lumière est plus avantageuse que les ténèbres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le sage a des yeux pour voir, alors que l’insensé marche dans les ténèbres.
- type: usfm
  marker: p
  children:
  - type: text
    text: Cependant, j’ai aussi constaté qu’un même sort attend l’un et l’autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors je me suis dit en moi-même : « Je vais connaître le même sort que l’insensé ; à quoi bon avoir été plus sage ? » Et j’ai conclu en moi-même que cela aussi était déplorable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car on ne se souviendra pas longtemps du sage, pas plus que de l’insensé et, dans les temps à venir, tous deux tomberont dans l’oubli. Car le sage mourra aussi bien que l’insensé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors j’en suis venu à haïr la vie, car tout ce qui se fait sous le soleil m’est apparu détestable, parce que tout est dérisoire : autant courir après le vent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’ai fini par prendre en dégoût tout le labeur pour lequel je me suis donné tant de peine sous le soleil et dont je devrai laisser le fruit à mon successeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car qui sait s’il sera sage ou insensé ? Pourtant, c’est lui qui disposera de tout ce que j’ai réalisé sous le soleil grâce à mon labeur pour lequel j’ai trimé et mis en œuvre la sagesse. Cela aussi est déplorable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aussi j’en suis arrivé au désespoir en pensant à tout le labeur pour lequel je me suis donné tant de peine sous le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, on accomplit son labeur avec sagesse, compétence et adresse, et c’est à quelqu’un qui n’a jamais participé à ce travail qu’on laisse tout ce qu’on en a retiré. Cela aussi est déplorable, et c’est un grand mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car, que retire l’homme de tout son labeur et de toutes ses préoccupations pour lesquels il s’est donné tant de peine sous le soleil ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ses journées lui apportent bien des maux, ses occupations lui occasionnent bien des souffrances. Même la nuit, il ne trouve pas de repos. Cela aussi est déplorable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il n’y a rien de bon pour l’homme, sinon manger, boire et se donner du bon temps au milieu de son dur labeur. Et j’ai constaté que cela même vient de la main de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 3.12-13 ; 5.18 ; 8.15 ; 9.7.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En effet, qui peut manger et profiter de la vie sans que cela vienne de lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sinon moi-même.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car Dieu donne à l’homme qui se comporte bien à ses yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui lui est agréable.
    marker-yv: yv-n
  - type: text
    text: ' la sagesse, la connaissance et la joie, mais il impose comme occupation à celui qui fait le mal le soin de recueillir et d’amasser pour celui qui se comporte bien à ses yeux.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cela aussi est dérisoire : autant courir après le vent.'
