document_id: 1CH.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Joie et louanges
  - type: text
    content: 'On amena le coffre de Dieu et on le déposa au milieu de la tente que David avait fait dresser pour lui, et l’on offrit devant Dieu des holocaustes et des sacrifices de communion. '
  '10':
  - type: text
    content: Soyez fiers de lui, ╵car il est très saint !
  - type: text
    content: Que le cœur de ceux ╵qui sont attachés à l’Eternel ╵soit rempli de joie !
  '11':
  - type: text
    content: Tournez-vous vers l’Eternel ! ╵Faites appel à sa force !
  - type: text
    content: Aspirez à vivre ╵constamment en sa présence !
  '12':
  - type: text
    content: Souvenez-vous des merveilles ╵qu’il a accomplies !
  - type: text
    content: Rappelez-vous ses prodiges ╵et les jugements ╵qu’il a prononcés,
  '13':
  - type: text
    content: vous, les descendants ╵d’Israël, son serviteur,
  - type: text
    content: vous, descendants de Jacob, ╵vous, qu’il a choisis !
  '14':
  - type: text
    content: Notre Dieu, c’est l’Eternel,
  - type: text
    content: sur toute la terre ╵s’exercent ses jugements.
  '15':
  - type: text
    content: Souvenez-vous pour toujours ╵de son alliance,
  - type: text
    content: 'de ce qu’il a donné sa parole ╵pour mille générations :'
  '16':
  - type: text
    content: il a conclu un traité ╵avec Abraham,
  - type: text
    content: et l’a confirmé ╵par serment à Isaac
  - type: note
    content: Pour les v. 16-18, voir Gn 12.7 ; 26.3 ; 28.13.
  - type: text
    content: .
  '17':
  - type: text
    content: Il l’a confirmé ╵à Jacob ╵en en faisant une loi
  - type: text
    content: et, pour Israël, ╵une alliance pour toujours.
  '18':
  - type: text
    content: 'Il a déclaré : ╵« Je te donnerai ╵le pays de Canaan,'
  - type: text
    content: ce sera la part ╵que vous allez posséder. »
  '19':
  - type: text
    content: Vous n’étiez alors ╵qu’un très petit nombre,
  - type: text
    content: une poignée d’immigrés,
  '2':
  - type: text
    content: 'Quand David eut achevé d’offrir ces sacrifices, il bénit le peuple au nom de l’Eternel. '
  '20':
  - type: text
    content: allant çà et là, ╵d’une peuplade à une autre,
  - type: text
    content: d’un royaume vers un autre peuple.
  '21':
  - type: text
    content: Mais Dieu ne laissa personne ╵les persécuter ;
  - type: text
    content: il réprimanda des rois à leur sujet
  - type: note
    content: Pour les v. 21-22, voir Gn 12.17-20 ; 20.3-7.
  - type: text
    content: '  :'
  '22':
  - type: text
    content: « Ne maltraitez pas ╵ceux qui me sont consacrés,
  - type: text
    content: et ne faites pas de mal ╵à ceux qui sont mes prophètes ! »
  '23':
  - type: text
    content: Chantez à l’Eternel
  - type: note
    content: Les v. 23-33 reprennent le Ps 96.
  - type: text
    content: ', ╵vous, gens du monde entier !'
  - type: text
    content: Annoncez chaque jour ╵la bonne nouvelle de son salut !
  '24':
  - type: text
    content: Oui, publiez sa gloire ╵au milieu des nations !
  - type: text
    content: Racontez ses prodiges ╵chez tous les peuples !
  '25':
  - type: text
    content: Car l’Eternel est grand ╵et digne de louanges,
  - type: text
    content: et il est redoutable ╵bien plus que tous les dieux.
  '26':
  - type: text
    content: Car tous les dieux des peuples ╵ne sont que des faux dieux,
  - type: text
    content: alors que l’Eternel ╵a fait le ciel.
  '27':
  - type: text
    content: Splendeur et majesté ╵rayonnent de son être,
  - type: text
    content: et puissance et beauté ╵ornent son sanctuaire
  - type: note
    content: 'D’après l’ancienne version grecque et Ps 96.6  ; le texte hébreu traditionnel a : son lieu. Les deux termes se ressemblent en hébreu.'
  - type: text
    content: .
  '28':
  - type: text
    content: Célébrez l’Eternel, ╵vous, gens de tous les peuples,
  - type: text
    content: célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
  '29':
  - type: text
    content: Célébrez l’Eternel ╵et son nom glorieux !
  - type: text
    content: Apportez vos offrandes ╵et entrez devant lui
  - type: text
    content: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
  - type: note
    content: 'Autre traduction : revêtus de vêtements sacrés.'
  - type: text
    content: '  !'
  '3':
  - type: text
    content: Puis il fit distribuer à tous les Israélites, hommes et femmes, une miche de pain, une portion de viande rôtie et une masse de raisins secs
  - type: note
    content: 'une portion de viande rôtie et une masse de raisins secs: traduction incertaine. Autre traduction : un gâteau de dattes et un gâteau de raisins. Voir Lv 3.1-17 ; 7.11-21, 28-36.'
  - type: text
    content: .
  '30':
  - type: text
    content: Vous, gens du monde entier, ╵tremblez devant sa face !
  - type: text
    content: Le monde est ferme, ╵il n’est pas ébranlé.
  '31':
  - type: text
    content: Que le ciel soit en joie ! ╵Et que la terre exulte d’allégresse !
  - type: text
    content: Qu’à tout peuple on proclame ╵que l’Eternel est roi !
  '32':
  - type: text
    content: Que la mer retentisse ╵et tout ce qui l’habite !
  - type: text
    content: Que toute la campagne ╵et tout ce qui s’y trouve ╵se réjouissent !
  '33':
  - type: text
    content: Que, dans les bois, les arbres ╵poussent des cris de joie
  - type: text
    content: devant l’Eternel, car il vient ╵pour gouverner
  - type: note
    content: Voir Ps 82.8 et la note.
  - type: text
    content: ' la terre.'
  '34':
  - type: text
    content: Célébrez l’Eternel
  - type: note
    content: Les v. 34-36 reprennent le Ps 106.1, 47-48.
  - type: text
    content: ' ╵car il est bon,'
  - type: text
    content: car son amour ╵dure à toujours
  - type: note
    content: Voir 2 Ch 5.13 ; Esd 3.11 ; Ps 100.5 ; 107.1 ; 118.1, 29 ; 136.1 ; Jr 33.11.
  - type: text
    content: .
  '35':
  - type: text
    content: 'Et dites : ╵« Délivre-nous, ô Dieu ╵notre Sauveur !'
  - type: text
    content: Rassemble-nous, ╵délivre-nous ╵des autres peuples !
  - type: text
    content: Nous te célébrerons, ╵toi qui es saint,
  - type: text
    content: et mettrons notre gloire ╵à te louer. »
  '36':
  - type: text
    content: Béni soit l’Eternel, ╵Dieu d’Israël,
  - type: text
    content: d’éternité ╵jusqu’en éternité !
  - type: text
    content: Tout le peuple répondit « Amen ! » et loua l’Eternel.
  - type: heading
    content: L’organisation du culte
  '37':
  - type: text
    content: David chargea alors Asaph et les membres de sa famille de se tenir devant le coffre de l’alliance de l’Eternel, pour assurer leur service de manière permanente, suivant les rites prévus pour chaque jour.
  '38':
  - type: text
    content: 'Il désigna, comme portiers, Obed-Edom, fils de Yedoutoun, ainsi que soixante-huit hommes de sa parenté, et Hosa. '
  '39':
  - type: text
    content: Il chargea aussi le prêtre Tsadoq et les autres prêtres de sa parenté d’officier devant le tabernacle
  - type: note
    content: Il s’agit de la tente construite au désert sous la direction de Moïse où étaient toujours offerts les sacrifices prescrits par la Loi (voir Ex 29.38-39 ; Lv 6.7-10 ; Nb 28.3-6).
  - type: text
    content: ' de l’Eternel qui se trouvait sur le haut lieu de Gabaon'
  - type: note
    content: 1 R 3.4 et note.
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'Il institua dans leur service devant le coffre de l’Eternel un certain nombre de lévites ayant pour fonction d’invoquer l’Eternel, le Dieu d’Israël, de le célébrer et de le louer. '
  '40':
  - type: text
    content: 'en offrant tous les jours, matin et soir, des holocaustes à l’Eternel sur l’autel des holocaustes, selon tout ce qui est écrit dans la Loi que l’Eternel a donnée à Israël. '
  '41':
  - type: text
    content: 'Ils avaient avec eux Hémân, Yedoutoun et les autres hommes qui avaient été choisis et désignés nominativement pour louer l’Eternel en ces termes : « Car son amour dure à toujours. » '
  '42':
  - type: text
    content: Hémân et Yedoutoun étaient chargés de faire retentir les trompettes et les cymbales, ainsi que les autres instruments de musique destinés à accompagner le chant pour Dieu. Les fils de Yedoutoun étaient affectés aux fonctions de gardiens.
  '43':
  - type: text
    content: Puis tout le peuple s’en alla, chacun chez soi, et David rentra aussi chez lui pour bénir sa famille.
  '5':
  - type: text
    content: C’étaient Asaph, leur chef, Zacharie, son second, puis Yeïel, Shemiramoth, Yehiel, Mattitia, Eliab, Benaya, Obed-Edom et Yeïel. Ils jouaient des instruments de musique, des luths et des lyres, et Asaph faisait retentir les cymbales.
  '6':
  - type: text
    content: 'Les prêtres Benaya et Yahaziel sonnaient continuellement de la trompette devant le coffre de l’alliance de Dieu. '
  '7':
  - type: text
    content: Ce fut à cette époque que David chargea pour la première fois Asaph et les membres de sa famille de célébrer l’Eternel.
  '8':
  - type: text
    content: Louez l’Eternel
  - type: note
    content: Les v. 8-22 reprennent le Ps 105.1-15.
  - type: text
    content: ', ╵et faites appel à lui !'
  - type: text
    content: Publiez parmi les peuples ╵ses hauts faits !
  '9':
  - type: text
    content: Chantez à sa gloire, ╵et célébrez-le ╵en musique !
  - type: text
    content: Racontez sans cesse ╵toutes ses merveilles !
