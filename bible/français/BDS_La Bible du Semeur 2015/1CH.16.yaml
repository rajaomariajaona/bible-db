document_id: 1CH.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joie et louanges
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'On amena le coffre de Dieu et on le déposa au milieu de la tente que David avait fait dresser pour lui, et l’on offrit devant Dieu des holocaustes et des sacrifices de communion. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Soyez fiers de lui, ╵car il est très saint !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le cœur de ceux ╵qui sont attachés à l’Eternel ╵soit rempli de joie !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tournez-vous vers l’Eternel ! ╵Faites appel à sa force !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aspirez à vivre ╵constamment en sa présence !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Souvenez-vous des merveilles ╵qu’il a accomplies !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rappelez-vous ses prodiges ╵et les jugements ╵qu’il a prononcés,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: vous, les descendants ╵d’Israël, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, descendants de Jacob, ╵vous, qu’il a choisis !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Notre Dieu, c’est l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toute la terre ╵s’exercent ses jugements.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Souvenez-vous pour toujours ╵de son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de ce qu’il a donné sa parole ╵pour mille générations :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: il a conclu un traité ╵avec Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’a confirmé ╵par serment à Isaac
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 16-18, voir Gn 12.7 ; 26.3 ; 28.13.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il l’a confirmé ╵à Jacob ╵en en faisant une loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, pour Israël, ╵une alliance pour toujours.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il a déclaré : ╵« Je te donnerai ╵le pays de Canaan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera la part ╵que vous allez posséder. »
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Vous n’étiez alors ╵qu’un très petit nombre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une poignée d’immigrés,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand David eut achevé d’offrir ces sacrifices, il bénit le peuple au nom de l’Eternel. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: allant çà et là, ╵d’une peuplade à une autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’un royaume vers un autre peuple.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mais Dieu ne laissa personne ╵les persécuter ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il réprimanda des rois à leur sujet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 21-22, voir Gn 12.17-20 ; 20.3-7.
      marker-yv: yv-n
    - type: text
      text: '  :'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: « Ne maltraitez pas ╵ceux qui me sont consacrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas de mal ╵à ceux qui sont mes prophètes ! »
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Chantez à l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 23-33 reprennent le '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 96
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ╵vous, gens du monde entier !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annoncez chaque jour ╵la bonne nouvelle de son salut !
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Oui, publiez sa gloire ╵au milieu des nations !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Racontez ses prodiges ╵chez tous les peuples !
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Car l’Eternel est grand ╵et digne de louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il est redoutable ╵bien plus que tous les dieux.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Car tous les dieux des peuples ╵ne sont que des faux dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que l’Eternel ╵a fait le ciel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Splendeur et majesté ╵rayonnent de son être,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et puissance et beauté ╵ornent son sanctuaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 96.6
        - type: text
          text: '  ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son lieu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les deux termes se ressemblent en hébreu.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Célébrez l’Eternel, ╵vous, gens de tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: célébrez l’Eternel, ╵en proclamant ╵sa gloire et sa puissance !
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Célébrez l’Eternel ╵et son nom glorieux !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apportez vos offrandes ╵et entrez devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et prosternez-vous devant l’Eternel ╵dont la sainteté brille avec éclat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: revêtus de vêtements sacrés.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Puis il fit distribuer à tous les Israélites, hommes et femmes, une miche de pain, une portion de viande rôtie et une masse de raisins secs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une portion de viande rôtie et une masse de raisins secs
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduction incertaine. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un gâteau de dattes et un gâteau de raisins. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 3.1-17 ; 7.11-21, 28-36.
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Vous, gens du monde entier, ╵tremblez devant sa face !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le monde est ferme, ╵il n’est pas ébranlé.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Que le ciel soit en joie ! ╵Et que la terre exulte d’allégresse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’à tout peuple on proclame ╵que l’Eternel est roi !
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Que la mer retentisse ╵et tout ce qui l’habite !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toute la campagne ╵et tout ce qui s’y trouve ╵se réjouissent !
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Que, dans les bois, les arbres ╵poussent des cris de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant l’Eternel, car il vient ╵pour gouverner
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 82.8
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: ' la terre.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Célébrez l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 34-36 reprennent le '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 106.1
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 47-48
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵car il est bon,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son amour ╵dure à toujours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 Ch 5.13 ; Esd 3.11 ; Ps 100.5 ; 107.1 ; 118.1, 29 ; 136.1 ; Jr 33.11.
      marker-yv: yv-n
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Et dites : ╵« Délivre-nous, ô Dieu ╵notre Sauveur !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemble-nous, ╵délivre-nous ╵des autres peuples !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous te célébrerons, ╵toi qui es saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettrons notre gloire ╵à te louer. »
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Béni soit l’Eternel, ╵Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’éternité ╵jusqu’en éternité !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple répondit « Amen ! » et loua l’Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’organisation du culte
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: David chargea alors Asaph et les membres de sa famille de se tenir devant le coffre de l’alliance de l’Eternel, pour assurer leur service de manière permanente, suivant les rites prévus pour chaque jour.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il désigna, comme portiers, Obed-Edom, fils de Yedoutoun, ainsi que soixante-huit hommes de sa parenté, et Hosa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Il chargea aussi le prêtre Tsadoq et les autres prêtres de sa parenté d’officier devant le tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de la tente construite au désert sous la direction de Moïse où étaient toujours offerts les sacrifices prescrits par la Loi (voir Ex 29.38-39 ; Lv 6.7-10 ; Nb 28.3-6).
      marker-yv: yv-n
    - type: text
      text: ' de l’Eternel qui se trouvait sur le haut lieu de Gabaon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.39 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 3.4
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il institua dans leur service devant le coffre de l’Eternel un certain nombre de lévites ayant pour fonction d’invoquer l’Eternel, le Dieu d’Israël, de le célébrer et de le louer. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'en offrant tous les jours, matin et soir, des holocaustes à l’Eternel sur l’autel des holocaustes, selon tout ce qui est écrit dans la Loi que l’Eternel a donnée à Israël. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ils avaient avec eux Hémân, Yedoutoun et les autres hommes qui avaient été choisis et désignés nominativement pour louer l’Eternel en ces termes : « Car son amour dure à toujours. » '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Hémân et Yedoutoun étaient chargés de faire retentir les trompettes et les cymbales, ainsi que les autres instruments de musique destinés à accompagner le chant pour Dieu. Les fils de Yedoutoun étaient affectés aux fonctions de gardiens.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Puis tout le peuple s’en alla, chacun chez soi, et David rentra aussi chez lui pour bénir sa famille.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’étaient Asaph, leur chef, Zacharie, son second, puis Yeïel, Shemiramoth, Yehiel, Mattitia, Eliab, Benaya, Obed-Edom et Yeïel. Ils jouaient des instruments de musique, des luths et des lyres, et Asaph faisait retentir les cymbales.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les prêtres Benaya et Yahaziel sonnaient continuellement de la trompette devant le coffre de l’alliance de Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ce fut à cette époque que David chargea pour la première fois Asaph et les membres de sa famille de célébrer l’Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
