document_id: MAT.25,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole des dix jeunes filles
  - type: text
    content: ' '
  - type: text
    content: 'Ce jour-là, il en sera du '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' comme de dix jeunes filles qui prirent leurs lampes et s’en allèrent à la rencontre du marié.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: 'Elles partirent en chercher. Pendant ce temps, le marié arriva : celles qui étaient prêtes entrèrent avec lui dans la salle de noces, et l’on ferma la porte.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Plus tard, les autres jeunes filles arrivèrent à leur tour ; mais elles eurent beau crier : « Seigneur, Seigneur, ouvre-nous ! »'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Il leur répondit : « Vraiment, je vous l’assure : je ne sais pas qui vous êtes. »'
  '13':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi,
  - type: text
    content: ' ajouta Jésus, '
  - type: text
    content: tenez-vous en éveil, car vous ne savez ni le jour, ni l’heure de ma venue.
  - type: heading
    content: La parabole de l’argent à faire fructifier
  - type: heading
    content: (Lc 19.12-27)
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Il en sera comme d’un homme qui partit pour un voyage : il convoqua ses serviteurs et leur confia l’administration de ses biens.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Il remit à l’un cinq lingots
  - type: note
    content: Il s’agit de talents. Le talent équivalait à dix fois le salaire annuel d’un ouvrier.
  - type: text
    content: ', à un autre deux, et à un troisième un seul, en tenant compte des capacités personnelles de chacun. Puis il s’en alla.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: Celui qui avait reçu les cinq lingots se mit aussitôt à les faire fructifier, de sorte qu’il en gagna cinq autres.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Celui qui en avait reçu deux fit de même et en gagna deux autres.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Quant à celui qui n’en avait reçu qu’un, il s’en alla creuser un trou dans la terre pour y cacher l’argent de son maître.
  '19':
  - type: text
    content: ' '
  - type: text
    content: Longtemps après, le maître de ces serviteurs revint et leur fit rendre compte de leur gérance.
  '2':
  - type: text
    content: 'Cinq d’entre elles étaient insensées, les cinq autres étaient avisées :'
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Celui qui avait reçu les cinq lingots se présenta, apportant les cinq lingots supplémentaires qu’il avait gagnés.
  - type: text
    content: « Maître, dit-il, tu m’avais remis cinq lingots, j’en ai gagné cinq autres. Les voici.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Très bien, lui dit son maître, tu es un bon serviteur, en qui l’on peut avoir confiance. Tu t’es montré fidèle en peu de choses. C’est pourquoi je t’en confierai de plus importantes. Viens partager la joie de ton maître ! »
  '22':
  - type: text
    content: ' '
  - type: text
    content: 'Celui qui avait reçu les deux lingots se présenta aussi et dit : « Maître, tu m’avais remis deux lingots, j’en ai gagné deux autres. Les voici.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: – Très bien, lui dit son maître, tu es un bon serviteur, en qui l’on peut avoir confiance. Tu t’es montré fidèle en peu de choses. C’est pourquoi je t’en confierai de plus importantes. Viens partager la joie de ton maître ! »
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Enfin, celui qui n’avait reçu qu’un lingot vint à son tour et dit : « Maître, je savais que tu es un homme dur : tu moissonnes là où tu n’as rien semé, tu récoltes où tu n’as pas répandu de semence.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Alors, j’ai pris peur et je suis allé cacher ton argent dans la terre. Voilà : prends ce qui t’appartient. »'
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Mais son maître lui répondit : « Vaurien ! Fainéant ! Tu savais que je moissonne là où je n’ai rien semé et que je récolte là où je n’ai pas répandu de semence !'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Eh bien, tu aurais dû placer mon argent chez les banquiers et, à mon retour, j’aurais récupéré le capital et les intérêts.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Qu’on lui retire donc le lingot et qu’on le donne à celui qui en a déjà dix.
  '29':
  - type: text
    content: ' '
  - type: text
    content: Car à celui qui a, on donnera encore, et il sera dans l’abondance. Mais à celui qui n’a pas, on ôtera même ce qu’il a.
  - type: text
    content: ' '
  '3':
  - type: text
    content: les jeunes filles insensées prirent leurs lampes sans penser à emporter de réserve d’huile,
  - type: text
    content: ' '
  '30':
  - type: text
    content: Quant à ce vaurien, jetez-le dans les ténèbres du dehors, où il y aura des pleurs et d’amers regrets. »
  - type: heading
    content: Le jugement dernier
  '31':
  - type: text
    content: ' '
  - type: text
    content: 'Quand le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' viendra dans sa gloire, avec tous ses '
  - type: text
    content: anges
  - type: text
    content: ', il prendra place sur son trône glorieux.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Tous les peuples de la terre seront rassemblés devant lui. Alors il les divisera en deux groupes – tout comme le berger fait le tri entre les brebis et les boucs.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Il placera les brebis à sa droite et les boucs à sa gauche.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Après quoi, le roi dira à ceux qui seront à sa droite : « Venez, vous qui êtes bénis par mon Père : prenez possession du '
  - type: text
    content: royaume
  - type: text
    content: ' qu’il a préparé pour vous depuis la création du monde.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Car j’ai eu faim, et vous m’avez donné à manger. J’ai eu soif, et vous m’avez donné à boire. J’étais un étranger, et vous m’avez accueilli chez vous.
  - type: text
    content: ' '
  '36':
  - type: text
    content: J’étais nu, et vous m’avez donné des vêtements. J’étais malade, et vous m’avez soigné. J’étais en prison, et vous êtes venus à moi. »
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'Alors, les justes lui demanderont : « Mais, Seigneur, quand t’avons-nous vu avoir faim, et t’avons-nous donné à manger ? Ou avoir soif, et t’avons-nous donné à boire ?'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Ou quand t’avons-nous vu étranger et t’avons-nous accueilli ? Ou nu, et t’avons-nous vêtu ?
  - type: text
    content: ' '
  '39':
  - type: text
    content: Ou malade ou prisonnier, et sommes-nous venus te rendre visite ? »
  '4':
  - type: text
    content: mais celles qui étaient avisées prirent, avec leurs lampes, des flacons contenant de l’huile.
  '40':
  - type: text
    content: ' '
  - type: text
    content: 'Et le roi leur répondra : « Vraiment, je vous l’assure : chaque fois que vous avez fait cela à l’un de ces plus petits de mes frères, c’est à moi-même que vous l’avez fait. »'
  '41':
  - type: text
    content: ' '
  - type: text
    content: 'Puis il se tournera vers ceux qui seront à sa gauche : « Retirez-vous loin de moi, vous que Dieu a maudits, et allez dans le feu éternel préparé pour le diable et ses anges.'
  - type: text
    content: ' '
  '42':
  - type: text
    content: Car j’ai eu faim, et vous ne m’avez rien donné à manger. J’ai eu soif, et vous ne m’avez rien donné à boire.
  - type: text
    content: ' '
  '43':
  - type: text
    content: J’étais un étranger, et vous ne m’avez pas accueilli chez vous. J’étais nu, et vous ne m’avez pas donné de vêtements. J’étais malade et en prison, et vous n’avez pas pris soin de moi. »
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'Alors, ils lui demanderont à leur tour : « Mais, Seigneur, quand t’avons-nous vu souffrant de la faim ou de la soif ; quand t’avons-nous vu étranger, nu, malade ou en prison, et avons-nous négligé de te rendre service ? »'
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'Alors il leur répondra : « Vraiment, je vous l’assure : chaque fois que vous n’avez pas fait cela à l’un de ces plus petits, c’est à moi que vous avez manqué de le faire. »'
  '46':
  - type: text
    content: ' '
  - type: text
    content: Et ils s’en iront au châtiment éternel. Tandis que les justes entreront dans la vie éternelle.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Comme le marié se faisait attendre, elles s’assoupirent toutes et finirent par céder au sommeil.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'A minuit, un cri retentit : « Voici l’époux ! Allez à sa rencontre ! »'
  '7':
  - type: text
    content: ' '
  - type: text
    content: Toutes les jeunes filles se levèrent et préparèrent leurs lampes.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Alors les jeunes filles insensées s’adressèrent à celles qui étaient avisées : « Donnez-nous de votre huile, car nos lampes sont en train de s’éteindre. »'
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Mais celles-ci leur répondirent : « Non ! Il n’y en aurait jamais assez pour nous et pour vous. Courez plutôt vous en acheter chez le marchand. »'
