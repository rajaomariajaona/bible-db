document_id: MAT.25
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole des dix jeunes filles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ce jour-là, il en sera du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ' comme de dix jeunes filles qui prirent leurs lampes et s’en allèrent à la rencontre du marié.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cinq d’entre elles étaient insensées, les cinq autres étaient avisées :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: les jeunes filles insensées prirent leurs lampes sans penser à emporter de réserve d’huile,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais celles qui étaient avisées prirent, avec leurs lampes, des flacons contenant de l’huile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comme le marié se faisait attendre, elles s’assoupirent toutes et finirent par céder au sommeil.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A minuit, un cri retentit : « Voici l’époux ! Allez à sa rencontre ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutes les jeunes filles se levèrent et préparèrent leurs lampes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors les jeunes filles insensées s’adressèrent à celles qui étaient avisées : « Donnez-nous de votre huile, car nos lampes sont en train de s’éteindre. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais celles-ci leur répondirent : « Non ! Il n’y en aurait jamais assez pour nous et pour vous. Courez plutôt vous en acheter chez le marchand. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Elles partirent en chercher. Pendant ce temps, le marié arriva : celles qui étaient prêtes entrèrent avec lui dans la salle de noces, et l’on ferma la porte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Plus tard, les autres jeunes filles arrivèrent à leur tour ; mais elles eurent beau crier : « Seigneur, Seigneur, ouvre-nous ! »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il leur répondit : « Vraiment, je vous l’assure : je ne sais pas qui vous êtes. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi,
  - type: text
    text: ' ajouta Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: tenez-vous en éveil, car vous ne savez ni le jour, ni l’heure de ma venue.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La parabole de l’argent à faire fructifier
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 19.12-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il en sera comme d’un homme qui partit pour un voyage : il convoqua ses serviteurs et leur confia l’administration de ses biens.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il remit à l’un cinq lingots
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'talents. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: équivalait à dix fois le salaire annuel d’un ouvrier.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', à un autre deux, et à un troisième un seul, en tenant compte des capacités personnelles de chacun. Puis il s’en alla.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui avait reçu les cinq lingots se mit aussitôt à les faire fructifier, de sorte qu’il en gagna cinq autres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui en avait reçu deux fit de même et en gagna deux autres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quant à celui qui n’en avait reçu qu’un, il s’en alla creuser un trou dans la terre pour y cacher l’argent de son maître.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Longtemps après, le maître de ces serviteurs revint et leur fit rendre compte de leur gérance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui avait reçu les cinq lingots se présenta, apportant les cinq lingots supplémentaires qu’il avait gagnés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Maître, dit-il, tu m’avais remis cinq lingots, j’en ai gagné cinq autres. Les voici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Très bien, lui dit son maître, tu es un bon serviteur, en qui l’on peut avoir confiance. Tu t’es montré fidèle en peu de choses. C’est pourquoi je t’en confierai de plus importantes. Viens partager la joie de ton maître ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Celui qui avait reçu les deux lingots se présenta aussi et dit : « Maître, tu m’avais remis deux lingots, j’en ai gagné deux autres. Les voici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Très bien, lui dit son maître, tu es un bon serviteur, en qui l’on peut avoir confiance. Tu t’es montré fidèle en peu de choses. C’est pourquoi je t’en confierai de plus importantes. Viens partager la joie de ton maître ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Enfin, celui qui n’avait reçu qu’un lingot vint à son tour et dit : « Maître, je savais que tu es un homme dur : tu moissonnes là où tu n’as rien semé, tu récoltes où tu n’as pas répandu de semence.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors, j’ai pris peur et je suis allé cacher ton argent dans la terre. Voilà : prends ce qui t’appartient. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais son maître lui répondit : « Vaurien ! Fainéant ! Tu savais que je moissonne là où je n’ai rien semé et que je récolte là où je n’ai pas répandu de semence !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Eh bien, tu aurais dû placer mon argent chez les banquiers et, à mon retour, j’aurais récupéré le capital et les intérêts.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’on lui retire donc le lingot et qu’on le donne à celui qui en a déjà dix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car à celui qui a, on donnera encore, et il sera dans l’abondance. Mais à celui qui n’a pas, on ôtera même ce qu’il a.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quant à ce vaurien, jetez-le dans les ténèbres du dehors, où il y aura des pleurs et d’amers regrets. »
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le jugement dernier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' viendra dans sa gloire, avec tous ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ', il prendra place sur son trône glorieux.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tous les peuples de la terre seront rassemblés devant lui. Alors il les divisera en deux groupes – tout comme le berger fait le tri entre les brebis et les boucs.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il placera les brebis à sa droite et les boucs à sa gauche.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Après quoi, le roi dira à ceux qui seront à sa droite : « Venez, vous qui êtes bénis par mon Père : prenez possession du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume
    - type: text
      text: ' qu’il a préparé pour vous depuis la création du monde.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car j’ai eu faim, et vous m’avez donné à manger. J’ai eu soif, et vous m’avez donné à boire. J’étais un étranger, et vous m’avez accueilli chez vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’étais nu, et vous m’avez donné des vêtements. J’étais malade, et vous m’avez soigné. J’étais en prison, et vous êtes venus à moi. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors, les justes lui demanderont : « Mais, Seigneur, quand t’avons-nous vu avoir faim, et t’avons-nous donné à manger ? Ou avoir soif, et t’avons-nous donné à boire ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou quand t’avons-nous vu étranger et t’avons-nous accueilli ? Ou nu, et t’avons-nous vêtu ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou malade ou prisonnier, et sommes-nous venus te rendre visite ? »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et le roi leur répondra : « Vraiment, je vous l’assure : chaque fois que vous avez fait cela à l’un de ces plus petits de mes frères, c’est à moi-même que vous l’avez fait. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Puis il se tournera vers ceux qui seront à sa gauche : « Retirez-vous loin de moi, vous que Dieu a maudits, et allez dans le feu éternel préparé pour le diable et ses anges.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car j’ai eu faim, et vous ne m’avez rien donné à manger. J’ai eu soif, et vous ne m’avez rien donné à boire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’étais un étranger, et vous ne m’avez pas accueilli chez vous. J’étais nu, et vous ne m’avez pas donné de vêtements. J’étais malade et en prison, et vous n’avez pas pris soin de moi. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors, ils lui demanderont à leur tour : « Mais, Seigneur, quand t’avons-nous vu souffrant de la faim ou de la soif ; quand t’avons-nous vu étranger, nu, malade ou en prison, et avons-nous négligé de te rendre service ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors il leur répondra : « Vraiment, je vous l’assure : chaque fois que vous n’avez pas fait cela à l’un de ces plus petits, c’est à moi que vous avez manqué de le faire. »'
