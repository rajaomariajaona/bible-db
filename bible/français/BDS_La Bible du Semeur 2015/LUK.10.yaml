document_id: LUK.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus envoie soixante-douze disciples en mission
  - type: heading
    content: (Mt 9.37-38 ; 10.5-14)
  - type: text
    content: Après cela, le Seigneur choisit encore soixante-douze
  - type: note
    content: 'Certains manuscrits ont : soixante-dix.'
  - type: text
    content: ' autres disciples et les envoya deux par deux, pour le précéder dans toutes les villes et les localités où il devait se rendre. '
  '10':
  - type: text
    content: 'Mais dans toute ville où vous entrerez et où l’on ne voudra pas vous recevoir, allez sur la place publique et dites :'
  - type: text
    content: ' '
  '11':
  - type: text
    content: '« La poussière de votre ville qui s’est attachée à nos pieds, nous la secouons contre vous. Sachez pourtant ceci : le royaume de Dieu est proche. »'
  - type: heading
    content: (Mt 10.15 ; 11.20-24)
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous assure qu’au jour du jugement, '
  - type: text
    content: Sodome
  - type: text
    content: ' sera traitée avec moins de rigueur que cette ville-là.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: Malheur à toi, Chorazin
  - type: text
    content: ' '
  - type: note
    content: 'Chorazin… Bethsaïda : deux villes voisines de Capernaüm. Tyr… Sidon : deux villes phéniciennes, donc non juives.'
  - type: text
    content: '! Malheur à toi, Bethsaïda ! car si les miracles qui se sont produits au milieu de vous avaient eu lieu à '
  - type: text
    content: Tyr
  - type: text
    content: ' et à Sidon'
  - type: text
    content: ' '
  - type: note
    content: Voir note Lc 6.17. Ces villes étaient réputées très corrompues.
  - type: text
    content: ', il y a longtemps que leurs habitants auraient '
  - type: text
    content: changé
  - type: text
    content: ' et l’auraient manifesté en revêtant des habits de toile de sac et en se couvrant de cendre'
  - type: text
    content: ' '
  - type: note
    content: Allusion aux coutumes juives marquant le deuil et l’humiliation.
  - type: text
    content: .
  - type: text
    content: ' '
  '14':
  - type: text
    content: C’est pourquoi, au jour du jugement, ces villes seront traitées avec moins de rigueur que vous.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Et toi, '
  - type: text
    content: Capernaüm
  - type: text
    content: ', crois-tu que tu seras élevée jusqu’au ciel ? Non ! Tu seras précipitée au séjour des morts.'
  '16':
  - type: text
    content: 'Il ajouta : '
  - type: text
    content: Si quelqu’un vous écoute, c’est moi qu’il écoute, si quelqu’un vous rejette, c’est moi qu’il rejette. Or, celui qui me rejette, rejette celui qui m’a envoyé.
  '17':
  - type: text
    content: Quand les soixante-douze
  - type: note
    content: 'Certains manuscrits ont : soixante-dix.'
  - type: text
    content: ' disciples revinrent, ils étaient pleins de joie et disaient : Seigneur, même les démons se soumettent à nous quand nous leur donnons des ordres en ton nom !'
  '18':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Je voyais '
  - type: text
    content: Satan
  - type: text
    content: ' tomber du ciel comme l’éclair.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ecoutez : je vous ai donné le pouvoir de marcher sur les serpents et les scorpions'
  - type: note
    content: Les scorpions, fréquents dans les pays chauds, peuvent causer des blessures douloureuses et graves par l’aiguillon empoisonné situé à l’extrémité de leur queue.
  - type: text
    content: ', et d’écraser toutes les forces de l’Ennemi, sans que rien ne puisse vous faire du mal.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Il leur disait : '
  - type: text
    content: La moisson est abondante, mais les ouvriers peu nombreux. Priez donc le Seigneur à qui appartient la moisson d’envoyer des ouvriers pour moissonner.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Toutefois, ce qui doit vous réjouir, ce n’est pas de voir que les esprits mauvais vous sont soumis, mais de savoir que vos noms sont inscrits dans le ciel.
  - type: heading
    content: Le privilège des disciples
  - type: heading
    content: (Mt 11.25-27)
  '21':
  - type: text
    content: Au même moment, Jésus fut transporté de joie par le Saint-Esprit
  - type: note
    content: 'Certains manuscrits ont : par l’Esprit, et d’autres : en lui-même.'
  - type: text
    content: ' et s’écria : '
  - type: text
    content: Je te loue, ô Père, Seigneur du ciel et de la terre, parce que tu as caché ces choses aux sages et aux intelligents, et que tu les as révélées à ceux qui sont tout petits. Oui, Père, car dans ta bonté, tu l’as voulu ainsi.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Mon Père a remis toutes choses entre mes mains. Personne ne sait qui est le Fils, si ce n’est le Père ; et personne ne sait qui est le Père, si ce n’est le Fils et celui à qui le Fils veut le révéler.
  - type: heading
    content: (Mt 13.16-17)
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Puis, se tournant vers ses '
  - type: text
    content: disciples
  - type: text
    content: ', il leur dit en particulier : Heureux ceux qui voient ce que vous voyez !'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Car, je vous l’assure : beaucoup de '
  - type: text
    content: prophètes
  - type: text
    content: ' et de rois auraient voulu voir ce que vous voyez, mais ne l’ont pas vu ; ils auraient voulu entendre ce que vous entendez, mais ne l’ont pas entendu.'
  - type: heading
    content: La parabole du bon Samaritain
  '25':
  - type: text
    content: Un enseignant de la Loi se leva et posa une question à Jésus pour lui tendre un piège.
  - type: text
    content: – Maître, lui dit-il, que dois-je faire pour obtenir la vie éternelle ?
  '26':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Qu’est-il écrit dans la Loi ? Comment la comprends-tu ?
  '27':
  - type: text
    content: 'Il lui répondit : '
  - type: text
    content: Tu aimeras le Seigneur ton Dieu, de tout ton cœur, de toute ton âme, de toute ton énergie et de toute ta pensée
  - type: note
    content: Dt 6.5.
  - type: text
    content: ', et ton prochain comme toi-même'
  - type: note
    content: Lv 19.18.
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: – Tu as bien répondu,
  - type: text
    content: ' lui dit Jésus : '
  - type: text
    content: fais cela, et tu auras la vie.
  '29':
  - type: text
    content: 'Mais l’enseignant de la Loi, voulant se donner raison, reprit : Oui, mais qui donc est mon prochain ?'
  '3':
  - type: text
    content: 'Allez : je vous envoie comme des agneaux au milieu des loups.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'En réponse, Jésus lui dit : '
  - type: text
    content: 'Il y avait un homme qui descendait de '
  - type: text
    content: Jérusalem
  - type: text
    content: ' à '
  - type: text
    content: Jéricho
  - type: text
    content: ', quand il fut attaqué par des brigands. Ils lui arrachèrent ses vêtements, le rouèrent de coups et s’en allèrent, le laissant à moitié mort.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Or il se trouva qu’un '
  - type: text
    content: prêtre
  - type: text
    content: ' descendait par le même chemin. Il vit le blessé et, s’en écartant, poursuivit sa route.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: De même aussi un lévite
  - type: note
    content: Les lévites étaient chargés de certains services matériels dans le Temple.
  - type: text
    content: ' '
  - type: text
    content: arriva au même endroit, le vit, et, s’en écartant, poursuivit sa route.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Mais un '
  - type: text
    content: Samaritain
  - type: text
    content: ' qui passait par là arriva près de cet homme. En le voyant, il fut pris de compassion.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: Il s’approcha de lui, soigna ses plaies avec de l’huile et du vin
  - type: note
    content: L’huile était communément utilisée pour adoucir la douleur et le vin pour désinfecter les plaies.
  - type: text
    content: ', et les recouvrit de pansements. Puis, le chargeant sur sa propre mule, il l’emmena dans une auberge où il le soigna de son mieux.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Le lendemain, il sortit deux pièces d’argent
  - type: note
    content: Il s’agit de deniers (voir note 7.41).
  - type: text
    content: ', les remit à l’aubergiste et lui dit : « Prends soin de cet homme, et tout ce que tu auras dépensé en plus, je te le rembourserai moi-même quand je repasserai. »'
  '36':
  - type: text
    content: 'Et Jésus ajouta : '
  - type: text
    content: A ton avis, lequel des trois s’est montré le prochain de l’homme qui avait été victime des brigands ?
  '37':
  - type: text
    content: – C’est celui qui a eu compassion de lui, lui répondit l’enseignant de la Loi.
  - type: text
    content: – Eh bien, va, et agis de même,
  - type: text
    content: ' lui dit Jésus.'
  - type: heading
    content: La meilleure part
  '38':
  - type: text
    content: 'Pendant qu’ils étaient en route, Jésus entra dans un village. Là, une femme nommée Marthe l’accueillit dans sa maison. '
  '39':
  - type: text
    content: 'Elle avait une sœur appelée Marie. Celle-ci vint s’asseoir aux pieds de Jésus, et elle écoutait ce qu’il disait. '
  '4':
  - type: text
    content: N’emportez ni bourse, ni sac de voyage, ni sandales, et ne vous attardez pas en chemin pour saluer les gens
  - type: note
    content: Les salutations orientales comprenaient tout un rituel.
  - type: text
    content: .
  '40':
  - type: text
    content: 'Pendant ce temps, Marthe était affairée aux multiples travaux que demandait le service. Elle s’approcha de Jésus et lui dit : Maître, cela ne te dérange-t-il pas de voir que ma sœur me laisse seule à servir ? Dis-lui donc de m’aider.'
  '41':
  - type: text
    content: 'Mais le Seigneur lui répondit : '
  - type: text
    content: Marthe, Marthe, tu t’inquiètes et tu t’agites pour beaucoup de choses ;
  - type: text
    content: ' '
  '42':
  - type: text
    content: il n’y en a qu’une seule qui soit vraiment nécessaire. Marie a choisi la meilleure part, et personne ne la lui enlèvera.
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Lorsque vous entrerez dans une maison, dites d’abord : « Que la paix soit sur cette maison'
  - type: text
    content: ' '
  - type: note
    content: 'C’était la salutation juive habituelle en entrant dans une maison : Shalom.'
  - type: text
    content: . »
  - type: text
    content: ' '
  '6':
  - type: text
    content: Si un homme de paix y habite, votre paix reposera sur lui. Si ce n’est pas le cas, elle reviendra à vous.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Restez dans cette maison-là, prenez la nourriture et la boisson que l’on vous donnera, car « l’ouvrier mérite son salaire ». Ne passez pas d’une maison à l’autre pour demander l’hospitalité.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Dans toute ville où vous irez et où l’on vous accueillera, mangez ce que l’on vous offrira,
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'guérissez les malades qui s’y trouveront et dites aux gens : « Le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est proche de vous. »'
  - type: text
    content: ' '
