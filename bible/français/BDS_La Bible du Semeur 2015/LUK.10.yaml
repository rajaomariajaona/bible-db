document_id: LUK.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus envoie soixante-douze disciples en mission
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 9.37-38 ; 10.5-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après cela, le Seigneur choisit encore soixante-douze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soixante-dix.
    marker-yv: yv-n
  - type: text
    text: ' autres disciples et les envoya deux par deux, pour le précéder dans toutes les villes et les localités où il devait se rendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur disait : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La moisson est abondante, mais les ouvriers peu nombreux. Priez donc le Seigneur à qui appartient la moisson d’envoyer des ouvriers pour moissonner.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez : je vous envoie comme des agneaux au milieu des loups.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’emportez ni bourse, ni sac de voyage, ni sandales, et ne vous attardez pas en chemin pour saluer les gens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les salutations orientales comprenaient tout un rituel.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lorsque vous entrerez dans une maison, dites d’abord : « Que la paix soit sur cette maison'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’était la salutation juive habituelle en entrant dans une maison : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shalom.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . »
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si un homme de paix y habite, votre paix reposera sur lui. Si ce n’est pas le cas, elle reviendra à vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Restez dans cette maison-là, prenez la nourriture et la boisson que l’on vous donnera, car « l’ouvrier mérite son salaire ». Ne passez pas d’une maison à l’autre pour demander l’hospitalité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans toute ville où vous irez et où l’on vous accueillera, mangez ce que l’on vous offrira,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'guérissez les malades qui s’y trouveront et dites aux gens : « Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' est proche de vous. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais dans toute ville où vous entrerez et où l’on ne voudra pas vous recevoir, allez sur la place publique et dites :'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '« La poussière de votre ville qui s’est attachée à nos pieds, nous la secouons contre vous. Sachez pourtant ceci : le royaume de Dieu est proche. »'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 10.15 ; 11.20-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous assure qu’au jour du jugement, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sodome
    - type: text
      text: ' sera traitée avec moins de rigueur que cette ville-là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à toi, Chorazin
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Chorazin… Bethsaïda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'deux villes voisines de Capernaüm. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tyr… Sidon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deux villes phéniciennes, donc non juives.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '! Malheur à toi, Bethsaïda ! car si les miracles qui se sont produits au milieu de vous avaient eu lieu à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Tyr
    - type: text
      text: ' et à Sidon'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 6.17
        metadata:
          usfm: LUK.6.17
      - type: text
        text: . Ces villes étaient réputées très corrompues.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', il y a longtemps que leurs habitants auraient '
    - type: usfm
      marker: w
      children:
      - type: text
        text: changé
    - type: text
      text: ' et l’auraient manifesté en revêtant des habits de toile de sac et en se couvrant de cendre'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux coutumes juives marquant le deuil et l’humiliation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, au jour du jugement, ces villes seront traitées avec moins de rigueur que vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et toi, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: ', crois-tu que tu seras élevée jusqu’au ciel ? Non ! Tu seras précipitée au séjour des morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un vous écoute, c’est moi qu’il écoute, si quelqu’un vous rejette, c’est moi qu’il rejette. Or, celui qui me rejette, rejette celui qui m’a envoyé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quand les soixante-douze
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soixante-dix.
    marker-yv: yv-n
  - type: text
    text: ' disciples revinrent, ils étaient pleins de joie et disaient : Seigneur, même les démons se soumettent à nous quand nous leur donnons des ordres en ton nom !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je voyais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: ' tomber du ciel comme l’éclair.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ecoutez : je vous ai donné le pouvoir de marcher sur les serpents et les scorpions'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'scorpions, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fréquents dans les pays chauds, peuvent causer des blessures douloureuses et graves par l’aiguillon empoisonné situé à l’extrémité de leur queue.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et d’écraser toutes les forces de l’Ennemi, sans que rien ne puisse vous faire du mal.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutefois, ce qui doit vous réjouir, ce n’est pas de voir que les esprits mauvais vous sont soumis, mais de savoir que vos noms sont inscrits dans le ciel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le privilège des disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 11.25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Au même moment, Jésus fut transporté de joie par le Saint-Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par l’Esprit, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et d’autres : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en lui-même.
    marker-yv: yv-n
  - type: text
    text: ' et s’écria : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je te loue, ô Père, Seigneur du ciel et de la terre, parce que tu as caché ces choses aux sages et aux intelligents, et que tu les as révélées à ceux qui sont tout petits. Oui, Père, car dans ta bonté, tu l’as voulu ainsi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon Père a remis toutes choses entre mes mains. Personne ne sait qui est le Fils, si ce n’est le Père ; et personne ne sait qui est le Père, si ce n’est le Fils et celui à qui le Fils veut le révéler.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 13.16-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Puis, se tournant vers ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ', il leur dit en particulier : Heureux ceux qui voient ce que vous voyez !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car, je vous l’assure : beaucoup de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' et de rois auraient voulu voir ce que vous voyez, mais ne l’ont pas vu ; ils auraient voulu entendre ce que vous entendez, mais ne l’ont pas entendu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole du bon Samaritain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Un enseignant de la Loi se leva et posa une question à Jésus pour lui tendre un piège.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Maître, lui dit-il, que dois-je faire pour obtenir la vie éternelle ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’est-il écrit dans la Loi ? Comment la comprends-tu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il lui répondit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras le Seigneur ton Dieu, de tout ton cœur, de toute ton âme, de toute ton énergie et de toute ta pensée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.5
        metadata:
          usfm: DEU.6.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ', et ton prochain comme toi-même'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.18
        metadata:
          usfm: LEV.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu as bien répondu,
  - type: text
    text: ' lui dit Jésus : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: fais cela, et tu auras la vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais l’enseignant de la Loi, voulant se donner raison, reprit : Oui, mais qui donc est mon prochain ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'En réponse, Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il y avait un homme qui descendait de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: ' à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jéricho
    - type: text
      text: ', quand il fut attaqué par des brigands. Ils lui arrachèrent ses vêtements, le rouèrent de coups et s’en allèrent, le laissant à moitié mort.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or il se trouva qu’un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' descendait par le même chemin. Il vit le blessé et, s’en écartant, poursuivit sa route.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De même aussi un lévite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lévites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient chargés de certains services matériels dans le Temple.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: arriva au même endroit, le vit, et, s’en écartant, poursuivit sa route.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Samaritain
    - type: text
      text: ' qui passait par là arriva près de cet homme. En le voyant, il fut pris de compassion.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il s’approcha de lui, soigna ses plaies avec de l’huile et du vin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’huile était communément utilisée pour adoucir la douleur et le vin pour désinfecter les plaies.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', et les recouvrit de pansements. Puis, le chargeant sur sa propre mule, il l’emmena dans une auberge où il le soigna de son mieux.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le lendemain, il sortit deux pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deniers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.41'
        metadata:
          usfm: LUK.7.41
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', les remit à l’aubergiste et lui dit : « Prends soin de cet homme, et tout ce que tu auras dépensé en plus, je te le rembourserai moi-même quand je repasserai. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et Jésus ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A ton avis, lequel des trois s’est montré le prochain de l’homme qui avait été victime des brigands ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: – C’est celui qui a eu compassion de lui, lui répondit l’enseignant de la Loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien, va, et agis de même,
  - type: text
    text: ' lui dit Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La meilleure part
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Pendant qu’ils étaient en route, Jésus entra dans un village. Là, une femme nommée Marthe l’accueillit dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Elle avait une sœur appelée Marie. Celle-ci vint s’asseoir aux pieds de Jésus, et elle écoutait ce qu’il disait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Pendant ce temps, Marthe était affairée aux multiples travaux que demandait le service. Elle s’approcha de Jésus et lui dit : Maître, cela ne te dérange-t-il pas de voir que ma sœur me laisse seule à servir ? Dis-lui donc de m’aider.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Mais le Seigneur lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Marthe, Marthe, tu t’inquiètes et tu t’agites pour beaucoup de choses ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: il n’y en a qu’une seule qui soit vraiment nécessaire. Marie a choisi la meilleure part, et personne ne la lui enlèvera.
