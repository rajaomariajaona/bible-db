document_id: EXO.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’alliance du Sinaï
  - type: heading
    content: L’arrivée au mont Sinaï
  - type: text
    content: Le troisième mois après leur départ d’Egypte, ce jour même, les Israélites arrivèrent au désert du Sinaï
  - type: note
    content: Le mot Sinaï désigne tantôt la montagne, tantôt le désert au sud-est de la péninsule. Les Israélites sont restés là près d’une année.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'L’Eternel dit à Moïse : Va trouver le peuple et demande-lui d’accomplir aujourd’hui et demain des rites de purification et de laver leurs vêtements. '
  '11':
  - type: text
    content: 'Qu’ils se tiennent prêts pour après-demain, car ce jour-là, je descendrai sur le mont Sinaï à la vue de tout le peuple. '
  '12':
  - type: text
    content: 'Tu leur fixeras des limites autour de la montagne et tu leur donneras cet avertissement : « Gardez-vous bien de gravir cette montagne et même de vous en approcher ; quiconque s’en approchera sera puni de mort. '
  '13':
  - type: text
    content: Si quelqu’un transgresse cet ordre, on ne le touchera pas, mais on le lapidera ou on le percera de flèches. Qu’il s’agisse d’une bête ou d’un homme, il ne restera pas en vie. C’est seulement lorsque la corne du bélier sonnera que certains
  - type: note
    content: Aaron et ses deux fils ainsi que soixante-dix responsables du peuple d’Israël pourront monter sur la montagne (24.1, 9-10).
  - type: text
    content: ' monteront sur la montagne'
  - type: note
    content: Allusion en Hé 12.18-20.
  - type: text
    content: . »
  '14':
  - type: text
    content: 'Moïse redescendit de la montagne vers le peuple pour lui faire accomplir les rites de purification. Ils lavèrent aussi leurs vêtements. '
  '15':
  - type: text
    content: 'Puis il leur dit : Tenez-vous prêts pour après-demain. Abstenez-vous d’ici-là de tout rapport sexuel'
  - type: note
    content: Pour ne pas être dans un état d’impureté rituelle (voir Lv 15.18, 21 ; 1 S 21.4-5).
  - type: text
    content: .
  - type: heading
    content: L’Eternel descend sur le mont Sinaï
  '16':
  - type: text
    content: 'Le surlendemain, dès le lever du jour, il y eut des coups de tonnerre et des éclairs, une épaisse nuée couvrit la montagne et l’on entendit un son de corne très puissant. Dans le camp, tout le peuple se mit à trembler de peur. '
  '17':
  - type: text
    content: 'Moïse fit sortir tout le monde du camp, à la rencontre de Dieu. Ils se tinrent au pied de la montagne. '
  '18':
  - type: text
    content: 'Le mont Sinaï était entièrement enveloppé de fumée parce que l’Eternel était descendu là au milieu du feu, et la fumée s’élevait comme celle d’une fournaise. Toute la montagne était secouée d’un violent tremblement de terre. '
  '19':
  - type: text
    content: Le son du cor allait en s’amplifiant énormément. Moïse parlait, et Dieu lui répondait dans le tonnerre
  - type: note
    content: Voir Hé 12.18-24.
  - type: text
    content: '. '
  '2':
  - type: text
    content: Après être partis de Rephidim, ils entrèrent dans ce désert et y dressèrent leur camp en face de la montagne.
  - type: heading
    content: Dieu adopte Israël
  '20':
  - type: text
    content: L’Eternel était descendu sur le sommet du mont Sinaï, et il y appela Moïse. Moïse monta.
  '21':
  - type: text
    content: 'L’Eternel lui dit : Redescends avertir le peuple de ne pas se précipiter vers l’Eternel pour le voir, car beaucoup d’entre eux y perdraient la vie. '
  '22':
  - type: text
    content: Même les prêtres
  - type: note
    content: Probablement les chefs de famille qui au temps des patriarches avaient des fonctions sacerdotales, ou des responsables d’Israël (voir 3.16, 18 ; 12.21 ; 18.12).
  - type: text
    content: ' qui s’approchent de moi doivent se purifier, sous peine de voir l’Eternel décimer leurs rangs.'
  '23':
  - type: text
    content: 'Moïse dit à l’Eternel : Le peuple ne saurait gravir le mont Sinaï puisque tu nous as toi-même prescrit de fixer des limites autour de la montagne et de la tenir pour sacrée.'
  '24':
  - type: text
    content: 'L’Eternel lui répéta : Va, redescends, et puis tu remonteras avec Aaron. Mais que les prêtres et le peuple ne se précipitent pas pour monter vers moi, de peur que je ne décime leurs rangs.'
  '25':
  - type: text
    content: Moïse redescendit vers le peuple pour lui parler.
  '3':
  - type: text
    content: 'Moïse gravit la montagne pour aller vers Dieu. D’en haut, Dieu l’appela et lui dit : Voici comment tu parleras aux descendants de Jacob et ce que tu annonceras aux Israélites : '
  '4':
  - type: text
    content: « Vous avez vu vous-mêmes comment j’ai traité les Egyptiens et comment je vous ai portés comme sur des ailes d’aigle pour vous faire venir jusqu’à moi
  - type: note
    content: La femelle de l’aigle porte ses petits sur ses ailes pendant son vol (voir Dt 32.11). Allusion à la manière dont Dieu a fait surmonter les difficultés à son peuple, en particulier en lui faisant traverser la barrière apparemment infranchissable de la mer des Roseaux.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Maintenant, si vous m’obéissez et si vous restez fidèles à mon alliance, vous serez pour moi un peuple précieux parmi tous les peuples, bien que toute la terre m’appartienne. '
  '6':
  - type: text
    content: Oui vous, vous serez pour moi un royaume de prêtres, une nation sainte. » Telles sont les paroles que tu transmettras aux Israélites
  - type: note
    content: Voir Dt 4.20 ; 7.6 ; 14.2 ; 26.18 ; Tt 2.14 ; Ap 1.6 ; 5.10  ; cité en 1 P 2.9.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Moïse retourna au camp, convoqua les responsables du peuple et leur transmit toutes les paroles de l’Eternel. '
  '8':
  - type: text
    content: 'Alors le peuple s’écria à l’unanimité : Nous ferons tout ce que l’Eternel a dit.'
  - type: text
    content: Moïse rapporta à l’Eternel la réponse du peuple.
  '9':
  - type: text
    content: 'L’Eternel dit à Moïse : Voici que je viendrai te trouver au sein d’une épaisse nuée pour que le peuple entende lorsque je parlerai avec toi et qu’ils aient pour toujours confiance en toi.'
  - type: text
    content: Et Moïse rapporta à l’Eternel les paroles du peuple.
  - type: heading
    content: La purification rituelle
