document_id: ISA.54,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire future de Jérusalem
  - type: text
    content: Pousse des cris de joie, ╵toi qui étais stérile
  - type: note
    content: Il s’agit de Jérusalem.
  - type: text
    content: ','
  - type: text
    content: toi qui n’enfantais pas !
  - type: text
    content: Eclate en chants joyeux, ╵crie d’allégresse,
  - type: text
    content: toi qui n’as pas connu ╵les douleurs de l’enfantement !
  - type: text
    content: 'Car l’Eternel déclare :'
  - type: text
    content: Les enfants de la délaissée
  - type: note
    content: Terme qui s’applique au pays dévasté (voir 49.21 ; 50.1 ; 62.4).
  - type: text
    content: ' ╵seront bien plus nombreux'
  - type: text
    content: que ceux de la femme mariée
  - type: note
    content: Cité en Ga 4.27.
  - type: text
    content: .
  '10':
  - type: text
    content: Même si les montagnes ╵se mettaient à partir,
  - type: text
    content: même si les collines ╵venaient à chanceler,
  - type: text
    content: mon amour envers toi ╵ne partira jamais ;
  - type: text
    content: mon alliance de paix ╵ne chancellera pas,
  - type: text
    content: déclare l’Eternel, ╵rempli de tendresse pour toi.
  - type: heading
    content: La nouvelle Jérusalem
  '11':
  - type: text
    content: O cité malheureuse, ╵battue par la tempête,
  - type: text
    content: 'privée de réconfort :'
  - type: text
    content: dans un mortier de jaspe, ╵j’enchâsserai tes pierres
  - type: text
    content: et je te fonderai ╵sur des saphirs
  - type: note
    content: Pour les v. 11-12, voir Ap 21.18-21.
  - type: text
    content: .
  '12':
  - type: text
    content: Je sertirai tes tours ╵de créneaux en rubis,
  - type: text
    content: je te ferai des portes ╵en pierres d’escarboucle
  - type: text
    content: et je t’entourerai ╵d’un rempart de pierres précieuses.
  '13':
  - type: text
    content: Tous tes enfants seront ╵instruits par l’Eternel
  - type: note
    content: Cité en Jn 6.45.
  - type: text
    content: et la paix de tes fils ╵sera très grande.
  '14':
  - type: text
    content: Tu seras affermie ╵par la justice,
  - type: text
    content: à l’abri de toute oppression ;
  - type: text
    content: tu n’auras rien à craindre,
  - type: text
    content: car la terreur sera bannie
  - type: text
    content: et elle ne t’atteindra plus.
  '15':
  - type: text
    content: Si l’on s’attroupe contre toi,
  - type: text
    content: je n’y serai pour rien.
  - type: text
    content: Et ceux qui s’attrouperaient contre toi
  - type: text
    content: tomberont devant toi.
  '16':
  - type: text
    content: Moi, j’ai créé le forgeron
  - type: text
    content: qui attise les braises
  - type: text
    content: et en retire une arme ╵façonnée pour l’usage ╵auquel il la destine.
  - type: text
    content: Et j’ai aussi créé
  - type: text
    content: le destructeur ╵pour la dévastation.
  '17':
  - type: text
    content: Toute arme fabriquée ╵pour te faire du mal
  - type: text
    content: n’atteindra pas son but,
  - type: text
    content: et tu pourras confondre
  - type: text
    content: tous tes accusateurs ╵en jugement,
  - type: text
    content: car tel est l’apanage ╵des serviteurs de l’Eternel
  - type: text
    content: et c’est ainsi ╵que je leur fais justice,
  - type: text
    content: l’Eternel le déclare.
  '2':
  - type: text
    content: C’est pourquoi, élargis ╵l’espace de ta tente
  - type: text
    content: et déploie largement ╵les toiles qui t’abritent.
  - type: text
    content: Ne les ménage pas,
  - type: text
    content: allonge tes cordages,
  - type: text
    content: assure tes piquets,
  '3':
  - type: text
    content: car tu te répandras ╵sur ta droite et ta gauche,
  - type: text
    content: et ta postérité ╵prendra possession de nations
  - type: text
    content: et peuplera des villes ╵devenues solitaires.
  '4':
  - type: text
    content: Ne sois pas effrayée
  - type: text
    content: car tu ne seras plus honteuse,
  - type: text
    content: et ne sois pas confuse
  - type: text
    content: car tu n’auras plus à rougir.
  - type: text
    content: Tu oublieras la honte ╵de ton adolescence
  - type: text
    content: et tu ne te souviendras plus
  - type: text
    content: du déshonneur de ton veuvage,
  '5':
  - type: text
    content: car celui qui t’a faite ╵c’est ton époux.
  - type: text
    content: 'Il a pour nom : ╵le Seigneur des armées célestes.'
  - type: text
    content: Celui qui te délivre ╵c’est le Saint d’Israël,
  - type: text
    content: 'celui que l’on appelle : ╵le Dieu du monde entier.'
  '6':
  - type: text
    content: L’Eternel te rappelle
  - type: text
    content: comme un époux rappelle ╵la femme abandonnée,
  - type: text
    content: à l’esprit accablé,
  - type: text
    content: la compagne de la jeunesse ╵qu’il aurait répudiée.
  - type: text
    content: C’est ce que déclare ton Dieu.
  '7':
  - type: text
    content: Pour un petit moment,
  - type: text
    content: je t’ai abandonnée,
  - type: text
    content: mais avec beaucoup de tendresse
  - type: text
    content: je vais te rassembler.
  '8':
  - type: text
    content: Dans le déchaînement ╵de mon indignation,
  - type: text
    content: je t’ai caché ma face ╵pour un petit instant,
  - type: text
    content: mais dans mon amour éternel,
  - type: text
    content: j’ai de la tendresse pour toi.
  - type: text
    content: C’est là ce que déclare ╵ton libérateur, l’Eternel.
  '9':
  - type: text
    content: Car il en est pour moi ╵comme au temps de Noé
  - type: note
    content: 'Voir Gn 9.8-17. Certains manuscrits ont : comme des eaux, à l’époque de Noé.'
  - type: text
    content: .
  - type: text
    content: J’avais juré alors
  - type: text
    content: que les eaux du déluge ╵ne submergeraient plus la terre.
  - type: text
    content: De même, je fais le serment
  - type: text
    content: de ne plus m’irriter ╵à ton encontre,
  - type: text
    content: et de ne plus t’adresser de reproches.
