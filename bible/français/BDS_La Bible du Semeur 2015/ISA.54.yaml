document_id: ISA.54
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire future de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pousse des cris de joie, ╵toi qui étais stérile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui n’enfantais pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eclate en chants joyeux, ╵crie d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui n’as pas connu ╵les douleurs de l’enfantement !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car l’Eternel déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les enfants de la délaissée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Terme qui s’applique au pays '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dévasté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 49.21 ; 50.1 ; 62.4).
    marker-yv: yv-n
  - type: text
    text: ' ╵seront bien plus nombreux'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ceux de la femme mariée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4.27
        metadata:
          usfm: GAL.4.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est pourquoi, élargis ╵l’espace de ta tente
- type: usfm
  marker: q1
  children:
  - type: text
    text: et déploie largement ╵les toiles qui t’abritent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne les ménage pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: allonge tes cordages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: assure tes piquets,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car tu te répandras ╵sur ta droite et ta gauche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta postérité ╵prendra possession de nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et peuplera des villes ╵devenues solitaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne sois pas effrayée
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu ne seras plus honteuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne sois pas confuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu n’auras plus à rougir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu oublieras la honte ╵de ton adolescence
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne te souviendras plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: du déshonneur de ton veuvage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car celui qui t’a faite ╵c’est ton époux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il a pour nom : ╵le Seigneur des armées célestes.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui te délivre ╵c’est le Saint d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui que l’on appelle : ╵le Dieu du monde entier.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel te rappelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un époux rappelle ╵la femme abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’esprit accablé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la compagne de la jeunesse ╵qu’il aurait répudiée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est ce que déclare ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pour un petit moment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’ai abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais avec beaucoup de tendresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais te rassembler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dans le déchaînement ╵de mon indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’ai caché ma face ╵pour un petit instant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais dans mon amour éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai de la tendresse pour toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là ce que déclare ╵ton libérateur, l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car il en est pour moi ╵comme au temps de Noé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 9.8-17
        metadata:
          usfm: GEN.9.8+GEN.9.9+GEN.9.10+GEN.9.11+GEN.9.12+GEN.9.13+GEN.9.14+GEN.9.15+GEN.9.16+GEN.9.17
      - type: text
        text: '. Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme des eaux, à l’époque de Noé.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’avais juré alors
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les eaux du déluge ╵ne submergeraient plus la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même, je fais le serment
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ne plus m’irriter ╵à ton encontre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ne plus t’adresser de reproches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même si les montagnes ╵se mettaient à partir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si les collines ╵venaient à chanceler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon amour envers toi ╵ne partira jamais ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon alliance de paix ╵ne chancellera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l’Eternel, ╵rempli de tendresse pour toi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La nouvelle Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: O cité malheureuse, ╵battue par la tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'privée de réconfort :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans un mortier de jaspe, ╵j’enchâsserai tes pierres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te fonderai ╵sur des saphirs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 11-12, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.18-21
        metadata:
          usfm: REV.21.18+REV.21.19+REV.21.20+REV.21.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je sertirai tes tours ╵de créneaux en rubis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te ferai des portes ╵en pierres d’escarboucle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je t’entourerai ╵d’un rempart de pierres précieuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tous tes enfants seront ╵instruits par l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6.45
        metadata:
          usfm: JHN.6.45
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la paix de tes fils ╵sera très grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu seras affermie ╵par la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’abri de toute oppression ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n’auras rien à craindre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la terreur sera bannie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle ne t’atteindra plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si l’on s’attroupe contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’y serai pour rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui s’attrouperaient contre toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: tomberont devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moi, j’ai créé le forgeron
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui attise les braises
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en retire une arme ╵façonnée pour l’usage ╵auquel il la destine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’ai aussi créé
- type: usfm
  marker: q1
  children:
  - type: text
    text: le destructeur ╵pour la dévastation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toute arme fabriquée ╵pour te faire du mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’atteindra pas son but,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu pourras confondre
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous tes accusateurs ╵en jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tel est l’apanage ╵des serviteurs de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est ainsi ╵que je leur fais justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
