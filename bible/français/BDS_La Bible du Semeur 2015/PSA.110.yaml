document_id: PSA.110
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Roi-Prêtre
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Déclaration de l’Eternel. ╵Il dit à mon Seigneur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Viens siéger à ma droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La droite du roi est la place d’honneur (45.10 ; 1 R 2.19).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce que j’aie mis ╵tes ennemis ╵à terre sous tes pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les trônes antiques étaient placés très haut, il fallait donc un marchepied ou des marches pour y accéder (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9.18
        metadata:
          usfm: 2CH.9.18
      - type: text
        text: ). Comme le montrent des représentations égyptiennes et assyriennes, les rois vainqueurs posaient leur pied sur la nuque des vaincus (voir Jos 10.24 ; 1 R 5.17). Cité en Mc 12.36 ; Hé 1.13. Voir aussi Mc 14.62 ; 16.19 ; Hé 1.3 ; 8.1.
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Eternel étendra ╵de Sion ton pouvoir royal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu domineras ╵parmi tes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au jour où tu ranges tes forces ╵en ordre de bataille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Au jour où tu fais preuve de force pour le combat.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton peuple est plein d’ardeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, du sein de l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans de saintes parures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits et versions anciennes portent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur les montagnes saintes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La différence vient de la confusion entre deux lettres très ressemblantes en hébreu.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous tes jeunes guerriers ╵se presseront vers toi ╵comme naît la rosée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte difficile. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tu conserves la rosée de la jeunesse. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je t’ai engendré avant l’aurore et la version syriaque : je t’ai engendré, toi, comme enfant.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Eternel l’a juré, ╵il ne reviendra pas ╵sur son engagement :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Tu seras prêtre pour toujours
- type: usfm
  marker: q1
  children:
  - type: text
    text: selon la ligne de Melchisédek
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur Melchisédek, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 14.18
        metadata:
          usfm: GEN.14.18
      - type: text
        text: '. Cité en Hé 5.6 ; 7.17, 21. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6.20
        metadata:
          usfm: HEB.6.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le Seigneur, à ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va écraser des rois ╵au jour de sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il exerce le jugement ╵parmi les peuples ; ╵les cadavres s’entassent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il écrase des chefs ╵de par la terre entière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Il écrase le chef d’un grand pays.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En chemin, le roi s’abreuve au torrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis relève la tête.
