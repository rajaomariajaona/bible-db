document_id: PSA.110,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Roi-Prêtre
  - type: text
    content: Psaume de David.
  - type: text
    content: 'Déclaration de l’Eternel. ╵Il dit à mon Seigneur :'
  - type: text
    content: « Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (45.10 ; 1 R 2.19).
  - type: text
    content: jusqu’à ce que j’aie mis ╵tes ennemis ╵à terre sous tes pieds
  - type: note
    content: Les trônes antiques étaient placés très haut, il fallait donc un marchepied ou des marches pour y accéder (2 Ch 9.18). Comme le montrent des représentations égyptiennes et assyriennes, les rois vainqueurs posaient leur pied sur la nuque des vaincus (voir Jos 10.24 ; 1 R 5.17). Cité en Mc 12.36 ; Hé 1.13. Voir aussi Mc 14.62 ; 16.19 ; Hé 1.3 ; 8.1.
  - type: text
    content: . »
  '2':
  - type: text
    content: L’Eternel étendra ╵de Sion ton pouvoir royal,
  - type: text
    content: et tu domineras ╵parmi tes ennemis.
  '3':
  - type: text
    content: Au jour où tu ranges tes forces ╵en ordre de bataille
  - type: note
    content: 'Autre traduction : Au jour où tu fais preuve de force pour le combat.'
  - type: text
    content: ','
  - type: text
    content: ton peuple est plein d’ardeur
  - type: text
    content: et, du sein de l’aurore,
  - type: text
    content: dans de saintes parures
  - type: note
    content: 'Certains manuscrits et versions anciennes portent : sur les montagnes saintes. La différence vient de la confusion entre deux lettres très ressemblantes en hébreu.'
  - type: text
    content: ','
  - type: text
    content: tous tes jeunes guerriers ╵se presseront vers toi ╵comme naît la rosée
  - type: note
    content: 'Texte difficile. Autre traduction : Tu conserves la rosée de la jeunesse. L’ancienne version grecque a : je t’ai engendré avant l’aurore et la version syriaque : je t’ai engendré, toi, comme enfant.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'L’Eternel l’a juré, ╵il ne reviendra pas ╵sur son engagement :'
  - type: text
    content: « Tu seras prêtre pour toujours
  - type: text
    content: selon la ligne de Melchisédek
  - type: note
    content: Sur Melchisédek, voir Gn 14.18. Cité en Hé 5.6 ; 7.17, 21. Voir Hé 6.20.
  - type: text
    content: . »
  '5':
  - type: text
    content: Le Seigneur, à ta droite,
  - type: text
    content: va écraser des rois ╵au jour de sa colère.
  '6':
  - type: text
    content: Il exerce le jugement ╵parmi les peuples ; ╵les cadavres s’entassent,
  - type: text
    content: il écrase des chefs ╵de par la terre entière
  - type: note
    content: 'Autre traduction : Il écrase le chef d’un grand pays.'
  - type: text
    content: .
  '7':
  - type: text
    content: En chemin, le roi s’abreuve au torrent,
  - type: text
    content: puis relève la tête.
