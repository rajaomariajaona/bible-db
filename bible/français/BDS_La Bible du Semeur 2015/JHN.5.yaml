document_id: JHN.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Foi et incrédulité
  - type: heading
    content: La guérison d’un paralysé à Jérusalem
  - type: text
    content: 'Quelque temps plus tard, Jésus remonta à Jérusalem à l’occasion d’une fête juive. '
  '10':
  - type: text
    content: 'Les Juifs interpellèrent donc l’homme qui venait d’être guéri : C’est le sabbat ! Tu n’as pas le droit de porter cette natte.'
  '11':
  - type: text
    content: '– Mais, répliqua-t-il, celui qui m’a guéri m’a dit : '
  - type: text
    content: « Prends ta natte et marche. »
  '12':
  - type: text
    content: – Et qui t’a dit cela ? lui demandèrent-ils.
  '13':
  - type: text
    content: Mais l’homme qui avait été guéri ignorait qui c’était, car Jésus avait disparu dans la foule qui se pressait en cet endroit.
  '14':
  - type: text
    content: Peu de temps après, Jésus le rencontra dans la cour du Temple.
  - type: text
    content: – Te voilà guéri,
  - type: text
    content: ' lui dit-il. '
  - type: text
    content: Mais veille à ne plus pécher, pour qu’il ne t’arrive rien de pire.
  '15':
  - type: text
    content: Et l’homme alla annoncer aux Juifs que c’était Jésus qui l’avait guéri.
  - type: heading
    content: Le Père et le Fils
  '16':
  - type: text
    content: Les Juifs se mirent donc à accuser Jésus parce qu’il avait fait cela le jour du sabbat.
  '17':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Mon Père est à l’œuvre jusqu’à présent, et moi aussi je suis à l’œuvre.
  '18':
  - type: text
    content: 'Cette remarque fut pour eux une raison de plus pour chercher à le faire mourir car, non content de violer la loi sur le sabbat, il appelait encore Dieu son propre Père et se faisait ainsi l’égal de Dieu. '
  '19':
  - type: text
    content: 'Jésus répondit à ces reproches en leur disant : '
  - type: text
    content: 'Vraiment, je vous l’assure : le Fils ne peut rien faire de sa propre initiative ; il agit seulement d’après ce qu’il voit faire au Père. Tout ce que fait le Père, le Fils le fait également,'
  - type: text
    content: ' '
  '2':
  - type: text
    content: Or, dans cette ville, près de la porte des Brebis, se trouvait une piscine
  - type: note
    content: L’emplacement de cette piscine existe toujours dans un quartier au nord-est de Jérusalem.
  - type: text
    content: ' entourée de cinq galeries couvertes, appelée en hébreu Béthesda'
  - type: note
    content: 'Certains manuscrits ont : Bethzatha.'
  - type: text
    content: '. '
  '20':
  - type: text
    content: car le Père aime le Fils et lui montre tout ce qu’il fait. Il lui montrera même des œuvres plus grandes que toutes celles que vous avez vues jusqu’à présent, et vous en serez stupéfaits.
  - type: text
    content: ' '
  '21':
  - type: text
    content: En effet, comme le Père ressuscite les morts et donne la vie, ainsi le Fils, lui aussi, donne la vie à qui il veut.
  - type: text
    content: ' '
  '22':
  - type: text
    content: De plus, ce n’est pas le Père qui prononce le jugement sur les hommes ; il a remis tout jugement au Fils,
  - type: text
    content: ' '
  '23':
  - type: text
    content: afin que tous les hommes honorent le Fils au même titre que le Père. Ne pas honorer le Fils, c’est ne pas honorer le Père qui l’a envoyé.
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Oui, vraiment, je vous l’assure : celui qui écoute ce que je dis et qui place sa '
  - type: text
    content: confiance
  - type: text
    content: ' dans le Père qui m’a envoyé, possède, dès à présent, la vie éternelle et il ne sera pas condamné ; il est déjà passé de la mort à la vie.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Oui, vraiment, je vous l’assure : l’heure vient, et elle est déjà là, où les morts entendront la voix du Fils de Dieu, et tous ceux qui l’auront entendue vivront.'
  '26':
  - type: text
    content: ' '
  - type: text
    content: En effet, comme le Père possède la vie en lui-même, il a accordé au Fils d’avoir la vie en lui-même.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Et parce qu’il est le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', il lui a donné autorité pour exercer le jugement.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'Ne vous en étonnez pas : l’heure vient où tous ceux qui sont dans la tombe entendront la voix du Fils de l’homme.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Alors, ils en sortiront : ceux qui auront fait le bien ressusciteront pour la vie, ceux qui auront fait le mal ressusciteront pour être condamnés'
  - type: note
    content: Voir Dn 12.2.
  - type: text
    content: .
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Ces galeries étaient remplies de malades qui y restaient couchés : des aveugles, des paralysés, des impotents'
  - type: note
    content: 'Certains manuscrits ont à la suite : Ils attendaient le bouillonnement de l’eau. 4 Car un ange du Seigneur descendait de temps en temps dans la piscine et agitait l’eau. Le premier qui y entrait après le bouillonnement de l’eau était guéri, quelle que soit sa maladie.'
  - type: text
    content: .
  '30':
  - type: text
    content: Pour moi, je ne peux rien faire de mon propre chef ; je juge seulement comme le Père me l’indique. Et mon verdict est juste, car je ne cherche pas à réaliser mes propres désirs, mais à faire la volonté de celui qui m’a envoyé.
  - type: heading
    content: Les témoins du Fils
  '31':
  - type: text
    content: ' '
  - type: text
    content: Bien sûr, si j’étais seul à témoigner en ma faveur, mon témoignage ne serait pas vrai.
  '32':
  - type: text
    content: ' '
  - type: text
    content: Mais j’ai un autre témoin
  - type: text
    content: ' '
  - type: note
    content: Il s’agit de Jean-Baptiste.
  - type: text
    content: et je sais que son témoignage est vrai.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Vous avez envoyé une commission d’enquête auprès de Jean et il a rendu témoignage à la vérité
  - type: note
    content: Allusion au ministère de Jean-Baptiste.
  - type: text
    content: .
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Moi, je n’ai pas besoin d’un homme pour témoigner en ma faveur, mais je dis cela pour que vous, vous soyez '
  - type: text
    content: sauvés
  - type: text
    content: .
  - type: text
    content: ' '
  '35':
  - type: text
    content: Oui, Jean était vraiment comme un flambeau que l’on allume pour qu’il répande sa clarté. Mais vous, vous avez simplement voulu, pour un moment, vous réjouir à sa lumière.
  '36':
  - type: text
    content: ' '
  - type: text
    content: 'Quant à moi, j’ai en ma faveur un témoignage qui a plus de poids que celui de Jean : c’est celui des œuvres que le Père m’a donné d’accomplir. Oui, ces œuvres que j’accomplis attestent clairement que le Père m’a envoyé.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: De plus, le Père lui-même, qui m’a envoyé, a témoigné en ma faveur. Mais vous n’avez jamais entendu sa voix, ni vu sa face.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Sa parole n’habite pas en vous ; la preuve, c’est que vous ne croyez pas en celui qu’il a envoyé.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Vous étudiez avec soin les Ecritures, parce que vous êtes convaincus d’en obtenir la vie éternelle. Or, précisément, ce sont elles qui témoignent de moi.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Mais voilà : vous ne voulez pas venir à moi pour recevoir la vie.'
  '41':
  - type: text
    content: ' '
  - type: text
    content: Je ne cherche pas les honneurs de la part des hommes.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Seulement, je constate une chose : au fond de vous-mêmes, vous n’avez pas d’amour pour Dieu.'
  - type: text
    content: ' '
  '43':
  - type: text
    content: Je suis venu au nom de mon Père, et vous ne me recevez pas. Si un autre vient en son propre nom, vous le recevrez !
  - type: text
    content: ' '
  '44':
  - type: text
    content: D’ailleurs, comment pourriez-vous parvenir à la foi alors que vous cherchez à être honorés les uns par les autres et que vous ne recherchez pas la gloire qui vient de Dieu seul ?
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'N’allez surtout pas croire que je serai moi votre accusateur auprès de mon Père ; c’est '
  - type: text
    content: Moïse
  - type: text
    content: ' qui vous accusera, oui, ce Moïse même en qui vous avez mis votre espérance.'
  '46':
  - type: text
    content: ' '
  - type: text
    content: En effet, si vous l’aviez réellement cru, vous m’auriez aussi cru, car il a parlé de moi dans ses livres.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Si vous ne croyez même pas à ses écrits, comment croirez-vous à mes paroles ?
  '5':
  - type: text
    content: Il y avait là un homme malade depuis trente-huit ans.
  '6':
  - type: text
    content: 'Jésus le vit couché ; quand il sut qu’il était là depuis si longtemps, il lui demanda : '
  - type: text
    content: Veux-tu être guéri ?
  '7':
  - type: text
    content: – Maître, répondit le malade, je n’ai personne pour me plonger dans la piscine quand l’eau commence à bouillonner. Le temps que je me traîne là-bas, un autre y arrive avant moi.
  '8':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: lève-toi, prends ta natte et marche !
  '9':
  - type: text
    content: A l’instant même l’homme fut guéri. Il prit sa natte et se mit à marcher.
  - type: text
    content: 'Mais cela se passait un jour de sabbat. '
