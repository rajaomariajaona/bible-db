document_id: JHN.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Foi et incrédulité
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guérison d’un paralysé à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelque temps plus tard, Jésus remonta à Jérusalem à l’occasion d’une fête juive. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les Juifs interpellèrent donc l’homme qui venait d’être guéri : C’est le sabbat ! Tu n’as pas le droit de porter cette natte.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '– Mais, répliqua-t-il, celui qui m’a guéri m’a dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Prends ta natte et marche. »
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: – Et qui t’a dit cela ? lui demandèrent-ils.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mais l’homme qui avait été guéri ignorait qui c’était, car Jésus avait disparu dans la foule qui se pressait en cet endroit.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Peu de temps après, Jésus le rencontra dans la cour du Temple.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Te voilà guéri,
    - type: text
      text: ' lui dit-il. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais veille à ne plus pécher, pour qu’il ne t’arrive rien de pire.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Et l’homme alla annoncer aux Juifs que c’était Jésus qui l’avait guéri.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Père et le Fils
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les Juifs se mirent donc à accuser Jésus parce qu’il avait fait cela le jour du sabbat.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon Père est à l’œuvre jusqu’à présent, et moi aussi je suis à l’œuvre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Cette remarque fut pour eux une raison de plus pour chercher à le faire mourir car, non content de violer la loi sur le sabbat, il appelait encore Dieu son propre Père et se faisait ainsi l’égal de Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jésus répondit à ces reproches en leur disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : le Fils ne peut rien faire de sa propre initiative ; il agit seulement d’après ce qu’il voit faire au Père. Tout ce que fait le Père, le Fils le fait également,'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Or, dans cette ville, près de la porte des Brebis, se trouvait une piscine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’emplacement de cette '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'piscine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: existe toujours dans un quartier au nord-est de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' entourée de cinq galeries couvertes, appelée en hébreu Béthesda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bethzatha.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car le Père aime le Fils et lui montre tout ce qu’il fait. Il lui montrera même des œuvres plus grandes que toutes celles que vous avez vues jusqu’à présent, et vous en serez stupéfaits.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, comme le Père ressuscite les morts et donne la vie, ainsi le Fils, lui aussi, donne la vie à qui il veut.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De plus, ce n’est pas le Père qui prononce le jugement sur les hommes ; il a remis tout jugement au Fils,
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: afin que tous les hommes honorent le Fils au même titre que le Père. Ne pas honorer le Fils, c’est ne pas honorer le Père qui l’a envoyé.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, vraiment, je vous l’assure : celui qui écoute ce que je dis et qui place sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: confiance
      - type: text
        text: ' dans le Père qui m’a envoyé, possède, dès à présent, la vie éternelle et il ne sera pas condamné ; il est déjà passé de la mort à la vie.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, vraiment, je vous l’assure : l’heure vient, et elle est déjà là, où les morts entendront la voix du Fils de Dieu, et tous ceux qui l’auront entendue vivront.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, comme le Père possède la vie en lui-même, il a accordé au Fils d’avoir la vie en lui-même.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et parce qu’il est le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ', il lui a donné autorité pour exercer le jugement.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne vous en étonnez pas : l’heure vient où tous ceux qui sont dans la tombe entendront la voix du Fils de l’homme.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors, ils en sortiront : ceux qui auront fait le bien ressusciteront pour la vie, ceux qui auront fait le mal ressusciteront pour être condamnés'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dn 12.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ces galeries étaient remplies de malades qui y restaient couchés : des aveugles, des paralysés, des impotents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont à la suite : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ils attendaient le bouillonnement de l’eau. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Car un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
        - type: text
          text: ' du Seigneur descendait de temps en temps dans la piscine et agitait l’eau. Le premier qui y entrait après le bouillonnement de l’eau était guéri, quelle que soit sa maladie.'
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pour moi, je ne peux rien faire de mon propre chef ; je juge seulement comme le Père me l’indique. Et mon verdict est juste, car je ne cherche pas à réaliser mes propres désirs, mais à faire la volonté de celui qui m’a envoyé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les témoins du Fils
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Bien sûr, si j’étais seul à témoigner en ma faveur, mon témoignage ne serait pas vrai.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais j’ai un autre témoin
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de Jean-Baptiste.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et je sais que son témoignage est vrai.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous avez envoyé une commission d’enquête auprès de Jean et il a rendu témoignage à la vérité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion au ministère de Jean-Baptiste.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Moi, je n’ai pas besoin d’un homme pour témoigner en ma faveur, mais je dis cela pour que vous, vous soyez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauvés
      - type: text
        text: .
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Oui, Jean était vraiment comme un flambeau que l’on allume pour qu’il répande sa clarté. Mais vous, vous avez simplement voulu, pour un moment, vous réjouir à sa lumière.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Quant à moi, j’ai en ma faveur un témoignage qui a plus de poids que celui de Jean : c’est celui des œuvres que le Père m’a donné d’accomplir. Oui, ces œuvres que j’accomplis attestent clairement que le Père m’a envoyé.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De plus, le Père lui-même, qui m’a envoyé, a témoigné en ma faveur. Mais vous n’avez jamais entendu sa voix, ni vu sa face.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sa parole n’habite pas en vous ; la preuve, c’est que vous ne croyez pas en celui qu’il a envoyé.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous étudiez avec soin les Ecritures, parce que vous êtes convaincus d’en obtenir la vie éternelle. Or, précisément, ce sont elles qui témoignent de moi.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais voilà : vous ne voulez pas venir à moi pour recevoir la vie.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je ne cherche pas les honneurs de la part des hommes.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Seulement, je constate une chose : au fond de vous-mêmes, vous n’avez pas d’amour pour Dieu.'
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis venu au nom de mon Père, et vous ne me recevez pas. Si un autre vient en son propre nom, vous le recevrez !
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: D’ailleurs, comment pourriez-vous parvenir à la foi alors que vous cherchez à être honorés les uns par les autres et que vous ne recherchez pas la gloire qui vient de Dieu seul ?
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’allez surtout pas croire que je serai moi votre accusateur auprès de mon Père ; c’est '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' qui vous accusera, oui, ce Moïse même en qui vous avez mis votre espérance.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En effet, si vous l’aviez réellement cru, vous m’auriez aussi cru, car il a parlé de moi dans ses livres.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous ne croyez même pas à ses écrits, comment croirez-vous à mes paroles ?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il y avait là un homme malade depuis trente-huit ans.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jésus le vit couché ; quand il sut qu’il était là depuis si longtemps, il lui demanda : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Veux-tu être guéri ?
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: – Maître, répondit le malade, je n’ai personne pour me plonger dans la piscine quand l’eau commence à bouillonner. Le temps que je me traîne là-bas, un autre y arrive avant moi.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Eh bien,
    - type: text
      text: ' lui dit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lève-toi, prends ta natte et marche !
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A l’instant même l’homme fut guéri. Il prit sa natte et se mit à marcher.
  - type: usfm
