document_id: JER.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cœur corrompu
  - type: heading
    content: Le péché de Juda
  - type: text
    content: Le péché de Juda ╵est écrit avec un burin de fer,
  - type: text
    content: il est gravé ╵sur la tablette de leur cœur
  - type: text
    content: avec la pointe de diamant
  - type: text
    content: et sur les cornes ╵aux coins de leurs autels
  - type: note
    content: Sur les cornes des autels, voir Ex 27.2.
  - type: text
    content: .
  '10':
  - type: text
    content: Moi, l’Eternel, ╵moi, je sonde les cœurs,
  - type: text
    content: je scrute le tréfonds de l’être
  - type: text
    content: pour donner à chacun ╵ce que lui auront valu sa conduite
  - type: text
    content: et les effets ╵de ses agissements.
  '11':
  - type: text
    content: Semblable à la perdrix ╵qui a couvé des œufs ╵qu’elle n’a pas pondus
  - type: text
    content: est l’homme qui amasse ╵des richesses acquises ╵injustement.
  - type: text
    content: Au milieu de sa vie, ╵sa fortune le quitte
  - type: text
    content: et il montre finalement ╵qu’il est un insensé.
  - type: heading
    content: Prière
  '12':
  - type: text
    content: Il est un trône glorieux, ╵élevé dès les origines,
  - type: text
    content: c’est là qu’est notre sanctuaire.
  '13':
  - type: text
    content: O Eternel, ╵toi l’espoir d’Israël,
  - type: text
    content: tous ceux qui t’abandonnent ╵seront couverts de honte.
  - type: text
    content: Oui, ceux qui se détournent ╵de moi vont à leur perte,
  - type: text
    content: parce qu’ils ont abandonné ╵la source des eaux vives
  - type: note
    content: Voir 2.13.
  - type: text
    content: ' ╵qu’est l’Eternel.'
  '14':
  - type: text
    content: Guéris-moi, Eternel, ╵et je serai guéri !
  - type: text
    content: Oui, sauve-moi ╵et je serai sauvé !
  - type: text
    content: Car c’est toi que je loue !
  '15':
  - type: text
    content: 'Les voilà qui me disent :'
  - type: text
    content: « Où sont donc les menaces ╵que l’Eternel a proférées ?
  - type: text
    content: Qu’elles se réalisent ! »
  '16':
  - type: text
    content: Pourtant, je n’ai pas refusé
  - type: text
    content: de marcher à ta suite ╵en étant un berger
  - type: note
    content: 'Pourtant, je n’ai pas refusé… un berger: selon le texte hébreu traditionnel. D’après deux manuscrits grecs : je ne t’ai pas pressé d’envoyer le malheur.'
  - type: text
    content: .
  - type: text
    content: Je n’ai pas souhaité ╵que vienne le jour des douleurs.
  - type: text
    content: Toi, tu es au courant ╵de ce qu’a dit ma bouche,
  - type: text
    content: c’est devant toi que j’ai parlé.
  '17':
  - type: text
    content: Ne deviens pas pour moi ╵un sujet de frayeur !
  - type: text
    content: Tu es mon seul refuge ╵dans le temps du malheur !
  '18':
  - type: text
    content: Que mes persécuteurs ╵soient dans la confusion,
  - type: text
    content: et que je ne sois pas confus !
  - type: text
    content: Qu’ils soient saisis de peur,
  - type: text
    content: et que je n’aie pas peur !
  - type: text
    content: Fais arriver sur eux ╵le jour de la détresse,
  - type: text
    content: et brise-les ╵par un double désastre !
  - type: heading
    content: Le sabbat consacré à l’Eternel
  '19':
  - type: text
    content: 'L’Eternel me parla en ces termes : Va te poster à « la porte du Peuple », par où entrent et sortent les rois de Juda. Et fais de même à toutes les autres portes de la cité de Jérusalem. '
  '2':
  - type: text
    content: Aussi leurs fils ont leurs pensées, ╵tournées vers leurs autels
  - type: text
    content: et vers leurs pieux sacrés ╵voués à Ashéra ╵près de chaque arbre vert
  - type: text
    content: sur les hautes collines
  - type: note
    content: Le culte de la fécondité se pratiquait sur les hautes collines dominées par un bouquet d’arbres verts.
  '20':
  - type: text
    content: 'Là tu proclameras : Ecoutez ce que déclare l’Eternel, rois de Juda, et vous, tous les Judéens, et vous, tous les habitants de Jérusalem, vous qui passez par ces portes !'
  '21':
  - type: text
    content: 'Voici ce que déclare l’Eternel : Gardez-vous de porter des fardeaux le jour du sabbat, et ne leur faites pas passer les portes de Jérusalem'
  - type: note
    content: Voir Né 13.15-22.
  - type: text
    content: '  ! '
  '22':
  - type: text
    content: Ne faites pas non plus sortir de fardeau de vos maisons au jour du sabbat ! Abstenez-vous de tout travail, et faites de ce jour du sabbat un jour saint, comme je l’ai ordonné à vos ancêtres
  - type: note
    content: Voir Ex 20.8-10 ; Dt 5.12-14.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Ils n’ont pas écouté ni prêté attention, ils ont raidi leur nuque et ils ne m’ont pas écouté, ils n’ont pas accepté d’instructions de ma part.
  '24':
  - type: text
    content: 'Mais si vous m’écoutez vraiment, déclare l’Eternel, si le jour du sabbat vous ne faites pas passer de fardeaux par les portes de cette ville et si vous faites de ce jour du sabbat un jour saint, vous abstenant en ce jour-là de tout travail, '
  '25':
  - type: text
    content: 'alors des rois et leurs ministres continueront à passer par ces portes. Ces rois, siégeant sur le trône de David, se déplaceront, montés sur des chars et des chevaux. Eux et leurs ministres, ainsi que les Judéens et les habitants de Jérusalem passeront par ces portes, et, pour toujours, la ville restera habitée. '
  '26':
  - type: text
    content: Alors, des villes de Juda et des environs de Jérusalem, du territoire de Benjamin et de la vallée du Jourdain
  - type: note
    content: 'Ou : Bas-Pays, région de collines à l’ouest de Jérusalem vers la plaine côtière de la Méditerranée.'
  - type: text
    content: ', de la montagne et du Néguev, on viendra pour offrir des holocaustes et d’autres sacrifices, des offrandes et de l’encens, pour offrir des sacrifices de reconnaissance, dans le temple de l’Eternel. '
  '27':
  - type: text
    content: 'Mais si vous ne m’écoutez pas, si vous ne faites pas du jour du sabbat un jour saint, si vous ne vous abstenez pas de porter des fardeaux et de franchir les portes de Jérusalem en ce jour-là, alors je mettrai le feu aux portes de la ville, et il consumera les palais de Jérusalem : il ne s’éteindra pas.'
  '3':
  - type: text
    content: et les montagnes ╵dans la campagne.
  - type: text
    content: Mais je livrerai au pillage
  - type: text
    content: vos biens, tous vos trésors,
  - type: text
    content: ainsi que vos hauts lieux,
  - type: text
    content: à cause des péchés ╵que vous avez commis
  - type: text
    content: dans tout votre pays
  - type: note
    content: Pour les v. 3-4, voir 15.13-14.
  - type: text
    content: .
  '4':
  - type: text
    content: Tu te dessaisiras ╵du patrimoine que je t’ai donné
  - type: text
    content: et de vos ennemis, ╵je vous rendrai esclaves,
  - type: text
    content: dans un pays ╵qui vous est inconnu ;
  - type: text
    content: 'car vous, vous avez attisé ╵le feu de ma colère :'
  - type: text
    content: il sera embrasé ╵à tout jamais.
  '5':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Maudit soit l’homme ╵qui met sa confiance en l’homme
  - type: text
    content: et qui fait des moyens humains ╵la source de sa force
  - type: text
    content: mais qui détourne ╵son cœur de l’Eternel.
  '6':
  - type: text
    content: Il est comme un buisson dans le désert,
  - type: text
    content: et il ne verra pas ╵arriver le bonheur.
  - type: text
    content: Il aura pour demeure ╵un aride désert,
  - type: text
    content: une terre salée ╵où n’habite personne.
  '7':
  - type: text
    content: Béni soit l’homme ╵qui met sa confiance ╵en l’Eternel
  - type: text
    content: et qui fonde sur l’Eternel ╵toute son assurance.
  '8':
  - type: text
    content: Il sera comme un arbre ╵planté près d’un cours d’eau
  - type: text
    content: qui étend ses racines ╵vers le ruisseau,
  - type: text
    content: 'il ne redoute rien ╵lorsque vient la chaleur :'
  - type: text
    content: ses feuilles restent vertes ;
  - type: text
    content: il ne s’inquiète pas
  - type: text
    content: pendant l’année de sécheresse,
  - type: text
    content: et il ne cesse pas ╵de produire du fruit
  - type: note
    content: Voir Ps 1.3.
  - type: text
    content: .
  '9':
  - type: text
    content: Le cœur est tortueux ╵plus que toute autre chose,
  - type: text
    content: et il est incurable,
  - type: text
    content: qui pourrait le connaître ?
