document_id: JER.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le cœur corrompu
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le péché de Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Le péché de Juda ╵est écrit avec un burin de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est gravé ╵sur la tablette de leur cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec la pointe de diamant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur les cornes ╵aux coins de leurs autels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cornes des autels, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 27.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moi, l’Eternel, ╵moi, je sonde les cœurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je scrute le tréfonds de l’être
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour donner à chacun ╵ce que lui auront valu sa conduite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les effets ╵de ses agissements.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Semblable à la perdrix ╵qui a couvé des œufs ╵qu’elle n’a pas pondus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est l’homme qui amasse ╵des richesses acquises ╵injustement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de sa vie, ╵sa fortune le quitte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il montre finalement ╵qu’il est un insensé.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Prière
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il est un trône glorieux, ╵élevé dès les origines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est là qu’est notre sanctuaire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O Eternel, ╵toi l’espoir d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui t’abandonnent ╵seront couverts de honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ceux qui se détournent ╵de moi vont à leur perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils ont abandonné ╵la source des eaux vives
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.13'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵qu’est l’Eternel.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Guéris-moi, Eternel, ╵et je serai guéri !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, sauve-moi ╵et je serai sauvé !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi que je loue !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les voilà qui me disent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Où sont donc les menaces ╵que l’Eternel a proférées ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elles se réalisent ! »
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Pourtant, je n’ai pas refusé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de marcher à ta suite ╵en étant un berger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourtant, je n’ai pas refusé… un berger
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. D’après deux manuscrits grecs : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ne t’ai pas pressé d’envoyer le malheur.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas souhaité ╵que vienne le jour des douleurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, tu es au courant ╵de ce qu’a dit ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est devant toi que j’ai parlé.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ne deviens pas pour moi ╵un sujet de frayeur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon seul refuge ╵dans le temps du malheur !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Que mes persécuteurs ╵soient dans la confusion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je ne sois pas confus !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient saisis de peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je n’aie pas peur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais arriver sur eux ╵le jour de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et brise-les ╵par un double désastre !
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le sabbat consacré à l’Eternel
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L’Eternel me parla en ces termes : Va te poster à « la porte du Peuple », par où entrent et sortent les rois de Juda. Et fais de même à toutes les autres portes de la cité de Jérusalem. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aussi leurs fils ont leurs pensées, ╵tournées vers leurs autels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vers leurs pieux sacrés ╵voués à Ashéra ╵près de chaque arbre vert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les hautes collines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le culte de la fécondité se pratiquait sur les hautes collines dominées par un bouquet d’arbres verts.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Là tu proclameras : Ecoutez ce que déclare l’Eternel, rois de Juda, et vous, tous les Judéens, et vous, tous les habitants de Jérusalem, vous qui passez par ces portes !'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voici ce que déclare l’Eternel : Gardez-vous de porter des fardeaux le jour du sabbat, et ne leur faites pas passer les portes de Jérusalem'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Né 13.15-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ne faites pas non plus sortir de fardeau de vos maisons au jour du sabbat ! Abstenez-vous de tout travail, et faites de ce jour du sabbat un jour saint, comme je l’ai ordonné à vos ancêtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.8-10 ; Dt 5.12-14.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils n’ont pas écouté ni prêté attention, ils ont raidi leur nuque et ils ne m’ont pas écouté, ils n’ont pas accepté d’instructions de ma part.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais si vous m’écoutez vraiment, déclare l’Eternel, si le jour du sabbat vous ne faites pas passer de fardeaux par les portes de cette ville et si vous faites de ce jour du sabbat un jour saint, vous abstenant en ce jour-là de tout travail, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'alors des rois et leurs ministres continueront à passer par ces portes. Ces rois, siégeant sur le trône de David, se déplaceront, montés sur des chars et des chevaux. Eux et leurs ministres, ainsi que les Judéens et les habitants de Jérusalem passeront par ces portes, et, pour toujours, la ville restera habitée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors, des villes de Juda et des environs de Jérusalem, du territoire de Benjamin et de la vallée du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : Bas-Pays, région de collines à l’ouest de Jérusalem vers la plaine côtière de la Méditerranée.'
      marker-yv: yv-n
    - type: text
      text: ', de la montagne et du Néguev, on viendra pour offrir des holocaustes et d’autres sacrifices, des offrandes et de l’encens, pour offrir des sacrifices de reconnaissance, dans le temple de l’Eternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais si vous ne m’écoutez pas, si vous ne faites pas du jour du sabbat un jour saint, si vous ne vous abstenez pas de porter des fardeaux et de franchir les portes de Jérusalem en ce jour-là, alors je mettrai le feu aux portes de la ville, et il consumera les palais de Jérusalem : il ne s’éteindra pas.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et les montagnes ╵dans la campagne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je livrerai au pillage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos biens, tous vos trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que vos hauts lieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause des péchés ╵que vous avez commis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans tout votre pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 3-4, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 15.13-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu te dessaisiras ╵du patrimoine que je t’ai donné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de vos ennemis, ╵je vous rendrai esclaves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un pays ╵qui vous est inconnu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car vous, vous avez attisé ╵le feu de ma colère :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera embrasé ╵à tout jamais.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici ce que déclare l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit l’homme ╵qui met sa confiance en l’homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui fait des moyens humains ╵la source de sa force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui détourne ╵son cœur de l’Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il est comme un buisson dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne verra pas ╵arriver le bonheur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura pour demeure ╵un aride désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une terre salée ╵où n’habite personne.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Béni soit l’homme ╵qui met sa confiance ╵en l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui fonde sur l’Eternel ╵toute son assurance.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il sera comme un arbre ╵planté près d’un cours d’eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui étend ses racines ╵vers le ruisseau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il ne redoute rien ╵lorsque vient la chaleur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses feuilles restent vertes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne s’inquiète pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pendant l’année de sécheresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne cesse pas ╵de produire du fruit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 1.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le cœur est tortueux ╵plus que toute autre chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il est incurable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui pourrait le connaître ?
