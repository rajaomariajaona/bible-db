document_id: PSA.62,21
type_code: fra
verses:
  '1':
  - type: heading
    content: En Dieu mon âme est tranquille
  - type: text
    content: Au chef de chœur, à Yedoutoun
  - type: note
    content: Voir note 39.1.
  - type: text
    content: . Un psaume de David.
  '10':
  - type: text
    content: Oui, les êtres humains ╵sont un souffle qui passe ;
  - type: text
    content: les hommes, tous ensemble, ╵ne sont que déception ;
  - type: text
    content: placés sur la balance, ╵ils pèseraient
  - type: text
    content: à eux tous moins que rien.
  '11':
  - type: text
    content: Ne comptez pas ╵sur le gain obtenu par extorsion !
  - type: text
    content: Ne placez pas un espoir illusoire ╵dans les biens mal acquis !
  - type: text
    content: Si la fortune augmente,
  - type: text
    content: n’y attachez pas votre cœur !
  '12':
  - type: text
    content: Dieu a dit une chose,
  - type: text
    content: 'et il l’a répétée, ╵et je l’ai entendue :'
  - type: text
    content: la puissance est à Dieu.
  '13':
  - type: text
    content: Et c’est aussi, Seigneur, ╵en ta personne, ╵que la bonté réside,
  - type: text
    content: car tu rends à chacun ╵selon ce qu’il a fait.
  '2':
  - type: text
    content: 'Pour sûr, c’est à Dieu seul ╵que, dans le calme, ╵je me remets :'
  - type: text
    content: mon salut vient de lui.
  '3':
  - type: text
    content: Pour sûr, lui seul est mon rocher, ╵et mon Sauveur ;
  - type: text
    content: 'il est ma forteresse : ╵je ne serai pas ébranlé.'
  '4':
  - type: text
    content: Combien de temps encore ╵allez-vous, tous ensemble, ╵vous ruer sur un homme
  - type: text
    content: pour chercher à l’abattre
  - type: text
    content: comme un mur qui s’affaisse,
  - type: text
    content: ou comme une clôture ╵qui cède à la poussée ?
  '5':
  - type: text
    content: Oui, eux, ils forment des projets ╵pour le précipiter ╵de son poste élevé.
  - type: text
    content: Ils aiment le mensonge.
  - type: text
    content: De la bouche, ils bénissent,
  - type: text
    content: mais du cœur, ils maudissent.
  - type: text
    content: Pause
  '6':
  - type: text
    content: 'Oui, remets-toi, mon âme, ╵à Dieu seul, dans le calme :'
  - type: text
    content: mon espoir vient de lui.
  '7':
  - type: text
    content: Pour sûr, lui seul est mon rocher, ╵et mon Sauveur,
  - type: text
    content: ma forteresse, ╵je ne serai pas ébranlé.
  '8':
  - type: text
    content: De Dieu dépendent ╵mon salut et ma gloire,
  - type: text
    content: mon rocher fortifié, ╵mon refuge est en Dieu.
  '9':
  - type: text
    content: Vous, les gens de mon peuple, ╵ayez confiance en lui ╵en toutes circonstances !
  - type: text
    content: Ouvrez-lui votre cœur !
  - type: text
    content: Dieu est notre refuge.
  - type: text
    content: Pause
