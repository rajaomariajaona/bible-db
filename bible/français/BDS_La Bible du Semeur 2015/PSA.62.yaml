document_id: PSA.62,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: En Dieu mon âme est tranquille
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur, à Yedoutoun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '39.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Un psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Oui, les êtres humains ╵sont un souffle qui passe ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les hommes, tous ensemble, ╵ne sont que déception ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: placés sur la balance, ╵ils pèseraient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à eux tous moins que rien.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ne comptez pas ╵sur le gain obtenu par extorsion !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne placez pas un espoir illusoire ╵dans les biens mal acquis !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si la fortune augmente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’y attachez pas votre cœur !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dieu a dit une chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il l’a répétée, ╵et je l’ai entendue :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la puissance est à Dieu.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et c’est aussi, Seigneur, ╵en ta personne, ╵que la bonté réside,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu rends à chacun ╵selon ce qu’il a fait.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pour sûr, c’est à Dieu seul ╵que, dans le calme, ╵je me remets :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon salut vient de lui.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pour sûr, lui seul est mon rocher, ╵et mon Sauveur ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il est ma forteresse : ╵je ne serai pas ébranlé.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Combien de temps encore ╵allez-vous, tous ensemble, ╵vous ruer sur un homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour chercher à l’abattre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un mur qui s’affaisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou comme une clôture ╵qui cède à la poussée ?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oui, eux, ils forment des projets ╵pour le précipiter ╵de son poste élevé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils aiment le mensonge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la bouche, ils bénissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais du cœur, ils maudissent.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Oui, remets-toi, mon âme, ╵à Dieu seul, dans le calme :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon espoir vient de lui.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Pour sûr, lui seul est mon rocher, ╵et mon Sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma forteresse, ╵je ne serai pas ébranlé.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: De Dieu dépendent ╵mon salut et ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon rocher fortifié, ╵mon refuge est en Dieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous, les gens de mon peuple, ╵ayez confiance en lui ╵en toutes circonstances !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvrez-lui votre cœur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est notre refuge.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
