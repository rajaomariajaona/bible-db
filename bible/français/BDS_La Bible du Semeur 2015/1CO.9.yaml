document_id: 1CO.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul a renoncé à ses droits
  - type: text
    content: 'Ne suis-je donc pas libre ? Ne suis-je pas apôtre ? N’ai-je pas vu Jésus, notre Seigneur ? Vous-mêmes, n’êtes-vous pas un fruit de mon travail au service du Seigneur ? '
  '10':
  - type: text
    content: 'N’est-ce pas pour nous qu’il parle ainsi ? Bien sûr que si ! C’est pour nous que cette parole a été écrite, car il faut que celui qui laboure le fasse avec espérance et que celui qui bat le blé puisse compter sur sa part de la récolte. '
  '11':
  - type: text
    content: 'Puisque nous avons semé parmi vous les biens spirituels, serait-ce de notre part une prétention exorbitante si nous attendions de vous quelque avantage matériel ? '
  '12':
  - type: text
    content: Du moment que d’autres exercent ce droit sur vous, ne l’avons-nous pas à plus forte raison ?
  - type: text
    content: 'Eh bien ! nous avons préféré ne pas user de ce droit ; au contraire, nous supportons tout, afin d’éviter de faire obstacle, si peu que ce soit, à l’Evangile de Christ. '
  '13':
  - type: text
    content: Et pourtant, vous le savez, ceux qui font le service sacré dans le Temple reçoivent leur nourriture du Temple. Ceux qui officient à l’autel reçoivent leur part des sacrifices offerts sur l’autel
  - type: note
    content: Les prêtres israélites avaient droit à une part de certains sacrifices et de certaines offrandes (voir Lv 6 à 7).
  - type: text
    content: '. '
  '14':
  - type: text
    content: De même, le Seigneur a ordonné que ceux qui annoncent l’Evangile vivent de cette annonce de l’Evangile
  - type: note
    content: Voir Mt 10.10 ; Lc 10.7 ; 1 Tm 5.18.
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Mais moi, je n’ai fait valoir aucun de ces droits. Et si je les mentionne ici, ce n’est pas pour les revendiquer ; je préférerais mourir plutôt que de me laisser ravir ce sujet de fierté. '
  '16':
  - type: text
    content: 'En effet, je n’ai pas à m’enorgueillir de ce que j’annonce l’Evangile : c’est une obligation qui m’est imposée. Malheur à moi si je n’annonce pas l’Evangile ! '
  '17':
  - type: text
    content: 'Ah ! certes, si la décision d’accomplir cette tâche ne venait que de moi, je recevrais un salaire ; mais puisque cette décision n’a pas dépendu de moi, je ne fais que m’acquitter d’une charge qui m’a été confiée. '
  '18':
  - type: text
    content: En quoi consiste alors mon salaire ? Dans la satisfaction de pouvoir offrir gratuitement l’Evangile que je proclame en renonçant volontairement aux droits que me confère ma qualité de prédicateur de l’Evangile.
  '19':
  - type: text
    content: 'Car, bien que je sois un homme libre à l’égard de tous, je me suis fait l’esclave de tous, afin de gagner le plus de gens possible à Jésus-Christ. '
  '2':
  - type: text
    content: 'D’autres peuvent refuser de reconnaître en moi un apôtre : pour vous, du moins, c’est ce que je suis, car vous êtes bien le sceau qui authentifie mon ministère apostolique au service du Seigneur.'
  '20':
  - type: text
    content: 'Lorsque je suis avec les Juifs, je vis comme eux, afin de les gagner. Lorsque je suis parmi ceux qui sont sous le régime de la Loi de Moïse, je vis comme si j’étais moi-même assujetti à ce régime, bien que je ne le sois pas, afin de gagner ceux qui sont sous le régime de cette Loi. '
  '21':
  - type: text
    content: 'Avec ceux qui n’ont pas la Loi de Dieu, je vis comme n’ayant pas non plus la Loi, afin de gagner à Christ ceux qui n’ont pas la Loi, bien que je ne sois pas sans la loi de Dieu, car je vis selon la loi de Christ. '
  '22':
  - type: text
    content: Avec les chrétiens mal affermis dans la foi, je vis comme eux, afin de gagner ceux dont la foi est mal affermie. C’est ainsi que je me fais tout à tous, afin d’en conduire au moins quelques-uns au salut par tous les moyens.
  '23':
  - type: text
    content: 'Or, tout cela, je le fais pour la cause de l’Evangile pour avoir part, avec eux, aux bénédictions qu’apporte l’Evangile. '
  '24':
  - type: text
    content: 'Ne savez-vous pas que, sur un stade, tous les concurrents courent pour gagner et, cependant, un seul remporte le prix ? Courez comme lui, de manière à gagner. '
  '25':
  - type: text
    content: Tous les athlètes s’imposent une discipline sévère
  - type: note
    content: Les athlètes étaient soumis pendant plusieurs mois avant les jeux à toutes sortes d’abstinences.
  - type: text
    content: ' dans tous les domaines pour recevoir une couronne, qui pourtant sera bien vite fanée'
  - type: note
    content: C’était, au début, une couronne de persil, plus tard de pin.
  - type: text
    content: ', alors que nous, nous aspirons à une couronne qui ne se flétrira jamais. '
  '26':
  - type: text
    content: 'C’est pourquoi, si je cours, ce n’est pas à l’aveuglette, et si je m’exerce à la boxe, ce n’est pas en donnant des coups en l’air. '
  '27':
  - type: text
    content: Je traite durement mon corps, je le maîtrise sévèrement, de peur qu’après avoir proclamé l’Evangile aux autres, je ne me trouve moi-même disqualifié.
  '3':
  - type: text
    content: 'Et voici ma défense contre ceux qui me mettent en accusation : '
  '4':
  - type: text
    content: 'En tant qu’apôtres, ne serions-nous pas en droit de recevoir le manger et le boire pour notre travail ? '
  '5':
  - type: text
    content: N’aurions-nous pas le droit d’être accompagnés par une épouse chrétienne, comme les autres apôtres, les frères du Seigneur
  - type: note
    content: Parmi eux se trouvait Jacques, l’un des responsables de l’Eglise de Jérusalem.
  - type: text
    content: ' et Pierre ? '
  '6':
  - type: text
    content: 'Ou bien, Barnabas et moi-même serions-nous les seuls à devoir travailler pour gagner notre pain ? '
  '7':
  - type: text
    content: 'Dites-moi : avez-vous jamais entendu parler d’un soldat servant dans une armée à ses propres frais, ou d’un vigneron qui ne mangerait pas des raisins de la vigne qu’il a plantée ? Quel berger élève un troupeau sans jamais profiter du lait de ses brebis ? '
  '8':
  - type: text
    content: 'Et je ne tire pas mes arguments des seuls principes établis par les hommes. Car la Loi dit les mêmes choses. '
  '9':
  - type: text
    content: 'En effet, c’est bien dans la Loi de Moïse qu’il est écrit : '
  - type: text
    content: Tu ne mettras pas de muselière à un bœuf pendant qu’il foule le blé
  - type: note
    content: Dt 25.4.
  - type: text
    content: '. Dieu s’inquiéterait-il ici des bœufs ? '
