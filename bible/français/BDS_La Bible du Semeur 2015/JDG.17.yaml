document_id: JDG.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La déchéance morale et spirituelle d’Israël
  - type: heading
    content: Le sanctuaire de Mika
  - type: text
    content: Dans la région montagneuse d’Ephraïm
  - type: note
    content: Au nord de Jérusalem.
  - type: text
    content: ' vivait un homme nommé Mika. '
  '10':
  - type: text
    content: – Eh bien, lui dit Mika, reste donc chez moi. Tu me serviras de « père
  - type: note
    content: Terme de respect.
  - type: text
    content: '  » et de prêtre, et je te donnerai dix pièces d’argent par an, en plus du vêtement et de la nourriture.'
  - type: text
    content: 'Le lévite entra à son service. '
  '11':
  - type: text
    content: 'Il accepta de rester chez cet homme qui le traita comme l’un de ses fils. '
  '12':
  - type: text
    content: 'Mika établit le lévite dans sa charge, et le jeune homme devint donc son prêtre. Il logea dans sa propre maison. '
  '13':
  - type: text
    content: 'Mika dit : Maintenant, je suis certain que l’Eternel me fera du bien, puisque j’ai pu avoir un lévite pour prêtre.'
  '2':
  - type: text
    content: 'Il déclara à sa mère : Tu te souviens qu’on t’a volé onze cents pièces d’argent'
  - type: note
    content: Il s’agit de sicles d’argent.
  - type: text
    content: ' et que tu as maudit le voleur en ma présence. Eh bien, c’est moi qui ai pris cet argent, il est chez moi.'
  - type: text
    content: – Que mon fils soit béni de l’Eternel ! lui dit sa mère.
  '3':
  - type: text
    content: 'Il rendit les onze cents pièces d’argent à sa mère qui dit : Je consacre cet argent à l’Eternel en faveur de mon fils pour en faire une statue et une idole en métal fondu. Je vais donc te le rendre.'
  '4':
  - type: text
    content: 'Le fils remit l’argent à sa mère, qui en préleva deux cents pièces pour les donner à un orfèvre. Celui-ci en fit une statue et une idole en métal fondu, qu’on plaça dans la maison de Mika. '
  '5':
  - type: text
    content: Ayant donc chez lui un lieu de culte, il fit faire une autre statue et des idoles domestiques, puis il établit prêtre l’un de ses fils.
  - type: heading
    content: Le prêtre de Mika
  '6':
  - type: text
    content: 'En ce temps-là, il n’y avait pas de roi en Israël. Chacun faisait ce qu’il jugeait bon. '
  '7':
  - type: text
    content: Or, il y avait là un jeune lévite, originaire de Bethléhem en Juda, qui appartient à la tribu de Juda. Il résidait là
  - type: note
    content: Le verbe indique que le lévite y demeurait en étranger.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Il avait quitté Bethléhem pour aller s’établir là où il trouverait un domicile. En cours de route, il était arrivé dans la région montagneuse d’Ephraïm et jusqu’à la maison de Mika.
  '9':
  - type: text
    content: – D’où viens-tu ? lui demanda celui-ci.
  - type: text
    content: – Je suis un lévite, répondit-il, de Bethléhem en Juda. Je suis en route pour m’établir là où je trouverai un endroit.
