document_id: JDG.17
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La déchéance morale et spirituelle d’Israël
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sanctuaire de Mika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dans la région montagneuse d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Au nord de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' vivait un homme nommé Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il déclara à sa mère : Tu te souviens qu’on t’a volé onze cents pièces d’argent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sicles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d’argent.
    marker-yv: yv-n
  - type: text
    text: ' et que tu as maudit le voleur en ma présence. Eh bien, c’est moi qui ai pris cet argent, il est chez moi.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Que mon fils soit béni de l’Eternel ! lui dit sa mère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il rendit les onze cents pièces d’argent à sa mère qui dit : Je consacre cet argent à l’Eternel en faveur de mon fils pour en faire une statue et une idole en métal fondu. Je vais donc te le rendre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le fils remit l’argent à sa mère, qui en préleva deux cents pièces pour les donner à un orfèvre. Celui-ci en fit une statue et une idole en métal fondu, qu’on plaça dans la maison de Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ayant donc chez lui un lieu de culte, il fit faire une autre statue et des idoles domestiques, puis il établit prêtre l’un de ses fils.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le prêtre de Mika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En ce temps-là, il n’y avait pas de roi en Israël. Chacun faisait ce qu’il jugeait bon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Or, il y avait là un jeune lévite, originaire de Bethléhem en Juda, qui appartient à la tribu de Juda. Il résidait là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le verbe indique que le lévite y demeurait en étranger.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il avait quitté Bethléhem pour aller s’établir là où il trouverait un domicile. En cours de route, il était arrivé dans la région montagneuse d’Ephraïm et jusqu’à la maison de Mika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: – D’où viens-tu ? lui demanda celui-ci.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Je suis un lévite, répondit-il, de Bethléhem en Juda. Je suis en route pour m’établir là où je trouverai un endroit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: – Eh bien, lui dit Mika, reste donc chez moi. Tu me serviras de « père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Terme de respect.
    marker-yv: yv-n
  - type: text
    text: '  » et de prêtre, et je te donnerai dix pièces d’argent par an, en plus du vêtement et de la nourriture.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le lévite entra à son service. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il accepta de rester chez cet homme qui le traita comme l’un de ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mika établit le lévite dans sa charge, et le jeune homme devint donc son prêtre. Il logea dans sa propre maison. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mika dit : Maintenant, je suis certain que l’Eternel me fera du bien, puisque j’ai pu avoir un lévite pour prêtre.'
