document_id: ISA.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à l’Assyrie
  - type: heading
    content: L’Eternel est notre délivrance
  - type: text
    content: Malheur à toi, dévastateur,
  - type: text
    content: qui n’as pas été dévasté
  - type: note
    content: Cette menace vise probablement l’Assyrie.
  - type: text
    content: '  !'
  - type: text
    content: Malheur à toi, le traître ╵qui n’as jamais été trahi !
  - type: text
    content: Quand tu auras fini de dévaster, ╵tu seras dévasté.
  - type: text
    content: Quand tu auras achevé de trahir, ╵tu seras toi aussi trahi.
  '10':
  - type: text
    content: Maintenant, je me lève,
  - type: text
    content: dit l’Eternel.
  - type: text
    content: Maintenant, je me dresse,
  - type: text
    content: oui, maintenant, ╵je montre ma grandeur.
  '11':
  - type: text
    content: Vous ne concevez que du foin,
  - type: text
    content: vous n’enfantez que de la paille,
  - type: text
    content: votre souffle est le feu ╵qui vous consumera.
  '12':
  - type: text
    content: Les peuples seront brûlés à la chaux,
  - type: text
    content: comme des épines coupées
  - type: text
    content: quand on y met le feu.
  '13':
  - type: text
    content: Vous qui êtes au loin, ╵écoutez donc ╵ce que j’ai accompli,
  - type: text
    content: et vous qui êtes près, ╵connaissez ma puissance !
  '14':
  - type: text
    content: Les pécheurs dans Sion ╵ont été terrifiés,
  - type: text
    content: ceux qui ne respectent pas Dieu ╵se sont mis à trembler.
  - type: text
    content: 'Ils s’écrient : « Qui de nous ╵peut rester en présence ╵de ce feu qui consume ?'
  - type: text
    content: Qui pourra séjourner
  - type: text
    content: auprès de brasiers éternels ? »
  '15':
  - type: text
    content: Celui qui se conduit ╵selon ce qui est juste
  - type: text
    content: et qui parle toujours ╵selon ce qui est droit,
  - type: text
    content: qui rejette les gains ╵acquis par extorsion,
  - type: text
    content: qui n’accepte jamais ╵de pots-de-vin,
  - type: text
    content: qui ferme ses oreilles ╵aux propos criminels,
  - type: text
    content: qui se bouche les yeux ╵pour ne pas voir le mal ;
  '16':
  - type: text
    content: cet homme habitera ╵dans des lieux élevés ;
  - type: text
    content: des rochers fortifiés ╵lui serviront d’abri,
  - type: text
    content: son pain lui sera assuré,
  - type: text
    content: et l’eau ne lui manquera pas.
  - type: heading
    content: Vision de paix
  '17':
  - type: text
    content: Tes yeux contempleront ╵le roi dans sa beauté,
  - type: text
    content: et ils verront ╵toute l’étendue du pays.
  '18':
  - type: text
    content: Tu te souviendras de tes craintes,
  - type: text
    content: 'et tu demanderas : ╵« Où donc est l’inspecteur, ╵celui qui percevait les taxes,'
  - type: text
    content: où est le contrôleur des tours
  - type: note
    content: Des fonctionnaires qui faisaient durement sentir l’oppression de l’ennemi.
  - type: text
    content: '  ? »'
  '19':
  - type: text
    content: Non, tu ne verras plus ╵tout ce peuple arrogant,
  - type: text
    content: peuple à la langue obscure,
  - type: text
    content: à la langue barbare ╵que l’on ne comprend pas.
  '2':
  - type: text
    content: Eternel, fais-nous grâce,
  - type: text
    content: car nous comptons sur toi.
  - type: text
    content: Chaque matin, sois notre force,
  - type: text
    content: délivre-nous ╵au temps de la détresse !
  '20':
  - type: text
    content: Mais tu contempleras Sion, ╵la cité de nos fêtes,
  - type: text
    content: tes yeux verront Jérusalem, ╵résidence tranquille,
  - type: text
    content: tente qui ne sera plus enlevée,
  - type: text
    content: dont les piquets ne seront ╵plus jamais arrachés,
  - type: text
    content: et dont aucun cordage ╵ne sera plus tranché.
  '21':
  - type: text
    content: Là, l’Eternel se montrera ╵magnifique pour nous,
  - type: text
    content: et ce sera une région
  - type: note
    content: 'Autre traduction : et il nous tiendra lieu.'
  - type: text
    content: ' ╵de larges fleuves'
  - type: text
    content: et de vastes canaux.
  - type: text
    content: Aucun bateau à rames ╵ne s’y avancera,
  - type: text
    content: aucun vaisseau splendide ╵n’y passera.
  '22':
  - type: text
    content: Car l’Eternel est notre chef,
  - type: text
    content: il est notre législateur.
  - type: text
    content: Oui, l’Eternel est notre roi
  - type: text
    content: et il nous sauvera.
  '23':
  - type: text
    content: Quant à vous, Assyriens, ╵vos cordes relâchées
  - type: text
    content: ne tiennent plus le mât,
  - type: text
    content: ils ne sont plus capables ╵de déployer les voiles.
  - type: text
    content: Alors on se partagera ╵un immense butin.
  - type: text
    content: Tous en prendront leur part, ╵y compris les boiteux.
  '24':
  - type: text
    content: Aucun des habitants ╵ne se dira malade.
  - type: text
    content: Le peuple qui habitera ╵à Jérusalem recevra
  - type: text
    content: le pardon de ses fautes.
  '3':
  - type: text
    content: Au bruit d’un grand tumulte,
  - type: text
    content: les peuples fuient.
  - type: text
    content: Quand tu te lèves,
  - type: text
    content: les gens des nations se dispersent.
  '4':
  - type: text
    content: On rafle leur butin,
  - type: text
    content: comme raflent
  - type: note
    content: 'Autre traduction : s’assemblent.'
  - type: text
    content: ' les sauterelles,'
  - type: text
    content: et l’on se rue dessus
  - type: text
    content: comme se précipite ╵un essaim de criquets.
  '5':
  - type: text
    content: L’Eternel est sublime
  - type: text
    content: car il siège là-haut.
  - type: text
    content: Il remplira Sion
  - type: text
    content: de la droiture et la justice.
  '6':
  - type: text
    content: Tu passeras tes jours ╵dans la sécurité.
  - type: text
    content: La sagesse et la connaissance ╵sont les richesses du salut ;
  - type: text
    content: et craindre l’Eternel,
  - type: text
    content: tel est tout ton trésor.
  - type: heading
    content: Quand le Seigneur interviendra
  '7':
  - type: text
    content: Les vaillants hommes
  - type: text
    content: crient dans les rues,
  - type: text
    content: les messagers de paix
  - type: text
    content: pleurent amèrement.
  '8':
  - type: text
    content: Les routes sont désertes.
  - type: text
    content: Plus personne ne passe ╵sur les chemins ;
  - type: text
    content: le dévastateur a rompu l’alliance,
  - type: text
    content: il méprise les villes
  - type: note
    content: 'les villes: selon le texte hébreu traditionnel. Le texte hébreu de Qumrân a : les témoins.'
  - type: text
    content: ','
  - type: text
    content: il n’a de respect pour personne.
  '9':
  - type: text
    content: Le pays est en deuil, ╵il dépérit.
  - type: text
    content: Le Liban est confus, ╵ses arbres sont flétris,
  - type: text
    content: la plaine du Saron ╵ressemble à un désert.
  - type: text
    content: Le pays du Basan ╵et le mont du Carmel ╵ont perdu leur feuillage.
