document_id: ISA.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malheur à l’Assyrie
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel est notre délivrance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à toi, dévastateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n’as pas été dévasté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette menace vise probablement l’Assyrie.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à toi, le traître ╵qui n’as jamais été trahi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu auras fini de dévaster, ╵tu seras dévasté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu auras achevé de trahir, ╵tu seras toi aussi trahi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, fais-nous grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous comptons sur toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chaque matin, sois notre force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivre-nous ╵au temps de la détresse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au bruit d’un grand tumulte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les peuples fuient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu te lèves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gens des nations se dispersent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On rafle leur butin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme raflent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s’assemblent.
    marker-yv: yv-n
  - type: text
    text: ' les sauterelles,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on se rue dessus
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme se précipite ╵un essaim de criquets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Eternel est sublime
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il siège là-haut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il remplira Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la droiture et la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu passeras tes jours ╵dans la sécurité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La sagesse et la connaissance ╵sont les richesses du salut ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et craindre l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel est tout ton trésor.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Quand le Seigneur interviendra
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les vaillants hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: crient dans les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les messagers de paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleurent amèrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les routes sont désertes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus personne ne passe ╵sur les chemins ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le dévastateur a rompu l’alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il méprise les villes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les villes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. Le texte hébreu de Qumrân a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les témoins.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’a de respect pour personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le pays est en deuil, ╵il dépérit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Liban est confus, ╵ses arbres sont flétris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la plaine du Saron ╵ressemble à un désert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays du Basan ╵et le mont du Carmel ╵ont perdu leur feuillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant, je me lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, je me dresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, maintenant, ╵je montre ma grandeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous ne concevez que du foin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous n’enfantez que de la paille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre souffle est le feu ╵qui vous consumera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les peuples seront brûlés à la chaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des épines coupées
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on y met le feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous qui êtes au loin, ╵écoutez donc ╵ce que j’ai accompli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui êtes près, ╵connaissez ma puissance !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les pécheurs dans Sion ╵ont été terrifiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ne respectent pas Dieu ╵se sont mis à trembler.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils s’écrient : « Qui de nous ╵peut rester en présence ╵de ce feu qui consume ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourra séjourner
- type: usfm
  marker: q1
  children:
  - type: text
    text: auprès de brasiers éternels ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui se conduit ╵selon ce qui est juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui parle toujours ╵selon ce qui est droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui rejette les gains ╵acquis par extorsion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n’accepte jamais ╵de pots-de-vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ferme ses oreilles ╵aux propos criminels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se bouche les yeux ╵pour ne pas voir le mal ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: cet homme habitera ╵dans des lieux élevés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: des rochers fortifiés ╵lui serviront d’abri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son pain lui sera assuré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’eau ne lui manquera pas.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Vision de paix
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes yeux contempleront ╵le roi dans sa beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils verront ╵toute l’étendue du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu te souviendras de tes craintes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu demanderas : ╵« Où donc est l’inspecteur, ╵celui qui percevait les taxes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: où est le contrôleur des tours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Des fonctionnaires qui faisaient durement sentir l’oppression de l’ennemi.
    marker-yv: yv-n
  - type: text
    text: '  ? »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Non, tu ne verras plus ╵tout ce peuple arrogant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peuple à la langue obscure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la langue barbare ╵que l’on ne comprend pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais tu contempleras Sion, ╵la cité de nos fêtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes yeux verront Jérusalem, ╵résidence tranquille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tente qui ne sera plus enlevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont les piquets ne seront ╵plus jamais arrachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont aucun cordage ╵ne sera plus tranché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Là, l’Eternel se montrera ╵magnifique pour nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce sera une région
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et il nous tiendra lieu.
    marker-yv: yv-n
  - type: text
    text: ' ╵de larges fleuves'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de vastes canaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun bateau à rames ╵ne s’y avancera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun vaisseau splendide ╵n’y passera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car l’Eternel est notre chef,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est notre législateur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l’Eternel est notre roi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il nous sauvera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quant à vous, Assyriens, ╵vos cordes relâchées
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne tiennent plus le mât,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne sont plus capables ╵de déployer les voiles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors on se partagera ╵un immense butin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous en prendront leur part, ╵y compris les boiteux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aucun des habitants ╵ne se dira malade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple qui habitera ╵à Jérusalem recevra
- type: usfm
  marker: q1
  children:
  - type: text
    text: le pardon de ses fautes.
