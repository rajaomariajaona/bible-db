document_id: PSA.141,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tiens-moi dans ta main !
  - type: text
    content: Psaume de David.
  - type: text
    content: Eternel, ╵je t’ai appelé ! ╵Viens en hâte à mon secours !
  - type: text
    content: Prête l’oreille à ma voix ╵quand je crie à toi !
  '10':
  - type: text
    content: Que les méchants tous ensemble ╵tombent dans leurs propres pièges
  - type: text
    content: et que moi je passe ╵sur le chemin sans dommage.
  '2':
  - type: text
    content: Considère ma prière ╵comme de l’encens
  - type: note
    content: Voir Ap 5.8.
  - type: text
    content: ' ╵placé devant toi,'
  - type: text
    content: et mes mains tendues vers toi ╵comme l’offrande du soir.
  '3':
  - type: text
    content: Que ma bouche, ô Eternel, ╵reste sous ta surveillance !
  - type: text
    content: Veille aux portes de mes lèvres !
  '4':
  - type: text
    content: Ne me laisse pas ╵tendre vers le mal,
  - type: text
    content: de peur que je commette ╵des actions perverses
  - type: text
    content: avec ceux qui font le mal,
  - type: text
    content: ou que je prenne part ╵à ce dont ils se repaissent !
  '5':
  - type: text
    content: Si le juste me reprend, ╵il me prouve son amour.
  - type: text
    content: Qu’il me fasse des reproches, ╵c’est, sur ma tête, un parfum
  - type: text
    content: que je ne refuse pas.
  - type: text
    content: Mais aux méfaits des méchants, ╵j’opposerai ma prière ╵toujours à nouveau.
  '6':
  - type: text
    content: Que leurs chefs ╵soient précipités ╵contre les rochers ;
  - type: text
    content: alors on écoutera ╵mes paroles ╵car elles sont appréciables.
  '7':
  - type: text
    content: Comme si on labourait ╵et hersait la terre,
  - type: text
    content: voici que nos os ╵sont dispersés à l’orée ╵du séjour des morts.
  '8':
  - type: text
    content: C’est vers toi, ô Eternel, ╵qui es mon Seigneur, ╵que se tournent mes regards ;
  - type: text
    content: je cherche en toi mon refuge.
  - type: text
    content: Ne me laisse pas périr !
  '9':
  - type: text
    content: Garde-moi des pièges ╵qu’ils ont tendus sous mes pas,
  - type: text
    content: et des traquenards ╵de ces malfaisants !
