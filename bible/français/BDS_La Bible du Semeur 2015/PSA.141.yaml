document_id: PSA.141,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tiens-moi dans ta main !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ╵je t’ai appelé ! ╵Viens en hâte à mon secours !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à ma voix ╵quand je crie à toi !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Que les méchants tous ensemble ╵tombent dans leurs propres pièges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que moi je passe ╵sur le chemin sans dommage.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Considère ma prière ╵comme de l’encens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '141.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 5.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵placé devant toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes mains tendues vers toi ╵comme l’offrande du soir.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que ma bouche, ô Eternel, ╵reste sous ta surveillance !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veille aux portes de mes lèvres !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ne me laisse pas ╵tendre vers le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur que je commette ╵des actions perverses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou que je prenne part ╵à ce dont ils se repaissent !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Si le juste me reprend, ╵il me prouve son amour.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il me fasse des reproches, ╵c’est, sur ma tête, un parfum
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je ne refuse pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais aux méfaits des méchants, ╵j’opposerai ma prière ╵toujours à nouveau.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Que leurs chefs ╵soient précipités ╵contre les rochers ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors on écoutera ╵mes paroles ╵car elles sont appréciables.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Comme si on labourait ╵et hersait la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici que nos os ╵sont dispersés à l’orée ╵du séjour des morts.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C’est vers toi, ô Eternel, ╵qui es mon Seigneur, ╵que se tournent mes regards ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je cherche en toi mon refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me laisse pas périr !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Garde-moi des pièges ╵qu’ils ont tendus sous mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des traquenards ╵de ces malfaisants !
