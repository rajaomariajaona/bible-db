document_id: ACT.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul défend sa cause
  - type: text
    content: Agrippa
  - type: note
    content: 'Agrippa: voir note 25.13.'
  - type: text
    content: ' dit à Paul : Tu as la parole : tu peux présenter ta défense.'
  - type: text
    content: 'Alors Paul étendit la main et présenta ainsi sa défense : '
  '10':
  - type: text
    content: 'C’est ce que j’ai fait à Jérusalem : j’ai jeté en prison, en vertu des pouvoirs que j’avais reçus des chefs des prêtres, un grand nombre des membres du peuple saint et, lorsqu’il s’agissait de les condamner, j’ai voté leur mise à mort. '
  '11':
  - type: text
    content: Je passais d’une synagogue à l’autre pour les faire punir et essayer de les contraindre à renier leur foi ; dans l’excès de ma fureur, j’allais les traquer jusque dans les villes étrangères.
  '12':
  - type: text
    content: 'C’est ainsi qu’un jour, muni des pleins pouvoirs que m’avaient accordés les chefs des prêtres en me donnant cette mission, je me suis rendu à Damas. '
  '13':
  - type: text
    content: 'J’étais en chemin et il était environ midi. C’est alors, ô roi, que j’ai vu, venant du ciel, une lumière plus éclatante que celle du soleil. Elle m’enveloppait de son éclat ainsi que mes compagnons de voyage. '
  '14':
  - type: text
    content: 'Nous sommes tous tombés à terre, et j’entendis une voix qui me disait en hébreu : '
  - type: text
    content: « Saul, Saul, pourquoi me persécutes-tu ? Tu te blesses toi-même en te rebiffant contre l’aiguillon. »
  '15':
  - type: text
    content: 'Je demandai : « Qui es-tu, Seigneur ? »'
  - type: text
    content: 'Et le Seigneur dit : '
  - type: text
    content: « Je suis, moi, Jésus, que tu persécutes.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Mais lève-toi, tiens-toi debout. Car je te suis apparu pour que tu sois mon serviteur, pour témoigner aux hommes que tu m’as vu
  - type: note
    content: 'Certains manuscrits ont : des choses que tu as vues.'
  - type: text
    content: ' '
  - type: text
    content: et leur dire ce que je te ferai encore voir par la suite.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Je t’ai choisi du milieu
  - type: note
    content: 'Autre traduction : Je te délivrerai.'
  - type: text
    content: ' '
  - type: text
    content: du peuple juif et des non-Juifs, vers lesquels je t’envoie.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Tu devras leur ouvrir les yeux et les faire passer des ténèbres à la lumière et du pouvoir de '
  - type: text
    content: Satan
  - type: text
    content: ' à Dieu pour qu’en croyant en moi, ils reçoivent le pardon de leurs péchés et une part d’héritage avec les membres du peuple saint. »'
  '19':
  - type: text
    content: 'Ainsi, ô roi Agrippa, je n’ai pas désobéi à cette vision venue du ciel. '
  '2':
  - type: text
    content: 'Roi Agrippa ! Je m’estime heureux de pouvoir aujourd’hui me défendre devant toi de toutes les accusations que les Juifs ont portées contre moi, '
  '20':
  - type: text
    content: 'Mais je me suis adressé d’abord aux habitants de Damas et à ceux de Jérusalem, puis à ceux de toute la Judée, et enfin aux non-Juifs, et je leur ai annoncé qu’ils devaient changer, se convertir à Dieu et traduire ce changement par des actes. '
  '21':
  - type: text
    content: Et c’est pour cette raison que les Juifs se sont emparés de moi dans la cour du Temple et qu’ils ont essayé de me tuer.
  '22':
  - type: text
    content: 'Mais j’ai été protégé par Dieu jusqu’à ce jour et je suis donc encore là pour apporter mon témoignage aux gens d’humble condition comme aux personnages importants. Et ce que je déclare, ce n’est rien d’autre que les événements dont les prophètes et Moïse ont annoncé l’accomplissement : '
  '23':
  - type: text
    content: c’est-à-dire que le Messie souffrirait, et qu’il serait le premier à ressusciter pour annoncer la lumière du salut, non seulement au peuple juif, mais aussi aux non-Juifs.
  - type: heading
    content: L’avis du roi Agrippa
  '24':
  - type: text
    content: Paul en était là dans sa défense, quand Festus
  - type: note
    content: 'Festus: voir note 24.27.'
  - type: text
    content: ' s’écria : Tu es fou, Paul ! Ton grand savoir te fait perdre la tête !'
  '25':
  - type: text
    content: '– Non, Excellence, répondit Paul, je ne suis pas fou. Tout ce que je dis est vrai et sensé. '
  '26':
  - type: text
    content: 'D’ailleurs, le roi Agrippa est au courant de ces faits – et c’est pour cela que je peux lui en parler avec assurance. Aucun de ces événements ne lui échappe, j’en suis sûr, car ce n’est pas en secret qu’ils se sont produits. '
  '27':
  - type: text
    content: Crois-tu aux prophètes, roi Agrippa ? Oui, je le sais, tu y crois.
  '28':
  - type: text
    content: 'Alors Agrippa dit à Paul : Encore un peu et tu vas me persuader au point de faire de moi un chrétien'
  - type: note
    content: 'Autres traductions : tu vas me persuader que tu vas faire de moi un chrétien, ou : tu vas me persuader de faire le chrétien. Certains manuscrits ont : tu vas bientôt me persuader de devenir chrétien.'
  - type: text
    content: '  !'
  '29':
  - type: text
    content: – Qu’il s’en faille de peu ou de beaucoup, reprit Paul, je prie Dieu que non seulement toi, mais encore tous ceux qui m’écoutent en cet instant, vous deveniez comme je suis moi-même, à l’exception de ces chaînes !
  '3':
  - type: text
    content: car tu connais parfaitement toutes leurs coutumes et leurs discussions. Veuille donc, je te prie, m’écouter avec patience.
  '30':
  - type: text
    content: 'Là-dessus, le roi se leva, et le gouverneur, Bérénice, ainsi que tous ceux qui avaient siégé avec eux l’imitèrent. '
  '31':
  - type: text
    content: 'En se retirant, ils se disaient les uns aux autres : Cet homme n’a rien fait qui mérite la mort ou la prison.'
  '32':
  - type: text
    content: 'Et Agrippa dit à Festus : Il aurait pu être relâché s’il n’avait pas fait appel à l’empereur.'
  '4':
  - type: text
    content: 'Tous mes compatriotes savent comment j’ai vécu, dès ma jeunesse, au sein de mon peuple, à Jérusalem. '
  '5':
  - type: text
    content: 'Ils me connaissent depuis longtemps et ils peuvent témoigner, s’ils le veulent bien, que j’ai conduit ma vie selon les principes du parti le plus strict de notre religion : celui des pharisiens.'
  '6':
  - type: text
    content: 'Et maintenant, si je suis traduit en justice, c’est à cause de mon espérance dans la promesse de Dieu à nos ancêtres. '
  '7':
  - type: text
    content: 'Nos douze tribus espèrent voir son accomplissement, en rendant leur culte à Dieu nuit et jour. Oui, c’est à cause de cette espérance que je suis mis en accusation, par des Juifs, ô roi ! '
  '8':
  - type: text
    content: Et pourtant ! trouvez-vous incroyable que Dieu puisse ressusciter des morts ?
  '9':
  - type: text
    content: 'Pour moi donc, j’ai d’abord pensé que je devais m’opposer par tous les moyens au nom de Jésus de Nazareth. '
