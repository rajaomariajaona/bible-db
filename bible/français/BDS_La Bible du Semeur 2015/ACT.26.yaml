document_id: ACT.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul défend sa cause
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Agrippa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Agrippa
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25.13'
        metadata:
          usfm: ACT.25.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dit à Paul : Tu as la parole : tu peux présenter ta défense.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Paul étendit la main et présenta ainsi sa défense : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Roi Agrippa ! Je m’estime heureux de pouvoir aujourd’hui me défendre devant toi de toutes les accusations que les Juifs ont portées contre moi, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car tu connais parfaitement toutes leurs coutumes et leurs discussions. Veuille donc, je te prie, m’écouter avec patience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tous mes compatriotes savent comment j’ai vécu, dès ma jeunesse, au sein de mon peuple, à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils me connaissent depuis longtemps et ils peuvent témoigner, s’ils le veulent bien, que j’ai conduit ma vie selon les principes du parti le plus strict de notre religion : celui des pharisiens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et maintenant, si je suis traduit en justice, c’est à cause de mon espérance dans la promesse de Dieu à nos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nos douze tribus espèrent voir son accomplissement, en rendant leur culte à Dieu nuit et jour. Oui, c’est à cause de cette espérance que je suis mis en accusation, par des Juifs, ô roi ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et pourtant ! trouvez-vous incroyable que Dieu puisse ressusciter des morts ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pour moi donc, j’ai d’abord pensé que je devais m’opposer par tous les moyens au nom de Jésus de Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est ce que j’ai fait à Jérusalem : j’ai jeté en prison, en vertu des pouvoirs que j’avais reçus des chefs des prêtres, un grand nombre des membres du peuple saint et, lorsqu’il s’agissait de les condamner, j’ai voté leur mise à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je passais d’une synagogue à l’autre pour les faire punir et essayer de les contraindre à renier leur foi ; dans l’excès de ma fureur, j’allais les traquer jusque dans les villes étrangères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est ainsi qu’un jour, muni des pleins pouvoirs que m’avaient accordés les chefs des prêtres en me donnant cette mission, je me suis rendu à Damas. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’étais en chemin et il était environ midi. C’est alors, ô roi, que j’ai vu, venant du ciel, une lumière plus éclatante que celle du soleil. Elle m’enveloppait de son éclat ainsi que mes compagnons de voyage. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous sommes tous tombés à terre, et j’entendis une voix qui me disait en hébreu : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Saul, Saul, pourquoi me persécutes-tu ? Tu te blesses toi-même en te rebiffant contre l’aiguillon. »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je demandai : « Qui es-tu, Seigneur ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et le Seigneur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Je suis, moi, Jésus, que tu persécutes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais lève-toi, tiens-toi debout. Car je te suis apparu pour que tu sois mon serviteur, pour témoigner aux hommes que tu m’as vu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des choses que tu as vues.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et leur dire ce que je te ferai encore voir par la suite.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je t’ai choisi du milieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Je te délivrerai.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: du peuple juif et des non-Juifs, vers lesquels je t’envoie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu devras leur ouvrir les yeux et les faire passer des ténèbres à la lumière et du pouvoir de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: ' à Dieu pour qu’en croyant en moi, ils reçoivent le pardon de leurs péchés et une part d’héritage avec les membres du peuple saint. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi, ô roi Agrippa, je n’ai pas désobéi à cette vision venue du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais je me suis adressé d’abord aux habitants de Damas et à ceux de Jérusalem, puis à ceux de toute la Judée, et enfin aux non-Juifs, et je leur ai annoncé qu’ils devaient changer, se convertir à Dieu et traduire ce changement par des actes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et c’est pour cette raison que les Juifs se sont emparés de moi dans la cour du Temple et qu’ils ont essayé de me tuer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais j’ai été protégé par Dieu jusqu’à ce jour et je suis donc encore là pour apporter mon témoignage aux gens d’humble condition comme aux personnages importants. Et ce que je déclare, ce n’est rien d’autre que les événements dont les prophètes et Moïse ont annoncé l’accomplissement : '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: c’est-à-dire que le Messie souffrirait, et qu’il serait le premier à ressusciter pour annoncer la lumière du salut, non seulement au peuple juif, mais aussi aux non-Juifs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’avis du roi Agrippa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Paul en était là dans sa défense, quand Festus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Festus
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24.27'
        metadata:
          usfm: ACT.24.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' s’écria : Tu es fou, Paul ! Ton grand savoir te fait perdre la tête !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '– Non, Excellence, répondit Paul, je ne suis pas fou. Tout ce que je dis est vrai et sensé. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'D’ailleurs, le roi Agrippa est au courant de ces faits – et c’est pour cela que je peux lui en parler avec assurance. Aucun de ces événements ne lui échappe, j’en suis sûr, car ce n’est pas en secret qu’ils se sont produits. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Crois-tu aux prophètes, roi Agrippa ? Oui, je le sais, tu y crois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Agrippa dit à Paul : Encore un peu et tu vas me persuader au point de faire de moi un chrétien'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu vas me persuader que tu vas faire de moi un chrétien, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu vas me persuader de faire le chrétien. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu vas bientôt me persuader de devenir chrétien.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: – Qu’il s’en faille de peu ou de beaucoup, reprit Paul, je prie Dieu que non seulement toi, mais encore tous ceux qui m’écoutent en cet instant, vous deveniez comme je suis moi-même, à l’exception de ces chaînes !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Là-dessus, le roi se leva, et le gouverneur, Bérénice, ainsi que tous ceux qui avaient siégé avec eux l’imitèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'En se retirant, ils se disaient les uns aux autres : Cet homme n’a rien fait qui mérite la mort ou la prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et Agrippa dit à Festus : Il aurait pu être relâché s’il n’avait pas fait appel à l’empereur.'
