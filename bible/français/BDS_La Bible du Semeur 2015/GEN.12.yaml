document_id: GEN.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel d’Abram
  - type: text
    content: 'L’Eternel dit à Abram : Va, quitte ton pays, ta famille et la maison de ton père pour te rendre dans le pays que je t’indiquerai'
  - type: note
    content: Voir Ac 7.2-3 ; Hé 11.8.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Une famine survint dans le pays. Alors Abram se rendit en Egypte
  - type: note
    content: Moins touchée par les années sèches, grâce à l’irrigation par des canaux (voir 26.1-2 ; 41.57).
  - type: text
    content: ' pour y séjourner quelque temps, car la famine sévissait dans le pays. '
  '11':
  - type: text
    content: 'Lorsqu’il approchait de l’Egypte, il dit à Saraï sa femme : Ecoute, je sais que tu es très belle. '
  '12':
  - type: text
    content: 'Quand les Egyptiens te verront, ils se diront : « C’est sa femme. » Ils me tueront et te laisseront en vie. '
  '13':
  - type: text
    content: Dis-leur donc que tu es ma sœur, pour qu’on me traite bien à cause de toi. Ainsi, grâce à toi, ma vie sera épargnée.
  '14':
  - type: text
    content: 'En effet, quand Abram arriva en Egypte, les Egyptiens remarquèrent la grande beauté de sa femme. '
  '15':
  - type: text
    content: 'Des gens de la cour du pharaon la remarquèrent et la vantèrent à leur maître, de sorte qu’elle fut enlevée et emmenée au palais royal. '
  '16':
  - type: text
    content: 'A cause d’elle, le pharaon traita Abram avec bonté. Il lui offrit des moutons, des chèvres, des bovins, des ânes, des serviteurs, des servantes, des ânesses et des chameaux. '
  '17':
  - type: text
    content: 'Mais l’Eternel infligea de grands maux au pharaon et aux gens de sa maison, à cause de Saraï, la femme d’Abram. '
  '18':
  - type: text
    content: 'Alors le pharaon convoqua Abram et lui dit : Qu’est-ce que tu m’as fait là ? Pourquoi ne m’as-tu pas dit qu’elle était ta femme ? '
  '19':
  - type: text
    content: Pourquoi l’as-tu présentée comme ta sœur ? A cause de cela, j’en ai fait ma femme. Maintenant, voilà ta femme ; reprends-la et va-t’en !
  '2':
  - type: text
    content: 'Je ferai de toi l’ancêtre d’un grand peuple ; je te bénirai, je ferai de toi un personnage renommé et tu deviendras une source de bénédiction pour d’autres. '
  '20':
  - type: text
    content: Et le pharaon chargea ses gens de le reconduire avec sa femme et avec tout ce qu’il possédait.
  '3':
  - type: text
    content: Je bénirai ceux qui te béniront et je maudirai ceux qui t’outrageront
  - type: note
    content: Cité en Ac 3.25 ; Ga 3.8.
  - type: text
    content: . Toutes les familles de la terre seront bénies à travers toi
  - type: note
    content: 'Autre traduction : se béniront en citant ton exemple.'
  - type: text
    content: .
  '4':
  - type: text
    content: Abram partit comme l’Eternel le lui avait demandé, et Loth s’en alla avec lui. Abram avait soixante-quinze ans quand il quitta Harân
  - type: note
    content: Voir Hé 11.8.
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Il emmena Saraï, sa femme, son neveu Loth, tous les biens et les serviteurs qu’ils avaient acquis à Harân, et ils se mirent en route pour aller au pays de Canaan. Quand ils furent arrivés, '
  '6':
  - type: text
    content: Abram traversa le pays jusqu’à un lieu appelé Sichem, jusqu’au chêne de Moré. A cette époque-là, les Cananéens habitaient le pays.
  '7':
  - type: text
    content: 'L’Eternel apparut à Abram et lui dit : Je donnerai ce pays à ta descendance'
  - type: note
    content: Voir Ac 7.5 ; Ga 3.16.
  - type: text
    content: .
  - type: text
    content: 'Abram érigea là un autel à l’Eternel qui lui était apparu. '
  '8':
  - type: text
    content: Puis il leva le camp pour se rendre dans la région montagneuse à l’est de Béthel
  - type: note
    content: A environ 15 kilomètres au nord de Jérusalem. D’après 28.19, à l’époque, ce lieu s’appelait encore Louz.
  - type: text
    content: '  ; il établit son campement entre Béthel, à l’ouest, et Aï, à l’est. Il y érigea un autre autel à l’Eternel et lui adressa des prières. '
  '9':
  - type: text
    content: Ensuite Abram repartit vers le sud ; d’étape en étape, il gagna le Néguev
  - type: note
    content: Nom qui signifie « terre desséchée » et qui désigne le plateau stérile s’étendant au sud de Jérusalem et menant au désert.
  - type: text
    content: .
  - type: heading
    content: Abram en Egypte
