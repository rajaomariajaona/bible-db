document_id: GEN.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’appel d’Abram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Abram : Va, quitte ton pays, ta famille et la maison de ton père pour te rendre dans le pays que je t’indiquerai'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 7.2-3 ; Hé 11.8.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je ferai de toi l’ancêtre d’un grand peuple ; je te bénirai, je ferai de toi un personnage renommé et tu deviendras une source de bénédiction pour d’autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je bénirai ceux qui te béniront et je maudirai ceux qui t’outrageront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Ac 3.25 ; Ga 3.8.
    marker-yv: yv-n
  - type: text
    text: . Toutes les familles de la terre seront bénies à travers toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se béniront en citant ton exemple.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Abram partit comme l’Eternel le lui avait demandé, et Loth s’en alla avec lui. Abram avait soixante-quinze ans quand il quitta Harân
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11.8
        metadata:
          usfm: HEB.11.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il emmena Saraï, sa femme, son neveu Loth, tous les biens et les serviteurs qu’ils avaient acquis à Harân, et ils se mirent en route pour aller au pays de Canaan. Quand ils furent arrivés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Abram traversa le pays jusqu’à un lieu appelé Sichem, jusqu’au chêne de Moré. A cette époque-là, les Cananéens habitaient le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Eternel apparut à Abram et lui dit : Je donnerai ce pays à ta descendance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ac 7.5 ; Ga 3.16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Abram érigea là un autel à l’Eternel qui lui était apparu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Puis il leva le camp pour se rendre dans la région montagneuse à l’est de Béthel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A environ 15 kilomètres au nord de Jérusalem. D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28.19'
        metadata:
          usfm: GEN.28.19
      - type: text
        text: ', à l’époque, ce lieu s’appelait encore Louz.'
    marker-yv: yv-n
  - type: text
    text: '  ; il établit son campement entre Béthel, à l’ouest, et Aï, à l’est. Il y érigea un autre autel à l’Eternel et lui adressa des prières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ensuite Abram repartit vers le sud ; d’étape en étape, il gagna le Néguev
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nom qui signifie « terre desséchée » et qui désigne le plateau stérile s’étendant au sud de Jérusalem et menant au désert.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Une famine survint dans le pays. Alors Abram se rendit en Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moins touchée par les années sèches, grâce à l’irrigation par des canaux (voir 26.1-2 ; 41.57).
    marker-yv: yv-n
  - type: text
    text: ' pour y séjourner quelque temps, car la famine sévissait dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsqu’il approchait de l’Egypte, il dit à Saraï sa femme : Ecoute, je sais que tu es très belle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand les Egyptiens te verront, ils se diront : « C’est sa femme. » Ils me tueront et te laisseront en vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dis-leur donc que tu es ma sœur, pour qu’on me traite bien à cause de toi. Ainsi, grâce à toi, ma vie sera épargnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, quand Abram arriva en Egypte, les Egyptiens remarquèrent la grande beauté de sa femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des gens de la cour du pharaon la remarquèrent et la vantèrent à leur maître, de sorte qu’elle fut enlevée et emmenée au palais royal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A cause d’elle, le pharaon traita Abram avec bonté. Il lui offrit des moutons, des chèvres, des bovins, des ânes, des serviteurs, des servantes, des ânesses et des chameaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais l’Eternel infligea de grands maux au pharaon et aux gens de sa maison, à cause de Saraï, la femme d’Abram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le pharaon convoqua Abram et lui dit : Qu’est-ce que tu m’as fait là ? Pourquoi ne m’as-tu pas dit qu’elle était ta femme ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pourquoi l’as-tu présentée comme ta sœur ? A cause de cela, j’en ai fait ma femme. Maintenant, voilà ta femme ; reprends-la et va-t’en !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et le pharaon chargea ses gens de le reconduire avec sa femme et avec tout ce qu’il possédait.
