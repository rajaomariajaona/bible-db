document_id: ISA.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cantique du nouvel exode
  - type: text
    content: 'Et tu diras en ce jour-là :'
  - type: text
    content: Je te loue, Eternel,
  - type: text
    content: car même si tu as été ╵irrité contre moi,
  - type: text
    content: ta colère s’apaise,
  - type: text
    content: tu me consoles.
  '2':
  - type: text
    content: Oui, Dieu est mon Sauveur,
  - type: text
    content: je me confie en lui ╵et je n’ai plus de crainte,
  - type: text
    content: car l’Eternel, ╵l’Eternel est ma force, ╵il est le sujet de mes chants,
  - type: text
    content: il m’a sauvé
  - type: note
    content: Citation d’Ex 15.2.
  - type: text
    content: .
  '3':
  - type: text
    content: C’est pourquoi, avec joie, ╵vous puiserez de l’eau
  - type: text
    content: aux sources du salut,
  '4':
  - type: text
    content: 'et vous direz en ce jour-là :'
  - type: text
    content: Célébrez l’Eternel, ╵invoquez-le,
  - type: text
    content: annoncez aux nations ses œuvres
  - type: text
    content: et proclamez ╵qu’il est sublime.
  '5':
  - type: text
    content: Chantez pour l’Eternel,
  - type: text
    content: car il a accompli ╵des œuvres magnifiques ;
  - type: text
    content: que, dans le monde entier, ╵on les connaisse !
  '6':
  - type: text
    content: Poussez des cris de joie, ╵exultez d’allégresse, ╵habitants de Sion !
  - type: text
    content: Car, au milieu de vous, ╵il est très grand, ╵lui, le Saint d’Israël.
