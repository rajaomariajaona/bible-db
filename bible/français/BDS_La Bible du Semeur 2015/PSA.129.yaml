document_id: PSA.129,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Affligé mais non abattu
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Depuis ma jeunesse
  - type: note
    content: C’est le peuple d’Israël personnifié qui parle. La jeunesse du peuple (cf. Os 11.1 ; Ez 23.3) fait allusion au séjour en Egypte où Israël fut opprimé.
  - type: text
    content: ', ╵on m’a souvent combattu.'
  - type: text
    content: 'Qu’Israël le dise :'
  '2':
  - type: text
    content: « Depuis ma jeunesse ╵on m’a souvent combattu,
  - type: text
    content: mais on n’a pas pu ╵l’emporter sur moi. »
  '3':
  - type: text
    content: On a labouré mon dos,
  - type: text
    content: on y a tracé ╵de très longs sillons.
  '4':
  - type: text
    content: L’Eternel est juste
  - type: text
    content: et il a brisé les liens ╵imposés par les méchants.
  '5':
  - type: text
    content: Qu’ils soient dans la honte ╵et qu’ils battent en retraite,
  - type: text
    content: tous ceux qui ont de la haine ╵pour Sion.
  '6':
  - type: text
    content: Qu’ils soient comme l’herbe ╵poussant sur les toits
  - type: text
    content: et qui se dessèche ╵avant qu’on l’arrache
  - type: note
    content: En Israël, les toits plats étaient rendus imperméables par une couche de terre mêlée de cendres ou de sable, tassée au rouleau. La pluie y faisait pousser des plantes que le soleil desséchait vite car elles n’avaient pas de racines profondes (Es 37.27).
  - type: text
    content: ','
  '7':
  - type: text
    content: dont le moissonneur ╵n’emplit pas sa main,
  - type: text
    content: dont celui qui lie les gerbes ╵n’emplit pas son sac.
  '8':
  - type: text
    content: 'Et que les passants ╵ne leur disent pas :'
  - type: text
    content: « Que l’Eternel vous bénisse !
  - type: text
    content: Nous vous bénissons ╵de la part de l’Eternel. »
