document_id: PSA.129,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Affligé mais non abattu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '129.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis ma jeunesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '129.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est le peuple d’Israël personnifié qui parle. La jeunesse du peuple (cf. Os 11.1 ; Ez 23.3) fait allusion au séjour en Egypte où Israël fut opprimé.
      marker-yv: yv-n
    - type: text
      text: ', ╵on m’a souvent combattu.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’Israël le dise :'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Depuis ma jeunesse ╵on m’a souvent combattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais on n’a pas pu ╵l’emporter sur moi. »
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a labouré mon dos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on y a tracé ╵de très longs sillons.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a brisé les liens ╵imposés par les méchants.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient dans la honte ╵et qu’ils battent en retraite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui ont de la haine ╵pour Sion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient comme l’herbe ╵poussant sur les toits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui se dessèche ╵avant qu’on l’arrache
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '129.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En Israël, les toits plats étaient rendus imperméables par une couche de terre mêlée de cendres ou de sable, tassée au rouleau. La pluie y faisait pousser des plantes que le soleil desséchait vite car elles n’avaient pas de racines profondes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 37.27
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont le moissonneur ╵n’emplit pas sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont celui qui lie les gerbes ╵n’emplit pas son sac.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et que les passants ╵ne leur disent pas :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Que l’Eternel vous bénisse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous vous bénissons ╵de la part de l’Eternel. »
