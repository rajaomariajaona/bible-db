document_id: PSA.137,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Au bord des fleuves de BabyloneLes fleuves de Babylone sont l’Euphrate et ses canaux, parmi lesquels le Kebar (Ez 1.1 ; 3.15), et peut-être l’Oulaï (Dn 8.2). Il faut leur ajouter, si l’on pense à la Babylonie entière, le Tigre, ses affluents et ses canaux.
  - type: text
    content: Au bord des fleuves ╵de Babylone,
  - type: text
    content: nous nous étions assis ╵et nous pleurions
  - type: text
    content: en pensant à Sion.
  '2':
  - type: text
    content: Aux saules de cette contrée,
  - type: text
    content: nous avions suspendu nos lyres.
  '3':
  - type: text
    content: Ceux qui nous avaient déportés ╵nous demandaient des chants,
  - type: text
    content: 'nos oppresseurs ╵réclamaient d’être réjouis :'
  - type: text
    content: « Chantez-nous, disaient-ils,
  - type: text
    content: quelque chant de Sion ! »
  '4':
  - type: text
    content: Comment peut-on chanter ╵les chants de l’Eternel
  - type: text
    content: sur un sol étranger ?
  '5':
  - type: text
    content: Si jamais je t’oublie, ╵Jérusalem,
  - type: text
    content: que ma main droite ╵perde sa force !
  '6':
  - type: text
    content: Et que ma langue ╵se colle à mon palais
  - type: text
    content: si je ne pense plus ╵à toi, Jérusalem,
  - type: text
    content: si je ne te mets plus
  - type: text
    content: avant toute autre joie.
  '7':
  - type: text
    content: Souviens-toi, Eternel, ╵des Edomites
  - type: note
    content: Lors de la destruction de Jérusalem par Nabuchodonosor, les Edomites avaient manifesté de manière indécente leur joie de voir tomber leur rivale (Ez 35.12-14). Cette attitude était d’autant plus odieuse qu’ils étaient de proches parents des Israélites (descendants d’Esaü, frère de Jacob).
  - type: text
    content: qui en ce jour ╵du malheur de Jérusalem,
  - type: text
    content: 'criaient bien fort : ╵« Rasez-la donc,'
  - type: text
    content: rasez jusqu’à ses fondations ! »
  '8':
  - type: text
    content: O Dame Babylone, ╵tu seras dévastée !
  - type: text
    content: Heureux qui te rendra
  - type: text
    content: tout le mal que tu nous as fait !
  '9':
  - type: text
    content: Heureux qui saisira ╵tes nourrissons
  - type: text
    content: pour les briser contre le roc
  - type: note
    content: Cruauté coutumière après la prise d’une ville (Es 13.16 ; Os 14.1 ; Na 3.10) pour détruire tout espoir de relèvement.
  - type: text
    content: '  !'
