document_id: PSA.137
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Au bord des fleuves de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les fleuves de Babylone sont l’Euphrate et ses canaux, parmi lesquels le Kebar (Ez 1.1 ; 3.15), et peut-être l’Oulaï (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 8.2
        metadata:
          usfm: DAN.8.2
      - type: text
        text: ). Il faut leur ajouter, si l’on pense à la Babylonie entière, le Tigre, ses affluents et ses canaux.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au bord des fleuves ╵de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous nous étions assis ╵et nous pleurions
- type: usfm
  marker: q1
  children:
  - type: text
    text: en pensant à Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aux saules de cette contrée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avions suspendu nos lyres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ceux qui nous avaient déportés ╵nous demandaient des chants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nos oppresseurs ╵réclamaient d’être réjouis :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Chantez-nous, disaient-ils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quelque chant de Sion ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Comment peut-on chanter ╵les chants de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un sol étranger ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si jamais je t’oublie, ╵Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ma main droite ╵perde sa force !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et que ma langue ╵se colle à mon palais
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je ne pense plus ╵à toi, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je ne te mets plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant toute autre joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Souviens-toi, Eternel, ╵des Edomites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lors de la destruction de Jérusalem par Nabuchodonosor, les Edomites avaient manifesté de manière indécente leur joie de voir tomber leur rivale (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 35.12-14
        metadata:
          usfm: EZK.35.12+EZK.35.13+EZK.35.14
      - type: text
        text: ). Cette attitude était d’autant plus odieuse qu’ils étaient de proches parents des Israélites (descendants d’Esaü, frère de Jacob).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui en ce jour ╵du malheur de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'criaient bien fort : ╵« Rasez-la donc,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rasez jusqu’à ses fondations ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O Dame Babylone, ╵tu seras dévastée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux qui te rendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout le mal que tu nous as fait !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Heureux qui saisira ╵tes nourrissons
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les briser contre le roc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cruauté coutumière après la prise d’une ville (Es 13.16 ; Os 14.1 ; Na 3.10) pour détruire tout espoir de relèvement.
    marker-yv: yv-n
  - type: text
    text: '  !'
