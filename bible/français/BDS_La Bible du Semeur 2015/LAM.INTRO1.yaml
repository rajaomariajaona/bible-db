type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre contient cinq lamentations funèbres sur Jérusalem, détruite par les armées babyloniennes, en 587​586 avant Jésus-Christ, après un siège long et rigoureux. L’auteur semble être un témoin oculaire de ces événements, avec leur cortège de misères : roi, prêtres, prophètes et gens du peuple outragés, massacrés (2.6, 9-12, 20), famine (1.11), cas de cannibalisme (2.20 ; 4.10), exil (1.3, 18). Il exprime sa douleur (3.1-6) et son sentiment d’abandon de l’Eternel (3.7-9 ; 4.20). Mais il réfléchit aussi aux causes du malheur et reconnaît que, dans son jugement, Dieu a été juste (1.18), ce qui l’amène à se tourner vers l’Eternel pour exprimer sa foi : « Car les bontés de l’Eternel et ses tendresses ne sont pas épuisées » (3.22).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les cinq lamentations adoptent une forme définie. Leur rythme se retrouve dans d’autres complaintes funèbres de l’Ancien Testament. En outre, les quatre premières d’entre elles sont alphabétiques : elles suivent l’ordre de l’alphabet hébreu (voir 1.1 ; 2.1 ; 3.1 ; 4.1 et notes). En adoptant cette forme, l’auteur a peut-être cherché à exprimer sa souffrance de A à Z ou à maîtriser son émotion due à la douleur qu’il ressentait.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Traditionnellement, on attribue ce recueil à Jérémie, témoin de la chute de Jérusalem et de la destruction de son temple. Les Lamentations évoquent en effet les « confessions » qui jalonnent le livre du prophète, dans lesquelles celui-ci se plaint des difficultés de son ministère.
