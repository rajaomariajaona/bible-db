document_id: ISA.47
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lamentation sur Babylone
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Va, descends de ton trône
- type: usfm
  marker: q1
  children:
  - type: text
    text: et assieds-toi dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, Dame Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: assieds-toi sur le sol ╵car tu es détrônée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dame des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car on ne t’appellera plus ╵la délicate, la voluptueuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saisis la double meule
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mouds de la farine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Travail des esclaves (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 11.5
        metadata:
          usfm: EXO.11.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: dénoue tes tresses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: relève les pans de ta robe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et découvre tes jambes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour traverser les fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ainsi ta nudité ╵sera vue au grand jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton opprobre apparaîtra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais exercer ma rétribution
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n’épargnerai personne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Je ne rencontrerai l’opposition de personne.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Notre libérateur s’appelle ╵le Seigneur des armées célestes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Assieds-toi en silence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entre dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dame des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car on ne t’appellera plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: la reine des royaumes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’ai été irrité ╵contre mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai profané mon patrimoine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te les ai livrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les as traités sans pitié.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as fait peser lourdement ╵ton joug sur les vieillards,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et tu t’es dit : ╵« Je serai reine pour toujours. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’as pas réfléchi à tout cela
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n’as pas songé à la manière ╵dont cela finirait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maintenant donc, écoute, ╵toi la voluptueuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui trônes, confiante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui dis en ton cœur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Moi, moi et rien que moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne serai pas veuve
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne serai pas ╵privée de mes enfants ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eh bien, ces deux maux-là, ╵fondront soudain sur toi, en un seul jour :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la privation de tes enfants ╵et le veuvage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le même jour, ╵ils t’atteindront ╵dans toute leur horreur
- type: usfm
  marker: q1
  children:
  - type: text
    text: malgré la multitude ╵de tes enchantements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: malgré le pouvoir de tes sortilèges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu plaçais ta confiance ╵dans ta méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu te disais : ╵« Personne ne me voit. »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta sagesse et ta science ╵t’ont égarée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu disais en ton cœur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Moi, moi et rien que moi ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais le malheur ╵fondra sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne sauras pas ╵comment le conjurer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, une catastrophe ╵t’arrivera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne pourras pas ╵la détourner de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une dévastation ╵dont tu n’as pas idée
- type: usfm
  marker: q1
  children:
  - type: text
    text: viendra subitement sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Continue donc ╵avec tes sortilèges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la multitude ╵de tes enchantements
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour lesquels, depuis ta jeunesse, ╵tu t’es tant fatiguée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-être pourras-tu ╵en tirer un profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut-être sauras-tu ╵te rendre redoutable !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu t’es tant fatiguée ╵à consulter tous tes devins…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se présentent donc, ╵et qu’ils te sauvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui compartimentent ╵des zones dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui lisent dans les astres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui, aux nouvelles lunes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: te font savoir d’avance ╵ce qui va t’arriver !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les voilà devenus ╵tous comme de la paille ╵que consume le feu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non, ils ne pourront pas ╵sauver leur vie des flammes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce ne sera pas une braise ╵que l’on allume pour se réchauffer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le texte de Qumrân et certaines versions anciennes. Le texte traditionnel semble dire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour (cuire) son pain.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni un feu devant lequel on s’assoit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà ce que feront pour toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux pour qui tu t’es fatiguée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux avec qui tu trafiques ╵depuis le temps de ta jeunesse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les nations avec lesquelles Babylone entretenait depuis son origine des relations commerciales.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils erreront chacun de son côté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura personne ╵pour te sauver !
