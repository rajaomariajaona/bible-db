document_id: ISA.47,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Lamentation sur Babylone
  - type: text
    content: Va, descends de ton trône
  - type: text
    content: et assieds-toi dans la poussière,
  - type: text
    content: toi, Dame Babylone,
  - type: text
    content: assieds-toi sur le sol ╵car tu es détrônée,
  - type: text
    content: Dame des Chaldéens,
  - type: text
    content: car on ne t’appellera plus ╵la délicate, la voluptueuse.
  '10':
  - type: text
    content: Tu plaçais ta confiance ╵dans ta méchanceté,
  - type: text
    content: 'tu te disais : ╵« Personne ne me voit. »'
  - type: text
    content: Ta sagesse et ta science ╵t’ont égarée.
  - type: text
    content: 'Tu disais en ton cœur :'
  - type: text
    content: « Moi, moi et rien que moi ! »
  '11':
  - type: text
    content: Mais le malheur ╵fondra sur toi
  - type: text
    content: et tu ne sauras pas ╵comment le conjurer.
  - type: text
    content: Oui, une catastrophe ╵t’arrivera
  - type: text
    content: et tu ne pourras pas ╵la détourner de toi,
  - type: text
    content: une dévastation ╵dont tu n’as pas idée
  - type: text
    content: viendra subitement sur toi.
  '12':
  - type: text
    content: Continue donc ╵avec tes sortilèges,
  - type: text
    content: avec la multitude ╵de tes enchantements
  - type: text
    content: pour lesquels, depuis ta jeunesse, ╵tu t’es tant fatiguée !
  - type: text
    content: Peut-être pourras-tu ╵en tirer un profit,
  - type: text
    content: peut-être sauras-tu ╵te rendre redoutable !
  '13':
  - type: text
    content: Tu t’es tant fatiguée ╵à consulter tous tes devins…
  - type: text
    content: Qu’ils se présentent donc, ╵et qu’ils te sauvent,
  - type: text
    content: ceux qui compartimentent ╵des zones dans le ciel,
  - type: text
    content: qui lisent dans les astres,
  - type: text
    content: qui, aux nouvelles lunes,
  - type: text
    content: te font savoir d’avance ╵ce qui va t’arriver !
  '14':
  - type: text
    content: Les voilà devenus ╵tous comme de la paille ╵que consume le feu.
  - type: text
    content: Non, ils ne pourront pas ╵sauver leur vie des flammes,
  - type: text
    content: ce ne sera pas une braise ╵que l’on allume pour se réchauffer
  - type: note
    content: 'D’après le texte de Qumrân et certaines versions anciennes. Le texte traditionnel semble dire : pour (cuire) son pain.'
  - type: text
    content: ','
  - type: text
    content: ni un feu devant lequel on s’assoit.
  '15':
  - type: text
    content: Voilà ce que feront pour toi
  - type: text
    content: ceux pour qui tu t’es fatiguée,
  - type: text
    content: et ceux avec qui tu trafiques ╵depuis le temps de ta jeunesse
  - type: note
    content: Les nations avec lesquelles Babylone entretenait depuis son origine des relations commerciales.
  - type: text
    content: .
  - type: text
    content: Ils erreront chacun de son côté,
  - type: text
    content: il n’y aura personne ╵pour te sauver !
  '2':
  - type: text
    content: Saisis la double meule
  - type: text
    content: et mouds de la farine
  - type: note
    content: Travail des esclaves (voir Ex 11.5).
  - type: text
    content: ','
  - type: text
    content: dénoue tes tresses,
  - type: text
    content: relève les pans de ta robe
  - type: text
    content: et découvre tes jambes
  - type: text
    content: pour traverser les fleuves.
  '3':
  - type: text
    content: Ainsi ta nudité ╵sera vue au grand jour
  - type: text
    content: et ton opprobre apparaîtra.
  - type: text
    content: Je vais exercer ma rétribution
  - type: text
    content: et je n’épargnerai personne
  - type: note
    content: 'Autre traduction : Je ne rencontrerai l’opposition de personne.'
  - type: text
    content: .
  '4':
  - type: text
    content: Notre libérateur s’appelle ╵le Seigneur des armées célestes ;
  - type: text
    content: c’est le Saint d’Israël.
  '5':
  - type: text
    content: Assieds-toi en silence,
  - type: text
    content: entre dans les ténèbres,
  - type: text
    content: Dame des Chaldéens,
  - type: text
    content: car on ne t’appellera plus
  - type: text
    content: la reine des royaumes.
  '6':
  - type: text
    content: J’ai été irrité ╵contre mon peuple,
  - type: text
    content: j’ai profané mon patrimoine,
  - type: text
    content: je te les ai livrés.
  - type: text
    content: Tu les as traités sans pitié.
  - type: text
    content: Tu as fait peser lourdement ╵ton joug sur les vieillards,
  '7':
  - type: text
    content: 'et tu t’es dit : ╵« Je serai reine pour toujours. »'
  - type: text
    content: Tu n’as pas réfléchi à tout cela
  - type: text
    content: et tu n’as pas songé à la manière ╵dont cela finirait.
  '8':
  - type: text
    content: Maintenant donc, écoute, ╵toi la voluptueuse,
  - type: text
    content: toi qui trônes, confiante,
  - type: text
    content: 'et qui dis en ton cœur :'
  - type: text
    content: « Moi, moi et rien que moi !
  - type: text
    content: Je ne serai pas veuve
  - type: text
    content: et je ne serai pas ╵privée de mes enfants ! »
  '9':
  - type: text
    content: 'Eh bien, ces deux maux-là, ╵fondront soudain sur toi, en un seul jour :'
  - type: text
    content: la privation de tes enfants ╵et le veuvage.
  - type: text
    content: Le même jour, ╵ils t’atteindront ╵dans toute leur horreur
  - type: text
    content: malgré la multitude ╵de tes enchantements,
  - type: text
    content: malgré le pouvoir de tes sortilèges !
