document_id: GEN.36
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’histoire de la famille d’Ésaü
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils d’Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici la généalogie d’Esaü appelé aussi Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Esaü prit des femmes cananéennes pour épouses : Ada, fille d’Elôn le Hittite ; Oholibama, fille d’Ana, fille de Tsibeôn le Hévien, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ainsi que Basmath, fille d’Ismaël et sœur de Nebayoth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ada lui donna Eliphaz ; et Basmath, Reouel ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Oholibama accoucha de Yeoush, Yaelam et Qorah. Tels sont les fils d’Esaü qui lui naquirent au pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esaü emmena ses femmes, ses fils et ses filles et tous les gens attachés à sa maison ainsi que ses troupeaux, son bétail et tous les biens qu’il avait acquis au pays de Canaan, et il émigra dans un autre pays, loin de Jacob, son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car leurs troupeaux étaient trop nombreux pour qu’ils puissent demeurer ensemble, et le pays où ils séjournaient ne pouvait plus subvenir à leurs besoins à cause de l’importance de leurs troupeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ainsi, Esaü s’établit dans la montagne de Séir. Esaü, c’est Edom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les Edomites : descendants d’Esaü'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici la généalogie d’Esaü, l’ancêtre d’Edom, dans la montagne de Séir. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noms des fils d’Esaü : Eliphaz, fils d’Ada, épouse d’Esaü ; Reouel, fils de Basmath, épouse d’Esaü. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eliphaz eut pour fils : Témân, Omar, Tsepho, Gaetam et Qenaz. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’épouse de second rang d’Eliphaz, Timna, lui donna Amalec. Ce sont là les fils d’Ada, femme d’Esaü. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et voici les fils de Reouel : Nahath, Zérah, Shamma et Mizza. Tels sont les fils de Basmath, femme d’Esaü. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oholibama, fille d’Ana, fille de Tsibeôn, femme d’Esaü, lui donna Yeoush, Yaelam et Qorah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chefs des familles des fils d’Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici les chefs des familles des fils d’Esaü. Fils d’Eliphaz, premier-né d’Esaü : les chefs Témân, Omar, Tsepho, Qenaz, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qorah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. Ne se trouve pas dans le Pentateuque samaritain ni en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 36.11
        metadata:
          usfm: GEN.36.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', Gaetam et Amalec. Tels sont les chefs de la famille d’Eliphaz, fils d’Ada, au pays d’Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les fils de Reouel, fils d’Esaü : les chefs Nahath, Zérah, Shamma et Mizza. Tels sont les chefs de la famille de Reouel, fils de Basmath, au pays d’Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici les fils d’Oholibama, femme d’Esaü : les chefs Yeoush, Yaelam et Qorah. Tels sont les chefs de la famille d’Oholibama fille d’Ana et femme d’Esaü. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce sont là les fils d’Esaü, les chefs de familles : c’est Edom.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les descendants du Horien Séir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voici les descendants de Séir, le Horien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Horite. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Horiens (v. 21) étaient les premiers habitants d’Edom, partiellement chassés par les descendants d’Esaü (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 2.12
        metadata:
          usfm: DEU.2.12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
        metadata:
          usfm: DEU.2.22
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', premiers habitants du pays : Lotân, Shobal, Tsibeôn, Ana, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dishôn, Etser et Dishân. Tels sont les chefs des familles des Horiens, fils de Séir, au pays d’Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les fils de Lotân sont Hori et Hémam. La sœur de Lotân s’appelait Timna. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et voici les fils de Shobal : Alvân, Manahath, Ebal, Shepho et Onam. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et voici les fils de Tsibeôn : Aya et Ana. C’est Ana qui trouva de l’eau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon la version syriaque. Le sens du mot hébreu est inconnu. La Vulgate a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des sources.
    marker-yv: yv-n
  - type: text
    text: ' dans le désert quand il faisait paître les ânes de son père Tsibeôn. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici les enfants d’Ana : son fils Dishôn et sa fille Oholibama. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voici les fils de Dishân : Hemdân, Eshbân, Yitrân et Kerân. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici les fils d’Etser : Bilhân, Zaavân et Aqân. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici les fils de Dishân : Outs et Arân. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici les chefs des familles des Horiens ; les chefs Lotân, Shobal, Tsibeôn, Ana, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dishôn, Etser et Dishân. Ce sont eux qui étaient les chefs des familles des Horiens au pays de Séir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rois d’Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Voici les rois qui ont régné dans le pays d’Edom avant qu’il y ait des rois en Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avant qu’un roi d’Israël règne sur lui.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Béla, fils de Béor, régna sur Edom, sa ville s’appelait Dinhaba. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Après sa mort, Yobab, fils de Zérah, de Botsra, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Yobab mourut et Housham, du pays des Témanites, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après la mort de Housham, Hadad, fils de Bedad, régna à sa place. Il battit les Madianites dans la campagne de Moab ; il venait de la ville d’Avith. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après la mort de Hadad, Samla de Masréqa régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Après la mort de Samla, Saül, de Rehoboth sur le fleuve, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Après la mort de Saül, Baal-Hanân, fils d’Akbor, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Après la mort de Baal-Hanân, fils d’Akbor, Hadar régna à sa place. Sa ville s’appelait Paou. Sa femme était Mehétabéel, fille de Matred et petite-fille de Mézahab.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chefs des familles issues d’Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Voici les noms des chefs des familles d’Esaü, selon leurs localités et d’après leurs noms : les chefs Timna, Alva, Yeteth, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Oholibama, Ela, Pinôn, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Qenaz, Témân, Mibtsar, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Magdiel et Iram. Tels sont les chefs d’Edom selon leurs régions au pays qu’ils occupent. Voilà pour Esaü, l’ancêtre d’Edom.
