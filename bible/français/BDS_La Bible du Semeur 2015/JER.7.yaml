document_id: JER.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La plaie incurable
  - type: heading
    content: Un culte perverti
  - type: text
    content: Voici ce que l’Eternel
  - type: note
    content: Voir 26.1-19.
  - type: text
    content: ' dit à Jérémie :'
  '10':
  - type: text
    content: 'et puis vous venez vous tenir devant moi, dans ce temple qui m’appartient, et vous dites : « Nous sommes en sécurité ! » Et c’est pour accomplir tous ces actes abominables ! '
  '11':
  - type: text
    content: Ce temple qui m’appartient est-il à vos yeux une caverne de brigands
  - type: note
    content: Repris en Mt 21.13 ; Mc 11.17 ; Lc 19.46.
  - type: text
    content: '  ? Moi, en tout cas, je vois qu’il en est ainsi – l’Eternel le déclare. '
  '12':
  - type: text
    content: Allez donc à Silo
  - type: note
    content: Voir Jos 18.1 ; 1 S 1.3 ; 3.21 ; 4.3 ; Ps 78.60.
  - type: text
    content: ', à l’endroit où j’avais mon sanctuaire, là où j’avais autrefois établi ma présence, et voyez ce que j’en ai fait à cause du mal qu’avait commis mon peuple Israël ! '
  '13':
  - type: text
    content: 'Maintenant, puisque vous agissez ainsi – l’Eternel le déclare – et puisque vous n’avez pas écouté quand, inlassablement, je vous ai avertis, puisque vous n’avez pas répondu, alors que je vous ai appelés, '
  '14':
  - type: text
    content: 'ce temple qui m’appartient, et sur lequel vous fondez votre assurance, ce lieu que j’ai donné à vous et à vos ancêtres, je vais le traiter de la même manière que j’ai traité Silo. '
  '15':
  - type: text
    content: Je vous rejetterai loin de moi comme j’ai rejeté tous ceux qui sont vos frères, le peuple d’Ephraïm
  - type: note
    content: Ephraïm était la tribu principale du royaume du Nord dont les habitants furent déportés par les Assyriens une centaine d’années avant Jérémie.
  - type: text
    content: .
  '16':
  - type: text
    content: 'Quant à toi, Jérémie, ne prie pas pour ce peuple, ne prononce en sa faveur ni supplication ni requête, n’intercède pas auprès de moi car je ne t’écouterai pas. '
  '17':
  - type: text
    content: 'Ne vois-tu pas tout ce qu’ils font dans les villes de Juda, et dans les rues de Jérusalem ? '
  '18':
  - type: text
    content: Les enfants ramassent du bois, les pères allument le feu, les femmes pétrissent la pâte pour faire des gâteaux pour la Reine du ciel
  - type: note
    content: 'la Reine du ciel: nom babylonien de la déesse Ishtar, importante déesse du panthéon babylonien (voir 44.17-19, 25).'
  - type: text
    content: '. On offre des libations à des dieux étrangers et tout cela m’irrite. '
  '19':
  - type: text
    content: 'Est-ce moi qu’ils offensent ? demande l’Eternel. Non, c’est plutôt eux-mêmes, à leur plus grande honte ! '
  '2':
  - type: text
    content: 'Tiens-toi à la porte du temple de l’Eternel, et proclame ce message : Ecoutez la parole de l’Eternel, vous tous, gens de Juda, vous qui entrez par ces portes, pour vous prosterner devant l’Eternel, '
  '20':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : Mon ardente colère et mon indignation vont fondre sur ce lieu, sur les gens et les bêtes, sur les arbres des champs et les produits du sol. Et elles brûlent comme un feu qui ne s’éteindra pas.'
  '21':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Ajoutez donc vos holocaustes aux autres sacrifices, et mangez-en la viande'
  - type: note
    content: La chair de la victime de l’holocauste ne devait pas être mangée, car l’animal devait être brûlé sur l’autel dans sa quasi-totalité (Lv 1). Ces impératifs sont ironiques, pour décrire ce qui se passe et souligner que l’Eternel n’agrée pas ces sacrifices parce qu’ils ne sont pas offerts avec les dispositions requises.
  - type: text
    content: '. '
  '22':
  - type: text
    content: Non ! je n’ai rien prescrit à vos ancêtres, je ne leur ai rien ordonné concernant les holocaustes et autres sacrifices quand je les ai fait sortir d’Egypte.
  '23':
  - type: text
    content: 'Mais voici ce que je leur ai commandé : « Ecoutez-moi et je serai votre Dieu, et vous serez mon peuple ; suivez toutes les voies que je vous prescrirai, afin que vous soyez heureux. » '
  '24':
  - type: text
    content: Mais eux, ils n’ont pas écouté, non, ils n’ont pas prêté l’oreille. Mais ils se sont conduits selon leurs propres raisonnements et selon les penchants de leur cœur obstiné et mauvais. Ils sont devenus pires au lieu de devenir meilleurs.
  '25':
  - type: text
    content: 'Depuis le jour où vos ancêtres sont sortis d’Egypte jusqu’à aujourd’hui, j’ai envoyé tous mes serviteurs les prophètes, jour après jour, inlassablement. '
  '26':
  - type: text
    content: 'Mais ils ne m’ont pas écouté, ils n’ont pas prêté l’oreille. Ils ont raidi leur nuque, et ils ont fait plus de mal que leurs ancêtres. '
  '27':
  - type: text
    content: 'Dis-leur toutes ces choses, mais ils ne t’écouteront pas ; appelle-les, mais ils ne te répondront pas. '
  '28':
  - type: text
    content: 'Alors tu leur diras : vous êtes un peuple qui n’obéit pas à l’Eternel son Dieu et qui ne veut pas accepter sa leçon. La vérité n’est plus, elle s’est retirée de leur bouche.'
  - type: heading
    content: La vallée du châtiment
  '29':
  - type: text
    content: Rase ta chevelure
  - type: note
    content: Geste exprimant la honte ou la consternation.
  - type: text
    content: ' ╵et jette-la !'
  - type: text
    content: Entonne une complainte ╵sur les monts dépouillés,
  - type: text
    content: car l’Eternel rejette, ╵avec mépris, cette génération
  - type: text
    content: qui a provoqué sa colère.
  '3':
  - type: text
    content: 'car voici ce que déclare le Seigneur des armées célestes, le Dieu d’Israël : Adoptez une bonne conduite et faites ce qui est bien ! Alors, je vous laisserai vivre en ce lieu'
  - type: note
    content: 'La version grecque d’Aquila et la Vulgate ont : j’habiterai avec vous en ce lieu.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: Car les gens de Juda ont fait ce que je considère comme mal, l’Eternel le déclare. Ils ont installé leurs abominations dans le Temple qui m’appartient et l’ont ainsi souillé
  - type: note
    content: Manassé avait fait installer un poteau sacré dans le Temple (2 R 21.7). Josias, contemporain de Jérémie pendant les premières années de son ministère, l’a fait enlever ainsi que d’autres objets de culte idolâtres (2 R 23.4-7). Yehoyaqim a dû restaurer ces pratiques païennes dans le Temple. Moins de 20 ans après la mort de Josias, Ezéchiel s’élève contre la présence de nombreuses idoles dans les parvis du Temple (Ez 8.3-6, 10-12).
  - type: text
    content: .
  '31':
  - type: text
    content: Ils ont érigé les hauts lieux de Topheth dans la vallée de Ben-Hinnom
  - type: note
    content: 'Topheth: lieu sacré, équipé d’une fournaise, où l’on sacrifiait les enfants (voir v. 32 ; 19.6, 11-14). Sur les sacrifices d’enfants, voir 3.24 et note. la vallée de Ben-Hinnom: au sud de Jérusalem.'
  - type: text
    content: ', afin de brûler leurs fils et leurs filles pour les offrir en sacrifices. C’est bien là quelque chose que je n’ai pas ordonné et qui ne m’est même pas venu à la pensée. '
  '32':
  - type: text
    content: 'C’est pourquoi, le temps vient – l’Eternel le déclare – où l’on ne dira plus : « le Topheth » ni « la vallée de Ben-Hinnom » mais on l’appellera : « la vallée du Massacre », et faute de place, on enterrera les morts au Topheth. '
  '33':
  - type: text
    content: 'Les cadavres des gens de ce peuple serviront de pâture aux oiseaux et aux bêtes sauvages, sans que personne les chasse. '
  '34':
  - type: text
    content: Je ferai cesser dans les villes de Juda et dans les rues de Jérusalem les cris de réjouissance et d’allégresse, la voix du marié et la voix de la mariée, car le pays sera en ruine.
  '4':
  - type: text
    content: 'Cessez de vous fier à ces paroles trompeuses : « Voici le temple de l’Eternel, voici le temple de l’Eternel, oui, c’est ici qu’est le temple de l’Eternel. » '
  '5':
  - type: text
    content: 'Si vraiment vous adoptez une conduite bonne et si vous faites ce qui est bien, si vous rendez de justes jugements dans les procès, '
  '6':
  - type: text
    content: 'si vous vous abstenez d’exploiter l’immigré, l’orphelin et la veuve, de tuer des innocents en ce lieu et d’adorer d’autres dieux pour votre propre malheur, '
  '7':
  - type: text
    content: alors je vous ferai habiter
  - type: note
    content: 'je vous ferai habiter: voir v. 3 et la note.'
  - type: text
    content: ' dans ce lieu, ce pays que j’ai donné à vos ancêtres depuis toujours et pour toujours.'
  '8':
  - type: text
    content: 'Mais vous, vous vous fiez à des paroles trompeuses qui ne vous serviront à rien. '
  '9':
  - type: text
    content: 'Quoi ! Vous allez commettre des vols, des meurtres, des adultères, vous faites des serments mensongers, vous offrez des parfums à Baal et adorez d’autres dieux qui vous étaient inconnus, '
