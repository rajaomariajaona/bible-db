document_id: JER.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La plaie incurable
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un culte perverti
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici ce que l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26.1-19
        metadata:
          usfm: JER.26.1+JER.26.2+JER.26.3+JER.26.4+JER.26.5+JER.26.6+JER.26.7+JER.26.8+JER.26.9+JER.26.10+JER.26.11+JER.26.12+JER.26.13+JER.26.14+JER.26.15+JER.26.16+JER.26.17+JER.26.18+JER.26.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dit à Jérémie :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tiens-toi à la porte du temple de l’Eternel, et proclame ce message : Ecoutez la parole de l’Eternel, vous tous, gens de Juda, vous qui entrez par ces portes, pour vous prosterner devant l’Eternel, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'car voici ce que déclare le Seigneur des armées célestes, le Dieu d’Israël : Adoptez une bonne conduite et faites ce qui est bien ! Alors, je vous laisserai vivre en ce lieu'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version grecque d’Aquila et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j’habiterai avec vous en ce lieu.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cessez de vous fier à ces paroles trompeuses : « Voici le temple de l’Eternel, voici le temple de l’Eternel, oui, c’est ici qu’est le temple de l’Eternel. » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si vraiment vous adoptez une conduite bonne et si vous faites ce qui est bien, si vous rendez de justes jugements dans les procès, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'si vous vous abstenez d’exploiter l’immigré, l’orphelin et la veuve, de tuer des innocents en ce lieu et d’adorer d’autres dieux pour votre propre malheur, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: alors je vous ferai habiter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous ferai habiter
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir v. 3 et la note.
    marker-yv: yv-n
  - type: text
    text: ' dans ce lieu, ce pays que j’ai donné à vos ancêtres depuis toujours et pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais vous, vous vous fiez à des paroles trompeuses qui ne vous serviront à rien. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quoi ! Vous allez commettre des vols, des meurtres, des adultères, vous faites des serments mensongers, vous offrez des parfums à Baal et adorez d’autres dieux qui vous étaient inconnus, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et puis vous venez vous tenir devant moi, dans ce temple qui m’appartient, et vous dites : « Nous sommes en sécurité ! » Et c’est pour accomplir tous ces actes abominables ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce temple qui m’appartient est-il à vos yeux une caverne de brigands
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Repris en Mt 21.13 ; Mc 11.17 ; Lc 19.46.
    marker-yv: yv-n
  - type: text
    text: '  ? Moi, en tout cas, je vois qu’il en est ainsi – l’Eternel le déclare. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Allez donc à Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jos 18.1 ; 1 S 1.3 ; 3.21 ; 4.3 ; Ps 78.60.
    marker-yv: yv-n
  - type: text
    text: ', à l’endroit où j’avais mon sanctuaire, là où j’avais autrefois établi ma présence, et voyez ce que j’en ai fait à cause du mal qu’avait commis mon peuple Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant, puisque vous agissez ainsi – l’Eternel le déclare – et puisque vous n’avez pas écouté quand, inlassablement, je vous ai avertis, puisque vous n’avez pas répondu, alors que je vous ai appelés, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ce temple qui m’appartient, et sur lequel vous fondez votre assurance, ce lieu que j’ai donné à vous et à vos ancêtres, je vais le traiter de la même manière que j’ai traité Silo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je vous rejetterai loin de moi comme j’ai rejeté tous ceux qui sont vos frères, le peuple d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephraïm était la tribu principale du royaume du Nord dont les habitants furent déportés par les Assyriens une centaine d’années avant Jérémie.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quant à toi, Jérémie, ne prie pas pour ce peuple, ne prononce en sa faveur ni supplication ni requête, n’intercède pas auprès de moi car je ne t’écouterai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne vois-tu pas tout ce qu’ils font dans les villes de Juda, et dans les rues de Jérusalem ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les enfants ramassent du bois, les pères allument le feu, les femmes pétrissent la pâte pour faire des gâteaux pour la Reine du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Reine du ciel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nom babylonien de la déesse Ishtar, importante déesse du panthéon babylonien (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44.17-19
        metadata:
          usfm: JER.44.17+JER.44.18+JER.44.19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
        metadata:
          usfm: JER.44.25
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. On offre des libations à des dieux étrangers et tout cela m’irrite. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Est-ce moi qu’ils offensent ? demande l’Eternel. Non, c’est plutôt eux-mêmes, à leur plus grande honte ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : Mon ardente colère et mon indignation vont fondre sur ce lieu, sur les gens et les bêtes, sur les arbres des champs et les produits du sol. Et elles brûlent comme un feu qui ne s’éteindra pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Ajoutez donc vos holocaustes aux autres sacrifices, et mangez-en la viande'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La chair de la victime de l’holocauste ne devait pas être mangée, car l’animal devait être brûlé sur l’autel dans sa quasi-totalité (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 1
        metadata:
          usfm: LEV.1
      - type: text
        text: ). Ces impératifs sont ironiques, pour décrire ce qui se passe et souligner que l’Eternel n’agrée pas ces sacrifices parce qu’ils ne sont pas offerts avec les dispositions requises.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Non ! je n’ai rien prescrit à vos ancêtres, je ne leur ai rien ordonné concernant les holocaustes et autres sacrifices quand je les ai fait sortir d’Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais voici ce que je leur ai commandé : « Ecoutez-moi et je serai votre Dieu, et vous serez mon peuple ; suivez toutes les voies que je vous prescrirai, afin que vous soyez heureux. » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais eux, ils n’ont pas écouté, non, ils n’ont pas prêté l’oreille. Mais ils se sont conduits selon leurs propres raisonnements et selon les penchants de leur cœur obstiné et mauvais. Ils sont devenus pires au lieu de devenir meilleurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Depuis le jour où vos ancêtres sont sortis d’Egypte jusqu’à aujourd’hui, j’ai envoyé tous mes serviteurs les prophètes, jour après jour, inlassablement. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais ils ne m’ont pas écouté, ils n’ont pas prêté l’oreille. Ils ont raidi leur nuque, et ils ont fait plus de mal que leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dis-leur toutes ces choses, mais ils ne t’écouteront pas ; appelle-les, mais ils ne te répondront pas. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors tu leur diras : vous êtes un peuple qui n’obéit pas à l’Eternel son Dieu et qui ne veut pas accepter sa leçon. La vérité n’est plus, elle s’est retirée de leur bouche.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vallée du châtiment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rase ta chevelure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Geste exprimant la honte ou la consternation.
    marker-yv: yv-n
  - type: text
    text: ' ╵et jette-la !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entonne une complainte ╵sur les monts dépouillés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel rejette, ╵avec mépris, cette génération
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a provoqué sa colère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Car les gens de Juda ont fait ce que je considère comme mal, l’Eternel le déclare. Ils ont installé leurs abominations dans le Temple qui m’appartient et l’ont ainsi souillé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manassé avait fait installer un poteau sacré dans le Temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 21.7
        metadata:
          usfm: 2KI.21.7
      - type: text
        text: ). Josias, contemporain de Jérémie pendant les premières années de son ministère, l’a fait enlever ainsi que d’autres objets de culte idolâtres (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.4-7
        metadata:
          usfm: 2KI.23.4+2KI.23.5+2KI.23.6+2KI.23.7
      - type: text
        text: ). Yehoyaqim a dû restaurer ces pratiques païennes dans le Temple. Moins de 20 ans après la mort de Josias, Ezéchiel s’élève contre la présence de nombreuses idoles dans les parvis du Temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 8.3-6
        metadata:
          usfm: EZK.8.3+EZK.8.4+EZK.8.5+EZK.8.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10-12
        metadata:
          usfm: EZK.8.10+EZK.8.11+EZK.8.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils ont érigé les hauts lieux de Topheth dans la vallée de Ben-Hinnom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Topheth
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lieu sacré, équipé d’une fournaise, où l’on sacrifiait les enfants (voir v. 32 ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.6'
        metadata:
          usfm: JER.19.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11-14
        metadata:
          usfm: JER.19.11+JER.19.12+JER.19.13+JER.19.14
      - type: text
        text: '). Sur les sacrifices d’enfants, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.24'
        metadata:
          usfm: JER.3.24
      - type: text
        text: ' et note. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la vallée de Ben-Hinnom
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ', afin de brûler leurs fils et leurs filles pour les offrir en sacrifices. C’est bien là quelque chose que je n’ai pas ordonné et qui ne m’est même pas venu à la pensée. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'C’est pourquoi, le temps vient – l’Eternel le déclare – où l’on ne dira plus : « le Topheth » ni « la vallée de Ben-Hinnom » mais on l’appellera : « la vallée du Massacre », et faute de place, on enterrera les morts au Topheth. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les cadavres des gens de ce peuple serviront de pâture aux oiseaux et aux bêtes sauvages, sans que personne les chasse. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Je ferai cesser dans les villes de Juda et dans les rues de Jérusalem les cris de réjouissance et d’allégresse, la voix du marié et la voix de la mariée, car le pays sera en ruine.
