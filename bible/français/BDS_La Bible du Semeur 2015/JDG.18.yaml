document_id: JDG.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Danites à la recherche d’un lieu pour s’établir
  - type: text
    content: 'En ce temps-là, il n’y avait pas de roi en Israël. La tribu de Dan cherchait un territoire pour s’y établir, car jusqu’à ce moment-là, elle n’avait pas obtenu de patrimoine parmi les autres tribus d’Israël. '
  '10':
  - type: text
    content: En arrivant là-bas, vous trouverez une population sans défiance et un pays spacieux et largement ouvert que Dieu a livré entre vos mains ; c’est une contrée où rien ne manque de ce que la terre peut produire.
  - type: heading
    content: Le vol d’une idole et de son prêtre
  '11':
  - type: text
    content: 'Alors six cents hommes de la tribu de Dan armés pour le combat quittèrent Tsorea et Eshtaol. '
  '12':
  - type: text
    content: En cours de route, ils campèrent près de Qiryath-Yearim en Juda. C’est pourquoi cet endroit s’appelle encore aujourd’hui Mahané-Dan (Le camp de Dan). Il est situé à l’ouest de Qiryath-Yearim
  - type: note
    content: A une quinzaine de kilomètres à l’ouest de Jérusalem (1 S 6.21 ; 7.1 ; 2 S 6.2).
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'De là, ils se dirigèrent vers la région montagneuse d’Ephraïm et ils parvinrent aux abords de la maison de Mika. '
  '14':
  - type: text
    content: 'Alors les cinq hommes qui étaient allés reconnaître la région de Laïsh, dirent à leurs compagnons : Savez-vous qu’il y a dans l’une de ces maisons-là un vêtement sacerdotal, des statuettes sacrées, une statue et une idole en métal fondu ? Maintenant, vous savez ce que vous avez à faire !'
  '15':
  - type: text
    content: 'Alors ils firent un détour jusque-là, entrèrent dans la maison du jeune lévite, la maison de Mika, pour le saluer. '
  '16':
  - type: text
    content: 'Pendant ce temps, les six cents Danites armés pour le combat s’étaient postés à l’entrée de la porte. '
  '17':
  - type: text
    content: 'Les cinq hommes qui étaient allés reconnaître le pays entrèrent et s’emparèrent des deux statues, des idoles domestiques et de l’idole en métal fondu. Le prêtre se tenait sur le seuil de la porte avec les six cents hommes armés. '
  '18':
  - type: text
    content: 'Mais alors que les autres entraient dans la maison de Mika et prenaient les statues, les idoles domestiques et l’idole de métal fondu, il leur demanda : Que faites-vous là ?'
  '19':
  - type: text
    content: – Chut, pas un mot ! lui dirent-ils. Viens avec nous, tu seras notre « père
  - type: note
    content: Voir 17.10.
  - type: text
    content: '  » et notre prêtre ! Qu’est-ce qui vaut mieux pour toi ? Etre prêtre de la famille d’un seul homme, ou prêtre d’une tribu et d’une famille en Israël ?'
  '2':
  - type: text
    content: 'Les Danites envoyèrent donc cinq hommes d’entre eux, particulièrement courageux, de Tsorea et d’Eshtaol, avec pour mission d’explorer et de reconnaître le pays. Ces cinq hommes arrivèrent dans la région montagneuse d’Ephraïm près de la maison de Mika, et y passèrent la nuit. '
  '20':
  - type: text
    content: Le prêtre fut très heureux de cette proposition. Il prit les statues et les idoles domestiques, et s’en alla avec cette troupe.
  '21':
  - type: text
    content: 'Là-dessus, ils se remirent en route, en plaçant les enfants, le bétail et les choses précieuses à l’avant de la troupe. '
  '22':
  - type: text
    content: 'Lorsqu’ils étaient déjà assez loin de la maison de Mika, les voisins de celui-ci donnèrent l’alarme et se lancèrent à la poursuite des Danites. '
  '23':
  - type: text
    content: 'Arrivés près d’eux, ils les interpellèrent. Ceux-ci se retournèrent et demandèrent à Mika : Qu’est-ce qui te prend d’ameuter tous ces gens ?'
  '24':
  - type: text
    content: 'Il leur répondit : Vous avez pris les dieux que je me suis faits, vous avez enlevé mon prêtre et vous êtes partis. Il ne me reste plus rien. Et vous osez me demander ce qui me prend !'
  '25':
  - type: text
    content: 'Les Danites répliquèrent : Ne nous rebats pas les oreilles ! Sinon des hommes exaspérés pourraient bien tomber sur vous et tu risquerais d’y laisser ta vie et celle de ta famille.'
  '26':
  - type: text
    content: 'Les Danites poursuivirent leur route, tandis que Mika, voyant qu’ils étaient plus forts que lui, fit demi-tour et rentra chez lui. '
  '27':
  - type: text
    content: C’est ainsi que les Danites enlevèrent ce que Mika avait fabriqué ainsi que son prêtre.
  - type: heading
    content: Les Danites s’établissent à Laïsh
  - type: text
    content: 'Ensuite, ils allèrent attaquer Laïsh et massacrèrent la population tranquille et vivant en sécurité qui s’y trouvait, puis ils mirent le feu à la ville. '
  '28':
  - type: text
    content: 'Il n’y eut personne pour venir à son secours, car elle était éloignée de Sidon et n’avait de relations avec personne d’autre. La ville était située dans la vallée attenante à Beth-Rehob. Les descendants de Dan rebâtirent la ville et s’y installèrent. '
  '29':
  - type: text
    content: 'Ils appelèrent la ville Dan, du nom de leur ancêtre Dan, le fils d’Israël, alors qu’auparavant elle s’appelait Laïsh. '
  '3':
  - type: text
    content: 'Comme ils étaient tout près de la maison, ils remarquèrent l’accent du jeune lévite et allèrent le trouver pour lui demander : Qui t’a fait venir à cet endroit ? Qu’est-ce que tu fais là ? Pourquoi restes-tu ici ?'
  '30':
  - type: text
    content: Ils érigèrent pour eux la statue sculptée et établirent Jonathan, fils de Guershom et petit-fils de Moïse
  - type: note
    content: 'D’après les versions anciennes. Le texte hébreu traditionnel a : Manassé.'
  - type: text
    content: ', comme prêtre de la tribu des Danites. Ses descendants remplirent cet office jusqu’au temps où les gens de la région furent emmenés en captivité. '
  '31':
  - type: text
    content: Ils dressèrent donc pour eux la statue que Mika avait fabriquée, et elle y resta pendant tout le temps qu’il y eut un sanctuaire de Dieu à Silo
  - type: note
    content: Voir Jos 18.1.
  - type: text
    content: .
  '4':
  - type: text
    content: Il leur dit tout ce que Mika faisait pour lui.
  - type: text
    content: – Il me donne un salaire et je suis devenu son prêtre.
  '5':
  - type: text
    content: 'Alors ils lui dirent : Consulte donc Dieu, nous t’en prions, pour que nous sachions si le voyage que nous avons entrepris réussira.'
  '6':
  - type: text
    content: 'Le prêtre leur répondit : Poursuivez tranquillement votre route ! L’Eternel approuve le voyage que vous faites.'
  '7':
  - type: text
    content: Les cinq hommes se remirent en route et allèrent jusqu’à Laïsh
  - type: note
    content: Ville appelée Léshem en Jos 19.47, située à l’extrême nord-est du pays alloué à Israël, au pied du mont Hermon. C’était aussi la limite nord du territoire israélite (20.1 ; 1 S 3.20 ; 2 S 3.10).
  - type: text
    content: . Ils y trouvèrent une population, vivant en toute sécurité, à la manière des Sidoniens
  - type: note
    content: Les habitants s’occupaient d’agriculture et de commerce, mais pas d’expéditions guerrières. Ils entretenaient peut-être des relations commerciales avec les Phéniciens de Sidon.
  - type: text
    content: ', tranquille et confiante. Personne ne leur causait d’ennuis, personne n’y exerçait une autorité oppressive, et ils se trouvaient loin des Sidoniens, sans relation avec personne. '
  '8':
  - type: text
    content: 'Les cinq hommes revinrent à Tsorea et Eshtaol vers leur tribu où on leur demanda : Quelles sont les nouvelles ?'
  '9':
  - type: text
    content: 'Ils leur répondirent : Allons-y, marchons contre eux ! Car nous avons examiné le pays et il est excellent. Quoi ! Vous ne dites rien ! Ne lambinez pas ! Mettez-vous en route et allez le conquérir ! '
