document_id: JDG.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Danites à la recherche d’un lieu pour s’établir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce temps-là, il n’y avait pas de roi en Israël. La tribu de Dan cherchait un territoire pour s’y établir, car jusqu’à ce moment-là, elle n’avait pas obtenu de patrimoine parmi les autres tribus d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Danites envoyèrent donc cinq hommes d’entre eux, particulièrement courageux, de Tsorea et d’Eshtaol, avec pour mission d’explorer et de reconnaître le pays. Ces cinq hommes arrivèrent dans la région montagneuse d’Ephraïm près de la maison de Mika, et y passèrent la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Comme ils étaient tout près de la maison, ils remarquèrent l’accent du jeune lévite et allèrent le trouver pour lui demander : Qui t’a fait venir à cet endroit ? Qu’est-ce que tu fais là ? Pourquoi restes-tu ici ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il leur dit tout ce que Mika faisait pour lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Il me donne un salaire et je suis devenu son prêtre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors ils lui dirent : Consulte donc Dieu, nous t’en prions, pour que nous sachions si le voyage que nous avons entrepris réussira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le prêtre leur répondit : Poursuivez tranquillement votre route ! L’Eternel approuve le voyage que vous faites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les cinq hommes se remirent en route et allèrent jusqu’à Laïsh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ville appelée Léshem en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.47
        metadata:
          usfm: JOS.19.47
      - type: text
        text: ', située à l’extrême nord-est du pays alloué à Israël, au pied du mont Hermon. C’était aussi la limite nord du territoire israélite (20.1 ; 1 S 3.20 ; 2 S 3.10).'
    marker-yv: yv-n
  - type: text
    text: . Ils y trouvèrent une population, vivant en toute sécurité, à la manière des Sidoniens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les habitants s’occupaient d’agriculture et de commerce, mais pas d’expéditions guerrières. Ils entretenaient peut-être des relations commerciales avec les Phéniciens de Sidon.
    marker-yv: yv-n
  - type: text
    text: ', tranquille et confiante. Personne ne leur causait d’ennuis, personne n’y exerçait une autorité oppressive, et ils se trouvaient loin des Sidoniens, sans relation avec personne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les cinq hommes revinrent à Tsorea et Eshtaol vers leur tribu où on leur demanda : Quelles sont les nouvelles ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils leur répondirent : Allons-y, marchons contre eux ! Car nous avons examiné le pays et il est excellent. Quoi ! Vous ne dites rien ! Ne lambinez pas ! Mettez-vous en route et allez le conquérir ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En arrivant là-bas, vous trouverez une population sans défiance et un pays spacieux et largement ouvert que Dieu a livré entre vos mains ; c’est une contrée où rien ne manque de ce que la terre peut produire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vol d’une idole et de son prêtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors six cents hommes de la tribu de Dan armés pour le combat quittèrent Tsorea et Eshtaol. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En cours de route, ils campèrent près de Qiryath-Yearim en Juda. C’est pourquoi cet endroit s’appelle encore aujourd’hui Mahané-Dan (Le camp de Dan). Il est situé à l’ouest de Qiryath-Yearim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A une quinzaine de kilomètres à l’ouest de Jérusalem (1 S 6.21 ; 7.1 ; 2 S 6.2).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De là, ils se dirigèrent vers la région montagneuse d’Ephraïm et ils parvinrent aux abords de la maison de Mika. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors les cinq hommes qui étaient allés reconnaître la région de Laïsh, dirent à leurs compagnons : Savez-vous qu’il y a dans l’une de ces maisons-là un vêtement sacerdotal, des statuettes sacrées, une statue et une idole en métal fondu ? Maintenant, vous savez ce que vous avez à faire !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors ils firent un détour jusque-là, entrèrent dans la maison du jeune lévite, la maison de Mika, pour le saluer. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Pendant ce temps, les six cents Danites armés pour le combat s’étaient postés à l’entrée de la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les cinq hommes qui étaient allés reconnaître le pays entrèrent et s’emparèrent des deux statues, des idoles domestiques et de l’idole en métal fondu. Le prêtre se tenait sur le seuil de la porte avec les six cents hommes armés. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais alors que les autres entraient dans la maison de Mika et prenaient les statues, les idoles domestiques et l’idole de métal fondu, il leur demanda : Que faites-vous là ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: – Chut, pas un mot ! lui dirent-ils. Viens avec nous, tu seras notre « père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17.10'
        metadata:
          usfm: JDG.17.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  » et notre prêtre ! Qu’est-ce qui vaut mieux pour toi ? Etre prêtre de la famille d’un seul homme, ou prêtre d’une tribu et d’une famille en Israël ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le prêtre fut très heureux de cette proposition. Il prit les statues et les idoles domestiques, et s’en alla avec cette troupe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Là-dessus, ils se remirent en route, en plaçant les enfants, le bétail et les choses précieuses à l’avant de la troupe. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Lorsqu’ils étaient déjà assez loin de la maison de Mika, les voisins de celui-ci donnèrent l’alarme et se lancèrent à la poursuite des Danites. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Arrivés près d’eux, ils les interpellèrent. Ceux-ci se retournèrent et demandèrent à Mika : Qu’est-ce qui te prend d’ameuter tous ces gens ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur répondit : Vous avez pris les dieux que je me suis faits, vous avez enlevé mon prêtre et vous êtes partis. Il ne me reste plus rien. Et vous osez me demander ce qui me prend !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les Danites répliquèrent : Ne nous rebats pas les oreilles ! Sinon des hommes exaspérés pourraient bien tomber sur vous et tu risquerais d’y laisser ta vie et celle de ta famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les Danites poursuivirent leur route, tandis que Mika, voyant qu’ils étaient plus forts que lui, fit demi-tour et rentra chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C’est ainsi que les Danites enlevèrent ce que Mika avait fabriqué ainsi que son prêtre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Danites s’établissent à Laïsh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ensuite, ils allèrent attaquer Laïsh et massacrèrent la population tranquille et vivant en sécurité qui s’y trouvait, puis ils mirent le feu à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il n’y eut personne pour venir à son secours, car elle était éloignée de Sidon et n’avait de relations avec personne d’autre. La ville était située dans la vallée attenante à Beth-Rehob. Les descendants de Dan rebâtirent la ville et s’y installèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils appelèrent la ville Dan, du nom de leur ancêtre Dan, le fils d’Israël, alors qu’auparavant elle s’appelait Laïsh. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ils érigèrent pour eux la statue sculptée et établirent Jonathan, fils de Guershom et petit-fils de Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après les versions anciennes. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Manassé.
    marker-yv: yv-n
  - type: text
    text: ', comme prêtre de la tribu des Danites. Ses descendants remplirent cet office jusqu’au temps où les gens de la région furent emmenés en captivité. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils dressèrent donc pour eux la statue que Mika avait fabriquée, et elle y resta pendant tout le temps qu’il y eut un sanctuaire de Dieu à Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 18.1
        metadata:
          usfm: JOS.18.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
