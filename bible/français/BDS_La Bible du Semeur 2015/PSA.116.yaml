document_id: PSA.116,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur entend ma voix
  - type: text
    content: Oui, j’aime l’Eternel ╵car il m’entend
  - type: text
    content: 'lorsque je le supplie :'
  '10':
  - type: text
    content: Oui, j’ai gardé confiance ╵même quand je disais
  - type: note
    content: 'L’ancienne version grecque a : J’ai cru c’est pourquoi j’ai parlé. C’est d’après cette version que le verset est cité en 2 Co 4.13.'
  - type: text
    content: '  :'
  - type: text
    content: « Je suis trop malheureux ! »
  '11':
  - type: text
    content: 'Dans mon accablement, ╵j’en venais à me dire :'
  - type: text
    content: « Ah, tout homme est menteur ! »
  '12':
  - type: text
    content: Que puis-je rendre à l’Eternel
  - type: text
    content: pour tous ses bienfaits envers moi ?
  '13':
  - type: text
    content: J’élèverai ╵la coupe du salut
  - type: note
    content: Allusion possible aux libations qui accompagnaient les sacrifices de communion (d’actions de grâces) où l’on remerciait publiquement Dieu pour ses délivrances (comme on faisait circuler les coupes lors de la Pâque pour se souvenir de la délivrance d’Israël ; voir 22.27, 30 ; Lv 7.11-21).
  - type: text
    content: ','
  - type: text
    content: et j’invoquerai l’Eternel,
  '14':
  - type: text
    content: et, devant tout son peuple,
  - type: text
    content: j’accomplirai les vœux ╵que j’ai faits envers l’Eternel.
  '15':
  - type: text
    content: Elle est précieuse ╵aux yeux de l’Eternel
  - type: text
    content: la vie de ceux qui lui sont attachés
  - type: note
    content: 'Ou : il en coûte à l’Eternel de voir mourir ceux qui lui sont attachés (cp. 72.14).'
  - type: text
    content: .
  '16':
  - type: text
    content: De grâce, ô Eternel, ╵ne suis-je pas ton serviteur ?
  - type: text
    content: Je suis ton serviteur, ╵le fils de ta servante ;
  - type: text
    content: et tu as détaché mes chaînes.
  '17':
  - type: text
    content: Je t’offrirai un sacrifice, ╵pour marquer ma reconnaissance,
  - type: text
    content: et j’invoquerai l’Eternel.
  '18':
  - type: text
    content: Oui, devant tout son peuple,
  - type: text
    content: j’accomplirai les vœux ╵que j’ai faits envers l’Eternel,
  '19':
  - type: text
    content: sur les parvis du temple ╵de l’Eternel,
  - type: text
    content: au milieu de Jérusalem !
  - type: text
    content: Louez l’Eternel !
  '2':
  - type: text
    content: il m’a prêté l’oreille ;
  - type: text
    content: je l’invoquerai donc ╵tous les jours de ma vie.
  '3':
  - type: text
    content: Les cordes de la mort ╵s’enroulaient tout autour de moi,
  - type: text
    content: les terreurs du séjour des morts ╵m’avaient déjà saisi,
  - type: text
    content: et j’étais accablé ╵de tristesse et d’angoisse.
  '4':
  - type: text
    content: 'Alors j’ai prié l’Eternel :'
  - type: text
    content: De grâce, ô Eternel, ╵viens me sauver la vie !
  '5':
  - type: text
    content: L’Eternel nous fait grâce ╵et il est juste.
  - type: text
    content: Notre Dieu est compatissant.
  '6':
  - type: text
    content: L’Eternel garde les gens simples.
  - type: text
    content: Quand j’étais démuni, ╵il m’a sauvé.
  '7':
  - type: text
    content: Retrouve donc le calme, ╵mon âme,
  - type: text
    content: car l’Eternel t’a fait du bien.
  '8':
  - type: text
    content: Oui, tu m’as fait échapper à la mort,
  - type: text
    content: tu as séché mes pleurs,
  - type: text
    content: 'tu m’as préservé de la chute :'
  '9':
  - type: text
    content: ainsi je marcherai encore ╵sous le regard de l’Eternel
  - type: text
    content: au pays des vivants.
