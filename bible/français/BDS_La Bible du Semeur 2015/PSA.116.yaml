document_id: PSA.116,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Seigneur entend ma voix
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oui, j’aime l’Eternel ╵car il m’entend
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'lorsque je le supplie :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Oui, j’ai gardé confiance ╵même quand je disais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'J’ai cru c’est pourquoi j’ai parlé. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est d’après cette version que le verset est cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 4.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je suis trop malheureux ! »
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dans mon accablement, ╵j’en venais à me dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ah, tout homme est menteur ! »
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Que puis-je rendre à l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tous ses bienfaits envers moi ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J’élèverai ╵la coupe du salut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion possible aux libations qui accompagnaient les sacrifices de communion (d’actions de grâces) où l’on remerciait publiquement Dieu pour ses délivrances (comme on faisait circuler les coupes lors de la Pâque pour se souvenir de la délivrance d’Israël ; voir 22.27, 30 ; Lv 7.11-21).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’invoquerai l’Eternel,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: et, devant tout son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’accomplirai les vœux ╵que j’ai faits envers l’Eternel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Elle est précieuse ╵aux yeux de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vie de ceux qui lui sont attachés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il en coûte à l’Eternel de voir mourir ceux qui lui sont attachés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cp. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '72.14'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: De grâce, ô Eternel, ╵ne suis-je pas ton serviteur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis ton serviteur, ╵le fils de ta servante ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as détaché mes chaînes.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je t’offrirai un sacrifice, ╵pour marquer ma reconnaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’invoquerai l’Eternel.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Oui, devant tout son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’accomplirai les vœux ╵que j’ai faits envers l’Eternel,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: sur les parvis du temple ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: il m’a prêté l’oreille ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l’invoquerai donc ╵tous les jours de ma vie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les cordes de la mort ╵s’enroulaient tout autour de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les terreurs du séjour des morts ╵m’avaient déjà saisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’étais accablé ╵de tristesse et d’angoisse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors j’ai prié l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De grâce, ô Eternel, ╵viens me sauver la vie !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’Eternel nous fait grâce ╵et il est juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre Dieu est compatissant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: L’Eternel garde les gens simples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j’étais démuni, ╵il m’a sauvé.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Retrouve donc le calme, ╵mon âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel t’a fait du bien.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oui, tu m’as fait échapper à la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as séché mes pleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu m’as préservé de la chute :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ainsi je marcherai encore ╵sous le regard de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au pays des vivants.
