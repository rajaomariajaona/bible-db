document_id: MAL.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Le prophète Malachie n’apparaît nulle part ailleurs dans l’Ecriture. Son nom signifie en hébreu « mon messager ». Or ce même mot est employé en 3.1 pour désigner le messager de l’Eternel qui préparera son chemin, et les prophètes et les prêtres étaient eux aussi appelés « messagers » de Dieu (2.7 ; Ag 1.13). C’est pourquoi, selon certains, le nom « Malachie » pourrait être un surnom du prophète dont le nom véritable serait inconnu.
  - type: text
    content: 'Malachie a exercé son ministère de porte-parole de l’Eternel parmi les Judéens, après le retour de l’exil, la reconstruction du Temple et la reprise des cérémonies du culte, sous l’Empire perse (1.7-8, 12-14 ; 3.10). Certains problèmes soulevés dans le livre sont semblables à ceux du temps d’Esdras et de Néhémie : les mariages avec des païens et les dîmes impayées. Esdras et Néhémie ont pris des mesures pour remédier à ces difficultés (Esd 10.3 ; Né 13.23-27 ; Né 13.1-3), mais Malachie n’y fait pas référence. Ses proclamations dateraient donc, selon certains, d’un peu avant la mission d’Esdras, arrivé à Jérusalem en 458 avant Jésus-Christ. D’autres, cependant, situent l’activité du prophète pendant que Néhémie était absent de Jérusalem en 433 et 432 (Né 5.14 ; 13.6) ou lors de son deuxième séjour en Judée.'
  - type: text
    content: Parce que le peuple ne voit pas les promesses de Dieu se réaliser, son cœur s’éloigne de l’Eternel. Les Judéens se contentent d’une religion superficielle et peu exigeante, sans véritable connaissance du Dieu vivant. Ils évitent d’obéir, en effet, aux exigences les plus coûteuses de la Loi de Moïse (3.7-10), qui demandent un engagement personnel envers l’Eternel. Le prophète dénonce ces attitudes en six proclamations. Chacune débute par une vérité concernant l’Eternel et se poursuit par un dialogue assez dur, sous forme de questions et réponses, entre le prophète et le peuple.
  - type: text
    content: 'Malachie annonce la venue du messager de l’Eternel (3.1), le nouvel Elie (3.23-24). Celui-ci précédera le Seigneur lui-même, le messager de l’alliance tant attendu (3.1). Mais le peuple, revenu d’exil, malgré toutes les espérances, n’est pas encore prêt : il faudra que le nouvel Elie prépare les cœurs à l’intervention du Seigneur (3.23-24). Jésus, le messager de la nouvelle alliance, reconnaîtra en Jean-Baptiste le nouvel Elie (Mt 11.10 ; 17.10-13  ; cf. Lc 1.17) annoncé dans le dernier livre des prophètes de l’ancienne alliance.'
