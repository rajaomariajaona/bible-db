document_id: EXO.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Cinquième fléau : l’épidémie parmi le bétail'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel dit à Moïse : Va trouver le pharaon et déclare-lui : « Voici ce qu’ordonne l’Eternel, le Dieu des Hébreux : Laisse aller mon peuple, pour qu’il me rende un culte ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les deux hommes prirent de la cendre d’un fourneau et se présentèrent devant le pharaon. Moïse lança la cendre vers le ciel, et hommes et bêtes furent couverts d’éruptions évoluant en ulcères purulents. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les magiciens ne purent paraître devant Moïse, car eux aussi étaient couverts d’éruptions comme tous les Egyptiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les fléaux précédents affectaient les objets des cultes idolâtres. Celui-ci touche les magiciens eux-mêmes qui ne reparaîtront plus.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mais l’Eternel fit que le pharaon s’obstine, de sorte que celui-ci n’écouta pas les deux hommes, comme l’Eternel l’avait dit à Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Septième fléau : la grêle'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’Eternel ordonna à Moïse : Va de bon matin te présenter devant le pharaon et dis-lui : « Voici ce que t’ordonne l’Eternel, le Dieu des Hébreux : Laisse aller mon peuple pour qu’il me rende un culte. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Car cette fois-ci, je vais déchaîner toutes sortes de fléaux contre ta personne, contre tes hauts fonctionnaires et contre tes sujets, afin que tu saches que nul n’est semblable à moi sur toute la terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'J’aurais pu tout de suite te frapper de la peste, ainsi que tes sujets, et tu aurais déjà disparu de la terre ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais voici pourquoi je t’ai laissé en vie : c’est pour te faire voir ma puissance et pour que ma renommée se répande par toute la terre'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 9.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu persistes à t’opposer au départ de mon peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Soit ! Demain à la même heure, je ferai pleuvoir une grêle si violente qu’il n’y en a jamais eu de semblable dans toute l’histoire de l’Egypte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Maintenant, fais mettre à l’abri ton bétail et tout ce que tu as aux champs. Car tous ceux qui se trouveront en plein champ, qui n’auront pas regagné leur demeure, hommes ou bêtes, périront victimes de la grêle. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Si tu refuses encore de le laisser partir, si tu persistes à le retenir, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ceux des hauts fonctionnaires du pharaon qui prirent au sérieux la parole de l’Eternel, firent mettre en hâte leurs serviteurs et leur bétail à l’abri dans leurs maisons. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mais ceux qui n’y prêtèrent pas attention laissèrent les leurs dans les champs.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L’Eternel dit à Moïse : Etends la main vers le ciel et que la grêle s’abatte sur toute l’Egypte, sur les hommes, les bêtes et toute la végétation dans le pays.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moïse leva son bâton vers le ciel et l’Eternel déchaîna le tonnerre et la grêle, et la foudre s’abattit sur la terre. L’Eternel fit tomber la grêle sur l’Egypte. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Des éclairs jaillissaient au milieu de la grêle et la grêle était si violente qu’il n’y en avait jamais eu de semblable dans toute l’Egypte depuis que la nation existe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dans l’ensemble du pays, la grêle frappa tout ce qui se trouvait aux champs, hommes ou bêtes. Elle hacha toute la végétation et brisa tous les arbres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Seule la région de Goshen où habitaient les Israélites fut épargnée.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Alors le pharaon fit convoquer Moïse et Aaron et leur dit : Cette fois-ci, je reconnais que j’ai péché. C’est l’Eternel qui est juste, moi et mon peuple nous sommes coupables ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Priez l’Eternel de faire cesser le tonnerre et la grêle, et je vous laisserai partir, on ne vous retiendra pas davantage.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moïse dit : En quittant la ville, je lèverai les mains vers l’Eternel pour prier. Le tonnerre cessera et la grêle s’arrêtera, afin que tu saches que la terre appartient à l’Eternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'l’Eternel interviendra contre ton bétail qui est dans les champs, contre les chevaux, les ânes, les chameaux, le gros et le petit bétail ; il leur enverra une grave épidémie. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Quant à toi et à tes hauts fonctionnaires, je sais que vous ne craindrez encore pas l’Eternel Dieu.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Le lin et l’orge avaient été détruits, car l’orge était en épis et le lin en fleurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce détail fixe la date du fléau vers la mi-janvier ou au début de février.
      marker-yv: yv-n
    - type: text
      text: ', '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: mais le blé et l’épeautre qui étaient plus tardifs n’avaient pas souffert.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moïse sortit de chez le pharaon. En quittant la ville, il leva les mains vers l’Eternel pour prier ; le tonnerre et la grêle cessèrent et la pluie arrêta de tomber. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Quand le pharaon vit que la pluie, la grêle et le tonnerre avaient cessé, il persista dans son péché et s’entêta. Ses hauts fonctionnaires firent de même. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il s’obstina et ne laissa pas partir les Israélites, comme l’Eternel l’avait annoncé par l’intermédiaire de Moïse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais l’Eternel fera une différence entre le bétail des Israélites et celui des Egyptiens : aucune bête appartenant aux Israélites ne mourra. »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Eternel fixa une échéance en disant : Demain je mettrai cela à exécution dans le pays.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le lendemain, en effet, l’Eternel fit ce qu’il avait dit : tout le bétail des Egyptiens périt, mais pas une bête des Israélites ne fut atteinte. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le pharaon envoya ses gens s’enquérir de la chose et l’on constata qu’aucune bête des Israélites n’avait péri. Malgré cela, le pharaon s’entêta et ne laissa pas partir le peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sixième fléau : les ulcères purulents'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’Eternel dit à Moïse et à Aaron : Prenez à pleines mains de la cendre d’un fourneau, et que Moïse la lance en l’air, sous les yeux du pharaon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Cette cendre se transformera en poussière qui se répandra sur toute l’Egypte. Hommes et bêtes en seront couverts et elle provoquera, dans tout le pays, des éruptions évoluant en ulcères
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'furoncles. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 16.11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' purulents.'
