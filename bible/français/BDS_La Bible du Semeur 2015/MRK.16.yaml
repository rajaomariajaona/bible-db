document_id: MRK.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est ressuscité !
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 28.1-8 ; Lc 24.1-11 ; Jn 20.1-2)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quand le sabbat fut passé, Marie de Magdala, Marie mère de Jacques, et Salomé achetèrent des huiles aromatiques pour aller embaumer le corps de Jésus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celle-ci alla porter la nouvelle à ceux qui avaient accompagné Jésus : ils étaient plongés dans la tristesse et en larmes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais eux, en l’entendant dire qu’il était vivant et qu’il lui était apparu, ne la crurent pas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Après cela, alors que deux d’entre eux faisaient route pour se rendre à la campagne, il leur apparut sous un autre aspect. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils revinrent à Jérusalem et annoncèrent la nouvelle aux autres ; mais ils ne les crurent pas eux non plus.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Plus tard, il se montra aux Onze pendant qu’ils étaient à table ; il leur reprocha leur incrédulité et leur aveuglement parce qu’ils n’avaient pas cru ceux qui l’avaient vu ressuscité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allez dans le monde entier, proclamez l’Evangile à tous les hommes.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Celui qui croira et sera baptisé sera '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauvé
      - type: text
        text: ', mais celui qui ne croira pas sera condamné.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici les signes miraculeux qui accompagneront ceux qui auront cru : en mon nom, ils chasseront des démons, ils parleront des langues nouvelles,'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ils saisiront des serpents venimeux, ou s’il leur arrive de boire un poison mortel, cela ne leur causera aucun mal. Ils imposeront les mains à des malades et ceux-ci seront guéris.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enlevé au ciel
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après leur avoir ainsi parlé, le Seigneur Jésus fut enlevé au ciel et s’assit à la droite de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il était encore très tôt, le dimanche matin, lorsqu’elles arrivèrent au tombeau. Le soleil se levait. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quant à eux, ils s’en allèrent proclamer la Parole de Dieu en tout lieu. Le Seigneur travaillait avec eux et confirmait leur prédication par les signes miraculeux qui l’accompagnaient
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs manuscrits, et des meilleurs, ne contiennent pas les v. 9-20. Certains ont une version plus courte de la fin de l’évangile : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mais elles firent aux compagnons de Pierre un bref récit de tout ce qui leur avait été annoncé. Ensuite Jésus lui-même fit porter par eux, de l’Orient à l’Occident, le message sacré et incorruptible du salut éternel.
      marker-yv: yv-n
    - type: text
      text: .]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En chemin, elles s’étaient demandé les unes aux autres : Qui nous roulera la pierre qui ferme l’entrée du tombeau ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Or, en levant les yeux, elles s’aperçurent que la pierre avait été roulée sur le côté, et c’était un bloc énorme.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Elles pénétrèrent dans le caveau et virent, assis du côté droit, un jeune homme vêtu d’une robe blanche. Elles furent saisies de frayeur.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais le jeune homme leur dit : N’ayez pas peur ! Vous cherchez Jésus de Nazareth, celui qui a été crucifié ? Il est ressuscité, il n’est plus ici. Voyez l’endroit où on l’avait déposé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Et maintenant, allez annoncer à ses disciples, et aussi à Pierre, qu’il vous précède en Galilée ; c’est là que vous le verrez, comme il vous l’a dit.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Elles se précipitèrent hors du tombeau et s’enfuirent, toutes tremblantes et bouleversées. Elles ne dirent rien à personne, tant elles étaient effrayées.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus apparaît aux disciples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '['
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus, étant ressuscité le dimanche matin, apparut d’abord à Marie de Magdala dont il avait chassé sept démons. '
