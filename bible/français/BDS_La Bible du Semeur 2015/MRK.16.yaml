document_id: MRK.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus est ressuscité !
  - type: heading
    content: (Mt 28.1-8 ; Lc 24.1-11 ; Jn 20.1-2)
  - type: text
    content: 'Quand le sabbat fut passé, Marie de Magdala, Marie mère de Jacques, et Salomé achetèrent des huiles aromatiques pour aller embaumer le corps de Jésus. '
  '10':
  - type: text
    content: 'Celle-ci alla porter la nouvelle à ceux qui avaient accompagné Jésus : ils étaient plongés dans la tristesse et en larmes. '
  '11':
  - type: text
    content: Mais eux, en l’entendant dire qu’il était vivant et qu’il lui était apparu, ne la crurent pas.
  '12':
  - type: text
    content: 'Après cela, alors que deux d’entre eux faisaient route pour se rendre à la campagne, il leur apparut sous un autre aspect. '
  '13':
  - type: text
    content: Ils revinrent à Jérusalem et annoncèrent la nouvelle aux autres ; mais ils ne les crurent pas eux non plus.
  '14':
  - type: text
    content: 'Plus tard, il se montra aux Onze pendant qu’ils étaient à table ; il leur reprocha leur incrédulité et leur aveuglement parce qu’ils n’avaient pas cru ceux qui l’avaient vu ressuscité. '
  '15':
  - type: text
    content: 'Et il leur dit : '
  - type: text
    content: Allez dans le monde entier, proclamez l’Evangile à tous les hommes.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Celui qui croira et sera baptisé sera '
  - type: text
    content: sauvé
  - type: text
    content: ', mais celui qui ne croira pas sera condamné.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Voici les signes miraculeux qui accompagneront ceux qui auront cru : en mon nom, ils chasseront des démons, ils parleront des langues nouvelles,'
  - type: text
    content: ' '
  '18':
  - type: text
    content: ils saisiront des serpents venimeux, ou s’il leur arrive de boire un poison mortel, cela ne leur causera aucun mal. Ils imposeront les mains à des malades et ceux-ci seront guéris.
  - type: heading
    content: Jésus enlevé au ciel
  '19':
  - type: text
    content: 'Après leur avoir ainsi parlé, le Seigneur Jésus fut enlevé au ciel et s’assit à la droite de Dieu. '
  '2':
  - type: text
    content: 'Il était encore très tôt, le dimanche matin, lorsqu’elles arrivèrent au tombeau. Le soleil se levait. '
  '20':
  - type: text
    content: Quant à eux, ils s’en allèrent proclamer la Parole de Dieu en tout lieu. Le Seigneur travaillait avec eux et confirmait leur prédication par les signes miraculeux qui l’accompagnaient
  - type: note
    content: 'Plusieurs manuscrits, et des meilleurs, ne contiennent pas les v. 9-20. Certains ont une version plus courte de la fin de l’évangile : Mais elles firent aux compagnons de Pierre un bref récit de tout ce qui leur avait été annoncé. Ensuite Jésus lui-même fit porter par eux, de l’Orient à l’Occident, le message sacré et incorruptible du salut éternel.'
  - type: text
    content: .]
  '3':
  - type: text
    content: 'En chemin, elles s’étaient demandé les unes aux autres : Qui nous roulera la pierre qui ferme l’entrée du tombeau ?'
  '4':
  - type: text
    content: Or, en levant les yeux, elles s’aperçurent que la pierre avait été roulée sur le côté, et c’était un bloc énorme.
  '5':
  - type: text
    content: Elles pénétrèrent dans le caveau et virent, assis du côté droit, un jeune homme vêtu d’une robe blanche. Elles furent saisies de frayeur.
  '6':
  - type: text
    content: 'Mais le jeune homme leur dit : N’ayez pas peur ! Vous cherchez Jésus de Nazareth, celui qui a été crucifié ? Il est ressuscité, il n’est plus ici. Voyez l’endroit où on l’avait déposé. '
  '7':
  - type: text
    content: Et maintenant, allez annoncer à ses disciples, et aussi à Pierre, qu’il vous précède en Galilée ; c’est là que vous le verrez, comme il vous l’a dit.
  '8':
  - type: text
    content: Elles se précipitèrent hors du tombeau et s’enfuirent, toutes tremblantes et bouleversées. Elles ne dirent rien à personne, tant elles étaient effrayées.
  - type: heading
    content: Jésus apparaît aux disciples
  - type: text
    content: '['
  '9':
  - type: text
    content: 'Jésus, étant ressuscité le dimanche matin, apparut d’abord à Marie de Magdala dont il avait chassé sept démons. '
