document_id: EZR.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’interruption des travaux de reconstruction du Temple
  - type: text
    content: Les ennemis de Juda et de Benjamin
  - type: note
    content: C’est-à-dire des habitants de l’ancien royaume de Samarie (voir v. 2).
  - type: text
    content: ' apprirent que les anciens déportés reconstruisaient un temple à l’Eternel, le Dieu d’Israël. '
  '10':
  - type: text
    content: ainsi que les autres peuples que le grand et glorieux Assourbanipal
  - type: note
    content: En hébreu Osnappar, une variante d’Assourbanipal (668 à 626 av. J.-C.), dernier grand roi assyrien de Ninive.
  - type: text
    content: ' a déportés pour les établir dans la ville de Samarie et dans d’autres territoires à l’ouest de l’Euphrate, etc. »'
  '11':
  - type: text
    content: 'Voici une copie de la lettre qu’ils lui envoyèrent :'
  - type: text
    content: '« A l’empereur Artaxerxès. Tes serviteurs, les gens de la province à l’ouest du fleuve, etc. '
  '12':
  - type: text
    content: 'Que l’empereur sache que les Juifs revenus de chez toi sont arrivés parmi nous à Jérusalem et sont en train de rebâtir la ville rebelle et perverse : ils en réparent les remparts'
  - type: note
    content: Voir Es 58.12-14.
  - type: text
    content: ' et en restaurent les fondations. '
  '13':
  - type: text
    content: 'Que l’empereur sache que si cette ville est reconstruite et si ses remparts sont réparés, ses habitants ne paieront plus ni tribut, ni impôt, ni taxes de péage, ce qui finalement lésera le trésor royal. '
  '14':
  - type: text
    content: 'C’est pourquoi, étant les obligés du palais impérial et pensant qu’il ne nous conviendrait pas d’être témoins du tort fait à ton honneur, nous transmettons au roi ces informations '
  '15':
  - type: text
    content: 'afin que des recherches soient faites dans les annales de tes prédécesseurs. Tu trouveras dans ces archives et tu verras ainsi que cette ville a toujours été rebelle et nuisible aux rois et aux provinces. Depuis toujours, ses habitants n’ont cessé de provoquer des révoltes. C’est la raison pour laquelle cette ville a été détruite. '
  '16':
  - type: text
    content: Nous avertissons donc l’empereur que si elle est rebâtie et si ses remparts sont restaurés, tu n’auras bientôt plus de possessions à l’ouest de l’Euphrate. »
  - type: heading
    content: La réponse de l’empereur
  '17':
  - type: text
    content: 'L’empereur fit parvenir la réponse suivante :'
  - type: text
    content: '« A Rehoum, gouverneur, à Shimshaï, secrétaire, et au reste de leurs collègues demeurant à Samarie et dans les territoires à l’ouest du fleuve, j’adresse mes salutations, etc. '
  '18':
  - type: text
    content: Le rapport que vous nous avez envoyé m’a été lu après avoir été traduit
  - type: note
    content: D’araméen en perse, langue que le roi était à même de comprendre.
  - type: text
    content: '. '
  '19':
  - type: text
    content: Sur mon ordre, on a fait des recherches et l’on a effectivement trouvé que, depuis toujours, cette ville s’est soulevée contre les rois et qu’elle a provoqué des révoltes et des insurrections
  - type: note
    content: Allusion aux révoltes d’Ezéchias, Yehoyaqim et Sédécias (2 R 18.7 ; 24.1, 20).
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ils vinrent trouver Zorobabel et les chefs des groupes familiaux pour leur dire : Nous allons vous aider à reconstruire ce temple, car nous invoquons le même Dieu que vous et nous lui offrons des sacrifices depuis le temps d’Esar-Haddôn'
  - type: note
    content: Roi assyrien (681 à 669 av. J.-C.) qui inaugura la politique de transplantation des populations dans les régions conquises (voir 2 R 17.24-41 ; 2 Ch 33.11).
  - type: text
    content: ', roi d’Assyrie, qui nous a déportés ici.'
  '20':
  - type: text
    content: 'Il y eut à Jérusalem des rois puissants qui étendirent leur domination sur toute la région à l’ouest du fleuve, et à qui on payait tributs, impôts et taxes de péage. '
  '21':
  - type: text
    content: 'Prenez donc des dispositions pour ordonner à ces gens de cesser leurs travaux pour que cette ville ne soit pas rebâtie tant que je n’en aurai pas donné l’ordre. '
  '22':
  - type: text
    content: Soyez sur vos gardes pour éviter toute négligence dans cette affaire, afin que les empereurs ne soient pas lésés par des dommages encore plus grands ! »
  '23':
  - type: text
    content: Dès que la copie de la lettre de l’empereur Artaxerxès eut été lue devant Rehoum, Shimshaï, son secrétaire, et leurs collègues, ceux-ci se rendirent en toute hâte à Jérusalem auprès des Judéens et les obligèrent par la violence et la force à cesser leurs travaux.
  - type: heading
    content: L’interruption des travaux de reconstruction du Temple (suite)
  '24':
  - type: text
    content: Dès lors
  - type: note
    content: Reprise de la section sur les travaux de reconstruction du Temple, qui s’est arrêtée en 4.5.
  - type: text
    content: ', les travaux de restauration du temple de Dieu à Jérusalem furent interrompus ; cette interruption se prolongea jusqu’à la seconde année du règne de Darius, roi de Perse'
  - type: note
    content: En 520 av. J.-C.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Mais Zorobabel, Josué et les autres chefs des groupes familiaux d’Israël leur répondirent : Il nous appartient à nous, et pas à vous, de bâtir un temple pour notre Dieu ; nous seuls devons construire cet édifice pour l’Eternel, le Dieu d’Israël, comme l’a ordonné Cyrus, le roi de Perse.'
  '4':
  - type: text
    content: 'Alors les gens du pays découragèrent les Judéens et les effrayèrent pour qu’ils cessent de bâtir. '
  '5':
  - type: text
    content: Ils soudoyèrent des conseillers
  - type: note
    content: C’est-à-dire des fonctionnaires perses qui se chargèrent d’accuser les Juifs (voir Né 6.12-13).
  - type: text
    content: ' pour s’opposer à eux et faire échouer leur entreprise. Ils y parvinrent durant le règne de Cyrus et jusqu’au règne de Darius, tous deux empereurs de Perse'
  - type: note
    content: Cyrus régna jusqu’en 530 av. J.-C., son successeur Cambyse jusqu’en 522 av. J.-C., et Darius Ier de 522 à 486 av. J.-C. Le récit s’interrompt ici pour reprendre au v. 24. Les v. 6-23 concernent une époque plus tardive. L’auteur a regroupé dans ce chapitre différentes tentatives faites par les ennemis des Juifs pour s’opposer à leurs entreprises.
  - type: text
    content: .
  - type: heading
    content: La lettre adressée à l’empereur Artaxerxès
  '6':
  - type: text
    content: Dès le début du règne de Xerxès
  - type: note
    content: En hébreu Assuérus (voir Est 1.1). Fils de Darius Ier, empereur de 486 à 465 av. J.-C.
  - type: text
    content: ', ils lui écrivirent une lettre d’accusation contre les habitants de Juda et de Jérusalem. '
  '7':
  - type: text
    content: Et sous le règne d’Artaxerxès
  - type: note
    content: Artaxerxès Ier (465 à 424 av. J.-C.).
  - type: text
    content: ', Bishlâm, Mitredath, Tabéel et leurs collègues écrivirent à Artaxerxès, empereur de Perse. Le document était rédigé en langue araméenne et écrit en caractères araméens. '
  '8':
  - type: text
    content: Rehoum, le gouverneur, et Shimshaï, son secrétaire, écrivirent à l’empereur Artaxerxès la lettre suivante
  - type: note
    content: La section qui va de 4.8 à 6.18 est en araméen dans l’original. Cette lettre semble différente de celle du v. 7, ses auteurs n’étant pas les mêmes.
  - type: text
    content: ' au sujet de Jérusalem :'
  '9':
  - type: text
    content: « Rehoum, gouverneur, Shimshaï, secrétaire, et leurs collègues originaires de Din, d’Arpharsatak, de Tarpel, d’Apharas
  - type: note
    content: 'Ces quatre mots pourraient désigner, non des localités, mais des fonctions officielles. Dans ce cas, il faudrait lire : les juges, les légats, les consuls, les fonctionnaires d’Erek…'
  - type: text
    content: ', d’Erek, de Babylone, de Suse, de Déha, d’Elam, '
