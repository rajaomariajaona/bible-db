document_id: EZR.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’interruption des travaux de reconstruction du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les ennemis de Juda et de Benjamin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire des habitants de l’ancien royaume de Samarie (voir v. 2).
    marker-yv: yv-n
  - type: text
    text: ' apprirent que les anciens déportés reconstruisaient un temple à l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils vinrent trouver Zorobabel et les chefs des groupes familiaux pour leur dire : Nous allons vous aider à reconstruire ce temple, car nous invoquons le même Dieu que vous et nous lui offrons des sacrifices depuis le temps d’Esar-Haddôn'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Roi assyrien (681 à 669 av. J.-C.) qui inaugura la politique de transplantation des populations dans les régions conquises (voir 2 R 17.24-41 ; 2 Ch 33.11).
    marker-yv: yv-n
  - type: text
    text: ', roi d’Assyrie, qui nous a déportés ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais Zorobabel, Josué et les autres chefs des groupes familiaux d’Israël leur répondirent : Il nous appartient à nous, et pas à vous, de bâtir un temple pour notre Dieu ; nous seuls devons construire cet édifice pour l’Eternel, le Dieu d’Israël, comme l’a ordonné Cyrus, le roi de Perse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors les gens du pays découragèrent les Judéens et les effrayèrent pour qu’ils cessent de bâtir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils soudoyèrent des conseillers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire des fonctionnaires perses qui se chargèrent d’accuser les Juifs (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 6.12-13
        metadata:
          usfm: NEH.6.12+NEH.6.13
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' pour s’opposer à eux et faire échouer leur entreprise. Ils y parvinrent durant le règne de Cyrus et jusqu’au règne de Darius, tous deux empereurs de Perse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cyrus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: régna jusqu’en 530 av. J.-C., son successeur Cambyse jusqu’en 522 av. J.-C., et Darius I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' de 522 à 486 av. J.-C. Le récit s’interrompt ici pour reprendre au v. 24. Les v. 6-23 concernent une époque plus tardive. L’auteur a regroupé dans ce chapitre différentes tentatives faites par les ennemis des Juifs pour s’opposer à leurs entreprises.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lettre adressée à l’empereur Artaxerxès
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dès le début du règne de Xerxès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Assuérus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Est 1.1
        metadata:
          usfm: EST.1.1
      - type: text
        text: ). Fils de Darius I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ', empereur de 486 à 465 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: ', ils lui écrivirent une lettre d’accusation contre les habitants de Juda et de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et sous le règne d’Artaxerxès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Artaxerxès I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (465 à 424 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: ', Bishlâm, Mitredath, Tabéel et leurs collègues écrivirent à Artaxerxès, empereur de Perse. Le document était rédigé en langue araméenne et écrit en caractères araméens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rehoum, le gouverneur, et Shimshaï, son secrétaire, écrivirent à l’empereur Artaxerxès la lettre suivante
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La section qui va de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.8'
        metadata:
          usfm: EZR.4.8
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.18'
        metadata:
          usfm: EZR.6.18
      - type: text
        text: ' est en araméen dans l’original. Cette lettre semble différente de celle du v. 7, ses auteurs n’étant pas les mêmes.'
    marker-yv: yv-n
  - type: text
    text: ' au sujet de Jérusalem :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Rehoum, gouverneur, Shimshaï, secrétaire, et leurs collègues originaires de Din, d’Arpharsatak, de Tarpel, d’Apharas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces quatre mots pourraient désigner, non des localités, mais des fonctions officielles. Dans ce cas, il faudrait lire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les juges, les légats, les consuls, les fonctionnaires d’Erek…
    marker-yv: yv-n
  - type: text
    text: ', d’Erek, de Babylone, de Suse, de Déha, d’Elam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ainsi que les autres peuples que le grand et glorieux Assourbanipal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Osnappar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: une variante d’Assourbanipal (668 à 626 av. J.-C.), dernier grand roi assyrien de Ninive.
    marker-yv: yv-n
  - type: text
    text: ' a déportés pour les établir dans la ville de Samarie et dans d’autres territoires à l’ouest de l’Euphrate, etc. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici une copie de la lettre qu’ils lui envoyèrent :'
- type: usfm
  marker: p
  children:
  - type: text
    text: '« A l’empereur Artaxerxès. Tes serviteurs, les gens de la province à l’ouest du fleuve, etc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Que l’empereur sache que les Juifs revenus de chez toi sont arrivés parmi nous à Jérusalem et sont en train de rebâtir la ville rebelle et perverse : ils en réparent les remparts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 58.12-14
        metadata:
          usfm: ISA.58.12+ISA.58.13+ISA.58.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et en restaurent les fondations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Que l’empereur sache que si cette ville est reconstruite et si ses remparts sont réparés, ses habitants ne paieront plus ni tribut, ni impôt, ni taxes de péage, ce qui finalement lésera le trésor royal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi, étant les obligés du palais impérial et pensant qu’il ne nous conviendrait pas d’être témoins du tort fait à ton honneur, nous transmettons au roi ces informations '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'afin que des recherches soient faites dans les annales de tes prédécesseurs. Tu trouveras dans ces archives et tu verras ainsi que cette ville a toujours été rebelle et nuisible aux rois et aux provinces. Depuis toujours, ses habitants n’ont cessé de provoquer des révoltes. C’est la raison pour laquelle cette ville a été détruite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nous avertissons donc l’empereur que si elle est rebâtie et si ses remparts sont restaurés, tu n’auras bientôt plus de possessions à l’ouest de l’Euphrate. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réponse de l’empereur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’empereur fit parvenir la réponse suivante :'
- type: usfm
  marker: p
  children:
  - type: text
    text: '« A Rehoum, gouverneur, à Shimshaï, secrétaire, et au reste de leurs collègues demeurant à Samarie et dans les territoires à l’ouest du fleuve, j’adresse mes salutations, etc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le rapport que vous nous avez envoyé m’a été lu après avoir été traduit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: D’araméen en perse, langue que le roi était à même de comprendre.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sur mon ordre, on a fait des recherches et l’on a effectivement trouvé que, depuis toujours, cette ville s’est soulevée contre les rois et qu’elle a provoqué des révoltes et des insurrections
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion aux révoltes d’Ezéchias, Yehoyaqim et Sédécias (2 R 18.7 ; 24.1, 20).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il y eut à Jérusalem des rois puissants qui étendirent leur domination sur toute la région à l’ouest du fleuve, et à qui on payait tributs, impôts et taxes de péage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Prenez donc des dispositions pour ordonner à ces gens de cesser leurs travaux pour que cette ville ne soit pas rebâtie tant que je n’en aurai pas donné l’ordre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Soyez sur vos gardes pour éviter toute négligence dans cette affaire, afin que les empereurs ne soient pas lésés par des dommages encore plus grands ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dès que la copie de la lettre de l’empereur Artaxerxès eut été lue devant Rehoum, Shimshaï, son secrétaire, et leurs collègues, ceux-ci se rendirent en toute hâte à Jérusalem auprès des Judéens et les obligèrent par la violence et la force à cesser leurs travaux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’interruption des travaux de reconstruction du Temple (suite)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dès lors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprise de la section sur les travaux de reconstruction du Temple, qui s’est arrêtée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.5'
        metadata:
          usfm: EZR.4.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', les travaux de restauration du temple de Dieu à Jérusalem furent interrompus ; cette interruption se prolongea jusqu’à la seconde année du règne de Darius, roi de Perse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En 520 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
