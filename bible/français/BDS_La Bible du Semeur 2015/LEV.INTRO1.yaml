type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre de l’Exode s’achève sur la construction du tabernacle que l’Eternel, le Suzerain de l’alliance, vient inonder de sa présence dans la nuée (Ex 40.34). Dieu appelle alors Moïse pour lui parler (Lv 1.1). Au pied du Sinaï (25.1-2 ; 26.46 ; 27.34), il va lui préciser de quelle manière son peuple devra lui rendre un culte au tabernacle et vivre pour lui plaire. D’où le titre du livre, donné par l’ancienne version grecque, qui renvoie à la tribu de Lévi, consacrée au service du tabernacle.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le livre débute par les lois sur les sacrifices et les offrandes (chap. 1 à 7) et sur l’entrée en fonction des prêtres, chargés de les présenter à Dieu (chap. 8 à 10). L’importance attachée par l’Eternel aux sacrifices tient à la gravité du péché qui demande sanction. Avant d’être un acte de l’homme, le sacrifice est un don de Dieu (17.11). C’est par son moyen que le Dieu juste et bon pardonne. L’innocent, représenté par l’animal sans défaut (1.3 ; 3.1 ; 4.3 ; 5.15), prend la place du coupable pour être puni pour le mal que celui-ci a commis. Les différents types de sacrifice mettent chacun en lumière des aspects particuliers de cette signification fondamentale des sacrifices.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le sacrifice pour le péché et le sacrifice de réparation sont offerts pour effacer les fautes involontaires, le second impliquant en plus la nécessité de donner une compensation pour le dommage causé. Dans l’holocauste, sacrifice où la victime est presque entièrement brûlée, livrée à Dieu, l’homme reconnaît, sans qu’il ait à se reprocher une faute particulière, son besoin général d’expiation. Le sacrifice de communion aboutit à un repas où l’on mange la viande du sacrifice, signe de communion avec l’Eternel (7.16). Les offrandes servent à exprimer la reconnaissance envers l’Eternel pour tous ses dons, mais s’inscrivent, elles aussi, dans le contexte du besoin d’expiation (2.9, 12). Comme le psalmiste et Esaïe l’ont aussi compris, tous ces sacrifices n’ont fait qu’annoncer, telle une image, la venue de Celui qui a livré sa vie en sacrifice pour nos péchés (Ps 40.7-8 ; Es 53.10).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Les chapitres 11 à 15 contiennent les lois de l’Eternel sur le pur et l’impur, qui concernent des réalités physiques (les animaux, l’accouchement, les maladies de peau à caractère évolutif et moisissures malignes, la sexualité). L’impureté rituelle, qu’il faut distinguer du péché, éloignait l’Israélite du culte au tabernacle pour le temps de son impureté. Par ces réalités « extérieures », l’Eternel a inculqué à son peuple la nécessité d’être pur pour s’approcher de lui et se consacrer à lui.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le chapitre 16 conclut la première grande section du Lévitique par la loi sur le jour des Expiations, jour exceptionnel où le grand-prêtre, une fois par an, pénètre dans le sanctuaire, au-delà du voile, pour faire l’expiation en faveur du peuple.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Puis vient le Code de sainteté (chap. 17 à 26) qui forme une unité, jalonnée par deux refrains : « Je suis l’Eternel » (18.5, 6 ; 19.4  ; etc.) et : « Soyez saints, car je suis saint, moi l’Eternel, votre Dieu » (19.2 ; 20.26). Cette section contient diverses lois morales, rituelles et civiles, en particulier ce résumé de la Loi que reprendra Jésus : « Tu aimeras ton prochain comme toi-même » (19.18).'
