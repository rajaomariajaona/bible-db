document_id: LUK.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La nécessité d’un profond changement
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A cette époque survinrent quelques personnes qui informèrent Jésus que Pilate avait fait tuer des Galiléens pendant qu’ils offraient leurs sacrifices.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Un jour de sabbat, Jésus enseignait dans une synagogue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il s’y trouvait une femme qui, depuis dix-huit ans, était sous l’emprise d’un esprit qui la rendait infirme : elle était voûtée et n’arrivait absolument pas à se redresser. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lorsque Jésus la vit, il l’appela et lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Femme, tu es délivrée de ton infirmité !
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il posa ses mains sur elle et, immédiatement, elle se redressa et se mit à louer Dieu.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais le responsable de la synagogue fut fâché que Jésus ait fait cette guérison le jour du sabbat. S’adressant à la foule, il lui dit : Il y a six jours pour travailler : venez donc vous faire guérir ces jours-là, mais pas le jour du sabbat !'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le Seigneur lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Hypocrites que vous êtes ! Chacun de vous ne détache-t-il pas son bœuf ou son âne de la mangeoire pour le mener à l’abreuvoir le jour du sabbat ?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et cette femme, qui est une fille d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', et que '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Satan
      - type: text
        text: ' tenait en son pouvoir depuis dix-huit ans, fallait-il ne pas la délivrer de sa chaîne aujourd’hui parce que c’est le jour du sabbat ?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Cette réponse de Jésus remplit de confusion tous ceux qui avaient pris parti contre lui, tandis que le peuple était enthousiasmé de le voir accomplir tant d’œuvres merveilleuses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les paraboles de la graine de moutarde et du levain
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.31-33 ; Mc 4.30-32)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus dit alors : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A quoi ressemble le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: '  ? A quoi pourrais-je le comparer ?'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il ressemble à une graine de moutarde qu’un homme a prise pour la semer dans son jardin ; la graine pousse jusqu’à devenir un arbuste, et les oiseaux du ciel nichent dans ses branches.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pensez-vous que ces Galiléens ont subi un sort si cruel parce qu’ils étaient de plus grands pécheurs que tous leurs compatriotes ?
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A quoi comparerai-je encore le royaume de Dieu ?
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il ressemble à du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: levain
      - type: text
        text: ' qu’une femme a pris pour le mélanger à une vingtaine de kilogrammes de farine. Et à la fin, toute la pâte a levé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’entrée dans le royaume
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jésus traversait ainsi les villes et les villages ; il y enseignait, tout en se dirigeant vers Jérusalem.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 7.13-14)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Quelqu’un lui demanda : Seigneur, n’y a-t-il qu’un petit nombre de gens qui seront sauvés ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit en s’adressant à tous ceux qui étaient là : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites tous vos efforts pour entrer par la porte étroite, car nombreux sont ceux qui chercheront à entrer et n’y parviendront pas.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 25.10-12)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Dès que le maître de la maison se sera levé et qu’il aura fermé la porte à clé, si vous êtes restés dehors, vous aurez beau frapper à la porte en suppliant : « Seigneur, Seigneur, ouvre-nous ! » il vous répondra : « Je ne sais pas d’où vous venez. »'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 7.22-23)
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors vous direz : « Mais nous étions à table avec toi, nous avons mangé et bu sous tes yeux. Tu as enseigné dans nos rues… »'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il vous répondra : « Je ne sais pas d’où vous venez. Allez-vous-en, vous qui commettez le mal. »'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est là qu’il y aura des pleurs et d’amers regrets, quand vous verrez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Isaac
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jacob
      - type: text
        text: ' et tous les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ' dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ', tandis que vous-mêmes vous en serez exclus.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Des hommes viendront de l’Orient et de l’Occident, du Nord et du Midi, et prendront place à table dans le royaume de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Non, je vous le dis ; mais vous, si vous ne changez pas, vous périrez tous, vous aussi.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Alors, certains de ceux qui sont les derniers seront les premiers ; et certains de ceux qui sont les premiers seront les derniers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus poursuit sa route vers Jérusalem
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'A ce moment-là, quelques pharisiens s’approchèrent de Jésus et l’avertirent : Tu devrais quitter cette région et aller loin d’ici, car Hérode veut te faire mourir.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais Jésus leur répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Allez dire de ma part à ce renard : « Aujourd’hui, je chasse des démons et je guéris des malades ; demain, je ferai de même et après-demain, j’aurai achevé ma tâche.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais il faut que je poursuive ma route aujourd’hui, demain et après-demain, car il est impensable qu’un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' soit mis à mort ailleurs qu’à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jérusalem
      - type: text
        text: '  ! »'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 23.37-39)
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ah, Jérusalem ! Jérusalem ! Toi qui fais mourir les prophètes et qui lapides ceux que Dieu t’envoie ! Combien de fois j’ai voulu rassembler tes habitants auprès de moi comme une poule rassemble ses poussins sous ses ailes ! Mais vous ne l’avez pas voulu !
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Eh bien, maintenant, votre maison va être livrée à l’abandon. Oui, je vous le déclare : dorénavant vous ne me verrez plus jusqu’à ce que le temps soit arrivé où vous direz'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jusqu’à ce que vous disiez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 23.39
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ': '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Béni soit celui qui vient au nom du Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.26
        - type: text
          text: '. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Béni soit, au nom du Seigneur, celui qui vient !
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rappelez-vous ces dix-huit personnes qui ont été tuées quand la tour de Siloé
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Source située au sud de Jérusalem, où on avait élevé une tour.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 's’est effondrée sur elles. Croyez-vous qu’elles aient été plus coupables que tous les autres habitants de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jérusalem
      - type: text
        text: '  ?'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Non, je vous le dis ; mais vous aussi, si vous ne changez pas, vous périrez tous.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Là-dessus, il leur raconta cette parabole : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un homme avait un figuier dans sa vigne. Un jour, il voulut y cueillir des figues, mais n’en trouva pas.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il dit alors à celui qui s’occupait de sa vigne : « Voilà trois ans que je viens chercher des figues sur cet arbre, sans pouvoir en trouver. Coupe-le ; je ne vois pas pourquoi il occupe la place inutilement. »'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: « Maître, lui répondit l’homme, laisse-le encore cette année ! Je bêcherai encore la terre tout autour et j’y mettrai du fumier ;
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: peut-être qu’il portera du fruit à la saison prochaine. Sinon, tu le feras couper. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une guérison le jour du sabbat
    marker-yv: yv-h
