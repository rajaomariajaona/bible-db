document_id: LUK.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La nécessité d’un profond changement
  - type: text
    content: A cette époque survinrent quelques personnes qui informèrent Jésus que Pilate avait fait tuer des Galiléens pendant qu’ils offraient leurs sacrifices.
  '10':
  - type: text
    content: 'Un jour de sabbat, Jésus enseignait dans une synagogue. '
  '11':
  - type: text
    content: 'Il s’y trouvait une femme qui, depuis dix-huit ans, était sous l’emprise d’un esprit qui la rendait infirme : elle était voûtée et n’arrivait absolument pas à se redresser. '
  '12':
  - type: text
    content: 'Lorsque Jésus la vit, il l’appela et lui dit : '
  - type: text
    content: Femme, tu es délivrée de ton infirmité !
  '13':
  - type: text
    content: Il posa ses mains sur elle et, immédiatement, elle se redressa et se mit à louer Dieu.
  '14':
  - type: text
    content: 'Mais le responsable de la synagogue fut fâché que Jésus ait fait cette guérison le jour du sabbat. S’adressant à la foule, il lui dit : Il y a six jours pour travailler : venez donc vous faire guérir ces jours-là, mais pas le jour du sabbat !'
  '15':
  - type: text
    content: 'Le Seigneur lui répondit : '
  - type: text
    content: Hypocrites que vous êtes ! Chacun de vous ne détache-t-il pas son bœuf ou son âne de la mangeoire pour le mener à l’abreuvoir le jour du sabbat ?
  - type: text
    content: ' '
  '16':
  - type: text
    content: Et cette femme, qui est une fille d’
  - type: text
    content: Abraham
  - type: text
    content: ', et que '
  - type: text
    content: Satan
  - type: text
    content: ' tenait en son pouvoir depuis dix-huit ans, fallait-il ne pas la délivrer de sa chaîne aujourd’hui parce que c’est le jour du sabbat ?'
  '17':
  - type: text
    content: Cette réponse de Jésus remplit de confusion tous ceux qui avaient pris parti contre lui, tandis que le peuple était enthousiasmé de le voir accomplir tant d’œuvres merveilleuses.
  - type: heading
    content: Les paraboles de la graine de moutarde et du levain
  - type: heading
    content: (Mt 13.31-33 ; Mc 4.30-32)
  '18':
  - type: text
    content: 'Jésus dit alors : '
  - type: text
    content: 'A quoi ressemble le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: '  ? A quoi pourrais-je le comparer ?'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Il ressemble à une graine de moutarde qu’un homme a prise pour la semer dans son jardin ; la graine pousse jusqu’à devenir un arbuste, et les oiseaux du ciel nichent dans ses branches.
  '2':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Pensez-vous que ces Galiléens ont subi un sort si cruel parce qu’ils étaient de plus grands pécheurs que tous leurs compatriotes ?
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Puis il ajouta : '
  - type: text
    content: A quoi comparerai-je encore le royaume de Dieu ?
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Il ressemble à du '
  - type: text
    content: levain
  - type: text
    content: ' qu’une femme a pris pour le mélanger à une vingtaine de kilogrammes de farine. Et à la fin, toute la pâte a levé.'
  - type: heading
    content: L’entrée dans le royaume
  '22':
  - type: text
    content: Jésus traversait ainsi les villes et les villages ; il y enseignait, tout en se dirigeant vers Jérusalem.
  - type: heading
    content: (Mt 7.13-14)
  '23':
  - type: text
    content: 'Quelqu’un lui demanda : Seigneur, n’y a-t-il qu’un petit nombre de gens qui seront sauvés ?'
  - type: text
    content: 'Il répondit en s’adressant à tous ceux qui étaient là : '
  '24':
  - type: text
    content: Faites tous vos efforts pour entrer par la porte étroite, car nombreux sont ceux qui chercheront à entrer et n’y parviendront pas.
  - type: heading
    content: (Mt 25.10-12)
  '25':
  - type: text
    content: ' '
  - type: text
    content: 'Dès que le maître de la maison se sera levé et qu’il aura fermé la porte à clé, si vous êtes restés dehors, vous aurez beau frapper à la porte en suppliant : « Seigneur, Seigneur, ouvre-nous ! » il vous répondra : « Je ne sais pas d’où vous venez. »'
  - type: heading
    content: (Mt 7.22-23)
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Alors vous direz : « Mais nous étions à table avec toi, nous avons mangé et bu sous tes yeux. Tu as enseigné dans nos rues… »'
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Il vous répondra : « Je ne sais pas d’où vous venez. Allez-vous-en, vous qui commettez le mal. »'
  '28':
  - type: text
    content: ' '
  - type: text
    content: 'C’est là qu’il y aura des pleurs et d’amers regrets, quand vous verrez '
  - type: text
    content: Abraham
  - type: text
    content: ', '
  - type: text
    content: Isaac
  - type: text
    content: ' et '
  - type: text
    content: Jacob
  - type: text
    content: ' et tous les '
  - type: text
    content: prophètes
  - type: text
    content: ' dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ', tandis que vous-mêmes vous en serez exclus.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Des hommes viendront de l’Orient et de l’Occident, du Nord et du Midi, et prendront place à table dans le royaume de Dieu.
  '3':
  - type: text
    content: Non, je vous le dis ; mais vous, si vous ne changez pas, vous périrez tous, vous aussi.
  '30':
  - type: text
    content: ' '
  - type: text
    content: Alors, certains de ceux qui sont les derniers seront les premiers ; et certains de ceux qui sont les premiers seront les derniers.
  - type: heading
    content: Jésus poursuit sa route vers Jérusalem
  '31':
  - type: text
    content: 'A ce moment-là, quelques pharisiens s’approchèrent de Jésus et l’avertirent : Tu devrais quitter cette région et aller loin d’ici, car Hérode veut te faire mourir.'
  '32':
  - type: text
    content: 'Mais Jésus leur répondit : '
  - type: text
    content: 'Allez dire de ma part à ce renard : « Aujourd’hui, je chasse des démons et je guéris des malades ; demain, je ferai de même et après-demain, j’aurai achevé ma tâche.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Mais il faut que je poursuive ma route aujourd’hui, demain et après-demain, car il est impensable qu’un '
  - type: text
    content: prophète
  - type: text
    content: ' soit mis à mort ailleurs qu’à '
  - type: text
    content: Jérusalem
  - type: text
    content: '  ! »'
  - type: heading
    content: (Mt 23.37-39)
  '34':
  - type: text
    content: ' '
  - type: text
    content: Ah, Jérusalem ! Jérusalem ! Toi qui fais mourir les prophètes et qui lapides ceux que Dieu t’envoie ! Combien de fois j’ai voulu rassembler tes habitants auprès de moi comme une poule rassemble ses poussins sous ses ailes ! Mais vous ne l’avez pas voulu !
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Eh bien, maintenant, votre maison va être livrée à l’abandon. Oui, je vous le déclare : dorénavant vous ne me verrez plus jusqu’à ce que le temps soit arrivé où vous direz'
  - type: note
    content: 'Certains manuscrits ont : jusqu’à ce que vous disiez (voir Mt 23.39).'
  - type: text
    content: ': '
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur
  - type: note
    content: 'Ps 118.26. Autre traduction : Béni soit, au nom du Seigneur, celui qui vient !'
  - type: text
    content: '!'
  '4':
  - type: text
    content: ' '
  - type: text
    content: Rappelez-vous ces dix-huit personnes qui ont été tuées quand la tour de Siloé
  - type: text
    content: ' '
  - type: note
    content: Source située au sud de Jérusalem, où on avait élevé une tour.
  - type: text
    content: 's’est effondrée sur elles. Croyez-vous qu’elles aient été plus coupables que tous les autres habitants de '
  - type: text
    content: Jérusalem
  - type: text
    content: '  ?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Non, je vous le dis ; mais vous aussi, si vous ne changez pas, vous périrez tous.
  '6':
  - type: text
    content: 'Là-dessus, il leur raconta cette parabole : '
  - type: text
    content: Un homme avait un figuier dans sa vigne. Un jour, il voulut y cueillir des figues, mais n’en trouva pas.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Il dit alors à celui qui s’occupait de sa vigne : « Voilà trois ans que je viens chercher des figues sur cet arbre, sans pouvoir en trouver. Coupe-le ; je ne vois pas pourquoi il occupe la place inutilement. »'
  - type: text
    content: ' '
  '8':
  - type: text
    content: « Maître, lui répondit l’homme, laisse-le encore cette année ! Je bêcherai encore la terre tout autour et j’y mettrai du fumier ;
  - type: text
    content: ' '
  '9':
  - type: text
    content: peut-être qu’il portera du fruit à la saison prochaine. Sinon, tu le feras couper. »
  - type: heading
    content: Une guérison le jour du sabbat
