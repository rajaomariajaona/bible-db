document_id: PHP.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul et Timothée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timothée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a collaboré avec Paul à la fondation de l’Eglise à Philippes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 16
        - type: text
          text: ). Il est auprès de l’apôtre au moment de la rédaction de la lettre.
      marker-yv: yv-n
    - type: text
      text: ', serviteurs de Jésus-Christ, saluent tous ceux qui, par leur union à Jésus-Christ, sont membres du peuple saint, et qui vivent à Philippes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Philippes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était une colonie romaine en Macédoine (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.15'
        - type: text
          text: '). Paul y avait fondé l’Eglise lors de son deuxième voyage missionnaire (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 16.12
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', ainsi que les dirigeants de l’Eglise et les diacres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mot grec qui a donné par francisation le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'diacre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifiait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'serviteur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il est devenu, dans certaines des Eglises primitives, un titre désignant sans doute des assistants des dirigeants des Eglises.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'pour que vous puissiez discerner ce qui est important. Ainsi vous serez purs et irréprochables au jour de Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: où vous paraîtrez devant lui chargés d’œuvres justes, ce fruit que Jésus-Christ aura produit en vous, à la gloire et à la louange de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nouvelles de Paul et de son ministère
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je tiens à ce que vous le sachiez, frères et sœurs : ce qui m’est arrivé a plutôt servi la cause de l’Evangile. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En effet, toute la garde prétorienne et tous les autres savent que c’est parce que je sers Christ que je suis en prison. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: De plus, mon emprisonnement a encouragé la plupart des frères et sœurs à faire confiance au Seigneur ; aussi redoublent-ils d’audace pour annoncer sans crainte la Parole de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Dieu sont absents de certains manuscrits.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quelques-uns, il est vrai, sont poussés par la jalousie et par un esprit de rivalité. Mais d’autres annoncent Christ dans un bon esprit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ces derniers agissent par amour. Ils savent que si je suis ici, c’est pour défendre l’Evangile. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Quant aux premiers, ils annoncent Christ dans un esprit de rivalité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: égoïsme.
      marker-yv: yv-n
    - type: text
      text: ', avec des motifs qui ne sont pas innocents : ils veulent rendre ma captivité encore plus pénible.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Qu’importe, après tout ! De toute façon, que ce soit avec des arrière-pensées ou en toute sincérité, Christ est annoncé, et je m’en réjouis. Mieux encore : je continuerai à m’en réjouir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Car je suis certain que toutes ces épreuves aboutiront à mon salut, grâce à vos prières pour moi et à l’assistance de l’Esprit de Jésus-Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de reconnaissance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Car ce que j’attends et que j’espère de toutes mes forces, c’est de n’avoir à rougir de rien mais, au contraire, maintenant comme toujours, de manifester en ma personne, avec une pleine assurance, la grandeur de Christ, soit par ma vie, soit par ma mort. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pour moi, en effet, la vie, c’est Christ, et la mort est un gain. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais si je continue à vivre dans ce monde, alors je pourrai encore porter du fruit par mon activité. Je ne sais donc pas que choisir.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je suis tiraillé de deux côtés : j’ai le désir de quitter cette vie pour être avec Christ, car c’est, de loin, le meilleur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais il est plus nécessaire que je demeure dans ce monde à cause de vous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Cela, j’en suis convaincu. Je sais donc que je resterai et que je demeurerai parmi vous tous, pour contribuer à votre progrès et à votre joie dans la foi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ainsi, lorsque je serai de retour chez vous, vous aurez encore plus de raisons, à cause de moi, de placer votre fierté en Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le combat pour la foi
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Quoi qu’il en soit, menez une vie digne de l’Evangile de Christ, en vrais citoyens de son royaume. Ainsi, que je vienne vous voir ou que je reste loin de vous, je pourrai apprendre que vous tenez bon, unis par un même esprit, luttant ensemble d’un même cœur pour la foi fondée sur l’Evangile, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'sans vous laisser intimider en rien par les adversaires. C’est pour eux le signe qu’ils courent à leur perte, et pour vous celui que vous êtes sauvés. Et cela vient de Dieu. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Car en ce qui concerne Christ, Dieu vous a accordé la grâce, non seulement de croire en lui, mais encore de souffrir pour lui. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J’exprime à mon Dieu ma reconnaissance chaque fois que je pense à vous ; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Vous êtes en effet engagés dans le même combat que moi, ce combat que vous m’avez vu soutenir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion aux persécutions endurées par l’apôtre lors de la fondation de l’Eglise à Philippes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 16.19-24
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et que je soutiens encore maintenant, comme vous le savez.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'je prie pour vous tous en toute occasion, et c’est toujours avec joie que je le fais. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Oui, je remercie Dieu pour votre solidarité qui, depuis le premier jour jusqu’à maintenant, a contribué à l’annonce de l’Evangile. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et, j’en suis fermement persuadé : celui qui a commencé en vous son œuvre bonne la poursuivra jusqu’à son achèvement au jour de Jésus-Christ.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tels sont mes sentiments envers vous tous ; et il est juste que je les éprouve ; en effet, vous occupez une place particulière dans mon cœur, car vous prenez tous une part active à la grâce que Dieu m’accorde, aussi bien quand je suis enchaîné dans ma cellule
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul est en prison soit à Ephèse ou à Césarée, soit à Rome où il a été transféré et enchaîné dans la prison du prétoire en vue de son procès.
      marker-yv: yv-n
    - type: text
      text: ' que lorsque je défends l’Evangile et que je l’établis fermement. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Oui, Dieu m’en est témoin : je vous aime tous de l’affection que vous porte Jésus-Christ'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui me vient de Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et voici ce que je demande dans mes prières : c’est que votre amour gagne de plus en plus en pleine connaissance et en parfait discernement '
