document_id: PHP.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul et Timothée
  - type: note
    content: Timothée a collaboré avec Paul à la fondation de l’Eglise à Philippes (Ac 16). Il est auprès de l’apôtre au moment de la rédaction de la lettre.
  - type: text
    content: ', serviteurs de Jésus-Christ, saluent tous ceux qui, par leur union à Jésus-Christ, sont membres du peuple saint, et qui vivent à Philippes'
  - type: note
    content: Philippes était une colonie romaine en Macédoine (4.15). Paul y avait fondé l’Eglise lors de son deuxième voyage missionnaire (voir Ac 16.12).
  - type: text
    content: ', ainsi que les dirigeants de l’Eglise et les diacres'
  - type: note
    content: Le mot grec qui a donné par francisation le mot diacre signifiait serviteur. Il est devenu, dans certaines des Eglises primitives, un titre désignant sans doute des assistants des dirigeants des Eglises.
  - type: text
    content: .
  '10':
  - type: text
    content: 'pour que vous puissiez discerner ce qui est important. Ainsi vous serez purs et irréprochables au jour de Christ, '
  '11':
  - type: text
    content: où vous paraîtrez devant lui chargés d’œuvres justes, ce fruit que Jésus-Christ aura produit en vous, à la gloire et à la louange de Dieu.
  - type: heading
    content: Nouvelles de Paul et de son ministère
  '12':
  - type: text
    content: 'Je tiens à ce que vous le sachiez, frères et sœurs : ce qui m’est arrivé a plutôt servi la cause de l’Evangile. '
  '13':
  - type: text
    content: 'En effet, toute la garde prétorienne et tous les autres savent que c’est parce que je sers Christ que je suis en prison. '
  '14':
  - type: text
    content: De plus, mon emprisonnement a encouragé la plupart des frères et sœurs à faire confiance au Seigneur ; aussi redoublent-ils d’audace pour annoncer sans crainte la Parole de Dieu
  - type: note
    content: 'Les mots : de Dieu sont absents de certains manuscrits.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Quelques-uns, il est vrai, sont poussés par la jalousie et par un esprit de rivalité. Mais d’autres annoncent Christ dans un bon esprit. '
  '16':
  - type: text
    content: 'Ces derniers agissent par amour. Ils savent que si je suis ici, c’est pour défendre l’Evangile. '
  '17':
  - type: text
    content: Quant aux premiers, ils annoncent Christ dans un esprit de rivalité
  - type: note
    content: 'Autre traduction : égoïsme.'
  - type: text
    content: ', avec des motifs qui ne sont pas innocents : ils veulent rendre ma captivité encore plus pénible.'
  '18':
  - type: text
    content: 'Qu’importe, après tout ! De toute façon, que ce soit avec des arrière-pensées ou en toute sincérité, Christ est annoncé, et je m’en réjouis. Mieux encore : je continuerai à m’en réjouir. '
  '19':
  - type: text
    content: Car je suis certain que toutes ces épreuves aboutiront à mon salut, grâce à vos prières pour moi et à l’assistance de l’Esprit de Jésus-Christ.
  '2':
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Prière de reconnaissance
  '20':
  - type: text
    content: 'Car ce que j’attends et que j’espère de toutes mes forces, c’est de n’avoir à rougir de rien mais, au contraire, maintenant comme toujours, de manifester en ma personne, avec une pleine assurance, la grandeur de Christ, soit par ma vie, soit par ma mort. '
  '21':
  - type: text
    content: 'Pour moi, en effet, la vie, c’est Christ, et la mort est un gain. '
  '22':
  - type: text
    content: Mais si je continue à vivre dans ce monde, alors je pourrai encore porter du fruit par mon activité. Je ne sais donc pas que choisir.
  '23':
  - type: text
    content: 'Je suis tiraillé de deux côtés : j’ai le désir de quitter cette vie pour être avec Christ, car c’est, de loin, le meilleur. '
  '24':
  - type: text
    content: 'Mais il est plus nécessaire que je demeure dans ce monde à cause de vous. '
  '25':
  - type: text
    content: 'Cela, j’en suis convaincu. Je sais donc que je resterai et que je demeurerai parmi vous tous, pour contribuer à votre progrès et à votre joie dans la foi. '
  '26':
  - type: text
    content: Ainsi, lorsque je serai de retour chez vous, vous aurez encore plus de raisons, à cause de moi, de placer votre fierté en Jésus-Christ.
  - type: heading
    content: Le combat pour la foi
  '27':
  - type: text
    content: 'Quoi qu’il en soit, menez une vie digne de l’Evangile de Christ, en vrais citoyens de son royaume. Ainsi, que je vienne vous voir ou que je reste loin de vous, je pourrai apprendre que vous tenez bon, unis par un même esprit, luttant ensemble d’un même cœur pour la foi fondée sur l’Evangile, '
  '28':
  - type: text
    content: 'sans vous laisser intimider en rien par les adversaires. C’est pour eux le signe qu’ils courent à leur perte, et pour vous celui que vous êtes sauvés. Et cela vient de Dieu. '
  '29':
  - type: text
    content: 'Car en ce qui concerne Christ, Dieu vous a accordé la grâce, non seulement de croire en lui, mais encore de souffrir pour lui. '
  '3':
  - type: text
    content: 'J’exprime à mon Dieu ma reconnaissance chaque fois que je pense à vous ; '
  '30':
  - type: text
    content: Vous êtes en effet engagés dans le même combat que moi, ce combat que vous m’avez vu soutenir
  - type: note
    content: Allusion aux persécutions endurées par l’apôtre lors de la fondation de l’Eglise à Philippes (Ac 16.19-24).
  - type: text
    content: ' et que je soutiens encore maintenant, comme vous le savez.'
  '4':
  - type: text
    content: 'je prie pour vous tous en toute occasion, et c’est toujours avec joie que je le fais. '
  '5':
  - type: text
    content: 'Oui, je remercie Dieu pour votre solidarité qui, depuis le premier jour jusqu’à maintenant, a contribué à l’annonce de l’Evangile. '
  '6':
  - type: text
    content: 'Et, j’en suis fermement persuadé : celui qui a commencé en vous son œuvre bonne la poursuivra jusqu’à son achèvement au jour de Jésus-Christ.'
  '7':
  - type: text
    content: Tels sont mes sentiments envers vous tous ; et il est juste que je les éprouve ; en effet, vous occupez une place particulière dans mon cœur, car vous prenez tous une part active à la grâce que Dieu m’accorde, aussi bien quand je suis enchaîné dans ma cellule
  - type: note
    content: Paul est en prison soit à Ephèse ou à Césarée, soit à Rome où il a été transféré et enchaîné dans la prison du prétoire en vue de son procès.
  - type: text
    content: ' que lorsque je défends l’Evangile et que je l’établis fermement. '
  '8':
  - type: text
    content: 'Oui, Dieu m’en est témoin : je vous aime tous de l’affection que vous porte Jésus-Christ'
  - type: note
    content: 'Autre traduction : qui me vient de Jésus-Christ.'
  - type: text
    content: .
  '9':
  - type: text
    content: 'Et voici ce que je demande dans mes prières : c’est que votre amour gagne de plus en plus en pleine connaissance et en parfait discernement '
