document_id: MAT.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La condamnation des chefs religieux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 12.38-40 ; Lc 11.39-52 ; 20.45-47)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus, s’adressant à la foule et à ses disciples, dit : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne vous faites pas non plus appeler chefs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Matthieu emploie un mot unique dans le Nouveau Testament qui peut désigner aussi l’enseignant, le directeur, le guide.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', car un seul est votre Chef : Christ.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le plus grand parmi vous sera votre serviteur.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car celui qui s’élève sera abaissé ; et celui qui s’abaisse sera élevé.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Parce que vous barrez aux autres l’accès au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: . Non seulement vous n’y entrez pas vous-mêmes, mais vous empêchez d’entrer ceux qui voudraient le faire !
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '['
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites, car vous dépouillez les veuves de leurs biens, tout en faisant de longues prières pour l’apparence. C’est pourquoi votre condamnation n’en sera que plus sévère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verset est absent de plusieurs manuscrits. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 12.40
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ']'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous parcourez terre et mer pour amener ne fût-ce qu’un seul païen à votre religion, et quand vous l’avez gagné, vous lui faites mériter l’enfer deux fois plus que vous.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Malheur à vous, guides aveugles ! En effet, vous dites : Si quelqu’un jure « par le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Temple
      - type: text
        text: '  », il n’est pas tenu par son serment, mais s’il jure « par l’or du Temple », il doit tenir son serment.'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Insensés et aveugles que vous êtes ! Qu’est-ce qui est plus important : l’or ou le Temple qui rend cet or sacré ?'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ou bien vous dites : Si quelqu’un jure « par l’autel », il n’est pas tenu par son serment ; mais s’il jure « par l’offrande qui est sur l’autel », il doit tenir son serment.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Aveugles que vous êtes ! Qu’est-ce qui est plus important : l’offrande ou l’autel qui rend cette offrande sacrée ?'
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: spécialistes de la Loi
      - type: text
        text: ' et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pharisiens
      - type: text
        text: ' sont chargés d’enseigner la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: ' de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: .
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En fait, celui qui jure « par l’autel », jure à la fois par l’autel et par tout ce qui est dessus.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui jure « par le Temple », jure à la fois par le Temple et par celui qui y habite.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui jure « par le ciel », jure à la fois par le trône de Dieu et par celui qui y siège.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous vous acquittez de la dîme sur la menthe, l’anis et le cumin, mais vous laissez de côté ce qu’il y a de plus important dans la Loi, c’est-à-dire la justice, la compassion et la fidélité
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: foi.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . Voilà ce qu’il fallait pratiquer, sans négliger le reste.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Guides aveugles que vous êtes ! Vous filtrez vos boissons pour éliminer le moindre moucheron, mais vous avalez le chameau tout entier.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous nettoyez soigneusement l’extérieur de vos coupes et de vos assiettes, mais vous les remplissez du produit de vos vols et de vos désirs incontrôlés.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pharisien aveugle, commence donc par purifier l’intérieur de la coupe et de l’assiette, alors l’extérieur sera pur.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous êtes comme ces tombeaux crépis de blanc
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Toucher un tombeau rendait rituellement impur. C’est pourquoi on les peignait en blanc (couleur de la pureté) afin qu’on ne les touche pas la nuit par inadvertance.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', qui sont beaux au-dehors. Mais à l’intérieur, il n’y a qu’ossements de cadavres et pourriture.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous de même, à l’extérieur, vous avez l’air d’être justes aux yeux des hommes, mais, à l’intérieur, il n’y a qu’hypocrisie et désobéissance à Dieu.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous édifiez des tombeaux aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ', vous couvrez d’ornements ceux des justes.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites donc tout ce qu’ils vous disent, et réglez votre conduite sur leur enseignement. Mais gardez-vous de prendre modèle sur leurs actes, car ils parlent d’une manière et agissent d’une autre.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vous dites : Si nous avions vécu du temps de nos ancêtres, nous ne nous serions pas associés à eux pour tuer les prophètes.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En disant cela, vous attestez vous-mêmes que vous êtes bien les descendants de ceux qui ont fait périr les prophètes.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eh bien, ce que vos pères ont commencé, portez-le à son comble !
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Serpents, race de vipères ! Comment pouvez-vous penser que vous éviterez le châtiment de l’enfer ?
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, je vais vous envoyer des prophètes, des sages et des spécialistes de l’Ecriture : vous allez tuer ou crucifier les uns, fouetter les autres dans vos synagogues, et les persécuter d’une ville à l’autre,'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pour que retombe sur vous le châtiment qu’appelle le meurtre de tous les innocents, depuis celui d’Abel, le juste, jusqu’à celui de Zacharie, fils de Barachie, que vous avez assassiné entre le Temple et l’autel du sacrifice.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Oui, vraiment, je vous l’assure : le châtiment mérité par tous ces meurtres retombera sur les hommes de cette génération.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lamentation sur Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 13.34-35)
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ah, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jérusalem
      - type: text
        text: '  ! Jérusalem ! Toi qui fais mourir les prophètes et qui lapides ceux que Dieu t’envoie ! Combien de fois j’ai voulu rassembler tes habitants auprès de moi comme une poule rassemble ses poussins sous ses ailes ! Mais vous ne l’avez pas voulu !'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant, votre maison va être abandonnée et restera déserte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits omettent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déserte.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, je vous le déclare : Désormais, vous ne me verrez plus jusqu’à ce que vous disiez : '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Béni soit celui qui vient au nom du Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.39 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 118.26
        - type: text
          text: ' . Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Béni soit, au nom du Seigneur, celui qui vient !
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: '!'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils lient de pesants fardeaux et les placent sur les épaules des hommes ; mais ils ne bougeraient même pas le petit doigt pour les déplacer.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Dans tout ce qu’ils font, ils agissent pour être vus des hommes. Ainsi, les petits coffrets à versets qu’ils portent pendant la prière sont plus grands que ceux des autres, et les franges de leurs manteaux plus longues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour la prière, les Juifs portaient des tephillins ou phylactères. Il s’agissait de deux petites boîtes fixées à des lanières que l’on attachait, l’une sur le front, l’autre sur le bras gauche, et qui contenaient des bandes de parchemins sur lesquels étaient inscrits des versets de la Loi. Cette coutume était vue comme obéissant à l’injonction de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 6.8
        - type: text
          text: '. Les Juifs pieux ornaient aussi leurs vêtements de franges, qui devaient leur rappeler les commandements de la Loi, selon ce qui était demandé en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 22.12
        - type: text
          text: . Certains devaient avoir des franges particulièrement longues, pour faire étalage de leur piété.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ils affectionnent les meilleures places dans les banquets et les sièges d’honneur dans les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: synagogues
      - type: text
        text: .
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ils aiment qu’on les salue sur les places publiques et qu’on les appelle « Maître ».
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais vous, ne vous faites pas appeler « Maître », car pour vous, il n’y a qu’un seul Maître, et vous êtes tous frères.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne donnez pas non plus à quelqu’un, ici-bas, le titre de « Père », car pour vous, il n’y a qu’un seul Père : le Père céleste.'
    - type: text
      text: ' '
