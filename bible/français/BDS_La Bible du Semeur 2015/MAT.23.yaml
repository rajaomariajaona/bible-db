document_id: MAT.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La condamnation des chefs religieux
  - type: heading
    content: (Mc 12.38-40 ; Lc 11.39-52 ; 20.45-47)
  - type: text
    content: 'Alors Jésus, s’adressant à la foule et à ses disciples, dit : '
  '10':
  - type: text
    content: Ne vous faites pas non plus appeler chefs
  - type: note
    content: Matthieu emploie un mot unique dans le Nouveau Testament qui peut désigner aussi l’enseignant, le directeur, le guide.
  - type: text
    content: ', car un seul est votre Chef : Christ.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: Le plus grand parmi vous sera votre serviteur.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Car celui qui s’élève sera abaissé ; et celui qui s’abaisse sera élevé.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Parce que vous barrez aux autres l’accès au '
  - type: text
    content: royaume des cieux
  - type: text
    content: . Non seulement vous n’y entrez pas vous-mêmes, mais vous empêchez d’entrer ceux qui voudraient le faire !
  '14':
  - type: text
    content: '['
  - type: text
    content: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites, car vous dépouillez les veuves de leurs biens, tout en faisant de longues prières pour l’apparence. C’est pourquoi votre condamnation n’en sera que plus sévère
  - type: note
    content: Ce verset est absent de plusieurs manuscrits. Voir Mc 12.40.
  - type: text
    content: .
  - type: text
    content: ']'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous parcourez terre et mer pour amener ne fût-ce qu’un seul païen à votre religion, et quand vous l’avez gagné, vous lui faites mériter l’enfer deux fois plus que vous.
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Malheur à vous, guides aveugles ! En effet, vous dites : Si quelqu’un jure « par le '
  - type: text
    content: Temple
  - type: text
    content: '  », il n’est pas tenu par son serment, mais s’il jure « par l’or du Temple », il doit tenir son serment.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Insensés et aveugles que vous êtes ! Qu’est-ce qui est plus important : l’or ou le Temple qui rend cet or sacré ?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Ou bien vous dites : Si quelqu’un jure « par l’autel », il n’est pas tenu par son serment ; mais s’il jure « par l’offrande qui est sur l’autel », il doit tenir son serment.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Aveugles que vous êtes ! Qu’est-ce qui est plus important : l’offrande ou l’autel qui rend cette offrande sacrée ?'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Les '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: ' et les '
  - type: text
    content: pharisiens
  - type: text
    content: ' sont chargés d’enseigner la '
  - type: text
    content: Loi
  - type: text
    content: ' de '
  - type: text
    content: Moïse
  - type: text
    content: .
  - type: text
    content: ' '
  '20':
  - type: text
    content: En fait, celui qui jure « par l’autel », jure à la fois par l’autel et par tout ce qui est dessus.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Celui qui jure « par le Temple », jure à la fois par le Temple et par celui qui y habite.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Celui qui jure « par le ciel », jure à la fois par le trône de Dieu et par celui qui y siège.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous vous acquittez de la dîme sur la menthe, l’anis et le cumin, mais vous laissez de côté ce qu’il y a de plus important dans la Loi, c’est-à-dire la justice, la compassion et la fidélité
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : foi.'
  - type: text
    content: . Voilà ce qu’il fallait pratiquer, sans négliger le reste.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Guides aveugles que vous êtes ! Vous filtrez vos boissons pour éliminer le moindre moucheron, mais vous avalez le chameau tout entier.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous nettoyez soigneusement l’extérieur de vos coupes et de vos assiettes, mais vous les remplissez du produit de vos vols et de vos désirs incontrôlés.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Pharisien aveugle, commence donc par purifier l’intérieur de la coupe et de l’assiette, alors l’extérieur sera pur.
  '27':
  - type: text
    content: ' '
  - type: text
    content: Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous êtes comme ces tombeaux crépis de blanc
  - type: text
    content: ' '
  - type: note
    content: Toucher un tombeau rendait rituellement impur. C’est pourquoi on les peignait en blanc (couleur de la pureté) afin qu’on ne les touche pas la nuit par inadvertance.
  - type: text
    content: ', qui sont beaux au-dehors. Mais à l’intérieur, il n’y a qu’ossements de cadavres et pourriture.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Vous de même, à l’extérieur, vous avez l’air d’être justes aux yeux des hommes, mais, à l’intérieur, il n’y a qu’hypocrisie et désobéissance à Dieu.
  '29':
  - type: text
    content: ' '
  - type: text
    content: 'Malheur à vous, spécialistes de la Loi et pharisiens hypocrites ! Vous édifiez des tombeaux aux '
  - type: text
    content: prophètes
  - type: text
    content: ', vous couvrez d’ornements ceux des justes.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Faites donc tout ce qu’ils vous disent, et réglez votre conduite sur leur enseignement. Mais gardez-vous de prendre modèle sur leurs actes, car ils parlent d’une manière et agissent d’une autre.
  '30':
  - type: text
    content: 'Vous dites : Si nous avions vécu du temps de nos ancêtres, nous ne nous serions pas associés à eux pour tuer les prophètes.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: En disant cela, vous attestez vous-mêmes que vous êtes bien les descendants de ceux qui ont fait périr les prophètes.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Eh bien, ce que vos pères ont commencé, portez-le à son comble !
  '33':
  - type: text
    content: ' '
  - type: text
    content: Serpents, race de vipères ! Comment pouvez-vous penser que vous éviterez le châtiment de l’enfer ?
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'En effet, je vais vous envoyer des prophètes, des sages et des spécialistes de l’Ecriture : vous allez tuer ou crucifier les uns, fouetter les autres dans vos synagogues, et les persécuter d’une ville à l’autre,'
  - type: text
    content: ' '
  '35':
  - type: text
    content: pour que retombe sur vous le châtiment qu’appelle le meurtre de tous les innocents, depuis celui d’Abel, le juste, jusqu’à celui de Zacharie, fils de Barachie, que vous avez assassiné entre le Temple et l’autel du sacrifice.
  '36':
  - type: text
    content: ' '
  - type: text
    content: 'Oui, vraiment, je vous l’assure : le châtiment mérité par tous ces meurtres retombera sur les hommes de cette génération.'
  - type: heading
    content: Lamentation sur Jérusalem
  - type: heading
    content: (Lc 13.34-35)
  '37':
  - type: text
    content: ' '
  - type: text
    content: 'Ah, '
  - type: text
    content: Jérusalem
  - type: text
    content: '  ! Jérusalem ! Toi qui fais mourir les prophètes et qui lapides ceux que Dieu t’envoie ! Combien de fois j’ai voulu rassembler tes habitants auprès de moi comme une poule rassemble ses poussins sous ses ailes ! Mais vous ne l’avez pas voulu !'
  - type: text
    content: ' '
  '38':
  - type: text
    content: Maintenant, votre maison va être abandonnée et restera déserte
  - type: note
    content: Certains manuscrits omettent déserte.
  - type: text
    content: .
  '39':
  - type: text
    content: ' '
  - type: text
    content: 'En effet, je vous le déclare : Désormais, vous ne me verrez plus jusqu’à ce que vous disiez : '
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Ps 118.26 . Autre traduction : Béni soit, au nom du Seigneur, celui qui vient !'
  - type: text
    content: '!'
  '4':
  - type: text
    content: ' '
  - type: text
    content: Ils lient de pesants fardeaux et les placent sur les épaules des hommes ; mais ils ne bougeraient même pas le petit doigt pour les déplacer.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Dans tout ce qu’ils font, ils agissent pour être vus des hommes. Ainsi, les petits coffrets à versets qu’ils portent pendant la prière sont plus grands que ceux des autres, et les franges de leurs manteaux plus longues
  - type: note
    content: Pour la prière, les Juifs portaient des tephillins ou phylactères. Il s’agissait de deux petites boîtes fixées à des lanières que l’on attachait, l’une sur le front, l’autre sur le bras gauche, et qui contenaient des bandes de parchemins sur lesquels étaient inscrits des versets de la Loi. Cette coutume était vue comme obéissant à l’injonction de Dt 6.8. Les Juifs pieux ornaient aussi leurs vêtements de franges, qui devaient leur rappeler les commandements de la Loi, selon ce qui était demandé en Dt 22.12. Certains devaient avoir des franges particulièrement longues, pour faire étalage de leur piété.
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Ils affectionnent les meilleures places dans les banquets et les sièges d’honneur dans les '
  - type: text
    content: synagogues
  - type: text
    content: .
  - type: text
    content: ' '
  '7':
  - type: text
    content: Ils aiment qu’on les salue sur les places publiques et qu’on les appelle « Maître ».
  '8':
  - type: text
    content: ' '
  - type: text
    content: Mais vous, ne vous faites pas appeler « Maître », car pour vous, il n’y a qu’un seul Maître, et vous êtes tous frères.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Ne donnez pas non plus à quelqu’un, ici-bas, le titre de « Père », car pour vous, il n’y a qu’un seul Père : le Père céleste.'
  - type: text
    content: ' '
