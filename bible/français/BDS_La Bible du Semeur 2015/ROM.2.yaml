document_id: ROM.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Celui qui condamne les autres se condamne lui-même
  - type: text
    content: 'Toi donc, qui que tu sois, qui condamnes autrui, tu n’as aucune excuse, car en condamnant les autres, tu te condamnes toi-même, puisque toi qui les condamnes, tu te conduis comme eux. '
  '10':
  - type: text
    content: 'Mais la gloire à venir, l’honneur et la paix seront accordés à celui qui pratique le bien, quel qu’il soit, d’abord le Juif et aussi le non-Juif, '
  '11':
  - type: text
    content: car Dieu ne fait pas de favoritisme.
  '12':
  - type: text
    content: 'Ceux qui ont péché sans avoir eu connaissance de la Loi de Moïse périront sans qu’elle intervienne dans leur jugement. Mais ceux qui ont péché alors qu’ils étaient soumis au régime de la Loi seront jugés conformément à la Loi. '
  '13':
  - type: text
    content: Car ce ne sont pas ceux qui se contentent d’écouter la lecture de la Loi qui seront justes aux yeux de Dieu. Non, seuls ceux qui appliquent la Loi sont considérés comme justes.
  '14':
  - type: text
    content: 'En effet, lorsque les païens qui n’ont pas la Loi de Moïse accomplissent naturellement ce que demande cette Loi, ils se tiennent lieu de loi à eux-mêmes, alors qu’ils n’ont pas la Loi. '
  '15':
  - type: text
    content: Ils démontrent par leur comportement que les œuvres demandées par la Loi sont inscrites dans leur cœur. Leur conscience en témoigne également, ainsi que les raisonnements par lesquels ils s’accusent ou s’excusent les uns les autres
  - type: note
    content: 'Autre traduction : ils s’accusent ou s’excusent eux-mêmes.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: Tout cela paraîtra le jour
  - type: note
    content: 'Tout cela paraîtra le jour. Autre traduction : Ils anticipent de la sorte sur le jour.'
  - type: text
    content: ' où, conformément à l’Evangile que j’annonce, Dieu jugera par Jésus-Christ tout ce que les hommes ont caché.'
  - type: heading
    content: Les Juifs sont coupables devant Dieu
  '17':
  - type: text
    content: Eh bien, toi qui te donnes le nom de Juif, tu te reposes sur la Loi, tu fais de Dieu ton sujet de fierté
  - type: note
    content: Cf. Ps 34.3.
  - type: text
    content: ', '
  '18':
  - type: text
    content: 'tu connais sa volonté, tu juges de ce qui est le meilleur parce que tu es instruit par la Loi. '
  '19':
  - type: text
    content: 'Tu es certain d’être le guide des aveugles, la lumière de ceux qui errent dans les ténèbres, '
  '2':
  - type: text
    content: Or, nous savons que le jugement de Dieu contre ceux qui agissent ainsi est conforme à la vérité.
  '20':
  - type: text
    content: 'l’éducateur des insensés, l’enseignant des ignorants, tout cela sous prétexte que tu as dans la Loi l’expression parfaite de la connaissance et de la vérité. '
  '21':
  - type: text
    content: 'Toi donc, qui enseignes les autres, tu ne t’enseignes pas toi-même. Tu prêches aux autres de ne pas voler, et tu voles ! '
  '22':
  - type: text
    content: Tu dis de ne pas commettre d’adultère, et tu commets l’adultère ! Tu as les idoles en horreur, et tu commets des sacrilèges
  - type: note
    content: 'Autre traduction : tu en fais le trafic. Certains Juifs collectionnaient ou revendaient des idoles et des objets volés dans les temples païens – contrairement aux exigences de la Loi (Dt 7.25).'
  - type: text
    content: '  ! '
  '23':
  - type: text
    content: 'Tu es fier de posséder la Loi, mais tu déshonores Dieu en y désobéissant ! '
  '24':
  - type: text
    content: 'Et ainsi, comme le dit l’Ecriture, à cause de vous, Juifs, '
  - type: text
    content: le nom de Dieu est outragé parmi les païens
  - type: note
    content: Es 52.5 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '25':
  - type: text
    content: Assurément, être circoncis a un sens – à condition d’appliquer la Loi. Mais, si tu désobéis à la Loi, être circoncis n’a pas plus de valeur que d’être incirconcis.
  '26':
  - type: text
    content: Mais si l’incirconcis accomplit ce que la Loi définit comme juste, cet incirconcis ne sera-t-il pas considéré comme un circoncis ?
  '27':
  - type: text
    content: Et cet homme qui accomplit la Loi sans être physiquement circoncis ne va-t-il pas te condamner, toi qui désobéis à la Loi tout en possédant les Ecritures et la circoncision ?
  '28':
  - type: text
    content: 'Car ce n’est pas ce qui est visible qui fait le Juif, ni la marque visible dans la chair qui fait la circoncision, '
  '29':
  - type: text
    content: mais ce qui fait le Juif c’est ce qui est intérieur, et la vraie circoncision est celle que l’Esprit opère dans le cœur et non celle que l’on pratique en obéissant à la lettre de la Loi.
  - type: text
    content: Tel est le Juif qui reçoit sa louange, non des hommes, mais de Dieu.
  '3':
  - type: text
    content: 'T’imaginerais-tu, toi qui condamnes ceux qui commettent de tels actes, et qui te comportes comme eux, que tu vas échapper à la condamnation divine ? '
  '4':
  - type: text
    content: Ou alors, méprises-tu les trésors de bonté, de patience et de générosité déployés par Dieu, sans te rendre compte que sa bonté veut t’amener à changer
  - type: note
    content: 'Autres traductions : à te repentir ou à changer d’attitude ou à changer de comportement.'
  - type: text
    content: '  ?'
  '5':
  - type: text
    content: Par ton entêtement et ton refus de changer, tu te prépares un châtiment d’autant plus grand pour le jour où se manifesteront la colère et le juste jugement de Dieu.
  '6':
  - type: text
    content: 'Ce jour-là, '
  - type: text
    content: il donnera à chacun ce que lui auront valu ses actes
  - type: note
    content: Ps 62.13.
  - type: text
    content: .
  '7':
  - type: text
    content: Ceux qui, en pratiquant le bien avec persévérance, cherchent la gloire à venir, l’honneur et l’immortalité, recevront de lui la vie éternelle
  - type: note
    content: Dans les v. 7-8, Paul explicite le principe de la Loi qu’il a énoncé au v. 6.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Mais, à ceux qui, par ambition personnelle
  - type: note
    content: 'Ou : par esprit de contestation, ou de rivalité.'
  - type: text
    content: ', repoussent la vérité et cèdent à l’injustice, Dieu réserve sa colère et sa fureur.'
  '9':
  - type: text
    content: Oui, la souffrance et l’angoisse attendent tout homme qui pratique le mal, le Juif en premier lieu et aussi le non-Juif.
