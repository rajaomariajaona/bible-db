document_id: ROM.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Celui qui condamne les autres se condamne lui-même
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toi donc, qui que tu sois, qui condamnes autrui, tu n’as aucune excuse, car en condamnant les autres, tu te condamnes toi-même, puisque toi qui les condamnes, tu te conduis comme eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais la gloire à venir, l’honneur et la paix seront accordés à celui qui pratique le bien, quel qu’il soit, d’abord le Juif et aussi le non-Juif, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: car Dieu ne fait pas de favoritisme.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ceux qui ont péché sans avoir eu connaissance de la Loi de Moïse périront sans qu’elle intervienne dans leur jugement. Mais ceux qui ont péché alors qu’ils étaient soumis au régime de la Loi seront jugés conformément à la Loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Car ce ne sont pas ceux qui se contentent d’écouter la lecture de la Loi qui seront justes aux yeux de Dieu. Non, seuls ceux qui appliquent la Loi sont considérés comme justes.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En effet, lorsque les païens qui n’ont pas la Loi de Moïse accomplissent naturellement ce que demande cette Loi, ils se tiennent lieu de loi à eux-mêmes, alors qu’ils n’ont pas la Loi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ils démontrent par leur comportement que les œuvres demandées par la Loi sont inscrites dans leur cœur. Leur conscience en témoigne également, ainsi que les raisonnements par lesquels ils s’accusent ou s’excusent les uns les autres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s’accusent ou s’excusent eux-mêmes.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tout cela paraîtra le jour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tout cela paraîtra le jour. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ils anticipent de la sorte sur le jour.
      marker-yv: yv-n
    - type: text
      text: ' où, conformément à l’Evangile que j’annonce, Dieu jugera par Jésus-Christ tout ce que les hommes ont caché.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Juifs sont coupables devant Dieu
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Eh bien, toi qui te donnes le nom de Juif, tu te reposes sur la Loi, tu fais de Dieu ton sujet de fierté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 34.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'tu connais sa volonté, tu juges de ce qui est le meilleur parce que tu es instruit par la Loi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu es certain d’être le guide des aveugles, la lumière de ceux qui errent dans les ténèbres, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Or, nous savons que le jugement de Dieu contre ceux qui agissent ainsi est conforme à la vérité.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'l’éducateur des insensés, l’enseignant des ignorants, tout cela sous prétexte que tu as dans la Loi l’expression parfaite de la connaissance et de la vérité. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Toi donc, qui enseignes les autres, tu ne t’enseignes pas toi-même. Tu prêches aux autres de ne pas voler, et tu voles ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tu dis de ne pas commettre d’adultère, et tu commets l’adultère ! Tu as les idoles en horreur, et tu commets des sacrilèges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu en fais le trafic. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains Juifs collectionnaient ou revendaient des idoles et des objets volés dans les temples païens – contrairement aux exigences de la Loi (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 7.25
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tu es fier de posséder la Loi, mais tu déshonores Dieu en y désobéissant ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Et ainsi, comme le dit l’Ecriture, à cause de vous, Juifs, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le nom de Dieu est outragé parmi les païens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 52.5
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Assurément, être circoncis a un sens – à condition d’appliquer la Loi. Mais, si tu désobéis à la Loi, être circoncis n’a pas plus de valeur que d’être incirconcis.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mais si l’incirconcis accomplit ce que la Loi définit comme juste, cet incirconcis ne sera-t-il pas considéré comme un circoncis ?
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Et cet homme qui accomplit la Loi sans être physiquement circoncis ne va-t-il pas te condamner, toi qui désobéis à la Loi tout en possédant les Ecritures et la circoncision ?
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Car ce n’est pas ce qui est visible qui fait le Juif, ni la marque visible dans la chair qui fait la circoncision, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: mais ce qui fait le Juif c’est ce qui est intérieur, et la vraie circoncision est celle que l’Esprit opère dans le cœur et non celle que l’on pratique en obéissant à la lettre de la Loi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel est le Juif qui reçoit sa louange, non des hommes, mais de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'T’imaginerais-tu, toi qui condamnes ceux qui commettent de tels actes, et qui te comportes comme eux, que tu vas échapper à la condamnation divine ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ou alors, méprises-tu les trésors de bonté, de patience et de générosité déployés par Dieu, sans te rendre compte que sa bonté veut t’amener à changer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à te repentir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à changer d’attitude '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à changer de comportement.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Par ton entêtement et ton refus de changer, tu te prépares un châtiment d’autant plus grand pour le jour où se manifesteront la colère et le juste jugement de Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce jour-là, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il donnera à chacun ce que lui auront valu ses actes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 62.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ceux qui, en pratiquant le bien avec persévérance, cherchent la gloire à venir, l’honneur et l’immortalité, recevront de lui la vie éternelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans les v. 7-8, Paul explicite le principe de la Loi qu’il a énoncé au v. 6.
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais, à ceux qui, par ambition personnelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par esprit de contestation, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de rivalité.
      marker-yv: yv-n
    - type: text
      text: ', repoussent la vérité et cèdent à l’injustice, Dieu réserve sa colère et sa fureur.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Oui, la souffrance et l’angoisse attendent tout homme qui pratique le mal, le Juif en premier lieu et aussi le non-Juif.
