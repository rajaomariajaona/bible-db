  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Un cri se fait entendre, ╵venant de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
