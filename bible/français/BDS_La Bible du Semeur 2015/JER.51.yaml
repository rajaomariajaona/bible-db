      text: et ils s’endormiront ╵d’un sommeil éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans plus se réveiller.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵le roi qui a pour nom ╵le Seigneur des armées célestes.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les larges murs de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront démantelés ;
  - type: usfm
    marker: q1
    children:
    - type: text
