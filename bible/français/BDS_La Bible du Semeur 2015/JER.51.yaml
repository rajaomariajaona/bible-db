document_id: JER.51,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La chute de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce que déclare l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire souffler ╵sur Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur les habitants ╵de Lev Qamaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lev Qamaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le cœur de mes adversaires. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est, en hébreu, une manière codée d’écrire le nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chaldéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui désigne les Babyloniens, selon le procédé d’écriture athbesh, qui consiste à remplacer la première lettre de l’alphabet par la dernière, et ainsi de suite. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '25.26'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un vent de destruction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L’Eternel nous a fait justice ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez, racontons à Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que l’Eternel notre Dieu a fait. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Les Mèdes : instruments du jugement de Dieu'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Aiguisez bien les flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prenez vos boucliers !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a excité ╵l’esprit des rois des Mèdes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a résolu ╵de ruiner Babylone ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera la rétribution, ╵que l’Eternel exercera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi il lui fera payer ╵ce qu’elle a fait contre son temple.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dressez vos étendards ╵contre les murs de Babylone !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et renforcez la garde !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Postez des sentinelles !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dressez des embuscades !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car voici, l’Eternel ╵a conçu un dessein :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qu’il a prononcé ╵contre les habitants de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il le réalise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O toi, qui es assise ╵sur les bords du grand fleuve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Réminiscence en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 17.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui es riche en trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta fin est arrivée, ╵à la mesure ╵de tes gains malhonnêtes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la mesure est comble '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le fil de ta vie est coupé.
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le Seigneur des armées célestes ╵l’a juré par lui-même :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te remplirai d’hommes ╵comme de sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils pousseront sur toi ╵le cri de la victoire !
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le Dieu créateur, maître de l’histoire
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lui, il a fait la terre ╵par sa puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a solidement ╵fondé le monde ╵par sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a déployé le ciel ╵par son intelligence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 15-19 sont parallèles à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 10.12-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quand il fait retentir sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des torrents d’eau ╵s’amassent dans le ciel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des nuages s’élèvent ╵des confins de la terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait jaillir l’éclair ╵au milieu des averses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il fait s’élancer ╵le vent de ses réserves.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Alors tout être humain ╵reste hébété ╵et ne comprend plus rien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout orfèvre est honteux ╵de son idole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car sa statue de fonte ╵est une tromperie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui n’a en elle ╵aucun souffle de vie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils ne sont que néant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et œuvres illusoires ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils disparaîtront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour du châtiment.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Combien est différent ╵« le Dieu qui est la part ╵du peuple de Jacob » !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a tout façonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Israël
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce mot manque dans le texte hébreu traditionnel mais se trouve dans de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la Vulgate et le targoum, ainsi qu’en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 10.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' est le peuple ╵qui constitue son patrimoine,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ce Dieu a pour nom : ╵le Seigneur des armées célestes.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Babylone tombera
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J’enverrai contre Babylone ╵des étrangers pour la vanner
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils feront le vide ╵dans son pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, au jour du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils surgiront ╵de tous côtés contre elle.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Toi, tu étais pour moi ╵comme un marteau, ╵une arme de combat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi, j’ai pilonné ╵bien des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi, j’ai détruit des royaumes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Par toi, j’ai pilonné ╵chevaux et cavaliers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai pilonné des chars ╵avec ceux qui les conduisaient.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Par toi, j’ai pilonné ╵des hommes et des femmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi, j’ai pilonné ╵des vieillards, des enfants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi, j’ai pilonné ╵des jeunes hommes, ╵des jeunes filles.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Par toi, j’ai pilonné ╵le berger avec son troupeau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi, j’ai pilonné ╵le fermier et ses bœufs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi, j’ai pilonné ╵gouverneurs et préfets.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je rends à Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu’à tous les habitants ╵de la Chaldée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le mal qu’ils ont fait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous vos regards, ╵à l’égard de Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sous vos regards, je rends à Babylone… tout le mal qu’ils ont fait à l’égard de Sion.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je vais m’en prendre à toi, ╵montagne destructrice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui dévastes toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lève la main contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te ferai rouler ╵du haut de tes rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai de toi ╵une montagne calcinée,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: et l’on ne prendra plus ╵de toi ni pierre d’angle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni pierres pour les fondations ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu seras ╵pour toujours dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Elevez l’étendard ╵à travers le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sonnez du cor ╵parmi les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et convoquez les peuples ╵pour combattre contre elle !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appelez les royaumes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’Ararat, de Minni ╵et d’Ashkenaz contre elle ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nommez des généraux ╵pour l’attaquer ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lancez des chevaux à l’attaque ╵comme un essaim de sauterelles ╵qui se hérissent !
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Convoquez donc les peuples ╵pour combattre contre elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rois de la Médie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses gouverneurs et ses préfets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les territoires ╵sous sa domination.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: La terre est ébranlée, ╵elle vacille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les desseins que l’Eternel ╵a conçus contre Babylone ╵se réalisent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour changer son pays ╵en une terre dévastée ╵et privée d’habitants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les archers n’auront pas le temps ╵de bander l’arc
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on ne pourra pas ╵revêtir sa cuirasse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pas de pitié ╵pour ses jeunes soldats !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exterminez ╵son armée tout entière ╵pour me la consacrer.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Car les guerriers de Babylone ╵ont cessé de combattre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont restés ╵à l’intérieur des forteresses ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'leur force est épuisée :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les voilà devenus ╵comme des femmelettes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses maisons sont en feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les verrous de ses portes ╵ont été mis en pièces.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les courriers courent ╵et rejoignent d’autres courriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les messagers d’autres messagers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour annoncer ╵au roi de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, de tous les côtés, ╵sa ville est prise.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: « Les gués sont occupés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les roseaux sont en feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les soldats sont pris d’épouvante ! »
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, la population de Babylone ╵est pareille à une aire ╵au temps où on la foule.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un peu de temps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’heure des récoltes ╵sera venue pour elle.
  - type: usfm
    marker: s2
    children:
    - type: text
