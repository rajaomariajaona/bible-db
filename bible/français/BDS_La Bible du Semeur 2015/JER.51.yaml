    content: Babylone est tombée ╵soudainement, ╵elle est brisée.
  - type: text
    content: Lamentez-vous sur elle ! ╵« Mettez du baume sur ses plaies,
  - type: text
    content: et peut-être guérira-t-elle ! »
  '9':
