document_id: JER.51,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La chute de Babylone
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: Je vais faire souffler ╵sur Babylone
  - type: text
    content: et sur les habitants ╵de Lev Qamaï
  - type: note
    content: 'Lev Qamaï signifie : le cœur de mes adversaires. C’est, en hébreu, une manière codée d’écrire le nom chaldéens qui désigne les Babyloniens, selon le procédé d’écriture athbesh, qui consiste à remplacer la première lettre de l’alphabet par la dernière, et ainsi de suite. Voir 25.26.'
  - type: text
    content: ','
  - type: text
    content: un vent de destruction.
  '10':
  - type: text
    content: L’Eternel nous a fait justice ;
  - type: text
    content: venez, racontons à Sion
  - type: text
    content: ce que l’Eternel notre Dieu a fait. »
  - type: heading
    content: 'Les Mèdes : instruments du jugement de Dieu'
  '11':
  - type: text
    content: Aiguisez bien les flèches,
  - type: text
    content: prenez vos boucliers !
  - type: text
    content: L’Eternel a excité ╵l’esprit des rois des Mèdes,
  - type: text
    content: car il a résolu ╵de ruiner Babylone ;
  - type: text
    content: ce sera la rétribution, ╵que l’Eternel exercera,
  - type: text
    content: ainsi il lui fera payer ╵ce qu’elle a fait contre son temple.
  '12':
  - type: text
    content: Dressez vos étendards ╵contre les murs de Babylone !
  - type: text
    content: Et renforcez la garde !
  - type: text
    content: Postez des sentinelles !
  - type: text
    content: Dressez des embuscades !
  - type: text
    content: 'Car voici, l’Eternel ╵a conçu un dessein :'
  - type: text
    content: ce qu’il a prononcé ╵contre les habitants de Babylone,
  - type: text
    content: et il le réalise.
  '13':
  - type: text
    content: O toi, qui es assise ╵sur les bords du grand fleuve
  - type: note
    content: Réminiscence en Ap 17.1.
  - type: text
    content: ','
  - type: text
    content: qui es riche en trésors,
  - type: text
    content: ta fin est arrivée, ╵à la mesure ╵de tes gains malhonnêtes
  - type: note
    content: 'Autres traductions : la mesure est comble ou le fil de ta vie est coupé.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Le Seigneur des armées célestes ╵l’a juré par lui-même :'
  - type: text
    content: Je te remplirai d’hommes ╵comme de sauterelles,
  - type: text
    content: ils pousseront sur toi ╵le cri de la victoire !
  - type: heading
    content: Le Dieu créateur, maître de l’histoire
  '15':
  - type: text
    content: Lui, il a fait la terre ╵par sa puissance,
  - type: text
    content: il a solidement ╵fondé le monde ╵par sa sagesse,
  - type: text
    content: et il a déployé le ciel ╵par son intelligence
  - type: note
    content: Les v. 15-19 sont parallèles à 10.12-16.
  - type: text
    content: .
  '16':
  - type: text
    content: Quand il fait retentir sa voix,
  - type: text
    content: des torrents d’eau ╵s’amassent dans le ciel ;
  - type: text
    content: des nuages s’élèvent ╵des confins de la terre ;
  - type: text
    content: il fait jaillir l’éclair ╵au milieu des averses
  - type: text
    content: et il fait s’élancer ╵le vent de ses réserves.
  '17':
  - type: text
    content: Alors tout être humain ╵reste hébété ╵et ne comprend plus rien.
  - type: text
    content: Tout orfèvre est honteux ╵de son idole
  - type: text
    content: car sa statue de fonte ╵est une tromperie
  - type: text
    content: qui n’a en elle ╵aucun souffle de vie.
  '18':
  - type: text
    content: Ils ne sont que néant
  - type: text
    content: et œuvres illusoires ;
  - type: text
    content: et ils disparaîtront
  - type: text
    content: au jour du châtiment.
  '19':
  - type: text
    content: Combien est différent ╵« le Dieu qui est la part ╵du peuple de Jacob » !
  - type: text
    content: Il a tout façonné,
  - type: text
    content: Israël
  - type: note
    content: 'Israël: ce mot manque dans le texte hébreu traditionnel mais se trouve dans de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la Vulgate et le targoum, ainsi qu’en Jr 10.16.'
  - type: text
    content: ' est le peuple ╵qui constitue son patrimoine,'
  - type: text
    content: 'et ce Dieu a pour nom : ╵le Seigneur des armées célestes.'
  - type: heading
    content: Babylone tombera
  '2':
  - type: text
    content: J’enverrai contre Babylone ╵des étrangers pour la vanner
  - type: text
    content: et ils feront le vide ╵dans son pays
  - type: text
    content: car, au jour du malheur,
  - type: text
    content: ils surgiront ╵de tous côtés contre elle.
  '20':
  - type: text
    content: Toi, tu étais pour moi ╵comme un marteau, ╵une arme de combat.
  - type: text
    content: Par toi, j’ai pilonné ╵bien des nations,
  - type: text
    content: par toi, j’ai détruit des royaumes.
  '21':
  - type: text
    content: Par toi, j’ai pilonné ╵chevaux et cavaliers.
  - type: text
    content: J’ai pilonné des chars ╵avec ceux qui les conduisaient.
  '22':
  - type: text
    content: Par toi, j’ai pilonné ╵des hommes et des femmes.
  - type: text
    content: Par toi, j’ai pilonné ╵des vieillards, des enfants.
  - type: text
    content: Par toi, j’ai pilonné ╵des jeunes hommes, ╵des jeunes filles.
  '23':
  - type: text
    content: Par toi, j’ai pilonné ╵le berger avec son troupeau.
  - type: text
    content: Par toi, j’ai pilonné ╵le fermier et ses bœufs.
  - type: text
    content: Par toi, j’ai pilonné ╵gouverneurs et préfets.
  '24':
  - type: text
    content: Je rends à Babylone
  - type: text
    content: ainsi qu’à tous les habitants ╵de la Chaldée
  - type: text
    content: tout le mal qu’ils ont fait
  - type: text
    content: sous vos regards, ╵à l’égard de Sion
  - type: note
    content: 'Autre traduction : Sous vos regards, je rends à Babylone… tout le mal qu’ils ont fait à l’égard de Sion.'
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare.
  '25':
  - type: text
    content: Je vais m’en prendre à toi, ╵montagne destructrice,
  - type: text
    content: qui dévastes toute la terre,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: Je lève la main contre toi,
  - type: text
    content: je te ferai rouler ╵du haut de tes rochers,
  - type: text
    content: et je ferai de toi ╵une montagne calcinée,
  '26':
  - type: text
    content: et l’on ne prendra plus ╵de toi ni pierre d’angle
  - type: text
    content: ni pierres pour les fondations ;
  - type: text
    content: car tu seras ╵pour toujours dévastée,
  - type: text
    content: l’Eternel le déclare.
  '27':
  - type: text
    content: Elevez l’étendard ╵à travers le pays,
  - type: text
    content: sonnez du cor ╵parmi les peuples,
  - type: text
    content: et convoquez les peuples ╵pour combattre contre elle !
  - type: text
    content: Appelez les royaumes
  - type: text
    content: d’Ararat, de Minni ╵et d’Ashkenaz contre elle ;
  - type: text
    content: nommez des généraux ╵pour l’attaquer ;
  - type: text
    content: lancez des chevaux à l’attaque ╵comme un essaim de sauterelles ╵qui se hérissent !
  '28':
  - type: text
    content: Convoquez donc les peuples ╵pour combattre contre elle,
  - type: text
    content: les rois de la Médie,
  - type: text
    content: ses gouverneurs et ses préfets
  - type: text
    content: et tous les territoires ╵sous sa domination.
  '29':
  - type: text
    content: La terre est ébranlée, ╵elle vacille,
  - type: text
    content: car les desseins que l’Eternel ╵a conçus contre Babylone ╵se réalisent
  - type: text
    content: pour changer son pays ╵en une terre dévastée ╵et privée d’habitants.
  '3':
  - type: text
    content: Les archers n’auront pas le temps ╵de bander l’arc
  - type: text
    content: et l’on ne pourra pas ╵revêtir sa cuirasse !
  - type: text
    content: Pas de pitié ╵pour ses jeunes soldats !
  - type: text
    content: Exterminez ╵son armée tout entière ╵pour me la consacrer.
  '30':
  - type: text
    content: Car les guerriers de Babylone ╵ont cessé de combattre,
  - type: text
    content: ils sont restés ╵à l’intérieur des forteresses ;
  - type: text
    content: 'leur force est épuisée :'
  - type: text
    content: les voilà devenus ╵comme des femmelettes.
  - type: text
    content: Ses maisons sont en feu,
  - type: text
    content: les verrous de ses portes ╵ont été mis en pièces.
  '31':
  - type: text
    content: Les courriers courent ╵et rejoignent d’autres courriers,
  - type: text
    content: et les messagers d’autres messagers
  - type: text
    content: pour annoncer ╵au roi de Babylone
  - type: text
    content: que, de tous les côtés, ╵sa ville est prise.
  '32':
  - type: text
    content: « Les gués sont occupés,
  - type: text
    content: les roseaux sont en feu,
  - type: text
    content: les soldats sont pris d’épouvante ! »
  '33':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes, ╵Dieu d’Israël :'
  - type: text
    content: Oui, la population de Babylone ╵est pareille à une aire ╵au temps où on la foule.
  - type: text
    content: Encore un peu de temps
  - type: text
    content: et l’heure des récoltes ╵sera venue pour elle.
  - type: heading
    content: Jérusalem sera vengée
  '34':
  - type: text
    content: Nabuchodonosor, ╵le roi de Babylone,
  - type: text
    content: nous a dévorés, ╵nous a mis en déroute,
  - type: text
    content: et il nous a laissés ╵comme un récipient vide.
  - type: text
    content: Il nous a engloutis ╵tout comme un monstre.
  - type: text
    content: Il a rempli son ventre ╵du meilleur de nous-mêmes,
  - type: text
    content: puis il nous a bannis.
  '35':
  - type: text
    content: 'Que le peuple de Sion dise :'
  - type: text
    content: « Que toutes les violences ╵qu’elle m’a fait subir, ╵à moi et à mes enfants, ╵que tout cela retombe ╵sur Babylone ! »
  - type: text
    content: 'Que Jérusalem dise :'
  - type: text
    content: « Que mon sang répandu ╵retombe sur les Chaldéens ! »
  '36':
  - type: text
    content: 'Car voici ce que l’Eternel déclare :'
  - type: text
    content: Je défendrai ta cause
  - type: text
    content: et je rétribuerai ╵ceux qui t’ont fait du tort,
  - type: text
    content: j’assécherai leur fleuve,
  - type: text
    content: je tarirai sa source.
  '37':
  - type: text
    content: Babylone sera changée ╵en un monceau de pierres
  - type: text
    content: hanté par les chacals,
  - type: text
    content: en une terre dévastée ╵attirant des sifflements horrifiés,
  - type: text
    content: où n’habitera plus personne.
  '38':
  - type: text
    content: Les habitants de Babylone ╵rugiront tous ensemble ╵comme de jeunes lions,
  - type: text
    content: ils hurleront, ╵tout comme des lionceaux.
  '39':
  - type: text
    content: Et quand ils seront échauffés,
  - type: text
    content: je leur servirai un festin,
  - type: text
    content: je les enivrerai
  - type: note
    content: Voir 25.15-29.
  - type: text
    content: afin qu’ils soient en liesse.
  - type: text
    content: Puis ils s’endormiront ╵d’un sommeil éternel,
  - type: text
    content: ils ne se réveilleront plus,
  - type: text
    content: l’Eternel le déclare.
  '4':
  - type: text
    content: Ceux qui seront frappés à mort ╵joncheront le pays des Chaldéens,
  - type: text
    content: les blessés tomberont ╵dans les rues de la ville.
  '40':
  - type: text
    content: Je les ferai descendre ╵tout comme des agneaux ╵à l’abattoir,
  - type: text
    content: comme des béliers et des boucs.
  - type: heading
    content: La fin de la gloire de Babylone
  '41':
  - type: text
    content: Quoi, Shéshak
  - type: note
    content: 'Shéshak: nom codé pour Babylone (voir 25.26 et note).'
  - type: text
    content: ' est conquise ?'
  - type: text
    content: Quoi, elle a été prise, ╵celle que célébrait ╵le monde tout entier ?
  - type: text
    content: Quoi, Babylone a été dévastée ╵au milieu des nations ?
  '42':
  - type: text
    content: La mer s’est soulevée ╵sur Babylone
  - type: text
    content: et, de ses flots tumultueux, ╵l’a submergée.
  '43':
  - type: text
    content: Ses villes ne sont plus ╵que des lieux dévastés,
  - type: text
    content: des lieux arides et des steppes
  - type: text
    content: où n’habite personne
  - type: text
    content: et où ne passe aucun humain.
  '44':
  - type: text
    content: J’interviendrai ╵à Babylone contre Bel,
  - type: text
    content: je lui ferai vomir ╵ce qu’il a englouti
  - type: text
    content: et, jamais plus, ╵les autres peuples n’afflueront vers lui.
  - type: text
    content: Les murs de Babylone ╵sont en train de tomber.
  '45':
  - type: text
    content: Sortez du milieu d’elle, ╵vous, membres de mon peuple !
  - type: text
    content: Et que chacun sauve sa vie
  - type: text
    content: quand la colère ardente ╵de l’Eternel se manifestera !
  '46':
  - type: text
    content: 'Mais faites attention : ╵ne perdez pas courage,'
  - type: text
    content: ne vous effrayez pas
  - type: text
    content: des rumeurs qui circulent ╵à travers le pays !
  - type: text
    content: Une année, court tel bruit ;
  - type: text
    content: l’année suivante, un autre,
  - type: text
    content: la violence sévit dans le pays,
  - type: text
    content: un despote s’en prend ╵à un autre despote.
  '47':
  - type: text
    content: C’est pourquoi, le temps vient
  - type: text
    content: où moi j’interviendrai ╵contre les idoles de Babylone.
  - type: text
    content: Son pays tout entier ╵en sera dans la honte,
  - type: text
    content: tous ses blessés à mort ╵tomberont au beau milieu d’elle.
  '48':
  - type: text
    content: Le ciel comme la terre
  - type: text
    content: et tout ce qu’ils renferment
  - type: text
    content: exulteront de joie ╵devant le sort de Babylone,
  - type: text
    content: car du septentrion ╵des destructeurs viennent contre elle,
  - type: text
    content: l’Eternel le déclare
  - type: note
    content: Voir Ap 18.20.
  - type: text
    content: .
  '49':
  - type: text
    content: Car Babylone, elle aussi, doit tomber, ╵à cause des morts d’Israël
  - type: note
    content: 'à cause des morts d’Israël: idée reprise en Ap 18.23-24.'
  - type: text
    content: ','
  - type: text
    content: comme elle a fait tomber ╵dans le monde entier des victimes.
  '5':
  - type: text
    content: Bien que leur pays soit souillé ╵d’offenses à l’égard
  - type: text
    content: du Dieu saint d’Israël,
  - type: text
    content: la terre d’Israël ╵et celle de Juda ╵n’ont pas été abandonnées ╵au veuvage par l’Eternel,
  - type: text
    content: le Seigneur des armées célestes.
  '50':
  - type: text
    content: Rescapés de l’épée, ╵partez, ne restez pas sur place !
  - type: text
    content: Au loin, pensez à l’Eternel
  - type: text
    content: et sur Jérusalem ╵dirigez vos pensées !
  '51':
  - type: text
    content: Nous étions dans la honte
  - type: text
    content: lorsque nous entendions l’insulte.
  - type: text
    content: La confusion couvrait nos fronts
  - type: text
    content: puisque des étrangers ont pénétré
  - type: text
    content: dans les lieux saints du Temple ╵de l’Eternel
  - type: note
    content: Allusion à Nabuchodonosor et ses troupes profanant le Temple en 587 av. J.-C.
  - type: text
    content: .
  '52':
  - type: text
    content: C’est pourquoi le temps vient,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: où moi j’interviendrai ╵contre les idoles de Babylone,
  - type: text
    content: et, dans le pays tout entier, ╵les blessés gémiront.
  '53':
  - type: text
    content: Quand Babylone ╵monterait jusqu’au ciel,
  - type: text
    content: et quand bien même ╵elle fortifierait ╵sa forteresse ╵sur les hauteurs,
  - type: text
    content: des dévastateurs surgiront ╵contre elle de ma part,
  - type: text
    content: l’Eternel le déclare.
  '54':
  - type: text
    content: Un cri se fait entendre, ╵venant de Babylone,
  - type: text
    content: le bruit d’un immense désastre ╵retentit en Chaldée.
  '55':
  - type: text
    content: Car l’Eternel ╵dévaste Babylone
  - type: text
    content: et réduit au silence ╵la grande clameur venant d’elle.
  - type: text
    content: Les flots de l’ennemi mugissent ╵comme de grandes eaux
  - type: text
    content: et l’éclat de leur voix s’élève.
  '56':
  - type: text
    content: Car le dévastateur ╵marche contre elle, ╵oui, contre Babylone ;
  - type: text
    content: ses guerriers sont faits prisonniers
  - type: text
    content: et leur arc est brisé.
  - type: text
    content: L’Eternel est le Dieu ╵qui rétribue,
  - type: text
    content: il fait payer ╵ce que chacun mérite.
  '57':
  - type: text
    content: J’enivrerai
  - type: note
    content: Voir 25.15-29.
  - type: text
    content: ' ╵ses ministres, ses sages,'
  - type: text
    content: ses gouverneurs et ses préfets, ╵ainsi que ses guerriers,
  - type: text
    content: et ils s’endormiront ╵d’un sommeil éternel
  - type: text
    content: sans plus se réveiller.
  - type: text
    content: C’est là ce que déclare ╵le roi qui a pour nom ╵le Seigneur des armées célestes.
  '58':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: Les larges murs de Babylone
  - type: text
    content: seront démantelés ;
  - type: text
    content: ses hautes portes ╵seront la proie des flammes.
  - type: text
    content: Les peuples travaillent pour rien,
  - type: text
    content: les nations se fatiguent ╵pour ce qui périt par le feu.
  '59':
  - type: text
    content: Voici les instructions que le prophète Jérémie donna à Seraya, fils de Nériya, petit-fils de Mahséya, et responsable du campement
  - type: note
    content: 'Seraya: frère de Baruch, l’ami et le secrétaire de Jérémie (32.12). du campement: l’ancienne version grecque a compris : du tribut.'
  - type: text
    content: ', lorsque celui-ci se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année de son règne'
  - type: note
    content: En 594 ou 593 av. J.-C.
  - type: text
    content: .
  '6':
  - type: text
    content: Fuyez de Babylone ╵et que chacun sauve sa vie !
  - type: text
    content: Ne soyez pas détruits ╵à cause de son crime
  - type: note
    content: Repris en Ap 18.4 (voir Jr 50.8).
  - type: text
    content: '  !'
  - type: text
    content: Car c’est le temps où l’Eternel ╵va la rétribuer,
  - type: text
    content: où il va lui payer ╵ce qu’elle a mérité.
  '60':
  - type: text
    content: 'Jérémie avait mis par écrit dans un seul livre tous les malheurs qui devaient s’abattre sur Babylone, c’est-à-dire tout ce qui a été écrit à son sujet. '
  '61':
  - type: text
    content: 'Jérémie dit à Seraya : Quand tu seras arrivé à Babylone, tu auras soin de lire toutes ces paroles. '
  '62':
  - type: text
    content: 'Puis tu diras : « Eternel, c’est toi-même qui as parlé de détruire ce lieu-ci, pour que personne n’y habite plus, ni homme ni bête, mais qu’il soit pour toujours dévasté. » '
  '63':
  - type: text
    content: Quand tu auras terminé la lecture de ce livre, tu y attacheras une pierre et tu le jetteras au milieu de l’Euphrate
  - type: note
    content: Les v. 63-64 sont repris en Ap 18.21.
  - type: text
    content: ' '
  '64':
  - type: text
    content: 'en disant : « Ainsi sombrera Babylone et elle ne se relèvera pas du malheur que je vais lui envoyer. Et ses habitants disparaîtront'
  - type: note
    content: 'disparaîtront: même verbe en hébreu que celui de la fin du v. 58, traduit par se fatiguer. L’ancienne version grecque omet cette phrase (qui se réduit au verbe en hébreu).'
  - type: text
    content: . »
  - type: text
    content: Ici s’achèvent les paroles de Jérémie.
  '7':
  - type: text
    content: Babylone était bien ╵comme une coupe d’or ╵entre les mains de l’Eternel ;
  - type: text
    content: elle enivrait la terre entière ;
  - type: text
    content: les peuples ont bu de son vin ;
  - type: text
    content: et c’est pourquoi les peuples ╵en ont perdu le sens.
