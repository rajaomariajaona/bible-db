  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: C’est pourquoi, le temps vient
  - type: usfm
    marker: q1
    children:
