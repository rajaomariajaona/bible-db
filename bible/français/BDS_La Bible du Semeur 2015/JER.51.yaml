  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les murs de Babylone ╵sont en train de tomber.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Sortez du milieu d’elle, ╵vous, membres de mon peuple !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que chacun sauve sa vie
  - type: usfm
    marker: q1
    children:
