    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à cause des morts d’Israël
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'idée reprise en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 18.23-24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
