  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne vous effrayez pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des rumeurs qui circulent ╵à travers le pays !
  - type: usfm
    marker: q1
    children:
