      marker-yv: yv-n
    - type: text
      text: ' est conquise ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoi, elle a été prise, ╵celle que célébrait ╵le monde tout entier ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoi, Babylone a été dévastée ╵au milieu des nations ?
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: La mer s’est soulevée ╵sur Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de ses flots tumultueux, ╵l’a submergée.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ses villes ne sont plus ╵que des lieux dévastés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des lieux arides et des steppes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où n’habite personne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où ne passe aucun humain.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: J’interviendrai ╵à Babylone contre Bel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lui ferai vomir ╵ce qu’il a englouti
  - type: usfm
    marker: q1
    children:
    - type: text
