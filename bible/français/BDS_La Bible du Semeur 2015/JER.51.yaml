          - type: text
            text: Ap 18.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'en disant : « Ainsi sombrera Babylone et elle ne se relèvera pas du malheur que je vais lui envoyer. Et ses habitants disparaîtront'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.64 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: disparaîtront
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même verbe en hébreu que celui de la fin du v. 58, traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se fatiguer. '
      - type: usfm
        marker: ft
        children:
        - type: text
