  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que Jérusalem dise :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Que mon sang répandu ╵retombe sur les Chaldéens ! »
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Car voici ce que l’Eternel déclare :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je défendrai ta cause
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je rétribuerai ╵ceux qui t’ont fait du tort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’assécherai leur fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je tarirai sa source.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Babylone sera changée ╵en un monceau de pierres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hanté par les chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en une terre dévastée ╵attirant des sifflements horrifiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où n’habitera plus personne.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Les habitants de Babylone ╵rugiront tous ensemble ╵comme de jeunes lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils hurleront, ╵tout comme des lionceaux.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Et quand ils seront échauffés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur servirai un festin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les enivrerai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 25.15-29
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’ils soient en liesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis ils s’endormiront ╵d’un sommeil éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne se réveilleront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ceux qui seront frappés à mort ╵joncheront le pays des Chaldéens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les blessés tomberont ╵dans les rues de la ville.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Je les ferai descendre ╵tout comme des agneaux ╵à l’abattoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des béliers et des boucs.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La fin de la gloire de Babylone
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Quoi, Shéshak
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shéshak
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nom codé pour Babylone (voir '
