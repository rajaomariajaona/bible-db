  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Jérémie avait mis par écrit dans un seul livre tous les malheurs qui devaient s’abattre sur Babylone, c’est-à-dire tout ce qui a été écrit à son sujet. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Jérémie dit à Seraya : Quand tu seras arrivé à Babylone, tu auras soin de lire toutes ces paroles. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Puis tu diras : « Eternel, c’est toi-même qui as parlé de détruire ce lieu-ci, pour que personne n’y habite plus, ni homme ni bête, mais qu’il soit pour toujours dévasté. » '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Quand tu auras terminé la lecture de ce livre, tu y attacheras une pierre et tu le jetteras au milieu de l’Euphrate
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.63 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 63-64 sont repris en '
        - type: usfm
          marker: ref
