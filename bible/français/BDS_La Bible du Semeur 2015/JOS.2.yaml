document_id: JOS.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La mission de reconnaissance à Jéricho
  - type: text
    content: De Shittim
  - type: note
    content: Situé à une douzaine de kilomètres à l’est du Jourdain, à la hauteur de Jéricho (voir Nb 25.1 ; 33.49 ; Jos 3.1).
  - type: text
    content: ', Josué, fils de Noun, envoya secrètement deux hommes chargés d’une mission de reconnaissance. Il leur donna cette consigne : « Allez explorer le pays, en particulier la ville de Jéricho'
  - type: note
    content: Ville fortifiée très ancienne située à 8 kilomètres à l’ouest du Jourdain. Alimentée par de bonnes sources et entourée de fortes murailles, elle aurait pu soutenir un long siège et détenait une position clé à l’entrée du pays promis (voir Nb 22.1 ; 26.3, 63 ; 31.12 ; Dt 32.49 ; 34.1-3).
  - type: text
    content: '  ! » Ils partirent et, arrivés à Jéricho, ils entrèrent dans la maison d’une prostituée nommée Rahab'
  - type: note
    content: Voir Mt 1.5 ; Hé 11.31 ; Jc 2.25.
  - type: text
    content: ', et y passèrent la nuit. '
  '10':
  - type: text
    content: Car nous avons entendu que l’Eternel a mis à sec les eaux de la mer des Roseaux devant vous lorsque vous êtes sortis d’Egypte
  - type: note
    content: Voir Ex 14.21.
  - type: text
    content: . Nous avons appris comment vous avez traité les deux rois des Amoréens, Sihôn et Og, qui régnaient de l’autre côté du Jourdain, pour les vouer à l’Eternel
  - type: note
    content: Nb 21.21-35 ; Dt 2.30-35 ; 3.1-10.
  - type: text
    content: ', en les exterminant. '
  '11':
  - type: text
    content: Depuis que nous avons entendu ces nouvelles, le cœur nous manque, et personne n’a plus le courage de vous tenir tête. En effet, c’est l’Eternel votre Dieu qui est Dieu, en haut dans le ciel et ici-bas sur la terre
  - type: note
    content: Ex 15.15-16 ; 23.27 ; Dt 2.25 ; 4.39.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Maintenant, je vous prie, jurez-moi par le nom de l’Eternel qu’en reconnaissance pour la bonté que je vous ai témoignée, vous aussi vous traiterez ma famille avec la même bonté, et donnez-moi un gage certain '
  '13':
  - type: text
    content: que vous laisserez la vie sauve à mon père, à ma mère, à mes frères et sœurs, et à tous les membres de leurs familles, et que vous empêcherez que nous soyons mis à mort.
  '14':
  - type: text
    content: 'Les deux hommes lui répondirent : Notre vie répondra de la vôtre pourvu que tu gardes le secret de cet engagement entre nous. Lorsque l’Eternel nous donnera ce pays, nous serons fidèles à notre promesse et nous te traiterons avec bonté.'
  '15':
  - type: text
    content: Or la maison de Rahab était construite dans le mur même des remparts de la ville, et elle habitait ainsi sur le rempart. Ainsi elle put faire descendre les deux hommes par la fenêtre au moyen d’une corde.
  '16':
  - type: text
    content: – Dirigez-vous vers les collines, leur recommanda-t-elle, pour échapper à ceux qui vous poursuivent, et cachez-vous là pendant trois jours jusqu’à ce qu’ils soient de retour. Après cela, vous pourrez reprendre votre route.
  '17':
  - type: text
    content: 'Les deux hommes lui dirent : Voici de quelle manière nous allons nous acquitter du serment que tu nous as fait prêter : '
  '18':
  - type: text
    content: 'lorsque nous serons entrés dans ton pays, attache ce cordon rouge à la fenêtre par laquelle tu nous fais descendre, puis réunis dans ta maison ton père, ta mère, tes frères et toute ta famille. '
  '19':
  - type: text
    content: 'Si l’un d’eux franchit la porte de ta maison pour aller dehors, il sera seul responsable de sa mort, nous en serons innocents. Par contre, si l’on porte la main sur l’un de ceux qui seront avec toi dans la maison, c’est nous qui porterons la responsabilité de sa mort. '
  '2':
  - type: text
    content: On prévint le roi de Jéricho
  - type: note
    content: Les principales villes de Canaan étaient de petits royaumes indépendants régis par des roitelets locaux.
  - type: text
    content: ' que des Israélites étaient arrivés là pendant la nuit pour reconnaître la région. '
  '20':
  - type: text
    content: Toutefois, si tu divulgues cet engagement entre nous, nous serons dégagés du serment que tu nous as fait prononcer.
  '21':
  - type: text
    content: 'Elle répondit : D’accord ! Que les choses soient comme vous l’avez dit ! Puis elle les fit partir et ils s’en allèrent. Aussitôt, elle attacha le cordon rouge à sa fenêtre. '
  '22':
  - type: text
    content: Les deux hommes gagnèrent les collines et s’y tinrent cachés pendant trois jours, jusqu’à ce que la patrouille lancée à leur poursuite soit de retour ; elle avait battu toute la région le long de la route sans les trouver
  - type: note
    content: A l’ouest de l’ancienne Jéricho se trouvent des collines élevées et abruptes, trouées de cavernes, où il est facile de se cacher.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Alors les deux hommes firent demi-tour, descendirent des collines et traversèrent le Jourdain. Ils vinrent trouver Josué et lui racontèrent tout ce qu’ils avaient constaté.
  '24':
  - type: text
    content: – Certainement l’Eternel nous livre tout le pays, lui dirent-ils, car déjà toute la population de la région est prise de panique à cause de nous.
  '3':
  - type: text
    content: 'Alors il envoya dire à Rahab : Livre-nous les hommes qui sont venus chez toi et qui logent dans ta maison, car ils sont venus pour espionner tout le pays.'
  '4':
  - type: text
    content: 'Mais la femme emmena les deux hommes et les cacha, puis elle répondit : Effectivement, des hommes sont venus chez moi, mais j’ignorais d’où ils étaient. '
  '5':
  - type: text
    content: Et comme on allait fermer la porte, ils sont repartis à la tombée de la nuit. Je ne sais pas où ils sont allés. Dépêchez-vous de les poursuivre, car vous pouvez encore les rattraper.
  '6':
  - type: text
    content: En fait, elle les avait fait monter sur le toit en terrasse de sa maison et les avait cachés sous un tas de tiges de lin qu’elle avait rangées là
  - type: note
    content: Le lin mûrit en mars en Israël. Ses tiges atteignent la longueur d’un mètre.
  - type: text
    content: .
  '7':
  - type: text
    content: Les envoyés du roi se lancèrent à leur poursuite sur le chemin qui mène aux gués du Jourdain. Dès qu’ils eurent quitté la ville, on referma la porte derrière eux.
  - type: heading
    content: L’accord avec Rahab
  '8':
  - type: text
    content: 'Rahab monta sur la terrasse et vint trouver ses hôtes avant qu’ils ne se couchent. '
  '9':
  - type: text
    content: 'Elle leur dit : Je sais que l’Eternel vous a donné ce pays : la terreur s’est emparée de nous et tous les habitants de la région sont pris de panique à cause de vous. '
