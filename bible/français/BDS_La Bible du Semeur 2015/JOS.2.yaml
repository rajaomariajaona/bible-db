document_id: JOS.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mission de reconnaissance à Jéricho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De Shittim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Situé à une douzaine de kilomètres à l’est du Jourdain, à la hauteur de Jéricho (voir Nb 25.1 ; 33.49 ; Jos 3.1).
    marker-yv: yv-n
  - type: text
    text: ', Josué, fils de Noun, envoya secrètement deux hommes chargés d’une mission de reconnaissance. Il leur donna cette consigne : « Allez explorer le pays, en particulier la ville de Jéricho'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville fortifiée très ancienne située à 8 kilomètres à l’ouest du Jourdain. Alimentée par de bonnes sources et entourée de fortes murailles, elle aurait pu soutenir un long siège et détenait une position clé à l’entrée du pays promis (voir Nb 22.1 ; 26.3, 63 ; 31.12 ; Dt 32.49 ; 34.1-3).
    marker-yv: yv-n
  - type: text
    text: '  ! » Ils partirent et, arrivés à Jéricho, ils entrèrent dans la maison d’une prostituée nommée Rahab'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 1.5 ; Hé 11.31 ; Jc 2.25.
    marker-yv: yv-n
  - type: text
    text: ', et y passèrent la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On prévint le roi de Jéricho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les principales villes de Canaan étaient de petits royaumes indépendants régis par des roitelets locaux.
    marker-yv: yv-n
  - type: text
    text: ' que des Israélites étaient arrivés là pendant la nuit pour reconnaître la région. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors il envoya dire à Rahab : Livre-nous les hommes qui sont venus chez toi et qui logent dans ta maison, car ils sont venus pour espionner tout le pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais la femme emmena les deux hommes et les cacha, puis elle répondit : Effectivement, des hommes sont venus chez moi, mais j’ignorais d’où ils étaient. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et comme on allait fermer la porte, ils sont repartis à la tombée de la nuit. Je ne sais pas où ils sont allés. Dépêchez-vous de les poursuivre, car vous pouvez encore les rattraper.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En fait, elle les avait fait monter sur le toit en terrasse de sa maison et les avait cachés sous un tas de tiges de lin qu’elle avait rangées là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le lin mûrit en mars en Israël. Ses tiges atteignent la longueur d’un mètre.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les envoyés du roi se lancèrent à leur poursuite sur le chemin qui mène aux gués du Jourdain. Dès qu’ils eurent quitté la ville, on referma la porte derrière eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’accord avec Rahab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rahab monta sur la terrasse et vint trouver ses hôtes avant qu’ils ne se couchent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle leur dit : Je sais que l’Eternel vous a donné ce pays : la terreur s’est emparée de nous et tous les habitants de la région sont pris de panique à cause de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car nous avons entendu que l’Eternel a mis à sec les eaux de la mer des Roseaux devant vous lorsque vous êtes sortis d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14.21
        metadata:
          usfm: EXO.14.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Nous avons appris comment vous avez traité les deux rois des Amoréens, Sihôn et Og, qui régnaient de l’autre côté du Jourdain, pour les vouer à l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 21.21-35 ; Dt 2.30-35 ; 3.1-10.
    marker-yv: yv-n
  - type: text
    text: ', en les exterminant. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Depuis que nous avons entendu ces nouvelles, le cœur nous manque, et personne n’a plus le courage de vous tenir tête. En effet, c’est l’Eternel votre Dieu qui est Dieu, en haut dans le ciel et ici-bas sur la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 15.15-16 ; 23.27 ; Dt 2.25 ; 4.39.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Maintenant, je vous prie, jurez-moi par le nom de l’Eternel qu’en reconnaissance pour la bonté que je vous ai témoignée, vous aussi vous traiterez ma famille avec la même bonté, et donnez-moi un gage certain '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: que vous laisserez la vie sauve à mon père, à ma mère, à mes frères et sœurs, et à tous les membres de leurs familles, et que vous empêcherez que nous soyons mis à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les deux hommes lui répondirent : Notre vie répondra de la vôtre pourvu que tu gardes le secret de cet engagement entre nous. Lorsque l’Eternel nous donnera ce pays, nous serons fidèles à notre promesse et nous te traiterons avec bonté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Or la maison de Rahab était construite dans le mur même des remparts de la ville, et elle habitait ainsi sur le rempart. Ainsi elle put faire descendre les deux hommes par la fenêtre au moyen d’une corde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: – Dirigez-vous vers les collines, leur recommanda-t-elle, pour échapper à ceux qui vous poursuivent, et cachez-vous là pendant trois jours jusqu’à ce qu’ils soient de retour. Après cela, vous pourrez reprendre votre route.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les deux hommes lui dirent : Voici de quelle manière nous allons nous acquitter du serment que tu nous as fait prêter : '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'lorsque nous serons entrés dans ton pays, attache ce cordon rouge à la fenêtre par laquelle tu nous fais descendre, puis réunis dans ta maison ton père, ta mère, tes frères et toute ta famille. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si l’un d’eux franchit la porte de ta maison pour aller dehors, il sera seul responsable de sa mort, nous en serons innocents. Par contre, si l’on porte la main sur l’un de ceux qui seront avec toi dans la maison, c’est nous qui porterons la responsabilité de sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Toutefois, si tu divulgues cet engagement entre nous, nous serons dégagés du serment que tu nous as fait prononcer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle répondit : D’accord ! Que les choses soient comme vous l’avez dit ! Puis elle les fit partir et ils s’en allèrent. Aussitôt, elle attacha le cordon rouge à sa fenêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les deux hommes gagnèrent les collines et s’y tinrent cachés pendant trois jours, jusqu’à ce que la patrouille lancée à leur poursuite soit de retour ; elle avait battu toute la région le long de la route sans les trouver
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A l’ouest de l’ancienne Jéricho se trouvent des collines élevées et abruptes, trouées de cavernes, où il est facile de se cacher.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors les deux hommes firent demi-tour, descendirent des collines et traversèrent le Jourdain. Ils vinrent trouver Josué et lui racontèrent tout ce qu’ils avaient constaté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: – Certainement l’Eternel nous livre tout le pays, lui dirent-ils, car déjà toute la population de la région est prise de panique à cause de nous.
