document_id: JDG.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites décident de punir les gens de Guibéa
  - type: text
    content: Tous les Israélites vinrent depuis Dan jusqu’à Beer-Sheva et jusqu’au pays de Galaad, et l’assemblée se réunit comme un seul homme devant l’Eternel à Mitspa
  - type: note
    content: La ville de Mitspa qui se trouve à 13 kilomètres au nord de Jérusalem (1 S 7.5-14 ; 10.17), à ne pas confondre avec la Mitspa de Galaad (Jg 10.17).
  - type: text
    content: '. '
  '10':
  - type: text
    content: Nous choisirons dix hommes sur cent, cent sur mille et mille sur dix mille de toutes les tribus d’Israël et nous les chargerons d’assurer le ravitaillement du reste de l’armée. A leur retour, les autres iront châtier Guibéa et Benjamin pour l’acte infâme qu’ils ont commis en Israël.
  '11':
  - type: text
    content: Tous les hommes d’Israël se rassemblèrent pour marcher contre la ville, unis comme un seul homme.
  - type: heading
    content: Les Benjaminites refusent de livrer les coupables
  '12':
  - type: text
    content: 'Les différentes tribus envoyèrent d’abord des messagers dans toute la tribu de Benjamin pour leur dire : Comment un crime aussi horrible a-t-il pu être commis chez vous ? '
  '13':
  - type: text
    content: Maintenant, livrez-nous sans tarder ces vauriens qui sont à Guibéa pour que nous les exécutions et que nous fassions disparaître le mal du milieu d’Israël !
  - type: text
    content: 'Mais les Benjaminites ne voulurent pas écouter leurs compatriotes israélites. '
  '14':
  - type: text
    content: 'Au contraire, ils quittèrent leurs villes et se rassemblèrent à Guibéa pour partir en guerre contre les Israélites. '
  '15':
  - type: text
    content: 'Vingt-six « milliers » d’hommes de Benjamin tirant l’épée furent recensés ce jour-là, sans compter les habitants de Guibéa qui fournirent sept « centaines » de soldats d’élite. '
  '16':
  - type: text
    content: 'Dans cette troupe, il y avait sept « centaines » de soldats d’élite gauchers, tous capables de toucher un cheveu, sans le manquer, avec une pierre de leur fronde. '
  '17':
  - type: text
    content: L’armée d’Israël sans Benjamin comptait quatre cents « milliers » d’hommes maniant l’épée et tous aguerris.
  - type: heading
    content: L’expédition punitive contre la tribu de Benjamin
  '18':
  - type: text
    content: 'Les Israélites se rendirent à Béthel pour consulter Dieu. Ils demandèrent : Quelle tribu doit attaquer la première les gens de Benjamin ?'
  - type: text
    content: 'L’Eternel répondit : Juda marchera en premier.'
  '19':
  - type: text
    content: 'Dès le lendemain matin, les Israélites se mirent en marche et dressèrent leur camp en face de Guibéa. '
  '2':
  - type: text
    content: 'Les chefs de tout le peuple, de toutes les tribus d’Israël, prirent part à cette assemblée du peuple de Dieu composée de quatre cents « milliers » de fantassins portant l’épée. '
  '20':
  - type: text
    content: 'Puis ils sortirent pour aller combattre les Benjaminites et se rangèrent en ordre de bataille, face à Guibéa. '
  '21':
  - type: text
    content: 'Les hommes de Benjamin sortirent de Guibéa et ils tuèrent ce jour-là sur le champ de bataille 22 000 hommes d’Israël. '
  '22':
  - type: text
    content: 'Mais l’armée d’Israël reprit courage et se rangea de nouveau en ordre de bataille, au même emplacement que la veille. '
  '23':
  - type: text
    content: 'Jusqu’au soir, les Israélites étaient allés pleurer devant l’Eternel, et ils l’avaient interrogé en disant : Devons-nous engager de nouveau le combat contre les Benjaminites, nos compatriotes ?'
  - type: text
    content: 'L’Eternel répondit : Marchez contre eux !'
  '24':
  - type: text
    content: 'Le lendemain donc, les Israélites attaquèrent une seconde fois ceux de Benjamin, '
  '25':
  - type: text
    content: 'qui sortirent de Guibéa pour les affronter et massacrèrent encore ce jour-là sur le terrain 18 000 soldats d’Israël portant l’épée. '
  '26':
  - type: text
    content: 'Alors tous les Israélites montèrent en foule à Béthel. Ils restèrent là, assis devant l’Eternel, pleurant et jeûnant jusqu’au soir, et ils offrirent des holocaustes et des sacrifices de communion devant l’Eternel. '
  '27':
  - type: text
    content: 'Puis ils consultèrent encore l’Eternel. En effet, à cet endroit, se trouvait alors le coffre de l’alliance de Dieu. '
  '28':
  - type: text
    content: 'Phinéas, fils d’Eléazar et petit-fils d’Aaron, était en fonction devant le coffre à cette époque. Il demanda : Devons-nous à nouveau aller combattre nos frères de la tribu de Benjamin ou cesser les hostilités ?'
  - type: text
    content: 'L’Eternel répondit : Allez-y, car demain je vous donnerai la victoire sur eux.'
  '29':
  - type: text
    content: 'Les Israélites postèrent des hommes en embuscade tout autour de Guibéa, '
  '3':
  - type: text
    content: 'Les Benjaminites apprirent que tous les autres Israélites s’étaient rendus à Mitspa. A cette réunion, les Israélites demandèrent qu’on leur explique comment ce crime avait été commis. '
  '30':
  - type: text
    content: 'puis ils allèrent à nouveau attaquer les Benjaminites le troisième jour. Ils se rangèrent en ordre de bataille face à Guibéa, comme les deux fois précédentes. '
  '31':
  - type: text
    content: 'Les hommes de Benjamin sortirent de nouveau pour les affronter. Les Benjaminites se laissèrent entraîner loin de la ville, ils commencèrent comme précédemment à faire des victimes en plein champ sur les routes qui mènent l’une à Béthel, l’autre à Guibéa. Ils tuèrent ainsi une trentaine d’Israélites. '
  '32':
  - type: text
    content: 'Alors les Benjaminites se dirent : Les voilà battus comme les autres fois !'
  - type: text
    content: 'Mais les Israélites avaient convenu de fuir et de les attirer sur des chemins de campagne loin de leur ville. '
  '33':
  - type: text
    content: Et soudain, tous les hommes d’Israël quittèrent leurs positions et se regroupèrent en ordre de bataille à Baal-Tamar. Au même moment, les Israélites embusqués débouchaient de leur poste à Maaré-Guéba
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et la Vulgate ont : à l’ouest de Guéba.'
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Dix mille hommes d’élite, sélectionnés dans toute l’armée d’Israël, arrivèrent devant Guibéa. La bataille fut acharnée. Les Benjaminites ne se doutaient pas du désastre qui allait fondre sur eux. '
  '35':
  - type: text
    content: L’Eternel battit Benjamin devant Israël et, ce jour-là, les Israélites leur tuèrent 25 100 hommes, tous sachant manier l’épée.
  '36':
  - type: text
    content: 'Alors les Benjaminites comprirent qu’ils étaient battus. Les hommes d’Israël leur avaient cédé du terrain parce qu’ils comptaient sur l’embuscade postée près de Guibéa. '
  '37':
  - type: text
    content: 'De fait, les hommes cachés se précipitèrent sur Guibéa, ils se répandirent dans la ville et y massacrèrent les habitants. '
  '38':
  - type: text
    content: 'Ils avaient convenu avec le reste de l’armée d’Israël de faire monter de la ville une épaisse fumée. '
  '39':
  - type: text
    content: 'Les hommes d’Israël devaient alors faire volte-face dans la bataille. Donc, alors que les Benjaminites avaient commencé à leur tuer une trentaine d’hommes et pensaient les avoir battus comme précédemment, '
  '4':
  - type: text
    content: 'Alors le lévite dont la femme avait été tuée prit la parole et dit : J’étais arrivé avec mon épouse de second rang à Guibéa de Benjamin pour y passer la nuit. '
  '40':
  - type: text
    content: 'une épaisse colonne de fumée commença à s’élever de la ville. Les Benjaminites se retournèrent et virent que toute leur ville était en flammes s’élevant vers le ciel. '
  '41':
  - type: text
    content: 'A ce moment-là, les hommes d’Israël se retournèrent contre ceux de Benjamin qui furent terrifiés, car ils virent le désastre fondre sur eux. '
  '42':
  - type: text
    content: 'Ils s’enfuirent devant les hommes d’Israël en prenant le chemin du désert, mais l’armée d’Israël les serra de près tandis que les hommes qui avaient été en embuscade près des villes les prirent à revers et les massacrèrent à mi-chemin. '
  '43':
  - type: text
    content: Les Israélites encerclèrent les Benjaminites, les pourchassèrent sans leur laisser de répit
  - type: note
    content: Traduction incertaine.
  - type: text
    content: ' et les écrasèrent du côté est de Guibéa. '
  '44':
  - type: text
    content: 'Ainsi périrent 18 000 hommes de Benjamin, tous hommes de guerre. '
  '45':
  - type: text
    content: Les survivants s’enfuirent en direction du désert vers le rocher de Rimmôn
  - type: note
    content: A une dizaine de kilomètres au nord-est de Guibéa.
  - type: text
    content: '. En chemin, 5 000 hommes furent tués, puis en les serrant de près jusqu’à Guideôm, les Israélites en abattirent encore 2 000 de plus. '
  '46':
  - type: text
    content: 'Le total des Benjaminites tués ce jour-là fut donc de 25 000 soldats portant l’épée, tous des hommes de guerre. '
  '47':
  - type: text
    content: 'Six cents hommes qui avaient tourné les talons et s’étaient enfuis au désert restèrent durant quatre mois sur le rocher de Rimmôn. '
  '48':
  - type: text
    content: Entre-temps, les Israélites se tournèrent contre les Benjaminites et exterminèrent de ville en ville les hommes, les bêtes et tout ce qui leur tombait sous la main. Après quoi, ils mirent le feu à toutes les villes de la région.
  '5':
  - type: text
    content: 'Les habitants de la ville s’en sont pris à moi. Pendant la nuit, ils ont encerclé la maison où je logeais avec l’intention de me tuer, ils ont abusé de ma femme jusqu’à ce qu’elle en meure. '
  '6':
  - type: text
    content: 'Alors j’ai pris son corps et je l’ai coupé en douze morceaux que j’ai envoyés dans tout le territoire attribué à Israël, parce qu’un crime abominable et infâme a été commis en Israël. '
  '7':
  - type: text
    content: Vous voici tous réunis, Israélites. A vous de délibérer et de tenir conseil ici même.
  '8':
  - type: text
    content: 'Tout le peuple se leva unanime en disant : Aucun de nous ne retournera chez lui et nul ne se retirera dans sa maison. '
  '9':
  - type: text
    content: 'Maintenant, voici comment nous agirons contre Guibéa. Nous tirerons au sort pour déterminer qui ira la combattre. '
