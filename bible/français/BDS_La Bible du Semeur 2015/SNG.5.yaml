document_id: SNG.5
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: « Je viens dans mon jardin, ╵ma sœur, ma mariée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je récolte ma myrrhe, ╵avec mes aromates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mange mon rayon de miel ╵avec mon miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je bois mon vin ╵avec mon lait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangez, amis, buvez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à l’ivresse, ╵les amoureux ! »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rendez-vous manqué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.2'
        metadata:
          usfm: SNG.5.2
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.3'
        metadata:
          usfm: SNG.6.3
      - type: text
        text: ', le rythme de la traduction accentue de nouveau les syllabes paires.'
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: « Je m’étais endormie, ╵pourtant mon cœur veillait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’entends mon bien-aimé frapper :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Ma sœur, mon amie, ouvre-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, ma colombe, ╵toi, ma parfaite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j’ai la tête ╵couverte de rosée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes boucles sont trempées ╵des gouttes de la nuit.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’ai ôté ma tunique, ╵comment la remettrais-je ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et j’ai lavé mes pieds : ╵comment les salirais-je ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon bien-aimé avance ╵sa main par l’ouverture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon ventre en a frémi
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et je me suis levée ╵pour ouvrir à mon bien-aimé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De mes mains, goutte à goutte, ╵de la myrrhe a coulé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la myrrhe onctueuse ╵a goutté de mes doigts
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusque sur la poignée ╵du verrou de la porte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’ouvre à mon bien-aimé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hélas, mon bien-aimé ╵était déjà parti : ╵il s’en était allé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son départ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et ses paroles me rendaient éperdue.
    marker-yv: yv-n
  - type: text
    text: ' ╵me rendait éperdue.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je l’ai appelé, ╵mais il ne m’a pas répondu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les gardes m’ont trouvée ╵ceux qui font le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils m’ont frappée ╵et ils m’ont maltraitée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’ont arraché ma mantille, ╵les gardes des remparts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O filles de Jérusalem, ╵oh, je vous en conjure :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous le rencontrez, ╵mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’allez-vous donc lui dire ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je suis malade d’amour ! »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chœur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Qu’a donc ton bien-aimé ╵de plus qu’un autre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dis-le-nous donc, ╵toi la plus belle ╵parmi les femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, qu’a-t-il donc ton bien-aimé ╵de plus qu’un autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu nous conjures, ╵de façon si pressante ? »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Que tu es beau, mon bien-aimé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: « Mon bien-aimé ╵a le teint clair et rose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on le distinguerait ╵au milieu de dix mille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sa tête est comme de l’or pur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses boucles sont flottantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’un noir de corbeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses yeux sont des colombes
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le bord des cours d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils baignent dans du lait
- type: usfm
  marker: q1
  children:
  - type: text
    text: reposant sur des coupes pleines ╵dans un chaton de bague.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ses joues ressemblent ╵à un parterre d’aromates
- type: usfm
  marker: q1
  children:
  - type: text
    text: exhalant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des tours (de parfum) ; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la traduction retenue suppose une modification de la vocalisation du mot hébreu, avec l’appui de l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: ' leurs parfums.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lèvres sont des lis
- type: usfm
  marker: q1
  children:
  - type: text
    text: distillant de la myrrhe, ╵de la myrrhe onctueuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et ses mains, des bracelets d’or
- type: usfm
  marker: q1
  children:
  - type: text
    text: incrustés de topazes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chrysolithe.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son corps est d’ivoire poli
- type: usfm
  marker: q1
  children:
  - type: text
    text: émaillé de saphirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ses jambes sont semblables ╵à des piliers de marbre
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur des socles d’or pur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son aspect est pareil ╵à celui du Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aussi majestueux que cette chaîne de montagnes qui se dresse au nord d’Israël.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’une beauté sans égale, ╵comme les cèdres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Son palais est plein de douceurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa personne ╵est empreinte de charme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est mon bien-aimé, ╵oui, tel est mon ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô filles de Jérusalem. »
