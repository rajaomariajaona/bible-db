document_id: SNG.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: « Je viens dans mon jardin, ╵ma sœur, ma mariée,
  - type: text
    content: je récolte ma myrrhe, ╵avec mes aromates,
  - type: text
    content: je mange mon rayon de miel ╵avec mon miel,
  - type: text
    content: je bois mon vin ╵avec mon lait.
  - type: text
    content: Mangez, amis, buvez !
  - type: text
    content: Jusqu’à l’ivresse, ╵les amoureux ! »
  - type: heading
    content: Rendez-vous manquéDe 5.2 à 6.3, le rythme de la traduction accentue de nouveau les syllabes paires.
  '10':
  - type: text
    content: « Mon bien-aimé ╵a le teint clair et rose,
  - type: text
    content: on le distinguerait ╵au milieu de dix mille.
  '11':
  - type: text
    content: Sa tête est comme de l’or pur.
  - type: text
    content: Ses boucles sont flottantes
  - type: text
    content: et d’un noir de corbeau.
  '12':
  - type: text
    content: Ses yeux sont des colombes
  - type: text
    content: sur le bord des cours d’eau,
  - type: text
    content: ils baignent dans du lait
  - type: text
    content: reposant sur des coupes pleines ╵dans un chaton de bague.
  '13':
  - type: text
    content: Ses joues ressemblent ╵à un parterre d’aromates
  - type: text
    content: exhalant
  - type: note
    content: 'Texte hébreu traditionnel : des tours (de parfum) ; la traduction retenue suppose une modification de la vocalisation du mot hébreu, avec l’appui de l’ancienne version grecque.'
  - type: text
    content: ' leurs parfums.'
  - type: text
    content: Ses lèvres sont des lis
  - type: text
    content: distillant de la myrrhe, ╵de la myrrhe onctueuse,
  '14':
  - type: text
    content: et ses mains, des bracelets d’or
  - type: text
    content: incrustés de topazes
  - type: note
    content: 'Autre traduction : chrysolithe.'
  - type: text
    content: .
  - type: text
    content: Son corps est d’ivoire poli
  - type: text
    content: émaillé de saphirs.
  '15':
  - type: text
    content: Ses jambes sont semblables ╵à des piliers de marbre
  - type: text
    content: sur des socles d’or pur.
  - type: text
    content: Son aspect est pareil ╵à celui du Liban
  - type: note
    content: Aussi majestueux que cette chaîne de montagnes qui se dresse au nord d’Israël.
  - type: text
    content: et d’une beauté sans égale, ╵comme les cèdres.
  '16':
  - type: text
    content: Son palais est plein de douceurs
  - type: text
    content: et toute sa personne ╵est empreinte de charme.
  - type: text
    content: Tel est mon bien-aimé, ╵oui, tel est mon ami,
  - type: text
    content: ô filles de Jérusalem. »
  '2':
  - type: text
    content: « Je m’étais endormie, ╵pourtant mon cœur veillait.
  - type: text
    content: 'J’entends mon bien-aimé frapper :'
  - type: text
    content: “Ma sœur, mon amie, ouvre-moi,
  - type: text
    content: toi, ma colombe, ╵toi, ma parfaite,
  - type: text
    content: car j’ai la tête ╵couverte de rosée.
  - type: text
    content: Mes boucles sont trempées ╵des gouttes de la nuit.”
  '3':
  - type: text
    content: J’ai ôté ma tunique, ╵comment la remettrais-je ?
  - type: text
    content: 'Et j’ai lavé mes pieds : ╵comment les salirais-je ?'
  '4':
  - type: text
    content: Mon bien-aimé avance ╵sa main par l’ouverture,
  - type: text
    content: mon ventre en a frémi
  '5':
  - type: text
    content: et je me suis levée ╵pour ouvrir à mon bien-aimé.
  - type: text
    content: De mes mains, goutte à goutte, ╵de la myrrhe a coulé,
  - type: text
    content: de la myrrhe onctueuse ╵a goutté de mes doigts
  - type: text
    content: jusque sur la poignée ╵du verrou de la porte.
  '6':
  - type: text
    content: J’ouvre à mon bien-aimé.
  - type: text
    content: 'Hélas, mon bien-aimé ╵était déjà parti : ╵il s’en était allé,'
  - type: text
    content: et son départ
  - type: note
    content: 'Autre traduction : et ses paroles me rendaient éperdue.'
  - type: text
    content: ' ╵me rendait éperdue.'
  - type: text
    content: Je l’ai cherché, ╵mais ne l’ai pas trouvé.
  - type: text
    content: Et je l’ai appelé, ╵mais il ne m’a pas répondu.
  '7':
  - type: text
    content: Les gardes m’ont trouvée ╵ceux qui font le tour de la ville,
  - type: text
    content: ils m’ont frappée ╵et ils m’ont maltraitée.
  - type: text
    content: Ils m’ont arraché ma mantille, ╵les gardes des remparts.
  '8':
  - type: text
    content: 'O filles de Jérusalem, ╵oh, je vous en conjure :'
  - type: text
    content: si vous le rencontrez, ╵mon bien-aimé,
  - type: text
    content: qu’allez-vous donc lui dire ?
  - type: text
    content: Que je suis malade d’amour ! »
  - type: heading
    content: Le chœur
  '9':
  - type: text
    content: « Qu’a donc ton bien-aimé ╵de plus qu’un autre ?
  - type: text
    content: Dis-le-nous donc, ╵toi la plus belle ╵parmi les femmes,
  - type: text
    content: oui, qu’a-t-il donc ton bien-aimé ╵de plus qu’un autre
  - type: text
    content: pour que tu nous conjures, ╵de façon si pressante ? »
  - type: heading
    content: Que tu es beau, mon bien-aimé
