document_id: SNG.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le titre du livre est une forme de superlatif qui signifie « le plus beau de tous les cantiques ». En fait, il ne s’agit pas d’un cantique dans le sens courant du mot – d’un chant religieux – mais d’un chant d’amour.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Selon la traduction proposée pour l’en-tête du livre, ce chant a été « composé par Salomon » (1.1). Cependant, l’hébreu permet aussi de comprendre que Salomon est le destinataire du poème ou encore le sujet du chant, l’un de ses personnages principaux : n’y est-il pas mentionné à six reprises (1.5 ; 3.7, 9, 11 ; 8.11-12) ? Il n’est donc pas possible de dater le chant de manière certaine.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le Cantique est rythmé par son refrain qui apparaît à trois reprises : « N’éveillez pas, non, ne réveillez pas l’amour avant qu’il ne le veuille » (2.7 ; 3.5 ; 8.4). En plus de ces divisions naturelles, certains délimitent d’autres sections dans le poème, en particulier entre 3.6 et 8.4.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: La compréhension du Cantique des Cantiques a donné lieu à des interprétations fort divergentes. On peut en relever trois types principaux.
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’interprétation allégorique est riche d’une longue tradition. Elle prend essentiellement deux formes. Compris de manière collective, le chant décrirait l’amour de l’Eternel et de son peuple, du Christ et de l’Eglise. Certains, individualisant la relation, y ont discerné une description de l’amour mystique qui unit le croyant ou l’âme au Seigneur. La caractéristique de cette approche est de gommer le caractère très humain des données du texte pour leur attribuer une signification spirituelle.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La majorité des spécialistes modernes se rallient, sous une forme ou une autre, à l’interprétation littérale. A leurs yeux, tel un écho au récit de la Genèse (Gn 2.22-25), le livre magnifie l’amour, dans ses dimensions effectives et physiques que scelle le mariage (voir 4.8 et note). Il développe ainsi l’enseignement des écrits de sagesse sur le couple (Pr 2.17 ; 5.15-19) dans une juste conception de la parfaite « bonté » de tout ce que Dieu a créé (Gn 1.31). Parmi les diverses approches littérales, deux interprétations doivent être mentionnées. L’interprétation historique voit dans le chant un récit soit à deux personnages – Salomon et la Sulamite, dont le livre retrace l’histoire de l’amour – soit à trois : Salomon, le roi au harem impressionnant (1 R 11.3), cherche à séduire la Sulamite qui résiste à ses avances pour rester fidèle à son bien-aimé, le berger (voir 1.4 ; 6.11-12 ; 8.11-14). Selon l’interprétation lyrique, le Cantique chante l’amour entre la Sulamite et le berger, son « roi » et son « Salomon ».'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Parmi les partisans de l’approche littérale, certains optent encore pour une interprétation « typologique » ou parabolique. Contrairement à l’interprétation allégorique qui confère un sens spirituel à chaque détail du texte, cette compréhension laisse à la réalité humaine toute sa consistance. Mais à la manière de l’apôtre Paul (Ep 5.22-23), elle en souligne la fonction de reflet : l’amour humain est image de l’amour de Dieu pour les siens.'
