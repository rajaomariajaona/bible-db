document_id: JER.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les mauvais bergers et le bon Berger
  - type: text
    content: Malheur à ces bergers
  - type: note
    content: Les bergers sont les rois qui viennent d’être mentionnés.
  - type: text
    content: ' qui perdent et dispersent les brebis de mon pâturage, l’Eternel le déclare. '
  '10':
  - type: text
    content: Car le pays est rempli d’adultères
  - type: text
    content: et il est dans le deuil. ╵A cause des malédictions
  - type: note
    content: 'A cause des malédictions: selon le texte hébreu traditionnel. Quelques manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : à cause de cela.'
  - type: text
    content: ','
  - type: text
    content: les pâturages de la steppe ╵sont desséchés.
  - type: text
    content: Ces hommes courent pour le mal
  - type: text
    content: et usent de leur force ╵pour l’injustice.
  '11':
  - type: text
    content: Oui, même les prophètes, ╵même les prêtres, ╵sont pervertis
  - type: text
    content: et, jusque dans mon temple, ╵ils font le mal,
  - type: text
    content: l’Eternel le déclare.
  '12':
  - type: text
    content: C’est pourquoi leur chemin ╵sera pour eux glissant ╵et obscurci ;
  - type: text
    content: ils y seront poussés ╵et ils y tomberont.
  - type: text
    content: Car je ferai venir ╵un grand malheur sur eux
  - type: text
    content: l’année où je les châtierai,
  - type: text
    content: l’Eternel le déclare.
  '13':
  - type: text
    content: J’ai vu des choses scandaleuses
  - type: text
    content: chez les prophètes ╵de Samarie
  - type: note
    content: Samarie, capitale du royaume du Nord, centre du faux culte, avait subi le châtiment de Dieu par la conquête assyrienne un siècle avant Jérémie. Les prédictions optimistes de ses prophètes n’avaient pas empêché Dieu de la punir.
  - type: text
    content: '  :'
  - type: text
    content: ils ont prophétisé ╵au nom du dieu Baal
  - type: text
    content: 'et ils ont égaré ╵mon peuple : Israël.'
  '14':
  - type: text
    content: Mais parmi les prophètes de Jérusalem,
  - type: text
    content: j’ai vu des abominations !
  - type: text
    content: On commet l’adultère,
  - type: text
    content: on vit dans le mensonge,
  - type: text
    content: on encourage ceux qui font le mal
  - type: text
    content: en sorte qu’ils ne se détournent pas ╵de leur méchanceté.
  - type: text
    content: Ils sont tous devenus ╵pour moi comme Sodome,
  - type: text
    content: et les habitants de Jérusalem ╵comme ceux de Gomorrhe
  - type: note
    content: Voir Gn 18.20-21 ; 19.1-9 ; Es 1.10 ; Ez 16.49.
  - type: text
    content: .
  '15':
  - type: text
    content: 'C’est pourquoi, voici ce que dit ╵le Seigneur des armées célestes ╵au sujet des prophètes :'
  - type: text
    content: Voici, je vais leur donner de l’absinthe ╵pour les nourrir
  - type: text
    content: et je leur ferai boire ╵des eaux empoisonnées,
  - type: text
    content: car c’est de tes prophètes, ╵Jérusalem,
  - type: text
    content: qu’est venue l’impiété ╵pour se répandre ╵partout dans le pays.
  '16':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: text
    content: N’écoutez pas ╵ce que proclament les prophètes
  - type: text
    content: dans leurs discours ;
  - type: text
    content: ils vous bercent sans fin ╵d’illusions mensongères
  - type: text
    content: car ce qu’ils vous racontent, ╵ce ne sont que révélations ╵de leur propre invention
  - type: text
    content: et non pas ce qui sort ╵de la bouche de l’Eternel.
  '17':
  - type: text
    content: 'A ceux qui me méprisent ils disent :'
  - type: text
    content: « L’Eternel a parlé,
  - type: text
    content: vous connaîtrez la paix. »
  - type: text
    content: Et à tous ceux ╵qui suivent les penchants ╵de leur cœur obstiné,
  - type: text
    content: 'ils disent : « Le malheur ╵ne vous atteindra pas ! »'
  '18':
  - type: text
    content: Mais qui a assisté ╵au conseil que tient l’Eternel ?
  - type: text
    content: Oui, qui a vu, ╵qui a entendu sa parole ?
  - type: text
    content: Qui donc a prêté attention ╵à sa parole ?
  - type: text
    content: Qui donc l’a entendue ?
  '19':
  - type: text
    content: Voici que la tempête ╵de l’Eternel se lève,
  - type: text
    content: sa fureur se déchaîne,
  - type: text
    content: l’orage tourbillonne,
  - type: text
    content: il s’abat sur la tête ╵de ceux qui font le mal
  - type: note
    content: Pour les v. 19-20, voir 30.23-24.
  - type: text
    content: .
  '2':
  - type: text
    content: 'C’est pourquoi voici ce que dit l’Eternel, le Dieu d’Israël, au sujet des bergers qui dirigent son peuple : Vous avez dispersé mon troupeau de brebis. Vous les avez chassées, vous n’avez pas veillé sur elles ! Eh bien, moi, je vous punirai'
  - type: note
    content: Le prophète joue ici sur les deux sens du même verbe hébreu qui signifie veiller et punir.
  - type: text
    content: ' à cause de vos agissements mauvais, l’Eternel le déclare. '
  '20':
  - type: text
    content: La colère de l’Eternel ╵ne se calmera pas
  - type: text
    content: avant qu’il ait agi ╵et qu’il ait accompli
  - type: text
    content: les desseins de son cœur.
  - type: text
    content: Dans les jours à venir, ╵vous vous en rendrez compte.
  '21':
  - type: text
    content: Je n’ai pas mandaté ╵tous ces prophètes-là,
  - type: text
    content: et cependant, ils courent !
  - type: text
    content: Et je ne leur ai pas ╵adressé la parole.
  - type: text
    content: Pourtant, ils prophétisent !
  '22':
  - type: text
    content: S’ils avaient assisté ╵à mon conseil,
  - type: text
    content: ils auraient annoncé ╵ma parole à mon peuple.
  - type: text
    content: Ils le feraient se détourner ╵de ses mauvais comportements
  - type: text
    content: et de ses mauvais actes.
  '23':
  - type: text
    content: Ne suis-je donc ╵qu’un Dieu de près,
  - type: text
    content: demande l’Eternel,
  - type: text
    content: ne suis-je pas aussi ╵un Dieu de loin ?
  '24':
  - type: text
    content: Quelqu’un, dit l’Eternel, ╵pourrait-il se cacher ╵dans un endroit secret
  - type: text
    content: sans que moi, je le voie ?
  - type: text
    content: Ne suis-je pas celui ╵qui remplit ciel et terre ?
  - type: text
    content: demande l’Eternel.
  - type: heading
    content: Inventions mensongères
  '25':
  - type: text
    content: 'J’ai entendu les discours des prophètes qui prophétisent le mensonge en mon nom, en disant : « Voici, j’ai reçu un songe ! J’ai reçu un songe ! » '
  '26':
  - type: text
    content: 'Combien de temps encore auront-ils donc en tête, de prophétiser le mensonge, ces prophètes qui proclament leurs inventions trompeuses ? '
  '27':
  - type: text
    content: 'Veulent-ils, par les songes qu’ils se racontent mutuellement, me faire oublier par mon peuple tout comme leurs ancêtres m’ont oublié pour Baal ? '
  '28':
  - type: text
    content: 'Si un prophète a fait un songe, qu’il raconte ce songe. Et celui qui a une parole de ma part, qu’il communique ma parole selon la vérité. Que vient faire la paille au milieu du froment ? demande l’Eternel. '
  '29':
  - type: text
    content: Ma parole n’est-elle pas pareille au feu ? demande l’Eternel. N’est-elle pas comme un marteau qui brise le roc ?
  '3':
  - type: text
    content: 'Moi, je rassemblerai ce qui reste de mes brebis dispersées dans tous les pays où je les ai chassées, je les ramènerai dans leur propre prairie où elles se reproduiront et se multiplieront. '
  '30':
  - type: text
    content: 'Aussi, déclare l’Eternel, je vais m’en prendre à ces prophètes qui, mutuellement, se volent mes paroles. '
  '31':
  - type: text
    content: 'Je vais m’en prendre à ces prophètes, déclare l’Eternel, qui agitent leur langue pour prononcer un oracle. '
  '32':
  - type: text
    content: Je vais m’en prendre, déclare l’Eternel, à ces prophètes qui ont des songes mensongers, qui les racontent pour égarer mon peuple par leurs mensonges et par leurs balivernes. Car moi, je ne les ai pas mandatés, je ne leur ai pas donné d’ordre, ils ne sont, pour ce peuple, d’aucune utilité, l’Eternel le déclare.
  - type: heading
    content: Qui est le fardeau ?
  '33':
  - type: text
    content: 'Et si quelqu’un du peuple, ou un prophète ou bien un prêtre, te pose la question : « Quel est donc le message dont l’Eternel te charge'
  - type: note
    content: Nous essayons ici et dans la suite de rendre le jeu de mots de l’hébreu qui utilise un même terme signifiant tantôt message, tantôt charge.
  - type: text
    content: '  ? » tu leur diras ceci : La charge ? C’est vous-même ! Je vais m’en délester, l’Eternel le déclare. '
  '34':
  - type: text
    content: 'Et si un prophète ou un prêtre, ou si quelqu’un du peuple déclare : « Voici le message dont l’Eternel me charge », je punirai cet homme ainsi que sa famille. '
  '35':
  - type: text
    content: 'Vous demanderez ainsi les uns aux autres : « Qu’a donc répondu l’Eternel ? » ou « Qu’a déclaré l’Eternel ? » '
  '36':
  - type: text
    content: 'Mais vous ne direz plus : « Voici l’oracle dont l’Eternel me charge », sinon cette parole deviendra une charge pour celui qui la dit, car vous avez tordu les paroles du Dieu vivant, de notre Dieu, le Seigneur des armées célestes. '
  '37':
  - type: text
    content: 'Tu demanderas au prophète : « Que t’a répondu l’Eternel ? » ou : « Qu’a déclaré l’Eternel ? » '
  '38':
  - type: text
    content: 'Mais si vous dites : « Voici l’oracle dont l’Eternel me charge », alors voici ce que déclare l’Eternel : Puisque c’est là ce que vous dites : « Voici l’oracle dont l’Eternel me charge », alors que je vous ai fait dire : « Ne parlez pas ainsi ! », '
  '39':
  - type: text
    content: à cause de cela, je vais vous oublier totalement
  - type: note
    content: 'Selon le texte hébreu traditionnel. Quelques manuscrits hébreux, l’ancienne version grecque, la version syriaque et la Vulgate ont : je vais vous charger sur mes épaules comme un chargement.'
  - type: text
    content: ' et vous rejeter loin de moi, vous et la ville que je vous ai donnée, à vous et à vos ancêtres ; '
  '4':
  - type: text
    content: J’établirai sur elles des bergers de mon choix qui les dirigeront. Et elles ne connaîtront plus ni crainte ni terreur, et plus aucune d’elles ne manquera jamais, l’Eternel le déclare.
  '40':
  - type: text
    content: je vous couvrirai d’un opprobre éternel, d’une honte éternelle qu’on n’oubliera jamais.
  '5':
  - type: text
    content: Voici venir le temps,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: où je vais donner à David ╵un germe juste.
  - type: text
    content: Il régnera avec sagesse
  - type: text
    content: et il exercera ╵le droit et la justice ╵dans le pays
  - type: note
    content: Voir 33.14-16.
  - type: text
    content: .
  '6':
  - type: text
    content: A cette époque-là, ╵Juda sera sauvé,
  - type: text
    content: et Israël vivra ╵dans la sécurité.
  - type: text
    content: 'Voici quel est le nom ╵dont on l’appellera :'
  - type: text
    content: « L’Eternel est notre justice
  - type: note
    content: 'Allusion au roi Sédécias (21.1) qui ne faisait guère honneur à son nom qui signifie : l’Eternel est ma justice.'
  - type: text
    content: '  ».'
  '7':
  - type: text
    content: 'C’est pourquoi des jours viennent, l’Eternel le déclare, où l’on ne dira plus : « L’Eternel est vivant, lui qui a fait sortir d’Egypte les Israélites'
  - type: note
    content: Pour les v. 7-8, voir 16.14-15.
  - type: text
    content: '  », '
  '8':
  - type: text
    content: 'mais l’on dira plutôt : « L’Eternel est vivant, lui qui a fait sortir et revenir la descendance d’Israël de ce pays du nord et de tous les pays où il l’aura chassée. » Elle vivra alors dans son pays.'
  - type: heading
    content: Contre les faux prophètes
  - type: heading
    content: Prophètes pervertis
  '9':
  - type: text
    content: 'Au sujet des prophètes :'
  - type: text
    content: mon cœur est tout brisé
  - type: text
    content: et tous mes membres tremblent.
  - type: text
    content: Je suis comme un homme ivre,
  - type: text
    content: oui, comme un homme ╵que le vin a dompté.
  - type: text
    content: C’est à cause de l’Eternel, ╵de ses paroles saintes.
