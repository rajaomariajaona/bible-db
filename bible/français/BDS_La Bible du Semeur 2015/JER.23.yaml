document_id: JER.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les mauvais bergers et le bon Berger
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ces bergers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bergers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont les rois qui viennent d’être mentionnés.
      marker-yv: yv-n
    - type: text
      text: ' qui perdent et dispersent les brebis de mon pâturage, l’Eternel le déclare. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car le pays est rempli d’adultères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il est dans le deuil. ╵A cause des malédictions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A cause des malédictions
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. Quelques manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de cela.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pâturages de la steppe ╵sont desséchés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces hommes courent pour le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et usent de leur force ╵pour l’injustice.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, même les prophètes, ╵même les prêtres, ╵sont pervertis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, jusque dans mon temple, ╵ils font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est pourquoi leur chemin ╵sera pour eux glissant ╵et obscurci ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils y seront poussés ╵et ils y tomberont.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je ferai venir ╵un grand malheur sur eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’année où je les châtierai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J’ai vu des choses scandaleuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chez les prophètes ╵de Samarie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Samarie
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: capitale du royaume du Nord, centre du faux culte, avait subi le châtiment de Dieu par la conquête assyrienne un siècle avant Jérémie. Les prédictions optimistes de ses prophètes n’avaient pas empêché Dieu de la punir.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont prophétisé ╵au nom du dieu Baal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils ont égaré ╵mon peuple : Israël.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais parmi les prophètes de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai vu des abominations !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On commet l’adultère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on vit dans le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on encourage ceux qui font le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en sorte qu’ils ne se détournent pas ╵de leur méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont tous devenus ╵pour moi comme Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les habitants de Jérusalem ╵comme ceux de Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Gn 18.20-21 ; 19.1-9 ; Es 1.10 ; Ez 16.49.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'C’est pourquoi, voici ce que dit ╵le Seigneur des armées célestes ╵au sujet des prophètes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vais leur donner de l’absinthe ╵pour les nourrir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je leur ferai boire ╵des eaux empoisonnées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est de tes prophètes, ╵Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’est venue l’impiété ╵pour se répandre ╵partout dans le pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur des armées célestes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’écoutez pas ╵ce que proclament les prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans leurs discours ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils vous bercent sans fin ╵d’illusions mensongères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce qu’ils vous racontent, ╵ce ne sont que révélations ╵de leur propre invention
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non pas ce qui sort ╵de la bouche de l’Eternel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'A ceux qui me méprisent ils disent :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « L’Eternel a parlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous connaîtrez la paix. »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à tous ceux ╵qui suivent les penchants ╵de leur cœur obstiné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils disent : « Le malheur ╵ne vous atteindra pas ! »'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mais qui a assisté ╵au conseil que tient l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, qui a vu, ╵qui a entendu sa parole ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc a prêté attention ╵à sa parole ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc l’a entendue ?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Voici que la tempête ╵de l’Eternel se lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa fureur se déchaîne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’orage tourbillonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’abat sur la tête ╵de ceux qui font le mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 19-20, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 30.23-24
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'C’est pourquoi voici ce que dit l’Eternel, le Dieu d’Israël, au sujet des bergers qui dirigent son peuple : Vous avez dispersé mon troupeau de brebis. Vous les avez chassées, vous n’avez pas veillé sur elles ! Eh bien, moi, je vous punirai'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le prophète joue ici sur les deux sens du même verbe hébreu qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'veiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: punir.
      marker-yv: yv-n
    - type: text
      text: ' à cause de vos agissements mauvais, l’Eternel le déclare. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La colère de l’Eternel ╵ne se calmera pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant qu’il ait agi ╵et qu’il ait accompli
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les desseins de son cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les jours à venir, ╵vous vous en rendrez compte.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je n’ai pas mandaté ╵tous ces prophètes-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cependant, ils courent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne leur ai pas ╵adressé la parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, ils prophétisent !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: S’ils avaient assisté ╵à mon conseil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils auraient annoncé ╵ma parole à mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils le feraient se détourner ╵de ses mauvais comportements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de ses mauvais actes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ne suis-je donc ╵qu’un Dieu de près,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: demande l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne suis-je pas aussi ╵un Dieu de loin ?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Quelqu’un, dit l’Eternel, ╵pourrait-il se cacher ╵dans un endroit secret
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que moi, je le voie ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne suis-je pas celui ╵qui remplit ciel et terre ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: demande l’Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inventions mensongères
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'J’ai entendu les discours des prophètes qui prophétisent le mensonge en mon nom, en disant : « Voici, j’ai reçu un songe ! J’ai reçu un songe ! » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Combien de temps encore auront-ils donc en tête, de prophétiser le mensonge, ces prophètes qui proclament leurs inventions trompeuses ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Veulent-ils, par les songes qu’ils se racontent mutuellement, me faire oublier par mon peuple tout comme leurs ancêtres m’ont oublié pour Baal ? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Si un prophète a fait un songe, qu’il raconte ce songe. Et celui qui a une parole de ma part, qu’il communique ma parole selon la vérité. Que vient faire la paille au milieu du froment ? demande l’Eternel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ma parole n’est-elle pas pareille au feu ? demande l’Eternel. N’est-elle pas comme un marteau qui brise le roc ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Moi, je rassemblerai ce qui reste de mes brebis dispersées dans tous les pays où je les ai chassées, je les ramènerai dans leur propre prairie où elles se reproduiront et se multiplieront. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Aussi, déclare l’Eternel, je vais m’en prendre à ces prophètes qui, mutuellement, se volent mes paroles. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Je vais m’en prendre à ces prophètes, déclare l’Eternel, qui agitent leur langue pour prononcer un oracle. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Je vais m’en prendre, déclare l’Eternel, à ces prophètes qui ont des songes mensongers, qui les racontent pour égarer mon peuple par leurs mensonges et par leurs balivernes. Car moi, je ne les ai pas mandatés, je ne leur ai pas donné d’ordre, ils ne sont, pour ce peuple, d’aucune utilité, l’Eternel le déclare.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui est le fardeau ?
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Et si quelqu’un du peuple, ou un prophète ou bien un prêtre, te pose la question : « Quel est donc le message dont l’Eternel te charge'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nous essayons ici et dans la suite de rendre le jeu de mots de l’hébreu qui utilise un même terme signifiant tantôt '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'message, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tantôt '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charge.
      marker-yv: yv-n
    - type: text
      text: '  ? » tu leur diras ceci : La charge ? C’est vous-même ! Je vais m’en délester, l’Eternel le déclare. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Et si un prophète ou un prêtre, ou si quelqu’un du peuple déclare : « Voici le message dont l’Eternel me charge », je punirai cet homme ainsi que sa famille. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Vous demanderez ainsi les uns aux autres : « Qu’a donc répondu l’Eternel ? » ou « Qu’a déclaré l’Eternel ? » '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Mais vous ne direz plus : « Voici l’oracle dont l’Eternel me charge », sinon cette parole deviendra une charge pour celui qui la dit, car vous avez tordu les paroles du Dieu vivant, de notre Dieu, le Seigneur des armées célestes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tu demanderas au prophète : « Que t’a répondu l’Eternel ? » ou : « Qu’a déclaré l’Eternel ? » '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Mais si vous dites : « Voici l’oracle dont l’Eternel me charge », alors voici ce que déclare l’Eternel : Puisque c’est là ce que vous dites : « Voici l’oracle dont l’Eternel me charge », alors que je vous ai fait dire : « Ne parlez pas ainsi ! », '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: à cause de cela, je vais vous oublier totalement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Quelques manuscrits hébreux, l’ancienne version grecque, la version syriaque et la Vulgate ont : '
