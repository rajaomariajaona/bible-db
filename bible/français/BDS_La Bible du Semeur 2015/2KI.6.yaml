document_id: 2KI.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le fer qui surnage
  - type: text
    content: Un jour, les disciples des prophètes
  - type: note
    content: Probablement à Jéricho, l’école de disciples du prophète la plus proche du Jourdain.
  - type: text
    content: ' dirent à Elisée : Tu vois que la salle où nous nous réunissons avec toi est devenue trop petite pour nous. '
  '10':
  - type: text
    content: Alors le roi d’Israël envoya quelques hommes en reconnaissance à l’endroit que lui avait signalé l’homme de Dieu.
  - type: text
    content: 'Cela se produisit à plusieurs reprises, '
  '11':
  - type: text
    content: 'au point que le roi de Syrie en fut profondément troublé. Il convoqua ses officiers et leur dit : Ne voulez-vous pas me dire qui, parmi nous, est du côté du roi d’Israël ?'
  '12':
  - type: text
    content: 'L’un de ses officiers lui répondit : Personne, mon seigneur le roi. C’est Elisée, le prophète d’Israël, qui révèle à son roi jusqu’aux paroles que tu prononces dans ta chambre à coucher.'
  '13':
  - type: text
    content: 'Le roi dit : Allez voir où il se trouve, pour que je puisse le faire saisir !'
  - type: text
    content: 'On vint lui annoncer : Il est à Dotân'
  - type: note
    content: Situé sur une colline à mi-chemin entre Jizréel et Samarie, à une quinzaine de kilomètres au nord de Samarie (cf. Gn 37.17).
  - type: text
    content: .
  '14':
  - type: text
    content: 'Le roi y envoya une forte troupe de soldats avec des chevaux et des chars. Ils arrivèrent de nuit et cernèrent la localité. '
  '15':
  - type: text
    content: 'Le lendemain matin, le serviteur de l’homme de Dieu se leva de bonne heure et sortit. Il vit qu’une troupe entourait la cité avec des chevaux et des chars. Le serviteur dit à son maître : Ah, mon seigneur ! Qu’allons-nous faire ?'
  '16':
  - type: text
    content: 'Elisée répondit : N’aie pas peur, car ceux qui sont avec nous sont plus nombreux qu’eux.'
  '17':
  - type: text
    content: 'Puis il pria : Eternel, je t’en prie : ouvre-lui les yeux, pour qu’il voie !'
  - type: text
    content: L’Eternel ouvrit les yeux du serviteur qui vit la montagne pleine de chevaux et de chars de feu autour d’Elisée.
  '18':
  - type: text
    content: 'Les Syriens se dirigèrent vers Elisée. Celui-ci pria l’Eternel en disant : Je te prie, frappe d’aveuglement toute cette troupe !'
  - type: text
    content: 'Et l’Eternel les frappa d’aveuglement, comme Elisée l’avait demandé. '
  '19':
  - type: text
    content: 'Elisée dit aux soldats : Vous n’êtes pas sur le bon chemin ! Ce n’est pas ici la ville où vous voulez aller. Suivez-moi, et je vous conduirai vers l’homme que vous cherchez !'
  - type: text
    content: 'Il les conduisit à Samarie. '
  '2':
  - type: text
    content: 'Permets-nous d’aller jusqu’au Jourdain : là, chacun de nous taillera une poutre et nous la rapporterons pour construire une nouvelle maison. Elisée leur dit : Allez-y !'
  '20':
  - type: text
    content: 'Lorsqu’ils furent arrivés à Samarie, Elisée pria encore : Eternel, ouvre les yeux de ces hommes pour qu’ils voient maintenant !'
  - type: text
    content: L’Eternel leur ouvrit les yeux et ils s’aperçurent qu’ils étaient à l’intérieur de la ville de Samarie.
  '21':
  - type: text
    content: 'Lorsque le roi d’Israël les vit, il demanda à Elisée : Dois-je les tuer, mon père ?'
  '22':
  - type: text
    content: '– Non, lui répondit Elisée, ne les tue pas ! Massacres-tu des soldats que tu as capturés grâce à ton épée ou ton arc ? Au contraire : fais-leur servir du pain et de l’eau pour qu’ils mangent et qu’ils boivent. Puis qu’ils retournent chez leur souverain !'
  '23':
  - type: text
    content: Alors le roi d’Israël leur fit servir un repas copieux, ils mangèrent et burent, puis il les renvoya et ils retournèrent chez leur souverain. Depuis lors, les troupes syriennes cessèrent leurs incursions sur le territoire d’Israël.
  - type: heading
    content: La famine règne dans Samarie assiégée
  '24':
  - type: text
    content: 'Quelque temps plus tard, Ben-Hadad, le roi de Syrie, mobilisa toute son armée et alla mettre le siège devant Samarie. '
  '25':
  - type: text
    content: Pendant que le siège de la ville se prolongeait, une grande famine y sévissait au point qu’une tête d’âne
  - type: note
    content: L’âne était un animal impur (Lv 11.2-8 ; Dt 14.4-8), il ne devait donc pas être mangé.
  - type: text
    content: ' valait quatre-vingts pièces d’argent et une livre de pois chiches'
  - type: note
    content: 'Autres traductions : de bulbes d’oignons sauvages ou de fiente de pigeon (servant de combustible).'
  - type: text
    content: ' cinq pièces d’argent.'
  '26':
  - type: text
    content: 'Un jour, le roi d’Israël passait sur le rempart. Une femme lui cria : Viens à mon secours, mon seigneur le roi !'
  '27':
  - type: text
    content: 'Il répondit : Si l’Eternel ne vient pas à ton secours, comment pourrais-je te secourir ? Je n’ai ni blé, ni vin à te donner. '
  '28':
  - type: text
    content: 'Pourtant le roi ajouta : Qu’est-ce qui t’arrive ?'
  - type: text
    content: 'Elle répondit : Cette femme-là m’a proposé : « Donne ton fils ! Nous le mangerons aujourd’hui, et demain ce sera le tour du mien. » '
  '29':
  - type: text
    content: 'Nous avons donc fait cuire mon fils, et nous l’avons mangé. Mais le lendemain, quand je lui ai dit : « Donne ton fils pour que nous le mangions », elle l’a caché'
  - type: note
    content: Voir Dt 28.57.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Mais l’un d’eux le pria : Accepte de venir avec tes serviteurs.'
  - type: text
    content: 'Il répondit : D’accord, je viens.'
  '30':
  - type: text
    content: Lorsque le roi entendit le récit de cette femme, il déchira ses vêtements
  - type: note
    content: En signe de consternation.
  - type: text
    content: '. Lorsqu’il passa de nouveau sur le rempart, le peuple s’aperçut qu’il portait sous ses habits royaux un vêtement de toile grossière à même la peau. '
  '31':
  - type: text
    content: 'Il déclara : Que Dieu me punisse très sévèrement, si la tête d’Elisée, fils de Shaphath, reste encore aujourd’hui sur ses épaules.'
  - type: heading
    content: Elisée annonce la fin de la famine
  '32':
  - type: text
    content: 'Or, Elisée se tenait dans sa maison, avec les responsables de la ville. Le roi envoya quelqu’un chez lui. Mais avant que l’émissaire soit arrivé, Elisée avait dit aux responsables : Ne voyez-vous pas que ce fils d’assassin envoie quelqu’un pour me couper la tête ? Faites attention ! Quand vous verrez venir cet émissaire, fermez la porte pour l’empêcher d’entrer ! N’entend-on pas déjà le bruit des pas de son maître derrière lui ?'
  '33':
  - type: text
    content: Il n’avait pas fini de parler que, déjà, l’émissaire
  - type: note
    content: 'Avec une autre vocalisation du texte hébreu traditionnel : le roi.'
  - type: text
    content: ' arriva. Le roi dit à Elisée : Tout ce mal vient de l’Eternel ! Que puis-je encore attendre de lui ?'
  '4':
  - type: text
    content: 'Il descendit donc avec eux. Arrivés au Jourdain, ils abattirent des arbres. '
  '5':
  - type: text
    content: 'Pendant que l’un d’eux abattait son arbre, le fer de sa hache tomba dans l’eau. Il s’écria : Ah, mon maître ! Quel malheur ! C’était une hache empruntée !'
  '6':
  - type: text
    content: 'L’homme de Dieu lui demanda : Où est tombé le fer ?'
  - type: text
    content: 'L’homme lui indiqua l’endroit. Alors Elisée tailla un morceau de bois et le lança au même endroit. Aussitôt, le fer revint à la surface, '
  '7':
  - type: text
    content: 'et le prophète dit : Ramène-le à toi !'
  - type: text
    content: L’autre n’eut qu’à tendre la main pour le reprendre.
  - type: heading
    content: Les Syriens veulent capturer Elisée
  '8':
  - type: text
    content: Le roi de Syrie
  - type: note
    content: C’est-à-dire Ben-Hadad II (5.1 et note).
  - type: text
    content: ' était en guerre contre Israël ; il tint conseil avec son état-major et décida : J’établirai mon campement à tel et tel endroit. '
  '9':
  - type: text
    content: Immédiatement, l’homme de Dieu fit dire au roi d’Israël
  - type: note
    content: C’est-à-dire à Yoram (cf. 1.17 ; 3.1 ; 9.24).
  - type: text
    content: '  : Garde-toi bien de passer par tel endroit, car les Syriens y ont pris position.'
