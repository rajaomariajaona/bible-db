document_id: 2KI.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le fer qui surnage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un jour, les disciples des prophètes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement à Jéricho, l’école de disciples du prophète la plus proche du Jourdain.
    marker-yv: yv-n
  - type: text
    text: ' dirent à Elisée : Tu vois que la salle où nous nous réunissons avec toi est devenue trop petite pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Permets-nous d’aller jusqu’au Jourdain : là, chacun de nous taillera une poutre et nous la rapporterons pour construire une nouvelle maison. Elisée leur dit : Allez-y !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais l’un d’eux le pria : Accepte de venir avec tes serviteurs.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il répondit : D’accord, je viens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il descendit donc avec eux. Arrivés au Jourdain, ils abattirent des arbres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pendant que l’un d’eux abattait son arbre, le fer de sa hache tomba dans l’eau. Il s’écria : Ah, mon maître ! Quel malheur ! C’était une hache empruntée !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’homme de Dieu lui demanda : Où est tombé le fer ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’homme lui indiqua l’endroit. Alors Elisée tailla un morceau de bois et le lança au même endroit. Aussitôt, le fer revint à la surface, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et le prophète dit : Ramène-le à toi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’autre n’eut qu’à tendre la main pour le reprendre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Syriens veulent capturer Elisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi de Syrie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire Ben-Hadad II (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.1'
        metadata:
          usfm: 2KI.5.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' était en guerre contre Israël ; il tint conseil avec son état-major et décida : J’établirai mon campement à tel et tel endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Immédiatement, l’homme de Dieu fit dire au roi d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yoram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 1.17 ; 3.1 ; 9.24).
    marker-yv: yv-n
  - type: text
    text: '  : Garde-toi bien de passer par tel endroit, car les Syriens y ont pris position.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors le roi d’Israël envoya quelques hommes en reconnaissance à l’endroit que lui avait signalé l’homme de Dieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cela se produisit à plusieurs reprises, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'au point que le roi de Syrie en fut profondément troublé. Il convoqua ses officiers et leur dit : Ne voulez-vous pas me dire qui, parmi nous, est du côté du roi d’Israël ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’un de ses officiers lui répondit : Personne, mon seigneur le roi. C’est Elisée, le prophète d’Israël, qui révèle à son roi jusqu’aux paroles que tu prononces dans ta chambre à coucher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi dit : Allez voir où il se trouve, pour que je puisse le faire saisir !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On vint lui annoncer : Il est à Dotân'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Situé sur une colline à mi-chemin entre Jizréel et Samarie, à une quinzaine de kilomètres au nord de Samarie (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 37.17
        metadata:
          usfm: GEN.37.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le roi y envoya une forte troupe de soldats avec des chevaux et des chars. Ils arrivèrent de nuit et cernèrent la localité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le lendemain matin, le serviteur de l’homme de Dieu se leva de bonne heure et sortit. Il vit qu’une troupe entourait la cité avec des chevaux et des chars. Le serviteur dit à son maître : Ah, mon seigneur ! Qu’allons-nous faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elisée répondit : N’aie pas peur, car ceux qui sont avec nous sont plus nombreux qu’eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il pria : Eternel, je t’en prie : ouvre-lui les yeux, pour qu’il voie !'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’Eternel ouvrit les yeux du serviteur qui vit la montagne pleine de chevaux et de chars de feu autour d’Elisée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Syriens se dirigèrent vers Elisée. Celui-ci pria l’Eternel en disant : Je te prie, frappe d’aveuglement toute cette troupe !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et l’Eternel les frappa d’aveuglement, comme Elisée l’avait demandé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elisée dit aux soldats : Vous n’êtes pas sur le bon chemin ! Ce n’est pas ici la ville où vous voulez aller. Suivez-moi, et je vous conduirai vers l’homme que vous cherchez !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il les conduisit à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsqu’ils furent arrivés à Samarie, Elisée pria encore : Eternel, ouvre les yeux de ces hommes pour qu’ils voient maintenant !'
- type: usfm
  marker: p
  children:
  - type: text
    text: L’Eternel leur ouvrit les yeux et ils s’aperçurent qu’ils étaient à l’intérieur de la ville de Samarie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque le roi d’Israël les vit, il demanda à Elisée : Dois-je les tuer, mon père ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '– Non, lui répondit Elisée, ne les tue pas ! Massacres-tu des soldats que tu as capturés grâce à ton épée ou ton arc ? Au contraire : fais-leur servir du pain et de l’eau pour qu’ils mangent et qu’ils boivent. Puis qu’ils retournent chez leur souverain !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors le roi d’Israël leur fit servir un repas copieux, ils mangèrent et burent, puis il les renvoya et ils retournèrent chez leur souverain. Depuis lors, les troupes syriennes cessèrent leurs incursions sur le territoire d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La famine règne dans Samarie assiégée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelque temps plus tard, Ben-Hadad, le roi de Syrie, mobilisa toute son armée et alla mettre le siège devant Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Pendant que le siège de la ville se prolongeait, une grande famine y sévissait au point qu’une tête d’âne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'âne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un animal impur (Lv 11.2-8 ; Dt 14.4-8), il ne devait donc pas être mangé.
    marker-yv: yv-n
  - type: text
    text: ' valait quatre-vingts pièces d’argent et une livre de pois chiches'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de bulbes d’oignons sauvages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de fiente de pigeon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (servant de combustible).
    marker-yv: yv-n
  - type: text
    text: ' cinq pièces d’argent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Un jour, le roi d’Israël passait sur le rempart. Une femme lui cria : Viens à mon secours, mon seigneur le roi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il répondit : Si l’Eternel ne vient pas à ton secours, comment pourrais-je te secourir ? Je n’ai ni blé, ni vin à te donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pourtant le roi ajouta : Qu’est-ce qui t’arrive ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Cette femme-là m’a proposé : « Donne ton fils ! Nous le mangerons aujourd’hui, et demain ce sera le tour du mien. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nous avons donc fait cuire mon fils, et nous l’avons mangé. Mais le lendemain, quand je lui ai dit : « Donne ton fils pour que nous le mangions », elle l’a caché'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 28.57
        metadata:
          usfm: DEU.28.57
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Lorsque le roi entendit le récit de cette femme, il déchira ses vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En signe de consternation.
    marker-yv: yv-n
  - type: text
    text: '. Lorsqu’il passa de nouveau sur le rempart, le peuple s’aperçut qu’il portait sous ses habits royaux un vêtement de toile grossière à même la peau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il déclara : Que Dieu me punisse très sévèrement, si la tête d’Elisée, fils de Shaphath, reste encore aujourd’hui sur ses épaules.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée annonce la fin de la famine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Or, Elisée se tenait dans sa maison, avec les responsables de la ville. Le roi envoya quelqu’un chez lui. Mais avant que l’émissaire soit arrivé, Elisée avait dit aux responsables : Ne voyez-vous pas que ce fils d’assassin envoie quelqu’un pour me couper la tête ? Faites attention ! Quand vous verrez venir cet émissaire, fermez la porte pour l’empêcher d’entrer ! N’entend-on pas déjà le bruit des pas de son maître derrière lui ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il n’avait pas fini de parler que, déjà, l’émissaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Avec une autre vocalisation du texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le roi.
    marker-yv: yv-n
  - type: text
    text: ' arriva. Le roi dit à Elisée : Tout ce mal vient de l’Eternel ! Que puis-je encore attendre de lui ?'
