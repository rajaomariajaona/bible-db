document_id: JUD.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jude, serviteur de Jésus-Christ et frère de Jacques, salue ceux que Dieu a appelés à lui, qui sont aimés de Dieu le Père et gardés pour Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que la compassion, la paix et l’amour de Dieu vous soient pleinement accordés !
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Objet de la lettre : avertir contre les faux docteurs'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mes chers amis, j’avais le vif désir de vous écrire au sujet du salut qui nous est commun. J’ai vu la nécessité de le faire maintenant afin de vous recommander de lutter pour la foi qui a été transmise une fois pour toutes à ceux qui font partie du peuple saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car des hommes dont la condamnation est depuis longtemps annoncée dans l’Ecriture se sont infiltrés parmi nous. Ce sont des impies qui travestissent en débauche la grâce de notre Dieu en reniant Jésus-Christ, notre seul Maître et Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les faux docteurs et le sort qui les attend
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Laissez-moi vous rappeler des faits que vous connaissez bien. Après avoir délivré son peuple de l’esclavage en Egypte, le Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont ici : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jésus.
    marker-yv: yv-n
  - type: text
    text: ' a fait périr ceux qui avaient refusé de lui faire confiance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dieu a gardé, enchaînés à perpétuité dans les ténèbres pour le jugement du grand Jour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 P 2.4
        metadata:
          usfm: 2PE.2.4
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', les anges qui ont abandonné leur demeure au lieu de conserver leur rang.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les habitants de Sodome, de Gomorrhe et des villes voisines se sont livrés de la même manière à la débauche et ont recherché des relations sexuelles contre nature. C’est pourquoi ces villes ont été condamnées à un feu éternel, elles aussi, et servent ainsi d’exemple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.4-25
        metadata:
          usfm: GEN.19.4+GEN.19.5+GEN.19.6+GEN.19.7+GEN.19.8+GEN.19.9+GEN.19.10+GEN.19.11+GEN.19.12+GEN.19.13+GEN.19.14+GEN.19.15+GEN.19.16+GEN.19.17+GEN.19.18+GEN.19.19+GEN.19.20+GEN.19.21+GEN.19.22+GEN.19.23+GEN.19.24+GEN.19.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eh bien, malgré cela, ces individus font de même : leurs rêveries les entraînent à souiller leur propre corps, à rejeter l’autorité du Seigneur et à insulter les êtres glorieux du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourtant, l’archange Michel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Dn 10.13, 21 ; 12.1 ; Ap 12.7.
    marker-yv: yv-n
  - type: text
    text: ' lui-même, lorsqu’il contestait avec le diable et lui disputait le corps de Moïse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 34.6
        metadata:
          usfm: DEU.34.6
      - type: text
        text: . Jude mentionne ici une tradition juive.
    marker-yv: yv-n
  - type: text
    text: ', se garda bien de proférer contre lui un jugement insultant. Il se contenta de dire : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que le Seigneur te réprimande
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 3.2
        metadata:
          usfm: ZEC.3.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais ces gens-là insultent ce qu’ils ne connaissent pas. Quant à ce qu’ils connaissent par instinct, comme les bêtes privées de raison, cela ne sert qu’à leur perte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheur à eux ! Ils ont marché sur les traces de Caïn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 4.8
        metadata:
          usfm: GEN.4.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ; par amour du gain'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Balaam (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 22.7-35
        metadata:
          usfm: NUM.22.7+NUM.22.8+NUM.22.9+NUM.22.10+NUM.22.11+NUM.22.12+NUM.22.13+NUM.22.14+NUM.22.15+NUM.22.16+NUM.22.17+NUM.22.18+NUM.22.19+NUM.22.20+NUM.22.21+NUM.22.22+NUM.22.23+NUM.22.24+NUM.22.25+NUM.22.26+NUM.22.27+NUM.22.28+NUM.22.29+NUM.22.30+NUM.22.31+NUM.22.32+NUM.22.33+NUM.22.34+NUM.22.35
      - type: text
        text: ) illustre l’appât du gain qui caractérisait aussi les hérétiques (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 P 2.15
        metadata:
          usfm: 2PE.2.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ils sont tombés dans la même erreur que Balaam ; ils ont couru à leur perte en se révoltant comme Qoré'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 16.1-5
        metadata:
          usfm: NUM.16.1+NUM.16.2+NUM.16.3+NUM.16.4+NUM.16.5
      - type: text
        text: . Sans doute, les hérétiques s’opposaient-ils aussi aux autorités régulièrement instituées dans les Eglises locales.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Leur présence trouble vos repas communautaires. Ils se remplissent la panse sans vergogne, et ne s’intéressent qu’à eux-mêmes. Ils sont pareils à des nuages qui ne donnent pas de pluie et que les vents emportent, à des arbres qui, à la fin de l’automne, n’ont encore donné aucun fruit : ils sont deux fois morts, déracinés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils ressemblent aux vagues furieuses de la mer qui rejettent l’écume de leur honte, à des astres errants auxquels est réservée à perpétuité l’obscurité des ténèbres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A eux aussi s’applique la prophétie d’Hénok
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 5.21-24
        metadata:
          usfm: GEN.5.21+GEN.5.22+GEN.5.23+GEN.5.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le septième patriarche depuis Adam,
  - type: text
    text: ' qui dit : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici, le Seigneur va venir avec ses milliers d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour exercer son jugement sur tous, et pour faire rendre compte, à tous ceux qui ne le respectent pas, de tous les actes qu’ils ont commis dans leur révolte et de toutes les insultes que ces pécheurs sacrilèges ont proférées contre lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paroles extraites d’un ouvrage apocryphe intitulé '
      - type: usfm
        marker: bk
        children:
        - type: text
          text: Livre d’Hénoch
      - type: text
        text: ' ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.9'
        metadata:
          usfm: JUD.1.9
      - type: text
        text: ') dont nous possédons une traduction éthiopienne. Il est aussi possible que l’auteur du '
      - type: usfm
        marker: bk
        children:
        - type: text
          text: Livre d’Hénoch
      - type: text
        text: ' et Jude aient puisé à une source extra-biblique commune.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ces hommes-là sont d’éternels mécontents, toujours à se plaindre de leur sort, et entraînés par leurs mauvais désirs. Ils tiennent de grands discours et flattent les gens pour en tirer profit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Progressez sur le fondement de votre foi très sainte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais vous, mes chers amis, rappelez-vous ce que les apôtres de notre Seigneur Jésus-Christ ont prédit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils vous disaient : « A la fin des temps viendront des gens qui se moqueront de Dieu et qui vivront au gré de leurs propres désirs, sans aucun respect pour Dieu. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce sont de tels gens qui causent des divisions, des gens sans Dieu qui n’ont pas l’Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous, mes chers amis, bâtissez votre vie sur le fondement de votre foi très sainte. Priez par le Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Maintenez-vous dans l’amour de Dieu en attendant que notre Seigneur Jésus-Christ, dans sa compassion, vous accorde la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ayez de la compassion pour ceux qui doutent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui doutent, cherchez à les convaincre.
    marker-yv: yv-n
  - type: text
    text: '  ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: pour d’autres, sauvez-les en les arrachant au feu. Pour d’autres encore, ayez de la compassion, mais avec de la crainte, en ayant en horreur jusqu’au vêtement souillé par l’immoralité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doxologie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A celui qui peut vous garder de toute chute et vous faire paraître en sa présence glorieuse, sans reproche et exultant de joie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: au Dieu unique qui nous a sauvés par Jésus-Christ notre Seigneur, à lui soient reconnues la gloire et la majesté, la force et l’autorité, depuis toujours, maintenant et durant toute l’éternité ! Amen.
