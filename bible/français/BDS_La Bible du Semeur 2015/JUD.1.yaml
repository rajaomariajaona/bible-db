document_id: JUD.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Jude, serviteur de Jésus-Christ et frère de Jacques, salue ceux que Dieu a appelés à lui, qui sont aimés de Dieu le Père et gardés pour Jésus-Christ.
  '10':
  - type: text
    content: Mais ces gens-là insultent ce qu’ils ne connaissent pas. Quant à ce qu’ils connaissent par instinct, comme les bêtes privées de raison, cela ne sert qu’à leur perte.
  '11':
  - type: text
    content: Malheur à eux ! Ils ont marché sur les traces de Caïn
  - type: note
    content: Gn 4.8.
  - type: text
    content: '  ; par amour du gain'
  - type: note
    content: Balaam (Nb 22.7-35) illustre l’appât du gain qui caractérisait aussi les hérétiques (2 P 2.15).
  - type: text
    content: ', ils sont tombés dans la même erreur que Balaam ; ils ont couru à leur perte en se révoltant comme Qoré'
  - type: note
    content: Nb 16.1-5. Sans doute, les hérétiques s’opposaient-ils aussi aux autorités régulièrement instituées dans les Eglises locales.
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Leur présence trouble vos repas communautaires. Ils se remplissent la panse sans vergogne, et ne s’intéressent qu’à eux-mêmes. Ils sont pareils à des nuages qui ne donnent pas de pluie et que les vents emportent, à des arbres qui, à la fin de l’automne, n’ont encore donné aucun fruit : ils sont deux fois morts, déracinés. '
  '13':
  - type: text
    content: Ils ressemblent aux vagues furieuses de la mer qui rejettent l’écume de leur honte, à des astres errants auxquels est réservée à perpétuité l’obscurité des ténèbres.
  '14':
  - type: text
    content: A eux aussi s’applique la prophétie d’Hénok
  - type: note
    content: Gn 5.21-24.
  - type: text
    content: ', '
  - type: text
    content: le septième patriarche depuis Adam,
  - type: text
    content: ' qui dit : '
  - type: text
    content: Voici, le Seigneur va venir avec ses milliers d’
  - type: text
    content: anges
  - type: text
    content: ' '
  '15':
  - type: text
    content: pour exercer son jugement sur tous, et pour faire rendre compte, à tous ceux qui ne le respectent pas, de tous les actes qu’ils ont commis dans leur révolte et de toutes les insultes que ces pécheurs sacrilèges ont proférées contre lui
  - type: note
    content: Paroles extraites d’un ouvrage apocryphe intitulé Livre d’Hénoch (1.9) dont nous possédons une traduction éthiopienne. Il est aussi possible que l’auteur du Livre d’Hénoch et Jude aient puisé à une source extra-biblique commune.
  - type: text
    content: .
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ces hommes-là sont d’éternels mécontents, toujours à se plaindre de leur sort, et entraînés par leurs mauvais désirs. Ils tiennent de grands discours et flattent les gens pour en tirer profit.
  - type: heading
    content: Progressez sur le fondement de votre foi très sainte
  '17':
  - type: text
    content: 'Mais vous, mes chers amis, rappelez-vous ce que les apôtres de notre Seigneur Jésus-Christ ont prédit. '
  '18':
  - type: text
    content: 'Ils vous disaient : « A la fin des temps viendront des gens qui se moqueront de Dieu et qui vivront au gré de leurs propres désirs, sans aucun respect pour Dieu. » '
  '19':
  - type: text
    content: Ce sont de tels gens qui causent des divisions, des gens sans Dieu qui n’ont pas l’Esprit.
  '2':
  - type: text
    content: Que la compassion, la paix et l’amour de Dieu vous soient pleinement accordés !
  - type: heading
    content: 'Objet de la lettre : avertir contre les faux docteurs'
  '20':
  - type: text
    content: 'Mais vous, mes chers amis, bâtissez votre vie sur le fondement de votre foi très sainte. Priez par le Saint-Esprit. '
  '21':
  - type: text
    content: 'Maintenez-vous dans l’amour de Dieu en attendant que notre Seigneur Jésus-Christ, dans sa compassion, vous accorde la vie éternelle. '
  '22':
  - type: text
    content: Ayez de la compassion pour ceux qui doutent
  - type: note
    content: 'Certains manuscrits ont : ceux qui doutent, cherchez à les convaincre.'
  - type: text
    content: '  ; '
  '23':
  - type: text
    content: pour d’autres, sauvez-les en les arrachant au feu. Pour d’autres encore, ayez de la compassion, mais avec de la crainte, en ayant en horreur jusqu’au vêtement souillé par l’immoralité.
  - type: heading
    content: Doxologie
  '24':
  - type: text
    content: 'A celui qui peut vous garder de toute chute et vous faire paraître en sa présence glorieuse, sans reproche et exultant de joie, '
  '25':
  - type: text
    content: au Dieu unique qui nous a sauvés par Jésus-Christ notre Seigneur, à lui soient reconnues la gloire et la majesté, la force et l’autorité, depuis toujours, maintenant et durant toute l’éternité ! Amen.
  '3':
  - type: text
    content: Mes chers amis, j’avais le vif désir de vous écrire au sujet du salut qui nous est commun. J’ai vu la nécessité de le faire maintenant afin de vous recommander de lutter pour la foi qui a été transmise une fois pour toutes à ceux qui font partie du peuple saint.
  '4':
  - type: text
    content: Car des hommes dont la condamnation est depuis longtemps annoncée dans l’Ecriture se sont infiltrés parmi nous. Ce sont des impies qui travestissent en débauche la grâce de notre Dieu en reniant Jésus-Christ, notre seul Maître et Seigneur.
  - type: heading
    content: Les faux docteurs et le sort qui les attend
  '5':
  - type: text
    content: Laissez-moi vous rappeler des faits que vous connaissez bien. Après avoir délivré son peuple de l’esclavage en Egypte, le Seigneur
  - type: note
    content: 'Certains manuscrits ont ici : Jésus.'
  - type: text
    content: ' a fait périr ceux qui avaient refusé de lui faire confiance. '
  '6':
  - type: text
    content: Dieu a gardé, enchaînés à perpétuité dans les ténèbres pour le jugement du grand Jour
  - type: note
    content: Voir 2 P 2.4 et note.
  - type: text
    content: ', les anges qui ont abandonné leur demeure au lieu de conserver leur rang.'
  '7':
  - type: text
    content: Les habitants de Sodome, de Gomorrhe et des villes voisines se sont livrés de la même manière à la débauche et ont recherché des relations sexuelles contre nature. C’est pourquoi ces villes ont été condamnées à un feu éternel, elles aussi, et servent ainsi d’exemple
  - type: note
    content: Gn 19.4-25.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Eh bien, malgré cela, ces individus font de même : leurs rêveries les entraînent à souiller leur propre corps, à rejeter l’autorité du Seigneur et à insulter les êtres glorieux du ciel. '
  '9':
  - type: text
    content: Pourtant, l’archange Michel
  - type: note
    content: Voir Dn 10.13, 21 ; 12.1 ; Ap 12.7.
  - type: text
    content: ' lui-même, lorsqu’il contestait avec le diable et lui disputait le corps de Moïse'
  - type: note
    content: Voir Dt 34.6. Jude mentionne ici une tradition juive.
  - type: text
    content: ', se garda bien de proférer contre lui un jugement insultant. Il se contenta de dire : '
  - type: text
    content: Que le Seigneur te réprimande
  - type: note
    content: Za 3.2.
  - type: text
    content: '!'
