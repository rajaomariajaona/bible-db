document_id: 2KI.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le règne d’Ahaz sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 28.1-27)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: La dix-septième année du règne de Péqah, fils de Remalia, Ahaz, fils de Yotam, roi de Juda, devint roi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le règne d’Ahaz a sans doute commencé par une corégence avec son père Yotam en 735 av. J.-C. (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Ahaz se rendit à Damas pour rencontrer Tiglath-Piléser, le roi d’Assyrie. Là il vit le grand autel qui se trouvait dans cette ville et il en fit parvenir au prêtre Urie une reproduction et un plan détaillé pour qu’il en fasse une copie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probablement un autel dédié à Tiglath-Piléser.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre Urie construisit un autel en tous points conforme aux indications que le roi Ahaz lui avait envoyées depuis Damas, et il l’acheva avant que le roi soit rentré de Damas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque celui-ci fut de retour, il vit l’autel, s’en approcha et y monta ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il y offrit lui-même un holocauste et une offrande de farine, il y répandit une libation et aspergea l’autel avec le sang des sacrifices de communion. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à l’autel de bronze qui se trouvait devant l’Eternel, il l’ôta de sa place devant le Temple, entre le nouvel autel et le Temple, et le fit mettre sur le côté du nouvel autel, vers le nord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 8.64
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Ahaz ordonna au prêtre Urie : Désormais, tu feras brûler sur le grand autel l’holocauste du matin et l’offrande du soir, l’holocauste du roi et son offrande ainsi que l’holocauste et l’offrande de tout le peuple du pays avec leurs libations, et tu l’aspergeras de tout le sang des holocaustes et des autres sacrifices. En ce qui concerne l’autel de bronze, je déciderai moi-même de son usage.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prêtre Urie exécuta tous les ordres du roi.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: D’autre part, Ahaz fit démonter les plaques de bronze des châssis des chariots
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.27-39
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' du Temple et en fit enlever les bassins. Il ôta la grande cuve qui reposait sur les bœufs de bronze'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.23-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et il la fit déposer directement sur le sol pavé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enfin, à cause du roi d’Assyrie, il supprima aussi dans le temple de l’Eternel la galerie du sabbat, que l’on avait construite à l’intérieur et la porte par laquelle les rois pénétraient dans la cour du Temple.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres faits et gestes d’Ahaz sont cités dans le livre des Annales des rois de Juda. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était âgé de vingt ans à son avènement et il régna seize ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La durée totale du règne d’Ahaz (avec la corégence) fut de 20 ans (735 à 715 av. J.-C.). Le règne personnel après la mort de Yotam a dû commencer en 732, d’où l’indication des 16 ans (cf. note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15.33'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. Il ne fit pas ce que l’Eternel son Dieu considère comme juste, contrairement à son ancêtre David. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il rejoignit ses ancêtres décédés et fut enterré à leurs côtés dans la Cité de David. Son fils Ezéchias lui succéda sur le trône.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il suivit l’exemple des rois d’Israël. Il alla même jusqu’à brûler son propre fils pour l’offrir en sacrifice aux idoles, commettant ainsi la même abomination que les peuples étrangers que l’Eternel avait dépossédés en faveur des Israélites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur les sacrifices d’enfants, voir Lv 20.2-5 ; Dt 12.31 ; 18.10.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il offrait des sacrifices et brûlait des parfums sur les hauts lieux, sur les collines et sous chaque arbre verdoyant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Assyrie au secours de Juda
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Retsîn, roi de Syrie, et Péqah, fils de Remalia, roi d’Israël, vinrent pour attaquer Jérusalem. Ils assiégèrent Ahaz, mais ils ne purent pas engager le combat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Es 7.1-17 ; 2 Ch 28.16-21. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Retsîn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voulait remplacer Ahaz par le fils de Tabeél pour avoir un nouvel allié dans sa politique anti-assyrienne.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vers la même époque, Retsîn, roi de Syrie, ramena Eilath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eilath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était un port sur le golfe d’Aqaba qui donnait aux Judéens l’accès aux mers du sud du pays d’Israël.
      marker-yv: yv-n
    - type: text
      text: ' sous la domination des Syriens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les deux noms : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Syriens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Edomites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'se ressemblent beaucoup en hébreu, d’où la proposition de certains de mettre ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Edomites. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent plus loin : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et des Syriens vinrent s’y installer.
      marker-yv: yv-n
    - type: text
      text: '  ; il en chassa les Judéens, et des Edomites vinrent s’y installer. Ils l’ont occupée jusqu’à aujourd’hui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz envoya des messagers à Tiglath-Piléser, roi d’Assyrie, pour lui dire : Je suis ton vassal et ton fils'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jérusalem perdit ainsi son indépendance.
      marker-yv: yv-n
    - type: text
      text: . Viens me délivrer du roi de Syrie et du roi d’Israël qui sont venus m’attaquer.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz prit l’argent et l’or qui se trouvaient dans le temple de l’Eternel et dans le trésor du palais royal et il l’envoya comme présent au roi d’Assyrie. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d’Assyrie répondit à sa demande : il attaqua Damas, prit la ville et en déporta la population à Qir. Quant à Retsîn, il le fit mettre à mort.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des modifications sacrilèges dans le Temple
    marker-yv: yv-h
