document_id: ISA.38,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d’Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 20.1-11 ; 2 Ch 32.24-26)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette époque, Ezéchias tomba malade. Il était près de mourir, et le prophète Esaïe, fils d’Amots, se rendit à son chevet. Il lui dit : Voici ce que l’Eternel déclare : Prends tes dispositions, car tu vas mourir, tu ne te rétabliras pas.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jours sont désormais comptés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il faut que je m’en aille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour passer par les portes du séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: privé du reste de mes ans.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me disais : ╵Je ne verrai plus l’Eternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel sur la terre des vivants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne verrai plus aucun homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi les habitants du monde.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie m’est arrachée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: emportée loin de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une tente de berger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La toile de ma vie ╵a été enroulée, ╵comme celle d’un tisserand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La chaîne en est coupée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entre le matin et le soir, ╵tu m’auras achevé.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’au matin, ╵je me suis contenu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel dont la traduction est incertaine. Le principal texte hébreu de Qumrân a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avant le matin, tu m’auras réduit à rien.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ferait le lion, ╵il brisait tous mes os.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pendant le jour, avant la nuit, ╵tu m’auras achevé.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je poussais des cris comme une hirondelle ╵ou une grue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que la colombe, je gémissais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes yeux se sont lassés ╵à regarder en haut ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eternel, je suis dans l’angoisse :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: viens, secours-moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sois mon garant.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que puis-je dire ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a parlé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il m’a parlé
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. Le principal texte hébreu de Qumrân et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que dire à l’Eternel ?
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est lui qui agit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai donc humblement ╵tout le temps de ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de mon affliction.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, c’est grâce à ton action
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grâce à ces choses, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui pourrait renvoyer à la parole et à l’action de Dieu qu’Ezéchias vient de mentionner (v. 15). L’hébreu de ce verset est peu clair.
      marker-yv: yv-n
    - type: text
      text: ' ╵qu’on jouit de la vie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est grâce à elle ╵que je respire encore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me rétabliras, ╵tu me feras revivre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma profonde affliction ╵s’est transformée en paix
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car toi, dans ton amour, ╵tu m’as arraché à la tombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as rejeté toutes mes fautes ╵derrière toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne ne te loue ╵dans le séjour des morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce n’est pas la mort ╵qui te célébrera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont descendus ╵dans la tombe ne comptent plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur ta fidélité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont les vivants seuls ╵qui peuvent te louer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme moi aujourd’hui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le père enseignera aux fils ╵combien tu es fidèle.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Ezéchias tourna son visage du côté du mur et pria l’Eternel '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Eternel était là ╵pour venir me sauver :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ferons résonner ╵nos instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de la vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le temple de l’Eternel.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe avait ordonné : Qu’on apporte une masse de figues, et qu’on la frotte sur l’ulcère du roi, qui se rétablira'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 21-22 se trouvent juste après le v. 6 dans le texte parallèle de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 20.1-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Ezéchias avait dit : A quel signe saurai-je que je pourrai encore me rendre au temple de l’Eternel ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en ces termes : De grâce, Eternel ! Tiens compte de ce que je me suis conduit devant toi avec fidélité, d’un cœur sans partage, et que j’ai fait ce que tu considères comme bien.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Ezéchias versa d’abondantes larmes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel s’adressa à Esaïe en disant : '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va dire à Ezéchias : « Voici ce que déclare l’Eternel, le Dieu de David, ton ancêtre : J’ai entendu ta prière, et j’ai vu tes larmes. Eh bien, je vais prolonger ta vie de quinze années. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te délivrerai, toi et cette ville, du roi d’Assyrie, et je protégerai cette ville. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le signe que l’Eternel t’accorde pour te confirmer qu’il accomplira cette promesse qu’il vient de te donner : '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il va faire reculer de dix degrés l’ombre qui est déjà descendue sur le cadran solaire d’Ahaz. »
  - type: usfm
    marker: p
    children:
    - type: text
      text: Effectivement, le soleil recula de dix degrés sur le cadran solaire.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Cantique de reconnaissance
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici le poème écrit par Ezéchias, roi de Juda, à l’occasion de sa maladie dont il avait été guéri.
