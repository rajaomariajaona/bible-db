document_id: ISA.38,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie et guérison d’Ezéchias
  - type: heading
    content: (2 R 20.1-11 ; 2 Ch 32.24-26)
  - type: text
    content: 'A cette époque, Ezéchias tomba malade. Il était près de mourir, et le prophète Esaïe, fils d’Amots, se rendit à son chevet. Il lui dit : Voici ce que l’Eternel déclare : Prends tes dispositions, car tu vas mourir, tu ne te rétabliras pas.'
  '10':
  - type: text
    content: 'Je me disais :'
  - type: text
    content: Mes jours sont désormais comptés,
  - type: text
    content: il faut que je m’en aille,
  - type: text
    content: pour passer par les portes du séjour des morts,
  - type: text
    content: privé du reste de mes ans.
  '11':
  - type: text
    content: 'Je me disais : ╵Je ne verrai plus l’Eternel,'
  - type: text
    content: l’Eternel sur la terre des vivants,
  - type: text
    content: je ne verrai plus aucun homme
  - type: text
    content: parmi les habitants du monde.
  '12':
  - type: text
    content: Ma vie m’est arrachée,
  - type: text
    content: emportée loin de moi
  - type: text
    content: comme une tente de berger.
  - type: text
    content: La toile de ma vie ╵a été enroulée, ╵comme celle d’un tisserand.
  - type: text
    content: La chaîne en est coupée.
  - type: text
    content: Entre le matin et le soir, ╵tu m’auras achevé.
  '13':
  - type: text
    content: Jusqu’au matin, ╵je me suis contenu
  - type: note
    content: 'Selon le texte hébreu traditionnel dont la traduction est incertaine. Le principal texte hébreu de Qumrân a : avant le matin, tu m’auras réduit à rien.'
  - type: text
    content: .
  - type: text
    content: Comme ferait le lion, ╵il brisait tous mes os.
  - type: text
    content: Pendant le jour, avant la nuit, ╵tu m’auras achevé.
  '14':
  - type: text
    content: Je poussais des cris comme une hirondelle ╵ou une grue,
  - type: text
    content: ainsi que la colombe, je gémissais,
  - type: text
    content: mes yeux se sont lassés ╵à regarder en haut ;
  - type: text
    content: 'Eternel, je suis dans l’angoisse :'
  - type: text
    content: viens, secours-moi
  - type: note
    content: 'Autre traduction : sois mon garant.'
  - type: text
    content: '  !'
  '15':
  - type: text
    content: Que puis-je dire ?
  - type: text
    content: Il m’a parlé
  - type: note
    content: 'Il m’a parlé: selon le texte hébreu traditionnel. Le principal texte hébreu de Qumrân et la version syriaque ont : que dire à l’Eternel ?'
  - type: text
    content: et c’est lui qui agit.
  - type: text
    content: Je marcherai donc humblement ╵tout le temps de ma vie,
  - type: text
    content: à cause de mon affliction.
  '16':
  - type: text
    content: Seigneur, c’est grâce à ton action
  - type: note
    content: 'En hébreu : grâce à ces choses, ce qui pourrait renvoyer à la parole et à l’action de Dieu qu’Ezéchias vient de mentionner (v. 15). L’hébreu de ce verset est peu clair.'
  - type: text
    content: ' ╵qu’on jouit de la vie,'
  - type: text
    content: c’est grâce à elle ╵que je respire encore.
  - type: text
    content: Tu me rétabliras, ╵tu me feras revivre.
  '17':
  - type: text
    content: Ma profonde affliction ╵s’est transformée en paix
  - type: text
    content: car toi, dans ton amour, ╵tu m’as arraché à la tombe
  - type: text
    content: et tu as rejeté toutes mes fautes ╵derrière toi.
  '18':
  - type: text
    content: Personne ne te loue ╵dans le séjour des morts
  - type: text
    content: et ce n’est pas la mort ╵qui te célébrera.
  - type: text
    content: Ceux qui sont descendus ╵dans la tombe ne comptent plus
  - type: text
    content: sur ta fidélité.
  '19':
  - type: text
    content: Ce sont les vivants seuls ╵qui peuvent te louer
  - type: text
    content: comme moi aujourd’hui.
  - type: text
    content: Le père enseignera aux fils ╵combien tu es fidèle.
  '2':
  - type: text
    content: 'Alors Ezéchias tourna son visage du côté du mur et pria l’Eternel '
  '20':
  - type: text
    content: 'L’Eternel était là ╵pour venir me sauver :'
  - type: text
    content: nous ferons résonner ╵nos instruments
  - type: text
    content: tous les jours de la vie
  - type: text
    content: dans le temple de l’Eternel.
  '21':
  - type: text
    content: 'Esaïe avait ordonné : Qu’on apporte une masse de figues, et qu’on la frotte sur l’ulcère du roi, qui se rétablira'
  - type: note
    content: Les v. 21-22 se trouvent juste après le v. 6 dans le texte parallèle de 2 R 20.1-11.
  - type: text
    content: .
  '22':
  - type: text
    content: 'Et Ezéchias avait dit : A quel signe saurai-je que je pourrai encore me rendre au temple de l’Eternel ?'
  '3':
  - type: text
    content: 'en ces termes : De grâce, Eternel ! Tiens compte de ce que je me suis conduit devant toi avec fidélité, d’un cœur sans partage, et que j’ai fait ce que tu considères comme bien.'
  - type: text
    content: Et Ezéchias versa d’abondantes larmes.
  '4':
  - type: text
    content: 'Alors l’Eternel s’adressa à Esaïe en disant : '
  '5':
  - type: text
    content: 'Va dire à Ezéchias : « Voici ce que déclare l’Eternel, le Dieu de David, ton ancêtre : J’ai entendu ta prière, et j’ai vu tes larmes. Eh bien, je vais prolonger ta vie de quinze années. '
  '6':
  - type: text
    content: 'Je te délivrerai, toi et cette ville, du roi d’Assyrie, et je protégerai cette ville. '
  '7':
  - type: text
    content: 'Voici le signe que l’Eternel t’accorde pour te confirmer qu’il accomplira cette promesse qu’il vient de te donner : '
  '8':
  - type: text
    content: il va faire reculer de dix degrés l’ombre qui est déjà descendue sur le cadran solaire d’Ahaz. »
  - type: text
    content: Effectivement, le soleil recula de dix degrés sur le cadran solaire.
  - type: heading
    content: Cantique de reconnaissance
  '9':
  - type: text
    content: Voici le poème écrit par Ezéchias, roi de Juda, à l’occasion de sa maladie dont il avait été guéri.
