document_id: GEN.35,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob s’installe à Béthel
  - type: text
    content: 'Dieu dit à Jacob : Pars, rends-toi à Béthel et fixe-toi là-bas. Tu y construiras un autel au Dieu qui t’est apparu quand tu fuyais ton frère Esaü.'
  '10':
  - type: text
    content: 'Il lui dit : Ton nom est Jacob, mais tu ne seras plus appelé ainsi, ton nom sera Israël.'
  - type: text
    content: 'C’est ainsi que Dieu l’appela Israël. '
  '11':
  - type: text
    content: 'Et Dieu lui dit :'
  - type: text
    content: Je suis le Dieu tout-puissant.
  - type: text
    content: Sois fécond et aie de nombreux descendants ;
  - type: text
    content: un peuple, et même ╵tout un ensemble de peuples seront issus de toi.
  - type: text
    content: Tu auras pour descendants des rois.
  '12':
  - type: text
    content: Le pays que j’ai donné ╵à Abraham et à Isaac, ╵je te le donnerai
  - type: text
    content: ainsi qu’à ta descendance après toi
  - type: note
    content: Voir Gn 17.4-8 ; 26.3.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Puis Dieu se retira d’auprès de lui, du lieu où il lui avait parlé. '
  '14':
  - type: text
    content: 'Jacob érigea une stèle en pierre à l’endroit même où Dieu lui avait parlé, il y versa une libation et répandit de l’huile sur elle. '
  '15':
  - type: text
    content: Jacob donna au lieu où Dieu lui avait parlé le nom de Béthel.
  - type: heading
    content: La naissance de Benjamin et la mort de Rachel
  '16':
  - type: text
    content: Jacob et sa famille quittèrent Béthel. Lorsqu’ils étaient encore à une certaine distance d’Ephrata
  - type: note
    content: Ancien nom de Bethléhem en Juda (Rt 1.2 ; Mi 5.1).
  - type: text
    content: ', Rachel donna naissance à un enfant. Elle eut un accouchement difficile. '
  '17':
  - type: text
    content: 'Pendant les douleurs du travail, la sage-femme lui dit : Courage ! C’est encore un garçon.'
  '18':
  - type: text
    content: 'Mais elle se mourait. Dans son dernier souffle, elle le nomma Ben-Oni (Fils de ma douleur), mais son père l’appela Benjamin (Fils de bon augure). '
  '19':
  - type: text
    content: 'Rachel mourut, on l’enterra sur la route d’Ephrata, c’est-à-dire Bethléhem. '
  '2':
  - type: text
    content: 'Alors Jacob dit aux gens de sa famille et à tous ceux qui étaient avec lui : Faites disparaître les dieux étrangers qui se trouvent au milieu de vous. Purifiez-vous et changez de vêtements ! '
  '20':
  - type: text
    content: Jacob érigea une stèle sur sa tombe ; c’est la stèle funéraire de Rachel qui subsiste encore aujourd’hui.
  '21':
  - type: text
    content: 'Puis Israël leva le camp, il planta sa tente au-delà de Migdal-Eder. '
  '22':
  - type: text
    content: Pendant qu’il séjournait dans cette contrée, Ruben alla coucher avec Bilha, l’épouse de second rang de son père. Celui-ci l’apprit
  - type: note
    content: 'La version grecque ajoute : et en fut très affecté.'
  - type: text
    content: .
  - type: heading
    content: La liste des fils de Jacob
  - type: text
    content: 'Jacob avait douze fils. '
  '23':
  - type: text
    content: 'Fils de Léa : Ruben, le premier-né de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  '24':
  - type: text
    content: 'Fils de Rachel : Joseph et Benjamin. '
  '25':
  - type: text
    content: 'Fils de Bilha, servante de Rachel : Dan et Nephtali. '
  '26':
  - type: text
    content: 'Fils de Zilpa, servante de Léa : Gad et Aser. Tels sont les fils de Jacob, qui lui naquirent à Paddân-Aram.'
  - type: heading
    content: La mort d’Isaac
  '27':
  - type: text
    content: Jacob revint auprès de son père Isaac à Mamré, à Qiryath-Arba qui s’appelle aujourd’hui Hébron, où Abraham et Isaac avaient vécu
  - type: note
    content: Voir Gn 13.18.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Isaac atteignit l’âge de cent quatre-vingts ans, '
  '29':
  - type: text
    content: puis il rendit son dernier soupir et mourut. Il rejoignit ses ancêtres, âgé et comblé de jours. Ses fils Esaü et Jacob l’ensevelirent.
  '3':
  - type: text
    content: Nous allons partir et nous rendre à Béthel, où je construirai un autel dédié au Dieu qui m’a exaucé lorsque j’étais dans la détresse et qui a été avec moi tout au long de ma route.
  '4':
  - type: text
    content: Ils remirent à Jacob tous les dieux étrangers qu’ils avaient entre les mains et les boucles qu’ils portaient aux oreilles
  - type: note
    content: Amulettes devant assurer une protection magique.
  - type: text
    content: '  ; et Jacob les enterra sous le chêne qui est près de Sichem. '
  '5':
  - type: text
    content: Puis ils levèrent le camp. Dieu frappa de panique les villes environnantes, de sorte que personne ne poursuivit les fils de Jacob.
  '6':
  - type: text
    content: 'Jacob arriva avec tous ceux qui l’accompagnaient à Louz – c’est-à-dire Béthel – au pays de Canaan. '
  '7':
  - type: text
    content: 'Il bâtit là un autel et appela ce lieu El-Béthel (Dieu de Béthel), car c’est à cet endroit que Dieu lui était apparu lorsqu’il fuyait loin de son frère. '
  '8':
  - type: text
    content: C’est là que mourut Débora, la nourrice de Rébecca ; elle fut enterrée près de Béthel, au pied du chêne que l’on appela depuis lors « le chêne des pleurs ».
  '9':
  - type: text
    content: 'Dieu apparut encore à Jacob à son retour de Paddân-Aram et le bénit. '
