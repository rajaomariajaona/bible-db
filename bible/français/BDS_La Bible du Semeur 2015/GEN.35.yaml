document_id: GEN.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob s’installe à Béthel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu dit à Jacob : Pars, rends-toi à Béthel et fixe-toi là-bas. Tu y construiras un autel au Dieu qui t’est apparu quand tu fuyais ton frère Esaü.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Jacob dit aux gens de sa famille et à tous ceux qui étaient avec lui : Faites disparaître les dieux étrangers qui se trouvent au milieu de vous. Purifiez-vous et changez de vêtements ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nous allons partir et nous rendre à Béthel, où je construirai un autel dédié au Dieu qui m’a exaucé lorsque j’étais dans la détresse et qui a été avec moi tout au long de ma route.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils remirent à Jacob tous les dieux étrangers qu’ils avaient entre les mains et les boucles qu’ils portaient aux oreilles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amulettes devant assurer une protection magique.
    marker-yv: yv-n
  - type: text
    text: '  ; et Jacob les enterra sous le chêne qui est près de Sichem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Puis ils levèrent le camp. Dieu frappa de panique les villes environnantes, de sorte que personne ne poursuivit les fils de Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jacob arriva avec tous ceux qui l’accompagnaient à Louz – c’est-à-dire Béthel – au pays de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il bâtit là un autel et appela ce lieu El-Béthel (Dieu de Béthel), car c’est à cet endroit que Dieu lui était apparu lorsqu’il fuyait loin de son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est là que mourut Débora, la nourrice de Rébecca ; elle fut enterrée près de Béthel, au pied du chêne que l’on appela depuis lors « le chêne des pleurs ».
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu apparut encore à Jacob à son retour de Paddân-Aram et le bénit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il lui dit : Ton nom est Jacob, mais tu ne seras plus appelé ainsi, ton nom sera Israël.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est ainsi que Dieu l’appela Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et Dieu lui dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis le Dieu tout-puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois fécond et aie de nombreux descendants ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peuple, et même ╵tout un ensemble de peuples seront issus de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu auras pour descendants des rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le pays que j’ai donné ╵à Abraham et à Isaac, ╵je te le donnerai
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi qu’à ta descendance après toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 17.4-8 ; 26.3.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis Dieu se retira d’auprès de lui, du lieu où il lui avait parlé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob érigea une stèle en pierre à l’endroit même où Dieu lui avait parlé, il y versa une libation et répandit de l’huile sur elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jacob donna au lieu où Dieu lui avait parlé le nom de Béthel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La naissance de Benjamin et la mort de Rachel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jacob et sa famille quittèrent Béthel. Lorsqu’ils étaient encore à une certaine distance d’Ephrata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ancien nom de Bethléhem en Juda (Rt 1.2 ; Mi 5.1).
    marker-yv: yv-n
  - type: text
    text: ', Rachel donna naissance à un enfant. Elle eut un accouchement difficile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pendant les douleurs du travail, la sage-femme lui dit : Courage ! C’est encore un garçon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais elle se mourait. Dans son dernier souffle, elle le nomma Ben-Oni (Fils de ma douleur), mais son père l’appela Benjamin (Fils de bon augure). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rachel mourut, on l’enterra sur la route d’Ephrata, c’est-à-dire Bethléhem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jacob érigea une stèle sur sa tombe ; c’est la stèle funéraire de Rachel qui subsiste encore aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis Israël leva le camp, il planta sa tente au-delà de Migdal-Eder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pendant qu’il séjournait dans cette contrée, Ruben alla coucher avec Bilha, l’épouse de second rang de son père. Celui-ci l’apprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version grecque ajoute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et en fut très affecté.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La liste des fils de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jacob avait douze fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils de Léa : Ruben, le premier-né de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Rachel : Joseph et Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fils de Bilha, servante de Rachel : Dan et Nephtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fils de Zilpa, servante de Léa : Gad et Aser. Tels sont les fils de Jacob, qui lui naquirent à Paddân-Aram.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort d’Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jacob revint auprès de son père Isaac à Mamré, à Qiryath-Arba qui s’appelle aujourd’hui Hébron, où Abraham et Isaac avaient vécu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 13.18
        metadata:
          usfm: GEN.13.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Isaac atteignit l’âge de cent quatre-vingts ans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: puis il rendit son dernier soupir et mourut. Il rejoignit ses ancêtres, âgé et comblé de jours. Ses fils Esaü et Jacob l’ensevelirent.
