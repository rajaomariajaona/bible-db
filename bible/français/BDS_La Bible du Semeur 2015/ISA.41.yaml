document_id: ISA.41,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel suscite un Libérateur
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le grand Vainqueur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tenez-vous en silence ╵devant moi, vous, les îles ╵et les régions côtières !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que les peuples lointains ╵raniment leur courage :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils approchent, qu’ils parlent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, allons ensemble en justice.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas effrayé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis avec toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne sois pas angoissé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car moi je suis ton Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’affermis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je viens à ton secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour sûr, je te soutiens ╵de mon bras droit ╵qui fait justice.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui sont irrités contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sombreront dans la honte ╵et dans le déshonneur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes adversaires ╵seront réduits à rien, ╵ils périront.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu auras beau chercher, ╵tu ne trouveras plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui te querellaient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront tous anéantis, ╵réduits à rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui t’ont fait la guerre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est moi, l’Eternel, ╵qui suis ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je saisis ta main droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je te dis : Sois sans crainte,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis là pour t’aider.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois donc sans crainte, ╵vermisseau de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô petit Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je viens à ton aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui te délivre ╵c’est le Saint d’Israël.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici je fais de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un traîneau de battage ╵tout neuf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: armé de pointes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu battras les montagnes, ╵tu les broieras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu rendras les collines ╵semblables à la paille.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu les vanneras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le vent les emportera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’ouragan les dispersera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu placeras ta joie ╵en l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta fierté ╵dans le Saint d’Israël.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les opprimés, les pauvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cherchent de l’eau sans en trouver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la soif dessèche leur langue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Eternel, ╵je les exaucerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, le Dieu d’Israël, ╵je ne les délaisserai pas.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai sourdre des rivières ╵du sommet des montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai jaillir des sources ╵au milieu des vallées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je transformerai le désert ╵en étang rempli d’eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pays aride ╵en sources jaillissantes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je planterai dans le désert ╵le cèdre et l’acacia,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le myrte et l’olivier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai croître dans la steppe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cyprès, le pin et le buis,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a fait lever de l’orient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui que la justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cyrus, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: roi des Perses. Il est devenu le roi des Mèdes en 549 av. J.-C. puis s’est emparé de Babylone en 539 (voir 41.25 ; 44.28  ; etc.).
      marker-yv: yv-n
    - type: text
      text: ' ╵entraîne sur ses pas ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui lui a livré les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a abaissé des rois ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son épée pulvérise ╵les peuples devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son arc les disperse ╵comme un fétu de paille ╵emporté par le vent.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tous voient et reconnaissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils observent, qu’ils comprennent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que c’est la main de l’Eternel ╵qui a fait tout cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le Saint d’Israël ╵en est le créateur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Eternel en face des faux dieux
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, dieux des autres peuples, ╵présentez votre cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et exposez vos arguments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit le roi de Jacob.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils les exposent donc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils nous annoncent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui doit arriver !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déclarez-nous ╵quels sont les faits passés ╵que vous avez prédits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous les examinions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que nous constations ╵leur accomplissement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou faites-nous entendre ╵ce qui doit arriver !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annoncez-nous ╵les événements à venir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous saurons ╵que vous êtes des dieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, faites quelque chose, ╵que ce soit bien ou mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’en le voyant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la crainte nous remplisse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: afin qu’en le voyant
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'afin que nous soyons terrifiés. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la crainte nous remplisse
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'divers manuscrits et versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que nous le voyons.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous, vous êtes moins que rien !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes vos actions ╵sont moins que du néant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui vous choisit ╵commet une abomination.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du nord, je fais surgir un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il va venir, ╵oui, du soleil levant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les versions anciennes. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il viendra du soleil levant.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est appelé par son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il piétine les gouverneurs ╵comme s’ils étaient de la boue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un potier foule l’argile.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a prédit cela ╵dès le commencement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous le sachions ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc l’a annoncé ╵bien longtemps à l’avance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'afin que nous disions : « C’est juste ? »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, personne ne l’a prédit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne n’a rien annoncé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne n’a entendu ╵des paroles venant de vous.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais moi, j’ai été le premier ╵qui ai dit à Sion :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Les voici ! Les voici ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai donné à Jérusalem ╵un messager, ╵porteur de la bonne nouvelle.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors que, parmi ces dieux-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai eu beau regarder, ╵je n’ai trouvé personne, ╵pas un seul conseiller,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne pour répondre ╵si je les interroge.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux tous, ils ne sont rien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân et la version syriaque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils sont iniques.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs œuvres sont néant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et leurs statues de fonte : ╵du vent, du vide.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les poursuit ╵et va plus loin, indemne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par un chemin ╵que son pied n’avait pas foulé ╵auparavant.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui accomplit cela ? ╵Qui le fait arriver ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui appelle à la vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les générations d’hommes ╵dès le commencement ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Eternel, ╵moi, qui suis le premier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui suis avec les derniers, ╵oui, c’est bien moi !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants des îles ╵et des régions côtières ╵ont vu ce que j’ai fait ╵et sont saisis de crainte ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui ont pour demeure ╵les confins de la terre ╵se sont mis à trembler.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils approchent, ils viennent,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s’aident mutuellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'chacun dit à son frère : ╵« Courage ! »'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’artisan encourage le fondeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le polisseur soutient ╵celui qui bat l’enclume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il dit de la soudure : ╵« Voilà du bon travail ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il fixe l’idole avec des clous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’elle ne bouge pas.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’Eternel délivre Israël
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à toi, Israël, ╵mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob, que j’ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et descendance d’Abraham, ╵qui était mon ami,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi que je suis allé chercher ╵aux confins de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que j’ai appelé ╵de ses extrémités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toi à qui j’avais dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Tu es mon serviteur »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t’ai choisi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non pas rejeté.
