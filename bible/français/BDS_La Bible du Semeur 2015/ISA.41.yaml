document_id: ISA.41,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel suscite un Libérateur
  - type: heading
    content: Le grand Vainqueur
  - type: text
    content: Tenez-vous en silence ╵devant moi, vous, les îles ╵et les régions côtières !
  - type: text
    content: 'Que les peuples lointains ╵raniment leur courage :'
  - type: text
    content: qu’ils approchent, qu’ils parlent !
  - type: text
    content: Oui, allons ensemble en justice.
  '10':
  - type: text
    content: Ne sois pas effrayé,
  - type: text
    content: car je suis avec toi ;
  - type: text
    content: ne sois pas angoissé,
  - type: text
    content: car moi je suis ton Dieu.
  - type: text
    content: Je t’affermis,
  - type: text
    content: je viens à ton secours,
  - type: text
    content: pour sûr, je te soutiens ╵de mon bras droit ╵qui fait justice.
  '11':
  - type: text
    content: Tous ceux qui sont irrités contre toi,
  - type: text
    content: sombreront dans la honte ╵et dans le déshonneur.
  - type: text
    content: Tes adversaires ╵seront réduits à rien, ╵ils périront.
  '12':
  - type: text
    content: Tu auras beau chercher, ╵tu ne trouveras plus
  - type: text
    content: ceux qui te querellaient.
  - type: text
    content: Ils seront tous anéantis, ╵réduits à rien
  - type: text
    content: ceux qui t’ont fait la guerre.
  '13':
  - type: text
    content: Car c’est moi, l’Eternel, ╵qui suis ton Dieu,
  - type: text
    content: je saisis ta main droite,
  - type: text
    content: 'je te dis : Sois sans crainte,'
  - type: text
    content: je suis là pour t’aider.
  '14':
  - type: text
    content: Sois donc sans crainte, ╵vermisseau de Jacob,
  - type: text
    content: ô petit Israël,
  - type: text
    content: car je viens à ton aide,
  - type: text
    content: l’Eternel le déclare ;
  - type: text
    content: celui qui te délivre ╵c’est le Saint d’Israël.
  '15':
  - type: text
    content: Voici je fais de toi
  - type: text
    content: un traîneau de battage ╵tout neuf,
  - type: text
    content: armé de pointes,
  - type: text
    content: tu battras les montagnes, ╵tu les broieras,
  - type: text
    content: tu rendras les collines ╵semblables à la paille.
  '16':
  - type: text
    content: Oui, tu les vanneras,
  - type: text
    content: et le vent les emportera,
  - type: text
    content: l’ouragan les dispersera.
  - type: text
    content: Mais toi, tu placeras ta joie ╵en l’Eternel,
  - type: text
    content: et ta fierté ╵dans le Saint d’Israël.
  '17':
  - type: text
    content: Les opprimés, les pauvres
  - type: text
    content: cherchent de l’eau sans en trouver,
  - type: text
    content: et la soif dessèche leur langue.
  - type: text
    content: Moi, l’Eternel, ╵je les exaucerai,
  - type: text
    content: moi, le Dieu d’Israël, ╵je ne les délaisserai pas.
  '18':
  - type: text
    content: Je ferai sourdre des rivières ╵du sommet des montagnes
  - type: text
    content: et je ferai jaillir des sources ╵au milieu des vallées,
  - type: text
    content: je transformerai le désert ╵en étang rempli d’eau
  - type: text
    content: et le pays aride ╵en sources jaillissantes.
  '19':
  - type: text
    content: Je planterai dans le désert ╵le cèdre et l’acacia,
  - type: text
    content: le myrte et l’olivier.
  - type: text
    content: Je ferai croître dans la steppe
  - type: text
    content: le cyprès, le pin et le buis,
  '2':
  - type: text
    content: Qui a fait lever de l’orient
  - type: text
    content: celui que la justice
  - type: note
    content: Il s’agit de Cyrus, roi des Perses. Il est devenu le roi des Mèdes en 549 av. J.-C. puis s’est emparé de Babylone en 539 (voir 41.25 ; 44.28  ; etc.).
  - type: text
    content: ' ╵entraîne sur ses pas ?'
  - type: text
    content: Qui lui a livré les nations
  - type: text
    content: et qui a abaissé des rois ?
  - type: text
    content: Son épée pulvérise ╵les peuples devant lui
  - type: text
    content: et son arc les disperse ╵comme un fétu de paille ╵emporté par le vent.
  '20':
  - type: text
    content: pour que tous voient et reconnaissent,
  - type: text
    content: et qu’ils observent, qu’ils comprennent,
  - type: text
    content: que c’est la main de l’Eternel ╵qui a fait tout cela,
  - type: text
    content: que le Saint d’Israël ╵en est le créateur.
  - type: heading
    content: L’Eternel en face des faux dieux
  '21':
  - type: text
    content: Vous, dieux des autres peuples, ╵présentez votre cause,
  - type: text
    content: dit l’Eternel,
  - type: text
    content: et exposez vos arguments,
  - type: text
    content: dit le roi de Jacob.
  '22':
  - type: text
    content: Qu’ils les exposent donc,
  - type: text
    content: qu’ils nous annoncent
  - type: text
    content: ce qui doit arriver !
  - type: text
    content: Déclarez-nous ╵quels sont les faits passés ╵que vous avez prédits,
  - type: text
    content: pour que nous les examinions
  - type: text
    content: et que nous constations ╵leur accomplissement,
  - type: text
    content: ou faites-nous entendre ╵ce qui doit arriver !
  '23':
  - type: text
    content: Annoncez-nous ╵les événements à venir,
  - type: text
    content: et nous saurons ╵que vous êtes des dieux.
  - type: text
    content: Oui, faites quelque chose, ╵que ce soit bien ou mal,
  - type: text
    content: afin qu’en le voyant
  - type: text
    content: la crainte nous remplisse
  - type: note
    content: 'afin qu’en le voyant: autre traduction : afin que nous soyons terrifiés. la crainte nous remplisse: divers manuscrits et versions anciennes ont : que nous le voyons.'
  - type: text
    content: .
  '24':
  - type: text
    content: Mais vous, vous êtes moins que rien !
  - type: text
    content: Et toutes vos actions ╵sont moins que du néant !
  - type: text
    content: Celui qui vous choisit ╵commet une abomination.
  '25':
  - type: text
    content: Du nord, je fais surgir un homme,
  - type: text
    content: il va venir, ╵oui, du soleil levant
  - type: note
    content: 'D’après les versions anciennes. Le texte hébreu traditionnel a : il viendra du soleil levant.'
  - type: text
    content: ','
  - type: text
    content: il est appelé par son nom,
  - type: text
    content: il piétine les gouverneurs ╵comme s’ils étaient de la boue,
  - type: text
    content: comme un potier foule l’argile.
  '26':
  - type: text
    content: Qui a prédit cela ╵dès le commencement
  - type: text
    content: pour que nous le sachions ?
  - type: text
    content: Qui donc l’a annoncé ╵bien longtemps à l’avance
  - type: text
    content: 'afin que nous disions : « C’est juste ? »'
  - type: text
    content: Non, personne ne l’a prédit,
  - type: text
    content: personne n’a rien annoncé
  - type: text
    content: et personne n’a entendu ╵des paroles venant de vous.
  '27':
  - type: text
    content: 'Mais moi, j’ai été le premier ╵qui ai dit à Sion :'
  - type: text
    content: « Les voici ! Les voici ! »
  - type: text
    content: J’ai donné à Jérusalem ╵un messager, ╵porteur de la bonne nouvelle.
  '28':
  - type: text
    content: Alors que, parmi ces dieux-là,
  - type: text
    content: j’ai eu beau regarder, ╵je n’ai trouvé personne, ╵pas un seul conseiller,
  - type: text
    content: personne pour répondre ╵si je les interroge.
  '29':
  - type: text
    content: Eux tous, ils ne sont rien
  - type: note
    content: 'D’après le texte hébreu de Qumrân et la version syriaque. Le texte hébreu traditionnel a : ils sont iniques.'
  - type: text
    content: ','
  - type: text
    content: leurs œuvres sont néant,
  - type: text
    content: 'et leurs statues de fonte : ╵du vent, du vide.'
  '3':
  - type: text
    content: Il les poursuit ╵et va plus loin, indemne,
  - type: text
    content: par un chemin ╵que son pied n’avait pas foulé ╵auparavant.
  '4':
  - type: text
    content: Qui accomplit cela ? ╵Qui le fait arriver ?
  - type: text
    content: Qui appelle à la vie
  - type: text
    content: les générations d’hommes ╵dès le commencement ?
  - type: text
    content: Moi, l’Eternel, ╵moi, qui suis le premier
  - type: text
    content: et qui suis avec les derniers, ╵oui, c’est bien moi !
  '5':
  - type: text
    content: Les habitants des îles ╵et des régions côtières ╵ont vu ce que j’ai fait ╵et sont saisis de crainte ;
  - type: text
    content: ceux qui ont pour demeure ╵les confins de la terre ╵se sont mis à trembler.
  - type: text
    content: Ils approchent, ils viennent,
  '6':
  - type: text
    content: ils s’aident mutuellement,
  - type: text
    content: 'chacun dit à son frère : ╵« Courage ! »'
  '7':
  - type: text
    content: L’artisan encourage le fondeur.
  - type: text
    content: Le polisseur soutient ╵celui qui bat l’enclume.
  - type: text
    content: 'Il dit de la soudure : ╵« Voilà du bon travail ! »'
  - type: text
    content: Et il fixe l’idole avec des clous
  - type: text
    content: afin qu’elle ne bouge pas.
  - type: heading
    content: L’Eternel délivre Israël
  '8':
  - type: text
    content: Quant à toi, Israël, ╵mon serviteur,
  - type: text
    content: Jacob, que j’ai choisi,
  - type: text
    content: et descendance d’Abraham, ╵qui était mon ami,
  '9':
  - type: text
    content: toi que je suis allé chercher ╵aux confins de la terre
  - type: text
    content: et que j’ai appelé ╵de ses extrémités,
  - type: text
    content: 'toi à qui j’avais dit :'
  - type: text
    content: « Tu es mon serviteur »,
  - type: text
    content: je t’ai choisi
  - type: text
    content: et non pas rejeté.
