document_id: ECC.10,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Les mouches mortes gâtent et font fermenter l’huile parfumée. Un brin de folie a plus d’effet que la sagesse et l’honneur. '
  '10':
  - type: text
    content: Si le fer de la hache est émoussé et qu’on n’en aiguise pas le tranchant, il faudra redoubler de force, mais la sagesse a l’avantage d’assurer la réussite.
  '11':
  - type: text
    content: Si le serpent mord parce qu’il n’a pas été charmé, le charmeur n’a aucun avantage.
  - type: heading
    content: La folie de l’insensé
  '12':
  - type: text
    content: 'Les paroles du sage sont empreintes de bonté, mais la bouche de l’insensé cause sa perte. '
  '13':
  - type: text
    content: 'Il commence par dire des sottises et finit en proférant les pires insanités. '
  '14':
  - type: text
    content: L’insensé multiplie les paroles, mais l’homme ignore l’avenir et personne ne peut lui révéler ce qui arrivera après lui.
  '15':
  - type: text
    content: 'Le labeur de l’insensé l’exténue : il ne sait même pas comment aller à la ville.'
  - type: heading
    content: Sur les gouvernements
  '16':
  - type: text
    content: 'Malheur au pays dont le roi est un gamin et dont les ministres festoient dès le matin ! '
  '17':
  - type: text
    content: Heureux le pays dont le roi est issu d’une famille dirigeante et dont les ministres mangent en temps voulu pour prendre des forces et non pour s’adonner à la boisson.
  '18':
  - type: text
    content: Quand les mains sont paresseuses, la charpente s’effondre, et quand on a les bras ballants, la maison finit par avoir des gouttières.
  '19':
  - type: text
    content: On prépare un repas pour se réjouir, le vin égaie la vie et l’argent répond à toutes sortes de besoins.
  '2':
  - type: text
    content: 'Le cœur du sage le dirige du bon côté, tandis que celui de l’insensé le pousse du mauvais côté. '
  '20':
  - type: text
    content: Ne maudis pas le roi, même en pensée, et ne maudis pas un riche, même dans ta chambre à coucher, car un oiseau emporterait tes paroles, la gent ailée colporterait tes propos.
  '3':
  - type: text
    content: 'Même quand ce dernier s’avance en chemin, le bon sens lui fait défaut et il dit à tout le monde : « Il est insensé celui-là ! »'
  - type: note
    content: 'Autres traductions : il dit de tous les autres qu’ils sont des insensés, ou : il manifeste à tout le monde qu’il est un insensé.'
  - type: text
    content: .
  '4':
  - type: text
    content: Si la mauvaise humeur du chef se tourne contre toi, ne quitte pas ton poste, car le calme évite de graves fautes.
  - type: heading
    content: Les gens qui ne sont pas à leur place
  '5':
  - type: text
    content: 'Il est un autre mal que j’ai constaté sous le soleil et qui est comme une méprise ayant échappé au souverain : '
  '6':
  - type: text
    content: 'la sottise est promue au rang le plus élevé, alors que des gens riches sont dans l’abaissement. '
  '7':
  - type: text
    content: J’ai vu des esclaves aller à cheval
  - type: note
    content: Dans l’Ancien Testament, les chevaux sont l’apanage des personnages de haut rang (Est 6.8-9 ; Jr 17.25 ; Ez 23.12).
  - type: text
    content: ' et des princes marcher à pied comme des esclaves.'
  - type: heading
    content: Le risque zéro n’existe pas
  '8':
  - type: text
    content: 'Qui creuse un trou risque d’y tomber, et qui abat un mur peut être mordu par un serpent. '
  '9':
  - type: text
    content: Qui arrache des pierres risque de se blesser, et qui fend du bois se met en danger.
