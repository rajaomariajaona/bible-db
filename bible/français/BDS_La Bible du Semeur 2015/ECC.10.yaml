document_id: ECC.10
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les mouches mortes gâtent et font fermenter l’huile parfumée. Un brin de folie a plus d’effet que la sagesse et l’honneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le cœur du sage le dirige du bon côté, tandis que celui de l’insensé le pousse du mauvais côté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Même quand ce dernier s’avance en chemin, le bon sens lui fait défaut et il dit à tout le monde : « Il est insensé celui-là ! »'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il dit de tous les autres qu’ils sont des insensés, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il manifeste à tout le monde qu’il est un insensé.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si la mauvaise humeur du chef se tourne contre toi, ne quitte pas ton poste, car le calme évite de graves fautes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les gens qui ne sont pas à leur place
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il est un autre mal que j’ai constaté sous le soleil et qui est comme une méprise ayant échappé au souverain : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'la sottise est promue au rang le plus élevé, alors que des gens riches sont dans l’abaissement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai vu des esclaves aller à cheval
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans l’Ancien Testament, les chevaux sont l’apanage des personnages de haut rang (Est 6.8-9 ; Jr 17.25 ; Ez 23.12).
    marker-yv: yv-n
  - type: text
    text: ' et des princes marcher à pied comme des esclaves.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le risque zéro n’existe pas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Qui creuse un trou risque d’y tomber, et qui abat un mur peut être mordu par un serpent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qui arrache des pierres risque de se blesser, et qui fend du bois se met en danger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si le fer de la hache est émoussé et qu’on n’en aiguise pas le tranchant, il faudra redoubler de force, mais la sagesse a l’avantage d’assurer la réussite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Si le serpent mord parce qu’il n’a pas été charmé, le charmeur n’a aucun avantage.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La folie de l’insensé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les paroles du sage sont empreintes de bonté, mais la bouche de l’insensé cause sa perte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il commence par dire des sottises et finit en proférant les pires insanités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’insensé multiplie les paroles, mais l’homme ignore l’avenir et personne ne peut lui révéler ce qui arrivera après lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le labeur de l’insensé l’exténue : il ne sait même pas comment aller à la ville.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Sur les gouvernements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Malheur au pays dont le roi est un gamin et dont les ministres festoient dès le matin ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Heureux le pays dont le roi est issu d’une famille dirigeante et dont les ministres mangent en temps voulu pour prendre des forces et non pour s’adonner à la boisson.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand les mains sont paresseuses, la charpente s’effondre, et quand on a les bras ballants, la maison finit par avoir des gouttières.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On prépare un repas pour se réjouir, le vin égaie la vie et l’argent répond à toutes sortes de besoins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ne maudis pas le roi, même en pensée, et ne maudis pas un riche, même dans ta chambre à coucher, car un oiseau emporterait tes paroles, la gent ailée colporterait tes propos.
