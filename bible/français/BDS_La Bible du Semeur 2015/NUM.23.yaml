document_id: NUM.23
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Balaam bénit Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Balaam dit à Balaq : Construis-moi ici sept autels et prépare-moi sept taureaux et sept béliers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balaq fit ce que Balaam lui avait demandé et, ensemble, ils offrirent un taureau et un bélier sur chaque autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Balaam dit à Balaq : Reste ici près de ton holocauste pendant que je me rendrai à l’écart. Peut-être l’Eternel viendra-t-il à ma rencontre. Alors je te communiquerai ce qu’il me révélera.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il s’en alla sur une crête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en un endroit dégagé, sur une colline dénudée.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dieu se manifesta à Balaam qui lui dit : J’ai fait dresser sept autels et j’ai offert un taureau et un bélier sur chacun d’eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors l’Eternel mit sa parole dans la bouche de Balaam, puis il ajouta : Retourne auprès de Balaq et transmets-lui ce message.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Balaam retourna vers Balaq et le trouva debout avec tous les chefs de Moab près de son holocauste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors il déclama cet oracle :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’Aram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom complet : Aram-Naharaïm (Syrie des deux fleuves), c’est-à-dire la Mésopotamie.'
    marker-yv: yv-n
  - type: text
    text: ', Balaq m’a fait venir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, le roi de Moab ╵m’a fait venir ╵des monts de l’Est.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons ! Maudis Jacob pour moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Viens et profère des menaces ╵contre Israël !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais comment maudirais-je ? ╵Dieu ne l’a pas maudit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment menacerais-je ╵celui que l’Eternel ╵ne veut pas menacer ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici : je le contemple ╵du sommet des rochers,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, du haut des collines, ╵je le regarde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je le vois : c’est un peuple ╵qui demeure à l’écart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne se considère pas ╵semblable aux autres peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui a jamais compté ╵les foules de Jacob, ╵qui sont aussi nombreuses ╵que les grains de poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou qui a dénombré ╵le quart du peuple d’Israël ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il me soit accordé ╵la même mort ╵que celle de ces justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que mon avenir ╵soit identique au leur !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Balaq dit à Balaam : Que m’as-tu fait ? Je t’ai fait venir pour maudire mes ennemis, et voilà que tu les combles de bénédictions !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam répondit : Puis-je prononcer autre chose que les paroles que l’Eternel met dans ma bouche ?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Balaam bénit Israël une deuxième fois
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Balaq reprit : Viens donc avec moi à un autre endroit d’où tu pourras voir ce peuple, tu n’en apercevras qu’une partie et tu ne pourras pas le voir tout entier. Et maudis-le pour moi de cet endroit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et Balaq le conduisit au champ des Guetteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Un poste élevé sur la chaîne des Abarim d’où l’on surveillait l’approche des ennemis.
    marker-yv: yv-n
  - type: text
    text: ' au sommet du Pisga. Là aussi, il construisit sept autels et offrit un taureau et un bélier sur chacun d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Balaam dit à Balaq : Tiens-toi debout près de ton holocauste, tandis que j’irai là-bas à sa rencontre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Eternel se manifesta à Balaam et lui mit des paroles dans la bouche, puis il ajouta : Retourne auprès de Balaq et tu lui parleras comme je viens de te le dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Balaam revint vers Balaq et le trouva toujours debout près de son holocauste, les princes de Moab à ses côtés.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Qu’a dit l’Eternel ? lui demanda Balaq.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors Balaam prononça son oracle :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons, Balaq, écoute !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fils de Tsippor, ╵prête-moi attention,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dieu n’est pas homme pour mentir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni humain pour se repentir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A-t-il jamais parlé ╵sans qu’il tienne parole ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’accomplit-il pas ╵ce qu’il a déclaré ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oui, j’ai reçu la charge ╵de prononcer ╵une bénédiction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il a béni : ╵je n’y changerai rien.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il n’a pas constaté ╵de péché chez Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne trouve pas ╵de mal en Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on ne constate aucune faute…, on ne trouve aucun mal… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on ne voit aucun malheur en Jacob, on ne trouve aucune misère en Israël.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l’Eternel son Dieu ╵est avec lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ses rangs retentit ╵l’acclamation royale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu les a fait sortir d’Egypte :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa puissance est semblable ╵à la force du buffle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et la divination ╵est absente en Jacob :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne consulte pas ╵d’augure en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est dit à Jacob ╵au moment opportun,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, il est dit à Israël ╵ce que Dieu accomplit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on ne peut recourir à la magie contre Jacob, à la divination contre Israël ; on ne peut que proclamer ce que Dieu accomplit pour eux.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici, comme un lion, ╵un peuple qui se lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bondit comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne se couche pas ╵sans avoir dévoré sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir bu le sang ╵de ses victimes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Balaq dit à Balaam : Si tu ne peux pas le maudire, au moins ne le bénis pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais Balaam répondit à Balaq : Ne t’ai-je pas prévenu que je ferai tout ce que l’Eternel m’ordonnera ?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Troisième bénédiction d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Balaq dit à Balaam : Viens, je vais t’emmener à un autre endroit. Peut-être que de là, l’Eternel trouvera bon que tu les maudisses pour moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et Balaq emmena Balaam au sommet du mont Peor d’où l’on a vue sur tout le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Balaam dit de nouveau à Balaq de lui bâtir sept autels et de lui préparer sept taureaux et sept béliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Balaq fit ce que Balaam lui avait demandé et il offrit un taureau et un bélier sur chaque autel.
