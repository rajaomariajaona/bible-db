document_id: NUM.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Balaam bénit Israël
  - type: text
    content: 'Alors Balaam dit à Balaq : Construis-moi ici sept autels et prépare-moi sept taureaux et sept béliers.'
  '10':
  - type: text
    content: Qui a jamais compté ╵les foules de Jacob, ╵qui sont aussi nombreuses ╵que les grains de poussière,
  - type: text
    content: ou qui a dénombré ╵le quart du peuple d’Israël ?
  - type: text
    content: Qu’il me soit accordé ╵la même mort ╵que celle de ces justes,
  - type: text
    content: et que mon avenir ╵soit identique au leur !
  '11':
  - type: text
    content: 'Balaq dit à Balaam : Que m’as-tu fait ? Je t’ai fait venir pour maudire mes ennemis, et voilà que tu les combles de bénédictions !'
  '12':
  - type: text
    content: 'Balaam répondit : Puis-je prononcer autre chose que les paroles que l’Eternel met dans ma bouche ?'
  - type: heading
    content: Balaam bénit Israël une deuxième fois
  '13':
  - type: text
    content: 'Balaq reprit : Viens donc avec moi à un autre endroit d’où tu pourras voir ce peuple, tu n’en apercevras qu’une partie et tu ne pourras pas le voir tout entier. Et maudis-le pour moi de cet endroit.'
  '14':
  - type: text
    content: Et Balaq le conduisit au champ des Guetteurs
  - type: note
    content: Un poste élevé sur la chaîne des Abarim d’où l’on surveillait l’approche des ennemis.
  - type: text
    content: ' au sommet du Pisga. Là aussi, il construisit sept autels et offrit un taureau et un bélier sur chacun d’eux. '
  '15':
  - type: text
    content: 'Balaam dit à Balaq : Tiens-toi debout près de ton holocauste, tandis que j’irai là-bas à sa rencontre.'
  '16':
  - type: text
    content: 'L’Eternel se manifesta à Balaam et lui mit des paroles dans la bouche, puis il ajouta : Retourne auprès de Balaq et tu lui parleras comme je viens de te le dire.'
  '17':
  - type: text
    content: Balaam revint vers Balaq et le trouva toujours debout près de son holocauste, les princes de Moab à ses côtés.
  - type: text
    content: – Qu’a dit l’Eternel ? lui demanda Balaq.
  '18':
  - type: text
    content: 'Alors Balaam prononça son oracle :'
  - type: text
    content: Allons, Balaq, écoute !
  - type: text
    content: Fils de Tsippor, ╵prête-moi attention,
  '19':
  - type: text
    content: Dieu n’est pas homme pour mentir,
  - type: text
    content: ni humain pour se repentir.
  - type: text
    content: A-t-il jamais parlé ╵sans qu’il tienne parole ?
  - type: text
    content: Et n’accomplit-il pas ╵ce qu’il a déclaré ?
  '2':
  - type: text
    content: 'Balaq fit ce que Balaam lui avait demandé et, ensemble, ils offrirent un taureau et un bélier sur chaque autel. '
  '20':
  - type: text
    content: Oui, j’ai reçu la charge ╵de prononcer ╵une bénédiction.
  - type: text
    content: 'Il a béni : ╵je n’y changerai rien.'
  '21':
  - type: text
    content: Il n’a pas constaté ╵de péché chez Jacob,
  - type: text
    content: et il ne trouve pas ╵de mal en Israël
  - type: note
    content: 'Autre traduction : on ne constate aucune faute…, on ne trouve aucun mal… D’autres comprennent : on ne voit aucun malheur en Jacob, on ne trouve aucune misère en Israël.'
  - type: text
    content: .
  - type: text
    content: Oui, l’Eternel son Dieu ╵est avec lui.
  - type: text
    content: Dans ses rangs retentit ╵l’acclamation royale.
  '22':
  - type: text
    content: 'Dieu les a fait sortir d’Egypte :'
  - type: text
    content: sa puissance est semblable ╵à la force du buffle,
  '23':
  - type: text
    content: 'et la divination ╵est absente en Jacob :'
  - type: text
    content: on ne consulte pas ╵d’augure en Israël,
  - type: text
    content: il est dit à Jacob ╵au moment opportun,
  - type: text
    content: oui, il est dit à Israël ╵ce que Dieu accomplit
  - type: note
    content: 'Autre traduction : on ne peut recourir à la magie contre Jacob, à la divination contre Israël ; on ne peut que proclamer ce que Dieu accomplit pour eux.'
  - type: text
    content: .
  '24':
  - type: text
    content: Voici, comme un lion, ╵un peuple qui se lève,
  - type: text
    content: il bondit comme un lion,
  - type: text
    content: il ne se couche pas ╵sans avoir dévoré sa proie,
  - type: text
    content: sans avoir bu le sang ╵de ses victimes.
  '25':
  - type: text
    content: 'Balaq dit à Balaam : Si tu ne peux pas le maudire, au moins ne le bénis pas !'
  '26':
  - type: text
    content: 'Mais Balaam répondit à Balaq : Ne t’ai-je pas prévenu que je ferai tout ce que l’Eternel m’ordonnera ?'
  - type: heading
    content: Troisième bénédiction d’Israël
  '27':
  - type: text
    content: 'Balaq dit à Balaam : Viens, je vais t’emmener à un autre endroit. Peut-être que de là, l’Eternel trouvera bon que tu les maudisses pour moi.'
  '28':
  - type: text
    content: 'Et Balaq emmena Balaam au sommet du mont Peor d’où l’on a vue sur tout le désert. '
  '29':
  - type: text
    content: 'Balaam dit de nouveau à Balaq de lui bâtir sept autels et de lui préparer sept taureaux et sept béliers. '
  '3':
  - type: text
    content: 'Balaam dit à Balaq : Reste ici près de ton holocauste pendant que je me rendrai à l’écart. Peut-être l’Eternel viendra-t-il à ma rencontre. Alors je te communiquerai ce qu’il me révélera.'
  - type: text
    content: Et il s’en alla sur une crête
  - type: note
    content: 'Autre traduction : en un endroit dégagé, sur une colline dénudée.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: Balaq fit ce que Balaam lui avait demandé et il offrit un taureau et un bélier sur chaque autel.
  '4':
  - type: text
    content: 'Dieu se manifesta à Balaam qui lui dit : J’ai fait dresser sept autels et j’ai offert un taureau et un bélier sur chacun d’eux.'
  '5':
  - type: text
    content: 'Alors l’Eternel mit sa parole dans la bouche de Balaam, puis il ajouta : Retourne auprès de Balaq et transmets-lui ce message.'
  '6':
  - type: text
    content: 'Balaam retourna vers Balaq et le trouva debout avec tous les chefs de Moab près de son holocauste. '
  '7':
  - type: text
    content: 'Alors il déclama cet oracle :'
  - type: text
    content: D’Aram
  - type: note
    content: 'Nom complet : Aram-Naharaïm (Syrie des deux fleuves), c’est-à-dire la Mésopotamie.'
  - type: text
    content: ', Balaq m’a fait venir,'
  - type: text
    content: oui, le roi de Moab ╵m’a fait venir ╵des monts de l’Est.
  - type: text
    content: Allons ! Maudis Jacob pour moi !
  - type: text
    content: Viens et profère des menaces ╵contre Israël !
  '8':
  - type: text
    content: Mais comment maudirais-je ? ╵Dieu ne l’a pas maudit.
  - type: text
    content: Comment menacerais-je ╵celui que l’Eternel ╵ne veut pas menacer ?
  '9':
  - type: text
    content: 'Voici : je le contemple ╵du sommet des rochers,'
  - type: text
    content: et, du haut des collines, ╵je le regarde.
  - type: text
    content: 'Je le vois : c’est un peuple ╵qui demeure à l’écart,'
  - type: text
    content: il ne se considère pas ╵semblable aux autres peuples.
