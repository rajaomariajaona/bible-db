    children:
    - type: text
      text: Paul en appelle à César
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Trois jours après avoir pris ses fonctions à la tête de la province, Festus se rendit de Césarée à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à une centaine de kilomètres de Césarée.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Non, répliqua Paul, je me tiens ici devant le tribunal de l’empereur, et c’est devant ce tribunal que je dois être jugé. Quant aux Juifs, je ne leur ai fait aucun tort, tu as pu fort bien t’en rendre compte par toi-même. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si je suis coupable et si j’ai commis un crime passible de la peine de mort, je ne refuse pas de mourir. Mais si les accusations de ces gens-là sont sans aucun fondement, nul n’a le droit de me livrer entre leurs mains. J’en appelle à l’empereur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tout citoyen romain avait le droit de faire appel d’une décision d’un tribunal romain à celui de l’empereur, à Rome.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Festus, après avoir délibéré avec ses conseillers, décida : Tu en as appelé à l’empereur ; tu comparaîtras donc devant l’empereur.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul devant Festus et Agrippa
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quelque temps plus tard, le roi Agrippa
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Agrippa
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hérode Agrippa II, fils d’Hérode Agrippa I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 12
        - type: text
          text: ) régnait sur une région située au nord du pays d’Israël. Sa sœur Bérénice était une sœur de Drusille (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '24.24'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et Bérénice arrivèrent à Césarée pour rendre visite à Festus'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Festus
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
