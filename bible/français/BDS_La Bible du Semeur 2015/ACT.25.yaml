  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Leur séjour dura plusieurs jours.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus en profita pour exposer au roi le cas de Paul : J’ai là un homme, dit-il, que mon prédécesseur Félix a laissé en prison. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors de mon passage à Jérusalem, les chefs des prêtres et les responsables des Juifs sont venus porter plainte contre lui et ils m’ont demandé de le condamner. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je leur ai répondu que les Romains n’ont pas coutume de livrer un prévenu avant de l’avoir confronté avec ses accusateurs et de lui avoir donné l’occasion de se défendre de leurs accusations. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils sont donc venus ici avec moi. Je n’ai pas voulu remettre l’affaire à plus tard et, dès le lendemain, j’ai tenu audience et donné l’ordre d’amener cet homme.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m’attendais à ce que ses accusateurs le chargent de toutes sortes de crimes graves. Il n’en fut rien. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne s’agissait que de discussions au sujet de leur propre religion et d’un certain Jésus qui est mort et dont Paul dit qu’il est vivant. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs des prêtres et les notables juifs se présentèrent devant lui pour porter plainte contre Paul. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis trouvé dans l’incapacité de prendre une décision dans un débat de ce genre. J’ai donc demandé à Paul s’il consentait à monter à Jérusalem pour que son affaire y soit jugée. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il a préféré user de son droit d’appel et il a demandé que sa cause soit portée devant le tribunal de l’empereur. J’ai donc ordonné de le garder en prison jusqu’à ce que je puisse l’envoyer à César.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Agrippa dit à Festus : J’aimerais bien entendre cet homme, moi aussi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tu pourras l’entendre dès demain, lui répondit Festus.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le lendemain, donc, Agrippa et Bérénice arrivèrent en grand apparat et firent leur entrée dans la salle d’audience, suivis des officiers supérieurs et des notables de la ville. Sur un ordre de Festus, Paul fut introduit.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Roi Agrippa, dit alors le gouverneur, et vous tous qui êtes ici présents, vous avez devant vous l’homme au sujet duquel toute la foule des Juifs est venue me trouver, à Jérusalem aussi bien qu’ici, pour crier qu’il n’avait plus le droit de vivre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, en ce qui me concerne, je n’ai rien trouvé dans son cas qui puisse mériter une condamnation à mort. Cependant, puisqu’il en a appelé à l’empereur, j’ai décidé de le lui envoyer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, je ne dispose d’aucun fait précis à écrire à l’empereur. C’est pourquoi je le fais comparaître devant vous, et tout spécialement devant toi, roi Agrippa, afin d’avoir quelque chose à écrire après cet interrogatoire. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car il est absurde, me semble-t-il, d’envoyer ainsi un prisonnier à Rome sans pouvoir préciser les accusations dont il est l’objet.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui demandèrent avec insistance, comme une faveur spéciale, de faire transférer l’accusé à Jérusalem. Ils avaient déjà fait leurs plans : sur le trajet, ils voulaient lui dresser une embuscade et le tuer.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Festus leur répondit : Paul est en prison à Césarée, et je ne vais pas tarder à retourner moi-même dans cette ville. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a parmi vous des hommes compétents : qu’ils m’y accompagnent, et si cet homme a commis quelque irrégularité, qu’ils portent plainte contre lui !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus ne resta pas plus de huit à dix jours à Jérusalem, puis il redescendit à Césarée. Le lendemain de son retour, il alla siéger au tribunal et y fit comparaître Paul. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A peine celui-ci fut-il entré, que les Juifs venus de Jérusalem l’entourèrent et portèrent contre lui un grand nombre de graves accusations, mais ils ne pouvaient pas les prouver.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, quant à lui, disait pour sa défense : Je n’ai commis aucune faute ni contre la loi juive, ni contre le temple, ni contre César.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Festus voulait se concilier la faveur des Juifs ; il demanda donc à Paul : Acceptes-tu de retourner à Jérusalem pour y être jugé sur cette affaire sous ma présidence ?'
