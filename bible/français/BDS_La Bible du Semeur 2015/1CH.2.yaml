document_id: 1CH.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fils de Jacob
  - type: text
    content: Voici la liste des fils d’Israël
  - type: note
    content: Pour les v. 1-2, voir Gn 35.23-26.
  - type: text
    content: '. Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  '10':
  - type: text
    content: 'Ram eut pour fils Amminadab, qui eut pour fils Nahshôn, chef des descendants de Juda. '
  '11':
  - type: text
    content: 'Nahshôn eut pour fils Salma, qui eut pour fils Booz, '
  '12':
  - type: text
    content: 'qui eut pour fils Obed, qui eut pour fils Isaï. '
  '13':
  - type: text
    content: Isaï
  - type: note
    content: Pour les v. 13-15, voir 1 S 16.6-13.
  - type: text
    content: ' eut pour fils : Eliab, son aîné, Abinadab, son deuxième, Shimea, son troisième. '
  '14':
  - type: text
    content: 'Netanéel, son quatrième, Raddaï, son cinquième, '
  '15':
  - type: text
    content: 'Otsem son sixième, et David son septième. '
  '16':
  - type: text
    content: 'Leurs sœurs étaient Tserouya et Abigaïl. Tserouya eut trois fils : Abshaï, Joab et Asaël. '
  '17':
  - type: text
    content: Abigaïl eut un fils, Amasa, de Yéter, l’Ismaélite.
  '18':
  - type: text
    content: 'Caleb, fils de Hetsrôn, eut de sa femme Azouba une fille, Yerioth, et trois fils, Yésher, Shobab et Ardôn. '
  '19':
  - type: text
    content: 'Azouba mourut, et Caleb prit pour femme Ephrath, qui lui donna Hour. '
  '2':
  - type: text
    content: Dan, Joseph, Benjamin, Nephtali, Gad et Aser.
  - type: heading
    content: Les descendants de Juda
  '20':
  - type: text
    content: 'Hour eut pour fils Ouri, et Ouri Betsaléel. '
  '21':
  - type: text
    content: 'Ensuite, alors qu’il avait soixante ans, Hetsrôn s’unit à la fille de Makir, le père de Galaad, et l’épousa. Elle lui donna Segoub. '
  '22':
  - type: text
    content: Segoub eut pour fils Yaïr, qui posséda vingt-trois villes dans le pays de Galaad
  - type: note
    content: Le pays de Galaad se trouve à l’est du Jourdain (voir Gn 31.21). Sur les villes de Yaïr, voir Nb 32.41 ; Dt 3.13-14 ; Jos 12.5 ; 13.30 ; Jg 10.4 ; 1 R 4.13.
  - type: text
    content: '. '
  '23':
  - type: text
    content: Mais les Gueshouriens et les Syriens prirent de ses descendants les bourgs de Yaïr ainsi que la ville de Qenath et les villes qui en dépendaient, ce qui faisait en tout soixante villes. Tous ceux qui y habitaient étaient des descendants de Makir, le père de Galaad.
  '24':
  - type: text
    content: 'Après la mort de Hetsrôn à Caleb-Ephrata, Abiya, sa femme, donna encore naissance à un fils de lui : Ashhour, le père'
  - type: note
    content: Le terme père pourrait aussi signifier chef (militaire ou civil ; de même, entre autres, aux v. 42, 45, 49-52).
  - type: text
    content: ' de Teqoa. '
  '25':
  - type: text
    content: 'Les fils de Yerahméel, premier-né de Hetsrôn, furent : Ram, l’aîné, Bouna, Orên, Otsem et Ahiya.'
  '26':
  - type: text
    content: 'Yerahméel eut une autre femme, Atara, qui lui donna Onam. '
  '27':
  - type: text
    content: 'Les fils de Ram, le premier-né de Yerahméel, furent : Maats, Yamîn et Eqer. '
  '28':
  - type: text
    content: 'Les fils d’Onam furent : Shammaï et Yada. Fils de Shammaï : Nadab et Abishour. '
  '29':
  - type: text
    content: 'La femme d’Abishour s’appelait Abihaïl, elle lui donna Ahbân et Molid. '
  '3':
  - type: text
    content: 'Juda eut trois fils, de sa femme cananéenne, la fille de Shoua : Er, Onân, Shéla. Er, le fils aîné de Juda, était jugé mauvais par l’Eternel qui le fit mourir. '
  '30':
  - type: text
    content: 'Fils de Nadab : Séled et Appaïm. Séled mourut sans enfant. '
  '31':
  - type: text
    content: 'Fils d’Appaïm : Yisheï qui fut le père de Shéshân. Shéshân fut le père de Ahlaï. '
  '32':
  - type: text
    content: 'Fils de Yada, frère de Shammaï : Yéter et Jonathan. Yéter mourut sans enfant. '
  '33':
  - type: text
    content: 'Fils de Jonathan : Péleth et Zaza. Ce sont là les descendants de Yerahméel.'
  '34':
  - type: text
    content: 'Shéshân n’avait pas de fils, il n’avait que des filles. Il avait un esclave égyptien nommé Yarha '
  '35':
  - type: text
    content: 'à qui il donna l’une de ses filles pour femme ; celle-ci lui donna Attaï. '
  '36':
  - type: text
    content: 'Attaï fut le père de Nathan, Nathan celui de Zabad, '
  '37':
  - type: text
    content: 'Zabad d’Ephlal, Ephlal d’Obed, '
  '38':
  - type: text
    content: 'Obed de Jéhu, Jéhu d’Azaria, '
  '39':
  - type: text
    content: 'Azaria de Hélets, Hélets d’Elasa, '
  '4':
  - type: text
    content: Tamar, la belle-fille de Juda, lui donna Pérets et Zérah
  - type: note
    content: Voir Gn 38.
  - type: text
    content: . Juda eut donc en tout cinq fils.
  '40':
  - type: text
    content: 'Elasa de Sismaï, Sismaï de Shalloum, '
  '41':
  - type: text
    content: Shalloum de Yeqamia, Yeqamia d’Elishama.
  '42':
  - type: text
    content: 'Fils de Caleb, le frère de Yerahméel : Mésha'
  - type: note
    content: 'L’ancienne version grecque a : Marésha.'
  - type: text
    content: ', son premier-né, qui fut le père de Ziph, et Marésha'
  - type: note
    content: 'Le texte hébreu traditionnel a : les fils de Marésha.'
  - type: text
    content: ', le père d’Hébron. '
  '43':
  - type: text
    content: 'Fils d’Hébron : Qorah, Tappouah, Réqem et Shéma. '
  '44':
  - type: text
    content: 'Shéma fut le père de Raham, et Raham le père de Yorqeam. Réqem fut le père de Shammaï. '
  '45':
  - type: text
    content: 'Shammaï eut pour fils Maôn, le père de Beth-Tsour. '
  '46':
  - type: text
    content: 'Epha, épouse de second rang de Caleb, lui donna Harân, Motsa et Gazez. Harân fut le père de Gazez. '
  '47':
  - type: text
    content: 'Fils de Yahdaï : Réguém, Yotam, Guéshân, Péleth, Epha et Shaaph. '
  '48':
  - type: text
    content: 'Maaka, une autre épouse de second rang de Caleb, lui donna Shéber et Tirhana. '
  '49':
  - type: text
    content: 'Plus tard, elle donna encore naissance à Shaaph, le père de Madmanna, et à Sheva, le père de Makbéna et de Guibéa. De plus, Caleb avait une fille nommée Aksa. '
  '5':
  - type: text
    content: 'Fils de Pérets : Hetsrôn et Hamoul.'
  '50':
  - type: text
    content: Tels furent les descendants de Caleb.
  - type: text
    content: 'Fils de Hour : le premier-né de son épouse Ephrata, Shobal, père de Qiryath-Yearim, '
  '51':
  - type: text
    content: 'Salma, père de Bethléhem et Hareph, celui de Beth-Gader. '
  '52':
  - type: text
    content: 'Shobal, le père de Qiryath-Yearim eut des fils : Haroé et Hatsi-Hammenouhoth. '
  '53':
  - type: text
    content: 'Les familles de Qiryath-Yearim furent : les Yétériens, les Poutiens, les Shoumatiens et les Mishraïens ; de celles-là sont sortis les Tsoreatiens et les Eshtaoliens. '
  '54':
  - type: text
    content: 'Descendants de Salma : les habitants de Bethléhem, de Netopha, d’Atroth-Beth-Joab, d’Hatsi-Hammanahti et de Tsoreïa '
  '55':
  - type: text
    content: ainsi que les familles des gens instruits habitant à Yaebets, les Tireatiens, les Shimeatiens et les Soukkatiens. Ce sont les Qéniens, issus de Hamath, ancêtre du groupe familial de Rékab
  - type: note
    content: 'Autre traduction : père de Beth-Rékab.'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Fils de Zérah : Zimri, Etân, Hémân, Kalkol et Darda'
  - type: note
    content: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et 1 R 5.11. Les autres manuscrits hébreux ont : Dara.'
  - type: text
    content: ', cinq en tout.'
  '7':
  - type: text
    content: 'Fils de Karmi : Akar'
  - type: note
    content: En hébreu, il y a un jeu de mots avec le nom d’Akar et le terme rendu par désordre. Il s’agit d’Akân (voir Jos 7.1).
  - type: text
    content: ' (Trouble), qui fut cause de désordre en Israël lorsqu’il commit une infidélité à l’égard de ce qui était voué à l’Eternel.'
  '8':
  - type: text
    content: 'Fils d’Etân : Azaria.'
  '9':
  - type: text
    content: Fils de Hetsrôn
  - type: note
    content: Pour les v. 9-12, voir Rt 4.18-22.
  - type: text
    content: '  : Yerahméel, Ram et Keloubaï'
  - type: note
    content: Variante de Caleb (v. 18, 42).
  - type: text
    content: .
