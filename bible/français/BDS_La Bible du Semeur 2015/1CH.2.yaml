document_id: 1CH.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fils de Jacob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici la liste des fils d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 1-2, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 35.23-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ram eut pour fils Amminadab, qui eut pour fils Nahshôn, chef des descendants de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahshôn eut pour fils Salma, qui eut pour fils Booz, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui eut pour fils Obed, qui eut pour fils Isaï. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 13-15, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 16.6-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' eut pour fils : Eliab, son aîné, Abinadab, son deuxième, Shimea, son troisième. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Netanéel, son quatrième, Raddaï, son cinquième, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Otsem son sixième, et David son septième. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leurs sœurs étaient Tserouya et Abigaïl. Tserouya eut trois fils : Abshaï, Joab et Asaël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abigaïl eut un fils, Amasa, de Yéter, l’Ismaélite.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Caleb, fils de Hetsrôn, eut de sa femme Azouba une fille, Yerioth, et trois fils, Yésher, Shobab et Ardôn. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azouba mourut, et Caleb prit pour femme Ephrath, qui lui donna Hour. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dan, Joseph, Benjamin, Nephtali, Gad et Aser.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Juda
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hour eut pour fils Ouri, et Ouri Betsaléel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, alors qu’il avait soixante ans, Hetsrôn s’unit à la fille de Makir, le père de Galaad, et l’épousa. Elle lui donna Segoub. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Segoub eut pour fils Yaïr, qui posséda vingt-trois villes dans le pays de Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le pays de Galaad se trouve à l’est du Jourdain (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 31.21
        - type: text
          text: ). Sur les villes de Yaïr, voir Nb 32.41 ; Dt 3.13-14 ; Jos 12.5 ; 13.30 ; Jg 10.4 ; 1 R 4.13.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les Gueshouriens et les Syriens prirent de ses descendants les bourgs de Yaïr ainsi que la ville de Qenath et les villes qui en dépendaient, ce qui faisait en tout soixante villes. Tous ceux qui y habitaient étaient des descendants de Makir, le père de Galaad.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Hetsrôn à Caleb-Ephrata, Abiya, sa femme, donna encore naissance à un fils de lui : Ashhour, le père'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (militaire ou civil ; de même, entre autres, aux v. 42, 45, 49-52).
      marker-yv: yv-n
    - type: text
      text: ' de Teqoa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Yerahméel, premier-né de Hetsrôn, furent : Ram, l’aîné, Bouna, Orên, Otsem et Ahiya.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yerahméel eut une autre femme, Atara, qui lui donna Onam. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Ram, le premier-né de Yerahméel, furent : Maats, Yamîn et Eqer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Onam furent : Shammaï et Yada. Fils de Shammaï : Nadab et Abishour. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La femme d’Abishour s’appelait Abihaïl, elle lui donna Ahbân et Molid. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda eut trois fils, de sa femme cananéenne, la fille de Shoua : Er, Onân, Shéla. Er, le fils aîné de Juda, était jugé mauvais par l’Eternel qui le fit mourir. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Nadab : Séled et Appaïm. Séled mourut sans enfant. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Appaïm : Yisheï qui fut le père de Shéshân. Shéshân fut le père de Ahlaï. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Yada, frère de Shammaï : Yéter et Jonathan. Yéter mourut sans enfant. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Jonathan : Péleth et Zaza. Ce sont là les descendants de Yerahméel.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shéshân n’avait pas de fils, il n’avait que des filles. Il avait un esclave égyptien nommé Yarha '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à qui il donna l’une de ses filles pour femme ; celle-ci lui donna Attaï. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Attaï fut le père de Nathan, Nathan celui de Zabad, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zabad d’Ephlal, Ephlal d’Obed, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obed de Jéhu, Jéhu d’Azaria, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azaria de Hélets, Hélets d’Elasa, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamar, la belle-fille de Juda, lui donna Pérets et Zérah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 38
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Juda eut donc en tout cinq fils.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elasa de Sismaï, Sismaï de Shalloum, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shalloum de Yeqamia, Yeqamia d’Elishama.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Caleb, le frère de Yerahméel : Mésha'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Marésha.
      marker-yv: yv-n
    - type: text
      text: ', son premier-né, qui fut le père de Ziph, et Marésha'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils de Marésha.
      marker-yv: yv-n
    - type: text
      text: ', le père d’Hébron. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Hébron : Qorah, Tappouah, Réqem et Shéma. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shéma fut le père de Raham, et Raham le père de Yorqeam. Réqem fut le père de Shammaï. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shammaï eut pour fils Maôn, le père de Beth-Tsour. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Epha, épouse de second rang de Caleb, lui donna Harân, Motsa et Gazez. Harân fut le père de Gazez. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Yahdaï : Réguém, Yotam, Guéshân, Péleth, Epha et Shaaph. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maaka, une autre épouse de second rang de Caleb, lui donna Shéber et Tirhana. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus tard, elle donna encore naissance à Shaaph, le père de Madmanna, et à Sheva, le père de Makbéna et de Guibéa. De plus, Caleb avait une fille nommée Aksa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Pérets : Hetsrôn et Hamoul.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tels furent les descendants de Caleb.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Hour : le premier-né de son épouse Ephrata, Shobal, père de Qiryath-Yearim, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salma, père de Bethléhem et Hareph, celui de Beth-Gader. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shobal, le père de Qiryath-Yearim eut des fils : Haroé et Hatsi-Hammenouhoth. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les familles de Qiryath-Yearim furent : les Yétériens, les Poutiens, les Shoumatiens et les Mishraïens ; de celles-là sont sortis les Tsoreatiens et les Eshtaoliens. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Descendants de Salma : les habitants de Bethléhem, de Netopha, d’Atroth-Beth-Joab, d’Hatsi-Hammanahti et de Tsoreïa '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ainsi que les familles des gens instruits habitant à Yaebets, les Tireatiens, les Shimeatiens et les Soukkatiens. Ce sont les Qéniens, issus de Hamath, ancêtre du groupe familial de Rékab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: père de Beth-Rékab.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Zérah : Zimri, Etân, Hémân, Kalkol et Darda'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après de nombreux manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 5.11
        - type: text
          text: '. Les autres manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dara.
      marker-yv: yv-n
    - type: text
      text: ', cinq en tout.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Karmi : Akar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En hébreu, il y a un jeu de mots avec le nom d’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Akar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et le terme rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'désordre. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Akân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 7.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' (Trouble), qui fut cause de désordre en Israël lorsqu’il commit une infidélité à l’égard de ce qui était voué à l’Eternel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Etân : Azaria.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils de Hetsrôn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 9-12, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rt 4.18-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : Yerahméel, Ram et Keloubaï'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Variante de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Caleb '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 18, 42).
      marker-yv: yv-n
    - type: text
      text: .
