document_id: 1CH.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 3.2-5)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la liste des fils de David qui lui naquirent à Hébron. Le premier-né s’appelait Amnôn, il était fils d’Ahinoam de Jizréel ; le deuxième, Daniel, était fils d’Abigaïl de Karmel ; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les descendants de Salomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 10-16 : liste des rois de Juda dont il est question en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 12
        - type: text
          text: ' à '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', en ligne directe de père en fils, furent : Roboam, Abiya, Asa, Josaphat, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Yoram, Ahazia, Joas, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Amatsia, Azaria, Yotam, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ahaz, Ezéchias, Manassé, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amôn, Josias. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fils de Josias : le premier-né, Yohanân ; le second, Yehoyaqim ; le troisième, Sédécias ; le quatrième, Shalloum. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fils de Yehoyaqim : Yekonia et Sédécias.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Descendants de Yekonia, qui fut emmené en captivité : Shealtiel, son fils, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et Malkiram, Pedaya, Shénatsar, Yeqamia, Hoshama et Nedabia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fils de Pedaya : Zorobabel et Shimeï. Zorobabel eut deux fils : Meshoullam et Hanania ; Shelomith était leur sœur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'le troisième, Absalom, était le fils de Maaka, fille de Talmaï, le roi de Gueshour ; le quatrième, Adoniya, était le fils de Haggith ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis Hashouba, Ohel, Bérékia, Hasadia, Youshab-Hésed, soit cinq. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Descendants de Hanania : Pelatia et Esaïe ; les fils de Rephaya, ceux d’Arnân, d’Abdias et de Shekania. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Shekania eut six fils : Shemaya'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shemaya et ses fils.
      marker-yv: yv-n
    - type: text
      text: ', Hattoush, Yiguéal, Bariah, Nearia et Shaphath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nearia eut trois fils : Elyoénaï, Ezéchias et Azriqam. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Elyoénaï eut sept fils : Hodavia, Eliashib, Pelaya, Aqqoub, Yohanân, Delaya et Anani.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'le cinquième, Shephatia, d’Abital ; le sixième, Yitream, de sa femme Egla. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ces six fils lui naquirent à Hébron, où il régna sept ans et six mois. Il régna ensuite trente-trois ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 5.4-5 ; 1 R 2.11 ; 1 Ch 29.27.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 5.14-16 ; 1 Ch 14.4-7)
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici les enfants qui lui naquirent à Jérusalem : Shimea, Shobab, Nathan, Salomon, tous les quatre de Bath-Shoua'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bath-Shéba, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la mère de Salomon (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 11.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', fille d’Ammiel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il eut encore : Yibhar, Elishama'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Deux manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Elisha. '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 5.15
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 14.5
        - type: text
          text: ' ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elishoua.
      marker-yv: yv-n
    - type: text
      text: ', Eliphéleth, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Noga, Népheg, Yaphia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Elishama, Elyada et Eliphéleth, soit neuf autres fils de David.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ses épouses de second rang lui donnèrent aussi des fils. Tamar était leur sœur. '
