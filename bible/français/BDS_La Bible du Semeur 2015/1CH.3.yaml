document_id: 1CH.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de David
  - type: heading
    content: (2 S 3.2-5)
  - type: text
    content: 'Voici la liste des fils de David qui lui naquirent à Hébron. Le premier-né s’appelait Amnôn, il était fils d’Ahinoam de Jizréel ; le deuxième, Daniel, était fils d’Abigaïl de Karmel ; '
  '10':
  - type: text
    content: Les descendants de Salomon
  - type: note
    content: 'Voir v. 10-16 : liste des rois de Juda dont il est question en 1 R 12 à 2 R 25.'
  - type: text
    content: ', en ligne directe de père en fils, furent : Roboam, Abiya, Asa, Josaphat, '
  '11':
  - type: text
    content: 'Yoram, Ahazia, Joas, '
  '12':
  - type: text
    content: 'Amatsia, Azaria, Yotam, '
  '13':
  - type: text
    content: 'Ahaz, Ezéchias, Manassé, '
  '14':
  - type: text
    content: 'Amôn, Josias. '
  '15':
  - type: text
    content: 'Fils de Josias : le premier-né, Yohanân ; le second, Yehoyaqim ; le troisième, Sédécias ; le quatrième, Shalloum. '
  '16':
  - type: text
    content: 'Fils de Yehoyaqim : Yekonia et Sédécias.'
  '17':
  - type: text
    content: 'Descendants de Yekonia, qui fut emmené en captivité : Shealtiel, son fils, '
  '18':
  - type: text
    content: 'et Malkiram, Pedaya, Shénatsar, Yeqamia, Hoshama et Nedabia. '
  '19':
  - type: text
    content: 'Fils de Pedaya : Zorobabel et Shimeï. Zorobabel eut deux fils : Meshoullam et Hanania ; Shelomith était leur sœur. '
  '2':
  - type: text
    content: 'le troisième, Absalom, était le fils de Maaka, fille de Talmaï, le roi de Gueshour ; le quatrième, Adoniya, était le fils de Haggith ; '
  '20':
  - type: text
    content: 'Puis Hashouba, Ohel, Bérékia, Hasadia, Youshab-Hésed, soit cinq. '
  '21':
  - type: text
    content: 'Descendants de Hanania : Pelatia et Esaïe ; les fils de Rephaya, ceux d’Arnân, d’Abdias et de Shekania. '
  '22':
  - type: text
    content: 'Shekania eut six fils : Shemaya'
  - type: note
    content: 'Le texte hébreu traditionnel a : Shemaya et ses fils.'
  - type: text
    content: ', Hattoush, Yiguéal, Bariah, Nearia et Shaphath. '
  '23':
  - type: text
    content: 'Nearia eut trois fils : Elyoénaï, Ezéchias et Azriqam. '
  '24':
  - type: text
    content: 'Elyoénaï eut sept fils : Hodavia, Eliashib, Pelaya, Aqqoub, Yohanân, Delaya et Anani.'
  '3':
  - type: text
    content: 'le cinquième, Shephatia, d’Abital ; le sixième, Yitream, de sa femme Egla. '
  '4':
  - type: text
    content: Ces six fils lui naquirent à Hébron, où il régna sept ans et six mois. Il régna ensuite trente-trois ans à Jérusalem
  - type: note
    content: Voir 2 S 5.4-5 ; 1 R 2.11 ; 1 Ch 29.27.
  - type: text
    content: .
  - type: heading
    content: (2 S 5.14-16 ; 1 Ch 14.4-7)
  '5':
  - type: text
    content: 'Voici les enfants qui lui naquirent à Jérusalem : Shimea, Shobab, Nathan, Salomon, tous les quatre de Bath-Shoua'
  - type: note
    content: Ou Bath-Shéba, la mère de Salomon (2 S 11.3).
  - type: text
    content: ', fille d’Ammiel. '
  '6':
  - type: text
    content: 'Il eut encore : Yibhar, Elishama'
  - type: note
    content: 'Deux manuscrits hébreux ont : Elisha. 2 S 5.15 et 1 Ch 14.5 ont : Elishoua.'
  - type: text
    content: ', Eliphéleth, '
  '7':
  - type: text
    content: 'Noga, Népheg, Yaphia, '
  '8':
  - type: text
    content: Elishama, Elyada et Eliphéleth, soit neuf autres fils de David.
  '9':
  - type: text
    content: 'Ses épouses de second rang lui donnèrent aussi des fils. Tamar était leur sœur. '
