document_id: JER.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi ce châtiment ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Allez de çà, de là, ╵dans les rues de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: observez donc et constatez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cherchez sur ses places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous trouvez un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il y en a un seul
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se comporte droitement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s’efforce ╵d’être fidèle ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ce cas, je pardonnerai ╵à cette ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 18.23-31
        metadata:
          usfm: GEN.18.23+GEN.18.24+GEN.18.25+GEN.18.26+GEN.18.27+GEN.18.28+GEN.18.29+GEN.18.30+GEN.18.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car quand ils jurent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « L’Eternel est vivant ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs serments sont trompeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Eternel, tes yeux ╵ne peuvent s’attacher ╵qu’à la fidélité !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as frappé ces hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils n’ont pas été touchés ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les as écrasés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils ont refusé ╵d’accepter la leçon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont rendu leur face ╵plus dure que le roc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont refusé
- type: usfm
  marker: q1
  children:
  - type: text
    text: de changer de comportement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me suis dit alors : ╵Ce sont des gens ╵de condition modeste,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils agissent comme des fous
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu’ils ne connaissent pas ╵la voie prescrite ╵par l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni le droit de leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J’irai donc vers les grands
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je leur parlerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux, du moins, ils connaissent ╵la voie prescrite ╵par l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le droit de leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien non ! tous ensemble, ╵ils ont brisé le joug,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont rompu les liens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est pourquoi surgira ╵le lion de la forêt, ╵il les attaquera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le loup de la steppe ╵viendra les ravager ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la panthère est tapie ╵près de leurs villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux qui en sortiront ╵se feront déchirer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que leurs péchés ╵se sont multipliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que leurs infidélités ╵ne cessent de s’accroître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avec cela ╵pourrais-je encore ╵te pardonner ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes enfants m’ont abandonné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils prêtent serment ╵par ce qui n’est pas Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je les ai comblés ╵et ils sont adultères ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils vont en foule ╵aux maisons des prostituées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de prostitution sacrée (voir 2.20 et note ; 3.8).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce sont des étalons ╵bien repus et pleins de désirs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pleins de désirs
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sens incertain.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chacun d’eux hennit ╵après la femme du prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: N’interviendrais-je pas ╵contre ces gens ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne ferais-je pas payer ╵un pareil peuple ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Escaladez ses murs ╵et détruisez ma vigne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Image du peuple d’Israël (voir 2.21 ; Es 5.1-7 ; 27.2-5).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ne l’achevez pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Arrachez ses sarments :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’appartiennent pas ╵à l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car le royaume d’Israël ╵et celui de Juda ╵m’ont bien trahi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’arrogance attire le jugement
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils m’ont renié, moi, l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils ont dit : « Il n’existe pas !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le malheur ╵ne nous atteindra pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne verrons jamais ╵l’épée ou la famine !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quant aux prophètes ╵ils ne sont que du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont aucun message.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il leur soit fait ainsi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’ancienne version grecque omet cette dernière phrase.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi, ainsi parle ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous proférez ╵de tels propos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais faire de mes paroles ╵comme un feu dans ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ce peuple, ╵je vais faire comme du bois, ╵et ce feu les consumera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je vais faire venir de loin
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peuple étranger contre vous, ╵ô peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est une nation très ancienne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peuple impétueux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont tu ne connais pas la langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont tu ne comprends pas les propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Son carquois est ╵comme une tombe ouverte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont tous des guerriers !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Elle dévorera ╵ta moisson et ton pain ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dévorera ╵tes fils, tes filles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dévorera ╵tes brebis et tes bœufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dévorera ╵ta vigne et ton figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle démolira ╵avec l’épée ╵tes villes fortifiées ╵qui sont ton assurance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais même alors, l’Eternel le déclare, je ne vous anéantirai pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et lorsque vous direz : « Pourquoi donc l’Eternel notre Dieu nous traite-t-il ainsi ? », toi, tu leur répondras : « C’est parce que vous m’avez délaissé et que vous avez adoré des divinités étrangères dans votre pays même. Voilà pourquoi vous servirez des étrangers sur un sol qui n’est pas le vôtre. »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Avertissements aux dilettantes !
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Annoncez ces paroles ╵au peuple de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'proclamez ce qui suit ╵au pays de Juda :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ecoutez donc ceci, ╵peuple insensé ╵et sans intelligence :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez bien des yeux ╵mais vous ne voyez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez des oreilles, ╵mais vous n’entendez pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 6.9-10 ; Ez 12.2 ; Mc 8.18.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne me craindrez-vous pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne tremblerez-vous pas devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi qui ai donné à la mer ╵le sable pour limite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une barrière éternelle ╵qu’elle ne franchira jamais ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle bouillonne ╵mais elle est impuissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses flots mugissent ╵mais ils n’iront pas au-delà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ce peuple-ci, par contre, ╵a un cœur rétif et rebelle ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont détournés ╵et sont partis ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ils ne disent pas dans leur cœur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Craignons l’Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nous donne les pluies, ╵chacune en sa saison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pluies d’automne ╵et celles du printemps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui nous réserve ╵les semaines fixées ╵pour faire la moisson. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais ce sont vos péchés ╵qui ont tout dérangé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont vos fautes ╵qui vous ont privés de ces biens.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Un mal sans limite
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car au sein de mon peuple, ╵se trouvent des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils épient leurs victimes ╵comme des oiseleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tendent des pièges mortels ╵et attrapent des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Leurs maisons sont remplies de fraude
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une cage ╵remplie d’oiseaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est par ces moyens ╵qu’ils deviennent puissants et riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils sont bien gros et gras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils battent le record du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne rendent pas la justice, ╵ils ne font pas justice à l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils prospèrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils gagnent leurs procès.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: non, ils ne rendent pas justice aux pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: N’interviendrais-je pas ╵contre ces gens ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne ferais-je pas payer ╵un pareil peuple ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: C’est stupéfiant, ╵horrible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qui se passe ╵dans ce pays !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dans leurs prophéties, les prophètes ╵ne disent que mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les prêtres dominent ╵au nom de leur autorité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec leur appui '
    - type: usfm
      marker: ft
      children:
      - type: text
