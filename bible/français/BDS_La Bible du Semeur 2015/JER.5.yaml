document_id: JER.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi ce châtiment ?
  - type: text
    content: Allez de çà, de là, ╵dans les rues de Jérusalem,
  - type: text
    content: observez donc et constatez,
  - type: text
    content: et cherchez sur ses places,
  - type: text
    content: si vous trouvez un homme,
  - type: text
    content: s’il y en a un seul
  - type: text
    content: qui se comporte droitement,
  - type: text
    content: et qui s’efforce ╵d’être fidèle ;
  - type: text
    content: dans ce cas, je pardonnerai ╵à cette ville
  - type: note
    content: Voir Gn 18.23-31.
  - type: text
    content: .
  '10':
  - type: text
    content: Escaladez ses murs ╵et détruisez ma vigne
  - type: note
    content: Image du peuple d’Israël (voir 2.21 ; Es 5.1-7 ; 27.2-5).
  - type: text
    content: ','
  - type: text
    content: mais ne l’achevez pas !
  - type: text
    content: 'Arrachez ses sarments :'
  - type: text
    content: ils n’appartiennent pas ╵à l’Eternel.
  '11':
  - type: text
    content: Car le royaume d’Israël ╵et celui de Juda ╵m’ont bien trahi,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: L’arrogance attire le jugement
  '12':
  - type: text
    content: Ils m’ont renié, moi, l’Eternel,
  - type: text
    content: 'ils ont dit : « Il n’existe pas !'
  - type: text
    content: Et le malheur ╵ne nous atteindra pas.
  - type: text
    content: Nous ne verrons jamais ╵l’épée ou la famine !
  '13':
  - type: text
    content: Quant aux prophètes ╵ils ne sont que du vent,
  - type: text
    content: ils n’ont aucun message.
  - type: text
    content: Qu’il leur soit fait ainsi
  - type: note
    content: L’ancienne version grecque omet cette dernière phrase.
  - type: text
    content: '  ! »'
  '14':
  - type: text
    content: 'C’est pourquoi, ainsi parle ╵le Seigneur des armées célestes :'
  - type: text
    content: Puisque vous proférez ╵de tels propos,
  - type: text
    content: je vais faire de mes paroles ╵comme un feu dans ta bouche,
  - type: text
    content: et de ce peuple, ╵je vais faire comme du bois, ╵et ce feu les consumera.
  '15':
  - type: text
    content: Je vais faire venir de loin
  - type: text
    content: un peuple étranger contre vous, ╵ô peuple d’Israël,
  - type: text
    content: l’Eternel le déclare.
  - type: text
    content: C’est une nation très ancienne,
  - type: text
    content: un peuple impétueux,
  - type: text
    content: dont tu ne connais pas la langue
  - type: text
    content: et dont tu ne comprends pas les propos.
  '16':
  - type: text
    content: Son carquois est ╵comme une tombe ouverte,
  - type: text
    content: ce sont tous des guerriers !
  '17':
  - type: text
    content: Elle dévorera ╵ta moisson et ton pain ;
  - type: text
    content: elle dévorera ╵tes fils, tes filles.
  - type: text
    content: Elle dévorera ╵tes brebis et tes bœufs,
  - type: text
    content: elle dévorera ╵ta vigne et ton figuier,
  - type: text
    content: elle démolira ╵avec l’épée ╵tes villes fortifiées ╵qui sont ton assurance.
  '18':
  - type: text
    content: 'Mais même alors, l’Eternel le déclare, je ne vous anéantirai pas. '
  '19':
  - type: text
    content: 'Et lorsque vous direz : « Pourquoi donc l’Eternel notre Dieu nous traite-t-il ainsi ? », toi, tu leur répondras : « C’est parce que vous m’avez délaissé et que vous avez adoré des divinités étrangères dans votre pays même. Voilà pourquoi vous servirez des étrangers sur un sol qui n’est pas le vôtre. »'
  - type: heading
    content: Avertissements aux dilettantes !
  '2':
  - type: text
    content: 'Car quand ils jurent :'
  - type: text
    content: « L’Eternel est vivant ! »
  - type: text
    content: leurs serments sont trompeurs.
  '20':
  - type: text
    content: Annoncez ces paroles ╵au peuple de Jacob,
  - type: text
    content: 'proclamez ce qui suit ╵au pays de Juda :'
  '21':
  - type: text
    content: 'Ecoutez donc ceci, ╵peuple insensé ╵et sans intelligence :'
  - type: text
    content: vous avez bien des yeux ╵mais vous ne voyez pas,
  - type: text
    content: vous avez des oreilles, ╵mais vous n’entendez pas
  - type: note
    content: Voir Es 6.9-10 ; Ez 12.2 ; Mc 8.18.
  - type: text
    content: '  !'
  '22':
  - type: text
    content: Ne me craindrez-vous pas ?
  - type: text
    content: demande l’Eternel.
  - type: text
    content: Et ne tremblerez-vous pas devant moi,
  - type: text
    content: moi qui ai donné à la mer ╵le sable pour limite,
  - type: text
    content: comme une barrière éternelle ╵qu’elle ne franchira jamais ?
  - type: text
    content: Elle bouillonne ╵mais elle est impuissante,
  - type: text
    content: ses flots mugissent ╵mais ils n’iront pas au-delà.
  '23':
  - type: text
    content: Ce peuple-ci, par contre, ╵a un cœur rétif et rebelle ;
  - type: text
    content: ils se sont détournés ╵et sont partis ;
  '24':
  - type: text
    content: 'ils ne disent pas dans leur cœur :'
  - type: text
    content: « Craignons l’Eternel, notre Dieu,
  - type: text
    content: il nous donne les pluies, ╵chacune en sa saison,
  - type: text
    content: les pluies d’automne ╵et celles du printemps.
  - type: text
    content: C’est lui qui nous réserve ╵les semaines fixées ╵pour faire la moisson. »
  '25':
  - type: text
    content: Mais ce sont vos péchés ╵qui ont tout dérangé,
  - type: text
    content: ce sont vos fautes ╵qui vous ont privés de ces biens.
  - type: heading
    content: Un mal sans limite
  '26':
  - type: text
    content: Car au sein de mon peuple, ╵se trouvent des méchants,
  - type: text
    content: ils épient leurs victimes ╵comme des oiseleurs.
  - type: text
    content: Ils tendent des pièges mortels ╵et attrapent des hommes.
  '27':
  - type: text
    content: Leurs maisons sont remplies de fraude
  - type: text
    content: comme une cage ╵remplie d’oiseaux,
  - type: text
    content: et c’est par ces moyens ╵qu’ils deviennent puissants et riches.
  '28':
  - type: text
    content: Ils sont bien gros et gras,
  - type: text
    content: ils battent le record du mal,
  - type: text
    content: ils ne rendent pas la justice, ╵ils ne font pas justice à l’orphelin,
  - type: text
    content: et ils prospèrent
  - type: note
    content: 'Certains traduisent : ils gagnent leurs procès.'
  - type: text
    content: '  :'
  - type: text
    content: non, ils ne rendent pas justice aux pauvres.
  '29':
  - type: text
    content: N’interviendrais-je pas ╵contre ces gens ?
  - type: text
    content: demande l’Eternel.
  - type: text
    content: Et ne ferais-je pas payer ╵un pareil peuple ?
  '3':
  - type: text
    content: O Eternel, tes yeux ╵ne peuvent s’attacher ╵qu’à la fidélité !
  - type: text
    content: Tu as frappé ces hommes,
  - type: text
    content: mais ils n’ont pas été touchés ;
  - type: text
    content: tu les as écrasés,
  - type: text
    content: mais ils ont refusé ╵d’accepter la leçon.
  - type: text
    content: Ils ont rendu leur face ╵plus dure que le roc,
  - type: text
    content: et ils ont refusé
  - type: text
    content: de changer de comportement.
  '30':
  - type: text
    content: C’est stupéfiant, ╵horrible,
  - type: text
    content: ce qui se passe ╵dans ce pays !
  '31':
  - type: text
    content: Dans leurs prophéties, les prophètes ╵ne disent que mensonges,
  - type: text
    content: et les prêtres dominent ╵au nom de leur autorité
  - type: note
    content: 'Autres traductions : avec leur appui ou ne cherchent que leur profit.'
  - type: text
    content: .
  - type: text
    content: Mon peuple, lui, ╵est content de cela.
  - type: text
    content: Mais que ferez-vous donc ╵après ce qui va arriver ?
  '4':
  - type: text
    content: 'Je me suis dit alors : ╵Ce sont des gens ╵de condition modeste,'
  - type: text
    content: ils agissent comme des fous
  - type: text
    content: parce qu’ils ne connaissent pas ╵la voie prescrite ╵par l’Eternel
  - type: text
    content: ni le droit de leur Dieu.
  '5':
  - type: text
    content: J’irai donc vers les grands
  - type: text
    content: et je leur parlerai,
  - type: text
    content: eux, du moins, ils connaissent ╵la voie prescrite ╵par l’Eternel
  - type: text
    content: et le droit de leur Dieu.
  - type: text
    content: Eh bien non ! tous ensemble, ╵ils ont brisé le joug,
  - type: text
    content: ils ont rompu les liens.
  '6':
  - type: text
    content: C’est pourquoi surgira ╵le lion de la forêt, ╵il les attaquera
  - type: text
    content: et le loup de la steppe ╵viendra les ravager ;
  - type: text
    content: la panthère est tapie ╵près de leurs villes,
  - type: text
    content: et tous ceux qui en sortiront ╵se feront déchirer.
  - type: text
    content: Parce que leurs péchés ╵se sont multipliés,
  - type: text
    content: et que leurs infidélités ╵ne cessent de s’accroître.
  '7':
  - type: text
    content: Avec cela ╵pourrais-je encore ╵te pardonner ?
  - type: text
    content: Tes enfants m’ont abandonné
  - type: text
    content: et ils prêtent serment ╵par ce qui n’est pas Dieu.
  - type: text
    content: Moi, je les ai comblés ╵et ils sont adultères ;
  - type: text
    content: ils vont en foule ╵aux maisons des prostituées
  - type: note
    content: Il s’agit de prostitution sacrée (voir 2.20 et note ; 3.8).
  - type: text
    content: .
  '8':
  - type: text
    content: Ce sont des étalons ╵bien repus et pleins de désirs
  - type: note
    content: 'pleins de désirs: sens incertain.'
  - type: text
    content: ','
  - type: text
    content: et chacun d’eux hennit ╵après la femme du prochain.
  '9':
  - type: text
    content: N’interviendrais-je pas ╵contre ces gens ?
  - type: text
    content: demande l’Eternel.
  - type: text
    content: Et ne ferais-je pas payer ╵un pareil peuple ?
