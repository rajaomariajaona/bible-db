document_id: EZK.47
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le fleuve issu du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’individu me ramena vers l’entrée du Temple. Et je vis que de l’eau jaillissait de dessous le seuil du Temple, du côté oriental, la façade du Temple étant à l’est, et l’eau s’écoulait du côté sud de l’édifice en passant au sud de l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’individu me fit sortir par la porte nord et m’en fit contourner l’extérieur jusqu’à la porte extérieure orientale. Je vis l’eau sourdre du côté droit de cette porte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’individu s’éloigna vers l’est, un cordeau à la main. Il mesura mille coudées en aval et me fit traverser l’eau ; elle m’arrivait jusqu’aux chevilles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il mesura encore mille coudées et me fit de nouveau traverser : l’eau me venait jusqu’aux genoux. Il mesura encore mille coudées et me fit traverser : l’eau me venait jusqu’à la taille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il mesura encore mille coudées : maintenant c’était un torrent que je ne pouvais plus franchir, car l’eau était si profonde qu’il fallait nager. On ne pouvait plus le traverser autrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il me dit : Fils d’homme, as-tu vu ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Puis il me ramena sur le bord du torrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsque j’y fus revenu, j’aperçus, sur les deux rives, des arbres en très grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le personnage me dit : Ces eaux s’écoulent vers la région est du pays, elles descendent dans la plaine du Jourdain et se jetteront dans la mer Morte. Quand elles se déverseront dans la mer, celle-ci sera assainie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Partout où passera le double torrent, les animaux foisonneront et pourront vivre, et il y aura beaucoup de poissons, car ces eaux viendront assainir la mer, et la vie se développera sur tout le passage du torrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans l’état actuel, aucun poisson ne peut vivre dans la mer Morte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Sur les rives de la mer s’établiront des pêcheurs depuis Eyn-Guédi jusqu’à Eyn-Eglaïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eyn-Guédi
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sur la rive occidentale de la mer Morte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.62
        metadata:
          usfm: JOS.15.62
      - type: text
        text: '). '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eyn-Eglaïm
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sur la rive est ou nord.
    marker-yv: yv-n
  - type: text
    text: ', on étendra des filets et les poissons de toute espèce seront très abondants, tout comme dans la mer Méditerranée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais ses marais et ses lagunes ne seront pas assainis, ils seront laissés en salines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le long du torrent, sur chacune de ses rives, croîtront toutes sortes d’arbres fruitiers dont le feuillage restera toujours vert et dont les fruits ne s’épuiseront jamais. Chaque mois ils porteront de nouveaux fruits grâce aux eaux provenant du sanctuaire. Leurs fruits seront bons à manger et leurs feuilles serviront de remèdes.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le partage du pays
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ce que déclare le Seigneur, l’Eternel : Vous délimiterez les lots du pays pour le partager entre les douze tribus d’Israël de la façon suivante. Les descendants de Joseph auront deux parts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous recevrez le pays en possession, chacun ayant une part équivalente à celle de l’autre. Car j’ai juré de le donner à vos ancêtres, et il vous reviendra comme patrimoine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici les limites du pays : la frontière nord partira de la mer Méditerranée et passera par Hetlôn, puis par Tsedad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hamath, Bérota
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à environ 200 kilomètres au nord de Damas. C’était la capitale d’un royaume araméen sur les rives de l’Oronte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 13.21
        metadata:
          usfm: NUM.13.21
      - type: text
        text: '). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hetlôn, puis… '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath, Bérota
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hetlôn, Lebo-Hamath, Tsedad, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '16 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'puis Bérota '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '48.1'
        metadata:
          usfm: EZK.48.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', Sibraïm qui se trouve entre la frontière de Damas et celle de Hamath, et Hatzer-Hattikôn qui est sur la frontière du Haurân'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: District à l’est du lac de Galilée au sud de Damas et au nord-est du Basan.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La frontière s’étendra donc depuis la mer Méditerranée jusqu’à Hatsar-Enôn, sur la frontière de Damas, puis, vers le nord, jusqu’à Tsaphôn et la frontière de Hamath. Telle sera la limite du côté nord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Du côté est, vous ferez partir la frontière entre le Haurân et Damas, et vous la ferez passer entre Galaad et le pays d’Israël, le long du Jourdain depuis la frontière nord jusqu’à la mer Morte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis la frontière nord jusqu’à la mer Morte
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu’à Tamar, sur la mer… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir v. 19).
    marker-yv: yv-n
  - type: text
    text: . Telle sera la limite du côté est
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le territoire de la tribu de Galaad à l’est du Jourdain ne faisait pas partie du territoire alloué primitivement à Israël (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 34.12
        metadata:
          usfm: NUM.34.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Du côté du Néguev, au sud, la frontière ira de Tamar jusqu’aux eaux de Meriba de Qadesh, puis longera le torrent d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qadesh
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 34.4
        metadata:
          usfm: NUM.34.4
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le torrent d’Egypte
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sans doute le Wadi el-Arich qui se jette dans la Méditerranée à quelque 80 kilomètres au sud de Gaza.
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à la mer Méditerranée. Telle sera la limite du côté sud vers le Néguev. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et du côté ouest, elle sera marquée par la mer Méditerranée, depuis la frontière sud jusqu’en face de Lebo-Hamath. Telle sera la limite occidentale.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le partage entre les tribus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous vous partagerez ce pays entre les tribus d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous le répartirez en tirant au sort les parts de patrimoine pour vous et pour les étrangers qui résident au milieu de vous et qui ont eu là des enfants. Vous les traiterez comme les Israélites de souche, ils tireront leurs parts au sort avec vous, au milieu des tribus d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est dans la tribu même où l’étranger est installé que vous lui donnerez son patrimoine, le Seigneur, l’Eternel, le déclare.
