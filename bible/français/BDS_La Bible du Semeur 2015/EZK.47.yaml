document_id: EZK.47,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le fleuve issu du Temple
  - type: text
    content: 'L’individu me ramena vers l’entrée du Temple. Et je vis que de l’eau jaillissait de dessous le seuil du Temple, du côté oriental, la façade du Temple étant à l’est, et l’eau s’écoulait du côté sud de l’édifice en passant au sud de l’autel. '
  '10':
  - type: text
    content: Sur les rives de la mer s’établiront des pêcheurs depuis Eyn-Guédi jusqu’à Eyn-Eglaïm
  - type: note
    content: 'Eyn-Guédi: sur la rive occidentale de la mer Morte (Jos 15.62). Eyn-Eglaïm: sur la rive est ou nord.'
  - type: text
    content: ', on étendra des filets et les poissons de toute espèce seront très abondants, tout comme dans la mer Méditerranée. '
  '11':
  - type: text
    content: 'Mais ses marais et ses lagunes ne seront pas assainis, ils seront laissés en salines. '
  '12':
  - type: text
    content: Le long du torrent, sur chacune de ses rives, croîtront toutes sortes d’arbres fruitiers dont le feuillage restera toujours vert et dont les fruits ne s’épuiseront jamais. Chaque mois ils porteront de nouveaux fruits grâce aux eaux provenant du sanctuaire. Leurs fruits seront bons à manger et leurs feuilles serviront de remèdes.
  - type: heading
    content: Le partage du pays
  '13':
  - type: text
    content: 'Voici ce que déclare le Seigneur, l’Eternel : Vous délimiterez les lots du pays pour le partager entre les douze tribus d’Israël de la façon suivante. Les descendants de Joseph auront deux parts. '
  '14':
  - type: text
    content: Vous recevrez le pays en possession, chacun ayant une part équivalente à celle de l’autre. Car j’ai juré de le donner à vos ancêtres, et il vous reviendra comme patrimoine.
  '15':
  - type: text
    content: 'Voici les limites du pays : la frontière nord partira de la mer Méditerranée et passera par Hetlôn, puis par Tsedad, '
  '16':
  - type: text
    content: Hamath, Bérota
  - type: note
    content: 'Hamath: à environ 200 kilomètres au nord de Damas. C’était la capitale d’un royaume araméen sur les rives de l’Oronte (Nb 13.21). Hetlôn, puis… 16 Hamath, Bérota: selon le texte hébreu traditionnel. L’ancienne version grecque a : Hetlôn, Lebo-Hamath, Tsedad, 16 puis Bérota (voir 48.1).'
  - type: text
    content: ', Sibraïm qui se trouve entre la frontière de Damas et celle de Hamath, et Hatzer-Hattikôn qui est sur la frontière du Haurân'
  - type: note
    content: District à l’est du lac de Galilée au sud de Damas et au nord-est du Basan.
  - type: text
    content: '. '
  '17':
  - type: text
    content: La frontière s’étendra donc depuis la mer Méditerranée jusqu’à Hatsar-Enôn, sur la frontière de Damas, puis, vers le nord, jusqu’à Tsaphôn et la frontière de Hamath. Telle sera la limite du côté nord.
  '18':
  - type: text
    content: Du côté est, vous ferez partir la frontière entre le Haurân et Damas, et vous la ferez passer entre Galaad et le pays d’Israël, le long du Jourdain depuis la frontière nord jusqu’à la mer Morte
  - type: note
    content: 'depuis la frontière nord jusqu’à la mer Morte: selon le texte hébreu traditionnel. L’ancienne version grecque a : jusqu’à Tamar, sur la mer… (voir v. 19).'
  - type: text
    content: . Telle sera la limite du côté est
  - type: note
    content: Le territoire de la tribu de Galaad à l’est du Jourdain ne faisait pas partie du territoire alloué primitivement à Israël (Nb 34.12).
  - type: text
    content: .
  '19':
  - type: text
    content: Du côté du Néguev, au sud, la frontière ira de Tamar jusqu’aux eaux de Meriba de Qadesh, puis longera le torrent d’Egypte
  - type: note
    content: 'Qadesh: voir Nb 34.4. Le torrent d’Egypte: sans doute le Wadi el-Arich qui se jette dans la Méditerranée à quelque 80 kilomètres au sud de Gaza.'
  - type: text
    content: ' jusqu’à la mer Méditerranée. Telle sera la limite du côté sud vers le Néguev. '
  '2':
  - type: text
    content: L’individu me fit sortir par la porte nord et m’en fit contourner l’extérieur jusqu’à la porte extérieure orientale. Je vis l’eau sourdre du côté droit de cette porte.
  '20':
  - type: text
    content: Et du côté ouest, elle sera marquée par la mer Méditerranée, depuis la frontière sud jusqu’en face de Lebo-Hamath. Telle sera la limite occidentale.
  - type: heading
    content: Le partage entre les tribus
  '21':
  - type: text
    content: 'Vous vous partagerez ce pays entre les tribus d’Israël. '
  '22':
  - type: text
    content: 'Vous le répartirez en tirant au sort les parts de patrimoine pour vous et pour les étrangers qui résident au milieu de vous et qui ont eu là des enfants. Vous les traiterez comme les Israélites de souche, ils tireront leurs parts au sort avec vous, au milieu des tribus d’Israël. '
  '23':
  - type: text
    content: C’est dans la tribu même où l’étranger est installé que vous lui donnerez son patrimoine, le Seigneur, l’Eternel, le déclare.
  '3':
  - type: text
    content: 'L’individu s’éloigna vers l’est, un cordeau à la main. Il mesura mille coudées en aval et me fit traverser l’eau ; elle m’arrivait jusqu’aux chevilles. '
  '4':
  - type: text
    content: 'Il mesura encore mille coudées et me fit de nouveau traverser : l’eau me venait jusqu’aux genoux. Il mesura encore mille coudées et me fit traverser : l’eau me venait jusqu’à la taille. '
  '5':
  - type: text
    content: 'Il mesura encore mille coudées : maintenant c’était un torrent que je ne pouvais plus franchir, car l’eau était si profonde qu’il fallait nager. On ne pouvait plus le traverser autrement. '
  '6':
  - type: text
    content: 'Il me dit : Fils d’homme, as-tu vu ?'
  - type: text
    content: 'Puis il me ramena sur le bord du torrent. '
  '7':
  - type: text
    content: 'Lorsque j’y fus revenu, j’aperçus, sur les deux rives, des arbres en très grand nombre. '
  '8':
  - type: text
    content: 'Le personnage me dit : Ces eaux s’écoulent vers la région est du pays, elles descendent dans la plaine du Jourdain et se jetteront dans la mer Morte. Quand elles se déverseront dans la mer, celle-ci sera assainie. '
  '9':
  - type: text
    content: Partout où passera le double torrent, les animaux foisonneront et pourront vivre, et il y aura beaucoup de poissons, car ces eaux viendront assainir la mer, et la vie se développera sur tout le passage du torrent
  - type: note
    content: Dans l’état actuel, aucun poisson ne peut vivre dans la mer Morte.
  - type: text
    content: '. '
