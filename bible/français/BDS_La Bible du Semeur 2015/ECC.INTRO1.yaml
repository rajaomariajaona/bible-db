  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le titre du livre, l’Ecclésiaste, signifie « celui qui participe à une assemblée ». C’est par ce mot, transcrit en français, que l’ancienne version grecque a traduit le nom hébreu Qohéleth, qui désigne le personnage qui s’exprime dans le livre. Le terme hébreu, qui ressemble à un titre d’homme exerçant une fonction particulière, est énigmatique, et peut-être est-ce voulu. Il est porté par un « Maître » de sagesse (1.2, 12), dont l’activité est décrite en 12.9-12. L’identité de ce Maître n’est pas moins mystérieuse. Plusieurs indices pointent vers Salomon. « Fils de David », il est « roi à Jérusalem » (1.1), il jouit d’une grande sagesse (1.16), et ce qu’il dit de sa vie rappelle celle de Salomon (chap. 2). Pourtant, le nom de Salomon n’est jamais prononcé, comme pour suggérer qu’il ne s’agit pas de lui. Par ailleurs, le roi Salomon n’a eu qu’un seul prédécesseur israélite à Jérusalem (1.16). En réalité, le livre n’est jamais attribué à Salomon, contrairement au Cantique des Cantiques et aux Proverbes, et il ne parle du Qohéleth qu’à la troisième personne (1.12 ; 7.27 ; 12.8-10). Le Qohéleth pourrait être une création de l’auteur, sur le modèle de Salomon, un personnage idéal dans la bouche duquel l’auteur aurait placé son message.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Certaines omissions sont également frappantes. Le Qohéleth n’appelle jamais Dieu de son nom de Suzerain de l’alliance avec Israël : l’Eternel. Il renvoie au Créateur (12.1). Hormis 1.12, il ne mentionne jamais Israël, et la seule référence possible à la Loi est l’appel à observer les « commandements » de Dieu, en 12.13. Il déclare, tel un refrain : « J’ai constaté… J’ai vu… » ; son examen vise ce qui se passe « sous le soleil ». Fidèle à l’alliance dans son esprit, le livre se veut universel dans son message. La sagesse de « Salomon » quitte les frontières d’Israël pour s’adresser à toute créature, mais sa « clé » demeure inchangée : « Crains Dieu » (12.13 ; voir Pr 1.7).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dès le début, le Maître résume son message : « Dérisoire, absolument dérisoire, tout est dérisoire », vain, décevant, déplorable (1.2 ; 12.8). Tout est fragile et passager. La vie de l’homme est marquée par la mort, et même dans sa quête la plus noble, celle de la sagesse, l’être humain ne découvre que son malheur et ses limites (1.16-18 ; 3.11 ; 8.16-17). D’où la réputation de pessimiste du Qohéleth. D’autres voient en lui un critique, sceptique ou même cynique : il chercherait essentiellement à détruire les fausses sécurités de la Tradition en s’attaquant en particulier à l’idée que le bien est récompensé et le mal puni (7.15 ; 8.14). Selon d’autres encore, la démarche du Maître se ferait en deux temps : ayant démontré l’inutilité de toute sagesse purement terrestre, il inviterait les hommes à trouver le bonheur en Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Réaliste, le Qohéleth ne cultive pas le pessimisme. N’invite-t-il pas à « jouir du bonheur », à s’adonner à la joie et à entreprendre (2.24 ; 8.15 ; 9.7-9 ; 9.10 ; 11.1) ? Son message est radical, certes, mais sa critique est tout en nuances, elle penche du côté de la « Tradition » : le bonheur est pour ceux qui craignent Dieu, le méchant ne réussira pas (8.12-13), il y aura un jugement (3.17 ; 12.13). Il est vrai que le livre dénonce l’illusion d’une sagesse purement humaine, mais le Maître porte un regard unique sur la réalité : celui du croyant. Il en assume le « négatif » : il reconnaît qu’à cause de la chute (7.29 ; voir Gn 3), comme le rappellera l’apôtre Paul, la création « a été soumise au pouvoir de la fragilité » – à une condition dérisoire, au pouvoir de la mort (Rm 8.20). Elle est devenue ainsi comme opaque à la sagesse humaine. Mais dans sa générosité, Dieu répand sa bonté sur les hommes : le bonheur consiste à tout recevoir de sa main dans l’humilité de la foi (2.24 ; 3.14 ; 5.18  ; etc.).'
