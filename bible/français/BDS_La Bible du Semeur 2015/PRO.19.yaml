document_id: PRO.19,21
type_code: fra
verses:
  '1':
  - type: text
    content: Mieux vaut un pauvre qui se conduit de façon intègre
  - type: text
    content: qu’un homme aux paroles tordues, car celui-ci est un insensé.
  '10':
  - type: text
    content: Il ne convient pas qu’un insensé mène une vie de plaisirs,
  - type: text
    content: et moins encore qu’un esclave commande aux princes.
  '11':
  - type: text
    content: La raison de l’homme lui fait retenir sa colère,
  - type: text
    content: et sa gloire c’est de passer par-dessus l’offense.
  '12':
  - type: text
    content: La colère du roi est pareille au rugissement d’un jeune lion,
  - type: text
    content: mais sa faveur est comme la rosée sur l’herbe.
  '13':
  - type: text
    content: Un fils insensé fait le malheur de son père,
  - type: text
    content: et les récriminations d’une femme sont comme une gouttière qui ne cesse de couler.
  '14':
  - type: text
    content: Un homme peut hériter maison et richesse de ses pères,
  - type: text
    content: mais seul l’Eternel peut lui donner une femme intelligente.
  '15':
  - type: text
    content: La paresse plonge dans la torpeur,
  - type: text
    content: et l’indolent souffrira de la faim.
  '16':
  - type: text
    content: Suivre les préceptes, c’est veiller sur sa propre vie ;
  - type: text
    content: ne pas veiller sur sa conduite, conduit à la mort.
  '17':
  - type: text
    content: Qui a pitié du pauvre, prête à l’Eternel
  - type: text
    content: qui le lui revaudra.
  '18':
  - type: text
    content: Corrige ton fils tant qu’il y a encore
  - type: note
    content: 'Autre traduction : ton fils car il y a…'
  - type: text
    content: ' de l’espoir,'
  - type: text
    content: mais ne va pas jusqu’à désirer sa mort.
  '19':
  - type: text
    content: L’homme qui se met dans une grande colère paiera une amende,
  - type: text
    content: si tu l’en exemptes, tu l’incites à recommencer
  - type: note
    content: 'Autres traductions : tu pourras recommencer ou tu aggraves encore son cas.'
  - type: text
    content: .
  '2':
  - type: text
    content: Dans un désir irréfléchi, il n’y a rien de bon
  - type: text
    content: et précipiter ses pas fait commettre une faute.
  '20':
  - type: text
    content: Ecoute les conseils et accepte d’être repris et, finalement, tu deviendras sage.
  '21':
  - type: text
    content: Un homme forme de nombreux projets,
  - type: text
    content: mais c’est le dessein de l’Eternel qui se réalise.
  '22':
  - type: text
    content: Ce qu’on apprécie chez un homme, c’est sa bonté,
  - type: text
    content: et mieux vaut un pauvre qu’un menteur.
  '23':
  - type: text
    content: Craindre l’Eternel mène à la vie
  - type: note
    content: Voir 10.27.
  - type: text
    content: ','
  - type: text
    content: et, comblé, on passe même la nuit à l’abri du malheur.
  '24':
  - type: text
    content: Le paresseux plonge sa main dans le plat
  - type: note
    content: On portait sa main dans le plat commun pour y prendre le morceau qu’on désirait (Rt 2.14 ; Mt 26.23).
  - type: text
    content: ','
  - type: text
    content: mais il ne la ramène pas à sa bouche.
  '25':
  - type: text
    content: Punis le moqueur, et celui qui est inexpérimenté acquerra de l’intelligence,
  - type: text
    content: 'mais reprends simplement l’homme intelligent : il comprendra la leçon.'
  '26':
  - type: text
    content: Qui maltraite son père et chasse sa mère
  - type: text
    content: est un fils qui se couvre de honte et d’opprobre.
  '27':
  - type: text
    content: Mon fils, si tu cesses d’écouter l’instruction,
  - type: text
    content: tu te détourneras des paroles de la connaissance.
  '28':
  - type: text
    content: Qui se moque du droit est un témoin qui ne vaut rien ;
  - type: text
    content: la bouche des méchants avale le mal.
  '29':
  - type: text
    content: Les condamnations sont prêtes pour les moqueurs,
  - type: text
    content: et les coups de bâton pour l’échine des insensés.
  '3':
  - type: text
    content: La sottise d’un homme cause son naufrage,
  - type: text
    content: alors il s’en prend à l’Eternel.
  '4':
  - type: text
    content: Si vous êtes riche, vos amis se multiplient,
  - type: text
    content: mais le pauvre est abandonné par son compagnon.
  '5':
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: qui répand le mensonge n’échappera pas au châtiment.
  '6':
  - type: text
    content: Beaucoup briguent la faveur d’un homme important,
  - type: text
    content: et tous sont amis de qui fait des cadeaux.
  '7':
  - type: text
    content: Le pauvre est détesté par tous ses frères,
  - type: text
    content: à plus forte raison ses compagnons s’écartent-ils de lui.
  - type: text
    content: 'En vain il les poursuit de ses paroles : ils ne sont déjà plus là.'
  '8':
  - type: text
    content: Acquérir du bon sens, c’est s’aimer soi-même,
  - type: text
    content: cultiver le discernement fera trouver le bonheur.
  '9':
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: qui profère le mensonge périra.
