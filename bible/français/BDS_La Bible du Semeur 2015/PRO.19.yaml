document_id: PRO.19
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mieux vaut un pauvre qui se conduit de façon intègre
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’un homme aux paroles tordues, car celui-ci est un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dans un désir irréfléchi, il n’y a rien de bon
- type: usfm
  marker: q1
  children:
  - type: text
    text: et précipiter ses pas fait commettre une faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La sottise d’un homme cause son naufrage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors il s’en prend à l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si vous êtes riche, vos amis se multiplient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le pauvre est abandonné par son compagnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui répand le mensonge n’échappera pas au châtiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Beaucoup briguent la faveur d’un homme important,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous sont amis de qui fait des cadeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le pauvre est détesté par tous ses frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à plus forte raison ses compagnons s’écartent-ils de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En vain il les poursuit de ses paroles : ils ne sont déjà plus là.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Acquérir du bon sens, c’est s’aimer soi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cultiver le discernement fera trouver le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui profère le mensonge périra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne convient pas qu’un insensé mène une vie de plaisirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et moins encore qu’un esclave commande aux princes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La raison de l’homme lui fait retenir sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa gloire c’est de passer par-dessus l’offense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La colère du roi est pareille au rugissement d’un jeune lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais sa faveur est comme la rosée sur l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Un fils insensé fait le malheur de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les récriminations d’une femme sont comme une gouttière qui ne cesse de couler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un homme peut hériter maison et richesse de ses pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais seul l’Eternel peut lui donner une femme intelligente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La paresse plonge dans la torpeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’indolent souffrira de la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Suivre les préceptes, c’est veiller sur sa propre vie ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne pas veiller sur sa conduite, conduit à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qui a pitié du pauvre, prête à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui le lui revaudra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Corrige ton fils tant qu’il y a encore
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton fils car il y a…
    marker-yv: yv-n
  - type: text
    text: ' de l’espoir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ne va pas jusqu’à désirer sa mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’homme qui se met dans une grande colère paiera une amende,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu l’en exemptes, tu l’incites à recommencer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu pourras recommencer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu aggraves encore son cas.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ecoute les conseils et accepte d’être repris et, finalement, tu deviendras sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Un homme forme de nombreux projets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c’est le dessein de l’Eternel qui se réalise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ce qu’on apprécie chez un homme, c’est sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mieux vaut un pauvre qu’un menteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Craindre l’Eternel mène à la vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.27'
        metadata:
          usfm: PRO.10.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comblé, on passe même la nuit à l’abri du malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le paresseux plonge sa main dans le plat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On portait sa main dans le plat commun pour y prendre le morceau qu’on désirait (Rt 2.14 ; Mt 26.23).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne la ramène pas à sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Punis le moqueur, et celui qui est inexpérimenté acquerra de l’intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais reprends simplement l’homme intelligent : il comprendra la leçon.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Qui maltraite son père et chasse sa mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: est un fils qui se couvre de honte et d’opprobre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mon fils, si tu cesses d’écouter l’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu te détourneras des paroles de la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Qui se moque du droit est un témoin qui ne vaut rien ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la bouche des méchants avale le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les condamnations sont prêtes pour les moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les coups de bâton pour l’échine des insensés.
