document_id: 2CO.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La collecte en faveur des chrétiens de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’exemple des Eglises de Macédoine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous voulons vous faire connaître, frères et sœurs, la grâce que Dieu a accordée aux Eglises de Macédoine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est donc un simple avis que je vous donne et c’est ce qui vous convient : en effet, n’avez-vous pas été les premiers, dès l’an dernier, non seulement à agir, mais à prendre l’initiative de ce projet ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achevez donc à présent de le réaliser ; menez-le à terme, selon vos moyens, avec le même empressement que vous avez mis à le décider. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’on donne de bon cœur, Dieu accepte ce don, en tenant compte de ce que l’on a, et non de ce que l’on n’a pas.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’est pas question de vous réduire vous-mêmes à l’extrémité pour que d’autres soient soulagés, il s’agit simplement de suivre le principe de l’égalité. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la circonstance présente, par votre superflu, vous pouvez venir en aide à ceux qui sont dans le besoin. Aussi, par leur superflu, ils pourront un jour subvenir à vos besoins. Ainsi s’établit l’égalité, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'suivant cette parole de l’Ecriture :'
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui en avait ramassé beaucoup n’en avait pas de trop, et celui qui en avait ramassé peu n’en manquait pas
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 16.18
        - type: text
          text: ' , où il s’agissait de la manne.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les personnes chargées de la collecte
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je remercie Dieu d’avoir inspiré à Tite autant d’empressement pour vous que j’en ai moi-même. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Non seulement il a accepté ma proposition de se rendre chez vous, mais il avait déjà décidé, avec un très grand empressement, de se rendre lui-même chez vous.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous envoyons avec lui le frère qui est apprécié dans toutes les Eglises pour son travail au service de l’Evangile. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a, de plus, été désigné par les Eglises
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’apôtre utilise ici, comme dans '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 14.23
        - type: text
          text: ', le terme technique pour les élections à main levée en usage dans la démocratie athénienne.'
      marker-yv: yv-n
    - type: text
      text: ' pour être notre compagnon dans le voyage que nous entreprenons pour accomplir cette œuvre de générosité. C’est pour la gloire du Seigneur lui-même et pour manifester notre souci pour les autres que nous accomplissons ce service. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles ont été mises à l’épreuve par de multiples détresses, mais les croyants, animés d’une joie débordante et malgré leur extrême pauvreté, ont fait preuve d’une très grande générosité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous tenons à éviter toute critique quant à notre manière de nous occuper de ces sommes importantes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, nous avons à cœur d’avoir une conduite irréprochable, non seulement devant le Seigneur, mais aussi devant les hommes.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avec eux, nous envoyons encore ce troisième frère, dont nous avons eu bien des fois l’occasion d’apprécier le dévouement. Dans le cas présent, son empressement est d’autant plus vif qu’il a une pleine confiance en vous.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, je vous recommande Tite comme mon compagnon et mon collaborateur auprès de vous, nos frères comme les délégués des Eglises, des hommes qui font honneur à Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donnez-leur donc la preuve, et par eux, à toutes les Eglises, que votre amour n’est pas un vain mot et que c’est à juste titre que nous nous sommes montrés fiers de vous devant eux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont allés jusqu’à la limite de leurs moyens, et même au-delà, j’en suis témoin ; spontanément '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et avec une vive insistance, ils nous ont demandé la faveur de prendre part à l’assistance destinée à ceux qui, à Jérusalem, font partie du peuple saint. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dépassant toutes nos espérances, ils se sont tout d’abord donnés eux-mêmes au Seigneur et ensuite, conformément à la volonté de Dieu, ils se sont mis à notre disposition.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi avons-nous encouragé Tite à mener à bonne fin chez vous cette œuvre de générosité qu’il avait si bien mise en train. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous êtes riches dans tous les domaines, qu’il s’agisse de la foi, de la parole ou de la connaissance, du zèle en toutes choses ou de l’amour qui, de notre cœur, a gagné le vôtre ; cherchez donc aussi à exceller dans cette œuvre de générosité.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce n’est pas un ordre que je vous donne, mais en mentionnant le zèle que d’autres ont déployé, je cherche à éprouver l’authenticité de votre amour.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car vous savez comment notre Seigneur Jésus-Christ a manifesté sa grâce envers nous : lui qui était riche, il s’est fait pauvre pour vous afin que par sa pauvreté vous soyez enrichis.'
