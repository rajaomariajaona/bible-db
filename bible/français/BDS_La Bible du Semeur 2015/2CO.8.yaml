document_id: 2CO.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La collecte en faveur des chrétiens de Jérusalem
  - type: heading
    content: L’exemple des Eglises de Macédoine
  - type: text
    content: 'Nous voulons vous faire connaître, frères et sœurs, la grâce que Dieu a accordée aux Eglises de Macédoine. '
  '10':
  - type: text
    content: 'C’est donc un simple avis que je vous donne et c’est ce qui vous convient : en effet, n’avez-vous pas été les premiers, dès l’an dernier, non seulement à agir, mais à prendre l’initiative de ce projet ? '
  '11':
  - type: text
    content: 'Achevez donc à présent de le réaliser ; menez-le à terme, selon vos moyens, avec le même empressement que vous avez mis à le décider. '
  '12':
  - type: text
    content: Lorsqu’on donne de bon cœur, Dieu accepte ce don, en tenant compte de ce que l’on a, et non de ce que l’on n’a pas.
  '13':
  - type: text
    content: 'Il n’est pas question de vous réduire vous-mêmes à l’extrémité pour que d’autres soient soulagés, il s’agit simplement de suivre le principe de l’égalité. '
  '14':
  - type: text
    content: 'Dans la circonstance présente, par votre superflu, vous pouvez venir en aide à ceux qui sont dans le besoin. Aussi, par leur superflu, ils pourront un jour subvenir à vos besoins. Ainsi s’établit l’égalité, '
  '15':
  - type: text
    content: 'suivant cette parole de l’Ecriture :'
  - type: text
    content: Celui qui en avait ramassé beaucoup n’en avait pas de trop, et celui qui en avait ramassé peu n’en manquait pas
  - type: text
    content: ' '
  - type: note
    content: Ex 16.18 , où il s’agissait de la manne.
  - type: text
    content: .
  - type: heading
    content: Les personnes chargées de la collecte
  '16':
  - type: text
    content: 'Je remercie Dieu d’avoir inspiré à Tite autant d’empressement pour vous que j’en ai moi-même. '
  '17':
  - type: text
    content: Non seulement il a accepté ma proposition de se rendre chez vous, mais il avait déjà décidé, avec un très grand empressement, de se rendre lui-même chez vous.
  '18':
  - type: text
    content: 'Nous envoyons avec lui le frère qui est apprécié dans toutes les Eglises pour son travail au service de l’Evangile. '
  '19':
  - type: text
    content: Il a, de plus, été désigné par les Eglises
  - type: note
    content: L’apôtre utilise ici, comme dans Ac 14.23, le terme technique pour les élections à main levée en usage dans la démocratie athénienne.
  - type: text
    content: ' pour être notre compagnon dans le voyage que nous entreprenons pour accomplir cette œuvre de générosité. C’est pour la gloire du Seigneur lui-même et pour manifester notre souci pour les autres que nous accomplissons ce service. '
  '2':
  - type: text
    content: 'Elles ont été mises à l’épreuve par de multiples détresses, mais les croyants, animés d’une joie débordante et malgré leur extrême pauvreté, ont fait preuve d’une très grande générosité. '
  '20':
  - type: text
    content: 'Nous tenons à éviter toute critique quant à notre manière de nous occuper de ces sommes importantes. '
  '21':
  - type: text
    content: En effet, nous avons à cœur d’avoir une conduite irréprochable, non seulement devant le Seigneur, mais aussi devant les hommes.
  '22':
  - type: text
    content: Avec eux, nous envoyons encore ce troisième frère, dont nous avons eu bien des fois l’occasion d’apprécier le dévouement. Dans le cas présent, son empressement est d’autant plus vif qu’il a une pleine confiance en vous.
  '23':
  - type: text
    content: 'Ainsi, je vous recommande Tite comme mon compagnon et mon collaborateur auprès de vous, nos frères comme les délégués des Eglises, des hommes qui font honneur à Christ. '
  '24':
  - type: text
    content: Donnez-leur donc la preuve, et par eux, à toutes les Eglises, que votre amour n’est pas un vain mot et que c’est à juste titre que nous nous sommes montrés fiers de vous devant eux.
  '3':
  - type: text
    content: 'Ils sont allés jusqu’à la limite de leurs moyens, et même au-delà, j’en suis témoin ; spontanément '
  '4':
  - type: text
    content: 'et avec une vive insistance, ils nous ont demandé la faveur de prendre part à l’assistance destinée à ceux qui, à Jérusalem, font partie du peuple saint. '
  '5':
  - type: text
    content: Dépassant toutes nos espérances, ils se sont tout d’abord donnés eux-mêmes au Seigneur et ensuite, conformément à la volonté de Dieu, ils se sont mis à notre disposition.
  '6':
  - type: text
    content: 'Aussi avons-nous encouragé Tite à mener à bonne fin chez vous cette œuvre de générosité qu’il avait si bien mise en train. '
  '7':
  - type: text
    content: Vous êtes riches dans tous les domaines, qu’il s’agisse de la foi, de la parole ou de la connaissance, du zèle en toutes choses ou de l’amour qui, de notre cœur, a gagné le vôtre ; cherchez donc aussi à exceller dans cette œuvre de générosité.
  '8':
  - type: text
    content: Ce n’est pas un ordre que je vous donne, mais en mentionnant le zèle que d’autres ont déployé, je cherche à éprouver l’authenticité de votre amour.
  '9':
  - type: text
    content: 'Car vous savez comment notre Seigneur Jésus-Christ a manifesté sa grâce envers nous : lui qui était riche, il s’est fait pauvre pour vous afin que par sa pauvreté vous soyez enrichis.'
