document_id: 2CH.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abiya règne sur Juda
  - type: heading
    content: (1 R 15.1-2,  6)
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, Abiya devint roi de Juda. '
  '10':
  - type: text
    content: 'Quant à nous, c’est l’Eternel qui est notre Dieu : nous ne l’avons pas abandonné ; nos prêtres qui servent l’Eternel sont des descendants d’Aaron et ce sont les lévites qui les assistent. '
  '11':
  - type: text
    content: Chaque matin et chaque soir, nous offrons des holocaustes à l’Eternel, nous faisons fumer des parfums aromatiques, nous disposons sur la table rituellement pure les pains qui doivent être exposés devant l’Eternel
  - type: note
    content: Voir Lv 24.5-9.
  - type: text
    content: ', et chaque soir nous allumons les lampes du chandelier d’or. Nous suivons le rituel prescrit par l’Eternel notre Dieu, alors que vous, vous l’avez abandonné. '
  '12':
  - type: text
    content: 'Réfléchissez : Dieu est avec nous, il est notre chef, ses prêtres sont munis des trompettes'
  - type: note
    content: Voir Nb 10.9.
  - type: text
    content: ' retentissantes, prêts à en sonner contre vous. Israélites ! Ne combattez pas contre l’Eternel, le Dieu de vos ancêtres, car vous ne réussirez pas dans cette entreprise !'
  '13':
  - type: text
    content: 'Jéroboam fit exécuter un mouvement tournant à une partie de ses troupes pour prendre les Judéens à revers ; le gros de ses troupes faisait face à celles de Juda, alors que les hommes embusqués se trouvaient derrière eux. '
  '14':
  - type: text
    content: 'Les troupes de Juda se virent donc attaquées à la fois par-devant et par-derrière. Alors les Judéens poussèrent des cris pour implorer l’Eternel et les prêtres sonnèrent des trompettes. '
  '15':
  - type: text
    content: 'En même temps, ils poussèrent le cri de guerre. Au bruit de la clameur des hommes de Juda, l’Eternel battit Jéroboam et toute l’armée d’Israël et les fit succomber devant Abiya et les Judéens. '
  '16':
  - type: text
    content: 'Les hommes d’Israël s’enfuirent devant Juda, et Dieu donna aux Judéens la victoire sur eux. '
  '17':
  - type: text
    content: 'Abiya et son armée leur infligèrent une grande défaite : cinq cent mille de leurs soldats d’élite tombèrent transpercés. '
  '18':
  - type: text
    content: Ce fut un jour d’humiliation pour ceux d’Israël, tandis que les Judéens remportèrent la victoire parce qu’ils s’étaient appuyés sur l’Eternel, le Dieu de leurs ancêtres.
  '19':
  - type: text
    content: 'Abiya poursuivit Jéroboam et lui enleva plusieurs villes : Béthel, Yeshana et Ephrôn, avec toutes les localités qui en dépendaient. '
  '2':
  - type: text
    content: Il régna trois ans à Jérusalem
  - type: note
    content: De 913 à 910 av. J.-C.
  - type: text
    content: . Sa mère s’appelait Mikaya, elle était fille d’Ouriel, de Guibéa. Bientôt, il y eut guerre entre Abiya et Jéroboam.
  '20':
  - type: text
    content: 'Pendant tout le règne d’Abiya, Jéroboam ne retrouva pas sa puissance ; finalement l’Eternel le frappa et il mourut. '
  '21':
  - type: text
    content: Au contraire, Abiya vit s’accroître sa puissance. Il épousa quatorze femmes et eut vingt-deux fils et seize filles.
  - type: heading
    content: (1 R 15.7-8)
  '22':
  - type: text
    content: Les autres faits et gestes d’Abiya, sa conduite, ainsi que ses discours, sont cités dans le livre des Mémoires du prophète Iddo.
  '23':
  - type: text
    content: Quand il rejoignit ses ancêtres décédés, on l’enterra dans la Cité de David, et son fils Asa lui succéda sur le trône
  - type: note
    content: Asa régna de 910 à 869 av. J.-C.
  - type: text
    content: .
  - type: heading
    content: Le début du règne d’Asa en Juda
  - type: text
    content: Sous le règne de ce dernier, le pays connut dix ans de paix.
  '3':
  - type: text
    content: 'Abiya engagea le combat avec une armée de quatre cent mille guerriers valeureux, des soldats d’élite. Jéroboam lui opposa une armée de huit cent mille guerriers valeureux, des soldats d’élite. '
  '4':
  - type: text
    content: Abiya se tint debout sur le mont Tsemaraïm, situé dans la région montagneuse d’Ephraïm
  - type: note
    content: A une trentaine de kilomètres au nord de Jérusalem (voir Jos 18.22 qui parle d’une ville de ce nom).
  - type: text
    content: ', et se mit à crier : Jéroboam et tout Israël, écoutez-moi ! '
  '5':
  - type: text
    content: Ne devriez-vous pas reconnaître que l’Eternel, le Dieu d’Israël, a donné pour toujours la royauté sur Israël à David et à ses descendants en vertu d’une alliance irrévocable
  - type: note
    content: Voir Nb 18.19 et la note.
  - type: text
    content: '  ? '
  '6':
  - type: text
    content: 'Mais Jéroboam, fils de Nebath, un serviteur de Salomon, fils de David, s’est révolté contre son maître. '
  '7':
  - type: text
    content: 'Des gens sans scrupules, des vauriens se sont groupés autour de lui et se sont opposés à Roboam, le fils de Salomon. Celui-ci était jeune et inexpérimenté, et il n’a pas pu leur résister. '
  '8':
  - type: text
    content: Et maintenant, croyez-vous que vous allez résister au pouvoir royal de l’Eternel qu’il a confié aux descendants de David ? Vous êtes une multitude nombreuse et vous avez avec vous les veaux d’or que Jéroboam a fabriqués pour vous servir de dieux
  - type: note
    content: Voir 1 R 12.26-33.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Mais vous avez chassé les prêtres de l’Eternel, les descendants d’Aaron, et les lévites, et vous vous êtes pris des prêtres comme le font les autres peuples ! Il suffit chez vous de se présenter avec un jeune taureau et sept béliers pour être investi du sacerdoce au service de dieux qui n’en sont pas. '
