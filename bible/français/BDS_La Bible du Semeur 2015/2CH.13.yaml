document_id: 2CH.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abiya règne sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 15.1-2,  6)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La dix-huitième année du règne de Jéroboam, Abiya devint roi de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quant à nous, c’est l’Eternel qui est notre Dieu : nous ne l’avons pas abandonné ; nos prêtres qui servent l’Eternel sont des descendants d’Aaron et ce sont les lévites qui les assistent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Chaque matin et chaque soir, nous offrons des holocaustes à l’Eternel, nous faisons fumer des parfums aromatiques, nous disposons sur la table rituellement pure les pains qui doivent être exposés devant l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 24.5-9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et chaque soir nous allumons les lampes du chandelier d’or. Nous suivons le rituel prescrit par l’Eternel notre Dieu, alors que vous, vous l’avez abandonné. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Réfléchissez : Dieu est avec nous, il est notre chef, ses prêtres sont munis des trompettes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 10.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' retentissantes, prêts à en sonner contre vous. Israélites ! Ne combattez pas contre l’Eternel, le Dieu de vos ancêtres, car vous ne réussirez pas dans cette entreprise !'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jéroboam fit exécuter un mouvement tournant à une partie de ses troupes pour prendre les Judéens à revers ; le gros de ses troupes faisait face à celles de Juda, alors que les hommes embusqués se trouvaient derrière eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les troupes de Juda se virent donc attaquées à la fois par-devant et par-derrière. Alors les Judéens poussèrent des cris pour implorer l’Eternel et les prêtres sonnèrent des trompettes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'En même temps, ils poussèrent le cri de guerre. Au bruit de la clameur des hommes de Juda, l’Eternel battit Jéroboam et toute l’armée d’Israël et les fit succomber devant Abiya et les Judéens. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les hommes d’Israël s’enfuirent devant Juda, et Dieu donna aux Judéens la victoire sur eux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Abiya et son armée leur infligèrent une grande défaite : cinq cent mille de leurs soldats d’élite tombèrent transpercés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ce fut un jour d’humiliation pour ceux d’Israël, tandis que les Judéens remportèrent la victoire parce qu’ils s’étaient appuyés sur l’Eternel, le Dieu de leurs ancêtres.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Abiya poursuivit Jéroboam et lui enleva plusieurs villes : Béthel, Yeshana et Ephrôn, avec toutes les localités qui en dépendaient. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il régna trois ans à Jérusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 913 à 910 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: . Sa mère s’appelait Mikaya, elle était fille d’Ouriel, de Guibéa. Bientôt, il y eut guerre entre Abiya et Jéroboam.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Pendant tout le règne d’Abiya, Jéroboam ne retrouva pas sa puissance ; finalement l’Eternel le frappa et il mourut. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Au contraire, Abiya vit s’accroître sa puissance. Il épousa quatorze femmes et eut vingt-deux fils et seize filles.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 R 15.7-8)
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les autres faits et gestes d’Abiya, sa conduite, ainsi que ses discours, sont cités dans le livre des Mémoires du prophète Iddo.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quand il rejoignit ses ancêtres décédés, on l’enterra dans la Cité de David, et son fils Asa lui succéda sur le trône
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Asa régna de 910 à 869 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le début du règne d’Asa en Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sous le règne de ce dernier, le pays connut dix ans de paix.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Abiya engagea le combat avec une armée de quatre cent mille guerriers valeureux, des soldats d’élite. Jéroboam lui opposa une armée de huit cent mille guerriers valeureux, des soldats d’élite. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Abiya se tint debout sur le mont Tsemaraïm, situé dans la région montagneuse d’Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A une trentaine de kilomètres au nord de Jérusalem (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 18.22
        - type: text
          text: ' qui parle d’une ville de ce nom).'
      marker-yv: yv-n
    - type: text
      text: ', et se mit à crier : Jéroboam et tout Israël, écoutez-moi ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ne devriez-vous pas reconnaître que l’Eternel, le Dieu d’Israël, a donné pour toujours la royauté sur Israël à David et à ses descendants en vertu d’une alliance irrévocable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 18.19
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: '  ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais Jéroboam, fils de Nebath, un serviteur de Salomon, fils de David, s’est révolté contre son maître. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Des gens sans scrupules, des vauriens se sont groupés autour de lui et se sont opposés à Roboam, le fils de Salomon. Celui-ci était jeune et inexpérimenté, et il n’a pas pu leur résister. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Et maintenant, croyez-vous que vous allez résister au pouvoir royal de l’Eternel qu’il a confié aux descendants de David ? Vous êtes une multitude nombreuse et vous avez avec vous les veaux d’or que Jéroboam a fabriqués pour vous servir de dieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 12.26-33
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais vous avez chassé les prêtres de l’Eternel, les descendants d’Aaron, et les lévites, et vous vous êtes pris des prêtres comme le font les autres peuples ! Il suffit chez vous de se présenter avec un jeune taureau et sept béliers pour être investi du sacerdoce au service de dieux qui n’en sont pas. '
