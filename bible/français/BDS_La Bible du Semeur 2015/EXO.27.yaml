document_id: EXO.27,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tu feras l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’autel des holocaustes (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 4.7
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' en bois d’acacia. Sa base formera un carré de deux mètres cinquante de côté et il aura un mètre cinquante de hauteur. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elles seront soutenues par vingt piliers reposant sur vingt socles de bronze ; ces piliers seront munis de crochets et de tringles d’argent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Sur le côté nord, il y aura également cinquante mètres de tentures soutenues par vingt piliers reposant sur vingt socles de bronze ; ces piliers seront munis de crochets et de tringles d’argent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sur la largeur du parvis, à l’ouest, sur vingt-cinq mètres, des tentures seront soutenues par dix piliers reposant sur dix socles. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Du côté est, le parvis aura également vingt-cinq mètres de largeur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'De chaque côté de la porte, il y aura, sur sept mètres cinquante, des tentures soutenues par trois piliers reposant sur trois socles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'La porte du parvis sera constituée par un rideau de dix mètres de long. Il sera fait de fils de pourpre violette et écarlate, de rouge éclatant et de fin lin retors en ouvrage brodé. Il sera soutenu par quatre piliers reposant sur leurs quatre socles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tous les piliers délimitant le parvis seront reliés par des tringles d’argent munies de crochets d’argent ; leurs socles seront en bronze. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le parvis aura cinquante mètres de long et vingt-cinq mètres de large, la hauteur de l’enceinte de fin lin retors sera de deux mètres cinquante. Les socles seront en bronze, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: de même que tous les ustensiles destinés au service du tabernacle, et tous les piquets du tabernacle et tous ceux du parvis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’entretien du chandelier
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A ses quatre angles, tu feras quatre cornes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La corne symbolisait la puissance. Le prêtre enduisait les cornes de l’autel avec le sang des victimes (Lv 4.7, 18, 25, 30, 34 ; 8.15 ; 9.9 ; 16.18 ; Ps 118.27).
      marker-yv: yv-n
    - type: text
      text: ' en saillie de l’autel ; tu le plaqueras de bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Toi, tu ordonneras aux Israélites de te prendre de l’huile raffinée d’olives concassées pour alimenter en permanence les lampes du chandelier. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aaron et ses fils arrangeront ces lampes dans la tente de la Rencontre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Appelée aussi, selon les versions, tente de la réunion ou d’assignation. Il s’agit de la rencontre de Dieu avec Moïse (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 33.7-11
        - type: text
          text: ), avec les prêtres qui venaient le consulter ou, à certaines occasions, avec tout le peuple convoqué (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 29.42-43
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' devant le voile qui cache le coffre de l’acte de l’alliance, pour qu’elles brûlent du soir au matin devant l’Eternel. C’est une loi en vigueur à perpétuité pour les Israélites dans toutes les générations.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu fabriqueras des récipients destinés à recueillir les cendres grasses, des pelles, des bassines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour recueillir le sang des victimes immolées devant l’autel afin d’en faire l’aspersion sur la base de l’autel.
      marker-yv: yv-n
    - type: text
      text: ', des fourchettes et des brasiers'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour transporter des braises de l’autel des holocaustes à l’autel de l’encens (des parfums) à l’intérieur du lieu saint (Lv 10.1 ; 16.12-13).
      marker-yv: yv-n
    - type: text
      text: '. Tous ces ustensiles seront en bronze. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu muniras l’autel d’une grille faite d’un treillis de bronze ; tu y fixeras quatre anneaux de bronze aux quatre coins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu le placeras sous la bordure de l’autel, depuis le bas jusqu’à mi-hauteur de l’autel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu lui feras des barres en bois d’acacia et tu les recouvriras de bronze. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'On introduira ces barres dans les anneaux sur les deux côtés de l’autel. Elles serviront à le transporter. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’autel sera fait avec des panneaux. Il sera creux à l’intérieur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’intérieur était rempli de terre ou de pierres (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 20.24-25
        - type: text
          text: ). Seule la carcasse était transportée lorsque le camp se déplaçait (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '25.12'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . On le fera selon ce qui t’a été montré sur la montagne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’enceinte du parvis
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tu feras le parvis du tabernacle : sur le côté sud, sur une longueur de cinquante mètres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 26.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', il sera délimité par des tentures de lin retors. '
