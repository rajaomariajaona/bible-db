document_id: EXO.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel
  - type: text
    content: Tu feras l’autel
  - type: note
    content: L’autel des holocaustes (voir Lv 4.7, 10, 18).
  - type: text
    content: ' en bois d’acacia. Sa base formera un carré de deux mètres cinquante de côté et il aura un mètre cinquante de hauteur. '
  '10':
  - type: text
    content: 'Elles seront soutenues par vingt piliers reposant sur vingt socles de bronze ; ces piliers seront munis de crochets et de tringles d’argent. '
  '11':
  - type: text
    content: 'Sur le côté nord, il y aura également cinquante mètres de tentures soutenues par vingt piliers reposant sur vingt socles de bronze ; ces piliers seront munis de crochets et de tringles d’argent. '
  '12':
  - type: text
    content: 'Sur la largeur du parvis, à l’ouest, sur vingt-cinq mètres, des tentures seront soutenues par dix piliers reposant sur dix socles. '
  '13':
  - type: text
    content: 'Du côté est, le parvis aura également vingt-cinq mètres de largeur. '
  '14':
  - type: text
    content: 'De chaque côté de la porte, il y aura, sur sept mètres cinquante, des tentures soutenues par trois piliers reposant sur trois socles. '
  '16':
  - type: text
    content: 'La porte du parvis sera constituée par un rideau de dix mètres de long. Il sera fait de fils de pourpre violette et écarlate, de rouge éclatant et de fin lin retors en ouvrage brodé. Il sera soutenu par quatre piliers reposant sur leurs quatre socles. '
  '17':
  - type: text
    content: 'Tous les piliers délimitant le parvis seront reliés par des tringles d’argent munies de crochets d’argent ; leurs socles seront en bronze. '
  '18':
  - type: text
    content: 'Le parvis aura cinquante mètres de long et vingt-cinq mètres de large, la hauteur de l’enceinte de fin lin retors sera de deux mètres cinquante. Les socles seront en bronze, '
  '19':
  - type: text
    content: de même que tous les ustensiles destinés au service du tabernacle, et tous les piquets du tabernacle et tous ceux du parvis.
  - type: heading
    content: L’entretien du chandelier
  '2':
  - type: text
    content: A ses quatre angles, tu feras quatre cornes
  - type: note
    content: La corne symbolisait la puissance. Le prêtre enduisait les cornes de l’autel avec le sang des victimes (Lv 4.7, 18, 25, 30, 34 ; 8.15 ; 9.9 ; 16.18 ; Ps 118.27).
  - type: text
    content: ' en saillie de l’autel ; tu le plaqueras de bronze. '
  '20':
  - type: text
    content: 'Toi, tu ordonneras aux Israélites de te prendre de l’huile raffinée d’olives concassées pour alimenter en permanence les lampes du chandelier. '
  '21':
  - type: text
    content: Aaron et ses fils arrangeront ces lampes dans la tente de la Rencontre
  - type: note
    content: Appelée aussi, selon les versions, tente de la réunion ou d’assignation. Il s’agit de la rencontre de Dieu avec Moïse (33.7-11), avec les prêtres qui venaient le consulter ou, à certaines occasions, avec tout le peuple convoqué (29.42-43).
  - type: text
    content: ' devant le voile qui cache le coffre de l’acte de l’alliance, pour qu’elles brûlent du soir au matin devant l’Eternel. C’est une loi en vigueur à perpétuité pour les Israélites dans toutes les générations.'
  '3':
  - type: text
    content: Tu fabriqueras des récipients destinés à recueillir les cendres grasses, des pelles, des bassines
  - type: note
    content: Pour recueillir le sang des victimes immolées devant l’autel afin d’en faire l’aspersion sur la base de l’autel.
  - type: text
    content: ', des fourchettes et des brasiers'
  - type: note
    content: Pour transporter des braises de l’autel des holocaustes à l’autel de l’encens (des parfums) à l’intérieur du lieu saint (Lv 10.1 ; 16.12-13).
  - type: text
    content: '. Tous ces ustensiles seront en bronze. '
  '4':
  - type: text
    content: 'Tu muniras l’autel d’une grille faite d’un treillis de bronze ; tu y fixeras quatre anneaux de bronze aux quatre coins. '
  '5':
  - type: text
    content: 'Tu le placeras sous la bordure de l’autel, depuis le bas jusqu’à mi-hauteur de l’autel. '
  '6':
  - type: text
    content: 'Tu lui feras des barres en bois d’acacia et tu les recouvriras de bronze. '
  '7':
  - type: text
    content: 'On introduira ces barres dans les anneaux sur les deux côtés de l’autel. Elles serviront à le transporter. '
  '8':
  - type: text
    content: L’autel sera fait avec des panneaux. Il sera creux à l’intérieur
  - type: note
    content: L’intérieur était rempli de terre ou de pierres (20.24-25). Seule la carcasse était transportée lorsque le camp se déplaçait (25.12).
  - type: text
    content: . On le fera selon ce qui t’a été montré sur la montagne.
  - type: heading
    content: L’enceinte du parvis
  '9':
  - type: text
    content: 'Tu feras le parvis du tabernacle : sur le côté sud, sur une longueur de cinquante mètres'
  - type: note
    content: Voir note en Ex 26.2.
  - type: text
    content: ', il sera délimité par des tentures de lin retors. '
