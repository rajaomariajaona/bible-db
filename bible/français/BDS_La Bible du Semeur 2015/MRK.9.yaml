document_id: MRK.9,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: Vraiment, je vous le déclare, quelques-uns de ceux qui sont ici présents ne mourront pas avant d’avoir vu le règne de Dieu venir avec puissance.
  - type: heading
    content: La révélation du royaume
  - type: heading
    content: (Mt 17.1-9 ; Lc 9.28-36)
  '10':
  - type: text
    content: Ils obéirent à cet ordre, mais discutaient entre eux sur ce que « ressusciter » voulait dire.
  - type: heading
    content: (Mt 17.10-13)
  '11':
  - type: text
    content: 'Ils lui demandèrent alors : Pourquoi les spécialistes de la Loi disent-ils qu’Elie doit venir d’abord ?'
  '12':
  - type: text
    content: ' '
  - type: text
    content: – Oui,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: Elie vient d’abord pour remettre toutes choses en ordre
  - type: text
    content: a. Pourquoi l’Ecriture annonce-t-elle aussi que le Fils de l’homme souffrira beaucoup et sera traité avec mépris ?
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'En fait, je vous le déclare : Elie est venu et ils l’ont traité comme ils ont voulu, comme l’Ecriture l’a annoncé à son sujet'
  - type: text
    content: ' '
  - type: note
    content: Allusion au ministère de Jean-Baptiste.
  - type: text
    content: .
  - type: heading
    content: La guérison d’un enfant
  - type: heading
    content: (Mt 17.14-20 ; Lc 9.37-43)
  '14':
  - type: text
    content: 'Lorsqu’ils revinrent vers les disciples, ils virent une grande foule qui les entourait et des spécialistes de la Loi qui discutaient avec eux. '
  '15':
  - type: text
    content: Dès que tous ces gens aperçurent Jésus, ils furent très surpris et se précipitèrent à sa rencontre pour le saluer.
  '16':
  - type: text
    content: ' '
  - type: text
    content: – De quoi discutez-vous avec eux ?
  - type: text
    content: ' leur demanda-t-il.'
  '17':
  - type: text
    content: 'De la foule, quelqu’un lui répondit : Maître, je t’ai amené mon fils car il est sous l’emprise d’un esprit qui le rend muet. '
  '18':
  - type: text
    content: Partout où cet esprit s’empare de lui, il le jette par terre, de l’écume sort de la bouche de l’enfant, qui grince des dents ; puis il devient tout raide. J’ai demandé à tes disciples de chasser ce mauvais esprit, mais ils n’ont pas pu le faire.
  '19':
  - type: text
    content: 'Jésus s’adressa à eux et leur dit : '
  - type: text
    content: Gens incrédules ! Jusqu’à quand devrai-je encore rester avec vous ? Jusqu’à quand devrai-je vous supporter ? Amenez-moi l’enfant !
  '2':
  - type: text
    content: 'Six jours plus tard, Jésus prit avec lui Pierre, Jacques et Jean, et les emmena sur une haute montagne, à l’écart, eux seuls. Là, il fut transfiguré devant eux : '
  '20':
  - type: text
    content: On le lui amena. Mais, dès qu’il vit Jésus, l’esprit mauvais agita convulsivement l’enfant et le jeta par terre. Celui-ci se roula sur le sol, de l’écume à la bouche.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Depuis combien de temps cela lui arrive-t-il ?
  - type: text
    content: ' demanda Jésus à son père.'
  - type: text
    content: '– Depuis qu’il est tout petit. '
  '22':
  - type: text
    content: Souvent même, l’esprit mauvais le pousse à se jeter dans le feu ou dans l’eau pour le faire mourir. Si tu peux faire quelque chose, aie pitié de nous et viens à notre aide !
  '23':
  - type: text
    content: ' '
  - type: text
    content: – Si tu peux !
  - type: text
    content: ' répliqua Jésus. '
  - type: text
    content: Tout est possible à celui qui croit.
  '24':
  - type: text
    content: 'Aussitôt le père de l’enfant s’écria : Je crois, mais aide-moi, car je manque de foi !'
  '25':
  - type: text
    content: 'Jésus, voyant la foule affluer, commanda avec sévérité à l’esprit mauvais : '
  - type: text
    content: Esprit qui rends sourd et muet,
  - type: text
    content: ' lui dit-il, '
  - type: text
    content: je te l’ordonne, sors de cet enfant et ne rentre plus jamais en lui !
  '26':
  - type: text
    content: 'L’esprit poussa un grand cri, secoua l’enfant avec violence et sortit de lui. L’enfant resta comme mort, si bien que la plupart des témoins disaient : « Il est mort. »'
  '27':
  - type: text
    content: Mais Jésus, prenant l’enfant par la main, le fit lever, et celui-ci se tint debout.
  '28':
  - type: text
    content: 'Jésus rentra à la maison ; ses disciples, qui étaient seuls avec lui, lui demandèrent alors : Pourquoi n’avons-nous pas réussi, nous, à chasser cet esprit ?'
  '29':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Des esprits comme celui-là, on ne peut les chasser que par la prière
  - type: note
    content: 'Plusieurs manuscrits ajoutent : et par le jeûne.'
  - type: text
    content: .
  - type: heading
    content: Nouvelle annonce de la mort et de la résurrection de Jésus
  - type: heading
    content: (Mt 17.22-23 ; Lc 9.43-45)
  '3':
  - type: text
    content: 'ses vêtements devinrent éblouissants et si parfaitement blancs que personne sur la terre ne peut produire une telle blancheur. '
  '30':
  - type: text
    content: 'En partant de là, ils traversèrent la Galilée, mais Jésus ne voulait pas qu’on le sache. '
  '31':
  - type: text
    content: 'Car il se consacrait à l’enseignement de ses disciples. Il leur disait : '
  - type: text
    content: 'Le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' va être livré aux mains des hommes ; ils le feront mourir mais, trois jours après sa mort, il ressuscitera.'
  '32':
  - type: text
    content: Eux, cependant, ne comprenaient pas ces paroles et ils avaient peur de lui demander des explications.
  - type: heading
    content: L’accueil des « petits »
  - type: heading
    content: (Mt 18.1-5 ; Lc 9.46-48)
  '33':
  - type: text
    content: 'Ils arrivèrent à Capernaüm. Quand ils furent rentrés à la maison, Jésus leur demanda : '
  - type: text
    content: De quoi avez-vous discuté en route ?
  '34':
  - type: text
    content: Mais ils se taisaient car, durant le trajet, ils avaient discuté pour savoir lequel d’entre eux était le plus grand.
  '35':
  - type: text
    content: 'Jésus s’assit, appela les Douze et leur dit : '
  - type: text
    content: Si quelqu’un désire être le premier, qu’il se fasse le dernier de tous, et le serviteur de tous.
  '36':
  - type: text
    content: 'Puis il prit un petit enfant par la main, le plaça au milieu d’eux et, après l’avoir serré dans ses bras, il leur dit : '
  '37':
  - type: text
    content: Si quelqu’un accueille, en mon nom, un enfant comme celui-ci, il m’accueille moi-même. Et celui qui m’accueille, ce n’est pas moi seulement qu’il accueille, mais aussi celui qui m’a envoyé.
  - type: heading
    content: (Lc 9.49-50)
  '38':
  - type: text
    content: 'Jean lui dit : Maître, nous avons vu quelqu’un qui chassait les démons en ton nom, et nous lui avons dit de ne plus le faire, parce qu’il ne nous suit pas.'
  '39':
  - type: text
    content: ' '
  - type: text
    content: – Ne l’en empêchez pas,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: car personne ne peut accomplir un miracle en mon nom et, aussitôt après, dire du mal de moi.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Alors Elie leur apparut, avec Moïse ; ils parlaient tous deux avec Jésus.
  '40':
  - type: text
    content: Celui qui n’est pas contre nous est pour nous.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Et même, si quelqu’un vous donne à boire en mon nom, ne serait-ce qu’un verre d’eau, parce que vous appartenez au Messie, vraiment, je vous l’assure, il ne perdra pas sa récompense.
  - type: heading
    content: (Mt 18.6-9 ; Lc 17.1-2)
  '42':
  - type: text
    content: ' '
  - type: text
    content: Mais si quelqu’un devait causer la chute de l’un de ces petits qui croient en moi, il vaudrait bien mieux pour lui qu’on lui attache au cou une de ces pierres de meule que font tourner les ânes et qu’on le jette dans le lac.
  '43':
  - type: text
    content: ' '
  - type: text
    content: Si ta main cause ta chute, coupe-la ; car il vaut mieux pour toi entrer dans la vie avec une seule main que de garder les deux mains et d’être jeté en enfer dans le feu qui ne s’éteint jamais
  - type: text
    content: ' '
  - type: note
    content: 'Quelques manuscrits ajoutent : 44 Là, le ver rongeur ne meurt point et le feu ne s’éteint jamais.'
  - type: text
    content: .
  - type: text
    content: ' '
  '45':
  - type: text
    content: Si ton pied cause ta chute, coupe-le ; car il vaut mieux pour toi entrer dans la vie avec un seul pied que de garder les deux pieds et d’être jeté en enfer
  - type: note
    content: 'Quelques manuscrits ajoutent : dans le feu qui ne s’éteint pas. 46 Là, le ver rongeur ne meurt point et le feu ne s’éteint pas.'
  - type: text
    content: .
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Si ton œil cause ta chute, jette-le au loin ; car il vaut mieux pour toi entrer avec un seul œil dans le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' que de garder les deux yeux et d’être jeté en enfer,'
  - type: text
    content: ' '
  '48':
  - type: text
    content: où le ver rongeur ne meurt point et où le feu ne s’éteint jamais
  - type: note
    content: Es 66.24.
  - type: text
    content: .
  '49':
  - type: text
    content: ' '
  - type: text
    content: En effet, chacun doit être salé de feu.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Pierre s’adressa à Jésus et lui dit : Maître, il est bon que nous soyons ici. Nous allons dresser trois tentes, une pour toi, une pour Moïse et une pour Elie.'
  '50':
  - type: text
    content: Le sel est utile, mais s’il perd son goût, avec quoi lui rendrez-vous sa saveur ? Ayez du sel en vous-mêmes et vivez en paix entre vous.
  '6':
  - type: text
    content: En fait, il ne savait ce qu’il disait, car ils étaient tous les trois remplis de peur.
  '7':
  - type: text
    content: 'Une nuée se forma alors et les enveloppa. Une voix en sortit : Celui-ci est mon Fils bien-aimé. Ecoutez-le !'
  '8':
  - type: text
    content: Aussitôt les disciples regardèrent autour d’eux, et ils ne virent plus personne, sinon Jésus, qui était seul avec eux.
  '9':
  - type: text
    content: 'Pendant qu’ils descendaient de la montagne, il leur ordonna de ne raconter à personne ce qu’ils venaient de voir, jusqu’à ce que le Fils de l’homme ressuscite. '
