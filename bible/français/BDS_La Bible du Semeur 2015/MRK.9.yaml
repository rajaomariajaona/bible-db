document_id: MRK.9
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous le déclare, quelques-uns de ceux qui sont ici présents ne mourront pas avant d’avoir vu le règne de Dieu venir avec puissance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La révélation du royaume
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 17.1-9 ; Lc 9.28-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Six jours plus tard, Jésus prit avec lui Pierre, Jacques et Jean, et les emmena sur une haute montagne, à l’écart, eux seuls. Là, il fut transfiguré devant eux : '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ses vêtements devinrent éblouissants et si parfaitement blancs que personne sur la terre ne peut produire une telle blancheur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors Elie leur apparut, avec Moïse ; ils parlaient tous deux avec Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pierre s’adressa à Jésus et lui dit : Maître, il est bon que nous soyons ici. Nous allons dresser trois tentes, une pour toi, une pour Moïse et une pour Elie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En fait, il ne savait ce qu’il disait, car ils étaient tous les trois remplis de peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une nuée se forma alors et les enveloppa. Une voix en sortit : Celui-ci est mon Fils bien-aimé. Ecoutez-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aussitôt les disciples regardèrent autour d’eux, et ils ne virent plus personne, sinon Jésus, qui était seul avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pendant qu’ils descendaient de la montagne, il leur ordonna de ne raconter à personne ce qu’ils venaient de voir, jusqu’à ce que le Fils de l’homme ressuscite. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils obéirent à cet ordre, mais discutaient entre eux sur ce que « ressusciter » voulait dire.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 17.10-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils lui demandèrent alors : Pourquoi les spécialistes de la Loi disent-ils qu’Elie doit venir d’abord ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Oui,
  - type: text
    text: ' leur dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Elie vient d’abord pour remettre toutes choses en ordre
    - type: text
      text: a. Pourquoi l’Ecriture annonce-t-elle aussi que le Fils de l’homme souffrira beaucoup et sera traité avec mépris ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En fait, je vous le déclare : Elie est venu et ils l’ont traité comme ils ont voulu, comme l’Ecriture l’a annoncé à son sujet'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion au ministère de Jean-Baptiste.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un enfant
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 17.14-20 ; Lc 9.37-43)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu’ils revinrent vers les disciples, ils virent une grande foule qui les entourait et des spécialistes de la Loi qui discutaient avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dès que tous ces gens aperçurent Jésus, ils furent très surpris et se précipitèrent à sa rencontre pour le saluer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – De quoi discutez-vous avec eux ?
  - type: text
    text: ' leur demanda-t-il.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De la foule, quelqu’un lui répondit : Maître, je t’ai amené mon fils car il est sous l’emprise d’un esprit qui le rend muet. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Partout où cet esprit s’empare de lui, il le jette par terre, de l’écume sort de la bouche de l’enfant, qui grince des dents ; puis il devient tout raide. J’ai demandé à tes disciples de chasser ce mauvais esprit, mais ils n’ont pas pu le faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus s’adressa à eux et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gens incrédules ! Jusqu’à quand devrai-je encore rester avec vous ? Jusqu’à quand devrai-je vous supporter ? Amenez-moi l’enfant !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On le lui amena. Mais, dès qu’il vit Jésus, l’esprit mauvais agita convulsivement l’enfant et le jeta par terre. Celui-ci se roula sur le sol, de l’écume à la bouche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Depuis combien de temps cela lui arrive-t-il ?
  - type: text
    text: ' demanda Jésus à son père.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Depuis qu’il est tout petit. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Souvent même, l’esprit mauvais le pousse à se jeter dans le feu ou dans l’eau pour le faire mourir. Si tu peux faire quelque chose, aie pitié de nous et viens à notre aide !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Si tu peux !
  - type: text
    text: ' répliqua Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout est possible à celui qui croit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aussitôt le père de l’enfant s’écria : Je crois, mais aide-moi, car je manque de foi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus, voyant la foule affluer, commanda avec sévérité à l’esprit mauvais : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Esprit qui rends sourd et muet,
  - type: text
    text: ' lui dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je te l’ordonne, sors de cet enfant et ne rentre plus jamais en lui !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’esprit poussa un grand cri, secoua l’enfant avec violence et sortit de lui. L’enfant resta comme mort, si bien que la plupart des témoins disaient : « Il est mort. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais Jésus, prenant l’enfant par la main, le fit lever, et celui-ci se tint debout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus rentra à la maison ; ses disciples, qui étaient seuls avec lui, lui demandèrent alors : Pourquoi n’avons-nous pas réussi, nous, à chasser cet esprit ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Des esprits comme celui-là, on ne peut les chasser que par la prière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et par le jeûne.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouvelle annonce de la mort et de la résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 17.22-23 ; Lc 9.43-45)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'En partant de là, ils traversèrent la Galilée, mais Jésus ne voulait pas qu’on le sache. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Car il se consacrait à l’enseignement de ses disciples. Il leur disait : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' va être livré aux mains des hommes ; ils le feront mourir mais, trois jours après sa mort, il ressuscitera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Eux, cependant, ne comprenaient pas ces paroles et ils avaient peur de lui demander des explications.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’accueil des « petits »
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 18.1-5 ; Lc 9.46-48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils arrivèrent à Capernaüm. Quand ils furent rentrés à la maison, Jésus leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De quoi avez-vous discuté en route ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais ils se taisaient car, durant le trajet, ils avaient discuté pour savoir lequel d’entre eux était le plus grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus s’assit, appela les Douze et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un désire être le premier, qu’il se fasse le dernier de tous, et le serviteur de tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Puis il prit un petit enfant par la main, le plaça au milieu d’eux et, après l’avoir serré dans ses bras, il leur dit : '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un accueille, en mon nom, un enfant comme celui-ci, il m’accueille moi-même. Et celui qui m’accueille, ce n’est pas moi seulement qu’il accueille, mais aussi celui qui m’a envoyé.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 9.49-50)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jean lui dit : Maître, nous avons vu quelqu’un qui chassait les démons en ton nom, et nous lui avons dit de ne plus le faire, parce qu’il ne nous suit pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Ne l’en empêchez pas,
  - type: text
    text: ' répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car personne ne peut accomplir un miracle en mon nom et, aussitôt après, dire du mal de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui n’est pas contre nous est pour nous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et même, si quelqu’un vous donne à boire en mon nom, ne serait-ce qu’un verre d’eau, parce que vous appartenez au Messie, vraiment, je vous l’assure, il ne perdra pas sa récompense.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 18.6-9 ; Lc 17.1-2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais si quelqu’un devait causer la chute de l’un de ces petits qui croient en moi, il vaudrait bien mieux pour lui qu’on lui attache au cou une de ces pierres de meule que font tourner les ânes et qu’on le jette dans le lac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ta main cause ta chute, coupe-la ; car il vaut mieux pour toi entrer dans la vie avec une seule main que de garder les deux mains et d’être jeté en enfer dans le feu qui ne s’éteint jamais
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Quelques manuscrits ajoutent : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '44 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Là, le ver rongeur ne meurt point et le feu ne s’éteint jamais.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si ton pied cause ta chute, coupe-le ; car il vaut mieux pour toi entrer dans la vie avec un seul pied que de garder les deux pieds et d’être jeté en enfer
  - type: usfm
    marker: f
    children:
    - type: usfm
