document_id: PSA.40,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut de Dieu et son Serviteur
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Dans la grande assemblée, ╵j’annonce la bonne nouvelle ╵de ta justice
  - type: note
    content: 'Autre traduction : je proclame que Dieu m’a fait justice.'
  - type: text
    content: .
  - type: text
    content: Je ne la tairai pas,
  - type: text
    content: Eternel, tu le sais.
  '11':
  - type: text
    content: Non, je ne me retiens pas d’exprimer ╵que tu es juste.
  - type: text
    content: Je proclame bien haut ╵combien tu es fidèle ╵et que tu m’as sauvé.
  - type: text
    content: Non, je ne cache pas ╵ton amour, ta fidélité
  - type: text
    content: dans la grande assemblée.
  '12':
  - type: text
    content: 'Et toi, ô Eternel, ╵tu ne retiendras pas ╵loin de moi ta tendresse :'
  - type: text
    content: ton amour, ta fidélité ╵sans cesse me protégeront.
  '13':
  - type: text
    content: De malheurs innombrables ╵je suis environné,
  - type: text
    content: 'mes transgressions m’accablent :'
  - type: text
    content: 'je n’en supporte pas la vue :'
  - type: text
    content: elles dépassent, par leur nombre, ╵les cheveux de ma tête ;
  - type: text
    content: je n’ai plus de courage.
  '14':
  - type: text
    content: Veuille, Eternel, me délivrer !
  - type: text
    content: Eternel, hâte-toi ╵de venir à mon aide
  - type: note
    content: Pour les v. 14-18, voir 70.2-6.
  - type: text
    content: '  !'
  '15':
  - type: text
    content: Qu’ils soient couverts de honte, ╵remplis de confusion,
  - type: text
    content: ceux qui en veulent à ma vie !
  - type: text
    content: Qu’ils battent en retraite, ╵qu’ils soient déshonorés,
  - type: text
    content: ceux qui désirent mon malheur !
  '16':
  - type: text
    content: Qu’ils dépérissent ╵sous le poids de la honte,
  - type: text
    content: ceux qui ricanent ╵à mon sujet.
  '17':
  - type: text
    content: Mais que tous ceux qui se tournent vers toi
  - type: text
    content: soient débordants de joie, ╵oui, qu’en toi ils se réjouissent.
  - type: text
    content: Et que tous ceux qui aiment ton salut
  - type: text
    content: 'redisent constamment : ╵« Que l’Eternel est grand ! »'
  '18':
  - type: text
    content: Moi, je suis pauvre et malheureux,
  - type: text
    content: mais le Seigneur prend soin de moi.
  - type: text
    content: Toi qui es mon secours ╵et mon libérateur,
  - type: text
    content: mon Dieu, ne tarde pas !
  '2':
  - type: text
    content: J’ai mis tout mon espoir ╵en l’Eternel.
  - type: text
    content: Il s’est penché vers moi, ╵il a prêté l’oreille ╵à ma supplication.
  '3':
  - type: text
    content: Il m’a fait remonter ╵du puits de destruction
  - type: text
    content: et du fond de la boue.
  - type: text
    content: Il m’a remis debout, ╵les pieds sur un rocher,
  - type: text
    content: et il a affermi mes pas.
  '4':
  - type: text
    content: Il a mis dans ma bouche ╵un cantique nouveau,
  - type: text
    content: et la louange ╵pour notre Dieu.
  - type: text
    content: Quand ils verront ce qu’il a fait, ╵ils seront nombreux à le craindre
  - type: text
    content: et à mettre leur confiance en l’Eternel.
  '5':
  - type: text
    content: Bienheureux l’homme ╵qui fait confiance à l’Eternel
  - type: text
    content: et ne se tourne pas ╵vers les gens orgueilleux
  - type: text
    content: et enclins au mensonge
  - type: note
    content: 'Autre traduction : qui se tournent vers les faux dieux.'
  - type: text
    content: .
  '6':
  - type: text
    content: O Eternel mon Dieu,
  - type: text
    content: toi, tu as accompli ╵tant d’œuvres merveilleuses,
  - type: text
    content: et combien de projets ╵tu as formés pour nous !
  - type: text
    content: Nul n’est semblable à toi.
  - type: text
    content: Je voudrais publier, ╵redire tes merveilles,
  - type: text
    content: mais leur nombre est trop grand.
  '7':
  - type: text
    content: Tu n’as voulu ╵ni offrande ni sacrifice.
  - type: text
    content: Tu m’as ouvert l’oreille,
  - type: text
    content: car tu n’as demandé ╵ni holocaustes ╵ni sacrifices ╵pour le péché
  - type: note
    content: Les v. 7-9 sont cités en Hé 10.5-7.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Alors j’ai dit : Voici, je viens,'
  - type: text
    content: dans le rouleau du livre, ╵il est question de moi
  - type: note
    content: 'Autre traduction : je viens avec le livre écrit à mon sujet.'
  - type: text
    content: .
  '9':
  - type: text
    content: Je prends plaisir à faire ╵ta volonté, mon Dieu,
  - type: text
    content: et ta Loi est gravée ╵tout au fond de mon cœur.
