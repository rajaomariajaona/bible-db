document_id: PSA.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le salut de Dieu et son Serviteur
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’ai mis tout mon espoir ╵en l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’est penché vers moi, ╵il a prêté l’oreille ╵à ma supplication.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il m’a fait remonter ╵du puits de destruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du fond de la boue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a remis debout, ╵les pieds sur un rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a affermi mes pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a mis dans ma bouche ╵un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la louange ╵pour notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils verront ce qu’il a fait, ╵ils seront nombreux à le craindre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à mettre leur confiance en l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Bienheureux l’homme ╵qui fait confiance à l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne se tourne pas ╵vers les gens orgueilleux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et enclins au mensonge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui se tournent vers les faux dieux.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O Eternel mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu as accompli ╵tant d’œuvres merveilleuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et combien de projets ╵tu as formés pour nous !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul n’est semblable à toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais publier, ╵redire tes merveilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais leur nombre est trop grand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu n’as voulu ╵ni offrande ni sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as ouvert l’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu n’as demandé ╵ni holocaustes ╵ni sacrifices ╵pour le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 7-9 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10.5-7
        metadata:
          usfm: HEB.10.5+HEB.10.6+HEB.10.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors j’ai dit : Voici, je viens,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le rouleau du livre, ╵il est question de moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je viens avec le livre écrit à mon sujet.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je prends plaisir à faire ╵ta volonté, mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta Loi est gravée ╵tout au fond de mon cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dans la grande assemblée, ╵j’annonce la bonne nouvelle ╵de ta justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je proclame que Dieu m’a fait justice.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne la tairai pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, tu le sais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Non, je ne me retiens pas d’exprimer ╵que tu es juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je proclame bien haut ╵combien tu es fidèle ╵et que tu m’as sauvé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non, je ne cache pas ╵ton amour, ta fidélité
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la grande assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et toi, ô Eternel, ╵tu ne retiendras pas ╵loin de moi ta tendresse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton amour, ta fidélité ╵sans cesse me protégeront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De malheurs innombrables ╵je suis environné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mes transgressions m’accablent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je n’en supporte pas la vue :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles dépassent, par leur nombre, ╵les cheveux de ma tête ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’ai plus de courage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Veuille, Eternel, me délivrer !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, hâte-toi ╵de venir à mon aide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 14-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 70.2-6
        metadata:
          usfm: PSA.70.2+PSA.70.3+PSA.70.4+PSA.70.5+PSA.70.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu’ils soient couverts de honte, ╵remplis de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui en veulent à ma vie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils battent en retraite, ╵qu’ils soient déshonorés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui désirent mon malheur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’ils dépérissent ╵sous le poids de la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ricanent ╵à mon sujet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais que tous ceux qui se tournent vers toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: soient débordants de joie, ╵oui, qu’en toi ils se réjouissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tous ceux qui aiment ton salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'redisent constamment : ╵« Que l’Eternel est grand ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moi, je suis pauvre et malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le Seigneur prend soin de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui es mon secours ╵et mon libérateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu, ne tarde pas !
