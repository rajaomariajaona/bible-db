document_id: JER.41
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au septième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Septembre-octobre 587 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' de l’année, Ismaël, fils de Netania, et petit-fils d’Elishama, qui était de descendance royale, et l’un des généraux du roi, vint avec dix hommes auprès de Guedalia, fils d’Ahiqam, à Mitspa. Pendant qu’ils étaient à table ensemble à Mitspa, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ismaël, fils de Netania, se leva soudain, avec les dix hommes qui l’accompagnaient, et, de leur épée, ils assassinèrent Guedalia, fils d’Ahiqam, petit-fils de Shaphân, que le roi de Babylone avait établi gouverneur du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils tuèrent aussi tous les Judéens qui étaient avec Guedalia à Mitspa, et les soldats chaldéens qui étaient sur place.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La tuerie de Mitspa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le lendemain du meurtre de Guedalia, alors que personne n’en avait encore connaissance, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: quatre-vingts hommes vinrent de Sichem, de Silo et de Samarie, la barbe rasée, les vêtements déchirés, la peau tailladée d’incisions
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marques de deuil suite à la ruine de Jérusalem et du Temple.
    marker-yv: yv-n
  - type: text
    text: '. Ils apportaient des offrandes de céréales et de l’encens pour les offrir dans le temple de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ismaël, fils de Netania, sortit de Mitspa à leur rencontre. Il marchait en pleurant. Quand il les eut rejoints, il leur dit : Venez auprès de Guedalia, fils d’Ahiqam !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais quand ils furent à l’intérieur de la ville, Ismaël, fils de Netania, et ses hommes les massacrèrent et jetèrent leurs cadavres dans une citerne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il épargna cependant dix d’entre eux parce qu’ils avaient dit à Ismaël : Ne nous fais pas mourir, nous avons des provisions cachées dans les champs : du blé, de l’orge, de l’huile et du miel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il ne les fit donc pas mourir avec leurs concitoyens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La citerne dans laquelle Ismaël jeta les cadavres des hommes qu’il avait assassinés pour se débarrasser de Guedalia est celle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour se débarrasser de Guedalia est celle…
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est la grande citerne… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Asa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Baésha, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15.16-22
        metadata:
          usfm: 1KI.15.16+1KI.15.17+1KI.15.18+1KI.15.19+1KI.15.20+1KI.15.21+1KI.15.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' que le roi Asa avait fait creuser pour se défendre contre Baésha, roi d’Israël. Ismaël, fils de Netania, la remplit des cadavres de ses victimes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Puis il fit prisonniers le reste de la population de Mitspa, les filles du roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les filles du roi
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: expression qui peut aussi désigner des femmes qui ont fait partie de la cour du roi Sédécias.
    marker-yv: yv-n
  - type: text
    text: ' et tous les gens qui restaient dans la ville et que Nebouzaradân, le chef de la garde, avait confiés à Guedalia, fils d’Ahiqam. Ismaël, fils de Netania, partit pour se rendre chez les Ammonites, en les emmenant captifs.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les prisonniers délivrés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yohanân, fils de Qaréah, et tous les chefs des troupes qui étaient avec lui apprirent les crimes commis par Ismaël, fils de Netania. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils rassemblèrent tous leurs hommes et se mirent en route pour attaquer Ismaël, fils de Netania. Ils le rejoignirent près du grand étang de Gabaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A quelques kilomètres de Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 9.3
        metadata:
          usfm: JOS.9.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand tous les prisonniers d’Ismaël virent Yohanân et tous les chefs de troupes qui l’accompagnaient, ils furent remplis de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tous les gens qu’Ismaël avait emmenés prisonniers de Mitspa firent demi-tour et vinrent se joindre à Yohanân, fils de Qaréah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais Ismaël, fils de Netania, parvint à échapper à Yohanân avec huit hommes, et il se rendit chez les Ammonites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Yohanân, fils de Qaréah, et tous les chefs des troupes qui l’accompagnaient prirent avec eux le reste de la population de Mitspa qu’Ismaël, fils de Netania, avait emmené captif après le meurtre de Guedalia, fils d’Ahiqam : les soldats, les femmes, les enfants et les fonctionnaires royaux, et ils les ramenèrent de Gabaon. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils se mirent en route et firent étape au caravansérail de Kimham près de Bethléhem. Ils avaient l’intention de se rendre en Egypte '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: pour fuir les Chaldéens, car ils avaient peur de représailles de leur part, parce qu’Ismaël, fils de Netania, avait assassiné Guedalia, fils d’Ahiqam, que le roi de Babylone avait établi gouverneur du pays.
