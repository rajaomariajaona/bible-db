document_id: PRO.12,21
type_code: fra
verses:
  '1':
  - type: text
    content: Qui aime la connaissance désire être corrigé,
  - type: text
    content: qui déteste les réprimandes n’est qu’un sot.
  '10':
  - type: text
    content: Le juste veille au bien-être de ses bêtes,
  - type: text
    content: mais le cœur des méchants est cruel envers elles.
  '11':
  - type: text
    content: Qui travaille sa terre aura du pain en abondance,
  - type: text
    content: qui court après des futilités est dépourvu de sens.
  '12':
  - type: text
    content: Le méchant convoite la proie de ceux qui font le mal,
  - type: text
    content: mais la racine des justes donne du fruit.
  '13':
  - type: text
    content: Le méchant est pris au piège de ses propos coupables,
  - type: text
    content: mais le juste échappe à ces difficultés.
  '14':
  - type: text
    content: Par ses paroles, on peut recueillir du bien en abondance,
  - type: text
    content: et l’on reçoit le salaire de ses œuvres.
  '15':
  - type: text
    content: L’insensé pense toujours qu’il fait bien,
  - type: text
    content: mais le sage écoute les avis des autres.
  '16':
  - type: text
    content: L’insensé manifeste immédiatement son irritation,
  - type: text
    content: mais l’homme avisé sait ravaler un affront.
  '17':
  - type: text
    content: Un témoin digne de foi déclare ce qui est juste,
  - type: text
    content: mais le témoin mensonger est trompeur.
  '18':
  - type: text
    content: Les paroles des bavards blessent comme des coups d’épée,
  - type: text
    content: tandis que le langage des sages est comme un baume qui guérit.
  '19':
  - type: text
    content: La bouche véridique est pour toujours affermie,
  - type: text
    content: mais la langue menteuse ne tient pas longtemps.
  '2':
  - type: text
    content: L’homme de bien s’attire la faveur de l’Eternel,
  - type: text
    content: mais Dieu condamne celui qui forge des desseins coupables.
  '20':
  - type: text
    content: La tromperie imprègne le cœur des artisans du mal,
  - type: text
    content: mais la joie est pour ceux qui donnent des conseils visant à la paix
  - type: note
    content: 'Autre traduction : dont les projets visent à la paix.'
  - type: text
    content: .
  '21':
  - type: text
    content: Aucune calamité n’atteint le juste,
  - type: text
    content: mais les méchants sont accablés de maux.
  '22':
  - type: text
    content: Les lèvres menteuses sont en horreur à l’Eternel,
  - type: text
    content: mais ceux qui agissent en hommes fiables lui font plaisir.
  '23':
  - type: text
    content: L’homme avisé cache son savoir,
  - type: text
    content: mais l’insensé proclame bien haut sa sottise.
  '24':
  - type: text
    content: Ceux qui travaillent avec zèle s’assurent la direction des affaires,
  - type: text
    content: mais les nonchalants seront astreints aux corvées.
  '25':
  - type: text
    content: Le souci au fond du cœur déprime un homme,
  - type: text
    content: mais une parole d’encouragement lui rend la joie.
  '26':
  - type: text
    content: Le juste sert de guide à ses compagnons,
  - type: text
    content: mais la conduite des méchants les égare.
  '27':
  - type: text
    content: Le paresseux ne fait pas rôtir son gibier ;
  - type: text
    content: le bien le plus précieux de l’homme, c’est l’activité.
  '28':
  - type: text
    content: 'La vie se trouve sur le chemin de la justice :'
  - type: text
    content: cette voie-là préserve de la mort
  - type: note
    content: Voir 10.11.
  - type: text
    content: .
  '3':
  - type: text
    content: La méchanceté n’affermit la position de personne,
  - type: text
    content: mais celui qui est droit ne sera pas déraciné.
  '4':
  - type: text
    content: Une femme de valeur est comme une couronne pour son mari,
  - type: text
    content: mais celle qui lui fait honte est comme une maladie qui ronge les os.
  '5':
  - type: text
    content: Les projets des justes sont orientés vers ce qui est droit,
  - type: text
    content: alors que les méchants ne songent qu’à tromper.
  '6':
  - type: text
    content: Les paroles des méchants sont des embûches meurtrières,
  - type: text
    content: mais celles des hommes droits les sauvent.
  '7':
  - type: text
    content: Qu’on renverse les méchants, ils ne sont plus,
  - type: text
    content: mais la maison des justes subsiste.
  '8':
  - type: text
    content: Un homme est estimé pour son bon sens,
  - type: text
    content: mais celui dont le cœur est corrompu sera méprisé.
  '9':
  - type: text
    content: Mieux vaut être méprisé et avoir un serviteur
  - type: text
    content: que de faire l’homme important et n’avoir rien à manger.
