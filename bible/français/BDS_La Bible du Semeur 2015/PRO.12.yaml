document_id: PRO.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Qui aime la connaissance désire être corrigé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui déteste les réprimandes n’est qu’un sot.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le juste veille au bien-être de ses bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le cœur des méchants est cruel envers elles.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qui travaille sa terre aura du pain en abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui court après des futilités est dépourvu de sens.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le méchant convoite la proie de ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la racine des justes donne du fruit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le méchant est pris au piège de ses propos coupables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le juste échappe à ces difficultés.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Par ses paroles, on peut recueillir du bien en abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on reçoit le salaire de ses œuvres.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’insensé pense toujours qu’il fait bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le sage écoute les avis des autres.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L’insensé manifeste immédiatement son irritation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme avisé sait ravaler un affront.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Un témoin digne de foi déclare ce qui est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le témoin mensonger est trompeur.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les paroles des bavards blessent comme des coups d’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le langage des sages est comme un baume qui guérit.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: La bouche véridique est pour toujours affermie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la langue menteuse ne tient pas longtemps.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’homme de bien s’attire la faveur de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais Dieu condamne celui qui forge des desseins coupables.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La tromperie imprègne le cœur des artisans du mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la joie est pour ceux qui donnent des conseils visant à la paix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dont les projets visent à la paix.
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aucune calamité n’atteint le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les méchants sont accablés de maux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les lèvres menteuses sont en horreur à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui agissent en hommes fiables lui font plaisir.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L’homme avisé cache son savoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’insensé proclame bien haut sa sottise.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ceux qui travaillent avec zèle s’assurent la direction des affaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les nonchalants seront astreints aux corvées.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le souci au fond du cœur déprime un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais une parole d’encouragement lui rend la joie.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Le juste sert de guide à ses compagnons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la conduite des méchants les égare.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Le paresseux ne fait pas rôtir son gibier ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le bien le plus précieux de l’homme, c’est l’activité.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'La vie se trouve sur le chemin de la justice :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cette voie-là préserve de la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.11'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: La méchanceté n’affermit la position de personne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui est droit ne sera pas déraciné.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Une femme de valeur est comme une couronne pour son mari,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celle qui lui fait honte est comme une maladie qui ronge les os.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les projets des justes sont orientés vers ce qui est droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que les méchants ne songent qu’à tromper.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les paroles des méchants sont des embûches meurtrières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celles des hommes droits les sauvent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Qu’on renverse les méchants, ils ne sont plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la maison des justes subsiste.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Un homme est estimé pour son bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui dont le cœur est corrompu sera méprisé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mieux vaut être méprisé et avoir un serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de faire l’homme important et n’avoir rien à manger.
