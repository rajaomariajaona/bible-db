document_id: GEN.5
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’histoire de la famille d’Adam
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: D’Adam aux fils de Noé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici l’histoire de la famille d’Adam. Quand Dieu créa les êtres humains, il les fit de telle sorte qu’ils lui ressemblent. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il les créa homme et femme, il les bénit et leur donna le nom d’hommes le jour où ils furent créés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Adam était âgé de 130 ans quand il eut un fils qui lui ressemble, qui soit son image. Il lui donna le nom de Seth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après cela, Adam vécut encore 800 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La durée totale de sa vie fut de 930 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand Seth fut âgé de 105 ans, il eut pour fils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction, de même que dans les versets suivants : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: descendant.
    marker-yv: yv-n
  - type: text
    text: ' Enosh. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après cela, il vécut encore 807 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il mourut à l’âge de 912 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand Enosh fut âgé de 90 ans, il eut pour fils Qénân. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Après cela, il vécut encore 815 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il mourut à l’âge de 905 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Qénân fut âgé de 70 ans, il eut pour fils Mahalaléel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après cela, il vécut encore 840 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il mourut à l’âge de 910 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand Mahalaléel fut âgé de 65 ans, il eut pour fils Yéred. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Après cela, Mahalaléel vécut encore 830 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il mourut à l’âge de 895 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand Yéred fut âgé de 162 ans, il eut pour fils Hénok. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après cela, il vécut encore 800 ans, et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il mourut à l’âge de 962 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand Hénok fut âgé de 65 ans, il eut pour fils Mathusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, Hénok mena sa vie sous le regard de Dieu durant 300 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La durée totale de sa vie fut de 365 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hénok vécut en communion avec Dieu puis il disparut, car Dieu le prit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Hé 11.5 ; Jd 14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand Mathusalem fut âgé de 187 ans, il eut pour fils Lémek. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après cela, il vécut encore 782 ans et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il mourut à l’âge de 969 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand Lémek fut âgé de 182 ans, il eut un fils. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il l’appela Noé (Consolation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Noé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoque le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: consolera.
    marker-yv: yv-n
  - type: text
    text: ') en disant : Celui-ci nous consolera de notre travail et de la tâche pénible que nous impose ce sol que l’Eternel a maudit. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Après cela, Lémek vécut encore 595 ans, et il eut d’autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Il mourut à l’âge de 777 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Quand Noé fut âgé de 500 ans, il eut pour fils Sem, Cham et Japhet.
