document_id: GEN.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’histoire de la famille d’Adam
  - type: heading
    content: D’Adam aux fils de Noé
  - type: text
    content: 'Voici l’histoire de la famille d’Adam. Quand Dieu créa les êtres humains, il les fit de telle sorte qu’ils lui ressemblent. '
  '10':
  - type: text
    content: 'Après cela, il vécut encore 815 ans et il eut d’autres enfants. '
  '11':
  - type: text
    content: Il mourut à l’âge de 905 ans.
  '12':
  - type: text
    content: 'Quand Qénân fut âgé de 70 ans, il eut pour fils Mahalaléel. '
  '13':
  - type: text
    content: 'Après cela, il vécut encore 840 ans et il eut d’autres enfants. '
  '14':
  - type: text
    content: Il mourut à l’âge de 910 ans.
  '15':
  - type: text
    content: 'Quand Mahalaléel fut âgé de 65 ans, il eut pour fils Yéred. '
  '16':
  - type: text
    content: 'Après cela, Mahalaléel vécut encore 830 ans et il eut d’autres enfants. '
  '17':
  - type: text
    content: Il mourut à l’âge de 895 ans.
  '18':
  - type: text
    content: 'Quand Yéred fut âgé de 162 ans, il eut pour fils Hénok. '
  '19':
  - type: text
    content: 'Après cela, il vécut encore 800 ans, et il eut d’autres enfants. '
  '2':
  - type: text
    content: Il les créa homme et femme, il les bénit et leur donna le nom d’hommes le jour où ils furent créés.
  '20':
  - type: text
    content: Il mourut à l’âge de 962 ans.
  '21':
  - type: text
    content: 'Quand Hénok fut âgé de 65 ans, il eut pour fils Mathusalem. '
  '22':
  - type: text
    content: 'Après cela, Hénok mena sa vie sous le regard de Dieu durant 300 ans et il eut d’autres enfants. '
  '23':
  - type: text
    content: La durée totale de sa vie fut de 365 ans.
  '24':
  - type: text
    content: Hénok vécut en communion avec Dieu puis il disparut, car Dieu le prit
  - type: note
    content: Voir Hé 11.5 ; Jd 14.
  - type: text
    content: .
  '25':
  - type: text
    content: 'Quand Mathusalem fut âgé de 187 ans, il eut pour fils Lémek. '
  '26':
  - type: text
    content: 'Après cela, il vécut encore 782 ans et il eut d’autres enfants. '
  '27':
  - type: text
    content: Il mourut à l’âge de 969 ans.
  '28':
  - type: text
    content: 'Quand Lémek fut âgé de 182 ans, il eut un fils. '
  '29':
  - type: text
    content: Il l’appela Noé (Consolation
  - type: note
    content: En hébreu, le nom Noé évoque le verbe traduit par consolera.
  - type: text
    content: ') en disant : Celui-ci nous consolera de notre travail et de la tâche pénible que nous impose ce sol que l’Eternel a maudit. '
  '3':
  - type: text
    content: 'Adam était âgé de 130 ans quand il eut un fils qui lui ressemble, qui soit son image. Il lui donna le nom de Seth. '
  '30':
  - type: text
    content: 'Après cela, Lémek vécut encore 595 ans, et il eut d’autres enfants. '
  '31':
  - type: text
    content: Il mourut à l’âge de 777 ans.
  '32':
  - type: text
    content: Quand Noé fut âgé de 500 ans, il eut pour fils Sem, Cham et Japhet.
  '4':
  - type: text
    content: 'Après cela, Adam vécut encore 800 ans et il eut d’autres enfants. '
  '5':
  - type: text
    content: La durée totale de sa vie fut de 930 ans, puis il mourut.
  '6':
  - type: text
    content: Quand Seth fut âgé de 105 ans, il eut pour fils
  - type: note
    content: 'Autre traduction, de même que dans les versets suivants : descendant.'
  - type: text
    content: ' Enosh. '
  '7':
  - type: text
    content: 'Après cela, il vécut encore 807 ans et il eut d’autres enfants. '
  '8':
  - type: text
    content: Il mourut à l’âge de 912 ans.
  '9':
  - type: text
    content: 'Quand Enosh fut âgé de 90 ans, il eut pour fils Qénân. '
