document_id: EXO.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Huitième fléau : les sauterelles'
  - type: text
    content: 'L’Eternel dit à Moïse : Va trouver le pharaon, car c’est moi qui ai fait qu’il s’entête, ainsi que ses hauts fonctionnaires, afin d’accomplir mes signes miraculeux au milieu d’eux '
  '10':
  - type: text
    content: 'Le pharaon répliqua : Que l’Eternel soit avec vous, lorsque je vous laisserai partir avec vos enfants ! Il est clair que vous avez de mauvaises intentions ! '
  '11':
  - type: text
    content: Mais ça ne se passera pas ainsi ! Que seuls les hommes
  - type: note
    content: Dans la religion égyptienne, seuls les hommes participaient pleinement au culte. De plus, les femmes et les enfants auraient constitué des otages garantissant le retour des hommes.
  - type: text
    content: ' aillent rendre un culte à l’Eternel, puisque c’est là ce que vous me demandez !'
  - type: text
    content: Sur quoi on les chassa de chez le pharaon.
  '12':
  - type: text
    content: 'L’Eternel dit à Moïse : Etends la main sur l’Egypte pour y faire venir les sauterelles. Qu’elles envahissent le pays, qu’elles dévorent toute la végétation du pays, tout ce que la grêle a épargné.'
  '13':
  - type: text
    content: 'Moïse leva son bâton sur l’Egypte, et l’Eternel fit souffler un vent d’orient sur le pays tout ce jour-là et toute la nuit. Le lendemain matin, le vent avait amené les sauterelles. '
  '14':
  - type: text
    content: 'Elles s’abattirent sur toute l’Egypte et se posèrent sur tout le territoire en si grand nombre que jamais on n’avait vu et jamais on ne reverra pareil fléau. '
  '15':
  - type: text
    content: Elles recouvrirent tout le pays. La terre fut obscurcie. Elles dévorèrent toute la végétation, tous les fruits des arbres qui subsistaient après la grêle, de sorte qu’il ne resta aucun brin de verdure ni aux arbres ni dans les champs de toute l’Egypte.
  '16':
  - type: text
    content: 'Le pharaon fit convoquer d’urgence Moïse et Aaron et leur dit : J’ai péché contre l’Eternel votre Dieu et contre vous. '
  '17':
  - type: text
    content: 'Maintenant donc : pardonne, je te prie, mon péché cette fois encore, et priez l’Eternel votre Dieu pour qu’il me débarrasse de ce fléau meurtrier.'
  '18':
  - type: text
    content: 'Moïse sortit de chez le pharaon et pria l’Eternel. '
  '19':
  - type: text
    content: 'Et l’Eternel fit souffler un violent vent d’ouest qui emporta les sauterelles et les précipita dans la mer des Roseaux. Il n’en resta pas une seule sur tout le territoire de l’Egypte. '
  '2':
  - type: text
    content: et afin que tu racontes à tes enfants et à tes petits-enfants comment j’ai traité les Egyptiens et quels signes miraculeux j’ai accomplis au milieu d’eux. Ainsi vous saurez que je suis l’Eternel.
  '20':
  - type: text
    content: Mais l’Eternel rendit obstiné le cœur du pharaon, qui ne laissa pas partir les Israélites.
  - type: heading
    content: 'Neuvième fléau : les ténèbres'
  '21':
  - type: text
    content: 'L’Eternel dit à Moïse : Lève la main vers le ciel et que l’Egypte soit plongée dans les ténèbres de sorte que l’on doive y tâtonner !'
  '22':
  - type: text
    content: 'Moïse étendit la main vers le ciel et le pays d’Egypte fut entièrement plongé pendant trois jours dans des ténèbres opaques. '
  '23':
  - type: text
    content: Pendant ces trois jours, on ne se voyait plus l’un l’autre et personne ne bougeait de l’endroit où il se trouvait. Par contre, il y avait de la lumière dans les lieux habités par les Israélites.
  '24':
  - type: text
    content: 'Le pharaon fit convoquer Moïse et lui dit : Allez rendre un culte à l’Eternel. Vos enfants pourront vous accompagner. Seul votre petit et votre gros bétail resteront ici.'
  '25':
  - type: text
    content: 'Moïse répliqua : C’est toi-même qui nous fourniras les animaux pour les sacrifices et les holocaustes à notre Dieu '
  '26':
  - type: text
    content: et, en plus, nos troupeaux nous accompagneront. Pas une bête ne restera ici, car nous choisirons dans notre cheptel des victimes pour les offrir à l’Eternel notre Dieu. Tant que nous ne serons pas arrivés là-bas, nous ne saurons pas nous-mêmes ce que nous offrirons pour le culte de l’Eternel.
  '27':
  - type: text
    content: Mais l’Eternel rendit le cœur du pharaon obstiné, de sorte qu’il refusa de laisser partir le peuple.
  '28':
  - type: text
    content: – Va-t’en d’ici, cria-t-il à Moïse, et prends garde ! Ne reparais plus jamais en ma présence ! Car le jour où tu paraîtras en ma présence, tu mourras.
  '29':
  - type: text
    content: 'Moïse répondit : Tu l’auras voulu ! Je ne reparaîtrai plus en ta présence.'
  '3':
  - type: text
    content: 'Moïse et Aaron se rendirent donc chez le pharaon et lui dirent : Voici ce que te dit l’Eternel, le Dieu des Hébreux : « Combien de temps encore refuseras-tu de t’humilier devant moi ? Laisse aller mon peuple pour qu’il me rende un culte ! '
  '4':
  - type: text
    content: 'Si tu refuses de le laisser partir, dès demain, je ferai envahir ton territoire par les sauterelles. '
  '5':
  - type: text
    content: 'Elles recouvriront complètement le pays au point qu’on ne pourra plus voir le sol ; elles dévoreront ce qui a échappé à la grêle et tous les arbres qui poussent dans vos campagnes. '
  '6':
  - type: text
    content: Elles envahiront ton palais, les maisons de tous tes hauts fonctionnaires et celles de tous les Egyptiens. Jamais tes pères, ni tes ancêtres les plus lointains n’ont rien vu de pareil depuis qu’ils occupent ce pays. »
  - type: text
    content: 'Là-dessus, Moïse tourna le dos et sortit de chez le pharaon. '
  '7':
  - type: text
    content: 'Les hauts fonctionnaires du pharaon lui dirent : Combien de temps encore cet homme-là va-t-il faire notre malheur ? Laisse donc partir ces gens pour qu’ils rendent leur culte à l’Eternel leur Dieu. Ne vois-tu pas encore que l’Egypte court à sa ruine ?'
  '8':
  - type: text
    content: 'On rappela Moïse et Aaron auprès du pharaon qui leur dit : Allez rendre un culte à l’Eternel votre Dieu. Mais quels sont ceux qui iront ?'
  '9':
  - type: text
    content: 'Moïse répondit : Nous irons avec nos enfants et nos vieillards, nos fils et nos filles, nous emmènerons notre petit et notre gros bétail : car nous allons célébrer une fête en l’honneur de l’Eternel.'
