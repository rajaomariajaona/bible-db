document_id: EXO.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les artisans du sanctuaire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vois, je désigne Betsaléel, fils d’Ouri, descendant de Hour, de la tribu de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et je l’ai rempli de l’Esprit de Dieu qui lui confère de l’habileté, de l’intelligence et de la compétence pour exécuter toutes sortes d’ouvrages, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'pour concevoir des projets, pour travailler l’or, l’argent et le bronze, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'pour tailler des pierres à enchâsser, pour sculpter le bois et pour réaliser toutes sortes d’ouvrages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je lui ai donné pour aide Oholiab, fils d’Ahisamak, de la tribu de Dan et, de plus, j’ai accordé un surcroît d’habileté à tous les artisans experts, afin qu’ils exécutent tout ce que je t’ai ordonné : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'la tente de la Rencontre, le coffre de l’acte de l’alliance, le propitiatoire qui doit lui servir de couvercle, et tous les objets de la tente, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'la table et ses ustensiles, le chandelier d’or pur et tous ses accessoires, l’autel des parfums, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'l’autel des holocaustes et tous ses accessoires, la cuve et son socle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les vêtements de cérémonie et les vêtements sacrés pour Aaron le prêtre, ainsi que ceux de ses fils, ceux qu’ils endosseront pour exercer les fonctions du sacerdoce, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: l’huile d’onction et le parfum aromatique pour le sanctuaire. Les artisans se conformeront à tous les ordres que je t’ai donnés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Eternel parla à Moïse en ces termes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 12-17, voir 20.8-11 ; 23.12 ; 34.21 ; 35.2 ; Gn 2.1-3 ; Lv 23.3 ; Dt 5.13-14.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et toi, dis ceci aux Israélites : « Surtout, observez bien mes sabbats ; car c’est là un signe entre moi et vous, de génération en génération, le signe que moi, l’Eternel, je vous rends saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous observerez donc le jour du repos, car il est saint pour vous. Celui qui le profanera devra mourir ; car quiconque fera un travail quelconque ce jour-là, sera retranché de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On travaillera six jours, et le septième jour sera un jour de repos consacré à l’Eternel. Quiconque fera un travail le jour du sabbat devra mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les Israélites observeront le jour du sabbat en le célébrant de génération en génération ; c’est une alliance éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il sera un signe à perpétuité entre moi et les Israélites, car en six jours l’Eternel a fait le ciel et la terre, et le septième jour il a cessé de travailler pour reprendre son souffle. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La remise des deux tablettes de l’acte de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand il eut terminé de s’entretenir avec Moïse sur le mont Sinaï, l’Eternel lui remit les deux tablettes de l’acte de l’alliance ; c’étaient des tablettes de pierre gravées par le doigt de Dieu.
