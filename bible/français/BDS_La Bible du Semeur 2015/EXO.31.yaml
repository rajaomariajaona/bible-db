document_id: EXO.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les artisans du sanctuaire
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '10':
  - type: text
    content: 'les vêtements de cérémonie et les vêtements sacrés pour Aaron le prêtre, ainsi que ceux de ses fils, ceux qu’ils endosseront pour exercer les fonctions du sacerdoce, '
  '11':
  - type: text
    content: l’huile d’onction et le parfum aromatique pour le sanctuaire. Les artisans se conformeront à tous les ordres que je t’ai donnés.
  - type: heading
    content: Le jour du sabbat
  '12':
  - type: text
    content: L’Eternel parla à Moïse en ces termes
  - type: note
    content: Pour les v. 12-17, voir 20.8-11 ; 23.12 ; 34.21 ; 35.2 ; Gn 2.1-3 ; Lv 23.3 ; Dt 5.13-14.
  - type: text
    content: '  : '
  '13':
  - type: text
    content: 'Et toi, dis ceci aux Israélites : « Surtout, observez bien mes sabbats ; car c’est là un signe entre moi et vous, de génération en génération, le signe que moi, l’Eternel, je vous rends saints. '
  '14':
  - type: text
    content: 'Vous observerez donc le jour du repos, car il est saint pour vous. Celui qui le profanera devra mourir ; car quiconque fera un travail quelconque ce jour-là, sera retranché de son peuple. '
  '15':
  - type: text
    content: 'On travaillera six jours, et le septième jour sera un jour de repos consacré à l’Eternel. Quiconque fera un travail le jour du sabbat devra mourir. '
  '16':
  - type: text
    content: 'Les Israélites observeront le jour du sabbat en le célébrant de génération en génération ; c’est une alliance éternelle. '
  '17':
  - type: text
    content: Il sera un signe à perpétuité entre moi et les Israélites, car en six jours l’Eternel a fait le ciel et la terre, et le septième jour il a cessé de travailler pour reprendre son souffle. »
  - type: heading
    content: La remise des deux tablettes de l’acte de l’alliance
  '18':
  - type: text
    content: Quand il eut terminé de s’entretenir avec Moïse sur le mont Sinaï, l’Eternel lui remit les deux tablettes de l’acte de l’alliance ; c’étaient des tablettes de pierre gravées par le doigt de Dieu.
  '2':
  - type: text
    content: 'Vois, je désigne Betsaléel, fils d’Ouri, descendant de Hour, de la tribu de Juda, '
  '3':
  - type: text
    content: 'et je l’ai rempli de l’Esprit de Dieu qui lui confère de l’habileté, de l’intelligence et de la compétence pour exécuter toutes sortes d’ouvrages, '
  '4':
  - type: text
    content: 'pour concevoir des projets, pour travailler l’or, l’argent et le bronze, '
  '5':
  - type: text
    content: 'pour tailler des pierres à enchâsser, pour sculpter le bois et pour réaliser toutes sortes d’ouvrages. '
  '6':
  - type: text
    content: 'Je lui ai donné pour aide Oholiab, fils d’Ahisamak, de la tribu de Dan et, de plus, j’ai accordé un surcroît d’habileté à tous les artisans experts, afin qu’ils exécutent tout ce que je t’ai ordonné : '
  '7':
  - type: text
    content: 'la tente de la Rencontre, le coffre de l’acte de l’alliance, le propitiatoire qui doit lui servir de couvercle, et tous les objets de la tente, '
  '8':
  - type: text
    content: 'la table et ses ustensiles, le chandelier d’or pur et tous ses accessoires, l’autel des parfums, '
  '9':
  - type: text
    content: 'l’autel des holocaustes et tous ses accessoires, la cuve et son socle, '
