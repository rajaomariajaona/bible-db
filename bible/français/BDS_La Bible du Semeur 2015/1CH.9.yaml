document_id: 1CH.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les habitants de Jérusalem après le retour de l’exil
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Tout Israël a été recensé et inscrit dans les Annales des rois d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Recueil des décrets royaux contenant également les résultats des divers recensements (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 24.2-9
        - type: text
          text: '). Ce chapitre donne un tableau des habitants de Jérusalem, des lévites et de leurs fonctions après le retour de l’exil (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Né 11.3-19
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. La population de Juda fut déportée à Babylone, à cause de ses infidélités. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Parmi les prêtres, il y avait : Yedaeya, Yehoyarib, Yakîn, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Azaria, fils de Hilqiya, qui avait pour ascendants : Meshoullam, Tsadoq, Merayoth, Ahitoub, responsable en chef du temple de Dieu ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'il y avait aussi Adaya, fils de Yeroham, qui avait pour ascendants Pashhour et Malkiya ; il y avait Maesaï, fils d’Adiel, dont les ascendants étaient Yahzéra, Meshoullam, Meshillémith et Immer. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Avec les autres prêtres, chefs de leur groupe familial, ils étaient au nombre de 1 760 hommes forts et valeureux affectés au service du temple de Dieu.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Parmi les lévites : Shemaya, fils de Hashoub, descendant d’Azriqam, Hashabia du lignage de Merari ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'il y avait aussi Baqbaqar, Héresh, Galal, Mattania, fils de Michée, petit-fils de Zikri, et descendant d’Asaph. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il y avait Abdias, fils de Shemaya, descendant de Galal et Yedoutoun ; il y avait Bérékia, fils d’Asa et petit-fils d’Elqana, qui habitait dans les villages des Netophatites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 2.54 ; Né 12.28-29. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Netopha
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ville située près de Bethléhem.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il y avait encore des portiers : Shalloum, Aqqoub, Talmôn, Ahimân et leurs frères. Shalloum en était le chef. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et, jusqu’à présent, ses descendants surveillent l’entrée orientale du Temple appelée la porte du Roi. Ce sont là les portiers du camp des lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Shalloum, fils de Qoré, descendant d’Ebyasaph, et de Qoré, ainsi que les autres membres du groupe familial des Qoréites, remplissaient les fonctions de gardiens de l’entrée de la tente de la Rencontre, comme leurs ancêtres avaient gardé l’entrée du camp de l’Eternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Les premiers à s’établir de nouveau dans leurs propriétés et dans leurs villes respectives, furent des Israélites, des prêtres, des lévites, et desservants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Esd 2.43, 70 ; Né 7.72.
      marker-yv: yv-n
    - type: text
      text: ' du Temple.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Phinéas, fils d’Eléazar, avait été autrefois leur chef car l’Eternel était avec lui.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Zacharie, fils de Meshélémia, était aussi portier à l’entrée de la tente de la Rencontre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils étaient en tout 212 qui avaient été choisis comme portiers des entrées et ils avaient été recensés d’après leurs villages d’origine. David et Samuel le prophète les avaient établis dans leur fonction de façon permanente. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Eux et leurs descendants ont donc pour fonction de surveiller les portes du sanctuaire de l’Eternel, c’est-à-dire du sanctuaire de la tente. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il y avait des portiers des quatre côtés : à l’est, à l’ouest, au nord et au sud. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'D’autres portiers, qui demeuraient dans leurs villages respectifs, devaient de temps à autre venir auprès d’eux pendant sept jours. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Cependant, ces quatre portiers principaux étaient en fonction de façon permanente ; c’étaient des lévites et ils avaient la responsabilité des salles et des trésors du sanctuaire de Dieu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ils passaient la nuit dans les environs du sanctuaire de Dieu, puisqu’ils en avaient la garde et qu’ils devaient en ouvrir les portes chaque matin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le temple était fermé la nuit. La clé était gardée par les portiers qui veillaient autour du sanctuaire.
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Certains lévites avaient la responsabilité des ustensiles du service : ils les comptaient lorsqu’on les emportait et lorsqu’on les rapportait. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'D’autres étaient désignés pour veiller sur les ustensiles, y compris les ustensiles du sanctuaire, et sur la fleur de farine, le vin, l’huile, l’encens et les aromates. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'De plus, des gens des tribus de Juda, de Benjamin, d’Ephraïm et de Manassé s’établirent à Jérusalem : '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais c’étaient des membres des familles sacerdotales qui composaient les parfums aromatiques. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mattitia, l’un des lévites, fils aîné de Shalloum le Qoréite, était responsable de la fabrication des gâteaux cuits à la poêle. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: D’autres lévites, faisant partie des Qehatites, avaient la responsabilité de préparer chaque jour de repos les pains devant être exposés devant l’Eternel.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Les chefs de groupe familial des lévites affectés au chant avaient leurs chambres ; ils étaient dispensés de toute autre tâche, parce qu’ils étaient de service jour et nuit. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ce sont là des chefs de groupe familial des lévites chacun dans sa génération. Ils habitaient à Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famille de Saül
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (1 Ch 8.28-38)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Le père de Gabaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.29'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', Yeïel, habitait à Gabaon. Sa femme s’appelait Maaka. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Abdôn fut son fils premier-né, puis vinrent Tsour, Qish, Baal, Ner, Nadab, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Guedor, Ahyo, Zacharie et Miqloth.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Miqloth eut pour fils Shimeam. Ces derniers habitaient eux aussi à Jérusalem avec ceux qui leur étaient apparentés. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ner eut pour fils Qish, qui eut pour fils Saül ; les fils de Saül furent Jonathan, Malkishoua, Abinadab et Eshbaal. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Outaï, fils d’Ammihoud, ayant pour ascendants Omri, Imri, Bani, du lignage de Pérets, fils de Juda. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jonathan eut pour fils Merib-Baal, qui eut pour fils Michée. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Fils de Michée : Pitôn, Mélek et Tahréa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 8.36
        - type: text
          text: ') ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tahréa et Achaz.
      marker-yv: yv-n
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ahaz eut pour fils Yaera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits hébreux et l’ancienne version grecque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yaeda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 8.36
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' qui eut pour fils : Alémeth, Azmaveth et Zimri. Voici les descendants de Zimri en ligne directe : Motsa, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Binea, Rephaya, Eleasa, Atsel. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Atsel eut six fils, dont voici les noms : Azriqam, Bokrou, Ismaël, Shearia, Abdias et Hanân. Tels étaient les fils d’Atsel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Parmi les Shilonites, il y avait Asaya, le premier-né et ses fils. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Des descendants de Zérah, il y avait Yeouel. Les membres de la tribu de Juda installés à Jérusalem étaient au nombre de 690. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'De la tribu de Benjamin, il y avait Sallou, fils de Meshoullam, qui avait pour ascendants : Hodavia et Hassenoua ; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Yibneya, fils de Yeroham ; Ela, fils d’Ouzzi, et petit-fils de Mikri ; Meshoullam, fils de Shephatia et petit-fils de Reouel, le fils de Yibniya.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les membres de la tribu de Benjamin installés à Jérusalem étaient au nombre de 956 et tous ces hommes étaient des chefs de groupe familial dans leur groupe familial.
