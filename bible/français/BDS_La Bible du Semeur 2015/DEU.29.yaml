document_id: DEU.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les actes passés de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse convoqua tous les Israélites et leur dit : Vous avez constaté de vos propres yeux tout ce que l’Eternel a fait en Egypte au pharaon, à tous ses serviteurs et à tout son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous avez vu quelles grandes épreuves il leur a infligées, vous avez été témoins des signes miraculeux et des prodiges qu’il a accomplis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourtant, jusqu’à ce jour, l’Eternel ne vous a pas donné un cœur capable de comprendre, ni des yeux pour voir ou des oreilles pour entendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.8
        metadata:
          usfm: ROM.11.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant quarante ans, moi l’Eternel, je vous ai fait marcher dans le désert : ni vos vêtements, ni vos sandales ne se sont usés sur vous. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous n’avez pas eu de pain pour vous nourrir, ni de vin ou de bière pour vous désaltérer, afin que vous reconnaissiez que moi, je suis l’Eternel votre Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 16.1 à 17.7.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Finalement, vous êtes arrivés jusqu’ici dans cette contrée. Sihôn, roi de Heshbôn et Og, roi du Basan, ont marché contre nous et nous ont attaqués, mais nous les avons vaincus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.21-35
        metadata:
          usfm: NUM.21.21+NUM.21.22+NUM.21.23+NUM.21.24+NUM.21.25+NUM.21.26+NUM.21.27+NUM.21.28+NUM.21.29+NUM.21.30+NUM.21.31+NUM.21.32+NUM.21.33+NUM.21.34+NUM.21.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous avons conquis leur territoire et nous l’avons donné en possession aux tribus de Ruben et de Gad, ainsi qu’à la demi-tribu de Manassé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 32
        metadata:
          usfm: NUM.32
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Obéissez aux clauses de cette alliance et appliquez-les, afin que vous réussissiez dans tout ce que vous entreprendrez.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les perspectives d’avenir
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pour qui est cette alliance ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous vous présentez aujourd’hui devant l’Eternel votre Dieu, vous tous, chefs de tribus, responsables, officiers et tous les hommes d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vos enfants, vos femmes et les étrangers qui sont parmi vous dans votre camp et qui coupent le bois ou qui puisent de l’eau pour vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Travail le plus pénible accompli généralement par des esclaves (voir 11.10 ; Jos 9.21-27).
    marker-yv: yv-n
  - type: text
    text: ', sont aussi là. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous êtes là pour entrer dans l’alliance que l’Eternel votre Dieu veut conclure aujourd’hui avec vous avec imprécations, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'afin que vous soyez son peuple et qu’il soit lui-même votre Dieu, comme il vous l’a annoncé et comme il l’a promis par serment à vos ancêtres Abraham, Isaac et Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce n’est pas avec vous seuls que je conclus cette alliance avec imprécations. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elle concerne non seulement ceux qui sont ici aujourd’hui avec nous, et se tiennent devant l’Eternel notre Dieu, mais aussi tous ceux qui ne sont pas encore là.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Mise en garde contre l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous savez comment nous avons vécu en Egypte et comment nous avons traversé le territoire des peuples étrangers chez qui vous êtes passés. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous avez vu quelles idoles abominables de bois, de pierre, d’argent ou d’or ces peuples adorent. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qu’il n’y ait donc parmi vous personne, ni homme ni femme, ni famille ni tribu, dont le cœur se détourne dès aujourd’hui de l’Eternel notre Dieu, pour aller rendre un culte aux dieux de ces peuples étrangers. Craignez qu’il n’y ait parmi vous une racine d’où naîtraient des plantes aux fruits vénéneux et amers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12.15
        metadata:
          usfm: HEB.12.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Qu’il n’y ait personne parmi vous qui se félicite en lui-même après avoir entendu ces imprécations, et qui se dise : « Tout ira bien pour moi, si je suis les penchants de mon cœur obstiné », car le coupable entraînerait l’innocent dans sa ruine'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon l’ancienne version grecque, l’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en ajoutant l’ivresse à la soif, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte que certains traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en sorte que (le terrain) arrosé disparaisse en même temps que (le terrain) desséché.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Eternel ne consentirait pas à lui pardonner ; il laisserait s’enflammer sa colère et son indignation contre l’infidélité de cet homme qui verrait s’abattre sur lui toutes les malédictions inscrites dans ce livre, et il effacerait son souvenir de dessous le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il le séparerait de toutes les tribus d’Israël pour le livrer au malheur, en lui infligeant toutes les malédictions que comporte l’alliance et qui sont mentionnées dans ce livre de la Loi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le châtiment de l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque la génération à venir, celle de vos fils qui vous suivront, et les étrangers venus de pays lointains, verront les fléaux et les catastrophes que l’Eternel aura infligés à ce pays, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: lorsqu’ils constateront que tout est ravagé par le soufre, le sel et le feu, que la terre est inculte et improductive au point qu’aucune herbe n’y pousse, qu’elle est ruinée comme Sodome et Gomorrhe, Adma et Tseboïm, ces villes que l’Eternel a détruites dans sa colère ardente
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.24-25
        metadata:
          usfm: GEN.19.24+GEN.19.25
      - type: text
        text: . Adma et Tseboïm étaient des villes proches de Sodome et de Gomorrhe (Gn 10.19 ; 13.10 ; 14.8 ; Os 11.8).
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tous ces peuples se demanderont : « Pourquoi l’Eternel a-t-il ainsi traité ce pays ? Quelle était la cause de cette grande et ardente colère ? » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors on répondra : « Cela est arrivé parce qu’ils ont abandonné l’alliance que l’Eternel, le Dieu de leurs ancêtres, avait conclue avec eux après les avoir fait sortir d’Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils se sont mis à rendre un culte à d’autres divinités, ils ont adoré des dieux qu’ils ne connaissaient pas auparavant et qui ne leur avaient pas été donnés en partage. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est pourquoi la colère de l’Eternel s’est enflammée contre ce pays et il a fait venir sur lui toutes les malédictions inscrites dans ce livre. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dans sa colère, sa fureur et son indignation, il a déraciné ce peuple de son pays et l’a chassé dans un pays étranger où il vit encore aujourd’hui. »
- type: usfm
  marker: s2
  children:
  - type: text
    text: Appliquer ce qui est révélé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ce qui est caché est réservé à l’Eternel notre Dieu. Par contre, nous sommes concernés, nous et les générations suivantes, par ce qui a été révélé, par toutes les paroles de cette Loi qu’il nous faut appliquer.
