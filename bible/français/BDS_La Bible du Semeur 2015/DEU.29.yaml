document_id: DEU.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les actes passés de l’Eternel
  - type: text
    content: 'Moïse convoqua tous les Israélites et leur dit : Vous avez constaté de vos propres yeux tout ce que l’Eternel a fait en Egypte au pharaon, à tous ses serviteurs et à tout son pays. '
  '10':
  - type: text
    content: Vos enfants, vos femmes et les étrangers qui sont parmi vous dans votre camp et qui coupent le bois ou qui puisent de l’eau pour vous
  - type: note
    content: Travail le plus pénible accompli généralement par des esclaves (voir 11.10 ; Jos 9.21-27).
  - type: text
    content: ', sont aussi là. '
  '11':
  - type: text
    content: 'Vous êtes là pour entrer dans l’alliance que l’Eternel votre Dieu veut conclure aujourd’hui avec vous avec imprécations, '
  '12':
  - type: text
    content: 'afin que vous soyez son peuple et qu’il soit lui-même votre Dieu, comme il vous l’a annoncé et comme il l’a promis par serment à vos ancêtres Abraham, Isaac et Jacob. '
  '13':
  - type: text
    content: 'Ce n’est pas avec vous seuls que je conclus cette alliance avec imprécations. '
  '14':
  - type: text
    content: Elle concerne non seulement ceux qui sont ici aujourd’hui avec nous, et se tiennent devant l’Eternel notre Dieu, mais aussi tous ceux qui ne sont pas encore là.
  - type: heading
    content: Mise en garde contre l’idolâtrie
  '15':
  - type: text
    content: 'Vous savez comment nous avons vécu en Egypte et comment nous avons traversé le territoire des peuples étrangers chez qui vous êtes passés. '
  '16':
  - type: text
    content: 'Vous avez vu quelles idoles abominables de bois, de pierre, d’argent ou d’or ces peuples adorent. '
  '17':
  - type: text
    content: Qu’il n’y ait donc parmi vous personne, ni homme ni femme, ni famille ni tribu, dont le cœur se détourne dès aujourd’hui de l’Eternel notre Dieu, pour aller rendre un culte aux dieux de ces peuples étrangers. Craignez qu’il n’y ait parmi vous une racine d’où naîtraient des plantes aux fruits vénéneux et amers
  - type: note
    content: Cité en Hé 12.15.
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Qu’il n’y ait personne parmi vous qui se félicite en lui-même après avoir entendu ces imprécations, et qui se dise : « Tout ira bien pour moi, si je suis les penchants de mon cœur obstiné », car le coupable entraînerait l’innocent dans sa ruine'
  - type: note
    content: 'Selon l’ancienne version grecque, l’hébreu a : en ajoutant l’ivresse à la soif, texte que certains traduisent en sorte que (le terrain) arrosé disparaisse en même temps que (le terrain) desséché.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'L’Eternel ne consentirait pas à lui pardonner ; il laisserait s’enflammer sa colère et son indignation contre l’infidélité de cet homme qui verrait s’abattre sur lui toutes les malédictions inscrites dans ce livre, et il effacerait son souvenir de dessous le ciel. '
  '2':
  - type: text
    content: 'Vous avez vu quelles grandes épreuves il leur a infligées, vous avez été témoins des signes miraculeux et des prodiges qu’il a accomplis. '
  '20':
  - type: text
    content: Il le séparerait de toutes les tribus d’Israël pour le livrer au malheur, en lui infligeant toutes les malédictions que comporte l’alliance et qui sont mentionnées dans ce livre de la Loi.
  - type: heading
    content: Le châtiment de l’idolâtrie
  '21':
  - type: text
    content: 'Lorsque la génération à venir, celle de vos fils qui vous suivront, et les étrangers venus de pays lointains, verront les fléaux et les catastrophes que l’Eternel aura infligés à ce pays, '
  '22':
  - type: text
    content: lorsqu’ils constateront que tout est ravagé par le soufre, le sel et le feu, que la terre est inculte et improductive au point qu’aucune herbe n’y pousse, qu’elle est ruinée comme Sodome et Gomorrhe, Adma et Tseboïm, ces villes que l’Eternel a détruites dans sa colère ardente
  - type: note
    content: Voir Gn 19.24-25. Adma et Tseboïm étaient des villes proches de Sodome et de Gomorrhe (Gn 10.19 ; 13.10 ; 14.8 ; Os 11.8).
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'tous ces peuples se demanderont : « Pourquoi l’Eternel a-t-il ainsi traité ce pays ? Quelle était la cause de cette grande et ardente colère ? » '
  '24':
  - type: text
    content: 'Alors on répondra : « Cela est arrivé parce qu’ils ont abandonné l’alliance que l’Eternel, le Dieu de leurs ancêtres, avait conclue avec eux après les avoir fait sortir d’Egypte. '
  '25':
  - type: text
    content: 'Ils se sont mis à rendre un culte à d’autres divinités, ils ont adoré des dieux qu’ils ne connaissaient pas auparavant et qui ne leur avaient pas été donnés en partage. '
  '26':
  - type: text
    content: 'C’est pourquoi la colère de l’Eternel s’est enflammée contre ce pays et il a fait venir sur lui toutes les malédictions inscrites dans ce livre. '
  '27':
  - type: text
    content: Dans sa colère, sa fureur et son indignation, il a déraciné ce peuple de son pays et l’a chassé dans un pays étranger où il vit encore aujourd’hui. »
  - type: heading
    content: Appliquer ce qui est révélé
  '28':
  - type: text
    content: Ce qui est caché est réservé à l’Eternel notre Dieu. Par contre, nous sommes concernés, nous et les générations suivantes, par ce qui a été révélé, par toutes les paroles de cette Loi qu’il nous faut appliquer.
  '3':
  - type: text
    content: Pourtant, jusqu’à ce jour, l’Eternel ne vous a pas donné un cœur capable de comprendre, ni des yeux pour voir ou des oreilles pour entendre
  - type: note
    content: Voir Rm 11.8.
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Pendant quarante ans, moi l’Eternel, je vous ai fait marcher dans le désert : ni vos vêtements, ni vos sandales ne se sont usés sur vous. '
  '5':
  - type: text
    content: Vous n’avez pas eu de pain pour vous nourrir, ni de vin ou de bière pour vous désaltérer, afin que vous reconnaissiez que moi, je suis l’Eternel votre Dieu
  - type: note
    content: Voir Ex 16.1 à 17.7.
  - type: text
    content: '. '
  '6':
  - type: text
    content: Finalement, vous êtes arrivés jusqu’ici dans cette contrée. Sihôn, roi de Heshbôn et Og, roi du Basan, ont marché contre nous et nous ont attaqués, mais nous les avons vaincus
  - type: note
    content: Voir Nb 21.21-35.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Nous avons conquis leur territoire et nous l’avons donné en possession aux tribus de Ruben et de Gad, ainsi qu’à la demi-tribu de Manassé
  - type: note
    content: Voir Nb 32.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Obéissez aux clauses de cette alliance et appliquez-les, afin que vous réussissiez dans tout ce que vous entreprendrez.
  - type: heading
    content: Les perspectives d’avenir
  - type: heading
    content: Pour qui est cette alliance ?
  '9':
  - type: text
    content: 'Vous vous présentez aujourd’hui devant l’Eternel votre Dieu, vous tous, chefs de tribus, responsables, officiers et tous les hommes d’Israël. '
