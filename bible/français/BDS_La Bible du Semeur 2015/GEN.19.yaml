document_id: GEN.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La destruction de Sodome et de Gomorrhe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soir, les deux anges arrivèrent à Sodome. Loth était assis à la porte de la ville. En les voyant, il se leva pour aller à leur rencontre et se prosterna face contre terre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les deux hommes venus chez Loth se saisirent de lui, le ramenèrent vers eux à l’intérieur de la maison, et refermèrent la porte. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils frappèrent d’aveuglement les gens massés à l’entrée de la maison, jeunes et vieux, de sorte qu’ils n’arrivaient plus à trouver la porte.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les deux hommes dirent à Loth : Qui as-tu encore de ta parenté dans cette ville ? Des gendres, des fils et des filles ? Qui que ce soit, fais-les sortir de là : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: nous allons détruire cette ville, parce que de graves accusations contre ses habitants sont montées jusque devant l’Eternel. C’est pourquoi l’Eternel nous a envoyés pour détruire la ville.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là-dessus, Loth sortit et alla trouver les fiancés qui devaient prochainement épouser ses filles.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Allons, leur dit-il, il faut quitter ce lieu car l’Eternel va détruire la ville !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les fiancés prirent ses paroles pour une plaisanterie.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que l’aube parut, les anges se firent pressants. Ils dirent à Loth : Debout ! Emmène ta femme et tes deux filles qui sont ici, si tu ne veux pas périr emporté par le jugement qui va s’abattre sur cette ville.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme il hésitait encore, les deux hommes les prirent par la main, lui, sa femme et ses deux filles, car Dieu voulait les épargner, et ils les entraînèrent hors de la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 P 2.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois hors de la ville, l’un des hommes lui dit : Sauve-toi ! Il y va de ta vie. Ne regarde pas derrière toi et ne t’arrête nulle part dans la plaine ! Fuis vers la montagne si tu ne veux pas périr !'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Oh non, mon seigneur, lui dit Loth, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ton serviteur a déjà obtenu ta faveur et tu as été très bon envers moi en me sauvant la vie ; je ne pourrai pas m’enfuir jusqu’à la montagne, je risque d’être atteint par le malheur et de mourir. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : S’il vous plaît, mes seigneurs, acceptez de faire un détour et de venir loger dans la maison de votre serviteur. Vous pourrez vous y laver les pieds, et vous y passerez la nuit, avant de poursuivre votre route.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Non, lui répondirent-ils, nous passerons la nuit sur la place.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a cette ville là-bas ; elle est assez proche pour que j’aie le temps de m’y réfugier. Elle est insignifiante, permets-moi de fuir jusque-là pour sauver ma vie ! N’est-elle pas peu de chose ?
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Bon, lui dit l’ange, je t’accorde encore cette faveur et je ne ferai pas venir de catastrophe sur la ville dont tu parles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais dépêche-toi de t’y sauver, car je ne peux rien faire avant que tu y sois arrivé ! C’est pourquoi on a nommé la ville Tsoar (Peu de chose).
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où le soleil se levait, Loth arrivait à Tsoar. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel fit tomber sur Sodome et sur Gomorrhe une pluie de soufre enflammé par un feu qui venait du ciel, de l’Eternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit venir une catastrophe sur ces villes ainsi que sur toute la région. Toute la population de ces villes périt ainsi que la végétation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Dt 29.22-23 ; Jr 20.16 ; Lm 4.6 ; Am 4.11 ; Mt 10.15 ; 11.23-24 ; Lc 10.12 ; 17.29 ; 2 P 2.6 ; Jd 1.7.
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La femme de Loth regarda derrière elle et fut changée en une statue de sel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 17.32
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham se rendit de bon matin à l’endroit où il s’était tenu en présence de l’Eternel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il porta son regard vers Sodome et Gomorrhe et vers toute la plaine environnante et il vit s’élever de la terre une épaisse fumée, comme celle d’un immense brasier.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, lorsque Dieu détruisit les villes de la plaine, il n’oublia pas Abraham et il fit échapper Loth à la catastrophe par laquelle il anéantit les villes où Loth avait habité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une descendance pour Loth
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Loth insista tant qu’ils finirent par accepter de se rendre dans sa maison. Il leur fit préparer un festin et cuire du pain sans levain et ils se mirent à manger.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par la suite, Loth quitta Tsoar car il avait peur d’y demeurer, et il alla habiter avec ses deux filles dans la montagne. Il s’installa avec elles dans une caverne. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’aînée dit à la cadette : Notre père est déjà âgé et il n’y a pas d’autre homme dans ce pays pour s’unir à nous selon l’usage de tout le monde. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Allons ! faisons-lui boire du vin et couchons avec lui pour lui donner une descendance. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette nuit-là, elles firent donc boire du vin à leur père et l’aînée vint partager la couche de son père, qui ne se rendit compte de rien, ni quand elle se coucha, ni quand elle se leva. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, l’aînée dit à la plus jeune : La nuit dernière j’ai couché avec mon père ; enivrons-le encore ce soir et tu iras partager son lit. Ainsi nous lui donnerons une descendance.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce soir-là, elles firent donc encore boire du vin à leur père et la cadette alla coucher avec lui, mais il ne s’aperçut ni quand elle se coucha ni quand elle se leva. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les deux filles de Loth devinrent enceintes de leur père.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’aînée eut un fils qu’elle appela Moab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moabites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ont occupé une région à l’est de la mer Morte. Ils furent généralement hostiles aux Israélites.
      marker-yv: yv-n
    - type: text
      text: ' (Issu du père) ; c’est l’ancêtre des Moabites qui existent encore aujourd’hui. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La cadette aussi eut un fils, qu’elle appela Ben-Ammi (Fils de mon parent) ; c’est l’ancêtre des Ammonites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ammonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se fixèrent sur le plateau à l’est du Jourdain. Eux aussi furent des ennemis héréditaires des Israélites.
      marker-yv: yv-n
    - type: text
      text: ' qui existent encore aujourd’hui.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils furent sur le point de se coucher, la maison fut encerclée par les gens de la ville : tous les hommes de Sodome, jeunes et vieux, étaient venus là du bout de la ville. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils appelèrent Loth et lui demandèrent : Où sont ces hommes qui sont venus chez toi cette nuit ? Amène-les nous pour que nous entrions en relation avec eux !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Loth sortit sur le pas de sa porte et referma la porte derrière lui.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Non, mes frères, leur dit-il, je vous en supplie, ne commettez pas le mal ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ecoutez : j’ai deux filles qui sont encore vierges. Je vais vous les amener, vous leur ferez ce qui vous plaira, mais ne touchez pas ces hommes puisqu’ils sont venus s’abriter sous mon toit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le respect des règles de l’hospitalité impliquait la protection des hôtes coûte que coûte.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Ote-toi de là ! lui crièrent-ils. Puis ils ajoutèrent : Voyez-moi cet individu, il est venu ici comme étranger et maintenant, il veut jouer au juge ! Eh bien, nous t’en ferons voir plus qu’à eux.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils poussèrent violemment Loth de côté et s’approchèrent de la porte pour l’enfoncer. '
