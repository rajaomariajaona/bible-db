document_id: NUM.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les problèmes d’héritage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tselophhad, un descendant de Joseph par Manassé, Makir, Galaad et Hépher, avait eu cinq filles : Mahla, Noa, Hogla, Milka et Tirtsa. Elles vinrent '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'se présenter devant Moïse, devant le prêtre Eléazar, devant les princes et toute la communauté à l’entrée de la tente de la Rencontre. Elles déclarèrent : '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Notre père est mort dans le désert, mais il ne faisait pas partie du groupe des partisans de Qoré qui se sont ligués contre l’Eternel. Il est décédé pour ses propres fautes sans laisser de fils. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Faut-il que le nom de notre père disparaisse de sa famille parce qu’il n’a pas laissé de fils ? Donne-nous aussi une propriété comme aux frères de notre père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moïse porta leur affaire devant l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Eternel lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les filles de Tselophhad ont raison. Tu leur donneras une propriété en patrimoine comme aux frères de leur père et tu leur transmettras le patrimoine foncier de leur père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36.2'
        metadata:
          usfm: NUM.36.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'De plus, tu déclareras aux Israélites : Si un homme meurt sans laisser de fils, vous transmettrez son héritage à sa fille. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'S’il n’a pas de fille, vous donnerez son héritage à ses frères. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'S’il n’a pas de frère, l’héritage reviendra à ses oncles paternels '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ou, à défaut, à son plus proche parent dans sa famille. Ce dernier en deviendra le propriétaire. Ce sera pour les Israélites un article de loi conforme aux ordres que je te donne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué, successeur de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Eternel dit à Moïse : Gravis cette montagne de la chaîne des Abarim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Qui domine la rive orientale du Jourdain et de la mer Morte. Les principaux sommets sont les monts Pisga (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.20'
        metadata:
          usfm: NUM.21.20
      - type: text
        text: ), Peor (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23.28'
        metadata:
          usfm: NUM.23.28
      - type: text
        text: ) et Nébo (33.47 ; Dt 32.49) d’où l’on domine tout le pays d’Israël. C’est sur cette montagne que Dieu a conduit Moïse (voir Dt 32.49 ; 34.1).
    marker-yv: yv-n
  - type: text
    text: ' et contemple le pays que je vais donner aux Israélites'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 12-13, voir Dt 3.23-27 ; 32.48-52.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu le regarderas, puis tu iras rejoindre tes ancêtres décédés comme ton frère Aaron, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: car vous avez désobéi à mon ordre dans le désert de Tsîn lorsque la communauté me cherchait querelle. Vous n’avez pas honoré ma sainteté devant le peuple, en faisant jaillir de l’eau. Il s’agit de l’épisode des eaux de Meriba qui eut lieu à Qadesh, dans le désert de Tsîn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20.1-13
        metadata:
          usfm: NUM.20.1+NUM.20.2+NUM.20.3+NUM.20.4+NUM.20.5+NUM.20.6+NUM.20.7+NUM.20.8+NUM.20.9+NUM.20.10+NUM.20.11+NUM.20.12+NUM.20.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse lui répondit : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que l’Eternel, qui dispose du souffle de vie de toute créature, désigne un homme pour chef de la communauté, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: quelqu’un qui marche au combat à leur tête, et qui conduise leurs mouvements militaires, afin que la communauté de l’Eternel ne soit pas comme un troupeau sans berger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’Eternel dit à Moïse : Prends avec toi Josué'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 24.13
        metadata:
          usfm: EXO.24.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Noun, un homme en qui réside l’Esprit, et pose ta main sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu le placeras devant le prêtre Eléazar et devant toute la communauté, et tu l’investiras de ses fonctions devant tous. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu lui transmettras une part de ton autorité afin que toute la communauté des Israélites lui obéisse. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il se tiendra devant le prêtre Eléazar, et celui-ci me consultera pour lui par l’ourim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.30
        metadata:
          usfm: EXO.28.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . C’est d’après ce qu’il dira que Josué et toute la communauté des Israélites opéreront leurs mouvements militaires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse fit ce que l’Eternel lui avait ordonné : il fit venir Josué et le plaça devant le prêtre Eléazar et devant toute la communauté. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il posa ses mains sur lui et l’établit dans sa charge, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 34.9
        metadata:
          usfm: DEU.34.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
