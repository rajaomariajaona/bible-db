document_id: NUM.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les problèmes d’héritage
  - type: text
    content: 'Tselophhad, un descendant de Joseph par Manassé, Makir, Galaad et Hépher, avait eu cinq filles : Mahla, Noa, Hogla, Milka et Tirtsa. Elles vinrent '
  '10':
  - type: text
    content: 'S’il n’a pas de frère, l’héritage reviendra à ses oncles paternels '
  '11':
  - type: text
    content: ou, à défaut, à son plus proche parent dans sa famille. Ce dernier en deviendra le propriétaire. Ce sera pour les Israélites un article de loi conforme aux ordres que je te donne.
  - type: heading
    content: Josué, successeur de Moïse
  '12':
  - type: text
    content: 'L’Eternel dit à Moïse : Gravis cette montagne de la chaîne des Abarim'
  - type: note
    content: Qui domine la rive orientale du Jourdain et de la mer Morte. Les principaux sommets sont les monts Pisga (21.20), Peor (23.28) et Nébo (33.47 ; Dt 32.49) d’où l’on domine tout le pays d’Israël. C’est sur cette montagne que Dieu a conduit Moïse (voir Dt 32.49 ; 34.1).
  - type: text
    content: ' et contemple le pays que je vais donner aux Israélites'
  - type: note
    content: Pour les v. 12-13, voir Dt 3.23-27 ; 32.48-52.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Tu le regarderas, puis tu iras rejoindre tes ancêtres décédés comme ton frère Aaron, '
  '14':
  - type: text
    content: car vous avez désobéi à mon ordre dans le désert de Tsîn lorsque la communauté me cherchait querelle. Vous n’avez pas honoré ma sainteté devant le peuple, en faisant jaillir de l’eau. Il s’agit de l’épisode des eaux de Meriba qui eut lieu à Qadesh, dans le désert de Tsîn
  - type: note
    content: Voir 20.1-13.
  - type: text
    content: .
  '15':
  - type: text
    content: 'Moïse lui répondit : '
  '16':
  - type: text
    content: 'Que l’Eternel, qui dispose du souffle de vie de toute créature, désigne un homme pour chef de la communauté, '
  '17':
  - type: text
    content: quelqu’un qui marche au combat à leur tête, et qui conduise leurs mouvements militaires, afin que la communauté de l’Eternel ne soit pas comme un troupeau sans berger.
  '18':
  - type: text
    content: 'L’Eternel dit à Moïse : Prends avec toi Josué'
  - type: note
    content: Voir Ex 24.13.
  - type: text
    content: ', fils de Noun, un homme en qui réside l’Esprit, et pose ta main sur lui. '
  '19':
  - type: text
    content: 'Tu le placeras devant le prêtre Eléazar et devant toute la communauté, et tu l’investiras de ses fonctions devant tous. '
  '2':
  - type: text
    content: 'se présenter devant Moïse, devant le prêtre Eléazar, devant les princes et toute la communauté à l’entrée de la tente de la Rencontre. Elles déclarèrent : '
  '20':
  - type: text
    content: 'Tu lui transmettras une part de ton autorité afin que toute la communauté des Israélites lui obéisse. '
  '21':
  - type: text
    content: Il se tiendra devant le prêtre Eléazar, et celui-ci me consultera pour lui par l’ourim
  - type: note
    content: Voir Ex 28.30.
  - type: text
    content: . C’est d’après ce qu’il dira que Josué et toute la communauté des Israélites opéreront leurs mouvements militaires.
  '22':
  - type: text
    content: 'Moïse fit ce que l’Eternel lui avait ordonné : il fit venir Josué et le plaça devant le prêtre Eléazar et devant toute la communauté. '
  '23':
  - type: text
    content: Il posa ses mains sur lui et l’établit dans sa charge, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse
  - type: note
    content: Voir Dt 34.9.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Notre père est mort dans le désert, mais il ne faisait pas partie du groupe des partisans de Qoré qui se sont ligués contre l’Eternel. Il est décédé pour ses propres fautes sans laisser de fils. '
  '4':
  - type: text
    content: Faut-il que le nom de notre père disparaisse de sa famille parce qu’il n’a pas laissé de fils ? Donne-nous aussi une propriété comme aux frères de notre père.
  '5':
  - type: text
    content: Moïse porta leur affaire devant l’Eternel.
  '6':
  - type: text
    content: 'L’Eternel lui dit : '
  '7':
  - type: text
    content: Les filles de Tselophhad ont raison. Tu leur donneras une propriété en patrimoine comme aux frères de leur père et tu leur transmettras le patrimoine foncier de leur père
  - type: note
    content: Voir 36.2.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'De plus, tu déclareras aux Israélites : Si un homme meurt sans laisser de fils, vous transmettrez son héritage à sa fille. '
  '9':
  - type: text
    content: 'S’il n’a pas de fille, vous donnerez son héritage à ses frères. '
