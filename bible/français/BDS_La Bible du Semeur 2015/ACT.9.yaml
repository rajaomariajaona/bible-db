document_id: ACT.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La conversion de Saul
  - type: text
    content: 'Saul, qui ne pensait qu’à menacer et à tuer les disciples du Seigneur, se rendit chez le grand-prêtre '
  '10':
  - type: text
    content: 'Or, à Damas, vivait un disciple nommé Ananias. Le Seigneur lui apparut dans une vision et lui dit : '
  - type: text
    content: Ananias !
  - type: text
    content: – Oui, Seigneur, répondit-il.
  '11':
  - type: text
    content: 'Et le Seigneur lui dit : '
  - type: text
    content: Lève-toi, et va dans la rue que l’on appelle la rue Droite et, dans la maison de Judas, demande à voir un nommé Saul, originaire de Tarse
  - type: note
    content: 'Tarse: capitale de la Cilicie, à une quinzaine de kilomètres de la mer.'
  - type: text
    content: . Car il prie
  - type: text
    content: ' '
  '12':
  - type: text
    content: et, dans une vision, il a vu un homme du nom d’Ananias entrer dans la maison et lui imposer les mains pour lui rendre la vue.
  '13':
  - type: text
    content: '– Mais Seigneur, répliqua Ananias, j’ai beaucoup entendu parler de cet homme ; de plusieurs côtés, on m’a dit tout le mal qu’il a fait aux membres de ton peuple saint à Jérusalem. '
  '14':
  - type: text
    content: De plus, il est venu ici muni de pouvoirs, que lui ont accordés les chefs des prêtres, pour arrêter tous ceux qui te prient.
  '15':
  - type: text
    content: 'Mais le Seigneur lui dit : '
  - type: text
    content: 'Va ! car j’ai choisi cet homme pour me servir : il fera connaître qui je suis aux peuples étrangers et à leurs rois, ainsi qu’aux Israélites.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: Je lui montrerai moi-même tout ce qu’il devra souffrir pour moi.
  '17':
  - type: text
    content: 'Ananias partit donc et, arrivé dans la maison, il imposa les mains à Saul et lui dit : Saul, mon frère, le Seigneur Jésus qui t’est apparu sur le chemin par lequel tu venais, m’a envoyé pour que la vue te soit rendue et que tu sois rempli du Saint-Esprit.'
  '18':
  - type: text
    content: 'Au même instant, ce fut comme si des écailles tombaient des yeux de Saul et il vit de nouveau. Alors il se leva et fut baptisé, '
  '19':
  - type: text
    content: puis il mangea et reprit des forces.
  - type: heading
    content: Saul, témoin de Jésus-Christ
  - type: text
    content: 'Saul passa quelques jours parmi les disciples de Damas. '
  '2':
  - type: text
    content: et lui demanda des lettres de recommandation pour les synagogues de Damas. Ces lettres l’autorisaient, s’il trouvait là-bas des hommes ou des femmes qui suivaient la Voie du Seigneur, à les arrêter et à les amener à Jérusalem
  - type: note
    content: Le prétendu crime était trop grave pour être jugé par un tribunal juif local. Seul le Grand-Conseil de Jérusalem était habilité à juger de tels cas. Les Romains admettaient l’extradition pour motif religieux.
  - type: text
    content: .
  '20':
  - type: text
    content: Et dans les synagogues, il se mit tout de suite à proclamer que Jésus est le Fils de Dieu.
  '21':
  - type: text
    content: 'Ses auditeurs n’en revenaient pas. Tous disaient : Voyons, n’est-ce pas lui qui s’acharnait, à Jérusalem, contre ceux qui, dans leurs prières, invoquent ce nom-là ? N’est-il pas venu ici exprès pour les arrêter et les ramener aux chefs des prêtres ?'
  '22':
  - type: text
    content: 'Mais Saul s’affermissait de jour en jour dans la foi et les Juifs qui habitaient à Damas ne savaient plus que dire, car il leur démontrait que Jésus est le Messie. '
  '23':
  - type: text
    content: 'Après un certain temps, les Juifs résolurent de le faire mourir. '
  '24':
  - type: text
    content: 'Saul eut vent de leur complot. Jour et nuit, ils faisaient même surveiller les portes de la ville avec l’intention de le tuer. '
  '25':
  - type: text
    content: Mais une nuit, les disciples qu’il enseignait l’emmenèrent et le firent descendre dans une corbeille le long du rempart.
  '26':
  - type: text
    content: 'A son arrivée à Jérusalem, il essaya de se joindre aux disciples. Mais tous avaient peur de lui, car ils ne croyaient pas qu’il fût vraiment devenu un disciple. '
  '27':
  - type: text
    content: Barnabas le prit avec lui, le conduisit auprès des apôtres et leur raconta comment, sur le chemin de Damas, Saul avait vu le Seigneur, comment le Seigneur lui avait parlé et avec quel courage il avait prêché à Damas au nom de Jésus.
  '28':
  - type: text
    content: 'Dès lors, il se joignit à eux, allant et venant avec eux à Jérusalem, et parlant ouvertement au nom du Seigneur. '
  '29':
  - type: text
    content: 'Il avait aussi beaucoup d’entretiens et de discussions avec les Juifs de culture grecque ; mais ceux-là aussi cherchèrent à le faire mourir. '
  '3':
  - type: text
    content: 'Il se dirigeait donc vers Damas et approchait déjà de cette ville quand, soudain, il fut environné d’une lumière éclatante qui venait du ciel. '
  '30':
  - type: text
    content: Quand les frères l’apprirent, ils le conduisirent jusqu’à Césarée et, de là, le firent partir pour Tarse.
  - type: heading
    content: Pierre visite l’Eglise de Judée
  '31':
  - type: text
    content: Dans toute la Judée, la Galilée et la Samarie, l’Eglise jouissait alors de la paix. Elle grandissait dans la foi, vivait dans l’obéissance au Seigneur, et s’accroissait en nombre, grâce au soutien du Saint-Esprit.
  '32':
  - type: text
    content: Pierre, qui parcourait tout le pays, passa aussi chez les membres du peuple saint qui habitaient à Lydda
  - type: note
    content: 'Lydda: à une vingtaine de kilomètres de Jaffa.'
  - type: text
    content: '. '
  '33':
  - type: text
    content: Il y trouva un homme du nom d’Enée qui n’avait pas quitté son lit depuis huit ans parce qu’il était paralysé.
  '34':
  - type: text
    content: – Enée, lui dit Pierre, Jésus-Christ te guérit, lève-toi et fais ton lit !
  - type: text
    content: 'Il se leva aussitôt. '
  '35':
  - type: text
    content: Tous ceux qui habitaient le village de Lydda et la plaine de Saron le virent et se convertirent au Seigneur.
  '36':
  - type: text
    content: 'A Jaffa vivait une femme, disciple du Seigneur, nommée Tabitha (en grec : Dorcas, ce qui signifie la Gazelle). Elle faisait beaucoup de bien autour d’elle et venait en aide aux pauvres. '
  '37':
  - type: text
    content: A cette époque, elle tomba malade et mourut. Après avoir fait sa toilette funèbre, on la déposa dans la chambre, au premier étage de sa maison
  - type: note
    content: Voir note 1.13.
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Or Jaffa est tout près de Lydda, et les disciples avaient appris que Pierre se trouvait là ; ils lui envoyèrent donc deux hommes pour l’inviter en lui disant : Dépêche-toi de venir chez nous.'
  '39':
  - type: text
    content: Pierre les suivit aussitôt. A son arrivée, on le conduisit dans la chambre. Toutes les veuves l’accueillirent en pleurant et lui montrèrent les robes et autres vêtements que Tabitha avait confectionnés quand elle était encore des leurs.
  '4':
  - type: text
    content: 'Il tomba à terre et entendit une voix qui lui disait : '
  - type: text
    content: Saul, Saul, pourquoi me persécutes-tu ?
  - type: text
    content: – Qui es-tu, Seigneur ? demanda-t-il.
  - type: text
    content: 'La voix reprit : '
  '40':
  - type: text
    content: 'Pierre fit sortir tout le monde, se mit à genoux et pria. Puis, se tournant vers le corps, il dit : Tabitha, lève-toi !'
  - type: text
    content: 'Elle ouvrit les yeux, aperçut Pierre et s’assit. '
  '41':
  - type: text
    content: Celui-ci lui donna la main et l’aida à se lever ; puis il rappela les croyants et les veuves et la leur présenta vivante.
  '42':
  - type: text
    content: 'La nouvelle eut vite fait le tour de la ville et beaucoup crurent au Seigneur. '
  '43':
  - type: text
    content: Pierre resta quelque temps encore à Jaffa ; il logeait chez un tanneur nommé Simon.
  '5':
  - type: text
    content: Je suis, moi, Jésus, que tu persécutes.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais relève-toi, entre dans la ville, et là on te dira ce que tu dois faire.
  '7':
  - type: text
    content: 'Ses compagnons de voyage restèrent figés sur place, muets de stupeur : ils entendaient bien la voix, mais ne voyaient personne. '
  '8':
  - type: text
    content: Saul se releva de terre, mais il avait beau ouvrir les yeux, il ne voyait plus. Il fallut le prendre par la main pour le conduire à Damas.
  '9':
  - type: text
    content: Il resta aveugle pendant trois jours, et ne mangea ni ne but.
