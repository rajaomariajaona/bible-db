document_id: PSA.89,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Où sont les grâces d’autrefois ?
  - type: text
    content: Méditation
  - type: note
    content: Sens incertain.
  - type: text
    content: ' d’Etân'
  - type: note
    content: Voir 1 R 5.11 ; 1 Ch 6.16-29 ; 15.16-19.
  - type: text
    content: ' l’Ezrahite.'
  '10':
  - type: text
    content: Oui, c’est toi seul qui maîtrises ╵l’orgueil de la mer.
  - type: text
    content: Quand ses vagues se déchaînent, ╵toi, tu les apaises.
  '11':
  - type: text
    content: C’est toi qui as écrasé Rahav, ╵le dragon d’Egypte, ╵le blessant à mort
  - type: note
    content: Voir Ps 87.4 et la note.
  - type: text
    content: .
  - type: text
    content: Par ton bras puissant ╵tu as dispersé tes ennemis.
  '12':
  - type: text
    content: A toi appartient le ciel ╵et à toi la terre,
  - type: text
    content: le monde avec tout ce qui s’y trouve, ╵c’est toi qui les as fondés.
  '13':
  - type: text
    content: Le nord et le sud, ╵tu les as créés.
  - type: text
    content: Le mont Thabor et l’Hermon
  - type: note
    content: Sommets imposants du nord d’Israël.
  - type: text
    content: ', ╵avec joie, t’acclament.'
  '14':
  - type: text
    content: Ton bras est armé de force,
  - type: text
    content: ta main est puissante, ╵tu as levé ta main droite
  - type: note
    content: Signe de puissance (le dieu Baal était souvent représenté avec la main droite levée).
  - type: text
    content: .
  '15':
  - type: text
    content: Les assises de ton trône ╵sont justice et droit.
  - type: text
    content: L’amour et la vérité ╵marchent devant toi.
  '16':
  - type: text
    content: Oh ! qu’il est heureux, le peuple ╵qui sait t’acclamer.
  - type: text
    content: Eternel, à ta lumière, ╵il chemine.
  '17':
  - type: text
    content: Grâce à toi, ╵il se réjouit sans cesse,
  - type: text
    content: grâce à ta justice, ╵il s’élève !
  '18':
  - type: text
    content: Car c’est toi qui fais ╵sa gloire et sa force,
  - type: text
    content: et c’est grâce à ta faveur ╵que nous triomphons.
  '19':
  - type: text
    content: Oui, de l’Eternel dépend ╵notre protecteur,
  - type: text
    content: notre roi est dans la main ╵du Saint d’Israël.
  '2':
  - type: text
    content: Je veux chanter à jamais ╵les bontés de l’Eternel
  - type: text
    content: et proclamer d’âge en âge ╵sa fidélité.
  '20':
  - type: text
    content: 'Autrefois, tu as parlé ╵dans une révélation ╵à ceux qui sont attachés à toi. ╵Tu as dit :'
  - type: text
    content: « J’ai prêté secours ╵à un homme valeureux ;
  - type: text
    content: 'au milieu du peuple, ╵j’ai élevé un jeune homme ╵à une haute fonction :'
  '21':
  - type: text
    content: j’ai trouvé mon serviteur David
  - type: note
    content: Voir 1 S 13.14 et Ac 13.22.
  - type: text
    content: '  ;'
  - type: text
    content: de mon huile sainte, ╵je lui ai donné l’onction
  - type: note
    content: Voir 1 S 16.12-13.
  - type: text
    content: .
  '22':
  - type: text
    content: Je le soutiendrai ╵de ma forte main,
  - type: text
    content: et mon bras le rendra fort.
  '23':
  - type: text
    content: Ses ennemis ne pourront ╵jamais le surprendre,
  - type: text
    content: aucun homme inique ╵ne pourra le maltraiter.
  '24':
  - type: text
    content: J’écraserai devant lui ╵tous ses adversaires,
  - type: text
    content: et je frapperai ╵ceux qui le haïssent.
  '25':
  - type: text
    content: Toujours mon fidèle amour ╵l’accompagnera.
  - type: text
    content: Grâce à moi, ╵il relèvera le front.
  '26':
  - type: text
    content: J’étendrai jusqu’à la mer ╵sa domination.
  - type: text
    content: J’établirai son empire ╵jusque sur les fleuves
  - type: note
    content: La mer est la Méditerranée, les fleuves l’Euphrate et ses divers bras ou canaux ; c’étaient les limites des domaines promis à David et à Salomon.
  - type: text
    content: .
  '27':
  - type: text
    content: 'Il m’invoquera ╵par ces mots : ╵“Toi, tu es mon Père,'
  - type: text
    content: et mon Dieu, ╵le rocher ╵où je trouve le salut.”
  '28':
  - type: text
    content: Et moi, je ferai de lui ╵mon fils premier-né,
  - type: text
    content: le plus élevé ╵des rois de la terre
  - type: note
    content: Voir Col 1.15.
  - type: text
    content: .
  '29':
  - type: text
    content: Je lui garderai toujours ╵toute ma faveur,
  - type: text
    content: et maintiendrai fermement ╵mon alliance avec lui.
  '3':
  - type: text
    content: 'En effet, je peux le dire : ╵ta bonté est établie ╵pour l’éternité.'
  - type: text
    content: Dans les cieux tu as ancré ╵ta fidélité.
  '30':
  - type: text
    content: Je ferai subsister pour toujours ╵sa postérité,
  - type: text
    content: et son trône durera ╵autant que les cieux.
  '31':
  - type: text
    content: S’il arrivait que ses fils ╵délaissent ma Loi,
  - type: text
    content: s’ils ne se conduisaient plus ╵selon mes décrets,
  '32':
  - type: text
    content: s’ils venaient à transgresser ╵mes commandements,
  - type: text
    content: et s’ils n’obéissaient plus ╵à mes ordonnances,
  '33':
  - type: text
    content: je châtierais leur péché ╵avec le bâton,
  - type: text
    content: et leur faute par des coups.
  '34':
  - type: text
    content: Mais je ne renierai pas ╵mon amour pour lui.
  - type: text
    content: Je ne démentirai pas ╵ma fidélité ;
  '35':
  - type: text
    content: non, car je ne trahirai ╵jamais mon alliance
  - type: text
    content: et je ne reviendrai pas ╵sur ce que j’ai dit.
  '36':
  - type: text
    content: 'Un jour, j’ai fait le serment ╵par ma sainteté :'
  - type: text
    content: Non, je ne pourrai jamais ╵mentir à David.
  '37':
  - type: text
    content: Sa lignée subsistera ╵éternellement,
  - type: text
    content: et son trône devant moi ╵sera comme le soleil.
  '38':
  - type: text
    content: Comme la lune, à toujours, ╵il se maintiendra.
  - type: text
    content: Là-haut, le témoin céleste ╵en est le garant. »
  - type: text
    content: Pause
  '39':
  - type: text
    content: Pourtant, tu l’as délaissé, ╵tu l’as rejeté,
  - type: text
    content: et tu t’es mis en colère ╵contre celui qui avait reçu ╵l’onction de ta part.
  '4':
  - type: text
    content: 'Tu as déclaré : ╵« J’ai contracté une alliance ╵avec mon élu ;'
  - type: text
    content: 'à David, mon serviteur, ╵j’ai fait un serment :'
  '40':
  - type: text
    content: Tu as dédaigné l’alliance ╵faite avec ton serviteur,
  - type: text
    content: et tu as profané sa couronne, ╵la jetant à terre.
  '41':
  - type: text
    content: Tu as fait de larges brèches ╵dans tous ses remparts,
  - type: text
    content: et ses fortifications, ╵tu les as détruites.
  '42':
  - type: text
    content: Tous les passants l’ont pillé,
  - type: text
    content: ses voisins le raillent.
  '43':
  - type: text
    content: Tu as affermi ses adversaires
  - type: text
    content: et tu as rempli de joie ╵tous ses ennemis.
  '44':
  - type: text
    content: Tu as même fait dévier ╵les coups de son glaive.
  - type: text
    content: Tu ne l’as pas soutenu ╵pendant le combat.
  '45':
  - type: text
    content: Tu as éteint sa splendeur,
  - type: text
    content: jeté bas son trône,
  '46':
  - type: text
    content: tu as abrégé ╵sa jeunesse,
  - type: text
    content: et tu l’as couvert de honte.
  - type: text
    content: Pause
  '47':
  - type: text
    content: Jusques à quand, Eternel, ╵te cacheras-tu sans cesse
  - type: text
    content: et laisseras-tu flamber ╵ta fureur ?
  '48':
  - type: text
    content: Veuille tenir compte ╵de la brièveté de ma vie,
  - type: text
    content: as-tu donc créé ╵pour le néant tous les hommes ?
  '49':
  - type: text
    content: Quel homme vivra ╵sans voir le trépas ?
  - type: text
    content: Qui échappera ╵au séjour des morts ?
  - type: text
    content: Pause
  '5':
  - type: text
    content: J’affermis ta descendance ╵pour l’éternité,
  - type: text
    content: et j’établirai ton trône ╵aux siècles des siècles
  - type: note
    content: Voir 2 S 7.12-16 ; 1 Ch 17.11-14 ; Ps 132.11-12.
  - type: text
    content: . »
  - type: text
    content: Pause
  '50':
  - type: text
    content: Seigneur, où donc sont restées ╵tes faveurs d’antan
  - type: text
    content: que, dans ta fidélité, ╵tu avais promises ╵par un serment à David ?
  '51':
  - type: text
    content: Pense, Seigneur, à l’opprobre ╵de tes serviteurs
  - type: note
    content: 'Plusieurs manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : ton serviteur.'
  - type: text
    content: ','
  - type: text
    content: et pense à ces nombreux peuples ╵dont je suis chargé
  - type: note
    content: 'Autre traduction : Considère, Seigneur, de quel opprobre tes serviteurs sont affligés par de nombreux peuples et quelle souffrance il me cause.'
  - type: text
    content: .
  '52':
  - type: text
    content: Pense, Eternel, aux outrages ╵de tes ennemis,
  - type: text
    content: aux outrages qu’ils déversent ╵sur les pas de l’homme ╵qui a reçu l’onction de ta part.
  '53':
  - type: text
    content: Béni soit l’Eternel pour l’éternité !
  - type: text
    content: Amen et amen !
  '6':
  - type: text
    content: O Eternel, les cieux chantent ╵tes prodiges.
  - type: text
    content: L’assemblée des saints célèbre ╵ta fidélité.
  '7':
  - type: text
    content: Qui dans les nuées ╵est égal à l’Eternel ?
  - type: text
    content: Qui est comparable à l’Eternel ╵parmi les êtres célestes ?
  '8':
  - type: text
    content: Car c’est un Dieu redoutable ╵au conseil des saints
  - type: note
    content: Très certainement les anges.
  - type: text
    content: ','
  - type: text
    content: il est grand, impressionnant ╵au-dessus de tous ceux qui l’entourent.
  '9':
  - type: text
    content: Qui, ô Eternel, ╵ô Dieu des armées célestes, ╵qui est puissant comme toi ? ╵Qui, ô Eternel ?
  - type: text
    content: Ta fidélité rayonne ╵tout autour de toi.
