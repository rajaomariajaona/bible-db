document_id: PSA.89,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Où sont les grâces d’autrefois ?
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sens incertain.
      marker-yv: yv-n
    - type: text
      text: ' d’Etân'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 R 5.11 ; 1 Ch 6.16-29 ; 15.16-19.
      marker-yv: yv-n
    - type: text
      text: ' l’Ezrahite.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c’est toi seul qui maîtrises ╵l’orgueil de la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ses vagues se déchaînent, ╵toi, tu les apaises.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui as écrasé Rahav, ╵le dragon d’Egypte, ╵le blessant à mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 87.4
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ton bras puissant ╵tu as dispersé tes ennemis.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toi appartient le ciel ╵et à toi la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le monde avec tout ce qui s’y trouve, ╵c’est toi qui les as fondés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le nord et le sud, ╵tu les as créés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mont Thabor et l’Hermon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sommets imposants du nord d’Israël.
      marker-yv: yv-n
    - type: text
      text: ', ╵avec joie, t’acclament.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton bras est armé de force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta main est puissante, ╵tu as levé ta main droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signe de puissance (le dieu Baal était souvent représenté avec la main droite levée).
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les assises de ton trône ╵sont justice et droit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’amour et la vérité ╵marchent devant toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh ! qu’il est heureux, le peuple ╵qui sait t’acclamer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, à ta lumière, ╵il chemine.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grâce à toi, ╵il se réjouit sans cesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grâce à ta justice, ╵il s’élève !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi qui fais ╵sa gloire et sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est grâce à ta faveur ╵que nous triomphons.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, de l’Eternel dépend ╵notre protecteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre roi est dans la main ╵du Saint d’Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux chanter à jamais ╵les bontés de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et proclamer d’âge en âge ╵sa fidélité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Autrefois, tu as parlé ╵dans une révélation ╵à ceux qui sont attachés à toi. ╵Tu as dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « J’ai prêté secours ╵à un homme valeureux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'au milieu du peuple, ╵j’ai élevé un jeune homme ╵à une haute fonction :'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai trouvé mon serviteur David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 13.14
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 13.22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de mon huile sainte, ╵je lui ai donné l’onction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 16.12-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le soutiendrai ╵de ma forte main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon bras le rendra fort.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses ennemis ne pourront ╵jamais le surprendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun homme inique ╵ne pourra le maltraiter.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’écraserai devant lui ╵tous ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je frapperai ╵ceux qui le haïssent.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toujours mon fidèle amour ╵l’accompagnera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grâce à moi, ╵il relèvera le front.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étendrai jusqu’à la mer ╵sa domination.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’établirai son empire ╵jusque sur les fleuves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La mer est la Méditerranée, les fleuves l’Euphrate et ses divers bras ou canaux ; c’étaient les limites des domaines promis à David et à Salomon.
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il m’invoquera ╵par ces mots : ╵“Toi, tu es mon Père,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon Dieu, ╵le rocher ╵où je trouve le salut.”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je ferai de lui ╵mon fils premier-né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le plus élevé ╵des rois de la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Col 1.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui garderai toujours ╵toute ma faveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maintiendrai fermement ╵mon alliance avec lui.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, je peux le dire : ╵ta bonté est établie ╵pour l’éternité.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les cieux tu as ancré ╵ta fidélité.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai subsister pour toujours ╵sa postérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son trône durera ╵autant que les cieux.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il arrivait que ses fils ╵délaissent ma Loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’ils ne se conduisaient plus ╵selon mes décrets,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’ils venaient à transgresser ╵mes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s’ils n’obéissaient plus ╵à mes ordonnances,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je châtierais leur péché ╵avec le bâton,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur faute par des coups.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je ne renierai pas ╵mon amour pour lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne démentirai pas ╵ma fidélité ;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non, car je ne trahirai ╵jamais mon alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne reviendrai pas ╵sur ce que j’ai dit.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Un jour, j’ai fait le serment ╵par ma sainteté :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, je ne pourrai jamais ╵mentir à David.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa lignée subsistera ╵éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son trône devant moi ╵sera comme le soleil.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la lune, à toujours, ╵il se maintiendra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là-haut, le témoin céleste ╵en est le garant. »
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, tu l’as délaissé, ╵tu l’as rejeté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu t’es mis en colère ╵contre celui qui avait reçu ╵l’onction de ta part.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as déclaré : ╵« J’ai contracté une alliance ╵avec mon élu ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à David, mon serviteur, ╵j’ai fait un serment :'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as dédaigné l’alliance ╵faite avec ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as profané sa couronne, ╵la jetant à terre.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait de larges brèches ╵dans tous ses remparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses fortifications, ╵tu les as détruites.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les passants l’ont pillé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses voisins le raillent.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as affermi ses adversaires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as rempli de joie ╵tous ses ennemis.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as même fait dévier ╵les coups de son glaive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne l’as pas soutenu ╵pendant le combat.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as éteint sa splendeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jeté bas son trône,
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as abrégé ╵sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu l’as couvert de honte.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand, Eternel, ╵te cacheras-tu sans cesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laisseras-tu flamber ╵ta fureur ?
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veuille tenir compte ╵de la brièveté de ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as-tu donc créé ╵pour le néant tous les hommes ?
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel homme vivra ╵sans voir le trépas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui échappera ╵au séjour des morts ?
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’affermis ta descendance ╵pour l’éternité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’établirai ton trône ╵aux siècles des siècles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 S 7.12-16 ; 1 Ch 17.11-14 ; Ps 132.11-12.
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, où donc sont restées ╵tes faveurs d’antan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, dans ta fidélité, ╵tu avais promises ╵par un serment à David ?
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pense, Seigneur, à l’opprobre ╵de tes serviteurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs manuscrits hébreux, l’ancienne version grecque et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton serviteur.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pense à ces nombreux peuples ╵dont je suis chargé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Considère, Seigneur, de quel opprobre tes serviteurs sont affligés par de nombreux peuples et quelle souffrance il me cause.
      marker-yv: yv-n
    - type: text
      text: .
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pense, Eternel, aux outrages ╵de tes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux outrages qu’ils déversent ╵sur les pas de l’homme ╵qui a reçu l’onction de ta part.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Eternel pour l’éternité !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen et amen !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, les cieux chantent ╵tes prodiges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’assemblée des saints célèbre ╵ta fidélité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui dans les nuées ╵est égal à l’Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est comparable à l’Eternel ╵parmi les êtres célestes ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est un Dieu redoutable ╵au conseil des saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Très certainement les anges.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est grand, impressionnant ╵au-dessus de tous ceux qui l’entourent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui, ô Eternel, ╵ô Dieu des armées célestes, ╵qui est puissant comme toi ? ╵Qui, ô Eternel ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta fidélité rayonne ╵tout autour de toi.
