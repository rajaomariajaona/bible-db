document_id: PSA.75,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu jugera le monde
  - type: text
    content: 'Au chef de chœur : psaume d’Asaph'
  - type: note
    content: Voir note 50.1.
  - type: text
    content: . A chanter sur la mélodie de « Ne détruis pas ! ».
  '10':
  - type: text
    content: Moi, je le proclamerai ╵à jamais,
  - type: text
    content: je célébrerai ╵par mes chants ╵le Dieu de Jacob.
  '11':
  - type: text
    content: Il brisera l’arrogance ╵de tous les méchants
  - type: text
    content: tandis que le juste ╵pourra marcher le front haut.
  '2':
  - type: text
    content: Nous te célébrons, ô Dieu, ╵nous te célébrons,
  - type: text
    content: et nous proclamons ce que tu es
  - type: note
    content: 'D’après les versions anciennes. Texte hébreu traditionnel : et tu es proche (de nous).'
  - type: text
    content: .
  - type: text
    content: Qu’on raconte tes merveilles !
  '3':
  - type: text
    content: « Lorsque viendra le moment ╵que j’aurai fixé, ╵a dit l’Eternel,
  - type: text
    content: je rendrai justice ╵avec équité.
  '4':
  - type: text
    content: Si la terre tremble ╵avec tous ses habitants,
  - type: text
    content: moi, j’affermis ses colonnes.
  - type: text
    content: Pause
  '5':
  - type: text
    content: 'Je déclare aux arrogants : ╵“Trêve d’arrogance !”'
  - type: text
    content: 'Et aux gens méchants : ╵“Ne levez pas votre front !”'
  '6':
  - type: text
    content: Non, ne levez pas le front ╵vers le ciel !
  - type: text
    content: Cessez de parler ╵avec insolence ! »
  '7':
  - type: text
    content: Car ce n’est pas de l’Orient, ╵ni de l’Occident,
  - type: text
    content: et ce n’est pas du désert
  - type: note
    content: Mis en opposition à l’est et à l’ouest, le désert semble désigner le sud du pays, direction d’où pouvait venir le secours, c’est-à-dire de l’Egypte, principal espoir de beaucoup d’Israélites face à la menace des peuples mésopotamiens.
  - type: text
    content: ' ╵que vient la grandeur !'
  '8':
  - type: text
    content: 'C’est Dieu seul qui juge :'
  - type: text
    content: il abaisse l’un, ╵il élève l’autre.
  '9':
  - type: text
    content: L’Eternel tient dans sa main ╵une coupe
  - type: text
    content: pleine d’un vin âpre et mélangé.
  - type: text
    content: Il en verse aux méchants de la terre
  - type: text
    content: qui devront vider la coupe ╵en buvant jusqu’à la lie.
