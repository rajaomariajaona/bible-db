document_id: PSA.75,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu jugera le monde
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au chef de chœur : psaume d’Asaph'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '50.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . A chanter sur la mélodie de « Ne détruis pas ! ».
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moi, je le proclamerai ╵à jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je célébrerai ╵par mes chants ╵le Dieu de Jacob.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il brisera l’arrogance ╵de tous les méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le juste ╵pourra marcher le front haut.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nous te célébrons, ô Dieu, ╵nous te célébrons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous proclamons ce que tu es
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après les versions anciennes. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et tu es proche (de nous).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on raconte tes merveilles !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: « Lorsque viendra le moment ╵que j’aurai fixé, ╵a dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rendrai justice ╵avec équité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Si la terre tremble ╵avec tous ses habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, j’affermis ses colonnes.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: Pause
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je déclare aux arrogants : ╵“Trêve d’arrogance !”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et aux gens méchants : ╵“Ne levez pas votre front !”'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Non, ne levez pas le front ╵vers le ciel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cessez de parler ╵avec insolence ! »
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Car ce n’est pas de l’Orient, ╵ni de l’Occident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce n’est pas du désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '75.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mis en opposition à l’est et à l’ouest, le désert semble désigner le sud du pays, direction d’où pouvait venir le secours, c’est-à-dire de l’Egypte, principal espoir de beaucoup d’Israélites face à la menace des peuples mésopotamiens.
      marker-yv: yv-n
    - type: text
      text: ' ╵que vient la grandeur !'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C’est Dieu seul qui juge :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abaisse l’un, ╵il élève l’autre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: L’Eternel tient dans sa main ╵une coupe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pleine d’un vin âpre et mélangé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en verse aux méchants de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui devront vider la coupe ╵en buvant jusqu’à la lie.
