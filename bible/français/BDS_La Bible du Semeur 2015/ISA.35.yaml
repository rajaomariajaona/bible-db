document_id: ISA.35,21
type_code: fra
verses:
  '1':
  - type: text
    content: Que le pays désert ╵et que la terre aride ╵se réjouissent !
  - type: text
    content: Que la steppe jubile ╵et se mette à fleurir ╵comme les lis !
  '10':
  - type: text
    content: Oui, ceux que l’Eternel ╵aura libérés reviendront,
  - type: text
    content: ils iront à Sion ╵avec des cris de joie.
  - type: text
    content: Un bonheur éternel ╵couronnera leur tête,
  - type: text
    content: ils auront en partage ╵la joie et l’allégresse,
  - type: text
    content: tristesse et plaintes s’enfuiront.
  '2':
  - type: text
    content: 'Que les fleurs y abondent ╵et que sa joie éclate :'
  - type: text
    content: qu’elle pousse des cris de joie !
  - type: text
    content: La gloire du Liban,
  - type: text
    content: la splendeur du Carmel ╵et celle du Saron ╵lui sont données.
  - type: text
    content: Là, on verra la gloire ╵de l’Eternel
  - type: text
    content: et la splendeur de notre Dieu.
  '3':
  - type: text
    content: Fortifiez les mains défaillantes,
  - type: text
    content: affermissez ╵les genoux chancelants.
  '4':
  - type: text
    content: A ceux qui sont troublés
  - type: text
    content: 'dites-leur : Soyez forts, ╵n’ayez aucune crainte,'
  - type: text
    content: votre Dieu va venir
  - type: text
    content: pour la rétribution,
  - type: text
    content: Dieu va régler ses comptes.
  - type: text
    content: Il va venir lui-même ╵pour vous sauver.
  '5':
  - type: text
    content: Ce jour-là s’ouvriront ╵les oreilles des sourds
  - type: text
    content: et les yeux des aveugles
  - type: note
    content: Cité en Mt 11.5 ; Lc 7.22.
  - type: text
    content: .
  '6':
  - type: text
    content: Et alors le boiteux ╵bondira comme un cerf,
  - type: text
    content: et le muet criera de joie,
  - type: text
    content: car des eaux jailliront ╵dans le désert
  - type: text
    content: et, dans la steppe, ╵des torrents couleront.
  '7':
  - type: text
    content: La terre desséchée ╵se changera en lac,
  - type: text
    content: et la terre altérée ╵en sources jaillissantes.
  - type: text
    content: Des roseaux et des joncs croîtront
  - type: text
    content: dans le repaire ╵où gîtaient les chacals.
  '8':
  - type: text
    content: A travers le pays ╵passera un chemin frayé, ╵une route que l’on appellera ╵la route sainte.
  - type: text
    content: Aucun impur n’y passera,
  - type: text
    content: car c’est lui, l’Eternel, ╵qui marchera sur cette route
  - type: note
    content: 'Autre traduction : car elle sera réservée à ceux qui la suivront.'
  - type: text
    content: .
  - type: text
    content: Les insensés ne viendront pas ╵s’y égarer.
  '9':
  - type: text
    content: Là il n’y aura pas de lion,
  - type: text
    content: 'et les bêtes féroces ╵n’y auront pas accès :'
  - type: text
    content: on n’en trouvera pas.
  - type: text
    content: C’est le peuple sauvé ╵qui marchera sur cette voie.
