document_id: ISA.35
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Que le pays désert ╵et que la terre aride ╵se réjouissent !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la steppe jubile ╵et se mette à fleurir ╵comme les lis !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Que les fleurs y abondent ╵et que sa joie éclate :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle pousse des cris de joie !
- type: usfm
  marker: q1
  children:
  - type: text
    text: La gloire du Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la splendeur du Carmel ╵et celle du Saron ╵lui sont données.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là, on verra la gloire ╵de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la splendeur de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fortifiez les mains défaillantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: affermissez ╵les genoux chancelants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A ceux qui sont troublés
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dites-leur : Soyez forts, ╵n’ayez aucune crainte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre Dieu va venir
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour la rétribution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu va régler ses comptes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va venir lui-même ╵pour vous sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce jour-là s’ouvriront ╵les oreilles des sourds
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les yeux des aveugles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 11.5 ; Lc 7.22.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et alors le boiteux ╵bondira comme un cerf,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le muet criera de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car des eaux jailliront ╵dans le désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, dans la steppe, ╵des torrents couleront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La terre desséchée ╵se changera en lac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre altérée ╵en sources jaillissantes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des roseaux et des joncs croîtront
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le repaire ╵où gîtaient les chacals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A travers le pays ╵passera un chemin frayé, ╵une route que l’on appellera ╵la route sainte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun impur n’y passera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c’est lui, l’Eternel, ╵qui marchera sur cette route
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car elle sera réservée à ceux qui la suivront.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les insensés ne viendront pas ╵s’y égarer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Là il n’y aura pas de lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les bêtes féroces ╵n’y auront pas accès :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n’en trouvera pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le peuple sauvé ╵qui marchera sur cette voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, ceux que l’Eternel ╵aura libérés reviendront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils iront à Sion ╵avec des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un bonheur éternel ╵couronnera leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils auront en partage ╵la joie et l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tristesse et plaintes s’enfuiront.
