document_id: JER.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Face-à-face avec Hanania
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cette même année, au commencement du règne de Sédécias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au commencement du règne de Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ne figurent pas dans l’ancienne version grecque. La date indiquée correspond à l’été 594 av. J.-C. Sur Sédécias, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27.1'
        metadata:
          usfm: JER.27.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', roi de Juda, la quatrième année, au cinquième mois, Hanania, fils d’Azzour, un prophète originaire de Gabaon, me dit dans le temple de l’Eternel, devant les prêtres et tout le peuple : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je brise le joug du roi de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dans deux ans, jour pour jour, je ferai rapporter dans ce lieu tous les ustensiles du temple de l’Eternel que Nabuchodonosor, roi de Babylone, a enlevés d’ici et qu’il a emportés à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ferai aussi revenir dans ce lieu Yekonia, fils de Yehoyaqim, roi de Juda, et tous les déportés de Juda qui sont partis à Babylone – l’Eternel le déclare – car je briserai le joug du roi de Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors le prophète Jérémie dit au prophète Hanania devant les prêtres et devant tout le peuple qui se tenaient dans le Temple : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puisse-t-il en être ainsi ! Que l’Eternel agisse de la sorte et accomplisse ce que tu viens de prophétiser, en ramenant de Babylone dans ce lieu les ustensiles du Temple et tous les déportés ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Néanmoins, écoute ce que je vais te dire en même temps qu’à tout le peuple : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les prophètes qui nous ont précédés, toi et moi, depuis les temps les plus anciens, ont prophétisé au sujet de nombreux pays et de grands royaumes en annonçant la guerre, la famine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la famine
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après certains manuscrits et les versions anciennes. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le malheur.
    marker-yv: yv-n
  - type: text
    text: ' et la peste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors, maintenant, un prophète annonce la paix ; on saura s’il est réellement envoyé par l’Eternel seulement si sa prédiction se réalise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors le prophète Hanania prit le joug
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27.2'
        metadata:
          usfm: JER.27.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' des épaules du prophète Jérémie et le brisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et Hanania dit devant tout le peuple : Voici ce que déclare l’Eternel : De cette façon, dans deux ans, jour pour jour, je briserai le joug que Nabuchodonosor, roi de Babylone, fait peser sur tous les peuples.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Puis le prophète Jérémie s’en alla de son côté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après que le prophète Hanania eut brisé le joug posé sur le cou du prophète Jérémie, l’Eternel adressa la parole à Jérémie en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Va dire à Hanania : Voici ce que déclare l’Eternel : Tu as brisé un joug de bois, eh bien ! tu le remplaceras par un joug de fer ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car ainsi parle le Seigneur des armées célestes, Dieu d’Israël : J’impose à tous ces peuples un joug de fer pour qu’ils soient assujettis à Nabuchodonosor, roi de Babylone ! Oui, ils lui seront assujettis, et je lui ai même soumis les animaux sauvages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis le prophète Jérémie dit au prophète Hanania : Ecoute bien, Hanania ! L’Eternel ne t’a pas mandaté et tu fais croire des mensonges à ce peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est pourquoi, voici ce que déclare l’Eternel : Je vais te renvoyer de la surface de la terre. Cette année même tu mourras, car tu as incité à la révolte contre l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Cette année-là, au septième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En septembre-octobre, deux mois après l’incident rapporté (voir v. 1).
    marker-yv: yv-n
  - type: text
    text: ', le prophète Hanania mourut.'
