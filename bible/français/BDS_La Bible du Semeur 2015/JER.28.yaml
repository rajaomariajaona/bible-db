document_id: JER.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Face-à-face avec Hanania
  - type: text
    content: Cette même année, au commencement du règne de Sédécias
  - type: note
    content: 'Les mots : au commencement du règne de Sédécias ne figurent pas dans l’ancienne version grecque. La date indiquée correspond à l’été 594 av. J.-C. Sur Sédécias, voir 27.1 et note.'
  - type: text
    content: ', roi de Juda, la quatrième année, au cinquième mois, Hanania, fils d’Azzour, un prophète originaire de Gabaon, me dit dans le temple de l’Eternel, devant les prêtres et tout le peuple : '
  '10':
  - type: text
    content: Alors le prophète Hanania prit le joug
  - type: note
    content: Voir 27.2.
  - type: text
    content: ' des épaules du prophète Jérémie et le brisa. '
  '11':
  - type: text
    content: 'Et Hanania dit devant tout le peuple : Voici ce que déclare l’Eternel : De cette façon, dans deux ans, jour pour jour, je briserai le joug que Nabuchodonosor, roi de Babylone, fait peser sur tous les peuples.'
  - type: text
    content: Puis le prophète Jérémie s’en alla de son côté.
  '12':
  - type: text
    content: 'Après que le prophète Hanania eut brisé le joug posé sur le cou du prophète Jérémie, l’Eternel adressa la parole à Jérémie en ces termes : '
  '13':
  - type: text
    content: 'Va dire à Hanania : Voici ce que déclare l’Eternel : Tu as brisé un joug de bois, eh bien ! tu le remplaceras par un joug de fer ! '
  '14':
  - type: text
    content: 'Car ainsi parle le Seigneur des armées célestes, Dieu d’Israël : J’impose à tous ces peuples un joug de fer pour qu’ils soient assujettis à Nabuchodonosor, roi de Babylone ! Oui, ils lui seront assujettis, et je lui ai même soumis les animaux sauvages.'
  '15':
  - type: text
    content: 'Puis le prophète Jérémie dit au prophète Hanania : Ecoute bien, Hanania ! L’Eternel ne t’a pas mandaté et tu fais croire des mensonges à ce peuple. '
  '16':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare l’Eternel : Je vais te renvoyer de la surface de la terre. Cette année même tu mourras, car tu as incité à la révolte contre l’Eternel.'
  '17':
  - type: text
    content: Cette année-là, au septième mois
  - type: note
    content: En septembre-octobre, deux mois après l’incident rapporté (voir v. 1).
  - type: text
    content: ', le prophète Hanania mourut.'
  '2':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je brise le joug du roi de Babylone. '
  '3':
  - type: text
    content: 'Dans deux ans, jour pour jour, je ferai rapporter dans ce lieu tous les ustensiles du temple de l’Eternel que Nabuchodonosor, roi de Babylone, a enlevés d’ici et qu’il a emportés à Babylone. '
  '4':
  - type: text
    content: Je ferai aussi revenir dans ce lieu Yekonia, fils de Yehoyaqim, roi de Juda, et tous les déportés de Juda qui sont partis à Babylone – l’Eternel le déclare – car je briserai le joug du roi de Babylone.
  '5':
  - type: text
    content: 'Alors le prophète Jérémie dit au prophète Hanania devant les prêtres et devant tout le peuple qui se tenaient dans le Temple : '
  '6':
  - type: text
    content: 'Puisse-t-il en être ainsi ! Que l’Eternel agisse de la sorte et accomplisse ce que tu viens de prophétiser, en ramenant de Babylone dans ce lieu les ustensiles du Temple et tous les déportés ! '
  '7':
  - type: text
    content: 'Néanmoins, écoute ce que je vais te dire en même temps qu’à tout le peuple : '
  '8':
  - type: text
    content: Les prophètes qui nous ont précédés, toi et moi, depuis les temps les plus anciens, ont prophétisé au sujet de nombreux pays et de grands royaumes en annonçant la guerre, la famine
  - type: note
    content: 'la famine: d’après certains manuscrits et les versions anciennes. Le texte hébreu traditionnel a : le malheur.'
  - type: text
    content: ' et la peste. '
  '9':
  - type: text
    content: Alors, maintenant, un prophète annonce la paix ; on saura s’il est réellement envoyé par l’Eternel seulement si sa prédiction se réalise.
