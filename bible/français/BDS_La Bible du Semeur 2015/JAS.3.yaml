document_id: JAS.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dompter sa langue
  - type: text
    content: 'Mes amis, ne soyez pas nombreux à enseigner ; vous le savez : nous qui enseignons, nous serons jugés plus sévèrement.'
  '10':
  - type: text
    content: 'De la même bouche sortent bénédiction et malédiction ! Mes frères et sœurs, il ne faut pas qu’il en soit ainsi. '
  '11':
  - type: text
    content: 'Avez-vous déjà vu de l’eau douce et de l’eau salée jaillir d’une même source par la même ouverture ? '
  '12':
  - type: text
    content: Un figuier, frères et sœurs, peut-il porter des olives, ou une vigne des figues ? Une source salée ne peut pas non plus donner de l’eau douce.
  - type: heading
    content: La sagesse qui vient d’en haut
  '13':
  - type: text
    content: 'Y a-t-il parmi vous quelqu’un de sage et d’expérimenté ? Qu’il en donne la preuve par sa bonne conduite, c’est-à-dire par des actes empreints de l’humilité qui caractérise la véritable sagesse. '
  '14':
  - type: text
    content: Mais si votre cœur est plein d’amère jalousie, si vous êtes animés d’un esprit querelleur, il n’y a vraiment pas lieu de vous vanter ; ce serait faire entorse à la vérité.
  '15':
  - type: text
    content: 'Une telle sagesse ne vient certainement pas du ciel, elle est de ce monde, de l’homme sans Dieu, elle est démoniaque. '
  '16':
  - type: text
    content: 'Car là où règnent la jalousie et l’esprit de rivalité, là aussi habitent le désordre et toutes sortes de pratiques indignes. '
  '17':
  - type: text
    content: Au contraire, la sagesse qui vient d’en haut est en premier lieu pure ; de plus, elle aime la paix, elle est modérée et conciliante, pleine de compassion ; elle produit beaucoup de bons fruits, elle est sans parti pris et sans hypocrisie.
  '18':
  - type: text
    content: Ceux qui travaillent à la paix sèment dans la paix une semence qui produira un fruit conforme à ce qui est juste.
  '2':
  - type: text
    content: Car chacun de nous commet des fautes de bien des manières. Celui qui ne commet jamais de faute dans ses paroles est un homme parvenu à l’état d’adulte, capable de maîtriser aussi son corps tout entier.
  '3':
  - type: text
    content: 'Quand nous mettons un mors dans la bouche des chevaux, pour qu’ils nous obéissent, nous dirigeons aussi tout leur corps. '
  '4':
  - type: text
    content: 'Pensez encore aux bateaux : même s’il s’agit de grands navires et s’ils sont poussés par des vents violents, il suffit d’un tout petit gouvernail pour les diriger au gré du pilote. '
  '5':
  - type: text
    content: 'Il en va de même pour la langue : c’est un petit organe, mais elle se vante de grandes choses. Ne suffit-il pas d’un petit feu pour incendier une vaste forêt ? '
  '6':
  - type: text
    content: La langue aussi est un feu ; c’est tout un monde de mal. Elle est là, parmi les autres organes de notre corps, et contamine notre être entier. Allumée au feu de l’enfer, elle enflamme toute notre existence.
  '7':
  - type: text
    content: 'L’homme est capable de dompter toutes sortes de bêtes sauvages, d’oiseaux, de reptiles, d’animaux marins, et il les a effectivement domptées. '
  '8':
  - type: text
    content: Mais la langue, aucun homme ne peut la dompter. C’est un fléau impossible à maîtriser ; elle est pleine d’un venin mortel.
  '9':
  - type: text
    content: 'Nous nous en servons pour louer le Seigneur, notre Père, et nous nous en servons aussi pour maudire les hommes, pourtant créés '
  - type: text
    content: de sorte qu’ils lui ressemblent
  - type: note
    content: Voir Gn 1.26-27.
  - type: text
    content: .
  - type: text
    content: ' '
