document_id: JAS.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dompter sa langue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis, ne soyez pas nombreux à enseigner ; vous le savez : nous qui enseignons, nous serons jugés plus sévèrement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car chacun de nous commet des fautes de bien des manières. Celui qui ne commet jamais de faute dans ses paroles est un homme parvenu à l’état d’adulte, capable de maîtriser aussi son corps tout entier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand nous mettons un mors dans la bouche des chevaux, pour qu’ils nous obéissent, nous dirigeons aussi tout leur corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pensez encore aux bateaux : même s’il s’agit de grands navires et s’ils sont poussés par des vents violents, il suffit d’un tout petit gouvernail pour les diriger au gré du pilote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il en va de même pour la langue : c’est un petit organe, mais elle se vante de grandes choses. Ne suffit-il pas d’un petit feu pour incendier une vaste forêt ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La langue aussi est un feu ; c’est tout un monde de mal. Elle est là, parmi les autres organes de notre corps, et contamine notre être entier. Allumée au feu de l’enfer, elle enflamme toute notre existence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’homme est capable de dompter toutes sortes de bêtes sauvages, d’oiseaux, de reptiles, d’animaux marins, et il les a effectivement domptées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais la langue, aucun homme ne peut la dompter. C’est un fléau impossible à maîtriser ; elle est pleine d’un venin mortel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous nous en servons pour louer le Seigneur, notre Père, et nous nous en servons aussi pour maudire les hommes, pourtant créés '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: de sorte qu’ils lui ressemblent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 1.26-27
        metadata:
          usfm: GEN.1.26+GEN.1.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De la même bouche sortent bénédiction et malédiction ! Mes frères et sœurs, il ne faut pas qu’il en soit ainsi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Avez-vous déjà vu de l’eau douce et de l’eau salée jaillir d’une même source par la même ouverture ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un figuier, frères et sœurs, peut-il porter des olives, ou une vigne des figues ? Une source salée ne peut pas non plus donner de l’eau douce.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse qui vient d’en haut
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Y a-t-il parmi vous quelqu’un de sage et d’expérimenté ? Qu’il en donne la preuve par sa bonne conduite, c’est-à-dire par des actes empreints de l’humilité qui caractérise la véritable sagesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais si votre cœur est plein d’amère jalousie, si vous êtes animés d’un esprit querelleur, il n’y a vraiment pas lieu de vous vanter ; ce serait faire entorse à la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Une telle sagesse ne vient certainement pas du ciel, elle est de ce monde, de l’homme sans Dieu, elle est démoniaque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car là où règnent la jalousie et l’esprit de rivalité, là aussi habitent le désordre et toutes sortes de pratiques indignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au contraire, la sagesse qui vient d’en haut est en premier lieu pure ; de plus, elle aime la paix, elle est modérée et conciliante, pleine de compassion ; elle produit beaucoup de bons fruits, elle est sans parti pris et sans hypocrisie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ceux qui travaillent à la paix sèment dans la paix une semence qui produira un fruit conforme à ce qui est juste.
