document_id: 1CH.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le transport du coffre de l’alliance selon la Loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David se fit construire des maisons dans la Cité de David. Il prépara un emplacement pour le coffre de Dieu et dressa une tente pour l’abriter. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et des descendants d’Ouzziel, le chef Amminadab avec 112 membres de cette famille.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David appela les prêtres Tsadoq et Abiatar et les lévites Ouriel, Asaya, Joël, Shemaya, Eliel et Amminadab. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit : Vous êtes les chefs des groupes familiaux des lévites, purifiez-vous, vous et tous les membres de vos familles, pour être en mesure de transporter le coffre de l’Eternel, le Dieu d’Israël, à l’emplacement que je lui ai préparé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, c’est parce que vous n’étiez pas présents la première fois, que l’Eternel notre Dieu a fait une brèche parmi nous : nous ne nous sommes pas occupés selon la Loi de ce qui le concerne.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres et les lévites se purifièrent donc pour le transport du coffre de l’Eternel, le Dieu d’Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les lévites portèrent le coffre de Dieu avec des barres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 25.13-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' sur leurs épaules, conformément aux ordres que Moïse avait donnés d’après la parole de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 4.1-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les musiciens et les gardiens
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David demanda aussi aux chefs des lévites de disposer les membres de leurs familles qui étaient chargés du chant avec leurs instruments de musique, c’est-à-dire leurs luths, leurs lyres et leurs cymbales, pour accompagner les réjouissances d’une musique éclatante. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les lévites firent donc mettre en place Hémân, fils de Joël, Asaph, fils de Bérékia, membre de sa famille et, dans la famille de Merari, Etân, fils de Qoushaya.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et pour les seconder, on prit d’autres lévites : les portiers Zacharie, Ben'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils de… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce mot est absent dans trois manuscrits hébreux et dans la plupart des manuscrits de l’ancienne version grecque (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 16.5
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', Yaaziel, Shemiramoth, Yehiel, Ounni, Eliab, Benaya, Maaséya, Mattitia, Eliphéléhou, Miqnéya, Obed-Edom et Yeïel, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les musiciens Hémân, Asaph et Etân jouaient des cymbales de bronze. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ainsi qu’il décréta : Seuls les lévites auront le droit de porter le coffre de Dieu, car ce sont eux que l’Eternel a choisis pour cela et pour accomplir son service à jamais'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 10.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zacharie, Aziel, Shemiramoth, Yehiel, Ounni, Eliab, Maaséya et Benaya jouaient du luth pour les voix de soprano
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Mattitia, Eliphéléhou, Miqnéya, Obed-Edom, Yeïel et Azazia des lyres à huit cordes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine. Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à l’octave, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire pour voix de basse ou instruments aux notes basses.
      marker-yv: yv-n
    - type: text
      text: ' pour diriger le chant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kenania, le chef des lévites, était chargé de la direction du chant, car il était expert en la matière. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bérékia et Elqana étaient les gardiens du coffre.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shebania, Josaphat, Netanéel, Amasaï, Zacharie, Benaya et Eliézer, les prêtres, sonnaient des trompettes devant le coffre de Dieu. Obed-Edom et Yehiya étaient les gardiens du coffre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le coffre sacré arrive à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 6.12-19)
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors David, les responsables d’Israël et les chefs militaires allèrent faire transporter le coffre de l’alliance de l’Eternel depuis la maison d’Obed-Edom, au milieu de grandes réjouissances. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est avec l’aide de Dieu que les lévites portaient le coffre de l’alliance et l’on offrit à l’Eternel en sacrifice sept taureaux et sept béliers. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait endossé un manteau de fin lin blanc, comme tous les lévites qui portaient le coffre sacré, ainsi que les musiciens et Kenania, le chef responsable des musiciens. De plus, il avait endossé un vêtement de lin semblable à celui des prêtres. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi tout Israël transporta le coffre de l’alliance de l’Eternel en poussant des cris de joie, en faisant résonner les cors, les trompettes et les cymbales et retentir les luths et les lyres. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque le coffre de l’alliance de l’Eternel arriva dans la Cité de David, Mikal, la fille de Saül, regardait par la fenêtre. Elle vit le roi David qui sautait et dansait de joie. Alors elle conçut du mépris pour lui dans son cœur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David rassembla tout Israël à Jérusalem pour faire venir le coffre de l’Eternel à l’emplacement qu’il lui avait préparé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il réunit aussi les descendants d’Aaron et les lévites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des Qehatites, il y avait le chef Ouriel avec 120 membres de cette famille ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des Merarites, le chef Asaya avec 220 membres de cette famille ; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des Guershonites, le chef Joël avec 130 membres de cette famille ; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des descendants d’Elitsaphân, le chef Shemaya avec 200 membres de cette famille ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des descendants d’Hébron, le chef Eliel avec 80 membres de cette famille, '
