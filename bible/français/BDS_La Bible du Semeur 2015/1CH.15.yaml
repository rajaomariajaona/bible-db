document_id: 1CH.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le transport du coffre de l’alliance selon la Loi
  - type: text
    content: 'David se fit construire des maisons dans la Cité de David. Il prépara un emplacement pour le coffre de Dieu et dressa une tente pour l’abriter. '
  '10':
  - type: text
    content: et des descendants d’Ouzziel, le chef Amminadab avec 112 membres de cette famille.
  '11':
  - type: text
    content: 'David appela les prêtres Tsadoq et Abiatar et les lévites Ouriel, Asaya, Joël, Shemaya, Eliel et Amminadab. '
  '12':
  - type: text
    content: 'Il leur dit : Vous êtes les chefs des groupes familiaux des lévites, purifiez-vous, vous et tous les membres de vos familles, pour être en mesure de transporter le coffre de l’Eternel, le Dieu d’Israël, à l’emplacement que je lui ai préparé. '
  '13':
  - type: text
    content: 'En effet, c’est parce que vous n’étiez pas présents la première fois, que l’Eternel notre Dieu a fait une brèche parmi nous : nous ne nous sommes pas occupés selon la Loi de ce qui le concerne.'
  '14':
  - type: text
    content: 'Les prêtres et les lévites se purifièrent donc pour le transport du coffre de l’Eternel, le Dieu d’Israël. '
  '15':
  - type: text
    content: Les lévites portèrent le coffre de Dieu avec des barres
  - type: note
    content: Voir Ex 25.13-14.
  - type: text
    content: ' sur leurs épaules, conformément aux ordres que Moïse avait donnés d’après la parole de l’Eternel'
  - type: note
    content: Voir Nb 4.1-12.
  - type: text
    content: .
  - type: heading
    content: Les musiciens et les gardiens
  '16':
  - type: text
    content: 'David demanda aussi aux chefs des lévites de disposer les membres de leurs familles qui étaient chargés du chant avec leurs instruments de musique, c’est-à-dire leurs luths, leurs lyres et leurs cymbales, pour accompagner les réjouissances d’une musique éclatante. '
  '17':
  - type: text
    content: Les lévites firent donc mettre en place Hémân, fils de Joël, Asaph, fils de Bérékia, membre de sa famille et, dans la famille de Merari, Etân, fils de Qoushaya.
  '18':
  - type: text
    content: 'Et pour les seconder, on prit d’autres lévites : les portiers Zacharie, Ben'
  - type: note
    content: 'Autre traduction : fils de… Ce mot est absent dans trois manuscrits hébreux et dans la plupart des manuscrits de l’ancienne version grecque (1 Ch 16.5).'
  - type: text
    content: ', Yaaziel, Shemiramoth, Yehiel, Ounni, Eliab, Benaya, Maaséya, Mattitia, Eliphéléhou, Miqnéya, Obed-Edom et Yeïel, '
  '19':
  - type: text
    content: 'les musiciens Hémân, Asaph et Etân jouaient des cymbales de bronze. '
  '2':
  - type: text
    content: 'C’est ainsi qu’il décréta : Seuls les lévites auront le droit de porter le coffre de Dieu, car ce sont eux que l’Eternel a choisis pour cela et pour accomplir son service à jamais'
  - type: note
    content: Voir Dt 10.8.
  - type: text
    content: .
  '20':
  - type: text
    content: Zacharie, Aziel, Shemiramoth, Yehiel, Ounni, Eliab, Maaséya et Benaya jouaient du luth pour les voix de soprano
  - type: note
    content: Traduction incertaine.
  - type: text
    content: '  ; '
  '21':
  - type: text
    content: et Mattitia, Eliphéléhou, Miqnéya, Obed-Edom, Yeïel et Azazia des lyres à huit cordes
  - type: note
    content: 'Traduction incertaine. Certains traduisent : à l’octave, c’est-à-dire pour voix de basse ou instruments aux notes basses.'
  - type: text
    content: ' pour diriger le chant. '
  '22':
  - type: text
    content: 'Kenania, le chef des lévites, était chargé de la direction du chant, car il était expert en la matière. '
  '23':
  - type: text
    content: Bérékia et Elqana étaient les gardiens du coffre.
  '24':
  - type: text
    content: Shebania, Josaphat, Netanéel, Amasaï, Zacharie, Benaya et Eliézer, les prêtres, sonnaient des trompettes devant le coffre de Dieu. Obed-Edom et Yehiya étaient les gardiens du coffre.
  - type: heading
    content: Le coffre sacré arrive à Jérusalem
  - type: heading
    content: (2 S 6.12-19)
  '25':
  - type: text
    content: 'Alors David, les responsables d’Israël et les chefs militaires allèrent faire transporter le coffre de l’alliance de l’Eternel depuis la maison d’Obed-Edom, au milieu de grandes réjouissances. '
  '26':
  - type: text
    content: 'C’est avec l’aide de Dieu que les lévites portaient le coffre de l’alliance et l’on offrit à l’Eternel en sacrifice sept taureaux et sept béliers. '
  '27':
  - type: text
    content: 'David avait endossé un manteau de fin lin blanc, comme tous les lévites qui portaient le coffre sacré, ainsi que les musiciens et Kenania, le chef responsable des musiciens. De plus, il avait endossé un vêtement de lin semblable à celui des prêtres. '
  '28':
  - type: text
    content: 'Ainsi tout Israël transporta le coffre de l’alliance de l’Eternel en poussant des cris de joie, en faisant résonner les cors, les trompettes et les cymbales et retentir les luths et les lyres. '
  '29':
  - type: text
    content: Lorsque le coffre de l’alliance de l’Eternel arriva dans la Cité de David, Mikal, la fille de Saül, regardait par la fenêtre. Elle vit le roi David qui sautait et dansait de joie. Alors elle conçut du mépris pour lui dans son cœur.
  '3':
  - type: text
    content: 'David rassembla tout Israël à Jérusalem pour faire venir le coffre de l’Eternel à l’emplacement qu’il lui avait préparé. '
  '4':
  - type: text
    content: 'Il réunit aussi les descendants d’Aaron et les lévites. '
  '5':
  - type: text
    content: 'Des Qehatites, il y avait le chef Ouriel avec 120 membres de cette famille ; '
  '6':
  - type: text
    content: 'des Merarites, le chef Asaya avec 220 membres de cette famille ; '
  '7':
  - type: text
    content: 'des Guershonites, le chef Joël avec 130 membres de cette famille ; '
  '8':
  - type: text
    content: 'des descendants d’Elitsaphân, le chef Shemaya avec 200 membres de cette famille ; '
  '9':
  - type: text
    content: 'des descendants d’Hébron, le chef Eliel avec 80 membres de cette famille, '
