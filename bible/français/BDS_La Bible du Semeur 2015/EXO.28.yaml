document_id: EXO.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les vêtements du grand-prêtre
  - type: text
    content: 'Tu feras venir auprès de toi ton frère Aaron et ses fils, Nadab et Abihou, Eléazar et Itamar. Ils seront pris du milieu des Israélites pour me servir comme prêtres. '
  '10':
  - type: text
    content: 'six noms sur la première pierre et les six autres sur la seconde dans l’ordre de leur naissance. '
  '11':
  - type: text
    content: 'Tu feras graver ces noms sur ces deux pierres par un graveur de pierre comme on grave un sceau à cacheter ; tu sertiras ces pierres dans des montures d’or '
  '12':
  - type: text
    content: 'et tu les fixeras sur les bretelles de l’éphod. Ces pierres rappelleront le souvenir des fils d’Israël, et Aaron portera leurs noms sur ses deux épaules devant l’Eternel comme un constant rappel. '
  '13':
  - type: text
    content: 'Tu feras aussi faire les deux montures en or '
  '14':
  - type: text
    content: et deux chaînettes en or pur que tu feras en forme de tresses torsadées ; tu fixeras ces chaînettes ainsi tressées aux montures.
  - type: heading
    content: Le pectoral
  '15':
  - type: text
    content: Tu feras le pectoral du verdict
  - type: note
    content: Appelé aussi pectoral du jugement ou de la décision. C’était une sorte de poche contenant l’ourim et le toummim servant à déterminer la volonté de Dieu (son jugement, sa décision) dans les cas graves et douteux (voir v. 30).
  - type: text
    content: ', dans les règles de l’art, ouvragé comme l’éphod : tu le feras de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors. '
  '16':
  - type: text
    content: Une fois replié en deux, il aura la forme d’un carré de vingt-cinq centimètres
  - type: note
    content: La mesure, selon l’hébreu, est d’un empan, longueur des doigts écartés, estimée selon les auteurs de vingt-deux à vingt-cinq centimètres.
  - type: text
    content: ' de côté. '
  '17':
  - type: text
    content: 'Il sera garni de quatre rangées de pierreries. Sur la première : une sardoine, une topaze et une émeraude. '
  '18':
  - type: text
    content: 'Sur la seconde rangée : un rubis, un saphir et un diamant. '
  '19':
  - type: text
    content: 'Sur la troisième : une opale, une agate et une améthyste. '
  '2':
  - type: text
    content: 'Tu confectionneras pour ton frère Aaron des vêtements sacrés, insignes de gloire et de dignité. '
  '20':
  - type: text
    content: 'Sur la quatrième : une chrysolithe, un onyx et un jaspe'
  - type: note
    content: L’identification de certaines de ces pierres précieuses est incertaine.
  - type: text
    content: '. Ces pierreries seront serties dans des chatons en or. '
  '21':
  - type: text
    content: Elles seront gravées aux noms des douze fils d’Israël comme des sceaux à cacheter ; chacune portera le nom d’une des douze tribus.
  '22':
  - type: text
    content: 'Tu feras au pectoral des chaînettes d’or pur, tressées comme des cordons. '
  '23':
  - type: text
    content: 'Tu lui feras aussi deux anneaux d’or que tu fixeras à ses deux bords. '
  '24':
  - type: text
    content: 'Tu passeras les deux cordons d’or dans ces deux anneaux, aux bords du pectoral, '
  '25':
  - type: text
    content: 'et tu fixeras les deux bouts des deux cordons à deux agrafes, pour les attacher aux deux bretelles de l’éphod, par-devant. '
  '26':
  - type: text
    content: 'Tu feras de plus deux anneaux d’or que tu placeras aux bords du pectoral, sur la face intérieure, contre l’éphod. '
  '27':
  - type: text
    content: 'Tu feras deux autres anneaux d’or que tu fixeras par le bas aux deux bretelles de l’éphod, sur le devant, près de l’attache, au-dessus de la ceinture de l’éphod. '
  '28':
  - type: text
    content: On liera les anneaux du pectoral à ceux de l’éphod par un cordonnet
  - type: note
    content: Ce cordonnet passait à travers les anneaux inférieurs du pectoral et ceux de l’éphod pour fixer l’éphod dans le bas comme il l’était par les chaînettes dans le haut.
  - type: text
    content: ' de pourpre violette, pour qu’il soit fixé sur la ceinture de l’éphod sans pouvoir s’en séparer.'
  '29':
  - type: text
    content: 'Ainsi, par ce pectoral du verdict, lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d’Israël pour en évoquer constamment le souvenir devant l’Eternel. '
  '3':
  - type: text
    content: 'Tu donneras des instructions à tous les artisans habiles que j’ai remplis d’un Esprit qui leur confère de l’habileté : tu leur demanderas de confectionner les vêtements d’Aaron pour le consacrer à mon sacerdoce. '
  '30':
  - type: text
    content: Tu placeras dans le pectoral du verdict l’ourim et le toummim
  - type: note
    content: 'L’ourim et le toummim étaient deux objets dont la nature nous est inconnue : on s’en servait pour connaître la volonté de Dieu (voir Nb 27.21 ; 1 S 14.41-42 ; 28.6 ; Esd 2.63 ; Né 7.65).'
  - type: text
    content: ', qui seront ainsi sur le cœur d’Aaron lorsqu’il se présentera devant l’Eternel, et Aaron portera en permanence sur son cœur, devant l’Eternel, le moyen de connaître mon verdict concernant les problèmes des Israélites.'
  - type: heading
    content: Les autres vêtements du grand-prêtre et de ses fils
  '31':
  - type: text
    content: Tu feras la robe de l’éphod tout entière en pourpre violette
  - type: note
    content: Sorte de chemise sans manches qui se portait sous l’éphod et le pectoral.
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Elle aura au milieu une ouverture pour y passer la tête, elle sera garnie tout autour d’un ourlet tissé comme l’encolure d’un vêtement de cuir, pour que la robe ne se déchire pas. '
  '33':
  - type: text
    content: 'Tu en garniras le pan de grenades faites de fils de pourpre violette et écarlate et de rouge éclatant alternant avec des clochettes d’or tout autour : '
  '34':
  - type: text
    content: 'une clochette d’or et une grenade, et ainsi de suite sur tout le tour du pan de la robe. '
  '35':
  - type: text
    content: Aaron la portera pour effectuer son service et l’on entendra le tintement des clochettes lorsqu’il entrera en présence de l’Eternel dans le lieu saint et lorsqu’il en sortira ; ainsi il ne mourra pas.
  '36':
  - type: text
    content: 'Tu feras un insigne d’or pur sur lequel tu graveras comme sur un sceau à cacheter : « Consacré à l’Eternel ». '
  '37':
  - type: text
    content: 'Tu le fixeras par un cordonnet de pourpre violette sur le devant du turban '
  '38':
  - type: text
    content: pour qu’il orne le front d’Aaron. Il se chargera des fautes commises par les Israélites lorsqu’ils m’apporteront toute espèce d’offrandes consacrées. Cet insigne sera toujours sur son front pour que moi, l’Eternel, je les agrée.
  '39':
  - type: text
    content: 'Enfin tu feras confectionner pour lui la tunique de fin lin et le turban de fin lin ; et la ceinture, celle-ci sera brodée. '
  '4':
  - type: text
    content: 'Voici les habits qu’ils auront à confectionner : un pectoral, un éphod, une robe, une tunique brodée, un turban et une écharpe. Ils feront ces vêtements sacrés pour ton frère Aaron et pour ses fils, afin qu’ils me servent comme prêtres. '
  '40':
  - type: text
    content: Tu feras aussi pour les fils d’Aaron des tuniques, des ceintures et des turbans, insignes de gloire et de dignité.
  '41':
  - type: text
    content: 'Tu revêtiras ton frère Aaron ainsi que ses fils de ces ornements ; tu leur conféreras l’onction pour les investir de leur charge et les consacrer à mon service comme prêtres. '
  '42':
  - type: text
    content: 'Tu leur feras aussi des caleçons de lin pour cacher leur nudité des reins aux cuisses. '
  '43':
  - type: text
    content: Aaron et ses fils les porteront quand ils entreront dans la tente de la Rencontre ou quand ils s’approcheront de l’autel pour faire le service dans le lieu saint ; ainsi, ils ne se rendront pas coupables d’une faute qui entraînerait leur mort. C’est une ordonnance en vigueur à perpétuité pour Aaron et pour ses descendants.
  '5':
  - type: text
    content: Ils utiliseront des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin.
  - type: heading
    content: L’éphod
  '6':
  - type: text
    content: Ils feront l’éphod
  - type: note
    content: Ce terme désigne un tablier ou corselet fixé à la poitrine du grand-prêtre par deux bretelles. Dans d’autres passages, il renvoie à un objet de culte (Jg 8.27 ; 18.17 ; Os 3.4).
  - type: text
    content: ' avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, dans les règles de l’art. '
  '7':
  - type: text
    content: 'On y fera deux bretelles cousues à ses deux bords. '
  '8':
  - type: text
    content: 'Sa ceinture sera faite de la même façon, de la même étoffe que l’éphod ; elle sera faite de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors. '
  '9':
  - type: text
    content: 'Tu prendras deux pierres d’onyx sur lesquelles tu graveras les noms des fils d’Israël : '
