document_id: EXO.28,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vêtements du grand-prêtre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras venir auprès de toi ton frère Aaron et ses fils, Nadab et Abihou, Eléazar et Itamar. Ils seront pris du milieu des Israélites pour me servir comme prêtres. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'six noms sur la première pierre et les six autres sur la seconde dans l’ordre de leur naissance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras graver ces noms sur ces deux pierres par un graveur de pierre comme on grave un sceau à cacheter ; tu sertiras ces pierres dans des montures d’or '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tu les fixeras sur les bretelles de l’éphod. Ces pierres rappelleront le souvenir des fils d’Israël, et Aaron portera leurs noms sur ses deux épaules devant l’Eternel comme un constant rappel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras aussi faire les deux montures en or '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et deux chaînettes en or pur que tu feras en forme de tresses torsadées ; tu fixeras ces chaînettes ainsi tressées aux montures.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pectoral
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu feras le pectoral du verdict
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Appelé aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pectoral du jugement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la décision. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’était une sorte de poche contenant l’ourim et le toummim servant à déterminer la volonté de Dieu (son jugement, sa décision) dans les cas graves et douteux (voir v. 30).
      marker-yv: yv-n
    - type: text
      text: ', dans les règles de l’art, ouvragé comme l’éphod : tu le feras de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois replié en deux, il aura la forme d’un carré de vingt-cinq centimètres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La mesure, selon l’hébreu, est d’un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'empan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: longueur des doigts écartés, estimée selon les auteurs de vingt-deux à vingt-cinq centimètres.
      marker-yv: yv-n
    - type: text
      text: ' de côté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera garni de quatre rangées de pierreries. Sur la première : une sardoine, une topaze et une émeraude. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur la seconde rangée : un rubis, un saphir et un diamant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur la troisième : une opale, une agate et une améthyste. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu confectionneras pour ton frère Aaron des vêtements sacrés, insignes de gloire et de dignité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur la quatrième : une chrysolithe, un onyx et un jaspe'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’identification de certaines de ces pierres précieuses est incertaine.
      marker-yv: yv-n
    - type: text
      text: '. Ces pierreries seront serties dans des chatons en or. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elles seront gravées aux noms des douze fils d’Israël comme des sceaux à cacheter ; chacune portera le nom d’une des douze tribus.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras au pectoral des chaînettes d’or pur, tressées comme des cordons. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu lui feras aussi deux anneaux d’or que tu fixeras à ses deux bords. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu passeras les deux cordons d’or dans ces deux anneaux, aux bords du pectoral, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tu fixeras les deux bouts des deux cordons à deux agrafes, pour les attacher aux deux bretelles de l’éphod, par-devant. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras de plus deux anneaux d’or que tu placeras aux bords du pectoral, sur la face intérieure, contre l’éphod. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras deux autres anneaux d’or que tu fixeras par le bas aux deux bretelles de l’éphod, sur le devant, près de l’attache, au-dessus de la ceinture de l’éphod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On liera les anneaux du pectoral à ceux de l’éphod par un cordonnet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cordonnet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: passait à travers les anneaux inférieurs du pectoral et ceux de l’éphod pour fixer l’éphod dans le bas comme il l’était par les chaînettes dans le haut.
      marker-yv: yv-n
    - type: text
      text: ' de pourpre violette, pour qu’il soit fixé sur la ceinture de l’éphod sans pouvoir s’en séparer.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, par ce pectoral du verdict, lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d’Israël pour en évoquer constamment le souvenir devant l’Eternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu donneras des instructions à tous les artisans habiles que j’ai remplis d’un Esprit qui leur confère de l’habileté : tu leur demanderas de confectionner les vêtements d’Aaron pour le consacrer à mon sacerdoce. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu placeras dans le pectoral du verdict l’ourim et le toummim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.30 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'L’ourim et le toummim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étaient deux objets dont la nature nous est inconnue : on s’en servait pour connaître la volonté de Dieu (voir Nb 27.21 ; 1 S 14.41-42 ; 28.6 ; Esd 2.63 ; Né 7.65).'
      marker-yv: yv-n
    - type: text
      text: ', qui seront ainsi sur le cœur d’Aaron lorsqu’il se présentera devant l’Eternel, et Aaron portera en permanence sur son cœur, devant l’Eternel, le moyen de connaître mon verdict concernant les problèmes des Israélites.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les autres vêtements du grand-prêtre et de ses fils
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu feras la robe de l’éphod tout entière en pourpre violette
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sorte de chemise sans manches qui se portait sous l’éphod et le pectoral.
      marker-yv: yv-n
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle aura au milieu une ouverture pour y passer la tête, elle sera garnie tout autour d’un ourlet tissé comme l’encolure d’un vêtement de cuir, pour que la robe ne se déchire pas. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu en garniras le pan de grenades faites de fils de pourpre violette et écarlate et de rouge éclatant alternant avec des clochettes d’or tout autour : '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'une clochette d’or et une grenade, et ainsi de suite sur tout le tour du pan de la robe. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron la portera pour effectuer son service et l’on entendra le tintement des clochettes lorsqu’il entrera en présence de l’Eternel dans le lieu saint et lorsqu’il en sortira ; ainsi il ne mourra pas.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras un insigne d’or pur sur lequel tu graveras comme sur un sceau à cacheter : « Consacré à l’Eternel ». '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu le fixeras par un cordonnet de pourpre violette sur le devant du turban '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pour qu’il orne le front d’Aaron. Il se chargera des fautes commises par les Israélites lorsqu’ils m’apporteront toute espèce d’offrandes consacrées. Cet insigne sera toujours sur son front pour que moi, l’Eternel, je les agrée.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfin tu feras confectionner pour lui la tunique de fin lin et le turban de fin lin ; et la ceinture, celle-ci sera brodée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les habits qu’ils auront à confectionner : un pectoral, un éphod, une robe, une tunique brodée, un turban et une écharpe. Ils feront ces vêtements sacrés pour ton frère Aaron et pour ses fils, afin qu’ils me servent comme prêtres. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu feras aussi pour les fils d’Aaron des tuniques, des ceintures et des turbans, insignes de gloire et de dignité.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu revêtiras ton frère Aaron ainsi que ses fils de ces ornements ; tu leur conféreras l’onction pour les investir de leur charge et les consacrer à mon service comme prêtres. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur feras aussi des caleçons de lin pour cacher leur nudité des reins aux cuisses. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron et ses fils les porteront quand ils entreront dans la tente de la Rencontre ou quand ils s’approcheront de l’autel pour faire le service dans le lieu saint ; ainsi, ils ne se rendront pas coupables d’une faute qui entraînerait leur mort. C’est une ordonnance en vigueur à perpétuité pour Aaron et pour ses descendants.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils utiliseront des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’éphod
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils feront l’éphod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce terme désigne un tablier ou corselet fixé à la poitrine du grand-prêtre par deux bretelles. Dans d’autres passages, il renvoie à un objet de culte (Jg 8.27 ; 18.17 ; Os 3.4).
      marker-yv: yv-n
    - type: text
      text: ' avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, dans les règles de l’art. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On y fera deux bretelles cousues à ses deux bords. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa ceinture sera faite de la même façon, de la même étoffe que l’éphod ; elle sera faite de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu prendras deux pierres d’onyx sur lesquelles tu graveras les noms des fils d’Israël : '
