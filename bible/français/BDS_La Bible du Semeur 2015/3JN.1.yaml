document_id: 3JN.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation et vœu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Ancien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Jn 1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', à mon bien cher Gaïus que j’aime dans la vérité.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi, quand je viendrai, je rendrai les autres attentifs à sa manière d’agir : il tient de méchants propos contre nous, et, non content de cela, il refuse de recevoir les frères de passage. En plus, ceux qui seraient désireux de les accueillir, il les en empêche et les chasse de l’Eglise.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cher ami, n’imite pas le mal, mais le bien. Celui qui fait le bien est de Dieu ; celui qui commet le mal ne sait rien de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Témoignage rendu à Démétrius
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à Démétrius, tout le monde n’en dit que du bien, et la vérité elle-même témoigne en sa faveur. Nous lui rendons nous aussi un témoignage positif et tu sais que notre témoignage est vrai.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Projet de visite et salutation finale
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’aurais bien des choses à t’écrire, mais je ne veux pas les confier à l’encre et à la plume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’espère te voir bientôt et alors nous nous entretiendrons de vive voix.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la paix soit avec toi. Les amis te saluent. Salue nos amis, chacun personnellement.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cher ami, je souhaite que tu prospères à tous égards et que tu sois en aussi bonne santé physique que tu l’es spirituellement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’attitude juste de Gaïus
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis beaucoup réjoui lorsque des frères sont venus de chez toi et m’ont rendu ce témoignage : tu demeures attaché à la vérité et tu vis selon cette vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je n’ai pas de plus grande joie que d’apprendre que mes enfants vivent selon la vérité.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cher ami, tu agis avec fidélité dans ce que tu accomplis pour les frères qui, de plus, sont des étrangers pour toi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont rendu témoignage à ton amour devant l’Eglise. Tu agiras bien si tu pourvois à la suite de leur voyage d’une façon qui plaît à Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, c’est pour proclamer Christ qu’ils sont partis sans rien accepter de la part des non-croyants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est donc notre devoir d’accueillir de tels hommes. Ainsi nous collaborerons à ce qu’ils font pour la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les mauvais procédés de Diotrèphe
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai écrit quelques mots à l’Eglise, mais Diotrèphe, qui veut être le chef parmi eux, ne tient aucun compte de nous. '
