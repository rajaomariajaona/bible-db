document_id: JER.44
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Contre les Juifs en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici le message que Jérémie reçut pour tous les Judéens installés en Egypte et demeurant à Migdol, à Daphné, à Memphis et dans la région de Patros
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Migdol
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à l’est du delta du Nil, à la limite du pays (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14.2
        metadata:
          usfm: EXO.14.2
      - type: text
        text: '). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Daphné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Memphis
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'villes du delta du Nil. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la région de Patros
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud de Memphis.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Vous avez vu tous les malheurs que j’ai fait venir sur Jérusalem et sur toutes les villes de Juda ; elles sont aujourd’hui en ruine et personne n’y habite plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout cela est arrivé à cause du mal que leurs habitants ont commis. Ils m’ont irrité en allant offrir des parfums et rendre un culte à d’autres dieux qu’ils n’avaient pas connus, ni eux, ni vous, ni vos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pourtant, sans me lasser, je vous ai envoyé tous mes serviteurs les prophètes pour vous dire : « Ne commettez donc pas ces actes abominables qui me sont en horreur. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais ils n’ont pas écouté, ils n’ont pas prêté attention mais ont refusé d’abandonner leurs actes mauvais et ils ont continué à offrir des parfums à d’autres dieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aussi mon indignation et ma colère ont éclaté contre eux et elles ont consumé les villes de Juda et les rues de Jérusalem, qui ont été dévastées et sont devenues des tas de ruines, comme c’est actuellement le cas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et maintenant, voici ce que déclare l’Eternel, le Dieu des armées célestes, Dieu d’Israël : Pourquoi vous faites-vous tant de mal à vous-mêmes ? Pourquoi voulez-vous faire disparaître du peuple de Juda les hommes et les femmes, les enfants et les nourrissons au point qu’il ne vous reste aucun survivant ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous m’irritez par tous vos actes, en offrant des parfums à d’autres dieux en Egypte où vous avez immigré. Vous vous attirez ainsi la destruction, de même que la malédiction et l’opprobre de la part de tous les autres peuples de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avez-vous oublié les méfaits commis par vos ancêtres et ceux des rois de Juda, et les méfaits de leurs femmes ainsi que vos propres méfaits et ceux de vos femmes, ces méfaits que vous avez commis au pays de Juda et dans les rues de Jérusalem ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jusqu’à ce jour, ils n’ont pas éprouvé de remords ; ils n’ont manifesté aucune crainte, ils n’ont pas observé ma Loi et mes commandements que je vous avais données, à vous comme à vos ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je vais me retourner contre vous pour votre malheur ; et pour exterminer tout ce peuple de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je prendrai ce qui reste des Judéens qui se sont obstinés à venir immigrer ici, et ils seront tous détruits en Egypte : ils tomberont et périront tous, par l’épée ou par la famine. Oui, le peuple au grand complet mourra par l’épée ou par la famine. La dévastation fondra sur lui et il sera en butte à la malédiction, aux imprécations et à l’opprobre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: J’interviendrai contre ceux qui sont installés en Egypte, comme je suis intervenu contre Jérusalem par l’épée, par la famine et par la peste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il n’y aura ni rescapé ni survivant parmi tous ceux qui restent de Juda et qui sont venus s’installer en Egypte pour retourner ensuite au pays de Juda où ils désirent tellement retourner pour y demeurer. Mais ils n’y retourneront pas, sinon quelques rescapés.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’Eternel ou la Reine du ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors tous les hommes qui savaient que leurs femmes offraient des parfums à des dieux étrangers, toutes les femmes réunies là en grand nombre, et tous les gens du peuple qui habitaient en Egypte, à Patros, répondirent ainsi à Jérémie : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous refusons d’écouter ce que tu nous dis au nom de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nous ferons plutôt selon ce que nous avons décidé : nous offrirons des parfums à la Reine du ciel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.18'
        metadata:
          usfm: JER.7.18
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ' et nous répandrons des libations en son honneur, comme nous l’avons fait, nous et nos ancêtres, nos rois et nos dirigeants, dans les villes de Juda et dans les rues de Jérusalem. Alors, nous mangions à notre faim et nous étions heureux, nous ne connaissions pas le malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais depuis que nous avons cessé d’offrir des parfums à la Reine du ciel et de répandre des libations en son honneur, nous avons manqué de tout et nous périssons par l’épée et par la famine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: – D’ailleurs, ajoutèrent les femmes, quand nous offrons des parfums à la Reine du ciel et quand nous répandons des libations en son honneur, est-ce à l’insu de notre mari
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La Loi déclarait nuls les vœux formés par la femme à l’insu de son mari (voir Nb 30.4-9 ; 10.15).
    marker-yv: yv-n
  - type: text
    text: ' que nous lui faisons des gâteaux qui la représentent et que nous répandons des libations pour elle ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors Jérémie parla à toute la foule réunie, aux hommes, aux femmes et à tout le peuple qui lui avaient ainsi répondu. Il leur dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Eternel a justement tenu compte de ces parfums que vous avez fait brûler dans les villes de Juda et dans les rues de Jérusalem, vous et vos ancêtres, vos rois et vos dirigeants, et les gens du peuple ; c’est bien là ce qu’il a pris à cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Eternel n’a pas pu supporter plus longtemps vos agissements mauvais et les actes abominables que vous avez commis. Voilà pourquoi votre pays est devenu un champ de ruines, une terre dévastée et maudite où personne n’habite plus, comme c’est actuellement le cas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est parce que vous avez offert ces parfums et que vous vous êtes rendus coupables envers l’Eternel, parce que vous n’avez pas écouté l’Eternel et que vous n’avez pas vécu dans l’obéissance à sa Loi, à ses commandements et ses prescriptions, que ce malheur vous a atteints, comme c’est actuellement le cas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis Jérémie dit à tout le peuple, et notamment à toutes les femmes : Vous tous, gens de Juda, qui vivez en Egypte, écoutez ce que dit l’Eternel : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Vous, les femmes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous, les femmes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque et les formes verbales féminines qui suivent dans l’hébreu. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Vous et vos femmes.
    marker-yv: yv-n
  - type: text
    text: ', vous l’avez dit vous-mêmes : « Nous sommes décidées à accomplir les vœux que nous avons faits, c’est-à-dire que nous voulons offrir des parfums à la Reine du ciel et répandre des libations en son honneur. » Et vous vous êtes exécutées. Eh bien, accomplissez donc vos vœux ! Oui, tenez vos engagements jusqu’au bout ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et par conséquent, écoutez ce que dit l’Eternel, vous tous, Judéens qui êtes installés en Egypte : Moi, j’ai juré par mon grand nom, déclare l’Eternel, de ne plus laisser un Judéen prononcer mon nom dans toute l’Egypte, en disant : « Aussi vrai que le Seigneur, l’Eternel est vivant… ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vais veiller sur eux pour leur malheur et non pour leur bien ; tous les Judéens qui sont en Egypte périront par l’épée ou par la famine jusqu’à leur extermination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Seul un petit nombre d’entre eux échapperont à l’épée et retourneront d’Egypte en Juda. Alors tous ceux qui resteront des Judéens venus s’installer en Egypte sauront quelle parole se sera réalisée : la mienne ou la leur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et voici un signe – l’Eternel le déclare – pour vous prouver que je vais intervenir contre vous en ce lieu-ci et pour que vous sachiez que mes paroles s’accompliront pour votre malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Voici ce que déclare l’Eternel : Je vais livrer le pharaon Hophra, roi d’Egypte, à ses ennemis et à ceux qui en veulent à sa vie, tout comme j’ai livré Sédécias'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 25.5-7 ; Jr 39.5-7 ; 52.8-11.
    marker-yv: yv-n
  - type: text
    text: ', roi de Juda, à son ennemi Nabuchodonosor, roi de Babylone, qui en voulait à sa vie.'
