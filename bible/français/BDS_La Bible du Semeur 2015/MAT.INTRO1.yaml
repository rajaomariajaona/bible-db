document_id: MAT.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’auteur du premier évangile est un Juif lettré que la tradition la plus ancienne identifie à Matthieu, le collecteur d’impôts, un des douze apôtres. On note en particulier son souci de montrer, par ses abondantes citations de l’Ancien Testament, que Jésus accomplit les prophéties.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Son évangile s’organise autour de cinq longs discours de Jésus :'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – le sermon « sur la montagne », qui traite du comportement du disciple (chap. 5 à 7) ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – les recommandations aux disciples avant le départ en mission (chap. 10) ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – les paraboles qui expliquent ce qu’est le royaume des cieux (chap. 13) ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – le discours sur la vie de l’Eglise, la communauté qui appartient au Christ (chap. 18) ;
- type: usfm
  marker: ili1
  children:
  - type: text
    text: – le discours sur la fin des temps (chap. 24 à 25).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le thème du royaume des cieux apparaît comme central dans l’enseignement de Jésus, ce que confirme l’appellation fréquente de Jésus comme « Fils de David ». Jésus est le roi qui devait venir, qu’annonçaient les prophètes : tel est le message de Matthieu. Les mages apportent des cadeaux « au roi des Juifs ; » (2.2). Jésus proclame que « le règne des cieux est proche » (4.17) et qu’il appartient à ceux qui changent de vie (3.8), qui reconnaissent leur besoin de Dieu (5.1-10).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais le roi a beau donner les signes du royaume en guérissant les malades, en donnant à manger aux foules affamées (chap. 8 ; 9 ; 2 ; 4 à 15), il est rejeté, comme il l’avait annoncé lui-même à plusieurs reprises : les Juifs qui demandaient un roi n’avaient pas compris que ce roi devait souffrir.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: « Es-tu le roi des Juifs ? » demande Pilate après l’avoir arrêté. « Tu le dis toi-même », répond Jésus (27.11).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après sa résurrection, Jésus révèle qu’il n’est pas seulement le roi des Juifs : « J’ai reçu les pleins pouvoirs dans le ciel et sur terre » et il ordonne : « Faites des disciples parmi tous les peuples » (28.18-19).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Avant sa mort, Jésus avait donné à ses disciples la clé qui donne accès à son royaume : se convertir et devenir comme de petits enfants (18.3).'
