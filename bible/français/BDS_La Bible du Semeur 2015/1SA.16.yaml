document_id: 1SA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel fait oindre un nouveau roi et lui donne son Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel dit à Samuel : Combien de temps encore vas-tu pleurer sur Saül, alors que moi, je l’ai rejeté pour lui retirer la royauté sur Israël ? Remplis ta corne d’huile et va à Bethléhem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville de Juda à 7 kilomètres de Jérusalem, connue sous le nom d’Ephrata (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 48.7
        metadata:
          usfm: GEN.48.7
      - type: text
        text: ') et appelée plus tard '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la ville de David '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 2.4
        metadata:
          usfm: LUK.2.4
      - type: text
        text: ) où naîtra le Christ (Mi 5.1 ; Mt 2.1).
    marker-yv: yv-n
  - type: text
    text: ', je t’envoie chez Isaï'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Appelé aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jessé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans certaines traductions de la Bible.
    marker-yv: yv-n
  - type: text
    text: ', car je me suis choisi pour moi un roi parmi ses fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samuel répondit : Comment puis-je faire cela ? Saül l’apprendra et il me fera mourir !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’Eternel lui dit : Tu emmèneras une génisse et tu diras que tu vas m’offrir un sacrifice. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu inviteras Isaï à y assister et je t’indiquerai alors ce que tu devras faire. Tu conféreras de ma part l’onction à celui que je te désignerai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Samuel fit ce que l’Eternel lui avait ordonné. Lorsqu’il arriva à Bethléhem, les responsables de la ville, inquiets, vinrent au-devant de lui et lui demandèrent : Ta venue annonce-t-elle quelque chose de bon ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '– Oui, répondit-il, c’est quelque chose de bon : je suis venu offrir un sacrifice à l’Eternel. Purifiez-vous et venez ensuite avec moi au sacrifice.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il demanda également à Isaï et ses fils de se purifier en les invitant à prendre part au repas du sacrifice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A leur arrivée, il remarqua Eliab et se dit : Certainement, c’est celui qui se tient maintenant devant l’Eternel qu’il a choisi pour lui donner l’onction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais l’Eternel lui dit : Ne te laisse pas impressionner par son apparence physique et sa taille imposante, car ce n’est pas lui que j’ai choisi. Je ne juge pas de la même manière que les hommes. L’homme ne voit que ce qui frappe les yeux, mais l’Eternel regarde au cœur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ensuite Isaï appela Abinadab et le présenta à Samuel, mais il dit : L’Eternel n’a pas non plus choisi celui-ci.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis Isaï fit avancer Shamma. Samuel dit à nouveau : L’Eternel n’a pas non plus choisi celui-ci.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isaï présenta ainsi sept fils à Samuel et celui-ci lui dit : L’Eternel n’a choisi aucun de ceux-là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis il lui demanda : Est-ce que ce sont là tous tes garçons ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Non, répondit Isaï. Il reste encore le plus jeune qui garde les moutons au pâturage.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Envoie-le chercher ! ordonna Samuel, car nous ne nous installerons pas pour le repas du sacrifice avant qu’il ne soit arrivé ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaï le fit donc venir. C’était un garçon aux cheveux roux, avec de beaux yeux et qui avait belle apparence. L’Eternel dit à Samuel : C’est lui. Vas-y, confère-lui l’onction.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Samuel prit la corne pleine d’huile et il en oignit David en présence de sa famille. L’Esprit de l’Eternel tomba sur David et demeura sur lui à partir de ce jour-là et dans la suite. Après cela, Samuel se remit en route et retourna à Rama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel retire son Esprit à Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Esprit de l’Eternel se retira de Saül, tandis qu’un mauvais esprit envoyé par l’Eternel se mit à le tourmenter. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les serviteurs de Saül lui dirent : Voilà qu’un mauvais esprit envoyé par Dieu te tourmente. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il te suffit, notre seigneur, de dire un mot et tes serviteurs ici présents te chercheront quelqu’un qui sache jouer de la lyre. Quand le mauvais esprit de Dieu t’assaillira, le musicien jouera de son instrument et cela te soulagera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül répondit : D’accord, cherchez-moi donc un bon musicien et amenez-le-moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’un des serviteurs dit alors : J’ai justement remarqué un fils d’Isaï de Bethléhem, qui sait jouer de la lyre. C’est aussi un brave guerrier. De plus, il s’exprime bien, il a belle apparence et l’Eternel est avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Saül envoya alors des messagers à Isaï avec cet ordre : Envoie-moi ton fils David, celui qui garde les moutons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaï prit un âne qu’il chargea de pains, d’une outre de vin et d’un chevreau et il envoya ces présents à Saül par son fils David. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand celui-ci arriva chez Saül, il entra à son service ; Saül le prit en affection et lui confia le soin de porter ses armes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il envoya dire à Isaï : J’apprécie beaucoup David. Qu’il reste donc à mon service !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dès lors, chaque fois que le mauvais esprit venu de Dieu assaillait Saül, David prenait sa lyre et en jouait. Alors Saül se calmait et se sentait mieux, et le mauvais esprit le quittait.
