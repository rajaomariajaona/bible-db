document_id: 1SA.16,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel fait oindre un nouveau roi et lui donne son Esprit
  - type: text
    content: 'L’Eternel dit à Samuel : Combien de temps encore vas-tu pleurer sur Saül, alors que moi, je l’ai rejeté pour lui retirer la royauté sur Israël ? Remplis ta corne d’huile et va à Bethléhem'
  - type: note
    content: Ville de Juda à 7 kilomètres de Jérusalem, connue sous le nom d’Ephrata (Gn 48.7) et appelée plus tard la ville de David (Lc 2.4) où naîtra le Christ (Mi 5.1 ; Mt 2.1).
  - type: text
    content: ', je t’envoie chez Isaï'
  - type: note
    content: Appelé aussi Jessé dans certaines traductions de la Bible.
  - type: text
    content: ', car je me suis choisi pour moi un roi parmi ses fils.'
  '10':
  - type: text
    content: 'Isaï présenta ainsi sept fils à Samuel et celui-ci lui dit : L’Eternel n’a choisi aucun de ceux-là.'
  '11':
  - type: text
    content: 'Puis il lui demanda : Est-ce que ce sont là tous tes garçons ?'
  - type: text
    content: – Non, répondit Isaï. Il reste encore le plus jeune qui garde les moutons au pâturage.
  - type: text
    content: – Envoie-le chercher ! ordonna Samuel, car nous ne nous installerons pas pour le repas du sacrifice avant qu’il ne soit arrivé ici.
  '12':
  - type: text
    content: 'Isaï le fit donc venir. C’était un garçon aux cheveux roux, avec de beaux yeux et qui avait belle apparence. L’Eternel dit à Samuel : C’est lui. Vas-y, confère-lui l’onction.'
  '13':
  - type: text
    content: Samuel prit la corne pleine d’huile et il en oignit David en présence de sa famille. L’Esprit de l’Eternel tomba sur David et demeura sur lui à partir de ce jour-là et dans la suite. Après cela, Samuel se remit en route et retourna à Rama.
  - type: heading
    content: L’Eternel retire son Esprit à Saül
  '14':
  - type: text
    content: 'L’Esprit de l’Eternel se retira de Saül, tandis qu’un mauvais esprit envoyé par l’Eternel se mit à le tourmenter. '
  '15':
  - type: text
    content: 'Les serviteurs de Saül lui dirent : Voilà qu’un mauvais esprit envoyé par Dieu te tourmente. '
  '16':
  - type: text
    content: Il te suffit, notre seigneur, de dire un mot et tes serviteurs ici présents te chercheront quelqu’un qui sache jouer de la lyre. Quand le mauvais esprit de Dieu t’assaillira, le musicien jouera de son instrument et cela te soulagera.
  '17':
  - type: text
    content: 'Saül répondit : D’accord, cherchez-moi donc un bon musicien et amenez-le-moi !'
  '18':
  - type: text
    content: 'L’un des serviteurs dit alors : J’ai justement remarqué un fils d’Isaï de Bethléhem, qui sait jouer de la lyre. C’est aussi un brave guerrier. De plus, il s’exprime bien, il a belle apparence et l’Eternel est avec lui.'
  '19':
  - type: text
    content: 'Saül envoya alors des messagers à Isaï avec cet ordre : Envoie-moi ton fils David, celui qui garde les moutons.'
  '2':
  - type: text
    content: 'Samuel répondit : Comment puis-je faire cela ? Saül l’apprendra et il me fera mourir !'
  - type: text
    content: 'L’Eternel lui dit : Tu emmèneras une génisse et tu diras que tu vas m’offrir un sacrifice. '
  '20':
  - type: text
    content: 'Isaï prit un âne qu’il chargea de pains, d’une outre de vin et d’un chevreau et il envoya ces présents à Saül par son fils David. '
  '21':
  - type: text
    content: 'Quand celui-ci arriva chez Saül, il entra à son service ; Saül le prit en affection et lui confia le soin de porter ses armes. '
  '22':
  - type: text
    content: 'Il envoya dire à Isaï : J’apprécie beaucoup David. Qu’il reste donc à mon service !'
  '23':
  - type: text
    content: Dès lors, chaque fois que le mauvais esprit venu de Dieu assaillait Saül, David prenait sa lyre et en jouait. Alors Saül se calmait et se sentait mieux, et le mauvais esprit le quittait.
  '3':
  - type: text
    content: Tu inviteras Isaï à y assister et je t’indiquerai alors ce que tu devras faire. Tu conféreras de ma part l’onction à celui que je te désignerai.
  '4':
  - type: text
    content: 'Samuel fit ce que l’Eternel lui avait ordonné. Lorsqu’il arriva à Bethléhem, les responsables de la ville, inquiets, vinrent au-devant de lui et lui demandèrent : Ta venue annonce-t-elle quelque chose de bon ?'
  '5':
  - type: text
    content: '– Oui, répondit-il, c’est quelque chose de bon : je suis venu offrir un sacrifice à l’Eternel. Purifiez-vous et venez ensuite avec moi au sacrifice.'
  - type: text
    content: Il demanda également à Isaï et ses fils de se purifier en les invitant à prendre part au repas du sacrifice.
  '6':
  - type: text
    content: 'A leur arrivée, il remarqua Eliab et se dit : Certainement, c’est celui qui se tient maintenant devant l’Eternel qu’il a choisi pour lui donner l’onction.'
  '7':
  - type: text
    content: 'Mais l’Eternel lui dit : Ne te laisse pas impressionner par son apparence physique et sa taille imposante, car ce n’est pas lui que j’ai choisi. Je ne juge pas de la même manière que les hommes. L’homme ne voit que ce qui frappe les yeux, mais l’Eternel regarde au cœur.'
  '8':
  - type: text
    content: 'Ensuite Isaï appela Abinadab et le présenta à Samuel, mais il dit : L’Eternel n’a pas non plus choisi celui-ci.'
  '9':
  - type: text
    content: 'Puis Isaï fit avancer Shamma. Samuel dit à nouveau : L’Eternel n’a pas non plus choisi celui-ci.'
