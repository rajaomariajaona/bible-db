document_id: 2CH.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La visite de la reine de Saba
  - type: heading
    content: (1 R 10.1-13)
  - type: text
    content: La reine de Saba
  - type: note
    content: Sur la reine de Saba, voir note 1 R 10.1. Cf. Mt 12.42 ; Lc 11.31.
  - type: text
    content: ', ayant entendu parler de la réputation que Salomon avait acquise, vint à Jérusalem pour éprouver sa sagesse en lui posant des questions difficiles. Elle avait une suite importante et des chameaux chargés d’épices, de parfums, d’or en grande quantité et de pierres précieuses. Elle se présenta devant Salomon et parla avec lui de tout ce qu’elle avait sur le cœur. '
  '10':
  - type: text
    content: De plus, les équipages de Hiram et ceux de Salomon qui importaient de l’or d’Ophir ramenèrent aussi de là-bas du bois de santal
  - type: note
    content: Bois précieux importé par les Phéniciens.
  - type: text
    content: ', et des pierres précieuses. '
  '11':
  - type: text
    content: 'Le roi utilisa le bois de santal pour faire des escaliers pour le temple de l’Eternel et pour le palais royal, ainsi que des lyres et des luths pour les musiciens. Jamais on n’avait rien vu de pareil auparavant dans le pays de Juda. '
  '12':
  - type: text
    content: Le roi Salomon donna à la reine de Saba tout ce qu’elle désirait et ce qu’elle demandait – incomparablement plus que ce qu’elle avait apporté au roi. Après cela, elle s’en retourna dans son pays, accompagnée de ses serviteurs.
  - type: heading
    content: La richesse de Salomon
  - type: heading
    content: (1 R 10.14-29 ; 2 Ch 1.14-17)
  '13':
  - type: text
    content: 'Chaque année, Salomon recevait vingt tonnes d’or, '
  '14':
  - type: text
    content: 'sans compter le produit des taxes payées par les importateurs et les marchands ainsi que les tributs versés par tous les rois d’Arabie et les impôts perçus par les gouverneurs du pays qui apportaient de l’or et de l’argent à Salomon. '
  '15':
  - type: text
    content: 'Le roi Salomon fit fabriquer deux cents grands boucliers d’or battu, pour lesquels on employa six kilogrammes d’or par pièce, '
  '16':
  - type: text
    content: et trois cents petits boucliers d’or battu pour chacun desquels on employa trois kilogrammes d’or. Le roi les fit placer dans le palais de la Forêt-du-Liban
  - type: note
    content: Voir 1 R 7.2 et note.
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Il fit aussi fabriquer un grand trône d’ivoire plaqué d’or pur. '
  '18':
  - type: text
    content: 'Six marches y conduisaient, un marchepied en or y était fixé, et il y avait des accoudoirs de part et d’autre du siège, avec, à côté d’eux, deux lions sculptés. '
  '19':
  - type: text
    content: 'Douze lions se tenaient debout de part et d’autre des six marches. Rien de semblable n’existait dans aucun royaume. '
  '2':
  - type: text
    content: Salomon lui expliqua tout ce qu’elle demandait ; rien n’était trop difficile pour Salomon, il n’y avait aucun sujet sur lequel il ne pouvait lui donner de réponse.
  '20':
  - type: text
    content: 'Tout le service à boisson du roi Salomon était en or, et toute la vaisselle du palais de la Forêt-du-Liban en or fin. Car, du temps du roi Salomon, l’argent était considéré comme un métal sans grande valeur. '
  '21':
  - type: text
    content: En effet, le roi disposait d’une flotte de navires au long cours qui naviguaient avec les marins de Hiram, et qui, tous les trois ans, revenaient chargés d’or, d’argent, d’ivoire, de singes et de paons.
  - type: heading
    content: 'Conclusion : richesse et sagesse de Salomon'
  '22':
  - type: text
    content: 'Le roi Salomon surpassa tous les rois de la terre par sa richesse et sa sagesse. '
  '23':
  - type: text
    content: 'Tous les rois de la terre cherchaient à le rencontrer pour se mettre à l’écoute de la sagesse que Dieu lui avait donnée. '
  '24':
  - type: text
    content: 'Et chaque année, ces visiteurs lui apportaient leurs présents : des objets d’argent et d’or, des vêtements, des armes, des épices et des parfums, des chevaux et des mulets. '
  '25':
  - type: text
    content: Salomon avait quatre mille écuries pour les chevaux et les chars et douze mille hommes d’équipage pour ses chars. Il les cantonna dans des villes de garnison, ainsi qu’auprès de lui à Jérusalem
  - type: note
    content: Voir 2 Ch 1.14.
  - type: text
    content: '. '
  '26':
  - type: text
    content: Salomon dominait sur tous les rois de la région s’étendant depuis l’Euphrate jusqu’au pays des Philistins et jusqu’à la frontière d’Egypte
  - type: note
    content: Voir Gn 15.18.
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Le roi rendit l’argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine côtière le long de la Méditerranée. '
  '28':
  - type: text
    content: Des chevaux étaient importés d’Egypte pour Salomon et de tous les autres pays.
  - type: heading
    content: La fin du règne de Salomon
  - type: heading
    content: (1 R 11.41-43)
  '29':
  - type: text
    content: 'Les autres faits et gestes de Salomon, des premiers aux derniers, sont cités dans les Actes du prophète Nathan, dans la prophétie d’Ahiya de Silo et dans les Révélations du prophète Yéedo au sujet de Jéroboam, fils de Nebath. '
  '3':
  - type: text
    content: 'La reine de Saba constata combien Salomon était rempli de sagesse, elle vit le palais qu’il avait construit, '
  '30':
  - type: text
    content: 'Salomon régna quarante ans à Jérusalem sur tout Israël. '
  '31':
  - type: text
    content: Puis il rejoignit ses ancêtres décédés et on l’enterra dans la Cité de David, son père. Son fils Roboam lui succéda sur le trône.
  '4':
  - type: text
    content: 'les mets de sa table, le logement de ses serviteurs, l’organisation de leur service, leur livrée, ceux qui servaient à manger et à boire et leur tenue, et les holocaustes qu’il offrait dans le temple de l’Eternel. Elle en perdit le souffle '
  '5':
  - type: text
    content: 'et elle dit au roi : C’est donc bien vrai ce que j’avais entendu dire dans mon pays au sujet de tes propos et de ta sagesse ! '
  '6':
  - type: text
    content: 'Je ne croyais pas ce qu’on disait à ton sujet, avant d’être venue ici et de l’avoir vu de mes propres yeux. Et voici qu’on ne m’a pas raconté la moitié de l’ampleur de ta sagesse. Tu surpasses tout ce que j’avais entendu dire. '
  '7':
  - type: text
    content: 'Qu’ils en ont de la chance, tous ceux qui t’entourent et qui sont toujours en ta présence, de pouvoir profiter sans cesse de ta sagesse ! '
  '8':
  - type: text
    content: Béni soit l’Eternel, ton Dieu, qui t’a témoigné sa faveur en te plaçant sur son trône afin que tu sois roi pour lui, l’Eternel, ton Dieu ! C’est à cause de son amour pour Israël, et pour que ce peuple subsiste pour toujours que ton Dieu t’a établi roi sur ce peuple pour que tu le gouvernes avec justice et équité.
  '9':
  - type: text
    content: Ensuite, la reine fit cadeau au roi de trois tonnes et demie d’or, d’une très grande quantité de parfums et d’épices, et de pierres précieuses. Il n’y a plus eu de parfums et d’épices comparables à ceux que la reine de Saba offrit au roi Salomon.
