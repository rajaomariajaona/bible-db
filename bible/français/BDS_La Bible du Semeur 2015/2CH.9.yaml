document_id: 2CH.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La visite de la reine de Saba
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 10.1-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La reine de Saba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reine de Saba, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10.1
        metadata:
          usfm: 1KI.10.1
      - type: text
        text: . Cf. Mt 12.42 ; Lc 11.31.
    marker-yv: yv-n
  - type: text
    text: ', ayant entendu parler de la réputation que Salomon avait acquise, vint à Jérusalem pour éprouver sa sagesse en lui posant des questions difficiles. Elle avait une suite importante et des chameaux chargés d’épices, de parfums, d’or en grande quantité et de pierres précieuses. Elle se présenta devant Salomon et parla avec lui de tout ce qu’elle avait sur le cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Salomon lui expliqua tout ce qu’elle demandait ; rien n’était trop difficile pour Salomon, il n’y avait aucun sujet sur lequel il ne pouvait lui donner de réponse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La reine de Saba constata combien Salomon était rempli de sagesse, elle vit le palais qu’il avait construit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les mets de sa table, le logement de ses serviteurs, l’organisation de leur service, leur livrée, ceux qui servaient à manger et à boire et leur tenue, et les holocaustes qu’il offrait dans le temple de l’Eternel. Elle en perdit le souffle '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et elle dit au roi : C’est donc bien vrai ce que j’avais entendu dire dans mon pays au sujet de tes propos et de ta sagesse ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je ne croyais pas ce qu’on disait à ton sujet, avant d’être venue ici et de l’avoir vu de mes propres yeux. Et voici qu’on ne m’a pas raconté la moitié de l’ampleur de ta sagesse. Tu surpasses tout ce que j’avais entendu dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Qu’ils en ont de la chance, tous ceux qui t’entourent et qui sont toujours en ta présence, de pouvoir profiter sans cesse de ta sagesse ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Béni soit l’Eternel, ton Dieu, qui t’a témoigné sa faveur en te plaçant sur son trône afin que tu sois roi pour lui, l’Eternel, ton Dieu ! C’est à cause de son amour pour Israël, et pour que ce peuple subsiste pour toujours que ton Dieu t’a établi roi sur ce peuple pour que tu le gouvernes avec justice et équité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ensuite, la reine fit cadeau au roi de trois tonnes et demie d’or, d’une très grande quantité de parfums et d’épices, et de pierres précieuses. Il n’y a plus eu de parfums et d’épices comparables à ceux que la reine de Saba offrit au roi Salomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De plus, les équipages de Hiram et ceux de Salomon qui importaient de l’or d’Ophir ramenèrent aussi de là-bas du bois de santal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bois précieux importé par les Phéniciens.
    marker-yv: yv-n
  - type: text
    text: ', et des pierres précieuses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi utilisa le bois de santal pour faire des escaliers pour le temple de l’Eternel et pour le palais royal, ainsi que des lyres et des luths pour les musiciens. Jamais on n’avait rien vu de pareil auparavant dans le pays de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le roi Salomon donna à la reine de Saba tout ce qu’elle désirait et ce qu’elle demandait – incomparablement plus que ce qu’elle avait apporté au roi. Après cela, elle s’en retourna dans son pays, accompagnée de ses serviteurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La richesse de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 10.14-29 ; 2 Ch 1.14-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Chaque année, Salomon recevait vingt tonnes d’or, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'sans compter le produit des taxes payées par les importateurs et les marchands ainsi que les tributs versés par tous les rois d’Arabie et les impôts perçus par les gouverneurs du pays qui apportaient de l’or et de l’argent à Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi Salomon fit fabriquer deux cents grands boucliers d’or battu, pour lesquels on employa six kilogrammes d’or par pièce, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et trois cents petits boucliers d’or battu pour chacun desquels on employa trois kilogrammes d’or. Le roi les fit placer dans le palais de la Forêt-du-Liban
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 7.2
        metadata:
          usfm: 1KI.7.2
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il fit aussi fabriquer un grand trône d’ivoire plaqué d’or pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Six marches y conduisaient, un marchepied en or y était fixé, et il y avait des accoudoirs de part et d’autre du siège, avec, à côté d’eux, deux lions sculptés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Douze lions se tenaient debout de part et d’autre des six marches. Rien de semblable n’existait dans aucun royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout le service à boisson du roi Salomon était en or, et toute la vaisselle du palais de la Forêt-du-Liban en or fin. Car, du temps du roi Salomon, l’argent était considéré comme un métal sans grande valeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, le roi disposait d’une flotte de navires au long cours qui naviguaient avec les marins de Hiram, et qui, tous les trois ans, revenaient chargés d’or, d’argent, d’ivoire, de singes et de paons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Conclusion : richesse et sagesse de Salomon'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Salomon surpassa tous les rois de la terre par sa richesse et sa sagesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous les rois de la terre cherchaient à le rencontrer pour se mettre à l’écoute de la sagesse que Dieu lui avait donnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et chaque année, ces visiteurs lui apportaient leurs présents : des objets d’argent et d’or, des vêtements, des armes, des épices et des parfums, des chevaux et des mulets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Salomon avait quatre mille écuries pour les chevaux et les chars et douze mille hommes d’équipage pour ses chars. Il les cantonna dans des villes de garnison, ainsi qu’auprès de lui à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1.14
        metadata:
          usfm: 2CH.1.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Salomon dominait sur tous les rois de la région s’étendant depuis l’Euphrate jusqu’au pays des Philistins et jusqu’à la frontière d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 15.18
        metadata:
          usfm: GEN.15.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le roi rendit l’argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine côtière le long de la Méditerranée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Des chevaux étaient importés d’Egypte pour Salomon et de tous les autres pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin du règne de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 11.41-43)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les autres faits et gestes de Salomon, des premiers aux derniers, sont cités dans les Actes du prophète Nathan, dans la prophétie d’Ahiya de Silo et dans les Révélations du prophète Yéedo au sujet de Jéroboam, fils de Nebath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Salomon régna quarante ans à Jérusalem sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Puis il rejoignit ses ancêtres décédés et on l’enterra dans la Cité de David, son père. Son fils Roboam lui succéda sur le trône.
