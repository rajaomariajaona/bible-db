document_id: EZK.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’épée de l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tout le monde saura que c’est moi, l’Eternel, qui ai dégainé mon épée de son fourreau, et elle n’y rentrera plus. »
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et toi, fils d’homme, va pousser des gémissements. Le cœur brisé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le dos courbé.
      marker-yv: yv-n
    - type: text
      text: ', oui, pousse sous leurs yeux d’amers gémissements. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et s’ils viennent te dire : « Pourquoi donc gémis-tu ? » voici, tu répondras : « C’est à cause d’une nouvelle qui va venir : tous les cœurs vont perdre courage, tous les bras faibliront, tous les esprits se troubleront, tous les genoux flageoleront. Oui, elle vient cette nouvelle, elle va se réaliser, c’est là ce que déclare le Seigneur, l’Eternel. »'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le chant de l’épée du massacre
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole en ces termes :'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils d’homme, prophétise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis : « Ainsi parle l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée, l’épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est aiguisée, ╵elle est polie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si elle est aiguisée, ╵c’est en vue d’un massacre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle est bien polie ╵pour lancer des éclairs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-on se réjouir ╵du sceptre de mon fils ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée méprise ╵un tel morceau de bois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La traduction de la seconde moitié du verset est incertaine. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de l’Eternel est certainement le roi.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel donne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on donne.
      marker-yv: yv-n
    - type: text
      text: ' l’épée à polir,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il la donne à brandir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’épée est aiguisée, ╵elle est fourbie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on peut la remettre ╵aux mains du destructeur.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils d’homme, crie et hurle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est contre mon peuple ╵que l’épée est tirée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre tous les princes d’Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui sont voués au glaive, ╵avec mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors frappe-toi la poitrine
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est l’épreuve.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’arrivera-t-il ╵si le sceptre royal ╵que cette épée méprise ╵venait à disparaître ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵le Seigneur, l’Eternel. »
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils d’homme, prophétise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et frappe des deux mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’épée frappera ╵à deux reprises, ╵et même à trois.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’épée du massacre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cette épée fait un grand massacre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: encerclant ses victimes.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, tourne-toi vers le sud, proclame une parole sur les pays du midi et prophétise sur la forêt du Néguev. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que le cœur leur manque
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que beaucoup défaillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai mis en poste ╵aux portes de toutes les villes, ╵l’épée pour le carnage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, elle est faite ╵pour lancer des éclairs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle est dégainée ╵pour le massacre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du tranchant, frappe à droite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et frappe à gauche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: frappe de tous côtés.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi aussi, je vais frapper ╵une main contre l’autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et donner libre cours ╵à mon indignation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Eternel, je vous le dis.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’épée à la croisée des chemins
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toi, fils d’homme, trace deux chemins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de nouveau d’un acte symbolique (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' que pourra emprunter l’épée du roi de Babylone, deux chemins partant d’un même pays. A l’entrée de chaque chemin, tu placeras un panneau indiquant la direction d’une ville. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu traceras un chemin pour l’épée jusqu’à Rabba, la ville des Ammonites, et l’autre jusqu’à Jérusalem, la ville fortifiée, en Juda ; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car le roi de Babylone se tient au carrefour d’où partent les deux chemins pour consulter l’oracle : il secoue des flèches, il interroge les idoles domestiques, il examine le foie d’animaux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans sa main droite, le sort est tombé sur Jérusalem : Dresse les béliers, lance le cri de guerre pour appeler au carnage, place des béliers contre les portes, élève des terrasses de siège, construis des terrassements ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les habitants de Jérusalem ne voient en cela que de faux présages, puisqu’on s’est engagé envers eux par des serments solennels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il peut s’agir de l’engagement de l’Eternel à maintenir la dynastie davidique (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 7.14-16
        - type: text
          text: '), ou bien de l’engagement des Egyptiens à défendre Jérusalem contre les Babyloniens. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mais puisqu’ils se sont engagés envers lui par des serments solennels, le roi de Babylone leur rappellera leur crime, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c’est-à-dire la violation du serment d’allégeance que lui avait prêté le roi Sédécias.
      marker-yv: yv-n
    - type: text
      text: '. Mais le roi de Babylone leur rappellera leur crime, de sorte qu’ils seront pris. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : « Puisque vous avez attiré l’attention sur vos fautes et que vous avez mis à nu vos péchés et manifesté vos transgressions dans toutes vos actions, parce que vous avez ainsi attiré l’attention sur vous, vous serez capturés.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis à la forêt du Néguev : « Ecoute donc la parole de l’Eternel. Voici ce que déclare le Seigneur, l’Eternel : Moi, je vais allumer un feu chez toi, ce feu dévorera chez toi tout arbre vert, tout arbre sec. Et cette flamme ardente ne s’éteindra pas avant que tout le monde soit brûlé par elle, du midi jusqu’au nord'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 23.31
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à toi, prince d’Israël impie et méchant, l’heure va sonner pour la fin de tes péchés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce verset s’adresse à Sédécias (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25.4-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur, l’Eternel : Qu’on lui ôte le turban ! Qu’on lui enlève la couronne ! Ce qui est ne sera plus. Ce qui est abaissé sera élevé et ce qui est élevé sera abaissé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des ruines, des ruines ! J’en ferai des ruines comme jamais il n’y en a eu, et ce, jusqu’à ce que vienne celui à qui appartient le gouvernement et à qui je le remettrai. »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le châtiment des Ammonites
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, prophétise et dis : « Voici ce que déclare le Seigneur, l’Eternel, contre les Ammonites à cause de leurs outrages. Dis-leur : L’épée, l’épée est dégainée pour le massacre, elle est polie pour dévorer et lancer des éclairs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 33-37, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 49.1-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandis qu’on a pour vous des révélations illusoires, et des oracles mensongers, l’épée tranchera le cou des impies et des méchants. Le jour vient qui mettra un terme à tes péchés. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remettrai-je mon épée au fourreau ? Non ! Dans le lieu même où vous avez été créés, au pays de vos origines, je vous jugerai. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je déchaînerai contre vous mon indignation, je soufflerai sur vous le feu de ma colère, et je vous livrerai entre les mains de barbares, artisans de destruction. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous serez la proie du feu, votre sang coulera au milieu du pays et vous ne laisserez aucun souvenir. Car moi, l’Eternel, je l’ai dit. »
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tout le monde verra que c’est moi, l’Eternel, qui l’ai allumée : elle ne s’éteindra pas. »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je m’écriai : Ah ! Seigneur Eternel, ils disent à mon sujet : « Il ne fait que débiter des paraboles ! »'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel m’adressa la parole en ces termes :'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’homme, tourne-toi en direction de Jérusalem, proclame une parole sur les sanctuaires et prophétise sur le pays d’Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis au pays d’Israël : « Voici ce que déclare l’Eternel : Moi, je vais m’en prendre à toi, je tirerai de son fourreau mon épée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nabuchodonosor (v. 24).
      marker-yv: yv-n
    - type: text
      text: ' et j’extirperai les justes du milieu de toi, ainsi que les méchants. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pour retrancher de chez toi les justes ainsi que les méchants que je dégainerai l’épée de son fourreau, pour frapper tout le monde, du midi jusqu’au nord. '
