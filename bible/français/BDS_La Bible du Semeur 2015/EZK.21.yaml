document_id: EZK.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’épée de l’Eternel
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: Alors tout le monde saura que c’est moi, l’Eternel, qui ai dégainé mon épée de son fourreau, et elle n’y rentrera plus. »
  '11':
  - type: text
    content: Et toi, fils d’homme, va pousser des gémissements. Le cœur brisé
  - type: note
    content: 'Certains comprennent : le dos courbé.'
  - type: text
    content: ', oui, pousse sous leurs yeux d’amers gémissements. '
  '12':
  - type: text
    content: 'Et s’ils viennent te dire : « Pourquoi donc gémis-tu ? » voici, tu répondras : « C’est à cause d’une nouvelle qui va venir : tous les cœurs vont perdre courage, tous les bras faibliront, tous les esprits se troubleront, tous les genoux flageoleront. Oui, elle vient cette nouvelle, elle va se réaliser, c’est là ce que déclare le Seigneur, l’Eternel. »'
  - type: heading
    content: Le chant de l’épée du massacre
  '13':
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '14':
  - type: text
    content: Fils d’homme, prophétise.
  - type: text
    content: 'Dis : « Ainsi parle l’Eternel :'
  - type: text
    content: L’épée, l’épée
  - type: text
    content: est aiguisée, ╵elle est polie.
  '15':
  - type: text
    content: Si elle est aiguisée, ╵c’est en vue d’un massacre
  - type: text
    content: et elle est bien polie ╵pour lancer des éclairs.
  - type: text
    content: Peut-on se réjouir ╵du sceptre de mon fils ?
  - type: text
    content: L’épée méprise ╵un tel morceau de bois
  - type: note
    content: La traduction de la seconde moitié du verset est incertaine. Le fils de l’Eternel est certainement le roi.
  - type: text
    content: '  !'
  '16':
  - type: text
    content: L’Eternel donne
  - type: note
    content: 'Autre traduction : on donne.'
  - type: text
    content: ' l’épée à polir,'
  - type: text
    content: il la donne à brandir,
  - type: text
    content: l’épée est aiguisée, ╵elle est fourbie
  - type: text
    content: et l’on peut la remettre ╵aux mains du destructeur.
  '17':
  - type: text
    content: Fils d’homme, crie et hurle,
  - type: text
    content: car c’est contre mon peuple ╵que l’épée est tirée,
  - type: text
    content: et contre tous les princes d’Israël
  - type: text
    content: qui sont voués au glaive, ╵avec mon peuple.
  - type: text
    content: Alors frappe-toi la poitrine
  '18':
  - type: text
    content: car c’est l’épreuve.
  - type: text
    content: Et qu’arrivera-t-il ╵si le sceptre royal ╵que cette épée méprise ╵venait à disparaître ?
  - type: text
    content: C’est là ce que déclare ╵le Seigneur, l’Eternel. »
  '19':
  - type: text
    content: Fils d’homme, prophétise
  - type: text
    content: et frappe des deux mains,
  - type: text
    content: car l’épée frappera ╵à deux reprises, ╵et même à trois.
  - type: text
    content: C’est l’épée du massacre,
  - type: text
    content: cette épée fait un grand massacre,
  - type: text
    content: encerclant ses victimes.
  '2':
  - type: text
    content: 'Fils d’homme, tourne-toi vers le sud, proclame une parole sur les pays du midi et prophétise sur la forêt du Néguev. '
  '20':
  - type: text
    content: Pour que le cœur leur manque
  - type: text
    content: et que beaucoup défaillent,
  - type: text
    content: j’ai mis en poste ╵aux portes de toutes les villes, ╵l’épée pour le carnage.
  - type: text
    content: Oui, elle est faite ╵pour lancer des éclairs,
  - type: text
    content: et elle est dégainée ╵pour le massacre.
  '21':
  - type: text
    content: Du tranchant, frappe à droite
  - type: text
    content: et frappe à gauche,
  - type: text
    content: frappe de tous côtés.
  '22':
  - type: text
    content: Et moi aussi, je vais frapper ╵une main contre l’autre
  - type: text
    content: et donner libre cours ╵à mon indignation.
  - type: text
    content: Moi, l’Eternel, je vous le dis.
  - type: heading
    content: L’épée à la croisée des chemins
  '23':
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '24':
  - type: text
    content: Toi, fils d’homme, trace deux chemins
  - type: note
    content: Il s’agit de nouveau d’un acte symbolique (voir 4.1).
  - type: text
    content: ' que pourra emprunter l’épée du roi de Babylone, deux chemins partant d’un même pays. A l’entrée de chaque chemin, tu placeras un panneau indiquant la direction d’une ville. '
  '25':
  - type: text
    content: 'Tu traceras un chemin pour l’épée jusqu’à Rabba, la ville des Ammonites, et l’autre jusqu’à Jérusalem, la ville fortifiée, en Juda ; '
  '26':
  - type: text
    content: 'car le roi de Babylone se tient au carrefour d’où partent les deux chemins pour consulter l’oracle : il secoue des flèches, il interroge les idoles domestiques, il examine le foie d’animaux. '
  '27':
  - type: text
    content: 'Dans sa main droite, le sort est tombé sur Jérusalem : Dresse les béliers, lance le cri de guerre pour appeler au carnage, place des béliers contre les portes, élève des terrasses de siège, construis des terrassements ! '
  '28':
  - type: text
    content: Les habitants de Jérusalem ne voient en cela que de faux présages, puisqu’on s’est engagé envers eux par des serments solennels
  - type: note
    content: 'Il peut s’agir de l’engagement de l’Eternel à maintenir la dynastie davidique (2 S 7.14-16), ou bien de l’engagement des Egyptiens à défendre Jérusalem contre les Babyloniens. Autre traduction : Mais puisqu’ils se sont engagés envers lui par des serments solennels, le roi de Babylone leur rappellera leur crime, c’est-à-dire la violation du serment d’allégeance que lui avait prêté le roi Sédécias.'
  - type: text
    content: '. Mais le roi de Babylone leur rappellera leur crime, de sorte qu’ils seront pris. '
  '29':
  - type: text
    content: 'C’est pourquoi, voici ce que déclare le Seigneur, l’Eternel : « Puisque vous avez attiré l’attention sur vos fautes et que vous avez mis à nu vos péchés et manifesté vos transgressions dans toutes vos actions, parce que vous avez ainsi attiré l’attention sur vous, vous serez capturés.'
  '3':
  - type: text
    content: 'Dis à la forêt du Néguev : « Ecoute donc la parole de l’Eternel. Voici ce que déclare le Seigneur, l’Eternel : Moi, je vais allumer un feu chez toi, ce feu dévorera chez toi tout arbre vert, tout arbre sec. Et cette flamme ardente ne s’éteindra pas avant que tout le monde soit brûlé par elle, du midi jusqu’au nord'
  - type: note
    content: Voir Lc 23.31.
  - type: text
    content: '. '
  '30':
  - type: text
    content: Quant à toi, prince d’Israël impie et méchant, l’heure va sonner pour la fin de tes péchés
  - type: note
    content: Ce verset s’adresse à Sédécias (voir 2 R 25.4-7).
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Voici ce que dit le Seigneur, l’Eternel : Qu’on lui ôte le turban ! Qu’on lui enlève la couronne ! Ce qui est ne sera plus. Ce qui est abaissé sera élevé et ce qui est élevé sera abaissé. '
  '32':
  - type: text
    content: Des ruines, des ruines ! J’en ferai des ruines comme jamais il n’y en a eu, et ce, jusqu’à ce que vienne celui à qui appartient le gouvernement et à qui je le remettrai. »
  - type: heading
    content: Le châtiment des Ammonites
  '33':
  - type: text
    content: 'Fils d’homme, prophétise et dis : « Voici ce que déclare le Seigneur, l’Eternel, contre les Ammonites à cause de leurs outrages. Dis-leur : L’épée, l’épée est dégainée pour le massacre, elle est polie pour dévorer et lancer des éclairs'
  - type: note
    content: Pour les v. 33-37, voir Jr 49.1-6.
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Tandis qu’on a pour vous des révélations illusoires, et des oracles mensongers, l’épée tranchera le cou des impies et des méchants. Le jour vient qui mettra un terme à tes péchés. '
  '35':
  - type: text
    content: 'Remettrai-je mon épée au fourreau ? Non ! Dans le lieu même où vous avez été créés, au pays de vos origines, je vous jugerai. '
  '36':
  - type: text
    content: 'Et je déchaînerai contre vous mon indignation, je soufflerai sur vous le feu de ma colère, et je vous livrerai entre les mains de barbares, artisans de destruction. '
  '37':
  - type: text
    content: Vous serez la proie du feu, votre sang coulera au milieu du pays et vous ne laisserez aucun souvenir. Car moi, l’Eternel, je l’ai dit. »
  '4':
  - type: text
    content: 'Alors tout le monde verra que c’est moi, l’Eternel, qui l’ai allumée : elle ne s’éteindra pas. »'
  '5':
  - type: text
    content: 'Alors je m’écriai : Ah ! Seigneur Eternel, ils disent à mon sujet : « Il ne fait que débiter des paraboles ! »'
  '6':
  - type: text
    content: 'Alors l’Eternel m’adressa la parole en ces termes :'
  '7':
  - type: text
    content: 'Fils d’homme, tourne-toi en direction de Jérusalem, proclame une parole sur les sanctuaires et prophétise sur le pays d’Israël. '
  '8':
  - type: text
    content: 'Dis au pays d’Israël : « Voici ce que déclare l’Eternel : Moi, je vais m’en prendre à toi, je tirerai de son fourreau mon épée'
  - type: note
    content: Nabuchodonosor (v. 24).
  - type: text
    content: ' et j’extirperai les justes du milieu de toi, ainsi que les méchants. '
  '9':
  - type: text
    content: 'C’est pour retrancher de chez toi les justes ainsi que les méchants que je dégainerai l’épée de son fourreau, pour frapper tout le monde, du midi jusqu’au nord. '
