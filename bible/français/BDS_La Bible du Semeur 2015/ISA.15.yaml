  children:
  - type: text
    text: Contre Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Oracle sur Moab :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: En une nuit, ╵la voilà dévastée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’en est fait d’Ar en Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En une nuit, ╵la voilà dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’en est fait de Qir en Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ar en Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qir en Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont deux des principales villes du pays (pour les chap. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: ISA.15
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
        metadata:
          usfm: ISA.16
      - type: text
        text: ', voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 48
        metadata:
          usfm: JER.48
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le peuple de Dibôn ╵monte à ses sanctuaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ses hauts lieux, ╵afin d’y mener deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout Moab se lamente ╵sur Nébo et sur Médeba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nébo
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peut-être le mont d’où Moïse a contemplé le pays promis (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 34
        metadata:
          usfm: DEU.34
      - type: text
        text: '). '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Médeba
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sur le plateau au nord de Dibôn. Les Moabites possédaient alors le pays au nord de l’Arnon qui avait appartenu aux Israélites et qu’ils avaient reconquis à la mort d’Achab (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 3.4-5
        metadata:
          usfm: 2KI.3.4+2KI.3.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les têtes sont rasées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les barbes sont coupées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dans les rues, on revêt ╵les habits de toile de sac ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les toits en terrasse ╵et sur les places de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout le monde soupire ╵et se répand en larmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A Heshbôn, à Elealé, ╵les gens poussent des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les entend jusqu’à Yahats
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Heshbôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elealé
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'villes à la frontière nord du pays (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.26
        metadata:
          usfm: NUM.21.26
      - type: text
        text: '), à une trentaine de kilomètres au nord de la mer Morte. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yahats
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à l’est, aux confins du désert.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi les soldats de Moab ╵se mettent à crier
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont tout tremblants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J’appelle à l’aide ╵au sujet de Moab :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses fugitifs se sauvent ╵jusqu’à Tsoar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à Eglath-Shelishiya,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils gravissent en pleurant ╵la montée de Louhith.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sur le chemin d’Horonaïm, ╵ils poussent des cris déchirants :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: les eaux de Nimrim ont tari
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’herbe est desséchée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la végétation dépérit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute verdure a disparu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’oasis de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nimrim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à une quinzaine de kilomètres au sud-est de la mer Morte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aussi emportent-ils ╵ce qu’ils ont pu sauver
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs objets précieux ╵au-delà du torrent des Saules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car la clameur a fait le tour ╵du territoire de Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les lamentations ╵sont entendues à Eglaïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à Beer-Elim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deux villes situées aux frontières opposées de Moab, au nord et au sud.
    marker-yv: yv-n
  - type: text
    text: ' ╵retentissent ses hurlements :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: les eaux de Dimôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân, certains manuscrits de l’ancienne version grecque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dibôn.
    marker-yv: yv-n
  - type: text
    text: ' sont pleines de sang.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, j’infligerai à Dimôn ╵un surcroît de malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un lion fondra ╵sur les survivants de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ceux qui resteront ╵dans le pays.
