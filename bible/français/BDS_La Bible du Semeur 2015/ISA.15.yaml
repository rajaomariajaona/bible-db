document_id: ISA.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Moab
  - type: text
    content: 'Oracle sur Moab :'
  - type: text
    content: En une nuit, ╵la voilà dévastée.
  - type: text
    content: Oui, c’en est fait d’Ar en Moab.
  - type: text
    content: En une nuit, ╵la voilà dévastée,
  - type: text
    content: c’en est fait de Qir en Moab
  - type: note
    content: Ar en Moab et Qir en Moab sont deux des principales villes du pays (pour les chap. 15 et 16, voir Jr 48).
  - type: text
    content: .
  '2':
  - type: text
    content: Le peuple de Dibôn ╵monte à ses sanctuaires,
  - type: text
    content: à ses hauts lieux, ╵afin d’y mener deuil,
  - type: text
    content: tout Moab se lamente ╵sur Nébo et sur Médeba
  - type: note
    content: 'Nébo: peut-être le mont d’où Moïse a contemplé le pays promis (Dt 34). Médeba: sur le plateau au nord de Dibôn. Les Moabites possédaient alors le pays au nord de l’Arnon qui avait appartenu aux Israélites et qu’ils avaient reconquis à la mort d’Achab (2 R 3.4-5).'
  - type: text
    content: '  :'
  - type: text
    content: toutes les têtes sont rasées,
  - type: text
    content: toutes les barbes sont coupées.
  '3':
  - type: text
    content: Dans les rues, on revêt ╵les habits de toile de sac ;
  - type: text
    content: sur les toits en terrasse ╵et sur les places de la ville,
  - type: text
    content: tout le monde soupire ╵et se répand en larmes.
  '4':
  - type: text
    content: A Heshbôn, à Elealé, ╵les gens poussent des cris,
  - type: text
    content: on les entend jusqu’à Yahats
  - type: note
    content: 'Heshbôn et Elealé: villes à la frontière nord du pays (voir Nb 21.26), à une trentaine de kilomètres au nord de la mer Morte. Yahats: à l’est, aux confins du désert.'
  - type: text
    content: .
  - type: text
    content: Aussi les soldats de Moab ╵se mettent à crier
  - type: text
    content: et ils sont tout tremblants.
  '5':
  - type: text
    content: 'J’appelle à l’aide ╵au sujet de Moab :'
  - type: text
    content: ses fugitifs se sauvent ╵jusqu’à Tsoar,
  - type: text
    content: jusqu’à Eglath-Shelishiya,
  - type: text
    content: et ils gravissent en pleurant ╵la montée de Louhith.
  - type: text
    content: 'Sur le chemin d’Horonaïm, ╵ils poussent des cris déchirants :'
  '6':
  - type: text
    content: les eaux de Nimrim ont tari
  - type: text
    content: et l’herbe est desséchée,
  - type: text
    content: la végétation dépérit,
  - type: text
    content: toute verdure a disparu
  - type: note
    content: L’oasis de Nimrim, à une quinzaine de kilomètres au sud-est de la mer Morte.
  - type: text
    content: .
  '7':
  - type: text
    content: Aussi emportent-ils ╵ce qu’ils ont pu sauver
  - type: text
    content: et leurs objets précieux ╵au-delà du torrent des Saules.
  '8':
  - type: text
    content: Car la clameur a fait le tour ╵du territoire de Moab
  - type: text
    content: et les lamentations ╵sont entendues à Eglaïm,
  - type: text
    content: jusqu’à Beer-Elim
  - type: note
    content: Deux villes situées aux frontières opposées de Moab, au nord et au sud.
  - type: text
    content: ' ╵retentissent ses hurlements :'
  '9':
  - type: text
    content: les eaux de Dimôn
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân, certains manuscrits de l’ancienne version grecque et la Vulgate ont : Dibôn.'
  - type: text
    content: ' sont pleines de sang.'
  - type: text
    content: Oui, j’infligerai à Dimôn ╵un surcroît de malheur
  - type: text
    content: et un lion fondra ╵sur les survivants de Moab,
  - type: text
    content: sur ceux qui resteront ╵dans le pays.
