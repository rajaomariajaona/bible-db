document_id: PRO.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: Proverbes de Salomon
  - type: note
    content: Pour les noms proverbes et Salomon, voir l’introduction.
  - type: text
    content: ', fils de David, roi d’Israël. '
  '10':
  - type: text
    content: Mon fils, si des gens malfaisants veulent t’entraîner,
  - type: text
    content: ne leur cède pas.
  '11':
  - type: text
    content: 'S’ils te disent : « Viens avec nous,'
  - type: text
    content: dressons une embuscade pour tuer quelqu’un,
  - type: text
    content: 'tendons, sans raison, un piège à l’innocent :'
  '12':
  - type: text
    content: nous l’engloutirons tout vif comme le séjour des morts,
  - type: text
    content: il disparaîtra tout entier comme ceux qui descendent dans la tombe.
  '13':
  - type: text
    content: Nous ferons main basse sur un tas de biens précieux,
  - type: text
    content: nous remplirons nos maisons de butin.
  '14':
  - type: text
    content: Tu en auras ta part avec nous,
  - type: text
    content: nous ferons tous bourse commune »,
  '15':
  - type: text
    content: mon fils, ne te mets pas en route avec ces gens-là,
  - type: text
    content: évite d’emprunter les mêmes chemins qu’eux,
  '16':
  - type: text
    content: car ils se précipitent vers le mal,
  - type: text
    content: ils ont hâte de répandre le sang.
  '17':
  - type: text
    content: Mais il est vain de vouloir tendre un filet
  - type: text
    content: pendant que tous les oiseaux t’observent
  - type: note
    content: L’oiseau aperçoit le filet et s’envole. Le jeune homme averti fait comme lui et évite les pièges qui se retournent en fin de compte contre ceux qui les tendent (v. 18).
  - type: text
    content: .
  '18':
  - type: text
    content: En vérité, c’est au péril de leur propre vie que ces gens-là dressent des embûches,
  - type: text
    content: c’est à eux-mêmes qu’ils tendent des pièges.
  '19':
  - type: text
    content: 'C’est à cela qu’aboutiront tous ceux qui cherchent à s’enrichir par des voies malhonnêtes :'
  - type: text
    content: un gain mal acquis fait périr celui qui le détient.
  - type: heading
    content: Les appels de la sagesse
  '2':
  - type: text
    content: 'Ils ont pour but d’enseigner aux hommes la sagesse et de les éduquer, pour qu’ils comprennent les paroles prononcées avec intelligence, '
  '20':
  - type: text
    content: La Sagesse crie bien haut dans les rues,
  - type: text
    content: sa voix résonne sur les places publiques.
  '21':
  - type: text
    content: Dominant le tumulte, elle appelle.
  - type: text
    content: Près des portes de la ville
  - type: note
    content: Les juges siégeaient aux portes de la ville (31.23 ; Rt 4.11 ; Jb 29.7), les marchés se tenaient sur les places attenantes (2 R 7.1).
  - type: text
    content: ', elle fait entendre ses paroles, disant :'
  '22':
  - type: text
    content: Gens sans expérience, jusques à quand vous complairez-vous dans votre inexpérience ?
  - type: text
    content: Et vous, moqueurs, jusqu’à quand prendrez-vous plaisir à vous moquer ?
  - type: text
    content: Et vous, insensés, jusqu’à quand détesterez-vous la connaissance ?
  '23':
  - type: text
    content: Ecoutez mes avertissements,
  - type: text
    content: 'voici : je répandrai sur vous mon Esprit'
  - type: text
    content: et je vous ferai connaître mes paroles.
  '24':
  - type: text
    content: J’ai appelé et vous m’avez résisté,
  - type: text
    content: j’ai tendu la main et personne n’y a prêté attention.
  '25':
  - type: text
    content: Vous avez rejeté tous mes conseils
  - type: text
    content: et vous n’avez pas voulu de mes avertissements.
  '26':
  - type: text
    content: C’est pourquoi, lorsque le malheur fondra sur vous, je rirai,
  - type: text
    content: quand la terreur vous saisira, je me moquerai.
  '27':
  - type: text
    content: Quand l’épouvante, comme une tempête, viendra sur vous,
  - type: text
    content: que le malheur fondra sur vous comme un ouragan,
  - type: text
    content: et que la détresse et l’angoisse vous assailliront,
  '28':
  - type: text
    content: alors ils m’appelleront, mais je ne répondrai pas.
  - type: text
    content: Ils me chercheront, mais ne me trouveront pas
  - type: note
    content: Voir Jr 11.11 ; Mi 3.4.
  - type: text
    content: .
  '29':
  - type: text
    content: Puisqu’ils ont détesté la connaissance
  - type: text
    content: et qu’ils n’ont pas choisi de craindre l’Eternel,
  '3':
  - type: text
    content: 'et qu’ils reçoivent une éducation réfléchie en vue d’être justes, de vivre selon le droit et dans la droiture. '
  '30':
  - type: text
    content: qu’ils n’ont pas voulu de mes conseils
  - type: text
    content: et qu’ils ont dédaigné tous mes avertissements,
  '31':
  - type: text
    content: eh bien, ils récolteront les fruits de leur conduite
  - type: text
    content: et ils se repaîtront jusqu’à ce qu’ils en aient plus qu’assez de leurs propres projets.
  '32':
  - type: text
    content: Car la présomption des gens inexpérimentés causera leur mort,
  - type: text
    content: et l’assurance des insensés les perdra.
  '33':
  - type: text
    content: Mais celui qui m’écoute habitera en sécurité,
  - type: text
    content: il vivra tranquille, sans avoir à redouter le malheur.
  '4':
  - type: text
    content: Ces proverbes donneront aux gens sans expérience
  - type: note
    content: 'gens sans expérience: expression qui traduit un mot hébreu rendu aussi, dans les Proverbes, par stupides.'
  - type: text
    content: ' le bon sens et aux jeunes de la connaissance et du jugement. '
  '5':
  - type: text
    content: 'Que le sage écoute et il enrichira son savoir, et l’homme avisé acquerra l’art de bien se conduire. '
  '6':
  - type: text
    content: Ces proverbes sont destinés à faire comprendre les maximes et les paraboles et à pénétrer les propos des sages et leurs paroles énigmatiques.
  - type: heading
    content: La clé de la sagesse
  '7':
  - type: text
    content: C’est par la crainte de l’Eternel que commence la connaissance
  - type: note
    content: Voir 9.10 ; 15.33 ; 31.30 ; Jb 28.28 ; Ps 111.10.
  - type: text
    content: ','
  - type: text
    content: mépriser la sagesse et l’éducation, c’est être un insensé.
  - type: heading
    content: La vie selon la Sagesse
  - type: heading
    content: Se garder de mauvaises fréquentations
  '8':
  - type: text
    content: Mon fils, sois attentif à l’éducation que tu reçois de ton père
  - type: text
    content: et ne néglige pas l’instruction de ta mère,
  '9':
  - type: text
    content: car elles seront comme une belle couronne sur ta tête
  - type: text
    content: et comme des colliers à ton cou.
