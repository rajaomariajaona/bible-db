document_id: PRO.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proverbes de Salomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les noms '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'proverbes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Salomon, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir l’introduction.
      marker-yv: yv-n
    - type: text
      text: ', fils de David, roi d’Israël. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mon fils, si des gens malfaisants veulent t’entraîner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne leur cède pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S’ils te disent : « Viens avec nous,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dressons une embuscade pour tuer quelqu’un,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tendons, sans raison, un piège à l’innocent :'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: nous l’engloutirons tout vif comme le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il disparaîtra tout entier comme ceux qui descendent dans la tombe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nous ferons main basse sur un tas de biens précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous remplirons nos maisons de butin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu en auras ta part avec nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ferons tous bourse commune »,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: mon fils, ne te mets pas en route avec ces gens-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: évite d’emprunter les mêmes chemins qu’eux,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: car ils se précipitent vers le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont hâte de répandre le sang.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais il est vain de vouloir tendre un filet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pendant que tous les oiseaux t’observent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’oiseau aperçoit le filet et s’envole. Le jeune homme averti fait comme lui et évite les pièges qui se retournent en fin de compte contre ceux qui les tendent (v. 18).
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En vérité, c’est au péril de leur propre vie que ces gens-là dressent des embûches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est à eux-mêmes qu’ils tendent des pièges.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'C’est à cela qu’aboutiront tous ceux qui cherchent à s’enrichir par des voies malhonnêtes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un gain mal acquis fait périr celui qui le détient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les appels de la sagesse
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils ont pour but d’enseigner aux hommes la sagesse et de les éduquer, pour qu’ils comprennent les paroles prononcées avec intelligence, '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La Sagesse crie bien haut dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa voix résonne sur les places publiques.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dominant le tumulte, elle appelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Près des portes de la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les juges siégeaient aux portes de la ville (31.23 ; Rt 4.11 ; Jb 29.7), les marchés se tenaient sur les places attenantes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 7.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', elle fait entendre ses paroles, disant :'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Gens sans expérience, jusques à quand vous complairez-vous dans votre inexpérience ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, moqueurs, jusqu’à quand prendrez-vous plaisir à vous moquer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, insensés, jusqu’à quand détesterez-vous la connaissance ?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ecoutez mes avertissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'voici : je répandrai sur vous mon Esprit'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vous ferai connaître mes paroles.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J’ai appelé et vous m’avez résisté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai tendu la main et personne n’y a prêté attention.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Vous avez rejeté tous mes conseils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous n’avez pas voulu de mes avertissements.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C’est pourquoi, lorsque le malheur fondra sur vous, je rirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand la terreur vous saisira, je me moquerai.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quand l’épouvante, comme une tempête, viendra sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le malheur fondra sur vous comme un ouragan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que la détresse et l’angoisse vous assailliront,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: alors ils m’appelleront, mais je ne répondrai pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me chercheront, mais ne me trouveront pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jr 11.11 ; Mi 3.4.
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Puisqu’ils ont détesté la connaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils n’ont pas choisi de craindre l’Eternel,
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et qu’ils reçoivent une éducation réfléchie en vue d’être justes, de vivre selon le droit et dans la droiture. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: qu’ils n’ont pas voulu de mes conseils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’ils ont dédaigné tous mes avertissements,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: eh bien, ils récolteront les fruits de leur conduite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se repaîtront jusqu’à ce qu’ils en aient plus qu’assez de leurs propres projets.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Car la présomption des gens inexpérimentés causera leur mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’assurance des insensés les perdra.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mais celui qui m’écoute habitera en sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vivra tranquille, sans avoir à redouter le malheur.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ces proverbes donneront aux gens sans expérience
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gens sans expérience
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression qui traduit un mot hébreu rendu aussi, dans les Proverbes, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: stupides.
      marker-yv: yv-n
    - type: text
      text: ' le bon sens et aux jeunes de la connaissance et du jugement. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Que le sage écoute et il enrichira son savoir, et l’homme avisé acquerra l’art de bien se conduire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ces proverbes sont destinés à faire comprendre les maximes et les paraboles et à pénétrer les propos des sages et leurs paroles énigmatiques.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La clé de la sagesse
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C’est par la crainte de l’Eternel que commence la connaissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 9.10 ; 15.33 ; 31.30 ; Jb 28.28 ; Ps 111.10.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mépriser la sagesse et l’éducation, c’est être un insensé.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La vie selon la Sagesse
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Se garder de mauvaises fréquentations
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mon fils, sois attentif à l’éducation que tu reçois de ton père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne néglige pas l’instruction de ta mère,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: car elles seront comme une belle couronne sur ta tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme des colliers à ton cou.
