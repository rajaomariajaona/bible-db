document_id: AMO.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La corbeille de fruits
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici encore ce que me fit voir le Seigneur, l’Eternel : il y avait une corbeille remplie de fruits mûrs comme à la fin de l’été. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je changerai vos fêtes ╵en jours de deuil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous vos chants ╵en amères lamentations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’imposerai ╵un habit de toile de sac ╵à tous les habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur ferai raser la tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’infligerai à ce pays ╵une douleur aussi profonde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que lorsqu’on perd un fils unique ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce qui adviendra par la suite ╵ne sera que jour de malheur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici venir des jours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je répandrai la famine ╵dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on aura faim et soif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non pas de pain ou d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais faim et soif d’entendre ╵les paroles de l’Eternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ils erreront ╵d’une mer jusqu’à l’autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et puis du nord à l’est,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils iront çà et là ╵pour rechercher ╵la parole de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils ne la trouveront pas.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, ╵les belles jeunes filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les jeunes hommes ╵dépériront de soif.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui prêtent serment ╵par l’idole coupable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’idole coupable. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On peut aussi comprendre : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le dieu Asham '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mentionné à Eléphantine sous le nom d’Asham-Béthel, ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la déesse Ashimah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 17.30
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵de Samarie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tous ceux qui disent : ╵« Vive ton dieu, ô Dan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ton Dieu, ô Dan
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 12.29-30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vive le culte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le culte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la voie, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c.-à-d. la pratique cultuelle. Certains y voient le titre d’une divinité connue à Ougarit : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la puissance. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En remplaçant une lettre du mot hébreu par une autre très ressemblante, on obtient : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ton bien-aimé, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui pourrait encore être une manière de se référer à une divinité.
      marker-yv: yv-n
    - type: text
      text: ' ╵rendu à Beer-Sheva'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.5'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: '  »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tomberont sans jamais se relever.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit : Que vois-tu, Amos ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je lui répondis : Je vois une corbeille remplie de fruits mûrs comme à la fin de l’été.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel me dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fin est arrivée ╵pour Israël, mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car désormais, ╵je ne lui laisserai plus rien passer.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, ╵les chants dans le palais ╵deviendront des lamentations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les chants dans le palais… lamentations. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les musiciens du palais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du Temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se lamenteront.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les cadavres ╵seront nombreux ╵dans tous les lieux ; ╵on les jettera en silence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et on les jettera. Silence !
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les trafiquants avides
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez donc ceci, ╵vous, oppresseurs des indigents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui voulez en finir ╵avec les pauvres du pays,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'oui, vous qui dites : ╵Quand la nouvelle lune ╵sera-t-elle passée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous vendions notre blé ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le sabbat finira-t-il
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous ouvrions ╵nos magasins de grains ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous diminuerons la mesure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous en augmenterons le prix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la mesure
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en hébreu l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épha. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prix
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sicle.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous truquerons les balances
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 19.35-36 ; Dt 25.13-16 ; Pr 11.1 ; 16.11 ; 20.10, 23.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour tromper les clients,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis nous achèterons les pauvres ╵pour de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’indigent ╵pour une paire de sandales ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous vendrons même ╵jusqu’aux déchets du blé.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Eternel l’a juré : ╵Aussi vrai que Jacob ╵est orgueilleux'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Remarque ironique qui contraste avec ce que dit l’Eternel en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.2'
        - type: text
          text: ' et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.8'
        - type: text
          text: '. Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Eternel l’a juré par l’honneur de Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l’Eternel l’a juré par lui-même qui est la fierté de Jacob.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jamais, je n’oublierai ╵aucune de leurs œuvres.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de cela, ╵le pays tremblera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses habitants ╵seront en deuil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays se soulèvera ╵dans sa totalité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le Nil en crue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera agité, ╵et puis s’affaissera ╵comme le fleuve de l’Egypte.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un jour de deuil
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai coucher le soleil ╵à l’heure de midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, en plein jour, ╵je couvrirai la terre de ténèbres.
