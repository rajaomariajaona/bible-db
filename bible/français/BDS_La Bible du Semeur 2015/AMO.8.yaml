document_id: AMO.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La corbeille de fruits
  - type: text
    content: 'Voici encore ce que me fit voir le Seigneur, l’Eternel : il y avait une corbeille remplie de fruits mûrs comme à la fin de l’été. '
  '10':
  - type: text
    content: Je changerai vos fêtes ╵en jours de deuil
  - type: text
    content: et tous vos chants ╵en amères lamentations.
  - type: text
    content: J’imposerai ╵un habit de toile de sac ╵à tous les habitants,
  - type: text
    content: et leur ferai raser la tête.
  - type: text
    content: J’infligerai à ce pays ╵une douleur aussi profonde
  - type: text
    content: que lorsqu’on perd un fils unique ;
  - type: text
    content: ce qui adviendra par la suite ╵ne sera que jour de malheur.
  '11':
  - type: text
    content: Voici venir des jours
  - type: text
    content: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: text
    content: où je répandrai la famine ╵dans le pays,
  - type: text
    content: on aura faim et soif,
  - type: text
    content: non pas de pain ou d’eau,
  - type: text
    content: mais faim et soif d’entendre ╵les paroles de l’Eternel.
  '12':
  - type: text
    content: Alors ils erreront ╵d’une mer jusqu’à l’autre
  - type: text
    content: et puis du nord à l’est,
  - type: text
    content: ils iront çà et là ╵pour rechercher ╵la parole de l’Eternel,
  - type: text
    content: mais ils ne la trouveront pas.
  '13':
  - type: text
    content: En ce jour-là, ╵les belles jeunes filles,
  - type: text
    content: les jeunes hommes ╵dépériront de soif.
  '14':
  - type: text
    content: Ceux qui prêtent serment ╵par l’idole coupable
  - type: note
    content: 'l’idole coupable. On peut aussi comprendre : le dieu Asham mentionné à Eléphantine sous le nom d’Asham-Béthel, ou encore la déesse Ashimah (voir 2 R 17.30).'
  - type: text
    content: ' ╵de Samarie,'
  - type: text
    content: 'tous ceux qui disent : ╵« Vive ton dieu, ô Dan'
  - type: note
    content: 'ton Dieu, ô Dan: voir 1 R 12.29-30.'
  - type: text
    content: ','
  - type: text
    content: vive le culte
  - type: note
    content: 'le culte: en hébreu : la voie, c.-à-d. la pratique cultuelle. Certains y voient le titre d’une divinité connue à Ougarit : la puissance. En remplaçant une lettre du mot hébreu par une autre très ressemblante, on obtient : ton bien-aimé, ce qui pourrait encore être une manière de se référer à une divinité.'
  - type: text
    content: ' ╵rendu à Beer-Sheva'
  - type: note
    content: Voir 5.5 et note.
  - type: text
    content: '  »,'
  - type: text
    content: tomberont sans jamais se relever.
  '2':
  - type: text
    content: 'Il me dit : Que vois-tu, Amos ?'
  - type: text
    content: 'Et je lui répondis : Je vois une corbeille remplie de fruits mûrs comme à la fin de l’été.'
  - type: text
    content: 'Et l’Eternel me dit :'
  - type: text
    content: La fin est arrivée ╵pour Israël, mon peuple,
  - type: text
    content: car désormais, ╵je ne lui laisserai plus rien passer.
  '3':
  - type: text
    content: En ce jour-là, ╵les chants dans le palais ╵deviendront des lamentations
  - type: note
    content: 'les chants dans le palais… lamentations. Certains comprennent : les musiciens du palais (ou du Temple) se lamenteront.'
  - type: text
    content: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: text
    content: car les cadavres ╵seront nombreux ╵dans tous les lieux ; ╵on les jettera en silence
  - type: note
    content: 'Autre traduction : et on les jettera. Silence !'
  - type: text
    content: .
  - type: heading
    content: Les trafiquants avides
  '4':
  - type: text
    content: Ecoutez donc ceci, ╵vous, oppresseurs des indigents
  - type: text
    content: qui voulez en finir ╵avec les pauvres du pays,
  '5':
  - type: text
    content: 'oui, vous qui dites : ╵Quand la nouvelle lune ╵sera-t-elle passée,'
  - type: text
    content: pour que nous vendions notre blé ?
  - type: text
    content: Quand le sabbat finira-t-il
  - type: text
    content: pour que nous ouvrions ╵nos magasins de grains ?
  - type: text
    content: Nous diminuerons la mesure,
  - type: text
    content: nous en augmenterons le prix
  - type: note
    content: 'la mesure: en hébreu l’épha. le prix: en hébreu le sicle.'
  - type: text
    content: ','
  - type: text
    content: et nous truquerons les balances
  - type: note
    content: Voir Lv 19.35-36 ; Dt 25.13-16 ; Pr 11.1 ; 16.11 ; 20.10, 23.
  - type: text
    content: ' ╵pour tromper les clients,'
  '6':
  - type: text
    content: puis nous achèterons les pauvres ╵pour de l’argent,
  - type: text
    content: et l’indigent ╵pour une paire de sandales ;
  - type: text
    content: nous vendrons même ╵jusqu’aux déchets du blé.
  '7':
  - type: text
    content: 'L’Eternel l’a juré : ╵Aussi vrai que Jacob ╵est orgueilleux'
  - type: note
    content: 'Remarque ironique qui contraste avec ce que dit l’Eternel en 4.2 et 6.8. Autres traductions : l’Eternel l’a juré par l’honneur de Jacob ou l’Eternel l’a juré par lui-même qui est la fierté de Jacob.'
  - type: text
    content: ','
  - type: text
    content: jamais, je n’oublierai ╵aucune de leurs œuvres.
  '8':
  - type: text
    content: A cause de cela, ╵le pays tremblera
  - type: text
    content: et tous ses habitants ╵seront en deuil.
  - type: text
    content: Le pays se soulèvera ╵dans sa totalité
  - type: text
    content: comme le Nil en crue,
  - type: text
    content: il sera agité, ╵et puis s’affaissera ╵comme le fleuve de l’Egypte.
  - type: heading
    content: Un jour de deuil
  '9':
  - type: text
    content: En ce jour-là
  - type: text
    content: – c’est là ce que déclare ╵le Seigneur, l’Eternel –
  - type: text
    content: je ferai coucher le soleil ╵à l’heure de midi,
  - type: text
    content: et, en plein jour, ╵je couvrirai la terre de ténèbres.
