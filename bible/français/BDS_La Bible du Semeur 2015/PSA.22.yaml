document_id: PSA.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mon Dieu, pourquoi m’as-tu abandonné ?
  - type: text
    content: Au chef de chœur. Psaume de David, à chanter sur la mélodie de « Biche de l’aurore ».
  '10':
  - type: text
    content: Toi, tu m’as fait sortir ╵du ventre maternel,
  - type: text
    content: tu m’as mis en sécurité ╵sur le sein de ma mère.
  '11':
  - type: text
    content: Dès mon jeune âge, ╵j’ai été placé sous ta garde.
  - type: text
    content: Dès avant ma naissance, ╵tu es mon Dieu.
  '12':
  - type: text
    content: Ne reste pas si loin de moi ╵car le danger est proche,
  - type: text
    content: et il n’y a personne ╵qui vienne pour m’aider.
  '13':
  - type: text
    content: 'De nombreux taureaux m’environnent :'
  - type: text
    content: ces fortes bêtes du Basan
  - type: note
    content: Le Basan était la région du nord-est du pays d’Israël où l’on élevait des bovins renommés pour leur vigueur (voir Dt 32.14 ; Ez 39.18).
  - type: text
    content: ' ╵sont tout autour de moi.'
  '14':
  - type: text
    content: Ils ouvrent largement ╵leurs gueules contre moi,
  - type: text
    content: ils sont comme un lion ╵qui rugit et déchire.
  '15':
  - type: text
    content: Je suis comme une eau qui s’écoule
  - type: text
    content: et tous mes os sont disloqués.
  - type: text
    content: Mon cœur est pareil à la cire,
  - type: text
    content: on dirait qu’il se fond en moi.
  '16':
  - type: text
    content: Ma force est desséchée ╵comme un tesson d’argile,
  - type: text
    content: ma langue colle à mon palais
  - type: note
    content: Voir Jn 19.28.
  - type: text
    content: ','
  - type: text
    content: tu me fais retourner ╵à la poussière de la mort.
  '17':
  - type: text
    content: Des hordes de chiens m’environnent,
  - type: text
    content: la meute des méchants m’assaille.
  - type: text
    content: Ils ont percé
  - type: note
    content: 'D’après certains manuscrits hébreux et les versions grecque et syriaque. La plupart des manuscrits hébreux ont : comme un lion.'
  - type: text
    content: ' mes mains, mes pieds,'
  '18':
  - type: text
    content: je pourrais compter tous mes os ;
  - type: text
    content: ils me regardent, ils me toisent,
  '19':
  - type: text
    content: ils se partagent mes habits
  - type: text
    content: et tirent au sort ma tunique
  - type: note
    content: Voir Mt 27.35 ; Mc 15.24 ; Lc 23.34 ; Jn 19.24.
  - type: text
    content: .
  '2':
  - type: text
    content: Mon Dieu, mon Dieu, ╵pourquoi m’as-tu abandonné
  - type: note
    content: Jésus a repris ces paroles sur la croix (Mt 27.46 ; Mc 15.34).
  - type: text
    content: '  ?'
  - type: text
    content: Tu restes loin, ╵tu ne viens pas me secourir ╵malgré toutes mes plaintes.
  '20':
  - type: text
    content: Mais toi, ô Eternel, ╵ne reste pas si loin !
  - type: text
    content: O toi, ma force, ╵viens en hâte à mon aide !
  '21':
  - type: text
    content: Délivre ma vie de l’épée !
  - type: text
    content: Protège-moi ╵de la fureur des chiens !
  '22':
  - type: text
    content: Délivre-moi ╵de la gueule du lion !
  - type: text
    content: Préserve-moi ╵des cornes des taureaux !
  - type: text
    content: Oui, tu m’as répondu !
  '23':
  - type: text
    content: Je proclamerai à mes frères ╵quel Dieu tu es,
  - type: text
    content: je te louerai ╵dans l’assemblée
  - type: note
    content: Cité en Hé 2.12.
  - type: text
    content: .
  '24':
  - type: text
    content: Vous tous qui craignez l’Eternel, ╵célébrez-le !
  - type: text
    content: Descendants de Jacob, ╵glorifiez-le !
  - type: text
    content: Descendants d’Israël, ╵redoutez-le !
  '25':
  - type: text
    content: Il n’a ni mépris ni dédain ╵pour le pauvre dans l’affliction,
  - type: text
    content: il n’a pas détourné ╵son regard loin de lui.
  - type: text
    content: Non ! il a écouté ╵l’appel à l’aide ╵qu’il lui lançait.
  '26':
  - type: text
    content: Grâce à toi, je te loue ╵dans la grande assemblée,
  - type: text
    content: j’accomplirai mes vœux ╵devant ceux ╵qui te craignent.
  '27':
  - type: text
    content: Que les malheureux mangent, ╵et qu’ils soient rassasiés !
  - type: text
    content: Oui, qu’ils louent l’Eternel, ╵ceux qui vivent pour lui !
  - type: text
    content: Que votre vie dure toujours !
  '28':
  - type: text
    content: Aux confins de la terre, ╵tous les peuples du monde ╵se souviendront de l’Eternel. ╵Tous, ils se tourneront vers lui,
  - type: text
    content: et toutes les peuplades ╵se prosterneront devant lui.
  '29':
  - type: text
    content: Car l’Eternel est roi,
  - type: text
    content: et il domine sur les peuples.
  '3':
  - type: text
    content: Mon Dieu, le jour, j’appelle, ╵mais tu ne réponds pas.
  - type: text
    content: La nuit, je crie, ╵sans trouver de repos.
  '30':
  - type: text
    content: Tous les grands de la terre ╵mangeront et l’adoreront,
  - type: text
    content: et ceux qui s’en vont vers la tombe,
  - type: text
    content: ceux dont la vie décline, ╵se prosterneront devant lui.
  '31':
  - type: text
    content: Leur postérité, à son tour, ╵servira l’Eternel
  - type: text
    content: et parlera de lui ╵à la génération ╵qui viendra après elle.
  '32':
  - type: text
    content: Ils proclameront sa justice
  - type: text
    content: et ils annonceront ╵au peuple qui va naître ╵ce qu’a fait l’Eternel.
  '4':
  - type: text
    content: Pourtant, tu es le Saint
  - type: text
    content: qui sièges sur ton trône, ╵au milieu des louanges d’Israël.
  '5':
  - type: text
    content: En toi déjà, ╵nos pères se confiaient,
  - type: text
    content: oui, ils comptaient sur toi, ╵et tu les délivrais.
  '6':
  - type: text
    content: Lorsqu’ils criaient à toi, ╵ils étaient délivrés,
  - type: text
    content: lorsqu’ils comptaient sur toi, ╵ils n’étaient pas déçus.
  '7':
  - type: text
    content: Mais moi je suis un ver
  - type: note
    content: Voir Jb 25.6 ; Es 41.14.
  - type: text
    content: ', ╵je ne suis plus un homme,'
  - type: text
    content: tout le monde m’insulte, ╵le peuple me méprise,
  '8':
  - type: text
    content: ceux qui me voient ╵se rient de moi.
  - type: text
    content: Tous, ils ricanent, ╵en secouant la tête
  - type: note
    content: Réminiscence en Mt 27.39 ; Mc 15.29. Voir Ps 109.25.
  - type: text
    content: '  :'
  '9':
  - type: text
    content: « Il se confie en l’Eternel ?
  - type: text
    content: Eh bien, que maintenant ╵l’Eternel le délivre !
  - type: text
    content: Puisqu’il trouve en lui son plaisir, ╵qu’il le libère donc
  - type: note
    content: Cité par les autorités juives devant Jésus en croix (Mt 27.43).
  - type: text
    content: '  ! »'
