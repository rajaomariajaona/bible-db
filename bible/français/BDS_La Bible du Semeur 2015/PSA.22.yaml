document_id: PSA.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mon Dieu, pourquoi m’as-tu abandonné ?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David, à chanter sur la mélodie de « Biche de l’aurore ».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon Dieu, mon Dieu, ╵pourquoi m’as-tu abandonné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jésus a repris ces paroles sur la croix (Mt 27.46 ; Mc 15.34).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu restes loin, ╵tu ne viens pas me secourir ╵malgré toutes mes plaintes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mon Dieu, le jour, j’appelle, ╵mais tu ne réponds pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit, je crie, ╵sans trouver de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pourtant, tu es le Saint
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sièges sur ton trône, ╵au milieu des louanges d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En toi déjà, ╵nos pères se confiaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, ils comptaient sur toi, ╵et tu les délivrais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lorsqu’ils criaient à toi, ╵ils étaient délivrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’ils comptaient sur toi, ╵ils n’étaient pas déçus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais moi je suis un ver
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jb 25.6 ; Es 41.14.
    marker-yv: yv-n
  - type: text
    text: ', ╵je ne suis plus un homme,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout le monde m’insulte, ╵le peuple me méprise,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ceux qui me voient ╵se rient de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous, ils ricanent, ╵en secouant la tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence en Mt 27.39 ; Mc 15.29. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 109.25
        metadata:
          usfm: PSA.109.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Il se confie en l’Eternel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien, que maintenant ╵l’Eternel le délivre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu’il trouve en lui son plaisir, ╵qu’il le libère donc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité par les autorités juives devant Jésus en croix (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27.43
        metadata:
          usfm: MAT.27.43
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi, tu m’as fait sortir ╵du ventre maternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m’as mis en sécurité ╵sur le sein de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dès mon jeune âge, ╵j’ai été placé sous ta garde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès avant ma naissance, ╵tu es mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne reste pas si loin de moi ╵car le danger est proche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n’y a personne ╵qui vienne pour m’aider.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De nombreux taureaux m’environnent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces fortes bêtes du Basan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le Basan était la région du nord-est du pays d’Israël où l’on élevait des bovins renommés pour leur vigueur (voir Dt 32.14 ; Ez 39.18).
    marker-yv: yv-n
  - type: text
    text: ' ╵sont tout autour de moi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils ouvrent largement ╵leurs gueules contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont comme un lion ╵qui rugit et déchire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je suis comme une eau qui s’écoule
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous mes os sont disloqués.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur est pareil à la cire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dirait qu’il se fond en moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ma force est desséchée ╵comme un tesson d’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma langue colle à mon palais
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19.28
        metadata:
          usfm: JHN.19.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me fais retourner ╵à la poussière de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Des hordes de chiens m’environnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la meute des méchants m’assaille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont percé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux et les versions grecque et syriaque. La plupart des manuscrits hébreux ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme un lion.
    marker-yv: yv-n
  - type: text
    text: ' mes mains, mes pieds,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: je pourrais compter tous mes os ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me regardent, ils me toisent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ils se partagent mes habits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tirent au sort ma tunique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 27.35 ; Mc 15.24 ; Lc 23.34 ; Jn 19.24.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais toi, ô Eternel, ╵ne reste pas si loin !
- type: usfm
  marker: q1
  children:
  - type: text
    text: O toi, ma force, ╵viens en hâte à mon aide !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Délivre ma vie de l’épée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège-moi ╵de la fureur des chiens !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Délivre-moi ╵de la gueule du lion !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préserve-moi ╵des cornes des taureaux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu m’as répondu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je proclamerai à mes frères ╵quel Dieu tu es,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te louerai ╵dans l’assemblée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2.12
        metadata:
          usfm: HEB.2.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vous tous qui craignez l’Eternel, ╵célébrez-le !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Descendants de Jacob, ╵glorifiez-le !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Descendants d’Israël, ╵redoutez-le !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il n’a ni mépris ni dédain ╵pour le pauvre dans l’affliction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’a pas détourné ╵son regard loin de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non ! il a écouté ╵l’appel à l’aide ╵qu’il lui lançait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Grâce à toi, je te loue ╵dans la grande assemblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’accomplirai mes vœux ╵devant ceux ╵qui te craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Que les malheureux mangent, ╵et qu’ils soient rassasiés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, qu’ils louent l’Eternel, ╵ceux qui vivent pour lui !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que votre vie dure toujours !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aux confins de la terre, ╵tous les peuples du monde ╵se souviendront de l’Eternel. ╵Tous, ils se tourneront vers lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les peuplades ╵se prosterneront devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Car l’Eternel est roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il domine sur les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tous les grands de la terre ╵mangeront et l’adoreront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui s’en vont vers la tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux dont la vie décline, ╵se prosterneront devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Leur postérité, à son tour, ╵servira l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et parlera de lui ╵à la génération ╵qui viendra après elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils proclameront sa justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils annonceront ╵au peuple qui va naître ╵ce qu’a fait l’Eternel.
