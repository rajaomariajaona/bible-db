document_id: ACT.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre des Actes des Apôtres est la deuxième partie de l’œuvre de Luc, la suite de l’évangile. L’auteur y poursuit son projet exprimé dans le prologue de l’évangile, raconter « de manière suivie » (1.3), après une enquête approfondie, les débuts de l’Eglise chrétienne. Luc lui-même en a été le témoin et participant : le « nous » apparaît en 16.10.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le plan suivi par Luc correspond à l’expansion graduelle de l’Eglise dans le bassin méditerranéen, suivant l’ordre laissé par Christ avant son ascension : « Vous serez mes témoins à Jérusalem, dans toute la Judée et la Samarie et jusqu’au bout du monde » (1.8).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’Eglise naît à Jérusalem, le jour de la Pentecôte, quand les apôtres reçoivent le Saint-Esprit promis. Elle grandit rapidement malgré les oppositions qu’elle suscite chez les Juifs et malgré les difficultés qu’elle rencontre dans son propre sein. C’est la période où l’apôtre Pierre est en première ligne (chap. 2 à 7).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Puis, à la suite de la persécution qui coûta la vie au premier martyr, Etienne (chap. 7), l’Eglise dispersée en Judée et en Samarie annonce l’Evangile aux populations qu’elle rencontre (chap. 8 à 13) : des Samaritains, un Ethiopien de passage, un officier romain. Le Seigneur révèle alors à Pierre que le salut est aussi pour les non-Juifs (chap. 10).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Sur le chemin de Damas un pharisien, Saul de Tarse, persécuteur de l’Eglise, s’est converti ; il reçoit de Christ ressuscité l’ordre d’évangéliser les peuples non juifs (9.15). C’est donc à lui tout particulièrement que revient la mission d’être témoin de Jésus-Christ « jusqu’au bout du monde » (chap. 13 à 28).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ainsi, la deuxième partie du livre retrace les trois voyages missionnaires de Saul – appelé dorénavant Paul – dans le monde méditerranéen : Chypre, Macédoine, Grèce, Asie Mineure, jusqu’à son arrestation à Jérusalem (chap. 20). Dès lors, Paul continue son activité, mais en prison, d’abord à Jérusalem, puis à Césarée, enfin à Rome où il vit dans une semi-liberté.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le récit s’achève là.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Cette extraordinaire et miraculeuse diffusion de l’Evangile n’est pas seulement le fruit du travail des apôtres et de leurs collaborateurs, c’est aussi l’œuvre du Saint-Esprit qui fait croître l’Eglise ; Luc le mentionne à soixante-deux reprises. Cette mise en évidence de l’action du Saint-Esprit depuis la Pentecôte est importante aussi pour l’Eglise d’aujourd’hui, qui cherche dans ce livre enseignement et encouragement pour son témoignage dans le monde.
