document_id: PRO.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Pourquoi rechercher la sagesse
  - type: text
    content: Mon fils, si tu acceptes mes paroles,
  - type: text
    content: si tu conserves mes préceptes au fond de toi-même,
  '10':
  - type: text
    content: Alors la sagesse pénétrera dans ton cœur
  - type: text
    content: et la connaissance fera tes délices.
  '11':
  - type: text
    content: La réflexion sera ta sauvegarde
  - type: text
    content: et l’intelligence veillera sur toi
  '12':
  - type: text
    content: pour te préserver de la mauvaise voie et des hommes qui tiennent des propos fourbes,
  '13':
  - type: text
    content: de ceux qui abandonnent le droit chemin
  - type: text
    content: pour s’engager dans des sentiers obscurs,
  '14':
  - type: text
    content: qui prennent plaisir à faire le mal,
  - type: text
    content: qui sont tout contents de s’enfoncer dans la perversité,
  '15':
  - type: text
    content: dont les chemins sont tortueux
  - type: text
    content: et le comportement pervers.
  '16':
  - type: text
    content: Alors tu seras aussi préservé de la femme d’autrui,
  - type: text
    content: de l’inconnue
  - type: note
    content: Voir 5.20 ; 7.5.
  - type: text
    content: ' aux paroles enjôleuses,'
  '17':
  - type: text
    content: qui abandonne l’époux de sa jeunesse
  - type: text
    content: et qui a oublié l’alliance conclue au nom de son Dieu
  - type: note
    content: Voir Ml 2.14-16.
  - type: text
    content: .
  '18':
  - type: text
    content: Elle sombre vers la mort qui est sa demeure
  - type: note
    content: 'Autre traduction : sa maison penche vers la mort.'
  - type: text
    content: ','
  - type: text
    content: et sa conduite mène au séjour des trépassés ;
  '19':
  - type: text
    content: aucun de ceux qui vont chez elle n’en revient,
  - type: text
    content: aucun ne retrouve les chemins de la vie.
  '2':
  - type: text
    content: si tu prêtes une oreille attentive à la sagesse,
  - type: text
    content: en inclinant ton cœur vers l’intelligence,
  '20':
  - type: text
    content: Si tu écoutes mes conseils, tu marcheras sur le chemin des hommes de bien
  - type: text
    content: et tu suivras les sentiers des justes.
  '21':
  - type: text
    content: Car les hommes droits habiteront le pays
  - type: note
    content: C’est-à-dire le pays de la promesse (Gn 17.8  ; voir Ps 37.29).
  - type: text
    content: ','
  - type: text
    content: et ceux qui sont intègres s’y maintiendront,
  '22':
  - type: text
    content: mais les méchants en seront extirpés,
  - type: text
    content: et les traîtres en seront arrachés.
  '3':
  - type: text
    content: oui, si tu fais appel au discernement,
  - type: text
    content: si tu recherches l’intelligence,
  '4':
  - type: text
    content: si tu la recherches comme de l’argent,
  - type: text
    content: si tu creuses pour la trouver comme pour découvrir des trésors
  - type: note
    content: Voir 3.14-16 ; 8.11 ; 16.16 ; Jb 28.12-19 ; Ec 7.11 ; 9.16-18.
  - type: text
    content: ','
  '5':
  - type: text
    content: alors tu comprendras ce qu’est craindre l’Eternel,
  - type: text
    content: et tu apprendras à connaître Dieu.
  '6':
  - type: text
    content: Car l’Eternel donne la sagesse,
  - type: text
    content: et ce sont ses paroles qui procurent la connaissance et l’intelligence.
  '7':
  - type: text
    content: Il réserve son secours aux hommes droits.
  - type: text
    content: Comme un bouclier, il protège ceux qui vivent de manière intègre.
  '8':
  - type: text
    content: Il préserve ceux qui vivent selon la droiture.
  - type: text
    content: Il veille sur le cheminement de ceux qui lui sont fidèles.
  '9':
  - type: text
    content: Alors tu apprendras à discerner ce qui est juste, conforme au droit, à vivre selon la droiture,
  - type: text
    content: et à reconnaître tous les sentiers du bien.
