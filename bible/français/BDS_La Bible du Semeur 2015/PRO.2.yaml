document_id: PRO.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pourquoi rechercher la sagesse
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, si tu acceptes mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu conserves mes préceptes au fond de toi-même,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors la sagesse pénétrera dans ton cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la connaissance fera tes délices.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La réflexion sera ta sauvegarde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’intelligence veillera sur toi
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour te préserver de la mauvaise voie et des hommes qui tiennent des propos fourbes,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ceux qui abandonnent le droit chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour s’engager dans des sentiers obscurs,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui prennent plaisir à faire le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui sont tout contents de s’enfoncer dans la perversité,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont les chemins sont tortueux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le comportement pervers.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu seras aussi préservé de la femme d’autrui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l’inconnue
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 5.20 ; 7.5.
      marker-yv: yv-n
    - type: text
      text: ' aux paroles enjôleuses,'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui abandonne l’époux de sa jeunesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a oublié l’alliance conclue au nom de son Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ml 2.14-16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle sombre vers la mort qui est sa demeure
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa maison penche vers la mort.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa conduite mène au séjour des trépassés ;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun de ceux qui vont chez elle n’en revient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun ne retrouve les chemins de la vie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu prêtes une oreille attentive à la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en inclinant ton cœur vers l’intelligence,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu écoutes mes conseils, tu marcheras sur le chemin des hommes de bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu suivras les sentiers des justes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les hommes droits habiteront le pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le pays de la promesse (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 17.8
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 37.29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui sont intègres s’y maintiendront,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les méchants en seront extirpés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les traîtres en seront arrachés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, si tu fais appel au discernement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu recherches l’intelligence,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu la recherches comme de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu creuses pour la trouver comme pour découvrir des trésors
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 3.14-16 ; 8.11 ; 16.16 ; Jb 28.12-19 ; Ec 7.11 ; 9.16-18.
      marker-yv: yv-n
    - type: text
      text: ','
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors tu comprendras ce qu’est craindre l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu apprendras à connaître Dieu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel donne la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sont ses paroles qui procurent la connaissance et l’intelligence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il réserve son secours aux hommes droits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un bouclier, il protège ceux qui vivent de manière intègre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il préserve ceux qui vivent selon la droiture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il veille sur le cheminement de ceux qui lui sont fidèles.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu apprendras à discerner ce qui est juste, conforme au droit, à vivre selon la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à reconnaître tous les sentiers du bien.
