document_id: HOS.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prix de la réconciliation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Et l’Eternel me dit : Va encore aimer une femme adultère aimant le mal'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aimant le mal
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque qui adopte une autre vocalisation des consonnes que le texte hébreu traditionnel. Cette leçon est favorisée par le parallélisme à l’intérieur du verset. Tel qu’il est vocalisé, le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aimée d’un compagnon.
      marker-yv: yv-n
    - type: text
      text: ', aime-la comme l’Eternel aime les Israélites, alors que ceux-ci se tournent vers d’autres dieux et se délectent de gâteaux de raisins consacrés'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gâteaux consacrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à des dieux païens (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 16.7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je rachetai donc une femme au prix de quinze pièces d’argent, et quatre cent cinquante kilogrammes d’orge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et je lui dis : Tu resteras pendant longtemps pour moi, sans te prostituer et sans te donner à aucun homme, et moi, j’agirai de même pour toi.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En effet, les Israélites resteront pendant longtemps sans roi et sans chef, sans sacrifice et sans stèle, sans éphod et sans divinités domestiques
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce sera la condition des Israélites durant l’exil, ce qui correspond à la période chasteté du v. 3.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Après cela, ils reviendront à l’Eternel leur Dieu et se tourneront vers lui, ainsi que vers David leur roi. Dans la suite des temps, ils viendront tout tremblants à l’Eternel pour bénéficier de sa bonté.
