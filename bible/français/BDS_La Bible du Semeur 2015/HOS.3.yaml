document_id: HOS.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le prix de la réconciliation
  - type: text
    content: 'Et l’Eternel me dit : Va encore aimer une femme adultère aimant le mal'
  - type: note
    content: 'aimant le mal: d’après l’ancienne version grecque qui adopte une autre vocalisation des consonnes que le texte hébreu traditionnel. Cette leçon est favorisée par le parallélisme à l’intérieur du verset. Tel qu’il est vocalisé, le texte hébreu traditionnel a : aimée d’un compagnon.'
  - type: text
    content: ', aime-la comme l’Eternel aime les Israélites, alors que ceux-ci se tournent vers d’autres dieux et se délectent de gâteaux de raisins consacrés'
  - type: note
    content: Gâteaux consacrés à des dieux païens (voir Es 16.7).
  - type: text
    content: .
  '2':
  - type: text
    content: 'Je rachetai donc une femme au prix de quinze pièces d’argent, et quatre cent cinquante kilogrammes d’orge. '
  '3':
  - type: text
    content: 'Et je lui dis : Tu resteras pendant longtemps pour moi, sans te prostituer et sans te donner à aucun homme, et moi, j’agirai de même pour toi.'
  '4':
  - type: text
    content: En effet, les Israélites resteront pendant longtemps sans roi et sans chef, sans sacrifice et sans stèle, sans éphod et sans divinités domestiques
  - type: note
    content: Ce sera la condition des Israélites durant l’exil, ce qui correspond à la période chasteté du v. 3.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Après cela, ils reviendront à l’Eternel leur Dieu et se tourneront vers lui, ainsi que vers David leur roi. Dans la suite des temps, ils viendront tout tremblants à l’Eternel pour bénéficier de sa bonté.
