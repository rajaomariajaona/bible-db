document_id: DEU.17,21
type_code: fra
verses:
  '1':
  - type: text
    content: Tu n’offriras pas à l’Eternel ton Dieu un animal – bœuf ou mouton – ayant quelque défaut ou malformation. Ce serait une abomination aux yeux de l’Eternel ton Dieu.
  '10':
  - type: text
    content: 'Alors vous vous conformerez au verdict qu’ils auront rendu dans le lieu que l’Eternel aura choisi, et vous aurez soin de suivre pleinement leurs instructions. '
  '11':
  - type: text
    content: 'Vous agirez selon les instructions qu’ils vous auront données et selon le verdict qu’ils auront rendu sans vous en écarter ni dans un sens ni dans l’autre. '
  '12':
  - type: text
    content: 'Si quelqu’un refuse par orgueil d’écouter le prêtre qui se tient là au service de l’Eternel votre Dieu, ou le juge, cet homme sera puni de mort. Vous ferez disparaître ainsi le mal du milieu d’Israël. '
  '13':
  - type: text
    content: En l’apprenant, tout le peuple sera saisi de crainte et personne d’autre n’osera plus agir avec tant d’orgueil.
  - type: heading
    content: Le roi
  '14':
  - type: text
    content: 'Lorsque vous serez entrés dans le pays que l’Eternel vous donne, que vous en aurez pris possession et que vous y serez installés, il se peut que vous disiez : « Donnons-nous un roi comme tous les peuples qui nous entourent'
  - type: note
    content: Voir 1 S 8.5.
  - type: text
    content: '. » '
  '15':
  - type: text
    content: Vous établirez alors sur vous le roi que l’Eternel votre Dieu aura choisi
  - type: note
    content: Voir 1 S 10.24 ; 11.15 ; 2 S 5.2-3.
  - type: text
    content: '  ; c’est l’un de vos compatriotes que vous prendrez pour régner sur vous ; vous ne pourrez pas choisir un étranger pour roi. '
  '16':
  - type: text
    content: 'Ce roi ne devra pas avoir une importante cavalerie, et il ne renverra pas le peuple en Egypte pour s’y procurer des chevaux en grand nombre. Car l’Eternel vous a dit : « Vous ne retournerez plus par ce chemin-là. » '
  '17':
  - type: text
    content: Qu’il ne prenne pas un grand nombre de femmes, pour qu’il ne se corrompe pas. Qu’il n’amasse pas non plus de grandes quantités d’argent et d’or
  - type: note
    content: 'Salomon sera jugé en fonction de ces trois interdictions : 1 R 10.26 à 11.8.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Quand il accédera au trône, il écrira sur un livre pour son usage personnel, une copie de cette Loi que lui communiqueront les prêtres-lévites. '
  '19':
  - type: text
    content: 'Cette copie ne le quittera pas, il y lira tous les jours de sa vie afin qu’il apprenne à craindre l’Eternel son Dieu, en obéissant à toute cette Loi et en appliquant toutes ces ordonnances. '
  '2':
  - type: text
    content: 'Il se peut que vous trouviez parmi vous, dans l’une des villes que l’Eternel votre Dieu va vous donner, un homme ou une femme qui fasse ce que l’Eternel votre Dieu considère comme mal et qui transgresse son alliance, '
  '20':
  - type: text
    content: Ainsi, il ne s’enorgueillira pas pour s’élever au-dessus de ses compatriotes et il ne déviera de la Loi ni dans un sens ni dans l’autre. De la sorte, il s’assurera, ainsi qu’à ses descendants, un long règne sur le trône d’Israël.
  '3':
  - type: text
    content: 'en allant rendre un culte à d’autres dieux et se prosterner devant eux, devant le soleil, la lune ou toute la multitude des étoiles, contrairement à ce que j’ai ordonné. '
  '4':
  - type: text
    content: 'Dès que le fait vous aura été rapporté et que vous en aurez connaissance, vous ferez une enquête minutieuse. Si la chose est vraie, s’il est établi qu’une telle abomination a été commise en Israël, '
  '5':
  - type: text
    content: vous amènerez aux portes de la ville
  - type: note
    content: Voir Lv 24.14 ; Ac 7.58 ; Hé 13.12.
  - type: text
    content: ' celui ou celle qui s’est rendu coupable de cette mauvaise action, et vous l’exécuterez par lapidation.'
  '6':
  - type: text
    content: C’est seulement sur la déposition de deux ou de trois témoins qu’on le mettra à mort, les déclarations d’un seul témoin ne suffiront pas pour cela
  - type: note
    content: Voir Nb 35.30 ; Dt 19.15 ; Mt 18.16 ; 2 Co 13.1 ; 1 Tm 5.19 ; Hé 10.28.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Les témoins seront les premiers à lui jeter des pierres pour le mettre à mort, et le reste du peuple interviendra ensuite. Ainsi, vous ferez disparaître le mal du milieu de vous
  - type: note
    content: Cité en 1 Co 5.13.
  - type: text
    content: .
  '8':
  - type: text
    content: 'S’il se présente une affaire de meurtre, de litige, de coups et blessures ou quelque autre affaire qu’il est trop difficile au tribunal local de traiter, vous vous rendrez au lieu que l’Eternel votre Dieu aura choisi '
  '9':
  - type: text
    content: 'et vous irez trouver les prêtres-lévites et le juge qui sera alors en fonction. Vous les consulterez, et ils rendront pour vous leur verdict. '
