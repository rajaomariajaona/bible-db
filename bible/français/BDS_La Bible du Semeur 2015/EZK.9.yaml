document_id: EZK.9
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Préfiguration du châtiment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je l’entendis crier d’une voix forte : Approchez, inspecteurs de la ville ! Que chacun prenne son instrument de destruction en main'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 1-6, voir Ap 7.1-8 ; 9.4.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vis six individus déboucher du chemin de la porte supérieure qui fait face au nord ; chacun tenait en main son instrument de destruction. Au milieu d’eux se tenait un individu vêtu de lin et portant une écritoire à la ceinture. Ils vinrent se placer à côté de l’autel de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors la gloire du Dieu d’Israël s’éleva au-dessus du chérubin sur lequel elle reposait et se dirigea vers le seuil du Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La gloire de l’Eternel va quitter le Temple (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.4'
        metadata:
          usfm: EZK.8.4
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: '. L’Eternel appela l’individu vêtu de lin qui portait l’écritoire à sa ceinture '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et il lui dit : Passe au milieu de la ville de Jérusalem et marque d’une croix sur le front les hommes qui gémissent et se plaignent à cause de toutes les pratiques abominables qui se commettent dans cette ville.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis je l’entendis dire aux autres : Passez dans la ville derrière lui et frappez sans un regard de pitié ! Soyez sans merci. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tuez les vieillards, les jeunes gens, les jeunes filles, les enfants, les femmes, jusqu’à ce que tous soient exterminés ! Mais ne touchez pas à ceux qui portent sur le front la marque d’une croix. Vous commencerez par mon sanctuaire.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils commencèrent donc par les responsables du peuple qui se tenaient devant le Temple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire les vingt-cinq hommes de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.16'
        metadata:
          usfm: EZK.8.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il leur ordonna : Rendez le Temple impur et remplissez ses parvis de morts ! Allez !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et ils partirent et frappèrent dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pendant qu’ils frappaient, comme je restais seul sur place, je tombai sur ma face, et je m’écriai : Ah ! Seigneur, Eternel, en déchaînant ainsi ta colère sur Jérusalem, vas-tu exterminer tout ce qui reste d’Israël ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il me répondit : Le péché des royaumes d’Israël et de Juda est excessivement grave. Le pays est rempli de sang et la ville est pleine d’injustices. Les gens disent : « L’Eternel a quitté ce pays, l’Eternel ne voit rien ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eh bien, je n’aurai aucun regard de pitié et je serai sans merci. Je ferai retomber sur eux ce que mérite leur conduite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A ce moment, l’individu vêtu de lin blanc qui portait une écritoire à la ceinture vint faire son rapport. Il dit : J’ai fait ce que tu m’as commandé.'
