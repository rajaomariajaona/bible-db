document_id: EZK.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Préfiguration du châtiment
  - type: text
    content: 'Puis je l’entendis crier d’une voix forte : Approchez, inspecteurs de la ville ! Que chacun prenne son instrument de destruction en main'
  - type: note
    content: Pour les v. 1-6, voir Ap 7.1-8 ; 9.4.
  - type: text
    content: '  !'
  '10':
  - type: text
    content: Eh bien, je n’aurai aucun regard de pitié et je serai sans merci. Je ferai retomber sur eux ce que mérite leur conduite.
  '11':
  - type: text
    content: 'A ce moment, l’individu vêtu de lin blanc qui portait une écritoire à la ceinture vint faire son rapport. Il dit : J’ai fait ce que tu m’as commandé.'
  '2':
  - type: text
    content: 'Je vis six individus déboucher du chemin de la porte supérieure qui fait face au nord ; chacun tenait en main son instrument de destruction. Au milieu d’eux se tenait un individu vêtu de lin et portant une écritoire à la ceinture. Ils vinrent se placer à côté de l’autel de bronze. '
  '3':
  - type: text
    content: Alors la gloire du Dieu d’Israël s’éleva au-dessus du chérubin sur lequel elle reposait et se dirigea vers le seuil du Temple
  - type: note
    content: La gloire de l’Eternel va quitter le Temple (voir 8.4 et note).
  - type: text
    content: '. L’Eternel appela l’individu vêtu de lin qui portait l’écritoire à sa ceinture '
  '4':
  - type: text
    content: 'et il lui dit : Passe au milieu de la ville de Jérusalem et marque d’une croix sur le front les hommes qui gémissent et se plaignent à cause de toutes les pratiques abominables qui se commettent dans cette ville.'
  '5':
  - type: text
    content: 'Puis je l’entendis dire aux autres : Passez dans la ville derrière lui et frappez sans un regard de pitié ! Soyez sans merci. '
  '6':
  - type: text
    content: Tuez les vieillards, les jeunes gens, les jeunes filles, les enfants, les femmes, jusqu’à ce que tous soient exterminés ! Mais ne touchez pas à ceux qui portent sur le front la marque d’une croix. Vous commencerez par mon sanctuaire.
  - type: text
    content: Ils commencèrent donc par les responsables du peuple qui se tenaient devant le Temple
  - type: note
    content: C’est-à-dire les vingt-cinq hommes de 8.16.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Puis il leur ordonna : Rendez le Temple impur et remplissez ses parvis de morts ! Allez !'
  - type: text
    content: 'Et ils partirent et frappèrent dans la ville. '
  '8':
  - type: text
    content: 'Pendant qu’ils frappaient, comme je restais seul sur place, je tombai sur ma face, et je m’écriai : Ah ! Seigneur, Eternel, en déchaînant ainsi ta colère sur Jérusalem, vas-tu exterminer tout ce qui reste d’Israël ?'
  '9':
  - type: text
    content: 'Il me répondit : Le péché des royaumes d’Israël et de Juda est excessivement grave. Le pays est rempli de sang et la ville est pleine d’injustices. Les gens disent : « L’Eternel a quitté ce pays, l’Eternel ne voit rien ! » '
