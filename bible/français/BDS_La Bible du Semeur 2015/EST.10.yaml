document_id: EST.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mardochée, bras droit de l’empereur
  - type: text
    content: Par la suite, l’empereur Xerxès imposa un tribut à tout son empire ainsi qu’aux territoires côtiers
  - type: note
    content: Les îles de la mer Egée avaient été conquises par Darius Hystaspe, mais perdues par Xerxès dans la guerre contre les Grecs, sauf Chypre et quelques petites îles de la côte libyenne.
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Tous ses actes démontrant sa puissance et sa vaillance, ainsi que la manière dont il éleva Mardochée à un rang important, sont consignés dans le livre des Annales des empereurs des Mèdes et des Perses. '
  '3':
  - type: text
    content: Le Juif Mardochée occupa, en effet, le second rang, après l’empereur Xerxès. Il fut très considéré par les Juifs et aimé par tous ses compatriotes, parce qu’il travaillait au bien de son peuple et œuvrait pour la paix de toute sa race
  - type: note
    content: Les Juifs jouirent de la paix et de la prospérité dans l’Empire perse jusqu’au temps des successeurs d’Alexandre le Grand.
  - type: text
    content: .
