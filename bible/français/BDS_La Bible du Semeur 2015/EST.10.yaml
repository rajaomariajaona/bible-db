document_id: EST.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mardochée, bras droit de l’empereur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Par la suite, l’empereur Xerxès imposa un tribut à tout son empire ainsi qu’aux territoires côtiers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les îles de la mer Egée avaient été conquises par Darius Hystaspe, mais perdues par Xerxès dans la guerre contre les Grecs, sauf Chypre et quelques petites îles de la côte libyenne.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tous ses actes démontrant sa puissance et sa vaillance, ainsi que la manière dont il éleva Mardochée à un rang important, sont consignés dans le livre des Annales des empereurs des Mèdes et des Perses. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le Juif Mardochée occupa, en effet, le second rang, après l’empereur Xerxès. Il fut très considéré par les Juifs et aimé par tous ses compatriotes, parce qu’il travaillait au bien de son peuple et œuvrait pour la paix de toute sa race
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Juifs jouirent de la paix et de la prospérité dans l’Empire perse jusqu’au temps des successeurs d’Alexandre le Grand.
    marker-yv: yv-n
  - type: text
    text: .
