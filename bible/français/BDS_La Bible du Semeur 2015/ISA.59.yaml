document_id: ISA.59,21
type_code: fra
verses:
  '1':
  - type: heading
    content: De l’injustice à la justice
  - type: heading
    content: Ce qui sépare de Dieu
  - type: text
    content: 'Mais non : la main de l’Eternel ╵n’est pas trop courte pour sauver,'
  - type: text
    content: et son oreille n’est pas sourde ╵au point de ne plus vous entendre !
  '10':
  - type: text
    content: Nous allons à tâtons ╵comme des aveugles ╵le long d’un mur ;
  - type: text
    content: comme ceux qui n’ont plus leurs yeux,
  - type: text
    content: nous allons à tâtons,
  - type: text
    content: nous trébuchons en plein midi ╵comme à la nuit tombante ;
  - type: text
    content: tout en étant pleins de vigueur,
  - type: text
    content: nous sommes comme morts.
  '11':
  - type: text
    content: Nous grondons tous comme des ours
  - type: text
    content: et nous ne cessons de gémir ╵tout comme des colombes.
  - type: text
    content: Nous espérons le droit, ╵mais il n’y en a pas ;
  - type: text
    content: et le salut, ╵mais il est loin de nous !
  '12':
  - type: text
    content: Car nos révoltes ╵contre toi sont nombreuses
  - type: text
    content: nos transgressions ╵témoignent contre nous.
  - type: text
    content: Nos péchés restent attachés à nous,
  - type: text
    content: et nos fautes, nous les connaissons bien.
  '13':
  - type: text
    content: Nous sommes des rebelles
  - type: text
    content: et nous avons trompé ╵l’Eternel, notre Dieu, ╵en lui tournant le dos.
  - type: text
    content: Nous ne parlons que d’oppression ╵et de révolte,
  - type: text
    content: et nous avons conçu, ╵nous avons projeté ╵des propos mensongers ╵dans notre cœur.
  '14':
  - type: text
    content: Aussi, le droit recule
  - type: text
    content: et la justice est loin de nous.
  - type: text
    content: La vérité trébuche ╵sur la place publique,
  - type: text
    content: et la droiture ╵ne peut y accéder.
  '15':
  - type: text
    content: La vérité a disparu
  - type: text
    content: et celui qui se détourne du mal ╵se fait piller.
  - type: heading
    content: Dieu intervient
  - type: text
    content: Mais l’Eternel a vu ╵avec indignation
  - type: text
    content: qu’il n’y a plus de droit.
  '16':
  - type: text
    content: Il n’a trouvé personne ╵qui intercède,
  - type: text
    content: il s’en est étonné.
  - type: text
    content: Alors son propre bras ╵lui est venu en aide,
  - type: text
    content: et sa justice ╵a été son soutien
  - type: note
    content: Voir 63.5.
  - type: text
    content: .
  '17':
  - type: text
    content: Il se revêt de la justice ╵comme d’une cuirasse,
  - type: text
    content: il s’est mis sur la tête ╵le casque du salut.
  - type: text
    content: En guise de tunique, ╵il s’est drapé ╵de la rétribution,
  - type: text
    content: il s’est enveloppé ╵comme dans un manteau
  - type: note
    content: Allusion en Ep 6.14-17 ; 1 Th 5.8.
  - type: text
    content: ' ╵d’une ardeur passionnée ╵pour la relation exclusive ╵qui le lie à son peuple.'
  '18':
  - type: text
    content: 'Il rendra à chacun ╵ce que lui vaut ses actes :'
  - type: text
    content: la fureur à ses adversaires,
  - type: text
    content: et leur dû à ses ennemis ;
  - type: text
    content: il paiera leur salaire ╵aux habitants des îles, ╵et des régions côtières.
  '19':
  - type: text
    content: Ainsi, l’on craindra l’Eternel ╵et l’on révérera sa gloire
  - type: text
    content: de l’occident jusqu’au levant.
  - type: text
    content: Car il viendra ╵comme un fleuve en furie
  - type: text
    content: agité par un vent ╵venu de l’Eternel
  - type: note
    content: Verset difficile, interprété de diverses manières.
  - type: text
    content: .
  '2':
  - type: text
    content: Ce sont vos fautes ╵qui vous séparent
  - type: text
    content: de votre Dieu.
  - type: text
    content: C’est à cause de vos péchés ╵qu’il s’est détourné loin de vous
  - type: text
    content: pour ne plus vous entendre.
  '20':
  - type: text
    content: Car le libérateur ╵va venir pour Sion,
  - type: text
    content: pour ceux qui, en Jacob, ╵renonceront à leurs révoltes.
  - type: text
    content: L’Eternel le déclare.
  '21':
  - type: text
    content: Quant à moi, déclare l’Eternel, voici quelle est l’alliance que je fais avec eux
  - type: note
    content: Les v. 20-21 sont cités en Rm 11.26.
  - type: text
    content: '  : Mon Esprit qui repose sur toi et mes paroles que je mets dans ta bouche'
  - type: note
    content: Voir 51.16.
  - type: text
    content: ', ne s’écarteront ni de ta bouche, ni de la bouche de tes enfants, ni de la bouche de leurs enfants. Voilà ce que dit l’Eternel, dès maintenant et pour l’éternité.'
  '3':
  - type: text
    content: Car vos mains sont souillées de sang
  - type: text
    content: et vos doigts de péchés,
  - type: text
    content: vos lèvres disent des mensonges,
  - type: text
    content: votre langue susurre ╵des paroles perfides.
  '4':
  - type: text
    content: Personne n’invoque le droit,
  - type: text
    content: et nul ne plaide ╵selon la vérité.
  - type: text
    content: On s’appuie sur de vains raisonnements
  - type: text
    content: et l’on allègue des mensonges.
  - type: text
    content: Ils conçoivent le mal
  - type: text
    content: et enfantent l’iniquité.
  '5':
  - type: text
    content: Ils couvent des œufs de vipère,
  - type: text
    content: tissent des toiles d’araignée.
  - type: text
    content: Qui mange de ces œufs mourra ;
  - type: text
    content: de chaque œuf couvé qui éclôt
  - type: text
    content: sortira un serpent.
  '6':
  - type: text
    content: Leurs toiles d’araignée ╵ne servent pas de vêtement,
  - type: text
    content: et l’on ne peut pas se couvrir ╵de ce qu’ils ont confectionné.
  - type: text
    content: Les œuvres qu’ils produisent ╵sont des œuvres mauvaises ;
  - type: text
    content: de leurs mains, ils commettent ╵des actes de violence.
  '7':
  - type: text
    content: Leurs pieds courent au mal,
  - type: text
    content: et ils ont hâte ╵de verser le sang innocent.
  - type: text
    content: Leurs pensées sont sans cesse ╵orientées vers le mal,
  - type: text
    content: dévastation et destruction ╵jalonnent leur parcours
  - type: note
    content: Pour les v. 7-8, voir Rm 3.15-17.
  - type: text
    content: .
  '8':
  - type: text
    content: Ils ne connaissent pas ╵le chemin de la paix,
  - type: text
    content: et le droit est absent ╵des routes qu’ils empruntent.
  - type: text
    content: 'Les sentiers qu’ils se tracent ╵sont des voies tortueuses :'
  - type: text
    content: quiconque s’y engage ╵ne connaît pas la paix.
  - type: heading
    content: Les péchés du peuple
  '9':
  - type: text
    content: Voilà pourquoi le droit ╵demeure loin de nous,
  - type: text
    content: et l’on ne nous rend pas justice.
  - type: text
    content: Nous espérions de la lumière,
  - type: text
    content: et c’est l’obscurité.
  - type: text
    content: Oui, nous espérions la clarté
  - type: text
    content: et nous marchons dans les ténèbres.
