document_id: ISA.59
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: De l’injustice à la justice
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ce qui sépare de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais non : la main de l’Eternel ╵n’est pas trop courte pour sauver,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son oreille n’est pas sourde ╵au point de ne plus vous entendre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ce sont vos fautes ╵qui vous séparent
- type: usfm
  marker: q1
  children:
  - type: text
    text: de votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est à cause de vos péchés ╵qu’il s’est détourné loin de vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne plus vous entendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car vos mains sont souillées de sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos doigts de péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vos lèvres disent des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre langue susurre ╵des paroles perfides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Personne n’invoque le droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul ne plaide ╵selon la vérité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On s’appuie sur de vains raisonnements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on allègue des mensonges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils conçoivent le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et enfantent l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils couvent des œufs de vipère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tissent des toiles d’araignée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui mange de ces œufs mourra ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de chaque œuf couvé qui éclôt
- type: usfm
  marker: q1
  children:
  - type: text
    text: sortira un serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leurs toiles d’araignée ╵ne servent pas de vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on ne peut pas se couvrir ╵de ce qu’ils ont confectionné.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les œuvres qu’ils produisent ╵sont des œuvres mauvaises ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de leurs mains, ils commettent ╵des actes de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Leurs pieds courent au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont hâte ╵de verser le sang innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs pensées sont sans cesse ╵orientées vers le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dévastation et destruction ╵jalonnent leur parcours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 7-8, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 3.15-17
        metadata:
          usfm: ROM.3.15+ROM.3.16+ROM.3.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ne connaissent pas ╵le chemin de la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le droit est absent ╵des routes qu’ils empruntent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les sentiers qu’ils se tracent ╵sont des voies tortueuses :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quiconque s’y engage ╵ne connaît pas la paix.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les péchés du peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voilà pourquoi le droit ╵demeure loin de nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on ne nous rend pas justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérions de la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est l’obscurité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, nous espérions la clarté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous marchons dans les ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous allons à tâtons ╵comme des aveugles ╵le long d’un mur ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme ceux qui n’ont plus leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous allons à tâtons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous trébuchons en plein midi ╵comme à la nuit tombante ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout en étant pleins de vigueur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous sommes comme morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous grondons tous comme des ours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous ne cessons de gémir ╵tout comme des colombes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérons le droit, ╵mais il n’y en a pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le salut, ╵mais il est loin de nous !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car nos révoltes ╵contre toi sont nombreuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos transgressions ╵témoignent contre nous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos péchés restent attachés à nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nos fautes, nous les connaissons bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nous sommes des rebelles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous avons trompé ╵l’Eternel, notre Dieu, ╵en lui tournant le dos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne parlons que d’oppression ╵et de révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous avons conçu, ╵nous avons projeté ╵des propos mensongers ╵dans notre cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Aussi, le droit recule
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice est loin de nous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vérité trébuche ╵sur la place publique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la droiture ╵ne peut y accéder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La vérité a disparu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui se détourne du mal ╵se fait piller.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu intervient
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Eternel a vu ╵avec indignation
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y a plus de droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il n’a trouvé personne ╵qui intercède,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s’en est étonné.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors son propre bras ╵lui est venu en aide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa justice ╵a été son soutien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '63.5'
        metadata:
          usfm: ISA.63.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il se revêt de la justice ╵comme d’une cuirasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s’est mis sur la tête ╵le casque du salut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En guise de tunique, ╵il s’est drapé ╵de la rétribution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s’est enveloppé ╵comme dans un manteau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion en Ep 6.14-17 ; 1 Th 5.8.
    marker-yv: yv-n
  - type: text
    text: ' ╵d’une ardeur passionnée ╵pour la relation exclusive ╵qui le lie à son peuple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il rendra à chacun ╵ce que lui vaut ses actes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fureur à ses adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur dû à ses ennemis ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il paiera leur salaire ╵aux habitants des îles, ╵et des régions côtières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ainsi, l’on craindra l’Eternel ╵et l’on révérera sa gloire
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’occident jusqu’au levant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il viendra ╵comme un fleuve en furie
- type: usfm
  marker: q1
  children:
  - type: text
    text: agité par un vent ╵venu de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verset difficile, interprété de diverses manières.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car le libérateur ╵va venir pour Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui, en Jacob, ╵renonceront à leurs révoltes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel le déclare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant à moi, déclare l’Eternel, voici quelle est l’alliance que je fais avec eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 20-21 sont cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 11.26
        metadata:
          usfm: ROM.11.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  : Mon Esprit qui repose sur toi et mes paroles que je mets dans ta bouche'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '51.16'
        metadata:
          usfm: ISA.51.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ne s’écarteront ni de ta bouche, ni de la bouche de tes enfants, ni de la bouche de leurs enfants. Voilà ce que dit l’Eternel, dès maintenant et pour l’éternité.'
