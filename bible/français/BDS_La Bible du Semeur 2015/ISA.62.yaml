document_id: ISA.62,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rétablissement certain
  - type: text
    content: Oui, pour la cause de Sion, ╵je ne me tairai pas,
  - type: text
    content: et pour Jérusalem, ╵je ne me donnerai aucun repos
  - type: text
    content: jusqu’à ce que sa justice paraisse ╵comme brille l’aurore
  - type: text
    content: et son salut ╵comme un flambeau qui brûle.
  '10':
  - type: text
    content: Passez, oui, passez par les portes !
  - type: text
    content: Frayez, frayez ╵la route de mon peuple !
  - type: text
    content: Faites-lui un chemin,
  - type: text
    content: enlevez-en les pierres !
  - type: text
    content: Et élevez un étendard ╵en direction des peuples !
  '11':
  - type: text
    content: L’Eternel se fera entendre
  - type: text
    content: 'jusqu’aux confins du monde :'
  - type: text
    content: Dites à la communauté de Sion
  - type: note
    content: Repris en Mt 21.5.
  - type: text
    content: '  :'
  - type: text
    content: Ton salut va venir,
  - type: text
    content: avec lui, son salaire,
  - type: text
    content: et devant lui sa récompense.
  '12':
  - type: text
    content: On les appellera ╵« Le Peuple saint,
  - type: text
    content: les libérés de l’Eternel ».
  - type: text
    content: Et toi, Jérusalem, ╵tu seras nommée « Désirée »,
  - type: text
    content: « La ville qui n’est pas abandonnée ».
  '2':
  - type: text
    content: Alors les peuples verront ta justice
  - type: text
    content: et tous les rois ╵contempleront ta gloire.
  - type: text
    content: Et l’on t’appellera ╵d’un nom nouveau
  - type: note
    content: Voir Es 65.15 ; Ap 2.17 ; 3.12.
  - type: text
    content: que l’Eternel te donnera.
  '3':
  - type: text
    content: Tu seras dans la main de l’Eternel
  - type: text
    content: une couronne, ╵rayonnant de splendeur
  - type: text
    content: et un turban royal
  - type: text
    content: dans la main de ton Dieu.
  '4':
  - type: text
    content: Tu ne seras plus appelée ╵« La Délaissée »,
  - type: text
    content: et ton pays ne sera plus nommé ╵« La terre dévastée
  - type: note
    content: Voir 54.1 et note.
  - type: text
    content: '  »,'
  - type: text
    content: mais on t’appellera ╵« En elle est mon plaisir ».
  - type: text
    content: Et ton pays sera nommé ╵« La terre qui est épousée »
  - type: text
    content: parce que l’Eternel ╵prendra plaisir en toi,
  - type: text
    content: car ton pays ╵sera pour lui ╵comme une épouse.
  '5':
  - type: text
    content: En effet, comme le jeune homme ╵se marie avec une jeune fille,
  - type: text
    content: tes fils
  - type: note
    content: 'Autre traduction : ceux qui te rebâtiront.'
  - type: text
    content: ' t’épouseront,'
  - type: text
    content: et comme la mariée ╵fait la joie du marié,
  - type: text
    content: tu feras la joie de ton Dieu.
  '6':
  - type: text
    content: Sur tes murs, ô Jérusalem,
  - type: text
    content: moi, j’ai posté des gardes,
  - type: text
    content: ils ne se tairont pas, ╵ni le jour ni la nuit.
  - type: text
    content: Oui, vous qui ravivez ╵le souvenir de l’Eternel,
  - type: text
    content: point de repos pour vous !
  '7':
  - type: text
    content: Ne lui donnez aucun repos
  - type: text
    content: jusqu’à ce qu’il ait rétabli ╵Jérusalem,
  - type: text
    content: qu’il ait fait d’elle ╵un sujet de louanges sur la terre.
  '8':
  - type: text
    content: L’Eternel l’a juré ╵en engageant sa force
  - type: text
    content: 'et sa puissance :'
  - type: text
    content: Je ne donnerai plus ╵ton froment à manger
  - type: text
    content: à ceux qui te combattent,
  - type: text
    content: les étrangers ╵ne boiront plus ton vin,
  - type: text
    content: produit de ton labeur pénible.
  '9':
  - type: text
    content: Mais ceux qui auront fait ╵la moisson mangeront ╵ce qu’ils récolteront
  - type: text
    content: et loueront l’Eternel,
  - type: text
    content: ceux qui auront cueilli ╵les raisins de la vigne ╵boiront le vin
  - type: text
    content: dans mes parvis sacrés.
