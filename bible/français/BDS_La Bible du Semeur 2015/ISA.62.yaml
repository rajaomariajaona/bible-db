document_id: ISA.62,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le rétablissement certain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, pour la cause de Sion, ╵je ne me tairai pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour Jérusalem, ╵je ne me donnerai aucun repos
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce que sa justice paraisse ╵comme brille l’aurore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son salut ╵comme un flambeau qui brûle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passez, oui, passez par les portes !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frayez, frayez ╵la route de mon peuple !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites-lui un chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enlevez-en les pierres !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et élevez un étendard ╵en direction des peuples !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel se fera entendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'jusqu’aux confins du monde :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dites à la communauté de Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Repris en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 21.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton salut va venir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec lui, son salaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et devant lui sa récompense.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les appellera ╵« Le Peuple saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les libérés de l’Eternel ».
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Jérusalem, ╵tu seras nommée « Désirée »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « La ville qui n’est pas abandonnée ».
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors les peuples verront ta justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les rois ╵contempleront ta gloire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on t’appellera ╵d’un nom nouveau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Es 65.15 ; Ap 2.17 ; 3.12.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’Eternel te donnera.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras dans la main de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une couronne, ╵rayonnant de splendeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un turban royal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la main de ton Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne seras plus appelée ╵« La Délaissée »,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton pays ne sera plus nommé ╵« La terre dévastée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '54.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: '  »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais on t’appellera ╵« En elle est mon plaisir ».
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton pays sera nommé ╵« La terre qui est épousée »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que l’Eternel ╵prendra plaisir en toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ton pays ╵sera pour lui ╵comme une épouse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, comme le jeune homme ╵se marie avec une jeune fille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui te rebâtiront.
      marker-yv: yv-n
    - type: text
      text: ' t’épouseront,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comme la mariée ╵fait la joie du marié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu feras la joie de ton Dieu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur tes murs, ô Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, j’ai posté des gardes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne se tairont pas, ╵ni le jour ni la nuit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, vous qui ravivez ╵le souvenir de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: point de repos pour vous !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne lui donnez aucun repos
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ce qu’il ait rétabli ╵Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il ait fait d’elle ╵un sujet de louanges sur la terre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel l’a juré ╵en engageant sa force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et sa puissance :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne donnerai plus ╵ton froment à manger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ceux qui te combattent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les étrangers ╵ne boiront plus ton vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: produit de ton labeur pénible.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ceux qui auront fait ╵la moisson mangeront ╵ce qu’ils récolteront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et loueront l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui auront cueilli ╵les raisins de la vigne ╵boiront le vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans mes parvis sacrés.
