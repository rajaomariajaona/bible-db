document_id: 1TI.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dirigeants dans l’Eglise et leurs assistants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '« Celui qui aspire à être un dirigeant dans l’Eglise désire une belle tâche. » Cette parole est certaine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il faut qu’eux aussi soient d’abord soumis à examen. Ensuite, si on n’a rien à leur reprocher, ils accompliront leur service.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il en va de même pour les diaconesses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs femmes aussi doivent…
      marker-yv: yv-n
    - type: text
      text: '  : elles doivent inspirer le respect : qu’elles ne soient pas médisantes ; qu’elles fassent preuve de modération et soient dignes de confiance dans tous les domaines.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que les diacres soient des maris fidèles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note sur '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.2'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; qu’ils assument bien leurs responsabilités à l’égard de leurs enfants et de leur famille. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car ceux qui remplissent bien leur ministère acquièrent une situation respectée et une grande assurance dans la foi en Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le secret révélé
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai bon espoir de venir te rejoindre très bientôt ; je t’écris cependant tout cela '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin que, si ma venue devait être retardée, tu saches, en attendant, comment on doit se comporter dans la famille de Dieu, c’est-à-dire dans l’Eglise du Dieu vivant. Cette Eglise est une colonne qui proclame la vérité, un lieu où elle est fermement établie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’apôtre emploie l’image de la colonne commémorative et celle du siège ou du trône. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette Eglise est la colonne et le rempart de la vérité.
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que nous reconnaissons ensemble : – il est grand le secret du plan de Dieu, Christ, qui fait l’objet de notre foi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est révélé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cantique ou confession de foi de l’Eglise primitive.
      marker-yv: yv-n
    - type: text
      text: ' ╵comme un être humain,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, déclaré juste ╵par le Saint-Esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a été vu ╵par les anges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été proclamé ╵parmi les non-Juifs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a cru en lui ╵dans le monde entier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été élevé ╵dans la gloire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faut toutefois que le dirigeant soit un homme irréprochable : mari fidèle à sa femme'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette interprétation est conforme aux inscriptions funéraires juives et païennes mises au jour. D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mari d’une seule femme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu’il n’ait été marié qu’une seule fois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir l’expression symétrique, pour les veuves, en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.9'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', faisant preuve de modération, réfléchi et vivant de façon convenable. Qu’il soit hospitalier et capable d’enseigner. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ne doit pas être buveur ni querelleur, mais au contraire aimable, pacifique et désintéressé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’il dirige bien sa famille et maintienne ses enfants dans l’obéissance, en toute dignité. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, comment un homme qui ne dirige pas bien sa famille, serait-il qualifié pour prendre soin de l’Eglise de Dieu ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que ce ne soit pas un converti de fraîche date, de peur qu’il se laisse aveugler par l’orgueil et tombe sous la même condamnation que le diable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous l’accusation portée par le diable.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enfin, il doit aussi jouir d’une bonne réputation parmi ceux qui ne font pas partie de la famille de Dieu afin de ne pas s’exposer au mépris public et de ne pas tomber dans les pièges du diable.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il en va de même des diacres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mot grec qui a donné par francisation le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'diacre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifiait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'serviteur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il est devenu, dans certaines des Eglises primitives, un titre désignant sans doute des assistants des dirigeants des Eglises.
      marker-yv: yv-n
    - type: text
      text: '. Ils doivent inspirer le respect : qu’ils soient des hommes de parole, sans penchant pour la boisson ni pour le gain malhonnête. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils doivent garder avec une bonne conscience la vérité révélée de la foi. '
