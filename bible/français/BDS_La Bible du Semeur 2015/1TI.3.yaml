document_id: 1TI.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dirigeants dans l’Eglise et leurs assistants
  - type: text
    content: '« Celui qui aspire à être un dirigeant dans l’Eglise désire une belle tâche. » Cette parole est certaine. '
  '10':
  - type: text
    content: Il faut qu’eux aussi soient d’abord soumis à examen. Ensuite, si on n’a rien à leur reprocher, ils accompliront leur service.
  '11':
  - type: text
    content: Il en va de même pour les diaconesses
  - type: note
    content: 'D’autres comprennent : leurs femmes aussi doivent…'
  - type: text
    content: '  : elles doivent inspirer le respect : qu’elles ne soient pas médisantes ; qu’elles fassent preuve de modération et soient dignes de confiance dans tous les domaines.'
  '12':
  - type: text
    content: Que les diacres soient des maris fidèles
  - type: note
    content: Voir note sur 3.2.
  - type: text
    content: '  ; qu’ils assument bien leurs responsabilités à l’égard de leurs enfants et de leur famille. '
  '13':
  - type: text
    content: Car ceux qui remplissent bien leur ministère acquièrent une situation respectée et une grande assurance dans la foi en Jésus-Christ.
  - type: heading
    content: Le secret révélé
  '14':
  - type: text
    content: 'J’ai bon espoir de venir te rejoindre très bientôt ; je t’écris cependant tout cela '
  '15':
  - type: text
    content: afin que, si ma venue devait être retardée, tu saches, en attendant, comment on doit se comporter dans la famille de Dieu, c’est-à-dire dans l’Eglise du Dieu vivant. Cette Eglise est une colonne qui proclame la vérité, un lieu où elle est fermement établie
  - type: note
    content: 'L’apôtre emploie l’image de la colonne commémorative et celle du siège ou du trône. D’autres comprennent : cette Eglise est la colonne et le rempart de la vérité.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Voici ce que nous reconnaissons ensemble : – il est grand le secret du plan de Dieu, Christ, qui fait l’objet de notre foi.'
  - type: text
    content: Il s’est révélé
  - type: note
    content: Cantique ou confession de foi de l’Eglise primitive.
  - type: text
    content: ' ╵comme un être humain,'
  - type: text
    content: et, déclaré juste ╵par le Saint-Esprit,
  - type: text
    content: il a été vu ╵par les anges.
  - type: text
    content: Il a été proclamé ╵parmi les non-Juifs.
  - type: text
    content: On a cru en lui ╵dans le monde entier.
  - type: text
    content: Il a été élevé ╵dans la gloire.
  '2':
  - type: text
    content: 'Il faut toutefois que le dirigeant soit un homme irréprochable : mari fidèle à sa femme'
  - type: note
    content: 'Cette interprétation est conforme aux inscriptions funéraires juives et païennes mises au jour. D’autres comprennent : mari d’une seule femme ou qu’il n’ait été marié qu’une seule fois (voir l’expression symétrique, pour les veuves, en 5.9).'
  - type: text
    content: ', faisant preuve de modération, réfléchi et vivant de façon convenable. Qu’il soit hospitalier et capable d’enseigner. '
  '3':
  - type: text
    content: Il ne doit pas être buveur ni querelleur, mais au contraire aimable, pacifique et désintéressé.
  '4':
  - type: text
    content: 'Qu’il dirige bien sa famille et maintienne ses enfants dans l’obéissance, en toute dignité. '
  '5':
  - type: text
    content: 'Car, comment un homme qui ne dirige pas bien sa famille, serait-il qualifié pour prendre soin de l’Eglise de Dieu ? '
  '6':
  - type: text
    content: Que ce ne soit pas un converti de fraîche date, de peur qu’il se laisse aveugler par l’orgueil et tombe sous la même condamnation que le diable
  - type: note
    content: 'Autre traduction : sous l’accusation portée par le diable.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Enfin, il doit aussi jouir d’une bonne réputation parmi ceux qui ne font pas partie de la famille de Dieu afin de ne pas s’exposer au mépris public et de ne pas tomber dans les pièges du diable.
  '8':
  - type: text
    content: Il en va de même des diacres
  - type: note
    content: Le mot grec qui a donné par francisation le mot diacre signifiait serviteur. Il est devenu, dans certaines des Eglises primitives, un titre désignant sans doute des assistants des dirigeants des Eglises.
  - type: text
    content: '. Ils doivent inspirer le respect : qu’ils soient des hommes de parole, sans penchant pour la boisson ni pour le gain malhonnête. '
  '9':
  - type: text
    content: 'Ils doivent garder avec une bonne conscience la vérité révélée de la foi. '
