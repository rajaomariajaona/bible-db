document_id: 1TI.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les esclaves et les maîtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les croyants qui sont esclaves doivent considérer leurs maîtres comme ayant droit à tout leur respect. Ils éviteront ainsi que le nom de Dieu soit blasphémé et notre enseignement dénigré. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car « l’amour de l’argent est racine de toutes sortes de maux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’apôtre cite un proverbe populaire, retrouvé dans la littérature de l’époque.
      marker-yv: yv-n
    - type: text
      text: '  ». Pour s’y être abandonnés, certains se sont égarés très loin de la foi, et se sont infligé beaucoup de tourments.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Combattre le bon combat de la foi
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais toi, homme de Dieu, fuis toutes ces choses. Recherche ardemment la droiture, la piété, la fidélité, l’amour, la persévérance, l’amabilité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Combats le bon combat de la foi, saisis la vie éternelle que Dieu t’a appelé à connaître et au sujet de laquelle tu as fait cette belle profession de foi en présence de nombreux témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute au moment de son baptême. Dans l’Eglise ancienne, le baptême était accompagné d’une profession de foi du baptisé.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je t’adjure solennellement devant Dieu, source de toute vie, et devant Jésus-Christ qui a rendu témoignage devant Ponce Pilate par une belle profession de foi : '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: observe ce commandement de façon pure et irréprochable
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: garde ce commandement pur et irréprochable.
      marker-yv: yv-n
    - type: text
      text: ' jusqu’à l’apparition de notre Seigneur Jésus-Christ, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'que suscitera au moment fixé celui qui est :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Bienheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’unique Souverain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Roi des rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur des seigneurs.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lui seul est immortel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa demeure est bâtie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sein de la lumière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inaccessible à tous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul parmi les humains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne l’a vu de ses yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun ne peut le voir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lui soient à jamais
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’honneur et la puissance !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aux riches
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Recommande à ceux qui possèdent des richesses en ce monde de se garder de toute arrogance et de ne pas fonder leur espoir sur la richesse, car elle est instable. Qu’ils placent leur espérance en Dieu, qui nous dispense généreusement toutes ses richesses pour que nous en jouissions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Recommande-leur de faire le bien, d’être riches en œuvres bonnes, d’être généreux et de partager avec les autres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils s’assureront ainsi pour l’avenir un beau capital placé en lieu sûr afin d’obtenir la vraie vie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières recommandations et salutation
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que ceux qui ont des maîtres croyants ne leur manquent pas de respect sous prétexte qu’ils sont des frères. Bien au contraire, qu’ils les servent d’autant mieux que ce sont des croyants bien-aimés qui bénéficient du bienfait de leur service.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà ce que tu dois enseigner et recommander.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le faux et le vrai enseignant des vérités divines
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'O Timothée, garde intact ce qui t’a été confié. Evite les discours creux et les arguments de ce que l’on appelle à tort « la connaissance », car ils sont contraires à la foi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Pour s’y être attachés, plusieurs se sont égarés très loin de la foi. Que la grâce soit avec vous !
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Si quelqu’un enseigne autre chose, et s’écarte des saines paroles de notre Seigneur Jésus-Christ et de l’enseignement conforme à la piété, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'c’est un homme enflé d’orgueil, un ignorant qui a une passion maladive pour les spéculations et les controverses sur des mots. Qu’est-ce qui en résulte ? Des jalousies, des disputes, des dénigrements réciproques, des soupçons malveillants, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: et des discussions interminables entre gens à l’esprit faussé. Ils ne connaissent plus la vérité, et considèrent la foi en Dieu comme un moyen de s’enrichir.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'La véritable foi en Dieu est, en effet, une source de richesse quand on sait être content avec ce qu’on a. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nous n’avons rien apporté dans ce monde, et nous ne pouvons rien en emporter. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tant que nous avons nourriture et vêtement, nous nous en contenterons.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ceux qui veulent à tout prix s’enrichir s’exposent eux-mêmes à la tentation et tombent dans le piège de nombreux désirs insensés et pernicieux qui précipitent les hommes dans la ruine et la perdition. '
