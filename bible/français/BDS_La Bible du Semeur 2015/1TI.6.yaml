document_id: 1TI.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les esclaves et les maîtres
  - type: text
    content: 'Les croyants qui sont esclaves doivent considérer leurs maîtres comme ayant droit à tout leur respect. Ils éviteront ainsi que le nom de Dieu soit blasphémé et notre enseignement dénigré. '
  '10':
  - type: text
    content: Car « l’amour de l’argent est racine de toutes sortes de maux
  - type: note
    content: L’apôtre cite un proverbe populaire, retrouvé dans la littérature de l’époque.
  - type: text
    content: '  ». Pour s’y être abandonnés, certains se sont égarés très loin de la foi, et se sont infligé beaucoup de tourments.'
  - type: heading
    content: Combattre le bon combat de la foi
  '11':
  - type: text
    content: 'Mais toi, homme de Dieu, fuis toutes ces choses. Recherche ardemment la droiture, la piété, la fidélité, l’amour, la persévérance, l’amabilité. '
  '12':
  - type: text
    content: Combats le bon combat de la foi, saisis la vie éternelle que Dieu t’a appelé à connaître et au sujet de laquelle tu as fait cette belle profession de foi en présence de nombreux témoins
  - type: note
    content: Sans doute au moment de son baptême. Dans l’Eglise ancienne, le baptême était accompagné d’une profession de foi du baptisé.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Je t’adjure solennellement devant Dieu, source de toute vie, et devant Jésus-Christ qui a rendu témoignage devant Ponce Pilate par une belle profession de foi : '
  '14':
  - type: text
    content: observe ce commandement de façon pure et irréprochable
  - type: note
    content: 'Autre traduction : garde ce commandement pur et irréprochable.'
  - type: text
    content: ' jusqu’à l’apparition de notre Seigneur Jésus-Christ, '
  '15':
  - type: text
    content: 'que suscitera au moment fixé celui qui est :'
  - type: text
    content: le Bienheureux,
  - type: text
    content: l’unique Souverain,
  - type: text
    content: le Roi des rois,
  - type: text
    content: le Seigneur des seigneurs.
  '16':
  - type: text
    content: Lui seul est immortel.
  - type: text
    content: Sa demeure est bâtie
  - type: text
    content: au sein de la lumière
  - type: text
    content: inaccessible à tous.
  - type: text
    content: Nul parmi les humains
  - type: text
    content: ne l’a vu de ses yeux,
  - type: text
    content: aucun ne peut le voir.
  - type: text
    content: A lui soient à jamais
  - type: text
    content: l’honneur et la puissance !
  - type: text
    content: Amen.
  - type: heading
    content: Aux riches
  '17':
  - type: text
    content: 'Recommande à ceux qui possèdent des richesses en ce monde de se garder de toute arrogance et de ne pas fonder leur espoir sur la richesse, car elle est instable. Qu’ils placent leur espérance en Dieu, qui nous dispense généreusement toutes ses richesses pour que nous en jouissions. '
  '18':
  - type: text
    content: 'Recommande-leur de faire le bien, d’être riches en œuvres bonnes, d’être généreux et de partager avec les autres. '
  '19':
  - type: text
    content: Ils s’assureront ainsi pour l’avenir un beau capital placé en lieu sûr afin d’obtenir la vraie vie.
  - type: heading
    content: Dernières recommandations et salutation
  '2':
  - type: text
    content: Que ceux qui ont des maîtres croyants ne leur manquent pas de respect sous prétexte qu’ils sont des frères. Bien au contraire, qu’ils les servent d’autant mieux que ce sont des croyants bien-aimés qui bénéficient du bienfait de leur service.
  - type: text
    content: Voilà ce que tu dois enseigner et recommander.
  - type: heading
    content: Le faux et le vrai enseignant des vérités divines
  '20':
  - type: text
    content: 'O Timothée, garde intact ce qui t’a été confié. Evite les discours creux et les arguments de ce que l’on appelle à tort « la connaissance », car ils sont contraires à la foi. '
  '21':
  - type: text
    content: Pour s’y être attachés, plusieurs se sont égarés très loin de la foi. Que la grâce soit avec vous !
  '3':
  - type: text
    content: 'Si quelqu’un enseigne autre chose, et s’écarte des saines paroles de notre Seigneur Jésus-Christ et de l’enseignement conforme à la piété, '
  '4':
  - type: text
    content: 'c’est un homme enflé d’orgueil, un ignorant qui a une passion maladive pour les spéculations et les controverses sur des mots. Qu’est-ce qui en résulte ? Des jalousies, des disputes, des dénigrements réciproques, des soupçons malveillants, '
  '5':
  - type: text
    content: et des discussions interminables entre gens à l’esprit faussé. Ils ne connaissent plus la vérité, et considèrent la foi en Dieu comme un moyen de s’enrichir.
  '6':
  - type: text
    content: 'La véritable foi en Dieu est, en effet, une source de richesse quand on sait être content avec ce qu’on a. '
  '7':
  - type: text
    content: 'Nous n’avons rien apporté dans ce monde, et nous ne pouvons rien en emporter. '
  '8':
  - type: text
    content: Tant que nous avons nourriture et vêtement, nous nous en contenterons.
  '9':
  - type: text
    content: 'Ceux qui veulent à tout prix s’enrichir s’exposent eux-mêmes à la tentation et tombent dans le piège de nombreux désirs insensés et pernicieux qui précipitent les hommes dans la ruine et la perdition. '
