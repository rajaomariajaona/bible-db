document_id: MIC.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Roi naîtra à Bethléhem
  - type: text
    content: Et toi, Bethléhem Ephrata
  - type: note
    content: 'Ephrata: région où se situait Bethléhem (Rt 1.2 ; 4.11 ; 1 S 17.12), patrie de la famille de David (1 S 16.1).'
  - type: text
    content: ','
  - type: text
    content: bien que tu sois petite ╵parmi les villes de Juda,
  - type: text
    content: de toi il sortira pour moi
  - type: text
    content: celui qui régnera sur Israël !
  - type: text
    content: Son origine ╵remonte aux temps passés,
  - type: text
    content: aux jours anciens
  - type: note
    content: 'Certains traduisent : de l’éternité. Le v. 1 est cité en Mt 2.6.'
  - type: text
    content: .
  '10':
  - type: text
    content: Je ferai disparaître ╵les cités fortifiées ╵de ton pays,
  - type: text
    content: et je renverserai ╵toutes tes forteresses.
  '11':
  - type: text
    content: Je ferai disparaître ╵de chez ton peuple ╵tout acte de sorcellerie
  - type: text
    content: et tu n’auras plus de devins.
  '12':
  - type: text
    content: Je ferai disparaître ╵du milieu de ton peuple ╵tes idoles sculptées ╵et tes stèles sacrées,
  - type: text
    content: et tu cesseras de te prosterner ╵devant les dieux ╵que tu t’es fabriqués.
  '13':
  - type: text
    content: J’arracherai ╵de chez ton peuple ╵tous tes poteaux sacrés ╵voués à Ashéra,
  - type: text
    content: je détruirai tes villes.
  '14':
  - type: text
    content: Dans ma colère et ma fureur, ╵je ferai payer tous les peuples
  - type: text
    content: qui ne m’auront pas obéi.
  '2':
  - type: text
    content: C’est pourquoi l’Eternel ╵livrera à d’autres son peuple
  - type: text
    content: jusqu’au moment ╵où celle qui doit enfanter ╵enfantera ;
  - type: text
    content: alors le reste de ses frères
  - type: text
    content: rejoindra les Israélites.
  '3':
  - type: text
    content: Lui, il sera bien établi, ╵il paîtra son troupeau,
  - type: text
    content: revêtu de la force ╵de l’Eternel,
  - type: text
    content: avec la majesté ╵de l’Eternel, son Dieu.
  - type: text
    content: Et les gens de son peuple ╵seront bien installés,
  - type: text
    content: car on reconnaîtra ╵désormais sa grandeur
  - type: text
    content: jusqu’aux confins du monde.
  '4':
  - type: text
    content: A lui, nous devrons notre paix
  - type: note
    content: Réminiscence en Ep 2.14.
  - type: text
    content: .
  - type: text
    content: Ainsi, au cas où l’Assyrien ╵entrerait dans notre pays,
  - type: text
    content: où il pénétrerait dans nos palais,
  - type: text
    content: nous aurons à lui opposer ╵suffisamment ╵de dirigeants, de chefs
  - type: text
    content: et même davantage
  - type: note
    content: 'L’hébreu a : sept dirigeants et huit chefs. Pour une construction identique, voir Am 1.3 et note. Sept est le nombre parfait, huit est un superlatif : la puissance du Messie équivaut à celle d’une surabondance de bergers et de princes qu’Israël pourra opposer à ces ennemis.'
  - type: text
    content: .
  '5':
  - type: text
    content: Ces chefs domineront ╵Assur avec le glaive,
  - type: text
    content: le pays de Nimrod
  - type: note
    content: L’ancêtre des habitants de la Mésopotamie (voir Gn 10.8-11).
  - type: text
    content: ' ╵sera soumis à leur épée.'
  - type: text
    content: Et lui, il nous délivrera ╵ainsi de l’Assyrien
  - type: text
    content: au cas où celui-ci ╵entrerait dans notre pays,
  - type: text
    content: où il mettrait le pied ╵sur notre territoire.
  '6':
  - type: text
    content: Le reste de Jacob sera,
  - type: text
    content: parmi de nombreux peuples,
  - type: text
    content: semblable à la rosée ╵qui vient de l’Eternel,
  - type: text
    content: 'ou aux averses ╵tombant sur l’herbe :'
  - type: text
    content: elles ne dépendent en rien de l’homme
  - type: text
    content: et n’attendent rien des humains.
  '7':
  - type: text
    content: Le reste de Jacob sera, ╵au milieu des nations,
  - type: text
    content: parmi de nombreux peuples,
  - type: text
    content: semblable à un lion ╵parmi les animaux des bois
  - type: text
    content: 'ou à un lionceau ╵parmi des troupeaux de moutons :'
  - type: text
    content: car, lorsqu’il passe, ╵il foule aux pieds et il déchire
  - type: text
    content: sans que personne ╵ne puisse délivrer.
  '8':
  - type: text
    content: Ainsi ta main se lèvera ╵contre tes adversaires,
  - type: text
    content: et tous tes ennemis ╵seront exterminés.
  - type: heading
    content: Dieu purifie son peuple
  '9':
  - type: text
    content: En ce jour-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: je ferai disparaître ╵tous les chevaux de guerre ╵de ton pays
  - type: text
    content: et j’anéantirai tes chars.
