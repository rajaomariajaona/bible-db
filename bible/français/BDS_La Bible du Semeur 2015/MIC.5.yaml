document_id: MIC.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Roi naîtra à Bethléhem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et toi, Bethléhem Ephrata
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ephrata
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'région où se situait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bethléhem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Rt 1.2 ; 4.11 ; 1 S 17.12), patrie de la famille de David (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16.1
        metadata:
          usfm: 1SA.16.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: bien que tu sois petite ╵parmi les villes de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toi il sortira pour moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui régnera sur Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son origine ╵remonte aux temps passés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux jours anciens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de l’éternité. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le v. 1 est cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 2.6
        metadata:
          usfm: MAT.2.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est pourquoi l’Eternel ╵livrera à d’autres son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’au moment ╵où celle qui doit enfanter ╵enfantera ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors le reste de ses frères
- type: usfm
  marker: q1
  children:
  - type: text
    text: rejoindra les Israélites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lui, il sera bien établi, ╵il paîtra son troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: revêtu de la force ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la majesté ╵de l’Eternel, son Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les gens de son peuple ╵seront bien installés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car on reconnaîtra ╵désormais sa grandeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’aux confins du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A lui, nous devrons notre paix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Réminiscence en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ep 2.14
        metadata:
          usfm: EPH.2.14
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi, au cas où l’Assyrien ╵entrerait dans notre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où il pénétrerait dans nos palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous aurons à lui opposer ╵suffisamment ╵de dirigeants, de chefs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même davantage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sept dirigeants et huit chefs. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour une construction identique, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1.3
        metadata:
          usfm: AMO.1.3
      - type: text
        text: ' et note. Sept est le nombre parfait, huit est un superlatif : la puissance du Messie équivaut à celle d’une surabondance de bergers et de princes qu’Israël pourra opposer à ces ennemis.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ces chefs domineront ╵Assur avec le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le pays de Nimrod
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancêtre des habitants de la Mésopotamie (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 10.8-11
        metadata:
          usfm: GEN.10.8+GEN.10.9+GEN.10.10+GEN.10.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵sera soumis à leur épée.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et lui, il nous délivrera ╵ainsi de l’Assyrien
- type: usfm
  marker: q1
  children:
  - type: text
    text: au cas où celui-ci ╵entrerait dans notre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où il mettrait le pied ╵sur notre territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le reste de Jacob sera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi de nombreux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: semblable à la rosée ╵qui vient de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou aux averses ╵tombant sur l’herbe :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ne dépendent en rien de l’homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’attendent rien des humains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le reste de Jacob sera, ╵au milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi de nombreux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: semblable à un lion ╵parmi les animaux des bois
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou à un lionceau ╵parmi des troupeaux de moutons :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car, lorsqu’il passe, ╵il foule aux pieds et il déchire
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que personne ╵ne puisse délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ainsi ta main se lèvera ╵contre tes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous tes ennemis ╵seront exterminés.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu purifie son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai disparaître ╵tous les chevaux de guerre ╵de ton pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’anéantirai tes chars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je ferai disparaître ╵les cités fortifiées ╵de ton pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je renverserai ╵toutes tes forteresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je ferai disparaître ╵de chez ton peuple ╵tout acte de sorcellerie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n’auras plus de devins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je ferai disparaître ╵du milieu de ton peuple ╵tes idoles sculptées ╵et tes stèles sacrées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu cesseras de te prosterner ╵devant les dieux ╵que tu t’es fabriqués.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: J’arracherai ╵de chez ton peuple ╵tous tes poteaux sacrés ╵voués à Ashéra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je détruirai tes villes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dans ma colère et ma fureur, ╵je ferai payer tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne m’auront pas obéi.
