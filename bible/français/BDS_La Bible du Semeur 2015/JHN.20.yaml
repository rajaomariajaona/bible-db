document_id: JHN.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le tombeau vide
  - type: heading
    content: (Mt 28.1 ; Mc 16.1-4 ; Lc 24.1-2, 9-12)
  - type: text
    content: 'Le dimanche matin, très tôt, Marie de Magdala se rendit au tombeau. Il faisait encore très sombre. Elle vit que la pierre fermant l’entrée du sépulcre avait été ôtée de devant l’ouverture. '
  '10':
  - type: text
    content: Les deux disciples s’en retournèrent alors chez eux.
  - type: heading
    content: Jésus apparaît à Marie de MagdalaMc 16.9-11.
  '11':
  - type: text
    content: 'Pendant ce temps, Marie se tenait dehors près du tombeau, et pleurait. Tout en pleurant, elle se pencha vers le tombeau : '
  '12':
  - type: text
    content: 'elle vit deux anges vêtus de blanc, assis à l’endroit où le corps de Jésus avait été déposé, l’un à la tête et l’autre aux pieds. '
  '13':
  - type: text
    content: 'Ils lui dirent : Pourquoi pleures-tu ?'
  - type: text
    content: – On a enlevé mon Seigneur, leur répondit-elle, et je ne sais pas où on l’a mis.
  '14':
  - type: text
    content: Tout en disant cela, elle se retourna et vit Jésus qui se tenait là, mais elle ne savait pas que c’était lui.
  '15':
  - type: text
    content: ' '
  - type: text
    content: – Pourquoi pleures-tu ?
  - type: text
    content: ' lui demanda Jésus. '
  - type: text
    content: Qui cherches-tu ?
  - type: text
    content: 'Pensant que c’était le gardien du jardin, elle lui dit : Si c’est toi qui l’as emporté, dis-moi où tu l’as mis, pour que j’aille le reprendre.'
  '16':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Marie !
  - type: text
    content: 'Elle se tourna vers lui et s’écria en hébreu : '
  - type: text
    content: Rabbouni
  - type: text
    content: ' (ce qui veut dire : Maître) !'
  '17':
  - type: text
    content: ' '
  - type: text
    content: – Ne me retiens pas
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : ne me touche pas.'
  - type: text
    content: ','
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: 'car je ne suis pas encore monté vers mon Père. Va plutôt trouver mes frères et dis-leur de ma part : Je monte vers mon Père qui est votre Père, vers mon Dieu qui est votre Dieu.'
  '18':
  - type: text
    content: 'Marie de Magdala alla donc annoncer aux disciples : J’ai vu le Seigneur !'
  - type: text
    content: Et elle leur rapporta ce qu’il lui avait dit.
  - type: heading
    content: Jésus apparaît à ses disciples
  - type: heading
    content: (Lc 24.36-43 ; voir Mc 16.14)
  '19':
  - type: text
    content: Ce même dimanche, dans la soirée, les disciples étaient dans une maison dont ils avaient verrouillé les portes, parce qu’ils avaient peur des Juifs.
  - type: text
    content: 'Jésus vint : il se trouva là, au milieu d’eux, et il leur dit : '
  - type: text
    content: Que la paix soit avec vous !
  '2':
  - type: text
    content: Alors elle courut prévenir Simon Pierre et l’autre disciple, celui que Jésus aimait.
  - type: text
    content: – On a enlevé le Seigneur de la tombe, leur dit-elle, et nous n’avons aucune idée de l’endroit où on l’a mis.
  '20':
  - type: text
    content: Tout en disant cela, il leur montra ses mains et son côté
  - type: note
    content: Où l’on pouvait encore voir les cicatrices des plaies reçues à la croix.
  - type: text
    content: . Les disciples furent remplis de joie parce qu’ils voyaient le Seigneur.
  '21':
  - type: text
    content: ' '
  - type: text
    content: – Que la paix soit avec vous,
  - type: text
    content: ' leur dit-il de nouveau. '
  - type: text
    content: Comme le Père m’a envoyé, moi aussi je vous envoie.
  '22':
  - type: text
    content: 'Après avoir dit cela, il souffla sur eux et continua : '
  - type: text
    content: Recevez l’Esprit Saint.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Ceux à qui vous remettrez leurs péchés en seront tenus quittes ; et ceux à qui vous les retiendrez en resteront chargés.
  - type: heading
    content: Jésus apparaît à Thomas
  '24':
  - type: text
    content: L’un des Douze, Thomas, surnommé le Jumeau, n’était pas avec eux lors de la venue de Jésus.
  '25':
  - type: text
    content: 'Les autres disciples lui dirent : Nous avons vu le Seigneur !'
  - type: text
    content: 'Mais il leur répondit : Si je ne vois pas la marque des clous dans ses mains, si je ne mets pas mon doigt à la place des clous, et si je ne mets pas la main dans son côté, je ne croirai pas.'
  '26':
  - type: text
    content: 'Huit jours plus tard, les disciples étaient de nouveau réunis dans la maison. Cette fois-ci, Thomas était avec eux. Jésus vint, alors que les portes étaient verrouillées. Il se tint au milieu d’eux et leur dit : '
  - type: text
    content: Que la paix soit avec vous !
  '27':
  - type: text
    content: 'Puis il dit à Thomas : '
  - type: text
    content: Place ton doigt ici, vois mes mains ; avance ta main et mets-la dans mon côté. Ne sois donc pas incrédule, mais crois.
  '28':
  - type: text
    content: 'Thomas lui répondit : Mon Seigneur et mon Dieu !'
  '29':
  - type: text
    content: ' '
  - type: text
    content: – Parce que tu m’as vu, tu crois !
  - type: text
    content: ' lui dit Jésus. '
  - type: text
    content: Heureux ceux qui croient sans avoir vu.
  '3':
  - type: text
    content: 'Pierre sortit donc, avec l’autre disciple, et ils se rendirent tous deux au tombeau. '
  '30':
  - type: text
    content: 'Jésus a accompli, sous les yeux de ses disciples, encore beaucoup d’autres signes miraculeux qui n’ont pas été rapportés dans ce livre. '
  '31':
  - type: text
    content: Mais ce qui s’y trouve a été écrit pour que vous croyiez que Jésus est le Messie, le Fils de Dieu, et qu’en croyant, vous possédiez la vie en son nom.
  '4':
  - type: text
    content: 'Ils couraient tous les deux ensemble, mais l’autre disciple, plus rapide que Pierre, le distança et arriva le premier au tombeau. '
  '5':
  - type: text
    content: 'En se penchant, il vit les linges funéraires par terre, mais il n’entra pas. '
  '6':
  - type: text
    content: 'Simon Pierre, qui le suivait, arriva alors. Il entra dans le tombeau, vit les linges qui étaient par terre, '
  '7':
  - type: text
    content: et le linge qui avait enveloppé la tête de Jésus, non pas avec les linges funéraires, mais enroulé
  - type: note
    content: 'Ce qui peut vouloir dire que le linge avait gardé la forme de la tête de Jésus. Le corps du Ressuscité avait dû passer à travers les bandelettes mêmes : il passera à travers des portes fermées. C’est cette vue qui a convaincu les deux disciples de la réalité de la résurrection.'
  - type: text
    content: ' à part, à sa place.'
  '8':
  - type: text
    content: 'Alors l’autre disciple, celui qui était arrivé le premier, entra à son tour dans le tombeau. Il vit, et il crut. '
  '9':
  - type: text
    content: En effet, jusque-là ils n’avaient pas encore compris que Jésus devait ressusciter, comme l’avait annoncé l’Ecriture.
