document_id: JHN.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le tombeau vide
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 28.1 ; Mc 16.1-4 ; Lc 24.1-2, 9-12)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dimanche matin, très tôt, Marie de Magdala se rendit au tombeau. Il faisait encore très sombre. Elle vit que la pierre fermant l’entrée du sépulcre avait été ôtée de devant l’ouverture. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les deux disciples s’en retournèrent alors chez eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus apparaît à Marie de Magdala
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mc 16.9-11
        - type: text
          text: .
      marker-yv: yv-n
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant ce temps, Marie se tenait dehors près du tombeau, et pleurait. Tout en pleurant, elle se pencha vers le tombeau : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'elle vit deux anges vêtus de blanc, assis à l’endroit où le corps de Jésus avait été déposé, l’un à la tête et l’autre aux pieds. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent : Pourquoi pleures-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – On a enlevé mon Seigneur, leur répondit-elle, et je ne sais pas où on l’a mis.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout en disant cela, elle se retourna et vit Jésus qui se tenait là, mais elle ne savait pas que c’était lui.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Pourquoi pleures-tu ?
    - type: text
      text: ' lui demanda Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui cherches-tu ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pensant que c’était le gardien du jardin, elle lui dit : Si c’est toi qui l’as emporté, dis-moi où tu l’as mis, pour que j’aille le reprendre.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Marie !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle se tourna vers lui et s’écria en hébreu : '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Rabbouni
    - type: text
      text: ' (ce qui veut dire : Maître) !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Ne me retiens pas
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne me touche pas.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ','
    - type: text
      text: ' lui dit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'car je ne suis pas encore monté vers mon Père. Va plutôt trouver mes frères et dis-leur de ma part : Je monte vers mon Père qui est votre Père, vers mon Dieu qui est votre Dieu.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marie de Magdala alla donc annoncer aux disciples : J’ai vu le Seigneur !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et elle leur rapporta ce qu’il lui avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus apparaît à ses disciples
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 24.36-43 ; voir Mc 16.14)
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce même dimanche, dans la soirée, les disciples étaient dans une maison dont ils avaient verrouillé les portes, parce qu’ils avaient peur des Juifs.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus vint : il se trouva là, au milieu d’eux, et il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que la paix soit avec vous !
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors elle courut prévenir Simon Pierre et l’autre disciple, celui que Jésus aimait.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – On a enlevé le Seigneur de la tombe, leur dit-elle, et nous n’avons aucune idée de l’endroit où on l’a mis.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout en disant cela, il leur montra ses mains et son côté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Où l’on pouvait encore voir les cicatrices des plaies reçues à la croix.
      marker-yv: yv-n
    - type: text
      text: . Les disciples furent remplis de joie parce qu’ils voyaient le Seigneur.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Que la paix soit avec vous,
    - type: text
      text: ' leur dit-il de nouveau. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme le Père m’a envoyé, moi aussi je vous envoie.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir dit cela, il souffla sur eux et continua : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Recevez l’Esprit Saint.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ceux à qui vous remettrez leurs péchés en seront tenus quittes ; et ceux à qui vous les retiendrez en resteront chargés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus apparaît à Thomas
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’un des Douze, Thomas, surnommé le Jumeau, n’était pas avec eux lors de la venue de Jésus.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres disciples lui dirent : Nous avons vu le Seigneur !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il leur répondit : Si je ne vois pas la marque des clous dans ses mains, si je ne mets pas mon doigt à la place des clous, et si je ne mets pas la main dans son côté, je ne croirai pas.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huit jours plus tard, les disciples étaient de nouveau réunis dans la maison. Cette fois-ci, Thomas était avec eux. Jésus vint, alors que les portes étaient verrouillées. Il se tint au milieu d’eux et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que la paix soit avec vous !
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à Thomas : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Place ton doigt ici, vois mes mains ; avance ta main et mets-la dans mon côté. Ne sois donc pas incrédule, mais crois.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas lui répondit : Mon Seigneur et mon Dieu !'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Parce que tu m’as vu, tu crois !
    - type: text
      text: ' lui dit Jésus. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux ceux qui croient sans avoir vu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre sortit donc, avec l’autre disciple, et ils se rendirent tous deux au tombeau. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a accompli, sous les yeux de ses disciples, encore beaucoup d’autres signes miraculeux qui n’ont pas été rapportés dans ce livre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ce qui s’y trouve a été écrit pour que vous croyiez que Jésus est le Messie, le Fils de Dieu, et qu’en croyant, vous possédiez la vie en son nom.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils couraient tous les deux ensemble, mais l’autre disciple, plus rapide que Pierre, le distança et arriva le premier au tombeau. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En se penchant, il vit les linges funéraires par terre, mais il n’entra pas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre, qui le suivait, arriva alors. Il entra dans le tombeau, vit les linges qui étaient par terre, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et le linge qui avait enveloppé la tête de Jésus, non pas avec les linges funéraires, mais enroulé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce qui peut vouloir dire que le linge avait gardé la forme de la tête de Jésus. Le corps du Ressuscité avait dû passer à travers les bandelettes mêmes : il passera à travers des portes fermées. C’est cette vue qui a convaincu les deux disciples de la réalité de la résurrection.'
      marker-yv: yv-n
    - type: text
      text: ' à part, à sa place.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’autre disciple, celui qui était arrivé le premier, entra à son tour dans le tombeau. Il vit, et il crut. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, jusque-là ils n’avaient pas encore compris que Jésus devait ressusciter, comme l’avait annoncé l’Ecriture.
