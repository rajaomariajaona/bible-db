document_id: 2SA.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le conflit avec les Ammonites et les Syriens
  - type: heading
    content: (1 Ch 19.1-19)
  - type: text
    content: Quelque temps après, le roi des Ammonites
  - type: note
    content: Peuple établi dans le désert à l’est du Jourdain (voir note 1 S 11.1).
  - type: text
    content: ' mourut, et Hanoun son fils régna à sa place. '
  '10':
  - type: text
    content: 'il confia le commandement du reste de l’armée à son frère Abishaï qui le rangea en ordre de bataille pour affronter les Ammonites. '
  '11':
  - type: text
    content: 'Joab dit à son frère : Si tu vois que les Syriens l’emportent sur moi, tu viendras à ma rescousse ; si les Ammonites sont plus forts que toi, c’est moi qui viendrai à ton secours. '
  '12':
  - type: text
    content: Bon courage, et luttons vaillamment pour défendre notre peuple et les villes de notre Dieu ! Et que l’Eternel fasse ce qu’il jugera bon !
  '13':
  - type: text
    content: 'Alors Joab et sa troupe s’avancèrent pour le combat contre les Syriens. Ceux-ci prirent la fuite devant eux. '
  '14':
  - type: text
    content: Quand les Ammonites virent que les Syriens avaient pris la fuite, ils s’enfuirent à leur tour devant Abishaï et se retirèrent dans la ville. Alors Joab mit fin à la campagne contre les Ammonites et rentra à Jérusalem.
  '15':
  - type: text
    content: 'Les Syriens, voyant qu’ils avaient été mis en fuite par les Israélites, rassemblèrent toutes leurs troupes. '
  '16':
  - type: text
    content: 'Le roi Hadadézer envoya des messagers pour mobiliser les Syriens établis de l’autre côté de l’Euphrate. Ils arrivèrent à Hélam avec, à leur tête, Shobak, le chef de l’armée de Hadadézer. '
  '17':
  - type: text
    content: Quand David en fut informé, il mobilisa tout Israël, traversa le Jourdain et marcha sur Hélam
  - type: note
    content: Ville proche de la frontière nord de Galaad.
  - type: text
    content: '. Les Syriens se rangèrent en ordre de bataille pour affronter David et engagèrent le combat, '
  '18':
  - type: text
    content: mais ils furent mis en fuite par les Israélites. David leur tua sept cents chevaux attelés aux chars et quarante mille soldats sur char
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque ont : les soldats de sept cents chars et quarante mille fantassins. 1 Ch 19.18 dit : les soldats de sept mille chars et quarante mille fantassins.'
  - type: text
    content: '. Il frappa aussi Shobak, leur général en chef, qui mourut sur le champ de bataille. '
  '19':
  - type: text
    content: Quand tous les rois vassaux de Hadadézer virent qu’ils avaient été battus par Israël, ils firent la paix avec les Israélites et leur furent assujettis. Après cela, les Syriens n’osèrent plus venir au secours des Ammonites.
  '2':
  - type: text
    content: 'David se dit : « Je veux témoigner de la bonté à Hanoun, fils de Nahash, comme son père m’en a témoigné. » David lui envoya donc certains de ses hauts fonctionnaires pour lui présenter ses condoléances à l’occasion de la mort de son père. Lorsque ceux-ci arrivèrent au pays des Ammonites, '
  '3':
  - type: text
    content: 'les dirigeants de ce peuple dirent à Hanoun, leur souverain : Crois-tu que ce soit pour honorer la mémoire de ton père que David t’envoie des gens t’adresser des condoléances ? N’est-ce pas plutôt pour reconnaître et espionner la ville'
  - type: note
    content: C’est-à-dire Rabba, la capitale des Ammonites (11.1).
  - type: text
    content: ' afin de la détruire ?'
  '4':
  - type: text
    content: 'Alors Hanoun s’empara des ambassadeurs de David, leur fit raser la moitié de la barbe et leur fit couper les habits à mi-corps jusqu’en bas du dos, puis il les renvoya. '
  '5':
  - type: text
    content: 'Ceux-ci en furent si honteux que, lorsqu’on informa David de ce qui s’était passé, il envoya des messagers à leur rencontre pour leur faire dire : Restez à Jéricho jusqu’à ce que votre barbe ait repoussé ; vous reviendrez ensuite.'
  '6':
  - type: text
    content: Les Ammonites comprirent qu’ils s’étaient rendus odieux à David. Alors ils envoyèrent des hommes pour enrôler à leur solde vingt « milliers »
  - type: note
    content: Voir note 2 S 6.1.
  - type: text
    content: ' de mercenaires chez les Syriens de Beth-Rehob et de Tsoba'
  - type: note
    content: Voir note 8.3.
  - type: text
    content: ', un « millier » d’hommes chez le roi de Maaka, et douze « milliers » chez celui de Tob. '
  '7':
  - type: text
    content: Quand David l’apprit, il envoya contre eux Joab avec toute l’armée des soldats de métier.
  '8':
  - type: text
    content: 'Les Ammonites firent une sortie et se rangèrent en ordre de bataille à la porte de leur capitale, tandis que les Syriens de Tsoba et de Rehob avec les soldats de Tob et de Maaka restaient à part en rase campagne. '
  '9':
  - type: text
    content: 'Voyant qu’il aurait à faire face sur deux fronts à la fois, devant et derrière lui, Joab sélectionna ses meilleurs soldats et les fit ranger en ordre de bataille face aux Syriens ; '
