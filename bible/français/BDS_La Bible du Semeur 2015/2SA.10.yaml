document_id: 2SA.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le conflit avec les Ammonites et les Syriens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 19.1-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quelque temps après, le roi des Ammonites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peuple établi dans le désert à l’est du Jourdain (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 11.1
        metadata:
          usfm: 1SA.11.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' mourut, et Hanoun son fils régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David se dit : « Je veux témoigner de la bonté à Hanoun, fils de Nahash, comme son père m’en a témoigné. » David lui envoya donc certains de ses hauts fonctionnaires pour lui présenter ses condoléances à l’occasion de la mort de son père. Lorsque ceux-ci arrivèrent au pays des Ammonites, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'les dirigeants de ce peuple dirent à Hanoun, leur souverain : Crois-tu que ce soit pour honorer la mémoire de ton père que David t’envoie des gens t’adresser des condoléances ? N’est-ce pas plutôt pour reconnaître et espionner la ville'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire Rabba, la capitale des Ammonites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.1'
        metadata:
          usfm: 2SA.11.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' afin de la détruire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Hanoun s’empara des ambassadeurs de David, leur fit raser la moitié de la barbe et leur fit couper les habits à mi-corps jusqu’en bas du dos, puis il les renvoya. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ceux-ci en furent si honteux que, lorsqu’on informa David de ce qui s’était passé, il envoya des messagers à leur rencontre pour leur faire dire : Restez à Jéricho jusqu’à ce que votre barbe ait repoussé ; vous reviendrez ensuite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les Ammonites comprirent qu’ils s’étaient rendus odieux à David. Alors ils envoyèrent des hommes pour enrôler à leur solde vingt « milliers »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 6.1
        metadata:
          usfm: 2SA.6.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de mercenaires chez les Syriens de Beth-Rehob et de Tsoba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.3'
        metadata:
          usfm: 2SA.8.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', un « millier » d’hommes chez le roi de Maaka, et douze « milliers » chez celui de Tob. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand David l’apprit, il envoya contre eux Joab avec toute l’armée des soldats de métier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Ammonites firent une sortie et se rangèrent en ordre de bataille à la porte de leur capitale, tandis que les Syriens de Tsoba et de Rehob avec les soldats de Tob et de Maaka restaient à part en rase campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voyant qu’il aurait à faire face sur deux fronts à la fois, devant et derrière lui, Joab sélectionna ses meilleurs soldats et les fit ranger en ordre de bataille face aux Syriens ; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'il confia le commandement du reste de l’armée à son frère Abishaï qui le rangea en ordre de bataille pour affronter les Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joab dit à son frère : Si tu vois que les Syriens l’emportent sur moi, tu viendras à ma rescousse ; si les Ammonites sont plus forts que toi, c’est moi qui viendrai à ton secours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Bon courage, et luttons vaillamment pour défendre notre peuple et les villes de notre Dieu ! Et que l’Eternel fasse ce qu’il jugera bon !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Joab et sa troupe s’avancèrent pour le combat contre les Syriens. Ceux-ci prirent la fuite devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quand les Ammonites virent que les Syriens avaient pris la fuite, ils s’enfuirent à leur tour devant Abishaï et se retirèrent dans la ville. Alors Joab mit fin à la campagne contre les Ammonites et rentra à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les Syriens, voyant qu’ils avaient été mis en fuite par les Israélites, rassemblèrent toutes leurs troupes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi Hadadézer envoya des messagers pour mobiliser les Syriens établis de l’autre côté de l’Euphrate. Ils arrivèrent à Hélam avec, à leur tête, Shobak, le chef de l’armée de Hadadézer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quand David en fut informé, il mobilisa tout Israël, traversa le Jourdain et marcha sur Hélam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ville proche de la frontière nord de Galaad.
    marker-yv: yv-n
  - type: text
    text: '. Les Syriens se rangèrent en ordre de bataille pour affronter David et engagèrent le combat, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mais ils furent mis en fuite par les Israélites. David leur tua sept cents chevaux attelés aux chars et quarante mille soldats sur char
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les soldats de sept cents chars et quarante mille fantassins. '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 19.18
        metadata:
          usfm: 1CH.19.18
      - type: text
        text: ' dit : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les soldats de sept mille chars et quarante mille fantassins.
    marker-yv: yv-n
  - type: text
    text: '. Il frappa aussi Shobak, leur général en chef, qui mourut sur le champ de bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand tous les rois vassaux de Hadadézer virent qu’ils avaient été battus par Israël, ils firent la paix avec les Israélites et leur furent assujettis. Après cela, les Syriens n’osèrent plus venir au secours des Ammonites.
