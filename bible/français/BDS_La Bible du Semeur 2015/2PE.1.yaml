document_id: 2PE.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Simon Pierre, serviteur et apôtre de Jésus-Christ, salue ceux qui ont reçu le même privilège que nous : la foi. Ils la doivent à Jésus-Christ, notre Dieu et notre Sauveur, car il est juste'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ceux qui par la justice qui vient de Jésus-Christ, notre Dieu et notre Sauveur, ont reçu en partage le même privilège.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C’est pourquoi, frères et sœurs, puisque Dieu vous a appelés et choisis, faites d’autant plus d’efforts pour confirmer cet appel et ce choix : car si vous agissez ainsi, vous ne tomberez jamais. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ainsi vous seront grandes ouvertes les portes du royaume éternel de notre Seigneur et Sauveur Jésus-Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’enseignement conforme à la vérité
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Voilà pourquoi je ne cesserai de vous rappeler ces choses, bien que vous les sachiez déjà et que vous soyez fermement attachés à la vérité qui vous a été présentée.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais j’estime juste de vous tenir en éveil par mes rappels, tant que je serai encore de ce monde. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Car je sais que je vais bientôt quitter ce corps mortel, comme notre Seigneur Jésus-Christ me l’a révélé. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Cependant, je prendrai grand soin que, même après mon départ, vous vous rappeliez toujours ces choses.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, nous ne nous sommes pas appuyés sur des histoires habilement inventées, lorsque nous vous avons fait connaître la venue de notre Seigneur Jésus-Christ dans toute sa puissance, mais nous avons vu sa grandeur de nos propres yeux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car Dieu le Père lui a donné honneur et gloire lorsque, dans sa gloire immense, il lui a fait entendre sa voix, qui disait : Voici mon Fils bien-aimé, qui fait toute ma joie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Or cette voix, qui était venue du ciel, nous l’avons entendue nous-mêmes, lorsque nous étions avec lui sur la sainte montagne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pierre fait allusion à la transfiguration. Voir Mt 17.1-5 ; Mc 9.2-7 ; Lc 9.28-35.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'De plus, nous tenons pour d’autant plus certaine la parole des prophètes et vous faites bien de vous y attacher : car elle est comme une lampe qui brille dans un lieu obscur, jusqu’à ce que le jour paraisse et que l’étoile du matin se lève pour illuminer votre cœur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que la grâce et la paix vous soient données en abondance par la connaissance de Dieu et de Jésus, notre Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’appel de Dieu et ses effets
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Sachez, avant tout, qu’aucune prophétie de l’Ecriture ne peut faire l’objet d’une interprétation personnelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire d’une interprétation propre au lecteur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: En effet, ce n’est pas par une volonté humaine qu’une prophétie a jamais été apportée, mais c’est portés par le Saint-Esprit que des hommes ont parlé de la part de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Par sa puissance, en effet, Dieu nous a donné tout ce qu’il faut pour vivre dans la piété, en nous faisant connaître celui qui nous a appelés par la manifestation de sa propre gloire et l’intervention de sa force. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ainsi, nous bénéficions des dons infiniment précieux que Dieu nous avait promis. Il a voulu, par ces dons, vous rendre conformes au caractère de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous faire vivre en communion avec lui.
      marker-yv: yv-n
    - type: text
      text: ', vous qui avez fui la corruption que les mauvais désirs font régner dans ce monde.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Pour cette raison même, faites tous vos efforts pour ajouter à votre foi la vertu, à la vertu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire l’excellence dans le domaine moral.
      marker-yv: yv-n
    - type: text
      text: ' la connaissance, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'à la connaissance la maîtrise de soi, à la maîtrise de soi l’endurance dans l’épreuve, à l’endurance la piété, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: à la piété l’affection fraternelle, et à l’affection fraternelle l’amour.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Car si vous possédez ces qualités, et si elles grandissent sans cesse en vous, elles vous rendront actifs et vous permettront de connaître toujours mieux notre Seigneur Jésus-Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car celui à qui elles font défaut est comme un aveugle, il ne voit pas clair. Il a oublié qu’il a été purifié de ses péchés d’autrefois.
