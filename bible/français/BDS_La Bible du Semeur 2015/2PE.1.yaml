document_id: 2PE.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Simon Pierre, serviteur et apôtre de Jésus-Christ, salue ceux qui ont reçu le même privilège que nous : la foi. Ils la doivent à Jésus-Christ, notre Dieu et notre Sauveur, car il est juste'
  - type: note
    content: 'Autre traduction : à ceux qui par la justice qui vient de Jésus-Christ, notre Dieu et notre Sauveur, ont reçu en partage le même privilège.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'C’est pourquoi, frères et sœurs, puisque Dieu vous a appelés et choisis, faites d’autant plus d’efforts pour confirmer cet appel et ce choix : car si vous agissez ainsi, vous ne tomberez jamais. '
  '11':
  - type: text
    content: Ainsi vous seront grandes ouvertes les portes du royaume éternel de notre Seigneur et Sauveur Jésus-Christ.
  - type: heading
    content: L’enseignement conforme à la vérité
  '12':
  - type: text
    content: Voilà pourquoi je ne cesserai de vous rappeler ces choses, bien que vous les sachiez déjà et que vous soyez fermement attachés à la vérité qui vous a été présentée.
  '13':
  - type: text
    content: 'Mais j’estime juste de vous tenir en éveil par mes rappels, tant que je serai encore de ce monde. '
  '14':
  - type: text
    content: 'Car je sais que je vais bientôt quitter ce corps mortel, comme notre Seigneur Jésus-Christ me l’a révélé. '
  '15':
  - type: text
    content: Cependant, je prendrai grand soin que, même après mon départ, vous vous rappeliez toujours ces choses.
  '16':
  - type: text
    content: 'En effet, nous ne nous sommes pas appuyés sur des histoires habilement inventées, lorsque nous vous avons fait connaître la venue de notre Seigneur Jésus-Christ dans toute sa puissance, mais nous avons vu sa grandeur de nos propres yeux. '
  '17':
  - type: text
    content: 'Car Dieu le Père lui a donné honneur et gloire lorsque, dans sa gloire immense, il lui a fait entendre sa voix, qui disait : Voici mon Fils bien-aimé, qui fait toute ma joie. '
  '18':
  - type: text
    content: Or cette voix, qui était venue du ciel, nous l’avons entendue nous-mêmes, lorsque nous étions avec lui sur la sainte montagne
  - type: note
    content: Pierre fait allusion à la transfiguration. Voir Mt 17.1-5 ; Mc 9.2-7 ; Lc 9.28-35.
  - type: text
    content: .
  '19':
  - type: text
    content: 'De plus, nous tenons pour d’autant plus certaine la parole des prophètes et vous faites bien de vous y attacher : car elle est comme une lampe qui brille dans un lieu obscur, jusqu’à ce que le jour paraisse et que l’étoile du matin se lève pour illuminer votre cœur. '
  '2':
  - type: text
    content: Que la grâce et la paix vous soient données en abondance par la connaissance de Dieu et de Jésus, notre Seigneur.
  - type: heading
    content: L’appel de Dieu et ses effets
  '20':
  - type: text
    content: Sachez, avant tout, qu’aucune prophétie de l’Ecriture ne peut faire l’objet d’une interprétation personnelle
  - type: note
    content: C’est-à-dire d’une interprétation propre au lecteur.
  - type: text
    content: '. '
  '21':
  - type: text
    content: En effet, ce n’est pas par une volonté humaine qu’une prophétie a jamais été apportée, mais c’est portés par le Saint-Esprit que des hommes ont parlé de la part de Dieu.
  '3':
  - type: text
    content: 'Par sa puissance, en effet, Dieu nous a donné tout ce qu’il faut pour vivre dans la piété, en nous faisant connaître celui qui nous a appelés par la manifestation de sa propre gloire et l’intervention de sa force. '
  '4':
  - type: text
    content: Ainsi, nous bénéficions des dons infiniment précieux que Dieu nous avait promis. Il a voulu, par ces dons, vous rendre conformes au caractère de Dieu
  - type: note
    content: 'D’autres comprennent : vous faire vivre en communion avec lui.'
  - type: text
    content: ', vous qui avez fui la corruption que les mauvais désirs font régner dans ce monde.'
  '5':
  - type: text
    content: Pour cette raison même, faites tous vos efforts pour ajouter à votre foi la vertu, à la vertu
  - type: note
    content: C’est-à-dire l’excellence dans le domaine moral.
  - type: text
    content: ' la connaissance, '
  '6':
  - type: text
    content: 'à la connaissance la maîtrise de soi, à la maîtrise de soi l’endurance dans l’épreuve, à l’endurance la piété, '
  '7':
  - type: text
    content: à la piété l’affection fraternelle, et à l’affection fraternelle l’amour.
  '8':
  - type: text
    content: 'Car si vous possédez ces qualités, et si elles grandissent sans cesse en vous, elles vous rendront actifs et vous permettront de connaître toujours mieux notre Seigneur Jésus-Christ. '
  '9':
  - type: text
    content: Car celui à qui elles font défaut est comme un aveugle, il ne voit pas clair. Il a oublié qu’il a été purifié de ses péchés d’autrefois.
