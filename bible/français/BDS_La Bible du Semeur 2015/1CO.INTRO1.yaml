document_id: 1CO.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La ville de Corinthe occupe, en Grèce, une position centrale. Elle est bâtie sur un isthme entre la mer Egée (à l’est) et la mer Ionienne (à l’ouest). Au temps de Paul, elle comptait déjà, estime-t-on, 700 000 habitants. Tous les cultes s’y côtoyaient : grecs, romains et orientaux ; les écoles de philosophie y florissaient. Mais la corruption des mœurs emboîtait le pas à la prospérité matérielle.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’Eglise de Corinthe a été fondée en 51 par l’apôtre Paul (Ac 18.1-18). Quelques Juifs se convertirent d’abord, en particulier Crispus, le chef de la synagogue. Puis Paul se tourne vers les non-Juifs qui, en grand nombre, deviennent chrétiens. L’apôtre reste environ deux ans dans la ville, y rassemblant l’Eglise la plus nombreuse de sa carrière.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Lui-même, au moment où il écrit cette première lettre aux Corinthiens (probablement au printemps 56), se trouve au terme d’un long séjour à Ephèse.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’occasion de la lettre est double :'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '1) Paul a eu de mauvaises nouvelles de l’Eglise par « les gens de la maison de Chloé » (1.11) : des « clans » se sont formés, qui revendiquent chacun l’autorité d’un apôtre ou d’un enseignant particulier, il y a des querelles et des cas d’immoralité.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 2) Il a reçu une lettre de l’Eglise de Corinthe (7.1), qui lui pose des questions sur divers sujets et soulève plusieurs problèmes.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il doit donc redresser, par son enseignement, la situation dans l’Eglise, et répondre à la lettre des Corinthiens. De ces deux impératifs se dégage le plan général de la lettre :'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 'Réactions aux nouvelles : chap. 1 à 6'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '1.10 à 4.21  : Les divisions dans l’Eglise'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '5.1 à 6.20  : Les problèmes moraux'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 'Réponses à divers problèmes : chap. 7 à 15'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '7  : Le mariage et le célibat'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '8.1 à 11.1  : La liberté chrétienne'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '11.2-34  : Le comportement lors des réunions de l’Eglise'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '12 à 14  : Les « manifestations de l’Esprit »'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: '15  : La résurrection'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La diversité des sujets abordés fait de cette lettre une des plus pratiques de Paul. Elle permet d’entrer de plain-pied dans la vie d’une Eglise du premier siècle. Mais diversité ne signifie pas éparpillement : l’apôtre nous ramène toujours aux vérités fondamentales de la foi, qui éclairent tous les aspects de la vie chrétienne.'
