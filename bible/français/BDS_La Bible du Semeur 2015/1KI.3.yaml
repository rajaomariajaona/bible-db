document_id: 1KI.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un mariage avec la fille du pharaon
  - type: text
    content: Salomon s’allia par mariage avec le pharaon, roi d’Egypte
  - type: note
    content: Il pourrait s’agir de Smendès ou de Psousennès II, derniers pharaons de la XXIe dynastie – le premier pharaon dont le nom est mentionné dans l’Ancien Testament étant Shishaq (Sheshonq Ier), le fondateur de la XXIIe dynastie (vers 945 av. J.-C.).
  - type: text
    content: ', en épousant sa fille. En attendant d’avoir fini de bâtir son palais, le temple de l’Eternel et le rempart autour de Jérusalem, il l’installa dans la Cité de David'
  - type: note
    content: L’ancienne forteresse de Jérusalem (2 S 5.7-9). Une vingtaine d’années plus tard, Salomon lui construira un palais particulier (7.8 ; 9.10 ; 2 Ch 8.11).
  - type: text
    content: .
  - type: heading
    content: Le peuple continue à sacrifier sur les hauts lieux
  '10':
  - type: text
    content: 'Cette demande de Salomon plut au Seigneur. '
  '11':
  - type: text
    content: 'Alors Dieu lui dit : Puisque c’est là ce que tu demandes, et que tu ne demandes pour toi ni longue vie, ni richesse, ni la mort de tes ennemis, mais l’intelligence nécessaire pour exercer la justice avec droiture, '
  '12':
  - type: text
    content: 'eh bien, je vais réaliser ton souhait. Je te donnerai de la sagesse et de l’intelligence comme à personne dans le passé, ni dans l’avenir. '
  '13':
  - type: text
    content: 'De plus, je t’accorde ce que tu n’as pas demandé : la richesse et la gloire, de sorte que pendant toute ta vie aucun roi ne t’égalera.'
  '14':
  - type: text
    content: Enfin, si tu marches dans les chemins que j’ai prescrits, si tu obéis fidèlement à mes lois et mes commandements, comme ton père David, je t’accorderai aussi une longue vie.
  '15':
  - type: text
    content: Salomon s’éveilla, avec ce rêve présent à l’esprit, et il revint à Jérusalem. Là, il alla se présenter devant le coffre de l’alliance de l’Eternel. Il offrit des holocaustes, présenta des sacrifices de communion et donna un festin auquel il invita tous ses hauts fonctionnaires.
  - type: heading
    content: Salomon rend la justice avec sagesse
  '16':
  - type: text
    content: 'Un jour, deux femmes prostituées vinrent chez le roi et se présentèrent devant lui. '
  '17':
  - type: text
    content: 'L’une d’elles lui dit : S’il te plaît, mon seigneur, écoute-moi : cette femme et moi nous habitons dans la même maison et j’ai donné naissance à un fils près d’elle. '
  '18':
  - type: text
    content: 'Trois jours après, elle a aussi mis un enfant au monde. Nous vivons seules ensemble dans cette maison, il n’y a personne d’autre avec nous et nous n’étions que toutes les deux. '
  '19':
  - type: text
    content: 'Or, pendant la nuit, elle s’est couchée sur son fils et l’a étouffé. '
  '2':
  - type: text
    content: 'Seulement, en ce temps-là, le peuple continuait à offrir des sacrifices sur les hauts lieux car on n’avait pas encore construit le temple pour l’Eternel. '
  '20':
  - type: text
    content: 'Alors elle s’est levée au milieu de la nuit, elle a enlevé mon fils à mes côtés pendant que moi, je dormais, et l’a couché contre elle, puis elle a déposé son bébé mort près de moi. '
  '21':
  - type: text
    content: Le matin, je me suis levée pour allaiter mon enfant et j’ai trouvé l’enfant mort. Le jour venu, je l’ai examiné attentivement et j’ai reconnu que ce n’était pas mon fils que j’avais mis au monde.
  '22':
  - type: text
    content: – C’est faux ! interrompit l’autre femme. C’est mon fils qui est vivant et le tien est mort !
  - type: text
    content: – Pas du tout, riposta la première, c’est ton fils qui est mort et le mien qui est vivant !
  - type: text
    content: Et elles continuèrent à se disputer ainsi devant le roi.
  '23':
  - type: text
    content: 'Celui-ci déclara finalement : L’une dit : « C’est ici mon fils qui est vivant ; et c’est le tien qui est mort. » Mais l’autre dit : « Pas du tout, c’est ton fils qui est mort et le mien qui est vivant. » '
  '24':
  - type: text
    content: Eh bien, ajouta le roi, qu’on m’apporte une épée.
  - type: text
    content: 'On lui apporta une épée. '
  '25':
  - type: text
    content: 'Alors il dit : Coupez l’enfant vivant en deux et donnez-en une moitié à chacune.'
  '26':
  - type: text
    content: 'Alors la mère de l’enfant vivant, poussée par son amour pour son fils, s’écria : De grâce, mon seigneur, qu’on lui donne le bébé vivant, qu’on ne le fasse pas mourir !'
  - type: text
    content: 'Mais l’autre dit : Non, coupez-le en deux. Ainsi il ne sera ni à moi ni à elle.'
  '27':
  - type: text
    content: 'Alors le roi prononça son jugement et dit : Ne tuez pas l’enfant ! Donnez-le à la première des deux femmes. C’est elle sa vraie mère.'
  '28':
  - type: text
    content: Tout Israël apprit le jugement que le roi avait prononcé et tous furent remplis de crainte à son égard, car ils comprirent qu’il avait reçu la sagesse de Dieu pour rendre la justice.
  '3':
  - type: text
    content: Salomon aimait l’Eternel et se conformait aux instructions de son père David. Seulement, lui aussi offrait des sacrifices et des parfums sur les hauts lieux.
  - type: heading
    content: L’Eternel donne la sagesse à Salomon
  - type: heading
    content: (2 Ch 1.2-13)
  '4':
  - type: text
    content: Un jour, le roi se rendit à Gabaon
  - type: note
    content: Gabaon où se trouvait la tente de la Rencontre construite au désert (1 Ch 16.39 ; 21.29 ; 2 Ch 1.2-6). Gabaon était à 10 kilomètres au nord-ouest de Jérusalem (Jos 9.3).
  - type: text
    content: ', où se trouvait alors le haut lieu le plus important, pour offrir un sacrifice. Il fit immoler mille holocaustes sur cet autel. '
  '5':
  - type: text
    content: 'Pendant la nuit, l’Eternel lui apparut là en songe et lui dit : Demande ce que tu désires que je t’accorde.'
  '6':
  - type: text
    content: 'Salomon répondit : Tu as témoigné une grande bienveillance à ton serviteur David mon père, parce qu’il vivait fidèlement selon ta volonté, de façon juste et avec un cœur droit. Tu lui as conservé cette grande bienveillance et tu lui as accordé un fils qui siège aujourd’hui sur son trône. '
  '7':
  - type: text
    content: Maintenant, Eternel mon Dieu, c’est toi qui m’as fait régner, moi ton serviteur, à la place de mon père David, alors que je ne suis encore qu’un tout jeune homme
  - type: note
    content: Salomon devait avoir environ 20 ans au début de son règne, sa naissance se situant à peu près au milieu des 40 années de règne de David (2.11-12).
  - type: text
    content: ' et que je ne sais pas gouverner. '
  '8':
  - type: text
    content: 'Voilà ton serviteur au milieu de ton peuple que tu as toi-même choisi, un peuple nombreux qui ne peut être dénombré ni compté, tant il est nombreux. '
  '9':
  - type: text
    content: Veuille donc donner à ton serviteur l’intelligence nécessaire pour administrer la justice pour ton peuple, afin qu’il sache discerner entre le bien et le mal ! Sans cela, qui pourrait administrer la justice pour ton peuple qui est si nombreux ?
