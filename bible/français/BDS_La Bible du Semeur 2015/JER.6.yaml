document_id: JER.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fuyez, Benjaminites, ╵quittez Jérusalem !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sonnez du cor à Teqoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Teqoa
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à quelques kilomètres au sud de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elevez un signal ╵au-dessus de Beth-Hakkérem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car du nord arrive un malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une grande catastrophe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La belle et délicate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dame Sion, ╵je la réduis en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des bergers monteront vers elle, ╵suivis de leurs troupeaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils planteront tout autour d’elle ╵leur campement de tentes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chacun fera paître ╵ses bêtes sur son lot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Préparez-vous ╵pour le combat contre elle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Debout ! Donnons l’assaut ╵à l’heure de midi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hélas, malheur à nous ╵car, déjà, le jour baisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les ombres du soir s’allongent…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Debout, attaquons-la de nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: détruisons ses palais !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Abattez donc ses arbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dressez des terrassements ╵contre Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cité qui doit être punie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cité où règne la violence !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pareil au puits ╵qui fait couler son eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cette cité ╵fait couler sa méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On n’entend, dans ses rues, ╵que violence et que ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’y vois constamment
- type: usfm
  marker: q1
  children:
  - type: text
    text: que souffrance et blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Laisse-toi avertir, ╵Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sinon mon cœur ╵s’éloignera de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te transformerai ╵en terre dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: inhabitée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grappille jusqu’au bout ╵comme une vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qui subsiste d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais repasser ta main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le vendangeur ╵sur les sarments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais à qui parlerai-je
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui avertirai-je ╵pour qu’enfin ils entendent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur oreille est incirconcise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont incapables ╵de prêter attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La parole de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: est devenue pour eux ╵un objet de mépris
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont ils ne veulent pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.51
        metadata:
          usfm: ACT.7.51
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais moi, je suis rempli ╵de la fureur de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne peux plus la contenir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déverse-la ╵sur l’enfant dans la rue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur les jeunes gens ╵rassemblés dans leurs cercles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le mari et la femme seront pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’ancien et le vieillard ╵qui est chargé de jours ╵seront pris eux aussi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Leurs maisons passeront à d’autres
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que leurs champs et leurs femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma main s’abattra ╵sur les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 12-15 se retrouvent en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8.10-12
        metadata:
          usfm: JER.8.10+JER.8.11+JER.8.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car tous, petits ou grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont avides de gains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous, du prophète au prêtre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pratiquent la duplicité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils guérissent superficiellement
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon peuple du désastre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en disant : « Tout va bien ! ╵Tout va vraiment très bien ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que rien ne va
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 13.10
        metadata:
          usfm: EZK.13.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sont-ils honteux ╵d’avoir commis ╵des abominations ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont aucune honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne savent pas rougir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est pourquoi ils tomberont ╵avec ceux qui succombent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils s’écrouleront ╵au moment où je leur ferai ╵rendre des comptes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que dit l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tenez-vous sur les routes, regardez ! ╵Informez-vous ╵des sentiers d’autrefois :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Quel est le bon chemin ? » ╵Et puis, suivez-le donc
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous y trouverez ╵du repos pour vous-mêmes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais ils ont répondu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous n’y marcherons pas ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors j’ai établi ╵des sentinelles parmi vous ╵qui vous ont dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Prêtez donc attention ╵au son du cor ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais ils ont répondu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous n’écouterons pas » !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C’est pourquoi écoutez, ╵vous, peuples étrangers !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observez en témoins
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: observe, assemblée, ce qui…
    marker-yv: yv-n
  - type: text
    text: ' se passera chez eux !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Prête attention, ô terre :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais faire venir ╵sur ce peuple, un malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fruit de ses stratagèmes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils n’ont pas voulu ╵écouter mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont rejeté ma Loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Qu’ai-je à faire de l’encens ╵importé de Saba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Saba
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'royaume du sud-ouest de l’Arabie, centre du commerce des épices (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 60.6
        metadata:
          usfm: ISA.60.6
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du roseau aromatique ╵venant d’un pays éloigné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement l’Inde d’où l’on importait ce roseau aromatique.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’agrée pas vos holocaustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n’apprécie pas vos sacrifices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aussi, l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais dresser ╵sur le chemin du peuple ╵une série d’obstacles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils feront tomber ╵les pères et les fils ensemble ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: voisins et compagnons ╵y périront.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Mauvaise nouvelle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici ce que déclare l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Un peuple va venir de la contrée du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une grande nation ╵qui se met en campagne ╵des confins de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 22-24 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50.41-43
        metadata:
          usfm: JER.50.41+JER.50.42+JER.50.43
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils empoignent l’arc et la lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont cruels et sans pitié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils mugissent ╵comme la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont montés sur des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rangés en ordre de bataille ╵tout comme des soldats
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour te combattre, ╵toi, communauté de Sion ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En entendant cette nouvelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos bras ont défailli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’angoisse nous a étreints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des douleurs nous ont saisis ╵comme pour une femme en couches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ne sortez pas aux champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’allez pas sur les routes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car l’ennemi s’y tient, ╵le glaive dans la main :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes parts, c’est la terreur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 20.3, 10 ; 46.5 ; 49.29.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: O communauté de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: revêts ton habit de toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: roule-toi dans la cendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prends le deuil ╵comme pour un enfant unique !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répands-toi en lamentations amères
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le dévastateur ╵fondra soudain sur nous !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Voici, je t’ai placé ╵comme celui qui teste les métaux ╵au milieu de mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu examines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu éprouves leur conduite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ce sont tous des rebelles ╵qui refusent d’entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vont, semant la calomnie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont endurcis comme bronze et fer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce sont tous des destructeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Le soufflet souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le plomb est dévoré par le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est en vain qu’on insiste ╵pour faire fondre les métaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les scories ╵ne se détachent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils seront appelés : ╵« de l’argent de rebut »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que l’Eternel ╵les a mis au rebut.
