document_id: JER.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’invasion
  - type: text
    content: Fuyez, Benjaminites, ╵quittez Jérusalem !
  - type: text
    content: Sonnez du cor à Teqoa
  - type: note
    content: 'Teqoa: à quelques kilomètres au sud de Jérusalem.'
  - type: text
    content: '  !'
  - type: text
    content: Elevez un signal ╵au-dessus de Beth-Hakkérem.
  - type: text
    content: Car du nord arrive un malheur
  - type: text
    content: et une grande catastrophe.
  '10':
  - type: text
    content: Mais à qui parlerai-je
  - type: text
    content: et qui avertirai-je ╵pour qu’enfin ils entendent ?
  - type: text
    content: Leur oreille est incirconcise,
  - type: text
    content: et ils sont incapables ╵de prêter attention.
  - type: text
    content: La parole de l’Eternel
  - type: text
    content: est devenue pour eux ╵un objet de mépris
  - type: text
    content: dont ils ne veulent pas
  - type: note
    content: Voir Ac 7.51.
  - type: text
    content: .
  '11':
  - type: text
    content: Mais moi, je suis rempli ╵de la fureur de Dieu,
  - type: text
    content: je ne peux plus la contenir.
  - type: text
    content: Déverse-la ╵sur l’enfant dans la rue
  - type: text
    content: et sur les jeunes gens ╵rassemblés dans leurs cercles.
  - type: text
    content: Le mari et la femme seront pris,
  - type: text
    content: l’ancien et le vieillard ╵qui est chargé de jours ╵seront pris eux aussi.
  '12':
  - type: text
    content: Leurs maisons passeront à d’autres
  - type: text
    content: ainsi que leurs champs et leurs femmes,
  - type: text
    content: car ma main s’abattra ╵sur les habitants du pays,
  - type: text
    content: l’Eternel le déclare
  - type: note
    content: Les v. 12-15 se retrouvent en 8.10-12.
  - type: text
    content: .
  '13':
  - type: text
    content: Car tous, petits ou grands,
  - type: text
    content: sont avides de gains.
  - type: text
    content: Tous, du prophète au prêtre,
  - type: text
    content: pratiquent la duplicité.
  '14':
  - type: text
    content: Ils guérissent superficiellement
  - type: text
    content: mon peuple du désastre
  - type: text
    content: 'en disant : « Tout va bien ! ╵Tout va vraiment très bien ! »'
  - type: text
    content: alors que rien ne va
  - type: note
    content: Voir Ez 13.10.
  - type: text
    content: .
  '15':
  - type: text
    content: Sont-ils honteux ╵d’avoir commis ╵des abominations ?
  - type: text
    content: Ils n’ont aucune honte
  - type: text
    content: et ils ne savent pas rougir,
  - type: text
    content: et c’est pourquoi ils tomberont ╵avec ceux qui succombent,
  - type: text
    content: et ils s’écrouleront ╵au moment où je leur ferai ╵rendre des comptes,
  - type: text
    content: l’Eternel le déclare.
  '16':
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: 'Tenez-vous sur les routes, regardez ! ╵Informez-vous ╵des sentiers d’autrefois :'
  - type: text
    content: « Quel est le bon chemin ? » ╵Et puis, suivez-le donc
  - type: text
    content: et vous y trouverez ╵du repos pour vous-mêmes.
  - type: text
    content: 'Mais ils ont répondu :'
  - type: text
    content: « Nous n’y marcherons pas ! »
  '17':
  - type: text
    content: 'Alors j’ai établi ╵des sentinelles parmi vous ╵qui vous ont dit :'
  - type: text
    content: « Prêtez donc attention ╵au son du cor ! »
  - type: text
    content: 'Mais ils ont répondu :'
  - type: text
    content: « Nous n’écouterons pas » !
  '18':
  - type: text
    content: C’est pourquoi écoutez, ╵vous, peuples étrangers !
  - type: text
    content: Observez en témoins
  - type: text
    content: ce qui
  - type: note
    content: 'Autre traduction : observe, assemblée, ce qui…'
  - type: text
    content: ' se passera chez eux !'
  '19':
  - type: text
    content: 'Prête attention, ô terre :'
  - type: text
    content: je vais faire venir ╵sur ce peuple, un malheur,
  - type: text
    content: fruit de ses stratagèmes.
  - type: text
    content: Car ils n’ont pas voulu ╵écouter mes paroles
  - type: text
    content: et ils ont rejeté ma Loi.
  '2':
  - type: text
    content: La belle et délicate,
  - type: text
    content: Dame Sion, ╵je la réduis en ruine.
  '20':
  - type: text
    content: Qu’ai-je à faire de l’encens ╵importé de Saba
  - type: note
    content: 'Saba: royaume du sud-ouest de l’Arabie, centre du commerce des épices (voir Es 60.6).'
  - type: text
    content: et du roseau aromatique ╵venant d’un pays éloigné
  - type: note
    content: Probablement l’Inde d’où l’on importait ce roseau aromatique.
  - type: text
    content: '  ?'
  - type: text
    content: Je n’agrée pas vos holocaustes,
  - type: text
    content: et je n’apprécie pas vos sacrifices.
  '21':
  - type: text
    content: Aussi, l’Eternel le déclare,
  - type: text
    content: je vais dresser ╵sur le chemin du peuple ╵une série d’obstacles,
  - type: text
    content: et ils feront tomber ╵les pères et les fils ensemble ;
  - type: text
    content: voisins et compagnons ╵y périront.
  - type: heading
    content: Mauvaise nouvelle
  '22':
  - type: text
    content: 'Voici ce que déclare l’Eternel :'
  - type: text
    content: « Un peuple va venir de la contrée du nord,
  - type: text
    content: une grande nation ╵qui se met en campagne ╵des confins de la terre
  - type: note
    content: Les v. 22-24 ont leur parallèle en 50.41-43.
  - type: text
    content: .
  '23':
  - type: text
    content: Ils empoignent l’arc et la lance,
  - type: text
    content: ils sont cruels et sans pitié,
  - type: text
    content: et ils mugissent ╵comme la mer.
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: rangés en ordre de bataille ╵tout comme des soldats
  - type: text
    content: pour te combattre, ╵toi, communauté de Sion ! »
  '24':
  - type: text
    content: En entendant cette nouvelle,
  - type: text
    content: nos bras ont défailli,
  - type: text
    content: et l’angoisse nous a étreints,
  - type: text
    content: et des douleurs nous ont saisis ╵comme pour une femme en couches.
  '25':
  - type: text
    content: Ne sortez pas aux champs,
  - type: text
    content: n’allez pas sur les routes,
  - type: text
    content: 'car l’ennemi s’y tient, ╵le glaive dans la main :'
  - type: text
    content: de toutes parts, c’est la terreur
  - type: note
    content: Voir 20.3, 10 ; 46.5 ; 49.29.
  - type: text
    content: .
  '26':
  - type: text
    content: O communauté de mon peuple,
  - type: text
    content: revêts ton habit de toile de sac,
  - type: text
    content: roule-toi dans la cendre
  - type: text
    content: et prends le deuil ╵comme pour un enfant unique !
  - type: text
    content: Répands-toi en lamentations amères
  - type: text
    content: car le dévastateur ╵fondra soudain sur nous !
  '27':
  - type: text
    content: Voici, je t’ai placé ╵comme celui qui teste les métaux ╵au milieu de mon peuple
  - type: text
    content: pour que tu examines,
  - type: text
    content: que tu éprouves leur conduite.
  '28':
  - type: text
    content: Ce sont tous des rebelles ╵qui refusent d’entendre,
  - type: text
    content: qui vont, semant la calomnie.
  - type: text
    content: Ils sont endurcis comme bronze et fer.
  - type: text
    content: Et ce sont tous des destructeurs.
  '29':
  - type: text
    content: Le soufflet souffle,
  - type: text
    content: et le plomb est dévoré par le feu,
  - type: text
    content: c’est en vain qu’on insiste ╵pour faire fondre les métaux,
  - type: text
    content: car les scories ╵ne se détachent pas.
  '3':
  - type: text
    content: Des bergers monteront vers elle, ╵suivis de leurs troupeaux.
  - type: text
    content: Ils planteront tout autour d’elle ╵leur campement de tentes
  - type: text
    content: et chacun fera paître ╵ses bêtes sur son lot.
  '30':
  - type: text
    content: 'Ils seront appelés : ╵« de l’argent de rebut »,'
  - type: text
    content: parce que l’Eternel ╵les a mis au rebut.
  '4':
  - type: text
    content: Préparez-vous ╵pour le combat contre elle !
  - type: text
    content: Debout ! Donnons l’assaut ╵à l’heure de midi !
  - type: text
    content: Hélas, malheur à nous ╵car, déjà, le jour baisse,
  - type: text
    content: et les ombres du soir s’allongent…
  '5':
  - type: text
    content: Debout, attaquons-la de nuit,
  - type: text
    content: détruisons ses palais !
  '6':
  - type: text
    content: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes :'
  - type: text
    content: Abattez donc ses arbres
  - type: text
    content: et dressez des terrassements ╵contre Jérusalem,
  - type: text
    content: cité qui doit être punie,
  - type: text
    content: cité où règne la violence !
  '7':
  - type: text
    content: Pareil au puits ╵qui fait couler son eau,
  - type: text
    content: cette cité ╵fait couler sa méchanceté.
  - type: text
    content: On n’entend, dans ses rues, ╵que violence et que ruine,
  - type: text
    content: je n’y vois constamment
  - type: text
    content: que souffrance et blessures.
  '8':
  - type: text
    content: Laisse-toi avertir, ╵Jérusalem,
  - type: text
    content: sinon mon cœur ╵s’éloignera de toi,
  - type: text
    content: je te transformerai ╵en terre dévastée,
  - type: text
    content: inhabitée.
  '9':
  - type: text
    content: 'Voici ce que déclare l’Eternel, ╵le Seigneur des armées célestes :'
  - type: text
    content: Grappille jusqu’au bout ╵comme une vigne
  - type: text
    content: ce qui subsiste d’Israël.
  - type: text
    content: Fais repasser ta main,
  - type: text
    content: comme le vendangeur ╵sur les sarments.
