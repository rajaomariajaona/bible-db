document_id: JOB.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier discours d’Éliphaz
  - type: heading
    content: Personne n’est innocent
  - type: text
    content: 'Alors Eliphaz de Témân prit la parole et dit :'
  '10':
  - type: text
    content: Le lion a beau rugir ╵et le fauve gronder,
  - type: text
    content: ils sont brisés, les crocs des lionceaux.
  '11':
  - type: text
    content: Le lion périt faute de proie,
  - type: text
    content: les petits de la lionne ╵sont dispersés.
  '12':
  - type: text
    content: Un oracle furtif ╵s’est glissé jusqu’à moi,
  - type: text
    content: 'et mon oreille en a saisi ╵le murmure léger :'
  '13':
  - type: text
    content: pendant les visions de la nuit, ╵au milieu d’un flot de pensées,
  - type: text
    content: à l’heure où un profond sommeil ╵s’empare des humains,
  '14':
  - type: text
    content: un frisson d’épouvante ╵a parcouru mon corps,
  - type: text
    content: tous mes os en tremblèrent.
  '15':
  - type: text
    content: Un esprit effleura ma face,
  - type: text
    content: hérissant les poils sur ma peau.
  '16':
  - type: text
    content: Il se tenait debout. ╵Je ne pus reconnaître ╵à quoi il ressemblait,
  - type: text
    content: mais cette apparition ╵resta devant mes yeux.
  - type: text
    content: 'J’entendis une voix ╵qui murmurait tout doucement :'
  '17':
  - type: text
    content: « Un humain serait-il ╵plus juste que son Créateur ?
  - type: text
    content: Un homme peut-il être ╵plus pur que Dieu ?
  '18':
  - type: text
    content: Si, en ses propres serviteurs ╵Dieu ne peut se fier,
  - type: text
    content: et si même en ses anges ╵il trouve des défauts,
  '19':
  - type: text
    content: à plus forte raison ╵il ne peut se fier ╵aux pauvres créatures ╵habitant dans des corps d’argile,
  - type: text
    content: qui ne sont que poussière
  - type: note
    content: 'Autre traduction : aux pauvres habitants des cabanes d’argile qui ont leurs fondations dans la poussière.'
  - type: text
    content: et qu’on peut écraser ╵comme des vermisseaux.
  '2':
  - type: text
    content: Peut-on risquer un mot ? ╵Tu es si abattu
  - type: note
    content: 'Autres traductions : si l’on risque un mot, le supporteras-tu ? ou : Dieu te met à l’épreuve, et tu es abattu ?'
  - type: text
    content: '  !'
  - type: text
    content: Mais qui peut garder le silence ?
  '20':
  - type: text
    content: Entre le matin et le soir, ╵ils sont réduits en poudre.
  - type: text
    content: Sans qu’on y prenne garde, ╵les voilà qui périssent.
  '21':
  - type: text
    content: Les cordes qui tenaient leur tente ╵sont soudain arrachées,
  - type: text
    content: et c’est ainsi qu’ils meurent ╵sans avoir acquis la sagesse. »
  '3':
  - type: text
    content: Tu as instruit beaucoup de gens
  - type: text
    content: et tu as fortifié ╵ceux qui baissaient les bras.
  '4':
  - type: text
    content: Tes propos relevaient ╵celui qui trébuchait,
  - type: text
    content: et tu raffermissais ╵ceux dont les genoux fléchissaient.
  '5':
  - type: text
    content: Maintenant qu’il s’agit de toi, ╵tu es découragé !
  - type: text
    content: Maintenant que cela te touche, ╵te voilà tout désemparé !
  '6':
  - type: text
    content: La crainte que tu as de Dieu n’est-elle pas ╵la source de ton assurance ?
  - type: text
    content: Et ton intégrité ╵n’est-elle pas ton espérance ?
  '7':
  - type: text
    content: 'Cherche dans ta mémoire : ╵quel est donc l’innocent ╵qui jamais a péri ?'
  - type: text
    content: Où sont les hommes droits ╵qui ont été anéantis ?
  '8':
  - type: text
    content: D’après ce que j’ai vu, ╵les artisans d’iniquité
  - type: text
    content: 'et ceux qui sèment le malheur ╵en moissonnent les fruits :'
  '9':
  - type: text
    content: sous le souffle de Dieu, ╵les voilà qui périssent,
  - type: text
    content: dans son courroux, il les consume.
