document_id: JOB.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premier discours d’Éliphaz
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personne n’est innocent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Eliphaz de Témân prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Peut-on risquer un mot ? ╵Tu es si abattu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si l’on risque un mot, le supporteras-tu ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu te met à l’épreuve, et tu es abattu ?
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui peut garder le silence ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu as instruit beaucoup de gens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as fortifié ╵ceux qui baissaient les bras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tes propos relevaient ╵celui qui trébuchait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu raffermissais ╵ceux dont les genoux fléchissaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maintenant qu’il s’agit de toi, ╵tu es découragé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant que cela te touche, ╵te voilà tout désemparé !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La crainte que tu as de Dieu n’est-elle pas ╵la source de ton assurance ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton intégrité ╵n’est-elle pas ton espérance ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cherche dans ta mémoire : ╵quel est donc l’innocent ╵qui jamais a péri ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où sont les hommes droits ╵qui ont été anéantis ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: D’après ce que j’ai vu, ╵les artisans d’iniquité
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ceux qui sèment le malheur ╵en moissonnent les fruits :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: sous le souffle de Dieu, ╵les voilà qui périssent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans son courroux, il les consume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le lion a beau rugir ╵et le fauve gronder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont brisés, les crocs des lionceaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lion périt faute de proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les petits de la lionne ╵sont dispersés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un oracle furtif ╵s’est glissé jusqu’à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et mon oreille en a saisi ╵le murmure léger :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: pendant les visions de la nuit, ╵au milieu d’un flot de pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’heure où un profond sommeil ╵s’empare des humains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: un frisson d’épouvante ╵a parcouru mon corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous mes os en tremblèrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un esprit effleura ma face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hérissant les poils sur ma peau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il se tenait debout. ╵Je ne pus reconnaître ╵à quoi il ressemblait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais cette apparition ╵resta devant mes yeux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’entendis une voix ╵qui murmurait tout doucement :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: « Un humain serait-il ╵plus juste que son Créateur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un homme peut-il être ╵plus pur que Dieu ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si, en ses propres serviteurs ╵Dieu ne peut se fier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si même en ses anges ╵il trouve des défauts,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: à plus forte raison ╵il ne peut se fier ╵aux pauvres créatures ╵habitant dans des corps d’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne sont que poussière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux pauvres habitants des cabanes d’argile qui ont leurs fondations dans la poussière.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on peut écraser ╵comme des vermisseaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Entre le matin et le soir, ╵ils sont réduits en poudre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans qu’on y prenne garde, ╵les voilà qui périssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les cordes qui tenaient leur tente ╵sont soudain arrachées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est ainsi qu’ils meurent ╵sans avoir acquis la sagesse. »
