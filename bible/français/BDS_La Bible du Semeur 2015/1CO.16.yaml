document_id: 1CO.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Questions diverses
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La collecte en faveur de l’Eglise de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Venons-en à la question
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ' de la collecte en faveur de ceux qui, en Judée, font partie du peuple saint : j’ai déjà donné mes directives aux Eglises de la Galatie. Suivez-les, vous aussi.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Si Timothée arrive, veillez à ce qu’il se sente à l’aise parmi vous, car il travaille à l’œuvre du Seigneur, tout comme moi.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Que personne ne le méprise donc. A son départ, fournissez-lui les moyens de revenir dans la paix auprès de moi, car je l’attends, lui et les frères qui l’accompagnent.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quant à notre frère Apollos, je l’ai encouragé à plusieurs reprises à se joindre aux frères qui retournent chez vous, mais il n’a pas du tout l’intention d’entreprendre ce voyage maintenant. Il ira certainement dès qu’il en trouvera l’occasion.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandations finales
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Soyez vigilants, demeurez fermes dans la foi, faites preuve de courage, soyez forts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Que l’amour inspire toutes vos actions.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Encore une recommandation, frères et sœurs : vous connaissez Stéphanas et sa famille. Vous vous souvenez qu’ils ont été les premiers à se convertir au Seigneur dans toute l’Achaïe. Vous savez qu’ils se sont spontanément mis au service des membres du peuple saint. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Soumettez-vous, vous aussi, à de telles personnes et à ceux qui partagent leur travail et leurs efforts.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je suis heureux de la visite de Stéphanas, de Fortunatus et d’Achaïcus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute, ces trois chrétiens de Corinthe avaient-ils apporté à Paul la lettre des Corinthiens.
      marker-yv: yv-n
    - type: text
      text: '  : ils ont fait pour moi ce que votre éloignement vous a empêchés de faire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils m’ont réconforté, comme ils l’ont souvent fait pour vous. Sachez donc apprécier de tels hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les Eglises de la province d’Asie vous saluent. Aquilas et Prisca vous envoient leurs salutations au nom du Seigneur, ainsi que l’Eglise qui se réunit dans leur maison.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Que tous les dimanches chacun de vous mette de côté, chez lui, une somme d’argent selon ce qu’il aura lui-même gagné, pour qu’on n’ait pas besoin d’organiser des collectes au moment de mon arrivée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tous les frères et sœurs vous saluent. Saluez-vous les uns les autres en vous donnant le baiser fraternel.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est moi, Paul, qui écris cette salutation de ma propre main. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Si quelqu’un n’aime pas le Seigneur, qu’il soit maudit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n’a pas sa place parmi vous.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Marana tha
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Expression araméenne. On peut aussi comprendre : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Maran atha, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui veut dire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Seigneur vient.
      marker-yv: yv-n
    - type: text
      text: . (Notre Seigneur, viens !)
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Que la grâce du Seigneur Jésus soit avec vous !
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mon amour vous accompagne tous, dans l’union avec Jésus-Christ.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amen !
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand je serai venu, j’enverrai à Jérusalem, pour y porter vos dons, les hommes que vous aurez choisis, munis de lettres de recommandation. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: S’il vaut la peine que j’y aille moi-même, ils iront avec moi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les projets de Paul
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je compte venir chez vous après avoir traversé la Macédoine – car je vais passer par cette province. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Peut-être séjournerai-je quelque temps chez vous, ou même y passerai-je l’hiver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Alors que la mer était fermée à la navigation et qu’il ne pouvait pas se rendre en Israël. Paul a effectivement passé trois mois d’hiver à Corinthe (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 20.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  : ce sera pour vous l’occasion de m’aider à continuer mon voyage vers ma destination.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En effet, je ne veux pas me contenter de vous voir en passant. Je compte demeurer quelque temps avec vous, si le Seigneur le permet. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Pour le moment, je vais rester à Ephèse jusqu’à la Pentecôte, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: car j’y ai trouvé de grandes possibilités d’action – en même temps que beaucoup d’adversaires.
