document_id: GEN.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Abraham à Guérar
  - type: text
    content: Abraham quitta cette région pour aller dans le Néguev. Il s’installa entre Qadesh et Shour, puis il séjourna à Guérar
  - type: note
    content: Entre Gaza, sur la côte méditerranéenne, et Beer-Sheva, dans le nord du Néguev.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Puis il demanda à Abraham : Pour quelle raison as-tu agi de la sorte ?'
  '11':
  - type: text
    content: 'Abraham répondit : Je me suis dit : Certainement, on n’a aucune crainte de Dieu dans ce pays, et on me tuera à cause de ma femme. '
  '12':
  - type: text
    content: De plus, elle est réellement ma parente, puisqu’elle est fille de mon père, mais pas de ma mère
  - type: note
    content: Il s’agit peut-être du grand-père et de la grand-mère.
  - type: text
    content: '. Et elle est devenue ma femme. '
  '13':
  - type: text
    content: 'Quand Dieu m’a fait quitter la maison de mon père et aller de lieu en lieu, j’ai dit à ma femme : « Aie la bonté de dire, partout où nous irons, que je suis ton frère. »'
  '14':
  - type: text
    content: 'Alors Abimélek prit des moutons, des chèvres et des bovins, des serviteurs et des servantes et en fit cadeau à Abraham. Il lui rendit aussi Sara, sa femme. '
  '15':
  - type: text
    content: 'Puis il ajouta : Mon pays est à ta disposition ; établis-toi où bon te semblera.'
  '16':
  - type: text
    content: 'Puis, se tournant vers Sara, il dit : Vois, je donne mille pièces d’argent à ton frère. C’est là un gage de ton innocence pour tous ceux qui sont avec toi et cela te justifiera devant tous.'
  '17':
  - type: text
    content: 'Abraham pria Dieu, et Dieu guérit Abimélek ainsi que sa femme et ses servantes, et elles purent de nouveau avoir des enfants. '
  '18':
  - type: text
    content: Car l’Eternel avait frappé de stérilité toutes les femmes dans la maison d’Abimélek à cause de l’enlèvement de Sara, femme d’Abraham.
  '2':
  - type: text
    content: 'En parlant de sa femme Sara, il disait : « C’est ma sœur ! » de sorte qu’Abimélek, le roi de Guérar, la fit enlever. '
  '3':
  - type: text
    content: 'Mais Dieu visita Abimélek de nuit en songe et lui dit : Tu vas mourir, à cause de cette femme que tu as enlevée, car elle est mariée.'
  '4':
  - type: text
    content: 'Or Abimélek ne s’était pas approché d’elle. Il s’écria : Mon Seigneur, ferais-tu mourir des innocents ? '
  '5':
  - type: text
    content: 'Son mari ne m’a-t-il pas dit : « C’est ma sœur » ? D’ailleurs, elle-même me l’a confirmé en affirmant : « C’est mon frère. » C’est en toute bonne conscience et avec innocence que j’ai agi.'
  '6':
  - type: text
    content: 'Dieu lui répondit en songe : Je sais, moi aussi, que tu as agi en toute bonne conscience. C’est pourquoi je t’ai empêché de commettre un péché contre moi et je ne t’ai pas laissé la toucher. '
  '7':
  - type: text
    content: Maintenant, renvoie cette femme à son mari, car c’est un prophète
  - type: note
    content: C’est-à-dire porte-parole de Dieu. Abraham est le premier à porter ce titre, semble-t-il en tant qu’intercesseur.
  - type: text
    content: . Il priera pour toi et tu resteras en vie. Mais si tu ne la lui rends pas, sache que tu mourras, toi et tous les tiens.
  '8':
  - type: text
    content: 'De bon matin, Abimélek convoqua tous ses familiers et leur raconta tout ce qui lui était arrivé. Ces gens en furent extrêmement troublés. '
  '9':
  - type: text
    content: 'Puis Abimélek fit venir Abraham et lui dit : Pourquoi nous as-tu fait cela ? Quel mal t’ai-je fait pour que tu nous aies exposés, moi et mon royaume, à commettre un si grand péché ? Tu as fait envers moi des choses qui ne se font pas. '
