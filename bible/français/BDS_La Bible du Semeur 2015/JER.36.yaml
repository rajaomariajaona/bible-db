document_id: JER.36
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les souffrances de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La destruction du rouleau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La quatrième année du règne de Yehoyaqim, fils de Josias, roi de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 605 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel adressa ce message à Jérémie : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Prends un rouleau de parchemin. Tu y inscriras toutes les paroles que je t’ai dites au sujet d’Israël, de Juda et de tous les autres peuples, depuis le jour où j’ai commencé à te parler sous le règne de Josias, et jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lorsque les gens de Juda entendront tous les maux que j’ai décidé de leur infliger, peut-être chacun d’eux abandonnera-t-il sa conduite mauvaise, et alors je pardonnerai leurs fautes et leurs péchés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors Jérémie fit appel à Baruch
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32.12'
        metadata:
          usfm: JER.32.12
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', fils de Nériya, et Baruch écrivit, sous la dictée de Jérémie, sur un rouleau de parchemin, tout ce que l’Eternel lui avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis Jérémie donna les instructions suivantes à Baruch : Je suis retenu et je me trouve dans l’impossibilité de me rendre au Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Va donc toi-même au temple de l’Eternel, un jour de jeûne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 9 et note.
    marker-yv: yv-n
  - type: text
    text: ', et lis, dans ce rouleau que tu as écrit sous ma dictée, les paroles de l’Eternel pour les faire entendre à tout le peuple ainsi qu’à tous les gens de Juda qui seront venus de leurs différentes villes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Peut-être se mettront-ils alors à supplier l’Eternel et chacun d’eux abandonnera-t-il sa conduite mauvaise, puisque l’Eternel a menacé ce peuple avec une grande colère et une forte indignation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Baruch, fils de Nériya, fit tout ce que le prophète Jérémie lui avait ordonné. Il lut au temple de l’Eternel les paroles de l’Eternel consignées dans le livre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Cela se passait la cinquième année du règne de Yehoyaqim, fils de Josias, roi de Juda, au neuvième mois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en novembre-décembre 604 (on comptait les mois à partir du printemps), à la saison froide (v. 22).
    marker-yv: yv-n
  - type: text
    text: '  : on avait publié un jeûne'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peut-être suite à l’invasion babylonienne de 605 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 1.1
        metadata:
          usfm: DAN.1.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' devant l’Eternel pour tout le peuple de Jérusalem et pour tous les gens des villes de Juda qui venaient à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Baruch lut dans le rouleau les paroles de Jérémie, dans le temple de l’Eternel, dans la salle de Guemaria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guemaria
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26.24'
        metadata:
          usfm: JER.26.24
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', fils de Shaphân, le secrétaire, dans le parvis supérieur, à l’entrée de la porte Neuve du Temple. Tout le peuple pouvait l’entendre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Michée, le fils de Guemaria, fils de Shaphân, entendit toutes les paroles de l’Eternel contenues dans le livre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il se rendit au palais royal, entra dans le bureau du secrétaire où tous les ministres étaient en séance. Il y avait là Elishama, le secrétaire, Delaya, fils de Shemaya, Elnathan, fils d’Akbor, Guemaria, fils de Shaphân, Sédécias, fils de Hanania et tous les autres ministres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Michée leur rapporta toutes les paroles qu’il avait entendues de Baruch lorsque celui-ci avait lu au peuple ce qui était écrit dans le rouleau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors tous les ministres envoyèrent Yehoudi, fils de Netania, fils de Shélémia, fils de Koushi, à Baruch pour lui dire : Prends avec toi le rouleau que tu as lu au peuple, et viens ici.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Baruch, fils de Nériya, prit le rouleau et se rendit auprès d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils lui dirent : Assieds-toi, s’il te plaît, et lis-nous cet écrit.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Baruch leur en fit donc lecture. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsqu’ils entendirent toutes ces paroles, ils se regardèrent l’un l’autre avec effroi et ils dirent à Baruch : Il faut absolument que nous rapportions toutes ces paroles au roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis ils interrogèrent Baruch : Dis-nous donc comment tu as écrit toutes ces paroles. Etait-ce sous la dictée de Jérémie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sous la dictée de Jérémie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ne figurent pas dans l’ancienne version grecque.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Baruch leur répondit : Il m’a dicté personnellement toutes ces paroles et moi je les ai transcrites avec de l’encre sur ce rouleau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors les ministres dirent à Baruch : Va te cacher quelque part, de même que Jérémie. Que personne ne sache où vous êtes !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis ils se rendirent auprès du roi dans la cour de son palais, en laissant le rouleau dans le bureau du secrétaire Elishama, et ils informèrent le roi de tout ce qui s’était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui-ci envoya Yehoudi chercher le rouleau. Quand Yehoudi l’eut pris dans le bureau du secrétaire Elishama, il le lut au roi et à tous les ministres qui se tenaient debout autour de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cela se passait au neuvième mois ; le roi se trouvait dans son palais d’hiver et un brasero brûlait devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Chaque fois que Yehoudi avait lu trois ou quatre colonnes du rouleau, le roi les coupait avec le canif du secrétaire et les jetait au feu dans le brasero, jusqu’à ce que tout le rouleau soit passé au feu dans le brasero.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais ni le roi ni aucun de ses hauts fonctionnaires qui entendaient toutes ces paroles, ne furent alarmés, et aucun d’eux ne déchira ses vêtements en signe de consternation. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pourtant Elnathan, Delaya et Guemaria avaient prié le roi avec insistance de ne pas brûler le rouleau, mais il ne les avait pas écoutés. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Au contraire, le roi ordonna à Yerahméel, prince de sang
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'officier royal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'haut fonctionnaire du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir de même en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38.6'
        metadata:
          usfm: JER.38.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', à Seraya, fils d’Azriel, et à Shélémia, fils d’Abdéel, d’arrêter Baruch le secrétaire et le prophète Jérémie ; mais l’Eternel les tint cachés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Après que le roi eut brûlé le rouleau contenant les paroles que Baruch avait écrites sous la dictée de Jérémie, l’Eternel adressa la parole à Jérémie en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Prends un autre rouleau sur lequel tu écriras toutes les paroles qui figuraient sur le premier rouleau que Yehoyaqim, roi de Juda a brûlé. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu diras à Yehoyaqim, roi de Juda : Voici ce que déclare l’Eternel : Tu as brûlé ce rouleau en demandant : « Pourquoi y as-tu écrit que le roi de Babylone viendra détruire ce pays et en faire disparaître hommes et bêtes ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C’est pourquoi voici ce que l’Eternel déclare au sujet de Yehoyaqim, roi de Juda : Aucun de ses descendants ne lui succédera sur le trône de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Son fils Yehoyakîn ne régna que trois mois (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24.8
        metadata:
          usfm: 2KI.24.8
      - type: text
        text: ), puis il fut déporté à Babylone (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 24.15
        metadata:
          usfm: 2KI.24.15
      - type: text
        text: ') où il mourut probablement (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52.33-34
        metadata:
          usfm: JER.52.33+JER.52.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. Son cadavre sera jeté dehors et exposé à la chaleur du jour et au froid de la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Je le punirai, lui, ses descendants et tous ses hauts fonctionnaires pour leurs crimes, et je ferai venir sur eux, sur les habitants de Jérusalem et sur les gens de Juda, tous les malheurs que je leur ai annoncés et dont ils ont refusé d’entendre parler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Alors Jérémie prit un autre rouleau et le donna au secrétaire Baruch, fils de Nériya. Celui-ci y écrivit, sous la dictée de Jérémie, toutes les paroles contenues dans le rouleau que Yehoyaqim, roi de Juda, avait brûlé. Il y ajouta encore beaucoup d’autres paroles semblables.
