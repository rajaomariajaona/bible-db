document_id: JER.36,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les souffrances de Jérémie
  - type: heading
    content: La destruction du rouleau
  - type: text
    content: La quatrième année du règne de Yehoyaqim, fils de Josias, roi de Juda
  - type: note
    content: 605 av. J.-C.
  - type: text
    content: ', l’Eternel adressa ce message à Jérémie : '
  '10':
  - type: text
    content: Baruch lut dans le rouleau les paroles de Jérémie, dans le temple de l’Eternel, dans la salle de Guemaria
  - type: note
    content: 'Guemaria: voir 26.24 et note.'
  - type: text
    content: ', fils de Shaphân, le secrétaire, dans le parvis supérieur, à l’entrée de la porte Neuve du Temple. Tout le peuple pouvait l’entendre.'
  '11':
  - type: text
    content: 'Michée, le fils de Guemaria, fils de Shaphân, entendit toutes les paroles de l’Eternel contenues dans le livre. '
  '12':
  - type: text
    content: 'Il se rendit au palais royal, entra dans le bureau du secrétaire où tous les ministres étaient en séance. Il y avait là Elishama, le secrétaire, Delaya, fils de Shemaya, Elnathan, fils d’Akbor, Guemaria, fils de Shaphân, Sédécias, fils de Hanania et tous les autres ministres. '
  '13':
  - type: text
    content: Michée leur rapporta toutes les paroles qu’il avait entendues de Baruch lorsque celui-ci avait lu au peuple ce qui était écrit dans le rouleau.
  '14':
  - type: text
    content: 'Alors tous les ministres envoyèrent Yehoudi, fils de Netania, fils de Shélémia, fils de Koushi, à Baruch pour lui dire : Prends avec toi le rouleau que tu as lu au peuple, et viens ici.'
  - type: text
    content: 'Baruch, fils de Nériya, prit le rouleau et se rendit auprès d’eux. '
  '15':
  - type: text
    content: 'Ils lui dirent : Assieds-toi, s’il te plaît, et lis-nous cet écrit.'
  - type: text
    content: 'Baruch leur en fit donc lecture. '
  '16':
  - type: text
    content: 'Lorsqu’ils entendirent toutes ces paroles, ils se regardèrent l’un l’autre avec effroi et ils dirent à Baruch : Il faut absolument que nous rapportions toutes ces paroles au roi.'
  '17':
  - type: text
    content: 'Puis ils interrogèrent Baruch : Dis-nous donc comment tu as écrit toutes ces paroles. Etait-ce sous la dictée de Jérémie'
  - type: note
    content: 'Les mots : sous la dictée de Jérémie ne figurent pas dans l’ancienne version grecque.'
  - type: text
    content: '  ?'
  '18':
  - type: text
    content: 'Baruch leur répondit : Il m’a dicté personnellement toutes ces paroles et moi je les ai transcrites avec de l’encre sur ce rouleau.'
  '19':
  - type: text
    content: 'Alors les ministres dirent à Baruch : Va te cacher quelque part, de même que Jérémie. Que personne ne sache où vous êtes !'
  '2':
  - type: text
    content: 'Prends un rouleau de parchemin. Tu y inscriras toutes les paroles que je t’ai dites au sujet d’Israël, de Juda et de tous les autres peuples, depuis le jour où j’ai commencé à te parler sous le règne de Josias, et jusqu’à ce jour. '
  '20':
  - type: text
    content: 'Puis ils se rendirent auprès du roi dans la cour de son palais, en laissant le rouleau dans le bureau du secrétaire Elishama, et ils informèrent le roi de tout ce qui s’était passé. '
  '21':
  - type: text
    content: Celui-ci envoya Yehoudi chercher le rouleau. Quand Yehoudi l’eut pris dans le bureau du secrétaire Elishama, il le lut au roi et à tous les ministres qui se tenaient debout autour de lui.
  '22':
  - type: text
    content: 'Cela se passait au neuvième mois ; le roi se trouvait dans son palais d’hiver et un brasero brûlait devant lui. '
  '23':
  - type: text
    content: Chaque fois que Yehoudi avait lu trois ou quatre colonnes du rouleau, le roi les coupait avec le canif du secrétaire et les jetait au feu dans le brasero, jusqu’à ce que tout le rouleau soit passé au feu dans le brasero.
  '24':
  - type: text
    content: 'Mais ni le roi ni aucun de ses hauts fonctionnaires qui entendaient toutes ces paroles, ne furent alarmés, et aucun d’eux ne déchira ses vêtements en signe de consternation. '
  '25':
  - type: text
    content: 'Pourtant Elnathan, Delaya et Guemaria avaient prié le roi avec insistance de ne pas brûler le rouleau, mais il ne les avait pas écoutés. '
  '26':
  - type: text
    content: Au contraire, le roi ordonna à Yerahméel, prince de sang
  - type: note
    content: 'Autre traduction : officier royal ou haut fonctionnaire du roi (voir de même en 38.6).'
  - type: text
    content: ', à Seraya, fils d’Azriel, et à Shélémia, fils d’Abdéel, d’arrêter Baruch le secrétaire et le prophète Jérémie ; mais l’Eternel les tint cachés.'
  '27':
  - type: text
    content: 'Après que le roi eut brûlé le rouleau contenant les paroles que Baruch avait écrites sous la dictée de Jérémie, l’Eternel adressa la parole à Jérémie en ces termes : '
  '28':
  - type: text
    content: 'Prends un autre rouleau sur lequel tu écriras toutes les paroles qui figuraient sur le premier rouleau que Yehoyaqim, roi de Juda a brûlé. '
  '29':
  - type: text
    content: 'Tu diras à Yehoyaqim, roi de Juda : Voici ce que déclare l’Eternel : Tu as brûlé ce rouleau en demandant : « Pourquoi y as-tu écrit que le roi de Babylone viendra détruire ce pays et en faire disparaître hommes et bêtes ? »'
  '3':
  - type: text
    content: Lorsque les gens de Juda entendront tous les maux que j’ai décidé de leur infliger, peut-être chacun d’eux abandonnera-t-il sa conduite mauvaise, et alors je pardonnerai leurs fautes et leurs péchés.
  '30':
  - type: text
    content: 'C’est pourquoi voici ce que l’Eternel déclare au sujet de Yehoyaqim, roi de Juda : Aucun de ses descendants ne lui succédera sur le trône de David'
  - type: note
    content: Son fils Yehoyakîn ne régna que trois mois (2 R 24.8), puis il fut déporté à Babylone (2 R 24.15) où il mourut probablement (voir 52.33-34).
  - type: text
    content: '. Son cadavre sera jeté dehors et exposé à la chaleur du jour et au froid de la nuit. '
  '31':
  - type: text
    content: Je le punirai, lui, ses descendants et tous ses hauts fonctionnaires pour leurs crimes, et je ferai venir sur eux, sur les habitants de Jérusalem et sur les gens de Juda, tous les malheurs que je leur ai annoncés et dont ils ont refusé d’entendre parler.
  '32':
  - type: text
    content: Alors Jérémie prit un autre rouleau et le donna au secrétaire Baruch, fils de Nériya. Celui-ci y écrivit, sous la dictée de Jérémie, toutes les paroles contenues dans le rouleau que Yehoyaqim, roi de Juda, avait brûlé. Il y ajouta encore beaucoup d’autres paroles semblables.
  '4':
  - type: text
    content: Alors Jérémie fit appel à Baruch
  - type: note
    content: Voir 32.12 et note.
  - type: text
    content: ', fils de Nériya, et Baruch écrivit, sous la dictée de Jérémie, sur un rouleau de parchemin, tout ce que l’Eternel lui avait dit. '
  '5':
  - type: text
    content: 'Puis Jérémie donna les instructions suivantes à Baruch : Je suis retenu et je me trouve dans l’impossibilité de me rendre au Temple. '
  '6':
  - type: text
    content: Va donc toi-même au temple de l’Eternel, un jour de jeûne
  - type: note
    content: Voir v. 9 et note.
  - type: text
    content: ', et lis, dans ce rouleau que tu as écrit sous ma dictée, les paroles de l’Eternel pour les faire entendre à tout le peuple ainsi qu’à tous les gens de Juda qui seront venus de leurs différentes villes. '
  '7':
  - type: text
    content: Peut-être se mettront-ils alors à supplier l’Eternel et chacun d’eux abandonnera-t-il sa conduite mauvaise, puisque l’Eternel a menacé ce peuple avec une grande colère et une forte indignation.
  '8':
  - type: text
    content: 'Baruch, fils de Nériya, fit tout ce que le prophète Jérémie lui avait ordonné. Il lut au temple de l’Eternel les paroles de l’Eternel consignées dans le livre. '
  '9':
  - type: text
    content: Cela se passait la cinquième année du règne de Yehoyaqim, fils de Josias, roi de Juda, au neuvième mois
  - type: note
    content: C’est-à-dire en novembre-décembre 604 (on comptait les mois à partir du printemps), à la saison froide (v. 22).
  - type: text
    content: '  : on avait publié un jeûne'
  - type: note
    content: Peut-être suite à l’invasion babylonienne de 605 av. J.-C. (voir Dn 1.1 et note).
  - type: text
    content: ' devant l’Eternel pour tout le peuple de Jérusalem et pour tous les gens des villes de Juda qui venaient à Jérusalem.'
