document_id: DAN.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’inscription sur le mur
  - type: heading
    content: Un festin sacrilège
  - type: text
    content: Un jour, le roi Balthazar
  - type: note
    content: Les événements de ce chapitre ont lieu en 539 av. J.-C., 23 ans après la mort de Nabuchodonosor (en 562 av. J.-C.). Balthazar était le fils du dernier roi de Babylone, Nabonide. Il a exercé le pouvoir à la place de son père pendant les dix dernières années de son règne, alors que Nabonide s’était retiré à Téma, une oasis de la péninsule Arabique. Aux v. 2, 11, 18, Nabuchodonosor est appelé son père, ce qui pouvait désigner en araméen soit la succession au trône soit la descendance physique. Il semble, en fait, que Balthazar ait été le petit-fils de Nabuchodonosor par sa mère ou par sa grand-mère – la femme ou la mère de Nabonide (voir 5.10 et note ; Jr 27.7).
  - type: text
    content: ' organisa un banquet en l’honneur de ses mille dignitaires et se mit à boire du vin en leur présence. '
  '10':
  - type: text
    content: Quand la reine mère
  - type: note
    content: Selon certains, elle serait fille de Nabuchodonosor, mariée à Nabonide. Les reines mères avaient une grande influence dans les cours du Moyen-Orient.
  - type: text
    content: ' entendit ce que disaient le roi et ses hauts dignitaires, elle pénétra dans la salle du festin. Elle prit la parole et dit : Que le roi vive éternellement ! Ne te laisse pas terrifier par tes pensées et que ton visage ne pâlisse pas ainsi ! '
  '11':
  - type: text
    content: Il y a, dans ton royaume, un homme en qui réside l’esprit des dieux saints ; du temps de ton père
  - type: note
    content: Voir 5.1 et note.
  - type: text
    content: ', on trouva en lui une clairvoyance, une intelligence et une sagesse pareilles à la sagesse des dieux, aussi le roi Nabuchodonosor, ton père, l’a-t-il établi chef des mages, des magiciens, des astrologues et des devins. '
  '12':
  - type: text
    content: Car cet homme, Daniel, que le roi a nommé Beltshatsar, possède un esprit extraordinaire, de la connaissance et de l’intelligence pour interpréter les rêves, trouver la solution des énigmes et résoudre les problèmes difficiles. Que l’on appelle donc Daniel et il donnera l’interprétation.
  - type: heading
    content: Daniel explique l’énigme
  '13':
  - type: text
    content: 'Aussitôt, Daniel fut introduit en présence du roi. Celui-ci prit la parole et lui dit : Es-tu ce Daniel qui fait partie des exilés de Juda, que le roi, mon père, a amenés de Juda ? '
  '14':
  - type: text
    content: 'J’ai entendu dire que l’esprit des dieux réside en toi et que tu possèdes une clairvoyance, une intelligence et une sagesse extraordinaires. '
  '15':
  - type: text
    content: 'Or, on vient de m’amener les sages et les magiciens pour lire cette inscription et m’en faire connaître l’interprétation ; mais ils n’en ont pas été capables. '
  '16':
  - type: text
    content: On m’a dit que toi, tu peux donner des interprétations et résoudre les problèmes difficiles. Si donc tu es capable de lire cette inscription et de m’en faire connaître l’interprétation, tu seras revêtu de pourpre, tu porteras une chaîne d’or au cou et tu partageras le gouvernement du royaume avec deux autres hauts fonctionnaires
  - type: note
    content: Voir note v. 7.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Alors Daniel prit la parole et dit au roi : Garde tes présents et donne tes cadeaux à un autre ! Je vais cependant te déchiffrer l’inscription et t’en faire connaître l’interprétation. '
  '18':
  - type: text
    content: 'O roi, le Dieu très-haut avait donné à Nabuchodonosor, ton père, la royauté et la grandeur, la gloire et la majesté. '
  '19':
  - type: text
    content: 'Et à cause de la grandeur qu’il lui avait accordée, les gens de tous peuples, de toutes nations et de toutes langues tremblaient de peur devant lui. La vie et la mort de chacun dépendaient de son bon vouloir ; il élevait et abaissait qui il lui plaisait. '
  '2':
  - type: text
    content: Excité par le vin, Balthazar ordonna d’apporter les coupes d’or et d’argent que Nabuchodonosor, son père
  - type: note
    content: Voir v. 1 et note, 11, 18 ; Jr 27.7.
  - type: text
    content: ', avait rapportées du temple de Jérusalem'
  - type: note
    content: Voir 1.2 ; 2 R 25.14-15.
  - type: text
    content: . Il voulait s’en servir pour boire, lui et ses hauts dignitaires, ses femmes et ses concubines
  - type: note
    content: Le sens de ces deux mots est incertain. On a retrouvé le second dans les papyrus d’Eléphantine en Egypte, datant du ve  siècle av. J.-C., avec le sens de femmes de service.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Mais lorsque son cœur s’enorgueillit et qu’il s’endurcit jusqu’à l’arrogance, on lui fit quitter son trône royal et il fut dépouillé de sa gloire. '
  '21':
  - type: text
    content: Il fut chassé de la société des humains, sa raison devint semblable à celle des bêtes et il se mit à vivre en compagnie des ânes sauvages, on le nourrissait d’herbe comme les bœufs et son corps était trempé par la rosée du ciel. Cela dura jusqu’au jour où il reconnut que le Dieu très-haut est maître de toute royauté humaine et qu’il élève à la royauté qui il veut.
  '22':
  - type: text
    content: 'Et toi, son fils, Balthazar, tu savais tout cela, et cependant tu n’as pas adopté une attitude humble. '
  '23':
  - type: text
    content: Tu t’es élevé contre le Seigneur du ciel et tu t’es fait apporter les coupes de son temple, puis toi et tes hauts dignitaires, tes femmes et tes concubines
  - type: note
    content: Voir note v. 2.
  - type: text
    content: ', vous y avez bu du vin et tu as loué les dieux d’argent, d’or, de bronze, de fer, de bois et de pierre, des dieux qui ne voient rien, n’entendent rien et ne savent rien. Mais le Dieu qui tient ton souffle de vie dans sa main et de qui dépend toute ta destinée, tu ne l’as pas honoré. '
  '24':
  - type: text
    content: C’est pourquoi il a envoyé ce tronçon de main pour tracer cette inscription.
  '25':
  - type: text
    content: 'Voici l’inscription qui a été tracée là : « Il a été compté : une mine, un sicle et deux demi-sicles'
  - type: note
    content: 'Il a été compté: …sicles. En araméen : Mené, mené, téqel, et parsin. Les deux premiers termes sont des homonymes : il vaut mieux considérer le premier mené comme une forme du verbe compter ; les trois autres termes sont des noms de monnaies. A partir de ces trois noms de monnaies, Daniel délivre un triple message, en procédant par jeux de mots avec ces noms (v. 26-28) ; ainsi le nom de la mine est homonyme à la formule verbale : il a été compté. Le nom du sicle fait jeu avec le verbe peser. Le nom du demi-sicle fait jeu à la fois avec le verbe diviser et avec le nom des Perses ; autre traduction pour demi-sicles: demi-mines.'
  - type: text
    content: . »
  '26':
  - type: text
    content: 'Et voici l’interprétation : « une mine » : Dieu a « compté » les années de ton règne et les a menées à leur terme.'
  '27':
  - type: text
    content: '« Un sicle » : Tu as été « pesé » dans la balance et l’on a trouvé que tu ne fais pas le poids.'
  '28':
  - type: text
    content: '« Deux demi-sicles » : Ton royaume a été « divisé » pour être livré aux Mèdes et aux Perses.'
  '29':
  - type: text
    content: Alors Balthazar ordonna de revêtir Daniel de pourpre, de lui mettre une chaîne d’or au cou et de faire proclamer qu’il partagerait le gouvernement du royaume avec deux autres hauts fonctionnaires
  - type: note
    content: Voir v. 7 et note.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Aussitôt, on apporta les coupes d’or qui avaient été prises dans le temple de Dieu à Jérusalem, et le roi, ses hauts dignitaires, ses femmes et ses concubines s’en servirent pour boire. '
  '30':
  - type: text
    content: Mais, dans la même nuit, Balthazar, roi des Chaldéens, fut tué.
  '4':
  - type: text
    content: Ils burent et se mirent à louer les dieux d’or, d’argent, de bronze, de fer, de bois et de pierre.
  - type: heading
    content: Une main mystérieuse
  '5':
  - type: text
    content: 'A ce moment-là apparurent soudain, devant le candélabre, les doigts d’une main humaine qui se mirent à écrire sur le plâtre du mur du palais royal. Le roi vit cette main qui écrivait. '
  '6':
  - type: text
    content: 'Alors son visage devint blême, des pensées terrifiantes l’assaillirent, il se mit à trembler de tout son être et ses genoux s’entrechoquèrent. '
  '7':
  - type: text
    content: 'Il ordonna à grands cris de faire venir les magiciens, les astrologues et les devins, et il dit aux sages : Celui qui déchiffrera cette inscription et m’en donnera l’interprétation sera revêtu de pourpre, on lui mettra une chaîne d’or au cou et il partagera le gouvernement du royaume avec deux autres hauts fonctionnaires'
  - type: note
    content: 'il partagera… fonctionnaires. Certains traduisent : il occupera le troisième rang dans le gouvernement du royaume (après Nabonide et Balthazar), mais l’araméen signifie plutôt : « il gouvernera le royaume au sein d’un triumvirat » (voir 6.3).'
  - type: text
    content: .
  '8':
  - type: text
    content: 'Tous les sages du roi entrèrent dans la salle, mais aucun d’eux ne put déchiffrer l’inscription, ni en faire connaître l’interprétation au roi. '
  '9':
  - type: text
    content: Alors le roi Balthazar fut encore plus effrayé, il pâlit davantage et ses hauts dignitaires se trouvèrent dans une grande confusion.
