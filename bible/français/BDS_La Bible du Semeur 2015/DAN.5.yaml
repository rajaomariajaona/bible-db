document_id: DAN.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’inscription sur le mur
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un festin sacrilège
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Un jour, le roi Balthazar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les événements de ce chapitre ont lieu en 539 av. J.-C., 23 ans après la mort de Nabuchodonosor (en 562 av. J.-C.). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Balthazar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était le fils du dernier roi de Babylone, Nabonide. Il a exercé le pouvoir à la place de son père pendant les dix dernières années de son règne, alors que Nabonide s’était retiré à Téma, une oasis de la péninsule Arabique. Aux v. 2, 11, 18, Nabuchodonosor est appelé son '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce qui pouvait désigner en araméen soit la succession au trône soit la descendance physique. Il semble, en fait, que Balthazar ait été le petit-fils de Nabuchodonosor par sa mère ou par sa grand-mère – la femme ou la mère de Nabonide (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.10'
        - type: text
          text: ' et note ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 27.7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' organisa un banquet en l’honneur de ses mille dignitaires et se mit à boire du vin en leur présence. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quand la reine mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon certains, elle serait fille de Nabuchodonosor, mariée à Nabonide. Les reines mères avaient une grande influence dans les cours du Moyen-Orient.
      marker-yv: yv-n
    - type: text
      text: ' entendit ce que disaient le roi et ses hauts dignitaires, elle pénétra dans la salle du festin. Elle prit la parole et dit : Que le roi vive éternellement ! Ne te laisse pas terrifier par tes pensées et que ton visage ne pâlisse pas ainsi ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il y a, dans ton royaume, un homme en qui réside l’esprit des dieux saints ; du temps de ton père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', on trouva en lui une clairvoyance, une intelligence et une sagesse pareilles à la sagesse des dieux, aussi le roi Nabuchodonosor, ton père, l’a-t-il établi chef des mages, des magiciens, des astrologues et des devins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car cet homme, Daniel, que le roi a nommé Beltshatsar, possède un esprit extraordinaire, de la connaissance et de l’intelligence pour interpréter les rêves, trouver la solution des énigmes et résoudre les problèmes difficiles. Que l’on appelle donc Daniel et il donnera l’interprétation.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Daniel explique l’énigme
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aussitôt, Daniel fut introduit en présence du roi. Celui-ci prit la parole et lui dit : Es-tu ce Daniel qui fait partie des exilés de Juda, que le roi, mon père, a amenés de Juda ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'J’ai entendu dire que l’esprit des dieux réside en toi et que tu possèdes une clairvoyance, une intelligence et une sagesse extraordinaires. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Or, on vient de m’amener les sages et les magiciens pour lire cette inscription et m’en faire connaître l’interprétation ; mais ils n’en ont pas été capables. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On m’a dit que toi, tu peux donner des interprétations et résoudre les problèmes difficiles. Si donc tu es capable de lire cette inscription et de m’en faire connaître l’interprétation, tu seras revêtu de pourpre, tu porteras une chaîne d’or au cou et tu partageras le gouvernement du royaume avec deux autres hauts fonctionnaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 7.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors Daniel prit la parole et dit au roi : Garde tes présents et donne tes cadeaux à un autre ! Je vais cependant te déchiffrer l’inscription et t’en faire connaître l’interprétation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'O roi, le Dieu très-haut avait donné à Nabuchodonosor, ton père, la royauté et la grandeur, la gloire et la majesté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et à cause de la grandeur qu’il lui avait accordée, les gens de tous peuples, de toutes nations et de toutes langues tremblaient de peur devant lui. La vie et la mort de chacun dépendaient de son bon vouloir ; il élevait et abaissait qui il lui plaisait. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Excité par le vin, Balthazar ordonna d’apporter les coupes d’or et d’argent que Nabuchodonosor, son père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 1 et note, 11, 18 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 27.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', avait rapportées du temple de Jérusalem'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1.2 ; 2 R 25.14-15.
      marker-yv: yv-n
    - type: text
      text: . Il voulait s’en servir pour boire, lui et ses hauts dignitaires, ses femmes et ses concubines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le sens de ces deux mots est incertain. On a retrouvé le second dans les papyrus d’Eléphantine en Egypte, datant du v
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: '  siècle av. J.-C., avec le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: femmes de service.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais lorsque son cœur s’enorgueillit et qu’il s’endurcit jusqu’à l’arrogance, on lui fit quitter son trône royal et il fut dépouillé de sa gloire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il fut chassé de la société des humains, sa raison devint semblable à celle des bêtes et il se mit à vivre en compagnie des ânes sauvages, on le nourrissait d’herbe comme les bœufs et son corps était trempé par la rosée du ciel. Cela dura jusqu’au jour où il reconnut que le Dieu très-haut est maître de toute royauté humaine et qu’il élève à la royauté qui il veut.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et toi, son fils, Balthazar, tu savais tout cela, et cependant tu n’as pas adopté une attitude humble. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tu t’es élevé contre le Seigneur du ciel et tu t’es fait apporter les coupes de son temple, puis toi et tes hauts dignitaires, tes femmes et tes concubines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir note v. 2.
      marker-yv: yv-n
    - type: text
      text: ', vous y avez bu du vin et tu as loué les dieux d’argent, d’or, de bronze, de fer, de bois et de pierre, des dieux qui ne voient rien, n’entendent rien et ne savent rien. Mais le Dieu qui tient ton souffle de vie dans sa main et de qui dépend toute ta destinée, tu ne l’as pas honoré. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: C’est pourquoi il a envoyé ce tronçon de main pour tracer cette inscription.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici l’inscription qui a été tracée là : « Il a été compté : une mine, un sicle et deux demi-sicles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il a été compté
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': …sicles. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En araméen : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mené, mené, téqel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'parsin. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les deux premiers termes sont des homonymes : il vaut mieux considérer le premier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mené '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme une forme du verbe '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: compt
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'er ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'les trois autres termes sont des noms de monnaies. A partir de ces trois noms de monnaies, Daniel délivre un triple message, en procédant par jeux de mots avec ces noms (v. 26-28) ; ainsi le nom de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est homonyme à la formule verbale : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il a été compté. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sicle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait jeu avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'peser. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'demi-sicle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait jeu à la fois avec le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'diviser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et avec le nom des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Perses ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: demi-sicles
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demi-mines.
      marker-yv: yv-n
    - type: text
      text: . »
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Et voici l’interprétation : « une mine » : Dieu a « compté » les années de ton règne et les a menées à leur terme.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '« Un sicle » : Tu as été « pesé » dans la balance et l’on a trouvé que tu ne fais pas le poids.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '« Deux demi-sicles » : Ton royaume a été « divisé » pour être livré aux Mèdes et aux Perses.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Alors Balthazar ordonna de revêtir Daniel de pourpre, de lui mettre une chaîne d’or au cou et de faire proclamer qu’il partagerait le gouvernement du royaume avec deux autres hauts fonctionnaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 7 et note.
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aussitôt, on apporta les coupes d’or qui avaient été prises dans le temple de Dieu à Jérusalem, et le roi, ses hauts dignitaires, ses femmes et ses concubines s’en servirent pour boire. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mais, dans la même nuit, Balthazar, roi des Chaldéens, fut tué.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils burent et se mirent à louer les dieux d’or, d’argent, de bronze, de fer, de bois et de pierre.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Une main mystérieuse
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A ce moment-là apparurent soudain, devant le candélabre, les doigts d’une main humaine qui se mirent à écrire sur le plâtre du mur du palais royal. Le roi vit cette main qui écrivait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors son visage devint blême, des pensées terrifiantes l’assaillirent, il se mit à trembler de tout son être et ses genoux s’entrechoquèrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il ordonna à grands cris de faire venir les magiciens, les astrologues et les devins, et il dit aux sages : Celui qui déchiffrera cette inscription et m’en donnera l’interprétation sera revêtu de pourpre, on lui mettra une chaîne d’or au cou et il partagera le gouvernement du royaume avec deux autres hauts fonctionnaires'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il partagera… fonctionnaires. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il occupera le troisième rang dans le gouvernement du royaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(après Nabonide et Balthazar), mais l’araméen signifie plutôt : « il gouvernera le royaume au sein d’un triumvirat » (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.3'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tous les sages du roi entrèrent dans la salle, mais aucun d’eux ne put déchiffrer l’inscription, ni en faire connaître l’interprétation au roi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors le roi Balthazar fut encore plus effrayé, il pâlit davantage et ses hauts dignitaires se trouvèrent dans une grande confusion.
