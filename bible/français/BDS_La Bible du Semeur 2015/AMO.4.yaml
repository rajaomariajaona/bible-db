document_id: AMO.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’endurcissement d’Israël
  - type: heading
    content: Les dames de Samarie
  - type: text
    content: Ecoutez bien ceci, ╵ô vaches du Basan
  - type: note
    content: Amos apostrophe ainsi les dames riches de Samarie. Le Basan, au nord-est du Jourdain, était réputé pour ses troupeaux.
  - type: text
    content: qui demeurez ╵sur les montagnes ╵de Samarie,
  - type: text
    content: qui opprimez les pauvres,
  - type: text
    content: et maltraitez les indigents,
  - type: text
    content: 'vous qui dites à vos maris :'
  - type: text
    content: « Apportez-nous à boire ! »
  '10':
  - type: text
    content: Et j’ai déchaîné contre vous la peste ╵comme je l’avais fait ╵contre l’Egypte
  - type: note
    content: Allusion à la cinquième plaie d’Egypte (Ex 9.1-7).
  - type: text
    content: ','
  - type: text
    content: j’ai tué par l’épée ╵vos jeunes gens,
  - type: text
    content: tandis que vos chevaux ╵ont été capturés.
  - type: text
    content: J’ai fait monter à vos narines ╵la puanteur des morts ╵tombés dans votre camp.
  - type: text
    content: Malgré cela, ╵vous ne revenez pas à moi,
  - type: text
    content: l’Eternel le déclare.
  '11':
  - type: text
    content: J’ai produit parmi vous ╵des bouleversements
  - type: text
    content: comme j’en ai produit ╵à Sodome et Gomorrhe
  - type: note
    content: Voir Gn 19.24-25.
  - type: text
    content: ','
  - type: text
    content: et vous avez été ╵comme un tison arraché à un incendie.
  - type: text
    content: Malgré cela, ╵vous ne revenez pas à moi,
  - type: text
    content: l’Eternel le déclare.
  '12':
  - type: text
    content: C’est pourquoi, Israël, ╵tu vas voir comment je vais te traiter !
  - type: text
    content: Et puisque je vais te traiter ainsi, ╵prépare-toi, toi, Israël, ╵à rencontrer ton Dieu !
  '13':
  - type: text
    content: Car c’est lui qui a formé les montagnes, ╵qui a créé le vent.
  - type: text
    content: C’est lui qui fait connaître ╵à l’homme sa pensée,
  - type: text
    content: lui qui au moment de l’aurore ╵fait venir des ténèbres,
  - type: text
    content: lui qui marche sur les sommets, ╵les hauteurs de la terre.
  - type: text
    content: Son nom est l’Eternel, ╵Dieu des armées célestes.
  '2':
  - type: text
    content: 'Le Seigneur, l’Eternel, ╵a juré : Aussi vrai ╵que je suis saint,'
  - type: text
    content: voici venir des jours
  - type: text
    content: où l’on vous traînera vous-mêmes ╵avec des crocs,
  - type: text
    content: et vos suivantes
  - type: note
    content: 'Autre traduction : et votre descendance ou jusqu’aux dernières.'
  - type: text
    content: ' ╵avec des hameçons.'
  '3':
  - type: text
    content: Vous devrez sortir par les brèches, ╵chacune devant soi,
  - type: text
    content: vous serez chassées vers l’Hermon,
  - type: text
    content: l’Eternel le déclare.
  - type: heading
    content: La religion illusoire
  '4':
  - type: text
    content: Allez donc à Béthel ╵et transgressez la loi,
  - type: text
    content: et, à Guilgal
  - type: note
    content: 'Béthel: voir 3.14. Guilgal: autre sanctuaire du royaume du Nord.'
  - type: text
    content: ', ╵transgressez-la encore plus !'
  - type: text
    content: Offrez tous les matins ╵vos sacrifices,
  - type: text
    content: et le troisième jour vos dîmes.
  '5':
  - type: text
    content: Faites brûler ╵de la pâte levée
  - type: note
    content: 'La Loi interdisait d’apporter du pain levé à Dieu (Lv 7.13). Autre traduction : faites fumer sans levain.'
  - type: text
    content: ' ╵pour les offrandes de reconnaissance,'
  - type: text
    content: claironnez vos dons volontaires, ╵proclamez-les à haute voix,
  - type: text
    content: puisque c’est là ce qui vous plaît, ╵Israélites,
  - type: text
    content: c’est là ce que déclare ╵le Seigneur, l’Eternel.
  - type: heading
    content: Les oreilles bouchées
  '6':
  - type: text
    content: Moi, je vous ai laissés ╵le ventre vide
  - type: text
    content: dans toutes vos cités,
  - type: text
    content: j’ai fait manquer de pain ╵dans toutes vos bourgades.
  - type: text
    content: Malgré cela, ╵vous ne revenez pas à moi,
  - type: text
    content: l’Eternel le déclare.
  '7':
  - type: text
    content: Et moi encore, ╵je vous ai refusé la pluie
  - type: text
    content: trois mois avant ╵le moment des moissons,
  - type: text
    content: ou bien j’ai fait pleuvoir ╵sur telle ville
  - type: text
    content: et non pas sur telle autre.
  - type: text
    content: Un terrain recevait la pluie,
  - type: text
    content: un autre, n’en recevant pas, ╵était tout à fait sec.
  '8':
  - type: text
    content: Les gens de deux ou de trois villes ╵se traînaient vers une autre
  - type: text
    content: en quête d’eau à boire,
  - type: text
    content: sans pouvoir étancher leur soif.
  - type: text
    content: Malgré cela, ╵vous ne revenez pas à moi,
  - type: text
    content: l’Eternel le déclare.
  '9':
  - type: text
    content: Et je vous ai frappés ╵par la rouille et la nielle,
  - type: text
    content: et puis j’ai desséché
  - type: note
    content: 'j’ai desséché: en modifiant légèrement un terme qui, tel qu’il se présente dans le texte hébreu traditionnel, est obscur.'
  - type: text
    content: ' ╵vos jardins et vos vignes ; ╵vos figuiers et vos oliviers'
  - type: text
    content: ont été dévorés ╵par les criquets.
  - type: text
    content: Malgré cela, ╵vous ne revenez pas à moi,
  - type: text
    content: l’Eternel le déclare.
