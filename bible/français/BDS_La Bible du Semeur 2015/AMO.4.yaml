document_id: AMO.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’endurcissement d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les dames de Samarie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ecoutez bien ceci, ╵ô vaches du Basan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Amos apostrophe ainsi les dames riches de Samarie. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Basan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au nord-est du Jourdain, était réputé pour ses troupeaux.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui demeurez ╵sur les montagnes ╵de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui opprimez les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maltraitez les indigents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vous qui dites à vos maris :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Apportez-nous à boire ! »
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et j’ai déchaîné contre vous la peste ╵comme je l’avais fait ╵contre l’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la cinquième plaie d’Egypte (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 9.1-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai tué par l’épée ╵vos jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que vos chevaux ╵ont été capturés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai fait monter à vos narines ╵la puanteur des morts ╵tombés dans votre camp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, ╵vous ne revenez pas à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J’ai produit parmi vous ╵des bouleversements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme j’en ai produit ╵à Sodome et Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 19.24-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous avez été ╵comme un tison arraché à un incendie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, ╵vous ne revenez pas à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est pourquoi, Israël, ╵tu vas voir comment je vais te traiter !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et puisque je vais te traiter ainsi, ╵prépare-toi, toi, Israël, ╵à rencontrer ton Dieu !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Car c’est lui qui a formé les montagnes, ╵qui a créé le vent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui fait connaître ╵à l’homme sa pensée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui au moment de l’aurore ╵fait venir des ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui marche sur les sommets, ╵les hauteurs de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son nom est l’Eternel, ╵Dieu des armées célestes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le Seigneur, l’Eternel, ╵a juré : Aussi vrai ╵que je suis saint,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici venir des jours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où l’on vous traînera vous-mêmes ╵avec des crocs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos suivantes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et votre descendance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu’aux dernières.
      marker-yv: yv-n
    - type: text
      text: ' ╵avec des hameçons.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Vous devrez sortir par les brèches, ╵chacune devant soi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous serez chassées vers l’Hermon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La religion illusoire
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Allez donc à Béthel ╵et transgressez la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, à Guilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béthel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.14'
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guilgal
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: autre sanctuaire du royaume du Nord.
      marker-yv: yv-n
    - type: text
      text: ', ╵transgressez-la encore plus !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offrez tous les matins ╵vos sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le troisième jour vos dîmes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Faites brûler ╵de la pâte levée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La Loi interdisait d’apporter du pain levé à Dieu (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 7.13
        - type: text
          text: '). Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faites fumer sans levain.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour les offrandes de reconnaissance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: claironnez vos dons volontaires, ╵proclamez-les à haute voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque c’est là ce qui vous plaît, ╵Israélites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est là ce que déclare ╵le Seigneur, l’Eternel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les oreilles bouchées
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moi, je vous ai laissés ╵le ventre vide
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans toutes vos cités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai fait manquer de pain ╵dans toutes vos bourgades.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, ╵vous ne revenez pas à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Et moi encore, ╵je vous ai refusé la pluie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: trois mois avant ╵le moment des moissons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou bien j’ai fait pleuvoir ╵sur telle ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non pas sur telle autre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un terrain recevait la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un autre, n’en recevant pas, ╵était tout à fait sec.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les gens de deux ou de trois villes ╵se traînaient vers une autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en quête d’eau à boire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans pouvoir étancher leur soif.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, ╵vous ne revenez pas à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Et je vous ai frappés ╵par la rouille et la nielle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et puis j’ai desséché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j’ai desséché
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en modifiant légèrement un terme qui, tel qu’il se présente dans le texte hébreu traditionnel, est obscur.
      marker-yv: yv-n
    - type: text
      text: ' ╵vos jardins et vos vignes ; ╵vos figuiers et vos oliviers'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont été dévorés ╵par les criquets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, ╵vous ne revenez pas à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
