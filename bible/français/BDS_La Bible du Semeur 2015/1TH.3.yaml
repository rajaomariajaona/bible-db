document_id: 1TH.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est pourquoi, nous n’avons plus supporté d’attendre davantage et nous avons préféré rester seuls à Athènes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nous vous avons envoyé notre frère Timothée, qui collabore avec nous au service de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les manuscrits comportent plusieurs variantes : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: collaborateur de Dieu, serviteur de Dieu, serviteur et collaborateur de Dieu.
    marker-yv: yv-n
  - type: text
    text: ' dans l’annonce de l’Evangile de Christ. Nous l’avons chargé de vous affermir et de vous encourager dans votre foi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'afin que personne ne vienne à vaciller dans les détresses par lesquelles vous passez. Vous savez vous-mêmes qu’elles font partie de notre lot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque nous étions parmi vous, nous vous avions prévenus que nous aurions à souffrir de nombreuses détresses. Et c’est ce qui est arrivé, vous le savez bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi, ne pouvant supporter d’attendre davantage, j’ai envoyé Timothée pour prendre des nouvelles de votre foi. Je craignais que le Tentateur ne vous ait éprouvés au point de réduire à néant tout notre travail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais voici que Timothée vient de nous arriver de chez vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18.5
        metadata:
          usfm: ACT.18.5
      - type: text
        text: . Timothée est venu de Thessalonique à Corinthe où Paul écrit cette lettre.
    marker-yv: yv-n
  - type: text
    text: ', il nous a rapporté de bonnes nouvelles de votre foi et de votre amour. Il nous a dit en particulier que vous conservez toujours un bon souvenir de nous et que vous désirez nous revoir autant que nous désirons vous revoir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aussi, frères et sœurs, au milieu de nos angoisses et de nos détresses, vous nous avez réconfortés par la réalité de votre foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Oui, maintenant, nous nous sentons revivre, puisque vous tenez bon dans votre vie avec le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Comment, en réponse, pourrions-nous assez remercier notre Dieu pour vous, pour toute la joie que vous nous donnez devant lui ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est pourquoi, nuit et jour, nous lui demandons avec instance de nous accorder de vous revoir et de compléter ce qui manque à votre foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul ayant dû quitter Thessalonique précipitamment (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17.10
        metadata:
          usfm: ACT.17.10
      - type: text
        text: ) n’a pu leur donner que quelques éléments d’enseignement.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que Dieu notre Père lui-même et notre Seigneur Jésus aplanissent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans le grec, le verbe est au singulier, ce qui n’est pas plus correct qu’en français. Ce singulier laisse transparaître que, dans l’esprit de Paul, le Père et le Fils sont un.
    marker-yv: yv-n
  - type: text
    text: ' notre chemin jusqu’à vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Que le Seigneur vous remplisse, jusqu’à en déborder, d’amour les uns pour les autres et envers tous les hommes, à l’exemple de l’amour que nous vous portons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qu’il affermisse ainsi votre cœur pour que vous soyez saints et irréprochables devant Dieu notre Père au jour où notre Seigneur Jésus-Christ viendra avec tous ses saints anges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir Mc 8.38 ; Lc 9.26. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec tous les membres de son peuple saint.
    marker-yv: yv-n
  - type: text
    text: .
