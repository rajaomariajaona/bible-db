document_id: 1TH.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'C’est pourquoi, nous n’avons plus supporté d’attendre davantage et nous avons préféré rester seuls à Athènes. '
  '10':
  - type: text
    content: C’est pourquoi, nuit et jour, nous lui demandons avec instance de nous accorder de vous revoir et de compléter ce qui manque à votre foi
  - type: note
    content: Paul ayant dû quitter Thessalonique précipitamment (Ac 17.10) n’a pu leur donner que quelques éléments d’enseignement.
  - type: text
    content: .
  - type: heading
    content: Prière
  '11':
  - type: text
    content: Que Dieu notre Père lui-même et notre Seigneur Jésus aplanissent
  - type: note
    content: Dans le grec, le verbe est au singulier, ce qui n’est pas plus correct qu’en français. Ce singulier laisse transparaître que, dans l’esprit de Paul, le Père et le Fils sont un.
  - type: text
    content: ' notre chemin jusqu’à vous. '
  '12':
  - type: text
    content: 'Que le Seigneur vous remplisse, jusqu’à en déborder, d’amour les uns pour les autres et envers tous les hommes, à l’exemple de l’amour que nous vous portons. '
  '13':
  - type: text
    content: Qu’il affermisse ainsi votre cœur pour que vous soyez saints et irréprochables devant Dieu notre Père au jour où notre Seigneur Jésus-Christ viendra avec tous ses saints anges
  - type: note
    content: 'Voir Mc 8.38 ; Lc 9.26. Autre traduction : avec tous les membres de son peuple saint.'
  - type: text
    content: .
  '2':
  - type: text
    content: Nous vous avons envoyé notre frère Timothée, qui collabore avec nous au service de Dieu
  - type: note
    content: 'Les manuscrits comportent plusieurs variantes : collaborateur de Dieu, serviteur de Dieu, serviteur et collaborateur de Dieu.'
  - type: text
    content: ' dans l’annonce de l’Evangile de Christ. Nous l’avons chargé de vous affermir et de vous encourager dans votre foi, '
  '3':
  - type: text
    content: 'afin que personne ne vienne à vaciller dans les détresses par lesquelles vous passez. Vous savez vous-mêmes qu’elles font partie de notre lot. '
  '4':
  - type: text
    content: 'Lorsque nous étions parmi vous, nous vous avions prévenus que nous aurions à souffrir de nombreuses détresses. Et c’est ce qui est arrivé, vous le savez bien. '
  '5':
  - type: text
    content: Ainsi, ne pouvant supporter d’attendre davantage, j’ai envoyé Timothée pour prendre des nouvelles de votre foi. Je craignais que le Tentateur ne vous ait éprouvés au point de réduire à néant tout notre travail.
  '6':
  - type: text
    content: Mais voici que Timothée vient de nous arriver de chez vous
  - type: note
    content: Voir Ac 18.5. Timothée est venu de Thessalonique à Corinthe où Paul écrit cette lettre.
  - type: text
    content: ', il nous a rapporté de bonnes nouvelles de votre foi et de votre amour. Il nous a dit en particulier que vous conservez toujours un bon souvenir de nous et que vous désirez nous revoir autant que nous désirons vous revoir.'
  '7':
  - type: text
    content: 'Aussi, frères et sœurs, au milieu de nos angoisses et de nos détresses, vous nous avez réconfortés par la réalité de votre foi. '
  '8':
  - type: text
    content: 'Oui, maintenant, nous nous sentons revivre, puisque vous tenez bon dans votre vie avec le Seigneur. '
  '9':
  - type: text
    content: Comment, en réponse, pourrions-nous assez remercier notre Dieu pour vous, pour toute la joie que vous nous donnez devant lui ?
