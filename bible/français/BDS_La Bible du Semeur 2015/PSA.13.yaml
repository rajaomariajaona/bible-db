document_id: PSA.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Crainte et confiance
  - type: text
    content: Au chef de chœur. Psaume de David.
  '2':
  - type: text
    content: Jusques à quand, ô Eternel ? ╵M’oublieras-tu sans cesse ?
  - type: text
    content: Jusques à quand ╵seras-tu loin de moi ?
  '3':
  - type: text
    content: Jusques à quand ╵aurai-je des soucis
  - type: text
    content: et des chagrins au cœur ╵à longueur de journée ?
  - type: text
    content: Jusques à quand mon ennemi ╵aura-t-il le dessus ?
  '4':
  - type: text
    content: Regarde, Eternel mon Dieu, réponds-moi,
  - type: text
    content: viens réparer mes forces,
  - type: text
    content: sinon je m’endors dans la mort.
  '5':
  - type: text
    content: Sinon mon ennemi dira ╵que de moi il a triomphé,
  - type: text
    content: mes adversaires se réjouiront ╵lorsqu’ils verront ma chute.
  '6':
  - type: text
    content: Pour moi, j’ai confiance ╵en ta bonté.
  - type: text
    content: La joie remplit mon cœur ╵à cause de ton grand salut.
  - type: text
    content: Je veux chanter en ton honneur, ╵ô Eternel, tu m’as comblé de tes bienfaits.
