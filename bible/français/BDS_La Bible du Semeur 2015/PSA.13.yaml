document_id: PSA.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Crainte et confiance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume de David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jusques à quand, ô Eternel ? ╵M’oublieras-tu sans cesse ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand ╵seras-tu loin de moi ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jusques à quand ╵aurai-je des soucis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des chagrins au cœur ╵à longueur de journée ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand mon ennemi ╵aura-t-il le dessus ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Regarde, Eternel mon Dieu, réponds-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: viens réparer mes forces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon je m’endors dans la mort.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sinon mon ennemi dira ╵que de moi il a triomphé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes adversaires se réjouiront ╵lorsqu’ils verront ma chute.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pour moi, j’ai confiance ╵en ta bonté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie remplit mon cœur ╵à cause de ton grand salut.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux chanter en ton honneur, ╵ô Eternel, tu m’as comblé de tes bienfaits.
