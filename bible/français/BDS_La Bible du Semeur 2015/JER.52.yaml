document_id: JER.52,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Appendice historique
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prise de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem. Sa mère s’appelait Hamoutal, elle était fille de Jérémie, de Libna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce chapitre reproduit presque intégralement 2 R 24.18-20 ; 25.1-21, 25-30. Pour les notes, voir ces chapitres de 2 Rois.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux. Il fit aussi égorger à Ribla tous les ministres de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Puis il fit crever les yeux à Sédécias et le fit lier avec une double chaîne de bronze. Après cela, le roi de Babylone le déporta à Babylone où il l’enferma en prison. Sédécias y resta jusqu’à sa mort.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le dixième jour du cinquième mois – c’était la dix-neuvième année du règne de Nabuchodonosor, roi de Babylone – Nebouzaradân, chef de la garde impériale qui était attaché au service personnel du roi de Babylone, fit son entrée à Jérusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il mit le feu au temple de l’Eternel, au palais royal, à toutes les maisons et à tous les édifices importants de la ville. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les troupes chaldéennes, sous le commandement du chef de la garde, démantelèrent les remparts qui entouraient la ville.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nebouzaradân, chef de la garde impériale, déporta une partie des gens les plus pauvres et le reste de la population qui était demeurée dans la ville, ceux qui s’étaient déjà rendus au roi de Babylone et ce qui restait des artisans. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mais il laissa une partie des gens pauvres du pays pour cultiver les vignes et les champs.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les Chaldéens mirent en pièces les colonnes de bronze du temple de l’Eternel, les chariots et la grande cuve de bronze qui étaient dans le parvis du Temple, et ils emportèrent tout le bronze à Babylone. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils prirent aussi les chaudrons, les pelles, les couteaux, les coupes à aspersion, les autres coupes et tous les autres objets de bronze employés pour le culte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le chef de la garde s’empara de tous les objets d’or et d’argent massif : les bassins, les brasiers, les coupes à aspersion, les chaudrons, les chandeliers, les autres coupes et les bols.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il fit ce que l’Eternel considère comme mal, tout comme Yehoyaqim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On ne saurait évaluer le poids du bronze des deux colonnes, de la grande cuve et des douze bœufs de bronze qui soutenaient les chariots, que le roi Salomon avait fait faire pour le temple de l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Chaque colonne avait neuf mètres de haut, sa circonférence était de six mètres, le bronze avait près de huit centimètres d’épaisseur, la colonne étant creuse à l’intérieur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Elle était surmontée d’un chapiteau de bronze de deux mètres cinquante de haut, entouré d’un treillis décoré de grenades. Le tout était en bronze. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il y avait quatre-vingt-seize grenades en relief, et en tout, cent grenades autour du treillis.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le chef de la garde fit prisonnier le grand-prêtre Seraya, Sophonie, le prêtre en second, et les trois prêtres chargés de surveiller l’entrée du Temple. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il arrêta aussi, dans la ville, un haut responsable militaire, sept conseillers du roi, qui étaient restés dans la ville, le secrétaire du chef de l’armée chargé de recruter les soldats dans le pays, ainsi que soixante Judéens qui se trouvaient à l’intérieur de la ville. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nebouzaradân, chef de la garde, emmena tous ces prisonniers au roi de Babylone, à Ribla. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Celui-ci les fit exécuter à Ribla, dans le pays de Hamath. Ainsi, la population de Juda fut déportée loin de sa patrie.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Voici le nombre des captifs que Nabuchodonosor emmena en exil : 3 023 Judéens, la septième année de son règne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 597 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '  : '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 832 habitants de Jérusalem la dix-huitième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 587 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tout cela arriva parce que l’Eternel était en colère contre Jérusalem et Juda, au point de les chasser loin de lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, Sédécias se révolta contre le roi de Babylone. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Puis, la vingt-troisième année du règne de Nabuchodonosor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 582 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', Nebouzaradân, le chef de la garde, déporta encore 745 Judéens ; ce qui donne un total de 4 600 déportés.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: 'Un signe d’espoir : Yehoyakîn gracié'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: La trente-septième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 561 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ' de la déportation de Yehoyakîn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 24.10-17 ; Jr 22.24-27.
      marker-yv: yv-n
    - type: text
      text: ', roi de Juda, le vingt-cinquième jour du douzième mois, Evil-Merodak, roi de Babylone, gracia Yehoyakîn, roi de Juda, l’année de son accession au trône de Babylone, et le fit sortir de prison.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il le traita avec bonté et lui accorda une situation supérieure à celle des autres rois exilés avec lui à Babylone. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il lui fit quitter ses vêtements de prisonnier et l’admit à prendre ses repas à sa table jusqu’à la fin de sa vie. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Le roi de Babylone pourvut à son entretien régulier, jour après jour, aussi longtemps qu’il vécut.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, vint avec toute son armée attaquer Jérusalem. Ils établirent leur camp devant la ville et construisirent des terrassements tout autour.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La ville resta assiégée jusqu’à la onzième année du règne de Sédécias.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le neuvième jour du quatrième mois, alors que la famine sévissait durement dans la ville et que la population du pays n’avait plus rien à manger, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: une brèche fut ouverte dans le rempart de la ville et tous les soldats
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte parallèle de '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 39.4
        - type: text
          text: ' mentionne le roi Sédécias avec les soldats. Il figurera aussi dans le présent texte au verset 8. Il est donc possible que l’omission du roi au v. 7 soit due à une erreur de copiste.'
      marker-yv: yv-n
    - type: text
      text: ' de Juda s’enfuirent : ils s’échappèrent de la ville, de nuit, par la porte qui se trouvait entre les deux remparts et qui donnait sur le jardin du roi, tandis que la ville était encerclée par les Chaldéens, et ils prirent le chemin de la vallée du Jourdain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais l’armée des Chaldéens se lança à la poursuite du roi, et rattrapa Sédécias dans la plaine de Jéricho. Alors tous ses soldats se dispersèrent loin de lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les Chaldéens se saisirent du roi et l’amenèrent au roi de Babylone à Ribla, dans le pays de Hamath, et celui-ci prononça son jugement contre lui. '
