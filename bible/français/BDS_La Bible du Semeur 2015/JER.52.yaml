document_id: JER.52,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Appendice historique
  - type: heading
    content: La prise de Jérusalem
  - type: text
    content: Sédécias avait vingt et un ans à son avènement. Il régna onze ans à Jérusalem. Sa mère s’appelait Hamoutal, elle était fille de Jérémie, de Libna
  - type: note
    content: Ce chapitre reproduit presque intégralement 2 R 24.18-20 ; 25.1-21, 25-30. Pour les notes, voir ces chapitres de 2 Rois.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux. Il fit aussi égorger à Ribla tous les ministres de Juda. '
  '11':
  - type: text
    content: Puis il fit crever les yeux à Sédécias et le fit lier avec une double chaîne de bronze. Après cela, le roi de Babylone le déporta à Babylone où il l’enferma en prison. Sédécias y resta jusqu’à sa mort.
  '12':
  - type: text
    content: 'Le dixième jour du cinquième mois – c’était la dix-neuvième année du règne de Nabuchodonosor, roi de Babylone – Nebouzaradân, chef de la garde impériale qui était attaché au service personnel du roi de Babylone, fit son entrée à Jérusalem. '
  '13':
  - type: text
    content: 'Il mit le feu au temple de l’Eternel, au palais royal, à toutes les maisons et à tous les édifices importants de la ville. '
  '14':
  - type: text
    content: Les troupes chaldéennes, sous le commandement du chef de la garde, démantelèrent les remparts qui entouraient la ville.
  '15':
  - type: text
    content: 'Nebouzaradân, chef de la garde impériale, déporta une partie des gens les plus pauvres et le reste de la population qui était demeurée dans la ville, ceux qui s’étaient déjà rendus au roi de Babylone et ce qui restait des artisans. '
  '16':
  - type: text
    content: Mais il laissa une partie des gens pauvres du pays pour cultiver les vignes et les champs.
  '17':
  - type: text
    content: 'Les Chaldéens mirent en pièces les colonnes de bronze du temple de l’Eternel, les chariots et la grande cuve de bronze qui étaient dans le parvis du Temple, et ils emportèrent tout le bronze à Babylone. '
  '18':
  - type: text
    content: 'Ils prirent aussi les chaudrons, les pelles, les couteaux, les coupes à aspersion, les autres coupes et tous les autres objets de bronze employés pour le culte. '
  '19':
  - type: text
    content: 'Le chef de la garde s’empara de tous les objets d’or et d’argent massif : les bassins, les brasiers, les coupes à aspersion, les chaudrons, les chandeliers, les autres coupes et les bols.'
  '2':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, tout comme Yehoyaqim. '
  '20':
  - type: text
    content: 'On ne saurait évaluer le poids du bronze des deux colonnes, de la grande cuve et des douze bœufs de bronze qui soutenaient les chariots, que le roi Salomon avait fait faire pour le temple de l’Eternel. '
  '21':
  - type: text
    content: 'Chaque colonne avait neuf mètres de haut, sa circonférence était de six mètres, le bronze avait près de huit centimètres d’épaisseur, la colonne étant creuse à l’intérieur. '
  '22':
  - type: text
    content: 'Elle était surmontée d’un chapiteau de bronze de deux mètres cinquante de haut, entouré d’un treillis décoré de grenades. Le tout était en bronze. '
  '23':
  - type: text
    content: Il y avait quatre-vingt-seize grenades en relief, et en tout, cent grenades autour du treillis.
  '24':
  - type: text
    content: 'Le chef de la garde fit prisonnier le grand-prêtre Seraya, Sophonie, le prêtre en second, et les trois prêtres chargés de surveiller l’entrée du Temple. '
  '25':
  - type: text
    content: 'Il arrêta aussi, dans la ville, un haut responsable militaire, sept conseillers du roi, qui étaient restés dans la ville, le secrétaire du chef de l’armée chargé de recruter les soldats dans le pays, ainsi que soixante Judéens qui se trouvaient à l’intérieur de la ville. '
  '26':
  - type: text
    content: 'Nebouzaradân, chef de la garde, emmena tous ces prisonniers au roi de Babylone, à Ribla. '
  '27':
  - type: text
    content: Celui-ci les fit exécuter à Ribla, dans le pays de Hamath. Ainsi, la population de Juda fut déportée loin de sa patrie.
  '28':
  - type: text
    content: 'Voici le nombre des captifs que Nabuchodonosor emmena en exil : 3 023 Judéens, la septième année de son règne'
  - type: note
    content: En 597 av. J.-C.
  - type: text
    content: '  : '
  '29':
  - type: text
    content: 832 habitants de Jérusalem la dix-huitième année
  - type: note
    content: En 587 av. J.-C.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Tout cela arriva parce que l’Eternel était en colère contre Jérusalem et Juda, au point de les chasser loin de lui.
  - type: text
    content: 'Or, Sédécias se révolta contre le roi de Babylone. '
  '30':
  - type: text
    content: Puis, la vingt-troisième année du règne de Nabuchodonosor
  - type: note
    content: En 582 av. J.-C.
  - type: text
    content: ', Nebouzaradân, le chef de la garde, déporta encore 745 Judéens ; ce qui donne un total de 4 600 déportés.'
  - type: heading
    content: 'Un signe d’espoir : Yehoyakîn gracié'
  '31':
  - type: text
    content: La trente-septième année
  - type: note
    content: En 561 av. J.-C.
  - type: text
    content: ' de la déportation de Yehoyakîn'
  - type: note
    content: Voir 2 R 24.10-17 ; Jr 22.24-27.
  - type: text
    content: ', roi de Juda, le vingt-cinquième jour du douzième mois, Evil-Merodak, roi de Babylone, gracia Yehoyakîn, roi de Juda, l’année de son accession au trône de Babylone, et le fit sortir de prison.'
  '32':
  - type: text
    content: 'Il le traita avec bonté et lui accorda une situation supérieure à celle des autres rois exilés avec lui à Babylone. '
  '33':
  - type: text
    content: 'Il lui fit quitter ses vêtements de prisonnier et l’admit à prendre ses repas à sa table jusqu’à la fin de sa vie. '
  '34':
  - type: text
    content: Le roi de Babylone pourvut à son entretien régulier, jour après jour, aussi longtemps qu’il vécut.
  '4':
  - type: text
    content: La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, vint avec toute son armée attaquer Jérusalem. Ils établirent leur camp devant la ville et construisirent des terrassements tout autour.
  '5':
  - type: text
    content: La ville resta assiégée jusqu’à la onzième année du règne de Sédécias.
  '6':
  - type: text
    content: 'Le neuvième jour du quatrième mois, alors que la famine sévissait durement dans la ville et que la population du pays n’avait plus rien à manger, '
  '7':
  - type: text
    content: une brèche fut ouverte dans le rempart de la ville et tous les soldats
  - type: note
    content: Le texte parallèle de Jr 39.4 mentionne le roi Sédécias avec les soldats. Il figurera aussi dans le présent texte au verset 8. Il est donc possible que l’omission du roi au v. 7 soit due à une erreur de copiste.
  - type: text
    content: ' de Juda s’enfuirent : ils s’échappèrent de la ville, de nuit, par la porte qui se trouvait entre les deux remparts et qui donnait sur le jardin du roi, tandis que la ville était encerclée par les Chaldéens, et ils prirent le chemin de la vallée du Jourdain. '
  '8':
  - type: text
    content: 'Mais l’armée des Chaldéens se lança à la poursuite du roi, et rattrapa Sédécias dans la plaine de Jéricho. Alors tous ses soldats se dispersèrent loin de lui. '
  '9':
  - type: text
    content: 'Les Chaldéens se saisirent du roi et l’amenèrent au roi de Babylone à Ribla, dans le pays de Hamath, et celui-ci prononça son jugement contre lui. '
