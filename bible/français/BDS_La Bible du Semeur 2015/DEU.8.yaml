document_id: DEU.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’éducation d’Israël au désert
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous vous appliquerez à obéir à tous les commandements que je vous donne aujourd’hui, afin que vous viviez, que vous deveniez nombreux et que vous puissiez entrer dans le pays que l’Eternel a promis par serment à vos ancêtres et en prendre possession.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ainsi, tu jouiras de ces biens, tu mangeras à satiété, et tu béniras l’Eternel ton Dieu pour le bon pays qu’il t’aura donné.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Garde-toi d’oublier l’Eternel, ton Dieu, et de négliger d’obéir à ses commandements, à ses ordonnances et à ses lois que je te donne aujourd’hui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Si tu manges à satiété, si tu te construis de belles maisons et que tu y habites, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'si ton gros et ton petit bétail se multiplient, si ton argent et ton or s’accumulent, si tous tes biens s’accroissent, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'prends garde de ne pas céder à l’orgueil et d’oublier l’Eternel ton Dieu, qui t’a fait sortir d’Egypte, du pays où tu étais esclave, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: qui t’a conduit à travers ce vaste et terrible désert peuplé de serpents venimeux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 21.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et de scorpions, dans des lieux arides et sans eau où il a fait jaillir pour toi de l’eau du rocher le plus dur.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dans ce désert, il t’a encore nourri en te donnant une manne que tes ancêtres ne connaissaient pas. Il a fait tout cela afin de te faire connaître la pauvreté et de te mettre à l’épreuve, pour ensuite te faire du bien. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Prends donc garde de ne pas te dire : « C’est par mes propres forces et ma puissance que j’ai acquis toutes ces richesses. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Souviens-toi au contraire que c’est l’Eternel ton Dieu qui te donne la force de parvenir à la prospérité et qu’il le fait aujourd’hui pour tenir envers toi les engagements qu’il a pris par serment en concluant alliance avec tes ancêtres.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais si vous en venez à oublier l’Eternel votre Dieu, et à rendre un culte à d’autres dieux, à les servir et à vous prosterner devant eux, je vous avertis aujourd’hui que vous périrez totalement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'N’oublie jamais tout le chemin que l’Eternel ton Dieu t’a fait parcourir pendant ces quarante ans dans le désert afin de te faire connaître la pauvreté pour t’éprouver. Il a agi ainsi pour découvrir tes véritables dispositions intérieures et savoir si tu allais, ou non, obéir à ses commandements. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous périrez comme les autres peuples que l’Eternel votre Dieu va faire périr devant vous, parce que vous ne lui aurez pas obéi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oui, il t’a fait connaître la pauvreté et la faim, et il t’a nourri avec cette manne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 16.31
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' que tu ne connaissais pas et que tes ancêtres n’avaient pas connue. De cette manière, il voulait t’apprendre que l’homme ne vit pas seulement de pain, mais aussi de toute parole prononcée par l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Mt 4.4 ; Lc 4.4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le vêtement que tu portais ne s’est pas usé sur toi et tes pieds ne se sont pas enflés pendant ces quarante ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ainsi, en y réfléchissant, tu reconnaîtras que l’Eternel ton Dieu fait ton éducation comme un père éduque son enfant. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Obéis donc à ses commandements, marche sur les chemins qu’il te prescrit et ainsi crains-le. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Car l’Eternel ton Dieu va te faire entrer dans un bon pays, un pays plein de cours d’eau, de sources et de nappes souterraines qui s’épandent dans la plaine et la montagne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C’est un pays où poussent le froment et l’orge, la vigne, les figuiers et les grenadiers, un pays d’oliviers, d’huile et de miel '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: où tu ne mangeras pas parcimonieusement, un pays où tu ne manqueras de rien, dont les roches contiennent du fer, et où tu pourras extraire du cuivre des montagnes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le cuivre et le fer abondaient dans la vallée au sud de la mer Morte. Salomon y a exploité des mines de cuivre qui restent en activité aujourd’hui (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.45-46
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
