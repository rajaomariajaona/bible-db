document_id: SNG.8,21
type_code: fra
verses:
  '1':
  - type: text
    content: Ah, que n’es-tu mon frère
  - type: text
    content: allaité par ma mère !
  - type: text
    content: Te rencontrant dehors, ╵je pourrais t’embrasser
  - type: text
    content: sans que l’on me méprise,
  '10':
  - type: text
    content: Moi, je suis un rempart,
  - type: text
    content: mes seins en sont les tours.
  - type: text
    content: Aussi ai-je trouvé la paix, ╵auprès de lui. »
  - type: heading
    content: La vigne de Salomon
  '11':
  - type: text
    content: « Salomon avait une vigne ╵à Baal-Hamôn
  - type: note
    content: 'Baal-Hamôn: lieu non identifié ; il s’agit peut-être d’un nom symbolique, signifiant : maître d’une multitude, et faisant allusion au harem de Salomon.'
  - type: text
    content: ','
  - type: text
    content: il la remit à des gardiens.
  - type: text
    content: Pour en payer le fruit, ╵chacun d’eux lui donnait ╵un millier de pièces d’argent.
  '12':
  - type: text
    content: Ma vigne à moi est devant moi.
  - type: text
    content: Toi, Salomon, tu peux avoir ╵ton millier de pièces d’argent,
  - type: text
    content: puis, deux cents pièces ╵seront données à ceux ╵qui ont gardé ses fruits. »
  - type: heading
    content: Fais-moi entendre ta voix
  '13':
  - type: text
    content: « Toi qui habites les jardins,
  - type: text
    content: des compagnons prêtent l’oreille,
  - type: text
    content: oh ! fais-moi entendre ta voix ! »
  '14':
  - type: text
    content: « Enfuis-toi vite, toi mon bien-aimé,
  - type: text
    content: et sois pareil à la gazelle ╵ou à un jeune faon,
  - type: text
    content: sur les monts embaumés. »
  '2':
  - type: text
    content: je pourrais t’emmener, ╵je te ferais entrer ╵au foyer de ma mère,
  - type: text
    content: de celle qui m’a enseignée
  - type: note
    content: 'Autre traduction : là, tu m’enseignerais.'
  - type: text
    content: et je te ferais boire ╵du bon vin parfumé
  - type: text
    content: de mon jus de grenades.
  '3':
  - type: text
    content: Son bras gauche soutient ma tête,
  - type: text
    content: et son bras droit m’enlace.
  '4':
  - type: text
    content: O filles de Jérusalem, ╵oh, je vous en conjure,
  - type: text
    content: n’éveillez pas, ╵non, ne réveillez pas l’amour
  - type: text
    content: avant qu’il ne le veuille
  - type: note
    content: Voir 2.7 et note ; 3.5.
  - type: text
    content: . »
  - type: heading
    content: Le chœur
  '5':
  - type: text
    content: « Qui donc est celle-ci ╵qui monte du désert
  - type: text
    content: s’appuyant sur son bien-aimé ? »
  - type: heading
    content: 'L’amour : fort comme la mort'
  - type: text
    content: « C’est dessous le pommier ╵que je t’ai réveillé,
  - type: text
    content: à l’endroit où ta mère ╵t’avait conçu,
  - type: text
    content: oui, au lieu même où te conçut ╵celle qui devait t’enfanter.
  '6':
  - type: text
    content: Mets-moi comme un sceau
  - type: note
    content: Le sceau imprimait le signe d’authenticité sur les actes officiels (il remplaçait notre signature). On le portait toujours avec soi, attaché à un cordon autour du cou (sur ton cœur) ou porté au doigt (sur ton bras).
  - type: text
    content: ' sur ton cœur,'
  - type: text
    content: comme un sceau sur ton bras.
  - type: text
    content: L’amour est fort ╵comme la mort,
  - type: text
    content: et la passion ╵est inflexible ╵comme le séjour des défunts.
  - type: text
    content: Les flammes de l’amour ╵sont des flammes ardentes,
  - type: text
    content: une flamme venant de l’Eternel
  - type: note
    content: 'Autre traduction : une flamme intense à l’extrême.'
  - type: text
    content: .
  '7':
  - type: text
    content: Même de grosses eaux ╵ne peuvent éteindre l’amour,
  - type: text
    content: et des fleuves puissants ╵ne l’emporteront pas.
  - type: text
    content: L’homme qui offrirait ╵tous les biens qu’il possède ╵pour acheter l’amour
  - type: text
    content: n’obtiendrait que mépris. »
  - type: heading
    content: La petite sœur
  '8':
  - type: text
    content: « Nous avons une sœur,
  - type: text
    content: elle est petite encore, ╵sa poitrine n’est pas formée,
  - type: text
    content: que ferons-nous pour notre sœur
  - type: text
    content: lorsqu’il sera question ╵de la marier ? »
  '9':
  - type: text
    content: « Si elle est un rempart,
  - type: text
    content: nous bâtirons sur elle ╵des créneaux en argent.
  - type: text
    content: Si elle est une porte,
  - type: text
    content: nous, nous la bloquerons ╵d’un madrier de cèdre.
