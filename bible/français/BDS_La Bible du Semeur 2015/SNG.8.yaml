document_id: SNG.8
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ah, que n’es-tu mon frère
- type: usfm
  marker: q1
  children:
  - type: text
    text: allaité par ma mère !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te rencontrant dehors, ╵je pourrais t’embrasser
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que l’on me méprise,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: je pourrais t’emmener, ╵je te ferais entrer ╵au foyer de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de celle qui m’a enseignée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: là, tu m’enseignerais.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te ferais boire ╵du bon vin parfumé
- type: usfm
  marker: q1
  children:
  - type: text
    text: de mon jus de grenades.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Son bras gauche soutient ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son bras droit m’enlace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O filles de Jérusalem, ╵oh, je vous en conjure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’éveillez pas, ╵non, ne réveillez pas l’amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu’il ne le veuille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.7'
        metadata:
          usfm: SNG.2.7
      - type: text
        text: ' et note ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.5'
        metadata:
          usfm: SNG.3.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chœur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: « Qui donc est celle-ci ╵qui monte du désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’appuyant sur son bien-aimé ? »
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'L’amour : fort comme la mort'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: « C’est dessous le pommier ╵que je t’ai réveillé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’endroit où ta mère ╵t’avait conçu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, au lieu même où te conçut ╵celle qui devait t’enfanter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mets-moi comme un sceau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sceau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: imprimait le signe d’authenticité sur les actes officiels (il remplaçait notre signature). On le portait toujours avec soi, attaché à un cordon autour du cou (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur ton cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ou porté au doigt (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur ton bras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' sur ton cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un sceau sur ton bras.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’amour est fort ╵comme la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la passion ╵est inflexible ╵comme le séjour des défunts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les flammes de l’amour ╵sont des flammes ardentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une flamme venant de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une flamme intense à l’extrême.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Même de grosses eaux ╵ne peuvent éteindre l’amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des fleuves puissants ╵ne l’emporteront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’homme qui offrirait ╵tous les biens qu’il possède ╵pour acheter l’amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: n’obtiendrait que mépris. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La petite sœur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: « Nous avons une sœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est petite encore, ╵sa poitrine n’est pas formée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ferons-nous pour notre sœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu’il sera question ╵de la marier ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Si elle est un rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous bâtirons sur elle ╵des créneaux en argent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si elle est une porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous, nous la bloquerons ╵d’un madrier de cèdre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moi, je suis un rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes seins en sont les tours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi ai-je trouvé la paix, ╵auprès de lui. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vigne de Salomon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: « Salomon avait une vigne ╵à Baal-Hamôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Baal-Hamôn
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lieu non identifié ; il s’agit peut-être d’un nom symbolique, signifiant : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maître d’une multitude, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: et faisant allusion au harem de Salomon.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il la remit à des gardiens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour en payer le fruit, ╵chacun d’eux lui donnait ╵un millier de pièces d’argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ma vigne à moi est devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, Salomon, tu peux avoir ╵ton millier de pièces d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis, deux cents pièces ╵seront données à ceux ╵qui ont gardé ses fruits. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fais-moi entendre ta voix
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: « Toi qui habites les jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des compagnons prêtent l’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oh ! fais-moi entendre ta voix ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: « Enfuis-toi vite, toi mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sois pareil à la gazelle ╵ou à un jeune faon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les monts embaumés. »
