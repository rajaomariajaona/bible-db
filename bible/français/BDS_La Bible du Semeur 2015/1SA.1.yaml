document_id: 1SA.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La fin de l’époque des chefs
  - type: heading
    content: Anne et Peninna
  - type: text
    content: Un homme nommé Elqana
  - type: note
    content: Elqana devait être un lévite de la lignée de Qehath et de la famille de Qoré (1 Ch 6.18-23) dont les descendants officiaient comme musiciens dans le sanctuaire.
  - type: text
    content: ' vivait à Ramataïm-Tsophim'
  - type: note
    content: Probablement Rama de Benjamin (2.11 ; Jos 18.25).
  - type: text
    content: ', dans la région montagneuse d’Ephraïm ; il était fils de Yeroham et petit-fils d’Elihou, de la famille de Tohou, descendant de Tsouph, un Ephraïmite'
  - type: note
    content: Ceci peut simplement signifier qu’Elqana habitait le territoire d’Ephraïm, dans une des villes d’Ephraïm données aux lévites (Jos 21.20-21).
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Très affligée, Anne pria l’Eternel en pleurant à chaudes larmes. '
  '11':
  - type: text
    content: 'Alors elle fit le vœu suivant : Eternel, Seigneur des armées célestes, si tu veux bien considérer la misère de ta servante et si tu interviens en ma faveur, si tu ne délaisses pas ta servante et si tu me donnes un fils, alors je te le consacrerai pour toute sa vie ; ses cheveux et sa barbe ne seront jamais coupés'
  - type: note
    content: Voir Nb 6.1-21.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Comme elle priait longuement devant l’Eternel, Eli observait le mouvement de ses lèvres. '
  '13':
  - type: text
    content: 'Anne priait intérieurement : ses lèvres bougeaient, mais on n’entendait pas sa voix. Eli pensa qu’elle était ivre '
  '14':
  - type: text
    content: 'et il l’interpella : Combien de temps encore veux-tu étaler ton ivresse ? Va cuver ton vin ailleurs !'
  '15':
  - type: text
    content: 'Anne lui répondit : Non, monseigneur, je ne suis pas ivre, je n’ai bu ni vin ni boisson alcoolisée, mais je suis très malheureuse et j’épanchais mon cœur devant l’Eternel. '
  '16':
  - type: text
    content: Ne me juge pas mal et ne me considère pas comme une femme perverse. Si j’ai prié aussi longtemps, c’est parce que mon cœur débordait de chagrin et de douleur.
  '17':
  - type: text
    content: – Dans ce cas, lui dit Eli, va en paix, et que le Dieu d’Israël exauce la requête que tu lui as adressée.
  '18':
  - type: text
    content: 'Anne répondit : Je me recommande à ta bienveillance.'
  - type: text
    content: Puis elle s’en alla, se restaura et son visage fut différent.
  '19':
  - type: text
    content: 'Le lendemain, de bon matin, Elqana et sa famille se prosternèrent devant l’Eternel, puis ils rentrèrent chez eux à Rama. Elqana s’unit à Anne, sa femme, et l’Eternel intervint en sa faveur. '
  '2':
  - type: text
    content: 'Il avait épousé deux femmes : l’une s’appelait Anne et l’autre Peninna. Peninna avait des enfants, mais Anne n’en avait pas. '
  '20':
  - type: text
    content: Elle fut enceinte et, au terme de sa grossesse, elle mit au monde un garçon auquel elle donna le nom de Samuel (Dieu a entendu) car, dit-elle, « je l’ai demandé à l’Eternel
  - type: note
    content: En hébreu, le nom Samuel fait assonance avec le verbe entendre, exaucer.
  - type: text
    content: '  ».'
  - type: heading
    content: Anne consacre son enfant à Dieu
  '21':
  - type: text
    content: 'L’année suivante, Elqana se rendit de nouveau à Silo avec toute sa famille pour offrir à l’Eternel le sacrifice annuel et pour accomplir le vœu qu’il avait fait. '
  '22':
  - type: text
    content: 'Mais Anne ne l’accompagna pas. Elle dit en effet à son mari : J’attends que l’enfant soit sevré'
  - type: note
    content: Ce qui, selon les habitudes de ces pays, pouvait durer trois ans ou plus.
  - type: text
    content: ', alors je l’emmènerai à Silo pour le présenter à l’Eternel et il restera là-bas pour toujours.'
  '23':
  - type: text
    content: 'Son mari lui dit : Fais comme tu le juges bon et attends de l’avoir sevré. Que la promesse de l’Eternel se réalise.'
  - type: text
    content: Anne resta donc à la maison pour allaiter son enfant jusqu’à ce qu’il soit sevré.
  '24':
  - type: text
    content: A ce moment-là, elle l’emmena avec elle au sanctuaire de l’Eternel à Silo, en apportant un taureau de trois ans
  - type: note
    content: 'D’après le manuscrit hébreu de Qumrân, l’ancienne version grecque et la version syriaque ; le texte hébreu traditionnel a : trois taureaux.'
  - type: text
    content: ', dix kilogrammes de farine et une outre de vin. Le garçon était encore tout jeune. '
  '25':
  - type: text
    content: 'Ils offrirent le taureau en sacrifice et présentèrent l’enfant à Eli. '
  '26':
  - type: text
    content: 'Anne lui dit : Excuse-moi, monseigneur, aussi vrai que tu vis, monseigneur, je suis cette femme qui se tenait près de toi, ici même, pour prier l’Eternel. '
  '27':
  - type: text
    content: 'C’était pour obtenir cet enfant que je priais, et l’Eternel m’a accordé ce que je lui demandais. '
  '28':
  - type: text
    content: 'A mon tour, je veux le consacrer à l’Eternel : pour toute sa vie, il lui sera consacré.'
  - type: text
    content: Là-dessus, ils se prosternèrent
  - type: note
    content: 'D’après certains manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et la Vulgate ; le texte hébreu traditionnel a : il se prosterna.'
  - type: text
    content: ' là devant l’Eternel.'
  '3':
  - type: text
    content: Chaque année, Elqana se rendait de sa ville à Silo
  - type: note
    content: Le coffre de l’alliance et la tente de la Rencontre (3.3 ; Jos 18.1) se trouvaient à une trentaine de kilomètres au nord de Jérusalem. Chaque année, tous les Israélites devaient se rendre trois fois au sanctuaire central (Ex 23.14-19 ; 34.23 ; Dt 16.16-17).
  - type: text
    content: ' pour y adorer l’Eternel, le Seigneur des armées célestes, et pour lui offrir des sacrifices. Les deux fils d’Eli, Hophni et Phinéas, y officiaient comme prêtres de l’Eternel. '
  '4':
  - type: text
    content: 'Le jour où Elqana offrait son sacrifice, il attribuait des parts de viande à sa femme Peninna et à tous ses enfants, '
  '5':
  - type: text
    content: 'et il donnait une double part à Anne parce qu’il l’aimait, bien que le Seigneur l’ait empêchée d’avoir des enfants. '
  '6':
  - type: text
    content: 'Sa rivale ne cessait de la vexer pour l’irriter contre Dieu de ce qu’il l’ait rendue stérile. '
  '7':
  - type: text
    content: 'Cela se reproduisait chaque année : toutes les fois qu’Anne se rendait au sanctuaire de l’Eternel, Peninna l’exaspérait. Alors Anne pleurait et restait sans manger. '
  '8':
  - type: text
    content: 'Elqana lui demandait : Anne, pourquoi pleures-tu ? Pourquoi restes-tu sans manger ? Pourquoi es-tu si malheureuse ? Est-ce que je ne vaux pas mieux pour toi que dix fils ?'
  - type: heading
    content: La prière d’Anne
  '9':
  - type: text
    content: 'Cette fois-ci, après qu’on eut mangé et bu à Silo, Anne se leva et se rendit au sanctuaire de l’Eternel. Le prêtre Eli y était assis sur son siège près de la porte. '
