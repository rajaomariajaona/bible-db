document_id: 1SA.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La fin de l’époque des chefs
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anne et Peninna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un homme nommé Elqana
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Elqana devait être un lévite de la lignée de Qehath et de la famille de Qoré (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 6.18-23
        metadata:
          usfm: 1CH.6.18+1CH.6.19+1CH.6.20+1CH.6.21+1CH.6.22+1CH.6.23
      - type: text
        text: ) dont les descendants officiaient comme musiciens dans le sanctuaire.
    marker-yv: yv-n
  - type: text
    text: ' vivait à Ramataïm-Tsophim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement Rama de Benjamin (2.11 ; Jos 18.25).
    marker-yv: yv-n
  - type: text
    text: ', dans la région montagneuse d’Ephraïm ; il était fils de Yeroham et petit-fils d’Elihou, de la famille de Tohou, descendant de Tsouph, un Ephraïmite'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ceci peut simplement signifier qu’Elqana habitait le territoire d’Ephraïm, dans une des villes d’Ephraïm données aux lévites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21.20-21
        metadata:
          usfm: JOS.21.20+JOS.21.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait épousé deux femmes : l’une s’appelait Anne et l’autre Peninna. Peninna avait des enfants, mais Anne n’en avait pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Chaque année, Elqana se rendait de sa ville à Silo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le coffre de l’alliance et la tente de la Rencontre (3.3 ; Jos 18.1) se trouvaient à une trentaine de kilomètres au nord de Jérusalem. Chaque année, tous les Israélites devaient se rendre trois fois au sanctuaire central (Ex 23.14-19 ; 34.23 ; Dt 16.16-17).
    marker-yv: yv-n
  - type: text
    text: ' pour y adorer l’Eternel, le Seigneur des armées célestes, et pour lui offrir des sacrifices. Les deux fils d’Eli, Hophni et Phinéas, y officiaient comme prêtres de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le jour où Elqana offrait son sacrifice, il attribuait des parts de viande à sa femme Peninna et à tous ses enfants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et il donnait une double part à Anne parce qu’il l’aimait, bien que le Seigneur l’ait empêchée d’avoir des enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sa rivale ne cessait de la vexer pour l’irriter contre Dieu de ce qu’il l’ait rendue stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cela se reproduisait chaque année : toutes les fois qu’Anne se rendait au sanctuaire de l’Eternel, Peninna l’exaspérait. Alors Anne pleurait et restait sans manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elqana lui demandait : Anne, pourquoi pleures-tu ? Pourquoi restes-tu sans manger ? Pourquoi es-tu si malheureuse ? Est-ce que je ne vaux pas mieux pour toi que dix fils ?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prière d’Anne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Cette fois-ci, après qu’on eut mangé et bu à Silo, Anne se leva et se rendit au sanctuaire de l’Eternel. Le prêtre Eli y était assis sur son siège près de la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Très affligée, Anne pria l’Eternel en pleurant à chaudes larmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors elle fit le vœu suivant : Eternel, Seigneur des armées célestes, si tu veux bien considérer la misère de ta servante et si tu interviens en ma faveur, si tu ne délaisses pas ta servante et si tu me donnes un fils, alors je te le consacrerai pour toute sa vie ; ses cheveux et sa barbe ne seront jamais coupés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 6.1-21
        metadata:
          usfm: NUM.6.1+NUM.6.2+NUM.6.3+NUM.6.4+NUM.6.5+NUM.6.6+NUM.6.7+NUM.6.8+NUM.6.9+NUM.6.10+NUM.6.11+NUM.6.12+NUM.6.13+NUM.6.14+NUM.6.15+NUM.6.16+NUM.6.17+NUM.6.18+NUM.6.19+NUM.6.20+NUM.6.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme elle priait longuement devant l’Eternel, Eli observait le mouvement de ses lèvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Anne priait intérieurement : ses lèvres bougeaient, mais on n’entendait pas sa voix. Eli pensa qu’elle était ivre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et il l’interpella : Combien de temps encore veux-tu étaler ton ivresse ? Va cuver ton vin ailleurs !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Anne lui répondit : Non, monseigneur, je ne suis pas ivre, je n’ai bu ni vin ni boisson alcoolisée, mais je suis très malheureuse et j’épanchais mon cœur devant l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ne me juge pas mal et ne me considère pas comme une femme perverse. Si j’ai prié aussi longtemps, c’est parce que mon cœur débordait de chagrin et de douleur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: – Dans ce cas, lui dit Eli, va en paix, et que le Dieu d’Israël exauce la requête que tu lui as adressée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anne répondit : Je me recommande à ta bienveillance.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Puis elle s’en alla, se restaura et son visage fut différent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le lendemain, de bon matin, Elqana et sa famille se prosternèrent devant l’Eternel, puis ils rentrèrent chez eux à Rama. Elqana s’unit à Anne, sa femme, et l’Eternel intervint en sa faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle fut enceinte et, au terme de sa grossesse, elle mit au monde un garçon auquel elle donna le nom de Samuel (Dieu a entendu) car, dit-elle, « je l’ai demandé à l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Samuel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec le verbe '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entendre, exaucer.
    marker-yv: yv-n
  - type: text
    text: '  ».'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anne consacre son enfant à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’année suivante, Elqana se rendit de nouveau à Silo avec toute sa famille pour offrir à l’Eternel le sacrifice annuel et pour accomplir le vœu qu’il avait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Anne ne l’accompagna pas. Elle dit en effet à son mari : J’attends que l’enfant soit sevré'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce qui, selon les habitudes de ces pays, pouvait durer trois ans ou plus.
    marker-yv: yv-n
  - type: text
    text: ', alors je l’emmènerai à Silo pour le présenter à l’Eternel et il restera là-bas pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Son mari lui dit : Fais comme tu le juges bon et attends de l’avoir sevré. Que la promesse de l’Eternel se réalise.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Anne resta donc à la maison pour allaiter son enfant jusqu’à ce qu’il soit sevré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A ce moment-là, elle l’emmena avec elle au sanctuaire de l’Eternel à Silo, en apportant un taureau de trois ans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le manuscrit hébreu de Qumrân, l’ancienne version grecque et la version syriaque ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: trois taureaux.
    marker-yv: yv-n
  - type: text
    text: ', dix kilogrammes de farine et une outre de vin. Le garçon était encore tout jeune. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils offrirent le taureau en sacrifice et présentèrent l’enfant à Eli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Anne lui dit : Excuse-moi, monseigneur, aussi vrai que tu vis, monseigneur, je suis cette femme qui se tenait près de toi, ici même, pour prier l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’était pour obtenir cet enfant que je priais, et l’Eternel m’a accordé ce que je lui demandais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A mon tour, je veux le consacrer à l’Eternel : pour toute sa vie, il lui sera consacré.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Là-dessus, ils se prosternèrent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après certains manuscrits hébreux, certains manuscrits de l’ancienne version grecque, la version syriaque et la Vulgate ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il se prosterna.
    marker-yv: yv-n
  - type: text
    text: ' là devant l’Eternel.'
