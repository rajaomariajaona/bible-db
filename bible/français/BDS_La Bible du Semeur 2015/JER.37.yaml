document_id: JER.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie pendant le siège
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Première consultation par le roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sédécias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (597 à 587 av. J.-C.), voir 2 R 24.17 à 25.7.
    marker-yv: yv-n
  - type: text
    text: ', fils de Josias, fut établi roi sur le pays de Juda par Nabuchodonosor, roi de Babylone, à la place de Konia, fils de Yehoyaqim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ni lui, ni ses hauts fonctionnaires, ni la population du pays, n’obéissaient aux paroles que l’Eternel avait communiquées par l’intermédiaire du prophète Jérémie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toutefois, le roi Sédécias envoya Yehoukal, fils de Shélémia, et le prêtre Sophonie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sophonie
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'le même que celui dont il est question en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.1'
        metadata:
          usfm: JER.21.1
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29.25-29
        metadata:
          usfm: JER.29.25+JER.29.26+JER.29.27+JER.29.28+JER.29.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Maaséya, auprès du prophète Jérémie pour lui dire : Veuille intercéder pour nous auprès de l’Eternel notre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A cette époque, Jérémie n’avait pas encore été mis en prison, il pouvait circuler librement parmi le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’armée du pharaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit du pharaon Hophra (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '44.30'
        metadata:
          usfm: JER.44.30
      - type: text
        text: ). Il est sans doute venu à la demande de Sédécias.
    marker-yv: yv-n
  - type: text
    text: ' avait quitté l’Egypte ; les Chaldéens, qui assiégeaient Jérusalem, avaient appris la nouvelle et avaient levé le siège. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors l’Eternel adressa la parole au prophète Jérémie en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ce que déclare l’Eternel, Dieu d’Israël : Tu répondras ainsi au roi de Juda qui vous a envoyés pour me consulter : L’armée du pharaon qui s’était mise en marche pour vous secourir va rentrer chez elle en Egypte'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Egypte, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui a été rapidement vaincue par Nabuchodonosor (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 30.21
        metadata:
          usfm: EZK.30.21
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et les Chaldéens reviendront attaquer cette ville ; ils s’en empareront et ils y mettront le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce que déclare l’Eternel : Ne vous faites pas d’illusions en vous imaginant que les Chaldéens vont se retirer définitivement de chez vous car ils ne partiront pas ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et même si vous réussissiez à battre toute l’armée des Chaldéens qui vous font la guerre, et s’il n’en restait que quelques hommes atteints par les lances ou les flèches, chacun dans sa tente, eh bien, ils se relèveraient et mettraient le feu à cette ville.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Au cachot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque l’armée des Chaldéens leva le siège de Jérusalem à l’approche des forces du pharaon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jérémie voulut sortir de la ville pour se rendre dans le territoire de Benjamin afin de prendre possession d’un terrain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Peut-être s’agit-il du terrain acheté à son cousin Hanaméel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32.1-14
        metadata:
          usfm: JER.32.1+JER.32.2+JER.32.3+JER.32.4+JER.32.5+JER.32.6+JER.32.7+JER.32.8+JER.32.9+JER.32.10+JER.32.11+JER.32.12+JER.32.13+JER.32.14
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' au milieu de la population locale.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais quand il fut arrivé à la porte de Benjamin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'La porte de Benjamin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était au nord de la ville.
    marker-yv: yv-n
  - type: text
    text: ', il fut arrêté par le chef de la garde nommé Yiriya, fils de Shélémia et petit-fils de Hanania, qui lui dit : Tu veux passer aux Chaldéens !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jérémie lui répondit : C’est faux, je n’ai aucune intention de passer aux Chaldéens.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Yiriya ne voulut rien entendre, il se saisit de Jérémie et l’amena aux ministres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ceux-ci s’emportèrent contre le prophète, le firent battre et incarcérer dans la maison de Jonathan le secrétaire, qui avait été transformée en prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jérémie fut jeté dans un cachot voûté et il y resta longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Par la suite, le roi Sédécias l’envoya chercher pour l’interroger secrètement dans son palais. Il lui demanda : As-tu un message de la part de l’Eternel ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Il y en a un, répondit Jérémie : tu tomberas entre les mains du roi de Babylone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis Jérémie demanda au roi Sédécias : Quel crime ai-je commis contre toi, contre tes hauts fonctionnaires et contre ce peuple pour que vous m’ayez jeté en prison ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Que sont devenus vos prophètes qui vous prophétisaient que le roi de Babylone ne reviendrait plus ni contre vous, ni contre ce pays ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Maintenant, mon seigneur le roi, écoute-moi, je te prie, et veuille accéder à ma supplication : ne me renvoie pas dans la maison du secrétaire Jonathan, afin que je n’y trouve pas la mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors le roi Sédécias ordonna de transférer Jérémie dans la cour du corps de garde et de lui fournir chaque jour une miche de pain de la rue des boulangers, jusqu’à ce qu’il n’y ait plus de pain dans la ville. Ainsi Jérémie demeura dans la cour du corps de garde.
