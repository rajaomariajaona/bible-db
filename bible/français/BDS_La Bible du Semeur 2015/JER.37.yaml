document_id: JER.37,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie pendant le siège
  - type: heading
    content: Première consultation par le roi
  - type: text
    content: Sédécias
  - type: note
    content: Sur Sédécias (597 à 587 av. J.-C.), voir 2 R 24.17 à 25.7.
  - type: text
    content: ', fils de Josias, fut établi roi sur le pays de Juda par Nabuchodonosor, roi de Babylone, à la place de Konia, fils de Yehoyaqim. '
  '10':
  - type: text
    content: Et même si vous réussissiez à battre toute l’armée des Chaldéens qui vous font la guerre, et s’il n’en restait que quelques hommes atteints par les lances ou les flèches, chacun dans sa tente, eh bien, ils se relèveraient et mettraient le feu à cette ville.
  - type: heading
    content: Au cachot
  '11':
  - type: text
    content: 'Lorsque l’armée des Chaldéens leva le siège de Jérusalem à l’approche des forces du pharaon, '
  '12':
  - type: text
    content: Jérémie voulut sortir de la ville pour se rendre dans le territoire de Benjamin afin de prendre possession d’un terrain
  - type: note
    content: Peut-être s’agit-il du terrain acheté à son cousin Hanaméel (voir 32.1-14).
  - type: text
    content: ' au milieu de la population locale.'
  '13':
  - type: text
    content: Mais quand il fut arrivé à la porte de Benjamin
  - type: note
    content: La porte de Benjamin était au nord de la ville.
  - type: text
    content: ', il fut arrêté par le chef de la garde nommé Yiriya, fils de Shélémia et petit-fils de Hanania, qui lui dit : Tu veux passer aux Chaldéens !'
  '14':
  - type: text
    content: 'Jérémie lui répondit : C’est faux, je n’ai aucune intention de passer aux Chaldéens.'
  - type: text
    content: 'Mais Yiriya ne voulut rien entendre, il se saisit de Jérémie et l’amena aux ministres. '
  '15':
  - type: text
    content: Ceux-ci s’emportèrent contre le prophète, le firent battre et incarcérer dans la maison de Jonathan le secrétaire, qui avait été transformée en prison.
  '16':
  - type: text
    content: 'Jérémie fut jeté dans un cachot voûté et il y resta longtemps. '
  '17':
  - type: text
    content: 'Par la suite, le roi Sédécias l’envoya chercher pour l’interroger secrètement dans son palais. Il lui demanda : As-tu un message de la part de l’Eternel ?'
  - type: text
    content: '– Il y en a un, répondit Jérémie : tu tomberas entre les mains du roi de Babylone.'
  '18':
  - type: text
    content: 'Puis Jérémie demanda au roi Sédécias : Quel crime ai-je commis contre toi, contre tes hauts fonctionnaires et contre ce peuple pour que vous m’ayez jeté en prison ? '
  '19':
  - type: text
    content: 'Que sont devenus vos prophètes qui vous prophétisaient que le roi de Babylone ne reviendrait plus ni contre vous, ni contre ce pays ? '
  '2':
  - type: text
    content: 'Ni lui, ni ses hauts fonctionnaires, ni la population du pays, n’obéissaient aux paroles que l’Eternel avait communiquées par l’intermédiaire du prophète Jérémie. '
  '20':
  - type: text
    content: 'Maintenant, mon seigneur le roi, écoute-moi, je te prie, et veuille accéder à ma supplication : ne me renvoie pas dans la maison du secrétaire Jonathan, afin que je n’y trouve pas la mort.'
  '21':
  - type: text
    content: Alors le roi Sédécias ordonna de transférer Jérémie dans la cour du corps de garde et de lui fournir chaque jour une miche de pain de la rue des boulangers, jusqu’à ce qu’il n’y ait plus de pain dans la ville. Ainsi Jérémie demeura dans la cour du corps de garde.
  '3':
  - type: text
    content: Toutefois, le roi Sédécias envoya Yehoukal, fils de Shélémia, et le prêtre Sophonie
  - type: note
    content: 'Sophonie: le même que celui dont il est question en 21.1 et 29.25-29.'
  - type: text
    content: ', fils de Maaséya, auprès du prophète Jérémie pour lui dire : Veuille intercéder pour nous auprès de l’Eternel notre Dieu.'
  '4':
  - type: text
    content: 'A cette époque, Jérémie n’avait pas encore été mis en prison, il pouvait circuler librement parmi le peuple. '
  '5':
  - type: text
    content: L’armée du pharaon
  - type: note
    content: Il s’agit du pharaon Hophra (44.30). Il est sans doute venu à la demande de Sédécias.
  - type: text
    content: ' avait quitté l’Egypte ; les Chaldéens, qui assiégeaient Jérusalem, avaient appris la nouvelle et avaient levé le siège. '
  '6':
  - type: text
    content: 'Alors l’Eternel adressa la parole au prophète Jérémie en ces termes : '
  '7':
  - type: text
    content: 'Voici ce que déclare l’Eternel, Dieu d’Israël : Tu répondras ainsi au roi de Juda qui vous a envoyés pour me consulter : L’armée du pharaon qui s’était mise en marche pour vous secourir va rentrer chez elle en Egypte'
  - type: note
    content: L’Egypte, qui a été rapidement vaincue par Nabuchodonosor (Ez 30.21 et note).
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'et les Chaldéens reviendront attaquer cette ville ; ils s’en empareront et ils y mettront le feu. '
  '9':
  - type: text
    content: 'Voici ce que déclare l’Eternel : Ne vous faites pas d’illusions en vous imaginant que les Chaldéens vont se retirer définitivement de chez vous car ils ne partiront pas ! '
