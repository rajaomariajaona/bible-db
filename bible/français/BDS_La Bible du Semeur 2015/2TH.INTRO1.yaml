type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: La deuxième lettre de Paul aux Thessaloniciens a aussi été écrite avec la collaboration de Silvain (Silas) et de Timothée. Elle fut probablement écrite peu de temps après la première (en 51 ou 52), de la ville de Corinthe où les trois collaborateurs étaient réunis.
  - type: text
    content: 'Paul continue à louer les chrétiens de Thessalonique pour leur foi et leur fermeté dans la persécution (chap. 1). Au chapitre 2.1-11 il corrige une erreur au sujet du retour de Christ : certains Thessaloniciens avaient conclu de la persécution que le jour du jugement était déjà là. L’apôtre leur dit que ce jour doit être précédé de l’apparition de « l’homme de la révolte », qui « s’élèvera au-dessus de tout ce qui porte le nom de Dieu et de tout ce qui est l’objet d’une vénération religieuse » (2.3-4).'
  - type: text
    content: Au chapitre 3, après leur avoir demandé leurs prières, il leur recommande de s’éloigner de ceux qui ne veulent pas travailler, peut-être parce que ces derniers pensaient que la fin des temps était imminente. « Que celui qui refuse de travailler renonce aussi à manger ! » (v. 10). Paul met ainsi en garde ceux qui croiraient que la foi implique une fuite hors du monde et de ses responsabilités.
