document_id: JOS.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le tirage au sort de l’ordre d’attribution de villes aux lévites
  - type: text
    content: 'Les chefs de groupe familial des lévites vinrent trouver le prêtre Eléazar, Josué, fils de Noun, et les chefs de groupe familial des autres tribus d’Israël '
  '10':
  - type: text
    content: 'aux descendants d’Aaron appartenant aux familles des Qehatites, descendants de Lévi, auxquels fut attribué par le sort le premier lot : '
  '11':
  - type: text
    content: 'Qiryath-Arba, c’est-à-dire la ville d’Arba, l’ancêtre d’Anaq, appelée Hébron. Cette ville est située dans la région montagneuse de Juda et fut donnée avec ses terres attenantes, '
  '12':
  - type: text
    content: 'mais les champs et les villages qui dépendaient de la ville furent donnés à Caleb, fils de Yephounné. '
  '13':
  - type: text
    content: 'On donna aux descendants du prêtre Aaron les villes suivantes, avec leurs terres attenantes : Hébron, la ville de refuge pour les meurtriers, Libna, '
  '14':
  - type: text
    content: 'Yattir, Eshtemoa, '
  '15':
  - type: text
    content: 'Holôn, Debir, '
  '16':
  - type: text
    content: Aïn
  - type: note
    content: 'Au lieu d’Aïn, l’ancienne version grecque a : Achan.'
  - type: text
    content: ', Youtta et Beth-Shémesh ; soit neuf villes avec leurs terres attenantes situées dans le territoire des tribus de Juda et de Siméon. '
  '17':
  - type: text
    content: 'Dans le territoire de la tribu de Benjamin, ils reçurent avec leurs terres attenantes : Gabaon, Guéba, '
  '18':
  - type: text
    content: 'Anatoth, Almôn, soit quatre villes. '
  '19':
  - type: text
    content: Au total treize villes et leurs terres attenantes pour les descendants du prêtre Aaron.
  - type: heading
    content: Les villes des Qehatites
  '2':
  - type: text
    content: 'à Silo, dans le pays de Canaan. Ils leur dirent : L’Eternel a ordonné par l’intermédiaire de Moïse de nous donner des villes pour que nous y habitions, avec leurs terres attenantes pour que nous y fassions paître notre bétail.'
  '20':
  - type: text
    content: Les autres lévites, appartenant aux familles des Qehatites
  - type: note
    content: Qui n’étaient pas prêtres puisqu’ils ne descendaient pas d’Aaron.
  - type: text
    content: ', obtinrent par tirage au sort des villes dans le territoire de la tribu d’Ephraïm '
  '21':
  - type: text
    content: 'avec leurs terres attenantes : Sichem, la ville de refuge, dans la région montagneuse d’Ephraïm, Guézer, '
  '22':
  - type: text
    content: 'Qibtsaïm, Beth-Horôn, soit quatre villes. '
  '23':
  - type: text
    content: 'Dans le territoire de la tribu de Dan, ils eurent, avec leurs terres attenantes : Elteqé, Guibbetôn, '
  '24':
  - type: text
    content: 'Ayalôn, Gath-Rimmôn, soit quatre villes. '
  '25':
  - type: text
    content: 'Dans le territoire de la demi-tribu de Manassé, ils reçurent, avec leurs terres attenantes : Taanak, Gath-Rimmôn'
  - type: note
    content: 'Au lieu de Gath-Rimmôn, déjà mentionnée au v. 24, l’ancienne version grecque a : Ibléam.'
  - type: text
    content: ', soit deux villes. '
  '26':
  - type: text
    content: Les autres familles des descendants de Qehath reçurent donc en tout dix villes avec leurs terres attenantes.
  - type: heading
    content: Les villes des descendants de Guershôn
  '27':
  - type: text
    content: 'Les familles de lévites issus de Guershôn reçurent, dans le territoire de la demi-tribu de Manassé, les villes suivantes avec leurs terres attenantes : Golân, la ville de refuge, dans le Basan, et Beéshtra, soit deux villes. '
  '28':
  - type: text
    content: 'Dans le territoire de la tribu d’Issacar, ils reçurent, avec leurs terres attenantes : Qishyôn, Dobrath, '
  '29':
  - type: text
    content: 'Yarmouth, Eyn-Gannim, soit quatre villes. '
  '3':
  - type: text
    content: Les Israélites prélevèrent donc sur leur patrimoine un certain nombre de villes avec leurs terres attenantes pour les donner aux lévites, conformément à l’ordre de l’Eternel
  - type: note
    content: Voir Nb 35.1-8.
  - type: text
    content: .
  '30':
  - type: text
    content: 'Dans le territoire de la tribu d’Aser, avec les terres attenantes : Misheal, Abdôn, '
  '31':
  - type: text
    content: 'Helqath, Rehob, soit quatre villes. '
  '32':
  - type: text
    content: 'Et dans le territoire de la tribu de Nephtali : Qédesh en Galilée, la ville de refuge, Hammoth-Dor et les terres attenantes, Qartân et les terres attenantes, soit trois villes. '
  '33':
  - type: text
    content: Les familles guershonites reçurent donc en tout treize villes avec leurs terres attenantes.
  - type: heading
    content: Les villes des descendants de Merari
  '34':
  - type: text
    content: 'Les familles des descendants de Merari reçurent, dans le territoire de la tribu de Zabulon, les villes suivantes avec leurs terres attenantes : Yoqneam, Qarta, '
  '35':
  - type: text
    content: 'Dimna, Nahalal, soit quatre villes. '
  '36':
  - type: text
    content: 'En Transjordanie, dans le territoire de la tribu de Ruben, ils reçurent avec leurs terres attenantes : Bétser, la ville de refuge, Yahats'
  - type: note
    content: Les v. 36 et 37 manquent dans les manuscrits hébreux les plus anciens mais ils se trouvent dans l’ancienne version grecque et la Vulgate, et ils ont leur parallèle en 1 Ch 6.62-66.
  - type: text
    content: ', '
  '37':
  - type: text
    content: 'Qedémoth, Méphaath, soit quatre villes. '
  '38':
  - type: text
    content: 'Et dans le territoire de la tribu de Gad, avec leurs terres attenantes : Ramoth en Galaad, la ville de refuge, Mahanaïm, '
  '39':
  - type: text
    content: 'Heshbôn, Yaezer, soit quatre villes. '
  '4':
  - type: text
    content: Le tirage au sort désigna en premier lieu les familles des Qehatites
  - type: note
    content: Voir Ex 6.16-25 ; Nb 3.17-19, 27-32.
  - type: text
    content: '. Parmi eux, les lévites qui descendaient du prêtre Aaron reçurent par tirage au sort treize villes situées dans les territoires de Juda, de Siméon et de Benjamin. '
  '40':
  - type: text
    content: Les descendants de Merari reçurent donc en tout par tirage au sort pour leurs familles, appartenant aux familles des lévites, douze villes.
  '41':
  - type: text
    content: 'Au total les lévites reçurent quarante-huit villes avec les terres attenantes dans les territoires des autres Israélites. '
  '42':
  - type: text
    content: Chacune de ces villes comprenait des terres attenantes servant de pâturages.
  - type: heading
    content: Dieu tient ses promesses
  '43':
  - type: text
    content: 'L’Eternel donna aux Israélites tout le pays qu’il avait promis par serment à leurs ancêtres. Ils en prirent possession et s’y établirent. '
  '44':
  - type: text
    content: 'L’Eternel leur accorda de vivre sans être inquiétés par aucun ennemi autour d’eux, comme il l’avait promis par serment à leurs ancêtres ; il leur donna la victoire sur tous leurs ennemis, aucun d’eux ne put leur résister. '
  '45':
  - type: text
    content: 'Ainsi toutes les promesses de bienfaits que l’Eternel avait données au peuple d’Israël s’accomplirent : aucune d’elles ne resta sans effet.'
  '5':
  - type: text
    content: 'Les autres Qehatites obtinrent par tirage au sort dix villes dans les territoires des familles de la tribu d’Ephraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  '6':
  - type: text
    content: 'Les Guershonites obtinrent par tirage au sort treize villes dans les territoires des familles des tribus d’Issacar, d’Aser, de Nephtali et de la demi-tribu de Manassé établie dans le Basan. '
  '7':
  - type: text
    content: 'Les Merarites reçurent pour leurs familles douze villes situées dans les territoires des tribus de Ruben, de Gad et de Zabulon. '
  '8':
  - type: text
    content: Les Israélites attribuèrent ces villes et leurs terres attenantes par le sort aux lévites, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse.
  - type: heading
    content: Les villes des descendants d’Aaron
  '9':
  - type: text
    content: 'Ils attribuèrent les villes suivantes désignées par leur nom et situées dans le territoire des tribus de Juda et de Siméon '
