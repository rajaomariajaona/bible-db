document_id: JOS.21,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le tirage au sort de l’ordre d’attribution de villes aux lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs de groupe familial des lévites vinrent trouver le prêtre Eléazar, Josué, fils de Noun, et les chefs de groupe familial des autres tribus d’Israël '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aux descendants d’Aaron appartenant aux familles des Qehatites, descendants de Lévi, auxquels fut attribué par le sort le premier lot : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qiryath-Arba, c’est-à-dire la ville d’Arba, l’ancêtre d’Anaq, appelée Hébron. Cette ville est située dans la région montagneuse de Juda et fut donnée avec ses terres attenantes, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais les champs et les villages qui dépendaient de la ville furent donnés à Caleb, fils de Yephounné. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On donna aux descendants du prêtre Aaron les villes suivantes, avec leurs terres attenantes : Hébron, la ville de refuge pour les meurtriers, Libna, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yattir, Eshtemoa, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Holôn, Debir, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aïn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au lieu d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Aïn, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Achan.
      marker-yv: yv-n
    - type: text
      text: ', Youtta et Beth-Shémesh ; soit neuf villes avec leurs terres attenantes situées dans le territoire des tribus de Juda et de Siméon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le territoire de la tribu de Benjamin, ils reçurent avec leurs terres attenantes : Gabaon, Guéba, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anatoth, Almôn, soit quatre villes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au total treize villes et leurs terres attenantes pour les descendants du prêtre Aaron.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les villes des Qehatites
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à Silo, dans le pays de Canaan. Ils leur dirent : L’Eternel a ordonné par l’intermédiaire de Moïse de nous donner des villes pour que nous y habitions, avec leurs terres attenantes pour que nous y fassions paître notre bétail.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres lévites, appartenant aux familles des Qehatites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Qui n’étaient pas prêtres puisqu’ils ne descendaient pas d’Aaron.
      marker-yv: yv-n
    - type: text
      text: ', obtinrent par tirage au sort des villes dans le territoire de la tribu d’Ephraïm '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec leurs terres attenantes : Sichem, la ville de refuge, dans la région montagneuse d’Ephraïm, Guézer, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qibtsaïm, Beth-Horôn, soit quatre villes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le territoire de la tribu de Dan, ils eurent, avec leurs terres attenantes : Elteqé, Guibbetôn, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ayalôn, Gath-Rimmôn, soit quatre villes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le territoire de la demi-tribu de Manassé, ils reçurent, avec leurs terres attenantes : Taanak, Gath-Rimmôn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gath-Rimmôn, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'déjà mentionnée au v. 24, l’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ibléam.
      marker-yv: yv-n
    - type: text
      text: ', soit deux villes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres familles des descendants de Qehath reçurent donc en tout dix villes avec leurs terres attenantes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les villes des descendants de Guershôn
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les familles de lévites issus de Guershôn reçurent, dans le territoire de la demi-tribu de Manassé, les villes suivantes avec leurs terres attenantes : Golân, la ville de refuge, dans le Basan, et Beéshtra, soit deux villes. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le territoire de la tribu d’Issacar, ils reçurent, avec leurs terres attenantes : Qishyôn, Dobrath, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yarmouth, Eyn-Gannim, soit quatre villes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Israélites prélevèrent donc sur leur patrimoine un certain nombre de villes avec leurs terres attenantes pour les donner aux lévites, conformément à l’ordre de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 35.1-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le territoire de la tribu d’Aser, avec les terres attenantes : Misheal, Abdôn, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Helqath, Rehob, soit quatre villes. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dans le territoire de la tribu de Nephtali : Qédesh en Galilée, la ville de refuge, Hammoth-Dor et les terres attenantes, Qartân et les terres attenantes, soit trois villes. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les familles guershonites reçurent donc en tout treize villes avec leurs terres attenantes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les villes des descendants de Merari
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les familles des descendants de Merari reçurent, dans le territoire de la tribu de Zabulon, les villes suivantes avec leurs terres attenantes : Yoqneam, Qarta, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dimna, Nahalal, soit quatre villes. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En Transjordanie, dans le territoire de la tribu de Ruben, ils reçurent avec leurs terres attenantes : Bétser, la ville de refuge, Yahats'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 36 et 37 manquent dans les manuscrits hébreux les plus anciens mais ils se trouvent dans l’ancienne version grecque et la Vulgate, et ils ont leur parallèle en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 6.62-66
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qedémoth, Méphaath, soit quatre villes. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dans le territoire de la tribu de Gad, avec leurs terres attenantes : Ramoth en Galaad, la ville de refuge, Mahanaïm, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Heshbôn, Yaezer, soit quatre villes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le tirage au sort désigna en premier lieu les familles des Qehatites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 6.16-25 ; Nb 3.17-19, 27-32.
      marker-yv: yv-n
    - type: text
      text: '. Parmi eux, les lévites qui descendaient du prêtre Aaron reçurent par tirage au sort treize villes situées dans les territoires de Juda, de Siméon et de Benjamin. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les descendants de Merari reçurent donc en tout par tirage au sort pour leurs familles, appartenant aux familles des lévites, douze villes.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au total les lévites reçurent quarante-huit villes avec les terres attenantes dans les territoires des autres Israélites. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Chacune de ces villes comprenait des terres attenantes servant de pâturages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu tient ses promesses
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel donna aux Israélites tout le pays qu’il avait promis par serment à leurs ancêtres. Ils en prirent possession et s’y établirent. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel leur accorda de vivre sans être inquiétés par aucun ennemi autour d’eux, comme il l’avait promis par serment à leurs ancêtres ; il leur donna la victoire sur tous leurs ennemis, aucun d’eux ne put leur résister. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi toutes les promesses de bienfaits que l’Eternel avait données au peuple d’Israël s’accomplirent : aucune d’elles ne resta sans effet.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les autres Qehatites obtinrent par tirage au sort dix villes dans les territoires des familles de la tribu d’Ephraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Guershonites obtinrent par tirage au sort treize villes dans les territoires des familles des tribus d’Issacar, d’Aser, de Nephtali et de la demi-tribu de Manassé établie dans le Basan. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Merarites reçurent pour leurs familles douze villes situées dans les territoires des tribus de Ruben, de Gad et de Zabulon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Israélites attribuèrent ces villes et leurs terres attenantes par le sort aux lévites, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les villes des descendants d’Aaron
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils attribuèrent les villes suivantes désignées par leur nom et situées dans le territoire des tribus de Juda et de Siméon '
