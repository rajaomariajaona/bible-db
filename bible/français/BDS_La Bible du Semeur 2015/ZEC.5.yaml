document_id: ZEC.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rouleau volant
  - type: text
    content: 'Je levai de nouveau les yeux et je vis un rouleau manuscrit qui volait. '
  '10':
  - type: text
    content: 'Je demandai à l’ange chargé de me parler : Où emportent-elles le boisseau ?'
  '11':
  - type: text
    content: 'Il me répondit : Elles l’emportent en Babylonie'
  - type: note
    content: Pays de l’idolâtrie. La méchanceté devra être éliminée du pays d’Israël pour qu’il devienne pleinement la « terre sacrée » (2.16).
  - type: text
    content: ', où elles lui bâtiront un sanctuaire. Lorsqu’il sera prêt, on le fixera là sur son piédestal.'
  '2':
  - type: text
    content: 'L’ange me demanda : Que vois-tu ?'
  - type: text
    content: 'Je lui répondis : Je vois un rouleau qui vole, il a dix mètres de long et cinq de large.'
  '3':
  - type: text
    content: 'Alors il me dit : Ce rouleau représente la malédiction divine qui se répand sur tout le pays. Sur l’une de ses faces, il est écrit que tout voleur sera chassé d’ici, et sur l’autre, que tous ceux qui prononcent de faux serments seront chassés d’ici. '
  '4':
  - type: text
    content: 'Je ferai venir cette malédiction – le Seigneur des armées célestes le déclare – pour qu’elle atteigne la maison de chaque voleur et celle des gens qui prêtent par mon nom de faux serments : elle s’établira dans cette maison et la détruira complètement, jusqu’aux poutres et aux pierres.'
  - type: heading
    content: Le boisseau
  '5':
  - type: text
    content: 'Puis l’ange chargé de me parler sortit et me dit : Lève les yeux et regarde ce qui vient là.'
  '6':
  - type: text
    content: – Qu’est-ce ? lui demandai-je.
  - type: text
    content: 'Il me répondit : C’est un boisseau qui vient'
  - type: note
    content: Le boisseau était la plus grande mesure de capacité des Hébreux.
  - type: text
    content: .
  - type: text
    content: 'Puis il ajouta : Il représente le péché du peuple'
  - type: note
    content: 'le péché du peuple: dans le texte hébreu traditionnel, leur œil, ce qui vient d’une légère différence en hébreu, corrigée par les versions.'
  - type: text
    content: ' dans tout le pays.'
  '7':
  - type: text
    content: Soudain, un couvercle de plomb se souleva et une femme apparut, assise à l’intérieur du boisseau.
  '8':
  - type: text
    content: – Cette femme, me dit l’ange, c’est la Méchanceté.
  - type: text
    content: Et il la repoussa à l’intérieur du boisseau qu’il referma avec le couvercle de plomb.
  '9':
  - type: text
    content: 'Je regardai et je vis arriver deux femmes. Le vent gonflait leurs ailes semblables aux ailes des cigognes. Elles soulevèrent le boisseau entre ciel et terre. '
