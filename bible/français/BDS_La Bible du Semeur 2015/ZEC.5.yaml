document_id: ZEC.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le rouleau volant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je levai de nouveau les yeux et je vis un rouleau manuscrit qui volait. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je demandai à l’ange chargé de me parler : Où emportent-elles le boisseau ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il me répondit : Elles l’emportent en Babylonie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pays de l’idolâtrie. La méchanceté devra être éliminée du pays d’Israël pour qu’il devienne pleinement la « terre sacrée » (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.16'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', où elles lui bâtiront un sanctuaire. Lorsqu’il sera prêt, on le fixera là sur son piédestal.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’ange me demanda : Que vois-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je lui répondis : Je vois un rouleau qui vole, il a dix mètres de long et cinq de large.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors il me dit : Ce rouleau représente la malédiction divine qui se répand sur tout le pays. Sur l’une de ses faces, il est écrit que tout voleur sera chassé d’ici, et sur l’autre, que tous ceux qui prononcent de faux serments seront chassés d’ici. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je ferai venir cette malédiction – le Seigneur des armées célestes le déclare – pour qu’elle atteigne la maison de chaque voleur et celle des gens qui prêtent par mon nom de faux serments : elle s’établira dans cette maison et la détruira complètement, jusqu’aux poutres et aux pierres.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le boisseau
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Puis l’ange chargé de me parler sortit et me dit : Lève les yeux et regarde ce qui vient là.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: – Qu’est-ce ? lui demandai-je.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me répondit : C’est un boisseau qui vient'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'boisseau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était la plus grande mesure de capacité des Hébreux.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il ajouta : Il représente le péché du peuple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le péché du peuple
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans le texte hébreu traditionnel, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur œil, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qui vient d’une légère différence en hébreu, corrigée par les versions.
      marker-yv: yv-n
    - type: text
      text: ' dans tout le pays.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Soudain, un couvercle de plomb se souleva et une femme apparut, assise à l’intérieur du boisseau.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: – Cette femme, me dit l’ange, c’est la Méchanceté.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il la repoussa à l’intérieur du boisseau qu’il referma avec le couvercle de plomb.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je regardai et je vis arriver deux femmes. Le vent gonflait leurs ailes semblables aux ailes des cigognes. Elles soulevèrent le boisseau entre ciel et terre. '
