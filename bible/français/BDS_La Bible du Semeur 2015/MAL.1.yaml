document_id: MAL.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proclamation, parole que l’Eternel a adressée à Israël par l’intermédiaire de Malachie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Malachie
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir l’introduction.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’amour de l’Eternel pour son peuple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qui enfin, parmi vous, se décidera à fermer les portes de mon temple, pour que vous n’allumiez plus inutilement le feu sur mon autel ? Je n’ai aucun plaisir en vous, dit l’Eternel, le Seigneur des armées célestes. Je n’agrée pas l’offrande de vos mains.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Car, du soleil levant jusqu’au soleil couchant, ma renommée sera très grande au milieu des peuples non israélites, et partout, en tout lieu, de l’encens me sera offert et des offrandes pures. Car, parmi ces peuples, ma renommée sera très grande, dit l’Eternel, le Seigneur des armées célestes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Car, du soleil levant jusqu’au soleil couchant, ma renommée est très grande au milieu des nations, et partout, en tout lieu, de l’encens m’est offert et des offrandes pures. Car, parmi les nations, ma renommée est très grande, dit l’Eternel, le Seigneur des armées célestes.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais vous, vous me profanez lorsque vous dites : « La table du Seigneur est impure, et ce qu’elle nous rapporte en aliments est vraiment méprisable. » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: « Quel fardeau ! », dites-vous, et vous me dédaignez, déclare l’Eternel, le Seigneur des armées célestes. Vous apportez ici des bêtes dérobées, boiteuses ou malades ; ce sont là vos offrandes. Croyez-vous que je vais les agréer de votre part ? demande l’Eternel.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Maudit soit le tricheur qui a dans son troupeau un mâle, qui s’engage par un vœu, puis qui offre au Seigneur une bête tarée. Car je suis un grand Roi, déclare l’Eternel, le Seigneur des armées célestes, et les peuples non israélites me craindront.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Moi, je vous ai aimés, déclare l’Eternel. Et vous me demandez : « En quoi donc nous as-tu aimés ? » Esaü n’est-il pas le frère de Jacob ? demande l’Eternel. Or, j’ai aimé Jacob, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et j’ai écarté Esaü
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 9.13
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : j’ai fait de ses montagnes un pays désolé, et j’ai livré son patrimoine aux chacals du désert. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Edom peut bien dire : « Nous avons été démolis, mais nous rebâtirons ce qui n’est plus que ruines. » Mais le Seigneur des armées célestes déclare : Eux, ils rebâtiront, moi, je démolirai. On appellera leur pays : « le territoire de la méchanceté, le peuple contre qui, toujours, l’Eternel sera en colère ». '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et vous le verrez de vos yeux, et vous direz : « L’Eternel est très grand, même au-delà du territoire d’Israël. »'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’honneur dû à l’Eternel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le Seigneur des armées célestes s’adresse à vous les prêtres, vous qui me méprisez : Un fils honore un père, un serviteur son maître. Si je suis votre père, où donc sont les honneurs qui me sont dus ? Si je suis votre maître, où est la crainte qui m’est due ? Et puis vous demandez : « En quoi t’avons-nous méprisé ? » '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Vous apportez sur mon autel des aliments impurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Parce que non conformes aux règles de la Loi (voir v. 8 ; Lv 22.17-30 ; Dt 15.21).
      marker-yv: yv-n
    - type: text
      text: ' et puis vous demandez : « En quoi t’avons-nous profané ? » C’est en disant : « La table de l’Eternel est chose méprisable. » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand, pour le sacrifice, vous venez présenter un animal aveugle, n’y a-t-il rien de mal ? Et quand vous présentez une bête éclopée ou malade, n’y a-t-il rien de mal ? Offrez-le donc à votre gouverneur ! Sera-t-il content de vous ? Ou vous fera-t-il bon accueil ? dit l’Eternel, le Seigneur des armées célestes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ensuite, après avoir agi ainsi, vous venez supplier Dieu d’avoir pitié de vous ! Vous fera-t-il bon accueil ? demande le Seigneur des armées célestes. '
