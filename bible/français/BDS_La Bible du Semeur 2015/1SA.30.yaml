document_id: 1SA.30,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David poursuit les pillards amalécites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque David arriva le surlendemain avec ses hommes à Tsiqlag, il la trouva ravagée et incendiée ; les Amalécites avaient fait une incursion dans le Néguev et contre Tsiqlag. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David continua la poursuite avec quatre cents hommes ; les deux cents autres, trop fatigués pour traverser le torrent de Besor, restèrent sur place.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes rencontrèrent dans la campagne un Egyptien, ils l’amenèrent à David, lui donnèrent du pain, qu’il mangea, et de l’eau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils lui donnèrent quelques figues sèches et deux gâteaux de raisins secs. Quand il les eut mangés, il retrouva ses esprits, car il n’avait ni mangé ni bu pendant trois jours et trois nuits. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David l’interrogea : Qui est ton maître ? D’où viens-tu ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Je suis un jeune Egyptien, répondit-il, esclave d’un Amalécite ; mon maître m’a abandonné parce que je suis tombé malade il y a trois jours. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous venions de faire une razzia dans le sud du pays des Kérétiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Une tribu de l’extrême sud-ouest du pays d’Israël, parente des Philistins (le nom suggère une origine crétoise, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Am 9.7
        - type: text
          text: ). Plus tard, ils figureront parmi les soldats de métier de David (2 S 15.18 ; 20.7 ; 1 R 1.38).
      marker-yv: yv-n
    - type: text
      text: ', dans le territoire de Juda et dans le désert de Caleb ; nous avons aussi incendié Tsiqlag.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui demanda : Veux-tu me guider jusqu’à cette bande ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Jure-moi par Dieu que tu ne me tueras pas et que tu ne me livreras pas à mon maître, lui répondit l’Egyptien, et je te conduirai jusqu’à eux.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il guida donc David jusqu’aux Amalécites qu’ils trouvèrent éparpillés sur toute la contrée en train de manger, de boire et de danser à cause de l’énorme butin qu’ils avaient rapporté du pays des Philistins et de celui de Juda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David les attaqua à l’aube et les battit jusqu’au lendemain soir. Aucun d’eux ne lui échappa, excepté quatre cents jeunes gens qui réussirent à fuir sur des chameaux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David récupéra tout ce que les Amalécites avaient pris. Il délivra ainsi ses deux femmes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne manqua à l’appel, ni petit ni grand, ni fils ni fille ; ils trouvèrent également tout le butin qui leur avait été enlevé. David ramena tout. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils s’étaient emparés des femmes et de ceux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et de ceux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se trouvent dans l’ancienne version grecque, mais ils sont absents dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: ' qui se trouvaient dans la ville, quelle que soit leur condition sociale, sans toutefois tuer personne. Ils les avaient emmenés et avaient continué leur chemin. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’empara aussi de tout le gros et le menu bétail. Ceux qui marchaient en tête de ce troupeau disaient : Voilà le butin de David !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le partage du butin
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David revint vers les deux cents hommes qui avaient été trop fatigués pour le suivre et qui étaient restés au torrent de Besor. Ils vinrent au-devant de David et de ceux qui l’accompagnaient. David s’approcha d’eux et les salua. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment, un groupe de vauriens et de mauvais sujets qui avaient accompagné David se mirent à dire : Puisqu’ils ne sont pas venus avec nous, on ne leur donnera rien du butin que nous avons récupéré, sauf leurs femmes et leurs enfants. Qu’ils les emmènent et qu’ils s’en aillent !'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais David dit : Mes amis, n’agissez pas ainsi avec ce que l’Eternel nous a donné ; il nous a gardés et il nous a donné la victoire sur la bande des pillards qui nous avaient attaqués. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui donc pourrait vous approuver dans cette affaire ? La part de celui qui a gardé le camp sera la même que celle du soldat qui a participé au combat. Ils partageront équitablement.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De fait, à partir de ce jour, cette manière d’agir fut érigée comme loi et règle en Israël. Elle est encore en vigueur aujourd’hui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David envoie des présents aux responsables de Juda
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David rentra à Tsiqlag et il envoya des parts du butin aux responsables de Juda qui étaient ses amis. Il y joignit le message suivant : Voici un présent pour vous provenant du butin pris aux ennemis de l’Eternel.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit cet envoi aux responsables de Béthel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les villes citées aux v. 27-31 se trouvent presque toutes dans le territoire de Juda (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 15
        - type: text
          text: ). Les Judéens seront les premiers, à Hébron, à introniser David.
      marker-yv: yv-n
    - type: text
      text: ', de Ramoth du Néguev, de Yattir, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’Aroër, de Siphmoth, d’Eshtemoa, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Rakal, des villes des Yerahmeélites, de celles des Qéniens, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand David et ses compagnons arrivèrent à la ville, ils découvrirent donc qu’elle avait été incendiée et que leurs femmes, leurs fils et leurs filles avaient été emmenés captifs. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aux responsables de Horma, de Bor-Ashân, d’Atak, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: d’Hébron, et de tous les endroits où David et ses hommes avaient passé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David et ses compagnons se mirent à crier et à pleurer jusqu’à en être épuisés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les deux femmes de David, Ahinoam de Jizréel et Abigaïl, veuve de Nabal de Karmel, étaient parmi les prisonnières.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David était dans une situation très angoissante parce que ses compagnons étaient pleins d’amertume en pensant chacun à ses fils et à ses filles, et ils parlaient de le lapider. Mais David puisa de nouvelles forces en se confiant en l’Eternel son Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il demanda au prêtre Abiatar, fils d’Ahimélek, d’apporter l’éphod servant à consulter l’Eternel. Abiatar le lui présenta. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David interrogea l’Eternel en lui demandant : Dois-je poursuivre cette bande ? Parviendrai-je à les rattraper ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel lui répondit : Poursuis-les, car tu vas les rattraper et tout récupérer.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David se mit en route avec ses six cents hommes, ils parvinrent au torrent de Besor et certains s’arrêtèrent là. '
