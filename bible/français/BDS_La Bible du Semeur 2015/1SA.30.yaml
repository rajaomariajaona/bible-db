document_id: 1SA.30,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David poursuit les pillards amalécites
  - type: text
    content: 'Lorsque David arriva le surlendemain avec ses hommes à Tsiqlag, il la trouva ravagée et incendiée ; les Amalécites avaient fait une incursion dans le Néguev et contre Tsiqlag. '
  '10':
  - type: text
    content: David continua la poursuite avec quatre cents hommes ; les deux cents autres, trop fatigués pour traverser le torrent de Besor, restèrent sur place.
  '11':
  - type: text
    content: 'Les hommes rencontrèrent dans la campagne un Egyptien, ils l’amenèrent à David, lui donnèrent du pain, qu’il mangea, et de l’eau. '
  '12':
  - type: text
    content: 'Puis ils lui donnèrent quelques figues sèches et deux gâteaux de raisins secs. Quand il les eut mangés, il retrouva ses esprits, car il n’avait ni mangé ni bu pendant trois jours et trois nuits. '
  '13':
  - type: text
    content: 'David l’interrogea : Qui est ton maître ? D’où viens-tu ?'
  - type: text
    content: '– Je suis un jeune Egyptien, répondit-il, esclave d’un Amalécite ; mon maître m’a abandonné parce que je suis tombé malade il y a trois jours. '
  '14':
  - type: text
    content: Nous venions de faire une razzia dans le sud du pays des Kérétiens
  - type: note
    content: Une tribu de l’extrême sud-ouest du pays d’Israël, parente des Philistins (le nom suggère une origine crétoise, voir Am 9.7). Plus tard, ils figureront parmi les soldats de métier de David (2 S 15.18 ; 20.7 ; 1 R 1.38).
  - type: text
    content: ', dans le territoire de Juda et dans le désert de Caleb ; nous avons aussi incendié Tsiqlag.'
  '15':
  - type: text
    content: 'David lui demanda : Veux-tu me guider jusqu’à cette bande ?'
  - type: text
    content: – Jure-moi par Dieu que tu ne me tueras pas et que tu ne me livreras pas à mon maître, lui répondit l’Egyptien, et je te conduirai jusqu’à eux.
  '16':
  - type: text
    content: 'Il guida donc David jusqu’aux Amalécites qu’ils trouvèrent éparpillés sur toute la contrée en train de manger, de boire et de danser à cause de l’énorme butin qu’ils avaient rapporté du pays des Philistins et de celui de Juda. '
  '17':
  - type: text
    content: 'David les attaqua à l’aube et les battit jusqu’au lendemain soir. Aucun d’eux ne lui échappa, excepté quatre cents jeunes gens qui réussirent à fuir sur des chameaux. '
  '18':
  - type: text
    content: 'David récupéra tout ce que les Amalécites avaient pris. Il délivra ainsi ses deux femmes. '
  '19':
  - type: text
    content: 'Personne ne manqua à l’appel, ni petit ni grand, ni fils ni fille ; ils trouvèrent également tout le butin qui leur avait été enlevé. David ramena tout. '
  '2':
  - type: text
    content: Ils s’étaient emparés des femmes et de ceux
  - type: note
    content: Les mots et de ceux se trouvent dans l’ancienne version grecque, mais ils sont absents dans le texte hébreu traditionnel.
  - type: text
    content: ' qui se trouvaient dans la ville, quelle que soit leur condition sociale, sans toutefois tuer personne. Ils les avaient emmenés et avaient continué leur chemin. '
  '20':
  - type: text
    content: 'Il s’empara aussi de tout le gros et le menu bétail. Ceux qui marchaient en tête de ce troupeau disaient : Voilà le butin de David !'
  - type: heading
    content: Le partage du butin
  '21':
  - type: text
    content: 'David revint vers les deux cents hommes qui avaient été trop fatigués pour le suivre et qui étaient restés au torrent de Besor. Ils vinrent au-devant de David et de ceux qui l’accompagnaient. David s’approcha d’eux et les salua. '
  '22':
  - type: text
    content: 'A ce moment, un groupe de vauriens et de mauvais sujets qui avaient accompagné David se mirent à dire : Puisqu’ils ne sont pas venus avec nous, on ne leur donnera rien du butin que nous avons récupéré, sauf leurs femmes et leurs enfants. Qu’ils les emmènent et qu’ils s’en aillent !'
  '23':
  - type: text
    content: 'Mais David dit : Mes amis, n’agissez pas ainsi avec ce que l’Eternel nous a donné ; il nous a gardés et il nous a donné la victoire sur la bande des pillards qui nous avaient attaqués. '
  '24':
  - type: text
    content: Qui donc pourrait vous approuver dans cette affaire ? La part de celui qui a gardé le camp sera la même que celle du soldat qui a participé au combat. Ils partageront équitablement.
  '25':
  - type: text
    content: De fait, à partir de ce jour, cette manière d’agir fut érigée comme loi et règle en Israël. Elle est encore en vigueur aujourd’hui.
  - type: heading
    content: David envoie des présents aux responsables de Juda
  '26':
  - type: text
    content: 'David rentra à Tsiqlag et il envoya des parts du butin aux responsables de Juda qui étaient ses amis. Il y joignit le message suivant : Voici un présent pour vous provenant du butin pris aux ennemis de l’Eternel.'
  '27':
  - type: text
    content: Il fit cet envoi aux responsables de Béthel
  - type: note
    content: Les villes citées aux v. 27-31 se trouvent presque toutes dans le territoire de Juda (Jos 15). Les Judéens seront les premiers, à Hébron, à introniser David.
  - type: text
    content: ', de Ramoth du Néguev, de Yattir, '
  '28':
  - type: text
    content: 'd’Aroër, de Siphmoth, d’Eshtemoa, '
  '29':
  - type: text
    content: 'de Rakal, des villes des Yerahmeélites, de celles des Qéniens, '
  '3':
  - type: text
    content: 'Quand David et ses compagnons arrivèrent à la ville, ils découvrirent donc qu’elle avait été incendiée et que leurs femmes, leurs fils et leurs filles avaient été emmenés captifs. '
  '30':
  - type: text
    content: 'aux responsables de Horma, de Bor-Ashân, d’Atak, '
  '31':
  - type: text
    content: d’Hébron, et de tous les endroits où David et ses hommes avaient passé.
  '4':
  - type: text
    content: 'David et ses compagnons se mirent à crier et à pleurer jusqu’à en être épuisés. '
  '5':
  - type: text
    content: Les deux femmes de David, Ahinoam de Jizréel et Abigaïl, veuve de Nabal de Karmel, étaient parmi les prisonnières.
  '6':
  - type: text
    content: 'David était dans une situation très angoissante parce que ses compagnons étaient pleins d’amertume en pensant chacun à ses fils et à ses filles, et ils parlaient de le lapider. Mais David puisa de nouvelles forces en se confiant en l’Eternel son Dieu. '
  '7':
  - type: text
    content: 'Il demanda au prêtre Abiatar, fils d’Ahimélek, d’apporter l’éphod servant à consulter l’Eternel. Abiatar le lui présenta. '
  '8':
  - type: text
    content: 'David interrogea l’Eternel en lui demandant : Dois-je poursuivre cette bande ? Parviendrai-je à les rattraper ?'
  - type: text
    content: 'Et l’Eternel lui répondit : Poursuis-les, car tu vas les rattraper et tout récupérer.'
  '9':
  - type: text
    content: 'David se mit en route avec ses six cents hommes, ils parvinrent au torrent de Besor et certains s’arrêtèrent là. '
