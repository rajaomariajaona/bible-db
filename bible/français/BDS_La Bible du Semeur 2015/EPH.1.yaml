document_id: EPH.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, apôtre de Jésus-Christ par la volonté de Dieu, salue ceux qui [à Ephèse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Ephèse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont absents de plusieurs manuscrits.
      marker-yv: yv-n
    - type: text
      text: '] font partie du peuple saint, et croient en Jésus-Christ.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour conduire les temps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers l’accomplissement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon ce plan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce qui est au ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout ce qui est sur la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: doit être harmonieusement réuni
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul emploie ici un verbe qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'résumer, récapituler. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il est difficile de savoir ce qu’il voulait dire exactement. Certains traduisent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'doit être restauré. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: doit être réuni sous le gouvernement de Christ.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en Christ.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est aussi en Christ
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il nous a accordé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre part d’héritage
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que nous sommes devenus sa possession.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: conformément à ce qu’avait fixé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui met en œuvre toutes choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: selon l’intention qui inspire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa décision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi, nous avons été destinés d’avance
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à célébrer sa gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous qui, les tout premiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avons placé notre espérance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le Messie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en Christ, vous aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous avez entendu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le message de vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cet Evangile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous apportait le salut ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, c’est aussi en Christ
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous qui avez cru,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous avez obtenu de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Esprit Saint qu’il avait promis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par lequel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vous a marqués de son sceau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sceau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: apposé sur une marchandise marquait le changement de propriétaire.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en signe que vous lui appartenez.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cet Esprit constitue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’acompte de notre héritage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en attendant la délivrance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du peuple que Dieu s’est acquis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la délivrance par laquelle nous entrerons en possession de notre héritage.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi tout aboutit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à célébrer sa gloire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de Paul pour les Ephésiens
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour toutes ces raisons, moi aussi, après avoir entendu parler de votre foi au Seigneur Jésus et de votre amour pour tous les membres du peuple saint, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je ne cesse de dire ma reconnaissance à Dieu à votre sujet quand je fais mention de vous dans mes prières.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je demande que le Dieu de notre Seigneur Jésus-Christ, le Père qui possède la gloire, vous donne, par son Esprit, sagesse et révélation, pour que vous le connaissiez ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu’il illumine ainsi votre intelligence afin que vous compreniez en quoi consiste l’espérance à laquelle vous avez été appelés, quelle est la glorieuse richesse de l’héritage que Dieu vous fera partager avec les membres du peuple saint, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et quelle est l’extraordinaire grandeur de la puissance qu’il met en œuvre en notre faveur, à nous qui plaçons notre confiance en lui. Cette puissance, en effet, il l’a déployée dans toute sa force '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Le salut en Christ
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La grâce de Dieu en Christ
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en la faisant agir en Christ lorsqu’il l’a ressuscité et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’a fait siéger à sa droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 110.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
    - type: text
      text: ' dans le monde céleste. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là, Christ est placé bien au-dessus de toute Autorité, de toute Puissance, de toute Domination et de toute Souveraineté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces expressions se rapportent à des êtres surnaturels (angéliques ou démoniaques) auxquels les erreurs que certains répandaient dans les Eglises d’Asie Mineure donnaient une grande importance (voir 3.10 ; Col 1.16 ; 2.15).
      marker-yv: yv-n
    - type: text
      text: '  : au-dessus de tout nom qui puisse être cité, non seulement dans le monde présent, mais aussi dans le monde à venir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu a tout placé sous ses pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 8.7
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et Christ qui domine toutes choses, il l’a donné pour chef à l’Eglise '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: qui est son corps, lui en qui habite la plénitude du Dieu qui remplit tout en tous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à l’Eglise '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '23 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui est son corps, où se manifeste pleinement celui qui remplit tout en tous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.19'
        - type: text
          text: )
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Père de notre Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jésus-Christ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il nous a comblés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toute bénédiction de l’Esprit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le monde céleste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en raison de notre union avec Christ.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien avant de poser
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondations du monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il nous avait choisis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous soyons saints
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sans reproche devant lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu’il nous a aimés,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il nous a destinés d’avance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à être ses enfants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il voulait adopter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par Jésus-Christ.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que, dans sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a voulu pour nous
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que nous célébrions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la gloire de sa grâce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il nous a accordée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en son Fils bien-aimé.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En Christ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’il s’est offert en sacrifice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous avons obtenu la délivrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le pardon de nos fautes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a ainsi manifesté sa grâce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans toute sa richesse,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il l’a répandue sur nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec surabondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en nous donnant pleine sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pleine intelligence,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ayant fait connaître
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le secret de son plan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce plan, il l’a fixé d’avance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en Christ,
