document_id: EPH.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, apôtre de Jésus-Christ par la volonté de Dieu, salue ceux qui [à Ephèse
  - type: note
    content: 'Les mots : à Ephèse sont absents de plusieurs manuscrits.'
  - type: text
    content: '] font partie du peuple saint, et croient en Jésus-Christ.'
  '10':
  - type: text
    content: pour conduire les temps
  - type: text
    content: vers l’accomplissement.
  - type: text
    content: Selon ce plan,
  - type: text
    content: tout ce qui est au ciel
  - type: text
    content: et tout ce qui est sur la terre
  - type: text
    content: doit être harmonieusement réuni
  - type: note
    content: 'Paul emploie ici un verbe qui signifie résumer, récapituler. Il est difficile de savoir ce qu’il voulait dire exactement. Certains traduisent : doit être restauré. D’autres comprennent : doit être réuni sous le gouvernement de Christ.'
  - type: text
    content: en Christ.
  '11':
  - type: text
    content: Et c’est aussi en Christ
  - type: text
    content: qu’il nous a accordé
  - type: text
    content: notre part d’héritage
  - type: note
    content: 'Autre traduction : que nous sommes devenus sa possession.'
  - type: text
    content: conformément à ce qu’avait fixé
  - type: text
    content: celui qui met en œuvre toutes choses,
  - type: text
    content: selon l’intention qui inspire
  - type: text
    content: sa décision.
  - type: text
    content: Ainsi, nous avons été destinés d’avance
  '12':
  - type: text
    content: à célébrer sa gloire
  - type: text
    content: nous qui, les tout premiers,
  - type: text
    content: avons placé notre espérance
  - type: text
    content: dans le Messie.
  '13':
  - type: text
    content: Et en Christ, vous aussi,
  - type: text
    content: vous avez entendu
  - type: text
    content: le message de vérité,
  - type: text
    content: cet Evangile
  - type: text
    content: qui vous apportait le salut ;
  - type: text
    content: oui, c’est aussi en Christ
  - type: text
    content: que vous qui avez cru,
  - type: text
    content: vous avez obtenu de Dieu
  - type: text
    content: l’Esprit Saint qu’il avait promis
  - type: text
    content: et par lequel
  - type: text
    content: il vous a marqués de son sceau
  - type: note
    content: Le sceau apposé sur une marchandise marquait le changement de propriétaire.
  - type: text
    content: en signe que vous lui appartenez.
  '14':
  - type: text
    content: Cet Esprit constitue
  - type: text
    content: l’acompte de notre héritage
  - type: text
    content: en attendant la délivrance
  - type: text
    content: du peuple que Dieu s’est acquis
  - type: note
    content: 'Autre traduction : la délivrance par laquelle nous entrerons en possession de notre héritage.'
  - type: text
    content: .
  - type: text
    content: Ainsi tout aboutit
  - type: text
    content: à célébrer sa gloire.
  - type: heading
    content: Prière de Paul pour les Ephésiens
  '15':
  - type: text
    content: 'Pour toutes ces raisons, moi aussi, après avoir entendu parler de votre foi au Seigneur Jésus et de votre amour pour tous les membres du peuple saint, '
  '16':
  - type: text
    content: je ne cesse de dire ma reconnaissance à Dieu à votre sujet quand je fais mention de vous dans mes prières.
  '17':
  - type: text
    content: 'Je demande que le Dieu de notre Seigneur Jésus-Christ, le Père qui possède la gloire, vous donne, par son Esprit, sagesse et révélation, pour que vous le connaissiez ; '
  '18':
  - type: text
    content: 'qu’il illumine ainsi votre intelligence afin que vous compreniez en quoi consiste l’espérance à laquelle vous avez été appelés, quelle est la glorieuse richesse de l’héritage que Dieu vous fera partager avec les membres du peuple saint, '
  '19':
  - type: text
    content: 'et quelle est l’extraordinaire grandeur de la puissance qu’il met en œuvre en notre faveur, à nous qui plaçons notre confiance en lui. Cette puissance, en effet, il l’a déployée dans toute sa force '
  '2':
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Le salut en Christ
  - type: heading
    content: La grâce de Dieu en Christ
  '20':
  - type: text
    content: 'en la faisant agir en Christ lorsqu’il l’a ressuscité et '
  - type: text
    content: l’a fait siéger à sa droite
  - type: note
    content: Ps 110.1.
  - type: text
    content: ','
  - type: text
    content: ' dans le monde céleste. '
  '21':
  - type: text
    content: Là, Christ est placé bien au-dessus de toute Autorité, de toute Puissance, de toute Domination et de toute Souveraineté
  - type: note
    content: Ces expressions se rapportent à des êtres surnaturels (angéliques ou démoniaques) auxquels les erreurs que certains répandaient dans les Eglises d’Asie Mineure donnaient une grande importance (voir 3.10 ; Col 1.16 ; 2.15).
  - type: text
    content: '  : au-dessus de tout nom qui puisse être cité, non seulement dans le monde présent, mais aussi dans le monde à venir. '
  '22':
  - type: text
    content: Dieu a tout placé sous ses pieds
  - type: note
    content: Voir Ps 8.7.
  - type: text
    content: ', et Christ qui domine toutes choses, il l’a donné pour chef à l’Eglise '
  '23':
  - type: text
    content: qui est son corps, lui en qui habite la plénitude du Dieu qui remplit tout en tous
  - type: note
    content: 'Autre traduction : à l’Eglise 23 qui est son corps, où se manifeste pleinement celui qui remplit tout en tous (cf. 3.19).'
  - type: text
    content: .
  '3':
  - type: text
    content: Béni soit Dieu,
  - type: text
    content: le Père de notre Seigneur
  - type: text
    content: Jésus-Christ,
  - type: text
    content: car il nous a comblés
  - type: text
    content: de toute bénédiction de l’Esprit
  - type: text
    content: dans le monde céleste
  - type: text
    content: en raison de notre union avec Christ.
  '4':
  - type: text
    content: En lui,
  - type: text
    content: bien avant de poser
  - type: text
    content: les fondations du monde,
  - type: text
    content: il nous avait choisis
  - type: text
    content: pour que nous soyons saints
  - type: text
    content: et sans reproche devant lui.
  - type: text
    content: Puisqu’il nous a aimés,
  '5':
  - type: text
    content: il nous a destinés d’avance
  - type: text
    content: à être ses enfants
  - type: text
    content: qu’il voulait adopter
  - type: text
    content: par Jésus-Christ.
  - type: text
    content: Voilà ce que, dans sa bonté,
  - type: text
    content: il a voulu pour nous
  '6':
  - type: text
    content: afin que nous célébrions
  - type: text
    content: la gloire de sa grâce
  - type: text
    content: qu’il nous a accordée
  - type: text
    content: en son Fils bien-aimé.
  '7':
  - type: text
    content: En Christ,
  - type: text
    content: parce qu’il s’est offert en sacrifice,
  - type: text
    content: nous avons obtenu la délivrance,
  - type: text
    content: le pardon de nos fautes.
  - type: text
    content: Dieu a ainsi manifesté sa grâce
  - type: text
    content: dans toute sa richesse,
  '8':
  - type: text
    content: et il l’a répandue sur nous
  - type: text
    content: avec surabondance,
  - type: text
    content: en nous donnant pleine sagesse
  - type: text
    content: et pleine intelligence,
  '9':
  - type: text
    content: nous ayant fait connaître
  - type: text
    content: le secret de son plan.
  - type: text
    content: Ce plan, il l’a fixé d’avance,
  - type: text
    content: dans sa bonté,
  - type: text
    content: en Christ,
