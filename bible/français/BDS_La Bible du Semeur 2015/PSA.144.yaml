document_id: PSA.144,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ton peuple est heureux
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Eternel, ╵lui qui est mon rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui exerce mes mains ╵pour le combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes poings pour la bataille.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car c’est toi qui assures ╵aux rois la délivrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est toi qui préserves ╵de l’épée meurtrière ╵ton serviteur David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 10-11 : autre traduction, adoptée par l’ancienne version grecque : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: …et c’est toi qui préserves ton serviteur David. De l’épée meurtrière viens m’arracher…
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Viens, sauve-moi, ╵délivre-moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la main des barbares
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont la bouche est menteuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont tous les serments ╵ne sont que des parjures !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Que nos fils, dès l’enfance, ╵soient pareils à des plantes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui poussent vigoureuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que nos filles ressemblent ╵à des colonnes d’angle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sculptées pour un palais !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Que nos greniers soient pleins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de biens de toutes sortes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le petit bétail ╵se compte par milliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'oui, par dix milliers même : ╵qu’il couvre nos campagnes !'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Que nos vaches soient grasses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il n’y ait, dans nos murs, ╵ni brèche, ni lézarde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sens incertain. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu’elles ne soient pas victimes d’une calamité et qu’elles n’avortent pas.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’on n’entende jamais ╵retentir sur nos places ╵aucun cri de détresse !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Heureux sera le peuple ╵comblé de tels bienfaits !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux sera le peuple ╵dont l’Eternel est Dieu !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il me témoigne son amour, ╵il est ma forteresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et mon refuge : ╵c’est lui qui me libère.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon bouclier ╵où je trouve un abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me soumet mon peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'De nombreux manuscrits hébreux, le texte retrouvé à Qumrân, la version grecque d’Aquila, la version syriaque et le texte de Jérome ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des peuples '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18.48'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O Eternel, ╵qu’est-ce que l’homme ╵pour que tu prennes soin de lui ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’est-ce que l’être humain ╵pour que tu lui témoignes ╵de l’intérêt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8.5'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’homme est semblable ╵à un souffle léger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa vie ressemble ╵à l’ombre passagère.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: O Eternel, ╵déplie tes cieux ╵et descends ici-bas !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens toucher les montagnes ╵et qu’elles fument !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Décoche des éclairs ! ╵Disperse l’ennemi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoie sur eux tes flèches ╵et mets-les en déroute !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: De là-haut, interviens !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi ╵et sauve-moi ╵des grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la main des barbares
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: dont la bouche est menteuse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont tous les serments ╵ne sont que des parjures.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je chanterai pour toi, ╵ô Dieu, un chant nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je jouerai pour toi ╵sur le luth à dix cordes.
