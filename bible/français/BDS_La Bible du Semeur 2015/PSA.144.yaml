document_id: PSA.144,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ton peuple est heureux
  - type: text
    content: De David.
  - type: text
    content: Béni soit l’Eternel, ╵lui qui est mon rocher,
  - type: text
    content: qui exerce mes mains ╵pour le combat,
  - type: text
    content: mes poings pour la bataille.
  '10':
  - type: text
    content: Car c’est toi qui assures ╵aux rois la délivrance,
  - type: text
    content: et c’est toi qui préserves ╵de l’épée meurtrière ╵ton serviteur David
  - type: note
    content: 'Voir 10-11 : autre traduction, adoptée par l’ancienne version grecque : …et c’est toi qui préserves ton serviteur David. De l’épée meurtrière viens m’arracher…'
  - type: text
    content: .
  '11':
  - type: text
    content: Viens, sauve-moi, ╵délivre-moi
  - type: text
    content: de la main des barbares
  - type: text
    content: dont la bouche est menteuse
  - type: text
    content: et dont tous les serments ╵ne sont que des parjures !
  '12':
  - type: text
    content: Que nos fils, dès l’enfance, ╵soient pareils à des plantes
  - type: text
    content: qui poussent vigoureuses,
  - type: text
    content: que nos filles ressemblent ╵à des colonnes d’angle
  - type: text
    content: sculptées pour un palais !
  '13':
  - type: text
    content: Que nos greniers soient pleins
  - type: text
    content: de biens de toutes sortes,
  - type: text
    content: que le petit bétail ╵se compte par milliers,
  - type: text
    content: 'oui, par dix milliers même : ╵qu’il couvre nos campagnes !'
  '14':
  - type: text
    content: Que nos vaches soient grasses,
  - type: text
    content: qu’il n’y ait, dans nos murs, ╵ni brèche, ni lézarde
  - type: note
    content: 'Sens incertain. Autre traduction : qu’elles ne soient pas victimes d’une calamité et qu’elles n’avortent pas.'
  - type: text
    content: '  ;'
  - type: text
    content: qu’on n’entende jamais ╵retentir sur nos places ╵aucun cri de détresse !
  '15':
  - type: text
    content: Heureux sera le peuple ╵comblé de tels bienfaits !
  - type: text
    content: Heureux sera le peuple ╵dont l’Eternel est Dieu !
  '2':
  - type: text
    content: Il me témoigne son amour, ╵il est ma forteresse
  - type: text
    content: 'et mon refuge : ╵c’est lui qui me libère.'
  - type: text
    content: Il est mon bouclier ╵où je trouve un abri,
  - type: text
    content: il me soumet mon peuple
  - type: note
    content: 'De nombreux manuscrits hébreux, le texte retrouvé à Qumrân, la version grecque d’Aquila, la version syriaque et le texte de Jérome ont : les ou des peuples (cf. 18.48).'
  - type: text
    content: .
  '3':
  - type: text
    content: O Eternel, ╵qu’est-ce que l’homme ╵pour que tu prennes soin de lui ?
  - type: text
    content: Qu’est-ce que l’être humain ╵pour que tu lui témoignes ╵de l’intérêt
  - type: note
    content: Voir 8.5.
  - type: text
    content: '  ?'
  '4':
  - type: text
    content: L’homme est semblable ╵à un souffle léger,
  - type: text
    content: sa vie ressemble ╵à l’ombre passagère.
  '5':
  - type: text
    content: O Eternel, ╵déplie tes cieux ╵et descends ici-bas !
  - type: text
    content: Viens toucher les montagnes ╵et qu’elles fument !
  '6':
  - type: text
    content: Décoche des éclairs ! ╵Disperse l’ennemi !
  - type: text
    content: Envoie sur eux tes flèches ╵et mets-les en déroute !
  '7':
  - type: text
    content: De là-haut, interviens !
  - type: text
    content: Délivre-moi ╵et sauve-moi ╵des grandes eaux,
  - type: text
    content: de la main des barbares
  '8':
  - type: text
    content: dont la bouche est menteuse
  - type: text
    content: et dont tous les serments ╵ne sont que des parjures.
  '9':
  - type: text
    content: Je chanterai pour toi, ╵ô Dieu, un chant nouveau,
  - type: text
    content: et je jouerai pour toi ╵sur le luth à dix cordes.
