document_id: 2KI.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Joas échappe au massacre des princes de Juda
  - type: heading
    content: (2 Ch 22.10 à 23.21)
  - type: text
    content: Lorsque Athalie, la mère d’Ahazia, vit que son fils était mort
  - type: note
    content: Ahazia, roi de Juda, a été tué par Jéhu lorsque celui-ci s’est assuré la royauté sur le royaume du Nord en tuant le roi d’Israël Yoram (9.27). Athalie, fille d’Achab, avait été la femme de Yoram, roi de Juda, père d’Ahazia (8.16-18, 24, 26).
  - type: text
    content: ', elle entreprit de faire mourir toute la descendance royale de Juda. '
  '10':
  - type: text
    content: 'Le prêtre remit aux chefs de « centaines » la lance et les boucliers du roi David qui se trouvaient dans le temple de l’Eternel. '
  '11':
  - type: text
    content: 'Les gardes se postèrent, chacun les armes à la main, en demi-cercle devant l’édifice, depuis l’angle sud-est du Temple jusqu’à l’angle nord-est, près de l’autel, de manière à entourer le roi. '
  '12':
  - type: text
    content: 'Alors le prêtre fit sortir le fils du roi, lui plaça la couronne sur la tête et lui remit l’acte de l’alliance. On le sacra roi en l’oignant d’huile puis, au milieu des applaudissements, tous crièrent : Vive le roi !'
  - type: heading
    content: La mort d’Athalie
  '13':
  - type: text
    content: 'Athalie entendit le bruit du peuple qui accourait. Elle vint au milieu de la foule au temple de l’Eternel, '
  '14':
  - type: text
    content: 'regarda et vit le roi qui se tenait debout sur l’estrade, selon l’usage. Il était entouré des capitaines de la garde et des joueurs de trompettes. Toute la population exultait de joie tandis que les musiciens sonnaient des trompettes. A ce spectacle, Athalie déchira ses vêtements et s’écria : C’est un complot ! C’est un complot !'
  '15':
  - type: text
    content: 'Alors le prêtre Yehoyada ordonna aux chefs de « centaines » qui commandaient l’armée : Faites-la sortir de l’enceinte du Temple entre les rangs ! Et si quelqu’un la suit, vous le mettrez à mort. Car, avait dit le prêtre : « Qu’elle ne meure pas dans l’enceinte du temple de l’Eternel. »'
  '16':
  - type: text
    content: Ils s’emparèrent donc d’Athalie et la menèrent vers le palais royal par l’entrée des chevaux. Là, elle fut mise à mort.
  - type: heading
    content: Joas monte sur le trône
  '17':
  - type: text
    content: 'Yehoyada conclut entre l’Eternel, le roi et le peuple une alliance qui engageait celui-ci à être le peuple de l’Eternel, et une alliance entre le peuple et le roi. '
  '18':
  - type: text
    content: 'Toute la population du pays se rendit au temple de Baal et le démolit. On mit complètement en pièces ses autels et ses statues et l’on tua devant les autels Mattân, le prêtre de Baal. Le prêtre Yehoyada organisa la surveillance du temple de l’Eternel. '
  '19':
  - type: text
    content: 'Il rassembla les chefs de « centaines », les Kariens et les soldats de la garde ainsi que toute la population du pays, et ils firent descendre le roi du Temple au palais royal par le chemin de la porte des gardes, puis Joas prit place sur le trône royal. '
  '2':
  - type: text
    content: Mais au moment du massacre, Yehoshéba, fille du roi Yoram et sœur d’Ahazia
  - type: note
    content: Vraisemblablement d’une autre mère qu’Athalie. Elle était l’épouse du grand-prêtre Yehoyada (2 Ch 22.11). C’est pourquoi elle a pu cacher Joas dans le Temple, c’est-à-dire dans les appartements des prêtres.
  - type: text
    content: ', parvint à soustraire Joas, un fils d’Ahazia, du milieu de ses frères, pour l’installer avec sa nourrice'
  - type: note
    content: Joas n’avait guère plus d’un an et n’était pas encore sevré (v. 3 ; 12.1).
  - type: text
    content: ' dans le dortoir du Temple. On le cacha ainsi d’Athalie, et il échappa à la mort. '
  '20':
  - type: text
    content: Tout le peuple du pays était dans la joie, et le calme régnait dans la ville, maintenant qu’on avait fait mourir Athalie par l’épée dans le palais royal.
  '3':
  - type: text
    content: Pendant six ans, il resta caché avec Yehoshéba dans le temple de l’Eternel, tandis qu’Athalie régnait sur le pays
  - type: note
    content: De 841 à 835 av. J.-C.
  - type: text
    content: .
  - type: heading
    content: Joas devient roi
  '4':
  - type: text
    content: La septième année, le prêtre Yehoyada fit venir les chefs des « centaines » des Kariens
  - type: note
    content: Mercenaires originaires d’Asie Mineure qui remplaçaient les Kérétiens du temps de David (2 S 8.18).
  - type: text
    content: ', ceux de la garde royale et des autres soldats de la garde. Il les convoqua auprès de lui au temple de l’Eternel'
  - type: note
    content: 2 Ch 23.2 inclut les lévites et les chefs des familles de Juda dans cette conspiration.
  - type: text
    content: '. Il conclut une alliance avec eux, leur fit prêter serment dans l’enceinte du Temple et leur présenta le fils du roi. '
  '5':
  - type: text
    content: 'Puis il leur donna les ordres suivants : Voici ce que vous allez faire : ce prochain sabbat, l’une de vos compagnies sera de service ; la première section monte d’ordinaire la garde au palais royal, '
  '6':
  - type: text
    content: 'la deuxième section se tient en faction à la porte de Sour et la troisième section surveille la porte derrière le corps de garde ; ces trois sections monteront la garde à tour de rôle autour du Temple. '
  '7':
  - type: text
    content: 'Vos deux autres compagnies, composées de tous ceux qui normalement ne sont pas de service le jour du sabbat, monteront aussi la garde au temple de l’Eternel pour assurer la protection du jeune roi. '
  '8':
  - type: text
    content: Vous entourerez le roi de tous les côtés, chacun les armes à la main. Quiconque voudra forcer vos rangs sera mis à mort. Vous accompagnerez le roi dans toutes ses allées et venues.
  '9':
  - type: text
    content: 'Les chefs de « centaines » exécutèrent ponctuellement tous les ordres que le prêtre Yehoyada leur avait donnés. Ils prirent chacun leurs hommes, ceux qui commençaient leur service le jour du repos et ceux qui le terminaient ce jour-là, et ils se rendirent vers le prêtre Yehoyada. '
