document_id: 2KI.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joas échappe au massacre des princes de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 22.10 à 23.21)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque Athalie, la mère d’Ahazia, vit que son fils était mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahazia, roi de Juda, a été tué par Jéhu lorsque celui-ci s’est assuré la royauté sur le royaume du Nord en tuant le roi d’Israël Yoram (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.27'
        - type: text
          text: ). Athalie, fille d’Achab, avait été la femme de Yoram, roi de Juda, père d’Ahazia (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 8.16-18
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '24'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '26'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', elle entreprit de faire mourir toute la descendance royale de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre remit aux chefs de « centaines » la lance et les boucliers du roi David qui se trouvaient dans le temple de l’Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gardes se postèrent, chacun les armes à la main, en demi-cercle devant l’édifice, depuis l’angle sud-est du Temple jusqu’à l’angle nord-est, près de l’autel, de manière à entourer le roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le prêtre fit sortir le fils du roi, lui plaça la couronne sur la tête et lui remit l’acte de l’alliance. On le sacra roi en l’oignant d’huile puis, au milieu des applaudissements, tous crièrent : Vive le roi !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort d’Athalie
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Athalie entendit le bruit du peuple qui accourait. Elle vint au milieu de la foule au temple de l’Eternel, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'regarda et vit le roi qui se tenait debout sur l’estrade, selon l’usage. Il était entouré des capitaines de la garde et des joueurs de trompettes. Toute la population exultait de joie tandis que les musiciens sonnaient des trompettes. A ce spectacle, Athalie déchira ses vêtements et s’écria : C’est un complot ! C’est un complot !'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le prêtre Yehoyada ordonna aux chefs de « centaines » qui commandaient l’armée : Faites-la sortir de l’enceinte du Temple entre les rangs ! Et si quelqu’un la suit, vous le mettrez à mort. Car, avait dit le prêtre : « Qu’elle ne meure pas dans l’enceinte du temple de l’Eternel. »'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils s’emparèrent donc d’Athalie et la menèrent vers le palais royal par l’entrée des chevaux. Là, elle fut mise à mort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joas monte sur le trône
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yehoyada conclut entre l’Eternel, le roi et le peuple une alliance qui engageait celui-ci à être le peuple de l’Eternel, et une alliance entre le peuple et le roi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute la population du pays se rendit au temple de Baal et le démolit. On mit complètement en pièces ses autels et ses statues et l’on tua devant les autels Mattân, le prêtre de Baal. Le prêtre Yehoyada organisa la surveillance du temple de l’Eternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rassembla les chefs de « centaines », les Kariens et les soldats de la garde ainsi que toute la population du pays, et ils firent descendre le roi du Temple au palais royal par le chemin de la porte des gardes, puis Joas prit place sur le trône royal. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais au moment du massacre, Yehoshéba, fille du roi Yoram et sœur d’Ahazia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Vraisemblablement d’une autre mère qu’Athalie. Elle était l’épouse du grand-prêtre Yehoyada (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 22.11
        - type: text
          text: ). C’est pourquoi elle a pu cacher Joas dans le Temple, c’est-à-dire dans les appartements des prêtres.
      marker-yv: yv-n
    - type: text
      text: ', parvint à soustraire Joas, un fils d’Ahazia, du milieu de ses frères, pour l’installer avec sa nourrice'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Joas n’avait guère plus d’un an et n’était pas encore sevré (v. 3 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '12.1'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' dans le dortoir du Temple. On le cacha ainsi d’Athalie, et il échappa à la mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple du pays était dans la joie, et le calme régnait dans la ville, maintenant qu’on avait fait mourir Athalie par l’épée dans le palais royal.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant six ans, il resta caché avec Yehoshéba dans le temple de l’Eternel, tandis qu’Athalie régnait sur le pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 841 à 835 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joas devient roi
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La septième année, le prêtre Yehoyada fit venir les chefs des « centaines » des Kariens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mercenaires originaires d’Asie Mineure qui remplaçaient les Kérétiens du temps de David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 8.18
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', ceux de la garde royale et des autres soldats de la garde. Il les convoqua auprès de lui au temple de l’Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 23.2
        - type: text
          text: ' inclut les lévites et les chefs des familles de Juda dans cette conspiration.'
      marker-yv: yv-n
    - type: text
      text: '. Il conclut une alliance avec eux, leur fit prêter serment dans l’enceinte du Temple et leur présenta le fils du roi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur donna les ordres suivants : Voici ce que vous allez faire : ce prochain sabbat, l’une de vos compagnies sera de service ; la première section monte d’ordinaire la garde au palais royal, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la deuxième section se tient en faction à la porte de Sour et la troisième section surveille la porte derrière le corps de garde ; ces trois sections monteront la garde à tour de rôle autour du Temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos deux autres compagnies, composées de tous ceux qui normalement ne sont pas de service le jour du sabbat, monteront aussi la garde au temple de l’Eternel pour assurer la protection du jeune roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous entourerez le roi de tous les côtés, chacun les armes à la main. Quiconque voudra forcer vos rangs sera mis à mort. Vous accompagnerez le roi dans toutes ses allées et venues.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs de « centaines » exécutèrent ponctuellement tous les ordres que le prêtre Yehoyada leur avait donnés. Ils prirent chacun leurs hommes, ceux qui commençaient leur service le jour du repos et ceux qui le terminaient ce jour-là, et ils se rendirent vers le prêtre Yehoyada. '
