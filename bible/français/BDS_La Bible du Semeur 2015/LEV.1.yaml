document_id: LEV.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Lois sur les sacrifices et les offrandes
  - type: text
    content: 'L’Eternel appela Moïse et lui dit depuis la tente de la Rencontre : '
  '10':
  - type: text
    content: 'Si c’est du petit bétail qu’on offre en holocauste, on présentera un agneau ou un chevreau mâle sans défaut. '
  '11':
  - type: text
    content: 'On l’égorgera devant l’Eternel, du côté nord de l’autel, et les prêtres, descendants d’Aaron, aspergeront de son sang tous les côtés de l’autel. '
  '12':
  - type: text
    content: 'On découpera la victime en quartiers, et le prêtre les disposera avec la tête et les parties grasses sur le bois du foyer qui est sur l’autel. '
  '13':
  - type: text
    content: On lavera à l’eau les entrailles et les pattes, et le prêtre offrira le tout et le brûlera sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
  '14':
  - type: text
    content: 'Si ce sont des oiseaux qu’on offre comme holocauste à l’Eternel, on apportera des tourterelles ou des pigeonneaux. '
  '15':
  - type: text
    content: 'Le prêtre présentera la victime devant l’autel, lui détachera la tête qu’il brûlera sur l’autel ; il fera couler le sang contre la paroi de l’autel. '
  '16':
  - type: text
    content: 'Il enlèvera le jabot avec son contenu et le jettera près de l’autel, du côté est, dans le dépôt des cendres. '
  '17':
  - type: text
    content: Il ouvrira l’oiseau entre les ailes sans les détacher. Ensuite il le brûlera sur le bois qui est sur le foyer. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
  '2':
  - type: text
    content: 'Parle aux Israélites en ces termes :'
  - type: heading
    content: Les holocaustes
  - type: text
    content: Lorsque l’un d’entre vous offrira un animal en sacrifice à l’Eternel, il apportera un animal pris parmi le gros ou le petit bétail.
  '3':
  - type: text
    content: Si c’est du gros bétail
  - type: note
    content: 'Trois sortes de victimes pouvaient être offertes en holocauste suivant la fortune de l’offrant : les taureaux pour les riches (v. 3), les moutons ou les chevreaux (v. 10) et les oiseaux (v. 14) pour les pauvres (Lv 5.7 ; 12.8 ; Lc 2.24).'
  - type: text
    content: ' qu’on offre en holocauste'
  - type: note
    content: 'Le mot holocauste rend un mot hébreu de sens inconnu et dérive d’un terme grec signifiant : « entièrement consumé ». En effet, la victime de ce sacrifice était presque entièrement brûlée. Voir Ex 29.39-42 ; Nb 28.9-10, 26-31.'
  - type: text
    content: ', on apportera un mâle sans défaut et on l’offrira à l’entrée de la tente de la Rencontre afin qu’il soit agréé par l’Eternel. '
  '4':
  - type: text
    content: Celui qui l’offre posera sa main sur la tête de l’animal
  - type: note
    content: L’imposition des mains représente l’identification avec l’animal qui, par ce geste, devient le substitut de l’offrant (voir 24.14 ; 16.21).
  - type: text
    content: ' et celui-ci sera accepté comme victime expiatoire pour lui. '
  '5':
  - type: text
    content: Il égorgera le jeune taureau devant l’Eternel, et les descendants d’Aaron, les prêtres, en présenteront le sang
  - type: note
    content: Voir Gn 9.4 ; Lv 17.10-15 ; Dt 12.16.
  - type: text
    content: '. Ils en aspergeront tous les côtés de l’autel qui se trouve à l’entrée de la tente de la Rencontre. '
  '6':
  - type: text
    content: 'Après lui avoir enlevé la peau, on découpera la victime en quartiers. '
  '7':
  - type: text
    content: 'Puis les descendants du prêtre Aaron allumeront le feu sur l’autel et empileront des bûches sur le feu. '
  '8':
  - type: text
    content: 'Ensuite, les prêtres disposeront les quartiers de viande, la tête et les parties grasses sur le bois du foyer qui est sur l’autel. '
  '9':
  - type: text
    content: On lavera à l’eau les entrailles et les pattes, puis le prêtre brûlera le tout sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel
  - type: note
    content: 'Autre traduction (ici comme dans tout l’Ancien Testament) : au parfum de bonne odeur pour l’Eternel.'
  - type: text
    content: .
