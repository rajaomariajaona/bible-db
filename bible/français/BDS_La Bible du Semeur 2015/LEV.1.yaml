document_id: LEV.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Lois sur les sacrifices et les offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel appela Moïse et lui dit depuis la tente de la Rencontre : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux Israélites en ces termes :'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les holocaustes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Lorsque l’un d’entre vous offrira un animal en sacrifice à l’Eternel, il apportera un animal pris parmi le gros ou le petit bétail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si c’est du gros bétail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Trois sortes de victimes pouvaient être offertes en holocauste suivant la fortune de l’offrant : les taureaux pour les riches (v. 3), les moutons ou les chevreaux (v. 10) et les oiseaux (v. 14) pour les pauvres (Lv 5.7 ; 12.8 ; Lc 2.24).'
    marker-yv: yv-n
  - type: text
    text: ' qu’on offre en holocauste'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'holocauste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'rend un mot hébreu de sens inconnu et dérive d’un terme grec signifiant : « entièrement consumé ». En effet, la victime de ce sacrifice était presque entièrement brûlée. Voir Ex 29.39-42 ; Nb 28.9-10, 26-31.'
    marker-yv: yv-n
  - type: text
    text: ', on apportera un mâle sans défaut et on l’offrira à l’entrée de la tente de la Rencontre afin qu’il soit agréé par l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celui qui l’offre posera sa main sur la tête de l’animal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’imposition des mains représente l’identification avec l’animal qui, par ce geste, devient le substitut de l’offrant (voir 24.14 ; 16.21).
    marker-yv: yv-n
  - type: text
    text: ' et celui-ci sera accepté comme victime expiatoire pour lui. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il égorgera le jeune taureau devant l’Eternel, et les descendants d’Aaron, les prêtres, en présenteront le sang
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 9.4 ; Lv 17.10-15 ; Dt 12.16.
    marker-yv: yv-n
  - type: text
    text: '. Ils en aspergeront tous les côtés de l’autel qui se trouve à l’entrée de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après lui avoir enlevé la peau, on découpera la victime en quartiers. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis les descendants du prêtre Aaron allumeront le feu sur l’autel et empileront des bûches sur le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ensuite, les prêtres disposeront les quartiers de viande, la tête et les parties grasses sur le bois du foyer qui est sur l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On lavera à l’eau les entrailles et les pattes, puis le prêtre brûlera le tout sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction (ici comme dans tout l’Ancien Testament) : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au parfum de bonne odeur pour l’Eternel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si c’est du petit bétail qu’on offre en holocauste, on présentera un agneau ou un chevreau mâle sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On l’égorgera devant l’Eternel, du côté nord de l’autel, et les prêtres, descendants d’Aaron, aspergeront de son sang tous les côtés de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On découpera la victime en quartiers, et le prêtre les disposera avec la tête et les parties grasses sur le bois du foyer qui est sur l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On lavera à l’eau les entrailles et les pattes, et le prêtre offrira le tout et le brûlera sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si ce sont des oiseaux qu’on offre comme holocauste à l’Eternel, on apportera des tourterelles ou des pigeonneaux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le prêtre présentera la victime devant l’autel, lui détachera la tête qu’il brûlera sur l’autel ; il fera couler le sang contre la paroi de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il enlèvera le jabot avec son contenu et le jettera près de l’autel, du côté est, dans le dépôt des cendres. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il ouvrira l’oiseau entre les ailes sans les détacher. Ensuite il le brûlera sur le bois qui est sur le foyer. C’est un holocauste, un sacrifice consumé par le feu, à l’odeur apaisante pour l’Eternel.
