document_id: PSA.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel donne la paix
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, n psaume de David à chanter avec accompagnement d’instruments à cordes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand je t’appelle à l’aide, ╵Dieu qui me rends justice, ╵oh, réponds-moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lorsque je suis dans la détresse, ╵tu me délivres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, fais-moi grâce, ╵et entends ma prière !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et vous, les hommes, ╵jusques à quand jetterez-vous ╵le discrédit sur mon honneur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand vous plairez-vous ╵à poursuivre le vent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le mensonge ?
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sachez-le bien : ╵l’Eternel s’est choisi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs manuscrits hébreux, l’ancienne version grecque et la latine ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l’Eternel m’a témoigné sa bonté de façon merveilleuse.
    marker-yv: yv-n
  - type: text
    text: ' ╵un homme qui s’attache à lui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m’entend ╵quand je l’appelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mettez-vous en colère ╵mais n’allez pas jusqu’à pécher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne tremblez pas. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ep 4.26
        metadata:
          usfm: EPH.4.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réfléchissez, sur votre lit, ╵puis taisez-vous !
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Offrez des sacrifices ╵conformes à la Loi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et confiez-vous en l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils sont nombreux ceux qui demandent : ╵« Qui donc nous apportera le bonheur ? »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Eternel, ╵porte sur nous ╵un regard favorable ! ╵Que notre vie ╵en soit illuminée !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu mets dans mon cœur de la joie, ╵plus qu’ils n’en ont
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand leurs moissons abondent, ╵quand leur vin nouveau coule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dans la paix, je me couche ╵et m’endors aussitôt ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à toi seul, ô Eternel, ╵je demeure en sécurité.
