document_id: PSA.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel donne la paix
  - type: text
    content: Au chef de chœur, n psaume de David à chanter avec accompagnement d’instruments à cordes.
  '2':
  - type: text
    content: Quand je t’appelle à l’aide, ╵Dieu qui me rends justice, ╵oh, réponds-moi !
  - type: text
    content: 'Lorsque je suis dans la détresse, ╵tu me délivres :'
  - type: text
    content: Dieu, fais-moi grâce, ╵et entends ma prière !
  '3':
  - type: text
    content: Et vous, les hommes, ╵jusques à quand jetterez-vous ╵le discrédit sur mon honneur ?
  - type: text
    content: Jusques à quand vous plairez-vous ╵à poursuivre le vent
  - type: text
    content: et le mensonge ?
  - type: text
    content: Pause
  '4':
  - type: text
    content: 'Sachez-le bien : ╵l’Eternel s’est choisi'
  - type: note
    content: 'Plusieurs manuscrits hébreux, l’ancienne version grecque et la latine ont : l’Eternel m’a témoigné sa bonté de façon merveilleuse.'
  - type: text
    content: ' ╵un homme qui s’attache à lui :'
  - type: text
    content: et il m’entend ╵quand je l’appelle.
  '5':
  - type: text
    content: Mettez-vous en colère ╵mais n’allez pas jusqu’à pécher
  - type: note
    content: 'Autre traduction : ne tremblez pas. Cité en Ep 4.26.'
  - type: text
    content: '  !'
  - type: text
    content: Réfléchissez, sur votre lit, ╵puis taisez-vous !
  - type: text
    content: Pause
  '6':
  - type: text
    content: Offrez des sacrifices ╵conformes à la Loi
  - type: text
    content: et confiez-vous en l’Eternel !
  '7':
  - type: text
    content: 'Ils sont nombreux ceux qui demandent : ╵« Qui donc nous apportera le bonheur ? »'
  - type: text
    content: O Eternel, ╵porte sur nous ╵un regard favorable ! ╵Que notre vie ╵en soit illuminée !
  '8':
  - type: text
    content: Tu mets dans mon cœur de la joie, ╵plus qu’ils n’en ont
  - type: text
    content: quand leurs moissons abondent, ╵quand leur vin nouveau coule.
  '9':
  - type: text
    content: Dans la paix, je me couche ╵et m’endors aussitôt ;
  - type: text
    content: grâce à toi seul, ô Eternel, ╵je demeure en sécurité.
