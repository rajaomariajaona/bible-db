document_id: EXO.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’oppression des Israélites en Égypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici la liste des fils d’Israël qui ont accompagné Jacob en Egypte, chacun avec sa famille : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ruben, Siméon, Lévi et Juda ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issacar, Zabulon et Benjamin ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan et Nephtali, Gad et Aser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les descendants de Jacob étaient au nombre de soixante-dix en tout
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 46.27
        metadata:
          usfm: GEN.46.27
      - type: text
        text: '. Un manuscrit hébreu trouvé à Qumrân, l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.14
        metadata:
          usfm: ACT.7.14
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soixante-quinze.
    marker-yv: yv-n
  - type: text
    text: ', Joseph étant déjà en Egypte à ce moment-là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Joseph mourut, ainsi que tous ses frères et toute leur génération
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plusieurs siècles séparèrent la mort de Joseph de l’avènement du nouveau roi (v. 8).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les Israélites furent féconds, proliférèrent, se multiplièrent et devinrent de plus en plus puissants, si bien que le pays en fut rempli
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon la promesse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 46.3
        metadata:
          usfm: GEN.46.3
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.37'
        metadata:
          usfm: EXO.12.37
      - type: text
        text: ). Les Israélites n’étaient pas seulement confinés au pays de Goshen, ils habitaient aussi au milieu des Egyptiens (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.22'
        metadata:
          usfm: EXO.3.22
      - type: text
        text: '). Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7.17
        metadata:
          usfm: ACT.7.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Un nouveau roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains l’ont identifié à Amosis (1570-1546 av. J.-C.), fondateur de la XVIII
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' dynastie, qui a chassé les Hyksos (d’origine asiatique, ils avaient envahi la Basse-Egypte pour la dominer de env. 1730 à 1580), d’autres à Thoutmosis III, pharaon de la XVIII'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' dynastie, d’autres à Séti I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' (1304​1293–1290​1279 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: ' vint au pouvoir en Egypte ; il ne connaissait pas Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit à ses sujets : Voyez, le peuple des Israélites est plus nombreux et plus puissant que nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il est temps d’aviser à son sujet, pour qu’il cesse de se multiplier. Sinon, en cas de guerre, il risque de se ranger aux côtés de nos ennemis et de combattre contre nous pour quitter ensuite le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors on imposa aux Israélites des chefs de corvée pour les accabler par des travaux forcés. C’est ainsi qu’ils durent bâtir pour le pharaon les villes de Pitom et de Ramsès
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vers la frontière orientale de l’Egypte, près du canal qui reliait le Nil à la mer Rouge, près de l’actuel canal de Suez.
    marker-yv: yv-n
  - type: text
    text: ' pour servir de centres d’approvisionnement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais plus on les opprimait, plus ils devenaient nombreux et plus ils se répandaient, au point que les Egyptiens les prirent en aversion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors ceux-ci les réduisirent à un dur esclavage '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et leur rendirent la vie amère par de rudes corvées : fabrication de mortier, confection de briques, travaux en tous genres dans les champs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Surtout des travaux d’irrigation (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 11.10
        metadata:
          usfm: DEU.11.10
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', bref, toutes les tâches auxquelles on les asservit avec cruauté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il y avait deux sages-femmes pour les Hébreux. Elles se nommaient Shiphra et Poua
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sans doute les responsables des sages-femmes. Elles portent des noms égyptiens.
    marker-yv: yv-n
  - type: text
    text: '. Le pharaon leur donna cet ordre : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand vous accoucherez les femmes des Hébreux, et que vous aurez constaté le sexe de l’enfant, si c’est un garçon, mettez-le à mort, si c’est une fille, qu’on la laisse vivre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais les sages-femmes craignaient Dieu ; elles n’obéirent pas au pharaon : elles laissèrent la vie sauve aux garçons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le pharaon les convoqua et leur demanda : Pourquoi avez-vous fait cela ? Pourquoi avez-vous laissé vivre les garçons ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les sages-femmes répondirent au pharaon : C’est que les femmes des Hébreux ne sont pas comme les Egyptiennes. Elles sont pleines de vie. Avant que la sage-femme arrive auprès d’elles, elles ont déjà mis leur enfant au monde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu fit du bien aux sages-femmes, et le peuple continua de se multiplier et devint extrêmement puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Comme les sages-femmes avaient agi par crainte de Dieu, Dieu fit prospérer leurs familles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors le pharaon ordonna à tous ses sujets : Jetez dans le fleuve tous les garçons nouveau-nés des Hébreux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon le Pentateuque samaritain, l’ancienne version grecque et des traditions rabbiniques. Absent du texte hébreu traditionnel.
    marker-yv: yv-n
  - type: text
    text: ', mais laissez vivre toutes les filles !'
