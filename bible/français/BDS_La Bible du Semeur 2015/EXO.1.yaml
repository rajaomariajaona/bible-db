document_id: EXO.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’oppression des Israélites en Égypte
  - type: text
    content: 'Voici la liste des fils d’Israël qui ont accompagné Jacob en Egypte, chacun avec sa famille : '
  '10':
  - type: text
    content: Il est temps d’aviser à son sujet, pour qu’il cesse de se multiplier. Sinon, en cas de guerre, il risque de se ranger aux côtés de nos ennemis et de combattre contre nous pour quitter ensuite le pays.
  '11':
  - type: text
    content: Alors on imposa aux Israélites des chefs de corvée pour les accabler par des travaux forcés. C’est ainsi qu’ils durent bâtir pour le pharaon les villes de Pitom et de Ramsès
  - type: note
    content: Vers la frontière orientale de l’Egypte, près du canal qui reliait le Nil à la mer Rouge, près de l’actuel canal de Suez.
  - type: text
    content: ' pour servir de centres d’approvisionnement. '
  '12':
  - type: text
    content: 'Mais plus on les opprimait, plus ils devenaient nombreux et plus ils se répandaient, au point que les Egyptiens les prirent en aversion. '
  '13':
  - type: text
    content: 'Alors ceux-ci les réduisirent à un dur esclavage '
  '14':
  - type: text
    content: 'et leur rendirent la vie amère par de rudes corvées : fabrication de mortier, confection de briques, travaux en tous genres dans les champs'
  - type: note
    content: Surtout des travaux d’irrigation (Dt 11.10).
  - type: text
    content: ', bref, toutes les tâches auxquelles on les asservit avec cruauté.'
  '15':
  - type: text
    content: Il y avait deux sages-femmes pour les Hébreux. Elles se nommaient Shiphra et Poua
  - type: note
    content: Sans doute les responsables des sages-femmes. Elles portent des noms égyptiens.
  - type: text
    content: '. Le pharaon leur donna cet ordre : '
  '16':
  - type: text
    content: Quand vous accoucherez les femmes des Hébreux, et que vous aurez constaté le sexe de l’enfant, si c’est un garçon, mettez-le à mort, si c’est une fille, qu’on la laisse vivre.
  '17':
  - type: text
    content: 'Mais les sages-femmes craignaient Dieu ; elles n’obéirent pas au pharaon : elles laissèrent la vie sauve aux garçons. '
  '18':
  - type: text
    content: 'Alors le pharaon les convoqua et leur demanda : Pourquoi avez-vous fait cela ? Pourquoi avez-vous laissé vivre les garçons ?'
  '19':
  - type: text
    content: 'Les sages-femmes répondirent au pharaon : C’est que les femmes des Hébreux ne sont pas comme les Egyptiennes. Elles sont pleines de vie. Avant que la sage-femme arrive auprès d’elles, elles ont déjà mis leur enfant au monde.'
  '2':
  - type: text
    content: 'Ruben, Siméon, Lévi et Juda ; '
  '20':
  - type: text
    content: 'Dieu fit du bien aux sages-femmes, et le peuple continua de se multiplier et devint extrêmement puissant. '
  '21':
  - type: text
    content: Comme les sages-femmes avaient agi par crainte de Dieu, Dieu fit prospérer leurs familles.
  '22':
  - type: text
    content: 'Alors le pharaon ordonna à tous ses sujets : Jetez dans le fleuve tous les garçons nouveau-nés des Hébreux'
  - type: note
    content: Selon le Pentateuque samaritain, l’ancienne version grecque et des traditions rabbiniques. Absent du texte hébreu traditionnel.
  - type: text
    content: ', mais laissez vivre toutes les filles !'
  '3':
  - type: text
    content: 'Issacar, Zabulon et Benjamin ; '
  '4':
  - type: text
    content: 'Dan et Nephtali, Gad et Aser. '
  '5':
  - type: text
    content: Les descendants de Jacob étaient au nombre de soixante-dix en tout
  - type: note
    content: 'Voir Gn 46.27. Un manuscrit hébreu trouvé à Qumrân, l’ancienne version grecque et Ac 7.14 ont : soixante-quinze.'
  - type: text
    content: ', Joseph étant déjà en Egypte à ce moment-là.'
  '6':
  - type: text
    content: Joseph mourut, ainsi que tous ses frères et toute leur génération
  - type: note
    content: Plusieurs siècles séparèrent la mort de Joseph de l’avènement du nouveau roi (v. 8).
  - type: text
    content: '. '
  '7':
  - type: text
    content: Les Israélites furent féconds, proliférèrent, se multiplièrent et devinrent de plus en plus puissants, si bien que le pays en fut rempli
  - type: note
    content: Selon la promesse (Gn 46.3  ; voir 12.37). Les Israélites n’étaient pas seulement confinés au pays de Goshen, ils habitaient aussi au milieu des Egyptiens (3.22). Voir Ac 7.17.
  - type: text
    content: .
  '8':
  - type: text
    content: Un nouveau roi
  - type: note
    content: Certains l’ont identifié à Amosis (1570-1546 av. J.-C.), fondateur de la XVIIIe dynastie, qui a chassé les Hyksos (d’origine asiatique, ils avaient envahi la Basse-Egypte pour la dominer de env. 1730 à 1580), d’autres à Thoutmosis III, pharaon de la XVIIIe dynastie, d’autres à Séti Ier (1304​1293–1290​1279 av. J.-C.).
  - type: text
    content: ' vint au pouvoir en Egypte ; il ne connaissait pas Joseph. '
  '9':
  - type: text
    content: 'Il dit à ses sujets : Voyez, le peuple des Israélites est plus nombreux et plus puissant que nous. '
