document_id: PSA.64,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Protège-moi !
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: et tous les hommes ╵sont pris de crainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils proclament ╵l’œuvre de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en tirant la leçon ╵de ses actions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qu’en l’Eternel, ╵le juste trouve ╵sa joie et son refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les hommes au cœur droit ╵s’en féliciteront.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Dieu, écoute ╵ma voix plaintive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protège-moi ╵d’un ennemi ╵qui me fait peur,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et mets-moi à l’abri ╵des complots des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la troupe tumultueuse ╵de malfaisants.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Comme une épée, ╵leur langue est aiguisée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils décochent ╵leurs propos venimeux ╵comme des flèches !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils tirent depuis leur cachette ╵sur l’innocent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils le visent soudain, ╵sans éprouver ╵la moindre crainte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils s’enhardissent ╵pour de mauvais desseins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se concertent ╵pour bien cacher leurs pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en se disant : ╵« Qui s’en apercevra ? »'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Chacun combine ╵des mauvais coups. ╵« Nous voici prêts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre plan est au point ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, la pensée intime, ╵le cœur de l’homme ╵est un gouffre profond.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais Dieu leur lance ╵soudain des flèches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils sont frappés :'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: leur propre langue ╵cause leur chute.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En les voyant, ╵chacun secoue la tête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Signe de mépris (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '22.8'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
