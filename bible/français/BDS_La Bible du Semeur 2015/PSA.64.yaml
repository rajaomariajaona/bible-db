document_id: PSA.64,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Protège-moi !
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: et tous les hommes ╵sont pris de crainte
  - type: text
    content: et ils proclament ╵l’œuvre de Dieu
  - type: text
    content: en tirant la leçon ╵de ses actions.
  '11':
  - type: text
    content: Qu’en l’Eternel, ╵le juste trouve ╵sa joie et son refuge,
  - type: text
    content: et tous les hommes au cœur droit ╵s’en féliciteront.
  '2':
  - type: text
    content: O Dieu, écoute ╵ma voix plaintive,
  - type: text
    content: protège-moi ╵d’un ennemi ╵qui me fait peur,
  '3':
  - type: text
    content: et mets-moi à l’abri ╵des complots des méchants,
  - type: text
    content: de la troupe tumultueuse ╵de malfaisants.
  '4':
  - type: text
    content: Comme une épée, ╵leur langue est aiguisée
  - type: text
    content: et ils décochent ╵leurs propos venimeux ╵comme des flèches !
  '5':
  - type: text
    content: Ils tirent depuis leur cachette ╵sur l’innocent,
  - type: text
    content: ils le visent soudain, ╵sans éprouver ╵la moindre crainte.
  '6':
  - type: text
    content: Ils s’enhardissent ╵pour de mauvais desseins,
  - type: text
    content: ils se concertent ╵pour bien cacher leurs pièges,
  - type: text
    content: 'en se disant : ╵« Qui s’en apercevra ? »'
  '7':
  - type: text
    content: Chacun combine ╵des mauvais coups. ╵« Nous voici prêts,
  - type: text
    content: notre plan est au point ! »
  - type: text
    content: Oui, la pensée intime, ╵le cœur de l’homme ╵est un gouffre profond.
  '8':
  - type: text
    content: Mais Dieu leur lance ╵soudain des flèches.
  - type: text
    content: 'Ils sont frappés :'
  '9':
  - type: text
    content: leur propre langue ╵cause leur chute.
  - type: text
    content: En les voyant, ╵chacun secoue la tête
  - type: note
    content: Signe de mépris (voir 22.8).
  - type: text
    content: ','
