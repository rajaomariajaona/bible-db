document_id: LEV.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La faute de Nadab et d’Abihou
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nadab et Abihou, deux des fils d’Aaron, prirent chacun son encensoir, y mirent des braises incandescentes sur lesquelles ils répandirent de l’encens. Ils présentèrent ainsi à l’Eternel un feu profane, qui ne correspondait pas à ce qui leur avait été ordonné. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez être en état de distinguer ce qui est saint de ce qui est profane, et ce qui est rituellement pur de ce qui est impur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous devez aussi être capables d’enseigner aux Israélites toutes les ordonnances que l’Eternel leur a données par Moïse.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron, ainsi qu’à Eléazar et Itamar, les fils qui restaient à Aaron : Prenez la part de l’offrande qui reste, celle qui n’a pas été consumée par le feu pour l’Eternel, et mangez-la sans levain à côté de l’autel, car c’est une chose très sainte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 12-13, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 6.7-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous la mangerez dans un lieu saint, car c’est la part qui vous revient, à toi et à tes fils, sur les offrandes de l’Eternel consumées par le feu, comme il me l’a ordonné. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à la poitrine pour laquelle on accomplira le geste de présentation, et au gigot offert à l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Morceaux provenant du sacrifice de communion (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 9.18-21
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', tu pourras les manger avec tes fils et tes filles dans un endroit pur, car c’est la part qui vous est donnée, à toi et à tes enfants, sur les sacrifices de communion des Israélites'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 14-15, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 7.30-34
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Outre les graisses destinées à être consumées, les offrants apporteront le gigot offert à l’Eternel et la poitrine qui doit lui être présentée, pour qu’on accomplisse avec ce gigot et cette poitrine le geste de présentation devant l’Eternel. Ensuite ils te reviendront, à toi et à tes fils, en vertu d’une loi en vigueur à perpétuité, comme l’Eternel l’a ordonné.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse s’informa de ce qu’était devenu le bouc offert en sacrifice pour le péché ; il découvrit qu’on l’avait brûlé. Alors il se fâcha contre Eléazar et Itamar, les fils qui restaient à Aaron, et leur demanda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 9.3
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '15'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  : '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pourquoi n’avez-vous pas mangé la viande du sacrifice pour le péché dans le lieu saint, puisque c’est une chose très sainte ? L’Eternel vous l’a donnée pour que vous vous chargiez des fautes de la communauté et que vous accomplissiez le rite d’expiation pour eux devant l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 6.17-19
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le sang de la victime n’a pas été porté à l’intérieur du sanctuaire, vous devez donc en manger la viande dans le lieu saint, comme je l’ai ordonné.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron dit à Moïse : Voici, aujourd’hui même ils ont offert leur sacrifice pour le péché et leur holocauste devant l’Eternel et il m’est arrivé ce que tu sais ! Si j’avais en un jour comme aujourd’hui mangé la viande du sacrifice pour le péché, l’Eternel l’aurait-il approuvé ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, une flamme jaillit de devant l’Eternel et les consuma ; ils périrent là devant l’Eternel.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse écouta ces raisons et les trouva bonnes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron : C’est bien ce que disait l’Eternel : « Ma sainteté doit être respectée par ceux qui s’approchent de moi, et je manifesterai ma gloire aux yeux de tout le peuple. »'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron garda le silence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entonna une lamentation.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse appela Mishaël et Eltsaphân, fils d’Ouzziel, l’oncle d’Aaron. Il leur dit : Venez, emportez de devant le sanctuaire, à l’extérieur du camp, ces hommes de votre parenté.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils s’approchèrent et les emportèrent dans leurs tuniques à l’extérieur du camp, comme Moïse le leur avait ordonné.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit ensuite à Aaron et à ses fils Eléazar et Itamar : Ne vous défaites pas les cheveux, ne vous déchirez pas les vêtements'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le grand-prêtre n’avait pas le droit de manifester son deuil par ces signes habituels (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 21.10
        - type: text
          text: ). Ici la règle est étendue à ses fils.
      marker-yv: yv-n
    - type: text
      text: ', pour ne pas mourir à votre tour et attirer la colère de Dieu sur toute l’assemblée. Ce sont tous vos frères israélites qui pleureront ceux que l’Eternel a brûlés par le feu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais vous, vous ne devez pas quitter l’entrée de la tente de la Rencontre, sinon vous mourrez, car vous avez été oints de l’huile d’onction de l’Eternel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron et ses fils obéirent à Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les prescriptions diverses pour les prêtres
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel s’adressa à Aaron et lui dit : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne bois ni vin, ni autre boisson fermentée quand tu entres dans la tente de la Rencontre, ni toi, ni tes fils, afin de ne pas mourir. C’est une prescription en vigueur à perpétuité pour vos descendants. '
