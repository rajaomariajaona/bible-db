document_id: JHN.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le vrai guide
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : si quelqu’un n’entre pas par la porte dans l’enclos où l’on parque les brebis'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pendant la nuit, on parquait les moutons dans des enclos formés de murs de pierres sèches. Parfois, le berger se couchait en travers de l’entrée.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', mais qu’il escalade le mur à un autre endroit, c’est un voleur et un brigand.'
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le voleur vient seulement pour voler, pour tuer et pour détruire. Moi, je suis venu afin que les hommes aient la vie, une vie abondante.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moi, je suis le bon berger. Le bon berger donne sa vie pour ses brebis.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui n’est pas le berger, qui n’est pas le propriétaire des brebis, mais que l’on paye pour les garder, se sauve, lui, dès qu’il voit venir le loup, et il abandonne les brebis ; alors le loup se précipite sur elles, il s’empare de quelques-unes et disperse le troupeau.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cet homme agit ainsi parce qu’il est payé pour faire ce travail et qu’il n’a aucun souci des brebis.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moi, je suis le bon berger ; je connais mes brebis et mes brebis me connaissent,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: tout comme le Père me connaît et que je connais le Père. Je donne ma vie pour mes brebis.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai encore d’autres brebis qui ne sont pas de cet enclos. Celles-là aussi, il faut que je les amène ; elles écouteront ma voix, ainsi il n’y aura plus qu’un seul troupeau avec un seul berger.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si le Père m’aime, c’est parce que je donne ma vie ; mais ensuite, je la reprendrai.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, personne ne peut m’ôter la vie : je la donne de mon propre gré. J’ai le pouvoir de la donner et de la reprendre. Tel est l’ordre que j’ai reçu de mon Père.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut à nouveau division parmi le peuple à cause de ses paroles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui entre par la porte est, lui, le berger des brebis.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup disaient : Il a un démon en lui, c’est un fou. Pourquoi l’écoutez-vous ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres répliquaient : Un démoniaque ne parlerait pas ainsi. Et puis : est-ce qu’un démon peut rendre la vue à des aveugles ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fils de Dieu ou blasphémateur ?
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le moment vint où l’on célébrait à Jérusalem la fête de la Consécration
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fête où l’on rappelait la restauration de l’autel du temple de Jérusalem effectuée par le patriote juif Judas Maccabée en 164 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était l’hiver. Jésus allait et venait dans la cour du Temple, dans la galerie de Salomon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors on fit cercle autour de lui et on l’interpella : Combien de temps nous tiendras-tu encore en haleine ? Si tu es le Messie, dis-le-nous clairement.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Je vous l’ai déjà dit,
    - type: text
      text: ' leur répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'mais vous ne croyez pas. Pourtant, vous avez vu les actes que j’accomplis au nom de mon Père : ce sont eux qui témoignent en ma faveur.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais vous ne croyez pas. Pourquoi ? Parce que vous ne faites pas partie de mes brebis.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mes brebis écoutent ma voix, je les connais et elles me suivent.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je leur donne la vie éternelle : jamais elles ne périront et personne ne pourra les arracher de ma main.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon Père qui me les a données est plus grand que tous, et personne ne peut arracher qui que ce soit de la main de mon Père.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le gardien de l’enclos lui ouvre, les brebis écoutent sa voix. Il appelle par leur nom celles qui lui appartiennent, et il les fait sortir de l’enclos.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, moi et le Père, nous ne sommes qu’un.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette fois encore, ils ramassèrent des pierres pour le lapider.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai accompli sous vos yeux un grand nombre d’œuvres bonnes par la puissance du Père ; pour laquelle voulez-vous me lapider ?
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs répliquèrent : Nous ne voulons pas te lapider pour une bonne action, mais parce que tu blasphèmes. Car, toi qui n’es qu’un homme, tu te fais passer pour Dieu.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’est-il pas écrit dans votre propre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Loi
      - type: text
        text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: 'Moi, je vous avais dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Vous êtes des dieux
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.34 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 82.6
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '?'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, on ne saurait contester le témoignage de l’Ecriture. Si donc votre Loi appelle « dieux » ceux auxquels s’adresse la Parole de Dieu,
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'comment pouvez-vous m’accuser de blasphème parce que j’ai dit : « Je suis le Fils de Dieu », quand c’est le Père qui m’a consacré et envoyé dans le monde ?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si je n’accomplis pas les œuvres de mon Père, vous n’avez pas besoin de croire en moi.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais si, au contraire, je les accomplis, même si vous ne voulez pas me croire, laissez-vous au moins convaincre par mes œuvres, pour que vous reconnaissiez et que vous compreniez que le Père est en moi et que je suis dans le Père.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, ils tentèrent à nouveau de se saisir de lui, mais il leur échappa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quand il a conduit au dehors toutes celles qui sont à lui, il marche à leur tête et les brebis le suivent, parce que sa voix leur est familière.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, Jésus se retira de l’autre côté du Jourdain, au lieu même où Jean avait précédemment baptisé. Il y resta quelque temps.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de monde vint le trouver. On disait : Jean n’a fait aucun signe miraculeux, mais tout ce qu’il a dit de cet homme était vrai.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et là, beaucoup crurent en lui.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jamais, elles ne suivront un étranger ; au contraire, elles fuiront loin de lui, car elles ne connaissent pas la voix des étrangers.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur raconta cette parabole, mais ils ne comprirent pas ce qu’il voulait leur dire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il reprit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : Moi, je suis la porte par où passent les brebis.'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tous ceux qui sont venus avant moi étaient des voleurs et des brigands. Mais les brebis ne les ont pas écoutés.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est moi qui suis la porte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mi 2.12-13
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '. Celui qui entre par moi sera '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauvé
      - type: text
        text: '  : il pourra aller et venir librement, il trouvera de quoi se nourrir'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des pâturages.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
