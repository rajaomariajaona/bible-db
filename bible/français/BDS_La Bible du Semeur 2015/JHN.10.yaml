document_id: JHN.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vrai guide
  - type: text
    content: ' '
  - type: text
    content: 'Vraiment, je vous l’assure : si quelqu’un n’entre pas par la porte dans l’enclos où l’on parque les brebis'
  - type: text
    content: ' '
  - type: note
    content: Pendant la nuit, on parquait les moutons dans des enclos formés de murs de pierres sèches. Parfois, le berger se couchait en travers de l’entrée.
  - type: text
    content: ', mais qu’il escalade le mur à un autre endroit, c’est un voleur et un brigand.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: Le voleur vient seulement pour voler, pour tuer et pour détruire. Moi, je suis venu afin que les hommes aient la vie, une vie abondante.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Moi, je suis le bon berger. Le bon berger donne sa vie pour ses brebis.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Celui qui n’est pas le berger, qui n’est pas le propriétaire des brebis, mais que l’on paye pour les garder, se sauve, lui, dès qu’il voit venir le loup, et il abandonne les brebis ; alors le loup se précipite sur elles, il s’empare de quelques-unes et disperse le troupeau.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Cet homme agit ainsi parce qu’il est payé pour faire ce travail et qu’il n’a aucun souci des brebis.
  '14':
  - type: text
    content: ' '
  - type: text
    content: Moi, je suis le bon berger ; je connais mes brebis et mes brebis me connaissent,
  - type: text
    content: ' '
  '15':
  - type: text
    content: tout comme le Père me connaît et que je connais le Père. Je donne ma vie pour mes brebis.
  - type: text
    content: ' '
  '16':
  - type: text
    content: J’ai encore d’autres brebis qui ne sont pas de cet enclos. Celles-là aussi, il faut que je les amène ; elles écouteront ma voix, ainsi il n’y aura plus qu’un seul troupeau avec un seul berger.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Si le Père m’aime, c’est parce que je donne ma vie ; mais ensuite, je la reprendrai.
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'En effet, personne ne peut m’ôter la vie : je la donne de mon propre gré. J’ai le pouvoir de la donner et de la reprendre. Tel est l’ordre que j’ai reçu de mon Père.'
  '19':
  - type: text
    content: 'Il y eut à nouveau division parmi le peuple à cause de ses paroles. '
  '2':
  - type: text
    content: Celui qui entre par la porte est, lui, le berger des brebis.
  '20':
  - type: text
    content: 'Beaucoup disaient : Il a un démon en lui, c’est un fou. Pourquoi l’écoutez-vous ?'
  '21':
  - type: text
    content: 'D’autres répliquaient : Un démoniaque ne parlerait pas ainsi. Et puis : est-ce qu’un démon peut rendre la vue à des aveugles ?'
  - type: heading
    content: Fils de Dieu ou blasphémateur ?
  '22':
  - type: text
    content: Le moment vint où l’on célébrait à Jérusalem la fête de la Consécration
  - type: note
    content: Fête où l’on rappelait la restauration de l’autel du temple de Jérusalem effectuée par le patriote juif Judas Maccabée en 164 av. J.-C.
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'C’était l’hiver. Jésus allait et venait dans la cour du Temple, dans la galerie de Salomon. '
  '24':
  - type: text
    content: 'Alors on fit cercle autour de lui et on l’interpella : Combien de temps nous tiendras-tu encore en haleine ? Si tu es le Messie, dis-le-nous clairement.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: – Je vous l’ai déjà dit,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: 'mais vous ne croyez pas. Pourtant, vous avez vu les actes que j’accomplis au nom de mon Père : ce sont eux qui témoignent en ma faveur.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Mais vous ne croyez pas. Pourquoi ? Parce que vous ne faites pas partie de mes brebis.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Mes brebis écoutent ma voix, je les connais et elles me suivent.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Je leur donne la vie éternelle : jamais elles ne périront et personne ne pourra les arracher de ma main.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Mon Père qui me les a données est plus grand que tous, et personne ne peut arracher qui que ce soit de la main de mon Père.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Le gardien de l’enclos lui ouvre, les brebis écoutent sa voix. Il appelle par leur nom celles qui lui appartiennent, et il les fait sortir de l’enclos.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Or, moi et le Père, nous ne sommes qu’un.
  '31':
  - type: text
    content: Cette fois encore, ils ramassèrent des pierres pour le lapider.
  '32':
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: J’ai accompli sous vos yeux un grand nombre d’œuvres bonnes par la puissance du Père ; pour laquelle voulez-vous me lapider ?
  '33':
  - type: text
    content: 'Les Juifs répliquèrent : Nous ne voulons pas te lapider pour une bonne action, mais parce que tu blasphèmes. Car, toi qui n’es qu’un homme, tu te fais passer pour Dieu.'
  '34':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: 'N’est-il pas écrit dans votre propre '
  - type: text
    content: Loi
  - type: text
    content: '  :'
  - type: text
    content: 'Moi, je vous avais dit :'
  - type: text
    content: Vous êtes des dieux
  - type: text
    content: ' '
  - type: note
    content: Ps 82.6 .
  - type: text
    content: '?'
  '35':
  - type: text
    content: ' '
  - type: text
    content: Or, on ne saurait contester le témoignage de l’Ecriture. Si donc votre Loi appelle « dieux » ceux auxquels s’adresse la Parole de Dieu,
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'comment pouvez-vous m’accuser de blasphème parce que j’ai dit : « Je suis le Fils de Dieu », quand c’est le Père qui m’a consacré et envoyé dans le monde ?'
  '37':
  - type: text
    content: ' '
  - type: text
    content: Si je n’accomplis pas les œuvres de mon Père, vous n’avez pas besoin de croire en moi.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Mais si, au contraire, je les accomplis, même si vous ne voulez pas me croire, laissez-vous au moins convaincre par mes œuvres, pour que vous reconnaissiez et que vous compreniez que le Père est en moi et que je suis dans le Père.
  '39':
  - type: text
    content: 'Là-dessus, ils tentèrent à nouveau de se saisir de lui, mais il leur échappa. '
  '4':
  - type: text
    content: Quand il a conduit au dehors toutes celles qui sont à lui, il marche à leur tête et les brebis le suivent, parce que sa voix leur est familière.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Après cela, Jésus se retira de l’autre côté du Jourdain, au lieu même où Jean avait précédemment baptisé. Il y resta quelque temps.
  '41':
  - type: text
    content: 'Beaucoup de monde vint le trouver. On disait : Jean n’a fait aucun signe miraculeux, mais tout ce qu’il a dit de cet homme était vrai.'
  '42':
  - type: text
    content: Et là, beaucoup crurent en lui.
  '5':
  - type: text
    content: Jamais, elles ne suivront un étranger ; au contraire, elles fuiront loin de lui, car elles ne connaissent pas la voix des étrangers.
  '6':
  - type: text
    content: 'Jésus leur raconta cette parabole, mais ils ne comprirent pas ce qu’il voulait leur dire. '
  '7':
  - type: text
    content: 'Alors il reprit : '
  - type: text
    content: 'Vraiment, je vous l’assure : Moi, je suis la porte par où passent les brebis.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Tous ceux qui sont venus avant moi étaient des voleurs et des brigands. Mais les brebis ne les ont pas écoutés.
  - type: text
    content: ' '
  '9':
  - type: text
    content: C’est moi qui suis la porte
  - type: note
    content: Voir Mi 2.12-13.
  - type: text
    content: '. Celui qui entre par moi sera '
  - type: text
    content: sauvé
  - type: text
    content: '  : il pourra aller et venir librement, il trouvera de quoi se nourrir'
  - type: note
    content: 'Autre traduction : des pâturages.'
  - type: text
    content: .
  - type: text
    content: ' '
