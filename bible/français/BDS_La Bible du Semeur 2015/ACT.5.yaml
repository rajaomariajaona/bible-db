document_id: ACT.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Mais un certain Ananias, avec sa femme Saphira, vendit aussi une propriété, et, '
  '10':
  - type: text
    content: Au même instant, elle tomba inanimée aux pieds de Pierre. Les jeunes gens qui rentraient la trouvèrent morte ; ils l’emportèrent et l’enterrèrent aux côtés de son mari.
  '11':
  - type: text
    content: Cet événement inspira une grande crainte à toute l’Eglise
  - type: note
    content: 'Autre traduction : l’assemblée : il est possible que le terme grec ekklèsia soit employé ici en son sens courant.'
  - type: text
    content: ', ainsi qu’à tous ceux qui en entendirent parler.'
  - type: heading
    content: Les apôtres, témoins devant le Grand-Conseil
  '12':
  - type: text
    content: 'Les apôtres accomplissaient beaucoup de signes miraculeux et de prodiges parmi le peuple. Tous les croyants avaient l’habitude de se rassembler dans la cour du Temple, sous le portique de Salomon. '
  '13':
  - type: text
    content: Personne d’autre n’osait se joindre à eux, mais le peuple tout entier les tenait en haute estime.
  '14':
  - type: text
    content: 'Un nombre toujours croissant d’hommes et de femmes croyaient au Seigneur et se joignaient à eux. '
  '15':
  - type: text
    content: 'On allait jusqu’à porter les malades dans les rues, où on les déposait sur des lits ou des civières, pour qu’au passage de Pierre son ombre au moins couvre l’un d’eux. '
  '16':
  - type: text
    content: Des villes voisines même, les gens accouraient en foule à Jérusalem pour amener des malades et des personnes tourmentées par de mauvais esprits. Et tous étaient guéris.
  '17':
  - type: text
    content: 'Alors, poussés par la jalousie, le grand-prêtre et tout son entourage, c’est-à-dire ceux qui appartenaient au parti des sadducéens, décidèrent d’intervenir. '
  '18':
  - type: text
    content: Ils firent arrêter les apôtres et les firent incarcérer dans la prison publique.
  '19':
  - type: text
    content: 'Mais, pendant la nuit, un ange du Seigneur vint ouvrir les portes de la prison et, après avoir fait sortir les apôtres, il leur dit : '
  '2':
  - type: text
    content: en accord avec elle, mit de côté une partie de l’argent de la vente, apporta le reste aux apôtres et le leur remit.
  '20':
  - type: text
    content: Allez au Temple et là, proclamez au peuple tout le message de la vie nouvelle.
  '21':
  - type: text
    content: 'Les apôtres obéirent : dès l’aube, ils se rendirent dans la cour du Temple et se mirent à enseigner. De son côté, le grand-prêtre arriva avec son entourage, et ils convoquèrent le Grand-Conseil et toute l’assemblée des responsables du peuple d’Israël. Ils ordonnèrent d’aller chercher les apôtres à la prison et de les amener.'
  '22':
  - type: text
    content: 'Les gardes s’y rendirent, mais ils ne les trouvèrent pas dans le cachot. A leur retour, ils firent leur rapport : '
  '23':
  - type: text
    content: Nous avons trouvé la prison soigneusement fermée, les sentinelles étaient à leur poste devant les portes, mais quand nous avons ouvert le cachot, nous n’y avons trouvé personne.
  '24':
  - type: text
    content: 'Cette nouvelle plongea le chef de la police du Temple et les chefs des prêtres dans une grande perplexité : ils se demandaient ce qui avait bien pu se passer.'
  '25':
  - type: text
    content: 'Là-dessus, quelqu’un vint leur annoncer : Les hommes que vous avez fait mettre en prison se tiennent dans la cour du Temple et ils enseignent le peuple'
  - type: note
    content: A l’époque, les séances du Grand-Conseil n’avaient plus lieu au Temple mais dans la ville.
  - type: text
    content: .
  '26':
  - type: text
    content: 'Aussitôt, le chef de la police du Temple s’y rendit avec un détachement de gardes et ils ramenèrent les apôtres, mais avec ménagements, car ils avaient peur de se faire lapider par le peuple. '
  '27':
  - type: text
    content: Après les avoir ramenés, ils les introduisirent dans la salle du Grand-Conseil.
  - type: text
    content: 'Le grand-prêtre leur dit : '
  '28':
  - type: text
    content: Nous vous avions formellement interdit d’enseigner au nom de cet homme. Et voilà que vous avez rempli Jérusalem de votre enseignement, et vous voulez nous rendre responsables de la mort de cet homme.
  '29':
  - type: text
    content: 'Mais Pierre et les apôtres répondirent : Il faut obéir à Dieu plutôt qu’aux hommes. '
  '3':
  - type: text
    content: 'Pierre lui dit : Ananias, comment as-tu pu laisser Satan envahir à tel point ton cœur ? Tu as menti au Saint-Esprit en cachant le prix réel de ton champ pour en détourner une partie à ton profit ! '
  '30':
  - type: text
    content: 'Le Dieu de nos ancêtres a ressuscité ce Jésus que vous avez mis à mort en le clouant sur le bois. '
  '31':
  - type: text
    content: Et c’est lui que Dieu a élevé pour siéger à sa droite
  - type: note
    content: Voir 2.33.
  - type: text
    content: ', comme Chef suprême et Sauveur, pour accorder à Israël la grâce de changer et de recevoir le pardon de ses péchés. '
  '32':
  - type: text
    content: Et nous, nous sommes les témoins de ces événements, avec le Saint-Esprit que Dieu a donné à ceux qui lui obéissent.
  '33':
  - type: text
    content: Ces paroles ne firent qu’exaspérer les membres du Grand-Conseil et ils voulaient faire mourir les apôtres.
  '34':
  - type: text
    content: Mais l’un d’entre eux, un pharisien nommé Gamaliel
  - type: note
    content: Gamaliel était l’un des plus célèbres rabbins (« maîtres ») de l’époque. Membre du Grand-Conseil, il avait un millier de disciples, dont le futur apôtre Paul (Ac 22.3).
  - type: text
    content: ', se leva pour donner son avis. C’était un éminent enseignant de la Loi, estimé de tout le peuple. Il demanda que l’on fasse sortir un instant les apôtres, '
  '35':
  - type: text
    content: 'puis il dit : Israélites, faites bien attention à ce que vous allez faire avec ces hommes. '
  '36':
  - type: text
    content: 'Rappelez-vous : il y a quelque temps, on a vu paraître un certain Theudas qui se donnait pour un personnage important. Il a entraîné quelque quatre cents hommes à sa suite. Or, il a été tué, et tous ceux qui s’étaient ralliés à lui furent dispersés et l’on n’en entendit plus parler. '
  '37':
  - type: text
    content: Après lui, à l’époque du recensement, Judas de Galilée a fait son apparition. Lui aussi a attiré à lui bien des gens. Il a péri à son tour et tous ses partisans furent mis en déroute.
  '38':
  - type: text
    content: 'A présent donc, voici mon avis : Ne vous occupez plus de ces hommes et laissez-les partir. De deux choses l’une : ou bien leur projet et leur œuvre viennent des hommes et, dans ce cas, leur mouvement disparaîtra. '
  '39':
  - type: text
    content: Ou bien, il vient de Dieu, et alors, vous ne pourrez pas le détruire. Ne prenez pas le risque de lutter contre Dieu.
  - type: text
    content: 'Le Conseil se rangea à son avis : '
  '4':
  - type: text
    content: N’étais-tu pas libre de garder ta propriété ? Ou même, après l’avoir vendue, ne pouvais-tu pas faire de ton argent ce que tu voulais ? Comment as-tu pu décider en toi-même de commettre une telle action ? Ce n’est pas à des hommes que tu as menti, mais à Dieu.
  '40':
  - type: text
    content: ils rappelèrent les apôtres, les firent battre, et leur défendirent de parler au nom de Jésus. Après quoi, ils les relâchèrent.
  '41':
  - type: text
    content: 'Les apôtres quittèrent la salle du Conseil tout joyeux de ce que Dieu les ait jugés dignes de souffrir l’humiliation pour Jésus. '
  '42':
  - type: text
    content: Et chaque jour, dans la cour du Temple ou dans les maisons particulières, ils continuaient à enseigner et à annoncer le Messie Jésus.
  '5':
  - type: text
    content: 'A ces mots, Ananias tomba raide mort. Tous ceux qui l’apprirent furent remplis d’une grande crainte. '
  '6':
  - type: text
    content: Des jeunes gens vinrent envelopper le corps
  - type: note
    content: Chez les Juifs les morts étaient enveloppés dans un linceul et déposés ainsi dans la tombe.
  - type: text
    content: ', puis l’emportèrent pour l’enterrer.'
  '7':
  - type: text
    content: Environ trois heures plus tard, la femme d’Ananias entra sans savoir ce qui s’était passé.
  '8':
  - type: text
    content: 'Pierre lui demanda : Dis-moi, est-ce bien à ce prix-là que vous avez vendu votre champ ?'
  - type: text
    content: – Oui, répondit-elle, c’est bien à ce prix.
  '9':
  - type: text
    content: 'Alors Pierre lui dit : Comment avez-vous pu vous concerter pour provoquer ainsi l’Esprit du Seigneur ? Ecoute : ceux qui viennent d’enterrer ton mari sont devant la porte et ils vont t’emporter, toi aussi.'
