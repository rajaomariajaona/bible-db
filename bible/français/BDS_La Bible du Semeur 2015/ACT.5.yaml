document_id: ACT.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais un certain Ananias, avec sa femme Saphira, vendit aussi une propriété, et, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au même instant, elle tomba inanimée aux pieds de Pierre. Les jeunes gens qui rentraient la trouvèrent morte ; ils l’emportèrent et l’enterrèrent aux côtés de son mari.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cet événement inspira une grande crainte à toute l’Eglise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’assemblée : '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'il est possible que le terme grec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ekklèsia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: soit employé ici en son sens courant.
      marker-yv: yv-n
    - type: text
      text: ', ainsi qu’à tous ceux qui en entendirent parler.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les apôtres, témoins devant le Grand-Conseil
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres accomplissaient beaucoup de signes miraculeux et de prodiges parmi le peuple. Tous les croyants avaient l’habitude de se rassembler dans la cour du Temple, sous le portique de Salomon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne d’autre n’osait se joindre à eux, mais le peuple tout entier les tenait en haute estime.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un nombre toujours croissant d’hommes et de femmes croyaient au Seigneur et se joignaient à eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On allait jusqu’à porter les malades dans les rues, où on les déposait sur des lits ou des civières, pour qu’au passage de Pierre son ombre au moins couvre l’un d’eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des villes voisines même, les gens accouraient en foule à Jérusalem pour amener des malades et des personnes tourmentées par de mauvais esprits. Et tous étaient guéris.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, poussés par la jalousie, le grand-prêtre et tout son entourage, c’est-à-dire ceux qui appartenaient au parti des sadducéens, décidèrent d’intervenir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils firent arrêter les apôtres et les firent incarcérer dans la prison publique.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, pendant la nuit, un ange du Seigneur vint ouvrir les portes de la prison et, après avoir fait sortir les apôtres, il leur dit : '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: en accord avec elle, mit de côté une partie de l’argent de la vente, apporta le reste aux apôtres et le leur remit.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Allez au Temple et là, proclamez au peuple tout le message de la vie nouvelle.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres obéirent : dès l’aube, ils se rendirent dans la cour du Temple et se mirent à enseigner. De son côté, le grand-prêtre arriva avec son entourage, et ils convoquèrent le Grand-Conseil et toute l’assemblée des responsables du peuple d’Israël. Ils ordonnèrent d’aller chercher les apôtres à la prison et de les amener.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gardes s’y rendirent, mais ils ne les trouvèrent pas dans le cachot. A leur retour, ils firent leur rapport : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous avons trouvé la prison soigneusement fermée, les sentinelles étaient à leur poste devant les portes, mais quand nous avons ouvert le cachot, nous n’y avons trouvé personne.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette nouvelle plongea le chef de la police du Temple et les chefs des prêtres dans une grande perplexité : ils se demandaient ce qui avait bien pu se passer.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, quelqu’un vint leur annoncer : Les hommes que vous avez fait mettre en prison se tiennent dans la cour du Temple et ils enseignent le peuple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A l’époque, les séances du Grand-Conseil n’avaient plus lieu au Temple mais dans la ville.
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt, le chef de la police du Temple s’y rendit avec un détachement de gardes et ils ramenèrent les apôtres, mais avec ménagements, car ils avaient peur de se faire lapider par le peuple. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après les avoir ramenés, ils les introduisirent dans la salle du Grand-Conseil.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le grand-prêtre leur dit : '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous vous avions formellement interdit d’enseigner au nom de cet homme. Et voilà que vous avez rempli Jérusalem de votre enseignement, et vous voulez nous rendre responsables de la mort de cet homme.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pierre et les apôtres répondirent : Il faut obéir à Dieu plutôt qu’aux hommes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui dit : Ananias, comment as-tu pu laisser Satan envahir à tel point ton cœur ? Tu as menti au Saint-Esprit en cachant le prix réel de ton champ pour en détourner une partie à ton profit ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Dieu de nos ancêtres a ressuscité ce Jésus que vous avez mis à mort en le clouant sur le bois. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et c’est lui que Dieu a élevé pour siéger à sa droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.33'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', comme Chef suprême et Sauveur, pour accorder à Israël la grâce de changer et de recevoir le pardon de ses péchés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et nous, nous sommes les témoins de ces événements, avec le Saint-Esprit que Dieu a donné à ceux qui lui obéissent.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces paroles ne firent qu’exaspérer les membres du Grand-Conseil et ils voulaient faire mourir les apôtres.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais l’un d’entre eux, un pharisien nommé Gamaliel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gamaliel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était l’un des plus célèbres rabbins (« maîtres ») de l’époque. Membre du Grand-Conseil, il avait un millier de disciples, dont le futur apôtre Paul (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 22.3
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', se leva pour donner son avis. C’était un éminent enseignant de la Loi, estimé de tout le peuple. Il demanda que l’on fasse sortir un instant les apôtres, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis il dit : Israélites, faites bien attention à ce que vous allez faire avec ces hommes. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rappelez-vous : il y a quelque temps, on a vu paraître un certain Theudas qui se donnait pour un personnage important. Il a entraîné quelque quatre cents hommes à sa suite. Or, il a été tué, et tous ceux qui s’étaient ralliés à lui furent dispersés et l’on n’en entendit plus parler. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après lui, à l’époque du recensement, Judas de Galilée a fait son apparition. Lui aussi a attiré à lui bien des gens. Il a péri à son tour et tous ses partisans furent mis en déroute.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A présent donc, voici mon avis : Ne vous occupez plus de ces hommes et laissez-les partir. De deux choses l’une : ou bien leur projet et leur œuvre viennent des hommes et, dans ce cas, leur mouvement disparaîtra. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ou bien, il vient de Dieu, et alors, vous ne pourrez pas le détruire. Ne prenez pas le risque de lutter contre Dieu.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Conseil se rangea à son avis : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N’étais-tu pas libre de garder ta propriété ? Ou même, après l’avoir vendue, ne pouvais-tu pas faire de ton argent ce que tu voulais ? Comment as-tu pu décider en toi-même de commettre une telle action ? Ce n’est pas à des hommes que tu as menti, mais à Dieu.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ils rappelèrent les apôtres, les firent battre, et leur défendirent de parler au nom de Jésus. Après quoi, ils les relâchèrent.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres quittèrent la salle du Conseil tout joyeux de ce que Dieu les ait jugés dignes de souffrir l’humiliation pour Jésus. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et chaque jour, dans la cour du Temple ou dans les maisons particulières, ils continuaient à enseigner et à annoncer le Messie Jésus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ces mots, Ananias tomba raide mort. Tous ceux qui l’apprirent furent remplis d’une grande crainte. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des jeunes gens vinrent envelopper le corps
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Chez les Juifs les morts étaient enveloppés dans un linceul et déposés ainsi dans la tombe.
      marker-yv: yv-n
    - type: text
      text: ', puis l’emportèrent pour l’enterrer.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Environ trois heures plus tard, la femme d’Ananias entra sans savoir ce qui s’était passé.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui demanda : Dis-moi, est-ce bien à ce prix-là que vous avez vendu votre champ ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Oui, répondit-elle, c’est bien à ce prix.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre lui dit : Comment avez-vous pu vous concerter pour provoquer ainsi l’Esprit du Seigneur ? Ecoute : ceux qui viennent d’enterrer ton mari sont devant la porte et ils vont t’emporter, toi aussi.'
