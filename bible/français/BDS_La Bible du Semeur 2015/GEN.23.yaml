document_id: GEN.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’achat d’un terrain dans le pays de Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sara vécut cent vingt-sept ans. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle mourut à Qiryath-Arba, c’est-à-dire Hébron, dans le pays de Canaan. Abraham célébra ses funérailles et la pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis il se leva de l’endroit où reposait le corps de sa femme et alla parler aux Hittites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce nom s’applique aux descendants de Heth qui habitaient ce qui deviendra le pays d’Israël, en particulier la région d’Hébron. Selon certains, ces Hittites n’ont aucun lien avec les Hittites qui, de 1800 à 1200 av. J.-C., ont régné, en Asie Mineure, sur un grand empire qui s’est étendu jusqu’en Syrie et au Liban. Pour d’autres, ces deux groupes hittites ont une origine lointaine commune.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il leur dit : Je ne suis qu’un étranger chez vous ; accordez-moi parmi vous une propriété'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La propriété contenant le tombeau de Sara sera la première possession d’Abraham dans le pays promis. Son acquisition attestait sa foi dans la promesse divine : il voulait que sa femme soit enterrée là où ses descendants séjourneraient. Voir Ac 7.16 ; Hé 11.9, 13.'
    marker-yv: yv-n
  - type: text
    text: ' funéraire pour que je puisse enterrer ma femme qui est morte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Hittites répondirent à Abraham : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ecoute-nous, mon seigneur, nous te considérons comme un prince de Dieu au milieu de nous. Ensevelis le corps de ta femme dans la meilleure de nos tombes. Aucun de nous ne te refusera un tombeau pour ensevelir ta femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Abraham s’avança et se prosterna devant les Hittites qui habitaient le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis il leur dit : Puisque vous me permettez d’enterrer le corps de ma femme, faites-moi la faveur de prier Ephrôn, fils de Tsohar, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: de me céder la caverne de Makpéla qui lui appartient et qui se trouve à l’extrémité de son champ. Qu’il me l’accorde en propriété funéraire en votre présence contre sa pleine valeur en argent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Or Ephrôn le Hittite siégeait parmi eux. Il répondit à Abraham devant tous les Hittites qui venaient à la porte de sa ville : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Non, mon seigneur, écoute-moi. Je te donne le champ et la caverne qui s’y trouve. Je t’en fais don en présence des gens de mon peuple pour que tu y ensevelisses le corps de ta femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abraham s’inclina profondément devant les gens de la région '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et il répondit à Ephrôn de façon à être entendu par tous : S’il te plaît, écoute-moi à ton tour. Permets-moi de te payer le prix du champ. Accepte-le de ma part et j’y ensevelirai le corps de ma femme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Ephrôn reprit : '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon seigneur, écoute-moi. Que représente entre nous une terre qui vaut quatre cents pièces d’argent ? Prends-la donc et ensevelis le corps de ta femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Abraham accepta la proposition d’Ephrôn et lui pesa la somme qu’il avait mentionnée en présence des autres Hittites, à savoir quatre cents pièces d’argent suivant le cours usuel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De la sorte, le terrain d’Ephrôn, qui est à Makpéla, vis-à-vis de Mamré, ainsi que la caverne qui s’y trouvait et tous les arbres sur le terrain et ceux qui l’entouraient passèrent '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'en propriété à Abraham en présence des Hittites et de tous ceux qui étaient venus à la porte de sa ville. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après quoi, Abraham ensevelit sa femme Sara dans la caverne du champ de Makpéla, vis-à-vis de Mamré, c’est-à-dire d’Hébron, dans le pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les Hittites garantirent à Abraham la propriété du champ et de la caverne pour qu’il y enterre ses morts.
