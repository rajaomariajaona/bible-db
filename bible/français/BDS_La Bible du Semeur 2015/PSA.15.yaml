document_id: PSA.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qui peut vivre avec Dieu ?
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, qui pourra séjourner ╵dans ton sanctuaire ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui donc peut demeurer ╵sur ta montagne sacrée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La colline de Sion où sera bâti le temple de Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.6'
        metadata:
          usfm: PSA.2.6
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’homme à la conduite intègre : ╵il pratique la justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il dit la vérité ╵qu’il pense au fond de son cœur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui, dans son cœur, cultive la vérité.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: il ne calomnie pas son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne lui fait aucun mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne s’associe pas ╵à ce qui déprécierait ses proches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il méprise l’homme vil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il honore celui ╵qui craint l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il tient toujours ses serments ╵même s’il doit en pâtir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il ne prête pas ╵de l’argent à intérêt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La Loi interdisait à l’Israélite de prêter de l’argent contre intérêt à ses compatriotes (Ex 22.24 ; Dt 23.20).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il refuse qu’on l’achète ╵pour condamner l’innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui se conduit de la sorte ╵rien ne pourra l’ébranler.
