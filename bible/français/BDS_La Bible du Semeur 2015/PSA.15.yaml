document_id: PSA.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Qui peut vivre avec Dieu ?
  - type: text
    content: Psaume de David.
  - type: text
    content: Eternel, qui pourra séjourner ╵dans ton sanctuaire ?
  - type: text
    content: Et qui donc peut demeurer ╵sur ta montagne sacrée
  - type: note
    content: La colline de Sion où sera bâti le temple de Jérusalem (voir 2.6).
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: 'L’homme à la conduite intègre : ╵il pratique la justice,'
  - type: text
    content: et il dit la vérité ╵qu’il pense au fond de son cœur
  - type: note
    content: 'Autre traduction : qui, dans son cœur, cultive la vérité.'
  - type: text
    content: ','
  '3':
  - type: text
    content: il ne calomnie pas son prochain,
  - type: text
    content: il ne lui fait aucun mal,
  - type: text
    content: et il ne s’associe pas ╵à ce qui déprécierait ses proches.
  '4':
  - type: text
    content: Il méprise l’homme vil,
  - type: text
    content: mais il honore celui ╵qui craint l’Eternel.
  - type: text
    content: Il tient toujours ses serments ╵même s’il doit en pâtir.
  '5':
  - type: text
    content: Il ne prête pas ╵de l’argent à intérêt
  - type: note
    content: La Loi interdisait à l’Israélite de prêter de l’argent contre intérêt à ses compatriotes (Ex 22.24 ; Dt 23.20).
  - type: text
    content: ','
  - type: text
    content: il refuse qu’on l’achète ╵pour condamner l’innocent.
  - type: text
    content: Qui se conduit de la sorte ╵rien ne pourra l’ébranler.
