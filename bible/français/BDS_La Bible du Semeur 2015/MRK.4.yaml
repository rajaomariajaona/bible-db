document_id: MRK.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole du semeur
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.1-15 ; Lc 8.4-10)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus commença de nouveau à enseigner au bord du lac. Autour de lui, la foule s’assembla si nombreuse qu’il dut monter dans un bateau. Il s’y assit. Le bateau était sur le lac et tous les gens, tournés vers le lac, se tenaient sur le rivage. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand il fut seul avec eux, ceux qui l’accompagnaient, ainsi que les Douze, lui demandèrent ce que signifiaient les paraboles qu’il venait de raconter. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Les secrets du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' vous ont été confiés ; mais à ceux du dehors, tout est présenté au moyen de paraboles,'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'afin que :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: Lorsqu’ils voient de leurs propres yeux,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ils ne saisissent pas ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: quand ils entendent de leurs propres oreilles,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: ils ne comprennent pas ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: de peur qu’ils reviennent à Dieu
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: et reçoivent le pardon de leurs fautes
      - type: text
        text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 6.9-10
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis il leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous ne comprenez pas cette parabole ? Comment alors comprendrez-vous les autres ?
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.18-23 ; Lc 8.11-15)
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le semeur, c’est celui qui sème la Parole.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Certains hommes se trouvent « au bord du chemin » où la Parole a été semée : à peine l’ont-ils entendue que '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Satan
      - type: text
        text: ' vient arracher la Parole qui a été semée en eux.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Puis, il y a ceux qui reçoivent la semence « sur le sol rocailleux » : quand ils entendent la Parole, ils l’acceptent aussitôt avec joie,'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais ils ne la laissent pas prendre racine en eux, car ils sont inconstants. Que surviennent des difficultés, ou la persécution à cause de la Parole, et les voilà qui abandonnent tout.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'D’autres reçoivent la semence « parmi les ronces » : ce sont ceux qui écoutent la Parole,'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais en qui elle ne porte pas de fruit parce qu’elle est étouffée par les soucis de ce monde, l’attrait trompeur des richesses et toutes sortes d’autres passions qui pénètrent en eux.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il leur enseignait beaucoup de choses sous forme de paraboles. Voici ce qu’il leur disait : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Enfin, il y a ceux qui reçoivent la semence « dans la bonne terre » : ce sont ceux qui écoutent la Parole, qui la reçoivent et qui portent du fruit : un grain en donne trente, un autre soixante, un autre cent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole de la lampe
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 8.16-18)
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il leur dit aussi : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-ce qu’on apporte une lampe pour la mettre sous une mesure à grains ou sous un lit ? N’est-ce pas plutôt pour la mettre sur un pied de lampe ?
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout ce qui est caché doit être mis en lumière, tout ce qui est secret doit paraître au grand jour.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un a des oreilles pour entendre, qu’il entende !
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites bien attention à ce que vous entendez. On vous appliquera la mesure dont vous vous serez servi pour mesurer, et on y ajoutera.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car à celui qui a, on donnera encore, mais à celui qui n’a pas, on ôtera même ce qu’il a.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole de la semence
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il dit aussi : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il en est du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: ' comme d’un homme qui a répandu de la semence dans son champ.'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A présent, qu’il dorme ou qu’il veille, la nuit comme le jour, le grain germe et la plante grandit sans qu’il s’en préoccupe.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'D’elle-même, la terre fait pousser le blé : d’abord la tige, puis l’épi vert, et enfin les grains de blé remplissant cet épi.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et lorsque le grain est prêt à être cueilli, l’homme y porte aussitôt la faucille, car la moisson est prête.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La parabole de la graine de moutarde
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.31-32 ; Lc 13.18-19)
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ecoutez : un semeur sortit pour semer.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il continua en disant : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'A quoi comparerons-nous le royaume de Dieu ? Par quelle '
      - type: usfm
        marker: w
        children:
        - type: text
          text: parabole
      - type: text
        text: ' pourrions-nous le présenter ?'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il en est de lui comme d’une graine de moutarde : lorsqu’on la sème dans la terre, c’est la plus petite des semences du monde.'
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, une fois semée, elle pousse et devient plus grande que toutes les plantes du potager. Il y monte des branches si grandes que les oiseaux du ciel peuvent nicher à son ombre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 13.34-35)
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Par beaucoup de paraboles de ce genre, il enseignait la Parole de Dieu à ses auditeurs en s’adaptant à ce qu’ils pouvaient comprendre. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il ne leur parlait pas sans se servir de paraboles et, lorsqu’il était seul avec ses disciples, il leur expliquait tout.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plus fort que la tempête
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 8.23-27 ; Lc 8.22-25)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ce jour-là, quand le soir fut venu, Jésus dit à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Passons de l’autre côté du lac !
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ils laissèrent la foule et emmenèrent Jésus sur le lac, dans le bateau où il se trouvait. D’autres bateaux les accompagnaient. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Or, voilà qu’un vent très violent se mit à souffler. Les vagues se jetaient contre le bateau, qui se remplissait d’eau. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Lui, à l’arrière, dormait, la tête sur un coussin.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples le réveillèrent et lui crièrent : Maître, nous sommes perdus, et tu ne t’en soucies pas ?'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Il se réveilla, parla sévèrement au vent et ordonna au lac : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Silence ! Tais-toi !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le vent tomba, et il se fit un grand calme.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or comme il répandait sa semence, des grains tombèrent au bord du chemin ; les oiseaux vinrent et les mangèrent.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Puis il dit à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi avez-vous si peur ? Vous ne croyez pas encore ?
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Mais eux furent saisis d’une grande crainte ; ils se disaient les uns aux autres : Qui est donc cet homme pour que même le vent et le lac lui obéissent ?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: D’autres tombèrent sur un sol rocailleux et, ne trouvant qu’une mince couche de terre, ils levèrent rapidement parce que la terre sur laquelle ils étaient tombés n’était pas profonde.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais quand le soleil monta dans le ciel, les petits plants furent vite brûlés et, comme ils n’avaient pas vraiment pris racine, ils séchèrent.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: D’autres grains tombèrent parmi les ronces. Celles-ci grandirent et étouffèrent les jeunes pousses, si bien qu’elles ne produisirent pas de fruit.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: D’autres encore tombèrent dans la bonne terre et donnèrent des épis qui poussèrent et se développèrent jusqu’à maturité, produisant l’un trente grains, un autre soixante, un autre cent.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui a des oreilles pour entendre, qu’il entende !
