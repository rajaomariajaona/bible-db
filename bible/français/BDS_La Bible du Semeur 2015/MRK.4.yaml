document_id: MRK.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole du semeur
  - type: heading
    content: (Mt 13.1-15 ; Lc 8.4-10)
  - type: text
    content: 'Jésus commença de nouveau à enseigner au bord du lac. Autour de lui, la foule s’assembla si nombreuse qu’il dut monter dans un bateau. Il s’y assit. Le bateau était sur le lac et tous les gens, tournés vers le lac, se tenaient sur le rivage. '
  '10':
  - type: text
    content: 'Quand il fut seul avec eux, ceux qui l’accompagnaient, ainsi que les Douze, lui demandèrent ce que signifiaient les paraboles qu’il venait de raconter. '
  '11':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: 'Les secrets du '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' vous ont été confiés ; mais à ceux du dehors, tout est présenté au moyen de paraboles,'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'afin que :'
  - type: text
    content: Lorsqu’ils voient de leurs propres yeux,
  - type: text
    content: ils ne saisissent pas ;
  - type: text
    content: quand ils entendent de leurs propres oreilles,
  - type: text
    content: ils ne comprennent pas ;
  - type: text
    content: de peur qu’ils reviennent à Dieu
  - type: text
    content: et reçoivent le pardon de leurs fautes
  - type: text
    content: ' '
  - type: note
    content: Es 6.9-10 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Puis il leur dit : '
  - type: text
    content: Vous ne comprenez pas cette parabole ? Comment alors comprendrez-vous les autres ?
  - type: heading
    content: (Mt 13.18-23 ; Lc 8.11-15)
  '14':
  - type: text
    content: ' '
  - type: text
    content: Le semeur, c’est celui qui sème la Parole.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Certains hommes se trouvent « au bord du chemin » où la Parole a été semée : à peine l’ont-ils entendue que '
  - type: text
    content: Satan
  - type: text
    content: ' vient arracher la Parole qui a été semée en eux.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Puis, il y a ceux qui reçoivent la semence « sur le sol rocailleux » : quand ils entendent la Parole, ils l’acceptent aussitôt avec joie,'
  - type: text
    content: ' '
  '17':
  - type: text
    content: mais ils ne la laissent pas prendre racine en eux, car ils sont inconstants. Que surviennent des difficultés, ou la persécution à cause de la Parole, et les voilà qui abandonnent tout.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'D’autres reçoivent la semence « parmi les ronces » : ce sont ceux qui écoutent la Parole,'
  - type: text
    content: ' '
  '19':
  - type: text
    content: mais en qui elle ne porte pas de fruit parce qu’elle est étouffée par les soucis de ce monde, l’attrait trompeur des richesses et toutes sortes d’autres passions qui pénètrent en eux.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Il leur enseignait beaucoup de choses sous forme de paraboles. Voici ce qu’il leur disait : '
  '20':
  - type: text
    content: 'Enfin, il y a ceux qui reçoivent la semence « dans la bonne terre » : ce sont ceux qui écoutent la Parole, qui la reçoivent et qui portent du fruit : un grain en donne trente, un autre soixante, un autre cent.'
  - type: heading
    content: La parabole de la lampe
  - type: heading
    content: (Lc 8.16-18)
  '21':
  - type: text
    content: 'Il leur dit aussi : '
  - type: text
    content: Est-ce qu’on apporte une lampe pour la mettre sous une mesure à grains ou sous un lit ? N’est-ce pas plutôt pour la mettre sur un pied de lampe ?
  - type: text
    content: ' '
  '22':
  - type: text
    content: Tout ce qui est caché doit être mis en lumière, tout ce qui est secret doit paraître au grand jour.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Si quelqu’un a des oreilles pour entendre, qu’il entende !
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Il ajouta : '
  - type: text
    content: Faites bien attention à ce que vous entendez. On vous appliquera la mesure dont vous vous serez servi pour mesurer, et on y ajoutera.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Car à celui qui a, on donnera encore, mais à celui qui n’a pas, on ôtera même ce qu’il a.
  - type: heading
    content: La parabole de la semence
  '26':
  - type: text
    content: 'Il dit aussi : '
  - type: text
    content: 'Il en est du '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' comme d’un homme qui a répandu de la semence dans son champ.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: A présent, qu’il dorme ou qu’il veille, la nuit comme le jour, le grain germe et la plante grandit sans qu’il s’en préoccupe.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'D’elle-même, la terre fait pousser le blé : d’abord la tige, puis l’épi vert, et enfin les grains de blé remplissant cet épi.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Et lorsque le grain est prêt à être cueilli, l’homme y porte aussitôt la faucille, car la moisson est prête.
  - type: heading
    content: La parabole de la graine de moutarde
  - type: heading
    content: (Mt 13.31-32 ; Lc 13.18-19)
  '3':
  - type: text
    content: 'Ecoutez : un semeur sortit pour semer.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Il continua en disant : '
  - type: text
    content: 'A quoi comparerons-nous le royaume de Dieu ? Par quelle '
  - type: text
    content: parabole
  - type: text
    content: ' pourrions-nous le présenter ?'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Il en est de lui comme d’une graine de moutarde : lorsqu’on la sème dans la terre, c’est la plus petite des semences du monde.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Mais, une fois semée, elle pousse et devient plus grande que toutes les plantes du potager. Il y monte des branches si grandes que les oiseaux du ciel peuvent nicher à son ombre.
  - type: heading
    content: (Mt 13.34-35)
  '33':
  - type: text
    content: 'Par beaucoup de paraboles de ce genre, il enseignait la Parole de Dieu à ses auditeurs en s’adaptant à ce qu’ils pouvaient comprendre. '
  '34':
  - type: text
    content: Il ne leur parlait pas sans se servir de paraboles et, lorsqu’il était seul avec ses disciples, il leur expliquait tout.
  - type: heading
    content: Plus fort que la tempête
  - type: heading
    content: (Mt 8.23-27 ; Lc 8.22-25)
  '35':
  - type: text
    content: 'Ce jour-là, quand le soir fut venu, Jésus dit à ses disciples : '
  - type: text
    content: Passons de l’autre côté du lac !
  '36':
  - type: text
    content: 'Ils laissèrent la foule et emmenèrent Jésus sur le lac, dans le bateau où il se trouvait. D’autres bateaux les accompagnaient. '
  '37':
  - type: text
    content: 'Or, voilà qu’un vent très violent se mit à souffler. Les vagues se jetaient contre le bateau, qui se remplissait d’eau. '
  '38':
  - type: text
    content: Lui, à l’arrière, dormait, la tête sur un coussin.
  - type: text
    content: 'Les disciples le réveillèrent et lui crièrent : Maître, nous sommes perdus, et tu ne t’en soucies pas ?'
  '39':
  - type: text
    content: 'Il se réveilla, parla sévèrement au vent et ordonna au lac : '
  - type: text
    content: Silence ! Tais-toi !
  - type: text
    content: Le vent tomba, et il se fit un grand calme.
  '4':
  - type: text
    content: Or comme il répandait sa semence, des grains tombèrent au bord du chemin ; les oiseaux vinrent et les mangèrent.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Puis il dit à ses disciples : '
  - type: text
    content: Pourquoi avez-vous si peur ? Vous ne croyez pas encore ?
  '41':
  - type: text
    content: 'Mais eux furent saisis d’une grande crainte ; ils se disaient les uns aux autres : Qui est donc cet homme pour que même le vent et le lac lui obéissent ?'
  '5':
  - type: text
    content: D’autres tombèrent sur un sol rocailleux et, ne trouvant qu’une mince couche de terre, ils levèrent rapidement parce que la terre sur laquelle ils étaient tombés n’était pas profonde.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais quand le soleil monta dans le ciel, les petits plants furent vite brûlés et, comme ils n’avaient pas vraiment pris racine, ils séchèrent.
  - type: text
    content: ' '
  '7':
  - type: text
    content: D’autres grains tombèrent parmi les ronces. Celles-ci grandirent et étouffèrent les jeunes pousses, si bien qu’elles ne produisirent pas de fruit.
  - type: text
    content: ' '
  '8':
  - type: text
    content: D’autres encore tombèrent dans la bonne terre et donnèrent des épis qui poussèrent et se développèrent jusqu’à maturité, produisant l’un trente grains, un autre soixante, un autre cent.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Jésus ajouta : '
  - type: text
    content: Celui qui a des oreilles pour entendre, qu’il entende !
