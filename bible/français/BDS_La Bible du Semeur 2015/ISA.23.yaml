- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Tyr et Sidon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur Tyr
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tyr
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: importante ville phénicienne sur la côte nord à l’ouest d’Israël, construite en partie sur la terre ferme, en partie sur un îlot proche. Tyr fut à l’époque le plus grand centre commercial du monde antique, elle avait établi des colonies en Asie Mineure, en Grèce, à Chypre, en Afrique (Carthage) et en Espagne (Tarsis). Comme l’Assyrie représente la puissance militaire, Tyr symbolise le commerce.
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hurlez, navires au long cours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: navires de Tarsis.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: car votre port d’attache ╵a été dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses maisons sont détruites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils en ont reçu la nouvelle ╵au retour de Kittim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 24.24
        metadata:
          usfm: NUM.24.24
      - type: text
        text: ' et la note.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Restez muets, ╵habitants de la côte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous marchands de Sidon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sidon
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'deuxième port phénicien, à 40 kilomètres au nord de Tyr (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 28.20-26
        metadata:
          usfm: EZK.28.20+EZK.28.21+EZK.28.22+EZK.28.23+EZK.28.24+EZK.28.25+EZK.28.26
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' ╵dont les commis'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sillonnent de profondes mers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dont les commis… mers
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d’après le texte hébreu de Qumrân.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le blé semé le long du Nil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les moissons qui croissaient ╵sur les rives du fleuve ╵étaient son revenu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle était devenue ╵la place du marché ╵des autres peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sois confuse, Sidon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la mer a parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le refuge des mers
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dit : « Je n’ai pas eu de douleurs,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’ai pas accouché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’ai pas élevé de jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’ai pas élevé de jeunes filles. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lorsque l’Egypte ╵en sera informée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lorsqu’elle apprendra ╵le sort de Tyr, ╵elle sera saisie d’angoisse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fuyez jusqu’à Tarsis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tarsis
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut-être Tartessus, un port d’Espagne (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 1.3
        metadata:
          usfm: JON.1.3
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussez des hurlements, ╵habitants des régions côtières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Est-ce bien là votre cité joyeuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont les origines ╵se perdent dans le temps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sa fondation date d’avant 2000 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce bien là la ville ╵qui s’en allait au loin ╵fonder des colonies ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui donc a décrété ╵tout cela contre Tyr
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui distribuait des couronnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dont les marchands ╵vivaient comme des princes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont les commerçants ╵étaient considérés ╵comme les grands de cette terre ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le Seigneur des armées célestes ╵a décrété cela
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que soit flétri l’orgueil ╵de tout ce qu’on honore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tous les grands de la terre ╵soient rendus méprisables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Va, population de Tarsis, ╵et cultive ton sol
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après le texte hébreu de Qumrân et l’ancienne version grecque. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parcours ton pays.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les Egyptiens ╵dans la vallée du Nil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le port n’existe plus,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car Dieu a étendu ╵la main contre la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait trembler les royaumes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l’Eternel a donné l’ordre ╵de détruire les forteresses ╵des Phéniciens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il a dit : Population de Sidon,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, jeune femme molestée, ╵cesse de te réjouir !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Debout, mets-toi en route, ╵va t’établir à Chypre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais même là, il n’y aura ╵aucun repos pour toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chypre, colonie phénicienne (voir v. 1 et note).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car le pays des Chaldéens
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne sont pas un peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Assur
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c’est-à-dire l’Assyrie. Sennachérib a détruit Babylone en 689 av. J.-C. Si l’Assyrie a vaincu la Chaldée, plus puissante que Tyr et Sidon, celles-ci ne pourront pas échapper à l’emprise assyrienne.
    marker-yv: yv-n
  - type: text
    text: ' l’a assigné ╵aux bêtes du désert ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dressé des tours ╵pour assiéger la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en a rasé les palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en a fait des ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hurlez, navires au long cours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: navires de Tarsis.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: car votre forteresse ╵est dévastée
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: et il arrivera, ╵en ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la ville de Tyr ╵sombrera dans l’oubli ╵pour soixante-dix ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi longtemps que dure ╵la vie d’un roi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce délai écoulé, ╵il en sera de Tyr
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'comme de cette courtisane ╵dont parle la chanson :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Va, et prends une lyre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: courtisane oubliée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tâche de bien jouer, ╵et multiplie tes chants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’on prête attention à toi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et il arrivera, quand soixante-dix ans se seront écoulés, que l’Eternel interviendra pour Tyr qui retournera à ses gains et recommencera à se prostituer avec tous les royaumes sur la surface de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais ses gains, ses profits, seront tous consacrés à l’Eternel. Au lieu d’être amassés, d’être mis en réserve, ses gains appartiendront aux hommes qui demeurent en présence de l’Eternel pour qu’ils puissent manger à satiété, et s’habiller de vêtements splendides.
