document_id: ISA.23,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Tyr et Sidon
  - type: text
    content: Oracle sur Tyr
  - type: note
    content: 'Tyr: importante ville phénicienne sur la côte nord à l’ouest d’Israël, construite en partie sur la terre ferme, en partie sur un îlot proche. Tyr fut à l’époque le plus grand centre commercial du monde antique, elle avait établi des colonies en Asie Mineure, en Grèce, à Chypre, en Afrique (Carthage) et en Espagne (Tarsis). Comme l’Assyrie représente la puissance militaire, Tyr symbolise le commerce.'
  - type: text
    content: '  :'
  - type: text
    content: Hurlez, navires au long cours
  - type: note
    content: 'Autre traduction : navires de Tarsis.'
  - type: text
    content: ','
  - type: text
    content: car votre port d’attache ╵a été dévasté,
  - type: text
    content: ses maisons sont détruites.
  - type: text
    content: Ils en ont reçu la nouvelle ╵au retour de Kittim
  - type: note
    content: Voir Nb 24.24 et la note.
  - type: text
    content: .
  '10':
  - type: text
    content: Va, population de Tarsis, ╵et cultive ton sol
  - type: note
    content: 'D’après le texte hébreu de Qumrân et l’ancienne version grecque. Le texte hébreu traditionnel a : parcours ton pays.'
  - type: text
    content: comme les Egyptiens ╵dans la vallée du Nil.
  - type: text
    content: Le port n’existe plus,
  '11':
  - type: text
    content: car Dieu a étendu ╵la main contre la mer,
  - type: text
    content: il a fait trembler les royaumes.
  - type: text
    content: Oui, l’Eternel a donné l’ordre ╵de détruire les forteresses ╵des Phéniciens.
  '12':
  - type: text
    content: 'Il a dit : Population de Sidon,'
  - type: text
    content: toi, jeune femme molestée, ╵cesse de te réjouir !
  - type: text
    content: Debout, mets-toi en route, ╵va t’établir à Chypre,
  - type: text
    content: mais même là, il n’y aura ╵aucun repos pour toi
  - type: note
    content: Chypre, colonie phénicienne (voir v. 1 et note).
  - type: text
    content: .
  '13':
  - type: text
    content: Car le pays des Chaldéens
  - type: text
    content: qui ne sont pas un peuple,
  - type: text
    content: Assur
  - type: note
    content: 'Assur: c’est-à-dire l’Assyrie. Sennachérib a détruit Babylone en 689 av. J.-C. Si l’Assyrie a vaincu la Chaldée, plus puissante que Tyr et Sidon, celles-ci ne pourront pas échapper à l’emprise assyrienne.'
  - type: text
    content: ' l’a assigné ╵aux bêtes du désert ;'
  - type: text
    content: il a dressé des tours ╵pour assiéger la ville,
  - type: text
    content: il en a rasé les palais,
  - type: text
    content: il en a fait des ruines.
  '14':
  - type: text
    content: Hurlez, navires au long cours
  - type: note
    content: 'Autre traduction : navires de Tarsis.'
  - type: text
    content: ','
  - type: text
    content: car votre forteresse ╵est dévastée
  '15':
  - type: text
    content: et il arrivera, ╵en ce jour-là,
  - type: text
    content: que la ville de Tyr ╵sombrera dans l’oubli ╵pour soixante-dix ans,
  - type: text
    content: aussi longtemps que dure ╵la vie d’un roi.
  - type: text
    content: Ce délai écoulé, ╵il en sera de Tyr
  - type: text
    content: 'comme de cette courtisane ╵dont parle la chanson :'
  '16':
  - type: text
    content: Va, et prends une lyre,
  - type: text
    content: fais le tour de la ville,
  - type: text
    content: courtisane oubliée !
  - type: text
    content: Tâche de bien jouer, ╵et multiplie tes chants,
  - type: text
    content: pour qu’on prête attention à toi !
  '17':
  - type: text
    content: 'Et il arrivera, quand soixante-dix ans se seront écoulés, que l’Eternel interviendra pour Tyr qui retournera à ses gains et recommencera à se prostituer avec tous les royaumes sur la surface de la terre. '
  '18':
  - type: text
    content: Mais ses gains, ses profits, seront tous consacrés à l’Eternel. Au lieu d’être amassés, d’être mis en réserve, ses gains appartiendront aux hommes qui demeurent en présence de l’Eternel pour qu’ils puissent manger à satiété, et s’habiller de vêtements splendides.
  '2':
  - type: text
    content: Restez muets, ╵habitants de la côte,
  - type: text
    content: vous marchands de Sidon
  - type: note
    content: 'Sidon: deuxième port phénicien, à 40 kilomètres au nord de Tyr (voir Ez 28.20-26).'
  - type: text
    content: ' ╵dont les commis'
  - type: text
    content: sillonnent de profondes mers
  - type: note
    content: 'dont les commis… mers: d’après le texte hébreu de Qumrân.'
  - type: text
    content: .
  '3':
  - type: text
    content: Le blé semé le long du Nil,
  - type: text
    content: les moissons qui croissaient ╵sur les rives du fleuve ╵étaient son revenu ;
  - type: text
    content: elle était devenue ╵la place du marché ╵des autres peuples.
  '4':
  - type: text
    content: Sois confuse, Sidon,
  - type: text
    content: car la mer a parlé,
  - type: text
    content: le refuge des mers
  - type: text
    content: 'dit : « Je n’ai pas eu de douleurs,'
  - type: text
    content: je n’ai pas accouché,
  - type: text
    content: je n’ai pas élevé de jeunes gens,
  - type: text
    content: je n’ai pas élevé de jeunes filles. »
  '5':
  - type: text
    content: Lorsque l’Egypte ╵en sera informée
  - type: text
    content: et lorsqu’elle apprendra ╵le sort de Tyr, ╵elle sera saisie d’angoisse.
  '6':
  - type: text
    content: Fuyez jusqu’à Tarsis
  - type: note
    content: 'Tarsis: peut-être Tartessus, un port d’Espagne (voir Jon 1.3).'
  - type: text
    content: ','
  - type: text
    content: poussez des hurlements, ╵habitants des régions côtières.
  '7':
  - type: text
    content: Est-ce bien là votre cité joyeuse
  - type: text
    content: et dont les origines ╵se perdent dans le temps
  - type: note
    content: Sa fondation date d’avant 2000 av. J.-C.
  - type: text
    content: '  ?'
  - type: text
    content: Est-ce bien là la ville ╵qui s’en allait au loin ╵fonder des colonies ?
  '8':
  - type: text
    content: Qui donc a décrété ╵tout cela contre Tyr
  - type: text
    content: qui distribuait des couronnes,
  - type: text
    content: elle dont les marchands ╵vivaient comme des princes
  - type: text
    content: et dont les commerçants ╵étaient considérés ╵comme les grands de cette terre ?
  '9':
  - type: text
    content: Le Seigneur des armées célestes ╵a décrété cela
  - type: text
    content: afin que soit flétri l’orgueil ╵de tout ce qu’on honore,
  - type: text
    content: pour que tous les grands de la terre ╵soient rendus méprisables.
