document_id: 1SA.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le coffre de l’alliance chez les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Après s’être emparés du coffre de Dieu, les Philistins l’emportèrent d’Eben-Ezer à Ashdod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eben-Ezer, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '4.1'
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ashdod
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l’une des cinq principales villes des Philistins, à quelque 55 kilomètres à l’ouest de Jérusalem, près de la Méditerranée (Jos 11.22 ; Ac 8.40).
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Alors ils expédièrent le coffre de Dieu à Eqrôn.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lorsqu’il arriva là-bas, les Eqroniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Eqrôn
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la plus septentrionale des villes principales de Philistie, à une vingtaine de kilomètres au nord d’Ashdod, proche de la frontière israélite.
      marker-yv: yv-n
    - type: text
      text: ' protestèrent en criant : Ils ont transporté le coffre du Dieu d’Israël chez nous pour nous faire mourir, nous et tout notre peuple !'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'A leur tour, ils firent chercher les princes des Philistins pour qu’ils se réunissent et ils leur dirent : Renvoyez le coffre du Dieu d’Israël et qu’il retourne dans son pays pour qu’il ne nous fasse pas mourir toute la population.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une peur mortelle régnait dans toute la ville, car Dieu la frappait sévèrement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les gens qui avaient échappé à la mort étaient atteints de tumeurs et les cris de détresse de la ville montaient jusqu’au ciel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Là, ils le mirent dans le temple de leur dieu Dagôn et l’installèrent à côté de la statue de l’idole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dagôn
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'divinité principale des Philistins (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jg 16.23
        - type: text
          text: '  ; cf. 1 S 31.10 ; 1 Ch 10.10).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le lendemain matin, les habitants d’Ashdod découvrirent Dagôn étendu par terre sur sa face devant le coffre de l’Eternel. Ils le relevèrent et le remirent en place. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le jour suivant, de bonne heure, ils trouvèrent encore Dagôn par terre sur sa face devant le coffre de l’Eternel, sa tête et ses deux mains coupées gisaient sur le seuil de la pièce, seul le tronc était resté là. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est pour cette raison que, jusqu’à ce jour, les prêtres de Dagôn et tous ceux qui entrent dans son temple à Ashdod évitent de poser leur pied sur le seuil.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Puis l’Eternel frappa très sévèrement les Ashdodiens et fit des ravages parmi eux en les frappant de tumeurs ; [des rats apparurent dans le pays, semant la mort et la destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots entre crochets manquent dans le texte hébreu traditionnel. Ils sont restitués d’après l’ancienne version grecque ; voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 6.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '] dans la ville et les territoires qui en dépendaient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En voyant ce qui leur arrivait, les gens d’Ashdod déclarèrent : Le coffre du Dieu d’Israël ne restera pas plus longtemps chez nous, car il nous frappe très sévèrement, nous et Dagôn notre dieu.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils envoyèrent chercher les princes des Philistins pour les réunir chez eux et ils leur demandèrent ce qu’il fallait faire du coffre du Dieu d’Israël. Ceux-ci décidèrent de le transférer à Gath. Ainsi on y transporta le coffre du Dieu d’Israël.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mais quand on l’eut transféré là-bas, l’Eternel intervint contre les habitants de la ville, et y sema la terreur. En effet, l’Eternel les frappa tous, quelle que soit leur condition sociale, et ils furent atteints de tumeurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On hésite sur cette maladie. Selon certains, il s’agirait de dysenterie, d’autres pensent à des hémorroïdes et d’autres encore à une peste bubonique propagée par les rats.
      marker-yv: yv-n
    - type: text
      text: '. '
