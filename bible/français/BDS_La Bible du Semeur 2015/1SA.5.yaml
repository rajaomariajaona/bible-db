document_id: 1SA.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le coffre de l’alliance chez les Philistins
  - type: text
    content: Après s’être emparés du coffre de Dieu, les Philistins l’emportèrent d’Eben-Ezer à Ashdod
  - type: note
    content: 'Pour Eben-Ezer, voir note 4.1. Ashdod: l’une des cinq principales villes des Philistins, à quelque 55 kilomètres à l’ouest de Jérusalem, près de la Méditerranée (Jos 11.22 ; Ac 8.40).'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Alors ils expédièrent le coffre de Dieu à Eqrôn.
  - type: text
    content: Mais lorsqu’il arriva là-bas, les Eqroniens
  - type: note
    content: 'Eqrôn: la plus septentrionale des villes principales de Philistie, à une vingtaine de kilomètres au nord d’Ashdod, proche de la frontière israélite.'
  - type: text
    content: ' protestèrent en criant : Ils ont transporté le coffre du Dieu d’Israël chez nous pour nous faire mourir, nous et tout notre peuple !'
  '11':
  - type: text
    content: 'A leur tour, ils firent chercher les princes des Philistins pour qu’ils se réunissent et ils leur dirent : Renvoyez le coffre du Dieu d’Israël et qu’il retourne dans son pays pour qu’il ne nous fasse pas mourir toute la population.'
  - type: text
    content: 'Une peur mortelle régnait dans toute la ville, car Dieu la frappait sévèrement. '
  '12':
  - type: text
    content: Les gens qui avaient échappé à la mort étaient atteints de tumeurs et les cris de détresse de la ville montaient jusqu’au ciel.
  '2':
  - type: text
    content: Là, ils le mirent dans le temple de leur dieu Dagôn et l’installèrent à côté de la statue de l’idole
  - type: note
    content: 'Dagôn: divinité principale des Philistins (voir note Jg 16.23  ; cf. 1 S 31.10 ; 1 Ch 10.10).'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Le lendemain matin, les habitants d’Ashdod découvrirent Dagôn étendu par terre sur sa face devant le coffre de l’Eternel. Ils le relevèrent et le remirent en place. '
  '4':
  - type: text
    content: 'Le jour suivant, de bonne heure, ils trouvèrent encore Dagôn par terre sur sa face devant le coffre de l’Eternel, sa tête et ses deux mains coupées gisaient sur le seuil de la pièce, seul le tronc était resté là. '
  '5':
  - type: text
    content: C’est pour cette raison que, jusqu’à ce jour, les prêtres de Dagôn et tous ceux qui entrent dans son temple à Ashdod évitent de poser leur pied sur le seuil.
  '6':
  - type: text
    content: Puis l’Eternel frappa très sévèrement les Ashdodiens et fit des ravages parmi eux en les frappant de tumeurs ; [des rats apparurent dans le pays, semant la mort et la destruction
  - type: note
    content: Les mots entre crochets manquent dans le texte hébreu traditionnel. Ils sont restitués d’après l’ancienne version grecque ; voir 1 S 6.5.
  - type: text
    content: '] dans la ville et les territoires qui en dépendaient. '
  '7':
  - type: text
    content: 'En voyant ce qui leur arrivait, les gens d’Ashdod déclarèrent : Le coffre du Dieu d’Israël ne restera pas plus longtemps chez nous, car il nous frappe très sévèrement, nous et Dagôn notre dieu.'
  '8':
  - type: text
    content: Ils envoyèrent chercher les princes des Philistins pour les réunir chez eux et ils leur demandèrent ce qu’il fallait faire du coffre du Dieu d’Israël. Ceux-ci décidèrent de le transférer à Gath. Ainsi on y transporta le coffre du Dieu d’Israël.
  '9':
  - type: text
    content: Mais quand on l’eut transféré là-bas, l’Eternel intervint contre les habitants de la ville, et y sema la terreur. En effet, l’Eternel les frappa tous, quelle que soit leur condition sociale, et ils furent atteints de tumeurs
  - type: note
    content: On hésite sur cette maladie. Selon certains, il s’agirait de dysenterie, d’autres pensent à des hémorroïdes et d’autres encore à une peste bubonique propagée par les rats.
  - type: text
    content: '. '
