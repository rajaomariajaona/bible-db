document_id: REV.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Quatrième vision : le dragon enchaîné pour mille ans'
  - type: text
    content: 'Puis je vis un ange descendre du ciel. Il tenait à la main la clé de l’abîme et une grande chaîne. '
  '10':
  - type: text
    content: 'Alors le diable, qui les trompait, fut jeté dans l’étang de feu et de soufre : il y rejoignit la bête et le faux prophète et ils y subiront des tourments, jour et nuit, pendant l’éternité.'
  - type: heading
    content: 'Sixième vision : le jugement'
  '11':
  - type: text
    content: 'Ensuite je vis un grand trône blanc et celui qui y était assis. Le ciel et la terre s’enfuirent loin de sa présence. Ils disparurent sans laisser de trace. '
  '12':
  - type: text
    content: 'Je vis les morts, les grands et les petits, comparaissant devant le trône. Des livres furent ouverts. On ouvrit aussi un autre livre : le livre de vie. Les morts furent jugés, chacun d’après ses actes, suivant ce qui était inscrit dans ces livres. '
  '13':
  - type: text
    content: La mer avait rendu ses naufragés, la mort et le royaume des morts avaient rendu ceux qu’ils détenaient. Et tous furent jugés, chacun conformément à ses actes.
  '14':
  - type: text
    content: 'Puis la mort et le séjour des morts furent précipités dans l’étang de feu. Cet étang de feu, c’est la seconde mort. '
  '15':
  - type: text
    content: On y jeta aussi tous ceux dont le nom n’était pas inscrit dans le livre de vie.
  '2':
  - type: text
    content: 'Il se saisit du dragon, de ce Serpent ancien qui est le diable et Satan. Il l’enchaîna pour mille ans. '
  '3':
  - type: text
    content: Il le précipita dans l’abîme qu’il ferma au-dessus de lui
  - type: note
    content: Voir Es 24.22.
  - type: text
    content: ', en y mettant des scellés afin que le dragon ne puisse plus égarer les peuples avant le terme des mille ans. Après cela, il doit être relâché pour un peu de temps.'
  - type: heading
    content: 'Cinquième vision : victoire finale sur Satan après son relâchement'
  '4':
  - type: text
    content: Ensuite je vis des trônes. On remit le jugement entre les mains de ceux qui y prirent place. Je vis aussi les âmes de ceux qu’on avait décapités à cause du témoignage rendu par Jésus et à cause de la Parole de Dieu. Je vis encore tous ceux qui n’avaient pas adoré la bête ni son image et qui n’avaient pas reçu sa marque sur leur front et leur main. Ils vécurent
  - type: note
    content: 'Autre traduction : ils revinrent à la vie. De même au v. 5.'
  - type: text
    content: ' et régnèrent avec Christ pendant mille ans.'
  '5':
  - type: text
    content: 'C’est la première résurrection. Les autres morts ne vécurent pas avant la fin des mille ans. '
  '6':
  - type: text
    content: Heureux et saints ceux qui ont part à la première résurrection. La seconde mort n’a pas prise sur eux. Ils seront prêtres de Dieu et de Christ, et ils régneront avec lui pendant les mille ans.
  '7':
  - type: text
    content: 'Lorsque les mille ans seront écoulés, Satan sera relâché de sa prison '
  '8':
  - type: text
    content: et il s’en ira tromper les peuples des quatre coins de la terre, Gog et Magog
  - type: note
    content: Nom donné aux nations qui s’opposeront à la fin des temps au peuple de Dieu (voir Ez 38 à 39).
  - type: text
    content: . Il les rassemblera pour le combat, en troupes innombrables comme les grains de sable au bord des mers.
  '9':
  - type: text
    content: 'Tous ces peuples s’ébranlèrent sur toute la surface de la terre et investirent le camp du peuple saint et la ville bien-aimée de Dieu. Mais un feu tomba du ciel et les consuma. '
