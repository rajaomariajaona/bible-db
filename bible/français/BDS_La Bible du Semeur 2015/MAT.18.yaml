document_id: MAT.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La communauté du Messie
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’accueil des « petits »
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.33-37 ; Lc 9.46-48)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment-là, les disciples s’approchèrent de Jésus et lui demandèrent : Qui donc est le plus grand dans le royaume des cieux ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Faites attention ! Ne méprisez pas un seul de ces petits ; je vous l’assure : leurs '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: ' dans le ciel se tiennent constamment en présence de mon Père céleste'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent : '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Car le Fils de l’homme est venu chercher et amener au salut ce qui était perdu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 19.10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qu’en pensez-vous ? Si un homme a cent brebis, et que l’une d’elles s’égare, ne laissera-t-il pas les quatre-vingt-dix-neuf autres dans la montagne, pour aller à la recherche de celle qui s’est égarée ?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Et s’il réussit à la retrouver, vraiment, je vous l’assure : cette brebis lui causera plus de joie que les quatre-vingt-dix-neuf autres qui ne s’étaient pas égarées.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il en est de même pour votre Père céleste : il ne veut pas qu’un seul de ces petits se perde.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La démarche du pardon
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si ton frère s’est rendu coupable
    - type: text
      text: ' ['
    - type: usfm
      marker: wj
      children:
      - type: text
        text: à ton égard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits n’ont pas : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ton égard.
      marker-yv: yv-n
    - type: text
      text: ']'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', va le trouver en tête-à-tête et convaincs-le de sa faute. S’il t’écoute, tu auras gagné ton frère.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'S’il ne t’écoute pas, prends avec toi une ou deux autres personnes, '
      - type: usfm
        marker: qt
        children:
        - type: text
          text: pour que toute affaire se règle sur les déclarations de deux ou trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 19.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: qt
        children:
        - type: text
          text: .
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'S’il refuse de les écouter, dis-le à l’Eglise. S’il refuse aussi d’écouter l’Eglise, considère-le comme un païen et un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: collecteur d’impôts
      - type: text
        text: .
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : tout ce que vous interdirez sur la terre sera interdit aux yeux de Dieu et tout ce que vous autoriserez sur la terre sera autorisé aux yeux de Dieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tous ceux que vous exclurez sur la terre seront exclus aux yeux de Dieu et tous ceux que vous accueillerez sur la terre seront accueillis aux yeux de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '16.19'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ajoute que si deux d’entre vous se mettent d’accord ici-bas au sujet d’un problème pour l’exposer à mon Père céleste, il les exaucera.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus appela un petit enfant, le plaça au milieu d’eux, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car là où deux ou trois sont ensemble en mon nom, je suis présent au milieu d’eux.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre s’approcha de Jésus et lui demanda : Seigneur, si mon frère se rend coupable à mon égard, combien de fois devrai-je lui pardonner ? Irai-je jusqu’à sept fois ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Non,
    - type: text
      text: ' lui répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: je ne te dis pas d’aller jusqu’à sept fois, mais jusqu’à soixante-dix fois sept fois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soixante-dix-sept fois.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, il en est du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume des cieux
      - type: text
        text: ' comme d’un roi qui voulut régler ses comptes avec ses serviteurs.'
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’il commença à compter, on lui en présenta un qui lui devait soixante millions de pièces d’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dix mille talents. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un talent valait à peu près six mille deniers (cf. v. 28).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme ce serviteur n’avait pas de quoi rembourser ce qu’il devait, son maître ordonna de le vendre comme esclave avec sa femme et ses enfants ainsi que tous ses biens pour rembourser sa dette.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le serviteur se jeta alors aux pieds du roi et, se prosternant devant lui, supplia : « Sois patient envers moi et je te rembourserai tout. »'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pris de pitié pour lui, son maître le renvoya libre, après lui avoir remis toute sa dette.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A peine sorti, ce serviteur rencontra un de ses compagnons de service qui lui devait cent pièces d’argent
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deniers ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le denier représentait le salaire journalier d’un ouvrier agricole.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '.Il le saisit à la gorge en criant : « Paie-moi ce que tu me dois ! »'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Son compagnon se jeta à ses pieds et le supplia : « Sois patient envers moi, lui dit-il, et je te rembourserai tout. »'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je vous l’assure : si vous ne changez pas et ne devenez pas comme de petits enfants, vous n’entrerez pas dans le royaume des cieux.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais l’autre ne voulut rien entendre. Bien plus : il alla le faire jeter en prison en attendant qu’il ait payé tout ce qu’il lui devait.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: D’autres compagnons de service, témoins de ce qui s’était passé, en furent profondément attristés et allèrent rapporter toute l’affaire à leur maître.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Alors celui-ci fit convoquer le serviteur qui avait agi de la sorte : « Serviteur mauvais ! lui dit-il. Tout ce que tu me devais, je te l’avais remis parce que tu m’en avais supplié.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne devais-tu pas, toi aussi, avoir pitié de ton compagnon, comme j’ai eu pitié de toi ? »
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et, dans sa colère, son maître le livra aux bourreaux jusqu’à ce qu’il ait remboursé toute sa dette.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voilà comment mon Père céleste vous traitera, vous aussi, si chacun de vous ne pardonne pas du fond du cœur à son frère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est pourquoi le plus grand dans le royaume des cieux est celui qui s’abaisse comme cet enfant,
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et celui qui accueille, en mon nom, un enfant comme celui-ci, m’accueille moi-même.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.42-48 ; Lc 17.1-2)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un devait causer la chute
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire tomber dans le péché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18.7'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '8'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: de l’un de ces petits qui croient en moi, il vaudrait mieux qu’on lui attache au cou une de ces pierres de meule que font tourner les ânes, et qu’on le précipite au fond du lac.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quel malheur pour le monde qu’il y ait tant d’occasions de chute
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: malheur au monde qui cause tant de chutes !
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '! Il est inévitable qu’il y en ait, mais malheur à celui qui crée de telles occasions.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si ta main ou ton pied causent ta chute, coupe-les, et jette-les au loin. Car il vaut mieux pour toi entrer dans la vie avec une seule main ou un seul pied que de garder tes deux mains ou tes deux pieds et d’être jeté dans le feu éternel.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si ton œil cause ta chute, arrache-le et jette-le au loin, car il vaut mieux pour toi entrer dans la vie avec un seul œil, que de conserver tes deux yeux et d’être jeté dans le feu de l’enfer.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Lc 15.1-7)
    marker-yv: yv-h
