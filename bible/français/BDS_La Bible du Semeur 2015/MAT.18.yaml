document_id: MAT.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La communauté du Messie
  - type: heading
    content: L’accueil des « petits »
  - type: heading
    content: (Mc 9.33-37 ; Lc 9.46-48)
  - type: text
    content: 'A ce moment-là, les disciples s’approchèrent de Jésus et lui demandèrent : Qui donc est le plus grand dans le royaume des cieux ?'
  '10':
  - type: text
    content: ' '
  - type: text
    content: 'Faites attention ! Ne méprisez pas un seul de ces petits ; je vous l’assure : leurs '
  - type: text
    content: anges
  - type: text
    content: ' dans le ciel se tiennent constamment en présence de mon Père céleste'
  - type: text
    content: ' '
  - type: note
    content: 'Certains manuscrits ajoutent : 11 Car le Fils de l’homme est venu chercher et amener au salut ce qui était perdu (voir Lc 19.10).'
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: text
    content: Qu’en pensez-vous ? Si un homme a cent brebis, et que l’une d’elles s’égare, ne laissera-t-il pas les quatre-vingt-dix-neuf autres dans la montagne, pour aller à la recherche de celle qui s’est égarée ?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Et s’il réussit à la retrouver, vraiment, je vous l’assure : cette brebis lui causera plus de joie que les quatre-vingt-dix-neuf autres qui ne s’étaient pas égarées.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Il en est de même pour votre Père céleste : il ne veut pas qu’un seul de ces petits se perde.'
  - type: heading
    content: La démarche du pardon
  '15':
  - type: text
    content: ' '
  - type: text
    content: Si ton frère s’est rendu coupable
  - type: text
    content: ' ['
  - type: text
    content: à ton égard
  - type: note
    content: 'Certains manuscrits n’ont pas : à ton égard.'
  - type: text
    content: ']'
  - type: text
    content: ', va le trouver en tête-à-tête et convaincs-le de sa faute. S’il t’écoute, tu auras gagné ton frère.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'S’il ne t’écoute pas, prends avec toi une ou deux autres personnes, '
  - type: text
    content: pour que toute affaire se règle sur les déclarations de deux ou trois témoins
  - type: note
    content: Dt 19.15.
  - type: text
    content: .
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'S’il refuse de les écouter, dis-le à l’Eglise. S’il refuse aussi d’écouter l’Eglise, considère-le comme un païen et un '
  - type: text
    content: collecteur d’impôts
  - type: text
    content: .
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Vraiment, je vous l’assure : tout ce que vous interdirez sur la terre sera interdit aux yeux de Dieu et tout ce que vous autoriserez sur la terre sera autorisé aux yeux de Dieu'
  - type: note
    content: 'Autre traduction : tous ceux que vous exclurez sur la terre seront exclus aux yeux de Dieu et tous ceux que vous accueillerez sur la terre seront accueillis aux yeux de Dieu (voir 16.19).'
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: text
    content: J’ajoute que si deux d’entre vous se mettent d’accord ici-bas au sujet d’un problème pour l’exposer à mon Père céleste, il les exaucera.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Alors Jésus appela un petit enfant, le plaça au milieu d’eux, '
  '20':
  - type: text
    content: Car là où deux ou trois sont ensemble en mon nom, je suis présent au milieu d’eux.
  '21':
  - type: text
    content: 'Alors Pierre s’approcha de Jésus et lui demanda : Seigneur, si mon frère se rend coupable à mon égard, combien de fois devrai-je lui pardonner ? Irai-je jusqu’à sept fois ?'
  '22':
  - type: text
    content: ' '
  - type: text
    content: – Non,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: je ne te dis pas d’aller jusqu’à sept fois, mais jusqu’à soixante-dix fois sept fois
  - type: note
    content: 'Autre traduction : soixante-dix-sept fois.'
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'En effet, il en est du '
  - type: text
    content: royaume des cieux
  - type: text
    content: ' comme d’un roi qui voulut régler ses comptes avec ses serviteurs.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: Lorsqu’il commença à compter, on lui en présenta un qui lui devait soixante millions de pièces d’argent
  - type: note
    content: Il s’agit de dix mille talents. Un talent valait à peu près six mille deniers (cf. v. 28).
  - type: text
    content: .
  - type: text
    content: ' '
  '25':
  - type: text
    content: Comme ce serviteur n’avait pas de quoi rembourser ce qu’il devait, son maître ordonna de le vendre comme esclave avec sa femme et ses enfants ainsi que tous ses biens pour rembourser sa dette.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Le serviteur se jeta alors aux pieds du roi et, se prosternant devant lui, supplia : « Sois patient envers moi et je te rembourserai tout. »'
  '27':
  - type: text
    content: ' '
  - type: text
    content: Pris de pitié pour lui, son maître le renvoya libre, après lui avoir remis toute sa dette.
  '28':
  - type: text
    content: ' '
  - type: text
    content: A peine sorti, ce serviteur rencontra un de ses compagnons de service qui lui devait cent pièces d’argent
  - type: text
    content: ' '
  - type: note
    content: Il s’agit de deniers ; le denier représentait le salaire journalier d’un ouvrier agricole.
  - type: text
    content: '.Il le saisit à la gorge en criant : « Paie-moi ce que tu me dois ! »'
  '29':
  - type: text
    content: ' '
  - type: text
    content: 'Son compagnon se jeta à ses pieds et le supplia : « Sois patient envers moi, lui dit-il, et je te rembourserai tout. »'
  '3':
  - type: text
    content: 'et dit : '
  - type: text
    content: 'Vraiment, je vous l’assure : si vous ne changez pas et ne devenez pas comme de petits enfants, vous n’entrerez pas dans le royaume des cieux.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: 'Mais l’autre ne voulut rien entendre. Bien plus : il alla le faire jeter en prison en attendant qu’il ait payé tout ce qu’il lui devait.'
  '31':
  - type: text
    content: ' '
  - type: text
    content: D’autres compagnons de service, témoins de ce qui s’était passé, en furent profondément attristés et allèrent rapporter toute l’affaire à leur maître.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Alors celui-ci fit convoquer le serviteur qui avait agi de la sorte : « Serviteur mauvais ! lui dit-il. Tout ce que tu me devais, je te l’avais remis parce que tu m’en avais supplié.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: Ne devais-tu pas, toi aussi, avoir pitié de ton compagnon, comme j’ai eu pitié de toi ? »
  '34':
  - type: text
    content: ' '
  - type: text
    content: Et, dans sa colère, son maître le livra aux bourreaux jusqu’à ce qu’il ait remboursé toute sa dette.
  '35':
  - type: text
    content: ' '
  - type: text
    content: Voilà comment mon Père céleste vous traitera, vous aussi, si chacun de vous ne pardonne pas du fond du cœur à son frère.
  '4':
  - type: text
    content: C’est pourquoi le plus grand dans le royaume des cieux est celui qui s’abaisse comme cet enfant,
  - type: text
    content: ' '
  '5':
  - type: text
    content: et celui qui accueille, en mon nom, un enfant comme celui-ci, m’accueille moi-même.
  - type: heading
    content: (Mc 9.42-48 ; Lc 17.1-2)
  '6':
  - type: text
    content: ' '
  - type: text
    content: Si quelqu’un devait causer la chute
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : faire tomber dans le péché (de même en 18.7, 8, 9).'
  - type: text
    content: de l’un de ces petits qui croient en moi, il vaudrait mieux qu’on lui attache au cou une de ces pierres de meule que font tourner les ânes, et qu’on le précipite au fond du lac.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Quel malheur pour le monde qu’il y ait tant d’occasions de chute
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction : malheur au monde qui cause tant de chutes !'
  - type: text
    content: '! Il est inévitable qu’il y en ait, mais malheur à celui qui crée de telles occasions.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Si ta main ou ton pied causent ta chute, coupe-les, et jette-les au loin. Car il vaut mieux pour toi entrer dans la vie avec une seule main ou un seul pied que de garder tes deux mains ou tes deux pieds et d’être jeté dans le feu éternel.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Si ton œil cause ta chute, arrache-le et jette-le au loin, car il vaut mieux pour toi entrer dans la vie avec un seul œil, que de conserver tes deux yeux et d’être jeté dans le feu de l’enfer.
  - type: heading
    content: (Lc 15.1-7)
