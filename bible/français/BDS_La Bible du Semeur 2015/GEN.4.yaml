document_id: GEN.4,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’intrusion de la violence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme s’unit à Eve, sa femme ; elle devint enceinte et donna naissance à Caïn. Elle dit : J’ai formé un homme avec l’aide de l’Eternel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu lui dit : Qu’as-tu fait ? J’entends le sang de ton frère crier vengeance depuis la terre jusqu’à moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, tu es maudit et chassé loin du sol qui a bu le sang de ton frère versé par ta main. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque tu cultiveras le sol, il te refusera désormais ses produits, tu seras errant et fugitif sur la terre.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Caïn dit à l’Eternel : Ma faute est trop lourde à porter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici que tu me chasses aujourd’hui loin du sol fertile, et je devrai me cacher loin de toi, je serai errant et fugitif sur la terre et si quelqu’un me trouve, il me tuera.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel lui dit : Eh bien ! Si on tue Caïn, il sera vengé sept fois.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et l’Eternel marqua Caïn d’un signe pour qu’il ne soit pas tué par qui le rencontrerait.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Caïn partit loin de l’Eternel : il alla séjourner au pays de Nod, le pays de l’Errance, à l’orient d’Eden, le pays des Délices.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lignée de Caïn
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Caïn s’unit à sa femme, elle devint enceinte et mit au monde Hénok. Caïn bâtissait une ville qu’il appela Hénok, du nom de son fils.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hénok fut l’ancêtre d’Irad, qui eut pour descendants : Mehouyaël, Metoushaël et Lémek.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lémek prit deux femmes pour épouses : l’une s’appelait Ada et l’autre Tsilla. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle mit encore au monde le frère de Caïn, Abel. Abel devint berger et Caïn cultivateur.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ada mit au monde Yabal, le père des nomades habitant sous des tentes et au milieu de leurs troupeaux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait pour frère Youbal, le père de tous ceux qui jouent de la lyre et de la flûte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsilla, de son côté, mit au monde Toubal-Caïn, qui forgeait tous les instruments de bronze et de fer. La sœur de Toubal-Caïn s’appelait Naama.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lémek dit à ses femmes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ada et Tsilla, ╵écoutez-moi bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'femmes de Lémek, ╵et prêtez l’oreille ╵à ce que je dis :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai tué un homme ╵pour une blessure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un jeune enfant ╵pour prix de ma plaie.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Caïn sera vengé sept fois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Lémek soixante-dix-sept fois.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adam s’unit encore à sa femme et elle mit au monde un fils qu’elle nomma Seth car, dit-elle, Dieu m’a suscité une autre descendance pour remplacer Abel que Caïn a tué. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seth aussi eut un fils qu’il appela Enosh. C’est à cette époque-là qu’on a commencé à prier l’Eternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bout d’un certain temps, Caïn présenta des produits de la terre en offrande à l’Eternel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abel, lui aussi, fit une offrande : il présenta les premiers-nés de son troupeau et en offrit les meilleurs morceaux. L’Eternel prêta attention à Abel et à son offrande'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 11.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais pas à Caïn et son offrande. Cela mit Caïn dans une grande colère, et son visage s’assombrit.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Caïn : Pourquoi es-tu en colère et pourquoi ton visage est-il sombre ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu agis bien, tu le relèveras. Mais si tu n’agis pas bien, le péché est tapi à ta porte : son désir se porte vers toi, mais toi, domine-le !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Caïn dit à son frère Abel : Allons aux champs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après le Pentateuque samaritain et les versions syriaques ; manque dans le texte hébreu traditionnel.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et lorsqu’ils furent dans les champs, Caïn se jeta sur son frère Abel et le tua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 23.35 ; 1 Jn 3.12.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel demanda à Caïn : Où est ton frère Abel ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Je n’en sais rien, répondit-il. Suis-je le gardien de mon frère ?
