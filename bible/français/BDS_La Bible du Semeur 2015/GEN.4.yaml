document_id: GEN.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’intrusion de la violence
  - type: text
    content: 'L’homme s’unit à Eve, sa femme ; elle devint enceinte et donna naissance à Caïn. Elle dit : J’ai formé un homme avec l’aide de l’Eternel.'
  '10':
  - type: text
    content: 'Dieu lui dit : Qu’as-tu fait ? J’entends le sang de ton frère crier vengeance depuis la terre jusqu’à moi. '
  '11':
  - type: text
    content: 'Maintenant, tu es maudit et chassé loin du sol qui a bu le sang de ton frère versé par ta main. '
  '12':
  - type: text
    content: Lorsque tu cultiveras le sol, il te refusera désormais ses produits, tu seras errant et fugitif sur la terre.
  '13':
  - type: text
    content: 'Caïn dit à l’Eternel : Ma faute est trop lourde à porter. '
  '14':
  - type: text
    content: Voici que tu me chasses aujourd’hui loin du sol fertile, et je devrai me cacher loin de toi, je serai errant et fugitif sur la terre et si quelqu’un me trouve, il me tuera.
  '15':
  - type: text
    content: 'L’Eternel lui dit : Eh bien ! Si on tue Caïn, il sera vengé sept fois.'
  - type: text
    content: Et l’Eternel marqua Caïn d’un signe pour qu’il ne soit pas tué par qui le rencontrerait.
  '16':
  - type: text
    content: 'Caïn partit loin de l’Eternel : il alla séjourner au pays de Nod, le pays de l’Errance, à l’orient d’Eden, le pays des Délices.'
  - type: heading
    content: La lignée de Caïn
  '17':
  - type: text
    content: Caïn s’unit à sa femme, elle devint enceinte et mit au monde Hénok. Caïn bâtissait une ville qu’il appela Hénok, du nom de son fils.
  '18':
  - type: text
    content: 'Hénok fut l’ancêtre d’Irad, qui eut pour descendants : Mehouyaël, Metoushaël et Lémek.'
  '19':
  - type: text
    content: 'Lémek prit deux femmes pour épouses : l’une s’appelait Ada et l’autre Tsilla. '
  '2':
  - type: text
    content: Elle mit encore au monde le frère de Caïn, Abel. Abel devint berger et Caïn cultivateur.
  '20':
  - type: text
    content: 'Ada mit au monde Yabal, le père des nomades habitant sous des tentes et au milieu de leurs troupeaux. '
  '21':
  - type: text
    content: 'Il avait pour frère Youbal, le père de tous ceux qui jouent de la lyre et de la flûte. '
  '22':
  - type: text
    content: Tsilla, de son côté, mit au monde Toubal-Caïn, qui forgeait tous les instruments de bronze et de fer. La sœur de Toubal-Caïn s’appelait Naama.
  '23':
  - type: text
    content: 'Lémek dit à ses femmes :'
  - type: text
    content: Ada et Tsilla, ╵écoutez-moi bien,
  - type: text
    content: 'femmes de Lémek, ╵et prêtez l’oreille ╵à ce que je dis :'
  - type: text
    content: J’ai tué un homme ╵pour une blessure
  - type: text
    content: et un jeune enfant ╵pour prix de ma plaie.
  '24':
  - type: text
    content: Caïn sera vengé sept fois
  - type: text
    content: et Lémek soixante-dix-sept fois.
  '25':
  - type: text
    content: 'Adam s’unit encore à sa femme et elle mit au monde un fils qu’elle nomma Seth car, dit-elle, Dieu m’a suscité une autre descendance pour remplacer Abel que Caïn a tué. '
  '26':
  - type: text
    content: Seth aussi eut un fils qu’il appela Enosh. C’est à cette époque-là qu’on a commencé à prier l’Eternel.
  '3':
  - type: text
    content: 'Au bout d’un certain temps, Caïn présenta des produits de la terre en offrande à l’Eternel. '
  '4':
  - type: text
    content: 'Abel, lui aussi, fit une offrande : il présenta les premiers-nés de son troupeau et en offrit les meilleurs morceaux. L’Eternel prêta attention à Abel et à son offrande'
  - type: note
    content: Allusion en Hé 11.4.
  - type: text
    content: '  ; '
  '5':
  - type: text
    content: mais pas à Caïn et son offrande. Cela mit Caïn dans une grande colère, et son visage s’assombrit.
  '6':
  - type: text
    content: 'L’Eternel dit à Caïn : Pourquoi es-tu en colère et pourquoi ton visage est-il sombre ? '
  '7':
  - type: text
    content: 'Si tu agis bien, tu le relèveras. Mais si tu n’agis pas bien, le péché est tapi à ta porte : son désir se porte vers toi, mais toi, domine-le !'
  '8':
  - type: text
    content: 'Mais Caïn dit à son frère Abel : Allons aux champs'
  - type: note
    content: D’après le Pentateuque samaritain et les versions syriaques ; manque dans le texte hébreu traditionnel.
  - type: text
    content: .
  - type: text
    content: Et lorsqu’ils furent dans les champs, Caïn se jeta sur son frère Abel et le tua
  - type: note
    content: Voir Mt 23.35 ; 1 Jn 3.12.
  - type: text
    content: .
  '9':
  - type: text
    content: 'Alors l’Eternel demanda à Caïn : Où est ton frère Abel ?'
  - type: text
    content: – Je n’en sais rien, répondit-il. Suis-je le gardien de mon frère ?
