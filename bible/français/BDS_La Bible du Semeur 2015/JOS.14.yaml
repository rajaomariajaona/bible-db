document_id: JOS.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le partage du pays de Canaan à l’ouest du Jourdain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici les territoires que les Israélites reçurent en possession dans le pays de Canaan. Le prêtre Eléazar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fils d’Aaron et grand-prêtre (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 20.26-28
        metadata:
          usfm: NUM.20.26+NUM.20.27+NUM.20.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et Josué, fils de Noun, assistés des chefs de groupe familial des tribus israélites, les leur attribuèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cette répartition des terres entre les neuf tribus et la demi-tribu se fit par tirage au sort, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car Moïse avait déjà attribué leur patrimoine aux deux tribus et à la demi-tribu à l’est du Jourdain, et il n’en avait pas destiné aux lévites, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car les fils de Joseph, Manassé et Ephraïm, formaient deux tribus. C’est pourquoi il n’avait pas attribué de patrimoine aux lévites dans le pays, sinon quelques villes avec leurs terres attenantes pour y habiter, y faire vivre leurs troupeaux et y conserver leurs biens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob avait adopté les deux fils de Joseph (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 48.5
        metadata:
          usfm: GEN.48.5
      - type: text
        text: ) ; ils devaient donc être considérés comme ses propres fils et recevoir leur héritage comme les autres.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi les Israélites procédèrent comme l’Eternel l’avait ordonné à Moïse pour le partage du pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caleb reçoit la ville d’Hébron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Des membres de la tribu de Juda vinrent trouver Josué à Guilgal. Caleb, fils de Yephounné, le Qenizien lui dit : Tu sais ce que l’Eternel a dit à Moïse, l’homme de Dieu, à mon sujet et à ton sujet lorsque nous étions à Qadesh-Barnéa'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 32.12 ; Dt 1.34-36.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’avais quarante ans, lorsque Moïse, serviteur de l’Eternel, m’a envoyé de Qadesh-Barnéa pour explorer ce pays. A mon retour, je lui ai fait un rapport en toute bonne conscience. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors que les hommes qui étaient venus avec moi ont découragé le peuple, j’ai été pleinement fidèle à l’Eternel mon Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 13
        metadata:
          usfm: NUM.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce jour-là, Moïse fit ce serment : « Assurément, ce pays que tu as parcouru t’appartiendra, ainsi qu’à tes descendants, pour toujours, parce que tu as été pleinement fidèle à l’Eternel mon Dieu ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Effectivement, il y a quarante-cinq ans depuis que l’Eternel a adressé cette parole à Moïse pendant qu’Israël voyageait à travers le désert, et il m’a conservé en vie selon sa promesse. J’ai aujourd’hui quatre-vingt-cinq ans '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et je suis aussi robuste qu’à l’époque où Moïse m’a envoyé en mission ; j’ai autant de force qu’alors, soit pour combattre, soit pour mener une expédition militaire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maintenant, donne-moi cette contrée montagneuse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hébron est situé dans la région montagneuse de Juda à une quarantaine de kilomètres au sud de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' que l’Eternel m’a promise à ce moment-là. A l’époque, tu as appris que des Anaqim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11.21-22
        metadata:
          usfm: JOS.11.21+JOS.11.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' y habitaient dans de grandes villes fortifiées. Si l’Eternel m’assiste, je les en déposséderai comme il l’a affirmé'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 1.10-20
        metadata:
          usfm: JDG.1.10+JDG.1.11+JDG.1.12+JDG.1.13+JDG.1.14+JDG.1.15+JDG.1.16+JDG.1.17+JDG.1.18+JDG.1.19+JDG.1.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Josué bénit Caleb, fils de Yephounné, et lui donna la ville d’Hébron pour patrimoine. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi Hébron appartient encore aujourd’hui aux descendants de Caleb, fils de Yephounné le Qenizien, parce qu’il avait été pleinement fidèle à l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Autrefois, Hébron s’appelait Qiryath-Arba, du nom du plus grand des Anaqim. Alors la guerre cessa dans le pays.
