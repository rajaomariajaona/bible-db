document_id: JOS.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le partage du pays de Canaan à l’ouest du Jourdain
  - type: text
    content: Voici les territoires que les Israélites reçurent en possession dans le pays de Canaan. Le prêtre Eléazar
  - type: note
    content: Fils d’Aaron et grand-prêtre (voir Nb 20.26-28).
  - type: text
    content: ' et Josué, fils de Noun, assistés des chefs de groupe familial des tribus israélites, les leur attribuèrent. '
  '10':
  - type: text
    content: 'Effectivement, il y a quarante-cinq ans depuis que l’Eternel a adressé cette parole à Moïse pendant qu’Israël voyageait à travers le désert, et il m’a conservé en vie selon sa promesse. J’ai aujourd’hui quatre-vingt-cinq ans '
  '11':
  - type: text
    content: 'et je suis aussi robuste qu’à l’époque où Moïse m’a envoyé en mission ; j’ai autant de force qu’alors, soit pour combattre, soit pour mener une expédition militaire. '
  '12':
  - type: text
    content: Maintenant, donne-moi cette contrée montagneuse
  - type: note
    content: Hébron est situé dans la région montagneuse de Juda à une quarantaine de kilomètres au sud de Jérusalem.
  - type: text
    content: ' que l’Eternel m’a promise à ce moment-là. A l’époque, tu as appris que des Anaqim'
  - type: note
    content: Voir 11.21-22.
  - type: text
    content: ' y habitaient dans de grandes villes fortifiées. Si l’Eternel m’assiste, je les en déposséderai comme il l’a affirmé'
  - type: note
    content: Voir Jg 1.10-20.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Josué bénit Caleb, fils de Yephounné, et lui donna la ville d’Hébron pour patrimoine. '
  '14':
  - type: text
    content: 'C’est pourquoi Hébron appartient encore aujourd’hui aux descendants de Caleb, fils de Yephounné le Qenizien, parce qu’il avait été pleinement fidèle à l’Eternel, le Dieu d’Israël. '
  '15':
  - type: text
    content: Autrefois, Hébron s’appelait Qiryath-Arba, du nom du plus grand des Anaqim. Alors la guerre cessa dans le pays.
  '2':
  - type: text
    content: 'Cette répartition des terres entre les neuf tribus et la demi-tribu se fit par tirage au sort, comme l’Eternel l’avait ordonné par l’intermédiaire de Moïse. '
  '3':
  - type: text
    content: 'Car Moïse avait déjà attribué leur patrimoine aux deux tribus et à la demi-tribu à l’est du Jourdain, et il n’en avait pas destiné aux lévites, '
  '4':
  - type: text
    content: car les fils de Joseph, Manassé et Ephraïm, formaient deux tribus. C’est pourquoi il n’avait pas attribué de patrimoine aux lévites dans le pays, sinon quelques villes avec leurs terres attenantes pour y habiter, y faire vivre leurs troupeaux et y conserver leurs biens
  - type: note
    content: Jacob avait adopté les deux fils de Joseph (Gn 48.5) ; ils devaient donc être considérés comme ses propres fils et recevoir leur héritage comme les autres.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Ainsi les Israélites procédèrent comme l’Eternel l’avait ordonné à Moïse pour le partage du pays.
  - type: heading
    content: Caleb reçoit la ville d’Hébron
  '6':
  - type: text
    content: 'Des membres de la tribu de Juda vinrent trouver Josué à Guilgal. Caleb, fils de Yephounné, le Qenizien lui dit : Tu sais ce que l’Eternel a dit à Moïse, l’homme de Dieu, à mon sujet et à ton sujet lorsque nous étions à Qadesh-Barnéa'
  - type: note
    content: Nb 32.12 ; Dt 1.34-36.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'J’avais quarante ans, lorsque Moïse, serviteur de l’Eternel, m’a envoyé de Qadesh-Barnéa pour explorer ce pays. A mon retour, je lui ai fait un rapport en toute bonne conscience. '
  '8':
  - type: text
    content: Alors que les hommes qui étaient venus avec moi ont découragé le peuple, j’ai été pleinement fidèle à l’Eternel mon Dieu
  - type: note
    content: Voir Nb 13.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Ce jour-là, Moïse fit ce serment : « Assurément, ce pays que tu as parcouru t’appartiendra, ainsi qu’à tes descendants, pour toujours, parce que tu as été pleinement fidèle à l’Eternel mon Dieu ! » '
