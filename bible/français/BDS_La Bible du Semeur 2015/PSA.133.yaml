segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Quand des frères sont unis
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '133.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '120.1'
        metadata:
          usfm: PSA.120.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh ! Qu’il est bon ╵et qu’il est agréable
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour des frères de se trouver ensemble !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C’est comme l’huile parfumée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '133.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’huile sainte réservée à l’onction des prêtres (Ex 30.22-33 ; Lv 8.30).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: répandue sur la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui descend sur la barbe, ╵la barbe d’Aaron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et coule jusqu’au bord ╵de ses habits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est comme la rosée ╵qui descend de l’Hermon
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le mont de Sion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '133.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Haute montagne au nord-est d’Israël, souvent couverte de neige. L’humidité aspirée sur ses pentes se répand en rosée fertilisante dans le nord du pays et souvent, par vent favorable, jusqu’en Judée (voir Gn 27.28 ; Ag 1.10 ; Za 8.12).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là que l’Eternel ╵accorde sa bénédiction
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la vie pour toujours.
