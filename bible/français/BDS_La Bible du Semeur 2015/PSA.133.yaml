document_id: PSA.133,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Quand des frères sont unis
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: . De David.
  - type: text
    content: Oh ! Qu’il est bon ╵et qu’il est agréable
  - type: text
    content: pour des frères de se trouver ensemble !
  '2':
  - type: text
    content: C’est comme l’huile parfumée
  - type: note
    content: L’huile sainte réservée à l’onction des prêtres (Ex 30.22-33 ; Lv 8.30).
  - type: text
    content: répandue sur la tête,
  - type: text
    content: qui descend sur la barbe, ╵la barbe d’Aaron,
  - type: text
    content: et coule jusqu’au bord ╵de ses habits.
  '3':
  - type: text
    content: C’est comme la rosée ╵qui descend de l’Hermon
  - type: text
    content: sur le mont de Sion
  - type: note
    content: Haute montagne au nord-est d’Israël, souvent couverte de neige. L’humidité aspirée sur ses pentes se répand en rosée fertilisante dans le nord du pays et souvent, par vent favorable, jusqu’en Judée (voir Gn 27.28 ; Ag 1.10 ; Za 8.12).
  - type: text
    content: .
  - type: text
    content: C’est là que l’Eternel ╵accorde sa bénédiction
  - type: text
    content: et la vie pour toujours.
