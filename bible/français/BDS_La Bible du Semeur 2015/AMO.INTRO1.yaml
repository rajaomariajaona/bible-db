  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos, agriculteur de Teqoa (1.1 ; 7.14-15), dans le royaume de Juda, a été le porte-parole de l’Eternel dans le royaume du Nord. Il a exercé son ministère à l’époque des rois Ozias de Juda (792 à 740) et Jéroboam II d’Israël (793 à 753), sans doute vers 760 à 750 avant Jésus-Christ, alors qu’Israël connaissait une prospérité économique en croissance.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A cette époque, l’Assyrie, qui a affaibli la Syrie, voisin redoutable d’Israël, connaît elle-même des tensions internes. Jéroboam peut ainsi reconquérir, au nord du pays, des territoires israélites occupés par la Syrie (2 R 14.25). Profitant de la stabilité politique, l’aristocratie accroît ses richesses et ses propriétés foncières, jouit du confort et du luxe et s’abandonne à l’euphorie (6.4-6), clamant le slogan : « l’Eternel est avec nous » (5.14, 18). Cette prospérité des uns ne va pas sans violence à l’égard des autres : extorsions de biens, corruption de la justice, malhonnêteté en affaires (5.11 ; 8.5), exploitation des pauvres que l’on réduit au servage (8.6). La vie religieuse se dégrade elle aussi. Au sanctuaire établi à Béthel par Jéroboam I'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: er
  - type: text
    text: ' (1 R 12.26-33), le culte, empreint de formalisme et d’hypocrisie, est contaminé par les rites immoraux cananéens (3.14 ; 4.4-5 ; 5.22ss). C’est pourquoi le prophète se rendra dans ce centre religieux du royaume de Nord, qui était aussi un lieu de résidence royale, pour y apporter son message (7.10-13).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La prophétie d’Amos, à la forte tonalité éthique et sociale, se divise en trois grandes parties. Le livre débute par une série de brèves proclamations sur les peuples non israélites (chap. 1 et 2) qui sont toutes introduites par le même refrain (1.3, 6, etc.). De manière significative, Juda et Israël sont comptés parmi les peuples jugés (2.4, 6) : le privilège de leur élection par l’Eternel ne les dispense pas de pratiquer le droit que Dieu exige de tous les peuples (3.1-2 ; voir 9.7-8).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Dans la partie centrale de la prophétie (chap. 3 à 6), Amos dénonce sans cesse et avec vigueur la corruption sociale, politique et religieuse d’Israël. Il met en lumière l’incapacité du peuple à tirer les leçons du passé (4.6-11) et annonce la ruine qui le menace (3.11 ; 5.1-3 ; 6.7ss). Proclamant la venue du jugement, le prophète condamne les fausses sécurités dans lesquelles les Israélites mettent leur confiance (5.18 à 6.14), en particulier la « religion » avec ses fêtes et ses sacrifices (5.18-27). Ce rejet des sacrifices, diversement interprété, vise la pratique des rites religieux qui ne s’accompagne pas d’un engagement de la personne envers Dieu, comme ce fut déjà le cas pendant l’Exode, lorsque le peuple a sacrifié à l’Eternel tout en gardant ses idoles dans le cœur (5.25-26 ; Ex 32 ; Nb 14.3-4). Etienne citera ce passage lorsqu’il dénoncera l’aveuglement des chefs religieux d’Israël de son temps, qui pourtant plaçaient leur fierté dans le culte pratiqué au Temple (Ac 7.42-43, 51).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre se termine par un ensemble de visions qui évoquent le châtiment et le salut à venir (chap. 7 à 9). L’Eternel restaurera le royaume de David. Il réunira la nation et celle-ci prendra possession du monde entier (9.11-12). Jacques déclarera cette prophétie accomplie lors du concile de Jérusalem où l’on traitera de la question de l’entrée des païens convertis dans le peuple de Dieu (Ac 15.14-18).
