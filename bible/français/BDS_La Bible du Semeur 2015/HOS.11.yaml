document_id: HOS.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’amour de l’Eternel
  - type: heading
    content: L’amour d’autrefois
  - type: text
    content: Quand Israël était enfant, ╵je l’ai aimé,
  - type: text
    content: alors j’ai appelé mon fils ╵à sortir de l’Egypte
  - type: note
    content: Cité en Mt 2.15.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Ils suivront l’Eternel :'
  - type: text
    content: comme un lion, il rugira.
  - type: text
    content: A ses rugissements,
  - type: text
    content: ses fils accourront en tremblant ╵de l’Occident.
  '11':
  - type: text
    content: Tremblants, ils reviendront d’Egypte, ╵tout comme des oiseaux.
  - type: text
    content: Et comme des colombes, ╵ils reviendront de l’Assyrie.
  - type: text
    content: Je les rétablirai ╵dans leurs maisons,
  - type: text
    content: l’Eternel le déclare. »
  '2':
  - type: text
    content: Plus on l’a appelé, ╵plus il s’est éloigné
  - type: note
    content: 'Il s’agit peut-être des prophètes qui ont appelé Israël à la repentance au cours de son histoire. L’ancienne version grecque porte : Plus je l’ai appelé, plus ils se sont éloignés de moi.'
  - type: text
    content: ' ╵de ceux qui l’appelaient.'
  - type: text
    content: C’est aux Baals qu’il sacrifie,
  - type: text
    content: aux idoles taillées ╵qu’il offre de l’encens.
  '3':
  - type: text
    content: Pourtant, c’est moi ╵qui, pour ses premiers pas, ╵ai guidé Ephraïm,
  - type: text
    content: en le soutenant par les bras
  - type: note
    content: 'L’ancienne version grecque a : et qui l’ai porté dans mes bras.'
  - type: text
    content: ','
  - type: text
    content: mais il n’a pas voulu savoir ╵que moi, je prenais soin de lui.
  '4':
  - type: text
    content: C’est par des liens ╵d’une tendresse tout humaine
  - type: text
    content: et des cordes d’amour ╵que je le conduisais,
  - type: text
    content: et j’ai été pour lui ╵comme quelqu’un qui porte ╵un nourrisson
  - type: text
    content: contre ses joues ╵pour lui tendre à manger
  - type: note
    content: 'et j’ai été pour lui… à manger. Autre traduction : j’ai comme soulevé pour eux le mors du joug au-dessus des mâchoires pour leur tendre à manger.'
  - type: text
    content: .
  '5':
  - type: text
    content: Puisqu’ils ont refusé ╵de revenir à moi,
  - type: text
    content: ils ne retourneront pas en Egypte,
  - type: text
    content: ce sera l’Assyrie ╵qui régnera sur eux.
  '6':
  - type: text
    content: Le glaive va s’abattre ╵sur leurs cités,
  - type: text
    content: où il mettra en pièces ╵les barres de leurs portes
  - type: text
    content: et il dévorera leurs habitants
  - type: text
    content: à cause de leurs stratagèmes.
  '7':
  - type: text
    content: Mon peuple est décidé ╵à me tourner le dos.
  - type: text
    content: On les appelle ╵à se tourner vers le Très-Haut
  - type: note
    content: 'vers le Très-Haut: autre traduction : vers en haut.'
  - type: text
    content: ','
  - type: text
    content: mais jamais aucun d’eux ╵ne daigne élever le regard.
  - type: heading
    content: L’amour vaincra
  '8':
  - type: text
    content: Comment pourrais-je ╵t’abandonner, ô Ephraïm ?
  - type: text
    content: Comment pourrais-je te livrer, ╵ô Israël,
  - type: text
    content: te traiter comme Adma,
  - type: text
    content: ou te rendre semblable ╵à Tseboïm ?
  - type: text
    content: Mon cœur est tout bouleversé,
  - type: text
    content: je suis tout ému de pitié
  - type: note
    content: 'Adma et Tseboïm: deux villes voisines de Sodome et Gomorrhe et qui furent détruites avec elles (Dt 29.22).'
  - type: text
    content: .
  '9':
  - type: text
    content: Non, je n’agirai pas ╵selon mon ardente colère,
  - type: text
    content: je ne détruirai pas ╵de nouveau Ephraïm ;
  - type: text
    content: parce que moi, ╵moi, je suis Dieu,
  - type: text
    content: je ne suis pas un homme,
  - type: text
    content: et je suis saint, ╵moi qui suis au milieu de vous ;
  - type: text
    content: et je ne viendrai pas ╵animé de colère
  - type: note
    content: 'pas animé de colère: autre traduction : plus contre ses villes.'
  - type: text
    content: .
