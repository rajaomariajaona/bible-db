document_id: HOS.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’amour de l’Eternel
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’amour d’autrefois
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Quand Israël était enfant, ╵je l’ai aimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors j’ai appelé mon fils ╵à sortir de l’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 2.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils suivront l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un lion, il rugira.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ses rugissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses fils accourront en tremblant ╵de l’Occident.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tremblants, ils reviendront d’Egypte, ╵tout comme des oiseaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comme des colombes, ╵ils reviendront de l’Assyrie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rétablirai ╵dans leurs maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Plus on l’a appelé, ╵plus il s’est éloigné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit peut-être des prophètes qui ont appelé Israël à la repentance au cours de son histoire. L’ancienne version grecque porte : Plus je l’ai appelé, plus ils se sont éloignés de moi.'
      marker-yv: yv-n
    - type: text
      text: ' ╵de ceux qui l’appelaient.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est aux Baals qu’il sacrifie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux idoles taillées ╵qu’il offre de l’encens.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pourtant, c’est moi ╵qui, pour ses premiers pas, ╵ai guidé Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en le soutenant par les bras
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et qui l’ai porté dans mes bras.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il n’a pas voulu savoir ╵que moi, je prenais soin de lui.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est par des liens ╵d’une tendresse tout humaine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des cordes d’amour ╵que je le conduisais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’ai été pour lui ╵comme quelqu’un qui porte ╵un nourrisson
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre ses joues ╵pour lui tendre à manger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et j’ai été pour lui… à manger. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j’ai comme soulevé pour eux le mors du joug au-dessus des mâchoires pour leur tendre à manger.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Puisqu’ils ont refusé ╵de revenir à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne retourneront pas en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera l’Assyrie ╵qui régnera sur eux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le glaive va s’abattre ╵sur leurs cités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où il mettra en pièces ╵les barres de leurs portes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera leurs habitants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de leurs stratagèmes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mon peuple est décidé ╵à me tourner le dos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les appelle ╵à se tourner vers le Très-Haut
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers le Très-Haut
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers en haut.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais jamais aucun d’eux ╵ne daigne élever le regard.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’amour vaincra
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Comment pourrais-je ╵t’abandonner, ô Ephraïm ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment pourrais-je te livrer, ╵ô Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te traiter comme Adma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou te rendre semblable ╵à Tseboïm ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est tout bouleversé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis tout ému de pitié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Adma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tseboïm
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: deux villes voisines de Sodome et Gomorrhe et qui furent détruites avec elles (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 29.22
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Non, je n’agirai pas ╵selon mon ardente colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne détruirai pas ╵de nouveau Ephraïm ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que moi, ╵moi, je suis Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne suis pas un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je suis saint, ╵moi qui suis au milieu de vous ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne viendrai pas ╵animé de colère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: animé de colère
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: plus contre ses villes.
      marker-yv: yv-n
    - type: text
      text: .
