document_id: PSA.82,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu juge les dirigeants des nations
  - type: text
    content: Psaume d’Asaph
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  - type: text
    content: Dieu se tient ╵au conseil divin,
  - type: text
    content: au milieu des « dieux
  - type: note
    content: Terme honorifique qui désigne ici et au v. 6 ceux qui gouvernent et qui rendent la justice (voir 138.1 et note).
  - type: text
    content: '  », ╵il rend la justice :'
  '2':
  - type: text
    content: « Ah ! jusques à quand ╵rendrez-vous des jugements iniques
  - type: text
    content: et prendrez-vous le parti ╵des méchants ?
  - type: text
    content: Pause
  '3':
  - type: text
    content: Faites droit au faible, ╵et à l’orphelin,
  - type: text
    content: et rendez justice ╵au pauvre et au démuni
  - type: note
    content: Voir Ex 22.21-22 ; Es 1.17 ; 3.14-15 ; 11.4 ; Jr 22.3, 16  ; cf. Ps 72.2, 4, 12-14 ; Pr 31.8-9.
  - type: text
    content: ','
  '4':
  - type: text
    content: libérez le faible ╵et le défavorisé,
  - type: text
    content: délivrez-les de la main ╵des méchants.
  '5':
  - type: text
    content: Mais ils ne comprennent rien, ╵ils ne savent rien,
  - type: text
    content: ils errent dans les ténèbres ;
  - type: text
    content: les fondements du pays ╵en sont ébranlés.
  '6':
  - type: text
    content: 'J’avais dit : ╵“Vous êtes des dieux'
  - type: note
    content: Voir note v. 1. Cité en Jn 10.34.
  - type: text
    content: ','
  - type: text
    content: oui, vous tous, vous êtes ╵des fils du Très-Haut !”
  '7':
  - type: text
    content: Cependant, vous périrez ╵comme tous les hommes,
  - type: text
    content: et vous tomberez ╵comme n’importe quel dirigeant. »
  '8':
  - type: text
    content: O Dieu, lève-toi ╵et viens gouverner
  - type: note
    content: 'gouverner: autre traduction : juger. Le verbe hébreu correspondant a souvent un sens plus large que le mot français juger, englobant à la fois l’exercice du pouvoir politique et l’administration de la justice dans les tribunaux. En effet, les pouvoirs législatif, exécutif et judiciaire n’étaient pas séparés dans le Proche-Orient ancien et les dirigeants politiques exerçaient souvent la fonction de juge.'
  - type: text
    content: ' le monde,'
  - type: text
    content: car tu as pour possession ╵tous les peuples !
