- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu se tient ╵au conseil divin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des « dieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Terme honorifique qui désigne ici et au v. 6 ceux qui gouvernent et qui rendent la justice (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '138.1'
        metadata:
          usfm: PSA.138.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: '  », ╵il rend la justice :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: « Ah ! jusques à quand ╵rendrez-vous des jugements iniques
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prendrez-vous le parti ╵des méchants ?
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Faites droit au faible, ╵et à l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rendez justice ╵au pauvre et au démuni
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 22.21-22 ; Es 1.17 ; 3.14-15 ; 11.4 ; Jr 22.3, 16  ; cf. Ps 72.2, 4, 12-14 ; Pr 31.8-9.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: libérez le faible ╵et le défavorisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivrez-les de la main ╵des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais ils ne comprennent rien, ╵ils ne savent rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils errent dans les ténèbres ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements du pays ╵en sont ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’avais dit : ╵“Vous êtes des dieux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note v. 1. Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10.34
        metadata:
          usfm: JHN.10.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, vous tous, vous êtes ╵des fils du Très-Haut !”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant, vous périrez ╵comme tous les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous tomberez ╵comme n’importe quel dirigeant. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O Dieu, lève-toi ╵et viens gouverner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gouverner
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'juger. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le verbe hébreu correspondant a souvent un sens plus large que le mot français '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'juger, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: englobant à la fois l’exercice du pouvoir politique et l’administration de la justice dans les tribunaux. En effet, les pouvoirs législatif, exécutif et judiciaire n’étaient pas séparés dans le Proche-Orient ancien et les dirigeants politiques exerçaient souvent la fonction de juge.
    marker-yv: yv-n
  - type: text
    text: ' le monde,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as pour possession ╵tous les peuples !
