document_id: PSA.58,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu est le juste juge des dirigeants coupables
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au maître de chant. Sur la mélodie de « Ne détruis pas ! ». Cantique
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' composé par David.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et avant que leurs épines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont un combustible qui dégage rapidement de la chaleur. Ce verset a été très diversement rendu. L’idée commune à toutes les traductions est celle de la rapidité du jugement.
      marker-yv: yv-n
    - type: text
      text: ' ╵ne deviennent des buissons,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’elles soient vertes ou sèches, ╵qu’un tourbillon les emporte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hébreu peu clair.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pour le juste, quelle joie ╵de voir les méchants punis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans leur sang, ╵il se lavera les pieds.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et les hommes pourront dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Oui, ceux qui sont justes ╵trouvent une récompense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a un Dieu ╵qui exerce la justice ╵sur la terre. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Vraiment, est-ce en vous taisant ╵que vous rendez la justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Plusieurs changent la ponctuation des lettres d’un mot hébreu et parviennent à la traduction suivante qui, comme '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '82.1'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6'
        - type: text
          text: ', appelle les dirigeants des « dieux » : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Vos sentences, ô dieux, sont-elles vraiment conformes à la justice ? Jugez-vous avec droiture, vous qui n’êtes que des hommes ?
      marker-yv: yv-n
    - type: text
      text: '  ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jugez-vous les hommes ╵en toute droiture ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Non, vous commettez ╵sciemment l’injustice !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous propagez sur la terre ╵la violence de vos mains.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dès le ventre maternel, ╵les méchants s’écartent du chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis leur naissance, ╵les menteurs s’égarent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils sont venimeux ╵comme des serpents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se bouchent les oreilles ╵comme la vipère sourde
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: qui n’écoute pas ╵la voix des charmeurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de l’enchanteur ╵expert dans son art.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'O Dieu, brise-leur les dents ╵dans la bouche :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, arrache ╵les crocs de ces lions !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que ces gens-là disparaissent ╵comme les eaux qui s’écoulent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends leurs flèches sans effet ╵quand ils tirent de leur arc
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hébreu peu clair.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Qu’ils périssent comme la limace ╵qui fond tout en se mouvant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les enfants mort-nés, ╵qu’ils ne voient pas le soleil !
