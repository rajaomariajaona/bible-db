document_id: PSA.58,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu est le juste juge des dirigeants coupables
  - type: text
    content: Au maître de chant. Sur la mélodie de « Ne détruis pas ! ». Cantique
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' composé par David.'
  '10':
  - type: text
    content: Et avant que leurs épines
  - type: note
    content: Les épines sont un combustible qui dégage rapidement de la chaleur. Ce verset a été très diversement rendu. L’idée commune à toutes les traductions est celle de la rapidité du jugement.
  - type: text
    content: ' ╵ne deviennent des buissons,'
  - type: text
    content: qu’elles soient vertes ou sèches, ╵qu’un tourbillon les emporte
  - type: note
    content: Hébreu peu clair.
  - type: text
    content: '  !'
  '11':
  - type: text
    content: Pour le juste, quelle joie ╵de voir les méchants punis.
  - type: text
    content: Dans leur sang, ╵il se lavera les pieds.
  '12':
  - type: text
    content: 'Et les hommes pourront dire :'
  - type: text
    content: « Oui, ceux qui sont justes ╵trouvent une récompense.
  - type: text
    content: Il y a un Dieu ╵qui exerce la justice ╵sur la terre. »
  '2':
  - type: text
    content: Vraiment, est-ce en vous taisant ╵que vous rendez la justice
  - type: note
    content: 'Plusieurs changent la ponctuation des lettres d’un mot hébreu et parviennent à la traduction suivante qui, comme 82.1, 6, appelle les dirigeants des « dieux » : Vos sentences, ô dieux, sont-elles vraiment conformes à la justice ? Jugez-vous avec droiture, vous qui n’êtes que des hommes ?'
  - type: text
    content: '  ?'
  - type: text
    content: Jugez-vous les hommes ╵en toute droiture ?
  '3':
  - type: text
    content: Non, vous commettez ╵sciemment l’injustice !
  - type: text
    content: Vous propagez sur la terre ╵la violence de vos mains.
  '4':
  - type: text
    content: Dès le ventre maternel, ╵les méchants s’écartent du chemin,
  - type: text
    content: depuis leur naissance, ╵les menteurs s’égarent.
  '5':
  - type: text
    content: Ils sont venimeux ╵comme des serpents,
  - type: text
    content: ils se bouchent les oreilles ╵comme la vipère sourde
  '6':
  - type: text
    content: qui n’écoute pas ╵la voix des charmeurs
  - type: text
    content: et de l’enchanteur ╵expert dans son art.
  '7':
  - type: text
    content: 'O Dieu, brise-leur les dents ╵dans la bouche :'
  - type: text
    content: Eternel, arrache ╵les crocs de ces lions !
  '8':
  - type: text
    content: Que ces gens-là disparaissent ╵comme les eaux qui s’écoulent !
  - type: text
    content: Rends leurs flèches sans effet ╵quand ils tirent de leur arc
  - type: note
    content: Hébreu peu clair.
  - type: text
    content: .
  '9':
  - type: text
    content: Qu’ils périssent comme la limace ╵qui fond tout en se mouvant !
  - type: text
    content: Comme les enfants mort-nés, ╵qu’ils ne voient pas le soleil !
