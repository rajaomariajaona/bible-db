document_id: DEU.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’appel à la fidélité à l’Eternel
  - type: heading
    content: L’obéissance à la Loi
  - type: text
    content: 'Maintenant, Israël, écoute les commandements et les lois que je t’enseigne. Respecte-les, afin de vivre et d’entrer en possession du pays que l’Eternel, le Dieu de tes ancêtres, te donne. '
  '10':
  - type: text
    content: 'En particulier, n’oublie pas ce jour où tu t’es tenu devant l’Eternel ton Dieu au mont Horeb, lorsque l’Eternel m’a dit : « Assemble ce peuple devant moi et je lui communiquerai mes paroles, afin qu’il apprenne à me craindre tous les jours de sa vie sur la terre et qu’il l’enseigne à ses enfants'
  - type: note
    content: Pour les v. 10-12, voir Ex 19.10-25  ; voir Hé 12.18-19.
  - type: text
    content: '. » '
  '11':
  - type: text
    content: 'A ce moment-là, vous vous êtes approchés du pied de la montagne et vous vous êtes tenus là alors qu’elle était embrasée d’un feu qui montait jusqu’au ciel, cerné de ténèbres et d’épais nuages. '
  '12':
  - type: text
    content: 'L’Eternel vous a parlé du milieu du feu, vous avez entendu ses paroles, mais vous n’avez vu aucune forme ; il n’y avait qu’une voix. '
  '13':
  - type: text
    content: Il vous a révélé les clauses de son alliance, ce qu’il vous ordonnait d’observer, à savoir les dix commandements
  - type: note
    content: Le terme utilisé dans l’ancienne version grecque a donné notre mot décalogue. Voir Ex 20.1-17 ; 31.18 ; Dt 5.6-21.
  - type: text
    content: '. Puis il les a écrites sur deux tablettes de pierre. '
  '14':
  - type: text
    content: En même temps, il m’a ordonné de vous enseigner des commandements et des lois que vous devrez appliquer dans les pays où vous vous rendez pour en prendre possession.
  - type: heading
    content: L’interdiction des idoles
  '15':
  - type: text
    content: 'Vous prendrez bien garde à vous-mêmes, car vous n’avez vu aucune forme le jour où l’Eternel vous a parlé au mont Horeb du milieu du feu. '
  '16':
  - type: text
    content: N’allez pas vous corrompre en vous fabriquant des idoles, des figures ou des représentations quelconques, d’après le modèle d’un homme ou d’une femme
  - type: note
    content: Pour les v. 16-18, voir Ex 20.4 ; Lv 26.1 ; Dt 5.8 ; 27.15 ; Rm 1.23.
  - type: text
    content: ', '
  '17':
  - type: text
    content: 'ou le modèle de quelque animal vivant sur la terre, celui d’un oiseau volant dans le ciel '
  '18':
  - type: text
    content: 'ou celui d’un animal qui se meut à ras de terre ou encore d’un poisson nageant dans les eaux plus bas que la terre. '
  '19':
  - type: text
    content: 'N’allez pas lever les yeux vers le ciel et regarder le soleil, la lune, les étoiles et tous les astres du ciel, pour vous laisser entraîner à vous prosterner devant eux et leur rendre un culte. L’Eternel, votre Dieu, a laissé cela à tous les peuples qui sont sous tous les cieux. '
  '2':
  - type: text
    content: Vous n’ajouterez rien à ce que je vous commande et vous n’en retrancherez rien. Vous obéirez aux commandements de l’Eternel votre Dieu, que je vous transmets
  - type: note
    content: Voir Dt 13.1 ; Ap 22.18-19.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Mais vous, l’Eternel est allé vous chercher, il vous a arrachés à cette fournaise de fer qu’était l’Egypte pour faire de vous son peuple, celui qui lui appartient, comme vous l’êtes à présent
  - type: note
    content: Voir Ex 19.5 ; Tt 2.14 ; 1 P 2.9.
  - type: text
    content: .
  '21':
  - type: text
    content: L’Eternel s’est mis en colère contre moi à cause de vous et il a déclaré avec serment que je ne franchirais pas le Jourdain et que je n’entrerais pas dans le bon pays que l’Eternel, votre Dieu, vous donne à posséder
  - type: note
    content: Voir Nb 20.12.
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Car je vais mourir dans cet endroit-ci sans passer le Jourdain, mais vous, vous le franchirez et vous prendrez possession de ce bon pays. '
  '23':
  - type: text
    content: 'Gardez-vous d’oublier l’alliance que l’Eternel votre Dieu a conclue avec vous et de vous fabriquer une idole représentant quoi que ce soit, contrairement aux ordres de l’Eternel votre Dieu. '
  '24':
  - type: text
    content: Car l’Eternel votre Dieu est comme un feu qui consume
  - type: note
    content: Réminiscence en Hé 12.29.
  - type: text
    content: ', un Dieu qui ne tolère aucun rival'
  - type: note
    content: Voir Ex 20.5.
  - type: text
    content: .
  - type: heading
    content: L’exil, châtiment de l’idolâtrie
  '25':
  - type: text
    content: 'Ainsi, lorsque vous aurez des enfants et des petits-enfants, et que vous aurez habité un certain temps dans le pays, si vous vous laissez aller à fabriquer des idoles représentant quoi que ce soit, si vous faites ainsi ce que l’Eternel votre Dieu juge mauvais et que vous l’irritez, '
  '26':
  - type: text
    content: 'je prends aujourd’hui à témoin contre vous le ciel et la terre : si vous faites cela, vous ne tarderez pas à disparaître du pays dont vous allez prendre possession après avoir traversé le Jourdain, vous n’y subsisterez pas longtemps, car vous serez entièrement détruits. '
  '27':
  - type: text
    content: L’Eternel vous dispersera parmi les peuples et vous serez réduits à un petit nombre au milieu de ces peuples chez lesquels l’Eternel vous forcera à aller
  - type: note
    content: Pour les v. 27-28, voir Dt 28.36.
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Là, vous serez soumis à des dieux fabriqués par les hommes, des dieux de bois et de pierre, incapables de voir et d’entendre, de manger et de sentir. '
  '29':
  - type: text
    content: Alors vous chercherez l’Eternel votre Dieu, et vous le trouverez, si vous vous tournez vers lui de tout votre cœur et de tout votre être
  - type: note
    content: Voir Jr 29.13-14.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Vous avez vu de vos yeux ce que l’Eternel votre Dieu a fait à cause du dieu Baal de Peor
  - type: note
    content: Allusion à l’événement récent relaté en Nb 25.1-18.
  - type: text
    content: '  : il a exterminé tous ceux d’entre vous qui s’étaient adonnés au culte de cette divinité. '
  '30':
  - type: text
    content: 'Dans votre détresse, lorsque tous ces malheurs auront fondu sur vous, dans la suite des temps, vous reviendrez à l’Eternel votre Dieu et vous lui obéirez. '
  '31':
  - type: text
    content: Car l’Eternel votre Dieu est un Dieu compatissant, il ne vous abandonnera pas, ni ne vous détruira, il n’oubliera pas l’alliance qu’il a conclue par serment avec vos ancêtres.
  - type: heading
    content: L’Eternel seul est Dieu
  '32':
  - type: text
    content: 'En effet, Israël, informe-toi sur les temps anciens où tu n’étais pas encore né, depuis le jour où Dieu a créé l’homme sur la terre, informe-toi, d’un bout du ciel à l’autre : est-il jamais arrivé un événement aussi extraordinaire ? A-t-on jamais entendu rien de pareil ? '
  '33':
  - type: text
    content: Un peuple a-t-il entendu comme toi la voix de Dieu
  - type: note
    content: 'Certains traduisent : d’un dieu.'
  - type: text
    content: ' parlant au milieu du feu, sans perdre la vie ? '
  '34':
  - type: text
    content: Et quel dieu a jamais entrepris d’aller se chercher un peuple du milieu d’un autre peuple, à force d’épreuves, de signes miraculeux, de prodiges, par des combats, et en intervenant avec puissance, en semant la terreur, comme tout ce que l’Eternel, votre Dieu, a fait pour vous en Egypte, et dont tu as été témoin
  - type: note
    content: Voir Ex 7 à 12.
  - type: text
    content: '  ? '
  '35':
  - type: text
    content: Toi, il t’a fait voir tout cela, pour que tu saches que l’Eternel seul est Dieu, et qu’il n’y en a pas d’autre
  - type: note
    content: Voir Es 45.21 ; Mc 12.32.
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Il t’a fait entendre sa voix du haut du ciel pour faire ton éducation ; et sur la terre, il t’a fait voir son feu imposant, d’où tu as entendu ses paroles. '
  '37':
  - type: text
    content: 'Parce qu’il a aimé tes ancêtres et parce qu’il a choisi leurs descendants après eux, il t’a fait lui-même sortir d’Egypte en déployant une grande puissance '
  '38':
  - type: text
    content: 'pour déposséder à ton profit des peuples plus grands et plus puissants que toi, afin de te faire entrer dans leur pays et de te le donner en possession, comme il va le faire maintenant. '
  '39':
  - type: text
    content: 'Reconnais donc aujourd’hui et garde présent à l’esprit que l’Eternel seul est Dieu en haut dans le ciel et en bas sur la terre, et qu’il n’y en a pas d’autre. '
  '4':
  - type: text
    content: Mais vous, qui êtes restés fidèles à l’Eternel votre Dieu, vous êtes tous vivants aujourd’hui.
  '40':
  - type: text
    content: Obéis à ses lois et à ses commandements que je te transmets aujourd’hui, afin que tu sois heureux, toi et tes enfants après toi, et que tu vives de nombreux jours dans le pays que l’Eternel ton Dieu te donne pour toujours.
  - type: heading
    content: Les cités de refuge à l’est du Jourdain
  '41':
  - type: text
    content: 'Alors Moïse choisit trois villes à l’est du Jourdain, '
  '42':
  - type: text
    content: pour servir de refuge
  - type: note
    content: Voir Nb 35.9-34 ; Dt 19.1-13 ; Jos 20.1-9.
  - type: text
    content: ' à celui qui aurait tué quelqu’un involontairement sans lui avoir porté de haine ; le meurtrier pourra s’enfuir dans l’une de ces villes et il aura la vie sauve. '
  '43':
  - type: text
    content: Pour la tribu de Ruben, c’était Bétser, sur le plateau du désert ; pour celle de Gad, Ramoth en Galaad ; et pour Manassé, Golân en Basan.
  - type: heading
    content: Israël doit s’attacher à l’Eternel seul
  - type: heading
    content: Introduction
  '44':
  - type: text
    content: 'Voici la Loi que Moïse exposa aux Israélites, '
  '45':
  - type: text
    content: 'c’est-à-dire les ordonnances, les lois et les décrets qu’il leur communiqua après leur sortie d’Egypte, '
  '46':
  - type: text
    content: 'lorsqu’ils campaient à l’est du Jourdain, dans la vallée en face de Beth-Peor au pays de Sihôn. Ce roi des Amoréens avait habité à Heshbôn et avait été battu par Moïse et les Israélites après leur sortie d’Egypte. '
  '47':
  - type: text
    content: 'Ils prirent possession de son pays, ainsi que de celui d’Og, roi du Basan ; ces deux rois amoréens avaient régné sur les régions situées à l’est du Jourdain. '
  '48':
  - type: text
    content: 'Israël occupa tout le pays qui s’étendait depuis Aroër sur la falaise qui domine le torrent de l’Arnon jusqu’à la montagne de Syôn, c’est-à-dire l’Hermon, '
  '49':
  - type: text
    content: – y compris toute la plaine de la vallée du Jourdain du côté oriental du Jourdain, jusqu’à la mer Morte au pied du Pisga.
  '5':
  - type: text
    content: 'Vous le savez : je vous ai enseigné les commandements et les lois, comme l’Eternel mon Dieu me l’a ordonné, afin que vous y obéissiez dans le pays où vous allez entrer pour en prendre possession. '
  '6':
  - type: text
    content: 'Obéissez-y et appliquez-les, c’est là ce qui vous rendra sages et intelligents aux yeux des peuples : ils en entendront parler et ils s’écrieront : « Il n’y a qu’un peuple sage et avisé, c’est cette grande nation ! » '
  '7':
  - type: text
    content: 'Où est, en effet, le peuple, même parmi les plus grands, qui a des dieux aussi proches de lui que l’Eternel notre Dieu l’est pour nous toutes les fois que nous l’invoquons ? '
  '8':
  - type: text
    content: Et quel est le grand peuple qui a des commandements et des lois aussi justes que toute cette Loi que je vous donne aujourd’hui ?
  - type: heading
    content: La révélation sur le mont Sinaï
  '9':
  - type: text
    content: Seulement, veille attentivement sur toi-même, et garde-toi bien d’oublier les événements dont tu as été témoin ; qu’ils restent gravés dans ta mémoire pour tous les jours de ta vie et informes-en tes fils et tes petits-fils.
