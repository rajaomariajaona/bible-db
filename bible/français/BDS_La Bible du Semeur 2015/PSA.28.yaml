document_id: PSA.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel répond
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi, ô Eternel, ╵je fais appel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, mon rocher, ╵ne sois pas sourd ╵à ma requête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu restes muet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je deviendrai pareil ╵à ceux qui s’en vont vers la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Entends ma voix qui te supplie ╵quand je t’appelle à l’aide
- type: usfm
  marker: q1
  children:
  - type: text
    text: en élevant mes mains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Geste habituel de la prière en Israël (63.5 ; 134.2 ; 141.2 ; 1 R 8.22 ; Esd 9.5 ; Né 8.6 ; Es 1.15 ; 1 Tm 2.8).
    marker-yv: yv-n
  - type: text
    text: ' ╵en direction du lieu très saint ╵de ta demeure !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne me fais pas subir ╵avec les criminels, ╵avec les malfaisants, ╵le sort qui leur est réservé ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces gens parlent de paix ╵à leur prochain, ╵avec le mal au fond du cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, traite-les selon leurs actes ╵et leurs méfaits ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, traite-les selon leurs œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais retomber sur eux ╵ce qu’ils ont fait !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car ils ne tiennent aucun compte ╵des actes accomplis par l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’Eternel ╵fasse venir leur ruine ╵et qu’il ne les relève pas !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Béni soit l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il m’entend ╵lorsque je le supplie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Eternel est ma force, ╵mon bouclier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En lui je me confie ; ╵il vient à mon secours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi mon cœur bondit de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux chanter pour le louer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Eternel est la force ╵de tous les siens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd’eux. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Une légère modification de l’hébreu permet de lire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de son peuple.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est la forteresse ╵où le roi qui a reçu l’onction de sa part ╵trouve la délivrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O Eternel, ╵sauve ton peuple, ╵et bénis-le : ╵il est ton patrimoine.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois son berger, ╵et prends soin de lui pour toujours.
