document_id: PSA.28,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’Eternel répond
  - type: text
    content: De David.
  - type: text
    content: A toi, ô Eternel, ╵je fais appel ;
  - type: text
    content: toi, mon rocher, ╵ne sois pas sourd ╵à ma requête.
  - type: text
    content: Si tu restes muet,
  - type: text
    content: je deviendrai pareil ╵à ceux qui s’en vont vers la tombe.
  '2':
  - type: text
    content: Entends ma voix qui te supplie ╵quand je t’appelle à l’aide
  - type: text
    content: en élevant mes mains
  - type: note
    content: Geste habituel de la prière en Israël (63.5 ; 134.2 ; 141.2 ; 1 R 8.22 ; Esd 9.5 ; Né 8.6 ; Es 1.15 ; 1 Tm 2.8).
  - type: text
    content: ' ╵en direction du lieu très saint ╵de ta demeure !'
  '3':
  - type: text
    content: Ne me fais pas subir ╵avec les criminels, ╵avec les malfaisants, ╵le sort qui leur est réservé ;
  - type: text
    content: ces gens parlent de paix ╵à leur prochain, ╵avec le mal au fond du cœur.
  '4':
  - type: text
    content: Oui, traite-les selon leurs actes ╵et leurs méfaits ;
  - type: text
    content: oui, traite-les selon leurs œuvres,
  - type: text
    content: fais retomber sur eux ╵ce qu’ils ont fait !
  '5':
  - type: text
    content: Car ils ne tiennent aucun compte ╵des actes accomplis par l’Eternel
  - type: text
    content: et de ses œuvres.
  - type: text
    content: Que l’Eternel ╵fasse venir leur ruine ╵et qu’il ne les relève pas !
  '6':
  - type: text
    content: Béni soit l’Eternel,
  - type: text
    content: car il m’entend ╵lorsque je le supplie.
  '7':
  - type: text
    content: L’Eternel est ma force, ╵mon bouclier.
  - type: text
    content: En lui je me confie ; ╵il vient à mon secours.
  - type: text
    content: Aussi mon cœur bondit de joie.
  - type: text
    content: Je veux chanter pour le louer.
  '8':
  - type: text
    content: L’Eternel est la force ╵de tous les siens
  - type: note
    content: 'En hébreu : d’eux. Une légère modification de l’hébreu permet de lire : de son peuple.'
  - type: text
    content: ','
  - type: text
    content: il est la forteresse ╵où le roi qui a reçu l’onction de sa part ╵trouve la délivrance.
  '9':
  - type: text
    content: 'O Eternel, ╵sauve ton peuple, ╵et bénis-le : ╵il est ton patrimoine.'
  - type: text
    content: Sois son berger, ╵et prends soin de lui pour toujours.
