type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Le livre doit son nom à l’héroïne du récit. L’histoire se passe à Suse, en Perse, sous le règne de Xerxès I
  - type: text
    content: er
  - type: text
    content: ' (486 à 465 av. J.-C.). Elle s’insère donc entre le retour du premier (537) et du deuxième (458 av. J.-C.) contingent des exilés à Jérusalem (Esd 1.1, 11 ; 7.8-9). Elle débute la troisième année du règne de Xerxès, en 483 (1.3), par le renvoi de l’impératrice Vasthi (chap. 1) et le choix d’Esther, une jeune Juive, qui devient impératrice à sa place fin 479 ou début 478 avant Jésus-Christ (2.16-18). Ce long intervalle s’explique par la campagne de l’empereur contre la Grèce, qui s’est soldée par sa cuisante défaite de Salamine.'
  - type: text
    content: Le but de l’auteur du livre, un Juif qui devait habiter en Perse, est de rappeler les circonstances de l’institution de la fête de Pourim et de souligner son importance (9.20-32). Cette fête célèbre le salut miraculeux des Juifs qui, grâce à Esther, soutenue par son cousin Mardochée, ont échappé au génocide organisé par Haman, premier ministre de l’empereur.
  - type: text
    content: L’auteur fait preuve d’une connaissance exacte de la topographie, de la chronologie et de l’administration de Suse. Sa description du personnage sensuel et cruel de Xerxès correspond à ce que l’on en sait par ailleurs. Les textes extra-bibliques ne mentionnent pas Esther, mais une tablette cunéiforme de Borsippa, près de Babylone, parle d’un certain Marduka, haut fonctionnaire de la cour de Suse, que certains identifient à Mardochée.
  - type: text
    content: 'Esther est le seul livre de toute la Bible dont le nom de Dieu soit totalement absent. Le récit suggère avec force que le cours de la vie d’Esther n’est pas dû au hasard : « Qui sait si ce n’est pas en vue de telles circonstances que tu es devenue impératrice ? » (4.14). L’histoire est d’ailleurs émaillée d’événements apparemment fortuits et pourtant décisifs, comme, par exemple, en 6.1, l’insomnie de l’empereur, sa décision de lire le livre des Annales et sa lecture du passage concernant l’intervention salutaire de Mardochée. Dieu est donc bien présent dans le livre, mais l’absence de toute mention de son nom exprime le drame de l’exil : dispersé au milieu des païens, le peuple n’est pas chez lui, là où le Temple se reconstruit.'
