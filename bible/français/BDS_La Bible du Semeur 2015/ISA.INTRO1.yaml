type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: 'Prophète en Juda, Esaïe a exercé un long ministère : sa vocation date de 740 avant Jésus-Christ (6.1) et il a prophétisé sous les règnes des rois de Juda Yotam, Ahaz, Ezéchias (1.1), et très certainement Manassé (698 à 642 av. J.-C.). Esaïe relate, en effet, la mort de Sennachérib survenue en 681 (37.38). Après l’accession au pouvoir de Manassé, roi idolâtre et violent, le prophète s’est sans doute retiré de la vie publique, entouré d’un cercle de disciples. D’après une ancienne tradition, il serait mort martyr, scié dans le tronc d’arbre où il s’était caché (2 R 21.16 ; Hé 11.37). Esaïe, contemporain des prophètes Michée (en Juda) et Osée (dans le royaume du Nord), a vécu à Jérusalem. Marié, il a eu au moins deux enfants (7.3 ; 8.3). Son influence sur les autorités a été la plus grande sous Ezéchias, roi fidèle à l’Eternel.'
  - type: text
    content: Après la mort du roi Ozias (6.1), sous la conduite de Tiglath-Piléser III (745 à 727 av. J.-C.) et de ses successeurs, les Assyriens imposèrent progressivement leur loi aux régions situées à l’ouest de leur territoire. En 722, ils s’emparèrent de Samarie, la capitale du royaume du Nord. En 701, ils envahirent Juda et mirent le siège devant Jérusalem. La ville fut miraculeusement sauvée, en réponse à la prière d’Ezéchias (chap. 36 et 37).
  - type: text
    content: 'C’est de cette époque troublée que datent la majorité des premières prophéties d’Esaïe (1 à 39), en particulier celles qui composent le Livret de l’Emmanuel (chap. 7 à 12). Vers 734, les rois du royaume du Nord et de Damas voulurent entraîner le roi de Juda dans une alliance anti-assyrienne (7.1-2). Ahaz refusa de s’allier à eux, mais au lieu de s’appuyer sur l’Eternel, il demanda l’aide du roi d’Assyrie, ce qui provoqua la chute de Samarie. En réponse à l’incrédulité d’Ahaz, Esaïe annonça l’invasion de Juda par les troupes assyriennes (8.5-10), mais aussi la venue, après cela (7.16ss), d’un étrange enfant, qui naîtra d’une « jeune fille » : Emmanuel (7.14 ; 8.8), « Dieu avec nous » (8.10 ; 9.5). Il sera le Messie, le fils de David tant attendu, sur qui reposera l’Esprit et dont la domination sera universelle (chap. 11).'
  - type: text
    content: 'Lors de la venue d’une ambassade babylonienne à Jérusalem, vers 713, probablement dans le but de s’assurer l’appui d’Ezéchias contre l’Assyrie, Esaïe annonce au roi de Juda l’exil futur du peuple de l’Eternel à Babylone (chap. 39). La deuxième partie du livre (chap. 40 à 66) s’appuie sur cette prophétie pour dévoiler la libération à venir que Dieu allait accomplir. Celle-ci s’opérera par l’intermédiaire de deux personnages dont le prophète révèle progressivement l’identité : un roi, Cyrus (41.2, 25 ; 44.28 ; 45.1, 13 ; 46.11), qui s’emparera de Babylone et permettra aux exilés d’accomplir la première étape d’un nouvel « exode » pour rentrer chez eux (44.14 ; 48.14, 20-21). Le second est le Serviteur de l’Eternel (42.1-9 ; 49.1-13 ; 50.4-11 ; 52.13 à 53.12), différent d’Israël, serviteur aveugle et sourd (42.18-19 ; 43.8), et de Cyrus, car ce Serviteur n’emploiera pas la force : « Il ne brisera pas le roseau qui ploie » (42.3). L’Esprit reposera sur lui (42.1 ; voir 61.1), comme sur Emmanuel. L’exode qu’il fera accomplir au peuple fera « sortir » celui-ci du péché (chap. 53). Ce nouvel exode est présenté comme une nouvelle création, dont l’évocation culmine avec l’annonce de nouveaux cieux et d’une nouvelle terre (65.17 ; 66.22). Telle est l’œuvre qu’accomplira celui qu’Esaïe nomme « le Saint d’Israël ».'
