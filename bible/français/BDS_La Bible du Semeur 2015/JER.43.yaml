document_id: JER.43,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le ministère en Egypte
  - type: text
    content: 'Dès que Jérémie eut fini de rapporter à tout le peuple toutes les paroles que l’Eternel leur Dieu l’avait chargé de leur transmettre, c’est-à-dire toutes les paroles rapportées ici, '
  '10':
  - type: text
    content: 'Puis tu diras à ces gens : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je vais faire venir mon serviteur Nabuchodonosor, roi de Babylone, et j’installerai son trône au-dessus de ces pierres que j’ai enfouies. Il déploiera sa tente royale sur elles. '
  '11':
  - type: text
    content: Oui, il viendra et il frappera l’Egypte, il fera mourir ceux qui sont destinés à mourir, il déportera ceux qui sont destinés à la déportation, et il tuera par l’épée ceux qui sont destinés à périr par l’épée
  - type: note
    content: Nabuchodonosor a entrepris une expédition punitive contre l’Egypte en 568-567 av. J.-C.
  - type: text
    content: .
  '12':
  - type: text
    content: Je mettrai le feu aux temples des dieux des Egyptiens. Il brûlera les temples
  - type: note
    content: 'Autre traduction : il brûlera ces dieux.'
  - type: text
    content: ', et les idoles seront emportées en captivité. Il s’enveloppera de l’Egypte comme un berger s’enveloppe dans son manteau. Après quoi, il repartira tranquillement. '
  '13':
  - type: text
    content: Il mettra en pièces les obélisques sacrés d’Héliopolis
  - type: note
    content: A 8 kilomètres du Caire.
  - type: text
    content: ' en Egypte, et il mettra le feu aux temples des dieux des Egyptiens.'
  '2':
  - type: text
    content: 'Azaria, fils de Hoshaya, et Yohanân, fils de Qaréah, et tous ces hommes orgueilleux répondirent à Jérémie : Tu mens ! L’Eternel notre Dieu ne t’a pas chargé de nous dire : « N’allez pas émigrer en Egypte. » '
  '3':
  - type: text
    content: C’est Baruch, fils de Nériya, qui t’excite contre nous, il veut nous livrer aux Chaldéens pour qu’ils nous tuent ou qu’ils nous déportent à Babylone.
  '4':
  - type: text
    content: 'Ainsi Yohanân, fils de Qaréah, les chefs des troupes, et le reste du peuple n’obéirent pas à l’Eternel : ils ne restèrent pas au pays de Juda. '
  '5':
  - type: text
    content: 'Yohanân, fils de Qaréah, et tous les chefs des troupes prirent tout le reste de la population de Juda qui était revenue de chez tous les peuples parmi lesquels elle avait été dispersée, pour habiter au pays de Juda ; '
  '6':
  - type: text
    content: 'ils prirent les hommes, les femmes et les enfants, les filles du roi et toutes les personnes que Nebouzaradân, le chef des gardes, avait laissées aux soins de Guedalia, fils d’Ahiqam, petit-fils de Shaphân, ainsi que le prophète Jérémie et Baruch, fils de Nériya ; '
  '7':
  - type: text
    content: ils se rendirent en Egypte, désobéissant ainsi à l’Eternel. Ils allèrent jusqu’à Daphné
  - type: note
    content: Voir 2 R 25.26.
  - type: text
    content: .
  - type: heading
    content: Les prédictions de Jérémie
  '8':
  - type: text
    content: 'Alors l’Eternel adressa la parole à Jérémie à Daphné en ces termes : '
  '9':
  - type: text
    content: Prends quelques grosses pierres et enfouis-les sous les yeux des Juifs dans le sol argileux de la terrasse
  - type: note
    content: 'la terrasse: terme hébreu de sens inconnu qui a été aussi rendu par le pavé, la tuilerie.'
  - type: text
    content: ' qui se trouve en face de l’entrée du palais du pharaon, à Daphné. '
