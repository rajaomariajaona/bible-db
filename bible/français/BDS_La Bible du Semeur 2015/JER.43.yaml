document_id: JER.43,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le ministère en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dès que Jérémie eut fini de rapporter à tout le peuple toutes les paroles que l’Eternel leur Dieu l’avait chargé de leur transmettre, c’est-à-dire toutes les paroles rapportées ici, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Puis tu diras à ces gens : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Je vais faire venir mon serviteur Nabuchodonosor, roi de Babylone, et j’installerai son trône au-dessus de ces pierres que j’ai enfouies. Il déploiera sa tente royale sur elles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, il viendra et il frappera l’Egypte, il fera mourir ceux qui sont destinés à mourir, il déportera ceux qui sont destinés à la déportation, et il tuera par l’épée ceux qui sont destinés à périr par l’épée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nabuchodonosor a entrepris une expédition punitive contre l’Egypte en 568-567 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je mettrai le feu aux temples des dieux des Egyptiens. Il brûlera les temples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il brûlera ces dieux.
      marker-yv: yv-n
    - type: text
      text: ', et les idoles seront emportées en captivité. Il s’enveloppera de l’Egypte comme un berger s’enveloppe dans son manteau. Après quoi, il repartira tranquillement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Il mettra en pièces les obélisques sacrés d’Héliopolis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A 8 kilomètres du Caire.
      marker-yv: yv-n
    - type: text
      text: ' en Egypte, et il mettra le feu aux temples des dieux des Egyptiens.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Azaria, fils de Hoshaya, et Yohanân, fils de Qaréah, et tous ces hommes orgueilleux répondirent à Jérémie : Tu mens ! L’Eternel notre Dieu ne t’a pas chargé de nous dire : « N’allez pas émigrer en Egypte. » '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est Baruch, fils de Nériya, qui t’excite contre nous, il veut nous livrer aux Chaldéens pour qu’ils nous tuent ou qu’ils nous déportent à Babylone.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ainsi Yohanân, fils de Qaréah, les chefs des troupes, et le reste du peuple n’obéirent pas à l’Eternel : ils ne restèrent pas au pays de Juda. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Yohanân, fils de Qaréah, et tous les chefs des troupes prirent tout le reste de la population de Juda qui était revenue de chez tous les peuples parmi lesquels elle avait été dispersée, pour habiter au pays de Juda ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ils prirent les hommes, les femmes et les enfants, les filles du roi et toutes les personnes que Nebouzaradân, le chef des gardes, avait laissées aux soins de Guedalia, fils d’Ahiqam, petit-fils de Shaphân, ainsi que le prophète Jérémie et Baruch, fils de Nériya ; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ils se rendirent en Egypte, désobéissant ainsi à l’Eternel. Ils allèrent jusqu’à Daphné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25.26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les prédictions de Jérémie
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors l’Eternel adressa la parole à Jérémie à Daphné en ces termes : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Prends quelques grosses pierres et enfouis-les sous les yeux des Juifs dans le sol argileux de la terrasse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la terrasse
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'terme hébreu de sens inconnu qui a été aussi rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le pavé, la tuilerie.
      marker-yv: yv-n
    - type: text
      text: ' qui se trouve en face de l’entrée du palais du pharaon, à Daphné. '
