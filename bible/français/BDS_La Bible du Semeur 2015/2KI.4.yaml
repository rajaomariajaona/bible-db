document_id: 2KI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée secourt une pauvre veuve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La veuve d’un disciple des prophètes implora Elisée en ces termes : Ton serviteur mon mari est mort. Tu sais combien il craignait l’Eternel. Or, voilà que l’homme qui lui avait prêté de l’argent veut prendre mes deux enfants et en faire des esclaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elisée lui demanda : Que puis-je faire pour toi ? Dis-moi ce que tu as dans ta maison.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Je n’ai plus rien d’autre chez moi qu’un flacon d’huile'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Orient, l’huile est la base de l’alimentation comme des soins du corps.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il dit alors : Va donc emprunter chez tous tes voisins autant de récipients vides que tu pourras. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Puis tu rentreras chez toi, tu fermeras la porte sur toi et sur tes fils, tu verseras de l’huile dans tous ces récipients et tu les mettras de côté à mesure qu’ils seront pleins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La femme le quitta et fit ce qu’il lui avait dit. Elle ferma la porte sur elle et sur ses fils ; ceux-ci lui présentaient les récipients, et elle les remplissait. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’ils furent tous pleins, elle dit à l’un de ses fils : Passe-moi encore un récipient.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais il lui répondit : Il n’y en a plus.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Au même moment, l’huile s’arrêta de couler. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle alla le raconter à l’homme de Dieu qui lui dit : Va vendre cette huile. Tu pourras rembourser ta dette et vivre, toi et tes fils, avec ce qui te restera.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée et le fils de la Sunamite
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La naissance de l’enfant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Un jour, Elisée passait par le village de Sunem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans la plaine de Jizréel attribuée à la tribu d’Issacar (voir Jos 19.18 ; 1 S 28.4 ; 1 R 1.3).
    marker-yv: yv-n
  - type: text
    text: '. Une femme riche insista auprès de lui pour qu’il accepte de prendre un repas chez elle. Dès lors, chaque fois qu’il passait par ce village, il s’arrêtait chez elle pour manger. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle dit à son mari : Je sais que cet homme qui passe toujours chez nous est un saint homme de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous pourrions lui construire une petite chambre sur le toit et y mettre pour lui un lit, une table, une chaise et une lampe. Il pourrait loger là quand il viendra chez nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un jour qu’Elisée repassait à Sunem, il alla donc se retirer dans la petite chambre haute et y passa la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Puis il dit à son serviteur Guéhazi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 5.19-27 ; 6.15.
    marker-yv: yv-n
  - type: text
    text: '  : Appelle cette Sunamite !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Guéhazi l’appela, et elle vint se présenter devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elisée dit à Guéhazi : Dis-lui : « Tu t’es donné beaucoup de peine en faisant tout cela pour nous. Que pouvons-nous faire pour toi ? Faut-il parler en ta faveur au roi ou au chef de l’armée ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Non, merci. Je vis heureuse au milieu de mon peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elisée demanda à son serviteur : Que pourrions-nous faire pour elle ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Guéhazi répondit : Hélas ! elle n’a pas d’enfant, et son mari est âgé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elisée lui dit : Appelle-la !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Guéhazi obéit, et elle vint se présenter sur le pas de la porte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elisée lui dit : L’an prochain, à la même époque, tu tiendras un fils dans tes bras !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle s’écria alors : Que mon seigneur, homme de Dieu, ne me donne pas de faux espoirs, moi qui suis sa servante !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Cependant, cette femme devint enceinte et, l’année suivante à la même époque, elle donna naissance à un fils, exactement comme Elisée le lui avait prédit.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La mort de l’enfant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’enfant grandit. Un jour qu’il était allé rejoindre son père auprès des moissonneurs, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'il cria soudain à son père : Oh, ma tête ! Que j’ai mal à la tête'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit probablement d’une insolation (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 121.6
        metadata:
          usfm: PSA.121.6
      - type: text
        text: ), l’époque de la moisson étant l’une des plus chaudes de l’année.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le père ordonna à son serviteur : Emporte-le vite chez sa mère !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le serviteur l’emporta et l’amena à sa mère, qui le prit sur ses genoux. Il y resta jusqu’à midi, puis il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle monta dans la chambre du prophète, le coucha sur le lit de l’homme de Dieu, referma la porte sur lui et sortit. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis elle appela son mari et lui dit : Donne-moi, je te prie, l’un des jeunes serviteurs et une ânesse ; je vais vite aller chez l’homme de Dieu et je reviens aussitôt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: – Pourquoi veux-tu aller chez lui aujourd’hui ? lui demanda-t-il. Ce n’est ni la nouvelle lune ni un jour de sabbat.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle lui répondit : Tout va bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis elle fit seller l’ânesse et dit à son jeune serviteur : Conduis-moi rapidement ! Ne m’arrête pas en cours de route sans que je te l’ordonne !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elle voyagea ainsi et parvint jusqu’au mont Carmel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.25'
        metadata:
          usfm: 2KI.2.25
      - type: text
        text: . A une trentaine de kilomètres de Sunem.
    marker-yv: yv-n
  - type: text
    text: ' où habitait l’homme de Dieu. Quand celui-ci l’aperçut de loin, il dit à son serviteur Guéhazi : Regarde, c’est notre Sunamite. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cours vite à sa rencontre et demande-lui : « Tout va-t-il bien pour toi ? Ton mari est-il en bonne santé ? L’enfant va-t-il bien ? »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle répondit : Tout va bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elle poursuivit jusqu’à l’homme de Dieu sur la montagne, elle se jeta à ses pieds. Guéhazi s’approcha pour l’écarter. Mais Elisée lui dit : Laisse-la faire ! Elle est profondément affligée, mais l’Eternel ne me l’a pas fait savoir et il ne m’en a pas révélé la cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors la femme s’écria : Est-ce que j’ai demandé un fils à mon seigneur ? Ne t’avais-je pas dit : « Ne me donne pas de faux espoirs » ?'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Elisée ressuscite l’enfant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Elisée ordonna à Guéhazi : Mets ta ceinture ! Prends mon bâton en main et va. Si tu rencontres quelqu’un en chemin, ne perds pas de temps à le saluer, et si quelqu’un te salue, ne t’arrête pas pour lui répondre. Quand tu arriveras dans la maison de cette femme, tu poseras mon bâton sur le visage du garçon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'La mère de l’enfant s’écria : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne partirai pas sans toi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Elisée se leva et se mit en route avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Guéhazi les avait devancés et il avait posé le bâton sur le visage du petit garçon, mais rien ne s’était passé : pas un son, pas une réaction. Il revint donc sur ses pas, à la rencontre d’Elisée, et lui annonça que l’enfant n’était pas revenu à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Quand Elisée arriva à la maison, le petit garçon était mort, étendu sur le lit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Elisée entra, ferma la porte sur eux deux et pria l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il monta sur le lit et se plaça sur l’enfant, il appliqua sa bouche sur sa bouche, ses yeux sur ses yeux, ses mains sur ses mains. Comme il restait ainsi étendu sur lui, le corps de l’enfant commença à se réchauffer. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le prophète se releva, marcha de long en large dans la chambre, puis s’étendit de nouveau sur l’enfant. Soudain le petit garçon éternua sept fois et rouvrit les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elisée appela Guéhazi et lui dit : Va chercher cette Sunamite !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Guéhazi l’appela et elle vint vers Elisée qui lui dit : Voici ton fils, reprends-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Elle s’avança, se jeta à ses pieds et se prosterna jusqu’à terre, puis elle prit son fils dans ses bras et sortit de la pièce.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée pourvoit à la nourriture de ses disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Elisée retourna à Guilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le Guilgal de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.1'
        metadata:
          usfm: 2KI.2.1
      - type: text
        text: ' (voir note) où se trouvait une école de disciples du prophète.'
    marker-yv: yv-n
  - type: text
    text: '. Or, la famine sévissait dans cette contrée. Un jour, ses disciples étaient assis devant lui. Il s’interrompit et dit à son serviteur : Mets la grande marmite sur le feu et prépare une soupe pour les disciples !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Alors un membre du groupe sortit dans la campagne pour ramasser des légumes. Dans une vigne sauvage, il trouva des coloquintes sauvages
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plante ressemblant à des concombres. Son fruit allongé, de la grosseur d’une orange, est extrêmement amer.
    marker-yv: yv-n
  - type: text
    text: ' et en remplit le pan de son vêtement. A son retour, il les coupa en morceaux et en remplit la marmite pour la soupe, mais personne ne savait ce que c’était. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'On servit la soupe aux hommes, mais dès qu’ils l’eurent goûtée, ils s’écrièrent : Cette soupe est du poison, homme de Dieu !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et ils ne purent la manger. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Mais Elisée ordonna : Apportez-moi de la farine !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il en versa dans la marmite et dit : Que l’on serve ces gens et qu’ils mangent !'
- type: usfm
  marker: p
  children:
  - type: text
    text: La soupe qui était dans la marmite ne contenait plus rien de mauvais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: A cette époque, un homme vint de Baal-Shalisha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 9.4
        metadata:
          usfm: 1SA.9.4
      - type: text
        text: ', cette localité mentionnée seulement ici se trouvait à l’ouest de la montagne d’Ephraïm.'
    marker-yv: yv-n
  - type: text
    text: '. Il apporta des vivres à l’homme de Dieu : vingt pains d’orge et de blé nouveau dans son sac, comme premiers produits de la nouvelle récolte. Elisée dit à son serviteur : Partage ces vivres entre tout le monde et qu’ils mangent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Celui-ci répondit : Comment pourrais-je nourrir cent personnes avec cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Elisée répéta : Partage ces vivres entre tous et qu’ils mangent, car l’Eternel déclare : « Chacun mangera à sa faim, et il y aura même des restes. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Le serviteur distribua les pains à tout le monde, ils mangèrent, et il y eut effectivement des restes, comme l’Eternel l’avait annoncé.
