document_id: 2KI.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Elisée secourt une pauvre veuve
  - type: text
    content: 'La veuve d’un disciple des prophètes implora Elisée en ces termes : Ton serviteur mon mari est mort. Tu sais combien il craignait l’Eternel. Or, voilà que l’homme qui lui avait prêté de l’argent veut prendre mes deux enfants et en faire des esclaves.'
  '10':
  - type: text
    content: Nous pourrions lui construire une petite chambre sur le toit et y mettre pour lui un lit, une table, une chaise et une lampe. Il pourrait loger là quand il viendra chez nous.
  '11':
  - type: text
    content: 'Un jour qu’Elisée repassait à Sunem, il alla donc se retirer dans la petite chambre haute et y passa la nuit. '
  '12':
  - type: text
    content: Puis il dit à son serviteur Guéhazi
  - type: note
    content: Voir 5.19-27 ; 6.15.
  - type: text
    content: '  : Appelle cette Sunamite !'
  - type: text
    content: 'Guéhazi l’appela, et elle vint se présenter devant lui. '
  '13':
  - type: text
    content: 'Elisée dit à Guéhazi : Dis-lui : « Tu t’es donné beaucoup de peine en faisant tout cela pour nous. Que pouvons-nous faire pour toi ? Faut-il parler en ta faveur au roi ou au chef de l’armée ? »'
  - type: text
    content: 'Elle répondit : Non, merci. Je vis heureuse au milieu de mon peuple.'
  '14':
  - type: text
    content: 'Elisée demanda à son serviteur : Que pourrions-nous faire pour elle ?'
  - type: text
    content: 'Guéhazi répondit : Hélas ! elle n’a pas d’enfant, et son mari est âgé.'
  '15':
  - type: text
    content: 'Elisée lui dit : Appelle-la !'
  - type: text
    content: Guéhazi obéit, et elle vint se présenter sur le pas de la porte.
  '16':
  - type: text
    content: 'Elisée lui dit : L’an prochain, à la même époque, tu tiendras un fils dans tes bras !'
  - type: text
    content: 'Elle s’écria alors : Que mon seigneur, homme de Dieu, ne me donne pas de faux espoirs, moi qui suis sa servante !'
  '17':
  - type: text
    content: Cependant, cette femme devint enceinte et, l’année suivante à la même époque, elle donna naissance à un fils, exactement comme Elisée le lui avait prédit.
  - type: heading
    content: La mort de l’enfant
  '18':
  - type: text
    content: 'L’enfant grandit. Un jour qu’il était allé rejoindre son père auprès des moissonneurs, '
  '19':
  - type: text
    content: 'il cria soudain à son père : Oh, ma tête ! Que j’ai mal à la tête'
  - type: note
    content: Il s’agit probablement d’une insolation (voir Ps 121.6), l’époque de la moisson étant l’une des plus chaudes de l’année.
  - type: text
    content: '  !'
  - type: text
    content: 'Le père ordonna à son serviteur : Emporte-le vite chez sa mère !'
  '2':
  - type: text
    content: 'Elisée lui demanda : Que puis-je faire pour toi ? Dis-moi ce que tu as dans ta maison.'
  - type: text
    content: 'Elle répondit : Je n’ai plus rien d’autre chez moi qu’un flacon d’huile'
  - type: note
    content: En Orient, l’huile est la base de l’alimentation comme des soins du corps.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Le serviteur l’emporta et l’amena à sa mère, qui le prit sur ses genoux. Il y resta jusqu’à midi, puis il mourut. '
  '21':
  - type: text
    content: 'Elle monta dans la chambre du prophète, le coucha sur le lit de l’homme de Dieu, referma la porte sur lui et sortit. '
  '22':
  - type: text
    content: 'Puis elle appela son mari et lui dit : Donne-moi, je te prie, l’un des jeunes serviteurs et une ânesse ; je vais vite aller chez l’homme de Dieu et je reviens aussitôt.'
  '23':
  - type: text
    content: – Pourquoi veux-tu aller chez lui aujourd’hui ? lui demanda-t-il. Ce n’est ni la nouvelle lune ni un jour de sabbat.
  - type: text
    content: 'Elle lui répondit : Tout va bien.'
  '24':
  - type: text
    content: 'Puis elle fit seller l’ânesse et dit à son jeune serviteur : Conduis-moi rapidement ! Ne m’arrête pas en cours de route sans que je te l’ordonne !'
  '25':
  - type: text
    content: Elle voyagea ainsi et parvint jusqu’au mont Carmel
  - type: note
    content: Voir 2.25. A une trentaine de kilomètres de Sunem.
  - type: text
    content: ' où habitait l’homme de Dieu. Quand celui-ci l’aperçut de loin, il dit à son serviteur Guéhazi : Regarde, c’est notre Sunamite. '
  '26':
  - type: text
    content: 'Cours vite à sa rencontre et demande-lui : « Tout va-t-il bien pour toi ? Ton mari est-il en bonne santé ? L’enfant va-t-il bien ? »'
  - type: text
    content: 'Elle répondit : Tout va bien.'
  '27':
  - type: text
    content: 'Elle poursuivit jusqu’à l’homme de Dieu sur la montagne, elle se jeta à ses pieds. Guéhazi s’approcha pour l’écarter. Mais Elisée lui dit : Laisse-la faire ! Elle est profondément affligée, mais l’Eternel ne me l’a pas fait savoir et il ne m’en a pas révélé la cause.'
  '28':
  - type: text
    content: 'Alors la femme s’écria : Est-ce que j’ai demandé un fils à mon seigneur ? Ne t’avais-je pas dit : « Ne me donne pas de faux espoirs » ?'
  - type: heading
    content: Elisée ressuscite l’enfant
  '29':
  - type: text
    content: 'Elisée ordonna à Guéhazi : Mets ta ceinture ! Prends mon bâton en main et va. Si tu rencontres quelqu’un en chemin, ne perds pas de temps à le saluer, et si quelqu’un te salue, ne t’arrête pas pour lui répondre. Quand tu arriveras dans la maison de cette femme, tu poseras mon bâton sur le visage du garçon.'
  '3':
  - type: text
    content: 'Il dit alors : Va donc emprunter chez tous tes voisins autant de récipients vides que tu pourras. '
  '30':
  - type: text
    content: 'La mère de l’enfant s’écria : Aussi vrai que l’Eternel est vivant et que tu es toi-même en vie, je ne partirai pas sans toi !'
  - type: text
    content: 'Alors Elisée se leva et se mit en route avec elle. '
  '31':
  - type: text
    content: 'Guéhazi les avait devancés et il avait posé le bâton sur le visage du petit garçon, mais rien ne s’était passé : pas un son, pas une réaction. Il revint donc sur ses pas, à la rencontre d’Elisée, et lui annonça que l’enfant n’était pas revenu à lui. '
  '32':
  - type: text
    content: 'Quand Elisée arriva à la maison, le petit garçon était mort, étendu sur le lit. '
  '33':
  - type: text
    content: 'Elisée entra, ferma la porte sur eux deux et pria l’Eternel. '
  '34':
  - type: text
    content: 'Il monta sur le lit et se plaça sur l’enfant, il appliqua sa bouche sur sa bouche, ses yeux sur ses yeux, ses mains sur ses mains. Comme il restait ainsi étendu sur lui, le corps de l’enfant commença à se réchauffer. '
  '35':
  - type: text
    content: 'Le prophète se releva, marcha de long en large dans la chambre, puis s’étendit de nouveau sur l’enfant. Soudain le petit garçon éternua sept fois et rouvrit les yeux. '
  '36':
  - type: text
    content: 'Elisée appela Guéhazi et lui dit : Va chercher cette Sunamite !'
  - type: text
    content: 'Guéhazi l’appela et elle vint vers Elisée qui lui dit : Voici ton fils, reprends-le !'
  '37':
  - type: text
    content: Elle s’avança, se jeta à ses pieds et se prosterna jusqu’à terre, puis elle prit son fils dans ses bras et sortit de la pièce.
  - type: heading
    content: Elisée pourvoit à la nourriture de ses disciples
  '38':
  - type: text
    content: Elisée retourna à Guilgal
  - type: note
    content: Le Guilgal de 2.1 (voir note) où se trouvait une école de disciples du prophète.
  - type: text
    content: '. Or, la famine sévissait dans cette contrée. Un jour, ses disciples étaient assis devant lui. Il s’interrompit et dit à son serviteur : Mets la grande marmite sur le feu et prépare une soupe pour les disciples !'
  '39':
  - type: text
    content: Alors un membre du groupe sortit dans la campagne pour ramasser des légumes. Dans une vigne sauvage, il trouva des coloquintes sauvages
  - type: note
    content: Plante ressemblant à des concombres. Son fruit allongé, de la grosseur d’une orange, est extrêmement amer.
  - type: text
    content: ' et en remplit le pan de son vêtement. A son retour, il les coupa en morceaux et en remplit la marmite pour la soupe, mais personne ne savait ce que c’était. '
  '4':
  - type: text
    content: Puis tu rentreras chez toi, tu fermeras la porte sur toi et sur tes fils, tu verseras de l’huile dans tous ces récipients et tu les mettras de côté à mesure qu’ils seront pleins.
  '40':
  - type: text
    content: 'On servit la soupe aux hommes, mais dès qu’ils l’eurent goûtée, ils s’écrièrent : Cette soupe est du poison, homme de Dieu !'
  - type: text
    content: 'Et ils ne purent la manger. '
  '41':
  - type: text
    content: 'Mais Elisée ordonna : Apportez-moi de la farine !'
  - type: text
    content: 'Il en versa dans la marmite et dit : Que l’on serve ces gens et qu’ils mangent !'
  - type: text
    content: La soupe qui était dans la marmite ne contenait plus rien de mauvais.
  '42':
  - type: text
    content: A cette époque, un homme vint de Baal-Shalisha
  - type: note
    content: D’après 1 S 9.4, cette localité mentionnée seulement ici se trouvait à l’ouest de la montagne d’Ephraïm.
  - type: text
    content: '. Il apporta des vivres à l’homme de Dieu : vingt pains d’orge et de blé nouveau dans son sac, comme premiers produits de la nouvelle récolte. Elisée dit à son serviteur : Partage ces vivres entre tout le monde et qu’ils mangent.'
  '43':
  - type: text
    content: 'Celui-ci répondit : Comment pourrais-je nourrir cent personnes avec cela ?'
  - type: text
    content: 'Mais Elisée répéta : Partage ces vivres entre tous et qu’ils mangent, car l’Eternel déclare : « Chacun mangera à sa faim, et il y aura même des restes. »'
  '44':
  - type: text
    content: Le serviteur distribua les pains à tout le monde, ils mangèrent, et il y eut effectivement des restes, comme l’Eternel l’avait annoncé.
  '5':
  - type: text
    content: 'La femme le quitta et fit ce qu’il lui avait dit. Elle ferma la porte sur elle et sur ses fils ; ceux-ci lui présentaient les récipients, et elle les remplissait. '
  '6':
  - type: text
    content: 'Lorsqu’ils furent tous pleins, elle dit à l’un de ses fils : Passe-moi encore un récipient.'
  - type: text
    content: 'Mais il lui répondit : Il n’y en a plus.'
  - type: text
    content: 'Au même moment, l’huile s’arrêta de couler. '
  '7':
  - type: text
    content: 'Elle alla le raconter à l’homme de Dieu qui lui dit : Va vendre cette huile. Tu pourras rembourser ta dette et vivre, toi et tes fils, avec ce qui te restera.'
  - type: heading
    content: Elisée et le fils de la Sunamite
  - type: heading
    content: La naissance de l’enfant
  '8':
  - type: text
    content: Un jour, Elisée passait par le village de Sunem
  - type: note
    content: Dans la plaine de Jizréel attribuée à la tribu d’Issacar (voir Jos 19.18 ; 1 S 28.4 ; 1 R 1.3).
  - type: text
    content: '. Une femme riche insista auprès de lui pour qu’il accepte de prendre un repas chez elle. Dès lors, chaque fois qu’il passait par ce village, il s’arrêtait chez elle pour manger. '
  '9':
  - type: text
    content: 'Elle dit à son mari : Je sais que cet homme qui passe toujours chez nous est un saint homme de Dieu. '
