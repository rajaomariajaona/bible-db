document_id: NUM.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le châtiment des Madianites
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’expédition punitive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse et lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fais payer aux Madianites le mal qu’ils ont fait aux Israélites. Après cela, tu iras rejoindre tes ancêtres décédés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse s’adressa au peuple en disant : Que certains de vos hommes s’équipent pour partir en campagne et qu’ils aillent attaquer les Madianites pour leur infliger un châtiment de la part de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Envoyez au combat mille hommes de chacune des tribus d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On mobilisa donc mille hommes par tribu parmi les corps d’armée d’Israël, soit douze mille hommes armés pour le combat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moïse les envoya au combat avec Phinéas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Qui s’était distingué par son zèle dans la lutte contre l’idolâtrie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25.7-11
        metadata:
          usfm: NUM.25.7+NUM.25.8+NUM.25.9+NUM.25.10+NUM.25.11
      - type: text
        text: ) et avait mis fin au fléau. Il commande en tant que chef religieux donnant les signaux prescrits.
    marker-yv: yv-n
  - type: text
    text: ', fils du prêtre Eléazar, qui portait les objets sacrés et les trompettes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sacrés
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.30
        metadata:
          usfm: EXO.28.30
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trompettes
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 10.9
        metadata:
          usfm: NUM.10.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' pour donner le signal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils marchèrent contre Madian, comme l’Eternel l’avait ordonné à Moïse, et ils tuèrent tous les hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'y compris cinq rois de Madian : Evi, Réqem, Tsour'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Père de Kozbi (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25.15'
        metadata:
          usfm: NUM.25.15
      - type: text
        text: ), chef de plusieurs familles madianites.
    marker-yv: yv-n
  - type: text
    text: ', Hour et Réba. Ils firent aussi périr par l’épée Balaam, fils de Béor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils firent prisonniers les femmes des Madianites et leurs enfants, et s’emparèrent de toutes leurs bêtes, de tous leurs troupeaux et de tous leurs biens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils mirent le feu à toutes les villes qu’ils habitaient ainsi qu’à tous leurs campements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: palais.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils emportèrent tout leur butin et toutes les personnes et les bêtes qu’ils avaient capturées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et ils amenèrent les prisonniers, le bétail capturé et le butin à Moïse, au prêtre Eléazar et à la communauté des Israélites, qui avaient leur campement dans les steppes de Moab, près du Jourdain, en face de Jéricho.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La purification des combattants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse et le prêtre Eléazar et tous les chefs de la communauté sortirent du camp à leur rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moïse se fâcha contre les commandants de l’armée, chef des « milliers » et chefs des « centaines » qui revenaient du combat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il leur demanda : Pourquoi avez-vous laissé la vie à toutes ces femmes ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rappelez-vous que ce sont elles qui, sur les conseils de Balaam, ont incité les Israélites à être infidèles à l’Eternel dans l’affaire de Peor, de sorte qu’un fléau a frappé la communauté de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maintenant donc, tuez tous les garçons et toutes les femmes qui ont déjà partagé la couche d’un homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous ne laisserez en vie et ne garderez pour vous que les filles qui sont vierges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et vous qui avez tué quelqu’un ou touché un cadavre, restez sept jours à l’extérieur du camp ; purifiez-vous le troisième et le septième jour, vous et vos prisonnières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous purifierez aussi tout vêtement, tout objet de cuir, tout tissu de poil de chèvre et tout ustensile en bois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le prêtre Eléazar dit aux soldats de l’armée qui revenaient de la bataille : Voici les dispositions de la Loi que l’Eternel a donnée à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'Vous purifierez par le feu tous les objets qui ne brûlent pas : ceux qui sont en or, en argent, en bronze, en fer, en étain et en plomb ; ensuite, vous les purifierez avec l’eau de purification'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.22-23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 19.9
        metadata:
          usfm: NUM.19.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et tout ce qui ne supporte pas le feu, vous le passerez à l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vous laverez vos vêtements le septième jour, après quoi vous serez rituellement purs et vous rentrerez au camp.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le partage du butin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’Eternel dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Prends avec toi le prêtre Eléazar et les chefs des groupes familiaux de la communauté, vous ferez le compte de ce qui a été capturé, prisonniers et bestiaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ensuite tu partageras ce butin en deux moitiés, l’une sera pour les combattants qui ont pris part à l’expédition, l’autre pour le reste de la communauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu prélèveras sur la part des soldats qui ont participé au combat, comme tribut pour l’Eternel, une personne sur cinq cents et une bête sur cinq cents pour les bovins, les ânes et le petit bétail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vous les prendrez sur la moitié qui leur revient et tu les remettras au prêtre Eléazar comme offrande pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Sur la part revenant aux Israélites, tu prendras une personne sur cinquante et un animal sur cinquante parmi les ânes, le petit et le gros bétail, et tu les remettras aux lévites qui assurent le service du tabernacle de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse et le prêtre Eléazar firent ce que l’Eternel avait ordonné à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Bilan du butin restant ramené par ceux qui avaient participé à l’expédition : 675 000 moutons et chèvres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '72 000 têtes de bovins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '61 000 ânes '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: et 32 000 jeunes filles vierges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'La moitié revenant à ceux qui étaient allés à la guerre se montait à 337 500 moutons et chèvres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dont 675 revinrent comme tribut à l’Eternel ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '36 000 têtes de bovins dont un tribut de 72 pour l’Eternel ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '30 500 ânes dont 61 comme tribut pour l’Eternel ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'et 16 000 personnes dont 32 comme tribut pour l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Moïse remit le tribut pour l’Eternel au prêtre Eléazar comme l’Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Quant à la moitié attribuée à la communauté des Israélites que Moïse avait mise à part de celle des combattants qui avaient fait la campagne, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'elle consistait en : 337 500 moutons et chèvres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '36 000 bovins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '30 500 ânes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'et 16 000 personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Moïse préleva sur cette moitié une personne sur cinquante et un animal sur cinquante et il les donna aux lévites qui assurent le service du tabernacle de l’Eternel, comme l’Eternel le lui avait ordonné.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’offrande volontaire de reconnaissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les commandants des divers corps d’armée, chefs des « milliers » et chefs des « centaines », vinrent alors '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'dire à Moïse : Tes serviteurs ont fait le compte des combattants qui étaient sous nos ordres et il n’en manque pas un seul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Aussi nous apportons, comme offrande à l’Eternel, chacun ce qu’il a trouvé comme bijoux en or, chaînettes et bracelets, bagues, boucles d’oreilles et colliers, comme un rite d’expiation pour nos personnes devant l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Moïse et le prêtre Eléazar acceptèrent de leurs mains tous ces objets ouvragés en or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Le poids total de l’or ainsi prélevé en offrande pour l’Eternel par les chefs des « milliers » et des « centaines » fut de 184 kilogrammes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.52 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 16 750 sicles.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les hommes de la troupe prirent leur butin chacun pour son compte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Moïse et le prêtre Eléazar prirent l’or des chefs des « milliers » et des « centaines » et l’apportèrent devant l’Eternel dans la tente de la Rencontre comme mémorial pour les Israélites.
