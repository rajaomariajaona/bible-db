document_id: NUM.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le châtiment des Madianites
  - type: heading
    content: L’expédition punitive
  - type: text
    content: 'L’Eternel parla à Moïse et lui dit : '
  '10':
  - type: text
    content: Ils mirent le feu à toutes les villes qu’ils habitaient ainsi qu’à tous leurs campements
  - type: note
    content: 'Autre traduction : palais.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ils emportèrent tout leur butin et toutes les personnes et les bêtes qu’ils avaient capturées, '
  '12':
  - type: text
    content: et ils amenèrent les prisonniers, le bétail capturé et le butin à Moïse, au prêtre Eléazar et à la communauté des Israélites, qui avaient leur campement dans les steppes de Moab, près du Jourdain, en face de Jéricho.
  - type: heading
    content: La purification des combattants
  '13':
  - type: text
    content: 'Moïse et le prêtre Eléazar et tous les chefs de la communauté sortirent du camp à leur rencontre. '
  '14':
  - type: text
    content: 'Moïse se fâcha contre les commandants de l’armée, chef des « milliers » et chefs des « centaines » qui revenaient du combat. '
  '15':
  - type: text
    content: 'Il leur demanda : Pourquoi avez-vous laissé la vie à toutes ces femmes ? '
  '16':
  - type: text
    content: 'Rappelez-vous que ce sont elles qui, sur les conseils de Balaam, ont incité les Israélites à être infidèles à l’Eternel dans l’affaire de Peor, de sorte qu’un fléau a frappé la communauté de l’Eternel. '
  '17':
  - type: text
    content: 'Maintenant donc, tuez tous les garçons et toutes les femmes qui ont déjà partagé la couche d’un homme. '
  '18':
  - type: text
    content: 'Vous ne laisserez en vie et ne garderez pour vous que les filles qui sont vierges. '
  '19':
  - type: text
    content: 'Et vous qui avez tué quelqu’un ou touché un cadavre, restez sept jours à l’extérieur du camp ; purifiez-vous le troisième et le septième jour, vous et vos prisonnières. '
  '2':
  - type: text
    content: Fais payer aux Madianites le mal qu’ils ont fait aux Israélites. Après cela, tu iras rejoindre tes ancêtres décédés.
  '20':
  - type: text
    content: Vous purifierez aussi tout vêtement, tout objet de cuir, tout tissu de poil de chèvre et tout ustensile en bois.
  '21':
  - type: text
    content: 'Le prêtre Eléazar dit aux soldats de l’armée qui revenaient de la bataille : Voici les dispositions de la Loi que l’Eternel a donnée à Moïse : '
  '22':
  - type: text
    content: 'Vous purifierez par le feu tous les objets qui ne brûlent pas : ceux qui sont en or, en argent, en bronze, en fer, en étain et en plomb ; ensuite, vous les purifierez avec l’eau de purification'
  - type: note
    content: Voir Nb 19.9.
  - type: text
    content: ', et tout ce qui ne supporte pas le feu, vous le passerez à l’eau. '
  '24':
  - type: text
    content: Vous laverez vos vêtements le septième jour, après quoi vous serez rituellement purs et vous rentrerez au camp.
  - type: heading
    content: Le partage du butin
  '25':
  - type: text
    content: 'L’Eternel dit à Moïse : '
  '26':
  - type: text
    content: 'Prends avec toi le prêtre Eléazar et les chefs des groupes familiaux de la communauté, vous ferez le compte de ce qui a été capturé, prisonniers et bestiaux. '
  '27':
  - type: text
    content: 'Ensuite tu partageras ce butin en deux moitiés, l’une sera pour les combattants qui ont pris part à l’expédition, l’autre pour le reste de la communauté. '
  '28':
  - type: text
    content: 'Tu prélèveras sur la part des soldats qui ont participé au combat, comme tribut pour l’Eternel, une personne sur cinq cents et une bête sur cinq cents pour les bovins, les ânes et le petit bétail. '
  '29':
  - type: text
    content: 'Vous les prendrez sur la moitié qui leur revient et tu les remettras au prêtre Eléazar comme offrande pour l’Eternel. '
  '3':
  - type: text
    content: 'Moïse s’adressa au peuple en disant : Que certains de vos hommes s’équipent pour partir en campagne et qu’ils aillent attaquer les Madianites pour leur infliger un châtiment de la part de l’Eternel. '
  '30':
  - type: text
    content: 'Sur la part revenant aux Israélites, tu prendras une personne sur cinquante et un animal sur cinquante parmi les ânes, le petit et le gros bétail, et tu les remettras aux lévites qui assurent le service du tabernacle de l’Eternel. '
  '31':
  - type: text
    content: 'Moïse et le prêtre Eléazar firent ce que l’Eternel avait ordonné à Moïse. '
  '32':
  - type: text
    content: 'Bilan du butin restant ramené par ceux qui avaient participé à l’expédition : 675 000 moutons et chèvres, '
  '33':
  - type: text
    content: '72 000 têtes de bovins, '
  '34':
  - type: text
    content: '61 000 ânes '
  '35':
  - type: text
    content: et 32 000 jeunes filles vierges.
  '36':
  - type: text
    content: 'La moitié revenant à ceux qui étaient allés à la guerre se montait à 337 500 moutons et chèvres, '
  '37':
  - type: text
    content: 'dont 675 revinrent comme tribut à l’Eternel ; '
  '38':
  - type: text
    content: '36 000 têtes de bovins dont un tribut de 72 pour l’Eternel ; '
  '39':
  - type: text
    content: '30 500 ânes dont 61 comme tribut pour l’Eternel ; '
  '4':
  - type: text
    content: Envoyez au combat mille hommes de chacune des tribus d’Israël.
  '40':
  - type: text
    content: 'et 16 000 personnes dont 32 comme tribut pour l’Eternel. '
  '41':
  - type: text
    content: Moïse remit le tribut pour l’Eternel au prêtre Eléazar comme l’Eternel le lui avait ordonné.
  '42':
  - type: text
    content: 'Quant à la moitié attribuée à la communauté des Israélites que Moïse avait mise à part de celle des combattants qui avaient fait la campagne, '
  '43':
  - type: text
    content: 'elle consistait en : 337 500 moutons et chèvres, '
  '44':
  - type: text
    content: '36 000 bovins, '
  '45':
  - type: text
    content: '30 500 ânes, '
  '46':
  - type: text
    content: 'et 16 000 personnes. '
  '47':
  - type: text
    content: Moïse préleva sur cette moitié une personne sur cinquante et un animal sur cinquante et il les donna aux lévites qui assurent le service du tabernacle de l’Eternel, comme l’Eternel le lui avait ordonné.
  - type: heading
    content: L’offrande volontaire de reconnaissance
  '48':
  - type: text
    content: 'Les commandants des divers corps d’armée, chefs des « milliers » et chefs des « centaines », vinrent alors '
  '49':
  - type: text
    content: 'dire à Moïse : Tes serviteurs ont fait le compte des combattants qui étaient sous nos ordres et il n’en manque pas un seul. '
  '5':
  - type: text
    content: 'On mobilisa donc mille hommes par tribu parmi les corps d’armée d’Israël, soit douze mille hommes armés pour le combat. '
  '50':
  - type: text
    content: Aussi nous apportons, comme offrande à l’Eternel, chacun ce qu’il a trouvé comme bijoux en or, chaînettes et bracelets, bagues, boucles d’oreilles et colliers, comme un rite d’expiation pour nos personnes devant l’Eternel.
  '51':
  - type: text
    content: 'Moïse et le prêtre Eléazar acceptèrent de leurs mains tous ces objets ouvragés en or. '
  '52':
  - type: text
    content: Le poids total de l’or ainsi prélevé en offrande pour l’Eternel par les chefs des « milliers » et des « centaines » fut de 184 kilogrammes
  - type: note
    content: 'En hébreu : 16 750 sicles.'
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Les hommes de la troupe prirent leur butin chacun pour son compte. '
  '54':
  - type: text
    content: Moïse et le prêtre Eléazar prirent l’or des chefs des « milliers » et des « centaines » et l’apportèrent devant l’Eternel dans la tente de la Rencontre comme mémorial pour les Israélites.
  '6':
  - type: text
    content: Moïse les envoya au combat avec Phinéas
  - type: note
    content: Qui s’était distingué par son zèle dans la lutte contre l’idolâtrie (25.7-11) et avait mis fin au fléau. Il commande en tant que chef religieux donnant les signaux prescrits.
  - type: text
    content: ', fils du prêtre Eléazar, qui portait les objets sacrés et les trompettes'
  - type: note
    content: 'sacrés: voir Ex 28.30. trompettes: voir Nb 10.9.'
  - type: text
    content: ' pour donner le signal.'
  '7':
  - type: text
    content: 'Ils marchèrent contre Madian, comme l’Eternel l’avait ordonné à Moïse, et ils tuèrent tous les hommes, '
  '8':
  - type: text
    content: 'y compris cinq rois de Madian : Evi, Réqem, Tsour'
  - type: note
    content: Père de Kozbi (25.15), chef de plusieurs familles madianites.
  - type: text
    content: ', Hour et Réba. Ils firent aussi périr par l’épée Balaam, fils de Béor. '
  '9':
  - type: text
    content: 'Ils firent prisonniers les femmes des Madianites et leurs enfants, et s’emparèrent de toutes leurs bêtes, de tous leurs troupeaux et de tous leurs biens. '
