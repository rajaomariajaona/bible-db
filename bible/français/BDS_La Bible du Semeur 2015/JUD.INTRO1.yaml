type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: L’auteur de cette courte lettre se nomme « Jude, serviteur de Jésus-Christ et frère de Jacques » (1.1). On considère généralement que ce Jacques est l’auteur de la lettre du Nouveau Testament, « le frère du Seigneur ». Ni Jacques ni Jude ne se prévalent d’ailleurs de cette parenté, ils préfèrent l’humble appellation de « serviteur de Jésus-Christ » (1.1).
  - type: text
    content: 'Une des caractéristiques du texte de Jude est sa parenté avec la deuxième lettre de Pierre : les versets 6 à 13 se retrouvent, idée et vocabulaire, en 2 Pierre 2.'
  - type: text
    content: L’objet de cette lettre est de mettre les chrétiens en garde contre ceux qui « travestissent en débauche la grâce de Dieu en reniant Jésus-Christ » (3-4) ; l’auteur donne des exemples de jugement dans l’histoire du salut (Sodome et Gomorrhe, révolte de Qoré) (5-16). Certains de ces exemples ne se trouvent pas dans les textes bibliques mais dans la littérature juive connue de ses destinataires.
  - type: text
    content: '« Mais vous, mes chers amis… » (17 et 20) continue Jude : après le sombre tableau du jugement passé et futur, Jude demande d’user d’amour envers les égarés : « ayez de la pitié ! » dit-il à deux reprises.'
  - type: text
    content: La lettre se termine par une admirable prière à la gloire de Dieu (25).
