document_id: GEN.46,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob se rend en Egypte
  - type: text
    content: 'Israël se mit en route avec tout ce qu’il possédait. Lorsqu’il arriva à Beer-Sheva, il offrit des sacrifices au Dieu de son père Isaac. '
  '10':
  - type: text
    content: 'Les fils de Siméon : Yemouel, Yamîn, Ohad, Yakîn, Tsohar et Saül, le fils de la Cananéenne. '
  '11':
  - type: text
    content: 'Les fils de Lévi : Guershôn, Qehath et Merari. '
  '12':
  - type: text
    content: 'Les fils de Juda : Er, Onân, Shéla, Pérets et Zérah. Mais Er et Onân étaient morts au pays de Canaan. Pérets avait pour fils : Hetsrôn et Hamoul. '
  '13':
  - type: text
    content: 'Les fils d’Issacar : Tola, Pouah'
  - type: note
    content: 'Selon le Pentateuque samaritain, la version syriaque et 1 Ch 7.1. Le texte hébreu traditionnel a : Pouva.'
  - type: text
    content: ', Yashoub'
  - type: note
    content: 'Selon le Pentateuque samaritain, la version syriaque et 1 Ch 7.1. Le texte hébreu traditionnel a : Yob.'
  - type: text
    content: ' et Shimrôn, '
  '14':
  - type: text
    content: 'et les fils de Zabulon : Séred, Elôn et Yahléel. '
  '15':
  - type: text
    content: 'Ce sont là les descendants que Léa donna à Jacob en Paddân-Aram. Il y avait en plus leur fille Dina. Fils et filles étaient au nombre de trente-trois personnes. '
  '16':
  - type: text
    content: 'Les fils de Gad : Tsephôn'
  - type: note
    content: 'Selon le Pentateuque samaritain, la version grecque et Nb 26.15. Le texte hébreu traditionnel a : Tsiphyôn.'
  - type: text
    content: ', Haggui, Shouni, Etsbôn, Eri, Arodi et Areéli. '
  '17':
  - type: text
    content: 'Les fils d’Aser : Yimna, Yishva, Yishvi, Beria et leur sœur Sérah ; fils de Beria : Héber et Malkiel. '
  '18':
  - type: text
    content: Ce sont là les descendants de Jacob par Zilpa, la servante que Laban avait donnée à sa fille Léa. Ils étaient au nombre de seize personnes.
  '19':
  - type: text
    content: 'Les fils de Rachel, femme de Jacob : Joseph et Benjamin. '
  '2':
  - type: text
    content: 'Et Dieu s’adressa à lui dans une vision nocturne. Il l’appela : Jacob ! Jacob !'
  - type: text
    content: – Oui, répondit-il, j’écoute.
  '20':
  - type: text
    content: Au pays d’Egypte, Joseph eut deux fils d’Asnath, fille de Poti-Phéra, prêtre d’On
  - type: note
    content: C’est-à-dire Héliopolis.
  - type: text
    content: '  : Manassé et Ephraïm. '
  '21':
  - type: text
    content: 'Les fils de Benjamin : Béla, Béker et Ashbel, Guéra, Naaman, Ehi, Rosh, Mouppim, Houppim et Ard. '
  '22':
  - type: text
    content: 'Ce sont là les descendants que Rachel donna à Jacob ; ils étaient au nombre de quatorze personnes. '
  '23':
  - type: text
    content: 'Le fils de Dan : Houshim. '
  '24':
  - type: text
    content: 'Les fils de Nephtali : Yahtséel, Gouni, Yétser et Shillem. '
  '25':
  - type: text
    content: 'Ce sont là les descendants de Jacob par Bilha, la servante que Laban avait donnée à sa fille Rachel : ils étaient au nombre de sept.'
  '26':
  - type: text
    content: 'L’ensemble des descendants de Jacob qui se rendirent avec lui en Egypte étaient au nombre de soixante-six, et il y avait en plus les femmes de ses fils. '
  '27':
  - type: text
    content: Les fils que Joseph eut en Egypte étant au nombre de deux, l’ensemble de la famille de Jacob qui s’était rendue en Egypte comptait soixante-dix personnes
  - type: note
    content: 'Selon le texte hébreu traditionnel et Ex 1.5. L’ancienne version grecque et Ac 7.14 ont : soixante-quinze.'
  - type: text
    content: .
  - type: heading
    content: L’installation dans la région de Goshen
  '28':
  - type: text
    content: 'Jacob envoya Juda au-devant de lui vers Joseph, afin qu’il le précède dans la région de Goshen. Quand ils y furent arrivés, '
  '29':
  - type: text
    content: 'Joseph attela son char et partit rendre visite à Israël, son père, en Goshen. Quand il le vit, il se jeta à son cou et pleura longuement sur son épaule. '
  '3':
  - type: text
    content: '– Je suis Dieu, le Dieu de ton père. N’aie pas peur de te rendre en Egypte, j’y ferai de toi un grand peuple. '
  '30':
  - type: text
    content: 'Puis Israël dit à Joseph : Maintenant je peux mourir, puisque je t’ai revu et que tu vis encore !'
  '31':
  - type: text
    content: 'Joseph dit à ses frères et à la famille de son père : Je vais aller prévenir le pharaon, et lui dire : « Mes frères et la famille de mon père qui habitaient le pays de Canaan sont arrivés auprès de moi. '
  '32':
  - type: text
    content: 'Ce sont des bergers ; ils élèvent des troupeaux, et ils ont amené avec eux leurs moutons, leurs chèvres et leurs bovins ainsi que tout ce qui leur appartient. » '
  '33':
  - type: text
    content: 'Quand le pharaon vous convoquera et qu’il vous demandera : « Quelles sont vos occupations ? » '
  '34':
  - type: text
    content: 'vous lui répondrez : « Tes serviteurs ont toujours élevé du bétail, depuis leur jeunesse jusqu’à ce jour – tout comme nos ancêtres. » De cette manière, il vous fera habiter dans la région de Goshen, car les bergers sont une abomination pour les Egyptiens.'
  '4':
  - type: text
    content: Moi-même je t’accompagnerai en Egypte, et moi-même aussi, je te l’assure, je t’en ferai revenir ; et c’est Joseph qui te fermera les yeux.
  '5':
  - type: text
    content: 'Jacob repartit donc de Beer-Sheva ; les fils d’Israël le firent monter avec leurs enfants et leurs femmes sur les chariots que le pharaon avait envoyés pour les transporter. '
  '6':
  - type: text
    content: Ils emmenèrent aussi leurs troupeaux et tous les biens qu’ils avaient acquis au pays de Canaan. Ainsi Jacob et toute sa famille arrivèrent en Egypte
  - type: note
    content: Voir Ac 7.15.
  - type: text
    content: '. '
  '7':
  - type: text
    content: Il avait avec lui ses fils et ses petits-fils, ses filles et ses petites-filles, toute sa descendance, lorsqu’il se rendit en Egypte.
  - type: heading
    content: La famille de Jacob en Egypte
  '8':
  - type: text
    content: 'Voici les noms des fils d’Israël, venus en Egypte : Jacob et ses fils, le premier-né de Jacob étant Ruben, '
  '9':
  - type: text
    content: 'les fils de Ruben : Hénok, Pallou, Hetsrôn et Karmi. '
