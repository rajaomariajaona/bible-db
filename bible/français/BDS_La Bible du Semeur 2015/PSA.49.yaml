document_id: PSA.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un linceul n’a pas de poches
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Un psaume des Qoréites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42.1'
        metadata:
          usfm: PSA.42.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O vous, tous les peuples, ╵écoutez ceci !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Habitants du monde, ╵prêtez attention,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: vous, gens d’humble condition ╵et vous, gens de haute condition,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous, les hommes riches ╵comme vous les pauvres !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De ma bouche sortent ╵des paroles sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon cœur médite ╵des propos sensés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon oreille écoute ╵des proverbes sages.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au son de la lyre, ╵je vais révéler ╵le sens d’une énigme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pourquoi donc craindrais-je, ╵aux jours du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je suis environné ╵des méfaits des fourbes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils ont foi en leur fortune
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils tirent vanité ╵de leurs immenses richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aucun homme, cependant, ╵ne peut racheter un autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun ne saurait payer ╵à Dieu sa propre rançon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car le rachat de leur vie ╵est bien trop coûteux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur faut, à tout jamais, ╵en abandonner l’idée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vivront-ils toujours ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eviteront-ils la fosse ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On voit bien mourir le sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le sot et l’insensé ╵vont périr également,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en laissant leurs biens à d’autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cependant, ils s’imaginent ╵que leurs maisons vont durer ╵jusque dans l’éternité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon le texte hébreu. Les anciennes versions grecque et syriaque ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cependant leur tombe sera leur maison pour toujours, leur demeure pour des générations.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que leurs demeures ╵seront à l’abri du temps ╵pendant des générations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux qui voulaient que leurs terres ╵soient appelées de leur nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’homme le plus honoré ╵ne vit pas longtemps :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est semblable aux animaux ╵qui doivent périr
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans l’ancienne version grecque et la version syriaque, les v. 13 et 21 sont identiques.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tel est l’avenir de ceux ╵qui leur font confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui approuvent leurs discours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: telle est leur voie, leur folie, et ceux qui les suivent approuvent leurs discours.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On les pousse vers la tombe ╵comme un troupeau de moutons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la mort se repaît d’eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au matin, les hommes droits ╵vont les piétiner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loin de leur demeure, ╵au séjour des morts, ╵leur beauté s’évanouira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais Dieu me délivrera ╵du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il me prendra.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne sois donc pas alarmé ╵quand un homme s’enrichit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu vois le luxe ╵s’étaler dans sa maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car, lorsqu’il mourra, ╵il n’emportera ╵rien de ce qu’il possédait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses biens ne le suivront pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tm 6.7
        metadata:
          usfm: 1TI.6.7
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pendant sa vie il pouvait ╵se dire béni
- type: usfm
  marker: q1
  children:
  - type: text
    text: – et les gens vous louent ╵lorsque tout va bien pour vous – ,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: il lui faudra bien rejoindre ╵ses ancêtres décédés
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui, jamais plus, ne verront ╵briller la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’homme le plus honoré, ╵s’il n’a pas d’intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est semblable aux animaux ╵qui doivent périr.
