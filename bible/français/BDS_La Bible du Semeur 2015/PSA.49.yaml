document_id: PSA.49,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un linceul n’a pas de poches
  - type: text
    content: Au chef de chœur. Un psaume des Qoréites
  - type: note
    content: Voir note 42.1.
  - type: text
    content: .
  '10':
  - type: text
    content: Vivront-ils toujours ?
  - type: text
    content: Eviteront-ils la fosse ?
  '11':
  - type: text
    content: On voit bien mourir le sage,
  - type: text
    content: et le sot et l’insensé ╵vont périr également,
  - type: text
    content: en laissant leurs biens à d’autres.
  '12':
  - type: text
    content: Cependant, ils s’imaginent ╵que leurs maisons vont durer ╵jusque dans l’éternité
  - type: note
    content: 'Selon le texte hébreu. Les anciennes versions grecque et syriaque ont : cependant leur tombe sera leur maison pour toujours, leur demeure pour des générations.'
  - type: text
    content: et que leurs demeures ╵seront à l’abri du temps ╵pendant des générations,
  - type: text
    content: eux qui voulaient que leurs terres ╵soient appelées de leur nom.
  '13':
  - type: text
    content: 'L’homme le plus honoré ╵ne vit pas longtemps :'
  - type: text
    content: car il est semblable aux animaux ╵qui doivent périr
  - type: note
    content: Dans l’ancienne version grecque et la version syriaque, les v. 13 et 21 sont identiques.
  - type: text
    content: .
  '14':
  - type: text
    content: Tel est l’avenir de ceux ╵qui leur font confiance,
  - type: text
    content: qui approuvent leurs discours
  - type: note
    content: 'Autre traduction : telle est leur voie, leur folie, et ceux qui les suivent approuvent leurs discours.'
  - type: text
    content: .
  - type: text
    content: Pause
  '15':
  - type: text
    content: On les pousse vers la tombe ╵comme un troupeau de moutons,
  - type: text
    content: et la mort se repaît d’eux.
  - type: text
    content: Au matin, les hommes droits ╵vont les piétiner.
  - type: text
    content: Loin de leur demeure, ╵au séjour des morts, ╵leur beauté s’évanouira.
  '16':
  - type: text
    content: Mais Dieu me délivrera ╵du séjour des morts,
  - type: text
    content: car il me prendra.
  - type: text
    content: Pause
  '17':
  - type: text
    content: Ne sois donc pas alarmé ╵quand un homme s’enrichit,
  - type: text
    content: quand tu vois le luxe ╵s’étaler dans sa maison.
  '18':
  - type: text
    content: 'Car, lorsqu’il mourra, ╵il n’emportera ╵rien de ce qu’il possédait :'
  - type: text
    content: ses biens ne le suivront pas
  - type: note
    content: Voir 1 Tm 6.7.
  - type: text
    content: .
  '19':
  - type: text
    content: Pendant sa vie il pouvait ╵se dire béni
  - type: text
    content: – et les gens vous louent ╵lorsque tout va bien pour vous – ,
  '2':
  - type: text
    content: O vous, tous les peuples, ╵écoutez ceci !
  - type: text
    content: Habitants du monde, ╵prêtez attention,
  '20':
  - type: text
    content: il lui faudra bien rejoindre ╵ses ancêtres décédés
  - type: text
    content: qui, jamais plus, ne verront ╵briller la lumière.
  '21':
  - type: text
    content: L’homme le plus honoré, ╵s’il n’a pas d’intelligence,
  - type: text
    content: est semblable aux animaux ╵qui doivent périr.
  '3':
  - type: text
    content: vous, gens d’humble condition ╵et vous, gens de haute condition,
  - type: text
    content: vous, les hommes riches ╵comme vous les pauvres !
  '4':
  - type: text
    content: De ma bouche sortent ╵des paroles sages,
  - type: text
    content: et mon cœur médite ╵des propos sensés.
  '5':
  - type: text
    content: Mon oreille écoute ╵des proverbes sages.
  - type: text
    content: Au son de la lyre, ╵je vais révéler ╵le sens d’une énigme.
  '6':
  - type: text
    content: Pourquoi donc craindrais-je, ╵aux jours du malheur,
  - type: text
    content: où je suis environné ╵des méfaits des fourbes ?
  '7':
  - type: text
    content: Ils ont foi en leur fortune
  - type: text
    content: et ils tirent vanité ╵de leurs immenses richesses.
  '8':
  - type: text
    content: Aucun homme, cependant, ╵ne peut racheter un autre.
  - type: text
    content: Aucun ne saurait payer ╵à Dieu sa propre rançon.
  '9':
  - type: text
    content: Car le rachat de leur vie ╵est bien trop coûteux.
  - type: text
    content: Il leur faut, à tout jamais, ╵en abandonner l’idée.
