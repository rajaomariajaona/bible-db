document_id: JAS.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Et maintenant, écoutez-moi, vous qui êtes riches. Pleurez et lamentez-vous au sujet des malheurs qui vont fondre sur vous ! '
  '10':
  - type: text
    content: Frères et sœurs, prenez comme modèles de patience persévérante dans la souffrance les prophètes qui ont parlé de la part du Seigneur.
  '11':
  - type: text
    content: Oui, nous disons bienheureux ceux qui ont tenu bon. Vous avez entendu comment Job a supporté la souffrance. Vous savez ce que le Seigneur a finalement fait en sa faveur
  - type: note
    content: 'Autre traduction : quel but le Seigneur se proposait d’atteindre. Voir Jb 1 ; 2 ; 42.'
  - type: text
    content: ', parce que le Seigneur est plein de bonté et de compassion.'
  - type: heading
    content: Une parole vraie
  '12':
  - type: text
    content: Avant tout, frères et sœurs, ne faites pas de serment, ni par le ciel, ni par la terre, ni par n’importe quoi d’autre. Que votre oui soit un vrai oui et votre non un vrai non, afin que vous ne tombiez pas sous le coup de la condamnation.
  - type: heading
    content: La prière solidaire
  '13':
  - type: text
    content: 'L’un de vous passe-t-il par la souffrance ? Qu’il prie. Un autre est-il dans la joie ? Qu’il chante des cantiques. '
  '14':
  - type: text
    content: 'L’un de vous est-il malade ? Qu’il appelle les responsables de l’Eglise, qui prieront pour lui, après lui avoir fait une onction d’huile au nom du Seigneur. '
  '15':
  - type: text
    content: La prière faite avec foi obtiendra la guérison du malade
  - type: note
    content: 'D’autres comprennent : sauvera le malade.'
  - type: text
    content: ' et le Seigneur le relèvera. S’il a commis quelque péché, il lui sera pardonné. '
  '16':
  - type: text
    content: Confessez vos péchés les uns aux autres et priez les uns pour les autres, afin que vous soyez guéris. Quand un juste prie, sa prière a une grande efficacité.
  '17':
  - type: text
    content: 'Elie était un homme tout à fait semblable à nous. Il pria avec insistance pour qu’il ne pleuve pas et, pendant trois ans et demi, il ne tomba pas de pluie sur le sol. '
  '18':
  - type: text
    content: Puis il pria de nouveau et le ciel redonna la pluie, et la terre produisit ses récoltes.
  - type: heading
    content: 'Conclusion : le retour de l’égaré'
  '19':
  - type: text
    content: 'Mes frères et sœurs, si quelqu’un parmi vous s’égare loin de la vérité, et qu’un autre l’y ramène, '
  '2':
  - type: text
    content: 'Votre richesse est pourrie et vos vêtements sont rongés par les mites. '
  '20':
  - type: text
    content: 'sachez que celui qui ramène un pécheur de la voie où il s’égarait le sauvera de la mort et '
  - type: text
    content: permettra le pardon d’un grand nombre de péchés
  - type: note
    content: Pr 10.12.
  - type: text
    content: .
  '3':
  - type: text
    content: 'Votre or et votre argent sont corrodés et cette corrosion témoignera contre vous, elle dévorera votre chair comme un feu. Vous avez entassé des richesses dans ces jours de la fin. '
  '4':
  - type: text
    content: 'Vous n’avez pas payé leur juste salaire aux ouvriers qui ont moissonné vos champs. Cette injustice crie contre vous et les clameurs des moissonneurs sont parvenues jusqu’aux oreilles du Seigneur des armées célestes. '
  '5':
  - type: text
    content: 'Vous avez vécu ici-bas dans les plaisirs et le luxe, vous vous êtes engraissés comme des animaux pour le jour où vous allez être égorgés. '
  '6':
  - type: text
    content: Vous avez condamné, vous avez assassiné des innocents
  - type: note
    content: 'Autre traduction : le Juste.'
  - type: text
    content: ', sans qu’ils vous résistent.'
  - type: heading
    content: Le courage dans l’épreuve
  '7':
  - type: text
    content: 'Frères et sœurs, patientez donc jusqu’à ce que le Seigneur vienne. Pensez au cultivateur : il attend les précieuses récoltes de sa terre. Il prend patience à leur égard, jusqu’à ce que tombent les pluies de l’automne et du printemps. '
  '8':
  - type: text
    content: Vous aussi, prenez patience, soyez pleins de courage, car la venue du Seigneur est proche.
  '9':
  - type: text
    content: 'Ne vous répandez pas en plaintes les uns contre les autres, frères et sœurs, si vous ne voulez pas être condamnés. Voici que le Juge se tient déjà devant la porte. '
