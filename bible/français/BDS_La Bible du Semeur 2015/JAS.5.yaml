document_id: JAS.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Et maintenant, écoutez-moi, vous qui êtes riches. Pleurez et lamentez-vous au sujet des malheurs qui vont fondre sur vous ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Frères et sœurs, prenez comme modèles de patience persévérante dans la souffrance les prophètes qui ont parlé de la part du Seigneur.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, nous disons bienheureux ceux qui ont tenu bon. Vous avez entendu comment Job a supporté la souffrance. Vous savez ce que le Seigneur a finalement fait en sa faveur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quel but le Seigneur se proposait d’atteindre. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jb 1 ; 2 ; 42.
      marker-yv: yv-n
    - type: text
      text: ', parce que le Seigneur est plein de bonté et de compassion.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une parole vraie
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Avant tout, frères et sœurs, ne faites pas de serment, ni par le ciel, ni par la terre, ni par n’importe quoi d’autre. Que votre oui soit un vrai oui et votre non un vrai non, afin que vous ne tombiez pas sous le coup de la condamnation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prière solidaire
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’un de vous passe-t-il par la souffrance ? Qu’il prie. Un autre est-il dans la joie ? Qu’il chante des cantiques. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’un de vous est-il malade ? Qu’il appelle les responsables de l’Eglise, qui prieront pour lui, après lui avoir fait une onction d’huile au nom du Seigneur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La prière faite avec foi obtiendra la guérison du malade
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sauvera le malade.
      marker-yv: yv-n
    - type: text
      text: ' et le Seigneur le relèvera. S’il a commis quelque péché, il lui sera pardonné. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Confessez vos péchés les uns aux autres et priez les uns pour les autres, afin que vous soyez guéris. Quand un juste prie, sa prière a une grande efficacité.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Elie était un homme tout à fait semblable à nous. Il pria avec insistance pour qu’il ne pleuve pas et, pendant trois ans et demi, il ne tomba pas de pluie sur le sol. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Puis il pria de nouveau et le ciel redonna la pluie, et la terre produisit ses récoltes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Conclusion : le retour de l’égaré'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mes frères et sœurs, si quelqu’un parmi vous s’égare loin de la vérité, et qu’un autre l’y ramène, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Votre richesse est pourrie et vos vêtements sont rongés par les mites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'sachez que celui qui ramène un pécheur de la voie où il s’égarait le sauvera de la mort et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: permettra le pardon d’un grand nombre de péchés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Pr 10.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Votre or et votre argent sont corrodés et cette corrosion témoignera contre vous, elle dévorera votre chair comme un feu. Vous avez entassé des richesses dans ces jours de la fin. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Vous n’avez pas payé leur juste salaire aux ouvriers qui ont moissonné vos champs. Cette injustice crie contre vous et les clameurs des moissonneurs sont parvenues jusqu’aux oreilles du Seigneur des armées célestes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Vous avez vécu ici-bas dans les plaisirs et le luxe, vous vous êtes engraissés comme des animaux pour le jour où vous allez être égorgés. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Vous avez condamné, vous avez assassiné des innocents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Juste.
      marker-yv: yv-n
    - type: text
      text: ', sans qu’ils vous résistent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le courage dans l’épreuve
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Frères et sœurs, patientez donc jusqu’à ce que le Seigneur vienne. Pensez au cultivateur : il attend les précieuses récoltes de sa terre. Il prend patience à leur égard, jusqu’à ce que tombent les pluies de l’automne et du printemps. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Vous aussi, prenez patience, soyez pleins de courage, car la venue du Seigneur est proche.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ne vous répandez pas en plaintes les uns contre les autres, frères et sœurs, si vous ne voulez pas être condamnés. Voici que le Juge se tient déjà devant la porte. '
