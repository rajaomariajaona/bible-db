document_id: GEN.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: « Tu auras un fils »
  - type: text
    content: 'L’Eternel apparut à Abraham près des chênes de Mamré. Abraham était assis à l’entrée de sa tente. C’était l’heure de la forte chaleur. '
  '10':
  - type: text
    content: 'Puis l’un d’eux lui dit : L’an prochain, à la même époque, je ne manquerai pas de revenir chez toi, et ta femme Sara aura un fils'
  - type: note
    content: Cité en Rm 9.9.
  - type: text
    content: .
  - type: text
    content: 'Derrière lui, à l’entrée de la tente, Sara entendit ces paroles. '
  '11':
  - type: text
    content: 'Or, Abraham et Sara étaient tous deux très âgés et Sara avait dépassé l’âge d’avoir des enfants. '
  '12':
  - type: text
    content: 'Alors Sara rit en elle-même en se disant : Maintenant, vieille comme je suis, aurais-je encore du plaisir ? Mon mari aussi est un vieillard'
  - type: note
    content: Allusion en 1 P 3.6.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Alors l’Eternel dit à Abraham : Pourquoi donc Sara a-t-elle ri en se disant : « Peut-il être vrai que j’aurai un enfant, âgée comme je suis ? » '
  '14':
  - type: text
    content: Y a-t-il quoi que ce soit de trop extraordinaire pour l’Eternel
  - type: note
    content: Voir Lc 1.37.
  - type: text
    content: '  ? L’an prochain, à l’époque où je repasserai chez toi, Sara aura un fils.'
  '15':
  - type: text
    content: 'Saisie de crainte, Sara mentit : Je n’ai pas ri, dit-elle.'
  - type: text
    content: – Si ! tu as bel et bien ri, répliqua l’Eternel.
  '16':
  - type: text
    content: Puis ces hommes se remirent en route en prenant la direction de Sodome
  - type: note
    content: Sodome se trouvait à l’emplacement actuel du sud de la mer Morte.
  - type: text
    content: . Abraham les accompagna pour prendre congé d’eux.
  '17':
  - type: text
    content: 'L’Eternel se dit alors : Cacherai-je à Abraham ce que je vais faire ? '
  '18':
  - type: text
    content: 'Il deviendra l’ancêtre d’un peuple grand et puissant et une source de bénédictions pour tous les peuples de la terre. '
  '19':
  - type: text
    content: Car je l’ai choisi pour qu’il prescrive à ses descendants et à tous les siens après lui de faire la volonté de l’Eternel, en faisant ce qui est juste et droit ; ainsi j’accomplirai les promesses que je lui ai faites.
  - type: heading
    content: Abraham prie pour Sodome
  '2':
  - type: text
    content: Il regarda et aperçut soudain trois hommes
  - type: note
    content: Abraham voit dans ces trois visiteurs des hommes (voir v. 16, 22) envers lesquels il accomplit les devoirs normaux d’hospitalité. La suite du récit parle de deux anges (19.1) et de l’Eternel (v. 10, 20, 23). Voir Hé 13.2.
  - type: text
    content: ' qui se tenaient à quelque distance de lui. Dès qu’il les vit, il courut à leur rencontre depuis l’entrée de sa tente et se prosterna jusqu’à terre.'
  '20':
  - type: text
    content: 'Alors l’Eternel dit à Abraham : De graves accusations contre Sodome et Gomorrhe sont montées jusqu’à moi : leur perversité est énorme. '
  '21':
  - type: text
    content: Je veux y descendre pour voir si leur conduite est vraiment conforme à ce que j’entends dire. Et si ce n’est pas le cas, je le saurai.
  '22':
  - type: text
    content: Là-dessus, ces hommes partirent en direction de Sodome, tandis qu’Abraham continuait à se tenir en présence de l’Eternel
  - type: note
    content: 'Selon le texte hébreu traditionnel. Une ancienne tradition scribale porte : tandis que l’Eternel continuait à se tenir devant Abraham.'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Il s’approcha et dit : Vas-tu vraiment faire périr le juste avec le coupable ? '
  '24':
  - type: text
    content: 'Peut-être y a-t-il cinquante justes dans la ville ; vas-tu aussi les faire périr ? Ne pardonneras-tu pas à la ville à cause de ces cinquante justes qui sont au milieu d’elle ? '
  '25':
  - type: text
    content: Tu ne peux pas faire cela ! Tu ne peux pas traiter de la même manière le juste et le coupable et faire mourir le juste avec le méchant ! Toi qui juges la terre entière, n’agirais-tu pas selon le droit ?
  '26':
  - type: text
    content: 'L’Eternel lui répondit : Si je trouve à Sodome cinquante justes, je pardonnerai à toute la ville à cause d’eux.'
  '27':
  - type: text
    content: 'Abraham reprit : Je ne suis que poussière et cendre, et pourtant j’ai osé parler à mon Seigneur. '
  '28':
  - type: text
    content: Peut-être que des cinquante justes, il en manquera cinq. A cause de ces cinq hommes en moins, vas-tu détruire toute la ville ?
  - type: text
    content: 'Dieu répondit : Non, je ne la détruirai pas si j’y trouve quarante-cinq justes.'
  '29':
  - type: text
    content: 'Abraham reprit à nouveau la parole et dit : Peut-être ne s’y trouvera-t-il que quarante justes ?'
  - type: text
    content: 'Et Dieu dit : A cause de ces quarante, je ne la détruirai pas.'
  '3':
  - type: text
    content: '– Mes seigneurs, leur dit-il, faites-moi la faveur de ne pas passer près de chez votre serviteur sans vous arrêter ! '
  '30':
  - type: text
    content: 'Abraham poursuivit : Que mon Seigneur ne se fâche pas si j’insiste. Peut-être n’y aura-t-il que trente justes ?'
  - type: text
    content: 'Et Dieu dit : Si j’en trouve trente, je ne détruirai pas la ville.'
  '31':
  - type: text
    content: 'Abraham reprit : Voilà que j’ai osé parler à mon Seigneur. Mais peut-être s’en trouvera-t-il seulement vingt.'
  - type: text
    content: 'Et Dieu répondit : A cause de ces vingt, je ne détruirai pas la ville.'
  '32':
  - type: text
    content: 'Abraham dit : Que mon Seigneur ne se mette pas en colère, et je parlerai une dernière fois. Peut-être ne s’y trouvera-t-il que dix justes.'
  - type: text
    content: 'Et Dieu dit : A cause de ces dix, je ne détruirai pas Sodome.'
  '33':
  - type: text
    content: Quand il eut fini de s’entretenir avec Abraham, l’Eternel s’en alla et Abraham retourna chez lui.
  '4':
  - type: text
    content: 'Permettez-moi d’aller chercher un peu d’eau pour que vous vous laviez les pieds, puis vous vous reposerez là sous cet arbre. '
  '5':
  - type: text
    content: Je vous apporterai un morceau de pain et vous reprendrez des forces avant de poursuivre votre chemin puisque vous êtes passés si près de chez votre serviteur.
  - type: text
    content: 'Ils répondirent : Très bien, fais comme tu as dit !'
  '6':
  - type: text
    content: 'Abraham se dépêcha d’entrer dans sa tente et de dire à Sara : Pétris vite trois mesures'
  - type: note
    content: C’est-à-dire 12 litres.
  - type: text
    content: ' de fleur de farine, et fais-en des galettes.'
  '7':
  - type: text
    content: 'Puis il courut au troupeau et choisit un veau gras à la chair bien tendre, il l’amena à un serviteur qui se hâta de l’apprêter. '
  '8':
  - type: text
    content: Il prit du fromage et du lait avec la viande qu’il avait fait apprêter, et les apporta aux trois hommes. Abraham se tint auprès d’eux sous l’arbre pendant qu’ils mangeaient.
  '9':
  - type: text
    content: 'Ils lui demandèrent alors : Où est Sara, ta femme ?'
  - type: text
    content: – Elle est là dans la tente, leur répondit-il.
