document_id: GEN.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: « Tu auras un fils »
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel apparut à Abraham près des chênes de Mamré. Abraham était assis à l’entrée de sa tente. C’était l’heure de la forte chaleur. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis l’un d’eux lui dit : L’an prochain, à la même époque, je ne manquerai pas de revenir chez toi, et ta femme Sara aura un fils'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 9.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Derrière lui, à l’entrée de la tente, Sara entendit ces paroles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, Abraham et Sara étaient tous deux très âgés et Sara avait dépassé l’âge d’avoir des enfants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Sara rit en elle-même en se disant : Maintenant, vieille comme je suis, aurais-je encore du plaisir ? Mon mari aussi est un vieillard'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 P 3.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel dit à Abraham : Pourquoi donc Sara a-t-elle ri en se disant : « Peut-il être vrai que j’aurai un enfant, âgée comme je suis ? » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Y a-t-il quoi que ce soit de trop extraordinaire pour l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 1.37
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ? L’an prochain, à l’époque où je repasserai chez toi, Sara aura un fils.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saisie de crainte, Sara mentit : Je n’ai pas ri, dit-elle.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Si ! tu as bel et bien ri, répliqua l’Eternel.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis ces hommes se remirent en route en prenant la direction de Sodome
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sodome se trouvait à l’emplacement actuel du sud de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: . Abraham les accompagna pour prendre congé d’eux.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel se dit alors : Cacherai-je à Abraham ce que je vais faire ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il deviendra l’ancêtre d’un peuple grand et puissant et une source de bénédictions pour tous les peuples de la terre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car je l’ai choisi pour qu’il prescrive à ses descendants et à tous les siens après lui de faire la volonté de l’Eternel, en faisant ce qui est juste et droit ; ainsi j’accomplirai les promesses que je lui ai faites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham prie pour Sodome
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il regarda et aperçut soudain trois hommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Abraham voit dans ces trois visiteurs des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir v. 16, 22) envers lesquels il accomplit les devoirs normaux d’hospitalité. La suite du récit parle de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deux anges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '19.1'
        - type: text
          text: ') et de l’Eternel (v. 10, 20, 23). Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 13.2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' qui se tenaient à quelque distance de lui. Dès qu’il les vit, il courut à leur rencontre depuis l’entrée de sa tente et se prosterna jusqu’à terre.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel dit à Abraham : De graves accusations contre Sodome et Gomorrhe sont montées jusqu’à moi : leur perversité est énorme. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je veux y descendre pour voir si leur conduite est vraiment conforme à ce que j’entends dire. Et si ce n’est pas le cas, je le saurai.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là-dessus, ces hommes partirent en direction de Sodome, tandis qu’Abraham continuait à se tenir en présence de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Une ancienne tradition scribale porte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tandis que l’Eternel continuait à se tenir devant Abraham.
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’approcha et dit : Vas-tu vraiment faire périr le juste avec le coupable ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut-être y a-t-il cinquante justes dans la ville ; vas-tu aussi les faire périr ? Ne pardonneras-tu pas à la ville à cause de ces cinquante justes qui sont au milieu d’elle ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne peux pas faire cela ! Tu ne peux pas traiter de la même manière le juste et le coupable et faire mourir le juste avec le méchant ! Toi qui juges la terre entière, n’agirais-tu pas selon le droit ?
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel lui répondit : Si je trouve à Sodome cinquante justes, je pardonnerai à toute la ville à cause d’eux.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham reprit : Je ne suis que poussière et cendre, et pourtant j’ai osé parler à mon Seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peut-être que des cinquante justes, il en manquera cinq. A cause de ces cinq hommes en moins, vas-tu détruire toute la ville ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu répondit : Non, je ne la détruirai pas si j’y trouve quarante-cinq justes.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham reprit à nouveau la parole et dit : Peut-être ne s’y trouvera-t-il que quarante justes ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu dit : A cause de ces quarante, je ne la détruirai pas.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Mes seigneurs, leur dit-il, faites-moi la faveur de ne pas passer près de chez votre serviteur sans vous arrêter ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham poursuivit : Que mon Seigneur ne se fâche pas si j’insiste. Peut-être n’y aura-t-il que trente justes ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu dit : Si j’en trouve trente, je ne détruirai pas la ville.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham reprit : Voilà que j’ai osé parler à mon Seigneur. Mais peut-être s’en trouvera-t-il seulement vingt.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu répondit : A cause de ces vingt, je ne détruirai pas la ville.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham dit : Que mon Seigneur ne se mette pas en colère, et je parlerai une dernière fois. Peut-être ne s’y trouvera-t-il que dix justes.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu dit : A cause de ces dix, je ne détruirai pas Sodome.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il eut fini de s’entretenir avec Abraham, l’Eternel s’en alla et Abraham retourna chez lui.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Permettez-moi d’aller chercher un peu d’eau pour que vous vous laviez les pieds, puis vous vous reposerez là sous cet arbre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous apporterai un morceau de pain et vous reprendrez des forces avant de poursuivre votre chemin puisque vous êtes passés si près de chez votre serviteur.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent : Très bien, fais comme tu as dit !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham se dépêcha d’entrer dans sa tente et de dire à Sara : Pétris vite trois mesures'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire 12 litres.
      marker-yv: yv-n
    - type: text
      text: ' de fleur de farine, et fais-en des galettes.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il courut au troupeau et choisit un veau gras à la chair bien tendre, il l’amena à un serviteur qui se hâta de l’apprêter. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il prit du fromage et du lait avec la viande qu’il avait fait apprêter, et les apporta aux trois hommes. Abraham se tint auprès d’eux sous l’arbre pendant qu’ils mangeaient.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui demandèrent alors : Où est Sara, ta femme ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Elle est là dans la tente, leur répondit-il.
