document_id: ZEC.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu veut bénir son peuple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur des armées célestes m’adressa la parole en disant :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant ce temps-là, les hommes ne tiraient rien de leur travail et les bêtes ne rapportaient rien, il n’y avait aucune sécurité devant l’ennemi pour ceux qui allaient et venaient, car j’avais dressé les hommes les uns contre les autres. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, je ne veux plus agir envers ce qui reste de ce peuple comme j’ai agi autrefois, le Seigneur des armées célestes le déclare. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, je sèmerai la paix parmi vous, la vigne produira du fruit, la terre donnera ses produits, le ciel répandra la rosée et je mettrai le reste de ce peuple en possession de tous ces biens.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O peuple de Juda et peuple d’Israël : par le passé, vous avez été maudits parmi les autres peuples, mais je vous sauverai, et vous serez porteurs de bénédiction. Soyez donc sans crainte et reprenez courage.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici ce que dit le Seigneur des armées célestes : Lorsque vos pères ont excité ma colère, j’ai décidé de vous faire du mal, dit le Seigneur des armées célestes, et je ne suis pas revenu sur ma décision. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A présent, je change de ligne de conduite et je décide de faire du bien à Jérusalem et au peuple de Juda. Soyez donc sans crainte !
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que vous devez faire : Que chacun dise la vérité à son prochain'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ep 4.25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ; rendez une justice conforme à la vérité dans vos tribunaux, une justice qui engendre la paix. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne tramez pas du mal l’un contre l’autre dans votre cœur et ayez en horreur les faux serments. Car toutes ces choses, je les déteste, l’Eternel le déclare
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.10'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Du deuil aux réjouissances
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur des armées célestes m’adressa la parole en disant :'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur des armées célestes : Les jeûnes du quatrième, du cinquième, du septième et du dixième mois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le jeûne du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quatrième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: commémorait la première brèche dans les remparts de Jérusalem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 52.6-7
        - type: text
          text: '). Les jeûnes des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cinquième '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: septième mois
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '7.3'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5'
        - type: text
          text: ' et notes. Le jeûne du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dixième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: commémorait le début du siège de Jérusalem par les armées de Nabuchodonosor (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 25.1
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' seront changés pour le peuple de Juda en jours de réjouissance, en jours d’allégresse et de joyeuses fêtes. Mais soyez épris de vérité et de paix.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : J’éprouve pour Sion un amour ardent et passionné, oui, je brûle pour elle d’une passion brûlante.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur des armées célestes : Des gens des autres peuples et les habitants de villes nombreuses vont encore venir. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants d’une ville iront dans une autre et s’inviteront en disant : « Allons, mettons-nous en route pour implorer l’Eternel, le Seigneur des armées célestes, et pour rechercher sa présence'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et pour rechercher sa présence. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et pour chercher à le connaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour rechercher sa faveur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De même au v. 22.
      marker-yv: yv-n
    - type: text
      text: '  ! Moi aussi, j’y vais ! » Et on leur répondra : « Oui, moi aussi, je veux y aller ! » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi des gens de peuples nombreux et de nations puissantes viendront rechercher la présence du Seigneur des armées célestes, à Jérusalem, et l’implorer.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur des armées célestes : En ce temps-là, dix hommes de tous les peuples parlant différentes langues s’accrocheront à un Juif par le pan de son vêtement en déclarant : « Nous voudrions aller avec vous, car nous avons appris que Dieu est avec vous. »'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit l’Eternel : Je reviens à Sion et j’habiterai au milieu de Jérusalem. Jérusalem sera appelée la Ville fidèle et la montagne du Seigneur des armées célestes, la Montagne sainte.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur des armées célestes : Il y aura de nouveau des vieillards et des femmes âgées qui s’assiéront sur les places de Jérusalem, chacun tenant son bâton en main, à cause de son grand âge. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les places de la ville seront remplies de garçons et de fillettes qui s’y ébattront.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Si ce qui reste de ce peuple pense que c’est trop extraordinaire pour ces jours-là, dois-je, moi aussi, l’estimer impossible ? – le Seigneur des armées célestes le demande.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare le Seigneur des armées célestes : Oui, je vais sauver mon peuple du pays du levant et du pays du soleil couchant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je les ramènerai, et ils habiteront dans Jérusalem, ils seront mon peuple, et moi je serai leur Dieu, la fidélité et la justice régneront.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que déclare l’Eternel, le Seigneur des armées célestes : Prenez courage ! Vous entendez en ces jours-ci les mêmes propos que ceux des prophètes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '…courage. Vous entendez… prophètes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: …courage, vous qui avez entendu les propos des prophètes.
      marker-yv: yv-n
    - type: text
      text: ' qui ont parlé à l’époque où l’on a posé les fondations du temple de l’Eternel, le Seigneur des armées célestes, pour rebâtir cet édifice.'
