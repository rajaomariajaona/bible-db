document_id: ZEC.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu veut bénir son peuple
  - type: text
    content: 'Le Seigneur des armées célestes m’adressa la parole en disant :'
  '10':
  - type: text
    content: 'Avant ce temps-là, les hommes ne tiraient rien de leur travail et les bêtes ne rapportaient rien, il n’y avait aucune sécurité devant l’ennemi pour ceux qui allaient et venaient, car j’avais dressé les hommes les uns contre les autres. '
  '11':
  - type: text
    content: 'Mais maintenant, je ne veux plus agir envers ce qui reste de ce peuple comme j’ai agi autrefois, le Seigneur des armées célestes le déclare. '
  '12':
  - type: text
    content: En effet, je sèmerai la paix parmi vous, la vigne produira du fruit, la terre donnera ses produits, le ciel répandra la rosée et je mettrai le reste de ce peuple en possession de tous ces biens.
  '13':
  - type: text
    content: 'O peuple de Juda et peuple d’Israël : par le passé, vous avez été maudits parmi les autres peuples, mais je vous sauverai, et vous serez porteurs de bénédiction. Soyez donc sans crainte et reprenez courage.'
  '14':
  - type: text
    content: 'Car voici ce que dit le Seigneur des armées célestes : Lorsque vos pères ont excité ma colère, j’ai décidé de vous faire du mal, dit le Seigneur des armées célestes, et je ne suis pas revenu sur ma décision. '
  '15':
  - type: text
    content: A présent, je change de ligne de conduite et je décide de faire du bien à Jérusalem et au peuple de Juda. Soyez donc sans crainte !
  '16':
  - type: text
    content: 'Voici ce que vous devez faire : Que chacun dise la vérité à son prochain'
  - type: note
    content: Cité en Ep 4.25.
  - type: text
    content: '  ; rendez une justice conforme à la vérité dans vos tribunaux, une justice qui engendre la paix. '
  '17':
  - type: text
    content: Ne tramez pas du mal l’un contre l’autre dans votre cœur et ayez en horreur les faux serments. Car toutes ces choses, je les déteste, l’Eternel le déclare
  - type: note
    content: Voir 7.10 et note.
  - type: text
    content: .
  - type: heading
    content: Du deuil aux réjouissances
  '18':
  - type: text
    content: 'Le Seigneur des armées célestes m’adressa la parole en disant :'
  '19':
  - type: text
    content: 'Voici ce que dit le Seigneur des armées célestes : Les jeûnes du quatrième, du cinquième, du septième et du dixième mois'
  - type: note
    content: 'Le jeûne du quatrième mois commémorait la première brèche dans les remparts de Jérusalem (Jr 52.6-7). Les jeûnes des cinquième et septième mois: voir 7.3, 5 et notes. Le jeûne du dixième mois commémorait le début du siège de Jérusalem par les armées de Nabuchodonosor (2 R 25.1).'
  - type: text
    content: ' seront changés pour le peuple de Juda en jours de réjouissance, en jours d’allégresse et de joyeuses fêtes. Mais soyez épris de vérité et de paix.'
  '2':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : J’éprouve pour Sion un amour ardent et passionné, oui, je brûle pour elle d’une passion brûlante.'
  '20':
  - type: text
    content: 'Voici ce que dit le Seigneur des armées célestes : Des gens des autres peuples et les habitants de villes nombreuses vont encore venir. '
  '21':
  - type: text
    content: 'Les habitants d’une ville iront dans une autre et s’inviteront en disant : « Allons, mettons-nous en route pour implorer l’Eternel, le Seigneur des armées célestes, et pour rechercher sa présence'
  - type: note
    content: 'et pour rechercher sa présence. Autres traductions : et pour chercher à le connaître ou pour rechercher sa faveur. De même au v. 22.'
  - type: text
    content: '  ! Moi aussi, j’y vais ! » Et on leur répondra : « Oui, moi aussi, je veux y aller ! » '
  '22':
  - type: text
    content: Ainsi des gens de peuples nombreux et de nations puissantes viendront rechercher la présence du Seigneur des armées célestes, à Jérusalem, et l’implorer.
  '23':
  - type: text
    content: 'Voici ce que dit le Seigneur des armées célestes : En ce temps-là, dix hommes de tous les peuples parlant différentes langues s’accrocheront à un Juif par le pan de son vêtement en déclarant : « Nous voudrions aller avec vous, car nous avons appris que Dieu est avec vous. »'
  '3':
  - type: text
    content: 'Voici ce que dit l’Eternel : Je reviens à Sion et j’habiterai au milieu de Jérusalem. Jérusalem sera appelée la Ville fidèle et la montagne du Seigneur des armées célestes, la Montagne sainte.'
  '4':
  - type: text
    content: 'Voici ce que dit le Seigneur des armées célestes : Il y aura de nouveau des vieillards et des femmes âgées qui s’assiéront sur les places de Jérusalem, chacun tenant son bâton en main, à cause de son grand âge. '
  '5':
  - type: text
    content: Les places de la ville seront remplies de garçons et de fillettes qui s’y ébattront.
  '6':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Si ce qui reste de ce peuple pense que c’est trop extraordinaire pour ces jours-là, dois-je, moi aussi, l’estimer impossible ? – le Seigneur des armées célestes le demande.'
  '7':
  - type: text
    content: 'Voici ce que déclare le Seigneur des armées célestes : Oui, je vais sauver mon peuple du pays du levant et du pays du soleil couchant. '
  '8':
  - type: text
    content: Je les ramènerai, et ils habiteront dans Jérusalem, ils seront mon peuple, et moi je serai leur Dieu, la fidélité et la justice régneront.
  '9':
  - type: text
    content: 'Voici ce que déclare l’Eternel, le Seigneur des armées célestes : Prenez courage ! Vous entendez en ces jours-ci les mêmes propos que ceux des prophètes'
  - type: note
    content: '…courage. Vous entendez… prophètes. Autre traduction : …courage, vous qui avez entendu les propos des prophètes.'
  - type: text
    content: ' qui ont parlé à l’époque où l’on a posé les fondations du temple de l’Eternel, le Seigneur des armées célestes, pour rebâtir cet édifice.'
