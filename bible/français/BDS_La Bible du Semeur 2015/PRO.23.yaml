document_id: PRO.23,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es à table avec un dirigeant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: considère bien qui tu as devant toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que tu as devant toi.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne déplace pas les anciennes bornes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n’empiète pas sur les champs des orphelins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 10-11, voir Dt 19.14 ; Pr 15.25 ; 22.28.
      marker-yv: yv-n
    - type: text
      text: ','
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont un puissant protecteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui défendrait leur cause contre toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre ton cœur à l’instruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes oreilles à l’enseignement porteur de connaissance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’hésite pas à corriger le jeune enfant ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu lui donnes des coups de bâton, il n’en mourra pas.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien plutôt, par des coups de bâton,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu le sauveras du séjour des morts.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, si tu acquiers de la sagesse, mon cœur à moi aussi s’en réjouira.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu parleras avec droiture, du fond de mon être, j’exulterai.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’envie pas le sort de ceux qui font le mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais en tout temps, crains l’Eternel.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il y aura un avenir pour toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton espérance ne sera pas déçue.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute-moi bien, mon fils, et deviens sage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois maître de la direction que tu prends.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réfrène ton appétit si tu es un glouton,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’imite pas les ivrognes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni ceux qui se gavent de viande,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’ivrogne et le gourmand tombent dans la misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui somnolent seront bientôt vêtus de haillons.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute ton père, qui t’a donné la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne méprise pas ta mère devenue âgée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acquiers la vérité, la sagesse, l’instruction et le discernement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne t’en dessaisis pas.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le père d’un juste est au comble de la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a donné la vie à un fils sage s’en réjouit.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puissent ton père et ta mère se réjouir à ton sujet !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne cette joie à celle qui t’a mis au monde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La femme immorale
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, fais-moi confiance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et apprécie la conduite que tu me vois tenir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. En suivant une ancienne tradition de scribes qui préconise l’inversion de deux lettres et les versions anciennes, on obtient le sens : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et observe ma conduite.
      marker-yv: yv-n
    - type: text
      text: ','
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la prostituée est une fosse profonde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la femme immorale un puits étroit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '5.5'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un brigand, elle se tient aux aguets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle amène bien des hommes à être infidèles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’ivrogne
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour qui les : « Hélas, malheur à moi ! » ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qui les querelles ? Pour qui les plaintes ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qui les plaies inutiles ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qui les yeux rouges ?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne te laisse pas tenter par ses bons plats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il se pourrait que ces mets soient décevants.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ceux qui s’attardent à boire du vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ceux qui sont en quête de vin parfumé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '9.2'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne couve pas de tes regards le vin vermeil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'quand il brille de son éclat dans la coupe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il descend si aisément,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais finit par mordre comme un serpent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et te piquer comme une vipère.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes yeux verront alors des choses étranges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu laisseras échapper des paroles incohérentes,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu auras l’impression d’être couché en pleine mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ballotté comme un matelot en haut d’un mât.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « On me frappe, diras-tu, mais je n’ai pas mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on m’a roué de coups, je n’ai rien senti.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand me réveillerai-je ? Il faudra que je trouve encore quelque chose à boire. »
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’épuise pas pour t’enrichir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refuse même d’y penser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aie l’intelligence de t’arrêter.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A peine as-tu fixé tes regards sur la fortune
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, déjà, elle s’est évanouie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elle se fait des ailes et s’envole comme l’aigle en plein ciel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te laisse pas inviter par quelqu’un qui te regarde d’un mauvais œil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne convoite pas ses bons plats,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car, au fond de lui, il est calculateur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Mange et bois », te dira-t-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais son cœur n’est pas avec toi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le morceau que tu as mangé, tu devras le rendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est en pure perte que tu auras tenu des propos aimables.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne parle pas à un insensé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il mépriserait le bon sens de tes paroles.
