document_id: PRO.23,21
type_code: fra
verses:
  '1':
  - type: text
    content: Si tu es à table avec un dirigeant,
  - type: text
    content: considère bien qui tu as devant toi
  - type: note
    content: 'Autre traduction : ce que tu as devant toi.'
  - type: text
    content: '  !'
  '10':
  - type: text
    content: Ne déplace pas les anciennes bornes
  - type: text
    content: et n’empiète pas sur les champs des orphelins
  - type: note
    content: Pour les v. 10-11, voir Dt 19.14 ; Pr 15.25 ; 22.28.
  - type: text
    content: ','
  '11':
  - type: text
    content: car ils ont un puissant protecteur
  - type: text
    content: qui défendrait leur cause contre toi.
  '12':
  - type: text
    content: Ouvre ton cœur à l’instruction,
  - type: text
    content: et tes oreilles à l’enseignement porteur de connaissance.
  '13':
  - type: text
    content: N’hésite pas à corriger le jeune enfant ;
  - type: text
    content: si tu lui donnes des coups de bâton, il n’en mourra pas.
  '14':
  - type: text
    content: Bien plutôt, par des coups de bâton,
  - type: text
    content: tu le sauveras du séjour des morts.
  '15':
  - type: text
    content: Mon fils, si tu acquiers de la sagesse, mon cœur à moi aussi s’en réjouira.
  '16':
  - type: text
    content: Quand tu parleras avec droiture, du fond de mon être, j’exulterai.
  '17':
  - type: text
    content: N’envie pas le sort de ceux qui font le mal
  - type: text
    content: mais en tout temps, crains l’Eternel.
  '18':
  - type: text
    content: Car il y aura un avenir pour toi
  - type: text
    content: et ton espérance ne sera pas déçue.
  '19':
  - type: text
    content: Ecoute-moi bien, mon fils, et deviens sage,
  - type: text
    content: sois maître de la direction que tu prends.
  '2':
  - type: text
    content: Réfrène ton appétit si tu es un glouton,
  '20':
  - type: text
    content: N’imite pas les ivrognes,
  - type: text
    content: ni ceux qui se gavent de viande,
  '21':
  - type: text
    content: car l’ivrogne et le gourmand tombent dans la misère,
  - type: text
    content: et ceux qui somnolent seront bientôt vêtus de haillons.
  '22':
  - type: text
    content: Ecoute ton père, qui t’a donné la vie,
  - type: text
    content: et ne méprise pas ta mère devenue âgée.
  '23':
  - type: text
    content: Acquiers la vérité, la sagesse, l’instruction et le discernement,
  - type: text
    content: et ne t’en dessaisis pas.
  '24':
  - type: text
    content: Le père d’un juste est au comble de la joie,
  - type: text
    content: qui a donné la vie à un fils sage s’en réjouit.
  '25':
  - type: text
    content: Puissent ton père et ta mère se réjouir à ton sujet !
  - type: text
    content: Donne cette joie à celle qui t’a mis au monde.
  - type: heading
    content: La femme immorale
  '26':
  - type: text
    content: Mon fils, fais-moi confiance
  - type: text
    content: et apprécie la conduite que tu me vois tenir
  - type: note
    content: 'Selon le texte hébreu traditionnel. En suivant une ancienne tradition de scribes qui préconise l’inversion de deux lettres et les versions anciennes, on obtient le sens : et observe ma conduite.'
  - type: text
    content: ','
  '27':
  - type: text
    content: car la prostituée est une fosse profonde,
  - type: text
    content: et la femme immorale un puits étroit
  - type: note
    content: Voir 5.5.
  - type: text
    content: .
  '28':
  - type: text
    content: Comme un brigand, elle se tient aux aguets
  - type: text
    content: et elle amène bien des hommes à être infidèles.
  - type: heading
    content: L’ivrogne
  '29':
  - type: text
    content: 'Pour qui les : « Hélas, malheur à moi ! » ?'
  - type: text
    content: Pour qui les querelles ? Pour qui les plaintes ?
  - type: text
    content: Pour qui les plaies inutiles ?
  - type: text
    content: Pour qui les yeux rouges ?
  '3':
  - type: text
    content: ne te laisse pas tenter par ses bons plats,
  - type: text
    content: car il se pourrait que ces mets soient décevants.
  '30':
  - type: text
    content: Pour ceux qui s’attardent à boire du vin,
  - type: text
    content: pour ceux qui sont en quête de vin parfumé
  - type: note
    content: Voir 9.2 et note.
  - type: text
    content: .
  '31':
  - type: text
    content: Ne couve pas de tes regards le vin vermeil
  - type: text
    content: 'quand il brille de son éclat dans la coupe :'
  - type: text
    content: il descend si aisément,
  '32':
  - type: text
    content: mais finit par mordre comme un serpent
  - type: text
    content: et te piquer comme une vipère.
  '33':
  - type: text
    content: Tes yeux verront alors des choses étranges
  - type: text
    content: et tu laisseras échapper des paroles incohérentes,
  '34':
  - type: text
    content: tu auras l’impression d’être couché en pleine mer,
  - type: text
    content: ballotté comme un matelot en haut d’un mât.
  '35':
  - type: text
    content: « On me frappe, diras-tu, mais je n’ai pas mal,
  - type: text
    content: on m’a roué de coups, je n’ai rien senti.
  - type: text
    content: Quand me réveillerai-je ? Il faudra que je trouve encore quelque chose à boire. »
  '4':
  - type: text
    content: Ne t’épuise pas pour t’enrichir,
  - type: text
    content: refuse même d’y penser
  - type: note
    content: 'Autre traduction : aie l’intelligence de t’arrêter.'
  - type: text
    content: '  !'
  '5':
  - type: text
    content: A peine as-tu fixé tes regards sur la fortune
  - type: text
    content: que, déjà, elle s’est évanouie,
  - type: text
    content: car elle se fait des ailes et s’envole comme l’aigle en plein ciel.
  '6':
  - type: text
    content: Ne te laisse pas inviter par quelqu’un qui te regarde d’un mauvais œil,
  - type: text
    content: et ne convoite pas ses bons plats,
  '7':
  - type: text
    content: car, au fond de lui, il est calculateur.
  - type: text
    content: « Mange et bois », te dira-t-il,
  - type: text
    content: mais son cœur n’est pas avec toi.
  '8':
  - type: text
    content: Le morceau que tu as mangé, tu devras le rendre,
  - type: text
    content: et c’est en pure perte que tu auras tenu des propos aimables.
  '9':
  - type: text
    content: Ne parle pas à un insensé,
  - type: text
    content: il mépriserait le bon sens de tes paroles.
