document_id: JOB.6
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Réponse de Job à Éliphaz
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job se sent trahi par ses amis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ah ! si mon affliction ╵pouvait être pesée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’il était possible ╵de mettre toute ma misère ╵sur les plateaux d’une balance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: assurément mon malheur ╵est plus pesant ╵que le sable des mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est pourquoi mes paroles ╵dépassent la mesure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car les flèches du Tout-Puissant ╵sont plantées dans mon être
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon esprit boit leur poison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à des flèches empoisonnées, utilisées fréquemment autrefois, et à une troupe d’assaillants.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je suis assailli ╵par les terreurs que Dieu m’envoie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un âne se met-il à braire ╵pendant qu’il broute l’herbe tendre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un bœuf se met-il à mugir ╵quand il est devant son fourrage ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un repas fade et insipide ╵se mange-t-il sans sel ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-on trouver de la saveur ╵dans le blanc d’œuf ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce qu’autrefois je refusais ╵est devenu ma nourriture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là mon pain, ╵même s’il me répugne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hébreu peu clair.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ah ! qui fera ╵aboutir ma requête !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que Dieu m’accorde ╵ce que j’espère !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que Dieu consente ╵à m’écraser !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il laisse aller sa main ╵et me détruise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’aurai du moins un réconfort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je tressaillirai de joie ╵au sein de tourments implacables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je n’aurai trahi ╵aucun des ordres du Dieu saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pourquoi espérerais-je ╵quand je n’ai plus de force ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A quoi bon vivre encore ╵vu la fin qui m’attend ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Du roc ai-je la résistance ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon corps est-il de bronze ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et puiserai-je encore en moi ╵des ressources pour m’en sortir ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute aide m’est ôtée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’homme désespéré ╵a droit à de la compassion ╵de la part d’un ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, même s’il cessait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sinon il cessera.
    marker-yv: yv-n
  - type: text
    text: ' de craindre ╵le Tout-Puissant.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mes amis m’ont trahi ╵comme un torrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un de ces cours d’eau ╵dont le lit est à sec.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsque la glace fond ╵et que les neiges ╵s’engloutissent en eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils charrient des eaux troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais à la saison sèche, ╵leurs cours tarissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand viennent les chaleurs, ╵ils s’éteignent sur place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pour eux, les caravanes ╵dévient de leur chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles vont s’enfoncer ╵loin dans les solitudes, ╵et elles y périssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les caravanes de Téma
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tribu du nord de l’Arabie qui se livrait au commerce par caravanes (Gn 25.15 ; Es 21.14 ; Jr 25.23 ; 1 Ch 1.30).
    marker-yv: yv-n
  - type: text
    text: ' ╵les cherchent du regard,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les convois de Saba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.15'
        metadata:
          usfm: JOB.1.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ╵comptent sur eux.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais ils sont pleins de honte ╵d’avoir mis leur espoir en eux :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: arrivés jusqu’à eux ╵ils étaient tout penauds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est là ce que vous êtes ╵pour moi en ce moment :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: en voyant mon malheur, ╵vous êtes pris de peur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et pourquoi donc ? ╵Vous ai-je dit : ╵« Donnez-moi de vos biens'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de votre fortune, ╵payez une rançon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: pour me faire échapper ╵aux mains de l’adversaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour me délivrer ╵du pouvoir des tyrans » ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Faites-le-moi savoir ╵et moi je me tairai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En quoi ai-je failli ? ╵Faites-le-moi comprendre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ah ! Combien seraient efficaces ╵des discours équitables !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais à quoi servent vos critiques ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avez-vous l’intention ╵de blâmer de simples paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des mots jetés au vent ╵par un désespéré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et de jeter au vent les propos d’un désespéré.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Sur un orphelin même, ╵vous iriez vous ruer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et feriez bon marché ╵de votre ami intime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais, veuillez cependant ╵me regarder en face :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous mentirais-je effrontément ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Revenez en arrière, ╵ne soyez pas perfides.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, revenez encore, ╵car c’est mon innocence ╵qui est en cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Y a-t-il dans ma bouche ╵de la perversité ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon palais ne sait-il ╵plus discerner le mal ?
