document_id: JOB.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: Job se sent trahi par ses amis
  - type: text
    content: 'Job prit la parole et dit :'
  '10':
  - type: text
    content: J’aurai du moins un réconfort,
  - type: text
    content: et je tressaillirai de joie ╵au sein de tourments implacables,
  - type: text
    content: car je n’aurai trahi ╵aucun des ordres du Dieu saint.
  '11':
  - type: text
    content: Pourquoi espérerais-je ╵quand je n’ai plus de force ?
  - type: text
    content: A quoi bon vivre encore ╵vu la fin qui m’attend ?
  '12':
  - type: text
    content: Du roc ai-je la résistance ?
  - type: text
    content: Mon corps est-il de bronze ?
  '13':
  - type: text
    content: Et puiserai-je encore en moi ╵des ressources pour m’en sortir ?
  - type: text
    content: Toute aide m’est ôtée.
  '14':
  - type: text
    content: L’homme désespéré ╵a droit à de la compassion ╵de la part d’un ami,
  - type: text
    content: oui, même s’il cessait
  - type: note
    content: 'Autre traduction : sinon il cessera.'
  - type: text
    content: ' de craindre ╵le Tout-Puissant.'
  '15':
  - type: text
    content: Mes amis m’ont trahi ╵comme un torrent,
  - type: text
    content: comme un de ces cours d’eau ╵dont le lit est à sec.
  '16':
  - type: text
    content: Lorsque la glace fond ╵et que les neiges ╵s’engloutissent en eux,
  - type: text
    content: ils charrient des eaux troubles.
  '17':
  - type: text
    content: Mais à la saison sèche, ╵leurs cours tarissent.
  - type: text
    content: Quand viennent les chaleurs, ╵ils s’éteignent sur place.
  '18':
  - type: text
    content: Pour eux, les caravanes ╵dévient de leur chemin,
  - type: text
    content: elles vont s’enfoncer ╵loin dans les solitudes, ╵et elles y périssent.
  '19':
  - type: text
    content: Les caravanes de Téma
  - type: note
    content: Tribu du nord de l’Arabie qui se livrait au commerce par caravanes (Gn 25.15 ; Es 21.14 ; Jr 25.23 ; 1 Ch 1.30).
  - type: text
    content: ' ╵les cherchent du regard,'
  - type: text
    content: les convois de Saba
  - type: note
    content: Voir note 1.15.
  - type: text
    content: ' ╵comptent sur eux.'
  '2':
  - type: text
    content: Ah ! si mon affliction ╵pouvait être pesée
  - type: text
    content: et s’il était possible ╵de mettre toute ma misère ╵sur les plateaux d’une balance,
  '20':
  - type: text
    content: 'Mais ils sont pleins de honte ╵d’avoir mis leur espoir en eux :'
  - type: text
    content: arrivés jusqu’à eux ╵ils étaient tout penauds.
  '21':
  - type: text
    content: 'C’est là ce que vous êtes ╵pour moi en ce moment :'
  - type: text
    content: en voyant mon malheur, ╵vous êtes pris de peur !
  '22':
  - type: text
    content: 'Et pourquoi donc ? ╵Vous ai-je dit : ╵« Donnez-moi de vos biens'
  - type: text
    content: et, de votre fortune, ╵payez une rançon,
  '23':
  - type: text
    content: pour me faire échapper ╵aux mains de l’adversaire
  - type: text
    content: et pour me délivrer ╵du pouvoir des tyrans » ?
  '24':
  - type: text
    content: Faites-le-moi savoir ╵et moi je me tairai.
  - type: text
    content: En quoi ai-je failli ? ╵Faites-le-moi comprendre !
  '25':
  - type: text
    content: Ah ! Combien seraient efficaces ╵des discours équitables !
  - type: text
    content: Mais à quoi servent vos critiques ?
  '26':
  - type: text
    content: Avez-vous l’intention ╵de blâmer de simples paroles,
  - type: text
    content: des mots jetés au vent ╵par un désespéré
  - type: note
    content: 'Autre traduction : et de jeter au vent les propos d’un désespéré.'
  - type: text
    content: '  ?'
  '27':
  - type: text
    content: Sur un orphelin même, ╵vous iriez vous ruer
  - type: text
    content: et feriez bon marché ╵de votre ami intime.
  '28':
  - type: text
    content: 'Mais, veuillez cependant ╵me regarder en face :'
  - type: text
    content: vous mentirais-je effrontément ?
  '29':
  - type: text
    content: Revenez en arrière, ╵ne soyez pas perfides.
  - type: text
    content: Oui, revenez encore, ╵car c’est mon innocence ╵qui est en cause.
  '3':
  - type: text
    content: assurément mon malheur ╵est plus pesant ╵que le sable des mers,
  - type: text
    content: c’est pourquoi mes paroles ╵dépassent la mesure.
  '30':
  - type: text
    content: Y a-t-il dans ma bouche ╵de la perversité ?
  - type: text
    content: Mon palais ne sait-il ╵plus discerner le mal ?
  '4':
  - type: text
    content: Car les flèches du Tout-Puissant ╵sont plantées dans mon être
  - type: text
    content: et mon esprit boit leur poison
  - type: note
    content: Allusion à des flèches empoisonnées, utilisées fréquemment autrefois, et à une troupe d’assaillants.
  - type: text
    content: ','
  - type: text
    content: oui, je suis assailli ╵par les terreurs que Dieu m’envoie.
  '5':
  - type: text
    content: Un âne se met-il à braire ╵pendant qu’il broute l’herbe tendre ?
  - type: text
    content: Un bœuf se met-il à mugir ╵quand il est devant son fourrage ?
  '6':
  - type: text
    content: Un repas fade et insipide ╵se mange-t-il sans sel ?
  - type: text
    content: Peut-on trouver de la saveur ╵dans le blanc d’œuf ?
  '7':
  - type: text
    content: Ce qu’autrefois je refusais ╵est devenu ma nourriture.
  - type: text
    content: C’est là mon pain, ╵même s’il me répugne
  - type: note
    content: Hébreu peu clair.
  - type: text
    content: .
  '8':
  - type: text
    content: Ah ! qui fera ╵aboutir ma requête !
  - type: text
    content: Que Dieu m’accorde ╵ce que j’espère !
  '9':
  - type: text
    content: Que Dieu consente ╵à m’écraser !
  - type: text
    content: Qu’il laisse aller sa main ╵et me détruise.
