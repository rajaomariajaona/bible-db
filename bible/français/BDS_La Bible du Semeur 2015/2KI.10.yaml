document_id: 2KI.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’extermination de la famille d’Achab
  - type: text
    content: Soixante-dix princes descendant d’Achab vivaient à Samarie
  - type: note
    content: Capitale du royaume du Nord depuis Omri (1 R 16.24).
  - type: text
    content: . Jéhu écrivit des lettres qu’il fit envoyer à Samarie, aux chefs militaires de Jizréel
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et la Vulgate ont : la ville.'
  - type: text
    content: ', aux responsables, aux chefs de la ville et aux précepteurs chargés d’élever les descendants d’Achab. Dans ces lettres, il disait : '
  '10':
  - type: text
    content: 'Reconnaissez donc qu’aucune des paroles que l’Eternel a prononcées contre la maison d’Achab ne restera sans effet : l’Eternel a accompli ce qu’il avait annoncé par l’intermédiaire de son serviteur Elie'
  - type: note
    content: Voir 1 R 21.20-24, 29.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Jéhu tua encore tous ceux qui restaient de la maison d’Achab à Jizréel, il fit mettre à mort tous ses grands, ses familiers et ses prêtres sans en laisser survivre aucun. '
  '12':
  - type: text
    content: Puis il partit et rentra à Samarie.
  - type: text
    content: 'En chemin, à Beth-Eqed-des-Bergers, '
  '13':
  - type: text
    content: 'il rencontra des proches parents d’Ahazia, l’ancien roi de Juda. Il leur demanda : Qui êtes-vous ?'
  - type: text
    content: – Nous sommes des parents d’Ahazia, lui répondirent-ils, et nous allons saluer les fils du roi et la reine.
  '14':
  - type: text
    content: 'Alors Jéhu ordonna : Saisissez-les vivants !'
  - type: text
    content: On les saisit et on les égorgea pour les jeter dans la citerne de Beth-Eqed. Ils étaient au nombre de quarante-deux et Jéhu n’en épargna aucun.
  '15':
  - type: text
    content: Jéhu partit de là et rencontra Yonadab, fils de Rékab
  - type: note
    content: Les Rékabites, descendants de Rékab, existaient encore au temps de Jérémie (Jr 35.6, 8). Ils se caractérisaient par un zèle ardent pour l’Eternel et l’attachement à la vie nomade. Ils descendaient des Qéniens dont Jéthro, le beau-père de Moïse, avait fait partie (1 Ch 2.55  ; cf. Jg 4.11).
  - type: text
    content: ', qui venait à sa rencontre. Il le salua et lui demanda : Es-tu aussi loyal envers moi que je le suis envers toi ?'
  - type: text
    content: 'Yonadab répondit : Tout autant.'
  - type: text
    content: – S’il en est ainsi, répliqua Jéhu, donne-moi la main.
  - type: text
    content: Ils se serrèrent la main. Alors Jéhu le fit monter à côté de lui sur son char.
  '16':
  - type: text
    content: 'Il lui dit : Viens avec moi et tu verras avec quel zèle je combats pour l’Eternel.'
  - type: text
    content: Il l’emmena ainsi dans son char.
  '17':
  - type: text
    content: Rentré à Samarie, il mit à mort tous les survivants de la maison d’Achab jusqu’à leur entière extermination, conformément à ce que l’Eternel avait annoncé par Elie.
  - type: heading
    content: Jéhu extermine les adorateurs de Baal
  '18':
  - type: text
    content: 'Puis Jéhu convoqua toute la population. Il leur dit : Achab a un peu rendu un culte au dieu Baal ; moi, je vais l’adorer beaucoup plus. '
  '19':
  - type: text
    content: Maintenant, convoquez auprès de moi tous les prophètes de Baal, tous ses fidèles et tous ses prêtres ! Que personne ne manque, car je vais offrir un grand sacrifice à Baal. Quiconque manquera ne restera pas en vie.
  - type: text
    content: 'Jéhu agissait ainsi par ruse afin d’exterminer tous les adorateurs de Baal. '
  '2':
  - type: text
    content: 'Vous avez parmi vous les princes de la famille royale. Vous disposez d’autre part de chars, de chevaux et d’armes, vous habitez une ville fortifiée. Dès que cette lettre vous sera parvenue, '
  '20':
  - type: text
    content: 'Il ordonna : Convoquez une assemblée cultuelle en l’honneur de Baal !'
  - type: text
    content: Ce qui fut fait.
  '21':
  - type: text
    content: Jéhu envoya des messagers dans tout Israël, et tous les fidèles de Baal accoururent. Pas un ne manqua. Ils se rendirent tous au temple de Baal
  - type: note
    content: Construit par Achab (1 R 16.32).
  - type: text
    content: ', qui fut complètement rempli. '
  '22':
  - type: text
    content: 'Alors Jéhu ordonna au responsable des vêtements sacrés de sortir les vêtements pour en fournir à tous les fidèles de Baal. L’homme les leur sortit donc. '
  '23':
  - type: text
    content: 'Puis Jéhu se rendit au temple de Baal en compagnie de Yonadab, fils de Rékab. Il s’adressa aux adorateurs de Baal en leur disant : Assurez-vous bien que vous êtes entre vous et qu’il n’y a ici aucun adorateur de l’Eternel, mais seulement des adorateurs de Baal.'
  '24':
  - type: text
    content: Ensuite Jéhu et Yonadab s’apprêtèrent à offrir des sacrifices et des holocaustes.
  - type: text
    content: 'Or Jéhu avait posté à l’extérieur de la maison quatre-vingts soldats avec cette consigne : Je remets tous ces gens entre vos mains. Celui qui laissera s’échapper un seul d’entre eux le paiera de sa vie.'
  '25':
  - type: text
    content: 'Lorsqu’on eut achevé de préparer les holocaustes, Jéhu sortit et dit aux soldats et à leurs chefs : Entrez et massacrez-les ! Que personne ne sorte vivant !'
  - type: text
    content: 'Les soldats entrèrent donc, l’épée à la main et les massacrèrent, puis ils jetèrent leurs cadavres dehors. Après cela, ils revinrent à la ville où se trouvait le temple de Baal. '
  '26':
  - type: text
    content: 'Ils en sortirent les stèles sacrées et les jetèrent au feu. '
  '27':
  - type: text
    content: 'Ils renversèrent la stèle de Baal et démolirent le temple lui-même, qu’ils transformèrent en toilettes publiques qui existent encore aujourd’hui. '
  '28':
  - type: text
    content: C’est ainsi que Jéhu mit fin au culte de Baal dans le royaume d’Israël.
  - type: heading
    content: Le règne de Jéhu sur Israël
  '29':
  - type: text
    content: Toutefois, il ne se détourna pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël, c’est-à-dire que les Israélites adorèrent les veaux d’or à Béthel et à Dan
  - type: note
    content: Voir 1 R 12.28-30.
  - type: text
    content: .
  '3':
  - type: text
    content: choisissez parmi les descendants du roi celui qui vous paraît le plus qualifié et le plus juste, et installez-le sur le trône de son père ; puis combattez pour la maison de votre souverain.
  '30':
  - type: text
    content: 'L’Eternel lui fit cette promesse : Parce que tu as bien accompli ce que je considère comme juste et que tu as traité la famille d’Achab tout à fait comme je le désirais, tes descendants te succéderont sur le trône d’Israël jusqu’à la quatrième génération.'
  '31':
  - type: text
    content: 'Pourtant Jéhu n’eut pas soin d’obéir de tout son cœur à la Loi de l’Eternel, le Dieu d’Israël. Il ne se détourna pas des péchés que Jéroboam avait fait commettre à Israël. '
  '32':
  - type: text
    content: 'C’est vers cette même époque que l’Eternel commença à réduire le territoire du royaume d’Israël. Tout au long de la frontière, Hazaël, le roi de Syrie, mit les Israélites en déroute. '
  '33':
  - type: text
    content: Il occupa le pays à l’est du Jourdain, depuis Aroër situé sur le torrent de l’Arnon jusqu’à Galaad et au Basan, c’est-à-dire toute la région de Galaad et le territoire des tribus de Gad, de Ruben et de Manassé.
  '34':
  - type: text
    content: 'Les autres faits et gestes de Jéhu, toutes ses réalisations et toutes ses victoires sont cités dans le livre des Annales des rois d’Israël. '
  '35':
  - type: text
    content: 'Jéhu rejoignit ses ancêtres décédés et on l’ensevelit à Samarie. Son fils Yoahaz lui succéda sur le trône. '
  '36':
  - type: text
    content: Jéhu avait régné vingt-huit ans sur Israël à Samarie
  - type: note
    content: De 841 à 814 av. J.-C.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Quand les destinataires reçurent cette lettre, ils furent pris de panique et ils se dirent les uns aux autres : Deux rois'
  - type: note
    content: Yoram et Ahazia (9.22-28).
  - type: text
    content: ' n’ont pas pu résister à ce Jéhu. Comment pourrions-nous lui tenir tête ?'
  '5':
  - type: text
    content: 'C’est pourquoi le chef du palais royal, le commandant de la ville, les responsables et les précepteurs des fils royaux envoyèrent ce message à Jéhu : Nous sommes à ton service et nous ferons tout ce que tu nous ordonneras ; nous ne proclamerons personne roi. Agis donc comme bon te semblera.'
  '6':
  - type: text
    content: 'Jéhu leur écrivit une seconde lettre, dans laquelle il disait : Si vous êtes de mon côté et si vous voulez m’obéir, prenez les têtes de tous les descendants de votre souverain, et venez me les amener demain à la même heure à Jizréel.'
  - type: text
    content: 'Or, les soixante-dix princes descendant du roi étaient répartis chez les principaux personnages de la ville qui assuraient leur éducation. '
  '7':
  - type: text
    content: 'Quand les dirigeants reçurent la lettre, ils saisirent les soixante-dix princes et les tuèrent, puis ils entassèrent leurs têtes dans des corbeilles qu’ils firent porter à Jéhu, à Jizréel. '
  '8':
  - type: text
    content: 'Un messager vint l’informer qu’on avait apporté les têtes des princes royaux. Jéhu ordonna qu’on en fasse deux tas et qu’on les expose sur la place à l’entrée de la ville jusqu’au matin suivant. '
  '9':
  - type: text
    content: 'Le lendemain matin, il sortit et, se tenant devant tout le peuple, il dit : Vous êtes innocents. C’est moi seul qui suis responsable d’avoir comploté contre mon maître le roi Yoram et de l’avoir tué ; mais tous ceux-ci, qui les a massacrés ? '
