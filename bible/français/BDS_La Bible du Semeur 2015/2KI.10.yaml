document_id: 2KI.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’extermination de la famille d’Achab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Soixante-dix princes descendant d’Achab vivaient à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capitale du royaume du Nord depuis Omri (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16.24
        metadata:
          usfm: 1KI.16.24
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Jéhu écrivit des lettres qu’il fit envoyer à Samarie, aux chefs militaires de Jizréel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville.
    marker-yv: yv-n
  - type: text
    text: ', aux responsables, aux chefs de la ville et aux précepteurs chargés d’élever les descendants d’Achab. Dans ces lettres, il disait : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous avez parmi vous les princes de la famille royale. Vous disposez d’autre part de chars, de chevaux et d’armes, vous habitez une ville fortifiée. Dès que cette lettre vous sera parvenue, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: choisissez parmi les descendants du roi celui qui vous paraît le plus qualifié et le plus juste, et installez-le sur le trône de son père ; puis combattez pour la maison de votre souverain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand les destinataires reçurent cette lettre, ils furent pris de panique et ils se dirent les uns aux autres : Deux rois'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Yoram et Ahazia (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9.22-28
        metadata:
          usfm: 2KI.9.22+2KI.9.23+2KI.9.24+2KI.9.25+2KI.9.26+2KI.9.27+2KI.9.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' n’ont pas pu résister à ce Jéhu. Comment pourrions-nous lui tenir tête ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est pourquoi le chef du palais royal, le commandant de la ville, les responsables et les précepteurs des fils royaux envoyèrent ce message à Jéhu : Nous sommes à ton service et nous ferons tout ce que tu nous ordonneras ; nous ne proclamerons personne roi. Agis donc comme bon te semblera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jéhu leur écrivit une seconde lettre, dans laquelle il disait : Si vous êtes de mon côté et si vous voulez m’obéir, prenez les têtes de tous les descendants de votre souverain, et venez me les amener demain à la même heure à Jizréel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Or, les soixante-dix princes descendant du roi étaient répartis chez les principaux personnages de la ville qui assuraient leur éducation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand les dirigeants reçurent la lettre, ils saisirent les soixante-dix princes et les tuèrent, puis ils entassèrent leurs têtes dans des corbeilles qu’ils firent porter à Jéhu, à Jizréel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un messager vint l’informer qu’on avait apporté les têtes des princes royaux. Jéhu ordonna qu’on en fasse deux tas et qu’on les expose sur la place à l’entrée de la ville jusqu’au matin suivant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le lendemain matin, il sortit et, se tenant devant tout le peuple, il dit : Vous êtes innocents. C’est moi seul qui suis responsable d’avoir comploté contre mon maître le roi Yoram et de l’avoir tué ; mais tous ceux-ci, qui les a massacrés ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Reconnaissez donc qu’aucune des paroles que l’Eternel a prononcées contre la maison d’Achab ne restera sans effet : l’Eternel a accompli ce qu’il avait annoncé par l’intermédiaire de son serviteur Elie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 21.20-24
        metadata:
          usfm: 1KI.21.20+1KI.21.21+1KI.21.22+1KI.21.23+1KI.21.24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
        metadata:
          usfm: 1KI.21.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jéhu tua encore tous ceux qui restaient de la maison d’Achab à Jizréel, il fit mettre à mort tous ses grands, ses familiers et ses prêtres sans en laisser survivre aucun. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Puis il partit et rentra à Samarie.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En chemin, à Beth-Eqed-des-Bergers, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'il rencontra des proches parents d’Ahazia, l’ancien roi de Juda. Il leur demanda : Qui êtes-vous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Nous sommes des parents d’Ahazia, lui répondirent-ils, et nous allons saluer les fils du roi et la reine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Jéhu ordonna : Saisissez-les vivants !'
- type: usfm
  marker: p
  children:
  - type: text
    text: On les saisit et on les égorgea pour les jeter dans la citerne de Beth-Eqed. Ils étaient au nombre de quarante-deux et Jéhu n’en épargna aucun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jéhu partit de là et rencontra Yonadab, fils de Rékab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Rékabites, descendants de Rékab, existaient encore au temps de Jérémie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 35.6
        metadata:
          usfm: JER.35.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
        metadata:
          usfm: JER.35.8
      - type: text
        text: ). Ils se caractérisaient par un zèle ardent pour l’Eternel et l’attachement à la vie nomade. Ils descendaient des Qéniens dont Jéthro, le beau-père de Moïse, avait fait partie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2.55
        metadata:
          usfm: 1CH.2.55
      - type: text
        text: '  ; cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 4.11
        metadata:
          usfm: JDG.4.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', qui venait à sa rencontre. Il le salua et lui demanda : Es-tu aussi loyal envers moi que je le suis envers toi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Yonadab répondit : Tout autant.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – S’il en est ainsi, répliqua Jéhu, donne-moi la main.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils se serrèrent la main. Alors Jéhu le fit monter à côté de lui sur son char.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il lui dit : Viens avec moi et tu verras avec quel zèle je combats pour l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il l’emmena ainsi dans son char.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rentré à Samarie, il mit à mort tous les survivants de la maison d’Achab jusqu’à leur entière extermination, conformément à ce que l’Eternel avait annoncé par Elie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéhu extermine les adorateurs de Baal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis Jéhu convoqua toute la population. Il leur dit : Achab a un peu rendu un culte au dieu Baal ; moi, je vais l’adorer beaucoup plus. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Maintenant, convoquez auprès de moi tous les prophètes de Baal, tous ses fidèles et tous ses prêtres ! Que personne ne manque, car je vais offrir un grand sacrifice à Baal. Quiconque manquera ne restera pas en vie.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéhu agissait ainsi par ruse afin d’exterminer tous les adorateurs de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il ordonna : Convoquez une assemblée cultuelle en l’honneur de Baal !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ce qui fut fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jéhu envoya des messagers dans tout Israël, et tous les fidèles de Baal accoururent. Pas un ne manqua. Ils se rendirent tous au temple de Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Construit par Achab (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16.32
        metadata:
          usfm: 1KI.16.32
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', qui fut complètement rempli. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Jéhu ordonna au responsable des vêtements sacrés de sortir les vêtements pour en fournir à tous les fidèles de Baal. L’homme les leur sortit donc. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis Jéhu se rendit au temple de Baal en compagnie de Yonadab, fils de Rékab. Il s’adressa aux adorateurs de Baal en leur disant : Assurez-vous bien que vous êtes entre vous et qu’il n’y a ici aucun adorateur de l’Eternel, mais seulement des adorateurs de Baal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ensuite Jéhu et Yonadab s’apprêtèrent à offrir des sacrifices et des holocaustes.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Or Jéhu avait posté à l’extérieur de la maison quatre-vingts soldats avec cette consigne : Je remets tous ces gens entre vos mains. Celui qui laissera s’échapper un seul d’entre eux le paiera de sa vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsqu’on eut achevé de préparer les holocaustes, Jéhu sortit et dit aux soldats et à leurs chefs : Entrez et massacrez-les ! Que personne ne sorte vivant !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les soldats entrèrent donc, l’épée à la main et les massacrèrent, puis ils jetèrent leurs cadavres dehors. Après cela, ils revinrent à la ville où se trouvait le temple de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils en sortirent les stèles sacrées et les jetèrent au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils renversèrent la stèle de Baal et démolirent le temple lui-même, qu’ils transformèrent en toilettes publiques qui existent encore aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C’est ainsi que Jéhu mit fin au culte de Baal dans le royaume d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Jéhu sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Toutefois, il ne se détourna pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël, c’est-à-dire que les Israélites adorèrent les veaux d’or à Béthel et à Dan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12.28-30
        metadata:
          usfm: 1KI.12.28+1KI.12.29+1KI.12.30
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’Eternel lui fit cette promesse : Parce que tu as bien accompli ce que je considère comme juste et que tu as traité la famille d’Achab tout à fait comme je le désirais, tes descendants te succéderont sur le trône d’Israël jusqu’à la quatrième génération.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Pourtant Jéhu n’eut pas soin d’obéir de tout son cœur à la Loi de l’Eternel, le Dieu d’Israël. Il ne se détourna pas des péchés que Jéroboam avait fait commettre à Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'C’est vers cette même époque que l’Eternel commença à réduire le territoire du royaume d’Israël. Tout au long de la frontière, Hazaël, le roi de Syrie, mit les Israélites en déroute. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il occupa le pays à l’est du Jourdain, depuis Aroër situé sur le torrent de l’Arnon jusqu’à Galaad et au Basan, c’est-à-dire toute la région de Galaad et le territoire des tribus de Gad, de Ruben et de Manassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les autres faits et gestes de Jéhu, toutes ses réalisations et toutes ses victoires sont cités dans le livre des Annales des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jéhu rejoignit ses ancêtres décédés et on l’ensevelit à Samarie. Son fils Yoahaz lui succéda sur le trône. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Jéhu avait régné vingt-huit ans sur Israël à Samarie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 841 à 814 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
