document_id: 1CH.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les groupes de service des prêtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les descendants d’Aaron furent répartis en classes d’après les fils d’Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '7. Haqqots, 8. Abiya, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '9. Josué, 10. Shekanya, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '11. Eliashib, 12. Yaqim, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '13. Houppa, 14. Yéshébeab, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '15. Bilga, 16. Immer, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '17. Hézir, 18. Happitsets, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '19. Petahya, 20. Ezéchiel, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '21. Yakîn, 22. Gamoul, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 23. Delaya, 24. Maazia.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C’est selon cet ordre que les groupes prenaient leur service pour entrer dans le temple de l’Eternel, ils y accomplissaient leur tâche conformément à la règle établie par leur ancêtre Aaron, selon ce que lui avait ordonné l’Eternel, le Dieu d’Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les autres descendants de Lévi
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nadab et Abihou étaient morts avant leur père, et sans laisser de fils. Eléazar et Itamar avaient exercé les fonctions sacerdotales
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 10.1-2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Voici les noms des autres chefs de groupe familial des descendants de Lévi : Shoubaël pour les descendants d’Amram, Yéhdeya pour ceux de Shoubaël, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Yishiya pour les descendants de Rehabia, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Shelomoth pour les Yitseharites, Yahath pour les descendants de Shelomoth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les fils de Hébron : Yeriya, le premier'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D’après deux manuscrits hébreux, certains manuscrits de l’ancienne version grecque (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 23.19
        - type: text
          text: '). La plupart des manuscrits hébreux ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Benaï, Yeriya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils de Yeriya.
      marker-yv: yv-n
    - type: text
      text: ', Amaria, le deuxième, Yahaziel, le troisième, Yeqameam, le quatrième. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Shamir, pour les descendants de Michée, fils d’Ouzziel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Zacharie pour ceux de Yishiya, frère de Michée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les fils de Merari : Mahli et Moushi, et les fils de Yaaziya, son fils. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les descendants de Merari par Yaaziya, son fils : Shoham, Zakkour et Ibri. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pour Mahli : Eléazar qui n’eut pas de fils. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Pour Qish, son fils Yerahméel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Plus tard, David, assisté de Tsadoq de la lignée d’Eléazar et d’Ahimélek de la lignée d’Itamar, répartit les descendants d’Aaron en diverses classes suivant les services dont ils étaient chargés.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Les fils de Moushi : Mahli, Eder et Yerimoth. Ce sont là les descendants des lévites selon leurs groupes familiaux. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Eux aussi, comme leurs frères, les descendants d’Aaron, recoururent au tirage au sort en présence du roi David, de Tsadoq, d’Ahimélek et des chefs des groupes familiaux des prêtres et des lévites. Ainsi les groupes familiaux étaient tous sur le même plan, celui d’un aîné comme celui du plus jeune.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'On constata que les chefs étaient plus nombreux parmi les descendants d’Eléazar que parmi ceux d’Itamar. C’est pourquoi les descendants d’Eléazar furent répartis en seize chefs de groupe familial et ceux d’Itamar en huit chefs de groupe familial. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'La répartition des uns et des autres se fit par tirage au sort car il y avait des responsables du lieu saint et des responsables du service de Dieu, aussi bien parmi les descendants d’Eléazar que parmi ceux d’Itamar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le secrétaire Shemaya, fils de Netanéel de la tribu de Lévi, les inscrivit en présence du roi, des chefs, du prêtre Tsadoq, d’Ahimélek, fils d’Abiatar, et des chefs des groupes familiaux des prêtres et des lévites. On prenait alternativement un groupe familial pour Eléazar et un autre pour Itamar.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici dans quel ordre les chefs de groupe familial furent désignés par tirage au sort : 1. Yehoyarib, 2. Yedaeya, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '3. Harim, 4. Seorim, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '5. Malkiya, 6. Miyamîn, '
