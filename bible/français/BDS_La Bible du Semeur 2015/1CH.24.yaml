document_id: 1CH.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les groupes de service des prêtres
  - type: text
    content: 'Les descendants d’Aaron furent répartis en classes d’après les fils d’Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '10':
  - type: text
    content: '7. Haqqots, 8. Abiya, '
  '11':
  - type: text
    content: '9. Josué, 10. Shekanya, '
  '12':
  - type: text
    content: '11. Eliashib, 12. Yaqim, '
  '13':
  - type: text
    content: '13. Houppa, 14. Yéshébeab, '
  '14':
  - type: text
    content: '15. Bilga, 16. Immer, '
  '15':
  - type: text
    content: '17. Hézir, 18. Happitsets, '
  '16':
  - type: text
    content: '19. Petahya, 20. Ezéchiel, '
  '17':
  - type: text
    content: '21. Yakîn, 22. Gamoul, '
  '18':
  - type: text
    content: 23. Delaya, 24. Maazia.
  '19':
  - type: text
    content: C’est selon cet ordre que les groupes prenaient leur service pour entrer dans le temple de l’Eternel, ils y accomplissaient leur tâche conformément à la règle établie par leur ancêtre Aaron, selon ce que lui avait ordonné l’Eternel, le Dieu d’Israël.
  - type: heading
    content: Les autres descendants de Lévi
  '2':
  - type: text
    content: Nadab et Abihou étaient morts avant leur père, et sans laisser de fils. Eléazar et Itamar avaient exercé les fonctions sacerdotales
  - type: note
    content: Voir Lv 10.1-2.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Voici les noms des autres chefs de groupe familial des descendants de Lévi : Shoubaël pour les descendants d’Amram, Yéhdeya pour ceux de Shoubaël, '
  '21':
  - type: text
    content: 'Yishiya pour les descendants de Rehabia, '
  '22':
  - type: text
    content: 'Shelomoth pour les Yitseharites, Yahath pour les descendants de Shelomoth. '
  '23':
  - type: text
    content: 'Les fils de Hébron : Yeriya, le premier'
  - type: note
    content: 'D’après deux manuscrits hébreux, certains manuscrits de l’ancienne version grecque (1 Ch 23.19). La plupart des manuscrits hébreux ont : Benaï, Yeriya ou les fils de Yeriya.'
  - type: text
    content: ', Amaria, le deuxième, Yahaziel, le troisième, Yeqameam, le quatrième. '
  '24':
  - type: text
    content: 'Shamir, pour les descendants de Michée, fils d’Ouzziel. '
  '25':
  - type: text
    content: 'Zacharie pour ceux de Yishiya, frère de Michée. '
  '26':
  - type: text
    content: 'Les fils de Merari : Mahli et Moushi, et les fils de Yaaziya, son fils. '
  '27':
  - type: text
    content: 'Les descendants de Merari par Yaaziya, son fils : Shoham, Zakkour et Ibri. '
  '28':
  - type: text
    content: 'Pour Mahli : Eléazar qui n’eut pas de fils. '
  '29':
  - type: text
    content: 'Pour Qish, son fils Yerahméel. '
  '3':
  - type: text
    content: Plus tard, David, assisté de Tsadoq de la lignée d’Eléazar et d’Ahimélek de la lignée d’Itamar, répartit les descendants d’Aaron en diverses classes suivant les services dont ils étaient chargés.
  '30':
  - type: text
    content: 'Les fils de Moushi : Mahli, Eder et Yerimoth. Ce sont là les descendants des lévites selon leurs groupes familiaux. '
  '31':
  - type: text
    content: Eux aussi, comme leurs frères, les descendants d’Aaron, recoururent au tirage au sort en présence du roi David, de Tsadoq, d’Ahimélek et des chefs des groupes familiaux des prêtres et des lévites. Ainsi les groupes familiaux étaient tous sur le même plan, celui d’un aîné comme celui du plus jeune.
  '4':
  - type: text
    content: 'On constata que les chefs étaient plus nombreux parmi les descendants d’Eléazar que parmi ceux d’Itamar. C’est pourquoi les descendants d’Eléazar furent répartis en seize chefs de groupe familial et ceux d’Itamar en huit chefs de groupe familial. '
  '5':
  - type: text
    content: 'La répartition des uns et des autres se fit par tirage au sort car il y avait des responsables du lieu saint et des responsables du service de Dieu, aussi bien parmi les descendants d’Eléazar que parmi ceux d’Itamar. '
  '6':
  - type: text
    content: Le secrétaire Shemaya, fils de Netanéel de la tribu de Lévi, les inscrivit en présence du roi, des chefs, du prêtre Tsadoq, d’Ahimélek, fils d’Abiatar, et des chefs des groupes familiaux des prêtres et des lévites. On prenait alternativement un groupe familial pour Eléazar et un autre pour Itamar.
  '7':
  - type: text
    content: 'Voici dans quel ordre les chefs de groupe familial furent désignés par tirage au sort : 1. Yehoyarib, 2. Yedaeya, '
  '8':
  - type: text
    content: '3. Harim, 4. Seorim, '
  '9':
  - type: text
    content: '5. Malkiya, 6. Miyamîn, '
