document_id: PSA.122,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Priez pour la paix de Jérusalem
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: . De David.
  - type: text
    content: 'Je suis dans la joie ╵lorsque l’on me dit :'
  - type: text
    content: « Nous allons monter ╵à la demeure de l’Eternel. »
  '2':
  - type: text
    content: Voici que nos pas s’arrêtent
  - type: text
    content: à tes portes, ╵ô Jérusalem !
  '3':
  - type: text
    content: O Jérusalem, ╵cité bien bâtie,
  - type: text
    content: formant un tout bien uni !
  '4':
  - type: text
    content: C’est là qu’affluent les tribus, ╵les tribus de l’Eternel
  - type: text
    content: – c’est la loi en Israël –
  - type: text
    content: pour y louer l’Eternel
  - type: note
    content: Voir Dt 16.16-17.
  - type: text
    content: .
  '5':
  - type: text
    content: C’est là que sont établis les trônes
  - type: note
    content: 'Au début et à la fin du verset, il pourrait s’agir des mêmes trônes et donc d’une seule classe de personnes : les descendants de David.'
  - type: text
    content: ' ╵pour ceux qui exercent la justice,'
  - type: text
    content: les trônes pour les descendants de David.
  '6':
  - type: text
    content: 'Priez pour la paix ╵de Jérusalem :'
  - type: text
    content: oui, que ceux qui t’aiment, ╵ô Jérusalem, ╵vivent en sécurité !
  '7':
  - type: text
    content: Que la paix soit dans tes murs
  - type: text
    content: et que la sécurité ╵règne en tes palais !
  '8':
  - type: text
    content: Pour mes frères, mes amis,
  - type: text
    content: 'je me plais à dire : ╵« La paix soit chez toi ! »'
  '9':
  - type: text
    content: Pour l’amour du temple ╵de l’Eternel notre Dieu,
  - type: text
    content: je souhaite ton bien.
