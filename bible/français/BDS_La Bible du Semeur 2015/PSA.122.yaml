document_id: PSA.122,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Priez pour la paix de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis dans la joie ╵lorsque l’on me dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Nous allons monter ╵à la demeure de l’Eternel. »
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Voici que nos pas s’arrêtent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tes portes, ╵ô Jérusalem !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O Jérusalem, ╵cité bien bâtie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: formant un tout bien uni !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est là qu’affluent les tribus, ╵les tribus de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c’est la loi en Israël –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour y louer l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 16.16-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C’est là que sont établis les trônes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au début et à la fin du verset, il pourrait s’agir des mêmes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trônes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et donc d’une seule classe de personnes : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les descendants de David.
      marker-yv: yv-n
    - type: text
      text: ' ╵pour ceux qui exercent la justice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les trônes pour les descendants de David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Priez pour la paix ╵de Jérusalem :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, que ceux qui t’aiment, ╵ô Jérusalem, ╵vivent en sécurité !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que la paix soit dans tes murs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que la sécurité ╵règne en tes palais !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Pour mes frères, mes amis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je me plais à dire : ╵« La paix soit chez toi ! »'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Pour l’amour du temple ╵de l’Eternel notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je souhaite ton bien.
