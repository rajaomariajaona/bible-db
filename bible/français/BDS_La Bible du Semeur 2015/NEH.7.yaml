    content: Les dispositifs de sécurité dans Jérusalem
  - type: text
    content: Lorsque la muraille fut achevée et que j’eus posé les battants des portes, on établit dans leurs fonctions les portiers
  - type: note
    content: Chargés de la surveillance des portes du Temple en temps normal ; vu les circonstances, Néhémie leur confie aussi celle des portes de la ville pendant le jour.
  - type: text
    content: ', les musiciens et les lévites. '
