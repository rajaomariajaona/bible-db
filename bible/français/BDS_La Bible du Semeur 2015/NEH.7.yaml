    - type: text
      text: 'Ressortissants de Beth-Azmaveth : 42.'
  '29':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ressortissants de Qiryath-Yearim, de Kephira et de Beéroth : 743.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je leur donnai les consignes suivantes : Les portes de Jérusalem ne s’ouvriront pas avant que le soleil ne soit haut dans le ciel et, le soir, on fermera les battants et on les verrouillera pendant que les portiers seront encore là. De plus, les habitants de Jérusalem établiront un tour de garde, les uns ayant leur poste, et les autres surveillant les abords de leurs maisons. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ressortissants de Rama et de Guéba : 621.'
  '31':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ressortissants de Mikmas : 122.'
  '32':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ressortissants de Béthel et d’Aï : 123.'
  '33':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ressortissants de l’autre Nébo : 52.'
  '34':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Descendants de l’autre Elam : 1 254.'
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Descendants de Harim : 320.'
  '36':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Descendants de Jéricho : 345.'
  '37':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Descendants de Lod, de Hadid et d’Ono : 721.'
  '38':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Descendants de Senaa : 3 930.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Pour ce qui est des prêtres :'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Descendants de Yedaeya, de la lignée de Josué : 973.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La ville était grande et très étendue, mais la population en était peu nombreuse ; les maisons n’avaient pas été rebâties.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le registre des premiers Judéens rentrés d’exil
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Descendants d’Immer : 1 052.'
  '41':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Descendants de Pashhour : 1 247.'
  '42':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Descendants de Harim : 1 017.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Pour ce qui est des lévites :'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Descendants de Josué, de Qadmiel, du lignage de Hodva : 74.'
  '44':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Musiciens, descendants d’Asaph : 148.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Portiers, les descendants de Shalloum, d’Ather, de Talmôn, d’Aqqoub, de Hathitha et de Shobaï : 138.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Desservants du Temple : les descendants de Tsiha, de Hasoupha et de Thabbaoth, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'de Qéros, de Sia, de Padôn, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'de Lebana, de Hagaba, de Shalmaï ; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'de Hanân, de Guiddel, de Gahar, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mon Dieu me mit à cœur d’assembler les notables, les chefs et le reste du peuple pour en faire le recensement. Je découvris le registre généalogique de ceux qui étaient revenus de l’exil les premiers et j’y trouvai consigné ceci :'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'de Reaya, de Retsîn, de Neqoda, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'de Gazzam, d’Ouzza, de Paséah, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'de Bésaï, de Mehounim, de Nephousim, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'de Baqbouq, de Haqoupha, de Har-hour, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'de Batslith, de Mehida, de Harsha, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'de Barqos, de Sisera, de Thamah, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: de Netsiah et de Hathipha.
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Quant au groupe des descendants des serviteurs de Salomon, il comprenait les descendants de Sothaï, de Sophéreth, de Perida, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'de Yaala, de Darqôn, de Guiddel, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: de Shephatia, de Hatthil, de Pokéreth-Hatsebaïm et d’Amôn.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Voici la liste des hommes originaires du district de Juda, que Nabuchodonosor, roi de Babylone, avait déportés, et qui sont revenus de la captivité à Jérusalem et en Juda, chacun dans sa ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La liste qui suit se trouve déjà en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 2
        - type: text
          text: ' (voir les notes).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Total des desservants du Temple et des descendants des serviteurs de Salomon : 392.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Liste de ceux qui sont venus des villes de Tel-Mélah, de Tel-Harsha, de Keroub-Addôn et d’Immer, mais qui ne purent pas indiquer quels étaient leur groupe familial et leur ascendance, pour prouver leur origine israélite : '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'les descendants de Delaya, de Tobiya et de Neqoda : 642.'
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Et parmi les prêtres : les descendants de Hobaya, d’Haqqots et de Barzillaï. Ce dernier tenait son nom de Barzillaï, le Galaadite dont il avait épousé une fille. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Ils recherchèrent leurs registres généalogiques mais ne les trouvèrent pas. Ils furent donc disqualifiés pour l’exercice du sacerdoce, '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: et le gouverneur leur ordonna de ne pas manger des aliments consacrés jusqu’à ce qu’un prêtre ait consulté Dieu à leur sujet par l’ourim et le toummim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.65 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 28.30
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'La communauté entière de ceux qui étaient revenus de l’exil comprenait 42 360 personnes, '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: sans compter leurs 7 337 serviteurs et servantes. Parmi eux se trouvaient 245 musiciens et chanteuses. Ils avaient 736 chevaux, 245 mulets
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.67 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils avaient… mulets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ne figurent pas dans la plupart des manuscrits du texte hébreu traditionnel. Ils sont restitués d’après certains manuscrits hébreux et l’ancienne version grecque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Esd 2.66
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 435 chameaux et 6 720 ânes.
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'Plusieurs des chefs des groupes familiaux firent des dons pour la reconstruction du Temple. Le gouverneur versa au fonds des travaux 1 000 pièces d’or et donna 50 coupes et 530 tuniques sacerdotales. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils étaient revenus sous la conduite de Zorobabel, Josué, Néhémie, Azaria, Raamia, Nahamani, Mardochée, Bilshân, Mispéreth, Bigvaï, Nehoum et Baana.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici le compte des Israélites :'
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: Les chefs des groupes familiaux donnèrent au fonds des travaux 20 000 pièces d’or
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.70 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Soit environ 150 kilogrammes d’or.
      marker-yv: yv-n
    - type: text
      text: ' et 2 200 pièces d’argent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.70 '
      - type: usfm
        marker: ft
        children:
