  '2':
  - type: text
    content: Je confiai le commandement de Jérusalem à mon frère Hanani ainsi qu’à Hanania
  - type: note
    content: 'Autre traduction : Hanani, c’est-à-dire Hanania.'
  - type: text
    content: ', le gouverneur de la forteresse, car c’était un homme de confiance qui, plus que beaucoup d’autres, craignait Dieu. '
