    content: 'de Qéros, de Sia, de Padôn, '
  '48':
  - type: text
    content: 'de Lebana, de Hagaba, de Shalmaï ; '
  '49':
  - type: text
    content: 'de Hanân, de Guiddel, de Gahar, '
  '5':
  - type: text
    content: 'Mon Dieu me mit à cœur d’assembler les notables, les chefs et le reste du peuple pour en faire le recensement. Je découvris le registre généalogique de ceux qui étaient revenus de l’exil les premiers et j’y trouvai consigné ceci :'
  '50':
  - type: text
    content: 'de Reaya, de Retsîn, de Neqoda, '
  '51':
  - type: text
    content: 'de Gazzam, d’Ouzza, de Paséah, '
  '52':
  - type: text
    content: 'de Bésaï, de Mehounim, de Nephousim, '
  '53':
  - type: text
    content: 'de Baqbouq, de Haqoupha, de Har-hour, '
  '54':
  - type: text
    content: 'de Batslith, de Mehida, de Harsha, '
  '55':
  - type: text
    content: 'de Barqos, de Sisera, de Thamah, '
  '56':
  - type: text
    content: de Netsiah et de Hathipha.
  '57':
  - type: text
    content: 'Quant au groupe des descendants des serviteurs de Salomon, il comprenait les descendants de Sothaï, de Sophéreth, de Perida, '
  '58':
  - type: text
    content: 'de Yaala, de Darqôn, de Guiddel, '
  '59':
  - type: text
    content: de Shephatia, de Hatthil, de Pokéreth-Hatsebaïm et d’Amôn.
  '6':
  - type: text
    content: Voici la liste des hommes originaires du district de Juda, que Nabuchodonosor, roi de Babylone, avait déportés, et qui sont revenus de la captivité à Jérusalem et en Juda, chacun dans sa ville
  - type: note
    content: La liste qui suit se trouve déjà en Esd 2 (voir les notes).
  - type: text
    content: '. '
  '60':
  - type: text
    content: 'Total des desservants du Temple et des descendants des serviteurs de Salomon : 392.'
  '61':
  - type: text
    content: 'Liste de ceux qui sont venus des villes de Tel-Mélah, de Tel-Harsha, de Keroub-Addôn et d’Immer, mais qui ne purent pas indiquer quels étaient leur groupe familial et leur ascendance, pour prouver leur origine israélite : '
  '62':
  - type: text
    content: 'les descendants de Delaya, de Tobiya et de Neqoda : 642.'
  '63':
  - type: text
    content: 'Et parmi les prêtres : les descendants de Hobaya, d’Haqqots et de Barzillaï. Ce dernier tenait son nom de Barzillaï, le Galaadite dont il avait épousé une fille. '
  '64':
  - type: text
    content: 'Ils recherchèrent leurs registres généalogiques mais ne les trouvèrent pas. Ils furent donc disqualifiés pour l’exercice du sacerdoce, '
  '65':
  - type: text
    content: et le gouverneur leur ordonna de ne pas manger des aliments consacrés jusqu’à ce qu’un prêtre ait consulté Dieu à leur sujet par l’ourim et le toummim
  - type: note
    content: Voir Ex 28.30.
  - type: text
    content: .
  '66':
  - type: text
    content: 'La communauté entière de ceux qui étaient revenus de l’exil comprenait 42 360 personnes, '
  '67':
  - type: text
    content: sans compter leurs 7 337 serviteurs et servantes. Parmi eux se trouvaient 245 musiciens et chanteuses. Ils avaient 736 chevaux, 245 mulets
  - type: note
    content: 'Les mots : ils avaient… mulets ne figurent pas dans la plupart des manuscrits du texte hébreu traditionnel. Ils sont restitués d’après certains manuscrits hébreux et l’ancienne version grecque (voir Esd 2.66).'
  - type: text
    content: ', '
  '68':
  - type: text
    content: 435 chameaux et 6 720 ânes.
  '69':
  - type: text
    content: 'Plusieurs des chefs des groupes familiaux firent des dons pour la reconstruction du Temple. Le gouverneur versa au fonds des travaux 1 000 pièces d’or et donna 50 coupes et 530 tuniques sacerdotales. '
  '7':
  - type: text
    content: Ils étaient revenus sous la conduite de Zorobabel, Josué, Néhémie, Azaria, Raamia, Nahamani, Mardochée, Bilshân, Mispéreth, Bigvaï, Nehoum et Baana.
  - type: text
    content: 'Et voici le compte des Israélites :'
  '70':
  - type: text
    content: Les chefs des groupes familiaux donnèrent au fonds des travaux 20 000 pièces d’or
  - type: note
    content: Soit environ 150 kilogrammes d’or.
  - type: text
    content: ' et 2 200 pièces d’argent'
  - type: note
    content: Soit environ 1 500 kilogrammes.
  - type: text
    content: '. '
  '71':
  - type: text
    content: Le reste du peuple donna 20 000 pièces d’or, 2 000 pièces d’argent
  - type: note
    content: Soit environ 1 300 kilogrammes.
  - type: text
    content: ' et 67 tuniques sacerdotales. '
  '72':
  - type: text
    content: Les prêtres et les lévites, les portiers, les musiciens, les gens du peuple, les desservants du Temple, tous les Israélites s’établirent dans leurs villes d’origine
  - type: note
    content: Voir 1 Ch 9.2 ; Né 11.3.
  - type: text
    content: . Quand arriva le septième mois, les Israélites étaient installés dans leurs villes.
  '8':
  - type: text
    content: 'Descendants de Pareosh : 2 172.'
  '9':
