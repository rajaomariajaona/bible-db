document_id: NEH.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dispositifs de sécurité dans Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lorsque la muraille fut achevée et que j’eus posé les battants des portes, on établit dans leurs fonctions les portiers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Chargés de la surveillance des portes du Temple en temps normal ; vu les circonstances, Néhémie leur confie aussi celle des portes de la ville pendant le jour.
      marker-yv: yv-n
    - type: text
      text: ', les musiciens et les lévites. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Descendants d’Arah : 652.'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Descendants de Pahath-Moab, de la postérité de Josué et de Joab : 2 818.'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
