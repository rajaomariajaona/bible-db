  '3':
  - type: text
    content: 'Je leur donnai les consignes suivantes : Les portes de Jérusalem ne s’ouvriront pas avant que le soleil ne soit haut dans le ciel et, le soir, on fermera les battants et on les verrouillera pendant que les portiers seront encore là. De plus, les habitants de Jérusalem établiront un tour de garde, les uns ayant leur poste, et les autres surveillant les abords de leurs maisons. '
