document_id: DEU.31,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les derniers actes de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué, successeur de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse adressa à tout Israël le discours suivant : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur donna cet ordre : Tous les sept ans, au moment où commencera l’année de la remise des dettes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 15.1-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', lors de la fête des Cabanes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 16.13-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'quand tout Israël viendra se présenter devant l’Eternel votre Dieu dans le lieu qu’il aura choisi, vous lirez cette Loi pour tout Israël. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous rassemblerez tout le peuple, les hommes, les femmes, les enfants et les étrangers qui résident chez vous, afin qu’ils entendent la lecture de la Loi, qu’ils apprennent à craindre l’Eternel votre Dieu et à obéir à toute cette Loi en en appliquant toutes les ordonnances
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Seule fête à laquelle il est explicitement demandé aux femmes et aux enfants d’assister afin qu’ils entendent la lecture de la Loi.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi leurs enfants, qui ne la connaîtront pas encore, l’entendront aussi et apprendront à craindre l’Eternel votre Dieu, tant que vous vivrez dans le pays dont vous allez prendre possession, après avoir traversé le Jourdain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les textes-témoins contre l’infidélité
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel dit à Moïse : Voici que le moment de ta fin approche. Fais venir Josué et présentez-vous dans la tente de la Rencontre ; là, je lui donnerai mes ordres.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Josué se rendirent à la tente de la Rencontre et se tinrent à l’intérieur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, l’Eternel leur apparut dans la colonne de nuée qui se tint à l’entrée de la tente. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’adressant à Moïse, il dit : Voici, tu vas bientôt rejoindre tes ancêtres décédés. Après ta mort, ce peuple ira se prostituer avec les dieux étrangers du pays dans lequel il se rend, il m’abandonnera et violera l’alliance que j’ai conclue avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, ma colère s’enflammera contre lui en ce jour-là ; je l’abandonnerai, et je me détournerai de lui. Alors le peuple deviendra la proie d’autres peuples, beaucoup de malheurs et de grandes détresses s’abattront sur lui. Ce jour-là, les Israélites se diront : « En vérité c’est parce que notre Dieu n’est plus au milieu de nous que tous ces malheurs nous arrivent. »'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, à ce moment-là, je me détournerai totalement d’eux, à cause de tout le mal qu’ils auront commis en se tournant vers d’autres dieux.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, mettez par écrit le cantique qui suit. Toi, Moïse, tu l’apprendras aux Israélites : fais-le leur chanter afin que ce cantique me serve de témoin contre eux. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai maintenant cent vingt ans, je ne pourrai plus marcher à votre tête. L’Eternel m’a dit que je ne traverserai pas le Jourdain que voici
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 20.12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je les ferai entrer dans le pays où ruissellent le lait et le miel, que j’ai promis par serment à leurs ancêtres : ils y mangeront à satiété et vivront dans l’abondance ; alors ils se tourneront vers d’autres dieux et leur rendront un culte, ils m’irriteront et violeront mon alliance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beaucoup de malheurs et de grandes détresses s’abattront sur eux, alors ce cantique servira de témoin à charge contre eux. Car leurs descendants ne l’oublieront pas et ne cesseront pas de le chanter. Je connais, en effet, les dispositions de leur cœur dès à présent, avant même que je les fasse entrer dans le pays que je leur ai promis par serment.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce même jour, Moïse mit par écrit le cantique qui suit et l’apprit aux Israélites.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, l’Eternel donna ses ordres à Josué, fils de Noun. Il lui dit : Prends courage et tiens bon, car c’est toi qui feras entrer les Israélites dans le pays que je leur ai promis par serment ; et moi je serai avec toi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 1.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Moïse eut fini de transcrire dans un livre toutes les paroles de cette Loi dans leur intégralité, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il donna cet ordre aux lévites chargés de porter le coffre de l’alliance de l’Eternel : '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prenez ce livre de la Loi et déposez-le à côté du coffre de l’alliance de l’Eternel votre Dieu. Il y restera pour servir de témoin contre le peuple d’Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je sais que vous êtes indociles et rebelles. Si aujourd’hui, alors que je suis encore en vie au milieu de vous, vous vous révoltez contre l’Eternel, combien plus le ferez-vous après ma mort ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, rassemblez autour de moi tous les responsables de vos tribus et vos responsables, je leur communiquerai les paroles de ce cantique et je prendrai le ciel et la terre à témoin contre eux. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je sais, en effet, qu’après ma mort vous ne manquerez pas de vous corrompre et de vous détourner du chemin que je vous ai prescrit. Alors le malheur fondra sur vous dans l’avenir, parce que vous aurez fait ce que l’Eternel considère comme mal et que vous aurez provoqué sa colère par vos actes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel votre Dieu marchera lui-même devant vous. Il exterminera devant vous les peuples qui habitent là-bas, pour que vous puissiez prendre possession de leur pays ; et c’est Josué qui sera à votre tête, comme l’Eternel l’a déclaré. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse transmit donc à toute l’assemblée d’Israël le cantique suivant dans sa totalité :'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel les détruira comme il a détruit Sihôn et Og, rois des Amoréens ainsi que leur pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2.24 à 3.6 ; Nb 21.21-35.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vous donnera la victoire sur ces peuples, et vous les traiterez exactement comme je vous l’ai ordonné. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prenez courage, tenez bon ! Ne craignez rien et ne vous laissez pas effrayer par eux, car l’Eternel votre Dieu marche lui-même avec vous, il ne vous délaissera pas et ne vous abandonnera pas.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Moïse appela Josué et lui dit devant tout Israël : Prends courage, tiens bon, car c’est toi qui feras entrer ce peuple dans le pays que l’Eternel a promis par serment à leurs ancêtres de leur donner, et c’est toi qui leur en feras prendre possession'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 7-8 sont repris en Jos 1.5-7 ; 1 Ch 28.20. Cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 13.5
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel lui-même marchera devant toi, il sera avec toi, il ne te délaissera pas et il ne t’abandonnera pas. Ne crains rien et ne te laisse pas effrayer !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lecture périodique de la Loi
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse mit cette Loi par écrit et la confia aux prêtres descendants de Lévi chargés de porter le coffre de l’alliance de l’Eternel, ainsi qu’à tous les responsables d’Israël.
