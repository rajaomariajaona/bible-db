document_id: PSA.118
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Son amour est éternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Célébrez l’Eternel, ╵car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour dure à toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 100.5 ; 106.1 ; 107.1 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Proclamez-le, ╵habitants d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Oui, son amour dure à toujours ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Proclamez-le, ╵descendants d’Aaron :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Oui, son amour dure à toujours ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Proclamez-le, ╵vous tous qui craignez l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Oui, son amour dure à toujours ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Du fond de ma détresse, ╵j’ai fait appel à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m’a répondu ╵en me faisant échapper au danger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel est pour moi, ╵je n’aurai pas de crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que me feraient les hommes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13.6
        metadata:
          usfm: HEB.13.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Eternel est pour moi, ╵il vient à mon secours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je peux donc regarder en face ╵tous ceux qui me haïssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mieux vaut se réfugier ╵auprès de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de compter sur les humains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mieux vaut avoir recours ╵à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de compter ╵sur les grands de ce monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’étais encerclé de partout ╵par tous les peuples ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais grâce à l’Eternel, ╵je les ai massacrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils m’enserraient de plus en plus ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, grâce à l’Eternel, ╵je les ai massacrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils m’avaient encerclé ╵comme un essaim d’abeilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils se sont éteints ╵comme un feu de broussailles ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, grâce à l’Eternel, ╵je les ai massacrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: On
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon les anciennes versions grecque, syriaque et latine ; l’hébreu a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu.
    marker-yv: yv-n
  - type: text
    text: ' m’a violemment bousculé ╵pour me faire tomber,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l’Eternel m’a secouru.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Eternel est ma force, ╵il est le sujet de mes chants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il est le sujet de mes chants
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ma protection. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Citation du cantique de Moïse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 15.2
        metadata:
          usfm: EXO.15.2
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 12.2
        metadata:
          usfm: ISA.12.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m’a sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Des cris de joie, des cris de délivrance éclatent, ╵dans les tentes des justes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les habitations continuaient à être appelées '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tentes.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Eternel agit avec puissance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: l’Eternel lève la main pour intervenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui l’Eternel agit avec puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Non, je ne mourrai pas, ╵je resterai en vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je raconterai ╵ce que fait l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Eternel m’a châtié ╵avec sévérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais sans me livrer à la mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6.9
        metadata:
          usfm: 2CO.6.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ouvrez-moi les portes de la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que je puisse entrer ╵et louer l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est ici qu’est la porte ╵qui mène à l’Eternel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les justes passeront par elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je te célèbre ╵car tu m’as exaucé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as été mon sauveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La pierre que les constructeurs ╵ont rejetée
- type: usfm
  marker: q1
  children:
  - type: text
    text: est devenue ╵la pierre principale, ╵la pierre d’angle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La pierre de fondation que l’on place à l’angle et sur laquelle on aligne les murs (cp. Za 3.9 ; 4.7 ; 10.4). Le peuple de Dieu est comparé à un bâtiment, son roi à la pierre principale.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est bien de l’Eternel ╵que cela est venu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est un prodige à nos yeux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cité en Mt 21.42 ; Mc 12.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est là le jour ╵que l’Eternel a fait ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vivons-le dans la joie, ╵exultons d’allégresse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De grâce, ô Eternel, ╵accorde le salut
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots hébreux rendus ainsi ont été transcrits dans le grec par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hosanna, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que l’on retrouve comme une acclamation en Mt 21.9 ; Mc 11.9 ; Jn 12.13.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De grâce, ô Eternel, ╵accorde la victoire !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Oui, béni soit celui qui vient ╵au nom de l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous vous bénissons tous ╵de la maison de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Repris en Mt 21.9 ; 23.39 ; Mc 11.9 ; Lc 13.35 ; 19.38 ; Jn 12.13.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’Eternel est Dieu et il nous éclaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’hébreu renvoie à la bénédiction de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 6.25
        metadata:
          usfm: NUM.6.25
      - type: text
        text: ' (litt. « Que l’Eternel fasse briller sa face sur toi »).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entrez dans le cortège, ╵des rameaux dans les mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: allez jusqu’aux coins de l’autel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '118.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreu obscur, traduction incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'liez la victime du sacrifice avec des cordes et amenez-la jusqu’aux cornes de l’autel. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur les cornes de l’autel, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 27.2
        metadata:
          usfm: EXO.27.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu es mon Dieu, je te louerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’exalterai, ô mon Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Célébrez l’Eternel, ╵car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour dure à toujours !
