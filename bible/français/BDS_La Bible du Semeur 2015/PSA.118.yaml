document_id: PSA.118,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Son amour est éternel
  - type: text
    content: Célébrez l’Eternel, ╵car il est bon,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir 100.5 ; 106.1 ; 107.1 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
  - type: text
    content: '  !'
  '10':
  - type: text
    content: J’étais encerclé de partout ╵par tous les peuples ennemis,
  - type: text
    content: mais grâce à l’Eternel, ╵je les ai massacrés.
  '11':
  - type: text
    content: Ils m’enserraient de plus en plus ;
  - type: text
    content: mais, grâce à l’Eternel, ╵je les ai massacrés.
  '12':
  - type: text
    content: Ils m’avaient encerclé ╵comme un essaim d’abeilles,
  - type: text
    content: mais ils se sont éteints ╵comme un feu de broussailles ;
  - type: text
    content: oui, grâce à l’Eternel, ╵je les ai massacrés.
  '13':
  - type: text
    content: On
  - type: note
    content: 'Selon les anciennes versions grecque, syriaque et latine ; l’hébreu a : tu.'
  - type: text
    content: ' m’a violemment bousculé ╵pour me faire tomber,'
  - type: text
    content: mais l’Eternel m’a secouru.
  '14':
  - type: text
    content: L’Eternel est ma force, ╵il est le sujet de mes chants
  - type: note
    content: 'il est le sujet de mes chants: autre traduction : ma protection. Citation du cantique de Moïse (Ex 15.2  ; voir Es 12.2).'
  - type: text
    content: '  ;'
  - type: text
    content: il m’a sauvé.
  '15':
  - type: text
    content: Des cris de joie, des cris de délivrance éclatent, ╵dans les tentes des justes
  - type: note
    content: Les habitations continuaient à être appelées tentes.
  - type: text
    content: '  !'
  - type: text
    content: Car l’Eternel agit avec puissance,
  '16':
  - type: text
    content: l’Eternel lève la main pour intervenir,
  - type: text
    content: oui l’Eternel agit avec puissance.
  '17':
  - type: text
    content: Non, je ne mourrai pas, ╵je resterai en vie
  - type: text
    content: et je raconterai ╵ce que fait l’Eternel !
  '18':
  - type: text
    content: L’Eternel m’a châtié ╵avec sévérité,
  - type: text
    content: mais sans me livrer à la mort
  - type: note
    content: Voir 2 Co 6.9.
  - type: text
    content: .
  '19':
  - type: text
    content: Ouvrez-moi les portes de la justice
  - type: text
    content: pour que je puisse entrer ╵et louer l’Eternel.
  '2':
  - type: text
    content: 'Proclamez-le, ╵habitants d’Israël :'
  - type: text
    content: « Oui, son amour dure à toujours ! »
  '20':
  - type: text
    content: C’est ici qu’est la porte ╵qui mène à l’Eternel ;
  - type: text
    content: les justes passeront par elle.
  '21':
  - type: text
    content: Je te célèbre ╵car tu m’as exaucé,
  - type: text
    content: car tu as été mon sauveur.
  '22':
  - type: text
    content: La pierre que les constructeurs ╵ont rejetée
  - type: text
    content: est devenue ╵la pierre principale, ╵la pierre d’angle
  - type: note
    content: La pierre de fondation que l’on place à l’angle et sur laquelle on aligne les murs (cp. Za 3.9 ; 4.7 ; 10.4). Le peuple de Dieu est comparé à un bâtiment, son roi à la pierre principale.
  - type: text
    content: .
  '23':
  - type: text
    content: C’est bien de l’Eternel ╵que cela est venu,
  - type: text
    content: et c’est un prodige à nos yeux
  - type: note
    content: Cité en Mt 21.42 ; Mc 12.11.
  - type: text
    content: .
  '24':
  - type: text
    content: C’est là le jour ╵que l’Eternel a fait ;
  - type: text
    content: vivons-le dans la joie, ╵exultons d’allégresse !
  '25':
  - type: text
    content: De grâce, ô Eternel, ╵accorde le salut
  - type: note
    content: Les mots hébreux rendus ainsi ont été transcrits dans le grec par Hosanna, que l’on retrouve comme une acclamation en Mt 21.9 ; Mc 11.9 ; Jn 12.13.
  - type: text
    content: '  !'
  - type: text
    content: De grâce, ô Eternel, ╵accorde la victoire !
  '26':
  - type: text
    content: Oui, béni soit celui qui vient ╵au nom de l’Eternel !
  - type: text
    content: Nous vous bénissons tous ╵de la maison de l’Eternel
  - type: note
    content: Repris en Mt 21.9 ; 23.39 ; Mc 11.9 ; Lc 13.35 ; 19.38 ; Jn 12.13.
  - type: text
    content: '  !'
  '27':
  - type: text
    content: L’Eternel est Dieu et il nous éclaire
  - type: note
    content: L’hébreu renvoie à la bénédiction de Nb 6.25 (litt. « Que l’Eternel fasse briller sa face sur toi »).
  - type: text
    content: .
  - type: text
    content: Entrez dans le cortège, ╵des rameaux dans les mains,
  - type: text
    content: allez jusqu’aux coins de l’autel
  - type: note
    content: 'Hébreu obscur, traduction incertaine. Autre traduction : liez la victime du sacrifice avec des cordes et amenez-la jusqu’aux cornes de l’autel. Sur les cornes de l’autel, voir Ex 27.2.'
  - type: text
    content: .
  '28':
  - type: text
    content: Tu es mon Dieu, je te louerai,
  - type: text
    content: je t’exalterai, ô mon Dieu !
  '29':
  - type: text
    content: Célébrez l’Eternel, ╵car il est bon,
  - type: text
    content: car son amour dure à toujours !
  '3':
  - type: text
    content: 'Proclamez-le, ╵descendants d’Aaron :'
  - type: text
    content: « Oui, son amour dure à toujours ! »
  '4':
  - type: text
    content: 'Proclamez-le, ╵vous tous qui craignez l’Eternel :'
  - type: text
    content: « Oui, son amour dure à toujours ! »
  '5':
  - type: text
    content: Du fond de ma détresse, ╵j’ai fait appel à l’Eternel,
  - type: text
    content: et il m’a répondu ╵en me faisant échapper au danger.
  '6':
  - type: text
    content: L’Eternel est pour moi, ╵je n’aurai pas de crainte,
  - type: text
    content: que me feraient les hommes
  - type: note
    content: Cité en Hé 13.6.
  - type: text
    content: '  ?'
  '7':
  - type: text
    content: L’Eternel est pour moi, ╵il vient à mon secours.
  - type: text
    content: Je peux donc regarder en face ╵tous ceux qui me haïssent.
  '8':
  - type: text
    content: Mieux vaut se réfugier ╵auprès de l’Eternel
  - type: text
    content: que de compter sur les humains.
  '9':
  - type: text
    content: Mieux vaut avoir recours ╵à l’Eternel,
  - type: text
    content: que de compter ╵sur les grands de ce monde.
