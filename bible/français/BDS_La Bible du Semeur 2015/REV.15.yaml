document_id: REV.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le signe des sept derniers fléaux
  - type: text
    content: 'Puis je vis dans le ciel un autre signe grandiose qui me remplit d’étonnement : sept anges portant sept fléaux, les sept derniers par lesquels se manifeste la colère de Dieu. '
  '2':
  - type: text
    content: 'Je vis aussi comme une mer cristalline mêlée de feu. Ceux qui avaient vaincu la bête, son image et le nombre de son nom se tenaient sur la mer de cristal. S’accompagnant de harpes divines, '
  '3':
  - type: text
    content: ils chantaient le cantique de Moïse
  - type: note
    content: Voir Ex 15.
  - type: text
    content: ', le serviteur de Dieu, et le cantique de l’Agneau. Ils chantaient :'
  - type: text
    content: Seigneur, Dieu, Tout-Puissant,
  - type: text
    content: tes œuvres sont grandes et admirables.
  - type: text
    content: Roi de tous les peuples,
  - type: text
    content: ce que tu fais est juste
  - type: text
    content: et conforme à la vérité !
  '4':
  - type: text
    content: Qui oserait, Seigneur,
  - type: text
    content: refuser de te craindre
  - type: text
    content: et de te rendre gloire ?
  - type: text
    content: Car toi seul tu es saint ;
  - type: text
    content: tous les peuples viendront
  - type: text
    content: pour se prosterner devant toi,
  - type: text
    content: car il deviendra manifeste
  - type: text
    content: que tes actions sont justes.
  - type: heading
    content: Les sept coupes de la colère de DieuVoir Es 6.4.
  '5':
  - type: text
    content: Après cela je vis s’ouvrir dans le ciel le Temple qui abritait le tabernacle du témoignage.
  '6':
  - type: text
    content: Les sept anges porteurs des sept fléaux sortirent du Temple. Ils étaient vêtus de tuniques d’un lin pur, éclatant, et leur taille était serrée par une ceinture d’or.
  '7':
  - type: text
    content: 'L’un des quatre êtres vivants remit aux sept anges sept coupes d’or remplies de la colère du Dieu qui vit éternellement. '
  '8':
  - type: text
    content: Alors la gloire et la puissance de Dieu remplirent le Temple de fumée
  - type: note
    content: Comparer Ap 8 et 9. Les fléaux rappellent les plaies d’Egypte.
  - type: text
    content: ', en sorte que personne ne put y pénétrer tant que les sept fléaux, déclenchés par les sept anges, ne s’étaient pas accomplis.'
