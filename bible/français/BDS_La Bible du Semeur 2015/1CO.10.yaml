document_id: 1CO.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’exemple des révoltes d’Israël
  - type: text
    content: 'Car il ne faut pas que vous ignoriez ceci, frères et sœurs : après leur sortie d’Egypte, nos ancêtres ont tous marché sous la conduite de la nuée'
  - type: note
    content: Voir Ex 13.21-22.
  - type: text
    content: ', ils ont tous traversé la mer'
  - type: note
    content: La mer des Roseaux dont les eaux s’étaient écartées pour laisser passer les Israélites à pied sec (Ex 14.22-29).
  - type: text
    content: ', '
  '10':
  - type: text
    content: Ne vous plaignez pas de votre sort, comme certains d’entre eux, qui tombèrent sous les coups de l’ange exterminateur
  - type: note
    content: Voir Nb 17.6-14.
  - type: text
    content: .
  '11':
  - type: text
    content: 'Tous ces événements leur sont arrivés pour nous servir d’exemples. Ils ont été mis par écrit pour que nous en tirions instruction, nous qui sommes parvenus aux temps de la fin. '
  '12':
  - type: text
    content: C’est pourquoi, si quelqu’un se croit debout, qu’il prenne garde de ne pas tomber.
  '13':
  - type: text
    content: Les tentations qui vous ont assaillis sont communes à tous les hommes
  - type: note
    content: 'Certains comprennent : ne sont pas insurmontables par des hommes.'
  - type: text
    content: . D’ailleurs, Dieu est fidèle et il ne permettra pas que vous soyez tentés au-delà de vos forces. Au moment de la tentation, il préparera le moyen d’en sortir pour que vous puissiez y résister.
  - type: heading
    content: S’abstenir de pratiques idolâtres
  '14':
  - type: text
    content: 'Pour toutes ces raisons, chers amis, je vous en conjure : fuyez le culte des idoles.'
  '15':
  - type: text
    content: 'Je vous parle là comme à des gens raisonnables : jugez vous-mêmes de ce que je dis. '
  '16':
  - type: text
    content: La « coupe de reconnaissance »
  - type: note
    content: Voir Mt 26.26-28 et parallèles.
  - type: text
    content: ', pour laquelle nous remercions Dieu, ne signifie-t-elle pas que nous sommes au bénéfice du sacrifice de Christ qui a versé son sang pour nous ? Et le pain que nous rompons, ne signifie-t-il pas que nous sommes au bénéfice du corps de Christ offert pour nous ? '
  '17':
  - type: text
    content: Comme il n’y a qu’un seul pain, nous tous, malgré notre grand nombre, nous ne formons qu’un seul corps, puisque nous partageons entre tous ce pain unique.
  '18':
  - type: text
    content: 'Pensez à ce qui se passe dans le peuple d’Israël, j’entends Israël au sens national : ceux qui mangent les victimes offertes en sacrifice ne sont-ils pas au bénéfice du sacrifice offert sur l’autel'
  - type: note
    content: Voir Lv 6.11 ; 7.6, 15.
  - type: text
    content: '  ?'
  '19':
  - type: text
    content: 'Cela signifierait-il qu’une viande, parce qu’elle est sacrifiée à une idole, prend une valeur particulière ? Ou que l’idole ait quelque réalité ? Certainement pas ! '
  '2':
  - type: text
    content: ils ont donc tous, en quelque sorte, été baptisés « pour Moïse
  - type: note
    content: 'C’est-à-dire pour suivre Moïse. Autre traduction : en Moïse.'
  - type: text
    content: '  » dans la nuée et dans la mer. '
  '20':
  - type: text
    content: 'Mais je dis que les sacrifices des païens sont offerts à des démons et à '
  - type: text
    content: ce qui n’est pas Dieu
  - type: note
    content: Dt 32.17 cité selon l’ancienne version grecque.
  - type: text
    content: . Or, je ne veux pas que vous ayez quoi que ce soit de commun avec les démons
  - type: note
    content: Participer à un banquet religieux impliquait d’être en communion avec la divinité à laquelle le temple était consacré. Or, l’apôtre dit que derrière ces divinités se cachent des démons.
  - type: text
    content: .
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Vous ne pouvez boire à la coupe du Seigneur et en même temps à celle des démons. Vous ne pouvez pas manger à la table du Seigneur et à celle des démons. '
  '22':
  - type: text
    content: Ou bien, voulons-nous provoquer le Seigneur dont l’amour est exclusif ? Nous croyons-nous plus forts que lui ?
  - type: heading
    content: Faire tout pour la gloire de Dieu
  '23':
  - type: text
    content: Oui, tout m’est permis, mais tout n’est pas bon pour nous. Tout est permis mais tout n’aide pas à grandir dans la foi.
  '24':
  - type: text
    content: Que chacun de vous, au lieu de songer seulement à lui-même, recherche aussi les intérêts des autres.
  '25':
  - type: text
    content: 'Vous pouvez manger de tout ce qui se vend au marché sans vous poser de questions, par scrupule de conscience, sur l’origine de ces aliments. '
  '26':
  - type: text
    content: 'Car '
  - type: text
    content: la terre et ses richesses appartiennent au Seigneur
  - type: note
    content: Ps 24.1.
  - type: text
    content: .
  '27':
  - type: text
    content: Si un non-croyant vous invite
  - type: note
    content: A un repas chez lui, non dans un temple païen.
  - type: text
    content: ' et que vous désiriez accepter son invitation, mangez tranquillement de tout ce que l’on vous servira, sans vous poser de questions par scrupule de conscience. '
  '28':
  - type: text
    content: 'Mais si quelqu’un vous dit : « Cette viande a été offerte en sacrifice à une idole », alors n’en mangez pas à cause de celui qui vous a prévenus et pour des raisons de conscience. '
  '29':
  - type: text
    content: '– Par conscience, j’entends, évidemment, non la vôtre, mais la sienne. – Pourquoi, en effet, exposerais-je ma liberté à être condamnée du fait qu’un autre a des scrupules de conscience ? '
  '3':
  - type: text
    content: Ils ont tous mangé une même nourriture spirituelle
  - type: note
    content: Allusion à la manne tombée du ciel pendant la traversée du désert par le peuple d’Israël (Ex 16.35).
  - type: text
    content: '. '
  '30':
  - type: text
    content: Si je mange en remerciant Dieu, pourquoi serais-je critiqué au sujet d’un aliment pour lequel je rends grâce à Dieu ?
  '31':
  - type: text
    content: Ainsi, que vous mangiez, que vous buviez, bref, quoi que ce soit que vous fassiez, faites tout pour la gloire de Dieu.
  '32':
  - type: text
    content: 'Mais que rien, dans votre comportement, ne soit une occasion de chute, ni pour les Juifs, ni pour les païens, ni pour les membres de l’Eglise de Dieu. '
  '33':
  - type: text
    content: Agissez comme moi qui m’efforce, en toutes choses, de m’adapter à tous. Je ne considère pas ce qui me serait avantageux, mais je recherche le bien du plus grand nombre pour leur salut.
  '4':
  - type: text
    content: Ils ont tous bu la même boisson spirituelle, car ils buvaient de l’eau jaillie d’un rocher spirituel qui les accompagnait ; et ce rocher n’était autre que Christ lui-même
  - type: note
    content: Ex 17.5-6 ; Nb 20.7-11. L’image de l’accompagnement vient de la répétition de l’événement à 40 ans d’intervalle.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Malgré tout cela, la plupart d’entre eux
  - type: note
    content: Des adultes qui avaient quitté l’Egypte, seuls Josué et Caleb sont entrés dans le pays promis (Nb 14.22-24, 28-38 ; Jos 1.1-2).
  - type: text
    content: ' ne furent pas agréés par Dieu, puisqu’ils périrent dans le désert.'
  '6':
  - type: text
    content: 'Tous ces faits nous servent d’exemples pour nous avertir de ne pas tolérer en nous de mauvais désirs comme ceux auxquels ils ont succombé. '
  '7':
  - type: text
    content: 'Ne soyez pas idolâtres comme certains d’entre eux l’ont été, selon ce que rapporte l’Ecriture : '
  - type: text
    content: Le peuple s’assit pour manger et boire, puis il se leva pour se divertir
  - type: note
    content: Ex 32.6.
  - type: text
    content: .
  '8':
  - type: text
    content: Ne nous laissons pas entraîner à l’immoralité sexuelle comme firent certains d’entre eux et, en un seul jour, il mourut vingt-trois mille personnes
  - type: note
    content: Voir Nb 14.37 ; 25.1-9.
  - type: text
    content: .
  '9':
  - type: text
    content: N’essayons pas de forcer la main à Christ
  - type: note
    content: 'Certains manuscrits ont : le Seigneur.'
  - type: text
    content: ', comme le firent certains d’entre eux qui, pour cela, périrent sous la morsure des serpents'
  - type: note
    content: Voir Nb 21.5-6.
  - type: text
    content: .
