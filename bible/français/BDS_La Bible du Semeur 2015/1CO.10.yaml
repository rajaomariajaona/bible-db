document_id: 1CO.10,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’exemple des révoltes d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Car il ne faut pas que vous ignoriez ceci, frères et sœurs : après leur sortie d’Egypte, nos ancêtres ont tous marché sous la conduite de la nuée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 13.21-22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ils ont tous traversé la mer'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La mer des Roseaux dont les eaux s’étaient écartées pour laisser passer les Israélites à pied sec (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 14.22-29
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ne vous plaignez pas de votre sort, comme certains d’entre eux, qui tombèrent sous les coups de l’ange exterminateur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 17.6-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tous ces événements leur sont arrivés pour nous servir d’exemples. Ils ont été mis par écrit pour que nous en tirions instruction, nous qui sommes parvenus aux temps de la fin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C’est pourquoi, si quelqu’un se croit debout, qu’il prenne garde de ne pas tomber.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les tentations qui vous ont assaillis sont communes à tous les hommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne sont pas insurmontables par des hommes.
      marker-yv: yv-n
    - type: text
      text: . D’ailleurs, Dieu est fidèle et il ne permettra pas que vous soyez tentés au-delà de vos forces. Au moment de la tentation, il préparera le moyen d’en sortir pour que vous puissiez y résister.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: S’abstenir de pratiques idolâtres
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Pour toutes ces raisons, chers amis, je vous en conjure : fuyez le culte des idoles.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je vous parle là comme à des gens raisonnables : jugez vous-mêmes de ce que je dis. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La « coupe de reconnaissance »
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 26.26-28
        - type: text
          text: ' et parallèles.'
      marker-yv: yv-n
    - type: text
      text: ', pour laquelle nous remercions Dieu, ne signifie-t-elle pas que nous sommes au bénéfice du sacrifice de Christ qui a versé son sang pour nous ? Et le pain que nous rompons, ne signifie-t-il pas que nous sommes au bénéfice du corps de Christ offert pour nous ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Comme il n’y a qu’un seul pain, nous tous, malgré notre grand nombre, nous ne formons qu’un seul corps, puisque nous partageons entre tous ce pain unique.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pensez à ce qui se passe dans le peuple d’Israël, j’entends Israël au sens national : ceux qui mangent les victimes offertes en sacrifice ne sont-ils pas au bénéfice du sacrifice offert sur l’autel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Lv 6.11 ; 7.6, 15.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Cela signifierait-il qu’une viande, parce qu’elle est sacrifiée à une idole, prend une valeur particulière ? Ou que l’idole ait quelque réalité ? Certainement pas ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ils ont donc tous, en quelque sorte, été baptisés « pour Moïse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour suivre Moïse. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en Moïse.
      marker-yv: yv-n
    - type: text
      text: '  » dans la nuée et dans la mer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais je dis que les sacrifices des païens sont offerts à des démons et à '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ce qui n’est pas Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 32.17
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: . Or, je ne veux pas que vous ayez quoi que ce soit de commun avec les démons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Participer à un banquet religieux impliquait d’être en communion avec la divinité à laquelle le temple était consacré. Or, l’apôtre dit que derrière ces divinités se cachent des démons.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Vous ne pouvez boire à la coupe du Seigneur et en même temps à celle des démons. Vous ne pouvez pas manger à la table du Seigneur et à celle des démons. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ou bien, voulons-nous provoquer le Seigneur dont l’amour est exclusif ? Nous croyons-nous plus forts que lui ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faire tout pour la gloire de Dieu
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Oui, tout m’est permis, mais tout n’est pas bon pour nous. Tout est permis mais tout n’aide pas à grandir dans la foi.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Que chacun de vous, au lieu de songer seulement à lui-même, recherche aussi les intérêts des autres.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Vous pouvez manger de tout ce qui se vend au marché sans vous poser de questions, par scrupule de conscience, sur l’origine de ces aliments. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Car '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la terre et ses richesses appartiennent au Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.26 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 24.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Si un non-croyant vous invite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A un repas chez lui, non dans un temple païen.
      marker-yv: yv-n
    - type: text
      text: ' et que vous désiriez accepter son invitation, mangez tranquillement de tout ce que l’on vous servira, sans vous poser de questions par scrupule de conscience. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Mais si quelqu’un vous dit : « Cette viande a été offerte en sacrifice à une idole », alors n’en mangez pas à cause de celui qui vous a prévenus et pour des raisons de conscience. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '– Par conscience, j’entends, évidemment, non la vôtre, mais la sienne. – Pourquoi, en effet, exposerais-je ma liberté à être condamnée du fait qu’un autre a des scrupules de conscience ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils ont tous mangé une même nourriture spirituelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la manne tombée du ciel pendant la traversée du désert par le peuple d’Israël (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 16.35
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Si je mange en remerciant Dieu, pourquoi serais-je critiqué au sujet d’un aliment pour lequel je rends grâce à Dieu ?
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ainsi, que vous mangiez, que vous buviez, bref, quoi que ce soit que vous fassiez, faites tout pour la gloire de Dieu.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais que rien, dans votre comportement, ne soit une occasion de chute, ni pour les Juifs, ni pour les païens, ni pour les membres de l’Eglise de Dieu. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Agissez comme moi qui m’efforce, en toutes choses, de m’adapter à tous. Je ne considère pas ce qui me serait avantageux, mais je recherche le bien du plus grand nombre pour leur salut.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils ont tous bu la même boisson spirituelle, car ils buvaient de l’eau jaillie d’un rocher spirituel qui les accompagnait ; et ce rocher n’était autre que Christ lui-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 17.5-6 ; Nb 20.7-11. L’image de l’accompagnement vient de la répétition de l’événement à 40 ans d’intervalle.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malgré tout cela, la plupart d’entre eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Des adultes qui avaient quitté l’Egypte, seuls Josué et Caleb sont entrés dans le pays promis (Nb 14.22-24, 28-38 ; Jos 1.1-2).
      marker-yv: yv-n
    - type: text
      text: ' ne furent pas agréés par Dieu, puisqu’ils périrent dans le désert.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tous ces faits nous servent d’exemples pour nous avertir de ne pas tolérer en nous de mauvais désirs comme ceux auxquels ils ont succombé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ne soyez pas idolâtres comme certains d’entre eux l’ont été, selon ce que rapporte l’Ecriture : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le peuple s’assit pour manger et boire, puis il se leva pour se divertir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 32.6
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ne nous laissons pas entraîner à l’immoralité sexuelle comme firent certains d’entre eux et, en un seul jour, il mourut vingt-trois mille personnes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 14.37 ; 25.1-9.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: N’essayons pas de forcer la main à Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Seigneur.
      marker-yv: yv-n
    - type: text
      text: ', comme le firent certains d’entre eux qui, pour cela, périrent sous la morsure des serpents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 21.5-6
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
