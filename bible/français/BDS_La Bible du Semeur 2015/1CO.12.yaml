document_id: 1CO.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’exercice des activités et ministères dans l’Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: J’en viens à la question
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7.1'
        metadata:
          usfm: 1CO.7.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' des « manifestations de l’Esprit » : j’aimerais, frères et sœurs, que vous soyez bien au clair là-dessus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Souvenez-vous comment, lorsque vous étiez encore païens, vous vous laissiez entraîner aveuglément vers des idoles muettes ! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est pourquoi je vous le déclare, si un homme dit : « Maudit soit Jésus », ce n’est pas l’Esprit de Dieu qui le pousse à parler ainsi. Mais personne ne peut affirmer : « Jésus est Seigneur », s’il n’y est pas conduit par l’Esprit Saint.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y a toutes sortes de dons de la grâce, mais c’est le même Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y a toutes sortes de services, mais c’est le même Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y a toutes sortes d’activités, mais c’est le même Dieu ; et c’est lui qui met tout cela en action chez tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A chacun, l’Esprit se manifeste d’une façon particulière, en vue du bien commun. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Esprit donne à l’un une parole de sagesse ; à un autre, le même Esprit donne une parole de connaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’un reçoit par l’Esprit la foi d’une manière particulière ; à un autre, par ce seul et même Esprit des dons de la grâce sous forme de guérisons, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: à un autre, des actes miraculeux ; à un autre, il est donné de prophétiser et à un autre, de distinguer entre les esprits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit certainement de discerner quel esprit anime un prophète ou un enseignant, si c’est l’Esprit de Dieu, ou bien un esprit qui fait prononcer de fausses prophéties ou professer de fausses doctrines (voir 1 R 22 ; 1 Jn 4.1-6).
    marker-yv: yv-n
  - type: text
    text: '. A l’un est donné de s’exprimer dans des langues inconnues, à un autre d’interpréter ces langues. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais tout cela est l’œuvre d’un seul et même Esprit qui distribue son activité à chacun de manière particulière comme il veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le corps humain forme un tout, et pourtant il a beaucoup d’organes. Et tous ces organes, dans leur multiplicité, ne constituent qu’un seul corps. Il en va de même pour ceux qui sont unis à Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, nous avons tous été baptisés dans un seul et même Esprit pour former un seul corps, que nous soyons Juifs ou non-Juifs, esclaves ou hommes libres. C’est de ce seul et même Esprit que nous avons tous reçu à boire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Un corps n’est pas composé d’un membre ou d’un organe unique, mais de plusieurs. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si le pied disait : « Puisque je ne suis pas une main, je ne fais pas partie du corps », n’en ferait-il pas partie pour autant ? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et si l’oreille se mettait à dire : « Puisque je ne suis pas un œil, je ne fais pas partie du corps », cesserait-elle d’en faire partie pour autant ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si tout le corps était un œil, comment ce corps entendrait-il ? Et si tout le corps se réduisait à une oreille, où serait l’odorat ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dieu a disposé chaque organe dans le corps, chacun avec sa particularité, comme il l’a trouvé bon. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car s’il n’y avait en tout et pour tout qu’un seul organe, serait-ce un corps ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En fait, les organes sont nombreux, mais ils forment ensemble un seul corps. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est pourquoi l’œil ne saurait dire à la main : « Je n’ai pas besoin de toi », ni la tête aux pieds : « Je peux très bien me passer de vous. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au contraire, les parties du corps qui nous paraissent insignifiantes sont particulièrement nécessaires. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Celles que nous estimons le moins sont celles dont nous prenons le plus grand soin, et celles dont il n’est pas décent de parler, nous les traitons avec des égards particuliers '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dont les autres n’ont guère besoin. Dieu a disposé les différentes parties de notre corps de manière à ce qu’on honore davantage celles qui manquent naturellement d’honneur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il voulait par là éviter toute division dans le corps et faire que chacun des membres ait le même souci des autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Un membre souffre-t-il ? Tous les autres souffrent avec lui. Un membre est-il à l’honneur ? Tous les autres partagent sa joie. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Or vous, vous êtes le corps de Christ et chacun de vous en particulier en est un membre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C’est ainsi que Dieu a établi dans l’Eglise, premièrement des apôtres, deuxièmement des prophètes, troisièmement des enseignants ; puis viennent les miracles, les dons de la grâce sous la forme de guérisons, l’aide, la direction d’Eglise, les langues inconnues. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tous sont-ils apôtres ? Tous sont-ils prophètes ? Tous sont-ils enseignants ? Tous font-ils des miracles ? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tous ont-ils des dons de la grâce sous forme de guérisons ? Tous parlent-ils dans des langues inconnues ? Tous interprètent-ils ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aspirez aux dons de la grâce les meilleurs. Pour cela, je vais vous indiquer l’approche par excellence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Vous ambitionnez les dons de la grâce les meilleurs. Eh bien ! Je vais vous indiquer l’approche par excellence.
    marker-yv: yv-n
  - type: text
    text: .
