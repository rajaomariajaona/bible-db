document_id: 1CO.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’exercice des activités et ministères dans l’Eglise
  - type: text
    content: J’en viens à la question
  - type: note
    content: Voir note 7.1.
  - type: text
    content: ' des « manifestations de l’Esprit » : j’aimerais, frères et sœurs, que vous soyez bien au clair là-dessus.'
  '10':
  - type: text
    content: à un autre, des actes miraculeux ; à un autre, il est donné de prophétiser et à un autre, de distinguer entre les esprits
  - type: note
    content: Il s’agit certainement de discerner quel esprit anime un prophète ou un enseignant, si c’est l’Esprit de Dieu, ou bien un esprit qui fait prononcer de fausses prophéties ou professer de fausses doctrines (voir 1 R 22 ; 1 Jn 4.1-6).
  - type: text
    content: '. A l’un est donné de s’exprimer dans des langues inconnues, à un autre d’interpréter ces langues. '
  '11':
  - type: text
    content: Mais tout cela est l’œuvre d’un seul et même Esprit qui distribue son activité à chacun de manière particulière comme il veut.
  '12':
  - type: text
    content: 'Le corps humain forme un tout, et pourtant il a beaucoup d’organes. Et tous ces organes, dans leur multiplicité, ne constituent qu’un seul corps. Il en va de même pour ceux qui sont unis à Christ. '
  '13':
  - type: text
    content: En effet, nous avons tous été baptisés dans un seul et même Esprit pour former un seul corps, que nous soyons Juifs ou non-Juifs, esclaves ou hommes libres. C’est de ce seul et même Esprit que nous avons tous reçu à boire.
  '14':
  - type: text
    content: 'Un corps n’est pas composé d’un membre ou d’un organe unique, mais de plusieurs. '
  '15':
  - type: text
    content: 'Si le pied disait : « Puisque je ne suis pas une main, je ne fais pas partie du corps », n’en ferait-il pas partie pour autant ? '
  '16':
  - type: text
    content: 'Et si l’oreille se mettait à dire : « Puisque je ne suis pas un œil, je ne fais pas partie du corps », cesserait-elle d’en faire partie pour autant ? '
  '17':
  - type: text
    content: Si tout le corps était un œil, comment ce corps entendrait-il ? Et si tout le corps se réduisait à une oreille, où serait l’odorat ?
  '18':
  - type: text
    content: 'Dieu a disposé chaque organe dans le corps, chacun avec sa particularité, comme il l’a trouvé bon. '
  '19':
  - type: text
    content: Car s’il n’y avait en tout et pour tout qu’un seul organe, serait-ce un corps ?
  '2':
  - type: text
    content: 'Souvenez-vous comment, lorsque vous étiez encore païens, vous vous laissiez entraîner aveuglément vers des idoles muettes ! '
  '20':
  - type: text
    content: 'En fait, les organes sont nombreux, mais ils forment ensemble un seul corps. '
  '21':
  - type: text
    content: 'C’est pourquoi l’œil ne saurait dire à la main : « Je n’ai pas besoin de toi », ni la tête aux pieds : « Je peux très bien me passer de vous. »'
  '22':
  - type: text
    content: 'Au contraire, les parties du corps qui nous paraissent insignifiantes sont particulièrement nécessaires. '
  '23':
  - type: text
    content: 'Celles que nous estimons le moins sont celles dont nous prenons le plus grand soin, et celles dont il n’est pas décent de parler, nous les traitons avec des égards particuliers '
  '24':
  - type: text
    content: 'dont les autres n’ont guère besoin. Dieu a disposé les différentes parties de notre corps de manière à ce qu’on honore davantage celles qui manquent naturellement d’honneur. '
  '25':
  - type: text
    content: Il voulait par là éviter toute division dans le corps et faire que chacun des membres ait le même souci des autres.
  '26':
  - type: text
    content: 'Un membre souffre-t-il ? Tous les autres souffrent avec lui. Un membre est-il à l’honneur ? Tous les autres partagent sa joie. '
  '27':
  - type: text
    content: Or vous, vous êtes le corps de Christ et chacun de vous en particulier en est un membre.
  '28':
  - type: text
    content: 'C’est ainsi que Dieu a établi dans l’Eglise, premièrement des apôtres, deuxièmement des prophètes, troisièmement des enseignants ; puis viennent les miracles, les dons de la grâce sous la forme de guérisons, l’aide, la direction d’Eglise, les langues inconnues. '
  '29':
  - type: text
    content: 'Tous sont-ils apôtres ? Tous sont-ils prophètes ? Tous sont-ils enseignants ? Tous font-ils des miracles ? '
  '3':
  - type: text
    content: 'C’est pourquoi je vous le déclare, si un homme dit : « Maudit soit Jésus », ce n’est pas l’Esprit de Dieu qui le pousse à parler ainsi. Mais personne ne peut affirmer : « Jésus est Seigneur », s’il n’y est pas conduit par l’Esprit Saint.'
  '30':
  - type: text
    content: Tous ont-ils des dons de la grâce sous forme de guérisons ? Tous parlent-ils dans des langues inconnues ? Tous interprètent-ils ?
  '31':
  - type: text
    content: Aspirez aux dons de la grâce les meilleurs. Pour cela, je vais vous indiquer l’approche par excellence
  - type: note
    content: 'Autre traduction : Vous ambitionnez les dons de la grâce les meilleurs. Eh bien ! Je vais vous indiquer l’approche par excellence.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Il y a toutes sortes de dons de la grâce, mais c’est le même Esprit. '
  '5':
  - type: text
    content: 'Il y a toutes sortes de services, mais c’est le même Seigneur. '
  '6':
  - type: text
    content: Il y a toutes sortes d’activités, mais c’est le même Dieu ; et c’est lui qui met tout cela en action chez tous.
  '7':
  - type: text
    content: 'A chacun, l’Esprit se manifeste d’une façon particulière, en vue du bien commun. '
  '8':
  - type: text
    content: 'L’Esprit donne à l’un une parole de sagesse ; à un autre, le même Esprit donne une parole de connaissance. '
  '9':
  - type: text
    content: 'L’un reçoit par l’Esprit la foi d’une manière particulière ; à un autre, par ce seul et même Esprit des dons de la grâce sous forme de guérisons, '
