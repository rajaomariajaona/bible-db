document_id: NUM.33
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Itinéraire de l’Égypte aux steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les étapes des Israélites depuis leur départ d’Egypte, rangés en ordre sous la conduite de Moïse et d’Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sur ordre de l’Eternel, Moïse consigna par écrit leurs lieux de campement, d’étape en étape. Voici donc quel fut leur itinéraire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le quinzième jour du premier mois, le lendemain de la Pâque, ils partirent de Ramsès. Les Israélites s’en allèrent librement sous les yeux de tous les Egyptiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14.8
        metadata:
          usfm: EXO.14.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: qui enterraient tous leurs fils aînés que l’Eternel avait frappés pour exercer ses jugements contre leurs divinités.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Israélites partirent de Ramsès et campèrent à Soukkoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils partirent de Soukkoth et campèrent à Etam, à la limite du désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils partirent d’Etam et rebroussèrent chemin vers Pi-Hahiroth à l’est de Baal-Tsephôn et campèrent en face de Migdol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils partirent de Hahiroth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon la plupart des manuscrits du texte hébreu traditionnel. Certains manuscrits du texte hébreu traditionnel, le Pentateuque samaritain et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pi-Hahiroth.
    marker-yv: yv-n
  - type: text
    text: ' et traversèrent la mer des Roseaux en direction du désert. Après trois journées de marche dans le désert d’Etam, ils campèrent à Mara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils partirent de Mara et gagnèrent Elim, où ils trouvèrent douze sources d’eau et soixante-dix palmiers. Ils campèrent là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Partis d’Elim, ils dressèrent leur camp près de la mer des Roseaux, puis dans le désert de Sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De là ils allèrent camper à Dophqa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'puis à Aloush, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: puis à Rephidim, où le peuple ne trouva pas d’eau potable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Partis de Rephidim, ils campèrent dans le désert du Sinaï, puis aux endroits suivants : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Qibroth-Hattaava, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hatséroth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ritma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rimmôn-Pérets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Libna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rissa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qehélata, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'à la montagne de Shapher, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Harada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Maqhéloth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tahath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tarah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mitqa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hashmona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moséroth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Bené-Yaaqân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hor-Guidgad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Yotbata, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Abrona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Etsyôn-Guéber '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'et dans le désert de Tsîn, c’est-à-dire Qadesh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: à la montagne de Hor, à la limite du pays d’Edom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Là, sur ordre de l’Eternel, le prêtre Aaron gravit la montagne de Hor, où il mourut le premier jour du cinquième mois de la quarantième année après le départ des Israélites d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 20.22-28 ; Dt 10.6.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il était âgé de cent vingt-trois ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: C’est alors que le roi cananéen d’Arad, qui habitait le Néguev dans le pays de Canaan, apprit l’approche des Israélites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 21.1
        metadata:
          usfm: NUM.21.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Préparatifs avant la conquête de Canaan
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les instructions en vue de la conquête
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Partis de la montagne de Hor, ils dressèrent successivement leur camp à Tsalmona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Pounôn, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Oboth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Iyé-Abarim à la frontière de Moab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dibôn-Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Almôn-Diblataïm, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'puis dans les montagnes d’Abarim, devant le mont Nébo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'et dans les steppes de Moab, au bord du Jourdain en face de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Leur camp s’étalait sur la rive du Jourdain de Beth-Hayeshimoth à Abel-Shittim dans les steppes de Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'C’est là que l’Eternel s’adressa à Moïse, dans les steppes de Moab, au bord du Jourdain en face de Jéricho, pour lui dire : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Dis aux Israélites : Lorsque vous aurez traversé le Jourdain pour pénétrer dans le pays de Canaan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'vous déposséderez en votre faveur tous les habitants du pays et vous détruirez toutes les idoles de pierre sculptée et toutes leurs statues de métal fondu, vous démolirez tous leurs hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Vous prendrez possession du pays et vous vous y établirez, car je vous ai donné le pays pour qu’il vous appartienne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Vous le partagerez par tirage au sort entre vos familles, attribuant un patrimoine plus grand à ceux qui sont plus nombreux, et un plus petit à ceux qui le sont moins. Chacun acceptera comme son patrimoine foncier celui que le sort lui attribuera. Vous ferez le partage entre vos tribus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 26.52-56 ; 34.13 ; Jos 14.1-2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Si vous ne dépossédez pas les habitants du pays en votre faveur, ceux que vous laisserez là seront comme des épines dans vos yeux et des échardes dans vos flancs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.55 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jos 23.13 ; Ez 28.24.
    marker-yv: yv-n
  - type: text
    text: '  ; ils seront vos adversaires dans le pays que vous habiterez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Alors c’est vous que je traiterai comme j’avais résolu de les traiter.
