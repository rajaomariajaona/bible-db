document_id: NUM.33,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Itinéraire de l’Égypte aux steppes de Moab
  - type: text
    content: 'Voici les étapes des Israélites depuis leur départ d’Egypte, rangés en ordre sous la conduite de Moïse et d’Aaron. '
  '10':
  - type: text
    content: 'Partis d’Elim, ils dressèrent leur camp près de la mer des Roseaux, puis dans le désert de Sin. '
  '12':
  - type: text
    content: 'De là ils allèrent camper à Dophqa, '
  '13':
  - type: text
    content: 'puis à Aloush, '
  '14':
  - type: text
    content: puis à Rephidim, où le peuple ne trouva pas d’eau potable.
  '15':
  - type: text
    content: 'Partis de Rephidim, ils campèrent dans le désert du Sinaï, puis aux endroits suivants : '
  '16':
  - type: text
    content: 'Qibroth-Hattaava, '
  '17':
  - type: text
    content: 'Hatséroth, '
  '18':
  - type: text
    content: 'Ritma, '
  '19':
  - type: text
    content: 'Rimmôn-Pérets, '
  '2':
  - type: text
    content: Sur ordre de l’Eternel, Moïse consigna par écrit leurs lieux de campement, d’étape en étape. Voici donc quel fut leur itinéraire.
  '20':
  - type: text
    content: 'Libna, '
  '21':
  - type: text
    content: 'Rissa, '
  '22':
  - type: text
    content: 'Qehélata, '
  '23':
  - type: text
    content: 'à la montagne de Shapher, '
  '24':
  - type: text
    content: 'Harada, '
  '25':
  - type: text
    content: 'Maqhéloth, '
  '26':
  - type: text
    content: 'Tahath, '
  '27':
  - type: text
    content: 'Tarah, '
  '28':
  - type: text
    content: 'Mitqa, '
  '29':
  - type: text
    content: 'Hashmona, '
  '3':
  - type: text
    content: Le quinzième jour du premier mois, le lendemain de la Pâque, ils partirent de Ramsès. Les Israélites s’en allèrent librement sous les yeux de tous les Egyptiens
  - type: note
    content: Voir Ex 14.8.
  - type: text
    content: ', '
  '30':
  - type: text
    content: 'Moséroth, '
  '31':
  - type: text
    content: 'Bené-Yaaqân, '
  '32':
  - type: text
    content: 'Hor-Guidgad, '
  '33':
  - type: text
    content: 'Yotbata, '
  '34':
  - type: text
    content: 'Abrona, '
  '35':
  - type: text
    content: 'Etsyôn-Guéber '
  '36':
  - type: text
    content: 'et dans le désert de Tsîn, c’est-à-dire Qadesh, '
  '37':
  - type: text
    content: à la montagne de Hor, à la limite du pays d’Edom.
  '38':
  - type: text
    content: Là, sur ordre de l’Eternel, le prêtre Aaron gravit la montagne de Hor, où il mourut le premier jour du cinquième mois de la quarantième année après le départ des Israélites d’Egypte
  - type: note
    content: Voir Nb 20.22-28 ; Dt 10.6.
  - type: text
    content: '. '
  '39':
  - type: text
    content: Il était âgé de cent vingt-trois ans.
  '4':
  - type: text
    content: qui enterraient tous leurs fils aînés que l’Eternel avait frappés pour exercer ses jugements contre leurs divinités.
  '40':
  - type: text
    content: C’est alors que le roi cananéen d’Arad, qui habitait le Néguev dans le pays de Canaan, apprit l’approche des Israélites
  - type: note
    content: Voir Nb 21.1.
  - type: text
    content: .
  - type: heading
    content: Préparatifs avant la conquête de Canaan
  - type: heading
    content: Les instructions en vue de la conquête
  '41':
  - type: text
    content: 'Partis de la montagne de Hor, ils dressèrent successivement leur camp à Tsalmona, '
  '42':
  - type: text
    content: 'Pounôn, '
  '43':
  - type: text
    content: 'Oboth, '
  '44':
  - type: text
    content: 'Iyé-Abarim à la frontière de Moab, '
  '45':
  - type: text
    content: 'Dibôn-Gad, '
  '46':
  - type: text
    content: 'Almôn-Diblataïm, '
  '47':
  - type: text
    content: 'puis dans les montagnes d’Abarim, devant le mont Nébo, '
  '48':
  - type: text
    content: 'et dans les steppes de Moab, au bord du Jourdain en face de Jéricho. '
  '49':
  - type: text
    content: Leur camp s’étalait sur la rive du Jourdain de Beth-Hayeshimoth à Abel-Shittim dans les steppes de Moab.
  '5':
  - type: text
    content: 'Les Israélites partirent de Ramsès et campèrent à Soukkoth. '
  '50':
  - type: text
    content: 'C’est là que l’Eternel s’adressa à Moïse, dans les steppes de Moab, au bord du Jourdain en face de Jéricho, pour lui dire : '
  '51':
  - type: text
    content: 'Dis aux Israélites : Lorsque vous aurez traversé le Jourdain pour pénétrer dans le pays de Canaan, '
  '52':
  - type: text
    content: 'vous déposséderez en votre faveur tous les habitants du pays et vous détruirez toutes les idoles de pierre sculptée et toutes leurs statues de métal fondu, vous démolirez tous leurs hauts lieux. '
  '53':
  - type: text
    content: 'Vous prendrez possession du pays et vous vous y établirez, car je vous ai donné le pays pour qu’il vous appartienne. '
  '54':
  - type: text
    content: Vous le partagerez par tirage au sort entre vos familles, attribuant un patrimoine plus grand à ceux qui sont plus nombreux, et un plus petit à ceux qui le sont moins. Chacun acceptera comme son patrimoine foncier celui que le sort lui attribuera. Vous ferez le partage entre vos tribus
  - type: note
    content: Voir Nb 26.52-56 ; 34.13 ; Jos 14.1-2.
  - type: text
    content: '. '
  '55':
  - type: text
    content: Si vous ne dépossédez pas les habitants du pays en votre faveur, ceux que vous laisserez là seront comme des épines dans vos yeux et des échardes dans vos flancs
  - type: note
    content: Voir Jos 23.13 ; Ez 28.24.
  - type: text
    content: '  ; ils seront vos adversaires dans le pays que vous habiterez. '
  '56':
  - type: text
    content: Alors c’est vous que je traiterai comme j’avais résolu de les traiter.
  '6':
  - type: text
    content: 'Ils partirent de Soukkoth et campèrent à Etam, à la limite du désert. '
  '7':
  - type: text
    content: 'Ils partirent d’Etam et rebroussèrent chemin vers Pi-Hahiroth à l’est de Baal-Tsephôn et campèrent en face de Migdol. '
  '8':
  - type: text
    content: Ils partirent de Hahiroth
  - type: note
    content: 'Selon la plupart des manuscrits du texte hébreu traditionnel. Certains manuscrits du texte hébreu traditionnel, le Pentateuque samaritain et la Vulgate ont : Pi-Hahiroth.'
  - type: text
    content: ' et traversèrent la mer des Roseaux en direction du désert. Après trois journées de marche dans le désert d’Etam, ils campèrent à Mara. '
  '9':
  - type: text
    content: 'Ils partirent de Mara et gagnèrent Elim, où ils trouvèrent douze sources d’eau et soixante-dix palmiers. Ils campèrent là. '
