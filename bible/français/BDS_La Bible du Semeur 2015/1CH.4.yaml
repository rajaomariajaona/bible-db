document_id: 1CH.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les autres descendants de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Descendants de Juda : Pérets, Hetsrôn, Karmi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Caleb '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.9'
        metadata:
          usfm: 1CH.2.9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
        metadata:
          usfm: 1CH.2.18
      - type: text
        text: ) ?
    marker-yv: yv-n
  - type: text
    text: ', Hour et Shobal. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reaya, fils de Shobal, fut le père de Yahath, et Yahath celui de Ahoumaï et Lahad. Ce sont les ancêtres des familles des Tsoreatiens. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils d’Etam : Jizréel, Yishma et Yidbash, et leur sœur Hatselelponi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Penouel était le père de Guedor et Ezer celui de Housha. Ce sont là les fils de Hour, premier-né d’Ephrata, père de Bethléhem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chef '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (militaire ou civil ; de même, entre autres, aux v. 12, 14, 17, 18).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ashhour, père de Teqoa, eut deux femmes, Hélea et Naara. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naara lui donna ces fils : Ahouzzam, Hépher, Témeni et Ahashtari. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hélea lui donna ces fils : Tséreth, Tsohar et Etnân. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Qots fut le père d’Anoub et de Hatsobéba, et les familles d’Aharehél, fils d’Haroum. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yaebets était plus considéré que ses frères, sa mère lui avait donné le nom de Yaebets en disant : « C’est parce que je l’ai enfanté dans la douleur. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yaebets
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yaebets '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance avec le terme rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'douleur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 9), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souffrance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 10).
    marker-yv: yv-n
  - type: text
    text: ' invoqua le Dieu d’Israël en disant : « Si tu me bénis réellement et si tu agrandis mon territoire, si tu es avec moi, si tu éloignes de moi le malheur pour m’épargner la souffrance… » Et Dieu lui accorda ce qu’il avait demandé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Keloub, frère de Shouha, eut pour fils Mehir, qui fut le père d’Eshtôn. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eshtôn fut le père de Beth-Rapha, Paséah et Tehinna, le père de Ir-Nahash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville de Nahash.
    marker-yv: yv-n
  - type: text
    text: . Ce sont là les gens qui habitèrent Réka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils de Qenaz : Otniel et Seraya. Fils d’Otniel : Hatath '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et Meonotaï qui fut le père d’Ophra. Seraya fut le père de Joab qui fut celui de Ge-Harashim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui fut l’ancêtre des artisans habitant la vallée des Artisans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le fondateur de la vallée des Artisans.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Caleb, fils de Yephounné : Irou, Ela et Naam.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Qenaz fut le fils d’Ela. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Yehalléléel : Ziph, Zipha, Tirya et Asaréel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Fils d’Esdras
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17-18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu traditionnel de ces versets est corrompu. Autre lecture de ces versets, d’après l’ancienne version grecque : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Fils d’Esdras : Yéter, Méred, Ephar et Yalôn. Fils de Yéter : Miryam, Shammaï et Yishbah, le père d’Eshtemoa. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '18 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sa femme judéenne lui enfanta Yéred, le père de Guedor, Héber, celui de Soko et Yeqoutiel, celui de Zanoah. Voici les fils de Bitya, fille du pharaon, que Méred avait épousée : …
    marker-yv: yv-n
  - type: text
    text: '  : Yéter, Méred, Epher et Yalôn. Méred épousa Bitya, une fille du pharaon, qui conçut Miryam, Shammaï et Yishbah, le père d’Eshtemoa. De sa femme judéenne, il eut Yéred, le père de Guedor, Héber, celui de Soko et Yeqoutiel, celui de Zanoah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de la femme de Hodiya, sœur de Naham : le père de Qeïla, le Garmite et d’Eshtemoa, le Maakathien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fils de Simon : Amnôn, Rinna, Ben-Hanan et Tilôn. Fils de Yisheï : Zoheth et Ben-Zoheth. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Descendants de Shéla, fils de Juda : Er, père de Léka, Laeda, père de Marésha, et les familles qui travaillent le byssus'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sorte d’étoffe faite avec les poils de certains animaux. Les clans familiaux étaient souvent associés à des métiers qui se pratiquaient de père en fils : tissage (v. 21), poterie (v. 23), gens instruits ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.55'
        metadata:
          usfm: 1CH.2.55
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' à Beth-Ashbéa, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Yoqim, les hommes de Kozéba, Joas et Saraph, qui dominèrent sur Moab, et sur Yashoubi-Léhem. Ces choses sont anciennes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’étaient des potiers qui habitaient à Netaïm et Guedéra, près du roi, et travaillaient pour lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les descendants de Siméon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fils de Siméon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Gn 46.10 ; Ex 6.15 ; Nb 26.12-13. La tribu de Siméon ayant son territoire au sud de celle de Juda, elle s’est trouvée assimilée à celle-ci dans le royaume du Sud, ce qui conduisit ses membres à perdre en grande partie leur identité.
    marker-yv: yv-n
  - type: text
    text: '  : Nemouel, Yamîn, Yarib, Zérah, Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Son fils : Shalloum, son fils Mibsam, son fils Mishma. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mishma eut pour fils Hammouel, Zakkour et Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shimeï eut seize fils et six filles. Ses frères n’eurent pas beaucoup de fils. C’est pourquoi les familles de Siméon ne se multiplièrent pas autant que les descendants de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elles habitaient à Beer-Sheva, à Molada, à Hatsar-Shoual
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 28-33 : voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.1-8
        metadata:
          usfm: JOS.19.1+JOS.19.2+JOS.19.3+JOS.19.4+JOS.19.5+JOS.19.6+JOS.19.7+JOS.19.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'à Bilha, à Etsem, à Tolad, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'à Betouel, à Horma, à Tsiqlag, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'à Beth-Markaboth, à Hatsar-Sousim, à Beth-Bireï et à Shaaraïm. Telles furent leurs villes jusqu’au règne de David, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et leurs villages étaient au nombre de cinq : Etam, Aïn, Rimmôn, Tokên et Ashân. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il faut ajouter tous les villages qui sont aux alentours de ces villes, jusqu’à Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits de l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.8
        metadata:
          usfm: JOS.19.8
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baalath.
    marker-yv: yv-n
  - type: text
    text: . Telles furent leurs habitations et leur généalogie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Meshobab ; Yamlek ; Yosha, fils d’Amatsia ; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joël, Jéhu, fils de Yoshibia, fils de Seraya, fils de Asiel, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elyoénaï, Yaaqoba ; Yeshohaya, Asaya, Adiel, Yesimiel, Benaya, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ziza, fils de Shipheï, et petit-fils d’Allôn, lui-même descendant de Yedaya, de Shimri et de Shemaya. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ces hommes qui viennent d’être nommés étaient les chefs de leurs familles, leurs groupes familiaux devinrent très nombreux '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'et ils se dispersèrent jusqu’à l’entrée de Guedor, à l’est de la vallée, afin de chercher des pâturages pour leurs moutons et chèvres. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ils trouvèrent de gras et bons pâturages, et un pays vaste, tranquille et paisible ; ceux qui l’habitaient auparavant descendaient de Cham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Canaan est un fils de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Cham '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 9.22
        metadata:
          usfm: GEN.9.22
      - type: text
        text: ). Les descendants de Cham nommés ici sont donc les Cananéens établis dans le pays avant sa conquête par les Israélites.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Du temps d’Ezéchias, roi de Juda, ces hommes qui viennent d’être cités arrivèrent dans cette région, détruisirent les lieux d’habitation et les abris qui se trouvaient là, ils exterminèrent les habitants pour les vouer à l’Eternel, et ceux-ci ont disparu jusqu’à ce jour. Puis ils s’établirent à leur place, car il y avait là des pâturages pour leur petit bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il y eut aussi cinq cents descendants de Siméon, qui se rendirent dans la région montagneuse de Séir, avec, à leur tête, Pelatia, Nearia, Rephaya et Ouzziel, les fils de Yisheï. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ils tuèrent le reste des rescapés d’Amalec, et ont habité là jusqu’à aujourd’hui.
