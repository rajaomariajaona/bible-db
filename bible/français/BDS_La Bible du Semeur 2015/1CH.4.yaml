document_id: 1CH.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les autres descendants de Juda
  - type: text
    content: 'Descendants de Juda : Pérets, Hetsrôn, Karmi'
  - type: note
    content: Ou Caleb (voir 2.9, 18) ?
  - type: text
    content: ', Hour et Shobal. '
  '10':
  - type: text
    content: Yaebets
  - type: note
    content: En hébreu, Yaebets fait assonance avec le terme rendu par douleur (v. 9), souffrance (v. 10).
  - type: text
    content: ' invoqua le Dieu d’Israël en disant : « Si tu me bénis réellement et si tu agrandis mon territoire, si tu es avec moi, si tu éloignes de moi le malheur pour m’épargner la souffrance… » Et Dieu lui accorda ce qu’il avait demandé.'
  '11':
  - type: text
    content: 'Keloub, frère de Shouha, eut pour fils Mehir, qui fut le père d’Eshtôn. '
  '12':
  - type: text
    content: Eshtôn fut le père de Beth-Rapha, Paséah et Tehinna, le père de Ir-Nahash
  - type: note
    content: 'Autre traduction : la ville de Nahash.'
  - type: text
    content: . Ce sont là les gens qui habitèrent Réka.
  '13':
  - type: text
    content: 'Fils de Qenaz : Otniel et Seraya. Fils d’Otniel : Hatath '
  '14':
  - type: text
    content: et Meonotaï qui fut le père d’Ophra. Seraya fut le père de Joab qui fut celui de Ge-Harashim
  - type: note
    content: 'Autres traductions : qui fut l’ancêtre des artisans habitant la vallée des Artisans ou le fondateur de la vallée des Artisans.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Fils de Caleb, fils de Yephounné : Irou, Ela et Naam.'
  - type: text
    content: 'Qenaz fut le fils d’Ela. '
  '16':
  - type: text
    content: 'Fils de Yehalléléel : Ziph, Zipha, Tirya et Asaréel. '
  '17':
  - type: text
    content: Fils d’Esdras
  - type: note
    content: 'Le texte hébreu traditionnel de ces versets est corrompu. Autre lecture de ces versets, d’après l’ancienne version grecque : Fils d’Esdras : Yéter, Méred, Ephar et Yalôn. Fils de Yéter : Miryam, Shammaï et Yishbah, le père d’Eshtemoa. 18 Sa femme judéenne lui enfanta Yéred, le père de Guedor, Héber, celui de Soko et Yeqoutiel, celui de Zanoah. Voici les fils de Bitya, fille du pharaon, que Méred avait épousée : …'
  - type: text
    content: '  : Yéter, Méred, Epher et Yalôn. Méred épousa Bitya, une fille du pharaon, qui conçut Miryam, Shammaï et Yishbah, le père d’Eshtemoa. De sa femme judéenne, il eut Yéred, le père de Guedor, Héber, celui de Soko et Yeqoutiel, celui de Zanoah. '
  '19':
  - type: text
    content: 'Fils de la femme de Hodiya, sœur de Naham : le père de Qeïla, le Garmite et d’Eshtemoa, le Maakathien.'
  '2':
  - type: text
    content: 'Reaya, fils de Shobal, fut le père de Yahath, et Yahath celui de Ahoumaï et Lahad. Ce sont les ancêtres des familles des Tsoreatiens. '
  '20':
  - type: text
    content: 'Fils de Simon : Amnôn, Rinna, Ben-Hanan et Tilôn. Fils de Yisheï : Zoheth et Ben-Zoheth. '
  '21':
  - type: text
    content: 'Descendants de Shéla, fils de Juda : Er, père de Léka, Laeda, père de Marésha, et les familles qui travaillent le byssus'
  - type: note
    content: 'Sorte d’étoffe faite avec les poils de certains animaux. Les clans familiaux étaient souvent associés à des métiers qui se pratiquaient de père en fils : tissage (v. 21), poterie (v. 23), gens instruits (2.55).'
  - type: text
    content: ' à Beth-Ashbéa, '
  '22':
  - type: text
    content: 'Yoqim, les hommes de Kozéba, Joas et Saraph, qui dominèrent sur Moab, et sur Yashoubi-Léhem. Ces choses sont anciennes. '
  '23':
  - type: text
    content: C’étaient des potiers qui habitaient à Netaïm et Guedéra, près du roi, et travaillaient pour lui.
  - type: heading
    content: Les descendants de Siméon
  '24':
  - type: text
    content: Fils de Siméon
  - type: note
    content: Voir Gn 46.10 ; Ex 6.15 ; Nb 26.12-13. La tribu de Siméon ayant son territoire au sud de celle de Juda, elle s’est trouvée assimilée à celle-ci dans le royaume du Sud, ce qui conduisit ses membres à perdre en grande partie leur identité.
  - type: text
    content: '  : Nemouel, Yamîn, Yarib, Zérah, Saül. '
  '25':
  - type: text
    content: 'Son fils : Shalloum, son fils Mibsam, son fils Mishma. '
  '26':
  - type: text
    content: 'Mishma eut pour fils Hammouel, Zakkour et Shimeï. '
  '27':
  - type: text
    content: 'Shimeï eut seize fils et six filles. Ses frères n’eurent pas beaucoup de fils. C’est pourquoi les familles de Siméon ne se multiplièrent pas autant que les descendants de Juda. '
  '28':
  - type: text
    content: Elles habitaient à Beer-Sheva, à Molada, à Hatsar-Shoual
  - type: note
    content: 'Pour les v. 28-33 : voir Jos 19.1-8.'
  - type: text
    content: ', '
  '29':
  - type: text
    content: 'à Bilha, à Etsem, à Tolad, '
  '3':
  - type: text
    content: 'Fils d’Etam : Jizréel, Yishma et Yidbash, et leur sœur Hatselelponi. '
  '30':
  - type: text
    content: 'à Betouel, à Horma, à Tsiqlag, '
  '31':
  - type: text
    content: 'à Beth-Markaboth, à Hatsar-Sousim, à Beth-Bireï et à Shaaraïm. Telles furent leurs villes jusqu’au règne de David, '
  '32':
  - type: text
    content: 'et leurs villages étaient au nombre de cinq : Etam, Aïn, Rimmôn, Tokên et Ashân. '
  '33':
  - type: text
    content: Il faut ajouter tous les villages qui sont aux alentours de ces villes, jusqu’à Baal
  - type: note
    content: 'Certains manuscrits de l’ancienne version grecque et Jos 19.8 ont : Baalath.'
  - type: text
    content: . Telles furent leurs habitations et leur généalogie.
  '34':
  - type: text
    content: 'Meshobab ; Yamlek ; Yosha, fils d’Amatsia ; '
  '35':
  - type: text
    content: 'Joël, Jéhu, fils de Yoshibia, fils de Seraya, fils de Asiel, '
  '36':
  - type: text
    content: 'Elyoénaï, Yaaqoba ; Yeshohaya, Asaya, Adiel, Yesimiel, Benaya, '
  '37':
  - type: text
    content: 'Ziza, fils de Shipheï, et petit-fils d’Allôn, lui-même descendant de Yedaya, de Shimri et de Shemaya. '
  '38':
  - type: text
    content: 'Ces hommes qui viennent d’être nommés étaient les chefs de leurs familles, leurs groupes familiaux devinrent très nombreux '
  '39':
  - type: text
    content: 'et ils se dispersèrent jusqu’à l’entrée de Guedor, à l’est de la vallée, afin de chercher des pâturages pour leurs moutons et chèvres. '
  '4':
  - type: text
    content: Penouel était le père de Guedor et Ezer celui de Housha. Ce sont là les fils de Hour, premier-né d’Ephrata, père de Bethléhem
  - type: note
    content: Le terme père pourrait aussi signifier chef (militaire ou civil ; de même, entre autres, aux v. 12, 14, 17, 18).
  - type: text
    content: '. '
  '40':
  - type: text
    content: Ils trouvèrent de gras et bons pâturages, et un pays vaste, tranquille et paisible ; ceux qui l’habitaient auparavant descendaient de Cham
  - type: note
    content: Canaan est un fils de Cham (Gn 9.22). Les descendants de Cham nommés ici sont donc les Cananéens établis dans le pays avant sa conquête par les Israélites.
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Du temps d’Ezéchias, roi de Juda, ces hommes qui viennent d’être cités arrivèrent dans cette région, détruisirent les lieux d’habitation et les abris qui se trouvaient là, ils exterminèrent les habitants pour les vouer à l’Eternel, et ceux-ci ont disparu jusqu’à ce jour. Puis ils s’établirent à leur place, car il y avait là des pâturages pour leur petit bétail. '
  '42':
  - type: text
    content: 'Il y eut aussi cinq cents descendants de Siméon, qui se rendirent dans la région montagneuse de Séir, avec, à leur tête, Pelatia, Nearia, Rephaya et Ouzziel, les fils de Yisheï. '
  '43':
  - type: text
    content: Ils tuèrent le reste des rescapés d’Amalec, et ont habité là jusqu’à aujourd’hui.
  '5':
  - type: text
    content: 'Ashhour, père de Teqoa, eut deux femmes, Hélea et Naara. '
  '6':
  - type: text
    content: 'Naara lui donna ces fils : Ahouzzam, Hépher, Témeni et Ahashtari. '
  '7':
  - type: text
    content: 'Hélea lui donna ces fils : Tséreth, Tsohar et Etnân. '
  '8':
  - type: text
    content: 'Qots fut le père d’Anoub et de Hatsobéba, et les familles d’Aharehél, fils d’Haroum. '
  '9':
  - type: text
    content: 'Yaebets était plus considéré que ses frères, sa mère lui avait donné le nom de Yaebets en disant : « C’est parce que je l’ai enfanté dans la douleur. » '
