document_id: 2CH.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salomon loue l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Salomon dit : L’Eternel a déclaré qu’il demeurerait dans un lieu obscur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et moi, j’ai bâti pour toi une résidence, un lieu où tu habiteras éternellement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis le roi se retourna et bénit toute l’assemblée d’Israël qui se tenait debout. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il dit : Béni soit l’Eternel, le Dieu d’Israël, qui a, de sa propre bouche, parlé à mon père David, et qui a agi pour accomplir la promesse qu’il lui avait faite. Il lui avait dit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 4-9, voir 1 Ch 17.1-12 ; 2 S 7.1-13.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: « Depuis le jour où j’ai fait sortir mon peuple d’Egypte, je n’ai jamais choisi une ville particulière parmi toutes les tribus d’Israël pour qu’on y bâtisse un temple où je sois présent, et je n’ai pas choisi un homme pour qu’il soit le chef de mon peuple Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dieu avait désigné à plusieurs reprises des chefs temporaires pour Israël, mais jusqu’au temps de David, il n’avait jamais établi de monarchie permanente et héréditaire.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais voici que j’ai élu Jérusalem pour y établir ma présence, et j’ai choisi David pour gouverner mon peuple Israël ! » '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mon père David avait à cœur de bâtir un temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais l’Eternel lui a déclaré : « Ton projet de bâtir un temple en mon honneur est une excellente chose : tu as bien fait de prendre cela à cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toutefois, ce n’est pas toi qui bâtiras ce temple, c’est ton propre fils qui le bâtira pour moi. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Eternel a tenu sa promesse : j’ai succédé à mon père David et j’occupe le trône d’Israël, comme l’Eternel l’avait annoncé, et j’ai construit ce temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’y ai déposé le coffre qui contient le code de l’alliance de l’Eternel, cette alliance qu’il a conclue avec les Israélites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prière d’intercession de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 8.22-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis Salomon se plaça devant l’autel de l’Eternel, en faisant face à toute l’assemblée d’Israël. Il leva les mains pour prier. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, Salomon avait fait construire une estrade de bronze, ayant une forme carrée, de deux mètres cinquante de côté et d’un mètre cinquante de haut. Il l’avait fait installer au milieu du parvis et il se tenait dessus. Là, il se mit à genoux devant toute l’assemblée d’Israël. Il leva les mains vers le ciel '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et pria : Eternel, Dieu d’Israël ! Il n’y a pas de Dieu semblable à toi, ni dans le ciel ni sur la terre ! Tu es fidèle à ton alliance et tu conserves ta bonté à tes serviteurs qui se conduisent selon ta volonté de tout leur cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi tu as tenu la promesse que tu avais faite à ton serviteur David, mon père, oui, tu as agi pour que soit accompli ce que tu lui avais déclaré de ta propre bouche. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A présent, Eternel, Dieu d’Israël, veuille aussi tenir l’autre promesse que tu lui as faite lorsque tu lui as dit : « Il y aura toujours l’un de tes descendants qui siégera sous mon regard sur le trône d’Israël, à condition qu’ils veillent sur leur conduite pour vivre selon ma Loi, comme tu as toi-même vécu selon ma volonté'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2.4
        metadata:
          usfm: 1KI.2.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. » '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, maintenant, Eternel, Dieu d’Israël, daigne réaliser cette promesse que tu as faite à ton serviteur David !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais est-ce qu’en vérité Dieu habiterait avec les hommes sur la terre, alors que le ciel dans toute son immensité ne saurait le contenir ? Combien moins ce temple que je viens de construire ! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Toutefois, Eternel, mon Dieu, veuille être attentif à la prière et à la supplication de ton serviteur et écouter l’appel que je t’adresse ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Que tes yeux veillent jour et nuit sur ce temple, ce lieu où tu as toi-même promis d’établir ta présence ! Et exauce la prière que ton serviteur t’adresse en ce lieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 12.11
        metadata:
          usfm: DEU.12.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Daigne écouter ses supplications et celles de ton peuple Israël lorsqu’il viendra prier ici ! Depuis le lieu où tu demeures, depuis le ciel, entends notre prière et veuille pardonner !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si quelqu’un est accusé d’avoir commis une faute envers son prochain et si l’on exige de lui qu’il prête serment avec des imprécations ici devant ton autel, dans ce temple, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: sois attentif depuis le ciel, interviens et juge tes serviteurs pour faire venir sur le coupable le châtiment que mérite sa conduite, et pour faire reconnaître l’innocence du juste afin qu’il soit traité selon son innocence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si ton peuple Israël est battu par un ennemi, parce que ses membres auront péché contre toi, si ensuite ils reviennent en arrière, s’ils t’adressent leurs louanges, te prient et expriment leurs supplications devant toi, dans ce temple, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: écoute-les depuis le ciel, pardonne le péché de ton peuple Israël et ramène-les dans le pays que tu leur as donné, à eux et à leurs ancêtres !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Quand le ciel sera fermé et refusera de donner la pluie parce que ton peuple aura péché contre toi, si ce peuple prie en ce lieu, s’il te loue et se détourne de ses fautes, après que tu l’as affligé, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: écoute-le depuis le ciel, pardonne le péché de tes serviteurs et de ton peuple Israël, indique-leur la bonne ligne de conduite à suivre, et fais tomber la pluie sur ton pays que tu as donné en possession à ton peuple !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand la famine ou la peste sévira dans le pays, quand les céréales seront atteintes de maladie, quand surviendra une invasion de sauterelles ou de criquets, ou quand ses ennemis assiégeront ton peuple dans son pays, dans les villes fortifiées du pays, quand quelque maladie ou quelque malheur s’abattra sur lui, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'si, considérant sa peine et sa souffrance, chacun tend les mains vers ce temple, veuille exaucer du ciel, le lieu où tu demeures, les prières et les supplications que t’adressera tout homme ou tout ton peuple Israël. Pardonne-leur et traite chacun selon sa conduite, puisque tu connais le cœur de chacun. En effet, toi seul tu connais le cœur des humains. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: De cette manière, ils te craindront et se conduiront comme tu le leur as prescrit tout le temps qu’ils vivront sur l’étendue du territoire que tu as donné à nos ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et même si un étranger qui ne fait pas partie de ton peuple Israël vient d’un pays lointain pour prier dans ce temple parce qu’il aura entendu parler de ta grandeur et de la puissance que tu déploies pour agir, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: veuille l’écouter depuis le ciel, depuis la demeure où tu habites, et lui accorder tout ce qu’il t’aura demandé. De cette manière, tous les peuples du monde te connaîtront, ils te craindront comme le fait ton peuple Israël, et ils reconnaîtront que le temple que j’ai construit t’appartient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lorsque ton peuple partira pour combattre ses ennemis, sur le chemin où tu l’enverras, s’il te prie en se tournant vers cette ville que tu as choisie et vers ce temple que j’ai construit en ton honneur, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: daigne écouter depuis le ciel leurs prières et leurs supplications et défendre leur cause !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il se peut qu’ils commettent un péché contre toi – car quel est l’homme qui ne commet jamais de péché ? – Alors tu seras irrité contre eux, tu les livreras au pouvoir de leurs ennemis qui les emmèneront en captivité dans un pays étranger, proche ou lointain. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'S’ils se mettent à réfléchir dans le pays où ils auront été déportés, s’ils reviennent en arrière et t’adressent leurs supplications dans le pays de leur captivité et qu’ils disent : « Nous avons péché, nous avons mal agi, nous sommes coupables », '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 's’ils reviennent à toi de tout leur cœur et de tout leur être, dans le pays de leur captivité où ils auront été déportés, et s’ils prient en se tournant vers le pays que tu as donné à leurs ancêtres, vers la ville que tu as choisie et vers le temple que j’ai construit en ton honneur, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'alors depuis le ciel, la demeure où tu habites, veuille écouter leur prière et leurs supplications, et défendre leur cause ! Pardonne à ton peuple les péchés qu’il aura commis contre toi ! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Désormais donc, mon Dieu, veuille écouter attentivement et considérer favorablement toute prière faite en ce lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Et maintenant, ô Dieu, ╵Eternel, lève-toi ╵et viens dans le lieu de ta paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô viens avec ton coffre ╵d’où rayonne ta force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes prêtres, ╵Eternel Dieu, ╵se parent du salut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui te sont attachés ╵poussent des cris de joie, ╵et qu’ils jouissent du bonheur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 41-42 sont parallèles au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132.8-10
        metadata:
          usfm: PSA.132.8+PSA.132.9+PSA.132.10
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Eternel Dieu, ╵n’écarte pas le roi ╵qui a reçu l’onction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veuille te souvenir ╵de ce que, dans ta bienveillance, ╵tu avais promis à David, ╵ton serviteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La fin de ce verset reprend '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 55.3
        metadata:
          usfm: ISA.55.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
