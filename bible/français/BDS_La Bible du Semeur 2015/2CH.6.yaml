document_id: 2CH.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salomon loue l’Eternel
  - type: text
    content: 'Alors Salomon dit : L’Eternel a déclaré qu’il demeurerait dans un lieu obscur. '
  '10':
  - type: text
    content: 'L’Eternel a tenu sa promesse : j’ai succédé à mon père David et j’occupe le trône d’Israël, comme l’Eternel l’avait annoncé, et j’ai construit ce temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  '11':
  - type: text
    content: J’y ai déposé le coffre qui contient le code de l’alliance de l’Eternel, cette alliance qu’il a conclue avec les Israélites.
  - type: heading
    content: La prière d’intercession de Salomon
  - type: heading
    content: (1 R 8.22-53)
  '12':
  - type: text
    content: 'Puis Salomon se plaça devant l’autel de l’Eternel, en faisant face à toute l’assemblée d’Israël. Il leva les mains pour prier. '
  '13':
  - type: text
    content: 'En effet, Salomon avait fait construire une estrade de bronze, ayant une forme carrée, de deux mètres cinquante de côté et d’un mètre cinquante de haut. Il l’avait fait installer au milieu du parvis et il se tenait dessus. Là, il se mit à genoux devant toute l’assemblée d’Israël. Il leva les mains vers le ciel '
  '14':
  - type: text
    content: 'et pria : Eternel, Dieu d’Israël ! Il n’y a pas de Dieu semblable à toi, ni dans le ciel ni sur la terre ! Tu es fidèle à ton alliance et tu conserves ta bonté à tes serviteurs qui se conduisent selon ta volonté de tout leur cœur. '
  '15':
  - type: text
    content: 'Ainsi tu as tenu la promesse que tu avais faite à ton serviteur David, mon père, oui, tu as agi pour que soit accompli ce que tu lui avais déclaré de ta propre bouche. '
  '16':
  - type: text
    content: 'A présent, Eternel, Dieu d’Israël, veuille aussi tenir l’autre promesse que tu lui as faite lorsque tu lui as dit : « Il y aura toujours l’un de tes descendants qui siégera sous mon regard sur le trône d’Israël, à condition qu’ils veillent sur leur conduite pour vivre selon ma Loi, comme tu as toi-même vécu selon ma volonté'
  - type: note
    content: Voir 1 R 2.4.
  - type: text
    content: '. » '
  '17':
  - type: text
    content: Oui, maintenant, Eternel, Dieu d’Israël, daigne réaliser cette promesse que tu as faite à ton serviteur David !
  '18':
  - type: text
    content: 'Mais est-ce qu’en vérité Dieu habiterait avec les hommes sur la terre, alors que le ciel dans toute son immensité ne saurait le contenir ? Combien moins ce temple que je viens de construire ! '
  '19':
  - type: text
    content: 'Toutefois, Eternel, mon Dieu, veuille être attentif à la prière et à la supplication de ton serviteur et écouter l’appel que je t’adresse ! '
  '2':
  - type: text
    content: Et moi, j’ai bâti pour toi une résidence, un lieu où tu habiteras éternellement.
  '20':
  - type: text
    content: Que tes yeux veillent jour et nuit sur ce temple, ce lieu où tu as toi-même promis d’établir ta présence ! Et exauce la prière que ton serviteur t’adresse en ce lieu
  - type: note
    content: Voir Dt 12.11.
  - type: text
    content: '  ! '
  '21':
  - type: text
    content: Daigne écouter ses supplications et celles de ton peuple Israël lorsqu’il viendra prier ici ! Depuis le lieu où tu demeures, depuis le ciel, entends notre prière et veuille pardonner !
  '22':
  - type: text
    content: 'Si quelqu’un est accusé d’avoir commis une faute envers son prochain et si l’on exige de lui qu’il prête serment avec des imprécations ici devant ton autel, dans ce temple, '
  '23':
  - type: text
    content: sois attentif depuis le ciel, interviens et juge tes serviteurs pour faire venir sur le coupable le châtiment que mérite sa conduite, et pour faire reconnaître l’innocence du juste afin qu’il soit traité selon son innocence.
  '24':
  - type: text
    content: 'Si ton peuple Israël est battu par un ennemi, parce que ses membres auront péché contre toi, si ensuite ils reviennent en arrière, s’ils t’adressent leurs louanges, te prient et expriment leurs supplications devant toi, dans ce temple, '
  '25':
  - type: text
    content: écoute-les depuis le ciel, pardonne le péché de ton peuple Israël et ramène-les dans le pays que tu leur as donné, à eux et à leurs ancêtres !
  '26':
  - type: text
    content: 'Quand le ciel sera fermé et refusera de donner la pluie parce que ton peuple aura péché contre toi, si ce peuple prie en ce lieu, s’il te loue et se détourne de ses fautes, après que tu l’as affligé, '
  '27':
  - type: text
    content: écoute-le depuis le ciel, pardonne le péché de tes serviteurs et de ton peuple Israël, indique-leur la bonne ligne de conduite à suivre, et fais tomber la pluie sur ton pays que tu as donné en possession à ton peuple !
  '28':
  - type: text
    content: 'Quand la famine ou la peste sévira dans le pays, quand les céréales seront atteintes de maladie, quand surviendra une invasion de sauterelles ou de criquets, ou quand ses ennemis assiégeront ton peuple dans son pays, dans les villes fortifiées du pays, quand quelque maladie ou quelque malheur s’abattra sur lui, '
  '29':
  - type: text
    content: 'si, considérant sa peine et sa souffrance, chacun tend les mains vers ce temple, veuille exaucer du ciel, le lieu où tu demeures, les prières et les supplications que t’adressera tout homme ou tout ton peuple Israël. Pardonne-leur et traite chacun selon sa conduite, puisque tu connais le cœur de chacun. En effet, toi seul tu connais le cœur des humains. '
  '3':
  - type: text
    content: 'Puis le roi se retourna et bénit toute l’assemblée d’Israël qui se tenait debout. '
  '31':
  - type: text
    content: De cette manière, ils te craindront et se conduiront comme tu le leur as prescrit tout le temps qu’ils vivront sur l’étendue du territoire que tu as donné à nos ancêtres.
  '32':
  - type: text
    content: 'Et même si un étranger qui ne fait pas partie de ton peuple Israël vient d’un pays lointain pour prier dans ce temple parce qu’il aura entendu parler de ta grandeur et de la puissance que tu déploies pour agir, '
  '33':
  - type: text
    content: veuille l’écouter depuis le ciel, depuis la demeure où tu habites, et lui accorder tout ce qu’il t’aura demandé. De cette manière, tous les peuples du monde te connaîtront, ils te craindront comme le fait ton peuple Israël, et ils reconnaîtront que le temple que j’ai construit t’appartient.
  '34':
  - type: text
    content: 'Lorsque ton peuple partira pour combattre ses ennemis, sur le chemin où tu l’enverras, s’il te prie en se tournant vers cette ville que tu as choisie et vers ce temple que j’ai construit en ton honneur, '
  '35':
  - type: text
    content: daigne écouter depuis le ciel leurs prières et leurs supplications et défendre leur cause !
  '36':
  - type: text
    content: 'Il se peut qu’ils commettent un péché contre toi – car quel est l’homme qui ne commet jamais de péché ? – Alors tu seras irrité contre eux, tu les livreras au pouvoir de leurs ennemis qui les emmèneront en captivité dans un pays étranger, proche ou lointain. '
  '37':
  - type: text
    content: 'S’ils se mettent à réfléchir dans le pays où ils auront été déportés, s’ils reviennent en arrière et t’adressent leurs supplications dans le pays de leur captivité et qu’ils disent : « Nous avons péché, nous avons mal agi, nous sommes coupables », '
  '38':
  - type: text
    content: 's’ils reviennent à toi de tout leur cœur et de tout leur être, dans le pays de leur captivité où ils auront été déportés, et s’ils prient en se tournant vers le pays que tu as donné à leurs ancêtres, vers la ville que tu as choisie et vers le temple que j’ai construit en ton honneur, '
  '39':
  - type: text
    content: 'alors depuis le ciel, la demeure où tu habites, veuille écouter leur prière et leurs supplications, et défendre leur cause ! Pardonne à ton peuple les péchés qu’il aura commis contre toi ! '
  '4':
  - type: text
    content: 'Il dit : Béni soit l’Eternel, le Dieu d’Israël, qui a, de sa propre bouche, parlé à mon père David, et qui a agi pour accomplir la promesse qu’il lui avait faite. Il lui avait dit'
  - type: note
    content: Pour les v. 4-9, voir 1 Ch 17.1-12 ; 2 S 7.1-13.
  - type: text
    content: '  : '
  '40':
  - type: text
    content: Désormais donc, mon Dieu, veuille écouter attentivement et considérer favorablement toute prière faite en ce lieu.
  '41':
  - type: text
    content: Et maintenant, ô Dieu, ╵Eternel, lève-toi ╵et viens dans le lieu de ta paix,
  - type: text
    content: ô viens avec ton coffre ╵d’où rayonne ta force
  - type: text
    content: et que tes prêtres, ╵Eternel Dieu, ╵se parent du salut.
  - type: text
    content: Que ceux qui te sont attachés ╵poussent des cris de joie, ╵et qu’ils jouissent du bonheur
  - type: note
    content: Les v. 41-42 sont parallèles au Ps 132.8-10.
  - type: text
    content: '  !'
  '42':
  - type: text
    content: Eternel Dieu, ╵n’écarte pas le roi ╵qui a reçu l’onction.
  - type: text
    content: Veuille te souvenir ╵de ce que, dans ta bienveillance, ╵tu avais promis à David, ╵ton serviteur
  - type: note
    content: La fin de ce verset reprend Es 55.3.
  - type: text
    content: .
  '5':
  - type: text
    content: « Depuis le jour où j’ai fait sortir mon peuple d’Egypte, je n’ai jamais choisi une ville particulière parmi toutes les tribus d’Israël pour qu’on y bâtisse un temple où je sois présent, et je n’ai pas choisi un homme pour qu’il soit le chef de mon peuple Israël
  - type: note
    content: Dieu avait désigné à plusieurs reprises des chefs temporaires pour Israël, mais jusqu’au temps de David, il n’avait jamais établi de monarchie permanente et héréditaire.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Mais voici que j’ai élu Jérusalem pour y établir ma présence, et j’ai choisi David pour gouverner mon peuple Israël ! » '
  '7':
  - type: text
    content: 'Mon père David avait à cœur de bâtir un temple en l’honneur de l’Eternel, le Dieu d’Israël. '
  '8':
  - type: text
    content: 'Mais l’Eternel lui a déclaré : « Ton projet de bâtir un temple en mon honneur est une excellente chose : tu as bien fait de prendre cela à cœur. '
  '9':
  - type: text
    content: 'Toutefois, ce n’est pas toi qui bâtiras ce temple, c’est ton propre fils qui le bâtira pour moi. » '
