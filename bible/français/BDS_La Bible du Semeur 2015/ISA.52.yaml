document_id: ISA.52,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jérusalem rétablie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Réveille-toi, ╵réveille-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion, pare-toi de ta force !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets tes vêtements d’apparat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem, ô ville sainte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car désormais ╵ni l’incirconcis ni l’impur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’entreront plus chez toi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a manifesté ╵sa puissance et sa sainteté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux yeux de toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les confins de la terre ╵verront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la délivrance ╵qu’apporte notre Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Partez, partez, ╵sortez de là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne touchez rien d’impur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 6.17
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sortez de cette ville !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purifiez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui portez les ustensiles ╵de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire les ustensiles sacrés du culte que les Babyloniens avaient emportés lors de la destruction du temple de Jérusalem en 587 et que les exilés ramèneront. Les lévites ne devaient rien toucher d’impur, rien qui ait rapport aux pratiques idolâtres des païens (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 4.24-28
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  !'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ne sortirez pas ╵en courant à la hâte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pas comme lors de la sortie d’Egypte.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous ne marcherez pas ╵comme des fugitifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l’Eternel ╵marchera devant vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le Dieu d’Israël ╵fermera votre marche.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le quatrième chant du Serviteur
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, mon serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: agira en toute sagesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: réussira.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera haut placé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: très élevé, ╵grandement exalté.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beaucoup ont été horrifiés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tellement son visage ╵était défiguré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tant son apparence ╵n’avait plus rien d’humain.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il accomplira le rite ╵de l’aspersion ╵pour des peuples nombreux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine. Les versions ont compris : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de même, de nombreux peuples s’émerveilleront à son sujet.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois, à son sujet, ╵resteront bouche close,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils verront eux-mêmes ╵ce qui ne leur avait ╵pas été raconté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils comprendront ╵ce qui ne leur avait ╵pas été annoncé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 15.21
        - type: text
          text: ', d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Secoue donc ta poussière, ╵relève-toi, Jérusalem, ╵installe-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délivre-toi des chaînes ╵qui enserrent ton cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es prisonnière, ╵Dame Sion !
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici ce que l’Eternel déclare : Puisqu’on vous a vendus pour rien, ce sera sans argent qu’on vous libérera. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car voici ce que déclare le Seigneur, l’Eternel : Mon peuple est tout d’abord descendu en Egypte afin d’y séjourner, ensuite l’Assyrien l’a opprimé sans cause. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais à présent ici, qu’est-ce que j’ai à faire ? demande l’Eternel. Puisque mon peuple a été pris pour rien, ses oppresseurs se vantent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: poussent des cris.
      marker-yv: yv-n
    - type: text
      text: ', déclare l’Eternel, et, à longueur de jour, mon nom est outragé'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 2.24
        - type: text
          text: ' d’après l’ancienne version grecque.'
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi mon peuple va savoir qui je suis. Oui, il saura en ce jour-là que c’est moi qui ai dit : Je viens !'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu délivre
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme il est beau de voir ╵sur les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pas du messager ╵d’une bonne nouvelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui annonce la paix
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir Na 2.1 ; Ep 6.15. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 10.15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui parle de bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui annonce le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui dit à Sion : « Ton Dieu règne. »'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend tes guetteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils élèvent la voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils crient de joie ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car de leurs propres yeux ils voient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel arriver ╵de nouveau à Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu de Qumrân ajoute ici : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec amour.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez des cris de joie, ╵ensemble faites éclater ╵votre allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, ruines de Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel ╵a consolé son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et délivré Jérusalem.
