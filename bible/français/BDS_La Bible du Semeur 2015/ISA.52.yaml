document_id: ISA.52,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem rétablie
  - type: text
    content: Réveille-toi, ╵réveille-toi,
  - type: text
    content: Sion, pare-toi de ta force !
  - type: text
    content: Mets tes vêtements d’apparat,
  - type: text
    content: Jérusalem, ô ville sainte !
  - type: text
    content: Car désormais ╵ni l’incirconcis ni l’impur
  - type: text
    content: n’entreront plus chez toi.
  '10':
  - type: text
    content: L’Eternel a manifesté ╵sa puissance et sa sainteté
  - type: text
    content: aux yeux de toutes les nations,
  - type: text
    content: et tous les confins de la terre ╵verront
  - type: text
    content: la délivrance ╵qu’apporte notre Dieu.
  '11':
  - type: text
    content: Partez, partez, ╵sortez de là,
  - type: text
    content: ne touchez rien d’impur
  - type: note
    content: Cité en 2 Co 6.17 d’après l’ancienne version grecque.
  - type: text
    content: '  !'
  - type: text
    content: Sortez de cette ville !
  - type: text
    content: Purifiez-vous,
  - type: text
    content: vous qui portez les ustensiles ╵de l’Eternel
  - type: note
    content: C’est-à-dire les ustensiles sacrés du culte que les Babyloniens avaient emportés lors de la destruction du temple de Jérusalem en 587 et que les exilés ramèneront. Les lévites ne devaient rien toucher d’impur, rien qui ait rapport aux pratiques idolâtres des païens (voir Nb 4.24-28).
  - type: text
    content: '  !'
  '12':
  - type: text
    content: Vous ne sortirez pas ╵en courant à la hâte
  - type: note
    content: Pas comme lors de la sortie d’Egypte.
  - type: text
    content: ','
  - type: text
    content: vous ne marcherez pas ╵comme des fugitifs,
  - type: text
    content: car l’Eternel ╵marchera devant vous,
  - type: text
    content: et le Dieu d’Israël ╵fermera votre marche.
  - type: heading
    content: Le quatrième chant du Serviteur
  '13':
  - type: text
    content: Voici, mon serviteur
  - type: text
    content: agira en toute sagesse
  - type: note
    content: 'Autre traduction : réussira.'
  - type: text
    content: ','
  - type: text
    content: il sera haut placé,
  - type: text
    content: très élevé, ╵grandement exalté.
  '14':
  - type: text
    content: Beaucoup ont été horrifiés
  - type: text
    content: tellement son visage ╵était défiguré
  - type: text
    content: et tant son apparence ╵n’avait plus rien d’humain.
  '15':
  - type: text
    content: Car il accomplira le rite ╵de l’aspersion ╵pour des peuples nombreux
  - type: note
    content: 'Traduction incertaine. Les versions ont compris : de même, de nombreux peuples s’émerveilleront à son sujet.'
  - type: text
    content: .
  - type: text
    content: Les rois, à son sujet, ╵resteront bouche close,
  - type: text
    content: car ils verront eux-mêmes ╵ce qui ne leur avait ╵pas été raconté,
  - type: text
    content: ils comprendront ╵ce qui ne leur avait ╵pas été annoncé
  - type: note
    content: Cité en Rm 15.21, d’après l’ancienne version grecque.
  - type: text
    content: .
  '2':
  - type: text
    content: Secoue donc ta poussière, ╵relève-toi, Jérusalem, ╵installe-toi,
  - type: text
    content: délivre-toi des chaînes ╵qui enserrent ton cou,
  - type: text
    content: toi qui es prisonnière, ╵Dame Sion !
  '3':
  - type: text
    content: 'Car voici ce que l’Eternel déclare : Puisqu’on vous a vendus pour rien, ce sera sans argent qu’on vous libérera. '
  '4':
  - type: text
    content: 'Car voici ce que déclare le Seigneur, l’Eternel : Mon peuple est tout d’abord descendu en Egypte afin d’y séjourner, ensuite l’Assyrien l’a opprimé sans cause. '
  '5':
  - type: text
    content: Mais à présent ici, qu’est-ce que j’ai à faire ? demande l’Eternel. Puisque mon peuple a été pris pour rien, ses oppresseurs se vantent
  - type: note
    content: 'D’après le texte hébreu de Qumrân. Le texte hébreu traditionnel a : poussent des cris.'
  - type: text
    content: ', déclare l’Eternel, et, à longueur de jour, mon nom est outragé'
  - type: note
    content: Cité en Rm 2.24 d’après l’ancienne version grecque.
  - type: text
    content: '  ! '
  '6':
  - type: text
    content: 'C’est pourquoi mon peuple va savoir qui je suis. Oui, il saura en ce jour-là que c’est moi qui ai dit : Je viens !'
  - type: heading
    content: Dieu délivre
  '7':
  - type: text
    content: Comme il est beau de voir ╵sur les montagnes
  - type: text
    content: les pas du messager ╵d’une bonne nouvelle,
  - type: text
    content: qui annonce la paix
  - type: note
    content: Voir Na 2.1 ; Ep 6.15. Cité en Rm 10.15.
  - type: text
    content: ','
  - type: text
    content: qui parle de bonheur,
  - type: text
    content: et qui annonce le salut,
  - type: text
    content: 'qui dit à Sion : « Ton Dieu règne. »'
  '8':
  - type: text
    content: On entend tes guetteurs,
  - type: text
    content: ils élèvent la voix,
  - type: text
    content: ils crient de joie ensemble
  - type: text
    content: car de leurs propres yeux ils voient
  - type: text
    content: l’Eternel arriver ╵de nouveau à Sion
  - type: note
    content: 'Le texte hébreu de Qumrân ajoute ici : avec amour.'
  - type: text
    content: .
  '9':
  - type: text
    content: Poussez des cris de joie, ╵ensemble faites éclater ╵votre allégresse,
  - type: text
    content: vous, ruines de Jérusalem !
  - type: text
    content: Car l’Eternel ╵a consolé son peuple
  - type: text
    content: et délivré Jérusalem.
