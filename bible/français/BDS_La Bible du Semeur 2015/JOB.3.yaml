document_id: JOB.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours de Job et de ses trois amis
  - type: heading
    content: Job maudit le jour de sa naissance
  - type: text
    content: Après cela, Job prit la parole et se mit à maudire le jour de sa naissance
  - type: note
    content: Voir Jr 20.14-18.
  - type: text
    content: '. '
  '10':
  - type: text
    content: pour n’avoir pas fermé ╵le ventre maternel
  - type: text
    content: et n’avoir pas caché ╵le malheur à mes yeux !
  '11':
  - type: text
    content: Pourquoi ne suis-je donc pas mort ╵dans le sein de ma mère ?
  - type: text
    content: Pourquoi n’ai-je pas expiré ╵en sortant de ses flancs ?
  '12':
  - type: text
    content: Pourquoi ai-je trouvé ╵deux genoux accueillants
  - type: text
    content: et une mère ╵pour me donner le sein ?
  '13':
  - type: text
    content: Car maintenant ╵je serais couché, et tranquille,
  - type: text
    content: je dormirais ╵je me reposerais
  '14':
  - type: text
    content: en compagnie des rois ╵et des grands de la terre
  - type: text
    content: qui s’étaient fait bâtir ╵de vastes monuments ╵dont il ne reste que des ruines,
  '15':
  - type: text
    content: avec les chefs des princes, ╵ceux qui détenaient l’or
  - type: text
    content: et entassaient l’argent ╵dans leurs demeures.
  '16':
  - type: text
    content: Je n’existerais pas ╵tel l’avorton ╵enfoui sous terre,
  - type: text
    content: tel un enfant ╵qui n’a pas vu le jour.
  '17':
  - type: text
    content: Là, ceux qui sont méchants ╵cessent de tourmenter,
  - type: text
    content: et ceux qui sont à bout de forces ╵peuvent se reposer.
  '18':
  - type: text
    content: Les prisonniers, de même, ╵se trouvent là paisibles
  - type: text
    content: car ils n’entendent plus ╵la voix de l’oppresseur,
  '19':
  - type: text
    content: petits et grands sont là,
  - type: text
    content: et de son maître ╵l’esclave est affranchi.
  '2':
  - type: text
    content: 'Il parla en ces termes :'
  '20':
  - type: text
    content: Pourquoi, oui, pourquoi donc ╵donne-t-il la lumière ╵à ceux qui souffrent ?
  - type: text
    content: Pourquoi donner la vie ╵aux hommes accablés ?
  '21':
  - type: text
    content: Ils attendent la mort ╵et elle ne vient pas,
  - type: text
    content: alors qu’ils la recherchent ╵plus que tous les trésors,
  '22':
  - type: text
    content: ils seraient pleins de joie ╵et ils jubileraient
  - type: text
    content: s’ils trouvaient le tombeau.
  '23':
  - type: text
    content: Pourquoi donner la vie ╵à l’homme qui ne voit ╵aucune route à suivre
  - type: text
    content: parce que Dieu lui-même ╵le cerne de tous les côtés ?
  '24':
  - type: text
    content: Car mes gémissements ╵ont remplacé mon pain
  - type: text
    content: et mes cris de douleur ╵déferlent comme l’eau.
  '25':
  - type: text
    content: Tout ce que je redoute, ╵c’est cela qui m’arrive,
  - type: text
    content: les maux que je craignais ╵ont tous fondu sur moi.
  '26':
  - type: text
    content: Je n’ai plus de tranquillité, ╵pas de relâche, ╵pas de repos.
  - type: text
    content: Je suis sans cesse en proie ╵à de nouveaux tourments.
  '3':
  - type: text
    content: Que périsse le jour ╵où je fus enfanté
  - type: text
    content: 'et la nuit qui a dit : ╵« Un garçon est conçu ! »'
  '4':
  - type: text
    content: Ce jour, ╵qu’il se change en ténèbres,
  - type: text
    content: que Dieu là-haut ╵ne s’en occupe plus,
  - type: text
    content: oui, que nulle clarté ╵ne rayonne sur lui !
  '5':
  - type: text
    content: Qu’une profonde obscurité, ╵et d’épaisses ténèbres, ╵le réclament pour elles !
  - type: text
    content: Que des nuées pèsent sur lui,
  - type: text
    content: que des éclipses de soleil
  - type: note
    content: 'éclipses de soleil: selon une légère variante d’orthographe. Objet de terreur, souvent mauvais présage. D’autres traduisent : sombres événements, ténèbres.'
  - type: text
    content: ' ╵le chargent d’épouvante !'
  '6':
  - type: text
    content: Oh ! que l’obscurité ╵saisisse cette nuit,
  - type: text
    content: qu’elle n’ait pas sa place ╵au milieu des jours de l’année
  - type: text
    content: et qu’elle n’entre point ╵dans le compte des mois !
  '7':
  - type: text
    content: Que cette nuit-là soit stérile
  - type: text
    content: et que nul cri de joie ╵n’y résonne jamais.
  '8':
  - type: text
    content: Oui, que cette nuit-là ╵fasse l’objet d’incantations ╵de ceux qui maudissent les jours
  - type: text
    content: et savent réveiller ╵le grand monstre marin
  - type: note
    content: 'En 40.25 à 41.26, ce monstre marin (en hébreu : léviathan) sert à décrire le crocodile. Au Ps 74.14, il désigne l’Egypte, et en Es 27.1 l’ennemi de Dieu, la puissance maléfique qui se cache derrière le paganisme et qu’on retrouve dans les récits mythologiques du Moyen-Orient ancien. Ce monstre marin est aussi appelé Rahav en hébreu (note 9.13 ; Ps 89.11 ; Es 51.9) ou tannîn (Ps 74.13 ; Es 51.9). Job livre ainsi « sa » nuit à ceux qui possèdent les pouvoirs occultes les plus inquiétants.'
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Que les ténèbres masquent ╵ses astres du matin !
  - type: text
    content: Oui, qu’elle attende en vain ╵la lumière du jour
  - type: text
    content: et qu’elle ne voie pas ╵l’aurore s’éveiller,
