document_id: JOB.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Discours de Job et de ses trois amis
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job maudit le jour de sa naissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après cela, Job prit la parole et se mit à maudire le jour de sa naissance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 20.14-18
        metadata:
          usfm: JER.20.14+JER.20.15+JER.20.16+JER.20.17+JER.20.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il parla en ces termes :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que périsse le jour ╵où je fus enfanté
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et la nuit qui a dit : ╵« Un garçon est conçu ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce jour, ╵qu’il se change en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que Dieu là-haut ╵ne s’en occupe plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, que nulle clarté ╵ne rayonne sur lui !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu’une profonde obscurité, ╵et d’épaisses ténèbres, ╵le réclament pour elles !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que des nuées pèsent sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que des éclipses de soleil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: éclipses de soleil
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon une légère variante d’orthographe. Objet de terreur, souvent mauvais présage. D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sombres événements, ténèbres.
    marker-yv: yv-n
  - type: text
    text: ' ╵le chargent d’épouvante !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oh ! que l’obscurité ╵saisisse cette nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’elle n’ait pas sa place ╵au milieu des jours de l’année
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elle n’entre point ╵dans le compte des mois !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que cette nuit-là soit stérile
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que nul cri de joie ╵n’y résonne jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, que cette nuit-là ╵fasse l’objet d’incantations ╵de ceux qui maudissent les jours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et savent réveiller ╵le grand monstre marin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40.25'
        metadata:
          usfm: JOB.40.25
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41.26'
        metadata:
          usfm: JOB.41.26
      - type: text
        text: ', ce monstre marin (en hébreu : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: léviathan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') sert à décrire le crocodile. Au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 74.14
        metadata:
          usfm: PSA.74.14
      - type: text
        text: ', il désigne l’Egypte, et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 27.1
        metadata:
          usfm: ISA.27.1
      - type: text
        text: ' l’ennemi de Dieu, la puissance maléfique qui se cache derrière le paganisme et qu’on retrouve dans les récits mythologiques du Moyen-Orient ancien. Ce monstre marin est aussi appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rahav '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en hébreu (note 9.13 ; Ps 89.11 ; Es 51.9) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tannîn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ps 74.13 ; Es 51.9). Job livre ainsi « sa » nuit à ceux qui possèdent les pouvoirs occultes les plus inquiétants.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que les ténèbres masquent ╵ses astres du matin !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, qu’elle attende en vain ╵la lumière du jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elle ne voie pas ╵l’aurore s’éveiller,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: pour n’avoir pas fermé ╵le ventre maternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’avoir pas caché ╵le malheur à mes yeux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pourquoi ne suis-je donc pas mort ╵dans le sein de ma mère ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi n’ai-je pas expiré ╵en sortant de ses flancs ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pourquoi ai-je trouvé ╵deux genoux accueillants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une mère ╵pour me donner le sein ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car maintenant ╵je serais couché, et tranquille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dormirais ╵je me reposerais
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: en compagnie des rois ╵et des grands de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s’étaient fait bâtir ╵de vastes monuments ╵dont il ne reste que des ruines,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: avec les chefs des princes, ╵ceux qui détenaient l’or
- type: usfm
  marker: q1
  children:
  - type: text
    text: et entassaient l’argent ╵dans leurs demeures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je n’existerais pas ╵tel l’avorton ╵enfoui sous terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel un enfant ╵qui n’a pas vu le jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Là, ceux qui sont méchants ╵cessent de tourmenter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui sont à bout de forces ╵peuvent se reposer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les prisonniers, de même, ╵se trouvent là paisibles
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils n’entendent plus ╵la voix de l’oppresseur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: petits et grands sont là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de son maître ╵l’esclave est affranchi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourquoi, oui, pourquoi donc ╵donne-t-il la lumière ╵à ceux qui souffrent ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi donner la vie ╵aux hommes accablés ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils attendent la mort ╵et elle ne vient pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu’ils la recherchent ╵plus que tous les trésors,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ils seraient pleins de joie ╵et ils jubileraient
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’ils trouvaient le tombeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Pourquoi donner la vie ╵à l’homme qui ne voit ╵aucune route à suivre
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que Dieu lui-même ╵le cerne de tous les côtés ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Car mes gémissements ╵ont remplacé mon pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes cris de douleur ╵déferlent comme l’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tout ce que je redoute, ╵c’est cela qui m’arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les maux que je craignais ╵ont tous fondu sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je n’ai plus de tranquillité, ╵pas de relâche, ╵pas de repos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis sans cesse en proie ╵à de nouveaux tourments.
