document_id: NUM.22
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Péché d’Israël dans les steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam et Balaq
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Balaq, roi de Moab, fait appel à Balaam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les Israélites repartirent et campèrent dans les steppes de Moab à l’est du Jourdain, vis-à-vis de Jéricho
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Suite de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21.20'
        metadata:
          usfm: NUM.21.20
      - type: text
        text: . Les Israélites redescendent depuis Edréi en Basan en direction de la mer Morte à l’est de laquelle se trouve le royaume de Moab. Le roi de Moab ne connaît pas les intentions des Israélites et, pris de panique, fait appel à Balaam. Le livre de Josué reprendra le récit de la conquête de Canaan à ce point.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balaq, fils de Tsippor, avait appris tout ce qu’Israël avait fait aux Amoréens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors les gens de Moab furent pris de panique en face d’un peuple si nombreux, ils furent épouvantés devant les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils eurent une entrevue avec les responsables des Madianites et leur dirent : Cette multitude va venir ravager tout le pays d’alentour comme des bœufs qui broutent l’herbe des champs.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A cette époque-là, Balaq, fils de Tsippor, régnait sur Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il envoya des messagers à Balaam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 P 2.15-16 ; Jd 11.
    marker-yv: yv-n
  - type: text
    text: ', fils de Béor, qui vivait à Petor sur l’Euphrate, son pays d’origine, pour le faire venir, en lui disant : Voici qu’un peuple est sorti d’Egypte ! Il envahit toute la région et il s’est installé vis-à-vis de mon pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maintenant, viens, je te prie ! Maudis-moi ce peuple, car il est plus fort que moi. Peut-être parviendrai-je alors à le battre et à le chasser du pays, car je le sais, celui que tu bénis est béni, et celui que tu maudis est maudit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les responsables de Moab et ceux de Madian partirent en emportant des présents pour payer le devin. Ils arrivèrent chez Balaam et lui transmirent le message de Balaq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Balaam leur répondit : Restez ici cette nuit, et demain je vous donnerai ma réponse, selon ce que l’Eternel me dira.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Les chefs moabites logèrent donc chez Balaam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu vint trouver Balaam et lui demanda : Qui sont ces gens qui logent chez toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Balaam lui répondit : Ce sont les envoyés de Balaq, fils de Tsippor, roi de Moab, qui m’a fait dire : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: « Le peuple qui est sorti d’Egypte envahit maintenant le pays ! Viens donc le maudire pour moi ; peut-être arriverai-je alors à le combattre et à le chasser ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais Dieu dit à Balaam : Ne va pas avec eux. Tu ne maudiras pas ce peuple, car il est béni.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le lendemain, Balaam alla déclarer aux chefs envoyés par Balaq : Retournez dans votre pays, car l’Eternel ne me permet pas de partir avec vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les chefs de Moab se levèrent et retournèrent auprès de Balaq pour lui dire : Balaam a refusé de venir avec nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Balaq revint à la charge et envoya une nouvelle délégation composée de princes plus nombreux et plus importants que la première fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils arrivèrent chez Balaam et lui dirent : Ainsi parle Balaq, fils de Tsippor : « De grâce, ne refuse pas de me venir en aide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je te comblerai d’honneurs et je ferai tout ce que tu me demanderas. Mais viens donc, maudis-moi ce peuple ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Balaam répondit aux serviteurs de Balaq : Même si Balaq me donnait son palais rempli d’argent et d’or, je ne pourrais pas transgresser l’ordre de l’Eternel, mon Dieu, même pour une petite chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pourtant, restez ici cette nuit, vous aussi, pour que je puisse savoir ce que l’Eternel a encore à me dire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pendant la nuit, Dieu vint vers Balaam et lui dit : Si c’est pour t’inviter à les accompagner que ces hommes sont venus, vas-y, pars avec eux. Mais tu ne pourras faire que ce que je te dirai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le lendemain, Balaam alla seller son ânesse et partit avec les princes de Moab.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’intervention de l’ange de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu se mit en colère parce qu’il avait entrepris ce déplacement, et l’ange de l’Eternel se posta en travers du chemin pour lui barrer le passage. Or, Balaam montait son ânesse et était accompagné de deux serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors, l’ânesse vit l’ange de l’Eternel posté sur le chemin, son épée dégainée à la main. Elle se détourna du chemin et prit à travers champs. Balaam se mit à la frapper pour la ramener sur le chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors l’ange de l’Eternel se plaça dans un chemin creux passant dans les vignes entre deux murets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’ânesse vit l’ange de l’Eternel et elle rasa le mur, de sorte qu’elle serra le pied de Balaam contre le mur. Celui-ci recommença à la battre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’ange de l’Eternel les dépassa encore une fois et vint se poster dans un passage étroit où l’on ne pouvait l’éviter ni à droite ni à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’ânesse vit l’ange de l’Eternel et elle s’affaissa sous son maître. Balaam se mit en colère et lui administra une volée de coups de bâton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors l’Eternel fit parler l’ânesse, qui dit à Balaam : Que t’ai-je fait pour que tu me battes ainsi par trois fois ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Balaam lui répondit : C’est parce que tu te moques de moi. Ah ! si j’avais une épée sous la main, je t’abattrais sur-le-champ !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’ânesse reprit : Ne suis-je pas ton ânesse qui te sert de monture depuis toujours ? Est-ce que j’ai l’habitude d’agir ainsi avec toi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et il répondit : Non !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors l’Eternel ouvrit les yeux de Balaam, qui vit l’ange de l’Eternel posté sur le chemin, son épée dégainée à la main. Balaam s’agenouilla et se prosterna la face contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L’ange de l’Eternel lui dit : Pourquoi as-tu frappé par trois fois ton ânesse ? C’est moi qui suis venu pour te barrer le passage, car ce voyage a été entrepris à la légère'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte hébreu obscur, traduction incertaine.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: L’ânesse m’a vu et s’est détournée à trois reprises devant moi. Si elle ne s’était pas détournée, je t’aurais déjà abattu, tandis qu’elle, je l’aurais laissée en vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Balaam dit à l’ange de l’Eternel : J’ai tort, car je ne savais pas que tu te tenais devant moi sur le chemin. Et maintenant, si ce voyage te déplaît, je m’en retournerai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’ange de l’Eternel lui dit : Va avec ces hommes, mais tu répéteras seulement les paroles que je te dicterai.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Balaam poursuivit donc la route avec les princes envoyés par Balaq.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Balaam rencontre Balaq
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Lorsque Balaq apprit que Balaam arrivait, il alla à sa rencontre à Ir-Moab située à la limite de son territoire sur la frontière formée par l’Arnon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il lui demanda : N’avais-je pas déjà envoyé une première délégation vers toi pour te faire venir ? Pourquoi n’es-tu pas venu tout de suite chez moi ? As-tu pensé que je ne serais pas capable de te traiter avec honneur ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Balaam répondit à Balaq : Tu le vois, je suis venu vers toi. Maintenant, crois-tu que je pourrai dire quoi que ce soit de moi-même ? Non, je ne pourrai prononcer que les paroles que Dieu lui-même mettra dans ma bouche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Balaam accompagna Balaq, et ils se rendirent à Qiryath-Houtsoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Balaq offrit des bœufs et des moutons en sacrifice et il envoya des parts à Balaam et aux chefs qui étaient venus avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Le lendemain matin, Balaq vint chercher Balaam et le fit monter aux hauts lieux de Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bamot-Baal. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Baal
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'terme qui signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seigneur, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désignation du dieu de l’orage la plus répandue chez les Sémites de Syrie et de Canaan à partir du III
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' millénaire av. J.-C. Les textes le présentent comme un dieu de la nature. Son culte s’accompagnait de pratiques dévoyées.'
    marker-yv: yv-n
  - type: text
    text: ' d’où l’on avait vue sur les dernières lignes du camp d’Israël.'
