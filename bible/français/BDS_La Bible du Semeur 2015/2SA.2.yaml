document_id: 2SA.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David devient roi de Juda à Hébron
  - type: text
    content: 'Après ces événements, David consulta l’Eternel et lui demanda s’il devait aller s’installer dans l’une des villes de Juda. L’Eternel lui répondit : Oui.'
  - type: text
    content: – Dans laquelle dois-je aller ?
  - type: text
    content: – A Hébron.
  '10':
  - type: text
    content: 'Ish-Bosheth, fils de Saül, avait quarante ans quand il devint roi sur Israël et il régna deux ans. Mais la tribu de Juda se rallia à David '
  '11':
  - type: text
    content: qui régna sept ans et six mois à Hébron sur cette tribu.
  - type: heading
    content: La guerre civile
  '12':
  - type: text
    content: Abner, fils de Ner, et les hommes d’Ish-Bosheth, fils de Saül, quittèrent Mahanaïm pour marcher sur Gabaon
  - type: note
    content: A 10 kilomètres au nord-ouest de Jérusalem (voir Jos 9.3). Abner veut empêcher David d’étendre son influence au nord de Juda.
  - type: text
    content: '. '
  '13':
  - type: text
    content: Joab, fils de Tserouya
  - type: note
    content: Joab, comme Abishaï et Asaël (v. 18), était un neveu de David, fils de sa sœur.
  - type: text
    content: ', et les hommes de David se mirent aussi en marche. Les deux troupes se rejoignirent près de l’étang de Gabaon, et elles prirent position l’une en face de l’autre, de part et d’autre de cet étang. '
  '14':
  - type: text
    content: 'Abner proposa à Joab : Que quelques-uns de nos jeunes hommes se mesurent en combat singulier devant nous !'
  - type: text
    content: – D’accord, répondit Joab.
  '15':
  - type: text
    content: 'Douze soldats se présentèrent pour Benjamin et pour Ish-Bosheth, fils de Saül, et douze parmi les hommes de David. '
  '16':
  - type: text
    content: 'Chaque soldat saisit son adversaire par la tête et lui plongea son épée dans le côté, si bien qu’ils tombèrent tous ensemble. On appela cet endroit près de Gabaon : le champ des Rocs'
  - type: note
    content: En hébreu, le mot signifiant roc désigne aussi le tranchant d’une épée.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Alors s’engagea un combat extrêmement violent. Abner et les hommes d’Israël furent battus ce jour-là par les hommes de David. '
  '18':
  - type: text
    content: 'Parmi les combattants se trouvaient les trois fils de Tserouya : Joab, Abishaï et Asaël. Asaël était agile comme une gazelle sauvage. '
  '19':
  - type: text
    content: 'Il se lança à la poursuite d’Abner et le suivit sans dévier ni à droite ni à gauche. '
  '2':
  - type: text
    content: 'David s’y rendit donc avec ses deux femmes Ahinoam de Jizréel et Abigaïl, veuve de Nabal, de Karmel. '
  '20':
  - type: text
    content: 'Abner se retourna et demanda : Est-ce toi, Asaël ?'
  - type: text
    content: – Oui, c’est moi !
  '21':
  - type: text
    content: – Passe à droite ou à gauche, lui dit Abner, attaque l’un de ces jeunes soldats et empare-toi de son équipement !
  - type: text
    content: 'Mais Asaël ne voulut pas le laisser échapper. '
  '22':
  - type: text
    content: 'Abner insista : Cesse de me poursuivre. Pourquoi m’obligerais-tu à t’abattre ? Comment oserais-je ensuite regarder ton frère Joab en face ?'
  '23':
  - type: text
    content: Mais Asaël refusa de le lâcher. Alors Abner lui enfonça la pointe de sa lance dans le ventre et l’arme ressortit par le dos. Asaël s’affaissa sur place et mourut là. Tous ceux qui arrivèrent à l’endroit où Asaël était mort, s’arrêtèrent là.
  '24':
  - type: text
    content: 'Joab et Abishaï continuèrent à poursuivre Abner. Le soleil se couchait quand ils atteignirent la colline d’Amma en face de Guiah, sur le chemin du désert de Gabaon. '
  '25':
  - type: text
    content: 'Alors les Benjaminites se rassemblèrent autour d’Abner en formation serrée et occupèrent le sommet d’une colline. '
  '26':
  - type: text
    content: 'Abner cria en direction de Joab : N’allons-nous pas cesser de nous combattre par l’épée ? Ne comprends-tu pas que tout cela finira par beaucoup d’amertume ? Quand est-ce que tu diras à tes hommes de ne plus poursuivre leurs compatriotes ?'
  '27':
  - type: text
    content: 'Joab répondit : Aussi vrai que Dieu est vivant, je t’assure que si tu n’avais pas parlé ainsi, mes gens vous auraient pourchassés jusqu’à demain matin.'
  '28':
  - type: text
    content: Puis Joab sonna du cor
  - type: note
    content: Marquait le début comme la fin des combats (18.16 ; 20.22).
  - type: text
    content: ', et toute la troupe s’arrêta et cessa de poursuivre et de combattre Israël.'
  '29':
  - type: text
    content: Abner et ses hommes marchèrent toute la nuit dans la vallée du Jourdain, puis ils franchirent le Jourdain et traversèrent le Bitrôn
  - type: note
    content: 'Autres traductions : le ravin ou toute la matinée.'
  - type: text
    content: ' pour arriver à Mahanaïm. '
  '3':
  - type: text
    content: 'Il emmena aussi ses compagnons et leurs familles, et ils s’établirent dans les localités aux alentours d’Hébron. '
  '30':
  - type: text
    content: 'Joab revint de la poursuite d’Abner et rassembla toute sa troupe ; en plus d’Asaël, dix-neuf hommes de David manquaient à l’appel. '
  '31':
  - type: text
    content: 'Mais les hommes de David en avaient tué trois cent soixante parmi les Benjaminites et les hommes d’Abner. '
  '32':
  - type: text
    content: Ils emportèrent le corps d’Asaël et l’enterrèrent dans le sépulcre de son père à Bethléhem
  - type: note
    content: Patrie de David et de sa famille (1 S 16.1).
  - type: text
    content: . Joab et ses hommes marchèrent toute la nuit et atteignirent Hébron au point du jour.
  '4':
  - type: text
    content: Les dirigeants de la tribu de Juda vinrent à Hébron pour y établir David roi de leur tribu en lui conférant l’onction d’huile.
  - type: text
    content: 'On vint informer David que les hommes de Yabesh en Galaad avaient enterré Saül. '
  '5':
  - type: text
    content: 'David leur envoya des messagers pour leur dire : Que l’Eternel vous bénisse pour avoir accompli cet acte de bonté envers votre seigneur Saül en l’ensevelissant dans un tombeau. '
  '6':
  - type: text
    content: 'A présent, que l’Eternel vous témoigne à son tour sa grande bonté. Et moi-même, je veux aussi agir envers vous avec la même bonté que la vôtre. '
  '7':
  - type: text
    content: Alors maintenant, soyez forts et montrez-vous vaillants ! Votre seigneur Saül est mort ; mais sachez que les gens de Juda m’ont établi roi sur eux par l’onction.
  - type: heading
    content: Ish-Bosheth est proclamé roi d’Israël
  '8':
  - type: text
    content: Cependant Abner, fils de Ner
  - type: note
    content: Abner, cousin de Saül (1 S 14.50), sera le principal défenseur de la dynastie du roi défunt.
  - type: text
    content: ', général en chef de l’armée de Saül, avait emmené Ish-Bosheth, un des fils de Saül à Mahanaïm '
  '9':
  - type: text
    content: et l’avait fait proclamer roi sur Galaad, sur les Ashourites
  - type: note
    content: 'C’est-à-dire sur les membres de la tribu d’Aser. La version syriaque a : Asser.'
  - type: text
    content: ', sur Jizréel, sur Ephraïm, sur Benjamin et sur tout Israël. '
