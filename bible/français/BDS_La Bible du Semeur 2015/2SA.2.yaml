document_id: 2SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David devient roi de Juda à Hébron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces événements, David consulta l’Eternel et lui demanda s’il devait aller s’installer dans l’une des villes de Juda. L’Eternel lui répondit : Oui.'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Dans laquelle dois-je aller ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – A Hébron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David s’y rendit donc avec ses deux femmes Ahinoam de Jizréel et Abigaïl, veuve de Nabal, de Karmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il emmena aussi ses compagnons et leurs familles, et ils s’établirent dans les localités aux alentours d’Hébron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les dirigeants de la tribu de Juda vinrent à Hébron pour y établir David roi de leur tribu en lui conférant l’onction d’huile.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On vint informer David que les hommes de Yabesh en Galaad avaient enterré Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David leur envoya des messagers pour leur dire : Que l’Eternel vous bénisse pour avoir accompli cet acte de bonté envers votre seigneur Saül en l’ensevelissant dans un tombeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A présent, que l’Eternel vous témoigne à son tour sa grande bonté. Et moi-même, je veux aussi agir envers vous avec la même bonté que la vôtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors maintenant, soyez forts et montrez-vous vaillants ! Votre seigneur Saül est mort ; mais sachez que les gens de Juda m’ont établi roi sur eux par l’onction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ish-Bosheth est proclamé roi d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Cependant Abner, fils de Ner
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abner
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cousin de Saül (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 14.50
        metadata:
          usfm: 1SA.14.50
      - type: text
        text: ), sera le principal défenseur de la dynastie du roi défunt.
    marker-yv: yv-n
  - type: text
    text: ', général en chef de l’armée de Saül, avait emmené Ish-Bosheth, un des fils de Saül à Mahanaïm '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et l’avait fait proclamer roi sur Galaad, sur les Ashourites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire sur les membres de la tribu d’Aser. La version syriaque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Asser.
    marker-yv: yv-n
  - type: text
    text: ', sur Jizréel, sur Ephraïm, sur Benjamin et sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ish-Bosheth, fils de Saül, avait quarante ans quand il devint roi sur Israël et il régna deux ans. Mais la tribu de Juda se rallia à David '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: qui régna sept ans et six mois à Hébron sur cette tribu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guerre civile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Abner, fils de Ner, et les hommes d’Ish-Bosheth, fils de Saül, quittèrent Mahanaïm pour marcher sur Gabaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A 10 kilomètres au nord-ouest de Jérusalem (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 9.3
        metadata:
          usfm: JOS.9.3
      - type: text
        text: ). Abner veut empêcher David d’étendre son influence au nord de Juda.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joab, fils de Tserouya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joab
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme Abishaï et Asaël (v. 18), était un neveu de David, fils de sa sœur.
    marker-yv: yv-n
  - type: text
    text: ', et les hommes de David se mirent aussi en marche. Les deux troupes se rejoignirent près de l’étang de Gabaon, et elles prirent position l’une en face de l’autre, de part et d’autre de cet étang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abner proposa à Joab : Que quelques-uns de nos jeunes hommes se mesurent en combat singulier devant nous !'
- type: usfm
  marker: p
  children:
  - type: text
    text: – D’accord, répondit Joab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Douze soldats se présentèrent pour Benjamin et pour Ish-Bosheth, fils de Saül, et douze parmi les hommes de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Chaque soldat saisit son adversaire par la tête et lui plongea son épée dans le côté, si bien qu’ils tombèrent tous ensemble. On appela cet endroit près de Gabaon : le champ des Rocs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, le mot signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'roc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne aussi le tranchant d’une épée.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors s’engagea un combat extrêmement violent. Abner et les hommes d’Israël furent battus ce jour-là par les hommes de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Parmi les combattants se trouvaient les trois fils de Tserouya : Joab, Abishaï et Asaël. Asaël était agile comme une gazelle sauvage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il se lança à la poursuite d’Abner et le suivit sans dévier ni à droite ni à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Abner se retourna et demanda : Est-ce toi, Asaël ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, c’est moi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: – Passe à droite ou à gauche, lui dit Abner, attaque l’un de ces jeunes soldats et empare-toi de son équipement !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Asaël ne voulut pas le laisser échapper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abner insista : Cesse de me poursuivre. Pourquoi m’obligerais-tu à t’abattre ? Comment oserais-je ensuite regarder ton frère Joab en face ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais Asaël refusa de le lâcher. Alors Abner lui enfonça la pointe de sa lance dans le ventre et l’arme ressortit par le dos. Asaël s’affaissa sur place et mourut là. Tous ceux qui arrivèrent à l’endroit où Asaël était mort, s’arrêtèrent là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joab et Abishaï continuèrent à poursuivre Abner. Le soleil se couchait quand ils atteignirent la colline d’Amma en face de Guiah, sur le chemin du désert de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors les Benjaminites se rassemblèrent autour d’Abner en formation serrée et occupèrent le sommet d’une colline. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Abner cria en direction de Joab : N’allons-nous pas cesser de nous combattre par l’épée ? Ne comprends-tu pas que tout cela finira par beaucoup d’amertume ? Quand est-ce que tu diras à tes hommes de ne plus poursuivre leurs compatriotes ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Joab répondit : Aussi vrai que Dieu est vivant, je t’assure que si tu n’avais pas parlé ainsi, mes gens vous auraient pourchassés jusqu’à demain matin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Puis Joab sonna du cor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Marquait le début comme la fin des combats (18.16 ; 20.22).
    marker-yv: yv-n
  - type: text
    text: ', et toute la troupe s’arrêta et cessa de poursuivre et de combattre Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Abner et ses hommes marchèrent toute la nuit dans la vallée du Jourdain, puis ils franchirent le Jourdain et traversèrent le Bitrôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le ravin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute la matinée.
    marker-yv: yv-n
  - type: text
    text: ' pour arriver à Mahanaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joab revint de la poursuite d’Abner et rassembla toute sa troupe ; en plus d’Asaël, dix-neuf hommes de David manquaient à l’appel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais les hommes de David en avaient tué trois cent soixante parmi les Benjaminites et les hommes d’Abner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils emportèrent le corps d’Asaël et l’enterrèrent dans le sépulcre de son père à Bethléhem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Patrie de David et de sa famille (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 16.1
        metadata:
          usfm: 1SA.16.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Joab et ses hommes marchèrent toute la nuit et atteignirent Hébron au point du jour.
