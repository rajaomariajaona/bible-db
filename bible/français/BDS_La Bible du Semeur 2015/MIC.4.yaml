document_id: MIC.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu régnera en Sion
  - type: text
    content: Dans l’avenir, ╵il adviendra
  - type: text
    content: que le mont sur lequel ╵est le temple de l’Eternel
  - type: text
    content: sera fermement établi ╵au-dessus des montagnes,
  - type: text
    content: et il s’élèvera ╵par-dessus toutes les hauteurs,
  - type: text
    content: et les peuples y afflueront
  - type: note
    content: Les v. 1-3 sont parallèles à Es 2.2-4.
  - type: text
    content: .
  '10':
  - type: text
    content: Oui, tords-toi de douleur, gémis,
  - type: text
    content: comme une femme qui enfante,
  - type: text
    content: toi qui habites dans Sion !
  - type: text
    content: Car tu devras quitter la ville
  - type: text
    content: et camper en pleins champs ;
  - type: text
    content: tu iras jusqu’à Babylone.
  - type: text
    content: Mais là, tu seras délivré,
  - type: text
    content: car l’Eternel te sauvera
  - type: text
    content: du pouvoir de tes ennemis.
  '11':
  - type: text
    content: Mais pour l’instant, ╵de nombreux peuples ╵se sont rassemblés contre toi
  - type: text
    content: 'disant : « Qu’elle soit profanée,'
  - type: text
    content: et que nos yeux contemplent ╵de Sion le spectacle ! »
  '12':
  - type: text
    content: Mais ceux-là ne connaissent pas ╵les plans de l’Eternel,
  - type: text
    content: 'ils ne comprennent pas ╵ses intentions :'
  - type: text
    content: il les a rassemblés comme des gerbes ╵pour battre le blé sur une aire.
  '13':
  - type: text
    content: Debout, foulez le blé, ╵habitants de Sion,
  - type: text
    content: je rendrai vos cornes, d’acier,
  - type: text
    content: et vos sabots, de bronze ;
  - type: text
    content: et vous écraserez ╵de nombreux peuples ;
  - type: text
    content: vous vouerez exclusivement ╵leurs biens à l’Eternel,
  - type: text
    content: et vous offrirez leurs richesses ╵au Seigneur de toute la terre.
  '14':
  - type: text
    content: Maintenant, rassemble tes troupes
  - type: note
    content: 'rassemble tes troupes. Autre traduction : fais-toi des incisions, pratique de deuil interdite par la Loi (Lv 19.28).'
  - type: text
    content: ','
  - type: text
    content: ville de troupes !
  - type: text
    content: On nous assiège
  - type: text
    content: et l’on frappe à coups de bâton ╵le chef d’Israël au visage.
  '2':
  - type: text
    content: De nombreux peuples étrangers viendront,
  - type: text
    content: 'en se disant les uns aux autres :'
  - type: text
    content: « Venez, montons ╵au mont de l’Eternel,
  - type: text
    content: au temple du Dieu de Jacob !
  - type: text
    content: Il nous enseignera ╵les voies qu’il a prescrites ;
  - type: text
    content: nous suivrons ses sentiers. »
  - type: text
    content: Car de Sion viendra la Loi,
  - type: text
    content: et de Jérusalem, ╵la Parole de l’Eternel.
  '3':
  - type: text
    content: Et il sera l’arbitre ╵entre de nombreux peuples ;
  - type: text
    content: oui, il sera le juge ╵de puissantes nations, ╵même lointaines.
  - type: text
    content: Martelant leurs épées, ╵ils forgeront des socs ╵pour leurs charrues,
  - type: text
    content: et, de leurs lances, ╵ils feront des faucilles.
  - type: text
    content: Plus aucune nation ╵ne brandira l’épée ╵contre une autre nation,
  - type: text
    content: et l’on n’apprendra plus la guerre.
  '4':
  - type: text
    content: Chacun habitera en paix ╵sous sa vigne et sous son figuier
  - type: note
    content: Expression proverbiale pour parler d’une paix et d’une sécurité parfaites (voir 1 R 5.5 ; Am 9.14 ; Za 3.10).
  - type: text
    content: ','
  - type: text
    content: il n’y aura personne ╵qui puisse le troubler.
  - type: text
    content: C’est l’Eternel qui a parlé, ╵le Seigneur des armées célestes.
  '5':
  - type: text
    content: Les autres peuples marchent
  - type: text
    content: chacun au nom de ses divinités,
  - type: text
    content: mais nous, nous marcherons
  - type: text
    content: au nom de l’Eternel, ╵lui qui est notre Dieu,
  - type: text
    content: toujours et à jamais.
  - type: heading
    content: Dieu rassemblera son troupeau dispersé
  '6':
  - type: text
    content: En ce jour-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: je rassemblerai les brebis, ╵celles qui boitent
  - type: text
    content: et celles qui sont exilées
  - type: text
    content: et que j’ai maltraitées.
  '7':
  - type: text
    content: Je ferai de celles qui boitent ╵un reste qui subsistera ;
  - type: text
    content: de celles qui sont exilées ╵je ferai un peuple puissant.
  - type: text
    content: L’Eternel régnera sur eux, ╵sur le mont Sion, ╵dès maintenant et à jamais.
  '8':
  - type: text
    content: Et toi, tour du troupeau,
  - type: text
    content: toi, citadelle de la communauté de Sion,
  - type: text
    content: ta souveraineté d’antan
  - type: text
    content: 'te reviendra :'
  - type: text
    content: la royauté que possédait ╵Jérusalem.
  - type: heading
    content: Epreuve et délivrance
  '9':
  - type: text
    content: Et pourquoi maintenant, ╵pousses-tu de tels cris ?
  - type: text
    content: N’as-tu donc plus de roi ?
  - type: text
    content: Ton conseiller a-t-il péri
  - type: text
    content: pour que les douleurs t’aient saisie
  - type: text
    content: comme une femme qui enfante ?
