document_id: MIC.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu régnera en Sion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dans l’avenir, ╵il adviendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le mont sur lequel ╵est le temple de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera fermement établi ╵au-dessus des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il s’élèvera ╵par-dessus toutes les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les peuples y afflueront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 1-3 sont parallèles à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 2.2-4
        metadata:
          usfm: ISA.2.2+ISA.2.3+ISA.2.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: De nombreux peuples étrangers viendront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en se disant les uns aux autres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Venez, montons ╵au mont de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au temple du Dieu de Jacob !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous enseignera ╵les voies qu’il a prescrites ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous suivrons ses sentiers. »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de Sion viendra la Loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de Jérusalem, ╵la Parole de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et il sera l’arbitre ╵entre de nombreux peuples ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, il sera le juge ╵de puissantes nations, ╵même lointaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Martelant leurs épées, ╵ils forgeront des socs ╵pour leurs charrues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, de leurs lances, ╵ils feront des faucilles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus aucune nation ╵ne brandira l’épée ╵contre une autre nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on n’apprendra plus la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Chacun habitera en paix ╵sous sa vigne et sous son figuier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression proverbiale pour parler d’une paix et d’une sécurité parfaites (voir 1 R 5.5 ; Am 9.14 ; Za 3.10).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y aura personne ╵qui puisse le troubler.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’Eternel qui a parlé, ╵le Seigneur des armées célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les autres peuples marchent
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun au nom de ses divinités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais nous, nous marcherons
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nom de l’Eternel, ╵lui qui est notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toujours et à jamais.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dieu rassemblera son troupeau dispersé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je rassemblerai les brebis, ╵celles qui boitent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celles qui sont exilées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que j’ai maltraitées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ferai de celles qui boitent ╵un reste qui subsistera ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de celles qui sont exilées ╵je ferai un peuple puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel régnera sur eux, ╵sur le mont Sion, ╵dès maintenant et à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et toi, tour du troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, citadelle de la communauté de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta souveraineté d’antan
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'te reviendra :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la royauté que possédait ╵Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Epreuve et délivrance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et pourquoi maintenant, ╵pousses-tu de tels cris ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’as-tu donc plus de roi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton conseiller a-t-il péri
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que les douleurs t’aient saisie
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme qui enfante ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, tords-toi de douleur, gémis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme qui enfante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui habites dans Sion !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu devras quitter la ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: et camper en pleins champs ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu iras jusqu’à Babylone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais là, tu seras délivré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel te sauvera
- type: usfm
  marker: q1
  children:
  - type: text
    text: du pouvoir de tes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais pour l’instant, ╵de nombreux peuples ╵se sont rassemblés contre toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'disant : « Qu’elle soit profanée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que nos yeux contemplent ╵de Sion le spectacle ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais ceux-là ne connaissent pas ╵les plans de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils ne comprennent pas ╵ses intentions :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les a rassemblés comme des gerbes ╵pour battre le blé sur une aire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Debout, foulez le blé, ╵habitants de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je rendrai vos cornes, d’acier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos sabots, de bronze ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous écraserez ╵de nombreux peuples ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous vouerez exclusivement ╵leurs biens à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous offrirez leurs richesses ╵au Seigneur de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maintenant, rassemble tes troupes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rassemble tes troupes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fais-toi des incisions, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pratique de deuil interdite par la Loi (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 19.28
        metadata:
          usfm: LEV.19.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ville de troupes !
- type: usfm
  marker: q1
  children:
  - type: text
    text: On nous assiège
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on frappe à coups de bâton ╵le chef d’Israël au visage.
