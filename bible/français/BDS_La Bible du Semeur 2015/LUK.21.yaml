document_id: LUK.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vraie générosité
  - type: heading
    content: (Mc 12.41-44)
  - type: text
    content: 'En regardant autour de lui, Jésus vit des riches qui mettaient leurs dons dans le tronc. '
  '10':
  - type: text
    content: 'Puis il ajouta : '
  - type: text
    content: On verra se dresser une nation contre une nation, un royaume contre un autre
  - type: note
    content: Es 19.2.
  - type: text
    content: .
  - type: text
    content: ' '
  '11':
  - type: text
    content: Il y aura de grands tremblements de terre et, en divers lieux, des famines et des épidémies séviront ; des phénomènes terrifiants se produiront et, dans le ciel, des signes extraordinaires apparaîtront.
  - type: heading
    content: (Mt 10.17-22 ; Mc 13.9-13)
  '12':
  - type: text
    content: ' '
  - type: text
    content: Mais, auparavant, on se saisira de vous, on vous persécutera, on vous traduira devant les synagogues et vous serez jetés en prison. A cause de moi, vous serez traînés devant des rois et des gouverneurs.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Ces choses vous arriveront pour vous donner l’occasion d’apporter un témoignage.
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Ayez donc cette ferme conviction : vous n’aurez pas à vous préoccuper de votre défense.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: C’est moi, en effet, qui vous donnerai des paroles qu’aucun de vos adversaires ne pourra réfuter, et une sagesse à laquelle personne ne pourra résister.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Vous serez livrés même par vos parents, vos frères, vos proches et vos amis, qui feront mettre à mort plusieurs d’entre vous.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Tout le monde vous haïra à cause de moi.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Mais pas un seul cheveu de votre tête ne se perdra.
  - type: text
    content: ' '
  '19':
  - type: text
    content: En tenant bon, vous parviendrez au salut.
  - type: heading
    content: (Mt 24.15-21 ; Mc 13.14-19)
  '2':
  - type: text
    content: 'Il aperçut aussi une pauvre veuve qui y glissait deux petites pièces. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Quand vous verrez des armées ennemies encercler '
  - type: text
    content: Jérusalem
  - type: text
    content: ', sachez que sa destruction est imminente.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Alors, que les habitants de la '
  - type: text
    content: Judée
  - type: text
    content: ' s’enfuient dans les montagnes. Que ceux qui se trouveront dans Jérusalem s’empressent d’en sortir. Que ceux qui seront dans les champs ne rentrent pas dans la ville !'
  - type: text
    content: ' '
  '22':
  - type: text
    content: Ces jours-là, en effet, seront des jours de châtiment où tout ce que disent les Ecritures s’accomplira.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Malheur, en ces jours-là, aux femmes enceintes et à celles qui allaitent ! Car ce pays connaîtra une terrible épreuve et le jugement s’abattra sur ce peuple.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Ses habitants seront passés au fil de l’épée ou déportés dans tous les pays étrangers, et Jérusalem sera foulée aux pieds par les peuples étrangers jusqu’à ce que leur temps soit révolu.
  - type: heading
    content: (Mt 24.29-35 ; Mc 13.24-31)
  '25':
  - type: text
    content: ' '
  - type: text
    content: Il y aura des signes extraordinaires dans le soleil, la lune et les étoiles. Sur la terre, les peuples seront paralysés de frayeur devant le fracas d’une mer démontée.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Plusieurs mourront de peur dans l’appréhension des malheurs qui frapperont le monde entier, car les puissances célestes seront ébranlées.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Alors on verra '
  - type: text
    content: 'le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' venir sur les nuées'
  - type: note
    content: Dn 7.13.
  - type: text
    content: ' '
  - type: text
    content: avec beaucoup de puissance et de gloire.
  '28':
  - type: text
    content: ' '
  - type: text
    content: Quand ces événements commenceront à se produire, levez la tête et prenez courage, car alors votre délivrance sera proche.
  '29':
  - type: text
    content: 'Il ajouta cet exemple : '
  - type: text
    content: Prenez le figuier, ou n’importe quel autre arbre.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Il dit alors : '
  - type: text
    content: En vérité, je vous l’assure, cette pauvre veuve a donné bien plus que tous les autres,
  - type: text
    content: ' '
  '30':
  - type: text
    content: Il vous suffit de voir que les bourgeons commencent à pousser, et vous savez que l’été est proche.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'De même, quand vous verrez ces événements se produire, sachez que le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: ' est proche.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Vraiment, je vous assure que cette génération-ci ne passera pas jusqu’à ce que tout vienne à se réaliser.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront jamais.
  '34':
  - type: text
    content: ' '
  - type: text
    content: Prenez garde à vous-mêmes pour que vos esprits ne s’alourdissent pas à force de trop bien manger, de trop boire et de vous tracasser pour les choses de la vie, sinon ce grand jour vous surprendra tout à coup.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Car il s’abattra comme un filet
  - type: note
    content: 'Certains manuscrits ont : vous surprendra tout à coup, 35 comme un filet. Il s’abattra…'
  - type: text
    content: ' '
  - type: text
    content: sur tous les habitants de la terre.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Restez sur vos gardes et priez sans relâche que Dieu vous donne la force d’échapper à tout ce qui doit arriver et de vous présenter debout devant le Fils de l’homme.
  '37':
  - type: text
    content: 'Jésus passait ses journées à enseigner dans la cour du Temple ; ensuite, il sortait de la ville et passait la nuit sur la colline appelée « mont des Oliviers ». '
  '38':
  - type: text
    content: Dès le point du jour, tout le peuple affluait vers lui, dans la cour du Temple, pour l’écouter.
  '4':
  - type: text
    content: car tous ces gens ont seulement donné de leur superflu. Mais elle, elle a pris sur son nécessaire, et a donné tout ce qu’elle avait pour vivre.
  - type: heading
    content: De la destruction de Jérusalem à la venue du Fils de l’homme
  - type: heading
    content: (Mt 24.1-8 ; Mc 13.1-8)
  '5':
  - type: text
    content: 'Certains disaient du Temple : « Avec ses belles pierres et les beaux objets déposés en offrandes, il est magnifique ». Jésus leur dit : '
  '6':
  - type: text
    content: Il viendra un temps où tout ce que vous regardez sera détruit ; pas une pierre ne restera sur une autre.
  '7':
  - type: text
    content: – Maître, lui demandèrent-ils alors, quand cela se produira-t-il et à quel signe reconnaîtra-t-on que tous ces événements devront avoir lieu ?
  '8':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: 'Faites attention, ne vous laissez pas induire en erreur. Car plusieurs viendront sous mon nom en disant : « C’est moi le '
  - type: text
    content: Messie
  - type: text
    content: '  ! » ou encore : « Le temps est venu ! » Ne les suivez pas !'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Quand vous entendrez parler de guerres et de soulèvements, ne vous effrayez pas. Car tout cela doit arriver d’abord ; mais la fin ne viendra pas aussitôt après.
