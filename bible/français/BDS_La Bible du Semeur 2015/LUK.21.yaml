document_id: LUK.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vraie générosité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 12.41-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En regardant autour de lui, Jésus vit des riches qui mettaient leurs dons dans le tronc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il aperçut aussi une pauvre veuve qui y glissait deux petites pièces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, je vous l’assure, cette pauvre veuve a donné bien plus que tous les autres,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car tous ces gens ont seulement donné de leur superflu. Mais elle, elle a pris sur son nécessaire, et a donné tout ce qu’elle avait pour vivre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: De la destruction de Jérusalem à la venue du Fils de l’homme
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.1-8 ; Mc 13.1-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Certains disaient du Temple : « Avec ses belles pierres et les beaux objets déposés en offrandes, il est magnifique ». Jésus leur dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il viendra un temps où tout ce que vous regardez sera détruit ; pas une pierre ne restera sur une autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – Maître, lui demandèrent-ils alors, quand cela se produira-t-il et à quel signe reconnaîtra-t-on que tous ces événements devront avoir lieu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Faites attention, ne vous laissez pas induire en erreur. Car plusieurs viendront sous mon nom en disant : « C’est moi le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '  ! » ou encore : « Le temps est venu ! » Ne les suivez pas !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand vous entendrez parler de guerres et de soulèvements, ne vous effrayez pas. Car tout cela doit arriver d’abord ; mais la fin ne viendra pas aussitôt après.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: On verra se dresser une nation contre une nation, un royaume contre un autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 19.2
        metadata:
          usfm: ISA.19.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y aura de grands tremblements de terre et, en divers lieux, des famines et des épidémies séviront ; des phénomènes terrifiants se produiront et, dans le ciel, des signes extraordinaires apparaîtront.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 10.17-22 ; Mc 13.9-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, auparavant, on se saisira de vous, on vous persécutera, on vous traduira devant les synagogues et vous serez jetés en prison. A cause de moi, vous serez traînés devant des rois et des gouverneurs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ces choses vous arriveront pour vous donner l’occasion d’apporter un témoignage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ayez donc cette ferme conviction : vous n’aurez pas à vous préoccuper de votre défense.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est moi, en effet, qui vous donnerai des paroles qu’aucun de vos adversaires ne pourra réfuter, et une sagesse à laquelle personne ne pourra résister.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous serez livrés même par vos parents, vos frères, vos proches et vos amis, qui feront mettre à mort plusieurs d’entre vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout le monde vous haïra à cause de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais pas un seul cheveu de votre tête ne se perdra.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En tenant bon, vous parviendrez au salut.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.15-21 ; Mc 13.14-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand vous verrez des armées ennemies encercler '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: ', sachez que sa destruction est imminente.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors, que les habitants de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Judée
    - type: text
      text: ' s’enfuient dans les montagnes. Que ceux qui se trouveront dans Jérusalem s’empressent d’en sortir. Que ceux qui seront dans les champs ne rentrent pas dans la ville !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ces jours-là, en effet, seront des jours de châtiment où tout ce que disent les Ecritures s’accomplira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur, en ces jours-là, aux femmes enceintes et à celles qui allaitent ! Car ce pays connaîtra une terrible épreuve et le jugement s’abattra sur ce peuple.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ses habitants seront passés au fil de l’épée ou déportés dans tous les pays étrangers, et Jérusalem sera foulée aux pieds par les peuples étrangers jusqu’à ce que leur temps soit révolu.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.29-35 ; Mc 13.24-31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y aura des signes extraordinaires dans le soleil, la lune et les étoiles. Sur la terre, les peuples seront paralysés de frayeur devant le fracas d’une mer démontée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Plusieurs mourront de peur dans l’appréhension des malheurs qui frapperont le monde entier, car les puissances célestes seront ébranlées.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors on verra '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' venir sur les nuées'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.13
        metadata:
          usfm: DAN.7.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: avec beaucoup de puissance et de gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand ces événements commenceront à se produire, levez la tête et prenez courage, car alors votre délivrance sera proche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il ajouta cet exemple : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez le figuier, ou n’importe quel autre arbre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il vous suffit de voir que les bourgeons commencent à pousser, et vous savez que l’été est proche.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'De même, quand vous verrez ces événements se produire, sachez que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' est proche.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous assure que cette génération-ci ne passera pas jusqu’à ce que tout vienne à se réaliser.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le ciel et la terre passeront, mais mes paroles ne passeront jamais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez garde à vous-mêmes pour que vos esprits ne s’alourdissent pas à force de trop bien manger, de trop boire et de vous tracasser pour les choses de la vie, sinon ce grand jour vous surprendra tout à coup.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il s’abattra comme un filet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous surprendra tout à coup, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '35 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme un filet. Il s’abattra…
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sur tous les habitants de la terre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Restez sur vos gardes et priez sans relâche que Dieu vous donne la force d’échapper à tout ce qui doit arriver et de vous présenter debout devant le Fils de l’homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus passait ses journées à enseigner dans la cour du Temple ; ensuite, il sortait de la ville et passait la nuit sur la colline appelée « mont des Oliviers ». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Dès le point du jour, tout le peuple affluait vers lui, dans la cour du Temple, pour l’écouter.
