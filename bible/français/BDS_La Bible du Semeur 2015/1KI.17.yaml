document_id: 1KI.17,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prophète Elie et la sécheresse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un prophète nommé Elie, originaire du village de Tishbé en Galaad, vint dire au roi Achab : Aussi vrai que l’Eternel, le Dieu d’Israël que je sers, est vivant, il n’y aura ces prochaines années ni rosée ni pluie, sauf si je le demande'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jc 5.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elie se mit donc en route et se rendit à Sarepta. Lorsqu’il arriva à l’entrée de la ville, il aperçut une veuve qui ramassait du bois. Il l’appela et lui dit : S’il te plaît, va me puiser un peu d’eau dans une cruche pour que je puisse boire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme elle partait en chercher, il la rappela pour lui demander : S’il te plaît, apporte-moi aussi un morceau de pain.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais elle lui répondit : Aussi vrai que l’Eternel, ton Dieu, est vivant, je n’ai pas le moindre morceau de pain chez moi. Il me reste tout juste une poignée de farine dans un pot, et un peu d’huile dans une jarre. J’étais en train de ramasser deux bouts de bois. Je vais rentrer et préparer ce qui me reste pour moi et pour mon fils. Quand nous l’aurons mangé, nous n’aurons plus qu’à attendre la mort.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Elie reprit : Sois sans crainte, rentre, fais ce que tu as dit. Seulement, prépare-moi d’abord, avec ce que tu as, une petite miche de pain et apporte-la moi ; ensuite, tu en feras pour toi et pour ton fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Car voici ce que déclare l’Eternel, le Dieu d’Israël : « Le pot de farine ne se videra pas, et la jarre d’huile non plus, jusqu’au jour où l’Eternel fera pleuvoir sur le pays. »'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'La femme partit et fit ce qu’Elie lui avait demandé. Pendant longtemps, elle eut de quoi manger, elle et sa famille ainsi qu’Elie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le pot de farine ne se vida pas et la jarre d’huile non plus, conformément à la parole que l’Eternel avait prononcée par l’intermédiaire d’Elie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La résurrection du fils de la veuve
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quelque temps après, le fils de la veuve qui avait accueilli Elie tomba malade. Le mal devint si grave qu’il cessa de respirer. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors la mère dit au prophète : Qu’avions-nous à faire ensemble, toi et moi, homme de Dieu ? Es-tu venu chez moi pour me faire payer mes fautes et causer la mort de mon fils ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il lui répondit : Donne-moi ton fils !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il le prit des bras de sa mère, le porta dans la chambre haute
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Construite sur la terrasse de la maison, servant de réserve pour les provisions et de chambre d’hôte.
      marker-yv: yv-n
    - type: text
      text: ' où il logeait et l’étendit sur son lit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Après cela l’Eternel dit à Elie : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis il implora l’Eternel : O Eternel, mon Dieu, cette veuve m’a accueilli chez elle. Est-ce que vraiment tu lui voudrais du mal au point de faire mourir son fils ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Puis il s’allongea par trois fois de tout son long sur l’enfant et implora l’Eternel : Eternel, mon Dieu, je t’en prie, veuille faire revenir en lui le souffle de vie de cet enfant !'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L’Eternel exauça la prière d’Elie : le souffle de l’enfant revint en lui et il reprit vie. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Elie prit l’enfant, le descendit de la chambre haute à l’intérieur de la maison et le rendit à sa mère, en disant : Viens voir, ton fils est vivant.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors la femme s’écria : Maintenant je sais que tu es un homme de Dieu et que la parole de l’Eternel que tu prononces est vraie.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Quitte ce lieu, va vers l’est et cache-toi dans le ravin du torrent de Kerith à l’est du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Oued non identifié, venant des collines transjordaniennes et coulant par intermittences dans le Jourdain.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’eau du torrent te servira de boisson et j’ai ordonné aux corbeaux de te nourrir là-bas.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Elie partit donc et fit ce que l’Eternel lui avait demandé : il alla s’installer près du torrent de Kerith à l’est du Jourdain. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Matin et soir, les corbeaux lui apportaient du pain et de la viande, et il se désaltérait de l’eau du torrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais au bout d’un certain temps, comme il n’y avait plus de pluie dans le pays, le torrent se dessécha.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie chez une veuve à Sarepta
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors l’Eternel lui adressa la parole en ces termes : '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mets-toi en route et va à Sarepta
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ville phénicienne sur la côte méditerranéenne à 15 kilomètres au sud de Sidon en direction de Tyr.
      marker-yv: yv-n
    - type: text
      text: ', dans le pays de Sidon, et installe-toi là-bas. J’ai ordonné à une veuve de là-bas de pourvoir à ta nourriture'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 4.25-26
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
