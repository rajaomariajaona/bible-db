document_id: ISA.49,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le deuxième chant du Serviteur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous tous qui habitez les îles ╵et les régions côtières, ╵écoutez-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous peuples lointains, ╵prêtez-moi attention !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été appelé par l’Eternel ╵dès le sein maternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a mentionné mon nom ╵dès avant ma naissance.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’endureront plus ╵ni la faim ni la soif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la chaleur du désert et le soleil ╵ne les abattront plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car celui qui les aime ╵les conduira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les mènera ╵auprès des sources d’eau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 7.16-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes mes montagnes, ╵je les transformerai ╵en chemins praticables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je remblaierai mes routes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voici, ils arrivent ╵des pays éloignés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les uns viennent du nord, ╵les autres du couchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’autres encore ╵de la région d’Assouan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Assouan
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans le sud de l’Egypte. Selon le texte hébreu de Qumrân. Le texte hébreu traditionnel a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sinim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région non identifiée.
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O cieux, poussez des cris de joie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O terre, éclate d’allégresse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites retentir votre joie, montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que l’Eternel ╵a consolé son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’il a compassion ╵des affligés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour en grâce de Sion
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant, Sion dit : ╵« L’Eternel m’a abandonnée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, le Seigneur m’a oubliée. »
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une femme oublie-t-elle ╵l’enfant qu’elle nourrit ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cesse-t-elle d’aimer ╵l’enfant qu’elle a conçu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même si les mères ╵oubliaient leurs enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne t’oublierai pas !
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je t’ai gravée ╵dans le creux de mes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pense constamment ╵à tes remparts.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déjà tes fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân et plusieurs autres versions anciennes ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui te rebâtiront.
      marker-yv: yv-n
    - type: text
      text: ' accourent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui te détruisaient ╵et qui te ravageaient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’en iront loin de toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Porte les yeux autour de toi, ╵regarde :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rassemblent tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils viennent vers toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi vrai que je suis vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t’en revêtiras ╵comme d’une parure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu te les attacheras ╵comme la mariée sa ceinture.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton pays en ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dévasté, désolé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deviendra trop étroit ╵pour tous tes habitants ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui te dévoraient ╵auront fui loin de toi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait de ma bouche ╵une épée acérée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Hé 4.12 ; Ap 1.16.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’a couvert ╵de l’ombre de sa main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '51.16'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a fait de moi ╵une flèche aiguisée ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m’a tenu caché, ╵dans son carquois.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu entendras tes fils ╵dont tu étais privée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'te répéter :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ce lieu est trop étroit pour nous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-nous donc de la place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que nous puissions habiter ici ! »
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors tu te demanderas :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Qui donc a mis, pour moi, ╵tous ces enfants au monde ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais privée d’enfants, ╵stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bannie en exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui donc a élevé ceux-ci ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’étais demeurée seule :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux-là, d’où viennent-ils ? »
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai signe de la main ╵aux nations étrangères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je dresserai mon étendard ╵en direction des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils amèneront tes fils dans leurs bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils chargeront tes filles ╵sur leurs épaules.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des rois s’occuperont de toi ╵comme s’ils étaient tes parents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs princesses ╵seront tes mères nourricières.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prosterneront ╵devant toi jusqu’à terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils lécheront la poussière ╵attachée à tes pieds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu sauras alors ╵que je suis l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’on n’est pas déçu ╵quand on compte sur moi.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourrait-on enlever ╵ce qu’a pris le guerrier ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les captifs du tyran
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le texte hébreu de Qumrân et plusieurs versions anciennes. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du juste.
      marker-yv: yv-n
    - type: text
      text: ' ╵seront-ils délivrés ?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les captifs du guerrier ╵lui seront enlevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la proie du tyran ╵va être délivrée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai un procès moi-même ╵à ceux qui t’ont fait un procès
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je délivrerai ╵moi-même tes enfants.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’amènerai tes oppresseurs ╵à s’entredéchirer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils s’enivreront ╵du sang les uns des autres ╵comme de vin nouveau ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors tout le monde saura
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je suis l’Eternel ╵que c’est moi qui te sauve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je suis ton libérateur ╵le Puissant de Jacob.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il m’a dit : « Tu es mon serviteur, Israël ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je manifesterai ╵ma splendeur au travers de toi. »
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant, moi, j’ai dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Je me suis fatigué pour rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est inutilement, ╵oui, c’est en pure perte, ╵que j’ai usé mes forces…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Eternel me fera droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il tient en réserve ╵ma récompense. »
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant, voici ╵ce que dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui m’a formé ╵dès le sein de ma mère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que je sois son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ramener Jacob à lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour rassembler Israël ╵auprès de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai honoré ╵aux yeux de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon Dieu est la source de ma force.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il a dit aussi : ╵« Tu ne seras pas seulement ╵mon serviteur'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour rétablir ╵les tribus de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ramener ceux que j’ai préservés ╵du peuple d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je t’établirai ╵pour être la lumière ╵des autres peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que mon salut parvienne ╵aux extrémités de la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.6'
        - type: text
          text: '. Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 13.47
        - type: text
          text: '. Allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 2.32
        - type: text
          text: ' (voir Jn 8.12 ; Ac 26.23).'
      marker-yv: yv-n
    - type: text
      text: . »
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que dit l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui délivre Israël, ╵qui en est le Dieu saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l’homme méprisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et détesté du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celui dont les despotes ╵ont fait leur serviteur :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois t’apercevront, ╵et ils se lèveront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les princes te verront, ╵ils se prosterneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin d’honorer l’Eternel ╵qui est fidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, le Saint d’Israël, ╵qui t’a choisi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au moment favorable ╵je répondrai à ton appel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au jour du salut ╵je viendrai à ton aide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te protégerai, ╵et je t’établirai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour conclure une alliance avec le peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour relever le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire le partage ╵des patrimoines dévastés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Co 6.2
        - type: text
          text: '. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '42.6'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour dire aux prisonniers : « Sortez »,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et à ceux qui demeurent ╵dans les ténèbres :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Montrez-vous ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils se nourriront ╵partout le long des routes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils trouveront des pâturages ╵sur toutes les collines.
