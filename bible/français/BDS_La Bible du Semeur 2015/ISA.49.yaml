document_id: ISA.49,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le deuxième chant du Serviteur
  - type: text
    content: Vous tous qui habitez les îles ╵et les régions côtières, ╵écoutez-moi !
  - type: text
    content: Et vous peuples lointains, ╵prêtez-moi attention !
  - type: text
    content: J’ai été appelé par l’Eternel ╵dès le sein maternel,
  - type: text
    content: et il a mentionné mon nom ╵dès avant ma naissance.
  '10':
  - type: text
    content: Ils n’endureront plus ╵ni la faim ni la soif,
  - type: text
    content: la chaleur du désert et le soleil ╵ne les abattront plus
  - type: text
    content: car celui qui les aime ╵les conduira
  - type: text
    content: et il les mènera ╵auprès des sources d’eau
  - type: note
    content: Cité en Ap 7.16-17.
  - type: text
    content: .
  '11':
  - type: text
    content: Et toutes mes montagnes, ╵je les transformerai ╵en chemins praticables,
  - type: text
    content: je remblaierai mes routes.
  '12':
  - type: text
    content: Les voici, ils arrivent ╵des pays éloignés,
  - type: text
    content: les uns viennent du nord, ╵les autres du couchant,
  - type: text
    content: d’autres encore ╵de la région d’Assouan
  - type: note
    content: 'Assouan: dans le sud de l’Egypte. Selon le texte hébreu de Qumrân. Le texte hébreu traditionnel a Sinim, région non identifiée.'
  - type: text
    content: .
  '13':
  - type: text
    content: O cieux, poussez des cris de joie !
  - type: text
    content: O terre, éclate d’allégresse !
  - type: text
    content: Faites retentir votre joie, montagnes,
  - type: text
    content: parce que l’Eternel ╵a consolé son peuple
  - type: text
    content: et qu’il a compassion ╵des affligés.
  - type: heading
    content: Le retour en grâce de Sion
  '14':
  - type: text
    content: 'Cependant, Sion dit : ╵« L’Eternel m’a abandonnée,'
  - type: text
    content: oui, le Seigneur m’a oubliée. »
  '15':
  - type: text
    content: Une femme oublie-t-elle ╵l’enfant qu’elle nourrit ?
  - type: text
    content: Cesse-t-elle d’aimer ╵l’enfant qu’elle a conçu ?
  - type: text
    content: Et même si les mères ╵oubliaient leurs enfants,
  - type: text
    content: je ne t’oublierai pas !
  '16':
  - type: text
    content: Voici, je t’ai gravée ╵dans le creux de mes mains,
  - type: text
    content: je pense constamment ╵à tes remparts.
  '17':
  - type: text
    content: Déjà tes fils
  - type: note
    content: 'Selon le texte hébreu traditionnel. Le texte hébreu de Qumrân et plusieurs autres versions anciennes ont : ceux qui te rebâtiront.'
  - type: text
    content: ' accourent,'
  - type: text
    content: ceux qui te détruisaient ╵et qui te ravageaient
  - type: text
    content: s’en iront loin de toi.
  '18':
  - type: text
    content: 'Porte les yeux autour de toi, ╵regarde :'
  - type: text
    content: ils se rassemblent tous,
  - type: text
    content: et ils viennent vers toi.
  - type: text
    content: Aussi vrai que je suis vivant,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: tu t’en revêtiras ╵comme d’une parure,
  - type: text
    content: et tu te les attacheras ╵comme la mariée sa ceinture.
  '19':
  - type: text
    content: Car ton pays en ruine,
  - type: text
    content: dévasté, désolé,
  - type: text
    content: deviendra trop étroit ╵pour tous tes habitants ;
  - type: text
    content: ceux qui te dévoraient ╵auront fui loin de toi.
  '2':
  - type: text
    content: Il a fait de ma bouche ╵une épée acérée
  - type: note
    content: Voir Hé 4.12 ; Ap 1.16.
  - type: text
    content: ','
  - type: text
    content: il m’a couvert ╵de l’ombre de sa main
  - type: note
    content: Voir 51.16.
  - type: text
    content: ','
  - type: text
    content: et il a fait de moi ╵une flèche aiguisée ;
  - type: text
    content: il m’a tenu caché, ╵dans son carquois.
  '20':
  - type: text
    content: Tu entendras tes fils ╵dont tu étais privée
  - type: text
    content: 'te répéter :'
  - type: text
    content: « Ce lieu est trop étroit pour nous.
  - type: text
    content: Fais-nous donc de la place,
  - type: text
    content: pour que nous puissions habiter ici ! »
  '21':
  - type: text
    content: 'Alors tu te demanderas :'
  - type: text
    content: « Qui donc a mis, pour moi, ╵tous ces enfants au monde ?
  - type: text
    content: J’étais privée d’enfants, ╵stérile,
  - type: text
    content: et bannie en exil.
  - type: text
    content: Qui donc a élevé ceux-ci ?
  - type: text
    content: 'J’étais demeurée seule :'
  - type: text
    content: ceux-là, d’où viennent-ils ? »
  '22':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: text
    content: Je ferai signe de la main ╵aux nations étrangères,
  - type: text
    content: je dresserai mon étendard ╵en direction des peuples,
  - type: text
    content: ils amèneront tes fils dans leurs bras,
  - type: text
    content: ils chargeront tes filles ╵sur leurs épaules.
  '23':
  - type: text
    content: Des rois s’occuperont de toi ╵comme s’ils étaient tes parents,
  - type: text
    content: et leurs princesses ╵seront tes mères nourricières.
  - type: text
    content: Ils se prosterneront ╵devant toi jusqu’à terre
  - type: text
    content: et ils lécheront la poussière ╵attachée à tes pieds.
  - type: text
    content: Et tu sauras alors ╵que je suis l’Eternel
  - type: text
    content: et qu’on n’est pas déçu ╵quand on compte sur moi.
  '24':
  - type: text
    content: Pourrait-on enlever ╵ce qu’a pris le guerrier ?
  - type: text
    content: Les captifs du tyran
  - type: note
    content: 'D’après le texte hébreu de Qumrân et plusieurs versions anciennes. Le texte hébreu traditionnel a : du juste.'
  - type: text
    content: ' ╵seront-ils délivrés ?'
  '25':
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: Les captifs du guerrier ╵lui seront enlevés,
  - type: text
    content: et la proie du tyran ╵va être délivrée.
  - type: text
    content: Je ferai un procès moi-même ╵à ceux qui t’ont fait un procès
  - type: text
    content: et je délivrerai ╵moi-même tes enfants.
  '26':
  - type: text
    content: J’amènerai tes oppresseurs ╵à s’entredéchirer.
  - type: text
    content: Et ils s’enivreront ╵du sang les uns des autres ╵comme de vin nouveau ;
  - type: text
    content: alors tout le monde saura
  - type: text
    content: que je suis l’Eternel ╵que c’est moi qui te sauve,
  - type: text
    content: que je suis ton libérateur ╵le Puissant de Jacob.
  '3':
  - type: text
    content: 'Il m’a dit : « Tu es mon serviteur, Israël ;'
  - type: text
    content: je manifesterai ╵ma splendeur au travers de toi. »
  '4':
  - type: text
    content: 'Cependant, moi, j’ai dit :'
  - type: text
    content: « Je me suis fatigué pour rien,
  - type: text
    content: c’est inutilement, ╵oui, c’est en pure perte, ╵que j’ai usé mes forces…
  - type: text
    content: Mais l’Eternel me fera droit
  - type: text
    content: et il tient en réserve ╵ma récompense. »
  '5':
  - type: text
    content: Et maintenant, voici ╵ce que dit l’Eternel,
  - type: text
    content: celui qui m’a formé ╵dès le sein de ma mère
  - type: text
    content: pour que je sois son serviteur,
  - type: text
    content: pour ramener Jacob à lui
  - type: text
    content: et pour rassembler Israël ╵auprès de lui.
  - type: text
    content: Je serai honoré ╵aux yeux de l’Eternel
  - type: text
    content: et mon Dieu est la source de ma force.
  '6':
  - type: text
    content: 'Et il a dit aussi : ╵« Tu ne seras pas seulement ╵mon serviteur'
  - type: text
    content: pour rétablir ╵les tribus de Jacob
  - type: text
    content: et ramener ceux que j’ai préservés ╵du peuple d’Israël.
  - type: text
    content: Car je t’établirai ╵pour être la lumière ╵des autres peuples
  - type: text
    content: afin que mon salut parvienne ╵aux extrémités de la terre
  - type: note
    content: Voir 42.6. Cité en Ac 13.47. Allusion en Lc 2.32 (voir Jn 8.12 ; Ac 26.23).
  - type: text
    content: . »
  '7':
  - type: text
    content: Voici ce que dit l’Eternel
  - type: text
    content: qui délivre Israël, ╵qui en est le Dieu saint,
  - type: text
    content: à l’homme méprisé
  - type: text
    content: et détesté du peuple,
  - type: text
    content: 'celui dont les despotes ╵ont fait leur serviteur :'
  - type: text
    content: Les rois t’apercevront, ╵et ils se lèveront,
  - type: text
    content: les princes te verront, ╵ils se prosterneront,
  - type: text
    content: afin d’honorer l’Eternel ╵qui est fidèle,
  - type: text
    content: oui, le Saint d’Israël, ╵qui t’a choisi.
  '8':
  - type: text
    content: 'Voici ce que dit l’Eternel :'
  - type: text
    content: Au moment favorable ╵je répondrai à ton appel,
  - type: text
    content: et au jour du salut ╵je viendrai à ton aide.
  - type: text
    content: Je te protégerai, ╵et je t’établirai
  - type: text
    content: pour conclure une alliance avec le peuple
  - type: text
    content: et pour relever le pays,
  - type: text
    content: pour faire le partage ╵des patrimoines dévastés
  - type: note
    content: Cité en 2 Co 6.2. Voir 42.6.
  - type: text
    content: ','
  '9':
  - type: text
    content: 'pour dire aux prisonniers : « Sortez »,'
  - type: text
    content: 'et à ceux qui demeurent ╵dans les ténèbres :'
  - type: text
    content: « Montrez-vous ! »
  - type: text
    content: Et ils se nourriront ╵partout le long des routes ;
  - type: text
    content: ils trouveront des pâturages ╵sur toutes les collines.
