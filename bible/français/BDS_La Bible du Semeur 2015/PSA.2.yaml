document_id: PSA.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’intronisation du Roi
  - type: text
    content: Pourquoi tant d’effervescence ╵parmi les nations ?
  - type: text
    content: Et pourquoi les peuples ╵trament-ils ces complots inutiles ?
  '10':
  - type: text
    content: C’est pourquoi, rois de la terre, ╵montrez-vous intelligents,
  - type: text
    content: vous qui exercez ╵le gouvernement ╵en ce monde, ╵laissez-vous donc avertir !
  '11':
  - type: text
    content: Servez l’Eternel ╵avec crainte !
  - type: text
    content: Et, tout en tremblant, ╵exultez de joie !
  '12':
  - type: text
    content: Au Fils, rendez votre hommage
  - type: note
    content: 'Hébreu difficile. Litt. : Baisez le fils, si on interprète le mot fils comme un terme araméen.'
  - type: text
    content: ', ╵pour éviter qu’il s’irrite'
  - type: text
    content: et que vous périssiez tous ╵dans la voie que vous suivez.
  - type: text
    content: En un instant, sa colère ╵contre vous peut s’enflammer.
  - type: text
    content: Oui, heureux sont tous les hommes ╵qui, en lui, cherchent refuge !
  '2':
  - type: text
    content: Pourquoi les rois de la terre ╵se sont-ils tous soulevés
  - type: text
    content: et les grands conspirent-ils ensemble
  - type: text
    content: contre l’Eternel ╵et contre l’homme qui a reçu ╵l’onction de sa part
  - type: note
    content: Les v. 1-2 sont cités, d’après la version grecque, en Ac 4.25-26 où les apôtres appliquent ces paroles à Hérode et à Pilate, aux Juifs et aux païens, qui se sont « ligués » contre Jésus-Christ.
  - type: text
    content: '  ?'
  '3':
  - type: text
    content: 'Ils s’écrient :'
  - type: text
    content: « Faisons sauter tous leurs liens
  - type: text
    content: et jetons au loin leurs chaînes ! »
  '4':
  - type: text
    content: Mais il rit, celui qui siège ╵sur son trône dans les cieux. ╵Le Seigneur se moque d’eux.
  '5':
  - type: text
    content: Dans sa colère il leur parle,
  - type: text
    content: dans sa fureur il les épouvante,
  - type: text
    content: 'en leur tenant ce discours :'
  '6':
  - type: text
    content: « Moi, j’ai établi ╵mon Roi par l’onction
  - type: text
    content: sur Sion, ma montagne sainte. »
  '7':
  - type: text
    content: Je publierai le décret ╵qu’a promulgué l’Eternel.
  - type: text
    content: 'Il m’a dit : « Tu es mon Fils ;'
  - type: text
    content: aujourd’hui, ╵je fais de toi mon enfant
  - type: note
    content: Le jour de son intronisation, le roi est adopté par Dieu comme son fils (cf. 2 S 7.5, 14). Cité en Ac 13.33 ; Hé 1.5 ; 5.5.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Demande-moi : Que veux-tu ? ╵Je te donne en patrimoine ╵tous les peuples de la terre ;'
  - type: text
    content: et le monde, ╵jusqu’en ses confins lointains, ╵sera ta propriété.
  '9':
  - type: text
    content: Avec un sceptre de fer, ╵tu les soumettras
  - type: note
    content: 'D’après la vocalisation suivie par les versions grecque et syriaque. Le texte hébreu traditionnel a : tu les briseras. Réminiscences en Ap 2.26-27 ; 12.5 ; 19.15.'
  - type: text
    content: '  ;'
  - type: text
    content: comme des vases d’argile, ╵tu les briseras. »
