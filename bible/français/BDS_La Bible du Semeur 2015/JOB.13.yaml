document_id: JOB.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Job accuse ses amis de fausseté et clame son innocence
  - type: text
    content: Oui, certes, tout cela, ╵mes propres yeux l’ont vu,
  - type: text
    content: oui, je l’ai entendu ╵de mes propres oreilles, ╵et je l’ai bien compris.
  '10':
  - type: text
    content: Il ne manquera pas ╵de vous le reprocher,
  - type: text
    content: si vous aviez pour lui ╵des parti pris secrets.
  '11':
  - type: text
    content: Sa majesté n’a-t-elle ╵rien pour vous effrayer ?
  - type: text
    content: N’êtes-vous pas saisis ╵par la peur qu’il inspire ?
  '12':
  - type: text
    content: Car vos paroles ╵ne sont que maximes de cendre
  - type: text
    content: et vos réponses
  - type: note
    content: 'Autre traduction : et vos protections.'
  - type: text
    content: ' ╵des ouvrages d’argile.'
  '13':
  - type: text
    content: Taisez-vous donc ╵et laissez-moi parler.
  - type: text
    content: Advienne que pourra !
  '14':
  - type: text
    content: Ainsi je veux risquer ma vie,
  - type: text
    content: je vais la mettre en jeu
  - type: note
    content: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : pourquoi risquerais-je ma vie, pourquoi la mettrais-je en jeu ?'
  - type: text
    content: .
  '15':
  - type: text
    content: Quand même il me tuerait, ╵je compterais sur lui
  - type: note
    content: 'Selon une note en marge des manuscrits hébreux qui ont, dans le texte : il me tuera, je n’espère plus rien. En hébreu, en lui et plus rien se prononcent tous deux lo et ne diffèrent que par l’orthographe.'
  - type: text
    content: .
  - type: text
    content: Mais, devant lui, ╵je veux défendre ma conduite.
  '16':
  - type: text
    content: Cela même sera ╵salutaire pour moi.
  - type: text
    content: Car aucun hypocrite ╵ne trouve accès à lui.
  '17':
  - type: text
    content: Ecoutez, écoutez mes paroles
  - type: text
    content: et prêtez attention ╵à mes explications !
  '18':
  - type: text
    content: Car, voici, je suis prêt ╵à défendre ma cause.
  - type: text
    content: Je sais que je suis dans mon droit.
  '19':
  - type: text
    content: Est-il quelqu’un qui veuille ╵entrer en procès avec moi ?
  - type: text
    content: Alors je me tairai, ╵et rendrai mon dernier soupir.
  '2':
  - type: text
    content: Tout ce que vous savez, ╵je le sais, moi aussi,
  - type: text
    content: je ne vous cède en rien.
  '20':
  - type: text
    content: Mais cesse donc, de grâce, ╵de faire ces deux choses
  - type: text
    content: 'et je ne me cacherai plus ╵de devant toi :'
  '21':
  - type: text
    content: retire donc ta main ╵de dessus moi,
  - type: text
    content: ne m’épouvante plus ╵par les terreurs que tu me causes,
  '22':
  - type: text
    content: puis lance ton appel, ╵et je te répondrai,
  - type: text
    content: ou bien je parlerai ╵et tu me répondras.
  '23':
  - type: text
    content: Combien ai-je commis ╵de péchés et de fautes ?
  - type: text
    content: Fais-moi connaître ╵mes péchés et mes transgressions.
  '24':
  - type: text
    content: Pourquoi détournes-tu ╵ton visage de moi ?
  - type: text
    content: Pourquoi me considères-tu ╵comme ton ennemi
  - type: note
    content: Le terme ennemi fait assonance en hébreu avec le nom de Job.
  - type: text
    content: '  ?'
  '25':
  - type: text
    content: Veux-tu faire trembler ╵une feuille emportée au vent,
  - type: text
    content: et veux-tu pourchasser ╵un brin de paille sèche,
  '26':
  - type: text
    content: pour m’avoir destiné ╵des peines si amères,
  - type: text
    content: et me faire payer ╵mes fautes de jeunesse,
  '27':
  - type: text
    content: pour avoir enserré ╵mes deux pieds dans les fers,
  - type: text
    content: pour surveiller de près ╵mes moindres faits et gestes,
  - type: text
    content: et pour scruter toi-même ╵les traces de mes pas ?
  '28':
  - type: text
    content: Et l’homme tombe en pourriture
  - type: text
    content: ainsi qu’un vêtement ╵que dévore la teigne.
  '3':
  - type: text
    content: Mais c’est au Tout-Puissant ╵que je veux m’adresser,
  - type: text
    content: c’est devant Dieu lui-même ╵que je veux défendre ma cause.
  '4':
  - type: text
    content: Quant à vous, mes amis, ╵vous forgez des mensonges,
  - type: text
    content: vous êtes tous ╵des médecins incompétents.
  '5':
  - type: text
    content: Si seulement vous gardiez le silence !
  - type: text
    content: Alors vous feriez preuve de sagesse !
  '6':
  - type: text
    content: Ecoutez, je vous prie, ╵ce que je dis pour ma défense
  - type: text
    content: et soyez attentifs ╵à la plaidoirie de mes lèvres.
  '7':
  - type: text
    content: Est-ce en faveur de Dieu ╵que vous proférez des propos injustes,
  - type: text
    content: et est-ce pour le soutenir ╵que vous dites des faussetés ?
  '8':
  - type: text
    content: Allez-vous vous montrer ╵partiaux en sa faveur ?
  - type: text
    content: Prétendez-vous ainsi ╵défendre la cause de Dieu ?
  '9':
  - type: text
    content: Et sera-ce à votre avantage ╵s’il sonde vos pensées ?
  - type: text
    content: Comptez-vous le tromper ╵comme l’on trompe un homme ?
