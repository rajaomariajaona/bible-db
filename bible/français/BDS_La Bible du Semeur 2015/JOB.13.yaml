document_id: JOB.13,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job accuse ses amis de fausseté et clame son innocence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, certes, tout cela, ╵mes propres yeux l’ont vu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, je l’ai entendu ╵de mes propres oreilles, ╵et je l’ai bien compris.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne manquera pas ╵de vous le reprocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vous aviez pour lui ╵des parti pris secrets.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa majesté n’a-t-elle ╵rien pour vous effrayer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’êtes-vous pas saisis ╵par la peur qu’il inspire ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car vos paroles ╵ne sont que maximes de cendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos réponses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et vos protections.
      marker-yv: yv-n
    - type: text
      text: ' ╵des ouvrages d’argile.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taisez-vous donc ╵et laissez-moi parler.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Advienne que pourra !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi je veux risquer ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais la mettre en jeu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourquoi risquerais-je ma vie, pourquoi la mettrais-je en jeu ?
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand même il me tuerait, ╵je compterais sur lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon une note en marge des manuscrits hébreux qui ont, dans le texte : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il me tuera, je n’espère plus rien. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plus rien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'se prononcent tous deux '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et ne diffèrent que par l’orthographe.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, devant lui, ╵je veux défendre ma conduite.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela même sera ╵salutaire pour moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car aucun hypocrite ╵ne trouve accès à lui.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, écoutez mes paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et prêtez attention ╵à mes explications !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car, voici, je suis prêt ╵à défendre ma cause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que je suis dans mon droit.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-il quelqu’un qui veuille ╵entrer en procès avec moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je me tairai, ╵et rendrai mon dernier soupir.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout ce que vous savez, ╵je le sais, moi aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vous cède en rien.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais cesse donc, de grâce, ╵de faire ces deux choses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je ne me cacherai plus ╵de devant toi :'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: retire donc ta main ╵de dessus moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne m’épouvante plus ╵par les terreurs que tu me causes,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis lance ton appel, ╵et je te répondrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou bien je parlerai ╵et tu me répondras.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien ai-je commis ╵de péchés et de fautes ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi connaître ╵mes péchés et mes transgressions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi détournes-tu ╵ton visage de moi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi me considères-tu ╵comme ton ennemi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ennemi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait assonance en hébreu avec le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Job.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veux-tu faire trembler ╵une feuille emportée au vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et veux-tu pourchasser ╵un brin de paille sèche,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour m’avoir destiné ╵des peines si amères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me faire payer ╵mes fautes de jeunesse,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour avoir enserré ╵mes deux pieds dans les fers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour surveiller de près ╵mes moindres faits et gestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour scruter toi-même ╵les traces de mes pas ?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme tombe en pourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu’un vêtement ╵que dévore la teigne.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est au Tout-Puissant ╵que je veux m’adresser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est devant Dieu lui-même ╵que je veux défendre ma cause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à vous, mes amis, ╵vous forgez des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous êtes tous ╵des médecins incompétents.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si seulement vous gardiez le silence !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors vous feriez preuve de sagesse !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez, je vous prie, ╵ce que je dis pour ma défense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et soyez attentifs ╵à la plaidoirie de mes lèvres.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce en faveur de Dieu ╵que vous proférez des propos injustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et est-ce pour le soutenir ╵que vous dites des faussetés ?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allez-vous vous montrer ╵partiaux en sa faveur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prétendez-vous ainsi ╵défendre la cause de Dieu ?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sera-ce à votre avantage ╵s’il sonde vos pensées ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comptez-vous le tromper ╵comme l’on trompe un homme ?
