document_id: JOB.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job accuse ses amis de fausseté et clame son innocence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oui, certes, tout cela, ╵mes propres yeux l’ont vu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je l’ai entendu ╵de mes propres oreilles, ╵et je l’ai bien compris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tout ce que vous savez, ╵je le sais, moi aussi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne vous cède en rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais c’est au Tout-Puissant ╵que je veux m’adresser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est devant Dieu lui-même ╵que je veux défendre ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quant à vous, mes amis, ╵vous forgez des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous êtes tous ╵des médecins incompétents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si seulement vous gardiez le silence !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors vous feriez preuve de sagesse !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ecoutez, je vous prie, ╵ce que je dis pour ma défense
- type: usfm
  marker: q1
  children:
  - type: text
    text: et soyez attentifs ╵à la plaidoirie de mes lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Est-ce en faveur de Dieu ╵que vous proférez des propos injustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et est-ce pour le soutenir ╵que vous dites des faussetés ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Allez-vous vous montrer ╵partiaux en sa faveur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prétendez-vous ainsi ╵défendre la cause de Dieu ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et sera-ce à votre avantage ╵s’il sonde vos pensées ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comptez-vous le tromper ╵comme l’on trompe un homme ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne manquera pas ╵de vous le reprocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous aviez pour lui ╵des parti pris secrets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sa majesté n’a-t-elle ╵rien pour vous effrayer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’êtes-vous pas saisis ╵par la peur qu’il inspire ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car vos paroles ╵ne sont que maximes de cendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos réponses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et vos protections.
    marker-yv: yv-n
  - type: text
    text: ' ╵des ouvrages d’argile.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Taisez-vous donc ╵et laissez-moi parler.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Advienne que pourra !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ainsi je veux risquer ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vais la mettre en jeu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pourquoi risquerais-je ma vie, pourquoi la mettrais-je en jeu ?
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quand même il me tuerait, ╵je compterais sur lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon une note en marge des manuscrits hébreux qui ont, dans le texte : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il me tuera, je n’espère plus rien. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En hébreu, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plus rien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se prononcent tous deux '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: et ne diffèrent que par l’orthographe.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, devant lui, ╵je veux défendre ma conduite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Cela même sera ╵salutaire pour moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car aucun hypocrite ╵ne trouve accès à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ecoutez, écoutez mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prêtez attention ╵à mes explications !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car, voici, je suis prêt ╵à défendre ma cause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je sais que je suis dans mon droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Est-il quelqu’un qui veuille ╵entrer en procès avec moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je me tairai, ╵et rendrai mon dernier soupir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais cesse donc, de grâce, ╵de faire ces deux choses
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et je ne me cacherai plus ╵de devant toi :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: retire donc ta main ╵de dessus moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne m’épouvante plus ╵par les terreurs que tu me causes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: puis lance ton appel, ╵et je te répondrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou bien je parlerai ╵et tu me répondras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Combien ai-je commis ╵de péchés et de fautes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi connaître ╵mes péchés et mes transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pourquoi détournes-tu ╵ton visage de moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me considères-tu ╵comme ton ennemi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ennemi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait assonance en hébreu avec le nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Job.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Veux-tu faire trembler ╵une feuille emportée au vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et veux-tu pourchasser ╵un brin de paille sèche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: pour m’avoir destiné ╵des peines si amères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me faire payer ╵mes fautes de jeunesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: pour avoir enserré ╵mes deux pieds dans les fers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour surveiller de près ╵mes moindres faits et gestes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour scruter toi-même ╵les traces de mes pas ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et l’homme tombe en pourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi qu’un vêtement ╵que dévore la teigne.
