document_id: MIC.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La perversion universelle
  - type: text
    content: Hélas ! Malheur à moi !
  - type: text
    content: Parce que je ressemble ╵à celui qui viendrait ╵chercher des fruits en plein été
  - type: note
    content: En Israël, la moisson est terminée à la Pentecôte, il n’y a donc plus rien à récolter en été.
  - type: text
    content: ','
  - type: text
    content: à celui qui grappille ╵après les vendangeurs.
  - type: text
    content: Mais il n’y a pas une grappe ╵que l’on pourrait manger,
  - type: text
    content: et pas une figue nouvelle ╵dont j’ai si grande envie.
  '10':
  - type: text
    content: Alors mon ennemie ╵en sera le témoin,
  - type: text
    content: et sera couverte de honte,
  - type: text
    content: 'elle qui me disait :'
  - type: text
    content: « Où donc est l’Eternel ton Dieu ? »,
  - type: text
    content: et je la verrai de mes yeux
  - type: text
    content: être foulée aux pieds
  - type: text
    content: comme la boue des rues.
  '11':
  - type: text
    content: Voici venir le jour ╵où l’on rebâtira ╵les murs de votre ville,
  - type: text
    content: et voici, ce jour-là, ╵on repoussera tes frontières
  - type: note
    content: 'Autre traduction : le décret sera éloigné.'
  - type: text
    content: .
  '12':
  - type: text
    content: En ce jour te sera rendu ╵le territoire ╵que délimitent tes frontières
  - type: note
    content: 'D’autres comprennent : des gens viendront vers toi.'
  - type: text
    content: ','
  - type: text
    content: de l’Assyrie jusqu’à l’Egypte,
  - type: text
    content: et de l’Egypte jusqu’au fleuve,
  - type: text
    content: et d’une mer à l’autre, ╵d’une montagne à l’autre.
  '13':
  - type: text
    content: Le reste de la terre ╵deviendra un désert ╵à cause de leurs habitants,
  - type: text
    content: ce sera le salaire ╵de ses agissements.
  - type: heading
    content: Prière
  '14':
  - type: text
    content: Eternel, pais ton peuple ╵sous ta houlette !
  - type: text
    content: C’est le troupeau qui t’appartient ;
  - type: text
    content: il habite à l’écart ╵dans la forêt,
  - type: text
    content: au milieu d’un terrain fertile
  - type: note
    content: 'Autre traduction : du Carmel.'
  - type: text
    content: .
  - type: text
    content: Qu’il puisse paître ╵dans les prés du Basan
  - type: text
    content: et du mont Galaad,
  - type: text
    content: comme aux jours d’autrefois !
  '15':
  - type: text
    content: Comme au temps de jadis, ╵où tu sortis d’Egypte,
  - type: text
    content: je te ferai voir des prodiges.
  '16':
  - type: text
    content: Les autres peuples le verront ╵et seront dans la confusion
  - type: text
    content: malgré tout leur pouvoir.
  - type: text
    content: Ils demeureront bouche close,
  - type: text
    content: et ils seront abasourdis.
  '17':
  - type: text
    content: Ils devront lécher la poussière ╵tout comme le serpent
  - type: text
    content: et comme les reptiles ;
  - type: text
    content: ils sortiront, tremblant, ╵de leurs retranchements,
  - type: text
    content: et se présenteront ╵devant l’Eternel, notre Dieu ;
  - type: text
    content: tout terrifiés, ils te craindront.
  '18':
  - type: text
    content: Quel est le Dieu semblable à toi,
  - type: text
    content: qui efface les fautes ╵et qui pardonne les péchés
  - type: text
    content: du reste de ton peuple ╵qui t’appartient ?
  - type: text
    content: Toi, tu n’entretiens pas ╵ta colère à jamais,
  - type: text
    content: mais tu prends ton plaisir ╵à faire grâce.
  '19':
  - type: text
    content: Oui, de nouveau ╵tu auras compassion de nous,
  - type: text
    content: tu piétineras nos péchés,
  - type: text
    content: et au fond de la mer, ╵tu jetteras toutes nos fautes.
  '2':
  - type: text
    content: Non, il ne reste plus ╵dans le pays ╵d’hommes fidèles à l’Eternel,
  - type: text
    content: plus personne n’est droit.
  - type: text
    content: Tous guettent l’occasion ╵de répandre le sang
  - type: text
    content: et chacun traque son prochain ╵en lui tendant un piège.
  '20':
  - type: text
    content: Tu témoigneras ta fidélité ╵au peuple de Jacob
  - type: text
    content: et ta grâce aux descendants d’Abraham
  - type: text
    content: comme tu l’as promis ╵aux temps anciens, à nos ancêtres.
  '3':
  - type: text
    content: Pour commettre le mal, ╵leurs mains sont bien expertes.
  - type: text
    content: Les dirigeants exigent des présents,
  - type: text
    content: et les juges se déterminent ╵en fonction de ce qu’on les paie,
  - type: text
    content: les grands émettent leurs avis ╵pour satisfaire leur avidité ;
  - type: text
    content: ils font ainsi cause commune
  - type: note
    content: 'ils font ainsi cause commune: sens incertain.'
  - type: text
    content: .
  '4':
  - type: text
    content: Le meilleur parmi eux ╵n’a pas plus de valeur ╵qu’un tas de ronces,
  - type: text
    content: et le plus droit est pire ╵qu’un buisson d’épineux…
  - type: text
    content: Le voici qui arrive, ╵le jour annoncé par tes sentinelles,
  - type: text
    content: le jour où l’Eternel ╵va intervenir contre toi.
  - type: text
    content: Alors, ╵ils seront consternés.
  '5':
  - type: text
    content: Ne vous fiez donc plus ╵à votre compagnon,
  - type: text
    content: et n’ayez pas confiance ╵en votre ami ;
  - type: text
    content: oui, même devant celle ╵qui dort entre tes bras,
  - type: text
    content: garde tes lèvres closes !
  '6':
  - type: text
    content: Car le fils méprise son père,
  - type: text
    content: la fille se révolte ╵contre sa propre mère,
  - type: text
    content: comme la belle-fille ╵contre sa belle-mère,
  - type: text
    content: et chacun a pour ennemis ╵les gens de sa famille
  - type: note
    content: Repris en Mt 10.35-36 ; Lc 12.53.
  - type: text
    content: .
  '7':
  - type: text
    content: Pour moi, je mets mon espérance ╵en l’Eternel,
  - type: text
    content: je m’attends au Dieu qui me sauve,
  - type: text
    content: et mon Dieu m’entendra.
  - type: heading
    content: Le nouvel exode
  - type: heading
    content: Espoir de renouveau
  '8':
  - type: text
    content: Ne te réjouis pas ╵à mes dépens, ╵ô toi, mon ennemie
  - type: note
    content: Il s’agit de la nation qui s’oppose au peuple d’Israël.
  - type: text
    content: ','
  - type: text
    content: car si je suis tombée, ╵je me relèverai.
  - type: text
    content: Si je suis installée ╵dans les ténèbres,
  - type: text
    content: l’Eternel est pour moi une lumière.
  '9':
  - type: text
    content: J’ai péché contre lui,
  - type: text
    content: je supporterai donc ╵le poids de sa colère,
  - type: text
    content: jusqu’à ce jour ╵où il prendra en main ma cause, ╵où il me fera droit,
  - type: text
    content: et me fera sortir ╵à la lumière,
  - type: text
    content: et je contemplerai son œuvre ╵qui établira la justice.
