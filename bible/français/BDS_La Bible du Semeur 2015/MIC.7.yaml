document_id: MIC.7
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La perversion universelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hélas ! Malheur à moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que je ressemble ╵à celui qui viendrait ╵chercher des fruits en plein été
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Israël, la moisson est terminée à la Pentecôte, il n’y a donc plus rien à récolter en été.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: à celui qui grappille ╵après les vendangeurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il n’y a pas une grappe ╵que l’on pourrait manger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pas une figue nouvelle ╵dont j’ai si grande envie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Non, il ne reste plus ╵dans le pays ╵d’hommes fidèles à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus personne n’est droit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous guettent l’occasion ╵de répandre le sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chacun traque son prochain ╵en lui tendant un piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pour commettre le mal, ╵leurs mains sont bien expertes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les dirigeants exigent des présents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les juges se déterminent ╵en fonction de ce qu’on les paie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les grands émettent leurs avis ╵pour satisfaire leur avidité ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font ainsi cause commune
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils font ainsi cause commune
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sens incertain.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le meilleur parmi eux ╵n’a pas plus de valeur ╵qu’un tas de ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le plus droit est pire ╵qu’un buisson d’épineux…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voici qui arrive, ╵le jour annoncé par tes sentinelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où l’Eternel ╵va intervenir contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, ╵ils seront consternés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne vous fiez donc plus ╵à votre compagnon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’ayez pas confiance ╵en votre ami ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, même devant celle ╵qui dort entre tes bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garde tes lèvres closes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car le fils méprise son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fille se révolte ╵contre sa propre mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la belle-fille ╵contre sa belle-mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chacun a pour ennemis ╵les gens de sa famille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Repris en Mt 10.35-36 ; Lc 12.53.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pour moi, je mets mon espérance ╵en l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m’attends au Dieu qui me sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon Dieu m’entendra.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nouvel exode
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Espoir de renouveau
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne te réjouis pas ╵à mes dépens, ╵ô toi, mon ennemie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de la nation qui s’oppose au peuple d’Israël.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: car si je suis tombée, ╵je me relèverai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis installée ╵dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel est pour moi une lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J’ai péché contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je supporterai donc ╵le poids de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce jour ╵où il prendra en main ma cause, ╵où il me fera droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me fera sortir ╵à la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je contemplerai son œuvre ╵qui établira la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors mon ennemie ╵en sera le témoin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sera couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'elle qui me disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Où donc est l’Eternel ton Dieu ? »,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je la verrai de mes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: être foulée aux pieds
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voici venir le jour ╵où l’on rebâtira ╵les murs de votre ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et voici, ce jour-là, ╵on repoussera tes frontières
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le décret sera éloigné.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En ce jour te sera rendu ╵le territoire ╵que délimitent tes frontières
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des gens viendront vers toi.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’Assyrie jusqu’à l’Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l’Egypte jusqu’au fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d’une mer à l’autre, ╵d’une montagne à l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le reste de la terre ╵deviendra un désert ╵à cause de leurs habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera le salaire ╵de ses agissements.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Eternel, pais ton peuple ╵sous ta houlette !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le troupeau qui t’appartient ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il habite à l’écart ╵dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu d’un terrain fertile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du Carmel.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il puisse paître ╵dans les prés du Basan
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du mont Galaad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme aux jours d’autrefois !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme au temps de jadis, ╵où tu sortis d’Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te ferai voir des prodiges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les autres peuples le verront ╵et seront dans la confusion
- type: usfm
  marker: q1
  children:
  - type: text
    text: malgré tout leur pouvoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils demeureront bouche close,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront abasourdis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils devront lécher la poussière ╵tout comme le serpent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme les reptiles ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sortiront, tremblant, ╵de leurs retranchements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se présenteront ╵devant l’Eternel, notre Dieu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout terrifiés, ils te craindront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quel est le Dieu semblable à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui efface les fautes ╵et qui pardonne les péchés
- type: usfm
  marker: q1
  children:
  - type: text
    text: du reste de ton peuple ╵qui t’appartient ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, tu n’entretiens pas ╵ta colère à jamais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu prends ton plaisir ╵à faire grâce.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, de nouveau ╵tu auras compassion de nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu piétineras nos péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au fond de la mer, ╵tu jetteras toutes nos fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu témoigneras ta fidélité ╵au peuple de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta grâce aux descendants d’Abraham
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme tu l’as promis ╵aux temps anciens, à nos ancêtres.
