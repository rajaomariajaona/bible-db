document_id: JDG.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Israélites sont infidèles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de l’Eternel monta de Guilgal à Bokim et déclara au peuple d’Israël : Je vous ai fait sortir d’Egypte et je vous ai amenés dans le pays que j’ai solennellement promis à vos ancêtres. J’ai déclaré que je ne romprais jamais mon alliance avec vous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous ceux de sa génération disparurent à leur tour. Une nouvelle génération se leva, qui ne connaissait pas l’Eternel, et n’avait pas vu les œuvres qu’il avait accomplies en faveur d’Israël.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les Israélites firent ce que l’Eternel considère comme mal, et ils se mirent à rendre un culte aux dieux Baals. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils abandonnèrent l’Eternel, le Dieu de leurs ancêtres qui les avait fait sortir d’Egypte, et se rallièrent à d’autres dieux, à ceux des peuples qui vivaient autour d’eux. Ils se prosternèrent devant ces dieux et irritèrent l’Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, ils abandonnèrent l’Eternel pour rendre un culte aux Baals et aux Astartés.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel se mit en colère contre les Israélites et il les abandonna aux violences de pillards qui les dépouillèrent ; il les livra au pouvoir de leurs ennemis d’alentour, de sorte qu’ils ne furent plus capables de leur résister. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque fois qu’ils entreprenaient une campagne, l’Eternel intervenait contre eux pour leur malheur, comme il le leur avait déclaré, et même annoncé par serment. Ainsi ils furent réduits à la plus grande détresse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors l’Eternel leur suscita des chefs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Terme traditionnellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'juges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir introduction).
      marker-yv: yv-n
    - type: text
      text: ' qui les délivrèrent des pillards. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les Israélites n’obéirent pas non plus à ces chefs, ils se prostituaient avec d’autres dieux et se prosternaient devant eux. Ils s’écartèrent très vite du chemin qu’avaient suivi leurs ancêtres qui obéissaient aux commandements de l’Eternel ; ils ne suivirent pas leur exemple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque fois que l’Eternel leur suscitait un chef, il aidait cet homme, et il délivrait les Israélites de leurs ennemis pendant toute la vie de ce chef. En effet, lorsque l’Eternel entendait son peuple gémir sous le joug de ses oppresseurs et de ceux qui le maltraitaient, il avait pitié d’eux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais après la mort du chef, le peuple recommençait à se corrompre encore plus que les générations précédentes, en se ralliant à d’autres dieux pour leur rendre un culte et se prosterner devant eux ; ils refusaient d’abandonner leurs pratiques et s’obstinaient dans leur conduite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu met son peuple à l’épreuve
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et vous de même, vous ne conclurez pas d’alliance avec les habitants de ce pays et vous démolirez leurs autels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 34.12-13 ; Dt 7.2-5.
      marker-yv: yv-n
    - type: text
      text: '. Or, vous ne m’avez pas obéi. Pourquoi avez-vous fait cela ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel se mit donc en colère contre Israël et déclara : Puisque ce peuple a violé l’alliance que j’avais conclue avec leurs ancêtres et qu’il ne m’écoute pas, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'désormais, je ne déposséderai plus devant eux un seul des peuples qui subsistaient dans le pays à la mort de Josué. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me servirai d’eux pour éprouver les Israélites pour voir si oui ou non ils suivent la voie que je leur ai prescrite et m’obéissent comme l’ont fait leurs ancêtres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel laissa donc subsister, sans se presser de les déposséder, ces peuples qu’il n’avait pas livrés au pouvoir de Josué.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi ai-je résolu de ne pas déposséder les habitants du pays en votre faveur. Ils resteront pour vous des adversaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme des traquenards.
      marker-yv: yv-n
    - type: text
      text: ' et leurs dieux seront un piège pour vous.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque l’ange de l’Eternel eut adressé ces paroles au peuple d’Israël, tous se mirent à se lamenter et à pleurer. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils appelèrent l’endroit Bokim (Les pleureurs) et ils offrirent des sacrifices à l’Eternel.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’histoire des chefs en Israël
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après que Josué eut congédié le peuple, les Israélites se rendirent chacun dans son patrimoine pour prendre possession du pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 6-9, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 24.29-31
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils servirent l’Eternel pendant toute la vie de Josué et, après sa mort, tant que vécurent les responsables qui avaient vu toute l’œuvre de l’Eternel en faveur d’Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, fils de Noun, serviteur de l’Eternel, mourut à l’âge de 110 ans. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On l’enterra dans le domaine qu’il avait reçu pour propriété à Timnath-Hérès, dans la région montagneuse d’Ephraïm, au nord du mont Gaash. '
