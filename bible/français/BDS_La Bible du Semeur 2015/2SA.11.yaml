document_id: 2SA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La double faute de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au printemps suivant, à l’époque où les rois ont coutume de partir en guerre, David envoya Joab et ses officiers en campagne à la tête de toute l’armée d’Israël. Ils ravagèrent le pays des Ammonites et mirent le siège devant Rabba, leur capitale. David était resté à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or, vers le soir, après avoir fait la sieste, David se leva et alla se promener sur le toit en terrasse de son palais. De là, il aperçut une femme qui se baignait ; cette femme était très belle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David fit demander qui elle était, et on lui dit : C’est Bath-Shéba, la fille d’Eliam, l’épouse d’Urie le Hittite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David envoya des messagers la chercher. Elle se rendit chez lui, et il s’unit à elle. Elle venait de se purifier de ses règles. Puis elle retourna dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais voici qu’elle se trouva enceinte et envoya dire à David : J’attends un enfant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors David fit parvenir à Joab l’ordre de lui envoyer Urie le Hittite. Joab donna ordre à celui-ci de rejoindre le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Urie se présenta à David qui lui demanda des nouvelles de Joab, de l’armée et du déroulement des opérations. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis David lui dit : Maintenant, rentre chez toi et repose-toi !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dès qu’il fut sorti du palais, le roi lui fit porter un présent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais Urie ne rentra pas dans sa maison : il se coucha à l’entrée du palais royal en compagnie des gardes de son seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On vint dire à David qu’Urie n’était pas rentré chez lui. Le roi le fit appeler et lui demanda : Voyons, tu reviens après une longue absence, pourquoi n’es-tu pas rentré chez toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Urie lui répondit : Le coffre sacré, Israël et Juda logent sous des tentes, mon général Joab et ses officiers couchent en rase campagne, et moi, j’irais dans ma maison pour manger, pour boire et pour coucher avec ma femme ! Aussi vrai que tu es vivant, je te jure que je ne ferai jamais pareille chose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David lui dit : Reste encore ici aujourd’hui, demain je te laisserai repartir.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Urie resta donc à Jérusalem ce jour-là et le lendemain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David l’invita à manger chez lui. Il le fit boire jusqu’à l’enivrer. Mais le soir, Urie alla quand même se coucher avec les gardes de son seigneur et ne rentra pas chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le lendemain matin, David écrivit une lettre à Joab et chargea Urie de la lui remettre. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dans cette lettre il écrivait : Place Urie en première ligne, là où le combat est le plus rude, puis retirez-vous en arrière pour qu’il soit touché et qu’il meure !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme Joab faisait le siège de la ville, il plaça Urie à l’endroit qu’il savait gardé par des soldats ennemis très valeureux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les assiégés de la ville firent une sortie pour attaquer Joab. Ils tuèrent plusieurs soldats et officiers de l’armée de David ; Urie le Hittite était parmi les victimes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joab envoya à David un rapport de toutes les circonstances de la bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il dit au messager chargé du rapport : Quand tu auras fini de raconter au roi tout ce qui s’est passé durant la bataille, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'il est possible qu’il se mette en colère et te demande : « Pourquoi vous êtes-vous tellement approchés de la ville lors de ce combat ? Ne saviez-vous pas qu’on tirerait des flèches du haut des remparts ? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vous rappelez-vous qui a tué Abimélek, fils de Yeroubbésheth à Tébets ? N’est-ce pas une femme qui a lancé sur lui un morceau de meule du haut du rempart, de sorte qu’il en est mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 9.50-54
        metadata:
          usfm: JDG.9.50+JDG.9.51+JDG.9.52+JDG.9.53+JDG.9.54
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? Alors pourquoi vous êtes-vous tant approchés du rempart ? » Alors tu répondras : « Ton serviteur Urie le Hittite est aussi parmi les victimes. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le messager partit et alla rapporter à David tout ce que Joab l’avait chargé de lui dire. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il dit à David : Les défenseurs de la ville ont d’abord eu l’avantage sur nous : ils ont fait une sortie jusque dans la campagne, mais nous les avons repoussés jusqu’à l’entrée de la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A ce moment-là, les archers ont tiré sur tes serviteurs du haut du rempart et plusieurs des soldats du roi sont morts ; parmi eux se trouvait ton serviteur Urie le Hittite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David dit au messager : Tu diras à Joab : « Ne prends pas cet incident au tragique. A la guerre, il y a toujours des morts tantôt ici, tantôt là. Poursuis ton attaque contre la ville et détruis-la ! » Encourage-le ainsi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsque la femme d’Urie apprit que son mari était mort, elle prit le deuil pour lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quand les jours de deuil furent passés, David l’envoya chercher et l’installa dans sa maison, elle devint sa femme et lui donna un fils. Mais ce que David avait fait déplut à l’Eternel.
