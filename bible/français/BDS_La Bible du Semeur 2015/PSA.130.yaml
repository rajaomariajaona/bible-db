    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique pour la route vers la demeure de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '130.1 '
    - type: usfm
