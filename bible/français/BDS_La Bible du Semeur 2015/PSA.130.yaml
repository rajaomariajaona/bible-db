- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fond de la détresse ╵je t’invoque, Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Seigneur, écoute-moi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois attentif
- type: usfm
  marker: q1
  children:
  - type: text
    text: à mes supplications !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Eternel, ╵si tu retiens nos fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, qui donc subsistera ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais le pardon ╵se trouve auprès de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que l’on te craigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moi, je m’attends à l’Eternel, ╵oui, je m’attends à lui, ╵de tout mon être,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai confiance en sa parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je guette le Seigneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: bien plus que les guetteurs ╵attendent le matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, plus que les guetteurs ╵attendent le matin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Israël, ╵place ta confiance ╵en l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car c’est auprès de lui ╵que l’on trouve l’amour :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la délivrance abonde ╵auprès de lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et c’est lui qui délivrera ╵Israël de tous ses péchés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '130.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 1.21 ; Tt 2.14.
    marker-yv: yv-n
  - type: text
    text: .
