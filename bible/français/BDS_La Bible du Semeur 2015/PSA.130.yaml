  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Du fond de la détresse
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Cantique pour la route vers la demeure de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '130.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '120.1'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du fond de la détresse ╵je t’invoque, Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, écoute-moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à mes supplications !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵si tu retiens nos fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, qui donc subsistera ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le pardon ╵se trouve auprès de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que l’on te craigne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je m’attends à l’Eternel, ╵oui, je m’attends à lui, ╵de tout mon être,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai confiance en sa parole.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je guette le Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien plus que les guetteurs ╵attendent le matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, plus que les guetteurs ╵attendent le matin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israël, ╵place ta confiance ╵en l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car c’est auprès de lui ╵que l’on trouve l’amour :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la délivrance abonde ╵auprès de lui,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est lui qui délivrera ╵Israël de tous ses péchés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '130.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Mt 1.21 ; Tt 2.14.
      marker-yv: yv-n
    - type: text
      text: .
