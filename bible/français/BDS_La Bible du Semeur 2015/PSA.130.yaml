document_id: PSA.130,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Du fond de la détresse
  - type: text
    content: Cantique pour la route vers la demeure de l’Eternel
  - type: note
    content: Voir note 120.1.
  - type: text
    content: .
  - type: text
    content: Du fond de la détresse ╵je t’invoque, Eternel.
  '2':
  - type: text
    content: Seigneur, écoute-moi !
  - type: text
    content: Sois attentif
  - type: text
    content: à mes supplications !
  '3':
  - type: text
    content: O Eternel, ╵si tu retiens nos fautes,
  - type: text
    content: Seigneur, qui donc subsistera ?
  '4':
  - type: text
    content: Mais le pardon ╵se trouve auprès de toi
  - type: text
    content: afin que l’on te craigne.
  '5':
  - type: text
    content: Moi, je m’attends à l’Eternel, ╵oui, je m’attends à lui, ╵de tout mon être,
  - type: text
    content: j’ai confiance en sa parole.
  '6':
  - type: text
    content: Je guette le Seigneur
  - type: text
    content: bien plus que les guetteurs ╵attendent le matin,
  - type: text
    content: oui, plus que les guetteurs ╵attendent le matin.
  '7':
  - type: text
    content: O Israël, ╵place ta confiance ╵en l’Eternel,
  - type: text
    content: 'car c’est auprès de lui ╵que l’on trouve l’amour :'
  - type: text
    content: la délivrance abonde ╵auprès de lui,
  '8':
  - type: text
    content: et c’est lui qui délivrera ╵Israël de tous ses péchés
  - type: note
    content: Voir Mt 1.21 ; Tt 2.14.
  - type: text
    content: .
