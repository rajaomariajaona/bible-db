document_id: NUM.14,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La rébellion des Israélites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors toute la communauté se souleva, se mit à pousser de grands cris, et le peuple passa toute la nuit à pleurer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toute la communauté parlait de les lapider quand la gloire de l’Eternel apparut sur la tente de la Rencontre aux yeux de tous les Israélites.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Eternel dit à Moïse : Combien de temps ce peuple me méprisera-t-il encore ? Quand cessera-t-il de me refuser sa confiance, alors que j’ai produit au milieu d’eux tant de manifestations extraordinaires ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je vais le frapper de la peste pour l’exterminer, puis je formerai, à partir de toi, un peuple plus nombreux et plus puissant que lui !
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moïse répondit à l’Eternel : Les Egyptiens savent que c’est toi qui as fait sortir ce peuple de chez eux par ta puissance'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 13-19, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 32.11-14
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et ils l’ont dit aux habitants de ce pays qui ont appris que toi, Eternel, tu es parmi ce peuple à qui toi, Eternel, tu apparais de façon visible, que ta nuée se tient au-dessus d’eux, que tu marches à leur tête dans une colonne de nuée le jour, et dans une colonne de feu la nuit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si tu fais périr ce peuple tout entier, les autres peuples qui ont entendu parler de toi diront : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '« L’Eternel n’était pas capable de faire entrer ce peuple dans le pays qu’il leur avait promis par serment ; il les a massacrés dans le désert. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Maintenant, de grâce, que la puissance du Seigneur se manifeste dans toute sa force, selon ce que tu as déclaré en disant : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: « L’Eternel est patient et riche en amour, il pardonne faute et péché, mais il n’acquitte pas le coupable et il fait payer aux fils le péché des pères jusqu’à la troisième, voire la quatrième génération
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 20.5-6 ; 34.6-7 ; Dt 5.9-10 ; 7.9-10.
      marker-yv: yv-n
    - type: text
      text: '. » '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Pardonne, je te prie, la faute de ce peuple, en vertu de ton immense amour, tout comme tu n’as cessé de pardonner à ce peuple depuis qu’il est sorti d’Egypte.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tous les Israélites critiquèrent Moïse et Aaron, et toute la communauté leur dit : Si seulement nous étions morts en Egypte – ou du moins dans ce désert ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’Eternel répondit : Je lui pardonne comme tu l’as demandé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Néanmoins, aussi vrai que je suis vivant et que toute la terre sera remplie de la gloire de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 21-23, allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 3.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'aucun de ces hommes qui ont vu ma gloire et les manifestations extraordinaires que j’ai produites en Egypte et dans le désert, qui ont, déjà dix fois, voulu me forcer la main et qui ne m’ont pas obéi, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'aucun de ces hommes ne verra le pays que j’ai promis par serment à leurs ancêtres ! Aucun de ceux qui m’ont méprisé n’y entrera ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais mon serviteur Caleb a été animé d’un esprit différent : il m’a obéi sans hésitation jusqu’au bout ; c’est pourquoi je le ferai entrer dans le pays où il s’est déjà rendu, et ses descendants en hériteront'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jos 14.9-12 ; Jg 1.20.
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Comme les Amalécites et les Cananéens demeurent dans la vallée, dès demain, vous ferez demi-tour et vous retournerez au désert, en direction de la mer des Roseaux.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L’Eternel poursuivit en disant à Moïse et à Aaron : '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Combien de temps encore vais-je laisser cette communauté rebelle se plaindre contre moi ? Car j’ai bien entendu les plaintes incessantes des Israélites contre moi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dis-leur : « Aussi vrai que je suis vivant, parole de l’Eternel, je vous traiterai selon les plaintes que vous m’avez exprimées : '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: vos cadavres tomberont dans ce désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 2 ; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 3.17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ! Vous tous qui avez été recensés, vous qui avez donc vingt ans et plus, puisque vous vous êtes plaints contre moi, en aussi grand nombre que vous êtes, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pourquoi l’Eternel veut-il nous mener dans ce pays-là pour nous y faire massacrer par l’épée, tandis que nos femmes et nos enfants deviendront la proie de nos ennemis ? Ne ferions-nous pas mieux de retourner en Egypte ?
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'vous n’entrerez pas dans le pays où j’avais promis par serment de vous installer – excepté Caleb, fils de Yephounné, et Josué, fils de Noun ! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mais vos enfants, dont vous avez dit qu’ils deviendraient la proie de l’ennemi, je les y conduirai, et ils connaîtront le pays que vous avez méprisé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Quant à vous, vos cadavres tomberont dans le désert
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Co 10.5-11 ; Hé 3.14-19 ; Jd 5.
      marker-yv: yv-n
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: où vos fils seront nomades pendant quarante ans. Ils supporteront ainsi les conséquences de votre infidélité à mon égard jusqu’à ce que le désert ait englouti tous vos cadavres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.36
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Vous avez mis quarante jours à reconnaître le pays, eh bien, vous porterez les conséquences de vos fautes durant quarante ans : une année pour chaque jour. Ainsi vous saurez ce qu’il en coûte de m’abandonner'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que c’est que de m’avoir contre vous.
      marker-yv: yv-n
    - type: text
      text: '  ! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Moi, l’Eternel, j’ai parlé ! Oui, c’est ainsi que je traiterai cette communauté rebelle qui s’est liguée contre moi ! Ils disparaîtront dans ce désert ; c’est là qu’ils mourront. »
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Les hommes que Moïse avait envoyés reconnaître le pays et qui, à leur retour, avaient entraîné toute l’assemblée à se plaindre contre lui en décriant le pays, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'ces hommes qui avaient débité de mauvais propos contre le pays moururent frappés d’une mort brutale devant l’Eternel. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Des hommes qui étaient allés prospecter le pays, seuls Josué, fils de Noun, et Caleb, fils de Yephounné, restèrent en vie.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Nouvelle désobéissance
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Quand Moïse rapporta ces paroles aux Israélites, le peuple se livra à de grandes lamentations. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et ils se dirent l’un à l’autre : Nommons-nous un chef, et retournons en Egypte.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Le lendemain, ils se levèrent de bon matin et montèrent vers les hauteurs de la région montagneuse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dont il a été question en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '13.17'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' en disant : Nous avons péché ; mais à présent nous allons marcher vers le lieu dont l’Eternel a parlé.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Moïse leur déclara : Pourquoi passez-vous outre à ce qu’a dit l’Eternel ? Vous allez au-devant d’un échec ! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'N’y allez pas, car l’Eternel n’est pas au milieu de vous, n’allez donc pas vous faire battre par vos ennemis ! '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Car vous trouverez les Amalécites et les Cananéens sur votre chemin, et vous vous ferez massacrer. Comme vous vous êtes détournés de l’Eternel, il ne sera pas avec vous.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dans leur présomption, ils montèrent quand même vers les hauteurs de la région montagneuse ; mais ni le coffre de l’alliance de l’Eternel ni Moïse ne quittèrent le camp. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Les Amalécites et les Cananéens qui demeuraient sur les montagnes descendirent, les battirent et les écrasèrent en les poursuivant jusqu’à Horma
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ville inconnue de nos jours que l’on situe à l’est de Beer-Sheva. Le récit continuera au chap. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moïse et Aaron tombèrent face contre terre, en présence de toute l’assemblée réunie des Israélites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Josué, fils de Noun, et Caleb, fils de Yephounné, qui faisaient partie de ceux qui avaient exploré le pays, déchirèrent leurs vêtements
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En signe de deuil ou de colère.
      marker-yv: yv-n
    - type: text
      text: ', '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et dirent à toute la communauté des Israélites : Le pays que nous avons parcouru et exploré est un excellent pays. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Si l’Eternel nous est favorable, il nous y mènera et il nous donnera ce pays ruisselant de lait et de miel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Seulement, ne vous révoltez pas contre l’Eternel et n’ayez pas peur des gens de ce pays, car nous n’en ferons qu’une bouchée : leur ombre'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Leur ombre
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: langage imagé pour évoquer la protection que leurs dieux étaient censés leur apporter (voir Ps 91.1 ; 121.2-6 ; Lm 4.20 ; Lc 1.35).
      marker-yv: yv-n
    - type: text
      text: ' protectrice s’est éloignée d’eux ; tandis que l’Eternel est avec nous. Ne les craignez donc pas !'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le châtiment
    marker-yv: yv-h
