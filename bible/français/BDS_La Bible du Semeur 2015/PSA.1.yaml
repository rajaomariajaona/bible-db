document_id: PSA.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier livre
  - type: heading
    content: La Loi de l’Eternel, source du bonheur
  - type: text
    content: Heureux l’homme ╵qui ne marche pas ╵selon les conseils ╵des méchants,
  - type: text
    content: qui ne va pas se tenir ╵sur le chemin des pécheurs,
  - type: text
    content: qui ne s’assied pas ╵en la compagnie ╵de ces gens qui se moquent de Dieu.
  '2':
  - type: text
    content: Toute sa joie il la met ╵dans la Loi de l’Eternel
  - type: text
    content: qu’il médite jour et nuit.
  '3':
  - type: text
    content: Il prospère comme un arbre ╵implanté près d’un cours d’eau ;
  - type: text
    content: il donne toujours son fruit ╵lorsqu’en revient la saison.
  - type: text
    content: Son feuillage est toujours vert ;
  - type: text
    content: tout ce qu’il fait réussit.
  '4':
  - type: text
    content: 'Tel n’est pas le cas ╵des méchants :'
  - type: text
    content: ils sont pareils à la paille
  - type: note
    content: Il s’agit de la bale, c’est-à-dire l’enveloppe du grain.
  - type: text
    content: ' ╵éparpillée par le vent.'
  '5':
  - type: text
    content: Aussi, lors du jugement, ╵ils ne subsisteront pas,
  - type: text
    content: et nul pécheur ne se maintiendra ╵parmi la communauté des justes.
  '6':
  - type: text
    content: Oui car l’Eternel prend en compte ╵la voie suivie par les justes
  - type: note
    content: 'C’est-à-dire : car l’Eternel tient compte de la conduite des justes pour les rétribuer en conséquence.'
  - type: text
    content: '  ;'
  - type: text
    content: mais le sentier des méchants ╵les mène à la ruine.
