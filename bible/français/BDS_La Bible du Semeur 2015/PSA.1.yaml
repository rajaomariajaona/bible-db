document_id: PSA.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premier livre
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La Loi de l’Eternel, source du bonheur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Heureux l’homme ╵qui ne marche pas ╵selon les conseils ╵des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne va pas se tenir ╵sur le chemin des pécheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne s’assied pas ╵en la compagnie ╵de ces gens qui se moquent de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toute sa joie il la met ╵dans la Loi de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il médite jour et nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il prospère comme un arbre ╵implanté près d’un cours d’eau ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il donne toujours son fruit ╵lorsqu’en revient la saison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son feuillage est toujours vert ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qu’il fait réussit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tel n’est pas le cas ╵des méchants :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont pareils à la paille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de la bale, c’est-à-dire l’enveloppe du grain.
    marker-yv: yv-n
  - type: text
    text: ' ╵éparpillée par le vent.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aussi, lors du jugement, ╵ils ne subsisteront pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul pécheur ne se maintiendra ╵parmi la communauté des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui car l’Eternel prend en compte ╵la voie suivie par les justes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C’est-à-dire : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car l’Eternel tient compte de la conduite des justes pour les rétribuer en conséquence.
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le sentier des méchants ╵les mène à la ruine.
