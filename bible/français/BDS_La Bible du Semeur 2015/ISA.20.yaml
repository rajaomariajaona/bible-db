  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'l’Eternel parla par l’intermédiaire d’Esaïe, fils d’Amots. Il dit : Va, détache l’habit de toile de sac qui couvre tes reins et retire tes sandales.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prophète obéit et se promena nu et déchaussé. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'L’Eternel dit alors : Mon serviteur Esaïe a marché nu et déchaussé pendant trois ans pour servir de signe et de présage au sujet de l’Egypte et de l’Ethiopie. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ainsi le roi d’Assyrie emmènera en déportation des captifs égyptiens et éthiopiens, des jeunes et des vieillards, nus et déchaussés et les reins découverts, à la honte de l’Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et tous ceux qui avaient mis leur confiance en l’Ethiopie et se faisaient une fierté de l’Egypte, seront terrifiés et couverts de honte. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les habitants de ces régions du littoral diront en ce jour-là : « Voilà à quoi en sont réduits ceux auprès de qui nous espérions nous réfugier pour trouver de l’aide et du secours contre le roi d’Assyrie. Et nous, maintenant, comment échapperons-nous ? »'
