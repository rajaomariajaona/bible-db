verses:
  '1':
  - type: text
    content: 'Aussi, nous qui travaillons ensemble à cette tâche, nous vous invitons à ne pas laisser sans effet la grâce que vous avez reçue de Dieu. '
  '10':
  - type: text
    content: on nous croit affligés, et nous sommes toujours joyeux,
  - type: text
    content: pauvres, et nous faisons beaucoup de riches,
  - type: text
    content: dépourvus de tout, alors que tout nous appartient.
  '11':
  - type: text
    content: 'Chers Corinthiens, nous venons de vous parler en toute franchise, nous vous avons largement ouvert notre cœur : '
  '12':
  - type: text
    content: 'vous n’y êtes pas à l’étroit, mais c’est vous qui faites preuve d’étroitesse dans vos sentiments. '
  '13':
  - type: text
    content: 'Laissez-moi vous parler comme à mes enfants bien-aimés : rendez-nous la pareille ! Ouvrez-nous, vous aussi, votre cœur !'
  - type: heading
    content: La séparation d’avec le mal
  '14':
  - type: text
    content: 'Ne vous mettez pas avec des incroyants sous un joug qui n’est pas celui du Seigneur. En effet, ce qui est juste peut-il s’unir à ce qui s’oppose à sa loi ? La lumière peut-elle être solidaire des ténèbres ? '
  '15':
  - type: text
    content: 'Christ peut-il s’accorder avec le diable ? Que peut avoir en commun le croyant avec l’incroyant ? '
  '16':
  - type: text
    content: 'Quel accord peut-il exister entre le temple de Dieu et les idoles ? Car nous sommes, nous, le temple du Dieu vivant. Dieu lui-même l’a dit :'
  - type: text
    content: J’habiterai et je marcherai au milieu d’eux.
  - type: text
    content: Je serai leur Dieu, et ils seront mon peuple
  - type: text
    content: ' '
  - type: note
    content: Lv 26.11-12 ; Ez 37.27.
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'C’est pourquoi :'
  - type: text
    content: ' ╵'
  - type: text
    content: Sortez du milieu d’eux,
  - type: text
    content: Séparez-vous d’eux, dit le Seigneur.
  - type: text
    content: N’ayez pas de contact avec ce qui est impur
  - type: text
