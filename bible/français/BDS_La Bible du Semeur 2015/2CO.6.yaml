  '2':
  - type: text
    content: 'En effet, Dieu déclare dans l’Ecriture :'
  - type: text
    content: Au moment favorable,
  - type: text
    content: j’ai répondu à ton appel,
  - type: text
    content: et au jour du salut,
  - type: text
    content: je suis venu à ton secours
  - type: text
    content: ' '
  - type: note
    content: Es 49.8 .
  - type: text
    content: .
  - type: text
    content: 'Or, c’est maintenant, le moment tout à fait favorable ; c’est aujourd’hui, le '
  - type: text
    content: jour du salut.
  '3':
  - type: text
    content: 'Pour que notre ministère soit sans reproche, nous évitons, en toute chose, de causer la chute de qui que ce soit. '
  '4':
  - type: text
    content: 'Et voici comment nous nous recommandons nous-mêmes en toutes choses comme serviteurs de Dieu : c’est en vivant avec une persévérance sans faille'
  - type: text
    content: dans les détresses, les privations, les angoisses,
  '5':
  - type: text
    content: dans les coups, les prisons, les émeutes,
  - type: text
    content: dans les fatigues, les veilles, les jeûnes,
  '6':
  - type: text
    content: c’est par la pureté, par la connaissance,
  - type: text
    content: par la patience, par la bonté,
  - type: text
    content: par l’Esprit Saint, par l’amour sans feinte,
  '7':
  - type: text
    content: par la Parole de vérité, par la puissance de Dieu,
  - type: text
    content: c’est par les armes de la justice, offensives ou défensives,
  '8':
  - type: text
    content: qu’on nous honore ou qu’on nous méprise,
  - type: text
    content: que l’on dise de nous du mal ou du bien.
  - type: text
    content: 'Et encore :'
  - type: text
    content: on nous prend pour des imposteurs, mais nous disons la vérité,
  '9':
  - type: text
    content: on nous prend pour des inconnus, et pourtant on nous connaît bien,
  - type: text
    content: on nous prend pour des mourants, et voici nous sommes toujours en vie,
  - type: text
    content: on nous prend pour des condamnés, mais nous ne sommes pas exécutés,
