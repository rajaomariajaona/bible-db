document_id: 2CO.6,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Aussi, nous qui travaillons ensemble à cette tâche, nous vous invitons à ne pas laisser sans effet la grâce que vous avez reçue de Dieu. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: on nous croit affligés, et nous sommes toujours joyeux,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: pauvres, et nous faisons beaucoup de riches,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: dépourvus de tout, alors que tout nous appartient.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Chers Corinthiens, nous venons de vous parler en toute franchise, nous vous avons largement ouvert notre cœur : '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'vous n’y êtes pas à l’étroit, mais c’est vous qui faites preuve d’étroitesse dans vos sentiments. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Laissez-moi vous parler comme à mes enfants bien-aimés : rendez-nous la pareille ! Ouvrez-nous, vous aussi, votre cœur !'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La séparation d’avec le mal
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ne vous mettez pas avec des incroyants sous un joug qui n’est pas celui du Seigneur. En effet, ce qui est juste peut-il s’unir à ce qui s’oppose à sa loi ? La lumière peut-elle être solidaire des ténèbres ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Christ peut-il s’accorder avec le diable ? Que peut avoir en commun le croyant avec l’incroyant ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quel accord peut-il exister entre le temple de Dieu et les idoles ? Car nous sommes, nous, le temple du Dieu vivant. Dieu lui-même l’a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: J’habiterai et je marcherai au milieu d’eux.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je serai leur Dieu, et ils seront mon peuple
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 26.11-12 ; Ez 37.27.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'C’est pourquoi :'
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Sortez du milieu d’eux,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Séparez-vous d’eux, dit le Seigneur.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: N’ayez pas de contact avec ce qui est impur
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 52.11
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: alors je vous accueillerai
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 20.34
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '41'
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je serai pour vous un Père,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et vous serez pour moi des fils et des filles,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dit le Seigneur, le Tout-Puissant
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 7.8
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14'
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En effet, Dieu déclare dans l’Ecriture :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Au moment favorable,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: j’ai répondu à ton appel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et au jour du salut,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je suis venu à ton secours
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 49.8
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, c’est maintenant, le moment tout à fait favorable ; c’est aujourd’hui, le '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jour du salut.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pour que notre ministère soit sans reproche, nous évitons, en toute chose, de causer la chute de qui que ce soit. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et voici comment nous nous recommandons nous-mêmes en toutes choses comme serviteurs de Dieu : c’est en vivant avec une persévérance sans faille'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: dans les détresses, les privations, les angoisses,
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: dans les coups, les prisons, les émeutes,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: dans les fatigues, les veilles, les jeûnes,
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: c’est par la pureté, par la connaissance,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: par la patience, par la bonté,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: par l’Esprit Saint, par l’amour sans feinte,
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: par la Parole de vérité, par la puissance de Dieu,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: c’est par les armes de la justice, offensives ou défensives,
  '8':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: qu’on nous honore ou qu’on nous méprise,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: que l’on dise de nous du mal ou du bien.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et encore :'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: on nous prend pour des imposteurs, mais nous disons la vérité,
  '9':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: on nous prend pour des inconnus, et pourtant on nous connaît bien,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: on nous prend pour des mourants, et voici nous sommes toujours en vie,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: on nous prend pour des condamnés, mais nous ne sommes pas exécutés,
