  '18':
  - type: text
    content: ' '
  - type: text
    content: Je serai pour vous un Père,
  - type: text
    content: et vous serez pour moi des fils et des filles,
  - type: text
    content: dit le Seigneur, le Tout-Puissant
  - type: text
