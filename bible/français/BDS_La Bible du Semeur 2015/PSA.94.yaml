document_id: PSA.94,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Combien de temps les méchants triompheront-ils ?
  - type: text
    content: Dieu qui châtie le coupable, ╵Eternel,
  - type: text
    content: Dieu qui châtie le coupable, ╵manifeste-toi !
  '10':
  - type: text
    content: Celui qui corrige tous les peuples, ╵ne vous blâmera-t-il pas,
  - type: text
    content: lui qui instruit les humains ?
  '11':
  - type: text
    content: 'L’Eternel connaît ╵les pensées de l’homme :'
  - type: text
    content: elles ne sont que du vent
  - type: note
    content: Cité en 1 Co 3.20.
  - type: text
    content: .
  '12':
  - type: text
    content: Bienheureux est l’homme, ╵Eternel, ╵que tu corriges toi-même,
  - type: text
    content: et à qui tu enseignes ta Loi,
  '13':
  - type: text
    content: pour lui donner la quiétude ╵dans les jours mauvais,
  - type: text
    content: jusqu’à ce que se soit creusée ╵pour le méchant une fosse.
  '14':
  - type: text
    content: Jamais l’Eternel ╵ne délaissera son peuple.
  - type: text
    content: Il n’abandonnera pas ╵celui qui lui appartient.
  '15':
  - type: text
    content: A nouveau, on jugera ╵selon la justice,
  - type: text
    content: et tous les cœurs droits ╵se conformeront à elle.
  '16':
  - type: text
    content: Qui m’assistera ╵contre les méchants ?
  - type: text
    content: Qui me soutiendra ╵contre ceux qui font le mal ?
  '17':
  - type: text
    content: Ah ! si l’Eternel ╵ne m’avait pas secouru,
  - type: text
    content: je serais bien vite allé rejoindre ╵la demeure du silence.
  '18':
  - type: text
    content: 'Quand j’ai dit : ╵« Je vais perdre pied »,'
  - type: text
    content: dans ton amour, Eternel, ╵tu m’as soutenu.
  '19':
  - type: text
    content: Lorsque des pensées en foule ╵s’agitaient en moi,
  - type: text
    content: tes consolations ╵m’ont rendu la joie.
  '2':
  - type: text
    content: Toi qui gouvernes la terre, ╵interviens !
  - type: text
    content: et viens rendre aux orgueilleux leur dû !
  '20':
  - type: text
    content: Pourrait-il s’allier à toi, ╵ce pouvoir injuste
  - type: text
    content: qui crée le malheur ╵par les décrets qu’il promulgue
  - type: note
    content: 'Autre traduction : au mépris des lois.'
  - type: text
    content: '  ?'
  '21':
  - type: text
    content: Ils s’attroupent ╵pour attenter à la vie du juste,
  - type: text
    content: et pour condamner à mort ╵l’innocent.
  '22':
  - type: text
    content: Mais l’Eternel est pour moi ╵une forteresse,
  - type: text
    content: oui, mon Dieu est le rocher ╵où je trouve abri.
  '23':
  - type: text
    content: Il fait retomber sur eux ╵leur iniquité,
  - type: text
    content: il les détruira ╵par leur perversité même.
  - type: text
    content: Oui, l’Eternel, notre Dieu, ╵les détruira tous.
  '3':
  - type: text
    content: Combien de temps les méchants, ╵Eternel,
  - type: text
    content: combien de temps les méchants ╵vont-ils encore jubiler ?
  '4':
  - type: text
    content: Les voilà qui se répandent ╵en paroles insolentes,
  - type: text
    content: tous ces artisans du mal ╵fanfaronnent.
  '5':
  - type: text
    content: Ton peuple, ils l’oppriment, ╵Eternel,
  - type: text
    content: et ils humilient ╵ceux qui t’appartiennent.
  '6':
  - type: text
    content: Ils tuent l’immigré ╵et la veuve ;
  - type: text
    content: l’orphelin, ils l’assassinent.
  '7':
  - type: text
    content: 'Ils se disent : ╵« L’Eternel ne le voit pas,'
  - type: text
    content: le Dieu de Jacob ╵n’y prête aucune attention ! »
  '8':
  - type: text
    content: Réfléchissez donc, ╵gens insensés de mon peuple !
  - type: text
    content: Gens bornés, ╵quand aurez-vous du bon sens ?
  '9':
  - type: text
    content: Celui qui a implanté l’oreille, ╵n’entendrait-il pas ?
  - type: text
    content: Celui qui a formé l’œil, ╵ne verrait-il pas ?
