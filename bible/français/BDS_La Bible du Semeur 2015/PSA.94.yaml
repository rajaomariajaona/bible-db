document_id: PSA.94
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Combien de temps les méchants triompheront-ils ?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dieu qui châtie le coupable, ╵Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu qui châtie le coupable, ╵manifeste-toi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toi qui gouvernes la terre, ╵interviens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: et viens rendre aux orgueilleux leur dû !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Combien de temps les méchants, ╵Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: combien de temps les méchants ╵vont-ils encore jubiler ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les voilà qui se répandent ╵en paroles insolentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ces artisans du mal ╵fanfaronnent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ton peuple, ils l’oppriment, ╵Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils humilient ╵ceux qui t’appartiennent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils tuent l’immigré ╵et la veuve ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’orphelin, ils l’assassinent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils se disent : ╵« L’Eternel ne le voit pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu de Jacob ╵n’y prête aucune attention ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Réfléchissez donc, ╵gens insensés de mon peuple !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gens bornés, ╵quand aurez-vous du bon sens ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celui qui a implanté l’oreille, ╵n’entendrait-il pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui a formé l’œil, ╵ne verrait-il pas ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui corrige tous les peuples, ╵ne vous blâmera-t-il pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui instruit les humains ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel connaît ╵les pensées de l’homme :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ne sont que du vent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '94.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3.20
        metadata:
          usfm: 1CO.3.20
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Bienheureux est l’homme, ╵Eternel, ╵que tu corriges toi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à qui tu enseignes ta Loi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: pour lui donner la quiétude ╵dans les jours mauvais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce que se soit creusée ╵pour le méchant une fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jamais l’Eternel ╵ne délaissera son peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’abandonnera pas ╵celui qui lui appartient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A nouveau, on jugera ╵selon la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les cœurs droits ╵se conformeront à elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qui m’assistera ╵contre les méchants ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me soutiendra ╵contre ceux qui font le mal ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ah ! si l’Eternel ╵ne m’avait pas secouru,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serais bien vite allé rejoindre ╵la demeure du silence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand j’ai dit : ╵« Je vais perdre pied »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ton amour, Eternel, ╵tu m’as soutenu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lorsque des pensées en foule ╵s’agitaient en moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes consolations ╵m’ont rendu la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourrait-il s’allier à toi, ╵ce pouvoir injuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui crée le malheur ╵par les décrets qu’il promulgue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '94.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au mépris des lois.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils s’attroupent ╵pour attenter à la vie du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour condamner à mort ╵l’innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais l’Eternel est pour moi ╵une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, mon Dieu est le rocher ╵où je trouve abri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il fait retomber sur eux ╵leur iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les détruira ╵par leur perversité même.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l’Eternel, notre Dieu, ╵les détruira tous.
