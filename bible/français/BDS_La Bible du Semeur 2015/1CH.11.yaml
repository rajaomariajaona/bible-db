document_id: 1CH.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David devient roi de tout Israël
  - type: heading
    content: (2 S 5.1-3)
  - type: text
    content: Tout Israël se rassembla auprès de David à Hébron
  - type: note
    content: Ville située à 35 kilomètres au sud-ouest de Jérusalem (voir Gn 13.18).
  - type: text
    content: ' pour lui dire : Voici, nous sommes de ta race et de ton sang. '
  '10':
  - type: text
    content: 'Voici les noms des chefs des guerriers de David qui, avec tout Israël, lui apportèrent un puissant soutien pendant son règne selon la parole de l’Eternel au sujet d’Israël. '
  '11':
  - type: text
    content: 'Voici donc la liste des guerriers de David : Yashobeam, descendant de Hakmoni, était le chef du groupe des trois'
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et 1 S 23.8. Le texte hébreu traditionnel a : du groupe des trente.'
  - type: text
    content: . C’est lui qui brandit son javelot contre trois cents hommes et les tua tous au cours d’un seul combat.
  '12':
  - type: text
    content: 'Le second était Eléazar, fils de Dodo l’Ahohite. Il était l’un des trois guerriers. '
  '13':
  - type: text
    content: 'Il accompagna David à Pas-Dammin, où les Philistins s’étaient rassemblés pour la bataille. Il y avait là un champ couvert d’orge. Les Israélites avaient pris la fuite devant les Philistins. '
  '14':
  - type: text
    content: Ils prirent position au milieu du champ, le libérèrent et frappèrent les Philistins. Ainsi l’Eternel accorda une victoire éclatante à Israël.
  '15':
  - type: text
    content: Un jour, trois des trente chefs vinrent sur le rocher, auprès de David, dans la caverne d’Adoullam, tandis qu’une troupe de Philistins campait dans la vallée des Rephaïm
  - type: note
    content: Au sud-ouest de Jérusalem (2 S 23.13).
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'David se trouvait alors dans son refuge fortifié, et des Philistins avaient pris position à Bethléhem. '
  '17':
  - type: text
    content: 'David fut soudain pris d’un brûlant désir et s’écria : Qui me fera boire de l’eau du puits qui se trouve à la porte de Bethléhem ?'
  '18':
  - type: text
    content: 'Alors les trois pénétrèrent dans le camp des Philistins et puisèrent de l’eau au puits qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David ; mais celui-ci ne voulut pas en boire et la répandit en libation pour l’Eternel. '
  '19':
  - type: text
    content: 'Il s’exclama : Que mon Dieu me garde de faire pareille chose ! Ce serait comme si je buvais le sang de ces hommes qui sont allés chercher cette eau au péril de leur vie. Car c’est bien au péril de leur vie qu’ils ont apporté cette eau.'
  - type: text
    content: Il refusa donc de la boire. Tel fut l’exploit de ces trois guerriers.
  '2':
  - type: text
    content: Autrefois déjà, même du temps où Saül était roi, c’est toi qui dirigeais les expéditions militaires d’Israël. Or, l’Eternel, ton Dieu, t’a promis que tu serais le berger d’Israël, son peuple, et que tu en deviendrais le chef.
  '20':
  - type: text
    content: 'Abishaï, frère de Joab, était le chef de ce groupe de trois. Un jour, il brandit son javelot contre trois cents hommes et les tua. Ainsi il devint célèbre parmi le second groupe des trois. '
  '21':
  - type: text
    content: Il était le plus considéré dans le second groupe des trois et devint leur chef ; mais il n’égala pas les trois du premier groupe.
  '22':
  - type: text
    content: Benaya, de Qabtséel, fils de Yehoyada et petit-fils d’un homme valeureux qui avait accompli de nombreux exploits, tua
  - type: note
    content: 'L’ancienne version grecque a : Benaya, fils de Yehoyada, était un homme valeureux de Qabtseel, qui avait accompli de nombreux exploits. Il tua…'
  - type: text
    content: ' deux puissants héros moabites. C’est lui aussi qui, un jour de neige, descendit au fond d’une citerne pour y tuer un lion. '
  '23':
  - type: text
    content: C’est encore lui qui tua cet Egyptien mesurant près de deux mètres cinquante et qui maniait un javelot aussi gros qu’un cylindre de métier à tisser. Il bondit sur lui, armé d’un simple bâton, et lui arracha son javelot dont il se servit pour le tuer.
  '24':
  - type: text
    content: 'Tels furent les exploits de Benaya, fils de Yehoyada, qui se fit une renommée parmi le second groupe des trois. '
  '25':
  - type: text
    content: Il fut le plus estimé parmi les trente, mais sans égaler ceux du premier groupe des trois. David lui confia le commandement de sa garde personnelle.
  '26':
  - type: text
    content: 'Et voici d’autres guerriers valeureux : Asaël, frère de Joab ; Elhanân, fils de Dodo, de Bethléhem ; '
  '27':
  - type: text
    content: 'Shammoth, de Haror ; Hélets, de Palôn ; '
  '28':
  - type: text
    content: 'Ira, fils d’Iqqesh, de Teqoa ; Abiézer, d’Anatoth ; '
  '29':
  - type: text
    content: 'Sibbekaï, de Housha ; Ilaï, d’Ahoah ; '
  '3':
  - type: text
    content: Ainsi tous les responsables d’Israël vinrent trouver le roi à Hébron. Là, David conclut une alliance avec eux devant l’Eternel, et ils lui conférèrent l’onction pour le faire roi d’Israël, conformément à ce qu’avait déclaré l’Eternel par l’intermédiaire de Samuel.
  - type: heading
    content: La conquête de Jérusalem
  - type: heading
    content: (2 S 5.6-10)
  '30':
  - type: text
    content: 'Maharaï, de Netopha ; Héled, fils de Baana, de Netopha ; '
  '31':
  - type: text
    content: 'Itaï, fils de Ribaï, de Guibéa en Benjamin ; Benaya, de Piratôn ; '
  '32':
  - type: text
    content: Houraï, de Nahalé-Gaash ; Abiel, de la vallée du Jourdain
  - type: note
    content: 'Autre traduction : de Beth-Arba.'
  - type: text
    content: '  ; '
  '33':
  - type: text
    content: 'Azmaveth, de Baharoum ; Eliahba, de Shaalbôn ; '
  '34':
  - type: text
    content: 'Bené-Hashem, de Guizôn ; Jonathan, fils de Shagué, de Harar ; '
  '35':
  - type: text
    content: 'Ahiam, fils de Sakar, de Harar ; Eliphal, fils d’Our ; '
  '36':
  - type: text
    content: 'Hépher, de Mekéra ; Ahiya, de Palôn ; '
  '37':
  - type: text
    content: 'Hetsro, de Karmel ; Naaraï, fils d’Ezbaï ; '
  '38':
  - type: text
    content: 'Joël, frère de Nathan ; Mibhar, fils de Hagri ; '
  '39':
  - type: text
    content: 'Tséleq, l’Ammonite ; Nahraï, de Béroth, qui portait les armes de Joab, fils de Tserouya. '
  '4':
  - type: text
    content: 'David marcha avec tout Israël sur Jérusalem, qui s’appelait alors Yebous. La ville était occupée par les Yebousiens, habitants du pays. '
  '40':
  - type: text
    content: 'Ira et Gareb, tous deux de Yéter, '
  '41':
  - type: text
    content: Urie, le Hittite
  - type: note
    content: Le mari de Bath-Shéba (voir note 2 S 23.39).
  - type: text
    content: '  ; Zabad, fils d’Ahlaï ; '
  '42':
  - type: text
    content: 'Adina, fils de Shiza, de la tribu de Ruben, chef des Rubénites et responsable d’un groupe de trente ; '
  '43':
  - type: text
    content: Hanân, fils de Maaka ;
  - type: text
    content: 'Josaphat, de Mitni ; '
  '44':
  - type: text
    content: 'Ouzia, d’Ashtaroth, Shama et Yeïel, fils de Hotam, d’Aroër ; '
  '45':
  - type: text
    content: 'Yediaël, fils de Shimri ; Yoha, son frère, le Titsite ; '
  '46':
  - type: text
    content: 'Eliel, de Mahavim ; Yeribaï et Yoshavia, fils d’Elnaam ; Yitma, le Moabite ; '
  '47':
  - type: text
    content: Eliel, Obed et Yaasiel, de Metsobaya.
  '5':
  - type: text
    content: 'Ces gens déclarèrent à David : Tu n’entreras pas ici !'
  - type: text
    content: Mais David s’empara de la forteresse de Sion
  - type: note
    content: A l’origine, cette expression désignait la colline orientale de Jérusalem où sera construit le Temple (voir Es 2.3 ; Mi 4.2, 8 ; Jr 31.12). Plus tard, le nom de Sion s’étendra à toute la ville.
  - type: text
    content: ', qu’on appelle la Cité de David. '
  '6':
  - type: text
    content: 'David avait déclaré à ses hommes : Le premier qui battra les Yebousiens, je le nommerai commandant en chef de l’armée.'
  - type: text
    content: Ce fut Joab, fils de Tserouya
  - type: note
    content: Sœur de David. Joab était donc le neveu de David (1 S 26.6 ; 1 Ch 2.16).
  - type: text
    content: ', qui monta le premier à l’assaut et il devint chef de l’armée. '
  '7':
  - type: text
    content: 'David s’installa dans la forteresse, c’est pourquoi on l’a appelée la Cité de David. '
  '8':
  - type: text
    content: 'Il agrandit la ville par des constructions tout autour, depuis les terrasses aménagées pour les cultures, jusqu’au mur d’enceinte, tandis que Joab restaurait le reste de la ville. '
  '9':
  - type: text
    content: David devint de plus en plus puissant, et l’Eternel, le Seigneur des armées célestes, était avec lui.
  - type: heading
    content: Les chefs guerriers de David
  - type: heading
    content: (2 S 23.8-39)
