document_id: 1CH.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David devient roi de tout Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 5.1-3)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout Israël se rassembla auprès de David à Hébron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ville située à 35 kilomètres au sud-ouest de Jérusalem (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 13.18
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' pour lui dire : Voici, nous sommes de ta race et de ton sang. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les noms des chefs des guerriers de David qui, avec tout Israël, lui apportèrent un puissant soutien pendant son règne selon la parole de l’Eternel au sujet d’Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc la liste des guerriers de David : Yashobeam, descendant de Hakmoni, était le chef du groupe des trois'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque, la version syriaque, la Vulgate et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 23.8
        - type: text
          text: '. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du groupe des trente.
      marker-yv: yv-n
    - type: text
      text: . C’est lui qui brandit son javelot contre trois cents hommes et les tua tous au cours d’un seul combat.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second était Eléazar, fils de Dodo l’Ahohite. Il était l’un des trois guerriers. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il accompagna David à Pas-Dammin, où les Philistins s’étaient rassemblés pour la bataille. Il y avait là un champ couvert d’orge. Les Israélites avaient pris la fuite devant les Philistins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils prirent position au milieu du champ, le libérèrent et frappèrent les Philistins. Ainsi l’Eternel accorda une victoire éclatante à Israël.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, trois des trente chefs vinrent sur le rocher, auprès de David, dans la caverne d’Adoullam, tandis qu’une troupe de Philistins campait dans la vallée des Rephaïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au sud-ouest de Jérusalem (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 23.13
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David se trouvait alors dans son refuge fortifié, et des Philistins avaient pris position à Bethléhem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David fut soudain pris d’un brûlant désir et s’écria : Qui me fera boire de l’eau du puits qui se trouve à la porte de Bethléhem ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les trois pénétrèrent dans le camp des Philistins et puisèrent de l’eau au puits qui est à la porte de Bethléhem. Ils l’apportèrent et la présentèrent à David ; mais celui-ci ne voulut pas en boire et la répandit en libation pour l’Eternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’exclama : Que mon Dieu me garde de faire pareille chose ! Ce serait comme si je buvais le sang de ces hommes qui sont allés chercher cette eau au péril de leur vie. Car c’est bien au péril de leur vie qu’ils ont apporté cette eau.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il refusa donc de la boire. Tel fut l’exploit de ces trois guerriers.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Autrefois déjà, même du temps où Saül était roi, c’est toi qui dirigeais les expéditions militaires d’Israël. Or, l’Eternel, ton Dieu, t’a promis que tu serais le berger d’Israël, son peuple, et que tu en deviendrais le chef.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishaï, frère de Joab, était le chef de ce groupe de trois. Un jour, il brandit son javelot contre trois cents hommes et les tua. Ainsi il devint célèbre parmi le second groupe des trois. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était le plus considéré dans le second groupe des trois et devint leur chef ; mais il n’égala pas les trois du premier groupe.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benaya, de Qabtséel, fils de Yehoyada et petit-fils d’un homme valeureux qui avait accompli de nombreux exploits, tua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Benaya, fils de Yehoyada, était un homme valeureux de Qabtseel, qui avait accompli de nombreux exploits. Il tua…
      marker-yv: yv-n
    - type: text
      text: ' deux puissants héros moabites. C’est lui aussi qui, un jour de neige, descendit au fond d’une citerne pour y tuer un lion. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est encore lui qui tua cet Egyptien mesurant près de deux mètres cinquante et qui maniait un javelot aussi gros qu’un cylindre de métier à tisser. Il bondit sur lui, armé d’un simple bâton, et lui arracha son javelot dont il se servit pour le tuer.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tels furent les exploits de Benaya, fils de Yehoyada, qui se fit une renommée parmi le second groupe des trois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fut le plus estimé parmi les trente, mais sans égaler ceux du premier groupe des trois. David lui confia le commandement de sa garde personnelle.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici d’autres guerriers valeureux : Asaël, frère de Joab ; Elhanân, fils de Dodo, de Bethléhem ; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shammoth, de Haror ; Hélets, de Palôn ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ira, fils d’Iqqesh, de Teqoa ; Abiézer, d’Anatoth ; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sibbekaï, de Housha ; Ilaï, d’Ahoah ; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi tous les responsables d’Israël vinrent trouver le roi à Hébron. Là, David conclut une alliance avec eux devant l’Eternel, et ils lui conférèrent l’onction pour le faire roi d’Israël, conformément à ce qu’avait déclaré l’Eternel par l’intermédiaire de Samuel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La conquête de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 5.6-10)
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maharaï, de Netopha ; Héled, fils de Baana, de Netopha ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Itaï, fils de Ribaï, de Guibéa en Benjamin ; Benaya, de Piratôn ; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Houraï, de Nahalé-Gaash ; Abiel, de la vallée du Jourdain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Beth-Arba.
      marker-yv: yv-n
    - type: text
      text: '  ; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azmaveth, de Baharoum ; Eliahba, de Shaalbôn ; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bené-Hashem, de Guizôn ; Jonathan, fils de Shagué, de Harar ; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahiam, fils de Sakar, de Harar ; Eliphal, fils d’Our ; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hépher, de Mekéra ; Ahiya, de Palôn ; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hetsro, de Karmel ; Naaraï, fils d’Ezbaï ; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joël, frère de Nathan ; Mibhar, fils de Hagri ; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tséleq, l’Ammonite ; Nahraï, de Béroth, qui portait les armes de Joab, fils de Tserouya. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David marcha avec tout Israël sur Jérusalem, qui s’appelait alors Yebous. La ville était occupée par les Yebousiens, habitants du pays. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ira et Gareb, tous deux de Yéter, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Urie, le Hittite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le mari de Bath-Shéba (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 23.39
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '  ; Zabad, fils d’Ahlaï ; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adina, fils de Shiza, de la tribu de Ruben, chef des Rubénites et responsable d’un groupe de trente ; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hanân, fils de Maaka ;
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josaphat, de Mitni ; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ouzia, d’Ashtaroth, Shama et Yeïel, fils de Hotam, d’Aroër ; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yediaël, fils de Shimri ; Yoha, son frère, le Titsite ; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliel, de Mahavim ; Yeribaï et Yoshavia, fils d’Elnaam ; Yitma, le Moabite ; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eliel, Obed et Yaasiel, de Metsobaya.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces gens déclarèrent à David : Tu n’entreras pas ici !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais David s’empara de la forteresse de Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A l’origine, cette expression désignait la colline orientale de Jérusalem où sera construit le Temple (voir Es 2.3 ; Mi 4.2, 8 ; Jr 31.12). Plus tard, le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: s’étendra à toute la ville.
      marker-yv: yv-n
    - type: text
      text: ', qu’on appelle la Cité de David. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait déclaré à ses hommes : Le premier qui battra les Yebousiens, je le nommerai commandant en chef de l’armée.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce fut Joab, fils de Tserouya
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sœur de David. Joab était donc le neveu de David (1 S 26.6 ; 1 Ch 2.16).
      marker-yv: yv-n
    - type: text
      text: ', qui monta le premier à l’assaut et il devint chef de l’armée. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David s’installa dans la forteresse, c’est pourquoi on l’a appelée la Cité de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il agrandit la ville par des constructions tout autour, depuis les terrasses aménagées pour les cultures, jusqu’au mur d’enceinte, tandis que Joab restaurait le reste de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David devint de plus en plus puissant, et l’Eternel, le Seigneur des armées célestes, était avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chefs guerriers de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 23.8-39)
    marker-yv: yv-h
