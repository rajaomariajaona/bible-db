document_id: JON.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La leçon du ricin
  - type: text
    content: 'Jonas le prit très mal et se mit en colère. '
  '10':
  - type: text
    content: 'Alors l’Eternel lui dit : Tu t’apitoies sur ce ricin qui ne t’a coûté aucune peine, que tu n’as pas fait pousser, et qui est sorti de terre en l’espace d’une nuit et a péri la nuit suivante. '
  '11':
  - type: text
    content: Et tu voudrais que moi, je n’aie pas pitié de Ninive, de cette grande ville où vivent plus de cent vingt mille personnes qui ne savent pas distinguer le bien du mal, sans compter des animaux en grand nombre !
  '2':
  - type: text
    content: 'Il adressa cette prière à l’Eternel : Ah, Eternel ! Je l’avais bien dit quand j’étais encore dans mon pays. Et c’est pour prévenir cela que je me suis enfui à Tarsis. Car je savais que tu es un Dieu plein de grâce et de compassion, lent à te mettre en colère et riche en amour, et que tu renonces volontiers à faire venir le malheur que tu as annoncé. '
  '3':
  - type: text
    content: Maintenant, Eternel, prends-moi donc la vie, car la mort vaut mieux pour moi que la vie.
  '4':
  - type: text
    content: 'L’Eternel lui répondit : Fais-tu bien de te mettre en colère ?'
  '5':
  - type: text
    content: Jonas sortit de la ville et s’installa à l’est de la ville. Il se construisit là une cabane et s’assit dessous, à l’ombre, en attendant de voir ce qui se passerait dans la ville.
  '6':
  - type: text
    content: L’Eternel Dieu fit pousser un ricin qui s’éleva plus haut que Jonas et lui donna de l’ombre sur la tête, afin de le détourner de sa mauvaise humeur. Et Jonas éprouva une grande joie à cause de ce ricin
  - type: note
    content: Les versions divergent sur l’identification de cette plante. Le ricin, dont la semence donne l’huile de ricin, convient bien, car c’est une plante qui peut grandir de 30 cm par jour dans les conditions naturelles et qui peut atteindre une hauteur de 4 mètres.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Mais le lendemain, au lever du jour, Dieu fit venir un ver qui rongea le ricin, de sorte que le ricin se dessécha. '
  '8':
  - type: text
    content: Et lorsque le soleil se mit à briller, Dieu fit venir de l’est un vent brûlant
  - type: note
    content: Ce vent, bien connu en Israël et qui vient du désert (voir Os 13.15 ; Jr 4.11) dessèche toute végétation.
  - type: text
    content: ', et le soleil tapa sur la tête de Jonas. Sur le point de tomber en défaillance, Jonas demanda la mort en disant : La mort vaut mieux pour moi que la vie.'
  '9':
  - type: text
    content: 'Dieu demanda à Jonas : Fais-tu bien de te mettre en colère à cause de ce ricin ?'
  - type: text
    content: 'Il répondit : Oui, je fais bien de me mettre en colère au point de désirer la mort.'
