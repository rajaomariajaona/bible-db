document_id: JOB.8,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Premier discours de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu est juste
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Shouah prit la parole et dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les anciens t’instruiront ╵et ils te parleront ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils tireront de leur intelligence ╵les sentences suivantes :'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le papyrus croît-il ╵en dehors du marais ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jonc peut-il pousser sans eau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probablement un proverbe égyptien signifiant que les plantes les plus luxuriantes, qui croissent le plus rapidement comme le papyrus et le jonc, dépérissent vite si elles n’ont plus d’eau, c’est-à-dire que les gens prospères sont dépendants des conditions de leur prospérité.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors qu’il est en fleurs ╵sans qu’on l’ait arraché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant les autres herbes, ╵déjà, il se dessèche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est la destinée ╵de ceux qui oublient Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’espoir de l’impie ╵sera anéanti.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’objet de sa confiance ╵sera brisé comme un fil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: brisé comme un fil
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sens incertain.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il place son espoir ╵dans une toile d’araignée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il prend appui sur sa maison ╵mais elle ne résiste pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se cramponne à elle ╵mais elle ne tient pas debout.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous le soleil, ╵il est plein de vigueur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses rameaux s’étendent, ╵couvrant tout son jardin,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il entrelace ses racines ╵à un monceau de pierres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles se fraient un chemin ╵jusqu’au cœur des rochers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il s’est arraché ╵du lieu qu’il occupait ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et celui-ci prétend : ╵« Je ne t’ai jamais vu. »'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà quelle est la joie ╵qu’il trouve sur sa voie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et d’autres, à leur tour, ╵de la poussière germeront.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien de temps encore ╵tiendras-tu ces discours ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, jusqu’à quand ╵tes propos seront-ils ╵un vent impétueux ?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, Dieu ne rejette ╵jamais l’homme innocent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jamais il ne prête ╵main-forte aux malfaisants.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il remplira encore ╵ta bouche d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettra sur tes lèvres ╵des cris de joie.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui te haïssent ╵seront couverts de honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les tentes des méchants ╵disparaîtront.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu fléchit-il le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou bien le Tout-Puissant ╵fausse-t-il la justice ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tes fils ont péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a dû les livrer ╵aux conséquences de leurs fautes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais si tu as recours à Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu demandes grâce ╵auprès du Tout-Puissant,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu es sans reproche, ╵si tu es droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne tardera pas ╵à s’occuper de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il rétablira ╵pleinement ta justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et à rétablir pour toi une situation juste.
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta condition passée ╵semblera peu de chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant sera florissante ╵ta condition nouvelle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, interroge donc ╵les générations précédentes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et médite avec soin ╵l’expérience des pères,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous sommes d’hier ╵et nous ne savons rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque nos jours sur terre ╵s’effacent comme une ombre.
