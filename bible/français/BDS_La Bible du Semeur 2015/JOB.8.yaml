document_id: JOB.8,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier discours de Bildad
  - type: heading
    content: Dieu est juste
  - type: text
    content: 'Bildad de Shouah prit la parole et dit :'
  '10':
  - type: text
    content: Les anciens t’instruiront ╵et ils te parleront ;
  - type: text
    content: 'ils tireront de leur intelligence ╵les sentences suivantes :'
  '11':
  - type: text
    content: Le papyrus croît-il ╵en dehors du marais ?
  - type: text
    content: Le jonc peut-il pousser sans eau
  - type: note
    content: Probablement un proverbe égyptien signifiant que les plantes les plus luxuriantes, qui croissent le plus rapidement comme le papyrus et le jonc, dépérissent vite si elles n’ont plus d’eau, c’est-à-dire que les gens prospères sont dépendants des conditions de leur prospérité.
  - type: text
    content: '  ?'
  '12':
  - type: text
    content: Alors qu’il est en fleurs ╵sans qu’on l’ait arraché,
  - type: text
    content: avant les autres herbes, ╵déjà, il se dessèche.
  '13':
  - type: text
    content: Telle est la destinée ╵de ceux qui oublient Dieu,
  - type: text
    content: et l’espoir de l’impie ╵sera anéanti.
  '14':
  - type: text
    content: L’objet de sa confiance ╵sera brisé comme un fil
  - type: note
    content: 'brisé comme un fil: sens incertain.'
  - type: text
    content: ','
  - type: text
    content: il place son espoir ╵dans une toile d’araignée.
  '15':
  - type: text
    content: Il prend appui sur sa maison ╵mais elle ne résiste pas,
  - type: text
    content: il se cramponne à elle ╵mais elle ne tient pas debout.
  '16':
  - type: text
    content: Sous le soleil, ╵il est plein de vigueur,
  - type: text
    content: et ses rameaux s’étendent, ╵couvrant tout son jardin,
  '17':
  - type: text
    content: il entrelace ses racines ╵à un monceau de pierres
  - type: text
    content: et elles se fraient un chemin ╵jusqu’au cœur des rochers.
  '18':
  - type: text
    content: Mais il s’est arraché ╵du lieu qu’il occupait ;
  - type: text
    content: 'et celui-ci prétend : ╵« Je ne t’ai jamais vu. »'
  '19':
  - type: text
    content: Voilà quelle est la joie ╵qu’il trouve sur sa voie.
  - type: text
    content: Et d’autres, à leur tour, ╵de la poussière germeront.
  '2':
  - type: text
    content: Combien de temps encore ╵tiendras-tu ces discours ?
  - type: text
    content: Oui, jusqu’à quand ╵tes propos seront-ils ╵un vent impétueux ?
  '20':
  - type: text
    content: Voici, Dieu ne rejette ╵jamais l’homme innocent,
  - type: text
    content: et jamais il ne prête ╵main-forte aux malfaisants.
  '21':
  - type: text
    content: Il remplira encore ╵ta bouche d’allégresse,
  - type: text
    content: et mettra sur tes lèvres ╵des cris de joie.
  '22':
  - type: text
    content: Tous ceux qui te haïssent ╵seront couverts de honte.
  - type: text
    content: Les tentes des méchants ╵disparaîtront.
  '3':
  - type: text
    content: Dieu fléchit-il le droit,
  - type: text
    content: ou bien le Tout-Puissant ╵fausse-t-il la justice ?
  '4':
  - type: text
    content: Si tes fils ont péché,
  - type: text
    content: il a dû les livrer ╵aux conséquences de leurs fautes.
  '5':
  - type: text
    content: Mais si tu as recours à Dieu,
  - type: text
    content: si tu demandes grâce ╵auprès du Tout-Puissant,
  '6':
  - type: text
    content: si tu es sans reproche, ╵si tu es droit,
  - type: text
    content: il ne tardera pas ╵à s’occuper de toi,
  - type: text
    content: et il rétablira ╵pleinement ta justice
  - type: note
    content: 'Autre traduction : et à rétablir pour toi une situation juste.'
  - type: text
    content: .
  '7':
  - type: text
    content: Ta condition passée ╵semblera peu de chose,
  - type: text
    content: tant sera florissante ╵ta condition nouvelle.
  '8':
  - type: text
    content: En effet, interroge donc ╵les générations précédentes
  - type: text
    content: et médite avec soin ╵l’expérience des pères,
  '9':
  - type: text
    content: car nous sommes d’hier ╵et nous ne savons rien
  - type: text
    content: puisque nos jours sur terre ╵s’effacent comme une ombre.
