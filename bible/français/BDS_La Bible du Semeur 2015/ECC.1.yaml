document_id: ECC.1
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici ce que dit le Maître
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette expression rend le terme hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qoheleth, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dont le sens est inconnu. Il est possible qu’il soit apparenté à la même racine que le nom assemblée. L’ancienne version grecque l’a rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ecclésiaste, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire celui qui participe à une assemblée. Le terme hébreu semble cependant renvoyer à une fonction. On en a proposé les sens suivants : l’orateur de l’assemblée, le prédicateur, le chef de l’assemblée. On pourrait aussi le traduire, dans le contexte du livre, par « le sage ». Nous avons opté pour la traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (au sens d’enseignant) à cause du rôle didactique du livre au sein de la communauté d’Israël.
    marker-yv: yv-n
  - type: text
    text: ', fils de David, roi à Jérusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dérisoire, absolument dérisoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot hébreu, rendu ici par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dérisoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et traditionnellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vanité, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'désigne souvent ce qui est insignifiant, futile, vain, passager, fragile, dérisoire. Dans la suite du livre, ce terme a été rendu de diverses manières. L’apôtre Paul fait allusion à cette affirmation centrale du livre de l’Ecclésiaste en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rm 8.20
        metadata:
          usfm: ROM.8.20
      - type: text
        text: ', où il affirme que la création a été soumise à une condition bien '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dérisoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', dit le Maître, oui dérisoire, absolument dérisoire, tout est dérisoire !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Prologue : rien de nouveau sous le soleil'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quel avantage l’homme retire-t-il de tout le labeur pour lequel il trime sous le soleil ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Une génération s’en va, une autre vient, et la terre est toujours là. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le soleil se lève, le soleil se couche, et il aspire à se retrouver à l’endroit d’où il devra de nouveau se lever. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il va vers le sud, puis il tourne vers le nord, il tourne et tourne encore : ainsi va le vent. Et il reprend les mêmes tours, le vent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tous les fleuves vont se jeter dans la mer, mais la mer n’est pas remplie. Les fleuves ne cessent de couler toujours vers le même endroit en suivant leur cours. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tout est en travail
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tous les mots sont usés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c’est-à-dire tout a déjà été dit) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout est lassant.
    marker-yv: yv-n
  - type: text
    text: ', plus qu’on ne peut le dire. L’œil n’est jamais rassasié de voir. L’oreille n’est jamais remplie de ce qu’elle entend. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce qui a été, c’est ce qui sera, et ce qui s’est fait, c’est ce qui se fera : il n’y a rien de nouveau sous le soleil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si l’on dit : « Tenez ! Voilà quelque chose de nouveau », en fait, cela a déjà existé dans les temps qui nous ont précédés depuis longtemps. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seulement, on ne se souvient plus de ce qui s’est passé autrefois, et il en sera de même pour ce qui se produira dans l’avenir : ceux qui viendront après n’en auront aucun souvenir'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: On ne se souvient plus de ceux qui ont vécu autrefois, et l’on ne se souviendra pas davantage de ceux qui viendront dans l’avenir.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La condition humaine
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Où trouver le bonheur ?
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La recherche de la sagesse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moi, le Maître, j’ai été roi d’Israël à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et je me suis appliqué à étudier et à examiner par la sagesse tout ce qui se fait sous le soleil. Dieu impose aux hommes de s’appliquer à cette occupation de malheur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai vu tout ce qui se fait sous le soleil et je suis arrivé à la conclusion que tout est dérisoire : autant courir après le vent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce qui est tordu ne peut être redressé, et ce qui manque ne peut être compté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je me suis dit en moi-même : « Voici, j’ai fait augmenter et progresser la sagesse plus qu’aucun de ceux qui ont régné avant moi à Jérusalem. J’ai considéré beaucoup de sagesse et de connaissance. » '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je me suis appliqué à connaître la sagesse et le savoir, ainsi que la folie et la déraison. Et je me suis aperçu que cela aussi, c’est comme courir après le vent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c’est réflexion de vent, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autrement dit : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c’est réflexion qui brasse de l’air.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car, plus on a de sagesse, plus on a de sujets d’affliction. En augmentant sa connaissance, on augmente ses tourments.
