document_id: ECC.1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Voici ce que dit le Maître
  - type: note
    content: 'Cette expression rend le terme hébreu Qoheleth, dont le sens est inconnu. Il est possible qu’il soit apparenté à la même racine que le nom assemblée. L’ancienne version grecque l’a rendu par Ecclésiaste, c’est-à-dire celui qui participe à une assemblée. Le terme hébreu semble cependant renvoyer à une fonction. On en a proposé les sens suivants : l’orateur de l’assemblée, le prédicateur, le chef de l’assemblée. On pourrait aussi le traduire, dans le contexte du livre, par « le sage ». Nous avons opté pour la traduction Maître (au sens d’enseignant) à cause du rôle didactique du livre au sein de la communauté d’Israël.'
  - type: text
    content: ', fils de David, roi à Jérusalem.'
  - type: heading
    content: Thèse
  '10':
  - type: text
    content: 'Si l’on dit : « Tenez ! Voilà quelque chose de nouveau », en fait, cela a déjà existé dans les temps qui nous ont précédés depuis longtemps. '
  '11':
  - type: text
    content: 'Seulement, on ne se souvient plus de ce qui s’est passé autrefois, et il en sera de même pour ce qui se produira dans l’avenir : ceux qui viendront après n’en auront aucun souvenir'
  - type: note
    content: 'Certains comprennent : On ne se souvient plus de ceux qui ont vécu autrefois, et l’on ne se souviendra pas davantage de ceux qui viendront dans l’avenir.'
  - type: text
    content: .
  - type: heading
    content: La condition humaine
  - type: heading
    content: Où trouver le bonheur ?
  - type: heading
    content: La recherche de la sagesse
  '12':
  - type: text
    content: 'Moi, le Maître, j’ai été roi d’Israël à Jérusalem. '
  '13':
  - type: text
    content: Et je me suis appliqué à étudier et à examiner par la sagesse tout ce qui se fait sous le soleil. Dieu impose aux hommes de s’appliquer à cette occupation de malheur.
  '14':
  - type: text
    content: 'J’ai vu tout ce qui se fait sous le soleil et je suis arrivé à la conclusion que tout est dérisoire : autant courir après le vent. '
  '15':
  - type: text
    content: Ce qui est tordu ne peut être redressé, et ce qui manque ne peut être compté.
  '16':
  - type: text
    content: 'Je me suis dit en moi-même : « Voici, j’ai fait augmenter et progresser la sagesse plus qu’aucun de ceux qui ont régné avant moi à Jérusalem. J’ai considéré beaucoup de sagesse et de connaissance. » '
  '17':
  - type: text
    content: Je me suis appliqué à connaître la sagesse et le savoir, ainsi que la folie et la déraison. Et je me suis aperçu que cela aussi, c’est comme courir après le vent
  - type: note
    content: 'Autre traduction : c’est réflexion de vent, autrement dit : c’est réflexion qui brasse de l’air.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: Car, plus on a de sagesse, plus on a de sujets d’affliction. En augmentant sa connaissance, on augmente ses tourments.
  '2':
  - type: text
    content: Dérisoire, absolument dérisoire
  - type: note
    content: Le mot hébreu, rendu ici par dérisoire et traditionnellement traduit par vanité, désigne souvent ce qui est insignifiant, futile, vain, passager, fragile, dérisoire. Dans la suite du livre, ce terme a été rendu de diverses manières. L’apôtre Paul fait allusion à cette affirmation centrale du livre de l’Ecclésiaste en Rm 8.20, où il affirme que la création a été soumise à une condition bien dérisoire.
  - type: text
    content: ', dit le Maître, oui dérisoire, absolument dérisoire, tout est dérisoire !'
  - type: heading
    content: 'Prologue : rien de nouveau sous le soleil'
  '3':
  - type: text
    content: 'Quel avantage l’homme retire-t-il de tout le labeur pour lequel il trime sous le soleil ? '
  '4':
  - type: text
    content: 'Une génération s’en va, une autre vient, et la terre est toujours là. '
  '5':
  - type: text
    content: 'Le soleil se lève, le soleil se couche, et il aspire à se retrouver à l’endroit d’où il devra de nouveau se lever. '
  '6':
  - type: text
    content: 'Il va vers le sud, puis il tourne vers le nord, il tourne et tourne encore : ainsi va le vent. Et il reprend les mêmes tours, le vent. '
  '7':
  - type: text
    content: 'Tous les fleuves vont se jeter dans la mer, mais la mer n’est pas remplie. Les fleuves ne cessent de couler toujours vers le même endroit en suivant leur cours. '
  '8':
  - type: text
    content: Tout est en travail
  - type: note
    content: 'Autres traductions : tous les mots sont usés (c’est-à-dire tout a déjà été dit) ou tout est lassant.'
  - type: text
    content: ', plus qu’on ne peut le dire. L’œil n’est jamais rassasié de voir. L’oreille n’est jamais remplie de ce qu’elle entend. '
  '9':
  - type: text
    content: 'Ce qui a été, c’est ce qui sera, et ce qui s’est fait, c’est ce qui se fera : il n’y a rien de nouveau sous le soleil.'
