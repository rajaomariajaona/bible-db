document_id: GEN.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’alliance de Dieu avec Abram
  - type: text
    content: 'Après ces événements, l’Eternel s’adressa à Abram dans une vision : Ne crains rien, Abram, lui dit l’Eternel, je suis ton bouclier protecteur, ta récompense sera très grande.'
  '10':
  - type: text
    content: Abram alla prendre ces animaux, les coupa tous en deux par le milieu, excepté les oiseaux, et pour chacun d’eux disposa les deux moitiés face à face
  - type: note
    content: Voir Ac 7.6-7. Les alliances étaient parfois scellées par un sacrifice dont les victimes étaient coupées en deux moitiés entre lesquelles passaient les contractants (voir Jr 34.18).
  - type: text
    content: '. '
  '11':
  - type: text
    content: Des oiseaux de proie fondirent sur les bêtes mortes, mais Abram les chassa.
  '12':
  - type: text
    content: 'Au moment où le soleil se couchait, une grande torpeur s’empara d’Abram et, en même temps, l’angoisse le saisit dans une profonde obscurité. '
  '13':
  - type: text
    content: 'Le Seigneur lui dit : Sache bien que tes descendants vivront en étrangers dans un pays qui ne leur appartiendra pas, on en fera des esclaves et on les opprimera pendant quatre cents ans'
  - type: note
    content: Voir Ex 12.40 ; Ac 7.6.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Mais j’exécuterai mon jugement contre la nation qui les aura réduits en esclavage et ils quitteront le pays chargés de grandes richesses. '
  '15':
  - type: text
    content: 'Quant à toi, tu rejoindras en paix tes ancêtres, et tu seras enterré après une heureuse vieillesse. '
  '16':
  - type: text
    content: C’est seulement à la quatrième génération que tes descendants reviendront ici car, jusqu’à présent, les Amoréens n’ont pas encore mis le comble à leurs crimes.
  '17':
  - type: text
    content: 'Lorsque le soleil fut couché et que l’obscurité fut totale, un tourbillon de fumée et une torche de feu passèrent soudain entre les animaux partagés. '
  '18':
  - type: text
    content: 'Ce jour-là, l’Eternel fit alliance avec Abram et lui dit : Je promets de donner à ta descendance tout ce pays, depuis le fleuve d’Egypte'
  - type: note
    content: 'Frontière du pays d’Israël, du côté de l’Egypte (aujourd’hui : Wadi el-Arish).'
  - type: text
    content: ' jusqu’au grand fleuve, l’Euphrate, '
  '19':
  - type: text
    content: 'le pays des Qéniens, des Qeniziens, des Qadmonéens, '
  '2':
  - type: text
    content: 'Abram répondit : Eternel Dieu, que me donnerais-tu ? Je n’ai pas d’enfant, et c’est Eliézer de Damas qui héritera tous mes biens. '
  '20':
  - type: text
    content: 'des Hittites, des Phéréziens, des Rephaïm, '
  '21':
  - type: text
    content: des Amoréens, des Cananéens, des Guirgasiens et des Yebousiens.
  '3':
  - type: text
    content: Tu ne m’as pas donné de descendance, poursuivit-il, et c’est un serviteur attaché à mon service qui sera mon héritier.
  '4':
  - type: text
    content: 'Alors l’Eternel lui parla en ces termes : Non, cet homme-là ne sera pas ton héritier : c’est celui qui naîtra de toi qui héritera de toi.'
  '5':
  - type: text
    content: 'Puis Dieu le fit sortir de sa tente et lui dit : Contemple le ciel et compte les étoiles, si tu en es capable. Et il ajouta : Tes descendants seront aussi nombreux qu’elles'
  - type: note
    content: Voir Rm 4.18 ; Hé 11.12.
  - type: text
    content: .
  '6':
  - type: text
    content: Abram fit confiance à l’Eternel et, à cause de cela, l’Eternel le déclara juste
  - type: note
    content: Voir Rm 4.3 ; Ga 3.6 ; Jc 2.23.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Il lui dit : Je suis l’Eternel qui t’ai fait sortir d’Our des Chaldéens pour te donner ce pays en possession.'
  '8':
  - type: text
    content: – Seigneur Dieu, répondit Abram, comment aurai-je la certitude que je le posséderai ?
  '9':
  - type: text
    content: 'Dieu lui dit : Va chercher une génisse, une chèvre et un bélier ayant chacun trois ans, une tourterelle et un jeune pigeon.'
