document_id: GEN.15,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’alliance de Dieu avec Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après ces événements, l’Eternel s’adressa à Abram dans une vision : Ne crains rien, Abram, lui dit l’Eternel, je suis ton bouclier protecteur, ta récompense sera très grande.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram alla prendre ces animaux, les coupa tous en deux par le milieu, excepté les oiseaux, et pour chacun d’eux disposa les deux moitiés face à face
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ac 7.6-7
        - type: text
          text: '. Les alliances étaient parfois scellées par un sacrifice dont les victimes étaient coupées en deux moitiés entre lesquelles passaient les contractants (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jr 34.18
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Des oiseaux de proie fondirent sur les bêtes mortes, mais Abram les chassa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où le soleil se couchait, une grande torpeur s’empara d’Abram et, en même temps, l’angoisse le saisit dans une profonde obscurité. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur lui dit : Sache bien que tes descendants vivront en étrangers dans un pays qui ne leur appartiendra pas, on en fera des esclaves et on les opprimera pendant quatre cents ans'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 12.40 ; Ac 7.6.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais j’exécuterai mon jugement contre la nation qui les aura réduits en esclavage et ils quitteront le pays chargés de grandes richesses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, tu rejoindras en paix tes ancêtres, et tu seras enterré après une heureuse vieillesse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est seulement à la quatrième génération que tes descendants reviendront ici car, jusqu’à présent, les Amoréens n’ont pas encore mis le comble à leurs crimes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le soleil fut couché et que l’obscurité fut totale, un tourbillon de fumée et une torche de feu passèrent soudain entre les animaux partagés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, l’Eternel fit alliance avec Abram et lui dit : Je promets de donner à ta descendance tout ce pays, depuis le fleuve d’Egypte'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Frontière du pays d’Israël, du côté de l’Egypte (aujourd’hui : Wadi el-Arish).'
      marker-yv: yv-n
    - type: text
      text: ' jusqu’au grand fleuve, l’Euphrate, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le pays des Qéniens, des Qeniziens, des Qadmonéens, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram répondit : Eternel Dieu, que me donnerais-tu ? Je n’ai pas d’enfant, et c’est Eliézer de Damas qui héritera tous mes biens. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des Hittites, des Phéréziens, des Rephaïm, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: des Amoréens, des Cananéens, des Guirgasiens et des Yebousiens.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne m’as pas donné de descendance, poursuivit-il, et c’est un serviteur attaché à mon service qui sera mon héritier.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’Eternel lui parla en ces termes : Non, cet homme-là ne sera pas ton héritier : c’est celui qui naîtra de toi qui héritera de toi.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Dieu le fit sortir de sa tente et lui dit : Contemple le ciel et compte les étoiles, si tu en es capable. Et il ajouta : Tes descendants seront aussi nombreux qu’elles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Rm 4.18 ; Hé 11.12.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram fit confiance à l’Eternel et, à cause de cela, l’Eternel le déclara juste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Rm 4.3 ; Ga 3.6 ; Jc 2.23.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui dit : Je suis l’Eternel qui t’ai fait sortir d’Our des Chaldéens pour te donner ce pays en possession.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Seigneur Dieu, répondit Abram, comment aurai-je la certitude que je le posséderai ?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu lui dit : Va chercher une génisse, une chèvre et un bélier ayant chacun trois ans, une tourterelle et un jeune pigeon.'
