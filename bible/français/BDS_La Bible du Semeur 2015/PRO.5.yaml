document_id: PRO.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’adultère conduit à la mort
  - type: text
    content: Mon fils, sois attentif à la sagesse que je t’inculque.
  - type: text
    content: Prête l’oreille à mes paroles qui t’enseignent l’intelligence,
  '10':
  - type: text
    content: que des étrangers se rassasient de ce que tu as produit par tes efforts,
  - type: text
    content: et que le fruit de ton travail se retrouve dans la maison d’un autre,
  '11':
  - type: text
    content: de peur que, par la suite, tu gémisses,
  - type: text
    content: alors que ton corps tout entier sera épuisé,
  '12':
  - type: text
    content: 'et que tu dises :'
  - type: text
    content: « Comment donc ai-je pu haïr l’éducation ?
  - type: text
    content: Pourquoi ai-je dédaigné les avertissements ?
  '13':
  - type: text
    content: Pourquoi n’ai-je pas écouté ceux qui m’ont enseigné
  - type: text
    content: ni prêté attention à ceux qui m’instruisaient ?
  '14':
  - type: text
    content: Me voilà vite tombé dans le pire des malheurs
  - type: text
    content: au milieu de l’assemblée du peuple
  - type: note
    content: C’est-à-dire « déshonneur » et « honte » publics (6.33) jusqu’à la punition de son crime (Lv 20.10).
  - type: text
    content: . »
  - type: heading
    content: La beauté de la fidélité
  '15':
  - type: text
    content: Bois les eaux de ta propre citerne
  - type: text
    content: et celles qui jaillissent de ta fontaine
  - type: note
    content: C’est-à-dire « la femme que tu as choisie dans ta jeunesse » (v. 18).
  - type: text
    content: '  :'
  '16':
  - type: text
    content: tes sources doivent-elles se disperser au-dehors
  - type: text
    content: et tes ruisseaux dans les rues
  - type: note
    content: Si le mari est infidèle, sa femme risque de le devenir.
  - type: text
    content: '  ?'
  '17':
  - type: text
    content: Qu’ils soient pour toi seul !
  - type: text
    content: Ne les partage pas avec des étrangers.
  '18':
  - type: text
    content: Que ta source soit bénie !
  - type: text
    content: Fais ta joie de la femme que tu as aimée dans ta jeunesse,
  '19':
  - type: text
    content: biche charmante, gracieuse gazelle,
  - type: text
    content: que ses charmes t’enivrent toujours
  - type: text
    content: et que tu sois sans cesse épris de son amour !
  '2':
  - type: text
    content: pour que tu t’attaches à la réflexion
  - type: text
    content: et que tes lèvres gardent la connaissance.
  '20':
  - type: text
    content: Pourquoi, mon fils, t’amouracherais-tu de la femme d’autrui ?
  - type: text
    content: Pourquoi embrasserais-tu la poitrine d’une inconnue ?
  '21':
  - type: text
    content: L’Eternel observe toute la conduite d’un homme,
  - type: text
    content: il examine tout ce qu’il fait.
  '22':
  - type: text
    content: Celui qui fait le mal sera pris à ses propres méfaits,
  - type: text
    content: il s’embarrasse dans le filet tissé par son propre péché.
  '23':
  - type: text
    content: Il périra faute d’avoir été discipliné,
  - type: text
    content: il s’égarera enivré par l’excès de sa folie.
  '3':
  - type: text
    content: Car celles de la femme adultère distillent des paroles mielleuses,
  - type: text
    content: et sa langue est plus onctueuse que l’huile
  - type: note
    content: Pour les v. 3-5, voir 2.16 ; 7.6-27 ; 22.14.
  - type: text
    content: ','
  '4':
  - type: text
    content: mais la fin qu’elle te prépare est amère comme l’absinthe
  - type: note
    content: Symbole d’amertume (Lm 3.15 ; Ap 8.10, 11) ou de poison (Dt 29.17 ; Jr 9.14 ; Am 6.12).
  - type: text
    content: ','
  - type: text
    content: cruelle comme une épée à deux tranchants.
  '5':
  - type: text
    content: 'Ses pieds se précipitent vers la mort :'
  - type: text
    content: ses pas aboutissent au séjour des morts.
  '6':
  - type: text
    content: Elle ne se soucie guère du chemin de la vie.
  - type: text
    content: Elle suit des sentiers qui se perdent elle ne sait où.
  '7':
  - type: text
    content: Maintenant donc, mes fils, écoutez-moi,
  - type: text
    content: 'ne rejetez pas ce que je vous dis :'
  '8':
  - type: text
    content: éloigne-toi d’une telle femme,
  - type: text
    content: et ne t’approche pas de l’entrée de sa maison
  '9':
  - type: text
    content: de peur que ta dignité devienne la proie d’autrui,
  - type: text
    content: et les années de ta vie celles d’un homme cruel
  - type: note
    content: Le mari de la femme (6.34-35) qui pouvait exiger l’application de la Loi (Lv 20.10 ; Dt 22.22  ; voir Ez 16.35-40 ; Jn 8.5).
  - type: text
    content: ','
