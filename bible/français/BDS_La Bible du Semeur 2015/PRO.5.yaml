document_id: PRO.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’adultère conduit à la mort
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mon fils, sois attentif à la sagesse que je t’inculque.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à mes paroles qui t’enseignent l’intelligence,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: que des étrangers se rassasient de ce que tu as produit par tes efforts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que le fruit de ton travail se retrouve dans la maison d’un autre,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: de peur que, par la suite, tu gémisses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que ton corps tout entier sera épuisé,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'et que tu dises :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Comment donc ai-je pu haïr l’éducation ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ai-je dédaigné les avertissements ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pourquoi n’ai-je pas écouté ceux qui m’ont enseigné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni prêté attention à ceux qui m’instruisaient ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Me voilà vite tombé dans le pire des malheurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de l’assemblée du peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire « déshonneur » et « honte » publics (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '6.33'
        - type: text
          text: ) jusqu’à la punition de son crime (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 20.10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: . »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La beauté de la fidélité
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Bois les eaux de ta propre citerne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celles qui jaillissent de ta fontaine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire « la femme que tu as choisie dans ta jeunesse » (v. 18).
      marker-yv: yv-n
    - type: text
      text: '  :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: tes sources doivent-elles se disperser au-dehors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes ruisseaux dans les rues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Si le mari est infidèle, sa femme risque de le devenir.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Qu’ils soient pour toi seul !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne les partage pas avec des étrangers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Que ta source soit bénie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais ta joie de la femme que tu as aimée dans ta jeunesse,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: biche charmante, gracieuse gazelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ses charmes t’enivrent toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu sois sans cesse épris de son amour !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: pour que tu t’attaches à la réflexion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes lèvres gardent la connaissance.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Pourquoi, mon fils, t’amouracherais-tu de la femme d’autrui ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi embrasserais-tu la poitrine d’une inconnue ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L’Eternel observe toute la conduite d’un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il examine tout ce qu’il fait.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Celui qui fait le mal sera pris à ses propres méfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’embarrasse dans le filet tissé par son propre péché.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il périra faute d’avoir été discipliné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’égarera enivré par l’excès de sa folie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car celles de la femme adultère distillent des paroles mielleuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa langue est plus onctueuse que l’huile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 3-5, voir 2.16 ; 7.6-27 ; 22.14.
      marker-yv: yv-n
    - type: text
      text: ','
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: mais la fin qu’elle te prépare est amère comme l’absinthe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Symbole d’amertume (Lm 3.15 ; Ap 8.10, 11) ou de poison (Dt 29.17 ; Jr 9.14 ; Am 6.12).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cruelle comme une épée à deux tranchants.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ses pieds se précipitent vers la mort :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses pas aboutissent au séjour des morts.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elle ne se soucie guère du chemin de la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle suit des sentiers qui se perdent elle ne sait où.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Maintenant donc, mes fils, écoutez-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne rejetez pas ce que je vous dis :'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: éloigne-toi d’une telle femme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne t’approche pas de l’entrée de sa maison
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: de peur que ta dignité devienne la proie d’autrui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les années de ta vie celles d’un homme cruel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le mari de la femme (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 6.34-35
        - type: text
          text: ) qui pouvait exiger l’application de la Loi (Lv 20.10 ; Dt 22.22  ; voir Ez 16.35-40 ; Jn 8.5).
      marker-yv: yv-n
    - type: text
      text: ','
