document_id: EZK.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les causes de la ruine qui vient
  - type: heading
    content: Le mime de l’exilé
  - type: text
    content: 'L’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: 'Réponds-leur : « Voici ce que déclare le Seigneur, l’Eternel : Ce message concerne le prince qui est à Jérusalem et toute la communauté israélite qui se trouve à l’intérieur de cette ville. »'
  '11':
  - type: text
    content: 'Dis-leur : « Je suis pour vous un signe », car il leur sera fait selon ce que j’ai fait : ils iront en déportation, ils iront en exil. '
  '12':
  - type: text
    content: 'Le prince qui se trouve au milieu d’eux mettra son baluchon, en pleine nuit, sur son épaule et quittera la ville par un trou dans le mur que l’on aura percé pour le faire sortir. Il se cachera le visage pour qu’il ne voie pas le pays. '
  '13':
  - type: text
    content: J’étendrai mon filet sur lui et il sera pris dans mon piège, je le ferai partir pour Babylone dans le pays des Chaldéens, qu’il ne verra pas de ses yeux, et c’est là qu’il mourra
  - type: note
    content: Voir 2 R 25.4-7 ; Jr 39.4-7 ; 52.7-11.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Je disperserai à tout vent tous les gens de son entourage, son personnel et tous ses bataillons, et je les poursuivrai avec l’épée. '
  '15':
  - type: text
    content: 'Et ils reconnaîtront que je suis l’Eternel quand je les aurai dispersés au milieu de peuples étrangers, quand je les aurai répandus dans différents pays. '
  '16':
  - type: text
    content: Mais je conserverai un petit nombre d’entre eux qui échapperont à l’épée, à la famine et à la peste, pour qu’ils racontent toutes leurs abominations au milieu des peuples chez qui ils iront. Et l’on reconnaîtra que je suis l’Eternel.
  '17':
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '18':
  - type: text
    content: 'Fils d’homme, tu mangeras ton pain en tremblant, et tu boiras ton eau au milieu de l’angoisse et de l’agitation. '
  '19':
  - type: text
    content: 'Tu diras au peuple du pays : « Habitants de Jérusalem, voici ce que déclare le Seigneur, l’Eternel, contre le pays d’Israël : Ils mangeront leur pain au milieu de l’angoisse, et ils boiront leur eau dans la désolation, parce que le pays va être dévasté, privé de tous ses biens, à cause des actes de violence de tous ceux qui l’habitent. '
  '2':
  - type: text
    content: 'Fils d’homme, tu habites au milieu d’une communauté rebelle : ils ont des yeux pour voir, mais ils ne voient pas ; ils ont des oreilles pour entendre, mais ils n’entendent pas, car ce sont des rebelles'
  - type: note
    content: Voir Es 6.9-10 ; Jr 5.21 ; Mc 8.18.
  - type: text
    content: '. '
  '20':
  - type: text
    content: Les villes peuplées seront détruites, le pays sera dévasté, et vous reconnaîtrez que je suis l’Eternel. »
  - type: heading
    content: Vraie et fausse prophétie
  '21':
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '22':
  - type: text
    content: 'Fils d’homme, quel est donc le dicton qui a cours parmi vous au sujet du pays d’Israël : « Le temps se fait bien long et aucune vision ne s’accomplit » ? '
  '23':
  - type: text
    content: 'C’est pourquoi dis-leur donc : « Voici comment vous parle le Seigneur, l’Eternel : Je ferai taire ce dicton et il n’aura plus jamais cours en Israël. » Dis-leur donc : « Au contraire, voici : le temps s’approche où toutes les visions se réaliseront. '
  '24':
  - type: text
    content: 'Car il n’y aura plus de vision mensongère, ni de prédiction de complaisance, au milieu d’Israël. '
  '25':
  - type: text
    content: Car moi, l’Eternel, je dirai ce que j’ai à dire, et puis cela s’accomplira sans être encore différé. C’est de votre vivant, communauté rebelle, que je prononcerai cette parole, et que je l’accomplirai. C’est là ce que déclare le Seigneur, l’Eternel. »
  '26':
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '27':
  - type: text
    content: 'Fils d’homme, la communauté d’Israël déclare à ton sujet : « La vision de cet homme concerne des jours très lointains, et ce qu’il prophétise est pour beaucoup plus tard. » '
  '28':
  - type: text
    content: 'C’est pourquoi dis-leur donc : « Voici ce que déclare le Seigneur, l’Eternel : Aucune des paroles que, moi, j’ai prononcées ne tardera à s’accomplir. C’est là ce que déclare le Seigneur, l’Eternel. »'
  '3':
  - type: text
    content: 'Fils d’homme, fais tes bagages comme pour partir en déportation, puis pars comme en déportation en plein jour sous leurs yeux. Que tout le monde te voie partir en exil de l’endroit où tu habites vers un autre lieu. Peut-être comprendront-ils qu’ils sont une communauté rebelle. '
  '4':
  - type: text
    content: 'Dépose ton baluchon d’exilé dehors, en plein jour, pour que tout le monde le voie. Le soir, tu sortiras sous leurs yeux, comme pour un départ en exil. '
  '5':
  - type: text
    content: 'Sous leurs yeux, tu creuseras un trou dans la muraille de la ville, et tu feras passer ton ballot par là. '
  '6':
  - type: text
    content: Sous leurs yeux, tu le chargeras sur ton épaule et tu l’emporteras dans la nuit noire ; tu te cacheras le visage en sorte que tu ne puisses pas voir le pays. Car je fais de toi un signe pour la communauté d’Israël.
  '7':
  - type: text
    content: 'Je fis ce qui m’avait été ordonné : je sortis en plein jour mes affaires arrangées comme un bagage d’exilé ; et le soir, je creusai, à la main, un trou dans le mur, puis, dans la nuit noire, je les fis passer par là et je les chargeai sur l’épaule sous leurs yeux.'
  '8':
  - type: text
    content: 'Le lendemain matin, l’Eternel m’adressa la parole en ces termes :'
  '9':
  - type: text
    content: 'Fils d’homme, les Israélites, ces gens rebelles, ne t’ont-ils pas demandé : « Que fais-tu ? » '
