document_id: EZK.29,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre l’Egypte
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les Egyptiens dispersés
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le douzième jour du dixième mois de la dixième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire janvier 587 av. J.-C., peu avant l’assaut final des Babyloniens contre Jérusalem. Les Judéens se tournaient encore vers les Egyptiens dont ils espéraient le secours (v. 6,16).
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: à cause de cela, je vais m’en prendre à toi, à toi et à tes fleuves, et faire de l’Egypte des ruines, des ruines désertiques de Migdol à Assouan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Migdol
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probablement au nord de l’Egypte. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Assouan
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au sud de l’Egypte.
      marker-yv: yv-n
    - type: text
      text: ' et jusqu’à la frontière de l’Ethiopie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y passera plus ni homme ni bête, car, pendant quarante ans, elle sera inhabitée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ferai de l’Egypte le plus désertique de tous les pays et de ses villes les plus ravagées de toutes les villes en ruine : cela durera quarante ans. Je disséminerai les Egyptiens parmi les autres peuples, je les disperserai dans différents pays.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais voici ce que dit le Seigneur, l’Eternel : Au bout de quarante ans, moi, je rassemblerai les Egyptiens d’entre les peuples où on les aura dispersés, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et je ramènerai les captifs de l’Egypte, je les rétablirai au pays de Patros
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La Haute-Egypte.
      marker-yv: yv-n
    - type: text
      text: ', leur pays d’origine, et là ils formeront un modeste royaume. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Egypte sera plus modeste que les autres royaumes, elle ne s’élèvera plus au-dessus des autres peuples. Je réduirai leur importance afin qu’ils ne dominent plus sur les autres peuples. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La communauté d’Israël ne mettra plus jamais sa confiance en eux. L’Egypte sera là comme un souvenir du péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 17.15 ; 29.6.
      marker-yv: yv-n
    - type: text
      text: ' que mon peuple a commis en se tournant vers elle, et l’on reconnaîtra que moi, je suis le Seigneur, l’Eternel. »'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le salaire pour le siège de Tyr
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le premier jour du premier mois de la vingt-septième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en avril 571 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel m’adressa la parole en ces termes :'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils d’homme, Nabuchodonosor, le roi de Babylone, a soumis son armée à un effort immense pour lutter contre Tyr
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le siège de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tyr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a duré 13 ans, de 586 à 573 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: . Les têtes des soldats en sont devenues chauves et toutes les épaules ont été écorchées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute à cause des pénibles travaux nécessités par la construction d’une digue (terminée plus tard par Alexandre le Grand).
      marker-yv: yv-n
    - type: text
      text: ' mais il n’a retiré aucun profit de Tyr, ni pour lui, ni pour son armée, pour cette opération qu’il a menée contre elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Je vais donner l’Egypte à Nabuchodonosor, le roi de Babylone. Il en emportera les nombreuses richesses, il y prendra un butin et la pillera complètement. L’Egypte servira de salaire à ses troupes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fils d’homme, dirige ton regard vers le pharaon, roi d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pharaon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: visé est Hophra (589 à 570 av. J.-C.).
      marker-yv: yv-n
    - type: text
      text: ', et prophétise contre lui, contre l’Egypte tout entière. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour le rétribuer du travail contre Tyr, je lui livre l’Egypte, parce que ses troupes ont œuvré pour moi. C’est là ce que déclare le Seigneur, l’Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce jour-là, je ferai croître la force d’Israël. Quant à toi, tu pourras parler librement parmi eux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu pourras parler librement parmi eux
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'il ne peut pas s’agir ici d’une annonce de la fin du mutisme du prophète (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '3.26'
        - type: text
          text: ' et note). Cet oracle étant daté de 571 (voir v. 17 et note), il y avait bien longtemps que ce mutisme avait cessé (24.27 ; 33.21-22). Certains comprennent ce propos énigmatique comme annonçant la reconnaissance par le peuple de l’accomplissement de ses prophéties.'
      marker-yv: yv-n
    - type: text
      text: ', et ils reconnaîtront que je suis l’Eternel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras : « Voici ce que dit le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais m’en prendre à toi, ╵pharaon, roi d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi le grand crocodile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tapi au milieu de tes fleuves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Soit les différents bras du Nil formant le delta, soit la multitude des canaux partant du fleuve et irriguant le pays.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'toi qui as dit : ╵“Mon Nil, il est à moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est moi qui l’ai fait.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te passerai des crochets ╵dans les mâchoires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai adhérer ╵les poissons de tes fleuves ╵à tes écailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te tirerai ╵du milieu de tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec tous les poissons ╵qui nagent dans tes fleuves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui adhéreront ╵à tes écailles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te jetterai ╵dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi et tous les poissons ╵qui nagent dans tes fleuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu retomberas ╵sur le sol dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que l’on te recueille ╵et qu’on t’ensevelisse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te donnerai en pâture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux animaux sauvages ╵et aux oiseaux du ciel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous les habitants ╵de l’Egypte reconnaîtront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je suis l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les Israélites
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’ont trouvé en eux qu’un appui ╵aussi fragile qu’un roseau.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils t’ont saisi dans leur main, ╵tu as cassé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur as déchiré toute l’épaule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand ils s’appuyaient sur toi, ╵tu t’es brisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu leur as paralysé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu leur as paralysé
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après la version syriaque. Voir l’ancienne version grecque qui a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu as brisé. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as affermi.
      marker-yv: yv-n
    - type: text
      text: ' les reins.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi le Seigneur, l’Eternel, te déclare : Je vais faire venir l’épée pour t’attaquer, je supprimerai de chez toi les hommes et les bêtes ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le pays d’Egypte deviendra un désert et une ruine, et l’on reconnaîtra que je suis l’Eternel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parce que tu as dit : “Le Nil m’appartient et c’est moi qui l’ai fait”, '
