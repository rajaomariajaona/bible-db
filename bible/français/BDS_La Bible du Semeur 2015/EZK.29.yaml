document_id: EZK.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l’Egypte
  - type: heading
    content: Les Egyptiens dispersés
  - type: text
    content: Le douzième jour du dixième mois de la dixième année
  - type: note
    content: C’est-à-dire janvier 587 av. J.-C., peu avant l’assaut final des Babyloniens contre Jérusalem. Les Judéens se tournaient encore vers les Egyptiens dont ils espéraient le secours (v. 6,16).
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: à cause de cela, je vais m’en prendre à toi, à toi et à tes fleuves, et faire de l’Egypte des ruines, des ruines désertiques de Migdol à Assouan
  - type: note
    content: 'Migdol: probablement au nord de l’Egypte. Assouan: au sud de l’Egypte.'
  - type: text
    content: ' et jusqu’à la frontière de l’Ethiopie. '
  '11':
  - type: text
    content: 'Il n’y passera plus ni homme ni bête, car, pendant quarante ans, elle sera inhabitée. '
  '12':
  - type: text
    content: 'Je ferai de l’Egypte le plus désertique de tous les pays et de ses villes les plus ravagées de toutes les villes en ruine : cela durera quarante ans. Je disséminerai les Egyptiens parmi les autres peuples, je les disperserai dans différents pays.'
  '13':
  - type: text
    content: 'Mais voici ce que dit le Seigneur, l’Eternel : Au bout de quarante ans, moi, je rassemblerai les Egyptiens d’entre les peuples où on les aura dispersés, '
  '14':
  - type: text
    content: et je ramènerai les captifs de l’Egypte, je les rétablirai au pays de Patros
  - type: note
    content: La Haute-Egypte.
  - type: text
    content: ', leur pays d’origine, et là ils formeront un modeste royaume. '
  '15':
  - type: text
    content: 'L’Egypte sera plus modeste que les autres royaumes, elle ne s’élèvera plus au-dessus des autres peuples. Je réduirai leur importance afin qu’ils ne dominent plus sur les autres peuples. '
  '16':
  - type: text
    content: La communauté d’Israël ne mettra plus jamais sa confiance en eux. L’Egypte sera là comme un souvenir du péché
  - type: note
    content: Voir 17.15 ; 29.6.
  - type: text
    content: ' que mon peuple a commis en se tournant vers elle, et l’on reconnaîtra que moi, je suis le Seigneur, l’Eternel. »'
  - type: heading
    content: Le salaire pour le siège de Tyr
  '17':
  - type: text
    content: Le premier jour du premier mois de la vingt-septième année
  - type: note
    content: C’est-à-dire en avril 571 av. J.-C.
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '18':
  - type: text
    content: Fils d’homme, Nabuchodonosor, le roi de Babylone, a soumis son armée à un effort immense pour lutter contre Tyr
  - type: note
    content: Le siège de Tyr a duré 13 ans, de 586 à 573 av. J.-C.
  - type: text
    content: . Les têtes des soldats en sont devenues chauves et toutes les épaules ont été écorchées
  - type: note
    content: Sans doute à cause des pénibles travaux nécessités par la construction d’une digue (terminée plus tard par Alexandre le Grand).
  - type: text
    content: ' mais il n’a retiré aucun profit de Tyr, ni pour lui, ni pour son armée, pour cette opération qu’il a menée contre elle. '
  '19':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, dit ceci : Je vais donner l’Egypte à Nabuchodonosor, le roi de Babylone. Il en emportera les nombreuses richesses, il y prendra un butin et la pillera complètement. L’Egypte servira de salaire à ses troupes. '
  '2':
  - type: text
    content: Fils d’homme, dirige ton regard vers le pharaon, roi d’Egypte
  - type: note
    content: Le pharaon visé est Hophra (589 à 570 av. J.-C.).
  - type: text
    content: ', et prophétise contre lui, contre l’Egypte tout entière. '
  '20':
  - type: text
    content: 'Pour le rétribuer du travail contre Tyr, je lui livre l’Egypte, parce que ses troupes ont œuvré pour moi. C’est là ce que déclare le Seigneur, l’Eternel. '
  '21':
  - type: text
    content: En ce jour-là, je ferai croître la force d’Israël. Quant à toi, tu pourras parler librement parmi eux
  - type: note
    content: 'tu pourras parler librement parmi eux: il ne peut pas s’agir ici d’une annonce de la fin du mutisme du prophète (voir 3.26 et note). Cet oracle étant daté de 571 (voir v. 17 et note), il y avait bien longtemps que ce mutisme avait cessé (24.27 ; 33.21-22). Certains comprennent ce propos énigmatique comme annonçant la reconnaissance par le peuple de l’accomplissement de ses prophéties.'
  - type: text
    content: ', et ils reconnaîtront que je suis l’Eternel.'
  '3':
  - type: text
    content: 'Tu diras : « Voici ce que dit le Seigneur, l’Eternel :'
  - type: text
    content: Je vais m’en prendre à toi, ╵pharaon, roi d’Egypte,
  - type: text
    content: toi le grand crocodile
  - type: text
    content: tapi au milieu de tes fleuves
  - type: note
    content: Soit les différents bras du Nil formant le delta, soit la multitude des canaux partant du fleuve et irriguant le pays.
  - type: text
    content: ','
  - type: text
    content: 'toi qui as dit : ╵“Mon Nil, il est à moi,'
  - type: text
    content: et c’est moi qui l’ai fait.”
  '4':
  - type: text
    content: Je te passerai des crochets ╵dans les mâchoires,
  - type: text
    content: je ferai adhérer ╵les poissons de tes fleuves ╵à tes écailles,
  - type: text
    content: et je te tirerai ╵du milieu de tes fleuves,
  - type: text
    content: avec tous les poissons ╵qui nagent dans tes fleuves
  - type: text
    content: et qui adhéreront ╵à tes écailles.
  '5':
  - type: text
    content: Et je te jetterai ╵dans le désert,
  - type: text
    content: toi et tous les poissons ╵qui nagent dans tes fleuves.
  - type: text
    content: Et tu retomberas ╵sur le sol dans les champs,
  - type: text
    content: sans que l’on te recueille ╵et qu’on t’ensevelisse.
  - type: text
    content: Je te donnerai en pâture
  - type: text
    content: aux animaux sauvages ╵et aux oiseaux du ciel.
  '6':
  - type: text
    content: Et tous les habitants ╵de l’Egypte reconnaîtront
  - type: text
    content: que je suis l’Eternel.
  - type: text
    content: Car les Israélites
  - type: text
    content: n’ont trouvé en eux qu’un appui ╵aussi fragile qu’un roseau.
  '7':
  - type: text
    content: Quand ils t’ont saisi dans leur main, ╵tu as cassé
  - type: text
    content: et leur as déchiré toute l’épaule,
  - type: text
    content: et quand ils s’appuyaient sur toi, ╵tu t’es brisé
  - type: text
    content: et tu leur as paralysé
  - type: note
    content: 'tu leur as paralysé: d’après la version syriaque. Voir l’ancienne version grecque qui a : tu as brisé. Le texte hébreu traditionnel a : tu as affermi.'
  - type: text
    content: ' les reins.'
  '8':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, te déclare : Je vais faire venir l’épée pour t’attaquer, je supprimerai de chez toi les hommes et les bêtes ; '
  '9':
  - type: text
    content: le pays d’Egypte deviendra un désert et une ruine, et l’on reconnaîtra que je suis l’Eternel.
  - type: text
    content: 'Parce que tu as dit : “Le Nil m’appartient et c’est moi qui l’ai fait”, '
