document_id: 2SA.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David témoigne sa faveur au fils de Jonathan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David demanda : Reste-t-il encore un survivant de la famille de Saül ? J’aimerais lui témoigner ma faveur par amitié pour Jonathan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 20.15-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toi, tes fils et tes serviteurs, vous cultiverez ses terres pour lui et tu apporteras ce que vous récolterez pour assurer l’entretien du fils de ton maître. Quant à Mephibosheth, le fils de ton maître, c’est à ma table qu’il prendra tous les jours ses repas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or Tsiba avait quinze fils et vingt serviteurs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit au roi : Ton serviteur fera tout ce que le roi mon seigneur lui a ordonné.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Mephibosheth mangea à la table royale comme s’il était l’un des fils du roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mephibosheth avait un jeune fils nommé Mika. Tous ceux qui demeuraient chez Tsiba étaient à son service. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme il était estropié des deux pieds, il résidait à Jérusalem pour pouvoir aller tous les jours manger à la table du roi.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait un ancien serviteur de la maison de Saül nommé Tsiba. On le fit venir auprès de David. Le roi lui demanda : Es-tu bien Tsiba ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit : C’est moi, ton serviteur !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le roi lui posa la question : Reste-t-il encore quelqu’un de la famille de Saül ? Je voudrais lui témoigner ma faveur comme je l’ai promis devant Dieu.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiba lui répondit : Il existe encore un fils de Jonathan qui a les deux jambes estropiées'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 4.4
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Où vit-il ? lui demanda le roi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiba répondit : Dans la maison de Makir, un fils d’Ammiel à Lo-Debar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Un riche bienfaiteur de Mephibosheth qui viendra rejoindre David (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '17.27'
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lo-Debar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est situé dans le territoire de Galaad, à l’est du Jourdain (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Jos 13.25-26
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi David l’envoya donc chercher à Lo-Debar dans la maison de Makir.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Mephibosheth, fils de Jonathan et petit-fils de Saül, fut arrivé chez David, il s’inclina face contre terre et se prosterna devant lui. David l’appela : Mephibosheth !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: – C’est bien moi, pour te servir.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David lui dit : N’aie aucune crainte ; car je t’assure que je veux te traiter avec faveur par amitié pour ton père Jonathan. De plus, je te rendrai toutes les terres qui appartenaient à ton grand-père Saül. Quant à toi, tu prendras tous tes repas à ma table.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mephibosheth se prosterna de nouveau et dit : Qu’est donc ton serviteur pour que tu t’intéresses à lui ? Je ne vaux pas plus qu’un chien mort.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi appela Tsiba, le domestique de Saül, et lui dit : Tout ce qui appartenait à Saül et à toute sa famille, je le donne au petit-fils de ton maître. '
