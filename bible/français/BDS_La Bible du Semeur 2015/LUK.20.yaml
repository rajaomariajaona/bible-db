document_id: LUK.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autorité de Jésus contestée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 21.23-27 ; Mc 11.27-33)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un de ces jours-là, pendant que Jésus enseignait le peuple dans la cour du Temple et lui annonçait la Bonne Nouvelle de l’Evangile, les chefs des prêtres survinrent avec les spécialistes de la Loi et les responsables du peuple '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et ils l’interpellèrent en ces termes : Dis-nous par quelle autorité tu agis ainsi. Ou qui est donc celui qui t’a donné cette autorité ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Moi aussi, j’ai une question à vous poser,
  - type: text
    text: ' répliqua Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'A vous de répondre :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils se mirent à raisonner entre eux : Si nous disons : « De Dieu », il va nous demander : « Pourquoi n’avez-vous pas cru en lui ? » '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais si nous répondons : « Des hommes », tout le peuple va nous lapider, car ces gens-là sont tous convaincus que Jean était un prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils répondirent donc qu’ils ne savaient pas d’où Jean tenait son mandat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien,
  - type: text
    text: ' répliqua Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La culpabilité des chefs religieux juifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 21.33-46 ; Mc 12.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il s’adressa ensuite au peuple et se mit à raconter cette parabole : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un homme planta une vigne ; il la loua à des vignerons et partit en voyage pour un temps assez long.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Au moment des vendanges, il envoya un serviteur auprès des vignerons afin qu’ils lui remettent une partie du produit de la vigne, mais les vignerons le rouèrent de coups et le renvoyèrent les mains vides.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le propriétaire leur envoya un autre serviteur. Celui-là aussi, ils le renvoyèrent les mains vides, après l’avoir roué de coups et couvert d’insultes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le maître persévéra et leur en envoya un troisième. Celui-là aussi, ils le chassèrent, après l’avoir grièvement blessé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le propriétaire du vignoble se dit alors : « Que faire ? Je leur enverrai mon fils bien-aimé ; peut-être auront-ils du respect pour lui. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais quand les vignerons l’aperçurent, ils raisonnèrent ainsi entre eux : « Voilà l’héritier ! Tuons-le, afin que l’héritage nous revienne ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors ils le traînèrent hors du vignoble et le tuèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comment le propriétaire de la vigne agira-t-il envers eux ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il viendra lui-même, fera exécuter ces vignerons et confiera le soin de sa vigne à d’autres.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Pas question ! s’écrièrent les auditeurs de Jésus en entendant cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais lui, fixant le regard sur eux, leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que signifie donc ce texte de l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La pierre que les constructeurs
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ont rejetée
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: est devenue la pierre principale,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la pierre d’angle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Celui qui tombera sur cette pierre-là
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: se brisera la nuque,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et si elle tombe sur quelqu’un,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: elle l’écrasera
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118.22 ; Es 8.14-15.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les spécialistes de la Loi et les chefs des prêtres cherchèrent à mettre immédiatement la main sur Jésus, mais ils eurent peur des réactions du peuple. En effet, ils avaient bien compris que c’était eux que Jésus visait par cette parabole.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’impôt dû à César
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.15-22 ; Mc 12.13-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dès lors, ils le surveillèrent de près et envoyèrent auprès de lui des agents qui feraient semblant d’être des hommes pieux. Ils devaient le prendre en défaut dans ses paroles. Ainsi ils pourraient le livrer au pouvoir et à l’autorité du gouverneur romain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces gens-là l’abordèrent donc : Maître, nous savons que tu dis la vérité et que tu enseignes en toute droiture ; tu ne tiens pas compte de la position sociale des gens, mais c’est en toute vérité que tu enseignes la voie à suivre selon Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Eh bien, dis-nous, si oui ou non, nous avons le droit de payer des impôts à César ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Connaissant leur fourberie, Jésus leur répondit : '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Montrez-moi une pièce d’argent ! De qui porte-t-elle l’effigie et l’inscription ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – De César.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Eh bien !
  - type: text
    text: ' leur dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: rendez à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils furent incapables de le prendre en défaut dans les propos qu’il tenait devant le peuple et, décontenancés par sa réponse, ils ne trouvèrent rien à répliquer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur la résurrection
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.23-33 ; Mc 12.18-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quelques sadducéens, qui nient que les morts ressuscitent, vinrent trouver Jésus. Ils lui posèrent la question suivante : '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Maître, dans ses écrits, Moïse nous a laissé ce commandement : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si un homme vient à mourir, en laissant une femme mais pas d’enfant, son frère doit épouser sa veuve pour donner une descendance au défunt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 25.5
        metadata:
          usfm: DEU.25.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Or, il y avait sept frères. L’aîné se maria, et il mourut sans laisser d’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le second, puis le troisième épousèrent la veuve, et ainsi de suite jusqu’au septième ; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: et ils moururent tous les sept sans avoir eu d’enfant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'En fin de compte, la femme mourut elle aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Eh bien, cette femme, à la résurrection, duquel des sept frères sera-t-elle la femme ? Car ils l’ont tous eue pour épouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans le monde présent, hommes et femmes se marient.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais ceux qui seront jugés dignes de ressusciter d’entre les morts pour faire partie du monde à venir, ne se marieront plus.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Ils ne pourront pas non plus mourir, parce qu’ils seront comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ', et ils seront fils de Dieu, puisqu’ils seront ressuscités.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que les morts ressuscitent, Moïse lui-même l’a indiqué, lorsqu’il est question du buisson ardent : en effet, il appelle le Seigneur '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Dieu d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Abraham
      - type: text
        text: ', le Dieu d’'
      - type: usfm
        marker: w
        children:
        - type: text
          text: Isaac
      - type: text
        text: ' et le Dieu de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.6
        metadata:
          usfm: EXO.3.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or, Dieu n’est pas le Dieu des morts, mais le Dieu des vivants ; c’est donc bien que, pour lui, les patriarches sont tous les trois vivants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Là-dessus, quelques spécialistes de la Loi prirent la parole : Tu as bien répondu, Maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Car ils n’osaient plus lui poser de questions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Controverse sur l’identité du Messie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 22.41-46 ; Mc 12.35-37)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus les interrogea à son tour : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comment se fait-il que l’on dise que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' doit être un descendant de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
    - type: text
      text: '  ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
