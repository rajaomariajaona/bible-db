- type: usfm
  marker: s1
  children:
  - type: text
    text: La condamnation des spécialistes de la Loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 23.6 ; Mc 12.38-40)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tandis que la foule l’écoutait, il dit à ses disciples : '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Gardez-vous des spécialistes de la Loi qui aiment à parader en costume de cérémonie, qui affectionnent qu’on les salue sur les places publiques, qui veulent les sièges d’honneur dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' et les meilleures places dans les banquets.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils dépouillent les veuves de leurs biens tout en faisant de longues prières pour l’apparence. Leur condamnation n’en sera que plus sévère.
