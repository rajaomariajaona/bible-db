document_id: LUK.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autorité de Jésus contestée
  - type: heading
    content: (Mt 21.23-27 ; Mc 11.27-33)
  - type: text
    content: 'Un de ces jours-là, pendant que Jésus enseignait le peuple dans la cour du Temple et lui annonçait la Bonne Nouvelle de l’Evangile, les chefs des prêtres survinrent avec les spécialistes de la Loi et les responsables du peuple '
  '10':
  - type: text
    content: Au moment des vendanges, il envoya un serviteur auprès des vignerons afin qu’ils lui remettent une partie du produit de la vigne, mais les vignerons le rouèrent de coups et le renvoyèrent les mains vides.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Le propriétaire leur envoya un autre serviteur. Celui-là aussi, ils le renvoyèrent les mains vides, après l’avoir roué de coups et couvert d’insultes.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Le maître persévéra et leur en envoya un troisième. Celui-là aussi, ils le chassèrent, après l’avoir grièvement blessé.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Le propriétaire du vignoble se dit alors : « Que faire ? Je leur enverrai mon fils bien-aimé ; peut-être auront-ils du respect pour lui. »'
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Mais quand les vignerons l’aperçurent, ils raisonnèrent ainsi entre eux : « Voilà l’héritier ! Tuons-le, afin que l’héritage nous revienne ! »'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Alors ils le traînèrent hors du vignoble et le tuèrent.
  - type: text
    content: Comment le propriétaire de la vigne agira-t-il envers eux ?
  - type: text
    content: ' '
  '16':
  - type: text
    content: Il viendra lui-même, fera exécuter ces vignerons et confiera le soin de sa vigne à d’autres.
  - type: text
    content: – Pas question ! s’écrièrent les auditeurs de Jésus en entendant cela.
  '17':
  - type: text
    content: 'Mais lui, fixant le regard sur eux, leur dit : '
  - type: text
    content: 'Que signifie donc ce texte de l’Ecriture :'
  - type: text
    content: La pierre que les constructeurs
  - type: text
    content: ' ╵'
  - type: text
    content: ont rejetée
  - type: text
    content: est devenue la pierre principale,
  - type: text
    content: ' ╵'
  - type: text
    content: la pierre d’angle.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Celui qui tombera sur cette pierre-là
  - type: text
    content: ' ╵'
  - type: text
    content: se brisera la nuque,
  - type: text
    content: et si elle tombe sur quelqu’un,
  - type: text
    content: ' ╵'
  - type: text
    content: elle l’écrasera
  - type: text
    content: ' '
  - type: note
    content: Ps 118.22 ; Es 8.14-15.
  - type: text
    content: .
  '19':
  - type: text
    content: Les spécialistes de la Loi et les chefs des prêtres cherchèrent à mettre immédiatement la main sur Jésus, mais ils eurent peur des réactions du peuple. En effet, ils avaient bien compris que c’était eux que Jésus visait par cette parabole.
  - type: heading
    content: Controverse sur l’impôt dû à César
  - type: heading
    content: (Mt 22.15-22 ; Mc 12.13-17)
  '2':
  - type: text
    content: 'et ils l’interpellèrent en ces termes : Dis-nous par quelle autorité tu agis ainsi. Ou qui est donc celui qui t’a donné cette autorité ?'
  '20':
  - type: text
    content: Dès lors, ils le surveillèrent de près et envoyèrent auprès de lui des agents qui feraient semblant d’être des hommes pieux. Ils devaient le prendre en défaut dans ses paroles. Ainsi ils pourraient le livrer au pouvoir et à l’autorité du gouverneur romain.
  '21':
  - type: text
    content: 'Ces gens-là l’abordèrent donc : Maître, nous savons que tu dis la vérité et que tu enseignes en toute droiture ; tu ne tiens pas compte de la position sociale des gens, mais c’est en toute vérité que tu enseignes la voie à suivre selon Dieu. '
  '22':
  - type: text
    content: Eh bien, dis-nous, si oui ou non, nous avons le droit de payer des impôts à César ?
  '23':
  - type: text
    content: 'Connaissant leur fourberie, Jésus leur répondit : '
  '24':
  - type: text
    content: Montrez-moi une pièce d’argent ! De qui porte-t-elle l’effigie et l’inscription ?
  - type: text
    content: – De César.
  '25':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien !
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: rendez à César ce qui revient à César, et à Dieu ce qui revient à Dieu.
  '26':
  - type: text
    content: Ils furent incapables de le prendre en défaut dans les propos qu’il tenait devant le peuple et, décontenancés par sa réponse, ils ne trouvèrent rien à répliquer.
  - type: heading
    content: Controverse sur la résurrection
  - type: heading
    content: (Mt 22.23-33 ; Mc 12.18-27)
  '27':
  - type: text
    content: 'Quelques sadducéens, qui nient que les morts ressuscitent, vinrent trouver Jésus. Ils lui posèrent la question suivante : '
  '28':
  - type: text
    content: 'Maître, dans ses écrits, Moïse nous a laissé ce commandement : '
  - type: text
    content: Si un homme vient à mourir, en laissant une femme mais pas d’enfant, son frère doit épouser sa veuve pour donner une descendance au défunt
  - type: note
    content: Dt 25.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Or, il y avait sept frères. L’aîné se maria, et il mourut sans laisser d’enfant. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: – Moi aussi, j’ai une question à vous poser,
  - type: text
    content: ' répliqua Jésus. '
  - type: text
    content: 'A vous de répondre :'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Le second, puis le troisième épousèrent la veuve, et ainsi de suite jusqu’au septième ; '
  '31':
  - type: text
    content: et ils moururent tous les sept sans avoir eu d’enfant.
  '32':
  - type: text
    content: 'En fin de compte, la femme mourut elle aussi. '
  '33':
  - type: text
    content: Eh bien, cette femme, à la résurrection, duquel des sept frères sera-t-elle la femme ? Car ils l’ont tous eue pour épouse.
  '34':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Dans le monde présent, hommes et femmes se marient.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Mais ceux qui seront jugés dignes de ressusciter d’entre les morts pour faire partie du monde à venir, ne se marieront plus.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Ils ne pourront pas non plus mourir, parce qu’ils seront comme les '
  - type: text
    content: anges
  - type: text
    content: ', et ils seront fils de Dieu, puisqu’ils seront ressuscités.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Que les morts ressuscitent, Moïse lui-même l’a indiqué, lorsqu’il est question du buisson ardent : en effet, il appelle le Seigneur '
  - type: text
    content: le Dieu d’
  - type: text
    content: Abraham
  - type: text
    content: ', le Dieu d’'
  - type: text
    content: Isaac
  - type: text
    content: ' et le Dieu de '
  - type: text
    content: Jacob
  - type: note
    content: Ex 3.6.
  - type: text
    content: .
  - type: text
    content: ' '
  '38':
  - type: text
    content: Or, Dieu n’est pas le Dieu des morts, mais le Dieu des vivants ; c’est donc bien que, pour lui, les patriarches sont tous les trois vivants.
  '39':
  - type: text
    content: 'Là-dessus, quelques spécialistes de la Loi prirent la parole : Tu as bien répondu, Maître.'
  '4':
  - type: text
    content: De qui Jean tenait-il son mandat pour baptiser ? De Dieu ou des hommes ?
  '40':
  - type: text
    content: Car ils n’osaient plus lui poser de questions.
  - type: heading
    content: Controverse sur l’identité du Messie
  - type: heading
    content: (Mt 22.41-46 ; Mc 12.35-37)
  '41':
  - type: text
    content: 'Jésus les interrogea à son tour : '
  - type: text
    content: 'Comment se fait-il que l’on dise que le '
  - type: text
    content: Messie
  - type: text
    content: ' doit être un descendant de '
  - type: text
    content: David
  - type: text
    content: '  ?'
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Car David lui-même déclare dans le livre des Psaumes :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
  '43':
  - type: text
    content: ' '
  - type: text
    content: jusqu’à ce que j’aie mis
  - type: text
    content: ' ╵'
  - type: text
    content: tes ennemis
  - type: text
    content: ' ╵'
  - type: text
    content: à terre sous tes pieds
  - type: text
    content: ' '
  - type: note
    content: Ps 110.1 .
  - type: text
    content: .
  '44':
  - type: text
    content: ' '
  - type: text
    content: 'David appelle le Messie son Seigneur : comment celui-ci peut-il être son descendant ?'
  - type: heading
    content: La condamnation des spécialistes de la Loi
  - type: heading
    content: (Mt 23.6 ; Mc 12.38-40)
  '45':
  - type: text
    content: 'Tandis que la foule l’écoutait, il dit à ses disciples : '
  '46':
  - type: text
    content: 'Gardez-vous des spécialistes de la Loi qui aiment à parader en costume de cérémonie, qui affectionnent qu’on les salue sur les places publiques, qui veulent les sièges d’honneur dans les '
  - type: text
    content: synagogues
  - type: text
    content: ' et les meilleures places dans les banquets.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: Ils dépouillent les veuves de leurs biens tout en faisant de longues prières pour l’apparence. Leur condamnation n’en sera que plus sévère.
  '5':
  - type: text
    content: 'Ils se mirent à raisonner entre eux : Si nous disons : « De Dieu », il va nous demander : « Pourquoi n’avez-vous pas cru en lui ? » '
  '6':
  - type: text
    content: 'Mais si nous répondons : « Des hommes », tout le peuple va nous lapider, car ces gens-là sont tous convaincus que Jean était un prophète. '
  '7':
  - type: text
    content: Ils répondirent donc qu’ils ne savaient pas d’où Jean tenait son mandat.
  '8':
  - type: text
    content: ' '
  - type: text
    content: – Eh bien,
  - type: text
    content: ' répliqua Jésus, '
  - type: text
    content: moi non plus, je ne vous dirai pas par quelle autorité j’agis comme je le fais.
  - type: heading
    content: La culpabilité des chefs religieux juifs
  - type: heading
    content: (Mt 21.33-46 ; Mc 12.1-12)
  '9':
  - type: text
    content: 'Il s’adressa ensuite au peuple et se mit à raconter cette parabole : '
  - type: text
    content: Un homme planta une vigne ; il la loua à des vignerons et partit en voyage pour un temps assez long.
  - type: text
    content: ' '
