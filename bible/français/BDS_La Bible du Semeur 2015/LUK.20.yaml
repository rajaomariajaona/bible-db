    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
