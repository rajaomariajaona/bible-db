document_id: 1CH.29,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dons du roi pour la construction du Temple
  - type: text
    content: 'Puis le roi David dit à toute l’assemblée : Mon fils Salomon, le seul que Dieu ait choisi, est jeune et inexpérimenté, alors que l’ouvrage est immense, car ce n’est pas pour un homme qu’il s’agit de construire un palais, mais bien pour l’Eternel Dieu. '
  '10':
  - type: text
    content: 'David bénit l’Eternel devant toute l’assemblée en disant :'
  - type: text
    content: Béni sois-tu à tout jamais, ╵ô Eternel,
  - type: text
    content: Dieu de notre ancêtre Israël !
  '11':
  - type: text
    content: A toi, Eternel, appartiennent ╵la grandeur, la puissance ╵et la magnificence,
  - type: text
    content: et la gloire et la majesté.
  - type: text
    content: Car tout ce qui est dans le ciel ╵et sur la terre ╵est à toi, Eternel.
  - type: text
    content: C’est à toi qu’appartient le règne,
  - type: text
    content: tu es le souverain ╵au-dessus de tout être
  - type: note
    content: Cf. Mt 6.13.
  - type: text
    content: .
  '12':
  - type: text
    content: Et c’est de toi que viennent ╵la richesse et la gloire.
  - type: text
    content: Tu domines sur tout
  - type: text
    content: et dans ta main résident ╵la force et la puissance,
  - type: text
    content: tu détiens le pouvoir ╵d’élever qui tu veux ╵et de le rendre fort.
  '13':
  - type: text
    content: C’est pourquoi, notre Dieu, ╵nous te louons,
  - type: text
    content: nous célébrons ta gloire.
  '14':
  - type: text
    content: Car, qui donc suis-je,
  - type: text
    content: et qui donc est mon peuple
  - type: text
    content: pour avoir les moyens ╵de t’offrir de tels dons ?
  - type: text
    content: Tout cela vient de toi,
  - type: text
    content: et c’est de ta main même ╵que nous avons reçu ╵ce que nous te donnons.
  '15':
  - type: text
    content: Nous sommes devant toi ╵comme des étrangers, des hôtes, ╵tout comme nos ancêtres.
  - type: text
    content: Notre vie sur la terre ╵est aussi éphémère ╵qu’une ombre passagère, ╵qui passe sans espoir.
  '16':
  - type: text
    content: Eternel, notre Dieu, ╵c’est de ta main que vient ╵toute cette fortune
  - type: text
    content: que nous venons de réunir ╵pour te bâtir un temple ╵qui portera ton nom, ╵toi qui es saint.
  - type: text
    content: Tout cela t’appartient.
  '17':
  - type: text
    content: Je le sais, ô mon Dieu, ╵tu sondes notre cœur
  - type: text
    content: et tu as du plaisir ╵lorsque quelqu’un est droit.
  - type: text
    content: Eh bien, c’est d’un cœur droit ╵que je t’ai apporté ╵tous ces dons volontaires,
  - type: text
    content: et j’ai vu avec joie ╵ton peuple ici présent ╵t’apporter ses dons volontaires.
  '18':
  - type: text
    content: O Eternel, Dieu d’Abraham, ╵d’Isaac et d’Israël, nos pères,
  - type: text
    content: conserve pour toujours ╵dans le cœur de ton peuple ╵ces dispositions, ces pensées,
  - type: text
    content: et maintiens fermement ╵leur cœur tourné vers toi !
  '19':
  - type: text
    content: A mon fils Salomon ╵donne un cœur sans partage
  - type: text
    content: afin qu’il obéisse ╵à tes commandements,
  - type: text
    content: tes ordonnances et tes lois, ╵et les applique tous,
  - type: text
    content: et qu’il bâtisse le palais
  - type: note
    content: 'Autre traduction : qu’il exécute tout pour bâtir le palais.'
  - type: text
    content: ' ╵en vue duquel j’ai fait ╵tous ces préparatifs.'
  - type: heading
    content: L’onction royale de Salomon
  '2':
  - type: text
    content: Quant à moi, j’ai consacré tous mes efforts à préparer pour le temple de mon Dieu de l’or, de l’argent, du bronze, du fer et du bois pour tout ce qui est à fabriquer avec ces divers matériaux. J’ai préparé aussi des pierres d’onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et des blocs de marbre blanc en abondance
  - type: note
    content: Voir 22.5.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Là-dessus, David dit à toute l’assemblée : Bénissez l’Eternel, votre Dieu !'
  - type: text
    content: 'Alors toute l’assemblée loua l’Eternel, le Dieu de ses ancêtres. Ils s’inclinèrent et se prosternèrent devant l’Eternel et devant le roi. '
  '21':
  - type: text
    content: 'Le lendemain, ils offrirent des sacrifices et des holocaustes à l’Eternel : mille taureaux, mille béliers et mille agneaux, accompagnés des offrandes de vin requises'
  - type: note
    content: Les libations accompagnent obligatoirement les sacrifices (voir Ex 29.40-41 ; Nb 15.1-16).
  - type: text
    content: '  ; et ils offrirent un grand nombre de sacrifices pour tout Israël. '
  '22':
  - type: text
    content: Ils mangèrent et burent ce jour-là devant l’Eternel dans de grandes réjouissances. Pour la seconde fois
  - type: note
    content: Voir 1 R 1 ; 1 Ch 23.1.
  - type: text
    content: ', ils proclamèrent roi Salomon, fils de David, et lui conférèrent l’onction au nom de l’Eternel pour être leur chef. Ils établirent aussi par l’onction Tsadoq comme prêtre. '
  '23':
  - type: text
    content: 'Salomon prit place sur le trône de l’Eternel, pour régner à la place de son père David. Il l’occupa avec succès et tout Israël lui obéit. '
  '24':
  - type: text
    content: 'Tous les chefs, et les soldats, et même tous les fils du roi David se soumirent à lui. '
  '25':
  - type: text
    content: L’Eternel éleva au plus haut point le prestige de Salomon aux yeux de tout Israël, et il rendit son règne plus éclatant que celui de tous ses prédécesseurs, comme roi sur Israël.
  - type: heading
    content: La mort de David
  - type: heading
    content: (1 R 2.10-12)
  '26':
  - type: text
    content: 'David, fils d’Isaï, avait régné sur tout Israël. '
  '27':
  - type: text
    content: Il avait régné quarante ans sur Israël, sept ans à Hébron
  - type: note
    content: De 1010 à 1003 av. J.-C.
  - type: text
    content: ' et trente-trois ans à Jérusalem'
  - type: note
    content: De 1003 à 970 av. J.-C.
  - type: text
    content: .
  '28':
  - type: text
    content: Et il mourut au terme d’une heureuse vieillesse, rassasié de jours, de richesses et de gloire. Son fils Salomon lui succéda sur le trône.
  '29':
  - type: text
    content: 'Les faits et gestes du roi David, des premiers aux derniers, sont cités dans les Annales du prophète Samuel, dans les Annales du prophète Nathan, et dans les Annales du prophète Gad. '
  '3':
  - type: text
    content: 'De plus, par amour pour le temple de Dieu, je donne pour sa construction des biens précieux en or et en argent que je possède personnellement, en plus de tout ce que j’ai préparé pour le sanctuaire. '
  '30':
  - type: text
    content: On y raconte tout son règne, sa puissance, et tout ce qui lui est arrivé, ainsi qu’à Israël, et à tous les royaumes de la région.
  '4':
  - type: text
    content: Il y a dans mes réserves cent tonnes d’or pur d’Ophir
  - type: note
    content: Région souvent mentionnée (1 R 10.11 ; Jb 28.16) comme lieu de provenance de l’or le plus pur (voir note 1 R 9.28).
  - type: text
    content: ' et deux cent cinquante tonnes d’argent affiné pour recouvrir les parois des bâtiments. '
  '5':
  - type: text
    content: Cet or et cet argent sont destinés à la confection de tout ce qui doit être en or et en argent, ainsi qu’à tous les travaux que les artisans auront à exécuter. A présent, qui d’entre vous est prêt à donner volontairement et de façon généreuse pour l’Eternel ?
  - type: heading
    content: Les dons du peuple pour la construction du Temple
  '6':
  - type: text
    content: 'Alors les chefs des groupes familiaux et des tribus d’Israël, les chefs des « milliers » et des « centaines » et les responsables des affaires du roi offrirent des dons volontaires. '
  '7':
  - type: text
    content: 'Ils remirent spontanément pour le temple de Dieu cent soixante-dix tonnes d’or, dix mille pièces d’or, plus de trois cents tonnes d’argent, quelque six cents tonnes de bronze et plus de trois mille tonnes de fer. '
  '8':
  - type: text
    content: 'Ceux qui possédaient des pierres précieuses les confièrent à Yehiel le Guershonite pour le trésor du temple de l’Eternel. '
  '9':
  - type: text
    content: Le peuple se réjouit de ses dons volontaires, car c’était d’un cœur sans partage qu’ils les avaient faits à l’Eternel. Le roi David en éprouva lui aussi une très grande joie.
  - type: heading
    content: Prière de reconnaissance
