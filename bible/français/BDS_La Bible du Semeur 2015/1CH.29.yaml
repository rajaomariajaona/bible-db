document_id: 1CH.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dons du roi pour la construction du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis le roi David dit à toute l’assemblée : Mon fils Salomon, le seul que Dieu ait choisi, est jeune et inexpérimenté, alors que l’ouvrage est immense, car ce n’est pas pour un homme qu’il s’agit de construire un palais, mais bien pour l’Eternel Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quant à moi, j’ai consacré tous mes efforts à préparer pour le temple de mon Dieu de l’or, de l’argent, du bronze, du fer et du bois pour tout ce qui est à fabriquer avec ces divers matériaux. J’ai préparé aussi des pierres d’onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et des blocs de marbre blanc en abondance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22.5'
        metadata:
          usfm: 1CH.22.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De plus, par amour pour le temple de Dieu, je donne pour sa construction des biens précieux en or et en argent que je possède personnellement, en plus de tout ce que j’ai préparé pour le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il y a dans mes réserves cent tonnes d’or pur d’Ophir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Région souvent mentionnée (1 R 10.11 ; Jb 28.16) comme lieu de provenance de l’or le plus pur (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 9.28
        metadata:
          usfm: 1KI.9.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et deux cent cinquante tonnes d’argent affiné pour recouvrir les parois des bâtiments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cet or et cet argent sont destinés à la confection de tout ce qui doit être en or et en argent, ainsi qu’à tous les travaux que les artisans auront à exécuter. A présent, qui d’entre vous est prêt à donner volontairement et de façon généreuse pour l’Eternel ?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dons du peuple pour la construction du Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors les chefs des groupes familiaux et des tribus d’Israël, les chefs des « milliers » et des « centaines » et les responsables des affaires du roi offrirent des dons volontaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils remirent spontanément pour le temple de Dieu cent soixante-dix tonnes d’or, dix mille pièces d’or, plus de trois cents tonnes d’argent, quelque six cents tonnes de bronze et plus de trois mille tonnes de fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ceux qui possédaient des pierres précieuses les confièrent à Yehiel le Guershonite pour le trésor du temple de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le peuple se réjouit de ses dons volontaires, car c’était d’un cœur sans partage qu’ils les avaient faits à l’Eternel. Le roi David en éprouva lui aussi une très grande joie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de reconnaissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David bénit l’Eternel devant toute l’assemblée en disant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni sois-tu à tout jamais, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu de notre ancêtre Israël !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A toi, Eternel, appartiennent ╵la grandeur, la puissance ╵et la magnificence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la gloire et la majesté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tout ce qui est dans le ciel ╵et sur la terre ╵est à toi, Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est à toi qu’appartient le règne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es le souverain ╵au-dessus de tout être
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6.13
        metadata:
          usfm: MAT.6.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et c’est de toi que viennent ╵la richesse et la gloire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu domines sur tout
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans ta main résident ╵la force et la puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu détiens le pouvoir ╵d’élever qui tu veux ╵et de le rendre fort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est pourquoi, notre Dieu, ╵nous te louons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous célébrons ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car, qui donc suis-je,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui donc est mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour avoir les moyens ╵de t’offrir de tels dons ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout cela vient de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est de ta main même ╵que nous avons reçu ╵ce que nous te donnons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nous sommes devant toi ╵comme des étrangers, des hôtes, ╵tout comme nos ancêtres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Notre vie sur la terre ╵est aussi éphémère ╵qu’une ombre passagère, ╵qui passe sans espoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eternel, notre Dieu, ╵c’est de ta main que vient ╵toute cette fortune
- type: usfm
  marker: q1
  children:
  - type: text
    text: que nous venons de réunir ╵pour te bâtir un temple ╵qui portera ton nom, ╵toi qui es saint.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout cela t’appartient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je le sais, ô mon Dieu, ╵tu sondes notre cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as du plaisir ╵lorsque quelqu’un est droit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh bien, c’est d’un cœur droit ╵que je t’ai apporté ╵tous ces dons volontaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j’ai vu avec joie ╵ton peuple ici présent ╵t’apporter ses dons volontaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: O Eternel, Dieu d’Abraham, ╵d’Isaac et d’Israël, nos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conserve pour toujours ╵dans le cœur de ton peuple ╵ces dispositions, ces pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et maintiens fermement ╵leur cœur tourné vers toi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A mon fils Salomon ╵donne un cœur sans partage
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu’il obéisse ╵à tes commandements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes ordonnances et tes lois, ╵et les applique tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il bâtisse le palais
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu’il exécute tout pour bâtir le palais.
    marker-yv: yv-n
  - type: text
    text: ' ╵en vue duquel j’ai fait ╵tous ces préparatifs.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’onction royale de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Là-dessus, David dit à toute l’assemblée : Bénissez l’Eternel, votre Dieu !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors toute l’assemblée loua l’Eternel, le Dieu de ses ancêtres. Ils s’inclinèrent et se prosternèrent devant l’Eternel et devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le lendemain, ils offrirent des sacrifices et des holocaustes à l’Eternel : mille taureaux, mille béliers et mille agneaux, accompagnés des offrandes de vin requises'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les libations accompagnent obligatoirement les sacrifices (voir Ex 29.40-41 ; Nb 15.1-16).
    marker-yv: yv-n
  - type: text
    text: '  ; et ils offrirent un grand nombre de sacrifices pour tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils mangèrent et burent ce jour-là devant l’Eternel dans de grandes réjouissances. Pour la seconde fois
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 R 1 ; 1 Ch 23.1.
    marker-yv: yv-n
  - type: text
    text: ', ils proclamèrent roi Salomon, fils de David, et lui conférèrent l’onction au nom de l’Eternel pour être leur chef. Ils établirent aussi par l’onction Tsadoq comme prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Salomon prit place sur le trône de l’Eternel, pour régner à la place de son père David. Il l’occupa avec succès et tout Israël lui obéit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous les chefs, et les soldats, et même tous les fils du roi David se soumirent à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L’Eternel éleva au plus haut point le prestige de Salomon aux yeux de tout Israël, et il rendit son règne plus éclatant que celui de tous ses prédécesseurs, comme roi sur Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 2.10-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'David, fils d’Isaï, avait régné sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il avait régné quarante ans sur Israël, sept ans à Hébron
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 1010 à 1003 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ' et trente-trois ans à Jérusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De 1003 à 970 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et il mourut au terme d’une heureuse vieillesse, rassasié de jours, de richesses et de gloire. Son fils Salomon lui succéda sur le trône.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les faits et gestes du roi David, des premiers aux derniers, sont cités dans les Annales du prophète Samuel, dans les Annales du prophète Nathan, et dans les Annales du prophète Gad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: On y raconte tout son règne, sa puissance, et tout ce qui lui est arrivé, ainsi qu’à Israël, et à tous les royaumes de la région.
