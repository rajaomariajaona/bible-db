document_id: JER.46,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les peuples non Israélites
  - type: heading
    content: Contre l’Egypte
  - type: heading
    content: La défaite de l’Egypte
  - type: text
    content: 'Voici les paroles que l’Eternel adressa au prophète Jérémie au sujet des peuples non israélites, '
  '10':
  - type: text
    content: Mais c’est le jour pour l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: 'des règlements de comptes :'
  - type: text
    content: il va régler ses comptes ╵avec ses ennemis.
  - type: text
    content: L’épée dévore, ╵elle se rassasie,
  - type: text
    content: s’enivre de leur sang.
  - type: text
    content: Car c’est un sacrifice ╵pour l’Eternel, ╵le Seigneur des armées célestes,
  - type: text
    content: dans le pays du nord, ╵sur les bords de l’Euphrate
  - type: note
    content: A Karkemish.
  - type: text
    content: .
  '11':
  - type: text
    content: Va, monte à Galaad ╵pour y chercher du baume,
  - type: text
    content: ô population de l’Egypte !
  - type: text
    content: En vain tu multiplies ╵les soins et les remèdes,
  - type: text
    content: rien ne peut te guérir.
  '12':
  - type: text
    content: Les autres peuples ont appris ta honte
  - type: text
    content: et la terre est remplie ╵de tes cris de détresse,
  - type: text
    content: quand un guerrier se heurte ╵à un autre guerrier,
  - type: text
    content: tous deux tombent ensemble.
  - type: heading
    content: L’invasion de l’Egypte
  '13':
  - type: text
    content: Voici la parole que l’Eternel adressa au prophète Jérémie, pour annoncer que Nabuchodonosor, roi de Babylone, viendrait infliger une défaite à l’Egypte
  - type: note
    content: Voir 43.11 et note.
  - type: text
    content: '  :'
  '14':
  - type: text
    content: Faites-le savoir en Egypte,
  - type: text
    content: et proclamez-le à Migdol,
  - type: text
    content: proclamez-le ╵à Memphis et Daphné !
  - type: text
    content: 'Commandez : A vos rangs, ╵préparez-vous !'
  - type: text
    content: Déjà l’épée dévore ╵autour de toi.
  '15':
  - type: text
    content: Pourquoi donc Apis
  - type: note
    content: 'Le dieu Apis était représenté par un taureau, symbole de la force. Pourquoi… s’enfuit-il: d’après l’ancienne version grecque. Le texte hébreu traditionnel a : pourquoi tes guerriers sont-ils terrassés ?'
  - type: text
    content: ' s’enfuit-il ? ╵Ton taureau si puissant ╵n’a donc pas résisté ?'
  - type: text
    content: En effet, l’Eternel ╵l’a bousculé !
  '16':
  - type: text
    content: Ils sont nombreux à trébucher,
  - type: text
    content: 'à tomber l’un sur l’autre, ╵se disant mutuellement :'
  - type: text
    content: « Debout ! Retournons au pays,
  - type: text
    content: sur notre sol natal ╵et chez les nôtres,
  - type: text
    content: et fuyons l’épée meurtrière
  - type: note
    content: Ce sont les mercenaires qui parlent ainsi (voir v. 21).
  - type: text
    content: '  ! »'
  '17':
  - type: text
    content: Là ils ont dit du pharaon
  - type: note
    content: 'En adoptant une autre vocalisation que le texte hébreu traditionnel, l’ancienne version grecque a traduit : Donnez pour nom au pharaon.'
  - type: text
    content: '  :'
  - type: text
    content: « Le roi d’Egypte, c’est du bruit, ╵il a manqué son occasion. »
  '18':
  - type: text
    content: Aussi vrai que je vis,
  - type: text
    content: c’est là ce que déclare ╵le Roi qui a pour nom ╵le Seigneur des armées célestes,
  - type: text
    content: aussi vrai que le mont Thabor ╵est parmi les montagnes,
  - type: text
    content: et que le mont Carmel ╵est au bord de la mer, ╵il vient !
  '19':
  - type: text
    content: Fais ton sac de captive,
  - type: text
    content: population d’Egypte,
  - type: text
    content: car Memphis sera dévastée,
  - type: text
    content: elle sera brûlée
  - type: text
    content: et privée d’habitants.
  '2':
  - type: text
    content: au sujet de l’Egypte et de l’armée du pharaon Néko, roi d’Egypte
  - type: note
    content: Le pharaon Néko (610 à 595 av. J.-C.), voyant les Babyloniens s’étendre sur l’Euphrate, voulut prendre l’offensive contre eux et soumettre en même temps tous les pays entre l’Egypte et la Chaldée (y compris la Judée). Josias voulut lui barrer le passage de son pays. Il fut tué à Meguiddo (2 R 23.29-35). Néko fut battu par les Babyloniens en 605 av. J.-C. à Karkemish, ville située sur l’Euphrate, près de l’actuelle frontière entre la Syrie et la Turquie (voir 2 R 23.29-35).
  - type: text
    content: ', qui fut battue par Nabuchodonosor, roi de Babylone, à Karkemish, sur les bords de l’Euphrate, la quatrième année du règne de Yehoyaqim, fils de Josias, roi de Juda :'
  '20':
  - type: text
    content: Une belle génisse, ╵voilà ce qu’est l’Egypte !
  - type: text
    content: Mais, descendant du nord, ╵un taon est arrivé sur elle.
  '21':
  - type: text
    content: Même les mercenaires ╵qui sont au milieu d’elle
  - type: text
    content: et qui étaient traités ╵comme des veaux ╵que l’on met à l’engrais,
  - type: text
    content: eux aussi, ils font demi-tour
  - type: text
    content: 'et fuient en masses : ╵ils ne résistent pas,'
  - type: text
    content: 'car le jour de la ruine ╵va les atteindre :'
  - type: text
    content: c’est le temps de leur châtiment.
  '22':
  - type: text
    content: L’Egypte prend la fuite, ╵sifflant comme un serpent,
  - type: text
    content: car ils viennent en force,
  - type: text
    content: ils se jettent sur elle ╵comme des bûcherons
  - type: text
    content: armés de leurs cognées
  - type: note
    content: Les armées chaldéennes sont comparées à une troupe de bûcherons venant abattre les Egyptiens, faisant s’enfuir les serpents cachés dans la forêt.
  - type: text
    content: .
  '23':
  - type: text
    content: Ils coupent sa forêt
  - type: text
    content: qui est impénétrable,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: car ils sont plus nombreux ╵que des criquets,
  - type: text
    content: on ne peut les compter.
  '24':
  - type: text
    content: 'La population de l’Egypte ╵est couverte de honte :'
  - type: text
    content: elle a été livrée ╵à un peuple venu du nord.
  '25':
  - type: text
    content: 'Le Seigneur des armées célestes, Dieu d’Israël, a dit : Je vais intervenir contre le dieu Amôn de Thèbes'
  - type: note
    content: 'Amôn: dieu principal des Egyptiens. Thèbes, dans la Haute-Egypte, à 500 kilomètres au sud du Caire, était le centre de son culte.'
  - type: text
    content: ', contre le pharaon, contre l’Egypte, contre ses dieux et ses rois, contre le pharaon, et contre ceux qui se confient en lui ! '
  '26':
  - type: text
    content: Je vais les livrer au pouvoir de ceux qui en veulent à leur vie, au roi de Babylone, Nabuchodonosor, et à ses officiers. Par la suite, l’Egypte sera peuplée comme autrefois, l’Eternel le déclare.
  - type: heading
    content: Israël connaîtra le repos
  '27':
  - type: text
    content: Et toi, Jacob mon serviteur,
  - type: text
    content: sois donc sans crainte,
  - type: text
    content: non, n’aie pas peur, ╵ô Israël !
  - type: text
    content: Car moi, je vais te délivrer, ╵de la terre lointaine,
  - type: text
    content: toi et tes descendants, ╵du pays de l’exil.
  - type: text
    content: Oui, Jacob reviendra, ╵il jouira de la tranquillité, ╵et d’une vie paisible ;
  - type: text
    content: personne ne l’inquiétera
  - type: note
    content: Les v. 27-28 ont leur parallèle en 30.10-11.
  - type: text
    content: .
  '28':
  - type: text
    content: Sois donc sans crainte,
  - type: text
    content: Jacob mon serviteur,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: car je suis avec toi.
  - type: text
    content: Je ferai table rase ╵de tous les peuples
  - type: text
    content: chez lesquels je t’ai dispersé,
  - type: text
    content: mais je ne ferai pas ╵table rase de toi ;
  - type: text
    content: cependant je te châtierai ╵selon ce qui est juste ;
  - type: text
    content: je ne te laisserai ╵certainement pas impuni.
  '3':
  - type: text
    content: Alignez le petit ╵et le grand bouclier
  - type: text
    content: et marchez au combat !
  '4':
  - type: text
    content: Harnachez les chevaux
  - type: text
    content: et montez sur les chars !
  - type: text
    content: A vos rangs, casques sur la tête !
  - type: text
    content: Affûtez bien vos lances !
  - type: text
    content: Endossez vos cuirasses !
  '5':
  - type: text
    content: Pourquoi les vois-je ╵si terrifiés,
  - type: text
    content: battre en retraite ?
  - type: text
    content: Et leurs guerriers sont pourfendus ;
  - type: text
    content: 'ils fuient éperdument ╵sans plus se retourner :'
  - type: text
    content: de toutes parts, c’est la terreur
  - type: note
    content: Voir 6.25 ; 20.3, 10 ; 49.29.
  - type: text
    content: ','
  - type: text
    content: l’Eternel le déclare.
  '6':
  - type: text
    content: Même les plus agiles ╵ne peuvent se sauver,
  - type: text
    content: et les plus valeureux ╵ne peuvent échapper.
  - type: text
    content: Dans le septentrion, ╵sur les bords de l’Euphrate,
  - type: text
    content: les voilà qui trébuchent ╵et qui s’écroulent !
  '7':
  - type: text
    content: Qui est-ce donc qui monte
  - type: note
    content: Jérémie évoque le départ de l’armée depuis Egypte.
  - type: text
    content: ' ╵comme les eaux du Nil,'
  - type: text
    content: comme des fleuves ╵dont l’eau est bouillonnante ?
  '8':
  - type: text
    content: C’est l’Egypte qui monte ╵comme les eaux du Nil,
  - type: text
    content: comme des fleuves ╵dont l’eau est bouillonnante.
  - type: text
    content: 'Elle s’est écriée : ╵« Je monterai,'
  - type: text
    content: je couvrirai la terre,
  - type: text
    content: je détruirai les villes ╵et ceux qui les habitent. »
  '9':
  - type: text
    content: A l’assaut, les chevaux,
  - type: text
    content: et foncez, chars de guerre !
  - type: text
    content: En avant, les soldats !
  - type: text
    content: les Ethiopiens, les gens de Pouth,
  - type: text
    content: portant le bouclier,
  - type: text
    content: et les archers de Loud
  - type: note
    content: 'Pouth et Loud: voir Gn 10.6, 22 et notes.'
  - type: text
    content: '  !'
