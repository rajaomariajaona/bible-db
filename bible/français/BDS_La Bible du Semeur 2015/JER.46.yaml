document_id: JER.46,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Sur les peuples non Israélites
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre l’Egypte
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La défaite de l’Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les paroles que l’Eternel adressa au prophète Jérémie au sujet des peuples non israélites, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais c’est le jour pour l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'des règlements de comptes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il va régler ses comptes ╵avec ses ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée dévore, ╵elle se rassasie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’enivre de leur sang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est un sacrifice ╵pour l’Eternel, ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le pays du nord, ╵sur les bords de l’Euphrate
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Karkemish.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Va, monte à Galaad ╵pour y chercher du baume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô population de l’Egypte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En vain tu multiplies ╵les soins et les remèdes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien ne peut te guérir.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les autres peuples ont appris ta honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre est remplie ╵de tes cris de détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand un guerrier se heurte ╵à un autre guerrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous deux tombent ensemble.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: L’invasion de l’Egypte
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici la parole que l’Eternel adressa au prophète Jérémie, pour annoncer que Nabuchodonosor, roi de Babylone, viendrait infliger une défaite à l’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '43.11'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: '  :'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Faites-le savoir en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et proclamez-le à Migdol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclamez-le ╵à Memphis et Daphné !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Commandez : A vos rangs, ╵préparez-vous !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déjà l’épée dévore ╵autour de toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pourquoi donc Apis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le dieu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Apis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était représenté par un taureau, symbole de la force. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourquoi… s’enfuit-il
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourquoi tes guerriers sont-ils terrassés ?
      marker-yv: yv-n
    - type: text
      text: ' s’enfuit-il ? ╵Ton taureau si puissant ╵n’a donc pas résisté ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l’Eternel ╵l’a bousculé !
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ils sont nombreux à trébucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à tomber l’un sur l’autre, ╵se disant mutuellement :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Debout ! Retournons au pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur notre sol natal ╵et chez les nôtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fuyons l’épée meurtrière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce sont les mercenaires qui parlent ainsi (voir v. 21).
      marker-yv: yv-n
    - type: text
      text: '  ! »'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Là ils ont dit du pharaon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En adoptant une autre vocalisation que le texte hébreu traditionnel, l’ancienne version grecque a traduit : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Donnez pour nom au pharaon.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Le roi d’Egypte, c’est du bruit, ╵il a manqué son occasion. »
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aussi vrai que je vis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est là ce que déclare ╵le Roi qui a pour nom ╵le Seigneur des armées célestes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi vrai que le mont Thabor ╵est parmi les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que le mont Carmel ╵est au bord de la mer, ╵il vient !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fais ton sac de captive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: population d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car Memphis sera dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle sera brûlée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et privée d’habitants.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: au sujet de l’Egypte et de l’armée du pharaon Néko, roi d’Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le pharaon '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Néko '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (610 à 595 av. J.-C.), voyant les Babyloniens s’étendre sur l’Euphrate, voulut prendre l’offensive contre eux et soumettre en même temps tous les pays entre l’Egypte et la Chaldée (y compris la Judée). Josias voulut lui barrer le passage de son pays. Il fut tué à Meguiddo (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 23.29-35
        - type: text
          text: '). Néko fut battu par les Babyloniens en 605 av. J.-C. à Karkemish, ville située sur l’Euphrate, près de l’actuelle frontière entre la Syrie et la Turquie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 23.29-35
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', qui fut battue par Nabuchodonosor, roi de Babylone, à Karkemish, sur les bords de l’Euphrate, la quatrième année du règne de Yehoyaqim, fils de Josias, roi de Juda :'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Une belle génisse, ╵voilà ce qu’est l’Egypte !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, descendant du nord, ╵un taon est arrivé sur elle.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Même les mercenaires ╵qui sont au milieu d’elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui étaient traités ╵comme des veaux ╵que l’on met à l’engrais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux aussi, ils font demi-tour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et fuient en masses : ╵ils ne résistent pas,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car le jour de la ruine ╵va les atteindre :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est le temps de leur châtiment.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: L’Egypte prend la fuite, ╵sifflant comme un serpent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils viennent en force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se jettent sur elle ╵comme des bûcherons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: armés de leurs cognées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les armées chaldéennes sont comparées à une troupe de bûcherons venant abattre les Egyptiens, faisant s’enfuir les serpents cachés dans la forêt.
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils coupent sa forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est impénétrable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils sont plus nombreux ╵que des criquets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne peut les compter.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'La population de l’Egypte ╵est couverte de honte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a été livrée ╵à un peuple venu du nord.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le Seigneur des armées célestes, Dieu d’Israël, a dit : Je vais intervenir contre le dieu Amôn de Thèbes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amôn
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dieu principal des Egyptiens. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Thèbes, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans la Haute-Egypte, à 500 kilomètres au sud du Caire, était le centre de son culte.
      marker-yv: yv-n
    - type: text
      text: ', contre le pharaon, contre l’Egypte, contre ses dieux et ses rois, contre le pharaon, et contre ceux qui se confient en lui ! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je vais les livrer au pouvoir de ceux qui en veulent à leur vie, au roi de Babylone, Nabuchodonosor, et à ses officiers. Par la suite, l’Egypte sera peuplée comme autrefois, l’Eternel le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Israël connaîtra le repos
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Et toi, Jacob mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois donc sans crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: non, n’aie pas peur, ╵ô Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car moi, je vais te délivrer, ╵de la terre lointaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi et tes descendants, ╵du pays de l’exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Jacob reviendra, ╵il jouira de la tranquillité, ╵et d’une vie paisible ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne ne l’inquiétera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 27-28 ont leur parallèle en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 30.10-11
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Sois donc sans crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis avec toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai table rase ╵de tous les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chez lesquels je t’ai dispersé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ne ferai pas ╵table rase de toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cependant je te châtierai ╵selon ce qui est juste ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne te laisserai ╵certainement pas impuni.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Alignez le petit ╵et le grand bouclier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et marchez au combat !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Harnachez les chevaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et montez sur les chars !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A vos rangs, casques sur la tête !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affûtez bien vos lances !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endossez vos cuirasses !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Pourquoi les vois-je ╵si terrifiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: battre en retraite ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs guerriers sont pourfendus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils fuient éperdument ╵sans plus se retourner :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes parts, c’est la terreur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 6.25 ; 20.3, 10 ; 49.29.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Même les plus agiles ╵ne peuvent se sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus valeureux ╵ne peuvent échapper.
  - type: usfm
    marker: q1
    children:
