document_id: PSA.76,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu est vainqueur
  - type: text
    content: Au chef de chœur. Un psaume d’Asaph
  - type: note
    content: 'Voir note 50.1. La version grecque ajoute : contre l’Assyrien.'
  - type: text
    content: . A chanter avec accompagnement d’instruments à cordes.
  '10':
  - type: text
    content: quand toi, ô Dieu, tu interviens ╵pour exercer le jugement
  - type: text
    content: et pour apporter le salut ╵à tous les humbles de la terre.
  - type: text
    content: Pause
  '11':
  - type: text
    content: Car même la fureur des hommes ╵tournera à ta gloire
  - type: text
    content: et tu t’attacheras ╵les rescapés de ta colère
  - type: note
    content: 'Hébreu de sens incertain. Autre traduction : et tu te pareras des restes de (leur ?) fureur.'
  - type: text
    content: .
  '12':
  - type: text
    content: Vous tous qui entourez ╵l’Eternel votre Dieu,
  - type: text
    content: faites des vœux ╵et accomplissez-les !
  - type: text
    content: Apportez vos présents ╵à ce Dieu redoutable.
  '13':
  - type: text
    content: Il brise l’esprit résolu des princes,
  - type: text
    content: il se rend redoutable ╵pour les rois de la terre.
  '2':
  - type: text
    content: Dieu s’est fait connaître en Juda,
  - type: text
    content: son nom est grand en Israël.
  '3':
  - type: text
    content: Sa résidence est à Salem
  - type: note
    content: Ancien nom de Jérusalem (Gn 14.18) choisi ici peut-être à cause de son assonance avec shalom, « paix ».
  - type: text
    content: ','
  - type: text
    content: et sa demeure est en Sion.
  '4':
  - type: text
    content: C’est là qu’il a brisé ╵les flèches fulgurantes,
  - type: text
    content: les boucliers, les glaives, ╵toutes armes de guerre.
  - type: text
    content: Pause
  '5':
  - type: text
    content: Tu es resplendissant, ╵plus éclatant
  - type: text
    content: que les monts éternels
  - type: note
    content: 'D’après l’ancienne version grecque. Texte hébreu traditionnel : les montagnes de butin.'
  - type: text
    content: .
  '6':
  - type: text
    content: Tous les vaillants guerriers ╵ont été dépouillés,
  - type: text
    content: ils se sont endormis ╵de leur dernier sommeil.
  - type: text
    content: Tous ces valeureux hommes ╵n’ont pas su retrouver ╵la vigueur de leurs mains.
  '7':
  - type: text
    content: Dieu de Jacob, à ta menace
  - type: text
    content: les chars et les chevaux ╵se sont figés sur place.
  '8':
  - type: text
    content: Que tu es redoutable !
  - type: text
    content: Qui tiendrait devant toi ╵quand ta colère éclate ?
  '9':
  - type: text
    content: Du ciel, tu fais entendre ton verdict,
  - type: text
    content: et la terre, effrayée, ╵se tient dans le silence
