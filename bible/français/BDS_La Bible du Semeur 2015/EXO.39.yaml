document_id: EXO.39,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’éphod des prêtresPour les v. 1-32, voir 28.1-43.
  - type: text
    content: Avec les fils de pourpre violette et écarlate et de rouge éclatant, on confectionna les vêtements de cérémonie pour faire le service dans le sanctuaire, et les vêtements sacrés pour Aaron, comme l’Eternel l’avait ordonné à Moïse.
  '10':
  - type: text
    content: 'On le garnit de quatre rangées de pierreries. Sur la première : une sardoine, une topaze et une émeraude'
  - type: note
    content: Pour les v. 10-13, l’identification de certaines pierres précieuses est incertaine.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Sur la deuxième : un rubis, un saphir et un diamant. '
  '12':
  - type: text
    content: 'Sur la troisième : une opale, une agate, et une améthyste. '
  '13':
  - type: text
    content: 'Sur la quatrième : une chrysolithe, un onyx et un jaspe. Ces pierreries étaient serties dans des montures d’or. '
  '14':
  - type: text
    content: 'Elles étaient gravées aux noms des douze fils d’Israël comme des sceaux à cacheter : chacun portait le nom d’une des douze tribus. '
  '15':
  - type: text
    content: 'On fit au pectoral des chaînettes d’or pur, tressées comme des cordons. '
  '16':
  - type: text
    content: 'On lui fit aussi deux montures d’or et deux anneaux d’or que l’on fixa à ses deux bords '
  '17':
  - type: text
    content: 'pour passer les deux cordons d’or dans les deux anneaux d’or aux bords du pectoral. '
  '18':
  - type: text
    content: 'A leur autre extrémité ces deux cordons furent fixés aux deux agrafes placées sur les bretelles de l’éphod par-devant. '
  '19':
  - type: text
    content: 'On fit de plus deux anneaux d’or que l’on plaça aux deux bords du pectoral, la face intérieure contre l’éphod. '
  '2':
  - type: text
    content: 'Il fit l’éphod avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin retors. '
  '20':
  - type: text
    content: 'On fit deux autres anneaux d’or qui furent fixés par le bas aux deux bretelles de l’éphod, sur le devant, près de l’attache, au-dessus de la ceinture de l’éphod. '
  '21':
  - type: text
    content: On lia les anneaux du pectoral à ceux de l’éphod par un cordonnet de pourpre violette, afin que le pectoral soit fixé sur la ceinture de l’éphod, sans pouvoir s’en séparer, comme l’Eternel l’avait ordonné à Moïse.
  - type: heading
    content: Les autres vêtements des prêtres
  '22':
  - type: text
    content: 'On tissa la robe de l’éphod tout entière en pourpre violette. '
  '23':
  - type: text
    content: 'Au milieu était ménagée une ouverture comme l’encolure d’un vêtement de cuir tressé ; autour de cette ouverture, on avait cousu un ourlet pour que la robe ne se déchire pas. '
  '24':
  - type: text
    content: 'On garnit le pan de la robe de grenades faites de fils de pourpre violette et écarlate, de rouge éclatant et de lin retors. '
  '25':
  - type: text
    content: 'On fabriqua des clochettes d’or pur et on les fit alterner tout autour avec les grenades le long du pan de la robe : '
  '26':
  - type: text
    content: une clochette et une grenade, et ainsi de suite sur tout le tour du bas de la robe pour le service, comme l’Eternel l’avait ordonné à Moïse.
  '27':
  - type: text
    content: 'On tissa les tuniques pour Aaron et ses fils dans du lin fin, '
  '28':
  - type: text
    content: 'le turban de fin lin, les tiares de fin lin, les caleçons de lin retors '
  '29':
  - type: text
    content: 'et la ceinture brodée en fils de fin lin retors, de pourpre violette, de pourpre écarlate et de rouge éclatant comme l’Eternel l’avait ordonné à Moïse. '
  '3':
  - type: text
    content: 'On étendit l’or en lames que l’on coupa en fils pour les entrelacer dans la pourpre violette, la pourpre écarlate, le rouge éclatant et le lin fin ; dans les règles de l’art. '
  '30':
  - type: text
    content: 'On fit l’insigne, le diadème sacré, en or pur et l’on y grava comme sur un sceau à cacheter : « Consacré à l’Eternel ». '
  '31':
  - type: text
    content: On y mit un cordonnet de pourpre violette pour le fixer en haut du turban, comme l’Eternel l’avait ordonné à Moïse.
  - type: heading
    content: L’achèvement des travaux
  '32':
  - type: text
    content: 'Ainsi fut achevé tout le travail pour le tabernacle, la tente de la Rencontre ; les Israélites avaient tout exécuté selon les directives que l’Eternel avait données à Moïse ; c’est bien ainsi qu’ils avaient fait. '
  '33':
  - type: text
    content: 'On apporta la Demeure à Moïse : la tente et tous ses éléments : ses agrafes, ses cadres, ses traverses, ses piliers et ses socles, '
  '34':
  - type: text
    content: 'la couverture de peaux de béliers teintes en rouge, la couverture de peaux de dauphins et le voile de séparation, '
  '35':
  - type: text
    content: 'le coffre de l’acte d’alliance, ses barres et son propitiatoire, '
  '36':
  - type: text
    content: 'la table, tous ses ustensiles et le pain destiné à être exposé devant l’Eternel, '
  '37':
  - type: text
    content: 'le chandelier d’or pur, l’arrangement de ses lampes, tous ses accessoires et l’huile pour l’alimenter, '
  '38':
  - type: text
    content: 'l’autel d’or, l’huile d’onction, le parfum aromatique et le rideau pour l’entrée de la tente, '
  '39':
  - type: text
    content: 'l’autel de bronze avec sa grille de bronze, ses barres et tous ses ustensiles, la cuve et son socle, '
  '4':
  - type: text
    content: 'On y fit deux bretelles cousues à ses deux bords, pour le maintenir. '
  '40':
  - type: text
    content: 'les tentures du parvis, ses piliers, ses socles ; le rideau pour la porte du parvis, ses cordages, ses piquets et tous les accessoires pour le culte du tabernacle, la tente de la Rencontre, '
  '41':
  - type: text
    content: les vêtements de cérémonie pour effectuer le service dans le sanctuaire, les vêtements sacrés pour le prêtre Aaron et les vêtements de ses fils afin qu’ils puissent officier.
  '42':
  - type: text
    content: 'Pour tous ces travaux, les Israélites suivirent exactement les directives que l’Eternel avait données à Moïse. '
  '43':
  - type: text
    content: Moïse examina tout l’ouvrage, et constata qu’il avait été fait exactement comme l’Eternel le lui avait ordonné. Alors Moïse les bénit.
  '5':
  - type: text
    content: 'La ceinture était faite de la même façon, de la même étoffe que l’éphod, elle était faite de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, comme l’Eternel l’avait ordonné à Moïse. '
  '6':
  - type: text
    content: 'On sertit les pierres d’onyx dans les montures d’or et on les grava aux noms des fils d’Israël, comme on grave un sceau à cacheter. '
  '7':
  - type: text
    content: On les fixa sur les bretelles de l’éphod pour rappeler le souvenir des fils d’Israël, comme l’Eternel l’avait ordonné à Moïse.
  - type: heading
    content: Le pectoral
  '8':
  - type: text
    content: 'On fit le pectoral, dans les règles de l’art, et ouvragé comme l’éphod, avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin retors. '
  '9':
  - type: text
    content: 'Une fois replié en deux, il avait la forme d’un carré de vingt-cinq centimètres de côté. '
