document_id: EXO.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’éphod des prêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.1 titre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 1-32, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28.1-43
        metadata:
          usfm: EXO.28.1+EXO.28.2+EXO.28.3+EXO.28.4+EXO.28.5+EXO.28.6+EXO.28.7+EXO.28.8+EXO.28.9+EXO.28.10+EXO.28.11+EXO.28.12+EXO.28.13+EXO.28.14+EXO.28.15+EXO.28.16+EXO.28.17+EXO.28.18+EXO.28.19+EXO.28.20+EXO.28.21+EXO.28.22+EXO.28.23+EXO.28.24+EXO.28.25+EXO.28.26+EXO.28.27+EXO.28.28+EXO.28.29+EXO.28.30+EXO.28.31+EXO.28.32+EXO.28.33+EXO.28.34+EXO.28.35+EXO.28.36+EXO.28.37+EXO.28.38+EXO.28.39+EXO.28.40+EXO.28.41+EXO.28.42+EXO.28.43
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avec les fils de pourpre violette et écarlate et de rouge éclatant, on confectionna les vêtements de cérémonie pour faire le service dans le sanctuaire, et les vêtements sacrés pour Aaron, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit l’éphod avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On étendit l’or en lames que l’on coupa en fils pour les entrelacer dans la pourpre violette, la pourpre écarlate, le rouge éclatant et le lin fin ; dans les règles de l’art. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On y fit deux bretelles cousues à ses deux bords, pour le maintenir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La ceinture était faite de la même façon, de la même étoffe que l’éphod, elle était faite de fils d’or, de pourpre violette et écarlate, de rouge éclatant et de fin lin retors, comme l’Eternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On sertit les pierres d’onyx dans les montures d’or et on les grava aux noms des fils d’Israël, comme on grave un sceau à cacheter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On les fixa sur les bretelles de l’éphod pour rappeler le souvenir des fils d’Israël, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pectoral
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On fit le pectoral, dans les règles de l’art, et ouvragé comme l’éphod, avec des fils d’or, de pourpre violette et écarlate, de rouge éclatant et du fin lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Une fois replié en deux, il avait la forme d’un carré de vingt-cinq centimètres de côté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On le garnit de quatre rangées de pierreries. Sur la première : une sardoine, une topaze et une émeraude'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les v. 10-13, l’identification de certaines pierres précieuses est incertaine.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sur la deuxième : un rubis, un saphir et un diamant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Sur la troisième : une opale, une agate, et une améthyste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sur la quatrième : une chrysolithe, un onyx et un jaspe. Ces pierreries étaient serties dans des montures d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elles étaient gravées aux noms des douze fils d’Israël comme des sceaux à cacheter : chacun portait le nom d’une des douze tribus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On fit au pectoral des chaînettes d’or pur, tressées comme des cordons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On lui fit aussi deux montures d’or et deux anneaux d’or que l’on fixa à ses deux bords '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'pour passer les deux cordons d’or dans les deux anneaux d’or aux bords du pectoral. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A leur autre extrémité ces deux cordons furent fixés aux deux agrafes placées sur les bretelles de l’éphod par-devant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On fit de plus deux anneaux d’or que l’on plaça aux deux bords du pectoral, la face intérieure contre l’éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On fit deux autres anneaux d’or qui furent fixés par le bas aux deux bretelles de l’éphod, sur le devant, près de l’attache, au-dessus de la ceinture de l’éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On lia les anneaux du pectoral à ceux de l’éphod par un cordonnet de pourpre violette, afin que le pectoral soit fixé sur la ceinture de l’éphod, sans pouvoir s’en séparer, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les autres vêtements des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On tissa la robe de l’éphod tout entière en pourpre violette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Au milieu était ménagée une ouverture comme l’encolure d’un vêtement de cuir tressé ; autour de cette ouverture, on avait cousu un ourlet pour que la robe ne se déchire pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On garnit le pan de la robe de grenades faites de fils de pourpre violette et écarlate, de rouge éclatant et de lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'On fabriqua des clochettes d’or pur et on les fit alterner tout autour avec les grenades le long du pan de la robe : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: une clochette et une grenade, et ainsi de suite sur tout le tour du bas de la robe pour le service, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'On tissa les tuniques pour Aaron et ses fils dans du lin fin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'le turban de fin lin, les tiares de fin lin, les caleçons de lin retors '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et la ceinture brodée en fils de fin lin retors, de pourpre violette, de pourpre écarlate et de rouge éclatant comme l’Eternel l’avait ordonné à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On fit l’insigne, le diadème sacré, en or pur et l’on y grava comme sur un sceau à cacheter : « Consacré à l’Eternel ». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: On y mit un cordonnet de pourpre violette pour le fixer en haut du turban, comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’achèvement des travaux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ainsi fut achevé tout le travail pour le tabernacle, la tente de la Rencontre ; les Israélites avaient tout exécuté selon les directives que l’Eternel avait données à Moïse ; c’est bien ainsi qu’ils avaient fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'On apporta la Demeure à Moïse : la tente et tous ses éléments : ses agrafes, ses cadres, ses traverses, ses piliers et ses socles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'la couverture de peaux de béliers teintes en rouge, la couverture de peaux de dauphins et le voile de séparation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'le coffre de l’acte d’alliance, ses barres et son propitiatoire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'la table, tous ses ustensiles et le pain destiné à être exposé devant l’Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'le chandelier d’or pur, l’arrangement de ses lampes, tous ses accessoires et l’huile pour l’alimenter, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'l’autel d’or, l’huile d’onction, le parfum aromatique et le rideau pour l’entrée de la tente, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'l’autel de bronze avec sa grille de bronze, ses barres et tous ses ustensiles, la cuve et son socle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'les tentures du parvis, ses piliers, ses socles ; le rideau pour la porte du parvis, ses cordages, ses piquets et tous les accessoires pour le culte du tabernacle, la tente de la Rencontre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: les vêtements de cérémonie pour effectuer le service dans le sanctuaire, les vêtements sacrés pour le prêtre Aaron et les vêtements de ses fils afin qu’ils puissent officier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Pour tous ces travaux, les Israélites suivirent exactement les directives que l’Eternel avait données à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Moïse examina tout l’ouvrage, et constata qu’il avait été fait exactement comme l’Eternel le lui avait ordonné. Alors Moïse les bénit.
