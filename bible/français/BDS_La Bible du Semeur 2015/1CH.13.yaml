document_id: 1CH.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David veut faire transporter le coffre de l’alliance à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 S 6.1-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David tint conseil avec les chefs commandant les « milliers » et les « centaines », ainsi qu’avec les autres notables. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il s’adressa à toute l’assemblée d’Israël et leur dit : Si vous le jugez bon, et si cela est dans le plan de l’Eternel notre Dieu, envoyons des messages à tous nos compatriotes qui restent encore dans toutes les régions d’Israël, ainsi qu’aux prêtres et aux lévites dans leurs villes de résidence, pour qu’ils nous rejoignent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis nous ramènerons auprès de nous le coffre de notre Dieu, car nous ne nous sommes pas préoccupés d’aller le chercher sous le règne de Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toute l’assemblée trouva cette proposition judicieuse, et l’on déclara qu’il fallait la suivre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David rassembla donc tout Israël, depuis le torrent d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'torrent du Shihor, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme égyptien qui signifie « la mare de Horus », divinité égyptienne, sans doute l’un des canaux du Nil (voir Jos 13.3 ; Es 23.3 ; Jr 2.18).
    marker-yv: yv-n
  - type: text
    text: ' jusqu’à Lebo-Hamath'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Non identifiée, mais au nord du pays. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu’aux abords de Hamath.
    marker-yv: yv-n
  - type: text
    text: ', pour faire venir le coffre de Dieu de Qiryath-Yearim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A quelque 13 kilomètres au nord-ouest de Jérusalem. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 6.21
        metadata:
          usfm: 1SA.6.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: David, avec tout Israël, se rendit à Baala
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nom cananéen de Qiryath-Yearim (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 6.2
        metadata:
          usfm: 2SA.6.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', à Qiryath-Yearim, dans le territoire de Juda, pour en ramener le coffre de Dieu, l’Eternel qui siège entre les chérubins'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.22
        metadata:
          usfm: EXO.25.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et sur lequel le Nom par excellence a été invoqué. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On chargea le coffre de Dieu sur un chariot neuf après l’avoir pris de la maison d’Abinadab. Ouzza et Ahyo conduisaient le chariot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fils ou descendant d’Abinadab.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David et tout Israël exprimaient leur joie devant Dieu en chantant de toutes leurs forces et en jouant sur des lyres, des luths, des tambourins, des cymbales et des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’ils furent arrivés près de l’aire de Kidôn, les bœufs firent un écart et Ouzza tendit la main pour saisir le coffre de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors l’Eternel se mit en colère contre Ouzza et l’Eternel le frappa parce qu’il avait touché le coffre de sa main. Ouzza mourut là devant Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le coffre aurait dû être transporté sur les épaules des lévites (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.12-15
        metadata:
          usfm: EXO.25.12+EXO.25.13+EXO.25.14+EXO.25.15
      - type: text
        text: ) et jamais touché, sous peine de mort (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 4.15
        metadata:
          usfm: NUM.4.15
      - type: text
        text: ). Ces prescriptions furent observées par la suite (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15.1-15
        metadata:
          usfm: 1CH.15.1+1CH.15.2+1CH.15.3+1CH.15.4+1CH.15.5+1CH.15.6+1CH.15.7+1CH.15.8+1CH.15.9+1CH.15.10+1CH.15.11+1CH.15.12+1CH.15.13+1CH.15.14+1CH.15.15
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David s’irrita parce que l’Eternel avait ouvert une brèche en frappant Ouzza, et il appela ce lieu Pérets-Ouzza (Brèche d’Ouzza), nom qu’il porte encore aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce jour-là, David prit peur de Dieu et il se demanda : Comment oserais-je faire venir le coffre de Dieu chez moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il ne transporta donc pas le coffre chez lui, dans la Cité de David, mais il le fit déposer dans la maison d’Obed-Edom, un homme originaire de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le coffre y resta trois mois, et l’Eternel bénit la famille d’Obed-Edom et tous ses biens.
