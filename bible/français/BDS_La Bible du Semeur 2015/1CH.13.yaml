document_id: 1CH.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David veut faire transporter le coffre de l’alliance à Jérusalem
  - type: heading
    content: (2 S 6.1-11)
  - type: text
    content: 'David tint conseil avec les chefs commandant les « milliers » et les « centaines », ainsi qu’avec les autres notables. '
  '10':
  - type: text
    content: Alors l’Eternel se mit en colère contre Ouzza et l’Eternel le frappa parce qu’il avait touché le coffre de sa main. Ouzza mourut là devant Dieu
  - type: note
    content: Le coffre aurait dû être transporté sur les épaules des lévites (Ex 25.12-15) et jamais touché, sous peine de mort (Nb 4.15). Ces prescriptions furent observées par la suite (15.1-15).
  - type: text
    content: .
  '11':
  - type: text
    content: 'David s’irrita parce que l’Eternel avait ouvert une brèche en frappant Ouzza, et il appela ce lieu Pérets-Ouzza (Brèche d’Ouzza), nom qu’il porte encore aujourd’hui. '
  '12':
  - type: text
    content: 'Ce jour-là, David prit peur de Dieu et il se demanda : Comment oserais-je faire venir le coffre de Dieu chez moi ?'
  '13':
  - type: text
    content: 'Il ne transporta donc pas le coffre chez lui, dans la Cité de David, mais il le fit déposer dans la maison d’Obed-Edom, un homme originaire de Gath. '
  '14':
  - type: text
    content: Le coffre y resta trois mois, et l’Eternel bénit la famille d’Obed-Edom et tous ses biens.
  '2':
  - type: text
    content: 'Puis il s’adressa à toute l’assemblée d’Israël et leur dit : Si vous le jugez bon, et si cela est dans le plan de l’Eternel notre Dieu, envoyons des messages à tous nos compatriotes qui restent encore dans toutes les régions d’Israël, ainsi qu’aux prêtres et aux lévites dans leurs villes de résidence, pour qu’ils nous rejoignent. '
  '3':
  - type: text
    content: Puis nous ramènerons auprès de nous le coffre de notre Dieu, car nous ne nous sommes pas préoccupés d’aller le chercher sous le règne de Saül.
  '4':
  - type: text
    content: 'Toute l’assemblée trouva cette proposition judicieuse, et l’on déclara qu’il fallait la suivre. '
  '5':
  - type: text
    content: David rassembla donc tout Israël, depuis le torrent d’Egypte
  - type: note
    content: Le torrent du Shihor, terme égyptien qui signifie « la mare de Horus », divinité égyptienne, sans doute l’un des canaux du Nil (voir Jos 13.3 ; Es 23.3 ; Jr 2.18).
  - type: text
    content: ' jusqu’à Lebo-Hamath'
  - type: note
    content: 'Non identifiée, mais au nord du pays. Autre traduction : jusqu’aux abords de Hamath.'
  - type: text
    content: ', pour faire venir le coffre de Dieu de Qiryath-Yearim'
  - type: note
    content: A quelque 13 kilomètres au nord-ouest de Jérusalem. Voir 1 S 6.21.
  - type: text
    content: .
  '6':
  - type: text
    content: David, avec tout Israël, se rendit à Baala
  - type: note
    content: Nom cananéen de Qiryath-Yearim (voir note 2 S 6.2).
  - type: text
    content: ', à Qiryath-Yearim, dans le territoire de Juda, pour en ramener le coffre de Dieu, l’Eternel qui siège entre les chérubins'
  - type: note
    content: Voir Ex 25.22.
  - type: text
    content: ' et sur lequel le Nom par excellence a été invoqué. '
  '7':
  - type: text
    content: On chargea le coffre de Dieu sur un chariot neuf après l’avoir pris de la maison d’Abinadab. Ouzza et Ahyo conduisaient le chariot
  - type: note
    content: Fils ou descendant d’Abinadab.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'David et tout Israël exprimaient leur joie devant Dieu en chantant de toutes leurs forces et en jouant sur des lyres, des luths, des tambourins, des cymbales et des trompettes. '
  '9':
  - type: text
    content: 'Lorsqu’ils furent arrivés près de l’aire de Kidôn, les bœufs firent un écart et Ouzza tendit la main pour saisir le coffre de Dieu. '
