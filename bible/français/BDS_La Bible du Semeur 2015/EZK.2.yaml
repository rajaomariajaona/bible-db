document_id: EZK.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La mission d’Ezéchiel
  - type: text
    content: 'Il me dit : Fils d’homme, tiens-toi debout, et je vais te parler.'
  '10':
  - type: text
    content: 'Elle le déroula devant moi : il était couvert d’inscriptions au recto et au verso'
  - type: note
    content: Normalement, l’écriture ne figurait que d’un côté. Le rouleau était saturé de paroles de jugement (Za 5.3 ; Ap 5.1).
  - type: text
    content: '  : c’étaient des plaintes, des lamentations et des cris de malheur.'
  '2':
  - type: text
    content: 'Dès qu’il m’eut adressé ces mots, l’Esprit entra en moi et me fit tenir debout, et j’entendis celui qui me parlait. '
  '3':
  - type: text
    content: 'Il me dit : Fils d’homme, je t’envoie vers les Israélites, vers cette foule de rebelles qui se sont révoltés contre moi. Jusqu’à ce jour, eux et leurs ancêtres se sont soulevés contre moi. '
  '4':
  - type: text
    content: 'C’est vers ces gens à la tête dure et au cœur insensible que je t’envoie pour que tu leur dises : « Voici ce que déclare le Seigneur, l’Eternel. » '
  '5':
  - type: text
    content: Alors, soit qu’ils écoutent, soit qu’ils refusent d’écouter – car c’est une communauté rebelle – ils sauront du moins qu’il y a un prophète au milieu d’eux.
  '6':
  - type: text
    content: 'Quant à toi, fils d’homme, ne les crains pas, et ne crains pas leurs paroles, bien que tu sois au milieu d’orties et de ronces et que tu habites avec des scorpions. Ne crains pas leurs paroles et ne tremble pas devant eux, car c’est une communauté rebelle. '
  '7':
  - type: text
    content: Tu leur transmettras donc mes paroles, soit qu’ils écoutent, soit qu’ils refusent d’écouter à cause de leur esprit rebelle.
  - type: heading
    content: La vision du rouleau
  '8':
  - type: text
    content: 'Et toi, fils d’homme, écoute ce que je te dis : Ne sois pas toi-même rebelle comme cette communauté rebelle ; ouvre ta bouche et mange ce que je te donne.'
  '9':
  - type: text
    content: Je regardai, et je vis une main tendue vers moi qui tenait le rouleau d’un livre
  - type: note
    content: '2.9 à 3.3  : voir Ap 10.9-10.'
  - type: text
    content: '. '
