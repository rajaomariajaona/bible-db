document_id: EZK.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mission d’Ezéchiel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit : Fils d’homme, tiens-toi debout, et je vais te parler.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle le déroula devant moi : il était couvert d’inscriptions au recto et au verso'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Normalement, l’écriture ne figurait que d’un côté. Le rouleau était saturé de paroles de jugement (Za 5.3 ; Ap 5.1).
      marker-yv: yv-n
    - type: text
      text: '  : c’étaient des plaintes, des lamentations et des cris de malheur.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès qu’il m’eut adressé ces mots, l’Esprit entra en moi et me fit tenir debout, et j’entendis celui qui me parlait. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit : Fils d’homme, je t’envoie vers les Israélites, vers cette foule de rebelles qui se sont révoltés contre moi. Jusqu’à ce jour, eux et leurs ancêtres se sont soulevés contre moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est vers ces gens à la tête dure et au cœur insensible que je t’envoie pour que tu leur dises : « Voici ce que déclare le Seigneur, l’Eternel. » '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, soit qu’ils écoutent, soit qu’ils refusent d’écouter – car c’est une communauté rebelle – ils sauront du moins qu’il y a un prophète au milieu d’eux.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, fils d’homme, ne les crains pas, et ne crains pas leurs paroles, bien que tu sois au milieu d’orties et de ronces et que tu habites avec des scorpions. Ne crains pas leurs paroles et ne tremble pas devant eux, car c’est une communauté rebelle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu leur transmettras donc mes paroles, soit qu’ils écoutent, soit qu’ils refusent d’écouter à cause de leur esprit rebelle.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La vision du rouleau
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, fils d’homme, écoute ce que je te dis : Ne sois pas toi-même rebelle comme cette communauté rebelle ; ouvre ta bouche et mange ce que je te donne.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je regardai, et je vis une main tendue vers moi qui tenait le rouleau d’un livre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.9 à 3.3  : voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 10.9-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
