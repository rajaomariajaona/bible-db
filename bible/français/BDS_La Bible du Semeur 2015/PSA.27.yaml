document_id: PSA.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: En sécurité auprès de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, l’Eternel est ma lumière ╵et mon Sauveur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de qui aurais-je crainte ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Eternel est ma forteresse : ╵il protège ma vie ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de qui aurais-je peur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que des méchants ╵s’avancent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voulant me nuire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont mes ennemis, ╵mes oppresseurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui perdent pied et tombent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu’une armée vienne m’assiéger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cœur reste sans crainte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’on me déclare la guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis plein d’assurance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai présenté à l’Eternel ╵un seul souhait, ╵mais qui me tient vraiment à cœur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je voudrais habiter ╵dans la maison de l’Eternel ╵tous les jours de ma vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin d’admirer l’Eternel ╵dans sa beauté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa douceur.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de chercher à le connaître
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour l’interroger.
    marker-yv: yv-n
  - type: text
    text: ' ╵dans sa demeure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car il me cache sous sa tente ╵dans les jours du malheur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au secret de son tabernacle, ╵il me tient abrité ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un rocher, ╵il me met hors d’atteinte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dès à présent, ╵je peux lever la tête ╵pour dominer ╵mes ennemis autour de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’offrirai dans son tabernacle ╵des sacrifices ╵avec des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je célébrerai l’Eternel ╵par le chant et les instruments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Eternel, ╵écoute mon appel ╵car je t’invoque.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accorde-moi la grâce ╵de me répondre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Du fond de mon cœur, je me dis, ╵de ta part : « Tournez-vous vers moi ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c’est vers toi que je me tourne, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ne te détourne pas de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne repousse pas ╵ton serviteur avec colère !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui m’as secouru,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne me délaisse pas ! ╵Ne m’abandonne pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô Dieu, toi qui es mon Sauveur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si mon père et ma mère ╵devaient m’abandonner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel me recueillerait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Enseigne-moi la voie ╵que tu veux que je suive, ╵ô Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et conduis-moi ╵par un sentier égal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque mes ennemis me guettent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne m’abandonne pas ╵aux désirs de mes adversaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque de faux témoins ╵se dressent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: respirant la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que deviendrais-je ╵si je n’avais pas l’assurance ╵d’expérimenter la bonté ╵de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: au pays des vivants ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Attends-toi donc à l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois fort ! ╵Affermis ton courage !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, attends-toi à l’Eternel !
