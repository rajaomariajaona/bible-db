document_id: PSA.27,21
type_code: fra
verses:
  '1':
  - type: heading
    content: En sécurité auprès de Dieu
  - type: text
    content: De David.
  - type: text
    content: 'Oui, l’Eternel est ma lumière ╵et mon Sauveur :'
  - type: text
    content: de qui aurais-je crainte ?
  - type: text
    content: 'L’Eternel est ma forteresse : ╵il protège ma vie ;'
  - type: text
    content: de qui aurais-je peur ?
  '10':
  - type: text
    content: Si mon père et ma mère ╵devaient m’abandonner,
  - type: text
    content: l’Eternel me recueillerait.
  '11':
  - type: text
    content: Enseigne-moi la voie ╵que tu veux que je suive, ╵ô Eternel,
  - type: text
    content: et conduis-moi ╵par un sentier égal,
  - type: text
    content: puisque mes ennemis me guettent.
  '12':
  - type: text
    content: Ne m’abandonne pas ╵aux désirs de mes adversaires
  - type: text
    content: lorsque de faux témoins ╵se dressent contre moi,
  - type: text
    content: respirant la violence.
  '13':
  - type: text
    content: Que deviendrais-je ╵si je n’avais pas l’assurance ╵d’expérimenter la bonté ╵de l’Eternel
  - type: text
    content: au pays des vivants ?
  '14':
  - type: text
    content: Attends-toi donc à l’Eternel !
  - type: text
    content: Sois fort ! ╵Affermis ton courage !
  - type: text
    content: Oui, attends-toi à l’Eternel !
  '2':
  - type: text
    content: Que des méchants ╵s’avancent contre moi,
  - type: text
    content: voulant me nuire,
  - type: text
    content: ce sont mes ennemis, ╵mes oppresseurs,
  - type: text
    content: qui perdent pied et tombent.
  '3':
  - type: text
    content: Qu’une armée vienne m’assiéger,
  - type: text
    content: mon cœur reste sans crainte.
  - type: text
    content: Que l’on me déclare la guerre,
  - type: text
    content: je suis plein d’assurance.
  '4':
  - type: text
    content: 'J’ai présenté à l’Eternel ╵un seul souhait, ╵mais qui me tient vraiment à cœur :'
  - type: text
    content: je voudrais habiter ╵dans la maison de l’Eternel ╵tous les jours de ma vie
  - type: text
    content: afin d’admirer l’Eternel ╵dans sa beauté
  - type: note
    content: 'Autre traduction : dans sa douceur.'
  - type: text
    content: ','
  - type: text
    content: et de chercher à le connaître
  - type: note
    content: 'Autre traduction : pour l’interroger.'
  - type: text
    content: ' ╵dans sa demeure.'
  '5':
  - type: text
    content: Car il me cache sous sa tente ╵dans les jours du malheur.
  - type: text
    content: Au secret de son tabernacle, ╵il me tient abrité ;
  - type: text
    content: sur un rocher, ╵il me met hors d’atteinte.
  '6':
  - type: text
    content: Dès à présent, ╵je peux lever la tête ╵pour dominer ╵mes ennemis autour de moi.
  - type: text
    content: J’offrirai dans son tabernacle ╵des sacrifices ╵avec des cris de joie,
  - type: text
    content: je célébrerai l’Eternel ╵par le chant et les instruments.
  '7':
  - type: text
    content: O Eternel, ╵écoute mon appel ╵car je t’invoque.
  - type: text
    content: Accorde-moi la grâce ╵de me répondre.
  '8':
  - type: text
    content: 'Du fond de mon cœur, je me dis, ╵de ta part : « Tournez-vous vers moi ! »'
  - type: text
    content: Oui, c’est vers toi que je me tourne, ╵ô Eternel,
  '9':
  - type: text
    content: ne te détourne pas de moi
  - type: text
    content: et ne repousse pas ╵ton serviteur avec colère !
  - type: text
    content: Toi qui m’as secouru,
  - type: text
    content: ne me délaisse pas ! ╵Ne m’abandonne pas,
  - type: text
    content: ô Dieu, toi qui es mon Sauveur !
