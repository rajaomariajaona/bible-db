document_id: ACT.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La délivrance de Pierre
  - type: text
    content: Vers la même époque, le roi Hérode
  - type: note
    content: Il s’agit d’Hérode Agrippa Ier, neveu d’Antipas. Il a régné sur la Judée à partir de l’an 41.
  - type: text
    content: ' se mit à maltraiter quelques membres de l’Eglise. '
  '10':
  - type: text
    content: Ils passèrent ainsi devant le premier poste de garde, puis devant le second et arrivèrent devant la porte de fer qui donnait sur la ville. Celle-ci s’ouvrit toute seule. Ils sortirent et s’avancèrent dans une rue. Et soudain, l’ange le quitta.
  '11':
  - type: text
    content: 'Alors seulement, Pierre reprit ses esprits et se dit : « Ah, maintenant je le vois bien, c’est vrai : le Seigneur a envoyé son ange et m’a délivré des mains d’Hérode et de tout le mal que voulait me faire le peuple juif. »'
  '12':
  - type: text
    content: Après réflexion, il se rendit à la maison de Marie, la mère de Jean appelé aussi Marc
  - type: note
    content: La maison de la mère de Jean-Marc et tante de Barnabas (Col 4.10) était peut-être un des lieux de rassemblement des chrétiens de Jérusalem.
  - type: text
    content: '. Un assez grand nombre de frères s’y étaient réunis pour prier. '
  '13':
  - type: text
    content: 'Il frappa au battant de la porte. Une jeune servante, appelée Rhode, s’approcha et demanda qui était là. '
  '14':
  - type: text
    content: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d’ouvrir, elle se précipita pour annoncer : C’est Pierre ! Il est là, dehors, devant la porte.'
  '15':
  - type: text
    content: – Tu es folle, lui dirent-ils.
  - type: text
    content: Mais elle n’en démordait pas.
  - type: text
    content: – Alors, c’est son ange, dirent-ils.
  '16':
  - type: text
    content: 'Pendant ce temps, Pierre continuait à frapper. Ils ouvrirent, le virent et en restèrent tout étonnés. '
  '17':
  - type: text
    content: 'D’un geste de la main, Pierre leur fit signe de se taire, et il leur raconta comment le Seigneur l’avait fait sortir de prison. Il ajouta : Faites savoir tout cela à Jacques'
  - type: note
    content: Ce Jacques est le frère de Jésus qui a joué un rôle important dans l’Eglise de Jérusalem.
  - type: text
    content: ' et aux autres frères.'
  - type: text
    content: Ensuite, il repartit et se rendit ailleurs.
  '18':
  - type: text
    content: 'Quand le jour se leva, il y eut un grand émoi parmi les soldats : Où donc était passé Pierre ? '
  '19':
  - type: text
    content: Hérode le fit rechercher, mais on ne le trouva nulle part. Alors, après avoir fait interroger les gardes, il ordonna leur exécution. Ensuite, il quitta la Judée pour se rendre à Césarée où il passa quelque temps.
  - type: heading
    content: La mort du roi Hérode
  '2':
  - type: text
    content: 'Il fit tuer par l’épée Jacques, le frère de Jean. '
  '20':
  - type: text
    content: 'Or, Hérode était en conflit avec les habitants de Tyr et de Sidon. Ceux-ci décidèrent ensemble de lui envoyer une délégation. Après s’être assuré l’appui de Blastus, son conseiller, ils demandèrent la paix, car leur pays était économiquement dépendant de celui du roi. '
  '21':
  - type: text
    content: 'Au jour fixé, Hérode, revêtu de ses vêtements royaux, prit place sur son trône et leur adressa un discours en public. '
  '22':
  - type: text
    content: 'Le peuple se mit à crier : Ce n’est plus un homme qui parle. C’est la voix d’un dieu.'
  '23':
  - type: text
    content: Au même instant, un ange du Seigneur vint le frapper parce qu’il n’avait pas rendu à Dieu l’honneur qui lui est dû. Dévoré par les vers, il expira
  - type: note
    content: L’historien juif Josèphe parle lui aussi du caractère étrange et soudain de la mort d’Hérode Agrippa.
  - type: text
    content: .
  '24':
  - type: text
    content: 'Mais la Parole de Dieu se répandait toujours plus. '
  '25':
  - type: text
    content: Barnabas et Saul, après avoir rempli leur mission en faveur des croyants de Jérusalem, partirent
  - type: note
    content: 'Autre traduction : après avoir rempli leur mission, retournèrent à Jérusalem. Certains manuscrits ont : après avoir rempli leur mission, quittèrent Jérusalem.'
  - type: text
    content: ' en emmenant avec eux Jean surnommé Marc.'
  '3':
  - type: text
    content: 'Quand il s’aperçut que cela plaisait aux Juifs, il fit aussi arrêter Pierre. C’était pendant les jours des « Pains sans levain ». '
  '4':
  - type: text
    content: Lorsqu’on eut arrêté Pierre, il le fit mettre en prison et le plaça sous la garde de quatre escouades de quatre soldats chacune. Il voulait le faire comparaître devant le peuple après la Pâque.
  '5':
  - type: text
    content: 'Pierre était donc sous bonne garde dans la prison. Mais l’Eglise priait ardemment Dieu en sa faveur. '
  '6':
  - type: text
    content: Or, la nuit qui précédait le jour où Hérode allait le faire comparaître, Pierre, attaché par deux chaînes, dormait entre deux soldats, et devant la porte de la prison, des sentinelles montaient la garde.
  '7':
  - type: text
    content: 'Tout à coup, un ange du Seigneur apparut, et la cellule fut inondée de lumière. L’ange toucha Pierre au côté pour le réveiller : Lève-toi vite ! lui dit-il.'
  - type: text
    content: Au même instant, les chaînes lui tombèrent des poignets.
  '8':
  - type: text
    content: – Allons, poursuivit l’ange, mets ta ceinture et attache tes sandales !
  - type: text
    content: Pierre obéit.
  - type: text
    content: – Maintenant, ajouta l’ange, mets ton manteau et suis-moi.
  '9':
  - type: text
    content: 'Pierre le suivit et sortit, sans se rendre compte que tout ce que l’ange faisait était réel : il croyait avoir une vision. '
