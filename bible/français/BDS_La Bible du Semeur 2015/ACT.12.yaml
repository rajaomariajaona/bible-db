document_id: ACT.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La délivrance de Pierre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vers la même époque, le roi Hérode
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit d’Hérode Agrippa I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ', neveu d’Antipas. Il a régné sur la Judée à partir de l’an 41.'
      marker-yv: yv-n
    - type: text
      text: ' se mit à maltraiter quelques membres de l’Eglise. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils passèrent ainsi devant le premier poste de garde, puis devant le second et arrivèrent devant la porte de fer qui donnait sur la ville. Celle-ci s’ouvrit toute seule. Ils sortirent et s’avancèrent dans une rue. Et soudain, l’ange le quitta.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors seulement, Pierre reprit ses esprits et se dit : « Ah, maintenant je le vois bien, c’est vrai : le Seigneur a envoyé son ange et m’a délivré des mains d’Hérode et de tout le mal que voulait me faire le peuple juif. »'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après réflexion, il se rendit à la maison de Marie, la mère de Jean appelé aussi Marc
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de la mère de Jean-Marc et tante de Barnabas (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Col 4.10
        - type: text
          text: ) était peut-être un des lieux de rassemblement des chrétiens de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: '. Un assez grand nombre de frères s’y étaient réunis pour prier. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il frappa au battant de la porte. Une jeune servante, appelée Rhode, s’approcha et demanda qui était là. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d’ouvrir, elle se précipita pour annoncer : C’est Pierre ! Il est là, dehors, devant la porte.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Tu es folle, lui dirent-ils.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais elle n’en démordait pas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Alors, c’est son ange, dirent-ils.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant ce temps, Pierre continuait à frapper. Ils ouvrirent, le virent et en restèrent tout étonnés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’un geste de la main, Pierre leur fit signe de se taire, et il leur raconta comment le Seigneur l’avait fait sortir de prison. Il ajouta : Faites savoir tout cela à Jacques'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est le frère de Jésus qui a joué un rôle important dans l’Eglise de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' et aux autres frères.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ensuite, il repartit et se rendit ailleurs.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le jour se leva, il y eut un grand émoi parmi les soldats : Où donc était passé Pierre ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hérode le fit rechercher, mais on ne le trouva nulle part. Alors, après avoir fait interroger les gardes, il ordonna leur exécution. Ensuite, il quitta la Judée pour se rendre à Césarée où il passa quelque temps.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort du roi Hérode
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit tuer par l’épée Jacques, le frère de Jean. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, Hérode était en conflit avec les habitants de Tyr et de Sidon. Ceux-ci décidèrent ensemble de lui envoyer une délégation. Après s’être assuré l’appui de Blastus, son conseiller, ils demandèrent la paix, car leur pays était économiquement dépendant de celui du roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au jour fixé, Hérode, revêtu de ses vêtements royaux, prit place sur son trône et leur adressa un discours en public. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple se mit à crier : Ce n’est plus un homme qui parle. C’est la voix d’un dieu.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au même instant, un ange du Seigneur vint le frapper parce qu’il n’avait pas rendu à Dieu l’honneur qui lui est dû. Dévoré par les vers, il expira
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’historien juif Josèphe parle lui aussi du caractère étrange et soudain de la mort d’Hérode Agrippa.
      marker-yv: yv-n
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la Parole de Dieu se répandait toujours plus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Barnabas et Saul, après avoir rempli leur mission en faveur des croyants de Jérusalem, partirent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'après avoir rempli leur mission, retournèrent à Jérusalem. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après avoir rempli leur mission, quittèrent Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' en emmenant avec eux Jean surnommé Marc.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il s’aperçut que cela plaisait aux Juifs, il fit aussi arrêter Pierre. C’était pendant les jours des « Pains sans levain ». '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsqu’on eut arrêté Pierre, il le fit mettre en prison et le plaça sous la garde de quatre escouades de quatre soldats chacune. Il voulait le faire comparaître devant le peuple après la Pâque.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre était donc sous bonne garde dans la prison. Mais l’Eglise priait ardemment Dieu en sa faveur. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, la nuit qui précédait le jour où Hérode allait le faire comparaître, Pierre, attaché par deux chaînes, dormait entre deux soldats, et devant la porte de la prison, des sentinelles montaient la garde.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout à coup, un ange du Seigneur apparut, et la cellule fut inondée de lumière. L’ange toucha Pierre au côté pour le réveiller : Lève-toi vite ! lui dit-il.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au même instant, les chaînes lui tombèrent des poignets.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Allons, poursuivit l’ange, mets ta ceinture et attache tes sandales !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre obéit.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Maintenant, ajouta l’ange, mets ton manteau et suis-moi.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre le suivit et sortit, sans se rendre compte que tout ce que l’ange faisait était réel : il croyait avoir une vision. '
