document_id: DAN.6
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: L’histoire mondiale et sa fin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Et Darius le Mède, âgé d’environ soixante-deux ans, accéda au pouvoir royal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Darius le Mède '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(9.1 ; 11.1) : il faut distinguer ce personnage de Darius I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' Hystaspe (522 à 486 av. J.-C.). Il y a de bonnes raisons de l’identifier à Ugbaru, encore nommé « Gubaru » (ou Gobryas), le général qui a pris la ville de Babylone. Il aurait été nommé par Cyrus roi vassal de Babylone. Une autre solution fait de « Darius le Mède » le nom babylonien d’intronisation de Cyrus après sa conquête de la ville en 539 av. J.-C. On peut alors adopter l’autre traduction indiquée en note pour le v. 29 (voir, en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5.26
        metadata:
          usfm: 1CH.5.26
      - type: text
        text: ' et note, un même phénomène pour Tiglath-Piléser, roi d’Assyrie).'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel dans la fosse aux lions
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: La jalousie des satrapes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Darius jugea bon de nommer cent vingt satrapes pour gouverner tout le royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il plaça au-dessus d’eux trois ministres auxquels ces satrapes devaient rendre compte pour que les intérêts du roi soient préservés. Daniel était l’un de ces trois. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Or, il se montrait plus capable que les deux autres ministres et tous les satrapes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Est 1.1
        metadata:
          usfm: EST.1.1
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', parce qu’il y avait en lui un esprit extraordinaire. C’est pourquoi le roi songeait à le mettre à la tête de tout le royaume.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors les autres ministres et les satrapes se mirent à chercher un motif d’accusation contre lui dans sa manière d’administrer les affaires de l’empire, mais ils ne purent découvrir aucun motif d’accusation, ni aucune faute, car il était fidèle, de sorte qu’on ne pouvait trouver en lui ni négligence ni faute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces hommes-là conclurent donc : Nous ne trouverons aucun motif d’accusation contre ce Daniel, à moins que ce soit en relation avec la Loi de son Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors ces ministres et ces satrapes se précipitèrent chez le roi et lui parlèrent ainsi : Que le roi Darius vive éternellement ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les ministres du royaume, les préfets et les satrapes, les conseillers et les gouverneurs réunis en conseil, ont décidé qu’il fallait publier un édit royal pour mettre en vigueur une interdiction stricte. Selon cet édit, quiconque, pendant les trente jours qui suivent, adressera une prière à quelque dieu ou quelque homme que ce soit, si ce n’est à toi, Majesté, sera jeté dans la fosse aux lions. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Maintenant, Majesté, établis cette interdiction, et signe le décret afin qu’il soit irrévocable, conformément à la loi des Mèdes et des Perses qui est immuable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Là-dessus, le roi Darius signa le décret portant l’interdiction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand Daniel apprit que ce décret avait été signé, il entra dans sa maison ; les fenêtres de sa chambre haute étant ouvertes en direction de Jérusalem, trois fois par jour, il se mettait à genoux pour prier et louer son Dieu. Il continua à le faire comme auparavant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors ces hommes firent irruption chez lui et le surprirent en train d’invoquer et d’implorer son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aussitôt, ils se rendirent chez le roi pour lui parler de l’interdiction royale : N’as-tu pas signé un décret d’interdiction, dirent-ils, stipulant que quiconque adressera, dans les trente jours, une prière à quelque dieu ou homme que ce soit si ce n’est à toi, Majesté, serait jeté dans la fosse aux lions ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi répondit : Il en est bien ainsi, conformément à la loi des Mèdes et des Perses qui est immuable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – Eh bien, reprirent-ils devant le roi, Daniel, l’un des déportés de Juda, ne fait aucun cas de toi, Majesté, car il n’a pas respecté l’interdiction que tu as signée. Trois fois par jour, il fait sa prière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque le roi entendit ces paroles, il fut vivement peiné et il décida de délivrer Daniel. Jusqu’au coucher du soleil, il chercha à le sauver. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais ces hommes se rendirent ensemble chez le roi et lui dirent : Sache, Majesté, que la loi des Mèdes et des Perses veut que toute interdiction et tout décret promulgués par le roi soient irrévocables.'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Dans la fosse aux lions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le roi ordonna d’emmener Daniel et de le jeter dans la fosse aux lions. Il s’adressa à Daniel et lui dit : Puisse ton Dieu que tu sers avec tant de persévérance te délivrer lui-même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On apporta une grosse pierre et on la mit devant l’entrée de la fosse. Le roi y apposa son sceau avec son anneau et ceux des hauts dignitaires, afin que rien ne puisse être changé aux dispositions prises à l’égard de Daniel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Après cela, le roi rentra dans son palais. Il passa la nuit sans manger et refusa tout divertissement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: divertissement
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'terme de sens incertain. Autres traductions proposées : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: table, nourriture, parfums, concubines.
    marker-yv: yv-n
  - type: text
    text: . Et il ne parvint pas à trouver le sommeil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dès le point du jour, le roi se leva et se rendit en toute hâte à la fosse aux lions. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Comme il s’en approchait, il appela Daniel d’une voix angoissée : Daniel, serviteur du Dieu vivant, cria-t-il, ton Dieu que tu sers avec tant de persévérance a-t-il pu te délivrer des lions ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Daniel répondit au roi : O Majesté, vis éternellement ! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mon Dieu a envoyé son ange qui a fermé la gueule des lions, de sorte qu’ils ne m’ont fait aucun mal, parce que j’ai été reconnu innocent devant lui – tout comme je n’ai pas commis de faute envers toi, Majesté !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors le roi éprouva une grande joie et il ordonna de hisser Daniel hors de la fosse. Daniel fut donc remonté de la fosse, et on ne trouva sur lui aucune blessure, parce qu’il avait eu confiance en son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Là-dessus, le roi ordonna de lui amener ces hommes qui avaient accusé Daniel, et il les fit jeter dans la fosse aux lions, avec leurs enfants et leurs femmes ; ils n’avaient pas atteint le sol de la fosse, que déjà les lions s’emparèrent d’eux et leur broyèrent les os.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors le roi Darius écrivit aux gens de tous les peuples, de toutes les nations et de toutes langues qui habitent la terre entière :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Que votre paix soit grande !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je décrète que, dans toute l’étendue de mon royaume, on tremble de crainte devant le Dieu de Daniel, car
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est le Dieu vivant
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui subsiste éternellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son règne ne sera jamais détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa souveraineté ╵durera à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il délivre et il sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il accomplit des prodiges, ╵des signes extraordinaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le ciel et sur terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a délivré Daniel ╵de la griffe des lions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Daniel prospéra sous le règne de Darius et sous celui de Cyrus le Perse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sous le règne de Darius – c’est-à-dire de Cyrus le Perse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6.1'
        metadata:
          usfm: DAN.6.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
