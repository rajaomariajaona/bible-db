document_id: DAN.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’histoire mondiale et sa fin
  - type: text
    content: Et Darius le Mède, âgé d’environ soixante-deux ans, accéda au pouvoir royal
  - type: note
    content: 'Darius le Mède (9.1 ; 11.1) : il faut distinguer ce personnage de Darius Ier Hystaspe (522 à 486 av. J.-C.). Il y a de bonnes raisons de l’identifier à Ugbaru, encore nommé « Gubaru » (ou Gobryas), le général qui a pris la ville de Babylone. Il aurait été nommé par Cyrus roi vassal de Babylone. Une autre solution fait de « Darius le Mède » le nom babylonien d’intronisation de Cyrus après sa conquête de la ville en 539 av. J.-C. On peut alors adopter l’autre traduction indiquée en note pour le v. 29 (voir, en 1 Ch 5.26 et note, un même phénomène pour Tiglath-Piléser, roi d’Assyrie).'
  - type: text
    content: .
  - type: heading
    content: Daniel dans la fosse aux lions
  - type: heading
    content: La jalousie des satrapes
  '10':
  - type: text
    content: Là-dessus, le roi Darius signa le décret portant l’interdiction.
  '11':
  - type: text
    content: 'Quand Daniel apprit que ce décret avait été signé, il entra dans sa maison ; les fenêtres de sa chambre haute étant ouvertes en direction de Jérusalem, trois fois par jour, il se mettait à genoux pour prier et louer son Dieu. Il continua à le faire comme auparavant. '
  '12':
  - type: text
    content: 'Alors ces hommes firent irruption chez lui et le surprirent en train d’invoquer et d’implorer son Dieu. '
  '13':
  - type: text
    content: 'Aussitôt, ils se rendirent chez le roi pour lui parler de l’interdiction royale : N’as-tu pas signé un décret d’interdiction, dirent-ils, stipulant que quiconque adressera, dans les trente jours, une prière à quelque dieu ou homme que ce soit si ce n’est à toi, Majesté, serait jeté dans la fosse aux lions ?'
  - type: text
    content: 'Le roi répondit : Il en est bien ainsi, conformément à la loi des Mèdes et des Perses qui est immuable.'
  '14':
  - type: text
    content: – Eh bien, reprirent-ils devant le roi, Daniel, l’un des déportés de Juda, ne fait aucun cas de toi, Majesté, car il n’a pas respecté l’interdiction que tu as signée. Trois fois par jour, il fait sa prière.
  '15':
  - type: text
    content: 'Lorsque le roi entendit ces paroles, il fut vivement peiné et il décida de délivrer Daniel. Jusqu’au coucher du soleil, il chercha à le sauver. '
  '16':
  - type: text
    content: 'Mais ces hommes se rendirent ensemble chez le roi et lui dirent : Sache, Majesté, que la loi des Mèdes et des Perses veut que toute interdiction et tout décret promulgués par le roi soient irrévocables.'
  - type: heading
    content: Dans la fosse aux lions
  '17':
  - type: text
    content: 'Alors le roi ordonna d’emmener Daniel et de le jeter dans la fosse aux lions. Il s’adressa à Daniel et lui dit : Puisse ton Dieu que tu sers avec tant de persévérance te délivrer lui-même.'
  '18':
  - type: text
    content: 'On apporta une grosse pierre et on la mit devant l’entrée de la fosse. Le roi y apposa son sceau avec son anneau et ceux des hauts dignitaires, afin que rien ne puisse être changé aux dispositions prises à l’égard de Daniel. '
  '19':
  - type: text
    content: Après cela, le roi rentra dans son palais. Il passa la nuit sans manger et refusa tout divertissement
  - type: note
    content: 'divertissement: terme de sens incertain. Autres traductions proposées : table, nourriture, parfums, concubines.'
  - type: text
    content: . Et il ne parvint pas à trouver le sommeil.
  '2':
  - type: text
    content: 'Darius jugea bon de nommer cent vingt satrapes pour gouverner tout le royaume. '
  '20':
  - type: text
    content: 'Dès le point du jour, le roi se leva et se rendit en toute hâte à la fosse aux lions. '
  '21':
  - type: text
    content: 'Comme il s’en approchait, il appela Daniel d’une voix angoissée : Daniel, serviteur du Dieu vivant, cria-t-il, ton Dieu que tu sers avec tant de persévérance a-t-il pu te délivrer des lions ?'
  '22':
  - type: text
    content: 'Alors Daniel répondit au roi : O Majesté, vis éternellement ! '
  '23':
  - type: text
    content: Mon Dieu a envoyé son ange qui a fermé la gueule des lions, de sorte qu’ils ne m’ont fait aucun mal, parce que j’ai été reconnu innocent devant lui – tout comme je n’ai pas commis de faute envers toi, Majesté !
  '24':
  - type: text
    content: 'Alors le roi éprouva une grande joie et il ordonna de hisser Daniel hors de la fosse. Daniel fut donc remonté de la fosse, et on ne trouva sur lui aucune blessure, parce qu’il avait eu confiance en son Dieu. '
  '25':
  - type: text
    content: Là-dessus, le roi ordonna de lui amener ces hommes qui avaient accusé Daniel, et il les fit jeter dans la fosse aux lions, avec leurs enfants et leurs femmes ; ils n’avaient pas atteint le sol de la fosse, que déjà les lions s’emparèrent d’eux et leur broyèrent les os.
  '26':
  - type: text
    content: 'Alors le roi Darius écrivit aux gens de tous les peuples, de toutes les nations et de toutes langues qui habitent la terre entière :'
  - type: text
    content: Que votre paix soit grande !
  '27':
  - type: text
    content: Je décrète que, dans toute l’étendue de mon royaume, on tremble de crainte devant le Dieu de Daniel, car
  - type: text
    content: il est le Dieu vivant
  - type: text
    content: qui subsiste éternellement,
  - type: text
    content: son règne ne sera jamais détruit,
  - type: text
    content: sa souveraineté ╵durera à toujours.
  '28':
  - type: text
    content: Il délivre et il sauve,
  - type: text
    content: et il accomplit des prodiges, ╵des signes extraordinaires
  - type: text
    content: dans le ciel et sur terre,
  - type: text
    content: car il a délivré Daniel ╵de la griffe des lions.
  '29':
  - type: text
    content: Daniel prospéra sous le règne de Darius et sous celui de Cyrus le Perse
  - type: note
    content: 'Autre traduction : sous le règne de Darius – c’est-à-dire de Cyrus le Perse (voir note 6.1).'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Il plaça au-dessus d’eux trois ministres auxquels ces satrapes devaient rendre compte pour que les intérêts du roi soient préservés. Daniel était l’un de ces trois. '
  '4':
  - type: text
    content: Or, il se montrait plus capable que les deux autres ministres et tous les satrapes
  - type: note
    content: Voir Est 1.1 et note.
  - type: text
    content: ', parce qu’il y avait en lui un esprit extraordinaire. C’est pourquoi le roi songeait à le mettre à la tête de tout le royaume.'
  '5':
  - type: text
    content: Alors les autres ministres et les satrapes se mirent à chercher un motif d’accusation contre lui dans sa manière d’administrer les affaires de l’empire, mais ils ne purent découvrir aucun motif d’accusation, ni aucune faute, car il était fidèle, de sorte qu’on ne pouvait trouver en lui ni négligence ni faute.
  '6':
  - type: text
    content: 'Ces hommes-là conclurent donc : Nous ne trouverons aucun motif d’accusation contre ce Daniel, à moins que ce soit en relation avec la Loi de son Dieu.'
  '7':
  - type: text
    content: 'Alors ces ministres et ces satrapes se précipitèrent chez le roi et lui parlèrent ainsi : Que le roi Darius vive éternellement ! '
  '8':
  - type: text
    content: 'Tous les ministres du royaume, les préfets et les satrapes, les conseillers et les gouverneurs réunis en conseil, ont décidé qu’il fallait publier un édit royal pour mettre en vigueur une interdiction stricte. Selon cet édit, quiconque, pendant les trente jours qui suivent, adressera une prière à quelque dieu ou quelque homme que ce soit, si ce n’est à toi, Majesté, sera jeté dans la fosse aux lions. '
  '9':
  - type: text
    content: Maintenant, Majesté, établis cette interdiction, et signe le décret afin qu’il soit irrévocable, conformément à la loi des Mèdes et des Perses qui est immuable.
