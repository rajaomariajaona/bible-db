document_id: 1KI.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les femmes de Salomon et son idolâtrie
  - type: text
    content: 'Le roi Salomon aima beaucoup de femmes étrangères, outre la fille du pharaon : des Moabites, des Ammonites, des Edomites, des Sidoniennes, des Hittites. '
  '10':
  - type: text
    content: 'Il lui avait pourtant donné des ordres sur ce point, lui défendant de s’attacher à des dieux étrangers, mais Salomon désobéit aux ordres de l’Eternel. '
  '11':
  - type: text
    content: 'Alors l’Eternel lui dit : Puisque tu te conduis ainsi et que tu n’as pas respecté mon alliance et les ordres que je t’avais donnés, je t’arracherai la royauté et je la donnerai à l’un de tes sujets. '
  '12':
  - type: text
    content: 'Toutefois, à cause de ton père David, je n’accomplirai pas cette menace de ton vivant, mais j’arracherai le royaume à ton fils. '
  '13':
  - type: text
    content: Encore, je ne lui enlèverai pas tout le royaume, je lui laisserai une tribu à cause de mon serviteur David et à cause de Jérusalem, la ville que j’ai choisie.
  - type: heading
    content: La rançon de l’infidélité
  '14':
  - type: text
    content: 'L’Eternel suscita un adversaire à Salomon : Hadad l’Edomite, un descendant de la famille royale d’Edom. '
  '15':
  - type: text
    content: 'Jadis, au temps où David avait combattu les Edomites, Joab, son chef d’armée, avait enterré les morts et tué tous les Edomites de sexe masculin. '
  '16':
  - type: text
    content: 'Il était resté pendant six mois avec toute l’armée d’Israël en Edom, jusqu’à ce qu’il eût exterminé tous les Edomites de sexe masculin. '
  '17':
  - type: text
    content: 'Hadad qui, à l’époque, était un jeune garçon, avait cependant réussi à s’enfuir en Egypte avec quelques Edomites, serviteurs de son père. '
  '18':
  - type: text
    content: 'Ils quittèrent la région de Madian et traversèrent le désert de Parân. Ils entraînèrent avec eux quelques hommes de Parân, puis se rendirent en Egypte chez le pharaon, roi d’Egypte. Celui-ci fournit à Hadad une maison, lui donna de quoi vivre et lui fit présent d’une terre. '
  '19':
  - type: text
    content: 'Hadad gagna la faveur du pharaon au point que celui-ci lui accorda pour femme sa belle-sœur, c’est-à-dire la sœur de la reine Tahpenès. '
  '2':
  - type: text
    content: 'Elles venaient de ces peuples étrangers au sujet desquels l’Eternel avait dit aux Israélites : « Vous ne vous unirez pas à eux, et ils ne s’uniront pas à vous ; sinon ils détourneront votre cœur et vous entraîneront à adorer leurs dieux'
  - type: note
    content: Voir Ex 34.15-16 ; Dt 7.3-4.
  - type: text
    content: '. » Or, c’est précisément à des femmes de ces peuples-là que Salomon s’attacha, entraîné par l’amour. '
  '20':
  - type: text
    content: 'Elle lui donna un fils qu’il appela Guenoubath. La reine Tahpenès l’éleva dans le palais du pharaon avec les fils du roi. '
  '21':
  - type: text
    content: 'En Egypte, Hadad apprit que David était mort et que Joab son général était également mort. Il demanda au pharaon l’autorisation de retourner dans son pays. '
  '22':
  - type: text
    content: 'Le pharaon lui dit : Pourquoi veux-tu rentrer chez toi ? Que te manque-t-il auprès de moi ?'
  - type: text
    content: – Rien, lui répondit Hadad, mais laisse-moi quand même partir
  - type: note
    content: 'L’ancienne version grecque ajoute : Hadad s’en retourna donc dans son pays. Devenu roi d’Edom, il traita Israël en ennemi.'
  - type: text
    content: .
  '23':
  - type: text
    content: 'Dieu suscita un autre adversaire à Salomon : Rezôn, fils d’Elyada, qui s’était enfui de chez son maître Hadadézer, roi de Tsoba'
  - type: note
    content: Petit royaume araméen au sud-est du Liban. David a vaincu son roi (2 S 8.3-8, voir note).
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Rezôn avait rassemblé des partisans autour de lui et était devenu leur chef de bande au temps où David avait massacré les troupes de son maître. Rezôn et ses hommes marchèrent sur Damas, s’y installèrent et y prirent le pouvoir. '
  '25':
  - type: text
    content: Rezôn fut l’adversaire d’Israël durant tout le règne de Salomon. Pendant que Hadad s’acharnait contre Israël, Rezôn, devenu roi de Syrie, eut aussi de la haine à l’égard d’Israël.
  - type: heading
    content: L’exécution des sanctions se prépare
  '26':
  - type: text
    content: Jéroboam, fils de Nebath, un Ephratien de Tseréda
  - type: note
    content: 'Ephratien: c’est-à-dire d’Ephraïm. Tseréda se trouvait au milieu du territoire du futur royaume du Nord.'
  - type: text
    content: ', fils d’une veuve nommée Tseroua, qui avait été au service de Salomon, se révolta contre le roi '
  '27':
  - type: text
    content: 'dans les circonstances suivantes : à l’époque où Salomon faisait aménager les abords du palais pour des cultures en terrasse, et réparer une brèche dans le rempart de la Cité de David, son père, '
  '28':
  - type: text
    content: 'ce Jéroboam était un jeune homme énergique et capable. Salomon avait remarqué comment il exécutait son travail et lui avait confié la surveillance de toutes les corvées exécutées par les hommes des tribus issues de Joseph. '
  '29':
  - type: text
    content: A cette époque-là, Jéroboam sortit un jour de Jérusalem et fut abordé en chemin par le prophète Ahiya de Silo
  - type: note
    content: L’un des sanctuaires israélites datant de l’époque de la conquête de Canaan (Jos 18.1) où le coffre de l’alliance était demeuré un certain temps (1 S 1.3 ; 4.3).
  - type: text
    content: ', vêtu d’un manteau neuf. Ils étaient tous deux seuls dans la campagne. '
  '3':
  - type: text
    content: 'Il eut sept cents épouses de rang princier et trois cents épouses de second rang, et toutes ces femmes détournèrent son cœur. '
  '30':
  - type: text
    content: 'Ahiya prit le manteau neuf qu’il portait, le déchira en douze morceaux '
  '31':
  - type: text
    content: 'et dit à Jéroboam : Prends pour toi dix de ces morceaux ! Car voici ce que déclare l’Eternel, le Dieu d’Israël : « J’ai décidé d’arracher le royaume à Salomon et de te confier dix tribus. '
  '32':
  - type: text
    content: 'Une seule tribu lui restera à cause de mon serviteur David et de Jérusalem, la ville que j’ai choisie parmi toutes les tribus d’Israël. '
  '33':
  - type: text
    content: Je ferai cela, parce que les Israélites m’ont abandonné et se sont prosternés devant Astarté la déesse des Sidoniens, devant Kemosh le dieu de Moab, et devant Milkom, le dieu des Ammonites, et parce qu’ils n’ont pas suivi les chemins que je leur ai prescrits pour faire ce que je considère comme juste et pour obéir à mes ordonnances et à mes lois comme l’a fait David, le père de Salomon
  - type: note
    content: Dans l’ancienne version grecque, la version syriaque et la Vulgate, les verbes de ce verset sont au singulier et Salomon en est le sujet.
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Toutefois, ce n’est pas ce dernier que je dépouillerai de la royauté ; je le laisserai régner jusqu’à la fin de sa vie à cause de mon serviteur David que j’ai choisi et qui a obéi à mes commandements et mes ordonnances. '
  '35':
  - type: text
    content: 'Mais je reprendrai la royauté à son fils et je te donnerai dix tribus, '
  '36':
  - type: text
    content: 'laissant une tribu à son fils, afin que mon serviteur David ait toujours un de ses descendants qui règne devant moi à Jérusalem, la ville que j’ai choisie pour y établir ma présence. '
  '37':
  - type: text
    content: 'Quant à toi, je te ferai roi et tu régneras comme tu le désires sur Israël. '
  '38':
  - type: text
    content: 'Si tu obéis à tout ce que je t’ordonnerai, si tu suis les chemins que j’ai prescrits et si tu fais ce que je considère comme juste en observant mes ordonnances et mes commandements, comme l’a fait mon serviteur David, je serai avec toi, je ferai de toi le chef d’une dynastie durable comme je l’ai fait pour David, et je te confierai Israël. '
  '39':
  - type: text
    content: J’humilierai ainsi les descendants de David. Mais ce ne sera pas pour toujours. »
  '4':
  - type: text
    content: 'En effet, lorsque Salomon fut devenu vieux, ses femmes détournèrent son cœur vers des dieux étrangers, de sorte que son cœur n’appartint plus sans réserve à l’Eternel son Dieu, à la différence de son père David. '
  '40':
  - type: text
    content: Par la suite, Salomon chercha à faire périr Jéroboam. Alors Jéroboam s’en alla et s’enfuit en Egypte pour se réfugier auprès de Shishaq, roi d’Egypte. Il y resta jusqu’à la mort de Salomon
  - type: note
    content: Voir 14.25-26. Shishaq est le premier pharaon de la XXIIe dynastie égyptienne (945-924 av. J.-C.).
  - type: text
    content: .
  - type: heading
    content: La fin du règne de Salomon
  - type: heading
    content: (2 Ch 9.29-31)
  '41':
  - type: text
    content: Les autres faits et gestes de Salomon, toutes ses réalisations et sa sagesse sont cités dans le livre des Annales de Salomon
  - type: note
    content: Rouleau où l’on consignait les décisions et les expéditions du roi (voir 14.19, 29 ; 15.7, 23), comme il en existait dans tous les royaumes de l’époque.
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'La durée du règne de Salomon à Jérusalem sur tout Israël fut de quarante ans. '
  '43':
  - type: text
    content: Après cela, Salomon rejoignit ses ancêtres décédés et fut enterré dans la Cité de David, son père. Son fils Roboam lui succéda sur le trône.
  '5':
  - type: text
    content: 'Il pratiqua le culte d’Astarté, la déesse des Sidoniens, et celui de Milkom, l’idole abominable des Ammonites. '
  '6':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, car il n’obéit pas pleinement à l’Eternel comme l’avait fait son père David. '
  '7':
  - type: text
    content: A cette époque, Salomon bâtit sur la colline à l’est de Jérusalem
  - type: note
    content: C’est-à-dire le mont des Oliviers, appelé mont de la Destruction dans 2 R 23.13.
  - type: text
    content: ' un haut lieu pour Kemosh'
  - type: note
    content: Voir Nb 21.29 ; Jr 48.7, 13, 16.
  - type: text
    content: ', l’idole abominable de Moab, et pour Milkom'
  - type: note
    content: 'D’après l’ancienne version grecque (voir v. 5 et 33). Le texte hébreu traditionnel a : Molok.'
  - type: text
    content: ', l’idole abominable des Ammonites. '
  '8':
  - type: text
    content: Il fit de même pour toutes ses femmes étrangères pour qu’elles puissent offrir des parfums et des sacrifices à leurs dieux.
  - type: heading
    content: L’annonce des sanctions
  '9':
  - type: text
    content: L’Eternel, qui était apparu deux fois
  - type: note
    content: Voir 1 R 3.4-15 ; 9.1-9.
  - type: text
    content: ' à Salomon, s’irrita contre lui, parce que son cœur s’était détaché de l’Eternel, le Dieu d’Israël. '
