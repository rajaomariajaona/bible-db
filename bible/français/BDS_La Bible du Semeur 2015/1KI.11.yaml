        text: '11.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rouleau où l’on consignait les décisions et les expéditions du roi (voir 14.19, 29 ; 15.7, 23), comme il en existait dans tous les royaumes de l’époque.
    marker-yv: yv-n
